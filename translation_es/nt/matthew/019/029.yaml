revisions:
- from: Y todo el que haya dejado casas, hermanos, hermanas, padre, madre, esposa, hijos o campos por causa de mi nombre, recibirá[a] cien veces más y heredará vida eterna.
  to: Y todo el que haya dejado casas, hermanos, hermanas, padre, madre, esposa, hijos o campos por causa de mi nombre, recibirá ciento por uno[a] y heredará vida eterna.
  rationale: Se ajusta ἑκατονταπλασίονα a una formulación española más directa y bíblicamente natural («ciento por uno»), en mejor sintonía con la revisión auditada del inglés a «a hundredfold». También se corrige la ubicación de la nota para que ancle la alternativa léxica en la expresión cuantitativa correspondiente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:14:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura distributiva («todo el que»), la lista de relaciones y posesiones, el motivo («por causa de mi nombre») y el motivo teológico de conservar «nombre». También mantiene correctamente «esposa» para γυναῖκα y «heredará» para κληρονομήσει. Sin embargo, no sigue el estado auditado del English POB en ἑκατονταπλασίονα, que fue revisado a «a hundredfold»; además, la nota al pie está anclada en «recibirá» en vez de en la expresión cuantitativa correspondiente.
  spanish_quality_summary: El español es claro y digno, pero hay dos reparaciones menores. Primero, la nota debe anclarse en la frase numérica, no en el verbo. Segundo, «cien veces más» puede sugerir comparación incremental más que el valor formal de «ἑκατονταπλασίονα»; «ciento por uno» suena natural y bíblico en español general y permite conservar «cien veces más» como alternativa en nota. El resto del verso fluye bien y es legible.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Esposa», «vida eterna» y «heredará» están bien alineados con las decisiones léxicas y teológicas documentadas. La principal desalineación está con la revisión inglesa auditada para ἑκατονταπλασίονα: conviene reflejar una forma más directa que el simple comparativo libre.'
  issues:
  - severity: medium
    issue: La traducción de ἑκατονταπλασίονα como «cien veces más» no refleja tan directamente la revisión auditada del POB inglés a «a hundredfold».
    rationale: Aunque el sentido general se conserva, el expediente inglés ya prefirió una formulación más formal y más ceñida al griego. En español, «ciento por uno» reproduce mejor ese valor cuantitativo fijo sin sonar forzado.
  - severity: medium
    issue: La nota al pie [a] está colocada sobre «recibirá» en lugar de sobre la expresión cuantitativa pertinente.
    rationale: La alternativa léxica corresponde a ἑκατονταπλασίονα, no a λήμψεται. El marcador debe aparecer junto a «ciento por uno» o la expresión equivalente.
  - severity: low
    issue: 'La nota actual «O: “cien veces”» no corresponde exactamente ni al borrador principal ni a la alternativa más natural documentada.'
    rationale: Si el texto principal se corrige a «ciento por uno», la alternativa adecuada sería «cien veces más», que además recoge la opción previa del borrador.
  revised_spanish_text: Y todo el que haya dejado casas, hermanos, hermanas, padre, madre, esposa, hijos o campos por causa de mi nombre, recibirá ciento por uno[a] y heredará vida eterna.
