translation:
  language: es
  text: Y todo el que haya dejado casas, hermanos, hermanas, padre, madre, esposa, hijos o campos por causa de mi nombre, recibirá ciento por uno[a] y heredará vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más explícita: «cien veces más».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὅστις
  english_pob_choice: everyone who
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - quienquiera que
  lexicon: BDAG
  rationale: La expresión griega es distributiva y general. «Todo el que» es natural en español y conserva el alcance universal sin volverla impersonal o extraña.
- source_word: ἀφῆκεν
  english_pob_choice: has left
  chosen_spanish: haya dejado
  alternatives_spanish:
  - ha dejado
  - dejara
  - abandonado
  lexicon: BDAG
  rationale: El aoristo se entiende como acción completa dentro de una cláusula de condición implícita/relativa. En español, el subjuntivo perfecto «haya dejado» suena más natural que un simple pretérito y mantiene el valor de renuncia consumada con relevancia presente.
- source_word: οἰκίας
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - viviendas
  lexicon: BDAG
  rationale: «Casas» sigue de cerca el sustantivo concreto griego y conserva el paralelismo con «campos». «Hogares» sería más interpretativo y suavizaría el matiz material/familiar.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  lexicon: BDAG
  rationale: El griego distingue luego «hermanas», así que conviene mantener «hermanos» por separado y no fusionarlo.
- source_word: ἀδελφὰς
  english_pob_choice: sisters
  chosen_spanish: hermanas
  alternatives_spanish:
  - hermanas de sangre
  lexicon: BDAG
  rationale: Término de parentesco directo, paralelo a «hermanos».
- source_word: πατέρα
  english_pob_choice: father
  chosen_spanish: padre
  lexicon: BDAG
  rationale: Correspondencia directa del parentesco listado.
- source_word: μητέρα
  english_pob_choice: mother
  chosen_spanish: madre
  lexicon: BDAG
  rationale: Correspondencia directa del parentesco listado.
- source_word: γυναῖκα
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: En una lista de miembros del hogar dejados por lealtad a Jesús, γυνή aquí se entiende mejor como «esposa». «Esposa» evita la ambigüedad de «mujer» y preserva el sentido relacional del pasaje.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendencia
  - hijos e hijas
  lexicon: BDAG
  rationale: En este contexto familiar, «hijos» funciona como término natural y compacto para la descendencia. Aunque puede sonar masculino, en español bíblico puede abarcar a los hijos como grupo familiar; la lista ya incluye ambos sexos en hermanos/hermanas.
- source_word: ἀγροὺς
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - tierras
  - fincas
  - terrenos
  lexicon: BDAG
  rationale: «Campos» conserva la concreción agraria del griego y su dimensión económica/propietaria. «Fincas» o «tierras» desplazarían el matiz hacia formas de propiedad más específicas o abstractas.
- source_word: ἕνεκεν τοῦ ὀνόματός μου
  english_pob_choice: for the sake of my name
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - por amor a mi nombre
  - por mi nombre
  lexicon: BDAG
  rationale: «Por causa de mi nombre» preserva el valor causal y devocional del giro sin reducirlo a «por mí». Mantiene la fuerza bíblica de «nombre» como referencia a la persona y autoridad de Jesús.
- source_word: ἑκατονταπλασίονα
  english_pob_choice: a hundredfold
  chosen_spanish: cien veces más
  alternatives_spanish:
  - cien pliegos
  - ciento por uno
  lexicon: BDAG
  rationale: «Cien veces más» expresa claramente la magnitud prometida en español moderno. Mantiene el sentido cuantitativo de ἑκατονταπλασίονα sin depender de una forma idiomática menos transparente para lectores actuales.
- source_word: λήμψεται
  english_pob_choice: will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - obtendrá
  - tomará
  lexicon: BDAG
  rationale: Verbo futuro simple natural y fiel al futuro medio griego.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida del siglo venidero
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia estable y plenamente inteligible en español. Conserva la formulación bíblica tradicional sin perder claridad.
- source_word: κληρονομήσει
  english_pob_choice: will inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - recibirá como herencia
  lexicon: BDAG
  rationale: «Heredará» conserva explícitamente la metáfora de herencia del verbo griego, en vez de aplanarla en un mero «recibirá».
theological_decisions:
- issue: Sentido de γυνή en una lista de renuncias familiares
  english_pob_reading: wife
  chosen_spanish_reading: esposa
  alternative_spanish_readings:
  - mujer
  rationale: El contexto enumera vínculos del hogar y pertenencias dejadas por seguir a Jesús. «Esposa» preserva el vínculo matrimonial y evita una lectura genérica o descontextualizada de «mujer».
  doctrine_reference: Translation philosophy §1, §4
- issue: La expresión ἕνεκεν τοῦ ὀνόματός μου
  english_pob_reading: for the sake of my name
  chosen_spanish_reading: por causa de mi nombre
  alternative_spanish_readings:
  - por mi nombre
  - por mi causa
  rationale: La traducción mantiene «nombre» como portador de identidad, autoridad y lealtad, en vez de sustituirlo por una paráfrasis personal que borre el eco bíblico del término.
  doctrine_reference: Translation philosophy §1, §6
- issue: La cuantía prometida en ἑκατονταπλασίονα
  english_pob_reading: a hundredfold
  chosen_spanish_reading: cien veces más
  alternative_spanish_readings:
  - cien pliegos
  - ciento por uno
  rationale: La frase española comunica con claridad la abundancia prometida. Aunque la forma tradicional «cien veces más» no reproduce un tecnicismo fijo, sí mantiene la fuerza comparativa y es transparente para el lector contemporáneo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El audit trail inglés pasó de una paráfrasis más extensa a «a hundredfold» por ser más formal y más cercana a ἑκατονταπλασίονα. En español se eligió «cien veces más», que conserva esa formalidad y comunica el mismo valor cuantitativo sin volver el texto oscuro; se mantuvo además la metáfora de herencia en «heredará».
  spanish_consistency_notes:
  - Se mantiene «nombre» en lugar de sustituirlo por «yo», para conservar el giro bíblico y su peso teológico.
  - Se evita «SEÑOR» o «Cristo» porque el texto no los exige; Jesús habla en primera persona con «mi nombre».
  - «Vida eterna» se usa como fórmula estable, coherente con el registro bíblico y con la terminología POB en español.
  - «Campos» y «casas» se conservan en plural para reflejar la lista concreta de bienes y relaciones dejados atrás.
