source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς· Ἀμὴν λέγω ὑμῖν ὅτι ὑμεῖς οἱ ἀκολουθήσαντές μοι ἐν τῇ παλιγγενεσίᾳ, ὅταν καθίσῃ ὁ υἱὸς τοῦ ἀνθρώπου ἐπὶ θρόνου δόξης αὐτοῦ, ⸀καθήσεσθε καὶ ⸀ὑμεῖς ἐπὶ δώδεκα θρόνους κρίνοντες τὰς δώδεκα φυλὰς τοῦ Ἰσραήλ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/019/028.yaml
  text: And Jesus said to them[a], “Truly I say to you, you who have followed me will also sit on twelve thrones in the renewal, when the Son of Man sits on the throne of his glory[b], judging the twelve tribes of Israel.”
  footnotes:
  - marker: a
    text: Or 'the regeneration,' 'the new world,' or 'the rebirth.' Here the phrase refers to the future renewal associated with the Son of Man's reign, not most likely to individual new birth.
    reason: lexical_alternative
  - marker: b
    text: '''Judging'' may also carry the sense of exercising rule or governance.'
    reason: lexical_alternative
