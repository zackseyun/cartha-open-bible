translation:
  language: es
  text: 'Y Jesús les dijo: «En verdad les digo que ustedes, los que me han seguido, también se sentarán sobre doce tronos en la renovación[a], cuando el Hijo del Hombre se siente sobre el trono de su gloria, juzgando[b] a las doce tribus de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «regeneración», «nuevo mundo» o «renacimiento». Aquí la frase se refiere a la renovación futura asociada con el reinado del Hijo del Hombre, no principalmente al nuevo nacimiento individual.
    reason: lexical_alternative
  - marker: b
    text: «Juzgando» también puede implicar el sentido de ejercer gobierno o autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - Verdaderamente
  - En verdad
  - Amén
  lexicon: BDAG
  rationale: La fórmula introduce una afirmación solemne y autoritativa. «De cierto» es natural en español bíblico contemporáneo, conserva la solemnidad y evita dejar sin explicar el préstamo litúrgico «Amén».
- source_word: ἀκολουθήσαντές μοι
  english_pob_choice: you who have followed me
  chosen_spanish: ustedes, los que me han seguido
  alternatives_spanish:
  - ustedes, los que me siguieron
  - ustedes, mis seguidores
  lexicon: BDAG
  rationale: El participio aoristo identifica al grupo por su acto ya cumplido de seguir a Jesús. «Me han seguido» mantiene el valor perfectivo en español y hace explícito el objeto «me».
- source_word: παλιγγενεσίᾳ
  english_pob_choice: the renewal
  chosen_spanish: la renovación
  alternatives_spanish:
  - la regeneración
  - el nuevo mundo
  - el renacimiento
  lexicon: BDAG
  rationale: En este contexto escatológico, el término apunta a una renovación futura asociada al reinado del Hijo del Hombre, no principalmente a la conversión individual. «Renovación» es claro y suficientemente amplio en español sin sobreinterpretar el alcance.
- source_word: ὅταν καθίσῃ
  english_pob_choice: when ... sits
  chosen_spanish: cuando ... se siente
  alternatives_spanish:
  - cuando ... se sentará
  - cuando ... tome asiento
  lexicon: Greek grammar / BDAG
  rationale: La construcción temporal griega refiere un evento futuro; en español, el presente de subjuntivo tras «cuando» es idiomático y conserva el valor prospectivo.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del hombre
  - el Hijo del Humano
  lexicon: BDAG
  rationale: Es la traducción habitual del título, preservando su resonancia daniélica y mesiánica.
- source_word: ἐπὶ θρόνου δόξης αὐτοῦ
  english_pob_choice: on the throne of his glory
  chosen_spanish: sobre el trono de su gloria
  alternatives_spanish:
  - en el trono glorioso que le pertenece
  - sobre su trono glorioso
  lexicon: BDAG
  rationale: «Sobre el trono de su gloria» sigue de cerca la construcción genitiva del griego y mantiene el tono elevado del pasaje.
- source_word: καθήσεσθε καὶ ὑμεῖς
  english_pob_choice: you will also sit
  chosen_spanish: también se sentarán
  alternatives_spanish:
  - también se sentarán ustedes
  - también ustedes se sentarán
  lexicon: BDAG
  rationale: El futuro medio indica la entronización futura de los discípulos. «También» recoge καί y el orden de la frase mantiene la relación con la entronización del Hijo del Hombre.
- source_word: ἐπὶ δώδεκα θρόνους
  english_pob_choice: on twelve thrones
  chosen_spanish: sobre doce tronos
  alternatives_spanish:
  - en doce tronos
  - encima de doce tronos
  lexicon: BDAG
  rationale: La preposición ἐπί aquí expresa posición/ubicación; «sobre» es natural y fiel.
- source_word: κρίνοντες
  english_pob_choice: judging
  chosen_spanish: juzgando
  alternatives_spanish:
  - gobernando
  - ejerciendo juicio
  lexicon: BDAG
  rationale: «Juzgando» preserva el sentido léxico directo. Aunque el término puede incluir gobierno o administración, el texto menciona explícitamente el juicio; por eso se mantiene esa forma en el texto principal.
- source_word: φυλὰς τοῦ Ἰσραήλ
  english_pob_choice: the twelve tribes of Israel
  chosen_spanish: a las doce tribus de Israel
  alternatives_spanish:
  - las doce tribus de Israel
  - sobre las doce tribus de Israel
  lexicon: BDAG
  rationale: Es la manera más natural en español para expresar el objeto de «juzgando» y refleja con precisión la división tribal de Israel.
theological_decisions:
- issue: Sentido de παλιγγενεσία en el marco del versículo
  english_pob_reading: cosmic eschatological renewal associated with the Son of Man's enthronement
  chosen_spanish_reading: renovación escatológica asociada al reinado del Hijo del Hombre
  alternative_spanish_readings:
  - regeneración individual
  - nuevo mundo
  - renacimiento
  rationale: El contexto inmediato es la venida entronizada del Hijo del Hombre y el juicio sobre las tribus de Israel; por eso el término no se traduce como nueva conversión personal, sino como renovación futura del orden creado. Se evita precisar un esquema doctrinal no explicitado por el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de κρίνοντες
  english_pob_reading: judging
  chosen_spanish_reading: juzgando
  alternative_spanish_readings:
  - gobernando
  - ejerciendo autoridad
  rationale: El verbo puede incluir gobierno o ejercicio de autoridad, pero el significado explícito es «juzgar». Mantenerlo así preserva la tensión lexical y evita sustituirla por una lectura más amplia no indicada directamente en la frase.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura griega y el último ajuste del audit trail inglés, manteniendo «in the renewal» como complemento temporal/esférico ligado a la promesa principal. Se evitó expandir la expresión a «la renovación de todas las cosas», porque esa ampliación no está explícita en el texto fuente de este versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - «Hijo del Hombre» se conserva como título fijo.
  - Se eligió «juzgando» frente a «gobernando» para no borrar la tensión lexical documentada.
  - La puntuación con comillas angulares sigue el uso editorial español; los marcadores de nota aparecen solo en palabras o frases ancla.
