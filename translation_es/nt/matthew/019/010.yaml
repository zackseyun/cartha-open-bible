  - severity: low
    issue: «su mujer» puede sonar más coloquial o ambiguo que «su esposa»
    rationale: En contexto matrimonial ambas opciones son posibles, pero «esposa» comunica con más precisión el sentido de γυνή como ‘wife’ en registro bíblico neutral y ampliamente legible.
