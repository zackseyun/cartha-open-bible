translation:
  language: es
  text: 'Sus discípulos le dijeron: «Si tal es el caso[a] de un hombre con su esposa, no conviene casarse».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si tal es el caso de un hombre con una esposa». La frase griega es compacta y también puede verterse «el asunto» o «la situación» en lugar de «el caso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγουσιν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le decían
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en pasado narrativo en español; «le dijeron» conserva la fluidez sin perder la referencia histórica.
- source_word: οἱ μαθηταί
  english_pob_choice: disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente normal en contexto evangélico. El posesivo «sus» queda bien en español y refleja la relación con Jesús.
- source_word: Εἰ οὕτως ἐστίν
  english_pob_choice: If such is the case
  chosen_spanish: Si así es el caso
  alternatives_spanish:
  - Si así es la situación
  - Si así es el asunto
  lexicon: BDAG
  rationale: «Οὕτως» pide una equivalencia natural como «así»; la construcción «si así es el caso» sigue la fuerza inferencial del comentario de los discípulos.
- source_word: ἡ αἰτία
  english_pob_choice: the case
  chosen_spanish: el caso
  alternatives_spanish:
  - el asunto
  - la situación
  - la causa
  lexicon: BDAG
  rationale: Aquí αἰτία no apunta a una causa estricta sino a la situación o estado del asunto; «el caso» preserva esa amplitud compacta que destaca la nota inglesa.
- source_word: τοῦ ἀνθρώπου μετὰ τῆς γυναικός
  english_pob_choice: of a man with his wife
  chosen_spanish: de un hombre con su mujer
  alternatives_spanish:
  - de un hombre con su esposa
  - de un hombre con una mujer
  lexicon: BDAG
  rationale: El griego mantiene el marco masculino-femenino del matrimonio. En español, «mujer» conserva la correspondencia literal con γυνή y evita añadir una precisión posesiva no explícita en el texto.
- source_word: οὐ συμφέρει
  english_pob_choice: it is not advisable
  chosen_spanish: no conviene
  alternatives_spanish:
  - no es conveniente
  - no es aconsejable
  - no resulta beneficioso
  lexicon: BDAG
  rationale: συμφέρει expresa conveniencia/ventaja. «No conviene» es una fórmula natural y sobria en español que recoge bien la valoración práctica del comentario.
- source_word: γαμῆσαι
  english_pob_choice: to marry
  chosen_spanish: casarse
  alternatives_spanish:
  - casarse uno
  - contraer matrimonio
  lexicon: BDAG
  rationale: El infinitivo aoristo se expresa idiomáticamente con el infinitivo español. En este contexto, «casarse» suena más natural que «contraer matrimonio» y sigue el sentido matrimonial del pasaje.
theological_decisions:
- issue: Framing marital language in male-female terms
  english_pob_reading: of a man with his wife
  chosen_spanish_reading: de un hombre con su mujer
  alternative_spanish_readings:
  - de una persona con su cónyuge
  - entre un hombre y una mujer
  rationale: El contexto trata del matrimonio en términos explícitamente masculinos y femeninos. La versión española mantiene ese encuadre sin neutralizarlo ni ampliarlo más allá de lo que el griego dice.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: se prefirió una formulación más natural para οὕτως y se reflejó συμφέρει con una expresión de conveniencia práctica. En español, «no conviene» recoge mejor ese valor contextual que un calco más pesado.'
  spanish_consistency_notes:
  - Se mantuvo «discípulos» como término técnico evangélico habitual.
  - Se tradujo γυνή como «mujer» en el marco matrimonial, siguiendo la lectura masculina-femenina del contexto.
  - Se evitó «SEÑOR» o terminología eclesiástica ajena, porque el versículo no lo requiere.
