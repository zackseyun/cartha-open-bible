translation:
  language: es
  text: 'Y él le dijo: «¿Por qué me preguntas acerca de lo que es bueno? Uno es bueno[a][b]. Pero si quieres entrar en la vida, guarda los mandamientos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos y los relatos paralelos leen: «¿Por qué me llamas bueno? Nadie es bueno, sino sólo uno: Dios». El texto SBLGNT de Mateo, en cambio, dice: «¿Por qué me preguntas acerca de lo que es bueno? Uno es bueno».'
    reason: textual_variant
  - marker: b
    text: 'O, más idiomáticamente: «Hay uno que es bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί με ἐρωτᾷς περὶ τοῦ ἀγαθοῦ
  english_pob_choice: Why do you ask me about what is good?
  chosen_spanish: ¿Por qué me preguntas acerca de lo que es bueno?
  alternatives_spanish:
  - ¿Por qué me preguntas acerca del bien?
  - ¿Por qué me preguntas sobre lo bueno?
  lexicon: BDAG
  rationale: 'El griego neutro τοῦ ἀγαθοῦ apunta mejor a una expresión impersonal/abstracta en español: «lo que es bueno». Evita armonizar con la forma paralela de Marcos/Lucas y conserva la pregunta tal como aparece en Mateo.'
- source_word: εἷς ἐστιν ὁ ἀγαθός
  english_pob_choice: One is good.
  chosen_spanish: Uno es bueno.
  alternatives_spanish:
  - Sólo uno es bueno.
  - Hay uno solo que es bueno.
  lexicon: BDAG
  rationale: La estructura predicativa griega se conserva de manera natural en español con «Uno es bueno». Mantiene visible la conexión con la frase anterior sin añadir un sujeto explícito que el texto griego no desarrolla.
- source_word: εἰ δὲ θέλεις
  english_pob_choice: But if you want
  chosen_spanish: Pero si quieres
  alternatives_spanish:
  - Mas si quieres
  - Y si quieres
  lexicon: BDAG
  rationale: «Quieres» transmite bien el valor de θέλω como deseo o intención. Se eligió «Pero» para reflejar el matiz adversativo leve de δέ en este contexto.
- source_word: εἰς τὴν ζωὴν εἰσελθεῖν
  english_pob_choice: to enter into life
  chosen_spanish: entrar en la vida
  alternatives_spanish:
  - entrar en vida
  - entrar en la vida eterna
  lexicon: BDAG
  rationale: La expresión se mantiene con la preposición española «en» como equivalente idiomático de εἰς. No se añadió «eterna», porque el griego de esta cláusula dice simplemente «vida».
- source_word: τήρησον
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  lexicon: BDAG
  rationale: En relación con mandamientos, τηρέω se traduce con el verbo directo y común «guardar». «Cumplir» puede sonar más interpretativo; «observar» es posible, pero menos natural aquí.
- source_word: τὰς ἐντολάς
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las ordenanzas
  lexicon: BDAG
  rationale: «Mandamientos» comunica con claridad el peso normativo de ἐντολή en este contexto y coincide con el uso bíblico habitual en español.
theological_decisions:
- issue: Sentido de la respuesta de Jesús sobre lo bueno / el bueno
  english_pob_reading: Matthew's wording is translated as a question about 'what is good' and the reply 'One is good,' without importing Mark/Luke's 'No one is good except God alone.'
  chosen_spanish_reading: Se traduce la pregunta como una indagación acerca de «lo que es bueno» y la respuesta como «Uno es bueno», sin armonizar con la forma paralela de Marcos y Lucas.
  alternative_spanish_readings:
  - '¿Por qué me llamas bueno? ... Nadie es bueno, sino sólo uno: Dios.'
  - ¿Por qué me preguntas por el bien? ... Uno solo es bueno.
  rationale: El texto griego de Mateo presenta otra formulación distinta, y la traducción debe dejar visible esa diferencia. «Uno es bueno» conserva la tensión textual sin forzar una aclaración teológica que pertenece a los paralelos sinópticos, no a esta redacción mateana.
  doctrine_reference: Afirmaciones cristológicas; fidelidad textual al texto base
- issue: Alcance de 'vida' en εἰς τὴν ζωὴν εἰσελθεῖν
  english_pob_reading: '''to enter into life'' is retained without overtranslating as ''eternal life.'''
  chosen_spanish_reading: Se mantiene «entrar en la vida» y no «entrar en la vida eterna».
  alternative_spanish_readings:
  - entrar en vida
  - entrar en la vida eterna
  rationale: El griego sólo dice «vida». Añadir «eterna» explicitaría una interpretación posible, pero no exigida por la cláusula misma. La traducción española conserva así el alcance abierto del original.
  doctrine_reference: Principio de no añadir contenido no explícito en el texto
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una forma más natural y precisa para la cláusula final. Para el español, se adoptó una equivalencia igualmente natural («Uno es bueno») y se mantuvo la distinción textual de Mateo respecto de Marcos y Lucas.
  spanish_consistency_notes:
  - Se usa «Dios» y no un equivalente de máscara litúrgica, conforme a la política del proyecto.
  - Se conserva «mandamientos» para τὰς ἐντολάς, coherente con el valor jurídico-normativo del término.
  - Se traduce εἰς τὴν ζωὴν εἰσελθεῖν con «entrar en la vida» para no introducir «eterna» sin apoyo explícito.
  - La puntuación y las comillas siguen el uso editorial español y mantienen el discurso directo claramente delimitado.
