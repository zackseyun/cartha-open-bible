base_translation:
  language: en
  yaml_path: translation/nt/matthew/019/017.yaml
  text: And he said to him[a], “Why do you ask me about what is good? One is good. But if you want to enter into life[b], keep the commandments.”
  footnotes:
  - marker: a
    text: Some manuscripts and the parallel accounts read, 'Why do you call me good? No one is good except one—God.' Matthew's SBLGNT text instead reads, 'Why do you ask me about what is good? One is the good one.'
    reason: textual_variant
  - marker: b
    text: Or more idiomatically, 'There is one who is good.'
    reason: lexical_alternative
