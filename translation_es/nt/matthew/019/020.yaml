translation:
  language: es
  text: 'El joven le dice: «Todo esto lo he guardado[a]. ¿Qué me falta todavía[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo esto lo he observado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿En qué todavía me quedo corto?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - está diciendo
  lexicon: BDAG
  rationale: El presente histórico del griego se puede reflejar naturalmente con el presente español "dice" en narración.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: El dativo pronominal se expresa de forma idiomática en español con el clítico indirecto "le".
- source_word: ὁ νεανίσκος
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven hombre
  lexicon: BDAG
  rationale: νεανίσκος significa "joven" / "joven hombre"; "el joven" es natural y fiel, sin introducir el dato de "gobernante" que no aparece en este versículo.
- source_word: Πάντα ταῦτα
  english_pob_choice: All these
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Todas estas cosas
  - Todo ello
  lexicon: BDAG
  rationale: La frase neutra plural apunta a los mandamientos mencionados; "Todo esto" suena natural en español y conserva la referencia deíctica.
- source_word: ἐφύλαξα
  english_pob_choice: I have kept
  chosen_spanish: lo he guardado
  alternatives_spanish:
  - lo he observado
  - lo he cumplido
  lexicon: BDAG
  rationale: φυλάσσω aquí se refiere a guardar u observar mandamientos. "He guardado" conserva la idea de cumplimiento/observancia sin sobretraducir el aspecto a una evaluación doctrinal.
- source_word: τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿En qué
  - ¿Qué cosa
  lexicon: BDAG
  rationale: La partícula interrogativa introduce directamente la pregunta; "¿Qué" es la equivalencia más natural.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía más
  lexicon: BDAG
  rationale: ἔτι expresa continuidad o resto pendiente; "todavía" transmite bien esa persistencia en español.
- source_word: ὑστερῶ
  english_pob_choice: do I still lack
  chosen_spanish: me falta
  alternatives_spanish:
  - carezco todavía
  - estoy deficiente
  lexicon: BDAG
  rationale: ὑστερέω puede significar faltar o quedar por debajo. "Me falta" es la forma natural en español y mantiene la pregunta de carencia sin resolver la tensión narrativa.
theological_decisions:
- issue: Autorreivindicación de obediencia
  english_pob_reading: The speaker claims to have kept the commandments without the translation signaling endorsement or irony.
  chosen_spanish_reading: El joven afirma haber guardado los mandamientos sin que la traducción añada aprobación ni ironía.
  alternative_spanish_readings:
  - El joven lo dice sinceramente pero quizá erróneamente
  - El joven hace una afirmación retórica o exagerada
  rationale: El griego presenta la afirmación de manera directa. La traducción debe preservar esa tensión y dejar el juicio narrativo para el contexto inmediato, no introducirlo en la redacción del versículo.
  doctrine_reference: Preservar la tensión teológica y narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español y que no haya notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo un registro neutral y eclesialmente legible.
  - Se evitó "Cristo"/"Mesías" porque no aplica aquí.
  - Se prefirió "todavía" por ser más natural que "aún" en esta pregunta.
  - No se añadió "ruler/gobernante" para no importar información de otro contexto sinóptico.
