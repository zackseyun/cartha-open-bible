translation:
  language: es
  text: 'Él les dijo[a]: «Por la dureza de su corazón, Moisés les permitió divorciarse[b] de sus esposas, pero desde el principio no ha sido así[c][d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la dureza de corazón de ustedes».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «despedir a sus esposas»; en este contexto, el sentido es divorcio.
    reason: lexical_alternative
  - marker: c
    text: Es decir, esta concesión no reflejaba el orden original de la creación.
    reason: cross_reference
  - marker: d
    text: 'O: «no ha sido de ese modo».'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: He said
  chosen_spanish: Él les dijo
  alternatives_spanish:
  - Él les dice
  - Les dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español, el pretérito simple es natural en narración y conserva el sentido del discurso directo sin forzar un presente narrativo.
- source_word: πρὸς τὴν σκληροκαρδίαν ὑμῶν
  english_pob_choice: Because of your hardness of heart
  chosen_spanish: Por la dureza de su corazón
  alternatives_spanish:
  - A causa de la dureza de su corazón
  - Por su dureza de corazón
  - Por su corazón endurecido
  lexicon: BDAG
  rationale: πρός con acusativo expresa aquí causa o fundamento. «Por» comunica bien esa causalidad en español; «dureza de corazón» preserva el idiomatismo bíblico y evita una paráfrasis más interpretiva.
- source_word: ἐπέτρεψεν
  english_pob_choice: permitted
  chosen_spanish: permitió
  alternatives_spanish:
  - autorizó
  - dejó
  lexicon: BDAG
  rationale: El verbo indica concesión o permiso, no mandato. «Permitió» conserva con claridad ese matiz jurídico-discursivo.
- source_word: ἀπολῦσαι
  english_pob_choice: to divorce
  chosen_spanish: despedir
  alternatives_spanish:
  - divorciar
  - repudiar
  - separar
  lexicon: BDAG
  rationale: El griego literalmente significa «soltar/mandar fuera», y el POB inglés anotó ese sentido literal antes de precisar el contexto marital. En español, «despedir a sus esposas» conserva la base léxica de la expresión y deja visible la tensión contextual; la nota explica que aquí el sentido es divorcio.
- source_word: τὰς γυναῖκας ὑμῶν
  english_pob_choice: your wives
  chosen_spanish: a sus esposas
  alternatives_spanish:
  - a sus mujeres
  - a sus mujeres casadas
  lexicon: BDAG
  rationale: En este contexto matrimonial, γυνή significa «esposas». «Esposas» es claro y fiel al referente contextual; se mantiene la preposición «a» por la construcción con despedir.
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - al principio
  lexicon: BDAG
  rationale: Es la equivalencia española natural y tradicional para la alusión a la orden creacional sin agregar explicaciones al cuerpo del texto.
- source_word: οὐ γέγονεν οὕτως
  english_pob_choice: it has not been so
  chosen_spanish: no ha sido así
  alternatives_spanish:
  - no fue así
  - no ha ocurrido así
  - no ha sucedido así
  lexicon: BDAG
  rationale: El perfecto de γίνομαι expresa un estado de cosas o una realidad establecida. «No ha sido así» refleja bien ese valor con un español natural.
theological_decisions:
- issue: Naturaleza de la concesión de Moisés
  english_pob_reading: Moses permitted you
  chosen_spanish_reading: Moisés les permitió
  alternative_spanish_readings:
  - Moisés les permitió por concesión
  - Moisés les autorizó
  rationale: Se preserva que Moisés no está mandando ni aprobando idealmente el divorcio, sino concediéndolo. Esto es importante para no borrar la tensión entre concesión legal y orden creacional.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referencia al orden creacional en la cláusula final
  english_pob_reading: but from the beginning it has not been so
  chosen_spanish_reading: pero desde el principio no ha sido así
  alternative_spanish_readings:
  - pero desde el principio no era así
  - pero desde el principio no ha sido de ese modo
  rationale: Se mantiene la formulación sobria del griego sin ampliar a una paráfrasis doctrinal en el texto principal. La implicación creadora permanece en el contexto inmediato.
  doctrine_reference: Translation philosophy §3
- issue: Valor de ἀπολῦσαι en el contexto de matrimonio
  english_pob_reading: Literally, “to send away your wives”; in this context the meaning is divorce.
  chosen_spanish_reading: despedir a sus esposas
  alternative_spanish_readings:
  - repudiar a sus esposas
  - divorciar a sus esposas
  rationale: Se conserva la literalidad básica que el audit trail quiere visibilizar, sin ocultar el sentido contextual. La nota permite al lector ver que aquí «despedir» equivale a divorcio.
  doctrine_reference: BDAG; Translation philosophy §1
translation_notes:
  revision_awareness: El inglés auditado fue revisado en la cláusula final de «it was not so» a «it has not been so» para reflejar más de cerca γέγονεν. La versión española sigue ese ajuste con «no ha sido así», manteniendo el valor de estado/resultativo del perfecto sin sonar forzada. También se preservó la decisión auditada de tratar ἐπέτρεψεν como permiso y no como mandato.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «esposas» para γυνή por el contexto explícito de matrimonio y divorcio.
  - Se conservó «permitió» para ἐπέτρεψεν, evitando un verbo más fuerte que alteraría el sentido concesivo.
  - La expresión «desde el principio» preserva la alusión a Génesis sin explicitarla en el cuerpo del versículo.
  - La nota sobre «despedir» hace visible la tensión entre literalidad léxica y sentido contextual de divorcio, conforme al audit trail inglés.
