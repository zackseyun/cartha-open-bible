review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Jesús habla en pasado narrativo, la causa es la dureza de corazón, Moisés concede en vez de mandar, y la cláusula final preserva adecuadamente el valor resultativo de γέγονεν con «no ha sido así». Sin embargo, la decisión principal sobre ἀπολῦσαι no sigue bien el audit trail inglés ni la claridad contextual del original: en este contexto matrimonial el verbo significa «divorciarse de / divorciar», no conviene dejar «despedir» en el texto principal y explicar el sentido real solo en nota.'
  spanish_quality_summary: 'El español es mayormente natural y digno, pero el sistema de notas está desalineado: [b] está anclado en «permitió» aunque explica «despedir», y [c] está anclado en «despedir» aunque contiene la nota de creación/origen. Además, «despedir a sus esposas» suena impropio en español bíblico y puede sugerir echarlas de casa o incluso despedir empleadas, debilitando la legibilidad. «Divorciarse de sus esposas» o «divorciar a sus esposas» sería más claro; la primera opción suena más idiomática.'
  glossary_alignment: 'No hay conflicto con terminología de proyecto como Yahvé/Mesías/etc. La decisión teológica sobre ἐπέτρεψεν como «permitió» está bien alineada. La principal desalineación léxica es ἀπολῦσαι: el POB inglés usa en texto principal «to divorce» y preserva «to send away» solo en nota; el español debería hacer lo mismo con «divorciarse de sus esposas» en el texto y una nota con «despedir/mandar fuera».'
  issues:
  - severity: high
    issue: La traducción principal de ἀπολῦσαι como «despedir» no comunica con claridad el sentido contextual de divorcio.
    rationale: El propio audit trail inglés eligió «to divorce» en texto principal y reservó la literalidad «to send away» para nota. En español, «despedir a sus esposas» es equívoco y menos natural que «divorciarse de sus esposas».
  - severity: high
    issue: Los marcadores de notas [b] y [c] están colocados en palabras equivocadas.
    rationale: La nota [b] explica el infinitivo ἀπολῦσαι pero está anclada en «permitió»; la nota [c] trata la concesión frente al orden creacional pero está anclada en «despedir». Los anclajes deben corresponder al elemento explicado.
  - severity: medium
    issue: La nota [b] actual presupone una literalidad que ya no debe gobernar el texto principal.
    rationale: Si se corrige el texto principal a «divorciarse de sus esposas», la nota debe presentar «despedir a sus esposas» como alternativa más literal, no como glosa del texto principal.
  - severity: low
    issue: «Él les dijo» es correcto, pero «Les dijo» sería ligeramente más natural en español narrativo.
    rationale: No es un error; se puede conservar «Él» para énfasis ligero o por cercanía al inglés. No requiere adjudicación.
