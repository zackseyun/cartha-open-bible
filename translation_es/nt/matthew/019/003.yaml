  to: 'Y se le acercaron unos fariseos, poniéndolo a prueba y diciendo: «¿Le es lícito a un hombre divorciarse de su esposa por cualquier causa[a]?».'
  rationale: Se quitó «Entonces» para ceñirse mejor a Καὶ. Se trasladó la nota al sintagma «por cualquier causa», porque ahí está la alternativa léxica documentada en la auditoría inglesa (κατὰ πᾶσαν αἰτίαν), y se reformuló la nota para preservar las opciones relevantes en español. El resto del texto puede mantenerse tal como está.
