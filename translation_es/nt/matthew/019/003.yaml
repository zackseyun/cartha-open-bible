translation:
  language: es
  text: 'Y se le acercaron unos fariseos, poniéndolo a prueba y diciendo: «¿Le es lícito a un hombre divorciarse de su esposa por cualquier causa[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por cualquier motivo», o «sobre cualquier base». La frase griega refleja una pregunta legal amplia sobre los motivos permisibles para el divorcio.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθον
  english_pob_choice: came up to
  chosen_spanish: se le acercaron
  alternatives_spanish:
  - vinieron a él
  - se acercaron a él
  lexicon: BDAG
  rationale: El verbo expresa movimiento hacia Jesús; «se le acercaron» mantiene la relación direccional de forma natural en español sin endurecer el estilo.
- source_word: πειράζοντες
  english_pob_choice: testing
  chosen_spanish: poniéndolo a prueba
  alternatives_spanish:
  - tentándolo
  - tratando de hacerlo caer en una trampa
  lexicon: BDAG
  rationale: Aquí el matiz es de examen hostil o de poner a prueba, no simplemente de tentación moral. «Poniéndolo a prueba» conserva la ambigüedad útil del griego y encaja con el contexto de controversia.
- source_word: ἔξεστιν
  english_pob_choice: is it lawful
  chosen_spanish: ¿Le es lícito
  alternatives_spanish:
  - ¿Está permitido
  - ¿Es permitido
  lexicon: BDAG
  rationale: En un debate halájico/legal, ἔξεστιν pregunta por licitud o permiso. «Le es lícito» reproduce bien ese registro formal en español bíblico contemporáneo.
- source_word: ἀνθρώπῳ
  english_pob_choice: for a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: El dativo aquí apunta al varón en el marco del matrimonio y del divorcio de «su esposa». «A un hombre» sigue el sentido concreto del texto y la lectura de POB de precisión de género cuando el referente lo exige.
- source_word: ἀπολῦσαι
  english_pob_choice: to divorce
  chosen_spanish: divorciarse
  alternatives_spanish:
  - despedirla
  - repudiar a su esposa
  lexicon: BDAG
  rationale: Aunque el valor literal es «soltar/mandar fuera», en este contexto marital el sentido idiomático es divorciarse. «Divorciarse» comunica directamente la acción legal implicada.
- source_word: γυναῖκα
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa de él
  lexicon: BDAG
  rationale: Con el posesivo αὐτοῦ y el contexto de divorcio, γυνή debe entenderse como «esposa». «Su esposa» es claro y fiel al sentido relacional del griego.
- source_word: κατὰ πᾶσαν αἰτίαν
  english_pob_choice: for any cause
  chosen_spanish: por cualquier causa
  alternatives_spanish:
  - por todo motivo
  - sobre cualquier base
  lexicon: BDAG
  rationale: La expresión alude a una pregunta amplia sobre motivos válidos para el divorcio. «Por cualquier causa» conserva la amplitud legal de πᾶσαν y sigue de cerca la formulación contextual del POB en inglés.
theological_decisions:
- issue: Conservar el marco de disputa legal sin resolver la cuestión moral o doctrinal del divorcio en la traducción
  english_pob_reading: Is it lawful for a man to divorce his wife for any cause?
  chosen_spanish_reading: ¿Le es lícito a un hombre divorciarse de su esposa por cualquier causa?
  alternative_spanish_readings:
  - ¿Se le permite a un hombre divorciarse de su esposa por cualquier causa?
  - ¿Es lícito que un hombre repudie a su esposa por cualquier causa?
  rationale: El versículo presenta una pregunta de controversia dirigida a Jesús; la traducción debe mantener la amplitud del debate y no anticipar una respuesta doctrinal. «Lícito» y «por cualquier causa» preservan el tono jurídico y la tensión interpretativa del pasaje.
  doctrine_reference: Preservar la tensión textual; no imponer una postura confesional sobre el divorcio.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior haciendo que el marcador [a] aparezca exactamente en el texto español junto a la frase anclada. La redacción mantiene la equivalencia óptima del POB y evita dependencias de traducción mecánica del inglés.
  spanish_consistency_notes:
  - Se usó «fariseos» sin mayúscula interna por norma tipográfica española.
  - «Esposa» se mantiene de forma consistente para γυνή en este contexto.
  - La construcción «le es lícito» conserva el registro jurídico del original.
  - El marcador [a] está anclado en la frase correspondiente y no se añaden notas sin ancla.
