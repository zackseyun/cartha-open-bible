review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: los fariseos se acercan a Jesús, lo ponen a prueba y plantean una pregunta de licitud legal sobre divorciar a la esposa «por cualquier causa». Las decisiones principales («se le acercaron», «Le es lícito», «su esposa», «por cualquier causa») están alineadas con el texto fuente y con la auditoría inglesa.'
  spanish_quality_summary: El español es claro y natural, pero hay dos ajustes recomendables. Primero, «Entonces» añade un matiz temporal que no está en Καὶ; una simple «Y» o nada sería más ceñido. Segundo, la nota [a] no preserva bien la alternativa documentada en inglés para «for any cause/on any ground/for every cause», porque en español está anclada a «poniéndolo a prueba» y además repite casi exactamente la lectura principal, por lo que resulta poco útil. Conviene mover la nota a «por cualquier causa».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Divorciarse» para ἀπολῦσαι y «esposa» para γυναῖκα son apropiados. «Le es lícito» preserva bien ἔξεστιν en contexto legal. No se detectan problemas con términos teológicos prioritarios del glosario.
  issues:
  - severity: medium
    issue: «Entonces» sobretraduce Καὶ
    rationale: El griego solo tiene la conjunción coordinante Καὶ. «Entonces» introduce una relación temporal/discursiva más marcada que la fuente no exige. «Y» o inicio directo serían más fieles.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: 'La auditoría inglesa coloca la nota en «came up to him»? No: la nota inglesa explica «for any cause / on any ground / for every cause». En español, la nota actual aparece en «poniéndolo[a] a prueba», lo que no corresponde a la evidencia ni a la razón lexical documentada.'
  - severity: low
    issue: El contenido de la nota actual no aporta una alternativa real útil
    rationale: La nota dice «O “poniéndolo a prueba”...» y luego explica casi la misma frase. No preserva las alternativas significativas del inglés ni resuelve una ambigüedad nueva en español.
  revised_spanish_text: 'Y se le acercaron unos fariseos, poniéndolo a prueba y diciendo: «¿Le es lícito a un hombre divorciarse de su esposa por cualquier causa[a]?».'
  revised_footnotes:
  - marker: a
    text: O «por cualquier motivo», o «sobre cualquier base». La frase griega refleja una pregunta legal amplia sobre los motivos permisibles para el divorcio.
    reason: lexical_alternative
  revision_rationale: Se quitó «Entonces» para ceñirse mejor a Καὶ. Se trasladó la nota al sintagma «por cualquier causa», porque ahí está la alternativa léxica documentada en la auditoría inglesa (κατὰ πᾶσαν αἰτίαν), y se reformuló la nota para preservar las opciones relevantes en español. El resto del texto puede mantenerse tal como está.
