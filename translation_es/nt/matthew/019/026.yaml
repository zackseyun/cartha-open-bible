translation:
  language: es
  text: 'Pero Jesús los miró y les dijo: «Con los seres humanos[a] esto es imposible, pero con Dios todo es posible».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Con los hombres esto es imposible».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψας
  english_pob_choice: looked at
  chosen_spanish: mirándolos
  alternatives_spanish:
  - los miró
  - fijó la mirada en ellos
  lexicon: BDAG
  rationale: El participio aoristo indica dirigir la vista hacia alguien; «mirándolos» mantiene la acción narrativa inmediata sin sobrerrepresentar la intensidad de «fijó la mirada en ellos».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» reproduce el matiz leve de contraste y enlaza bien con la respuesta de Jesús en el contexto.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - dijo
  lexicon: BDAG
  rationale: El dativo αὐτοῖς se expresa de forma natural en español con «les dijo», conservando la referencia explícita a los oyentes.
- source_word: παρὰ ἀνθρώποις
  english_pob_choice: With men
  chosen_spanish: para los seres humanos
  alternatives_spanish:
  - con los hombres
  - desde el punto de vista humano
  lexicon: BDAG
  rationale: Aunque la construcción griega expresa esfera o perspectiva, en español «para los seres humanos» comunica con claridad la idea de límite humano sin sonar forzado. Se evita «hombres» para no perder inteligibilidad contemporánea; la nota conserva la alternativa más literal.
- source_word: ἀδύνατόν ἐστιν
  english_pob_choice: is impossible
  chosen_spanish: esto es imposible
  alternatives_spanish:
  - no es posible
  - es imposible
  lexicon: BDAG
  rationale: «Esto es imposible» es idiomático y mantiene el valor predicativo del adjetivo con la referencia al asunto discutido.
- source_word: παρὰ δὲ θεῷ
  english_pob_choice: but with God
  chosen_spanish: pero para Dios
  alternatives_spanish:
  - pero con Dios
  - pero desde el punto de vista de Dios
  lexicon: BDAG
  rationale: La repetición de παρά se ajusta en español con «para», que transmite bien la idea de ámbito o referencia; «con Dios» queda como alternativa literal.
- source_word: πάντα δυνατά
  english_pob_choice: all things are possible
  chosen_spanish: todo es posible
  alternatives_spanish:
  - todas las cosas son posibles
  - todo es capaz
  lexicon: BDAG
  rationale: El plural πάντα en español puede expresarse de forma natural como «todo», manteniendo la fuerza proverbial y evitando una formulación pesada.
theological_decisions:
- issue: Renderizar ἀνθρώποις en una afirmación general sobre la capacidad humana
  english_pob_reading: men
  chosen_spanish_reading: seres humanos
  alternative_spanish_readings:
  - hombres
  - personas
  rationale: El griego es masculino plural pero genérico. En español, «seres humanos» preserva el alcance universal de la afirmación sin introducir ambigüedad de género en el cuerpo del texto; la nota registra la opción más cercana al inglés POB.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se corrigió la validación anterior agregando el marcador [a] en el texto principal y alineándolo con la nota correspondiente. No se reportan revisiones textuales adicionales en el historial más reciente.
  spanish_consistency_notes:
  - Se mantuvo el contraste retórico entre la imposibilidad humana y la posibilidad divina.
  - Se evitó «SEÑOR» para θεός, siguiendo el criterio del proyecto de usar «Dios».
  - La frase final conserva la universalidad de πάντα con una construcción natural en español.
