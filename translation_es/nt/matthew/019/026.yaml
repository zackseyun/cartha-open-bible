- from: 'Pero Jesús, mirándolos, les dijo: «Para los seres humanos[a] esto es imposible, pero para Dios todo es posible».'
  to: 'Pero Jesús los miró y les dijo: «Con los seres humanos[a] esto es imposible, pero con Dios todo es posible».'
  rationale: Se ajusta παρά + dativo a «con» para preservar mejor el sentido de esfera/standpoint y el paralelismo del original, se mejora la naturalidad narrativa de ἐμβλέψας con «los miró», y se mantiene «seres humanos» como lectura principal con una nota que conserva la alternativa más literal.
