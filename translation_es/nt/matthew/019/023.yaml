translation:
  language: es
  text: 'Entonces Jesús dijo a sus discípulos: «En verdad[a] les digo que un hombre rico[b] entrará en el reino de los cielos con dificultad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Amén, les digo».
    reason: lexical_alternative
  - marker: b
    text: O, «un rico entrará en el reino de los cielos con dificultad»; también, «un hombre adinerado entrará difícilmente en el reino de los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Luego
  lexicon: BDAG
  rationale: δὲ marca transición narrativa; «Entonces» conserva ese avance del discurso en español natural sin perder la función conectiva.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: Transliteración estándar del nombre propio
  rationale: El nombre propio debe mantenerse como «Jesús», conforme al uso bíblico normal y al texto fuente.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - habló
  lexicon: BDAG
  rationale: El verbo introductorio de habla se vierte de manera simple y natural como «dijo».
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  - a los discípulos
  lexicon: BDAG
  rationale: μαθηταῖς se traduce naturalmente por «discípulos»; el posesivo αὐτοῦ se conserva con «sus» para no omitir un elemento explícito del griego.
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: Amén les digo
  alternatives_spanish:
  - En verdad les digo
  - Verdaderamente les digo
  - Amén, les digo
  lexicon: BDAG
  rationale: Se conserva la fórmula solemne con «Amén», porque el griego abre con Ἀμὴν; se mantiene el tono directo de la declaración de Jesús. En español, la construcción breve «les digo» comunica bien la fórmula sin añadir una paráfrasis innecesaria.
- source_word: πλούσιος
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - un hombre rico
  - una persona rica
  - un adinerado
  lexicon: BDAG
  rationale: El adjetivo sustantivado masculino singular se vierte como «un rico», que conserva la fuerza lexical y su referencia personal sin neutralizarla indebidamente.
- source_word: δυσκόλως
  english_pob_choice: with difficulty
  chosen_spanish: con dificultad
  alternatives_spanish:
  - difícilmente
  - apenas
  lexicon: BDAG
  rationale: El adverbio expresa modo y se traduce con la locución española más directa y sobria, sin intensificarla más allá de lo que el griego exige.
- source_word: εἰσελεύσεται
  english_pob_choice: will enter
  chosen_spanish: entrará
  alternatives_spanish:
  - va a entrar
  - ingresará
  lexicon: BDAG
  rationale: El futuro medio de εἰσέρχομαι se vierte de forma natural como «entrará».
- source_word: βασιλείαν τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reino celestial
  lexicon: BDAG
  rationale: Se mantiene la expresión mateana tradicional «reino de los cielos», que refleja καλά el giro del original y evita una paráfrasis teológica.
theological_decisions:
- issue: Fórmula solemne Ἀμὴν λέγω ὑμῖν
  english_pob_reading: Truly I say to you
  chosen_spanish_reading: Amén les digo
  alternative_spanish_readings:
  - En verdad les digo
  - Amén, les digo
  rationale: La POB inglesa permite la alternativa «Amen, I say to you». Dado que el griego conserva Ἀμὴν explícitamente, el español mantiene «Amén» para no borrar esa huella semítica. La lectura sigue siendo comprensible y solemne en español bíblico.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: πλούσιος como sustantivo masculino singular
  english_pob_reading: a rich man
  chosen_spanish_reading: un rico
  alternative_spanish_readings:
  - un hombre rico
  - una persona rica
  rationale: El griego es masculino singular sustantivado. Para respetar la forma y la fuerza lexical, se conserva una referencia masculina explícita en español sin convertirla en genérico neutral.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la auditoría inglesa y no presenta revisiones aplicadas en el paquete fuente. La redacción española conserva el orden básico del enunciado, la fórmula solemne de introducción y la imagen de entrada difícil en el reino, sin añadir matices inexistentes en el griego.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, «discípulos» para μαθηταῖς y «reino de los cielos» para βασιλείαν τῶν οὐρανῶν, en coherencia con el estilo mateano.
  - Se evita «SEÑOR» porque no aparece κύριος en este versículo.
  - «Amén» se conserva en la fórmula porque el original lo presenta de forma explícita y la auditoría inglesa reconoció esa alternativa.
  - «Un rico» mantiene el valor sustantivado de πλούσιος sin introducir una expansión interpretativa innecesaria.
