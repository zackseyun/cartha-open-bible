review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la progresión narrativa, el sujeto, el verbo principal, la referencia a los discípulos, la dificultad de entrar y la expresión mateana «reino de los cielos». Sin embargo, la fórmula Ἀμὴν λέγω ὑμῖν está mejor representada en español con «En verdad les digo» en el texto principal, no «Amén les digo», porque esta última suena menos natural en español actual y además la nota está mal anclada: el marcador [a] aparece sobre «discípulos» pero la nota trata de la fórmula «Amén». También conviene reflejar mejor la decisión inglesa sobre el masculino representativo de πλούσιος con «un hombre rico» en el texto principal.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos problemas de legibilidad/editoriales: 1) la colocación de notas no corresponde a las frases anotadas; 2) «Amén les digo» resulta poco idiomático en español neutral eclesial moderno, mientras que «En verdad les digo» comunica de forma natural la solemnidad. «Un rico» es posible, pero «un hombre rico» es más claro y encaja mejor con la decisión documentada de mantener el masculino singular.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» y «reino de los cielos» están bien. No aplica Yahvé/Mesías/etc. La principal cuestión léxica es mantener el valor solemne de Ἀμὴν y el masculino de πλούσιος de forma natural en español.
  issues:
  - severity: high
    issue: Los marcadores de nota al pie están anclados a lugares equivocados.
    rationale: La nota [a] se coloca en «discípulos» pero comenta «Amén, les digo»; la nota [b] se coloca tras «les digo» pero comenta «un hombre rico…». Esto incumple la disciplina requerida de anclar cada nota exactamente en la palabra o frase relevante.
  - severity: medium
    issue: «Amén les digo» es poco natural como texto principal en español neutral contemporáneo.
    rationale: Aunque Ἀμὴν está explícito en griego y puede conservarse en una nota, la fórmula principal más idiomática y ampliamente comprensible es «En verdad les digo», que además corresponde al inglés POB principal «Truly I say to you».
  - severity: medium
    issue: «un rico» es menos claro que «un hombre rico» para reflejar πλούσιος masculino singular.
    rationale: El español «un rico» puede entenderse, pero «un hombre rico» preserva con mayor transparencia la referencia masculina representativa documentada en la auditoría inglesa y evita un matiz más coloquial o clasista.
