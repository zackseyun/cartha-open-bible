translation:
  language: es
  text: Así que ya no son dos[a], sino una sola carne. Por tanto, lo que Dios ha unido, el hombre no lo separe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«El hombre» aquí tiene sentido genérico: es decir, ningún ser humano debe separar lo que Dios ha unido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Introduce la consecuencia de la afirmación anterior. «Así que» conserva la fuerza inferencial con un tono natural en español.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no son ya
  - no siguen siendo
  lexicon: BDAG
  rationale: Expresa cambio de estado de manera idiomática y clara, equivalente a la negación temporal de un estado previo.
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambos
  lexicon: BDAG
  rationale: Se conserva el numeral para mantener el contraste directo con «una sola carne».
- source_word: σὰρξ μία
  english_pob_choice: one flesh
  chosen_spanish: una sola carne
  alternatives_spanish:
  - una carne
  - un solo cuerpo
  lexicon: BDAG
  rationale: «Carne» preserva el eco bíblico de Génesis y el lenguaje matrimonial recibido; «una sola carne» comunica el modismo con naturalidad en español.
- source_word: ὃ οὖν
  english_pob_choice: Therefore, what
  chosen_spanish: Por tanto, lo que
  alternatives_spanish:
  - Así que, lo que
  - De modo que, lo que
  lexicon: BDAG
  rationale: ἣ/ὃ introduce la realidad resultante de la unión; «lo que» mantiene el referente neutro, y «Por tanto» expresa la inferencia.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Traducción directa y natural del sujeto divino sin requerir artículo en español.
- source_word: συνέζευξεν
  english_pob_choice: has joined together
  chosen_spanish: ha unido
  alternatives_spanish:
  - ha juntado
  - ha enlazado
  lexicon: BDAG
  rationale: «Unir» comunica bien la acción matrimonial consumada; se evita forzar una imagen menos natural en español, sin perder la idea de vínculo establecido.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - nadie
  - ninguna persona
  - el ser humano
  lexicon: BDAG
  rationale: Se conserva el singular genérico masculino del griego, con valor representativo e inclusivo, tal como la nota inglesa aclara para «man».
- source_word: μὴ χωριζέτω
  english_pob_choice: must not separate
  chosen_spanish: no lo separe
  alternatives_spanish:
  - no debe separar
  - que no separe
  lexicon: BDAG
  rationale: El imperativo prohibitivo se expresa con una forma natural y sobria en español; «lo» retoma la unión matrimonial entendida en el contexto.
theological_decisions:
- issue: Valor genérico de ἄνθρωπος en la prohibición matrimonial
  english_pob_reading: Rendered as 'man' with generic representative sense
  chosen_spanish_reading: «el hombre» con sentido genérico representativo
  alternative_spanish_readings:
  - nadie
  - ninguna persona
  rationale: El griego usa ἄνθρωπος en singular masculino con fuerza genérica. Se conserva esa forma para no neutralizar indebidamente el paralelismo del texto y para mantener la referencia representativa de cualquier ser humano.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Lenguaje de 'una sola carne' como eco de Génesis
  english_pob_reading: Preserved as 'one flesh'
  chosen_spanish_reading: «una sola carne»
  alternative_spanish_readings:
  - una carne
  - un solo cuerpo
  rationale: La frase es una fórmula bíblica estable y teológicamente cargada. Mantener «carne» preserva la conexión intertextual con Génesis sin introducir una reinterpretación doctrinal.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. No se añadieron otros marcadores para evitar notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «carne» para σάρξ en su sentido matrimonial idiomático.
  - Se conserva el sujeto genérico singular «el hombre» para ἄνθρωπος, con aclaración en nota.
  - La construcción «no lo separe» refleja el valor prohibitivo del imperativo sin volverlo más interpretativo de lo necesario.
