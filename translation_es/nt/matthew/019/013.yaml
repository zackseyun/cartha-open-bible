translation:
  language: es
  text: Entonces le llevaron niños para que les impusiera las manos y orara; pero los discípulos los[a] reprendieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El «los» final puede referirse tanto a los niños como a quienes los llevaron.
    reason: alternative_reading
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal de secuencia narrativa. «Entonces» es natural en español y conserva el avance del relato sin añadir matiz explicativo extra.
- source_word: προσηνέχθησαν
  english_pob_choice: were brought
  chosen_spanish: le llevaron
  alternatives_spanish:
  - fueron llevados
  - fueron traídos
  lexicon: BDAG
  rationale: El pasivo griego expresa que alguien los condujo hasta Jesús. En español, «le llevaron» comunica la acción de manera viva y clara sin forzar una pasiva menos natural en este contexto narrativo.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indica el destinatario del movimiento. En español, el clítico dativo «le» se integra naturalmente con «llevaron» y mantiene la referencia a Jesús.
- source_word: παιδία
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - niños pequeños
  - pequeños
  lexicon: BDAG
  rationale: El plural de παιδίον puede ser «niños» en sentido general. Aquí se evita añadir un diminutivo que el sustantivo no obliga por sí mismo, aunque el contexto sugiere juventud.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Conserva el valor de propósito de manera idiomática en español.
- source_word: τὰς χεῖρας ἐπιθῇ
  english_pob_choice: he might lay his hands on them
  chosen_spanish: les pusiera las manos encima
  alternatives_spanish:
  - les impusiera las manos
  - les pusiera las manos
  lexicon: BDAG
  rationale: El giro griego es el gesto de imponer/manipular las manos sobre alguien. «Les pusiera las manos encima» reproduce el gesto de forma comprensible y cercana; se evita un formulismo eclesiástico cuando el sentido literal ya es claro. La alternativa «les impusiera las manos» también es válida, pero la forma elegida conserva mejor la imagen concreta del texto.
- source_word: προσεύξηται
  english_pob_choice: pray
  chosen_spanish: orara
  alternatives_spanish:
  - rezara
  - hiciera oración
  lexicon: BDAG
  rationale: El verbo griego significa «orar». «Orara» es el equivalente directo y más amplio; «rezara» podría sonar más restringido confesionalmente y no es necesario aquí.
- source_word: οἱ δὲ μαθηταὶ
  english_pob_choice: but the disciples
  chosen_spanish: pero los discípulos
  alternatives_spanish:
  - y los discípulos
  lexicon: BDAG
  rationale: δέ introduce contraste suave; «pero» lo expresa con claridad en español.
- source_word: ἐπετίμησαν
  english_pob_choice: rebuked
  chosen_spanish: los reprendieron
  alternatives_spanish:
  - los censuraron
  - los regañaron
  lexicon: BDAG
  rationale: «Reprender» preserva el tono fuerte y relativamente formal del verbo ἐπιτιμάω en los Evangelios mejor que opciones más coloquiales.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  - a ellos
  lexicon: BDAG
  rationale: 'El pronombre final es ambiguo en griego: puede referirse a los niños o a los que los traían. El español mantiene esa ambigüedad al no precisar explícitamente el referente. Se eligió «los» porque se ajusta al complemento directo esperado con «reprender» en español, sin resolver el antecedente.'
theological_decisions:
- issue: Referente final de αὐτοῖς
  english_pob_reading: them
  chosen_spanish_reading: los
  alternative_spanish_readings:
  - les
  - a los niños
  - a los que los llevaban
  rationale: El griego permite dos referentes posibles. La traducción no decide entre ellos; conserva la ambigüedad del texto al usar un pronombre breve y contextual. Así se evita cerrar una tensión real del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada no introduce cambios textuales ni notas adicionales; el punto relevante sigue siendo la ambigüedad del pronombre final. La redacción española conserva ese margen interpretativo sin sobreexplicarlo en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como referente implícito del dativo αὐτῷ, coherente con el contexto inmediato del versículo.
  - Se prefirió un español natural y eclesialmente legible sin recurrir a un calco rígido de la sintaxis griega.
  - No se añadió nota al texto porque la ambigüedad final puede mantenerse en la traducción principal sin perder inteligibilidad.
