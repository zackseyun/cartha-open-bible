translation:
  language: es
  text: Y le siguieron grandes multitudes, y los sanó allí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: le siguieron
  alternatives_spanish:
  - lo siguieron
  - iban tras él
  lexicon: ἀκολουθέω
  rationale: El verbo griego expresa seguir a alguien en sentido narrativo literal. En español, «le siguieron» conserva la relación de seguimiento sin añadir todavía un matiz técnico de discipulado. «Lo siguieron» también es posible, pero el dativo de referencia a una persona permite «le» con buena naturalidad en español.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: αὐτός
  rationale: 'El pronombre dativo se vierte de forma idiomática con complemento indirecto en español: «le». Mantiene la referencia personal a Jesús sin sobrecargar la frase.'
- source_word: ὄχλοι πολλοί
  english_pob_choice: large crowds
  chosen_spanish: grandes multitudes
  alternatives_spanish:
  - multitudes numerosas
  - muchas multitudes
  lexicon: ὄχλος + πολύς
  rationale: La combinación literalmente implica una pluralidad muy numerosa de grupos o masas de gente. «Grandes multitudes» comunica bien el tamaño y preserva el tono narrativo natural en español. «Muchas multitudes» sería más literal pero suena poco idiomático.
- source_word: ἐθεράπευσεν
  english_pob_choice: healed
  chosen_spanish: los sanó
  alternatives_spanish:
  - los curó
  lexicon: θεραπεύω
  rationale: En contexto de sanidad narrativa, «sanó» es la equivalencia más natural y usual en español bíblico contemporáneo. «Curó» es posible, pero suele sonar más clínico y menos bíblico-narrativo.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  lexicon: αὐτός
  rationale: El acusativo plural se refiere a las multitudes como objeto directo de «sanó». En español se usa «los» por concordancia con el objeto directo plural masculino genérico.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: ἐκεῖ
  rationale: El adverbio de lugar se traduce con «allí» para mantener la simple referencia locativa del griego. «Ahí» también es posible, pero «allí» suena más estable y literario en este contexto.
- source_word: καὶ ... καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Entonces ... y
  - Y ... entonces
  lexicon: καί
  rationale: La parataxis griega se conserva con dos coordinaciones simples en español. Esto reproduce el encadenamiento narrativo sin introducir relaciones temporales o causales no explicitadas por el texto.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran una correspondencia directa y sin variantes textuales ni revisiones sustantivas; por eso no se introducen notas de aparato ni alternativas doctrinales.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y directo del POB.
  - No se introduce «discípulos» ni lenguaje interpretativo adicional, porque ἀκολουθέω aquí describe seguimiento literal en la escena.
  - Se usa «sanó» como verbo bíblico natural para θεραπεύω en contexto de curación de multitudes.
