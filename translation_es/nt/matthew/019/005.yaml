translation:
  language: es
  text: 'y dijo[a]: «Por esta razón un hombre dejará a su padre y a su madre y se unirá a su esposa, y los dos serán una sola carne».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se unirá a» o «se aferrará a su esposa». El verbo griego denota una adhesión estrecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕνεκα τούτου
  english_pob_choice: For this reason
  chosen_spanish: Por este motivo
  alternatives_spanish:
  - Por esta razón
  - Por esto
  lexicon: BDAG
  rationale: La expresión causal introduce la cita como fundamento; «Por este motivo» conserva la fuerza inferencial en español natural y evita una literalidad pesada.
- source_word: καταλείψει
  english_pob_choice: will leave
  chosen_spanish: dejará
  alternatives_spanish:
  - abandonará
  - saldrá de
  lexicon: BDAG
  rationale: El futuro simple expresa bien la cita scriptural y «dejará» es el equivalente más natural para el acto de dejar a los padres en este contexto matrimonial.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el hombre
  lexicon: BDAG
  rationale: El contexto cita una formulación matrimonial con referente masculino específico; «un hombre» mantiene esa referencia sexuada sin neutralizarla.
- source_word: κολληθήσεται
  english_pob_choice: be joined to
  chosen_spanish: se unirá a
  alternatives_spanish:
  - se pegará a
  - se adherirá a
  - se aferrará a
  lexicon: BDAG
  rationale: El verbo griego denota una unión estrecha. «Se unirá a» comunica la relación marital de forma clara y digna en español, mientras conserva el sentido de adhesión cercana.
- source_word: γυναικὶ αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: BDAG
  rationale: En este contexto matrimonial, γυνή significa «esposa» más que «mujer». «Su esposa» suena natural en español y precisa la relación conyugal.
- source_word: οἱ δύο
  english_pob_choice: the two
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  lexicon: BDAG
  rationale: Se conserva el cuantificador explícito del griego; «los dos» reproduce el énfasis del original mejor que una simplificación a «ambos».
- source_word: εἰς σάρκα μίαν
  english_pob_choice: one flesh
  chosen_spanish: una sola carne
  alternatives_spanish:
  - una carne
  - en una sola carne
  lexicon: BDAG
  rationale: La expresión es un modismo bíblico matrimonial. «Una sola carne» conserva el valor idiomático y la unidad resultante sin forzar una paráfrasis interpretativa.
theological_decisions:
- issue: Lenguaje de género en la cita matrimonial
  english_pob_reading: a man ... his wife
  chosen_spanish_reading: un hombre ... su esposa
  alternative_spanish_readings:
  - una persona ... su cónyuge
  rationale: La cita reproduce la formulación de Génesis en una relación hombre-mujer. Se mantiene el masculino singular porque el texto no habla de humanidad en abstracto, sino de un vínculo matrimonial concreto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Resultado de la unión matrimonial
  english_pob_reading: the two will become one flesh
  chosen_spanish_reading: los dos serán una sola carne
  alternative_spanish_readings:
  - los dos llegarán a ser una sola carne
  - los dos se harán una sola carne
  rationale: «Serán» preserva el resultado afirmado por el texto griego y evita introducir matices innecesarios. «Una sola carne» mantiene la fuerza teológica e idiomática de la cita.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el estado más reciente del archivo fuente inglés; no se registraron revisiones aplicadas y el control cruzado indicó alta concordancia con observaciones menores.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término predeterminado del proyecto cuando corresponda; aquí no aparece ningún nombre divino directo.
  - Se prefirió «esposa» por el contexto matrimonial, no «mujer», para evitar ambigüedad en español.
  - «Una sola carne» mantiene el modismo bíblico y no se reinterpreta como «naturaleza humana» u otra glosa.
  - La nota a pie de página conserva la alternativa verbal del griego para reflejar la tensión lexical sin sobreparafrasear.
