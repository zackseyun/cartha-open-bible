translation:
  language: es
  text: 'Pero él les dijo: «No todos pueden aceptar esta palabra[a], sino solo aquellos a quienes se les ha dado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este dicho» o «esta enseñanza».
    reason: lexical_alternative
  - marker: b
    text: El pasivo «se les ha dado» probablemente implica a Dios como dador, pero el griego no lo dice explícitamente.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les respondió
  - les habló
  lexicon: BDAG
  rationale: El aoristo narrativo de λέγω se expresa de manera natural en español con «dijo». Conserva la introducción simple del discurso sin añadir matices no presentes en el griego.
- source_word: Οὐ πάντες
  english_pob_choice: Not everyone
  chosen_spanish: No todos
  alternatives_spanish:
  - No todo el mundo
  - No todas las personas
  lexicon: BDAG
  rationale: «No todos» comunica de forma breve y natural la negación universal sin perder el alcance general del enunciado.
- source_word: χωροῦσι
  english_pob_choice: can accept
  chosen_spanish: pueden aceptar
  alternatives_spanish:
  - pueden recibir
  - caben para aceptar
  - pueden acoger
  lexicon: BDAG
  rationale: χωρέω aquí describe la capacidad de recibir o hacer espacio para una enseñanza. «Pueden aceptar» transmite bien esa capacidad en español actual sin volverlo rígidamente literal.
- source_word: τὸν λόγον τοῦτον
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este dicho
  - este dicho/afirmación
  - esta enseñanza
  lexicon: BDAG
  rationale: Aunque λόγος puede ser «palabra», «dicho» o «enseñanza», la frase inmediata funciona en español de manera clara con «esta palabra». Mantiene el vínculo léxico con λόγος y permite la ambigüedad entre dicho y enseñanza.
- source_word: ἀλλ’ οἷς
  english_pob_choice: but only those to whom
  chosen_spanish: sino solo aquellos a quienes
  alternatives_spanish:
  - sino a quienes
  - pero solo a quienes
  lexicon: BDAG
  rationale: «Sino solo aquellos a quienes» conserva el contraste restrictivo de ἀλλά con el relativo, haciendo explícita en español la limitación implícita del griego.
- source_word: δέδοται
  english_pob_choice: it has been given
  chosen_spanish: les ha sido dada
  alternatives_spanish:
  - les ha sido concedida
  - les fue dada
  - les ha sido otorgada
  lexicon: BDAG
  rationale: El perfecto pasivo de δίδωμι se refleja con «les ha sido dada», preservando el pasivo y el resultado vigente. El femenino concuerda con «palabra» y mantiene la referencia al objeto dado sin especificar al dador.
theological_decisions:
- issue: Dador implícito en el pasivo de δέδοται
  english_pob_reading: Retain the divine passive implicitly without specifying God in the main text.
  chosen_spanish_reading: Mantener el pasivo implícito sin nombrar a Dios en el texto principal.
  alternative_spanish_readings:
  - sino solo aquellos a quienes Dios se la ha dado
  - sino solo aquellos a quienes se les ha concedido
  rationale: El griego no menciona explícitamente al sujeto que da. Aunque el contexto puede sugerir un pasivo divino, la traducción principal preserva esa tensión teológica y evita resolverla adelantando un sujeto inexistente en el original.
  doctrine_reference: Conservar la tensión teológica sin explicitar el sujeto.
translation_notes:
  revision_awareness: 'Revisado contra el griego SBLGNT y el audit trail inglés: se mantuvo la estructura restrictiva, el valor de χωροῦσι como capacidad de aceptar, la ambigüedad de λόγος y el pasivo sin sujeto explícito.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o perífrasis eclesiásticas no requeridas por el texto.
  - Se conservó la ambigüedad entre «palabra», «dicho» y «enseñanza» mediante nota.
  - Se usó «les ha sido dada» para reflejar el pasivo perfecto y concordar con «palabra».
  - La puntuación y las comillas siguen el uso tipográfico estándar en español.
