  text: εἰσὶν γὰρ εὐνοῦχοι οἵτινες ἐκ κοιλίας μητρὸς ἐγεννήθησαν οὕτως, καὶ εἰσὶν εὐνοῦχοι οἵτινες εὐνουχίσθησαν ὑπὸ τῶν ἀνθρώπων, καὶ εἰσὶν εὐνοῦχοι οἵτινες εὐνούχισαν ἑαυτοὺς διὰ τὴν βασιλείαν τῶν οὐρανῶν. ὁ δυνάμενος χωρεῖν χωρείτω.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/019/012.yaml
  text: For there are eunuchs who were born that way from their mother’s womb[a], and there are eunuchs who were made eunuchs by men, and there are eunuchs who made themselves eunuchs for the sake of the kingdom of heaven[b]. The one able to accept this should accept it.
  footnotes:
  - marker: a
    text: Or 'castrated themselves'; many interpreters understand this figuratively as choosing celibacy for the sake of God’s kingdom.
    reason: alternative_reading
  - marker: b
    text: Or 'The one able to receive this, let him receive it.'
    reason: lexical_alternative
