translation:
  language: es
  text: Porque hay eunucos que nacieron así desde el vientre de su madre, y hay eunucos que fueron hechos eunucos por los hombres, y hay eunucos que se hicieron eunucos[a] por causa del reino de los cielos. El que pueda aceptar esto, que lo acepte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se castraron'; muchos intérpretes entienden esto en sentido figurado como la elección del celibato por causa del reino de Dios.
    reason: alternative_reading
  - marker: b
    text: O 'El que pueda recibir esto, que lo reciba'.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐνοῦχοι
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - celibatos
  lexicon: BDAG
  rationale: Mantiene la repetición léxica del término griego en las tres cláusulas. En español, 'eunucos' conserva el sentido ordinario del sustantivo sin introducir una interpretación como 'celibatos' en el texto principal.
- source_word: ἐκ κοιλίας μητρὸς
  english_pob_choice: from their mother’s womb
  chosen_spanish: desde el vientre de su madre
  alternatives_spanish:
  - desde el nacimiento
  lexicon: BDAG
  rationale: '''Desde el vientre de su madre'' reproduce el giro de origen del griego y conserva su imagen concreta. ''Desde el nacimiento'' es posible, pero reduce la viveza idiomática del original.'
- source_word: ἐγεννήθησαν οὕτως
  english_pob_choice: were born that way
  chosen_spanish: nacieron así
  alternatives_spanish:
  - fueron nacidos así
  lexicon: BDAG
  rationale: '''Nacieron así'' comunica de forma natural el resultado descrito por οὕτως, sin perder la relación con la condición mencionada antes.'
- source_word: εὐνουχίσθησαν ὑπὸ τῶν ἀνθρώπων
  english_pob_choice: were made eunuchs by men
  chosen_spanish: fueron hechos eunucos por los hombres
  alternatives_spanish:
  - fueron castrados por los hombres
  lexicon: BDAG
  rationale: Conserva la correspondencia entre εὐνοῦχοι y εὐνουχίσθησαν, y deja espacio para la amplitud semántica que el POB inglés preserva. 'Fueron castrados' es más explícito anatómicamente, pero resuelve más de lo que el texto griego dice de manera directa.
- source_word: εὐνούχισαν ἑαυτοὺς
  english_pob_choice: made themselves eunuchs
  chosen_spanish: se hicieron eunucos
  alternatives_spanish:
  - se castraron
  - renunciaron al matrimonio
  lexicon: BDAG
  rationale: La forma reflexiva conserva la dureza y la tensión del dicho sin decidir en la traducción si la expresión es literal, hiperbólica o metafórica. 'Se castraron' y 'renunciaron al matrimonio' son lecturas interpretativas que se reservan para nota.
- source_word: διὰ τὴν βασιλείαν τῶν οὐρανῶν
  english_pob_choice: for the sake of the kingdom of heaven
  chosen_spanish: por causa del reino de los cielos
  alternatives_spanish:
  - por el reino de los cielos
  - a causa del reino de los cielos
  lexicon: BDAG
  rationale: '''Por causa de'' expresa motivo o propósito de forma clara y digna en español, preservando el valor teológico de la renuncia en vista del reino.'
- source_word: ὁ δυνάμενος χωρεῖν χωρείτω
  english_pob_choice: The one able to accept this should accept it
  chosen_spanish: El que pueda aceptar esto, que lo acepte
  alternatives_spanish:
  - El que pueda recibir esto, que lo reciba
  - El que pueda darle cabida, que le dé cabida
  lexicon: BDAG
  rationale: '''Aceptar'' transmite en español actual el sentido idiomático de χωρέω como acoger o asumir una enseñanza difícil. Se preserva la fuerza exhortativa del imperativo sin caer en un calco arcaizante.'
theological_decisions:
- issue: Cómo reflejar εὐνούχισαν ἑαυτοὺς sin resolver la interpretación del dicho
  english_pob_reading: Retain the literal lexical form 'made themselves eunuchs' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener 'se hicieron eunucos' en el texto principal sin ampliarlo a una explicación interpretativa.
  alternative_spanish_readings:
  - se castraron
  - renunciaron al matrimonio / eligieron celibato
  rationale: El griego presenta una afirmación deliberadamente difícil y el POB inglés conserva la tensión. El español debe hacer lo mismo, sin sustituirla por una paráfrasis que cierre el debate exegético.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo traducir ὁ δυνάμενος χωρεῖν χωρείτω
  english_pob_reading: Use 'accept' rather than 'receive' in the main text.
  chosen_spanish_reading: Usar 'aceptar' en el texto principal, con nota para 'recibir'.
  alternative_spanish_readings:
  - recibir
  - dar cabida
  rationale: '''Aceptar'' es el equivalente más natural en español para la exhortación idiomática del griego. La nota preserva la alternativa más formal ''recibir'' y evita perder la conexión semántica de χωρέω.'
  doctrine_reference: 'Translation philosophy §6: Readable modern English, not archaic or academic.'
translation_notes:
  revision_awareness: El último pase marcado como sin cambios y con acuerdo alto no requirió ajustes sustantivos; esta redacción conserva la misma lectura fuente y la misma tensión interpretativa, solo trasladada a un español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene 'eunucos' de forma consistente en las tres cláusulas para respetar la repetición léxica del griego.
  - '''Reino de los cielos'' se conserva como fórmula estable del Evangelio según Mateo.'
  - '''Aceptar'' se usa como equivalente funcional de χωρεῖν en la exhortación final, con la alternativa ''recibir'' preservada en nota.'
  - No se introduce 'Cristo' ni 'Mesías' en este versículo; no hay base textual para ello.
