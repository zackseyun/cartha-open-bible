translation:
  language: es
  text: Y después de poner sus manos sobre ellos[a], se fue de allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo puesto sus manos sobre ellos, se fue de allí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza esta acción con la narración anterior. «Y» conserva la conexión directa sin añadir matiz interpretativo.
- source_word: ἐπιθεὶς
  english_pob_choice: after laying
  chosen_spanish: después de poner
  alternatives_spanish:
  - habiendo puesto
  - tras poner
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa al verbo principal. «Después de poner» expresa con naturalidad en español la secuencia temporal sin alejarse del acto concreto de la imposición de manos.
- source_word: τὰς χεῖρας αὐτοῖς
  english_pob_choice: his hands on them
  chosen_spanish: las manos sobre ellos
  alternatives_spanish:
  - las manos en ellos
  - sus manos sobre ellos
  lexicon: BDAG
  rationale: La expresión idiomática griega indica imponer las manos. En español, «poner las manos sobre ellos» comunica el gesto físico sin introducir todavía lenguaje sacramental o interpretativo. Se omite «sus» porque el sujeto ya está claro en el contexto, como en el audit trail inglés.
- source_word: ἐπορεύθη
  english_pob_choice: he went on
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - siguió su camino
  lexicon: BDAG
  rationale: πορεύομαι aquí describe el movimiento narrativo de Jesús al retirarse del lugar. «Se fue» es natural en español y no sobrecarga el matiz con un registro más elevado como «partió».
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de ahí
  lexicon: BDAG
  rationale: El adverbio de lugar significa «desde allí». «De allí» es claro y idiomático en español.
theological_decisions:
- issue: Imposición de manos como acto físico frente a interpretación de bendición
  english_pob_reading: The main text keeps the concrete laying on of hands and avoids substituting 'blessed them' in the main line.
  chosen_spanish_reading: El texto principal conserva el gesto concreto de poner las manos, sin reemplazarlo por «los bendijo».
  alternative_spanish_readings:
  - Y después de bendecirlos, se fue de allí.
  - Entonces los bendijo y se fue de allí.
  rationale: El griego dice explícitamente que puso las manos sobre ellos; la idea de bendición es inferida por el contexto, pero no está expresada en esta cláusula. La traducción mantiene la tensión textual y evita una paráfrasis no sustentada por el original.
  doctrine_reference: Principio de primacía del texto original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: El estado de revisión más reciente indica que no hubo cambios necesarios y el pasaje mantiene alta concordancia con el cotejo. Esta propuesta conserva ese acuerdo, con una formulación española natural para el gesto de imponer las manos y el movimiento narrativo final.
  spanish_consistency_notes:
  - Se preserva la secuencia temporal del participio aoristo con una construcción española natural.
  - «Poner las manos sobre ellos» mantiene el gesto físico y evita lenguaje sacramental no explícito.
  - «Se fue de allí» reproduce el simple movimiento narrativo de ἐπορεύθη ἐκεῖθεν sin añadir énfasis.
