- from: Y después de ponerles las manos[a], se fue de allí.
  to: Y después de poner sus manos sobre ellos[a], se fue de allí.
  rationale: Se ajusta la expresión idiomática para reflejar con mayor precisión el griego «poner las manos sobre ellos», mantener consistencia con la documentación léxica y evitar la elipsis algo ambigua de «ponerles las manos». También se añade «sus» por naturalidad española al explicitar el gesto de Jesús, en línea con la rationale inglesa que permite suplir el posesivo por contexto.
