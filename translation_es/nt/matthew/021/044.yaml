translation:
  language: es
  text: Y el que cae sobre esta piedra quedará hecho pedazos; pero sobre quien ella caiga, lo aplastará[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más vívidamente: «lo reducirá a polvo» o «lo esparcirá como paja».'
    reason: lexical_alternative
  - marker: b
    text: El versículo falta en algunos manuscritos de Mateo, aunque aparece en paralelo en Lucas 20:18.
    reason: textual_variant
lexical_decisions:
- source_word: ὁ πεσὼν
  english_pob_choice: the one who falls
  chosen_spanish: el que cae
  alternatives_spanish:
  - el que cae sobre
  - quien cae
  lexicon: BDAG
  rationale: El participio articular funciona de modo sustantivo y genérico. En español, «el que cae» conserva bien la referencia singular proverbial y suena natural sin perder la forma de sentencia general.
- source_word: ἐπὶ τὸν λίθον τοῦτον
  english_pob_choice: on this stone
  chosen_spanish: sobre esta piedra
  alternatives_spanish:
  - sobre esta piedra en particular
  - encima de esta piedra
  lexicon: BDAG
  rationale: «Piedra» mantiene la correspondencia directa con λίθος y preserva la imagen concreta. «Sobre» expresa adecuadamente el contacto espacial del verbo en español.
- source_word: συνθλασθήσεται
  english_pob_choice: will be broken to pieces
  chosen_spanish: será quebrantado
  alternatives_spanish:
  - será roto en pedazos
  - será hecho pedazos
  - será destrozado
  lexicon: BDAG
  rationale: El verbo pasivo futuro indica daño severo sufrido por el sujeto. «Será quebrantado» conserva la fuerza de ruptura sin introducir una imagen excesivamente explicativa que desdibuje el paralelismo con λικμήσει.
- source_word: ἐφ’ ὃν δ’ ἂν πέσῃ
  english_pob_choice: but on whomever it falls
  chosen_spanish: pero sobre quien ella caiga
  alternatives_spanish:
  - pero sobre quien caiga
  - pero sobre cualquiera sobre quien caiga
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν se vierte de forma relativamente formal con «sobre quien ella caiga», manteniendo el giro abierto y la inversión del sujeto (la piedra pasa a ser la que cae).
- source_word: λικμήσει
  english_pob_choice: will crush
  chosen_spanish: lo aplastará
  alternatives_spanish:
  - lo reducirá a polvo
  - lo molerá como paja
  - lo triturará
  lexicon: BDAG
  rationale: «Aplastar» transmite una acción fuerte y violenta, adecuada al verbo. Las alternativas más vívidas explican la posibilidad semántica de pulverizar o aventar, pero en el texto principal se prefirió una forma clara y publicable en español.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a esa persona
  lexicon: BDAG
  rationale: El pronombre masculino singular se conserva en la referencia genérica. En español, el clítico de objeto directo «lo» comunica esa referencia sin neutralizarla ni volverla impersonal.
theological_decisions:
- issue: Imagen de la piedra como figura de juicio
  english_pob_reading: Retain the concrete 'stone' language and the two-stage judgment imagery without interpretive expansion.
  chosen_spanish_reading: Mantener el lenguaje concreto de la piedra y la imagen doble de juicio sin ampliar la interpretación dentro del versículo.
  alternative_spanish_readings:
  - Identificar explícitamente la piedra con el Mesías en el texto principal
  - fundir ambas acciones en una sola idea genérica de destrucción
  rationale: El contexto más amplio identifica la piedra, pero este versículo funciona proverbialmente. La traducción conserva la metáfora y su severidad sin añadir explicaciones teológicas que no están expresadas aquí.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia genérica masculina
  english_pob_reading: Use 'him' for αὐτόν.
  chosen_spanish_reading: Conservar la referencia masculina singular con «lo».
  alternative_spanish_readings:
  - la persona
  - les
  rationale: El griego usa un pronombre masculino singular dentro de una construcción genérica. En español, «lo» mantiene la singularidad gramatical y la referencia representativa sin diluir el dato del original.
  doctrine_reference: Translation philosophy §4
- issue: Variación textual del versículo en algunos manuscritos
  english_pob_reading: The verse is absent in some manuscripts of Matthew, though it is paralleled in Luke 20:18.
  chosen_spanish_reading: Indicar en nota que el versículo falta en algunos manuscritos de Mateo, aunque tiene paralelo en Lucas 20:18.
  alternative_spanish_readings:
  - Omitir la nota textual
  - presentar el versículo sin advertencia
  rationale: La decisión sigue el auditoría inglesa y preserva la transparencia textual del proyecto. No afecta el texto principal, pero sí informa al lector sobre la variante manuscrita.
  doctrine_reference: Textual criticism / source transparency
- issue: Fuerza de λικμήσει
  english_pob_reading: will crush
  chosen_spanish_reading: «lo aplastará» con nota sobre la opción más vívida «lo reducirá a polvo» o «lo esparcirá como paja».
  alternative_spanish_readings:
  - lo reducirá a polvo
  - lo esparcirá como paja
  - lo triturará
  rationale: 'El español necesita una equivalencia clara y natural en el texto principal. La nota conserva la tensión lexical que el inglés documenta: el verbo puede ser más gráfico que «aplastar», incluso con matiz de trillar o aventar.'
  doctrine_reference: Lexical semantics / BDAG
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés, que afinó la primera cláusula hacia una equivalencia más cercana de συνθλασθήσεται y volvió más directa la segunda cláusula con ἐφ’ ὃν δ’ ἂν πέσῃ. En español, se mantuvo un equilibrio entre fidelidad semántica y naturalidad: «será quebrantado» conserva la idea de ruptura severa, y «sobre quien ella caiga» refleja la inversión del sujeto sin sobrecargar la sintaxis. También se preservó la transparencia textual mediante nota sobre la variante manuscrita.'
  spanish_consistency_notes:
  - Se usa «piedra» para λίθος de forma consistente con el léxico inmediato.
  - Se conserva la referencia genérica singular con formas masculinas donde el griego las usa.
  - La cláusula pasiva y la cláusula activa mantienen el contraste de agentes del griego.
  - La nota textual se ancla al final del versículo y no interfiere con la lectura continua.
