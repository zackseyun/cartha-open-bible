review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: mantiene la imagen concreta de la piedra, distingue las dos acciones de juicio y conserva el cambio de sujeto en la segunda cláusula. Sin embargo, hay un desajuste importante en la nota [a]: la alternativa ''será reducido a polvo / será esparcido como paja'' corresponde a λικμήσει en la segunda cláusula, no a συνθλασθήσεται en ''será quebrantado''.'
  spanish_quality_summary: El español es claro y digno. 'El que cae sobre esta piedra será quebrantado; pero sobre quien ella caiga, lo aplastará' es entendible, aunque 'quedará hecho pedazos' suena más natural y refleja mejor 'will be broken to pieces'. También conviene evitar anclar una nota léxica en 'piedra' cuando pertenece al verbo final.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Piedra' para λίθος y 'lo' para αὐτόν son adecuados. La principal corrección necesaria es reubicar la nota léxica de λικμήσει al verbo final y, de paso, mejorar συνθλασθήσεται con una formulación española más idiomática y cercana al inglés auditado.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'piedra' pero su contenido explica λικμήσει, no λίθος ni συνθλασθήσεται.
    rationale: La nota inglesa 'Or more vividly, it will grind him to powder / scatter him like chaff' documenta el sentido alternativo del verbo final λικμήσει. En el borrador español quedó aplicada al lugar equivocado, creando una correspondencia falsa entre nota y texto.
  - severity: medium
    issue: '''Será quebrantado'' es comprensible, pero no refleja tan bien la revisión inglesa final ''will be broken to pieces''.'
    rationale: Συνθλασθήσεται expresa ruptura severa. En español contemporáneo bíblico, 'quedará hecho pedazos' o 'será hecho pedazos' comunica mejor esa fuerza que 'será quebrantado', que además puede sonar más abstracto o teológico.
  - severity: low
    issue: '''Sobre quien ella caiga'' es correcto pero algo rígido.'
    rationale: Puede mantenerse; no obstante, 'sobre quien caiga' o 'sobre quien esta caiga' sería más fluido. Como la claridad sigue siendo suficiente, no es un problema mayor.
  revised_spanish_text: Y el que cae sobre esta piedra quedará hecho pedazos; pero sobre quien ella caiga, lo aplastará[a].[b]
