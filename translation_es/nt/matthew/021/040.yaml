    text: Or 'master of the vineyard.' The Greek word is kyrios, often rendered 'Lord,' but here it refers to the vineyard's proprietor within the parable.
    reason: lexical_alternative
  - marker: b
    text: Or 'tenant farmers.' The broader parable context shows these farmers are leasing the vineyard, though the Greek word itself more generally means 'farmers' or 'cultivators.'
