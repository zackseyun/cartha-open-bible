translation:
  language: es
  text: Así pues[a], cuando venga el dueño de la viña, ¿qué hará a aquellos labradores[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por tanto». La partícula οὖν expresa una inferencia o transición desde lo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «agricultores». El término griego γεωργοί designa de forma general a cultivadores o personas que trabajan la tierra; el matiz de arrendatarios depende del contexto más amplio de la parábola.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal con subjuntivo futuro en griego; en español, «cuando» comunica con naturalidad la expectativa del momento previsto en la parábola.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: así pues
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Conserva el valor inferencial/transicional de οὖν sin sonar rígido; «así pues» funciona bien al enlazar con la pregunta que sigue.
- source_word: ἔλθῃ
  english_pob_choice: comes
  chosen_spanish: venga
  alternatives_spanish:
  - llegue
  - venga de nuevo
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo tras ὅταν se vierte naturalmente con subjuntivo presente en español: «cuando venga». Se mantiene el tono prospectivo del pasaje.'
- source_word: κύριος
  english_pob_choice: owner
  chosen_spanish: dueño
  alternatives_spanish:
  - señor
  - dueño de la viña
  lexicon: BDAG
  rationale: En la parábola, κύριος no funciona como título divino sino como propietario de la viña. «Dueño» transmite mejor esa relación que «señor», que en español podría cargar con resonancias litúrgicas no buscadas aquí.
- source_word: ἀμπελῶνος
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  lexicon: BDAG
  rationale: «Viña» es la forma natural y bíblica en español para ἀμπελών, y mantiene el campo semántico agrícola del relato.
- source_word: τί ποιήσει
  english_pob_choice: what will he do
  chosen_spanish: ¿qué hará?
  alternatives_spanish:
  - ¿qué hará con ellos?
  - ¿qué les hará?
  lexicon: BDAG
  rationale: La pregunta pide la acción futura del dueño. En español, «¿qué hará?» conserva la concisión del griego; el complemento se completa con la siguiente frase para evitar sobreexpansión.
- source_word: τοῖς γεωργοῖς
  english_pob_choice: those farmers
  chosen_spanish: con aquellos agricultores
  alternatives_spanish:
  - a aquellos labradores
  - a aquellos campesinos
  lexicon: BDAG
  rationale: γεωργός designa literalmente a quienes trabajan la tierra. «Agricultores» es claro y cercano al valor léxico básico; se mantiene el matiz de referencia concreta con «aquellos». Se añadió «con» porque el verbo español «hacer con» reproduce mejor la relación de la pregunta que un simple objeto directo.
- source_word: ἐκείνοις
  english_pob_choice: those
  chosen_spanish: aquellos
  alternatives_spanish:
  - esos
  - esos mismos
  lexicon: BDAG
  rationale: El demostrativo aporta distancia y especificidad. «Aquellos» conserva mejor ese matiz que «esos» en un registro bíblico cuidado.
theological_decisions:
- issue: κύριος en contexto parabólico no divino
  english_pob_reading: owner
  chosen_spanish_reading: dueño
  alternative_spanish_readings:
  - señor
  - amo
  rationale: La escena narrada trata del propietario humano de la viña. Traducir κύριος como «dueño» evita introducir de manera automática el sentido teológico de «Señor» y respeta la lectura contextual documentada por el POB en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation philosophy items 1 and 5'
- issue: Relación de los γεωργοί con la viña
  english_pob_reading: farmers
  chosen_spanish_reading: agricultores
  alternative_spanish_readings:
  - labradores
  - campesinos
  rationale: El griego dice simplemente «trabajadores de la tierra / cultivadores». Aunque el trasfondo de la parábola implica arrendatarios, ese dato no está codificado en la palabra misma. «Agricultores» preserva la neutralidad lexical y evita añadir la idea de arrendamiento como si fuera explícita en este verso.
  doctrine_reference: BDAG, γεωργός; nota contextual de la parábola en el POB inglés
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje griego SBLGNT, la tabla morfológica y el audit trail inglés. No hubo revisiones aplicadas en la última pasada, y el consenso de revisión fue de alta concordancia, así que la redacción española sigue de cerca las decisiones léxicas documentadas sin introducir novedades innecesarias.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico natural y moderno, evitando calcos como «qué cosa hará» o «el señor de la viña».
  - Se preservó la distinción contextual entre κύριος como propietario humano y los usos teológicos de «Señor» en otros contextos.
  - Se eligió «viña» por coherencia con el vocabulario agrícola bíblico en español.
  - Se usó «aquellos» para reflejar la distancia del demostrativo ἐκείνοις.
  - La estructura de la pregunta se ajustó al español para mantener claridad sin perder la relación directa entre el dueño y los agricultores.
