translation:
  language: es
  text: 'Pero más tarde les envió su hijo, diciendo: «Respetarán[a] a mi hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Reverenciarán a mi hijo». El verbo griego puede denotar mostrar respeto o deferencia; en otros contextos también puede significar «avergonzarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  english_pob_choice: later
  chosen_spanish: más tarde
  alternatives_spanish:
  - luego
  - después
  lexicon: BDAG
  rationale: El adverbio indica una acción posterior en la secuencia narrativa. «Más tarde» comunica esa posterioridad de forma natural en español sin añadir la fuerza de cierre de «por fin» o «finalmente».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Aquí marca una transición con contraste narrativo entre el envío de los siervos y el envío del hijo. «Pero» preserva esa tensión y el avance de la parábola.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: les envió
  alternatives_spanish:
  - les mandó
  - les despachó
  lexicon: BDAG
  rationale: El verbo básico es «enviar». En español, con destinatario plural, «les envió» es claro y idiomático. «Mandó» puede sonar más genérico; «despachó» sería demasiado técnico o distante.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: a ellos / les
  alternatives_spanish:
  - hacia ellos
  - contra ellos
  lexicon: BDAG
  rationale: Con verbos de envío, πρός + acusativo expresa dirección hacia las personas destinatarias. El clítico dativo «les» ya comunica el destinatario en español, de modo que no hace falta una preposición redundante en la frase principal.
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  - su propio hijo
  lexicon: BDAG
  rationale: «Su hijo» es la forma natural y fiel al vínculo posesivo del griego. «Su propio hijo» añadiría énfasis que no está explícito en la forma de la frase.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: BDAG
  rationale: El participio introduce la cita directa. «Diciendo» conserva esa función sin sobrecargar la transición narrativa.
- source_word: Ἐντραπήσονται
  english_pob_choice: They will respect
  chosen_spanish: Respetarán
  alternatives_spanish:
  - Tendrán respeto por
  - Le mostrarán reverencia a
  - Se avergonzarán delante de
  lexicon: BDAG
  rationale: El POB inglés documenta la tensión semántica entre «respetar/reverenciar» y «avergonzarse». En este contexto, con objeto directo «mi hijo», el sentido principal es mostrar deferencia o respeto; «Respetarán» lo expresa de forma natural en español sin borrar la posibilidad semántica alternativa consignada en nota.
- source_word: τὸν υἱόν μου
  english_pob_choice: my son
  chosen_spanish: a mi hijo
  alternatives_spanish:
  - mi hijo
  - al hijo mío
  lexicon: BDAG
  rationale: Como complemento directo de «respetarán», en español conviene la preposición «a» para marcar persona. «Mi hijo» conserva la relación personal del hablante y la fuerza afectiva del original.
theological_decisions:
- issue: El hijo de la parábola y su referencia cristológica sin sobretraducción
  english_pob_reading: his son / my son
  chosen_spanish_reading: su hijo / mi hijo
  alternative_spanish_readings:
  - el Hijo
  - su amado hijo
  rationale: El texto griego usa lenguaje ordinario de filiación, no un título explícito como ἀγαπητός ni una capitalización exigida por la forma. Por eso se mantiene «hijo» en minúscula para conservar el marco narrativo de la parábola y dejar que la identificación cristológica emerja del contexto, no de una inserción del traductor.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3, 6
- issue: Valor de ἐντρέπω en este contexto
  english_pob_reading: They will respect my son.
  chosen_spanish_reading: Respetarán a mi hijo.
  alternative_spanish_readings:
  - Le tendrán reverencia
  - Se avergonzarán delante de mi hijo
  rationale: El POB inglés preserva la lectura principal de respeto/deferencia y reconoce en nota la posibilidad de vergüenza. El español mantiene esa decisión primaria con «Respetarán» y evita escoger la acepción secundaria como si fuera la principal en este pasaje.
  doctrine_reference: BDAG; nota lexical del POB inglés
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados en la fuente inglesa y el estado de revisión indica que no hubo modificaciones necesarias. La propuesta española sigue esa lectura estable y conserva la tensión léxica documentada en Ἐντραπήσονται mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «hijo» en minúscula para seguir el registro narrativo de la parábola.
  - Se conserva «Respetarán» como lectura principal y se documenta en nota la alternativa semántica de «reverencia» y la posibilidad de «avergonzarse».
  - Se opta por un español natural y publicable, evitando calcos como «a ellos» o «les envió a ellos» cuando el dativo español ya marca destinatario.
  - La puntuación de la cita directa sigue el uso español con comillas angulares implícitas en el formato entregado y signo de cierre dentro de la cita.
