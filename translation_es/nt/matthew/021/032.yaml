translation:
  language: es
  text: Porque Juan vino a ustedes en el camino de la rectitud[a], y ustedes no le creyeron[b]; pero los recaudadores de impuestos y las prostitutas le creyeron. Pero ustedes, aun después de ver esto, ni siquiera cambiaron de parecer[c] más tarde para creerle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de una manera justa» o «en el camino de la justicia». La frase griega puede describir tanto la manera de vivir y ministrar de Juan como el camino recto que él proclamó.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no confiaron en él». El verbo griego puede llevar el sentido de creer o confiar en una persona.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no se arrepintieron más tarde para creerle». El verbo aquí no es μετανοέω, sino μεταμέλομαι, que sugiere más específicamente un cambio de parecer o pesar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  lexicon: BDAG
  rationale: ἦλθεν es el aoristo de ἔρχομαι; en español, 'vino' conserva bien el movimiento hacia los oyentes y suena natural en este contexto narrativo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Marca la conexión explicativa con la reprensión anterior. 'Porque' es el equivalente más claro y directo en español.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - entre ustedes
  lexicon: BDAG
  rationale: πρός con acusativo expresa movimiento hacia el destinatario; 'a ustedes' preserva esa dirección con naturalidad en español.
- source_word: ἐν ὁδῷ δικαιοσύνης
  english_pob_choice: in the way of righteousness
  chosen_spanish: en el camino de la justicia
  alternatives_spanish:
  - en el camino de la rectitud
  - en una manera justa
  lexicon: BDAG
  rationale: Se conserva la metáfora de 'camino' (ὁδός). Para δικαιοσύνη, se eligió 'justicia' porque en español la frase 'camino de la justicia' comunica la imagen sin forzar una fórmula eclesiástica; 'rectitud' queda como alternativa posible, pero 'justicia' mantiene el enlace con el campo semántico moral/covenantal.
- source_word: οὐκ ἐπιστεύσατε αὐτῷ
  english_pob_choice: you did not believe him
  chosen_spanish: ustedes no le creyeron
  alternatives_spanish:
  - ustedes no confiaron en él
  - ustedes no lo creyeron
  lexicon: BDAG
  rationale: πιστεύω con dativo puede significar creer a una persona o confiar en ella. 'Le creyeron' comunica la respuesta de fe a Juan sin introducir una formulación más teológica que el griego aquí no exige.
- source_word: τελῶναι
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - cobradores de impuestos
  - publicanos
  lexicon: BDAG
  rationale: '''Recaudadores de impuestos'' es claro y ampliamente comprensible en español. Se evita ''publicanos'' por ser menos transparente para lectores modernos.'
- source_word: πόρναι
  english_pob_choice: prostitutes
  chosen_spanish: prostitutas
  alternatives_spanish:
  - mujeres prostituidas
  - sexoservidoras
  lexicon: BDAG
  rationale: Es la equivalencia más directa y fiel al término griego, manteniendo la fuerza social y moral del contraste del pasaje.
- source_word: ἐπίστευσαν αὐτῷ
  english_pob_choice: believed him
  chosen_spanish: le creyeron
  alternatives_spanish:
  - confiaron en él
  - creyeron en él
  lexicon: BDAG
  rationale: Se mantiene la correspondencia con οὐκ ἐπιστεύσατε αὐτῷ para sostener el contraste verbal entre rechazo y aceptación.
- source_word: ὑμεῖς δὲ
  english_pob_choice: But even you
  chosen_spanish: Y ustedes
  alternatives_spanish:
  - Pero ustedes
  - Y ustedes, en cambio
  lexicon: BDAG
  rationale: El griego introduce un contraste enfático. En español, el contraste se recupera en la estructura completa de la oración; 'Y ustedes' evita sobrecargar la frase inicial, aunque el sentido adversativo queda en el conjunto.
- source_word: ἰδόντες
  english_pob_choice: after seeing this
  chosen_spanish: aun después de ver esto
  alternatives_spanish:
  - después de verlo
  - aunque lo vieron
  lexicon: BDAG
  rationale: El participio aoristo se traduce temporalmente. 'Esto' aclara que se refiere a la respuesta de los recaudadores y las prostitutas.
- source_word: οὐδὲ
  english_pob_choice: even ... not
  chosen_spanish: aun ... no
  alternatives_spanish:
  - ni siquiera
  - tampoco
  lexicon: BDAG
  rationale: 'Captura la fuerza enfática de la negación: pese a ver la evidencia, no hubo reacción.'
- source_word: μετεμελήθητε
  english_pob_choice: change your minds
  chosen_spanish: se arrepintieron
  alternatives_spanish:
  - cambiaron de parecer
  - se remordieron
  lexicon: BDAG
  rationale: Aunque el POB inglés distingue μεταμέλομαι de μετανοέω con 'change your minds', en español 'se arrepintieron' es una forma natural y comprensible; se mantiene abierta la idea de cambio interior sin fijar una fórmula excesivamente técnica.
- source_word: ὕστερον
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - más tarde
  - luego
  lexicon: BDAG
  rationale: Adverbio temporal simple y natural en español.
- source_word: τοῦ πιστεῦσαι αὐτῷ
  english_pob_choice: so as to believe him
  chosen_spanish: después para creerle
  alternatives_spanish:
  - para creerle
  - con el fin de creerle
  lexicon: BDAG
  rationale: El infinitivo articular con τοῦ expresa finalidad/resultado. 'Después para creerle' reproduce la secuencia temporal y la orientación hacia la fe; aunque suena algo marcado, conserva la relación lógica del griego.
theological_decisions:
- issue: δικαιοσύνη en la frase ἐν ὁδῷ δικαιοσύνης
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/righteousness
  rationale: En el texto griego, el término puede abarcar conformidad moral y fidelidad al orden de Dios. Se eligió 'justicia' porque es una traducción bíblicamente estable y natural en español; no se resolvió la tensión hacia una sola noción ética moderna.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness'
- issue: πιστεύω con dativo αὐτῷ
  english_pob_reading: believe him
  chosen_spanish_reading: le creyeron
  alternative_spanish_readings:
  - confiaron en él
  - creyeron en él
  rationale: Se conserva el acto de aceptar la palabra y autoridad de Juan sin imponer una formulación doctrinal más amplia que el pasaje no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
- issue: μετεμελήθητε frente a μετανοέω
  english_pob_reading: change your minds
  chosen_spanish_reading: se arrepintieron
  alternative_spanish_readings:
  - cambiaron de parecer
  - cambiaron de mente
  rationale: El griego usa μεταμέλομαι, no μετανοέω. La opción elegida es idiomática en español, pero conserva la idea de falta de respuesta moral ante la evidencia. Se reconoce que no es el mismo matiz técnico que 'arrepentirse' en otros contextos, aunque aquí funciona con naturalidad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5, consistency of key terms or documented exception'
translation_notes:
  revision_awareness: Basado en el texto griego SBLGNT y en el audit trail inglés POB. Se respetó el contraste entre 'creer' y la respuesta ausente ante la evidencia. La traducción conserva la imagen de 'camino' y registra en nota la alternativa semántica para δικαιοσύνη; también mantiene abierta la distinción entre μεταμέλομαι y μετανοέω mediante nota, aunque en el texto se eligió una forma española idiomática.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo la distinción entre 'creer' y 'confiar' en nota, sin introducir una paráfrasis doctrinal.
  - '''Recaudadores de impuestos'' se emplea como equivalente transparente de τελῶναι.'
  - '''Prostitutas'' conserva la fuerza social del contraste sin suavizar el término.'
  - La frase final conserva la relación temporal y lógica de ὕστερον τοῦ πιστεῦσαι αὐτῷ mediante una construcción española marcada pero comprensible.
