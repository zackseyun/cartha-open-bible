  text: ἦλθεν γὰρ ⸂Ἰωάννης πρὸς ὑμᾶς⸃ ἐν ὁδῷ δικαιοσύνης, καὶ οὐκ ἐπιστεύσατε αὐτῷ· οἱ δὲ τελῶναι καὶ αἱ πόρναι ἐπίστευσαν αὐτῷ· ὑμεῖς δὲ ἰδόντες ⸀οὐδὲ μετεμελήθητε ὕστερον τοῦ πιστεῦσαι αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/032.yaml
  text: For John came to you in the way of righteousness[a], and you did not believe him; but the tax collectors and the prostitutes believed him. But even after seeing this[c][b], you did not afterward change your minds so as to believe him.
  footnotes:
  - marker: a
    text: Or 'in a righteous way' or 'in the path of righteousness.' The Greek phrase can describe either John's manner of life/ministry or the righteous way he proclaimed.
    reason: lexical_alternative
  - marker: b
    text: Or 'you did not trust him.' The Greek verb can carry the sense of believing or trusting a person.
    reason: lexical_alternative
  - marker: c
    text: Or 'you did not later repent so as to believe him.' The verb here is not the more common μετανοέω but μεταμέλομαι, which more specifically suggests a change of mind or regret.
    reason: lexical_alternative
