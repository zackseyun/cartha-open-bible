revisions:
- from: Porque Juan vino a ustedes en el camino de la justicia[a], y ustedes no le creyeron; pero los recaudadores de impuestos y las prostitutas le creyeron. Y ustedes, aun después de ver esto[b], no se arrepintieron[c] después para creerle.
