  rationale: 'Se revisa para preservar mejor el sentido fuente y las decisiones documentadas del POB: ''rectitud'' alinea mejor δικαιοσύνη con ''righteousness''; ''cambiaron de parecer'' conserva la distinción de μεταμέλομαι frente a μετανοέω; ''Pero ustedes'' recupera el contraste enfático; y se corrigen la naturalidad de la cláusula final y el anclaje de las notas.'
  reviewer_model: gpt-5.4
