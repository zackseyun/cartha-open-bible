    issue: La nota al pie [a] está anclada en «respondió», pero su contenido explica λόγον ἕνα («una pregunta»).
    rationale: El anclaje actual desorienta al lector y no preserva adecuadamente la decisión léxica documentada en el POB inglés. La nota debe colocarse en «una pregunta[a]».
  - severity: medium
