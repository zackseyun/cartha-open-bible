translation:
  language: es
  text: 'Pero Jesús les respondió: «Yo también les haré una pregunta[a], y si ustedes me la responden, yo también les diré con qué autoridad hago estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un asunto», o más literalmente «una palabra»; λόγον ἕνα puede designar una pregunta o una materia en discusión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ ... εἶπεν αὐτοῖς
  english_pob_choice: Jesus answered them
  chosen_spanish: Pero Jesús les respondió
  alternatives_spanish:
  - Y Jesús les respondió
  - Jesús les respondió
  lexicon: BDAG; uso idiomático narrativo de ἀποκρίνομαι
  rationale: La construcción participial con εἶπεν funciona en español de manera natural como una respuesta directa. «Respondió» conserva el valor de réplica sin repetir innecesariamente «dijo», y «Pero» refleja el matiz adversativo/transicional de δέ en el intercambio.
- source_word: Ἐρωτήσω
  english_pob_choice: I ... will ask
  chosen_spanish: les haré una pregunta
  alternatives_spanish:
  - les preguntaré
  - haré una pregunta
  lexicon: BDAG
  rationale: En este contexto interrogativo, el verbo griego introduce una pregunta de contrarespuesta. «Haré una pregunta» comunica con naturalidad el acto de plantearla; «preguntaré» también es posible, pero la forma elegida preserva mejor el tono directo del intercambio.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: Yo también
  alternatives_spanish:
  - también yo
  - yo igualmente
  lexicon: BDAG
  rationale: 'La crasis expresa reciprocidad: así como ellos le preguntan, él también les preguntará. «Yo también» reproduce esa correspondencia en español de manera clara y natural.'
- source_word: λόγον ἕνα
  english_pob_choice: one question
  chosen_spanish: una pregunta
  alternatives_spanish:
  - un asunto
  - una palabra
  - un tema
  lexicon: BDAG
  rationale: Aunque λόγος puede significar «palabra», «asunto» o «materia», aquí el contexto de diálogo lo hace equivalente a una pregunta. En español, «una pregunta» comunica mejor el sentido funcional sin perder la tensión lexical del original.
- source_word: ὃν ἐὰν εἴπητέ μοι
  english_pob_choice: which if you tell me
  chosen_spanish: y si ustedes me la dicen
  alternatives_spanish:
  - y si me la responden
  - y si me dicen esa pregunta
  lexicon: BDAG
  rationale: El relativo griego retoma la «pregunta» implícita. En español, «me la dicen» conserva el paralelismo con el verbo de decir del texto y evita una paráfrasis excesiva; el pronombre femenino singular concuerda con «pregunta».
- source_word: κἀγὼ ὑμῖν ἐρῶ
  english_pob_choice: I also will tell you
  chosen_spanish: yo también les diré
  alternatives_spanish:
  - yo también les diré a ustedes
  - también yo les diré
  lexicon: BDAG
  rationale: Se mantiene la reciprocidad del primer miembro con una formulación natural en español. «Les diré» es el equivalente más directo de ἐρῶ en este contexto.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: by what authority
  chosen_spanish: con qué autoridad
  alternatives_spanish:
  - por qué autoridad
  - en qué autoridad
  lexicon: BDAG
  rationale: El griego usa ἐν con ἐξουσία para indicar la base o ámbito de la acción autorizada. En español, «con qué autoridad» es la forma idiomática más clara para expresar esa base de legitimidad sin diluir el sentido.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas acciones
  lexicon: BDAG
  rationale: El demostrativo plural se refiere a las acciones de Jesús que están bajo cuestionamiento. «Estas cosas» mantiene el plural del original y deja abierta la referencia amplia del pasaje.
- source_word: ποιῶ
  english_pob_choice: I do
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - realizo
  lexicon: BDAG
  rationale: El presente simple español transmite adecuadamente el valor general del griego. «Hago» conserva el carácter directo y no fuerza un aspecto progresivo que el texto no exige.
theological_decisions:
- issue: Referencia a la autoridad de Jesús en un contexto de disputa
  english_pob_reading: by what authority I do these things
  chosen_spanish_reading: con qué autoridad hago estas cosas
  alternative_spanish_readings:
  - por qué autoridad hago estas cosas
  - en qué autoridad hago estas cosas
  rationale: Se conserva la pregunta sobre la fuente/legitimidad de la autoridad de Jesús sin añadir interpretación doctrinal. «Con qué autoridad» evita sobreexplicar el matiz y mantiene la tensión del interrogatorio.
  doctrine_reference: Cristología; autoridad mesiánica de Jesús
- issue: Reproducción de la reciprocidad retórica
  english_pob_reading: I also will ask you ... I also will tell you
  chosen_spanish_reading: Yo también les haré una pregunta ... yo también les diré
  alternative_spanish_readings:
  - también yo les haré una pregunta ... también yo les diré
  - yo les haré también una pregunta ... yo les diré también
  rationale: La repetición de κἀγώ en ambos miembros subraya el intercambio recíproco. La versión española conserva esa simetría para no debilitar la estrategia retórica de Jesús.
  doctrine_reference: Retórica narrativa del Evangelio
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del griego SBLGNT y el audit trail inglés. Se decidió traducir λόγον ἕνα como «una pregunta» por su valor contextual, manteniendo en nota la alternativa lexical «una palabra» / «un asunto» que el original también admite.
  spanish_consistency_notes:
  - Se usa «Jesús» sin artículo, conforme al sujeto griego definido en narrativa.
  - Se mantiene «Yahvé» fuera del versículo, pues aquí no aparece el nombre divino ni una cita directa de κύριος con función de reemplazo.
  - «Autoridad» se conserva como término técnico estable para ἐξουσία.
  - La puntuación respeta el cierre de la cita directa y la relación condicional del enunciado.
