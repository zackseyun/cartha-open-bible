base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/009.yaml
  text: And the crowds going ahead of him and those following were crying out[a], saying[c][b], “Hosanna to the Son of David! Blessed is the one who comes in the name of the Lord! Hosanna in the highest!”
  footnotes:
  - marker: a
    text: “Hosanna” is a Hebrew-derived acclamation meaning something like “save, please” or “save now,” but here it functions as a shout of praise.
    reason: lexical_alternative
  - marker: b
    text: “The Son of David” is a royal messianic title.
    reason: cultural_note
  - marker: c
    text: This line echoes Psalm 118:26, where “the Lord” reflects the divine name YHWH in the Hebrew text.
    reason: cross_reference
