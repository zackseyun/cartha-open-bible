translation:
  language: es
  text: 'Y las muchedumbres que iban delante de él y las que lo seguían gritaban, diciendo: «¡Hosanna[a] al Hijo de David[b]! ¡Bendito el que viene en el nombre del Señor[c]! ¡Hosanna en las alturas!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hosanna» es una aclamación de origen hebreo que significa algo como «sálvanos, por favor» o «sálvanos ahora»; aquí funciona como grito de alabanza.
    reason: lexical_alternative
  - marker: b
    text: «Hijo de David» es un título real mesiánico.
    reason: cultural_note
  - marker: c
    text: Esta línea alude al Salmo 118:26, donde «el Señor» refleja en el texto hebreo el nombre divino Yahvé.
    reason: cross_reference
lexical_decisions:
- source_word: ὄχλοι
  english_pob_choice: crowds
  chosen_spanish: multitudes
  alternatives_spanish:
  - gente
  - muchedumbres
  lexicon: BDAG
  rationale: «Multitudes» comunica bien la idea de un grupo numeroso reunido y mantiene un registro digno y natural en español. Evita tanto la monotonía como una paráfrasis excesiva.
- source_word: προάγοντες αὐτόν
  english_pob_choice: going ahead of him
  chosen_spanish: que iban delante de él
  alternatives_spanish:
  - que iban antes que él
  - que lo precedían
  lexicon: BDAG
  rationale: La frase española conserva la imagen procesional sin sugerir que lo guiaban formalmente. «Iban delante de él» es la forma más natural y fiel.
- source_word: ἀκολουθοῦντες
  english_pob_choice: following
  chosen_spanish: las que lo seguían
  alternatives_spanish:
  - las que venían detrás
  - las que lo acompañaban
  lexicon: BDAG
  rationale: Se mantiene el contraste con «iban delante de él» y el sentido de acompañamiento en la procesión.
- source_word: ἔκραζον λέγοντες
  english_pob_choice: were crying out, saying
  chosen_spanish: gritaban, diciendo
  alternatives_spanish:
  - clamaban, diciendo
  - seguían gritando
  lexicon: BDAG
  rationale: «Gritaban» reproduce bien el verbo de voz fuerte y es idiomático en español. El participio explicativo se conserva con «diciendo».
- source_word: Ὡσαννά
  english_pob_choice: Hosanna
  chosen_spanish: Hosanna
  alternatives_spanish:
  - ¡Sálvanos, por favor!
  - ¡Sálvanos ahora!
  lexicon: BDAG
  rationale: Se translitera en el texto principal porque aquí funciona como aclamación litúrgica de alabanza; el sentido subyacente de petición queda expuesto en la nota.
- source_word: τῷ υἱῷ Δαυίδ
  english_pob_choice: to the Son of David
  chosen_spanish: al Hijo de David
  alternatives_spanish:
  - al Mesías davídico
  - al Hijo de David
  lexicon: BDAG
  rationale: Se conserva el título real mesiánico «Hijo de David» sin sustituirlo por una paráfrasis interpretativa. El dativo se rinde naturalmente con «al».
- source_word: Εὐλογημένος ὁ ἐρχόμενος
  english_pob_choice: Blessed is the one who comes
  chosen_spanish: Bendito el que viene
  alternatives_spanish:
  - Bendito sea el que viene
  - Bendito el que viene
  lexicon: BDAG
  rationale: La construcción nominal es breve y solemne en español. «El que viene» mantiene el participio sustantivado sin sobreexplicar.
- source_word: ἐν ὀνόματι κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - en el nombre del Señor Dios
  - con la autoridad del Señor
  lexicon: BDAG
  rationale: La expresión es una cita bíblica reconocible y fiel al giro griego. «Señor» traduce κύριος en la fórmula citada sin alterar su forma textual.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: BDAG
  rationale: Aunque el trasfondo del Salmo 118 alude al nombre divino, aquí la redacción griega dice κύριος; se conserva «Señor» en la cita y se aclara el trasfondo en nota para no reemplazar el texto citado.
- source_word: ἐν τοῖς ὑψίστοις
  english_pob_choice: in the highest
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lo más alto
  - en los cielos más altos
  lexicon: BDAG
  rationale: «En las alturas» reproduce el tono litúrgico y la elevación celestial de la exclamación final, con naturalidad en español.
theological_decisions:
- issue: Títulо mesiánico «Hijo de David»
  english_pob_reading: Retain 'the Son of David' as a title rather than paraphrasing it as 'the Messiah' in the main text.
  chosen_spanish_reading: Conservar «Hijo de David» como título mesiánico, no sustituirlo por «Mesías» en el texto principal.
  alternative_spanish_readings:
  - al Mesías
  - al rey mesiánico
  rationale: El griego emplea el título davídico explícito; preservarlo respeta la textura histórica y teológica del pasaje sin introducir una interpretación explicativa en la línea principal.
  doctrine_reference: Affirmations; Translation philosophy §1, §2, §3
- issue: Sentido de Ὡσαννά
  english_pob_reading: Keep 'Hosanna' in the main text and preserve the underlying sense in a footnote.
  chosen_spanish_reading: Mantener «Hosanna» en el texto principal y exponer su sentido subyacente en nota.
  alternative_spanish_readings:
  - ¡Sálvanos, por favor!
  - ¡Sálvanos ahora!
  rationale: En este contexto triunfal, la palabra funciona como aclamación de alabanza además de conservar su sentido original de súplica. La transliteración respeta ese uso litúrgico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia de κυρίου en la cita del Salmo
  english_pob_reading: Translate as 'the Lord' in line with Greek κύριος while preserving the Psalmic/YHWH background in a footnote.
  chosen_spanish_reading: Traducir κύριος como «Señor» y señalar en nota el trasfondo de YHWH en el Salmo 118.
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La cita griega usa κύριος, por lo que el texto principal debe reflejar esa forma. El trasfondo del nombre divino se preserva sin sustituir el término citado.
  doctrine_reference: 'Contested terms table: κύριος; יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota aparezca explícitamente en el texto español mediante anclajes [a], [b] y [c] colocados exactamente donde corresponden.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «Señor» y «Yahvé» según el trasfondo de la cita, sin reemplazar la forma griega κύριος en el cuerpo del texto.
  - «Hosanna» se translitera en el texto principal y se explica su valor semítico en nota, conforme al criterio POB.
  - Se preservó el título mesiánico «Hijo de David» sin paráfrasis interpretativa.
  - El español usa un registro litúrgico y claro, con puntuación de apertura y cierre propia del español.
