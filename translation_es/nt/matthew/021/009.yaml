  glossary_alignment: 'La terminología clave está bien alineada: «Hosanna», «Hijo de David», «Señor» para κύριος en la cita, con nota que explica el trasfondo de Yahvé; esto concuerda con las decisiones documentadas. No hay conflicto con las pautas de Mesías/Cristo ni con Yahvé, ya que aquí se traduce correctamente el griego κύριος en el texto principal y se conserva el trasfondo del nombre divino en nota.'
