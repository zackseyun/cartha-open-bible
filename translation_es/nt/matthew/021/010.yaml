translation:
  language: es
  text: 'Y cuando entró en Jerusalén[a], toda la ciudad se agitó, diciendo: «¿Quién es este?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue sacudida». El verbo griego puede referirse a una sacudida física o, como aquí, a una agitación pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθόντος αὐτοῦ
  english_pob_choice: when he entered
  chosen_spanish: cuando él entró
  alternatives_spanish:
  - al entrar él
  - cuando entró
  - después de entrar él
  lexicon: BDAG
  rationale: El genitivo absoluto funciona temporalmente; en español, una subordinada temporal simple comunica bien la relación de tiempo sin forzar un giro demasiado literal. Se conserva el sujeto explícito «él» para mantener claridad narrativa y reflejar el pronombre griego.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Es el nombre propio establecido en español bíblico y corresponde directamente al topónimo griego.
- source_word: ἐσείσθη
  english_pob_choice: was stirred up
  chosen_spanish: se agitó
  alternatives_spanish:
  - fue sacudida
  - estaba conmovida
  - se turbó
  lexicon: BDAG
  rationale: El verbo griego puede significar sacudirse literalmente, pero aquí describe la agitación pública de la ciudad. «Se agitó» conserva la imagen de conmoción sin volver la frase excesivamente física o extraña en español.
- source_word: πᾶσα ἡ πόλις
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - toda la urbe
  lexicon: BDAG
  rationale: La expresión griega es distributiva e inclusiva; «toda la ciudad» es natural en español y mantiene el alcance colectivo.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - preguntando
  lexicon: BDAG
  rationale: El participio presente introduce el contenido de la reacción colectiva. «Diciendo» es una traducción directa y suficiente; la pregunta citada deja claro el matiz de indagación sin necesidad de interpretarlo como «preguntando» en el texto principal.
- source_word: Τίς ἐστιν οὗτος;
  english_pob_choice: Who is this?
  chosen_spanish: ¿Quién es este?
  alternatives_spanish:
  - ¿Quién es este hombre?
  lexicon: BDAG
  rationale: La pregunta griega es directa y no añade sustantivos como «hombre»; se evita introducir una precisión que no está explícita en el texto.
theological_decisions:
- issue: Fuerza figurada de ἐσείσθη
  english_pob_reading: Render ἐσείσθη figuratively as 'was stirred up' rather than more literal 'was shaken.'
  chosen_spanish_reading: se agitó
  alternative_spanish_readings:
  - fue sacudida
  - estuvo en conmoción
  - se estremeció
  rationale: En el contexto, la ciudad no describe un terremoto sino una reacción colectiva ante la entrada de Jesús. «Se agitó» comunica la perturbación pública y mantiene la metáfora de movimiento sin sobredeterminarla físicamente.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar el sentido del texto fuente en un español natural y fiel.'
translation_notes:
  revision_awareness: 'Se sigue el mismo juicio revisado del POB inglés para ἐσείσθη: no se traslada como terremoto literal, sino como agitación pública. No se detectan revisiones adicionales en el pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «Jesusalén» como forma tradicional y clara del topónimo.
  - Se evita «Cristo» porque el verso no lo contiene.
  - La puntuación de la cita directa sigue el uso estándar del español bíblico moderno.
  - El pie de nota se ancla en la expresión verbal para preservar la alternativa léxica de la verbavión griega.
