revisions:
- from: 'Pero Jesús les respondió[a]: «En verdad les digo: si tienen fe y no dudan, no solo harán lo de la higuera, sino que incluso si le dicen a este monte: “Quítate y échate al mar”, así sucederá».'
  to: 'Pero Jesús les respondió[a]: «En verdad les digo: si tienen fe y no dudan, no solo harán lo que fue hecho a la higuera, sino que incluso si le dicen a este monte: “Sé alzado y sé arrojado al mar”, sucederá».'
  rationale: 'Se conserva la estructura y el tono del borrador, pero se corrigen dos puntos para alinearlo mejor con el griego y con la auditoría inglesa: (1) los imperativos pasivos del monte pasan a «Sé alzado y sé arrojado al mar» en vez de formas reflexivas; (2) la elipsis de la higuera se hace explícita con «lo que fue hecho a la higuera». También se simplifica «así sucederá» a «sucederá» para ajustarse más a γενήσεται.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:15:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y el rastro POB en la mayor parte del versículo: «Pero Jesús les respondió», «En verdad les digo», «si tienen fe y no dudan», y la estructura hiperbólica del dicho quedan bien preservadas. Sin embargo, dos elecciones clave en la cita al monte debilitan la fidelidad al griego y al audit trail inglés: Ἄρθητι / βλήθητι son imperativos pasivos («sé alzado / sé arrojado»), mientras que «Quítate y échate al mar» los vuelve reflexivos/medios, cambiando la imagen de algo que le ocurre al monte por una orden de auto-moverse. Además, «lo de la higuera» resulta algo vago frente a la explicitación ya documentada por la POB inglesa de la elipsis («lo que fue hecho a la higuera»).'
  spanish_quality_summary: El español es natural y legible, con registro bíblico moderno y digno. No obstante, «lo de la higuera» suena algo coloquial e impreciso para este contexto, y «Quítate y échate al mar» introduce una personificación menos controlada y algo más libre de lo que pide el original. Una reparación pequeña puede mejorar precisión y claridad sin volver la frase rígida.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Fe» para πίστις está bien. La nota sobre διακριθῆτε preserva adecuadamente alternativas léxicas. El problema principal no es glosarial sino gramatical/semántico en los imperativos pasivos y, en menor grado, la explicitación de la elipsis de τὸ τῆς συκῆς.
  issues:
  - severity: high
    issue: 'Los imperativos pasivos Ἄρθητι y βλήθητι se tradujeron como reflexivos: «Quítate y échate al mar».'
    rationale: El griego ordena que el monte sea alzado y sea arrojado, no que se quite o se eche a sí mismo. El audit trail inglés preserva deliberadamente el pasivo («Be taken up and thrown into the sea»). En español conviene mantener esa dirección semántica con «sé alzado» / «sé arrojado» o equivalente.
  - severity: medium
    issue: «Lo de la higuera» es demasiado vago/coloquial para οὐ μόνον τὸ τῆς συκῆς ποιήσετε.
    rationale: La expresión griega es elíptica, pero el contexto inmediato refiere a lo sucedido a la higuera. La POB inglesa explicitó esa elipsis. «Lo de la higuera» comunica referencia contextual, pero pierde precisión; «lo que fue hecho a la higuera» refleja mejor el sentido sin sobreinterpretar.
  - severity: low
    issue: «Así sucederá» añade un matiz discursivo no requerido por γενήσεται.
    rationale: No es incorrecto, pero «sucederá» o «ocurrirá» basta. El demostrativo «así» no está en el griego; puede mantenerse por fluidez, pero es más ajustado omitirlo.
  revised_spanish_text: 'Pero Jesús les respondió[a]: «En verdad les digo: si tienen fe y no dudan, no solo harán lo que fue hecho a la higuera, sino que incluso si le dicen a este monte: “Sé alzado y sé arrojado al mar”, sucederá».'
  revised_footnotes:
  - marker: a
    text: O «no vacilan» o «no están divididos en la mente».
    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura y el tono del borrador, pero se corrigen dos puntos para alinearlo mejor con el griego y con la auditoría inglesa: (1) los imperativos pasivos del monte pasan a «Sé alzado y sé arrojado al mar» en vez de formas reflexivas; (2) la elipsis de la higuera se hace explícita con «lo que fue hecho a la higuera». También se simplifica «así sucederá» a «sucederá» para ajustarse más a γενήσεται.'
