translation:
  language: es
  text: 'Pero Jesús les respondió[a]: «En verdad les digo: si tienen fe y no dudan, no solo harán lo que fue hecho a la higuera, sino que incluso si le dicen a este monte: “Sé alzado y sé arrojado al mar”, sucederá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no vacilan» o «no están divididos en la mente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ
  english_pob_choice: But Jesus answered
  chosen_spanish: Pero Jesús les respondió
  alternatives_spanish:
  - Y Jesús les respondió
  - Jesús les contestó
  lexicon: BDAG
  rationale: «Respondió» conserva la fuerza de ἀποκριθείς como introducción de una respuesta directa. «Pero» refleja el matiz de δέ como transición suave desde el contexto anterior.
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: En verdad les digo
  alternatives_spanish:
  - Amén, les digo
  - De cierto les digo
  lexicon: BDAG
  rationale: La fórmula es solemne y autoritativa. «En verdad les digo» mantiene el énfasis de ἀμήν de modo natural en español, sin volverla mecánica ni eclesiásticamente rígida.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Aquí πίστις designa confianza creyente en Dios; «fe» es la equivalencia normal y más fiel en español. «Confianza» explica el matiz, pero no sustituye el término clave.
- source_word: μὴ διακριθῆτε
  english_pob_choice: do not doubt
  chosen_spanish: no dudan
  alternatives_spanish:
  - no vacilan
  - no están divididos en la mente
  lexicon: BDAG
  rationale: La POB inglesa opta por «do not doubt»; en español, «dudar» comunica con claridad la hesitación interior. Se conservan las alternativas porque διακρίνω también puede sugerir vacilar o estar dividido interiormente.
- source_word: οὐ μόνον τὸ τῆς συκῆς ποιήσετε
  english_pob_choice: you will not only do what was done to the fig tree
  chosen_spanish: no solo harán lo de la higuera
  alternatives_spanish:
  - no solo harán lo que se hizo a la higuera
  - no solo harán el hecho de la higuera
  lexicon: BDAG
  rationale: La expresión griega es elíptica y alude al episodio inmediato con la higuera. «Lo de la higuera» preserva esa referencia sin sobreexplicar ni forzar una paráfrasis larga.
- source_word: κἂν
  english_pob_choice: even if
  chosen_spanish: incluso si
  alternatives_spanish:
  - aunque
  - y aun si
  lexicon: BDAG
  rationale: «Incluso si» reproduce el valor intensificador de κἄν y prepara la comparación ascendente entre el caso de la higuera y el del monte.
- source_word: τῷ ὄρει τούτῳ
  english_pob_choice: this mountain
  chosen_spanish: este monte
  alternatives_spanish:
  - esta montaña
  - este cerro
  lexicon: BDAG
  rationale: «ὄρος» puede traducirse por «monte» o «montaña». Se prefirió «monte» por ser natural en registro bíblico y conservar la referencia visible y concreta del demostrativo «este».
- source_word: Ἄρθητι
  english_pob_choice: Be taken up
  chosen_spanish: Quítate
  alternatives_spanish:
  - Levántate
  - Sé quitado
  lexicon: BDAG
  rationale: El imperativo pasivo de αἴρω mantiene la idea de ser removido. En español, «Quítate» conserva brevedad, fuerza imperativa y movimiento de desplazamiento sin volver la frase torpe.
- source_word: βλήθητι εἰς τὴν θάλασσαν
  english_pob_choice: thrown into the sea
  chosen_spanish: échate al mar
  alternatives_spanish:
  - lánzate al mar
  - sea echado al mar
  lexicon: BDAG
  rationale: La imagen pide un imperativo breve y vívido. «Échate al mar» comunica el gesto forzado de ser arrojado, manteniendo el tono imagístico del texto.
- source_word: γενήσεται
  english_pob_choice: it will happen
  chosen_spanish: así sucederá
  alternatives_spanish:
  - así acontecerá
  - se hará realidad
  lexicon: BDAG
  rationale: El futuro de γίνομαι indica que el dicho se cumplirá. «Así sucederá» es idiomático y mantiene el resultado efectivo sin añadir matices ajenos.
theological_decisions:
- issue: Alcance de la fe en una promesa de acción extraordinaria
  english_pob_reading: Retain the hyperbolic-imagistic wording without narrowing it to either literal miracle or mere metaphor
  chosen_spanish_reading: Mantener el lenguaje imagístico e hiperbólico sin resolverlo en una lectura exclusivamente literal ni puramente metafórica
  alternative_spanish_readings:
  - promesa literal de trasladar montes
  - mera metáfora sobre superar dificultades
  rationale: La traducción debe conservar la tensión del dicho de Jesús. «Este monte» y la secuencia imperativa mantienen la fuerza del texto sin decidir interpretativamente entre milagro físico o figura retórica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Relación entre fe y duda
  english_pob_reading: if you have faith and do not doubt
  chosen_spanish_reading: si tienen fe y no dudan
  alternative_spanish_readings:
  - si tienen fe y no vacilan
  - si tienen fe y no están divididos en la mente
  rationale: La formulación española conserva la oposición simple y directa entre fe y duda, que es la presentación más natural del giro griego en este contexto narrativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al paquete fuente SBLGNT, la traducción auditada en inglés y el informe de concordancia. No hubo cambios pendientes en la última pasada de revisión; la redacción española preserva la decisión lexical y la tensión teológica documentadas.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se mantuvo «fe» para πίστις, coherente con el término doctrinal del proyecto.
  - Se prefirió «monte» por estilo bíblico sobrio y por la cercanía del demonstrativo «este».
  - Se evitó «Cristo» porque el texto dice Ἰησοῦς, nombre propio de Jesús.
