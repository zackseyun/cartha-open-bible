translation:
  language: es
  text: Pero cuando los principales sacerdotes y los escribas vieron las cosas maravillosas que él hizo, y a los niños que gritaban en el templo[a] y decían[b], «¡Hosanna al Hijo de David!», se indignaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: «Hosanna» es una aclamación de origen hebreo que significa algo como «¡Sálvanos, por favor!» o «¡Sálvanos ahora!», pero aquí también funciona como un grito de alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: En español, «principales sacerdotes» comunica con naturalidad el grupo dirigente sacerdotal plural sin sugerir un solo cargo. «Sumos sacerdotes» también es posible, pero puede sonar menos transparente y más rígido en este contexto narrativo.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - expertos en la ley
  lexicon: BDAG
  rationale: «Escribas» es la correspondencia más directa y establecida. Las alternativas explican más de lo que el texto dice y desplazan el término histórico.
- source_word: τὰ θαυμάσια
  english_pob_choice: the wonderful things
  chosen_spanish: las cosas maravillosas
  alternatives_spanish:
  - las maravillas
  - las cosas prodigiosas
  lexicon: BDAG
  rationale: El sustantivo adjetival abarca hechos sorprendentes o maravillosos, no necesariamente restringidos a «milagros». «Las cosas maravillosas» conserva amplitud y sigue de cerca la fuerza del griego.
- source_word: ἐποίησεν
  english_pob_choice: he did
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había realizado
  lexicon: BDAG
  rationale: En español, el pluscuamperfecto en la subordinada narrativa («había hecho») reproduce bien el valor de anterioridad respecto de «vieron» y suena natural en la secuencia del relato.
- source_word: παῖδας
  english_pob_choice: children
  chosen_spanish: los niños
  alternatives_spanish:
  - los muchachos
  - los pequeños
  lexicon: BDAG
  rationale: En este contexto de aclamar en el templo, «los niños» es la lectura más probable y natural. «Muchachos» estrecha demasiado el referente; «pequeños» es más interpretativo.
- source_word: κράζοντας
  english_pob_choice: crying out
  chosen_spanish: que gritaban
  alternatives_spanish:
  - que clamaban
  - que exclamaban
  lexicon: BDAG
  rationale: «Gritaban» comunica bien la voz fuerte y pública del participio. «Clamaban» también sería válido, pero en español puede sonar más solemne; aquí se prefiere una expresión clara y directa.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo[a]
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: «Templo» es idiomático y claro, pero el griego ἱερόν se refiere al complejo o recinto del templo, no al santuario interior. Por eso se conserva una nota explicativa.
- source_word: λέγοντας
  english_pob_choice: saying
  chosen_spanish: y decían[b]
  alternatives_spanish:
  - mientras decían
  - al decir
  lexicon: BDAG
  rationale: El participio acompaña la acción de «gritaban» y en español se integra naturalmente con «y decían». La coordinación evita una construcción forzada.
- source_word: Ὡσαννὰ
  english_pob_choice: Hosanna
  chosen_spanish: Hosanna
  alternatives_spanish:
  - ¡Sálvanos, por favor!
  - ¡Sálvanos ahora!
  lexicon: BDAG
  rationale: La transliteración conserva el valor litúrgico y mesiánico de la aclamación. Una glosa explícita es útil como alternativa, pero no debe reemplazar la forma reconocible en el texto principal.
- source_word: τῷ υἱῷ Δαυίδ
  english_pob_choice: to the Son of David
  chosen_spanish: al Hijo de David
  alternatives_spanish:
  - para el Hijo de David
  - al descendiente de David
  lexicon: BDAG
  rationale: «Hijo de David» debe mantenerse literalmente por su peso mesiánico en Mateo. La preposición «al» refleja bien el dativo de la aclamación en español.
- source_word: ἠγανάκτησαν
  english_pob_choice: they were indignant
  chosen_spanish: se indignaron
  alternatives_spanish:
  - se enojaron
  - se ofendieron
  lexicon: BDAG
  rationale: «Se indignaron» expresa la reacción fuerte y valorativa del verbo mejor que un simple enojo. Mantiene el matiz de disgusto moral o resentimiento ante lo visto y oído.
theological_decisions:
- issue: Título mesiánico «Hijo de David»
  english_pob_reading: Retained the literal title 'the Son of David' in the children's acclamation.
  chosen_spanish_reading: Se mantiene literalmente «Hijo de David» en la aclamación.
  alternative_spanish_readings:
  - descendiente de David
  - heredero de David
  rationale: En Mateo, la expresión funciona como título mesiánico reconocido. Traducirla de modo más libre debilitaría su carga narrativa y teológica.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Aclamación «Hosanna»
  english_pob_reading: Transliterated as 'Hosanna' in the main text.
  chosen_spanish_reading: Se conserva «Hosanna» en el texto principal.
  alternative_spanish_readings:
  - ¡Sálvanos, por favor!
  - ¡Sálvanos ahora!
  rationale: La forma transliterada preserva la tensión entre súplica de salvación y grito de alabanza. La posible explicación semántica queda mejor como apoyo en la nota.
  doctrine_reference: Translation philosophy §3
- issue: Referencia de ἱερόν
  english_pob_reading: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
  chosen_spanish_reading: «Templo» se usa en el texto principal con nota aclaratoria sobre el recinto del templo.
  alternative_spanish_readings:
  - recinto del templo
  - atrio(s) del templo
  rationale: En español, «templo» es la forma más natural y legible; la nota conserva la precisión del griego sin recargar la línea principal.
  doctrine_reference: Lexical precision; cultural note
translation_notes:
  revision_awareness: Coincido con la auditoría inglesa en la lectura general y no introduzco revisiones sustantivas. Mantengo la estructura narrativa, el título mesiánico y la transliteración de «Hosanna», añadiendo solo ajustes naturales del español para fluidez y precisión contextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Hijo de David» se conserva como título mesiánico literal.
  - «Hosanna» permanece transliterado para sostener su valor litúrgico.
  - «Templo» se usa como término principal con nota para el alcance de ἱερόν.
  - «Escribas» y «principales sacerdotes» conservan el registro histórico y narrativo esperado.
