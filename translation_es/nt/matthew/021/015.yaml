base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/015.yaml
  text: But when the chief priests and the scribes saw the wonderful things that he did[a], and the children crying out in the temple and saying[b], “Hosanna to the Son of David,” they were indignant.
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
    reason: cultural_note
  - marker: b
    text: “Hosanna” is a Hebrew-derived acclamation meaning something like “Save, please” or “Save now,” but by this point it also functions as a shout of praise.
    reason: lexical_alternative
