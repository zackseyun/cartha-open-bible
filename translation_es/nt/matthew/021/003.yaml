revisions:
- from: 'Y si alguien les dice algo, ustedes dirán: «El Señor[a] tiene necesidad de ellos»; y los enviará en seguida.'
  to: 'Y si alguien les dice algo, ustedes dirán: «El Señor[a] tiene necesidad de ellos»; y los enviará de inmediato[b].'
  rationale: La revisión conserva la traducción principal, añade la nota interpretativa presente en el audit trail inglés para la cláusula final, y mejora ligeramente la naturalidad panhispánica de εὐθύς con «de inmediato». No se requiere adjudicación adicional porque el ajuste es menor y está bien sustentado por el material dado.
