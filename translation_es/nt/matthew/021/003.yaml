translation:
  language: es
  text: 'Y si alguien les dice algo, ustedes dirán: «El Señor[a] tiene necesidad de ellos»; y los enviará de inmediato[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el maestro tiene necesidad de ellos».
    reason: alternative_reading
  - marker: b
    text: O «y él los enviará de inmediato»; el sujeto más natural es la persona interpelada, que enviará los animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις
  english_pob_choice: if anyone
  chosen_spanish: si alguien
  alternatives_spanish:
  - si cualquiera
  - si alguno
  lexicon: BDAG
  rationale: La expresión condicional indefinida pide un equivalente natural en español. «Si alguien» preserva el valor abierto de τις sin volver el giro pesado o artificial.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo plural dirigido a los discípulos se expresa de forma natural con «les» en el discurso directo español; el referente plural queda claro por el contexto.
- source_word: εἴπῃ τι
  english_pob_choice: says anything
  chosen_spanish: les dice algo
  alternatives_spanish:
  - les diga algo
  - les dice cualquier cosa
  lexicon: BDAG
  rationale: La combinación de λέγω con τι es amplia; «algo» conserva la indefinición sin restringir indebidamente a una pregunta o a una protesta específica.
- source_word: ἐρεῖτε
  english_pob_choice: you shall say
  chosen_spanish: ustedes dirán
  alternatives_spanish:
  - dirán
  - deberán decir
  lexicon: BDAG
  rationale: El futuro con valor directivo se transmite en español de modo claro con el futuro simple. «Ustedes dirán» mantiene la instrucción sin sonar forzado.
- source_word: Ὁ κύριος
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - el maestro
  lexicon: BDAG
  rationale: Se mantiene el valor titular de κύριος según el criterio POB para hablar de Yahvé o de una figura con autoridad reconocida. En este contexto, «El Señor» conserva la fuerza del título y evita rebajarlo a «el maestro».
- source_word: αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de estas bestias
  - de los animales
  lexicon: BDAG
  rationale: El genitivo plural se refiere naturalmente a los animales mencionados en el contexto inmediato. «De ellos» es el equivalente español más sobrio y directo.
- source_word: χρείαν ἔχει
  english_pob_choice: has need
  chosen_spanish: tiene necesidad
  alternatives_spanish:
  - necesita
  - requiere
  lexicon: BDAG
  rationale: La locución idiomática conserva mejor su perfil semántico con «tiene necesidad», que refleja de manera más literal el griego y mantiene el matiz de necesidad declarada.
- source_word: εὐθὺς
  english_pob_choice: at once
  chosen_spanish: en seguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «En seguida» comunica la inmediatez de εὐθύς con naturalidad en español contemporáneo y sin endurecer el ritmo.
- source_word: ἀποστελεῖ αὐτούς
  english_pob_choice: he will send them
  chosen_spanish: los enviará
  alternatives_spanish:
  - los mandará
  - los despachará
  lexicon: BDAG
  rationale: El futuro de ἀποστέλλω se traduce con «enviará» para conservar el sentido básico de envío. En español, el antecedente inmediato son los animales, por lo que el objeto directo natural es «los».
theological_decisions:
- issue: Valor de κύριος en contexto narrativo y cristológico
  english_pob_reading: '''The Lord'' preserves both the immediate practical sense and the christological title.'
  chosen_spanish_reading: «El Señor» conserva el valor de título y no lo reduce a un simple propietario o amo.
  alternative_spanish_readings:
  - el maestro
  - el dueño
  rationale: La lectura POB mantiene κύριος como «Lord». En español, «el Señor» reproduce ese rango semántico y permite la resonancia cristológica del contexto sin introducir una paráfrasis explicativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Referente de αὐτούς al final de la cláusula
  english_pob_reading: '''he will send them'' refers most naturally to the animals.'
  chosen_spanish_reading: «los enviará» se entiende como referencia a los animales mencionados.
  alternative_spanish_readings:
  - los enviará de vuelta
  - los soltará
  rationale: El griego no explicita una noción de “de vuelta” ni de “soltar”. La traducción conserva el envío simple y deja que el contexto determine el referente, como en el audit trail inglés.
  doctrine_reference: BDAG on ἀποστέλλω; English POB footnote b
translation_notes:
  revision_awareness: Se revisó el expediente inglés POB y se mantuvo la decisión principal sobre κύριος como «El Señor», evitando la alternativa «el maestro» por ser una reducción del valor titular documentado. También se respetó la lectura de ἀποστελεῖ como envío simple, sin añadir un matiz de retorno que el griego no expresa explícitamente.
  spanish_consistency_notes:
  - Se usa «El Señor» para κύριος, conforme al criterio terminológico del proyecto.
  - Se evita «SEÑOR» como convención de ocultamiento; el nombre/título se expresa abiertamente en español.
  - «En seguida» se eligió por naturalidad y equivalencia funcional frente a «inmediatamente».
  - El objeto directo plural «los» se ajusta al referente inmediato de los animales en el contexto narrativo.
  - La puntuación con comillas y punto y coma busca reflejar la división del griego sin sobreexplicarla.
