  text: λέγουσιν αὐτῷ· Κακοὺς κακῶς ἀπολέσει αὐτούς, καὶ τὸν ἀμπελῶνα ἐκδώσεται ἄλλοις γεωργοῖς, οἵτινες ἀποδώσουσιν αὐτῷ τοὺς καρποὺς ἐν τοῖς καιροῖς αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/041.yaml
  text: They said to him[a], “He will miserably destroy those wretches, and he will lease the vineyard to other farmers[c][b], who will give him the fruits in their seasons.”
  footnotes:
  - marker: a
    text: Or, “He will miserably destroy those miserable men.” The Greek uses a wordplay with the adjective and adverb from the same root to intensify the judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, “will rent out the vineyard to other tenants.”
    reason: lexical_alternative
  - marker: c
    text: Or, “will give him the produce at the proper times.”
    reason: lexical_alternative
