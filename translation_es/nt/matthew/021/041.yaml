- from: 'Le dijeron[a]: «Destructivamente destruirá a esos malvados, y arrendará[b] la viña a otros labradores, quienes le darán los frutos[c] en sus tiempos».'
  to: 'Le dijeron[a]: «Destruirá miserablemente a esos malvados, y arrendará[b] la viña a otros labradores, quienes le darán los frutos[c] en sus tiempos».'
  rationale: Se reemplaza «Destructivamente destruirá» por «Destruirá miserablemente» para expresar de manera natural en español la intensificación del griego Κακοὺς κακῶς ἀπολέσει y mantener la línea del audit trail inglés («miserably destroy»). Se pulen además las notas alternativas para que suenen naturales en español amplio sin perder el sentido de arrendamiento agrícola y de tiempos debidos.
