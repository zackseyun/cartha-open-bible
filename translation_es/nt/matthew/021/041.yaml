review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: respuesta narrativa en pasado, juicio futuro sobre los labradores malvados, transferencia de la viña a otros labradores y entrega de los frutos en los tiempos debidos. Sin embargo, la formulación «Destructivamente destruirá» no preserva de forma fiel ni natural el juego enfático Κακοὺς κακῶς ἀπολέσει; introduce un adverbio no idiomático en español que suena mecánico y oscurece el sentido. También conviene ajustar la nota de «rentará», que en español general es menos natural que «arrendará» o «dará en arriendo».'
  spanish_quality_summary: El texto es mayormente claro y de registro bíblico adecuado, con buenas elecciones como «viña», «arrendará» y «labradores». El principal problema de legibilidad es «Destructivamente destruirá», que resulta torpe y poco español. «En sus tiempos» es aceptable, pero «a su tiempo» o «en los tiempos debidos» serían más idiomáticos; aun así, puede mantenerse si la nota aclara la alternativa. La puntuación y el flujo general son buenos.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Las elecciones «viña», «labradores», «frutos» y «arrendará» están alineadas con el sentido fuente y con el audit trail inglés. La principal desalineación es lexical/estilística en Κακοὺς κακῶς, donde el español debe transmitir intensificación de juicio sin crear una construcción antinatural.
  issues:
  - severity: high
    issue: «Destructivamente destruirá» es antinatural y no comunica bien el juego enfático griego.
    rationale: Κακοὺς κακῶς ἀπολέσει expresa intensificación por juego de raíces, no un tecnicismo. En español, «destructivamente destruirá» suena artificial y distrae del sentido. «Destruirá miserablemente a esos malvados» conserva mejor la fuerza retórica y sigue el audit trail inglés.
  - severity: medium
    issue: La nota b usa «rentará», opción menos natural en este contexto.
    rationale: Aunque comprensible, «rentar» es regional y aquí puede sonar menos preciso que «dará en arriendo» o «alquilará». Dado que el texto principal ya usa «arrendará», la alternativa debe sonar igualmente natural en español amplio.
  - severity: low
    issue: La nota c dice «la producción», singular, mientras el texto principal conserva «los frutos», plural e imagístico.
    rationale: 'No es un error de sentido, pero conviene formular la alternativa como equivalente contextual claro: «el producto» o «los frutos en los tiempos debidos». Así se evita una leve pérdida de paralelismo con καρπούς.'
  revised_spanish_text: 'Le dijeron[a]: «Destruirá miserablemente a esos malvados, y arrendará[b] la viña a otros labradores, quienes le darán los frutos[c] en sus tiempos».'
