translation:
  language: es
  text: 'Le dijeron[a]: «Destruirá miserablemente a esos malvados, y arrendará[b] la viña a otros labradores, quienes le darán los frutos[c] en sus tiempos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Le dicen». El griego usa presente histórico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dará en arriendo la viña a otros labradores».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «le darán el producto en los tiempos debidos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Le dijeron
  alternatives_spanish:
  - Le dicen
  lexicon: BDAG
  rationale: El presente histórico griego λέγουσιν se vierte de modo natural al pasado en español para mantener fluidez narrativa, como en el audit trail inglés.
- source_word: Κακοὺς κακῶς
  english_pob_choice: miserably destroy those wretches
  chosen_spanish: Destructivamente destruirá a esos malvados
  alternatives_spanish:
  - Miserablemente destruirá a esos malvados
  - Destruirá a esos malvados de manera miserable
  lexicon: BDAG
  rationale: Se intenta conservar el juego de palabras entre el adjetivo y el adverbio de la misma raíz con una repetición enfática en español. 'Destructivamente destruirá' refleja la intensificación formal sin introducir una interpretación más específica que la del griego.
- source_word: ἀπολέσει
  english_pob_choice: will destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - hará perecer
  - arruinará
  lexicon: BDAG
  rationale: En este contexto de juicio decisivo, 'destruirá' es el equivalente más directo y claro, sin precisar indebidamente el modo de la destrucción.
- source_word: τὸν ἀμπελῶνα
  english_pob_choice: the vineyard
  chosen_spanish: la viña
  alternatives_spanish:
  - el viñedo
  lexicon: BDAG
  rationale: '''Viña'' es el término natural y tradicional en español bíblico para ἀμπελών y preserva la imagen profética de la parábola.'
- source_word: ἐκδώσεται
  english_pob_choice: will lease
  chosen_spanish: arrendará
  alternatives_spanish:
  - rentará
  - entregará en arriendo
  lexicon: BDAG
  rationale: '''Arrendar'' comunica con precisión la relación de explotación agrícola descrita en la parábola y corresponde al sentido de ceder la propiedad a renta.'
- source_word: ἄλλοις γεωργοῖς
  english_pob_choice: to other farmers
  chosen_spanish: a otros labradores
  alternatives_spanish:
  - a otros agricultores
  - a otros trabajadores de la viña
  lexicon: BDAG
  rationale: '''Labradores'' conserva el valor agrícola general de γεωργοί y encaja bien en español bíblico sin reducir el término a una ocupación moderna demasiado específica.'
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: quienes
  alternatives_spanish:
  - los cuales
  lexicon: BDAG
  rationale: '''Quienes'' mantiene el referente personal y el matiz cualitativo del relativo griego sin sobrecargar la frase.'
- source_word: ἀποδώσουσιν αὐτῷ
  english_pob_choice: will give him
  chosen_spanish: le darán
  alternatives_spanish:
  - le rendirán
  - le devolverán
  lexicon: BDAG
  rationale: En el contexto del arrendamiento, 'darle' expresa con naturalidad la entrega del fruto debido; en español resulta más idiomático que 'rendirle' aquí.
- source_word: τοὺς καρποὺς
  english_pob_choice: the fruits
  chosen_spanish: los frutos
  alternatives_spanish:
  - el fruto
  - la producción
  lexicon: BDAG
  rationale: '''Frutos'' conserva el paralelismo agrícola y la imagen literal del griego.'
- source_word: ἐν τοῖς καιροῖς αὐτῶν
  english_pob_choice: in their seasons
  chosen_spanish: en sus tiempos
  alternatives_spanish:
  - a su tiempo
  - en los tiempos debidos
  lexicon: BDAG
  rationale: '''Tiempos'' reproduce el plural de καιροῖς y deja ver el sentido de momentos señalados o debidos, como en la traducción inglesa.'
theological_decisions:
- issue: Intensidad del juicio en κακοὺς κακῶς ἀπολέσει
  english_pob_reading: He will miserably destroy those wretches
  chosen_spanish_reading: Destructivamente destruirá a esos malvados
  alternative_spanish_readings:
  - Miserablemente destruirá a esos malvados
  - Destruirá a esos malvados de manera miserable
  - Destruirá a esos malvados
  rationale: La frase griega contiene un juego enfático de raíz compartida que intensifica el juicio. La versión española procura no suavizar la severidad ni convertirla en una tesis doctrinal más específica de la que el texto afirma; mantiene la tensión retórica y el veredicto de juicio.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El inglés POB revisó 'utterly destroy' por 'miserably destroy' para reflejar mejor el juego de palabras griego κακοὺς κακῶς. La propuesta española intenta reproducir esa misma intensificación con una repetición de la misma raíz verbal en español, sin imponer una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - '''Labradores'' se mantiene para γεωργοῖς, en armonía con el registro agrícola de la parábola.'
  - '''Frutos'' y ''viña'' conservan la imaginería agrícola literal del texto.'
  - La puntuación y comillas siguen el uso editorial del español bíblico moderno.
