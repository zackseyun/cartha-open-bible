  text: Λέγει αὐτοῖς ὁ Ἰησοῦς· Οὐδέποτε ἀνέγνωτε ἐν ταῖς γραφαῖς· Λίθον ὃν ἀπεδοκίμασαν οἱ οἰκοδομοῦντες οὗτος ἐγενήθη εἰς κεφαλὴν γωνίας· παρὰ κυρίου ἐγένετο αὕτη, καὶ ἔστιν θαυμαστὴ ἐν ὀφθαλμοῖς ἡμῶν;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/042.yaml
  text: 'Jesus said to them[a], “Have you never read in the Scriptures: ‘The stone that the builders rejected—this one has become the cornerstone. This came from the Lord[b], and it is marvelous in our eyes’?”'
  footnotes:
  - marker: a
    text: Or 'the capstone'; literally 'the head of the corner.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'from the Lord'; the Hebrew source of the quotation has 'from the LORD' (YHWH).
    reason: alternative_reading
