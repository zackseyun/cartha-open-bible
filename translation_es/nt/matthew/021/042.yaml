review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general del griego y del POB inglés: pregunta retórica de Jesús, cita escritural, rechazo de la piedra por los constructores, exaltación como piedra principal, origen en el Señor y maravilla ante ello. Sin embargo, hay desajustes puntuales: la nota [a] está mal anclada y no corresponde al lugar léxico relevante; la proliferación de notas [b] y [c] duplica alternativas de forma innecesaria; y «en nuestros ojos» suena poco natural en español donde «a nuestros ojos» preserva mejor el modismo semítico con legibilidad clara.'
  spanish_quality_summary: El español es mayormente claro y digno, pero necesita pulido menor para naturalidad y consistencia editorial. «A nuestros ojos» es más idiomático que «en nuestros ojos». La puntuación de la cita queda mejor sin coma tras «desecharon», y la nota de alternativa para «piedra angular» debe anclarse allí, no en «dijo».
  glossary_alignment: 'Alineación generalmente buena con terminología del proyecto: «Jesús», «las Escrituras», «Señor». En esta cita de Sal 118, mantener «Señor» en texto principal con nota sobre el trasfondo hebreo «Yahvé» es aceptable y fiel al expediente inglés. «Piedra angular» refleja bien κεφαλὴ γωνίας; «constructores» es aceptable para οἰκοδομοῦντες. No hay conflicto teológico mayor.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «Jesús les dijo[a]», pero su contenido trata de «piedra angular / cabeza del ángulo».
    rationale: 'Viola la disciplina de notas: el marcador debe aparecer en la palabra o frase pertinente. Tal como está, induce confusión editorial.'
  - severity: medium
    issue: Las notas [b] y [c] duplican decisiones léxicas secundarias que no necesitan ambas mantenerse.
    rationale: El POB inglés conserva una nota sobre «cornerstone/capstone» y otra sobre «from the Lord» / hebreo YHWH. La nota sobre «desecharon» añade una alternativa posible, pero no es necesaria para preservar una ambigüedad significativa del original; además recarga el versículo.
  - severity: medium
    issue: «En nuestros ojos» es demasiado calcado.
    rationale: Aunque formalmente cercano al griego, en español bíblico natural la expresión idiomática es «a nuestros ojos», que conserva el sentido perceptivo sin sonar antinatural.
  - severity: low
    issue: La coma en «desecharon, esta se ha convertido...» estorba el flujo de la cita.
    rationale: Un punto y coma o raya sería posible, pero lo más natural aquí es continuar sin esa coma, como hace el texto base con una pausa fuerte ya marcada por la estructura de la cita.
