translation:
  language: es
  text: 'Jesús les dijo: «¿Nunca han leído en las Escrituras: “La piedra que los constructores desecharon, esta se ha convertido en la piedra angular[a]. Esto vino del Señor[b], y es admirable a nuestros ojos”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la piedra principal»; literalmente, «la cabeza del ángulo».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «del Señor»; el trasfondo hebreo de la cita tiene «de Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: Λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo, el pretérito perfecto simple 'dijo' comunica con naturalidad la misma referencia sin perder el valor narrativo.
- source_word: Οὐδέποτε
  english_pob_choice: never
  chosen_spanish: Nunca
  alternatives_spanish:
  - ¿Acaso no han leído nunca...?
  - Jamás
  lexicon: BDAG
  rationale: La partícula intensifica la pregunta retórica; 'Nunca' es la forma natural y fiel en español.
- source_word: ἀνέγνωτε
  english_pob_choice: have you read
  chosen_spanish: han leído
  alternatives_spanish:
  - leyeron
  - han estado leyendo
  lexicon: BDAG
  rationale: En una apelación retórica a la Escritura, el perfecto español conserva bien la vigencia de la pregunta sobre una lectura que sigue siendo normativamente válida.
- source_word: γραφαῖς
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - los escritos
  - las sagradas Escrituras
  lexicon: BDAG
  rationale: En este contexto, γραφαί alude a los escritos sagrados de Israel; 'las Escrituras' es la equivalencia clara y establecida.
- source_word: Λίθον
  english_pob_choice: the stone
  chosen_spanish: La piedra
  alternatives_spanish:
  - Una piedra
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, la cita remite a una piedra específica del Salmo; en español resulta natural y fiel usar forma definida.
- source_word: ἀπεδοκίμασαν
  english_pob_choice: rejected
  chosen_spanish: desecharon
  alternatives_spanish:
  - rechazaron
  - declararon inservible
  lexicon: BDAG
  rationale: '''Desecharon'' conserva el matiz de juzgar algo impropio o no apto tras evaluación; es cercano a la fuerza del verbo sin sonar demasiado técnico.'
- source_word: οἰκοδομοῦντες
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los que edificaban
  - los edificadores
  lexicon: BDAG
  rationale: El participio funciona como sustantivo. 'Los constructores' mantiene la imagen de forma idiomática y comprensible en español.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: esta
  alternatives_spanish:
  - ésta
  - este
  lexicon: BDAG
  rationale: El demostrativo es enfático. En español, por la referencia a 'la piedra', el femenino 'esta' preserva la deixis y el énfasis.
- source_word: ἐγενήθη εἰς
  english_pob_choice: has become
  chosen_spanish: se ha convertido en
  alternatives_spanish:
  - llegó a ser
  - se hizo
  lexicon: BDAG
  rationale: La expresión indica un cambio de estado con resultado presente. 'Se ha convertido en' comunica bien ese valor resultativo en español.
- source_word: κεφαλὴν γωνίας
  english_pob_choice: the cornerstone
  chosen_spanish: la piedra angular
  alternatives_spanish:
  - la cabeza del ángulo
  - la piedra del ángulo
  - la piedra principal de la esquina
  lexicon: BDAG
  rationale: '''Piedra angular'' es la equivalencia española tradicional y clara para el sentido de la expresión; mantiene el valor figurado sin volverlo oscuro.'
- source_word: παρὰ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de parte del Señor
  - por el Señor
  lexicon: BDAG
  rationale: La preposición expresa origen. Dado el uso convencional de κύριος en citas bíblicas y la decisión del proyecto de usar 'Yahvé' para el nombre divino, 'del Señor' conserva el auditable vínculo con la cita veterotestamentaria tal como se refleja en el texto griego y en la tradición de citación del NT.
- source_word: θαυμαστὴ
  english_pob_choice: marvelous
  chosen_spanish: admirable
  alternatives_spanish:
  - maravillosa
  - asombrosa
  lexicon: BDAG
  rationale: El adjetivo señala algo digno de admiración o asombro. 'Admirable' conserva el tono elevado de la cita y funciona con naturalidad en español bíblico.
- source_word: ἐν ὀφθαλμοῖς ἡμῶν
  english_pob_choice: in our eyes
  chosen_spanish: en nuestros ojos
  alternatives_spanish:
  - a nuestros ojos
  - a nuestra vista
  lexicon: BDAG
  rationale: Se mantiene la imagen idiomática de percepción. 'En nuestros ojos' es fiel al griego y conserva la metáfora de valoración perceptiva.
theological_decisions:
- issue: Rendering of κύριος in the Psalm citation
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: El griego de la cita dice κυρίου, y el texto inglés POB conserva 'Lord' con nota sobre el hebreo subyacente. En español, 'Señor' mantiene la transparencia respecto del griego y evita anticipar en el cuerpo principal una sustitución editorial del nombre divino que no está en la forma griega citada.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Stone imagery and messianic application
  english_pob_reading: Retain the metaphor without interpretive expansion
  chosen_spanish_reading: Mantener la metáfora sin ampliación interpretativa
  alternative_spanish_readings:
  - identificar explícitamente la piedra con el Mesías
  - glosar la piedra como Cristo en el texto principal
  rationale: La frase citada presenta la imagen del Salmo tal como está formulada. Aunque el contexto la aplica a Jesús, la traducción no debe insertar una interpretación que el enunciado citado no explicita.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés del POB, conservando el presente histórico como pasado narrativo natural en español, el énfasis del demostrativo, el valor resultativo de ἐγενήθη, y la tensión auditada entre κυρίου en griego y el nombre divino del texto hebreo subyacente. No se hicieron revisiones respecto del pasaje revisado más reciente en el registro fuente, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene 'las Escrituras' para γραφαῖς, en armonía con el uso bíblico español estándar.
  - Se usa 'Señor' para κυρίου en el cuerpo principal, con nota sobre el trasfondo hebreo para preservar la transparencia textual.
  - '''Piedra angular'' se emplea como equivalente idiomático español de κεφαλὴν γωνίας, con nota sobre la literalidad griega.'
  - '''Admirable'' refleja el tono de θαυμαστὴ sin forzar una ampliación doctrinal.'
  - Se conserva la metáfora de la piedra sin identificarla explícitamente con el Mesías en el texto principal.
