revisions:
- from: 'Jesús les dijo[a]: «¿Nunca han leído en las Escrituras: “La piedra que los constructores desecharon[b], esta se ha convertido en la piedra angular[c]. Esto vino del Señor[d], y es admirable en nuestros ojos”?»'
  to: 'Jesús les dijo: «¿Nunca han leído en las Escrituras: “La piedra que los constructores desecharon, esta se ha convertido en la piedra angular[a]. Esto vino del Señor[b], y es admirable a nuestros ojos”?»'
  rationale: Se reubicó la nota léxica al término correcto («piedra angular»), se eliminó nota redundante sobre «desecharon», se conservó la nota teológicamente pertinente sobre «Señor / Yahvé», y se ajustó el modismo final a «a nuestros ojos» para mejor español sin perder fidelidad. El resto del borrador refleja adecuadamente el griego y el expediente inglés.
