translation:
  language: es
  text: 'Y les dice[a]: «Está escrito[b]: “Mi casa será llamada casa de oración”, pero ustedes la están haciendo una cueva de ladrones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jesús combina Isaías 56:7 con Jeremías 7:11.
    reason: cross_reference
  - marker: b
    text: O «bandoleros». El término griego puede referirse a ladrones o a brigantes violentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice», que mantiene la viveza narrativa de Mateo; «dijo» suaviza ese rasgo.
- source_word: Γέγραπται
  english_pob_choice: It is written
  chosen_spanish: Está escrito
  alternatives_spanish:
  - Ha sido escrito
  - Se ha escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva se vierte con una expresión natural y solemne en español, preservando el valor durativo y autoritativo de la cita bíblica.
- source_word: οἶκός μου
  english_pob_choice: My house
  chosen_spanish: Mi casa
  alternatives_spanish:
  - Mi templo
  lexicon: BDAG
  rationale: Se mantiene «casa» por fidelidad al sustantivo griego οἶκος y para no estrechar el sentido con «templo», que ya interpreta el texto.
- source_word: οἶκος προσευχῆς
  english_pob_choice: a house of prayer
  chosen_spanish: casa de oración
  alternatives_spanish:
  - casa para oración
  - casa orante
  lexicon: BDAG
  rationale: La construcción genitiva se reproduce con la expresión bíblica natural «casa de oración», que conserva el eco de Isaías 56:7 sin sonar forzada.
- source_word: κληθήσεται
  english_pob_choice: will be called
  chosen_spanish: será llamada
  alternatives_spanish:
  - será nombrada
  lexicon: BDAG
  rationale: El futuro pasivo se expresa de forma directa en español; «será llamada» conserva la pasividad y la promesa profética.
- source_word: ποιεῖτε
  english_pob_choice: are making
  chosen_spanish: están haciendo
  alternatives_spanish:
  - hacen
  - la están convirtiendo en
  lexicon: BDAG
  rationale: El presente progresivo comunica la acción en curso; «están haciendo» mantiene proximidad con el verbo griego y evita una paráfrasis más interpretativa.
- source_word: σπήλαιον
  english_pob_choice: den
  chosen_spanish: cueva
  alternatives_spanish:
  - guarida
  - antros
  lexicon: BDAG
  rationale: En español, «cueva» reproduce el valor concreto de σπήλαιον y permite un vínculo natural con Jeremías 7:11; «guarida» sería más idiomático en algunos contextos, pero introduce una metáfora animal menos ajustada al sustantivo.
- source_word: λῃστῶν
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - bandoleros
  - salteadores
  lexicon: BDAG
  rationale: «Ladrones» es una opción clara y ampliamente inteligible en español; conserva el juicio acusatorio del texto, aunque «bandoleros/salteadores» podrían reflejar mejor la idea de brigantes violentos.
theological_decisions:
- issue: Intertextualidad con Isaías 56:7 y Jeremías 7:11
  english_pob_reading: Jesus combines Isaiah 56:7 with Jeremiah 7:11.
  chosen_spanish_reading: La redacción conserva el lenguaje reconocible de Isaías 56:7 en «casa de oración» y el de Jeremías 7:11 en «cueva de ladrones».
  alternative_spanish_readings:
  - Una paráfrasis más libre que oculte el enlace entre ambos textos
  rationale: La frase de Jesús es una cita compuesta/alusión profética; la traducción debe dejar visibles ambos trasfondos bíblicos para mantener la transparencia exegética.
  doctrine_reference: Principios de transparencia textual y de intertextualidad del POB
- issue: Valor del sustantivo οἶκος aplicado al lugar santo
  english_pob_reading: My house
  chosen_spanish_reading: Mi casa
  alternative_spanish_readings:
  - Mi templo
  rationale: «Casa» preserva el término del original y evita reducir prematuramente el alcance teológico de la expresión; el contexto permite entender su referencia al lugar de culto sin imponerla en la traducción.
  doctrine_reference: Principio de no sobreinterpretación léxica
- issue: λῃστῶν y su posible amplitud semántica
  english_pob_reading: robbers / bandits
  chosen_spanish_reading: ladrones
  alternative_spanish_readings:
  - bandoleros
  - salteadores
  rationale: En español, «ladrones» comunica con claridad la acusación moral y mantiene la referencia bíblica; otras opciones pueden expresar mejor la violencia del término, pero son menos naturales para una lectura eclesial amplia.
  doctrine_reference: Principio de equivalencia funcional controlada
translation_notes:
  revision_awareness: El texto sigue de cerca la estructura del griego SBLGNT y conserva el presente histórico de λέγει, la fórmula autoritativa Γέγραπται y la intertextualidad explícita con Isaías 56:7 y Jeremías 7:11. La principal decisión española es usar «cueva de ladrones» para reflejar con naturalidad σπήλαιον λῃστῶν; esta opción se mantiene inteligible y auditables respecto del griego y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según corresponda, pero este versículo no contiene el nombre divino explícito.
  - Se conserva un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - «Casa de oración» se deja como fórmula estable por su fuerte resonancia intertextual y eclesial.
