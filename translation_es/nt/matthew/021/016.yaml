translation:
  language: es
  text: 'Y ellos le dijeron: «¿Oyes lo que estos dicen?», pero Jesús les dice: «Sí. ¿Nunca leyeron: “De la boca de infantes y de niños de pecho[a] has preparado alabanza”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Jesús está citando el Salmo 8:2 según la tradición textual griega. El texto hebreo suele traducirse: «De la boca de infantes y de niños de pecho has establecido fuerza».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀκούεις
  english_pob_choice: Do you hear
  chosen_spanish: ¿Oyes
  alternatives_spanish:
  - ¿Escuchas
  - ¿Estás oyendo
  lexicon: BDAG
  rationale: Interrogación directa en presente; «oír» comunica de manera natural la pregunta retadora y conserva el valor inmediato del verbo griego sin recargarlo.
- source_word: τί οὗτοι λέγουσιν
  english_pob_choice: what these are saying
  chosen_spanish: lo que estos dicen
  alternatives_spanish:
  - lo que estos están diciendo
  - lo que estas personas dicen
  lexicon: BDAG
  rationale: El griego usa el presente λέγουσιν; en español, el presente simple funciona bien y evita una perífrasis innecesaria. «Estos» mantiene la leve nota despectiva o señaladora de οὗτοι.
- source_word: λέγει
  english_pob_choice: Jesus says
  chosen_spanish: Jesús les dice
  alternatives_spanish:
  - Jesús les dijo
  - Jesús responde
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice». Añadí «les» porque el destinatario está explícito en αὐτοῖς.
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Ciertamente
  lexicon: BDAG
  rationale: Afirmación breve y directa; «Sí» es la equivalencia más natural y fiel.
- source_word: οὐδέποτε ἀνέγνωτε
  english_pob_choice: Have you never read
  chosen_spanish: ¿Nunca leyeron
  alternatives_spanish:
  - ¿No han leído nunca
  - ¿Acaso nunca leyeron
  lexicon: BDAG
  rationale: Para la reprensión retórica, el pretérito perfecto compuesto o el pretérito simple son posibles; «¿Nunca leyeron?» suena natural en español y conserva el reproche de la pregunta.
- source_word: Ἐκ στόματος
  english_pob_choice: Out of the mouth of
  chosen_spanish: De la boca de
  alternatives_spanish:
  - De la boca
  - Desde la boca de
  lexicon: BDAG
  rationale: «De la boca de» reproduce el valor de ἐκ/στόματος con español claro y bíblico, sin volverlo más literal de lo necesario.
- source_word: νηπίων
  english_pob_choice: infants
  chosen_spanish: de los niños
  alternatives_spanish:
  - de los infantes
  - de los pequeñitos
  lexicon: BDAG
  rationale: Aunque νήπιοι puede significar «infantes», en español «niños» comunica mejor el contraste general del pasaje y evita una redundancia extraña con la segunda expresión.
- source_word: θηλαζόντων
  english_pob_choice: nursing babies
  chosen_spanish: de los que maman
  alternatives_spanish:
  - de los lactantes
  - de los que están mamando
  lexicon: BDAG
  rationale: La idea es la de quienes aún están siendo alimentados al pecho. «Los que maman» es sobrio, fiel y mantiene el paralelismo con νηπίων sin introducir tecnicismos.
- source_word: κατηρτίσω
  english_pob_choice: you have prepared
  chosen_spanish: has preparado
  alternatives_spanish:
  - has dispuesto
  - has establecido
  lexicon: BDAG
  rationale: El verbo griego, en esta cita, expresa el acto de preparar/disponer. «Has preparado» sigue de cerca la lectura griega que Mateo cita.
- source_word: αἶνον
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise
  - loores
  lexicon: BDAG
  rationale: «Alabanza» es el equivalente natural en español para αἶνος en este contexto de cita bíblica.
theological_decisions:
- issue: Cita de Salmo 8:2 según la tradición griega frente al hebreo
  english_pob_reading: Use Matthew's Greek wording 'you have prepared praise' in the main text; preserve the Hebrew-based wording in a footnote
  chosen_spanish_reading: Mantener en el texto principal «has preparado alabanza» y notar en la nota la variante hebrea «has establecido fuerza»
  alternative_spanish_readings:
  - «has establecido fuerza»
  - «has fundado poder»
  rationale: Mateo cita la versión griega de las Escrituras, no una armonización con el hebreo. Por eso el texto principal sigue la redacción de Mateo, pero se preserva la variante hebrea para lectores que conozcan el Salmo en su forma masorética.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor del término αἶνος en la cita
  english_pob_reading: praise
  chosen_spanish_reading: alabanza
  alternative_spanish_readings:
  - alabanza de Dios
  - loor
  rationale: En español, «alabanza» transmite de forma natural el sustantivo abstracto del griego y evita cargar el verso con una expresión más interpretativa.
  doctrine_reference: 'Lexical consistency: αἶνος -> praise/alabanza'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador se alinea con el pase final aprobado y con el alta coincidencia del control cruzado.
  spanish_consistency_notes:
  - Se mantiene el presente histórico de «dice» para reflejar el griego narrativo.
  - Se conserva «alabanza» para αἶνος, coherente con la cita griega de Mateo.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino en el enunciado principal, por lo que no se introduce.
  - La nota de la cita distingue cuidadosamente la versión griega citada por Mateo de la redacción hebrea del Salmo 8:2.
