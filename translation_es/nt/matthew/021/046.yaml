translation:
  language: es
  text: Y aunque estaban procurando prenderlo[a], temieron a las multitudes, porque lo tenían por profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo consideraban profeta» o «lo tenían por profeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητοῦντες
  english_pob_choice: although they were seeking
  chosen_spanish: y aunque estaban procurando
  alternatives_spanish:
  - buscándolo
  - aunque lo buscaban
  - aunque intentaban
  lexicon: BDAG
  rationale: El participio presente expresa una acción en curso con matiz concesivo en el contexto; por eso se vierte con «aunque estaban procurando», manteniendo la relación con el verbo principal y el carácter intentado de la acción.
- source_word: κρατῆσαι
  english_pob_choice: to arrest
  chosen_spanish: arrestarlo
  alternatives_spanish:
  - apoderarse de él
  - prenderlo
  - capturarlo
  lexicon: BDAG
  rationale: En este contexto hostil, el verbo no describe solo tomar físicamente, sino detenerlo o apresarlo; «arrestarlo» comunica la fuerza de la intención de una manera natural en español contemporáneo.
- source_word: ἐφοβήθησαν
  english_pob_choice: they feared
  chosen_spanish: temieron
  alternatives_spanish:
  - tuvieron miedo de
  - les temieron
  lexicon: BDAG
  rationale: El aoristo se expresa con un pasado simple en español. «Temieron» conserva la construcción directa con el objeto plural «a las multitudes» sin añadir matices no presentes en el griego.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a la multitud
  - a la gente
  lexicon: BDAG
  rationale: El plural griego se refleja mejor con «las multitudes» que con un singular colectivo. Se usa la preposición personal española «a» por tratarse de personas.
- source_word: ἐπεὶ εἰς
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - pues
  lexicon: BDAG
  rationale: La frase introduce la causa de su temor; «porque» es la equivalencia más directa y clara en español. No se fuerza la forma griega de la construcción causal, sino que se expresa su función.
- source_word: εἰς προφήτην αὐτὸν εἶχον
  english_pob_choice: they regarded him as a prophet
  chosen_spanish: lo tenían por profeta
  alternatives_spanish:
  - lo consideraban profeta
  - lo estimaban como profeta
  - lo tenían como profeta
  lexicon: BDAG
  rationale: La construcción idiomática con ἔχω + εἰς se expresa bien en español con «tener por». Preserva la idea de estimación/percepción de la multitud sin resolver la tensión cristológica del pasaje.
- source_word: προφήτην
  english_pob_choice: a prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - un profeta
  lexicon: BDAG
  rationale: El acusativo anartro con εἰς puede sonar indefinido; en español, «por profeta» suena natural y mantiene la categoría que la multitud atribuía a Jesús.
theological_decisions:
- issue: Cómo reflejar la percepción de la multitud sobre Jesús sin reducir su identidad a esa sola etiqueta
  english_pob_reading: they regarded him as a prophet
  chosen_spanish_reading: lo tenían por profeta
  alternative_spanish_readings:
  - lo consideraban profeta
  - lo tenían como profeta
  rationale: El versículo informa la evaluación de la multitud, no una definición exhaustiva de Jesús. «Lo tenían por profeta» conserva esa perspectiva narrativa y evita tanto suavizarla como convertirla en una afirmación doctrinal completa.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La revisión reciente del texto base no introdujo cambios: el análisis auditado coincide en alto grado con la traducción inglesa POB y no requiere ajuste adicional. Se conserva la concesión del participio, la causalidad de la cláusula y la tensión narrativa sobre la percepción de Jesús.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se evita «Cristo» porque el texto habla de la percepción de la multitud como profeta, no de un título mesiánico explícito.
  - La puntuación sigue la norma española y respeta la pausa causal del verso.
