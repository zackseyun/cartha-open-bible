translation:
  language: es
  text: Y todo lo que pidan en oración[a], creyendo[b], lo recibirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que pidan» o «cuanto pidan».
    reason: lexical_alternative
  - marker: b
    text: O «confiando»; el participio griego expresa creer como una acción concurrente al pedir.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ὅσα
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - cuanto
  - todo aquello que
  lexicon: BDAG
  rationale: La combinación de πᾶς con ὅσος expresa un alcance abierto y total. En español, «todo lo que» reproduce de forma natural ese sentido inclusivo sin perder la amplitud del griego.
- source_word: αἰτήσητε
  english_pob_choice: you ask
  chosen_spanish: pidan
  alternatives_spanish:
  - pidáis
  - soliciten
  - pedirán
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo con ἄν forma una cláusula indefinida: «todo lo que pidan». En español, el presente de subjuntivo en segunda/tercera persona plural mantiene bien la apertura indefinida del griego.'
- source_word: ἐν τῇ προσευχῇ
  english_pob_choice: in prayer
  chosen_spanish: en oración
  alternatives_spanish:
  - mientras oran
  - en la oración
  lexicon: BDAG
  rationale: La frase dativa se vierte de manera idiomática como «en oración». «Oración» conserva el sustantivo y evita convertir la expresión en una paráfrasis verbal que desplace el foco del griego.
- source_word: πιστεύοντες
  english_pob_choice: believing
  chosen_spanish: creyendo
  alternatives_spanish:
  - confiando
  - si creen
  lexicon: BDAG
  rationale: El participio presente expresa una acción concurrente con el pedir. «Creyendo» reproduce esa simultaneidad y conserva la relación entre oración y fe sin transformar la frase en una condición explícita que el griego no formula.
- source_word: λήμψεσθε
  english_pob_choice: you will receive
  chosen_spanish: lo recibirán
  alternatives_spanish:
  - recibirán
  - obtendrán
  lexicon: BDAG
  rationale: El futuro de λαμβάνω se traduce con naturalidad como «recibir». El complemento implícito se expresa con «lo» para hacer fluida la referencia en español y mantener el valor resultativo de la promesa.
theological_decisions:
- issue: Relación entre fe y oración contestada
  english_pob_reading: Render the participle straightforwardly as 'believing' rather than making it an explicit condition such as 'if you believe.'
  chosen_spanish_reading: Traducir el participio como «creyendo» y no como una condición explícita («si creen»).
  alternative_spanish_readings:
  - si creen
  - con tal de que crean
  - cuando crean
  rationale: El griego usa un participio, no una cláusula condicional formal. Mantener «creyendo» preserva la tensión teológica y sintáctica del texto sin resolver de antemano cómo funciona exactamente la relación entre fe y respuesta a la oración.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y el criterio auditado de la POB en inglés: abarca la expresión totalizante de πάντα ὅσα con «todo lo que», conserva el participio de πιστεύοντες como acción concurrente («creyendo») y mantiene el futuro de promesa con «lo recibirán» sin añadir una condición explícita que el griego no presenta.'
  spanish_consistency_notes:
  - Se usa «oración» para ἐν τῇ προσευχῇ, manteniendo el registro eclesial general sin cargarlo con un giro demasiado literal.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el versículo.
  - La forma «lo recibirán» conserva el tono de promesa y fluidez en español, aunque el objeto es implícito en el griego y puede entenderse de manera general.
