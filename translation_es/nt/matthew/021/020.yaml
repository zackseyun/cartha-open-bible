translation:
  language: es
  text: 'Y cuando los discípulos lo vieron, se maravillaron, diciendo: «¿Cómo se secó de inmediato la higuera?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when ... saw it
  chosen_spanish: cuando ... lo vieron
  alternatives_spanish:
  - al verlo
  - después de verlo
  lexicon: BDAG
  rationale: El participio aoristo se expresa de modo temporal natural en español con «cuando». El objeto implícito se hace explícito con «lo», referido al hecho/la escena de la higuera ya marchita, porque el español requiere complemento directo claro.
- source_word: ἐθαύμασαν
  english_pob_choice: they marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - se quedaron maravillados
  lexicon: BDAG
  rationale: θαυμάζω comunica asombro o maravilla. «Se maravillaron» conserva el registro digno del original y refleja bien la reacción de los discípulos.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio presente se traduce como fórmula de discurso acompañante. «Diciendo» mantiene el flujo griego sin volverlo artificial en español.
- source_word: Πῶς
  english_pob_choice: How did
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera
  - ¿Cómo fue que
  lexicon: BDAG
  rationale: La pregunta introduce la manera del acontecimiento. En español, «¿Cómo...?» es la formulación más natural y fiel.
- source_word: παραχρῆμα
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: παραχρῆμα significa «de inmediato / al instante». Se eligió «de inmediato» por su claridad y registro formal, siguiendo la revisión inglesa que prefirió una equivalencia más directa.
- source_word: ἐξηράνθη
  english_pob_choice: wither
  chosen_spanish: se secó
  alternatives_spanish:
  - se marchitó
  - se secó por completo
  lexicon: BDAG
  rationale: El aoristo pasivo de ξηραίνω aquí describe a la higuera volviéndose seca o marchita. En español, «se secó» es natural para una planta y comunica bien el resultado visible.
- source_word: ἡ συκῆ
  english_pob_choice: the fig tree
  chosen_spanish: la higuera
  alternatives_spanish:
  - la higuera misma
  lexicon: BDAG
  rationale: συκῆ designa específicamente la higuera. «La higuera» es la forma estándar y clara en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «so quickly» por «immediately» para reflejar más directamente παραχρῆμα y elevar el registro; por eso el español usa «de inmediato» en vez de una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene el sujeto explícito «los discípulos», como en el griego.
  - No se añade nota textual porque el pasaje es estable y no presenta variante relevante en el paquete fuente.
  - 'Se conserva el orden narrativo del original: ver → maravillarse → hablar → pregunta sobre el tiempo inmediato.'
  - «La higuera» traduce συκῆ de forma estándar, sin suavizar el sentido botánico.
