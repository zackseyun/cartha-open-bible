revisions:
- from: Y al oírlo los principales sacerdotes y los fariseos[a] sus parábolas, comprendieron que hablaba acerca de ellos.
  to: Y cuando los principales sacerdotes y los fariseos oyeron sus parábolas[a], comprendieron que hablaba acerca de ellos.
  rationale: Se corrige la sintaxis para que el objeto «sus parábolas» dependa claramente de «oyeron», en conformidad con el griego ἀκούσαντες ... τὰς παραβολὰς αὐτοῦ. También se reubica la nota al lugar pertinente para preservar la alternativa léxica documentada y evitar ambigüedad en español.
