translation:
  language: es
  text: Y cuando los principales sacerdotes y los fariseos oyeron sus parábolas[a], comprendieron que hablaba acerca de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «con respecto a ellos»; el sentido es que reconocieron que las parábolas iban dirigidas a ellos. Algunas traducciones lo interpretan más explícitamente: «contra ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when [they] heard
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando oyeron
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente antes del verbo principal. En español, «al oírlo» expresa bien la simultaneidad/precedencia inmediata sin añadir más contenido que el del griego.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: El plural alude al liderazgo sacerdotal de alto rango. «Principales sacerdotes» es una forma clara y natural en español para el grupo dirigente, y evita sugerir erróneamente varios titulares del sumo sacerdocio.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Nombre de grupo religioso judío; se translitera de manera convencional en español.
- source_word: παραβολὰς
  english_pob_choice: parables
  chosen_spanish: parábolas
  alternatives_spanish:
  - ilustraciones
  - figuras
  lexicon: BDAG
  rationale: «Parábolas» conserva la categoría literaria reconocible en los Evangelios y corresponde de manera directa al término griego.
- source_word: ἔγνωσαν
  english_pob_choice: they knew
  chosen_spanish: comprendieron
  alternatives_spanish:
  - supieron
  - se dieron cuenta
  lexicon: BDAG
  rationale: Aquí el verbo expresa que llegaron a reconocer el sentido de las parábolas. «Comprendieron» mantiene el valor de reconocimiento sin sonar menos natural que un simple «supieron» en este contexto.
- source_word: περὶ αὐτῶν
  english_pob_choice: about them
  chosen_spanish: acerca de ellos
  alternatives_spanish:
  - sobre ellos
  - concerning them
  lexicon: BDAG
  rationale: La preposición περί con genitivo significa normalmente «acerca de/con respecto a». «Acerca de ellos» preserva esa relación sin imponer en la línea principal la lectura más fuerte «contra ellos».
- source_word: λέγει
  english_pob_choice: he was speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - estaba hablando
  - decía
  lexicon: BDAG
  rationale: En discurso indirecto, el presente griego se puede verter naturalmente en español como imperfecto («hablaba»), que expresa la acción en curso en el momento de su decir.
theological_decisions:
- issue: Si hacer explícita una lectura adversativa («contra ellos») en la traducción principal
  english_pob_reading: he was speaking about them
  chosen_spanish_reading: hablaba acerca de ellos
  alternative_spanish_readings:
  - hablaba contra ellos
  rationale: El griego usa περί con genitivo, que lexicalmente significa «acerca de/con respecto a». Aunque el contexto sugiere una confrontación implícita, la traducción principal no debe intensificar el matiz a «contra» sin base léxica directa. Se preserva así la tensión interpretativa del texto.
  doctrine_reference: 'Principio POB: no importar en la traducción principal una carga teológica o retórica que el texto no exprese explícitamente.'
translation_notes:
  revision_awareness: Se revisó el auditorio lingüístico del texto griego y el antecedente de la versión inglesa POB. La edición inglesa ya marcó la alternativa «concerning them / against them»; en español se preserva esa tensión con «acerca de ellos» y una nota que deja abierta la lectura más interpretativa sin adoptar esa intensificación en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene el tratamiento en plural para οἱ ἀρχιερεῖς y οἱ Φαρισαῖοι.
  - No se introducen términos eclesiásticos tradicionales ajenos al griego; se conserva la designación de grupo religioso.
  - El sujeto implícito de λέγει se entiende por el contexto como Jesús, pero no se añade para no sobrecargar el versículo.
  - La puntuación y el orden buscan una cadencia natural en español sin perder la secuencia del griego.
