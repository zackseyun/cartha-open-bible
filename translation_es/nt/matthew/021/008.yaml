review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la mayor parte de la multitud extiende sus prendas en la vía, mientras otros cortan ramas y las extienden también. Conserva adecuadamente la progresión narrativa de δέ, el valor distributivo de ἄλλοι, y el imperfecto en la segunda mitad. Sin embargo, ''en el camino'' suena menos preciso para objetos puestos sobre la superficie; en este contexto físico, ''sobre el camino'' expresa mejor ἐν τῇ ὁδῷ según la misma lógica del POB inglés (''on the road'').'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor de naturalidad/precisión espacial. 'Tendió sus mantos' funciona bien, y 'estaban cortando ramas' es natural. La repetición con 'las tendían en el camino' es comprensible, pero mejora con 'sobre el camino'.
  glossary_alignment: No hay términos teológicos sensibles aquí. 'Mantos' es aceptable para ἱμάτια, y la nota léxica preserva la amplitud semántica. La decisión concuerda razonablemente con el rastro inglés, aunque conviene mantener la nota alternativa. No hay conflicto con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: La frase 'en el camino' para ἐν τῇ ὁδῷ es menos exacta que 'sobre el camino' en este contexto.
    rationale: El texto describe prendas y ramas extendidas sobre la superficie del trayecto. En español, 'en el camino' puede sonar locativo general ('dentro de la ruta' o 'a lo largo del camino'), mientras que 'sobre el camino' comunica mejor la acción física de tender algo encima.
  - severity: low
    issue: La nota de 'mantos' incluye dos alternativas, pero el rastro inglés solo preserva explícitamente 'garments/cloaks'.
    rationale: 'No es un error grave, pero conviene una nota más ceñida al rango léxico relevante y al audit trail: ''vestiduras'' o ''capas'' es suficiente, sin ampliar innecesariamente.'
  revised_spanish_text: Ahora la mayor parte de la multitud tendió sus mantos[a] sobre el camino, y otros estaban cortando ramas de los árboles y las tendían sobre el camino.
  revised_footnotes:
  - marker: a
    text: «Mantos» puede también traducirse como «vestiduras» o «capas».
    reason: lexical_alternative
  revision_rationale: Se ajusta 'en el camino' a 'sobre el camino' en ambas ocurrencias para reflejar mejor la imagen física del griego y la decisión documentada en inglés ('on the road'). Se mantiene 'mantos' como opción española natural y eclesialmente legible, con una nota léxica más ceñida.
