translation:
  language: es
  text: Ahora la mayor parte de la multitud tendió sus mantos[a] sobre el camino, y otros estaban cortando ramas de los árboles y las tendían sobre el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mantos» puede también traducirse como «vestiduras» o «capas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ πλεῖστος ὄχλος
  english_pob_choice: Now most of the crowd
  chosen_spanish: Ahora la mayor parte de la multitud
  alternatives_spanish:
  - Ahora la mayoría de la multitud
  - Ahora la gran multitud
  lexicon: BDAG
  rationale: πλεῖστος con un sustantivo colectivo expresa 'la mayor parte' o 'la mayoría'; ὄχλος se traduce naturalmente como 'multitud'. El δέ marca avance narrativo, aquí expresado con 'Ahora'.
- source_word: ἔστρωσαν
  english_pob_choice: spread
  chosen_spanish: tendió
  alternatives_spanish:
  - extendió
  - esparció
  lexicon: BDAG
  rationale: στρώννυμι en este contexto es 'extender o colocar sobre una superficie'. En español, 'tender' comunica bien la acción de poner mantos sobre el camino sin perder naturalidad.
- source_word: ἑαυτῶν τὰ ἱμάτια
  english_pob_choice: their garments
  chosen_spanish: sus mantos
  alternatives_spanish:
  - sus vestidos
  - sus ropas
  lexicon: BDAG
  rationale: ἱμάτια designa ropa exterior o prendas de encima; en este pasaje, 'mantos' es un equivalente idiomático claro y tradicionalmente comprensible en español, aunque el inglés POB optó por la forma más general 'garments'. La posesión explícita queda suficientemente reflejada por 'sus'.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - sobre el camino
  - en la vía
  lexicon: BDAG
  rationale: ὁδός aquí refiere al trayecto físico por donde pasa Jesús. 'En el camino' suena natural en español y conserva la imagen espacial del texto.
- source_word: ἄλλοι δὲ
  english_pob_choice: and others
  chosen_spanish: y otros
  alternatives_spanish:
  - pero otros
  - entonces otros
  lexicon: BDAG
  rationale: La partícula δέ introduce un segundo grupo dentro de la multitud; 'y otros' mantiene el flujo narrativo sin cargar una oposición demasiado fuerte.
- source_word: ἔκοπτον
  english_pob_choice: were cutting
  chosen_spanish: estaban cortando
  alternatives_spanish:
  - cortaban
  - iban cortando
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso; 'estaban cortando' preserva ese aspecto progresivo en español.
- source_word: κλάδους ἀπὸ τῶν δένδρων
  english_pob_choice: branches from the trees
  chosen_spanish: ramas de los árboles
  alternatives_spanish:
  - ramas de los árboles
  - renuevos de los árboles
  lexicon: BDAG
  rationale: κλάδους se refiere a ramas o ramos; 'ramas' es la opción más clara y natural en español. ἀπό se expresa sencillamente con 'de'.
- source_word: καὶ ἐστρώννυον
  english_pob_choice: and spreading them
  chosen_spanish: y las tendían
  alternatives_spanish:
  - y las extendían
  - y las colocaban
  lexicon: BDAG
  rationale: El segundo imperfecto mantiene la acción continua; 'las tendían' retoma el mismo verbo conceptual de ἔστρωσαν y evita una repetición torpe mientras conserva la progresión del relato.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: conserva el valor aspectual de los imperfectos con perífrasis progresivas, y mantiene la escena concreta de la multitud extendiendo prendas y ramas sobre el camino. Se optó por ''mantos'' como equivalente español más idiomático de ἱμάτια en este contexto, sin borrar que el término griego es más amplio que una sola prenda.'
  spanish_consistency_notes:
  - Se mantiene 'camino' para ὁδός por consistencia con el sentido físico del pasaje.
  - Se conserva la repetición de la imagen espacial al final del versículo.
  - La alternancia 'tendió / las tendían' ayuda a reflejar los dos imperfectos griegos sin forzar una traducción demasiado literal.
