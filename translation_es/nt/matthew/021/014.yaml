translation:
  language: es
  text: Y se le acercaron ciegos y cojos en el templo[a], y los sanó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθον
  english_pob_choice: came
  chosen_spanish: se le acercaron
  alternatives_spanish:
  - vinieron a él
  - se acercaron
  lexicon: BDAG
  rationale: El verbo προσέρχομαι expresa venir o acercarse hacia alguien. En español, «se le acercaron» comunica naturalmente el movimiento hacia Jesús y conserva el sentido relacional del dativo sin añadir matices innecesarios.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: BDAG
  rationale: Con un verbo de acercamiento, el dativo pronominal se expresa de manera más natural en español con «se le acercaron», que integra el destinatario del movimiento sin recargar la frase.
- source_word: τυφλοὶ
  english_pob_choice: the blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - los ciegos
  - personas ciegas
  lexicon: BDAG
  rationale: El adjetivo está usado sustantivamente en plural. En español, «ciegos» conserva esa fuerza sustantiva de modo breve y directo. Se omite el artículo inicial por fluidez sintáctica en esta coordinación.
- source_word: χωλοὶ
  english_pob_choice: the lame
  chosen_spanish: cojos
  alternatives_spanish:
  - los cojos
  - lisiados
  lexicon: BDAG
  rationale: El adjetivo sustantivado χωλοὶ designa a quienes tienen dificultad para caminar. «Cojos» es el equivalente directo y natural en español; «lisiados» sería más interpretativo y menos preciso.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior. «En el templo» es la forma idiomática principal en español; las alternativas preservan la amplitud espacial si se quisiera explicitarla.
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: los sanó
  alternatives_spanish:
  - los curó
  - los sanó y los curó
  lexicon: BDAG
  rationale: En contextos de milagro en los Evangelios, θεραπεύω significa sanar. «Los sanó» es claro, bíblico y adecuado para narración, sin desplazar el matiz de curación/terapia implícito en el verbo.
theological_decisions:
- issue: Alcance de ἱερόν (recinto del templo)
  english_pob_reading: Jesus healed them in the temple complex.
  chosen_spanish_reading: Jesús los sanó en el templo, entendiendo el lugar como el recinto o complejo del templo.
  alternative_spanish_readings:
  - Jesús los sanó en los atrios del templo.
  - Jesús los sanó en el recinto del templo.
  rationale: El griego usa ἱερόν, que suele denotar el conjunto del templo y sus áreas, no el santuario interior (ναός). La traducción base «en el templo» es idiomática y correcta; la nota preserva la precisión espacial sin sobrecargar el texto principal.
  doctrine_reference: Precisión léxica y espacial del texto; distinción μεταξύ ἱερόν y ναός
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el testimonio griego SBLGNT y con el audit trail inglés; no se requieren revisiones textuales ni ajustes de crítica textual. Se mantiene la decisión de traducir ἱερόν con una forma idiomática y de reservar la precisión espacial para la nota.
  spanish_consistency_notes:
  - Se mantiene «templo» para ἱερόν en el texto principal, siguiendo una equivalencia idiomática natural.
  - Se conserva la fuerza sustantiva de los adjetivos griegos con «ciegos» y «cojos».
  - Se usa «sanó» para θεραπεύω en contexto de milagro, coherente con el registro narrativo de los Evangelios.
