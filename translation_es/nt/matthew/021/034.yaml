translation:
  language: es
  text: Pero cuando se acercó la temporada de los frutos, envió a sus siervos[a] a los arrendatarios[b] para recoger sus frutos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus esclavos'. El griego doulous puede significar tanto 'siervos' como 'esclavos'; aquí se escogió 'siervos' porque la parábola enfatiza su función como representantes del dueño más que su condición servil.
    reason: lexical_alternative
  - marker: b
    text: O 'labradores', 'agricultores' o 'viñadores'. El griego geōrgous se refiere a cultivadores; aquí 'arrendatarios' hace explícito su papel de trabajar una viña ajena en esta parábola.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: BDAG
  rationale: ὅτε introduce una subordinada temporal ('cuando') y δέ aporta una transición leve; 'Pero cuando' conserva ese giro narrativo sin forzar un contraste fuerte.
- source_word: ἤγγισεν
  english_pob_choice: had drawn near
  chosen_spanish: se acercó
  alternatives_spanish:
  - había llegado cerca
  - se aproximó
  lexicon: BDAG
  rationale: El aoristo de ἐγγίζω expresa llegada o cercanía. En español, 'se acercó' es natural y mantiene la relación temporal sin añadir una pluperfecta innecesaria.
- source_word: ὁ καιρὸς
  english_pob_choice: the season
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la temporada
  - el momento oportuno
  lexicon: BDAG
  rationale: Aunque el contexto agrícola admite 'temporada', 'el tiempo' conserva el valor más amplio de καιρός como tiempo señalado u oportuno y suena fluido en español.
- source_word: τῶν καρπῶν
  english_pob_choice: for the fruits
  chosen_spanish: de los frutos
  alternatives_spanish:
  - para los frutos
  - de la cosecha
  lexicon: BDAG
  rationale: La frase griega señala el tiempo relacionado con la producción/fruto. 'De los frutos' refleja el genitivo sin ocultar la pluralidad que el texto griego y la revisión inglesa subrayan.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: Verbo narrativo estándar. 'Envió' es la equivalencia más directa y natural.
- source_word: τοὺς δούλους αὐτοῦ
  english_pob_choice: his servants
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: BDAG
  rationale: δοῦλος puede significar 'esclavo' o 'siervo'. Dado que el auditrail inglés preserva la tensión lexical con una nota de alternativa y que el término griego es fuerte, 'esclavos' mantiene el rango semántico sin suavizarlo indebidamente.
- source_word: πρὸς τοὺς γεωργοὺς
  english_pob_choice: to the tenant farmers
  chosen_spanish: a los labradores
  alternatives_spanish:
  - a los agricultores
  - a los arrendatarios
  lexicon: BDAG
  rationale: γεωργός designa a quien cultiva la tierra. 'Labradores' es un español bíblico claro y suficientemente amplio; evita especificar 'arrendatarios' sin que el verso lo diga explícitamente, aunque el contexto más amplio sí los caracteriza así.
- source_word: λαβεῖν
  english_pob_choice: to collect
  chosen_spanish: para recoger
  alternatives_spanish:
  - para recibir
  - para tomar
  lexicon: BDAG
  rationale: Aquí λαμβάνω expresa obtener lo que corresponde del producto. 'Recoger' comunica bien la acción de ir a obtener el fruto y es idiomático en contexto agrícola.
- source_word: τοὺς καρποὺς αὐτοῦ
  english_pob_choice: his fruits
  chosen_spanish: sus frutos
  alternatives_spanish:
  - su fruto
  - su cosecha
  lexicon: BDAG
  rationale: El plural griego y la revisión inglesa favorecen 'frutos'. En español, el plural preserva la forma del texto y su referencia al rendimiento de la viña.
translation_notes:
  revision_awareness: La revisión inglesa reciente reforzó dos plurales ('fruits'/'fruits') y eso se reflejó en español con 'frutos' y 'sus frutos', manteniendo la correspondencia con τῶν καρπῶν ... τοὺς καρποὺς.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - Se preservó la tensión lexical de δοῦλος mediante una nota de alternativa, ya que el contexto permite 'esclavos' o 'siervos'.
  - Se evitó introducir 'tenant' en el cuerpo porque no está explícito en el griego de este versículo; se explicó la opción contextual en la nota.
  - Se conservaron los plurales 'frutos' para alinearse con el griego y con la revisión del texto inglés.
