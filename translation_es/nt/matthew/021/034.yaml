    issue: δοῦλος fue traducido como 'esclavos' en lugar de la opción contextual documentada 'siervos'/'servidores'.
    rationale: El audit trail inglés explica expresamente que aquí se eligió 'servants' porque la parábola enfatiza su papel representativo como agentes del propietario más que su condición servil. El español debe reflejar esa misma rationale, no revertirla.
  - severity: medium
    issue: γεωργοὺς fue traducido como 'labradores', perdiendo la precisión contextual de arrendamiento.
    rationale: Aunque γεωργός por sí solo puede ser 'labrador' o 'cultivador', en esta parábola el contexto inmediato y el audit trail inglés justifican hacer explícito que son quienes trabajan una viña ajena. 'Arrendatarios' o 'labradores arrendatarios' preserva mejor esa función.
  - severity: low
    issue: '''el tiempo de los frutos'' es menos idiomático que una formulación agrícola más natural.'
    rationale: καιρός en este contexto apunta a temporada/época. 'La temporada de los frutos' suena más natural en español y mantiene la pluralidad destacada por la revisión inglesa.
  revised_spanish_text: Pero cuando se acercó la temporada de los frutos, envió a sus siervos[a] a los arrendatarios[b] para recoger sus frutos.
