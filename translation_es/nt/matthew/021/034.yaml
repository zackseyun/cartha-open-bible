  text: ὅτε δὲ ἤγγισεν ὁ καιρὸς τῶν καρπῶν, ἀπέστειλεν τοὺς δούλους αὐτοῦ πρὸς τοὺς γεωργοὺς λαβεῖν τοὺς καρποὺς αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/034.yaml
  text: But when the season for the fruits had drawn near[b][a], he sent his servants to the tenant farmers to collect his fruits.
  footnotes:
  - marker: a
    text: Or 'his slaves.' The Greek word doulous can mean either 'servants' or 'slaves'; here 'servants' was chosen because the parable emphasizes their representative role as the landowner's agents rather than their bonded status.
    reason: lexical_alternative
  - marker: b
    text: Or 'farmers,' 'tenants,' or 'vine-growers.' The Greek geōrgous refers to cultivators; 'tenant farmers' makes explicit their role in leasing and working another man's vineyard in this parable.
    reason: lexical_alternative
