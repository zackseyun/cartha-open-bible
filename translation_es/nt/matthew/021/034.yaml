- from: Pero cuando se acercó el tiempo de los frutos, envió a sus esclavos[a] a los labradores[b] para recoger sus frutos.
  to: Pero cuando se acercó la temporada de los frutos, envió a sus siervos[a] a los arrendatarios[b] para recoger sus frutos.
  rationale: Se ajusta δοῦλος a la decisión contextual documentada por el POB inglés ('siervos' en vez de 'esclavos'), se refleja mejor el contexto parabólico de γεωργοὺς con 'arrendatarios', y se mejora la naturalidad agrícola de καιρός con 'temporada' sin perder la pluralidad de 'frutos'.
