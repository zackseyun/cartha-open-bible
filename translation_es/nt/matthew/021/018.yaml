translation:
  language: es
  text: Muy de mañana, mientras regresaba a la ciudad, sintió hambre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πρωῒ
  english_pob_choice: early in the morning
  chosen_spanish: Temprano por la mañana
  alternatives_spanish:
  - Amaneciendo
  - Muy de mañana
  - Por la mañana temprano
  lexicon: BDAG
  rationale: El adverbio griego señala la parte temprana del día. «Temprano por la mañana» suena natural en español y conserva el valor temporal sin volverlo demasiado literario o rígido.
- source_word: ἐπανάγων
  english_pob_choice: as he was returning
  chosen_spanish: mientras regresaba
  alternatives_spanish:
  - al regresar
  - cuando regresaba
  - volviendo
  lexicon: BDAG
  rationale: El participio presente expresa acción simultánea con el verbo principal. «Mientras regresaba» comunica bien esa simultaneidad en español y evita un calco demasiado pesado.
- source_word: εἰς τὴν πόλιν
  english_pob_choice: to the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - a la ciudad
  - dentro de la ciudad
  lexicon: BDAG
  rationale: La preposición εἰς con acusativo indica movimiento hacia entrada o llegada. En español, «a la ciudad» es claro y natural; «hacia» debilitaría demasiado la idea de movimiento con destino.
- source_word: ἐπείνασεν
  english_pob_choice: he became hungry
  chosen_spanish: tuvo hambre
  alternatives_spanish:
  - se le despertó el hambre
  - se quedó con hambre
  - se sintió hambriento
  lexicon: BDAG
  rationale: El aoristo presenta el hecho de llegar a experimentar hambre. «Tuvo hambre» es la forma más natural y conserva el sentido eventivo sin sonar arcaica; además evita una paráfrasis innecesaria.
theological_decisions:
- issue: La hambre real de Jesús
  english_pob_reading: Translate the statement straightforwardly as a real experience of hunger.
  chosen_spanish_reading: Traducirlo como una experiencia real de hambre, sin suavizarla.
  alternative_spanish_readings:
  - se sintió con apetito
  - comenzó a tener apetito
  - pasó hambre
  rationale: El texto afirma de manera simple y concreta que Jesús sintió hambre. Mantenerlo así preserva el testimonio narrativo de su verdadera humanidad, sin añadir comentario doctrinal ni atenuar el rasgo físico del verso.
  doctrine_reference: Definición de Calcedonia (451 d. C., sobre las dos naturalezas de Cristo)
translation_notes:
  revision_awareness: 'El griego disponible y el audit trail inglés muestran acuerdo alto y una revisión final que eliminó un marcador discursivo innecesario. La traducción española sigue esa línea sobria: conserva la secuencia temporal, la simultaneidad del participio y el evento puntual del hambre, sin introducir conectores adicionales ni matices interpretativos no sustentados.'
  spanish_consistency_notes:
  - Se prefirió «ciudad» en singular, como en el texto fuente y el audit trail inglés, sin identificarla explícitamente para no añadir información externa.
  - «Tuvo hambre» mantiene el valor eventivo del aoristo y es más idiomático que un calco como «se hambrió» o un imperfecto descriptivo.
  - No se usó «SEÑOR», «Cristo» ni otros términos teológicos ajenos al verso; el pasaje es narrativo y no requiere terminología confesional específica.
