  text: Εἴπατε τῇ θυγατρὶ Σιών· Ἰδοὺ ὁ βασιλεύς σου ἔρχεταί σοι πραῢς καὶ ἐπιβεβηκὼς ἐπὶ ὄνον καὶ ⸀ἐπὶ πῶλον υἱὸν ὑποζυγίου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/005.yaml
  text: Tell the daughter of Zion[a], ‘Look, your king is coming to you, gentle and mounted on a donkey, and on a colt[b], the foal of a beast of burden.’
  footnotes:
  - marker: a
    text: Or “humble.” The Greek πραΰς can mean “gentle,” “meek,” or “humble,” and echoes Zechariah 9:9.
    reason: lexical_alternative
  - marker: b
    text: 'Matthew preserves the prophetic wording with two linked animal expressions: “on a donkey, and on a colt, the foal of a beast of burden.”'
    reason: cross_reference
