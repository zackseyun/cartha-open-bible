translation:
  language: es
  text: '«Digan a la hija de Sión[a]: “Mira, tu rey viene a ti, manso y montado sobre un asno, y sobre un pollino[b], cría de bestia de carga”.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «humilde». El griego πραΰς puede significar «manso», «apacible» o «humilde», y hace eco de Zacarías 9:9.
    reason: lexical_alternative
  - marker: b
    text: 'Mateo preserva el lenguaje profético con dos expresiones animales enlazadas: «sobre un asno, y sobre un pollino, cría de bestia de carga».'
    reason: cross_reference
lexical_decisions:
- source_word: Εἴπατε
  english_pob_choice: Tell
  chosen_spanish: Digan
  alternatives_spanish:
  - Díganle
  - Digan a
  lexicon: BDAG
  rationale: El aoristo imperativo plural introduce una cita profética dirigida a un grupo. «Digan» conserva el mandato directo en español actual; se evita un calco más rígido y se mantiene el tono de instrucción.
- source_word: τῇ θυγατρὶ Σιών
  english_pob_choice: the daughter of Zion
  chosen_spanish: la hija de Sión
  alternatives_spanish:
  - hija de Sión
  - la hija de Zion
  lexicon: BDAG
  rationale: Se conserva la personificación profética y el genitivo de pertenencia/relación. «Sión» mantiene la forma bíblica habitual en español, y «hija» reproduce el valor figurado sin neutralizarlo.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: BDAG
  rationale: La partícula deíctica llama la atención. «Mira» comunica con naturalidad el énfasis inmediato; «He aquí» es posible, pero más arcaizante.
- source_word: ὁ βασιλεύς σου
  english_pob_choice: your king
  chosen_spanish: tu rey
  alternatives_spanish:
  - su rey
  lexicon: BDAG
  rationale: Se conserva la relación posesiva directa y el matiz real/mesiánico del sustantivo. El español admite naturalmente el tuteo singular en esta cita dirigida a la personificación de Sión.
- source_word: ἔρχεταί σοι
  english_pob_choice: is coming to you
  chosen_spanish: viene a ti
  alternatives_spanish:
  - está viniendo a ti
  - se acerca a ti
  lexicon: BDAG
  rationale: El presente griego expresa inmediatez vívida. En español, «viene a ti» transmite bien la llegada inminente sin sobrecargar con un progresivo menos natural.
- source_word: πραῢς
  english_pob_choice: gentle
  chosen_spanish: manso
  alternatives_spanish:
  - humilde
  - apacible
  lexicon: BDAG
  rationale: La POB inglesa preservó la tensión semántica entre gentleness/meekness/humility. En español, «manso» conserva la cualidad de no agresividad y permite mantener abierta la resonancia con Zacarías 9:9 sin imponer una sola paráfrasis.
- source_word: ἐπιβεβηκὼς
  english_pob_choice: mounted
  chosen_spanish: montado
  alternatives_spanish:
  - subido
  - cabalgando
  lexicon: BDAG
  rationale: El participio perfecto describe a uno que ha subido y permanece sobre el animal. «Montado» es conciso y idiomático, y funciona bien con las dos expresiones preposicionales que siguen.
- source_word: ἐπὶ ὄνον
  english_pob_choice: on a donkey
  chosen_spanish: sobre un asno
  alternatives_spanish:
  - sobre un burro
  - en un asno
  lexicon: BDAG
  rationale: «Asno» es la equivalencia bíblica directa de ὄνος y mantiene el registro escritural. Se conserva la preposición física del griego con «sobre».
- source_word: πῶλον
  english_pob_choice: a colt
  chosen_spanish: un pollino
  alternatives_spanish:
  - un potro
  - un potrillo
  lexicon: BDAG
  rationale: El término designa un animal joven; «pollino» es una solución bíblica clara en español y refleja el valor léxico específico sin perder la relación con la frase explicativa siguiente.
- source_word: υἱὸν ὑποζυγίου
  english_pob_choice: the foal of a beast of burden
  chosen_spanish: hijo de bestia de carga
  alternatives_spanish:
  - cría de bestia de carga
  - hijo de un animal de carga
  lexicon: BDAG
  rationale: Se preserva la construcción semítica literal del griego, tal como la POB inglesa mantuvo «foal of a beast of burden». «Hijo de bestia de carga» reproduce la tensión formal del original y evita suavizarla demasiado; la frase puede sonar extraña, pero esa extrañeza es parte del tejido del texto.
theological_decisions:
- issue: Cita profética mesiánica y preservación del doble encaje animal de Mateo
  english_pob_reading: 'Preserve Matthew''s Greek wording in natural English: ''gentle ... mounted on a donkey, and on a colt, the foal of a beast of burden.'''
  chosen_spanish_reading: 'Conservar el doble enunciado animal: «sobre un asno, y sobre un pollino, hijo de bestia de carga».'
  alternative_spanish_readings:
  - Reducir a un solo animal para armonizar con Zacarías 9:9
  - Fundir la frase en una sola descripción del animal
  rationale: El texto de Mateo conserva dos expresiones enlazadas; no se debe armonizar ni resolver la aparente redundancia. La traducción española debe reflejar esa forma para respetar la cita profética tal como aparece en el evangelio y su valor interpretativo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El auditorio inglés quedó en alta concordancia y sin cambios aplicados en la última pasada; esta versión sigue esa lectura, manteniendo tanto la tensión léxica de πραΰς como la duplicación animal de Mateo sin armonización.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - «Mesías/Cristo» no aparece en este versículo, por lo que no se introduce terminología ajena.
  - Se mantiene un registro bíblico natural en español, pero sin sustituir la estructura profética del griego por una paráfrasis más libre.
