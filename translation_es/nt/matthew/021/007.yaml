  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego: mantiene los dos animales, la colocación de los mantos sobre ellos y conserva la ambigüedad del αὐτῶν final mediante un plural en el texto principal, además de reflejarla en nota. La nota alternativa también coincide con el rastro de auditoría en inglés.'
  spanish_quality_summary: La redacción es mayormente clara y natural, pero 'encima de ellos' suena algo tosco en registro bíblico y menos idiomático que 'sobre ellos', que también preserva la ambigüedad. 'La burra' es comprensible, pero en registro eclesial amplio 'la asna' resulta más digno y más precisamente alineado con el femenino del griego sin sonar coloquial. El resto del verso fluye bien.
  glossary_alignment: No hay términos del glosario de proyecto especialmente implicados aquí. La decisión 'pollino' encaja bien con el tono bíblico y el sentido de πῶλον. Se recomienda ajustar 'burra' a 'asna' por registro y precisión contextual, no por una regla terminológica fija.
  issues:
  - severity: medium
    issue: Registro de 'la burra'
    rationale: Aunque semánticamente correcto, 'burra' puede sonar más coloquial en español eclesial general. 'Asna' conserva el femenino explícito del griego y armoniza mejor con el tono moderno pero digno solicitado.
  - severity: low
    issue: Fraseo 'encima de ellos'
    rationale: Es entendible y conserva la ambigüedad, pero 'se sentó sobre ellos' es más natural y sobrio en español bíblico, sin pérdida semántica.
  revised_spanish_text: Trajeron la asna y el pollino[a], y pusieron sobre ellos sus mantos, y él se sentó sobre ellos.
