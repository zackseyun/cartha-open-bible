  rationale: 'Se hacen dos ajustes menores de estilo y registro: ''asna'' en lugar de ''burra'' para un tono más digno y preciso, y ''sobre ellos'' en lugar de ''encima de ellos'' para una formulación más natural. Se preservan plenamente el sentido del griego, la ambigüedad deliberada del pronombre final y la nota alternativa documentada.'
