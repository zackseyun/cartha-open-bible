translation:
  language: es
  text: Trajeron la asna y el pollino[a], y pusieron sobre ellos sus mantos, y él se sentó sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, 'se sentó sobre los mantos' que habían sido colocados sobre los animales.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤγαγον
  english_pob_choice: They brought
  chosen_spanish: Trajeron
  alternatives_spanish:
  - Los llevaron
  - Los trajeron
  lexicon: BDAG
  rationale: El aoristo de ἄγω puede expresar 'traer' o 'llevar'. En este contexto narrativo, 'trajeron' comunica con naturalidad que los discípulos hicieron que los animales estuvieran allí, sin perder la idea de conducción implícita en el verbo griego.
- source_word: ὄνον
  english_pob_choice: the donkey
  chosen_spanish: la burra
  alternatives_spanish:
  - la asna
  - la burra hembra
  lexicon: BDAG
  rationale: El artículo femenino muestra que se trata de una hembra. 'Burra' es claro y natural en español; mantiene el valor semántico y evita el tecnicismo innecesario de 'asna' en el texto principal.
- source_word: πῶλον
  english_pob_choice: the colt
  chosen_spanish: el pollino
  alternatives_spanish:
  - el potrillo
  - el asnillo joven
  lexicon: BDAG
  rationale: πῶλος designa un animal joven; en este contexto, un asno joven. 'Pollino' es una forma tradicional y aún inteligible en español bíblico, y conserva mejor el matiz específico que una paráfrasis más libre.
- source_word: ἐπέθηκαν ἐπ’ αὐτῶν τὰ ἱμάτια
  english_pob_choice: put their cloaks on them
  chosen_spanish: pusieron sobre ellos sus mantos
  alternatives_spanish:
  - colocaron sus mantos sobre ellos
  - pusieron sus prendas sobre ellos
  lexicon: BDAG
  rationale: 'ἱμάτια se refiere a prendas exteriores, aquí mejor expresadas como ''mantos''. ''Sus'' es una expansión contextual legítima: el griego no lo dice explícitamente, pero el referente natural son los discípulos que actúan en la escena.'
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - los animales
  - ambos
  lexicon: BDAG
  rationale: El pronombre plural puede referirse a los animales inmediatamente mencionados. En español, 'ellos' mantiene la referencia plural abierta sin forzar una identificación prematura con 'los animales' o con los mantos.
- source_word: ἐπεκάθισεν ἐπάνω αὐτῶν
  english_pob_choice: he sat on them
  chosen_spanish: él se sentó encima de ellos
  alternatives_spanish:
  - se sentó sobre ellos
  - se sentó encima de los mantos
  lexicon: BDAG
  rationale: 'La frase griega conserva una ambigüedad real sobre el antecedente de αὐτῶν: puede ser los animales o los mantos puestos sobre ellos. ''Encima de ellos'' preserva esa ambigüedad sin resolverla en el texto principal.'
theological_decisions:
- issue: Ambigüedad del referente final de αὐτῶν en ἐπεκάθισεν ἐπάνω αὐτῶν
  english_pob_reading: Render transparently as 'he sat on them' without resolving whether 'them' refers to the animals or the cloaks.
  chosen_spanish_reading: Él se sentó encima de ellos, manteniendo abierta la referencia de 'ellos'.
  alternative_spanish_readings:
  - Él se sentó sobre los mantos
  - Él se sentó sobre ellos dos
  rationale: No se trata de una cuestión doctrinal sino de una ambigüedad sintáctica y narrativa. La traducción española conserva la tensión textual en lugar de decidirla prematuramente, de acuerdo con la filosofía de transparencia del proyecto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hubo revisiones aplicadas y la revisión más reciente quedó sin cambios. La versión española conserva la misma ambigüedad final que el POB inglés documenta en nota.'
  spanish_consistency_notes:
  - Se mantuvo 'burra' para reflejar el femenino del sustantivo griego y la escena de la madre con su cría.
  - '''Pollino'' se eligió por su precisión bíblica y naturalidad en un registro eclesial moderno.'
  - '''Mantos'' traduce ἱμάτια como prendas exteriores, evitando el calco más genérico ''vestidos''.'
  - La nota a conserva la alternativa interpretativa sin resolver la referencia final del pronombre plural.
