    text: El griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  revision_rationale: Se reordenó la frase para que «mientras enseñaba» modifique inequívocamente a Jesús, conforme al participio griego διδάσκοντι. Además, «entró en el templo» representa con mayor naturalidad en español el movimiento expresado por εἰς τὸ ἱερὸν, sin cambiar el sentido documentado. Se conserva la nota sobre ἱερόν y todas las decisiones léxicas clave.
