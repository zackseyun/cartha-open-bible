translation:
  language: es
  text: 'Y cuando entró en el templo[a], los principales sacerdotes y los ancianos del pueblo se le acercaron mientras enseñaba, y le dijeron: «¿Con qué autoridad haces estas cosas? ¿Y quién te dio esta autoridad?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
lexical_decisions:
- source_word: ἐλθόντος αὐτοῦ
  english_pob_choice: when he came
  chosen_spanish: cuando llegó
  alternatives_spanish:
  - después de que llegó
  - al llegar
  lexicon: BDAG
  rationale: El genitivo absoluto expresa circunstancia temporal acompañante; «cuando llegó» comunica bien la secuencia narrativa en español sin añadir una relación causal o inmediata que el griego no exige.
- source_word: ἱερὸν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el complejo del templo
  - los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al recinto/complexo del templo, no al santuario interior. «El templo» es la forma natural en español y conserva el valor amplio; la precisión queda respaldada por la nota.
- source_word: προσῆλθον αὐτῷ
  english_pob_choice: came up to him
  chosen_spanish: se le acercaron
  alternatives_spanish:
  - se acercaron a él
  - vinieron a él
  lexicon: BDAG
  rationale: El verbo comunica acercamiento físico o de aproximación. En español, «se le acercaron» es idiomático y conserva la iniciativa de aproximarse a Jesús.
- source_word: διδάσκοντι
  english_pob_choice: while he was teaching
  chosen_spanish: mientras enseñaba
  alternatives_spanish:
  - mientras estaba enseñando
  - enseñando
  lexicon: BDAG
  rationale: El participio presente indica simultaneidad con la acción principal. «Mientras enseñaba» expresa esa coincidencia temporal de manera natural y fiel.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes sacerdotales
  lexicon: BDAG
  rationale: En este contexto plural, el término designa a los principales líderes sacerdotales. «Principales sacerdotes» mantiene el sentido de liderazgo plural y evita confundirlo con un oficio singular.
- source_word: οἱ πρεσβύτεροι τοῦ λαοῦ
  english_pob_choice: the elders of the people
  chosen_spanish: los ancianos del pueblo
  alternatives_spanish:
  - los mayores del pueblo
  - los ancianos del pueblo
  lexicon: BDAG
  rationale: La expresión denota líderes reconocidos del pueblo. «Ancianos del pueblo» es literal, claro y plenamente comprensible en registro bíblico español.
- source_word: Ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: By what authority
  chosen_spanish: ¿Con qué autoridad?
  alternatives_spanish:
  - ¿Por qué autoridad?
  - ¿Bajo qué autoridad?
  lexicon: BDAG
  rationale: La construcción expresa la base o esfera de la acción autorizada. En español, la interrogación natural es «¿Con qué autoridad?», que conserva el cuestionamiento sobre la legitimidad de sus acciones.
- source_word: ταῦτα ποιεῖς
  english_pob_choice: are you doing these things
  chosen_spanish: haces estas cosas
  alternatives_spanish:
  - estás haciendo estas cosas
  - haces todo esto
  lexicon: BDAG
  rationale: El presente griego en este contexto de disputa puede expresarse de forma simple en español sin perder fuerza. «Haces estas cosas» mantiene la referencia a las acciones recientes en el templo.
- source_word: τίς σοι ἔδωκεν τὴν ἐξουσίαν ταύτην
  english_pob_choice: who gave you this authority
  chosen_spanish: ¿Y quién te dio esta autoridad?
  alternatives_spanish:
  - ¿Y quién te ha dado esta autoridad?
  - ¿Y quién te concedió esta autoridad?
  lexicon: BDAG
  rationale: El aoristo ἔδωκεν apunta al acto de otorgar autoridad; el pretérito simple español lo refleja de forma natural. «Esta autoridad» conserva el deíctico del griego.
theological_decisions:
- issue: Sentido de ἐξουσία en la pregunta de los líderes
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - derecho
  - poder
  rationale: El contexto trata de la legitimidad para actuar y enseñar en el templo, no de mera capacidad. «Autoridad» preserva la fuerza institucional y teológica de la pregunta sin desplazarla hacia «poder» o «derecho» como equivalentes principales.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de ἱερόν
  english_pob_reading: the temple complex or precincts, not specifically the inner sanctuary
  chosen_spanish_reading: el templo[a]
  alternative_spanish_readings:
  - el recinto del templo
  - los atrios del templo
  rationale: La nota aclara que el término griego no se restringe al santuario interior. Mantener «el templo» en el cuerpo principal es natural en español y la nota preserva la distinción espacial documentada por el texto fuente.
  doctrine_reference: Translation philosophy §§1, 2, 6
translation_notes:
  revision_awareness: El registro auditado en inglés indica high_agreement, con cross-check de acuerdo pleno y sin revisiones aplicadas en el último pase; la redacción española sigue de cerca esas decisiones sin introducir cambios no documentados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque aquí no aparece el nombre divino.
  - Se usa «autoridad» para ἐξουσία de manera consistente con el criterio doctrinal del POB en este pasaje.
  - Se evita calcar el orden del inglés cuando el español requiere una sintaxis más natural, especialmente en la cláusula temporal y en la simultaneidad de «mientras enseñaba».
  - Se conserva el plural «principales sacerdotes» para reflejar el sujeto plural del griego.
