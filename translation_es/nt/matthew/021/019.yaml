translation:
  language: es
  text: 'Y al ver una higuera junto al camino[a], se acercó a ella y no halló nada en ella, sino solo hojas. Y le dijo: «Que nunca más[b] de ti salga fruto para siempre». Y al instante la higuera se secó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «al borde del camino».
    reason: lexical_alternative
  - marker: b
    text: 'O, más idiomáticamente: «Que no vuelva a salir fruto de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συκῆν μίαν
  english_pob_choice: a fig tree
  chosen_spanish: una higuera
  alternatives_spanish:
  - una sola higuera
  - una higuera única
  lexicon: BDAG
  rationale: μίαν puede explicitarse como 'una/una sola', pero en español 'una higuera' introduce naturalmente el objeto sin perder el sentido. 'Higuera' conserva la imagen concreta del griego.
- source_word: ἐπὶ τῆς ὁδοῦ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al borde del camino
  - por el camino
  lexicon: BDAG
  rationale: Con un objeto estático, ἐπί con genitivo tiene valor locativo. 'Junto al camino' suena natural en español y preserva la ubicación cercana sin volverlo demasiado literal.
- source_word: ἦλθεν ἐπ’ αὐτήν
  english_pob_choice: he came up to it
  chosen_spanish: se acercó a ella
  alternatives_spanish:
  - vino a ella
  - se llegó a ella
  lexicon: BDAG
  rationale: La combinación expresa aproximación hacia la higuera. 'Se acercó a ella' comunica bien el movimiento en español natural, aunque el pronombre previo en español ya permite resolver la referencia.
- source_word: οὐδὲν εὗρεν ἐν αὐτῇ
  english_pob_choice: found nothing on it
  chosen_spanish: no halló nada en ella
  alternatives_spanish:
  - no encontró nada en ella
  - no halló nada sobre ella
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente 'en', en español el uso con un árbol permite 'en ella'. 'Halló' mantiene registro digno y bíblico sin ser arcaizante.
- source_word: εἰ μὴ φύλλα μόνον
  english_pob_choice: except leaves only
  chosen_spanish: sino solo hojas
  alternatives_spanish:
  - excepto solo hojas
  - más que solo hojas
  lexicon: BDAG
  rationale: 'La frase es enfática: nada excepto hojas. ''Sino solo hojas'' mantiene la exclusión y la intensificación con un español claro y fluido.'
- source_word: λέγει αὐτῇ
  english_pob_choice: he said to it
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  - le habló
  lexicon: BDAG
  rationale: El presente histórico griego se suele suavizar al pasado en español para legibilidad narrativa. El dativo permite el clítico 'le' sin necesidad de repetir 'a ella'.
- source_word: Μηκέτι
  english_pob_choice: no longer ever / never again
  chosen_spanish: Que nunca más
  alternatives_spanish:
  - Nunca más
  - Que ya no
  lexicon: BDAG
  rationale: Μηκέτι, en esta maldición, expresa cesación permanente. 'Que nunca más' conserva el valor volitivo/jussivo que en español encaja bien con una pronunciación solemne.
- source_word: ἐκ σοῦ καρπὸς γένηται
  english_pob_choice: May fruit never again come from you forever
  chosen_spanish: haya fruto de ti
  alternatives_spanish:
  - salga fruto de ti
  - venga fruto de ti
  - dé fruto de ti
  lexicon: BDAG
  rationale: γένηται con καρπός y ἐκ σοῦ expresa literalmente que el fruto 'llegue a ser / haya' a partir de ti. 'Haya fruto de ti' conserva la imagen y evita la paráfrasis de 'dar fruto'.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever / ever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: En este contexto idiomático, la expresión marca permanencia. 'Para siempre' es la forma más natural y clara en español.
- source_word: ἐξηράνθη
  english_pob_choice: withered
  chosen_spanish: se secó
  alternatives_spanish:
  - se marchitó
  - se secó por completo
  lexicon: BDAG
  rationale: Para una higuera, 'se secó' comunica el efecto visible del verbo con naturalidad en español. 'Se marchitó' también sería posible, pero 'se secó' encaja mejor con la imagen del texto.
- source_word: παραχρῆμα
  english_pob_choice: at once
  chosen_spanish: al instante
  alternatives_spanish:
  - de inmediato
  - en seguida
  lexicon: BDAG
  rationale: '''Al instante'' expresa la inmediatez del adverbio de manera clara y digna.'
theological_decisions:
- issue: Fuerza de la pronunciación de Jesús sobre la higuera
  english_pob_reading: 'Render as an imprecatory/jussive statement: ''May fruit never again come from you forever.'''
  chosen_spanish_reading: Que nunca más haya fruto de ti para siempre
  alternative_spanish_readings:
  - Nunca más haya fruto de ti
  - Que no vuelva a haber fruto de ti
  rationale: El griego usa una forma de deseo/prohibición solemne más que una simple observación. La traducción conserva el matiz jussivo e imprecatorio sin convertirlo en una interpretación doctrinal del símbolo de la higuera.
  doctrine_reference: Preservar la tensión teológica sin resolverla en el texto principal.
translation_notes:
  revision_awareness: Se siguió de cerca el último pase revisado del texto inglés, especialmente la combinación de permanencia («para siempre») y cesación inmediata («al instante»), pero se adaptó la maldición a un español natural que conserve el valor jussivo del griego. También se mantuvo la imagen concreta del fruto proveniente de la higuera, evitando una paráfrasis como 'dar fruto' en el texto principal.
  spanish_consistency_notes:
  - Se usa 'higuera' para συκῆ de forma consistente con el léxico botánico común en español bíblico.
  - Se prefiere 'Y' al inicio narrativo para mantener continuidad con el estilo bíblico en español.
  - '''Para siempre'' se usa para εἰς τὸν αἰῶνα como equivalente idiomático natural, sin ocultar la idea de permanencia.'
  - La nota sobre 'junto al camino' refleja la alternativa idiomática del original sin duplicar el significado en el texto principal.
