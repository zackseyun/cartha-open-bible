  to: 'Y al ver una higuera junto al camino[a], se acercó a ella y no halló nada en ella, sino solo hojas. Y le dijo: «Que nunca más[b] de ti salga fruto para siempre». Y al instante la higuera se secó.'
  rationale: Se corrige la nota [a] para que contenga una alternativa genuina al valor locativo de ἐπὶ τῆς ὁδοῦ. Se ajusta la cláusula imprecatoria a «de ti salga fruto» para conservar mejor el sentido de procedencia de ἐκ σοῦ y mejorar la naturalidad del español. Se mantiene «nunca más» y «para siempre» para reflejar la doble fuerza de Μηκέτι y εἰς τὸν αἰῶνα, pero en un orden español más legible.
