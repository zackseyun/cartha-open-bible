review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la escena y la mayoría de las decisiones léxicas del griego: una higuera, ubicación junto/al borde del camino, acercamiento a ella, ausencia de fruto salvo hojas, pronunciamiento jussivo/imprecatorio, y marchitamiento inmediato. Sin embargo, hay dos problemas de fidelidad formal: (1) la nota [a] no preserva una alternativa real, porque repite esencialmente la misma lectura ya puesta en el texto; (2) «de ti» en «haya fruto de ti» suena poco natural en español y, aunque intenta conservar ἐκ σοῦ, no transmite tan bien como «de ti salga fruto» o «venga fruto de ti» la idea de procedencia. También conviene suavizar «en ella» a «en la higuera» o mantenerlo solo una vez para mejor legibilidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta una aspereza notable en «Que nunca más haya fruto de ti para siempre», que resulta comprensible pero poco natural. La combinación «nunca más ... para siempre» reproduce la doble fuerza griega, pero en español conviene una formulación un poco más fluida sin perder solemnidad. Además, la nota [a] está mal planteada y debe corregirse o eliminarse. El resto del versículo lee bien en registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones «higuera», «camino», «se acercó», «halló», «al instante» son compatibles con el estilo POB. La principal cuestión es idiomática y de anclaje/notas, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: La nota [a] no ofrece una alternativa léxica real.
    rationale: El texto principal dice «junto al camino» y la nota [a] repite «junto al camino». Una nota de alternativa debe preservar una opción distinta documentada, como «al borde del camino».
  - severity: medium
    issue: «haya fruto de ti» es demasiado poco idiomático en español.
    rationale: Aunque busca calcar ἐκ σοῦ καρπὸς γένηται, en español suena forzado. Una formulación como «de ti salga fruto» conserva la procedencia desde la higuera y mejora la inteligibilidad sin paraphrasear excesivamente.
  - severity: low
    issue: La secuencia «nunca más ... para siempre» es fiel pero algo pesada.
    rationale: La duplicación refleja Μηκέτι + εἰς τὸν αἰῶνα, pero conviene ordenarla de manera más natural en español manteniendo ambos matices. Esto es mejora estilística, no error grave.
