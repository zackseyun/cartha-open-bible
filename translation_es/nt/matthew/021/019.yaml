base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/019.yaml
  text: And seeing a fig tree by the road[a], he came up to it and found nothing on it except leaves only. And he said to it, “May fruit never again come from you forever.” And the fig tree withered at once.
