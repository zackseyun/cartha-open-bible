translation:
  language: es
  text: De nuevo envió a otros siervos[a], más numerosos que los primeros, y les hicieron lo mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'otros esclavos'. El griego doulous puede significar 'siervos' o 'esclavos', según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: BDAG
  rationale: Adverbio de repetición en secuencia narrativa. 'Otra vez' es natural en español y conserva el valor iterativo sin añadir matiz interpretativo.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: Aoristo narrativo de ἀποστέλλω. 'Envió' comunica la acción de manera directa y idiomática en español.
- source_word: ἄλλους δούλους
  english_pob_choice: other servants
  chosen_spanish: otros esclavos[a]
  alternatives_spanish:
  - otros siervos
  - otros servidores
  - otros esclavos/siervos
  lexicon: BDAG
  rationale: δοῦλος puede significar 'esclavo' o 'siervo/servidor' según el contexto. Aquí se preserva la fuerza léxica de esclavitud como opción más directa, documentando en nota la alternativa 'siervos' por si el lector asocia el término con una relación de servicio más general.
- source_word: πλείονας τῶν πρώτων
  english_pob_choice: more than the first ones
  chosen_spanish: más numerosos que los primeros
  alternatives_spanish:
  - más que los primeros
  - de mayor número que los primeros
  lexicon: BDAG
  rationale: La comparación apunta al tamaño del grupo posterior. 'Más numerosos que los primeros' expresa con claridad la cantidad relativa y evita una formulación torpe en español.
- source_word: ἐποίησαν αὐτοῖς ὡσαύτως
  english_pob_choice: they did the same to them
  chosen_spanish: les hicieron lo mismo
  alternatives_spanish:
  - les hicieron de la misma manera
  - obraron igual con ellos
  lexicon: BDAG
  rationale: ποιέω con dativo aquí significa tratar a alguien de cierta manera. 'Les hicieron lo mismo' conserva la referencia anafórica al maltrato previo y suena natural en español.
theological_decisions:
- issue: Rendering of δοῦλος in a parable of sent emissaries
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: Aunque el POB inglés optó por 'servants' por fluidez, el término griego δοῦλος tiene un peso léxico fuerte que en español se expresa con 'esclavos'. En esta escena no se busca suavizar la relación de dependencia; por ello se mantiene el valor más literal, dejando documentada la alternativa menos marcada.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: Se revisó el audit trail en inglés y se preservó la estructura narrativa, la comparación cuantitativa y el valor de δοῦλος. La principal diferencia respecto al inglés POB es la elección española de 'esclavos' para reflejar con mayor fuerza el término griego, mientras se registra la alternativa 'siervos' en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Otra vez' para πάλιν y 'les hicieron lo mismo' para ὡσαύτως, preservando la anáfora con el contexto inmediato.
  - Se evitó 'SEÑOR' u otras traducciones no pertinentes, porque el verso no contiene el nombre divino ni un título cristológico.
  - La puntuación y el orden se ajustan a un español bíblico moderno, sin calcos innecesarios.
