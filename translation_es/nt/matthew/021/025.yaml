revisions:
- from: '¿De dónde era el bautismo de Juan? ¿Del cielo o de los hombres? Y ellos razonaban entre sí, diciendo: “Si decimos: ‘Del cielo’, nos dirá: ‘¿Por qué, entonces, no le creísteis?’”'
  to: '«¿De dónde provenía el bautismo de Juan? ¿Del cielo[a] o de los hombres[b]?». Y ellos razonaban entre sí, diciendo: «Si decimos: “Del cielo”, nos dirá: “¿Por qué, entonces, no le creyeron?”».'
  rationale: Se ajusta el español al registro neutral latinoamericano reemplazando 'creísteis' por 'creyeron'; se mejora levemente πόθεν con 'provenía'; y se restauran las notas léxicas exigidas por la auditoría inglesa para conservar las alternativas semánticas documentadas. No hay cambio doctrinal ni de sentido principal.
