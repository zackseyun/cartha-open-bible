  text: τὸ βάπτισμα ⸀τὸ Ἰωάννου πόθεν ἦν; ἐξ οὐρανοῦ ἢ ἐξ ἀνθρώπων; οἱ δὲ διελογίζοντο ⸀ἐν ἑαυτοῖς λέγοντες· Ἐὰν εἴπωμεν· Ἐξ οὐρανοῦ, ἐρεῖ ἡμῖν· Διὰ τί οὖν οὐκ ἐπιστεύσατε αὐτῷ;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/025.yaml
  text: The baptism of John—from where was it? From heaven or from men? And they were reasoning among themselves[a], saying, “If we say, ‘From heaven,’ he will say to us[b], ‘Why then did you not believe him?’”
  footnotes:
  - marker: a
    text: Or “from God”; Greek “from heaven,” a reverential way of referring to divine origin.
    reason: lexical_alternative
  - marker: b
    text: “From men” means “from human beings,” contrasting merely human origin with heavenly origin.
    reason: lexical_alternative
