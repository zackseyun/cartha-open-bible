translation:
  language: es
  text: '«¿De dónde provenía el bautismo de Juan? ¿Del cielo[a] o de los hombres[b]?». Y ellos razonaban entre sí, diciendo: «Si decimos: “Del cielo”, nos dirá: “¿Por qué, entonces, no le creyeron?”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Dios»; «del cielo» es una manera reverente de referirse al origen divino.
    reason: lexical_alternative
  - marker: b
    text: «De los hombres» significa «de seres humanos», en contraste con un origen celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - bautizar
  - lavamiento
  lexicon: BDAG
  rationale: βάπτισμα nombra el rito o la práctica de bautismo, no una acción momentánea. “Bautismo” es el equivalente natural y preciso en español para referirse al bautismo de Juan como evento o ministerio.
- source_word: τὸ Ἰωάννου
  english_pob_choice: of John
  chosen_spanish: de Juan
  alternatives_spanish:
  - el de Juan
  - juanino
  lexicon: BDAG
  rationale: El genitivo identifica el bautismo como perteneciente o asociado con Juan. “De Juan” conserva la relación nominal de forma clara y natural en español.
- source_word: πόθεν
  english_pob_choice: from where was it
  chosen_spanish: ¿De dónde era?
  alternatives_spanish:
  - ¿De dónde procedía?
  - ¿Cuál era su origen?
  lexicon: BDAG
  rationale: πόθεν pregunta por procedencia u origen. En español, “¿De dónde era?” expresa de modo idiomático la pregunta por el origen sin perder el sentido de fuente.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: Se mantiene la expresión literal “del cielo”, que en este contexto funciona como circunlocución reverente para origen divino. Se evita introducir “de Dios” en el texto principal para no desplazar la formulación griega.
- source_word: ἐξ ἀνθρώπων
  english_pob_choice: from men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de seres humanos
  lexicon: BDAG
  rationale: La contraposición es entre origen celestial y origen humano. “De los hombres” conserva esa oposición de manera breve y reconocible, sin necesidad de explicitar “seres humanos” en el texto principal.
- source_word: διελογίζοντο ἐν ἑαυτοῖς
  english_pob_choice: they were reasoning among themselves
  chosen_spanish: razonaban entre sí
  alternatives_spanish:
  - se deliberaban entre sí
  - discutían entre sí
  lexicon: BDAG
  rationale: El imperfecto indica deliberación en curso. “Razonaban entre sí” reproduce bien el matiz de reflexión interna y conversación mutua sin añadir énfasis ajeno al contexto.
- source_word: Ἐὰν εἴπωμεν
  english_pob_choice: If we say
  chosen_spanish: Si decimos
  alternatives_spanish:
  - Si dijéramos
  - Si llegáramos a decir
  lexicon: BDAG
  rationale: La condición hipotética se expresa de forma natural con “Si decimos”, que mantiene el tono de razonamiento condicional del griego.
- source_word: ἐρεῖ ἡμῖν
  english_pob_choice: he will say to us
  chosen_spanish: nos dirá
  alternatives_spanish:
  - nos responderá
  - nos dirá a nosotros
  lexicon: BDAG
  rationale: El futuro directo de λέγω en discurso inmediato se comunica con “nos dirá”. Es breve, natural y conserva la inmediatez de la réplica anticipada.
- source_word: Διὰ τί οὖν
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces,
  alternatives_spanish:
  - ¿Por qué, pues,
  - ¿Por qué entonces
  lexicon: BDAG
  rationale: La combinación inferencial se mantiene con “¿Por qué, entonces,”, que conserva la fuerza argumentativa de οὖν dentro de una pregunta directa en español.
- source_word: οὐκ ἐπιστεύσατε αὐτῷ
  english_pob_choice: did you not believe him
  chosen_spanish: no le creísteis
  alternatives_spanish:
  - no confiaron en él
  - no le dieron fe
  lexicon: BDAG
  rationale: πιστεύω con dativo aquí implica creer/aceptar a una persona y su mensaje. “Le creísteis” comunica de forma clara la falta de fe en su testimonio y encaja bien en el diálogo polémico.
theological_decisions:
- issue: Sentido de “del cielo” como origen divino
  english_pob_reading: Retain 'from heaven' in the main text as the literal expression for divine origin.
  chosen_spanish_reading: Retener “del cielo” como expresión literal que señala origen divino.
  alternative_spanish_readings:
  - de Dios
  - del cielo, es decir, de Dios
  rationale: La frase griega usa “cielo” como circunlocución reverente. En español, “del cielo” preserva la forma y la carga retórica de la pregunta sin convertir la interpretación en paráfrasis.
  doctrine_reference: Translation philosophy §1, §3
- issue: Contraste entre origen divino y origen humano
  english_pob_reading: Use 'men' to express human origin in contrast to divine origin.
  chosen_spanish_reading: Usar “de los hombres” para expresar origen humano en contraste con el divino.
  alternative_spanish_readings:
  - de las personas
  - de seres humanos
  rationale: El contraste del pasaje no es entre varón y mujer, sino entre lo humano y lo celestial. “De los hombres” reproduce el contraste clásico de manera breve y transparente, mientras que las alternativas explicitan el sentido genérico.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando notas al pie no ancladas en el texto. La traducción final no usa marcadores de nota, de modo que no quedan footnotes huérfanos. Se mantuvo la correspondencia con el griego y con la decisión auditada del POB en torno a πόθεν, ἐξ οὐρανοῦ, ἐξ ἀνθρώπων y οὐκ ἐπιστεύσατε αὐτῷ.
  spanish_consistency_notes:
  - Se mantiene el registro directo y polémico del contexto interrogativo.
  - Se conserva “cielo” para ἐξ οὐρανοῦ por la costumbre reverencial del pasaje, sin sustituirlo por una glosa interpretativa en el cuerpo del texto.
  - “De los hombres” se usa como contraste genérico humano, coherente con la lectura auditada en inglés.
  - El verbo “creer” se adapta a “le creísteis”, que resulta idiomático en español y preserva el sentido de πιστεύω con dativo.
