review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del griego: primero lo toman, luego lo echan fuera de la viña, y después lo matan. También conserva correctamente el sentido físico de ἐξέβαλον y el referente de ἀμπελῶνος como «viña». Sin embargo, la nota alternativa no corresponde con precisión al lugar donde está anclada y no refleja bien la alternativa inglesa auditada, que contrasta la expresión completa «threw him out of the vineyard / cast him out of the vineyard», no el verbo λαβόντες.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Lo echaron fuera de la viña» suena bien y «lo mataron» es directo y fiel. El único ajuste necesario es mover la nota al segmento de expulsión para que la anotación sea semánticamente correcta y más legible.
  glossary_alignment: No hay términos sensibles del glosario principal en este versículo. «Viña» para ἀμπελών y «lo mataron» para ἀπέκτειναν están bien elegidos. «Echaron fuera» representa bien ἐκβάλλω en contexto narrativo.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «lo tomaron[a]» en vez de en la frase de expulsión.
    rationale: La alternativa inglesa documentada («cast him out of the vineyard») corresponde a ἐξέβαλον ἔξω τοῦ ἀμπελῶνος, no a λαβόντες. Tal como está, la nota crea una relación léxica incorrecta.
  - severity: low
    issue: El texto de la nota dice «lo expulsaron de la viña», que omite el matiz verbal más cercano a «echar/cast out».
    rationale: «Expulsaron» es válido como alternativa, pero la auditoría inglesa preserva específicamente la alternativa tradicional «cast ... out». En español conviene reflejarla más de cerca como «lo echaron fuera de la viña» o «lo arrojaron fuera de la viña»; la primera es más natural y cercana al texto principal.
  revised_spanish_text: Y lo tomaron, lo echaron fuera de la viña[a] y lo mataron.
