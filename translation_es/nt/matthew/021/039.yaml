translation:
  language: es
  text: Y lo tomaron, lo echaron fuera de la viña[a] y lo mataron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo echaron fuera de la viña».
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  english_pob_choice: took
  chosen_spanish: lo tomaron
  alternatives_spanish:
  - lo agarraron
  - lo recibieron
  lexicon: BDAG
  rationale: El participio aoristo de λαμβάνω se coordina con los verbos finitos y expresa una acción previa dentro de la secuencia narrativa. «Lo tomaron» conserva esa secuencia de forma natural en español sin añadir la fuerza de «agarraron» ni volverlo demasiado literal con «habiéndolo tomado».
- source_word: ἐξέβαλον
  english_pob_choice: threw him out
  chosen_spanish: lo echaron fuera
  alternatives_spanish:
  - lo expulsaron
  - lo arrojaron fuera
  - lo sacaron
  lexicon: BDAG
  rationale: ἐκβάλλω aquí denota expulsión física. «Lo echaron fuera» es idiomático en español y reproduce bien el movimiento de fuera del lugar. «Expulsaron» es válido, pero suena más abstracto; «arrojaron» puede sonar más violento de lo que exige el verbo.
- source_word: ἔξω τοῦ ἀμπελῶνος
  english_pob_choice: out of the vineyard
  chosen_spanish: fuera de la viña
  alternatives_spanish:
  - fuera del viñedo
  - afuera de la viña
  lexicon: BDAG
  rationale: La frase señala ubicación fuera del recinto de la viña. «Viña» es el equivalente más natural y bíblicamente transparente para ἀμπελών en este contexto parabólico. «Fuera de la viña» mantiene el movimiento del verbo; «viñedo» es posible, pero menos natural en el registro bíblico narrativo.
- source_word: ἀμπελῶνος
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - plantación de uvas
  lexicon: BDAG
  rationale: ἀμπελών designa una viña o viñedo. Dado el contexto de la parábola, «viña» es la opción más breve, clara y tradicional en español bíblico contemporáneo, sin perder precisión.
- source_word: ἀπέκτειναν
  english_pob_choice: killed him
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo dieron muerte
  - lo asesinaron
  lexicon: BDAG
  rationale: ἀποκτείνω significa matar o dar muerte. «Lo mataron» es directo y fiel. «Asesinaron» introduce una valoración jurídica/moral más específica que el verbo griego por sí solo no exige.
theological_decisions:
- issue: 'Secuencia narrativa: echar fuera y matar'
  english_pob_reading: Render the verse as stating that the son was thrown out of the vineyard and then killed.
  chosen_spanish_reading: La traducción mantiene que primero lo echaron fuera de la viña y luego lo mataron.
  alternative_spanish_readings:
  - Lo mataron y luego lo echaron fuera de la viña.
  - Lo echaron fuera y lo asesinaron.
  rationale: 'El orden verbal del griego es explícito: primero ἐξέβαλον ἔξω τοῦ ἀμπελῶνος y luego ἀπέκτειναν. La versión española conserva ese orden sin armonizar con paralelos sinópticos ni reordenar la escena.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el griego de SBLGNT y coincide con el audit trail inglés en las decisiones clave: secuencia narrativa, expulsión física y muerte final. No se introducen armonizaciones con Marcos o Lucas.'
  spanish_consistency_notes:
  - Se usa «viña» para ἀμπελών, en línea con el registro bíblico español y la terminología de la parábola.
  - Se evita «Cristo» o vocabulario teológico añadido, porque este versículo narra una acción concreta sin títulos cristológicos.
  - El pronombre clítico «lo» mantiene la referencia al hijo de manera natural y coherente con el español bíblico moderno.
