  rationale: Se ajusta únicamente la traducción de λέγοντος de 'que dice' a 'diciendo:' para reflejar con mayor fidelidad la fórmula griega de introducción de cita y mejorar la naturalidad bíblica en español, sin alterar el resto del análisis léxico-teológico.
