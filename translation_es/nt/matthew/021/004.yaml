translation:
  language: es
  text: 'Ahora bien, esto sucedió para que se cumpliera lo que fue dicho por medio del profeta[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por el profeta’. El griego dice más literalmente ‘por medio del profeta’, subrayando la mediación profética.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este hecho
  - este acontecimiento
  lexicon: BDAG
  rationale: El neutro singular refiere al conjunto del hecho inmediato; en español, 'esto' mantiene la referencia amplia y natural sin volverlo más específico de lo que el griego permite.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Pero
  - Pues
  lexicon: BDAG
  rationale: δέ aquí es continuativo, no adversativo fuerte. 'Ahora bien' conserva el giro narrativo y la transición sin exagerar contraste.
- source_word: γέγονεν
  english_pob_choice: happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - ha sucedido
  - aconteció
  - tuvo lugar
  lexicon: BDAG
  rationale: El perfecto de γίνομαι en fórmulas de cumplimiento funciona idiomáticamente para un hecho ocurrido con relevancia actual. 'Sucedió' suena natural y mantiene el valor eventivo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad o resultado. 'Para que' expresa bien la relación telica en español bíblico actual.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplido
  - llegara a cumplirse
  - se realizara
  lexicon: BDAG
  rationale: La pasiva aorista subjuntiva se vierte de forma natural con 'se cumpliera'. Mantiene la idea de cumplimiento profético sin sonoridad forzada.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que fue dicho
  alternatives_spanish:
  - lo dicho
  - lo que se había dicho
  - lo que fue hablado
  lexicon: BDAG
  rationale: Participio aoristo pasivo sustantivado; 'lo que fue dicho' conserva la pasiva y la sustantivación. 'Lo dicho' sería más breve, pero menos explícito.
- source_word: διὰ τοῦ προφήτου
  english_pob_choice: through the prophet
  chosen_spanish: por medio del profeta
  alternatives_spanish:
  - a través del profeta
  - por el profeta
  - mediante el profeta
  lexicon: BDAG
  rationale: διά con genitivo marca mediación instrumental. 'Por medio de' expresa esa mediación con claridad en español y evita reducirla solo a autoría humana.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: que dice
  alternatives_spanish:
  - diciendo
  - el cual dice
  - quien dice
  lexicon: BDAG
  rationale: El participio presente introduce la cita. 'Que dice' fluye mejor en español que un gerundio y mantiene la introducción del dicho profético.
theological_decisions:
- issue: Fórmula de cumplimiento y mediación profética
  english_pob_reading: what was spoken through the prophet might be fulfilled
  chosen_spanish_reading: para que se cumpliera lo que fue dicho por medio del profeta
  alternative_spanish_readings:
  - para que se cumpliera lo que fue dicho por el profeta
  - para que se cumpliera lo que el profeta dijo
  rationale: La construcción española conserva que el cumplimiento recae sobre una palabra previa transmitida mediante un profeta. 'Por medio del profeta' mantiene la mediación y no la reduce a simple autoría humana.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora aparece anclada en el texto español en la frase ‘profeta[a]’.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque el versículo no contiene el nombre divino ni κύριος.
  - ‘Por medio de’ preserva la mediación de διά con genitivo, coherente con el audit trail inglés.
  - ‘Lo que fue dicho’ mantiene la pasiva del participio ῥηθὲν sin volverla activa ni interpretativa.
