  to: 'Y las multitudes decían[a]: «Este es el profeta Jesús, de Nazaret, en Galilea»'
  rationale: Se conserva la estructura y las decisiones léxicas principales del borrador, pero se ajusta la identificación geográfica a «de Nazaret, en Galilea» para reflejar mejor el griego y la auditoría inglesa, y para sonar más natural en español general sin perder precisión.
