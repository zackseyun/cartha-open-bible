translation:
  language: es
  text: 'Y las multitudes decían[a]: «Este es el profeta Jesús, de Nazaret, en Galilea»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un profeta». El griego dice «el profeta», lo que puede reflejar la identificación de Jesús como una figura profética reconocida.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ ὄχλοι
  english_pob_choice: And the crowds
  chosen_spanish: Y las multitudes
  alternatives_spanish:
  - Y las gentes
  - Y las muchedumbres
  lexicon: BDAG
  rationale: ὄχλοι es plural y designa a grupos reunidos; en español, «multitudes» conserva bien esa idea colectiva y suena natural en un registro bíblico moderno. Se mantiene el conector «Y» para reflejar δέ como enlace narrativo leve.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa habla en curso o reiterada. En español, el imperfecto simple «decían» transmite esa continuidad sin sobrecargar la frase.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este mismo es
  - Este es él
  lexicon: BDAG
  rationale: Es una cláusula identificativa directa. «Este es» reproduce con naturalidad el demostrativo y la cópula griegos.
- source_word: ὁ προφήτης
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - un profeta
  lexicon: BDAG
  rationale: Se conserva el artículo definido del griego. Como en el inglés POB, la forma definida deja abierta la posibilidad de una identificación profética reconocible, sin resolverla por una indefinición que el texto no exige.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según la práctica del proyecto.
- source_word: ὁ ἀπὸ Ναζαρὲθ τῆς Γαλιλαίας
  english_pob_choice: from Nazareth in Galilee
  chosen_spanish: el de Nazaret de Galilea
  alternatives_spanish:
  - el que es de Nazaret de Galilea
  - procedente de Nazaret de Galilea
  lexicon: BDAG
  rationale: La frase articular identifica a Jesús por procedencia. «El de Nazaret de Galilea» es breve, fiel al valor identificador del griego y natural en español; evita una expansión innecesaria como «que es de» o «procedente de», que sería más interpretativa.
theological_decisions:
- issue: Definitude of ὁ προφήτης
  english_pob_reading: the prophet
  chosen_spanish_reading: el profeta
  alternative_spanish_readings:
  - un profeta
  rationale: Se mantiene la lectura definida del artículo griego. Esto preserva la posible resonancia de una figura profética reconocida en el contexto mateano sin añadir explícitamente una identificación doctrinal que el texto no formula.
  doctrine_reference: Original-language primacy; preserve theological tension rather than flattening the article.
translation_notes:
  revision_awareness: El texto sigue la línea del POB inglés más reciente, que mantiene la lectura definida de «the prophet» y actualiza la frase geográfica a «in Galilee» por naturalidad. En español, se buscó una solución equivalente y fluida sin perder el matiz identificador del griego.
  spanish_consistency_notes:
  - Se usó «multitudes» para ὄχλοι, coherente con un plural colectivo natural en español.
  - Se conservó el imperfecto con «decían» para reflejar el valor aspectual de ἔλεγον.
  - Se mantuvo «el profeta» para no borrar la tensión textual del artículo definido.
  - Se eligió «el de Nazaret de Galilea» para evitar sobreexplicar la procedencia y mantener un registro bíblico claro.
  - No se usó «Cristo» ni «SEÑOR», porque el versículo no contiene esos términos.
