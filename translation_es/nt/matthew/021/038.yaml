translation:
  language: es
  text: 'Pero cuando los arrendatarios de la viña vieron al hijo, se dijeron entre sí: «Este es el heredero. Vengan, matémoslo y apoderémonos[a] de su herencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «tengamos su herencia»; en el contexto, la idea es tomar posesión de ella por la fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοὶ
  english_pob_choice: tenant farmers
  chosen_spanish: labradores
  alternatives_spanish:
  - campesinos
  - arrendatarios de la viña
  - viñadores
  lexicon: BDAG
  rationale: En español, «labradores» comunica de manera natural el oficio agrícola de γεωργοί. «Arrendatarios de la viña» explicita la relación contractual, pero suena más interpretativo que el griego; aquí basta con un término agrícola que funcione en la parábola y deje que el contexto complete la relación con el dueño.
- source_word: ἰδόντες
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... vieron
  alternatives_spanish:
  - al ver
  - viendo
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una cláusula temporal idiomática en español. «Cuando ... vieron» conserva la secuencia narrativa sin calcar la forma participial.
- source_word: τὸν υἱόν
  english_pob_choice: the son
  chosen_spanish: al hijo
  alternatives_spanish:
  - al hijo suyo
  - al Hijo
  lexicon: BDAG
  rationale: El griego no expresa posesivo explícito; «al hijo» mantiene esa sobriedad. No se mayúscula «Hijo» para no introducir una identificación cristológica interpretativa en el texto principal.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - para sí
  - unos con otros
  lexicon: BDAG
  rationale: «Entre sí» expresa de forma natural que hablaron dentro del grupo. Es más idiomático que «para sí» en este plural colectivo.
- source_word: κληρονόμος
  english_pob_choice: heir
  chosen_spanish: heredero
  alternatives_spanish:
  - sucesor
  - heredero legal
  lexicon: BDAG
  rationale: «Heredero» es el equivalente directo y natural de κληρονόμος, conservando el sentido legal de la escena.
- source_word: δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - vamos
  - vengan ahora
  lexicon: BDAG
  rationale: Como exhortación dirigida al grupo, «Vengan» refleja bien la invitación a la acción. Mantiene el tono imperativo sin añadir matices innecesarios.
- source_word: ἀποκτείνωμεν
  english_pob_choice: let us kill
  chosen_spanish: matémoslo
  alternatives_spanish:
  - matémosle
  - démosle muerte
  - quitémoslo de en medio
  lexicon: BDAG
  rationale: 'El subjuntivo exhortativo se expresa naturalmente en español como una primera persona plural imperativa: «matémoslo». Conserva la violencia directa del verbo sin volverlo jurídico ni eufemístico.'
- source_word: σχῶμεν
  english_pob_choice: seize
  chosen_spanish: apoderémonos de
  alternatives_spanish:
  - tomemos posesión de
  - quedémonos con
  - retengamos
  lexicon: BDAG
  rationale: Aunque σχῶμεν viene de ἔχω, aquí el contexto tras «matémoslo» implica tomar posesión por la fuerza. «Apoderémonos de» expresa bien esa apropiación hostil en español. Se conserva la tensión lexical de la nota inglesa, donde «have his inheritance» también era posible más literalmente.
- source_word: κληρονομίαν αὐτοῦ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - la herencia de él
  - su patrimonio
  lexicon: BDAG
  rationale: «Herencia» corresponde directamente a κληρονομία y encaja con «heredero». «Su» mantiene el vínculo explícito con el hijo, sin perder la claridad idiomática en español.
theological_decisions:
- issue: Identidad del hijo en la parábola
  english_pob_reading: Render υἱός simply as 'the son' without making the Christological identification explicit in the translation.
  chosen_spanish_reading: Traducir simplemente «al hijo» sin explicitar en el texto principal que se trata de Jesús o del Hijo de Dios.
  alternative_spanish_readings:
  - «al Hijo» con mayúscula
  - «al hijo, es decir, Jesús»
  rationale: La parábola apunta claramente a Jesús en el contexto mateano, pero este versículo opera todavía en el nivel narrativo de la historia. Se preserva esa tensión teológica en vez de resolverla en la traducción principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se indicaron cambios y el cotejo externo mostró alta concordancia. La redacción española sigue el sentido del griego y respeta la nota léxica sobre σχῶμεν sin resolverla de modo excesivamente técnico en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «heredero» / «herencia» para reflejar κληρονόμος / κληρονομία y conservar la lógica interna del dicho.
  - Se usa «labradores» como término natural y no eclesiástico, de modo coherente con el entorno parabólico del viñedo.
  - No se introduce «Cristo» ni «Hijo» mayúsculo en el texto principal para preservar la tensión cristológica documentada.
  - El tono imperativo plural («Vengan, matémoslo y apoderémonos de...») reproduce la deliberación colectiva del grupo.
