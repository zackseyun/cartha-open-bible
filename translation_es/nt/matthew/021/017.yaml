  source_alignment_summary: 'El borrador español transmite correctamente la secuencia básica del griego: Jesús los deja, sale de la ciudad hacia Betania y pasa allí la noche. También preserva bien el matiz de ηὐλίσθη con una nota de alternativa léxica adecuada.'
  spanish_quality_summary: La frase es clara y natural en general, pero «salió fuera de la ciudad» suena redundante en español. Aunque el griego refuerza la salida con ἐξῆλθεν + ἔξω, el español idiomático expresa esto fielmente con «salió de la ciudad». El resto del versículo está bien logrado.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Betania», «allí» y «pasó allí la noche» encajan bien con el proyecto. La revisión propuesta mejora la naturalidad sin perder el refuerzo espacial del original en un nivel aceptable de equivalencia óptima.
  issues:
