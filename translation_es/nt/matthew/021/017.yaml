translation:
  language: es
  text: Y dejándolos[a], salió de la ciudad a Betania y pasó allí la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alojó allí» o «pasó la noche allí».
    reason: lexical_alternative
lexical_decisions:
- source_word: καταλιπὼν
  english_pob_choice: leaving
  chosen_spanish: dejándolos
  alternatives_spanish:
  - habiéndolos dejado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la del verbo principal. «Dejándolos» mantiene esa relación temporal de forma natural en español sin volver la frase pesada.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - esas personas
  - a ellos
  lexicon: BDAG
  rationale: El pronombre se refiere a los interlocutores inmediatos. «Los» es directo y natural; no añade matices interpretativos.
- source_word: ἐξῆλθεν ἔξω τῆς πόλεως
  english_pob_choice: went out of the city
  chosen_spanish: salió fuera de la ciudad
  alternatives_spanish:
  - salió de la ciudad
  - salió afuera de la ciudad
  lexicon: BDAG
  rationale: El griego refuerza la idea de salir al exterior con ἐξῆλθεν + ἔξω. «Salió fuera de la ciudad» conserva ese refuerzo sin sonar torpe en español.
- source_word: πόλεως
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - población
  - town
  lexicon: BDAG
  rationale: En contexto se trata de Jerusalén. «Ciudad» es el equivalente natural y fiel a πόλις en este uso.
- source_word: εἰς Βηθανίαν
  english_pob_choice: to Bethany
  chosen_spanish: a Betania
  alternatives_spanish:
  - hacia Betania
  - hasta Betania
  lexicon: BDAG
  rationale: Con un topónimo, el español normal usa «a». Mantiene la direccionalidad de εἰς sin sobrecargar la frase.
- source_word: ηὐλίσθη
  english_pob_choice: stayed there overnight
  chosen_spanish: pasó allí la noche
  alternatives_spanish:
  - se alojó allí
  - pernoctó allí
  - se quedó allí
  lexicon: BDAG
  rationale: αὐλίζομαι significa alojarse o pasar la noche. «Pasó allí la noche» comunica bien la estancia nocturna con un registro claro y digno.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: El adverbio locativo se refiere a Betania. «Allí» es la forma más neutra y natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La versión inglesa más reciente mantuvo sin cambios su solución optimal-equivalence; la española sigue esa misma lectura global y conserva la tensión léxica del verbo final αὐλίζομαι mediante una nota con alternativas naturales.
  spanish_consistency_notes:
  - Se mantiene «Betania» como topónimo transliterado habitual.
  - No se introduce «SEÑOR» ni otras fórmulas teológicas ajenas al verso.
  - 'Se preserva la secuencia narrativa simple del griego: dejar, salir, ir, pasar la noche.'
