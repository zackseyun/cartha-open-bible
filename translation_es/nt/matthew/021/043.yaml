translation:
  language: es
  text: 'Por eso les digo[a]: el reino de Dios les será quitado y será dado a una nación que produce sus frutos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un pueblo». El griego ἔθνει puede significar nación o pueblo; aquí designa una entidad colectiva caracterizada por su fruto, sin precisar más quién es.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: La locución introduce una conclusión basada en lo anterior. «Por eso» comunica bien la relación inferencial en un español natural y sobrio, sin sonar demasiado coloquial ni excesivamente literal.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les aseguro
  - les hablo
  lexicon: BDAG
  rationale: La fórmula de discurso directo en español suena natural como «les digo». Mantiene el valor personal del pronunciamiento sin añadir una intensificación que el griego no exige aquí.
- source_word: ἀρθήσεται ἀφ’ ὑμῶν
  english_pob_choice: will be taken away from you
  chosen_spanish: se les quitará
  alternatives_spanish:
  - será quitado de ustedes
  - será retirado de ustedes
  - les será quitado
  lexicon: BDAG
  rationale: El futuro pasivo de αἴρω expresa remoción o quita. «Se les quitará» conserva la pasiva y la idea de pérdida. El complemento «de ustedes» queda implícito por el dativo pronominal «les», lo cual es idiomático en español.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - el reino divino
  - el reinado de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia directa y más estable para βασιλεία en este contexto. Se evita «reinado» porque estrecha el alcance y desplaza el matiz concreto de la expresión bíblica.
- source_word: δοθήσεται
  english_pob_choice: and given
  chosen_spanish: y se le dará
  alternatives_spanish:
  - y será dado
  - y se dará
  - y le será dado
  lexicon: BDAG
  rationale: La pasiva futura coordinada se expresa de modo natural con «se le dará». Conserva el valor pasivo y permite un español fluido sin repetir innecesariamente la idea de sujeto explícito.
- source_word: ἔθνει
  english_pob_choice: to a nation
  chosen_spanish: a una nación
  alternatives_spanish:
  - a un pueblo
  - a un grupo de personas
  - a una nación/pueblo
  lexicon: BDAG
  rationale: «Nación» refleja el sustantivo ἔθνος de manera directa. Aunque puede significar también «pueblo», la traducción mantiene la amplitud semántica sin decidir de antemano la identificación teológica del destinatario.
- source_word: ποιοῦντι
  english_pob_choice: producing
  chosen_spanish: que produzca
  alternatives_spanish:
  - que produce
  - productora de
  - que da
  lexicon: BDAG
  rationale: El participio presente describe una cualidad continua de la nación receptora. En español, una relativa con subjuntivo («que produzca») comunica bien el carácter caracterizador de la frase y su orientación a la acción fructífera.
- source_word: τοὺς καρποὺς αὐτῆς
  english_pob_choice: its fruits
  chosen_spanish: sus frutos
  alternatives_spanish:
  - su fruto
  - sus frutos
  - su producción
  lexicon: BDAG
  rationale: Se conserva el plural «frutos» para reflejar καρπούς. «Sus» mantiene la referencia pronominal del texto y la imagen bíblica de resultados visibles y múltiples.
theological_decisions:
- issue: Identidad de la «nación» receptora (ἔθνει)
  english_pob_reading: Rendered generically as 'a nation' without specifying the church, Gentiles, or a remnant of Israel in the main text.
  chosen_spanish_reading: «a una nación» sin identificarla más en el texto principal.
  alternative_spanish_readings:
  - a un pueblo
  - a los gentiles
  - a la iglesia
  rationale: El griego nombra una entidad corporativa caracterizada por su fruto, pero no obliga a resolver su identidad histórica o eclesiológica en la traducción. Mantener «nación» preserva la tensión interpretativa y evita añadir una conclusión doctrinal no explicitada por el versículo.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Alcance de «el reino de Dios» en el dicho de juicio
  english_pob_reading: Retained as 'the kingdom of God' rather than paraphrasing as 'the privilege of belonging to God's people' or 'rule of God.'
  chosen_spanish_reading: Conservar «el reino de Dios» sin parafrasearlo como «el reinado de Dios» o «el privilegio de pertenecer al pueblo de Dios».
  alternative_spanish_readings:
  - el reinado de Dios
  - el gobierno de Dios
  - los privilegios del reino
  rationale: La expresión debe mantenerse con su amplitud teológica y su forma bíblica establecida. Un giro explicativo reduciría el alcance del dicho y resolvería demasiado pronto lo que el texto deja en tensión.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'La versión sigue de cerca el último pase de revisión, que quedó sin cambios y con alto grado de acuerdo. Se mantuvieron las decisiones clave del audit trail: ἔθνει como «una nación» sin especificación teológica, ἀρθήσεται como remoción pasiva, y τοὺς καρποὺς como plural «frutos».'
  spanish_consistency_notes:
  - Se usa «reino de Dios» de manera consistente con la terminología POB estable para βασιλεία τοῦ θεοῦ.
  - «Frutos» conserva el plural del griego y armoniza con el lenguaje bíblico de resultado visible y productivo.
  - La pasiva se expresa con «se les quitará / se le dará» para mantener el foco en la acción recibida sin añadir agente explícito.
  - Se evita «SEÑOR» u otras sustituciones, porque aquí no aparece el tetragrámaton y el texto habla de θεοῦ, que se traduce como «Dios».
