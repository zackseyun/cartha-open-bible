  to: 'Por eso les digo[a]: el reino de Dios les será quitado y será dado a una nación que produce sus frutos.'
  rationale: Se ajusta la redacción para reflejar con mayor claridad los dos futuros pasivos del griego, mejorar la fluidez del español y representar mejor el valor caracterizador del participio presente, sin cambiar el sentido ni la cautela teológica del original.
