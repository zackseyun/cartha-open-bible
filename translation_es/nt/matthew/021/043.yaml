review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: inferencia (''Por eso''), fórmula de anuncio (''les digo''), pasiva de remoción y transferencia del reino, y el receptor corporativo indefinido (''una nación''). También preserva correctamente la nota léxica sobre ἔθνει. Sin embargo, ''se les quitará'' y luego ''se le dará'' crea una asimetría pronominal algo confusa, y ''que produzca'' puede sonar más prospectivo que descriptivo para el participio presente caracterizador ποιοῦντι.'
  spanish_quality_summary: El español es claro y bastante natural, pero puede pulirse para mayor precisión y dignidad bíblica. 'Les será quitado' y 'será dado a una nación que produce sus frutos' suena más equilibrado, evita ambigüedad pronominal y refleja mejor el carácter descriptivo del participio. La nota al pie está bien, aunque 'cuerpo corporativo' es redundante; conviene simplificar a 'colectivo' o 'entidad colectiva'.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: ''Dios'' para θεοῦ, ''reino de Dios'' para ἡ βασιλεία τοῦ θεοῦ, y mantiene ''nación'' con alternativa ''pueblo'' sin resolver la identificación teológica. No hay conflicto con los términos doctrinales por defecto.'
  issues:
  - severity: medium
    issue: Asimetría y posible ambigüedad en 'se les quitará ... y se le dará'
    rationale: Aunque gramaticalmente posible, el cambio de 'les' a 'le' en una misma oración puede entorpecer la lectura. 'Les será quitado ... y será dado a una nación' expresa con más claridad los dos pasivos futuros del griego.
  - severity: medium
    issue: '''que produzca'' puede sonar volitivo o prospectivo'
    rationale: El participio presente ποιοῦντι caracteriza al receptor por una acción continua. En este contexto, 'que produce' refleja mejor la función descriptiva que un subjuntivo potencial.
  - severity: low
    issue: La nota dice 'cuerpo corporativo'
    rationale: La expresión es redundante en español. Una formulación como 'entidad colectiva' o 'colectivo' es más limpia y natural.
  revised_spanish_text: 'Por eso les digo[a]: el reino de Dios les será quitado y será dado a una nación que produce sus frutos.'
  revised_footnotes:
  - marker: a
    text: O «a un pueblo». El griego ἔθνει puede significar nación o pueblo; aquí designa una entidad colectiva caracterizada por su fruto, sin precisar más quién es.
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para reflejar con mayor claridad los dos futuros pasivos del griego, mejorar la fluidez del español y representar mejor el valor caracterizador del participio presente, sin cambiar el sentido ni la cautela teológica del original.
