revisions:
- from: 'Pero si decimos[a]: ‘De parte de los hombres’, tememos a la multitud, porque todos tienen a Juan como profeta.'
  to: 'Pero si decimos[a]: «De los hombres», tememos a la multitud, porque todos consideran a Juan un profeta.'
  rationale: Se corrige ‘De parte de los hombres’ a ‘De los hombres’ para preservar el contraste conciso entre origen humano y origen celestial del contexto. Se mantiene la nota alternativa ‘de origen humano’ para explicitar el sentido cuando sea útil. También se mejora la naturalidad de la construcción valorativa con ‘consideran a Juan un profeta’, que expresa de manera más idiomática el sentido de ὡς προφήτην ἔχουσιν.
