translation:
  language: es
  text: 'Pero si decimos[a]: «De los hombres», tememos a la multitud, porque todos consideran a Juan un profeta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de origen humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ εἴπωμεν
  english_pob_choice: But if we say
  chosen_spanish: Pero si decimos
  alternatives_spanish:
  - Pero si llegamos a decir
  - Pero si dijéramos
  lexicon: BDAG
  rationale: La construcción condicional con ἐὰν + subjuntivo expresa una posibilidad deliberada o hipotética. ‘Pero si decimos’ conserva esa fuerza de hipótesis inmediata en español natural, sin volver la frase artificialmente literaria.
- source_word: Ἐξ ἀνθρώπων
  english_pob_choice: From men
  chosen_spanish: De parte de los hombres
  alternatives_spanish:
  - De los hombres
  - De origen humano
  lexicon: BDAG
  rationale: El contexto inmediato contrasta con el origen ‘del cielo’ en el versículo anterior. ‘De parte de los hombres’ preserva con claridad la idea de procedencia o fuente, y evita que el español suene exclusivamente como referencia a varones individuales. También mantiene la tensión entre origen divino y origen humano.
- source_word: φοβούμεθα
  english_pob_choice: we fear
  chosen_spanish: tememos
  alternatives_spanish:
  - tenemos miedo
  - tememos al
  lexicon: BDAG
  rationale: 'El verbo aquí tiene sentido activo: el grupo anticipa temor frente a la reacción del pueblo. ‘Tememos’ es conciso y fiel; ‘tenemos miedo’ sería más explícito pero menos sobrio en este registro.'
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - el gentío
  - la gente
  lexicon: BDAG
  rationale: ὄχλος en Mateo suele referirse a la masa reunida. ‘Multitud’ es natural en español bíblico y conserva el matiz colectivo mejor que ‘gente’.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la gente entera
  lexicon: BDAG
  rationale: El adverbio colectivo se expresa de manera simple con ‘todos’, que mantiene la generalidad del juicio popular sin introducir un sujeto distinto.
- source_word: ὡς προφήτην ἔχουσιν τὸν Ἰωάννην
  english_pob_choice: regard John as a prophet
  chosen_spanish: tienen a Juan como profeta
  alternatives_spanish:
  - consideran a Juan como profeta
  - tienen a Juan por profeta
  lexicon: BDAG
  rationale: La construcción ἔχω + objeto + ὡς indica valoración o consideración. ‘Tienen a Juan como profeta’ reproduce bien esa valoración sin forzar una perífrasis demasiado interpretativa. ‘Tienen a Juan por profeta’ es una alternativa más tradicional, pero ‘como’ resulta más transparente para el español moderno.
- source_word: προφήτην
  english_pob_choice: a prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - un profeta
  lexicon: BDAG
  rationale: 'En español, el predicado nominal en esta estructura puede omitirse el artículo para sonar natural: ‘como profeta’. El sentido indefinido sigue siendo claro por el contexto.'
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  lexicon: convención onomástica estándar
  rationale: Se conserva el nombre propio en su forma española usual, según la convención del proyecto.
theological_decisions:
- issue: Sentido de Ἐξ ἀνθρώπων frente al contraste con el cielo
  english_pob_reading: From men
  chosen_spanish_reading: De parte de los hombres
  alternative_spanish_readings:
  - De los hombres
  - De origen humano
  rationale: El pasaje contrapone una fuente humana a una fuente divina. ‘De parte de los hombres’ mantiene esa oposición sin reducir ἀνθρώπων a un mero masculino biológico, y comunica bien la idea de procedencia en el debate de autoridad.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Juicio popular sobre Juan
  english_pob_reading: they all regard John as a prophet
  chosen_spanish_reading: todos tienen a Juan como profeta
  alternative_spanish_readings:
  - todos consideran a Juan un profeta
  - todos tienen a Juan por profeta
  rationale: La frase reporta la percepción popular, no una afirmación doctrinal adicional del narrador. La traducción conserva el valor descriptivo y la tensión narrativa del versículo.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, punto 3
translation_notes:
  revision_awareness: El texto griego y el aparato auditado en inglés muestran alta concordancia y no requieren revisiones sustantivas; se conserva la misma resolución semántica con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa ‘Juan’ para Ἰωάννην, conforme a la convención habitual del proyecto.
  - Se mantiene un registro sobrio y público, con ‘multitud’ para ὄχλος y ‘profeta’ para προφήτης.
  - ‘De parte de los hombres’ conserva la oposición fuente humana / fuente divina del contexto inmediato, alineada con la lectura auditada en inglés.
