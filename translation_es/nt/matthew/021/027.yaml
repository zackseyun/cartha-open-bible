revisions:
- from: 'Y respondiendo a Jesús, dijeron: «No lo sabemos». Él también les dijo: «Tampoco yo les digo con qué autoridad hago estas cosas».[a]'
  to: 'Y respondiendo a Jesús, dijeron: «No sabemos». Él también les dijo: «Tampoco yo les diré con qué autoridad hago estas cosas».[a]'
  rationale: Se corrige una expansión innecesaria («lo»), se mejora la naturalidad e idiomaticidad de la negativa de Jesús conforme a la decisión documentada en inglés, y se elimina de la nota una alternativa española engañosa.
