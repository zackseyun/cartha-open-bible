    text: «Con qué autoridad» traduce ἐν ποίᾳ ἐξουσίᾳ; también podría expresarse «en virtud de qué autoridad».
    reason: lexical_alternative
  revision_rationale: Se corrige una expansión innecesaria («lo»), se mejora la naturalidad e idiomaticidad de la negativa de Jesús conforme a la decisión documentada en inglés, y se elimina de la nota una alternativa española engañosa.
