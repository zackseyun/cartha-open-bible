review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: respuesta a Jesús, confesión de ignorancia y negativa recíproca de Jesús a revelar la fuente de su autoridad. Sin embargo, «No lo sabemos» añade un objeto directo no expreso en Οὐκ οἴδαμεν, y «Tampoco yo les digo» suena menos natural y menos idiomático que una negativa de revelación explícita en español. El sentido de ἐν ποίᾳ ἐξουσίᾳ como «con qué autoridad» es aceptable y fiel.'
  spanish_quality_summary: 'El español es claro, pero requiere un ajuste menor para mayor naturalidad y precisión formal. «No sabemos» es más limpio y más cercano al griego que «No lo sabemos». Además, «Tampoco yo les digo…» resulta algo rígido; «Tampoco yo les diré…» expresa mejor en español la negativa recíproca documentada en el POB inglés sin introducir ambigüedad. La nota al pie actual contiene una alternativa incorrecta: «por qué autoridad» no corresponde al sentido de ἐν ποίᾳ ἐξουσίᾳ.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Jesús» y «autoridad» están bien. No hay términos teológicos sensibles mal manejados. La elección entre presente y futuro en la negativa de Jesús debe seguir la racionalidad ya documentada en el POB inglés: en español también conviene un futuro de negativa («les diré») para sonar idiomático.'
  issues:
  - severity: medium
    issue: «No lo sabemos» añade un objeto no expreso en el griego
    rationale: Οὐκ οἴδαμεν significa sencillamente «No sabemos». El pronombre «lo» no es necesario y puede sentirse como expansión interpretativa.
  - severity: medium
    issue: «Tampoco yo les digo» es menos idiomático que una negativa prospectiva
    rationale: Aunque λέγω está en presente, el propio POB inglés documenta una fuerza de negativa futura/refusal. En español, «Tampoco yo les diré» comunica mejor esa reciprocidad en diálogo.
  - severity: high
    issue: La nota al pie propone «por qué autoridad» como alternativa
    rationale: «Por qué autoridad» en español normalmente sugiere causa o motivo y no representa adecuadamente ἐν ποίᾳ ἐξουσίᾳ. Esa alternativa debe eliminarse para no introducir un sentido erróneo.
  revised_spanish_text: 'Y respondiendo a Jesús, dijeron: «No sabemos». Él también les dijo: «Tampoco yo les diré con qué autoridad hago estas cosas».[a]'
  revised_footnotes:
