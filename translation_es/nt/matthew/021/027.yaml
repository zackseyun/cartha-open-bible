translation:
  language: es
  text: 'Y respondiendo a Jesús, dijeron: «No sabemos». Él también les dijo: «Tampoco yo les diré con qué autoridad hago estas cosas».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Con qué autoridad» traduce ἐν ποίᾳ ἐξουσίᾳ; también podría expresarse «en virtud de qué autoridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - en respuesta
  - habiendo respondido
  lexicon: BDAG
  rationale: El participio introduce la respuesta de ellos; «respondiendo» conserva la relación temporal y discursiva de manera natural en español, sin volverla demasiado pesada.
- source_word: Οὐκ οἴδαμεν
  english_pob_choice: We do not know
  chosen_spanish: No lo sabemos
  alternatives_spanish:
  - No sabemos
  - No lo conocemos
  lexicon: BDAG
  rationale: La negación expresa falta de conocimiento. En español, el pronombre «lo» comunica de forma clara y sobria el objeto implícito de lo que se les pregunta.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: BDAG
  rationale: El verbo de habla simple se vierte de forma directa; «les dijo» mantiene la naturalidad del diálogo y hace explícito el destinatario en español.
- source_word: καὶ αὐτός
  english_pob_choice: He also
  chosen_spanish: Él también
  alternatives_spanish:
  - y él
  - él a su vez
  lexicon: BDAG
  rationale: La combinación señala respuesta recíproca. «Él también» reproduce ese valor sin sobreinterpretar la relación lógica.
- source_word: Οὐδὲ ἐγὼ λέγω ὑμῖν
  english_pob_choice: Neither will I tell you
  chosen_spanish: Tampoco yo les digo
  alternatives_spanish:
  - Ni yo les digo
  - Tampoco yo les diré
  lexicon: BDAG
  rationale: Aunque el griego usa presente, aquí la frase funciona como negativa de respuesta. Se conserva la forma verbal presente «digo» para no añadir un futuro no expresado explícitamente por el texto, pero con «Tampoco» se mantiene la fuerza de negativa recíproca.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: by what authority
  chosen_spanish: con qué autoridad
  alternatives_spanish:
  - por qué autoridad
  - en qué autoridad
  lexicon: BDAG
  rationale: «Autoridad» es la opción que mejor preserva la fuerza jurídica y polémica. En español, «con qué autoridad» comunica con naturalidad la base o respaldo con que Jesús actúa, sin forzar una construcción extraña.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas acciones
  lexicon: BDAG
  rationale: El plural demostrativo se conserva como plural. «Estas cosas» mantiene la referencia amplia a los actos de Jesús en disputa, sin reducirla indebidamente a una sola acción.
- source_word: ποιῶ
  english_pob_choice: I do
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - realizo
  lexicon: BDAG
  rationale: El presente simple es natural en español y conserva el valor general de la acción de Jesús en el contexto inmediato.
theological_decisions:
- issue: Sentido de ἐξουσία en la respuesta de Jesús
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - derecho
  - poder
  rationale: En esta controversia, se pregunta por la legitimidad y el origen del proceder de Jesús. «Autoridad» preserva mejor ese alcance jurídico-teológico que «poder», y evita reducir el término a mera capacidad.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto inglés POB reciente mantiene una equivalencia óptima sencilla y sin notas; la presente versión sigue su lectura de la secuencia discursiva y de ἐξουσία como «authority», pero ajusta la cláusula verbal final al español con una negativa directa y natural. No se detectan revisiones textuales en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «autoridad» para ἐξουσία conforme al criterio del proyecto.
  - Se conserva el plural de ταῦτα como «estas cosas», en línea con el audit trail inglés.
  - Se evita el calco «en qué autoridad» por ser poco idiomático en español; la nota explica la alternativa literal.
