translation:
  language: es
  text: 'Pero, ¿qué les parece? Un hombre tenía dos hijos[a]. Al acercarse al primero, le dijo: «Hijo[a], ve hoy a trabajar en la viña».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dos hijos varones» / «Hijo». Muchos traductores usan «hijos varones», pero el griego aquí dice τέκνα / τέκνον, un término más amplio que no especifica varón.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί δὲ ὑμῖν δοκεῖ;
  english_pob_choice: But what do you think?
  chosen_spanish: Pero, ¿qué les parece?
  alternatives_spanish:
  - ¿Qué les parece?
  - Pero, ¿qué piensan?
  lexicon: BDAG
  rationale: Se conserva la fuerza interrogativa idiomática de δοκεῖ como apelación al juicio del oyente. Se añade «Pero» para reflejar el matiz conectivo de δέ, de manera natural en español.
- source_word: ἄνθρωπος
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  - Un cierto hombre
  lexicon: BDAG
  rationale: ἄνθρωπος es masculino singular y aquí presenta al padre de la parábola; «hombre» es preciso y natural en español.
- source_word: τέκνα δύο
  english_pob_choice: two children
  chosen_spanish: dos hijos
  alternatives_spanish:
  - dos niños
  - dos descendientes
  lexicon: BDAG
  rationale: Aunque τέκνα significa literalmente «hijos/niños/descendencia» en sentido amplio, en este contexto narrativo español «hijos» comunica mejor la relación familiar del padre con los dos miembros de la parábola. Se conserva la tensión con la nota, porque el griego no usa el término más específico υἱοί.
- source_word: προσελθὼν
  english_pob_choice: Going to
  chosen_spanish: Acercándose
  alternatives_spanish:
  - Yendo hacia
  - Al acercarse
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma fluida con una construcción de gerundio en español. «Acercándose» mantiene el movimiento previo a la acción principal.
- source_word: τῷ πρώτῳ
  english_pob_choice: the first
  chosen_spanish: al primero
  alternatives_spanish:
  - al primero de ellos
  - al primero de los dos
  lexicon: BDAG
  rationale: La referencia ordinal se traduce de forma directa y concisa.
- source_word: Τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo mío
  - Niño
  lexicon: BDAG
  rationale: Aunque τέκνον es más amplio que «hijo», en el habla natural del padre en español «Hijo» funciona como vocativo natural y cercano. La nota conserva la posibilidad léxica más amplia del griego.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  lexicon: BDAG
  rationale: El imperativo expresa un envío directo; «ve» es claro y sobrio en español.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: BDAG
  rationale: Equivalente temporal directo y natural.
- source_word: ἐργάζου
  english_pob_choice: work
  chosen_spanish: trabajar
  alternatives_spanish:
  - trabaja
  - laborar
  lexicon: BDAG
  rationale: En español, tras «ve» la construcción infinitiva es natural («ve ... a trabajar») y comunica la orden de forma clara. Se mantiene el sentido de labor/actividad productiva sin sobrecargar el verso.
- source_word: ἐν τῷ ἀμπελῶνι
  english_pob_choice: in the vineyard
  chosen_spanish: en la viña
  alternatives_spanish:
  - en el viñedo
  - en la plantación de uvas
  lexicon: BDAG
  rationale: ἀμπελών es «viña», término tradicional y exacto para el lugar de cultivo de la vid. Es preferible a «viñedo» por su transparencia bíblica y por conservar la imagen del texto.
theological_decisions:
- issue: Valor de τέκνα/τέκνον frente a la traducción tradicional «hijos/hijo»
  english_pob_reading: children / Child
  chosen_spanish_reading: hijos / Hijo
  alternative_spanish_readings:
  - niños / Niño
  - descendientes / Descendiente
  rationale: El inglés POB mantuvo la amplitud de τέκνα/τέκνον frente a la tradición de «sons/son». En español, «hijos» es el equivalente familiar más natural y mantiene mejor la relación narrativa con el padre. La nota explicita que el griego no usa el término más estrecho para «hijos varones».
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto principal junto a la palabra correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - Se prefirió «viña» para ἀμπελών, coherente con el lenguaje bíblico y con la imagen agrícola del pasaje.
  - Se evitó traducir mecánicamente desde el inglés cuando el español requería una construcción más natural, especialmente en el participio προσελθὼν y la orden ἐργάζου.
