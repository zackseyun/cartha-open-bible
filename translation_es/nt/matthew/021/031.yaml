translation:
  language: es
  text: '¿Cuál de los dos hizo la voluntad del padre? Ellos dijeron: «El primero». Jesús les dijo: «En verdad les digo que los recaudadores de impuestos y las prostitutas van delante de ustedes[a] al reino de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entran al reino de Dios antes que ustedes». El griego dice «van delante de ustedes», subrayando precedencia sin afirmar necesariamente exclusión final.
    reason: alternative_reading
lexical_decisions:
- source_word: τίς ἐκ τῶν δύο
  english_pob_choice: Which of the two
  chosen_spanish: ¿Cuál de los dos
  alternatives_spanish:
  - ¿Cuál uno de los dos
  - ¿Qué de los dos
  lexicon: BDAG
  rationale: Mantiene el valor partitivo de ἐκ τῶν δύο con una interrogativa natural en español.
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - cumplió
  - realizó
  lexicon: BDAG
  rationale: En español, 'hizo la voluntad' conserva la fuerza concreta de ποιέω y suena natural con θέλημα.
- source_word: τὸ θέλημα τοῦ πατρός
  english_pob_choice: the will of the father
  chosen_spanish: la voluntad del padre
  alternatives_spanish:
  - la voluntad de su padre
  - la voluntad del padre de la parábola
  lexicon: BDAG
  rationale: Se conserva la expresión directa sin convertirla en posesivo explícito; el contexto deja claro a qué padre se refiere.
- source_word: Ὁ πρῶτος
  english_pob_choice: The first
  chosen_spanish: El primero
  alternatives_spanish:
  - El primero de ellos
  - El primero, el hijo que obedeció
  lexicon: BDAG
  rationale: Respuesta elíptica natural en español, equivalente al griego breve y directo.
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: De cierto les digo
  alternatives_spanish:
  - Amén les digo
  - En verdad les digo
  lexicon: BDAG
  rationale: '''De cierto'' comunica la solemnidad de la fórmula sin forzar un calco poco idiomático; se mantiene el tono de declaración autoritativa.'
- source_word: τελῶναι
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - publicanos
  - cobradores de impuestos
  lexicon: BDAG
  rationale: Se evita 'publicanos' por su carga tradicional eclesiástica menos transparente; 'recaudadores de impuestos' explica con claridad la función social del término.
- source_word: πόρναι
  english_pob_choice: prostitutes
  chosen_spanish: las prostitutas
  alternatives_spanish:
  - las rameras
  - las mujeres prostitutas
  lexicon: BDAG
  rationale: Es la equivalencia moderna más directa y específica, preservando el peso social y moral del término.
- source_word: προάγουσιν ὑμᾶς
  english_pob_choice: are going ahead of you
  chosen_spanish: van delante de ustedes
  alternatives_spanish:
  - van antes que ustedes
  - los preceden
  lexicon: BDAG
  rationale: '''Van delante de ustedes'' reproduce la idea de precedencia y mantiene la tensión del griego sin convertirla en ''entran antes'' o ''entran en lugar de''.'
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: into the kingdom of God
  chosen_spanish: hacia el reino de Dios
  alternatives_spanish:
  - en el reino de Dios
  - al reino de Dios
  lexicon: BDAG
  rationale: '''Hacia'' preserva el matiz de dirección y avance de προάγω junto con εἰς, sin cerrar la frase con una afirmación más fuerte que la del griego.'
theological_decisions:
- issue: Fuerza de προάγουσιν ὑμᾶς con εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_reading: are going ahead of you into the kingdom of God
  chosen_spanish_reading: van delante de ustedes hacia el reino de Dios
  alternative_spanish_readings:
  - entran antes que ustedes en el reino de Dios
  - van delante de ustedes al reino de Dios
  rationale: Se conserva la imagen de precedencia sin resolver el dicho hacia una exclusión absoluta o una mera admisión temporal. La redacción mantiene la advertencia de Jesús y la tensión teológica del texto.
  doctrine_reference: Preservar la tensión del dicho sin interpretarlo más allá del griego.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el borrador español sigue la misma lectura de alta concordancia y conserva la misma tensión interpretativa sobre προάγουσιν ὑμᾶς.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y no «Señor», según el griego.
  - Se evita «publicanos» como término opaco; «recaudadores de impuestos» mantiene claridad y fuerza social.
  - La dirección de εἰς se expresa con «hacia» para no endurecer la frase más allá del verbo griego προάγω.
  - Se mantiene «reino de Dios» como fórmula estable y transparente en español.
