translation:
  language: es
  text: 'Entonces fue al segundo y le dijo lo mismo. Y él respondió: «Iré, señor[a]», pero no fue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Yo, señor», una respuesta elíptica que significa «Iré» o «lo haré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - se acercó
  - llegó
  lexicon: BDAG
  rationale: El participio aoristo introduce el movimiento del padre hacia el segundo hijo. En español, «fue al» expresa ese desplazamiento de manera natural y breve, sin añadir matices no presentes en el griego.
- source_word: τῷ δευτέρῳ
  english_pob_choice: to the second
  chosen_spanish: al segundo
  alternatives_spanish:
  - al segundo hijo
  - al otro
  lexicon: BDAG
  rationale: El griego dice literalmente «al segundo» y omite «hijo», que se sobreentiende por el contexto inmediato. Mantener «el segundo» preserva la economía del original.
- source_word: ὡσαύτως
  english_pob_choice: the same
  chosen_spanish: lo mismo
  alternatives_spanish:
  - igualmente
  - de la misma manera
  lexicon: BDAG
  rationale: La expresión remite a la misma instrucción dada antes. «Lo mismo» es natural en español y conserva la brevedad del griego y de la decisión inglesa.
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: he answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - le respondió
  lexicon: BDAG
  rationale: La fórmula narrativa griega se vierte de forma idiomática en español con un solo verbo de respuesta. «Respondió» mantiene el sentido sin redundancia.
- source_word: Ἐγώ
  english_pob_choice: I will
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo iré
  - Sí
  lexicon: BDAG
  rationale: El griego contiene solo el pronombre enfático «Ἐγώ». La traducción conserva esa literalidad en el texto, porque la idea de aceptación queda elíptica; el verbo se explica en la nota.
- source_word: κύριε
  english_pob_choice: sir
  chosen_spanish: señor
  alternatives_spanish:
  - señor mío
  - amo
  lexicon: BDAG
  rationale: Aquí κύριε es un vocativo de respeto dirigido a un padre humano, no a Dios ni al Mesías. «Señor» comunica cortesía en español y evita sobrecarga teológica.
- source_word: καὶ οὐκ ἀπῆλθεν
  english_pob_choice: but he did not go
  chosen_spanish: pero no fue
  alternatives_spanish:
  - y no fue
  - mas no fue
  lexicon: BDAG
  rationale: Aunque el griego usa καί, en español el contraste entre la respuesta y la conducta se expresa mejor con «pero». «No fue» reproduce de modo breve el resultado negativo.
theological_decisions:
- issue: Sentido de κύριε en un contexto familiar y no divino
  english_pob_reading: sir
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  - amo
  rationale: En esta parábola el interlocutor es el padre humano. Traducir κύριε como «Señor» con mayúscula sugeriría un título divino o cristológico que el contexto no exige. «Señor» en minúscula mantiene el respeto y la relación interpersonal.
  doctrine_reference: 'DOCTRINE.md: κύριος se traduce según contexto; en vocativos humanos de respeto puede rendirse con tratamiento honorífico no teológico.'
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés sin cambios relevantes; se mantuvo la economía del original, la elipsis de Ἐγώ y el valor de cortesía de κύριε, evitando introducir «hijo» o una formulación más explícita que el griego no da.
  spanish_consistency_notes:
  - Se conserva «señor» en minúscula como vocativo de respeto humano, no como título divino.
  - «Lo mismo» mantiene la repetición narrativa sin sobrerrepresentar ὡσαύτως.
  - La elipsis de Ἐγώ queda reflejada en la nota para no perder la tensión léxica documentada.
