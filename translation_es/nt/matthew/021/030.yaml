base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/030.yaml
  text: Then he came to the second and said the same[a]. And he answered, ‘I will[b], sir,’ but he did not go.
  footnotes:
  - marker: a
    text: Or, more literally, 'I, sir'—an elliptical reply meaning 'I will' or 'I will go.'
    reason: lexical_alternative
  - marker: b
    text: Greek κύριε can also be rendered 'lord' or 'master'; here it is used as a respectful address to a human father, so 'sir' is preferred.
    reason: alternative_reading
