translation:
  language: es
  text: 'Escuchen otra parábola: Había un propietario que plantó una viña y le puso una cerca[b] alrededor, y cavó en ella un lagar, y edificó una torre[a], y la arrendó a unos labradores[c], y se fue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de plantar una viña, cercarla, cavar un lagar y edificar una torre evoca Isaías 5:1–2.
    reason: cross_reference
  - marker: b
    text: 'O: «cerco» o «seto». El término griego puede referirse a una barrera que rodea y protege la viña.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la alquiló a unos cultivadores». La expresión se refiere a arrendar la viña a quienes la trabajarían como arrendatarios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄλλην παραβολὴν ἀκούσατε
  english_pob_choice: Listen to another parable
  chosen_spanish: Escuchen otra parábola
  alternatives_spanish:
  - Oigan otra parábola
  - Escuchen una parábola más
  lexicon: BDAG
  rationale: ἀκούσατε es un imperativo plural aoristo; en español, «Escuchen» conserva bien el tono de exhortación directa. «Parábola» es el equivalente natural y preciso para παραβολή en este contexto.
- source_word: Ἄνθρωπος ἦν οἰκοδεσπότης
  english_pob_choice: There was a landowner
  chosen_spanish: Había un hacendado
  alternatives_spanish:
  - Había un propietario
  - Había un dueño de tierras
  - Había un hombre que era dueño de una hacienda
  lexicon: BDAG
  rationale: οἰκοδεσπότης designa al dueño o administrador principal de una propiedad/establo doméstico; en este marco agrícola, «hacendado» comunica de manera natural la figura del dueño de una finca o explotación con viña. Se evita una traducción demasiado literal como «dueño de casa», que no encaja en español en este contexto.
- source_word: ἐφύτευσεν ἀμπελῶνα
  english_pob_choice: planted a vineyard
  chosen_spanish: plantó una viña
  alternatives_spanish:
  - plantó un viñedo
  - estableció una viña
  lexicon: BDAG
  rationale: ἀμπελών es literalmente una plantación de vides; en español bíblico actual, «viña» expresa con claridad la imagen agrícola y conserva mejor la resonancia intertextual que «viñedo» en algunos registros.
- source_word: φραγμὸν αὐτῷ περιέθηκεν
  english_pob_choice: put a fence around it
  chosen_spanish: le puso una cerca alrededor
  alternatives_spanish:
  - le puso un cerco alrededor
  - puso un seto alrededor de ella
  - le puso una valla alrededor
  lexicon: BDAG
  rationale: φραγμός puede ser una barrera, cerca o cerco. «Cerca» es claro y natural en español; el pronombre «le» reproduce bien la referencia a la viña sin forzar la sintaxis.
- source_word: ὤρυξεν ἐν αὐτῷ ληνὸν
  english_pob_choice: dug a winepress in it
  chosen_spanish: cavó en ella un lagar
  alternatives_spanish:
  - cavó en ella un lagar de vino
  - abrió en ella un lagar
  - excavó en ella un lagar
  lexicon: BDAG
  rationale: ληνός es un lagar para exprimir uvas; «cavó» refleja ὀρύσσω y «lagar» es el término español más directo y tradicional sin perder precisión.
- source_word: ᾠκοδόμησεν πύργον
  english_pob_choice: built a tower
  chosen_spanish: edificó una torre
  alternatives_spanish:
  - construyó una torre
  - levantó una torre
  lexicon: BDAG
  rationale: πύργος es «torre». «Edificó» mantiene un registro bíblico digno y corresponde bien al aoristo de acción completa.
- source_word: ἐξέδετο αὐτὸν γεωργοῖς
  english_pob_choice: leased it to tenant farmers
  chosen_spanish: la arrendó a unos labradores
  alternatives_spanish:
  - la alquiló a unos agricultores
  - la cedió en arrendamiento a unos cultivadores
  - la rentó a unos labradores
  lexicon: BDAG
  rationale: ἐκδίδωμι en este uso medio indica arrendar/ceder en arriendo. γεωργοί son cultivadores o labradores; «labradores» mantiene el matiz agrícola y es más fiel al campo semántico que «agricultores» en este pasaje.
- source_word: ἀπεδήμησεν
  english_pob_choice: went away
  chosen_spanish: se fue lejos
  alternatives_spanish:
  - se ausentó
  - partió
  - se fue
  lexicon: BDAG
  rationale: ἀποδημέω expresa alejarse o irse de la propia región/casa. «Se fue lejos» comunica la salida sin añadir destino no explícito en el griego.
theological_decisions:
- issue: Alusión intertextual a Isaías 5
  english_pob_reading: Retain concrete agricultural language without making the allusion explicit in the main text.
  chosen_spanish_reading: Mantener el lenguaje agrícola concreto sin explicitar la alusión en el cuerpo principal.
  alternative_spanish_readings:
  - Usar «cerco» o «seto» para reforzar la eco de Isaías
  - Añadir una nota explicativa en el texto principal
  rationale: La parábola remite con fuerza a Isaías 5, pero el texto principal debe seguir siendo una traducción directa. La alusión se puede señalar en nota, sin introducir explicación interpretativa dentro del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB, especialmente sus decisiones léxicas sobre παραβολή, οἰκοδεσπότης, φραγμός, ληνός, πύργος, ἐκδίδωμι y ἀποδημέω. No se detectaron revisiones posteriores que alteraran el sentido base; la redacción española conserva la imagen agrícola concreta y mantiene la tensión lexical donde corresponde.
  spanish_consistency_notes:
  - Se usa «viña» para ἀμπελών, conforme a un registro bíblico natural en español.
  - Se usa «labradores» para γεωργοῖς para preservar el campo semántico agrícola y la relación de arriendo.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el griego, porque este versículo no contiene el nombre divino ni κύριος.
  - La puntuación sigue el español moderno con dos puntos tras la exhortación inicial para reflejar la transición narrativa.
