base_translation:
  language: en
  yaml_path: translation/nt/matthew/021/033.yaml
  text: 'Listen to another parable: There was a landowner who planted a vineyard and put a fence around it and dug a winepress in it and built a tower[a], and leased it to tenant farmers[c][b], and went away.'
  footnotes:
  - marker: a
    text: The imagery of planting a vineyard, enclosing it, digging a winepress, and building a tower echoes Isaiah 5:1–2.
    reason: cross_reference
  - marker: b
    text: Or 'put a hedge around it.' The Greek term can refer to an enclosing barrier such as a fence or hedge.
    reason: lexical_alternative
  - marker: c
    text: Or 'rented it out to farmers.' The expression refers to leasing the vineyard to cultivators who would work it.
    reason: lexical_alternative
