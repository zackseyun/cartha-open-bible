revisions:
- from: 'Escuchen otra parábola: Había un[a] hacendado que plantó una viña y le puso una cerca[b] alrededor, y cavó en ella un lagar, y edificó una torre, y la arrendó a unos labradores[c], y se fue lejos.'
  to: 'Escuchen otra parábola: Había un propietario que plantó una viña y le puso una cerca[b] alrededor, y cavó en ella un lagar, y edificó una torre[a], y la arrendó a unos labradores[c], y se fue.'
  rationale: Se corrige una sobretraducción («se fue lejos» -> «se fue»), se sustituye «hacendado» por el más neutro y ampliamente comprensible «propietario», y se restituye la nota de referencia cruzada a Isaías 5 documentada en el POB inglés. Se mantienen «viña», «cerca», «lagar», «torre» y «labradores» por fidelidad y buena legibilidad eclesial.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:16:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido básico del griego: mandato de oír otra parábola, descripción del propietario, plantación de la viña, cerca, lagar, torre, arrendamiento y partida. Sin embargo, añade un matiz no explícito en ἀπεδήμησεν al traducir «se fue lejos»; el griego solo dice que se ausentó o se fue. Además, falta en español la nota de referencia cruzada sobre la alusión a Isaías 5 que sí forma parte del rastro auditado en inglés.'
  spanish_quality_summary: El español es generalmente claro y digno. «Escuchen» funciona bien; «viña», «lagar» y «torre» son buenas elecciones. No obstante, «hacendado» puede sonar regional o evocar un contexto sociohistórico latinoamericano más específico que el griego. «Propietario» o «dueño de tierras» sería más neutral; aquí conviene una reparación pequeña y clara. También la puntuación puede aligerarse un poco sin perder solemnidad.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Las decisiones léxicas principales son mayormente coherentes con el POB: παραβολή -> «parábola», ἀμπελών -> «viña», ληνός -> «lagar». Para οἰκοδεσπότης, el inglés auditado escogió «landowner»; en español, «propietario» alinea mejor que «hacendado» con ese razonamiento. Para ἐξέδετο... γεωργοῖς, «la arrendó a unos labradores» es aceptable, aunque la nota debe conservar con claridad la idea de arrendatarios.'
  issues:
