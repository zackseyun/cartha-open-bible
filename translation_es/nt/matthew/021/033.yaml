    issue: «se fue lejos» sobretraduce ἀπεδήμησεν
    rationale: El verbo griego significa irse/ausentarse, a menudo de viaje, pero no exige el adverbio «lejos». Añadirlo introduce un detalle no explícito en Mateo.
  - severity: medium
    issue: «hacendado» es menos neutral que el sentido de οἰκοδεσπότης en este contexto
    rationale: Aunque comunica propiedad rural, puede sonar regional y socialmente cargado. «Propietario» preserva mejor el valor contextual de «landowner» en español general.
  - severity: low
    issue: Falta la nota de alusión a Isaías 5 presente en el audit trail inglés
    rationale: La filosofía documentada pide conservar la alusión en nota y no en el texto principal. La ausencia no distorsiona el sentido principal, pero sí omite una decisión auditada relevante.
