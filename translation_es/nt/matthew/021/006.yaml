translation:
  language: es
  text: Entonces los discípulos fueron e hicieron tal como Jesús les había instruido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les había mandado». El verbo griego puede denotar dar órdenes o dar instrucciones; aquí el contexto favorece «instruido».
    reason: lexical_alternative
lexical_decisions:
- source_word: πορευθέντες
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - partieron
  - se fueron
  - habían ido
  lexicon: BDAG
  rationale: El participio aoristo expresa desplazamiento previo a la acción principal. En español, «fueron» comunica el movimiento de modo natural y narrativo sin forzar una perífrasis más pesada como «habiendo ido».
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - y
  - ahora
  - así que
  lexicon: BDAG
  rationale: Aquí δέ enlaza la respuesta de los discípulos con la instrucción previa. «Entonces» refleja bien la secuencia narrativa y la relación de respuesta sin introducir causalidad excesiva.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: En el contexto de los Evangelios, μαθηταί se refiere de manera estable a los seguidores de Jesús; «discípulos» es el equivalente español directo y reconocido.
- source_word: ποιήσαντες
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cumplieron
  - llevaron a cabo
  lexicon: BDAG
  rationale: El participio aoristo coordinado con πορευθέντες expresa la acción realizada. «Hicieron» conserva la sencillez del griego y funciona bien con la comparación siguiente.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: exactamente como
  alternatives_spanish:
  - tal como
  - como
  lexicon: BDAG
  rationale: καθώς marca correspondencia precisa con lo mandado por Jesús. «Exactamente como» preserva mejor la fuerza de conformidad que el simple «como».
- source_word: συνέταξεν
  english_pob_choice: had instructed
  chosen_spanish: había instruido
  alternatives_spanish:
  - había mandado
  - había ordenado
  - había dirigido
  lexicon: BDAG
  rationale: συντάσσω puede implicar dar instrucciones u órdenes. El contexto inmediato favorece «instruido», que mantiene la idea de indicaciones dadas para ser obedecidas sin endurecer innecesariamente el matiz.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se expresa de forma natural en español con «les» en esta construcción verbal.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús mismo
  lexicon: BDAG
  rationale: Nombre propio directo; no requiere ampliación. La forma simple es la más fiel y natural en español.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada muestran alta concordancia; no se detectan variantes textuales ni tensiones teológicas adicionales. La única decisión lexical relevante es el matiz de συνέταξεν, que en español se resuelve bien con «instruido» en este contexto narrativo.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo natural del español sin perder la secuencia de participios griegos.
  - Se usa «discípulos» como término técnico estable en los Evangelios.
  - Se evita «Cristo» porque el versículo nombra a Jesús directamente y no usa Χριστός.
