revisions:
- from: Entonces los discípulos fueron e hicieron exactamente como Jesús les había instruido.
  to: Entonces los discípulos fueron e hicieron tal como Jesús les había instruido[a].
  rationale: Se conserva la traducción principal «había instruido», que encaja bien con συνέταξεν en este contexto de indicaciones previas, pero se restaura la alternativa léxica documentada por el POB en una nota. También se reemplaza «exactamente como» por «tal como» para reflejar fielmente καθώς con mejor naturalidad y sin intensificación innecesaria. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:14:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: los discípulos fueron y actuaron en conformidad con lo que Jesús les indicó. Sin embargo, omite la alternativa léxica documentada para συνέταξεν (''commanded them''), que el rastro POB conservó en nota. Además, «exactamente como» intensifica un poco más de lo necesario el καθώς griego, donde «tal como» o «justo como» suenan más naturales y suficientemente fieles.'
  spanish_quality_summary: El español es claro y natural, pero «fueron e hicieron» suena algo menos idiomático que «fueron e hicieron»/«fueron y hicieron»; aquí la coordinación con «e» no está motivada por eufonía, ya que la palabra siguiente empieza con /i/ pero con diptongo escrito 'hi', y aun así ambas formas son posibles. El ajuste principal recomendado es suavizar «exactamente como» a «tal como» para mantener dignidad y naturalidad sin sobretraducción. También conviene añadir la nota léxica correspondiente a «instruido».
  glossary_alignment: No hay términos de glosario mayor en disputa. «Jesús» y «discípulos» están bien. «Había instruido» concuerda con la decisión POB para συνέταξεν, siempre que se preserve en nota la alternativa «había mandado».
  issues:
  - severity: medium
    issue: Falta la nota léxica para συνέταξεν
    rationale: El English POB preservó la alternativa 'commanded them' en nota. La revisión española debe conservar esa alternativa significativa como «les había mandado» u opción similar.
  - severity: low
    issue: «exactamente como» sobreintensifica καθώς
    rationale: El griego exige conformidad ('tal como', 'justo como'), pero «exactamente» añade una precisión algo más fuerte que no es necesaria aquí y suena menos natural en español bíblico contemporáneo.
  revised_spanish_text: Entonces los discípulos fueron e hicieron tal como Jesús les había instruido[a].
  revised_footnotes:
  - marker: a
    text: O «les había mandado». El verbo griego puede denotar dar órdenes o dar instrucciones; aquí el contexto favorece «instruido».
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal «había instruido», que encaja bien con συνέταξεν en este contexto de indicaciones previas, pero se restaura la alternativa léxica documentada por el POB en una nota. También se reemplaza «exactamente como» por «tal como» para reflejar fielmente καθώς con mejor naturalidad y sin intensificación innecesaria. No se requiere adjudicación adicional.
