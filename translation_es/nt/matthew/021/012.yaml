revisions:
- from: Y Jesús entró en el templo[a] y expulsó a todos los que vendían y compraban en el templo, y volcó las mesas de los cambistas y las sillas de los que vendían palomas.
  to: Y Jesús entró en los atrios del templo[a] y expulsó a todos los que vendían y compraban en los atrios del templo, y volcó las mesas de los cambistas y los asientos de los que vendían palomas.
  rationale: Se revisa principalmente ἱερόν para que el texto principal preserve la distinción documentada entre el complejo del templo y el santuario interior. También se ajusta καθέδρας a 'asientos' para reflejar mejor la amplitud del griego y la decisión auditada en inglés. El resto del borrador puede mantenerse.
