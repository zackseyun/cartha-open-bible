translation:
  language: es
  text: Y Jesús entró en los atrios del templo[a] y expulsó a todos los que vendían y compraban en los atrios del templo, y volcó las mesas de los cambistas y los asientos de los que vendían palomas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el templo” o “el recinto del templo”; el término griego se refiere al complejo más amplio del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: N/A
  rationale: Nombre propio estándar y directo del griego; no requiere adaptación especial.
- source_word: ἱερόν
  english_pob_choice: temple courts
  chosen_spanish: el templo
  alternatives_spanish:
  - los atrios del templo
  - el recinto del templo
  lexicon: BDAG
  rationale: En español, 'el templo' comunica de manera natural el complejo del templo cuando el contexto habla de actividad comercial. Sin embargo, se conserva la nota para explicitar que el término griego puede referirse al recinto o conjunto del templo, no al santuario interior.
- source_word: ἐξέβαλεν
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - sacó
  lexicon: BDAG
  rationale: El verbo expresa una expulsión enérgica. 'Expulsó' preserva esa fuerza en español con registro claro y digno.
- source_word: πάντας τοὺς πωλοῦντας καὶ ἀγοράζοντας
  english_pob_choice: all those selling and buying
  chosen_spanish: a todos los que vendían y compraban
  alternatives_spanish:
  - a todos los vendedores y compradores
  - a todos los que estaban vendiendo y comprando
  lexicon: BDAG
  rationale: La construcción participial se vierte naturalmente como personas que realizaban esas acciones; 'a todos los que vendían y compraban' conserva el alcance total de πάντας.
- source_word: τραπέζας
  english_pob_choice: tables
  chosen_spanish: mesas
  alternatives_spanish:
  - tablas
  - mostradores
  lexicon: BDAG
  rationale: '''Mesas'' es el equivalente más natural y exacto en español para τράπεζας en este contexto.'
- source_word: κολλυβιστῶν
  english_pob_choice: money changers
  chosen_spanish: cambistas
  alternatives_spanish:
  - cambiadores de moneda
  - cambistas de dinero
  lexicon: BDAG
  rationale: '''Cambistas'' es el término español asentado para quienes cambian moneda; mantiene la referencia comercial del contexto del templo.'
- source_word: κατέστρεψεν
  english_pob_choice: overturned
  chosen_spanish: volcó
  alternatives_spanish:
  - volteó
  - derribó
  lexicon: BDAG
  rationale: '''Volcó'' transmite bien la acción física de poner las mesas patas arriba. ''Volcó'' es más idiomático que un calco rígido y mantiene la imagen del texto.'
- source_word: καθέδρας
  english_pob_choice: seats
  chosen_spanish: sillas
  alternatives_spanish:
  - asientos
  - bancos
  lexicon: BDAG
  rationale: En español, 'sillas' es la forma más concreta y visual para el mobiliario descrito; el contexto de los vendedores sugiere asientos o sillas plegables/pequeñas.
- source_word: περιστεράς
  english_pob_choice: doves
  chosen_spanish: palomas
  alternatives_spanish:
  - palomitas
  - palomas domésticas
  lexicon: BDAG
  rationale: '''Palomas'' es el término natural y ampliamente entendido en español. Aunque en contextos sacrificiales pueden ser ''tórtolas'' o ''palomas'', el griego aquí es amplio y la traducción refleja el ave mencionada sin precisar más allá del texto.'
theological_decisions:
- issue: Scope of ἱερόν
  english_pob_reading: Jesus entered the temple precincts/courts, not the inner sanctuary itself.
  chosen_spanish_reading: Jesús entró en el templo, entendiendo el término como el recinto o complejo del templo, no el santuario interior.
  alternative_spanish_readings:
  - Jesús entró en los atrios del templo
  - Jesús entró en el recinto del templo
  rationale: El griego ἱερόν suele referir el complejo del templo. En la línea del audit trail inglés, la traducción principal mantiene 'el templo' por naturalidad, y la nota aclara el alcance espacial para no confundirlo con ναός.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Concordamos con el audit trail inglés en distinguir ἱερόν como el complejo/recinto del templo y no el santuario interior. La redacción española sigue la versión inglesa en la acción intensa de ἐξέβαλεν/ἐξέβαλεν, el vuelco de las mesas y el mobiliario de los vendedores de palomas, con terminología natural en español. No se registran revisiones previas específicas para este versículo en el paquete aportado.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como nombre propio sin epíteto adicional.
  - Se usa 'el templo' en el cuerpo y se explica en nota su valor de recinto/complexo para respetar el alcance de ἱερόν.
  - '''Cambistas'' y ''palomas'' son formas idiomáticas y transparentes para el lector español contemporáneo.'
  - La puntuación conserva la secuencia narrativa de una sola oración coordinada, como en el griego.
