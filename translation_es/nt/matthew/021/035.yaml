translation:
  language: es
  text: Y los arrendatarios tomaron a sus esclavos[a]; a uno golpearon, a otro mataron y a otro apedrearon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos». El griego usa δοῦλοι (douloi), que puede significar «esclavos» o «siervos» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γεωργοὶ
  english_pob_choice: tenant farmers
  chosen_spanish: labradores
  alternatives_spanish:
  - campesinos arrendatarios
  - arrendatarios
  - agricultores
  lexicon: BDAG
  rationale: En la parábola, γεωργοί son quienes trabajan la tierra del dueño bajo una relación de tenencia; «labradores» comunica bien la función agrícola y evita una perífrasis excesiva. «Arrendatarios» explicita la tenencia, pero suena más técnico.
- source_word: λαβόντες
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - se apoderaron de
  - agarraron
  - tomaron por la fuerza
  lexicon: BDAG
  rationale: El participio aoristo antecede a las acciones principales; en español, «tomaron» conserva la secuencia narrativa sin sobrecargar con una especificación de violencia que no está explícita en la forma verbal misma.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  - bondados
  lexicon: BDAG
  rationale: Se mantiene «esclavos» porque la pauta doctrinal del POB favorece ese valor léxico cuando el estatus subordinado es saliente. «Siervos» suaviza indebidamente el término y borra la tensión léxica documentada.
- source_word: ἔδειραν
  english_pob_choice: beat
  chosen_spanish: golpearon
  alternatives_spanish:
  - azotaron
  - castigaron
  - apalearon
  lexicon: BDAG
  rationale: δέρω significa golpear o azotar. «Golpearon» es natural y amplio en español; «azotaron» introduce con más fuerza la idea de flagelación, que el verbo permite pero no exige.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - asesinaron
  lexicon: BDAG
  rationale: «Mataron» reproduce de manera directa el valor básico del aoristo. «Asesinaron» añade una calificación moral/jurídica no explicitada por el verbo griego.
- source_word: ἐλιθοβόλησαν
  english_pob_choice: stoned
  chosen_spanish: apedrearon
  alternatives_spanish:
  - lapidaron
  - arrojaron piedras contra
  lexicon: BDAG
  rationale: λιθοβολέω designa matar o atacar con piedras. «Apedrearon» es claro, idiomático y conserva el carácter concreto de la acción. «Lapidaron» es posible, pero suena más formal y menos transparente para lectores generales.
- source_word: ὃν μὲν ... ὃν δὲ ... ὃν δὲ
  english_pob_choice: one ... another ... another
  chosen_spanish: a uno ... a otro ... y a otro
  alternatives_spanish:
  - uno ... otro ... otro
  - a uno ... uno ... otro
  lexicon: Greek grammar
  rationale: La construcción distributiva se expresa de forma idiomática con «a uno ... a otro ... y a otro», que hace visible la distribución de tratamientos sin forzar el orden español.
theological_decisions:
- issue: Valor de δοῦλοι en la parábola
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servicios
  rationale: Se conserva la carga léxica de subordinación y pertenencia que el audit trail documenta como deliberada. En este contexto parabólico, «esclavos» refleja mejor la fuerza del término que una domesticación a «siervos».
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: El histórico inglés muestra una corrección de «servants» de vuelta a «slaves» para respetar la política doctrinal sobre δοῦλος; la traducción española sigue esa decisión y no suaviza el término. También se preserva la estructura distributiva y la secuencia narrativa del texto griego.
  spanish_consistency_notes:
  - Se usó «esclavos» de manera consistente con la preferencia del POB para δοῦλος cuando el estatus subordinado es central.
  - Se eligió «golpearon», «mataron» y «apedrearon» por su naturalidad en español y su correspondencia directa con los tres verbos griegos.
  - La frase «a uno ... a otro ... y a otro» evita una calca demasiado rígida y mantiene la distribución de acciones.
  - La nota al pie está anclada en «esclavos[a]» para cumplir la validación de marcador presente en el texto.
