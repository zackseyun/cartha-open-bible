translation:
  language: es
  text: 'Pero él respondió: «No quiero». Pero después cambió de parecer[a] y fue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se arrepintió» o «se retractó». El participio griego puede incluir un matiz de pesar que conduce a un cambio de rumbo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dijo en respuesta
  lexicon: BDAG
  rationale: 'La forma participial es una fórmula narrativa estándar; en español, lo más natural y fiel es integrarla como verbo finito: «respondió». Mantiene el valor de respuesta sin forzar una traducción demasiado literal.'
- source_word: Οὐ θέλω
  english_pob_choice: I do not want to
  chosen_spanish: No quiero
  alternatives_spanish:
  - No quiero hacerlo
  - No lo deseo
  - No voy a
  lexicon: BDAG
  rationale: θέλω expresa voluntad o deseo. En el contexto de una negativa directa, «No quiero» reproduce de manera natural y precisa la voluntad personal del hijo, sin convertirla en una prohibición más fuerte que la del griego.
- source_word: ὕστερον
  english_pob_choice: later
  chosen_spanish: después
  alternatives_spanish:
  - más tarde
  - luego
  lexicon: BDAG
  rationale: El adverbio marca una acción posterior. «Después» funciona con naturalidad en español y conserva la secuencia temporal del relato.
- source_word: μεταμεληθεὶς
  english_pob_choice: having changed his mind
  chosen_spanish: cambió de parecer
  alternatives_spanish:
  - se arrepintió
  - se retractó
  - cambió de opinión
  lexicon: BDAG
  rationale: μεταμέλομαι puede implicar cambio de decisión con matiz de pesar, pero aquí el punto narrativo es la reversión de intención que lleva a la obediencia. «Cambió de parecer» preserva esa tensión sin imponer el lenguaje más teológico de μετάνοια ni fijar demasiado el matiz afectivo.
- source_word: ἀπῆλθεν
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  - fue y obedeció
  lexicon: BDAG
  rationale: En este contexto el verbo señala que realizó la acción requerida. «Fue» es breve, idiomático y suficientemente amplio para el sentido narrativo.
theological_decisions:
- issue: Distinción entre μεταμέλομαι y μετανοέω en un contexto parabólico
  english_pob_reading: having changed his mind
  chosen_spanish_reading: cambió de parecer
  alternative_spanish_readings:
  - se arrepintió
  - se convirtió
  rationale: La parábola subraya un cambio de voluntad y conducta, no necesariamente arrepentimiento en el sentido técnico de μετανοέω. «Cambió de parecer» mantiene la tensión lexical y evita resolverla con un término más cargado doctrinalmente.
  doctrine_reference: Diferencia léxica entre μεταμέλομαι y μετανοέω; preservar la tensión sin homogeneizarla.
translation_notes:
  revision_awareness: Se tomó como base la lectura griega SBLGNT y el expediente inglés POB, que favorece una traducción natural pero conserva la distinción entre cambio de mente/parecer y arrepentimiento. La versión española evita calcar el inglés y mantiene la tensión léxica señalada por el audit trail.
  spanish_consistency_notes:
  - Se mantiene «respondió» para ἀποκριθεὶς, en línea con la fórmula narrativa del pasaje.
  - Se evita «arrepentirse» en el cuerpo principal para no equiparar indebidamente μεταμεληθεὶς con μετανοέω.
  - «Fue» conserva la sencillez narrativa de ἀπῆλθεν sin añadir un objeto implícito no presente en el griego.
  - La puntuación con comillas angulares y la división en dos enunciados reproducen el contraste del original entre negativa inicial y obediencia posterior.
