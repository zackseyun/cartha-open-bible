translation:
  language: es
  text: Y llamando hacia sí[a] a sus doce discípulos, les dio autoridad sobre los espíritus inmundos[b], para expulsarlos y para sanar toda enfermedad y toda dolencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘habiendo llamado hacia sí a sus doce discípulos’.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘poder sobre los espíritus inmundos’; ἐξουσία suele implicar autoridad delegada.'
    reason: lexical_alternative
  - marker: c
    text: La pareja ‘toda enfermedad y toda dolencia’ refleja dos términos griegos relacionados (νόσος y μαλακία); también puede verterse ‘toda enfermedad y toda debilidad’.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: calling his twelve disciples to himself
  chosen_spanish: llamando a sus doce discípulos
  alternatives_spanish:
  - después de llamar a sus doce discípulos
  - habiendo llamado a sus doce discípulos
  lexicon: BDAG
  rationale: El participio aoristo medio expresa la acción de llamar a los discípulos; en español, ‘llamando’ comunica bien la acción circunstancial sin sobrecargar la frase. La nota preserva la alternativa de valor temporal o antecedente que el inglés auditado recogía mediante el participio.
- source_word: τοὺς δώδεκα μαθητὰς αὐτοῦ
  english_pob_choice: his twelve disciples
  chosen_spanish: a sus doce discípulos
  alternatives_spanish:
  - a los doce discípulos de él
  - a sus doce aprendices
  lexicon: BDAG
  rationale: ‘Discípulos’ es el equivalente natural y fiel en contexto evangélico para μαθηταί. Se mantiene el posesivo ‘sus’ para αὐτοῦ y el número sin artículo adicional para conservar la fluidez del español.
- source_word: ἔδωκεν
  english_pob_choice: he gave
  chosen_spanish: les dio
  alternatives_spanish:
  - les concedió
  - les otorgó
  lexicon: BDAG
  rationale: δίδωμι se traduce de manera directa como ‘dar’. En español, ‘les dio’ conserva la sencillez verbal del griego y evita un matiz más interpretativo como ‘concedió’.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - facultad
  lexicon: BDAG
  rationale: ‘Autoridad’ reproduce mejor la idea de delegación y derecho para actuar que el simple ‘poder’. Esto sigue la decisión auditada del inglés y evita reducir la palabra a fuerza impersonal.
- source_word: πνευμάτων ἀκαθάρτων
  english_pob_choice: unclean spirits
  chosen_spanish: los espíritus inmundos
  alternatives_spanish:
  - los espíritus impuros
  - espíritus inmundos
  lexicon: BDAG
  rationale: ‘Espíritus inmundos’ es el giro bíblico natural en español y conserva la cualidad moral/ritual de ἀκάθαρτος. Se usa ‘los’ para marcar el grupo sobre el cual recae la autoridad.
- source_word: ἐκβάλλειν
  english_pob_choice: to cast them out
  chosen_spanish: expulsarlos
  alternatives_spanish:
  - echarlos fuera
  - arrojarlos fuera
  lexicon: BDAG
  rationale: Aunque ‘echar fuera’ es idiomático, ‘expulsar’ comunica con claridad el valor exorcístico de ἐκβάλλω en un registro bíblico digno. El pronombre directo ‘los’ retoma a los espíritus.
- source_word: θεραπεύειν
  english_pob_choice: to heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  - sanar
  lexicon: BDAG
  rationale: ‘Sanar’ y ‘curar’ son posibles; ‘sanar’ encaja bien con un registro bíblico amplio y natural. Se evita aquí un tecnicismo médico que no está exigido por el griego.
- source_word: πᾶσαν νόσον
  english_pob_choice: every disease
  chosen_spanish: toda enfermedad
  alternatives_spanish:
  - cada enfermedad
  - toda dolencia
  lexicon: BDAG
  rationale: νόσος se refiere a enfermedad o padecimiento. ‘Toda enfermedad’ conserva el alcance distributivo de πᾶσαν y mantiene la distinción con μαλακία.
- source_word: πᾶσαν μαλακίαν
  english_pob_choice: every sickness
  chosen_spanish: toda dolencia
  alternatives_spanish:
  - toda enfermedad
  - toda debilidad
  - toda flaqueza
  lexicon: BDAG
  rationale: μαλακία puede significar dolencia, debilidad o enfermedad. ‘Dolencia’ permite mantener la pareja léxica con ‘enfermedad’ sin borrar la tensión entre los dos términos griegos. La nota explica la alternativa de ‘enfermedad’, también posible en español.
theological_decisions:
- issue: Naturaleza de la autoridad concedida a los discípulos
  english_pob_reading: Jesus gave the twelve delegated authority over unclean spirits, expressed as authority to cast them out and to heal.
  chosen_spanish_reading: Jesús les dio autoridad delegada sobre los espíritus inmundos, expresada en la capacidad de expulsarlos y sanar.
  alternative_spanish_readings:
  - Jesús les dio poder sobre los espíritus inmundos
  - Jesús les dio potestad sobre los espíritus inmundos
  rationale: El griego ἐξουσία enfatiza autoridad delegada más que energía impersonal. ‘Autoridad’ en español conserva mejor esa relación de comisión recibida de Jesús y evita desplazar el foco hacia una noción abstracta de poder.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre los dos sustantivos de sanidad
  english_pob_reading: every disease and every sickness reflects two related Greek terms (nosos and malakia).
  chosen_spanish_reading: toda enfermedad y toda dolencia refleja dos términos griegos relacionados (νόσος y μαλακία).
  alternative_spanish_readings:
  - toda enfermedad y toda enfermedad
  - toda enfermedad y toda debilidad
  rationale: Conviene preservar la distinción lexical, aunque el español no siempre permita una diferencia tan nítida. ‘Enfermedad’ y ‘dolencia’ mantienen la dobletidad sin colapsarla en un solo término.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: 'Se siguió de cerca la última revisión del inglés auditado: se evitó un valor temporal añadido en el participio y se conservó el sentido de finalidad/resultado en la cláusula infinitiva. También se mantuvo la distinción léxica entre ἐξουσία, νόσος y μαλακία, tal como señala el audit trail.'
  spanish_consistency_notes:
  - Se usó ‘discípulos’ para μαθηταί, en coherencia con el registro evangélico.
  - Se tradujo ἐξουσία como ‘autoridad’ y no como ‘poder’, siguiendo la preferencia terminológica de la POB.
  - Se mantuvo ‘espíritus inmundos’ para πνευμάτων ἀκαθάρτων, preservando el lenguaje bíblico establecido.
  - Se evitó ‘Cristo’ u otra terminología no presente en el versículo.
  - La cláusula final conserva dos sustantivos distintos en español para reflejar la doble expresión griega de enfermedad.
