translation:
  language: es
  text: Por tanto, no les tengan miedo, porque nada hay oculto que no será revelado, ni nada escondido que no será dado a conocer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ οὖν φοβηθῆτε
  english_pob_choice: Therefore, do not fear
  chosen_spanish: Por tanto, no teman
  alternatives_spanish:
  - Así que no teman
  - Por eso, no tengan miedo
  lexicon: BDAG
  rationale: οὖν marca consecuencia/inferencia; «por tanto» conserva ese enlace. φοβηθῆτε es una prohibición, y «no teman» es natural y fiel en español.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: a ellos
  alternatives_spanish:
  - los
  - a esas personas
  lexicon: BDAG
  rationale: El pronombre plural masculino se refiere a los opositores del contexto. «A ellos» mantiene la referencia sin sobreespecificar.
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - no hay nada
  lexicon: BDAG
  rationale: El neutro sustantivado expresa totalidad negativa. «Nada» conserva esa amplitud.
- source_word: κεκαλυμμένον
  english_pob_choice: concealed
  chosen_spanish: oculto
  alternatives_spanish:
  - encubierto
  - velado
  - oculto/encubierto
  lexicon: BDAG
  rationale: Aunque el audit trail inglés optó por «concealed», en español «oculto» resulta más natural y mantiene la imagen de algo cubierto o no manifiesto, sin perder la relación semántica con ἀποκαλυφθήσεται.
- source_word: ἀποκαλυφθήσεται
  english_pob_choice: will be revealed
  chosen_spanish: será revelado
  alternatives_spanish:
  - será descubierto
  - será desvelado
  lexicon: BDAG
  rationale: El futuro pasivo de ἀποκαλύπτω se vierte de modo directo y transparente con «será revelado».
- source_word: κρυπτὸν
  english_pob_choice: hidden
  chosen_spanish: escondido
  alternatives_spanish:
  - secreto
  - oculto
  lexicon: BDAG
  rationale: El adjetivo expresa lo que permanece fuera de la vista o reservado. «Escondido» diferencia este término del anterior y conserva el paralelismo.
- source_word: γνωσθήσεται
  english_pob_choice: will not be made known
  chosen_spanish: será hecho conocido
  alternatives_spanish:
  - será conocido
  - llegará a saberse
  lexicon: BDAG
  rationale: El futuro pasivo de γινώσκω permite una forma pasiva en español. «Será hecho conocido» reproduce la voz pasiva y el contraste con «revelado».
theological_decisions:
- issue: Alcance general del dicho sobre lo oculto
  english_pob_reading: A general assurance that opponents' concealed actions and the truth about Jesus' disciples will ultimately be exposed.
  chosen_spanish_reading: Una afirmación general de que lo oculto y lo escondido no permanecerán así.
  alternative_spanish_readings:
  - Una referencia solo a la predicación pública del mensaje de los discípulos
  - Una declaración exclusiva sobre el juicio final
  rationale: El versículo formula un principio amplio sin restringirlo explícitamente a una sola escena o doctrina. La traducción conserva esa amplitud y no la reduce.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del audit trail inglés, que prefirió un término más natural para κεκαλυμμένον. En español se eligió «oculto» por naturalidad y por mantener el contraste con «revelado».
  spanish_consistency_notes:
  - Se conservó la prohibición con el plural de cortesía no aplicado; el sujeto son los destinatarios directos, por eso se usa «no teman».
  - Se mantuvo el paralelismo semántico entre «oculto / revelado» y «escondido / hecho conocido» sin forzar sinónimos idénticos.
  - No se introdujo terminología eclesiástica ajena al texto; el versículo conserva su sentido proverbial general.
