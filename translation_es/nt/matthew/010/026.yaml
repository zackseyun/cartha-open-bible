revisions:
- from: Por tanto[a], no teman a ellos, porque nada hay oculto que no será revelado, ni escondido que no será hecho conocido.
  to: Por tanto, no les tengan miedo, porque nada hay oculto que no será revelado, ni nada escondido que no será dado a conocer.
  rationale: 'Se ajusta el español para que sea natural y fiel sin cambiar el sentido: «no les tengan miedo» expresa idiomáticamente la prohibición dirigida hacia personas; «será dado a conocer» mantiene el futuro pasivo de γνωσθήσεται mejor que el calco «será hecho conocido»; y «ni nada escondido» refuerza el paralelismo del original.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:04:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: prohibición de temer a los opositores y principio general de que lo encubierto/oculto será expuesto. Sin embargo, presenta dos problemas de fidelidad/forma: «no teman a ellos» es poco natural en español para φοβηθῆτε αὐτούς, y «será hecho conocido» calca el inglés de manera rígida donde el español natural puede mantener el pasivo con «será dado a conocer».'
  spanish_quality_summary: El texto es comprensible, pero suena forzado en dos puntos. «No teman a ellos» debería ser «no les tengan miedo» o «no los teman»; la primera es más idiomática y clara. «Será hecho conocido» es gramaticalmente posible pero poco idiomático; «será dado a conocer» conserva la pasividad y mejora mucho la legibilidad. También conviene mantener el paralelismo con «ni nada escondido».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «oculto» para κεκαλυμμένον y «escondido» para κρυπτόν son defendibles para distinguir los dos términos. La revisión propuesta conserva esa distinción y respeta la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: «no teman a ellos» suena antinatural en español
    rationale: Aunque semánticamente correcto, este giro no es idiomático en español bíblico moderno. Para φοβηθῆτε αὐτούς, «no les tengan miedo» comunica mejor el sentido prohibitivo y el objeto personal.
  - severity: medium
    issue: «será hecho conocido» es un calco rígido del inglés
    rationale: La traducción intenta reflejar el pasivo de γνωσθήσεται, pero en español resulta pesada. «Será dado a conocer» conserva el valor pasivo y el paralelismo con «será revelado» de manera más natural.
  - severity: low
    issue: Falta el paralelismo explícito con «nada» en la segunda cláusula
    rationale: El español puede omitirlo, pero «ni nada escondido» hace más claro el paralelismo con οὐδὲν ... καὶ κρυπτὸν y mejora el ritmo del proverbio.
  revised_spanish_text: Por tanto, no les tengan miedo, porque nada hay oculto que no será revelado, ni nada escondido que no será dado a conocer.
  revision_rationale: 'Se ajusta el español para que sea natural y fiel sin cambiar el sentido: «no les tengan miedo» expresa idiomáticamente la prohibición dirigida hacia personas; «será dado a conocer» mantiene el futuro pasivo de γνωσθήσεται mejor que el calco «será hecho conocido»; y «ni nada escondido» refuerza el paralelismo del original.'
