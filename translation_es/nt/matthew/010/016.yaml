  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: envío presente, símil de ovejas en medio de lobos, inferencia con «por tanto», y la doble exhortación comparativa. Sin embargo, «sin mezcla» para ἀκέραιοι no funciona como español natural en el texto principal y desplaza el sentido ético hacia una glosa etimológica poco idiomática.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «¡Miren!» suena algo coloquial para el registro y «sin mezcla» resulta poco natural e incluso desconcertante en español bíblico corriente. «He aquí» como nota está bien, pero el texto principal mejora con una forma más directa y estable. «Inocentes» comunica mejor el contraste con «prudentes» y mantiene la legibilidad e inteligibilidad eclesial.
  glossary_alignment: No hay conflictos con terminología base del proyecto. Las decisiones clave son correctas salvo ἀκέραιοι, donde conviene seguir «inocentes» en el texto principal y conservar alternativas como nota. «Serpientes» y «palomas» están bien; «por tanto» también.
  issues:
  - severity: medium
    issue: «sin mezcla» para ἀκέραιοι es antinatural en español principal
    rationale: Aunque intenta preservar el trasfondo de integridad no adulterada, en español actual no describe personas de manera idiomática en este contexto. Puede distraer o sonar como explicación léxica, no traducción.
  - severity: low
    issue: «¡Miren!» tiene un registro más coloquial que el resto del versículo
    rationale: Es defendible para ἰδού, pero en una línea de tono más solemne y eclesial «Miren» desentona un poco. «He aquí» sería más tradicional; «Miren» puede mantenerse si se prefiere modernidad, pero sin signos de exclamación encaja mejor en la sintaxis.
  - severity: low
    issue: La nota c necesita rehacerse tras corregir el texto principal
    rationale: Si el texto principal pasa a «inocentes», la nota debe preservar las alternativas semánticas relevantes como «íntegros» o «puros», no repetir el texto principal como alternativa principal sin aclaración.
  revised_spanish_text: Miren[a], yo los envío como ovejas en medio de lobos[b]; por tanto, sean prudentes como las serpientes y inocentes[c] como las palomas.
