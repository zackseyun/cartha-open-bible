translation:
  language: es
  text: Miren[a], yo los envío como ovejas en medio de lobos[b]; por tanto, sean prudentes como las serpientes y inocentes[c] como las palomas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «He aquí»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como ovejas entre lobos»'
    reason: lexical_alternative
  - marker: c
    text: 'O también: «íntegros», «puros» o, más tradicionalmente, «sin hacer daño»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren, pues!
  - ¡Vean!
  - He aquí
  lexicon: BDAG
  rationale: La partícula llama la atención de modo enfático. En español, «¡Miren!» conserva ese golpe discursivo con naturalidad moderna; «He aquí» es más tradicional, pero más marcado y menos conversacional.
- source_word: ἀποστέλλω
  english_pob_choice: I am sending ... out
  chosen_spanish: yo los envío
  alternatives_spanish:
  - yo los envío fuera
  - yo los mando
  - yo los envío en misión
  lexicon: BDAG
  rationale: El presente indica acción/comisión actual. En español, «los envío» comunica bien la misión sin añadir una redundancia forzada; el matiz direccional de «out» queda implícito por el contexto de envío misionero.
- source_word: ὡς πρόβατα ἐν μέσῳ λύκων
  english_pob_choice: as sheep in the midst of wolves
  chosen_spanish: como ovejas en medio de lobos
  alternatives_spanish:
  - como ovejas entre lobos
  - como ovejas en medio de los lobos
  lexicon: BDAG
  rationale: Mantiene la comparación y la fuerza de ἐν μέσῳ con «en medio de». «Ovejas» es el equivalente natural y bíblicamente transparente para πρόβατα; «lobos» conserva la imagen de peligro literal y figurado.
- source_word: γίνεσθε
  english_pob_choice: be
  chosen_spanish: sean
  alternatives_spanish:
  - háganse
  - pónganse
  - permanezcan
  lexicon: BDAG
  rationale: El imperativo exhortativo pide una conducta continua. «Sean» es la forma más natural y directa en español para este valor de mandato de estado o manera de ser.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - entonces
  - por eso
  lexicon: BDAG
  rationale: Marca consecuencia lógica de la imagen anterior. «Por tanto» conserva con claridad la relación inferencial sin sonar coloquial.
- source_word: φρόνιμοι
  english_pob_choice: wise
  chosen_spanish: prudentes
  alternatives_spanish:
  - sabios
  - astutos
  - cautos
  lexicon: BDAG
  rationale: En este contexto práctico de supervivencia y discernimiento, «prudentes» expresa mejor la sensatez aplicada que «sabios», que en español puede sonar demasiado abstracto. También evita que la comparación con serpientes se lea como aprobación de la astucia engañosa.
- source_word: ὄφεις
  english_pob_choice: serpents
  chosen_spanish: serpientes
  alternatives_spanish:
  - víboras
  - culebras
  - serpientes
  lexicon: BDAG
  rationale: «Serpientes» reproduce el término genérico y solemne sin sobrecargarlo. Aunque la tradición inglesa usa «serpents», en español esa diferencia no exige un término más rebuscado.
- source_word: ἀκέραιοι
  english_pob_choice: innocent
  chosen_spanish: sin mezcla
  alternatives_spanish:
  - inocentes
  - puros
  - íntegros
  lexicon: BDAG
  rationale: El término puede señalar integridad sin mezcla, sinceridad o inocencia. «Sin mezcla» conserva el trasfondo de pureza no adulterada y evita reducir la idea a mera ingenuidad o solo a «no hacer daño».
- source_word: περιστεραί
  english_pob_choice: doves
  chosen_spanish: las palomas
  alternatives_spanish:
  - palomas
  - las palomas
  lexicon: BDAG
  rationale: «Palomas» es el equivalente natural en español para el ave de la comparación. El artículo se conserva por fluidez y por concordancia con el paralelismo de la oración.
theological_decisions:
- issue: Tensión entre prudencia y pureza moral
  english_pob_reading: Render the exhortation as a balance of practical wisdom and moral innocence.
  chosen_spanish_reading: La exhortación queda como equilibrio entre prudencia práctica y pureza moral.
  alternative_spanish_readings:
  - prudentes como serpientes e inocentes como palomas
  - astutos como serpientes y sin mezcla como palomas
  rationale: La frase no autoriza engaño; tampoco reduce ἀκέραιοι a simple harmlessness. «Prudentes» preserva la destreza necesaria en un entorno hostil, y «sin mezcla» mantiene la integridad ética sin borrar la tensión del pasaje.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de ἀκέραιοι
  english_pob_reading: innocent
  chosen_spanish_reading: sin mezcla
  alternative_spanish_readings:
  - inocentes
  - puros
  - íntegros
  rationale: «Inocentes» en español puede sonar solo a no culpables o ingenuos. «Sin mezcla» intenta conservar la idea de integridad no contaminada, que encaja con el contraste del versículo y con la nota del POB sobre pureza/harmlessness.
  doctrine_reference: 'Lexical control: preserve semantic range of ἀκέραιος without collapsing it'
translation_notes:
  revision_awareness: El inglés POB pasó de «Look» a «Behold», de «snakes» a «serpents», y de «harmless» a «innocent»; la versión española sigue el sentido final, pero adapta los tres puntos al español natural. También se conserva la fuerza de ἐν μέσῳ con «en medio» y el valor inferencial de οὖν con «por tanto».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo para el nombre divino; aquí no aplica.
  - Se evita «Cristo» porque el versículo no contiene χριστός.
  - «Prudentes» se eligió por claridad contextual frente a «sabios», sin borrar la posible cercanía con astucia disciplinada.
  - «Sin mezcla» mantiene la tensión lexical de ἀκέραιοι sin convertirla en una afirmación meramente conductual de harmlessness.
