  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Confesar» mantiene bien ὁμολογέω en ambas cláusulas. «Padre ... en los cielos» respeta la expresión mateana y la pluralidad griega. No hay conflicto con Yahvé/Mesías/etc.
