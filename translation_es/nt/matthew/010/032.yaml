translation:
  language: es
  text: Así que a todo el que me confiese delante de los hombres[a], yo también lo[b] confesaré delante de mi Padre que está en los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de la gente». El griego usa un plural masculino con referencia humana general.
    reason: lexical_alternative
  - marker: b
    text: 'Griego más literalmente: «yo también confesaré en él» o «con respecto a él». En español se expresa idiomáticamente con el objeto directo «lo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς οὖν ὅστις
  english_pob_choice: Therefore everyone who
  chosen_spanish: Así que a todo el que
  alternatives_spanish:
  - Por tanto, todo el que
  - Así pues, quienquiera que
  lexicon: BDAG
  rationale: Πᾶς con ὅστις introduce una generalización inclusiva; en español, «a todo el que» conserva ese valor sin sonar forzado. οὖν expresa conclusión/inferencia, y «Así que» mantiene la relación lógica con el contexto previo de modo natural.
- source_word: ὁμολογήσει
  english_pob_choice: confesses
  chosen_spanish: me confiese
  alternatives_spanish:
  - me reconozca
  - declare públicamente que me pertenece
  lexicon: BDAG
  rationale: ὁμολογέω aquí apunta a una confesión o reconocimiento abierto. «Confiese» preserva la fuerza verbal pública y permite la correspondencia con el futuro de la segunda cláusula. Se mantiene el objeto directo «me» como en el inglés POB, por el valor idiomático del griego ἐν ἐμοὶ.
- source_word: ἐν ἐμοὶ
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - en mí
  - por mí
  lexicon: BDAG
  rationale: Aunque el griego usa ἐν, el giro con ὁμολογέω funciona idiomáticamente como objeto de confesión. El español natural es «me confiese»; una traducción más literal («en mí») resultaría poco clara y no reflejaría bien el valor del enunciado.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres[a]
  alternatives_spanish:
  - delante de la gente
  - en presencia de los seres humanos
  lexicon: BDAG
  rationale: ἔμπροσθεν significa «delante de / en presencia de». ἀνθρώπων es masculino plural con referencia genérica a seres humanos; «los hombres» conserva la forma gramatical y el paralelo auditado del POB en inglés. Se añade nota para dejar visible la alternativa inclusiva sin borrar la forma del texto fuente.
- source_word: ὁμολογήσω κἀγὼ
  english_pob_choice: I also will confess
  chosen_spanish: yo también lo confesaré
  alternatives_spanish:
  - yo también lo reconoceré
  - también yo lo confesaré
  lexicon: BDAG
  rationale: El futuro de ὁμολογέω se traduce con el mismo verbo que en la primera cláusula para conservar la correspondencia léxica. κἀγώ añade énfasis; «yo también» lo expresa con naturalidad en español.
- source_word: ἐν αὐτῷ
  english_pob_choice: before him
  chosen_spanish: lo
  alternatives_spanish:
  - en él
  - ante él
  lexicon: BDAG
  rationale: El griego repite ἐν en una construcción recíproca que el inglés POB vierte idiomáticamente. En español, el objeto directo anafórico «lo» permite unir la confesión de Cristo con la persona confesada sin imponer una literalidad extraña. La nota conserva la posibilidad más literal y la tensión del original.
- source_word: τοῦ πατρός μου τοῦ ἐν οὐρανοῖς
  english_pob_choice: my Father who is in heaven
  chosen_spanish: de mi Padre que está en los cielos
  alternatives_spanish:
  - de mi Padre que está en el cielo
  - de mi Padre en los cielos
  lexicon: BDAG
  rationale: La expresión mateana «el Padre... en los cielos» se conserva de forma muy cercana al griego, que usa plural οὐρανοῖς. «En los cielos» respeta mejor esa pluralidad que un singular castellano automático, aunque «en el cielo» sería una opción idiomática. Se mantiene el tono reverente y la relación posesiva «mi Padre».
theological_decisions:
- issue: Confesión pública de Jesús y confesión recíproca por Jesús
  english_pob_reading: Render the verse straightforwardly as a promise of reciprocal confession without importing later doctrinal formulations about judgment, salvation mechanics, or ecclesial confession.
  chosen_spanish_reading: Traducirlo como una promesa de confesión recíproca, sin incorporar formulaciones doctrinales posteriores sobre el juicio, el modo de salvación o la confesión eclesial.
  alternative_spanish_readings:
  - Interpretarlo explícitamente como reconocimiento forense en el juicio final
  - Entenderlo principalmente como lenguaje de discipulado presente
  rationale: El versículo afirma una reciprocidad clara entre confesar a Jesús delante de los hombres y ser confesado por Jesús delante del Padre. La traducción preserva esa fuerza sin resolver cuestiones sistemáticas que el texto no desarrolla.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están estables en la revisión más reciente; no hubo cambios aplicados. Se ha conservado la tensión idiomática de ἐν ἐμοὶ / ἐν αὐτῷ y la referencia masculina genérica de ἀνθρώπων, adaptándolas al español sin neutralizarlas por completo.
  spanish_consistency_notes:
  - Se mantiene «confesar» para ὁμολογέω en ambas cláusulas por consistencia léxica.
  - Se traduce τοῦ πατρός μου τοῦ ἐν οὐρανοῖς como «mi Padre que está en los cielos» para respetar el plural griego οὐρανοῖς.
  - La nota [a] preserva la alternativa inclusiva sin alterar el texto principal.
  - La nota [b] señala la literalidad del segundo ἐν para no borrar la rareza sintáctica del original.
