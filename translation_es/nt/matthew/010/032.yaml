    text: Or 'before people.' The Greek says 'before men,' using a masculine plural with generic human reference.
    reason: lexical_alternative
  - marker: b
    text: Greek more literally, 'I also will confess in him' or 'with respect to him'; the clause is rendered idiomatically in English as 'I also will confess before him.'
    reason: lexical_alternative
