translation:
  language: es
  text: 'Jesús envió a estos doce, dándoles instrucciones, diciendo: «No vayan por el camino de los gentiles[a], ni entren en una ciudad de los samaritanos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el camino de los gentiles». La expresión griega es más literalmente de camino/ruta y probablemente se refiere a dirigirse hacia territorio gentil.
    reason: lexical_alternative
  - marker: b
    text: O «una ciudad samaritana».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτους τοὺς δώδεκα
  english_pob_choice: these twelve
  chosen_spanish: estos doce
  alternatives_spanish:
  - estos doce discípulos
  - estos doce hombres
  lexicon: BDAG
  rationale: El demostrativo con artículo y numeral identifica al grupo recién mencionado; en español, «estos doce» reproduce con naturalidad esa referencia sin añadir «discípulos», que no aparece en el griego.
- source_word: ἀπέστειλεν
  english_pob_choice: sent out
  chosen_spanish: envió
  alternatives_spanish:
  - envió fuera
  - despachó
  - mandó
  lexicon: BDAG
  rationale: En español, «envió» comunica bien el envío misional sin sonar forzado. El matiz de misión queda por el contexto y por la instrucción que sigue.
- source_word: παραγγείλας
  english_pob_choice: instructing
  chosen_spanish: instruyéndoles
  alternatives_spanish:
  - mandándoles
  - dándoles instrucciones
  lexicon: BDAG
  rationale: El participio aoristo acompaña al envío y presenta una acción previa o concurrente de instrucción. «Instruyéndoles» conserva ese valor y evita sobrerreducirlo a una fórmula rígida.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: «Diciendo» refleja la introducción del discurso directo de forma simple y fiel a la estructura griega.
- source_word: Εἰς ὁδὸν ἐθνῶν
  english_pob_choice: the way of the Gentiles
  chosen_spanish: el camino de los gentiles
  alternatives_spanish:
  - la vía de los gentiles
  - el camino hacia los gentiles
  - el camino de las naciones
  lexicon: BDAG
  rationale: «ὁδός» puede ser camino/vía/ruta; el POB inglés mantuvo «way». En español, «camino» suena natural y preserva la metáfora de trayecto. «De los gentiles» mantiene el genitivo sin volverlo una paráfrasis de destino más fuerte de lo que el griego exige.
- source_word: ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los no judíos
  lexicon: BDAG
  rationale: En este contexto judío-misional, ἔθνη se refiere a no judíos. «Gentiles» es el equivalente más preciso y usual en español bíblico contemporáneo.
- source_word: μὴ ἀπέλθητε
  english_pob_choice: do not go
  chosen_spanish: no vayan
  alternatives_spanish:
  - no se dirijan
  - no vayan allá
  - no partan
  lexicon: BDAG
  rationale: La prohibición en español se expresa de manera natural con el imperativo negativo plural «no vayan», que conserva el sentido directo del griego.
- source_word: εἰς πόλιν Σαμαριτῶν
  english_pob_choice: a town of the Samaritans
  chosen_spanish: una ciudad de los samaritanos
  alternatives_spanish:
  - una ciudad samaritana
  - un pueblo de los samaritanos
  - una ciudad samaritana
  lexicon: BDAG
  rationale: «πόλις» puede ser ciudad o pueblo; aquí «ciudad» mantiene la forma más literal sin limitar innecesariamente el tamaño. Se conserva el genitivo «de los samaritanos» para reflejar de cerca la construcción griega.
- source_word: Σαμαριτῶν
  english_pob_choice: the Samaritans
  chosen_spanish: los samaritanos
  alternatives_spanish:
  - samaritanos
  lexicon: BDAG
  rationale: Designa al grupo etnorreligioso conocido en los Evangelios. La forma plural con artículo es natural en español y reproduce el referente colectivo.
- source_word: μὴ εἰσέλθητε
  english_pob_choice: do not enter
  chosen_spanish: ni entren
  alternatives_spanish:
  - ni entren en
  - no entren
  lexicon: BDAG
  rationale: La coordinación negativa en español hace fluida la segunda prohibición. «Entren» conserva el valor prohibitivo; el complemento «en una ciudad de los samaritanos» completa el sentido sin redundancia excesiva.
theological_decisions:
- issue: Alcance de la prohibición respecto de gentiles y samaritanos
  english_pob_reading: Render the instruction as a specific mission directive without implying a permanent exclusion of Gentiles or Samaritans from the gospel.
  chosen_spanish_reading: Presentar la instrucción como una directriz concreta para esta misión de los doce, sin insinuar una exclusión permanente de gentiles o samaritanos.
  alternative_spanish_readings:
  - Formularla como una prohibición absoluta y duradera
  - Suavizarla hasta perder su fuerza restrictiva
  rationale: El texto describe una orden situada históricamente. La redacción española debe conservar su fuerza restrictiva sin convertirla en una tesis teológica general que el versículo no afirma por sí mismo.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente; lectura coherente con el contexto canónico.
translation_notes:
  revision_awareness: 'El borrador sigue el sentido refinado del audit trail inglés: mantiene «way/camino» para εἰς ὁδὸν ἐθνῶν, conserva la instrucción como mandato puntual y evita una lectura de exclusión absoluta. La decisión de «ciudad» para πόλις sigue la alternativa inglesa «town»/«city» y mantiene la posibilidad semántica sin sobreespecificar tamaño.'
  spanish_consistency_notes:
  - Se usa «gentiles» para ἐθνῶν conforme al uso bíblico en contexto judío.
  - Se evita «Cristo» porque el versículo nombra a Ἰησοῦς y no usa Χριστός.
  - Se conserva el plural directo «no vayan / ni entren» para reflejar la prohibición en segunda persona plural.
  - La puntuación con comillas angulares españolas mantiene el discurso directo claro y publicable.
