lexical_decisions:
- source_word: πορεύεσθε
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - anden
  - vayan ustedes
  - procedan
  lexicon: BDAG
  rationale: Es un imperativo plural de movimiento. En español, 'vayan' comunica con naturalidad la orden dirigida a varios discípulos sin perder el sentido de desplazamiento.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: Aquí marca contraste con la instrucción anterior; 'pero' reproduce bien la fuerza adversativa.
- source_word: μᾶλλον
  english_pob_choice: instead
  chosen_spanish: más bien
  alternatives_spanish:
  - en cambio
  - más
  - preferentemente
  lexicon: BDAG
  rationale: La combinación con δέ redirige la acción a otro destino. 'Más bien' mantiene la idea de corrección/redirección sin sonar forzado.
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las ovejas del rebaño
  lexicon: BDAG
  rationale: '''Ovejas'' conserva la metáfora bíblica y su valor individual y pastoral. ''Rebaño'' diluiría la imagen directa del sustantivo.'
- source_word: τὰ ἀπολωλότα
  english_pob_choice: lost
  chosen_spanish: perdidas
  alternatives_spanish:
  - extraviadas
  - que se habían perdido
  - descarriadas
  lexicon: BDAG
  rationale: El participio funciona adjetivalmente. 'Perdidas' es el equivalente natural en español y mantiene la imagen de pérdida/extravio sin sobrerreconstruirla.
- source_word: οἴκου Ἰσραήλ
  english_pob_choice: of the house of Israel
  chosen_spanish: de la casa de Israel
  alternatives_spanish:
  - de la casa de Israel
  - del pueblo de Israel
  lexicon: BDAG
  rationale: '''Casa de Israel'' preserva la resonancia bíblica y el sentido corporativo-covenantal del genitivo, como en el texto griego y en la auditoría inglesa.'
theological_decisions:
- issue: Mantenimiento de la metáfora de las ovejas perdidas
  english_pob_reading: Retain 'the lost sheep of the house of Israel' as a metaphor for Israel rather than paraphrasing it as 'the Israelites who have gone astray.'
  chosen_spanish_reading: Mantener 'las ovejas perdidas de la casa de Israel' como metáfora de Israel, sin convertirla en una paráfrasis explicativa.
  alternative_spanish_readings:
  - los israelitas que se han extraviado
  - el pueblo de Israel que se ha perdido
  rationale: El griego conserva de manera explícita la metáfora pastoral; el español debe preservarla para no borrar su peso literario e intertextual. 'Ovejas perdidas' mantiene la tensión teológica y la imaginería bíblica.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios; se mantiene la metáfora y el valor direccional del mandato.'
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' para conservar la fórmula bíblica y corporativa.
  - Se usa 'ovejas' en lugar de 'rebaño' para no atenuar la metáfora individual.
  - '''Más bien'' reproduce la redirección del griego mejor que una paráfrasis explicativa.'
