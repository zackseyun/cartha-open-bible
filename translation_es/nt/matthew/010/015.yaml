translation:
  language: es
  text: 'En verdad les digo[a]: será más soportable[b] para la tierra de Sodoma y de Gomorra[c] en el día del juicio que para aquel pueblo[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les aseguro».
    reason: lexical_alternative
  - marker: b
    text: O «más tolerable».
    reason: lexical_alternative
  - marker: c
    text: O «para Sodoma y Gomorra». El griego dice literalmente «para la tierra de Sodoma y de Gomorra».
    reason: lexical_alternative
  - marker: d
    text: O «ciudad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Ciertamente
  - De cierto
  lexicon: BDAG
  rationale: En la fórmula solemne ἀμὴν λέγω ὑμῖν, «en verdad» conserva el valor de aseveración enfática de manera natural en español. «Amén» sería más transliterado y menos transparente para lectores contemporáneos; «de cierto» es válido pero más arcaizante.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les aseguro
  lexicon: BDAG
  rationale: «Les digo» mantiene la forma directa del verbo de habla sin añadir matices no explícitos en el griego. El sujeto implícito en español es natural y conserva la fórmula de habla dirigida a los oyentes.
- source_word: ἀνεκτότερον
  english_pob_choice: more bearable
  chosen_spanish: más soportable
  alternatives_spanish:
  - más tolerable
  - más fácil de soportar
  - más llevadero
  lexicon: BDAG
  rationale: El comparativo expresa algo más endurable o soportable. «Más soportable» es claro, actual y fiel al sentido; «más tolerable» también sería posible, pero suena menos natural en español contemporáneo.
- source_word: γῇ Σοδόμων καὶ Γομόρρων
  english_pob_choice: the land of Sodom and Gomorrah
  chosen_spanish: la tierra de Sodoma y de Gomorra
  alternatives_spanish:
  - el territorio de Sodoma y de Gomorra
  - la región de Sodoma y de Gomorra
  - Sodoma y Gomorra
  lexicon: BDAG
  rationale: La construcción griega dice literalmente «para la tierra de Sodoma y Gomorra». «Tierra» conserva la referencia geográfica concreta y sigue de cerca el sustantivo γῇ. Se prefirió este eco textual a omitir el sustantivo y decir solo «Sodoma y Gomorra».
- source_word: ἐν ἡμέρᾳ κρίσεως
  english_pob_choice: on the day of judgment
  chosen_spanish: en el día del juicio
  alternatives_spanish:
  - en el día del juicio final
  - en el día de la condenación
  - en el día del juicio de Dios
  lexicon: BDAG
  rationale: La frase apunta al día escatológico del juicio divino. «Del juicio» transmite bien la solemnidad y no añade más de lo que el texto dice. «Juicio final» sería más explicativo, pero importaría una precisión no expresada explícitamente en la cláusula.
- source_word: τῇ πόλει ἐκείνῃ
  english_pob_choice: that town
  chosen_spanish: aquella ciudad
  alternatives_spanish:
  - ese pueblo
  - aquella población
  - esa ciudad
  lexicon: BDAG
  rationale: πόλις puede ser «ciudad» o «pueblo/aldea» según contexto. Dado que el contexto inmediato habla de lugares rechazadores en la misión, «ciudad» funciona bien en español; «aquella» refleja el demostrativo de referencia a una entidad concreta ya identificada por el discurso.
theological_decisions:
- issue: Alcance escatológico de «el día del juicio»
  english_pob_reading: Rendered as a future day of divine judgment without specifying more than the text states.
  chosen_spanish_reading: Se mantiene como una referencia futura al juicio sin precisar más el esquema escatológico.
  alternative_spanish_readings:
  - día del juicio final
  - día de condenación definitiva
  - juicio de Dios
  rationale: El griego habla de «día de juicio» y la traducción no debe cargarlo con detalles doctrinales que el versículo no explicita. «En el día del juicio» conserva la solemnidad y la orientación futura sin cerrar el alcance de la expresión.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: El contexto de auditoría muestra un acuerdo alto y sin revisiones aplicadas; por eso la redacción española sigue de cerca la decisión inglesa, manteniendo las alternativas relevantes solo en las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque no aparece ningún título mesiánico en el versículo.
  - «Tierra» se usó para γῇ siguiendo el valor geográfico concreto del contexto.
  - «Ciudad» se eligió para πόλις porque el contexto de misión hace natural esa escala referencial en español.
