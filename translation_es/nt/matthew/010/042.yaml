revisions:
- from: Y cualquiera que dé a uno de estos pequeños un vaso de agua fría[a], en nombre de un discípulo, de cierto les digo[b], no perderá de ninguna manera su recompensa.
  to: Y cualquiera que dé a uno de estos pequeños[a] aunque solo sea un vaso de agua fría, en nombre de un discípulo[b], en verdad les digo, ciertamente no perderá su recompensa.
  rationale: Se corrigieron los anclajes de las notas para que correspondan a las frases que explican. Se añadió «aunque solo sea» para representar μόνον en el texto principal. Se reemplazó «de cierto les digo» por «en verdad les digo» y «no perderá de ninguna manera» por «ciertamente no perderá» para mejorar la naturalidad sin perder solemnidad ni énfasis. Se mantuvo «en nombre de un discípulo» en línea con la revisión auditada inglesa, dejando la explicación idiomática en nota.
