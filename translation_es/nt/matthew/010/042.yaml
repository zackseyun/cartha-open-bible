base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/042.yaml
  text: And whoever gives one of these little ones even a cup of cold water in the name of a disciple[a], truly I say to you[b], he will certainly not lose his reward.
  footnotes:
  - marker: a
    text: Or, more formally, 'in the name of a disciple.' The Greek phrase indicates that the act is done because of the recipient's identity as a disciple.
    reason: alternative_reading
  - marker: b
    text: '''Little ones'' here likely refers to those of low status among Jesus'' followers, not necessarily only to children.'
    reason: cross_reference
