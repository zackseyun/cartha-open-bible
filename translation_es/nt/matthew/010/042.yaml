translation:
  language: es
  text: Y cualquiera que dé a uno de estos pequeños[a] aunque solo sea un vaso de agua fría, en nombre de un discípulo[b], en verdad les digo, ciertamente no perderá su recompensa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pequeños» aquí probablemente se refiere a los de baja condición entre los seguidores de Jesús, no necesariamente solo a niños.
    reason: cross_reference
  - marker: b
    text: O, más idiomáticamente, «porque es discípulo». La frase griega indica que el acto se hace por la identidad de la persona como discípulo.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς ἂν
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: La construcción indefinida se vierte naturalmente con una forma generalizante en español. «Cualquiera que» conserva el alcance abierto del griego sin sonar forzado.
- source_word: ποτίσῃ
  english_pob_choice: gives
  chosen_spanish: dé a beber
  alternatives_spanish:
  - dé
  - proporcione para beber
  lexicon: BDAG
  rationale: El verbo significa literalmente «dar de beber». En español, para un vaso de agua fría, «dé a beber» comunica mejor la acción concreta que «dé» a secas, sin perder naturalidad.
- source_word: ἕνα τῶν μικρῶν τούτων
  english_pob_choice: one of these little ones
  chosen_spanish: a uno de estos pequeños
  alternatives_spanish:
  - a uno de estos pequeños humildes
  - a uno de estos insignificantes
  lexicon: BDAG
  rationale: «Pequeños» conserva la expresión tradicional y el matiz de personas de baja condición o poca importancia en el contexto, sin reducirlo a niños solamente.
- source_word: ποτήριον ψυχροῦ
  english_pob_choice: a cup of cold water
  chosen_spanish: un vaso de agua fría
  alternatives_spanish:
  - una copa de agua fría
  - un vaso de agua fresca
  lexicon: BDAG
  rationale: Aunque «ποτήριον» es literalmente «copa/vaso», en español «vaso» resulta más natural para agua. «Agua fría» refleja el sentido idiomático y la pequeñez del gesto.
- source_word: μόνον
  english_pob_choice: even
  chosen_spanish: solo
  alternatives_spanish:
  - solo un
  - únicamente
  lexicon: BDAG
  rationale: El adverbio subraya lo mínimo del don. En español, se puede expresar con «solo», que mantiene la idea de un acto pequeño o meramente mínimo.
- source_word: εἰς ὄνομα μαθητοῦ
  english_pob_choice: in the name of a disciple
  chosen_spanish: en nombre de un discípulo
  alternatives_spanish:
  - porque es discípulo
  - como discípulo
  lexicon: BDAG
  rationale: Se conserva la formulación más cercana al griego, como indica la revisión auditada, porque la frase apunta al motivo o base del acto sin expandirla interpretativamente.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: truly I say to you
  chosen_spanish: de cierto les digo
  alternatives_spanish:
  - amén, les digo
  - verdaderamente les digo
  lexicon: BDAG
  rationale: La fórmula solemne se vierte con un equivalente reverente y comprensible en español. «De cierto» mantiene el tono autoritativo tradicional sin volverse arcaico en exceso.
- source_word: οὐ μὴ ἀπολέσῃ
  english_pob_choice: will certainly not lose
  chosen_spanish: no perderá de ninguna manera
  alternatives_spanish:
  - ciertamente no perderá
  - no perderá en absoluto
  lexicon: BDAG
  rationale: La construcción negativa enfática exige una negación fuerte en español. «No perderá de ninguna manera» comunica bien la seguridad absoluta del griego.
- source_word: μισθὸν αὐτοῦ
  english_pob_choice: his reward
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su galardón
  - su pago
  lexicon: BDAG
  rationale: «Recompensa» es el equivalente natural en español para μισθός en este contexto de discipulado. «Galardón» es posible, pero menos neutral; «pago» suena demasiado literal y comercial.
theological_decisions:
- issue: Sentido de μικρῶν τούτων
  english_pob_reading: Little ones here likely refers to those of low status among Jesus' followers, not necessarily only to children.
  chosen_spanish_reading: «Estos pequeños» se entiende de manera amplia como los de condición humilde o aparentemente insignificante entre los seguidores de Jesús, no solo como niños.
  alternative_spanish_readings:
  - literalmente niños
  - nuevos creyentes únicamente
  rationale: 'La expresión debe conservar su amplitud contextual. En español, «pequeños» permite mantener la tensión: puede incluir niños, pero no se restringe a ellos.'
  doctrine_reference: Preservar la tensión interpretativa sin resolverla indebidamente.
- issue: Sentido de εἰς ὄνομα μαθητοῦ
  english_pob_reading: The phrase indicates that the act is done because of the recipient's identity as a disciple.
  chosen_spanish_reading: Se traduce «en nombre de un discípulo» para reflejar la base o motivo del acto, sin cargar la frase con matices sacramentales.
  alternative_spanish_readings:
  - porque es discípulo
  - en nombre del discípulo
  - como discípulo
  rationale: La forma más cercana al griego evita añadir explicaciones que no están en el texto. La nota permite recordar la fuerza idiomática de la expresión.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que prefirió «in the name of a disciple» frente a una expansión interpretativa («only because he is a disciple»). También conserva la lectura amplia de «little ones» y la negación enfática de οὐ μὴ con una construcción fuerte en español.
  spanish_consistency_notes:
  - Se mantiene «discípulo» para μαθητής y «recompensa» para μισθός en coherencia con el expediente.
  - Se evita «SEÑOR» y no hay términos divinos en este versículo.
  - La puntuación sigue un estilo bíblico moderno y legible, con la cláusula solemne separada por comas.
