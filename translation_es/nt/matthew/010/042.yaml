review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general el sentido del griego: la condición generalizante (ὃς ἂν), el referente amplio de «estos pequeños», el gesto mínimo de «un vaso de agua fría», la fórmula solemne y la negación enfática de la recompensa. Sin embargo, hay desajustes internos importantes: el texto omite en español un equivalente visible para μόνον («solo/aun siquiera») y las notas están mal ancladas respecto del contenido auditado. La nota [a] se colocó sobre «agua fría» aunque trata de «en nombre de un discípulo»; la nota [b] se colocó sobre «de cierto les digo» aunque trata de «pequeños».'
  spanish_quality_summary: El español es comprensible, pero puede mejorarse para mayor naturalidad y fidelidad. «De cierto les digo» suena más tradicional/arcaizante de lo deseado; «en verdad les digo» o «de verdad les digo» es más natural y digno. «No perderá de ninguna manera» transmite énfasis, pero resulta algo pesado; «ciertamente no perderá» o «de ningún modo perderá» fluye mejor. También conviene hacer explícito el matiz de μόνον con «aunque solo sea» o «siquiera».
  glossary_alignment: No hay conflictos con los términos troncales del proyecto. «Discípulo», «Jesús», «recompensa» y «pequeños» son adecuados. La decisión de mantener «en nombre de un discípulo» sigue la revisión auditada inglesa, pero la nota alternativa debe anclarse en esa frase, no en «agua fría».
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en lugares equivocados.
    rationale: La nota [a] explica εἰς ὄνομα μαθητοῦ pero aparece tras «agua fría»; la nota [b] explica «pequeños» pero aparece tras «de cierto les digo». Esto distorsiona la relación entre texto y aparato.
  - severity: medium
    issue: El texto no refleja claramente μόνον.
    rationale: El griego subraya la pequeñez del gesto («solo», «siquiera», «aunque no sea más que»). El borrador lo omite en la línea principal aunque sí lo documenta en decisiones léxicas.
  - severity: medium
    issue: «De cierto les digo» suena innecesariamente arcaizante.
    rationale: Aunque inteligible, no encaja tan bien con el objetivo de español moderno pero digno. «En verdad les digo» conserva solemnidad y legibilidad.
  - severity: low
    issue: «No perderá de ninguna manera» es algo torpe estilísticamente.
    rationale: Comunica la negación enfática, pero una formulación como «ciertamente no perderá» suena más natural en español amplio.
  revised_spanish_text: Y cualquiera que dé a uno de estos pequeños[a] aunque solo sea un vaso de agua fría, en nombre de un discípulo[b], en verdad les digo, ciertamente no perderá su recompensa.
  revised_footnotes:
