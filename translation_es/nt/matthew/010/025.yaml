translation:
  language: es
  text: Basta al discípulo que llegue a ser como su maestro, y el esclavo como su amo. Si al dueño de la casa lo llamaron Beelzebul[a], ¿cuánto más a los de su casa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Beelzebub», una variante tradicional y familiar en la tradición en inglés.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρκετὸν
  english_pob_choice: It is enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Es suficiente
  - Alcanza
  lexicon: BDAG
  rationale: Expresa la suficiencia del predicado de manera natural en español y conserva el valor idiomático sin añadir explicaciones ajenas al texto.
- source_word: μαθητῇ
  english_pob_choice: the disciple
  chosen_spanish: al discípulo
  alternatives_spanish:
  - al alumno
  - al estudiante
  lexicon: BDAG
  rationale: «Discípulo» preserva la relación de seguimiento y aprendizaje propia del contexto evangélico mejor que «estudiante».
- source_word: ἵνα γένηται
  english_pob_choice: that he become
  chosen_spanish: que llegue a ser
  alternatives_spanish:
  - que se vuelva
  - que sea
  lexicon: BDAG
  rationale: La construcción con ἵνα + subjuntivo expresa aquí resultado/purpose; «llegue a ser» mantiene la idea de proceso y resultado sin endurecer la sintaxis española.
- source_word: διδάσκαλος
  english_pob_choice: teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - maestro de enseñanza
  - docente
  lexicon: BDAG
  rationale: «Maestro» es el equivalente más natural y fiel en este paralelismo con μαθητής; evita confusión con κύριος, que en esta cláusula no funciona como el mismo término de autoridad religiosa.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el servidor
  lexicon: BDAG
  rationale: Se conserva la fuerza social del término en el contraste jerárquico con κύριος. «Esclavo» refleja mejor la relación de subordinación que «siervo».
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: En español, «señor» puede funcionar como término de autoridad relacional en este paralelismo. Se evita «Señor» con mayúscula para no imponer automáticamente un valor cristológico que el contexto inmediato no subraya; «amo» habría sonado demasiado duro o técnico, y «dueño» no encaja tan bien con el contraste personal.
- source_word: οἰκοδεσπότην
  english_pob_choice: the master of the house
  chosen_spanish: al dueño de la casa
  alternatives_spanish:
  - al jefe de la casa
  - al cabeza de familia
  lexicon: BDAG
  rationale: La expresión transmite al que tiene autoridad sobre la casa; «dueño de la casa» conserva la imagen doméstica y la relación de posesión/autoridad en español natural.
- source_word: Βεελζεβοὺλ
  english_pob_choice: Beelzebul
  chosen_spanish: Beelzebul
  alternatives_spanish:
  - Beelzebub
  lexicon: BDAG
  rationale: Se sigue la forma griega del texto base. La variante tradicional «Beelzebub» se preserva como alternativa reconocible en nota.
- source_word: ἐπεκάλεσαν
  english_pob_choice: they called
  chosen_spanish: lo llamaron
  alternatives_spanish:
  - lo nombraron
  - lo denominaron
  lexicon: BDAG
  rationale: Es la equivalencia más directa de la designación con nombre en este contexto; en español mantiene la naturalidad y el referente personal del verbo.
- source_word: πόσῳ μᾶλλον
  english_pob_choice: how much more
  chosen_spanish: ¿cuánto más?
  alternatives_spanish:
  - ¿cuánto más todavía?
  - ¿cuánto más, entonces?
  lexicon: BDAG
  rationale: Reproduce el argumento a fortiori de forma idiomática en español; el matiz comparativo queda claro sin añadir elementos interpretativos.
- source_word: οἰκιακοὺς
  english_pob_choice: those of his household
  chosen_spanish: a los de su casa
  alternatives_spanish:
  - a los miembros de su casa
  - a los de su hogar
  lexicon: BDAG
  rationale: «Los de su casa» preserva la amplitud del término para los miembros del entorno doméstico y su relación con οἰκοδεσπότης.
theological_decisions:
- issue: Valor de κύριος en el paralelismo doméstico
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - Señor
  - amo
  - dueño
  rationale: Aunque el valor por defecto de κύριος puede ser «Señor» en contextos teológicos, aquí el paralelismo con δοῦλος y οἰκοδεσπότης muestra una comparación social de autoridad doméstica. «Señor» en minúscula permite conservar la relación sin importar una lectura cristológica explícita que el verso no exige.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος), Translation philosophy #5'
- issue: Valor de δοῦλος en contraste jerárquico
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: Se mantiene la fuerza del contraste de estatus entre δοῦλος y κύριος. «Esclavo» preserva la dureza social del término y evita suavizarla indebidamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms (δοῦλος), Translation philosophy #1'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la solución auditada del POB en inglés: mantiene el paralelismo de discípulo/maestro y esclavo/señor, conserva Beelzebul según la forma griega, y reproduce el argumento comparativo final como pregunta retórica. No se aplicaron revisiones adicionales; el pasaje estaba ya en alto acuerdo en la auditoría.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para κύριος porque el contexto inmediato es doméstico y comparativo, no una referencia litúrgica explícita.
  - «Esclavo» se mantiene por coherencia con el valor lexical de δοῦλος en la nota doctrinal del proyecto.
  - «Dueño de la casa» y «los de su casa» conservan el campo doméstico compartido entre οἰκοδεσπότης y οἰκιακοὺς.
  - La nota sobre Beelzebub se ancla en el nombre propio para reflejar la variante tradicional sin alterar el texto principal.
