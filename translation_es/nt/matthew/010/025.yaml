    issue: La nota [a] está colocada en «maestro» en lugar de «Beelzebul».
    rationale: La nota explica una variante del nombre Βεελζεβοὺλ/Beelzebub, por lo que el marcador debe aparecer junto al nombre propio correspondiente. Tal como está, induce a error textual.
  - severity: medium
