revisions:
- from: Basta al discípulo que llegue a ser como su maestro[a], y el esclavo como su señor. Si al dueño de la casa lo llamaron Beelzebul, ¿cuánto más a los de su casa?
  to: Basta al discípulo que llegue a ser como su maestro, y el esclavo como su amo. Si al dueño de la casa lo llamaron Beelzebul[a], ¿cuánto más a los de su casa?
  rationale: Se corrige la ubicación de la nota textual para anclarla al nombre «Beelzebul», que es el elemento al que realmente se refiere la variante. También se reemplaza «señor» por «amo» para reflejar mejor el valor doméstico-social de κύριος en contraste con «esclavo», conforme a la justificación léxica y teológica documentada en el POB inglés. El resto del texto puede mantenerse.
