translation:
  language: es
  text: Felipe y Bartolomé[a], Tomás y Mateo el recaudador de impuestos, Jacobo hijo de Alfeo y Tadeo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Lebeo» (o «Lebeo llamado Tadeo»), y las listas apostólicas de Lucas nombran «Judas hijo de Jacobo» en el lugar correspondiente.
    reason: textual_variant
lexical_decisions:
- source_word: Φίλιππος
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso español bíblico; 'Felipe' es la forma establecida y natural en español para el apóstol Φίλιππος.
- source_word: Βαρθολομαῖος
  english_pob_choice: Bartholomew
  chosen_spanish: Bartolomé
  alternatives_spanish:
  - Bartolomeo
  lexicon: BDAG
  rationale: Nombre propio tradicional en español; conserva la referencia identificable del apóstol sin calco innecesario.
- source_word: Θωμᾶς
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  alternatives_spanish:
  - Tomás el Dídimo
  lexicon: BDAG
  rationale: Nombre propio transliterado a la forma corriente en español bíblico.
- source_word: Μαθθαῖος
  english_pob_choice: Matthew
  chosen_spanish: Mateo
  alternatives_spanish:
  - Matías
  lexicon: BDAG
  rationale: Forma española establecida del nombre del apóstol; evita confusión con otros nombres parecidos y sigue la tradición onomástica española.
- source_word: ὁ τελώνης
  english_pob_choice: the tax collector
  chosen_spanish: el cobrador de impuestos
  alternatives_spanish:
  - el recaudador de impuestos
  - el publicano
  lexicon: BDAG
  rationale: '''Cobrador de impuestos'' transmite con claridad el oficio en español moderno. ''Recaudador'' es posible, pero puede sonar más administrativo; ''publicano'' es tradicional pero menos transparente.'
- source_word: Ἰάκωβος
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: BDAG
  rationale: En listas apostólicas, el griego Ἰάκωβος puede reflejarse como 'Jacobo' para acercarse más a la forma del nombre original y mantener consistencia con la preferencia por nombres no armonizados a tradición eclesial cuando no es necesario.
- source_word: ὁ τοῦ Ἁλφαίου
  english_pob_choice: the son of Alphaeus
  chosen_spanish: hijo de Alfeo
  alternatives_spanish:
  - de Alfeo
  lexicon: BDAG
  rationale: El genitivo indica filiación; 'hijo de Alfeo' expresa de manera natural y explícita la relación de parentesco.
- source_word: Ἁλφαίου
  english_pob_choice: Alphaeus
  chosen_spanish: Alfeo
  alternatives_spanish:
  - Alfaeo
  lexicon: BDAG
  rationale: Forma española estándar del nombre propio en el contexto bíblico.
- source_word: Θαδδαῖος
  english_pob_choice: Thaddaeus
  chosen_spanish: Tadeo
  alternatives_spanish:
  - Tadeo[a]
  lexicon: BDAG
  rationale: Nombre propio transliterado a la forma usual en español bíblico; 'Tadeo' mantiene la identificación del apóstol en una forma natural para el lector hispanohablante.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante ordinaria en español; 'e' no es necesaria aquí porque las palabras siguientes no comienzan con sonido /i/.
theological_decisions:
- issue: Identificación del último apóstol y variantes manuscritas
  english_pob_reading: The base Greek text reads Thaddaeus; a footnote preserves Lebbaeus / Lebbaeus called Thaddaeus and Luke's corresponding apostolic-list variant Judas son of James.
  chosen_spanish_reading: Tadeo, con nota textual sobre las variantes Lebeo / Lebeo llamado Tadeo y el paralelo de Lucas 'Judas hijo de Jacobo'.
  alternative_spanish_readings:
  - Lebeo
  - Lebeo llamado Tadeo
  - Judas hijo de Jacobo
  rationale: La lectura base del griego aquí es Θαδδαῖος, así que el texto principal debe seguir 'Tadeo'. Para no borrar la tensión textual documentada en listas paralelas y manuscritos, la nota conserva las alternativas relevantes sin armonizarlas en el cuerpo principal.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §3 (preservar tensiones/alternativas en notas)
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que el marcador [a] aparezca en el texto principal junto a «Bartolomé», de modo que la nota quede debidamente anclada. La lectura principal sigue el griego SBLGNT: Tadeo.'
  spanish_consistency_notes:
  - Se mantuvieron nombres propios bíblicos en formas españolas establecidas y naturales.
  - Se optó por 'cobrador de impuestos' para ὁ τελώνης por claridad moderna, sin perder el oficio fiscal.
  - Se conservó 'Jacobo' para Ἰάκωβος como opción fuente-cercana en listas apostólicas, evitando armonizar con 'Santiago' sin necesidad textual.
  - Se evitó 'SEÑOR' o equivalentes irrelevantes porque el versículo es una lista de nombres.
  - La nota textual está anclada exactamente en el texto con [a], sin marcadores huérfanos.
