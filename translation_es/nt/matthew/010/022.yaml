translation:
  language: es
  text: Y ustedes serán odiados por todos[a] a causa de mi nombre. Pero el que persevere hasta el fin será salvo[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por amor de mi nombre'.
    reason: lexical_alternative
  - marker: b
    text: O 'el que soporte hasta el fin'.
    reason: lexical_alternative
  - marker: c
    text: '''Será salvo'' también puede entenderse como ''será librado'' o ''será rescatado'', según cómo se entienda el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: μισούμενοι
  english_pob_choice: be hated
  chosen_spanish: ser odiados
  alternatives_spanish:
  - ser detestados
  - ser aborrecidos
  lexicon: BDAG
  rationale: 'El participio perifrástico futuro expresa un estado futuro: no solo un acto puntual, sino la condición de ser objeto de odio. En español, ''ser odiados'' comunica con naturalidad esa fuerza pasiva.'
- source_word: ὑπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - por todos los hombres
  - por toda la gente
  lexicon: BDAG
  rationale: La construcción pasiva con ὑπό más genitivo indica agentes personales. 'Por todos' conserva el alcance amplio y la formalidad del texto griego sin sobreexplicarlo.
- source_word: διὰ τὸ ὄνομά μου
  english_pob_choice: because of my name
  chosen_spanish: a causa de mi nombre
  alternatives_spanish:
  - por mi nombre
  - por causa de mi nombre
  - por amor de mi nombre
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. 'A causa de mi nombre' es claro en español y mantiene el valor bíblico de 'nombre' como referencia a la persona y autoridad de Jesús.
- source_word: ὑπομείνας
  english_pob_choice: the one who endures
  chosen_spanish: el que persevere
  alternatives_spanish:
  - el que endure
  - el que resista
  - el que permanezca firme
  lexicon: BDAG
  rationale: ὑπομένω en contextos de persecución implica resistir con constancia bajo presión. 'Persevere' en español comunica bien esa fidelidad sostenida; 'endure' también sería posible, pero 'persevere' suena más natural sin perder el matiz de constancia.
- source_word: εἰς τέλος
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: BDAG
  rationale: La expresión marca duración hasta el punto final. 'Hasta el fin' es idiomático y fiel al griego.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvo
  alternatives_spanish:
  - será rescatado
  - será librado
  - será salvado
  lexicon: BDAG
  rationale: σῴζω puede abarcar salvar, librar o rescatar. 'Será salvo' preserva la amplitud teológica en Mateo sin reducir el sentido a mera liberación temporal.
theological_decisions:
- issue: Relación entre perseverancia y salvación final
  english_pob_reading: Retain the broad wording 'will be saved' without specifying whether the emphasis is temporal deliverance, eschatological salvation, or perseverance doctrine.
  chosen_spanish_reading: Mantener 'será salvo' sin precisar si la referencia es liberación temporal, salvación escatológica o una formulación doctrinal sobre la perseverancia.
  alternative_spanish_readings:
  - será librado
  - recibirá la salvación final
  - enseña un modelo doctrinal específico de perseverancia
  rationale: El versículo vincula la perseverancia bajo persecución con la salvación, pero la traducción no debe resolver una tensión teológica que el texto mismo deja abierta. 'Será salvo' conserva esa amplitud.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en la elección de 'por todos' para πάντων y se mantuvo el enfoque óptimo-equivalente para una redacción natural en español. Se evitó la forma más rígida 'el que endure hasta el fin, éste será salvo' por su aspereza en español, pero se preservó la sutileza semántica mediante notas de alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el fuente lo exige; aquí no aplica.
  - '''Mesías/Cristo'' no aparece en este versículo.'
  - '''Espíritu'' no aplica; tampoco ''esclavo/siervo''.'
  - '''salvo'' se mantiene para σῴζω por amplitud semántica, con nota alternativa para ''librado'' y ''rescatado''.'
