revisions:
- from: No piensen que he venido a traer paz a la tierra[a]; no he venido a traer paz[b], sino espada.
  to: No piensen que he venido a traer paz en la tierra[a]; no he venido a traer paz[b], sino una espada.
  rationale: Se corrige «a la tierra» a «en la tierra» para reflejar mejor ἐπὶ τὴν γῆν; se añade el artículo en «una espada» para español natural y correspondencia semántica; y se ajusta la nota del aoristo para eliminar «vengo» y alinearla con la auditoría inglesa. También se normaliza la nota b para que coincida más de cerca con la intención del POB.
