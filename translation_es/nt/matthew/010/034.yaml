    reason: lexical_alternative
  - marker: b
    text: El griego dice «una espada»; en el contexto, esta imagen apunta a división más que a recomendar violencia.
    reason: lexical_alternative
  revision_rationale: Se corrige «a la tierra» a «en la tierra» para reflejar mejor ἐπὶ τὴν γῆν; se añade el artículo en «una espada» para español natural y correspondencia semántica; y se ajusta la nota del aoristo para eliminar «vengo» y alinearla con la auditoría inglesa. También se normaliza la nota b para que coincida más de cerca con la intención del POB.
