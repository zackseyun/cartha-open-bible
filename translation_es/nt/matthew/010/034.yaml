translation:
  language: es
  text: No piensen que he venido a traer paz en la tierra[a]; no he venido a traer paz[b], sino una espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vine» en lugar de «he venido». El verbo griego está en aoristo y puede expresarse en español con pretérito simple o con perfecto, según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice «una espada»; en el contexto, esta imagen apunta a división más que a recomendar violencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ νομίσητε
  english_pob_choice: Do not think
  chosen_spanish: No piensen
  alternatives_spanish:
  - No supongan
  - No imaginen
  lexicon: BDAG
  rationale: El aoristo subjuntivo con μή funciona como prohibición. «No piensen» comunica con naturalidad la advertencia directa y conserva el valor mental del verbo sin sobreinterpretarlo.
- source_word: ἦλθον
  english_pob_choice: I came
  chosen_spanish: he venido
  alternatives_spanish:
  - vine
  - vine a
  lexicon: BDAG
  rationale: En español, el pretérito perfecto «he venido» suena natural en una declaración de misión y preserva bien la idea de llegada con relevancia presente. El inglés POB señaló que «I came» / «I have come» son posibles; aquí el perfecto español evita dureza innecesaria.
- source_word: βαλεῖν
  english_pob_choice: to bring
  chosen_spanish: traer
  alternatives_spanish:
  - poner
  - lanzar
  - echar
  lexicon: BDAG
  rationale: Aunque βάλλω literalmente es «arrojar/ lanzar», en este giro con «paz» y «espada» el sentido idiomático buscado por el POB es el efecto de introducir algo. «Traer» comunica ese resultado con claridad en español sin convertir la imagen en una paráfrasis ajena.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz y tranquilidad
  - armonía
  lexicon: BDAG
  rationale: «Paz» es la correspondencia normal de εἰρήνη y mantiene la sobriedad del dicho.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: on the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo expresa dirección/ extensión sobre la tierra. «A la tierra» mantiene bien el movimiento verbal en español con un tono natural; la idea no se limita a un lugar abstracto, sino al ámbito de la tierra como destino.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En español, después de una negación, «sino» expresa mejor el contraste fuerte de ἀλλά. Es más preciso que «pero» en esta estructura.
- source_word: μάχαιραν
  english_pob_choice: a sword
  chosen_spanish: espada
  alternatives_spanish:
  - un cuchillo
  - una daga
  lexicon: BDAG
  rationale: μάχαιρα denota una espada o arma cortante; el inglés POB conservó la imagen concreta. «Espada» es la opción más reconocible y fiel en español. Dado que el contexto explica el efecto divisivo, no se resuelve la imagen en una paráfrasis como «división» en el texto principal.
theological_decisions:
- issue: Si la imagen de la espada debe suavizarse a una interpretación explícita de división
  english_pob_reading: Retain the concrete image 'a sword' in the main text
  chosen_spanish_reading: Conservar la imagen concreta «espada» en el texto principal
  alternative_spanish_readings:
  - división
  - conflicto
  rationale: El griego dice explícitamente μάχαιραν. La traducción debe preservar la tensión interpretativa y no sustituir el símbolo por su explicación contextual. El contexto cercano sí aclara el efecto divisivo, pero no debe borrarse la imagen del texto fuente.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor temporal de ἦλθον en primera persona singular
  english_pob_reading: '''I came'' with footnoted alternative ''I have come'''
  chosen_spanish_reading: «he venido» en el texto principal, con nota de alternativa temporal implícita
  alternative_spanish_readings:
  - vine
  - he venido
  rationale: El aoristo puede reflejarse en español con pasado simple o perfecto según el matiz discursivo. Aquí el perfecto suena natural para una declaración vigente de misión. Se conserva la alternativa porque el griego permite ambas orientaciones en la recepción española.
  doctrine_reference: BDAG; decisión temporal comparativa
translation_notes:
  revision_awareness: Coincide con la auditoría inglesa de referencia y no requiere revisión adicional sustantiva; se mantiene la imagen concreta de «espada» y se preserva la posibilidad temporal del verbo de movimiento en la nota.
  spanish_consistency_notes:
  - Se usa «paz» para εἰρήνη y «espada» para μάχαιρα de manera consistente con el registro bíblico-actual.
  - Se prefirió «sino» tras la negación para reflejar con precisión el contraste de ἀλλά.
  - Se mantuvo una sintaxis natural en español sin suavizar la fuerza polémica del dicho.
