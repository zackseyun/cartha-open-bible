  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: participio de marcha + mandato de proclamar + participio introductorio del contenido + perfecto de cercanía vigente. También preserva correctamente «el reino de los cielos» como formulación distintiva de Mateo. Sin embargo, hay dos puntos a corregir: «mientras vayan» suena menos natural y menos preciso que «mientras van» o «al ir», y la nota b introduce la alternativa poco idiomática «ha llegado cerca», que no corresponde bien al español natural ni al registro digno del proyecto.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero «mientras vayan» resulta algo forzado en este contexto exhortativo; «mientras van» fluye mejor en español e igualmente expresa acción concomitante. «Proclamen, diciendo» es aceptable y refleja λέγοντες de forma transparente. «Se ha acercado» es una buena solución para Ἤγγικεν. La redacción general es legible y eclesialmente natural.
  glossary_alignment: 'Alineado con la terminología del proyecto: no hay términos sensibles fuera de «reino de los cielos», que está bien preservado. No hay conflicto con Yahvé/Mesías/etc. La decisión de mantener «reino» en lugar de «reinado» es coherente con el expediente inglés y con el uso bíblico en español.'
  issues:
  - severity: medium
    issue: «mientras vayan» en el texto principal
    rationale: Aunque gramaticalmente posible, suena menos natural en español para un mandato general a plural. El participio πορευόμενοι se expresa con más fluidez y claridad como «mientras van» o «al ir», sin perder el valor concomitante.
  - severity: medium
    issue: Nota b con alternativa «ha llegado cerca»
    rationale: Es una formulación poco idiomática en español y no representa una alternativa digna para el perfecto Ἤγγικεν. Debe reemplazarse por «ha venido cerca» o mejor limitarse a «ha llegado»/«está cerca» según el matiz que se quiera preservar.
  - severity: low
    issue: Falta la nota mateana sobre «reino de los cielos»
    rationale: El expediente inglés conserva una nota de referencia cruzada sobre la expresión distintiva de Mateo. No es estrictamente indispensable, pero sería deseable preservarla también en español para reflejar el rastro de auditoría completo.
  revised_spanish_text: 'Y mientras van[a], proclamen, diciendo: «El reino de los cielos[c] se ha acercado[b]».'
