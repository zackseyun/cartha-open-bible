translation:
  language: es
  text: 'Y mientras van[a], proclamen, diciendo: «El reino de los cielos[c] se ha acercado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al ir». El participio griego expresa acción concomitante con el mandato principal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha venido cerca» o «está cerca». El perfecto griego subraya una cercanía ya establecida que continúa en efecto.'
    reason: lexical_alternative
  - marker: c
    text: Mateo usa regularmente «el reino de los cielos», donde los otros Evangelios a menudo dicen «el reino de Dios».
    reason: cross_reference
lexical_decisions:
- source_word: πορευόμενοι
  english_pob_choice: as you go
  chosen_spanish: mientras vayan
  alternatives_spanish:
  - mientras van
  - al ir
  - yendo
  lexicon: BDAG
  rationale: El participio presente acompaña al mandato principal y expresa acción concurrente. «Mientras vayan» conserva ese valor temporal y el movimiento del encargo sin sonar forzado en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: La partícula enlaza con la instrucción anterior. «Y» mantiene continuidad sin introducir contraste que el griego no exige aquí.
- source_word: κηρύσσετε
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - prediquen
  - anuncien
  lexicon: BDAG
  rationale: El verbo tiene sentido de proclamación pública y autorizada. «Proclamen» conserva ese tono solemne y público mejor que «prediquen», que puede sonar más eclesiástico en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - proclamando
  lexicon: BDAG
  rationale: El participio introduce el contenido de la proclamación. «Diciendo» refleja de forma transparente la estructura del griego y funciona naturalmente antes de la cita.
- source_word: Ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - está cerca
  - ha llegado cerca
  - se ha aproximado
  lexicon: BDAG
  rationale: El perfecto griego señala una cercanía ya realizada con vigencia presente. «Se ha acercado» conserva ese matiz de estado resultante sin reducirlo a una simple proximidad estática.
- source_word: ἡ βασιλεία
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reinado
  - la realeza
  lexicon: BDAG
  rationale: «Reino» es la equivalencia natural y estable en español, y puede abarcar tanto el ámbito como el gobierno real, sin perder la amplitud del término griego.
- source_word: τῶν οὐρανῶν
  english_pob_choice: of heaven
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: BDAG
  rationale: Se conserva la expresión mateana distintiva «de los cielos», que no debe armonizarse automáticamente a «de Dios» en el texto principal.
theological_decisions:
- issue: La expresión distintiva «the kingdom of heaven»
  english_pob_reading: Retained as 'the kingdom of heaven' rather than paraphrasing as 'God's reign' or harmonizing to 'kingdom of God.'
  chosen_spanish_reading: Se mantiene «el reino de los cielos» y no se parafrasea como «el reinado de Dios» ni se armoniza con «reino de Dios».
  alternative_spanish_readings:
  - el reinado de Dios
  - el reino de Dios
  - el gobierno de los cielos
  rationale: Mateo usa una formulación propia que conviene preservar. «Reino» mantiene la amplitud semántica de reino/reinado y «de los cielos» respeta la redacción del evangelio sin imponer una armonización externa.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Aspecto de Ἤγγικεν
  english_pob_reading: 'Rendered with present-result perfect sense: ''has drawn near.'''
  chosen_spanish_reading: 'Se traduce con perfecto de resultado presente: «se ha acercado».'
  alternative_spanish_readings:
  - está cerca
  - ha venido cerca
  - se ha aproximado
  rationale: El perfecto griego comunica una cercanía ya inaugurada que permanece vigente. «Se ha acercado» preserva ese valor sin resolver más de lo que el verbo mismo afirma.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y toma en cuenta el audit trail inglés: se mantiene la estructura con participio + imperativo + participio + cita directa, y se conserva el matiz perfectivo de Ἤγγικεν sin reducirlo a una simple cercanía estática. También se respeta la expresión mateana «reino de los cielos» como formulación distintiva.'
  spanish_consistency_notes:
  - Se usa «proclamen» para κηρύσσετε, en línea con el valor de anuncio público y autorizado.
  - Se usa «los cielos» en plural, coherente con la expresión mateana y con la terminología del proyecto.
  - La cita se introduce con «diciendo», siguiendo la relación entre λέγοντες y el contenido del mensaje.
  - Se evita «SEÑOR» o «reino de Dios» en el texto principal para no ocultar la formulación específica del evangelio.
