revisions:
- from: 'Y mientras vayan[a], proclamen, diciendo: «El reino de los cielos se ha acercado[b]».'
  to: 'Y mientras van[a], proclamen, diciendo: «El reino de los cielos[c] se ha acercado[b]».'
  rationale: Se ajusta «mientras vayan» a «mientras van» para un español más natural sin perder el valor temporal del participio. Se corrige la nota lexical de Ἤγγικεν eliminando la alternativa poco idiomática «ha llegado cerca». Además, se restituye la nota de referencia cruzada sobre la expresión mateana «reino de los cielos», presente en el expediente inglés.
