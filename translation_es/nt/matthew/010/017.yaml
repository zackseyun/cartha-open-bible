review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del griego: advertencia contra opositores humanos, entrega a cuerpos judiciales y azotes en sinagogas. Sin embargo, «estén atentos a las personas» no expresa bien la construcción προσέχετε ἀπὸ, que aquí significa ''cuídense de / tengan cuidado con'', no simplemente ''presten atención a''. Además, «consejos» suena poco natural y potencialmente ambiguo en español para συνέδρια en este contexto judicial; «consejos locales» o «tribunales» comunica mejor la referencia institucional.'
  spanish_quality_summary: El español es comprensible, pero la frase inicial resulta poco idiomática y puede malinterpretarse como una exhortación a prestar atención a las personas en vez de guardarse de ellas. El conjunto mejora con una advertencia más natural en español bíblico contemporáneo. El resto del verso es claro y digno.
  glossary_alignment: No hay conflicto con términos doctrinales mayores del glosario. La decisión genérica para ἀνθρώπων debe mantenerse en español sin masculino exclusivo; «la gente» o «las personas» sirven, pero la preposición debe reflejar peligro procedente de ellos. «Sinagogas» y «azotarán» están bien alineados. Para συνέδρια, «consejos» no es el mejor equivalente eclesial/judicial en español; «consejos locales» preserva mejor el matiz sin tecnicismo excesivo.
  issues:
  - severity: high
    issue: «estén atentos a las personas» no refleja adecuadamente προσέχετε ἀπὸ τῶν ἀνθρώπων
    rationale: 'En este contexto προσέχω con ἀπό expresa advertencia frente a una fuente de peligro: ''cuídense de'', ''guárdense de'', no ''estén atentos a''. La redacción actual puede entenderse como atención positiva o neutral hacia las personas.'
  - severity: medium
    issue: La nota al pie anclada en «a[a]» ya no ayuda a resolver el problema principal de la preposición
    rationale: El contraste relevante no es solo «personas» frente a «hombres», sino también la relación marcada por ἀπό. Conviene reformular texto y nota para que la traducción principal sea natural y fiel.
  - severity: medium
    issue: «consejos» es una opción poco natural para συνέδρια en contexto judicial
    rationale: Aunque semánticamente posible, en español general «consejo» se asocia primero con asesoramiento, no con un cuerpo judicial. Añadir «locales» mejora la referencia institucional sin imponer 'Sanedrín'.
  revised_spanish_text: Pero cuídense de la gente[a], porque los entregarán a consejos locales, y en sus sinagogas los azotarán.
  revised_footnotes:
  - marker: a
    text: O «de las personas»; el griego usa un plural masculino, pero aquí se refiere genéricamente a seres humanos, no específicamente a varones.
    reason: lexical_alternative
