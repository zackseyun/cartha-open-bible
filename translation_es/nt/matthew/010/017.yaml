revisions:
- from: Pero estén atentos a[a] las personas, porque los entregarán a consejos, y en sus sinagogas los azotarán.
  to: Pero cuídense de la gente[a], porque los entregarán a consejos locales, y en sus sinagogas los azotarán.
  rationale: Se reemplaza «estén atentos a» por «cuídense de» para reflejar con fidelidad la advertencia de προσέχετε ἀπό. Se cambia «las personas» por «la gente» para lograr un español más natural en esta construcción, manteniendo el sentido genérico documentado por el POB inglés. Se ajusta «consejos» a «consejos locales» para que συνέδρια suene más institucional y menos ambiguo en español, sin sobredeterminarlo como un término técnico específico.
