translation:
  language: es
  text: Pero cuídense de la gente[a], porque los entregarán a consejos locales, y en sus sinagogas los azotarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las personas»; el griego usa un plural masculino, pero aquí se refiere genéricamente a seres humanos, no específicamente a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέχετε
  english_pob_choice: beware
  chosen_spanish: estén atentos
  alternatives_spanish:
  - cuídense
  - estén en guardia
  - tengan cuidado
  lexicon: BDAG
  rationale: El imperativo plural expresa advertencia y vigilancia ante peligro. «Estén atentos» comunica esa alerta con naturalidad en español y conserva el tono exhortativo de precaución sin sonar tan coloquial como «tengan cuidado».
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce una transición adversativa suave desde el envío anterior al anuncio de persecución. «Pero» refleja bien ese giro contextual en español.
- source_word: ἀπὸ τῶν ἀνθρώπων
  english_pob_choice: of people
  chosen_spanish: a[a] las personas
  alternatives_spanish:
  - de las personas
  - de los hombres
  - de la gente
  lexicon: BDAG
  rationale: 'Con προσέχω, ἀπό marca la fuente del peligro: «estar atentos a». ἄνθρωποι aquí es genérico y no masculino específico; por eso se traduce «las personas» para evitar un sentido varonil no requerido por el griego.'
- source_word: παραδώσουσιν
  english_pob_choice: will hand ... over
  chosen_spanish: los entregarán
  alternatives_spanish:
  - los pondrán en manos de
  - los pasarán a
  - los traicionarán
  lexicon: BDAG
  rationale: El verbo puede denotar entregar a autoridades o a un tribunal. «Entregar» conserva esa fuerza jurídica y resulta natural en español. «Traicionar» sería demasiado específico y añadiría una intención relacional no explícita aquí.
- source_word: συνέδρια
  english_pob_choice: councils
  chosen_spanish: consejos
  alternatives_spanish:
  - tribunales
  - consejos judiciales
  - sanedrines
  lexicon: BDAG
  rationale: El plural se refiere a cuerpos locales de juicio o gobierno, no necesariamente al Sanedrín de Jerusalén. «Consejos» preserva la referencia institucional sin imponer un término técnico más estrecho.
- source_word: συναγωγαῖς
  english_pob_choice: synagogues
  chosen_spanish: sinagogas
  alternatives_spanish:
  - casas de reunión
  - asambleas
  lexicon: BDAG
  rationale: El término designa concretamente el ámbito judío de reunión y disciplina. «Sinagogas» es el equivalente transparente y estándar en español.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  - propias
  lexicon: BDAG
  rationale: 'El pronombre genitivo modifica naturalmente a «sinagogas» como posesión o asociación: «sus sinagogas».'
- source_word: μαστιγώσουσιν
  english_pob_choice: will flog
  chosen_spanish: los azotarán
  alternatives_spanish:
  - los flagelarán
  - los golpearán con látigos
  - los castigarán a latigazos
  lexicon: BDAG
  rationale: μαστιγόω denota castigo corporal mediante látigo o azote. «Azotar» es claro, serio y ampliamente inteligible en español bíblico contemporáneo; evita tanto la rareza de «flagelar» como la imprecisión de «golpear».
theological_decisions:
- issue: Valor genérico de ἀνθρώπων
  english_pob_reading: people
  chosen_spanish_reading: las personas
  alternative_spanish_readings:
  - los hombres
  - la gente
  rationale: 'El griego usa masculino plural gramatical, pero el referente es genérico: los persecutores en cuanto seres humanos, no específicamente varones. «Las personas» mantiene la referencia amplia y evita introducir un sesgo masculino no presente en el sentido.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El pasaje coincide en sentido y estructura con el texto fuente y con la auditoría inglesa: advertencia, entrega a consejos, y castigo en sinagogas. No se registran revisiones posteriores que alteren la decisión de traducción.'
  spanish_consistency_notes:
  - Se mantuvo «sinagogas» como transliteración estable y transparente.
  - Se prefirió «azotar» por su correspondencia directa con μαστιγόω y por su uso bíblico comprensible.
  - Se evitó «SEÑOR» u այլ equivalentes irrelevantes porque el verso no contiene el nombre divino ni κύριος.
  - La nota de género se conserva mediante una nota al pie para reflejar la ambigüedad gramatical del griego sin perder claridad en español.
