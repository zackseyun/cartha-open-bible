translation:
  language: es
  text: Simón el Cananeo[a], y Judas Iscariote, el que también lo traicionó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Simón el Zelote». El griego aquí dice «Cananeo», probablemente reflejando una designación aramea o hebrea entendida tradicionalmente como «zelote».
    reason: lexical_alternative
  - marker: b
    text: O «el que también lo entregó». El verbo griego puede significar «entregar», aunque en el caso de Judas el contexto narrativo da el sentido de traición.
    reason: alternative_reading
lexical_decisions:
- source_word: Καναναῖος
  english_pob_choice: Cananaean
  chosen_spanish: el Cananeo
  alternatives_spanish:
  - el Zelote
  lexicon: BDAG
  rationale: Se conserva el etnónimo transliterado en sentido amplio como 'Cananeo', siguiendo la forma griega Καναναῖος y evitando sustituirla por una interpretación explicativa en el texto principal. 'Zelote' queda como alternativa reconocida por la tradición y por la nota inglesa, pero no se impone en el cuerpo porque el griego no usa aquí ζηλωτής.
- source_word: Ἰσκαριώτης
  english_pob_choice: Iscariot
  chosen_spanish: Iscariote
  alternatives_spanish:
  - Iscariote (sin cambios)
  lexicon: BDAG
  rationale: Se translitera el epíteto propio como nombre tradicional en español. No se traduce porque funciona como designación personal fija, no como término común con sentido léxico productivo.
- source_word: παραδοὺς
  english_pob_choice: betrayed
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo traicionó
  - lo entregó en traición
  lexicon: BDAG
  rationale: El verbo παραδίδωμι es más amplio que 'traicionar', y en español 'entregó' mantiene mejor la base léxica de 'entregar/poner en manos de otro'. En el contexto narrativo de Judas, la relación con la traición queda sugerida por el marco inmediato sin forzar una paráfrasis interpretativa en el texto principal.
- source_word: ὁ καὶ παραδοὺς αὐτόν
  english_pob_choice: who also betrayed him
  chosen_spanish: el que también lo entregó
  alternatives_spanish:
  - el que también lo traicionó
  - el que también lo puso en manos de otros
  lexicon: BDAG
  rationale: La construcción articular participial se vierte con una relativa natural en español. Se conserva 'también' para reflejar καί, y 'lo entregó' preserva la amplitud semántica del participio sin borrar la tensión entre 'entregar' y 'traicionar' documentada en el audio de POB.
theological_decisions:
- issue: Si traducir el participio de Judas con lenguaje moralmente cargado ('traicionó') o con el verbo más amplio ('entregó')
  english_pob_reading: betrayed, with 'handed over' preserved as the broader alternative
  chosen_spanish_reading: lo entregó, con la lectura alternativa de 'lo traicionó' reconocida implícitamente por el contexto
  alternative_spanish_readings:
  - lo traicionó
  - lo puso en manos de otros
  rationale: En español, 'entregó' reproduce mejor la amplitud de παραδίδωμι y evita resolver del todo la tensión léxica. El contexto de Judas permite percibir la traición sin que la traducción la imponga como glosa única; así se mantiene la transparencia del texto y la cautela del audit trail inglés.
  doctrine_reference: Principio POB de preservar la tensión léxica y no cerrar prematuramente el alcance del verbo
- issue: Si identificar a Σίμων ὁ Καναναῖος con una denominación interpretativa ('Zelote') en el texto principal
  english_pob_reading: Cananaean, with 'Zealot' preserved in a footnote
  chosen_spanish_reading: el Cananeo, con 'el Zelote' preservado como alternativa en nota
  alternative_spanish_readings:
  - el Zelote
  - el Cananeo
  rationale: El texto griego presenta Καναναῖος, no ζῆλωτής. Por eso el cuerpo principal conserva la forma más cercana al griego, mientras la alternativa tradicional se deja disponible como nota para no perder inteligibilidad e historia interpretativa.
  doctrine_reference: Transparencia textual y prioridad de la forma griega sobre la glosa tradicional
translation_notes:
  revision_awareness: 'Sin cambios respecto al último pase revisado; se mantiene la alta concordancia con el análisis previo y la solución española conserva las dos tensiones documentadas: Καναναῖος frente a la glosa tradicional ''Zelote'', y παραδοὺς como ''entregó'' con la lectura alternativa de traición en nota.'
  spanish_consistency_notes:
  - Se usa 'lo' para αὐτόν conforme al complemento directo masculino singular.
  - Se mantiene el paralelismo de la lista nominal con una relativa breve y natural en español.
  - No se introduce 'Cristo', 'Señor' ni otros términos no presentes en el verso.
  - La capitalización sigue el uso español habitual para nombres propios y gentilicios/adjetivos etnónimos en contexto de título personal.
