revisions:
- from: Simón el Cananeo[a], y Judas Iscariote[b], el que también lo entregó.
  to: Simón el Cananeo[a], y Judas Iscariote, el que también lo traicionó[b].
  rationale: 'Se revisa para seguir la decisión léxica documentada del POB inglés: mantener en el texto principal la identificación contextual de Judas como el que «lo traicionó», conservando «lo entregó» como alternativa en nota. También se ajusta la nota b para alinearla mejor con la alternativa inglesa y con la transparencia léxica del griego παραδίδωμι. Se elimina la nota en «Iscariote» porque la nota alternativa correspondiente en el audit trail trata del verbo de traición/entrega, no del epíteto «Iscariote».'
