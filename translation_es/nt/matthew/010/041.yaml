translation:
  language: es
  text: El que recibe a un profeta en nombre de un profeta[a] recibirá la recompensa de un profeta, y el que recibe a un justo en nombre de un justo[b] recibirá la recompensa de un justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque es profeta» o «como profeta». El griego literalmente dice «en nombre de un profeta».
    reason: lexical_alternative
  - marker: b
    text: O «porque es justo» o «como justo». El griego literalmente dice «en nombre de un justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δεχόμενος
  english_pob_choice: the one who receives
  chosen_spanish: el que recibe
  alternatives_spanish:
  - quien recibe
  - el que acoge
  lexicon: BDAG
  rationale: El participio articular griego funciona como sustantivo general. En español, «el que recibe» conserva esa referencia general y la estructura del original sin volver la frase más interpretativa de lo necesario.
- source_word: προφήτην
  english_pob_choice: a prophet
  chosen_spanish: a un profeta
  alternatives_spanish:
  - un profeta
  lexicon: BDAG
  rationale: Es el objeto directo simple del verbo. «Profeta» es la equivalencia natural y fiel al oficio bíblico indicado por el griego.
- source_word: εἰς ὄνομα προφήτου
  english_pob_choice: in the name of a prophet
  chosen_spanish: en nombre de profeta
  alternatives_spanish:
  - porque es profeta
  - como profeta
  lexicon: BDAG
  rationale: La expresión griega es idiomática y puede indicar recepción en atención a la identidad/condición del profeta. Se conserva la forma más literal en español para no borrar la tensión semántica, y se explicita la alternativa de sentido en nota.
- source_word: μισθὸν προφήτου
  english_pob_choice: a prophet’s reward
  chosen_spanish: recompensa de profeta
  alternatives_spanish:
  - recompensa del profeta
  - recompensa propia de un profeta
  lexicon: BDAG
  rationale: El genitivo puede entenderse como recompensa asociada al profeta. «Recompensa de profeta» mantiene la relación genitival y su posible ambigüedad sin imponer una paráfrasis más cerrada.
- source_word: λήμψεται
  english_pob_choice: will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - obtendrá
  - va a recibir
  lexicon: BDAG
  rationale: El futuro medio se expresa de manera natural con «recibirá». Mantiene el registro digno y la fuerza de promesa del verbo griego.
- source_word: δίκαιον
  english_pob_choice: a righteous man
  chosen_spanish: a un justo
  alternatives_spanish:
  - a un hombre justo
  - a una persona justa
  lexicon: BDAG
  rationale: El adjetivo está usado sustantivamente. «Justo» es una equivalencia breve y fiel en español bíblico; evita sobrecargar el texto y mantiene la correspondencia con la forma masculina del griego.
- source_word: εἰς ὄνομα δικαίου
  english_pob_choice: in the name of a righteous man
  chosen_spanish: en nombre de justo
  alternatives_spanish:
  - porque es justo
  - como justo
  lexicon: BDAG
  rationale: Se conserva la misma solución literal que en la primera cláusula para preservar el paralelismo. La alternativa de sentido se explica en nota, ya que el giro puede sonar opaco si se lee de modo estrictamente español.
- source_word: μισθὸν δικαίου
  english_pob_choice: a righteous man’s reward
  chosen_spanish: recompensa de justo
  alternatives_spanish:
  - recompensa del justo
  - recompensa propia de un justo
  lexicon: BDAG
  rationale: Se replica la estructura de la primera mitad del versículo para respetar el paralelismo y la posible ambigüedad del genitivo.
theological_decisions:
- issue: Sentido de la locución εἰς ὄνομα + genitivo
  english_pob_reading: Retain the literal 'in the name of' in the main text while acknowledging the sense 'because he is' / 'as' in a footnote.
  chosen_spanish_reading: Mantener «en nombre de» en el texto principal y explicar que el sentido puede ser «porque es» o «como».
  alternative_spanish_readings:
  - porque es un profeta / un justo
  - como profeta / como justo
  rationale: La frase no es solo decorativa; expresa la base o el motivo de la acogida. Traducirla únicamente de forma dinámica apagaría la resonancia de la repetición y la conexión con otros usos de «en nombre de» en el Nuevo Testamento. Por eso se preserva la forma y se aclara el sentido posible en nota.
  doctrine_reference: Translation philosophy §3, §6
- issue: Tratamiento de δίκαιος en masculino singular
  english_pob_reading: Use 'righteous man' rather than gender-neutral 'righteous person.'
  chosen_spanish_reading: Usar «justo» con valor masculino sustantivado, no «persona justa».
  alternative_spanish_readings:
  - persona justa
  - hombre justo
  rationale: El griego es masculino singular y el proyecto prefiere reflejar esa forma cuando el contexto no exige neutralización. En español, «justo» comunica bien la cualidad y conserva la concisión del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios en la auditoría inglesa y el veredicto fue de alto acuerdo.'
  spanish_consistency_notes:
  - Se mantuvo la misma solución literal «en nombre de» en ambas cláusulas para conservar el paralelismo.
  - Se eligió «justo» para δίκαιος, coherente con el valor masculino sustantivado del griego y con el estilo bíblico actual en español.
  - Se evitó traducir «μισθός» como «salario» porque aquí el contexto es de recompensa/retribución y no de remuneración laboral.
