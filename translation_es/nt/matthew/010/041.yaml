  text: ὁ δεχόμενος προφήτην εἰς ὄνομα προφήτου μισθὸν προφήτου λήμψεται, καὶ ὁ δεχόμενος δίκαιον εἰς ὄνομα δικαίου μισθὸν δικαίου λήμψεται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/041.yaml
  text: The one who receives a prophet in the name of a prophet will receive a prophet’s reward[b][a], and the one who receives a righteous man in the name of a righteous man will receive a righteous man’s reward.
  footnotes:
