    text: Or 'because he is a prophet' or 'as a prophet.' The Greek literally says 'in the name of a prophet.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because he is a righteous man' or 'as a righteous man.' The Greek literally says 'in the name of a righteous man.'
