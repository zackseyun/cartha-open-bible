base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/029.yaml
  text: Are not two sparrows sold for an assarion? Yet not one of them will fall to the ground apart from your Father[a][b].
  footnotes:
  - marker: a
    text: Or 'without your Father'; the phrase may imply not apart from his knowledge, care, or will, but the Greek does not specify which.
    reason: alternative_reading
  - marker: b
    text: An assarion was a small Roman copper coin of very low value.
    reason: cultural_note
