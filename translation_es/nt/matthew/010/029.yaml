translation:
  language: es
  text: ¿No se venden dos gorriones por un asarión? Y ni uno de ellos caerá a tierra sin su Padre[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aparte de su Padre'; la frase puede implicar no sin su conocimiento, cuidado o voluntad, pero el griego no especifica cuál.
    reason: alternative_reading
  - marker: b
    text: Un asarión era una moneda romana de cobre muy pequeña y de escaso valor.
    reason: cultural_note
lexical_decisions:
- source_word: στρουθία
  english_pob_choice: sparrows
  chosen_spanish: gorrioncillos
  alternatives_spanish:
  - gorriones
  - avecillas
  lexicon: BDAG
  rationale: En este dicho, el referente natural en español es 'gorriones'. Elegí el diminutivo 'gorrioncillos' para reproducir el valor de μικρότητα/insignificancia que en contexto aporta στρουθία y mantener el tono de 'pequeñas aves' sin perder la identificación específica.
- source_word: ἀσσαρίου
  english_pob_choice: an assarion
  chosen_spanish: un asarión
  alternatives_spanish:
  - una moneda pequeña
  - un as
  - un cuadrante
  lexicon: BDAG
  rationale: Conservo el nombre de la moneda como préstamo transliterado para preservar la especificidad histórica del original, siguiendo el enfoque del inglés POB. El español puede entenderlo con una nota cultural.
- source_word: πωλεῖται
  english_pob_choice: are sold
  chosen_spanish: se venden
  alternatives_spanish:
  - son vendidos
  - se comercian
  lexicon: BDAG
  rationale: La pasiva en griego se expresa con naturalidad en español mediante la pasiva refleja 'se venden', que mantiene el sentido comercial sin rigidez.
- source_word: ἓν ἐξ αὐτῶν
  english_pob_choice: one of them
  chosen_spanish: ni uno de ellos
  alternatives_spanish:
  - uno de ellos
  - ninguno de ellos
  lexicon: BDAG
  rationale: El griego enfatiza que ni siquiera uno cae; por eso en español la negativa enfática 'ni uno de ellos' comunica mejor la fuerza del contraste que una simple referencia partitiva.
- source_word: πεσεῖται ἐπὶ τὴν γῆν
  english_pob_choice: will fall to the ground
  chosen_spanish: caerá a tierra
  alternatives_spanish:
  - caerá al suelo
  - caerá sobre la tierra
  lexicon: BDAG
  rationale: '''Caerá a tierra'' es una formulación natural y reverente en español, cercana al sentido de ἐπὶ τὴν γῆν. ''Al suelo'' sería más coloquial y menos bíblico.'
- source_word: ἄνευ τοῦ πατρὸς ὑμῶν
  english_pob_choice: apart from your Father
  chosen_spanish: aparte de vuestro Padre
  alternatives_spanish:
  - sin vuestro Padre
  - sin la voluntad de vuestro Padre
  - sin el conocimiento de vuestro Padre
  lexicon: BDAG
  rationale: '''Aparte de'' conserva la ambigüedad de ἄνευ sin especificar si la relación implica conocimiento, permiso, voluntad o cuidado. ''Vuestro Padre'' mantiene el pronombre plural de segunda persona y el tono bíblico del pasaje.'
- source_word: οὐχὶ ... ;
  english_pob_choice: Are not ... ?
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es verdad que ...?
  lexicon: BDAG
  rationale: La pregunta retórica espera respuesta afirmativa; en español, '¿No ...?' transmite esa fuerza de forma directa y idiomática.
- source_word: καὶ
  english_pob_choice: Yet
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: BDAG
  rationale: Aunque el inglés explicita un matiz adversativo con 'Yet', el griego conserva καί. En español, la coordinación simple 'Y' mantiene la continuidad del dicho y deja que el contraste surja del contenido; no se fuerza una adversativa que el texto no exige.
theological_decisions:
- issue: La relación del Padre con la caída del ave y la providencia divina
  english_pob_reading: The translation preserves the phrase's ambiguity as 'apart from your Father' rather than specifying 'without the knowledge/will of your Father.'
  chosen_spanish_reading: La traducción preserva la ambigüedad como 'aparte de vuestro Padre', sin precisar 'sin el conocimiento' o 'sin la voluntad' de vuestro Padre.
  alternative_spanish_readings:
  - sin el conocimiento de vuestro Padre
  - sin la voluntad de vuestro Padre
  - sin la aprobación de vuestro Padre
  rationale: El griego ἄνευ τοῦ πατρὸς ὑμῶν afirma una dependencia real respecto del Padre, pero no define el modo exacto de esa relación. La versión española mantiene esa tensión para no estrechar indebidamente la afirmación providencial del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Sin cambios respecto al testimonio crítico y al tramo inglés auditado; se mantiene la misma estructura semántica y la misma ambigüedad interpretativa en la cláusula final.
  spanish_consistency_notes:
  - Se conserva 'Padre' con mayúscula por tratarse de una referencia divina.
  - Se usa 'asarión' como préstamo transliterado para mantener la referencia monetaria específica.
  - La pregunta inicial y la cláusula final reproducen el paralelismo y la fuerza retórica del griego sin añadir interpretación doctrinal no explicitada.
