translation:
  language: es
  text: En cualquier ciudad o aldea en que entren, averigüen[a] quién en ella es digno[b]; y quédense allí hasta que salgan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pregunten» o «investiguen» quién en ella es digno.
    reason: lexical_alternative
  - marker: b
    text: «Digno» aquí probablemente significa apto o receptivo para recibir a los mensajeros, no alguien que haya merecido el favor de Dios.
    reason: theological_note
lexical_decisions:
- source_word: εἰς ἣν δ’ ἂν
  english_pob_choice: Into whatever
  chosen_spanish: En cualquier
  alternatives_spanish:
  - En toda
  - En la ciudad o aldea que sea
  lexicon: BDAG
  rationale: La construcción griega introduce una relativa indefinida con matiz de dirección. En español, «En cualquier» comunica la indefinición de manera natural; se conserva el valor direccional con la frase completa «ciudad o aldea en que entren».
- source_word: πόλιν ἢ κώμην
  english_pob_choice: city or village
  chosen_spanish: ciudad o aldea
  alternatives_spanish:
  - ciudad o pueblo
  - población o aldea
  lexicon: BDAG
  rationale: πόλις y κώμη distinguen un asentamiento mayor y uno menor. «Ciudad o aldea» mantiene esa distinción de forma clara en español y sigue bien el uso más general del pasaje.
- source_word: εἰσέλθητε
  english_pob_choice: you enter
  chosen_spanish: entren
  alternatives_spanish:
  - entren en
  - entren ustedes
  lexicon: BDAG
  rationale: 'El subjuntivo aoristo en la relativa indefinida se expresa naturalmente en español con presente de subjuntivo: «entren». La preposición «en» al inicio ya expresa la dirección del movimiento.'
- source_word: ἐξετάσατε
  english_pob_choice: find out
  chosen_spanish: averigüen
  alternatives_spanish:
  - pregunten
  - investiguen
  lexicon: BDAG
  rationale: El verbo pide una indagación cuidadosa. «Averigüen» conserva ese sentido y es más natural que un calco como «inquieran»; «investiguen» sería posible, pero suena algo más técnico.
- source_word: τίς ἐν αὐτῇ
  english_pob_choice: who in it
  chosen_spanish: quién en ella
  alternatives_spanish:
  - quién allí
  - quién dentro de ella
  lexicon: BDAG
  rationale: «Quién en ella» sigue de cerca el griego y mantiene el referente en la ciudad o aldea mencionada.
- source_word: ἄξιός ἐστιν
  english_pob_choice: is worthy
  chosen_spanish: es digno
  alternatives_spanish:
  - es apto
  - es adecuado
  lexicon: BDAG
  rationale: «Digno» es la correspondencia natural de ἄξιος y conserva la evaluación moral/relacional del término. En este contexto, la dignidad se entiende como idoneidad para recibir a los mensajeros, no como mérito ante Dios.
- source_word: κἀκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - y allí
  - en ese lugar
  lexicon: BDAG
  rationale: Aunque κἀκεῖ incluye un matiz de «y allí», en español el valor locativo queda bien expresado con «allí» y la conexión lógica la da la coordinación de la frase.
- source_word: μείνατε
  english_pob_choice: stay
  chosen_spanish: quédense
  alternatives_spanish:
  - permanezcan
  - alójense
  lexicon: BDAG
  rationale: El imperativo pide permanecer en la casa anfitriona. «Quédense» es natural y preciso; «permanezcan» es más formal, y «alójense» sería más específico de hospedaje.
- source_word: ἕως ἂν ἐξέλθητε
  english_pob_choice: until you leave
  chosen_spanish: hasta que salgan
  alternatives_spanish:
  - hasta que se vayan
  - hasta que partan
  lexicon: BDAG
  rationale: La construcción temporal con ἕως ἄν + subjuntivo se vierte con una cláusula final-temporal natural en español. «Hasta que salgan» mantiene el sentido de salida sin sobretraducir.
theological_decisions:
- issue: Sentido de ἄξιος / 'worthy' en la instrucción misionera
  english_pob_reading: '''Worthy'' here likely means fit or receptive to receive the messengers, not someone who has earned God''''s favor.'
  chosen_spanish_reading: '''Digno'' aquí se entiende como apto o receptivo para recibir a los mensajeros, no como alguien que haya merecido el favor de Dios.'
  alternative_spanish_readings:
  - '''Digno'' en un sentido moral general'
  - '''Adecuado'' para recibirlos'
  rationale: Se conserva el término principal «digno», pero se explicita su alcance contextual para no convertirlo en una afirmación doctrinal sobre mérito salvador. Así se preserva la tensión lexical del pasaje y la intención práctica de la instrucción.
  doctrine_reference: No importar al texto una doctrina de mérito; mantener la lectura contextual del mandato de hospitalidad y recepción.
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión: sin cambios sustantivos respecto del audit trail inglés; se mantiene la lectura óptima y la nota sobre ''worthy'' como idoneidad receptiva.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda en otros versículos; aquí no aplica.
  - Se mantuvo «digno» como equivalente principal de ἄξιος, con nota aclaratoria para evitar un sentido de mérito soteriológico.
  - La puntuación y el ritmo buscan lectura pública clara sin perder la estructura condicional e imperativa del griego.
  - No se añadió léxico eclesiástico tradicional donde el texto pide hospitalidad práctica.
