  to: Y no teman a los que matan el cuerpo y no pueden matar el alma. Más bien[a], teman al que puede destruir tanto el alma como el cuerpo en la Gehena.
  rationale: 'Se conserva la traducción base porque es fiel al griego y a la auditoría inglesa, pero se hace una reparación menor para mejorar fidelidad estilística y consistencia terminológica en español: se elimina «pero» en favor de una coordinación más tersa, se normaliza «Gehena», y se pule la nota al pie.'
