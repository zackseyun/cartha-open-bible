review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego y sigue de cerca la auditoría inglesa: mantiene el contraste repetido de φοβεῖσθε con «no teman / teman», conserva «cuerpo» y «alma», deja abierto el referente de τὸν δυνάμενον con «al que puede», y preserva γέεννα como término transliterado con nota alternativa. La estructura global y el peso teológico están bien transmitidos.'
  spanish_quality_summary: 'El español es claro y natural, pero hay un ajuste importante de puntuación/conector para mayor fidelidad y fluidez: «pero no pueden matar el alma» suena menos ajustado que una coordinación adversativa más limpia después de «cuerpo»; además, «Gehena» es comprensible, pero en español bíblico y culto «Gehena» suele alinearse mejor con la forma internacional y con la nota inglesa «Gehenna». Conviene también suavizar la nota a un español más natural: «se usa para referirse al lugar del juicio final».'
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. No aparece Yahvé, Mesías/Cristo, etc. La decisión «alma» para ψυχή y «Gehena» para γέεννα está bien encaminada y coincide con la racionalidad documentada. Se recomienda normalizar la transliteración a «Gehena» para mejor consistencia terminológica en español.
  issues:
  - severity: medium
    issue: Conector adversativo en la primera cláusula
    rationale: El griego contrasta directamente «matan el cuerpo» con «no pueden matar el alma». En español, «pero» funciona, pero «y no pueden matar el alma» o una pausa más simple reproduce mejor la relación y evita una leve aspereza estilística tras la coma.
  - severity: medium
    issue: Transliteración de γέεννα como «Gehena»
    rationale: Aunque no es incomprensible, «Gehena» es la forma más reconocible y extendida en español para representar Gehenna/γέεννα, y alinea mejor el texto y la nota con la auditoría inglesa y el trasfondo histórico.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: «usado para el lugar del juicio final» suena algo calcado. «usado para referirse al lugar del juicio final» o «que se usa para el lugar del juicio final» es más natural en español culto actual.
  revised_spanish_text: Y no teman a los que matan el cuerpo y no pueden matar el alma. Más bien[a], teman al que puede destruir tanto el alma como el cuerpo en la Gehena.
  revised_footnotes:
  - marker: a
    text: 'O: «en el infierno». Griego: «en la Gehena», término derivado del Valle de Hinnom y usado para referirse al lugar del juicio final.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva la traducción base porque es fiel al griego y a la auditoría inglesa, pero se hace una reparación menor para mejorar fidelidad estilística y consistencia terminológica en español: se elimina «pero» en favor de una coordinación más tersa, se normaliza «Gehena», y se pule la nota al pie.'
