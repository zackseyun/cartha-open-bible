translation:
  language: es
  text: Y no teman a los que matan el cuerpo y no pueden matar el alma. Más bien[a], teman al que puede destruir tanto el alma como el cuerpo en la Gehena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el infierno». Griego: «en la Gehena», término derivado del Valle de Hinnom y usado para referirse al lugar del juicio final.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβεῖσθε
  english_pob_choice: do not fear / fear
  chosen_spanish: teman / no teman
  alternatives_spanish:
  - tengan miedo de / no tengan miedo de
  - teman a
  lexicon: BDAG
  rationale: El imperativo se repite en contraste, así que conviene conservar el mismo verbo en ambas cláusulas. «Temer» es el equivalente más directo en español y mantiene la fuerza de la advertencia sin suavizarla con una paráfrasis.
- source_word: ἀπὸ τῶν ἀποκτεννόντων
  english_pob_choice: those who kill
  chosen_spanish: a los que matan
  alternatives_spanish:
  - a los que están matando
  - a los que dan muerte
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente. «A los que matan» es natural en español, conserva el sentido general y evita una lectura demasiado progresiva que no está exigida por el griego.
- source_word: τὸ σῶμα
  english_pob_choice: body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo físico
  lexicon: BDAG
  rationale: «Cuerpo» es la correspondencia directa y clara en español para σῶμα y conserva el contraste con «alma».
- source_word: τὴν ψυχὴν
  english_pob_choice: soul
  chosen_spanish: el alma
  alternatives_spanish:
  - la vida
  lexicon: BDAG
  rationale: En este contraste con «cuerpo», ψυχή se refiere al aspecto no corporal de la persona. «Alma» preserva mejor la distinción cuerpo/alma que «vida», que podría borrar esa oposición en español.
- source_word: μὴ δυναμένων ἀποκτεῖναι
  english_pob_choice: are not able to kill
  chosen_spanish: pero no pueden matar
  alternatives_spanish:
  - pero no son capaces de matar
  - pero no pueden dar muerte a
  lexicon: BDAG
  rationale: La construcción participial expresa incapacidad. «No pueden matar» comunica bien el sentido en español; se conserva el contraste semántico sin cargar la frase con una literalidad innecesaria.
- source_word: μᾶλλον
  english_pob_choice: rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - Antes bien
  - Más que eso
  lexicon: BDAG
  rationale: 'La partícula marca contraste correctivo: no esto, sino aquello. «Más bien» es idiomático en español y reproduce con claridad el giro argumentativo.'
- source_word: τὸν δυνάμενον
  english_pob_choice: the one who is able
  chosen_spanish: al que puede
  alternatives_spanish:
  - al que es capaz
  - al que tiene poder para
  lexicon: BDAG
  rationale: El participio sustantivado queda abierto en griego. «Al que puede» es natural en español y preserva esa indefinición sin identificar explícitamente al referente en el texto principal.
- source_word: καὶ ψυχὴν καὶ σῶμα
  english_pob_choice: both soul and body
  chosen_spanish: tanto el alma como el cuerpo
  alternatives_spanish:
  - el alma y el cuerpo
  - 'ambos: alma y cuerpo'
  lexicon: BDAG
  rationale: La correlación καὶ...καί se expresa de forma natural con «tanto...como...». Así se conserva la totalidad de la destrucción mencionada por el griego.
- source_word: ἀπολέσαι
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - hacer perecer
  - arruinar
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí expresa destrucción decisiva en contexto judicial. «Destruir» es la opción estándar y suficientemente fuerte en español.
- source_word: ἐν γεέννῃ
  english_pob_choice: in Gehenna
  chosen_spanish: en la Gehena
  alternatives_spanish:
  - en el Gehena
  - en el infierno
  lexicon: BDAG
  rationale: Se conserva el término técnico del griego como «Gehena» para respetar la primacía del idioma original y el trasfondo judío del término. «Infierno» queda como equivalente interpretativo posible, pero se evita en el texto principal para no fusionar el término con categorías posteriores.
theological_decisions:
- issue: Identidad de «el que puede destruir tanto el alma como el cuerpo en la Gehena»
  english_pob_reading: Rendered as 'the one' without explicit identification in the main text.
  chosen_spanish_reading: «al que puede» sin identificarlo explícitamente en el texto principal.
  alternative_spanish_readings:
  - Dios
  - el Padre
  - Satanás
  rationale: El griego no nombra el referente de manera explícita. Para preservar la tensión teológica y no introducir una identificación que exceda la forma del texto, el español mantiene una referencia abierta. La identificación queda para el contexto e interpretación, no para la línea principal de la traducción.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
- issue: Traducción de γέεννα
  english_pob_reading: Gehenna
  chosen_spanish_reading: Gehena
  alternative_spanish_readings:
  - infierno
  rationale: «Gehena» mantiene el término de origen y su trasfondo histórico-religioso. «Infierno» es una equivalencia interpretativa común, pero en la línea principal impondría una tradición conceptual más amplia que el término griego por sí solo.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El registro inglés auditado quedó sin cambios en la última revisión; el acuerdo de verificación fue alto y no hubo correcciones aplicadas. La versión española sigue esa misma decisión base, conservando la ambigüedad teológica del referente y la transliteración de γέεννα como Gehena.
  spanish_consistency_notes:
  - Se mantiene «alma» para ψυχή y «cuerpo» para σῶμα, preservando el contraste antropológico del versículo.
  - Se usa «teman» de forma paralela en ambos imperativos para reflejar la repetición de φοβεῖσθε.
  - «Gehena» se reserva para el texto principal, con la equivalencia «infierno» solo en nota.
  - La frase «tanto el alma como el cuerpo» conserva la coordinación distributiva de καὶ...καί.
  - El referente de «al que puede» queda deliberadamente indefinido, conforme al tratamiento auditado en inglés.
