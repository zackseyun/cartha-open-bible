review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: recepción de los mensajeros, no escuchar sus palabras, salir de la casa o ciudad, y el gesto simbólico de sacudir el polvo. También preserva correctamente la decisión teológica de mantener el gesto concreto sin glosa en el texto principal. Sin embargo, hay un problema de fidelidad formal en el imperativo español: «sacúdanse el polvo de sus pies» en español normalmente significa que los destinatarios se sacuden a sí mismos, mientras que el griego ἐκτινάξατε τὸν κονιορτὸν τῶν ποδῶν ὑμῶν expresa quitar/sacudir el polvo de sus pies. Conviene explicitar la separación con «sacudan de sus pies el polvo» o equivalente.'
  spanish_quality_summary: El español es claro y de registro digno. No obstante, «cualquiera que no» suena menos natural aquí que «quien no» o «todo el que no», y la combinación «al salir de aquella casa o de aquella ciudad» funciona bien. La mejora principal es idiomática y semántica en el mandato final, para evitar la lectura reflexiva impropia de «sacúdanse».
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. Las decisiones «reciba», «escuche sus palabras» y «polvo» están bien alineadas con el audit trail. La nota cultural también preserva adecuadamente la rationale inglesa. La nota alternativa sobre «ciudad» es válida, aunque «poblado» o «pueblo» también serían posibles; no es necesario cambiarla.
  issues:
  - severity: medium
    issue: Imperativo reflexivo potencialmente equívoco en «sacúdanse el polvo de sus pies»
    rationale: El verbo griego manda sacudir/quitar el polvo de los pies, no 'sacudirse' a sí mismos. En español, la forma pronominal introduce una ambigüedad o lectura menos natural. «Sacudan de sus pies el polvo» refleja mejor la relación semántica.
  - severity: low
    issue: «Cualquiera que no» suena algo menos natural en contexto bíblico corrido
    rationale: Aunque no es incorrecto, «quien no» o «todo el que no» fluye mejor en español bíblico contemporáneo y preserva igual el valor genérico de ὃς ἂν μὴ.
  revised_spanish_text: Y quien no los reciba ni escuche sus palabras[a], al salir de aquella casa o de aquella ciudad[c][b], sacudan de sus pies el polvo.
  revised_footnotes:
