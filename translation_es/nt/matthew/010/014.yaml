  text: καὶ ὃς ⸀ἂν μὴ δέξηται ὑμᾶς μηδὲ ἀκούσῃ τοὺς λόγους ὑμῶν, ἐξερχόμενοι ⸀ἔξω τῆς οἰκίας ἢ τῆς πόλεως ἐκείνης ἐκτινάξατε τὸν κονιορτὸν τῶν ποδῶν ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/010/014.yaml
  text: And whoever does not receive you or listen to your words[a], as you go out of that house or that town[c][b], shake off the dust from your feet.
  footnotes:
