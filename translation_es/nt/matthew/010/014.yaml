translation:
  language: es
  text: Y quien no los reciba ni escuche sus palabras[a], al salir de aquella casa o de aquella ciudad[c][b], sacudan de sus pies el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien no los reciba ni oiga sus palabras».
    reason: alternative_reading
  - marker: b
    text: «Sacudir el polvo de los pies» era un acto simbólico de disociación y juicio contra quienes rechazaban el mensaje.
    reason: cultural_note
  - marker: c
    text: O «de aquella casa o de aquella ciudad».
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς ἂν μὴ
  english_pob_choice: whoever does not
  chosen_spanish: cualquiera que no
  alternatives_spanish:
  - quien no
  - todo el que no
  lexicon: BDAG
  rationale: La construcción relativa con ἄν tiene valor indefinido/genericizante. En español, «cualquiera que no» reproduce bien ese alcance y suena natural en un registro bíblico contemporáneo.
- source_word: δέξηται ὑμᾶς
  english_pob_choice: receive you
  chosen_spanish: los reciba
  alternatives_spanish:
  - los acoja
  - los acepte
  lexicon: BDAG
  rationale: δέχομαι aquí implica recibir favorablemente a los mensajeros. «Reciba» conserva amplitud semántica y evita reducir el matiz solo a hospitalidad o solo a aceptación intelectual.
- source_word: μηδὲ ἀκούσῃ τοὺς λόγους ὑμῶν
  english_pob_choice: or listen to your words
  chosen_spanish: ni escuche sus palabras
  alternatives_spanish:
  - ni oiga sus palabras
  - ni preste oído a sus palabras
  lexicon: BDAG
  rationale: ἀκούω puede significar oír o escuchar atenta y receptivamente. «Escuche» es idiomático en español y mantiene el sentido de recepción del mensaje; «sus palabras» conserva λόγοι sin sobreparafrasear.
- source_word: ἐξερχόμενοι ἔξω
  english_pob_choice: as you go out
  chosen_spanish: al salir
  alternatives_spanish:
  - cuando salgan
  - mientras salen
  lexicon: BDAG
  rationale: El participio indica circunstancia concomitante con la acción principal. «Al salir» es breve y natural, y conserva la idea de movimiento fuera del lugar.
- source_word: τῆς οἰκίας ἢ τῆς πόλεως ἐκείνης
  english_pob_choice: that house or that town
  chosen_spanish: de aquella casa o de aquella ciudad
  alternatives_spanish:
  - de aquella casa o de aquel pueblo
  - de esa casa o de esa ciudad
  lexicon: BDAG
  rationale: El demostrativo ἐκείνης apunta a un lugar específico ya aludido. «Aquella» preserva esa distancia demostrativa; «ciudad» refleja πόλις de manera más amplia y formal, aunque «pueblo» seguiría siendo una alternativa contextual posible.
- source_word: ἐκτινάξατε
  english_pob_choice: shake off
  chosen_spanish: sacúdanse
  alternatives_spanish:
  - sacudan
  - sacudan el polvo
  lexicon: BDAG
  rationale: El verbo expresa una acción enérgica y simbólica de desprender el polvo. En español, «sacúdanse» transmite mejor el gesto físico; se mantiene el imperativo plural con valor de instrucción a los enviados.
- source_word: τὸν κονιορτὸν
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo fino
  - el polvo del camino
  lexicon: BDAG
  rationale: κονιορτός designa polvo, no suciedad genérica. «El polvo» conserva la imagen concreta sin introducir explicación interpretativa en el cuerpo del versículo.
- source_word: τῶν ποδῶν ὑμῶν
  english_pob_choice: from your feet
  chosen_spanish: de sus pies
  alternatives_spanish:
  - de sus pies,
  - de sus pies mismos
  lexicon: BDAG
  rationale: La imagen apunta al polvo adherido a los pies al salir del lugar. En español, «de sus pies» expresa la relación de separación sin forzar una preposición que suene artificial.
theological_decisions:
- issue: Acto simbólico de juicio o disociación sin añadir interpretación explícita al texto principal
  english_pob_reading: Retain the concrete command 'shake off the dust from your feet' without paraphrasing its meaning in the main text.
  chosen_spanish_reading: Mantener el mandato concreto «sacúdanse el polvo de sus pies» sin insertar una glosa interpretativa en el cuerpo del versículo.
  alternative_spanish_readings:
  - «como testimonio contra ellos, sacúdanse... »
  - «al dejarles, declaren juicio sacudiendo...»
  rationale: El versículo presenta el gesto simbólico, pero no desarrolla aquí su interpretación. La traducción conserva la tensión textual y evita importar explicaciones de pasajes paralelos al texto principal.
  doctrine_reference: Mateo 10:14; paralelos sinópticos y filosofía de traducción del POB sobre no fusionar glosa con texto
- issue: Pronombre y destinatarios del mandato en segunda persona plural
  english_pob_reading: you / your feet
  chosen_spanish_reading: los ... sus pies
  alternative_spanish_readings:
  - vosotros ... vuestros pies
  - ustedes ... sus pies
  rationale: El español neutral de amplio uso eclesial favorece el plural de cortesía/contemporáneo «ustedes», que en el imperativo se refleja mejor con formas de tercera persona plural. Esto evita regionalismos marcados y conserva la dirección colectiva a los discípulos.
  doctrine_reference: Norma de estilo del español neutral latinoamericano
translation_notes:
  revision_awareness: La redacción inglesa más reciente sustituyó «if anyone» por «whoever» para reflejar más directamente ὃς ἂν, y «leave» por «go out of» para ajustarse mejor a ἐξερχόμενοι. La versión española sigue ese ajuste con «cualquiera que no» y «al salir», y mantiene el gesto concreto sin añadir interpretación en el texto principal.
  spanish_consistency_notes:
  - Se usa «cualquiera que no» para reflejar la fuerza indefinida de ὃς ἂν.
  - Se prefiere «reciba» y «escuche» por su amplitud semántica y registro bíblico natural.
  - «Aquella casa o de aquella ciudad» conserva el demostrativo específico de ἐκείνης.
  - La forma verbal «sacúdanse» se usa para transmitir el imperativo plural; en una publicación final puede revisarse la concordancia estilística global si el proyecto opta por «sacudan» en otros pasajes, pero aquí se mantiene por claridad del mandato.
