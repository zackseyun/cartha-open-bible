    text: Or 'whoever does not receive you or hear your words.'
    reason: lexical_alternative
  - marker: b
    text: '''Shake off the dust from your feet'' was a symbolic act of dissociation and judgment against those who rejected the message.'
    reason: cultural_note
  - marker: c
    text: Or 'that house or that city.'
    reason: lexical_alternative
