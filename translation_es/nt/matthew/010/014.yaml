    text: O «quien no los reciba ni oiga sus palabras».
    reason: alternative_reading
  - marker: b
    text: «Sacudir el polvo de los pies» era un acto simbólico de disociación y juicio contra quienes rechazaban el mensaje.
    reason: cultural_note
  - marker: c
    text: O «de aquella casa o de aquella ciudad».
    reason: alternative_reading
  revision_rationale: Se ajustó «cualquiera que no» a «quien no» para mayor naturalidad, y se corrigió el mandato final a «sacudan de sus pies el polvo» para reflejar con más precisión el sentido no reflexivo de ἐκτινάξατε ... τῶν ποδῶν ὑμῶν. Se mantuvieron las notas y el sentido general del borrador.
