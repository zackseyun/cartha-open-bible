  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia de imperativos y preserva el sentido básico del griego: sanar a los enfermos, resucitar a los muertos, limpiar a los leprosos y expulsar demonios, seguido del paralelismo sobre dar gratuitamente. Sin embargo, el anclaje de la nota [a] está puesto en «enfermos», cuando la nota del rastro POB y la evidencia léxica corresponde a λεπρούς («leprosos»), no a ἀσθενοῦντας («enfermos»).'
  spanish_quality_summary: El español es claro, natural y de registro bíblico contemporáneo. «Sanen», «resuciten», «expulsen» y «Gratis recibieron; gratis den» son fluidos. No obstante, para reflejar mejor καθαρίζετε con su matiz físico/ritual, «limpien» resulta algo débil o extraño con personas; «purifiquen» suena más preciso, pero «limpien» sigue siendo entendible. El problema principal que exige revisión es la colocación incorrecta de la nota al pie.
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé/Mesías. «Demonios» concuerda con el proyecto. La decisión «leprosos» con nota cultural es coherente con el rastro inglés, pero la nota debe anclarse en «leprosos[a]».
  issues:
  - severity: high
    issue: La nota [a] está anclada a «enfermos» en lugar de «leprosos».
    rationale: La nota explica la amplitud semántica de λεπρούς y en el POB inglés está asociada a «lepers», no a «the sick». Tal como está, induce al lector a pensar que la aclaración trata de «enfermos», lo cual desalinearía fuente, nota y decisión léxica.
  - severity: low
    issue: «Limpien a los leprosos» es comprensible, pero puede sonar menos natural en español que una formulación que preserve mejor el matiz de καθαρίζετε.
    rationale: καθαρίζω en este contexto tiene fuerza de dejar limpio/puro, no solo de asear. Aunque «limpien» es defendible, «purifiquen» o «dejen limpios» pueden reflejar mejor el valor físico-ritual. No es un error obligatorio, pero conviene mejorarlo.
  revised_spanish_text: Sanen a los enfermos, resuciten a los muertos, purifiquen a los leprosos[a], expulsen a los demonios. Gratis recibieron; gratis den.
