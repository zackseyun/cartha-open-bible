translation:
  language: es
  text: Sanen a los enfermos, resuciten a los muertos, purifiquen a los leprosos[a], expulsen a los demonios. Gratis recibieron; gratis den.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «personas con una enfermedad de la piel». El término tradicionalmente traducido «leprosos» puede referirse en el uso bíblico más ampliamente a afecciones cutáneas graves, no solo a la lepra moderna.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀσθενοῦντας
  english_pob_choice: the sick
  chosen_spanish: los enfermos
  alternatives_spanish:
  - los que están enfermos
  - los débiles
  lexicon: BDAG
  rationale: El participio describe a personas enfermas en este contexto de sanidad. «Los enfermos» es natural en español y conserva el objeto directo de la orden. «Los débiles» sería demasiado amplio y desviaría el sentido.
- source_word: θεραπεύετε
  english_pob_choice: Heal
  chosen_spanish: Sanen
  alternatives_spanish:
  - Curen
  - Sanan
  lexicon: BDAG
  rationale: En el contexto de ministerio milagroso, θεραπεύω se entiende como curar/sanar. «Sanen» suena más natural y digno en español bíblico contemporáneo. «Curen» puede sonar más clínico.
- source_word: νεκροὺς
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - personas muertas
  - los difuntos
  lexicon: BDAG
  rationale: Como objeto de ἐγείρετε, se refiere a personas muertas. «Los muertos» es breve, directo y fiel al paralelo griego.
- source_word: ἐγείρετε
  english_pob_choice: raise
  chosen_spanish: resuciten
  alternatives_spanish:
  - levanten
  - despierten
  lexicon: BDAG
  rationale: Aquí ἐγείρω significa levantar de la muerte. En español, «resuciten» comunica mejor esa acción específica que «levanten», que podría sonar ambiguo.
- source_word: λεπροὺς
  english_pob_choice: lepers
  chosen_spanish: los leprosos
  alternatives_spanish:
  - los que tienen lepra
  - personas con enfermedad de la piel
  lexicon: BDAG
  rationale: Se conserva el término tradicional por ser conciso y reconocible en el contexto evangélico. La nota de pie preserva la posible amplitud del término hacia afecciones cutáneas serias.
- source_word: καθαρίζετε
  english_pob_choice: cleanse
  chosen_spanish: limpien
  alternatives_spanish:
  - purifiquen
  - sanen
  lexicon: BDAG
  rationale: En relación con los leprosos, καθαρίζω lleva sentido físico y ritual. «Limpien» mantiene esa amplitud sin forzar una sola connotación. «Purifiquen» sería más marcadamente ritual y menos idiomático aquí.
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los espíritus malignos
  - demonios
  lexicon: BDAG
  rationale: «Demonios» es la equivalencia directa y estándar en el NT. El artículo definido conserva el valor del plural objeto en español.
- source_word: ἐκβάλλετε
  english_pob_choice: cast out
  chosen_spanish: expulsen
  alternatives_spanish:
  - echen fuera
  - saquen
  lexicon: BDAG
  rationale: «Expulsen» comunica bien la fuerza de expulsión de ἐκβάλλω en un registro moderno y digno. «Echen fuera» sería más literal pero menos fluido.
- source_word: δωρεὰν
  english_pob_choice: freely
  chosen_spanish: Gratis
  alternatives_spanish:
  - libremente
  - sin costo
  lexicon: BDAG
  rationale: La idea es sin pago, gratuitamente. «Gratis» conserva el paralelismo y expresa con claridad la ausencia de costo. «Libremente» podría sonar a modo interior más que a gratuidad.
- source_word: ἐλάβετε
  english_pob_choice: you received
  chosen_spanish: recibieron
  alternatives_spanish:
  - han recibido
  - recibisteis
  lexicon: BDAG
  rationale: El aoristo se expresa de forma natural en pasado simple. En español, la forma impersonal del imperativo plural encaja con el paralelo y evita introducir un sujeto explícito innecesario.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - regalen
  - entreguen
  lexicon: BDAG
  rationale: El imperativo plural de δίδωμι se vierte naturalmente como «den». Mantiene la brevedad y el balance con «gratis recibieron; gratis den».
theological_decisions:
- issue: Alcance de las órdenes milagrosas
  english_pob_reading: Translate the imperatives straightforwardly as commands to the Twelve in this mission discourse, without softening them into general metaphors.
  chosen_spanish_reading: Las órdenes se traducen de manera directa como mandatos concretos dirigidos a los enviados, sin convertirlos en metáforas ni atenuarlos.
  alternative_spanish_readings:
  - Leer algunas acciones de manera metafórica o solo como prácticas eclesiales posteriores
  - Reformularlas para suavizar el carácter milagroso
  rationale: El griego presenta una lista de imperativos en plural con fuerza directa. La traducción debe preservar esa comisión histórica y teológica sin resolver la tensión de su aplicación.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Revisión final: se mantuvo la lectura directa de los imperativos milagrosos y se conservó la nota cultural sobre «leprosos». No se requirieron cambios respecto del pasaje fuente y el tramo auditado en inglés.'
  spanish_consistency_notes:
  - Se prefirió «Sanen» y «resuciten» para mantener un registro bíblico claro y contemporáneo.
  - Se conservó «Gratis» para reflejar la repetición de δωρεάν en ambas cláusulas.
  - Se mantuvo «los leprosos» con nota explicativa para respetar la tradición textual sin perder la amplitud semántica del término.
