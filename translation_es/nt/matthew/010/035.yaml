translation:
  language: es
  text: Porque vine a poner a un hombre contra su padre[a], y a una hija contra su madre, y a una nuera contra su suegra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dividir»; el infinitivo griego puede traducirse más literalmente así, pero aquí las frases repetidas con «contra» hacen explícita la oposición relacional.
    reason: lexical_alternative
  - marker: b
    text: El griego νύμφη puede significar «novia» en algunos contextos; aquí significa «nuera» porque está emparejado con «suegra».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  english_pob_choice: I came
  chosen_spanish: vine
  alternatives_spanish:
  - he venido
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι en este dicho de Jesús puede expresarse naturalmente en español con pretérito simple. «Vine» conserva la acción puntual de su llegada/venida en este contexto discursivo; «he venido» sería posible, pero suena menos directo aquí.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: Introduce la explicación de la afirmación previa. «Porque» mantiene con claridad el valor explicativo en español; «pues» también sería viable, pero menos neutro en registro.
- source_word: διχάσαι
  english_pob_choice: to set ... against
  chosen_spanish: poner ... contra
  alternatives_spanish:
  - dividir
  - separar
  lexicon: BDAG
  rationale: El infinitivo puede significar dividir o causar división, pero aquí la secuencia repetida con κατά + genitivo expresa oposición relacional. «Poner ... contra» reproduce esa tensión de enfrentamiento mejor que un «dividir» más abstracto.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  lexicon: BDAG
  rationale: Aunque ἄνθρωπος puede ser genérico, aquí aparece en una tríada doméstica con «hija» y «nuera», por lo que «hombre» conserva el contraste de género visible en el griego y en la lectura inglesa auditada.
- source_word: κατὰ τοῦ πατρὸς αὐτοῦ
  english_pob_choice: against his father
  chosen_spanish: contra su padre
  alternatives_spanish:
  - en oposición a su padre
  lexicon: BDAG
  rationale: κατά con genitivo expresa oposición. «Contra» es la forma más natural y directa en español, y conserva el sentido adversativo del pasaje.
- source_word: θυγατέρα
  english_pob_choice: a daughter
  chosen_spanish: a una hija
  alternatives_spanish:
  - a una muchacha
  lexicon: BDAG
  rationale: Traducción directa y natural del sustantivo femenino en acusativo singular.
- source_word: κατὰ τῆς μητρὸς αὐτῆς
  english_pob_choice: against her mother
  chosen_spanish: contra su madre
  alternatives_spanish:
  - en oposición a su madre
  lexicon: BDAG
  rationale: Se mantiene la misma construcción adversativa de κατά con genitivo mediante «contra», para preservar la repetición y el paralelismo del original.
- source_word: νύμφην
  english_pob_choice: a daughter-in-law
  chosen_spanish: a una nuera
  alternatives_spanish:
  - a una novia
  - a una esposa joven
  lexicon: BDAG
  rationale: Aunque νύμφη puede significar «novia» o «novia recién casada» en otros contextos, la mención inmediata de πενθερά («suegra») obliga al sentido de parentesco «nuera».
- source_word: κατὰ τῆς πενθερᾶς αὐτῆς
  english_pob_choice: against her mother-in-law
  chosen_spanish: contra su suegra
  alternatives_spanish:
  - en oposición a su suegra
  lexicon: BDAG
  rationale: «Suegra» es el equivalente kinship más claro y natural en español para πενθερά. Conserva el patrón de oposición familiar del versículo.
theological_decisions:
- issue: Carácter del dicho sobre la misión de Jesús y el conflicto familiar
  english_pob_reading: Render the clause as describing the divisive social effect of Jesus' coming without implying that he delights in familial hostility as an ultimate good.
  chosen_spanish_reading: La frase presenta el efecto divisivo de la venida de Jesús sin suavizarlo, pero tampoco añade una explicación teológica que lo convierta en un bien en sí mismo.
  alternative_spanish_readings:
  - una paráfrasis que enfatice persecución por fidelidad a Jesús
  - una traducción más literal con «dividir» que deje menos explícita la oposición relacional
  rationale: El texto griego afirma con fuerza la división/oposición causada por la venida de Jesús. «Poner ... contra» conserva esa dureza y la tensión teológica, sin resolverla ni interpretarla en exceso.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la opción de sentido para διχάσαι y νύμφη; no se registran revisiones posteriores que alteren la traducción base.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de tres miembros familiares con la misma preposición «contra» para reproducir la oposición repetida del griego.
  - Se usa «nuera» y «suegra» como términos de parentesco comunes y exactos en español, evitando «novia» por exigencia contextual.
  - El tono es sobrio y publicable, con sintaxis natural en español sin perder la dureza del dicho.
