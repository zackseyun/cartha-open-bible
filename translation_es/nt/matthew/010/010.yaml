translation:
  language: es
  text: No lleven bolsa de viaje para el camino[a], ni dos túnicas, ni sandalias, ni bastón; porque el obrero es digno de su alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos entienden «ni bastón» como la prohibición de llevar un bastón extra, especialmente a la luz de Marcos 6:8, que permite llevar bastón.
    reason: alternative_reading
lexical_decisions:
- source_word: πήραν
  english_pob_choice: a traveler's bag
  chosen_spanish: bolsa de viaje
  alternatives_spanish:
  - bolsa
  - morral
  - mochila
  lexicon: BDAG
  rationale: πήρα designa una bolsa para llevar provisiones en un viaje. «Bolsa de viaje» conserva el sentido de objeto para trayecto y resulta natural en español sin reducirlo a un «bolsa» demasiado genérico ni modernizarlo indebidamente con «mochila».
- source_word: εἰς ὁδὸν
  english_pob_choice: for the road
  chosen_spanish: para el camino
  alternatives_spanish:
  - para el viaje
  - para la ruta
  lexicon: BDAG
  rationale: La expresión indica el propósito del objeto en el contexto de desplazamiento. «Para el camino» reproduce bien el valor idiomático y mantiene el tono breve del griego.
- source_word: δύο χιτῶνας
  english_pob_choice: two tunics
  chosen_spanish: dos túnicas
  alternatives_spanish:
  - dos vestidos interiores
  - dos prendas
  lexicon: BDAG
  rationale: χιτών nombra la prenda básica interior. «Túnicas» es el equivalente histórico más preciso y reconocido en español bíblico, y evita perder la especificidad del término.
- source_word: ὑποδήματα
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - calzado
  - zapatos
  lexicon: BDAG
  rationale: ὑπόδημα se refiere al calzado sujeto bajo el pie; en este contexto, «sandalias» es la forma más fiel y natural para el mundo bíblico.
- source_word: ῥάβδον
  english_pob_choice: a staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - cayado
  lexicon: BDAG
  rationale: ῥάβδος aquí alude al bastón de viaje. «Bastón» es transparente en español y preserva la lectura literal del texto, sin armonizar con Marcos 6:8 en la traducción misma.
- source_word: ἄξιος
  english_pob_choice: is worthy
  chosen_spanish: es digno
  alternatives_spanish:
  - merece
  - es merecedor
  lexicon: BDAG
  rationale: ἄξιος expresa dignidad o merecimiento. «Es digno» conserva el matiz evaluativo y la cadencia bíblica sin añadir interpretaciones.
- source_word: ὁ ἐργάτης
  english_pob_choice: the worker
  chosen_spanish: el obrero
  alternatives_spanish:
  - el trabajador
  - el labrador
  lexicon: BDAG
  rationale: ἐργάτης es quien trabaja o labora. «Obrero» comunica bien la idea de trabajador contratado o enviado y encaja con el registro bíblico tradicional sin volverse eclesiástico.
- source_word: τῆς τροφῆς αὐτοῦ
  english_pob_choice: of his food
  chosen_spanish: de su alimento
  alternatives_spanish:
  - de su comida
  - de su sustento
  lexicon: BDAG
  rationale: τροφή significa comida, alimento o nutrición. «Alimento» conserva el sentido concreto sin pasar a una explicación más amplia como «sustento», que sería más interpretativa.
theological_decisions:
- issue: Tensión entre Mateo 10:10 y Marcos 6:8 respecto al bastón
  english_pob_reading: Retain Matthew's prohibition 'or a staff' in the main text without harmonizing to Mark 6:8.
  chosen_spanish_reading: Mantener «ni bastón» en el texto principal, sin armonizarlo con Marcos 6:8.
  alternative_spanish_readings:
  - Interpretar que prohíbe un bastón adicional, no cualquier bastón
  - Suavizar la frase para acomodarla a Marcos
  rationale: El griego de Mateo enumera ῥάβδον entre los objetos prohibidos. Para respetar la primacía del texto fuente y conservar la tensión interevangélica documentada por la POB, la traducción no la resuelve dentro del versículo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y confirma que no hacía falta ajustar la lectura base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; este versículo no requiere esa decisión.
  - Se conserva un registro bíblico claro y moderno, evitando el calco mecánico y también evitando una paráfrasis interpretativa.
  - «Obrero» y «alimento» siguen la fuerza concreta del griego sin desplazarla a «siervo» o «sustento», que serían más expansivos.
