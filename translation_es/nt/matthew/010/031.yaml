translation:
  language: es
  text: Por lo tanto[a], no teman; ustedes valen más que muchos gorriones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «son más valiosos que muchos gorriones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὖν
  english_pob_choice: Therefore, do not
  chosen_spanish: Por lo tanto, no
  alternatives_spanish:
  - Así que, no
  - Entonces, no
  lexicon: BDAG
  rationale: οὖν expresa inferencia a partir del argumento previo; «Por lo tanto» mantiene claramente la conexión lógica en español. μὴ con el imperativo presente φοβεῖσθε funciona como prohibición, por eso se traduce con «no» + imperativo.
- source_word: φοβεῖσθε
  english_pob_choice: be afraid
  chosen_spanish: teman
  alternatives_spanish:
  - tengan miedo
  - sean temerosos
  lexicon: BDAG
  rationale: El imperativo de φοβέομαι se puede expresar naturalmente en español con «temer» en forma negativa. «Teman» conserva el mandato sin añadir una perífrasis menos directa.
- source_word: πολλῶν στρουθίων
  english_pob_choice: many sparrows
  chosen_spanish: muchos gorriones
  alternatives_spanish:
  - muchos pajarillos
  - muchos pájaros pequeños
  lexicon: BDAG
  rationale: En este contexto στρουθίον se refiere a gorriones, enlazando con el contexto inmediato de 10:29. «Gorriones» es preciso y natural en español.
- source_word: διαφέρετε
  english_pob_choice: are worth more than
  chosen_spanish: valen más que
  alternatives_spanish:
  - son más valiosos que
  - superan en valor a
  lexicon: BDAG
  rationale: Aquí διαφέρω expresa superioridad de valor o importancia, no simple diferencia. «Valen más que» reproduce bien esa comparación en un español claro y digno.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis contrastivo frente a los gorriones. «Ustedes» mantiene el énfasis y es adecuado para un español amplio de América Latina.
theological_decisions:
- issue: Valor de los discípulos frente a los gorriones dentro del argumento sobre la providencia divina
  english_pob_reading: you are worth more than many sparrows
  chosen_spanish_reading: ustedes valen más que muchos gorriones
  alternative_spanish_readings:
  - ustedes son más valiosos que muchos gorriones
  - ustedes tienen más valor que muchos gorriones
  rationale: La frase conserva la comparación de valor implícita en διαφέρετε dentro del contexto de la enseñanza de Jesús sobre el cuidado del Padre. No se niega el cuidado de Dios por las criaturas; solo se afirma con mayor fuerza el valor relativo de los discípulos en este argumento.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'El borrador sigue el consenso del audit trail en inglés: mantiene la inferencia de οὖν, traduce φοβεῖσθε como una prohibición natural en español, y conserva la comparación de valor de διαφέρετε sin reducirla a una mera diferencia. No se detectan revisiones previas aplicables.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y otras sustituciones no pertinentes.
  - «Valen más que» conserva la fuerza comparativa sin volverla excesivamente interpretativa.
  - La nota al pie ofrece una alternativa léxica real sin alterar el texto principal.
