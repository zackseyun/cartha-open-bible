translation:
  language: es
  text: Un discípulo no está por encima del maestro, ni un esclavo[a] por encima de su amo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» para δοῦλος; el término griego puede denotar «esclavo» o «siervo», según el contexto.
    reason: alternative_reading
  - marker: b
    text: O «señor» para κύριος; aquí se trata de un superior humano en la analogía, no de un título divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθητὴς
  english_pob_choice: disciple
  chosen_spanish: discípulo
  alternatives_spanish:
  - estudiante
  lexicon: BDAG
  rationale: «Discípulo» conserva en español la relación de seguimiento y aprendizaje personal que tiene μαθητής en el contexto de los Evangelios, mejor que «estudiante», que suena más académico y menos relacional.
- source_word: ὑπὲρ
  english_pob_choice: above
  chosen_spanish: por encima de
  alternatives_spanish:
  - más que
  - superior a
  lexicon: BDAG
  rationale: Con acusativo, ὑπέρ expresa superioridad o estatus por encima de otro. «Por encima de» comunica esa comparación de manera natural en español sin añadir matices que el griego no exige.
- source_word: διδάσκαλον
  english_pob_choice: teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - maestro/maestra
  - instructor
  lexicon: BDAG
  rationale: En este dicho, διδάσκαλος nombra a la figura de autoridad que enseña al discípulo. «Maestro» es claro y idiomático en español, y evita la posible rigidez de «instructor».
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: La comparación con κύριος en un vínculo de subordinación y pertenencia hace que «esclavo» preserve mejor la fuerza social del término que «siervo», que suavizaría el contraste.
- source_word: κύριον
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - maestro
  lexicon: BDAG
  rationale: Aquí κύριος no funciona como título divino, sino como término de relación social en el paralelo esclavo/amo. «Señor» es un equivalente natural en español que mantiene esa relación sin forzar un uso cristológico.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo español «su» reproduce con naturalidad la referencia del pronombre griego al dueño del esclavo.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  lexicon: BDAG
  rationale: «Ni» enlaza de manera fluida la segunda cláusula negativa con la primera, como hace οὐδὲ en griego.
theological_decisions:
- issue: Valor de δοῦλος en una analogía de estatus social
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: La frase establece una comparación explícita entre discípulo/maestro y esclavo/señor. Mantener «esclavo» conserva la fuerza de subordinación que el original presenta y evita suavizar el contraste.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δοῦλος; translation philosophy #1 y #5'
- issue: Valor de κύριος en un contexto humano, no divino
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - maestro
  rationale: Aunque κύριος puede referirse a Dios o al Señor en otros contextos, aquí el paralelismo con δοῦλος muestra un superior humano en la analogía. «Señor» es una opción válida y transparente en español para esa relación social.
  doctrine_reference: 'DOCTRINE.md: contested terms table for κύριος; translation philosophy #5'
translation_notes:
  revision_awareness: El audit trail inglés indica acuerdo alto y ningún cambio en la última revisión; esta versión española sigue de cerca esas decisiones, preservando las dos comparaciones paralelas y la distinción contextual entre διδάσκαλος/μαθητής y κύριος/δοῦλος.
  spanish_consistency_notes:
  - Se mantiene «discípulo» para μαθητής y «maestro» para διδάσκαλος, evitando confundir la relación pedagógica con la de señorío.
  - Se traduce δοῦλος como «esclavo» para conservar la fuerza social del término, con nota alternativa por la posibilidad contextual de «siervo».
  - Se usa «señor» para κύριος en sentido humano de la analogía; la nota aclara que no es un uso divino.
  - La puntuación reproduce dos miembros paralelos unidos por «ni», acorde con la estructura griega negativa.
