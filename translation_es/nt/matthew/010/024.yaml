  glossary_alignment: Hay buena alineación con los términos del proyecto en general. No hay conflicto con Yahvé/Mesías u otros términos mayores. Sí conviene ajustar κύριος en este contexto humano a «amo», ya que el audit trail inglés justificó explícitamente «master» y no «Lord», y en español «señor» puede difuminar esa distinción. «Esclavo» para δοῦλος está bien y debe conservarse.
