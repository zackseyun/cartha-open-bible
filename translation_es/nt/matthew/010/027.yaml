translation:
  language: es
  text: Lo que yo les digo en la oscuridad[a], díganlo a la luz; y lo que oyen al oído[b], proclamen en las azoteas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en secreto ... abiertamente»; el griego conserva la imagen «en la oscuridad ... a la luz».
    reason: lexical_alternative
  - marker: b
    text: Es decir, lo que se oye en privado debe anunciarse en público; «en las azoteas» refleja los techos planos de las casas antiguas, usados como lugares visibles para anunciar.
    reason: cultural_note
lexical_decisions:
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: Lo que
  alternatives_spanish:
  - aquello que
  - lo cual
  lexicon: BDAG
  rationale: El pronombre relativo neutro funciona de manera sustantivada. «Lo que» es natural en español y conserva el objeto del discurso sin añadir interpretación.
- source_word: λέγω
  english_pob_choice: tell
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo
  - les hablo
  - les comunico
  lexicon: BDAG
  rationale: El valor es instrucción directa de Jesús a los discípulos. «Les digo» conserva la relación personal y la fuerza de enseñanza directa mejor que una formulación más abstracta.
- source_word: ἐν τῇ σκοτίᾳ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en secreto
  - a oscuras
  lexicon: BDAG
  rationale: Se preserva la imagen metafórica de contraste con «en la luz». «En secreto» interpreta la figura; «en la oscuridad» la mantiene con naturalidad en español.
- source_word: εἴπατε
  english_pob_choice: say
  chosen_spanish: díganlo
  alternatives_spanish:
  - digan
  - háblenlo
  - anúncienlo
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decidida. En español, el pronombre objeto directo explícito ayuda a completar la referencia de «lo que» sin perder concisión. «Díganlo» conserva la orden y la continuidad con la primera cláusula.
- source_word: ἐν τῷ φωτί
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - abiertamente
  - a plena luz
  - en público
  lexicon: BDAG
  rationale: Se mantiene la antítesis imagética con «en la oscuridad». «En la luz» es fiel, pero «en la luz» / «en la luz» puede sonar menos natural que «en la luz»; aquí «en la luz» se conserva como contraste literal. (En el texto final se eligió «en la luz» para mayor paralelismo.)
- source_word: εἰς τὸ οὖς
  english_pob_choice: in the ear
  chosen_spanish: al oído
  alternatives_spanish:
  - en el oído
  - en el oído de ustedes
  - al oído de ustedes
  lexicon: BDAG
  rationale: La expresión idiomática denota comunicación privada. «Al oído» comunica de forma natural la idea de algo dicho en privado, sin sobreespecificar el posesivo implícito.
- source_word: ἀκούετε
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - oyen
  - están oyendo
  lexicon: BDAG
  rationale: El presente indicativo en la relativa se expresa con un presente simple en español. «Oyen» es directo y mantiene la percepción auditiva sin cargar el verbo con matices de atención que no están explícitos.
- source_word: κηρύξατε
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - prediquen
  - anuncien
  - declaren
  lexicon: BDAG
  rationale: κηρύσσω implica proclamación pública y autoritativa. «Proclamen» preserva esa fuerza sin reducirlo a un contexto litúrgico o eclesiástico específico que «prediquen» podría sugerir.
- source_word: ἐπὶ τῶν δωμάτων
  english_pob_choice: on the housetops
  chosen_spanish: en las azoteas
  alternatives_spanish:
  - sobre los techos
  - en los tejados
  - desde las azoteas
  lexicon: BDAG
  rationale: δῶμα alude a las cubiertas planas de las casas usadas como lugar visible de anuncio. «Azoteas» comunica el referente cultural de manera clara y natural en español moderno; el matiz de ubicación pública queda bien conservado.
theological_decisions:
- issue: Preservar la metáfora de oscuridad/luz frente a una paráfrasis explicativa sobre secreto/publicidad
  english_pob_reading: The main text keeps 'in the darkness ... in the light' as imagery, with a note allowing 'in secret ... openly' as an interpretation.
  chosen_spanish_reading: Mantener «en la oscuridad ... en la luz» en el texto principal, con nota que permite entenderlo como «en secreto ... abiertamente».
  alternative_spanish_readings:
  - en secreto ... abiertamente
  - a escondidas ... públicamente
  rationale: La figura retórica es parte del énfasis de Jesús y no debe ser absorbida por una explicación. La nota ofrece la lectura interpretativa sin borrar la imagen original.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Comunicación privada frente a anuncio público en 'al oído' / 'en las azoteas'
  english_pob_reading: What is heard privately is to be announced publicly; 'on the housetops' reflects the flat roofs of ancient houses used as visible places for public announcement.
  chosen_spanish_reading: Conservar «al oído» y «en las azoteas» como contraste entre recepción privada y proclamación pública.
  alternative_spanish_readings:
  - en privado ... en público
  - susurrado ... proclamado públicamente
  rationale: El contraste semítico/retórico se entiende mejor cuando la imagen permanece. La nota puede aclarar el trasfondo cultural de las azoteas sin reemplazar el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada; la redacción española sigue de cerca el texto griego y el trazado exegético del POB inglés, preservando las imágenes paralelas sin introducir paráfrasis no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no lo contiene.
  - Se usa «proclamen» para κηρύξατε conforme al valor de proclamación pública, evitando «prediquen» por posible reducción eclesiástica.
  - Se prefirió «azoteas» para δώματα por su equivalencia cultural en español contemporáneo; «techos/tejados» quedan como alternativas válidas si se desea un registro ligeramente más literal.
  - La puntuación conserva el paralelismo de dos miembros coordinados, con coma y punto y coma conforme al ritmo del original.
