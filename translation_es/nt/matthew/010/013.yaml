translation:
  language: es
  text: Y si la casa es digna[a], llegue sobre ella vuestra paz; pero si no es digna[c][b], vuestra paz vuelva a vosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hogar» o «familia»; el griego «casa» puede referirse al edificio y, por extensión, a quienes están en él.
    reason: lexical_alternative
  - marker: b
    text: Aquí «digna» significa apta para recibir a los mensajeros y su paz, no moralmente sin pecado.
    reason: cultural_note
  - marker: c
    text: O «se vuelva a vosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκία
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - familia
  - casa/ hogar
  lexicon: BDAG
  rationale: En este contexto, οἰκία designa primariamente la casa como unidad concreta; en español, «casa» es la equivalencia más directa y transparente. Puede implicar por extensión a quienes viven en ella, pero esa extensión se conserva en la nota como posibilidad, no en el cuerpo del texto.
- source_word: ἀξία
  english_pob_choice: worthy
  chosen_spanish: digna
  alternatives_spanish:
  - merecedora
  - apta
  - receptiva
  lexicon: BDAG
  rationale: «Digna» comunica el juicio evaluativo de ἄξιος sin reducirlo a aceptación emocional ni a simple receptividad. Mantiene la tensión de si la casa es adecuada para recibir a los mensajeros y su paz.
- source_word: ἐλθάτω
  english_pob_choice: let ... come
  chosen_spanish: llegue
  alternatives_spanish:
  - venga
  - entre
  - descienda
  lexicon: BDAG
  rationale: 'El imperativo aoristo se expresa con un subjuntivo exhortativo natural en español: «llegue». Conserva la dirección dinámica de la paz hacia la casa y suena idiomático en español.'
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - shalom
  - bienestar
  - bendición
  lexicon: BDAG
  rationale: «Paz» es el equivalente normal y más claro de εἰρήνη. En el contexto misionero conserva, sin explicitarla de más, la resonancia semítica de bienestar y bendición.
- source_word: ἐπ’ αὐτήν
  english_pob_choice: upon it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - sobre la casa
  - encima de ella
  - en ella
  lexicon: BDAG
  rationale: «Sobre ella» refleja el movimiento direccional de ἐπί con acusativo y mantiene la imagen de la paz viniendo a reposar sobre la casa. El pronombre femenino sigue la referencia gramatical de οἰκία.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a vosotros
  alternatives_spanish:
  - hacia vosotros
  - de vuelta a vosotros
  - para vosotros
  lexicon: BDAG
  rationale: La construcción con πρός es direccional; en español, «a vosotros» expresa bien el retorno hacia los discípulos. Se evita sobrecargar el texto con una paráfrasis como «de vuelta», que ya queda sugerida por ἐπιστραφήτω.
- source_word: ἐπιστραφήτω
  english_pob_choice: let ... return
  chosen_spanish: vuelva
  alternatives_spanish:
  - regrese
  - se vuelva
  - retorne
  lexicon: BDAG
  rationale: «Vuelva» comunica de forma natural la idea de retorno de la paz y preserva el matiz del verbo sin hacerlo mecánico. En combinación con «a vosotros» reproduce el giro semántico del original.
- source_word: μὲν ... δὲ
  english_pob_choice: if ... ; but if ...
  chosen_spanish: si ...; pero si ...
  alternatives_spanish:
  - si ...; y si ...
  - si ...; mas si ...
  - por una parte ...; por otra ...
  lexicon: BDAG
  rationale: La correlación μὲν ... δὲ se expresa con una oposición española clara y natural. «Pero si» mantiene el contraste sin volverlo pesado o demasiado literal.
theological_decisions:
- issue: Naturaleza de «vuestra paz»
  english_pob_reading: Retained 'your peace' as the disciples' spoken blessing of peace that may rest on or return from the house, without reducing it to a mere wish or making it a mechanistic force.
  chosen_spanish_reading: Se conserva «vuestra paz» como la paz pronunciada por los discípulos, capaz de descansar sobre la casa o volver a ellos, sin reducirla a un mero saludo ni convertirla en una fuerza mecánica.
  alternative_spanish_readings:
  - el saludo de paz de ustedes
  - la bendición de paz pronunciada por ustedes
  - la paz del reino asociada al mensaje
  rationale: 'El texto presenta la paz como algo concreto y transferible dentro de la misión, pero no obliga a sistematizar cómo opera. La traducción mantiene esa tensión: paz dicha y paz que puede reposar o regresar, sin resolverla dogmáticamente.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Valor de «digna»
  english_pob_reading: '''Worthy'' here means fit to receive the messengers and their peace, not morally sinless.'
  chosen_spanish_reading: «Digna» se entiende como apta para recibir a los mensajeros y su paz, no como moralmente impecable.
  alternative_spanish_readings:
  - merecedora
  - apta
  - receptiva
  rationale: La nota evita una lectura moralizante. En español, «digna» puede sonar ética o relacional; aquí se aclara que el criterio es su aptitud para recibir el envío y la paz, no una perfección moral.
  doctrine_reference: Sentido contextual de ἄξιος en el envío misionero.
translation_notes:
  revision_awareness: El cotejo más reciente indica acuerdo alto y no requiere cambios sustantivos; por eso se mantiene la estructura del sentido y solo se adapta al español con equivalentes naturales y auditables.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponde al nombre divino; aquí no aparece.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se conserva el pronombre plural de segunda persona en forma litúrgica «vosotros» para mantener la correspondencia con «your» del texto auditado y el tono bíblico.
  - Se mantiene la imagen concreta de la paz que va, reposa o vuelve, sin explicarla en exceso.
