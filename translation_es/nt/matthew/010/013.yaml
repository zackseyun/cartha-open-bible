    text: Or 'household' or 'home'; Greek 'house' may refer to the dwelling and, by extension, those in it.
    reason: lexical_alternative
  - marker: b
    text: '''Worthy'' here means fit to receive the messengers and their peace, not morally sinless.'
    reason: cultural_note
  - marker: c
    text: Or 'let your peace turn back to you.'
    reason: lexical_alternative
