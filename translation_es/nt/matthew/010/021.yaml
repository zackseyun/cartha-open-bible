revisions:
- from: Y hermano entregará a hermano para muerte[a], y un padre a su hijo; y los hijos se levantarán contra los padres y los matarán.
  to: Y hermano entregará a hermano a la muerte[a], y un padre a su hijo o hija; y los hijos se levantarán contra los padres y les darán muerte.
  rationale: Se corrige «para muerte» a «a la muerte» por naturalidad y fidelidad; se amplía τέκνον a «su hijo o hija» para no reducir indebidamente el original; se ajusta θανατώσουσιν a «les darán muerte» para reflejar mejor la decisión auditada del POB; y se corrige la nota para que la alternativa verbal coincida con la frase singular del texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:03:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte la estructura y el sentido del griego: traición/entrega dentro de la familia, oposición de hijos contra padres, y desenlace mortal. Sin embargo, varias elecciones no preservan bien las decisiones auditadas del POB ni el valor léxico más amplio del original: «para muerte» es poco idiomático en español; τέκνον/τέκνα se estrecha indebidamente con «hijo/hijos» en vez de «hijo o hija / hijos» o mejor «su hijo o hija / hijos» según contexto; y θανατώσουσιν se rebaja de «dar/poner muerte» a «matarán», perdiendo el matiz deliberado que el POB inglés quiso conservar con «put ... to death».'
  spanish_quality_summary: 'El texto es comprensible, pero «para muerte» suena forzado y poco natural en español bíblico actual. Además, la repetición de términos familiares puede mantenerse con mejor fluidez: «un padre a su hijo o hija» conserva la amplitud de τέκνον sin volverse rígido. «Les darán muerte» resulta más digno y mejor alineado con el registro del proyecto que «los matarán».'
  glossary_alignment: 'No hay conflicto con términos de glosario mayores como Yahvé, Mesías, etc. Sí hay desalineación con la política de precisión léxica y de género: ἀδελφός debe seguir como «hermano», pero τέκνον/τέκνα no debe reducirse sin necesidad a masculino específico. También conviene reflejar mejor la decisión inglesa sobre θανατόω con «dar muerte» o «poner a muerte», no simplemente «matar».'
  issues:
  - severity: high
    issue: «para muerte» no es una traducción idiomática adecuada de εἰς θάνατον
    rationale: Aunque intenta reflejar la preposición, en español suena antinatural. «A muerte» o, mejor en esta estructura, «a la muerte»/«para que muera» son opciones posibles, pero la formulación más natural en esta frase es «entregará ... a la muerte», que conserva el resultado fatal del griego y la concisión del POB.
  - severity: medium
    issue: τέκνον fue reducido a «su hijo»
    rationale: El original significa «child», no específicamente varón. En español neutral y fiel, «su hijo o hija» preserva la amplitud semántica sin perder claridad. Mantener solo «hijo» contradice la justificación léxica auditada.
  - severity: medium
    issue: τέκνα fue reducido a «los hijos»
    rationale: Aunque en español puede funcionar como masculino genérico, aquí el POB auditó explícitamente el sentido inclusivo de «children». «Los hijos» es posible, pero estrecha innecesariamente la referencia. «Los hijos» puede tolerarse por idiomaticidad, pero en este versículo conviene compensar al menos en singular con «hijo o hija»; mejor aún, mantener «los hijos» solo si el resto del versículo preserva claramente la amplitud, o usar «los hijos» sin nota si se prioriza fluidez. Dado el equilibrio entre naturalidad y fidelidad, se puede dejar «los hijos» pero no también reducir τέκνον a «hijo».
  - severity: medium
    issue: «los matarán» debilita la decisión auditada para θανατώσουσιν
    rationale: El inglés POB eligió «put them to death» en vez de «kill» para conservar gravedad y posible formalidad deliberada. «Les darán muerte» reproduce mejor ese matiz en español que «los matarán».
  - severity: low
    issue: La nota alternativa «los entregará» no corresponde bien al singular representativo del sujeto y objeto
    rationale: La alternativa debería centrarse en el verbo, por ejemplo «O «lo entregará»» o mejor «O «lo entregará»; el verbo también puede significar «traicionar»...». «Los entregará» introduce plural no presente en la frase anclada.
  revised_spanish_text: Y hermano entregará a hermano a la muerte[a], y un padre a su hijo o hija; y los hijos se levantarán contra los padres y les darán muerte.
  revised_footnotes:
  - marker: a
    text: O «lo entregará»; el verbo también puede llevar el sentido de «traicionar» en contextos de deslealtad.
    reason: lexical_alternative
  revision_rationale: Se corrige «para muerte» a «a la muerte» por naturalidad y fidelidad; se amplía τέκνον a «su hijo o hija» para no reducir indebidamente el original; se ajusta θανατώσουσιν a «les darán muerte» para reflejar mejor la decisión auditada del POB; y se corrige la nota para que la alternativa verbal coincida con la frase singular del texto.
