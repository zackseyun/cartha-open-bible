translation:
  language: es
  text: Y hermano entregará a hermano a la muerte[a], y un padre a su hijo o hija; y los hijos se levantarán contra los padres y les darán muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo entregará»; el verbo también puede llevar el sentido de «traicionar» en contextos de deslealtad.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδώσει
  english_pob_choice: will hand over
  chosen_spanish: entregará
  alternatives_spanish:
  - lo entregará
  - lo pondrá en manos de
  lexicon: BDAG
  rationale: La idea central es poner a una persona en poder hostil, con resultado de muerte. «Entregará» conserva la acción concreta sin añadir de antemano el matiz de traición, aunque ese matiz pueda estar presente en contexto.
- source_word: ἀδελφὸς ἀδελφὸν
  english_pob_choice: brother ... brother
  chosen_spanish: hermano ... hermano
  alternatives_spanish:
  - un hermano ... otro
  - un hermano ... a su hermano
  lexicon: BDAG
  rationale: Se conserva la repetición singular y la relación fraterna específica del griego. «Hermano ... hermano» mantiene el paralelismo y evita neutralizar el término con una formulación menos precisa.
- source_word: εἰς θάνατον
  english_pob_choice: to death
  chosen_spanish: para muerte
  alternatives_spanish:
  - a muerte
  - hasta la muerte
  lexicon: BDAG
  rationale: 'La preposición expresa finalidad o resultado: ser entregado con desenlace mortal. «Para muerte» comunica ese destino de forma breve y fiel; «a muerte» sonaría menos claro en español actual.'
- source_word: πατὴρ τέκνον
  english_pob_choice: a father his child
  chosen_spanish: un padre a su hijo
  alternatives_spanish:
  - un padre a su hijo[a]
  - un padre a su niño
  - un padre a su descendiente
  lexicon: BDAG
  rationale: τέκνον es más amplio que «hijo» en sentido masculino estricto, pero en español el masculino singular «hijo» es la opción más natural y directa en este paralelismo. Se conserva el artículo indefinido implícito del griego con «un padre».
- source_word: ἐπαναστήσονται
  english_pob_choice: will rise up against
  chosen_spanish: se levantarán contra
  alternatives_spanish:
  - se rebelarán contra
  - se alzarán contra
  lexicon: BDAG
  rationale: El verbo expresa oposición hostil y ascenso contra alguien. «Se levantarán contra» reproduce bien la imagen y es idiomático en español, sin reducirlo a un sentido exclusivamente político.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - la descendencia
  lexicon: BDAG
  rationale: Aunque τέκνα es inclusivo, en esta frase española «los hijos» transmite bien el paralelismo familiar y evita una sonoridad demasiado abstracta. El plural masculino funciona de manera colectiva en español bíblico contemporáneo.
- source_word: ἐπὶ γονεῖς
  english_pob_choice: against parents
  chosen_spanish: contra los padres
  alternatives_spanish:
  - contra sus padres
  - en contra de los padres
  lexicon: BDAG
  rationale: Con verbos de hostilidad, ἐπί con acusativo significa «contra». «Los padres» traduce γονεῖς de modo natural y paralelo a «los hijos».
- source_word: θανατώσουσιν
  english_pob_choice: put ... to death
  chosen_spanish: los matarán
  alternatives_spanish:
  - los pondrán a muerte
  - los darán muerte
  lexicon: BDAG
  rationale: θανατόω significa causar la muerte. En español, «matarán» es el equivalente más directo y natural aquí; mantiene la fuerza del verbo sin perder claridad.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a sus padres
  lexicon: BDAG
  rationale: El pronombre retoma inmediatamente a «los padres». En español, el objeto directo clítico «los» mantiene el flujo natural y deja claro el referente por contexto.
theological_decisions:
- issue: Violencia intrafamiliar como señal de ruptura por causa del discipulado/persecución
  english_pob_reading: The verse describes family members betraying one another and killing one another in hostile circumstances.
  chosen_spanish_reading: El versículo describe una ruptura familiar extrema, con entrega, oposición y muerte dentro de la propia familia.
  alternative_spanish_readings:
  - El versículo anuncia únicamente traición política o judicial fuera del ámbito familiar.
  - El versículo debe suavizarse para evitar la dureza explícita de la violencia.
  rationale: La sintaxis griega presenta una cadena de acciones familiares hostiles que culmina en muerte; la traducción debe conservar esa dureza sin eufemismos. «Entregará», «se levantarán contra» y «los matarán» preservan el impacto del texto.
  doctrine_reference: 'DOCTRINE.md: Faithful representation of violence and persecution'
- issue: Términos familiares específicos y concordancia de género
  english_pob_reading: Retain 'brother' for ἀδελφός and 'children/parents' for broader terms
  chosen_spanish_reading: Mantener «hermano», «hijo», «hijos» y «padres» como equivalentes familiares directos, sin sustituirlos por términos más neutros.
  alternative_spanish_readings:
  - Usar «hermana/o» o «sibling» para neutralizar ἀδελφός.
  - Reemplazar «hijos» por una expresión impersonal o abstracta.
  rationale: El contraste familiar del versículo depende de relaciones concretas. En español, las formas elegidas son las más naturales y conservan la precisión léxica del original sin borrar las distinciones familiares.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego y con la auditoría inglesa: la versión inglesa ya eligió «hand over» y evitó imponer «betray» como sentido principal. La redacción española sigue esa decisión, manteniendo la fuerza hostil del verbo sin sobretraducirlo.'
  spanish_consistency_notes:
  - Se usa «hermano» en singular repetido para reflejar ἀδελφός ... ἀδελφόν.
  - «Padre/hijo» y «hijos/padres» conservan el paralelismo familiar del griego.
  - «Contra» refleja ἐπί con acusativo en contexto hostil.
  - «Matarán» expresa θανατώσουσιν con naturalidad y sin atenuación.
  - Se mantiene el registro bíblico moderno y claro, sin reemplazar el léxico familiar por formulaciones eclesiásticas tradicionales.
