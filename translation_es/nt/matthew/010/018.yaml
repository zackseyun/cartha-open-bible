translation:
  language: es
  text: Y seréis llevados ante gobernadores y reyes por causa de mí, como testimonio a ellos y a los gentiles[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las naciones». En Mateo, ἔθνη suele referirse a los gentiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ ἡγεμόνας ... καὶ βασιλεῖς
  english_pob_choice: before governors and kings
  chosen_spanish: ante gobernadores y reyes
  alternatives_spanish:
  - delante de gobernadores y reyes
  - ante autoridades y reyes
  lexicon: BDAG
  rationale: ἐπί con acusativo en este contexto judicial expresa comparecencia ante autoridades. En español, «ante» comunica esa idea con naturalidad y conserva el marco forense mejor que una simple dirección de movimiento.
- source_word: ἀχθήσεσθε
  english_pob_choice: you will be brought
  chosen_spanish: seréis llevados
  alternatives_spanish:
  - seréis traídos
  - seréis conducidos
  lexicon: BDAG
  rationale: El futuro pasivo de ἄγω puede traducirse como “ser llevados” en español natural y digno. Mantiene la pasividad y la idea de comparecencia sin añadir violencia que el texto no explicita.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - a causa de mí
  - por mi causa
  lexicon: BDAG
  rationale: La preposición con genitivo expresa causa o motivo. «Por causa de mí» conserva la referencia personal a Jesús y suena más idiomático en español bíblico contemporáneo que una calca más dura.
- source_word: εἰς μαρτύριον
  english_pob_choice: as a testimony
  chosen_spanish: como testimonio
  alternatives_spanish:
  - para testimonio
  - como testimonio de
  lexicon: BDAG
  rationale: 'La frase expresa función o resultado: su comparecencia servirá como testimonio. «Como testimonio» preserva el sustantivo y evita convertirlo en verbo o ampliar innecesariamente el sentido.'
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: BDAG
  rationale: El dativo no marca explícitamente oposición. «Para ellos» permite leer el testimonio como dirigido a los gobernadores y reyes sin resolver la posible lectura adversativa que el contexto puede sugerir.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: En Mateo, ἔθνη suele contraponerse a Israel y refiere a los gentiles. «Los gentiles» es la equivalencia usual y aquí comunica mejor el contraste bíblico que «las naciones».
theological_decisions:
- issue: Fuerza de μαρτύριον αὐτοῖς
  english_pob_reading: neutral 'to them' rather than adversative 'against them'
  chosen_spanish_reading: neutral «para ellos» en vez de «contra ellos»
  alternative_spanish_readings:
  - contra ellos
  - ante ellos como juicio
  rationale: 'El texto presenta la comparecencia como testimonio. El dativo αὐτοῖς no obliga a un sentido de acusación; mantener la neutralidad preserva la tensión teológica: el testimonio puede ser recibimiento o juicio, según la respuesta.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el rastro auditado en inglés; no hubo revisiones aplicadas en la última pasada, y la versión española conserva las decisiones léxicas y la ambigüedad teológica documentadas en el texto base.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «gentiles» para ἔθνη conforme al uso de Mateo y al criterio auditado en inglés.
  - Se evitó introducir una lectura adversativa en αὐτοῖς.
  - La puntuación y el orden responden a un registro bíblico moderno y legible en español.
