revisions:
- from: Y seréis llevados[a] ante gobernadores y reyes por causa de mí, como testimonio para ellos y para los gentiles[b].
  to: Y seréis llevados ante gobernadores y reyes por causa de mí, como testimonio a ellos y a los gentiles[a].
  rationale: Se ajusta αὐτοῖς de «para ellos» a «a ellos» para conservar la neutralidad del dativo y mejorar la naturalidad del español. Se elimina la nota sobre «arrastrados» porque introduce una fuerza no explicitada y no corresponde a una alternativa conservada en el aparato inglés para el lector. Se mantiene la nota sobre «las naciones», que sí refleja una alternativa léxica documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:04:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: comparecencia ante autoridades, causa por Jesús y función de testimonio. Sin embargo, «para ellos» en αὐτοῖς suena menos natural y ligeramente más teleológico en español que el neutral «a ellos», y la nota [a] introduce «arrastrados», una alternativa que el propio expediente inglés descartó como demasiado fuerte para el texto base.'
  spanish_quality_summary: 'El español es claro y digno, pero puede afinarse para mayor naturalidad y precisión judicial: «seréis llevados ante gobernadores y reyes ... como testimonio a ellos y a los gentiles». «Por causa de mí» y «como testimonio» funcionan bien. La nota sobre ἔθνη está bien formulada.'
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Gentiles» para ἔθνη sigue el criterio documentado, con nota alternativa «las naciones». No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión principal a corregir es estilístico-semántica en αὐτοῖς.
  issues:
  - severity: medium
    issue: «para ellos» para αὐτοῖς
    rationale: Aunque posible, «para ellos» en español inclina hacia beneficio o finalidad. El dativo griego se preserva con mayor neutralidad y naturalidad mediante «a ellos», en línea con el expediente inglés «to them».
  - severity: medium
    issue: La nota [a] ofrece «seréis arrastrados» como alternativa
    rationale: El expediente inglés reconoce «dragged»/«arrastrados» como posibilidad léxica pero la descarta para el texto por implicar violencia no explícita. Ponerla como nota destacada en español sobrecarga una alternativa que el audit trail no preservó como nota del lector.
  revised_spanish_text: Y seréis llevados ante gobernadores y reyes por causa de mí, como testimonio a ellos y a los gentiles[a].
  revised_footnotes:
  - marker: a
    text: 'O: «las naciones». En Mateo, ἔθνη suele referirse a los gentiles.'
    reason: lexical_alternative
  revision_rationale: Se ajusta αὐτοῖς de «para ellos» a «a ellos» para conservar la neutralidad del dativo y mejorar la naturalidad del español. Se elimina la nota sobre «arrastrados» porque introduce una fuerza no explicitada y no corresponde a una alternativa conservada en el aparato inglés para el lector. Se mantiene la nota sobre «las naciones», que sí refleja una alternativa léxica documentada.
