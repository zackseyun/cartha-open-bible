translation:
  language: es
  text: El que ama a padre o madre más que a mí no es digno de mí[a]; y el que ama a hijo o hija más que a mí no es digno de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por encima de mí». La frase griega ὑπὲρ ἐμέ expresa amar a alguien en preferencia a Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ φιλῶν
  english_pob_choice: the one who loves
  chosen_spanish: el que ama
  alternatives_spanish:
  - el que ama
  - quien ama
  lexicon: BDAG
  rationale: El artículo con participio presente funciona de manera sustantiva y designa a una persona caracterizada por esa acción. «El que ama» conserva el sentido genérico y suena natural en español bíblico moderno sin volverse arcaico.
- source_word: πατέρα ἢ μητέρα
  english_pob_choice: father or mother
  chosen_spanish: padre o madre
  alternatives_spanish:
  - su padre o su madre
  - un padre o una madre
  lexicon: BDAG
  rationale: Los objetos son sustantivos relacionales sin artículo; en español es más fiel y natural decir simplemente «padre o madre» sin añadir posesivos implícitos.
- source_word: ὑπὲρ ἐμέ
  english_pob_choice: more than me
  chosen_spanish: más que a mí
  alternatives_spanish:
  - por encima de mí
  - sobre mí
  lexicon: BDAG
  rationale: En este contexto comparativo, ὑπέρ expresa preferencia o mayor aprecio. «Más que a mí» comunica de forma idiomática la prioridad afectiva y evita una traducción literal extraña en español.
- source_word: οὐκ ἔστιν μου ἄξιος
  english_pob_choice: is not worthy of me
  chosen_spanish: no es digno de mí
  alternatives_spanish:
  - no es digno de pertenecerme
  - no es apto para mí
  lexicon: BDAG
  rationale: «Digno de mí» preserva la relación genitiva y la fuerza valorativa de ἄξιος sin ampliar el sentido hacia pertenencia o idoneidad, que serían interpretaciones secundarias.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - además
  lexicon: BDAG
  rationale: La coordinación simple refleja la estructura paralela repetida del versículo.
- source_word: υἱὸν ἢ θυγατέρα
  english_pob_choice: son or daughter
  chosen_spanish: hijo o hija
  alternatives_spanish:
  - su hijo o su hija
  - un hijo o una hija
  lexicon: BDAG
  rationale: Como en «padre o madre», los sustantivos relacionales se traducen directamente y sin posesivos no expresados en el griego.
theological_decisions:
- issue: La exigencia de lealtad a Jesús frente a los vínculos familiares más cercanos
  english_pob_reading: The verse is rendered as requiring supreme allegiance to Jesus over even closest family ties, without implying a denial of the goodness of family love itself.
  chosen_spanish_reading: El versículo exige una lealtad suprema a Jesús por encima incluso de los vínculos familiares más cercanos, sin negar con ello la bondad del amor familiar.
  alternative_spanish_readings:
  - No ama a Jesús lo suficiente
  - odia a su familia
  rationale: El griego expresa una prioridad comparativa («más que a mí») y un veredicto de indignidad («no es digno de mí»). La traducción conserva esa dureza disciplinaria sin debilitarla a una mera preferencia ni convertirla en odio familiar.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se registraron revisiones posteriores que alteraran el sentido base; se mantiene la concordancia alta del control cruzado y la lectura óptima equivalente del audit trail inglés.
  spanish_consistency_notes:
  - Se usa «mí» con preposición para mantener la comparación personal directa del griego.
  - Se conserva el paralelismo exacto entre las dos cláusulas.
  - Se evita «Cristo» porque el texto no usa Χριστός aquí y la referencia es explícitamente a Jesús.
  - Se mantiene «digno de mí» como equivalente idiomático de ἄξιος con genitivo personal.
