translation:
  language: es
  text: No adquieran oro ni plata ni cobre para sus cinturones[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bronce» para «cobre».
    reason: lexical_alternative
  - marker: b
    text: Es decir, dinero llevado en cinturones o bolsas de dinero usadas a la cintura.
    reason: cultural_note
lexical_decisions:
- source_word: μὴ κτήσησθε
  english_pob_choice: Do not acquire
  chosen_spanish: No obtengan
  alternatives_spanish:
  - No adquieran
  - No consigan
  - No compren
  lexicon: BDAG
  rationale: κτάομαι expresa adquirir u obtener para sí. En español, «No obtengan» comunica bien la prohibición sin volverla demasiado técnica; mantiene el sentido de procurarse algo para uso propio en este envío misionero.
- source_word: χρυσὸν
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro acuñado
  - dinero de oro
  lexicon: BDAG
  rationale: El término es material y directo. En el contexto de moneda o riqueza portátil, «oro» conserva la amplitud del original sin añadir precisión no presente en el griego.
- source_word: ἄργυρον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero de plata
  - plata acuñada
  lexicon: BDAG
  rationale: El griego nombra el metal, usado aquí como medio de pago. «Plata» es el equivalente natural en español y mantiene la serie oro/plata/cobre.
- source_word: χαλκὸν
  english_pob_choice: copper
  chosen_spanish: cobre
  alternatives_spanish:
  - bronce
  lexicon: BDAG
  rationale: χαλκός puede significar cobre o bronce. En una lista de metales monetarios, «cobre» es la opción más natural en español; «bronce» queda como alternativa posible.
- source_word: εἰς τὰς ζώνας ὑμῶν
  english_pob_choice: for your belts
  chosen_spanish: para sus cinturones
  alternatives_spanish:
  - en sus cinturones
  - en sus cinturones para dinero
  - en sus bolsas de cintura
  lexicon: BDAG
  rationale: ζώνη significa cinturón o faja. El POB inglés conserva «belts» con una nota cultural sobre bolsas o cinturones para dinero. En español, «cinturones» es claro y fiel; el contexto de portar dinero queda implícito por la nota.
translation_notes:
  revision_awareness: El registro inglés indica alta concordancia y no presenta revisiones aplicadas; la redacción española sigue de cerca esa lectura estable, manteniendo la lista de metales y el sentido idiomático de ζώνη sin expandirlo en el texto principal.
  spanish_consistency_notes:
  - Se mantiene el estilo directo e imperativo negativo acorde con el contexto misionero.
  - «Oro, plata y cobre» conserva la lista metálica del griego y del POB inglés.
  - «Cinturones» refleja ζώνας sin introducir un término más moderno que pudiera oscurecer la imagen original.
  - Las notas al pie preservan la alternativa léxica «bronce» y la explicación cultural sobre el uso de cinturones/bolsas para dinero.
