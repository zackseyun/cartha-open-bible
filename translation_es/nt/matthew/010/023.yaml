translation:
  language: es
  text: 'Pero cuando los persigan en esta ciudad, huyan a la otra[a]. Porque en verdad les digo[c][b]: no terminarán de recorrer las ciudades de Israel hasta que venga el Hijo del Hombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a otra ciudad'. El griego dice literalmente 'a la otra/otra [una]', y la palabra 'ciudad' se sobreentiende por la cláusula anterior.
    reason: lexical_alternative
  - marker: b
    text: O 'no terminarán las ciudades de Israel'. La forma 'no terminarán de recorrer' explicita la travesía misionera implícita en el contexto.
    reason: lexical_alternative
  - marker: c
    text: '''Hasta que venga el Hijo del Hombre'' se deja intencionalmente abierto. Los intérpretes discrepan si se refiere a la vindicación de Jesús, a una venida en juicio, o a su regreso final.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: whenever
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: La construcción introduce una condición temporal indefinida con valor repetible o potencial. En español, 'cuando' transmite bien ese sentido en una cláusula subordinada natural; 'cada vez que' sería más explícito, pero menos sobrio.
- source_word: διώκωσιν
  english_pob_choice: they persecute
  chosen_spanish: los persigan
  alternatives_spanish:
  - los persiguen
  - los hostiguen
  lexicon: BDAG
  rationale: El verbo aquí expresa persecución hostil en el contexto del envío misionero. 'Perseguir' conserva esa fuerza; el subjuntivo en español encaja con la subordinada temporal-condicional de ὅταν.
- source_word: πόλει ταύτῃ
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esa ciudad
  lexicon: BDAG
  rationale: El demostrativo es proximal; 'esta ciudad' mantiene la cercanía y la instrucción directa de Jesús.
- source_word: φεύγετε
  english_pob_choice: flee
  chosen_spanish: huyan
  alternatives_spanish:
  - escapen
  - salgan corriendo
  lexicon: BDAG
  rationale: El imperativo expresa salida urgente ante la persecución. 'Huyan' comunica la misma urgencia en español moderno sin sonar forzado.
- source_word: εἰς τὴν ἑτέραν
  english_pob_choice: to the next one
  chosen_spanish: a la otra
  alternatives_spanish:
  - a la otra ciudad
  - a la siguiente
  lexicon: BDAG
  rationale: El griego deja 'ciudad' implícita por el contexto inmediato. 'A la otra' preserva esa elipsis y evita añadir una aclaración que el texto no formula explícitamente.
- source_word: ἀμὴν
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - ciertamente
  - amén
  lexicon: BDAG
  rationale: Como fórmula solemne de autoridad, 'en verdad' es una equivalencia natural en español bíblico contemporáneo y mantiene el tono declarativo.
- source_word: οὐ μὴ τελέσητε
  english_pob_choice: you will certainly not finish going through
  chosen_spanish: no terminarán de recorrer
  alternatives_spanish:
  - de ningún modo terminarán
  - no acabarán de recorrer
  lexicon: BDAG
  rationale: La negación enfática οὐ μή requiere una fuerte seguridad negativa. 'No terminarán de recorrer' hace explícita la idea de completar el recorrido misionero por las ciudades, como en el audit trail inglés.
- source_word: τὰς πόλεις τοῦ Ἰσραήλ
  english_pob_choice: the cities of Israel
  chosen_spanish: las ciudades de Israel
  alternatives_spanish:
  - las ciudades de Israel
  lexicon: BDAG
  rationale: Se mantiene la referencia geográfica y étnico-covenantal sin reinterpretarla. La construcción genitiva se refleja de forma directa y natural.
- source_word: ἕως ἂν ἔλθῃ
  english_pob_choice: until ... comes
  chosen_spanish: hasta que venga
  alternatives_spanish:
  - hasta que llegue
  - hasta el momento en que venga
  lexicon: BDAG
  rationale: La construcción temporal se vierte con 'hasta que' + subjuntivo, la opción más natural en español para un límite futuro no especificado.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva la designación establecida y su resonancia bíblica/danielica. Traducirla literalmente evita perder su valor como título.
theological_decisions:
- issue: Sentido de 'hasta que venga el Hijo del Hombre'
  english_pob_reading: Retain the literal 'until the Son of Man comes' without specifying whether this refers to the resurrection, judgment on Jerusalem, or the final parousia.
  chosen_spanish_reading: Mantener literalmente 'hasta que venga el Hijo del Hombre' sin precisar si alude a la vindicación, al juicio, o a la venida final.
  alternative_spanish_readings:
  - hasta que el Hijo del Hombre venga en juicio sobre Jerusalén
  - hasta que el Hijo del Hombre venga en su vindicación
  - hasta que el Hijo del Hombre regrese al final
  rationale: El griego no determina de manera inequívoca el referente de la venida, y el audit trail inglés preserva deliberadamente esa tensión. La traducción española debe conservarla sin imponer una lectura escatológica específica en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión del texto fuente en que no se detectaron cambios necesarios (''unchanged: true''). Se mantuvo la solución del audit trail inglés: indefinición temporal en ὅταν, elipsis de ''ciudad'' en εἰς τὴν ἑτέραν, negación enfática de οὐ μὴ, y preservación de la ambigüedad teológica de ''el Hijo del Hombre''.'
  spanish_consistency_notes:
  - Se usa 'Hijo del Hombre' de forma uniforme como título cristológico.
  - Se evitó 'Señor' o 'Cristo' porque no aparecen en el versículo y no hay base textual para introducirlos.
  - '''En verdad'' reproduce el tono solemne de ἀμήν sin usar una transliteración innecesaria.'
  - '''A la otra'' conserva la elipsis del griego; la nota a aclara la alternativa explícita.'
  - '''No terminarán de recorrer'' mantiene la fuerza de οὐ μὴ τελέσητε y la imagen de itinerancia misionera.'
