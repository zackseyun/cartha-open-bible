revisions:
- from: Porque no sois vosotros los que habláis, sino el Espíritu de vuestro Padre, el que habla en vosotros[a].
  to: Porque no son ustedes los que hablan, sino el Espíritu de su Padre que habla en ustedes[a].
  rationale: Se ajustó el pronombre al español neutral latinoamericano («ustedes/su»), se suavizó una calca sintáctica innecesariamente rígida, y se mejoró la fluidez de la aposición participial sin perder el sentido del griego ni la tensión teológica preservada por «en ustedes».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:08:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: negación enfática de que los discípulos sean quienes hablan, contraste con el Espíritu, y conservación de «en vosotros» con nota alternativa. Sin embargo, la formulación española introduce una construcción algo pesada y menos natural («no sois vosotros los que habláis») y mezcla registro peninsular («vosotros», «vuestro») con el objetivo de español neutral latinoamericano.'
  spanish_quality_summary: La redacción es comprensible, pero no óptima para el estilo meta. «Porque no sois vosotros los que habláis» suena forzada en español general, y «el Espíritu de vuestro Padre, el que habla en vosotros» resulta algo trabado. Una formulación más natural y ampliamente legible es «Porque no son ustedes los que hablan, sino el Espíritu de su Padre que habla en ustedes[a]».
  glossary_alignment: «Espíritu» está bien capitalizado por contexto divino. No hay términos del glosario principal en conflicto salvo el uso de «vosotros/vuestro», que no encaja con la preferencia de español neutral latinoamericano. Se preserva correctamente «en» frente a «por medio de».
  issues:
  - severity: medium
    issue: Uso de «vosotros/vuestro» en un proyecto de español neutral latinoamericano
    rationale: Aunque no es incorrecto, contradice la meta estilística declarada de legibilidad amplia en América Latina. «Ustedes/su» es más adecuado para el proyecto.
  - severity: medium
    issue: 'Construcción poco natural: «no sois vosotros los que habláis»'
    rationale: Reproduce la estructura griega con exceso de literalidad. En español más natural y digno, «no son ustedes los que hablan» conserva el énfasis sin sonar rígido.
  - severity: low
    issue: 'Aposición algo torpe: «el Espíritu de vuestro Padre, el que habla en vosotros»'
    rationale: La frase es entendible, pero «que habla en ustedes» fluye mejor y sigue representando el participio articular en aposición sin ambigüedad problemática.
  revised_spanish_text: Porque no son ustedes los que hablan, sino el Espíritu de su Padre que habla en ustedes[a].
  revised_footnotes:
  - marker: a
    text: O «por medio de ustedes». El griego dice «en ustedes», lo cual también puede implicar habla expresada por medio de los discípulos.
    reason: alternative_reading
  revision_rationale: Se ajustó el pronombre al español neutral latinoamericano («ustedes/su»), se suavizó una calca sintáctica innecesariamente rígida, y se mejoró la fluidez de la aposición participial sin perder el sentido del griego ni la tensión teológica preservada por «en ustedes».
