translation:
  language: es
  text: Porque no son ustedes los que hablan, sino el Espíritu de su Padre que habla en ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de ustedes». El griego dice «en ustedes», lo cual también puede implicar habla expresada por medio de los discípulos.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For it is not
  chosen_spanish: Porque no sois
  alternatives_spanish:
  - pues no sois
  - porque no sois
  lexicon: BDAG
  rationale: γάρ introduce una explicación; en español, «Porque» comunica esa relación con naturalidad. La negación se conserva sin suavizarla.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: vosotros
  alternatives_spanish:
  - ustedes
  - vosotros mismos
  lexicon: BDAG
  rationale: El griego explícita y enfáticamente el pronombre. En español, «vosotros» mantiene el contraste directo con «sino» y la referencia plural sin añadir reflexividad no presente.
- source_word: ἐστε οἱ λαλοῦντες
  english_pob_choice: are speaking
  chosen_spanish: los que habláis
  alternatives_spanish:
  - estáis hablando
  - sois los que habláis
  lexicon: BDAG
  rationale: La construcción perifrástica con artículo y participio señala a los que realizan la acción. «Los que habláis» conserva ese valor identificador de manera idiomática en español.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Aquí hay contraste correctivo, no simple oposición. «Sino» reproduce mejor la fuerza del griego en español.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: El contexto apunta al Espíritu divino. La mayúscula en español refleja ese referente sin introducir contenido ajeno al texto.
- source_word: τοῦ πατρὸς ὑμῶν
  english_pob_choice: of your Father
  chosen_spanish: de vuestro Padre
  alternatives_spanish:
  - de vuestro Padre celestial
  - de vuestro padre
  lexicon: BDAG
  rationale: Se conserva la forma directa del griego. No se añade «celestial» porque no aparece en este versículo y sería una expansión no justificada por el texto fuente.
- source_word: τὸ λαλοῦν
  english_pob_choice: speaking
  chosen_spanish: el que habla
  alternatives_spanish:
  - hablando
  - que habla
  lexicon: BDAG
  rationale: El participio articular funciona en aposición al sustantivo «Espíritu». «El que habla» preserva la idea de acción verbal continua y su vínculo sintáctico con «Espíritu».
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en vosotros
  alternatives_spanish:
  - por medio de vosotros
  - a través de vosotros
  lexicon: BDAG
  rationale: La preposición ἐν significa primariamente «en». Aunque el contexto puede sugerir habla expresada mediante los discípulos, se conserva la lectura directa para no resolver de antemano la ambigüedad.
theological_decisions:
- issue: Si ἐν ὑμῖν debe interpretarse como presencia interior o como agencia instrumental
  english_pob_reading: in you
  chosen_spanish_reading: en vosotros
  alternative_spanish_readings:
  - por medio de vosotros
  - a través de vosotros
  rationale: La POB inglesa preserva la tensión con «in you» y nota la posibilidad de sentido instrumental. La versión española mantiene esa misma apertura semántica con «en vosotros» y deja la implicación contextual sin cerrarla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El ajuste editorial reciente en inglés buscó evitar que «speaking» pareciera modificar «Father» en vez de «Spirit». En español, la estructura «el Espíritu de vuestro Padre, el que habla en vosotros» mantiene la relación appositiva del participio con «Espíritu» y evita esa ambigüedad sin añadir puntuación innecesaria.
  spanish_consistency_notes:
  - Se conserva «Espíritu» con mayúscula por el referente divino explícito en el contexto.
  - Se usa «vosotros» para reflejar el plural explícito del griego; si esta sección se normalizara para una edición con voseo/ustedes, habría que revisar coherencia intratextual.
  - Se prefiere «sino» por contraste correctivo y «en vosotros» para mantener la preposición del texto fuente.
