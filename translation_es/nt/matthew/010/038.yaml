review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: la condición genérica («quien»), la imagen concreta de «su cruz», y el juicio relacional «no es digno de mí». Sin embargo, la expresión ἀκολουθεῖ ὀπίσω μου no queda bien representada por «sigue detrás de mí», porque en español suena física y algo torpe; el matiz explícito de ὀπίσω se conserva mejor con «me sigue» en el texto principal y una nota que indique literalmente «sigue detrás de mí / sigue tras mí».'
  spanish_quality_summary: El español es claro en general, pero «sigue detrás de mí» resulta poco idiomático y algo rígido en registro bíblico natural. Además, la nota b actual es defectuosa porque la alternativa y el texto principal repiten esencialmente la misma formulación, de modo que no comunica el contraste del inglés auditado. El resto del versículo es natural y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cruz», «Jesús» implícito por «mí», y «digno» están alineados. La decisión de usar «su» para αὐτοῦ es aceptable en español con la nota explicativa sobre el masculino singular genérico.
  issues:
  - severity: medium
    issue: «sigue detrás de mí» suena poco natural para ἀκολουθεῖ ὀπίσω μου
    rationale: Aunque intenta conservar ὀπίσω, en español contemporáneo esa formulación evoca principalmente posición espacial y no la expresión normal de discipulado. «Me sigue» es más idiomático, y el matiz más explícito puede preservarse en nota.
  - severity: medium
    issue: La nota b no funciona como nota alternativa real
    rationale: 'Dice: «O simplemente: “sigue detrás de mí”. El griego dice de manera más explícita “sigue detrás de mí”». Repite la misma idea en vez de contrastar un texto principal más idiomático con la formulación más literal del griego.'
  revised_spanish_text: Y quien no toma su cruz[a] y me sigue[b], no es digno de mí.
