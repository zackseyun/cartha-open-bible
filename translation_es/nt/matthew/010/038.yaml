    text: 'El griego usa una forma masculina singular con valor genérico: es decir, cada discípulo debe tomar su propia cruz.'
    reason: lexical_alternative
  - marker: b
    text: 'O más explícitamente: «sigue detrás de mí» o «sigue tras mí». El griego incluye la idea de seguir detrás.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase de seguimiento para que el español principal sea más natural y eclesialmente legible, mientras la nota preserva el matiz explícito de ὀπίσω. También se corrige la nota b para que realmente explique la diferencia entre la redacción idiomática española y la formulación más literal del griego.
