- from: Y quien no toma su cruz y sigue detrás de mí, no es digno de mí[a][b].
  to: Y quien no toma su cruz[a] y me sigue[b], no es digno de mí.
  rationale: Se ajusta la frase de seguimiento para que el español principal sea más natural y eclesialmente legible, mientras la nota preserva el matiz explícito de ὀπίσω. También se corrige la nota b para que realmente explique la diferencia entre la redacción idiomática española y la formulación más literal del griego.
