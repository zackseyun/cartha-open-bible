translation:
  language: es
  text: Y quien no toma su cruz[a] y me sigue[b], no es digno de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa una forma masculina singular con valor genérico: es decir, cada discípulo debe tomar su propia cruz.'
    reason: lexical_alternative
  - marker: b
    text: 'O más explícitamente: «sigue detrás de mí» o «sigue tras mí». El griego incluye la idea de seguir detrás.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: whoever
  chosen_spanish: quien
  alternatives_spanish:
  - el que
  - quienquiera que
  lexicon: BDAG
  rationale: El relativo indefinido griego expresa una generalización aplicable a cualquier discípulo. «Quien» conserva esa fuerza general y suena natural en español.
- source_word: λαμβάνει
  english_pob_choice: take up
  chosen_spanish: toma
  alternatives_spanish:
  - toma sobre sí
  - levanta
  - recibe
  lexicon: BDAG
  rationale: En este contexto de σταυρός, la idea es asumir voluntariamente una carga/disposición, pero el español puede expresar bien el acto con «tomar» sin añadir perífrasis innecesarias. El sentido de 'tomar sobre sí' queda implícito por el objeto «su cruz» y la nota.
- source_word: σταυρὸν
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - instrumento de ejecución
  - madero
  lexicon: BDAG
  rationale: «Cruz» es la equivalencia estable y más inteligible en el contexto de discipulado y pasión; conserva la carga histórica y teológica del término griego.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - la propia
  - suya
  - de él
  lexicon: BDAG
  rationale: El griego usa un masculino singular genérico. En español, «su» transmite el referente posesivo sin forzar una especificación de género en la oración, y deja abierta la nota sobre el valor genérico.
- source_word: ἀκολουθεῖ ὀπίσω μου
  english_pob_choice: follow after me
  chosen_spanish: sigue detrás de mí
  alternatives_spanish:
  - sigue después de mí
  - me sigue
  - va tras de mí
  lexicon: BDAG
  rationale: La combinación ἀκολουθέω + ὀπίσω añade explícitamente la noción de ir detrás. «Sigue detrás de mí» conserva mejor esa precisión que un simple «sígueme».
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  - merecedor de
  lexicon: BDAG
  rationale: En español bíblico, «digno» comunica adecuadamente el juicio relacional y evaluativo de ἄξιος. Mantiene la solemnidad sin diluirla en un lenguaje más abstracto.
- source_word: μου ἄξιος
  english_pob_choice: worthy of me
  chosen_spanish: digno de mí
  alternatives_spanish:
  - digno para mí
  - apto para mí
  - merecedor de mí
  lexicon: BDAG
  rationale: La construcción con genitivo se expresa de forma natural como «de mí». Esto preserva la relación personal de lealtad exigida por el dicho.
theological_decisions:
- issue: La imagen concreta de la cruz en el discipulado
  english_pob_reading: Retain the concrete image 'take up his cross' as a call to costly allegiance and willingness for suffering/shame in following Jesus.
  chosen_spanish_reading: Conservar la imagen concreta de «tomar su cruz» como llamado a la lealtad costosa y a la disposición a sufrir o soportar vergüenza al seguir a Jesús.
  alternative_spanish_readings:
  - aceptar sufrimiento
  - abrazar la abnegación
  rationale: El griego presenta una imagen concreta que no debe reducirse a una paráfrasis abstracta. «Tomar su cruz» mantiene la fuerza histórica y teológica del símbolo.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Pronombre posesivo masculino singular genérico en αὐτοῦ
  english_pob_reading: Render as 'his' rather than a gender-neutral substitute.
  chosen_spanish_reading: Traducirlo con «su» y explicitar en nota que el griego usa una forma masculina singular con valor genérico.
  alternative_spanish_readings:
  - su propia
  - de él
  - de la persona
  rationale: El español requiere menos marcación de género en este punto, pero la nota conserva la observación del texto fuente. Así no se borra la forma gramatical del griego.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran acuerdo alto y no registran revisiones aplicadas; por eso la redacción española conserva la imagen concreta, la fuerza del relativo indefinido y la explicitación de ὀπίσω sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantuvo «cruz» para σταυρός conforme al uso pactual y narrativo del evangelio, en lugar de términos explicativos más largos.
  - «Digno de mí» conserva la relación personal del genitivo sin convertirla en una formulación doctrinalmente más amplia.
  - La nota sobre el posesivo genérico se formula de modo que no dependa del inglés, sino del valor gramatical del griego.
  - Se optó por «sigue detrás de mí» para reflejar ὀπίσω, aunque «sígueme» sería posible en una traducción menos explícita.
