translation:
  language: es
  text: El que los recibe a ustedes me recibe a mí[a], y el que me recibe a mí recibe al que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acoge»; el verbo griego puede significar recibir, aceptar o dar la bienvenida, especialmente en el sentido de recibir a un mensajero.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ δεχόμενος
  english_pob_choice: The one who receives
  chosen_spanish: El que recibe
  alternatives_spanish:
  - Quien recibe
  - El que acoge
  lexicon: BDAG
  rationale: El participio con artículo funciona como sustantivo general; «el que» conserva bien la fuerza singular genérica y suena natural en español. Se mantiene «recibe» para reflejar la repetición léxica de δέχομαι.
- source_word: δέχομαι / δέχεται
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - acoge
  - acepta
  lexicon: BDAG
  rationale: «Recibe» preserva la cadena verbal repetida en el dicho y puede incluir el matiz de hospitalidad o aceptación. «Acoge» o «acepta» estrechan demasiado el campo semántico en este contexto.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los recibe
  alternatives_spanish:
  - os recibe
  - les recibe
  lexicon: BDAG
  rationale: El griego se refiere a un plural; en español, el objeto plural puede expresarse de forma natural sin marcar número explícitamente aquí. El contexto deja claro que se trata de los discípulos.
- source_word: ἐμέ
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre de primera persona singular referido a Jesús; «me» es directo y fiel al valor del objeto en la cadena de identificación.
- source_word: τὸν ἀποστείλαντά με
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me mandó
  - al que me ha enviado
  lexicon: BDAG
  rationale: El participio aoristo con artículo funciona sustantivamente; «al que me envió» es claro, natural y mantiene la referencia personal sin añadir explícitamente «Padre» al texto principal.
theological_decisions:
- issue: Identidad del que envía a Jesús
  english_pob_reading: Render generically as 'the one who sent me' without inserting 'the Father' into the main text.
  chosen_spanish_reading: Traducir «al que me envió» sin insertar «el Padre» en el texto principal.
  alternative_spanish_readings:
  - al Padre que me envió
  rationale: El contexto mateano permite la identificación con el Padre, pero el griego dice solo «el que me envió». Mantener esa formulación preserva la precisión textual y evita introducir una aclaración interpretativa en el cuerpo del verso.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones; se conserva la repetición de δέχομαι y la referencia genérica al remitente de Jesús sin ampliarla en el texto principal.
  spanish_consistency_notes:
  - Se usa «recibe» de forma uniforme para δέχομαι/δέχεται a fin de conservar la repetición retórica.
  - Se evita «Cristo» y «SEÑOR» porque el pasaje no los exige; el sujeto explícito es Jesús en primera persona.
  - La nota léxica marca la alternativa semántica «acoge» para reflejar el rango de δέχομαι sin perder la opción principal.
