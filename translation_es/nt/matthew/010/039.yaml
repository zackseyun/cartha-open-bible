translation:
  language: es
  text: El que encuentra su vida[a] la perderá, y el que pierde su vida por mi causa la hallará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma» en ambas cláusulas; ψυχή en griego puede significar «vida» o «alma», pero aquí «vida» encaja mejor con el contexto de perder y hallar la propia vida en el discipulado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εὑρὼν
  english_pob_choice: The one who finds
  chosen_spanish: El que encuentra
  alternatives_spanish:
  - Quien encuentra
  - El que halla
  lexicon: BDAG
  rationale: La construcción con artículo + participio aoristo funciona de modo sustantivado y de valor general. En español, «El que» conserva bien el singular genérico sin sonar arcaico. «Encuentra» mantiene el paralelismo con «hallará» en la segunda mitad del versículo.
- source_word: ψυχὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: BDAG
  rationale: 'En este dicho sobre perder y ganar en el discipulado, ψυχή apunta mejor a la vida propia que a un “alma” separada del cuerpo. «Vida» preserva la paradoja y la correspondencia verbal con «perder» y «hallar». '
- source_word: ἀπολέσει
  english_pob_choice: will lose
  chosen_spanish: la perderá
  alternatives_spanish:
  - la destruirá
  - la hará perecer
  lexicon: BDAG
  rationale: Aquí ἀπόλλυμι expresa pérdida, no la idea principal de destrucción física. «Perderá» conserva el contraste con «hallará» y suena natural en español.
- source_word: ὁ ἀπολέσας
  english_pob_choice: the one who loses
  chosen_spanish: el que pierde
  alternatives_spanish:
  - quien pierde
  - el que ha perdido
  lexicon: BDAG
  rationale: Aunque el participio es aoristo, en un proverbio de sentido general el español suele usar presente gnómico. «El que pierde» mantiene el paralelismo con la primera cláusula y el ritmo proverbial.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: for my sake
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - por mi causa
  - por amor a mí
  lexicon: BDAG
  rationale: ἕνεκεν con genitivo indica motivo o causa. «Por causa de mí» reproduce con bastante literalidad esa relación y deja claro que el motivo es Jesús mismo. «Por mi causa» es posible, pero en español puede sonar algo menos directo en este contexto.
- source_word: εὑρήσει
  english_pob_choice: will find
  chosen_spanish: la hallará
  alternatives_spanish:
  - la encontrará
  - la ganará
  lexicon: BDAG
  rationale: «Hallará» conserva la correspondencia verbal con la primera cláusula y permite un registro bíblico claro sin caer en formulación mecánica. «Encontrará» también sería posible, pero «hallará» ofrece mejor paralelismo estilístico aquí.
- source_word: αὐτοῦ / αὐτήν
  english_pob_choice: his / it
  chosen_spanish: su / la
  alternatives_spanish:
  - su / ella
  - su / lo
  lexicon: Greek grammar
  rationale: El griego usa masculino singular con sentido representativo. En español, «su vida» expresa de modo natural la posesión y «la» retoma ese sustantivo femenino. No se neutraliza el referente con un plural genérico porque el proverbio mantiene forma singular.
theological_decisions:
- issue: Sentido de ψυχή en un dicho de discipulado
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: El contexto habla de conservar o perder la propia vida en lealtad a Jesús. «Vida» mantiene la tensión teológica entre autopreservación y autoentrega; «alma» queda como alternativa semántica tradicional, pero no es la mejor lectura contextual principal aquí.
  doctrine_reference: Translation philosophy §§3, 4, 5
- issue: Relación de causa y lealtad en ἕνεκεν ἐμοῦ
  english_pob_reading: for my sake
  chosen_spanish_reading: por causa de mí
  alternative_spanish_readings:
  - por mi causa
  - por amor a mí
  rationale: La frase destaca que la pérdida de la vida ocurre por lealtad a Jesús, no por mera circunstancia accidental. «Por causa de mí» conserva la fuerza causal/persona-centrista del griego y evita suavizar el vínculo discipular.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y coincide con la decisión auditada de la POB inglesa de traducir ψυχή como «life/vida» en este contexto. Se preserva la simetría verbal entre εὑρὼν / εὑρήσει mediante «encuentra / hallará», y la tensión semántica de ψυχή se mantiene en la nota. No se introdujeron revisiones textuales ni cambios respecto del testimonio fuente.
  spanish_consistency_notes:
  - Se prefirió «vida» para ψυχή en coherencia con el uso contextual de Mateo 10 y para evitar una lectura excesivamente espiritualizada de «alma».
  - Se mantuvo la repetición léxica entre «encuentra» y «hallará» para reflejar la correspondencia del griego entre εὑρίσκω en ambas cláusulas.
  - «Por causa de mí» conserva el sentido causal y cristocéntrico de ἕνεκεν ἐμοῦ sin añadir explicación interpretativa.
