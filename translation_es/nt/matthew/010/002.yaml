translation:
  language: es
  text: 'Ahora bien, estos son los nombres de los doce apóstoles: primero[a], Simón llamado Pedro y Andrés su hermano; Jacobo, el hijo de Zebedeo, y Juan su hermano,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el primero», con posible matiz de prominencia entre los doce, no solo de orden en la lista.
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ introduce una transición suave al listado de los apóstoles. «Ahora bien» conserva ese avance discursivo con naturalidad en español sin forzar una secuencia temporal fuerte.
- source_word: δώδεκα ἀποστόλων
  english_pob_choice: the twelve apostles
  chosen_spanish: los doce apóstoles
  alternatives_spanish:
  - los doce emisarios
  - los doce mensajeros
  lexicon: BDAG
  rationale: ἀπόστολος se mantiene como «apóstol» por ser el término establecido y exacto en este contexto de la misión de Jesús. «Emisarios» es semánticamente posible, pero menos reconocido en español eclesial.
- source_word: τὰ ὀνόματά ἐστιν ταῦτα
  english_pob_choice: these are the names
  chosen_spanish: estos son los nombres
  alternatives_spanish:
  - sus nombres son estos
  - los nombres son estos
  lexicon: BDAG
  rationale: La estructura demostrativa se conserva de manera natural en español. «Estos son los nombres» reproduce el orden y el sentido sin calco pesado.
- source_word: πρῶτος
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - el primero
  - en primer lugar
  lexicon: BDAG
  rationale: En una enumeración española, «primero» es la forma más natural y directa para πρῶτος. Mantiene abierta la posible matiz de prioridad sin convertirlo en una afirmación explícita de rango.
- source_word: ὁ λεγόμενος
  english_pob_choice: who is called
  chosen_spanish: llamado
  alternatives_spanish:
  - que es llamado
  - que era llamado
  lexicon: BDAG
  rationale: El participio se vierte de forma concisa como «llamado», que en español comunica claramente la identificación nominal de Simón como Pedro.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  lexicon: BDAG
  rationale: Nombre propio en forma habitual en español, siguiendo la convención del proyecto para nombres personales.
- source_word: ὁ ἀδελφὸς αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: BDAG
  rationale: La relación de parentesco es literal; el posesivo español expresa con naturalidad la referencia pronominal que en griego está implícita en αὐτοῦ.
- source_word: ὁ τοῦ Ζεβεδαίου
  english_pob_choice: the son of Zebedee
  chosen_spanish: el hijo de Zebedeo
  alternatives_spanish:
  - el de Zebedeo
  lexicon: BDAG
  rationale: La construcción genitiva se explicita en español como filiación. «El hijo de Zebedeo» expresa con claridad lo que el griego da por supuesto.
theological_decisions:
- issue: Sentido de πρῶτος aplicado a Simón
  english_pob_reading: Rendered as sequential 'first' in the list without making an explicit doctrinal claim about primacy of authority.
  chosen_spanish_reading: «primero» en la lista, sin afirmar explícitamente primacía de autoridad.
  alternative_spanish_readings:
  - «el primero» con matiz de prominencia
  - «principal»
  rationale: El griego permite un valor secuencial y también una posible sugerencia de prominencia. La traducción principal conserva la lectura más directa, y la nota preserva la tensión interpretativa sin imponer una conclusión doctrinal.
  doctrine_reference: Translation philosophy §3; afirmaciones no sectarias dentro de la ortodoxia ecuménica
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la revisión más reciente y no mostró cambios aplicados; el borrador español sigue esa línea, conservando la decisión de πρῶτος con nota alternativa y sin añadir elaboraciones ajenas al griego.
  spanish_consistency_notes:
  - Se mantiene «apóstoles» como término técnico establecido.
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «llamado Pedro» respeta el identificador griego ὁ λεγόμενος χωρίς sobrerreformular.
  - «su hermano» conserva la referencia relacional directa sin añadir ambigüedad.
  - «hijo de Zebedeo» explicita la filiación implícita en el genitivo griego.
