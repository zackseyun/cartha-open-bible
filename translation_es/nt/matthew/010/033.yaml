translation:
  language: es
  text: Pero todo el que me niegue delante de los hombres[a], yo también lo negaré delante de mi Padre que está en los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante la gente». El griego usa un plural masculino con fuerza genérica.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «que está en los cielos». El griego usa el plural «cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: ὅστις introduce una condición general e indefinida. En español, «cualquiera que» conserva ese valor universal de manera natural y clara.
- source_word: δ’ ἂν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca contraste con el contexto previo; «Pero» mantiene ese giro adversativo de forma directa en español.
- source_word: ἀρνήσηταί με
  english_pob_choice: denies me
  chosen_spanish: me niegue
  alternatives_spanish:
  - me reniegue
  - me desocnozca
  lexicon: BDAG
  rationale: ἀρνέομαι aquí tiene el sentido de negar o repudiar a una persona. «Negar» preserva el paralelismo con la segunda ocurrencia del verbo en la cláusula siguiente.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante la gente
  - delante de las personas
  lexicon: BDAG
  rationale: ἔμπροσθεν significa «delante de / en presencia de». Se conserva «los hombres» porque el plural masculino griego tiene fuerza genérica; la alternativa inclusiva queda reflejada en nota.
- source_word: ἀρνήσομαι
  english_pob_choice: will deny
  chosen_spanish: lo negaré
  alternatives_spanish:
  - lo repudiaré
  - lo desconoceré
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo básico en español para reproducir la correspondencia recíproca del griego entre negar a Jesús y ser negado por él.
- source_word: κἀγὼ αὐτὸν
  english_pob_choice: I also will deny him
  chosen_spanish: yo también lo negaré
  alternatives_spanish:
  - también yo lo negaré
  - yo asimismo lo negaré
  lexicon: BDAG
  rationale: 'κἀγώ añade énfasis de reciprocidad: «yo también». El pronombre «lo» mantiene la referencia personal masculina implícita en αὐτόν.'
- source_word: τοῦ πατρός μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi Padre celestial
  - el Padre mío
  lexicon: BDAG
  rationale: La designación filial se traduce con la forma natural y reverente «mi Padre», sin expandir más de lo que el texto dice.
- source_word: τοῦ ἐν οὐρανοῖς
  english_pob_choice: who is in heaven
  chosen_spanish: que está en los cielos
  alternatives_spanish:
  - que está en el cielo
  - que está en los cielos
  lexicon: BDAG
  rationale: El griego usa el plural «en los cielos». Se conserva esa pluralidad con «los cielos»; la opción singular queda marcada como alternativa idiomática, pero no se adopta en el texto principal.
theological_decisions:
- issue: Forma genérica de ἀνθρώπων y αὐτόν
  english_pob_reading: before men ... deny him
  chosen_spanish_reading: delante de los hombres ... lo negaré
  alternative_spanish_readings:
  - delante de la gente ... lo negaré
  - delante de las personas ... lo negaré
  rationale: Se conserva la forma masculina genérica del griego para no borrar la huella gramatical del texto; en español se entiende con valor representativo, como en la lectura inglesa auditada.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Correspondencia recíproca del verbo ἀρνέομαι
  english_pob_reading: denies me ... I also will deny him
  chosen_spanish_reading: me niegue ... lo negaré
  alternative_spanish_readings:
  - me reniegue ... lo renegaré
  - me desocnozca ... lo desconoceré
  rationale: La repetición del mismo verbo subraya una respuesta judicial y pública de correspondencia. Mantener «negar» en ambos miembros preserva la simetría retórica y teológica del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: 'El texto coincide con la decisión inglesa auditada: mantener el paralelismo de ἀρνέομαι con «negar», conservar la fuerza genérica masculina de ἀνθρώπων, y reflejar el plural de οὐρανοῖς en «los cielos» sin necesidad de revisión adicional.'
  spanish_consistency_notes:
  - Se prefirió «Pero» para conservar el contraste adversativo de δέ.
  - «Delante de» traduce ἔμπροσθεν con naturalidad y mantiene el matiz de presencia pública.
  - «Mi Padre» sigue el registro reverente del pasaje sin añadir explicaciones implícitas.
  - El orden «yo también lo negaré» preserva la reciprocidad y la claridad en español.
  - Se evitó «SEÑOR» u otras sustituciones porque aquí no aparece κύριος ni el tetragrama.
