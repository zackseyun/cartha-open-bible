translation:
  language: es
  text: Y enemigos del hombre serán los de su propia casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los miembros de su casa». El griego usa ἄνθρωπος en singular masculino de manera representativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y también
  lexicon: BDAG
  rationale: La conjunción coordina esta cláusula con el contexto anterior; «Y» conserva la conexión simple sin añadir matiz interpretativo.
- source_word: ἐχθροὶ
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - hostiles
  - adversarios
  lexicon: BDAG
  rationale: El adjetivo sustantivado plural expresa quienes están en oposición hostil. «Enemigos» es la equivalencia natural y suficientemente fuerte en español.
- source_word: τοῦ ἀνθρώπου
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de una persona
  - de alguien
  lexicon: BDAG
  rationale: El genitivo se expresa de forma natural en español con «del hombre». Se mantiene el masculino singular representativo del griego ἄνθρωπος, sin neutralizarlo innecesariamente.
- source_word: οἱ οἰκιακοὶ αὐτοῦ
  english_pob_choice: those of his own household
  chosen_spanish: los de su propia casa
  alternatives_spanish:
  - los miembros de su casa
  - su propia familia
  - los de su hogar
  lexicon: BDAG
  rationale: οἰκιακοί designa a los que pertenecen a la casa u hogar, no simplemente al edificio. «Los de su propia casa» preserva la relación de pertenencia y la fuerza de αὐτοῦ, y resulta idiomático en español.
theological_decisions:
- issue: Lenguaje masculino representativo en ἄνθρωπος
  english_pob_reading: a man's
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de una persona
  - de alguien
  rationale: El griego usa el singular masculino ἄνθρωπος de manera representativa en un dicho general. La traducción conserva esa forma masculina en lugar de neutralizarla, manteniendo la correspondencia con el texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El testigo inglés POB mantiene el texto sin revisiones aplicadas y con acuerdo alto del revisor; esta propuesta sigue esa lectura y ajusta únicamente la formulación al español, preservando el sentido relacional de οἰκιακοί y el masculino representativo de ἄνθρωπος.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones ajenas al pasaje, porque aquí no hay divino nombre ni κύριος.
  - «casa» se usa en sentido de hogar/household, no como edificio físico.
  - La nota mantiene la alternativa relevante que en inglés distinguía entre «household» y «members of his household».
