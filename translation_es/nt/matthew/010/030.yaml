revisions:
- from: Pero aun los cabellos de vuestra cabeza todos están contados[a].
  to: Pero aun todos los cabellos de la cabeza de ustedes están contados[a].
  rationale: Se reemplaza 'vuestra' por 'de ustedes' para ajustarse al español neutral latinoamericano. Se reordena la frase para que 'todos' modifique con claridad a 'los cabellos' sin sonar rígido. Se conserva 'aun' por su valor enfático y 'están contados' por el sentido estativo del perfecto pasivo. La nota se mantiene, pero con redacción y puntuación más naturales en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:04:54Z'
