translation:
  language: es
  text: Pero aun todos los cabellos de la cabeza de ustedes están contados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "han sido contados". El perfecto pasivo griego puede enfatizar una acción completada con un resultado vigente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: vuestra
  alternatives_spanish:
  - de ustedes
  - sus
  lexicon: BDAG
  rationale: El genitivo plural posesivo se expresa de manera natural con 'vuestra' para mantener la referencia directa a los discípulos en un registro bíblico claro y sobrio.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: '''Pero'' preserva el leve giro discursivo y la transición desde la afirmación anterior sin volverla más fuerte de lo que exige el griego.'
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: BDAG
  rationale: Aquí καὶ tiene fuerza enfática; 'aun' comunica que se trata de algo tan pequeño como los cabellos, sin añadir una explicación interpretativa.
- source_word: αἱ τρίχες
  english_pob_choice: the hairs
  chosen_spanish: los cabellos
  alternatives_spanish:
  - los pelos
  - las hebras
  lexicon: BDAG
  rationale: '''Cabellos'' es el equivalente natural y digno en español para el conjunto de hair strands del contexto, y conserva la imagen concreta mejor que ''pelos''.'
- source_word: τῆς κεφαλῆς
  english_pob_choice: of your head
  chosen_spanish: de vuestra cabeza
  alternatives_spanish:
  - sobre vuestra cabeza
  - de la cabeza
  lexicon: BDAG
  rationale: La construcción genitiva se rinde de forma directa con 'de vuestra cabeza', manteniendo la relación posesiva e imagen corporal del texto.
- source_word: πᾶσαι
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: El adjetivo plural enfatiza totalidad; 'todos' conserva esa fuerza de manera breve y natural en español.
- source_word: ἠριθμημέναι εἰσίν
  english_pob_choice: are numbered
  chosen_spanish: están contados
  alternatives_spanish:
  - han sido contados
  - están numerados
  lexicon: BDAG
  rationale: El perfecto pasivo perifrástico expresa un estado resultante de acción completada. 'Están contados' suena natural en español y preserva el valor estativo sin forzar un calco de 'numerados'.
theological_decisions:
- issue: Valor del perfecto pasivo griego y su implicación teológica
  english_pob_reading: '''are numbered'' with a footnoted alternative ''have been numbered.'' The translation preserves the stative sense and lets the theological implication arise from context.'
  chosen_spanish_reading: '''están contados'' con nota sobre la posibilidad ''han sido contados''.'
  alternative_spanish_readings:
  - han sido contados
  - están numerados
  rationale: El griego puede leerse como estado presente derivado de una acción completa. En español, 'están contados' comunica bien ese resultado actual, mientras que la nota preserva la alternativa formal sin resolver en exceso la tensión aspectual.
  doctrine_reference: Preservar la tensión aspectual y la afirmación concreta del texto sin ampliarla doctrinalmente.
translation_notes:
  revision_awareness: El pasaje presenta un alto acuerdo en la revisión comparada y no muestra cambios aplicados en la última pasada; por eso se mantiene una solución sobria y directamente alineada con el valor aspectual del griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''aun'' se emplea con valor enfático, no concesivo.'
  - '''cabellos'' se prefiere por naturalidad y dignidad, evitando ''pelos'' en este registro.'
