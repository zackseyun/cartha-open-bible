review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: entrega hostil, prohibición de inquietarse, doble interrogativa (''cómo o qué''), pasivo implícito (''se les dará'') y referencia temporal (''en aquella hora''). Sin embargo, no preserva con precisión el valor modal/subjuntivo de λαλήσητε al usar ''hablarán'', que en español suena a futuro indicativo más que a discurso contemplado. Además, la combinación ''qué hablar'' es poco natural en español y debilita la legibilidad del pasaje.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero mezcla registros pronominales: ''os entreguen'' con ''no se preocupen'' y ''se les dará''. Para español neutral y eclesial amplio conviene unificar en ''los/les''. También ''qué hablar'' suena forzado; ''qué decir'' es mucho más idiomático, y el cambio es aceptable porque en español repetir ''hablar'' aquí produce torpeza innecesaria.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo el tratamiento del pasivo divino, que el borrador conserva correctamente con 'se les dará'. No hay conflicto con Yahvé/Mesías/etc. Sí conviene ajustar la forma verbal por fidelidad al valor contemplativo del griego y por naturalidad del español.
  issues:
  - severity: medium
    issue: Mezcla de pronombres y registro ('os entreguen' / 'se preocupen' / 'se les dará').
    rationale: El objetivo es español neutral latinoamericano y ampliamente legible; combinar voseo/vosotros con formas de ustedes crea inconsistencia estilística innecesaria.
  - severity: high
    issue: '''hablarán'' no representa bien λαλήσητε en pregunta indirecta.'
    rationale: El griego contempla lo que habrán de decir, no enuncia simplemente un futuro indicativo. En español, 'qué dirán' o 'qué deben decir' funciona mejor que 'qué hablarán'.
  - severity: medium
    issue: '''qué hablar'' es poco idiomático en español.'
    rationale: Aunque intenta conservar la repetición de λαλέω, en español resulta duro y menos claro. 'Qué decir' preserva el sentido sin paráfrasis excesiva.
  - severity: low
    issue: La nota [a] ('los entreguen') duplica una mejora que puede incorporarse al texto principal.
    rationale: Si se revisa el texto a registro neutral, la nota alternativa deja de aportar una variante sustancial.
  revised_spanish_text: Pero cuando los entreguen, no se preocupen por cómo o qué dirán,[a] porque en aquella hora se les dará lo que han de decir.[b]
