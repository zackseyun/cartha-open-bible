    text: El pasivo «se les dará» deja implícito al dador; el versículo siguiente identifica al Espíritu como quien habla por medio de ellos.
    reason: cross_reference
  revision_rationale: Se revisa para unificar el registro en español neutral ('los/les'), corregir la representación demasiado futura de 'hablarán', y reemplazar la expresión poco natural 'qué hablar' por una formulación idiomática y fiel. También se conserva la nota sobre el pasivo implícito, alineada con el POB inglés, y se adapta la alternativa de la primera mitad del versículo a un español más natural.
