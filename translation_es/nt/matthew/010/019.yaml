translation:
  language: es
  text: Pero cuando los entreguen, no se preocupen por cómo o qué dirán,[a] porque en aquella hora se les dará lo que han de decir.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cómo han de hablar o qué han de decir». El griego distingue la manera de hablar y el contenido de lo dicho.'
    reason: lexical_alternative
  - marker: b
    text: El pasivo «se les dará» deja implícito al dador; el versículo siguiente identifica al Espíritu como quien habla por medio de ellos.
    reason: cross_reference
lexical_decisions:
- source_word: ὅταν δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Cuando
  lexicon: BDAG
  rationale: δέ funciona como una transición suave desde la advertencia anterior; en español, «Pero cuando» reproduce bien ese giro contextual sin volver pesada la frase. ὅταν expresa una contingencia futura indefinida, por lo que «cuando» conserva el sentido abierto.
- source_word: παραδῶσιν
  english_pob_choice: hand ... over
  chosen_spanish: os entreguen
  alternatives_spanish:
  - os entreguen en manos de
  - os pongan en manos de
  - os traicionen
  lexicon: BDAG
  rationale: El verbo παραδίδωμι en este contexto judicial/persecutorio es «entregar». Elegí una forma impersonal y directa, «os entreguen», porque en español mantiene la acción hostil sin añadir la carga específica de «traicionen», que sería demasiado precisa para el verbo aquí.
- source_word: μὴ μεριμνήσητε
  english_pob_choice: do not worry
  chosen_spanish: no se preocupen
  alternatives_spanish:
  - no estén ansiosos
  - no se angustien
  - no se preocupen de
  lexicon: BDAG
  rationale: μεριμνάω aquí prohíbe la inquietud ansiosa ante el testimonio. «No se preocupen» es natural en español actual y conserva la amplitud de la advertencia sin estrecharla solo a una emoción extrema.
- source_word: πῶς ἢ τί
  english_pob_choice: how or what
  chosen_spanish: por cómo o qué
  alternatives_spanish:
  - acerca de cómo o qué
  - sobre cómo o qué
  - cómo o qué
  lexicon: BDAG
  rationale: La pregunta doble distingue modo y contenido. En español, añadir «por» ayuda a expresar el ámbito de la preocupación («por cómo o qué hablarán») sin alterar la relación interrogativa original. «O» refleja ἤ con fidelidad.
- source_word: λαλήσητε
  english_pob_choice: you should speak
  chosen_spanish: hablarán
  alternatives_spanish:
  - dirán
  - hablen
  - deben hablar
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la construcción indirecta puede sonar forzado en español si se vuelve demasiado literal. «Hablarán» mantiene la referencia al acto de hablar dentro de la preocupación anticipada; el contexto ya deja claro que se trata de lo que deberán decir en juicio.
- source_word: δοθήσεται
  english_pob_choice: will be given
  chosen_spanish: se les dará
  alternatives_spanish:
  - les será dado
  - les darán
  - Dios les dará
  lexicon: BDAG
  rationale: El pasivo futuro conserva la agencia implícita del original. «Se les dará» mantiene ese pasivo sin nombrar explícitamente al dador, respetando la reserva del texto y evitando resolver en español lo que el griego deja tácito.
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  english_pob_choice: in that hour
  chosen_spanish: en aquella hora
  alternatives_spanish:
  - en ese momento
  - a esa hora
  - entonces
  lexicon: BDAG
  rationale: «Aquella hora» reproduce con naturalidad el valor temporal puntual de ἐν ἐκείνῃ τῇ ὥρᾳ. «Hora» conserva el matiz bíblico de ocasión crítica, sin recurrir a una paráfrasis más general como «momento».
- source_word: τί λαλήσητε
  english_pob_choice: what you should speak
  chosen_spanish: qué hablar
  alternatives_spanish:
  - qué decir
  - qué deben hablar
  - qué han de hablar
  lexicon: BDAG
  rationale: Repetí el verbo de habla para sostener la coherencia léxica de λαλέω. En español, «qué hablar» dentro de una pregunta indirecta suena algo condensado, pero es comprensible y preserva el enlace con «hablarán»; la alternativa más idiomática sería «qué decir», aunque debilita la repetición verbal del griego.
theological_decisions:
- issue: Pasivo divino implícito en δοθήσεται
  english_pob_reading: Retain the passive 'will be given' without explicitly naming God or the Spirit in the main text.
  chosen_spanish_reading: Mantener «se les dará» sin nombrar al dador en el texto principal.
  alternative_spanish_readings:
  - Dios se los dará
  - el Espíritu se los dará
  - se les dará por Dios
  rationale: El griego usa pasivo y no identifica aquí al dador. En la línea del POB inglés, conservar el pasivo en español evita resolver prematuramente la agencia divina, que el contexto inmediato aclarará en el versículo siguiente.
  doctrine_reference: Preservar la tensión textual en vez de explicarla antes de tiempo.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requiere cambio adicional respecto del criterio del audit trail inglés. Se conserva el pasivo divino y el encuadre de contingencia futura, con español natural y fiel al original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrama.
  - Se evita «Cristo» porque no aparece el título Χριστός en este versículo.
  - Se preserva el pasivo impersonal «se les dará» para no explicitar al dador.
  - Se usa «hablar» para sostener la red léxica de λαλέω, aun cuando «decir» sería una alternativa más idiomática en español.
