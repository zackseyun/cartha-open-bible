revisions:
- from: Pero cuando os entreguen[a], no se preocupen[b] por cómo o qué hablarán, porque en aquella hora se les dará qué hablar.
  to: Pero cuando los entreguen, no se preocupen por cómo o qué dirán,[a] porque en aquella hora se les dará lo que han de decir.[b]
  rationale: Se revisa para unificar el registro en español neutral ('los/les'), corregir la representación demasiado futura de 'hablarán', y reemplazar la expresión poco natural 'qué hablar' por una formulación idiomática y fiel. También se conserva la nota sobre el pasivo implícito, alineada con el POB inglés, y se adapta la alternativa de la primera mitad del versículo a un español más natural.
