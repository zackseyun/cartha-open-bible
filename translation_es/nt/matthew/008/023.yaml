translation:
  language: es
  text: Y cuando él subió al barco[a][b], sus discípulos lo siguieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a una barca» o «a un barco». El griego dice simplemente «a barca/barco», sin artículo explícito; en español también puede expresarse como definido por continuidad narrativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al subir al barco», «al entrar en el barco» o «después de subir al barco». El participio griego puede expresarse en español con una cláusula temporal equivalente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβάντι
  english_pob_choice: when he got into
  chosen_spanish: al subir él
  alternatives_spanish:
  - cuando subió
  - después de subir
  - al entrar
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente antes de la acción principal. En español, la construcción con 'al' expresa con naturalidad esa secuencia. 'Subir' comunica el movimiento hacia el interior de la embarcación sin forzar un calco de 'entered'.
- source_word: πλοῖον
  english_pob_choice: the boat
  chosen_spanish: el barco
  alternatives_spanish:
  - la barca
  - el bote
  lexicon: BDAG
  rationale: πλοῖον puede referirse a una embarcación en general. 'Barco' es un término amplio y natural en español; 'barca' también es posible en contexto evangélico, pero 'barco' evita una coloración demasiado pequeña o regional.
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - fueron tras él
  - lo acompañaron
  lexicon: BDAG
  rationale: '''Seguir'' conserva tanto el sentido narrativo inmediato como la resonancia discipular de ἀκολουθέω. No se amplía a una paráfrasis teológica; se mantiene la tensión entre movimiento físico y discipulado.'
- source_word: μαθηταὶ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: '''Discípulos'' es el equivalente directo y reconocido en el contexto de los Evangelios, manteniendo la relación con Jesús y el valor técnico del término.'
- source_word: αὐτῷ ... αὐτῷ ... αὐτοῦ
  english_pob_choice: he / him / his
  chosen_spanish: él / lo / sus
  alternatives_spanish:
  - a él / le / de él
  lexicon: BDAG
  rationale: Los pronombres remiten a Jesús. En español conviene explicitar 'él' por claridad sintáctica al iniciar la cláusula temporal y usar 'lo' y 'sus' para las referencias posteriores, manteniendo la referencia personal sin añadir contenido.
theological_decisions:
- issue: Tensión entre movimiento físico y discipulado en ἀκολουθέω
  english_pob_reading: Retain 'followed' in the main text without expanding to an explicitly theological paraphrase.
  chosen_spanish_reading: Mantener 'lo siguieron' sin ampliar a 'se hicieron sus discípulos' ni a una glosa devocional.
  alternative_spanish_readings:
  - lo acompañaron
  - fueron tras él
  - se hicieron sus seguidores
  rationale: El versículo describe un seguimiento real y, en Mateo, también puede resonar con el discipulado. 'Lo siguieron' preserva ambas posibilidades sin resolver la tensión a favor de una interpretación más fuerte de la que el texto exige.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla)
- issue: Forma del referente pronominal de Jesús
  english_pob_reading: All three pronouns refer to Jesus in context.
  chosen_spanish_reading: Explicitar 'él' al comienzo de la cláusula para una lectura fluida en español, manteniendo el referente en Jesús sin ambigüedad.
  alternative_spanish_readings:
  - al entrar él
  - cuando Jesús entró
  rationale: El sujeto está claro por contexto. 'Él' respeta el flujo narrativo y evita introducir el nombre propio si no es necesario en una cláusula breve.
  doctrine_reference: Consistencia referencial y claridad narrativa
