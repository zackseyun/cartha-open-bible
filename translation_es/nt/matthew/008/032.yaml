revisions:
- from: 'Y les dijo: «Vayan». Entonces salieron y fueron a los cerdos; y, [a]he aquí, toda la piara se precipitó por la pendiente escarpada hacia el mar, y murió en las aguas.'
  to: 'Y les dijo: «Vayan». Entonces salieron y entraron en los cerdos[a]; y he aquí, toda la piara se precipitó por la pendiente escarpada hacia el mar, y murieron en las aguas.[b][c]'
  rationale: Se corrige el movimiento hacia el interior de los cerdos para reflejar εἰς con precisión contextual, se reubican y completan las notas para alinearlas con la auditoría inglesa, y se ajusta la concordancia final al plural para mayor fidelidad al griego y naturalidad en español. Se conserva «he aquí», «mar» y la formulación principal «murieron en las aguas» para respetar la filosofía de original-language primacy.
