review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo y conserva decisiones clave de la POB inglesa como «he aquí», «mar» y «murió/murieron en las aguas» en vez de explicitar «se ahogaron». Sin embargo, falla en un punto importante de alineación con la fuente: ἀπῆλθον εἰς τοὺς χοίρους significa que los demonios fueron/entraron en los cerdos, no simplemente que fueron hacia ellos. Además, el singular «murió» debilita la concordancia más natural con ἀπέθανον y con el desarrollo narrativo de los animales individuales.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «fueron a los cerdos» suena impreciso y atenúa el sentido. «[a]he aquí» está mal anclado porque la nota no corresponde a esa expresión, sino al sustantivo de los animales. También conviene ajustar la puntuación y la concordancia final para un español más natural: «murieron en las aguas» lee mejor que el singular colectivo aquí.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Cerdos» es una buena opción para χοίρους, con nota alternativa «puercos» o «cerdos» solo si realmente hay variante relevante; pero la nota heredada debe anclarse en «cerdos», no en «he aquí». «Mar» alinea bien con θάλασσαν. La conservación de «he aquí» sigue la decisión retórica de ἰδού.
  issues:
  - severity: high
    issue: «fueron a los cerdos» no expresa adecuadamente εἰς τοὺς χοίρους
    rationale: La preposición εἰς aquí indica entrada/movimiento al interior en el contexto de expulsión demoníaca. «Fueron a» puede significar solo acercamiento y no preserva plenamente el sentido narrativo.
  - severity: medium
    issue: La nota [a] está anclada en «he aquí» en lugar de «cerdos»
    rationale: La nota dice «O «cerdos»», es decir, pretende comentar el sustantivo de χοίρους, no el marcador discursivo ἰδού. El anclaje actual crea confusión y no cumple la disciplina de notas.
  - severity: medium
    issue: «murió en las aguas» es menos fiel/natural que «murieron en las aguas»
    rationale: Aunque «piara» es singular colectivo, el griego ἀπέθανον es plural y el referente real son los animales. En español, el plural refleja mejor la escena sin añadir interpretación.
  - severity: low
    issue: La nota alternativa léxica actual es débil tal como está formulada
    rationale: Si el texto principal usa «cerdos», la alternativa útil en español sería «puercos» o quizá «cochinos» según registro, no repetir «cerdos».
  revised_spanish_text: 'Y les dijo: «Vayan». Entonces salieron y entraron en los cerdos[a]; y he aquí, toda la piara se precipitó por la pendiente escarpada hacia el mar, y murieron en las aguas.[b][c]'
  revised_footnotes:
