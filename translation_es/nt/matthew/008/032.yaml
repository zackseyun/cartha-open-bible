  - marker: b
    text: O «por el despeñadero». El término griego puede denotar una pendiente escarpada, ribera inclinada o precipicio.
    reason: lexical_alternative
  - marker: c
    text: O «se ahogaron en las aguas». El griego dice más literalmente «murieron en las aguas».
    reason: alternative_reading
  revision_rationale: Se corrige el movimiento hacia el interior de los cerdos para reflejar εἰς con precisión contextual, se reubican y completan las notas para alinearlas con la auditoría inglesa, y se ajusta la concordancia final al plural para mayor fidelidad al griego y naturalidad en español. Se conserva «he aquí», «mar» y la formulación principal «murieron en las aguas» para respetar la filosofía de original-language primacy.
