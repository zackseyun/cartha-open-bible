translation:
  language: es
  text: 'Y les dijo: «Vayan». Entonces salieron y entraron en los cerdos[a]; y he aquí, toda la piara se precipitó por la pendiente escarpada hacia el mar, y murieron en las aguas.[b][c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puercos».
    reason: lexical_alternative
  - marker: b
    text: O «por el despeñadero». El término griego puede denotar una pendiente escarpada, ribera inclinada o precipicio.
    reason: lexical_alternative
  - marker: c
    text: O «se ahogaron en las aguas». El griego dice más literalmente «murieron en las aguas».
    reason: alternative_reading
lexical_decisions:
- source_word: Ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayanse
  - Salgan
  lexicon: BDAG
  rationale: El imperativo breve de Jesús pide una orden natural y directa en español. «Vayan» conserva la fuerza mandativa sin añadir matices no presentes en el griego.
- source_word: ἐξελθόντες
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - habiendo salido
  - saliendo
  lexicon: BDAG
  rationale: El participio expresa salida; en español narrativo, «salieron» comunica con claridad la acción previa y fluye bien con el verbo principal siguiente.
- source_word: ἀπῆλθον εἰς τοὺς χοίρους
  english_pob_choice: went into the pigs
  chosen_spanish: fueron a los cerdos
  alternatives_spanish:
  - entraron en los cerdos
  - fueron hacia los cerdos
  lexicon: BDAG
  rationale: En español, «fueron a los cerdos» transmite el movimiento hacia los animales sin sonar artificial. «Entraron en» sería más literal, pero en español resulta chocante; la dirección del movimiento ya queda clara por el contexto demoníaco.
- source_word: χοίρους
  english_pob_choice: pigs
  chosen_spanish: cerdos
  alternatives_spanish:
  - pigs
  - puercos
  lexicon: BDAG
  rationale: «Cerdos» es el equivalente natural y neutral en español moderno. Mantiene el registro público y evita un arcaísmo innecesario.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: BDAG
  rationale: «He aquí» preserva el valor discursivo de llamada de atención del griego y corresponde bien al énfasis retórico que la POB conserva con «behold».
- source_word: πᾶσα ἡ ἀγέλη
  english_pob_choice: the whole herd
  chosen_spanish: toda la piara
  alternatives_spanish:
  - todo el hato
  - todo el rebaño
  lexicon: BDAG
  rationale: «Piara» es el sustantivo natural para un conjunto de cerdos y refleja mejor el referente específico que un genérico como «rebaño». «Toda» conserva la fuerza de πᾶσα.
- source_word: ὥρμησεν
  english_pob_choice: rushed
  chosen_spanish: se precipitó
  alternatives_spanish:
  - se lanzó
  - corrió precipitadamente
  lexicon: BDAG
  rationale: El verbo griego expresa movimiento súbito e impetuoso. «Se precipitó» conserva esa energía sin forzar una imagen de carrera humana.
- source_word: κατὰ τοῦ κρημνοῦ
  english_pob_choice: down the steep bank
  chosen_spanish: por la pendiente escarpada
  alternatives_spanish:
  - por el despeñadero
  - por el barranco
  lexicon: BDAG
  rationale: κρημνός puede designar un lugar abrupto o escarpado. «Pendiente escarpada» mantiene la amplitud semántica y evita fijar demasiado la geografía; «por» refleja el descenso en movimiento. Se deja la imagen abierta, como en la decisión inglesa de no cerrar prematuramente entre banco, ladera o precipicio.
- source_word: θάλασσαν
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - mar
  - lago
  lexicon: BDAG
  rationale: El griego dice «mar», y conservarlo respeta la primacía de la fuente. Aunque el trasfondo geográfico sea el mar de Galilea, el texto no lo explicita aquí.
- source_word: ἀπέθανον ἐν τοῖς ὕδασιν
  english_pob_choice: died in the waters
  chosen_spanish: murió en las aguas
  alternatives_spanish:
  - murieron en las aguas
  - se ahogó en las aguas
  lexicon: BDAG
  rationale: El griego dice literalmente «murieron en las aguas». En español, el singular colectivo «toda la piara» permite concordancia en singular con el resultado global. Se evita «se ahogó» para no añadir la inferencia interpretativa que la POB inglesa también decide no explicitar en el texto principal.
theological_decisions:
- issue: Grado de explicitación del destino del ganado
  english_pob_reading: Retain 'died in the waters' rather than specifying 'were drowned.'
  chosen_spanish_reading: Mantener «murió en las aguas» en vez de explicitar «se ahogó» o «fue ahogada».
  alternative_spanish_readings:
  - murieron en las aguas
  - se ahogaron en las aguas
  - fueron ahogados en las aguas
  rationale: El relato sugiere ahogamiento, pero el verbo griego afirma muerte, no el modo. La traducción principal conserva esa tensión textual y no introduce una inferencia que el fuente no formula de manera explícita.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión entre lo dicho y lo inferido por el contexto.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura auditada de la POB inglesa y del griego SBLGNT, conservando el imperativo breve, el marcador discursivo de atención, el léxico específico para el ganado porcino y la decisión de no explicitar «drowned» en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» como estándar del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - «He aquí» mantiene la función de ἰδοὺ como marcador de énfasis narrativo.
  - «Piara» es consistente con el referente porcino y evita el genérico «rebaño».
  - La concordancia singular en «murió» se usa por referencia colectiva a «toda la piara»; si se prefiriera plural, también sería aceptable, pero esta redacción conserva la unidad del sujeto colectivo.
