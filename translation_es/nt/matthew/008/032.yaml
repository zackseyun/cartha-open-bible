  text: καὶ εἶπεν αὐτοῖς· Ὑπάγετε. οἱ δὲ ἐξελθόντες ἀπῆλθον εἰς ⸂τοὺς χοίρους⸃· καὶ ἰδοὺ ὥρμησεν πᾶσα ἡ ⸀ἀγέλη κατὰ τοῦ κρημνοῦ εἰς τὴν θάλασσαν, καὶ ἀπέθανον ἐν τοῖς ὕδασιν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/032.yaml
  text: And he said to them[a], “Go.” Then they came out and went into the pigs; and behold[c][b], the whole herd rushed down the steep bank into the sea and died in the waters.
  footnotes:
  - marker: a
    text: Or 'swine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'down the cliff.' The Greek term can denote a steep slope, bank, or precipice.
    reason: lexical_alternative
  - marker: c
    text: Or 'were drowned in the waters.' The Greek more literally says 'died in the waters.'
    reason: alternative_reading
