translation:
  language: es
  text: Pero les digo que muchos vendrán de oriente y de occidente, y se reclinarán a la mesa con Abraham, Isaac y Jacob en el reino de los cielos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «se reclinarán»; la expresión remite a tomar lugar en una mesa de banquete.'
    reason: cultural_note
  - marker: b
    text: «De oriente y de occidente» probablemente implica gente que viene de regiones lejanas, incluso de fuera de Israel.
    reason: cross_reference
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: But I tell you
  chosen_spanish: Pero les digo
  alternatives_spanish:
  - Y les digo
  - Ahora les digo
  lexicon: BDAG
  rationale: δέ introduce una transición discursiva leve, y ὑμῖν está en dativo plural. «Pero les digo» conserva el contraste natural en español y mantiene el tono directo de Jesús sin añadir material.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - numerosos
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente; «muchos» es la forma natural y fiel en español sin requerir un sustantivo explícito.
- source_word: ἀπὸ ἀνατολῶν καὶ δυσμῶν
  english_pob_choice: from east and west
  chosen_spanish: de oriente y de occidente
  alternatives_spanish:
  - del oriente y del occidente
  - desde el este y el oeste
  lexicon: BDAG
  rationale: La frase es idiomática para direcciones/regiones. En español bíblico claro, «oriente» y «occidente» conservan el alcance geográfico amplio y suenan más naturales que una traducción demasiado literal con «este» y «oeste».
- source_word: ἥξουσιν
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  - vendrán y llegarán
  lexicon: BDAG
  rationale: ἥκω significa venir/llegar. «Vendrán» es la equivalencia más directa y fluida en el contexto de personas que acuden desde regiones distantes.
- source_word: ἀνακλιθήσονται
  english_pob_choice: will recline at table
  chosen_spanish: se reclinarán a la mesa
  alternatives_spanish:
  - se recostarán a la mesa
  - se sentarán a la mesa
  lexicon: BDAG
  rationale: El verbo alude a la postura de banquete. «Se reclinarán a la mesa» preserva la imagen cultural y la fuerza escatológica del banquete, en vez de reducirla a mera presencia.
- source_word: μετὰ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακώβ
  english_pob_choice: with Abraham and Isaac and Jacob
  chosen_spanish: con Abraham, Isaac y Jacob
  alternatives_spanish:
  - junto con Abraham, Isaac y Jacob
  lexicon: BDAG
  rationale: μετά con genitivo expresa compañía/ asociación. Los nombres propios se mantienen en forma española usual, respetando la convención de transliteración bíblica y la fluidez del español.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  english_pob_choice: in the kingdom of heaven
  chosen_spanish: en el reino de los cielos
  alternatives_spanish:
  - en el reino del cielo
  - en el reino de los cielos
  lexicon: BDAG
  rationale: Mateo usa su expresión característica. «Reino de los cielos» es la fórmula española estable y fiel para βασιλεία τῶν οὐρανῶν, sin sustituirla por una paráfrasis.
theological_decisions:
- issue: Imaginería de banquete escatológico
  english_pob_reading: Retain the meal image with 'will recline at table' rather than flattening to mere presence.
  chosen_spanish_reading: Mantener la imagen del banquete con «se reclinarán a la mesa» en lugar de convertirla en una simple idea de presencia.
  alternative_spanish_readings:
  - se sentarán con Abraham, Isaac y Jacob
  - estarán con Abraham, Isaac y Jacob
  rationale: La escena apunta a comunión de mesa y no sólo a ubicación conjunta. La traducción conserva ese peso cultural y teológico sin añadir explicaciones interpretativas al texto principal.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance de «muchos» que vienen de oriente y occidente
  english_pob_reading: Render geographically and leave the implied inclusion of Gentiles unstated in the main text.
  chosen_spanish_reading: Mantener el alcance geográfico en el texto principal y no explicitar «gentiles».
  alternative_spanish_readings:
  - muchos gentiles vendrán de oriente y de occidente
  - muchos de entre las naciones vendrán
  rationale: El griego dice «muchos» de oriente y occidente, no «gentiles». La implicación de inclusión más allá de Israel queda sugerida por el contexto, pero no debe incorporarse como glosa en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores [a] y [b] directamente en el texto español, exactamente donde corresponde. No se añadieron notas sin anclaje en el versículo.
  spanish_consistency_notes:
  - Se mantiene «reino de los cielos» como fórmula fija de Mateo.
  - Se evita «Cristo» porque no aparece en el texto fuente.
  - Se conserva la imagen de banquete con el verbo de reclinarse, no una paráfrasis neutral.
  - Los nombres propios patriarcales se presentan en su forma española estándar.
  - La dirección geográfica se expresa con «oriente» y «occidente» para un español natural y bíblicamente transparente.
