revisions:
- from: Y cuando él llegó al otro lado[a], a la región de los gadarenos, dos endemoniados le salieron al encuentro, saliendo de los sepulcros[b], tan feroces[c] que nadie podía pasar por aquel camino.
  to: Y cuando él llegó al otro lado[a], a la región de los gadarenos, dos endemoniados le salieron al encuentro, que salían de los sepulcros, tan feroces que nadie podía pasar por aquel camino[b].
  rationale: Se corrigen las notas para alinearlas con el audit trail inglés y con los anclajes apropiados en el texto. Se elimina la nota innecesaria sobre «feroces» y la nota incorrectamente aplicada a «sepulcros». Además, se suaviza una leve redundancia sintáctica con «que salían de los sepulcros», manteniendo el sentido exacto del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:07:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: cláusula temporal para ἐλθόντος αὐτοῦ, «al otro lado» para τὸ πέραν, «región de los gadarenos» para χώραν τῶν Γαδαρηνῶν, encuentro con los dos hombres endemoniados, salida desde los sepulcros y la cláusula de resultado final. También preserva correctamente la variante textual del topónimo en nota. Sin embargo, hay un problema de anclaje y correspondencia de notas: la nota [b] está puesta en «sepulcros», pero su contenido ofrece «de las tumbas», mientras que la alternativa relevante preservada por el inglés auditado en esa posición es para la frase final de tránsito por el camino/road, no para μνημείων. Además, la nota [c] en «feroces» no refleja bien el inglés auditado, que registró como alternativa «very fierce», no una variante textual o semántica distinta en español necesaria aquí.'
  spanish_quality_summary: El español es claro, natural y digno. «Le salieron al encuentro» suena bien; «endemoniados» es idiomático y comprensible; «por aquel camino» es una buena solución para διὰ τῆς ὁδοῦ ἐκείνης. No obstante, la doble forma participial «le salieron al encuentro, saliendo...» queda algo redundante en español. Puede suavizarse con «que salían de los sepulcros» sin perder fidelidad. También conviene capitalizar el gentilicio/topónimo como «gadarenos» en minúscula está aceptable como gentilicio, pero en este contexto geográfico puede mantenerse así; no es un problema. La reparación principal es de notas y una ligera mejora estilística.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé/Mesías/etc. «Endemoniados» es una excepción contextual razonable frente a una posible traducción más analítica como «poseídos por demonios», y está bien justificada. «Sepulcros» y «camino» son opciones españolas adecuadas.
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «sepulcros» pero el audit trail inglés preserva la alternativa en la frase final de tránsito por el camino, no en μνημεῖα.
    rationale: La nota inglesa [c] dice «Or 'pass by that road'», es decir, corresponde a la cláusula «pasar por aquel camino», no a «sepulcros». Mantener una nota distinta sobre «tumbas» altera el rastro auditado y añade una alternativa no exigida.
  - severity: low
    issue: La nota [c] sobre «muy feroces» es innecesaria y no reproduce con precisión la función de la nota inglesa.
    rationale: El inglés tenía una nota léxica «Or ‘very fierce’» porque había habido una revisión entre ‘violent’ y ‘fierce’. En español «tan feroces» ya expresa naturalmente el resultado con intensidad; añadir «muy feroces» como nota no aporta una alternativa significativa ni necesaria.
  - severity: low
    issue: La secuencia «le salieron al encuentro, saliendo...» resulta algo redundante en español.
    rationale: Ambas expresiones repiten la idea de salida/movimiento. Cambiar a «que salían de los sepulcros» conserva los participios griegos de forma natural y mejora la fluidez.
  revised_spanish_text: Y cuando él llegó al otro lado[a], a la región de los gadarenos, dos endemoniados le salieron al encuentro, que salían de los sepulcros, tan feroces que nadie podía pasar por aquel camino[b].
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos leen «gergesenos» o «gerasenos» en lugar de «gadarenos».
    reason: textual_variant
  - marker: b
    text: O «pasar por ese camino».
    reason: previous_rendering
  revision_rationale: Se corrigen las notas para alinearlas con el audit trail inglés y con los anclajes apropiados en el texto. Se elimina la nota innecesaria sobre «feroces» y la nota incorrectamente aplicada a «sepulcros». Además, se suaviza una leve redundancia sintáctica con «que salían de los sepulcros», manteniendo el sentido exacto del griego.
