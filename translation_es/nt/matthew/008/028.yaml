translation:
  language: es
  text: Y cuando él llegó al otro lado[a], a la región de los gadarenos, dos endemoniados le salieron al encuentro, que salían de los sepulcros, tan feroces que nadie podía pasar por aquel camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «gergesenos» o «gerasenos» en lugar de «gadarenos».
    reason: textual_variant
  - marker: b
    text: O «pasar por ese camino».
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλθόντος αὐτοῦ
  english_pob_choice: when he came
  chosen_spanish: cuando él llegó
  alternatives_spanish:
  - cuando vino
  - al llegar él
  lexicon: BDAG
  rationale: El genitivo absoluto se vierte naturalmente como una cláusula temporal en español. «Llegó» expresa bien el movimiento de llegada sin sonar forzado, y mantiene la secuencia narrativa.
- source_word: τὸ πέραν
  english_pob_choice: the other side
  chosen_spanish: al otro lado
  alternatives_spanish:
  - al lado opuesto
  - al otro lado del mar
  lexicon: BDAG
  rationale: Es un giro idiomático de ubicación relativa; «al otro lado» conserva el valor contextual sin añadir un referente no explícito en el versículo.
- source_word: χώραν τῶν Γαδαρηνῶν
  english_pob_choice: the region of the Gadarenes
  chosen_spanish: a la región de los gadarenos
  alternatives_spanish:
  - al territorio de los gadarenos
  - al país de los gadarenos
  lexicon: BDAG
  rationale: χώρα denota región o territorio; «región» es el equivalente natural. Se conserva el gentilicio en forma transliterada adaptada al español, siguiendo el texto griego leído en SBLGNT.
- source_word: ὑπήντησαν αὐτῷ
  english_pob_choice: met him
  chosen_spanish: le salieron al encuentro
  alternatives_spanish:
  - lo встретaron
  - lo encontraron
  lexicon: BDAG
  rationale: ὑπαντάω puede ser simplemente «encontrarse con», pero en este contexto narrativo implica un encuentro que va hacia él; «le salieron al encuentro» reproduce bien el matiz dinámico y suena natural en español.
- source_word: δύο δαιμονιζόμενοι
  english_pob_choice: two demon-possessed men
  chosen_spanish: dos endemoniados
  alternatives_spanish:
  - dos poseídos por demonios
  - dos demonizados
  lexicon: BDAG
  rationale: El participio expresa aflicción/posesión demoníaca real. «Endemoniados» es una forma española clara y tradicional, pero no arcaica; evita la rigidez de «poseídos por demonios» y mantiene la fuerza del participio. El masculino plural queda claro por el contexto.
- source_word: ἐκ τῶν μνημείων ἐξερχόμενοι
  english_pob_choice: coming out of the tombs
  chosen_spanish: saliendo de los sepulcros
  alternatives_spanish:
  - saliendo de las tumbas
  - que salían de los sepulcros
  lexicon: BDAG
  rationale: μνημεῖον designa un lugar de entierro o sepultura. «Sepulcros» comunica bien el carácter funerario y evita una posible lectura demasiado moderna de «tumbas»; el participio se conserva como acción simultánea.
- source_word: χαλεποὶ λίαν
  english_pob_choice: so extremely fierce
  chosen_spanish: tan feroces
  alternatives_spanish:
  - muy feroces
  - sumamente feroces
  - tan peligrosos
  lexicon: BDAG
  rationale: χαλεπός puede significar feroz, peligroso o difícil; dado el efecto resultante en el siguiente miembro —nadie podía pasar—, «feroces» capta el matiz de amenaza personal sin reducirlo a violencia física explícita. λίαν intensifica, y en español el «tan» del nexo resultativo deja la idea suficientemente marcada sin sobrecargar la frase.
- source_word: ὥστε μὴ ἰσχύειν τινὰ παρελθεῖν
  english_pob_choice: that no one was able to pass along
  chosen_spanish: que nadie podía pasar
  alternatives_spanish:
  - de modo que nadie podía pasar
  - que nadie era capaz de pasar
  lexicon: BDAG
  rationale: ὥστε introduce resultado; ἰσχύω aquí expresa capacidad, no fuerza física en sentido estrecho. «Nadie podía pasar» comunica el resultado de manera limpia y fiel.
- source_word: διὰ τῆς ὁδοῦ ἐκείνης
  english_pob_choice: that road
  chosen_spanish: por aquel camino
  alternatives_spanish:
  - por aquella ruta
  - por esa carretera
  lexicon: BDAG
  rationale: ὁδός puede ser camino, ruta o carretera. «Camino» es amplio y natural en español bíblico contemporáneo; «aquel» conserva la distancia textual de ἐκείνης.
theological_decisions:
- issue: Cómo expresar la aflicción demoníaca
  english_pob_reading: demon-possessed
  chosen_spanish_reading: endemoniados
  alternative_spanish_readings:
  - poseídos por demonios
  - demonizados
  rationale: El texto presenta una verdadera influencia/presión demoníaca sobre personas concretas. «Endemoniados» es una traducción española estable y comprensible que no introduce una formulación técnica ajena al pasaje; conserva la realidad personal del conflicto espiritual.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Variación textual del topónimo
  english_pob_reading: Gadarenes
  chosen_spanish_reading: los gadarenos
  alternative_spanish_readings:
  - los gerasenos
  - los gergesenos
  rationale: SBLGNT lee Γαδαρηνῶν, así que el cuerpo principal sigue esa lectura. Se preservan en nota las otras formas conocidas de la tradición manuscrita y de paralelos sinópticos.
  doctrine_reference: Translation philosophy §1; preserve alternatives in footnotes where relevant
translation_notes:
  revision_awareness: 'La revisión más reciente en el audit trail ajustó el matiz de χαλεποί de «violent» a «fierce». Por eso la redacción española evita «violentos» y usa «feroces», que conserva mejor el sentido de amenaza/dureza del término sin forzar violencia física explícita. También se atendió al ajuste previo sobre διὰ τῆς ὁδοῦ, traduciendo con una expresión natural de tránsito: «por aquel camino».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «Cristo» porque no aparece Χριστός en el texto.
  - «Sepulcros» se eligió por su resonancia funeraria y por ser plenamente comprensible en español bíblico.
  - La puntuación reproduce la estructura de una oración narrativa con cláusula resultativa final.
