- from: 'Porque yo también soy un hombre bajo autoridad[a], y tengo soldados bajo mí; y digo a este: “Ve”, y va; y a otro: “Ven”, y viene; y a mi esclavo[b]: “Haz esto”, y lo hace.'
  to: 'Porque yo también soy un hombre bajo autoridad[a] y tengo soldados bajo mi mando; y digo a este: «Ve», y va; y a otro: «Ven», y viene; y a mi siervo[b]: «Haz esto», y lo hace.'
  rationale: Se ajusta δοῦλος a «siervo» en el texto principal para seguir la decisión auditada de la POB inglesa («servant» con alternativa «slave»), manteniendo «esclavo» en nota como alternativa léxica. También se mejora la naturalidad de «bajo mí» a «bajo mi mando», sin pérdida del sentido de cadena de autoridad. Se conserva el resto de la sintaxis y el patrón repetitivo del original.
