translation:
  language: es
  text: 'Porque yo también soy un hombre bajo autoridad[a] y tengo soldados bajo mi mando; y digo a este: «Ve», y va; y a otro: «Ven», y viene; y a mi siervo[b]: «Haz esto», y lo hace.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sujeto a autoridad».
    reason: lexical_alternative
  - marker: b
    text: O «esclavo»; el griego δοῦλος también puede significar «esclavo».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula compuesta introduce la explicación del centurión. «Porque» preserva bien la relación causal/explanatoria en español sin sonar artificial, y mantiene el arranque argumentativo del original.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre es explícito y enfático. En español se conserva con «yo»; el énfasis queda natural dentro de la cláusula, sin añadir una intensificación mayor de la que requiere el contexto.
- source_word: ἄνθρωπός εἰμι
  english_pob_choice: am a man
  chosen_spanish: soy un hombre
  alternatives_spanish:
  - soy un ser humano
  lexicon: BDAG
  rationale: ἄνθρωπος aquí identifica al hablante como persona humana en contraste con su posición. «Hombre» es la equivalencia directa y natural en este contexto.
- source_word: ὑπὸ ἐξουσίαν
  english_pob_choice: under authority
  chosen_spanish: bajo autoridad
  alternatives_spanish:
  - sujeto a autoridad
  - bajo la autoridad de otro
  lexicon: BDAG
  rationale: La construcción idiomática expresa estar dentro de una cadena de mando. «Bajo autoridad» conserva la fuerza breve y el sentido militar/delegado del griego, tal como en la POB inglesa.
- source_word: ἔχων ὑπ’ ἐμαυτὸν στρατιώτας
  english_pob_choice: having soldiers under me
  chosen_spanish: y tengo soldados bajo mí
  alternatives_spanish:
  - con soldados bajo mi mando
  - teniendo soldados bajo mí
  lexicon: BDAG
  rationale: El participio explica la posición paralela del centurión. «Tengo soldados bajo mí» reproduce con claridad la relación jerárquica y mantiene la estructura del enunciado.
- source_word: στρατιώτας
  english_pob_choice: soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - tropas
  lexicon: BDAG
  rationale: El término designa soldados concretos, no una fuerza genérica. «Soldados» es la traducción más directa y precisa.
- source_word: λέγω τούτῳ
  english_pob_choice: I say to this one
  chosen_spanish: y digo a este
  alternatives_spanish:
  - y digo a éste
  - y le digo a este
  lexicon: BDAG
  rationale: El demostrativo singulariza a cada subordinado. «A este» mantiene el valor distributivo del ejemplo; la omisión de «uno» hace el español más natural sin perder precisión.
- source_word: Πορεύθητι
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Marcha
  lexicon: BDAG
  rationale: El imperativo es una orden simple de partir o proceder. «Ve» es la forma breve y normal en español, equivalente funcional del griego.
- source_word: πορεύεται
  english_pob_choice: he goes
  chosen_spanish: va
  alternatives_spanish:
  - se va
  - parte
  lexicon: BDAG
  rationale: El presente narrativo expresa obediencia inmediata. «Va» conserva la sencillez y la correspondencia directa con el modelo de mandato-respuesta.
- source_word: ἄλλῳ
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otro más
  - a uno diferente
  lexicon: BDAG
  rationale: El adjetivo indefinido mantiene el patrón distributivo. «A otro» es la forma más natural y fiel en español.
- source_word: Ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  lexicon: BDAG
  rationale: La orden simple de acercarse se expresa de manera natural con «Ven». «Aquí» no está explícito en el griego.
- source_word: ἔρχεται
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con el mandato correspondiente. «Viene» es la equivalencia más directa y clara.
- source_word: τῷ δούλῳ μου
  english_pob_choice: to my servant
  chosen_spanish: a mi esclavo
  alternatives_spanish:
  - a mi siervo
  - a mi servidor
  lexicon: BDAG
  rationale: δοῦλος en este contexto conserva la fuerza social de subordinación personal. La POB inglesa documenta la alternativa «slave»; por coherencia lexical, en español se elige «esclavo», preservando la tensión semántica y evitando suavizarla a «siervo» sin base textual suficiente.
- source_word: Ποίησον τοῦτο
  english_pob_choice: Do this
  chosen_spanish: Haz esto
  alternatives_spanish:
  - Haz lo que te digo
  - Realiza esto
  lexicon: BDAG
  rationale: ποιέω con objeto demostrativo expresa ejecutar una orden. «Haz esto» es la correspondencia más natural y fiel.
- source_word: ποιεῖ
  english_pob_choice: he does it
  chosen_spanish: lo hace
  alternatives_spanish:
  - así lo hace
  - hace esto
  lexicon: BDAG
  rationale: El español puede suplir el objeto por economía estilística, como la POB inglesa. «Lo hace» conserva la respuesta obediente y el paralelismo del cierre.
theological_decisions:
- issue: 'δοῦλος: mantener la fuerza de subordinación personal sin suavizar el término'
  english_pob_reading: servant, with lexical alternative slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La nota inglesa reconoce la alternativa lexical «slave». Dado que el contexto describe una relación de mando y obediencia dentro de una jerarquía, «esclavo» preserva mejor la tensión social del término y evita una domesticación interpretativa. Se deja constancia de que la alternativa más suave existe, pero no se adopta en el texto principal.
  doctrine_reference: 'DOCTRINE.md: contested terms for δοῦλος; POB lexical policy on preserving force where context supports it'
- issue: 'ὑπὸ ἐξουσίαν: cadena de mando delegada'
  english_pob_reading: under authority
  chosen_spanish_reading: bajo autoridad
  alternative_spanish_readings:
  - sujeto a autoridad
  - bajo la autoridad de
  rationale: La escena depende de la lógica de autoridad delegada. «Bajo autoridad» reproduce el sentido de subordinación estructural sin introducir elementos interpretativos adicionales.
  doctrine_reference: POB translation philosophy on preserving explicit source relations and military/administrative nuance
translation_notes:
  revision_awareness: 'El audit trail inglés indica revisión final sin cambios necesarios (latest_revision_pass: unchanged=true). La versión española sigue esa lectura estable y solo ajusta el orden y la idiomaticidad natural del español, sin alterar la relación semántica ni la tensión lexical documentada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «esclavo» para δοῦλος en el texto principal, coherente con la nota lexical y con la fuerza social del término en este pasaje.
  - 'Se conserva el paralelismo mandato-respuesta con verbos breves: «ve / va», «ven / viene», «haz esto / lo hace».'
  - La puntuación usa comillas latinas españolas para el discurso directo, en lugar de comillas angulares, por legibilidad estándar en edición bíblica moderna.
