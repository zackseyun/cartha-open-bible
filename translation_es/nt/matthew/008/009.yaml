review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura explicativa, la cadena de mando y el patrón de mandato-respuesta del griego. «Porque yo también soy un hombre bajo autoridad» y la secuencia «Ve/Ven/Haz esto» corresponden fielmente a καὶ γὰρ… ὑπὸ ἐξουσίαν… Πορεύθητι/Ἔρχου/Ποίησον τοῦτο. Sin embargo, la decisión principal sobre δοῦλος no sigue el rastro auditado de la POB inglesa, que eligió «servant/servant» en texto principal con «slave» como alternativa en nota. El español invierte esa prioridad sin necesidad impuesta por el contexto inmediato.
  spanish_quality_summary: 'El español es mayormente claro y legible, con buen ritmo. No obstante, «bajo mí» suena algo calcado; «bajo mi mando» es más natural en español y conserva la jerarquía militar. Además, la nota [b] está invertida respecto de la elección principal: si el texto dice «esclavo», la nota no debe decir que δοῦλος también puede significar «esclavo»; debe ofrecer «siervo» o, mejor, ajustar el texto principal a «siervo» y dejar «esclavo» como alternativa, en coherencia con la POB inglesa.'
  glossary_alignment: No hay términos del glosario mayor en conflicto salvo δοῦλος. La política del proyecto indica normalmente «esclavo» cuando la POB inglesa eligió «slave» por fuerza léxica; aquí la POB inglesa eligió «servant» con nota alternativa «slave». Por tanto, para alineación terminológica y con la racionalidad documentada, el español debe usar «siervo» o «sirviente/siervo» en el texto principal y reservar «esclavo» para nota. «Siervo» encaja mejor con el registro bíblico-digno y la motivación auditada.
  issues:
  - severity: high
    issue: El texto principal usa «esclavo» para δοῦλος aunque la POB inglesa documentó «servant» como lectura principal.
    rationale: La revisión debe preservar no solo el sentido fuente sino también la decisión lexical/theológica auditada. Cambiar a «esclavo» en texto principal altera esa decisión sin evidencia nueva suficiente.
  - severity: medium
    issue: La nota [b] es internamente incoherente con el texto principal.
    rationale: Si el texto principal ya dice «esclavo», no corresponde una nota que diga que δοῦλος también puede significar «esclavo». La nota debe reflejar una alternativa real no usada en el texto.
  - severity: low
    issue: «Tengo soldados bajo mí» suena menos idiomático en español que «tengo soldados bajo mi mando».
    rationale: Ambas opciones son fieles, pero «bajo mi mando» mejora la naturalidad y mantiene explícita la relación jerárquica del griego.
