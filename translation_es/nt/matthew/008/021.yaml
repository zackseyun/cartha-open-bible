translation:
  language: es
  text: 'Entonces otro de los discípulos le dijo: «Señor, permíteme[a] primero irme y sepultar a mi padre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «concédeme» o «déjame».
    reason: lexical_alternative
  - marker: b
    text: La petición puede referirse a una sepultura inmediata o, de manera más amplia, al cumplimiento del deber filial hasta la muerte del padre; el griego no lo especifica.
    reason: cultural_note
lexical_decisions:
- source_word: ἕτερος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - otro distinto
  lexicon: BDAG
  rationale: ἕτερος señala a un individuo adicional y distinto del hablante anterior. «Otro» expresa bien esa distinción en español sin sobreexplicar.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo suave. «Entonces» mantiene el avance de la escena con naturalidad en español.
- source_word: τῶν μαθητῶν
  english_pob_choice: of the disciples
  chosen_spanish: de los discípulos
  alternatives_spanish:
  - entre los discípulos
  lexicon: BDAG
  rationale: El genitivo identifica al hablante como integrante del grupo de discípulos. «De los discípulos» es directo y fiel.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el habla directa a Jesús, «Señor» preserva el peso de κύριος y sigue la convención doctrinal de la obra.
- source_word: ἐπίτρεψόν μοι
  english_pob_choice: permit me
  chosen_spanish: permíteme
  alternatives_spanish:
  - permite que vaya
  - déjame
  lexicon: BDAG
  rationale: La petición es de permiso, no una simple narración de deseo. «Permíteme» conserva el tono respetuoso y formal de la súplica.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - ante todo
  lexicon: BDAG
  rationale: πρῶτον indica prioridad temporal o de orden. «Primero» es el equivalente más natural y exacto en esta construcción.
- source_word: ἀπελθεῖν
  english_pob_choice: to go away
  chosen_spanish: irme
  alternatives_spanish:
  - ir
  - marcharme
  - alejarme
  lexicon: BDAG
  rationale: En contexto de petición, el infinitivo de ἀπέρχομαι puede expresarse naturalmente como «irme». Mantiene la idea de salir del lugar presente sin sonar pesado.
- source_word: θάψαι
  english_pob_choice: bury
  chosen_spanish: sepultar
  alternatives_spanish:
  - enterrar
  - dar sepultura
  lexicon: BDAG
  rationale: «Sepultar» conserva el sentido de enterrar a un muerto y suena digno en español bíblico moderno. «Enterrar» también sería posible, pero «sepultar» refleja mejor el registro literario.
- source_word: τὸν πατέρα μου
  english_pob_choice: my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - a mi padre
  lexicon: BDAG
  rationale: El objeto directo humano con «sepultar» en español suele requerir la preposición «a». Se mantiene el sentido literal de τὸν πατέρα μου.
theological_decisions:
- issue: Sentido de la petición sobre el padre
  english_pob_reading: The Greek does not specify whether the father has already died or whether the request refers more broadly to filial obligation until his father dies.
  chosen_spanish_reading: El texto deja abierto si el padre ha muerto ya y requiere sepultura inmediata, o si la frase alude más ampliamente al deber filial hasta la muerte del padre.
  alternative_spanish_readings:
  - El padre acaba de morir y necesita sepultura inmediata.
  - La frase significa que el hombre quiere quedarse en casa hasta que su padre muera.
  rationale: La traducción no debe resolver una ambigüedad que el griego no resuelve. Por eso se conserva la formulación simple de la petición, sin introducir una interpretación específica en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa del texto fuente sin forzarla.
translation_notes:
  revision_awareness: El texto se mantiene alineado con la revisión más reciente del POB inglés, que no aplicó cambios y conserva la misma lectura y nivel de cautela interpretativa.
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριε, conforme al uso doctrinal de la obra.
  - Se prefiere «sepultar» por registro bíblico digno y porque el griego θάψαι admite sin problema este verbo.
  - Se emplea «irme» para ἀπελθεῖν por naturalidad en español, sin perder la idea de salir del lugar presente.
  - Se mantiene la ambigüedad acerca del padre en la nota, no en el cuerpo principal.
  - La puntuación y el orden verbal buscan ser naturales en español sin alejarse del griego.
