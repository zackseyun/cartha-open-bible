translation:
  language: es
  text: 'Y acercándose un escriba, le dijo: «Maestro, te seguiré adondequiera que vayas»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adondequiera que partas / te vayas». El verbo griego puede denotar más específicamente irse o partir, aunque aquí funciona de manera natural como «ir».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came up
  chosen_spanish: acercándose
  alternatives_spanish:
  - se acercó
  - vino hacia él
  lexicon: BDAG
  rationale: El participio aoristo indica que el escriba se aproximó antes de hablar. «Acercándose» conserva el movimiento hacia Jesús con una forma natural en español.
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - cierto
  lexicon: BDAG
  rationale: El numeral introduce a un individuo concreto. «Un escriba» mantiene esa especificidad sin sobrecargar el texto.
- source_word: γραμματεὺς
  english_pob_choice: scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - maestro de la Ley
  - experto en la Ley
  lexicon: BDAG
  rationale: «Escriba» es el equivalente directo y transparente en español bíblico para γραμματεύς; las alternativas explicitan más de lo que el griego exige aquí.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro mío
  - Rabí
  lexicon: BDAG
  rationale: En español, «Maestro» comunica la forma vocativa respetuosa y el valor léxico de διδάσκαλος. «Rabí» introduciría una transliteración no necesaria; «Maestro» es más natural que «Teacher» en un texto español.
- source_word: ἀκολουθήσω
  english_pob_choice: I will follow
  chosen_spanish: te seguiré
  alternatives_spanish:
  - te seguiré como discípulo
  - te acompañaré
  lexicon: BDAG
  rationale: El futuro expresa intención. «Te seguiré» conserva tanto la acción literal como la carga de discipulado implícita sin explicitarla en exceso.
- source_word: ὅπου ἐὰν
  english_pob_choice: wherever
  chosen_spanish: adondequiera que
  alternatives_spanish:
  - dondequiera que
  - a donde vayas
  lexicon: BDAG
  rationale: La combinación expresa indeterminación de lugar. «Adondequiera que» funciona de manera natural en español y refleja la amplitud del griego.
- source_word: ἀπέρχῃ
  english_pob_choice: you go
  chosen_spanish: vayas
  alternatives_spanish:
  - te vayas
  - partas
  - te alejes
  lexicon: BDAG
  rationale: Aunque el verbo puede significar «irse» o «partir», en este contexto español natural es «vayas». La nota preserva la alternativa más literal.
theological_decisions:
- issue: 'Título de Jesús: διδάσκαλος'
  english_pob_reading: Teacher
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Rabí
  - Señor
  rationale: El pasaje presenta un trato respetuoso a Jesús sin requerir un título cristológico más fuerte. «Maestro» traduce el sentido léxico y evita añadir peso doctrinal que el texto no explicita.
  doctrine_reference: 'Translation philosophy: traducir títulos; conservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: Se corrigió la marca de nota al anclarla exactamente en el texto español con [a], evitando una nota sin anclaje. La redacción mantiene la distinción entre el movimiento de acercarse y el compromiso de seguir a Jesús dondequiera que vaya.
  spanish_consistency_notes:
  - Se mantuvo «escriba» para γραμματεύς, en línea con el uso bíblico estándar y la transparencia léxica.
  - Se tradujo el vocativo Διδάσκαλε por «Maestro» para conservar el tono de respeto sin importar un título no exigido por el griego.
  - Se evitó «SEÑOR» para κύριος porque aquí no aparece; no hay necesidad de introducir terminología de sustitución.
  - La frase final usa «adondequiera que vayas» como equivalente idiomático de ὅπου ἐὰν ἀπέρχῃ, con nota para la alternativa más literal.
