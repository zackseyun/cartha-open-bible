    text: O «di la palabra». El griego dice literalmente «habla una palabra».
    reason: lexical_alternative
  - marker: b
    text: O «muchacho» o «niño» para παῖς; la palabra griega puede referirse, según el contexto, a un muchacho, un niño o un siervo.
    reason: alternative_reading
  revision_rationale: La revisión elimina una adición no sustentada («Entonces»), mejora la naturalidad española de la fórmula introductoria al fusionar idiomáticamente ἀποκριθεὶς + ἔφη como «respondió», y alinea παῖς con la decisión documentada del POB inglés («servant») usando «siervo» en vez de «esclavo». Se conserva la imagen «bajo mi techo», el tratamiento «Señor» y la nota sobre «di la palabra»/«habla una palabra».
