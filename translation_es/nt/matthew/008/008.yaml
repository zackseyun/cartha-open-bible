translation:
  language: es
  text: 'Y respondió el centurión: «Señor, no soy digno de que entres bajo mi techo; pero solo di una palabra[a], y mi siervo[b] será sanado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «di la palabra». El griego dice literalmente «habla una palabra».
    reason: lexical_alternative
  - marker: b
    text: O «muchacho» o «niño» para παῖς; la palabra griega puede referirse, según el contexto, a un muchacho, un niño o un siervo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς / ἔφη
  english_pob_choice: answered
  chosen_spanish: respondiendo, ... dijo
  alternatives_spanish:
  - y respondió
  - respondió
  lexicon: BDAG
  rationale: El participio aoristo con verbo de habla funciona idiomáticamente en la narración. En español, «respondiendo, ... dijo» conserva la respuesta sin la redundancia de repetir dos verbos finitos, y suena natural y digno.
- source_word: ἑκατόνταρχος
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  lexicon: BDAG
  rationale: «Centurión» es el equivalente preciso y establecido en español para el comandante de aproximadamente cien soldados. Mantiene la correspondencia histórica y narrativa.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - amo
  lexicon: BDAG
  rationale: Se conserva «Señor» porque el audit trail inglés fija «Lord» como decisión doctrinal por defecto para κύριος. En el contexto de Jesús, mantiene la reverencia y la posible resonancia cristológica sin forzar una paráfrasis.
- source_word: ἱκανὸς
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  lexicon: BDAG
  rationale: En este giro, ἱκανός expresa idoneidad o merecimiento moral/social. «Digno» reproduce bien esa evaluación de humildad ante Jesús y es el equivalente natural en español bíblico actual.
- source_word: ὑπὸ τὴν στέγην
  english_pob_choice: under my roof
  chosen_spanish: bajo mi techo
  alternatives_spanish:
  - a mi casa
  - bajo mi techo de casa
  lexicon: BDAG
  rationale: Se mantiene la imagen doméstica idiomática con «bajo mi techo», que en español transmite naturalmente el mismo valor que «under my roof» y preserva la fuerza figurada del griego.
- source_word: εἰπὲ λόγῳ
  english_pob_choice: speak a word
  chosen_spanish: di una palabra
  alternatives_spanish:
  - sólo habla una palabra
  - pronuncia una palabra
  lexicon: BDAG
  rationale: El dativo λόγῳ funciona como medio/instrumento. «Di una palabra» conserva la estructura breve y el sentido directo; además refleja la opción inglesa de preservar la literalidad del giro, sin volverlo excesivamente idiomático.
- source_word: ἰαθήσεται
  english_pob_choice: will be healed
  chosen_spanish: será sanado
  alternatives_spanish:
  - será curado
  - será sanado por completo
  lexicon: BDAG
  rationale: El pasivo futuro de ἰάομαι denota sanidad. «Será sanado» es claro y bíblicamente natural en español; evita introducir matices extra que no están explícitos en el texto.
- source_word: παῖς
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - muchacho
  - niño
  lexicon: BDAG
  rationale: Se elige «esclavo» porque el proyecto POB normalmente preserva esa fuerza léxica donde el inglés opta por «slave». Aunque παῖς puede significar «muchacho», «niño» o «sirviente», aquí la relación social del centurión con su subordinado favorece la referencia a un dependiente bajo su autoridad. Se mantiene la ambigüedad en nota porque el término sigue siendo amplio.
theological_decisions:
- issue: Tratamiento de κύριος al dirigirse a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - amo
  rationale: 'Se conserva la decisión doctrinal heredada del audit trail inglés: κύριος se traduce por «Señor». En una escena dirigida a Jesús, esto mantiene la reverencia y la posible carga cristológica sin añadir una explicación doctrinal ajena al versículo.'
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord'
- issue: Ambigüedad de παῖς
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - muchacho
  - niño
  rationale: 'La tensión léxica no se elimina: παῖς puede abarcar varias edades y roles. En el contexto narrativo de un centurión, la relación jerárquica favorece «esclavo», pero la nota conserva la posibilidad de otras lecturas para no cerrar indebidamente el texto.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preservar tensiones interpretativas genuinas'
translation_notes:
  revision_awareness: 'El texto sigue el estado revisado más reciente del expediente inglés, sin cambios sustantivos respecto a la decisión final: se mantiene la estructura narrativa, la metáfora doméstica y la ambigüedad de παῖς con nota explicativa.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al criterio doctrinal del proyecto.
  - Se evitó «SEÑOR» como máscara tipográfica; el nombre divino no aparece en este versículo.
  - «bajo mi techo» preserva la imagen del griego y armoniza con el español bíblico contemporáneo.
  - Se optó por «esclavo» para reflejar la fuerza léxica del término en el marco social del relato, con nota para las alternativas posibles.
  - La puntuación y el tratamiento directo siguen un registro bíblico moderno y publicable en español.
