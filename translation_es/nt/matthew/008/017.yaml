  text: ὅπως πληρωθῇ τὸ ῥηθὲν διὰ Ἠσαΐου τοῦ προφήτου λέγοντος· Αὐτὸς τὰς ἀσθενείας ἡμῶν ἔλαβεν καὶ τὰς νόσους ἐβάστασεν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/017.yaml
  text: 'so that what was spoken through Isaiah the prophet might be fulfilled[b][a], saying: “He himself took our sicknesses and carried our diseases.”'
  footnotes:
  - marker: a
    text: Or “infirmities.” The Greek ἀσθενείας can denote weaknesses, infirmities, or illnesses.
    reason: lexical_alternative
  - marker: b
    text: Or “bore our diseases.” 'Bore' preserves a closer verbal link to Isaiah 53:4 and traditional English renderings.
    reason: alternative_reading
