    reason: alternative_reading
  revision_rationale: Se ajusta la pareja léxica para que el segundo sustantivo refleje mejor la especificidad de νόσους como «enfermedades», mientras el primero conserva una opción natural y corporal («dolencias») con nota alternativa. Se cambia «cargó nuestras dolencias» por «llevó nuestras enfermedades» para un español más idiomático y para mantener mejor la distinción con «tomó». También se corrige la nota b para explicar con más precisión el matiz tradicional vinculado a Isaías 53:4.
