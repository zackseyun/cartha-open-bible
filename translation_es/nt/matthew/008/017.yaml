- from: 'para que se cumpliera lo que fue dicho por medio de Isaías, el profeta, diciendo: «Él mismo tomó nuestras enfermedades[a] y cargó nuestras dolencias[b]».'
  to: 'para que se cumpliera lo que fue dicho por medio de Isaías, el profeta, diciendo: «Él mismo tomó nuestras dolencias[a] y llevó nuestras enfermedades[b]».'
  rationale: Se ajusta la pareja léxica para que el segundo sustantivo refleje mejor la especificidad de νόσους como «enfermedades», mientras el primero conserva una opción natural y corporal («dolencias») con nota alternativa. Se cambia «cargó nuestras dolencias» por «llevó nuestras enfermedades» para un español más idiomático y para mantener mejor la distinción con «tomó». También se corrige la nota b para explicar con más precisión el matiz tradicional vinculado a Isaías 53:4.
