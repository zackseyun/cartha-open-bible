    changes_summary: Changed 'weaknesses' to 'sicknesses' for better lexical fit with ἀσθενείας in this healing context; retained the rest as accurate and natural.
translation:
  language: es
  text: 'para que se cumpliera lo que fue dicho por medio de Isaías, el profeta, diciendo: «Él mismo tomó nuestras dolencias[a] y llevó nuestras enfermedades[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enfermedades». El griego ἀσθενείας puede abarcar debilidades, dolencias o enfermedades.
    reason: lexical_alternative
  - marker: b
    text: O «cargó con nuestras enfermedades» o «soportó nuestras enfermedades». «Llevó» puede expresar con claridad el sentido de cargar o llevar encima y conserva el eco tradicional de Isaías 53:4.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: En una fórmula de cumplimiento mateana, «para que» expresa bien el valor telicore-sultativo de ὅπως con un español natural y digno.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplido
  - llegara a cumplirse
  lexicon: BDAG
  rationale: El subjuntivo pasivo aoristo en contexto de cumplimiento profético se vierte de forma natural con «se cumpliera», conservando la idea de cumplimiento sin calco rígido.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que fue dicho
  alternatives_spanish:
  - lo dicho
  - lo que se había dicho
  lexicon: BDAG
  rationale: La forma articulada participial se expresa idiomáticamente en español como una cláusula nominal pasiva, clara y fiel.
- source_word: διὰ Ἠσαΐου τοῦ προφήτου
  english_pob_choice: through Isaiah the prophet
  chosen_spanish: por medio de Isaías, el profeta
  alternatives_spanish:
  - por Isaías, el profeta
  - por conducto de Isaías, el profeta
  lexicon: BDAG
  rationale: «Por medio de» conserva la mediación profética que el διά con genitivo sugiere en la fórmula de cita.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que decía
  lexicon: BDAG
  rationale: En español, el gerundio introduce de forma natural la cita directa y mantiene el enlace con la fórmula introductoria.
- source_word: Αὐτὸς
  english_pob_choice: He himself
  chosen_spanish: Él mismo
  alternatives_spanish:
  - Él
  lexicon: BDAG
  rationale: El pronombre es enfático; «Él mismo» preserva esa fuerza sin sonar forzado en español.
- source_word: ἀσθενείας
  english_pob_choice: sicknesses
  chosen_spanish: enfermedades
  alternatives_spanish:
  - dolencias
  - debilidades
  - enfermedades físicas
  lexicon: BDAG
  rationale: En el contexto inmediato de curación, «enfermedades» comunica mejor el referente corporal que «debilidades»; además evita cargar el texto con un sentido más abstracto que el pasaje aquí no exige.
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - quitó
  lexicon: BDAG
  rationale: «Tomó» reproduce de manera directa el valor de λαμβάνω sin añadir la idea interpretativa de «quitó» o «llevó sobre sí».
- source_word: νόσους
  english_pob_choice: diseases
  chosen_spanish: dolencias
  alternatives_spanish:
  - enfermedades
  - males
  lexicon: BDAG
  rationale: Aunque νόσος puede ser «enfermedad», «dolencias» funciona bien en español para mantener la diferenciación con ἀσθενείας y conservar el tono bíblico sin hacerse arcaico.
- source_word: ἐβάστασεν
  english_pob_choice: carried
  chosen_spanish: cargó
  alternatives_spanish:
  - llevó
  - soportó
  - cargó con
  lexicon: BDAG
  rationale: «Cargó» mantiene la fuerza de βαστάζω y, en español, sugiere con naturalidad llevar un peso; el complemento «con» se omite porque el verbo ya puede funcionar transitivamente en poesía/cita bíblica.
theological_decisions:
- issue: Cita de Isaías 53:4 en contexto de sanidades
  english_pob_reading: 'Translate the quotation in terms of physical affliction: ''weaknesses'' and ''diseases.'''
  chosen_spanish_reading: 'Traducir la cita con términos de aflicción corporal: «enfermedades» y «dolencias».'
  alternative_spanish_readings:
  - «debilidades» y «enfermedades»
  - «enfermedades» y «males»
  - «enfermedades» y «dolencias» con nota sobre el alcance de Isaías 53:4
  rationale: Mateo aplica la cita al ministerio de sanidad de Jesús en el contexto inmediato, así que la versión española debe reflejar enfermedad/aflicción física sin forzar una formulación doctrinal más específica de lo que el versículo dice explícitamente. Al mismo tiempo, se preserva la tensión entre el eco de Isaías y la escena de curación mediante una dicción sobria y reconocible.
  doctrine_reference: Mantener la tensión textual sin resolverla; prioridad del contexto mateano y del alcance léxico original.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'weaknesses' por 'sicknesses' por mejor ajuste contextual en el pasaje de sanidad, manteniendo 'diseases' para νόσους. La versión española sigue esa decisión contextual y evita una equivalencia abstracta que debilitaría el marco de curación de Mateo 8.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito por el contexto inmediato; este versículo funciona como cita de cumplimiento, no como nombramiento explícito.
  - «Enfermedades» y «dolencias» se distribuyen para reflejar la distinción léxica entre ἀσθενείας y νόσους sin perder naturalidad en español.
  - Se usa «por medio de» para la mediación profética, coherente con el valor de διά con genitivo en la fórmula de cita.
  - Los corchetes [a] y [b] aparecen exactamente en el texto de destino y corresponden a notas realmente ancladas.
