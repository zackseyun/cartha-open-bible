  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La elección «temporal» para σεισμός es defendible y coherente con la justificación contextual del POB, aunque «tempestad» también sería posible. «Barca» y «dormía» son apropiados.
