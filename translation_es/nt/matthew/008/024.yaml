translation:
  language: es
  text: Y he aquí[a], se levantó un gran temporal sobre el mar, de modo que la barca era cubierta por las olas[b]; pero él dormía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego σεισμός literalmente suele significar «terremoto» o «sacudimiento»; aquí, por el contexto del mar, designa un temporal violento.
    reason: lexical_alternative
  - marker: b
    text: 'O: «estaba siendo cubierta».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: ¡he aquí!
  alternatives_spanish:
  - mira
  - y he aquí
  - suddenly
  lexicon: BDAG
  rationale: Conserva el marcador discursivo de atención y sorpresa sin omitirlo. En español, «¡he aquí!» reproduce bien la función enfática y abrupta de ἰδοὺ; la exclamación ayuda a reflejar su vividez.
- source_word: σεισμὸς μέγας
  english_pob_choice: a great storm
  chosen_spanish: un gran temporal
  alternatives_spanish:
  - una gran tempestad
  - un gran terremoto
  - un gran sacudimiento
  lexicon: BDAG
  rationale: Aunque σεισμός puede significar literalmente «terremoto» o «sacudimiento», aquí el contexto marítimo exige una tormenta violenta. «Temporal» comunica naturalmente en español una agitación fuerte del mar sin importar una imagen de tierra firme.
- source_word: ἐγένετο
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - surgió
  - ocurrió
  - se produjo
  lexicon: BDAG
  rationale: Con un fenómeno meteorológico, «se levantó» expresa bien el inicio repentino e idiomático del temporal. Mantiene el valor eventivo de ἐγένετο sin sonar mecánico.
- source_word: ἐν τῇ θαλάσσῃ
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - en el mar
  - sobre el lago
  lexicon: BDAG
  rationale: El griego dice «en el mar/sea»; «sobre el mar» es natural en español para el ámbito donde ocurre la acción. Se conserva el término de la fuente sin sustituirlo por «lago».
- source_word: τὸ πλοῖον
  english_pob_choice: the boat
  chosen_spanish: la barca
  alternatives_spanish:
  - el barco
  - la embarcación
  lexicon: BDAG
  rationale: En el contexto de los Evangelios y del mar de Galilea, «barca» es la equivalencia más natural y precisa en español. «Barco» puede sonar demasiado grande para el contexto.
- source_word: καλύπτεσθαι
  english_pob_choice: was being swamped
  chosen_spanish: era cubierta
  alternatives_spanish:
  - iba siendo cubierta
  - era inundada
  - era anegada
  lexicon: BDAG
  rationale: 'El infinitivo pasivo presente expresa acción continua: las olas cubrían la barca. «Era cubierta» conserva la estructura pasiva y el movimiento progresivo sin añadir más interpretación de la que exige el griego.'
- source_word: ὑπὸ τῶν κυμάτων
  english_pob_choice: by the waves
  chosen_spanish: por las olas
  alternatives_spanish:
  - por las aguas
  - bajo las olas
  lexicon: BDAG
  rationale: 'ὑπό con genitivo marca el agente/medio en pasiva: las olas son las que cubren la barca. «Por las olas» refleja claramente esa relación causal.'
- source_word: αὐτὸς δὲ
  english_pob_choice: but he
  chosen_spanish: pero él
  alternatives_spanish:
  - y él
  - sin embargo, él
  lexicon: BDAG
  rationale: El contraste con el caos de la tormenta queda bien en español con «pero él». La fuerza enfática de αὐτός se mantiene en el cambio de foco sin sobrerrepresentarla.
- source_word: ἐκάθευδεν
  english_pob_choice: was sleeping
  chosen_spanish: dormía
  alternatives_spanish:
  - estaba durmiendo
  - seguía dormido
  lexicon: BDAG
  rationale: El imperfecto indica una acción en curso o estado continuo. «Dormía» es breve, natural y suficientemente aspectual en español para reflejar que seguía en sueño mientras la tormenta azotaba.
theological_decisions:
- issue: Valor de σεισμός en un contexto marítimo
  english_pob_reading: Rendered contextually as 'storm' rather than the more literal but misleading 'earthquake.'
  chosen_spanish_reading: «Temporal» en lugar de una traducción literal como «terremoto» o «sacudimiento».
  alternative_spanish_readings:
  - terremoto
  - sacudimiento
  - tempestad
  rationale: No se trata de suavizar el texto, sino de respetar su sentido contextual. El mar, la barca y las olas obligan a leer σεισμός como una perturbación violenta del agua; «temporal» comunica ese sentido con fidelidad y claridad en español.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; optimal equivalence'
- issue: Conservación del marcador deíctico e interjectivo ἰδοὺ
  english_pob_reading: behold
  chosen_spanish_reading: «¡he aquí!»
  alternative_spanish_readings:
  - «mira»
  - omitir el marcador
  rationale: 'El marcador no aporta doctrina, pero sí retórica narrativa: llama la atención sobre la irrupción del evento. Mantenerlo preserva la vivacidad del relato y evita aplanar el texto.'
  doctrine_reference: Narrative-discourse faithfulness; preserve source emphasis where present
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó de «was being covered» a «was being swamped» por una revisión de estilo/idiomaticidad, pero la justificación sigue reconociendo que el griego expresa cobertura progresiva de la barca por las olas. La versión española conserva esa tensión con un pasivo progresivo («era cubierta») y una nota alternativa, evitando exagerar más allá del dato griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el tetragrámaton, aunque no ocurre en este versículo.
  - Se usa «barca» por coherencia con el ámbito galileo y con el léxico narrativo de los Evangelios.
  - Se conserva el contraste final simple («pero él dormía») sin añadir explicaciones que el texto no ofrece.
