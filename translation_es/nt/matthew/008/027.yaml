translation:
  language: es
  text: 'Y los hombres se asombraron[a], diciendo: «¿Qué clase de hombre es este, que hasta los vientos y el mar le obedecen?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se maravillaron». El verbo griego expresa asombro o admiración súbita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἄνθρωποι
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los discípulos
  lexicon: BDAG
  rationale: ἄνθρωποι es masculino plural y, por el contexto inmediato, se refiere a los varones que iban en la barca. «Los hombres» conserva la precisión gramatical y contextual sin generalizar a «las personas» ni explicitar «los discípulos» más allá del texto.
- source_word: ἐθαύμασαν
  english_pob_choice: marveled
  chosen_spanish: se asombraron
  alternatives_spanish:
  - se maravillaron
  - quedaron asombrados
  lexicon: BDAG
  rationale: El aoristo expresa una reacción puntual de sorpresa. «Se asombraron» comunica bien la fuerza narrativa en español contemporáneo; «se maravillaron» sería posible, pero suena un poco más literario y menos directo.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio presente se vierte de manera natural como «diciendo», manteniendo la relación temporal y discursiva con el asombro previo.
- source_word: Ποταπός
  english_pob_choice: What sort of
  chosen_spanish: ¿Qué clase de
  alternatives_spanish:
  - ¿Qué tipo de
  - ¿Qué clase de hombre
  lexicon: BDAG
  rationale: ποταπός pregunta por la cualidad o clase de la persona. «¿Qué clase de» reproduce la pregunta de calidad/sort en español natural. Se omite repetir «hombre» al inicio y se coloca más adelante para una frase más fluida.
- source_word: οὗτος
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  lexicon: BDAG
  rationale: El demostrativo conserva la inmediatez del señalamiento. En español, «este» unido a la pregunta ya deja implícito el referente sin sobrecargar la frase.
- source_word: ὅτι καὶ οἱ ἄνεμοι καὶ ἡ θάλασσα
  english_pob_choice: that even the winds and the sea
  chosen_spanish: que hasta los vientos y el mar
  alternatives_spanish:
  - que incluso los vientos y el mar
  - que los vientos y el mar también
  lexicon: BDAG
  rationale: El primer καί intensifica la sorpresa; «hasta» expresa de forma idiomática esa fuerza enfática en español. Se conserva el plural «los vientos» y se traduce ἡ θάλασσα como «el mar», el equivalente más natural en este contexto narrativo.
- source_word: αὐτῷ ὑπακούουσιν
  english_pob_choice: obey him
  chosen_spanish: le obedecen
  alternatives_spanish:
  - le hacen caso
  - se le someten
  lexicon: BDAG
  rationale: ὑπακούω significa obedecer/escuchar bajo autoridad. «Le obedecen» mantiene esa relación de autoridad personal sobre fuerzas de la creación, central en el versículo.
theological_decisions:
- issue: Tensión cristológica implícita en la pregunta
  english_pob_reading: Render the question straightforwardly without adding interpretive expansion, while preserving the implication that Jesus exercises authority over creation.
  chosen_spanish_reading: Traducir la pregunta de manera directa, sin explicarla ni suavizarla, para conservar su fuerza implícita sobre la autoridad de Jesús sobre la creación.
  alternative_spanish_readings:
  - ¿Quién es este realmente, que hasta los vientos y el mar le obedecen?
  - ¿Qué clase de hombre puede ser este, que hasta los vientos y el mar le obedecen?
  rationale: El versículo presenta admiración y, a la vez, una insinuación cristológica que no debe resolverse en la traducción. La formulación elegida conserva la pregunta abierta y el peso narrativo de la obediencia de la creación a Jesús.
  doctrine_reference: Preservar la tensión teológica sin cerrarla interpretativamente.
translation_notes:
  revision_awareness: El borrador sigue el registro y la decisión inglesa de mantener la pregunta de ποιταπός como una cuestión de clase o cualidad, evitando explicitar más de lo que el texto dice. No se registran revisiones aplicadas en el tramo inglés; por eso el español mantiene una solución estable y directamente auditable desde el griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se mantiene «los hombres» para ἄνθρωποι por concordancia con el griego y el contexto narrativo masculino.
  - Se traduce θάλασσα como «mar» en singular por naturalidad española, sin perder el referente colectivo del agua.
  - Se conserva un registro reverente y sobrio, acorde con el estilo POB y con la pregunta retórica del original.
