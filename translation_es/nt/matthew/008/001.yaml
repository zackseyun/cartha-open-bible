translation:
  language: es
  text: Cuando descendió del monte[a], le siguieron grandes multitudes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchas multitudes le siguieron». La expresión griega dice literalmente «multitudes muchas», lo cual puede traducirse de manera más formal, aunque suena menos natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καταβάντος δὲ αὐτοῦ
  english_pob_choice: When he came down
  chosen_spanish: Cuando él descendió
  alternatives_spanish:
  - Y cuando él descendió
  - Después de que descendió
  - Al descender él
  lexicon: BDAG
  rationale: El participio genitivo aoristo con δέ se entiende mejor en español como una cláusula temporal. «Cuando él descendió» conserva la secuencia narrativa sin añadir matices no exigidos por el griego; «descendió» es más digno y natural que una paráfrasis excesiva.
- source_word: ἀπὸ τοῦ ὄρους
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - del monte/montaña
  lexicon: BDAG
  rationale: ὄρος puede ser «montaña» o «monte». En contexto mateano, «monte» conserva la referencia bíblica y suena natural en español; no se debe suavizar a un término menos marcado si el pasaje evoca el monte anterior.
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - le siguieron
  - fueron tras él
  - lo acompañaron
  lexicon: BDAG
  rationale: ἀκολουθέω aquí describe seguimiento físico. En español, «lo siguieron» mantiene el valor narrativo y la relación verbal con αὐτῷ sin introducir la idea más débil de simple acompañamiento.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: El dativo con ἀκολουθέω se traduce de forma natural como complemento directo en español («lo siguieron»). Aunque «le siguieron» es posible en algunos registros, «lo» resulta más claro y estilísticamente normal en gran parte del español latinoamericano.
- source_word: ὄχλοι πολλοί
  english_pob_choice: large crowds
  chosen_spanish: grandes multitudes
  alternatives_spanish:
  - muchas multitudes
  - multitudes grandes
  - muchedumbres numerosas
  lexicon: BDAG
  rationale: La combinación literal es «multitudes muchas», pero en español eso suena forzado. «Grandes multitudes» preserva el plural y la abundancia del original con naturalidad. No se debe reducir a «mucha gente» porque perdería la fuerza colectiva del sustantivo plural.
theological_decisions:
- issue: Pluralidad de ὄχλοι πολλοί
  english_pob_reading: large crowds
  chosen_spanish_reading: grandes multitudes
  alternative_spanish_readings:
  - muchas multitudes
  - multitudes numerosas
  rationale: El griego conserva la pluralidad de ὄχλοι; el español debe reflejar esa forma plural, aunque resulte menos idiomático que un singular colectivo. «Grandes multitudes» mantiene el dato textual sin borrar la tensión entre literalidad y naturalidad.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tomó como referencia la auditoría inglesa: el inglés optó por una equivalencia óptima, tradujo el participio genitivo como cláusula temporal, hizo natural el dativo con ἀκολουθέω y resolvió ὄχλοι πολλοί como «large crowds». La versión española conserva esas decisiones, pero ajusta la naturalidad propia del español con «grandes multitudes» y mantiene una nota para la literalidad subyacente.'
  spanish_consistency_notes:
  - Se mantiene «monte» en vez de «montaña» para armonizar con el registro bíblico y la referencia narrativa de Mateo.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - La frase verbal «lo siguieron» conserva la relación de objeto en español y no introduce un sentido teológico adicional.
