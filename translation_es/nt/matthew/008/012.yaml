review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego: contraste con δέ («Pero»), idiomatismo de υἱοὶ τῆς βασιλείας («hijos del reino»), expulsión pasiva futura de ἐκβληθήσονται, la imaginería de τὸ σκότος τὸ ἐξώτερον, y la cláusula final sobre llanto y gnashing. Sin embargo, «oscuridad exterior» suena menos idiomático y menos estable en español bíblico que «tinieblas exteriores», y la nota b ya reconoce esa mejor alternativa. Además, el pie c introduce una alternativa que no está anclada en el texto inglés auditado y la explicación sobre «dolor y angustia intensos» tiende a interpretar más allá del valor léxico básico.'
  spanish_quality_summary: 'El texto es claro y digno, pero puede mejorarse en naturalidad e idiomaticidad eclesial con un ajuste menor: «las tinieblas exteriores» lee mejor que «la oscuridad exterior» en este contexto mateano. «Crujir de dientes» es comprensible, pero «rechinar de dientes» es la forma más reconocible; aun así, no exige corrección obligatoria. El conjunto requiere solo una reparación pequeña.'
  glossary_alignment: 'No hay conflicto con la glosa teológica principal ni con la terminología del proyecto. «Hijos» preserva correctamente el masculino idiomático. «Serán expulsados» es aceptable para ἐκβληθήσονται. La principal desalineación es estilístico-lexical: para τὸ σκότος τὸ ἐξώτερον conviene usar la formulación bíblicamente asentada «las tinieblas exteriores».'
  issues:
  - severity: medium
    issue: «la oscuridad exterior» es menos idiomático que «las tinieblas exteriores» para τὸ σκότος τὸ ἐξώτερον
    rationale: Aunque semánticamente posible, en español bíblico y eclesial la expresión mateana se reconoce mejor como «las tinieblas exteriores», que además evita una formulación algo rígida y poco estable.
  - severity: low
    issue: La nota b funciona mejor como explicación de traducción adoptada que como mera alternativa
    rationale: Si se adopta «las tinieblas exteriores» en el texto, ya no hace falta presentar esa forma como alternativa; la nota puede aclarar que es una expresión fija mateana.
  - severity: low
    issue: La nota c sobre «dolor y angustia intensos» añade interpretación
    rationale: El inglés auditado no exige esa ampliación semántica; basta conservar la alternativa léxica sin explicar doctrinalmente la intensidad.
