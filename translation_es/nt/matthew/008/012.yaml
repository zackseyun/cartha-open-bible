revisions:
- from: Pero los hijos del reino serán expulsados[a] a la oscuridad exterior[b]. Allí habrá llanto y crujir de dientes[c].
  to: Pero los hijos del reino serán expulsados[a] a las tinieblas exteriores[b]. Allí habrá llanto y crujir de dientes[c].
  rationale: Se hace una corrección menor para usar la formulación española más idiomática y reconocible de la expresión mateana («las tinieblas exteriores»), manteniendo el sentido del griego y la imaginería de juicio sin sobreinterpretación. También se ajustan las notas para que expliquen alternativas reales sin añadir interpretación innecesaria.
