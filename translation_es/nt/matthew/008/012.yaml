translation:
  language: es
  text: Pero los hijos del reino serán expulsados[a] a las tinieblas exteriores[b]. Allí habrá llanto y crujir de dientes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán echados fuera». El griego ἐκβληθήσονται implica expulsión forzosa.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega es una fórmula mateana fija; también puede traducirse «la oscuridad exterior».
    reason: lexical_alternative
  - marker: c
    text: O «rechinar de dientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱοὶ τῆς βασιλείας
  english_pob_choice: the sons of the kingdom
  chosen_spanish: los hijos del reino
  alternatives_spanish:
  - los hijos del reino
  - los herederos del reino
  - los hijos del reinado
  lexicon: BDAG
  rationale: En español, «hijos» conserva la imagen filial del griego y su fuerza idiomática de pertenencia esperada al reino. «Hijos» resulta natural y evita el tono más técnico o menos idiomático de «herederos»; «del reinado» es posible, pero suena menos estable en este contexto bíblico.
- source_word: ἐκβληθήσονται
  english_pob_choice: will be cast out
  chosen_spanish: serán expulsados
  alternatives_spanish:
  - serán echados fuera
  - serán arrojados fuera
  - serán desterrados
  lexicon: BDAG
  rationale: El futuro pasivo de ἐκβάλλω expresa expulsión forzosa. «Serán expulsados» comunica bien esa fuerza en español sin volverse demasiado coloquial. «Echados fuera» es viable, pero menos formal; «arrojados» puede sonar más violento de lo necesario; «desterrados» introduce una imagen distinta.
- source_word: τὸ σκότος τὸ ἐξώτερον
  english_pob_choice: the outer darkness
  chosen_spanish: la oscuridad exterior
  alternatives_spanish:
  - la oscuridad de afuera
  - la oscuridad más exterior
  - las tinieblas exteriores
  lexicon: BDAG
  rationale: La expresión fija mateana puede representarse como «oscuridad exterior», que conserva el valor idiomático del comparativo ἐξώτερον y evita añadir una interpretación sistemática. «Tinieblas exteriores» es tradicional, pero «oscuridad» suena más natural en español moderno y sigue siendo fiel al campo semántico.
- source_word: κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - llanto
  - lloro
  - gemido
  lexicon: BDAG
  rationale: «Llanto» es una equivalencia natural para el lamento expresado por κλαυθμός. «Llorar»/«lloro» serían más literales pero menos idiomáticos en esta construcción fija; «gemido» añadiría un matiz no exigido por el término.
- source_word: βρυγμὸς τῶν ὀδόντων
  english_pob_choice: gnashing of teeth
  chosen_spanish: crujir de dientes
  alternatives_spanish:
  - rechinar de dientes
  - crujir de dientes
  - desgarrar de dientes
  lexicon: BDAG
  rationale: En español bíblico, «crujir de dientes» conserva la fuerza de la expresión fija y mantiene el paralelismo tradicional de la imagen. «Rechinar» es posible, pero «crujir» transmite bien el sonido/gesto idiomático sin ampliar la escena más allá del griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» marca con claridad el contraste con la declaración anterior sobre la entrada de muchos al reino. Es la opción más natural y fiel al valor discursivo de δέ en este contexto.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: Allí
  alternatives_spanish:
  - allí
  - en ese lugar
  lexicon: BDAG
  rationale: «Allí» reproduce el adverbio locativo con naturalidad en español y permite mantener la referencia espacial enfática del griego sin redundancia.
theological_decisions:
- issue: Imaginería de juicio sin sobretraducir a un término doctrinal más específico
  english_pob_reading: Retain the concrete imagery of expulsion into 'the outer darkness' and the stock phrase 'weeping and gnashing of teeth' without paraphrasing it into a systematic theological description.
  chosen_spanish_reading: Conservar la imagen concreta de expulsión a la «oscuridad exterior» y la fórmula «llanto y crujir de dientes», sin convertirla en una paráfrasis doctrinal como «infierno» o «castigo eterno».
  alternative_spanish_readings:
  - infierno
  - castigo eterno
  - condenación eterna
  rationale: El griego presenta una escena e imaginería de exclusión y angustia, pero no usa aquí el término específico para «infierno». Mantener la imagen preserva la tensión teológica del texto y evita añadir más de lo que el versículo dice.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Rendering of υἱοὶ with gender-accurate idiom
  english_pob_reading: Use 'sons' rather than a gender-neutral substitute in the main text.
  chosen_spanish_reading: Usar «hijos» en lugar de una sustitución neutralizante como «personas» o «niños».
  alternative_spanish_readings:
  - personas del reino
  - niños del reino
  - herederos del reino
  rationale: El plural masculino del griego funciona idiomáticamente y conviene preservarlo en una forma natural para español. «Hijos» mantiene la referencia filial y el matiz de pertenencia esperada al reino sin desdibujar la expresión.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'Se tuvieron en cuenta los ajustes del audit trail inglés: se preservó la imagen de exclusión en lugar de interpretarla como un término doctrinal más amplio, y se siguió la preferencia final por una traducción más formal de ἐκβληθήσονται y una clausula final locativa natural para ἐκεῖ.'
  spanish_consistency_notes:
  - Se mantuvo «reino» para βασιλεία en línea con la terminología bíblica usual y el valor del contexto.
  - «Oscuridad exterior» conserva el carácter idiomático de la expresión mateana sin imponer una interpretación escatológica adicional.
  - La combinación «llanto y crujir de dientes» suena natural en español y preserva el paralelismo del griego.
