revisions:
- from: Cuando llegó la noche[a], le trajeron muchos endemoniados; y expulsó a los espíritus con una sola palabra, y sanó a todos los que estaban enfermos.
  to: Cuando anocheció, le trajeron muchos endemoniados[a]; y expulsó a los espíritus con una palabra, y sanó a todos los que estaban enfermos.
  rationale: Se ajusta λόγῳ a «con una palabra» para no añadir énfasis no explícito, se mejora la naturalidad temporal con «Cuando anocheció», y se reemplaza la nota gramatical por la alternativa léxica documentada para δαιμονιζομένους, en línea con el audit trail inglés y las instrucciones de preservación de alternativas significativas.
