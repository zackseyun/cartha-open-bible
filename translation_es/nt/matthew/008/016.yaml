review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: marco temporal, traer a los endemoniados a Jesús, expulsión de los espíritus, y sanidad de los enfermos. También conserva correctamente la distinción entre exorcismo y enfermedad. Sin embargo, «con una sola palabra» intensifica λόγῳ más allá de lo expresado; el griego y el POB inglés dicen simplemente «con una palabra». Además, la nota a sobre Ὀψίας δὲ γενομένης no preserva la alternativa léxica documentada por el POB inglés para δαιμονιζομένους.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico contemporáneo. «Le trajeron muchos endemoniados» y «sanó a todos los que estaban enfermos» funcionan bien. No obstante, «Cuando llegó la noche» suena un poco más pesado que «Cuando anocheció», y la nota actual no apunta al lugar de mayor necesidad auditiva. La frase «con una sola palabra» suena idiomática, pero añade énfasis no explicitado en el texto fuente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Espíritus» y «sanó» están bien. «Endemoniados» es aceptable aquí como equivalente conciso de δαιμονιζομένους, pero conviene conservar en nota la alternativa «afligidos por demonios», ya que el POB inglés la documentó explícitamente.
  issues:
  - severity: medium
    issue: «con una sola palabra» añade el matiz de ‘sola’ que no está en λόγῳ
    rationale: 'El dativo instrumental indica medio: ‘con una palabra’. El añadido «sola» interpreta y refuerza la autoridad de Jesús más allá de lo que el griego expresa explícitamente en este versículo.'
  - severity: medium
    issue: La nota al pie no conserva la alternativa léxica documentada para δαιμονιζομένους
    rationale: 'El POB inglés incluyó una nota: ‘Or many afflicted by demons.’ El español debería preservar esa alternativa significativa, especialmente porque «endemoniados» puede oírse como más fuerte o más tradicional que otras opciones.'
  - severity: low
    issue: La nota actual sobre el genitivo absoluto es correcta pero menos útil para el lector común que una nota léxica sobre «endemoniados»
    rationale: La información gramatical es válida, pero el requisito prioriza preservar alternativas significativas del POB audit trail. Aquí la alternativa semántica en δαιμονιζομένους es más relevante para la revisión.
  revised_spanish_text: Cuando anocheció, le trajeron muchos endemoniados[a]; y expulsó a los espíritus con una palabra, y sanó a todos los que estaban enfermos.
  revised_footnotes:
  - marker: a
    text: O «muchos afligidos por demonios». El participio griego se refiere a personas bajo influencia demoníaca; «endemoniados» es la forma breve y convencional.
    reason: lexical_alternative
