translation:
  language: es
  text: Cuando anocheció, le trajeron muchos endemoniados[a]; y expulsó a los espíritus con una palabra, y sanó a todos los que estaban enfermos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos afligidos por demonios». El participio griego se refiere a personas bajo influencia demoníaca; «endemoniados» es la forma breve y convencional.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  english_pob_choice: When evening came
  chosen_spanish: Cuando llegó la noche
  alternatives_spanish:
  - Cuando anocheció
  - Al caer la tarde
  - Cuando llegó la tarde
  lexicon: BDAG
  rationale: El genitivo absoluto marca tiempo. «Cuando llegó la noche» conserva ese valor temporal y suena natural en español bíblico contemporáneo sin perder la referencia al inicio de la noche.
- source_word: προσήνεγκαν αὐτῷ
  english_pob_choice: they brought to him
  chosen_spanish: le trajeron
  alternatives_spanish:
  - lo llevaron a él
  - se los trajeron
  lexicon: BDAG
  rationale: El verbo indica que presentaron o llevaron personas a Jesús. «Le trajeron» es idiomático en español y conserva la dirección hacia Jesús sin añadir elementos no expresados.
- source_word: δαιμονιζομένους πολλούς
  english_pob_choice: many who were demon-possessed
  chosen_spanish: muchos endemoniados
  alternatives_spanish:
  - muchos que estaban endemoniados
  - muchos poseídos por demonios
  - muchos afligidos por demonios
  lexicon: BDAG
  rationale: El participio describe personas bajo influencia demoníaca. «Endemoniados» es breve, claro y tradicionalmente comprensible; mantiene la categoría textual sin psicologizarla ni suavizarla demasiado.
- source_word: ἐξέβαλεν τὰ πνεύματα
  english_pob_choice: he cast out the spirits
  chosen_spanish: expulsó a los espíritus
  alternatives_spanish:
  - echó fuera a los espíritus
  - expulsó los espíritus
  lexicon: BDAG
  rationale: ἐκβάλλω en contexto de exorcismo significa expulsar o echar fuera. Se conserva «los espíritus» para reflejar el objeto griego y mantener la distinción entre exorcismo y sanidad.
- source_word: λόγῳ
  english_pob_choice: with a word
  chosen_spanish: con una sola palabra
  alternatives_spanish:
  - con una palabra
  - por una palabra
  - con su palabra
  lexicon: BDAG
  rationale: El dativo instrumental expresa el medio. «Con una sola palabra» hace explícita la fuerza de la autoridad de Jesús y sigue siendo fiel al valor instrumental del griego, sin añadir «su» que no está en el texto.
- source_word: πάντας τοὺς κακῶς ἔχοντας
  english_pob_choice: all who were sick
  chosen_spanish: a todos los que estaban enfermos
  alternatives_spanish:
  - a todos los que estaban mal
  - a todos los que sufrían
  - a todos los enfermos
  lexicon: BDAG
  rationale: La expresión idiomática κακῶς ἔχειν significa estar enfermo o mal de salud. «Estaban enfermos» comunica el sentido con naturalidad y mantiene la distinción respecto de los endemoniados.
- source_word: ἐθεράπευσεν
  english_pob_choice: healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - los sanó
  - restauró
  lexicon: BDAG
  rationale: En narrativas de sanidad, θεραπεύω se traduce normalmente como «sanar». «Sanó» es natural y abarca la acción curativa sin reducirla a un matiz meramente médico.
theological_decisions:
- issue: Distinción entre posesión/demonización y enfermedad
  english_pob_reading: 'Render as real demonic affliction: ''demon-possessed'' and ''the spirits'''
  chosen_spanish_reading: 'Conservar dos categorías distintas: «endemoniados» y «espíritus» frente a «enfermos»'
  alternative_spanish_readings:
  - unificar todo como enfermedad
  - reducirlo a malestar psicológico
  - traducir todo como afligidos
  rationale: El versículo distingue entre exorcismo y sanidad. La traducción mantiene esa diferenciación textual y no la suaviza hacia una lectura psicológica o genérica.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Valor de λόγῳ como autoridad eficaz
  english_pob_reading: Translate instrumentally as 'with a word'
  chosen_spanish_reading: «con una sola palabra» expresa la eficacia inmediata de la orden
  alternative_spanish_readings:
  - con una palabra
  - por medio de una palabra
  - hablando
  rationale: La frase resalta la autoridad de Jesús sin ampliar el texto. «Una sola palabra» hace perceptible esa fuerza en español y sigue siendo compatible con el valor instrumental del dativo.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se detectaron revisiones aplicadas en la fuente de control más reciente. La redacción española sigue de cerca el valor temporal, exorcístico y de sanidad del original, preservando la distinción entre espíritus y enfermos.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «espíritus» para τὰ πνεύματα, conforme al valor literal del griego y a la distinción narrativa con «enfermos».
  - «Sanó» se reserva para θεραπεύω en contextos de curación narrativa; no se usa «curó» por preferencia estilística en esta sección.
  - La puntuación sigue la división del griego en dos miembros coordinados, con una coma fuerte interna en español para conservar el ritmo de la frase.
