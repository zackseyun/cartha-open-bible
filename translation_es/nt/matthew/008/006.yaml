translation:
  language: es
  text: 'y diciendo: «Señor, mi esclavo[a] está[b] en casa, paralítico, sufriendo terriblemente[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi muchacho» o «mi niño»; el griego παῖς puede referirse a un siervo/esclavo o a un hijo/niño. En este contexto, «esclavo» encaja mejor con el centurión.
    reason: lexical_alternative
  - marker: b
    text: O «yace»; el perfecto pasivo de βάλλω expresa un estado resultante.
    reason: lexical_alternative
  - marker: c
    text: O «siendo atormentado severamente». βασανίζω puede denotar tormento, dolor o aflicción intensa; la traducción principal opta por «sufriendo terriblemente» para un español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ λέγων
  english_pob_choice: and saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: SBLGNT / BDAG
  rationale: Conservo el participio presente de λέγων como vínculo narrativo en español. «Y diciendo» refleja la coordinación griega sin convertirlo innecesariamente en pasado finito.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Sir
  lexicon: BDAG
  rationale: «Señor» es la forma natural y reverente en español para el vocativo κύριε y preserva la amplitud respetuosa del griego sin reducirlo a un simple trato social.
- source_word: ὁ παῖς μου
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  - mi muchacho
  - mi niño
  - mi hijo
  lexicon: BDAG
  rationale: El campo semántico de παῖς incluye «niño/muchacho/siervo/esclavo». Dado el contexto del centurión y la decisión auditada de la POB inglesa de mantener la fuerza social del término, «esclavo» preserva mejor la relación de dependencia. La ambigüedad afectiva se deja abierta por el posesivo «mi».
- source_word: βέβληται
  english_pob_choice: is lying
  chosen_spanish: está
  alternatives_spanish:
  - está echado
  - yace
  - ha sido puesto
  lexicon: BDAG
  rationale: El perfecto pasivo de βάλλω expresa un estado resultante. En español, «está» comunica la condición actual del esclavo sin forzar una imagen demasiado literal como «ha sido puesto».
- source_word: παραλυτικός
  english_pob_choice: paralyzed
  chosen_spanish: paralítico
  alternatives_spanish:
  - paralizado
  - con parálisis
  lexicon: BDAG
  rationale: Como adjetivo predicativo, «paralítico» reproduce de manera natural el estado descrito y conserva el matiz clínico del griego. «Paralizado» también sería válido, pero aquí «paralítico» suena más directo en la construcción copulativa.
- source_word: ἐν τῇ οἰκίᾳ
  english_pob_choice: at home
  chosen_spanish: en casa
  alternatives_spanish:
  - en la casa
  - en el hogar
  lexicon: BDAG
  rationale: «En casa» es la forma idiomática más natural en español para la ubicación doméstica indicada por la frase. Mantiene el sentido locativo sin una literalidad pesada.
- source_word: δεινῶς βασανιζόμενος
  english_pob_choice: suffering terribly
  chosen_spanish: sufriendo terriblemente
  alternatives_spanish:
  - siendo atormentado severamente
  - padeciendo mucho
  - en terrible tormento
  lexicon: BDAG
  rationale: Conservo el adverbio intensivo «terriblemente» para δεινῶς y el participio pasivo «sufriendo» para βασανιζόμενος. Así se mantiene la amplitud de aflicción y la posible intensidad de tormento sin decidir demasiado pronto por una sola paráfrasis.
theological_decisions:
- issue: Valor de κύριε al dirigirse a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Sir
  rationale: '«Señor» conserva la ambigüedad auditada por la POB inglesa: puede ser un trato respetuoso o una confesión con mayor peso teológico. Evita rebajar el vocativo a un simple «Maestro» y corresponde al uso cristiano común sin borrar la tensión del contexto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → ''Lord'''
translation_notes:
  revision_awareness: La redacción española sigue el ajuste auditado en la POB inglesa que reordenó la ubicación («at home») después de la condición («paralyzed») para una lectura más natural. Aquí se refleja como «está paralítico en casa». También se mantiene el participio narrativo de λέγων y se conserva la intensidad de δεινῶς βασανιζόμενος sin atenuarla.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε conforme al valor doctrinal auditado de κύριος.
  - Se mantiene «esclavo» para παῖς por la fuerza léxica documentada; no se sustituye por «siervo» sin base contextual específica.
  - «En casa» traduce la ubicación doméstica de ἐν τῇ οἰκίᾳ de modo idiomático en español.
  - La secuencia «paralítico en casa» sigue la revisión de orden natural observada en la POB inglesa.
  - El tono general es reverente, moderno y apto para lectura eclesial en español neutral.
