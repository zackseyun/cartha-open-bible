revisions:
- from: 'Y acercándose, lo despertaron, diciéndole: «Señor, sálvanos[a], ¡perecemos!»'
  to: 'Y se acercaron y lo despertaron, diciendo: «Señor, sálvanos[a], ¡estamos pereciendo!»'
  rationale: La revisión mantiene todas las decisiones léxicas centrales del borrador, pero mejora la naturalidad del español y ajusta más de cerca la función narrativa del participio aoristo y el aspecto del verbo final. «Se acercaron» evita un gerundio algo calcado; «diciendo» refleja más literalmente λέγοντες; «estamos pereciendo» preserva mejor la sensación de peligro en curso de ἀπολλύμεθα. No se requiere adjudicación adicional.
