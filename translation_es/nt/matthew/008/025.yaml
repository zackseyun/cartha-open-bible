translation:
  language: es
  text: 'Y se acercaron y lo despertaron, diciendo: «Señor, sálvanos[a], ¡estamos pereciendo!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rescátanos». El imperativo griego σῶσον puede referirse tanto a una liberación inmediata del peligro como al sentido más amplio de «salvar».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: they came
  chosen_spanish: acercándose
  alternatives_spanish:
  - vinieron
  - se acercaron
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento hacia Jesús antes de despertarlo. En español, «acercándose» conserva esa proximidad previa y enlaza con naturalidad con el verbo siguiente, sin sobretraducir el detalle.
- source_word: ἤγειραν
  english_pob_choice: woke
  chosen_spanish: lo despertaron
  alternatives_spanish:
  - lo despertaron del sueño
  - lo levantaron
  lexicon: BDAG
  rationale: Aquí ἐγείρω tiene el sentido concreto de sacar a alguien del sueño. «Lo despertaron» expresa ese valor de forma clara y directa en español, evitando el sentido más amplio de «levantar».
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciéndole
  alternatives_spanish:
  - y diciendo
  - clamándole
  lexicon: BDAG
  rationale: El participio presenta el contenido del habla. En español, «diciéndole» integra de manera natural el destinatario implícito en αὐτόν y mantiene el flujo narrativo sin añadir intensidad no explicitada por el griego.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: El vocativo κύριος se traduce como «Señor», que en español bíblico conserva la función de título reverente dirigido a Jesús y coincide con la decisión inglesa de no rebajarlo a un mero «Maestro».
- source_word: σῶσον
  english_pob_choice: save us
  chosen_spanish: sálvanos
  alternatives_spanish:
  - rescátanos
  - líbranos
  lexicon: BDAG
  rationale: El imperativo aoristo de σῴζω puede abarcar salvar o rescatar en una situación inmediata de peligro. «Sálvanos» preserva la amplitud semántica y la conexión léxica con el término original; el contexto de la tormenta hace audible la urgencia de rescate sin cerrar el sentido.
- source_word: ἀπολλύμεθα
  english_pob_choice: we are perishing
  chosen_spanish: perecemos
  alternatives_spanish:
  - estamos pereciendo
  - nos estamos hundiendo
  lexicon: BDAG
  rationale: El presente indica una ruina inminente y en curso. «Perecemos» conserva la gravedad y la inmediatez del griego en una forma breve y natural para el español bíblico, sin limitarlo solo a muerte física.
theological_decisions:
- issue: Título κύριος dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: La dirección a Jesús con κύριος mantiene peso cristológico y reverencial. En español, «Señor» respeta esa carga mejor que «Maestro», que reduciría el alcance del título a una relación meramente pedagógica o funcional.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Alcance de σῴζω en una crisis inmediata
  english_pob_reading: save us / rescue us
  chosen_spanish_reading: sálvanos
  alternative_spanish_readings:
  - rescátanos
  - líbranos
  rationale: En el contexto de peligro inmediato, σῴζω puede significar tanto salvar como rescatar. «Sálvanos» preserva esa tensión sin resolverla de antemano; por eso no se limita a una sola paráfrasis de rescate.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego SBLGNT y concuerda con el auditorial inglés en el valor narrativo de προσελθόντες → came/acercándose, ἤγειραν → woke/despertaron, λέγοντες → saying/diciéndole, κύριε → Lord/Señor, σῶσον → save/rescata/sálvanos, y ἀπολλύμεθα → we are perishing/perecemos. No se documentaron revisiones textuales en el pass más reciente.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en concordancia con la política POB y con el inglés auditado.
  - Se mantiene «sálvanos» para σῶσον, dejando en nota la alternativa «rescátanos» por la tensión léxica documentada.
  - «Perecemos» conserva el valor de inminencia del presente ἀπολλύμεθα sin añadir detalles interpretativos.
  - La puntuación con comillas angulares y la exclamación final buscan una presentación bíblica clara y moderna.
