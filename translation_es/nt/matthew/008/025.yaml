  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del griego: acercarse a Jesús, despertarlo, dirigirse a él como «Señor», pedir salvación/rescate y expresar peligro inminente. Sin embargo, «acercándose» como gerundio suena menos natural que un verbo finito coordinado para el participio aoristo narrativo, y «¡perecemos!» pierde un poco el matiz progresivo/ingresivo de ἀπολλύμεθα frente a una forma como «nos estamos perdiendo» o mejor «estamos pereciendo».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad narrativa y en fuerza idiomática. «Y se acercaron y lo despertaron» o «Entonces se acercaron y lo despertaron» fluye mejor que «Y acercándose, lo despertaron». También conviene evitar que «diciéndole» cargue innecesariamente el dativo cuando basta «diciendo».
  glossary_alignment: «Señor» para Κύριε y «sálvanos» para σῶσον están bien alineados con las decisiones del proyecto y el rastro inglés. La nota léxica sobre «rescátanos» está bien planteada. No hay conflicto con la terminología doctrinal principal.
  issues:
  - severity: medium
    issue: «acercándose» suena menos natural para el participio aoristo narrativo
    rationale: προσελθόντες aquí funciona como acción antecedente/secuencial en narrativa. En español bíblico natural, «se acercaron» reproduce mejor la secuencia que un gerundio inicial, que puede sonar calco.
  - severity: low
    issue: «diciéndole» añade un matiz dativo no necesario
    rationale: λέγοντες solo introduce el habla. Como el destinatario ya es obvio por el contexto y el discurso directo, «diciendo» es más ceñido al griego y más limpio en español.
  - severity: medium
    issue: «¡perecemos!» puede sonar algo abrupto frente al aspecto de ἀπολλύμεθα
    rationale: Aunque es comprensible, el presente medio/pasivo expresa ruina inminente en curso. «¡Estamos pereciendo!» conserva mejor ese matiz y sigue siendo español claro y digno.
