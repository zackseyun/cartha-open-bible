translation:
  language: es
  text: 'Y Jesús le dice: «Las zorras tienen madrigueras[a], y las aves del cielo tienen nidos[c][b], pero el Hijo del Hombre no tiene dónde reclinar la cabeza[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agujeros» para «madrigueras».
    reason: lexical_alternative
  - marker: b
    text: O «las aves de los cielos» o tradicionalmente «las aves del aire».
    reason: lexical_alternative
  - marker: c
    text: O «lugares donde posarse» para «nidos».
    reason: lexical_alternative
  - marker: d
    text: «El Hijo del Hombre» es la auto-designación de Jesús; alternativamente, algunos lo traducen «el Ser Humano».
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Conserva el presente histórico del griego en un español natural. 'Dice' mantiene la vivacidad narrativa y se ajusta mejor al valor aspectual del original que un pasado simple.
- source_word: ἀλώπεκες
  english_pob_choice: foxes
  chosen_spanish: zorras
  alternatives_spanish:
  - zorros
  lexicon: BDAG
  rationale: Equivalente léxico directo. En español 'zorra' puede sonar despectivo en otros contextos, pero aquí nombra al animal; el plural mantiene la imagen concreta del dicho.
- source_word: φωλεοὺς
  english_pob_choice: dens
  chosen_spanish: madrigueras
  alternatives_spanish:
  - cuevas
  - agujeros
  lexicon: BDAG
  rationale: '''Madrigueras'' comunica de forma natural el lugar donde se refugian animales como las zorras. La alternativa ''agujeros'' conserva una posibilidad léxica más literal, pero suena menos idiomática en español.'
- source_word: πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del cielo
  - las aves de los cielos
  - los pájaros del cielo
  lexicon: BDAG
  rationale: '''Aves'' preserva un registro más bíblico y digno que ''pájaros'', sin perder claridad. ''Del cielo'' reproduce οὐρανοῦ de manera directa; no se adopta ''del aire'' porque el audit trail inglés prefirió ''sky'' sobre la versión tradicional.'
- source_word: κατασκηνώσεις
  english_pob_choice: nests
  chosen_spanish: nidos
  alternatives_spanish:
  - posaderos
  - lugares de descanso
  - albergues
  lexicon: BDAG
  rationale: En el contexto de las aves, 'nidos' es la equivalencia natural y concreta. Aunque el término puede sugerir 'lugares de alojamiento', esa opción en español sería menos precisa en la imagen animal del verso.
- source_word: ὁ δὲ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y la forma fija del dicho de Jesús, porque el griego presenta una auto-designación cargada de resonancia teológica. No se sustituye por una paráfrasis interpretativa.
- source_word: ποῦ
  english_pob_choice: nowhere
  chosen_spanish: dónde
  alternatives_spanish:
  - ningún lugar
  - en ningún sitio
  lexicon: BDAG
  rationale: Unido a la negación, el griego expresa la idea de 'no tiene dónde'. En español, 'dónde' dentro de la construcción negativa transmite con naturalidad la misma carencia de lugar sin forzar un adverbio absoluto.
- source_word: κλίνῃ
  english_pob_choice: to lay
  chosen_spanish: reclinar
  alternatives_spanish:
  - recostar
  - apoyar
  - poner
  lexicon: BDAG
  rationale: '''Reclinar la cabeza'' es una expresión natural y fiel en español. Mantiene la imagen corporal concreta del griego y evita una paráfrasis más abstracta como ''descansar''.'
theological_decisions:
- issue: Título cristológico υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Humano
  - el Ser Humano
  rationale: Se preserva el título tradicional porque el texto griego usa la auto-designación de Jesús con posible eco daniélico. Traducirlo como 'el Ser Humano' resolvería demasiado la tensión interpretativa y perdería resonancia bíblica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§2–3
translation_notes:
  revision_awareness: La versión inglesa más reciente no requirió cambios sustantivos; el ajuste principal en español es optar por un registro natural que conserve el presente histórico, la imagen animal concreta y el título cristológico sin paraphrasis.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se mantiene 'el Hijo del Hombre' como forma fija y reconocible, coherente con la política POB y con el valor del título en el contexto evangélico.
  - Se evita 'SEÑOR' o sustituciones litúrgicas innecesarias porque no intervienen en este versículo.
  - '''Aves del cielo'' sigue de cerca el griego οὐρανοῦ y conserva una formulación digna y comprensible en español.'
