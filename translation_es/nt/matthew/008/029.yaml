translation:
  language: es
  text: 'Y he aquí, clamaron, diciendo: «¿Qué tenemos nosotros que ver contigo[a], Hijo de Dios? ¿Has venido aquí antes del tiempo señalado[b] para atormentarnos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «¿Qué tenemos nosotros que ver el uno con el otro?»
    reason: lexical_alternative
  - marker: b
    text: O «antes del tiempo»; el griego puede aludir a un tiempo divinamente fijado.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y ve
  lexicon: BDAG
  rationale: Conserva el marcador discursivo de sorpresa y atención repentina. «He aquí» es una fórmula natural y reverente en español que mantiene la vivacidad de ἰδού sin omitirla.
- source_word: ἔκραξαν λέγοντες
  english_pob_choice: they cried out, saying
  chosen_spanish: clamaron, diciendo
  alternatives_spanish:
  - gritaron, diciendo
  - clamaron
  lexicon: BDAG
  rationale: «Clamaron» reproduce el grito fuerte e intenso de κράζω. Se conserva «diciendo» para reflejar el participio λέγοντες sin volver la frase pesada.
- source_word: Τί ἡμῖν καὶ σοί
  english_pob_choice: What have we to do with you
  chosen_spanish: ¿Qué tenemos nosotros que ver contigo?
  alternatives_spanish:
  - ¿Qué tenemos nosotros contigo?
  - ¿Qué hay entre nosotros y tú?
  lexicon: BDAG
  rationale: La expresión es idiomática y de separación u oposición. «Qué tenemos nosotros que ver contigo» comunica bien el sentido natural en español sin borrar la fuerza confrontativa del giro semítico.
- source_word: υἱὲ τοῦ θεοῦ
  english_pob_choice: Son of God
  chosen_spanish: Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios Altísimo
  lexicon: BDAG
  rationale: Se traduce de manera directa como título cristológico. En español, «Hijo de Dios» es claro, solemne y fiel al vocativo griego.
- source_word: ἦλθες ὧδε
  english_pob_choice: Have you come here
  chosen_spanish: ¿Has venido aquí
  alternatives_spanish:
  - ¿Viniste aquí
  lexicon: BDAG
  rationale: El perfecto español expresa bien la llegada con relevancia presente. «Aquí» conserva el valor locativo de ὧδε.
- source_word: πρὸ καιροῦ
  english_pob_choice: before the appointed time
  chosen_spanish: antes del tiempo señalado
  alternatives_spanish:
  - antes del tiempo
  - antes del momento fijado
  lexicon: BDAG
  rationale: «καιρός» aquí sugiere un tiempo determinado o fijado, no solo tiempo en sentido general. «Tiempo señalado» preserva esa nota de cita o límite establecido sin sobreexplicar.
- source_word: βασανίσαι
  english_pob_choice: to torment
  chosen_spanish: atormentarnos
  alternatives_spanish:
  - someternos a tormento
  - torturarnos
  lexicon: BDAG
  rationale: «βασανίζω» en este contexto apunta a tormento severo de juicio. «Atormentarnos» es natural en español y mantiene la intensidad sin añadir un matiz físico más fuerte que el texto no exige.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre objeto directo de forma simple y natural en español. Se integra en el infinitivo reflexivo-pronominal «atormentarnos» para conservar fluidez.
theological_decisions:
- issue: Reconocimiento cristológico por parte de los demonios
  english_pob_reading: Son of God
  chosen_spanish_reading: Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios Altísimo
  rationale: El texto presenta un título cristológico explícito en labios de los demonios. La traducción mantiene esa confesión directa sin suavizarla ni expandirla.
  doctrine_reference: Credo Niceno; principio de transparencia cristológica
- issue: Nuance escatológica de καιρός
  english_pob_reading: before the appointed time
  chosen_spanish_reading: antes del tiempo señalado
  alternative_spanish_readings:
  - antes del tiempo
  - antes del momento fijado
  rationale: La pregunta supone un tiempo establecido para el juicio o castigo. «Tiempo señalado» preserva esa tensión escatológica sin introducir una explicación doctrinal adicional.
  doctrine_reference: Escatología bíblica; Translation philosophy §3
translation_notes:
  revision_awareness: 'Se siguió el punto revisado del audit trail inglés: se prefirió una formulación más literal para Τί ἡμῖν καὶ σοί, evitando una paráfrasis más libre. También se conservó la lectura de «appointed time» para καιρός por su posible matiz escatológico.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se evitó «Cristo» porque el griego dice explícitamente «Hijo de Dios» como vocativo, y ese título se mantiene con transparencia.
  - Se prefirió «atormentarnos» para βασανίσαι por ajustarse al uso contextual de juicio y sufrimiento intenso.
  - La puntuación y el orden retienen el tono exclamativo del original sin añadir explicaciones interpretativas.
