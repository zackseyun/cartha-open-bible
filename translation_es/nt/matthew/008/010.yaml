translation:
  language: es
  text: 'Cuando Jesús oyó esto, se maravilló y dijo a los que lo seguían: «En verdad les digo[a]: en nadie en Israel he hallado una fe así[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «De cierto les digo».
    reason: lexical_alternative
  - marker: b
    text: O «No he hallado a nadie en Israel con una fe tan grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: When Jesus heard this
  chosen_spanish: Cuando Jesús oyó esto
  alternatives_spanish:
  - Al oír esto Jesús
  - Habiendo oído esto Jesús
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia de la acción principal. En español, una cláusula temporal con «cuando» suena natural y conserva la relación causal-temporal; «esto» explicita el referente implícito del dicho previo, tal como hace el inglés POB.
- source_word: ἐθαύμασεν
  english_pob_choice: he marveled
  chosen_spanish: se maravilló
  alternatives_spanish:
  - se asombró
  - quedó maravillado
  lexicon: BDAG
  rationale: «Se maravilló» expresa la reacción de sorpresa admirativa sin sugerir ignorancia o error en Jesús. Mantiene bien la fuerza narrativa del verbo griego.
- source_word: τοῖς ἀκολουθοῦσιν
  english_pob_choice: to those following him
  chosen_spanish: a los que lo seguían
  alternatives_spanish:
  - a sus seguidores
  - a los que iban siguiéndolo
  lexicon: BDAG
  rationale: El participio presente describe a las personas que acompañaban a Jesús en ese momento. «Los que lo seguían» conserva el valor descriptivo sin convertirlo en un término institucional como «seguidores».
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I tell you
  chosen_spanish: De cierto les digo
  alternatives_spanish:
  - Amén les digo
  - En verdad les digo
  lexicon: BDAG
  rationale: La fórmula solemne se traduce con una expresión natural en español bíblico. «De cierto» preserva la solemnidad y el énfasis de ἀμήν sin sonar tan ajeno como una transliteración.
- source_word: παρ’ οὐδενὶ
  english_pob_choice: with no one
  chosen_spanish: en ningún hombre
  alternatives_spanish:
  - con nadie
  - en nadie
  lexicon: BDAG
  rationale: La construcción griega expresa presencia/comparación en relación con una persona. «En ningún hombre» refleja bien el sentido de encontrar tal fe en alguien concreto; se evita un «con nadie» menos ajustado al punto focal de la comparación.
- source_word: τοσαύτην πίστιν
  english_pob_choice: such faith
  chosen_spanish: una fe así
  alternatives_spanish:
  - una fe tan grande
  - una fe semejante
  lexicon: BDAG
  rationale: «Fe» reproduce el valor normal de πίστις. «Una fe así» conserva el demostrativo intensivo de τοσαύτην de modo idiomático en español; «tan grande» comunica la intensidad pero introduce un matiz no explicitado en el texto.
- source_word: ἐν τῷ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: BDAG
  rationale: 'La frase es locativa y corporativa: dentro del pueblo de Israel. «En Israel» es la equivalencia más directa y natural.'
- source_word: εὗρον
  english_pob_choice: have I found
  chosen_spanish: he hallado
  alternatives_spanish:
  - encontré
  - he encontrado
  lexicon: BDAG
  rationale: El aoristo griego puede expresarse en español con perfecto compuesto en este contexto solemne. «He hallado» mantiene el registro bíblico y la perspectiva de experiencia hasta el presente; «hallar» evita la coloquialidad de «encontrar».
theological_decisions:
- issue: πίστις como confianza creyente del centurión
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - lealtad
  rationale: El contexto presenta la respuesta confiada del centurión a la autoridad de Jesús. En español, «fe» es la opción principal y coincide con la decisión documental del POB inglés; se preserva el sentido de confianza creyente sin añadir una paráfrasis doctrinal.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
translation_notes:
  revision_awareness: 'Se ha seguido el estado más reciente del expediente inglés, que indica revisión sin cambios necesarios (latest_revision_pass: unchanged=true). No se detectan enmiendas textuales adicionales en el flujo inglés; la versión española conserva la misma lectura base y sólo adapta el orden y la naturalidad idiomática.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «fe» para πίστις en coherencia con la política doctrinal indicada por el expediente.
  - Se traduce Ἀμὴν λέγω ὑμῖν con una fórmula solemne y no con transliteración, por claridad y lectura pública.
  - Se prefiere «hallado» por registro bíblico y consistencia con el matiz de descubrimiento del griego.
