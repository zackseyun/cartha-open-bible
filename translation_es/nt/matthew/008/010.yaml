revisions:
- from: 'Cuando Jesús oyó esto[a], se maravilló y dijo a los que lo seguían: «De cierto les digo[b]: en ningún hombre en Israel he hallado una fe así».'
  to: 'Cuando Jesús oyó esto, se maravilló y dijo a los que lo seguían: «En verdad les digo[a]: en nadie en Israel he hallado una fe así[b]».'
  rationale: Se corrige la expresión central para reflejar παρ’ οὐδενὶ de manera idiomática y sin añadir «hombre». Se repara la nota alternativa defectuosa y se mejora la naturalidad de la fórmula solemne con «En verdad les digo», conservando una alternativa más tradicional en nota. También se ajusta la alternativa sobre τοσαύτην πίστιν a un español correcto y claro.
