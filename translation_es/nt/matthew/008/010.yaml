review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: Jesús oye, se maravilla, habla a los que lo siguen y declara no haber encontrado tal fe en Israel. Sin embargo, dos puntos necesitan corrección para reflejar mejor el texto y el rastro POB: (1) παρ’ οὐδενὶ se vierte de modo más natural y exacto como «en nadie» o «en ninguna persona», no «en ningún hombre», que añade sesgo masculino innecesario; (2) la nota b actual es gramaticalmente incorrecta en español y no refleja bien la alternativa inglesa.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero mezcla registro bíblico tradicional con formulaciones poco naturales. «Se maravilló» y «he hallado» son aceptables. «De cierto les digo» es comprensible, aunque «En verdad les digo» suena más natural para un español moderno ampliamente eclesial. «En ningún hombre en Israel» resulta torpe y menos idiomático que «en nadie en Israel». La nota a también necesita reparación estilística: «tan grande una fe» debe ser «una fe tan grande».'
  glossary_alignment: No hay conflictos relevantes con la terminología doctrinal del proyecto. «Jesús» y «fe» están bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión sobre πίστις como «fe» está bien preservada.
  issues:
  - severity: medium
    issue: «en ningún hombre en Israel» para παρ’ οὐδενὶ ... ἐν τῷ Ἰσραήλ
    rationale: El griego no exige «hombre»; «en ningún hombre» suena forzado, introduce una especificación masculina no presente y es menos idiomático que «en nadie en Israel» o «en ninguna persona en Israel».
  - severity: medium
    issue: 'Nota b incorrecta: «He hallado a nadie en Israel con una fe así»'
    rationale: La alternativa española es agramatical y no representa adecuadamente la alternativa inglesa «I found no one in Israel with such faith». Debe ser «No he hallado a nadie en Israel con una fe así» o equivalente.
  - severity: low
    issue: 'Nota a poco natural: «tan grande una fe»'
    rationale: En español natural el orden correcto es «una fe tan grande».
  - severity: low
    issue: «De cierto les digo» suena más arcaizante que necesario
    rationale: Aunque no es infiel, «En verdad les digo» comunica mejor Ἀμὴν λέγω ὑμῖν en español moderno y digno, en línea con la filosofía de legibilidad del proyecto.
