    issue: Pronombre explícito innecesario en «Cuando él entró»
    rationale: El griego requiere referencia contextual a Jesús, pero el español no necesita el pronombre sujeto aquí. Omitirlo mejora la naturalidad sin perder claridad.
  - severity: medium
    issue: La nota al pie es incompleta frente a las alternativas auditadas
    rationale: El rastro inglés conserva dos alternativas léxicas para παρακαλῶν («begging/imploring him»). En español conviene reflejar ambas principales como «suplicándole» e «implorándole», no solo una de ellas.
