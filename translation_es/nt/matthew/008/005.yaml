translation:
  language: es
  text: Cuando entró en Capernaúm, se le acercó un centurión, rogándole[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «suplicándole» o «implorándole».
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰσελθόντος δὲ αὐτοῦ
  english_pob_choice: When he entered
  chosen_spanish: Cuando él entró
  alternatives_spanish:
  - Al entrar él
  - Cuando entró
  lexicon: BDAG
  rationale: El participio genitivo absoluto se vierte con una cláusula temporal natural en español. «Cuando él entró» conserva la secuencia narrativa sin forzar si la acción fue estrictamente anterior o simultánea. Se mantiene el pronombre explícito por claridad referencial en español.
- source_word: εἰς Καφαρναοὺμ
  english_pob_choice: Capernaum
  chosen_spanish: en Capernaúm
  alternatives_spanish:
  - a Capernaúm
  - hacia Capernaúm
  lexicon: BDAG
  rationale: El lugar propio se translitera como en el uso bíblico habitual en español. Dado que el verbo ya comunica la entrada, «en Capernaúm» fluye naturalmente y preserva el movimiento implícito sin añadir una preposición más pesada.
- source_word: προσῆλθεν αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se le acercó
  alternatives_spanish:
  - fue hacia él
  - se acercó a él
  lexicon: BDAG
  rationale: προσέρχομαι admite «venir a» o «acercarse». En español, «se le acercó» expresa bien el movimiento hacia Jesús y evita la repetición pesada de «a él». Mantiene el valor narrativo y relacional del contacto inicial.
- source_word: ἑκατόνταρχος
  english_pob_choice: centurion
  chosen_spanish: un centurión
  alternatives_spanish:
  - un oficial romano
  lexicon: BDAG
  rationale: «Centurión» es el equivalente técnico preciso del rango militar y es comprensible en español bíblico. Se evita una explicación más amplia para no perder precisión léxica.
- source_word: παρακαλῶν αὐτὸν
  english_pob_choice: pleading with him
  chosen_spanish: rogándole
  alternatives_spanish:
  - suplicándole
  - implorándole
  - pidiéndole ayuda
  lexicon: BDAG
  rationale: παρακαλέω en este contexto introduce una petición urgente y respetuosa. «Rogándole» conserva la fuerza de súplica sin exagerar hacia «suplicándole» ni suavizarla demasiado con un simple «pidiéndole».
translation_notes:
  revision_awareness: 'La redacción sigue el cierre revisado del audit trail inglés: se prefirió una expresión natural y formal para παρακαλῶν («pleading with him»), aquí reflejada como «rogándole», manteniendo el tono urgente sin intensificarlo en exceso. Se respetó además la lectura narrativa breve del verso, sin incorporar material explicativo ajeno al griego.'
  spanish_consistency_notes:
  - Se usa «Capernaúm» como forma española habitual del topónimo.
  - Se mantiene «centurión» para la precisión del rango militar.
  - Se traduce el participio final con un gerundio complementario para preservar la acción concomitante o de modo.
  - No se introduce «SEÑOR» ni otra máscara nominal, porque el verso no contiene el nombre divino.
