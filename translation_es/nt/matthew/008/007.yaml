    rationale: Las instrucciones requieren que todo marcador de nota aparezca exactamente dentro de `spanish_text` en la palabra o frase pertinente. En el borrador, la nota aparece fuera del texto citado, no anclada adecuadamente a la cláusula relevante.
  - severity: low
