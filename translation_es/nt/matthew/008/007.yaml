translation:
  language: es
  text: 'Y le dice: «Yo vendré[a] y lo sanaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Vendré y lo sanaré?». Algunos intérpretes entienden las palabras de Jesús como una pregunta por el contexto, pero la redacción griega se lee de manera natural como una declaración.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción simple mantiene la conexión narrativa sin añadir matiz temporal o inferencial que no está explícito en el griego.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: El presente histórico del griego se puede reproducir naturalmente en español con presente narrativo («dice/dicele»). Aquí «le dice» conserva la vivacidad del relato.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto se expresa con el clítico natural en español; es más idiomático que repetir «a él».
- source_word: Ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito conserva el énfasis del griego sin sobrerreforzarlo con «mismo».
- source_word: ἐλθὼν
  english_pob_choice: will come
  chosen_spanish: iré
  alternatives_spanish:
  - vendré
  - habiendo venido
  lexicon: BDAG
  rationale: Aunque el participio aoristo puede sugerir antecedencia o circunstancia adjunta, en este contexto la equivalencia natural en español es una futura de movimiento que capta la secuencia prevista sin forzar un gerundio o una perífrasis rígida.
- source_word: θεραπεύσω
  english_pob_choice: heal
  chosen_spanish: sanaré
  alternatives_spanish:
  - curaré
  - lo sanaré
  lexicon: BDAG
  rationale: En español «sanar» comunica bien el acto de restablecer la salud en este contexto narrativo; «curar» también es posible, pero «sanar» resulta más natural y digno aquí.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El objeto directo masculino singular se expresa de forma natural con «lo»; el referente es el siervo enfermo.
theological_decisions:
- issue: ¿Declaración o pregunta implícita?
  english_pob_reading: 'Statement: “I will come and heal him.”'
  chosen_spanish_reading: 'Declaración: «Yo iré y lo sanaré».'
  alternative_spanish_readings:
  - 'Pregunta: «¿Iré y lo sanaré? »'
  - 'Pregunta: «¿Acaso iré y lo sanaré?»'
  rationale: El texto griego carece de partícula interrogativa y se lee con naturalidad como una afirmación. Por eso el español mantiene una declaración. La nota preserva la lectura alternativa que algunos intérpretes proponen según el contexto.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §3 (preservar tensiones reales)
translation_notes:
  revision_awareness: 'El borrador sigue la lectura de alta concordancia del expediente inglés POB: el texto griego se toma como enunciado declarativo, con el presente histórico conservado en español narrativo y sin añadir interrogación no marcada por el original. No hay revisiones previas que incorporar.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque el versículo no usa Χριστός.
  - «Sanaré» se eligió por naturalidad; si en el contexto editorial se prefiere una terminología más clínica, «curaré» sería una alternativa admisible, pero no necesaria aquí.
