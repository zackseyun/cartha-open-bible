translation:
  language: es
  text: 'Y Jesús dijo al centurión: «Ve; como has creído, hágase para ti». Y el siervo[a] fue sanado en aquella hora.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el muchacho» o «el niño»; el griego παῖς puede referirse a un siervo o a una persona joven. En este contexto, «siervo» encaja mejor con el subordinado del centurión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκατοντάρχῃ
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial del ejército
  lexicon: BDAG
  rationale: Es el equivalente estándar y preciso para un oficial romano al mando de unos cien soldados. Conserva el valor histórico y narrativo del término griego sin expandirlo innecesariamente.
- source_word: Ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Anda
  lexicon: BDAG
  rationale: Reproduce el imperativo de partida con un español natural y directo. 'Ve' preserva la concisión del griego sin añadir matices no expresados.
- source_word: ὡς ἐπίστευσας
  english_pob_choice: as you have believed
  chosen_spanish: como has creído
  alternatives_spanish:
  - como creíste
  - según has creído
  lexicon: BDAG
  rationale: El aoristo expresa la acción de creer del centurión; 'has creído' mantiene ese acto personal de fe de forma clara y natural en español. 'Según has creído' sería más interpretativo.
- source_word: γενηθήτω σοι
  english_pob_choice: let it be done for you
  chosen_spanish: hágase contigo
  alternatives_spanish:
  - que se haga para ti
  - hágase para ti
  lexicon: BDAG
  rationale: La forma jussiva pasiva pide una solución que conserve el pasivo y la fuerza volitiva. 'Hágase contigo' comunica bien el efecto sobre la persona destinataria sin convertirlo en una paráfrasis extensa. Se preserva una leve tensión con la formulación inglesa, que destaca el realizado sobre la persona.
- source_word: παῖς
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  - muchacho
  - niño
  lexicon: BDAG
  rationale: En el contexto inmediato el referente es el subordinado del centurión; como el proyecto POB suele preferir la fuerza léxica de 'slave/esclavo' cuando el contexto lo permite, 'esclavo' mantiene esa fuerza mejor que 'siervo'. Se conserva la alternativa semántica de 'muchacho/niño' en nota porque παῖς también puede significar joven o hijo.
- source_word: ἰάθη
  english_pob_choice: was healed
  chosen_spanish: fue sanado
  alternatives_spanish:
  - fue curado
  - quedó sano
  lexicon: BDAG
  rationale: El pasivo de ἰάομαι indica sanidad/restauración. 'Fue sanado' es claro, solemne y fiel al valor verbal sin perder la dimensión de intervención divina.
- source_word: ἐν τῇ ὥρᾳ ἐκείνῃ
  english_pob_choice: in that hour
  chosen_spanish: en aquella hora
  alternatives_spanish:
  - en esa hora
  - en ese mismo momento
  lexicon: BDAG
  rationale: Es la correspondencia más literal y natural en español. Mantiene la referencia temporal inmediata sin intensificarla más allá de lo que el texto griego dice.
theological_decisions:
- issue: Traducción de πιστεύω/πίστις como acto de fe personal
  english_pob_reading: as you have believed
  chosen_spanish_reading: como has creído
  alternative_spanish_readings:
  - según tu fe
  - como has confiado
  rationale: El texto subraya el acto verbal de creer, no una abstracción doctrinal. Por eso se mantiene el verbo 'creer' en lugar de nominalizarlo como 'fe', preservando la fuerza de la respuesta del centurión sin introducir una formulación más interpretativa.
  doctrine_reference: 'DOCTRINE.md: contested terms table (πίστις → faith; alternatives trust/faithfulness)'
- issue: Valor contextual de παῖς en relación con el centurión
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  - muchacho
  - niño
  rationale: La narración presenta al centurión como dueño de un subordinado en una relación de autoridad doméstico-militar. 'Esclavo' refleja mejor esa subordinación que 'siervo', y evita suavizar la tensión social del término. La nota conserva la posibilidad léxica alternativa porque παῖς puede referirse a un joven o hijo en otros contextos.
  doctrine_reference: Lexical force policy for δοῦλος/παῖς in narrative contexts
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y el audit trail inglés, pero ajusta la sintaxis para español natural. Se conserva la decisión de traducir παῖς con una opción de fuerte carga social y se mantiene la temporalidad inmediata de ἐν τῇ ὥρᾳ ἐκείνῃ. No se introdujeron cambios textuales respecto del testimonio base.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para Ἰησοῦς y 'centurión' para ἑκατοντάρχης, en continuidad con la terminología del proyecto.
  - Se usa 'esclavo' por la fuerza contextual de παῖς; si el mismo término aparece en contextos menos determinados, deberá reevaluarse caso por caso.
  - La fórmula 'hágase contigo' conserva el pasivo jussivo; no se reemplazó por una expresión más explicativa para no diluir la forma verbal del original.
  - '''En aquella hora'' conserva el valor temporal de ἐν τῇ ὥρᾳ ἐκείνῃ sin intensificación interpretativa.'
