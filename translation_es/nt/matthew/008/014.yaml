  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Jesús', 'casa', 'suegra', 'acostada' y 'fiebre' son adecuados. La revisión propuesta mejora la legibilidad sin apartarse de las decisiones léxicas auditadas.
