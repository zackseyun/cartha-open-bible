translation:
  language: es
  text: Y cuando Jesús entró en la casa de Pedro, vio a la suegra de Pedro acostada[a] y con fiebre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acostada enferma en cama'. El griego dice literalmente que ella estaba 'puesta/acostada' y con fiebre; 'en cama' se sobreentiende por el contexto, pero no se expresa explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐλθὼν
  english_pob_choice: when Jesus came
  chosen_spanish: Y cuando Jesús entró
  alternatives_spanish:
  - Y cuando Jesús vino
  - Y al llegar Jesús
  lexicon: BDAG
  rationale: El participio aoristo de circunstancia concomitante o temporal se expresa naturalmente en español con una cláusula temporal. 'Entró' comunica el movimiento hacia la casa y preserva la secuencia narrativa sin sonar forzado.
- source_word: τὴν οἰκίαν Πέτρου
  english_pob_choice: Peter’s house
  chosen_spanish: la casa de Pedro
  alternatives_spanish:
  - la casa de Pedro
  - la vivienda de Pedro
  lexicon: BDAG
  rationale: οἰκία denota casa/hogar. 'Casa de Pedro' es la forma natural y fiel en español, manteniendo la relación posesiva sin añadir matices no presentes en el griego.
- source_word: πενθερὰν αὐτοῦ
  english_pob_choice: his mother-in-law
  chosen_spanish: la suegra de él
  alternatives_spanish:
  - su suegra
  - la madre política de él
  lexicon: BDAG
  rationale: πενθερά significa específicamente 'suegra'. Se evita 'su suegra' para reducir la posibilidad de ambigüedad referencial en español; el contexto hace claro que el posesivo remite a Pedro. 'La suegra de él' conserva transparencia sintáctica.
- source_word: βεβλημένην
  english_pob_choice: lying down
  chosen_spanish: acostada
  alternatives_spanish:
  - echada
  - tendida
  - acostada en cama
  lexicon: BDAG
  rationale: El participio perfecto pasivo de βάλλω se usa idiomáticamente para una persona 'puesta/echada/acostada' en determinada condición. 'Acostada' comunica el estado sin introducir explícitamente 'en cama', que no aparece en el texto griego.
- source_word: πυρέσσουσαν
  english_pob_choice: having a fever
  chosen_spanish: con fiebre
  alternatives_spanish:
  - fiebril
  - teniendo fiebre
  - ardiendo con fiebre
  lexicon: BDAG
  rationale: El participio presente expresa la condición actual. 'Con fiebre' es breve, natural y fiel; evita el peso interpretativo de 'sufriendo' y mantiene la simple descripción del estado.
theological_decisions:
- issue: Referente de αὐτοῦ en 'his mother-in-law'
  english_pob_reading: The pronoun refers to Peter, so the woman is Peter’s mother-in-law.
  chosen_spanish_reading: El posesivo se entiende como referente a Pedro, de modo que la mujer es la suegra de Pedro.
  alternative_spanish_readings:
  - La suegra de Jesús
  - La suegra de él (sin antecedente explícito)
  rationale: El contexto inmediato habla de la casa de Pedro; por tanto, el posesivo se refiere a Pedro y no a Jesús. La redacción española evita ambigüedad manteniendo la relación de parentesco tal como exige el contexto narrativo.
  doctrine_reference: Contexto narrativo y sintaxis del pasaje
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'having a fever' frente a 'suffering with a fever'; por eso el español evita añadir 'sufriendo' y opta por una formulación más directa ('con fiebre'). También se respetó la nota inglesa sobre el valor idiomático de 'lying down' sin importar 'en cama', que no está explícito en el griego.
  spanish_consistency_notes:
  - Se usa 'Jesús' como nombre propio y 'Pedro' como referente posesivo claro.
  - Se evitó 'SEÑOR' o cualquier sustitución reverencial no presente en el texto.
  - '''Acostada'' conserva la sencillez descriptiva del participio griego sin sobredeterminar el lugar.'
  - La puntuación sigue la costumbre española con coma y punto final, y se emplea el inciso natural 'de él' para desambiguar el posesivo.
