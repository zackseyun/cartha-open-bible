translation:
  language: es
  text: 'Pero Jesús le dice: «Sígueme, y deja a los muertos[a] enterrar a sus propios muertos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La primera mención de «muertos» suele entenderse de manera metafórica: quienes no responden espiritualmente a Jesús pueden encargarse de enterrar a los muertos físicos.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Expresa la leve oposición o continuación correctiva de Jesús frente a la petición anterior sin sobrecargar el contraste.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico se mantiene mejor con «dice», conservando la vivacidad narrativa del griego.
- source_word: Ἀκολούθει μοι
  english_pob_choice: Follow me
  chosen_spanish: Sígueme
  alternatives_spanish:
  - Ven conmigo
  - Ven detrás de mí
  lexicon: BDAG
  rationale: Es el imperativo directo de discipulado; «Sígueme» es la equivalencia natural y fiel en español.
- source_word: ἄφες
  english_pob_choice: leave
  chosen_spanish: deja que
  alternatives_spanish:
  - deja
  - permite
  lexicon: BDAG
  rationale: En español, «deja que» comunica mejor la idea de permitir o abandonar la responsabilidad que el verbo griego sugiere en este contexto.
- source_word: νεκρούς ... νεκρούς
  english_pob_choice: the dead ... dead
  chosen_spanish: los muertos ... muertos
  alternatives_spanish:
  - los difuntos ... difuntos
  - los que están muertos ... muertos
  lexicon: BDAG
  rationale: Se preserva la repetición deliberada del mismo término para mantener el juego retórico y la tensión teológica del dicho.
- source_word: θάψαι
  english_pob_choice: to bury
  chosen_spanish: entierren
  alternatives_spanish:
  - sepultar
  - enterrar
  lexicon: BDAG
  rationale: 'Aunque el infinitivo griego es «enterrar/sepultar», el español pide una subordinada natural: «deja que los muertos entierren...». Se conserva la acción funeraria sin rigidizar la sintaxis.'
- source_word: τοὺς ἑαυτῶν νεκρούς
  english_pob_choice: their own dead
  chosen_spanish: a sus propios muertos
  alternatives_spanish:
  - a sus muertos
  - a los suyos muertos
  lexicon: BDAG
  rationale: «Propios» refleja el matiz reflexivo de ἑαυτῶν y evita perder el énfasis de pertenencia personal.
theological_decisions:
- issue: Sentido de los primeros «muertos»
  english_pob_reading: 'The first ''dead'' is often understood metaphorically: those who are spiritually unresponsive may bury the physically dead.'
  chosen_spanish_reading: La primera mención de «los muertos» puede entenderse metafóricamente de quienes están espiritualmente indiferentes; la segunda es literal.
  alternative_spanish_readings:
  - La primera mención se refiere a los espiritualmente muertos.
  - La primera mención alude a los que no responden a Jesús.
  rationale: La traducción principal conserva la repetición sin explicarla en el cuerpo del texto, pero la nota aclara la lectura metafórica probable sin imponerla como glosa intratextual. Así se preserva la tensión observada en el texto griego.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica sin resolverla en el texto principal.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el expediente auditado confirma alto acuerdo entre revisores y sin objeciones textuales. Se mantuvo la lectura principal que preserva el presente histórico y la repetición de «muertos» sin explicitar la metáfora en el texto principal.
  spanish_consistency_notes:
  - Se usa «Jesús» sin artículo, conforme al referente nominal en el griego.
  - Se mantiene el presente histórico con «dice» para coherencia narrativa.
  - «Muertos» se repite en ambos miembros para reflejar la estructura enfática del griego.
  - Se eligió «Pero» para δὲ por su valor contrastivo leve en español bíblico moderno.
