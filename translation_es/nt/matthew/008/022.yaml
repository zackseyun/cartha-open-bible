  source_alignment_summary: El borrador español refleja bien el sentido general del griego y conserva correctamente la repetición deliberada de «muertos ... muertos», así como el presente histórico «dice» y el imperativo de discipulado «Sígueme». Sin embargo, coloca la nota al final de la cita en vez de anclarla en la primera ocurrencia relevante de «muertos», y la construcción «deja que» suaviza un poco el matiz renunciatorio de ἄφες en comparación con una formulación más directa.
  spanish_quality_summary: El español es claro, natural y de registro adecuado. Aun así, una leve mejora de estilo y fidelidad sería usar «deja a los muertos enterrar...» para reflejar mejor la fuerza de ἄφες y mantener una sintaxis más cercana al dicho proverbial sin sonar forzada. También conviene mover la nota al primer «muertos» para evitar ambigüedad sobre cuál término comenta.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Jesús», «Sígueme» y «muertos» están bien. La decisión clave es ἄφες: «deja» se alinea mejor con el English POB («leave») que «deja que», que tiende más hacia permiso que hacia desprendimiento.'
