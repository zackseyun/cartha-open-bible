  to: 'Pero Jesús le dice: «Sígueme, y deja a los muertos[a] enterrar a sus propios muertos».'
  rationale: Se ajusta «deja que» a «deja a» para reflejar mejor el matiz renunciatorio de ἄφες y alinearse con la decisión léxica auditada en inglés («leave»). Se conserva la repetición «muertos ... muertos» y «sus propios muertos» para preservar el juego retórico y el énfasis reflexivo. La nota se mueve al primer «muertos» porque esa es la expresión que la nota interpreta.
