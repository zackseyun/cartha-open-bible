translation:
  language: es
  text: 'Y extendiendo la mano, lo tocó, diciendo: «Quiero[a]; sé limpio». Y al instante su lepra[b] fue purificada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Estoy dispuesto»; aquí la respuesta expresa voluntad/disposición, no solo un futuro («lo haré»).
    reason: alternative_reading
  - marker: b
    text: «Lepra» traduce el griego λέπρα, término que puede referirse más ampliamente a enfermedades graves de la piel, no solo a la lepra de Hansen en sentido moderno.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκτείνας τὴν χεῖρα
  english_pob_choice: stretching out his hand
  chosen_spanish: extendiendo la mano
  alternatives_spanish:
  - estirando la mano
  - alargando la mano
  lexicon: BDAG
  rationale: La acción participial se entiende naturalmente como una acción concomitante previa en español. «Extendiendo la mano» conserva la imagen física concreta sin sonar artificial.
- source_word: ἥψατο αὐτοῦ
  english_pob_choice: he touched him
  chosen_spanish: lo tocó
  alternatives_spanish:
  - tocó a él
  - lo tomó
  lexicon: BDAG
  rationale: ἅπτομαι con genitivo significa aquí «tocar». En español, «lo tocó» es natural y directo, y mantiene el gesto sanador.
- source_word: Θέλω
  english_pob_choice: I am willing
  chosen_spanish: Estoy dispuesto
  alternatives_spanish:
  - Quiero
  - Lo quiero
  lexicon: BDAG
  rationale: En este contexto Jesús responde a la cuestión de disposición, no solo de intención futura. «Estoy dispuesto» expresa voluntad personal y benevolencia sin forzar un futuro verbal.
- source_word: καθαρίσθητι
  english_pob_choice: be cleansed
  chosen_spanish: sé limpio
  alternatives_spanish:
  - sé purificado
  - quedar limpio
  lexicon: BDAG
  rationale: El imperativo pasivo apunta a la remoción de impureza ritual y física. «Sé limpio» comunica bien el campo semántico de καθαρίζω en español bíblico y mantiene brevedad imperativa.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: «Al instante» conserva la inmediatez enfática del griego y suena natural en español contemporáneo.
- source_word: ἐκαθαρίσθη
  english_pob_choice: was cleansed
  chosen_spanish: fue limpiada
  alternatives_spanish:
  - fue purificada
  - quedó limpia
  lexicon: BDAG
  rationale: Se mantiene el lexema de limpieza/cleansed con un verbo pasivo en español. Aunque «limpiada» puede sonar menos técnico que «purificada», preserva la correspondencia léxica y la relación con el mandato previo.
- source_word: ἡ λέπρα
  english_pob_choice: his leprosy
  chosen_spanish: su lepra
  alternatives_spanish:
  - la lepra de él
  - su enfermedad de la piel
  lexicon: BDAG
  rationale: «Lepra» conserva la terminología tradicional del texto bíblico. El posesivo refleja αὐτοῦ y mantiene la relación gramatical con el sujeto de la cláusula final.
theological_decisions:
- issue: Lenguaje de purificación en καθαρίζω
  english_pob_reading: Render with 'cleanse' language in both command and result
  chosen_spanish_reading: Traducir con lenguaje de limpieza/purificación en el mandato y el resultado
  alternative_spanish_readings:
  - traducir con 'sanar'
  - usar únicamente 'purificar'
  rationale: El griego enfatiza la limpieza, no solo la curación física. «Sé limpio» / «fue limpiada» conserva la dimensión de pureza ritual y corporal sin reducir el milagro a sanidad médica.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Matiz de Θέλω en la respuesta de Jesús
  english_pob_reading: I am willing
  chosen_spanish_reading: Estoy dispuesto
  alternative_spanish_readings:
  - Quiero
  - Yo quiero
  rationale: La respuesta de Jesús expresa benevolencia y consentimiento, no mero deseo. «Estoy dispuesto» preserva ese matiz interpersonal y teológico en español natural.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta que el inglés POB revisó la cláusula final para mantener como sujeto a «his leprosy»; en español se preserva esa relación gramatical con «su lepra» y el pasivo «fue limpiada», manteniendo la fuerza léxica de καθαρίζω. También se evitó traducir mecánicamente desde el inglés al elegir una formulación española natural para Θέλω y para el participio inicial.
  spanish_consistency_notes:
  - Se mantiene una equivalencia léxica consistente entre καθαρίζω y las formas «limpio/limpiada».
  - Se preserva el tono sobrio y reverente del registro bíblico sin caer en arcaismos innecesarios.
  - El posesivo «su» en «su lepra» refleja el genitivo griego αὐτοῦ y mantiene la construcción de la cláusula final.
