review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: participio inicial, toque, dicho directo, e inmediatez del resultado. Conserva correctamente el sujeto final «su lepra». Sin embargo, dos decisiones debilitan la fidelidad semántica del POB: «Estoy dispuesto» suena algo perifrástico frente a Θέλω y menos directo que la respuesta de Jesús, y «fue limpiada» no mantiene tan bien como «fue purificada» o «quedó limpio» el campo de καθαρίζω en contexto de impureza ritual. Además, falta en español la nota cultural sobre «lepra» que el rastro inglés preserva.'
  spanish_quality_summary: El español es claro y legible, pero «sé limpio» suena algo tradicional/formulario; es aceptable, aunque «queda limpio» sería menos literal. Dado que el proyecto quiere no paraprasear más allá de la evidencia, puede mantenerse «sé limpio». En cambio, «Estoy dispuesto» resulta menos natural en un dicho breve y solemne; «Quiero» es más directo y muy idiomático en este contexto. También conviene añadir la nota explicativa sobre «lepra» para evitar lectura anacrónica.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La clave aquí es mantener el lenguaje de καθαρίζω con eje de limpieza/purificación, no mera sanidad. «Quiero» para Θέλω encaja con la nota del inglés como alternativa principal posible en español; en este contexto suena más natural que «Estoy dispuesto» sin perder la idea de voluntad. «Lepra» debe conservarse en texto principal con nota cultural.
  issues:
  - severity: medium
    issue: «Estoy dispuesto» para Θέλω
    rationale: Aunque expresa disposición, en español suena más perifrástico y menos inmediato que la respuesta breve de Jesús. «Quiero» reproduce mejor la contundencia de Θέλω y sigue siendo natural y fiel al contexto de voluntad.
  - severity: medium
    issue: Falta la nota cultural sobre «lepra»
    rationale: El rastro inglés preserva explícitamente que λέπρα puede referirse más ampliamente a enfermedades serias de la piel, no solo a la lepra de Hansen. Esa información debe mantenerse también en español.
  - severity: low
    issue: La nota [a] actual no corresponde bien al texto anclado
    rationale: La nota «O “extendiendo la mano sobre él”» no refleja una alternativa textual especialmente pertinente para «la mano[a]» y puede confundir, porque αὐτοῦ depende de «tocó», no de «extendiendo la mano».
  revised_spanish_text: 'Y extendiendo la mano, lo tocó, diciendo: «Quiero[a]; sé limpio». Y al instante su lepra[b] fue purificada.'
  revised_footnotes:
