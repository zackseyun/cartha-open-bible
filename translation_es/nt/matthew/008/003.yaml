base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/003.yaml
  text: And stretching out his hand[a], he touched him, saying, “I am willing[c][b]; be cleansed.” And immediately his leprosy was cleansed.
  footnotes:
  - marker: a
    text: Or “I will; be made clean.”
    reason: lexical_alternative
  - marker: b
    text: “Leprosy” translates Greek λέπρα, a term that may refer more broadly to serious skin diseases than modern Hansen’s disease specifically.
    reason: cultural_note
  - marker: c
    text: Or 'his leprosy was cleansed'.
    reason: previous_rendering
