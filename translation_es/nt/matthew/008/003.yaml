revisions:
- from: 'Y extendiendo la mano[a], lo tocó, diciendo: «Estoy dispuesto[b]; sé limpio». Y al instante su lepra fue limpiada.'
  to: 'Y extendiendo la mano, lo tocó, diciendo: «Quiero[a]; sé limpio». Y al instante su lepra[b] fue purificada.'
  rationale: Se ajusta Θέλω a «Quiero» por ser más directo, idiomático y cercano a la brevedad del griego; se añade la nota cultural sobre «lepra» para preservar el contenido explicativo del rastro inglés; y se reemplaza «fue limpiada» por «fue purificada» para sostener mejor el matiz de καθαρίζω como limpieza con dimensión ritual, manteniendo el sujeto griego «su lepra».
  reviewer_model: gpt-5.4
