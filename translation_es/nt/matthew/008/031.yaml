translation:
  language: es
  text: 'Y los demonios seguían rogándole[a], diciendo: «Si nos echas fuera, envíanos a la piara de cerdos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le rogaban» o «le suplicaban»; el imperfecto griego sugiere una acción repetida o continua.
    reason: lexical_alternative
  - marker: b
    text: O «puercos»; también, más formalmente, «swine» en inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And the
  chosen_spanish: Y los
  alternatives_spanish:
  - Ahora los
  - Entonces los
  lexicon: BDAG
  rationale: δέ aquí continúa la narración; en español, 'Y los' conserva la secuencia narrativa sin sobrecargar el matiz contrastivo.
- source_word: δαίμονες
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus demoníacos
  lexicon: BDAG
  rationale: '''Demonios'' es el equivalente natural y directo en español para δαίμονες en este contexto de expulsión, y conserva el sentido de seres personales malignos.'
- source_word: παρεκάλουν
  english_pob_choice: kept begging
  chosen_spanish: seguían rogándole
  alternatives_spanish:
  - le rogaban
  - seguían suplicándole
  - lo imploraban
  lexicon: BDAG
  rationale: El imperfecto comunica acción continua o repetida; 'seguían rogándole' preserva ese valor durativo de manera idiomática en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  lexicon: BDAG
  rationale: El participio introduce el discurso directo y en español se rinde naturalmente con 'diciendo'.
- source_word: ἐκβάλλεις
  english_pob_choice: you cast ... out
  chosen_spanish: nos echas fuera
  alternatives_spanish:
  - nos expulsas
  - nos sacas
  lexicon: BDAG
  rationale: En contexto de exorcismo, 'echar fuera' reproduce con naturalidad el valor de ἐκβάλλω y es una expresión española clara y tradicional sin perder precisión.
- source_word: ἀπόστειλον
  english_pob_choice: send
  chosen_spanish: envíanos
  alternatives_spanish:
  - mándanos
  - despáchanos
  lexicon: BDAG
  rationale: El imperativo aoristo pide acción inmediata; 'envíanos' es la forma directa y natural en español para el pedido de ser enviados a otro lugar.
- source_word: ἀγέλην
  english_pob_choice: herd
  chosen_spanish: la piara
  alternatives_spanish:
  - el hato
  - el rebaño
  lexicon: BDAG
  rationale: Para cerdos, 'piara' es el término español más preciso y natural; evita una imagen genérica que perdería especificidad zoológica.
- source_word: χοίρων
  english_pob_choice: pigs
  chosen_spanish: de cerdos
  alternatives_spanish:
  - de puercos
  - de marranos
  lexicon: BDAG
  rationale: '''Cerdos'' es el equivalente contemporáneo claro para χοίρων; ''puercos'' o ''marranos'' serían más regionales o marcados.'
theological_decisions:
- issue: Representación de los seres espiritualmente malignos
  english_pob_reading: demons
  chosen_spanish_reading: demonios
  alternative_spanish_readings:
  - espíritus demoníacos
  rationale: La traducción mantiene la afirmación sobrenatural del texto sin suavizarla ni añadir explicaciones doctrinales; 'demonios' es transparente y congruente con el audit trail inglés.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota en el texto principal y manteniendo una traducción continua del imperfecto griego.
  spanish_consistency_notes:
  - Se preserva el valor iterativo del imperfecto con 'seguían rogándole'.
  - '''Echar fuera'' se usa para el lenguaje de exorcismo sin introducir terminología eclesiástica ajena al texto.'
  - '''Piara'' especifica el grupo de cerdos de manera natural en español.'
  - No se sustituyó 'demonios' por una glosa más interpretativa, para conservar la afirmación personal del griego.
