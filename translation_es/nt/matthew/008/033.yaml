translation:
  language: es
  text: Entonces los cuidadores de los cerdos huyeron[a], y al irse a la ciudad, informaron de todo, incluso de lo que había sucedido con los endemoniados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y las cosas acerca de los endemoniados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ βόσκοντες
  english_pob_choice: Then the herdsmen
  chosen_spanish: Entonces los cuidadores de los cerdos
  alternatives_spanish:
  - Entonces los pastores del hato
  - Entonces los que los apacentaban
  lexicon: BDAG
  rationale: βόσκοντες describe a quienes estaban alimentando o cuidando el rebaño; en este contexto de cerdos, 'cuidadores de los cerdos' expresa su función con claridad natural en español. 'Entonces' refleja δέ como progresión narrativa.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron corriendo
  lexicon: BDAG
  rationale: El aoristo de φεύγω tiene el sentido directo de huir. 'Huyeron' es la opción más natural y fiel en español.
- source_word: ἀπελθόντες εἰς τὴν πόλιν
  english_pob_choice: going away into the city
  chosen_spanish: al ir a la ciudad
  alternatives_spanish:
  - y al entrar en la ciudad
  - y después de ir a la ciudad
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma temporal y concisa en español como 'al ir'. Se mantiene el movimiento hacia la ciudad sin forzar una paráfrasis.
- source_word: ἀπήγγειλαν
  english_pob_choice: they reported
  chosen_spanish: informaron
  alternatives_spanish:
  - contaron
  - reportaron
  lexicon: BDAG
  rationale: ἀπαγγέλλω significa anunciar o comunicar noticias. 'Informaron' comunica adecuadamente el acto de relatar lo ocurrido en un registro claro y moderno.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: de todo
  alternatives_spanish:
  - todo
  - todo lo ocurrido
  lexicon: BDAG
  rationale: La forma griega es totalizadora. 'De todo' mantiene la amplitud del contenido comunicado con naturalidad en español.
- source_word: τὰ τῶν δαιμονιζομένων
  english_pob_choice: including what had happened to the demon-possessed men
  chosen_spanish: incluso de lo que había sucedido a los endemoniados
  alternatives_spanish:
  - y de las cosas acerca de los endemoniados
  - incluyendo lo relativo a los endemoniados
  lexicon: BDAG
  rationale: La frase literal significa 'las cosas de / acerca de los endemoniados'. En contexto se refiere a lo sucedido con ellos. 'Lo que había sucedido a los endemoniados' conserva ese sentido sin sobreexplicar. 'Endemoniados' refleja δαιμονιζομένων como personas bajo influencia demoníaca.
- source_word: δαιμονιζομένων
  english_pob_choice: demon-possessed men
  chosen_spanish: endemoniados
  alternatives_spanish:
  - demonizados
  - poseídos por demonios
  lexicon: BDAG
  rationale: El término alude a quienes están bajo la acción de demonios. 'Endemoniados' es una traducción estable en español bíblico y comprensible para lectores amplios, sin introducir una distinción doctrinal no explicitada por el texto.
theological_decisions:
- issue: Cómo expresar δαιμονιζομένων sin cargar una precisión doctrinal extra
  english_pob_reading: demon-possessed men
  chosen_spanish_reading: endemoniados
  alternative_spanish_readings:
  - poseídos por demonios
  - demonizados
  rationale: El pasaje presenta una aflicción demoníaca real, pero no define con mayor precisión su mecanismo. 'Endemoniados' conserva esa realidad en español sin añadir categorías teológicas que el texto no desarrolla.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Valor de τὰ τῶν δαιμονιζομένων como contenido del reporte
  english_pob_reading: including what had happened to the demon-possessed men
  chosen_spanish_reading: incluso de lo que había sucedido a los endemoniados
  alternative_spanish_readings:
  - y las cosas acerca de los endemoniados
  - incluyendo lo relativo a los endemoniados
  rationale: La construcción griega apunta a 'las cosas relacionadas con' los endemoniados. En español, una formulación explícita como 'lo que había sucedido' comunica la referencia contextual de manera fiel y natural.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en 'huyeron[a]'. La redacción sigue de cerca el griego y el audit trail inglés, manteniendo la alternancia entre el movimiento a la ciudad y el contenido total del reporte.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; aquí no aplica.
  - Se usa 'endemoniados' para δαιμονιζομένων, coherente con el valor demonológico del contexto.
  - '''Informaron de todo'' conserva la totalidad de πάντα sin volverlo pesado.'
  - La cláusula 'al ir a la ciudad' refleja el participio aoristo de modo natural en español.
