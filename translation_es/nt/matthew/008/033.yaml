revisions:
- from: Entonces los cuidadores de los cerdos huyeron[a], y al ir a la ciudad, informaron de todo, incluso de lo que había sucedido a los endemoniados.
  to: Entonces los cuidadores de los cerdos huyeron[a], y al irse a la ciudad, informaron de todo, incluso de lo que había sucedido con los endemoniados.
  rationale: Se ajusta «al ir a la ciudad» a «al irse a la ciudad» para reflejar mejor ἀπελθόντες y se cambia «sucedido a los endemoniados» por «sucedido con los endemoniados», formulación más natural en español para este contexto narrativo. Se conserva la nota léxica porque refleja la alternativa más literal del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:03:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa del griego: los que cuidaban el hato huyeron, fueron a la ciudad y contaron todo, incluido lo relacionado con los endemoniados. Sin embargo, hay un pequeño desajuste de matiz en ἀπελθόντες εἰς τὴν πόλιν: «al ir a la ciudad» suena algo genérico y no expresa tan claramente el movimiento efectivo de salida/ida hacia la ciudad; «al irse a la ciudad» o «yendo a la ciudad» lo representa mejor. También conviene evitar que «informaron de todo, incluso de...» suene levemente pesado cuando el griego simplemente encadena el contenido del reporte.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. «Los cuidadores de los cerdos» es inteligible, aunque algo más largo que necesario; no obstante, es aceptable. La mejora principal es estilística y de precisión: «al irse a la ciudad» fluye mejor y refleja mejor el participio ἀπελθόντες. El resto del versículo es legible y fiel.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Endemoniados» corresponde bien a δαιμονιζομένων en este contexto y preserva la decisión teológica documentada sin sobredefinir. No aparece vocabulario sensible adicional del glosario.
  issues:
  - severity: medium
    issue: «al ir a la ciudad» atenúa el matiz de ἀπελθόντες
    rationale: El participio aoristo de ἀπέρχομαι expresa irse/marcharse hacia la ciudad, no solo un infinitivo genérico de movimiento. «Al irse a la ciudad» conserva mejor el valor narrativo.
  - severity: low
    issue: La combinación «informaron de todo, incluso de lo que había sucedido...» suena algo pesada
    rationale: Aunque es comprensible, una leve reconfiguración mantiene la fidelidad y mejora la naturalidad española sin alterar el sentido.
  revised_spanish_text: Entonces los cuidadores de los cerdos huyeron[a], y al irse a la ciudad, informaron de todo, incluso de lo que había sucedido con los endemoniados.
  revised_footnotes:
