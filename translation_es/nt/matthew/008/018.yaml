translation:
  language: es
  text: Cuando Jesús vio numerosos grupos de gente[a] alrededor de él, dio órdenes de partir al otro lado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «muchas multitudes». El griego usa el plural, lo que sugiere varios grupos alrededor de él.
    reason: lexical_alternative
  - marker: b
    text: Es decir, al otro lado del lago.
    reason: cultural_note
lexical_decisions:
- source_word: Ἰδὼν
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... vio
  alternatives_spanish:
  - al ver
  - viendo
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente con el verbo principal. «Cuando ... vio» conserva esa relación temporal de manera natural en español, sin perder la secuencia narrativa.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ introduce avance narrativo suave. «Ahora» refleja ese giro discursivo en un español claro y digno.
- source_word: πολλοὺς ὄχλους
  english_pob_choice: many crowds
  chosen_spanish: muchas multitudes
  alternatives_spanish:
  - grandes multitudes
  - multitudes numerosas
  - mucha gente
  lexicon: BDAG
  rationale: Se conserva el plural inusual del griego. «Muchas multitudes» mantiene la fuerza literal de πολλοὺς ὄχλους y evita nivelar el plural a una singularidad más fluida pero menos exacta.
- source_word: περὶ αὐτὸν
  english_pob_choice: around him
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - en torno a él
  - rodeándolo
  lexicon: BDAG
  rationale: La frase indica ubicación espacial. «Alrededor de él» es claro y directo en español, manteniendo el sentido local de περί con acusativo.
- source_word: ἐκέλευσεν
  english_pob_choice: he gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - ordenó
  lexicon: BDAG
  rationale: κέλευω expresa dar una orden o mandato. «Dio órdenes» conserva el matiz de autoridad sin forzar un complemento explícito que el griego no expresa.
- source_word: ἀπελθεῖν
  english_pob_choice: to depart
  chosen_spanish: partir
  alternatives_spanish:
  - irse
  - salir
  - marcharse
  lexicon: BDAG
  rationale: El infinitivo complementa a ἐκέλευσεν. «Partir» refleja bien el valor de ἀπέρχομαι y mantiene un registro más formal, coherente con la revisión inglesa.
- source_word: εἰς τὸ πέραν
  english_pob_choice: to the other side
  chosen_spanish: al otro lado
  alternatives_spanish:
  - a la otra orilla
  - al otro lado del lago
  lexicon: BDAG
  rationale: El giro idiomático se refiere al cruce al otro lado del lago/mar en el contexto sinóptico. «Al otro lado» conserva la fórmula idiomática sin sobreespecificar el referente en el texto principal.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir una forma más formal para ἀπελθεῖν («partir») en lugar de un equivalente más general. También conserva el plural literal de πολλοὺς ὄχλους mediante «muchas multitudes», que requiere nota por su posible extrañeza en español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio y no se introduce terminología cristológica adicional.
  - «Dio órdenes» evita añadir un objeto explícito inexistente en el griego.
  - «Al otro lado» sigue la fórmula idiomática estándar y se aclara en nota por el contexto geográfico.
  - El plural de «multitudes» se conserva para respetar la evidencia griega y la decisión inglesa de no singularizar el sintagma.
