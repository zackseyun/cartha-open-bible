  text: καὶ λέγει αὐτοῖς· Τί δειλοί ἐστε, ὀλιγόπιστοι; τότε ἐγερθεὶς ἐπετίμησεν τοῖς ἀνέμοις καὶ τῇ θαλάσσῃ, καὶ ἐγένετο γαλήνη μεγάλη.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/026.yaml
  text: And he said to them[a], “Why are you afraid, you of little faith?” Then, having risen, he rebuked the winds and the sea, and there was a great calm.
  footnotes:
  - marker: a
    text: Or 'cowardly.' The Greek δειλοί can denote fearfulness or cowardice; here it refers to the disciples' fearful response in contrast to faith.
    reason: lexical_alternative
