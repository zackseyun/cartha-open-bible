translation:
  language: es
  text: 'Y les dijo: «¿Por qué están ustedes asustados[a], ustedes de poca fe?» Entonces, habiéndose levantado, reprendió a los vientos y al mar, y hubo una gran calma.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cobardes». El griego δειλοί puede denotar temor o cobardía; aquí se refiere a la reacción temerosa de los discípulos en contraste con la fe.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo resulta más natural el pretérito «dijo», sin perder la secuencia del relato.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: BDAG
  rationale: Aquí τί pregunta por la causa o razón; «¿Por qué?» expresa mejor el valor idiomático que un literal «¿Qué?».
- source_word: δειλοί
  english_pob_choice: afraid
  chosen_spanish: tan asustados[a]
  alternatives_spanish:
  - cobardes
  - temerosos
  - asustados
  lexicon: BDAG
  rationale: El término puede abarcar temor o cobardía. En este contexto, Jesús reprende su reacción de miedo en la tormenta; «tan asustados» conserva la fuerza del reproche sin convertirlo de manera innecesaria en una acusación moral más dura que el contexto inmediato.
- source_word: ὀλιγόπιστοι
  english_pob_choice: you of little faith
  chosen_spanish: hombres de poca fe
  alternatives_spanish:
  - ustedes de poca fe
  - personas de poca fe
  lexicon: BDAG
  rationale: Es una expresión característica de Mateo. «Hombres de poca fe» mantiene el tono directo y la fuerza evaluativa, con un giro natural en español bíblico; el vocativo no exige necesariamente repetir el pronombre si ya está claro por el verbo.
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Al instante
  lexicon: BDAG
  rationale: Conecta de forma simple y precisa la acción posterior.
- source_word: ἐγερθεὶς
  english_pob_choice: having risen
  chosen_spanish: habiéndose levantado
  alternatives_spanish:
  - levantándose
  - después de levantarse
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal; «habiéndose levantado» preserva mejor esa anterioridad que una formulación más libre.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - recriminó
  - mandó con severidad
  lexicon: BDAG
  rationale: «Reprendió» comunica bien la acción autoritativa y personal de Jesús. En español, conserva el matiz de reprensión sin debilitar la escena.
- source_word: ἀνέμοις
  english_pob_choice: the winds
  chosen_spanish: a los vientos
  alternatives_spanish:
  - al viento
  lexicon: BDAG
  rationale: El plural griego se conserva en español, evitando suavizarlo a singular.
- source_word: θαλάσσῃ
  english_pob_choice: the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - al lago
  - a las aguas
  lexicon: BDAG
  rationale: Aunque el referente geográfico sea el mar de Galilea, el sustantivo griego es «mar». «Al mar» sigue de cerca la forma de la fuente y mantiene la imaginería bíblica.
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: se produjo
  alternatives_spanish:
  - hubo
  - llegó a haber
  lexicon: BDAG
  rationale: Una expresión existencial/resultativa en español naturaliza el giro griego sin perder el resultado repentino de la acción.
- source_word: γαλήνη μεγάλη
  english_pob_choice: a great calm
  chosen_spanish: una gran calma
  alternatives_spanish:
  - un gran sosiego
  - una calma grande
  lexicon: BDAG
  rationale: «Gran calma» reproduce con claridad el sustantivo y el énfasis de μεγάλη, manteniendo la sobriedad del relato.
theological_decisions:
- issue: Tensión entre miedo humano y falta de fe
  english_pob_reading: Rendered δειλοί as 'afraid' rather than the harsher 'cowardly.'
  chosen_spanish_reading: «tan asustados» en vez de «cobardes»
  alternative_spanish_readings:
  - cobardes
  - temerosos
  rationale: La escena presenta una reprensión real de Jesús por su respuesta de temor y su poca fe, pero no obliga a intensificar el juicio a una condena moral más dura. «Tan asustados» preserva la tensión teológica entre el miedo comprensible y la falta de fe.
  doctrine_reference: Preservar la tensión teológica sin suavizarla ni exacerbarla.
- issue: Autoridad de Jesús sobre la creación
  english_pob_reading: Retained the personal verb 'rebuked' for the winds and the sea.
  chosen_spanish_reading: «reprendió a los vientos y al mar»
  alternative_spanish_readings:
  - mandó a los vientos y al mar
  - ordenó a los vientos y al mar
  rationale: «Reprendió» conserva la vivacidad del texto y la presentación de Jesús ejerciendo autoridad directa sobre la creación, sin añadir más de lo que afirma el versículo.
  doctrine_reference: Afirmar la autoridad de Cristo sin sobreinterpretar el texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y toma en cuenta la revisión inglesa más reciente que prefirió «afraid» por ser más natural que «fearful», manteniendo la tensión entre temor y poca fe. También conserva la pluralidad de «vientos» y la secuencia aorística del participio «habiéndose levantado».
  spanish_consistency_notes:
  - Se mantiene «Dios» y no hay necesidad de término técnico adicional en este versículo.
  - Se conserva el plural «vientos» conforme al griego.
  - La elección «mar» sigue el léxico de la fuente, aunque el referente histórico sea el mar de Galilea.
  - «Hombres de poca fe» funciona como vocativo idiomático en español bíblico y mantiene la huella mateana.
