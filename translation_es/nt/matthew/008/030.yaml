review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: existencia narrativa (ἦν δὲ), distancia espacial (μακρὰν ἀπ’ αὐτῶν), colectivo animal (ἀγέλη), cantidad (πολλῶν) y acción en curso de alimentarse (βοσκομένη). También preserva correctamente la nota alternativa «lejos de ellos».'
  spanish_quality_summary: El español es claro y mayormente natural, pero «una manada grande de cerdos que pastaba» suena algo menos idiomático que una formulación con adjetivo antepuesto o con «numerosa», y «pastaba» aplicado a cerdos es entendible pero menos preciso/natural en español general. «Se estaba alimentando» o «estaba comiendo» evita la asociación típica de «pastar» con herbívoros. Además, conviene evitar el arranque «Y había» cuando «Había» ya transmite bien el flujo narrativo con dignidad y naturalidad.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Cerdos» concuerda bien con la preferencia por español moderno y claro. La nota léxica para μακρὰν ἀπ’ αὐτῶν está bien conservada.
  issues:
  - severity: medium
    issue: «pastaba» para βοσκομένη con cerdos
    rationale: Aunque βόσκω puede cubrir alimentarse/pacer, en español «pastar» se asocia más naturalmente con ovejas, vacas o animales de pasto. Con cerdos, «se estaba alimentando» comunica mejor la acción sin introducir una imagen menos idiomática.
  - severity: low
    issue: «Y había» al inicio
    rationale: El δέ griego es un conector narrativo suave; en español bíblico moderno «Había» fluye mejor que «Y había», que puede sonar más calcado que necesario.
  - severity: low
    issue: «manada grande» puede afinarse estilísticamente
    rationale: No es incorrecto, pero «una gran manada de cerdos» suena más natural y digno en español escrito, manteniendo el valor de πολλῶν con un sustantivo colectivo.
  revised_spanish_text: Había a cierta distancia de ellos una gran manada de cerdos que se estaba alimentando.[a]
