- from: Y había a cierta distancia de ellos una manada[a] grande de cerdos que pastaba.
  to: Había a cierta distancia de ellos una gran manada de cerdos que se estaba alimentando.[a]
  rationale: Se ajusta el inicio para un español más natural, se mejora la colocación del adjetivo con el sustantivo colectivo y se reemplaza «pastaba» por una expresión más idiomática para cerdos, sin perder el sentido progresivo del participio griego. La nota alternativa se conserva, ahora anclada a la frase completa pertinente.
