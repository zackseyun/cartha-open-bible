translation:
  language: es
  text: Había a cierta distancia de ellos una gran manada de cerdos que se estaba alimentando.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lejos de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: Y había
  alternatives_spanish:
  - Ahora había
  - Y estaba
  lexicon: BDAG
  rationale: δέ funciona como un conector narrativo suave; en español, «Y» conserva ese avance discursivo sin endurecer el estilo. ἦν tiene aquí sentido existencial, mejor expresado por «había» que por una copia más literal de «era/estaba».
- source_word: μακρὰν ἀπ’ αὐτῶν
  english_pob_choice: some distance away from them
  chosen_spanish: a cierta distancia de ellos
  alternatives_spanish:
  - lejos de ellos
  - a una distancia de ellos
  lexicon: BDAG
  rationale: La combinación expresa separación espacial. «A cierta distancia de ellos» preserva la idea de alejamiento sin obligar a una lectura excesivamente rígida ni perder naturalidad en español.
- source_word: ἀγέλη
  english_pob_choice: herd
  chosen_spanish: manada
  alternatives_spanish:
  - hato
  - rebaño
  lexicon: BDAG
  rationale: ἀγέλη designa un grupo de animales. En este contexto, «manada» es comprensible en español y mantiene la referencia colectiva; «rebaño» suena más pastoril y «hato» es menos común.
- source_word: χοίρων
  english_pob_choice: of pigs
  chosen_spanish: de cerdos
  alternatives_spanish:
  - de puercos
  - de cochinos
  lexicon: BDAG
  rationale: «Cerdos» es el equivalente moderno y claro de χοίρων. Se evita un registro arcaizante como «puercos» o coloquial como «cochinos».
- source_word: πολλῶν
  english_pob_choice: large
  chosen_spanish: grande
  alternatives_spanish:
  - numerosa
  - muchos
  lexicon: BDAG
  rationale: Aunque literalmente es «muchos», con un sustantivo colectivo en español la forma natural es «una manada grande». Esto conserva la cantidad sin sonar forzado.
- source_word: βοσκομένη
  english_pob_choice: was feeding
  chosen_spanish: que pastaba
  alternatives_spanish:
  - que estaba comiendo
  - que se alimentaba
  lexicon: BDAG
  rationale: El participio describe a los animales en acción de alimentarse. Para español, «que pastaba» comunica de manera natural esa actividad de alimentación del ganado/animales, aunque el término es más flexible que en contextos estrictamente herbívoros; se evita introducir una acción no atestiguada como «ser tendeda».
translation_notes:
  revision_awareness: El pasaje coincide altamente con el texto griego SBLGNT y con el audit trail inglés. No se registran revisiones textuales o decisiones doctrinales adicionales; la única tensión léxica relevante es la distancia espacial («a cierta distancia» / «lejos») y la elección de un término natural para ἀγέλη en español.
  spanish_consistency_notes:
  - Se mantiene «Y» como conector narrativo breve, coherente con el valor discursivo de δέ.
  - «Cerdos» se usa de forma consistente como equivalente moderno de χοίρων.
  - La nota alternativa preserva la ambigüedad legítima sobre el grado de distancia espacial sin añadir interpretaciones.
  - Se optó por una formulación publicable y fluida que sigue de cerca la sintaxis del griego sin caer en calco rígido.
