translation:
  language: es
  text: Y he aquí[a], toda la ciudad salió al encuentro de Jesús, y cuando lo vieron, le rogaron que se fuera de su región.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su territorio» o, más literalmente, «de sus fronteras».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - véase
  lexicon: BDAG
  rationale: ἰδού funciona como partícula de atención y vivacidad narrativa. «He aquí» conserva ese golpe discursivo en español sin omitirlo ni volverlo un mero relleno.
- source_word: πᾶσα ἡ πόλις
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - todo el pueblo
  lexicon: BDAG
  rationale: La expresión abarca a la ciudad como corporación de sus habitantes. «Toda la ciudad» reproduce bien el sentido distributivo sin implicar necesariamente cada individuo sin excepción.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - salió fuera
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι se expresa naturalmente con «salió». En español suena más directo que calcos más pesados y mantiene el movimiento desde la ciudad.
- source_word: εἰς ὑπάντησιν
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrarse con
  - a recibir
  lexicon: BDAG
  rationale: La construcción idiomática indica salir con el propósito de encontrarse con alguien. «Al encuentro de» conserva esa dirección con naturalidad en español.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: Nombre propio estándar
  rationale: El nombre propio se traduce de manera convencional como «Jesús».
- source_word: ἰδόντες αὐτόν
  english_pob_choice: when they saw him
  chosen_spanish: cuando lo vieron
  alternatives_spanish:
  - viéndolo
  - al verlo
  lexicon: BDAG
  rationale: El participio aoristo aquí se entiende temporalmente. «Cuando lo vieron» preserva la secuencia narrativa con español fluido.
- source_word: παρεκάλεσαν
  english_pob_choice: begged
  chosen_spanish: le rogaron
  alternatives_spanish:
  - le suplicaron
  - le pidieron
  lexicon: BDAG
  rationale: El verbo expresa una petición insistente y apremiante. «Rogar» transmite esa fuerza sin sonar demasiado interpretativo como «suplicar», y mantiene un registro digno.
- source_word: ὅπως μεταβῇ
  english_pob_choice: to depart
  chosen_spanish: que se fuera
  alternatives_spanish:
  - que se retirara
  - que partiera
  lexicon: BDAG
  rationale: ὅπως con subjuntivo introduce el contenido de la petición. «Que se fuera» comunica el sentido de salir/dejar el lugar de manera idiomática en español, sin añadir una motivación no explicitada.
- source_word: ἀπὸ τῶν ὁρίων αὐτῶν
  english_pob_choice: from their region
  chosen_spanish: de sus regiones
  alternatives_spanish:
  - de su territorio
  - de sus fronteras
  - de su distrito
  lexicon: BDAG
  rationale: ὅρια puede referirse a fronteras, territorio o distrito. Dado el contexto, «regiones» conserva la idea geográfica amplia sin forzar una imagen de líneas fronterizas literales. Se mantiene cierta amplitud semántica para respetar la tensión léxica del griego.
theological_decisions:
- issue: Motivo de la petición de la ciudad
  english_pob_reading: 'The translation leaves the motive unstated: they begged Jesus to leave their region.'
  chosen_spanish_reading: 'La traducción deja el motivo sin especificar: le rogaron a Jesús que se fuera de sus regiones.'
  alternative_spanish_readings:
  - porque tenían miedo
  - por la pérdida de los cerdos
  - por alarma general ante lo ocurrido
  rationale: El griego narra la acción sin explicar la causa. La versión española no introduce una interpretación que el texto no dice, para preservar la tensión narrativa y teológica.
  doctrine_reference: Preservar la tensión teológica y narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego SBLGNT y con el audit trail inglés POB: se mantiene la partícula de atención, el sentido corporativo de «toda la ciudad», la acción temporal del participio, la súplica insistente y la ambigüedad de ὅρια sin introducir una motivación explícita. No se registran revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usa «he aquí» como equivalente de atención para ἰδού, en vez de omitir la partícula.
  - «Toda la ciudad» evita una literalidad rígida como «toda la ciudad» con matiz de totalidad absoluta; se entiende corporativamente.
  - «Al encuentro de» conserva la idiomaticidad de εἰς ὑπάντησιν.
  - «Le rogaron» mantiene el nivel de intensidad de παρεκάλεσαν sin sobretraducirlo.
  - «Sus regiones» deja abierta la amplitud semántica de ὅρια, como en el inglés POB «region/territory/borders».
