review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: conserva ἰδού, πᾶσα ἡ πόλις, el movimiento de salir a encontrarse con Jesús, el valor temporal de ἰδόντες αὐτόν, la fuerza de παρεκάλεσαν y deja sin explicitar el motivo de la petición, en línea con el POB inglés. La única desviación relevante está en ἀπὸ τῶν ὁρίων αὐτῶν: «de sus regiones» suena impropio en español y además cambia indebidamente el número respecto del sentido territorial colectivo del griego.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «de sus regiones» resulta poco natural y confuso en español; lo idiomático sería «de su región» o «de su territorio». También la puntuación puede aligerarse quitando una coma innecesaria tras «y». «Y he aquí» es aceptable, aunque algo formal; encaja con la decisión auditada para ἰδού.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Jesús» está bien; no aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La revisión propuesta mantiene la decisión léxica documentada para ἀπὸ τῶν ὁρίων αὐτῶν como «región/territorio» y preserva la alternativa literal en nota.'
  issues:
  - severity: medium
    issue: «de sus regiones» para ἀπὸ τῶν ὁρίων αὐτῶν
    rationale: Aunque ὁρίων es plural formalmente, en contexto denota el territorio/distrito de ellos. En español «sus regiones» suena extraño y menos fiel al sentido colectivo-geográfico. «De su región» comunica mejor el valor contextual y coincide con el POB inglés («from their region»).
  - severity: low
    issue: Coma tras «y» antes de «cuando lo vieron»
    rationale: La coma después de la conjunción no es necesaria y entorpece ligeramente la fluidez. «Y cuando lo vieron» es más natural en español estándar.
  revised_spanish_text: Y he aquí[a], toda la ciudad salió al encuentro de Jesús, y cuando lo vieron, le rogaron que se fuera de su región.
  revised_footnotes:
  - marker: a
    text: O «de su territorio» o, más literalmente, «de sus fronteras».
    reason: lexical_alternative
  revision_rationale: Se corrige «de sus regiones» a «de su región» para reflejar mejor el sentido contextual de ἀπὸ τῶν ὁρίων αὐτῶν y producir un español natural y fiel. Se mantiene la nota con alternativas, incluida la literal «fronteras». También se suaviza la puntuación para mejorar la legibilidad sin alterar el significado.
