revisions:
- from: Y he aquí[a], toda la ciudad salió al encuentro de Jesús, y, cuando lo vieron, le rogaron que se fuera de sus regiones.
  to: Y he aquí[a], toda la ciudad salió al encuentro de Jesús, y cuando lo vieron, le rogaron que se fuera de su región.
  rationale: Se corrige «de sus regiones» a «de su región» para reflejar mejor el sentido contextual de ἀπὸ τῶν ὁρίων αὐτῶν y producir un español natural y fiel. Se mantiene la nota con alternativas, incluida la literal «fronteras». También se suaviza la puntuación para mejorar la legibilidad sin alterar el significado.
