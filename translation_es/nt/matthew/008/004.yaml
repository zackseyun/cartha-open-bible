translation:
  language: es
  text: 'Y Jesús le dijo: «Mira, no se lo digas a nadie; más bien, ve, muéstrate al sacerdote y ofrece[b] la ofrenda que mandó Moisés, como testimonio para ellos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para testimonio a ellos»; la frase puede referirse a una evidencia presentada a los sacerdotes, y algunos la entienden como un testimonio implícito contra quienes no creerían.
    reason: alternative_reading
  - marker: b
    text: Esta instrucción refleja el procedimiento mosaico para una persona limpiada de lepra; véase Levítico 14.
    reason: cross_reference
lexical_decisions:
- source_word: Ὅρα
  english_pob_choice: See that
  chosen_spanish: Mira que
  alternatives_spanish:
  - Ve a que
  - Presta atención a que
  lexicon: BDAG
  rationale: La forma imperativa de ὁράω aquí funciona como advertencia o encargo. En español, «Mira que» conserva ese valor exhortativo sin sonar mecánico, y se ajusta al tono directo del mandato.
- source_word: μηδενὶ εἴπῃς
  english_pob_choice: you tell no one
  chosen_spanish: no se lo digas a nadie
  alternatives_spanish:
  - no digas nada a nadie
  - no se lo digas a nadie
  lexicon: BDAG
  rationale: La construcción con dativo y subjuntivo expresa prohibición. «No se lo digas a nadie» mantiene la prohibición personal e idiomática en español, sin perder la referencia a la acción de decir.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - parte
  lexicon: BDAG
  rationale: El imperativo de movimiento se traduce con el verbo más natural y breve en español. «Ve» preserva la simplicidad del mandato.
- source_word: σεαυτὸν δεῖξον τῷ ἱερεῖ
  english_pob_choice: show yourself to the priest
  chosen_spanish: muéstrate al sacerdote
  alternatives_spanish:
  - preséntate al sacerdote
  - muéstrale tu caso al sacerdote
  lexicon: BDAG
  rationale: La construcción reflexiva se conserva con «muéstrate». «Al sacerdote» refleja el artículo griego como referencia al funcionario sacerdotal pertinente, sin generalizar indebidamente.
- source_word: ἱερεῖ
  english_pob_choice: the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote
  - a un sacerdote
  lexicon: BDAG
  rationale: El artículo sugiere el sacerdote correspondiente en el procedimiento mosaico. En español, el singular definido queda suficientemente expresado con «al sacerdote».
- source_word: προσένεγκον
  english_pob_choice: offer
  chosen_spanish: presenta
  alternatives_spanish:
  - ofrece
  - presenta
  lexicon: BDAG
  rationale: En este contexto cultual, el verbo implica llevar/presentar una ofrenda prescrita. «Presenta» es claro en español y evita restringir demasiado el matiz ritual, que ya queda señalado por «ofrenda».
- source_word: τὸ δῶρον
  english_pob_choice: the gift
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - el regalo
  - la ofrenda
  lexicon: BDAG
  rationale: Aunque δῶρον puede significar «regalo», en este contexto levítico la mejor equivalencia funcional en español es «ofrenda», porque comunica el sentido sacrificial sin forzar una lectura meramente doméstica.
- source_word: ὃ προσέταξεν Μωϋσῆς
  english_pob_choice: that Moses commanded
  chosen_spanish: que mandó Moisés
  alternatives_spanish:
  - que ordenó Moisés
  - que Moisés mandó
  lexicon: BDAG
  rationale: προστάσσω expresa mandato/orden. «Mandó Moisés» es natural en español y conserva la autoridad mosaica sin añadir interpretaciones.
- source_word: εἰς μαρτύριον αὐτοῖς
  english_pob_choice: as a testimony to them
  chosen_spanish: para testimonio de ellos
  alternatives_spanish:
  - como testimonio de ellos
  - como evidencia para ellos
  - para testimonio contra ellos
  lexicon: BDAG
  rationale: 'La preposición final expresa propósito: el acto funciona como testimonio. «Para testimonio de ellos» preserva la ambigüedad del referente y no decide si el testimonio es favorable o confrontativo.'
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: de ellos
  alternatives_spanish:
  - para ellos
  - a ellos
  - de ellos
  lexicon: BDAG
  rationale: El pronombre no identifica de manera explícita a sus referentes en el verso. «De ellos» mantiene la indeterminación en español, evitando especificar un grupo que el griego no nombra.
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: Jesus said to him
  chosen_spanish: Y Jesús le dijo
  alternatives_spanish:
  - Y Jesús le dijo
  - Jesús le dijo
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el pasado simple es la opción narrativa natural en español. El «Y» inicial refleja la continuidad del relato griego.
theological_decisions:
- issue: Ambigüedad de εἰς μαρτύριον αὐτοῖς
  english_pob_reading: Retain the ambiguous wording without specifying whether the testimony is to priests, the public, or Israel's leaders, and without deciding whether it is positive proof or implicit witness against unbelief.
  chosen_spanish_reading: 'Conservar la ambigüedad: el acto queda «para testimonio de ellos», sin precisar si es prueba favorable, evidencia administrativa o testimonio implícito contra la incredulidad.'
  alternative_spanish_readings:
  - como prueba para los sacerdotes
  - como testimonio contra ellos
  rationale: El griego no identifica claramente el referente de αὐτοῖς ni obliga a limitar μαρτύριον a un solo matiz. La traducción española debe preservar esa tensión interpretativa, en línea con la filosofía de no resolver lo que el texto deja abierto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Procedimiento mosaico para la purificación
  english_pob_reading: This instruction reflects the Mosaic procedure for a person cleansed of leprosy; see Leviticus 14.
  chosen_spanish_reading: La frase se entiende dentro del procedimiento mosaico de purificación; la alusión queda implícita en la ofrenda mandada por Moisés.
  alternative_spanish_readings:
  - véase Levítico 14
  - según Levítico 14
  rationale: El versículo remite al rito levítico sin necesidad de explicitarlo dentro del texto principal. Si se añadiera una nota, debería servir solo como referencia cruzada, no como sustituto del sentido del versículo.
  doctrine_reference: Referencia cruzada con Levítico 14; contexto legal-ritual de la Ley de Moisés.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran acuerdo alto y no requieren cambios de contenido. La revisión más reciente dejó el pasaje sin modificaciones; por eso la redacción española sigue de cerca la lectura aprobada, manteniendo la ambigüedad de εἰς μαρτύριον αὐτοῖς y adaptando solo la formulación para naturalidad española.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva «sacerdote» como equivalente de ἱερεύς por tratarse del funcionario del rito levítico, no de una opción eclesiástica genérica.
  - Se traduce δῶρον como «ofrenda» por el contexto cultual, aunque el sentido básico sea «don/regalo».
  - Se mantiene la ambigüedad del referente en «de ellos»/«para testimonio de ellos» sin identificar explícitamente a los destinatarios.
