base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/004.yaml
  text: And Jesus said to him[a], “See that you tell no one, but go, show yourself to the priest, and offer the gift that Moses commanded[b], as a testimony to them.”
  footnotes:
  - marker: a
    text: Or “for a testimony to them”; the phrase may refer to evidence presented to the priests, and some understand it as an implicit witness against those who would not believe.
    reason: alternative_reading
  - marker: b
    text: This instruction reflects the Mosaic procedure for a person cleansed of leprosy; see Leviticus 14.
    reason: cross_reference
