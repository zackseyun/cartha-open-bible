  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «hermanos» y «Galilea» están bien. La decisión de mantener «hermanos» en masculino plural concuerda con la política de precisión de género. No hay términos teológicos de alto riesgo que requieran adjudicación especial.
