translation:
  language: es
  text: 'Entonces Jesús les dijo[a]: «No tengan miedo. Vayan y digan a mis hermanos[b] que vayan a Galilea[c], y allí me verán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego está en presente histórico; en español se vierte naturalmente con pasado narrativo.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el masculino plural griego y aquí se refiere a los discípulos de Jesús; no se neutraliza en el texto principal.
    reason: theological_note
  - marker: c
    text: 'También podría traducirse: «Vayan y anuncien a mis hermanos que vayan a Galilea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca secuencia narrativa temporal. «Entonces» reproduce bien el valor discursivo sin forzar un matiz interpretativo adicional.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo resulta más natural el pretérito «dijo», manteniendo el sentido sin rigidez.
- source_word: αὐταῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellas
  - a las mujeres
  lexicon: BDAG
  rationale: El dativo femenino plural se refiere a las mujeres en el contexto; el clítico «les» evita sobredeterminación en el cuerpo principal y suena natural en español.
- source_word: Μὴ φοβεῖσθε
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengan miedo
  alternatives_spanish:
  - No teman
  - No tengan temor
  lexicon: BDAG
  rationale: La prohibición es idiomática y pastoral. «No tengan miedo» conserva claridad moderna y dignidad; «temer» sería más literal pero menos natural aquí.
- source_word: ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan de camino
  - Partan
  lexicon: BDAG
  rationale: Imperativo de movimiento; «Vayan» es conciso y natural en una comisión directa.
- source_word: ἀπαγγείλατε
  english_pob_choice: report/tell
  chosen_spanish: anuncien
  alternatives_spanish:
  - digan
  - informen
  lexicon: BDAG
  rationale: El verbo expresa comunicar un mensaje. «Anuncien» preserva el acto de transmitir una noticia/mandato con un matiz más formal que «digan» y más natural que «informen» en español bíblico contemporáneo.
- source_word: τοῖς ἀδελφοῖς μου
  english_pob_choice: my brothers
  chosen_spanish: a mis hermanos
  alternatives_spanish:
  - a mis hermanos y hermanas
  - a mis discípulos
  lexicon: BDAG
  rationale: El griego es masculino plural explícito. En contexto alude a los discípulos varones; se conserva «hermanos» para respetar la forma y la carga afectiva del término sin neutralizarlo.
- source_word: ἵνα ἀπέλθωσιν
  english_pob_choice: that they should go
  chosen_spanish: que vayan
  alternatives_spanish:
  - para que vayan
  - que se dirijan
  lexicon: BDAG
  rationale: Aquí ἵνα con subjuntivo funciona como contenido de la instrucción. En español, «que vayan» expresa con naturalidad el mandato indirecto sin añadir estructura innecesaria.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: to Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - hasta Galilea
  lexicon: BDAG
  rationale: Con nombre de lugar, el español normal usa «a Galilea». Mantiene el movimiento hacia un destino concreto.
- source_word: κἀκεῖ
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - y allá
  lexicon: BDAG
  rationale: Compuesto de καί + ἐκεῖ; «y allí» es la equivalencia natural y clara en español.
- source_word: με ὄψονται
  english_pob_choice: they will see me
  chosen_spanish: me verán
  alternatives_spanish:
  - me verán allí
  - me contemplarán
  lexicon: BDAG
  rationale: ὄψονται es futuro de ὁράω y normalmente significa «ver». «Me verán» preserva la sencillez del griego y evita intensificar el verbo sin base textual.
theological_decisions:
- issue: Referente de «mis hermanos»
  english_pob_reading: Jesus refers to his disciples as 'my brothers.'
  chosen_spanish_reading: Jesús llama «mis hermanos» a sus discípulos en este contexto.
  alternative_spanish_readings:
  - Jesús se refiere a todos sus seguidores como familia espiritual
  - Jesús usa el término en un sentido más amplio y no solo de los Once
  rationale: El contexto inmediato apunta a los discípulos, pero el término afectivo y fraterno se conserva sin reemplazarlo por una explicación interpretativa en el texto principal. Así se mantiene la tensión entre forma literal y referente contextual.
  doctrine_reference: Translation philosophy §3 (preservar tensión); §4 (precisión de género en el plural masculino)
- issue: Naturaleza de la instrucción mediante ἵνα + subjuntivo
  english_pob_reading: '''that they should go'' renders an indirect command.'
  chosen_spanish_reading: «que vayan» expresa una orden indirecta dentro del discurso.
  alternative_spanish_readings:
  - «para que vayan» como finalidad
  - «a fin de que vayan» como finalidad más formal
  rationale: En este pasaje la cláusula con ἵνα no introduce solo propósito abstracto, sino el contenido de la instrucción que deben comunicar. «Que vayan» conserva mejor ese valor mandativo en español.
  doctrine_reference: Sintaxis griega del discurso indirecto; traducción orientada al valor semántico del imperativo reportado
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la revisión reciente prefirió una formulación más directa para ἀπαγγείλατε + ἵνα. En español se optó por una construcción igualmente directa («Vayan y anuncien... que vayan») que conserva el mandato indirecto sin traducir mecánicamente desde el inglés ni diluir el contenido del griego. También se respetó la decisión de no sustituir «mis hermanos» por «mis discípulos» en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «Jesús» sin títulos añadidos, conforme al texto fuente.
  - Se usó «hermanos» para reflejar el plural masculino del griego y la decisión de precisión de género.
  - «Galilea» se expresa con la preposición española natural «a», no «hacia» ni «en», porque el movimiento es hacia un destino.
  - La puntuación de cita directa sigue el uso editorial español, con dos puntos antes de la cita y comillas angulares adaptadas a la interfaz de entrega.
  - No se introdujo vocabulario eclesiástico tradicional no respaldado por el audit trail, como «discípulos» en el cuerpo principal.
