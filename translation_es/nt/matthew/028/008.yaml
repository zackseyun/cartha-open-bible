- from: Y saliendo rápidamente del sepulcro[a], con temor y gran alegría, corrieron a avisar a sus discípulos.
  to: Y saliendo rápidamente del sepulcro[a], con temor y gran alegría, corrieron a avisar a los discípulos de Jesús.
  rationale: Se ajusta el posesivo para evitar ambigüedad referencial en español y se mejora la nota léxica para reflejar con más precisión el matiz de φόβος documentado en la auditoría inglesa, sin cambiar el sentido principal del versículo.
