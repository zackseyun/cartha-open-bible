review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: salida del sepulcro, prontitud, mezcla de temor y gran alegría, correr, y propósito de comunicarlo a los discípulos. Sin embargo, «a sus discípulos» introduce una ambigüedad referencial en español que no está en contexto; el αὐτοῦ se refiere a Jesús, y en español conviene explicitar «a los discípulos de Jesús» para evitar que parezca referirse a las mujeres o al ángel. Además, la nota alternativa inglesa contrasta mejor con «temor» mediante «reverencia» o «sobrecogimiento» que con «asombro» solo.'
  spanish_quality_summary: El español es natural y digno. «Sepulcro», «temor» y «gran alegría» funcionan bien en registro bíblico legible. «Avisar» es posible, pero en este contexto «dar la noticia» o «informar» suena un poco más preciso; aun así no exige cambio. La mejora principal es la claridad referencial del posesivo y un ajuste menor de la nota para reflejar mejor el matiz de φόβος.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Discípulos» preserva correctamente μαθηταί. «Temor» mantiene la tensión teológica documentada para φόβος. «Sepulcro» es una opción válida para μνημεῖον.
  issues:
  - severity: medium
    issue: Ambigüedad en «a sus discípulos»
    rationale: Aunque formalmente corresponde a αὐτοῦ, en español el posesivo puede sonar ambiguo fuera del flujo narrativo inmediato. «A los discípulos de Jesús» preserva el referente correcto con mayor claridad.
  - severity: low
    issue: La nota usa «asombro» como alternativa de «temor»
    rationale: La nota inglesa habla de «awe», y el propio borrador explica reverencia/sobrecogimiento. «Asombro» por sí solo puede debilitar el componente de temor reverente presente en φόβος.
  revised_spanish_text: Y saliendo rápidamente del sepulcro[a], con temor y gran alegría, corrieron a avisar a los discípulos de Jesús.
  revised_footnotes:
  - marker: a
    text: O «con reverencia y gran alegría». El griego para «temor» también puede expresar reverencia o sobrecogimiento en este contexto.
    reason: lexical_alternative
  revision_rationale: Se ajusta el posesivo para evitar ambigüedad referencial en español y se mejora la nota léxica para reflejar con más precisión el matiz de φόβος documentado en la auditoría inglesa, sin cambiar el sentido principal del versículo.
