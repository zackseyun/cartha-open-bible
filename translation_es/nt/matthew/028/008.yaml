translation:
  language: es
  text: Y saliendo rápidamente del sepulcro[a], con temor y gran alegría, corrieron a avisar a los discípulos de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con reverencia y gran alegría». El griego para «temor» también puede expresar reverencia o sobrecogimiento en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελθοῦσαι
  english_pob_choice: leaving
  chosen_spanish: saliendo
  alternatives_spanish:
  - marchándose
  - partiendo
  lexicon: BDAG
  rationale: El participio aoristo femenino plural modifica a las mujeres implícitas por el contexto. «Saliendo» expresa con naturalidad el movimiento de salida desde el sepulcro y conserva el valor aspectual narrativo sin volver la frase pesada.
- source_word: ταχὺ
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - enseguida
  - de prisa
  lexicon: BDAG
  rationale: El adverbio señala prontitud. «Rápidamente» es claro, sobrio y fiel al sentido de urgencia del griego.
- source_word: μνημείου
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - tumba funeraria
  lexicon: BDAG
  rationale: En este contexto de resurrección, μνημεῖον designa el lugar de entierro. «Sepulcro» es un término bíblico y plenamente inteligible en español; conserva el tono narrativo sin perder claridad.
- source_word: μετὰ φόβου καὶ χαρᾶς μεγάλης
  english_pob_choice: with fear and great joy
  chosen_spanish: con temor y gran alegría
  alternatives_spanish:
  - con miedo y gran alegría
  - con reverente temor y gran alegría
  lexicon: BDAG
  rationale: La preposición μετά con genitivo expresa circunstancia acompañante. «Temor» mantiene la tensión del texto; «miedo» sería posible, pero «temor» suena más natural en registro bíblico. Se conserva también «gran alegría» sin suavizar la yuxtaposición emocional.
- source_word: ἔδραμον
  english_pob_choice: they ran
  chosen_spanish: corrieron
  alternatives_spanish:
  - salieron corriendo
  - se apresuraron
  lexicon: BDAG
  rationale: El aoristo de τρέχω pide un verbo de correr. «Corrieron» es la correspondencia directa y preserva la vivacidad de la escena.
- source_word: ἀπαγγεῖλαι
  english_pob_choice: to report
  chosen_spanish: a avisar
  alternatives_spanish:
  - a informar
  - a comunicar
  lexicon: BDAG
  rationale: 'El infinitivo expresa finalidad: fueron a transmitir el mensaje. «Avisar» comunica bien el acto de llevar noticias en español sin introducir un objeto explícito que el griego no expresa aquí.'
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a sus seguidores
  lexicon: BDAG
  rationale: μαθηταί se traduce con el término estable «discípulos» en la narrativa evangélica. El posesivo se entiende por el contexto como referido a Jesús.
theological_decisions:
- issue: Tensión emocional de la respuesta de las mujeres
  english_pob_reading: with fear and great joy
  chosen_spanish_reading: con temor y gran alegría
  alternative_spanish_readings:
  - con reverente temor y gran alegría
  - con miedo y gran alegría
  rationale: El texto mantiene juntos temor y alegría ante el acontecimiento de la resurrección. La traducción conserva esa tensión sin resolverla, siguiendo la lectura auditada de la POB.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión auditada que eliminó un objeto directo no expresado en el griego; por eso se tradujo ἀπαγγεῖλαι de manera intransitiva con finalidad («a avisar») y no «a avisarlo».
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito en el posesivo «sus discípulos», conforme al contexto inmediato del evangelio.
  - Se prefirió «sepulcro» sobre «tumba» por registro bíblico natural en español, sin alterar el sentido del lugar de entierro.
  - Se conservó la yuxtaposición «temor y gran alegría» para reflejar la tensión emocional del original.
