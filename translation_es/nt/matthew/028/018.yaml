translation:
  language: es
  text: 'Y Jesús se acercó y les habló, diciendo: «Me ha sido dada[a] toda autoridad[b] en el cielo y en la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me fue dada». El aoristo pasivo griego también puede traducirse de manera más formal así; el texto principal usa el perfecto para expresar una acción completada con vigencia presente.
    reason: lexical_alternative
  - marker: b
    text: O «poder». La palabra griega ἐξουσία denota más precisamente autoridad, derecho o dominio delegado, y no mera capacidad o fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι indica movimiento hacia los discípulos antes de hablar. «Se acercó» expresa bien el desplazamiento de forma natural en español y conserva el matiz espacial sin sobrecargar el estilo.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: les habló
  alternatives_spanish:
  - les dijo
  - les habló y dijo
  lexicon: BDAG
  rationale: λαλέω enfatiza el acto de hablar. En español, «les habló» mantiene ese matiz y distingue el verbo del siguiente participio λέγων, evitando repetir «dijo» innecesariamente.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de manera natural con el clítico «les», claro y fiel al referente de los discípulos.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce el discurso directo. «Diciendo» preserva la relación sintáctica con el verbo anterior y suena natural en español.
- source_word: Ἐδόθη
  english_pob_choice: has been given
  chosen_spanish: me ha sido dada
  alternatives_spanish:
  - me fue dada
  - me fue dado
  lexicon: BDAG
  rationale: El aoristo pasivo de δίδωμι expresa una acción completa con relevancia presente. «Me ha sido dada» conserva el pasivo y la vigencia actual, siguiendo la decisión del POB inglés; además concuerda con «autoridad», que es femenino en español.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo de primera persona se integra naturalmente con la construcción pasiva española «me ha sido dada».
- source_word: πᾶσα
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - completa
  lexicon: BDAG
  rationale: Con un sustantivo abstracto singular, πᾶσα expresa totalidad. «Toda» transmite esa amplitud con naturalidad en español.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: ἐξουσία denota autoridad delegada o legítimo señorío, no mera capacidad. «Autoridad» preserva mejor ese sentido que «poder» y evita diluir la fuerza jurídica y teológica del término.
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  lexicon: BDAG
  rationale: Aunque οὐρανός puede traducirse «cielo» o «cielos», aquí el paralelismo con «la tierra» favorece el singular natural «en el cielo» en español, sin perder el ámbito celestial.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: BDAG
  rationale: La preposición ἐπί con genitivo expresa aquí el ámbito terrenal correspondiente al cielo. «En la tierra» es la contrapartida más natural de «en el cielo» en español.
theological_decisions:
- issue: La entrega de autoridad al Jesús resucitado
  english_pob_reading: All authority in heaven and on earth has been given to me
  chosen_spanish_reading: Toda autoridad en el cielo y en la tierra me ha sido dada
  alternative_spanish_readings:
  - Toda autoridad en el cielo y en la tierra me fue dada
  - Toda autoridad en el cielo y en la tierra me es dada
  rationale: La traducción mantiene el pasivo Ἐδόθη y, por tanto, la idea de que la autoridad es concedida al Hijo resucitado. «Me ha sido dada» expresa en español una acción completa con efecto presente, sin convertir el enunciado en una afirmación meramente atemporal de posesión inherente.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), Definition of Chalcedon (451 AD); Translation philosophy §§1, 3, 6'
translation_notes:
  revision_awareness: 'Esta redacción sigue el acuerdo alto del control de calidad inglés y no introduce cambios de sentido respecto del audit trail: preserva el pasivo de δίδωμι, la fuerza de ἐξουσία como autoridad, y la correspondencia espacial cielo/tierra en un español natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio.
  - Se usa «autoridad» en lugar de «poder» para ἐξουσία, en continuidad con la decisión inglesa documentada.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto fuente; el versículo no contiene κύριος ni יהוה.
  - Se conserva la relación verbal «habló, diciendo» mediante una construcción española fluida.
  - El paralelo «en el cielo / en la tierra» mantiene la estructura antitética del original griego.
