translation:
  language: es
  text: Y los once discípulos fueron a Galilea, al monte donde Jesús les había indicado[a] ir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les había designado». El verbo griego puede significar «designar», «disponer» o «señalar»; aquí se trata del lugar de encuentro previamente fijado por Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ aquí funciona como un conector narrativo leve. En español, «Y» mantiene la transición natural sin cargar contraste ni añadir temporalidad más fuerte de la que exige el griego.
- source_word: ἕνδεκα μαθηταὶ
  english_pob_choice: the eleven disciples
  chosen_spanish: los once discípulos
  alternatives_spanish:
  - los once seguidores
  lexicon: BDAG
  rationale: «Discípulos» conserva el término técnico narrativo para los seguidores de Jesús. «Los once» refleja el grupo posterior a Judas; el artículo definido en español comunica bien la referencia específica.
- source_word: ἐπορεύθησαν
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se dirigieron
  - viajaron
  lexicon: BDAG
  rationale: El verbo griego indica ir o desplazarse. «Fueron» es natural en español y suficientemente preciso en este contexto narrativo.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: to Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - hasta Galilea
  lexicon: BDAG
  rationale: La preposición εἰς con lugar expresa movimiento hacia una región. En español, «a Galilea» es idiomático y fiel.
- source_word: εἰς τὸ ὄρος
  english_pob_choice: to the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - al monte
  lexicon: BDAG
  rationale: ὄρος puede ser «monte» o «montaña». Aquí «al monte» suena más natural en español bíblico sin perder el sentido local concreto.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el cual
  - en donde
  lexicon: BDAG
  rationale: El relativo adverbial de lugar se vierte con naturalidad por «donde».
- source_word: ἐτάξατο
  english_pob_choice: had directed
  chosen_spanish: les había indicado
  alternatives_spanish:
  - les había asignado
  - les había designado
  - les había ordenado
  lexicon: BDAG
  rationale: τάσσω en medio puede significar ordenar, disponer, designar o indicar. En este contexto se trata del lugar previamente señalado por Jesús; «les había indicado» preserva esa fuerza sin convertirla en un mandato más rígido de lo que el texto muestra.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo personal se expresa naturalmente en español con «les».
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: Fuerza de ἐτάξατο en relación con la cita previa de Jesús
  english_pob_reading: Render ἐτάξατο as 'had directed' rather than a stronger ecclesial or formal term.
  chosen_spanish_reading: Traducirlo como «les había indicado» mantiene la referencia a un lugar previamente señalado por Jesús sin sobrecargar el verbo con una connotación institucional o jerárquica.
  alternative_spanish_readings:
  - les había ordenado
  - les había designado
  rationale: 'El contexto es geográfico y narrativo: Jesús había fijado un punto de encuentro. «Indicado» conserva la dirección previa, la intencionalidad y la modestia semántica del pasaje.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se corrigió la omisión previa del marcador de nota: ahora la nota [a] aparece anclada en el texto. La redacción sigue el griego directamente y coincide con el sentido del audit trail inglés, especialmente en la elección de un verbo suave para ἐτάξατο.'
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί, en continuidad con la terminología POB.
  - Se evita «SEÑOR» o una paráfrasis eclesial; el nombre «Jesús» se conserva explícitamente.
  - «Monte»/«monte» se usa como equivalente natural de ὄρος en este contexto específico.
  - La preposición «a» reproduce el movimiento hacia Galilea y hacia el monte sin añadir matices no presentes en el griego.
