  - severity: medium
    issue: Construcción incompleta/forzada con «donde Jesús les había indicado»
    rationale: En español, «indicar» normalmente requiere complemento explícito del contenido indicado («les había indicado ir» / «les había indicado ese lugar»). La forma actual se entiende, pero suena menos natural y algo truncada.
