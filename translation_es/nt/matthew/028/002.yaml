revisions:
- from: Y he aquí[a], hubo un gran terremoto[b], porque un ángel del Señor había descendido del cielo, se había acercado y había removido la piedra, y estaba sentado sobre ella.
  to: Y he aquí[a], hubo un gran terremoto[b], porque un ángel del Señor había descendido del cielo, se acercó, apartó la piedra y estaba sentado sobre ella.
  rationale: Se conserva el sentido del griego y del POB inglés, pero se mejora la precisión léxica y la fluidez española. ‘Apartó la piedra’ representa mejor ἀπεκύλισε que ‘removió’. También se aligera la cadena verbal manteniendo ‘había descendido’ para la anterioridad principal, mientras ‘se acercó, apartó’ avanza la narración con naturalidad. Se corrige además la nota de ἰδού para ofrecer alternativas más adecuadas al registro bíblico.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:29:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: ἰδοὺ como marcador discursivo, σεισμὸς μέγας como ‘gran terremoto’, ἐγένετο como ‘hubo’, ἄγγελος κυρίου como ‘un ángel del Señor’, la secuencia participial anterior a ἀπεκύλισε, y el imperfecto ἐκάθητο como estado continuo. Sin embargo, ‘había removido la piedra’ se aleja del matiz concreto de ἀπεκύλισε τὸν λίθον, que en este contexto describe rodar/apartar la piedra, no simplemente quitarla de modo genérico. Además, duplicar pluscuamperfecto en ‘había descendido… se había acercado y había removido’ suena pesado en español; conviene mantener la anterioridad con una secuencia más natural.'
  spanish_quality_summary: El español es generalmente claro y digno, pero ‘Y he aquí’ suena algo acartonado; ‘Y miren’ no es una alternativa adecuada para nota en registro neutral. La frase verbal encadenada con tres pluscuamperfectos resulta poco natural. ‘Apartó la piedra’ mejora la idiomaticidad y preserva mejor la imagen narrativa. El resto del verso lee bien.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: ‘Señor’ para κύριος en esta expresión, ‘ángel’ para ἄγγελος, ‘terremoto’ para σεισμός. No hay conflicto con defaults mayores. La revisión propuesta mantiene estas decisiones y ajusta solo la naturalidad y precisión de ἀπεκύλισε.'
  issues:
  - severity: medium
    issue: ‘había removido la piedra’ debilita el sentido concreto de ἀπεκύλισε
    rationale: El verbo griego describe específicamente apartar/rodar la piedra; ‘remover’ en español puede sonar más abstracto o técnico y pierde viveza narrativa.
  - severity: medium
    issue: Cadena de pluscuamperfectos poco natural en español
    rationale: Aunque los participios son anteriores al verbo principal, en español una secuencia como ‘había descendido…, se había acercado y había removido…’ suena cargada. Puede expresarse la secuencia de modo más fluido sin perder anterioridad global.
  - severity: low
    issue: Nota alternativa ‘Miren’ para ἰδού no encaja bien con el registro
    rationale: ‘Miren’ introduce segunda persona plural y un tono exhortativo menos adecuado que alternativas como ‘Mira’ o ‘He aquí’; además el texto principal ya usa ‘he aquí’.
  revised_spanish_text: Y he aquí[a], hubo un gran terremoto[b], porque un ángel del Señor había descendido del cielo, se acercó, apartó la piedra y estaba sentado sobre ella.
  revised_footnotes:
