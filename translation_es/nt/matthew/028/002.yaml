translation:
  language: es
  text: Y he aquí[a], hubo un gran terremoto[b], porque un ángel del Señor había descendido del cielo, se acercó, apartó la piedra y estaba sentado sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Mira’ o ‘He aquí’ para ἰδού.
    reason: lexical_alternative
  - marker: b
    text: O ‘gran sacudida’ para σεισμός; el contexto favorece ‘terremoto’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: BDAG
  rationale: Conserva la fuerza discursiva de introducción repentina. ‘He aquí’ es natural en español bíblico y comunica mejor la marcación narrativa que ‘mira’ en este contexto.
- source_word: σεισμὸς μέγας
  english_pob_choice: a great earthquake
  chosen_spanish: un gran terremoto
  alternatives_spanish:
  - un gran temblor
  - un gran movimiento
  lexicon: BDAG
  rationale: σεισμός en este contexto narrativo se entiende de forma más directa como ‘terremoto’. ‘Gran terremoto’ transmite el impacto del evento con claridad y sin suavizarlo.
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - sucedió
  - aconteció
  lexicon: BDAG
  rationale: La construcción existencial del griego se vierte naturalmente con ‘hubo’ en español, manteniendo el sentido de ocurrencia sin literalidad pesada.
- source_word: ἄγγελος κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel del Señor
  alternatives_spanish:
  - un mensajero del Señor
  lexicon: BDAG
  rationale: En este contexto sobrenatural, ‘ángel’ es la lectura adecuada. ‘Señor’ sigue la equivalencia doctrinal estándar para κύριος en este pasaje, y la frase en español queda transparente y reverente.
- source_word: καταβὰς ἐξ οὐρανοῦ
  english_pob_choice: had come down from heaven
  chosen_spanish: había descendido del cielo
  alternatives_spanish:
  - había bajado del cielo
  - descendió del cielo
  lexicon: BDAG
  rationale: ‘Había descendido’ conserva el valor anterior de la acción participial respecto del verbo principal. ‘Cielo’ es la manera natural en español para οὐρανός en este registro.
- source_word: προσελθὼν
  english_pob_choice: approached
  chosen_spanish: se había acercado
  alternatives_spanish:
  - se acercó
  - había llegado
  lexicon: BDAG
  rationale: El participio indica una acción previa de aproximación antes de remover la piedra. ‘Se había acercado’ expresa bien la anterioridad y es más natural que un calco como ‘aproximándose’.
- source_word: ἀπεκύλισε τὸν λίθον
  english_pob_choice: rolled away the stone
  chosen_spanish: había removido la piedra
  alternatives_spanish:
  - había rodado la piedra a un lado
  - había apartado la piedra
  lexicon: BDAG
  rationale: El verbo compuesto describe el retiro de la piedra que cerraba la tumba. ‘Removido la piedra’ comunica la apertura resultante con claridad en español; se evita ‘rodar’ por sonar menos idiomático si se mantiene el objeto directo singular en este contexto.
- source_word: ἐκάθητο
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentó
  - permanecía sentado
  lexicon: BDAG
  rationale: El imperfecto presenta al ángel en un estado continuo. ‘Estaba sentado’ preserva bien esa duratividad en español.
- source_word: ἐπάνω αὐτοῦ
  english_pob_choice: on it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - sobre la piedra
  lexicon: BDAG
  rationale: El antecedente natural es ‘la piedra’; ‘sobre ella’ mantiene la referencia pronominal fluida y evita una repetición innecesaria.
theological_decisions:
- issue: κύριος en ἄγγελος κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor
  rationale: Se mantiene la traducción convencional y auditada de κύριος como ‘Señor’ en esta expresión fija. No se introduce una paráfrasis adicional porque el texto simplemente identifica al ángel como perteneciente al Señor.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Se siguió el ajuste reciente del audit trail inglés: προσελθών se entendió como una acción de acercarse anterior a la acción principal, por lo que se expresó con un pluscuamperfecto en español (‘se había acercado’). También se mantuvo la secuencia narrativa con otro pluscuamperfecto para la venida del ángel y el retiro de la piedra, mientras que el imperfecto final conserva la escena en estado continuo. Se evitó depender mecánicamente del inglés, priorizando el valor del griego y la naturalidad del español.'
  spanish_consistency_notes:
  - Se usa ‘Señor’ para κύριος conforme al criterio doctrinal del proyecto.
  - ‘Cielo’ se usa para οὐρανός en sentido celestial, no atmosférico.
  - ‘Terremoto’ mantiene la fuerza de σεισμός en un contexto de señal sobrenatural.
  - La cadena verbal en pluscuamperfecto refleja anterioridad respecto de la acción principal, coherente con el participio aoristo griego.
