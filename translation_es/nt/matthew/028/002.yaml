    text: O ‘Mira’ o ‘He aquí’ para ἰδού.
    reason: lexical_alternative
  - marker: b
    text: O ‘gran sacudida’ para σεισμός; el contexto favorece ‘terremoto’.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del griego y del POB inglés, pero se mejora la precisión léxica y la fluidez española. ‘Apartó la piedra’ representa mejor ἀπεκύλισε que ‘removió’. También se aligera la cadena verbal manteniendo ‘había descendido’ para la anterioridad principal, mientras ‘se acercó, apartó’ avanza la narración con naturalidad. Se corrige además la nota de ἰδού para ofrecer alternativas más adecuadas al registro bíblico.
