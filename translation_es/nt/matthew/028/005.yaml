translation:
  language: es
  text: 'Pero el ángel respondió y dijo a las mujeres: «No tengan miedo[a], pues sé que buscan a Jesús, el que ha sido crucificado[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego incluye explícitamente el pronombre «ustedes» para dar énfasis: la seguridad se dirige de manera particular a las mujeres.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más brevemente: «Jesús el crucificado» o «Jesús, que fue crucificado».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera idiomática como fórmula narrativa de respuesta con verbo de habla. En español, «respondió» comunica bien esa transición; la coordinación «respondió y dijo» preserva más explícitamente la fórmula semítica/grecorromana, por eso se deja como alternativa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro suave en la escena. «Pero» refleja el contraste narrativo y mantiene naturalidad en español.
- source_word: ἄγγελος
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: BDAG
  rationale: El contexto de resurrección identifica claramente a un ser angelical; «ángel» es la opción precisa y transparente.
- source_word: εἶπεν ταῖς γυναιξίν
  english_pob_choice: said to the women
  chosen_spanish: dijo a las mujeres
  alternatives_spanish:
  - habló a las mujeres
  lexicon: BDAG
  rationale: La construcción narrativa estándar se traduce de forma directa. «Mujeres» reproduce γυναιξίν como mujeres adultas presentes, no como «esposas».
- source_word: Μὴ φοβεῖσθε
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengan miedo
  alternatives_spanish:
  - No teman
  - No se asusten
  lexicon: BDAG
  rationale: En un contexto de consolación, la imperativa negativa se expresa con naturalidad como una exhortación tranquilizadora. «No teman» es más literal; «No tengan miedo» suena más idiomático en español moderno.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: '[a]'
  alternatives_spanish:
  - ustedes mismos
  - ustedes
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego. En español, el énfasis se explica en nota para evitar una construcción forzada en el texto principal, preservando la tensión registrada por la POB inglesa.
- source_word: οἶδα γὰρ
  english_pob_choice: for I know
  chosen_spanish: porque sé
  alternatives_spanish:
  - pues sé
  - porque yo sé
  lexicon: BDAG
  rationale: γάρ expresa la razón del consuelo. «Porque sé» conserva la función explicativa de manera directa; «porque yo sé» resaltaría más el sujeto, pero no es necesario en español.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español, sin transliteración extraña.
- source_word: τὸν ἐσταυρωμένον
  english_pob_choice: who has been crucified
  chosen_spanish: el que ha sido crucificado
  alternatives_spanish:
  - el crucificado
  - el que fue crucificado
  lexicon: BDAG
  rationale: El participio perfecto pasivo subraya la acción cumplida con vigencia actual. «El que ha sido crucificado» conserva mejor ese valor que un simple pretérito.
- source_word: ζητεῖτε
  english_pob_choice: you are seeking
  chosen_spanish: buscan
  alternatives_spanish:
  - están buscando
  - buscan a
  lexicon: BDAG
  rationale: El presente puede expresarse naturalmente en español como presente simple. «Buscan» es más sobrio y bíblicamente idiomático; se mantiene el complemento con «a» por tratarse de una persona.
theological_decisions:
- issue: Pronombre enfático ὑμεῖς en la exhortación del ángel
  english_pob_reading: The reassurance is directed particularly to the women; the English POB first preserved the emphasis, then revised to smoother English while retaining the sense.
  chosen_spanish_reading: La nota explica que el consuelo va dirigido específicamente a las mujeres, sin forzar el giro «ustedes» en la línea principal.
  alternative_spanish_readings:
  - No tengan miedo, ustedes
  - No teman, ustedes
  rationale: El griego incluye un pronombre explícito con valor enfático. En español, repetirlo en el discurso principal puede sonar duro o artificial; la nota conserva la tensión y el matiz de dirección personal.
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente.
- issue: Participio perfecto pasivo τὸν ἐσταυρωμένον
  english_pob_reading: '''who has been crucified'' keeps the completed act with abiding significance.'
  chosen_spanish_reading: «el que ha sido crucificado» mantiene la acción completada y su relevancia actual.
  alternative_spanish_readings:
  - el crucificado
  - el que fue crucificado
  rationale: La forma española con perfecto compuesto es la mejor aproximación para conservar el valor resultativo del participio griego sin perder claridad ni sonar excesivamente literal.
  doctrine_reference: Aspecto verbal y fuerza resultativa del participio.
translation_notes:
  revision_awareness: La versión inglesa más reciente suavizó la redacción eliminando el «you» enfático en la línea principal y simplificando «the one who has been crucified» a una forma más fluida. La versión española conserva el sentido del énfasis mediante nota y mantiene «el que ha sido crucificado» para reflejar mejor el valor aspectual del participio perfecto pasivo.
  spanish_consistency_notes:
  - Se mantuvo «ángel» por coherencia con el contexto narrativo de resurrección.
  - Se usó «Jesús» como nombre propio estándar y no «Cristo», ya que el texto no emplea el título Χριστός.
  - Se tradujo δοῦλος/siervo no aplica aquí; no se introdujo terminología eclesiástica no presente en el pasaje.
  - Se optó por «No tengan miedo» como español natural de consolación, manteniendo la solemnidad del mandato.
  - La nota de [a] conserva el énfasis griego sin sobrecargar el ritmo del texto principal.
