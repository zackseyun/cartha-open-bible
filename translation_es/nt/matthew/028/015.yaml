translation:
  language: es
  text: Así que tomaron la plata e hicieron como se les había instruido. Y esta historia[a] se ha difundido entre los judíos hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este informe». El griego λόγος puede significar «palabra», «informe», «relato» o «historia», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  lexicon: BDAG
  rationale: El participio aoristo de λαμβάνω se entiende naturalmente en secuencia narrativa con el verbo principal. «Tomaron» conserva la acción concreta y sigue de cerca el valor de «took» en el audit trail inglés; «recibieron» sería posible, pero suena menos directo en español aquí.
- source_word: τὰ ἀργύρια
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - las monedas de plata
  lexicon: BDAG
  rationale: ἀργύρια puede referirse a plata o dinero. «La plata» conserva la concreción del griego y coincide con la decisión inglesa de mantener una referencia material. «El dinero» interpreta más; «las monedas de plata» es más específico de lo que exige el texto.
- source_word: ἐποίησαν
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  lexicon: BDAG
  rationale: ποιέω aquí funciona como verbo general de acción, enlazado con la cláusula siguiente. «Hicieron» mantiene esa relación directa con «como se les había instruido»; «actuaron» es válido, pero menos literal.
- source_word: ὡς ἐδιδάχθησαν
  english_pob_choice: as they had been instructed
  chosen_spanish: como se les había instruido
  alternatives_spanish:
  - como se les había enseñado
  - como se les había dirigido
  lexicon: BDAG
  rationale: El pasivo de διδάσκω puede significar «ser enseñado» o «ser instruido». En este contexto, donde se les dice qué hacer y qué decir, «instruido» expresa mejor la fuerza pragmática del griego y coincide con el sentido auditable del inglés.
- source_word: διεφημίσθη
  english_pob_choice: has been spread
  chosen_spanish: se ha difundido
  alternatives_spanish:
  - se difundió ampliamente
  - se ha dado a conocer
  lexicon: BDAG
  rationale: El verbo indica propagación por rumor o informe. «Se ha difundido» comunica un efecto continuado hasta el presente, equivalente al presente perfecto inglés y adecuado con «hasta el día de hoy».
- source_word: ὁ λόγος οὗτος
  english_pob_choice: this story
  chosen_spanish: esta historia
  alternatives_spanish:
  - este informe
  - este relato
  - esta versión
  lexicon: BDAG
  rationale: λόγος tiene un rango amplio. En este contexto narrativo-polemico, «historia» es natural en español y refleja la opción inglesa. «Informe» o «relato» serían alternativas útiles si se quisiera enfatizar el carácter reportado.
- source_word: παρὰ Ἰουδαίοις
  english_pob_choice: among the Jews
  chosen_spanish: entre los judíos
  alternatives_spanish:
  - entre el pueblo judío
  - entre los judeanos
  lexicon: BDAG
  rationale: Con παρά + dativo, la idea es de circulación dentro de un grupo. «Entre los judíos» es la equivalencia más directa y transparente, sin añadir matices ajenos al texto. «Judeanos» sería menos natural aquí; «pueblo judío» explicita más de lo necesario.
- source_word: μέχρι τῆς σήμερον ἡμέρας
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: BDAG
  rationale: Es un modismo temporal que expresa continuidad hasta el presente del autor. «Hasta el día de hoy» es natural, solemne y fiel; «hasta hoy» es más breve pero algo menos enfático.
theological_decisions:
- issue: Posible resonancia anti-judía en παρὰ Ἰουδαίοις
  english_pob_reading: among the Jews
  chosen_spanish_reading: entre los judíos
  alternative_spanish_readings:
  - entre el pueblo judío
  - entre los judeanos
  rationale: Se mantiene la referencia étnico-comunitaria directa del griego y del audit trail inglés sin ampliar el alcance a una condena global. «Entre los judíos»/«entre el pueblo judío» describe el ámbito narrativo de circulación del rumor; no introduce un juicio doctrinal sobre los judíos en general.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El análisis y la revisión más recientes coinciden en alta concordancia; no se registran cambios editoriales adicionales respecto del estado auditado. La redacción española sigue la decisión inglesa estable sin introducir novedades interpretativas.
  spanish_consistency_notes:
  - Se usa «plata» para ἀργύρια, manteniendo la concreción material del griego y del inglés auditable.
  - Se conserva el contraste narrativo entre acción pasada («tomaron», «hicieron») y resultado duradero («se ha difundido», «hasta el día de hoy»).
  - El término «judíos» se usa en su sentido comunitario contextual, sin expandirlo a una lectura teológica más amplia.
