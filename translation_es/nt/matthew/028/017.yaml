translation:
  language: es
  text: Y al verlo, lo adoraron, pero algunos dudaron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'titubearon' o 'vacilaron'. El griego puede sugerir incertidumbre más que incredulidad establecida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when they saw
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vieron
  - después de verlo
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente en relación con el verbo principal. En español, 'al verlo' expresa esa relación de manera natural y concisa, sin perder el valor de anterioridad implícito.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: lo adoraron
  alternatives_spanish:
  - se postraron ante él
  - le rindieron homenaje
  lexicon: BDAG
  rationale: En el contexto de la resurrección y dirigido a Jesús, 'adoraron' transmite mejor la fuerza reverencial y cultual que un mero gesto físico. 'Lo adoraron' mantiene la carga teológica que el POB inglés quiso preservar.
- source_word: οἱ δὲ
  english_pob_choice: but some
  chosen_spanish: pero algunos
  alternatives_spanish:
  - pero ellos
  - pero otros
  lexicon: BDAG
  rationale: El artículo con δέ introduce un subconjunto contrastivo del grupo mencionado. En español, 'algunos' comunica de forma natural esa idea de parte del grupo, no de todos.
- source_word: ἐδίστασαν
  english_pob_choice: doubted
  chosen_spanish: dudaron
  alternatives_spanish:
  - titubearon
  - vacilaron
  lexicon: BDAG
  rationale: '''Dudaron'' conserva la traducción principal del POB inglés, pero en español puede abarcar también vacilación o incertidumbre. Las alternativas preservan el matiz de inestabilidad que el griego permite.'
theological_decisions:
- issue: Sentido de προσκυνέω aplicado a Jesús resucitado
  english_pob_reading: Rendered as 'worshiped'
  chosen_spanish_reading: '''lo adoraron'''
  alternative_spanish_readings:
  - '''se postraron ante él'''
  - '''le rindieron homenaje'''
  rationale: En este contexto narrativo, la acción va más allá de una simple inclinación corporal. 'Adoraron' refleja el peso religioso del verbo frente a Jesús resucitado, sin añadir una formulación ajena al pasaje.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Fuerza de διστάζω
  english_pob_reading: Rendered as 'doubted' in the main text
  chosen_spanish_reading: '''dudaron'''
  alternative_spanish_readings:
  - '''titubearon'''
  - '''vacilaron'''
  rationale: El griego puede indicar duda, titubeo o vacilación más que incredulidad asentada. La traducción principal mantiene la tensión del texto y evita resolverla en exceso.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés reciente se mantuvo sin cambios en la última revisión; la versión española sigue esa lectura estable y conserva la misma tensión lexical en ἐδίστασαν.
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' fuera de este versículo porque no aparece ninguna referencia divina nominal explícita.
  - '''Adoraron'' se usa aquí como equivalente contextual de προσκυνέω en un marco cristológico, coherente con el POB inglés.'
  - La nota al pie preserva la alternativa semántica de ἐδίστασαν sin debilitar la lectura principal del texto.
