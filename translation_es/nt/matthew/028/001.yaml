review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia temporal principal del griego y conserva la ambigüedad inicial mediante nota. También mantiene adecuadamente los referentes personales y el propósito de ir al sepulcro. Sin embargo, hay dos desajustes de fidelidad/estilo: «Ahora» suena menos natural en español bíblico narrativo para δέ en este contexto, y «cuando estaba amaneciendo» personifica de forma algo torpe el sujeto implícito; además, «fueron» para ἦλθεν se aleja de la perspectiva más simple de «vino/llegó» y conviene rehacer la oración con sujeto plural explícito.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y precisión narrativa. «Pasado el sábado» suena más idiomático que «Ahora, después del sábado»; «al amanecer del primer día de la semana» evita la construcción pesada «cuando estaba amaneciendo hacia…». «Fueron a ver» es natural, pero en combinación con el singular griego ἦλθεν y la sintaxis española queda mejor «vinieron… para ver». «Sepulcro» es una elección aceptable y de buen registro.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Los nombres propios están bien. «Sepulcro» es una excepción estilística aceptable para τάφος frente a «tumba», y la nota alternativa sobre ὀψὲ σαββάτων está correctamente preservada, aunque conviene pulir su redacción en español.
  issues:
  - severity: medium
    issue: «Ahora» para δέ
    rationale: Aunque el inglés usa «Now», en español «Ahora» al inicio de este versículo suena innecesariamente calcado y menos natural. Un arranque como «Pasado el sábado» comunica mejor el flujo narrativo sin perder el valor discursivo ligero de δέ.
  - severity: medium
    issue: Construcción temporal «cuando estaba amaneciendo hacia el primer día de la semana»
    rationale: Intenta reproducir de cerca el inglés auditado, pero en español resulta forzada. El sentido de τῇ ἐπιφωσκούσῃ εἰς μίαν σαββάτων se expresa con más claridad y fidelidad idiomática como «al amanecer del primer día de la semana».
  - severity: low
    issue: «fueron» para ἦλθεν
    rationale: No es una mala traducción, pero cambia la perspectiva narrativa del verbo simple «vino/llegó». En español, con sujeto compuesto pospuesto, «vinieron» suena más directo y más cercano al griego.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: La nota comunica correctamente la alternativa, pero «O bien» entrecomillado y la frase completa pueden simplificarse para sonar más natural en español eclesial legible.
  revised_spanish_text: Pasado el sábado[a], al amanecer del primer día de la semana, vinieron María Magdalena y la otra María para ver el sepulcro.
  revised_footnotes:
  - marker: a
    text: 'O bien: «Tarde en el sábado, al amanecer del primer día de la semana». La frase griega inicial puede entenderse como «después del sábado» o «tarde en el sábado».'
    reason: alternative_reading
  revision_rationale: Se ajusta el inicio para un español más natural y menos calcado, se reformula la expresión temporal para representar con claridad el sentido de ἐπιφωσκούσῃ εἰς μίαν σαββάτων, y se cambia «fueron» por «vinieron» para acercarse mejor al verbo narrativo griego. Se conserva la nota de ambigüedad temporal porque está bien documentada en el expediente inglés.
