translation:
  language: es
  text: Pasado el sábado[a], al amanecer del primer día de la semana, vinieron María Magdalena y la otra María para ver el sepulcro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Tarde en el sábado, al amanecer del primer día de la semana». La frase griega inicial puede entenderse como «después del sábado» o «tarde en el sábado».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὀψὲ δὲ σαββάτων
  english_pob_choice: Now after the Sabbath
  chosen_spanish: Ahora, después del sábado
  alternatives_spanish:
  - Tarde en el sábado
  - Después de los sábados
  lexicon: BDAG
  rationale: ὀψέ con genitivo puede indicar tiempo posterior a un evento; en este contexto de resurrección, la lectura más natural es que la acción ocurre después de terminado el sábado. δέ se refleja con un enlace discursivo ligero como «Ahora». Aunque σαββάτων está en plural formal, funciona idiomáticamente como singular en el judaísmo helenístico; por eso «sábado» comunica el sentido sin forzar una pluralidad española que no está en juego.
- source_word: τῇ ἐπιφωσκούσῃ
  english_pob_choice: as it was dawning
  chosen_spanish: cuando estaba amaneciendo
  alternatives_spanish:
  - cuando iba clareando
  - cuando comenzaba a amanecer
  lexicon: BDAG
  rationale: El participio de ἐπιφώσκω aquí señala la llegada de la luz del día. «Amaneciendo» expresa bien ese proceso temporal en español y conserva la referencia a la aurora sin volverlo excesivamente técnico.
- source_word: εἰς μίαν σαββάτων
  english_pob_choice: toward the first day of the week
  chosen_spanish: hacia el primer día de la semana
  alternatives_spanish:
  - para el primer día de la semana
  - hacia el primero de la semana
  lexicon: BDAG
  rationale: La expresión es un giro semítico para referirse al primer día de la semana. «Primer día de la semana» comunica el valor idiomático; «hacia» intenta reflejar εἰς en relación con el amanecer, manteniendo el matiz direccional del griego.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: Aunque el griego usa literalmente ἦλθεν («vino» / «fue» según perspectiva narrativa), en español el movimiento de las mujeres hacia el sepulcro se expresa con naturalidad mediante «fueron». Conserva la orientación narrativa sin introducir un tecnicismo innecesario.
- source_word: Μαριὰμ ἡ Μαγδαληνὴ
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - Mariam la Magdalena
  lexicon: BDAG
  rationale: Los nombres propios se vierten según la convención española establecida y ampliamente inteligible. «María Magdalena» preserva la identificación personal y el uso eclesial sin alterar el referente.
- source_word: ἡ ἄλλη Μαρία
  english_pob_choice: the other Mary
  chosen_spanish: la otra María
  alternatives_spanish:
  - la segunda María
  lexicon: BDAG
  rationale: ἄλλη significa «otra»; «la otra María» es la forma natural en español y mantiene la distinción narrativa introducida por el texto.
- source_word: θεωρῆσαι
  english_pob_choice: to look at
  chosen_spanish: a ver
  alternatives_spanish:
  - a mirar
  - a observar
  lexicon: BDAG
  rationale: θεωρέω puede indicar mirar con atención u observar. En español, la construcción final «fueron a ver» es natural y suficientemente fiel sin sobredeterminar la acción como una inspección formal.
- source_word: τὸν τάφον
  english_pob_choice: the tomb
  chosen_spanish: el sepulcro
  alternatives_spanish:
  - la tumba
  - la sepultura
  lexicon: BDAG
  rationale: Aunque «tumba» sería comprensible, «sepulcro» mantiene mejor el tono bíblico y el lugar de sepultura de Jesús en un registro digno y claro para la lectura litúrgica o pública.
theological_decisions:
- issue: Relación temporal entre el sábado y el amanecer del primer día
  english_pob_reading: The verse is rendered as occurring after the Sabbath had ended and at dawn on the first day of the week.
  chosen_spanish_reading: El versículo se traduce como ocurriendo después del sábado, mientras amanecía hacia el primer día de la semana.
  alternative_spanish_readings:
  - al final del sábado, cuando amanecía hacia el primer día de la semana
  rationale: El griego admite una discusión sobre ὀψὲ σαββάτων («después del sábado» o «tarde en el sábado»). La redacción española conserva la tensión temporal del original y la secuencia narrativa, sin resolver artificialmente la ambigüedad.
  doctrine_reference: Preservar la tensión textual; primacía del idioma original sobre la tradición armonizadora.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura auditada del POB en inglés y conserva la ambigüedad temporal documentada en ὀψὲ σαββάτων. Se mantuvo el orden natural del español y se eligieron equivalentes idiomáticos para amanecer, dirección temporal y movimiento narrativo, sin añadir información interpretativa no sostenida por el texto.
  spanish_consistency_notes:
  - Se usó «sábado» en singular por el uso idiomático del plural griego σαββάτων.
  - Se prefirió «sepulcro» por registro bíblico y claridad narrativa.
  - «Amaneciendo» traduce el proceso de ἐπιφωσκούσῃ sin forzar una lectura técnica.
  - La nota al pie conserva la alternativa temporal documentada por el audit trail en inglés.
