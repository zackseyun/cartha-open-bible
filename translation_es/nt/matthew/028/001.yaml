revisions:
- from: Ahora, después del sábado[a], cuando estaba amaneciendo hacia el primer día de la semana, María Magdalena y la otra María fueron a ver el sepulcro.
  to: Pasado el sábado[a], al amanecer del primer día de la semana, vinieron María Magdalena y la otra María para ver el sepulcro.
  rationale: Se ajusta el inicio para un español más natural y menos calcado, se reformula la expresión temporal para representar con claridad el sentido de ἐπιφωσκούσῃ εἰς μίαν σαββάτων, y se cambia «fueron» por «vinieron» para acercarse mejor al verbo narrativo griego. Se conserva la nota de ambigüedad temporal porque está bien documentada en el expediente inglés.
  reviewer_model: gpt-5.4
