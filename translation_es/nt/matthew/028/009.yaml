review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo y acierta en «he aquí», «se acercaron» y «lo adoraron». Sin embargo, falla de manera importante en la traducción de Χαίρετε: «¡Saluden!» no significa que Jesús las saluda, sino que les ordena saludar a otros. El griego aquí funciona como saludo dirigido a ellas («¡Saludos!», «¡Alégrense!»), tal como documenta la auditoría inglesa.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «Jesús les salió al encuentro y les dijo: «¡Saluden!»» suena antinatural y semánticamente equivocada. Además, la nota [a] está mal anclada: corresponde a «¡Saludos!»/«¡Alégrense!», no a «he aquí». Conviene ajustar también «les salió al encuentro» a «salió a su encuentro» para una sintaxis más natural.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Jesús» y «lo adoraron» concuerdan con las decisiones del POB. La principal desviación no es terminológica sino léxica: Χαίρετε debe rendirse como saludo, no como mandato de saludar.'
  issues:
  - severity: high
    issue: Traducción incorrecta de Χαίρετε como «¡Saluden!»
    rationale: El imperativo plural de χαίρω usado como saludo significa «¡Saludos!» / «¡Alégrense!», no una orden para que ellas saluden. Esto altera el sentido básico del discurso de Jesús y contradice la auditoría inglesa.
  - severity: medium
    issue: Anclaje erróneo de la nota [a]
    rationale: La nota explica una alternativa para Χαίρετε, pero el marcador está colocado en «he aquí» en vez de en el saludo. Eso desalinearía texto y nota.
  - severity: low
    issue: «Les salió al encuentro» es menos natural que «salió a su encuentro»
    rationale: Ambas expresan bien ὑπήντησεν, pero «salió a su encuentro» suena más idiomático y fluido en español general.
  revised_spanish_text: 'Y he aquí, Jesús salió a su encuentro y les dijo: «¡Saludos!»[a] Ellas se acercaron, le tomaron los pies y lo adoraron.[b]'
