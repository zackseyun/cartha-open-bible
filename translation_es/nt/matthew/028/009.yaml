- from: 'Y he aquí[a], Jesús les salió al encuentro y les dijo: «¡Saluden!» Ellas se acercaron, le tomaron de los pies[b] y lo adoraron.'
  to: 'Y he aquí, Jesús salió a su encuentro y les dijo: «¡Saludos!»[a] Ellas se acercaron, le tomaron los pies y lo adoraron.[b]'
  rationale: Se corrige el error principal en Χαίρετε, que debe ser un saludo y no una orden de saludar. Se reubica la nota correspondiente sobre el saludo, se mejora ligeramente la naturalidad de ὑπήντησεν con «salió a su encuentro», y se conserva «lo adoraron» con la nota alternativa alineada con la decisión teológica y léxica del POB inglés.
