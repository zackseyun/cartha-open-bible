translation:
  language: es
  text: 'Y he aquí, Jesús salió a su encuentro y les dijo: «¡Saludos!»[a] Ellas se acercaron, le tomaron los pies y lo adoraron.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Alégrense!». El griego χαίρετε es literalmente un imperativo plural, pero en este contexto funciona como saludo.
    reason: lexical_alternative
  - marker: b
    text: O «se postraron ante él» / «le rindieron homenaje». El griego προσεκύνησαν puede indicar postración u homenaje; aquí probablemente lleva el sentido más fuerte de adoración a la luz del contexto de la resurrección.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - miren
  - y he aquí
  lexicon: BDAG
  rationale: He aquí conserva la fuerza de llamada de atención de ἰδού sin volverla innecesariamente pesada; funciona de manera natural en español bíblico y mantiene el tono narrativo vivo.
- source_word: ὑπήντησεν
  english_pob_choice: met
  chosen_spanish: les salió al encuentro
  alternatives_spanish:
  - las encontró
  - se encontró con ellas
  - las encontró en el camino
  lexicon: BDAG
  rationale: La expresión española comunica con más precisión la idea de encontrarse con alguien en el trayecto; evita perder el matiz de movimiento implícito en ὑπαντάω, que en este contexto sugiere que Jesús les salió al encuentro.
- source_word: Χαίρετε
  english_pob_choice: Greetings!
  chosen_spanish: ¡Saluden!
  alternatives_spanish:
  - ¡Alégrense!
  - ¡Salve!
  - ¡Regocíjense!
  lexicon: BDAG
  rationale: El griego es un imperativo plural de χαίρω que, en este contexto, funciona como saludo. En español, «¡Saluden!» preserva la forma imperativa y la función social del saludo mejor que una traducción meramente exclamativa; se conserva la tensión entre saludo y posible sentido de alegría en la nota.
- source_word: προσελθοῦσαι
  english_pob_choice: came up
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron hacia él
  - se llegaron
  lexicon: BDAG
  rationale: Se acercaron expresa con naturalidad el movimiento hacia Jesús y mantiene clara la secuencia de acciones antes de tomarlo de los pies.
- source_word: ἐκράτησαν αὐτοῦ τοὺς πόδας
  english_pob_choice: took hold of his feet
  chosen_spanish: le tomaron de los pies
  alternatives_spanish:
  - agarraron sus pies
  - se asieron de sus pies
  - tomaron sus pies
  lexicon: BDAG
  rationale: Tomaron de los pies reproduce la concreción física de κρατέω sin introducir una dureza excesiva; el dativo español con «le» hace la relación más natural y mantiene el contacto corporal del gesto.
- source_word: προσεκύνησαν αὐτῷ
  english_pob_choice: worshiped him
  chosen_spanish: lo adoraron
  alternatives_spanish:
  - se postraron ante él
  - le rindieron homenaje
  - lo reverenciaron
  lexicon: BDAG
  rationale: En el contexto inmediato de la resurrección, προσκυνέω lleva un peso religioso fuerte. «Lo adoraron» preserva esa fuerza mejor que una fórmula debilitada de homenaje, y corresponde a la lectura auditada del POB inglés.
theological_decisions:
- issue: Sentido de προσκυνέω ante Jesús resucitado
  english_pob_reading: worshiped him
  chosen_spanish_reading: lo adoraron
  alternative_spanish_readings:
  - se postraron ante él
  - le rindieron homenaje
  rationale: El pasaje presenta a Jesús resucitado recibiendo προσκύνησις. En español, «lo adoraron» mantiene la carga religiosa más fuerte que las opciones de homenaje o postración, sin eliminar la ambigüedad histórica del gesto corporal que también está presente en el texto.
  doctrine_reference: Mateo 28:9; Mateo 28:17; afirmaciones cristológicas de Niceno-Constantinopolitano (381) y Calcedonia (451); principio POB de preservar la tensión lexical y teológica
- issue: Función de Χαίρετε
  english_pob_reading: Greetings!
  chosen_spanish_reading: ¡Saluden!
  alternative_spanish_readings:
  - ¡Alégrense!
  - ¡Salve!
  - ¡Saludos!
  rationale: El imperativo plural puede leerse como saludo convencional y también conserva su vínculo léxico con la alegría. «¡Saluden!» reproduce mejor la forma imperativa del griego que una simple exclamación nominal, mientras la nota preserva la alternativa semántica.
  doctrine_reference: BDAG para χαίρω; principio de equivalencia óptima con notas cuando el contexto admite más de una lectura
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y se cotejó el auditable POB inglés. No se introdujeron revisiones previas adicionales; la traducción mantiene la doble posibilidad lexical de χαίρετε y la fuerza teológica de προσεκύνησαν en el contexto de la resurrección.
  spanish_consistency_notes:
  - Se usa «Jesús» sin variación como nombre propio establecido.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni una alusión necesaria al nombre divino.
  - Se mantiene el registro bíblico moderno y claro, con puntuación española estándar.
  - El pronombre clítico «lo» en «lo adoraron» conserva la referencia directa a Jesús y evita ambigüedad.
  - La formulación «le tomaron de los pies» refleja contacto físico sin endurecer el verbo más allá del griego.
