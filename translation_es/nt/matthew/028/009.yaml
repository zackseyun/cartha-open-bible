    reason: alternative_reading
  revision_rationale: Se corrige el error principal en Χαίρετε, que debe ser un saludo y no una orden de saludar. Se reubica la nota correspondiente sobre el saludo, se mejora ligeramente la naturalidad de ὑπήντησεν con «salió a su encuentro», y se conserva «lo adoraron» con la nota alternativa alineada con la decisión teológica y léxica del POB inglés.
