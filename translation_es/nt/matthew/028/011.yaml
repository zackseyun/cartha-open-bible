translation:
  language: es
  text: Mientras iban[a], he aquí[b], algunos de la guardia entraron en la ciudad e informaron a los principales sacerdotes todo lo que había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mientras estaban en camino». El griego usa un genitivo absoluto para situar temporalmente la escena siguiente.'
    reason: lexical_alternative
  - marker: b
    text: «He aquí» traduce el marcador de atención ἰδού, que introduce un desarrollo repentino o digno de nota en la narración.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πορευομένων δὲ αὐτῶν
  english_pob_choice: While they were going
  chosen_spanish: Mientras ellos se iban
  alternatives_spanish:
  - Mientras iban
  - Mientras estaban yendo
  - Cuando ellos se iban
  lexicon: BDAG
  rationale: El genitivo absoluto introduce el marco temporal de la acción siguiente; «mientras» conserva ese valor de trasfondo. «Se iban» evita una calca dura y sigue el sentido de movimiento en curso.
- source_word: ἰδού
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  - observa
  lexicon: BDAG
  rationale: Como marcador de atención narrativa, «he aquí» preserva la fuerza de irrupción del griego sin convertirlo en una paráfrasis explicativa.
- source_word: τινες τῆς κουστωδίας
  english_pob_choice: some of the guard
  chosen_spanish: algunos de la guardia
  alternatives_spanish:
  - algunos de la guardia del sepulcro
  - algunos de la custodia
  - algunos de los guardias
  lexicon: BDAG
  rationale: «Guardia» reproduce el grupo designado por κουστωδία y mantiene el registro narrativo; «algunos de» conserva el indefinido τινες sin añadir información no explicitada en el griego.
- source_word: ἐλθόντες εἰς τὴν πόλιν
  english_pob_choice: came into the city
  chosen_spanish: llegaron a la ciudad
  alternatives_spanish:
  - entraron en la ciudad
  - vinieron a la ciudad
  - habiendo llegado a la ciudad
  lexicon: BDAG
  rationale: El participio aoristo con valor circunstancial se integra naturalmente como una acción previa o concomitante; «llegaron a la ciudad» es idiomático en español y conserva el movimiento hacia la ciudad sin forzar una estructura participial pesada.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: notificaron
  alternatives_spanish:
  - informaron
  - reportaron
  - dieron aviso
  lexicon: BDAG
  rationale: El verbo expresa comunicar un informe a una autoridad; «notificaron» preserva el matiz formal de reporte, más cercano al acto de dar noticia oficial que un simple «dijeron».
- source_word: τοῖς ἀρχιερεῦσιν
  english_pob_choice: to the chief priests
  chosen_spanish: a los principales sacerdotes
  alternatives_spanish:
  - a los sumos sacerdotes
  - a los sacerdotes principales
  lexicon: BDAG
  rationale: Para ἀρχιερεῖς, «principales sacerdotes» es una opción española clara y fiel al plural jerárquico del término. Se evita «sumos sacerdotes» si pudiera sonar a un oficio singularizado sin necesidad en el contexto.
- source_word: ἅπαντα τὰ γενόμενα
  english_pob_choice: everything that had happened
  chosen_spanish: todo lo que había sucedido
  alternatives_spanish:
  - todo lo acontecido
  - todo lo que había ocurrido
  - todas las cosas que habían sucedido
  lexicon: BDAG
  rationale: ἅπαντα intensifica la totalidad; «todo lo que había sucedido» conserva esa amplitud y el tiempo pasado anterior requerido por el contexto narrativo, sin introducir lenguaje más abstracto que el griego.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto griego SBLGNT y el audit trail inglés de la POB. No se detectan revisiones textuales ni tensiones doctrinales particulares en este versículo; se ha preservado la función narrativa del genitivo absoluto y del marcador ἰδού, y se ha elegido un español natural para el reporte a las autoridades.
  spanish_consistency_notes:
  - Se mantiene «guardia» para κουστωδία en coherencia con el contexto del sepulcro.
  - Se usa «principales sacerdotes» para ἀρχιερεῖς, manteniendo el plural y el registro institucional.
  - «Notificaron» se eligió por su matiz formal de informe, acorde con el destinatario sacerdotal.
  - Se evita el tradicionalismo de «he aquí» solo si se perdiera la función de ἰδού; aquí se conserva por fidelidad discursiva.
