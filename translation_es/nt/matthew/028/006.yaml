translation:
  language: es
  text: No está aquí[a], porque ha sido resucitado, tal como dijo. Vengan[b], vean el lugar donde yacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Ha resucitado». El verbo griego está en forma pasiva («ha sido resucitado»), aunque la tradición en español a menudo lo vierte de modo activo.
    reason: alternative_reading
  - marker: b
    text: O, «donde yacía» o «donde había sido puesto».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔστιν ὧδε
  english_pob_choice: He is not here
  chosen_spanish: No está aquí
  alternatives_spanish:
  - No se encuentra aquí
  - No está en este lugar
  lexicon: BDAG
  rationale: La expresión griega es una afirmación locativa/existencial idiomática. En español, 'No está aquí' reproduce de manera natural el sentido y conserva la brevedad del original. 'Se encuentra' o 'en este lugar' son posibles, pero añaden formulación innecesaria.
- source_word: ἠγέρθη
  english_pob_choice: has been raised
  chosen_spanish: ha sido levantado
  alternatives_spanish:
  - ha resucitado
  - fue levantado
  lexicon: BDAG
  rationale: El aoristo pasivo de ἐγείρω conserva mejor su fuerza pasiva en español con 'ha sido levantado'. Esto mantiene visible que la resurrección es una acción realizada sobre él, sin depender de una formulación activa tradicional.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: '''Porque'' expresa con claridad la relación explicativa con la afirmación anterior. En este contexto narrativo funciona de forma natural en español y comunica la razón dada por el mensajero.'
- source_word: καθὼς εἶπεν
  english_pob_choice: just as he said
  chosen_spanish: tal como dijo
  alternatives_spanish:
  - como dijo
  - así como dijo
  lexicon: BDAG
  rationale: '''Tal como dijo'' conserva la correspondencia con la predicción previa sin sobreespecificar el tiempo verbal. Es una equivalencia natural para la comparación establecida por καθώς.'
- source_word: δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan aquí
  - Ven
  lexicon: BDAG
  rationale: δεῦτε es una invitación/summons plural. 'Vengan' respeta el plural implícito y suena natural en español; 'ven' sería singular y menos adecuado.
- source_word: ἴδετε
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - vean ustedes
  lexicon: BDAG
  rationale: El imperativo aoristo llama a la observación inmediata. 'Vean' es el equivalente natural y directo en español, sin recurrir a un 'miren' más coloquial o a 'he aquí' más arcaico.
- source_word: τὸν τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la ubicación
  lexicon: BDAG
  rationale: '''Lugar'' es el término más natural en español para τόπος en este contexto funerario/narrativo. Comunica la concreción espacial sin perder claridad.'
- source_word: ὅπου ⸀ἔκειτο
  english_pob_choice: where he was lying
  chosen_spanish: donde yacía
  alternatives_spanish:
  - donde estaba acostado
  - donde había sido puesto
  lexicon: BDAG
  rationale: κεῖμαι aquí describe el estado de estar tendido/acostado en el sepulcro. 'Yacía' conserva la idea de reposo corporal y la imperfectividad del verbo, mientras que 'había sido puesto' desplaza el énfasis hacia la acción previa de deposición.
theological_decisions:
- issue: Voz pasiva y agencia en la afirmación de la resurrección
  english_pob_reading: has been raised
  chosen_spanish_reading: ha sido levantado
  alternative_spanish_readings:
  - ha resucitado
  - fue levantado
  rationale: La forma pasiva griega ἠγέρθη conviene expresarla en español con una pasiva perifrástica para no borrar la agencia implícita en el texto. 'Ha sido levantado' preserva mejor esa pasividad que una forma activa como 'ha resucitado'.
  doctrine_reference: Translation philosophy §§1, 3, 5; afirmaciones doctrinales coherentes con la ortodoxia nicena y calcedoniana
translation_notes:
  revision_awareness: Este borrador sigue de cerca el paquete fuente griego y el expediente de auditoría en inglés. Se mantiene la voz pasiva de ἠγέρθη en el texto principal para no perder la fuerza gramatical ni la agencia implícita, y se conserva la invitación plural de δεῦτε con un imperativo natural en español. No hubo revisiones aplicadas en el pass más reciente, por lo que el borrador refleja el acuerdo alto del contexto de revisión.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto cuando corresponda, aunque este versículo no lo contiene.
  - Se mantiene 'ha sido levantado' para conservar la pasividad del griego, en paralelo con la decisión auditada en inglés.
  - '''Vengan'' respeta el plural del llamado de δεῦτε.'
  - '''Yacía'' conserva la idea de estar tendido en el sepulcro y armoniza con la nota alternativa sobre ''había sido puesto''.'
