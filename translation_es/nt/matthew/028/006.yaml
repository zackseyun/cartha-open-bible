  to: No está aquí[a], porque ha sido resucitado, tal como dijo. Vengan[b], vean el lugar donde yacía.
  rationale: Se revisa únicamente ἠγέρθη para mejorar la fidelidad semántica y la naturalidad en español, conservando la voz pasiva documentada por el POB. «Ha sido resucitado» comunica de manera más clara la resurrección que «ha sido levantado». Se actualiza la nota [a] en consecuencia. El resto del versículo se mantiene por ser fiel, claro y bien formulado.
