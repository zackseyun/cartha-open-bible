translation:
  language: es
  text: Y después de reunirse con los ancianos y deliberar, dieron una suma considerable de plata[a] a los soldados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran cantidad de plata»; el griego dice literalmente «plata considerable».
    reason: lexical_alternative
lexical_decisions:
- source_word: συναχθέντες
  english_pob_choice: after gathering
  chosen_spanish: después de reunirse
  alternatives_spanish:
  - habiéndose reunido
  - después de haberse reunido
  lexicon: BDAG
  rationale: El participio aoristo pasivo funciona aquí de modo intransitivo, con sentido de juntarse/reunirse. En español, «después de reunirse» conserva la secuencia participial y suena natural sin añadir más de lo que el griego indica.
- source_word: μετὰ τῶν πρεσβυτέρων
  english_pob_choice: with the elders
  chosen_spanish: con los ancianos
  alternatives_spanish:
  - junto con los ancianos
  - con los presbíteros
  lexicon: BDAG
  rationale: μετά con genitivo expresa asociación. «Ancianos» es la forma usual y clara en este contexto de liderazgo; «presbíteros» sería más técnico y menos inmediato para lectores generales.
- source_word: συμβούλιόν τε λαβόντες
  english_pob_choice: and taking counsel
  chosen_spanish: y tomar consejo
  alternatives_spanish:
  - y habiendo tomado consejo
  - y después de deliberar
  - y habiendo deliberado
  lexicon: BDAG
  rationale: La expresión idiomática συμβούλιον λαμβάνω significa deliberar o tomar una decisión en consejo. «Tomar consejo» mantiene el valor deliberativo y evita reducirlo a mera consulta informal.
- source_word: ἀργύρια
  english_pob_choice: a considerable sum of silver
  chosen_spanish: una suma considerable de plata
  alternatives_spanish:
  - una considerable suma de plata
  - una cantidad considerable de plata
  - dinero de plata
  lexicon: BDAG
  rationale: ἀργύρια puede referirse a plata en forma de dinero. «Suma de plata» preserva el material del griego y, con «considerable», refleja que la cantidad era sustancial sin especificar moneda no dicha por el texto.
- source_word: ἱκανὰ
  english_pob_choice: considerable
  chosen_spanish: considerable
  alternatives_spanish:
  - suficiente
  - grande
  - importante
  lexicon: BDAG
  rationale: En este contexto cuantitativo, ἱκανός califica la magnitud del pago. «Considerable» comunica bien esa cantidad notable y evita el matiz más débil de «suficiente».
- source_word: ἔδωκαν
  english_pob_choice: they gave
  chosen_spanish: les dieron
  alternatives_spanish:
  - se lo dieron
  - entregaron
  lexicon: BDAG
  rationale: El verbo δίδωμι en aoristo se traduce de forma directa con «dar». El complemento indirecto «les» hace explícita la relación dativa con los soldados sin alterar el sentido.
- source_word: τοῖς στρατιώταις
  english_pob_choice: to the soldiers
  chosen_spanish: a los soldados
  alternatives_spanish:
  - a los guardias
  - a los militares
  lexicon: BDAG
  rationale: στρατιώταις significa literalmente «soldados». Aunque por contexto cumplen la función de guardias, mantener «soldados» conserva la fuerza léxica del griego.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: they = the chief priests, continuing from the previous verse
  chosen_spanish_reading: el sujeto se deja implícito y se entiende por el contexto anterior
  alternative_spanish_readings:
  - los principales sacerdotes
  - ellos
  rationale: El griego continúa con participios y verbo en plural sin repetir el sujeto. En español se puede mantener la misma economía sintáctica; el referente queda claro por el contexto inmediato de Mateo 28:11, sin necesidad de insertar explícitamente «los principales sacerdotes».
  doctrine_reference: Contexto narrativo de Mateo 28:11-12
translation_notes:
  revision_awareness: 'Se siguió el registro de revisión más reciente: no se reportaron cambios respecto del último pase, y el consenso de control cruzado fue alto. La redacción española conserva el paralelismo verbal, el valor deliberativo de συμβούλιον λαβόντες y la referencia material de ἀργύρια sin convertirla en una paráfrasis explicativa.'
  spanish_consistency_notes:
  - Se mantuvo «ancianos» para πρεσβύτεροι, coherente con el uso eclesial y narrativo en este pasaje.
  - Se conservó «plata» en vez de «dinero» para reflejar el término material del griego.
  - La puntuación separa bien la cláusula participial inicial y el verbo principal, respetando la progresión narrativa del original.
