translation:
  language: es
  text: Y por miedo a él, los guardias se estremecieron y quedaron como muertos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “a causa del miedo a él, los guardias temblaron”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: En español, 'por' con sustantivo de emoción expresa con naturalidad la causa del efecto, conservando el valor causal de ἀπό con genitivo sin sonar mecánico.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ funciona como un conector suave; 'Y' mantiene el flujo narrativo en español sin añadir contraste fuerte.
- source_word: φόβου
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - terror
  lexicon: BDAG
  rationale: '''Miedo'' es una equivalencia directa y natural en español. ''Temor'' también sería posible, pero puede sonar más solemne; ''terror'' intensificaría más de lo que exige el léxico.'
- source_word: αὐτοῦ
  english_pob_choice: of him
  chosen_spanish: a él
  alternatives_spanish:
  - de él
  - de él mismo
  lexicon: BDAG
  rationale: Tras 'miedo', el español expresa mejor el objeto con 'a él' que con una construcción literal de genitivo. Mantiene la referencia personal al mensajero del contexto inmediato.
- source_word: ἐσείσθησαν
  english_pob_choice: shook
  chosen_spanish: se estremecieron
  alternatives_spanish:
  - temblaron
  - fueron sacudidos
  lexicon: BDAG
  rationale: '''Se estremecieron'' comunica la reacción física y el matiz de sacudida/temblor del pasivo de σείω con buen español natural. ''Temblaron'' también sería viable, pero ''se estremecieron'' refleja mejor el impacto súbito.'
- source_word: οἱ τηροῦντες
  english_pob_choice: the guards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los que vigilaban
  - los centinelas
  lexicon: BDAG
  rationale: El participio sustantivado se refiere aquí a los soldados encargados de custodiar la tumba; 'los guardias' es la forma más clara y idiomática en español.
- source_word: ἐγενήθησαν
  english_pob_choice: became
  chosen_spanish: quedaron
  alternatives_spanish:
  - se volvieron
  - llegaron a estar
  lexicon: BDAG
  rationale: En este contexto de estado resultante, 'quedaron' transmite bien el cambio a una condición semejante a la muerte sin forzar un verbo de transformación demasiado enfático.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: '''Como'' expresa claramente la comparación del símil y conserva la distinción entre parecer muertos y estar realmente muertos.'
- source_word: νεκροί
  english_pob_choice: dead men
  chosen_spanish: muertos
  alternatives_spanish:
  - hombres muertos
  - cadáveres
  lexicon: BDAG
  rationale: En español, después de 'quedaron como', 'muertos' suena natural y fiel al símil. 'Hombres muertos' es más explícito pero más pesado; 'cadáveres' introduce una concreción que el texto no exige.
theological_decisions:
- issue: Referente de αὐτοῦ ('of him / a él')
  english_pob_reading: The pronoun refers to the angelic figure described in the preceding verse, whose appearance caused the guards' fear.
  chosen_spanish_reading: El pronombre se refiere al mensajero celestial del versículo anterior, cuya presencia provocó el miedo de los guardias.
  alternative_spanish_readings:
  - Una referencia general al acontecimiento celestial en conjunto
  rationale: La elección sigue el antecedente inmediato más natural del contexto y no añade una lectura doctrinal nueva; solo precisa el referente narrativo.
  doctrine_reference: Contextual reference, no doctrinal dispute
- issue: Sentido de ἐγενήθησαν ... ὡς νεκροί
  english_pob_reading: They became like dead men; the simile indicates appearance/state, not actual death.
  chosen_spanish_reading: '''Quedaron como muertos'' mantiene el valor comparativo del símil y evita convertir la comparación en identidad.'
  alternative_spanish_readings:
  - '''Se volvieron muertos'''
  - '''Fueron como muertos'''
  rationale: El español debe conservar que el texto habla de semejanza, no de muerte real. 'Como muertos' mantiene la tensión literaria y narrativa del pasaje.
  doctrine_reference: Figura de comparación/símil, no afirmación de muerte literal
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota con el marcador [a] dentro del texto español. La redacción principal conserva el valor causal de ἀπό, el símil de ὡς y el estado resultante de γίνομαι, con una alternativa de traducción más cercana al audit trail inglés.
  spanish_consistency_notes:
  - Se usó 'Y' como conector suave para δέ, acorde con el flujo narrativo.
  - '''Los guardias'' mantiene el participio sustantivado οἱ τηροῦντες en un español natural.'
  - '''Quedaron como muertos'' conserva la comparación sin sugerir muerte literal.'
  - La nota [a] está correctamente anclada en el texto y ofrece la alternativa causal/verbativa documentada por el POB inglés.
