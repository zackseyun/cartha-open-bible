translation:
  language: es
  text: Su apariencia era como un relámpago[a], y su vestidura blanca como nieve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forma» o «aspecto» para «apariencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  english_pob_choice: His appearance was
  chosen_spanish: Su apariencia era
  alternatives_spanish:
  - Y su apariencia era
  - Ahora su apariencia era
  lexicon: δέ (conector leve); εἰμί (imperfecto descriptivo)
  rationale: En español, δέ funciona aquí como un enlace suave que no exige un equivalente explícito; se omite para mantener la naturalidad narrativa. El imperfecto 'era' conserva el carácter descriptivo del griego sin sonar puntual o concluyente.
- source_word: εἰδέα
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - forma
  - aspecto
  - semblante
  lexicon: BDAG
  rationale: '''Apariencia'' expresa bien la referencia al aspecto visible u արտաքին del ser descrito. Evita especificar más de lo que el griego dice y coincide con la decisión auditada en inglés.'
- source_word: ὡς ἀστραπή
  english_pob_choice: like lightning
  chosen_spanish: como un relámpago
  alternatives_spanish:
  - como la luz de un relámpago
  - como un rayo
  lexicon: BDAG
  rationale: '''Como un relámpago'' reproduce la comparación directa del griego con un término natural y claro en español. ''Rayo'' puede sonar más ambiguo entre descarga eléctrica y rayo de luz; ''relámpago'' conserva mejor la imagen visual.'
- source_word: ἔνδυμα
  english_pob_choice: clothing
  chosen_spanish: vestidura
  alternatives_spanish:
  - ropa
  - vestido
  - prenda
  lexicon: BDAG
  rationale: El griego es un término general para la prenda o atuendo. 'Vestidura' es digno, natural en contexto bíblico y no obliga a precisar un tipo de prenda que el texto no nombra.
- source_word: λευκόν
  english_pob_choice: white
  chosen_spanish: blanca
  alternatives_spanish:
  - blanco
  - muy blanca
  lexicon: BDAG
  rationale: Se ajusta al sustantivo femenino implícito 'vestidura' y mantiene el sentido simple de blancura sin intensificarlo más allá del original.
- source_word: ὡς χιών
  english_pob_choice: as snow
  chosen_spanish: como la nieve
  alternatives_spanish:
  - como nieve
  - como la nieve recién caída
  lexicon: BDAG
  rationale: '''Como la nieve'' es una imagen transparente y ampliamente comprensible en español. Conserva la comparación del griego con una referencia de blancura pura sin añadir matices ausentes del texto.'
theological_decisions:
- issue: Referente de los pronombres posesivos implícitos/expresos
  english_pob_reading: The pronouns refer to the angel described in the immediate context, not to Jesus.
  chosen_spanish_reading: Los posesivos 'su' se entienden referidos al ángel del contexto inmediato, no a Jesús.
  alternative_spanish_readings:
  - Se podría entender erróneamente como referencia a Jesús por el contexto de la resurrección.
  - El texto podría reformularse con un sujeto explícito para evitar ambigüedad.
  rationale: La antecedencia más cercana es el ángel del Señor que descendió y removió la piedra. La traducción conserva el posesivo del griego sin añadir un sustantivo explicativo que el texto no ofrece, pero la nota doctrinal aclara el referente para evitar confusión.
  doctrine_reference: Contexto narrativo inmediato (Mt 28:2-3)
translation_notes:
  revision_awareness: 'La redacción inglesa revisada eliminó ''Now'' porque δέ es un conector leve; la versión española sigue esa misma decisión y no introduce un equivalente explícito. También se mantuvo la doble comparación del original: una para la apariencia y otra para la blancura de la vestidura.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como sustituto del nombre divino porque este versículo no contiene יהוה ni una cita directa del nombre divino.
  - '''Vestidura'' mantiene un registro digno y coherente con el estilo bíblico del proyecto.'
  - '''Relámpago'' y ''nieve'' preservan las dos imágenes comparativas separadas del griego, sin fusionarlas ni intensificarlas.'
