revisions:
- from: enseñándoles a guardar todo lo que les he mandado. Y he aquí[a], yo estoy con ustedes todos los días, hasta el fin de la era.
  to: enseñándoles a guardar todo lo que les mandé. Y he aquí[a], yo estoy con ustedes todos los días, hasta el fin de la era.
  rationale: Se ajusta el tiempo verbal de ἐνετειλάμην a un pasado simple más fiel («les mandé») y se corrige la nota al pie para que ofrezca una alternativa real en lugar de duplicar el texto principal, manteniendo la precisión de αἰών frente a la traducción tradicional «mundo».
