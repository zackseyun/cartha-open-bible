review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la mayor parte: διδάσκοντες → «enseñándoles», τηρεῖν → «guardar», πάντα ὅσα → «todo lo que», μεθ’ ὑμῶν εἰμι → «estoy con ustedes», y la frase escatológica evita correctamente «mundo». Sin embargo, ἐνετειλάμην es aoristo y aquí se representa mejor en español como «les mandé» que como «les he mandado», ya que el perfecto compuesto introduce una cercanía aspectual no marcada en el griego. Además, la nota al pie actual está mal formulada porque presenta como alternativa exactamente la misma lectura que aparece en el texto principal, en vez de reflejar la alternativa documentada por la POB inglesa.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «He aquí» funciona bien para ἰδού en registro bíblico. «Todos los días» es natural y fiel al sentido de πάσας τὰς ἡμέρας. «El fin de la era» es comprensible, aunque algo menos idiomático en contexto cristiano que «el fin de la edad»; aun así, no requiere cambio. La reparación principal es temporal/aspectual en «les mandé» y la corrección de la nota al pie.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La elección «era» para αἰών es aceptable dentro de la rationale documentada, y la exclusión de «mundo» está bien alineada con la decisión teológica inglesa.
  issues:
  - severity: medium
    issue: «les he mandado» para ἐνετειλάμην
    rationale: El griego usa aoristo («mandé»), no un perfecto con relevancia presente explícita. En este contexto narrativo-discursivo, «les mandé» preserva mejor la forma y evita añadir un matiz aspectual no exigido por el original.
  - severity: medium
    issue: La nota al pie repite la misma lectura del texto principal
    rationale: 'La nota dice «O: “hasta el fin de la era”» cuando esa ya es la redacción principal. Debe presentar una alternativa real, idealmente «hasta el fin de la edad», y mantener la observación sobre la traducción tradicional «mundo».'
  revised_spanish_text: enseñándoles a guardar todo lo que les mandé. Y he aquí[a], yo estoy con ustedes todos los días, hasta el fin de la era.
  revised_footnotes:
  - marker: a
    text: 'O: «hasta el fin de la edad»; tradicionalmente, «hasta el fin del mundo». El griego habla del fin o consumación de la era/edad (αἰών), no específicamente del mundo físico.'
    reason: alternative_reading
  revision_rationale: Se ajusta el tiempo verbal de ἐνετειλάμην a un pasado simple más fiel («les mandé») y se corrige la nota al pie para que ofrezca una alternativa real en lugar de duplicar el texto principal, manteniendo la precisión de αἰών frente a la traducción tradicional «mundo».
