translation:
  language: es
  text: enseñándoles a guardar todo lo que les mandé. Y he aquí[a], yo estoy con ustedes todos los días, hasta el fin de la era.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta el fin de la edad»; tradicionalmente, «hasta el fin del mundo». El griego habla del fin o consumación de la era/edad (αἰών), no específicamente del mundo físico.'
    reason: alternative_reading
lexical_decisions:
- source_word: διδάσκοντες
  english_pob_choice: teaching
  chosen_spanish: enseñándoles
  alternatives_spanish:
  - enseñando
  - instruyéndoles
  lexicon: BDAG
  rationale: El participio presenta una acción continua que describe el modo de hacer discípulos; en español, "enseñándoles" transmite bien esa función progresiva sin sonar forzado. Mantiene la relación directa con el mandato de discipular.
- source_word: τηρεῖν
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - observar
  - cumplir
  - obedecer
  lexicon: BDAG
  rationale: '"Guardar" conserva la idea de mantener, observar con cuidado y obedecer los mandamientos, sin reducir el verbo a mera ejecución externa. En español es natural y puede abarcar la fuerza relacional y práctica de τηρέω.'
- source_word: πάντα ὅσα
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todas las cosas que
  - todo cuanto
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con naturalidad como "todo lo que", preservando la amplitud completa del alcance sin cargar la frase con un calco.
- source_word: ἐνετειλάμην
  english_pob_choice: I commanded
  chosen_spanish: les he mandado
  alternatives_spanish:
  - les he mandado con autoridad
  - les he ordenado
  - les he encargado
  lexicon: BDAG
  rationale: 'El aoristo se expresa de forma natural en español con perfecto compuesto en este contexto discursivo: Jesús habla desde su autoridad sobre sus mandatos dados a los discípulos. "Mandado" conserva la fuerza de orden sin sonar excesivamente técnico.'
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: '"He aquí" reproduce el marcador enfático y solemne de ἰδού con un registro bíblico inteligible en español, similar en función al "behold" de la POB inglesa.'
- source_word: μεθ’ ὑμῶν εἰμι
  english_pob_choice: I am with you
  chosen_spanish: yo estoy con ustedes
  alternatives_spanish:
  - yo estoy entre ustedes
  - yo estoy junto a ustedes
  lexicon: BDAG
  rationale: '"Estoy con ustedes" es la forma más clara y directa para la presencia prometida de Jesús con los discípulos. Se conserva el presente de la promesa y su cercanía personal.'
- source_word: πάσας τὰς ἡμέρας
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - cada día
  - todos los días, continuamente
  lexicon: BDAG
  rationale: Aunque el griego es literalmente "todas las días", en español la fórmula natural y fiel es "todos los días", que preserva la fuerza durativa y reiterada de la expresión.
- source_word: συντελείας τοῦ αἰῶνος
  english_pob_choice: the end of the age
  chosen_spanish: el fin de la era
  alternatives_spanish:
  - el fin del siglo
  - la consumación de la era
  - el fin de la edad
  lexicon: BDAG
  rationale: '"αἰών" designa una era o edad, no el mundo físico. "Era" comunica esa referencia temporal/escatológica en español moderno; "fin" preserva la lectura revisada de la POB inglesa como forma más natural que "consumación" sin perder el sentido de cierre del periodo.'
theological_decisions:
- issue: Alcance temporal de ἕως τῆς συντελείας τοῦ αἰῶνος
  english_pob_reading: until the end of the age
  chosen_spanish_reading: hasta el fin de la era
  alternative_spanish_readings:
  - hasta el fin del mundo
  - hasta la consumación de la era
  - hasta el fin del siglo
  rationale: Se evita "mundo" porque el griego no habla de la destrucción del cosmos, sino del cierre de una era. "Era" mantiene la tensión escatológica y respeta la precisión del sustantivo αἰών; "fin" traduce de modo claro συντέλεια como culminación/cierre.
  doctrine_reference: Translation philosophy §1, §3
- issue: Presencia continua de Jesús con los discípulos
  english_pob_reading: I am with you all the days
  chosen_spanish_reading: yo estoy con ustedes todos los días
  alternative_spanish_readings:
  - yo estaré con ustedes todos los días
  - estoy con ustedes cada día
  rationale: El presente "estoy" conserva la vivacidad de la promesa en el griego y evita desplazarla innecesariamente al futuro. "Todos los días" mantiene el valor durativo y enfático de πάσας τὰς ἡμέρας.
  doctrine_reference: Christology; ecclesiology; Translation philosophy §2
translation_notes:
  revision_awareness: La POB inglesa revisó la frase temporal desde "completion of the age" a "end of the age" para ganar naturalidad manteniendo el sentido. En español se siguió esa misma línea con "el fin de la era", evitando la interpretación tradicional "mundo" y manteniendo la distinción entre αἰών (era) y el orden físico del cosmos. También se preservó la fuerza continua del participio inicial mediante un gerundio natural en español.
  spanish_consistency_notes:
  - Se mantuvo "he aquí" como equivalente solemne de ἰδού, en coherencia con el registro bíblico de la POB.
  - '"Guardar" se eligió por su capacidad de abarcar observancia y obediencia, evitando reducir τηρέω a mera conformidad externa.'
  - Se usó "era" para αἰών de manera consistente con la decisión teológica de no traducirlo como "mundo".
  - '"Yo estoy con ustedes" conserva la cercanía personal y la forma directa de la promesa, en línea con el inglés auditado.'
  - El marcador de nota [a] aparece en el lugar exacto de la frase temporal para sostener la alternativa tradicional documentada.
