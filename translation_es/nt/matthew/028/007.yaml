  spanish_quality_summary: El español es generalmente natural y digno, pero «Ha sido levantado de entre los muertos» suena menos idiomático y más ambiguo en español eclesial que «Ha sido resucitado de entre los muertos», que preserva igualmente la pasiva y comunica con mayor claridad el sentido de resurrección. También conviene mover las notas a los lugares correctos. «Miren» es aceptable, pero «se lo he dicho» queda un poco más indirecto que el griego; aun así es entendible y natural.
  glossary_alignment: No hay conflicto con los términos de proyecto principales. La decisión teológica de mantener la voz pasiva en la resurrección está bien encaminada, pero en español «resucitado» alinea mejor con el campo semántico de ἐγείρω en contexto de resurrección que «levantado».
