translation:
  language: es
  text: 'Y vayan pronto y digan a sus discípulos: “Ha sido resucitado[a] de entre los muertos, y miren, va delante de ustedes a Galilea[b]. Allí lo verán”. Miren, se lo he dicho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ha resucitado». El verbo griego está en voz pasiva («ha sido resucitado»), pero en español a menudo se expresa de forma intransitiva.'
    reason: alternative_reading
  - marker: b
    text: 'O: «a Galilea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταχὺ
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  lexicon: BDAG
  rationale: El adverbio expresa urgencia; «pronto» comunica la prontitud con un español natural y digno, sin perder la fuerza de la orden.
- source_word: πορευθεῖσαι
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - vayan de camino
  - salgan
  lexicon: BDAG
  rationale: 'Aunque formalmente es un participio aoristo, en español funciona mejor como imperativo coordinado con la orden siguiente: «vayan ... y digan», siguiendo la lectura funcional del POB en inglés.'
- source_word: εἴπατε
  english_pob_choice: tell
  chosen_spanish: digan
  alternatives_spanish:
  - háblenles
  - comuniquen
  lexicon: BDAG
  rationale: El encargo es transmitir un mensaje a los discípulos; «digan» conserva el imperativo sin añadir un matiz demasiado coloquial que «contar» o demasiado explicativo que «comunicar».
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La relación posesiva se expresa naturalmente con «sus discípulos». Mantiene la referencia a Jesús sin forzar una construcción pesada en español.
- source_word: Ἠγέρθη
  english_pob_choice: He has been raised
  chosen_spanish: Ha sido levantado
  alternatives_spanish:
  - Ha sido resucitado
  - Ha resucitado
  lexicon: BDAG
  rationale: Se preserva la pasiva griega. «Ha sido levantado» refleja con claridad la voz pasiva de ἐγείρω, aunque en español suene menos idiomático que «ha resucitado»; esa tensión es deliberada para no borrar la forma del original.
- source_word: ἀπὸ τῶν νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: «De entre los muertos» conserva mejor la imagen plural del griego y sugiere salida desde el ámbito de los muertos, sin desdibujar el sentido de resurrección.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: BDAG
  rationale: La partícula deíctica se traduce con una apelación directa y viva. «Miren» funciona bien en español moderno y conserva la función de llamar la atención; la nota mantiene la alternativa reverencial «he aquí» como posibilidad estilística.
- source_word: προάγει
  english_pob_choice: he is going ahead of you
  chosen_spanish: va delante de ustedes
  alternatives_spanish:
  - va delante de ustedes como guía
  - los precede
  lexicon: BDAG
  rationale: La idea central es de prioridad espacial y temporal, no necesariamente de liderazgo formal. «Va delante de ustedes» reproduce ese avance previo de manera clara y natural.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - hasta Galilea
  lexicon: BDAG
  rationale: En español, con un verbo de movimiento, «a Galilea» comunica adecuadamente la meta del desplazamiento. Se evita forzar «en» o «dentro de»; la orientación direccional queda intacta.
- source_word: ἐκεῖ αὐτὸν ὄψεσθε
  english_pob_choice: There you will see him
  chosen_spanish: Allí lo verán
  alternatives_spanish:
  - Allí ustedes lo verán
  - Allí lo verán ustedes
  lexicon: BDAG
  rationale: «Allí» conserva el valor locativo de ἐκεῖ, y «lo verán» expresa con naturalidad el futuro de ὄψεσθε. El orden español mantiene el énfasis en el lugar.
- source_word: εἶπον ὑμῖν
  english_pob_choice: I have told you
  chosen_spanish: se lo he dicho
  alternatives_spanish:
  - se lo dije
  - ya se lo he dicho
  lexicon: BDAG
  rationale: El aoristo final cierra la declaración con una fórmula idiomática de cumplimiento inmediato. «Se lo he dicho» reproduce el valor de anuncio concluido y su pertinencia presente; se usa objeto indirecto explícito porque el referente del «a ustedes» está ya presente en el contexto.
theological_decisions:
- issue: Voz pasiva de la resurrección en Ἠγέρθη
  english_pob_reading: 'Render with explicit passive: ''He has been raised'''
  chosen_spanish_reading: «Ha sido levantado de entre los muertos»
  alternative_spanish_readings:
  - Ha resucitado de entre los muertos
  - Ha sido resucitado de entre los muertos
  rationale: Se mantiene la pasiva del griego para no convertir la frase en una formulación intransitiva que suavice la sintaxis original. «Ha sido levantado» conserva la acción recibida; «de entre los muertos» explicita el ámbito del que sale.
  doctrine_reference: Translation philosophy §1, §3
- issue: Uso de ἰδοὺ como partícula de atención
  english_pob_reading: behold
  chosen_spanish_reading: «miren»
  alternative_spanish_readings:
  - he aquí
  - vean
  rationale: La función de ἰδοὺ es deíctica y discursiva, no meramente ornamental. «Miren» comunica con fuerza la llamada a fijarse en lo que sigue sin introducir un registro arcaizante innecesario; la nota conserva una alternativa más solemne.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El POB en inglés revisó una primera redacción con «look» para ἰδοὺ y la elevó a «behold» por registro más formal. En esta versión española se opta por «miren» como equivalente deíctico natural y solemne; la nota conserva la posibilidad arcaizante «he aquí». También se preserva la pasiva explícita de Ἠγέρθη, siguiendo la decisión auditada de no convertirla en una forma intransitiva que oculte la voz del original.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταῖς, en continuidad con el uso eclesial normal y con la relación personal expresada por el posesivo.
  - «Yahvé» no aparece en este versículo, por lo que no hay decisión sobre el nombre divino.
  - Se conserva el futuro directo «lo verán» sin añadir énfasis innecesario; el sujeto explícito «ustedes» se omite en la cláusula principal por naturalidad del español.
  - 'La secuencia imperativa reproduce el flujo del griego: movimiento urgente, encargo verbal, anuncio de resurrección, y promesa de encuentro en Galilea.'
