translation:
  language: es
  text: Y si esto llega a oídos del gobernador[a], lo persuadiremos y los haremos quedar sin preocupación.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si esto llega a la atención del gobernador».'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «y los haremos sin preocupación»; la frase griega también puede entenderse como «sin cuidado» o «sin ansiedad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκουσθῇ
  english_pob_choice: is heard
  chosen_spanish: llega a oídos
  alternatives_spanish:
  - es oído
  - se oye
  - llega a conocimiento
  lexicon: BDAG
  rationale: El pasivo de ἀκούω aquí expresa que el asunto llega a ser conocido. En español, 'llega a oídos' conserva esa idea de difusión de la noticia sin sonar rígido; 'se oye' o 'llega a conocimiento' son opciones más literales o más abstractas.
- source_word: ἐπὶ τοῦ ἡγεμόνος
  english_pob_choice: by the governor
  chosen_spanish: a oídos del gobernador
  alternatives_spanish:
  - ante el gobernador
  - en presencia del gobernador
  - al gobernador
  lexicon: BDAG
  rationale: La construcción con ἐπί + genitivo, en este contexto de rumor o denuncia, apunta a que el asunto llegue al ámbito de atención del gobernador. 'A oídos del gobernador' preserva ese valor idiomático en español y evita un 'por el gobernador' que sonarían agentivo.
- source_word: ἡγεμόνος
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - gobernante
  - magistrado
  lexicon: BDAG
  rationale: En el contexto romano de Mateo 28, ἡγεμών designa al gobernador provincial, es decir, Pilato. 'Gobernador' es el equivalente preciso y transparente en español.
- source_word: πείσομεν αὐτόν
  english_pob_choice: we will persuade him
  chosen_spanish: nosotros lo persuadiremos
  alternatives_spanish:
  - lo convenceremos
  - lo ganaremos para nuestra causa
  lexicon: BDAG
  rationale: El futuro de πείθω suele significar 'persuadir' o 'convencer'. 'Persuadiremos' mantiene la correspondencia léxica directa; 'convenceremos' es posible, pero 'persuadir' conserva mejor el tono formal del pasaje.
- source_word: ἀμερίμνους
  english_pob_choice: keep you free from चिंता
  chosen_spanish: libres de preocupación
  alternatives_spanish:
  - sin preocupación
  - sin ansiedad
  - tranquilos
  lexicon: BDAG
  rationale: ἀμέριμνος significa 'libre de cuidado/preocupación'. El contexto sugiere quedar exentos de consecuencias o inquietud; en español, 'libres de preocupación' reproduce bien el sentido sin convertirlo prematuramente en una expresión demasiado interpretativa.
- source_word: ποιήσομεν
  english_pob_choice: make you free from worry
  chosen_spanish: los dejaremos
  alternatives_spanish:
  - los haremos
  - los pondremos
  - nos ocuparemos de que queden
  lexicon: BDAG
  rationale: Con un predicado adjetival, ποιέω puede expresarse como 'hacer [a alguien] [algo]'. En español, 'los dejaremos libres de preocupación' comunica el resultado de manera natural y mantiene la fuerza causativa del verbo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el expediente inglés: conserva el pasivo idiomático de ἀκουσθῇ, la referencia específica al gobernador y la fuerza causativa de ποιήσομεν, pero ajusta el último sintagma para que suene natural en español. También se mantiene la tensión léxica de ἀμέριμνους con una nota literal que deja abierta la lectura ''sin cuidado / sin ansiedad''.'
  spanish_consistency_notes:
  - Se usa 'gobernador' para ἡγεμών, coherente con el contexto romano del relato.
  - Se evita 'SEÑOR' o títulos eclesiásticos ajenos al texto; no hay términos cristológicos en este versículo.
  - '''Persuadir'' se mantiene como verbo principal para πείθω, conforme al valor léxico documentado.'
  - La nota literal de ἀμέριμνους conserva la ambigüedad entre preocupación, cuidado y ansiedad, sin forzar una sola interpretación.
