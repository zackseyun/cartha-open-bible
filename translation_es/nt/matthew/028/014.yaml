- from: Y si esto llega a oídos del gobernador, nosotros lo persuadiremos y los dejaremos libres de preocupación.[b][a]
  to: Y si esto llega a oídos del gobernador[a], lo persuadiremos y los haremos quedar sin preocupación.[b]
