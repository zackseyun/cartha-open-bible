translation:
  language: es
  text: 'diciendo[a]: «Digan: “Sus discípulos vinieron de noche y lo robaron mientras dormíamos”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la noche». El genitivo νυκτός indica el tiempo de la venida.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo esto
  - y decían
  lexicon: BDAG
  rationale: El participio presente introduce la instrucción reportada; en español, «diciendo» conserva la función narrativa sin añadir contenido ajeno.
- source_word: Εἴπατε
  english_pob_choice: Say
  chosen_spanish: Decid
  alternatives_spanish:
  - Hablad
  - Digan
  lexicon: BDAG
  rationale: El aoristo imperativo plural se expresa naturalmente como mandato directo en español. «Decid» preserva la fuerza imperativa sin suavizarla.
- source_word: ὅτι
  english_pob_choice: that / content marker rendered by quotation structure
  chosen_spanish: marcado por comillas
  alternatives_spanish:
  - que
  - porque
  lexicon: BDAG
  rationale: Como en el inglés auditado, el marcador de contenido se representa mejor con la estructura de cita directa, evitando una repetición artificial de «que».
- source_word: Οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: His disciples
  chosen_spanish: Sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La construcción posesiva se vierte de forma natural con «Sus discípulos». Se mantiene el referente personal sin expandirlo interpretivamente.
- source_word: νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: BDAG
  rationale: El genitivo adverbial de tiempo se expresa de manera idiomática en español con «de noche», que conserva el valor temporal breve y natural.
- source_word: ἐλθόντες
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron habiendo venido
  - llegaron
  lexicon: BDAG
  rationale: El participio aoristo antecedente al verbo principal se vierte con un verbo finito natural en secuencia narrativa. «Vinieron» mantiene la idea de llegada sin forzar una perífrasis pesada.
- source_word: ἔκλεψαν
  english_pob_choice: stole
  chosen_spanish: lo robaron
  alternatives_spanish:
  - lo sustrajeron
  - lo hurtaron
  lexicon: BDAG
  rationale: «Robaron» es el equivalente claro y moderno de κλέπτω. Se antepone el clítico «lo» para reflejar directamente el objeto personal del griego.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - su cuerpo
  lexicon: BDAG
  rationale: El griego dice «a él / him», no «su cuerpo». En español, el clítico acusativo mantiene la referencia personal sin añadir una glosa interpretativa.
- source_word: ἡμῶν κοιμωμένων
  english_pob_choice: while we were sleeping
  chosen_spanish: mientras nosotros dormíamos
  alternatives_spanish:
  - cuando dormíamos
  - mientras dormíamos
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte con una subordinada temporal clara. Se conserva el sujeto explícito «nosotros» para reflejar la primera persona plural del griego.
theological_decisions:
- issue: Referente de αὐτόν en el relato falso
  english_pob_reading: Retain the personal pronoun 'him' rather than interpretively expanding to 'his body.'
  chosen_spanish_reading: Conservar el pronombre personal «lo»/«a él» sin expandirlo a «su cuerpo».
  alternative_spanish_readings:
  - «su cuerpo»
  - «el cuerpo de Jesús»
  rationale: El texto griego usa αὐτόν, un pronombre personal. Traducirlo como «su cuerpo» introduciría una aclaración no presente en el original y atenuaría la precisión del relato citado.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene una traducción verbal y directa del engaño reportado, con la nota explícita de que αὐτόν significa «him» y no «his body». Esta versión española sigue esa línea: conserva el pronombre personal, evita expandir el objeto, y refleja νυκτός como circunstancia temporal adverbial mediante «de noche». No se registran revisiones posteriores que modifiquen la decisión base.'
  spanish_consistency_notes:
  - Se mantiene un registro contemporáneo y digno, sin arcaísmos innecesarios.
  - Se conserva el pronombre personal para no perder la tensión léxica documentada en el original.
  - La cita directa ayuda a representar ὅτι sin forzar una subordinación repetida en español.
