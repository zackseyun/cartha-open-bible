review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del griego: οὖν = «Por tanto», πορευθέντες con fuerza imperatival = «vayan», μαθητεύσατε = «hagan discípulos», y la fórmula triádica está correctamente preservada con mayúsculas teológicas apropiadas. Sin embargo, no sigue del todo la decisión auditada del POB para εἰς τὸ ὄνομα, que en inglés se mantuvo como «into the name» con nota alternativa para «in the name». El español principal «en el nombre» desplaza esa decisión documentada al texto principal y reduce un matiz importante de incorporación/identificación presente en εἰς.'
  spanish_quality_summary: 'El español es claro, natural y eclesialmente legible. «Vayan y hagan discípulos» funciona bien en registro bíblico contemporáneo. La única dificultad de calidad está en la nota: mezcla español con inglés («into») y la glosa «hacia/into el nombre» no suena idiomática ni precisa. Conviene reparar la nota y anclar mejor el matiz semántico sin sacrificar legibilidad.'
  glossary_alignment: 'Alineado con la terminología del proyecto en «Espíritu Santo», títulos divinos capitalizados y lenguaje eclesial estándar. No hay conflicto con Yahvé/Mesías/etc. La principal desalineación es filosófica/lexical: εἰς debería conservarse de forma más visible según la auditoría inglesa, idealmente como «en/into» mediante una solución española fiel y legible. «En el nombre» puede quedar como alternativa en nota, no como lectura principal.'
  issues:
  - severity: medium
    issue: La traducción principal de εἰς τὸ ὄνομα como «en el nombre» no preserva la decisión auditada «into the name».
    rationale: El expediente inglés documenta intencionalmente el valor de εἰς como movimiento hacia incorporación o identificación. Poner «en el nombre» en el texto principal y relegar «into» a nota invierte esa prioridad.
  - severity: medium
    issue: 'La nota al pie contiene mezcla de idiomas y una formulación poco natural: «hacia/into el nombre».'
    rationale: La nota debe estar íntegramente en español y explicar con claridad que el griego dice literalmente «hacia dentro del nombre» o, más naturalmente, que usa una preposición que puede expresar entrada en relación/identificación.
  - severity: low
    issue: La solución española puede sonar algo extraña si se calca «dentro del nombre».
    rationale: Hace falta una formulación de compromiso que sea fiel al matiz de εἰς pero todavía legible en español eclesial. Una nota puede sostener la alternativa tradicional «en el nombre».
  revised_spanish_text: Por tanto[a], vayan y hagan discípulos de todas las naciones, bautizándolos hacia el nombre del Padre y del Hijo y del Espíritu Santo,
