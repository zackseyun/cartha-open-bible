translation:
  language: es
  text: Por tanto[a], vayan y hagan discípulos de todas las naciones, bautizándolos hacia el nombre del Padre y del Hijo y del Espíritu Santo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el nombre». El griego usa una preposición que literalmente apunta «hacia» o «dentro de» el nombre, lo cual puede destacar la entrada en relación o identificación.
    reason: alternative_reading
lexical_decisions:
- source_word: πορευθέντες
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - vayan yendo
  - habiendo ido
  - mientras van
  lexicon: BDAG
  rationale: El participio aoristo antecede al imperativo principal μαθητεύσατε y funciona como mandato de comisión. En español, "vayan" comunica mejor esa fuerza directiva que una traducción más literal como "habiendo ido", que sonaría pesada y debilitaría el impulso misional.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca una inferencia desde la autoridad de Jesús en el versículo anterior. "Por tanto" expresa con claridad la conexión lógica sin sonar coloquial.
- source_word: μαθητεύσατε
  english_pob_choice: make disciples
  chosen_spanish: hagan discípulos
  alternatives_spanish:
  - discipulen
  - hagan seguidores
  lexicon: BDAG
  rationale: 'El verbo es causativo: hacer que otros sean discípulos. "Hagan discípulos" conserva la fuerza de acción y evita el verbo poco natural "discipulen" en español.'
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: de todas las naciones
  alternatives_spanish:
  - de todos los pueblos
  - de todas las etnias
  lexicon: BDAG
  rationale: '"ἔθνη" designa aquí el alcance universal de la misión. "Naciones" preserva el sentido amplio y evita reducirlo a "gentiles", que sería demasiado estrecho.'
- source_word: βαπτίζοντες
  english_pob_choice: baptizing
  chosen_spanish: bautizándolos
  alternatives_spanish:
  - inmersándolos
  - sumergiéndolos
  lexicon: BDAG
  rationale: '"Bautizando" o "bautizándolos" conserva el rito cristiano reconocido y no fuerza una decisión sobre el modo. Se mantiene el participio como acción concomitante al hacer discípulos.'
- source_word: εἰς τὸ ὄνομα
  english_pob_choice: into the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - dentro del nombre
  - hacia el nombre
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente "hacia/into el nombre", en español la fórmula litúrgica natural y fiel es "en el nombre". Conserva la idea de identificación e incorporación sin sonar artificial.
- source_word: τοῦ πατρὸς
  english_pob_choice: the Father
  chosen_spanish: del Padre
  alternatives_spanish:
  - del padre
  lexicon: BDAG
  rationale: En la fórmula triádica, "Padre" funciona como título divino, no como sustantivo común. La mayúscula sería apropiada por estilo bíblico en español para señalar esa referencia personal/divina.
- source_word: τοῦ υἱοῦ
  english_pob_choice: the Son
  chosen_spanish: del Hijo
  alternatives_spanish:
  - del hijo
  lexicon: BDAG
  rationale: Coordinado con "el Padre" y "el Espíritu Santo", es un título cristológico definido, no un uso genérico de "hijo".
- source_word: τοῦ ἁγίου πνεύματος
  english_pob_choice: the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del espíritu santo
  lexicon: BDAG
  rationale: La expresión designa la tercera persona divina en la fórmula bautismal. "Espíritu Santo" es la forma más clara y estándar en español, manteniendo la referencia personal y teológica.
theological_decisions:
- issue: Valor de εἰς τὸ ὄνομα en la fórmula bautismal
  english_pob_reading: into the name
  chosen_spanish_reading: en el nombre
  alternative_spanish_readings:
  - dentro del nombre
  - hacia el nombre
  rationale: La preposición griega puede sugerir ingreso o identificación, y la nota inglesa preserva esa tensión. En español, "en el nombre" es la forma idiomática que mejor comunica la relación litúrgica sin perder la idea de pertenencia o incorporación que sugiere el griego.
  doctrine_reference: Translation philosophy §§1, 3, 6; Credo Niceno-Constantinopolitano (381)
- issue: Lectura trinitaria de la fórmula "del Padre... del Hijo... del Espíritu Santo"
  english_pob_reading: the Father and of the Son and of the Holy Spirit
  chosen_spanish_reading: del Padre y del Hijo y del Espíritu Santo
  alternative_spanish_readings:
  - del padre y del hijo y del espíritu santo
  rationale: La sintaxis presenta un solo "nombre" y tres genitivos coordinados, lo que sostiene una fórmula bautismal trinitaria. La capitalización de los títulos en español refleja su valor personal/divino, no una expansión interpretativa del texto.
  doctrine_reference: Credo Niceno-Constantinopolitano (381)
translation_notes:
  revision_awareness: El borrador sigue de cerca el análisis auditado del inglés POB y del griego SBLGNT. No se introdujeron cambios de revisión en el expediente base; la única adaptación principal es idiomática en español para "en el nombre", conservando la tensión semántica indicada por la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene "naciones" para ἔθνη por su alcance universal.
  - Se usa "bautizándolos" para conservar el participio concomitante sin sobrerregularizarlo.
  - Se preserva la fórmula trinitaria con títulos capitalizados por valor teológico.
  - La nota a acompaña únicamente la alternativa de preposición, ya que esa es la única ambigüedad destacada por el audit trail en la frase final.
