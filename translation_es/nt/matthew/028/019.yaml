revisions:
- from: Por tanto[a], vayan y hagan discípulos de todas las naciones, bautizándolos en el nombre del Padre y del Hijo y del Espíritu Santo,
  to: Por tanto[a], vayan y hagan discípulos de todas las naciones, bautizándolos hacia el nombre del Padre y del Hijo y del Espíritu Santo,
  rationale: Se requiere una reparación pequeña pero real para alinear el español con la decisión lexical y teológica auditada sobre εἰς τὸ ὄνομα. «Hacia el nombre» no es la fórmula más tradicional, pero preserva mejor el valor direccional del griego que el POB inglés quiso mantener; la alternativa idiomática tradicional «en el nombre» queda en nota. También se corrige la nota para que esté plenamente en español y explique el matiz sin mezclar idiomas.
