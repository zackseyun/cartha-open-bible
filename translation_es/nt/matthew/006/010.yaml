translation:
  language: es
  text: Venga tu reino; hágase tu voluntad[a], como en el cielo, así también en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Venga tu reino; hágase tu voluntad, como en el cielo, así también en la tierra», entendiendo que «como en el cielo, así también en la tierra» se aplica a ambas peticiones.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλθέτω
  english_pob_choice: May ... come
  chosen_spanish: Venga
  alternatives_spanish:
  - Que venga
  - Venga a
  lexicon: BDAG
  rationale: El aoristo imperativo de tercera singular expresa una petición dirigida a Dios. En español, «venga» conserva bien el valor volitivo/petitivo sin volver la frase pesada.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - señorío
  lexicon: BDAG
  rationale: «Reino» es el equivalente natural y estable en Mateo para βασιλεία, y permite mantener tanto la idea de dominio real como la de esfera del reino sin forzar el español.
- source_word: γενηθήτω
  english_pob_choice: May ... be done
  chosen_spanish: sea hecha
  alternatives_spanish:
  - sea cumplida
  - acontezca
  lexicon: BDAG
  rationale: Con θέλημα, el sentido idiomático es que la voluntad de Dios se realice. «Sea hecha» conserva el pasivo de mandato/petición con una formulación idiomática y transparente en español.
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - querer
  - deseo
  - propósito
  lexicon: BDAG
  rationale: «Voluntad» es la forma más directa y teológicamente cargada en español para θέλημα, y mantiene el énfasis en lo que Dios quiere e intenciona.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: «Como» introduce la comparación de manera breve y natural, sin añadir matices que el griego no exige.
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo(s)
  lexicon: BDAG
  rationale: En esta oración, «cielo» comunica bien la esfera celestial de Dios en un español amplio y reverente. Se evita «SEÑOR» u otra sustitución porque aquí no aparece el nombre divino sino la referencia espacial a οὐρανός.
- source_word: ἐπὶ γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: BDAG
  rationale: Aunque ἐπί con genitivo suele dar «sobre/en», en este paralelismo «en la tierra» suena más natural en español y conserva el contraste cielo/tierra. Se mantiene la relación semántica sin rigidizar la preposición.
- source_word: καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - y también
  - también
  lexicon: BDAG
  rationale: En la construcción comparativa, καί completa la correlación. «Así también» reproduce con claridad la relación de correspondencia que el inglés POB explicitó como «so also».
theological_decisions:
- issue: Alcance de la frase comparativa ὡς ἐν οὐρανῷ καὶ ἐπὶ γῆς
  english_pob_reading: La frase se entiende principalmente con la segunda petición («may your will be done, as in heaven, so also on earth»), aunque se reconoce que algunos intérpretes la aplican a ambas peticiones.
  chosen_spanish_reading: 'La frase queda unida de forma inmediata a la segunda petición: «sea hecha tu voluntad, como en el cielo, así también en la tierra».'
  alternative_spanish_readings:
  - 'Unirla a ambas peticiones: «Venga tu reino y sea hecha tu voluntad, como en el cielo, así también en la tierra»'
  - Puntuar de modo que la comparación quede en suspenso y pueda leerse con ambas peticiones
  rationale: La sintaxis permite debate sobre el alcance de la comparación, y la puntuación moderna es editorial. La solución principal mantiene la lectura más cercana a la cláusula inmediata, mientras la nota conserva la alternativa interpretativa sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando la sintaxis lo permite.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y la solución auditada del POB en inglés: petición volitiva en ambas cláusulas, terminología estable para βασιλεία y θέλημα, y una nota que conserva la discusión sobre el alcance de la comparación. No se observaron cambios necesarios respecto del tramo auditado en inglés, pero se ajustó el español para lograr naturalidad sin perder la tensión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «reino» para βασιλεία, en coherencia con el uso bíblico habitual y con el audit trail en inglés.
  - Se usa «voluntad» para θέλημα, evitando una paráfrasis como «deseo» o «propósito» que debilitaría el peso teológico.
  - «Cielo» / «tierra» preserva el contraste espacial y teológico del texto.
  - La puntuación con punto y coma refleja dos peticiones coordinadas y deja clara la relación comparativa posterior.
