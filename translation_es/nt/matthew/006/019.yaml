source:
  edition: SBLGNT
  text: Μὴ θησαυρίζετε ὑμῖν θησαυροὺς ἐπὶ τῆς γῆς, ὅπου σὴς καὶ βρῶσις ἀφανίζει, καὶ ὅπου κλέπται διορύσσουσιν καὶ κλέπτουσιν·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/019.yaml
  text: Do not store up for yourselves treasures on earth[a], where moth and decay destroy[b], and where thieves break in and steal.
  footnotes:
  - marker: a
    text: Or 'rust'; the Greek word can refer more broadly to consuming deterioration or decay, not only metal corrosion.
    reason: lexical_alternative
  - marker: b
    text: Literally 'dig through,' likely referring to thieves breaking through mud-brick walls.
    reason: cultural_note
