review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: prohibición de acumular tesoros para beneficio propio en la tierra, vulnerables a destrucción y robo. Sin embargo, dos elecciones léxicas clave no reflejan bien la racionalidad documentada de la POB: «decadencia» no comunica naturalmente el sentido de βρῶσις como deterioro/consunción material, y la nota [b] quedó anclada al verbo «destruyen» cuando en realidad explica βρῶσις. Además, se omitió la nota cultural correspondiente a διορύσσουσιν (''cavar/abrir un boquete'').'
  spanish_quality_summary: El español es mayormente claro, pero «la decadencia» suena abstracto y poco idiomático en este contexto de daño material a bienes; «el deterioro» es más natural y preciso. «Perforan y roban» es comprensible, pero en español bíblico legible «se meten a robar» sería más idiomático; no obstante, para preservar la imagen literal del griego puede mantenerse «abren un boquete y roban» o una formulación similar. La revisión propuesta mejora claridad, naturalidad y alineación con las notas.
  glossary_alignment: 'No hay conflictos con la terminología teológica global del proyecto. Las decisiones relevantes aquí son léxicas: βρῶσις debe evitar limitarse a «óxido» pero tampoco volverse demasiado abstracto; διορύσσω conviene reflejarlo con imagen física y nota cultural. «No acumulen», «tesoros», «en la tierra» y «ladrones» están bien alineados.'
  issues:
  - severity: high
    issue: «la decadencia» para βρῶσις
    rationale: Aunque intenta reflejar el sentido amplio de 'decay', en español «decadencia» suele denotar declive moral, social o abstracto, no deterioro físico de bienes. Esto debilita la fidelidad semántica y la legibilidad.
  - severity: high
    issue: La nota [b] está anclada al verbo equivocado
    rationale: La nota [b] explica βρῶσις ('óxido' / deterioro), pero el marcador aparece después de «destruyen», lo que induce a pensar que la nota comenta ἀφανίζει. Debe anclarse a «deterioro» o término equivalente.
  - severity: medium
    issue: Falta la nota cultural sobre διορύσσουσιν
    rationale: El rastro auditado en inglés preserva la literalidad 'dig through' mediante nota. El borrador español menciona esa imagen en decisiones léxicas, pero no la conserva en las notas del versículo.
  - severity: medium
    issue: «perforan» es menos idiomático en esta construcción
    rationale: Aunque semánticamente cercano, «los ladrones perforan y roban» suena mecánico en español. Una formulación como «abren un boquete y roban» conserva mejor la imagen física del griego y la naturalidad del español.
  revised_spanish_text: No acumulen para ustedes tesoros en la tierra[a], donde la polilla y el deterioro[b] destruyen, y donde los ladrones abren un boquete[c] y roban.
  revised_footnotes:
  - marker: a
    text: O «sobre la tierra». El griego ἐπὶ τῆς γῆς puede traducirse de forma más literal como «sobre la tierra», pero aquí la expresión se entiende naturalmente como el ámbito terrenal en contraste con el cielo del contexto inmediato.
    reason: alternative_reading
  - marker: b
    text: O «óxido». El término griego βρῶσις es más amplio que la corrosión del metal y puede abarcar deterioro o consunción; por eso se traduce «deterioro».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «cavan a través» o «abren paso cavando», probablemente en alusión a ladrones que atravesaban paredes de barro o adobe.
    reason: cultural_note
  revision_rationale: Se reemplaza «decadencia» por «deterioro» para reflejar mejor βρῶσις en español natural y material; se mueve la nota léxica al término correcto; y se añade la nota cultural que preserva la literalidad de διορύσσουσιν, usando en el texto una formulación más idiomática («abren un boquete») que mantiene la imagen física del original.
