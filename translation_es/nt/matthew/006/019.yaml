revisions:
- from: No acumulen para ustedes tesoros en la tierra[a], donde la polilla y la decadencia destruyen[b], y donde los ladrones perforan y roban.
  to: No acumulen para ustedes tesoros en la tierra[a], donde la polilla y el deterioro[b] destruyen, y donde los ladrones abren un boquete[c] y roban.
  rationale: Se reemplaza «decadencia» por «deterioro» para reflejar mejor βρῶσις en español natural y material; se mueve la nota léxica al término correcto; y se añade la nota cultural que preserva la literalidad de διορύσσουσιν, usando en el texto una formulación más idiomática («abren un boquete») que mantiene la imagen física del original.
