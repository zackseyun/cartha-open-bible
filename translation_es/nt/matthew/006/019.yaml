translation:
  language: es
  text: No acumulen para ustedes tesoros en la tierra[a], donde la polilla y el deterioro[b] destruyen, y donde los ladrones abren un boquete[c] y roban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la tierra». El griego ἐπὶ τῆς γῆς puede traducirse de forma más literal como «sobre la tierra», pero aquí la expresión se entiende naturalmente como el ámbito terrenal en contraste con el cielo del contexto inmediato.
    reason: alternative_reading
  - marker: b
    text: O «óxido». El término griego βρῶσις es más amplio que la corrosión del metal y puede abarcar deterioro o consunción; por eso se traduce «deterioro».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «cavan a través» o «abren paso cavando», probablemente en alusión a ladrones que atravesaban paredes de barro o adobe.
    reason: cultural_note
lexical_decisions:
- source_word: Μὴ θησαυρίζετε
  english_pob_choice: Do not store up
  chosen_spanish: No acumulen
  alternatives_spanish:
  - No atesoren
  - No almacenen
  lexicon: BDAG
  rationale: El imperativo con μή expresa prohibición. "Acumulen" comunica con naturalidad la acción de reunir bienes de manera progresiva, sin perder el matiz de acumulación del verbo griego.
- source_word: ὑμῖν
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí mismos
  - para ustedes mismos
  lexicon: BDAG
  rationale: 'El dativo tiene sentido reflexivo: el acumulamiento redunda en beneficio propio. "Para ustedes" suena natural en español y conserva el destinatario implícito; "ustedes mismos" se reserva para un énfasis reflexivo mayor que aquí no exige el texto.'
- source_word: θησαυροὺς
  english_pob_choice: treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - riquezas
  - bienes preciosos
  lexicon: BDAG
  rationale: '"Tesoros" mantiene la correspondencia léxica con el verbo y conserva el valor amplio de bienes apreciados, no solo dinero.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: La frase contrasta con el ámbito celestial del contexto inmediato. "En la tierra" refleja bien la ubicación concreta del texto fuente y mantiene el contraste sin añadir carga doctrinal.
- source_word: σὴς
  english_pob_choice: moth
  chosen_spanish: la polilla
  alternatives_spanish:
  - polilla
  - gorgojo
  lexicon: BDAG
  rationale: Aunque el griego refiere a una polilla o insecto que destruye textiles y bienes almacenados, en español "polilla" es el equivalente claro y natural.
- source_word: βρῶσις
  english_pob_choice: decay
  chosen_spanish: la decadencia
  alternatives_spanish:
  - la corrupción
  - el deterioro
  lexicon: BDAG
  rationale: La palabra griega es más amplia que "óxido" y puede abarcar deterioro consumidor. "Decadencia" comunica esa amplitud mejor que una lectura limitada a corrosión metálica, aunque suena menos técnica que "deterioro".
- source_word: ἀφανίζει
  english_pob_choice: destroy
  chosen_spanish: destruyen
  alternatives_spanish:
  - arruinan
  - consumen
  lexicon: BDAG
  rationale: El verbo expresa causar desaparición o ruina. En plural concuerda con los dos agentes mencionados y mantiene la fuerza de pérdida efectiva.
- source_word: κλέπται
  english_pob_choice: thieves
  chosen_spanish: los ladrones
  alternatives_spanish:
  - ladrones
  - los asaltantes
  lexicon: BDAG
  rationale: Equivalente directo y transparente.
- source_word: διορύσσουσιν
  english_pob_choice: break in
  chosen_spanish: perforan
  alternatives_spanish:
  - abren un boquete
  - horadan
  lexicon: BDAG
  rationale: Literalmente significa "cavar a través" o "horadar". "Perforan" conserva la imagen física de atravesar una pared; la imagen cultural de casas de adobe o barro se documenta mejor en nota.
- source_word: κλέπτουσιν
  english_pob_choice: steal
  chosen_spanish: roban
  alternatives_spanish:
  - hurtan
  - hurtan y roban
  lexicon: BDAG
  rationale: Verbo común y exacto para la acción de sustraer ilícitamente.
theological_decisions:
- issue: βρῶσις como término amplio de deterioro
  english_pob_reading: decay
  chosen_spanish_reading: decadencia
  alternative_spanish_readings:
  - óxido
  - corrupción
  rationale: La lectura de la POB en inglés evita restringir βρῶσις a corrosión metálica. En español, "decadencia" mantiene el alcance general de deterioro/consunción y preserva la advertencia sobre la fragilidad de las posesiones terrenales.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: διορύσσουσιν como imagen cultural de irrupción
  english_pob_reading: break in
  chosen_spanish_reading: perforan
  alternative_spanish_readings:
  - rompen
  - abren un boquete
  rationale: El griego alude literalmente a horadar o cavar a través, probablemente paredes de barro o adobe. "Perforan" retiene esa corporeidad sin perder inteligibilidad; la nota preserva la referencia cultural sin añadir explicación al cuerpo principal del versículo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego SBLGNT y toma en cuenta la auditoría inglesa POB: se conserva la prohibición con imperativo negativo, el contraste espacial con la esfera terrenal, la amplitud semántica de βρῶσις más allá de «rust», y la imagen literal de διορύσσουσιν como perforar/horadar, preservando además la decisión revisada de no usar artículo definido innecesario en la expresión espacial.'
  spanish_consistency_notes:
  - Se emplea «tesoros» para θησαυρούς, manteniendo la conexión léxica con θησαυρίζετε.
  - Se evita «SEÑOR» u otra terminología no pertinente; no hay vocabulario divino en este versículo.
  - Se prefirió «la tierra» por claridad natural en español, con nota para la alternativa más literal «sobre la tierra».
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
