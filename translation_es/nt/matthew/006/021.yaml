  to: Pues donde está tu tesoro[a], allí estará también tu corazón.
  rationale: 'Se reemplaza «Porque» por «Pues» para representar mejor la función explicativa de γάρ en español natural y bíblicamente digno. Se corrige la nota para que documente la verdadera alternativa preservada en el rastro inglés: presente («está») frente a futuro («estará»), no un simple cambio de orden.'
