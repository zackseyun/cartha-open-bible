translation:
  language: es
  text: Pues donde está tu tesoro[a], allí estará también tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues donde está tu tesoro, allí también está tu corazón». Algunas versiones expresan la cláusula como un presente atemporal, pero el verbo griego está en futuro («estará»).'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - adonde
  - en donde
  lexicon: BDAG
  rationale: Introduce una cláusula locativa relativa. «Donde» es la equivalencia natural y precisa en español para mantener la relación correlativa con «allí».
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Expresa la conexión explicativa con lo anterior. En español, «porque» comunica de forma clara la relación causal/explicativa que el inglés da con «for».
- source_word: θησαυρός
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - riqueza acumulada
  - tesoro guardado
  lexicon: BDAG
  rationale: «Tesoro» conserva el valor léxico básico y la fuerza metafórica del sustantivo sin volverlo verbal ni interpretarlo excesivamente.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - tuya
  - de ti
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de manera directa con el posesivo de segunda persona singular. Se mantiene paralelo con «tu corazón».
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: Corresponde al miembro correlativo de ὅπου y preserva el paralelismo compacto del griego.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estará
  alternatives_spanish:
  - es
  - queda
  lexicon: BDAG
  rationale: Se conserva el valor futuro del verbo griego. Aunque algunas versiones lo suavizan al presente general, el futuro debe quedar visible en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - asimismo
  - además
  lexicon: BDAG
  rationale: «También» reproduce bien el matiz aditivo del griego y suena natural en la posición posverbal española.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - afectos
  lexicon: BDAG
  rationale: «Corazón» es el equivalente establecido y fiel para καρδία, abarcando orientación interior, lealtad y deseo.
theological_decisions:
- issue: Valor temporal de ἔσται
  english_pob_reading: 'Retain explicit future: ''will be'''
  chosen_spanish_reading: 'Mantener el futuro explícito: «estará»'
  alternative_spanish_readings:
  - «está» para una verdad proverbial atemporal
  rationale: El griego usa futuro; conservarlo evita aplanar la frase en una mera descripción estática y preserva la fuerza formativa de la sentencia sobre la dirección del corazón.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] directamente en el texto de traducción; no se añadieron notas sin anclaje. Se preservó el futuro griego ἔσται en español con «estará» y la correlación donde/allí.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde no aparece en este versículo, por lo que no requiere aplicación aquí.
  - Se mantuvo el paralelismo «donde... allí...» para reflejar la estructura correlativa del griego.
  - La nota [a] queda anclada al sintagma «tu tesoro» para reflejar la variante temporal sin alterar el texto principal.
