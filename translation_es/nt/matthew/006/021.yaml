    issue: γάρ traducido como «Porque»
    rationale: Aunque es posible, «porque» en español tiende a leerse como causal fuerte. En esta máxima conectada con la enseñanza previa, «pues» preserva mejor el valor explicativo/discursivo de γάρ y suena más natural en registro bíblico claro.
  - severity: medium
    issue: La nota al pie no refleja la alternativa documentada
    rationale: 'La nota actual ofrece una reordenación («allí tu corazón estará también») en lugar de la alternativa real del English POB: leer la cláusula como presente («allí también está tu corazón»). Debe conservarse ese contraste temporal, ya que es el punto exegético relevante.'
