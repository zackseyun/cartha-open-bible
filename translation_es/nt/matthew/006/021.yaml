review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura correlativa del griego (ὅπου... ἐκεῖ), mantiene «tesoro» y «corazón» con fidelidad, y preserva correctamente el futuro de ἔσται con «estará». Sin embargo, la traducción de γάρ como «Porque» al inicio suena más causal que explicativa en este contexto y no reproduce tan bien la función discursiva de enlace como «pues», que además es más natural en español bíblico moderno.
  spanish_quality_summary: 'El español es claro y legible, pero «Porque donde está tu tesoro...» al iniciar una sentencia aislada resulta algo pesado y menos idiomático que «Pues donde está tu tesoro...». La nota al pie también necesita ajustarse: la alternativa propuesta no corresponde realmente a la variante señalada por el inglés, que contrasta futuro con presente, no un mero cambio de orden.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Tesoro», «corazón» y el futuro explícito «estará» están bien alineados con las decisiones léxicas y teológicas auditadas. El ajuste recomendado afecta principalmente la partícula discursiva γάρ y la precisión de la nota.
  issues:
