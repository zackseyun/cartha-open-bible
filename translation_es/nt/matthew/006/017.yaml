  source_alignment_summary: 'El borrador español refleja fielmente el griego: σὺ δὲ como contraste enfático (''Pero tú''), νηστεύων con valor temporal (''cuando ayunes''), ἄλειψαί... καὶ... νίψαι como dos imperativos coordinados (''unge... y lava''), y los objetos directos ''tu cabeza'' y ''tu rostro''. También conserva correctamente la intención contextual documentada en el POB inglés: mantener una apariencia normal durante el ayuno, no exhibirlo.'
