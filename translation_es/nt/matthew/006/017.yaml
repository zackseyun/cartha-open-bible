translation:
  language: es
  text: Pero tú[a], cuando ayunes, unge tu cabeza y lava tu rostro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pon aceite en tu cabeza'. El verbo griego puede referirse a aplicar aceite como parte del aseo ordinario.
    reason: lexical_alternative
  - marker: b
    text: Es decir, mantén una apariencia normal en vez de hacer evidente tu ayuno para los demás.
    reason: cultural_note
lexical_decisions:
- source_word: σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero en cuanto a ti
  - Pero tú, por tu parte
  lexicon: BDAG
  rationale: El pronombre enfático con δέ expresa contraste con los hipócritas del contexto previo. 'Pero tú' conserva la oposición directa y el énfasis sin añadir palabras innecesarias.
- source_word: νηστεύων
  english_pob_choice: when you fast
  chosen_spanish: cuando ayunes
  alternatives_spanish:
  - ayunando
  - mientras ayunas
  lexicon: BDAG
  rationale: El participio presente funciona como circunstancia temporal. 'Cuando ayunes' es natural en español y mantiene la función adverbial sin volver la frase rígida.
- source_word: ἄλειψαί
  english_pob_choice: anoint
  chosen_spanish: unge
  alternatives_spanish:
  - pon aceite en
  - aceita
  lexicon: BDAG
  rationale: ἀλείφω puede referirse a aplicar aceite como parte del aseo ordinario. 'Unge' preserva la equivalencia léxica tradicional y permite la lectura de cuidado normal del cuerpo sin reducirla a una simple instrucción cosmética.
- source_word: τὴν κεφαλήν
  english_pob_choice: your head
  chosen_spanish: tu cabeza
  alternatives_spanish:
  - tu cabeza
  - tu cabello
  lexicon: BDAG
  rationale: La palabra griega es 'cabeza'; aunque el sentido práctico involucra el arreglo habitual del cabello, 'tu cabeza' sigue de cerca el texto fuente.
- source_word: τὸ πρόσωπόν σου
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu semblante
  lexicon: BDAG
  rationale: πρόσωπον se refiere al rostro visible. 'Rostro' es claro, digno y conserva el registro bíblico sin sonar arcaico.
- source_word: νίψαι
  english_pob_choice: wash
  chosen_spanish: lava
  alternatives_spanish:
  - límpiate
  - lávate
  lexicon: BDAG
  rationale: νίπτω significa lavar una parte del cuerpo. 'Lava' transmite el mandato de manera directa y natural en español.
theological_decisions:
- issue: Sentido de la instrucción durante el ayuno
  english_pob_reading: Jesús instruye mantener un aseo normal durante el ayuno para que no sea evidente ante los demás.
  chosen_spanish_reading: Jesús manda conservar un aspecto normal durante el ayuno para que el ayuno no quede exhibido ante otros.
  alternative_spanish_readings:
  - Jesús prescribe un rito de unción
  - Jesús prohíbe toda práctica visible de ayuno
  rationale: El contexto inmediato contrasta la apariencia hipócrita con una presentación normal. La traducción evita convertir el mandato en un rito específico o en una prohibición del ayuno mismo, preservando la tensión interpretativa documentada en el POB inglés.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No se identificaron revisiones posteriores que exigieran cambios; la lectura actual coincide con el control de alta concordancia del material inglés auditado.
  spanish_consistency_notes:
  - Se mantuvo 'ayunes' para reflejar el participio temporal sin añadir matices ajenos al griego.
  - '''Unge'' conserva la posibilidad semántica de aplicar aceite en el aseo ordinario, tal como indica la nota inglesa.'
  - '''Rostro'' se eligió por claridad y dignidad estilística, evitando una paráfrasis interpretativa.'
  - La nota sobre la apariencia normal preserva la lectura cultural del contexto sin resolver indebidamente la intención del mandato.
