revisions:
- from: Pero si Dios así viste la hierba del campo[a], que hoy está y mañana es arrojada al horno, ¿no hará mucho más por ustedes[b], hombres de poca fe?
  to: Pero si Dios así viste la hierba del campo, que hoy está y mañana es arrojada al horno[a], ¿no los vestirá mucho más a ustedes[b], ustedes de poca fe?
  rationale: Se restaura el verbo 'vestirá' para reflejar el mismo ἀμφιέννυσιν implícito en la comparación, se corrige ὑμᾶς como objeto directo ('los ... a ustedes') en lugar de 'por ustedes', y se reemplaza 'hombres de poca fe' por un vocativo fiel y no marcado por género. También se reubican y corrigen las notas para alinearlas con el expediente inglés y con los puntos realmente ambiguos o culturales del versículo.
