  text: εἰ δὲ τὸν χόρτον τοῦ ἀγροῦ σήμερον ὄντα καὶ αὔριον εἰς κλίβανον βαλλόμενον ὁ θεὸς οὕτως ἀμφιέννυσιν, οὐ πολλῷ μᾶλλον ὑμᾶς, ὀλιγόπιστοι;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/030.yaml
  text: But if God so clothes the grass of the field[a], which is here today and tomorrow is thrown into an oven, will he not much more clothe you[b], you of little faith?
  footnotes:
  - marker: a
    text: Or 'you who have little faith.' The Greek vocative ὀλιγόπιστοι is a direct address expressing rebuke for inadequate trust.
    reason: lexical_alternative
  - marker: b
    text: The 'oven' refers to a baking oven; dried grass and field plants could be used as fuel.
    reason: cultural_note
