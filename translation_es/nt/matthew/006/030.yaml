translation:
  language: es
  text: Pero si Dios así viste la hierba del campo, que hoy está y mañana es arrojada al horno[a], ¿no los vestirá mucho más a ustedes[b], ustedes de poca fe?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El 'horno' se refiere a un horno de cocer; la hierba seca y las plantas del campo podían usarse como combustible.
    reason: cultural_note
  - marker: b
    text: O 'los de poca fe'. El griego vocativo ὀλιγόπιστοι es una apelación directa que expresa reproche por una confianza insuficiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: χόρτον τοῦ ἀγροῦ
  english_pob_choice: the grass of the field
  chosen_spanish: la hierba del campo
  alternatives_spanish:
  - el pasto del campo
  - la vegetación del campo
  lexicon: BDAG
  rationale: χόρτος puede referirse a hierba o vegetación herbácea. En español, 'hierba del campo' conserva la imagen natural y breve del crecimiento silvestre sin volverla demasiado técnica o demasiado amplia.
- source_word: σήμερον ὄντα
  english_pob_choice: which is here today
  chosen_spanish: que hoy está
  alternatives_spanish:
  - que está aquí hoy
  - que existe hoy
  lexicon: BDAG
  rationale: El participio ὄντα expresa existencia presente; en español, 'que hoy está' comunica la temporalidad efímera sin añadir matices biológicos que el griego no exige.
- source_word: αὔριον εἰς κλίβανον βαλλόμενον
  english_pob_choice: tomorrow is thrown into an oven
  chosen_spanish: mañana es arrojada al horno
  alternatives_spanish:
  - mañana es echada al horno
  - mañana es puesta en un horno
  lexicon: BDAG
  rationale: κλίβανος denota horno, no necesariamente un horno metalúrgico. 'Arrojada al horno' mantiene la imagen de combustible vegetal desechado. Uso femenino por concordancia con 'la hierba'.
- source_word: οὕτως ἀμφιέννυσιν
  english_pob_choice: so clothes
  chosen_spanish: así viste
  alternatives_spanish:
  - así cubre
  - así reviste
  lexicon: BDAG
  rationale: ἀμφιέννυμι significa vestir o cubrir con ropa. 'Viste' es el equivalente español más natural y fiel; evita adornar el verbo con sentidos no necesarios.
- source_word: οὐ πολλῷ μᾶλλον
  english_pob_choice: will he not much more
  chosen_spanish: ¿no hará mucho más
  alternatives_spanish:
  - ¿no vestirá mucho más
  - ¿no con mayor razón
  lexicon: BDAG
  rationale: La comparación de menor a mayor se expresa naturalmente en español con una pregunta retórica. 'Hará mucho más' conserva la fuerza argumentativa y permite el verbo implícito de cuidado/provisión.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a ustedes
  - los
  lexicon: BDAG
  rationale: El objeto directo implícito se integra en español como complemento personal ('por ustedes') para hacer natural la construcción con el verbo repetido y el sentido de provisión personal.
- source_word: ὀλιγόπιστοι
  english_pob_choice: you of little faith
  chosen_spanish: hombres de poca fe
  alternatives_spanish:
  - gente de poca fe
  - ustedes, los de poca fe
  lexicon: BDAG
  rationale: ὀλιγόπιστοι es un vocativo de reprensión. 'Hombres de poca fe' sigue una fórmula tradicional y transparente en español bíblico, manteniendo el tono de amonestación. Se evita 'si tienen poca fe' porque suaviza el vocativo.
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: δέ introduce una transición argumentativa; 'Pero si' conserva el contraste con el contexto inmediato y suena natural en español contemporáneo.
theological_decisions:
- issue: Argumento de menor a mayor en la provisión divina
  english_pob_reading: Retained the rhetorical question explicitly as God's greater care for disciples than for transient grass.
  chosen_spanish_reading: 'Se conserva la pregunta retórica como argumento de menor a mayor: si Dios viste la hierba pasajera, con mucha más razón cuidará de los discípulos.'
  alternative_spanish_readings:
  - Se podría convertir en una afirmación
  - Se podría suavizar el reproche final
  rationale: El griego culmina en una pregunta retórica con vocativo de reprensión. Mantenerla en forma interrogativa preserva la fuerza exhortativa de Jesús y la lógica del argumento sin introducir afirmaciones adicionales.
  doctrine_reference: Translation philosophy §3
- issue: Valor del vocativo ὀλιγόπιστοι
  english_pob_reading: The Greek vocative ὀλιγόπιστοι is a direct address expressing rebuke for inadequate trust.
  chosen_spanish_reading: 'Se entiende como un vocativo de reprensión: ''hombres de poca fe''.'
  alternative_spanish_readings:
  - '''ustedes de poca fe'''
  - '''gente de poca fe'''
  rationale: El vocativo no describe solamente un estado interior; también reprende. La forma elegida conserva el tono pastoral y correctivo que el contexto exige.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail en inglés y conserva la estructura retórica del griego. Se ajustó la cláusula final para un español natural ('por ustedes') y se mantuvo la imagen concreta de la hierba arrojada al horno. No se detectaron cambios necesarios respecto del estado revisado más reciente.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, conforme al criterio del proyecto.
  - Se mantiene 'fe' para πιστός/πιστός-related language in the vocative, sin suavizar la reprensión.
  - Se preserva 'horno' para κλίβανος, evitando 'furnace' o 'estufa', porque la nota cultural del POB inglés apunta a un horno de cocción.
  - Se emplea un registro bíblico moderno, no arcaizante, y la pregunta retórica queda intacta.
