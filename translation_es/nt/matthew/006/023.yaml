- from: Pero si tu ojo es malo[a], todo tu cuerpo estará en tinieblas. Si, entonces, la luz que hay en ti es oscuridad, ¡cuán grande es esa oscuridad!
  to: Pero si tu ojo es malo[a], todo tu cuerpo estará oscuro. Si, pues, la luz que hay en ti es oscuridad, ¡cuán grande es la oscuridad!
  rationale: Se ajusta el texto para reflejar mejor el paralelismo léxico del griego, mejorar la naturalidad del español y evitar una adición innecesaria, mientras se conserva intacta la decisión principal del POB de dejar πονηρός como 'malo' con alternativas en nota.
