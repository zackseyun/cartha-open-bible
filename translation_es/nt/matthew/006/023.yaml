translation:
  language: es
  text: Pero si tu ojo es malo[a], todo tu cuerpo estará oscuro. Si, pues, la luz que hay en ti es oscuridad, ¡cuán grande es la oscuridad!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'malvado', 'enfermo', o quizá 'mezquino/avaro', a la luz del modismo del 'ojo' y del contexto circundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθαλμός
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  - mirada
  lexicon: BDAG
  rationale: Se conserva el sentido literal de 'ojo' porque la imagen de Jesús funciona como metáfora corporal de percepción y orientación moral; 'vista' o 'mirada' suavizarían la imagen y perderían el enlace con el contexto inmediato.
- source_word: πονηρὸς
  english_pob_choice: bad
  chosen_spanish: malo
  alternatives_spanish:
  - malo en sentido moral
  - malvado
  - enfermo
  - mezquino
  lexicon: BDAG
  rationale: '''Malo'' mantiene la amplitud semántica que el POB inglés preserva con ''bad'': puede sugerir maldad moral, defecto o incluso una disposición mezquina/avara sin fijar una sola explicación en el texto principal.'
- source_word: ὅλον τὸ σῶμά σου
  english_pob_choice: your whole body
  chosen_spanish: todo tu cuerpo
  alternatives_spanish:
  - tu cuerpo entero
  - todo tu ser
  lexicon: BDAG
  rationale: '''Todo tu cuerpo'' reproduce de manera natural y directa el totalizador ὅλον τὸ σῶμά σου. Se evita ''tu ser'' porque ampliaría la metáfora más allá del sustantivo σώμα.'
- source_word: σκοτεινὸν
  english_pob_choice: dark
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - oscuro
  - oscurecido
  - lleno de oscuridad
  lexicon: BDAG
  rationale: '''En tinieblas'' comunica el predicado con claridad en español bíblico contemporáneo y conserva la fuerza metafórica. ''Oscuro'' sería más literal, pero en este contexto puede sonar menos enfático que el contraste con ''luz''/''oscuridad''.'
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - iluminación
  lexicon: BDAG
  rationale: Se mantiene 'luz' por ser la equivalencia directa y por sostener el contraste metafórico con 'oscuridad' sin interpretar de más el referente interno o espiritual.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - tiniebla
  lexicon: BDAG
  rationale: '''Oscuridad'' preserva el contraste con ''luz'' y funciona bien en la clausula final. En la primera parte se usó ''tinieblas'' para evitar repetición excesiva y reflejar el matiz sombrío del predicado.'
- source_word: πόσον
  english_pob_choice: how great
  chosen_spanish: ¡cuán grande!
  alternatives_spanish:
  - ¡qué grande!
  - ¡cuánta oscuridad!
  lexicon: BDAG
  rationale: '''¡Cuán grande!'' expresa el grado exclamativo de πόσον con naturalidad y mantiene el tono retórico del cierre. Se añade ''esa oscuridad'' para conservar la repetición enfática del griego en una forma idiomática española.'
- source_word: τὸ φῶς τὸ ἐν σοὶ
  english_pob_choice: the light in you
  chosen_spanish: la luz que hay en ti
  alternatives_spanish:
  - la luz en ti
  - tu luz interior
  lexicon: BDAG
  rationale: '''La luz que hay en ti'' sigue de cerca la construcción griega con ἐν σοὶ y suena natural en español. Se evita ''luz interior'' porque interpreta más de lo que el texto dice.'
theological_decisions:
- issue: Alcance del 'ojo malo'
  english_pob_reading: Retain the broader metaphor with 'bad' rather than specifying 'evil' or 'stingy' in the main text.
  chosen_spanish_reading: Mantener 'malo' en el texto principal, sin resolver si el dicho apunta sobre todo a maldad moral, defecto de percepción o avaricia/mezquindad.
  alternative_spanish_readings:
  - ojo malvado
  - ojo enfermo
  - ojo mezquino/avaro
  rationale: 'El contexto de Mateo 6:19–24 permite más de una resonancia: corrupción moral, visión distorsionada y posible idiomática de generosidad/avaricia. La traducción principal conserva esa tensión en vez de cerrarla prematuramente.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue la última revisión sin cambios del expediente inglés; no se detectaron correcciones posteriores que obliguen a ajustar el enunciado español. Se mantuvo la tensión interpretativa del 'ojo malo' y el cierre exclamativo del griego.
  spanish_consistency_notes:
  - 'Se conserva el contraste luz/oscuridad con vocabulario estable: ''luz'' / ''oscuridad''.'
  - '''Tinieblas'' se usa solo en la primera cláusula para evitar repetición poco natural; el cierre retoma ''oscuridad'' para reflejar la repetición enfática de σκότος.'
  - No se introducen términos eclesiásticos tradicionales que no estén motivados por el texto griego.
  - La nota al pie ancla la ambigüedad léxica principal sin resolverla en el cuerpo del verso.
