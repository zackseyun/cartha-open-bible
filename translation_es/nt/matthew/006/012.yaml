translation:
  language: es
  text: Y perdónanos nuestras deudas[a], así como también nosotros hemos perdonado a nuestros deudores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofensas»; más literalmente, «deudas». El griego conserva la metáfora de lo debido, probablemente con referencia aquí a pecados o faltas.
    reason: lexical_alternative
  - marker: b
    text: O «perdonamos a nuestros deudores». El aoristo griego puede traducirse como pasado simple; «hemos perdonado» expresa en español la acción concluida con relevancia presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφες
  english_pob_choice: forgive
  chosen_spanish: perdónanos
  alternatives_spanish:
  - perdona
  - absuélvenos
  - suéltanos
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀφίημι en una petición dirigida a Dios se expresa de manera más natural en español con «perdónanos». Aunque el verbo puede significar «soltar» o «dejar ir», el contexto de «deudas» morales favorece claramente el valor de perdón y evita una lectura meramente financiera.
- source_word: τὰ ὀφειλήματα
  english_pob_choice: our debts
  chosen_spanish: nuestras deudas
  alternatives_spanish:
  - nuestros pecados
  - nuestras faltas
  - nuestros incumplimientos
  lexicon: BDAG
  rationale: ὀφειλήματα significa literalmente «deudas» o «lo debido». Mantener «deudas» preserva la metáfora del texto fuente y la correspondencia con «deudores» al final del versículo. Las opciones más interpretativas se reservan para nota porque atenúan la imagen original.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  - justo como
  lexicon: BDAG
  rationale: ὡς introduce una comparación entre el perdón pedido a Dios y el perdón extendido a otros. «Así como» comunica esa relación comparativa de manera natural en español y conserva el paralelo.
- source_word: ἀφήκαμεν
  english_pob_choice: have forgiven
  chosen_spanish: hemos perdonado
  alternatives_spanish:
  - perdonamos
  - perdonamos ya
  lexicon: BDAG
  rationale: El aoristo indicativo puede traducirse con pasado simple, pero «hemos perdonado» expresa en español una acción ya cumplida con relevancia presente, sin forzar más de lo que el griego pide. Además encaja bien con el ritmo natural de la petición.
- source_word: τοῖς ὀφειλέταις
  english_pob_choice: our debtors
  chosen_spanish: a nuestros deudores
  alternatives_spanish:
  - a quienes nos deben
  - a los que nos deben
  - a los que están endeudados con nosotros
  lexicon: BDAG
  rationale: ὀφειλέταις es el sustantivo cognado de ὀφειλήματα, por lo que «deudores» mantiene la conexión léxica y la metáfora compartida del versículo. El dativo se expresa naturalmente en español con «a».
- source_word: καὶ
  english_pob_choice: And / also
  chosen_spanish: Y / también
  alternatives_spanish:
  - Y además
  - También
  lexicon: BDAG
  rationale: El primer καὶ coordina la petición con las anteriores, por eso se traduce «Y». El segundo καὶ con ἡμεῖς añade énfasis al lado humano de la comparación; «también» lo refleja sin sobrecargar la frase.
theological_decisions:
- issue: Metáfora moral de las «deudas»
  english_pob_reading: Retain 'debts' in the main text as the governing metaphor for sins/offenses before God.
  chosen_spanish_reading: Mantener «deudas» en el texto principal como metáfora rectora del pecado/ofensa ante Dios.
  alternative_spanish_readings:
  - pecados
  - ofensas
  - faltas
  rationale: El texto griego habla de deudas, no de un término genérico para pecado. Conservar la metáfora mantiene la transparencia al original y evita sustituirla por una formulación tradicional que borra el lenguaje económico. En español puede seguir entendiéndose en sentido moral sin perder la imagen fuente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tiempo verbal de ἀφήκαμεν
  english_pob_reading: Render as 'have forgiven' rather than simple past 'forgave.'
  chosen_spanish_reading: Traducir con «hemos perdonado» en vez de un pasado simple como «perdonamos».
  alternative_spanish_readings:
  - perdonamos
  - ya perdonamos
  rationale: El aoristo griego no obliga a escoger entre una referencia puramente puntual o una equivalencia estrictamente temporal en español. «Hemos perdonado» comunica una acción completada con relevancia presente y conserva la reciprocidad ética del versículo sin resolver indebidamente la tensión temporal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincido con el último paso de revisión: no se requieren cambios respecto del sentido del griego ni de la estrategia de traducción. La formulación española conserva la metáfora de las deudas, el paralelismo con deudores y la tensión temporal del aoristo sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se mantiene «deudas/deudores» para conservar la misma raíz léxica en ambos miembros del versículo.
  - Se evita «trespasses» o «ofensas» en el texto principal porque debilitan la metáfora explícita del original.
  - «Hemos perdonado» suena natural en español y respeta el valor aspectual del aoristo sin imponer una crónica temporal exacta.
  - La coordinación inicial se conserva con «Y» para reflejar el enlace con la oración precedente.
