translation:
  language: es
  text: Por lo tanto[a], no lleguen a ser como ellos, porque su Padre sabe lo que necesitan antes de que ustedes le pidan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no sean hechos como ellos» / «no sean como ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὖν
  english_pob_choice: Therefore, do not
  chosen_spanish: Por lo tanto, no
  alternatives_spanish:
  - Así que, no
  - Entonces, no
  lexicon: BDAG
  rationale: La partícula inferencial οὖν se expresa con una conexión lógica natural en español. «Por lo tanto» conserva el vínculo con la advertencia anterior sin sonar mecánico; el mandato negativo queda en «no».
- source_word: ὁμοιωθῆτε
  english_pob_choice: become like
  chosen_spanish: se hagan como
  alternatives_spanish:
  - sean como
  - lleguen a ser como
  - se conformen a
  lexicon: BDAG
  rationale: El pasivo subjuntivo en prohibición admite una idea de llegar a ser o ser hecho semejante. «Se hagan como» conserva la noción de conformación al patrón ajeno y evita reducirlo solo a una igualdad estática.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - esas personas
  - aquellos
  lexicon: BDAG
  rationale: En español, «ellos» mantiene la referencia pronominal directa al grupo ya mencionado en el contexto inmediato, con naturalidad y sin añadir contenido interpretativo.
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - está al tanto de
  lexicon: BDAG
  rationale: El perfecto formal de οἶδα funciona con sentido presente. «Sabe» es la forma natural y exacta en español para preservar ese valor presente.
- source_word: ὁ πατὴρ ὑμῶν
  english_pob_choice: your Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - su Padre celestial
  - el Padre de ustedes
  lexicon: BDAG
  rationale: El griego dice solo «vuestro Padre / su Padre», sin añadir «celestial». En español, el posesivo de cortesía/plural («su») reproduce el referente sin importar una aclaración que el texto aquí no ofrece.
- source_word: ὧν χρείαν ἔχετε
  english_pob_choice: what you need
  chosen_spanish: qué necesitan
  alternatives_spanish:
  - lo que necesitan
  - las cosas que necesitan
  lexicon: BDAG
  rationale: La construcción expresa el contenido de la necesidad. «Qué necesitan» es natural en español y conserva la referencia abierta a las necesidades concretas sin sobreexplicarla.
- source_word: πρὸ τοῦ ὑμᾶς αἰτῆσαι αὐτόν
  english_pob_choice: before you ask him
  chosen_spanish: antes de que ustedes se lo pidan
  alternatives_spanish:
  - antes de que ustedes le pidan
  - antes de pedirle a él
  lexicon: BDAG
  rationale: αἰτέω con objeto personal admite «pedirle». Como el pronombre puede dejar ambiguo el complemento en español, «se lo pidan» explicita el referente de modo natural y evita un giro poco idiomático.
theological_decisions:
- issue: El conocimiento previo del Padre y la oración
  english_pob_reading: The Father knows the disciples' needs before they ask, without explanatory expansion.
  chosen_spanish_reading: Su Padre sabe lo que necesitan antes de que ustedes se lo pidan, sin añadir explicación sobre por qué todavía oran.
  alternative_spanish_readings:
  - Su Padre ya conoce sus necesidades antes de que ustedes oren.
  - Su Padre, que todo lo sabe, conoce de antemano lo que necesitan.
  rationale: La traducción conserva la afirmación directa del texto sobre el conocimiento previo del Padre y no resuelve la tensión teológica acerca de la oración. No se añade lenguaje doctrinal que amplíe o atenúe la afirmación original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión aprobada: no se registran cambios en el inglés auditado y el cotejo externo reporta alto acuerdo. La redacción española sigue de cerca el griego y el criterio POB de no explicar la tensión teológica del dicho.'
  spanish_consistency_notes:
  - Se mantiene «Padre» sin añadir «celestial», porque el griego aquí no lo explicita.
  - Se traduce οἶδα con «sabe», no con una perífrasis más interpretativa.
  - Se conserva el tono de advertencia lógica con «Por lo tanto».
  - Se evita «SEÑOR» u otra sustitución no pertinente; el versículo no contiene el nombre divino.
  - El pronombre final se hace explícito en español con «se lo pidan» para reflejar el objeto personal sin ambigüedad.
