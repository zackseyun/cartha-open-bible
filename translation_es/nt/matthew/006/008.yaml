revisions:
- from: Por lo tanto[a], no se hagan como ellos, porque su Padre sabe qué necesitan antes de que ustedes se lo pidan.
  to: Por lo tanto[a], no lleguen a ser como ellos, porque su Padre sabe lo que necesitan antes de que ustedes le pidan.
