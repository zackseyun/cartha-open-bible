review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: una prohibición conectada lógicamente con el contexto previo, la referencia a «ellos», el conocimiento previo del Padre y la temporalidad «antes de pedir». Sin embargo, «no se hagan como ellos» no es una formulación española natural para ὁμοιωθῆτε y puede sonar reflexiva/causativa de un modo poco fiel. Además, «antes de que ustedes se lo pidan» introduce un «lo» no presente en el griego; αὐτόν es la persona a quien se pide, no la cosa pedida.'
  spanish_quality_summary: El texto es claro, pero «no se hagan como ellos» suena poco idiomático en español bíblico natural. «No lleguen a ser como ellos» o «no sean como ellos» suenan mejor; dado el matiz documentado, «no lleguen a ser como ellos» preserva mejor la idea de conformación. También conviene evitar «se lo pidan», porque en español desplaza el foco hacia un objeto tácito y crea una precisión no respaldada por el original; «le pidan» es más limpio y fiel.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Padre» y «Dios» no presentan conflicto. La revisión propuesta respeta la decisión inglesa documentada de no añadir «celestial» a «su Padre».
  issues:
  - severity: medium
    issue: «no se hagan como ellos» para ὁμοιωθῆτε
    rationale: Aunque intenta reflejar el matiz de «become like», en español esta expresión suena poco natural y puede sugerir «hacerse pasar por» o una acción reflexiva extraña. «No lleguen a ser como ellos» conserva mejor el matiz ingresivo sin dureza innecesaria.
  - severity: medium
    issue: «se lo pidan» añade un objeto no expreso
    rationale: El griego dice literalmente «antes de pedirle a él». El pronombre αὐτόν es la persona objeto de la petición, no el contenido pedido. «Se lo» introduce un complemento directo implícito que no está en el texto y puede sobreespecificar la sintaxis.
  - severity: low
    issue: La nota al pie repite una opción española poco natural
    rationale: La nota conserva «no se hagan como ellos» como forma más literal, pero en español es preferible ofrecer «no lleguen a ser como ellos» / «no sean como ellos» para reflejar mejor las alternativas documentadas y la legibilidad.
  revised_spanish_text: Por lo tanto[a], no lleguen a ser como ellos, porque su Padre sabe lo que necesitan antes de que ustedes le pidan.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «no sean hechos como ellos» / «no sean como ellos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta ὁμοιωθῆτε a una formulación española más natural y fiel al matiz de conformarse al patrón ajeno, y se corrige la construcción final para reflejar que αὐτόν es la persona a quien se pide, sin añadir un objeto directo implícito. También se suaviza «qué necesitan» a «lo que necesitan», más natural en español continuo.
