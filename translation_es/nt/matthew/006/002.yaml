translation:
  language: es
  text: 'Así pues[a], cuando des limosna, no toques trompeta delante de ti[b], como hacen los hipócritas en las sinagogas y en las calles, para ser glorificados por la gente[c]. En verdad les digo: ya han recibido toda su recompensa[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando hagas obras de misericordia» o «cuando des a los necesitados». La expresión griega ποιεῖν ἐλεημοσύνην se refiere a dar limosna o practicar actos de caridad.
    reason: lexical_alternative
  - marker: b
    text: O «no lo anuncies con una trompeta». La expresión puede ser hiperbólica o metafórica, pero el griego dice literalmente «no toques trompeta».
    reason: lexical_alternative
  - marker: c
    text: O «para ser alabados» o «honrados» por la gente. El verbo griego dice literalmente «ser glorificados».
    reason: lexical_alternative
  - marker: d
    text: 'La expresión refleja un modismo comercial: ya tienen todo el pago o recompensa que van a recibir.'
    reason: cultural_note
lexical_decisions:
- source_word: Ὅταν οὖν
  english_pob_choice: Therefore, whenever
  chosen_spanish: Así pues, cuando
  alternatives_spanish:
  - Por tanto, cuando
  - Entonces, cuando
  lexicon: BDAG
  rationale: Conserva la relación inferencial de οὖν y la temporalidad general de Ὅταν. En español, «Así pues» suena natural y mantiene el enlace lógico sin recargar la frase.
- source_word: ποιῇς ἐλεημοσύνην
  english_pob_choice: give alms
  chosen_spanish: des limosna
  alternatives_spanish:
  - hagas obras de misericordia
  - des a los necesitados
  - practiques caridad
  lexicon: BDAG
  rationale: La expresión griega es un modismo para la acción caritativa hacia los pobres. «Des limosna» es breve, reconocible y fiel al uso idiomático; las otras opciones explican más, pero se alejan del giro tradicional y conciso del texto.
- source_word: μὴ σαλπίσῃς
  english_pob_choice: do not sound a trumpet
  chosen_spanish: no toques trompeta
  alternatives_spanish:
  - no anuncies con trompeta
  - no hagas sonar una trompeta
  lexicon: BDAG
  rationale: Se conserva la imagen literal de la trompeta, como en el griego y en el audit trail inglés. «Tocar trompeta» comunica bien el acto de emitir el sonido sin añadir explicación interpretativa.
- source_word: ἔμπροσθέν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: BDAG
  rationale: La preposición expresa ubicación visible delante de la persona. «Delante de ti» es idiomática en español y conserva la fuerza espacial del original.
- source_word: ὑποκριταὶ
  english_pob_choice: hypocrites
  chosen_spanish: los hipócritas
  alternatives_spanish:
  - los farsantes
  - los simuladores
  lexicon: BDAG
  rationale: «Hipócritas» es el equivalente consolidado en este contexto ético-religioso y preserva el término técnico del discurso de Jesús.
- source_word: συναγωγαῖς
  english_pob_choice: synagogues
  chosen_spanish: sinagogas
  alternatives_spanish:
  - lugares de reunión
  lexicon: BDAG
  rationale: Se mantiene el referente judío concreto del texto. «Sinagogas» es claro y exacto.
- source_word: ῥύμαις
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - callejones
  - vías públicas
  lexicon: BDAG
  rationale: «Calles» es la equivalencia natural más directa para el espacio público mencionado. Evita el tono demasiado estrecho de «callejones».
- source_word: ὅπως δοξασθῶσιν ὑπὸ τῶν ἀνθρώπων
  english_pob_choice: so that they may be glorified by people
  chosen_spanish: para ser glorificados por las personas
  alternatives_spanish:
  - para ser alabados por la gente
  - para ser honrados por las personas
  lexicon: BDAG
  rationale: Se conserva el verbo fuerte «glorificados», siguiendo el audit trail inglés, para no diluir la intensidad del contraste con la recompensa divina. «Por las personas» mantiene el valor genérico de ἀνθρώπων sin introducir masculinidad innecesaria.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: En verdad les digo
  alternatives_spanish:
  - Amén les digo
  - De cierto les digo
  lexicon: BDAG
  rationale: La fórmula solemne se expresa con naturalidad en español contemporáneo. «En verdad les digo» preserva la función declarativa sin sonar artificial.
- source_word: ἀπέχουσιν τὸν μισθὸν αὐτῶν
  english_pob_choice: they have received their reward in full
  chosen_spanish: ya han recibido su recompensa en pleno
  alternatives_spanish:
  - ya recibieron su pago completo
  - ya tienen su recompensa
  lexicon: BDAG
  rationale: 'Se reproduce el sentido comercial/contable de ἀπέχουσιν: han cobrado o recibido íntegramente lo que les correspondía. «En pleno» intenta reflejar la plenitud del pago, manteniendo el valor idiomático sin sobreexplicar.'
theological_decisions:
- issue: Valor genérico de ἀνθρώπων
  english_pob_reading: by people
  chosen_spanish_reading: por las personas
  alternative_spanish_readings:
  - por la gente
  - por los hombres
  rationale: El contexto apunta a observadores humanos en general, no a varones específicamente. «Las personas» conserva el sentido genérico y evita un masculino engañoso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Intensidad de δοξασθῶσιν
  english_pob_reading: may be glorified
  chosen_spanish_reading: ser glorificados
  alternative_spanish_readings:
  - ser alabados
  - ser honrados
  rationale: Se mantiene la fuerza semántica de δοξάζω en lugar de rebajarla a una simple aprobación social. El contexto revela que esa gloria es humana y contrapuesta al reconocimiento de Dios.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se conservó la fuerza literal de la trompeta, la preferencia por un término fuerte para δοξάζω, y el valor idiomático/comercial de ἀπέχουσιν. No se siguió literalmente la formulación inglesa donde el español requería mayor naturalidad, pero se mantuvieron las mismas tensiones semánticas documentadas.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; no hubo decisión sobre el nombre divino.
  - Se eligió «limosna» para reflejar el modismo bíblico de dar caridad, en continuidad con el audit trail de 'give alms'.
  - «Hipócritas», «sinagogas» y «calles» conservan el registro público y polémico del pasaje.
  - La frase «por las personas» evita una lectura masculina no obligatoria de ἀνθρώπων.
