translation:
  language: es
  text: Por tanto, no se preocupen por mañana[a], porque mañana se preocupará por sí mismo. Suficiente para el día es su propio mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cada día tiene suficiente mal de suyo». El griego puede significar «mal», pero aquí probablemente se refiere a la dificultad o aflicción propia del día.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεριμνήσητε
  english_pob_choice: do not worry
  chosen_spanish: no se inquieten
  alternatives_spanish:
  - no se preocupen
  - no se angustien
  - no se afanen
  lexicon: BDAG
  rationale: El verbo μεριμνάω en este contexto expresa preocupación ansiosa por el futuro. «No se inquieten» conserva ese matiz de inquietud interior y suena natural en español bíblico contemporáneo, sin suavizar el peso del mandato.
- source_word: εἰς τὴν αὔριον
  english_pob_choice: about tomorrow
  chosen_spanish: por el mañana
  alternatives_spanish:
  - sobre el mañana
  - para el mañana
  - acerca del mañana
  lexicon: BDAG
  rationale: Con μεριμνάω, la preposición apunta a una preocupación dirigida al futuro. «Por el mañana» comunica esa dirección de la preocupación en un español natural y evita una construcción demasiado literal que sonaría extraña.
- source_word: ἡ αὔριον
  english_pob_choice: tomorrow
  chosen_spanish: el mañana
  alternatives_spanish:
  - mañana
  - el día de mañana
  lexicon: BDAG
  rationale: La forma con artículo personifica «mañana» como sujeto. «El mañana» conserva esa personificación con naturalidad en español y mantiene el paralelismo con la cláusula siguiente.
- source_word: μεριμνήσει αὑτῆς
  english_pob_choice: will worry about itself
  chosen_spanish: se inquietará por sí mismo
  alternatives_spanish:
  - se preocupará por sí mismo
  - se afanará por sí mismo
  - se cuidará de sí mismo
  lexicon: BDAG
  rationale: Se mantiene el vínculo verbal con la prohibición anterior y la personificación retórica del «mañana». «Por sí mismo» representa el reflexivo griego y conserva la ironía del dicho.
- source_word: ἀρκετὸν
  english_pob_choice: Sufficient for the day is its own trouble
  chosen_spanish: Suficiente para el día es
  alternatives_spanish:
  - Basta para el día
  - Al día le basta
  lexicon: BDAG
  rationale: ἀρκετός expresa suficiencia. Se conserva el orden enfático del griego con «Suficiente para el día es», que suena elevado pero todavía publicable en español y refleja la formulación revisada del POB en inglés.
- source_word: τῇ ἡμέρᾳ
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - cada día
  - para el día
  lexicon: BDAG
  rationale: El dativo se traduce con un sintagma temporal natural en español. Se eligió «el día» para mantener la concreción de la frase breve y su estructura proverbial.
- source_word: ἡ κακία
  english_pob_choice: its own trouble
  chosen_spanish: su propia calamidad
  alternatives_spanish:
  - su propio mal
  - su propia dificultad
  - su propio problema
  lexicon: BDAG
  rationale: κακία puede significar maldad, mal o calamidad; en este contexto la idea es la carga adversa del día, no una afirmación moral sobre el día. «Calamidad» conserva la fuerza del término y evita diluirlo en una palabra demasiado débil como «problema».
- source_word: αὐτῆς
  english_pob_choice: of its own
  chosen_spanish: su propia
  alternatives_spanish:
  - de él mismo
  - de sí mismo
  - propia
  lexicon: BDAG
  rationale: El posesivo se integra en «su propia», que en español expresa pertenencia y énfasis de modo idiomático. El reflexivo implícito se mantiene por el contexto personificado de «el día».
theological_decisions:
- issue: Valor de κακία en un dicho sapiencial sobre la ansiedad
  english_pob_reading: Rendered as 'trouble' rather than 'evil'
  chosen_spanish_reading: «calamidad» en vez de «maldad» o «mal»
  alternative_spanish_readings:
  - mal
  - maldad
  - dificultad
  - problema
  rationale: El contexto trata de la preocupación por el futuro y explica que cada día ya trae una carga suficiente. Traducir κακία como «calamidad» preserva el sentido práctico y adverso del término sin sugerir que el día tenga una cualidad moralmente mala.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense over traditional wording where context warrants'
translation_notes:
  revision_awareness: La redacción final sigue la revisión del POB en inglés que ajustó la última oración para reflejar más de cerca el orden y el sentido de ἀρκετόν y κακία. Se evitó una paráfrasis que debilitara la personificación de «mañana» y la suficiencia del día.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando el tono excesivamente coloquial.
  - Se preservó la personificación retórica de «el mañana» y «el día» para reflejar el paralelismo griego.
  - Se eligió «inquieten»/«inquietará» para conservar el campo semántico de preocupación ansiosa sin imponer «ansiedad» donde el español podría sonar clínico.
