revisions:
- from: Por tanto, no se inquieten por el mañana[a], porque el mañana se inquietará por sí mismo. Suficiente para el día es su propia calamidad.
  to: Por tanto, no se preocupen por mañana[a], porque mañana se preocupará por sí mismo. Suficiente para el día es su propio mal.
  rationale: Se ajustó el texto para mejorar la naturalidad del español y alinearlo mejor con el sentido del griego y la lógica del POB inglés. «Por mañana» y «mañana» preservan la referencia temporal y la personificación sin giros forzados. «Se preocupará» mantiene el vínculo verbal con el mandato inicial. «Su propio mal» conserva mejor el valor semántico de κακία, mientras la nota aclara que en contexto se refiere a la dificultad o aflicción del día, no necesariamente a mal moral.
