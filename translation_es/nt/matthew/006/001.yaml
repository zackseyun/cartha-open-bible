translation:
  language: es
  text: Pero cuídense de no practicar su rectitud delante de la gente, para ser vistos por ellos[a]; de otro modo[b], no tienen recompensa de su Padre que está en los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus actos de justicia». Una variante textual lee «su limosna».
    reason: textual_variant
  - marker: b
    text: 'Griego: «en los cielos»; muchas versiones simplifican a «en el cielo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  english_pob_choice: be careful
  chosen_spanish: cuídense
  alternatives_spanish:
  - tengan cuidado
  - estén atentos
  lexicon: BDAG
  rationale: El imperativo presente plural pide vigilancia continua. «Cuídense» transmite bien la advertencia exhortativa en español actual y mantiene el tono de prevención sin volverse arcaico.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste y transición respecto de la enseñanza anterior. «Pero» conserva mejor el giro adversativo del contexto.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - actos de justicia
  - limosna
  lexicon: BDAG
  rationale: La forma griega admite un sentido amplio de conducta justa. En español, «justicia» preserva ese alcance y evita restringir demasiado el término. Se deja abierta la tensión interpretativa con la nota textual/lexical.
- source_word: μὴ ποιεῖν
  english_pob_choice: not to practice
  chosen_spanish: de no practicar
  alternatives_spanish:
  - de no hacer
  - de no realizar
  lexicon: BDAG
  rationale: «Practicar» expresa mejor la idea de conducta religiosa sostenida que un simple «hacer».
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  english_pob_choice: before people
  chosen_spanish: delante de la gente
  alternatives_spanish:
  - delante de las personas
  - ante los hombres
  lexicon: BDAG
  rationale: «Gente» expresa de manera natural el referente humano general y evita un sesgo masculino innecesario.
- source_word: πρὸς τὸ θεαθῆναι αὐτοῖς
  english_pob_choice: in order to be seen by them
  chosen_spanish: para ser vistos por ellos
  alternatives_spanish:
  - para que los vean
  - con el fin de ser vistos por ellos
  lexicon: BDAG
  rationale: La construcción expresa propósito; la pasiva en español conserva la idea de exhibición pública buscada intencionalmente.
- source_word: εἰ δὲ μή γε
  english_pob_choice: otherwise
  chosen_spanish: de otro modo
  alternatives_spanish:
  - si no
  - de lo contrario
  lexicon: BDAG
  rationale: Es una forma idiomática de resumir la consecuencia condicional. «De otro modo» suena natural y mantiene el valor advertencial.
- source_word: μισθὸν
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - pago
  lexicon: BDAG
  rationale: En el contexto de retribución divina, «recompensa» es claro y fiel sin introducir un registro demasiado técnico o eclesiástico.
- source_word: παρὰ τῷ πατρὶ ὑμῶν
  english_pob_choice: from your Father
  chosen_spanish: de parte de su Padre
  alternatives_spanish:
  - de su Padre
  - junto a su Padre
  lexicon: BDAG
  rationale: La preposición παρά con dativo puede indicar procedencia o relación cercana. En este contexto de recibir recompensa, «de parte de» comunica bien la fuente.
- source_word: τῷ ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: que está en los cielos
  alternatives_spanish:
  - en los cielos
  - que está en el cielo
  lexicon: BDAG
  rationale: El griego conserva el plural «los cielos». En español, «que está en los cielos» mantiene esa forma de manera natural y reverente.
theological_decisions:
- issue: Alcance de δικαιοσύνην
  english_pob_reading: broadly 'righteousness' or righteous practice, not restricted in the main text to almsgiving
  chosen_spanish_reading: «justicia» en el texto principal, con apertura a la lectura de actos justos o limosna en nota
  alternative_spanish_readings:
  - rectitud
  - actos de justicia
  - limosna
  rationale: El testimonio griego base es δικαιοσύνην, que tiene alcance amplio. Mantener «justicia» evita resolver prematuramente la discusión interpretativa y preserva la tensión documentada por la tradición textual y la nota inglesa.
  doctrine_reference: 'DOCTRINE.md: contested terms table (δικαιοσύνη → justicia/rectitud; alternativas preservadas en nota cuando corresponde)'
- issue: Rendering ἀνθρώπων
  english_pob_reading: generic 'people'
  chosen_spanish_reading: «la gente»
  alternative_spanish_readings:
  - las personas
  - los hombres
  rationale: El referente son observadores humanos en general, no varones específicamente. «La gente» expresa bien ese valor genérico en español actual.
  doctrine_reference: 'DOCTRINE.md: translation philosophy #4'
- issue: Rendering τοῖς οὐρανοῖς
  english_pob_reading: literal plural 'the heavens'
  chosen_spanish_reading: «los cielos»
  alternative_spanish_readings:
  - el cielo
  - los cielos
  rationale: El plural griego debe quedar visible. «Los cielos» conserva la forma mateana y evita aplanar el plural a un singular más común.
  doctrine_reference: 'DOCTRINE.md: translation philosophy #1 and #5'
translation_notes:
  revision_awareness: El borrador sigue el texto griego de SBLGNT y el aparato auditado en inglés. Se preserva la tensión lexical de δικαιοσύνην con una traducción amplia en el cuerpo y una nota que recoge la alternativa interpretativa y la variante textual. No se introducen decisiones doctrinales nuevas fuera de las ya documentadas en el contexto inglés.
  spanish_consistency_notes:
  - Se usa «justicia» para δικαιοσύνην según el alcance amplio del término, sin reducirlo a limosna en el texto principal.
  - Se traduce ἀνθρώπων por «la gente» para un referente humano genérico y natural en español.
  - Se conserva el plural «los cielos» para reflejar el griego y el estilo mateano.
  - Se evita «SEÑOR» como sustituto de Yahvé, pero este versículo no contiene el nombre divino explícito.
  - El tono es sobrio y publicable, con una sintaxis cercana al español bíblico moderno sin calco mecánico.
