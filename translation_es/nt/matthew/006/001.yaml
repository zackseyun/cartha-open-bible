revisions:
- from: Pero cuídense de no practicar su justicia delante de la gente, para ser vistos por ellos[a]; de otro modo[b], no tienen recompensa de parte de su Padre que está en los cielos.
  to: Pero cuídense de no practicar su rectitud delante de la gente, para ser vistos por ellos[a]; de otro modo[b], no tienen recompensa de su Padre que está en los cielos.
  rationale: Se ajusta «justicia» a «rectitud» para lograr un español más natural y comprensible en este contexto sin reducir el alcance amplio de δικαιοσύνη ni resolverlo como «limosna» en el texto principal. Se simplifica «de parte de su Padre» a «de su Padre» por mayor naturalidad y fidelidad funcional al sentido de fuente. Se conservan las notas y el plural «los cielos».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:01:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del griego: advertencia continua, práctica pública de la δικαιοσύνη, propósito de ser vistos, consecuencia de no recibir recompensa del Padre. También preserva correctamente el plural «los cielos» y la nota sobre la variante textual/alternativa lexical.'
  spanish_quality_summary: El texto es mayormente natural y claro, pero «su justicia» en español suena abstracto y poco idiomático en este contexto exhortativo; puede sugerir una cualidad interna o una causa social más que la práctica de justicia. «Delante de la gente» y «por ellos» son aceptables, pero la combinación entera mejora con una formulación que haga más evidente la idea de actos justos sin cerrar la amplitud del término. Además, «de parte de su Padre» es entendible, aunque «de su Padre» es más directo y natural aquí.
  glossary_alignment: Buena alineación global. No hay términos del glosario mayor en conflicto. Sin embargo, para δικαιοσύνη el propio proyecto permite «justicia/rectitud» según contexto; aquí conviene una solución más idiomática que conserve el alcance amplio. La nota actual ya preserva bien «actos de justicia» y «limosna».
  issues:
  - severity: medium
    issue: «su justicia» suena poco natural y potencialmente equívoco en Mateo 6:1
    rationale: Aunque «justicia» es formalmente cercano a δικαιοσύνη, en español la frase «practicar su justicia» no fluye bien y puede no comunicar con claridad la idea de práctica piadosa/righteous practice que el griego y el inglés auditado quieren mantener.
  - severity: low
    issue: «de parte de su Padre» es menos idiomático que «de su Padre» en este contexto
    rationale: παρὰ con dativo aquí señala la fuente de la recompensa. «De su Padre» expresa esa procedencia con mayor naturalidad en español bíblico moderno, sin pérdida de sentido.
  revised_spanish_text: Pero cuídense de no practicar su rectitud delante de la gente, para ser vistos por ellos[a]; de otro modo[b], no tienen recompensa de su Padre que está en los cielos.
  revised_footnotes:
  - marker: a
    text: O «sus actos de justicia». Una variante textual lee «su limosna».
    reason: textual_variant
  - marker: b
    text: 'Griego: «en los cielos»; muchas versiones simplifican a «en el cielo».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «justicia» a «rectitud» para lograr un español más natural y comprensible en este contexto sin reducir el alcance amplio de δικαιοσύνη ni resolverlo como «limosna» en el texto principal. Se simplifica «de parte de su Padre» a «de su Padre» por mayor naturalidad y fidelidad funcional al sentido de fuente. Se conservan las notas y el plural «los cielos».
