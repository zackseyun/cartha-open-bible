translation:
  language: es
  text: Pero cuando des a los necesitados[a], no sepa tu mano izquierda lo que hace tu mano derecha,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando des limosna»; el término griego se refiere a una dádiva caritativa a los pobres.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοῦ δὲ ποιοῦντος
  english_pob_choice: But when you give
  chosen_spanish: Pero cuando des
  alternatives_spanish:
  - Pero cuando hagas
  - Pero cuando estés dando
  lexicon: BDAG
  rationale: 'El genitivo absoluto con δέ introduce contraste y se entiende naturalmente en español con una subordinada temporal: ''Pero cuando des''. ''Dar'' comunica mejor el acto de dar que un calco de ''hacer'', sin añadir contenido ajeno al contexto.'
- source_word: ἐλεημοσύνην
  english_pob_choice: to the needy
  chosen_spanish: limosna
  alternatives_spanish:
  - almosna
  - acto de misericordia
  - donativo a los necesitados
  lexicon: BDAG
  rationale: El término griego designa limosna o dádiva caritativa a los pobres. 'Limosna' es la equivalencia tradicional y breve en español; conserva el sentido de ayuda material, aunque el comentario léxico puede precisar que se trata de dar a los necesitados.
- source_word: μὴ γνώτω
  english_pob_choice: do not let ... know
  chosen_spanish: no sepa
  alternatives_spanish:
  - no deje que sepa
  - no permita que sepa
  lexicon: BDAG
  rationale: 'El imperativo con μή se expresa de manera natural en español con una prohibición: ''no sepa''. Mantiene la personificación de las manos sin sobreexplicar la relación entre ellas.'
- source_word: ἡ ἀριστερά σου
  english_pob_choice: your left hand
  chosen_spanish: tu mano izquierda
  alternatives_spanish:
  - tu izquierda
  lexicon: BDAG
  rationale: Se conserva la imagen literal y memorizable del paralelismo. 'Mano izquierda' es la forma natural en español y reproduce el valor metafórico del griego.
- source_word: τί ποιεῖ ἡ δεξιά σου
  english_pob_choice: what your right hand is doing
  chosen_spanish: lo que hace tu mano derecha
  alternatives_spanish:
  - lo que está haciendo tu mano derecha
  - lo que hace tu diestra
  lexicon: BDAG
  rationale: '''Lo que hace tu mano derecha'' reproduce el presente griego y la imagen sin forzar un progresivo que suene menos idiomático en español. ''Mano derecha'' mantiene el paralelo con ''mano izquierda''.'
theological_decisions:
- issue: Alcance de la metáfora de las manos
  english_pob_reading: Retain the metaphor as an exhortation to extreme secrecy and freedom from self-display in giving.
  chosen_spanish_reading: Conservar la metáfora como exhortación a la discreción extrema y a no buscar exhibición al dar.
  alternative_spanish_readings:
  - Tomarlo como una prohibición de toda limosna pública
  - Reducirlo a una enseñanza general de humildad sin referencia específica al dar
  rationale: La imagen personificada de las manos debe permanecer en español. No se debe convertir en una norma más estricta que la del texto ni diluirla en una moraleja general; el énfasis es ocultar la dádiva y evitar la autoexhibición.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Coincide con la última revisión sin cambios sustanciales; se mantiene la lectura estándar del texto griego y la metáfora de las manos con una equivalencia natural en español.
  spanish_consistency_notes:
  - Se usa 'limosna' para ἐλεημοσύνην por su valor tradicional y su precisión breve en español.
  - Se conserva la personificación de 'tu mano izquierda' y 'tu mano derecha' para no perder el paralelismo del original.
  - '''No sepa'' mantiene la prohibición con un tono claro y publicable en español moderno.'
