    rationale: Aunque es comprensible, «la vestimenta» o «el vestido» guardan mejor el tono digno y el paralelismo con «el alimento».
  - severity: low
    issue: El paralelismo mejora con interrogativas directas
    rationale: «qué comerán ... qué se pondrán» refleja con mayor naturalidad las cláusulas indirectas introducidas por τί que «por lo que comerán ... por lo que vestirán».
