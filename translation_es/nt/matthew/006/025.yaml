translation:
  language: es
  text: 'Por tanto, les digo[a]: no se preocupen por su vida, qué comerán, ni por su cuerpo, qué se pondrán. ¿No es la vida más que el alimento y el cuerpo más que la vestimenta?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma» para ψυχή, aunque aquí el contexto de comer y vestirse favorece «vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa bien la relación inferencial con lo anterior y suena natural en español sin perder el valor lógico de conclusión.
- source_word: μεριμνᾶτε
  english_pob_choice: do not worry
  chosen_spanish: no se preocupen
  alternatives_spanish:
  - no se angustien
  - no estén ansiosos
  lexicon: BDAG
  rationale: En este contexto el verbo apunta a la preocupación ansiosa por necesidades materiales; 'no se preocupen' comunica la prohibición de forma clara y idiomática en español.
- source_word: ψυχῇ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: BDAG
  rationale: El contexto inmediato trata de comida y vestido; por eso ψυχή aquí significa la vida concreta de la persona, no 'alma' en sentido dualista. 'Vida' preserva ese contraste.
- source_word: τί φάγητε
  english_pob_choice: what you will eat
  chosen_spanish: por lo que comerán
  alternatives_spanish:
  - qué comerán
  - lo que hayan de comer
  lexicon: BDAG
  rationale: El giro de preocupación indirecta se expresa de forma natural con una subordinada en español; 'por lo que comerán' conserva el matiz de inquietud por la provisión futura.
- source_word: σώματι
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: BDAG
  rationale: Término literal para el cuerpo físico en contraste con la ropa.
- source_word: τί ἐνδύσησθε
  english_pob_choice: what you will wear
  chosen_spanish: por lo que vestirán
  alternatives_spanish:
  - qué se pondrán
  - qué vestirán
  lexicon: BDAG
  rationale: '''Vestirán'' es una equivalencia natural para la acción de ponerse ropa y mantiene el paralelismo con ''comerán''.'
- source_word: οὐχὶ
  english_pob_choice: Is not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es
  lexicon: BDAG
  rationale: Introduce una pregunta retórica que espera respuesta afirmativa; '¿No es…?' reproduce bien la fuerza del griego.
- source_word: πλεῖόν
  english_pob_choice: more than
  chosen_spanish: más que
  alternatives_spanish:
  - mayor que
  lexicon: BDAG
  rationale: Comparativo directo y natural en español, adecuado para la sentencia retórica.
- source_word: τροφῆς
  english_pob_choice: food
  chosen_spanish: el alimento
  alternatives_spanish:
  - la comida
  - el sustento
  lexicon: BDAG
  rationale: '''Alimento'' mantiene un registro digno y general, cercano a ''food'' sin reducirlo a una comida concreta.'
- source_word: ἐνδύματος
  english_pob_choice: clothing
  chosen_spanish: la ropa
  alternatives_spanish:
  - el vestido
  - la vestimenta
  lexicon: BDAG
  rationale: '''Ropa'' es la opción más natural y ampliamente entendible en español para el paralelo con ''alimento''.'
theological_decisions:
- issue: Sentido de ψυχή en la enseñanza de Jesús
  english_pob_reading: Rendered as 'life' rather than 'soul'
  chosen_spanish_reading: Traducir ψυχή como 'vida' y no como 'alma'
  alternative_spanish_readings:
  - alma
  rationale: El contexto contrasta ψυχή con comida y el cuerpo con ropa. En español, 'vida' evita imponer una lectura antropológica ajena al pasaje y conserva la fuerza concreta del argumento de Jesús.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura ya estabilizada del inglés POB y su nota sobre ψυχή; no se introducen cambios sustantivos respecto al sentido auditado. Se mantiene el paralelismo de las dos preguntas y la relación inferencial inicial.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος en sentido divino directo.
  - Se eligió 'vida' para ψυχή por el contexto inmediato de necesidades materiales, alineado con el audit trail en inglés.
  - Se evitó 'alma' en el cuerpo del texto para no cargar el versículo con una tensión doctrinal que el contexto no exige, pero se preserva en nota como alternativa lexical.
  - '''No se preocupen'' comunica μεριμνᾶτε con naturalidad y mantiene el matiz de ansiedad/provisión sin debilitar la exhortación.'
