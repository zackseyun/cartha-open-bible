    text: Or 'do not babble' or 'do not use meaningless repetition.' The Greek verb is rare and likely refers to empty, mechanical, or verbose speech rather than sincere repeated prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'pagans.' The Greek literally refers to the Gentiles, that is, the nations outside the covenant people.
    reason: lexical_alternative
