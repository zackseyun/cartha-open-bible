translation:
  language: es
  text: Y cuando oren[a], no amontonen palabras vacías como los gentiles[b], porque piensan que serán oídos por sus muchas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no balbuceen" o "no usen repetición sin sentido". El verbo griego es raro y probablemente se refiere a un hablar vacío, mecánico o verboso, más que a la oración repetida con sinceridad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "paganos". El griego dice literalmente "los gentiles", es decir, las naciones fuera del pueblo del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσευχόμενοι
  english_pob_choice: when you pray
  chosen_spanish: Y cuando oren
  alternatives_spanish:
  - Y mientras oran
  - Y al orar
  lexicon: BDAG
  rationale: El participio adverbial introduce la circunstancia de la instrucción; 'cuando oren' suena natural en español y mantiene el valor circunstancial sin volverlo demasiado literal.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ marca continuidad en la enseñanza de Jesús; 'Y' conserva el flujo sin exagerar contraste.
- source_word: μὴ βατταλογήσητε
  english_pob_choice: do not heap up empty words
  chosen_spanish: no amontonen palabras vacías
  alternatives_spanish:
  - no balbuceen
  - no repitan sin sentido
  - no hablen mecánicamente
  lexicon: BDAG
  rationale: βατταλογέω es raro y apunta a discurso verboso, mecánico o vacío. 'Amontonen palabras vacías' comunica exceso y falta de sustancia, y evita condenar toda repetición sincera en la oración.
- source_word: ὥσπερ οἱ ἐθνικοί
  english_pob_choice: like the Gentiles
  chosen_spanish: como los gentiles
  alternatives_spanish:
  - como los paganos
  - como las naciones
  lexicon: BDAG
  rationale: En este contexto judío, ἐθνικοί se refiere a quienes están fuera del pueblo del pacto. 'Gentiles' conserva mejor esa referencia que 'paganos', que sería más interpretativo.
- source_word: δοκοῦσιν
  english_pob_choice: they think
  chosen_spanish: piensan
  alternatives_spanish:
  - suponen
  - imaginan
  lexicon: BDAG
  rationale: δοκέω expresa la suposición que ellos tienen sobre la eficacia de la oración; 'piensan' es claro y natural.
- source_word: ἐν τῇ πολυλογίᾳ αὐτῶν
  english_pob_choice: because of their many words
  chosen_spanish: por su mucho hablar
  alternatives_spanish:
  - por sus muchas palabras
  - por su verbosidad
  - por hablar mucho
  lexicon: BDAG
  rationale: πολυλογία denota mucho hablar o verbosidad. 'Por su mucho hablar' expresa la base equivocada de su expectativa de ser oídos sin sonar excesivamente técnico.
- source_word: εἰσακουσθήσονται
  english_pob_choice: they will be heard
  chosen_spanish: serán oídos
  alternatives_spanish:
  - serán escuchados
  - recibirán respuesta
  lexicon: BDAG
  rationale: El pasivo significa ser oído favorablemente o recibir audiencia. 'Serán oídos' conserva la fuerza del original sin añadir explícitamente la idea de respuesta.
theological_decisions:
- issue: Si Jesús prohíbe toda repetición en la oración o la verbosidad vacía
  english_pob_reading: The main text renders βατταλογήσητε as 'heap up empty words,' indicating a prohibition of empty verbosity rather than all repeated prayer.
  chosen_spanish_reading: '''No amontonen palabras vacías'' señala una prohibición de la verbosidad vacía, no de toda repetición en oración.'
  alternative_spanish_readings:
  - no repitan sin sentido
  - no balbuceen
  rationale: 'La elección preserva la tensión teológica documentada: el versículo critica el hablar vacío o mecánico como medio para forzar la atención divina, no la repetición ferviente en sí misma.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el borrador se alinea con el texto griego SBLGNT y con el audit trail inglés, con consenso alto en los controles de revisión.
  spanish_consistency_notes:
  - Se mantuvo 'gentiles' para ἐθνικοί, de acuerdo con el contexto judío del pasaje.
  - Se evitó 'SEÑOR' porque no aparece el nombre divino en este versículo.
  - '''Serán oídos'' conserva la pasiva sin añadir ''responderá'', que sería una interpretación adicional.'
