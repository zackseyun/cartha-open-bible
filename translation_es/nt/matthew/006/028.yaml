revisions:
- from: '¿Y por la ropa, por qué están preocupados? Consideren los lirios del campo[a], cómo crecen: no trabajan ni hilan.'
  to: '¿Y por la ropa, por qué se preocupan[a]? Consideren[b] los lirios del campo[c], cómo crecen: no trabajan ni hilan.'
  rationale: Se ajusta la pregunta inicial a 'se preocupan' para reflejar mejor el presente verbal de μεριμνᾶτε en español idiomático, manteniendo el tema de la ansiedad por la provisión. Se conservan 'ropa', 'lirios del campo', 'crecen', 'trabajan' e 'hilan' por fidelidad y naturalidad. Se añaden las notas léxicas significativas que el POB inglés ya documentó para μεριμνάω y καταμάθετε, y se mantiene la nota sobre 'lirios/flores silvestres' con marcadores únicos y anclados en el texto.
