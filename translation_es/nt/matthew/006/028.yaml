    rationale: El encargo pide preservar alternativas significativas cuando el POB inglés las documentó. Aquí ya existe una nota para 'lirios/flores silvestres', pero no para 'worry' ni para 'consider/observe closely', que siguen siendo relevantes también en español.
  - severity: low
