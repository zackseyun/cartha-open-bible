    issue: La formulación '¿por qué están preocupados?' debilita ligeramente el valor verbal directo de τί μεριμνᾶτε.
    rationale: El griego usa un presente verbal activo dirigido a la conducta continua. En español, '¿por qué se preocupan?' suena más directo, más idiomático y más cercano a la alternativa documentada 'why do you worry', sin perder el matiz de ansiedad contextual.
  - severity: medium
