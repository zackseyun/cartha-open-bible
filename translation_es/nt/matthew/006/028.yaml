translation:
  language: es
  text: '¿Y por la ropa, por qué se preocupan[a]? Consideren[b] los lirios del campo[c], cómo crecen: no trabajan ni hilan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿por qué están preocupados por la ropa?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «observen atentamente» o «consideren bien» los lirios del campo.'
    reason: lexical_alternative
  - marker: c
    text: Algunos entienden «lirios» más ampliamente como «flores silvestres».
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ ἐνδύματος
  english_pob_choice: about clothing
  chosen_spanish: por la ropa
  alternatives_spanish:
  - sobre la ropa
  - acerca de la ropa
  - por la vestimenta
  lexicon: BDAG; ἔνδυμα
  rationale: El griego expresa la esfera o tema de la preocupación. En español, 'por la ropa' comunica con naturalidad la inquietud material sin volverlo demasiado técnico. 'Vestimenta' sería más formal, pero menos cotidiano; 'ropa' conserva la referencia general a la provisión.
- source_word: τί μεριμνᾶτε
  english_pob_choice: why are you anxious
  chosen_spanish: ¿por qué están preocupados?
  alternatives_spanish:
  - ¿por qué se angustian?
  - ¿por qué se preocupan?
  - ¿por qué están ansiosos?
  lexicon: BDAG; μεριμνάω
  rationale: El verbo en este contexto apunta a una inquietud interior por la provisión. 'Están preocupados' es natural en español y mantiene el tono interrogativo. 'Ansiosos' sería más literal para la carga emocional, pero puede sonar menos idiomático; 'se angustian' intensifica demasiado.
- source_word: καταμάθετε
  english_pob_choice: consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Observen atentamente
  - Aprendan de
  - Miren bien
  lexicon: BDAG; καταμανθάνω
  rationale: El imperativo pide una observación reflexiva que lleve a entender. 'Consideren' es la forma más directa y sobria en español, y permite la misma invitación a fijarse en el ejemplo creado sin sobretraducir con una intensificación innecesaria.
- source_word: τὰ κρίνα τοῦ ἀγροῦ
  english_pob_choice: the lilies of the field
  chosen_spanish: los lirios del campo
  alternatives_spanish:
  - las flores silvestres del campo
  - los lirios de los campos
  - las flores del campo
  lexicon: BDAG; κρίνον
  rationale: '''Lirios'' es la correspondencia léxica más directa para κρίνα, y el genitivo se expresa naturalmente como ''del campo''. Se conserva la imagen tradicional y concreta; se menciona la alternativa amplia en nota porque algunos intérpretes entienden el término en sentido más general.'
- source_word: πῶς αὐξάνουσιν
  english_pob_choice: how they grow
  chosen_spanish: cómo crecen
  alternatives_spanish:
  - cómo aumentan
  - cómo florecen
  - de qué manera crecen
  lexicon: BDAG; αὐξάνω
  rationale: El verbo describe crecimiento natural. 'Crecen' es el equivalente más claro y breve en español, y mantiene el foco en el modo observable del crecimiento.
- source_word: οὐ κοπιῶσιν
  english_pob_choice: they do not labor
  chosen_spanish: no trabajan
  alternatives_spanish:
  - no se fatigan
  - no laboran
  - no se esfuerzan
  lexicon: BDAG; κοπιάω
  rationale: '''Trabajan'' comunica bien la idea de esfuerzo humano aplicado a producir ropa, y fluye mejor en español junto con ''hilan''. Aunque ''laboran'' es más formal y cercano al matiz de toil, aquí ''trabajan'' suena más natural sin perder el contraste.'
- source_word: οὐδὲ νήθουσιν
  english_pob_choice: nor do they spin
  chosen_spanish: ni hilan
  alternatives_spanish:
  - ni tejen
  - ni hilan hilo
  - ni hacen hilo
  lexicon: BDAG; νήθω
  rationale: '''Hilar'' reproduce el acto de producir hilo o fibra para prendas y encaja mejor con el paralelismo con el vestido. ''Tejen'' sería un paso posterior; ''hilan'' es el verbo más ajustado al sentido básico de νήθω.'
theological_decisions:
- issue: Matiz de la inquietud frente a la ansiedad en una enseñanza sobre provisión
  english_pob_reading: anxious
  chosen_spanish_reading: preocupados
  alternative_spanish_readings:
  - ansiosos
  - angustiados
  - preocupados en exceso
  rationale: El contexto trata de la confianza en la provisión de Dios, no de una simple curiosidad intelectual. 'Preocupados' transmite la carga interna sin sonar excesivamente clínica. Se preserva así el campo semántico de μεριμνάω sin imponer una intensificación que el español pueda leer como diagnóstica.
  doctrine_reference: Mateo 6:25-34; traducción de lectura pastoral y clara sobre la providencia
- issue: '¿Cómo traducir κρίνα: lirios o una categoría más amplia de flores silvestres?'
  english_pob_reading: the lilies of the field
  chosen_spanish_reading: los lirios del campo
  alternative_spanish_readings:
  - las flores silvestres del campo
  - las flores del campo
  rationale: La evidencia léxica favorece 'lirios' como base semántica, aunque algunos amplían el referente a flores silvestres. Mantener 'lirios' respeta la forma más directa del texto, y la posible amplitud se deja documentada sin borrar la tensión interpretativa.
  doctrine_reference: Principio POB de no borrar una alternativa documentada cuando el léxico admite más de una lectura
- issue: 'Valor del imperativo καταμάθετε: observar, considerar o aprender'
  english_pob_reading: consider
  chosen_spanish_reading: Consideren
  alternative_spanish_readings:
  - Observen
  - Aprendan de ellos
  rationale: La forma griega exige atención activa y reflexión. 'Consideren' preserva ese llamado sin volverlo más enfático de lo necesario. 'Observen' subrayaría el acto visual; 'Aprendan de ellos' explicita una inferencia que el versículo implica pero no formula.
  doctrine_reference: Mateo 6:28; economía del imperativo en discurso sapiencial
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del texto griego y la auditoría inglesa revisada, que simplificó 'Consider carefully' a 'Consider'. En español, 'Consideren' mantiene la sobriedad del imperativo y evita intensificación innecesaria. Se conservó 'lirios del campo' como opción principal, dejando registrada la lectura amplia 'flores silvestres' como alternativa documentada.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda a este proyecto; en este versículo no aparece el nombre divino.
  - Se prefirió 'preocupados' para μεριμνάω por naturalidad idiomática, sin borrar el matiz de ansiedad contextual.
  - '''Hilan'' se eligió para νήθω por su ajuste técnico al trabajo de hacer hilo y su paralelismo con la ropa.'
  - No se introdujo 'Cristo' ni otras formas fijas porque el versículo no las requiere.
