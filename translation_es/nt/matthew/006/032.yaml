revisions:
- from: Porque los gentiles buscan todas estas cosas[a]; porque vuestro Padre celestial sabe que necesitan todas estas cosas.
  to: Porque los gentiles buscan todas estas cosas[a][b]; porque su Padre celestial sabe que ustedes necesitan todas estas cosas.
  rationale: 'Se corrigió «necesitan» a «ustedes necesitan» para reflejar fielmente la segunda persona plural de χρῄζετε y mantener el contraste del versículo: los gentiles buscan estas cosas, pero el Padre de los discípulos sabe que ellos las necesitan. También se unificó el registro a «su ... ustedes» para un español neutral latinoamericano y se añadió la nota lexical paralela a la del POB en inglés para ἐπιζητοῦσιν.'
