review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien τὰ ἔθνη como «los gentiles», ἐπιζητοῦσιν como «buscan», y la repetición enfática de «todas estas cosas». Sin embargo, no es fiel en χρῄζετε: el griego es segunda persona plural («ustedes/vosotros necesitan/necesitáis»), dirigido a los discípulos, no tercera persona plural («necesitan») referida a los gentiles. Ese cambio altera el sentido y rompe el contraste del versículo.'
  spanish_quality_summary: El español es claro y legible, pero «vuestro ... necesitan» mezcla registros de segunda persona con una forma verbal de tercera persona, lo cual suena gramatical y discursivamente inconsistente. Conviene unificar el tratamiento y conservar la segunda persona del original. Para español neutral eclesial, «su Padre celestial sabe que ustedes necesitan todas estas cosas» es natural y claro.
  glossary_alignment: «Los gentiles» está bien alineado con la decisión POB para τὰ ἔθνη. «Padre celestial» y «sabe» también son adecuados. No hay términos del glosario mayor en conflicto. La corrección principal es mantener χρῄζετε en segunda persona.
  issues:
  - severity: high
    issue: χρῄζετε fue traducido como tercera persona plural («necesitan») en vez de segunda persona plural.
    rationale: 'El verbo griego está en 2PAI-P y se refiere a los discípulos: «su/vuestro Padre celestial sabe que ustedes/vosotros necesitan...». Cambiarlo a tercera persona hace que el Padre se refiera a las necesidades de los gentiles, lo cual contradice el texto.'
  - severity: medium
    issue: 'Inconsistencia de tratamiento pronominal: «vuestro Padre» con «necesitan».'
    rationale: La mezcla de segunda persona posesiva con tercera persona verbal perjudica la naturalidad y la cohesión en español. Debe unificarse en segunda persona.
  - severity: low
    issue: Falta la nota lexical alternativa para ἐπιζητοῦσιν presente en el POB en inglés.
    rationale: El inglés preserva una nota para el matiz de búsqueda insistente («seek after/strive after»). No es imprescindible para entender el texto, pero sí conviene conservarla para reflejar el rastro auditado.
  revised_spanish_text: Porque los gentiles buscan todas estas cosas[a][b]; porque su Padre celestial sabe que ustedes necesitan todas estas cosas.
  revised_footnotes:
  - marker: a
    text: O «las naciones» o «los paganos». El término griego puede designar a las naciones en general, pero aquí probablemente se refiere a quienes están fuera del pueblo del pacto.
    reason: alternative_reading
  - marker: b
    text: O «buscan tras» o «se esfuerzan por conseguir». El verbo griego puede sugerir una búsqueda insistente o persistente.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió «necesitan» a «ustedes necesitan» para reflejar fielmente la segunda persona plural de χρῄζετε y mantener el contraste del versículo: los gentiles buscan estas cosas, pero el Padre de los discípulos sabe que ellos las necesitan. También se unificó el registro a «su ... ustedes» para un español neutral latinoamericano y se añadió la nota lexical paralela a la del POB en inglés para ἐπιζητοῦσιν.'
