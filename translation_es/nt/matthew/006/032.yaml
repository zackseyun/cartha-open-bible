translation:
  language: es
  text: Porque los gentiles buscan todas estas cosas[a][b]; porque su Padre celestial sabe que ustedes necesitan todas estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones» o «los paganos». El término griego puede designar a las naciones en general, pero aquí probablemente se refiere a quienes están fuera del pueblo del pacto.
    reason: alternative_reading
  - marker: b
    text: O «buscan tras» o «se esfuerzan por conseguir». El verbo griego puede sugerir una búsqueda insistente o persistente.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los paganos
  lexicon: BDAG
  rationale: En este contexto de Mateo, ἔθνη señala a quienes están fuera del pueblo del pacto en contraste con los discípulos de Jesús. «Los gentiles» conserva esa distinción covenantal y es natural en español bíblico contemporáneo. «Las naciones» es más literal, pero menos idiomático aquí; «los paganos» añade una carga interpretativa no exigida por el texto.
- source_word: ἐπιζητοῦσιν
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan con afán
  - buscan intensamente
  - procuran
  lexicon: BDAG
  rationale: El verbo intensivo ἐπιζητέω puede sugerir búsqueda insistente, pero la revisión del POB en inglés decidió que en este versículo basta «seek». En español, «buscan» comunica el sentido básico sin añadir énfasis no requerido. «Buscan con afán» o «buscan intensamente» serían posibles, pero sobrecargarían el matiz; «procuran» suena menos directo en este paralelismo.
- source_word: ὁ πατὴρ ὑμῶν ὁ οὐράνιος
  english_pob_choice: your heavenly Father
  chosen_spanish: vuestro Padre celestial
  alternatives_spanish:
  - vuestro Padre en los cielos
  - vuestro Padre, el celestial
  lexicon: BDAG
  rationale: La construcción adjetival se vuelve naturalmente en español como «Padre celestial», manteniendo la posesión («vuestro») y la referencia a la esfera celestial. «Vuestro Padre en los cielos» es válido, pero menos conciso; «vuestro Padre, el celestial» resulta menos idiomático.
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - ha sabido
  lexicon: BDAG
  rationale: Aunque οἶδα tiene forma perfecta, su valor es presente. «Sabe» expresa ese presente con naturalidad y evita una formulación más pesada. «Conoce» sería posible, pero aquí «sabe» armoniza mejor con la afirmación de necesidad.
- source_word: χρῄζετε
  english_pob_choice: you need
  chosen_spanish: necesitan
  alternatives_spanish:
  - tienen necesidad de
  - les hace falta
  lexicon: BDAG
  rationale: 'El griego dice literalmente «necesitáis», pero el referente inmediato es «los gentiles» como sujeto del enunciado comparativo; en español, la frase se vuelve más clara si se explicita el sujeto con tercera persona: «necesitan». «Tienen necesidad de» es correcto pero más formal; «les hace falta» suena demasiado coloquial.'
- source_word: πάντα ... ταῦτα ... τούτων ἁπάντων
  english_pob_choice: all these things ... all these things
  chosen_spanish: todas estas cosas ... todas estas cosas
  alternatives_spanish:
  - todo esto ... todo esto
  - todas estas ... todas estas
  lexicon: BDAG
  rationale: Se conserva la repetición enfática del griego y del POB en inglés. «Cosas» es una adición idiomática necesaria en español; «todo esto» sería más resumido, pero perdería la correspondencia explícita con el plural del texto.
- source_word: γὰρ ... γὰρ
  english_pob_choice: For ... for
  chosen_spanish: Porque ... porque
  alternatives_spanish:
  - Pues ... pues
  - Porque ... pues
  lexicon: BDAG
  rationale: El doble γάρ se refleja con «porque» en ambas cláusulas para mantener la cadencia explicativa del griego. «Pues» también sería posible, pero «porque» suena más directo y claro en español moderno.
theological_decisions:
- issue: Referente de τὰ ἔθνη
  english_pob_reading: Rendered as 'the Gentiles' to preserve the covenantal contrast between Jesus' disciples and the surrounding nations, without implying an absolute moral judgment on all non-Jews.
  chosen_spanish_reading: «Los gentiles» conserva el contraste entre los discípulos de Jesús y quienes están fuera del pueblo del pacto, sin convertir el término en una condena absoluta de todos los no judíos.
  alternative_spanish_readings:
  - los paganos
  - las naciones
  rationale: La decisión sigue el valor contextual de ἔθνη en Mateo y evita tanto la neutralización excesiva como el matiz peyorativo añadido que podría traer «paganos».
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Relación entre la necesidad humana y el conocimiento del Padre
  english_pob_reading: for your heavenly Father knows that you need all these things
  chosen_spanish_reading: «vuestro Padre celestial sabe que necesitan todas estas cosas» mantiene el contraste entre la búsqueda de los gentiles y el conocimiento providente del Padre.
  alternative_spanish_readings:
  - vuestro Padre celestial conoce que necesitan todas estas cosas
  - vuestro Padre celestial sabe que tenéis necesidad de todas estas cosas
  rationale: 'El texto no solo informa, sino que fundamenta la exhortación previa: el Padre conoce la necesidad real de los discípulos. «Sabe» conserva ese hecho de manera simple y directa.'
  doctrine_reference: Providence of God; disciples' trust in the Father
- issue: Sujeto implícito de χρῄζετε
  english_pob_reading: you need
  chosen_spanish_reading: «necesitan» explicita el sujeto en tercera persona para mantener claridad en español sin alterar el contraste del verso.
  alternative_spanish_readings:
  - necesitáis
  - tenéis necesidad de
  rationale: Aunque el griego usa segunda persona plural, el español puede hacer confuso el cambio si se mantiene una forma demasiado dependiente del sujeto implícito. La explicitación responde al flujo natural de la lengua y al referente contextual del sujeto plural mencionado antes.
  doctrine_reference: Spanish clarity under source control
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que eliminó «eagerly» de ἐπιζητοῦσιν. Por eso se evita añadir un intensificador en español y se mantiene un verbo simple («buscan») para no reintroducir énfasis no confirmado por el paso de revisión. También se respeta la repetición del cierre («todas estas cosas») y el doble enlace causal («porque ... porque»).
  spanish_consistency_notes:
  - Se usa «gentiles» para τὰ ἔθνη, en coherencia con la decisión POB inglesa y con el contraste mateano.
  - Se prefiere «Padre celestial» como equivalente natural de ὁ πατὴρ ... ὁ οὐράνιος.
  - Se mantiene «sabe» para οἶδεν, evitando una perífrasis que oscurezca el presente gnómico.
  - Se conserva la repetición de «todas estas cosas» para reflejar la estructura enfática del griego.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni una alusión directa al nombre divino.
