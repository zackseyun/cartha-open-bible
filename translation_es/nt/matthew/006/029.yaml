translation:
  language: es
  text: Pero yo les digo que ni siquiera Salomón, en toda su gloria, se vistió como uno de estos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en todo su esplendor».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: But I tell you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Y yo les digo
  - Ahora les digo
  lexicon: BDAG
  rationale: λέγω con dativo ὑμῖν expresa una declaración dirigida a los oyentes; en español, «les digo» comunica naturalmente el acto de habla. δέ añade contraste o continuación suave, y «Pero» funciona bien para enlazar con la comparación precedente.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - — (implícito)
  lexicon: BDAG
  rationale: Introduce el contenido de lo dicho; «que» mantiene la sintaxis clara y natural en español.
- source_word: οὐδὲ
  english_pob_choice: not even
  chosen_spanish: ni siquiera
  alternatives_spanish:
  - ni aun
  - ni
  lexicon: BDAG
  rationale: 'οὐδέ intensifica la negación. «Ni siquiera» reproduce bien el énfasis: no basta con mencionar a Salomón, pues ni él alcanza la comparación.'
- source_word: Σολομὼν
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Nombre propio en su forma habitual en español bíblico, plenamente reconocible y fiel a la transliteración tradicional.
- source_word: ἐν πάσῃ τῇ δόξῃ αὐτοῦ
  english_pob_choice: in all his glory
  chosen_spanish: en toda su gloria
  alternatives_spanish:
  - en todo su esplendor
  - con toda su gloria
  lexicon: BDAG
  rationale: δόξα aquí denota magnificencia real o esplendor visible. «Gloria» conserva la resonancia bíblica del término, y «toda» reproduce πάσῃ con naturalidad en español.
- source_word: περιεβάλετο
  english_pob_choice: was clothed
  chosen_spanish: se vistió
  alternatives_spanish:
  - fue vestido
  - estaba vestido
  lexicon: BDAG
  rationale: El verbo de περιβάλλω en este contexto apunta a estar vestido o cubierto. «Se vistió» es idiomático en español y conserva la imagen de la vestidura sin forzar un pasivo poco natural.
- source_word: ὡς ἓν τούτων
  english_pob_choice: like one of these
  chosen_spanish: como uno de ellos
  alternatives_spanish:
  - como uno de estas
  - como una de estas
  lexicon: BDAG
  rationale: La referencia inmediata es a los lirios/las flores del contexto; en español, «uno de ellos» resulta natural y mantiene el contraste singular. Dado que el antecedente colectivo en español puede ser masculino genérico para «los lirios», esta elección evita una construcción torpe.
theological_decisions:
- issue: Sentido de δόξα aplicado a Salomón
  english_pob_reading: Rendered as 'glory' with the sense of royal splendor, without importing theological overtones.
  chosen_spanish_reading: «gloria» con sentido de magnificencia o esplendor real, sin cargar el término con un matiz teológico ajeno al contexto.
  alternative_spanish_readings:
  - esplendor
  - majestad
  rationale: El contexto compara la magnificencia humana con la provisión de Dios en la creación. Mantener «gloria» preserva la conexión bíblica del término, mientras la nota lexical aclara que aquí se trata de esplendor real, no de gloria divina.
  doctrine_reference: Principio de primacía del texto original y distinción contextual de sentidos léxicos
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo con la auditoría inglesa es alto y no se registran correcciones adicionales.
  spanish_consistency_notes:
  - Se conservó la intensidad de οὐδὲ con «ni siquiera», en paralelo al valor enfático de la auditoría inglesa.
  - Se eligió «Salomón» como forma bíblica establecida en español, sin reemplazarla por una glosa.
  - «Gloria» se mantuvo por fidelidad léxica y resonancia bíblica, mientras la nota ofrece «esplendor» como alternativa contextual.
  - Se prefirió «se vistió» por naturalidad idiomática, sin perder el valor de la imagen de ser cubierto o adornado.
  - El pronombre «ellos» remite al referente colectivo inmediato del contexto, equivalente funcional de «these» en español bíblico fluido.
