translation:
  language: es
  text: 'Por tanto, no se preocupen[a], diciendo: «¿Qué comeremos, o qué beberemos, o qué vestiremos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no estén ansiosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὖν μεριμνήσητε
  english_pob_choice: Therefore do not worry
  chosen_spanish: Por lo tanto, no se preocupen[a]
  alternatives_spanish:
  - Así que no estén ansiosos[a]
  - Por eso no se afanen[a]
  lexicon: BDAG
  rationale: μεριμνάω aquí expresa la inquietud ansiosa por las necesidades materiales. «No se preocupen» es natural y fiel en español contemporáneo; conserva el matiz de ansiedad sin volver la prohibición absoluta ni demasiado técnica. οὖν se vierte con «Por lo tanto» para reflejar la inferencia del contexto inmediato.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y diciendo
  lexicon: BDAG
  rationale: 'El participio se traduce de forma directa como un gerundio español que expresa la acción acompañante del preocuparse: no se trata solo de pensar, sino de formular estas preguntas.'
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Qué cosa
  lexicon: BDAG
  rationale: τί introduce preguntas directas sobre provisión. «¿Qué?» es la forma natural y más fiel en español.
- source_word: φάγωμεν
  english_pob_choice: will we eat
  chosen_spanish: comeremos
  alternatives_spanish:
  - habremos de comer
  - vamos a comer
  lexicon: BDAG
  rationale: 'El subjuntivo deliberativo se expresa de modo idiomático en español con futuro simple en la pregunta: «¿Qué comeremos?». Mantiene la idea de preocupación por la provisión futura.'
- source_word: πίωμεν
  english_pob_choice: will we drink
  chosen_spanish: beberemos
  alternatives_spanish:
  - habremos de beber
  - vamos a beber
  lexicon: BDAG
  rationale: Paralelo a φάγωμεν, se vierte con futuro simple para conservar la serie de preguntas deliberativas y su tono de inquietud.
- source_word: περιβαλώμεθα
  english_pob_choice: will we wear
  chosen_spanish: vestiremos
  alternatives_spanish:
  - nos pondremos
  - nos cubriremos
  lexicon: BDAG
  rationale: περιβάλλω aquí alude a ponerse ropa. «Vestiremos» es la equivalencia más idiomática y concisa en español; evita una forma reflexiva más pesada sin perder el sentido.
- source_word: ἤ ... ἤ ... ἤ
  english_pob_choice: or ... or ... or
  chosen_spanish: ¿O ...? ¿O ...? ¿O ...?
  alternatives_spanish:
  - o ... o ... o
  lexicon: BDAG
  rationale: Se conserva la repetición disyuntiva del griego para reproducir la serie de tres preguntas y su cadencia retórica.
theological_decisions:
- issue: Alcance de la prohibición frente a la preocupación ansiosa
  english_pob_reading: Render μεριμνήσητε as a prohibition of anxious worry, not a blanket ban on prudent planning.
  chosen_spanish_reading: Se entiende como una prohibición de la preocupación ansiosa, no como una prohibición absoluta de toda previsión responsable.
  alternative_spanish_readings:
  - No se inquieten en absoluto
  - No piensen en esas cosas
  rationale: El contexto inmediato trata de la ansiedad por las necesidades diarias. «No se preocupen» preserva el valor exhortativo sin extender la prohibición más allá de lo que el pasaje sostiene.
  doctrine_reference: Mateo 6:25–34; POB Translation Philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego y con el audit trail inglés: se mantiene la fuerza de la prohibición con un español natural, la secuencia de tres preguntas y la lectura de μεριμνάω como inquietud ansiosa. No se requirieron revisiones adicionales respecto del paquete de referencia.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según las reglas del proyecto; aquí no aparece ningún término divino.
  - Se mantiene «preocupen» como equivalente principal de μεριμνάω por fidelidad contextual y claridad idiomática.
  - Se optó por futuro simple en las preguntas deliberativas para sonar natural en español sin perder el matiz de provisión futura.
  - La nota al pie marca la alternativa lexical documentada para μεριμνάω y no introduce una variante doctrinal.
