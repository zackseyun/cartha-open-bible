review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del griego: la prohibición de la preocupación ansiosa, el participio acompañante «diciendo» y la serie triple de preguntas sobre comida, bebida y vestido. Sin embargo, la puntuación española de las preguntas con «o» no es idiomática ni refleja con claridad la coordinación natural en español.'
  spanish_quality_summary: «No se preocupen[a]» es natural, fiel y de buena legibilidad eclesial. «Por lo tanto» también funciona. El problema principal está en «¿Qué comeremos? ¿O qué beberemos? ¿O qué vestiremos?», que suena calcado; en español debe coordinarse mejor dentro de una sola secuencia interrogativa o sin repetir el signo de apertura antes de cada «o».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preferencia por lenguaje claro y natural. La elección «no se preocupen» concuerda con la decisión léxica del POB para μεριμνάω, y la nota «no estén ansiosos» preserva la alternativa documentada.
  issues:
  - severity: medium
    issue: Puntuación y coordinación no idiomáticas de las tres preguntas con «o»
    rationale: 'El griego repite ἤ en serie, pero en español «¿O qué beberemos? ¿O qué vestiremos?» dentro de comillas suena forzado. La forma más natural y fiel es una sola pregunta compuesta: «¿Qué comeremos, o qué beberemos, o qué vestiremos?».'
  - severity: low
    issue: Marcado discursivo algo pesado en «Por lo tanto»
    rationale: No es incorrecto, pero «Por tanto» suele sonar más natural y digno en registro bíblico contemporáneo. Aun así, esto es estilístico, no un error de fidelidad.
  revised_spanish_text: 'Por tanto, no se preocupen[a], diciendo: «¿Qué comeremos, o qué beberemos, o qué vestiremos?»'
