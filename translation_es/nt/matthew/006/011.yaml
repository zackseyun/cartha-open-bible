translation:
  language: es
  text: Danos hoy nuestro pan de cada día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestro pan para hoy», «nuestro pan para el día que viene» o «el pan que necesitamos». El adjetivo griego ἐπιούσιος es raro y su sentido preciso es debatido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: BDAG
  rationale: ἄρτος significa literalmente 'bread'. En español, 'pan' preserva la imagen concreta y tradicional de la petición, con naturalidad idiomática en la oración del Señor. Aunque puede entenderse más ampliamente como sustento, el texto no obliga a generalizarlo en la línea principal.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma directa con 'nuestro', manteniendo la relación posesiva simple del griego.
- source_word: ἐπιούσιον
  english_pob_choice: daily
  chosen_spanish: de cada día
  alternatives_spanish:
  - para hoy
  - para el día de hoy
  - necesario para vivir
  - del día que viene
  lexicon: BDAG
  rationale: ἐπιούσιος es raro y su sentido exacto es debatido. 'De cada día' comunica bien en español la idea de provisión cotidiana y dependencia continua, sin fijar una reconstrucción demasiado específica. Mantiene la tensión lexical documentada en el POB inglés.
- source_word: δὸς
  english_pob_choice: Give
  chosen_spanish: Danos
  alternatives_spanish:
  - Concédenos
  - Danos
  lexicon: BDAG
  rationale: El imperativo aoristo de δίδωμι se traduce de manera natural con el imperativo español 'Danos'. Es directo, sobrio y propio de una súplica.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con el pronombre clítico 'nos' en español.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - hoy mismo
  lexicon: BDAG
  rationale: σήμερον significa 'today'. 'Hoy' es la forma más natural y clara en español contemporáneo, conservando el valor temporal inmediato del griego.
theological_decisions:
- issue: Sentido de ἐπιούσιον en la petición del pan
  english_pob_reading: daily
  chosen_spanish_reading: de cada día
  alternative_spanish_readings:
  - para hoy
  - para el día de hoy
  - necesario para vivir
  rationale: La palabra griega es notoriamente difícil y puede referirse al pan del día presente, al necesario para subsistir, o a una provisión cotidiana. 'De cada día' evita cerrar indebidamente el debate, pero sigue expresando la dependencia diaria del creyente en Dios, en línea con la filosofía POB de preservar tensiones léxicas reales.
  doctrine_reference: Translation philosophy §3 (Preservar la tensión teológica en vez de resolverla)
- issue: Relación entre la imagen concreta de 'pan' y su posible extensión a provisión
  english_pob_reading: bread
  chosen_spanish_reading: pan
  alternative_spanish_readings:
  - alimento
  - comida
  - sustento
  rationale: La imagen concreta de 'pan' se conserva porque el griego usa ἄρτος y la petición pertenece al lenguaje simple de dependencia material. Traducirlo como un término más general diluiría la concreción del texto sin necesidad.
  doctrine_reference: Doctrine of biblical imagery and prayer language (POB translation principles)
translation_notes:
  revision_awareness: El audit trail inglés conserva la ambigüedad de ἐπιούσιος con nota de alternativas; la versión española refleja esa misma cautela sin sobreinterpretar el término. No hay revisiones aplicadas en el paquete fuente, y el consenso de revisión es de alta concordancia.
  spanish_consistency_notes:
  - Se siguió la terminología POB de traducir directamente el sentido lexical con un español moderno y sobrio.
  - Se evitó 'SEÑOR' u otros reemplazos no pertinentes porque este versículo no contiene el Nombre divino.
  - La nota se ancla en 'de cada día' para reflejar la alternativa lexical sin interrumpir la lectura fluida del texto principal.
