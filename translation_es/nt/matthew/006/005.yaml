translation:
  language: es
  text: Y cuando[a] oren, no sean como los hipócritas, porque aman estar de pie y orar en las sinagogas y en las esquinas de las calles anchas,[b] para que sean vistos por la gente.[c] En verdad les digo, ya recibieron su recompensa.[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada vez que». El griego expresa una situación temporal indefinida y recurrente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en las esquinas». El griego dice más literalmente «en las esquinas de las calles anchas».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por las personas». El término griego aquí se refiere genéricamente a seres humanos.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «tienen su recompensa». El verbo griego puede llevar el sentido de haber recibido el pago correspondiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν / προσεύχησθε
  english_pob_choice: whenever you pray
  chosen_spanish: y cuando oren
  alternatives_spanish:
  - y cada vez que oren
  - y cuando estén orando
  lexicon: BDAG
  rationale: ὅταν con subjuntivo expresa situación indefinida o recurrente; en español, «cuando» comunica bien ese valor general sin volver la frase pesada. El subjuntivo «oren» mantiene la fuerza exhortativa y la generalidad del mandato.
- source_word: οὐκ ἔσεσθε ὡς οἱ ὑποκριταί
  english_pob_choice: you shall not be like the hypocrites
  chosen_spanish: no sean como los hipócritas
  alternatives_spanish:
  - no serán como los hipócritas
  - no deben ser como los hipócritas
  lexicon: BDAG
  rationale: El futuro con valor prohibitivo en griego se vierte naturalmente en español con un imperativo negativo. «Hipócritas» es el equivalente idiomático y preciso para ὑποκριταί en este contexto de piedad fingida.
- source_word: φιλοῦσιν
  english_pob_choice: they love
  chosen_spanish: les gusta
  alternatives_spanish:
  - aman
  - encuentran placer en
  lexicon: BDAG
  rationale: El verbo expresa inclinación voluntaria y preferencia, pero en español «les gusta» comunica mejor el matiz de deleite habitual sin sonar excesivamente psicológico o moralizante. Mantiene la idea de una práctica preferida.
- source_word: ἐν ταῖς συναγωγαῖς
  english_pob_choice: in the synagogues
  chosen_spanish: en las sinagogas
  alternatives_spanish:
  - en las reuniones
  - en los lugares de reunión
  lexicon: BDAG
  rationale: «Sinagogas» preserva la referencia institucional e histórica del texto judío. Traducirlo de forma más general borraría una especificidad contextual que el griego sí conserva.
- source_word: ἐν ταῖς γωνίαις τῶν πλατειῶν
  english_pob_choice: on the corners of the broad streets
  chosen_spanish: en las esquinas de las calles anchas
  alternatives_spanish:
  - en las esquinas de las calles principales
  - en los cruces de las calles
  lexicon: BDAG
  rationale: 'Se mantiene la imagen espacial del griego: esquinas de vías públicas amplias. «Calles anchas» reproduce la literalidad de πλατείαις, aunque en español suene menos idiomático que «calles principales»; se conserva así la textura del original.'
- source_word: ἑστῶτες προσεύχεσθαι
  english_pob_choice: to stand and pray
  chosen_spanish: ponerse de pie y orar
  alternatives_spanish:
  - estar de pie y orar
  - orar de pie
  lexicon: BDAG
  rationale: La secuencia verbal del griego indica la postura asociada a la acción. «Ponerse de pie y orar» refleja ese gesto de manera natural en español y mantiene el énfasis en la exhibición pública.
- source_word: ὅπως φανῶσιν τοῖς ἀνθρώποις
  english_pob_choice: so that they may be seen by people
  chosen_spanish: para que sean vistos por la gente
  alternatives_spanish:
  - para que los vean las personas
  - a fin de que aparezcan ante la gente
  lexicon: BDAG
  rationale: «Ser vistos» conserva la pasiva del griego y la intención de aparecer ante observadores. «La gente» traduce de modo inclusivo el valor genérico de τοῖς ἀνθρώποις, sin restringirlo a varones.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: De cierto les digo
  alternatives_spanish:
  - Amén les digo
  - En verdad les digo
  lexicon: BDAG
  rationale: «De cierto les digo» es una fórmula solemne, natural en español bíblico y fiel a la función discursiva de ἀμήν λέγω ὑμῖν. Se evita «Amén» en el cuerpo porque en español puede sonar menos directo como marcador de énfasis introductorio.
- source_word: ἀπέχουσι τὸν μισθὸν αὐτῶν
  english_pob_choice: they have received their reward
  chosen_spanish: ya recibieron su recompensa
  alternatives_spanish:
  - ya tienen su recompensa
  - han recibido su paga
  lexicon: BDAG
  rationale: ἀπέχω aquí tiene sentido de «recibir en pago/recibir plenamente». «Ya recibieron su recompensa» comunica que la retribución ya fue cobrada en esta vida, sin añadir explícitamente «en plena medida» que el texto griego no formula de manera directa en esta forma del pasaje.
theological_decisions:
- issue: Valor genérico de τοῖς ἀνθρώποις
  english_pob_reading: people
  chosen_spanish_reading: la gente
  alternative_spanish_readings:
  - los hombres
  - las personas
  rationale: El griego usa un plural masculino con sentido genérico para observadores humanos. «La gente» preserva ese valor inclusivo y evita introducir una lectura exclusivamente masculina.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tensión entre recompensa visible y recompensa verdadera
  english_pob_reading: they have received their reward
  chosen_spanish_reading: ya recibieron su recompensa
  alternative_spanish_readings:
  - ya tienen su recompensa
  - ya recibieron su paga
  rationale: 'La frase comunica la advertencia moral del pasaje: la aprobación pública constituye la única remuneración que buscaron. «Ya recibieron» conserva el carácter conclusivo del verbo sin intensificarlo con una explicación interpretativa adicional.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Corte interpretativo de ἀμὴν λέγω ὑμῖν
  english_pob_reading: Truly I say to you
  chosen_spanish_reading: De cierto les digo
  alternative_spanish_readings:
  - Amén les digo
  - En verdad les digo
  rationale: La fórmula mantiene la solemnidad y autoridad de Jesús sin alterar el contenido doctrinal. «De cierto» es una solución tradicional comprensible en español bíblico contemporáneo.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del archivo inglés: conserva el orden «ponererse de pie y orar», mantiene la referencia concreta a las sinagogas y a las esquinas de las calles anchas, traduce τοῖς ἀνθρώποις con un término genérico inclusivo, y refleja ἀπέχουσι como una recompensa ya recibida sin añadir glosas como «en plenitud». También toma en cuenta la revisión inglesa que retiró «in full» por no estar explícito en la forma final del texto base.'
  spanish_consistency_notes:
  - Se usa «orar» en lugar de «rezar» para mantener consistencia con el registro bíblico del proyecto.
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Hipócritas» se mantiene por ser el equivalente lexical más establecido y preciso.
  - «La gente» funciona como genérico inclusivo para ἀνθρώποις y armoniza con el estilo del proyecto.
  - La puntuación refleja una cadencia bíblica moderna y legible en español.
