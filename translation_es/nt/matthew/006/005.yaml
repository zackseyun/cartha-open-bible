  text: Καὶ ὅταν ⸂προσεύχησθε, οὐκ ἔσεσθε ὡς⸃ οἱ ὑποκριταί· ὅτι φιλοῦσιν ἐν ταῖς συναγωγαῖς καὶ ἐν ταῖς γωνίαις τῶν πλατειῶν ἑστῶτες προσεύχεσθαι, ⸀ὅπως φανῶσιν τοῖς ἀνθρώποις· ἀμὴν λέγω ⸀ὑμῖν, ἀπέχουσι τὸν μισθὸν αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/005.yaml
  text: And whenever you pray[a], you shall not be like the hypocrites, because they love to stand and pray in the synagogues and on the corners of the broad streets, so that they may be seen by people. Truly I say to you[c][b], they have received their reward.
  footnotes:
  - marker: a
    text: 'Or: "on the street corners." The Greek more literally says "on the corners of the broad streets."'
    reason: lexical_alternative
  - marker: b
    text: 'Or: "so that they may be seen by men." The Greek term here refers generically to people.'
    reason: lexical_alternative
  - marker: c
    text: 'Or: "they have their reward." The Greek verb can carry the sense of receiving payment in full.'
    reason: lexical_alternative
