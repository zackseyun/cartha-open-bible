revisions:
- from: Y cuando oren[a], no sean como los hipócritas, porque les gusta ponerse de pie y orar en las sinagogas y en las esquinas de las calles anchas, para que[b] sean vistos por la gente. De cierto les digo[c], ya recibieron su recompensa.
  to: Y cuando[a] oren, no sean como los hipócritas, porque aman estar de pie y orar en las sinagogas y en las esquinas de las calles anchas,[b] para que sean vistos por la gente.[c] En verdad les digo, ya recibieron su recompensa.[d]
  rationale: Se corrigió la fuerza léxica de φιλοῦσιν («aman»), la precisión aspectual/postural de ἑστῶτες («estar de pie»), y el registro de ἀμὴν λέγω ὑμῖν («En verdad les digo»). También se reordenaron y reemplazaron las notas para alinearlas con los puntos realmente significativos del texto fuente y con el aparato del POB inglés, incluyendo la alternativa sobre «calles anchas», el valor genérico de ἀνθρώποις y la posibilidad de «tienen su recompensa».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:00:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: la prohibición, la referencia a las sinagogas y esquinas, el propósito de ser vistos y la idea de que ya recibieron su recompensa. Sin embargo, hay varios ajustes de fidelidad fina: ὅταν se refleja mejor como «cuando/cada vez que» sin necesidad de nota en el cuerpo; φιλοῦσιν es más fuerte que «les gusta»; ἑστῶτες se expresa mejor como «estar de pie» que «ponerse de pie», ya que el énfasis es la postura pública, no el acto de levantarse; y la nota [a] quedó mal anclada, porque comenta la temporalidad de «cuando», no «oren».'
  spanish_quality_summary: 'El español es claro y legible, pero mezcla registro bíblico tradicional («De cierto les digo») con formulaciones más naturales modernas. «En verdad les digo» suena más digno y contemporáneo en español eclesial amplio. «La gente» es comprensible, pero «las personas» o «la gente» ambas sirven; aquí puede mantenerse «la gente». También conviene simplificar el aparato de notas: la nota sobre «para que» es innecesaria, y la de «De cierto» puede mantenerse como alternativa tradicional o eliminarse según economía editorial.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hipócritas», «sinagogas», «orar», «recompensa» y el valor genérico de ἀνθρώποις están bien manejados. La principal cuestión léxica es fortalecer φιλοῦσιν a «aman» y afinar ἑστῶτες a «estar de pie».
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «oren» pero explica «cada vez que», que corresponde a «cuando».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, el lector puede entender erróneamente que la alternativa afecta al verbo, no a la construcción temporal completa.
  - severity: medium
    issue: «Les gusta» debilita φιλοῦσιν.
    rationale: El griego expresa una preferencia fuerte o complacencia deliberada; «aman» preserva mejor la fuerza semántica y el tono de denuncia del pasaje.
  - severity: medium
    issue: «Ponerse de pie y orar» desplaza el énfasis de ἑστῶτες.
    rationale: El participio describe la postura en la que oran, no principalmente el movimiento de levantarse. «Estar de pie y orar» o «orar estando de pie» es más preciso.
  - severity: low
    issue: «De cierto les digo» suena más tradicional que el registro meta preferido.
    rationale: No es infiel, pero «En verdad les digo» comunica la solemnidad con español más natural y moderno, en línea con la guía de estilo.
  - severity: low
    issue: La nota [b] sobre «para que» es innecesaria.
    rationale: «Para que» ya expresa propósito claramente en español; la nota no preserva una alternativa significativa del inglés ni resuelve una ambigüedad nueva.
