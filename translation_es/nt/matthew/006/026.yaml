translation:
  language: es
  text: Miren las aves del cielo[a], que no siembran ni siegan ni recogen en graneros, y su Padre celestial las alimenta. ¿No valen ustedes mucho más que ellas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aves del cielo»; más tradicionalmente, «las aves del aire».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψατε
  english_pob_choice: Look at
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren con atención
  - Fíjense en
  - Observen
  lexicon: BDAG
  rationale: El imperativo aoristo pide atención dirigida. «Miren» conserva la fuerza exhortativa de manera natural en español y no añade intensidad no explícita en el griego.
- source_word: πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves[b] del cielo
  alternatives_spanish:
  - las aves del cielo
  - los pájaros del cielo
  - las aves del aire
  lexicon: BDAG
  rationale: «Aves» es un equivalente amplio y digno para πετεινά. «Del cielo» sigue de cerca τοῦ οὐρανοῦ; en español suena natural y mantiene la imagen creada visible. Se evita «aire» por ser menos directo al griego.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la cláusula explicativa dependiente del mandato previo. «Que» refleja la construcción de manera más directa en español que una causal explícita.
- source_word: σπείρουσιν ... θερίζουσιν ... συνάγουσιν
  english_pob_choice: do not sow or reap or gather
  chosen_spanish: no siembran ni siegan ni recogen
  alternatives_spanish:
  - no siembran ni cosechan ni guardan
  - no plantan ni cosechan ni almacenan
  lexicon: BDAG
  rationale: «Sembrar», «segar» y «recoger» conservan la serie agrícola y el paralelismo verbal. «Recogen» comunica bien συνάγω sin forzar un tecnicismo.
- source_word: εἰς ἀποθήκας
  english_pob_choice: into barns
  chosen_spanish: en graneros
  alternatives_spanish:
  - en almacenes
  - en depósitos
  - en trojes
  lexicon: BDAG
  rationale: «Graneros» es la equivalencia más natural y agrícola en español para ἀποθήκας. Aunque el griego dice literalmente «hacia/en depósitos», la imagen idiomática de un lugar donde se guarda el grano queda clara con este término.
- source_word: ὁ πατὴρ ὑμῶν ὁ οὐράνιος
  english_pob_choice: your heavenly Father
  chosen_spanish: su Padre celestial
  alternatives_spanish:
  - su Padre en el cielo
  - su Padre celestial
  - su Padre, el celestial
  lexicon: BDAG
  rationale: «Padre celestial» mantiene el vínculo relacional y el adjetivo calificativo. Se usa «su» porque el discurso se dirige a los oyentes en plural; en español el referente queda claro por el contexto.
- source_word: τρέφει
  english_pob_choice: feeds
  chosen_spanish: las alimenta
  alternatives_spanish:
  - las alimenta y cuida
  - les da de comer
  - las sustenta
  lexicon: BDAG
  rationale: «Alimentar» expresa con precisión τρέφω en este contexto de provisión de comida. El objeto directo femenino plural concuerda con «aves».
- source_word: οὐχ ὑμεῖς μᾶλλον διαφέρετε αὐτῶν;
  english_pob_choice: Are you not of much more value than they are?
  chosen_spanish: ¿No valen ustedes mucho más que ellas?
  alternatives_spanish:
  - ¿No son ustedes de mucho más valor que ellas?
  - ¿No son ustedes mucho más valiosos que ellas?
  lexicon: BDAG
  rationale: διαφέρω aquí expresa superar en valor o importancia. «Valen… mucho más» conserva el comparativo sin imponer una formulación demasiado abstracta; «ellas» retoma naturalmente a las aves.
theological_decisions:
- issue: Valor comparativo de los seres humanos frente a las aves
  english_pob_reading: The verse affirms greater human value in God's care without specifying the doctrinal basis for that value.
  chosen_spanish_reading: El versículo afirma que ustedes valen mucho más que las aves, sin explicar aquí la base doctrinal de ese valor.
  alternative_spanish_readings:
  - El valor humano se debe explícitamente a la imagen de Dios
  - El valor es principalmente relacional dentro del pacto
  rationale: La traducción conserva la comparación y no introduce una explicación teológica que el texto no da. Así se respeta la tensión interpretativa documentada en el audit trail.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés al reflejar la cláusula explicativa con «que» en vez de una causal explícita y al conservar el comparativo de valor sin reducirlo a una simple equivalencia cuantitativa. También mantiene la imagen agrícola con términos naturales en español y evita domesticar el contraste teológico del dicho.
  spanish_consistency_notes:
  - Se mantiene «Padre celestial» como terminología POB consistente con el inglés auditable.
  - «Aves» se usa como término principal, con nota alternativa para «pájaros» y «aves del cielo», preservando el matiz léxico sin perder naturalidad.
  - El comparativo «valen… mucho más» conserva la fuerza de διαφέρετε sin introducir una formulación doctrinal ajena al verso.
  - 'La puntuación reproduce la progresión retórica: mandato, explicación, provisión divina, pregunta retórica final.'
