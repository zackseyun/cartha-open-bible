review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura adversativa y el sentido general del griego: el imperativo presente («acumulen»), el dativo de beneficio («para ustedes»), el contraste con bienes perecederos, y la imagen de ladrones que entran perforando. Sin embargo, hay dos desajustes con el expediente auditado: (1) las notas al pie están invertidas respecto de los anclajes semánticos preservados en inglés; [a] debe acompañar βρῶσις como alternativa «óxido», no ἐν οὐρανῷ, y (2) falta una nota para διορύσσουσιν, donde el POB inglés documenta la imagen literal de “cavar/abrir un boquete”.'
  spanish_quality_summary: El español es claro y legible, con buen registro. «Horadan» es fiel pero algo literario; aun así, en contexto bíblico sigue siendo inteligible. «La descomposición» comunica amplitud semántica, pero «el deterioro» suena más natural para bienes/tesoros y evita una asociación excesiva con putrefacción orgánica. También conviene evitar una nota sobre «en el cielo», porque la nota inglesa no la justifica y la formulación actual («O “en el cielo”») es tautológica.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. Las elecciones clave son mayormente coherentes con el expediente: θησαυρίζετε = «acumulen», θησαυροὺς = «tesoros», κλέπται = «ladrones». La principal corrección es alinear βρῶσις con una nota léxica sobre «óxido/rust» y añadir la nota cultural sobre διορύσσουσιν.'
  issues:
  - severity: high
    issue: Notas al pie mal asignadas
    rationale: En el inglés POB, la nota [a] corresponde a βρῶσις («Or 'rust'»), no a ἐν οὐρανῷ. El borrador coloca [a] en «el cielo», creando una nota no sustentada por el expediente y omitiendo el anclaje correcto.
  - severity: high
    issue: Falta la nota cultural sobre διορύσσουσιν
    rationale: 'El expediente inglés conserva una nota explícita: literalmente «dig through», aludiendo a ladrones que atraviesan paredes. El borrador traduce «horadan» pero no conserva la explicación documentada.'
  - severity: medium
    issue: «Descomposición» suena menos natural que «deterioro» en este contexto
    rationale: Aunque semánticamente posible para βρῶσις, «descomposición» en español suele evocar putrefacción. «Deterioro» mantiene la amplitud de decay sin restringir a metal ni sonar extraño con tesoros, ropa u objetos almacenados.
  - severity: low
    issue: La nota actual sobre «en el cielo» es innecesaria y defectuosa
    rationale: No está respaldada por el audit trail y además dice «O “en el cielo”» sobre un texto que ya dice «en el cielo», lo que resulta tautológico.
  revised_spanish_text: Pero acumulen para ustedes tesoros en el cielo, donde ni la polilla ni el deterioro[a] destruyen, y donde los ladrones no horadan[b] ni roban.
  revised_footnotes:
