translation:
  language: es
  text: Pero acumulen para ustedes tesoros en el cielo, donde ni la polilla ni el deterioro[a] destruyen, y donde los ladrones no horadan[b] ni roban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el óxido». El término griego puede referirse de manera más amplia al deterioro, la corrosión o el consumo destructivo, no solo al óxido metálico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cavan a través» o «abren un boquete», probablemente refiriéndose a ladrones que atravesaban las paredes de una casa.
    reason: cultural_note
lexical_decisions:
- source_word: θησαυρίζετε
  english_pob_choice: store up
  chosen_spanish: acumulen
  alternatives_spanish:
  - guarden
  - atesoren
  lexicon: BDAG
  rationale: El imperativo presente pide una acción continua; en español, «acumulen» comunica bien la idea de reunir tesoros de manera deliberada y progresiva. «Atesoren» preserva más la metáfora, pero suena menos natural en registro general; «guarden» es posible, aunque menos explícito sobre la acumulación.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca contraste con la instrucción anterior; «Pero» conserva con claridad el valor adversativo.
- source_word: ὑμῖν
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí
  - para ustedes mismos
  lexicon: BDAG
  rationale: El dativo de ventaja expresa interés personal en la acción. «Para ustedes» comunica la referencia directa al beneficio propio sin sonar recargado; «para ustedes mismos» sería más enfático, pero menos natural.
- source_word: θησαυροὺς
  english_pob_choice: treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: BDAG
  rationale: El plural se conserva con «tesoros», que reproduce el término metafórico central del pasaje.
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo mismo
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «en el cielo» transmite bien el locativo sin ampliar indebidamente la imagen; «los cielos» podría sonar más semítico, pero menos idiomático.
- source_word: σὴς
  english_pob_choice: moth
  chosen_spanish: la polilla
  alternatives_spanish:
  - la oruga
  - la polilla devoradora
  lexicon: BDAG
  rationale: El insecto destructivo se expresa naturalmente como «polilla». Mantiene el contraste tradicional y claro con lo que corroe o consume.
- source_word: βρῶσις
  english_pob_choice: decay
  chosen_spanish: la descomposición
  alternatives_spanish:
  - el óxido
  - la corrosión
  - el deterioro
  lexicon: BDAG
  rationale: La palabra puede abarcar un proceso de consumo o deterioro, no solo el óxido metálico. «La descomposición» conserva la amplitud del sentido y evita restringir el texto al metal; «el óxido» sería demasiado estrecho.
- source_word: ἀφανίζει
  english_pob_choice: destroys
  chosen_spanish: destruyen
  alternatives_spanish:
  - consumen
  - aniquilan
  - hacen desaparecer
  lexicon: BDAG
  rationale: El verbo indica causar pérdida o desaparición. En español, el plural verbal concuerda con los dos sujetos («la polilla» y «la descomposición») y «destruyen» expresa bien la acción.
- source_word: κλέπται
  english_pob_choice: thieves
  chosen_spanish: los ladrones
  alternatives_spanish:
  - los robadores
  lexicon: BDAG
  rationale: Es la equivalencia estándar y clara para el plural del sustantivo.
- source_word: διορύσσουσιν
  english_pob_choice: break in
  chosen_spanish: horadan
  alternatives_spanish:
  - abren un boquete
  - atraviesan
  - rompen
  lexicon: BDAG
  rationale: El verbo significa literalmente «abrir paso perforando/horadando», con la imagen cultural de entrar por paredes de adobe o barro. «Horadan» conserva mejor el sentido original que «rompen in», aunque el inglés POB optó por «break in» por idiomatismo; aquí se preserva la imagen concreta en español.
- source_word: κλέπτουσιν
  english_pob_choice: steal
  chosen_spanish: roban
  alternatives_spanish:
  - hurtan
  - hurtan y se llevan
  lexicon: BDAG
  rationale: Verbo directo y natural; mantiene el contraste final de la acción delictiva.
theological_decisions:
- issue: Metáfora de los tesoros en el cielo
  english_pob_reading: Retained the metaphor 'treasures in heaven' without interpretive expansion.
  chosen_spanish_reading: Se conserva la metáfora «tesoros en el cielo» sin explicarla como recompensa celestial o riquezas espirituales.
  alternative_spanish_readings:
  - recompensas celestiales
  - riquezas espirituales
  rationale: El texto no especifica un sistema doctrinal de méritos; mantener la metáfora evita sobreinterpretar y preserva la tensión del dicho de Jesús.
  doctrine_reference: Translation philosophy §3
- issue: Alcance de βρῶσις
  english_pob_reading: Rendered broadly as 'decay' rather than specifically 'rust.'
  chosen_spanish_reading: Se traduce de forma amplia como «descomposición», no como «óxido».
  alternative_spanish_readings:
  - óxido
  - corrosión
  rationale: Así se conserva el sentido de deterioro/consumo y no se limita la imagen a materiales metálicos. La oposición teológica entre lo perecedero y lo que no se corrompe queda intacta.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imagen de los ladrones que horadan
  english_pob_reading: Literally 'dig through,' likely referring to thieves breaking through the walls of a house.
  chosen_spanish_reading: Se mantiene la imagen concreta con «horadan», sugiriendo el acceso por paredes perforadas.
  alternative_spanish_readings:
  - rompen
  - abren un boquete
  rationale: La expresión conserva la referencia cultural del original sin diluirla en una frase completamente genérica. Ayuda a que el lector vea la escena doméstica implícita en el verbo griego.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El texto revisa fielmente el paquete fuente y el audit trail inglés; no hubo cambios aplicados en la última pasada, y la traducción mantiene la equivalencia óptima sin ampliar la metáfora ni estrechar indebidamente βρῶσις. Se preservó además la imagen concreta de διορύσσουσιν con una solución española auditable.
  spanish_consistency_notes:
  - Se mantuvo «Dios» y no aparece terminología divina adicional en este versículo.
  - Se conservó el plural metafórico de «tesoros» para reflejar θησαυρούς.
  - «En el cielo»/«en el cielo» se usa de manera coherente con el locativo singular de οὐρανῷ.
  - Se prefirió «polilla» como equivalente natural de σής y «descomposición» para el alcance amplio de βρῶσις.
  - La imagen verbal de διορύσσουσιν quedó visible en «horadan», en lugar de neutralizarse por completo.
