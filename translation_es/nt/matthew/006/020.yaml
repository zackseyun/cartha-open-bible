    text: O «el óxido». El término griego puede referirse de manera más amplia al deterioro, la corrosión o el consumo destructivo, no solo al óxido metálico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cavan a través» o «abren un boquete», probablemente refiriéndose a ladrones que atravesaban las paredes de una casa.
    reason: cultural_note
  revision_rationale: 'La revisión realinea las notas con el expediente inglés y con los anclajes correctos en el texto: βρῶσις recibe la nota léxica sobre «óxido», y διορύσσουσιν recibe la nota cultural sobre perforar paredes. Además, «deterioro» mejora la naturalidad del español sin perder la amplitud semántica de decay. El resto de la redacción puede mantenerse por ser fiel y clara.'
