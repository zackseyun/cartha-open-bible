translation:
  language: es
  text: ¿Y quién de ustedes, por afanarse, puede añadir un codo a su estatura?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "añadir un codo a su vida". El término griego puede significar tanto "edad/tiempo de vida" como "estatura".'
    reason: alternative_reading
lexical_decisions:
- source_word: τίς δὲ ἐξ ὑμῶν
  english_pob_choice: And which of you
  chosen_spanish: ¿Y quién de ustedes
  alternatives_spanish:
  - ¿Y cuál de ustedes?
  - ¿Y quién entre ustedes?
  lexicon: BDAG
  rationale: La pregunta idiomática τίς δὲ ἐξ ὑμῶν se expresa de forma natural con una interrogación colectiva en español. 'Y' refleja la conexión discursiva ligera de δέ, y 'de ustedes' conserva el sentido de ἐξ ὑμῶν sin volver la frase artificial.
- source_word: μεριμνῶν
  english_pob_choice: by being anxious
  chosen_spanish: por estar ansioso
  alternatives_spanish:
  - por preocuparse
  - estando ansioso
  lexicon: BDAG
  rationale: μεριμνῶν describe el estado de afanarse o estar ansioso. 'Por estar ansioso' reproduce la función instrumental o de causa en un español claro, sin suavizar la carga de la palabra.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad. 'Puede' es la equivalencia más natural y directa en español.
- source_word: προσθεῖναι
  english_pob_choice: add
  chosen_spanish: añadir
  alternatives_spanish:
  - agregar
  - sumar
  lexicon: BDAG
  rationale: προστίθημι aquí significa añadir o aumentar. 'Añadir' conserva la imagen concreta del verbo y funciona bien con la medida que sigue.
- source_word: ἐπὶ τὴν ἡλικίαν αὐτοῦ
  english_pob_choice: to his stature
  chosen_spanish: a su estatura
  alternatives_spanish:
  - a su vida
  - a su edad
  - a su tiempo de vida
  lexicon: BDAG
  rationale: ἡλικία puede significar 'estatura' o 'edad/longevidad'. Dado que el audit trail revisó la versión hacia el sentido más literal junto con 'cubit', 'estatura' preserva la imagen medible del dicho. Se mantiene la tensión lexical sin resolverla interpretativamente en el texto principal.
- source_word: πῆχυν ἕνα
  english_pob_choice: one cubit
  chosen_spanish: un codo
  alternatives_spanish:
  - un codo más
  - un solo codo
  lexicon: BDAG
  rationale: πῆχυς es una medida concreta de longitud. 'Un codo' conserva la imagen original en español bíblico comprensible sin convertirla a unidades modernas ni atenuar su concreción.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo griego es masculino singular y genérico. En español, 'su' es la forma natural y mantiene la referencia genérica sin forzar una reexpresión.
theological_decisions:
- issue: Sentido de ἡλικία en esta pregunta retórica
  english_pob_reading: stature
  chosen_spanish_reading: estatura
  alternative_spanish_readings:
  - vida
  - longevidad
  - edad
  rationale: El contexto de una medida corporal y la revisión auditada del POB favorecen conservar el sentido literal posible de 'estatura' en el texto principal. La alternativa de vida/longevidad sigue siendo léxicamente posible, pero se reserva implícitamente sin borrarla mediante una paráfrasis interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4, 5
translation_notes:
  revision_awareness: El audit trail en inglés muestra una revisión importante entre 'lifespan' y 'stature'. Para esta versión española se sigue la decisión revisada que preserva el sentido más literal de ἡλικία junto con la imagen de 'codo', dejando constancia de la alternativa tradicional en una nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma para el tetragrámaton en este proyecto, pero no aplica en este versículo.
  - Se usa 'ansioso' para μεριμνῶν, consistente con el campo semántico documentado de ansiedad/afán.
  - Se conserva la medida 'codo' para πῆχυς en lugar de modernizarla.
  - El posesivo genérico se expresa de modo natural en español con 'su'.
