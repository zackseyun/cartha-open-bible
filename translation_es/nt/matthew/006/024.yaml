translation:
  language: es
  text: Nadie puede servir a dos amos, porque o aborrecerá al uno y amará al otro, o se aferrará a uno y menospreciará al otro. No pueden servir a Dios y a Mamón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «riquezas» o «dinero». El griego usa el préstamo «mamón», que puede personificar las riquezas como un amo rival.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - No uno
  lexicon: BDAG
  rationale: El pronombre negativo universal se expresa de forma natural y precisa con «nadie», que comunica la misma exclusión total que «No one» en inglés.
- source_word: δύναται / δύνασθε
  english_pob_choice: is able / are not able
  chosen_spanish: puede / pueden
  alternatives_spanish:
  - es capaz de / son capaces de
  - puede / no puede
  lexicon: BDAG
  rationale: El griego enfatiza capacidad o posibilidad. En español, «puede» comunica esa capacidad con naturalidad; en la segunda cláusula, el plural «pueden» conserva la fuerza de incapacidad dirigida a los oyentes.
- source_word: δυσὶ κυρίοις
  english_pob_choice: two masters
  chosen_spanish: dos amos
  alternatives_spanish:
  - dos señores
  - dos patrones
  lexicon: BDAG
  rationale: Aunque κύριος suele ser «Señor» por defecto, aquí el contexto de δουλεύειν exige una relación de dominio y servicio. «Amos» reproduce mejor esa relación social y evita la connotación teológica de «Señores».
- source_word: δουλεύειν
  english_pob_choice: to serve / serve
  chosen_spanish: servir
  alternatives_spanish:
  - ser esclavo de
  - estar esclavizado a
  lexicon: BDAG
  rationale: El verbo tiene el sentido de servir en condición de esclavo o siervo sujeto. En español, «servir» mantiene la expresión proverbial de la frase; la noción de subordinación queda reforzada por «amos».
- source_word: μισήσει
  english_pob_choice: will hate
  chosen_spanish: aborrecerá
  alternatives_spanish:
  - odiará
  - menos amará
  lexicon: BDAG
  rationale: «Aborrecerá» conserva un registro digno y fuerte, equivalente al valor antitético del verbo griego en esta sentencia. «Odiará» es posible, pero «aborrecerá» suena más elevado en español bíblico.
- source_word: ἀγαπήσει
  english_pob_choice: will love
  chosen_spanish: amará
  alternatives_spanish:
  - querrá
  lexicon: BDAG
  rationale: «Amará» es la equivalencia directa y mantiene el paralelismo con «aborrecerá».
- source_word: ἑνὸς ἀνθέξεται
  english_pob_choice: he will be devoted to one
  chosen_spanish: se aferrará a uno
  alternatives_spanish:
  - se apegará a uno
  - será leal a uno
  - se mantendrá con uno
  lexicon: BDAG
  rationale: ἀντέχομαι aquí expresa aferrarse a, sostenerse de o apegarse firmemente a una parte. «Se aferrará» conserva el sentido de adhesión intensa sin suavizarlo demasiado; además mantiene el paralelismo con la oposición siguiente.
- source_word: καταφρονήσει
  english_pob_choice: despise
  chosen_spanish: menospreciará
  alternatives_spanish:
  - despreciará
  - mirará con desprecio
  lexicon: BDAG
  rationale: «Menospreciará» transmite la idea de tratar con desprecio o tener en baja estima; en español bíblico es una opción natural y solemne. «Despreciará» es una alternativa válida, pero «menospreciará» conserva mejor el tono proverbial.
- source_word: θεῷ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: La referencia es inequívoca y la traducción estándar «Dios» mantiene la claridad del contraste final.
- source_word: μαμωνᾷ
  english_pob_choice: mammon
  chosen_spanish: Mamón
  alternatives_spanish:
  - riquezas
  - dinero
  lexicon: BDAG
  rationale: Se conserva el préstamo «Mamón» para mantener la personificación retórica de las riquezas como amo rival. En español es más transparente que traducirlo solo como «riquezas» o «dinero» en el texto principal.
theological_decisions:
- issue: κύριος como término de dominio no divino en un dicho sobre servicio
  english_pob_reading: masters
  chosen_spanish_reading: amos
  alternative_spanish_readings:
  - señores
  - patrones
  rationale: Aunque «Señor» es el valor predeterminado para κύριος en muchos contextos, aquí el plural con δουλεύειν crea una escena de esclavitud/servicio doméstico. «Amos» evita confundir la frase con el título divino y preserva la tensión de dominio humano rival.
  doctrine_reference: Translation philosophy §5; Contested terms table for κύριος
- issue: Preservación del préstamo μαμωνᾶς como fuerza personificada rival de Dios
  english_pob_reading: mammon
  chosen_spanish_reading: Mamón
  alternative_spanish_readings:
  - riquezas
  - dinero
  rationale: 'La sentencia contrapone dos señores: Dios y μαμωνᾶς. Conservar «Mamón» mantiene el carácter personificado y no reduce la afirmación a una simple advertencia contra el dinero, lo cual debilitaría el paralelismo teológico y retórico.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el griego SBLGNT y coincide sustancialmente con el audit trail inglés: mantiene la estructura antitética, conserva el préstamo culturalmente cargado «Mamón» y resuelve κύριοι con «amos» por el contexto de servicio/esclavitud. No se registran revisiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - 'Se conservó el paralelismo de dos miembros: «aborrecerá / amará» y «se aferrará / menospreciará».'
  - Se mantuvo un registro bíblico digno sin caer en calco rígido.
  - «Mamón» lleva nota explicativa para no perder la alusión personificada a las riquezas.
  - La pluralidad de la segunda cláusula («No pueden») refleja la dirección a los oyentes en el griego y mantiene la concordancia natural en español.
