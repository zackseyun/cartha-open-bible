  text: Οὐδεὶς δύναται δυσὶ κυρίοις δουλεύειν· ἢ γὰρ τὸν ἕνα μισήσει καὶ τὸν ἕτερον ἀγαπήσει, ἢ ἑνὸς ἀνθέξεται καὶ τοῦ ἑτέρου καταφρονήσει. οὐ δύνασθε θεῷ δουλεύειν καὶ μαμωνᾷ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/024.yaml
  text: No one is able to serve two masters[a], for either he will hate the one and love the other, or he will be devoted to one and despise the other. You are not able to serve God and mammon.
  footnotes:
