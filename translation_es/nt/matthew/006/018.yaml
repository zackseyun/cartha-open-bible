translation:
  language: es
  text: para que no parezcas[a] ante los hombres ayunando, sino ante tu Padre, que está en secreto[b]; y tu Padre, que ve en secreto, te recompensará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no seas visto». El griego también puede expresar la idea de no quedar expuesto públicamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que no parezcas ante los hombres ayunando, sino ante tu Padre».'
    reason: previous_rendering
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce una finalidad; «para que» es la forma natural y fiel en español para conservar el valor telico de la construcción.
- source_word: μὴ φανῇς
  english_pob_choice: you may not appear
  chosen_spanish: no te vean
  alternatives_spanish:
  - no aparezcas
  - no seas visto
  lexicon: BDAG
  rationale: En este contexto la pasiva/subjuntiva expresa no quedar expuesto a la vista pública. «No te vean» mantiene la idea de apariencia ante observadores humanos de manera idiomática en español.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: to men
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego, con fuerza genérica para observadores humanos. En una nota se aclara que no se trata de varones solamente.
- source_word: νηστεύων
  english_pob_choice: to be fasting
  chosen_spanish: ayunando
  alternatives_spanish:
  - en ayuno
  - mientras ayunas
  lexicon: BDAG
  rationale: El participio expresa la acción en curso. «Ayunando» es la forma más directa y natural en español dentro de la cláusula de percepción.
- source_word: τῷ πατρί σου
  english_pob_choice: to your Father
  chosen_spanish: a tu Padre
  alternatives_spanish:
  - para tu Padre
  - ante tu Padre
  lexicon: BDAG
  rationale: El dativo se mantiene con una preposición natural en español. «A tu Padre» conserva la relación de dirección/audiencia del acto, sin añadir interpretación.
- source_word: τῷ ἐν τῷ κρυφαίῳ
  english_pob_choice: who is in secret
  chosen_spanish: que está en lo secreto
  alternatives_spanish:
  - que está en secreto
  - que está en la intimidad
  lexicon: BDAG
  rationale: «En lo secreto» reproduce de forma consistente el valor repetido de κρυφαίῳ y evita especificar un «lugar» que el griego no explicita.
- source_word: ὁ βλέπων ἐν τῷ κρυφαίῳ
  english_pob_choice: who sees in secret
  chosen_spanish: que ve en lo secreto
  alternatives_spanish:
  - que ve en secreto
  - que ve lo oculto
  lexicon: BDAG
  rationale: El participio sustantivado describe al Padre por su acción de ver. Se conserva la misma expresión que en la primera ocurrencia para reflejar el paralelismo del texto.
- source_word: ἀποδώσει σοι
  english_pob_choice: will reward you
  chosen_spanish: te recompensará
  alternatives_spanish:
  - te pagará
  - te dará tu recompensa
  - te retribuirá
  lexicon: BDAG
  rationale: En este contexto de práctica piadosa, ἀποδίδωμι expresa retribución/recompensa divina. «Recompensará» transmite bien esa idea sin sonar demasiado técnica ni punitiva.
theological_decisions:
- issue: Referencia genérica de ἀνθρώποις
  english_pob_reading: Rendered as 'men' with representative/generic force, not as male-only humans.
  chosen_spanish_reading: «los hombres» con fuerza genérica, no solo varones.
  alternative_spanish_readings:
  - la gente
  - las personas
  - los seres humanos
  rationale: El griego usa el plural masculino de ἄνθρωποι y aquí funciona como referencia representativa a observadores humanos. Se conserva la forma del texto y se aclara su alcance genérico mediante nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de κρυφαίῳ en ambos miembros
  english_pob_reading: Rendered consistently as 'in secret' for both the Father's hiddenness and his seeing.
  chosen_spanish_reading: «en lo secreto» de manera consistente en ambas ocurrencias.
  alternative_spanish_readings:
  - en secreto
  - en el lugar secreto
  - en privado
  rationale: 'La repetición es retóricamente importante: contrapone la visibilidad humana con la esfera oculta de la relación con el Padre. Mantener la misma expresión ayuda a preservar ese vínculo.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: Cercanía sintáctica del contraste μὴ...ἀλλὰ
  english_pob_reading: Contrast between not appearing to men and being directed to the Father.
  chosen_spanish_reading: Contraste expresado como «no te vean los hombres... sino a tu Padre...».
  alternative_spanish_readings:
  - no aparezcas ante los hombres... sino ante tu Padre...
  - no para que te vean los hombres... sino para tu Padre...
  rationale: El español requiere reordenar levemente la negación para sonar natural sin perder el contraste original. La forma elegida conserva la oposición entre la audiencia humana y la divina.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del audit trail al reflejar con naturalidad la negación y el contraste: primero evita la exposición ante los hombres, y luego mantiene la contraparte dirigida al Padre. También conserva la repetición de κρυφαίῳ con una sola expresión española para sostener el paralelismo literario.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; en este versículo el texto habla de «tu Padre», por lo que no aplica.
  - Se mantuvo «Padre» y no «señor» u այլ formulaciones, porque el griego usa πατήρ.
  - «En lo secreto» se repite en ambas ocurrencias para respetar la estructura del verso.
  - «Recompensará» traduce ἀποδώσει en sentido de retribución favorable, conforme al contexto de práctica piadosa.
