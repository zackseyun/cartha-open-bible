review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: finalidad con «para que», contraste entre observadores humanos y el Padre, repetición de κρυφαίῳ, y sentido de ἀποδώσει como recompensa. Sin embargo, «no te vean los hombres ayunando» desplaza μὴ φανῇς desde «no aparezcas/no seas visto» a una formulación más puramente perceptiva, y «que está en lo secreto» suena menos natural en español que una alternativa más idiomática. La nota b además no preserva bien el rastro del POB inglés, que documenta como alternativa una división sintáctica previa, no simplemente «en secreto».'
  spanish_quality_summary: El español es comprensible, pero «que está en lo secreto» resulta algo forzado y poco idiomático en registro bíblico natural. «No te vean los hombres ayunando» es legible, aunque una formulación con «parezca» preserva mejor la noción de apariencia/exhibición pública presente en φανῇς. El resto del verso fluye bien y mantiene dignidad y claridad.
  glossary_alignment: No hay conflictos con los términos teológicos principales del proyecto. «Padre», «recompensará» y la repetición de «en secreto»/«en lo secreto» van en la dirección correcta. La principal mejora terminológica es preferir una formulación más fiel a φανῇς («parezcas») y usar «en secreto» de forma consistente y natural para κρυφαίῳ.
  issues:
  - severity: medium
    issue: «no te vean» atenúa el matiz de φανῇς
    rationale: El griego μὴ φανῇς se centra en aparecer/ser visible públicamente, no solo en que otros perciban el hecho. «No parezcas» o «no seas visto» preserva mejor la idea de exhibición.
  - severity: medium
    issue: «que está en lo secreto» suena poco natural en español
    rationale: Aunque busca reflejar literalmente τῷ ἐν τῷ κρυφαίῳ, la expresión idiomática y clara en español bíblico actual es «que está en secreto», manteniendo además la repetición con la segunda cláusula.
  - severity: medium
    issue: La nota b no corresponde al audit trail inglés
    rationale: La nota inglesa b registra una traducción previa de toda la cláusula («you may not appear... but to your Father»), no una simple alternativa léxica para κρυφαίῳ. La nota española debe reflejar esa evidencia o eliminarse si no se conserva.
  revised_spanish_text: para que no parezcas[a] ante los hombres ayunando, sino ante tu Padre, que está en secreto[b]; y tu Padre, que ve en secreto, te recompensará.
  revised_footnotes:
  - marker: a
    text: 'O: «no seas visto». El griego también puede expresar la idea de no quedar expuesto públicamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que no parezcas ante los hombres ayunando, sino ante tu Padre».'
    reason: previous_rendering
  revision_rationale: Se ajusta φανῇς a «no parezcas» para preservar mejor el matiz de apariencia pública; se usa «ante» para explicitar de modo natural el contraste dativo «ante los hombres / ante tu Padre»; se cambia a «en secreto» por mayor naturalidad y para mantener la repetición de κρυφαίῳ; y se corrige la nota b para alinearla con la documentación del POB inglés.
