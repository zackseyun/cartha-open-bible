revisions:
- from: para que no te vean los hombres ayunando[a], sino a tu Padre que está en lo secreto[b]; y tu Padre, que ve en lo secreto, te recompensará.
  to: para que no parezcas[a] ante los hombres ayunando, sino ante tu Padre, que está en secreto[b]; y tu Padre, que ve en secreto, te recompensará.
  rationale: Se ajusta φανῇς a «no parezcas» para preservar mejor el matiz de apariencia pública; se usa «ante» para explicitar de modo natural el contraste dativo «ante los hombres / ante tu Padre»; se cambia a «en secreto» por mayor naturalidad y para mantener la repetición de κρυφαίῳ; y se corrige la nota b para alinearla con la documentación del POB inglés.
