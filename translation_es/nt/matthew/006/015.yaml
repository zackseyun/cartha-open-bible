revisions:
- from: Pero si no perdonan[a] a las personas, tampoco su Padre perdonará sus ofensas.
  to: Pero si ustedes no perdonan a otros, tampoco su Padre perdonará sus faltas[a].
  rationale: Se ajusta el español para reflejar con más claridad la segunda persona plural implícita del griego y mejorar la naturalidad de τοῖς ἀνθρώποις con «a otros». Se sustituye «ofensas» por «faltas» como texto principal para expresar mejor παραπτώματα sin ambigüedad posesiva, y se conservan en nota las alternativas léxicas documentadas. La nota se reancla correctamente al sustantivo relevante.
