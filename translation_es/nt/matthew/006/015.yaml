translation:
  language: es
  text: Pero si ustedes no perdonan a otros, tampoco su Padre perdonará sus faltas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «transgresiones» u «ofensas» para «faltas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ μὴ
  english_pob_choice: But if ... not
  chosen_spanish: Pero si no ...
  alternatives_spanish:
  - Y si no ...
  - Mas si no ...
  lexicon: BDAG
  rationale: ἐὰν introduce una condición; δέ añade contraste con el versículo anterior. En español, «Pero si no...» conserva ese giro adversativo-condicional de forma natural.
- source_word: ἀφῆτε
  english_pob_choice: forgive
  chosen_spanish: perdonan
  alternatives_spanish:
  - perdonen
  - dejan ir
  - absuelven
  lexicon: BDAG
  rationale: ἀφίημι en este contexto interpersonal significa perdonar. En español, «perdonar» es el equivalente más claro y fiel; se usa forma de trato general que funciona bien en lectura bíblica contemporánea.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: people
  chosen_spanish: a las personas
  alternatives_spanish:
  - a la gente
  - a los seres humanos
  - a los otros
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico y no masculino específico. «A las personas» refleja el sentido humano genérico con naturalidad en español.
- source_word: οὐδὲ
  english_pob_choice: neither
  chosen_spanish: tampoco
  alternatives_spanish:
  - ni tampoco
  - ni
  - ni siquiera
  lexicon: BDAG
  rationale: οὐδέ marca una negativa correlativa y enfática. «Tampoco» preserva la relación lógica con la condición previa y suena idiomático en español.
- source_word: ὁ πατὴρ ὑμῶν
  english_pob_choice: your Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - su Padre celestial
  - vuestro Padre
  - el Padre de ustedes
  lexicon: BDAG
  rationale: El griego dice simplemente «su Padre». En español, por el tratamiento general y la referencia a los discípulos, «su Padre» evita añadir «celestial», que no está en este versículo.
- source_word: ἀφήσει
  english_pob_choice: forgive
  chosen_spanish: perdonará
  alternatives_spanish:
  - dejará ir
  - soltará
  - absolverá
  lexicon: BDAG
  rationale: Se mantiene la repetición verbal de ἀφίημι como «perdonar», igual que en la primera mitad del versículo, para conservar el paralelismo del griego.
- source_word: τὰ παραπτώματα ὑμῶν
  english_pob_choice: your trespasses
  chosen_spanish: sus ofensas
  alternatives_spanish:
  - sus transgresiones
  - sus pecados
  - sus tropiezos
  lexicon: BDAG
  rationale: παραπτώματα puede ser «tropiezos», «ofensas» o «transgresiones». «Ofensas» comunica bien la idea de faltas contra otros y contra Dios, y es natural en español. Aquí se evita «trespasses» por no ser idiomático en español.
theological_decisions:
- issue: Condición entre el perdón humano y el perdón divino
  english_pob_reading: Retain the straightforward conditional wording without softening or systematizing it.
  chosen_spanish_reading: 'Conservar la condición de manera directa: si no perdonan a otros, tampoco el Padre perdonará sus ofensas.'
  alternative_spanish_readings:
  - Si no perdonan, Dios no los perdonará
  - Si no perdonan, quedarán sin perdón
  rationale: El griego presenta una condición directa y una consecuencia negativa. La traducción conserva esa tensión sin suavizarla ni convertirla en una explicación teológica.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran plena concordancia en el sentido condicional y en el paralelismo léxico de ἀφίημι. La versión española mantiene ese paralelismo con «perdonan / perdonará» y evita añadir «celestial» a «Padre», porque no aparece en este versículo.
  spanish_consistency_notes:
  - Se conserva el contraste adversativo con «Pero».
  - Se evita introducir vocabulario eclesiástico no presente en el griego.
  - «Personas» traduce ἄνθρωποι en sentido genérico y neutral.
  - «Ofensas» es una solución española natural para παραπτώματα, manteniendo el peso moral del término.
  - La nota al pie recoge la alternativa semántica sin sobrecargar el texto principal.
