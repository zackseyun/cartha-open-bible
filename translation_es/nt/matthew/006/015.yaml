review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura condicional y el paralelismo de ἀφῆτε / ἀφήσει con «perdonar». También conserva correctamente «su Padre» sin añadir «celestial». Sin embargo, falla en el sujeto verbal de segunda persona plural: el griego ἀφῆτε exige «perdonan/perdonen ustedes», no «perdonan» sin pronombre contextual claro si se mantiene «su Padre»; además, el borrador introduce una nota al lugar equivocado y mezcla dos lexemas distintos (ἀφῆτε y παραπτώματα) en una sola nota anclada solo en el primer verbo.'
  spanish_quality_summary: El español es legible, pero «Pero si no perdonan a las personas» suena algo suelto por la discordancia pragmática entre una forma verbal de ustedes y la ausencia de un referente explícito. «A otros» o «a la gente» suena más natural que «a las personas» aquí. Además, la nota actual es confusa, porque dice «ofensas» como alternativa para ἀφῆτε, cuando en realidad corresponde a παραπτώματα.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Perdonar» es correcto para ἀφίημι en ambos casos. Para παραπτώματα, «ofensas» es posible, pero conviene preservar las alternativas documentadas por el POB inglés en una nota bien localizada; en español, «transgresiones» y «ofensas» funcionan como alternativas a «faltas».
  issues:
  - severity: medium
    issue: Nota léxica mal anclada y conceptualmente mezclada
    rationale: La nota [a] está puesta en «perdonan», pero su contenido combina alternativas para ἀφῆτε y para παραπτώματα. Según las reglas, cada nota debe corresponder al lugar relevante del texto y no crear ambigüedad nueva.
  - severity: medium
    issue: Elección de «sus ofensas» puede sonar como ofensas cometidas contra ustedes, no necesariamente sus faltas
    rationale: Aunque «ofensas» es posible, en español bíblico moderno «sus faltas» expresa mejor παραπτώματα como infracciones cometidas por ellos. Luego la nota puede preservar «transgresiones» u «ofensas» como alternativas.
  - severity: low
    issue: «a las personas» es menos idiomático en este contexto que «a otros»
    rationale: τοῖς ἀνθρώποις significa genéricamente ‘a la gente / a otros / a las personas’. En esta sentencia recíproca, «a otros» suena más natural y claro en español sin pérdida semántica.
  revised_spanish_text: Pero si ustedes no perdonan a otros, tampoco su Padre perdonará sus faltas[a].
  revised_footnotes:
  - marker: a
    text: O «transgresiones» u «ofensas» para «faltas».
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para reflejar con más claridad la segunda persona plural implícita del griego y mejorar la naturalidad de τοῖς ἀνθρώποις con «a otros». Se sustituye «ofensas» por «faltas» como texto principal para expresar mejor παραπτώματα sin ambigüedad posesiva, y se conservan en nota las alternativas léxicas documentadas. La nota se reancla correctamente al sustantivo relevante.
