base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/016.yaml
  text: And whenever you fast[a], do not become gloomy like the hypocrites, for they disfigure their faces so that they may appear to people to be fasting. Truly I say to you, they have received their reward in full.
  footnotes:
  - marker: a
    text: Or 'to people.' The Greek says 'to men' (τοῖς ἀνθρώποις), often used in a general sense for human beings.
    reason: lexical_alternative
