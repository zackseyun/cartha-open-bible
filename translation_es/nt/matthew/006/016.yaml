    issue: Traducción incorrecta de ὅπως φανῶσιν τοῖς ἀνθρώποις νηστεύοντες
    rationale: «Para que parezcan a las personas que ayunan» en español indica semejanza con otras personas que ayunan. El griego expresa propósito de ser vistos por la gente como ayunando.
  - severity: medium
    issue: Anclaje erróneo de la nota al pie
    rationale: La nota explica τοῖς ἀνθρώποις, pero el marcador [a] está colocado en «ayunen» en vez de en «la gente / las personas».
  - severity: low
    issue: Registro algo arcaizante en «De cierto les digo»
    rationale: Es fiel, pero «En verdad les digo» es más natural en español moderno y conserva la fuerza solemne de ἀμὴν λέγω ὑμῖν.
  revised_spanish_text: 'Y cuando ayunen, no sean sombríos como los hipócritas, porque desfiguran sus rostros para mostrarle a la gente[a] que ayunan. En verdad les digo: ya han recibido su recompensa.'
  revised_footnotes:
