translation:
  language: es
  text: 'Y cuando ayunen, no sean sombríos como los hipócritas, porque desfiguran sus rostros para mostrarle a la gente[a] que ayunan. En verdad les digo: ya han recibido su recompensa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las personas». El griego dice τοῖς ἀνθρώποις, expresión que aquí suele tener sentido general, es decir, ‘seres humanos’ o ‘gente’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  english_pob_choice: whenever
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Siempre que
  - Cada vez que
  lexicon: BDAG
  rationale: La cláusula temporal expresa una práctica repetida; en español, «Y cuando» comunica bien la iteración sin sonar forzado. Añadir «siempre que» sería más explícito, pero menos natural en este contexto.
- source_word: νηστεύητε
  english_pob_choice: you fast
  chosen_spanish: ayunen
  alternatives_spanish:
  - estén ayunando
  - ayunen ustedes
  lexicon: BDAG
  rationale: El verbo se refiere a la práctica del ayuno en general. El presente de subjuntivo tras «cuando» es natural en español y conserva el valor habitual o iterativo.
- source_word: μὴ γίνεσθε
  english_pob_choice: do not become
  chosen_spanish: no sean
  alternatives_spanish:
  - no se hagan
  - no lleguen a ser
  lexicon: BDAG
  rationale: Aunque γίνομαι tiene matiz ingresivo, en español «no sean» expresa con naturalidad la prohibición de adoptar ese estado o actitud. «No lleguen a ser» conserva más explícitamente el ingreso, pero suena más pesado.
- source_word: ὡς οἱ ὑποκριταὶ
  english_pob_choice: like the hypocrites
  chosen_spanish: como los hipócritas
  alternatives_spanish:
  - como hipócritas
  - al modo de los hipócritas
  lexicon: BDAG
  rationale: La comparación es directa. «Como los hipócritas» reproduce la relación comparativa sin agregar matices ajenos.
- source_word: σκυθρωποί
  english_pob_choice: gloomy
  chosen_spanish: sombríos
  alternatives_spanish:
  - adustos
  - tristes
  - cabizbajos
  lexicon: BDAG
  rationale: El término describe una apariencia facial deliberadamente triste o apagada. «Sombríos» funciona bien en español bíblico y conserva la intención visible del gesto.
- source_word: ἀφανίζουσιν
  english_pob_choice: disfigure
  chosen_spanish: desfiguran
  alternatives_spanish:
  - deforman
  - empeoran la apariencia de
  - deslucen
  lexicon: BDAG
  rationale: El verbo apunta a alterar la apariencia de manera que se note el ayuno. «Desfiguran» es el equivalente más directo y mantiene la fuerza concreta del gesto.
- source_word: τὰ πρόσωπα αὐτῶν
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - su semblante
  lexicon: BDAG
  rationale: «Rostros» conserva la imagen concreta de πρόσωπα y suena más digno y bíblico en español que «caras», sin perder literalidad.
- source_word: ὅπως φανῶσιν τοῖς ἀνθρώποις νηστεύοντες
  english_pob_choice: so that they may appear to people to be fasting
  chosen_spanish: para que parezcan a las personas que ayunan
  alternatives_spanish:
  - para que parezcan ayunar ante la gente
  - para que les parezca a las personas que ayunan
  lexicon: BDAG
  rationale: ὅπως expresa propósito, y φανῶσιν tiene sentido de «parecer/aparecer». En español, «parezcan a las personas que ayunan» preserva la estructura y deja claro el efecto visible. No se traduce el dativo como mero objeto indirecto, sino como el destinatario de la apariencia.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: De cierto les digo
  alternatives_spanish:
  - Amén les digo
  - En verdad les digo
  lexicon: BDAG
  rationale: La fórmula solemne se reproduce con un registro bíblico natural. «De cierto» conserva la fuerza declarativa tradicional sin encubrir el valor enfático de ἀμήν.
- source_word: ἀπέχουσιν τὸν μισθὸν αὐτῶν
  english_pob_choice: have received their reward in full
  chosen_spanish: ya han recibido su recompensa
  alternatives_spanish:
  - han recibido su recompensa en pleno
  - ya recibieron su recompensa
  lexicon: BDAG
  rationale: El verbo es idiomático y transmite la idea de que el pago ya fue recibido por completo. «Ya han recibido su recompensa» comunica en español la conclusión y suficiencia de esa recompensa, aunque la plenitud idiomática queda implícita.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: people
  chosen_spanish: a las personas
  alternatives_spanish:
  - a la gente
  - a los hombres
  lexicon: BDAG
  rationale: El término griego puede ser genérico. «A las personas» refleja bien el sentido inclusivo y evita una lectura restringida a varones, sin perder la referencia general a seres humanos.
theological_decisions:
- issue: Sentido general de τοῖς ἀνθρώποις
  english_pob_reading: rendered as 'people' in the revised English text
  chosen_spanish_reading: «a las personas»
  alternative_spanish_readings:
  - «a la gente»
  - «a los hombres»
  rationale: El dativo plural de ἄνθρωποι aquí es genérico. En español, «a las personas» mantiene el carácter universal sin introducir un masculino representativo innecesario. Esto conserva la intención comunicativa del texto y la claridad contemporánea.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor idiomático de ἀπέχουσιν τὸν μισθὸν αὐτῶν
  english_pob_reading: expanded to 'they have received their reward in full'
  chosen_spanish_reading: «ya han recibido su recompensa»
  alternative_spanish_readings:
  - «han recibido su recompensa en pleno»
  - «ya recibieron su recompensa»
  rationale: La expresión no describe solo posesión, sino recepción completa y definitiva. El español «ya han recibido su recompensa» transmite que no queda otra recompensa pendiente, manteniendo el sentido admonitorio del dicho.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Imagen de apariencia externa en ἀφανίζουσιν τὰ πρόσωπα
  english_pob_reading: disfigure their faces
  chosen_spanish_reading: «desfiguran sus rostros»
  alternative_spanish_readings:
  - «deforman sus rostros»
  - «alteran sus rostros»
  rationale: La escena es de una expresión facial modificada con intención religiosa visible. «Desfiguran» conserva la fuerza corporal y negativa del verbo griego, y evita suavizar la crítica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El contexto inglés revisó la frase correspondiente de «men» a «people» para reflejar mejor el sentido inclusivo de τοῖς ἀνθρώποις; la presente versión española sigue esa revisión con «a las personas». No se adoptó un calco mecánico del inglés, sino que se mantuvo la imagen concreta y la fuerza idiomática del verbo de recompensa.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como término divino por norma general, pero este versículo no contiene el nombre divino.
  - «Hipócritas» se mantuvo como término técnico del discurso de Jesús, sin suavizarlo.
  - «Recompensa» conserva el valor contextual de μισθός en Mateo, más que «salario» o «pago».
  - Se usó un registro formal y eclesialmente legible, evitando arcaísmos innecesarios.
