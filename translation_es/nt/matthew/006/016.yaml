  source_alignment_summary: 'El borrador conserva en general la estructura y el sentido del griego: cláusula temporal iterativa, prohibición comparativa, crítica a la ostentación del ayuno y la conclusión sobre la recompensa ya recibida. Sin embargo, la frase «para que parezcan a las personas que ayunan» no refleja correctamente ὅπως φανῶσιν τοῖς ἀνθρώποις νηστεύοντες, porque en español significa ‘se asemejen a personas que ayunan’, no ‘aparezcan ante las personas como ayunando / sean vistos por la gente como ayunando’. Eso altera el objeto del aparecer y requiere corrección.'
  spanish_quality_summary: El español es mayormente claro y digno, pero la construcción con «parezcan a las personas» es poco natural y semánticamente equivocada. «De cierto les digo» es comprensible, aunque «En verdad les digo» suena más natural en español contemporáneo y mantiene la solemnidad. El resto fluye bien.
  glossary_alignment: 'No hay conflictos con los términos base del proyecto. «Hipócritas», «rostros», «recompensa» y el tratamiento inclusivo de τοῖς ἀνθρώποις están alineados. La principal cuestión es sintáctico-semántica en la cláusula de propósito; conviene expresar «ante la gente / a la gente» como destinatario de la apariencia, no como término de comparación. La nota al pie actual además no corresponde al lugar anclado: el marcador está en «ayunen», pero la nota trata sobre τοῖς ἀνθρώποις.'
  issues:
