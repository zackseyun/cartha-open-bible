  text: σὺ δὲ ὅταν προσεύχῃ, εἴσελθε εἰς τὸ ταμεῖόν σου καὶ κλείσας τὴν θύραν σου πρόσευξαι τῷ πατρί σου τῷ ἐν τῷ κρυπτῷ· καὶ ὁ πατήρ σου ὁ βλέπων ἐν τῷ κρυπτῷ ἀποδώσει ⸀σοι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/006.yaml
  text: But when you pray[a], go into your inner room, and after shutting your door, pray to your Father who is in secret; and your Father, who sees in secret[b], will reward you.
  footnotes:
  - marker: a
    text: Or 'private room,' 'storeroom,' or traditionally 'closet.' The Greek refers to an interior room used for privacy or storage.
    reason: lexical_alternative
  - marker: b
    text: Or 'will repay you.' The Greek verb can mean 'give back,' 'repay,' or 'reward,' depending on context.
    reason: lexical_alternative
