translation:
  language: es
  text: Pero cuando ores, entra en tu cuarto interior[a], y después de cerrar tu puerta, ora a tu Padre, que está en lo oculto; y tu Padre, que ve en lo oculto, te recompensará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuarto privado', 'almacén' o, de forma más tradicional, 'aposento'. El griego se refiere a un cuarto interior usado para privacidad o almacenamiento.
    reason: lexical_alternative
  - marker: b
    text: O 'te pagará' o 'te dará de vuelta'. El verbo griego puede significar 'dar de vuelta', 'pagar' o 'recompensar', según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero cuando tú
  - Mas tú
  lexicon: BDAG
  rationale: El pronombre enfático con δέ introduce contraste con los hipócritas del contexto previo. En español, 'Pero tú' conserva ese contraste sin sobrecargar la frase.
- source_word: ὅταν προσεύχῃ
  english_pob_choice: when you pray
  chosen_spanish: cuando ores
  alternatives_spanish:
  - cuando oras
  - cada vez que ores
  lexicon: BDAG
  rationale: ὅταν con subjuntivo expresa acción general o repetida. 'Cuando ores' suena natural en español y preserva ese valor sin hacerlo mecánico.
- source_word: εἴσελθε
  english_pob_choice: go into
  chosen_spanish: entra
  alternatives_spanish:
  - ve a
  - ingresa
  lexicon: BDAG
  rationale: El imperativo aoristo pide la acción de entrar; 'entra' es la forma directa y natural en español.
- source_word: τὸ ταμεῖόν σου
  english_pob_choice: your inner room
  chosen_spanish: tu cuarto interior
  alternatives_spanish:
  - tu cuarto íntimo
  - tu cuarto privado
  - tu aposento interior
  lexicon: BDAG
  rationale: ταμεῖον puede referirse a un cuarto interior, de privacidad o de almacenamiento. 'Cuarto interior' conserva la idea de un espacio interior y apartado, sin la asociación moderna engañosa de 'clóset'.
- source_word: κλείσας τὴν θύραν σου
  english_pob_choice: after shutting your door
  chosen_spanish: después de cerrar tu puerta
  alternatives_spanish:
  - y cerrada tu puerta
  - habiendo cerrado tu puerta
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa a la principal. 'Después de cerrar tu puerta' comunica con claridad esa secuencia en español.
- source_word: πρόσευξαι
  english_pob_choice: pray
  chosen_spanish: ora
  alternatives_spanish:
  - reza
  - eleva tu oración
  lexicon: BDAG
  rationale: El verbo προσεύχομαι se traduce de manera simple y directa como 'orar'. 'Ora' mantiene la forma verbal natural y reverente en español.
- source_word: τῷ πατρί σου
  english_pob_choice: to your Father
  chosen_spanish: a tu Padre
  alternatives_spanish:
  - a tu Padre celestial
  - a tu Padre
  lexicon: BDAG
  rationale: El texto griego dice simplemente 'tu Padre'; se mantiene el valor relacional sin añadir 'celestial', que no aparece en esta cláusula.
- source_word: τῷ ἐν τῷ κρυπτῷ
  english_pob_choice: who is in secret
  chosen_spanish: que está en lo oculto
  alternatives_spanish:
  - que está en secreto
  - que está en la intimidad
  lexicon: BDAG
  rationale: La expresión señala ocultamiento/secreto, no sólo un lugar físico. 'En lo oculto' mantiene la repetición del motivo de ocultamiento y su sentido adverbial/relacional.
- source_word: ὁ βλέπων ἐν τῷ κρυπτῷ
  english_pob_choice: who sees in secret
  chosen_spanish: que ve en lo oculto
  alternatives_spanish:
  - que ve en secreto
  - que ve lo oculto
  lexicon: BDAG
  rationale: Se conserva la repetición de ἐν τῷ κρυπτῷ con la misma solución española para reflejar el contraste retórico del versículo.
- source_word: ἀποδώσει σοι
  english_pob_choice: will reward you
  chosen_spanish: te recompensará
  alternatives_spanish:
  - te recompensará a ti
  - te dará recompensa
  - te lo pagará
  lexicon: BDAG
  rationale: ἀποδίδωμι puede significar devolver, pagar, recompensar o retribuir según el contexto. Aquí, el contexto de la respuesta divina favorece 'recompensará', que conserva la idea de retribución positiva sin especificarla en exceso.
theological_decisions:
- issue: La repetición de ἐν τῷ κρυπτῷ
  english_pob_reading: Rendered as 'in secret' both for the Father's hidden presence and his seeing of what is hidden.
  chosen_spanish_reading: Se traduce como 'en lo oculto' en ambas apariciones para mantener la repetición retórica y la oposición a la ostentación pública.
  alternative_spanish_readings:
  - en secreto
  - en privado
  - en el lugar secreto
  rationale: El versículo enfatiza lo escondido frente a la exhibición. Repetir la misma expresión en español preserva ese efecto y evita decidir prematuramente entre un sentido puramente locativo o adverbial.
  doctrine_reference: Translation philosophy §3, §5
- issue: Traducción de πατήρ referido a Dios
  english_pob_reading: Father
  chosen_spanish_reading: Padre
  alternative_spanish_readings:
  - Padre celestial
  - Dios Padre
  rationale: Jesús se dirige a Dios de forma relacional y directa. Mantener 'Padre' sin ampliación respeta el tono del texto y evita importar formulaciones de otros pasajes.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó sin cambios necesarios; este borrador mantiene la lectura principal y conserva las alternativas léxicas relevantes del expediente inglés, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene la repetición de 'en lo oculto' para reflejar la estructura del griego.
  - Se evita 'SEÑOR' como sustituto del nombre divino porque este versículo habla de 'Padre', no de κύριος.
  - '''Ora'' se usa como equivalente directo de προσεύχομαι en un registro bíblico natural.'
  - '''Recompensará'' conserva la fuerza de ἀποδώσει sin reducirla a una mera devolución material.'
