translation:
  language: es
  text: Pero busquen primero su reino y su rectitud[a], y todas estas cosas se les añadirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su justicia». El griego δικαιοσύνη puede denotar rectitud o justicia; aquí se mantiene «rectitud» como traducción principal porque el contexto incluye la correcta relación y conducta delante de Dios, no solo la justicia en sentido judicial o social.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητεῖτε
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen continuamente
  - sigan buscando
  - busquen con perseverancia
  lexicon: BDAG
  rationale: El imperativo presente plural pide una acción continua y prioritaria. «Busquen» es natural en español y conserva la idea de una búsqueda activa sin volverla más explicativa de lo que permite el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con las prohibiciones previas sobre la ansiedad y el afán por las necesidades materiales. «Pero» preserva mejor el giro adversativo en español.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - ante todo
  - como prioridad
  lexicon: BDAG
  rationale: «Primero» mantiene la prioridad explícita del mandato y sigue de cerca el valor léxico de πρῶτον sin sobreinterpretarlo.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - gobierno
  - señorío
  lexicon: BDAG
  rationale: En Mateo, βασιλεία normalmente se vierte como «reino». En español, «reino» conserva la amplitud de la realidad del gobierno real de Dios sin estrecharla solo a un acto de reinar.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  - justicia y rectitud
  lexicon: BDAG
  rationale: Aquí se elige «justicia» porque el español permite conservar la tensión semántica entre rectitud delante de Dios y justicia en sentido amplio. Dado que el POB inglés preserva la alternativa «justice», esta opción la hace explícita en el texto principal con una nota de auditorio.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de Dios
  lexicon: BDAG
  rationale: El pronombre se mantiene como pronombre posesivo para reflejar directamente el griego y evitar una explicitación interpretativa innecesaria.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - estas cosas todas
  lexicon: BDAG
  rationale: Remite a las necesidades materiales del contexto inmediato. «Todas estas cosas» es idiomático y conserva el alcance demostrativo del griego.
- source_word: προστεθήσεται
  english_pob_choice: will be added
  chosen_spanish: se les añadirán
  alternatives_spanish:
  - les serán añadidas
  - se les proveerán además
  - se les darán por añadidura
  lexicon: BDAG
  rationale: La forma pasiva futura expresa que estas cosas vendrán como añadido. «Se les añadirán» mantiene la relación verbal de adición mejor que opciones más interpretativas como «serán provistas».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: se les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo plural se integra de manera natural con la pasiva en español. «Se les» preserva la dirección del beneficio sin cargar la frase con una preposición redundante.
theological_decisions:
- issue: Renderización de δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: El POB inglés preserva la alternativa «justice» y explica que el término abarca la conformidad con la voluntad de Dios. En español, «justicia» mantiene mejor esa amplitud que una sola paráfrasis moral; la nota deja abierta la lectura alternativa «rectitud» sin borrar la tensión léxica.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice preserved in footnotes where relevant'
- issue: Referente de αὐτοῦ
  english_pob_reading: his
  chosen_spanish_reading: su
  alternative_spanish_readings:
  - de Dios
  - del Padre
  rationale: Se conserva el pronombre posesivo sin explicitar el referente, siguiendo la primacía del texto griego y la práctica del POB inglés. El contexto deja claro que el referente es Dios/el Padre.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cruce de verificación mostró alto acuerdo; por eso se conserva una solución directa y auditable, alineada con el griego y con el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «reino» para βασιλεία, coherente con el uso matteneo y con el POB inglés.
  - Se usa «justicia» en el texto principal y se conserva «rectitud» en nota para no borrar la tensión léxica de δικαιοσύνη.
  - Se mantiene el pronombre posesivo «su» sin explicitar «Dios» en el cuerpo del verso para respetar la referencia implícita del original.
  - «Se les añadirán» preserva el valor de adición de προστεθήσεται y evita una paráfrasis de provisión más amplia que el griego no exige.
