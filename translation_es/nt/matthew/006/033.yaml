revisions:
- from: Pero busquen primero su reino[a] y su justicia[b], y todas estas cosas se les añadirán.
  to: Pero busquen primero su reino y su rectitud[a], y todas estas cosas se les añadirán.
  rationale: Se revisa únicamente δικαιοσύνη para alinearlo con la evidencia fuente y la decisión auditada del POB inglés. «Rectitud» preserva mejor en español el valor de ‘righteousness’ en este contexto, mientras que «justicia» queda como alternativa legítima en nota. Se elimina la nota sobre «reino» por no ser necesaria para fidelidad ni claridad.
  reviewer_model: gpt-5.4
