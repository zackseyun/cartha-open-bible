review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: imperativo presente adversativo («Pero busquen»), prioridad («primero»), los dos objetos coordinados («su reino y su …»), y la promesa futura pasiva («se les añadirán»). Sin embargo, no sigue fielmente la decisión léxica/auditada del POB para δικαιοσύνη, que en este versículo debe mantenerse como «rectitud»/«justicia» con preferencia por el equivalente de ‘righteousness’, no reemplazarse en el texto principal por «justicia» sola.'
  spanish_quality_summary: 'El español es claro y natural. «Pero busquen primero su reino…» suena bien en registro eclesial amplio. La única reparación necesaria es terminológica: «su justicia» en español tiende a oírse principalmente en sentido judicial/social y no preserva tan bien la amplitud de conformidad con la voluntad de Dios que aquí documenta el POB inglés. «Su rectitud» funciona mejor en español neutral y puede llevar nota con la alternativa «su justicia».'
  glossary_alignment: Alineación parcial. «reino» para βασιλεία es correcta y bien justificada. Pero δικαιοσύνη, según los defaults del proyecto y la decisión inglesa auditada, debe reflejar el valor de ‘righteousness’ en el texto principal, conservando «justicia» como alternativa en nota cuando sea relevante. El borrador invierte esa prioridad. No hay otros conflictos terminológicos importantes.
  issues:
  - severity: high
    issue: δικαιοσύνην se tradujo como «justicia» en el texto principal
    rationale: El expediente inglés elige explícitamente ‘righteousness’ como lectura principal en Mateo 6:33 y conserva ‘justice’ solo como alternativa en nota. En español, «justicia» sola estrecha con facilidad el sentido hacia lo judicial/social y no reproduce bien la amplitud de rectitud/correcta relación y conducta ante Dios.
  - severity: medium
    issue: La nota b presenta «rectitud» como alternativa secundaria en vez de preservar «justicia» como alternativa
    rationale: Esto contradice la dirección del audit trail. Si en español se usa «rectitud» para representar mejor ‘righteousness’, la nota debe decir «O ‘su justicia’», explicando la amplitud semántica del griego.
  - severity: low
    issue: La nota a sobre «reino/reinado» no es necesaria según el expediente inglés
    rationale: No es errónea, pero el POB inglés no preservó alternativa aquí. Puede omitirse para evitar sobreanotar. Si se mantiene, debe ser por una necesidad real de claridad en español, que aquí no parece necesaria.
  revised_spanish_text: Pero busquen primero su reino y su rectitud[a], y todas estas cosas se les añadirán.
  revised_footnotes:
  - marker: a
    text: O «su justicia». El griego δικαιοσύνη puede denotar rectitud o justicia; aquí se mantiene «rectitud» como traducción principal porque el contexto incluye la correcta relación y conducta delante de Dios, no solo la justicia en sentido judicial o social.
    reason: lexical_alternative
