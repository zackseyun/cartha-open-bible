  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Padre nuestro en los cielos» preserva adecuadamente el plural griego. La decisión relevante es ἁγιασθήτω: conviene ajustar la expresión española para mejorar legibilidad sin abandonar la racionalidad documentada de ‘treated as holy’.'
