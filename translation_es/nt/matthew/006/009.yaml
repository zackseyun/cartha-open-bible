translation:
  language: es
  text: 'Por tanto[a], oren así: Padre nuestro en los cielos, sea considerado santo[b] tu nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «Padre nuestro en el cielo». El griego dice «en los cielos» (plural).'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «santificado sea tu nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: BDAG
  rationale: El adverbio introduce la forma o patrón de la oración. «Así» es natural en español y conserva el valor instructivo sin añadir paráfrasis.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La partícula marca conclusión o inferencia. «Por tanto» mantiene con claridad esa fuerza argumentativa en español.
- source_word: προσεύχεσθε ὑμεῖς
  english_pob_choice: you should pray
  chosen_spanish: oren
  alternatives_spanish:
  - oren ustedes
  - ustedes oren
  lexicon: BDAG
  rationale: El imperativo plural se expresa de forma natural en español con «oren». El pronombre explícito no es necesario, pero el plural queda implícito en la forma verbal.
- source_word: Πάτερ ἡμῶν
  english_pob_choice: Our Father
  chosen_spanish: Padre nuestro
  alternatives_spanish:
  - Nuestro Padre
  - Padre de nosotros
  lexicon: BDAG
  rationale: El vocativo en español se traduce con naturalidad como «Padre nuestro», conservando el tono directo y comunitario.
- source_word: ὁ ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - que está en los cielos
  lexicon: BDAG
  rationale: Se preserva el plural griego con «los cielos», como hace la POB inglesa con «the heavens», para no aplanar la expresión a un singular tradicional.
- source_word: ἁγιασθήτω
  english_pob_choice: may be treated as holy
  chosen_spanish: sea tratado como santo
  alternatives_spanish:
  - sea santificado
  - sea considerado santo
  - sea hecho santo
  lexicon: BDAG
  rationale: La forma pasiva expresa un ruego para que el nombre de Dios sea reconocido y honrado como santo. «Sea tratado como santo» comunica la idea con claridad contemporánea y mantiene la pasividad.
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - su nombre
  lexicon: BDAG
  rationale: «Nombre» debe conservarse literalmente; en la Biblia incluye identidad, reputación y carácter revelado, pero el texto dice «nombre» y no conviene sustituirlo por una explicación.
theological_decisions:
- issue: Cómo reflejar la trascendencia divina en «ὁ ἐν τοῖς οὐρανοῖς»
  english_pob_reading: Our Father in the heavens
  chosen_spanish_reading: Padre nuestro en los cielos
  alternative_spanish_readings:
  - Padre nuestro en el cielo
  - Padre nuestro que estás en los cielos
  rationale: Se conserva el plural de «los cielos» para respetar el dato del griego y el enfoque auditado de la POB inglesa. La formulación mantiene cercanía («Padre nuestro») y trascendencia («en los cielos»).
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo traducir ἁγιασθήτω sin perder la carga de santidad y petición
  english_pob_reading: may your name be treated as holy
  chosen_spanish_reading: sea tratado como santo tu nombre
  alternative_spanish_readings:
  - sea santificado tu nombre
  - hágase santo tu nombre
  - santificado sea tu nombre
  rationale: La petición no ordena que Dios se vuelva santo, sino que su nombre sea reconocido y tratado como santo. «Sea tratado como santo» conserva la voz pasiva y la dimensión reverente sin recurrir a un término litúrgico menos transparente.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo en el texto principal los anclajes exactos [a] y [b] donde corresponden. La redacción mantiene la decisión auditada de preservar el plural «los cielos» y la pasiva de ἁγιασθήτω.
  spanish_consistency_notes:
  - Se usó «cielos» en plural para reflejar τοῖς οὐρανοῖς y la elección auditada de la POB inglesa.
  - Se evitó «SEÑOR» como máscara divina porque el texto griego aquí no usa κύριος.
  - Se conservó el tono de petición imperativa plural con «oren».
  - Se mantuvo «tu nombre» de forma literal para no sustituir el término bíblico por una paráfrasis explicativa.
