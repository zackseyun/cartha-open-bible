translation:
  language: es
  text: Y no nos metas en la tentación[a], sino líbranos del mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba» o «situación de prueba». El término griego puede referirse tanto a la tentación como a una prueba o situación de prueba.
    reason: lexical_alternative
  - marker: b
    text: O «del maligno». El griego puede entenderse de manera personal («el maligno») o impersonal («el mal»).
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ εἰσενέγκῃς
  english_pob_choice: do not lead
  chosen_spanish: no nos metas
  alternatives_spanish:
  - no nos lleves
  - no nos introduzcas
  - no permitas que entremos
  lexicon: BDAG
  rationale: El griego usa una petición prohibitiva dirigida a Dios; en español, «no nos metas» comunica de manera natural la idea de no introducirnos en una situación sin sobre-interpretarla como mera permisión. Mantiene la fuerza directa de la súplica y evita una paráfrasis más explicativa que el texto no exige.
- source_word: πειρασμόν
  english_pob_choice: temptation
  chosen_spanish: tentación
  alternatives_spanish:
  - prueba
  - test
  - tribulación
  lexicon: BDAG
  rationale: «Tentación» es la equivalencia principal y más transparente en español para πειρασμός en este contexto. Se conserva, sin embargo, la amplitud semántica mediante una nota, porque el término también puede abarcar la idea de prueba o prueba de fidelidad.
- source_word: ῥῦσαι
  english_pob_choice: deliver
  chosen_spanish: líbranos
  alternatives_spanish:
  - rescátanos
  - sálvanos
  - delivrámonos
  lexicon: BDAG
  rationale: «Líbranos» es la forma idiomática y reverente en español para una petición de rescate divino. Conserva el tono litúrgico sin caer en un calco poco natural.
- source_word: τοῦ πονηροῦ
  english_pob_choice: the evil one / evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el maligno
  - el malo
  - el diablo
  lexicon: BDAG
  rationale: El griego admite lectura personal o impersonal. Siguiendo el criterio del POB inglés revisado hacia una redacción menos interpretativa en el texto principal, «el mal» preserva la ambigüedad entre un referente impersonal y uno personal. Se evita «el maligno» en el texto principal porque fija demasiado la interpretación; esa opción puede aparecer como alternativa notada.
theological_decisions:
- issue: Ambigüedad de τοῦ πονηροῦ
  english_pob_reading: from evil
  chosen_spanish_reading: del mal
  alternative_spanish_readings:
  - del maligno
  - del malo
  rationale: La forma griega permite tanto el sentido impersonal («mal») como el personal («el maligno»). En español, «del mal» conserva esa tensión sin resolverla de manera dogmática. Esto sigue la revisión más reciente del POB inglés, que prefirió una formulación menos interpretativa en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de πειρασμόν en la petición
  english_pob_reading: temptation
  chosen_spanish_reading: tentación
  alternative_spanish_readings:
  - prueba
  - tentación o prueba
  rationale: Aunque el POB inglés mantiene «temptation» en el cuerpo y una nota sobre el rango semántico, en español el término básico «tentación» es el equivalente natural. La nota preserva la amplitud hacia «prueba» sin borrar el matiz moral habitual de la frase.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Source-grounded lexical range)
translation_notes:
  revision_awareness: La redacción sigue el giro revisado del POB inglés en 2026-04-23, que prefirió una formulación menos interpretativa para τοῦ πονηροῦ. También conserva la nota léxica sobre πειρασμόν, análoga a la del inglés, para no perder el rango semántico del término en el contexto de la oración.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece.
  - «Tentación» y «prueba» se distinguen en la nota para preservar el rango semántico sin oscurecer la lectura principal.
  - Se evitó «Cristo» y otras fórmulas eclesiásticas porque no intervienen en este versículo.
  - La puntuación sigue el patrón breve y paralelo del griego y del inglés POB.
