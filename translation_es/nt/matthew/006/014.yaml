revisions:
- from: Porque si perdonan a los hombres sus transgresiones[a], también su Padre celestial los perdonará a ustedes.
  to: Porque si perdonan a los demás sus transgresiones[a], también su Padre celestial los perdonará a ustedes.
  rationale: Se revisa «a los hombres» a «a los demás» para reflejar mejor el valor genérico de τοῖς ἀνθρώποις en español natural y ampliamente legible, sin restringir el referente por género. Se conserva «transgresiones» como opción válida para παράπτωμα, pero se corrige la nota para eliminar la repetición innecesaria y presentar alternativas reales. No se requiere adjudicación adicional porque el ajuste es claro, menor y plenamente respaldado por el griego y el audit trail inglés.
