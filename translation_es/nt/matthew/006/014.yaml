translation:
  language: es
  text: Porque si perdonan a los demás sus transgresiones[a], también su Padre celestial los perdonará a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofensas», «faltas» o «malas acciones». El término griego se refiere a caídas o fallos morales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si
  - Pues si
  - Porque, si
  lexicon: BDAG
  rationale: γάρ aporta enlace explicativo con lo anterior, por eso se conserva con «Porque»; ἐάν introduce una condición real y se vierte naturalmente con «si» en español.
- source_word: ἀφῆτε
  english_pob_choice: forgive
  chosen_spanish: perdonan
  alternatives_spanish:
  - perdonen
  - absuelven
  - dejan pasar
  lexicon: BDAG
  rationale: ἀφίημι en este contexto expresa perdón de ofensas morales entre personas. «Perdonan» es claro y natural en español, y mantiene la correspondencia verbal con ἀφήσει al final del versículo.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: people
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a la gente
  - a los seres humanos
  lexicon: BDAG
  rationale: El griego usa ἀνθρώποις en sentido genérico para los seres humanos. «A los hombres» puede sonar más tradicional en español bíblico, pero aquí se evita por claridad y para no restringir indebidamente el referente; se mantiene la referencia humana genérica con una opción natural en español. Si se prefiriera una explicitación mayor del genérico, «a las personas» sería viable.
- source_word: τὰ παραπτώματα
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - ofensas
  - faltas
  - errores
  lexicon: BDAG
  rationale: παράπτωμα denota una caída en falta, ofensa o transgresión moral. «Transgresiones» conserva el peso moral y la conexión con la nota inglesa de alternativas léxicas; «ofensas» es más suave, pero menos preciso para la fuerza del término.
- source_word: ὁ πατὴρ ὑμῶν ὁ οὐράνιος
  english_pob_choice: your heavenly Father
  chosen_spanish: su Padre celestial
  alternatives_spanish:
  - su Padre en los cielos
  - su Padre, el celestial
  - su Padre, que está en los cielos
  lexicon: BDAG
  rationale: 'La expresión articular griega equivale naturalmente a un título relacional: «su Padre celestial». Se usa «su» porque el objeto plural «los» en la segunda persona formal/plural española exige concordancia de posesivo en lectura pública; «celestial» reproduce ὁ οὐράνιος con dignidad y sin la perífrasis tradicional de ‘en los cielos’.'
theological_decisions:
- issue: Relación condicional entre perdonar a otros y recibir perdón de Dios
  english_pob_reading: Render the statement straightforwardly as a real condition without importing a broader doctrinal explanation.
  chosen_spanish_reading: Se traduce como una condición real y directa, sin explicar si el perdón humano causa, evidencia o presupone el perdón divino.
  alternative_spanish_readings:
  - Si perdonan..., Dios ya los habrá perdonado.
  - Perdonar a otros demuestra que ya han sido perdonados.
  - Perdonen a otros para ser perdonados por Dios.
  rationale: El griego presenta una condicional simple; la traducción debe conservar esa tensión teológica sin resolverla hacia un marco doctrinal específico. «Perdonarán» mantiene la reciprocidad y deja abierta la interpretación, tal como exige la filosofía POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente y el control cruzado de alta concordancia: no se identificaron cambios necesarios. Se preserva la fuerza condicional y la correspondencia léxica entre ἀφῆτε y ἀφήσει, con una nota léxica en español para el término τὰ παραπτώματα.'
  spanish_consistency_notes:
  - Se mantiene el trato plural respetuoso en «los» y «su», coherente con la segunda persona plural implícita del griego.
  - «Transgresiones» conserva la carga moral del sustantivo griego y evita aplanarlo a un simple «errores».
  - «Padre celestial» reproduce el valor de ὁ οὐράνιος sin introducir ‘en el cielo’ como obligación traductiva.
  - La nota al pie marca las alternativas léxicas relevantes y evita duplicar marcadores.
