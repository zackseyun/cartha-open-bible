  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Perdonar» para ἀφίημι y «Padre celestial» son adecuados. El ajuste principal es de inclusividad/fidelidad semántica en ἄνθρωποι y de calidad de nota léxica para παράπτωμα.
