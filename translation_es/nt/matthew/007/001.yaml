translation:
  language: es
  text: No juzguen[a], para que no sean juzgados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''No condenen, para que no sean condenados.'' El verbo griego puede, en algunos contextos, tener el sentido de condenar, pero ''juzgar'' es más amplio y preserva la repetición léxica del versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagan
  lexicon: BDAG
  rationale: Con el imperativo presente plural κρίνετε, μή introduce una prohibición directa. En español, 'No' conserva la fuerza imperativa de manera natural y breve.
- source_word: κρίνετε
  english_pob_choice: judge
  chosen_spanish: juzguen
  alternatives_spanish:
  - condenen
  - emitan juicio
  lexicon: BDAG
  rationale: κρίνω abarca juzgar, evaluar y condenar. 'Juzguen' mantiene la amplitud semántica y conserva la repetición léxica con κριθῆτε en la segunda cláusula, sin restringir el sentido a 'condenar'.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito/resulto. 'Para que' es la equivalencia natural en español y mantiene la relación causal-final sin añadir colorido interpretativo.
- source_word: κριθῆτε
  english_pob_choice: be judged
  chosen_spanish: sean juzgados
  alternatives_spanish:
  - sean condenados
  - reciban juicio
  lexicon: BDAG
  rationale: Se conserva el mismo núcleo léxico de κρίνω con la pasiva 'sean juzgados', para reflejar el paralelismo retórico del griego y no estrechar indebidamente el alcance a 'condenados'.
theological_decisions:
- issue: Alcance de κρίνω en la prohibición de Jesús
  english_pob_reading: Retain the broader term 'judge' rather than interpretively narrowing it to 'condemn.'
  chosen_spanish_reading: Mantener 'juzgar' en vez de estrecharlo a 'condenar'.
  alternative_spanish_readings:
  - No condenen, para que no sean condenados.
  - No emitan juicio, para que no se emita juicio contra ustedes.
  rationale: El contexto inmediato (7:2–5) aclara el tipo de juicio en vista, pero este versículo por sí solo no limita el verbo a la condena final. 'Juzguen' preserva la tensión lexical y deja que el contexto determine el alcance.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide con el audit trail inglés en la decisión principal de conservar κρίνω como 'juzgar', manteniendo el paralelismo verbal entre ambas cláusulas.
  spanish_consistency_notes:
  - Se emplea 'juzguen' como plural de trato general, acorde con la forma plural griega.
  - Se evita 'SEÑOR' o terminología no pertinente; el versículo no contiene el nombre divino ni títulos cristológicos.
  - La nota al pie preserva la alternativa interpretativa documentada sin resolver la tensión semántica de κρίνω.
