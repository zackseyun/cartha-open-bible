translation:
  language: es
  text: ¡Hipócrita, saca primero la viga[a] de tu ojo, y entonces verás claramente para sacar la paja[b] del ojo de tu hermano!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madero» o «trabe» para δοκός («viga»).
    reason: lexical_alternative
  - marker: b
    text: O «astilla», «esquirla» o «brizna» para κάρφος («paja»).
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποκριτά
  english_pob_choice: Hypocrite
  chosen_spanish: ¡Hipócrita!
  alternatives_spanish:
  - ¡Fariseo!
  - ¡Hipócrita, tú!
  lexicon: BDAG
  rationale: El vocativo singular expresa reprensión directa. «Hipócrita» conserva la fuerza acusatoria del griego y corresponde al tratamiento auditable de la POB en inglés; no se agrega un pronombre innecesario en español.
- source_word: ἔκβαλε
  english_pob_choice: remove
  chosen_spanish: saca
  alternatives_spanish:
  - saca fuera
  - quita
  - expulsa
  lexicon: BDAG
  rationale: El imperativo aoristo de ἐκβάλλω aquí describe extraer algo de un ojo. «Saca» es natural en español y mantiene la imagen física sin sonar artificial.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: BDAG
  rationale: Marca prioridad secuencial. «Primero» es la equivalencia directa y fluida en español.
- source_word: δοκόν
  english_pob_choice: beam
  chosen_spanish: viga
  alternatives_spanish:
  - madero
  - trabe
  - madera
  lexicon: BDAG
  rationale: δοκός designa una pieza grande de madera estructural. «Viga» conserva la exageración visual del contraste con la paja y es más idiomática que un calco.
- source_word: ὀφθαλμοῦ
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  lexicon: BDAG
  rationale: ὀφθαλμός se traduce de forma estándar por «ojo» en este símil corporal.
- source_word: διαβλέψεις
  english_pob_choice: you will see clearly
  chosen_spanish: verás claramente
  alternatives_spanish:
  - verás con claridad
  - podrás ver claramente
  lexicon: BDAG
  rationale: διαβλέπω intensifica el acto de ver. «Verás claramente» conserva esa intensificación con español natural.
- source_word: ἐκβαλεῖν
  english_pob_choice: to remove
  chosen_spanish: sacar
  alternatives_spanish:
  - quitar
  - extraer
  - sacar fuera
  lexicon: BDAG
  rationale: El infinitivo retoma el verbo del mandato anterior. «Sacar» mantiene la consistencia léxica y el movimiento físico de la metáfora.
- source_word: κάρφος
  english_pob_choice: speck
  chosen_spanish: paja
  alternatives_spanish:
  - astilla
  - esquirla
  - brizna
  lexicon: BDAG
  rationale: κάρφος puede referirse a una partícula pequeña y seca, incluso un fragmento de paja. «Paja» sigue de cerca la imagen tradicional y conserva el contraste con la viga; en español también comunica bien lo diminuto frente a lo enorme. Dado que la POB en inglés preserva la alternativa lexical, se documenta la posibilidad de otras partículas pequeñas.
- source_word: ἀδελφοῦ
  english_pob_choice: brother’s
  chosen_spanish: de tu hermano
  alternatives_spanish:
  - de tu prójimo
  - de otra persona
  lexicon: BDAG
  rationale: ἀδελφός es literalmente «hermano». Se mantiene el sustantivo masculino porque la fuente griega es masculina singular y la tradición auditada de la POB preserva esa precisión relacional.
theological_decisions:
- issue: Tratamiento del término relacional ἀδελφοῦ
  english_pob_reading: brother’s
  chosen_spanish_reading: de tu hermano
  alternative_spanish_readings:
  - de tu prójimo
  - de otra persona
  rationale: Se conserva el valor masculino singular del griego sin neutralizarlo, siguiendo el criterio doctrinal de precisión de género cuando el texto así lo presenta. En este contexto, además, encaja con el lenguaje de Jesús sobre corrección entre miembros de la comunidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Intensificación verbal de διαβλέψεις
  english_pob_reading: you will see clearly
  chosen_spanish_reading: verás claramente
  alternative_spanish_readings:
  - verás con claridad
  - podrás ver claramente
  rationale: No se reduce a un simple «verás», porque el compuesto griego añade la idea de visión despejada. La elección española mantiene la fuerza sin sobreexplicar.
  doctrine_reference: BDAG / audit trail lexical note
- issue: Imagen corporal y proverbial de δοκός / κάρφος
  english_pob_reading: beam / speck
  chosen_spanish_reading: viga / paja
  alternative_spanish_readings:
  - madero / astilla
  - trabe / esquirla
  rationale: La tensión retórica depende del contraste entre un objeto enorme y uno minúsculo. «Viga» y «paja» preservan ese contraste de forma inteligible en español, sin borrar la hipérbole del dicho.
  doctrine_reference: Matthew 7:3-5 discourse context
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con el último pase de revisión: no se identificaron cambios necesarios; se mantiene alta concordancia con el audit trail inglés y la decisión léxica documentada.'
  spanish_consistency_notes:
  - Se conserva el vocativo abrupto con signo de exclamación para reflejar la reprensión directa.
  - Se usa «saca» y «sacar» de manera consistente para ἔκβαλε / ἐκβαλεῖν.
  - Se mantiene el contraste retórico grande/pequeño con «viga» y «paja», adecuado para lectura pública en español.
  - Se evita neutralizar «tu hermano» para no borrar la precisión gramatical y relacional del texto griego.
