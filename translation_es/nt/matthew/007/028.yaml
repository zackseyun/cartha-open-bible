translation:
  language: es
  text: Y aconteció[a] que cuando Jesús terminó estas palabras[b], las multitudes se asombraron de su enseñanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Traducción tradicional: «Y aconteció».'
    reason: lexical_alternative
  - marker: b
    text: «Palabras» también puede entenderse como «dichos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  - Y llegó a pasar
  lexicon: BDAG
  rationale: La fórmula narrativa griega se conserva con una equivalencia natural en español. «Aconteció» mantiene el tono bíblico sin recurrir a una parrafada explicativa, y refleja la transición narrativa del original.
- source_word: ὅτε
  english_pob_choice: that when
  chosen_spanish: que, cuando
  alternatives_spanish:
  - cuando
  - al cuando
  lexicon: BDAG
  rationale: Con la construcción previa, el griego introduce una cláusula temporal dependiente. «Que, cuando» reproduce de manera clara la relación sintáctica completa en español sin perder la subordinación.
- source_word: ἐτέλεσεν
  english_pob_choice: had finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - concluyó
  - dio por terminado
  lexicon: BDAG
  rationale: El aoristo señala la conclusión del discurso. En español, «terminó» comunica bien la acción completada dentro de la cláusula temporal sin forzar un pluscuamperfecto innecesario.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - estas declaraciones
  - estos dichos
  lexicon: BDAG
  rationale: λόγοι puede abarcar «palabras», «dichos» o «discursos». Aquí el contexto inmediato es la enseñanza pronunciada por Jesús, y «estas palabras» conserva la referencia demostrativa y el carácter de discurso sin interpretar más allá del texto. Se evita «sermón» porque no está en el griego.
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were astonished
  chosen_spanish: se asombraron
  alternatives_spanish:
  - quedaron asombradas
  - estaban asombradas
  - se maravillaron
  lexicon: BDAG
  rationale: El imperfecto indica una reacción colectiva en curso. «Se asombraron» expresa bien la fuerza del verbo y su efecto sobre el grupo, con un español natural y digno.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la multitud
  - la gente
  lexicon: BDAG
  rationale: El plural griego se preserva con un plural español. «Multitudes» refleja mejor la pluralidad de ὄχλοι que un singular, y es sobrio y bíblico en registro.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  english_pob_choice: at his teaching
  chosen_spanish: de su enseñanza
  alternatives_spanish:
  - por su enseñanza
  - ante su enseñanza
  - a causa de su enseñanza
  lexicon: BDAG
  rationale: Con ἐπί + dativo y el verbo de asombro, el sentido es la base u ocasión del asombro. En español, «de su enseñanza» expresa de manera natural aquello que provocó el asombro. «Enseñanza» traduce διδαχή con claridad y sin crear una distinción innecesaria entre acto y contenido.
theological_decisions:
- issue: Referencia del discurso de Jesús
  english_pob_reading: these words refers to the immediately preceding teaching, rendered straightforwardly without expanding to a theological label such as 'sermon.'
  chosen_spanish_reading: «estas palabras» se entiende como la enseñanza inmediatamente anterior de Jesús, sin ampliarla a una etiqueta como «sermón».
  alternative_spanish_readings:
  - estas palabras
  - estos dichos
  - este sermón
  rationale: El griego no añade una etiqueta homilética; solo remite al discurso recién concluido. Mantener la referencia simple respeta la primacía del texto original y evita una interpretación no explicitada.
  doctrine_reference: Principio de primacía del texto fuente; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando todas las notas al texto español mediante [a] y [b], y se mantuvo la correspondencia fuente-idioma sin introducir una etiqueta interpretativa como «sermón».
  spanish_consistency_notes:
  - Se preserva el plural de οἱ ὄχλοι con «las multitudes».
  - Se traduce διδαχή con «enseñanza», no con «doctrina», porque el contexto inmediato es la enseñanza pública de Jesús.
  - Se mantiene un registro bíblico contemporáneo, evitando arcaísmos innecesarios.
  - Las notas [a] y [b] están ancladas exactamente en las palabras marcadas en el texto.
