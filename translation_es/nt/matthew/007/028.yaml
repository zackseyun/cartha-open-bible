review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del griego: la fórmula narrativa, la finalización del discurso de Jesús, la reacción de las multitudes y el objeto de esa reacción. Sin embargo, hay pequeños problemas de naturalidad y de alineación con la evidencia auditada: la puntuación en «que, cuando» suena forzada; «se asombraron» debilita un poco el matiz imperfectivo de ἐξεπλήσσοντο; y la nota [b] está anclada en «estas palabras» cuando en realidad corresponde a la fórmula inicial «Y aconteció».'
  spanish_quality_summary: El español es claro y digno, pero «Y aconteció que, cuando...» resulta algo rígido con esa coma, y la colocación de las notas entorpece la lectura. «Las multitudes» es aceptable, aunque algo más tradicional que natural; no obstante, no exige corrección. Conviene ajustar la redacción para mayor fluidez y ubicar la nota tradicional donde corresponde.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Jesús», «enseñanza» y «palabras» están bien. La elección de «multitudes» es defendible aunque menos natural que «las multitudes/la gente/las muchedumbres» según registro. La principal observación es de precisión editorial: la nota sobre la traducción tradicional de Καὶ ἐγένετο debe ir con «Y aconteció[a]», no con «estas palabras».'
  issues:
  - severity: medium
    issue: La nota [b] está anclada a «estas palabras» pero comenta la fórmula inicial «Y aconteció».
    rationale: Las notas deben aparecer en el lugar pertinente del texto. Aquí la nota tradicional corresponde a Καὶ ἐγένετο, no a τοὺς λόγους τούτους.
  - severity: low
    issue: La secuencia «que, cuando» con coma resulta poco natural en español.
    rationale: Aunque intenta reflejar el inglés auditado «that when», el español no necesita reproducir de manera tan literal la sintaxis escalonada. «Y aconteció[a] que cuando...» preserva mejor el sentido y fluye con naturalidad.
  - severity: low
    issue: «Se asombraron» pierde algo del matiz progresivo/colectivo del imperfecto ἐξεπλήσσοντο.
    rationale: No es una mala traducción, pero «quedaron asombradas» o «estaban asombradas» pueden sonar marcados. «Se asombraron» sigue siendo aceptable; no obstante, «quedaron asombradas» tampoco mejora claramente. Se puede conservar el verbo por naturalidad.
  revised_spanish_text: Y aconteció[a] que cuando Jesús terminó estas palabras[b], las multitudes se asombraron de su enseñanza.
  revised_footnotes:
  - marker: a
    text: 'Traducción tradicional: «Y aconteció».'
    reason: lexical_alternative
  - marker: b
    text: «Palabras» también puede entenderse como «dichos».
    reason: lexical_alternative
  revision_rationale: Se corrige la colocación de las notas para que cada una ancle la expresión que realmente comenta, y se suaviza la puntuación para un español más natural sin alterar el sentido del griego ni las decisiones léxicas auditadas.
