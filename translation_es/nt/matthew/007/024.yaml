revisions:
- from: Así que todo el que oye estas palabras mías y las hace, será comparado[a] a un hombre sabio[b], que edificó su casa sobre la roca.
  to: Así que todo el que oye estas palabras mías y las hace será como[a] un hombre sabio[b], que edificó su casa sobre la roca.
  rationale: Se ajusta ὁμοιωθήσεται a la forma española más natural y fiel en contexto ('será como'), manteniendo en nota la alternativa más explícita de comparación. También se elimina la coma innecesaria antes del verbo principal. El resto del texto conserva bien el sentido fuente y las decisiones léxicas auditadas.
