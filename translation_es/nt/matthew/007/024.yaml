translation:
  language: es
  text: Así que todo el que oye estas palabras mías y las hace será como[a] un hombre sabio[b], que edificó su casa sobre la roca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será comparado con» o «será semejante a».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «un hombre sabio»; se conserva el masculino porque la comparación es gramaticalmente masculina en la fuente.
    reason: cultural_note
lexical_decisions:
- source_word: Πᾶς οὖν ὅστις
  english_pob_choice: Therefore everyone who
  chosen_spanish: Así que todo el que
  alternatives_spanish:
  - Por tanto, todo el que
  - Entonces todo el que
  - Así que cualquiera que
  lexicon: BDAG
  rationale: οὖν marca una inferencia; en español, «Así que» comunica bien la conexión lógica sin sonar artificial. πᾶς + ὅστις tiene fuerza distributiva/generica, mejor expresada como «todo el que» que como una traducción más literal y menos natural.
- source_word: ἀκούει μου τοὺς λόγους τούτους
  english_pob_choice: hears these words of mine
  chosen_spanish: oye estas palabras mías
  alternatives_spanish:
  - oye estas palabras de mí
  - escucha estas palabras mías
  - oye estos dichos míos
  lexicon: BDAG
  rationale: λόγους puede ser «palabras» o «dichos»; «palabras» es claro y natural en español. «Oye» conserva el valor básico de ἀκούω sin introducir matices excesivos. «Mías» preserva el genitivo de pertenencia sin necesidad de una perífrasis más pesada.
- source_word: καὶ ποιεῖ αὐτούς
  english_pob_choice: and does them
  chosen_spanish: y las hace
  alternatives_spanish:
  - y las pone en práctica
  - y actúa conforme a ellas
  - y las practica
  lexicon: BDAG
  rationale: ποιέω aquí significa hacer/realizar lo escuchado. Como el referente inmediato en español es «palabras», el pronombre femenino plural «las» mantiene la concordancia natural. «Las hace» conserva la brevedad y la fuerza directa del griego, más que una expansión interpretativa.
- source_word: ὁμοιωθήσεται
  english_pob_choice: will be like
  chosen_spanish: será comparado[a] a
  alternatives_spanish:
  - será como
  - será semejante a
  - será parecido a
  lexicon: BDAG
  rationale: El pasivo futuro permite tanto un valor idiomático («será como») como uno más explícito de comparación («será comparado a» / «semejado a»). Se eligió «será comparado a» para conservar la comparación verbal del griego y la alternativa del audit trail inglés, evitando perder la fuerza pasiva.
- source_word: ἀνδρὶ φρονίμῳ
  english_pob_choice: a wise man
  chosen_spanish: un hombre sabio[b]
  alternatives_spanish:
  - un hombre prudente
  - un varón sabio
  - una persona sabia
  lexicon: BDAG
  rationale: ἀνήρ es específicamente «hombre» en masculino, no un término genérico. φρόνιμος admite «sabio» o «prudente»; aquí «sabio» es más natural y comunica bien la cualidad ejemplar. Se conserva el masculino por fidelidad al género gramatical y al cuadro comparativo del texto.
- source_word: ᾠκοδόμησεν
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó
  - levantó
  lexicon: BDAG
  rationale: οἰκοδομέω significa construir/edificar. «Edificó» mantiene el campo semántico de construcción y suena bien en el registro bíblico en español, sin ser arcaizante.
- source_word: αὐτοῦ τὴν οἰκίαν
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa
  - su vivienda
  - su hogar
  lexicon: BDAG
  rationale: οἰκία es literalmente «casa» y el posesivo es claro en contexto. «Casa» preserva la imagen arquitectónica central; «hogar» introduciría un matiz menos material que el del símil.
- source_word: ἐπὶ τὴν πέτραν
  english_pob_choice: on the rock
  chosen_spanish: sobre la roca
  alternatives_spanish:
  - sobre la roca
  - en la roca
  - sobre la peña
  lexicon: BDAG
  rationale: πέτρα es «roca» y aquí designa un fundamento firme. «Sobre la roca» reproduce la imagen con naturalidad en español y evita sobreespecificar el tipo de soporte.
theological_decisions:
- issue: Comparación pasiva en ὁμοιωθήσεται
  english_pob_reading: will be like / will be compared to
  chosen_spanish_reading: será comparado a
  alternative_spanish_readings:
  - será como
  - será semejante a
  rationale: El griego usa un futuro pasivo que puede sonar simplemente idiomático en español como «será como», pero la forma más explícita conserva mejor la construcción comparativa. La nota mantiene abierta la alternativa semántica sin borrar la tensión entre equivalencia idiomática y pasiva verbal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3-4
- issue: Referencia masculina en el símil
  english_pob_reading: a wise man
  chosen_spanish_reading: un hombre sabio[b]
  alternative_spanish_readings:
  - una persona sabia
  - un hombre prudente
  rationale: El texto griego dice ἀνδρὶ, con referencia masculina explícita. Para no neutralizar indebidamente el símil, se mantiene «hombre». La generalidad de la advertencia ya está expresada por «todo el que» al inicio.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El testimonio de revisión disponible indica alta concordancia y no registra cambios posteriores; por eso la redacción sigue de cerca el paquete fuente y el audit trail inglés sin introducir ajustes no atestiguados.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo requiere.
  - Se mantiene «roca» y no «piedra» porque πέτρα en este contexto apunta al fundamento rocoso.
  - Se conserva la fuerza distributiva de πᾶς οὖν ὅστις con «todo el que».
  - El pronombre objeto femenino plural «las» refleja el referente inmediato «palabras», aunque el griego usa αὐτούς de forma gramaticalmente masculina por λόγους.
