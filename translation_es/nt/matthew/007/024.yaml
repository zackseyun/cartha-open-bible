review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: inferencia con οὖν, alcance distributivo de Πᾶς οὖν ὅστις, ''oye estas palabras mías'', ''las hace'', comparación con ''un hombre sabio'', y la imagen de construir su casa sobre la roca. Sin embargo, la elección española ''será comparado a'' no es la mejor equivalencia idiomática ni la formulación más natural para ὁμοιωθήσεται en este contexto; el inglés auditado prefirió ''will be like'' con nota de alternativa, y en español ''será como'' preserva mejor el sentido sin torpeza.'
  spanish_quality_summary: La redacción es en general clara y digna, pero 'será comparado a' suena forzado en español bíblico natural; además, la construcción más idiomática sería 'comparado con' si se mantuviera el verbo. 'Así que' es aceptable, pero 'Por tanto' o 'Así que' ambos funcionan; no requiere cambio obligatorio. El resto del verso es legible y fiel. Conviene también evitar una coma innecesaria que separa sujeto y verbo principal.
  glossary_alignment: No hay conflictos con la terminología de proyecto. 'Hombre sabio' concuerda con la decisión documentada sobre ἀνήρ. 'Roca' y 'casa' están bien. La única desalineación menor es que la decisión inglesa principal para ὁμοιωθήσεται es idiomática ('will be like'), y el español debería seguir esa misma racionalidad principal, dejando 'será comparado con/a' como alternativa de nota si se desea.
  issues:
  - severity: medium
    issue: '''será comparado[a] a'' es poco natural y menos fiel al uso idiomático español de ὁμοιωθήσεται en este contexto.'
    rationale: Aunque el pasivo griego permite una glosa explícita de comparación, el equivalente español más natural y fiel en el discurso de Jesús es 'será como'. Además, 'comparado a' suena torpe; si se mantuviera el verbo, normalmente sería 'comparado con'.
  - severity: low
    issue: La coma antes de 'será' entorpece la lectura.
    rationale: 'En español no se suele separar con coma el sujeto complejo de su verbo principal: ''todo el que oye... y las hace será...'' fluye mejor sin esa pausa.'
  revised_spanish_text: Así que todo el que oye estas palabras mías y las hace será como[a] un hombre sabio[b], que edificó su casa sobre la roca.
  revised_footnotes:
  - marker: a
    text: O «será comparado con» o «será semejante a».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «un hombre sabio»; se conserva el masculino porque la comparación es gramaticalmente masculina en la fuente.
    reason: cultural_note
  revision_rationale: Se ajusta ὁμοιωθήσεται a la forma española más natural y fiel en contexto ('será como'), manteniendo en nota la alternativa más explícita de comparación. También se elimina la coma innecesaria antes del verbo principal. El resto del texto conserva bien el sentido fuente y las decisiones léxicas auditadas.
