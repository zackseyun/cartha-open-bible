revisions:
- from: 'Y entonces declararé a ellos[a]: «Nunca los conocí; apártense de mí[b], los que practican la maldad».'
  to: 'Y entonces les declararé[a]: «Nunca los conocí; apártense de mí, ustedes que practican la iniquidad[b]».'
  rationale: Se revisa el texto para (1) hacer más natural αὐτοῖς con «les declararé», (2) conservar el wording relacional de ἔγνων, y sobre todo (3) corregir ἀνομίαν a «iniquidad», que refleja mejor la fuerza moral-legal documentada que «maldad». La nota [b] se reasigna al sintagma final para representar las alternativas auditadas para «you who practice lawlessness».
