review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia y el tono judicial de καὶ τότε ὁμολογήσω, y mantiene acertadamente «Nunca los conocí» para preservar la tensión relacional/judicial de ἔγνων. Sin embargo, falla en un punto semántico importante: ἀνομίαν se ha generalizado como «maldad», cuando el expediente inglés documenta explícitamente «lawlessness» como decisión clave que debe preservar la fuerza moral-legal de desprecio por la ley de Dios. Además, la nota [b] no refleja la alternativa documentada para οἱ ἐργαζόμενοι τὴν ἀνομίαν, sino solo alternativas para ἀποχωρεῖτε.'
  spanish_quality_summary: El español es mayormente natural y digno. No obstante, «declararé a ellos» suena menos idiomático que «les declararé» o «les diré claramente». Dado que el énfasis del verbo está en la declaración formal, «les declararé» resuelve la fluidez sin perder solemnidad. También conviene alinear la nota [a] con la alternativa inglesa «acknowledged» mediante «reconocí» o mejor «los reconocí / los admití», manteniendo la explicación de conocimiento relacional.
  glossary_alignment: 'No hay conflicto con términos de proyecto como Yahvé/Mesías/etc. El problema principal es la desviación de ἀνομία respecto de la decisión léxica auditada: debe evitarse «maldad» como texto principal. «Iniquidad» es posible, pero «desprecio por la ley» sería demasiado interpretativo; la opción más fiel y clara en español bíblico moderno es «la iniquidad» o «la ilegalidad» no sirve. Por precisión y legibilidad, «los que practican la iniquidad» preserva mejor la categoría moral-legal que «maldad».'
  issues:
  - severity: high
    issue: τὴν ἀνομίαν se tradujo como «la maldad».
    rationale: La auditoría inglesa establece «lawlessness» como decisión central para preservar la fuerza moral-legal del término. «Maldad» la diluye en una categoría ética general y no mantiene la razón léxica documentada.
  - severity: medium
    issue: La nota [b] no corresponde al alcance del inglés auditado.
    rationale: La nota inglesa b ofrece alternativas para «you who practice lawlessness» («you who work iniquity / do wickedness»). La nota española actual solo da variantes de «apártense», dejando sin reflejo la alternativa significativa sobre ἐργαζόμενοι τὴν ἀνομίαν.
  - severity: low
    issue: «declararé a ellos» es poco idiomático en español.
    rationale: Aunque comprensible, suena calcado. «les declararé» conserva el dativo αὐτοῖς y mejora la naturalidad sin perder el tono formal.
  revised_spanish_text: 'Y entonces les declararé[a]: «Nunca los conocí; apártense de mí, ustedes que practican la iniquidad[b]».

