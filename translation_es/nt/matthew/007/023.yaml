translation:
  language: es
  text: 'Y entonces les declararé[a]: «Nunca los conocí; apártense de mí, ustedes que practican la iniquidad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Nunca los reconocí». El griego «conocí» puede expresar reconocimiento relacional, no solo conocimiento mental.
    reason: lexical_alternative
  - marker: b
    text: O «ustedes que obran maldad» / «ustedes que hacen maldad».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ τότε
  english_pob_choice: And then
  chosen_spanish: Y entonces
  alternatives_spanish:
  - Entonces
  - Y en ese momento
  lexicon: BDAG
  rationale: La combinación de la conjunción y el adverbio temporal expresa secuencia e inmediatez respecto del contexto anterior. «Y entonces» conserva ambos valores en un español natural.
- source_word: ὁμολογήσω
  english_pob_choice: I will declare
  chosen_spanish: declararé
  alternatives_spanish:
  - confesaré
  - reconoceré
  - diré
  lexicon: BDAG
  rationale: Aquí el verbo tiene fuerza pública y judicial, no la de admitir culpa. «Declararé» reproduce mejor ese acto formal de pronunciar sentencia o veredicto.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a los tales
  - a esas personas
  lexicon: BDAG
  rationale: El referente queda deliberadamente directo y desapegado en el texto. «A ellos» mantiene esa distancia sin añadir interpretación.
- source_word: Οὐδέποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - en ningún momento
  lexicon: BDAG
  rationale: La negación absoluta del adverbio se expresa bien con «nunca» en español contemporáneo, de manera concisa y enfática.
- source_word: ἔγνων
  english_pob_choice: knew
  chosen_spanish: conocí
  alternatives_spanish:
  - supe de
  - reconocí
  - acknowledged
  lexicon: BDAG
  rationale: «Conocí» preserva el verbo de conocimiento relacional sin resolverlo en el texto principal hacia «aprobar» o «reconocer». Mantiene la tensión teológica del original.
- source_word: ἀποχωρεῖτε
  english_pob_choice: depart
  chosen_spanish: apártense
  alternatives_spanish:
  - aléjense
  - váyanse
  - retírense
  lexicon: BDAG
  rationale: Como mandato de expulsión o despedida solemne, «apártense» suena natural y serio en español, y comunica separación efectiva.
- source_word: ἀπ’ ἐμοῦ
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartados de mí
  lexicon: BDAG
  rationale: La preposición expresa alejamiento. «De mí» es la equivalencia directa y deja abierta la fuerza relacional y judicial del desecho.
- source_word: οἱ ἐργαζόμενοι
  english_pob_choice: you who practice
  chosen_spanish: los que practican
  alternatives_spanish:
  - los que hacen
  - los que trabajan
  - los que están haciendo
  lexicon: BDAG
  rationale: El participio describe conducta habitual. «Practican» comunica mejor acción sostenida que «trabajan», que sería demasiado literal y menos idiomático.
- source_word: τὴν ἀνομίαν
  english_pob_choice: lawlessness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la iniquidad
  - la anarquía moral
  - la ilegalidad
  lexicon: BDAG
  rationale: Aunque «maldad» generaliza más que «lawlessness», en español bíblico es claro y natural. Se evita «iniquidad» por menor transparencia y «ilegalidad» por sonar demasiado técnico; el sentido de oposición a la voluntad de Dios queda implícito en el contexto.
theological_decisions:
- issue: Sentido de «I never knew you»
  english_pob_reading: Retained the relational/judicial wording 'I never knew you' without paraphrasing it as 'I never approved of you' or 'you were never truly mine.'
  chosen_spanish_reading: «Nunca los conocí» se mantiene sin glosa explicativa en el cuerpo del versículo.
  alternative_spanish_readings:
  - Nunca los reconocí
  - Nunca los aprobé
  - Nunca fueron míos
  rationale: El griego conserva una forma directa de conocimiento relacional/judicial. Traducirlo como conocimiento evita cerrar la interpretación y respeta la tensión teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance de ἀνομία
  english_pob_reading: Rendered as 'lawlessness' rather than a more generalized moral term.
  chosen_spanish_reading: «maldad» en el texto principal, con nota para la alternativa más literal.
  alternative_spanish_readings:
  - sin ley
  - iniquidad
  - ilegalidad
  rationale: El español requiere decidir entre precisión semántica y fluidez. Dado que el contexto condena una conducta opuesta a la voluntad divina, «maldad» comunica de forma clara el juicio moral; la nota preserva la alternativa más cercana al matiz de ley.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no hubo cambios necesarios en el estado de revisión más reciente, y el texto inglés auditado mantiene alta concordancia con el griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «conocí» para conservar el valor relacional de γινώσκω sin explicitarlo en el cuerpo del texto.
  - Se evita «Cristo/Mesías» porque no aparece en el versículo.
  - Se prefiere un español público y reverente, evitando arcaísmos innecesarios como «iniquidad» en el texto principal.
  - La puntuación reproduce la separación fuerte entre la declaración y la orden de expulsión mediante punto y coma y comillas españolas.
