- from: Por sus frutos[a] los reconocerán. ¿Acaso se recogen uvas[b] de espinos, o higos de abrojos?
  to: Ustedes los reconocerán por sus frutos[a]. ¿Acaso se recogen uvas[b] de espinos, o higos de abrojos?
  rationale: Se corrige la primera cláusula para reflejar explícitamente la segunda persona plural del griego y evitar que el español se entienda como tercera persona plural. Se mantienen la metáfora de 'frutos', el valor retórico de la pregunta y el resto de las decisiones léxicas del borrador.
