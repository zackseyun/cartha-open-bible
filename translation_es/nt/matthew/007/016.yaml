translation:
  language: es
  text: Ustedes los reconocerán por sus frutos[a]. ¿Acaso se recogen uvas[b] de espinos, o higos de abrojos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes los conocerán por sus frutos».'
    reason: lexical_alternative
  - marker: b
    text: 'La pregunta espera una respuesta negativa: no se recogen uvas de espinos ni higos de abrojos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τῶν καρπῶν αὐτῶν
  english_pob_choice: by their fruits
  chosen_spanish: por sus frutos
  alternatives_spanish:
  - por sus resultados
  - por sus obras
  lexicon: BDAG
  rationale: Conservo la imagen agrícola concreta de καρποί como 'frutos', porque el contexto usa un símil visible para el discernimiento. 'Por sus frutos' es natural en español y mantiene la correspondencia con el audit trail inglés.
- source_word: ἐπιγνώσεσθε
  english_pob_choice: you will recognize
  chosen_spanish: los reconocerán
  alternatives_spanish:
  - los conocerán
  - los identificarán
  lexicon: BDAG
  rationale: ἐπιγινώσκω aquí expresa llegar a reconocer por evidencia observable. 'Reconocerán' reproduce bien esa idea en español sin reducirla a simple conocimiento abstracto.
- source_word: μήτι
  english_pob_choice: Do
  chosen_spanish: ¿Acaso ...?
  alternatives_spanish:
  - ¿Se ... acaso?
  - ¿Es que ...?
  lexicon: BDAG
  rationale: μήτι introduce una pregunta que espera respuesta negativa. En español, '¿Acaso ...?' comunica bien la fuerza retórica sin añadir una negación explícita pesada.
- source_word: συλλέγουσιν
  english_pob_choice: gather
  chosen_spanish: se recogen
  alternatives_spanish:
  - se juntan
  - se cosechan
  lexicon: BDAG
  rationale: Para la recolección de uvas e higos, 'se recogen' suena natural y conserva la imagen de cosecha. El pasivo impersonal funciona bien con el interrogativo retórico.
- source_word: ἀκανθῶν
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - espinas
  - zarzas
  lexicon: BDAG
  rationale: '''Espinos'' en español puede designar el matorral espinoso, no solo las espinas aisladas, y encaja mejor con el lugar del que no se espera cosecha. Mantiene la tensión entre planta inútil y fruto comestible.'
- source_word: σταφυλάς
  english_pob_choice: grapes
  chosen_spanish: uvas
  alternatives_spanish:
  - racimos
  - bayas
  lexicon: BDAG
  rationale: '''Uvas'' es el equivalente claro y directo en español para σταφυλή/σταφυλαί. Conserva el contraste agrícola sin forzar una terminología más técnica.'
- source_word: τριβόλων
  english_pob_choice: thistles
  chosen_spanish: abrojos
  alternatives_spanish:
  - cardos
  - maleza espinosa
  lexicon: BDAG
  rationale: '''Abrojos'' puede abarcar planta espinosa o maleza punzante y mantiene el paralelo con ''espinos''. Es una solución digna y bíblicamente reconocible en español, sin depender de un término regional demasiado estrecho.'
- source_word: σῦκα
  english_pob_choice: figs
  chosen_spanish: higos
  alternatives_spanish:
  - brevas
  lexicon: BDAG
  rationale: σῦκα es el plural normal de 'figs'; 'higos' es el equivalente directo y natural en español.
theological_decisions:
- issue: Metáfora de los frutos para el discernimiento de personas
  english_pob_reading: Retain the metaphor 'fruits' rather than interpretively expanding to 'actions' or 'results.'
  chosen_spanish_reading: Mantener 'frutos' sin explicarlo como 'acciones' o 'resultados'.
  alternative_spanish_readings:
  - por sus acciones
  - por los resultados que producen
  rationale: La imagen agrícola es central al dicho de Jesús y forma parte de su fuerza teológica. En español, 'frutos' preserva esa continuidad intertextual y deja que el contexto haga la interpretación.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza de la pregunta con respuesta negativa esperada
  english_pob_reading: 'The question expects a negative answer: people do not gather grapes from thorns or figs from thistles.'
  chosen_spanish_reading: La pregunta retórica espera una respuesta negativa implícita.
  alternative_spanish_readings:
  - No se recogen uvas de espinos, ¿verdad?
  - ¿Se recogen acaso uvas de espinos?
  rationale: El español puede transmitir la misma fuerza retórica con '¿Acaso ...?' sin añadir una glosa dentro del texto principal. La negación queda implícita, como en el griego y en el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin revisiones sustanciales en la última pasada; la versión española sigue esa lectura estable, conservando la metáfora de 'frutos' y la pregunta retórica con expectativa negativa.
  spanish_consistency_notes:
  - He mantenido 'frutos' como término metafórico central, en coherencia con la POB inglesa.
  - He usado 'espinos' y 'abrojos' para conservar el paralelismo agrícola sin volverlo explicativo.
  - He preferido una pregunta con '¿Acaso...?' para reflejar μήτι de forma natural en español.
  - No he introducido 'Cristo', 'SEÑOR' ni otros equivalentes no presentes en el pasaje.
