review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido del griego y sigue el audit trail inglés en los puntos principales: mantiene la metáfora de ''frutos'', refleja ἐπιγνώσεσθε con ''reconocer'', y expresa la pregunta retórica de μήτι con una formulación española natural. Sin embargo, hay un desajuste gramatical importante: el griego tiene segunda persona plural futura (''ustedes reconocerán / conocerán''), pero el español dice ''los reconocerán'' (tercera persona plural), lo cual cambia el sujeto y debilita la fidelidad al texto fuente.'
  spanish_quality_summary: El español es claro y digno, con buena fluidez general. 'Por sus frutos' y la pregunta retórica suenan naturales. 'Espinos' y 'abrojos' son comprensibles en registro bíblico, aunque 'abrojos' es algo más literario; aun así, no impide la lectura. La corrección necesaria es principalmente sintáctica/pronominal en la primera cláusula.
  glossary_alignment: No hay conflictos con la terminología global del proyecto en este versículo. Se preserva adecuadamente 'frutos' como metáfora teológica. No aparecen términos sensibles del glosario mayor. La nota alternativa para 'conocerán' sigue bien la decisión léxica inglesa.
  issues:
  - severity: high
    issue: Cambio indebido de persona verbal en 'los reconocerán'
    rationale: ἐπιγνώσεσθε es segunda persona plural futura ('ustedes reconocerán/conocerán'), pero 'los reconocerán' en español se interpreta naturalmente como tercera persona plural ('ellos los reconocerán'). Debe decir 'los reconocerán ustedes' o, más naturalmente, 'ustedes los reconocerán' / 'los reconocerán' solo si el sujeto queda claro por contexto previo; aquí no queda suficientemente claro y altera la referencia directa de Jesús a sus oyentes.
  - severity: medium
    issue: La nota alternativa repite el mismo problema de persona en 'los conocerán'
    rationale: 'La alternativa correspondiente a ''you will know them'' debe mantener segunda persona plural explícita o inequívoca: ''ustedes los conocerán'' o mejor una reestructuración natural como ''los conocerán por sus frutos'' con sujeto claro por contexto. Dado el riesgo de ambigüedad, conviene repararla también.'
  revised_spanish_text: Ustedes los reconocerán por sus frutos[a]. ¿Acaso se recogen uvas[b] de espinos, o higos de abrojos?
  revised_footnotes:
  - marker: a
    text: 'O: «Ustedes los conocerán por sus frutos».'
    reason: lexical_alternative
  - marker: b
    text: 'La pregunta espera una respuesta negativa: no se recogen uvas de espinos ni higos de abrojos.'
    reason: lexical_alternative
  revision_rationale: Se corrige la primera cláusula para reflejar explícitamente la segunda persona plural del griego y evitar que el español se entienda como tercera persona plural. Se mantienen la metáfora de 'frutos', el valor retórico de la pregunta y el resto de las decisiones léxicas del borrador.
