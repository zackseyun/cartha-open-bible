translation:
  language: es
  text: Y todo el que oye estas palabras mías y no las hace será semejante a un hombre insensato[a], que construyó su casa sobre la arena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona insensata». El griego dice «un hombre insensato», usando lenguaje masculino representativo en la comparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ ἀκούων
  english_pob_choice: everyone who hears
  chosen_spanish: todo el que oye
  alternatives_spanish:
  - cada uno que oye
  - quien oye
  lexicon: BDAG
  rationale: La construcción articular con participio funciona de modo genérico y sustantivo. «Todo el que oye» conserva ese alcance universal y suena natural en español sin perder formalidad.
- source_word: μου τοὺς λόγους τούτους
  english_pob_choice: these words of mine
  chosen_spanish: estas palabras mías
  alternatives_spanish:
  - estas mis palabras
  - estos dichos míos
  lexicon: BDAG
  rationale: «λόγους» aquí se refiere de manera directa a «palabras» o «dichos»; «palabras mías» mantiene el énfasis demostrativo y posesivo con buen español. Se evita «estas mis palabras» por sonar más marcado y menos natural.
- source_word: μὴ ποιῶν αὐτούς
  english_pob_choice: does not do them
  chosen_spanish: no las hace
  alternatives_spanish:
  - no las pone en práctica
  - no actúa conforme a ellas
  lexicon: BDAG
  rationale: «ποιῶν» aquí expresa hacer o ejecutar lo oído. «No las hace» sigue de cerca el paralelo del griego y conserva la fuerza verbal simple del original; las alternativas son más interpretativas.
- source_word: ὁμοιωθήσεται
  english_pob_choice: will be like
  chosen_spanish: será semejante a
  alternatives_spanish:
  - será como
  - será comparado con
  lexicon: BDAG
  rationale: El futuro pasivo comunica comparación. «Será semejante a» es una forma clara y digna en español que respeta el valor comparativo sin volverlo explicativo de más.
- source_word: ἀνδρὶ μωρῷ
  english_pob_choice: a foolish man
  chosen_spanish: un hombre insensato
  alternatives_spanish:
  - un hombre necio
  - una persona insensata
  lexicon: BDAG
  rationale: «ἀνήρ» es masculino singular y la comparación usa lenguaje representativo masculino. «Insensato» comunica bien μωρός en registro bíblico y evita la aspereza de «tonto» o «estúpido».
- source_word: ὅστις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: BDAG
  rationale: La relativa explicativa se expresa de forma natural en español con «que». Mantiene la subordinación sin sobrecargar el estilo.
- source_word: ᾠκοδόμησεν
  english_pob_choice: built
  chosen_spanish: construyó
  alternatives_spanish:
  - edificó
  - levantó
  lexicon: BDAG
  rationale: El aoristo denota la acción completa de construir. «Construyó» es claro y fiel en español moderno; «edificó» es posible, pero menos natural hoy.
- source_word: αὐτοῦ τὴν οἰκίαν
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su vivienda
  lexicon: BDAG
  rationale: «οἰκία» en la imagen parabólica apunta a una casa física. «Su casa» reproduce esa imagen de manera directa; «hogar» suaviza demasiado el referente material.
- source_word: ἐπὶ τὴν ἄμμον
  english_pob_choice: on the sand
  chosen_spanish: sobre la arena
  alternatives_spanish:
  - sobre la arena del suelo
  - encima de la arena
  lexicon: BDAG
  rationale: La preposición con acusativo indica ubicación/fundamento. En español, «sobre la arena» expresa bien la base inestable de la imagen; «arena» es más idiomático que «sand» traducido literalmente como «arena» en un contexto natural.
theological_decisions:
- issue: Lenguaje masculino representativo en la comparación
  english_pob_reading: a foolish man
  chosen_spanish_reading: un hombre insensato
  alternative_spanish_readings:
  - una persona insensata
  rationale: El griego usa ἀνδρί, un sustantivo masculino singular en una comparación representativa. Se mantiene «hombre» para no neutralizar indebidamente el rasgo del texto, aunque la aplicación sea general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y con la solución inglesa auditada. No se detectan revisiones aplicadas; la versión española conserva el paralelismo retórico, la comparación masculina representativa y la imagen concreta de la casa sobre la arena.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el paralelismo sintáctico con el versículo previo mediante «oye / no las hace / será semejante».
  - «Casa» y «arena» se conservan como imágenes físicas, no metafóricas ampliadas, porque el griego no exige mayor abstracción.
