translation:
  language: es
  text: Si ustedes, pues, siendo malos, saben dar buenos dones a sus hijos[a], ¡cuánto más su Padre en los cielos dará cosas buenas a los que le piden![b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: τέκνα significa 'hijos' en sentido inclusivo, es decir, hijos e hijas; no se limita a varones.
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones repiten 'buenos dones' en esta segunda cláusula, pero el griego dice simplemente 'cosas buenas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πονηροὶ ὄντες
  english_pob_choice: being evil
  chosen_spanish: siendo malos
  alternatives_spanish:
  - siendo malvados
  - aunque son malos
  lexicon: BDAG
  rationale: La construcción participial es descriptiva con matiz concesivo. 'Siendo malos' mantiene la fuerza directa del griego sin intensificar más allá del texto. 'Malvados' sería posible, pero suena más fuerte y menos natural en este contexto.
- source_word: οἴδατε διδόναι
  english_pob_choice: know how to give
  chosen_spanish: saben dar
  alternatives_spanish:
  - saben cómo dar
  - conocen cómo dar
  lexicon: BDAG
  rationale: En español, con el infinitivo complementario, 'saben dar' comunica la capacidad o habilidad implícita de forma natural. Añadir 'cómo' sería más explícito, pero no necesario para reflejar el sentido práctico de οἴδατε.
- source_word: δόματα ἀγαθὰ
  english_pob_choice: good gifts
  chosen_spanish: dones buenos
  alternatives_spanish:
  - buenos regalos
  - bienes buenos
  lexicon: BDAG
  rationale: δόματα es 'dones' o 'regalos'; 'dones buenos' conserva el sustantivo del griego y el adjetivo atributivo. En la segunda cláusula, el griego ya no repite δόματα, por lo que no conviene arrastrar 'regalos' allí.
- source_word: τοῖς τέκνοις ὑμῶν
  english_pob_choice: to your children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus hijos e hijas
  lexicon: BDAG
  rationale: τέκνα es un término inclusivo para hijos/hijas. En español, 'hijos' es natural y bíblicamente claro; 'niños' sería demasiado etario, y 'hijos e hijas' añade explicitud que el texto no exige aquí.
- source_word: πόσῳ μᾶλλον
  english_pob_choice: how much more
  chosen_spanish: ¡cuánto más!
  alternatives_spanish:
  - cuánto más
  - mucho más
  lexicon: BDAG
  rationale: Es la fórmula comparativa a fortiori. En español, '¡cuánto más!' mantiene el énfasis retórico y la fuerza comparativa del griego. Se integra bien con la exclamación de la cláusula.
- source_word: ὁ πατὴρ ὑμῶν ὁ ἐν τοῖς οὐρανοῖς
  english_pob_choice: your Father in the heavens
  chosen_spanish: su Padre en los cielos
  alternatives_spanish:
  - su Padre en el cielo
  - su Padre celestial
  lexicon: BDAG
  rationale: Se preserva la pluralidad de 'los cielos' frente al singular tradicional 'cielo'. 'Su Padre' evita repetir 'padre' con un giro forzado; el posesivo plural/usted queda natural en el castellano de trato general.
- source_word: δώσει ἀγαθὰ
  english_pob_choice: will give good things
  chosen_spanish: dará cosas buenas
  alternatives_spanish:
  - dará bienes buenos
  - dará dones buenos
  lexicon: BDAG
  rationale: En la segunda cláusula, ἀγαθὰ funciona sustantivamente; por eso 'cosas buenas' refleja la elipsis sin importar de nuevo 'dones'. 'Dará dones buenos' armonizaría indebidamente con la primera parte.
- source_word: τοῖς αἰτοῦσιν αὐτόν
  english_pob_choice: to those who ask him
  chosen_spanish: a los que le piden
  alternatives_spanish:
  - a los que le piden a él
  - a quienes lo solicitan
  lexicon: BDAG
  rationale: 'El participio presente sustantivado expresa una clase general: quienes piden. ''Le piden'' es idiomático en español y conserva el objeto personal implícito del pronombre αὐτόν. ''Solicitan'' suena menos natural y más administrativo.'
theological_decisions:
- issue: Fuerza antropológica de πονηροὶ ὄντες
  english_pob_reading: Retain the direct description 'being evil' without softening or expanding it.
  chosen_spanish_reading: Mantener 'siendo malos' sin suavizarlo ni convertirlo en una explicación moral más amplia.
  alternative_spanish_readings:
  - aunque ustedes son pecadores
  - siendo imperfectos moralmente
  rationale: La comparación de Jesús contrapone la bondad del Padre con la condición humana caída. 'Siendo malos' conserva la tensión del texto sin resolverla en una formulación doctrinal más amplia ni debilitarla.
  doctrine_reference: Preservar la tensión teológica del pasaje en lugar de armonizarla.
- issue: Pluralidad de ἐν τοῖς οὐρανοῖς
  english_pob_reading: Use 'your Father in the heavens' rather than the traditional singular.
  chosen_spanish_reading: Usar 'en los cielos' en vez de 'en el cielo' o 'celestial'.
  alternative_spanish_readings:
  - en el cielo
  - celestial
  rationale: El griego es plural, y la traducción debe reflejar esa forma. 'En los cielos' es transparente y fiel; no cambia la doctrina, pero sí la huella lingüística del original.
  doctrine_reference: Primacía del idioma original sobre la tradición traductora.
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios posteriores; la versión española sigue de cerca las decisiones ya estabilizadas, especialmente la conservación de la pluralidad de 'los cielos' y la diferencia entre 'dones' y 'cosas buenas'.
  spanish_consistency_notes:
  - Se usó 'malos' para πονηροὶ ὄντες, preservando la fuerza directa sin ampliar el juicio moral.
  - Se mantuvo 'los cielos' para reflejar el plural griego οὐρανοῖς.
  - Se distinguió entre 'dones buenos' en la primera cláusula y 'cosas buenas' en la segunda.
  - El tono general es digno, moderno y apto para lectura eclesial sin recurrir a calcos rígidos.
