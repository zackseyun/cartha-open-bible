translation:
  language: es
  text: Y la lluvia cayó, y los ríos[a] vinieron, y los vientos soplaron y golpearon aquella casa, y cayó, y grande fue su caída.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las inundaciones vinieron». El sustantivo griego es más literalmente «ríos», pero en contexto puede evocar aguas desbordadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  english_pob_choice: came down
  chosen_spanish: cayó
  alternatives_spanish:
  - bajó
  - descendió
  lexicon: BDAG
  rationale: Con lluvia, el verbo griego expresa movimiento hacia abajo; en español, «cayó» es natural y conserva la imagen descendente sin forzar una perífrasis. Mantiene la concisión de la cláusula inicial.
- source_word: βροχή
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - la lluvia
  lexicon: BDAG
  rationale: Es el equivalente normal y directo de βροχή; no requiere ampliación.
- source_word: ἦλθον οἱ ποταμοί
  english_pob_choice: the rivers came
  chosen_spanish: los ríos vinieron
  alternatives_spanish:
  - vinieron las corrientes
  - vinieron las inundaciones
  lexicon: BDAG
  rationale: Se conserva la referencia literal a ποταμοί como «ríos», porque el POB inglés opta por mantener esa literalidad aun reconociendo la posible evocación de aguas de crecida. «Vinieron» reproduce el movimiento de ἦλθον.
- source_word: ἔπνευσαν οἱ ἄνεμοι
  english_pob_choice: the winds blew
  chosen_spanish: los vientos soplaron
  alternatives_spanish:
  - los vientos se levantaron
  - los vientos brillaron
  lexicon: BDAG
  rationale: ἔπνευσαν con ἄνεμοι se rinde de forma transparente por «soplaron», el verbo idiomático en español para el viento.
- source_word: προσέκοψαν τῇ οἰκίᾳ ἐκείνῃ
  english_pob_choice: struck that house
  chosen_spanish: golpearon contra aquella casa
  alternatives_spanish:
  - chocaron con aquella casa
  - se abatieron sobre aquella casa
  - golpearon aquella casa
  lexicon: BDAG
  rationale: προσκόπτω aquí describe el impacto del temporal sobre la casa, no «tropezar» en sentido literal. «Golpearon contra» conserva la fuerza del contacto y explicita la dirección de la acción en español sin agregar interpretación.
- source_word: ἔπεσεν
  english_pob_choice: it fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se derrumbó
  - se vino abajo
  lexicon: BDAG
  rationale: πίπτω se traduce de manera simple por «caer». Se evita «se derrumbó» por ser más interpretativo que el griego.
- source_word: ἡ πτῶσις αὐτῆς μεγάλη
  english_pob_choice: great was its fall
  chosen_spanish: grande fue su caída
  alternatives_spanish:
  - grande fue su derrumbe
  - fue grande su caída
  lexicon: BDAG
  rationale: πτῶσις se refleja con «caída» para mantener la relación léxica con «cayó». Se conserva el orden enfático final con una inversión natural en español («grande fue...»), acorde con el cierre solemne del verso.
theological_decisions:
- issue: Imagen de juicio y ruina al cierre de la parábola
  english_pob_reading: Rendered the final clause as 'great was its fall' without expanding it into explicit eschatological judgment language.
  chosen_spanish_reading: Se mantiene la imagen de ruina con «grande fue su caída», sin convertirla en una explicación explícita de juicio escatológico.
  alternative_spanish_readings:
  - fue una ruina terrible
  - su caída fue catastrófica
  rationale: El griego solo afirma la magnitud de la caída; la traducción preserva la advertencia narrativa sin añadir conclusiones doctrinales que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB inglés, que prefirió una forma más cercana a προσέκοψαν («struck») y una clausura más formal («great was its fall»). En español se mantuvo esa cercanía semántica con «golpearon contra» y «grande fue su caída», evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se preservó la secuencia paralela de acciones con verbos breves y directos.
  - Se mantuvo «aquella casa» para reflejar τῇ οἰκίᾳ ἐκείνῃ sin modernizarlo a un demostrativo menos marcado.
  - Se usó «caída» para πτῶσις por coherencia léxica con «cayó» y con el POB inglés.
  - 'La nota[a] recoge la misma tensión lexical que el audit trail inglés: «ríos» es literal, pero el contexto puede sugerir aguas de crecida.'
