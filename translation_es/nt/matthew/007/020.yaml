lexical_decisions:
- source_word: ἄρα γε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La partícula inferencial ἄρα γε introduce una conclusión con cierto énfasis. «Así que» comunica naturalmente esa conclusión en español moderno sin volver la frase más rígida de lo necesario.
- source_word: ἀπὸ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - a partir de
  - de
  - mediante
  lexicon: BDAG
  rationale: En esta construcción, la idea es la base o el criterio por el cual se identifica a las personas. «Por» expresa bien ese valor instrumental/criterial en español y conserva la relación con los frutos.
- source_word: καρπῶν
  english_pob_choice: fruits
  chosen_spanish: frutos
  alternatives_spanish:
  - fruto
  - resultados
  - obras
  lexicon: BDAG
  rationale: El plural griego debe preservarse. «Frutos» mantiene la metáfora bíblica y evita reducirla interpretivamente a «resultados» u «obras» en el texto principal.
- source_word: ἐπιγνώσεσθε
  english_pob_choice: you will recognize
  chosen_spanish: reconocerán
  alternatives_spanish:
  - conocerán
  - sabrán
  - discernirán
  lexicon: BDAG
  rationale: El verbo expresa identificación a partir de evidencia observable. En español, «reconocerán» comunica bien ese acto de discernir quiénes son sin debilitarlo a un simple conocimiento abstracto.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - esas personas
  lexicon: BDAG
  rationale: El pronombre acusativo se refiere a las personas en vista. «Los» es la forma más natural y directa en español dentro de esta estructura verbal.
theological_decisions:
- issue: Mantener la metáfora de los frutos como criterio de discernimiento
  english_pob_reading: Retain the metaphor 'fruits' rather than interpretively expanding it.
  chosen_spanish_reading: Conservar «frutos» como metáfora del criterio por el cual se reconoce a las personas.
  alternative_spanish_readings:
  - por sus acciones los reconocerán
  - por sus resultados los reconocerán
  rationale: El griego habla de «frutos», no de una explicación explícita de esos frutos. Mantener la metáfora respeta el alcance del texto y evita sustituirla por una glosa interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue el acuerdo alto del control cruzado y no introduce cambios respecto del sentido y la estructura ya auditados en el texto inglés; mantiene la inferencia conclusiva, el valor criterial de ἀπὸ, la metáfora de los frutos y el futuro de identificación.
  spanish_consistency_notes:
  - Se preserva el plural «frutos» para corresponder al griego καρπῶν.
  - Se usa «reconocerán» para ἐπιγνώσεσθε, en línea con el valor de discernimiento contextual.
  - La nota al pie ofrece una alternativa más literal con «por sus frutos» sin desplazar el texto principal.
  - No se usa «SEÑOR» ni otras terminologías no pertinentes; el versículo no contiene nombres divinos ni títulos cristológicos.
