review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura inferencial y mantiene la metáfora de «frutos». Sin embargo, cambia indebidamente la persona verbal del futuro de segunda persona plural («ustedes») a tercera persona plural («ellos/ellas») en «los reconocerán». El griego ἐπιγνώσεσθε es claramente 2ª plural: «ustedes reconocerán».'
  spanish_quality_summary: «Así que, por sus frutos los reconocerán» suena natural en español, pero la discordancia de persona verbal afecta la claridad y fidelidad. Además, el orden «por sus frutos los reconocerán» es aceptable, aunque «los reconocerán por sus frutos» resulta más directo y coincide mejor con la alternativa documentada.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Frutos» preserva bien καρπῶν. «Reconocerán» es una buena elección para ἐπιγνώσεσθε. La partícula ἄρα γε puede verterse bien como «Así que» o «Por tanto»; ambas son defendibles.
  issues:
  - severity: high
    issue: Cambio de persona gramatical en el verbo principal
    rationale: El griego ἐπιγνώσεσθε es futuro medio indicativo de segunda persona plural, pero «reconocerán» en español se interpreta como tercera persona plural. Debe ser «reconocerán ustedes» o, más naturalmente en español bíblico neutral, mantenerse el sujeto implícito con contexto de segunda plural mediante una formulación inequívoca como «los reconocerán» solo si el referente de sujeto fuera ustedes, pero en español eso no ocurre; por tanto conviene una redacción explícita o una estructura que preserve la segunda plural. La solución más natural es «Así que[a], ustedes los reconocerán por sus frutos» o, si se prefiere evitar el pronombre, «Así que[a], por sus frutos reconocerán quiénes son», aunque esto último añade contenido. Por fidelidad estricta, «ustedes los reconocerán por sus frutos» es mejor.
  - severity: low
    issue: La nota alternativa no refleja bien la diferencia léxica documentada en inglés
    rationale: 'La nota inglesa ofrece «Therefore indeed, from their fruits you will know them». La nota española propuesta omite el matiz de «de/from» y repite casi la misma estructura. Conviene una nota que preserve la alternativa real: «O: “Por tanto, de sus frutos los conocerán”» o similar.'
  revised_spanish_text: Así que[a], ustedes los reconocerán por sus frutos.
  revised_footnotes:
  - marker: a
    text: 'O: «Por tanto, de sus frutos los conocerán».'
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal para reflejar fielmente la segunda persona plural del griego (ἐπιγνώσεσθε) y se ajusta la nota para representar mejor la alternativa documentada en el rastro de auditoría inglés, conservando la metáfora de «frutos» y una sintaxis natural en español.
