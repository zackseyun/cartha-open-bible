translation:
  language: es
  text: ¿O qué hombre hay entre ustedes a quien su hijo le pide pan, y le dará una piedra?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O acaso
  - ¿O bien
  lexicon: BDAG
  rationale: Introduce la comparación retórica con una conjunción natural en español y conserva el enlace discursivo del argumento de Jesús.
- source_word: τίς ... ἄνθρωπος
  english_pob_choice: what man is there
  chosen_spanish: qué hombre hay
  alternatives_spanish:
  - qué persona hay
  - quién hay
  lexicon: BDAG
  rationale: ἄνθρωπος aquí funciona de manera representativa y masculina; 'hombre' preserva esa fuerza lexical, y la pregunta se adapta con naturalidad al español.
- source_word: ἐξ ὑμῶν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - de entre ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: La expresión partititiva se vierte idiomáticamente como 'entre ustedes', manteniendo el sentido colectivo del grupo al que Jesús habla.
- source_word: ὃν
  english_pob_choice: whose
  chosen_spanish: que, si
  alternatives_spanish:
  - cuyo
  - a quien
  lexicon: BDAG
  rationale: La relación relativa se resuelve en una estructura natural en español. 'Cuyo' sería posible, pero la formulación con 'que, si...' preserva mejor el flujo directo del griego y de la comparación retórica.
- source_word: αἰτήσει
  english_pob_choice: asks
  chosen_spanish: pide
  alternatives_spanish:
  - le pide
  - pedirá
  lexicon: BDAG
  rationale: Aunque el griego usa futuro, el valor aquí es general y proverbial; 'pide' expresa bien la acción habitual sin forzar una lectura temporal en español.
- source_word: ὁ υἱὸς αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: BDAG
  rationale: La posesión simple se conserva de modo natural en español y mantiene la referencia específica al hijo.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - un pan
  lexicon: BDAG
  rationale: '''Pan'' es el equivalente directo y culturalmente estable para ἄρτος en este contexto de comida básica, sin ampliar indebidamente el sentido a ''alimento''.'
- source_word: μὴ λίθον ἐπιδώσει αὐτῷ
  english_pob_choice: and he will give him a stone?
  chosen_spanish: le dará una piedra
  alternatives_spanish:
  - ¿y no le dará una piedra?
  - ¿le daría una piedra?
  lexicon: BDAG
  rationale: La pregunta retórica espera una respuesta negativa. En español, la forma interrogativa simple transmite mejor el sentido que una negación explícita añadida; 'dar una piedra' mantiene el contraste literal con 'pan'.
theological_decisions:
- issue: Lenguaje masculino representativo
  english_pob_reading: what man is there among you
  chosen_spanish_reading: qué hombre hay entre ustedes
  alternative_spanish_readings:
  - qué persona hay entre ustedes
  - quién de ustedes hay
  rationale: Se conserva el masculino representativo de ἄνθρωπος, conforme al patrón del texto fuente y a la decisión auditada del POB inglés de no suavizarlo a un genérico neutro.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada que entendió la pregunta como una condición general/proverbial, evitando una futura demasiado marcada en español y manteniendo la estructura retórica breve del griego.
  spanish_consistency_notes:
  - Se usa 'pan' para ἄρτος por su equivalencia básica y su naturalidad en una comparación cotidiana.
  - Se conserva 'hombre' por el valor representativo masculino de ἄνθρωπος.
  - La cláusula condicional 'si su hijo le pide...' refleja mejor el sentido general de la construcción griega que una traducción estrictamente futura.
  - No se introduce 'SEÑOR' ni terminología eclesiástica ajena al versículo.
