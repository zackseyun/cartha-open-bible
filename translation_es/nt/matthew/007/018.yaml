translation:
  language: es
  text: Un árbol bueno no puede producir fruto malo[a][b], ni puede un árbol podrido[c] producir fruto bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un árbol sano».
    reason: lexical_alternative
  - marker: b
    text: O «fruto perverso».
    reason: lexical_alternative
  - marker: c
    text: O «un árbol deteriorado».
    reason: lexical_alternative
lexical_decisions:
- source_word: δένδρον ἀγαθόν
  english_pob_choice: a good tree
  chosen_spanish: un árbol bueno
  alternatives_spanish:
  - un árbol saludable
  - un árbol sano
  lexicon: BDAG
  rationale: ἀγαθός aquí conserva su valor evaluativo general de «bueno». En español, «árbol bueno» mantiene la imagen literal y el contraste moral del dicho. «Sano/ saludable» sería posible, pero desplaza el foco hacia la condición física del árbol y debilita la fuerza proverbial del contraste.
- source_word: δύναται ... ποιεῖν
  english_pob_choice: cannot produce
  chosen_spanish: no puede producir
  alternatives_spanish:
  - no puede dar
  - no puede hacer
  lexicon: BDAG
  rationale: δύναμαι expresa imposibilidad, y ποιεῖν con καρπούς funciona idiomáticamente como «producir» o «dar» fruto. «No puede producir» es natural en español y preserva la imposibilidad categórica del original.
- source_word: καρποὺς πονηρούς
  english_pob_choice: bad fruit
  chosen_spanish: fruto malo
  alternatives_spanish:
  - fruto malo en calidad
  - fruto perverso
  lexicon: BDAG
  rationale: πονηρός puede significar «malo», «malvado» o «perverso». En la metáfora del fruto como resultado visible, «malo» es la equivalencia más amplia y natural en español. Evita forzar «perverso» como si el sustantivo fuera exclusivamente moral en sentido abstracto.
- source_word: οὐδέ
  english_pob_choice: nor can
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - ni puede
  lexicon: BDAG
  rationale: 'οὐδέ introduce una segunda negación paralela. En español, «ni» conserva bien el balance sintáctico y retórico del paralelismo: «no puede... ni...».},{'
theological_decisions:
- issue: Intensidad de la imposibilidad en la metáfora
  english_pob_reading: Render the statement as categorical inability ('cannot') without softening it to mere improbability.
  chosen_spanish_reading: 'Mantener una imposibilidad categórica: «no puede»'
  alternative_spanish_readings:
  - normalmente no da
  - difícilmente produce
  rationale: El griego δύναται afirma incapacidad, no simple tendencia. La traducción conserva la fuerza proverbial y moral del dicho de Jesús sin añadir conclusiones doctrinales ajenas al contexto inmediato.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se mantiene la estructura paralela, la imposibilidad categórica de δύναται y el contraste entre fruto malo y fruto bueno. No se introducen suavizaciones ni se reemplaza el vocabulario metafórico por paráfrasis interpretativas.'
  spanish_consistency_notes:
  - Se usa «árbol» para δένδρον de forma uniforme y natural en español.
  - Se conserva el paralelismo negativo con «no puede... ni...».
  - «Fruto» se mantiene en singular colectivo, como en el uso proverbial español, aunque el griego esté en plural.
  - Se evita «SEÑOR» u otra terminología no pertinente; no hay vocabulario teológico adicional en este verso.
