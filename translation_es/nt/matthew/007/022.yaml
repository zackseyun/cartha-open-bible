review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro del POB en casi todo: «Muchos», «me dirán», «Señor, Señor», la triple repetición de «en tu nombre» y «expulsamos demonios» reflejan fielmente el sentido y la retórica del original. Sin embargo, la nota [a] no preserva la nota inglesa auditada: el POB inglés pone la nota sobre «many mighty works» / δυνάμεις πολλὰς, no sobre «that day». Además, aunque «obras poderosas» es defendible, en español suena algo rígido; conviene conservarla con una nota que aclare las alternativas documentadas.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para alinear las notas y mejorar la naturalidad editorial. «En aquel día» es plenamente legible sin nota. La frase «hicimos muchas obras poderosas» puede mantenerse si se ancla la nota léxica allí; así se preserva mejor la intención del POB y se evita introducir una nota escatológica no presente en la auditoría inglesa.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: κύριος → «Señor», δαιμόνια → «demonios», y la repetición de «en tu nombre» se conserva. No hay conflicto con los defaults doctrinales. La única desalineación relevante es de aparato: la nota debe explicar δυνάμεις πολλὰς como «obras poderosas / milagros / obras de poder», no reinterpretar «en aquel día» como «día del juicio».'
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «en aquel día» en lugar de en «muchas obras poderosas».
    rationale: El POB inglés documenta una alternativa léxica para δυνάμεις πολλὰς ἐποιήσαμεν, no para ἐν ἐκείνῃ τῇ ἡμέρᾳ. Cambiar el foco de la nota altera el rastro de auditoría y añade una explicitación teológica que el texto base decidió no hacer en nota.
  - severity: low
    issue: La nota actual introduce «en el día del juicio» como alternativa principal.
    rationale: Aunque contextual y teológicamente plausible, el griego dice solo «en aquel día» y la decisión inglesa fue preservar esa tensión sin explicitarla. En español, esa explicitación no debe desplazar la nota léxica original.
  - severity: low
    issue: «Obras poderosas» suena algo literal en español, pero es aceptable si va acompañada de nota aclaratoria.
    rationale: La expresión preserva la conexión con δύναμις mejor que «milagros» solo, pero necesita la nota para que el lector entienda el abanico semántico documentado.
