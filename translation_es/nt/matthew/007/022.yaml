translation:
  language: es
  text: 'Muchos me dirán en aquel día: «Señor, Señor, ¿no profetizamos en tu nombre, y en tu nombre expulsamos demonios, y en tu nombre hicimos muchas obras poderosas[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hicimos muchos milagros» o «hicimos muchas obras de poder». La frase griega se refiere literalmente a muchos «poderes», una expresión de los Evangelios que a menudo se usa para hechos milagrosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Muchas personas
  lexicon: BDAG
  rationale: El griego usa un plural masculino sustantivado sin un sustantivo explícito; «Muchos» conserva esa concisión sin añadir «personas», que el texto no dice.
- source_word: ἐροῦσίν μοι
  english_pob_choice: will say to me
  chosen_spanish: me dirán
  alternatives_spanish:
  - me dirán a mí
  - me hablarán
  lexicon: BDAG
  rationale: El futuro de λέγω con dativo se expresa de manera natural en español con «me dirán»; mantiene la dirección del discurso sin sobreinterpretar.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: BDAG
  rationale: La fórmula temporal con ἐν se conserva como «en aquel día», que suena bíblica y natural en español, y mantiene la referencia escatológica sin explicitar «de juicio» en el texto principal.
- source_word: Κύριε κύριε
  english_pob_choice: Lord, Lord
  chosen_spanish: Señor, Señor
  alternatives_spanish:
  - Maestro, Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente habitual de κύριος en este contexto de dirección a Jesús y preserva tanto la apelación reverente como la carga cristológica.
- source_word: ἐπροφητεύσαμεν
  english_pob_choice: did we not prophesy
  chosen_spanish: ¿no profetizamos
  alternatives_spanish:
  - ¿no hablamos proféticamente
  lexicon: BDAG
  rationale: «Profetizamos» traduce directamente προφητεύω y conserva el lenguaje técnico profético sin suavizarlo.
- source_word: τῷ σῷ ὀνόματι
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  lexicon: BDAG
  rationale: La construcción dativa repetida se vierte con la locución estable «en tu nombre», que en español expresa autoridad/invocación y permite conservar la repetición retórica.
- source_word: δαιμόνια ἐξεβάλομεν
  english_pob_choice: cast out demons
  chosen_spanish: expulsamos demonios
  alternatives_spanish:
  - echamos fuera demonios
  - echamos demonios
  lexicon: BDAG
  rationale: «Expulsamos demonios» comunica con claridad la acción exorcística de ἐκβάλλω y suena natural en español contemporáneo, sin perder la fuerza verbal.
- source_word: δυνάμεις πολλὰς ἐποιήσαμεν
  english_pob_choice: do many mighty works
  chosen_spanish: hicimos muchas obras poderosas
  alternatives_spanish:
  - hicimos muchos milagros
  - realizamos muchas obras de poder
  lexicon: BDAG
  rationale: «δυνάμεις» literaliza «poderes»; en español, «obras poderosas» mantiene esa conexión léxica y evita resolver demasiado pronto la tensión entre «poderes», «milagros» y «obras de poder» que el inglés POB también deja abierta.
theological_decisions:
- issue: Título κύριος dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En este diálogo, quienes hablan se dirigen a Jesús con κύριος. Mantener «Señor» preserva la lectura cristológica estándar sin rebajar el título a un simple tratamiento civil.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Fuerza escatológica de «aquel día»
  english_pob_reading: on that day
  chosen_spanish_reading: en aquel día
  alternative_spanish_readings:
  - en el día del juicio
  rationale: La escena apunta al juicio final, pero el griego solo dice «en aquel día». La traducción conserva la formulación bíblica y deja la inferencia teológica implícita, como en el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: δυνάμεις πολλὰς como expresión de obras milagrosas
  english_pob_reading: do many mighty works
  chosen_spanish_reading: hicimos muchas obras poderosas
  alternative_spanish_readings:
  - hicimos muchos milagros
  - realizamos muchos actos de poder
  rationale: El texto griego habla de «muchas powers/poderes»; el POB inglés mantiene la tensión con «mighty works» y nota la alternativa «miracles». En español, «obras poderosas» conserva la relación con δύναμις sin cerrar prematuramente la equivalencia interpretativa.
  doctrine_reference: POB lexical note on δύναμις in Gospel miracle contexts
translation_notes:
  revision_awareness: El borrador sigue de cerca el patrón del texto fuente griego y el audit trail inglés. Se mantuvo la repetición de «en tu nombre» y el paralelismo de las tres cláusulas. La principal decisión abierta en el inglés POB—δυνάμεις πολλὰς—se preserva en español con «obras poderosas», dejando visible la relación con «poderes» y la posible lectura de «milagros» sin resolverla en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριε de manera consistente con el tratamiento cristológico normal de κύριος.
  - Se evitó «SEÑOR» como máscara tipográfica; el nombre divino no aparece en este versículo.
  - «Expulsamos demonios» mantiene el paralelismo con las dos primeras acciones y el valor exorcístico de ἐκβάλλω.
  - «Obras poderosas» conserva la ambigüedad lexical de δυνάμεις y no la reduce a «milagros» en el texto principal.
  - La nota al pie acompaña solo la expresión temporal, porque ahí el español crea una alternativa interpretativa clara sin alterar el cuerpo del versículo.
