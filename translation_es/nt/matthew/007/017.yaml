base_translation:
  language: en
  yaml_path: translation/nt/matthew/007/017.yaml
  text: So[a], every good tree produces good fruit[c][b], but the rotten tree produces bad fruit.
  footnotes:
  - marker: a
    text: Or 'Thus' or 'In this way' for 'So.'
    reason: lexical_alternative
  - marker: b
    text: '''Rotten'' translates Greek sapron, which can also mean ''bad,'' ''decayed,'' or ''corrupt.'''
    reason: lexical_alternative
  - marker: c
    text: '''Bad fruit'' could also be rendered ''evil fruit''; the broader English ''bad'' fits the agricultural metaphor naturally while preserving the negative moral implication from the context.'
    reason: lexical_alternative
