translation:
  language: es
  text: Así[a], todo árbol bueno produce fruto bueno, pero el árbol podrido[b] produce fruto malo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De este modo» o «De esta manera» para οὕτως.'
    reason: lexical_alternative
  - marker: b
    text: «Podrido» traduce el griego saprón, que también puede significar «malo», «descompuesto» o «corrupto».
    reason: lexical_alternative
  - marker: c
    text: «Fruto malo» también podría rendirse «fruto perverso»; aquí se conserva la naturalidad agrícola del proverbio sin perder la implicación ética del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esta manera
  lexicon: BDAG
  rationale: Mantiene el valor inferencial/consecutivo de οὕτως y funciona con naturalidad al iniciar un proverbio en español.
- source_word: πᾶν δένδρον
  english_pob_choice: every ... tree
  chosen_spanish: todo árbol
  alternatives_spanish:
  - cada árbol
  - todo el árbol
  lexicon: BDAG
  rationale: πᾶν con sustantivo singular tiene fuerza distributiva; «todo árbol» conserva el sentido proverbial general sin forzar una referencia colectiva.
- source_word: ἀγαθὸν
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - sano
  - buen
  lexicon: BDAG
  rationale: «Bueno» reproduce la cualidad positiva general del árbol y armoniza con «fruto bueno» en la paralela interna del verso.
- source_word: καρποὺς καλοὺς
  english_pob_choice: good fruit
  chosen_spanish: fruto bueno
  alternatives_spanish:
  - buen fruto
  - fruto hermoso
  lexicon: BDAG
  rationale: καλός aquí expresa fruto de buena calidad; en español «fruto bueno» es natural y conserva el paralelismo con el árbol bueno sin añadir matices ajenos.
- source_word: ποιεῖ
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - da
  - hace
  lexicon: BDAG
  rationale: Con árboles y fruto, «produce» es idiomático en español y preserva el acto de generar fruto sin desplazar el sentido hacia mera fabricación.
- source_word: τὸ δὲ σαπρὸν δένδρον
  english_pob_choice: but the rotten tree
  chosen_spanish: pero el árbol podrido
  alternatives_spanish:
  - pero el árbol roído
  - pero el árbol corrupto
  lexicon: BDAG
  rationale: σαπρός puede significar podrido, descompuesto, corrompido o malo; «podrido» es la opción más vívida y precisa dentro de la metáfora agrícola, como en la nota inglesa sobre rotten/decayed/corrupt.
- source_word: καρποὺς πονηροὺς
  english_pob_choice: bad fruit
  chosen_spanish: fruto malo
  alternatives_spanish:
  - fruto malo y dañino
  - fruto perverso
  lexicon: BDAG
  rationale: πονηρός puede ser «malo», «malvado» o «perverso»; aquí «fruto malo» sigue la equivalencia óptima del POB inglés y evita sobrerreligiosizar la imagen con «fruto perverso» o «fruto malo» demasiado abstracto.
theological_decisions:
- issue: Fuerza moral de la metáfora frente a su literalidad agrícola
  english_pob_reading: Retain the concrete tree-and-fruit metaphor without making the moral application explicit in the translation.
  chosen_spanish_reading: Conservar la metáfora concreta del árbol y el fruto sin explicitar en la traducción la aplicación moral.
  alternative_spanish_readings:
  - Un árbol sano da fruto saludable y un árbol corrupto da fruto maligno
  - Todo árbol bueno da buenos resultados y el malo, malos resultados
  rationale: El griego presenta la figura proverbial; la moralización queda para el contexto inmediato. La traducción española mantiene esa tensión en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior colocando los marcadores [a], [b] y [c] exactamente en el texto español, de modo que cada nota queda anclada a su palabra o frase correspondiente.
  spanish_consistency_notes:
  - Se mantiene «fruto bueno / fruto malo» para conservar el paralelismo interno del verso.
  - «Podrido» preserva la fuerza concreta de σαπρός sin sustituirla por un término demasiado genérico.
  - El adverbio inicial «Así» refleja la función inferencial de οὕτως en un proverbio conclusivo.
