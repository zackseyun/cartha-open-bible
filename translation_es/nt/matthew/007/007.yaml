translation:
  language: es
  text: Pidan[a], y se les dará; busquen, y hallarán; toquen, y se les abrirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los imperativos presentes del griego también pueden entenderse con un sentido continuo: «sigan pidiendo ... sigan buscando ... sigan tocando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αἰτεῖτε
  english_pob_choice: Ask
  chosen_spanish: Pidan
  alternatives_spanish:
  - Sigan pidiendo
  - Pidan con insistencia
  - Rueguen
  lexicon: BDAG
  rationale: El imperativo presente plural pide una orden directa y natural en español. «Pidan» conserva la fuerza exhortativa sin sobrecargar el texto; la lectura iterativa de aspecto imperfectivo queda documentada aparte. «Rueguen» introduce una matiz devocional que el griego no exige.
- source_word: δοθήσεται
  english_pob_choice: it will be given
  chosen_spanish: se les dará
  alternatives_spanish:
  - les será dado
  - será dado a ustedes
  lexicon: BDAG
  rationale: El futuro pasivo se conserva con una pasiva refleja natural en español. «Se les dará» mantiene el sujeto tácito, como en el griego, sin nombrar al dador.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: se les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo se expresa de forma clara en español mediante «se les», integrado con la pasiva. «A ustedes» sería correcto pero menos fluido en la construcción pasiva.
- source_word: ζητεῖτε
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - sigan buscando
  - busquen con diligencia
  - busquen
  lexicon: BDAG
  rationale: «Seek» puede sonar abstracto en español; «busquen» comunica bien la búsqueda activa y conserva el mandato. Dado el paralelismo del versículo, esta opción es idiomática y semánticamente cercana. «Sigan buscando» explicita la continuidad aspectual, pero en el texto principal se deja implícita.
- source_word: εὑρήσετε
  english_pob_choice: you will find
  chosen_spanish: hallarán
  alternatives_spanish:
  - encontrarán
  - van a hallar
  lexicon: BDAG
  rationale: «Hallarán» es formal y bíblicamente claro en español, y conserva el futuro activo. «Encontrarán» es una alternativa válida, pero «hallar» mantiene mejor el registro solemne del conjunto.
- source_word: κρούετε
  english_pob_choice: knock
  chosen_spanish: llamen
  alternatives_spanish:
  - toquen
  - sigan llamando
  - golpeen
  lexicon: BDAG
  rationale: En español, el verbo idiomático para κρούω en este contexto es «llamar» a la puerta. «Toquen» puede sonar demasiado general; «llamen» comunica el acto de pedir entrada con naturalidad. Se mantiene la imagen de acceso de la metáfora.
- source_word: ἀνοιγήσεται
  english_pob_choice: it will be opened
  chosen_spanish: se les abrirá
  alternatives_spanish:
  - será abierto para ustedes
  - se abrirá
  lexicon: BDAG
  rationale: 'La pasiva griega se reproduce con una pasiva refleja natural: «se les abrirá». Esto conserva la apertura como acción recibida, sin convertirla en una intransitiva impersonal.'
theological_decisions:
- issue: Aspecto imperfectivo de los tres presentes imperativos
  english_pob_reading: 'Ask / seek / knock, with a footnote noting that the Greek present imperatives can also carry an ongoing sense: keep asking / keep seeking / keep knocking.'
  chosen_spanish_reading: 'Pidan / busquen / llamen, con nota que indique que los presentes griegos también pueden entenderse como acción continua: sigan pidiendo / sigan buscando / sigan llamando.'
  alternative_spanish_readings:
  - Sigan pidiendo, y se les dará; sigan buscando, y hallarán; sigan llamando, y se les abrirá.
  - Pidan, busquen y llamen, dejando la continuidad solo implícita.
  rationale: La forma griega admite una lectura aspectual continuada, pero no obliga a explicitarla en la línea principal. El texto principal conserva el estilo directo y proverbial; la nota preserva la alternativa sin borrar la tensión aspectual documentada por el audit trail inglés.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El texto inglés POB no presenta revisiones aplicadas en este pasaje; la versión actual se mantiene con alta concordancia y sin cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene «se les dará» y «se les abrirá» para preservar la pasiva del griego.
  - Se elige «llamen» para κρούετε por su valor idiomático en español en el contexto de tocar a una puerta.
  - La nota [a] conserva la alternativa aspectual del presente imperativo sin recargar el texto principal.
  - El registro es formal y bíblicamente natural, evitando calcos innecesarios pero sin suavizar la fuerza del mandato.
