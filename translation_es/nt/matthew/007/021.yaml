translation:
  language: es
  text: 'No todos los que me dicen: «Señor, Señor»[a] entrarán en el reino de los cielos[b], sino el que hace la voluntad de mi Padre que está en los cielos[c] entrará.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señor» traduce κύριος; el doble vocativo conserva el énfasis del original.
    reason: lexical_alternative
  - marker: b
    text: «Los cielos» conserva el plural del griego τῶν οὐρανῶν; en español suena natural como expresión característica de Mateo.
    reason: lexical_alternative
  - marker: c
    text: «Los cielos» conserva el plural del griego οὐρανοῖς; en español suena natural y corresponde al plural presente también al final del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ πᾶς ὁ λέγων μοι
  english_pob_choice: Not everyone who says to me
  chosen_spanish: No todos los que me dicen
  alternatives_spanish:
  - No cualquiera que me diga
  - No todos los que siguen diciéndome
  lexicon: BDAG
  rationale: 'Οὐ πᾶς expresa negación parcial: no se dice «nadie», sino «no todos». El participio presente ὁ λέγων se vierte con relativa natural en español para conservar el valor general/continuado sin sonar forzado.'
- source_word: Κύριε κύριε
  english_pob_choice: Lord, Lord
  chosen_spanish: «Señor, Señor»
  alternatives_spanish:
  - «Maestro, Maestro»
  lexicon: BDAG
  rationale: κύριος normalmente se traduce «Señor» en contexto cristológico. La duplicación vocativa se conserva para reflejar el énfasis del original.
- source_word: εἰσελεύσεται
  english_pob_choice: will enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - entrará
  - van a entrar
  lexicon: BDAG
  rationale: El futuro de εἰσέρχομαι se expresa con un futuro simple en español. Se adapta al sujeto plural implícito de «No todos» para concordancia natural.
- source_word: εἰς τὴν βασιλείαν τῶν οὐρανῶν
  english_pob_choice: into the kingdom of heaven
  chosen_spanish: en el reino de los cielos
  alternatives_spanish:
  - en el reino del cielo
  - en el reino de los cielos
  lexicon: BDAG
  rationale: βασιλεία se traduce «reino». La expresión mateana plural τῶν οὐρανῶν se mantiene con el español idiomático «de los cielos», conservando el rasgo característico del evangelio sin volverlo torpe.
- source_word: ἀλλ’ ὁ ποιῶν
  english_pob_choice: but the one who does
  chosen_spanish: sino el que hace
  alternatives_spanish:
  - sino el que cumple
  - sino quien hace
  lexicon: BDAG
  rationale: El participio articular se vierte de modo sustantivo con «el que». «Hace» conserva la fuerza concreta de ποιῶν mejor que una paráfrasis abstracta.
- source_word: τὸ θέλημα
  english_pob_choice: the will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - el querer
  - el deseo
  lexicon: BDAG
  rationale: En este contexto ético-teológico, θέλημα se expresa mejor como «voluntad», manteniendo el sentido de propósito y exigencia divina.
- source_word: τοῦ πατρός μου
  english_pob_choice: of my Father
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de mi Padre celestial
  lexicon: BDAG
  rationale: Se traduce de forma directa el genitivo posesivo. Se evita añadir «celestial» aquí, porque el griego lo expresa en la frase siguiente, no en este sintagma.
- source_word: τοῦ ἐν τοῖς οὐρανοῖς
  english_pob_choice: who is in heaven
  chosen_spanish: que está en los cielos
  alternatives_spanish:
  - que está en el cielo
  - que está en los cielos
  lexicon: BDAG
  rationale: El participio/frasal atributivo se vierte naturalmente como relativa. Se conserva el plural «los cielos» para reflejar οὐρανοῖς, en armonía con la frase mateana.
theological_decisions:
- issue: Contraste entre decir «Señor» y hacer la voluntad del Padre
  english_pob_reading: The verse contrasts mere verbal address of Jesus as Lord with actually doing the Father's will, without specifying a broader doctrinal system of salvation in this verse alone.
  chosen_spanish_reading: El versículo contrasta llamar a Jesús «Señor» con hacer realmente la voluntad del Padre, sin resolver aquí el debate doctrinal más amplio sobre la salvación.
  alternative_spanish_readings:
  - Una lectura de salvación por obras
  - Una lectura en la que la confesión verbal sola basta
  rationale: La traducción debe preservar la advertencia y el contraste del texto sin imponer conclusiones denominacionales. El griego enfrenta decir y hacer; no define aquí por sí solo la doctrina completa de la justificación.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el inglés POB añadió en la revisión final el verbo implícito «will enter» en la segunda cláusula para completar el contraste. En español se refleja ese mismo efecto con «entrarán» al inicio y «entrará» al final, de modo que la oposición entre decir y hacer quede explícita sin introducir contenido ajeno al griego.
  spanish_consistency_notes:
  - Se mantiene «reino de los cielos» para la fórmula mateana, no «reino de Dios», siguiendo el patrón del pasaje y la decisión léxica auditada.
  - Se usa «Padre» con mayúscula por tratarse de una referencia a Dios en habla directa de Jesús.
  - Se evita «hacer la voluntad» como calco rígido en otros contextos, pero aquí es la correspondencia más fiel y natural.
  - Se conserva la tensión entre confesión verbal y obediencia, sin suavizarla ni explicarla doctrinalmente más allá del texto.
