revisions:
- from: '¿O cómo le dirás a tu hermano: “Déjame sacar la mota[a] de tu ojo”, y mira[b], la viga está en tu propio ojo?'
  to: '¿O cómo le dirás a tu hermano[a]: «Déjame sacar la mota[b] de tu ojo», y he aquí[c], la viga está en tu propio ojo?'
  rationale: Se revisa «y mira» a «y he aquí» para alinear el registro español con la revisión auditada del English POB para ἰδού y con el estilo digno del proyecto. También se añade la nota sobre «tu hermano» para preservar la aclaración cultural ya documentada. Se mantiene «mota / viga», que reproduce bien el contraste hiperbólico y suena natural en español.
