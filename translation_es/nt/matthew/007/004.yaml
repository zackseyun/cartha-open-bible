    text: Or 'splinter' for 'speck' (Greek κάρφος), a small bit of dry material.
    reason: lexical_alternative
  - marker: b
    text: Or 'plank' or 'log' for 'beam' (Greek δοκός), a large piece of timber.
    reason: lexical_alternative
  - marker: c
    text: Greek 'your brother'; the masculine singular may refer to a fellow disciple in a representative sense.
    reason: cultural_note
