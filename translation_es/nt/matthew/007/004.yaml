review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura retórica: ἢ πῶς ἐρεῖς → «¿O cómo le dirás…?», Ἄφες ἐκβάλω → «Déjame sacar…», y ἡ δοκὸς → «la viga». Sin embargo, no preserva del todo el rastro auditado en dos puntos: el inglés POB revisado prefirió un registro más formal para καὶ ἰδοὺ («behold»), y además el paquete canónico conserva una nota cultural sobre «tu hermano» que el español omitió. «Y mira» es comprensible, pero baja el registro frente al tono buscado y frente a la revisión inglesa documentada.'
  spanish_quality_summary: 'El español es claro y natural, pero «y mira» suena algo coloquial dentro de un dicho solemne de Jesús. «Y he aquí» encaja mejor con el registro digno pedido por el proyecto y con el valor de marcador de atención de ἰδού. El resto fluye bien: «Déjame sacar la mota de tu ojo» y «la viga está en tu propio ojo» son idiomáticos y legibles.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Hermano» respeta la decisión de género para ἀδελφῷ; «mota / viga» preserva el contraste κάρφος / δοκός de forma natural. La única corrección necesaria es ajustar ἰδού a un equivalente español más formal y añadir la nota representativa sobre «hermano», ya preservada en el English POB.
  issues:
  - severity: medium
    issue: Registro de ἰδού traducido como «mira»
    rationale: Aunque ἰδού puede representarse de manera dinámica, el English POB auditado cambió «look» a «behold» precisamente para mantener un registro más formal. En español, «y he aquí» refleja mejor ese tono y el valor discursivo del griego que «y mira».
  - severity: medium
    issue: Falta la nota cultural sobre «tu hermano»
    rationale: El English POB conserva una nota indicando que el masculino singular puede usarse representativamente. Dado que el español también mantiene «hermano» en el texto principal, debe conservar esa aclaración en nota para reflejar el expediente auditado.
  revised_spanish_text: '¿O cómo le dirás a tu hermano[a]: «Déjame sacar la mota[b] de tu ojo», y he aquí[c], la viga está en tu propio ojo?'
  revised_footnotes:
