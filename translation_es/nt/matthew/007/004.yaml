translation:
  language: es
  text: '¿O cómo le dirás a tu hermano[a]: «Déjame sacar la mota[b] de tu ojo», y he aquí[c], la viga está en tu propio ojo?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego «tu hermano»; el singular masculino puede referirse representativamente a un compañero discípulo.
    reason: cultural_note
  - marker: b
    text: O «astilla» para «mota» (griego κάρφος), un pedacito seco de material.
    reason: lexical_alternative
  - marker: c
    text: O «mira»; ἰδού funciona como marcador de atención.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O bien
  - ¿O también
  lexicon: BDAG
  rationale: Introduce la alternativa retórica de manera natural en español, conservando el enlace lógico del reproche de Jesús.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - cómo es posible
  lexicon: BDAG
  rationale: Mantiene el valor interrogativo retórico sin añadir explicación que no esté en el griego.
- source_word: ἐρεῖς
  english_pob_choice: will you say
  chosen_spanish: le dirás
  alternatives_spanish:
  - dirás
  - vas a decir
  lexicon: BDAG
  rationale: El futuro griego se expresa con futuro en español; el dativo indirecto queda bien con 'le dirás'.
- source_word: τῷ ἀδελφῷ σου
  english_pob_choice: to your brother
  chosen_spanish: a tu hermano
  alternatives_spanish:
  - a tu hermano o hermana
  - a tu prójimo
  lexicon: BDAG
  rationale: '''Hermano'' reproduce el masculino singular del texto fuente y la tradición del pasaje; no se amplía a inclusivo en el texto principal sin apoyo inmediato del griego.'
- source_word: Ἄφες
  english_pob_choice: Let me
  chosen_spanish: Déjame
  alternatives_spanish:
  - Permíteme
  - Deja que
  lexicon: BDAG
  rationale: En este contexto imperativo funciona como petición de permiso; 'Déjame' suena natural y conserva la fuerza idiomática.
- source_word: ἐκβάλω
  english_pob_choice: take ... out
  chosen_spanish: sacar
  alternatives_spanish:
  - quitar
  - extraer
  lexicon: BDAG
  rationale: En una acción concreta sobre el ojo, 'sacar' comunica de forma idiomática la extracción sin perder el sentido de ἐκβάλλω.
- source_word: τὸ κάρφος
  english_pob_choice: the speck
  chosen_spanish: la mota
  alternatives_spanish:
  - la paja
  - la astilla
  lexicon: BDAG
  rationale: '''Mota'' expresa un fragmento pequeño y leve, suficiente para el contraste con la ''viga''; ''astilla'' sería más específica y menos abierta que el griego.'
- source_word: ἐκ τοῦ ὀφθαλμοῦ σου
  english_pob_choice: out of your eye
  chosen_spanish: de tu ojo
  alternatives_spanish:
  - fuera de tu ojo
  - de dentro de tu ojo
  lexicon: BDAG
  rationale: En español, la extracción queda naturalmente expresada con 'de tu ojo'; el matiz de ἐκ se conserva en el verbo 'sacar'.
- source_word: καὶ ἰδοὺ
  english_pob_choice: and behold
  chosen_spanish: y mira
  alternatives_spanish:
  - y he aquí
  - y observa
  lexicon: BDAG
  rationale: '''Mira'' reproduce el valor deíctico y de llamada de atención de ἰδού sin arcaísmo excesivo.'
- source_word: ἡ δοκὸς
  english_pob_choice: the beam
  chosen_spanish: la viga
  alternatives_spanish:
  - el madero
  - la tabla
  lexicon: BDAG
  rationale: '''Viga'' comunica con precisión una pieza grande de madera estructural y mantiene el contraste hiperbólico con la ''mota''.'
- source_word: ἐν τῷ ὀφθαλμῷ σοῦ
  english_pob_choice: is in your own eye
  chosen_spanish: está en tu propio ojo
  alternatives_spanish:
  - está en tu ojo
  - está dentro de tu propio ojo
  lexicon: BDAG
  rationale: '''Propio'' refleja el énfasis contrastivo del contexto; el verbo ''está'' expresa la presencia continua de la imagen con naturalidad.'
theological_decisions:
- issue: Tratamiento de ἀδελφῷ en un dicho de reprensión general
  english_pob_reading: brother; the masculine singular may refer to a fellow disciple in a representative sense.
  chosen_spanish_reading: hermano; el singular masculino puede referirse representativamente a un discípulo o miembro del grupo.
  alternative_spanish_readings:
  - hermano o hermana
  - compañero creyente
  rationale: Se conserva el singular masculino del fuente y se deja la posible amplitud representativa para nota, sin alterar el texto principal con una expansión no explícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Contraste hiperbólico κάρφος / δοκός
  english_pob_reading: speck / beam
  chosen_spanish_reading: mota / viga
  alternative_spanish_readings:
  - astilla / madero
  - paja / tabla
  rationale: La pareja 'mota / viga' preserva la desproporción deliberada del dicho y suena natural en español; 'viga' mantiene la fuerza de δοκός como pieza grande de madera.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'behold' sobre 'look' para ἰδοὺ por un registro más formal. En español se evaluó esa tensión y se optó por 'mira' como equivalente deíctico natural y digno, manteniendo la atención retórica sin caer en arcaísmo innecesario. También se sostuvo la imagen fuerte de 'viga' frente a alternativas más suaves, en consonancia con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'hermano' para ἀδελφός, coherente con la política de precisión de género del proyecto.
  - Se evita 'SEÑOR' o equivalentes no pertinentes; no hay nombres divinos en este versículo.
  - '''Mota'' y ''viga'' conservan el contraste hiperbólico con un registro claro y publicable.'
  - La puntuación y las comillas se ajustan a normas tipográficas del español.
