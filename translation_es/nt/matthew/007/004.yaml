    text: Griego «tu hermano»; el singular masculino puede referirse representativamente a un compañero discípulo.
    reason: cultural_note
  - marker: b
    text: O «astilla» para «mota» (griego κάρφος), un pedacito seco de material.
    reason: lexical_alternative
  - marker: c
    text: O «mira»; ἰδού funciona como marcador de atención.
    reason: lexical_alternative
  revision_rationale: Se revisa «y mira» a «y he aquí» para alinear el registro español con la revisión auditada del English POB para ἰδού y con el estilo digno del proyecto. También se añade la nota sobre «tu hermano» para preservar la aclaración cultural ya documentada. Se mantiene «mota / viga», que reproduce bien el contraste hiperbólico y suena natural en español.
