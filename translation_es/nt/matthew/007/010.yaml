translation:
  language: es
  text: ¿O si pide un pez, no le dará una serpiente[a], verdad?[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serpiente». El griego ὄφις también puede traducirse «culebra» o, en registro más elevado, «serpiente»/«serpiente»; aquí se usa «serpiente» por ser natural en español general.
    reason: lexical_alternative
  - marker: b
    text: 'También puede puntuarse: «¿O si pide un pez, no le dará una serpiente, verdad?». La pregunta final reproduce la expectativa negativa del μή griego.'
    reason: previous_rendering
lexical_decisions:
- source_word: ἢ καὶ
  english_pob_choice: Or if
  chosen_spanish: ¿O también
  alternatives_spanish:
  - ¿O si también
  - ¿O si acaso
  lexicon: BDAG
  rationale: La función retoma el segundo ejemplo de una serie paralela. En español, «¿O también» conserva la continuidad disyuntiva y el valor aditivo de καί sin volverlo pesado ni explicativo.
- source_word: ἰχθὺν
  english_pob_choice: a fish
  chosen_spanish: un pez
  alternatives_spanish:
  - un pescado
  - un pez de comer
  lexicon: BDAG
  rationale: El griego nombra el animal de manera directa. «Pez» es la equivalencia más inmediata y neutral; «pescado» introduciría el alimento más que el animal, y el contexto solo requiere la criatura pedida.
- source_word: αἰτήσει
  english_pob_choice: he asks for
  chosen_spanish: pedirá
  alternatives_spanish:
  - pide
  - solicitará
  lexicon: BDAG
  rationale: El futuro griego funciona en un enunciado ejemplar y general. En español, el futuro simple conserva mejor el paralelismo retórico del original que un presente, sin perder naturalidad en la pregunta hipotética.
- source_word: μὴ
  english_pob_choice: will not ... will he?
  chosen_spanish: no le dará ... ¿verdad?
  alternatives_spanish:
  - no le dará, ¿o sí?
  - no le dará, ¿no es así?
  lexicon: BDAG
  rationale: μή en pregunta directa espera una respuesta negativa. El español expresa bien esa fuerza con una coletilla interrogativa de expectativa negativa; «¿verdad?» mantiene la presión retórica sin forzar una fórmula ajena al idioma.
- source_word: ὄφιν
  english_pob_choice: a snake
  chosen_spanish: una serpiente
  alternatives_spanish:
  - una culebra
  - un serpiente
  lexicon: BDAG
  rationale: El término griego puede traducirse por «serpiente» o «culebra». Aquí «serpiente» es más natural en español general y conserva el contraste fuerte con «pez» dentro del ejemplo de padre e hijo.
- source_word: ἐπιδώσει
  english_pob_choice: give
  chosen_spanish: dará
  alternatives_spanish:
  - entregará
  - le dará
  lexicon: BDAG
  rationale: En el contexto el verbo expresa dar de manera directa. «Dará» conserva la sencillez del gesto y evita cargar el verbo con matices innecesarios.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al niño
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente en español con clítico dativo. «Le» mantiene la fluidez de la pregunta retórica.
theological_decisions:
- issue: Fuerza retórica de la pregunta con μή
  english_pob_reading: 'Render the question as expecting a negative answer: ''he will not give him a snake, will he?'''
  chosen_spanish_reading: 'Mantener una pregunta con expectativa negativa: «no le dará una serpiente, ¿verdad?»'
  alternative_spanish_readings:
  - «no le dará una serpiente, ¿no?»
  - «ciertamente no le dará una serpiente»
  rationale: 'El argumento de Jesús depende de la respuesta obvia e implícita: un padre no da algo dañino cuando se pide comida. La forma interrogativa final en español conserva mejor esa expectativa negativa que convertirlo en simple afirmación.'
  doctrine_reference: Principio POB de preservar la fuerza pragmática y la tensión retórica del texto fuente
- issue: Imagen doméstica de alimento frente a peligro
  english_pob_reading: fish / snake contrast in a father-child analogy
  chosen_spanish_reading: 'Conservar el contraste entre un alimento pedido y un animal peligroso: «pez» / «serpiente»'
  alternative_spanish_readings:
  - «pescado» / «víbora»
  - «pez» / «culebra»
  rationale: La fuerza del ejemplo está en el contraste entre una petición apropiada y una respuesta dañina. «Pez» y «serpiente» mantienen el contraste sin añadir connotaciones regionales o más intensas de las que exige el griego.
  doctrine_reference: Principio POB de no borrar contrastes léxicos ni intensificarlos sin base textual
translation_notes:
  revision_awareness: El inglés POB revisó la puntuación para reflejar el quiebre retórico del em dash. En español se conserva ese quiebre con una raya, manteniendo la cadencia de pregunta-respuesta implícita del griego y la fuerza del argumento en la unidad más amplia.
  spanish_consistency_notes:
  - Se evitó «Señor»/«Cristo» porque no aparecen en el versículo.
  - Se prefirió un léxico cotidiano pero digno, acorde con la comparación doméstica del texto.
  - Se mantuvo la pregunta final para no neutralizar la expectativa negativa del griego.
