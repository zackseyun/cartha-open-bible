  glossary_alignment: No hay términos del glosario principal en disputa aquí. 'Ríos' alinea correctamente con la decisión POB para ποταμοί, y 'roca' preserva la imagen parabólica sin sobreinterpretación. Conviene además preservar en notas las alternativas léxicas ya auditadas en inglés.
