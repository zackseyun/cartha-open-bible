translation:
  language: es
  text: Y cayó la lluvia, y vinieron los ríos[a], y soplaron los vientos y azotaron[b] aquella casa; y no cayó, porque había sido fundada sobre la roca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las inundaciones vinieron»; ποταμοί significa más literalmente «ríos».
    reason: lexical_alternative
  - marker: b
    text: O «cayeron sobre» o «golpearon contra» aquella casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατέβη
  english_pob_choice: came down
  chosen_spanish: cayó
  alternatives_spanish:
  - descendió
  - bajó
  lexicon: BDAG
  rationale: Con lluvia, el verbo español más natural y fiel al movimiento descendente es «cayó». Mantiene la imagen física del griego sin sonar forzado en español.
- source_word: βροχή
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - lluvia torrencial
  - chaparrón
  lexicon: BDAG
  rationale: «Lluvia» es el equivalente básico y preciso; el contexto ya comunica la fuerza de la tormenta sin añadir intensidad no expresada explícitamente por el sustantivo.
- source_word: ποταμοί
  english_pob_choice: rivers
  chosen_spanish: ríos
  alternatives_spanish:
  - inundaciones
  - torrentes
  lexicon: BDAG
  rationale: Se conserva el sentido léxico directo de ποταμοί como «ríos». Aunque en el contexto su imagen es amenazante, no se sustituye por «inundaciones» para no borrar la elección más literal del griego.
- source_word: ἔπνευσαν
  english_pob_choice: blew
  chosen_spanish: soplaron
  alternatives_spanish:
  - bufaron
  - ardieron
  lexicon: BDAG
  rationale: Con «vientos» como sujeto, «soplaron» es la traducción más natural y directa de πνέω.
- source_word: προσέπεσαν
  english_pob_choice: beat against
  chosen_spanish: azotaron
  alternatives_spanish:
  - cayeron sobre
  - golpearon contra
  lexicon: BDAG
  rationale: El griego literalmente expresa la idea de caer o lanzarse contra. En español, «azotaron» transmite el impacto repetido y la fuerza de viento y agua con buena idiomaticidad, sin perder el sentido de agresión contra la casa.
- source_word: οἰκίᾳ ἐκείνῃ
  english_pob_choice: that house
  chosen_spanish: aquella casa
  alternatives_spanish:
  - esa casa
  - aquella vivienda
  lexicon: BDAG
  rationale: «Aquella casa» conserva el demostrativo distante del griego y el referente concreto de οἰκία como construcción física, no como núcleo familiar.
- source_word: οὐκ ἔπεσεν
  english_pob_choice: did not fall
  chosen_spanish: no cayó
  alternatives_spanish:
  - no se derrumbó
  - no se vino abajo
  lexicon: BDAG
  rationale: «No cayó» sigue de cerca el verbo πίπτω y preserva la sencillez del contraste con la casa sobre la roca. «Derrumbó» sería más fuerte de lo que exige el texto.
- source_word: τεθεμελίωτο
  english_pob_choice: had been founded
  chosen_spanish: estaba fundada
  alternatives_spanish:
  - había sido fundada
  - había sido establecida
  lexicon: BDAG
  rationale: El pluscuamperfecto pasivo griego expresa una condición previa ya establecida. En español, «estaba fundada» comunica ese estado resultante de forma natural y mantiene la imagen de la cimentación.
- source_word: ἐπὶ τὴν πέτραν
  english_pob_choice: on the rock
  chosen_spanish: sobre la roca
  alternatives_spanish:
  - sobre la peña
  - en la roca
  lexicon: BDAG
  rationale: «Sobre la roca» reproduce con claridad la imagen preposicional y conserva el sustantivo «roca», sin intensificarlo a «peña» o «roca viva».
theological_decisions:
- issue: Imagen parabólica de la base firme
  english_pob_reading: on the rock
  chosen_spanish_reading: sobre la roca
  alternative_spanish_readings:
  - sobre la peña
  - sobre el cimiento rocoso
  rationale: 'La frase mantiene la metáfora sin identificar explícitamente la roca con una interpretación doctrinal más desarrollada. Se preserva la tensión del texto inmediato: la estabilidad proviene de una base firme, pero el versículo no la explica aquí.'
  doctrine_reference: Preservar la imagen parabólica sin sobreinterpretar.
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el auditorial inglés: conserva ποταμοί como ríos, mantiene el contraste de la casa que no cae y refleja el pluscuamperfecto pasivo con una construcción española natural. No se añadieron notas porque el español permite mantener la línea del texto sin ambigüedad nueva relevante.'
  spanish_consistency_notes:
  - Se usa «lluvia» y no «aguacero» para no intensificar el sustantivo.
  - Se conserva «ríos» para respetar la decisión léxica del POB inglés frente a la tendencia interpretativa de «inundaciones».
  - Se mantiene «roca» en singular con artículo implícito por el sentido parabolicamente específico.
  - La sintaxis busca ser publicable y bíblica sin calcado rígido del inglés.
