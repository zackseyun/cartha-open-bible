revisions:
- from: Porque estrecha es la puerta y constreñido[a] el camino que lleva a la vida, y pocos son los que la hallan.
  to: Porque estrecha es la puerta y difícil[a] el camino que lleva a la vida, y pocos son los que la hallan.
  rationale: Se reemplaza 'constreñido' por 'difícil' para lograr un español más natural y claro con 'camino', mientras la nota conserva la imagen literal de presión/compresión presente en τεθλιμμένη y documentada en el rastro de auditoría inglés. El resto del versículo puede mantenerse tal como está.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:02:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: ὅτι como causal explicativa, ''estrecha'' para στενή, distinción entre ''puerta'' y ''camino'', ''que lleva a la vida'' para ἀπάγουσα εἰς τὴν ζωήν, y ''pocos son los que...'' para ὀλίγοι εἰσὶν οἱ εὑρίσκοντες αὐτήν. También preserva la tensión de ζωή como ''vida'' sin expandirla. El único problema relevante es la elección de ''constreñido'' para τεθλιμμένη, que aunque intenta seguir la revisión inglesa ''constricted'', en español suena poco idiomática para ''camino'' y puede sugerir obligación o coerción más que estrechez/presión.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero ''constreñido el camino'' resulta forzado y menos natural en español eclesial general. ''Constringido'' sería más técnico; ''constreñido'' tiene uso, pero no es la mejor combinación con ''camino''. Una formulación como ''angosto[a]/estrecho'' podría confundir con στενή, por lo que conviene mantener un término que preserve compresión/dificultad sin sonar antinatural. ''Difícil'' en el texto principal sacrifica parte de la imagen; ''estrecho'' duplicaría el primer adjetivo. ''Afligido'' sería demasiado interpretativo. ''Oprimido'' tampoco encaja bien con ''camino''. La mejor reparación breve y legible es ''apretado[a]'' no; demasiado coloquial. Propongo ''estrecho es la puerta y angosto[a] el camino...'' pero eso reduce la distinción léxica. Más equilibrado en español: ''estrecha es la puerta y difícil[a] el camino...'' con nota que preserve la imagen literal de presión/compresión. Dado que el proyecto valora claridad
    en español, esta solución mejora legibilidad aunque se apoye en nota para la literalidad.'
  glossary_alignment: No hay términos de glosario mayor en juego como Yahvé, Mesías o esclavo. 'La vida' concuerda con la decisión POB de no expandir a 'vida eterna'. 'Hallan' es aceptable, aunque 'encuentran' sería más moderno; no requiere cambio. La revisión propuesta ajusta solo τεθλιμμένη para mejor español sin afectar la racionalidad teológica documentada.
  issues:
  - severity: medium
    issue: '''Constreñido'' para τεθλιμμένη suena poco natural con ''camino'' en español'
    rationale: Aunque intenta reflejar la imagen de compresión, en uso común 'constreñir' suele asociarse más a obligar/restringir que a describir un camino. Esto debilita la legibilidad y puede desviar el sentido.
  - severity: low
    issue: La nota actual explica bien la imagen griega, pero queda más necesaria si el texto principal usa una opción idiomática
    rationale: Si se cambia el texto principal a 'difícil', la nota debe mantener explícitamente la alternativa más literal de presión/compresión, como ya hace el inglés POB.
  revised_spanish_text: Porque estrecha es la puerta y difícil[a] el camino que lleva a la vida, y pocos son los que la hallan.
  revised_footnotes:
  - marker: a
    text: O 'constreñido' o 'comprimido'. El participio griego τεθλιμμένη literalmente sugiere algo presionado o comprimido, y por extensión un camino marcado por dureza o aflicción.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'constreñido' por 'difícil' para lograr un español más natural y claro con 'camino', mientras la nota conserva la imagen literal de presión/compresión presente en τεθλιμμένη y documentada en el rastro de auditoría inglés. El resto del versículo puede mantenerse tal como está.
