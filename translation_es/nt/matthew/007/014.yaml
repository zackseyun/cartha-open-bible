translation:
  language: es
  text: Porque estrecha es la puerta y difícil[a] el camino que lleva a la vida, y pocos son los que la hallan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'constreñido' o 'comprimido'. El participio griego τεθλιμμένη literalmente sugiere algo presionado o comprimido, y por extensión un camino marcado por dureza o aflicción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón de la exhortación previa; en español, 'Porque' expresa con naturalidad ese valor explicativo-causal sin añadir interpretación.
- source_word: στενὴ
  english_pob_choice: narrow
  chosen_spanish: estrecha
  alternatives_spanish:
  - angosta
  - apretada
  lexicon: BDAG
  rationale: στενός comunica estrechez física o figurada. 'Estrecha' es natural en español y conserva la imagen de una abertura limitada.
- source_word: πύλη
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portal
  - entrada
  lexicon: BDAG
  rationale: Aunque πύλη puede ser 'puerta' o 'portón', en español 'puerta' es la equivalencia más transparente y comprensible para la imagen de acceso al camino.
- source_word: τεθλιμμένη
  english_pob_choice: constricted
  chosen_spanish: constreñido
  alternatives_spanish:
  - apretado
  - constriñido
  - angustiado
  - difícil
  lexicon: BDAG
  rationale: El participio perfecto pasivo de θλίβω sugiere presión, compresión o aflicción. 'Constreñido' preserva mejor la fuerza literal de 'presionado/comprimido' que 'difícil', sin resolver la tensión hacia una sola idea interpretativa.
- source_word: ὁδὸς
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - sendero
  - ruta
  lexicon: BDAG
  rationale: ὁδός puede ser camino, ruta o vía. 'Camino' mantiene el valor metafórico y moral del término con naturalidad en español bíblico contemporáneo.
- source_word: ἀπάγουσα
  english_pob_choice: that leads
  chosen_spanish: que lleva
  alternatives_spanish:
  - que conduce
  - que guía
  lexicon: BDAG
  rationale: El participio presenta dirección hacia un destino. 'Que lleva' es idiomático en español y conserva la idea de movimiento hacia la vida sin sobreespecificar.
- source_word: ζωήν
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida eterna
  - vida
  lexicon: BDAG
  rationale: ζωή significa 'vida'. Se conserva 'la vida' sin expandir a 'vida eterna', porque el texto griego no lo dice explícitamente aunque el contexto tenga peso escatológico.
- source_word: ὀλίγοι
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - unos pocos
  - escasos
  lexicon: BDAG
  rationale: ὀλίγοι equivale a 'pocos'. 'Pocos' preserva la sobriedad del adjetivo sin intensificarlo.
- source_word: οἱ εὑρίσκοντες αὐτήν
  english_pob_choice: those who find it
  chosen_spanish: los que la hallan
  alternatives_spanish:
  - los que la encuentran
  - quienes la hallan
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente. 'Los que la hallan' es claro y bíblicamente natural; 'hallar' mantiene el matiz de encontrar algo tras búsqueda o descubrimiento.
theological_decisions:
- issue: 'Valor de τεθλιμμένη: imagen física o evaluación moral/espiritual'
  english_pob_reading: Rendered as 'constricted' to preserve the compression imagery while avoiding interpretive expansion.
  chosen_spanish_reading: '''Constreñido'' mantiene la imagen de presión/comprensión sin convertirla en una glosa doctrinal.'
  alternative_spanish_readings:
  - '''difícil'' enfatiza la dificultad'
  - '''angosto'' acerca la metáfora a la del espacio limitado'
  rationale: El griego puede sugerir tanto compresión como dificultad. La traducción española conserva esa tensión semántica y no la reduce a una sola explicación.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
- issue: Alcance de ζωή
  english_pob_reading: Rendered as 'life' rather than 'eternal life'.
  chosen_spanish_reading: '''la vida'' sin expansión interpretativa.'
  alternative_spanish_readings:
  - '''vida eterna'' como explicitación interpretativa'
  rationale: Aunque el contexto apunta a la vida escatológica, el texto dice simplemente ζωήν. Se evita añadir un adjetivo que el griego no expresa.
  doctrine_reference: 'Translation philosophy §1 y §3: primacía del original y preservación de la tensión.'
- issue: Relación entre la puerta y el camino
  english_pob_reading: The gate is narrow and the way is constricted.
  chosen_spanish_reading: Se distingue entre 'la puerta' y 'el camino' sin fusionarlos ni reinterpretarlos.
  alternative_spanish_readings:
  - unificar la imagen en una sola metáfora
  - parafrasear como 'entrada' y 'trayecto'
  rationale: El griego presenta dos imágenes correlativas pero distintas. La traducción española conserva ambas para no borrar el paralelismo retórico del versículo.
  doctrine_reference: 'Principio POB: mantener la estructura retórica del texto fuente.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al preferir un equivalente más cercano a τεθλιμμένη que 'difícil' o 'duro'. También conserva la decisión del POB inglés de no expandir ζωήν a 'vida eterna'.
  spanish_consistency_notes:
  - Se mantiene Yahvé por defecto solo cuando el texto lo requiere; aquí no aparece ningún nombre divino.
  - Se usa 'la vida' y no 'vida eterna' para respetar el alcance explícito de ζωήν.
  - '''Constreñido'' se eligió para reflejar la presión/comprensión de τεθλιμμένη, aunque en español puede sonar más formal; la nota aclara la alternativa ''difícil''.'
  - '''Los que la hallan'' conserva la función sustantiva del participio y el objeto femenino singular del pronombre.'
