review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el sentido básico del griego y conserva la reciprocidad, el pasivo sin agente explícito y el juego léxico juicio/juzgar; medida/medir. Sin embargo, cambia indebidamente la segunda persona plural de κρίνετε/μετρεῖτε a tercera persona plural («juzgan», «miden»), cuando el griego y el inglés auditado se dirigen directamente a «ustedes».
  spanish_quality_summary: 'El español es claro y legible, pero la mezcla de segunda persona en «serán juzgados» con tercera persona en «juzgan / miden» rompe la concordancia y debilita la exhortación directa de Jesús. Conviene uniformar en segunda persona plural implícita con verbos en plural: «juzgan / miden» debe pasar a «juzguen / midan» solo si fuera subjuntivo, pero aquí son indicativos: la forma natural sin pronombre en registro neutro es «juzgan» solo para tercera persona; por tanto debe usarse «ustedes juzgan / ustedes miden» o una formulación con «que ustedes». La opción más natural y fiel es «con el juicio con que ustedes juzgan... con la medida con que ustedes miden...».'
  glossary_alignment: No hay conflicto con la terminología de proyecto. «Juicio» para κρίματι y «medida» para μέτρῳ están bien. Se preserva correctamente el pasivo no especificado. La nota sobre «de vuelta» es pertinente, pero debe anclarse al segmento medido, no a «juicio».
  issues:
  - severity: high
    issue: Cambio de persona gramatical en los verbos principales
    rationale: κρίνετε y μετρεῖτε son segunda persona plural («ustedes juzgan / miden»), pero el borrador dice «juzgan» y «miden», que sin sujeto expreso en español se leen como tercera persona plural. Esto altera el destinatario directo del dicho.
  - severity: medium
    issue: Anclaje inadecuado de la nota al pie
    rationale: La nota explica la alternativa de μετρηθήσεται ὑμῖν («se les medirá de vuelta»), pero el marcador [a] está colocado en «juicio», lo que no corresponde al lugar semántico de la variante.
  - severity: low
    issue: «Porque» es posible, pero «Pues»/«Porque» depende del flujo; no es error
    rationale: γάρ puede traducirse «Porque» y funciona. No requiere cambio obligatorio.
  revised_spanish_text: Porque con el juicio con que ustedes juzgan, serán juzgados; y con la medida con que ustedes miden, se les medirá[a].
  revised_footnotes:
  - marker: a
    text: 'O: «se les medirá de vuelta». El griego no expresa explícitamente «de vuelta», aunque el sentido recíproco está implicado.'
    reason: lexical_alternative
  revision_rationale: Se corrige la persona gramatical para reflejar fielmente la segunda persona plural del griego y del inglés auditado, y se mueve la nota al segmento correcto de «se les medirá», donde pertenece la alternativa lexical sobre «de vuelta». Se conservan el pasivo sin agente explícito, el paralelismo y la claridad del español.
