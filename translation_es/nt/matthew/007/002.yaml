- from: Porque con el juicio[a] con que juzgan, serán juzgados; y con la medida con que miden, se les medirá.
  to: Porque con el juicio con que ustedes juzgan, serán juzgados; y con la medida con que ustedes miden, se les medirá[a].
  rationale: Se corrige la persona gramatical para reflejar fielmente la segunda persona plural del griego y del inglés auditado, y se mueve la nota al segmento correcto de «se les medirá», donde pertenece la alternativa lexical sobre «de vuelta». Se conservan el pasivo sin agente explícito, el paralelismo y la claridad del español.
