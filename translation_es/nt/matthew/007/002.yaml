translation:
  language: es
  text: Porque con el juicio con que ustedes juzgan, serán juzgados; y con la medida con que ustedes miden, se les medirá[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se les medirá de vuelta». El griego no expresa explícitamente «de vuelta», aunque el sentido recíproco está implicado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίματι
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - veredicto
  lexicon: BDAG
  rationale: κρίμα puede referirse a juicio, decisión judicial o sentencia. «Juicio» conserva el enlace léxico con κρίνετε/κριθήσεσθε y funciona de manera natural en español en este contexto exhortativo.
- source_word: κρίνετε
  english_pob_choice: you judge
  chosen_spanish: juzgan
  alternatives_spanish:
  - juzgan
  - condenan
  - emiten juicio
  lexicon: BDAG
  rationale: El verbo κρίνω tiene un campo amplio, pero aquí el paralelismo con κρίματι favorece «juzgan» antes que «condenan», porque mantiene la repetición conceptual sin estrechar indebidamente el sentido.
- source_word: κριθήσεσθε
  english_pob_choice: you will be judged
  chosen_spanish: serán juzgados
  alternatives_spanish:
  - serán juzgados
  - se les condenará
  - recibirán juicio
  lexicon: BDAG
  rationale: El pasivo futuro de κρίνω se refleja mejor con «serán juzgados», que conserva la reciprocidad de la frase y no añade explícitamente la idea de condena.
- source_word: μέτρῳ
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - medida
  - patrón
  - regla
  lexicon: BDAG
  rationale: μέτρον aquí es metafórico. «Medida» reproduce la imagen proverbial y mantiene el paralelismo con μετρεῖτε/μετρηθήσεται.
- source_word: μετρεῖτε
  english_pob_choice: you measure
  chosen_spanish: miden
  alternatives_spanish:
  - miden
  - miden ustedes
  - miden con
  lexicon: BDAG
  rationale: 'Se conserva el verbo de la misma raíz que el sustantivo anterior para reproducir el juego verbal del griego: medida / miden / se les medirá.'
- source_word: μετρηθήσεται ὑμῖν
  english_pob_choice: it will be measured to you
  chosen_spanish: se les medirá
  alternatives_spanish:
  - se les medirá
  - les será medido
  - se les medirá a ustedes
  lexicon: BDAG
  rationale: El dativo ὑμῖν expresa el destinatario, que en español queda claro con «se les». No se añade «de vuelta» porque el griego no lo dice explícitamente, aunque la reciprocidad esté implícita.
- source_word: ἐν ᾧ ... ἐν ᾧ
  english_pob_choice: with ... by which
  chosen_spanish: con ... con que
  alternatives_spanish:
  - con ... con que
  - por ... por el que
  - según ... según
  lexicon: BDAG
  rationale: La construcción instrumental/estándar se vuelve más natural en español con «con ... con que», preservando el paralelismo y evitando una formulación demasiado rígida.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Porque
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la base de la advertencia anterior; «Porque» funciona bien como conexión explicativa en español y mantiene la lógica del argumento.
theological_decisions:
- issue: Agente del pasivo en la reciprocidad de juicio
  english_pob_reading: The verse states a principle of reciprocal divine or corresponding judgment without specifying the exact agent in the passive.
  chosen_spanish_reading: 'La frase conserva el pasivo sin nombrar al agente: «serán juzgados» / «se les medirá».'
  alternative_spanish_readings:
  - Dios los juzgará con la misma medida
  - otros los juzgarán con la misma medida
  rationale: El texto griego no explicita el agente, por lo que la traducción debe mantener esa apertura interpretativa. Nombrar a Dios u otros introduciría una precisión no expresada en el verso.
  doctrine_reference: Preservar la tensión interpretativa del pasivo.
translation_notes:
  revision_awareness: La versión española sigue el pasaje griego de manera directa y preserva el paralelismo retórico y léxico de κρίματι/κρίνετε y μέτρῳ/μετρεῖτε, sin introducir el agente del pasivo. No se detectaron revisiones aplicadas en el registro inglés más reciente, y el estado de concordancia es alto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se mantiene «juzgar/juicio» en vez de «condenar/condena» para no estrechar el alcance de κρίνω.
  - Se conserva la imagen de medida sin reemplazarla por una explicación interpretativa.
  - El pronombre impersonal «se les» preserva un español natural y el pasivo del original.
