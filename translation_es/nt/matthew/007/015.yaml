translation:
  language: es
  text: Cuídense de los falsos profetas[a], que vienen a ustedes con vestiduras de oveja[b], pero por dentro[c] son lobos rapaces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estén alerta contra los falsos profetas».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «con prendas de oveja».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «dentro son lobos rapaces»; el griego también admite «lobos rapiñadores».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Προσέχετε
  english_pob_choice: Beware
  chosen_spanish: Guárdense de
  alternatives_spanish:
  - Estén alerta de
  - Cuídense de
  - Estén en guardia contra
  lexicon: BDAG
  rationale: El imperativo plural exhorta a una vigilancia continua. En español, «guárdense de» comunica bien la cautela activa y mantiene el tono de advertencia sin volverse rígidamente literal.
- source_word: ἀπὸ
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - contra
  - frente a
  lexicon: BDAG
  rationale: Con προσέχω, ἀπό introduce el objeto del que hay que cuidarse. En español, la construcción natural es «guardarse de».
- source_word: ψευδοπροφητῶν
  english_pob_choice: false prophets
  chosen_spanish: falsos profetas
  alternatives_spanish:
  - profetas falsos
  - profetas mentirosos
  lexicon: BDAG
  rationale: Es la equivalencia directa y transparente para ψευδοπροφήτης. Conserva el valor de falsedad en la pretensión profética sin añadir categorías posteriores.
- source_word: ἔρχονται πρὸς ὑμᾶς
  english_pob_choice: come to you
  chosen_spanish: vienen a ustedes
  alternatives_spanish:
  - se acercan a ustedes
  - vienen hacia ustedes
  lexicon: BDAG
  rationale: La frase describe su aproximación a los oyentes; «vienen a ustedes» es natural, claro y fiel al presente descriptivo.
- source_word: ἐν ἐνδύμασι προβάτων
  english_pob_choice: in sheep’s clothing
  chosen_spanish: con ropa de ovejas
  alternatives_spanish:
  - con vestiduras de ovejas
  - vistiendo ropa de ovejas
  lexicon: BDAG
  rationale: El griego dice literalmente «en vestidos/ropas de ovejas». En español, «con ropa de ovejas» conserva la imagen sin forzar una expresión poco idiomática; se mantiene la tensión metafórica entre apariencia externa y realidad interna.
- source_word: ἔσωθεν
  english_pob_choice: inwardly
  chosen_spanish: por dentro
  alternatives_spanish:
  - interiormente
  - en lo interior
  lexicon: BDAG
  rationale: Marca el contraste con la apariencia externa. «Por dentro» es coloquialmente claro y reproduce bien el contraste semántico.
- source_word: λύκοι ἅρπαγες
  english_pob_choice: ravenous wolves
  chosen_spanish: lobos rapaces
  alternatives_spanish:
  - lobos voraces
  - lobos rapiñadores
  lexicon: BDAG
  rationale: ἅρπαγες expresa carácter depredador y rapaz. «Rapaces» conserva mejor esa fuerza que «voraces»; se mantiene la imagen de lobos destructivos.
theological_decisions:
- issue: Tipo de advertencia contra líderes religiosos engañosos
  english_pob_reading: Translate the imagery straightforwardly as a moral-spiritual warning without importing later ecclesial categories.
  chosen_spanish_reading: Mantener la advertencia como un aviso moral y espiritual contra profetas falsos, sin estrecharla a una categoría eclesiástica posterior.
  alternative_spanish_readings:
  - Traducir de modo que apunte específicamente a herejes o maestros heréticos en sentido técnico posterior
  - Atenuar la advertencia en una exhortación general sin referencia a profetas
  rationale: El griego habla de profetas falsos y de la discrepancia entre apariencia externa y realidad interna. La traducción española preserva esa tensión sin reinterpretarla con categorías doctrinales posteriores que el texto no explicita.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo en el control cruzado y no requiere cambios respecto del sentido auditado: advertencia imperativa, contraste apariencia/realidad y metáfora depredadora se mantienen estables.'
  spanish_consistency_notes:
  - Se preserva «falsos profetas» para ψευδοπροφητῶν, coherente con la terminología POB.
  - «Guárdense de» refleja la fuerza del imperativo de vigilancia mejor que una traducción meramente informativa.
  - «Ropa de ovejas» mantiene la imagen sin convertirla en explicación.
  - «Lobos rapaces» conserva la dureza de ἅρπαγες y evita suavizar la metáfora.
