translation:
  language: es
  text: Porque todo el que pide recibe, y el que busca encuentra, y al que llama[a] a la puerta se le abrirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y para el que llama, se abrirá». El griego no menciona explícitamente «la puerta»; esa idea queda implícita en la imagen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - todo aquel que
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente y expresa un grupo general. En español, «todo el que» comunica bien el alcance universal y mantiene naturalidad sin volver el texto forzado.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva la fuerza explicativa que enlaza con la exhortación anterior. «Porque» es claro y idiomático al inicio de una frase en español.
- source_word: ὁ αἰτῶν
  english_pob_choice: who asks
  chosen_spanish: el que pide
  alternatives_spanish:
  - el que solicita
  - quien pide
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa una acción continua o general. «El que pide» preserva la sencillez y el paralelismo del dicho, y «pedir» es la equivalencia más natural en español aquí.
- source_word: λαμβάνει
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - obtiene
  - lo recibe
  lexicon: BDAG
  rationale: «Recibe» conserva el sentido estándar de λαμβάνω y mantiene el paralelismo formal con «encuentra» y «se le abrirá».
- source_word: ὁ ζητῶν
  english_pob_choice: the one who seeks
  chosen_spanish: el que busca
  alternatives_spanish:
  - quien busca
  - el buscador
  lexicon: BDAG
  rationale: Se mantiene la estructura paralela del griego mediante otra cláusula con artículo + verbo. «Buscar» es el equivalente más directo y memorable.
- source_word: εὑρίσκει
  english_pob_choice: finds
  chosen_spanish: encuentra
  alternatives_spanish:
  - halla
  - descubre
  lexicon: BDAG
  rationale: «Encuentra» es la opción más natural y clara en español moderno; conserva la simplicidad proverbial del texto.
- source_word: τῷ κρούοντι
  english_pob_choice: to the one who knocks
  chosen_spanish: al que llama
  alternatives_spanish:
  - al que golpea
  - al que toca
  lexicon: BDAG
  rationale: El verbo griego κρούω puede referirse a llamar a una puerta tocando/golpeando. En español, «llamar» expresa bien la acción convencional del dicho sin añadir el objeto «puerta» que no aparece en el texto.
- source_word: ἀνοιγήσεται
  english_pob_choice: it will be opened
  chosen_spanish: se le abrirá
  alternatives_spanish:
  - le abrirán
  - será abierto
  lexicon: BDAG
  rationale: El pasivo futuro griego no nombra explícitamente el sujeto. «Se le abrirá» conserva la pasiva impersonal y evita introducir «la puerta», que es solo inferida por la imagen.
theological_decisions:
- issue: Alcance de la promesa
  english_pob_reading: A general assurance stated in universal terms without importing an absolute guarantee detached from context.
  chosen_spanish_reading: Una promesa general expresada en términos universales, sin convertirla en una garantía absoluta separada del contexto.
  alternative_spanish_readings:
  - Una promesa incondicional de que toda petición específica será concedida tal cual
  - Una promesa limitada solo a ciertas peticiones espirituales
  rationale: El texto usa lenguaje universal («todo el que...»), y la traducción debe respetarlo sin resolver por adelantado la tensión interpretativa. Por eso se formula de manera amplia y directa, dejando el alcance teológico para la lectura del contexto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en la traducción.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el auditrail inglés; el consenso de revisión es alto y el pasaje permanece sin cambios sustanciales. La versión española refleja directamente el griego con las decisiones léxicas ya confirmadas por el control de calidad.
  spanish_consistency_notes:
  - Se mantuvo «Dios / Yahvé / Mesías / Jesús» según las pautas generales, aunque este versículo no contiene esos términos.
  - Se prefirió una pasiva impersonal en español («se le abrirá») para conservar el pasivo futuro griego sin añadir un sujeto explícito.
  - Se evitó «puerta» en el texto principal porque no aparece en el griego; queda solo en la nota como inferencia de la imagen.
