    issue: «al que llama» no representa con suficiente precisión κρούω
    rationale: κρούω se refiere a golpear o tocar para pedir entrada. «Llamar» solo, en español, puede entenderse como convocar o telefonear; la imagen de puerta queda demasiado diluida.
  - severity: medium
