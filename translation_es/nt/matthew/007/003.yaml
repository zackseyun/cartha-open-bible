translation:
  language: es
  text: ¿Pero por qué ves la paja[a] que está en el ojo de tu hermano[b], y no adviertes la viga[c] que está en tu propio ojo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «astilla», «mota» o «pajita» para κάρφος.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «hermano»; se conserva el masculino singular del texto fuente.
    reason: lexical_alternative
  - marker: c
    text: O «tronco» o «madero» para δοκός.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - qué
  lexicon: BDAG
  rationale: 'En esta pregunta retórica con βλέπεις, el sentido idiomático es causal/interrogativo: no se pregunta por el objeto visto, sino por la razón. ''Por qué'' conserva ese valor natural en español.'
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un contraste suave con la enseñanza anterior. 'Pero' reproduce bien ese giro adversativo en español contemporáneo.
- source_word: βλέπεις
  english_pob_choice: do you see
  chosen_spanish: ves
  alternatives_spanish:
  - miras
  - observas
  lexicon: BDAG
  rationale: βλέπω aquí conserva su sentido básico de ver, en contraste con κατανοεῖς. 'Ves' es la opción más directa y mantiene el paralelismo retórico.
- source_word: κάρφος
  english_pob_choice: speck
  chosen_spanish: paja
  alternatives_spanish:
  - astilla
  - pajita
  - mota
  - viruta
  lexicon: BDAG
  rationale: κάρφος puede referirse a una partícula seca pequeña, como una paja, astilla o mota. En español, 'paja' funciona bien con la imagen proverbial y contrasta con 'viga' sin sobreespecificar el objeto.
- source_word: ἀδελφοῦ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano o hermana
  - prójimo
  - creyente
  lexicon: BDAG
  rationale: Se conserva el singular masculino del texto griego. 'Hermano' respeta la forma fuente y la política de precisión de género del proyecto.
- source_word: σῷ
  english_pob_choice: your own
  chosen_spanish: tu propio
  alternatives_spanish:
  - tu
  - el tuyo
  lexicon: BDAG
  rationale: El posesivo enfatiza contraste con 'de tu hermano'. 'Tu propio' expresa bien esa oposición enfática en español.
- source_word: δοκόν
  english_pob_choice: beam
  chosen_spanish: viga
  alternatives_spanish:
  - madero
  - tronco
  - planca
  lexicon: BDAG
  rationale: δοκός designa una pieza grande de madera, un 'beam'. 'Viga' es el equivalente español natural y conserva la hipérbole del contraste con 'paja'.
- source_word: οὐ κατανοεῖς
  english_pob_choice: do not notice
  chosen_spanish: no adviertes
  alternatives_spanish:
  - no notas
  - no percibes
  - no consideras
  lexicon: BDAG
  rationale: κατανοέω implica notar atentamente, percibir o reparar en algo. 'No adviertes' mantiene el contraste con 'ves' y suena natural en español.
- source_word: ὀφθαλμῷ
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  lexicon: BDAG
  rationale: ὀφθαλμός es 'ojo' en sentido literal dentro de la metáfora corporal. Se mantiene el término directo y transparente.
theological_decisions:
- issue: Retención del masculino singular ἀδελφοῦ
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - hermano o hermana
  - prójimo
  rationale: La formulación griega es masculinidad singular y el POB inglés conserva 'brother'. En español, 'hermano' representa fielmente el dato textual sin neutralizar la forma fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: se mantiene la misma lectura y el mismo perfil léxico. Esta versión española sigue la equivalencia óptima del POB, preservando el contraste retórico entre ver una partícula mínima en el ojo ajeno y no advertir una gran viga en el propio.'
  spanish_consistency_notes:
  - Se mantiene 'hermano' para ἀδελφοῦ conforme a la precisión de género del proyecto.
  - Se traduce κάρφος de forma idiomática como 'paja' en el cuerpo del texto, con nota de alternativas léxicas.
  - Se traduce δοκός como 'viga' para conservar la hipérbole y la naturalidad en español.
  - Se usa 'adviertes' para κατανοεῖς a fin de distinguirlo de 'ves' y conservar la ironía del contraste.
