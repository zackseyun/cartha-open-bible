review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y las metáforas del griego: mantiene ''lo santo'', ''perros'', ''perlas'' y ''cerdos'' sin expansión interpretativa, y conserva la secuencia de advertencia de μήποτε ... καὶ στραφέντες ῥήξωσιν. Sin embargo, hay dos desajustes importantes: (1) ἐν τοῖς ποσὶν αὐτῶν se entiende mejor como ''bajo sus pies'', no ''con sus pies''; y (2) el objeto de ῥήξωσιν ὑμᾶς debe reflejar directamente ''a ustedes'', no el clítico ''los'', que en varios países puede sonar ambiguo o menos natural con referente discursivo plural mixto.'
  spanish_quality_summary: 'El español es en general claro y digno, pero la frase final puede mejorar en naturalidad y precisión: ''bajo sus pies'' reproduce mejor la imagen idiomática, y ''los despedacen'' conviene reemplazarse por ''los hagan pedazos'' o ''los despedacen'' solo si se mantiene la referencia explícita y natural. Además, la nota b está mal formulada: presenta como variante tradicional exactamente la misma redacción del texto principal, cuando la alternativa tradicional real sería ''arrojéis vuestras perlas delante de los cerdos'' o similar; dado el entorno de esta revisión, lo más seguro es conservar una nota tradicional breve y exacta en español.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Lo santo', 'perros', 'perlas' y 'cerdos' están alineados con las decisiones auditadas. La revisión propuesta solo corrige precisión semántica y claridad idiomática.
