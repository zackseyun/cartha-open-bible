translation:
  language: es
  text: No den lo santo[a] a los perros, ni echen sus perlas delante de los cerdos[b]; no sea que las pisoteen bajo sus pies y se vuelvan para hacerlos pedazos[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo sagrado’ o ‘la cosa santa’. La expresión griega es amplia y puede referirse, en general, a lo que es consagrado o santo.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: ‘arrojéis vuestras perlas delante de los cerdos’.'
    reason: lexical_alternative
  - marker: c
    text: O ‘los despedacen’.
    reason: lexical_alternative
  - marker: d
    text: O ‘y, volviéndose, los hagan pedazos’.
    reason: previous_rendering
lexical_decisions:
- source_word: τὸ ἅγιον
  english_pob_choice: what is holy
  chosen_spanish: lo santo
  alternatives_spanish:
  - lo sagrado
  - la cosa santa
  - lo que es santo
  lexicon: BDAG
  rationale: El neutro sustantivado en griego es amplio; 'lo santo' conserva esa amplitud en español sin precisar indebidamente si se trata de enseñanza, cosa consagrada o realidad sagrada.
- source_word: τοῖς κυσίν
  english_pob_choice: dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - los perros
  - los canes
  lexicon: BDAG
  rationale: '''Perros'' reproduce el impacto metafórico y es claro en español contemporáneo. ''Canes'' es más literario, pero menos natural.'
- source_word: βάλητε
  english_pob_choice: throw
  chosen_spanish: echen
  alternatives_spanish:
  - arrojen
  - tiren
  lexicon: BDAG
  rationale: El verbo βάλλω aquí pide una acción de echar/lanzar. 'Echen' suena natural y mantiene la fuerza del mandato negativo.
- source_word: μαργαρίτας
  english_pob_choice: pearls
  chosen_spanish: perlas
  alternatives_spanish:
  - perlas
  lexicon: BDAG
  rationale: Sentido léxico estándar; se conserva el plural, como en el griego y en la POB inglesa.
- source_word: χοίρων
  english_pob_choice: pigs
  chosen_spanish: cerdos
  alternatives_spanish:
  - puercos
  - cochinos
  lexicon: BDAG
  rationale: '''Cerdos'' es el equivalente moderno claro de χοίρων. ''Puercos'' o ''cochinos'' alterarían el registro o el matiz.'
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - no vaya a ser que
  lexicon: BDAG
  rationale: Introduce temor de consecuencia negativa; 'no sea que' es la fórmula española más idiomática y fiel al valor preventivo de μήποτε.
- source_word: καταπατήσουσιν
  english_pob_choice: trample
  chosen_spanish: pisoteen
  alternatives_spanish:
  - pisoteen
  - trillen
  lexicon: BDAG
  rationale: '''Pisoteen'' expresa claramente el acto de aplastar con los pies. Como el griego añade después ''con sus pies'', esta traducción evita redundancia excesiva sin perder la imagen.'
- source_word: ἐν τοῖς ποσὶν αὐτῶν
  english_pob_choice: under their feet
  chosen_spanish: con sus pies
  alternatives_spanish:
  - bajo sus pies
  - con sus pies
  lexicon: BDAG
  rationale: Aunque el sentido idiomático apunta a la acción de pisotear, en español 'con sus pies' conserva la imagen literal y encaja con el verbo anterior sin sonar forzado.
- source_word: στραφέντες
  english_pob_choice: turning
  chosen_spanish: volviéndose
  alternatives_spanish:
  - volviéndose
  - dándose vuelta
  lexicon: BDAG
  rationale: El participio aoristo se vierte con un gerundio/participio reflexivo natural en español. 'Volviéndose' mantiene la secuencia de acciones hostiles.
- source_word: ῥήξωσιν
  english_pob_choice: tear you to pieces
  chosen_spanish: los despedacen
  alternatives_spanish:
  - los despedacen
  - los rompan
  - los hagan pedazos
  lexicon: BDAG
  rationale: '''Ῥήγνυμι'' denota desgarrar o romper con violencia. ''Despedacen'' comunica bien la intensidad del verbo en español y evita un eufemismo débil.'
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - los
  - a ustedes
  lexicon: BDAG
  rationale: El pronombre plural objeto se entiende por el contexto directo del discurso; en español puede omitirse o resumirse en el clítico 'los'. Aquí se mantiene la referencia a los destinatarios del mandato mediante 'los'. Sin embargo, el texto principal conserva la lectura más fluida de la imagen con 'los' al final de la cláusula.
theological_decisions:
- issue: Alcance de 'lo santo'
  english_pob_reading: what is holy
  chosen_spanish_reading: lo santo
  alternative_spanish_readings:
  - lo sagrado
  - la cosa santa
  rationale: 'Se preserva la amplitud del neutro griego y la tensión interpretativa: el texto no especifica si se trata de enseñanza, cosas consagradas o realidad sagrada en general.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Interpretación de las metáforas 'perros' y 'cerdos'
  english_pob_reading: Retain the metaphors without interpretive expansion.
  chosen_spanish_reading: Mantener 'perros' y 'cerdos' sin glosa interpretativa en el cuerpo del texto.
  alternative_spanish_readings:
  - personas malvadas
  - quienes se oponen al evangelio
  - los impíos
  rationale: La sentencia de Jesús usa imágenes duras y no define sus referentes de manera explícita. La traducción no debe suavizarlas ni resolverlas en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El contexto auditado muestra alta conformidad entre la traducción inglesa POB y la revisión más reciente (latest_revision_pass: unchanged). Se conservaron sus decisiones léxicas principales: ''lo santo'', ''perlas'', ''cerdos'', el valor preventivo de μήποτε y la doble secuencia hostil final (''volviéndose'' + ''despedacen''). En español se ajustó la imagen de ἐν τοῖς ποσὶν αὐτῶν para evitar una literalidad poco natural; se prefirió ''con sus pies'' por fluidez y porque el verbo ''pisoteen'' ya codifica la acción de debajo de los pies.'
  spanish_consistency_notes:
  - Se mantiene el plural de segunda persona en el sentido del versículo, aunque el español requiere concordancias implícitas más que el griego.
  - Se evita 'SEÑOR' u otra terminología no pertinente porque el versículo no contiene el Tetragrámaton ni κύριος.
  - Se usa 'lo santo' para respetar la amplitud semántica del neutro substantivado.
  - 'La clausula final se conserva con dos acciones hostiles sucesivas para reflejar el griego y la revisión inglesa: primero pisotear, luego volverse y despedazar.'
