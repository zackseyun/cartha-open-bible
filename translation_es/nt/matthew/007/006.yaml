  text: Μὴ δῶτε τὸ ἅγιον τοῖς κυσίν, μηδὲ βάλητε τοὺς μαργαρίτας ὑμῶν ἔμπροσθεν τῶν χοίρων, μήποτε ⸀καταπατήσουσιν αὐτοὺς ἐν τοῖς ποσὶν αὐτῶν καὶ στραφέντες ῥήξωσιν ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/007/006.yaml
  text: Do not give what is holy to dogs[a], and do not throw your pearls before pigs[d][c][b], lest they trample them under their feet and turn and tear you to pieces.
  footnotes:
  - marker: a
    text: Or 'the holy thing' or 'what is sacred.' The Greek expression is broad and may refer generally to what is consecrated or holy.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''cast your pearls before swine.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'tear you apart.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and, turning, tear you to pieces'.
    reason: previous_rendering
