- from: No den lo santo[a] a los perros, ni echen sus perlas delante de los cerdos; no sea que las pisoteen con sus pies y, volviéndose, los despedacen[c][b][d].
  to: No den lo santo[a] a los perros, ni echen sus perlas delante de los cerdos[b]; no sea que las pisoteen bajo sus pies y se vuelvan para hacerlos pedazos[c][d].
  rationale: Se corrige 'con sus pies' a 'bajo sus pies' para reflejar mejor el sentido idiomático del griego y la decisión lexical auditada. Se suaviza la secuencia final a un español más natural y claro ('se vuelvan para hacerlos pedazos') manteniendo la violencia de ῥήξωσιν y la progresión de στραφέντες. También se reparan las notas para que presenten alternativas reales y útiles en español, alineadas con la auditoría inglesa.
