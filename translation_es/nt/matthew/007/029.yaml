translation:
  language: es
  text: porque les enseñaba como quien[a] tiene autoridad, y no como sus escribas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «con autoridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν γὰρ διδάσκων
  english_pob_choice: for he was teaching
  chosen_spanish: porque él les enseñaba
  alternatives_spanish:
  - porque estaba enseñándoles
  - pues él les enseñaba
  lexicon: BDAG
  rationale: El imperfecto perifrástico griego expresa acción continua en pasado. En español, «les enseñaba» transmite bien ese aspecto sin forzar una construcción demasiado pesada. «Porque» conserva el valor explicativo de γάρ, vinculando la observación con el asombro del versículo anterior.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - los
  lexicon: BDAG
  rationale: El pronombre dativo de objeto indirecto en español puede naturalizarse como «les» cuando el referente son los oyentes; así se mantiene la referencia a la audiencia sin recargar la frase.
- source_word: ὡς ἐξουσίαν ἔχων
  english_pob_choice: as one having authority
  chosen_spanish: como uno que tiene autoridad
  alternatives_spanish:
  - como teniendo autoridad
  - con autoridad
  lexicon: BDAG
  rationale: «Uno que tiene autoridad» reproduce con claridad la construcción comparativa griega y conserva el énfasis personal de la frase. «Con autoridad» sería más idiomático, pero atenúa la estructura explícita del original.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - autoridad delegada
  lexicon: BDAG
  rationale: «Autoridad» es el equivalente directo y adecuado en español. Mantiene el matiz de derecho/competencia para enseñar, más que mera fuerza o capacidad.
- source_word: καὶ οὐχ ὡς οἱ γραμματεῖς αὐτῶν
  english_pob_choice: and not as their scribes
  chosen_spanish: y no como sus escribas
  alternatives_spanish:
  - y no como los escribas de ellos
  - y no como sus maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es la correspondencia más directa de γραμματεῖς y preserva el contraste del texto. «Sus» refleja αὐτῶν, que probablemente alude a los propios dirigentes religiosos reconocidos por la gente.
theological_decisions:
- issue: El alcance de la autoridad de Jesús al enseñar
  english_pob_reading: 'Render the statement descriptively as a comparison of teaching manner: ''as one having authority.'''
  chosen_spanish_reading: 'Traducir descriptivamente el modo de enseñar: «como uno que tiene autoridad».'
  alternative_spanish_readings:
  - con autoridad
  - como alguien con autoridad divina
  rationale: El versículo afirma una autoridad real, pero no explica aquí su fundamento teológico completo. La redacción española conserva esa afirmación sin añadir una explicación doctrinal que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera interpretativa.
translation_notes:
  revision_awareness: El registro en inglés ya fue revisado y quedó sin cambios sustanciales; la versión española sigue de cerca esa lectura estable, manteniendo la comparación explícita y la fuerza lexical de ἐξουσία sin resolverla doctrinalmente.
  spanish_consistency_notes:
  - Se mantiene «autoridad» para ἐξουσία, en armonía con el contexto sinóptico y con la decisión inglesa.
  - «Escribas» conserva el término técnico del contexto evangélico; no se sustituye por una paráfrasis más amplia.
  - La nota al pie ofrece la alternativa idiomática «con autoridad» sin desplazar la forma principal más cercana a la estructura griega.
