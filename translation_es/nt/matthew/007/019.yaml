translation:
  language: es
  text: Todo árbol que no produce buen fruto[a] es talado y arrojado al fuego[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que no da buen fruto».
    reason: lexical_alternative
  - marker: b
    text: El «fuego» es una imagen de juicio; el versículo no precisa si la referencia es temporal, escatológica o ambas.
    reason: cross_reference
lexical_decisions:
- source_word: πᾶν δένδρον
  english_pob_choice: Every tree
  chosen_spanish: Todo árbol
  alternatives_spanish:
  - Cada árbol
  - Todo tipo de árbol
  lexicon: BDAG
  rationale: 'πᾶν con el sustantivo singular δένδρον tiene valor distributivo: se refiere a cada árbol tomado individualmente. En español, «todo árbol» reproduce bien ese sentido proverbial y suena natural y solemne.'
- source_word: μὴ ποιοῦν
  english_pob_choice: not producing
  chosen_spanish: que no produce
  alternatives_spanish:
  - que no da
  - que no lleva
  - que no va produciendo
  lexicon: BDAG
  rationale: El participio presente modifica a «árbol» y expresa una acción o cualidad continua. «Que no produce» conserva el verbo ποιέω de manera directa y funciona con naturalidad en español.
- source_word: καρπὸν καλὸν
  english_pob_choice: good fruit
  chosen_spanish: buen fruto
  alternatives_spanish:
  - fruto bueno
  - fruto bueno y sano
  - fruto excelente
  lexicon: BDAG
  rationale: «Buen fruto» es la forma más natural en español y mantiene el valor evaluativo de καλός como fruto bueno, adecuado o aceptable. «Fruto bueno» sería menos idiomático.
- source_word: ἐκκόπτεται
  english_pob_choice: is cut down
  chosen_spanish: es cortado
  alternatives_spanish:
  - es talado
  - es cortado de raíz
  - es derribado
  lexicon: BDAG
  rationale: Para un árbol, ἐκκόπτεται se expresa con naturalidad como «es cortado». «Talado» también sería posible, pero «cortado» preserva mejor la sencillez proverbial del original y evita añadir una imagen técnica no explicitada.
- source_word: εἰς πῦρ βάλλεται
  english_pob_choice: is thrown into the fire
  chosen_spanish: arrojado al fuego
  alternatives_spanish:
  - echado al fuego
  - arrojado al fuego
  - lanzado al fuego
  lexicon: BDAG
  rationale: La construcción pasiva de βάλλεται indica ser lanzado/arrojado. En español, «arrojado al fuego» reproduce la imagen con fuerza y mantiene la metáfora de juicio sin precisar más de lo que el texto dice.
theological_decisions:
- issue: Imagen del fuego como juicio
  english_pob_reading: Retain the metaphor of being cut down and thrown into the fire without specifying the exact referent of the fire.
  chosen_spanish_reading: Mantener la imagen de ser cortado y arrojado al fuego sin precisar si el juicio es temporal, escatológico o ambos.
  alternative_spanish_readings:
  - juicio temporal
  - juicio escatológico
  - infierno
  rationale: El versículo comunica una advertencia de juicio mediante una metáfora agrícola, pero no define por sí mismo el alcance exacto del fuego. La traducción conserva la tensión teológica en vez de resolverla con una identificación más estrecha que el texto no exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Sin cambios respecto al sentido del texto griego y en continuidad con la auditoría inglesa: se conservan el valor distributivo de πᾶν δένδρον, el participio presente de μὴ ποιοῦν, la imagen proverbial del corte y el fuego como juicio sin especificación adicional.'
  spanish_consistency_notes:
  - Se prefirió «fuego» sin artículo para corresponder al griego εἰς πῦρ.
  - «Buen fruto» mantiene el lenguaje bíblico común sin perder el matiz evaluativo de καλός.
  - Se evitó «SEÑOR» o vocabulario no presente en el versículo.
  - La pasiva española conserva el sentido resultativo de los verbos pasivos griegos.
