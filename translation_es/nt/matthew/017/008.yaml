    rationale: Aunque es fiel al participio, en español bíblico natural «Al levantar los ojos» o «Cuando levantaron los ojos» fluye mejor y conserva la relación anterior de la acción.
  - severity: low
    issue: Preferible una conjunción exceptiva más directa en esta frase
    rationale: «Sino a Jesús solo» es válido, pero «excepto[a] a Jesús solo» facilita la lectura junto con la nota de alternativa y evita una cadencia algo dura.
