translation:
  language: es
  text: Y al levantar los ojos, no vieron a nadie excepto[a] a Jesús solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no vieron a nadie sino a Jesús solo». El griego usa tanto un pronombre enfático («él mismo») como «solo» para expresar una exclusividad fuerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπάραντες
  english_pob_choice: And lifting up
  chosen_spanish: Y alzando
  alternatives_spanish:
  - Y levantando
  - Y alzar los ojos
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción anterior a la principal. «Alzando» conserva esa secuencia participial en español natural y mantiene el movimiento concreto del gesto.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo suave. «Y» refleja mejor el avance de la escena sin añadir contraste que el griego no exige.
- source_word: τοὺς ὀφθαλμοὺς αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - la vista
  - la mirada
  lexicon: BDAG
  rationale: La expresión es corporal y concreta. En español, el posesivo puede quedar implícito por el sujeto verbal; el contexto deja claro que son sus propios ojos los que alzan.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - nadie
  - ninguna persona
  lexicon: BDAG
  rationale: Como objeto directo de «vieron», «a nadie» suena natural y conserva el valor absoluto del indefinido negativo.
- source_word: εἶδον
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - vieron allí
  - percibieron
  lexicon: BDAG
  rationale: El aoristo simple de ὁράω se expresa con el pretérito perfecto simple español. No requiere ampliación.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: Después de una negación, «sino» es la solución idiomática más clara en español y preserva la exclusividad de la construcción.
- source_word: αὐτὸν
  english_pob_choice: himself
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a él
  - a él mismo
  lexicon: BDAG
  rationale: Aunque el griego usa un pronombre enfático, en español repetir «a Jesús» comunica de forma natural la exclusividad del referente. «A él mismo» sonaría más forzado y puede oscurecer el antecedente en esta cláusula breve.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús de Nazaret
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: μόνον
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: «Solo» mantiene la fuerza exclusiva final de μόνον y deja oír la intensificación acumulada del griego sin sobrecargar la frase.
theological_decisions:
- issue: Énfasis de exclusividad en Jesús tras la visión
  english_pob_reading: Retain the double exclusivity with 'except Jesus alone'
  chosen_spanish_reading: Conservar la exclusividad con «sino a Jesús solo»
  alternative_spanish_readings:
  - excepto Jesús solo
  - sino Jesús solamente
  - sino a Jesús únicamente
  rationale: El griego concentra la exclusión con εἰ μὴ + pronombre enfático + μόνον. En español, «sino a Jesús solo» mantiene la unicidad de Jesús como único visible sin añadir interpretación doctrinal extra.
  doctrine_reference: Preservar la tensión del original y la fuerza narrativa de la escena, sin resolverla con fórmulas tradicionales ajenas al texto.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente eliminó ‘when’ y ‘himself’ para acercarse más al griego y retuvo ‘alone’ por μόνον. La versión española sigue esa misma dirección: omite una subordinación temporal explícita y no fuerza un pronombre reflexivo donde el español resulta más natural con la repetición del nombre propio.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio estándar.
  - Se evita introducir «Cristo» o «Señor», que no aparecen en este versículo.
  - «Sino» refleja mejor la exclusión μετά negación que «excepto» en español bíblico natural.
  - 'La frase conserva el foco visual del original: alzar los ojos, no ver a nadie, excepto a Jesús solo.'
