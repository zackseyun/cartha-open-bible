    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a los términos explicados. También se cambió «sea levantado» por «sea resucitado» para expresar con claridad el sentido de ἐγερθῇ en contexto de resurrección, manteniendo una construcción pasiva adecuada. La nota sobre ἐκ νεκρῶν se reformuló en español natural, preservando la alternativa entre la expresión más literal «de entre los muertos» en el texto y la forma más idiomática «de los muertos» en nota.
