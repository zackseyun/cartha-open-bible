translation:
  language: es
  text: 'Y mientras bajaban del monte, Jesús les ordenó, diciendo: «No digan a nadie la visión[a] hasta que el Hijo del Hombre sea resucitado de entre los muertos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que vieron». El griego dice «la visión».
    reason: lexical_alternative
  - marker: b
    text: O, de forma más idiomática, «de los muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβαινόντων αὐτῶν
  english_pob_choice: as they were coming down
  chosen_spanish: mientras bajaban
  alternatives_spanish:
  - cuando bajaban
  - mientras descendían
  lexicon: BDAG
  rationale: El participio con genitivo absoluto expresa acción contemporánea; en español, 'mientras bajaban' conserva ese sentido continuo de forma natural.
- source_word: ἐκ τοῦ ὄρους
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - desde el monte
  lexicon: BDAG
  rationale: '''Monte'' es una forma bíblica clara y natural en español para este contexto narrativo; mantiene la referencia al lugar ya mencionado.'
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: les ordenó
  alternatives_spanish:
  - les mandó
  - les dio una orden
  lexicon: BDAG
  rationale: El verbo expresa una instrucción con autoridad. 'Ordenó' comunica bien la fuerza directiva de Jesús sin endurecer innecesariamente el estilo.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Se conserva el valor participial de introducción al discurso con una forma natural en español.
- source_word: Μηδενὶ εἴπητε
  english_pob_choice: Tell ... to no one
  chosen_spanish: No digan a nadie
  alternatives_spanish:
  - No se lo digan a nadie
  - No cuenten esto a nadie
  lexicon: BDAG
  rationale: La prohibición con dativo e imperativo aoristo se expresa de manera idiomática en español como una orden negativa directa.
- source_word: τὸ ὅραμα
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - lo que vieron
  - la revelación
  lexicon: BDAG
  rationale: '''Visión'' refleja con precisión el término griego ὅραμα y preserva su matiz revelatorio. Se evita interpretarlo como mera percepción visual.'
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: BDAG
  rationale: La locución temporal se expresa de forma natural con 'hasta que', que comunica el límite de la prohibición.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo de Hombre
  lexicon: BDAG
  rationale: Se mantiene la forma tradicional y exacta del título cristológico, que conserva su resonancia bíblica y daniélica.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: '''De entre los muertos'' refleja mejor el valor idiomático del griego y preserva el matiz de salida del ámbito de los muertos.'
- source_word: ἐγερθῇ
  english_pob_choice: is raised
  chosen_spanish: sea levantado
  alternatives_spanish:
  - sea resucitado
  - sea alzado
  lexicon: BDAG
  rationale: El pasivo de ἐγείρω se mantiene con una forma pasiva en español. 'Sea levantado' conserva la voz pasiva y el aspecto verbal sin resolver explícitamente la agencia en el texto principal.
theological_decisions:
- issue: Voz pasiva de la resurrección
  english_pob_reading: is raised from the dead
  chosen_spanish_reading: sea levantado de entre los muertos
  alternative_spanish_readings:
  - sea resucitado de entre los muertos
  - sea levantado de los muertos
  rationale: La forma griega es pasiva, por lo que conviene conservar una construcción pasiva en español. 'Sea levantado' mantiene esa tensión y evita explicar más de lo que el texto dice, aunque sigue implicando resurrección en contexto.
  doctrine_reference: Preservar la tensión gramatical y teológica del pasivo sin eliminar la lectura de resurrección.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido del griego con un estilo natural en español y conserva las dos alternativas auditadas del inglés POB: la frase idiomática de resurrección y el valor de ὅραμα como ''visión''.'
  spanish_consistency_notes:
  - Se usa 'Hijo del Hombre' como título fijo, coherente con la práctica POB.
  - Se evita 'SEÑOR' como sustituto de Yahvé porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se mantiene un verbo pasivo en la cláusula de resurrección para respetar ἐγερθῇ.
  - '''Monte'' se prefiere a ''montaña'' por naturalidad bíblica en este contexto narrativo.'
