revisions:
- from: 'Y mientras bajaban del monte, Jesús les ordenó, diciendo: «No digan a nadie[a] la visión[b] hasta que el Hijo del Hombre sea levantado de entre los muertos».'
  to: 'Y mientras bajaban del monte, Jesús les ordenó, diciendo: «No digan a nadie la visión[a] hasta que el Hijo del Hombre sea resucitado de entre los muertos[b]».'
  rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a los términos explicados. También se cambió «sea levantado» por «sea resucitado» para expresar con claridad el sentido de ἐγερθῇ en contexto de resurrección, manteniendo una construcción pasiva adecuada. La nota sobre ἐκ νεκρῶν se reformuló en español natural, preservando la alternativa entre la expresión más literal «de entre los muertos» en el texto y la forma más idiomática «de los muertos» en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:17:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: acción contemporánea al descender del monte, mandato de Jesús, prohibición temporal, título «el Hijo del Hombre» y referencia a la resurrección. Sin embargo, las notas al pie están ancladas a las frases equivocadas: la nota [a] explica «de entre los muertos», pero en el texto actual está colocada en «a nadie»; y la nota [b] explica «la visión / lo que vieron», pero debería anclarse en «la visión», no al revés. Además, «sea levantado» es comprensible, pero en español bíblico general puede sonar ambiguo o incluso evocar exaltación física más que resurrección; «sea resucitado» comunica mejor el sentido contextual de ἐγερθῇ sin traicionar el marco de resurrección del versículo.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Mientras bajaban del monte» y «les ordenó, diciendo» son aceptables, aunque «diciendo» es algo rígido. La principal necesidad de corrección es técnica y de legibilidad: reubicar las notas al pie para que correspondan al término explicado, y mejorar la redacción de la nota de ἐκ νεκρῶν en español. También conviene ajustar «sea levantado» a «sea resucitado» para claridad idiomática en español eclesial moderno.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Jesús», «el Hijo del Hombre» y «la visión» están bien. No aparecen términos del glosario mayor como Yahvé/Mesías. La decisión sobre ἐγερθῇ merece ajuste no por glosario sino por fidelidad semántica y claridad en español: «sea resucitado» preserva el contexto de resurrección mejor que «sea levantado».'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a palabras equivocadas en el texto español.
    rationale: La nota [a] trata la alternativa de ἐκ νεκρῶν («de entre los muertos»), pero aparece tras «a nadie». La nota [b] trata τὸ ὅραμα («la visión» / «lo que vieron»), pero debe anclarse en «la visión». Esto incumple la disciplina requerida de anclaje exacto.
  - severity: medium
    issue: «Sea levantado» no es la mejor opción española para ἐγερθῇ en este contexto.
    rationale: Aunque intenta conservar el pasivo, en español «levantado» puede sonar ambiguo y menos claramente ligado a resurrección. Dado el contexto explícito «de entre los muertos», «sea resucitado» transmite mejor el sentido del original para lectores hispanos.
  - severity: low
    issue: La nota sobre ἐκ νεκρῶν usa «desde entre los muertos», formulación menos idiomática que «de entre los muertos».
    rationale: En español bíblico natural, la alternativa literal apropiada frente a «de los muertos» sería «de entre los muertos», no «desde entre los muertos».
  revised_spanish_text: 'Y mientras bajaban del monte, Jesús les ordenó, diciendo: «No digan a nadie la visión[a] hasta que el Hijo del Hombre sea resucitado de entre los muertos[b]».'
  revised_footnotes:
