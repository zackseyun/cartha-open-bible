translation:
  language: es
  text: 'Y Jesús se acercó[a] y los tocó, y dijo: «Levántense[b] y no tengan miedo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se aproximó»; el verbo griego puede significar «venir a» o «aproximarse».
    reason: lexical_alternative
  - marker: b
    text: O «Álcense»; el mandato se refiere a levantarse desde su postura caída.
    reason: lexical_alternative
  - marker: c
    text: O «no teman».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθεν
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino hacia ellos
  lexicon: BDAG
  rationale: προσέρχομαι expresa movimiento hacia alguien. «Se acercó» es natural en español y conserva la idea de acercamiento sin sobrecargar el matiz espacial.
- source_word: ἁψάμενος αὐτῶν
  english_pob_choice: touched them
  chosen_spanish: tocándolos
  alternatives_spanish:
  - y los tocó
  - después de tocarlos
  lexicon: BDAG
  rationale: El participio aoristo medio se vierte de modo participial para reflejar la secuencia de la acción en español. «Tocándolos» mantiene el contacto físico sin añadir que puso la mano sobre ellos, lo cual sería más específico que el griego.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - habló
  lexicon: BDAG
  rationale: λέγω se traduce con el verbo más directo y transparente en español. «Dijo» conserva la sencillez narrativa del texto.
- source_word: Ἐγέρθητε
  english_pob_choice: Get up
  chosen_spanish: Levántense
  alternatives_spanish:
  - Levántense de inmediato
  - Pónganse de pie
  lexicon: BDAG
  rationale: El imperativo de ἐγείρω aquí llama a levantarse desde una postura abatida o postrada. «Levántense» comunica bien la acción sin imponer demasiado la postura final, aunque «Pónganse de pie» sería una alternativa posible.
- source_word: μὴ φοβεῖσθε
  english_pob_choice: do not be afraid
  chosen_spanish: no tengan miedo
  alternatives_spanish:
  - no teman
  - no se asusten
  lexicon: BDAG
  rationale: φοβέομαι significa temer o estar asustado. «No tengan miedo» es una forma clara y natural en español; «no teman» es más formal y «no se asusten» enfatiza la reacción emocional.
theological_decisions:
- issue: Imperativo consolador de Jesús sin añadir matiz pastoral ajeno al griego
  english_pob_reading: Get up, and do not be afraid
  chosen_spanish_reading: Levántense y no tengan miedo
  alternative_spanish_readings:
  - Levántense y no teman
  - Pónganse de pie y no se asusten
  rationale: La frase conserva el gesto físico de Jesús —acercarse, tocar y hablar— y su exhortación inmediata. No se añade explicación ni énfasis pastoral más allá de la escena.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión, con acuerdo alto entre revisores. La redacción española sigue esa lectura estable y conserva las alternativas léxicas documentadas para προσῆλθεν, Ἐγέρθητε y μὴ φοβεῖσθε.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se traduce el movimiento con un verbo natural («se acercó») sin perder el valor de acercamiento de προσέρχομαι.
  - El participio ἁψάμενος se vierte en forma participial («tocándolos») para reflejar simultaneidad/secuencia narrativa.
  - Se evita «Cristo» y no hay términos de nombre divino en este versículo.
  - El mandato final se formula en español contemporáneo y reverente, sin arcaísmo innecesario.
