  to: 'Y Jesús se acercó[a] y los tocó, y dijo: «Levántense[b] y no tengan miedo[c]».'
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a προσῆλθεν, se reemplazó «tocándolos» por «y los tocó» para una narración más natural y alineada con la decisión inglesa, y se ajustó la nota [b] para evitar una alternativa que sobreespecifica la postura final. El resto del sentido y tono se mantienen fieles al griego y al audit trail inglés.
