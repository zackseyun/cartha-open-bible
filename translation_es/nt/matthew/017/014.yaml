translation:
  language: es
  text: Y cuando llegaron a la multitud, un hombre se le acercó[a], arrodillándose ante él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se acercó a él».
    reason: lexical_alternative
  - marker: b
    text: O «cayendo de rodillas ante él».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza este verso con la narración anterior. En español, «Y» conserva esa continuidad sin añadir matiz temporal extra.
- source_word: ἐλθόντων
  english_pob_choice: when they came
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - al llegar
  - después de llegar
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto expresa una llegada previa o concomitante al siguiente evento. «Cuando llegaron» transmite bien la relación temporal natural en español sin sobreexplicar.
- source_word: πρὸς τὸν ὄχλον
  english_pob_choice: to the crowd
  chosen_spanish: a la multitud
  alternatives_spanish:
  - hacia la multitud
  - a la gente reunida
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre». «Multitud» es fiel, natural y más digno en español bíblico que «crowd» literalizado como «gente».
- source_word: προσῆλθεν
  english_pob_choice: came up
  chosen_spanish: se le acercó
  alternatives_spanish:
  - se acercó
  - vino hacia él
  lexicon: BDAG
  rationale: El verbo προσέρχομαι indica aproximarse a alguien. En español, «se le acercó» mantiene el movimiento dirigido a la persona y suena natural en narrativa.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y se refiere a un individuo varón concreto. «Un hombre» preserva ese valor sin generalizarlo.
- source_word: γονυπετῶν
  english_pob_choice: kneeling before him
  chosen_spanish: arrodillándose ante él
  alternatives_spanish:
  - de rodillas ante él
  - cayendo de rodillas ante él
  lexicon: BDAG
  rationale: El participio presente describe la postura del hombre al acercarse. «Arrodillándose ante él» conserva la acción reverente de manera idiomática y clara en español.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre retoma a Jesús como objeto de la acción reverente. En la frase española queda expresado por «ante él»; no se necesita repetir un objeto directo independiente.
theological_decisions:
- issue: Valor reverencial de γονυπετῶν sin forzar adoración explícita
  english_pob_reading: kneeling before him
  chosen_spanish_reading: arrodillándose ante él
  alternative_spanish_readings:
  - postrándose ante él
  - adorándolo
  rationale: El griego describe una postura corporal de reverencia. «Arrodillándose ante él» preserva esa tensión sin convertirla automáticamente en acto de adoración, algo que el verso por sí solo no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se revisó la relación temporal del participio genitivo absoluto y la imagen corporal de γονυπετῶν. La redacción española sigue el audit trail inglés sin depender mecánicamente de él y no introduce cambios respecto del pasaje fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió «multitud» por coherencia con el valor de ὄχλος en español bíblico contemporáneo.
  - La puntuación y el registro buscan ser publicables en un texto bíblico moderno, sin arcaísmo innecesario.
