review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: secuencia temporal («Entonces»), acercamiento a Jesús, carácter privado, verbo de habla simple («dijeron») y pregunta causal sobre la incapacidad para expulsar. También preserva correctamente la nota sobre la posible referencia de αὐτό al muchacho en vez del demonio. Sin embargo, el texto principal usa «expulsarlo», que en español fuerza un masculino y debilita la decisión principal del POB inglés de reflejar «it» como referencia más natural al demonio. Además, la nota propuesta («O “lo”») no funciona como alternativa real en español, porque el texto ya dice «lo».'
  spanish_quality_summary: El español es claro y natural, y «en privado» suena bien. No obstante, «expulsarlo» introduce una precisión pronominal poco elegante para este caso. Una formulación más fiel y más natural en español es «expulsar eso» o, menos recomendable por estilo, «expulsarlo» con nota distinta; pero dado el objetivo auditado de distinguir la referencia principal al demonio y conservar alternativa, conviene rehacer la cláusula final para que la nota sea verdaderamente útil. También falta coherencia interna entre el texto y la decisión léxica de ἡμεῖς, pues el texto no incluye «nosotros» aunque la decisión lo menciona; eso no exige cambio, pero sí muestra que el borrador no está del todo afinado.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Jesús» y «discípulos» están bien. El punto clave es pronominal y exegético, no de glosario. Conviene alinear mejor la traducción de αὐτό con la rationale inglesa: referencia principal al demonio, sin cerrar del todo la alternativa.'
  issues:
  - severity: medium
    issue: «expulsarlo» fuerza un objeto masculino en el texto principal
    rationale: El inglés auditado eligió «it» para reflejar que αὐτό probablemente refiere al demonio. En español, «lo» puede ser ambiguo, pero en combinación con «expulsarlo» suena más naturalmente a referente masculino personal o animado, y no comunica tan bien la decisión principal.
  - severity: high
    issue: La nota al pie no aporta una alternativa distinta del texto principal
    rationale: La nota dice «O “lo”», pero el texto ya contiene «expulsarlo[a]». Eso hace que la nota sea circular e inválida como aparato explicativo.
  - severity: low
    issue: Desajuste menor entre decisiones léxicas y texto final respecto de ἡμεῖς
    rationale: Las decisiones dicen «nosotros», pero el texto solo dice «no pudimos». El griego sí tiene pronombre explícito, aunque en español puede omitirse naturalmente; no es un error sustantivo.
  revised_spanish_text: 'Entonces los discípulos se acercaron a Jesús en privado y dijeron: «¿Por qué no pudimos expulsar eso[a]?».'
  revised_footnotes:
  - marker: a
    text: O «expulsarlo», si se entiende el pronombre como referido al muchacho más que al demonio.
    reason: alternative_reading
  revision_rationale: Se revisa la expresión final para que el texto principal refleje mejor la decisión auditada de tomar αὐτό principalmente como referencia al demonio («it»), mientras la nota conserva la lectura alternativa referida al muchacho. Así, la nota deja de ser redundante y pasa a documentar una alternativa real en español.
