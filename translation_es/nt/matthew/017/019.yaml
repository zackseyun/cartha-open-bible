revisions:
- from: 'Entonces los discípulos se acercaron a Jesús en privado y dijeron: «¿Por qué no pudimos expulsarlo[a]?»'
  to: 'Entonces los discípulos se acercaron a Jesús en privado y dijeron: «¿Por qué no pudimos expulsar eso[a]?».'
  rationale: Se revisa la expresión final para que el texto principal refleje mejor la decisión auditada de tomar αὐτό principalmente como referencia al demonio («it»), mientras la nota conserva la lectura alternativa referida al muchacho. Así, la nota deja de ser redundante y pasa a documentar una alternativa real en español.
  reviewer_model: gpt-5.4
