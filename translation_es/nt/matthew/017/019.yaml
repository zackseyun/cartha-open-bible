translation:
  language: es
  text: 'Entonces los discípulos se acercaron a Jesús en privado y dijeron: «¿Por qué no pudimos expulsar eso[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expulsarlo», si se entiende el pronombre como referido al muchacho más que al demonio.
    reason: alternative_reading
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marcador temporal y discursivo que introduce la secuencia narrativa; «Entonces» mantiene la progresión natural en español y corresponde al valor secuencial del griego.
- source_word: προσελθόντες
  english_pob_choice: came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - se aproximaron
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι expresa movimiento hacia Jesús; «se acercaron» conserva ese matiz mejor que un simple «vinieron».
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: Término técnico y estable en los Evangelios para los seguidores de Jesús; «discípulos» es la equivalencia natural y fiel.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - ante Jesús
  lexicon: BDAG
  rationale: El dativo indica la persona a quien se acercan; en español, «a Jesús» expresa con naturalidad esa relación direccional.
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - aparte
  - a solas
  lexicon: BDAG
  rationale: Locución idiomática que significa un contexto no público; «en privado» es claro, moderno y fiel al sentido.
- source_word: εἶπον
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - preguntaron
  lexicon: BDAG
  rationale: Verbo genérico de decir; aunque el contenido es interrogativo, el griego usa «dijeron», no un verbo específico de preguntar.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A causa de qué
  - ¿Por qué razón
  lexicon: BDAG
  rationale: Interrogativo causal estándar; «¿Por qué» es la forma más natural y precisa en español.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis; «nosotros» conserva esa explicitud sin sobrerrecalcarla.
- source_word: οὐκ ἠδυνήθημεν
  english_pob_choice: were not able
  chosen_spanish: no pudimos
  alternatives_spanish:
  - no fuimos capaces
  - no tuvimos poder para
  lexicon: BDAG
  rationale: La forma de δύναμαι expresa incapacidad efectiva; «no pudimos» comunica de manera natural esa imposibilidad, sin perder el valor verbal.
- source_word: ἐκβαλεῖν
  english_pob_choice: to cast out
  chosen_spanish: expulsarlo
  alternatives_spanish:
  - echarlo fuera
  - sacarlo
  lexicon: BDAG
  rationale: En contexto de exorcismo, el verbo tiene el sentido de expulsar un espíritu/demonio; «expulsarlo» comunica bien ese acto en español. Se conserva la posibilidad de referir el objeto al demonio.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: El pronombre neutro se traduce aquí con objeto directo masculino singular en español, manteniendo la ambigüedad referencial entre el demonio y, en lectura alternativa, el muchacho.
theological_decisions:
- issue: Referente de αὐτό en el contexto del exorcismo
  english_pob_reading: The pronoun refers to the demon, rendered 'it.'
  chosen_spanish_reading: El pronombre se traduce de modo neutro en español como «lo», manteniendo abierta la referencia principal al demonio y la lectura alternativa al muchacho.
  alternative_spanish_readings:
  - «lo» referido al demonio
  - «lo» referido al muchacho
  - «él» si se entiende que el referente es el niño
  rationale: El contexto inmediato trata del fracaso para expulsar un espíritu inmundo; por eso la referencia principal es al demonio. Sin embargo, como en el audit trail inglés, conviene preservar la tensión interpretativa sin resolverla de manera definitiva.
  doctrine_reference: Preservar la ambigüedad documentada del referente pronominal en el relato.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego y el audit trail inglés. No se introdujeron cambios doctrinales ni paráfrasis adicionales; se mantuvo la ambigüedad del pronombre final con una nota breve en español.
  spanish_consistency_notes:
  - Se usó «Jesús» de acuerdo con la convención del proyecto para Ἰησοῦς.
  - Se prefirió «expulsarlo» para ἐκβαλεῖν por el contexto exorcístico y por correspondencia semántica con «cast out».
  - 'La estructura narrativa conserva el orden secuencial del original: tiempo, movimiento, habla, pregunta.'
  - La nota al pie usa un marcador único y corresponde exactamente al anclaje en el texto.
