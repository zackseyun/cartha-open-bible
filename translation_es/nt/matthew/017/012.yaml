  text: λέγω δὲ ὑμῖν ὅτι Ἠλίας ἤδη ἦλθεν, καὶ οὐκ ἐπέγνωσαν αὐτὸν ἀλλὰ ἐποίησαν ἐν αὐτῷ ὅσα ἠθέλησαν· οὕτως καὶ ὁ υἱὸς τοῦ ἀνθρώπου μέλλει πάσχειν ὑπ’ αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/017/012.yaml
  text: But I tell you that Elijah has already come[a], and they did not recognize him, but did to him whatever they wanted[c][b]. So also the Son of Man is about to suffer at their hands.
  footnotes:
  - marker: a
    text: Or 'they did not know him' or 'they did not acknowledge him.' The Greek can denote failure to recognize or identify him properly.
    reason: lexical_alternative
  - marker: b
    text: Or 'did against him whatever they wanted' or 'treated him however they wished.' The Greek expression is idiomatic and conveys unrestricted action toward him.
    reason: lexical_alternative
  - marker: c
    text: Or 'is going to suffer.' The Greek says the Son of Man is about to suffer, emphasizing what is impending.
    reason: lexical_alternative
