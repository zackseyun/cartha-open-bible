translation:
  language: es
  text: Pero les digo que Elías ya vino, y no lo reconocieron[a], sino que le hicieron lo que quisieron[b]. Así también el Hijo del Hombre está por sufrir[c] a manos de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo conocieron» o «no lo reconocieron como tal». El griego puede indicar falta de identificación o de reconocimiento adecuado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hicieron contra él lo que quisieron» o «lo trataron como quisieron». La expresión griega es idiomática y comunica acción sin restricción hacia él.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «va a sufrir». El griego dice que el Hijo del Hombre está por sufrir, subrayando la inminencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: But I tell you
  chosen_spanish: Pero les digo
  alternatives_spanish:
  - Pero yo les digo
  - Y les digo
  lexicon: BDAG
  rationale: λέγω con el dativo ὑμῖν introduce una afirmación directa; «les digo» suena natural en español y conserva la fuerza del discurso. δέ se vierte con «Pero» para marcar la transición discursiva.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías
  lexicon: BDAG
  rationale: Nombre propio bíblico en su forma usual en español.
- source_word: ἤδη ἦλθεν
  english_pob_choice: has already come
  chosen_spanish: ya vino
  alternatives_spanish:
  - ya ha venido
  - ya llegó
  lexicon: BDAG
  rationale: El aoristo con ἤδη expresa una venida ya cumplida; en español «ya vino» transmite bien ese hecho pasado con relevancia contextual sin sonar forzado.
- source_word: οὐκ ἐπέγνωσαν αὐτὸν
  english_pob_choice: they did not recognize him
  chosen_spanish: no lo reconocieron
  alternatives_spanish:
  - no lo conocieron
  - no lo identificaron
  - no lo admitieron
  lexicon: BDAG
  rationale: ἐπιγινώσκω aquí apunta a no identificar correctamente a la persona/función de Elías; «reconocieron» preserva esa fuerza mejor que un simple «conocieron».
- source_word: ἐποίησαν ἐν αὐτῷ ὅσα ἠθέλησαν
  english_pob_choice: did to him whatever they wanted
  chosen_spanish: le hicieron lo que quisieron
  alternatives_spanish:
  - hicieron contra él todo lo que quisieron
  - lo trataron como quisieron
  lexicon: BDAG
  rationale: La expresión es idiomática; en español «le hicieron lo que quisieron» comunica acción hostil y amplitud de abuso sin añadir elementos ajenos al texto.
- source_word: οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - Igualmente
  - Del mismo modo
  lexicon: BDAG
  rationale: Marca la analogía entre lo ocurrido con Elías y lo que ocurrirá con el Hijo del Hombre.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Expresión titulada establecida y reconocible en español, con resonancia daniélica mantenida.
- source_word: μέλλει πάσχειν
  english_pob_choice: is about to suffer
  chosen_spanish: está por sufrir
  alternatives_spanish:
  - va a sufrir
  - está a punto de sufrir
  lexicon: BDAG
  rationale: μέλλω + infinitivo señala sufrimiento inminente; «está por sufrir» conserva bien esa cercanía temporal sin exagerar el matiz de necesidad.
- source_word: ὑπ’ αὐτῶν
  english_pob_choice: at their hands
  chosen_spanish: a manos de ellos
  alternatives_spanish:
  - por ellos
  - de parte de ellos
  lexicon: BDAG
  rationale: ὑπό con genitivo indica agencia; «a manos de ellos» es idiomático en español y sugiere agencia hostil en contexto de sufrimiento.
theological_decisions:
- issue: Identificación de Elías
  english_pob_reading: The verse allows Jesus' statement to refer to John the Baptist as the Elijah-like forerunner without inserting that identification into the verse itself.
  chosen_spanish_reading: La traducción mantiene el nombre «Elías» y no introduce explícitamente a Juan el Bautista en el texto principal.
  alternative_spanish_readings:
  - «ya vino Juan el Bautista»
  - «vino en la persona de Juan el Bautista»
  rationale: El contexto inmediato de Mateo aclara la referencia, pero este versículo nombra a Elías. Conviene conservar esa tensión interpretativa sin resolverla en la traducción.
  doctrine_reference: Primacía del texto original y preservación de la tensión exegética.
- issue: Fuerza de μέλλει respecto al sufrimiento del Hijo del Hombre
  english_pob_reading: Rendered as impending future ('is about to suffer') rather than a stronger theological necessity formula.
  chosen_spanish_reading: 'Se expresa como futuro inminente: «está por sufrir».'
  alternative_spanish_readings:
  - «va a sufrir»
  - «está destinado a sufrir»
  rationale: El griego señala una acción venidera; la versión evita añadir una noción más fuerte de necesidad teológica que no está formulada explícitamente en esta cláusula.
  doctrine_reference: No importar al texto una afirmación doctrinal más fuerte que su redacción.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustanciales; la versión española conserva el sentido del texto griego y la auditoría inglesa, manteniendo las tensiones léxicas e interpretativas documentadas.
  spanish_consistency_notes:
  - Se usó «Elías» como nombre propio bíblico estándar en español.
  - Se prefirió «a manos de ellos» para reflejar la agencia hostil de ὑπό + genitivo en un registro natural.
  - Se mantuvo el título «el Hijo del Hombre» por su valor titular y bíblico.
  - Se evitó introducir a Juan el Bautista en el texto principal, preservando la identificación para el contexto inmediato.
  - La puntuación y el orden de cláusulas siguen una cadencia natural en español sin perder la relación causal/comparativa del griego.
