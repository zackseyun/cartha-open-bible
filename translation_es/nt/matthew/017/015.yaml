    reason: lexical_alternative
  revision_rationale: Se ajusta σεληνιάζεται a la decisión final auditada del POB ('is epileptic') y se traslada la nota al verdadero punto léxico sensible del versículo. También se fortalece κακῶς πάσχει con 'sufre terriblemente' y se mejora la fluidez con 'pues' para γάρ. No se requiere una revisión mayor ni adjudicación adicional.
