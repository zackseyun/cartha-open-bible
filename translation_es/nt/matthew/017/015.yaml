translation:
  language: es
  text: 'y diciendo: «Señor, ten misericordia de mi hijo, porque es epiléptico[a] y sufre terriblemente; pues muchas veces cae en el fuego y muchas veces en el agua».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «padece convulsiones»; literalmente, «está herido por la luna» o «lunático». El término griego refleja un modismo antiguo para una afección semejante a convulsiones o epilepsia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: El vocativo κύριε es un trato respetuoso dirigido a Jesús. En español, «Señor» conserva ese valor reverente y es el equivalente natural y eclesialmente claro; «Maestro» debilita el matiz de autoridad implícito en el contexto.
- source_word: ἐλέησόν
  english_pob_choice: have mercy on
  chosen_spanish: ten misericordia de
  alternatives_spanish:
  - muestra misericordia a
  - apiádate de
  lexicon: BDAG
  rationale: El imperativo de ἐλεάω expresa una súplica intensa por compasión activa. «Ten misericordia de» reproduce bien la fuerza de la petición y suena natural en español bíblico contemporáneo.
- source_word: μου τὸν υἱόν
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  - mi muchacho
  lexicon: BDAG
  rationale: υἱός significa específicamente «hijo». En español, «mi hijo» transmite con naturalidad la posesión y el vínculo filial; no hace falta especificar «varón» porque el sustantivo ya es inequívoco.
- source_word: σεληνιάζεται
  english_pob_choice: is epileptic / has seizures
  chosen_spanish: padece convulsiones
  alternatives_spanish:
  - es epiléptico
  - está lunático
  - tiene ataques
  lexicon: BDAG
  rationale: El verbo alude a una afección descrita en la antigüedad con lenguaje ligado a la luna y a episodios convulsivos. «Padece convulsiones» comunica la condición observable sin imponer un diagnóstico médico moderno como si fuera el término del texto, y preserva la tensión entre la descripción antigua y la comprensión contemporánea.
- source_word: κακῶς πάσχει
  english_pob_choice: suffers terribly
  chosen_spanish: sufre mucho
  alternatives_spanish:
  - sufre terriblemente
  - está gravemente afligido
  lexicon: BDAG
  rationale: κακῶς intensifica πάσχει. «Sufre mucho» es idiomático y claro en español; aunque es algo menos enfático que «terriblemente», conserva la idea de gran aflicción sin sonar artificial.
- source_word: πολλάκις
  english_pob_choice: often
  chosen_spanish: muchas veces
  alternatives_spanish:
  - a menudo
  - frecuentemente
  lexicon: BDAG
  rationale: El adverbio indica repetición habitual. «Muchas veces» mantiene la estructura repetitiva del griego y encaja bien con el paralelismo del versículo.
- source_word: πίπτει εἰς τὸ πῦρ
  english_pob_choice: falls into the fire
  chosen_spanish: cae en el fuego
  alternatives_spanish:
  - cae al fuego
  - cae dentro del fuego
  lexicon: BDAG
  rationale: La construcción πίπτει εἰς + acusativo se expresa naturalmente como «cae en». Se conserva «el fuego» con artículo, siguiendo la fuerza concreta del griego.
- source_word: εἰς τὸ ὕδωρ
  english_pob_choice: into the water
  chosen_spanish: en el agua
  alternatives_spanish:
  - al agua
  - dentro del agua
  lexicon: BDAG
  rationale: El paralelismo con «en el fuego» favorece la misma preposición en español. «En el agua» mantiene la correspondencia sintáctica y el ritmo de la frase.
- source_word: καὶ λέγων
  english_pob_choice: and saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - y al decir
  - y decía
  lexicon: BDAG
  rationale: El participio presente vincula la súplica con la escena narrativa anterior. «Y diciendo» conserva esa relación participial de forma sobria y fiel.
theological_decisions:
- issue: Cómo traducir σεληνιάζεται sin imponer una explicación médica moderna ni la antigua causalidad lunar
  english_pob_reading: The POB moved from 'has seizures' to 'is epileptic' in the audit trail, while noting the ancient idiom and preserving the interpretive tension.
  chosen_spanish_reading: «Padece convulsiones» describe el fenómeno observable sin fijarlo como diagnóstico técnico ni como simple metáfora.
  alternative_spanish_readings:
  - es epiléptico
  - está lunático
  - tiene ataques
  rationale: El texto presenta la petición del padre, no una clasificación clínica. En español conviene evitar tanto «epiléptico» como diagnóstico cerrado como «lunático» por su carga arcaica y confusa. «Padece convulsiones» mantiene la referencia a episodios convulsivos y deja abierta la cuestión interpretativa.
  doctrine_reference: Prioridad al sentido observable del relato; no añadir una explicación que el versículo no desarrolla.
- issue: Valor de κύριε como título reverente dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En este contexto de súplica y autoridad, «Señor» conserva mejor la reverencia y la relación de dependencia del suplicante. «Maestro» suena más pedagógico que implorante.
  doctrine_reference: Cristología del vocativo en relatos de petición a Jesús.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que el audit trail inglés ofrece dos soluciones para σεληνιάζεται: primero una descripción fenomenológica (''has seizures'') y luego la formulación más directa ''is epileptic''. La versión española evita ambos extremos como traducción final y opta por una formulación semánticamente cercana, publicable y menos anacrónica, manteniendo el resto de la oración muy próximo al griego.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en vocativo, conforme al criterio del proyecto.
  - Se mantiene «misericordia» para ἐλεέω/ἐλέησον.
  - Se conserva el paralelismo «en el fuego / en el agua» con una sintaxis española natural.
  - La nota a cubre el valor participial de λέγων sin introducir una paráfrasis extensa.
