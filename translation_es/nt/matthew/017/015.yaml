review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: súplica a Jesús, petición de misericordia, referencia al hijo, aflicción severa y repetición de caer en fuego y agua. Sin embargo, no sigue plenamente la huella auditada del POB en dos puntos relevantes: el inglés auditado terminó en ''is epileptic'' con nota léxica, mientras el español optó por ''padece convulsiones'' sin conservar una nota sobre el sentido literal/alternativo de σεληνιάζεται; además, la nota actual está anclada a ''y diciendo[a]'' pero no preserva la nota léxica que sí es la significativa en este versículo. También ''porque'' después del punto y coma suena menos natural que ''pues'', y ''sufre mucho'' puede fortalecerse para reflejar mejor κακῶς πάσχει.'
  spanish_quality_summary: El español es claro y legible, pero la nota actual prioriza una alternativa menor ('mientras decía') y deja sin nota la principal dificultad léxica del versículo. 'Y diciendo' es aceptable pero algo rígido; puede mantenerse por fidelidad formal. 'Sufre terriblemente' refleja mejor la intensidad. El conjunto necesita un ajuste menor para alinear mejor fidelidad, legibilidad y documentación.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''Señor'' para κύριε y ''misericordia'' para ἐλέησόν están bien. La decisión clave es σεληνιάζεται: el borrador se aparta de la revisión inglesa final y de su documentación léxica. Para mantener la razón documentada y evitar ambigüedad en español, conviene usar ''es epiléptico[a]'' con nota que preserve ''literalmente, “está herido por la luna”/“lunático”'' y explique el modismo antiguo; esto sigue mejor la auditoría POB.'
  issues:
  - severity: medium
    issue: La nota al pie está puesta en 'y diciendo' en vez de la dificultad léxica principal σεληνιάζεται.
    rationale: La huella inglesa conserva una nota sobre el término de aflicción ('is epileptic' / literalmente 'moonstruck'). Esa es la decisión significativa del versículo; la alternativa participial es secundaria y no necesita nota obligatoria.
  - severity: medium
    issue: '''Padece convulsiones'' no sigue la revisión inglesa final auditada.'
    rationale: Aunque semánticamente defendible, el registro auditado cambió de 'has seizures' a 'is epileptic'. El español debe reflejar esa decisión o justificar una excepción fuerte; aquí no parece necesaria tal excepción.
  - severity: low
    issue: '''Sufre mucho'' atenúa ligeramente κακῶς πάσχει.'
    rationale: El griego intensifica el padecimiento. 'Sufre terriblemente' o 'sufre gravemente' conserva mejor la fuerza.
  - severity: low
    issue: La repetición de 'porque' tras punto y coma es menos natural en español.
    rationale: '''Pues'' mantiene el valor explicativo de γάρ de manera más fluida en español escrito.'
  revised_spanish_text: 'y diciendo: «Señor, ten misericordia de mi hijo, porque es epiléptico[a] y sufre terriblemente; pues muchas veces cae en el fuego y muchas veces en el agua».'
