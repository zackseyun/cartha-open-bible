base_translation:
  language: en
  yaml_path: translation/nt/matthew/017/005.yaml
  text: While he was still speaking[a], behold, a bright cloud overshadowed them, and behold, a voice from the cloud said, “This is my beloved Son, with whom I am well pleased[c][b]; listen to him.”
  footnotes:
  - marker: a
    text: Or 'hear him.' The Greek imperative can denote hearing with the sense of heeding.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'behold' renders Greek ἰδού, an attention-directing marker that heightens the dramatic scene.
    reason: lexical_alternative
  - marker: c
    text: '''Overshadowed'' may echo biblical theophany language associated with God''s manifest presence.'
    reason: cross_reference
