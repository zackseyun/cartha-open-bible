translation:
  language: es
  text: 'Mientras él aún hablaba, he aquí[a], una nube brillante los cubrió con su sombra[c], y he aquí, una voz desde la nube dijo: «Este es mi Hijo amado, en quien me he complacido; escúchenlo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «He aquí» conserva el marcador de atención del griego ἰδού, que intensifica la escena narrativa.
    reason: lexical_alternative
  - marker: b
    text: O «óiganlo». El imperativo griego puede denotar oír con el sentido de prestar atención y obedecer.
    reason: lexical_alternative
  - marker: c
    text: «Los cubrió con su sombra» puede evocar el lenguaje bíblico de la teofanía asociado con la presencia manifiesta de Dios.
    reason: cross_reference
lexical_decisions:
- source_word: ἔτι αὐτοῦ λαλοῦντος
  english_pob_choice: While he was still speaking
  chosen_spanish: Mientras él aún hablaba[a]
  alternatives_spanish:
  - Mientras todavía hablaba
  - Cuando todavía estaba hablando
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción simultánea interrumpida; «Mientras él aún hablaba» conserva la simultaneidad y el valor de ἔτι («aún/todavía») con español natural.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  lexicon: BDAG
  rationale: Se mantiene el marcador de atención con una forma tradicional y comprensible en español bíblico; reproduce el efecto enfático de ἰδού sin eliminarlo.
- source_word: νεφέλη φωτεινὴ
  english_pob_choice: a bright cloud
  chosen_spanish: una nube brillante
  alternatives_spanish:
  - una nube resplandeciente
  - una nube radiante
  lexicon: BDAG
  rationale: «Brillante» comunica φωτεινή de manera directa y natural; evita sobreinterpretar el símbolo, pero mantiene la imagen visual fuerte.
- source_word: ἐπεσκίασεν
  english_pob_choice: overshadowed
  chosen_spanish: los cubrió[c]
  alternatives_spanish:
  - los cubrió con su sombra
  - los envolvió
  lexicon: BDAG
  rationale: El verbo puede expresar cubrir/con sombra; en español, «los cubrió» es claro y no fuerza una imagen más técnica. La nota conserva la posible resonancia teofánica que el inglés POB señaló.
- source_word: φωνὴ ἐκ τῆς νεφέλης λέγουσα
  english_pob_choice: a voice from the cloud said
  chosen_spanish: una voz desde la nube decía
  alternatives_spanish:
  - una voz desde la nube dijo
  - una voz proveniente de la nube decía
  lexicon: BDAG
  rationale: «Desde la nube» expresa ἐκ τῆς νεφέλης con naturalidad. El participio λέγουσα se vierte con «decía» para conservar la continuidad discursiva, como en el griego.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este mismo es
  - Este es el
  lexicon: BDAG
  rationale: La identificación demostrativa directa se mantiene con «Este es», plenamente idiomática y fiel.
- source_word: ὁ υἱός μου ὁ ἀγαπητός
  english_pob_choice: my beloved Son
  chosen_spanish: mi Hijo amado
  alternatives_spanish:
  - mi Hijo querido
  - mi Hijo amado y predilecto
  lexicon: BDAG
  rationale: «Hijo» conserva la relación filial y «amado» refleja ἀγαπητός con un registro natural en español bíblico. Se evita «predilecto» para no añadir matices no explícitos.
- source_word: ἐν ᾧ εὐδόκησα
  english_pob_choice: with whom I am well pleased
  chosen_spanish: en quien me he complacido
  alternatives_spanish:
  - en quien estoy complacido
  - en quien hallé complacencia
  lexicon: BDAG
  rationale: Se conserva la preposición ἐν con «en quien» para no perder la construcción del griego. «Me he complacido» expresa εὐδόκησα como declaración divina de aprobación/agrado sin sobreparafrasear.
- source_word: ἀκούετε αὐτοῦ
  english_pob_choice: listen to him
  chosen_spanish: escúchenlo
  alternatives_spanish:
  - óiganlo
  - pónganle atención
  lexicon: BDAG
  rationale: El imperativo griego implica oír con atención y obediencia; «escúchenlo» transmite esa fuerza mejor que un mero oír auditivo. La forma enclítica del objeto es natural en español.
theological_decisions:
- issue: Identidad filial y afectiva de Jesús en la voz celestial
  english_pob_reading: This is my beloved Son, with whom I am well pleased
  chosen_spanish_reading: Este es mi Hijo amado, en quien me he complacido
  alternative_spanish_readings:
  - Este es mi Hijo amado, con quien estoy complacido
  - Este es mi Hijo, el Amado, en quien me he complacido
  rationale: La redacción conserva la declaración directa del Padre sobre Jesús como Hijo y el lenguaje de aprobación divina, sin introducir formulaciones doctrinales ajenas al texto. La opción elegida equilibra fidelidad y naturalidad en español.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Fuerza del mandato final
  english_pob_reading: listen to him
  chosen_spanish_reading: escúchenlo
  alternative_spanish_readings:
  - óiganlo
  - escuchen lo que él dice
  rationale: El imperativo no señala solo percepción auditiva, sino recepción atenta y obediente. «Escúchenlo» conserva esa fuerza exhortativa sin convertirla en paráfrasis explícita de obediencia.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Resonancia teofánica de la nube que cubre
  english_pob_reading: Overshadowed may echo biblical theophany language associated with God's manifest presence.
  chosen_spanish_reading: los cubrió[c]
  alternative_spanish_readings:
  - los cubrió con su sombra
  - los envolvió
  rationale: La opción principal es sobria y comunicativa; la nota mantiene abierta la posible resonancia teofánica, sin imponerla en el cuerpo principal del verso.
  doctrine_reference: Cross-reference / theophany language
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y toma como contexto el audit trail inglés de la POB. Se conservaron las dos llamadas de atención de ἰδοὺ, la construcción simultánea de ἔτι αὐτοῦ λαλοῦντος, y la fuerza exhortativa de ἀκούετε αὐτοῦ. No hubo revisiones previas aplicadas en el paquete inglés; por ello, el español se formula directamente a partir del acuerdo alto documentado.
  spanish_consistency_notes:
  - Se usa «Hijo amado» para reflejar ὁ ἀγαπητός con un giro natural y reverente en español.
  - Se mantiene «Yahvé» solo cuando corresponda; este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - «He aquí» se conserva de forma consistente para ἰδού, siguiendo la función de marcadores de atención del original.
  - «Escúchenlo» preserva la exhortación del imperativo plural presente sin añadir un mandato doctrinal más fuerte que el griego.
  - La nota c se vincula al verbo «cubrió» porque el español no conserva por sí solo la posible imagen teofánica que el audit trail inglés destacó.
