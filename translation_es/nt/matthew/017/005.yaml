  rationale: Se reubicaron las notas para que correspondan a las palabras correctas, se corrigió la errata en la nota del imperativo, se fortaleció ἐπεσκίασεν con «los cubrió con su sombra» para reflejar mejor el griego y la nota teofánica del POB, y se cambió «decía» por «dijo» para mayor naturalidad narrativa en español sin perder fidelidad.
