base_translation:
  language: en
  yaml_path: translation/nt/matthew/017/026.yaml
  text: When he said[a], “From strangers,” Jesus said to him[c][b], “Then the sons are free.”
  footnotes:
  - marker: a
    text: Or “From foreigners” or “From others.” The Greek contrasts those outside the ruler’s household with his own sons.
    reason: lexical_alternative
  - marker: b
    text: Or “the sons are exempt.” The Greek more literally says “the sons are free,” which in context implies exemption from the tax.
    reason: lexical_alternative
  - marker: c
    text: Or “the children,” though the Greek specifically says “sons.”
    reason: lexical_alternative
