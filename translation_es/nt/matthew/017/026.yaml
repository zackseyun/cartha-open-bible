translation:
  language: es
  text: 'Cuando dijo[a], «De los extraños», Jesús le dijo[b]: «Así que los hijos[c] están libres[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «De los extranjeros» o «De los otros». El griego contrasta a los que están fuera del ámbito del gobernante con sus propios hijos.
    reason: lexical_alternative
  - marker: b
    text: O «Jesús le habló». Aquí se conserva la forma narrativa simple de «dijo».
    reason: lexical_alternative
  - marker: c
    text: O «los hijos varones», aunque en español «los hijos» es una forma natural de expresar la filiación; el griego dice específicamente «hijos» y no «niños».
    reason: lexical_alternative
  - marker: d
    text: O «están exentos». El griego dice más literalmente «están libres», lo que en el contexto implica exención del impuesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰπόντος δέ
  english_pob_choice: When he said
  chosen_spanish: Cuando dijo
  alternatives_spanish:
  - Después de que dijo
  - Y cuando dijo
  lexicon: BDAG
  rationale: El participio genitivo con δέ expresa un enlace temporal y de transición. «Cuando dijo» conserva ese valor de manera natural en español sin sobrerrepresentar la conexión.
- source_word: ἀπὸ τῶν ἀλλοτρίων
  english_pob_choice: From strangers
  chosen_spanish: De los extraños
  alternatives_spanish:
  - De los extranjeros
  - De los otros
  lexicon: BDAG
  rationale: «ἀλλότριος» aquí contrasta a los que no pertenecen al ámbito propio con los hijos del gobernante. «Extraños» mantiene ese contraste relacional mejor que «extranjeros», que podría desplazar el sentido hacia nacionalidad.
- source_word: ἔφη αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: Jesus said to him
  chosen_spanish: Jesús le dijo
  alternatives_spanish:
  - Jesús le respondió
  - Jesús le habló
  lexicon: BDAG
  rationale: La fórmula narrativa de φημί se vierte de forma directa y sobria. «Le dijo» es la opción más natural y cercana al griego.
- source_word: Ἄρα γε
  english_pob_choice: Then
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión a partir de la respuesta anterior. «Así que» expresa bien ese paso lógico en español sin sonar excesivamente técnico.
- source_word: ἐλεύθεροί
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - exentos
  lexicon: BDAG
  rationale: «Libres» conserva el valor básico del adjetivo y permite que el contexto de la exención del impuesto quede implícito, como en el audit trail inglés. «Exentos» restringiría demasiado el alcance semántico.
- source_word: οἱ υἱοί
  english_pob_choice: the sons
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos varones
  - los hijos/los niños
  lexicon: BDAG
  rationale: El griego es masculino plural, pero en español «hijos» puede mantener la referencia filial sin forzar una formulación poco idiomática. Aquí se conserva la relación de pertenencia al hogar real. Se evita neutralizar con «niños» o ampliar con términos menos precisos.
theological_decisions:
- issue: Si traducir υἱοί de forma estrictamente masculina o con neutralización inclusiva
  english_pob_reading: the sons
  chosen_spanish_reading: los hijos
  alternative_spanish_readings:
  - los hijos varones
  - los niños
  rationale: El texto griego usa un masculino plural y la comparación es la de los hijos del rey frente a los de fuera. En español, «hijos» preserva la filiación y la inteligibilidad natural, sin borrar la marca masculina del plural griego en el contexto familiar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: No hay revisiones aplicadas en la fuente auditada; el pasaje recibió consenso alto y quedó sin cambios en el último repaso.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar POB.
  - Se usa «libres» para ἐλεύθεροί, conservando la posibilidad contextual de exención sin reducir el sentido.
  - «Extraños» se eligió como equivalente relacional de ἀλλότριοι, no como etiqueta étnica.
  - La puntuación y el orden reflejan una lectura natural en español sin añadir contenido interpretativo.
