review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: respuesta de Pedro, deducción de Jesús, y contraste entre los de fuera y los hijos. Sin embargo, introduce una nota incorrecta en «Jesús le dijo» al ofrecer «Jesús le preguntó», alternativa no apoyada por el griego ni por el audit trail inglés. Además, dado que el inglés preserva la distinción específica de «sons», conviene explicitarla en español con una nota en «hijos».'
  spanish_quality_summary: 'El español es claro y natural. «Cuando dijo» y «De los extraños» funcionan bien; «Así que» es aceptable, aunque «Entonces» sonaría un poco más ceñido al inferencial breve. La frase principal es legible y digna. La reparación necesaria es pequeña: corregir la nota b y añadir una nota para «hijos» que preserve la alternativa «hijos varones»/«niños» no es ideal; mejor «hijos» con nota que indique «O “los hijos varones”, aunque en español “hijos” es natural».'
  glossary_alignment: No hay conflictos con términos de proyecto como Yahvé, Mesías, Espíritu, etc. La decisión «los hijos» para οἱ υἱοί es defendible en español, pero debe documentarse mejor porque el audit trail inglés subraya la especificidad de «sons» frente a «children».
  issues:
  - severity: high
    issue: La nota [b] ofrece «Jesús le preguntó» como alternativa a «Jesús le dijo».
    rationale: El griego ἔφη αὐτῷ significa «dijo a él / le dijo», no «le preguntó». Esa alternativa distorsiona el sentido y contradice el audit trail inglés.
  - severity: medium
    issue: Falta una nota en «hijos» que preserve la especificidad de οἱ υἱοί.
    rationale: El inglés documenta explícitamente «the sons» frente a «the children». En español «los hijos» es natural, pero sin nota puede perderse la razón lexical y teológica registrada.
  - severity: low
    issue: La puntuación con dos puntos tras «dijo[a]» suena un poco rígida.
    rationale: No es incorrecta, pero una coma antes de la cita encaja mejor en español narrativo moderno en este contexto.
  revised_spanish_text: 'Cuando dijo[a], «De los extraños», Jesús le dijo[b]: «Así que los hijos[c] están libres[d]».'
