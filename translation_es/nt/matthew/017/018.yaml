- from: Y Jesús lo reprendió[a], y el demonio salió de él; y el muchacho fue sanado desde aquella hora.
  to: Y Jesús reprendió al demonio, y el demonio salió de él; y el muchacho fue sanado[a] desde aquella hora.
  rationale: Se reemplaza «lo reprendió» por «reprendió al demonio» para preservar con mayor claridad el referente contextual de αὐτῷ y evitar una ambigüedad pronominal innecesaria en español. Se mantiene «desde aquella hora» por fidelidad al griego y se conserva la alternativa idiomática en nota al pie, con redacción editorial normalizada.
