translation:
  language: es
  text: Y Jesús reprendió al demonio, y el demonio salió de él; y el muchacho fue sanado[a] desde aquella hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “desde aquel momento”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprendió severamente
  - reprendió con autoridad
  - lo amonestó
  lexicon: BDAG
  rationale: ἐπιτιμάω expresa una reprensión o censura con autoridad. En español, «reprendió» comunica bien esa fuerza sin volver la frase más pesada que el griego ni reducirla a un simple «mandó».
- source_word: αὐτῷ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: El contexto inmediato indica que Jesús reprende al demonio, no al muchacho. En español, el clítico acusativo «lo» refleja mejor ese referente implícito y evita la ambigüedad de «le».
- source_word: δαιμόνιον
  english_pob_choice: demon
  chosen_spanish: demonio
  alternatives_spanish:
  - espíritu demoníaco
  - espíritu inmundo
  lexicon: BDAG
  rationale: «Demonio» es el equivalente directo y más natural para δαιμόνιον. «Espíritu inmundo» introduciría una formulación no presente en este versículo.
- source_word: ἐξῆλθεν ἀπ’ αὐτοῦ
  english_pob_choice: came out of him
  chosen_spanish: salió de él
  alternatives_spanish:
  - salió de dentro de él
  - se fue de él
  lexicon: BDAG
  rationale: La construcción de exorcismo queda bien expresada con «salió de él», que es fiel al griego y natural en español.
- source_word: ἐθεραπεύθη
  english_pob_choice: was healed
  chosen_spanish: fue sanado
  alternatives_spanish:
  - fue curado
  - quedó sano
  lexicon: BDAG
  rationale: θεραπεύω en pasivo indica sanidad o curación. «Fue sanado» conserva el sentido amplio y suena bien en español bíblico contemporáneo.
- source_word: ὁ παῖς
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el hijo
  lexicon: BDAG
  rationale: παῖς puede significar niño, muchacho o siervo según el contexto. Aquí la narrativa favorece a un hijo joven; «muchacho» evita estrecharlo demasiado a «niño» y suena natural en español.
- source_word: ἀπὸ τῆς ὥρας ἐκείνης
  english_pob_choice: from that hour
  chosen_spanish: desde aquella hora
  alternatives_spanish:
  - desde ese momento
  - a partir de aquella hora
  lexicon: BDAG
  rationale: La opción «desde aquella hora» sigue de cerca la expresión griega y preserva la referencia temporal sin forzar una paráfrasis.
theological_decisions:
- issue: Referente de αὐτῷ en la reprensión de Jesús
  english_pob_reading: Jesus rebuked the demon, expressed in English as 'it' in the latest revision
  chosen_spanish_reading: Jesús lo reprendió, entendiendo que el pronombre se refiere al demonio
  alternative_spanish_readings:
  - Jesús reprendió al muchacho
  - Jesús lo reprendió, dejando el referente indeterminado
  rationale: El verbo siguiente, «salió de él», muestra que la reprensión recae sobre el demonio. La traducción española puede hacer explícito ese referente con «lo» sin añadir contenido ajeno al texto.
  doctrine_reference: Mantener el flujo narrativo del exorcismo y la referencia contextual del pronombre sin resolver artificialmente una ambigüedad inexistente para el contexto inmediato.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió el referente de la reprensión de «him» a «it» para reflejar que Jesús reprende al demonio. La versión española sigue esa adjudicación contextual con «lo reprendió» y conserva el resto de la secuencia de forma cercana y natural.
  spanish_consistency_notes:
  - Se usa «Jesús» en lugar de una sustitución reverencial para el nombre propio.
  - Se mantiene «demonio» para δαιμόνιον, sin introducir «espíritu inmundo» en el cuerpo principal.
  - «Sanado» se emplea para θεραπεύω en pasivo, de acuerdo con el sentido de curación/restauración del versículo.
  - «Muchacho» traduce παῖς en un contexto narrativo de un joven, evitando tanto «siervo» como un estrechamiento innecesario a «niño».
