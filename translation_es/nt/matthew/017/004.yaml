translation:
  language: es
  text: 'Entonces Pedro respondió y dijo a Jesús: «Señor, es bueno para nosotros estar aquí. Si quieres, haré aquí tres tiendas[a]: una para ti, una para Moisés y una para Elías».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tabernáculos», «cabañas» o «refugios» para el griego skēnas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  lexicon: BDAG
  rationale: El participio aoristo funciona como fórmula narrativa de respuesta. En español, «respondió» conserva el giro idiomático sin añadir intensidad que no está en el griego.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo. «Entonces» reproduce bien esa transición en español natural.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: Verbo estándar para introducir habla directa; «dijo» es el equivalente normal y fiel.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el tratamiento reverente dirigido a Jesús. «Señor» sigue la decisión doctrinal del POB para κύριος y mantiene su posible peso cristológico.
- source_word: καλόν ἐστιν ἡμᾶς ὧδε εἶναι
  english_pob_choice: it is good for us to be here
  chosen_spanish: es bueno para nosotros estar aquí
  alternatives_spanish:
  - es bueno que estemos aquí
  - es bueno para nosotros estar en este lugar
  lexicon: BDAG
  rationale: La construcción infinitiva se vierte con naturalidad en español sin expandir el sentido. «Estar aquí» preserva la sencillez del griego.
- source_word: εἰ θέλεις
  english_pob_choice: If you wish
  chosen_spanish: Si quieres
  alternatives_spanish:
  - Si deseas
  - Si estás dispuesto
  lexicon: BDAG
  rationale: «Quieres» expresa la voluntad de forma directa y natural. En español, la cortesía del contexto la aporta el tratamiento «Señor».
- source_word: ποιήσω
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - construiré
  - levantaré
  - poneré
  lexicon: BDAG
  rationale: El futuro de προσφέρει una oferta. «Haré» es amplio y no presupone más de lo que el verbo implica; permite estructuras temporales.
- source_word: σκηνάς
  english_pob_choice: shelters
  chosen_spanish: refugios
  alternatives_spanish:
  - tiendas
  - cabañas
  - tabernáculos
  lexicon: BDAG
  rationale: σκηνή designa estructuras temporales tipo tienda/refugio. «Refugios» es comprensible y neutral en español, evitando el término eclesiástico «tabernáculos» en el texto principal; se preservan alternativas por la posible resonancia festiva o intertextual.
- source_word: σοὶ μίαν καὶ Μωϋσεῖ μίαν καὶ Ἠλίᾳ μίαν
  english_pob_choice: one for you, one for Moses, and one for Elijah
  chosen_spanish: uno para ti, uno para Moisés y uno para Elías
  alternatives_spanish:
  - uno para ti y uno para Moisés y uno para Elías
  lexicon: BDAG
  rationale: Se conserva la repetición distributiva de μίαν con «uno» para cada destinatario, manteniendo el énfasis del original.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: Las dos ocurrencias se traducen de forma consistente con «aquí», reflejando la repetición del griego en español natural.
theological_decisions:
- issue: Tratamiento de κύριος al dirigirse a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: El POB documenta «Lord» como traducción por defecto de κύριος. En español, «Señor» conserva el rango semántico y la posible densidad cristológica sin reducirlo a mera cortesía.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering of σκηνάς in the transfiguration context
  english_pob_reading: shelters
  chosen_spanish_reading: refugios
  alternative_spanish_readings:
  - tiendas
  - cabañas
  - tabernáculos
  rationale: El texto no explicita una alusión a la Fiesta de los Tabernáculos. Por eso el texto principal usa una opción neutral, mientras se conservan alternativas que podrían reflejar asociaciones posibles sin resolverlas prematuramente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje griego SBLGNT y concuerda con el análisis auditado en inglés: mantiene la fórmula narrativa de respuesta, el tratamiento reverente a Jesús, la oferta futura de Pedro y la ambigüedad semántica de σκηνάς sin forzar una lectura festiva. No se registran revisiones posteriores que cambien la decisión de traducción.'
  spanish_consistency_notes:
  - Se mantiene una dicción moderna y eclesialmente readable, sin arcaísmos innecesarios.
  - «Señor» se usa consistentemente para κύριος en el diálogo directo con Jesús.
  - Las repeticiones de «aquí» y «uno» reflejan las repeticiones del griego.
  - La nota al pie preserva las alternativas léxicas sin introducirlas en el cuerpo principal.
