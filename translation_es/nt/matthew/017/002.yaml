translation:
  language: es
  text: Y fue transfigurado[a] delante de ellos, y su rostro resplandeció como el sol, y su ropa se volvió blanca como la luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “fue transformado”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετεμορφώθη
  english_pob_choice: was transfigured
  chosen_spanish: fue transfigurado
  alternatives_spanish:
  - fue transformado
  lexicon: BDAG
  rationale: La forma pasiva aorista de μεταμορφόομαι indica una transformación visible. «Transfigurado» conserva en español la imagen tradicional y el matiz de cambio visible en gloria, mientras que «transformado» es más general y menos preciso en este contexto.
- source_word: ἔμπροσθεν αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en su presencia
  lexicon: BDAG
  rationale: La expresión es espacial y directa. «Delante de ellos» comunica con naturalidad que el acontecimiento ocurrió frente a sus ojos, sin cargar el giro con un registro demasiado elevado.
- source_word: ἔλαμψεν
  english_pob_choice: shone
  chosen_spanish: resplandeció
  alternatives_spanish:
  - brilló
  - fulguró
  lexicon: BDAG
  rationale: El aoristo de λάμπω señala emitir brillo o luz. «Resplandeció» mantiene la idea de un brillo intenso y resulta más expresivo en español que el simple «brilló», sin agregar una intensidad no sustentada por el contexto.
- source_word: πρόσωπον
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - semblante
  lexicon: BDAG
  rationale: Aquí πρόσωπον se refiere al rostro físico de Jesús. «Rostro» es claro y digno en español; «semblante» sería posible pero introduce un matiz más interpretativo, y «cara» es demasiado coloquial.
- source_word: ὡς ὁ ἥλιος
  english_pob_choice: like the sun
  chosen_spanish: como el sol
  alternatives_spanish:
  - igual que el sol
  lexicon: BDAG
  rationale: ὡς introduce comparación. «Como el sol» reproduce la imagen con naturalidad y sin desplazarla a una formulación menos directa.
- source_word: ἱμάτια
  english_pob_choice: clothes
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropa
  - prendas
  lexicon: BDAG
  rationale: ἱμάτια puede referirse de modo general a la ropa o a las prendas exteriores. En este contexto, «vestidos» conserva un registro bíblico adecuado y sigue siendo inteligible en español contemporáneo.
- source_word: ἐγένετο λευκὰ
  english_pob_choice: became white
  chosen_spanish: se volvieron blancos
  alternatives_spanish:
  - se hicieron blancos
  - quedaron blancos
  lexicon: BDAG
  rationale: La construcción expresa cambio de estado. «Se volvieron blancos» conserva ese cambio sin añadir brillo o intensidad que el griego no explicita por sí mismo.
- source_word: ὡς τὸ φῶς
  english_pob_choice: as the light
  chosen_spanish: como la luz
  alternatives_spanish:
  - como la luz misma
  - como luz
  lexicon: BDAG
  rationale: El artículo con φῶς se refleja naturalmente con «la luz». «Como la luz» mantiene la comparación y evita convertir el sintagma en un adjetivo genérico como «luminosos».
theological_decisions:
- issue: Naturaleza del cambio en la transfiguración
  english_pob_reading: was transfigured
  chosen_spanish_reading: fue transfigurado
  alternative_spanish_readings:
  - fue transformado
  rationale: La lectura de POB destaca una manifestación visible de gloria, no un cambio interno o moral. «Transfigurado» comunica bien esa manifestación y preserva la tensión lexical entre una transformación real y su apariencia gloriosa.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión del audio inglés cambió «like the light» por «as the light» para reflejar con más naturalidad ὡς τὸ φῶς; por eso se optó por «como la luz» en español, que ya expresa esa comparación de modo formal y natural. También se mantuvo la decisión central de «transfigurado» frente a «transformado», coherente con el audit trail.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico pero claro, evitando calcos duros.
  - «Luz» se eligió para φῶς, no «brillo», porque el texto compara directamente con la luz.
  - «Vestidos» funciona aquí como equivalente natural de ἱμάτια sin perder dignidad.
  - La nota a pie de página se ancla en «transfigurado» para conservar la alternativa documentada.
