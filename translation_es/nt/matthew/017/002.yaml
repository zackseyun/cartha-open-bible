    issue: «Vestidos» para ἱμάτια suena menos natural y algo más restringido que el sentido general de ropa/prendas.
    rationale: ἱμάτια aquí se refiere en general a la ropa de Jesús, no específicamente a vestidos. En español neutral latinoamericano, «su ropa» es más natural y fiel al alcance semántico sin perder dignidad.
  - severity: low
    issue: Formato poco natural de la nota al pie.
    rationale: 'La nota «''O: «fue transformado».»'' contiene comillas redundantes. Una forma más limpia es «O: “fue transformado”.»'
  revised_spanish_text: Y fue transfigurado[a] delante de ellos, y su rostro resplandeció como el sol, y su ropa se volvió blanca como la luz.
