translation:
  language: es
  text: Entonces los discípulos entendieron que les había hablado acerca de Juan el Bautista[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Juan el Bautizador».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: El adverbio temporal marca el momento de la comprensión; «Entonces» conserva la secuencia narrativa de manera natural en español.
- source_word: συνῆκαν
  english_pob_choice: understood
  chosen_spanish: entendieron
  alternatives_spanish:
  - comprendieron
  - se dieron cuenta
  lexicon: BDAG
  rationale: El aoristo de συνίημι expresa la llegada a la comprensión. «Entendieron» comunica esa adquisición de sentido sin añadir matices excesivos.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: Es el equivalente normal y reconocido de μαθηταί en el relato evangélico; mantiene la referencia a los seguidores de Jesús.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de lo entendido, no una causa; por eso «que» refleja mejor la sintaxis.
- source_word: περὶ
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - con respecto a
  lexicon: BDAG
  rationale: Con el genitivo, περί introduce el tema del decir de Jesús. «Acerca de» suena natural y conserva ese valor temático.
- source_word: Ἰωάννου τοῦ βαπτιστοῦ
  english_pob_choice: John the Baptist
  chosen_spanish: Juan el Bautista
  alternatives_spanish:
  - Juan el Bautizador
  lexicon: BDAG
  rationale: «Bautista» es la forma establecida y plenamente inteligible en español para el título de Juan; «Bautizador» sería una alternativa lexical posible, pero menos asentada.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he had spoken to them
  chosen_spanish: les había hablado
  alternatives_spanish:
  - les habló
  - les había dicho
  lexicon: BDAG
  rationale: El aoristo griego solo indica que Jesús les dijo/habló; en español, tras «entendieron que», el pluscuamperfecto expresa bien la anterioridad relativa. «Hablado» preserva el acto verbal sin añadir más contenido que «dicho».
theological_decisions:
- issue: Identificación del referente de la conversación de Jesús
  english_pob_reading: The verse states that the disciples understood Jesus to be speaking about John the Baptist.
  chosen_spanish_reading: La frase identifica explícitamente que Jesús hablaba de Juan el Bautista.
  alternative_spanish_readings:
  - La frase sugiere que Jesús se refería a Juan el Bautista.
  - Los discípulos interpretaron que Jesús hablaba de Juan el Bautista.
  rationale: 'No hay inferencia doctrinal añadida: el texto mismo aclara el referente. La traducción lo expresa de forma directa y sin expandir el contenido.'
  doctrine_reference: Preservar el sentido narrativo explícito del pasaje; no resolver tensiones teológicas ajenas al versículo.
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la revisión auditada; no se requieren cambios respecto del sentido identificado en el texto griego y el desglose inglés.
  spanish_consistency_notes:
  - Se mantuvo «discípulos» como término técnico narrativo habitual.
  - Se prefirió «entendieron» y no una paráfrasis más libre para respetar el aoristo de συνίημι.
  - «Juan el Bautista» sigue la convención española más clara; la nota conserva la alternativa lexical auditada.
  - La relación temporal se expresó con pluscuamperfecto («les había hablado») para reflejar la anterioridad relativa frente a «entendieron».
