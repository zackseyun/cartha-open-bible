revisions:
- from: Y después de seis días, Jesús toma a Pedro[a], a Jacobo y a Juan, su hermano[c][b], y los lleva aparte a un monte alto.
  to: Y después de seis días, Jesús toma a Pedro[a], a Santiago y a Juan, su hermano,[b] y los lleva arriba, a un monte alto, a solas[c].
  rationale: 'La revisión mantiene el presente histórico y la estructura básica del griego, pero mejora tres puntos: (1) explicita el matiz ascendente de ἀναφέρει con «lleva arriba»; (2) traduce κατ’ ἰδίαν de forma más natural y clara con «a solas»; (3) sustituye «Jacobo» por «Santiago» por ser la forma bíblica más reconocible en español general. También se conserva «su hermano» como aposición a Juan. La nota [b] se ancla en «su hermano» porque el borrador original había desalineado los marcadores de notas respecto de su contenido.'
