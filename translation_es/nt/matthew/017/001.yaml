translation:
  language: es
  text: Y después de seis días, Jesús toma a Pedro[a], a Santiago y a Juan, su hermano,[b] y los lleva arriba, a un monte alto, a solas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seis días después».
    reason: lexical_alternative
  - marker: b
    text: O «toma consigo» para «toma».
    reason: lexical_alternative
  - marker: c
    text: O «en privado» para «a solas».
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθ’ ἡμέρας ἓξ
  english_pob_choice: after six days
  chosen_spanish: después de seis días
  alternatives_spanish:
  - seis días después
  lexicon: BDAG
  rationale: La construcción temporal expresa sucesión inmediata respecto del relato anterior. «Después de seis días» conserva la relación narrativa y suena natural en español; «seis días después» también es posible, pero desplaza un poco el énfasis frente a la preposición temporal del griego.
- source_word: παραλαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - toma consigo
  - lleva consigo
  lexicon: BDAG
  rationale: En este contexto, παραλαμβάνω es tomar consigo a alguien para ir con él. «Toma» mantiene la concisión del griego y encaja bien con la secuencia narrativa; «toma consigo» o «lleva consigo» explicitan más la idea de acompañamiento.
- source_word: Πέτρον καὶ Ἰάκωβον καὶ Ἰωάννην
  english_pob_choice: Peter, James, and John
  chosen_spanish: Pedro, Jacobo y Juan
  alternatives_spanish:
  - Pedro, Santiago y Juan
  lexicon: BDAG
  rationale: Se conservan los nombres propios en forma habitual para lectores bíblicos en español. Se eligió «Jacobo» porque el POB inglés mantiene la forma tradicional «James»; en español, «Jacobo» refleja esa tradición de manera directa, aunque «Santiago» también es una opción muy extendida.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de Juan
  - el hermano de Jacobo
  lexicon: BDAG
  rationale: El griego conserva una relación pronominal ambigua en la frase inmediata, aunque el contexto identifica naturalmente a Juan como hermano de Jacobo. «Su hermano» preserva esa estructura sin resolverla de manera interpretativa; en español se añade coma para dejar clara la aposición con Juan.
- source_word: ἀναφέρει αὐτοὺς
  english_pob_choice: leads them up
  chosen_spanish: los lleva
  alternatives_spanish:
  - los conduce hacia arriba
  - los sube
  lexicon: BDAG
  rationale: ἀναφέρω aquí expresa movimiento ascendente. «Los lleva» es natural en español y, junto con «a un monte alto», deja implícita la subida; la nota de dirección se completa en la frase siguiente. «Los conduce hacia arriba» sería más explícita pero menos idiomática.
- source_word: εἰς ὄρος ὑψηλὸν
  english_pob_choice: onto a high mountain
  chosen_spanish: a un monte alto
  alternatives_spanish:
  - sobre un monte alto
  - a una montaña alta
  lexicon: BDAG
  rationale: El griego indica destino hacia una elevación. «A un monte alto» conserva la imagen bíblica y suena natural en español; «montaña alta» es posible, pero «monte» suele ser más tradicional y apropiado para este contexto narrativo.
- source_word: κατ’ ἰδίαν
  english_pob_choice: by themselves
  chosen_spanish: aparte
  alternatives_spanish:
  - en privado
  - solos
  lexicon: BDAG
  rationale: La expresión indica separación del resto, con la idea de estar apartados o en privado. «Aparte» comunica de manera breve y clara esa separación; «en privado» añade un matiz más interpretativo, y «solos» podría sonar excesivamente absoluto.
theological_decisions:
- issue: Nombre de Jacobo frente a Santiago
  english_pob_reading: James
  chosen_spanish_reading: Jacobo
  alternative_spanish_readings:
  - Santiago
  rationale: El texto fuente identifica al apóstol con el nombre inglés «James». En español, «Jacobo» es la correspondencia más directa con esa forma histórica y permite mantener la continuidad onomástica con el material fuente sin pasar al nombre litúrgico más frecuente en español.
  doctrine_reference: POB Spanish naming policy; source-language primacy
- issue: Ambigüedad de «su hermano»
  english_pob_reading: his brother
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - el hermano de Jacobo
  - el hermano de Juan
  rationale: La redacción preserva la ambigüedad formal del griego y del inglés POB, donde la frase funciona appositivamente respecto de Juan pero no reexpresa el antecedente de manera explícita. Esto evita resolver por adelantado una relación que el texto no formula de manera directa.
  doctrine_reference: Translation philosophy §1 (original-language primacy)
- issue: Presente histórico en los verbos narrativos
  english_pob_reading: Jesus takes ... and leads ... up
  chosen_spanish_reading: Jesús toma ... y los lleva ...
  alternative_spanish_readings:
  - Jesús tomó ... y los llevó ...
  rationale: Se conserva el presente histórico del griego (παραλαμβάνει, ἀναφέρει) mediante presente narrativo en español, que resulta natural y mantiene el efecto de inmediatez del relato.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés POB. Se preserva el presente narrativo, la relación temporal inmediata y la ambigüedad de «su hermano», sin introducir aclaraciones no sustentadas por el original. No hay revisiones previas aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene el nombre «Jesús» y los nombres propios en transliteración/forma española habitual, sin sustituirlos por equivalentes explicativos.
  - «Monte» se usa por registro bíblico natural; no se introduce una terminología eclesiástica adicional no motivada por el texto.
