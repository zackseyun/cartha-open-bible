  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del griego: al oír, los discípulos cayeron y sintieron gran temor. También preserva la tensión teológica sin sobreinterpretarla. Sin embargo, dos elecciones españolas no representan bien el tono y la naturalidad del original: «sobre sus rostros» suena forzado en español bíblico actual, y «tuvieron mucho miedo» es correcto pero menos digno y menos cercano al matiz de ἐφοβήθησαν σφόδρα que una formulación como «se llenaron de mucho temor».'
  spanish_quality_summary: La redacción es generalmente clara, pero «sobre sus rostros» resulta poco idiomático y algo calcado. En español eclesial amplio, «cayeron rostro en tierra» o «cayeron sobre sus rostros» puede entenderse, pero la primera es mucho más natural y digna. Asimismo, «tuvieron mucho miedo» suena más coloquial que el registro buscado; «se llenaron de mucho temor» mantiene claridad y eleva el tono sin arcaísmo.
  glossary_alignment: No hay términos de glosario mayor implicados aquí. «Discípulos» está bien. La revisión propuesta mejora la correspondencia estilística con la filosofía POB sin afectar ninguna política terminológica principal.
  issues:
  - severity: medium
    issue: «sobre sus rostros» es una formulación poco natural en español
    rationale: Aunque intenta reflejar literalmente ἐπὶ πρόσωπον αὐτῶν, en español amplio suena calcada. El sentido es postración con el rostro hacia el suelo; «rostro en tierra» expresa eso con naturalidad y dignidad, sin perder la imagen corporal.
  - severity: medium
    issue: «tuvieron mucho miedo» rebaja el registro narrativo
    rationale: La frase comunica el sentido básico, pero para un texto bíblico de tono digno «se llenaron de mucho temor» o «tuvieron gran temor» representa mejor la intensidad de ἐφοβήθησαν σφόδρα y evita un giro demasiado coloquial.
  - severity: low
    issue: La nota c usa «intensamente asustados», que no coincide del todo con el texto principal revisado
    rationale: Si se eleva el registro a «temor», conviene que la nota explique σφόδρα en esos mismos términos para mantener coherencia estilística y semántica.
