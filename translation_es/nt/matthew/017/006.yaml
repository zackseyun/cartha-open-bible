  yaml_path: translation/nt/matthew/017/006.yaml
  text: And when the disciples heard it[c][b][a], they fell on their faces and were greatly afraid.
  footnotes:
  - marker: a
    text: Or 'having heard'; the Greek uses an aorist participle that can be rendered temporally ('when they heard') or more formally ('having heard').
    reason: lexical_alternative
  - marker: b
    text: Literally 'fell on their face'; in English with a plural subject, 'fell on their faces' is the natural idiom.
    reason: lexical_alternative
  - marker: c
    text: That is, they were intensely afraid; 'greatly' translates the adverb σφόδρα.
    reason: lexical_alternative
