translation:
  language: es
  text: Y al oírlo[a], los discípulos cayeron rostro en tierra[b] y se llenaron de mucho temor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo oído»; el participio aoristo puede expresarse temporalmente («al oírlo») o de manera más formal («habiendo oído»).
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cayeron sobre su rostro»; con un sujeto plural, el español natural expresa la postura como «cayeron rostro en tierra».
    reason: lexical_alternative
  - marker: c
    text: Es decir, tuvieron un temor intenso; «mucho» traduce el adverbio σφόδρα, que intensifica su reacción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when ... heard it
  chosen_spanish: al oírlo
  alternatives_spanish:
  - habiendo oído
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo se entiende con valor temporal. En español, la construcción breve «al oírlo» comunica con naturalidad esa relación temporal sin volver mecánico el gerundio ni añadir explicación.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente natural y preciso en el contexto de los Evangelios para μαθηταί. «Aprendices» sería demasiado genérico y no reflejaría el grupo específico de Jesús.
- source_word: ἔπεσαν
  english_pob_choice: they fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - se postraron
  - se derrumbaron
  lexicon: BDAG
  rationale: El verbo básico es caer. «Cayeron» conserva la acción simple del aoristo sin introducir de inmediato la interpretación de postración que proviene del complemento de lugar/postura.
- source_word: ἐπὶ πρόσωπον αὐτῶν
  english_pob_choice: on their faces
  chosen_spanish: sobre sus rostros
  alternatives_spanish:
  - de bruces
  - sobre sus caras
  lexicon: BDAG
  rationale: La expresión es literalmente de rostro/cara y en español puede traducirse con naturalidad como «sobre sus rostros». «De bruces» sería idiomático pero añade más color interpretativo; aquí se preserva la imagen corporal y su fuerza reverencial/tremorosa.
- source_word: ἐφοβήθησαν
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - estaban asustados
  - temieron
  lexicon: BDAG
  rationale: «Tuvieron miedo» es un español claro y digno que expresa el aoristo de φοβέομαι sin volverlo excesivamente coloquial. «Temieron» puede sonar más literario pero menos natural en este contexto narrativo.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sumamente
  lexicon: BDAG
  rationale: El adverbio intensifica el miedo. En español, «mucho» transmite bien esa intensificación; «en gran manera» es más elevado, pero menos directo. Se evita añadir matices que el adverbio no especifica.
theological_decisions:
- issue: Naturaleza de la reacción de los discípulos ante la voz divina
  english_pob_reading: The verse is rendered to show a physical act of prostration and intense fear, without specifying more than the text states about whether the fear is worship, terror, or reverent awe.
  chosen_spanish_reading: La traducción muestra una postración física y un miedo intenso, sin decidir si la reacción fue adoración, terror o reverencia temerosa.
  alternative_spanish_readings:
  - La reacción fue principalmente adoración reverente.
  - La reacción fue principalmente pánico ante una manifestación divina.
  rationale: El griego describe el gesto corporal y el temor, pero no etiqueta la reacción teológicamente. La versión española conserva esa tensión en vez de resolverla con una interpretación devocional previa.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y no requiere cambios de revisión adicionales; se mantiene la equivalencia óptima ya validada en la fuente auditada.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί conforme al uso estable en los Evangelios.
  - Se conserva la imagen corporal de postración sin explicitarla como adoración, respetando la tensión del original.
  - «Mucho miedo» traduce el intensificador σφόδρα de manera clara y natural en español.
  - El marcador [a] se integra en la frase verbal para reflejar la alternativa aspectual del participio aoristo.
