translation:
  language: es
  text: 'Mientras ellos se reunían en Galilea,[a] Jesús les dijo: «El Hijo del Hombre está a punto de ser entregado[b] en manos de hombres[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se estaban reuniendo» o «se congregaban».
    reason: lexical_alternative
  - marker: b
    text: O, «ser entregado»; también, «ser puesto en manos de otros».
    reason: alternative_reading
  - marker: c
    text: 'Griego: «en manos de hombres»; alternativamente, «en manos de personas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Συστρεφομένων
  english_pob_choice: were gathering together
  chosen_spanish: se juntaban
  alternatives_spanish:
  - se reunían
  - se estaban reuniendo
  - se congregaban
  lexicon: BDAG
  rationale: El participio genitivo absoluto describe una acción circunstancial de estar juntos o reunirse en Galilea. «Se juntaban» comunica esa simultaneidad de forma natural en español, sin añadir una precisión que el griego no exige.
- source_word: δὲ
  english_pob_choice: while
  chosen_spanish: Mientras
  alternatives_spanish:
  - Y
  - Ahora bien
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector circunstancial entre la reunión en Galilea y la palabra de Jesús. «Mientras» reproduce bien la relación temporal implícita en el participio absoluto.
- source_word: ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - por Galilea
  - a lo largo de Galilea
  lexicon: BDAG
  rationale: Es una expresión locativa directa; «en Galilea» es preciso y natural en español.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les manifestó
  lexicon: BDAG
  rationale: El verbo decir con dativo se rinde de modo normal como «les dijo», conservando transparencia y fluidez.
- source_word: Μέλλει
  english_pob_choice: is about to
  chosen_spanish: está por
  alternatives_spanish:
  - va a
  - está a punto de
  - está destinado a
  lexicon: BDAG
  rationale: μέλλω expresa inminencia o cercanía de la acción. «Está por» preserva esa inmediatez sin cargarla con un matiz más fuerte de destino.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva la fórmula tradicional y literal del dicho de Jesús, con su resonancia teológica e intertextual.
- source_word: παραδίδοσθαι
  english_pob_choice: be delivered
  chosen_spanish: ser entregado
  alternatives_spanish:
  - ser puesto en manos de
  - ser entregado en custodia
  - ser traicionado
  lexicon: BDAG
  rationale: El infinitivo pasivo indica ser puesto en manos de otros. En español, «ser entregado» mantiene la amplitud del griego y no reduce prematuramente el sentido a traición personal o a un acto judicial específico.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - en manos
  lexicon: BDAG
  rationale: La idiomática «en manos de» conserva la imagen de dominio o control del original y suena natural en español.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - seres humanos
  lexicon: BDAG
  rationale: Se mantiene el valor masculino plural del griego y el contraste retórico con «el Hijo del Hombre». En español, «hombres» conserva esa fuerza formal; las alternativas inclusivas quedan como posibles equivalentes de sentido.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el ser humano
  - el Hijo Humano
  rationale: Se preserva el título fijo de Jesús y su peso bíblico-profético. No se lo reformula de manera interpretativa, porque el texto no exige aclararlo aquí.
  doctrine_reference: Translation philosophy §§2, 3, 4
- issue: παραδίδοσθαι en anuncio de pasión
  english_pob_reading: be delivered
  chosen_spanish_reading: ser entregado
  alternative_spanish_readings:
  - ser entregado / ser traicionado
  - ser puesto en manos de
  rationale: La frase anuncia que el Hijo del Hombre será puesto en manos humanas. «Ser entregado» mantiene la pasiva y deja abierta la capa de agencia humana y cumplimiento divino, sin resolverla de antemano sólo como traición.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del expediente inglés: no hay revisiones aplicadas y el control cruzado reporta alta concordancia. La redacción española sigue el mismo análisis del genitivo absoluto, del valor inminente de μέλλω y de la pasiva de παραδίδοσθαι, sin introducir resoluciones interpretativas nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma fija del nombre propio.
  - Se conserva «el Hijo del Hombre» como título cristológico literal.
  - «Ser entregado» se usa como equivalente amplio y auditables del griego pasivo, no como simplificación devocional.
  - La puntuación y comillas siguen norma española; el discurso directo se abre y cierra con comillas angulares.
