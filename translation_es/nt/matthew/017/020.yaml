revisions:
- from: 'Y les dice[a]: «A causa de su poca fe[b]. Porque en verdad les digo que, si tienen fe como un grano de mostaza, le dirán a este monte: “Pásate de aquí allá”, y se pasará, y nada les será imposible[c]».'
  to: 'Pero les dice[a]: «A causa de su poca fe[b]. Porque en verdad les digo que, si tienen fe como un grano de mostaza, le dirán a este monte: “Muévete de aquí para allá”, y se moverá, y nada les será imposible».'
  rationale: Se conserva el sentido del original y del audit trail inglés, pero se reemplazan «Pásate / se pasará» por «Muévete / se moverá» para lograr una equivalencia más natural y clara en español. También se elimina la nota redundante final y se mantiene una nota útil sobre la apertura del versículo y otra sobre «poca fe».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:11:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: presente histórico «les dice», causal «a causa de su poca fe», comparación con el grano de mostaza, mandato al monte y conclusión «nada les será imposible». Sin embargo, dos elecciones principales debilitan la fidelidad idiomática al sentido documentado: «Pásate» / «se pasará» suena poco natural para un monte en español y no reproduce tan claramente la idea de moverse o trasladarse; además, la nota c es redundante porque repite exactamente el texto principal en una de sus alternativas.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «Pásate de aquí allá» y «se pasará» resultan extraños en registro bíblico neutro y pueden sugerir un matiz coloquial. «Muévete de aquí para allá» tampoco sería ideal, así que conviene usar una formulación más natural y precisa: «Muévete de aquí para allá» en la cita y «se moverá» en la consecuencia. También conviene ajustar la puntuación y las notas para evitar redundancia.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Fe», «en verdad» y el tratamiento de ὀλιγοπιστία como «poca fe» están alineados con el POB y con la rationale léxica. La revisión propuesta mejora la representación de μεταβαίνω con un español más natural sin alterar la decisión semántica.
  issues:
  - severity: medium
    issue: «Pásate de aquí allá» es una orden poco natural dirigida a un monte.
    rationale: Aunque intenta reflejar μεταβαίνω, en español neutro bíblico «pásate» suena coloquial y menos claro que «muévete» o «trasládate» para un objeto inanimado como un monte.
  - severity: medium
    issue: «se pasará» no es la mejor representación de μεταβήσεται en este contexto.
    rationale: El inglés auditado eligió «it will move» por el valor intransitivo. En español, «se moverá» comunica mejor que el monte cambiará de lugar.
  - severity: low
    issue: La nota c es redundante y poco útil.
    rationale: Dice «O “nada les será imposible”» cuando esa es exactamente la redacción del texto principal; no preserva una alternativa real ni aclara una ambigüedad nueva.
  revised_spanish_text: 'Pero les dice[a]: «A causa de su poca fe[b]. Porque en verdad les digo que, si tienen fe como un grano de mostaza, le dirán a este monte: “Muévete de aquí para allá”, y se moverá, y nada les será imposible».

    '
  revised_footnotes:
  - marker: a
    text: O «Y les dice». El griego usa el presente histórico «dice», y la partícula inicial puede traducirse como una transición suave o como «pero».
    reason: previous_rendering
  - marker: b
    text: O «falta de fe»; ὀλιγοπιστία denota más propiamente fe escasa o deficiente que incredulidad absoluta.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y del audit trail inglés, pero se reemplazan «Pásate / se pasará» por «Muévete / se moverá» para lograr una equivalencia más natural y clara en español. También se elimina la nota redundante final y se mantiene una nota útil sobre la apertura del versículo y otra sobre «poca fe».
