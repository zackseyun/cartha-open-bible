translation:
  language: es
  text: 'Pero les dice[a]: «A causa de su poca fe[b]. Porque en verdad les digo que, si tienen fe como un grano de mostaza, le dirán a este monte: “Muévete de aquí para allá”, y se moverá, y nada les será imposible».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y les dice». El griego usa el presente histórico «dice», y la partícula inicial puede traducirse como una transición suave o como «pero».
    reason: previous_rendering
  - marker: b
    text: O «falta de fe»; ὀλιγοπιστία denota más propiamente fe escasa o deficiente que incredulidad absoluta.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice», que mantiene la viveza narrativa. Se añade el dativo indirecto «les» para reflejar αὐτοῖς.
- source_word: Διὰ τὴν ὀλιγοπιστίαν ὑμῶν
  english_pob_choice: Because of your little faith
  chosen_spanish: A causa de su poca fe
  alternatives_spanish:
  - A causa de su falta de fe
  - A causa de su poca confianza
  lexicon: BDAG
  rationale: ὀλιγοπιστία expresa fe deficiente o pequeña, no necesariamente incredulidad total. «Poca fe» conserva esa fuerza lexical y evita equipararla sin más con «incredulidad».
- source_word: ἀμὴν
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - amén
  - ciertamente
  lexicon: BDAG
  rationale: Como marcador discursivo solemne, «en verdad» comunica en español la solemnidad de ἀμὴν sin transliterarlo.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este contexto de poder milagroso y confianza en Dios, el término se vierte naturalmente como «fe», siguiendo la decisión base del POB.
- source_word: ὡς κόκκον σινάπεως
  english_pob_choice: like a mustard seed
  chosen_spanish: como un grano de mostaza
  alternatives_spanish:
  - como una semilla de mostaza
  - como un grano de mostaza
  lexicon: BDAG
  rationale: «Grano de mostaza» expresa la comparación de pequeñez de forma natural en español y preserva la imagen del original.
- source_word: Μετάβα ἔνθεν ἐκεῖ
  english_pob_choice: Move from here to there
  chosen_spanish: Pásate de aquí allá
  alternatives_spanish:
  - Muévete de aquí allá
  - Ve de aquí allá
  lexicon: BDAG
  rationale: Para una montaña, «Pásate» suena más natural que «ve», y conserva el mandato de traslado espacial. «De aquí allá» reproduce el contraste de ἔνθεν / ἐκεῖ.
- source_word: μεταβήσεται
  english_pob_choice: it will move
  chosen_spanish: se pasará
  alternatives_spanish:
  - se moverá
  - se trasladará
  lexicon: BDAG
  rationale: 'El futuro medio es intransitivo: la montaña misma se desplaza. «Se pasará» mantiene ese matiz de movimiento y evita una pasiva innecesaria.'
- source_word: οὐδὲν ἀδυνατήσει ὑμῖν
  english_pob_choice: nothing will be impossible for you
  chosen_spanish: nada les será imposible
  alternatives_spanish:
  - nada será imposible para ustedes
  - nada les resultará imposible
  lexicon: BDAG
  rationale: 'La construcción se expresa con naturalidad en español como una posibilidad negada: «nada les será imposible». Conserva el sentido idiomático sin sobreliteralidad.'
theological_decisions:
- issue: Valor de ὀλιγοπιστία en contexto de reproche a los discípulos
  english_pob_reading: Because of your little faith
  chosen_spanish_reading: A causa de su poca fe
  alternative_spanish_readings:
  - A causa de su falta de fe
  - A causa de su incredulidad
  rationale: Se evita «incredulidad» porque el griego apunta a una fe insuficiente o pequeña, no a ausencia total de fe. La formulación mantiene la tensión lexical señalada por el POB inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → fe; ὀλιγοπιστία como fe deficiente'
translation_notes:
  revision_awareness: El pasaje inglés revisado pasó de 'But he says to them' a 'He says to them' por la debilidad de δέ, aunque la versión final volvió a introducir 'But'. En español se resolvió con una transición suave «Y les dice», que refleja el cambio narrativo sin forzar contraste adversativo. También se mantuvo el presente histórico de λέγει y la lectura de ὀλιγοπιστία como fe pequeña/deficiente, con las notas correspondientes.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se traduce πίστις como «fe» en el texto principal, coherente con el criterio doctrinal del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino porque no aparece aquí.
  - Se mantiene un español bíblico moderno y claro, sin calcos rígidos.
  - Los corchetes de notas aparecen exactamente en el texto en los puntos anclados.
