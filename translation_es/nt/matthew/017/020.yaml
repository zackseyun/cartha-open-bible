  text: ὁ δὲ ⸀λέγει αὐτοῖς· Διὰ τὴν ⸀ὀλιγοπιστίαν ὑμῶν· ἀμὴν γὰρ λέγω ὑμῖν, ἐὰν ἔχητε πίστιν ὡς κόκκον σινάπεως, ἐρεῖτε τῷ ὄρει τούτῳ· ⸂Μετάβα ἔνθεν⸃ ἐκεῖ, καὶ μεταβήσεται, καὶ οὐδὲν ἀδυνατήσει ⸀ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/017/020.yaml
  text: But he says to them[a], “Because of your little faith. For truly I say to you, if you have faith like a mustard seed, you will say to this mountain, ‘Move from here to there,’ and it will move[c][b], and nothing will be impossible for you.”
  footnotes:
  - marker: a
    text: Or “Because of your lack of faith”; the Greek term more specifically suggests deficient or small faith rather than complete unbelief.
    reason: lexical_alternative
  - marker: b
    text: Greek “if you have faith as a mustard seed.” The comparison is to something very small.
    reason: lexical_alternative
  - marker: c
    text: Or 'But he says to them'.
    reason: previous_rendering
