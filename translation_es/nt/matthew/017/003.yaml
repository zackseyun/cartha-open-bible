review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente los elementos del griego: partícula de atención (ἰδού), aparición visible de Moisés y Elías, dativo ''a ellos'', y el participio ''hablando/conversando con él''. Sin embargo, ''se aparecieron a ellos'' no es la mejor correspondencia idiomática para ὤφθη αὐτοῖς en español bíblico natural; suena marcado e innecesariamente reflexivo. ''Aparecieron ante ellos'' o ''se les aparecieron'' sería más natural, y el inglés auditado favorece una forma sencilla equivalente a ''appeared to them''.'
  spanish_quality_summary: La redacción general es clara y digna, pero 'Y he aquí que se aparecieron a ellos...' resulta algo forzada. En español actual y eclesial legible, 'Y he aquí, Moisés y Elías aparecieron ante ellos' fluye mejor y conserva la viveza. También conviene ajustar la nota para no defender una formulación menos natural que la revisión propuesta.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los nombres propios 'Moisés' y 'Elías' están bien. 'He aquí' es aceptable para ἰδού. 'Conversando con él' preserva bien el valor recíproco de συλλαλοῦντες. No hay términos teológicos del glosario principal implicados.
  issues:
  - severity: medium
    issue: '''se aparecieron a ellos'' suena poco natural en español'
    rationale: Aunque intenta reflejar la pasividad formal de ὤφθη, en español esta construcción es menos idiomática que 'aparecieron ante ellos' o 'se les aparecieron'. La traducción debe priorizar fidelidad natural, como hace el POB en inglés con 'appeared to them'.
  - severity: low
    issue: Puntuación de 'he aquí' mejorable
    rationale: Una coma tras 'Y he aquí' ayuda a marcar la partícula discursiva ἰδού con mayor naturalidad en español escrito.
  - severity: medium
    issue: La nota al pie justifica una opción menos adecuada
    rationale: Si se revisa el verbo principal a 'aparecieron ante ellos', la nota debe actualizarse para reflejar esa elección natural y mantener la alternativa formal pasiva 'fueron vistos por ellos'.
  revised_spanish_text: Y he aquí[a], Moisés y Elías aparecieron ante ellos, conversando con él.
  revised_footnotes:
