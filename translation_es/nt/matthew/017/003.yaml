translation:
  language: es
  text: Y he aquí[a], Moisés y Elías aparecieron ante ellos, conversando con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron vistos por ellos». El verbo griego es formalmente pasivo, aunque en español «aparecieron ante ellos» resulta más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - he aquí
  lexicon: BDAG
  rationale: La partícula deíctica introduce la escena con fuerza discursiva y sorpresa. «He aquí» conserva ese valor de atención inmediata sin sonar mecánico en español.
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se aparecieron
  alternatives_spanish:
  - aparecieron
  - fueron vistos
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁράω permite una traducción natural que conserve el evento de manifestación visible. «Se aparecieron» mantiene la pasividad/recepción de la visión mejor que un activo simple, aunque «aparecieron» también sería posible.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - ante ellos
  - a ellos
  lexicon: BDAG
  rationale: El dativo indica los testigos de la aparición. «A ellos» es la correspondencia directa y clara en español.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio
  rationale: Se mantiene la transliteración estándar del nombre bíblico en español.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías
  lexicon: Nombre propio
  rationale: Se mantiene la transliteración estándar del nombre bíblico en español.
- source_word: συλλαλοῦντες
  english_pob_choice: talking
  chosen_spanish: conversando
  alternatives_spanish:
  - hablando
  - conversando
  lexicon: BDAG
  rationale: El participio implica hablar juntos, no solo emitir palabras. «Conversando» preserva el matiz recíproco con naturalidad y dignidad en español.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con él
  - junto con él
  lexicon: BDAG
  rationale: La preposición μετά con genitivo expresa asociación. «Con él» es la forma más natural y suficiente en contexto; el referente es Jesús por el marco narrativo inmediato.
theological_decisions:
- issue: Referente de αὐτοῦ
  english_pob_reading: '''him'' refers to Jesus'
  chosen_spanish_reading: «él» se refiere a Jesús
  alternative_spanish_readings:
  - dejar «él» sin especificar
  - poner «Jesús» explícitamente
  rationale: Se conserva el pronombre para no sobretraducir, pero el contexto de la transfiguración identifica inequívocamente a Jesús. No es necesario sustituir el pronombre por el nombre propio.
  doctrine_reference: Philosophy §1, §6
- issue: Modo de la aparición
  english_pob_reading: Visible appearance of Moses and Elijah
  chosen_spanish_reading: aparición visible de Moisés y Elías
  alternative_spanish_readings:
  - Moisés y Elías fueron vistos por ellos
  - Moisés y Elías se les aparecieron
  rationale: La frase española mantiene la afirmación narrativa sin añadir explicación doctrinal sobre la naturaleza de la aparición. Se preserva la ambigüedad respetuosa del texto griego.
  doctrine_reference: Philosophy §3
translation_notes:
  revision_awareness: El registro griego y el audit trail en inglés coinciden en mantener la fuerza de ἰδού y el valor pasivo-idiomático de ὤφθη. No se registran revisiones aplicadas en el contexto fuente; esta versión conserva esa lectura con español natural y auditable.
  spanish_consistency_notes:
  - Se conserva «he aquí» para ἰδοὺ como marcador discursivo tradicional pero plenamente inteligible.
  - Se evita reemplazar el pronombre del contexto por «Jesús» en el texto principal, siguiendo la estrategia de dejar explícita la referencia solo en la nota teológica.
  - «Conversando» transmite el participio de habla recíproca mejor que un simple «hablando».
  - Se mantiene un tono bíblico sobrio sin recurrir a fórmulas eclesiásticas no motivadas por el original.
