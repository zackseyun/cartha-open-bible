revisions:
- from: Y he aquí[a] que se aparecieron a ellos Moisés y Elías, conversando con él.
  to: Y he aquí[a], Moisés y Elías aparecieron ante ellos, conversando con él.
  rationale: Se reemplaza 'se aparecieron a ellos' por 'aparecieron ante ellos' para lograr un español más natural sin perder el sentido de manifestación visible ni la referencia a los testigos. Se conserva 'he aquí' como equivalente válido de ἰδού, con puntuación mejorada, y se mantiene 'conversando con él' por su buen ajuste al participio griego.
