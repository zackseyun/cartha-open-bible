translation:
  language: es
  text: 'Y los discípulos le preguntaron, diciendo: «¿Por qué entonces dicen los escribas que Elías debe venir primero?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπηρώτησαν
  english_pob_choice: asked
  chosen_spanish: preguntaron
  alternatives_spanish:
  - interrogaron
  - hicieron una pregunta
  lexicon: BDAG
  rationale: El aoristo de ἐπερωτάω introduce una pregunta directa. «Preguntaron» es natural en español y conserva el valor interrogativo sin cargar el verbo con una formalidad excesiva.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo griego señala un grupo ya identificable por el contexto. «Los discípulos» reproduce esa referencia definida; añadir «sus» sería interpretativo, como en el inglés auditado.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - preguntando
  lexicon: BDAG
  rationale: El participio introduce el contenido de la pregunta. «Diciendo» conserva mejor la estructura griega que «y dijeron», sin convertirlo en una reconstrucción más libre.
- source_word: Τί οὖν
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué entonces
  alternatives_spanish:
  - ¿Qué entonces
  - ¿Por qué, pues
  lexicon: BDAG
  rationale: Aunque τί significa formalmente «qué», en esta construcción con λέγουσιν ὅτι expresa motivo o razón. «¿Por qué entonces?» transmite el sentido idiomático sin perder el matiz inferencial de οὖν.
- source_word: γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es la equivalencia directa y estable en el contexto evangélico. «Maestros de la ley» explica la función, pero se aleja del término concreto del texto fuente.
- source_word: λέγουσιν ὅτι
  english_pob_choice: say that
  chosen_spanish: dicen que
  alternatives_spanish:
  - están diciendo que
  - afirman que
  lexicon: BDAG
  rationale: El presente con ὅτι introduce el contenido de la afirmación. «Dicen que» es el equivalente más transparente y natural en español.
- source_word: Ἠλίαν
  english_pob_choice: Elijah
  chosen_spanish: Elías
  lexicon: BDAG
  rationale: Nombre propio tradicionalmente transliterado en español como «Elías», siguiendo la convención estándar y la forma ya transparente para lectores bíblicos.
- source_word: δεῖ ἐλθεῖν
  english_pob_choice: must come
  chosen_spanish: debe venir
  alternatives_spanish:
  - tiene que venir
  - es necesario que venga
  lexicon: BDAG
  rationale: δεῖ expresa necesidad u obligación. «Debe venir» mantiene esa fuerza de necesidad de modo conciso y fiel, sin sobreexplicar la construcción.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  lexicon: BDAG
  rationale: El adverbio acusa el orden de prioridad o anterioridad. «Primero» es la opción más directa y preserva la secuencia escatológica discutida por la pregunta.
theological_decisions:
- issue: No resolver la tensión interpretativa sobre la venida de Elías en este versículo
  english_pob_reading: Render the question without resolving whether the scribal teaching is affirmed, challenged, or partially corrected until the following verse.
  chosen_spanish_reading: Traducir la pregunta sin decidir aquí si la enseñanza de los escribas queda afirmada, cuestionada o matizada; dejar esa resolución para el versículo siguiente.
  alternative_spanish_readings:
  - Una redacción más interpretativa podría insinuar escepticismo contra los escribas
  - Una redacción explicativa podría introducir el trasfondo de Malaquías dentro del versículo
  rationale: El versículo solo registra la pregunta de los discípulos en el contexto de la transfiguración. La traducción debe preservar la tensión teológica y no incorporar al versículo la respuesta que aparece en Mt 17:11–13.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último repaso: no se requieren cambios respecto del texto auditado, y la decisión sigue en alta concordancia con la revisión previa.'
  spanish_consistency_notes:
  - Se mantiene «los discípulos» y «los escribas» como términos bíblicos estables.
  - Se usa «Elías» como forma española tradicional del nombre propio.
  - 'La estructura «diciendo: «¿Por qué entonces...?»» conserva el participio griego sin sonar forzada en español.'
  - No se añadió nota de pie porque no hay variante textual ni ambigüedad que requiera anclaje explícito en el texto.
