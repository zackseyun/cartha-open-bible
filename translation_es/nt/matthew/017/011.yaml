translation:
  language: es
  text: 'Él respondió[a]: «Elías, en efecto, viene y restaurará todas las cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viene y restaurará todas las cosas». El verbo griego en presente («viene/comes») tiene aquí sentido orientado al futuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: He answered
  chosen_spanish: Él respondió
  alternatives_spanish:
  - Respondió
  - Y respondió
  - Les respondió
  lexicon: BDAG
  rationale: La construcción participio + verbo finito funciona como fórmula narrativa de respuesta. En español, «respondió» comunica con naturalidad la idea de réplica sin añadir redundancia innecesaria. Se conserva el sentido responsivo del griego sin copiar la estructura semítica de forma rígida.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: convención bíblica española
  rationale: El nombre propio se translitera según la convención bíblica española estándar. «Elías» es la forma natural y reconocible en español.
- source_word: μέν
  english_pob_choice: indeed
  chosen_spanish: en efecto
  alternatives_spanish:
  - ciertamente
  - de hecho
  - en verdad
  lexicon: BDAG
  rationale: μέν aporta énfasis y prepara contraste posterior. «En efecto» conserva ese matiz confirmatorio en español sin sobrecargar la frase ni cerrar el contraste que sigue en el contexto inmediato.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - vendrá
  - ha de venir
  lexicon: BDAG
  rationale: El presente griego tiene valor orientado al futuro. En español, «viene» reproduce bien esa vividez presente con sentido futuro, como permite el contexto profético. También evita una perífrasis menos natural.
- source_word: ἀποκαταστήσει
  english_pob_choice: will restore
  chosen_spanish: restaurará
  alternatives_spanish:
  - restituirá
  - restablecerá
  - pondrá en orden
  lexicon: BDAG
  rationale: El futuro activo indica una acción futura de restauración. «Restaurará» es la opción más clara y fiel en español. Se evita especificar el tipo de restauración para no imponer una interpretación más estrecha que la del texto.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto hay
  - todo
  lexicon: BDAG
  rationale: El neutro plural abarca de manera amplia y total. «Todas las cosas» preserva la amplitud del griego y mantiene un registro bíblico claro en español, sin concretar indebidamente el alcance.
theological_decisions:
- issue: Alcance de la restauración de Elías
  english_pob_reading: will restore all things
  chosen_spanish_reading: restaurará todas las cosas
  alternative_spanish_readings:
  - pondrá todo en orden
  - restaurará a todos
  rationale: El griego presenta la restauración de manera amplia, pero no define aquí su contenido exacto. La traducción conserva esa amplitud con «todas las cosas» y evita reducirla a renovación espiritual, reforma social o consumación escatológica concreta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto base en inglés se mantiene sin cambios relevantes en la revisión más reciente; la consulta cruzada indica alto acuerdo y ausencia de incidencias, por lo que no se requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Elías» como nombre propio bíblico estándar en español.
  - Se evitó «SEÑOR» u otras sustituciones, pues no hay aquí el nombre divino ni un equivalente que lo requiera.
  - «Restaurará todas las cosas» conserva la amplitud semántica y la tensión interpretativa documentadas en el audit trail inglés.
  - La nota al pie refleja la alternativa verbal presente/futura del griego sin desplazar la lectura principal.
