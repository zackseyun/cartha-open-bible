revisions:
- from: Pero para no escandalizarlos[a], ve al mar, echa un anzuelo, y toma el primer pez que suba. Y al abrirle la boca, encontrarás un estáter[b]. Tómalo y dáselo a ellos por mí y por ti.
  to: Pero para no ofenderlos[a], ve al mar, echa un anzuelo y toma el primer pez que suba. Y al abrirle la boca, encontrarás un estáter[b]. Tómalo y dáselo por mí y por ti.
  rationale: 'Se revisa el texto principal para alinear σκανδαλίζω con el sentido contextual documentado por la auditoría inglesa («ofenderlos»), mejorar la naturalidad del español, y corregir la asignación y redacción de las notas para que coincidan con sus anclas y funciones: alternativa léxica en [a] y nota cultural sobre «estáter» en [b].'
