translation:
  language: es
  text: Pero para no ofenderlos[a], ve al mar, echa un anzuelo y toma el primer pez que suba. Y al abrirle la boca, encontrarás un estáter[b]. Tómalo y dáselo por mí y por ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escandalizarlos»; aquí σκανδαλίζω puede expresar la idea de causarles una ofensa innecesaria. También puede traducirse «hacerlos tropezar».
    reason: lexical_alternative
  - marker: b
    text: Un estáter era una moneda equivalente aproximadamente a cuatro dracmas, suficiente para pagar el impuesto del templo por dos personas.
    reason: cultural_note
lexical_decisions:
- source_word: σκανδαλίσωμεν
  english_pob_choice: offend
  chosen_spanish: escandalizarlos
  alternatives_spanish:
  - ofenderlos
  - hacerlos tropezar
  lexicon: BDAG
  rationale: En este contexto el verbo expresa evitar una ofensa innecesaria para los cobradores del impuesto; en español, «escandalizar» conserva la familia semántica de σκανδαλίζω y permite mantener la tensión pragmática sin reducirla a simple enojo. «Ofenderlos» sería natural, pero pierde la resonancia lexical; «hacerlos tropezar» suena demasiado mecánico en este contexto.
- source_word: θάλασσαν
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - lago
  lexicon: BDAG
  rationale: El griego dice «mar». Aunque el referente geográfico sea el mar de Galilea, en el texto se conserva el término fuente y se traduce con «mar» en vez de sustituirlo por la explicación geográfica.
- source_word: ἄγκιστρον
  english_pob_choice: hook
  chosen_spanish: anzuelo
  alternatives_spanish:
  - gancho
  - anzuelo de pesca
  lexicon: BDAG
  rationale: «Anzuelo» comunica de manera natural el instrumento de pesca y equivale mejor al objeto en contexto que el más genérico «gancho». «Anzuelo de pesca» es más explícito pero redundante.
- source_word: ἀναβάντα πρῶτον ἰχθὺν
  english_pob_choice: the first fish that comes up
  chosen_spanish: el primer pez que suba
  alternatives_spanish:
  - el primer pez que salga
  - el primer pez que venga arriba
  lexicon: BDAG
  rationale: La frase participial describe al primer pez que emerge del agua. «Que suba» es idiomático en español y conserva el movimiento sin sobreexplicación.
- source_word: ἆρον
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - levanta
  - saca
  lexicon: BDAG
  rationale: Aquí αἴρω tiene el valor de tomar/recoger el pez ya capturado. «Toma» resulta más natural en la secuencia imperativa española que «levanta» o «saca».
- source_word: στατῆρα
  english_pob_choice: a stater
  chosen_spanish: un estáter
  alternatives_spanish:
  - una moneda de cuatro dracmas
  lexicon: BDAG
  rationale: Se preserva el nombre específico de la moneda en griego. «Estáter» mantiene la forma técnica, y el equivalente de valor puede explicitarse en nota sin reemplazar el término del texto.
- source_word: ἀντὶ ἐμοῦ καὶ σοῦ
  english_pob_choice: for me and for yourself
  chosen_spanish: por mí y por ti
  alternatives_spanish:
  - en lugar de mí y de ti
  - a favor de mí y de ti
  lexicon: BDAG
  rationale: Aquí ἀντί expresa pago en representación o para cubrir a ambas personas. «Por mí y por ti» es natural en español y comunica la función de cubrir el impuesto para los dos.
theological_decisions:
- issue: Sentido de σκανδαλίζω respecto del impuesto del templo
  english_pob_reading: Jesús manda pagar para evitar una ofensa innecesaria a los cobradores, no porque abandone la afirmación previa de que los hijos son libres.
  chosen_spanish_reading: Jesús manda pagar para evitar un escándalo innecesario a los cobradores, no porque renuncie a la libertad afirmada antes.
  alternative_spanish_readings:
  - Jesús paga porque está plenamente obligado por el impuesto
  - Jesús actúa solo como demostración milagrosa sin implicación ética
  rationale: El contexto inmediato de 17:24–26 afirma la libertad de los hijos; este versículo añade una concesión práctica «para no escandalizarlos». La traducción conserva esa tensión y no la resuelve doctrinalmente.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla de antemano.
translation_notes:
  revision_awareness: El borrador sigue el último estado del texto fuente sin revisiones posteriores registradas; el audit trail inglés confirma agreement alto y sin cambios necesarios en la revisión más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene la terminología monetaria específica («estáter») para no perder la referencia técnica del griego.
  - «Escandalizarlos» conserva la familia lexical de σκανδαλίζω y deja abierta la alternativa pragmática «ofenderlos» en nota.
  - La frase final «por mí y por ti» sigue la fuerza representativa de ἀντί sin introducir una glosa demasiado interpretativa en el cuerpo del texto.
