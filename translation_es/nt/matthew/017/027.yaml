  text: ἵνα δὲ μὴ σκανδαλίσωμεν αὐτούς, πορευθεὶς ⸀εἰς θάλασσαν βάλε ἄγκιστρον καὶ τὸν ⸀ἀναβάντα πρῶτον ἰχθὺν ἆρον, καὶ ἀνοίξας τὸ στόμα αὐτοῦ εὑρήσεις στατῆρα· ἐκεῖνον λαβὼν δὸς αὐτοῖς ἀντὶ ἐμοῦ καὶ σοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/017/027.yaml
  text: But so that we may not offend them[a], go to the sea, cast in a hook, and take the first fish that comes up. And when you open its mouth, you will find a stater[b]. Take that and give it to them for me and for yourself.
  footnotes:
  - marker: a
    text: A stater was a coin roughly equal to four drachmas, enough to pay the temple tax for two people.
    reason: cultural_note
  - marker: b
    text: Or 'cause them to stumble' / 'give them offense.'
    reason: lexical_alternative
