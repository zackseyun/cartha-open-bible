translation:
  language: es
  text: Y lo llevé a tus discípulos[a], y no pudieron sanarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no pudieron sanarlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσήνεγκα
  english_pob_choice: brought
  chosen_spanish: llevé
  alternatives_spanish:
  - lo traje
  - lo presenté
  lexicon: BDAG
  rationale: El aoristo de προσφέρω aquí expresa llevar o traer a alguien a otra persona. En español, en primera persona narrativa, «lo llevé» conserva la acción de conducirlo hasta los discípulos de Jesús sin el tono más marcado de «presenté».
- source_word: τοῖς μαθηταῖς σου
  english_pob_choice: your disciples
  chosen_spanish: tus discípulos
  alternatives_spanish:
  - tus seguidores
  - tus alumnos
  lexicon: BDAG
  rationale: μαθητής en los Evangelios designa a los discípulos de un maestro. «Tus discípulos» es la equivalencia natural y precisa; «seguidores» o «alumnos» debilitan o desplazan el matiz técnico del término.
- source_word: ἠδυνήθησαν
  english_pob_choice: were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces de
  - no les fue posible
  lexicon: BDAG
  rationale: δύναμαι indica capacidad o posibilidad. «No pudieron» es la forma más natural en español y preserva la idea de incapacidad sin añadir explicaciones ajenas al versículo.
- source_word: θεραπεῦσαι
  english_pob_choice: to heal
  chosen_spanish: sanarlo
  alternatives_spanish:
  - curarlo
  - sanarlo
  lexicon: BDAG
  rationale: En este contexto de milagro, θεραπεύω se refiere a sanar. «Sanarlo» suena natural en español bíblico actual y mantiene el sentido de restauración física; «curarlo» es posible, pero menos idiomático en este registro.
- source_word: καὶ ... καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Entonces ... y
  - Y ... pero
  lexicon: BDAG
  rationale: La repetición de καί coordina el relato de manera simple. Mantener «y» en ambos miembros evita introducir contraste o explicaciones no presentes en el griego.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre se refiere al muchacho/enfermo del contexto inmediato. En español, «lo» es la forma natural de objeto directo y conserva la referencia sin recargar la frase.
theological_decisions:
- issue: Alcance de la incapacidad de los discípulos
  english_pob_reading: Render the statement simply as inability to heal, without adding explanation about lack of faith, authority, or exorcism method.
  chosen_spanish_reading: Traducir simplemente que no pudieron sanarlo, sin añadir explicación sobre falta de fe, autoridad o método de exorcismo.
  alternative_spanish_readings:
  - no pudieron expulsar al demonio
  - no pudieron sanarlo por su incredulidad
  rationale: Este versículo solo afirma incapacidad para sanar. Las explicaciones contextuales pertenecen a los versículos cercanos, pero no deben incorporarse aquí.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia; no se requieren revisiones adicionales. Se ha conservado la estructura coordinada simple del original y la ambigüedad contextual sobre el motivo del fracaso de los discípulos.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταῖς, en línea con el uso evangélico estándar.
  - Se evita introducir «Cristo» o terminología eclesiástica no presente en el versículo.
  - La alternancia verbal en primera persona («llevé») corresponde al hablante implícito del contexto inmediato y conserva la narración directa.
