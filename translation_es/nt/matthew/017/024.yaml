revisions:
- from: 'Cuando ellos llegaron a Capernaúm[a], se acercaron a Pedro los que cobraban los dos dracmas y dijeron[b]: «¿Su maestro no paga los dos dracmas?»'
  to: 'Cuando llegaron a Capernaúm[a], los que cobraban el impuesto de dos dracmas se acercaron a Pedro y dijeron[b]: «¿Su maestro no paga el impuesto de dos dracmas?»'
  rationale: La revisión alinea el español con la decisión léxica y teológica del POB inglés de hacer explícito en el texto principal que se trata del impuesto de dos dracmas, no solo de monedas. También elimina el pronombre sujeto innecesario y mejora el orden de la frase para un español más natural y digno. Se conserva en nota la literalidad griega «los dos dracmas» y una alternativa más técnica con «didracma».
