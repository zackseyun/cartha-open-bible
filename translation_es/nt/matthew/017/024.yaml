review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del griego: circunstancia temporal al llegar a Capernaúm, acercamiento a Pedro, identificación de los cobradores y pregunta negativa sobre el pago. Sin embargo, se aparta del rastro auditado del POB en un punto importante: el inglés documenta como decisión principal explicitar δίδραχμα como impuesto en el texto principal, mientras que el español vuelve a una forma meramente monetaria («los dos dracmas»). Eso debilita la fuerza contextual de τελεῖ y del episodio. También conviene evitar «ellos» innecesario y mejorar el orden español.'
  spanish_quality_summary: El español es claro y legible, pero puede sonar más natural y preciso con «Cuando llegaron» en vez de «Cuando ellos llegaron». La secuencia «se acercaron a Pedro los que cobraban...» es aceptable, pero «los que cobraban el impuesto de dos dracmas se acercaron a Pedro» fluye mejor. «Su maestro» puede funcionar, pero en diálogo directo contemporáneo y neutral «su maestro» es ambiguo entre singular formal y plural; «el maestro de ustedes» sería demasiado pesado, así que se puede mantener «su maestro».
  glossary_alignment: No hay conflictos con Yahvé/Mesías/etc. El punto terminológico clave aquí es δίδραχμα. Según la decisión léxica y teológica auditada en inglés, la opción por defecto debe reflejar el sentido fiscal contextual en el texto principal. En español, «impuesto de dos dracmas» preserva mejor esa decisión que «los dos dracmas». La nota puede seguir preservando la literalidad griega.
  issues:
  - severity: medium
    issue: δίδραχμα se vierte en el texto principal como «los dos dracmas» en vez de «impuesto de dos dracmas».
    rationale: El POB inglés documenta explícitamente la decisión principal de traducir el sentido contextual como impuesto, no solo la cantidad monetaria. El español actual retrocede a una literalidad menos fiel al rastro auditado y deja más opaca la pregunta «no paga».
  - severity: low
    issue: Uso innecesario de «ellos» en «Cuando ellos llegaron».
    rationale: El sujeto ya está claro por el contexto y el español natural suele omitir el pronombre. Mantenerlo no es incorrecto, pero sí menos idiomático.
  - severity: low
    issue: El orden «se acercaron a Pedro los que cobraban...» es menos natural que anteponer el sujeto.
    rationale: No traiciona el griego, pero una reorganización leve mejora la fluidez en español sin perder sentido.
