translation:
  language: es
  text: 'Cuando llegaron a Capernaúm[a], los que cobraban el impuesto de dos dracmas se acercaron a Pedro y dijeron[b]: «¿Su maestro no paga el impuesto de dos dracmas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los dos dracmas»; es decir, el impuesto del templo de dos dracmas.'
    reason: cultural_note
  - marker: b
    text: 'O: «los recaudadores del impuesto del didracma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλθόντων δὲ αὐτῶν
  english_pob_choice: When they came
  chosen_spanish: Cuando ellos llegaron
  alternatives_spanish:
  - Después de que llegaron
  - Y cuando llegaron
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una circunstancia temporal. «Cuando ellos llegaron» conserva ese valor con español natural; «ellos» explicita el sujeto implícito para evitar ambigüedad. El δέ se deja sin equivalente léxico fuerte, como transición suave.
- source_word: Καφαρναοὺμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Capernaum
  lexicon: Onomástica estándar
  rationale: Se mantiene la transliteración del topónimo en forma usual en español, con tilde conforme a la acentuación española.
- source_word: προσῆλθον
  english_pob_choice: came to
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron a
  - fueron hacia
  lexicon: BDAG
  rationale: El verbo indica movimiento hacia Pedro; «se acercaron» comunica bien la acción y evita la repetición incómoda de «vinieron a» en español.
- source_word: οἱ τὰ δίδραχμα λαμβάνοντες
  english_pob_choice: those who collected the two-drachma tax
  chosen_spanish: los que cobraban los dos dracmas
  alternatives_spanish:
  - los recaudadores de los dos dracmas
  - los que recogían los dos dracmas
  lexicon: BDAG
  rationale: La frase participial identifica a un grupo por su función. «Cobraban» expresa el acto de recaudar y permite conservar el valor monetario del griego sin forzar una explicación interpretativa dentro del texto principal.
- source_word: δίδραχμα
  english_pob_choice: two-drachma tax
  chosen_spanish: los dos dracmas
  alternatives_spanish:
  - el impuesto de dos dracmas
  - los didracmas
  lexicon: BDAG
  rationale: El griego dice literalmente «los dos dracmas». En el contexto se trata del pago exigido, pero el término en sí es monetario; por eso el texto principal conserva la expresión directa y la nota aclara la función de impuesto/censo del templo.
- source_word: τῷ Πέτρῳ
  english_pob_choice: to Peter
  chosen_spanish: a Pedro
  alternatives_spanish:
  - a Pedro
  lexicon: Nombre propio
  rationale: Dativo de destinatario normal en español con la preposición «a».
- source_word: Ὁ διδάσκαλος ὑμῶν
  english_pob_choice: your teacher
  chosen_spanish: su maestro
  alternatives_spanish:
  - su maestro/maestra
  - su maestro de ustedes
  lexicon: BDAG
  rationale: «Maestro» es el equivalente natural de διδάσκαλος aquí. Se usa «su» porque el griego plural funciona como «de ustedes»; en español bíblico fluido, «su maestro» comunica la relación sin recargar la frase.
- source_word: οὐ τελεῖ
  english_pob_choice: Does ... not pay
  chosen_spanish: no paga
  alternatives_spanish:
  - no satisface
  - no cancela
  lexicon: BDAG
  rationale: En este contexto τελέω significa pagar una obligación. En una pregunta negativa en español, «no paga» reproduce bien la fuerza interrogativa sin añadir elementos innecesarios.
- source_word: τὰ δίδραχμα
  english_pob_choice: the two-drachma tax
  chosen_spanish: los dos dracmas
  alternatives_spanish:
  - el impuesto de dos dracmas
  - los didracmas
  lexicon: BDAG
  rationale: Se conserva la unidad de cuenta del texto griego. La interpretación como impuesto se documenta en nota para no borrar la tensión entre el valor literal y su función contextual.
theological_decisions:
- issue: Identificación de δίδραχμα como impuesto del templo frente a simple cantidad monetaria
  english_pob_reading: Render as 'two-drachma tax' in the main text
  chosen_spanish_reading: Mantener en el texto principal «los dos dracmas» y explicarlo como el impuesto de dos dracmas en la nota
  alternative_spanish_readings:
  - el impuesto de dos dracmas
  - el tributo de dos dracmas
  - los didracmas
  rationale: El griego usa una expresión monetaria literal, pero el contexto narrativo trata del cobro de una obligación. Para no borrar esa tensión, el texto principal conserva la forma directa y la nota aclara la función fiscal/templaria.
  doctrine_reference: Principio de equivalencia óptima y transparencia textual; la aclaración contextual no altera la base léxica del griego.
translation_notes:
  revision_awareness: El inglés POB resuelve la expresión como «two-drachma tax» y ofrece como alternativa «collectors of the didrachma tax». En esta versión española se preserva la lectura literal del monto en el texto principal y se traslada la aclaración contextual a la nota, manteniendo auditable la tensión entre cantidad monetaria y obligación fiscal.
  spanish_consistency_notes:
  - Se usa «Capernaúm» con tilde, conforme a la ortografía española.
  - Se mantiene «dracmas» para el valor monetario y no se introduce «didracma» en el cuerpo del texto.
  - «su maestro» refleja el posesivo plural del griego sin sobreespecificar género o número en español.
  - Se evita «Señor» o «Maestro» como título litúrgico; aquí διδάσκαλος es una referencia funcional a un maestro/maestro de ellos.
