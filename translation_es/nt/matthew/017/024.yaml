    reason: cultural_note
  - marker: b
    text: 'O: «los recaudadores del impuesto del didracma».'
    reason: lexical_alternative
  revision_rationale: La revisión alinea el español con la decisión léxica y teológica del POB inglés de hacer explícito en el texto principal que se trata del impuesto de dos dracmas, no solo de monedas. También elimina el pronombre sujeto innecesario y mejora el orden de la frase para un español más natural y digno. Se conserva en nota la literalidad griega «los dos dracmas» y una alternativa más técnica con «didracma».
