translation:
  language: es
  text: Pero[a] esta clase no sale sino con oración y ayuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos (incluidos Sinaítico y Vaticano, del siglo IV) y en antiguas traducciones siríacas y coptas, pero está presente en la tradición mayoritaria bizantina, en la tradición latina y en la mayoría de los testigos siríacos. Probablemente fue añadido después por escribas para armonizarlo con Marcos 9:29.
    reason: textual_variant
lexical_decisions:
- source_word: γένος
  english_pob_choice: kind
  chosen_spanish: clase
  alternatives_spanish:
  - tipo
  - género
  - linaje
  lexicon: BDAG
  rationale: En este contexto se refiere a una categoría de demonios; en español, "clase" transmite bien la idea de grupo o categoría sin cargar una connotación biológica o social innecesaria.
- source_word: ἐκπορεύεται
  english_pob_choice: come out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale de
  - se expulsa
  lexicon: BDAG
  rationale: La imagen es la salida/expulsión del demonio; "sale" reproduce de manera natural y precisa el movimiento verbal del original en español.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino mediante
  alternatives_spanish:
  - excepto por
  - salvo por
  - a menos que sea por
  lexicon: BDAG
  rationale: La construcción española más natural para esta exclusión instrumental es "sino mediante", que mantiene la fuerza exclusiva de la frase preposicional final.
- source_word: προσευχῇ
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - oraciones
  lexicon: BDAG
  rationale: '"Oración" es el equivalente normal y reverente en español bíblico para la comunicación orante con Dios.'
- source_word: νηστείᾳ
  english_pob_choice: fasting
  chosen_spanish: ayuno
  alternatives_spanish:
  - abstinencia
  - ayunos
  lexicon: BDAG
  rationale: '"Ayuno" conserva el sentido religioso concreto del término y es la forma estándar y clara en español.'
theological_decisions:
- issue: Estatus textual del versículo
  english_pob_reading: This verse is absent from the earliest Greek manuscripts ... but is present in the Byzantine majority tradition ... likely added by later scribes to harmonize with Mark 9:29.
  chosen_spanish_reading: Versículo incluido en el texto principal con nota textual de variante/ausencia en manuscritos tempranos.
  alternative_spanish_readings:
  - omitir el versículo del texto principal
  - encerrarlo solo en nota
  rationale: Dado que la tradición base es bizantina y el POB inglés conserva el versículo con advertencia textual, el español debe mantenerlo en el texto principal y marcar su estado textual con una nota fiel y transparente.
  doctrine_reference: Crítica textual del Nuevo Testamento; armonización con Marcos 9:29.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto inglés final quedó sin modificaciones, con acuerdo alto en la evaluación cruzada. La redacción española sigue de cerca el valor semántico del griego bizantino y conserva la advertencia textual del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico natural de "oración" y "ayuno" en lugar de tecnicismos modernos.
  - '"Clase" fue elegido para γένος por su neutralidad y claridad; no se usa "raza" para evitar un matiz ajeno al contexto demonológico.'
  - La nota textual usa formulación transparente y breve, alineada con la práctica POB de no ocultar variantes relevantes.
