translation:
  language: es
  text: y lo matarán, y al tercer día será levantado[a]. Y se entristecieron mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «resucitará». El verbo griego está en voz pasiva: «será levantado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκτενοῦσιν
  english_pob_choice: they will kill
  chosen_spanish: lo matarán
  alternatives_spanish:
  - lo pondrán a muerte
  - lo asesinarán
  lexicon: BDAG
  rationale: El verbo futuro activo plural de ἀποκτείνω expresa muerte intencional. «Matarán» es el equivalente más directo y natural en español. «Pondrán a muerte» es más formal; «asesinarán» añade una imputación moral no explícita en el verbo griego.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre acusativo masculino singular se refiere a Jesús. En español, el clítico objeto directo «lo» es la forma más natural y compacta.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - después de tres días
  lexicon: BDAG
  rationale: La frase dativa de tiempo se expresa de manera idiomática en español como «al tercer día», preservando el sentido temporal sin expandir el texto.
- source_word: ἐγερθήσεται
  english_pob_choice: he will be raised
  chosen_spanish: será levantado[a]
  alternatives_spanish:
  - resucitará
  - se levantará
  lexicon: BDAG
  rationale: El futuro pasivo de ἐγείρω se refleja mejor con una construcción pasiva en español. «Será levantado» preserva la voz pasiva y deja visible la acción recibida. «Resucitará» comunica el sentido, pero pierde la forma pasiva; «se levantará» puede sonar más activo/medio y menos preciso.
- source_word: ἐλυπήθησαν σφόδρα
  english_pob_choice: they were deeply grieved
  chosen_spanish: se entristecieron mucho
  alternatives_spanish:
  - estaban muy tristes
  - se afligieron profundamente
  lexicon: BDAG
  rationale: El aoristo de λυπέω expresa una reacción de dolor o tristeza. «Se entristecieron mucho» conserva la respuesta afectiva con español claro y digno. «Afligieron profundamente» suena más marcado, pero menos natural; «estaban muy tristes» no refleja tan bien el carácter puntual del aoristo.
theological_decisions:
- issue: Pasiva de ἐγερθήσεται en la predicción de la resurrección
  english_pob_reading: he will be raised
  chosen_spanish_reading: será levantado
  alternative_spanish_readings:
  - resucitará
  - se levantará
  rationale: Se conserva la voz pasiva para reflejar el griego y la acción divina implícita en la resurrección. La alternativa activa «resucitará» es correcta en sentido, pero suaviza la forma verbal; «se levantará» puede sonar ambiguo en español.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego SBLGNT y concuerda con el audit trail inglés: verbo futuro activo para la muerte, dativo temporal expresado con naturalidad en español, pasiva conservada en la predicción de la resurrección y una traducción idiomática del dolor intenso final. No se requieren revisiones adicionales según el estado de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «lo» para el objeto directo masculino singular, en paralelo con el referente implícito de Jesús.
  - «Al tercer día» conserva la temporalidad exacta sin añadir explicaciones no presentes en el texto.
  - Se evita «Cristo» o «SEÑOR» porque el versículo no contiene esos términos en el fuente griego.
  - La nota [a] se usa solo para la alternativa interpretativa de la pasiva griega en ἐγερθήσεται.
