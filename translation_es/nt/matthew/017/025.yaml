  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: respuesta afirmativa, entrada en la casa, iniciativa de Jesús antes de que Pedro hable, pregunta introductoria a Simón, y contraste entre dos tipos de gravamen y entre los propios hijos y los de fuera. Sin embargo, no preserva del todo el rastro de notas del POB en dos puntos clave: la nota [a] se desplazó indebidamente de los impuestos a «dijo», y la nota [b] se desplazó de ἀλλοτρίων («otros/extraños») a «¿Qué te parece?». Además, «sus propios hijos» debilita la especificidad de υἱῶν como «hijos varones/sons», que en este contexto conviene conservar como «sus propios hijos» o mejor «sus propios hijos» con nota no es necesario; pero el mayor problema es la ubicación y contenido de las notas.'
