  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La distinción entre τέλη y κῆνσον se mantiene adecuadamente con «impuestos[a] o impuesto de capitación». «Jesús» y «Simón» están correctos. La elección «de otros[b]» es aceptable para ἀλλοτρίων, siempre que la nota preserve la alternativa «de extraños» y explique el matiz de ajenos a la familia.
