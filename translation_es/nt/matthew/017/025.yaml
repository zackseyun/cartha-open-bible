translation:
  language: es
  text: 'Él dijo: «Sí». Y cuando entró en la casa, Jesús le habló primero, diciendo: «¿Qué te parece, Simón? ¿De quiénes cobran los reyes de la tierra impuestos[a] o impuesto de capitación: de sus propios hijos o de otros[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aranceles o tributo». El griego distingue entre τέλη (impuestos indirectos, aranceles o tasas) y κῆνσος (impuesto de capitación, tributo personal).
    reason: lexical_alternative
  - marker: b
    text: O «de extraños». El griego ἀλλοτρίων se refiere a los que no son de la propia familia, es decir, a personas ajenas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Claro
  - Ciertamente
  lexicon: BDAG
  rationale: La respuesta afirmativa breve se expresa con el equivalente natural y directo «Sí».
- source_word: ἐλθόντα εἰς τὴν οἰκίαν
  english_pob_choice: when he came into the house
  chosen_spanish: cuando entró en la casa
  alternatives_spanish:
  - cuando llegó a la casa
  - después de entrar en la casa
  lexicon: BDAG
  rationale: La construcción participial se vuelve una cláusula temporal natural en español; «entró» comunica bien la llegada a la casa sin forzar la sintaxis.
- source_word: προέφθασεν αὐτὸν
  english_pob_choice: spoke to him first
  chosen_spanish: le habló primero
  alternatives_spanish:
  - se adelantó a hablarle
  - lo abordó antes de que él hablara
  lexicon: BDAG
  rationale: El verbo expresa iniciativa anticipada; «le habló primero» conserva esa idea de forma clara y fluida en español.
- source_word: Τί σοι δοκεῖ
  english_pob_choice: What do you think
  chosen_spanish: ¿Qué te parece?
  alternatives_spanish:
  - ¿Qué piensas?
  - ¿Qué opinas?
  lexicon: BDAG
  rationale: La pregunta idiomática pide el juicio de Simón; «¿Qué te parece?» es una equivalencia natural que mantiene el tono interrogativo.
- source_word: οἱ βασιλεῖς τῆς γῆς
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes terrenales
  - los reyes del mundo
  lexicon: BDAG
  rationale: Se conserva la referencia amplia de γῆ como «tierra», siguiendo de cerca el alcance del original.
- source_word: τέλη
  english_pob_choice: duties
  chosen_spanish: los impuestos
  alternatives_spanish:
  - los aranceles
  - las tasas
  lexicon: BDAG
  rationale: En español general, «impuestos» comunica bien la idea de gravámenes indirectos o cargas fiscales; el contexto y la nota preservan la distinción lexical con κῆνσος.
- source_word: κῆνσον
  english_pob_choice: poll tax
  chosen_spanish: el impuesto de capitación
  alternatives_spanish:
  - el tributo personal
  - el impuesto por cabeza
  lexicon: BDAG
  rationale: Se opta por una expresión precisa y comprensible que distingue este gravamen del término anterior; la nota conserva la alternativa de ‘tributo’.},{
theological_decisions:
- issue: Distinción entre τέλη y κῆνσος
  english_pob_reading: The Greek distinguishes τέλη (duties/customs) from κῆνσος (poll tax, tribute tax).
  chosen_spanish_reading: El español distingue «impuestos» e «impuesto de capitación», manteniendo la diferencia entre ambos términos griegos.
  alternative_spanish_readings:
  - «aranceles o tributo»
  - «tasas o capitación»
  rationale: No conviene fusionar ambos términos en una sola palabra española porque el texto quiere conservar dos clases de gravamen. La formulación elegida preserva esa tensión léxica con claridad.
  doctrine_reference: Translation philosophy §§3-4
- issue: Valor de ἀλλοτρίων en el contraste familiar
  english_pob_reading: ἀλλοτρίων refers to those who are not one's own family, that is, outsiders.
  chosen_spanish_reading: «de otros» mantiene el contraste inmediato con «sus propios hijos» y deja abierta la nota explicativa.
  alternative_spanish_readings:
  - «de extraños»
  - «de forasteros»
  rationale: En el cuerpo del texto, «de otros» es natural y suficientemente amplio; la nota puede precisar que el griego alude a personas ajenas al hogar o familia.
  doctrine_reference: Translation philosophy §§3-4
- issue: Lenguaje filial en la analogía
  english_pob_reading: Retain the literal familial language 'their own sons' without expanding its christological implication in the main text.
  chosen_spanish_reading: «sus propios hijos» conserva el lenguaje familiar sin explicar todavía la implicación cristológica.
  alternative_spanish_readings:
  - «sus propios hijos varones»
  - «sus hijos»
  rationale: Aunque υἱῶν es literalmente ‘hijos varones / hijos’, en español «hijos» comunica la relación familiar de modo natural y permite mantener la analogía sin sobreinterpretarla. Se conserva la fuerza del contraste con «otros».
  doctrine_reference: Translation philosophy §§3-4
translation_notes:
  revision_awareness: Se revisó el ajuste entre la secuencia griega y la redacción española para mantener la iniciativa de Jesús («le habló primero») y la doble distinción fiscal («impuestos» / «impuesto de capitación»). No se incorporaron cambios textuales adicionales respecto del pasaje fuente.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς y «Simón» para Σίμων.
  - Se evitó usar «SEÑOR» o equivalentes cultuales no presentes en el texto.
  - Se conservó el tono interrogativo directo y la estructura en dos miembros de la pregunta final.
  - «De otros» se mantuvo en el texto principal por naturalidad; la nota explica su sentido como outsiders/fuera del círculo familiar.
