base_translation:
  language: en
  yaml_path: translation/nt/matthew/017/025.yaml
  text: He said[a], “Yes.” And when he came into the house, Jesus spoke to him first, saying, “What do you think[b], Simon? From whom do the kings of the earth collect duties or poll tax—from their own sons or from others?”
  footnotes:
  - marker: a
    text: Or “customs or tribute.” The Greek distinguishes τέλη (duties/customs) from κῆνσος (poll tax, tribute tax).
    reason: lexical_alternative
  - marker: b
    text: Or “from strangers.” The Greek ἀλλοτρίων refers to those who are not one's own family, that is, outsiders.
    reason: lexical_alternative
