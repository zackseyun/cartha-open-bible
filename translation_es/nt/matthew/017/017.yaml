translation:
  language: es
  text: 'Pero Jesús respondió[a]: «¡Oh generación incrédula[b] y perversa[c], ¿hasta cuándo estaré con ustedes? ¿Hasta cuándo los soportaré[d]? Tráiganmelo aquí»!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contestó». El griego usa un giro idiomático que literalmente es «respondiendo… dijo».
    reason: lexical_alternative
  - marker: b
    text: O «sin fe». El adjetivo griego puede significar «incrédula» o «sin fe».
    reason: lexical_alternative
  - marker: c
    text: O «torcida» o «corrupta».
    reason: lexical_alternative
  - marker: d
    text: O «¿Hasta cuándo tendré que soportarlos?»
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ
  english_pob_choice: But ... answered
  chosen_spanish: Pero ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Entonces ... respondió
  lexicon: BDAG
  rationale: El participio con δέ funciona como giro narrativo y de contraste; en español, «Pero» conserva bien el cambio de tono hacia la reprensión. «Respondió» refleja el idiomático «answered» del audit trail sin forzar una repetición innecesaria de «dijo».
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús el
  lexicon: BDAG
  rationale: Se conserva el nombre propio de forma natural en español; el artículo griego no requiere reproducción explícita.
- source_word: Ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh
  alternatives_spanish:
  - O
  lexicon: BDAG
  rationale: La interjección vocativa solemniza la reprensión. En español «¡Oh» mantiene el tono elevado y profético.
- source_word: γενεὰ
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - gente
  - pueblo
  lexicon: BDAG
  rationale: «Generación» preserva la carga bíblica y profética del término, como en el texto inglés auditado.
- source_word: ἄπιστος
  english_pob_choice: unbelieving
  chosen_spanish: incrédula
  alternatives_spanish:
  - sin fe
  - infiel
  lexicon: BDAG
  rationale: En este contexto la falta de fe es central; «incrédula» comunica el valor de ἄπιστος con naturalidad en español y mantiene la tensión entre incredulidad y posible infidelidad sin resolverla de más.
- source_word: διεστραμμένη
  english_pob_choice: perverse
  chosen_spanish: perversa
  alternatives_spanish:
  - torcida
  - corrupta
  lexicon: BDAG
  rationale: El adjetivo describe una condición moral torcida o desviada. «Perversa» sigue el registro formal del POB inglés revisado y suena natural en español bíblico; «torcida» y «corrupta» siguen siendo alternativas válidas.
- source_word: ἕως πότε
  english_pob_choice: how long
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿hasta cuándo será?
  - ¿por cuánto tiempo?
  lexicon: BDAG
  rationale: Es la equivalente idiomática natural en español para la expresión temporal interrogativa.
- source_word: μεθ’ ὑμῶν ἔσομαι
  english_pob_choice: will I be with you
  chosen_spanish: estaré con ustedes
  alternatives_spanish:
  - he de estar con ustedes
  - me quedaré con ustedes
  lexicon: BDAG
  rationale: La futura de εἰμί con μετά + genitivo se expresa de forma directa como «estaré con ustedes». Se mantiene la retórica de la pregunta sin añadir interpretación.
- source_word: ἀνέξομαι ὑμῶν
  english_pob_choice: will I bear with you
  chosen_spanish: tendré que soportarlos
  alternatives_spanish:
  - los aguantaré
  - los toleraré
  lexicon: BDAG
  rationale: «Soportarlos» transmite la idea de aguantar o soportar con exasperación. Se añade «tendré que» para reflejar el matiz de la pregunta retórica y el esfuerzo implícito de ἀνέχομαι, sin convertirlo en una paráfrasis demasiado libre.
- source_word: φέρετέ μοι αὐτὸν ὧδε
  english_pob_choice: Bring him here to me
  chosen_spanish: Tráiganmelo aquí
  alternatives_spanish:
  - Tráiganlo aquí
  - Tráiganmelo
  lexicon: BDAG
  rationale: El imperativo plural se expresa naturalmente con «Tráiganmelo». «Aquí» reproduce ὧδε; el clítico de objeto directo e indirecto integra en español la idea de «to me» y «him» en una forma idiomática.
theological_decisions:
- issue: ἄπιστος en la reprensión de Jesús
  english_pob_reading: unbelieving
  chosen_spanish_reading: incrédula
  alternative_spanish_readings:
  - sin fe
  - infiel
  rationale: El contexto inmediato gira en torno a la incapacidad de los discípulos para actuar con fe. «Incrédula» preserva ese énfasis y evita cargar el texto con una lectura más amplia de infidelidad pactual que el versículo no exige por sí mismo.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: διεστραμμένη como juicio moral
  english_pob_reading: perverse
  chosen_spanish_reading: perversa
  alternative_spanish_readings:
  - torcida
  - corrupta
  rationale: La expresión conserva una acusación moral seria sin suavizarla. «Perversa» mantiene la fuerza del reproche y evita diluir el término en un valor meramente psicológico o social.
  doctrine_reference: Translation philosophy §3, preserve lexical force
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, adoptando la revisión más reciente para ἀνέξομαι como un verbo de soportar/aguantar en registro formal. Se evitó mecanizar el inglés cuando el español exige una integración más idiomática de los pronombres en el imperativo final.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio sin artículo.
  - «Generación» conserva el uso bíblico-propético del término.
  - Se eligió «incrédula» para ἄπιστος, manteniendo la tensión con la alternativa semántica «sin fe».
  - Se eligió «perversa» para διεστραμμένη, en consonancia con la revisión inglesa más reciente.
  - El clítico combinado en «Tráiganmelo» refleja naturalmente el doble objeto del original.
