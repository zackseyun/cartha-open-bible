base_translation:
  language: en
  yaml_path: translation/nt/matthew/017/017.yaml
  text: But Jesus answered[a], “O unbelieving and perverse generation[c][b], how long will I be with you? How long will I bear with you? Bring him here to me.”
  footnotes:
