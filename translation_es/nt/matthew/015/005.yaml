translation:
  language: es
  text: 'Pero ustedes dicen: «Quien diga a su padre o a su madre: “Cualquier cosa con la que yo pudiera ayudarte es un regalo[a]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda». El sentido es que lo que pudiera haberse usado para ayudar a los padres se declara dedicado a Dios; compárese Marcos 7:11, donde aparece el término «Corbán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δὲ λέγετε
  english_pob_choice: But you say
  chosen_spanish: Pero ustedes dicen
  alternatives_spanish:
  - Pero ustedes están diciendo
  - Y ustedes dicen
  lexicon: BDAG
  rationale: δὲ marca contraste con la cita anterior, por lo que «Pero» conserva bien el matiz adversativo. Se usa «ustedes» para reflejar el sujeto enfático ὑμεῖς. El presente «dicen» expresa el valor general del dicho en español natural.
- source_word: Ὃς ἂν εἴπῃ
  english_pob_choice: Whoever says
  chosen_spanish: Quien diga
  alternatives_spanish:
  - Quienquiera que diga
  - Si alguien dice
  lexicon: BDAG
  rationale: La construcción con ὅς ἄν + subjuntivo aoristo expresa una condición indefinida/general. «Quien diga» comunica esa generalidad de forma idiomática en español sin perder el carácter hipotético.
- source_word: τῷ πατρὶ ἢ τῇ μητρί
  english_pob_choice: to his father or his mother
  chosen_spanish: a su padre o a su madre
  alternatives_spanish:
  - al padre o a la madre
  - a padre o madre
  lexicon: BDAG
  rationale: En español, el posesivo explícito no es necesario y puede sonar más natural omitirlo; el sentido queda claro por el contexto y por el sujeto singular implícito de Ὃς. Se mantiene la relación filial directa del dativo.
- source_word: Δῶρον
  english_pob_choice: a gift
  chosen_spanish: es un regalo
  alternatives_spanish:
  - es una ofrenda
  - es un don
  lexicon: BDAG
  rationale: δῶρον puede significar «regalo» u «ofrenda». Aquí la referencia es a algo declarado dedicado a Dios, pero Mateo usa δῶρον y no el término técnico de Marcos. Por eso el texto principal conserva la equivalencia básica «regalo», con posibilidad interpretativa en nota.
- source_word: ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς
  english_pob_choice: Whatever you would have benefited from me
  chosen_spanish: Cualquier cosa de la que habrías sido beneficiado por mí
  alternatives_spanish:
  - Cualquier cosa que habrías recibido de ayuda de mí
  - Todo lo que habrías podido aprovechar de mí
  lexicon: BDAG
  rationale: La cláusula es difícil porque ἐξ ἐμοῦ conserva la orientación de procedencia («de mí / por mí») y ὠφεληθῇς es pasiva («ser beneficiado, ayudado»). La forma española busca mantener esa relación sintáctica sin forzar una paráfrasis excesiva. Se eligió un pasivo perifrástico para reflejar mejor el pasivo griego.
theological_decisions:
- issue: Si debe importarse el término técnico de Marcos («Corbán») en Mateo
  english_pob_reading: Retain Matthew's lexical wording with 'a gift' rather than inserting 'Corban'
  chosen_spanish_reading: Conservar la redacción de Mateo con «regalo» y no introducir «Corbán» en el texto principal
  alternative_spanish_readings:
  - Corbán
  - una ofrenda dedicada a Dios
  rationale: Mateo presenta δῶρον, no un transliterado técnico. Para respetar la primacía del texto fuente, el texto principal mantiene el término general y reserva la precisión cultual para una nota. Así se evita trasladar a Mateo una palabra que pertenece al paralelo de Marcos.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés, que refinó el orden de palabras de la cláusula final para preservar mejor el sentido de ἐξ ἐμοῦ ὠφεληθῇς. En español se reflejó esa mejora manteniendo la relación «de mí / por mí» y el valor pasivo de «ser beneficiado», sin añadir contenido ausente del griego.
  spanish_consistency_notes:
  - Se prefirió «regalo» en el texto principal por fidelidad a δῶρον, dejando «ofrenda» en nota como alternativa interpretativa.
  - Se evitó «Señor» o una expansión cultual no presente en el versículo.
  - Se mantuvo un español neutral y bíblico, pero sin arcaísmos innecesarios.
  - La puntuación con comillas angulares se ajusta a uso editorial en español; el marcador de nota [a] aparece en el lugar correspondiente.
