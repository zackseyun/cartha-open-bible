review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura contrastiva y la generalización indefinida del griego, y mantiene correctamente δῶρον como término no técnico en el texto principal con nota sobre «ofrenda/Corbán». Sin embargo, la cláusula ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς está vertida con un pasivo demasiado calcado e impropio en español («habrías sido beneficiado por mí»), y el conjunto de puntuación/comillas resulta poco natural.
  spanish_quality_summary: La redacción actual suena forzada y poco idiomática para lectura bíblica pública. «Cualquier cosa de la que habrías sido beneficiado por mí» no es español natural y oscurece el sentido de ayuda o provecho recibido del hablante. También conviene ajustar la puntuación interna de las comillas para mayor claridad y fluidez.
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. «Regalo» refleja aceptablemente δῶρον, aunque «ofrenda» se preserva bien en nota como alternativa. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: 'La cláusula final está calcada del inglés y del griego de forma poco natural: «Cualquier cosa de la que habrías sido beneficiado por mí».'
    rationale: Aunque intenta conservar el pasivo de ὠφεληθῇς y la procedencia de ἐξ ἐμοῦ, el resultado no es idiomático en español y dificulta la comprensión. Una formulación como «Cualquier cosa con la que yo pudiera ayudarte» o «Cualquier cosa de la que pudieras beneficiarte de mí» comunica mejor el sentido.
  - severity: low
    issue: Puntuación y comillas torpes en el discurso directo.
    rationale: El cierre actual de comillas y dos puntos produce una lectura entrecortada. Puede simplificarse con comillas españolas consistentes y puntuación interna más natural.
  - severity: low
    issue: La nota al pie está bien orientada, pero el anclaje [a] sobre «dicen» es menos preciso que anclarla a «regalo».
    rationale: La nota explica el valor léxico de δῶρον, por lo que idealmente debería anclarse donde aparece ese término. No obstante, mantener el marcador existente no impide la comprensión si se desea minimizar cambios estructurales.
  revised_spanish_text: 'Pero ustedes dicen: «Quien diga a su padre o a su madre: “Cualquier cosa con la que yo pudiera ayudarte es un regalo[a]”».'
  revised_footnotes:
  - marker: a
    text: O «ofrenda». El sentido es que lo que pudiera haberse usado para ayudar a los padres se declara dedicado a Dios; compárese Marcos 7:11, donde aparece el término «Corbán».
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente la cláusula ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς para lograr un español natural y claro sin perder el sentido de ayuda/provecho potencial procedente del hablante. «Con la que yo pudiera ayudarte» explicita adecuadamente el valor de beneficio recibido y evita un pasivo perifrástico impropio. También se mejora la puntuación y se reubica la nota al término relevante, δῶρον > «regalo».
