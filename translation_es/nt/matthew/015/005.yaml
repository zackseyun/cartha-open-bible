revisions:
- from: 'Pero ustedes dicen[a]: “Quien diga a su padre o a su madre: ‘Cualquier cosa de la que habrías sido beneficiado por mí, es un regalo’”.'
  to: 'Pero ustedes dicen: «Quien diga a su padre o a su madre: “Cualquier cosa con la que yo pudiera ayudarte es un regalo[a]”».'
  rationale: Se revisa principalmente la cláusula ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς para lograr un español natural y claro sin perder el sentido de ayuda/provecho potencial procedente del hablante. «Con la que yo pudiera ayudarte» explicita adecuadamente el valor de beneficio recibido y evita un pasivo perifrástico impropio. También se mejora la puntuación y se reubica la nota al término relevante, δῶρον > «regalo».
  reviewer_model: gpt-5.4
