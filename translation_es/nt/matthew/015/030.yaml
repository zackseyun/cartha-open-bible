translation:
  language: es
  text: Y grandes multitudes se acercaron a él, trayendo consigo a los mudos[a], los ciegos, los cojos, los lisiados[b], y a muchos otros, y los pusieron a sus pies, y él los sanó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sordos»; el griego κωφούς puede referirse a quienes son sordos, mudos o ambos, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «los mancos» o «los tullidos»; el griego κυλλούς se refiere en sentido amplio a personas con miembros impedidos o deformados.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσῆλθον
  english_pob_choice: came to
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se llegaron a él
  lexicon: BDAG
  rationale: El verbo expresa movimiento hacia Jesús; «se acercaron a él» conserva la dirección del acto sin sonar rígido en español.
- source_word: ὄχλοι πολλοὶ
  english_pob_choice: large crowds
  chosen_spanish: grandes multitudes
  alternatives_spanish:
  - muchas multitudes
  - multitudes grandes
  lexicon: BDAG
  rationale: «Multitudes» recoge el plural colectivo de ὄχλοι, y «grandes» transmite la amplitud numérica de πολλοὶ con naturalidad en español.
- source_word: ἔχοντες μεθ’ ἑαυτῶν
  english_pob_choice: bringing with them
  chosen_spanish: trayendo consigo
  alternatives_spanish:
  - llevando con ellos
  - teniendo consigo
  lexicon: BDAG
  rationale: La participio no solo indica posesión sino acompañamiento activo; «trayendo consigo» expresa mejor esa fuerza contextual que un calco literal.
- source_word: κωφούς
  english_pob_choice: the mute
  chosen_spanish: los mudos
  alternatives_spanish:
  - los sordos
  - los que no podían hablar
  lexicon: BDAG
  rationale: El término griego puede abarcar sordera, mutismo o ambos; aquí se mantiene «mudos», como opción contextual equivalente a la inglesa, preservando la ambigüedad con la nota.
- source_word: τυφλούς
  english_pob_choice: the blind
  chosen_spanish: los ciegos
  alternatives_spanish:
  - los que no veían
  lexicon: BDAG
  rationale: Renderización directa y natural de τυφλούς.
- source_word: χωλούς
  english_pob_choice: the lame
  chosen_spanish: los cojos
  alternatives_spanish:
  - los lisiados de las piernas
  - los que no podían caminar
  lexicon: BDAG
  rationale: «Cojos» mantiene la correspondencia tradicional y el sentido de impedimento para caminar, sin añadir explicación innecesaria al texto principal.
- source_word: κυλλούς
  english_pob_choice: the crippled
  chosen_spanish: los mancos
  alternatives_spanish:
  - los lisiados
  - los tullidos
  - los de miembros deformados
  lexicon: BDAG
  rationale: κυλλούς alude ampliamente a miembros impedidos o deformados; «mancos» es breve y comprensible en español, aunque menos amplio que el griego. Se deja constancia de la alternativa semántica en la nota para no borrar el matiz.
- source_word: ἑτέρους πολλούς
  english_pob_choice: many others
  chosen_spanish: muchos otros
  alternatives_spanish:
  - otros muchos
  - muchas otras personas
  lexicon: BDAG
  rationale: Equivalencia directa y natural del grupo adicional no especificado.
- source_word: ἔρριψαν
  english_pob_choice: they laid
  chosen_spanish: los echaron
  alternatives_spanish:
  - los pusieron
  - los colocaron
  - los dejaron
  lexicon: BDAG
  rationale: Aunque el verbo puede significar «arrojar», en este contexto describe el acto de depositarlos ante Jesús; «los echaron» conserva la fuerza del griego sin implicar crueldad, siguiendo la decisión contextual del POB inglés.
- source_word: παρὰ τοὺς πόδας αὐτοῦ
  english_pob_choice: at his feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - junto a sus pies
  - delante de él
  lexicon: BDAG
  rationale: La frase fija la escena de ponerlos en la presencia inmediata de Jesús; «a sus pies» es la manera natural en español.
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: los sanó
  alternatives_spanish:
  - los curó
  lexicon: BDAG
  rationale: «Sanó» es el verbo usual y reverente para θεραπεύω en relatos de sanidad, y se ajusta bien al registro bíblico en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se alinea con el estado auditado estable y conserva las mismas decisiones léxicas básicas, adaptadas al español con equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Jesús» implícitamente mediante el pronombre «él», siguiendo el referente inmediato del contexto narrativo.
  - Se conserva una lista clínica de condiciones, sin suavizar la fuerza descriptiva del griego.
  - La nota sobre κωφούς preserva la ambigüedad lexical sin resolverla de modo artificial.
  - La nota sobre κυλλούς evita reducir el alcance semántico del término griego a una sola lesión específica.
