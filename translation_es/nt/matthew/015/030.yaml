base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/030.yaml
  text: And large crowds came to him[a], bringing with them the mute, the blind, the lame, the crippled, and many others, and they laid them at his feet[b], and he healed them.
  footnotes:
  - marker: a
    text: Or 'the deaf'; the Greek κωφούς can refer to those who are deaf, mute, or both, depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the maimed' for 'the crippled'; the Greek κυλλούς refers broadly to those with impaired or deformed limbs.
    reason: lexical_alternative
