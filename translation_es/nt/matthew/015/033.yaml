translation:
  language: es
  text: 'Y le dijeron los discípulos: «¿De dónde podríamos conseguir tanto pan[a] en este lugar desolado[b], para saciar[c] a una multitud tan grande?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tantos panes»; aquí «pan» funciona como colectivo natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «en el desierto» / «en un lugar desierto».
    reason: lexical_alternative
  - marker: c
    text: O «alimentar»; el verbo griego puede significar alimentar hasta saciar o dejar satisfecho con comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ λέγουσιν
  english_pob_choice: And the disciples said
  chosen_spanish: Y le dijeron los discípulos
  alternatives_spanish:
  - Y los discípulos le dijeron
  - Y dijeron a él los discípulos
  lexicon: BDAG
  rationale: Se conserva el valor narrativo del presente histórico griego con un pretérito natural en español. El orden ‘le dijeron los discípulos’ mantiene el foco en los discípulos sin añadir ‘sus’ o ‘de Jesús’ que no están explícitos en el texto.
- source_word: μαθηταί
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo griego señala un grupo definido ya conocido por el contexto. En español, ‘los discípulos’ es suficiente y evita introducir un posesivo no expresado.
- source_word: Πόθεν
  english_pob_choice: Where could we get
  chosen_spanish: ¿De dónde podríamos conseguir
  alternatives_spanish:
  - ¿Dónde podríamos obtener
  - ¿De dónde tenemos
  lexicon: BDAG
  rationale: La pregunta apunta al origen/provisión. ‘Conseguir’ comunica bien la búsqueda de suministro en español y conserva la idea de obtener algo desde una fuente.
- source_word: ἄρτοι
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - hogazas
  - panes
  lexicon: BDAG
  rationale: Aunque literalmente significa ‘panes/loaves’, en español ‘pan’ funciona aquí como colectivo natural, tal como la POB inglesa usa ‘bread’ por fluidez. ‘Panes’ sería más literal, pero menos idiomático en esta pregunta.
- source_word: τοσοῦτοι
  english_pob_choice: enough / so many
  chosen_spanish: tanto
  alternatives_spanish:
  - tantos
  - una cantidad tan grande de
  lexicon: BDAG
  rationale: ‘Tanto’ permite expresar la cantidad indeterminada y enfática del griego sin forzar una equivalencia rígida. La frase completa preserva el matiz de insuficiencia de provisión.
- source_word: ἐν ἐρημίᾳ
  english_pob_choice: in this desolate place
  chosen_spanish: en este lugar desolado
  alternatives_spanish:
  - en el desierto
  - en un lugar desierto
  lexicon: BDAG
  rationale: ἐρημία describe un sitio despoblado o desierto. ‘Lugar desolado’ conserva la fuerza de ausencia de recursos y personas; no se limita a ‘desierto’ geográfico.
- source_word: χορτάσαι
  english_pob_choice: satisfy / feed fully
  chosen_spanish: saciar
  alternatives_spanish:
  - alimentar hasta el punto de quedar satisfechos
  - llenar
  lexicon: BDAG
  rationale: El verbo puede significar alimentar plenamente o dejar satisfecho con comida. ‘Saciar’ captura bien la idea de proveer suficientemente para quitar el hambre, como en la lectura inglesa de ‘satisfy’.
- source_word: ὄχλον τοσοῦτον
  english_pob_choice: so large a crowd
  chosen_spanish: a una multitud tan grande
  alternatives_spanish:
  - a tanta gente
  - a una muchedumbre tan grande
  lexicon: BDAG
  rationale: ὄχλος es ‘multitud/crowd’. ‘Multitud tan grande’ mantiene el énfasis cuantitativo de τοσοῦτον y suena natural en español contemporáneo.
theological_decisions:
- issue: ¿‘Pan’ o ‘panes’ para ἄρτοι?
  english_pob_reading: Literally ‘so many loaves,’ with ‘bread’ used here as a natural English collective.
  chosen_spanish_reading: ‘pan’ como colectivo natural, sin ocultar que el griego habla de ‘loaves/panes’.
  alternative_spanish_readings:
  - ‘tantos panes’
  - ‘tantas hogazas’
  rationale: No hay una diferencia doctrinal en juego, pero sí una decisión de estilo y fidelidad semántica. ‘Pan’ reproduce en español la misma colectivización que la POB inglesa hace con ‘bread’, sin perder la insuficiencia expresada por τοσοῦτοι.
  doctrine_reference: No aplica; decisión léxica/estilística.
- issue: 'Matiz de χορτάσαι: ¿‘alimentar’ o ‘saciar’?'
  english_pob_reading: Or ‘feed’; the Greek verb can mean to feed fully or satisfy with food.
  chosen_spanish_reading: ‘saciar’, con el posible matiz de alimentar plenamente.
  alternative_spanish_readings:
  - ‘alimentar’
  - ‘llenar’
  rationale: La POB inglesa preserva la tensión entre ‘feed’ y ‘satisfy’. En español, ‘saciar’ comunica bien la plenitud de provisión; puede leerse también con el trasfondo de alimentar completamente, sin reducir el verbo a simple distribución de comida.
  doctrine_reference: No aplica; decisión semántica del verbo.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales. Esta propuesta mantiene la misma lectura de sentido que el audit trail inglés, pero adapta la formulación al español con naturalidad y sin perder los matices de cantidad, lugar desolado y saciar plenamente.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino por defecto, aunque este versículo no lo contiene.
  - Se usa ‘discípulos’ sin posesivo porque el griego no lo explicita y el contexto ya identifica al grupo.
  - Se evita ‘SEÑOR’ u otras máscaras teológicas no pertinentes aquí.
  - ‘Desolado’ conserva la idea de ἐρημία sin sobredeterminarla como desierto geográfico estricto.
  - ‘Saciar’ refleja el verbo griego con suficiente amplitud para la alimentación completa.
