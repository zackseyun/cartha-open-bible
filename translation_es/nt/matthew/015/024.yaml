translation:
  language: es
  text: 'Pero él respondió[a]: «No fui enviado sino a las ovejas perdidas de la casa de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No fui enviado excepto a las ovejas perdidas de la casa de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἀποκριθεὶς εἶπεν
  english_pob_choice: But he answered
  chosen_spanish: Pero él respondió
  alternatives_spanish:
  - Y él respondió
  - Entonces respondió
  lexicon: BDAG
  rationale: El participio aoristo ἀποκριθεὶς con εἶπεν se vierte de forma idiomática en español como una respuesta directa. «Respondió» conserva la función narrativa sin sobrecargar el texto; se mantiene el contraste de δέ con «Pero».
- source_word: Οὐκ ἀπεστάλην
  english_pob_choice: I was sent
  chosen_spanish: No fui enviado
  alternatives_spanish:
  - No he sido enviado
  lexicon: BDAG
  rationale: El aoristo pasivo de ἀποστέλλω expresa comisión/envío en pasado narrativo. En español, el pretérito simple pasivo («fui enviado») reproduce bien la acción puntual y la formulación de misión.
- source_word: εἰ μὴ
  english_pob_choice: only
  chosen_spanish: sino
  alternatives_spanish:
  - solo para
  - excepto para
  lexicon: BDAG
  rationale: La construcción restrictiva εἰ μὴ se expresa naturalmente en español con «sino», que conserva la exclusión explícita sin suavizarla. Aquí evita una paráfrasis que atenúe la limitación del enunciado.
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - borregos
  - corderos
  lexicon: BDAG
  rationale: Se conserva la metáfora pastoral con «ovejas», el equivalente normal y claro en español para πρόβατα. No se sustituye por un término más explicativo para no perder la imagen bíblica.
- source_word: ἀπολωλότα
  english_pob_choice: lost
  chosen_spanish: perdidas
  alternatives_spanish:
  - extraviadas
  - descarriadas
  lexicon: BDAG
  rationale: El participio perfecto de ἀπόλλυμι funciona aquí adjetivalmente; «perdidas» reproduce el valor metafórico establecido por la tradición textual y por el contexto de ovejas extraviadas, sin intensificarlo como «destruidas».
- source_word: οἴκου Ἰσραήλ
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el hogar de Israel
  - la familia de Israel
  lexicon: BDAG
  rationale: «La casa de Israel» conserva el giro bíblico y su resonancia pactual/nacional. Se evita una reformulación más doméstica que diluiría el carácter idiomático del genitivo griego.
theological_decisions:
- issue: Alcance de la misión declarada por Jesús en esta frase
  english_pob_reading: Render the statement straightforwardly as a limitation of his earthly mission to Israel in this context, without softening or expanding it in translation.
  chosen_spanish_reading: 'Traducirla de forma directa como una limitación de su misión en este contexto: «No fui enviado sino a...», sin convertirla en una prioridad implícita ni añadir el envío a las naciones.'
  alternative_spanish_readings:
  - «Fui enviado primero a...», que suaviza la restricción
  - «Mi misión es para...», que interpreta en vez de traducir
  rationale: El griego es restrictivo (οὐκ ... εἰ μὴ). La traducción española debe preservar esa tensión narrativa tal como está, sin resolverla mediante una expansión doctrinal o canónica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Revisión actual sin cambios sustanciales respecto del último pase; el resultado mantiene alta concordancia con el audit trail inglés y conserva la restricción explícita del enunciado.
  spanish_consistency_notes:
  - Se mantiene «casa de Israel» por su resonancia bíblica estable y porque evita una paráfrasis menos precisa.
  - «Ovejas perdidas» conserva la metáfora pastoral sin aclaraciones interpretativas adicionales.
  - La puntuación española usa comillas angulares y dos puntos conforme a uso editorial estándar.
