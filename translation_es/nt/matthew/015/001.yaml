translation:
  language: es
  text: 'Entonces los fariseos y los escribas de Jerusalén vienen a Jesús[a], diciendo[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se acercan a Jesús».
    reason: lexical_alternative
  - marker: b
    text: «Escribas» también puede entenderse aquí como «expertos en la ley» o «maestros de la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marcador temporal narrativo que introduce el episodio siguiente; «Entonces» conserva la fluidez del relato y equivale naturalmente al «Then» inglés del POB.
- source_word: προσέρχονται
  english_pob_choice: come to
  chosen_spanish: vienen a
  alternatives_spanish:
  - se acercan a
  - se aproximan a
  lexicon: BDAG
  rationale: El verbo griego expresa movimiento hacia Jesús. «Vienen a» es idiomático en español y mantiene la direccionalidad sin forzar un calco.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hacia Jesús
  lexicon: BDAG
  rationale: El dativo con προσέρχομαι señala al destinatario del movimiento. En español, la preposición más natural es «a».
- source_word: ἀπὸ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  - procedentes de Jerusalén
  lexicon: BDAG
  rationale: ἀπό indica origen o procedencia. «Desde Jerusalén» conserva bien ese matiz y suena natural en español.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - Fariseos
  lexicon: BDAG
  rationale: Nombre establecido del grupo judío; en español se adapta la forma como sustantivo común plural reconocido.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - expertos en la ley
  - maestros de la ley
  lexicon: BDAG
  rationale: POB conserva el valor léxico de «scribes»; «escribas» es el equivalente más directo y transparente. Las alternativas explicitan la función interpretativa, pero añaden glosa.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: Participio presente que enlaza con el discurso siguiente. «Diciendo» preserva la relación participial sin introducir una paráfrasis.
theological_decisions:
- issue: Presente histórico narrativo
  english_pob_reading: Retain present-tense narration ('come') in English
  chosen_spanish_reading: Mantener presente narrativo («vienen»)
  alternative_spanish_readings:
  - Pasar al pretérito («vinieron»)
  rationale: El griego usa presente histórico (προσέρχονται, λέγοντες) para dar inmediatez. El español puede reflejar ese efecto sin resultar forzado; por eso se conserva el presente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje se mantiene en concordancia alta con el paquete fuente y con la auditoría inglesa; no hay revisiones aplicadas en el contexto más reciente. Se conserva el presente narrativo y la referencia lexical de γραμματεῖς sin expandirla al texto principal.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς según la política del proyecto.
  - Se usa «fariseos» y «escribas» como designaciones históricas establecidas, sin reemplazarlas por glosas interpretativas en el texto principal.
  - Se mantiene la procedencia «desde Jerusalén» como dato de origen, no como adición inferencial.
  - La puntuación separa el complemento de procedencia con comas para reflejar el flujo narrativo español sin alterar la relación sintáctica básica.
