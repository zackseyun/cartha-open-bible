revisions:
- from: 'Pero él respondió: «No es correcto tomar el pan de los hijos y echarlo a los perritos[a]» .'
  to: 'Pero él respondió: «No es correcto tomar el pan de los niños y echarlo a los perritos[a]».'
  rationale: Se ajusta τέκνων a «niños» para una equivalencia más natural e inclusiva en español dentro de esta metáfora doméstica, y se corrige la puntuación final. Se mantiene «correcto», «tomar», «echarlo» y «perritos» porque transmiten bien las decisiones léxicas del griego y del POB inglés.
