translation:
  language: es
  text: 'Pero él respondió: «No es correcto tomar el pan de los niños y echarlo a los perritos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perros de la casa» o «cachorritos»; el griego usa una forma diminutiva, que sugiere perros pequeños o de casa, no perros callejeros.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: he answered
  chosen_spanish: él respondió
  alternatives_spanish:
  - él contestó
  - respondiendo, dijo
  lexicon: BDAG
  rationale: La construcción participio + verbo finito funciona como fórmula narrativa de respuesta. En español, «él respondió» conserva la fuerza responsiva sin resultar forzado; «contestado» o una estructura participial serían menos naturales.
- source_word: καλὸν
  english_pob_choice: right
  chosen_spanish: correcto
  alternatives_spanish:
  - bueno
  - apropiado
  - conveniente
  lexicon: BDAG
  rationale: Aquí καλόν expresa conveniencia o propriedad, no simple bondad moral. «Correcto» transmite mejor la idea de lo que corresponde hacer en este contexto sin ampliar el sentido.
- source_word: λαβεῖν
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - recibir
  - agarrar
  lexicon: BDAG
  rationale: «Tomar» conserva el sentido básico de λαβεῖν en una imagen de quitar o tomar para sí; además suena natural en español con el objeto «el pan».
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - un pan
  - la comida
  lexicon: BDAG
  rationale: «Pan» es el equivalente directo y preserva la metáfora bíblica tradicional del alimento básico.
- source_word: τέκνων
  english_pob_choice: children's
  chosen_spanish: de los hijos
  alternatives_spanish:
  - de los niños
  - de los hijos e hijas
  lexicon: BDAG
  rationale: τέκνα es término de descendencia/hijos en sentido amplio. «Hijos» es una forma natural en español y mantiene la relación genitiva con el pan sin perder el contraste figurado.
- source_word: βαλεῖν
  english_pob_choice: throw
  chosen_spanish: echarlo
  alternatives_spanish:
  - tirarlo
  - arrojarlo
  lexicon: BDAG
  rationale: «Echar» es el verbo español más natural para lanzar algo a animales; conserva la vivacidad de βάλλω sin sonar excesivamente crudo. El pronombre retoma «el pan».
- source_word: κυναρίοις
  english_pob_choice: little dogs
  chosen_spanish: a los perritos
  alternatives_spanish:
  - a los perritos de la casa
  - a los perritos pequeños
  - a los perros pequeños
  lexicon: BDAG
  rationale: El diminutivo griego κυναρίοις sugiere perros pequeños o de casa, no perros callejeros. «Perritos» preserva el valor diminutivo de forma clara y natural en español, sin suavizar la imagen más de lo que permite el texto.
theological_decisions:
- issue: Mantener la metáfora de hijos y perros sin explicitar en el texto principal una interpretación adicional sobre identidad étnica o tono.
  english_pob_reading: Retain the metaphor directly as 'the children's bread' and 'the little dogs' without explanatory expansion in the main text.
  chosen_spanish_reading: 'Conservar la imagen: «el pan de los hijos» y «a los perritos», sin desarrollar la referencia implícita en la línea principal.'
  alternative_spanish_readings:
  - «el pan de los hijos y echarlo a los perros»
  - «el pan de los hijos y echarlo a los perros de la casa»
  rationale: El versículo contiene una metáfora cuya interpretación depende del contexto inmediato, pero el texto mismo no la explica. La traducción debe preservar esa tensión y no resolverla interpretativamente en el cuerpo principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego y el auditorío en inglés muestran alto acuerdo y no registran revisiones aplicadas. La redacción española sigue la misma decisión de preservar la imagen y el diminutivo, adaptándola a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» como no aplicable aquí; no hay terminología teológica directa adicional.
  - Se evita «SEÑOR» o paráfrasis explicativa porque el versículo no contiene el nombre divino ni una cita que lo requiera.
  - «Perritos» conserva el matiz diminutivo del griego κυναρίοις, alineado con la nota de alternativa léxica.
  - La puntuación usa comillas latinas y un tono sobrio acorde con la serie POB en español.
