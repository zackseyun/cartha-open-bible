base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/002.yaml
  text: Why do your disciples break the tradition of the elders? For they do not wash their hands when they eat bread[a][b].
  footnotes:
  - marker: a
    text: That is, the handwashing practice required by the tradition of the elders, not merely an issue of ordinary hygiene.
    reason: cultural_note
  - marker: b
    text: Or 'when they eat a meal'; Greek 'bread' can sometimes stand for food more generally.
    reason: lexical_alternative
