translation:
  language: es
  text: ¿Por qué tus discípulos violan la tradición de los ancianos? Porque no se lavan las manos[a] cuando comen pan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el lavado de manos exigido por la tradición de los ancianos, no solo una cuestión de higiene ordinaria.
    reason: cultural_note
  - marker: b
    text: O «cuando comen una comida»; el griego «pan» a veces puede referirse a alimento en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe que
  lexicon: BDAG
  rationale: Es la forma interrogativa natural en español para pedir la razón de una conducta; conserva el tono directo del griego sin añadir matices innecesarios.
- source_word: παραβαίνουσιν
  english_pob_choice: break
  chosen_spanish: quebrantan
  alternatives_spanish:
  - violan
  - transgreden
  - rompen
  lexicon: BDAG
  rationale: El verbo expresa ir más allá o infringir una norma/tradición. «Quebrantan» mantiene fuerza normativa y suena más natural en español bíblico que «rompen», sin perder el sentido de infracción.
- source_word: παράδοσιν
  english_pob_choice: tradition
  chosen_spanish: tradición
  alternatives_spanish:
  - tradición transmitida
  - costumbre
  lexicon: BDAG
  rationale: Designa una tradición recibida y transmitida por autoridades anteriores. «Tradición» conserva esa fuerza; «costumbre» la debilitaría.
- source_word: πρεσβυτέρων
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los antiguos
  lexicon: BDAG
  rationale: En este contexto no se trata de personas simplemente mayores, sino de autoridades judías asociadas con la tradición recibida. «Ancianos» es el equivalente español establecido y preciso.
- source_word: νίπτονται
  english_pob_choice: wash
  chosen_spanish: se lavan
  alternatives_spanish:
  - se limpian
  - se enjuagan
  lexicon: BDAG
  rationale: El verbo refiere al lavado de una parte del cuerpo, especialmente las manos. El reflexivo español comunica bien la acción habitual sin forzar una explicación técnica en el texto principal.
- source_word: τὰς χεῖρας αὐτῶν
  english_pob_choice: their hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  - las manos de ellos
  lexicon: BDAG
  rationale: En español, el posesivo ya está implícito en el contexto inmediato y puede omitirse para mayor naturalidad; el sentido de posesión sigue claro por «tus discípulos» y el verbo reflexivo.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Expresa una acción habitual; «cuando» es idiomático y suficiente en español para este valor genérico.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  - un pan
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «pan», en español «comen pan» resulta más natural y conserva la imagen original; la posible extensión metonímica se refleja en la nota.
- source_word: ἐσθίωσιν
  english_pob_choice: they eat
  chosen_spanish: comen
  alternatives_spanish:
  - están comiendo
  - toman alimento
  lexicon: BDAG
  rationale: En una cláusula temporal habitual, el presente simple español expresa bien la acción general repetida.
theological_decisions:
- issue: Naturaleza del lavado de manos
  english_pob_reading: Render as a dispute over the tradition of the elders without importing ceremonial or hygienic explanations into the main text.
  chosen_spanish_reading: Mantener la disputa como una cuestión de la tradición de los ancianos, sin resolver en el cuerpo del versículo si se trata de pureza ritual o de higiene común.
  alternative_spanish_readings:
  - Interpretarlo explícitamente como lavado ritual de manos
  - Interpretarlo como simple higiene ordinaria
  rationale: El versículo mismo enmarca el problema como infracción de la tradición de los ancianos. La traducción principal debe preservar esa tensión y dejar la aclaración cultural para la nota, no imponer una lectura interpretativa en el texto.
  doctrine_reference: Primacía del texto original y preservación de la tensión interpretativa; no añadir explicación doctrinal o cultural no explicitada por el versículo.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés presentan acuerdo alto y no registran revisiones aplicadas; esta versión sigue de cerca la decisión inglesa de mantener el foco en «la tradición de los ancianos» y de conservar «bread/pan» con nota explicativa sobre su posible valor metonímico.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton ni un sustituto contextual.
  - «Ancianos» refleja el cargo/autoridad tradicional del contexto judío, no una referencia genérica a personas de mayor edad.
  - La omisión del posesivo en «se lavan las manos» es natural en español y no cambia el sentido referencial.
  - 'Las notas mantienen las dos tensiones documentadas por el audit trail: el trasfondo cultural del lavado y la posibilidad metonímica de «pan».'
