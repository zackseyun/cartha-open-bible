translation:
  language: es
  text: Déjenlos[a]; son guías ciegos de ciegos. Pero si un ciego guía a otro ciego[b], ambos caerán en un hoyo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Déjenlos tranquilos» o «Déjenlos solos».'
    reason: lexical_alternative
  - marker: b
    text: El singular en el proverbio es representativo; el dicho se aplica en general, no solo a varones.
    reason: cultural_note
  - marker: c
    text: 'O: «fosa» o «zanja».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφετε αὐτούς
  english_pob_choice: Leave them alone
  chosen_spanish: Déjenlos en paz
  alternatives_spanish:
  - Déjenlos
  - Déjenlos tranquilos
  - Déjenlos solos
  lexicon: ἀφίημι / αὐτός
  rationale: El imperativo aoristo aquí expresa la idea de dejarlos o soltarlos, no de perdonar. En español, «Déjenlos en paz» transmite de forma natural y mordaz la fuerza de «leave them alone», sin añadir una explicación interpretativa.
- source_word: τυφλοί εἰσιν
  english_pob_choice: they are blind
  chosen_spanish: son ciegos
  alternatives_spanish:
  - son ciegos espirituales
  - están ciegos
  lexicon: τυφλός
  rationale: «Ciegos» conserva la metáfora sin explicarla en exceso. «Son ciegos» reproduce bien el predicado nominal griego y mantiene el golpe proverbial.
- source_word: ὁδηγοὶ
  english_pob_choice: guides
  chosen_spanish: guías
  alternatives_spanish:
  - líderes
  - conductores
  lexicon: ὁδηγός
  rationale: «Guías» es el equivalente más directo y preserva la imagen de alguien que conduce a otros. «Líderes» interpretaría más de lo que dice el griego.
- source_word: τυφλῶν
  english_pob_choice: of the blind
  chosen_spanish: de ciegos
  alternatives_spanish:
  - para ciegos
  - de los ciegos
  lexicon: τυφλός
  rationale: El genitivo plural se refleja de manera compacta con «de ciegos», conservando la estructura proverbial breve y la repetición enfática del término.
- source_word: τυφλὸς δὲ τυφλὸν
  english_pob_choice: a blind man ... a blind man
  chosen_spanish: un ciego ... a otro ciego
  alternatives_spanish:
  - un ciego ... un ciego
  - una persona ciega ... otra persona ciega
  lexicon: τυφλός
  rationale: El griego usa singular masculino representativo. En español, «un ciego ... a otro ciego» mantiene ese valor proverbial y evita neutralizar la forma del texto, aunque el sentido sea general.
- source_word: ἐὰν ὁδηγῇ
  english_pob_choice: if ... guides
  chosen_spanish: si guía
  alternatives_spanish:
  - si conduce
  - si dirige
  lexicon: ὁδηγέω
  rationale: «Guía» conserva la continuidad léxica con ὁδηγοί y resulta natural en español en una oración condicional general.
- source_word: ἀμφότεροι
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  lexicon: ἀμφότεροι
  rationale: «Ambos» es la forma más natural y compacta para el valor dual inclusivo del término griego.
- source_word: εἰς βόθυνον
  english_pob_choice: into a pit
  chosen_spanish: en un pozo
  alternatives_spanish:
  - en un hoyo
  - en una fosa
  - en una zanja
  lexicon: βόθυνος
  rationale: βόθυνος puede designar pozo, hoyo, hoyanco o foso. «Pozo» funciona bien en español bíblico contemporáneo y conserva la imagen de una caída fatal; la alternativa «hoyo» también sería posible, pero suena menos sólida como imagen proverbial.
- source_word: πεσοῦνται
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se caerán
  - vendrán a caer
  lexicon: πίπτω
  rationale: «Caerán» expresa con sencillez el futuro del verbo y preserva el desenlace proverbial sin añadir matices innecesarios.
theological_decisions:
- issue: Metáfora de la ceguera
  english_pob_reading: Retain 'blind' as a metaphor for spiritual inability/discernment without explicating it in the main text.
  chosen_spanish_reading: Conservar «ciegos» como metáfora de incapacidad de discernimiento espiritual, sin explicarla dentro del versículo.
  alternative_spanish_readings:
  - espiritualmente ciegos
  - ignorantes
  - sin discernimiento
  rationale: El texto griego presenta una imagen proverbial breve y contundente. Ampliarla con «espiritualmente» o con una glosa interpretativa reduciría su fuerza retórica y añadiría interpretación no explicitada en la frase.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: Forma singular representativa en la sentencia proverbial
  english_pob_reading: Use 'a blind man ... a blind man' in the singular proverb.
  chosen_spanish_reading: Mantener el singular representativo con «un ciego ... a otro ciego», indicando que el dicho es general.
  alternative_spanish_readings:
  - un ciego ... un ciego
  - una persona ciega ... otra persona ciega
  - los ciegos ... los ciegos
  rationale: El griego está en singular masculino y funciona como proverbio representativo. En español, «un ciego ... a otro ciego» preserva la forma y el ritmo del dicho, mientras que la generalidad se entiende por el género proverbial del enunciado.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del audit trail inglés, que no requirió cambios en la última revisión. Se han conservado el imperativo de dejar en paz, la metáfora de la ceguera, la continuidad léxica entre «guía/guía», la forma singular representativa del proverbio y la imagen final de caída en un hueco/pozo, con una decisión española natural pero fiel al griego.
  spanish_consistency_notes:
  - Se mantiene «ciegos» en paralelo con «guías» para reproducir la estructura enfática del griego.
  - Se evita traducir ὁδηγός por «líder» para no perder la imagen de conducción.
  - «Pozo» se usa por su naturalidad bíblica y por abarcar la idea de un hoyo profundo; se deja constancia de alternativas.
  - La nota del singular representativo se ancla en el segundo miembro proverbial, donde el español puede sonar masculino por la forma del griego, pero el sentido es general.
  - El tono español es imperativo y sentencioso, acorde con una advertencia proverbial de Jesús.
