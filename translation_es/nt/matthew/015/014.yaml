revisions:
- from: Déjenlos[a] en paz; son guías ciegos de ciegos. Y si un ciego guía a otro ciego[b], ambos caerán en un pozo[c].
  to: Déjenlos[a]; son guías ciegos de ciegos. Pero si un ciego guía a otro ciego[b], ambos caerán en un hoyo[c].
  rationale: 'La revisión hace ajustes pequeños pero importantes para alinearse mejor con el griego y con la auditoría inglesa: «Déjenlos» evita un matiz añadido, «Pero si» refleja mejor δὲ, y «hoyo» representa mejor βόθυνος que «pozo». Se conserva la buena metáfora, la estructura proverbial y las notas pertinentes.'
