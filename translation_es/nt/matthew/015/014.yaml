    text: Or, 'blind guides for the blind.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'a blind man' is representative in the proverb; the saying applies generally, not only to males.
    reason: cultural_note
  - marker: c
    text: Or, 'ditch.'
    reason: lexical_alternative
