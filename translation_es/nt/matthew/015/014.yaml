    text: 'O: «Déjenlos tranquilos» o «Déjenlos solos».'
    reason: lexical_alternative
  - marker: b
    text: El singular en el proverbio es representativo; el dicho se aplica en general, no solo a varones.
    reason: cultural_note
  - marker: c
    text: 'O: «fosa» o «zanja».'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace ajustes pequeños pero importantes para alinearse mejor con el griego y con la auditoría inglesa: «Déjenlos» evita un matiz añadido, «Pero si» refleja mejor δὲ, y «hoyo» representa mejor βόθυνος que «pozo». Se conserva la buena metáfora, la estructura proverbial y las notas pertinentes.'
