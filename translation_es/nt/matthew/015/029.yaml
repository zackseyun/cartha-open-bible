    changes_summary: Removed 'after' before 'departing' for a more direct rendering of the participle, and changed 'he was sitting there' to 'he sat there' to better reflect the aorist verb in natural formal English.
translation:
  language: es
  text: Y saliendo de allí, Jesús fue junto al mar de Galilea[a], y después de subir al monte, estaba sentado allí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a lo largo del mar de Galilea». La preposición griega puede indicar movimiento junto a la orilla o desplazamiento a lo largo de ella.
    reason: lexical_alternative
  - marker: b
    text: O «se sentó allí». El imperfecto griego puede expresarse más simplemente en español, pero «estaba sentado» preserva mejor el sentido continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταβὰς
  english_pob_choice: departing from there
  chosen_spanish: saliendo de allí
  alternatives_spanish:
  - habiendo partido de allí
  - apartándose de allí
  lexicon: BDAG
  rationale: El participio aoristo antecedente se rinde en español con una construcción natural que conserve la secuencia temporal sin volverla pesada. 'Saliendo de allí' expresa el desplazamiento previo al verbo principal y mantiene el matiz de movimiento desde ese lugar.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde aquel lugar
  - de ese lugar
  lexicon: BDAG
  rationale: El adverbio locativo indica procedencia; 'de allí' es directo, idiomático y suficientemente preciso en español.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: BDAG
  rationale: En este contexto narrativo, 'llegó' comunica bien la llegada al lugar mencionado y suena natural en español bíblico sin perder el valor de movimiento del aoristo.
- source_word: παρὰ τὴν θάλασσαν τῆς Γαλιλαίας
  english_pob_choice: along the Sea of Galilee
  chosen_spanish: junto al mar de Galilea
  alternatives_spanish:
  - a lo largo del mar de Galilea
  - al borde del mar de Galilea
  lexicon: BDAG
  rationale: παρά con acusativo puede señalar proximidad o movimiento junto a algo. El español 'junto al' preserva esa cercanía sin decidir de modo excesivo entre 'a lo largo de' y 'al lado de'.
- source_word: ἀναβὰς
  english_pob_choice: after going up
  chosen_spanish: después de subir
  alternatives_spanish:
  - habiendo subido
  - subiendo
  lexicon: BDAG
  rationale: El participio aoristo anterior se expresa con una subordinación temporal clara y fluida en español.
- source_word: εἰς τὸ ὄρος
  english_pob_choice: on the mountain
  chosen_spanish: a la montaña
  alternatives_spanish:
  - al monte
  - sobre la montaña
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por 'on the mountain' por la imagen del estar allí, en español 'subir a la montaña' conserva mejor el movimiento ascendente de εἰς con ἀναβαίνω y suena natural. No se fuerza un calco posicional que el español no requiere.
- source_word: ἐκάθητο
  english_pob_choice: he sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - estaba sentado
  - se estaba sentando
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir duratividad, la revisión inglesa reciente prefirió un pasado simple más natural en narrativa. En español, 'se sentó' comunica con claridad el resultado de la acción sin introducir una duración que el texto no exige de manera decisiva.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: '''Allí'' reproduce con naturalidad el adverbio locativo final.'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'he was sitting there' a 'he sat there' para reflejar con más naturalidad el aoristo en inglés. En español, sin embargo, el imperfecto ἐκάθητο permite una decisión estilística; se optó por 'se sentó' para mantener fluidez narrativa y evitar una duración no obligatoria. La nota sobre παρά se conserva como alternativa de traducción, dado que el valor espacial admite más de una formulación legítima.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para Ἰησοῦς según la convención del proyecto.
  - Se usa 'mar de Galilea' en vez de 'mar' o 'lago' porque la fuente y el audit trail inglés lo nombran así.
  - No se introducen términos teológicos ajenos al versículo.
  - Las notas al pie están ancladas exactamente en el texto con [a] y [b].
