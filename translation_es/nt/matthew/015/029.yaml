  text: Καὶ μεταβὰς ἐκεῖθεν ὁ Ἰησοῦς ἦλθεν παρὰ τὴν θάλασσαν τῆς Γαλιλαίας, καὶ ἀναβὰς εἰς τὸ ὄρος ἐκάθητο ἐκεῖ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/029.yaml
  text: And departing from there[a], Jesus came along the Sea of Galilee, and after going up on the mountain[b], he sat there.
  footnotes:
  - marker: a
    text: Or 'beside the Sea of Galilee.' The Greek preposition can denote movement along or location beside the shore.
    reason: lexical_alternative
  - marker: b
    text: Or 'he sat there.' The Greek imperfect may be rendered more simply, but 'was sitting' better preserves the ongoing sense.
    reason: lexical_alternative
