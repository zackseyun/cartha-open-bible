revisions:
- from: 'Entonces los discípulos se acercaron y le dijeron[a]: «¿Sabes que los fariseos se ofendieron[b] al oír esa palabra?»'
  to: 'Entonces los discípulos se acercaron y le dijeron: «¿Sabes que los fariseos se ofendieron[a] al oír esas palabras[b]?»'
  rationale: Se elimina la nota innecesaria sobre la introducción del discurso y se restaura la nota contextual presente en la auditoría inglesa. También se ajusta «esa palabra» a «esas palabras» para una expresión más natural en español sin perder el referente del griego λόγον, aclarado además por la nota [b]. Se conserva «se ofendieron» con nota léxica para reflejar σκανδαλίζω fielmente y con buena legibilidad.
