translation:
  language: es
  text: 'Entonces los discípulos se acercaron y le dijeron: «¿Sabes que los fariseos se ofendieron[a] al oír esas palabras[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tropezaron»; más literalmente, «fueron hechos tropezar».
    reason: lexical_alternative
  - marker: b
    text: «Esas palabras» se refiere a la declaración anterior de Jesús.
    reason: cross_reference
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Adverbio temporal narrativo que introduce la acción siguiente; «Entonces» es natural en español y conserva la secuencia del relato.
- source_word: προσελθόντες
  english_pob_choice: came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - se llegaron
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι expresa el movimiento previo de acercarse a Jesús; en español, «se acercaron» mantiene ese matiz mejor que un simple «vinieron».
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: Nombra al grupo de manera directa. No se añade «sus» porque el griego no lo expresa explícitamente.
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le decían
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente con pasado simple en español narrativo; «le dijeron» conserva la introducción del discurso.
- source_word: Οἶδας
  english_pob_choice: Do you know
  chosen_spanish: ¿Sabes
  alternatives_spanish:
  - ¿Te das cuenta
  - ¿Realmente sabes
  lexicon: BDAG
  rationale: Interrogación directa que traduce el valor de οἶδα sin sobreinterpretarlo; «¿Sabes?» es breve y fiel.
- source_word: οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Transliteración habitual del grupo; en español bíblico estándar «fariseos» es claro y preciso.
- source_word: ἀκούσαντες τὸν λόγον
  english_pob_choice: when they heard this word
  chosen_spanish: al oír esa palabra
  alternatives_spanish:
  - al escuchar esa palabra
  - cuando oyeron esa palabra
  lexicon: BDAG
  rationale: El participio aoristo con objeto λόγον se expresa de forma natural con una construcción temporal en español. «Palabra» conserva el valor formal de λόγος; «esa» refleja el referente inmediato al dicho previo de Jesús.
- source_word: ἐσκανδαλίσθησαν
  english_pob_choice: were offended
  chosen_spanish: se ofendieron
  alternatives_spanish:
  - tuvieron ofensa
  - tropezaron
  lexicon: BDAG
  rationale: Aquí σκανδαλίζω describe la reacción negativa de los fariseos ante lo dicho por Jesús. «Se ofendieron» comunica bien esa reacción interpersonal sin borrar la posibilidad literal de «tropezar», que se conserva en la nota.
theological_decisions:
- issue: Sentido de σκανδαλίζω en un contexto interpersonal y no soteriológico
  english_pob_reading: were offended
  chosen_spanish_reading: se ofendieron
  alternative_spanish_readings:
  - tuvieron ofensa
  - tropezaron
  - fueron hechos tropezar
  rationale: El contexto inmediato trata de la reacción de los fariseos al discurso de Jesús, no de una enseñanza doctrinal sobre caída espiritual. «Se ofendieron» mantiene el sentido principal y deja abierta la tensión léxica de «tropezar» sin resolverla prematuramente.
  doctrine_reference: Mantener la tensión léxica de σκανδαλίζω en contexto narrativo; no forzar una lectura soteriológica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores de nota exactamente en el texto español. No se añadieron notas sin ancla y se mantuvo la lectura auditada del griego y del POB inglés.
  spanish_consistency_notes:
  - Se conservó la referencia inmediata de τὸν λόγον con «esa palabra», evitando una paráfrasis más explicativa.
  - Se mantuvo «los fariseos» como sujeto explícito, en paralelo al griego.
  - La nota de σκανδαλίζω preserva la alternativa literal «tropezar» sin imponerla en el texto principal.
