translation:
  language: es
  text: 'Pero él respondió y dijo[a]: «Toda planta[b] que mi Padre celestial no plantó será arrancada de raíz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «replicó y dijo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «plantación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - respondió
  - replicó y dijo
  lexicon: BDAG
  rationale: La fórmula griega es narrativa y semítica; en español, «respondió y dijo» conserva ambos verbos sin sonar excesivamente forzado. «Replicó y dijo» sería más marcado y menos neutro.
- source_word: Πᾶσα φυτεία
  english_pob_choice: Every plant
  chosen_spanish: Toda planta
  alternatives_spanish:
  - Toda plantación
  - Toda siembra
  - Cada planta
  lexicon: BDAG
  rationale: φυτεία puede abarcar una realidad plantada o una plantación. «Planta» mantiene la imagen vegetal directa y la ambigüedad metafórica documentada; «plantación» o «siembra» resolverían demasiado el sentido.
- source_word: ὁ πατήρ μου ὁ οὐράνιος
  english_pob_choice: my heavenly Father
  chosen_spanish: mi Padre celestial
  alternatives_spanish:
  - mi Padre en los cielos
  - mi Padre, el celestial
  lexicon: BDAG
  rationale: «Padre celestial» es natural en español y preserva la posesión («mi») y el rasgo adjetival οὐράνιος. «En los cielos» sería más literal, pero menos idiomático aquí.
- source_word: ἐφύτευσεν
  english_pob_choice: did not plant
  chosen_spanish: no plantó
  alternatives_spanish:
  - no sembró
  - no estableció
  lexicon: BDAG
  rationale: El verbo mantiene la metáfora agrícola con el mismo campo léxico que φυτεία. «No sembró» cambia la imagen; «no estableció» la vuelve más interpretativa.
- source_word: ἐκριζωθήσεται
  english_pob_choice: will be uprooted
  chosen_spanish: será arrancada de raíz
  alternatives_spanish:
  - será desarraigada
  - será extirpada
  lexicon: BDAG
  rationale: «Arrancada de raíz» expresa con claridad la imagen del desarraigo y su fuerza de juicio. «Desarraigada» es posible, pero «arrancada de raíz» suena más directo y transparente.
theological_decisions:
- issue: Referencia metafórica de «Toda planta»
  english_pob_reading: Retain the metaphor as 'Every plant' without specifying whether it refers to teachings, traditions, or people.
  chosen_spanish_reading: Conservar la metáfora como «Toda planta» sin precisar si se trata de enseñanzas, tradiciones o personas.
  alternative_spanish_readings:
  - Toda enseñanza
  - Toda tradición
  - Todo el que no haya sido plantado por el Padre
  rationale: El griego no resuelve el referente del símil. Mantener la imagen evita introducir una interpretación que el texto no exige y preserva la tensión teológica documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran alta concordancia y no requieren revisiones adicionales; se conservó la ambigüedad de φυτεία y la fórmula narrativa ἀποκριθεὶς εἶπεν.
  spanish_consistency_notes:
  - Se usó «Padre celestial» como equivalente idiomático de «my heavenly Father», manteniendo el posesivo «mi».
  - 'Se mantuvo el campo agrícola coherente: «plantó» / «arrancada de raíz».'
  - No se sustituyó la metáfora por una explicitación interpretativa, para respetar la tensión teológica del original.
