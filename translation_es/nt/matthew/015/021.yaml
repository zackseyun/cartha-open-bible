translation:
  language: es
  text: Y saliendo de allí, Jesús se retiró a la región[a] de Tiro y de Sidón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'partió a la comarca de Tiro y de Sidón'. El griego puede traducirse de manera más neutral, pero 'se retiró' conserva el matiz recurrente de Mateo para este verbo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Luego
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple conserva el flujo narrativo del griego sin añadir énfasis interpretativo.
- source_word: ἐξελθὼν
  english_pob_choice: went out
  chosen_spanish: saliendo
  alternatives_spanish:
  - habiendo salido
  - salió
  lexicon: BDAG
  rationale: El participio aoristo se vierte naturalmente en español como acción previa o concomitante que antecede al verbo principal. 'Saliendo' mantiene la concreción del movimiento sin sobreinterpretar la motivación.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: BDAG
  rationale: Expresa de manera idiomática el punto de salida indicado por el adverbio griego.
- source_word: ἀνεχώρησεν
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - partió
  lexicon: BDAG
  rationale: '''Se retiró'' comunica el matiz de apartarse o desplazarse, preservando la posible nuance estratégica de ἀναχωρέω en Mateo sin imponer una motivación explícita. En español, ''retirarse'' es la opción más cercana a ''withdrew'' y suficientemente natural en contexto narrativo.'
- source_word: εἰς τὰ μέρη
  english_pob_choice: to the region
  chosen_spanish: a la región
  alternatives_spanish:
  - a la comarca
  - al distrito
  lexicon: BDAG
  rationale: μέρη significa literalmente 'partes/zonas/regiones'; 'a la región' comunica el ámbito geográfico general mejor que una referencia demasiado específica a ciudades o límites administrativos.
- source_word: Τύρου καὶ Σιδῶνος
  english_pob_choice: of Tyre and Sidon
  chosen_spanish: de Tiro y de Sidón
  alternatives_spanish:
  - de Tiro y Sidón
  lexicon: BDAG
  rationale: Se conservan los nombres propios transliterados estándar en español. La repetición de 'de' sigue bien la dependencia genitiva respecto de 'región' y hace explícita la relación territorial.
theological_decisions:
- issue: Matiz narrativo del movimiento de Jesús hacia territorio asociado a gentiles
  english_pob_reading: Render ἀνεχώρησεν as 'withdrew' without making explicit a theological motive.
  chosen_spanish_reading: se retiró, sin explicitar motivo teológico o psicológico
  alternative_spanish_readings:
  - partió
  - se apartó con intención estratégica
  rationale: El versículo narra desplazamiento; Mateo puede insinuar una retirada estratégica, pero el texto no lo declara. 'Se retiró' conserva el matiz narrativo sin resolver la tensión ni añadir una explicación no expresada.
  doctrine_reference: Preservar la tensión textual sin armonizar de más.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios necesarios respecto del pasaje fuente ni del criterio inglés POB. Se mantiene la decisión de no volver neutro el verbo principal, para conservar el matiz narrativo de ἀναχωρέω en Mateo.'
  spanish_consistency_notes:
  - Se usa 'Jesús' para Ἰησοῦς, conforme al estándar del proyecto.
  - Se mantiene 'Tiro' y 'Sidón' como transliteraciones españolas convencionales.
  - '''Región'' evita tanto una calca (''las partes'') como una precisión excesiva (''ciudad'') que el griego no exige.'
  - La puntuación y el orden sintáctico son naturales en español sin perder la secuencia aspectual del original.
