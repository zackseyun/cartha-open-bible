  glossary_alignment: No hay términos de glosario sensibles en este versículo aparte de «Jesús», que está correctamente renderizado. La decisión de «se retiró» concuerda con la justificación léxica y teológica auditada para ἀνεχώρησεν. Los topónimos «Tiro» y «Sidón» siguen la convención esperada.
