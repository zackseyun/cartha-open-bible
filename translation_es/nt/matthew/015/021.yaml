  source_alignment_summary: 'El borrador español refleja fielmente la sintaxis y el sentido del griego: Καὶ como «Y», ἐξελθὼν ἐκεῖθεν como «saliendo de allí», ἀνεχώρησεν como «se retiró», y εἰς τὰ μέρη Τύρου καὶ Σιδῶνος como «a la región de Tiro y de Sidón». También conserva correctamente el matiz de movimiento hacia la zona general, no necesariamente a las ciudades mismas.'
