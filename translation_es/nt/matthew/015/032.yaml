review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: Jesús llama a sus discípulos, expresa compasión por la multitud, indica que llevan tres días con él, que no tienen qué comer, y no quiere enviarlos sin alimento por temor a que desfallezcan en el camino. Sin embargo, hay dos puntos donde el español se aparta del mejor equilibrio entre fuente y auditoría inglesa: (1) προσκαλεσάμενος incluye la idea de llamar hacia sí, mejor expresada en español como «llamó a sus discípulos junto a sí» o equivalente; (2) νήστεις, según la auditoría inglesa, debe comunicarse en el texto principal por sentido como «hambrientos» o «sin haber comido», dejando la literalidad «en ayunas/fasting» para nota, no al revés.'
  spanish_quality_summary: El texto es claro y digno, pero «despedirlos en ayunas» suena algo rígido y puede sugerir innecesariamente ayuno religioso en el cuerpo del texto, justamente la ambigüedad que la nota intenta corregir. «Llamó a sus discípulos» también pierde un matiz direccional que puede expresarse naturalmente. El resto del verso lee bien en español.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal. «Jesús», «compasión», «multitud» y «camino» son adecuados. La principal desalineación es con la decisión auditada para νήστεις: el inglés POB eligió el sentido contextual en el texto principal («hungry») y dejó la literalidad en nota; el español borrador invierte esa priorización.'
  issues:
  - severity: medium
    issue: προσκαλεσάμενος se tradujo solo como «llamó a sus discípulos».
    rationale: Aunque no es falso, omite el matiz de llamar hacia sí presente en el participio medio y explicitado en la auditoría inglesa («called his disciples to him»). En español puede conservarse de modo natural con «llamó a sus discípulos junto a sí».
  - severity: medium
    issue: νήστεις se tradujo en el texto principal como «en ayunas».
    rationale: El contexto y la auditoría inglesa indican que aquí no se trata de ayuno religioso voluntario sino de estar sin comida; en español principal, «hambrientos» o «sin haber comido» comunica mejor el sentido y evita una lectura engañosa. La literalidad puede preservarse en nota.
  - severity: low
    issue: Hay sobrecarga de tres notas consecutivas sobre νήστεις.
    rationale: La información puede condensarse en una sola nota lexical clara. Mantener tres notas seguidas entorpece la lectura sin añadir precisión suficiente.
