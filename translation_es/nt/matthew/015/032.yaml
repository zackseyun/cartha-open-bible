translation:
  language: es
  text: 'Entonces Jesús llamó a sus discípulos junto a sí y dijo: «Tengo compasión de la multitud, porque ya hace tres días que están conmigo y no tienen qué comer. Y no quiero despedirlos hambrientos[a], no sea que desfallezcan en el camino[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: νήστεις es literalmente «en ayunas», «sin alimento» o «sin haber comido». Aquí no se refiere a un ayuno religioso voluntario, sino a que la multitud está sin comida; por eso se traduce «hambrientos».
    reason: lexical_alternative
  - marker: b
    text: '«Desfallezcan» traduce el sentido de ἐκλυθῶσιν: agotarse o perder fuerzas en el trayecto. Otra posibilidad es «se desmayen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: called ... to him
  chosen_spanish: llamó a sus discípulos
  alternatives_spanish:
  - los llamó junto a sí
  - los convocó
  lexicon: BDAG
  rationale: El participio medio indica que Jesús los llama hacia su presencia; en español, «llamó a sus discípulos» comunica bien la acción narrativa y el movimiento implícito sin forzar una construcción pesada.
- source_word: Σπλαγχνίζομαι
  english_pob_choice: I have compassion
  chosen_spanish: Tengo compasión
  alternatives_spanish:
  - Me conmueve la compasión
  - Siento compasión
  lexicon: BDAG
  rationale: «Tengo compasión» expresa de forma natural y fiel la compasión profunda del verbo, manteniendo el tono claro del relato.
- source_word: ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la muchedumbre
  - el gentío
  lexicon: BDAG
  rationale: En español bíblico actual, «multitud» es natural y conserva el referente colectivo de ὄχλος sin volverlo demasiado coloquial.
- source_word: ἤδη ἡμέραι τρεῖς προσμένουσίν μοι
  english_pob_choice: they have already remained with me for three days
  chosen_spanish: ya hace tres días que están conmigo
  alternatives_spanish:
  - ya llevan tres días conmigo
  - ya han permanecido conmigo tres días
  lexicon: BDAG
  rationale: La construcción griega expresa duración de permanencia con Jesús. «Ya hace tres días que están conmigo» reproduce esa duración de modo idiomático en español y conserva la relación de compañía.
- source_word: οὐκ ἔχουσιν τί φάγωσιν
  english_pob_choice: have nothing to eat
  chosen_spanish: no tienen qué comer
  alternatives_spanish:
  - no tienen nada que comer
  - no tienen alimento
  lexicon: BDAG
  rationale: El giro griego significa que carecen de comida. «No tienen qué comer» es natural, claro y fiel al sentido idiomático.
- source_word: ἀπολῦσαι
  english_pob_choice: to send ... away
  chosen_spanish: despedirlos
  alternatives_spanish:
  - mandarlos lejos
  - enviarlos
  lexicon: BDAG
  rationale: En contexto de una multitud reunida, «despedirlos» comunica la acción de dejarlos ir/mandarlos a retirarse de manera más natural que un calco rígido.
- source_word: νήστεις
  english_pob_choice: hungry
  chosen_spanish: en ayunas
  alternatives_spanish:
  - hambrientos
  - sin haber comido
  lexicon: BDAG
  rationale: El término griego significa literalmente «sin alimento» o «en ayunas». Como la nota inglesa distingue que no se trata de ayuno religioso voluntario, «en ayunas» preserva esa tensión léxica mejor que una simple glosa con «hambrientos».
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: BDAG
  rationale: La cláusula expresa un temor preventivo. «Para que no» ofrece un español claro y digno; en combinación con el verbo subjuntivo, conserva la idea de evitar un resultado temido.
- source_word: ἐκλυθῶσιν
  english_pob_choice: they collapse
  chosen_spanish: desfallezcan
  alternatives_spanish:
  - se desmayen
  - se agoten
  lexicon: BDAG
  rationale: El verbo puede implicar agotamiento extremo o desfallecimiento durante el viaje. «Desfallezcan» preserva la seriedad del efecto físico sin forzar un tono demasiado clínico.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - de regreso
  lexicon: BDAG
  rationale: «En el camino» es el equivalente natural en español para el trayecto de regreso implícito en el contexto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que añadió «for» en «for three days» para naturalidad, reflejada en español con «ya hace tres días que». También se conservó la nota inglesa sobre νήστεις como estado de estar sin alimento, distinguiéndolo de un ayuno religioso.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, «compasión» para σπλαγχνίζομαι y «multitud» para ὄχλος.
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «En ayunas» se eligió por fidelidad léxica al griego, no como referencia a práctica devocional.
  - «En el camino» conserva la imagen de viaje del contexto narrativo.
