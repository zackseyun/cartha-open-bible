revisions:
- from: 'Entonces Jesús llamó a sus discípulos y les dijo: «Tengo compasión de la multitud, porque ya hace tres días que están conmigo y no tienen qué comer. Y no quiero despedirlos en ayunas[a][b][c], para que no desfallezcan en el camino[d]».'
  to: 'Entonces Jesús llamó a sus discípulos junto a sí y dijo: «Tengo compasión de la multitud, porque ya hace tres días que están conmigo y no tienen qué comer. Y no quiero despedirlos hambrientos[a], no sea que desfallezcan en el camino[b]».'
  rationale: Se ajustó «llamó a sus discípulos» a «llamó a sus discípulos junto a sí» para reflejar el matiz direccional de προσκαλεσάμενος, y se cambió «en ayunas» por «hambrientos» en el texto principal para seguir el sentido contextual de νήστεις y la lógica de la auditoría inglesa, preservando la literalidad en una nota más concisa. También se simplificó el aparato de notas para mejorar legibilidad.
