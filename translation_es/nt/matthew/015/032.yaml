source:
  edition: SBLGNT
  text: Ὁ δὲ Ἰησοῦς προσκαλεσάμενος τοὺς μαθητὰς αὐτοῦ εἶπεν· Σπλαγχνίζομαι ἐπὶ τὸν ὄχλον, ὅτι ἤδη ἡμέραι τρεῖς προσμένουσίν μοι καὶ οὐκ ἔχουσιν τί φάγωσιν· καὶ ἀπολῦσαι αὐτοὺς νήστεις οὐ θέλω, μήποτε ἐκλυθῶσιν ἐν τῇ ὁδῷ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/032.yaml
  text: Then Jesus called his disciples to him and said[a], “I have compassion on the crowd, because they have already remained with me for three days and have nothing to eat. And I do not want to send them away hungry[d][c][b], lest they collapse on the way.”
  footnotes:
  - marker: a
    text: Or “I am moved with compassion for the crowd.”
    reason: lexical_alternative
  - marker: b
    text: Or “they have already stayed with me for three days.”
    reason: lexical_alternative
  - marker: c
    text: νήστεις is literally “fasting” or “without food,” here meaning they have gone unfed rather than that they are engaged in a religious fast.
    reason: lexical_alternative
  - marker: d
    text: Or “lest they faint on the way.”
    reason: lexical_alternative
