translation:
  language: es
  text: 'Y Jesús les dijo: «¿Cuántos panes tienen?». Y ellos dijeron: «Siete, y unos pocos pececillos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «peces»; el diminutivo griego sugiere peces pequeños.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo natural resulta más idiomático el pretérito simple «dijo», sin perder la función discursiva del original.
- source_word: Πόσους ἄρτους
  english_pob_choice: How many loaves
  chosen_spanish: ¿Cuántos panes?
  alternatives_spanish:
  - ¿Cuántos panes de pan?
  - ¿Cuántas hogazas?
  lexicon: BDAG
  rationale: ἄρτους designa panes contables; en español «panes» comunica bien la referencia a piezas de pan, sin añadir especificación ajena como «hogazas».
- source_word: ἔχετε
  english_pob_choice: do you have
  chosen_spanish: tienen
  alternatives_spanish:
  - tienen ustedes
  - ustedes tienen
  lexicon: BDAG
  rationale: En pregunta directa, el español puede omitir el pronombre explícito. «Tienen» mantiene el presente y la sencillez del griego interrogativo.
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Pero ellos dijeron
  - Entonces dijeron
  lexicon: BDAG
  rationale: δέ aquí marca avance narrativo; «Y» conserva la progresión sin cargar el matiz con una oposición más fuerte que la del contexto.
- source_word: Ἑπτά
  english_pob_choice: Seven
  chosen_spanish: Siete
  alternatives_spanish:
  - '7'
  lexicon: BDAG
  rationale: Equivalente directo del numeral griego.
- source_word: ὀλίγα
  english_pob_choice: a few
  chosen_spanish: unos pocos
  alternatives_spanish:
  - pocos
  - unas pocas
  lexicon: BDAG
  rationale: ὀλίγα expresa una cantidad pequeña e indefinida; «unos pocos» reproduce bien esa vaguedad cuantitativa en español natural.
- source_word: ἰχθύδια
  english_pob_choice: small fish
  chosen_spanish: pececillos
  alternatives_spanish:
  - peces pequeños
  - pequeños peces
  - pescaditos
  lexicon: BDAG
  rationale: El diminutivo griego ἰχθύδια sugiere peces pequeños. «Pececillos» conserva el matiz diminutivo con naturalidad en español, mejor que una simple generalización a «peces».
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva; la adaptación al español prioriza fluidez natural sin perder el presente histórico ni el diminutivo de ἰχθύδια.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς de forma consistente con el estándar del proyecto.
  - Se preserva el número y la estructura breve de la respuesta para no sobreinterpretar el dato cuantitativo.
  - Se optó por «unos pocos» y «pececillos» para reflejar tanto ὀλίγα como el diminutivo del griego.
