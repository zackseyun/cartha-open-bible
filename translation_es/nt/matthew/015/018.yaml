translation:
  language: es
  text: Pero las cosas que salen de la boca vienen del corazón[a], y esas cosas hacen impuro al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contaminan al hombre». El griego usa un singular representativo; literalmente, «el hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... ἐκπορευόμενα
  english_pob_choice: the things that come out
  chosen_spanish: las cosas que salen
  alternatives_spanish:
  - lo que sale
  - las cosas que brotan
  lexicon: BDAG
  rationale: El participio neutro plural funciona de manera sustantiva y colectiva. «Las cosas que salen» conserva el plural y la imagen concreta de lo que emerge de la boca, con español natural.
- source_word: στόματος
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca
  - boca humana
  lexicon: BDAG
  rationale: «Boca» es el equivalente directo y mantiene la imagen corporal del texto sin añadir especificación innecesaria.
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - interior
  lexicon: BDAG
  rationale: En antropología bíblica, el término refiere al centro interior de la persona. «Corazón» preserva esa carga idiomática y teológica en español.
- source_word: ἐξέρχεται
  english_pob_choice: come from
  chosen_spanish: salen
  alternatives_spanish:
  - proceden
  - vienen
  lexicon: BDAG
  rationale: Aunque el verbo griego está en singular, el sujeto neutro plural tiene sentido colectivo. «Salen» expresa de modo natural la procedencia desde la boca y el corazón.
- source_word: κἀκεῖνα
  english_pob_choice: those
  chosen_spanish: esas cosas
  alternatives_spanish:
  - aquellas
  - esas
  lexicon: BDAG
  rationale: La crasis apunta a un referente anafórico plural. «Esas cosas» mantiene la referencia y evita la ambigüedad de un simple «esas» sin sustantivo.
- source_word: κοινοῖ
  english_pob_choice: defile
  chosen_spanish: contaminan
  alternatives_spanish:
  - manchan ritualmente
  - hacen impuro
  lexicon: BDAG
  rationale: En este contexto de pureza, κοινόω significa hacer impuro/contaminar. «Contaminan» comunica bien la fuerza de impureza en español moderno sin perder el matiz ritual.
- source_word: ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  - al ser humano
  lexicon: BDAG
  rationale: Se conserva el singular masculino representativo del griego. «Al hombre» refleja la forma gramatical y el valor genérico documentado en la nota inglesa.
theological_decisions:
- issue: Fuente interior de la impureza moral
  english_pob_reading: The verse teaches that moral defilement arises from the inner person ('heart') and is expressed in speech.
  chosen_spanish_reading: El versículo enseña que la contaminación moral brota del interior de la persona («corazón») y se manifiesta en lo que sale de la boca.
  alternative_spanish_readings:
  - Una lectura restringida solo a impureza ritual de la խոսada
  - Una lectura más amplia centrada en toda conducta
  rationale: La traducción mantiene la relación entre boca y corazón, y el verbo «contaminar» permite sostener tanto la dimensión ritual de pureza como la implicación moral del contexto inmediato sin reducir ni ampliar indebidamente el pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Singular masculino genérico ἄνθρωπον
  english_pob_reading: Rendered as 'the man' in the main text.
  chosen_spanish_reading: Se conserva «el hombre» como singular representativo masculino en el texto principal.
  alternative_spanish_readings:
  - la persona
  - el ser humano
  rationale: El griego usa un singular masculino con valor representativo. «El hombre» conserva esa forma y deja visible la tensión entre género gramatical y valor genérico, sin neutralizarla en el cuerpo principal.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con la revisión auditada más reciente: no se requirieron cambios tras el último pase, y la solución española mantiene la imagen de boca/corazón, la fuerza de κοινόω en contexto de pureza y el singular masculino representativo de ἄνθρωπος.'
  spanish_consistency_notes:
  - Se mantuvo «corazón» para καρδία, en línea con la antropología bíblica y la terminología de la POB.
  - Se eligió «contaminan» para κοινόω por naturalidad en español moderno, con la alternativa ritual explícita preservada en nota.
  - Se conservó «al hombre» para ἄνθρωπον en el texto principal, con nota que explica el carácter representativo y la opción inclusiva alternativa.
