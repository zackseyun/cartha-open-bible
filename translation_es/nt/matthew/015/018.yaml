revisions:
- from: Pero las cosas que salen de la boca salen del corazón[a], y esas cosas contaminan al hombre.
  to: Pero las cosas que salen de la boca vienen del corazón[a], y esas cosas hacen impuro al hombre.
  rationale: Se revisa «salen del corazón» a «vienen del corazón» para expresar mejor la relación de origen del griego y mejorar la naturalidad del español. También se cambia «contaminan» por «hacen impuro» como equivalente principal más preciso de κοινόω en contexto de pureza, dejando «contaminan» como alternativa léxica en la nota. Se conserva «al hombre» para reflejar el singular masculino representativo documentado en el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:11:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: lo que sale de la boca tiene su origen en el corazón, y eso produce impureza en el ser humano. Sin embargo, «salen del corazón» no expresa con suficiente claridad el segundo ἐκ, que en contexto significa origen («vienen/proceden del corazón») más que una segunda salida física. Además, κοινόω en este contexto se representa mejor en español por «hacen impuro» o «contaminan», pero la nota debe alinearse con el texto principal y con la alternativa inglesa.'
  spanish_quality_summary: El español es claro y natural, pero la repetición «salen... salen» suena algo rígida y menos precisa semánticamente. «Vienen del corazón» o «proceden del corazón» mejora la fluidez y la relación lógica. «Esas cosas» es comprensible, aunque puede simplificarse a «esas» sin pérdida; no obstante, mantener «esas cosas» es aceptable. La nota actual funciona, pero conviene hacerla corresponder a una alternativa real del texto revisado.
  glossary_alignment: No hay términos de glosario mayor en conflicto. «Corazón» y «hombre» están bien justificados. Para κοινόω, «contaminan» es posible, pero en este contexto de pureza «hacen impuro» comunica con mayor precisión el matiz de impureza/defilement y coincide mejor con la nota del POB inglés.
  issues:
  - severity: medium
    issue: «salen del corazón» calca de forma imprecisa la segunda relación preposicional
    rationale: 'El griego distingue entre lo que sale de la boca y su fuente interior: «ἐκ τῆς καρδίας ἐξέρχεται». En español, repetir «salen» para ambas relaciones puede sonar como si también saliera físicamente del corazón. «Vienen del corazón» o «proceden del corazón» expresa mejor el origen.'
  - severity: medium
    issue: El verbo principal «contaminan» puede ser menos preciso que «hacen impuro» en este contexto
    rationale: κοινόω en el contexto de pureza/impureza se refiere a hacer impuro o mancillar. «Contaminar» es defendible, pero puede sugerir contaminación moderna o material. «Hacen impuro» preserva mejor la semántica de pureza ritual/moral y armoniza con la nota alternativa inglesa.
  - severity: low
    issue: La nota al pie no está totalmente alineada con la mejor opción textual
    rationale: Si el texto principal se ajusta a «hacen impuro», la nota debería ofrecer «contaminan» como alternativa, no al revés, para mantener coherencia entre texto principal y nota.
  revised_spanish_text: Pero las cosas que salen de la boca vienen del corazón[a], y esas cosas hacen impuro al hombre.
  revised_footnotes:
  - marker: a
    text: O «contaminan al hombre». El griego usa un singular representativo; literalmente, «el hombre».
    reason: lexical_alternative
  revision_rationale: Se revisa «salen del corazón» a «vienen del corazón» para expresar mejor la relación de origen del griego y mejorar la naturalidad del español. También se cambia «contaminan» por «hacen impuro» como equivalente principal más preciso de κοινόω en contexto de pureza, dejando «contaminan» como alternativa léxica en la nota. Se conserva «al hombre» para reflejar el singular masculino representativo documentado en el expediente inglés.
