translation:
  language: es
  text: Porque del corazón salen los malos pensamientos, homicidios, adulterios, inmoralidades sexuales, robos, falsos testimonios y blasfemias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calumnias». El término griego puede referirse tanto a calumnia contra personas como a habla blasfema contra Dios, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ γὰρ
  english_pob_choice: For out of
  chosen_spanish: Porque de
  alternatives_spanish:
  - Porque del
  - Pues de
  lexicon: BDAG
  rationale: γάρ aporta explicación/consecuencia y ἐκ señala origen. En español, «Porque de» comunica esa relación causal y de procedencia de manera natural; «Porque del» se usa en el texto por fluidez ante «corazón». «Pues de» también sería posible, pero suena menos directo en este contexto.
- source_word: καρδίας
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el interior
  - la mente
  lexicon: BDAG
  rationale: καρδία designa aquí el centro interior de la persona como fuente moral. «Corazón» conserva la metáfora bíblica sin reducirla a emoción o intelecto בלבד.
- source_word: ἐξέρχονται
  english_pob_choice: come
  chosen_spanish: salen
  alternatives_spanish:
  - salen fuera
  - proceden
  lexicon: BDAG
  rationale: El verbo expresa salida/procedencia. «Salen» es natural en español y mantiene la imagen de algo que emerge desde el interior.
- source_word: διαλογισμοὶ πονηροί
  english_pob_choice: evil thoughts
  chosen_spanish: los malos pensamientos
  alternatives_spanish:
  - pensamientos malos
  - malos razonamientos
  - malas intenciones
  lexicon: BDAG
  rationale: διαλογισμοί puede incluir pensamientos, razonamientos o deliberaciones. En este contexto de lista moral, «pensamientos» es claro; «malos» conserva el valor ético de πονηροί. «Evil» en español bíblico suele requerir «malos» o «malvados»; aquí «malos pensamientos» suena más directo y natural.
- source_word: φόνοι
  english_pob_choice: murders
  chosen_spanish: homicidios
  alternatives_spanish:
  - asesinatos
  - muertes
  lexicon: BDAG
  rationale: El plural denota actos de matar. «Homicidios» preserva el registro jurídico-moral y la amplitud del término sin hacer el español demasiado coloquial. «Asesinatos» sería más fuerte, pero algo más interpretativo.
- source_word: μοιχεῖαι
  english_pob_choice: adulteries
  chosen_spanish: adulterios
  alternatives_spanish:
  - actos de adulterio
  lexicon: BDAG
  rationale: El plural se mantiene en español con «adulterios» para conservar el estilo de lista y la correspondencia formal con el griego.
- source_word: πορνεῖαι
  english_pob_choice: sexual immoralities
  chosen_spanish: inmoralidades sexuales
  alternatives_spanish:
  - fornicaciones
  - inmoralidad sexual
  - pecados sexuales
  lexicon: BDAG
  rationale: πορνεία abarca conducta sexual ilícita en general. «Inmoralidades sexuales» conserva la amplitud del plural y evita restringir el término a una sola práctica. «Fornicaciones» resulta más tradicional pero menos claro en español moderno.
- source_word: κλοπαί
  english_pob_choice: thefts
  chosen_spanish: robos
  alternatives_spanish:
  - hurtos
  - hurtos y robos
  - sustracciones
  lexicon: BDAG
  rationale: κλοπή se refiere a robo/acto de robar. «Robos» es el equivalente más natural y entendido en español; «hurtos» sería más técnico y algo más estrecho.
- source_word: ψευδομαρτυρίαι
  english_pob_choice: false testimonies
  chosen_spanish: falsos testimonios
  alternatives_spanish:
  - falsos testimonios judiciales
  - falsos dichos
  lexicon: BDAG
  rationale: La forma plural apunta a declaraciones falsas, con matiz legal o testimonial. «Falsos testimonios» conserva ese valor y el plural.
- source_word: βλασφημίαι
  english_pob_choice: blasphemies
  chosen_spanish: blasfemias
  alternatives_spanish:
  - calumnias
  - maldiciones
  - hablás blasfemas
  lexicon: BDAG
  rationale: βλασφημία puede abarcar injuria/slandering o blasfemia contra Dios; sin embargo, el texto base de la POB inglesa finalmente opta por «blasphemies». En español, «blasfemias» es el equivalente directo y conserva la tensión semántica sin reducirla a un solo objeto.
theological_decisions:
- issue: Alcance de βλασφημίαι en una lista general de males
  english_pob_reading: blasphemies
  chosen_spanish_reading: blasfemias
  alternative_spanish_readings:
  - calumnias
  - injurias
  - hablas blasfemas
  rationale: Aunque el término griego puede incluir calumnia contra personas o habla irreverente contra Dios, la revisión inglesa reciente prefirió la forma más directa. En español, «blasfemias» mantiene esa decisión y deja abierta la amplitud del vocablo sin forzar una reinterpretación.
  doctrine_reference: Translation philosophy §3 y §6; preservar tensiones léxicas cuando el contexto no las resuelve por completo
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del audit trail inglés, que volvió de «slanders» a «blasphemies» para reflejar más directamente βλασφημίαι. También conserva el paralelismo plural de la lista y evita estrechar πορνεῖαι o ψευδομαρτυρίαι.
  spanish_consistency_notes:
  - Se mantuvo «corazón» para καρδία, coherente con el uso bíblico habitual y con la metáfora de origen interior.
  - 'Se preservó el plural de la lista: pensamientos, homicidios, adulterios, inmoralidades sexuales, robos, falsos testimonios, blasfemias.'
  - Se usó «blasfemias» en el texto principal y se documentó la alternativa semántica en nota, siguiendo el equilibrio de transparencia y lectura pública.
