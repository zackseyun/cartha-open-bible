base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/028.yaml
  text: Then Jesus answered her[a], “O woman, great is your faith[b]; let it be done for you as you desire.” And her daughter was healed from that hour.
  footnotes:
  - marker: a
    text: Or 'your trust is great'; Greek πίστις can also carry the sense of trust or faithfulness, though 'faith' is the default rendering here.
    reason: lexical_alternative
  - marker: b
    text: Or 'from that moment.' The Greek literally says 'from that hour.'
    reason: lexical_alternative
