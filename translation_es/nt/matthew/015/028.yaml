translation:
  language: es
  text: 'Entonces Jesús le respondió[a]: «¡Mujer!, grande es tu fe; hágase para ti como deseas». Y su hija fue sanada desde aquella hora[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu confianza es grande». El griego πίστις también puede llevar el matiz de confianza o fidelidad, aunque aquí se toma «fe» como traducción principal.
    reason: lexical_alternative
  - marker: b
    text: O «desde ese momento». El griego dice literalmente «desde aquella hora».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca temporal discursiva que enlaza la respuesta de Jesús con el intercambio anterior. «Entonces» conserva la progresión narrativa natural en español sin añadir énfasis no presente en el griego.
- source_word: ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν αὐτῇ
  english_pob_choice: answered her
  chosen_spanish: le respondió
  alternatives_spanish:
  - le contestó
  - dijo a ella
  lexicon: BDAG
  rationale: El participio aoristo con el verbo de habla funciona idiomáticamente como una sola introducción de discurso. «Le respondió» integra ambos elementos y preserva la referencia a la mujer con un dativo natural en español.
- source_word: Ὦ γύναι
  english_pob_choice: O woman
  chosen_spanish: Oh mujer
  alternatives_spanish:
  - Mujer
  - Oh, señora
  lexicon: BDAG
  rationale: «Oh» mantiene el vocativo enfático del griego. «Mujer» es el equivalente directo de γύναι; se evita «señora» porque suaviza y desplaza el valor léxico hacia una cortesía no explicitada por el texto.
- source_word: μεγάλη σου ἡ πίστις
  english_pob_choice: great is your faith
  chosen_spanish: grande es tu fe
  alternatives_spanish:
  - tu fe es grande
  - grande es tu confianza
  lexicon: BDAG
  rationale: Se conserva el orden enfático con predicado frontal. «Fe» sigue la decisión doctrinal habitual para πίστις; «confianza» es posible, pero no se elige como texto principal porque la POB inglesa retiene «faith» como lectura por defecto.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En esta aclamación de Jesús, la mujer es elogiada por su creer y confiar en él. «Fe» es la equivalencia más estable en español y conserva el peso teológico sin convertir el término en «fidelidad» del modo relacional/ético que requeriría otro contexto.
- source_word: γενηθήτω
  english_pob_choice: let it be done
  chosen_spanish: hágase
  alternatives_spanish:
  - que se haga
  - sea hecho
  lexicon: BDAG
  rationale: Imperativo pasivo aoristo de γίνομαι. «Hágase» preserva la forma impersonal/pasiva y el tono performativo de la palabra de Jesús, con una construcción muy natural en español bíblico contemporáneo.
- source_word: σοι
  english_pob_choice: for you
  chosen_spanish: contigo
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: BDAG
  rationale: En español, con un pasivo impersonal como «hágase», «contigo» comunica de forma idiomática el beneficio/efecto sobre la persona, evitando la dureza de un calco preposicional literal.
- source_word: ὡς θέλεις
  english_pob_choice: as you desire
  chosen_spanish: como deseas
  alternatives_spanish:
  - como quieres
  - como anhelas
  lexicon: BDAG
  rationale: «Deseas» conserva el matiz de θέλω como querer/desear con un tono digno y elevado. «Quieres» es posible, pero suena más coloquial; «anhelas» añade intensidad no garantizada por el texto.
- source_word: ἰάθη
  english_pob_choice: was healed
  chosen_spanish: quedó sanada
  alternatives_spanish:
  - fue sanada
  - fue curada
  lexicon: BDAG
  rationale: El aoristo pasivo indica la acción sanadora consumada. «Quedó sanada» expresa el resultado duradero desde ese punto, y en español suena más natural que un pasivo rígido; mantiene el sentido sin perder la pasividad del evento.
- source_word: θυγάτηρ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - hijita
  - muchacha
  lexicon: BDAG
  rationale: Término familiar directo sin necesidad de matización. «Hija» reproduce el parentesco sin añadir diminutivos ni inferencias afectivas no presentes.
- source_word: ἀπὸ τῆς ὥρας ἐκείνης
  english_pob_choice: from that hour
  chosen_spanish: desde aquella hora
  alternatives_spanish:
  - desde ese momento
  - a partir de aquella hora
  lexicon: BDAG
  rationale: Se conserva la literalidad temporal del griego. «Aquella hora» mantiene la imagen textual y la inmediatez del efecto; se evita sustituirlo por «momento» en el texto principal para no perder la huella expresiva del original.
theological_decisions:
- issue: Valor de πίστις en la respuesta de Jesús
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: La escena destaca la actitud de creer y confiar de la mujer ante Jesús. «Fe» conserva el término teológico estándar y no desplaza el énfasis hacia una fidelidad perseverante, que no es el matiz dominante aquí.
  doctrine_reference: 'DOCTRINE.md: πίστις → faith'
- issue: Fuerza del pasivo imperativo γενηθήτω
  english_pob_reading: let it be done
  chosen_spanish_reading: hágase
  alternative_spanish_readings:
  - que se haga
  - sea hecho
  rationale: La forma pasiva/impersonal comunica que el cumplimiento depende de la palabra autorizada de Jesús y no de la acción humana. «Hágase» preserva esa fuerza sin diluirla en una simple orden activa.
  doctrine_reference: 'Griego verbal: aoristo pasivo imperativo de γίνομαι'
- issue: Relación entre sanidad y resultado permanente
  english_pob_reading: was healed
  chosen_spanish_reading: quedó sanada
  alternative_spanish_readings:
  - fue sanada
  - fue curada
  rationale: El griego marca la sanidad como evento completo desde aquel instante. «Quedó sanada» transmite el resultado persistente sin introducir una doctrina nueva; solo explicita el efecto narrativo del aoristo pasivo.
  doctrine_reference: Aspecto verbal narrativo en el griego koiné
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en lo esencial: mantiene la secuencia temporal, el vocativo, la valoración de πίστις como «fe», el imperativo pasivo y la referencia temporal literal. No se detectaron revisiones posteriores que obliguen a modificar la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio fijo.
  - Se conserva la traducción habitual de πίστις como «fe», con nota alternativa para «confianza».
  - Se evita «SEÑOR» porque el pasaje no contiene el Tetragrámaton ni κύριος en esta unidad.
  - «Hágase» respeta mejor el pasivo imperativo que una paráfrasis activa.
  - «Desde aquella hora» preserva la imagen temporal del texto griego y corresponde al audit trail inglés.
