revisions:
- from: 'Entonces Jesús le respondió[a]: «Oh mujer, grande es tu fe; hágase contigo como deseas». Y su hija quedó sanada desde aquella hora[b].'
  to: 'Entonces Jesús le respondió[a]: «¡Mujer!, grande es tu fe; hágase para ti como deseas». Y su hija fue sanada desde aquella hora[b].'
  rationale: Se ajusta «contigo» a «para ti» para reflejar mejor el dativo de beneficio σοι, y «quedó sanada» a «fue sanada» para mantener más de cerca el pasivo de ἰάθη. También se mejora la naturalidad del vocativo en español con puntuación exclamativa. Las notas existentes siguen siendo válidas y se conservan con los mismos marcadores anclados en el texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:16:25Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en su estructura general: τότε = «Entonces», la introducción de habla condensa adecuadamente ἀποκριθεὶς... εἶπεν, «mujer» conserva γύναι, «grande es tu fe» refleja bien μεγάλη σου ἡ πίστις, y «desde aquella hora» mantiene ἀπὸ τῆς ὥρας ἐκείνης con la misma alternativa en nota. También preserva correctamente la nota léxica sobre πίστις.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos ajustes preferibles: 1) «Oh mujer» suena menos natural en español bíblico moderno que «¡Mujer!» o «Oh, mujer»; 2) «hágase contigo» no es la mejor correspondencia de σοι aquí, porque «para ti» expresa más claramente el dativo de beneficio y coincide mejor con la justificación del inglés POB. Además, «quedó sanada» es comprensible, pero «fue sanada» preserva más directamente el pasivo de ἰάθη y la formulación del POB inglés.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Fe» para πίστις está bien. No aparecen términos sensibles del glosario como Yahvé/Mesías/espíritu/esclavo. La principal cuestión es de precisión sintáctica más que terminológica: σοι se alinea mejor como «para ti» y ἰάθη mejor como «fue sanada».'
  issues:
  - severity: medium
    issue: «hágase contigo» para γενηθήτω σοι
    rationale: El griego usa un dativo que el POB inglés justificó como «for you». En español, «contigo» sugiere compañía o relación más que beneficio; «para ti» preserva mejor el sentido y suena natural.
  - severity: medium
    issue: «quedó sanada» para ἰάθη
    rationale: Aunque expresa resultado, el verbo griego es un pasivo simple de sanación. «Fue sanada» conserva más directamente la forma y evita introducir un matiz aspectual adicional no necesario.
  - severity: low
    issue: Puntuación/idiomaticidad de «Oh mujer»
    rationale: La combinación sin coma resulta algo rígida en español. «¡Mujer!» o «Oh, mujer» reproduce mejor el vocativo con naturalidad y dignidad.
  revised_spanish_text: 'Entonces Jesús le respondió[a]: «¡Mujer!, grande es tu fe; hágase para ti como deseas». Y su hija fue sanada desde aquella hora[b].'
  revised_footnotes:
  - marker: a
    text: O «tu confianza es grande». El griego πίστις también puede llevar el matiz de confianza o fidelidad, aunque aquí se toma «fe» como traducción principal.
    reason: lexical_alternative
  - marker: b
    text: O «desde ese momento». El griego dice literalmente «desde aquella hora».
    reason: lexical_alternative
  revision_rationale: Se ajusta «contigo» a «para ti» para reflejar mejor el dativo de beneficio σοι, y «quedó sanada» a «fue sanada» para mantener más de cerca el pasivo de ἰάθη. También se mejora la naturalidad del vocativo en español con puntuación exclamativa. Las notas existentes siguen siendo válidas y se conservan con los mismos marcadores anclados en el texto.
