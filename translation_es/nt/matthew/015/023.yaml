- from: 'Pero él no le respondió palabra[a]. Y sus discípulos se acercaron y le seguían preguntando, diciendo: «Despídela[b], porque va gritando detrás de nosotros».'
  to: 'Pero él no le respondió palabra[a]. Y sus discípulos se acercaron y le seguían preguntando, diciendo: «Despídela[b], porque está gritando detrás de nosotros».'
  rationale: Se ajusta la nota [a] para que conserve la misma función de alternativa de formulación que en la auditoría inglesa. Se cambia «va gritando» por «está gritando» para reflejar mejor el presente progresivo de κράζει en un español más natural y preciso. Se rehace la nota [b] para preservar con mayor exactitud la ambigüedad semántica y narrativa de Ἀπόλυσον αὐτήν sin resolverla interpretativamente.
