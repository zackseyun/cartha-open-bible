translation:
  language: es
  text: 'Pero él no le respondió palabra[a]. Y sus discípulos se acercaron y le seguían preguntando, diciendo: «Despídela[b], porque está gritando detrás de nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no le contestó».
    reason: alternative_reading
  - marker: b
    text: O «despáchala» o, implícitamente, «concédele lo que pide y despídela». Las palabras de los discípulos no explican si quieren que Jesús le conceda su petición y así la envíe, o simplemente que la aparte de ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: did not answer
  chosen_spanish: no le respondió
  alternatives_spanish:
  - no le contestó
  - no le dio respuesta
  lexicon: BDAG
  rationale: ἀποκρίνομαι expresa responder a una persona; en español, «responder» mantiene la relación directa con la persona y conserva el tono narrativo natural.
- source_word: αὐτῇ λόγον
  english_pob_choice: her a word
  chosen_spanish: palabra
  alternatives_spanish:
  - nada
  - ni una palabra
  lexicon: BDAG
  rationale: La expresión negativa intensifica que no hubo respuesta alguna. «No le respondió palabra» es una fórmula natural y fiel al valor enfático del griego.
- source_word: προσελθόντες
  english_pob_choice: came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - se aproximaron
  lexicon: BDAG
  rationale: El participio indica movimiento hacia Jesús; «se acercaron» conserva el matiz espacial de aproximación mejor que un simple «vinieron».
- source_word: ἠρώτουν
  english_pob_choice: kept asking
  chosen_spanish: le seguían preguntando
  alternatives_spanish:
  - seguían pidiéndole
  - le preguntaban insistentemente
  lexicon: BDAG
  rationale: El imperfecto marca acción continuada o repetida. «Le seguían preguntando» expresa esa insistencia sin exagerar hacia «rogar» o «suplicar».
- source_word: Ἀπόλυσον
  english_pob_choice: Send her away
  chosen_spanish: Despídela
  alternatives_spanish:
  - Envíala lejos
  - Déjala ir
  lexicon: BDAG
  rationale: ἀπολύω aquí funciona como mandar a alguien fuera o despedirlo. «Despídela» preserva la ambigüedad contextual que el inglés POB documenta entre soltarla, dejarla ir o alejarla de ellos.
- source_word: κράζει
  english_pob_choice: is crying out
  chosen_spanish: va gritando
  alternatives_spanish:
  - está clamando
  - sigue gritando
  lexicon: BDAG
  rationale: κράζω denota gritar o clamar en voz alta. «Va gritando» transmite la acción en curso y la insistencia del presente sin cargarlo con una interpretación más intensa de la necesaria.
- source_word: ὄπισθεν ἡμῶν
  english_pob_choice: behind us
  chosen_spanish: detrás de nosotros
  alternatives_spanish:
  - tras nosotros
  - después de nosotros
  lexicon: BDAG
  rationale: ὄπισθεν con genitivo puede ser espacial («detrás») o de persecución («después de»). «Detrás de nosotros» conserva la lectura más literal y deja abierta la posible implicación de seguirlos.
theological_decisions:
- issue: Intención de los discípulos en Ἀπόλυσον αὐτήν
  english_pob_reading: Render neutrally as 'Send her away' without specifying whether they wanted Jesus to grant her request or simply dismiss her.
  chosen_spanish_reading: «Despídela» sin precisar si querían que Jesús concediera su petición o simplemente la apartara de ellos.
  alternative_spanish_readings:
  - «Concédele lo que pide y despídela»
  - «Aléjala de nosotros»
  rationale: El imperativo griego no aclara por sí mismo si la intención es resolver su petición o simplemente quitarla de la escena. La formulación española mantiene esa tensión narrativa sin resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y mantiene la misma tensión interpretativa que el POB inglés: silencio absoluto de Jesús, acción reiterada de los discípulos y la ambigüedad de Ἀπόλυσον αὐτήν y ὄπισθεν ἡμῶν. No se introdujeron cambios respecto del audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Jesús» por el referente implícito del contexto inmediato, aunque este versículo pronominal lo exprese solo con «él».
  - Se mantiene «después de nosotros» no en el cuerpo principal, sino como posibilidad implícita en la nota, para no perder la alternativa semántica del griego.
  - «Despídela» se conserva como forma breve y natural en español, evitando interpretar de antemano si el acto es benevolente o expulsivo.
