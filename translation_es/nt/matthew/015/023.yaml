base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/023.yaml
  text: But he did not answer her a word[a]. And his disciples came and kept asking him, saying, “Send her away[b], because she is crying out behind us.”
  footnotes:
  - marker: a
    text: Or 'dismiss her.' The disciples' words do not make explicit whether they mean, 'grant her request and send her away,' or simply, 'send her away from us.'
    reason: alternative_reading
  - marker: b
    text: Or 'after us.' The Greek can denote either position ('behind us') or pursuit ('after us').
    reason: lexical_alternative
