translation:
  language: es
  text: 'Pero ella se acercó y se arrodilló delante de él[a], diciendo: «Señor, ayúdame».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo adoró». El verbo griego puede denotar inclinarse con reverencia, rendir homenaje o adorar, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca un giro suave respecto de la escena anterior; en español, «Pero» transmite bien esa transición contrastiva sin volverla demasiado fuerte.
- source_word: ἐλθοῦσα
  english_pob_choice: she came
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: El participio aoristo de ἔρχομαι se integra naturalmente en español como una acción finita. «Se acercó» capta el movimiento hacia Jesús dentro de la escena y suena más natural que un calco literal.
- source_word: προσεκύνει
  english_pob_choice: knelt before him
  chosen_spanish: se arrodilló delante de él
  alternatives_spanish:
  - lo adoró
  - se postró delante de él
  - se inclinó ante él
  lexicon: BDAG
  rationale: προσκυνέω puede expresar inclinación reverente, homenaje o adoración. «Se arrodilló delante de él» conserva el gesto corporal de reverencia sin resolver de antemano la comprensión teológica de la mujer; «lo adoró» queda como alternativa legítima, pero más cargada interpretativamente.
- source_word: αὐτῷ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - a él
  lexicon: BDAG
  rationale: Con προσεκύνει, el dativo señala a la persona ante quien se rinde homenaje. En español, «delante de él» comunica de forma natural esa relación espacial y reverente.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: El participio introduce el discurso directo; «diciendo» es la equivalencia directa y clara en español.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Señor Jesús
  lexicon: BDAG
  rationale: Según los lineamientos del proyecto, κύριος se traduce normalmente «Señor». Aquí funciona como tratamiento respetuoso y solemne dirigido a Jesús.
- source_word: βοήθει μοι
  english_pob_choice: help me
  chosen_spanish: ayúdame
  alternatives_spanish:
  - socórreme
  - ven en mi ayuda
  - asísteme
  lexicon: BDAG
  rationale: El imperativo presente expresa una súplica urgente. «Ayúdame» es la forma más breve, natural y fiel al tono apremiante de la petición.
theological_decisions:
- issue: Sentido de προσκυνέω hacia Jesús
  english_pob_reading: knelt before him
  chosen_spanish_reading: se arrodilló delante de él
  alternative_spanish_readings:
  - lo adoró
  - se postró delante de él
  rationale: El verbo puede denotar reverencia, homenaje o adoración, según el contexto. En esta escena la traducción principal preserva el gesto visible sin cerrar la cuestión de si la mujer está ofreciendo adoración en sentido pleno; la alternativa «lo adoró» se mantiene como posibilidad real del texto griego.
  doctrine_reference: Filosofía de traducción del proyecto; tabla de términos controvertidos para προσκυνέω y κύριος.
translation_notes:
  revision_awareness: Coincide con el testimonio textual y la evaluación de alta concordancia del paquete fuente; no se registran revisiones recientes que alteren la decisión de traducción.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al estándar del proyecto.
  - Se preserva la tensión semántica de προσκυνέω sin imponer una lectura teológica única.
  - La puntuación y el estilo siguen un español bíblico moderno, digno y publicable.
