translation:
  language: es
  text: Pero en vano me rinden culto, enseñando mandamientos de hombres[a] como doctrinas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de personas»; el griego «de hombres» usa un término humano genérico en contraste con lo que es divino.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «enseñando como doctrinas mandamientos humanos».'
    reason: alternative_reading
lexical_decisions:
- source_word: μάτην
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - vanamente
  - sin propósito
  - sin provecho
  lexicon: BDAG
  rationale: El adverbio expresa inutilidad o falta de efecto. «En vano» es la equivalencia natural y estable en español, y conserva el tono de reproche profético de la cita.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una continuidad con contraste leve. «Pero» reproduce mejor el giro de censura en el contexto que una simple adición.
- source_word: σέβονταί
  english_pob_choice: they worship
  chosen_spanish: rinden culto
  alternatives_spanish:
  - adoran
  - me veneran
  - me reverencian
  lexicon: BDAG
  rationale: σέβομαι puede implicar reverencia o culto dirigido a una deidad. En español, «rinden culto» comunica bien ese valor sin forzar una equivalencia demasiado litúrgica o excesivamente informal.
- source_word: διδάσκοντες
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - mientras enseñan
  - al enseñar
  lexicon: BDAG
  rationale: El participio presente expresa la manera o circunstancia en que su culto resulta vano. «Enseñando» mantiene la relación participial sin añadir tiempo o subordinación no explícitos.
- source_word: διδασκαλίας
  english_pob_choice: as doctrines
  chosen_spanish: como doctrinas
  alternatives_spanish:
  - como enseñanzas
  - en calidad de doctrinas
  lexicon: BDAG
  rationale: 'La relación sintáctica con ἐντάλματα es compacta y algo elíptica. «Como doctrinas» hace explícita en español la función predicativa: presentan mandamientos humanos con autoridad doctrinal.'
- source_word: ἐντάλματα
  english_pob_choice: the commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: BDAG
  rationale: Se refiere a mandatos prescritos. «Mandamientos» conserva el registro bíblico y la fuerza formal del término.
- source_word: ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de hombres
  alternatives_spanish:
  - de personas
  - humanos
  lexicon: BDAG
  rationale: El genitivo señala origen/posesión humana en contraste con lo divino. «De hombres» conserva el contraste tradicional y la forma genérica del griego; se mantiene la alternativa inclusiva como posibilidad contextual en nota.
theological_decisions:
- issue: Relación entre διδασκαλίας y ἐντάλματα ἀνθρώπων
  english_pob_reading: teaching as doctrines the commandments of men
  chosen_spanish_reading: enseñando como doctrinas mandamientos de hombres
  alternative_spanish_readings:
  - enseñando doctrinas, mandamientos de hombres
  - enseñando mandamientos de hombres como doctrinas
  rationale: La frase griega es comprimida y reproduce la cita profética con fuerza acusatoria. La formulación elegida en español conserva la idea de que mandamientos humanos reciben estatus doctrinal, sin añadir elementos ajenos al texto.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
- issue: Alcance genérico de ἀνθρώπων
  english_pob_reading: of men
  chosen_spanish_reading: de hombres
  alternative_spanish_readings:
  - de personas
  - humanos
  rationale: El término es genérico, no específico de varones, pero el proyecto preserva la forma fuente cuando esta mantiene el contraste entre lo divino y lo humano. En español, «de hombres» es la opción más transparente y tradicional; las alternativas inclusivas quedan implícitas como posibilidad semántica.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El expediente inglés fue revisado y quedó sin cambios (high agreement, agreement 1.0). La redacción española sigue esa lectura estable, pero ajusta la sintaxis a un español natural y publicable, manteniendo la compresión del griego y la fuerza de la acusación.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en el proyecto; aquí el pronombre de primera persona refleja la cita sin introducir el nombre divino explícito en el verso.
  - «Mandamientos» conserva el registro bíblico y evita debilitar la carga normativa de ἐντάλματα.
  - «De hombres» preserva el contraste humano/divino del genitivo ἀνθρώπων; la nota ofrece la alternativa verbalmente más inclusiva sin borrar la forma fuente.
  - La construcción «enseñando como doctrinas» mantiene la ambigüedad sintáctica del griego, en línea con el audit trail inglés.
