    rationale: El POB inglés preserva explícitamente la alternativa «of people»; el borrador español no la refleja y en su lugar desplaza la nota a otra palabra.
  - severity: low
    issue: La nota sobre «me veneran» no está justificada por el expediente auditado
    rationale: Aunque «veneran» es una posibilidad léxica, no es una alternativa preservada en las notas inglesas ni crea una ambigüedad nueva necesaria en español.
  - severity: low
    issue: El orden «como doctrinas mandamientos de hombres» es correcto pero menos natural en español
    rationale: Reordenar a «mandamientos de hombres como doctrinas» mantiene el mismo sentido y coincide mejor con la alternativa documentada en inglés.
  revised_spanish_text: Pero en vano me rinden culto, enseñando mandamientos de hombres[a] como doctrinas[b].
