revisions:
- from: ciertamente no necesita honrar a su padre[a][b]. Y han anulado la palabra de Dios por causa de su tradición.
  to: ciertamente no tiene por qué honrar a su padre[b][a]. Y ustedes han anulado la palabra de Dios por causa de su tradición.
  rationale: 'Se revisa la primera cláusula para reflejar mejor la dispensa de obligación que el POB documenta para οὐ μὴ τιμήσει: «no tiene por qué honrar» es más fiel y más idiomático que «no necesita honrar». También se explicita «ustedes» en la segunda cláusula para mejorar la naturalidad del español en un contexto de reprensión directa, sin alterar el sentido. Se conservan las notas y sus anclajes; solo se normalizan comillas tipográficas y se mantiene el orden de marcadores presente en el texto.'
