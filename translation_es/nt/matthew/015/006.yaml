translation:
  language: es
  text: ciertamente no tiene por qué honrar a su padre[b][a]. Y ustedes han anulado la palabra de Dios por causa de su tradición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el mandamiento de Dios» en lugar de «la palabra de Dios».
    reason: textual_variant
  - marker: b
    text: «Honrar» aquí probablemente incluye la obligación práctica de proveer para los padres, no solo mostrarles respeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ
  english_pob_choice: certainly need not
  chosen_spanish: ciertamente no necesita
  alternatives_spanish:
  - seguramente no debe
  - ciertamente no tendrá que
  lexicon: BDAG
  rationale: La doble negación enfática οὐ μή intensifica la negación; en este contexto funciona como una dispensa de obligación. En español, 'ciertamente no necesita' conserva esa fuerza sin sonar forzado.
- source_word: τιμήσει
  english_pob_choice: honor
  chosen_spanish: honrar
  alternatives_spanish:
  - mostrar honra a
  - honrar y cuidar
  lexicon: BDAG
  rationale: τιμάω normalmente significa 'honrar'. 'Honrar' preserva el vínculo léxico con el mandamiento y deja implícita la posible implicación práctica de sostén.
- source_word: πατέρα αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre y a su madre
  - a su progenitor
  lexicon: BDAG
  rationale: El griego transmitido dice singular ('su padre'); por eso el español mantiene el singular y no amplía a 'padre y madre'.
- source_word: ἠκυρώσατε
  english_pob_choice: have nullified
  chosen_spanish: han anulado
  alternatives_spanish:
  - han invalidado
  - han dejado sin efecto
  - han hecho nula
  lexicon: BDAG
  rationale: ἀκυρόω expresa invalidar o hacer nulo. 'Han anulado' es claro en español y conserva la acusación fuerte de volver ineficaz la palabra de Dios.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mandamiento de Dios
  lexicon: BDAG
  rationale: El texto griego base lee λόγον, no ἐντολήν. Por eso se traduce literalmente 'la palabra de Dios'; la alternativa textual se reserva para nota.
- source_word: διὰ τὴν παράδοσιν ὑμῶν
  english_pob_choice: for the sake of your tradition
  chosen_spanish: por causa de su tradición
  alternatives_spanish:
  - a causa de su tradición
  - por el bien de su tradición
  lexicon: BDAG
  rationale: 'διά con acusativo expresa causa o motivo. ''Por causa de'' comunica bien que la tradición es el motivo por el cual se anula la palabra de Dios. En español se ajusta el posesivo a la segunda persona formal del contexto bíblico: ''su''.'
theological_decisions:
- issue: Si explicitar que 'honrar' incluye sostén material a los padres
  english_pob_reading: Keep 'honor' in the main text without expanding to 'support,' allowing the contextual implication to stand.
  chosen_spanish_reading: Mantener 'honrar' sin explicitar 'sostener' o 'proveer'.
  alternative_spanish_readings:
  - proveer a su padre
  - darle sustento a su padre
  rationale: El verbo griego es τιμάω, no un verbo más estrecho de mantenimiento económico. En español, 'honrar' preserva el lenguaje bíblico y deja que el contexto determine la implicación práctica.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Si armonizar este versículo con el paralelo y con formulaciones tradicionales
  english_pob_reading: Translate the singular 'his father' and 'word of God' as printed in the SBLGNT text.
  chosen_spanish_reading: 'Seguir el griego dado: singular ''su padre'' y ''palabra de Dios''.'
  alternative_spanish_readings:
  - su padre o su madre
  - el mandamiento de Dios
  rationale: La primacía del texto original requiere no suavizar el versículo hacia el contexto inmediato o hacia lecturas tradicionales. Las variantes relevantes se señalan en nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se refleja καὶ con ''Y'' y διὰ con ''por causa de''; además, se mantiene la cláusula principal como una negación enfática natural en español. Se evitó armonizar con el paralelo y se conservó la lectura griega de λόγον.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y no una perífrasis.
  - Se mantuvo 'honrar' para τιμάω por consistencia con el mandamiento.
  - Se conservó el singular 'su padre' conforme al griego transmitido.
  - La posesión 'su tradición' se entiende en segunda persona plural de cortesía implícita en el contexto bíblico.
  - Las notas a y b están ancladas en el texto donde corresponde.
