base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/020.yaml
  text: These are the things that defile the man[b][a], but to eat with unwashed hands does not defile the man.
  footnotes:
  - marker: a
    text: Or 'make the man unclean.' The Greek verb can refer to making someone ceremonially unclean; here 'defile' preserves both the ritual-purity setting and the broader sense of corruption in Jesus' teaching.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' is a representative singular, expressing a general truth about a human being.'
    reason: lexical_alternative
