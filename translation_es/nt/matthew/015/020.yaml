translation:
  language: es
  text: Estas son las cosas que contaminan al hombre[a][b], pero comer con manos no lavadas no contamina al hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hacer inmundo al hombre”. El verbo griego puede referirse a volver a alguien ritualmente inmundo; aquí “contaminar” preserva tanto el trasfondo de pureza ritual como el sentido más amplio de corrupción en la enseñanza de Jesús.
    reason: lexical_alternative
  - marker: b
    text: “El hombre” es un singular representativo, que expresa una verdad general sobre un ser humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: κοινοῦντα / κοινοῖ
  english_pob_choice: defile / defile
  chosen_spanish: contaminan / contamina
  alternatives_spanish:
  - hacen inmundo / hace inmundo
  - profanan / profana
  - manchan / mancha
  lexicon: BDAG
  rationale: En este contexto de pureza ritual, κοινόω comunica hacer a alguien impuro o contaminado. "Contaminar" conserva la fuerza de impureza sin depender de un término eclesiástico más cargado que podría sonar ajeno en español moderno. También permite mantener el contraste del versículo entre lo que sí afecta al ser humano y lo que no.
- source_word: ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  - el hombre (como singular representativo)
  lexicon: BDAG
  rationale: El griego usa singular con artículo y valor representativo general. "El hombre" conserva esa forma masculina singular generalizada, en línea con la decisión inglesa de mantener el singular representativo en vez de pluralizar o abstraer el sustantivo.
- source_word: ἀνίπτοις χερσὶν
  english_pob_choice: with unwashed hands
  chosen_spanish: con manos no lavadas
  alternatives_spanish:
  - con manos sin lavar
  - con manos impuras
  lexicon: BDAG
  rationale: La frase dativa describe el estado de las manos en relación con el acto de comer. "No lavadas" expresa de manera natural la condición relevante en español y mantiene el vínculo con la discusión sobre el lavado ritual de manos.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: comer
  alternatives_spanish:
  - el comer
  - comiendo
  lexicon: BDAG
  rationale: El infinitivo articular se vierte con el infinitivo simple en español. "Comer" es la forma más natural y fiel aquí, sin necesidad de nominalizarla.
- source_word: ταῦτά ἐστιν τὰ
  english_pob_choice: These are the things that
  chosen_spanish: Estas son las cosas que
  alternatives_spanish:
  - Estas son las que
  - Esto es lo que
  lexicon: BDAG
  rationale: La construcción demostrativa-predicativa se traduce con claridad idiomática en español, conservando el énfasis deíctico del griego y la referencia a lo dicho en el contexto inmediato.
- source_word: δέ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: '"Pero" comunica de forma directa la oposición entre lo que sí contamina y el comer con manos no lavadas, igual que el valor contrastivo de δέ en este versículo.'
theological_decisions:
- issue: Sentido de κοινόω en un contexto de pureza
  english_pob_reading: Rendered as 'defile' to preserve both ritual-impurity background and broader moral force in Jesus' teaching.
  chosen_spanish_reading: Traducido como "contaminar" para conservar la referencia a impureza ritual y, a la vez, la amplitud moral del dicho de Jesús.
  alternative_spanish_readings:
  - hacer inmundo
  - profanar
  rationale: El pasaje trata de impureza ritual, pero el dicho de Jesús apunta más allá de la mera etiqueta ceremonial. "Contaminar" permite retener ambos planos sin reducir el verbo a un tecnicismo litúrgico ni debilitar su fuerza.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Singular representativo de ἄνθρωπον
  english_pob_reading: Rendered as 'the man' rather than a gender-neutral plural or abstract noun.
  chosen_spanish_reading: Conservado como "el hombre" en singular representativo.
  alternative_spanish_readings:
  - la persona
  - las personas
  - el ser humano
  rationale: La forma gramatical del griego es singular masculino con valor general. Mantener "el hombre" preserva esa estructura sin convertirla en plural ni borrar el modo en que el texto formula la verdad general.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con el estado reciente de revisión inglesa; no se registran cambios aplicados en la auditoría, y la redacción española mantiene esa línea sin introducir reinterpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantuvo el singular representativo "el hombre" para corresponder al griego y al audit trail inglés.
  - '"Contaminar" se eligió como equivalente natural de κοινόω en este contexto, evitando tanto la calca técnica como una paráfrasis más débil.'
  - La construcción final conserva la oposición del texto griego con "pero" y la referencia concreta a manos no lavadas.
