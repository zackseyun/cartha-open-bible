translation:
  language: es
  text: 'Porque Dios dijo[a]: «Honra a tu padre y a tu madre», y: «El que habla mal de padre o madre ciertamente morirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que maldice a padre o madre debe ser condenado a muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ γὰρ θεὸς
  english_pob_choice: For God
  chosen_spanish: Porque Yahvé
  alternatives_spanish:
  - Porque Dios
  - Pues Yahvé
  lexicon: BDAG; contexto de cita legal del AT
  rationale: En español conviene mantener el valor causal de γάρ con «Porque». Aunque el griego dice θεός, el contenido citado pertenece al mandamiento de Yahvé; por eso se usa «Yahvé» según la terminología base del proyecto, sin ocultar el nombre divino.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - mandó
  lexicon: BDAG
  rationale: λέγω aquí introduce una cita escrituraria. «Dijo» es la equivalencia natural y no añade la fuerza de «mandó», que sería interpretativa.
- source_word: Τίμα
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Honra tú
  - Da honra a
  lexicon: BDAG
  rationale: τιμάω en este mandamiento expresa rendir honor debido. «Honra» preserva bien el valor ético y legal en español bíblico moderno.
- source_word: τὸν πατέρα καὶ τὴν μητέρα
  english_pob_choice: your father and your mother
  chosen_spanish: a tu padre y a tu madre
  alternatives_spanish:
  - a padre y madre
  - a tu padre y a tu madre
  lexicon: BDAG
  rationale: El posesivo es implícito en la cita del mandamiento y en español debe expresarse para que la orden suene natural y fiel. Se conserva el singular distributivo con «a tu padre y a tu madre».
- source_word: Ὁ κακολογῶν
  english_pob_choice: Whoever speaks evil of
  chosen_spanish: El que habla mal de
  alternatives_spanish:
  - Quien maldice a
  - Quien habla mal contra
  lexicon: BDAG
  rationale: κακολογέω puede abarcar hablar mal, injuriar o maldecir. «El que habla mal de» refleja el sentido amplio que la POB inglesa eligió, sin estrecharlo a «maldecir».
- source_word: πατέρα ἢ μητέρα
  english_pob_choice: father or mother
  chosen_spanish: padre o de madre
  alternatives_spanish:
  - su padre o su madre
  - padre o madre
  lexicon: BDAG
  rationale: Los objetos son genéricos/anarthros; en español, después de «habla mal de», la repetición del artículo no es necesaria y «padre o de madre» mantiene la concisión del griego.
- source_word: θανάτῳ τελευτάτω
  english_pob_choice: must surely die
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - debe morir
  - morirá sin falta
  lexicon: BDAG
  rationale: La forma griega expresa una fórmula legal solemne de muerte. «Ciertamente morirá» preserva la gravedad de la sentencia sin introducir explícitamente el agente humano de ejecución, coherente con la lectura auditada de la POB.
theological_decisions:
- issue: Nombre divino en la cita del mandamiento
  english_pob_reading: For God said
  chosen_spanish_reading: Porque Yahvé dijo
  alternative_spanish_readings:
  - Porque Dios dijo
  - Pues Yahvé dijo
  rationale: Aunque el texto griego tiene θεός, la cita reproduce el mandamiento del AT donde el nombre propio divino está en juego. La política del proyecto pide «Yahvé» cuando el trasfondo es el nombre divino, y aquí eso clarifica la fuente de autoridad sin cambiar el contenido.
  doctrine_reference: 'Terminología del proyecto: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota sin anclaje. La traducción mantiene el sentido legal de la cita y la alternativa lexical de κακολογῶν queda absorbida en la elección «habla mal de», sin necesidad de nota al pie en esta versión.
  spanish_consistency_notes:
  - Se mantuvo un español bíblico moderno, con imperativos y fórmulas legales claros.
  - Se evitó «SEÑOR» para el nombre divino, siguiendo la convención del proyecto.
  - Se conservó la severidad de la sentencia final sin expandir el agente de la pena.
  - No se añadieron notas al pie porque la única alternativa relevante quedó suficientemente expresada en el texto principal.
