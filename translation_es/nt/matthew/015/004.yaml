review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura causal, la cita doble y la gravedad de θανάτῳ τελευτάτω. Sin embargo, no sigue fielmente el dato fuente en ὁ γὰρ θεὸς, que aquí dice «Dios», no «Yahvé». Además, falta preservar la alternativa léxica documentada para κακολογῶν / θανάτῳ τελευτάτω mediante nota, como sí la conserva la auditoría inglesa.
  spanish_quality_summary: El español es claro y legible, pero «padre o de madre» es torpe y poco natural; debe ser «padre o madre». También conviene mantener una formulación idiomática y solemne. El resto del versículo suena bien en español bíblico moderno.
  glossary_alignment: Buen uso de «Honra» y de la fórmula legal «ciertamente morirá». No obstante, la preferencia general del proyecto por «Yahvé» no debe imponerse aquí contra el texto griego explícito θεός; corresponde «Dios».
  issues:
  - severity: high
    issue: «Porque Yahvé dijo» sustituye θεός por «Yahvé»
    rationale: El texto fuente griego dice ὁ γὰρ θεὸς, y la auditoría inglesa eligió «For God». Aunque la cita veterotestamentaria proviene de Yahvé, aquí el evangelio lo expresa como «Dios». Cambiarlo a «Yahvé» altera la forma del testimonio citado en Mateo.
  - severity: medium
    issue: Falta la nota léxica para la alternativa «maldice / sea condenado a muerte»
    rationale: La POB inglesa conserva una alternativa significativa para κακολογῶν y θανάτῳ τελευτάτω. Debe preservarse en español con nota al pie, ya que sigue siendo relevante y natural en español.
  - severity: medium
    issue: «padre o de madre» es una construcción antinatural
    rationale: Tras «habla mal de», la coordinación correcta y natural es «padre o madre». La redacción actual suena defectuosa.
  revised_spanish_text: 'Porque Dios dijo[a]: «Honra a tu padre y a tu madre», y: «El que habla mal de padre o madre ciertamente morirá».

