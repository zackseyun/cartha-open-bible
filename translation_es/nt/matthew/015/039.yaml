translation:
  language: es
  text: Y después de despedir a las multitudes, subió a la barca y llegó a la región de Magadán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Magdala» en lugar de «Magadán».
    reason: textual_variant
lexical_decisions:
- source_word: ἀπολύσας
  english_pob_choice: after dismissing
  chosen_spanish: después de despedir
  alternatives_spanish:
  - habiendo despedido
  - tras despedir
  - después de enviar
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal expresa acción previa; en español, «después de despedir» comunica esa secuencia de manera natural y fiel al valor antecedente sin añadir matices extraños.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la multitud
  lexicon: BDAG
  rationale: El plural griego pide un plural en español. «Multitudes» conserva la fuerza colectiva de ὄχλους y es suficientemente natural en registro bíblico; se evita reducirlo a singular.
- source_word: ἐνέβη εἰς τὸ πλοῖον
  english_pob_choice: he got into the boat
  chosen_spanish: subió a la barca
  alternatives_spanish:
  - se embarcó en la barca
  - entró en la barca
  lexicon: BDAG
  rationale: El giro idiomático describe embarcarse. «Subió a la barca» es una forma natural en español bíblico y comunica el movimiento concreto sin calco rígido.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: BDAG
  rationale: En un contexto de desplazamiento geográfico, «llegó» expresa de forma clara la culminación del viaje. Aunque el inglés POB usa «came», en español «llegó» evita ambigüedad y conserva el sentido narrativo.
- source_word: τὰ ὅρια
  english_pob_choice: the region
  chosen_spanish: la región
  alternatives_spanish:
  - los límites
  - el territorio
  - la comarca
  lexicon: BDAG
  rationale: Aunque el sustantivo griego es literalmente «límites/bordes», aquí funciona idiomáticamente para una zona geográfica. «Región» reproduce ese valor contextual, como en el audit trail inglés.
- source_word: Μαγαδάν
  english_pob_choice: Magadan
  chosen_spanish: Magadán
  alternatives_spanish:
  - Magdala
  lexicon: BDAG
  rationale: Se translitera el topónimo del texto griego leído en la base SBLGNT. Se conserva la variante tradicional «Magdala» solo como alternativa textual, no en el texto principal.
theological_decisions:
- issue: Forma del nombre de lugar final
  english_pob_reading: Magadan, with a footnote noting the variant Magdala
  chosen_spanish_reading: Magadán, con nota sobre la variante Magdala
  alternative_spanish_readings:
  - Magdala
  rationale: No es una cuestión doctrinal sino textual/toponímica. Se sigue el testimonio griego base y se preserva la variante conocida para transparencia auditiva.
  doctrine_reference: Principio de primacía del texto original y transparencia textual
translation_notes:
  revision_awareness: El texto griego y el contexto de auditoría inglesa coinciden en la secuencia narrativa y en la variante textual final. No se detectan revisiones aplicadas; la versión española sigue de cerca la sintaxis y decisiones léxicas auditadas, adaptándolas a una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene «barca» para πλοῖον, coherente con el registro narrativo bíblico en español.
  - Se conserva la variante textual en nota para reflejar la transparencia del aparato sin desplazar la lectura principal.
  - «Llegó» se usa como equivalente narrativo natural de ἦλθεν en un contexto de desplazamiento, sin alterar el sentido de movimiento.
  - Se evita «SEÑOR» u otra convención no pertinente porque el versículo no contiene lenguaje divino directo.
