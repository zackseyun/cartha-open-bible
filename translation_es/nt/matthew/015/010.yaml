- from: 'Y llamando a la multitud, les dijo: «Escuchen y comprendan».'
  to: 'Y llamando a la multitud hacia sí, les dijo: «Escuchen[a] y comprendan».'
  rationale: Se añadió 'hacia sí' para preservar el valor direccional de προσκαλέομαι documentado en el audit trail inglés. Se mantuvo 'Escuchen y comprendan' como texto principal por su naturalidad y fidelidad, y se agregó una nota para la alternativa léxica de Ἀκούετε, en línea con el English POB.
