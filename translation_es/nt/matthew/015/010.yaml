translation:
  language: es
  text: 'Y llamando a la multitud hacia sí, les dijo: «Escuchen[a] y comprendan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oigan y comprendan».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simplemente continúa la escena. «Y» conserva la coordinación del griego sin añadir matiz narrativo extra.
- source_word: προσκαλεσάμενος
  english_pob_choice: calling ... to him
  chosen_spanish: llamando
  alternatives_spanish:
  - después de llamar
  - habiendo llamado
  - convocando
  lexicon: BDAG
  rationale: El participio aoristo se entiende como una acción previa o concomitante al verbo principal. En español, «llamando» mantiene la secuencia natural sin introducir «después de», que no está explícito en el griego. «Convocando» sería más solemne, pero menos natural aquí.
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος refiere a un grupo reunido de personas. «Multitud» es fiel y comprensible en español bíblico actual; evita el tono algo más coloquial de «gente» y el matiz menos común de «gentío».
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo a ellos
  lexicon: BDAG
  rationale: La construcción directa con dativo se expresa naturalmente en español con «les dijo». Conserva la sencillez del verbo λέγω sin sobreexplicar.
- source_word: Ἀκούετε
  english_pob_choice: Listen
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen atentamente
  lexicon: BDAG
  rationale: El imperativo plural presente pide atención continua. «Escuchen» comunica bien la fuerza exhortativa en español contemporáneo. «Oigan» es posible, pero puede sonar menos específico que la llamada a prestar atención.
- source_word: συνίετε
  english_pob_choice: understand
  chosen_spanish: comprendan
  alternatives_spanish:
  - entiendan
  - capten el sentido
  lexicon: BDAG
  rationale: συνίημι aquí significa captar el sentido de lo oído. «Comprendan» mantiene el paralelismo con «Escuchen» y conserva la progresión de oír a entender. «Entiendan» también es válida, pero «comprendan» suena un poco más elevado y bíblicamente estable.
theological_decisions:
- issue: Distinción entre oír y entender
  english_pob_reading: Listen and understand.
  chosen_spanish_reading: «Escuchen y comprendan»
  alternative_spanish_readings:
  - «Oigan y entiendan»
  - «Escuchen y entiendan»
  rationale: El texto contrapone audición y comprensión, no solo sonido y percepción. Mantener dos verbos distintos preserva la tensión didáctica del dicho de Jesús. «Comprendan» subraya el paso de oír a captar el significado.
  doctrine_reference: Hermenéutica del discipulado; llamado a la obediencia inteligente al mensaje de Jesús
translation_notes:
  revision_awareness: La versión inglesa de referencia retiró «after» para reflejar más directamente el participio. La redacción española evita igualmente añadir una preposición o adverbio temporal inexistente en el griego, y conserva el orden narrativo simple del original.
  spanish_consistency_notes:
  - Se usa «multitud» para ὄχλος, en coherencia con el valor de grupo reunido y con el registro bíblico actual.
  - Se mantiene el trato directo en imperativo plural con punto de exclamación implícito por las comillas, sin agregar intensificadores no sustentados por el texto.
  - No se introduce «oír» como alternativa principal en el texto, aunque se reconoce como opción legítima en las decisiones léxicas debido a la amplitud de ἀκούω.
