translation:
  language: es
  text: Tomó los siete panes y los peces[a], y, después de dar gracias, partió los panes y seguía dándoles a los discípulos, y los discípulos a las multitudes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo dado gracias». El participio griego puede expresarse de manera más formal así.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - agarró
  lexicon: BDAG
  rationale: λαμβάνω aquí introduce la acción de Jesús al tomar el alimento antes de la acción de gracias y la distribución. En español, «tomó» es la equivalencia narrativa natural y fiel al orden de acciones del versículo.
- source_word: ἑπτὰ ἄρτους
  english_pob_choice: the seven loaves
  chosen_spanish: los siete panes
  alternatives_spanish:
  - los siete panes de pan
  - los siete hogazas
  lexicon: BDAG
  rationale: ἄρτος en relatos de alimentación se refiere concretamente a panes/loaves. «Panes» comunica el sentido de manera clara y sin forzar una imagen demasiado específica.
- source_word: ἰχθύας
  english_pob_choice: the fish
  chosen_spanish: los peces
  alternatives_spanish:
  - los pescados
  lexicon: BDAG
  rationale: El plural griego permite una referencia genérica al alimento. «Peces» preserva el referente básico sin introducir una forma más culinaria como «pescados», que puede sonar menos directa en este contexto.
- source_word: εὐχαριστήσας
  english_pob_choice: after giving thanks
  chosen_spanish: después de dar gracias
  alternatives_spanish:
  - habiendo dado gracias
  - tras dar gracias
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad respecto al verbo principal. «Después de dar gracias» reproduce bien la relación temporal sin añadir un objeto explícito que el griego no menciona.
- source_word: ἔκλασεν
  english_pob_choice: he broke them
  chosen_spanish: los partió
  alternatives_spanish:
  - los rompió
  - los quebró
  lexicon: BDAG
  rationale: κλάω en este contexto describe partir el pan para distribuirlo. En español, «partió» es la forma natural y reverente para este acto, y el pronombre «los» remite a los panes.
- source_word: ἐδίδου
  english_pob_choice: kept giving them
  chosen_spanish: seguía dándoselos
  alternatives_spanish:
  - les daba
  - les iba dando
  lexicon: BDAG
  rationale: El imperfecto comunica acción continua o repetida. «Seguía dándoselos» conserva esa fuerza iterativa mejor que un simple pretérito.
- source_word: μαθηταῖς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  lexicon: BDAG
  rationale: El dativo marca a los destinatarios. Se omite «sus» porque no está explícito en el griego, aunque el contexto lo haga evidente.
- source_word: οἱ δὲ μαθηταὶ τοῖς ὄχλοις
  english_pob_choice: and the disciples to the crowds
  chosen_spanish: y los discípulos a las multitudes
  alternatives_spanish:
  - y los discípulos a la gente
  - y los discípulos a las muchedumbres
  lexicon: BDAG
  rationale: La segunda cláusula es elíptica en griego; el verbo se sobreentiende desde el contexto de distribución. «Multitudes» preserva el plural de ὄχλοι y el matiz colectivo de Mateo.
theological_decisions:
- issue: Posible resonancia eucarística de εὐχαριστήσας
  english_pob_reading: Render the ordinary narrative action 'after giving thanks' without sacramental expansion.
  chosen_spanish_reading: «después de dar gracias», sin expansión litúrgica o sacramental
  alternative_spanish_readings:
  - «habiendo dado gracias»
  - «después de haber dado gracias»
  - «dando gracias»
  rationale: Aunque el gesto puede evocar usos posteriores asociados con la cena del Señor, el texto narra una acción ordinaria dentro de un milagro de alimentación. La traducción debe mantener esa tensión sin importar interpretaciones sacramentales que el griego no explicita aquí.
  doctrine_reference: Preservar la tensión teológica; no añadir una lectura doctrinal no formulada por el pasaje.
translation_notes:
  revision_awareness: El control cruzado disponible indica alta concordancia y ausencia de cambios recientes relevantes; se mantiene la solución previa sin ajustes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el Tetragrámaton ni una cita directa que requiera ese tratamiento.
  - «Mesías» no corresponde en este versículo; no se introduce terminología cristológica innecesaria.
  - Se conserva el imperfecto con valor iterativo en «seguía dándoselos» para reflejar la distribución continua.
  - La nota a aclara la alternativa formal del participio sin convertirla en traducción principal.
