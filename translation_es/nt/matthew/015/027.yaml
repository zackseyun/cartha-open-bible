    text: Or 'dogs,' 'house dogs,' or 'puppies'; the Greek uses a diminutive form, suggesting small household dogs.
    reason: lexical_alternative
  - marker: b
    text: '''Lord'' could also be understood as a respectful ''sir,'' but the translation preserves the usual Gospel rendering of κύριος.'
    reason: alternative_reading
