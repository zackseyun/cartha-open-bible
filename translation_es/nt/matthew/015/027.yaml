translation:
  language: es
  text: 'Ella dijo[a]: «Sí, Señor[b], porque aun los perritos[c] comen de las migajas que caen de la mesa de sus amos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ella respondió». El griego presenta un verbo de decir; el español puede reflejarlo con una cita directa o con una formulación equivalente de respuesta.
    reason: alternative_reading
  - marker: b
    text: O «señor», como trato respetuoso; aquí se mantiene «Señor» para conservar el rango reverencial del griego κύριος en el discurso a Jesús.
    reason: alternative_reading
  - marker: c
    text: O «perros», «perros de casa» o «cachorros»; el griego usa una forma diminutiva, que sugiere perros pequeños o domésticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Sí, ciertamente
  - Claro
  lexicon: BDAG
  rationale: Es una afirmación directa y natural en español. «Sí» conserva la sencillez y el valor afirmativo del griego sin añadir matices no presentes.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  - amo
  lexicon: BDAG
  rationale: En este contexto de trato directo a Jesús, el POB inglés preserva «Lord» por su amplitud reverencial. En español, «Señor» es la forma reverente equivalente y mantiene ese rango, sin reducirlo a un simple «señor» de cortesía.
- source_word: κυνάρια
  english_pob_choice: little dogs
  chosen_spanish: perritos
  alternatives_spanish:
  - perros pequeños
  - perros de casa
  - doguitos
  lexicon: BDAG
  rationale: El diminutivo griego sugiere perros pequeños o domésticos. «Perritos» reproduce mejor ese valor diminutivo que «perros» y resulta natural en español, sin exagerar con una paráfrasis.
- source_word: ἐσθίει
  english_pob_choice: eat
  chosen_spanish: comen
  alternatives_spanish:
  - están comiendo
  - se alimentan
  lexicon: BDAG
  rationale: 'Aunque el verbo griego aparece en singular por concordancia con un sustantivo neutro plural, el sentido en español requiere plural: los perritos. «Comen» es la equivalencia más directa y idiomática.'
- source_word: ψιχίων
  english_pob_choice: crumbs
  chosen_spanish: migajas
  alternatives_spanish:
  - migas
  - sobras pequeñas
  - pedacitos
  lexicon: BDAG
  rationale: «Migajas» es el equivalente español más natural para los pequeños restos de comida que caen de la mesa y preserva la imagen doméstica del texto.
- source_word: τῶν πιπτόντων
  english_pob_choice: that fall
  chosen_spanish: que caen
  alternatives_spanish:
  - cayendo
  - que van cayendo
  lexicon: BDAG
  rationale: El participio presente expresa una acción continua o general. En español, una relativa simple («que caen») comunica con claridad la misma idea sin sonar forzada.
- source_word: τραπέζης
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - mesa de comer
  - mesa del banquete
  lexicon: BDAG
  rationale: En el contexto doméstico de la escena, «mesa» es el equivalente natural de τράπεζα. «Mesa» mantiene la imagen concreta y evita una formalidad innecesaria.
- source_word: τῶν κυρίων αὐτῶν
  english_pob_choice: their masters’
  chosen_spanish: de sus amos
  alternatives_spanish:
  - de sus dueños
  - de sus señores
  lexicon: BDAG
  rationale: Aquí κύριος ya no funciona como título divino sino como relación de dominio sobre los perros. «Amo» conserva la relación de autoridad del original mejor que «dueño», y coincide con el matiz doméstico del símil.
theological_decisions:
- issue: Tratamiento de κύριε en la voz dirigida a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  rationale: La POB inglesa conserva «Lord» para mantener la posibilidad de un reconocimiento más pleno de la autoridad de Jesús. En español, «Señor» cumple esa misma función reverente y doctrinalmente amplia, sin cerrar el sentido a un mero trato cortés.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor del diminutivo κυνάρια
  english_pob_reading: little dogs
  chosen_spanish_reading: perritos
  alternative_spanish_readings:
  - perros pequeños
  - perritos de casa
  rationale: El texto conserva una metáfora potencialmente dura, pero el diminutivo suaviza parcialmente la imagen sin eliminarla. «Perritos» refleja mejor ese matiz que «perros», evitando endurecer el dicho más allá del griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que hubo alta concordancia con el control externo; por ello se mantiene la solución ya validada, con ajuste al español para conservar el diminutivo y la reverencia sin sobretraducción.
  spanish_consistency_notes:
  - Se conserva el trato reverente a Jesús con «Señor», en línea con el valor doctrinal del término en el POB.
  - Se mantiene el diminutivo del original con «perritos», evitando neutralizar la fuerza lexical de κυνάρια.
  - «Migajas» y «mesa» conservan la imagen doméstica concreta del símil.
  - El plural español «comen» es necesario por la naturalidad sintáctica, aunque el griego use forma singular con sujeto neutro plural.
