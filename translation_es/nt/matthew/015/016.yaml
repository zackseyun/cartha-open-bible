translation:
  language: es
  text: 'Pero él dijo: «¿También ustedes todavía no entienden?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro de respuesta frente a la pregunta anterior; «Pero» reproduce bien el contraste en español sin sonar forzado.
- source_word: ὁ
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: El artículo con valor pronominal remite a Jesús; en español conviene explicitar «él» para mantener la referencia natural.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - les dijo
  lexicon: BDAG
  rationale: Aoristo narrativo estándar de λέγω; «dijo» es la forma más directa y fiel.
- source_word: Ἀκμὴν
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía hoy
  - hasta ahora
  lexicon: BDAG
  rationale: ἀκμήν expresa continuidad temporal con tono de reproche. «Todavía» transmite bien la idea de persistencia sin añadir contenido no explícito.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - aún
  lexicon: BDAG
  rationale: Aquí καί añade a los discípulos a la reprensión; «también» conserva esa inclusión enfática en español.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: Pronombre explícito de segunda plural; «ustedes» es el registro neutral latinoamericano y evita una construcción ambigua.
- source_word: ἀσύνετοί
  english_pob_choice: without understanding
  chosen_spanish: no tienen entendimiento
  alternatives_spanish:
  - sin entendimiento
  - son insensatos
  - son torpes
  lexicon: BDAG
  rationale: ἀσύνετος indica falta de comprensión/insight. «No tienen entendimiento» mantiene el valor cognitivo y evita exagerar hacia una falta moral o insulto más fuerte.
- source_word: ἐστε
  english_pob_choice: are
  chosen_spanish: tienen
  alternatives_spanish:
  - son
  - están
  lexicon: BDAG
  rationale: 'El griego usa εἰμί; sin embargo, en español la acusación se expresa con naturalidad como estado/posesión de entendimiento: «no tienen entendimiento». La elección evita la dureza poco idiomática de «son sin entendimiento».'
theological_decisions:
- issue: Intensidad de la reprensión de Jesús
  english_pob_reading: Preserve a pointed rebuke without making it harsher than the Greek warrants.
  chosen_spanish_reading: 'Preservar una reprensión directa pero sobria: Jesús cuestiona la falta de entendimiento de los discípulos sin convertirla en una condena más dura.'
  alternative_spanish_readings:
  - ¿Todavía ustedes también son incapaces de entender?
  - ¿Aún siguen sin comprender, ustedes también?
  rationale: El griego expresa frustración real, pero no requiere un insulto más severo. «No tienen entendimiento» mantiene la tensión entre corrección y cercanía pastoral.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada. Además, se ajustó la frase para reflejar el valor de Ἀκμήν como continuidad ('todavía') y el tono de rebuke sin añadir elementos no presentes en el griego.
  spanish_consistency_notes:
  - Se mantuvo 'ustedes' como forma neutral y públicamente legible.
  - Se evitó 'Cristo' o 'Señor' porque este versículo no los contiene ni los presupone explícitamente.
  - Se optó por una construcción idiomática española para ἀσύνετος en vez de un calco literal, para preservar el sentido cognitivo del reproche.
