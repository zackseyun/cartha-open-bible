translation:
  language: es
  text: 'Pero él respondió y les dijo: «¿Por qué ustedes también transgreden el mandamiento de Dios por causa de su tradición?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y les dijo
  alternatives_spanish:
  - respondió
  - contestó y les dijo
  lexicon: BDAG
  rationale: La combinación participio + verbo finito conserva en griego el valor de respuesta formal a una acusación. En español, «respondió y les dijo» reproduce el peso retórico sin sonar forzado. «Contestó» sería posible, pero «respondió» mantiene mejor el paralelo bíblico y la claridad narrativa.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿A qué viene que...?
  - ¿Por qué razón?
  lexicon: BDAG
  rationale: Es la interrogativa idiomática natural en español para pedir la causa o razón. «¿Por qué?» es la equivalencia más clara y fiel.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - vosotros también
  lexicon: BDAG
  rationale: 'En español latinoamericano neutral, «ustedes también» preserva el énfasis de correspondencia y reproche: no solo otros, sino también ellos. Se evita una marcación regional innecesaria.'
- source_word: παραβαίνετε
  english_pob_choice: transgress
  chosen_spanish: transgreden
  alternatives_spanish:
  - quebrantan
  - violan
  lexicon: BDAG
  rationale: La POB inglesa revisó de «break» a «transgress» para acercarse más al valor de παραβαίνετε. En español, «transgreden» conserva ese matiz formal de ir contra un mandamiento. «Quiebran» sería más idiomático, pero menos preciso en registro jurídico-bíblico.
- source_word: τὴν ἐντολὴν
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el precepto
  - el mandato
  lexicon: BDAG
  rationale: «Mandamiento» mantiene el registro bíblico-covenantal de ἐντολή y refleja bien el contraste con la tradición humana. «Mandato» sería posible, pero menos característico en este contexto.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  - divino
  lexicon: BDAG
  rationale: La forma simple «de Dios» conserva la relación genitiva directa y el contraste enfático con «su tradición».
- source_word: διὰ τὴν παράδοσιν ὑμῶν
  english_pob_choice: for the sake of your tradition
  chosen_spanish: por causa de su tradición
  alternatives_spanish:
  - a causa de su tradición
  - por el bien de su tradición
  - por su tradición
  lexicon: BDAG
  rationale: La preposición διά con acusativo expresa causa o motivo. «Por causa de» comunica con precisión que la tradición es el motivo por el cual transgreden el mandamiento. «Por el bien de» sonaría demasiado valorativo; «por su tradición» podría volverse ambiguo o menos explícito.
theological_decisions:
- issue: Contraste entre mandamiento divino y tradición humana
  english_pob_reading: Render παράδοσις as 'tradition' and ἐντολή as 'commandment' to preserve Jesus' direct contrast between God's command and the opponents' inherited practice.
  chosen_spanish_reading: Mantener «mandamiento de Dios» frente a «su tradición» para conservar el contraste entre la autoridad divina y la práctica transmitida por los hombres.
  alternative_spanish_readings:
  - «mandato de Dios» frente a «su tradición»
  - «precepto de Dios» frente a «su tradición»
  rationale: El verso no condena toda tradición en abstracto, sino la elevación de una tradición concreta por encima del mandamiento de Dios. «Mandamiento» y «tradición» preservan esa tensión teológica con lenguaje bíblico claro.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor semántico de διά con acusativo en el reproche
  english_pob_reading: '''for the sake of your tradition'' to reflect causal/reason sense rather than mere possession.'
  chosen_spanish_reading: «por causa de su tradición» como causalidad explícita.
  alternative_spanish_readings:
  - «a causa de su tradición»
  - «por motivo de su tradición»
  rationale: La frase debe expresar que la tradición es la razón de la transgresión. «Por causa de» es transparente en español y evita suavizar la causalidad o convertirla en mera referencia general.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión inglesa sustituyó 'break' por 'transgress' para acercarse más a παραβαίνετε, y ajustó 'because of' a 'for the sake of' para reflejar mejor διά con acusativo. La redacción española sigue ese mismo ajuste semántico con «transgreden» y la causal causal «por causa de».
  spanish_consistency_notes:
  - Se usa «ustedes» como forma neutral de segunda persona plural para el registro latinoamericano amplio.
  - Se evita «Señor» o una paráfrasis litúrgica porque el texto griego aquí habla explícitamente de «Dios».
  - No se añaden notas de pie porque no hay una alternativa textual o lexical que requiera anclaje en este versículo.
