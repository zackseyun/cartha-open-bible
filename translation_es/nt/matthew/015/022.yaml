    text: O «mira» / «fíjate».
    reason: lexical_alternative
  - marker: b
    text: O «es severamente oprimida por un demonio» / «es atormentada por un demonio».
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para reflejar de manera más natural en español la secuencia narrativa del participio ἐξελθοῦσα y el imperfecto ἔκραζεν, sin perder fidelidad. También se afina la nota sobre δαιμονίζεται para evitar una alternativa española que sobredefina el fenómeno más allá de la cautela documentada en la auditoría inglesa.
