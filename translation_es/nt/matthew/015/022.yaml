review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca la auditoría inglesa: conserva ἰδοὺ, mantiene ''cananea'', expresa la apelación mesiánica ''Señor, Hijo de David'' y comunica la gravedad de la condición demoníaca. Sin embargo, ''que saliendo de aquellas regiones'' suena menos natural y no representa tan bien la secuencia narrativa de ἐξελθοῦσα + ἔκραζεν como una forma finita coordinada. Además, la nota de [b] incluye ''poseída por un demonio'', que en español tiende a sonar más fuerte y menos prudente que el inglés preservado.'
  spanish_quality_summary: El texto es legible y digno, pero 'Y he aquí' y especialmente 'que saliendo de aquellas regiones' producen un tono algo forzado. 'Salió de aquella región y gritaba' o 'vino de aquellas regiones y gritaba' sería más natural; dado el griego ἀπὸ τῶν ὁρίων ἐκείνων + ἐξελθοῦσα, conviene mantener 'de aquellas regiones' y convertir el participio en verbo finito. 'Gravemente endemoniada' es comprensible, pero en español bíblico actual 'muy atormentada por un demonio' en nota alternativa ayuda a evitar sobreprecisión.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Señor' para κύριε en contexto mesiánico está bien justificado. No aparecen términos como Yahvé/Mesías que exijan ajuste. La principal mejora es estilística y de precisión lexical en las alternativas de δαιμονίζεται.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''una mujer cananea, que saliendo de aquellas regiones, gritaba diciendo'''
    rationale: El participio ἐξελθοῦσα se puede verter naturalmente con verbo finito en español. La construcción actual suena trabada y menos idiomática que el inglés auditado y que el griego narrativo.
  - severity: low
    issue: Nota [b] incluye 'poseída por un demonio' como alternativa principal
    rationale: Aunque posible, el inglés auditado evitó fijar una fenomenología excesivamente precisa. En español conviene priorizar 'atormentada' u 'oprimida' para preservar mejor la tensión lexical documentada.
  - severity: low
    issue: '''Y he aquí'' es correcto pero algo tieso'
    rationale: '''Y he aquí'' es fiel, pero ''Y he aquí[a] que una mujer cananea...'' fluye mejor en español bíblico moderno sin perder la fuerza de ἰδοὺ.'
  revised_spanish_text: 'Y he aquí[a] que una mujer cananea salió de aquellas regiones y gritaba, diciendo: «Ten misericordia de mí, Señor, Hijo de David; mi hija está gravemente endemoniada[b]».'
  revised_footnotes:
