revisions:
- from: 'Y he aquí[a] una mujer cananea, que saliendo de aquellas regiones, gritaba diciendo: «Ten misericordia de mí, Señor, Hijo de David; mi hija está gravemente endemoniada[b]».'
  to: 'Y he aquí[a] que una mujer cananea salió de aquellas regiones y gritaba, diciendo: «Ten misericordia de mí, Señor, Hijo de David; mi hija está gravemente endemoniada[b]».'
  rationale: Se ajusta la sintaxis para reflejar de manera más natural en español la secuencia narrativa del participio ἐξελθοῦσα y el imperfecto ἔκραζεν, sin perder fidelidad. También se afina la nota sobre δαιμονίζεται para evitar una alternativa española que sobredefina el fenómeno más allá de la cautela documentada en la auditoría inglesa.
  reviewer_model: gpt-5.4
