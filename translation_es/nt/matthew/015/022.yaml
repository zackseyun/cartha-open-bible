translation:
  language: es
  text: 'Y he aquí[a] que una mujer cananea salió de aquellas regiones y gritaba, diciendo: «Ten misericordia de mí, Señor, Hijo de David; mi hija está gravemente endemoniada[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira» / «fíjate».
    reason: lexical_alternative
  - marker: b
    text: O «es severamente oprimida por un demonio» / «es atormentada por un demonio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - fíjate
  lexicon: BDAG
  rationale: Mantiene la fuerza discursiva de atención repentina del marcador narrativo. 'He aquí' es la forma española más natural y digna para conservar ese efecto sin omitirlo.
- source_word: Χαναναία
  english_pob_choice: Canaanite
  chosen_spanish: cananea
  alternatives_spanish:
  - de Canaán
  lexicon: BDAG
  rationale: Preserva la referencia histórica y étnica del texto. 'Cananea' reproduce el vínculo con Canaán que Mateo usa deliberadamente.
- source_word: ἀπὸ τῶν ὁρίων ἐκείνων
  english_pob_choice: from those regions
  chosen_spanish: de aquellas regiones
  alternatives_spanish:
  - de aquellos territorios
  - de aquellos distritos
  lexicon: BDAG
  rationale: ὅρια aquí apunta a límites o zonas territoriales; 'regiones' transmite el sentido plural con fluidez en español.
- source_word: ἐξελθοῦσα
  english_pob_choice: came out
  chosen_spanish: saliendo
  alternatives_spanish:
  - habiendo salido
  - que salió
  lexicon: BDAG
  rationale: La forma participial se vierte con una construcción natural en español dentro de la secuencia narrativa, conservando la relación con el verbo principal sin sonar forzada.
- source_word: ἔκραζεν
  english_pob_choice: was crying out
  chosen_spanish: gritaba
  alternatives_spanish:
  - clamaba
  - estaba gritando
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o repetida; 'gritaba' conserva esa imperfectividad de manera natural y sobria en español.
- source_word: Ἐλέησόν με
  english_pob_choice: Have mercy on me
  chosen_spanish: Ten misericordia de mí
  alternatives_spanish:
  - Apiádate de mí
  - Misericordia de mí
  lexicon: BDAG
  rationale: Es la fórmula bíblica estable y precisa para la petición de misericordia, más fiel y natural que una paráfrasis moderna.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - amo
  lexicon: BDAG
  rationale: En el contexto de la invocación mesiánica, 'Señor' conserva la elevación reverente del término y encaja con el uso bíblico habitual en español.
- source_word: υἱὸς Δαυίδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - descendiente de David
  lexicon: BDAG
  rationale: Debe mantenerse literalmente como título mesiánico reconocido, para preservar su fuerza dinástico-mesiánica.
- source_word: κακῶς
  english_pob_choice: badly
  chosen_spanish: gravemente
  alternatives_spanish:
  - muy mal
  - severamente
  lexicon: BDAG
  rationale: Aquí 'gravemente' expresa mejor la intensidad de la aflicción en español moderno y evita ambigüedad respecto de la condición de la hija.
- source_word: δαιμονίζεται
  english_pob_choice: is demon-possessed
  chosen_spanish: endemoniada
  alternatives_spanish:
  - poseída por un demonio
  - atormentada por un demonio
  - oprimida por un demonio
  lexicon: BDAG
  rationale: '''Endemoniada'' es una forma española breve y tradicional que conserva la referencia a la agencia demoníaca. Las alternativas se preservan porque el verbo griego admite matices entre posesión, opresión y tormento.'
theological_decisions:
- issue: Alcance de κύριε en la apelación a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - amo
  rationale: La dirección junto con 'Hijo de David' sugiere una apelación reverente y posiblemente mesiánica; 'Señor' mantiene esa tensión sin reducirla a cortesía ordinaria.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Naturaleza de δαιμονίζεται
  english_pob_reading: demon-possessed
  chosen_spanish_reading: endemoniada
  alternative_spanish_readings:
  - poseída por un demonio
  - oprimida por un demonio
  - atormentada por un demonio
  rationale: El texto atribuye la condición a un agente demoníaco, pero no obliga a una precisión fenomenológica única; por eso se conserva una opción clara y tradicional, mientras se documentan alternativas que preservan la tensión lexical.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios textuales; el consenso de auditoría es alto, con solo observaciones menores. La redacción española conserva el marcador discursivo, el título mesiánico y la ambigüedad controlada de δαιμονίζεται.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριε por coherencia con el tratamiento doctrinal del término en el proyecto.
  - Se usó 'cananea' para Χαναναία, no una equivalencia geográfica posterior de otro evangelio.
  - '''Hijo de David'' se conservó literalmente como título mesiánico.'
  - '''Endemoniada'' evita sobrerresolución interpretativa y sigue siendo natural en español bíblico.'
