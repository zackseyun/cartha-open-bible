review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: el grupo que había comido, la cifra de cuatro mil, la especificación de ἄνδρες como «hombres», y la exclusión de mujeres y niños del cómputo. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada, porque repite la redacción principal en lugar de ofrecer la variante equivalente a «además de/no contando».'
  spanish_quality_summary: El español es claro y natural, pero «Ahora los que habían comido…» suena algo trabado al inicio. «Los que habían comido eran…» es más fluido y suficientemente fiel al valor discursivo suave de δέ en este contexto. «Sin contar mujeres ni niños» es idiomático, pero para reflejar mejor la coordinación griega καὶ conviene «mujeres y niños».
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. La decisión «hombres» para ἄνδρες está bien alineada con la política de exactitud de género. No hay conflicto con terminología doctrinal del proyecto.
  issues:
  - severity: medium
    issue: La nota al pie repite la misma redacción del texto principal.
    rationale: El inglés preserva una alternativa léxica para χωρίς («besides» / «not counting»). En español, si el texto principal usa «sin contar», la nota debe ofrecer una alternativa real, por ejemplo «además de mujeres y niños», no duplicar el texto.
  - severity: low
    issue: El arranque «Ahora los que habían comido» suena menos natural en español bíblico corriente.
    rationale: Aunque δέ puede verterse como «Ahora», aquí no es necesario expresarlo para mantener la fluidez; omitirlo produce una frase más idiomática sin pérdida de sentido relevante.
  - severity: low
    issue: «niños» puede sonar masculino marcado donde el griego παιδίων es más general.
    rationale: En una fórmula de conteo, «niños» suele entenderse genéricamente, pero «hijos» no encaja y «niñas y niños» añade precisión no presente en el original. Se puede mantener «niños», pero conviene coordinar con «y» en vez de «ni» para apegarse mejor a la forma de la alternativa inglesa y al griego.
  revised_spanish_text: Los que habían comido eran cuatro mil hombres[a], sin contar mujeres y niños.
