translation:
  language: es
  text: Los que habían comido eran cuatro mil hombres[a], sin contar mujeres y niños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «además de mujeres y niños».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: Now those
  chosen_spanish: Ahora los
  alternatives_spanish:
  - Y los
  - Pero los
  lexicon: BDAG
  rationale: δέ es un conector suave; «Ahora» comunica con naturalidad el avance del relato sin forzar una oposición. El artículo con participio se vierte de manera sustantiva como «los».
- source_word: ἐσθίοντες
  english_pob_choice: who had eaten
  chosen_spanish: habían comido
  alternatives_spanish:
  - estaban comiendo
  - comiendo
  lexicon: BDAG
  rationale: Aunque el participio es presente, el contexto describe al grupo que ya terminó la comida. En español, el pretérito pluscuamperfecto expresa mejor ese sentido completado que una traducción más mecánica.
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - habían sido
  lexicon: BDAG
  rationale: La cópula introduce la cifra; «eran» es el equivalente más directo y natural en español para esta formulación de conteo.
- source_word: τετρακισχίλιοι
  english_pob_choice: four thousand
  chosen_spanish: cuatro mil
  alternatives_spanish:
  - '4.000'
  lexicon: BDAG
  rationale: Número cardinal simple; se expresa de forma directa y legible en español.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - machos
  lexicon: BDAG
  rationale: ἀνήρ designa varones adultos, no «personas» en general. «Hombres» conserva la distinción léxica y permite mantener separadas a las mujeres y los niños, como en el griego.
- source_word: χωρὶς
  english_pob_choice: besides
  chosen_spanish: sin contar
  alternatives_spanish:
  - además de
  - aparte de
  - excluyendo
  lexicon: BDAG
  rationale: χωρίς aquí indica exclusión del número dado. «Sin contar» comunica de manera natural que mujeres y niños no están incluidos en los cuatro mil hombres.
- source_word: γυναικῶν
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  lexicon: BDAG
  rationale: El sentido genérico «mujeres» es el adecuado en este contexto de conteo y evita restringir indebidamente la referencia a esposas.
- source_word: παιδίων
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - niñas y niños
  - pequeños
  lexicon: BDAG
  rationale: παιδίον puede abarcar niños pequeños o hijos; aquí «niños» es la opción más clara y natural en español, sin imponer una edad más precisa que la del texto.
theological_decisions:
- issue: Fórmula de conteo con distinción de género
  english_pob_reading: Retain 'men' in the main text and explicitly distinguish women and children as additional groups.
  chosen_spanish_reading: Conservar «hombres» y mencionar aparte a mujeres y niños.
  alternative_spanish_readings:
  - Traducir como «personas»
  - Omitir la distinción por género
  rationale: El griego nombra ἄνδρες («hombres») y luego añade mujeres y niños como grupos aparte. Traducir con «personas» borraría una distinción relevante del original. La redacción española mantiene esa diferencia sin endurecer el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue el paquete fuente griego SBLGNT y la auditoría inglesa sin cambios relevantes respecto del consenso revisado; no se registran revisiones aplicadas.
  spanish_consistency_notes:
  - Se usa «hombres» para ἄνδρες, manteniendo la distinción de género del original.
  - Se usa «sin contar» para χωρὶς, en línea con el valor excluyente documentado por la auditoría inglesa.
  - Se mantiene una sintaxis breve y publicable, evitando calcos innecesarios de la estructura inglesa.
