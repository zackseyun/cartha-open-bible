translation:
  language: es
  text: 'Hipócritas[a], Isaías profetizó correctamente acerca de ustedes, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Isaías profetizó bien acerca de ustedes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποκριταί
  english_pob_choice: Hypocrites
  chosen_spanish: Hipócritas
  alternatives_spanish:
  - Ustedes, hipócritas
  lexicon: BDAG
  rationale: Vocativo plural directo. ‘Hipócritas’ conserva la fuerza de la reprensión y la concisión del griego; añadir ‘ustedes’ es posible en español, pero el vocativo desnudo reproduce mejor el tono abrupto del original y la decisión inglesa de mantener el vocativo fuerte.
- source_word: καλῶς
  english_pob_choice: rightly
  chosen_spanish: correctamente
  alternatives_spanish:
  - bien
  - rectamente
  lexicon: BDAG
  rationale: El adverbio modifica a ‘profetizó’ y aquí indica que la profecía fue acertada respecto de ellos. ‘Correctamente’ comunica con claridad esa valoración en español moderno; ‘bien’ sería más literal pero menos preciso en este contexto.
- source_word: ἐπροφήτευσεν
  english_pob_choice: prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - habló proféticamente
  lexicon: BDAG
  rationale: Aoristo activo de προφητεύω. ‘Profetizó’ es la equivalencia directa y natural en español, preservando el registro profético y la conexión con Isaías como profeta.
- source_word: περὶ ὑμῶν
  english_pob_choice: about you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - sobre ustedes
  - en cuanto a ustedes
  lexicon: BDAG
  rationale: περί con genitivo expresa referencia temática; ‘acerca de’ es natural en español y conserva la relación referencial. ‘Ustedes’ expresa el plural del vocativo implícito en el contexto.
- source_word: Ἠσαΐας
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: BDAG
  rationale: Transliteración estándar del nombre del profeta en español.
- source_word: λέγων
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'cuando dijo:'
  lexicon: BDAG
  rationale: Participio presente introductorio de la cita. ‘Diciendo:’ es breve e idiomático en español, manteniendo la función de introducción de la comilla.
theological_decisions:
- issue: Fuerza de la acusación de Jesús al dirigirse a sus interlocutores
  english_pob_reading: 'A direct condemnatory vocative: ''Hypocrites'''
  chosen_spanish_reading: 'Un vocativo condenatorio directo: ‘Hipócritas’'
  alternative_spanish_readings:
  - ‘Ustedes, hipócritas’
  - ‘Pretensiosos’
  rationale: ὑποκριταί es una acusación moral y religiosa fuerte. Mantener ‘Hipócritas’ preserva esa dureza sin suavizarla. ‘Pretensiosos’ debilitaría el alcance moral del término y no corresponde al peso del original.
  doctrine_reference: Principio de primacía del idioma original y preservación de la carga retórica y moral del texto.
translation_notes:
  revision_awareness: 'El testigo griego y el audit trail inglés están en alto acuerdo; no se detectan revisiones sustantivas pendientes. La elección española sigue la misma lectura: vocativo fuerte, adverbio de valoración sobre la profecía y fórmula breve de introducción de cita.'
  spanish_consistency_notes:
  - Se mantiene ‘Isaías’ como nombre propio estándar.
  - ‘Ustedes’ refleja el plural implícito del vocativo griego en español natural.
  - No se usa ‘SEÑOR’ ni terminología eclesiástica que no pertenece a este versículo.
  - La nota al pie conserva la alternativa semántica de καλῶς sin debilitar el texto principal.
