translation:
  language: es
  text: Y después de ordenar a la multitud que se recostara[a] en el suelo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se sentara»; el verbo griego puede denotar tomar su lugar para una comida, con frecuencia con el matiz de reclinarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y luego
  - Y entonces
  lexicon: BDAG
  rationale: Conector narrativo simple que enlaza con la acción anterior sin añadir énfasis innecesario.
- source_word: παραγγείλας
  english_pob_choice: after instructing
  chosen_spanish: dar instrucciones
  alternatives_spanish:
  - mandar
  - ordenar
  - dar la orden
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la principal; «dar instrucciones» conserva el valor directivo sin sonar excesivamente duro en español, y permite una construcción natural con «después de».
- source_word: τῷ ὄχλῳ
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  - la multitud reunida
  lexicon: BDAG
  rationale: Dativo de destinatario de la instrucción. «Multitud» es el equivalente natural y mantiene el matiz colectivo del término griego.
- source_word: ἀναπεσεῖν
  english_pob_choice: to recline
  chosen_spanish: se recostara
  alternatives_spanish:
  - se sentara
  - se reclinara
  - se echara
  lexicon: BDAG
  rationale: El infinitivo alude a adoptar la postura de comida o descanso. En español, «recostarse» comunica mejor esa postura que «sentarse», aunque conserva menos explícitamente la noción técnica de mesa.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - en el suelo
  - en la tierra
  lexicon: BDAG
  rationale: γῆ puede referirse al suelo/terreno inmediato. Aquí «sobre la tierra» es fiel al griego y natural en español bíblico, sin forzar una lectura cosmológica de «la tierra».
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece en el texto español exactamente donde corresponde, anclado a la elección verbal relacionada con ἀναπεσεῖν.'
  spanish_consistency_notes:
