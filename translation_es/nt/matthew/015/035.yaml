review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica: Jesús da una instrucción a la multitud para adoptar una postura antes de la acción siguiente. Sin embargo, «sobre la tierra» no representa tan claramente ἐπὶ τὴν γῆν en este contexto de comida como «en el suelo», y «dar instrucciones» con la nota anclada allí no señala el verdadero punto léxico alternativo, que es ἀναπεσεῖν.'
  spanish_quality_summary: El español es mayormente natural, pero «Y después de dar instrucciones[a] a la multitud, que se recostara sobre la tierra» suena algo menos idiomático que «Y después de ordenar a la multitud que se recostara en el suelo». Además, la nota [a] debe anclarse en el verbo de postura, no en «dar instrucciones».
  glossary_alignment: No hay términos del glosario mayor afectados. La decisión sobre ἀναπεσεῖν debe conservar el matiz de reclinarse/sentarse para una comida; «recostarse» funciona bien en español si se mantiene la nota alternativa «sentarse».
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «dar instrucciones» en vez de en el verbo ἀναπεσεῖν.
    rationale: La alternativa documentada en el inglés («to sit down») corresponde al infinitivo de postura, no a παραγγείλας.
  - severity: medium
    issue: «Sobre la tierra» es menos claro e idiomático que «en el suelo» para ἐπὶ τὴν γῆν en este contexto.
    rationale: Aquí γῆ se refiere al suelo donde la multitud se coloca para comer, no a «la tierra» en sentido más amplio. «En el suelo» comunica mejor el referente contextual.
  - severity: low
    issue: «Dar instrucciones» es aceptable, pero «ordenar» refleja mejor la fuerza directiva de παραγγείλας en esta construcción.
    rationale: El participio tiene fuerza de mandato/dirección. «Ordenar» suena natural y preciso sin volverse innecesariamente áspero.
  revised_spanish_text: Y después de ordenar a la multitud que se recostara[a] en el suelo,
  revised_footnotes:
  - marker: a
    text: O «se sentara»; el verbo griego puede denotar tomar su lugar para una comida, con frecuencia con el matiz de reclinarse.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al verbo correcto (ἀναπεσεῖν), se mejora la precisión contextual de ἐπὶ τὴν γῆν con «en el suelo», y se ajusta παραγγείλας a «ordenar», que conserva mejor la fuerza directiva del original en un español natural.
