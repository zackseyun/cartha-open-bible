translation:
  language: es
  text: 'Pero Pedro respondió y le dijo: «Explícanos esta parábola[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dinos esta parábola» o «Haznos clara esta parábola».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió en respuesta
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona de manera deponente y en narrativa introduce una respuesta. En español, «respondió» suena natural y conserva la función discursiva sin recargar la frase con un calco.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca transición o leve contraste; «Pero» reproduce bien ese cambio de turno después de la declaración previa de Jesús.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - habló
  lexicon: BDAG
  rationale: La combinación griega «respondió y dijo» es idiomática; en español, «respondió y le dijo» mantiene el sentido narrativo y hace explícito el dativo αὐτῷ como destinatario del habla.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de persona se expresa naturalmente con el pronombre de objeto indirecto «le» en español.
- source_word: Φράσον
  english_pob_choice: Explain
  chosen_spanish: Explícanos
  alternatives_spanish:
  - Dinos
  - Haznos claro
  lexicon: BDAG
  rationale: φράζω aquí pide aclaración/explicación de una expresión figurada. «Explícanos» preserva bien la fuerza de clarificar algo que no se entiende.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se refleja de manera natural con el enclítico «nos» unido al imperativo en español.
- source_word: παραβολὴν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - figura
  lexicon: BDAG
  rationale: παραβολή es el término habitual de los Evangelios para «parábola». Aunque el dicho de Jesús puede sentirse más amplio que una parábola extensa, «parábola» conserva el vocabulario del texto fuente.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esa
  - aquella
  lexicon: BDAG
  rationale: El demostrativo cercano apunta a la expresión inmediata anterior; «esta» es la equivalencia más natural en español.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en alto grado; no se requieren revisiones sustantivas. La principal decisión española fue mantener la estructura narrativa de respuesta y el matiz de clarificación de φράζω con un verbo natural en español.
  spanish_consistency_notes:
  - Se usa «parábola» para παραβολή, conforme al uso estable en los Evangelios.
  - Se mantiene «respondió» para reflejar el valor discursivo de ἀποκριθεὶς.
  - La voz directa conserva el tono breve y peticionario del griego.
