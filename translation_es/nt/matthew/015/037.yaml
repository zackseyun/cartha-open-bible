translation:
  language: es
  text: Y comieron todos y quedaron satisfechos, y recogieron siete canastas[a] llenas de los pedazos que sobraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siete canastas grandes llenas». El griego σπυρίς puede denotar una canasta de mayor tamaño que la de otros relatos de alimentación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comieron alimento
  - se alimentaron
  lexicon: BDAG
  rationale: El aoristo de ἐσθίω se rinde de forma directa por «comieron». Mantiene la acción simple y natural sin añadir un objeto que el griego no expresa.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: El plural nominativo se refiere al grupo entero. En español, «todos» transmite con naturalidad el alcance colectivo sin necesidad de explicitar el pronombre sujeto.
- source_word: ἐχορτάσθησαν
  english_pob_choice: were satisfied
  chosen_spanish: quedaron satisfechos
  alternatives_spanish:
  - quedaron saciados
  - se hartaron
  lexicon: BDAG
  rationale: χορτάζω aquí indica haber comido hasta quedar lleno. «Quedaron satisfechos» conserva la idea de haber recibido suficiente alimento y evita una expresión demasiado coloquial o más fuerte de lo que el contexto requiere.
- source_word: τὸ περισσεῦον
  english_pob_choice: the leftover
  chosen_spanish: los pedazos que sobraron
  alternatives_spanish:
  - lo que sobró
  - el sobrante
  lexicon: BDAG
  rationale: El participio sustantivado expresa «lo que quedó/lo que sobró». En español, unido a κλασμάτων, se vuelve más claro y natural como «los pedazos que sobraron», preservando la relación con las sobras del alimento.
- source_word: κλασμάτων
  english_pob_choice: pieces
  chosen_spanish: pedazos
  alternatives_spanish:
  - fragmentos
  - trozos
  lexicon: BDAG
  rationale: κλάσματα se refiere a pedazos rotos o partidos, especialmente de pan o comida. «Pedazos» es transparente y de uso común; «fragmentos» sería más formal, pero menos natural aquí.
- source_word: ἦραν
  english_pob_choice: they picked up
  chosen_spanish: recogieron
  alternatives_spanish:
  - levantaron
  - tomaron
  lexicon: BDAG
  rationale: αἴρω puede significar «tomar» o «recoger». En este contexto de juntar lo sobrante, «recogieron» comunica con precisión la acción de reunir las sobras.
- source_word: σπυρίδας
  english_pob_choice: baskets
  chosen_spanish: canastas
  alternatives_spanish:
  - cestas
  - canastas grandes
  lexicon: BDAG
  rationale: σπυρίς designa un tipo de recipiente para cargar provisiones, normalmente más grande que el usado en otros relatos de alimentación. «Canastas» funciona bien en español; el matiz de tamaño se preserva en la nota.
- source_word: πλήρεις
  english_pob_choice: full
  chosen_spanish: llenas
  alternatives_spanish:
  - colmadas
  - repletas
  lexicon: BDAG
  rationale: El adjetivo predicativo modifica a «canastas». «Llenas» es el equivalente más directo y natural; «colmadas» o «repletas» intensifican el matiz, pero no son necesarias para el sentido básico.
translation_notes:
  revision_awareness: 'El texto griego y el auditor de la POB en inglés muestran acuerdo alto; no hay cambios revisados que requieran ajuste. La decisión principal en español fue mantener la secuencia semántica del original con un estilo natural: comida completa, recolección de sobras y nota para el tamaño de las canastas.'
  spanish_consistency_notes:
  - Se conserva «Y» al inicio para reflejar la cadena narrativa del griego.
  - No se traduce con «SEÑOR» ni terminología doctrinal porque el versículo no contiene vocabulario teológico de ese tipo.
  - «Satisfechos» mantiene el sentido de plenitud alimentaria sin forzar una paráfrasis.
  - La nota aclara el posible matiz de tamaño de σπυρίς sin alterar el texto principal.
