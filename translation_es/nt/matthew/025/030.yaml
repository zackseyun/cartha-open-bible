revisions:
- from: Y arrojen al esclavo inútil[a] a la oscuridad exterior. Allí habrá llanto y rechinar de dientes.
  to: Y arrojen al esclavo sin valor[a] a la oscuridad exterior. Allí habrá llanto y rechinar de dientes.
  rationale: Se ajusta ἀχρεῖον de 'inútil' a 'sin valor' para reflejar mejor la decisión auditada 'worthless' y la severidad evaluativa del original. Se conserva el resto de la redacción porque es fiel, clara y natural. También se afina la nota sobre δοῦλος para expresar con más precisión la razón contextual de 'esclavo'.
