translation:
  language: es
  text: Y arrojen al esclavo sin valor[a] a la oscuridad exterior. Allí habrá llanto y rechinar de dientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El griego doulos puede significar «siervo» o «esclavo»; aquí se usa «esclavo» porque en la parábola es prominente la condición de esclavitud.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀχρεῖον
  english_pob_choice: worthless
  chosen_spanish: inútil
  alternatives_spanish:
  - sin valor
  - inservible
  - indigno
  lexicon: BDAG
  rationale: El adjetivo expresa que, a juicio del amo, la persona no resulta útil ni provechosa. En español, «inútil» comunica esa falta de provecho de manera natural sin añadir una carga moral más fuerte que la del texto.
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: En este contexto parabólico de amo y siervos esclavizados, la condición vinculada por δοῦλος es central. «Esclavo» conserva esa relación de subordinación y no la atenúa como haría «siervo».
- source_word: ἐκβάλετε
  english_pob_choice: throw
  chosen_spanish: arrojen
  alternatives_spanish:
  - echen
  - expulsen
  - arrojen fuera
  lexicon: BDAG
  rationale: El imperativo aoristo es enérgico y abrupto. «Arrojen» mantiene la fuerza de expulsión con español natural y digno, sin necesidad de una forma más arcaica.
- source_word: σκότος τὸ ἐξώτερον
  english_pob_choice: the outer darkness
  chosen_spanish: la oscuridad exterior
  alternatives_spanish:
  - la oscuridad de afuera
  - la oscuridad externa
  lexicon: BDAG
  rationale: Se conserva la expresión matiana tradicional, pero en español resulta más natural como «oscuridad exterior» que como un calco rígido. «Exterior» mantiene el sentido de exclusión del lugar de honor o banquete.
- source_word: ἐκεῖ
  english_pob_choice: In that place
  chosen_spanish: Allí
  alternatives_spanish:
  - en ese lugar
  - allá
  lexicon: BDAG
  rationale: El adverbio remite al lugar recién mencionado. «Allí» es la forma española más fluida para retomar esa referencia sin sobreexplicarla.
- source_word: κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - lamento
  - sollozo
  - gemido
  lexicon: BDAG
  rationale: «Llanto» transmite el dolor y la aflicción del término dentro de la fórmula mateana recurrente. Es más idiomático en español que «lloriqueo» o una glosa más interpretativa.
- source_word: βρυγμὸς τῶν ὀδόντων
  english_pob_choice: gnashing of teeth
  chosen_spanish: rechinar de dientes
  alternatives_spanish:
  - crujir de dientes
  - apretar los dientes
  lexicon: BDAG
  rationale: «Rechinar de dientes» es la equivalencia española establecida para esta expresión idiomática y conserva la mezcla de angustia e ira sin reducirla a una mera descripción física.
theological_decisions:
- issue: Alcance del juicio expresado por la imagen de la oscuridad exterior
  english_pob_reading: Retain the imagery of exclusion and anguish without specifying beyond the text whether it refers directly to final judgment, hell, or a lesser form of punishment.
  chosen_spanish_reading: Conservar la imagen de exclusión y angustia sin precisar si se trata directamente del juicio final, del infierno o de una sanción menor.
  alternative_spanish_readings:
  - Explicitar que se trata del infierno
  - Interpretarlo como mera exclusión metafórica o temporal
  rationale: La frase de Mateo funciona como lenguaje de juicio estereotipado, pero la traducción no debe resolver por sí sola una cuestión interpretativa que el texto no especifica. Se preserva así la tensión teológica documentada por el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el estado indicado es sin modificaciones y con alta concordancia entre revisores, por lo que esta redacción sigue fielmente el audit trail disponible.'
  spanish_consistency_notes:
  - Se mantiene «oscuridad exterior» como expresión fija mateana, evitando traducirla de forma explicativa como «oscuridad de afuera» salvo en nota.
  - Se conserva la terminología POB de «esclavo» para δοῦλος en este contexto, en coherencia con la decisión lexical auditada.
  - «Llanto y rechinar de dientes» reproduce la fórmula idiomática recurrente sin suavizarla ni ampliarla.
  - No se introduce «SEÑOR» ni otras sustituciones devocionales, porque el versículo no contiene el tetragrámaton ni un κύριος que requiera esa decisión.
