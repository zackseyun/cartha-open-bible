review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: el imperativo fuerte de expulsión, la referencia a la exclusión en ''la oscuridad exterior'', y la fórmula mateana de ''llanto y rechinar de dientes''. También preserva correctamente la tensión teológica sin explicitar ''infierno''. Sin embargo, ἀχρεῖον se acerca mejor aquí a ''sin valor'' o ''inservible'' que a ''inútil'', ya que el inglés auditado escogió ''worthless'' para resaltar la evaluación de falta de valor, no solo de falta de utilidad.'
  spanish_quality_summary: 'El español es claro y natural. ''Arrojen'', ''la oscuridad exterior'' y ''Allí habrá llanto y rechinar de dientes'' leen bien en español eclesial moderno. La única mejora importante es léxica: ''esclavo inútil'' suena algo más utilitario y menos evaluativo que el sentido marcado en el audit trail. Además, la nota al pie puede afinarse cambiando ''condición de subordinación'' por una referencia más precisa al estado de servidumbre o sujeción vinculada a δοῦλος.'
  glossary_alignment: Cumple bien con las pautas del proyecto en δοῦλος -> 'esclavo' en este contexto parabólico, con nota alternativa para 'siervo'. No hay términos del glosario principal en conflicto. La revisión propuesta mantiene esa alineación y mejora la correspondencia con la decisión inglesa 'worthless'.
  issues:
  - severity: medium
    issue: ἀχρεῖον se traduce como 'inútil' en vez de una opción más cercana a 'worthless'.
    rationale: El audit trail inglés escogió 'worthless' precisamente para preservar la severidad de la evaluación del amo. 'Inútil' comunica falta de provecho, pero en español puede sonar más a incapacidad funcional que a desvalorización tajante. 'Sin valor' reproduce mejor la fuerza semántica y evaluativa del original en este contexto.
  - severity: low
    issue: La nota al pie de δοῦλος puede expresarse con mayor precisión contextual.
    rationale: 'La frase ''condición de subordinación'' es correcta pero algo abstracta. En este contexto, ''condición de esclavitud'' o ''de servidumbre'' refleja mejor la rationale documentada: el vínculo social de dependencia es prominente en la parábola.'
  revised_spanish_text: Y arrojen al esclavo sin valor[a] a la oscuridad exterior. Allí habrá llanto y rechinar de dientes.
  revised_footnotes:
  - marker: a
    text: O «siervo». El griego doulos puede significar «siervo» o «esclavo»; aquí se usa «esclavo» porque en la parábola es prominente la condición de esclavitud.
    reason: alternative_reading
  revision_rationale: Se ajusta ἀχρεῖον de 'inútil' a 'sin valor' para reflejar mejor la decisión auditada 'worthless' y la severidad evaluativa del original. Se conserva el resto de la redacción porque es fiel, clara y natural. También se afina la nota sobre δοῦλος para expresar con más precisión la razón contextual de 'esclavo'.
