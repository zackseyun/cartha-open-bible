revisions:
- from: 'Y el Rey les responderá[a]: «Amén les digo: en cuanto lo hicisteis a uno de estos[b] hermanos míos, los más pequeños, a mí me lo hicisteis».'
  to: 'Y el Rey les responderá[a]: «Amén, les digo a ustedes: en la medida en que lo hicieron a uno de los más pequeños de estos hermanos míos[b], a mí me lo hicieron».'
  rationale: 'La revisión corrige tres puntos principales: 1) adapta el español al objetivo neutral latinoamericano al evitar «hicisteis»; 2) traduce ἐφ’ ὅσον con «en la medida en que», que refleja mejor el sentido de grado/alcance; y 3) reestructura «los más pequeños» para que modifique con claridad a «estos hermanos míos». También se mejora la naturalidad de la fórmula solemne con «Amén, les digo a ustedes», sin perder la transparencia al griego ni la nota explicativa.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:21:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido global del griego: el Rey responde, introduce la fórmula solemne, mantiene «uno de estos ... hermanos míos» y preserva la identificación «a mí». También respeta la tensión interpretativa sobre «estos hermanos míos». Sin embargo, hay varios ajustes necesarios para mayor fidelidad y mejor español: «Amén les digo» omite el «a ustedes» implícito y suena menos natural que «Amén, les digo a ustedes» o «En verdad les digo»; «en cuanto» aquí puede leerse temporalmente y no expresa tan claramente el valor de grado de ἐφ’ ὅσον como «en la medida en que»; y «los más pequeños» inclina el sentido hacia tamaño/edad más que «los más insignificantes/los más pequeños» con nota o simplemente «los más pequeños de estos hermanos míos» mejor integrado.'
  spanish_quality_summary: El español es mayormente claro, pero mezcla registro peninsular («hicisteis») con la meta declarada de español neutral latinoamericano. Además, la sintaxis «a uno de estos hermanos míos, los más pequeños» queda algo suelta; en español suena más natural y clara como «a uno de los más pequeños de estos hermanos míos». La puntuación de la fórmula solemne también mejora con coma tras «Amén».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Hermanos» mantiene correctamente el masculino plural de ἀδελφῶν. No hay términos como Yahvé/Mesías/etc. en este versículo. La decisión de conservar «Amén» es defendible y coherente con transparencia de fuente, pero debe formularse en español natural.
  issues:
  - severity: medium
    issue: Registro no neutral por uso de «hicisteis»
    rationale: 'La guía pide español neutral latinoamericano / ampliamente legible en la iglesia. «Hicisteis» es comprensible, pero marcadamente peninsular; «hicieron» no sirve por persona, así que conviene «lo hicieron» con «ustedes» implícito en el discurso directo: «les digo a ustedes ... lo hicieron».'
  - severity: medium
    issue: «En cuanto» es ambiguo para ἐφ’ ὅσον
    rationale: 'Puede entenderse como temporal («cuando») más que como extensión/grado. «En la medida en que» refleja mejor el valor documentado en el audit trail inglés: insofar as.'
  - severity: medium
    issue: «los más pequeños» después de aposición suena menos natural y puede sugerir niños o tamaño
    rationale: Aunque lexicalmente posible, en esta posición española queda mejor «a uno de los más pequeños de estos hermanos míos», que integra el superlativo con el grupo y evita una lectura demasiado física.
  - severity: low
    issue: Falta de naturalidad en «Amén les digo»
    rationale: Es transparente al griego, pero en español suena truncado. «Amén, les digo a ustedes» conserva la fórmula y mejora la gramática natural; además la nota ya explica la literalidad.
  revised_spanish_text: 'Y el Rey les responderá[a]: «Amén, les digo a ustedes: en la medida en que lo hicieron a uno de los más pequeños de estos hermanos míos[b], a mí me lo hicieron».'
  revised_footnotes:
