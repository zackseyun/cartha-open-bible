    text: 'O, más literalmente: «Amén, les digo a ustedes».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el plural masculino griego. La expresión «estos hermanos míos» puede referirse específicamente a discípulos de Jesús, a los creyentes en general o, más ampliamente, a los vulnerables; la traducción conserva la redacción sin decidir la cuestión interpretativa.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige tres puntos principales: 1) adapta el español al objetivo neutral latinoamericano al evitar «hicisteis»; 2) traduce ἐφ’ ὅσον con «en la medida en que», que refleja mejor el sentido de grado/alcance; y 3) reestructura «los más pequeños» para que modifique con claridad a «estos hermanos míos». También se mejora la naturalidad de la fórmula solemne con «Amén, les digo a ustedes», sin perder la transparencia al griego ni la nota explicativa.'
