translation:
  language: es
  text: 'Y el Rey les responderá[a]: «Amén, les digo a ustedes: en la medida en que lo hicieron a uno de los más pequeños de estos hermanos míos[b], a mí me lo hicieron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Amén, les digo a ustedes».'
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el plural masculino griego. La expresión «estos hermanos míos» puede referirse específicamente a discípulos de Jesús, a los creyentes en general o, más ampliamente, a los vulnerables; la traducción conserva la redacción sin decidir la cuestión interpretativa.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς ὁ βασιλεὺς ἐρεῖ αὐτοῖς
  english_pob_choice: And the King will answer them
  chosen_spanish: Y el Rey les responderá
  alternatives_spanish:
  - Y el rey les responderá
  - Y el Rey les dirá
  lexicon: BDAG
  rationale: Conservo el participio de respuesta integrado en el verbo principal, como en la solución inglesa. «Responderá» comunica naturalmente ἀποκριθεὶς + ἐρεῖ sin forzar un calco participial. Se capitaliza «Rey» por el marco parenético y real del pasaje, siguiendo la decisión inglesa.
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: Amén les digo
  alternatives_spanish:
  - Verdaderamente les digo
  - Amén, les digo
  lexicon: BDAG
  rationale: Mantengo la fórmula solemne con «Amén», que es más cercano al griego que sustituirla por una explicación como «verdaderamente». En español, «Amén les digo» preserva la fuerza formular y el valor enfático sin perder legibilidad.
- source_word: ἐφ’ ὅσον
  english_pob_choice: insofar as
  chosen_spanish: en cuanto
  alternatives_spanish:
  - en la medida en que
  - hasta donde
  lexicon: BDAG
  rationale: «En cuanto» expresa adecuadamente el alcance o medida del acto, manteniendo el valor de extensión de ἐφ’ ὅσον sin convertirlo en una paráfrasis más libre.
- source_word: ἐποιήσατε
  english_pob_choice: you did it
  chosen_spanish: lo hicisteis
  alternatives_spanish:
  - hicisteis
  - lo hicieron
  lexicon: BDAG
  rationale: La segunda persona plural reproduce el sentido del plural griego; «lo» hace explícito el objeto implícito del verbo, como en el audit trail inglés, y evita una frase demasiado abstracta.
- source_word: ἑνὶ τούτων
  english_pob_choice: to one of these
  chosen_spanish: a uno de estos
  alternatives_spanish:
  - a uno de éstos
  - a uno solo de estos
  lexicon: BDAG
  rationale: La preposición dativa se expresa naturalmente en español con «a». «Uno de estos» conserva el valor individualizador de ἑνί y el demostrativo cercano de τούτων.
- source_word: τῶν ἀδελφῶν μου
  english_pob_choice: brothers of mine
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - mis hermanos
  - hermanos de mí
  lexicon: BDAG
  rationale: «Hermanos» traduce el plural masculino griego con precisión. «Míos» refleja el possessivo enfático del original y permite conservar la tensión interpretativa sobre a quiénes se refiere el grupo.
- source_word: τῶν ἐλαχίστων
  english_pob_choice: the least
  chosen_spanish: los más pequeños
  alternatives_spanish:
  - los menos importantes
  - los más pequeños de todos
  - los más pequeños entre ellos
  lexicon: BDAG
  rationale: En español, «los más pequeños» comunica el superlativo social/status del griego de manera natural y reverente. Evita reducir el sentido a mera edad o tamaño físico, pero conserva la idea de mínima consideración o rango.
- source_word: ἐμοὶ ἐποιήσατε
  english_pob_choice: you did it to me
  chosen_spanish: a mí me lo hicisteis
  alternatives_spanish:
  - me lo hicisteis a mí
  - lo hicisteis a mí
  - a mí lo hicisteis
  lexicon: BDAG
  rationale: 'La colocación pronominal española permite reflejar el dativo de relación con énfasis: «a mí me». «Lo hicisteis» mantiene el objeto implícito y el paralelismo con la primera cláusula.'
theological_decisions:
- issue: Referente de «hermanos míos»
  english_pob_reading: Retain the literal phrase 'these brothers of mine' without specifying whether it refers narrowly to disciples, to believers generally, or more broadly to the needy.
  chosen_spanish_reading: Conservar «hermanos míos» sin decidir si se refiere a discípulos, creyentes en general o a los vulnerables de modo más amplio.
  alternative_spanish_readings:
  - discípulos míos
  - mis hermanos y hermanas
  - los necesitados
  rationale: El texto no resuelve de forma explícita el debate interpretativo. Mantener la expresión literal evita introducir una decisión teológica no requerida por el griego y preserva la tensión documental del POB.
  doctrine_reference: Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral.
- issue: Valor de ἀδελφῶν como plural masculino
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - personas cercanas
  rationale: El plural griego es masculinizante y no exige neutralización automática. «Hermanos» respeta la forma del original y sigue la preferencia por precisión de género cuando no hay base textual para expandirlo.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Fórmula solemne «Amén λέγω ὑμῖν»
  english_pob_reading: Truly I say to you
  chosen_spanish_reading: Amén les digo
  alternative_spanish_readings:
  - Les aseguro
  - De cierto les digo
  rationale: Conservar «Amén» mantiene la huella semítica de la fórmula. Traducirla como una simple garantía discursiva podría suavizar una expresión distintiva del evangelio y reducir su solemnidad.
  doctrine_reference: Source transparency; preserve lexical/theological tension.
translation_notes:
  revision_awareness: 'Coincide con el último repaso de revisión: no se registraron cambios posteriores. Se mantuvo la lectura óptima estable del audit trail inglés y se adaptó al español con equivalencia formal/óptima, conservando la tensión interpretativa sobre el referente de «hermanos míos».'
  spanish_consistency_notes:
  - Se usó «Rey» con mayúscula para reflejar el título referencial del contexto parabólico.
  - Se evitó «Señor» o «Cristo» porque no corresponden a este verso.
  - Se preservó el masculino plural «hermanos» por fidelidad al griego y por coherencia con la política POB de precisión de género.
  - La construcción «a mí me lo hicisteis» mantiene el paralelismo con la primera cláusula sin sobretraducir el verbo ποιέω.
