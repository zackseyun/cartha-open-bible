base_translation:
  language: en
  yaml_path: translation/nt/matthew/025/040.yaml
  text: And the King will answer them[a], ‘Truly I say to you, insofar as you did it to one of the least of these brothers of mine[b], you did it to me.’
  footnotes:
  - marker: a
    text: Or, more literally, “Amen, I say to you.”
    reason: lexical_alternative
  - marker: b
    text: “Brothers” translates the masculine plural Greek term. The phrase “these brothers of mine” may refer specifically to Jesus’ disciples, to believers more generally, or more broadly to the vulnerable; the translation preserves the wording without deciding the interpretive question.
    reason: alternative_reading
