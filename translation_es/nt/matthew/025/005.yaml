translation:
  language: es
  text: Pero mientras el novio[a] se demoraba, todas se adormecieron y se durmieron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras el novio tardaba mucho».
    reason: lexical_alternative
  - marker: b
    text: O «todas se pusieron somnolientas y estaban durmiendo». El griego distingue entre comenzar a tener sueño (ἐνύσταξαν) y dormir (ἐκάθευδον).
    reason: lexical_alternative
lexical_decisions:
- source_word: χρονίζοντος
  english_pob_choice: was delayed
  chosen_spanish: tardaba
  alternatives_spanish:
  - se retrasaba
  - se demoraba
  - tardaba en llegar
  lexicon: BDAG
  rationale: El participio genitivo indica que el novio se demoraba o tardaba más de lo esperado. En español, «mientras el novio tardaba» comunica de forma natural el valor temporal y la idea de demora sin endurecer el ritmo narrativo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo suave. «Pero» conserva el contraste con la expectativa previa y funciona bien en español bíblico contemporáneo.
- source_word: νυμφίου
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: νυμφίος significa propiamente «bridegroom». En español, «novio» es el equivalente natural y preciso en este contexto nupcial; mantiene la imagen sin introducir un término más eclesiástico o más marcado que el griego.
- source_word: ἐνύσταξαν
  english_pob_choice: became drowsy
  chosen_spanish: se adormecieron
  alternatives_spanish:
  - se hicieron somnolientas
  - se quedaron adormecidas
  - se durmieron
  lexicon: BDAG
  rationale: El verbo νυστάζω expresa el comienzo de la somnolencia, antes del sueño pleno de ἐκάθευδον. «Se adormecieron» preserva ese paso inicial mejor que «se durmieron».
- source_word: πᾶσαι
  english_pob_choice: they all
  chosen_spanish: todas
  alternatives_spanish:
  - todas ellas
  - las diez
  lexicon: BDAG
  rationale: El adjetivo femenino plural remite a todas las vírgenes. En español, el sujeto tácito femenino plural se expresa naturalmente con «todas».
- source_word: ἐκάθευδον
  english_pob_choice: fell asleep
  chosen_spanish: se durmieron
  alternatives_spanish:
  - estaban durmiendo
  - dormían
  lexicon: BDAG
  rationale: καθεύδω significa dormir. Dado el contraste aspectual con ἐνύσταξαν, «se durmieron» transmite bien el paso de la somnolencia al sueño efectivo, sin perder la progresión del griego.
theological_decisions:
- issue: Imagen del novio en la parábola
  english_pob_reading: Retain 'bridegroom' as the narrative image without making implicit christological identification explicit in the translation.
  chosen_spanish_reading: Conservar «el novio» como imagen narrativa sin explicitar una identificación cristológica en la traducción.
  alternative_spanish_readings:
  - el esposo
  - Cristo el novio
  rationale: El versículo presenta la figura parabólica de manera directa. La traducción debe preservar la imagen sin resolverla interpretativamente ni añadir una aclaración que el texto no formula aquí.
  doctrine_reference: Preservar la tensión teológica del símbolo parabólico.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el griego de Mateo 25:5 y el audit trail inglés: mantiene el giro temporal de χρονίζοντος, la distinción aspectual entre ἐνύσταξαν y ἐκάθευδον, y evita una identificación cristológica explícita del novio que el versículo mismo no desarrolla.'
  spanish_consistency_notes:
  - Se usa «novio» para νυμφίος conforme al contexto nupcial y para coherencia con un español natural y bíblicamente claro.
  - Se conserva la diferencia entre «se adormecieron» y «se durmieron» para reflejar la progresión verbal del original.
  - «Pero» traduce el δέ narrativo con un contraste leve, acorde al flujo de la parábola.
