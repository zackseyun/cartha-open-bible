- from: Porque las necias[a], cuando tomaron sus lámparas, no llevaron aceite con ellas.
  to: Porque las necias[a], cuando tomaron sus lámparas, no tomaron aceite consigo.
  rationale: Se ajusta el verbo principal a «no tomaron» para conservar el paralelismo retórico de λαβοῦσαι / ἔλαβον, se reemplaza «con ellas» por «consigo» para evitar ambigüedad y se normaliza la nota léxica al español.
