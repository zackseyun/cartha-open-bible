review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: γὰρ como explicación, μωραὶ como femenino plural referido a las vírgenes, λαβοῦσαι como acción previa/temporal, y ἔλαιον como aceite. Sin embargo, la elección de «no llevaron» debilita el paralelismo verbal λαβοῦσαι / ἔλαβον que el POB inglés procuró conservar con ''took'' / ''did not take''. Además, «con ellas» en español puede sonar ambiguo por la cercanía de «lámparas»; «consigo» expresa mejor μεθ’ ἑαυτῶν.'
  spanish_quality_summary: 'La frase es natural y legible, pero puede mejorarse con una formulación más precisa y estilísticamente más limpia. «Porque las necias, cuando tomaron sus lámparas, no tomaron aceite consigo» conserva mejor la simetría verbal griega y evita la posible ambigüedad referencial de «con ellas». También conviene corregir la nota al pie: debe estar en español, no con los términos ingleses «torches» / «lamps».'
  glossary_alignment: No hay términos del glosario mayor implicados aquí. «Necias» para μωραὶ y «lámparas» para λαμπάδας concuerdan bien con el proyecto. La nota alternativa debe presentar la opción española «antorchas» en lugar de dejar vocablos ingleses.
  issues:
  - severity: medium
    issue: Se pierde el paralelismo verbal entre λαβοῦσαι y ἔλαβον
    rationale: El griego repite λαμβάνω ('tomar') en participio y verbo principal. El inglés auditado intentó preservarlo. «Tomaron ... no tomaron» lo refleja mejor que «tomaron ... no llevaron».
  - severity: medium
    issue: «Con ellas» es potencialmente ambiguo en español
    rationale: Por la proximidad de «sus lámparas», «con ellas» puede asociarse a las lámparas más que a las mujeres. «Consigo» es más idiomático y fiel a μεθ’ ἑαυτῶν.
  - severity: low
    issue: La nota al pie conserva palabras en inglés
    rationale: 'La nota dice «torches» y «lamps» en vez de equivalentes españoles. Debe adaptarse al español del proyecto: «antorchas» / «lámparas».'
  revised_spanish_text: Porque las necias[a], cuando tomaron sus lámparas, no tomaron aceite consigo.
  revised_footnotes:
  - marker: a
    text: O «antorchas» para «lámparas» (griego λαμπάδας).
    reason: lexical_alternative
