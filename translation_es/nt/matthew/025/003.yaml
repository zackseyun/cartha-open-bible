translation:
  language: es
  text: Porque las necias[a], cuando tomaron sus lámparas, no tomaron aceite consigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antorchas» para «lámparas» (griego λαμπάδας).
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: γὰρ introduce una explicación de lo anterior. En español, «Porque» conserva bien esa relación causal/explicativa sin sonar forzado.
- source_word: μωραὶ
  english_pob_choice: the foolish
  chosen_spanish: las necias
  alternatives_spanish:
  - las insensatas
  - las foolish
  lexicon: BDAG
  rationale: El adjetivo femenino plural se refiere a las vírgenes de la parábola. «Necias» comunica la falta de sensatez con un registro natural y bíblico en español.
- source_word: λαβοῦσαι
  english_pob_choice: when they took
  chosen_spanish: cuando tomaron
  alternatives_spanish:
  - habiendo tomado
  - después de tomar
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal expresa una acción temporal previa o concomitante. «Cuando tomaron» reproduce esa secuencia de forma fluida.
- source_word: λαμπάδας
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - antorchas
  - lámparas de aceite
  lexicon: BDAG
  rationale: «Lámparas» es la equivalencia más natural en español para este contexto. «Antorchas» es posible, pero el vínculo inmediato con el aceite favorece «lámparas».
- source_word: οὐκ ἔλαβον
  english_pob_choice: did not take
  chosen_spanish: no llevaron
  alternatives_spanish:
  - no tomaron
  - no trajeron
  lexicon: BDAG
  rationale: En español, después de «tomaron sus lámparas», «no llevaron aceite» comunica bien la idea de llevar consigo algo para uso posterior. Se preserva el contraste retórico con ἔλαβον sin sonar repetitivo.
- source_word: μεθ’ ἑαυτῶν
  english_pob_choice: with them
  chosen_spanish: con ellas
  alternatives_spanish:
  - consigo
  - con ellas mismas
  lexicon: BDAG
  rationale: La frase reflexiva griega se vuelve idiomáticamente en español «con ellas». Dado que el referente inmediato son las lámparas, «con ellas» funciona de manera natural; el sentido es con ellas, es decir, acompañando su salida.
- source_word: ἔλαιον
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite para las lámparas
  - aceite de oliva
  lexicon: BDAG
  rationale: «Aceite» es la traducción directa y clara del sustantivo. En este contexto se entiende como aceite para las lámparas sin necesidad de explicitarlo en el texto principal.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en alto grado: la estructura causal de γὰρ, el valor temporal de λαβοῦσαι, el objeto «aceite» y la posible alternativa léxica para λαμπάδας están bien establecidos. La versión española sigue esa línea sin añadir interpretación.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones irrelevantes porque no hay vocabulario divino en este verso.
  - Se mantuvo una cadencia breve y bíblica, pero con sintaxis natural en español.
  - La nota al pie conserva la alternativa léxica documentada en el audit trail inglés.
