translation:
  language: es
  text: 'Y acercándose el que había recibido los cinco talentos[b], presentó otros cinco talentos, diciendo: «Señor[a], cinco talentos me entregaste; mira, otros cinco talentos he ganado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Maestro». Griego: κύριε.'
    reason: alternative_reading
  - marker: b
    text: Un talento era una gran unidad de dinero.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came forward
  chosen_spanish: acercándose
  alternatives_spanish:
  - se acercó
  - vino hacia adelante
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción del siervo al aproximarse al señor. «Acercándose» conserva el movimiento de aproximación con una construcción natural en español y evita un calco rígido.
- source_word: ὁ τὰ πέντε τάλαντα λαβὼν
  english_pob_choice: the one who had received the five talents
  chosen_spanish: el que había recibido los cinco talentos
  alternatives_spanish:
  - el que recibió los cinco talentos
  - quien había recibido los cinco talentos
  lexicon: BDAG
  rationale: La construcción articular identifica al siervo por la recepción previa del dinero. El pluscuamperfecto en español expresa bien la anterioridad relativa respecto del verbo principal.
- source_word: προσήνεγκεν
  english_pob_choice: brought
  chosen_spanish: presentó
  alternatives_spanish:
  - trajo
  - llevó ante él
  lexicon: BDAG
  rationale: Aquí el verbo describe llevar el dinero y colocarlo delante del señor. «Presentó» funciona de manera natural en un contexto de rendición de cuentas y refleja la acción de ofrecerlo ante él sin forzar un sentido cultual.
- source_word: ἄλλα πέντε τάλαντα
  english_pob_choice: another five talents
  chosen_spanish: otros cinco talentos
  alternatives_spanish:
  - cinco talentos más
  lexicon: BDAG
  rationale: ἄλλα con el numeral indica una cantidad adicional equivalente. «Otros cinco talentos» mantiene la relación formal con el griego y su sentido cuantitativo.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: En español, «Señor» es la equivalencia natural y reverente de κύριε. Se conserva la lectura del POB inglés de Lord, sin usar «Maestro» como forma principal.
- source_word: παρέδωκας
  english_pob_choice: you delivered
  chosen_spanish: me entregaste
  alternatives_spanish:
  - me confiaste
  - me diste
  lexicon: BDAG
  rationale: παραδίδωμι tiene el valor básico de entregar o poner en manos de otro. «Me entregaste» sigue de cerca el verbo fuente; el dativo de beneficio/objeto se expresa de forma natural en español con «me».
- source_word: ἴδε
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira aquí
  - ve
  lexicon: BDAG
  rationale: Es una partícula deíctica que llama la atención. «Mira» es más natural y vivo en discurso directo que «he aquí» o «mira, pues».
- source_word: ἐκέρδησα
  english_pob_choice: I have gained
  chosen_spanish: he ganado
  alternatives_spanish:
  - gané
  - he obtenido
  lexicon: BDAG
  rationale: κερδαίνω significa ganar, obtener provecho o producir ganancia. El presente perfecto español conserva mejor el resultado presente de la acción completada en la escena.
theological_decisions:
- issue: Renderización de κύριος en el discurso parabólico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Aunque el hablante se dirige a su patrón dentro de la parábola, la política terminológica del proyecto prefiere «Señor» para κύριος. En este versículo no se necesita atenuar la palabra a «Maestro» como traducción principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'Coincide con el texto griego SBLGNT y con el audit trail inglés: se mantiene la secuencia narrativa, el valor aditivo de ἄλλα πέντε τάλαντα y la decisión terminológica de κύριος como «Señor». No se detectan revisiones pendientes en el pasaje fuente.'
  spanish_consistency_notes:
  - Se usa «talentos» de forma consistente como préstamo técnico monetario, en línea con el POB inglés.
  - 'Se preserva el paralelismo verbal del original: acercarse → presentar → decir → entregar → mirar → ganar.'
  - Se evita sustituir «Señor» por «Maestro» en el texto principal, pero se registra como alternativa en nota.
  - El orden de las proposiciones sigue el flujo del griego y del inglés auditado sin añadir elementos interpretativos.
