translation:
  language: es
  text: Después de mucho tiempo[a], viene el amo de aquellos esclavos y les pide cuentas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ahora, después de un largo tiempo». La partícula griega δέ puede funcionar como una transición leve; en español se optó por una forma más natural que mantiene el progreso narrativo.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ δὲ ⸂πολὺν χρόνον⸃
  english_pob_choice: Now after a long time
  chosen_spanish: Después de mucho tiempo[a]
  alternatives_spanish:
  - Luego de mucho tiempo
  - Pero después de mucho tiempo
  lexicon: BDAG
  rationale: μετά con acusativo expresa sucesión temporal, por lo que «después de» comunica bien el valor básico. Se omitió un equivalente directo de δέ porque en español la transición narrativa queda natural sin forzar un «pero»; «ahora» tampoco aporta aquí el mismo matiz discursivo que en inglés. Se conservó «mucho tiempo» para πολὺν χρόνον.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - viene y llega
  - llega
  lexicon: BDAG
  rationale: El presente histórico se puede mantener en español con «viene», que suena natural y conserva la vividez narrativa del griego. «Llega» también es posible, pero «viene» refleja mejor el movimiento verbal del original.
- source_word: ὁ κύριος
  english_pob_choice: the master
  chosen_spanish: el amo
  alternatives_spanish:
  - el señor
  - el maestro
  lexicon: BDAG
  rationale: En este contexto parabólico de relación dueño-esclavos, el sentido social y económico de κύριος es el más visible. «Amo» expresa esa relación con mayor precisión que «señor», que en español podría sonar más honorífico o demasiado reverencial. «Maestro» no corresponde bien al marco doméstico.
- source_word: τῶν δούλων ἐκείνων
  english_pob_choice: of those slaves
  chosen_spanish: de aquellos esclavos
  alternatives_spanish:
  - de aquellos siervos
  - de aquellos servidores
  lexicon: BDAG
  rationale: δοῦλοι se rinde con «esclavos» porque la pertenencia al amo es parte central de la imagen. «Siervos» suaviza el vínculo y borra parte de la fuerza lexical del término. «Servidores» sería aún más débil en este contexto.
- source_word: συναίρει λόγον μετ’ αὐτῶν
  english_pob_choice: settles accounts with them
  chosen_spanish: les toma cuentas
  alternatives_spanish:
  - les pide cuentas
  - ajusta cuentas con ellos
  - liquida cuentas con ellos
  lexicon: BDAG
  rationale: La expresión griega es un modismo contable/legal. «Les toma cuentas» comunica en español esa idea de rendición de cuentas y evaluación económica sin añadir un matiz demasiado interpretativo. «Ajusta cuentas» puede sugerir venganza o conflicto, y «liquida cuentas» suena más finalizado de lo que el contexto exige.
theological_decisions:
- issue: Cómo renderizar κύριος en una parábola con esclavos
  english_pob_reading: the master
  chosen_spanish_reading: el amo
  alternative_spanish_readings:
  - el señor
  rationale: Aunque κύριος puede ser «Señor» en contextos teológicos, aquí el marco inmediato es doméstico-económico y la comparación gira en torno a un propietario y sus esclavos. Por eso «amo» comunica mejor la función narrativa sin importar un título cristológico al texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation philosophy items 1 y 6'
- issue: Cómo renderizar δοῦλος conservando la fuerza del vínculo
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: La guía del proyecto favorece «esclavos» cuando la condición vinculada al amo es semánticamente saliente. En esta parábola, el estatus subordinado es esencial; «siervos» debilitaría esa fuerza y «criados» cambiaría el registro.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy item 1'
translation_notes:
  revision_awareness: 'El último repaso indicó alta concordancia y no requirió cambios. Esta versión mantiene esa línea: conserva el presente histórico, la relación amo-esclavos y el modismo contable con equivalentes naturales en español.'
  spanish_consistency_notes:
  - Se usó «amo» y «esclavos» de manera coherente con la decisión léxica documentada para κύριος y δοῦλος en este contexto parabólico.
  - Se evitó «Señor» como máscara automática para κύριος porque aquí la referencia inmediata es funcional y narrativa, no un título devocional.
  - «Les toma cuentas» conserva el valor idiomático de συναίρει λόγον sin añadir una lectura más dura que la del texto.
