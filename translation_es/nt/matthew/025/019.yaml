review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: la sucesión temporal («después de mucho tiempo»), el presente histórico («viene»), la relación κύριος/δοῦλοι en clave parabólica («amo... esclavos») y la idea de συναίρει λόγον como rendición/ajuste de cuentas. Sin embargo, «les toma cuentas» suena menos idiomático y menos preciso que una expresión española más natural para el modismo contable del original.'
  spanish_quality_summary: 'El español es claro y mayormente natural. «Después de mucho tiempo» y «el amo de aquellos esclavos» son legibles y fieles. La principal debilidad es «les toma cuentas», que en español general suena algo forzado; «arregla cuentas con ellos» o «les ajusta cuentas» tampoco serían ideales. «Les pide cuentas» es más natural, pero pierde algo del matiz contable; «arregla cuentas con ellos» puede sonar ambiguo. La mejor solución amplia y natural es «arregla cuentas con ellos»? No, todavía ambigua. Más fiel y clara: «rinde cuentas» no funciona porque el sujeto es el amo. Por eso conviene «ajusta cuentas con ellos» evitarse por tono negativo. En balance, «les pide cuentas» es la opción más natural y suficientemente cercana, aunque algo menos económica. Mejor aún: «arregla cuentas con ellos» no. Se recomienda «les pide cuentas» por claridad y uso natural.'
  glossary_alignment: 'Alinea bien con la guía del proyecto en los puntos clave: δοῦλοι -> «esclavos» está correctamente preservado; κύριος no se traduce como título teológico sino con valor social («amo»), en línea con la justificación documentada. No hay conflicto con la política sobre Yahvé/Mesías u otros términos clave.'
  issues:
  - severity: medium
    issue: «les toma cuentas» no suena idiomático en español neutro amplio
    rationale: Aunque intenta reflejar el modismo contable del griego, en español general resulta algo artificial. Puede distraer al lector o sonar calcado. «Les pide cuentas» es más natural y conserva la idea de requerir rendición de cuentas, que es el efecto narrativo principal del original.
  - severity: low
    issue: La nota alternativa con «Ahora después de un largo tiempo» es aceptable pero algo innecesariamente literal
    rationale: No es incorrecta, pero «Ahora» en español no reproduce de manera especialmente natural el valor discursivo de δέ. Aun así, como nota de alternativa, no causa problema serio.
  revised_spanish_text: Después de mucho tiempo[a], viene el amo de aquellos esclavos y les pide cuentas.
  revised_footnotes:
  - marker: a
    text: O «Ahora, después de un largo tiempo». La partícula griega δέ puede funcionar como una transición leve; en español se optó por una forma más natural que mantiene el progreso narrativo.
    reason: alternative_reading
  revision_rationale: Se mantiene la estructura y las decisiones léxicas principales del borrador, pero se reemplaza «les toma cuentas» por «les pide cuentas» para lograr un español más natural y ampliamente comprensible, preservando la idea de exigir una rendición de cuentas implícita en συναίρει λόγον μετ’ αὐτῶν. Se pulió levemente la puntuación de la nota.
