translation:
  language: es
  text: Por tanto, debías haber depositado mi dinero con los banqueros, y cuando yo regresara, habría recibido lo que era mío con interés.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi plata».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδει
  english_pob_choice: you should have
  chosen_spanish: debiste haber
  alternatives_spanish:
  - había sido necesario que depositaras
  - deberías haber
  lexicon: BDAG
  rationale: El imperfecto impersonal de δέω expresa algo requerido en el pasado. «Debiste haber» conserva bien la reprensión y suena natural en español actual sin perder la fuerza normativa.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca conclusión lógica respecto de la acusación previa. «Por tanto» reproduce el valor inferencial de forma clara y formal.
- source_word: βαλεῖν
  english_pob_choice: deposited
  chosen_spanish: haber depositado
  alternatives_spanish:
  - haber puesto
  - haber colocado
  lexicon: BDAG
  rationale: Aunque el verbo básico es «echar/poner», con τραπεζίταις el sentido idiomático es depositar dinero. «Haber depositado» comunica el acto económico requerido.
- source_word: τὰ ἀργύριά μου
  english_pob_choice: my money
  chosen_spanish: mi dinero
  alternatives_spanish:
  - mi plata
  - mi dinero de plata
  lexicon: BDAG
  rationale: ἀργύριον puede significar plata o dinero. En este contexto comercial, «mi dinero» expresa mejor la función del término para el lector español moderno. Se conserva la alternativa más literal en nota.
- source_word: τραπεζίταις
  english_pob_choice: the bankers
  chosen_spanish: los banqueros
  alternatives_spanish:
  - los cambistas
  - los banqueros de mesa
  lexicon: BDAG
  rationale: El término apunta a quienes manejan depósitos y cambio de dinero. Como el texto menciona τόκος, «banqueros» es más preciso que «cambistas» para el sentido global de la frase.
- source_word: ἐλθὼν ἐγὼ
  english_pob_choice: when I came
  chosen_spanish: cuando yo viniera
  alternatives_spanish:
  - cuando yo volviera
  - y al venir yo
  lexicon: BDAG
  rationale: La construcción temporal señala la llegada del amo en el escenario hipotético. «Cuando yo viniera» mantiene el valor contrafactual junto con una sintaxis natural en español.
- source_word: ἐκομισάμην ἂν
  english_pob_choice: I would have received
  chosen_spanish: habría recibido
  alternatives_spanish:
  - habría recuperado
  - habría cobrado
  lexicon: BDAG
  rationale: El medio de κομίζω puede significar recibir de vuelta o para uno mismo. «Habría recibido» es sobrio y exacto para el resultado esperado en la situación hipotética.
- source_word: τὸ ἐμὸν
  english_pob_choice: what was mine
  chosen_spanish: lo que era mío
  alternatives_spanish:
  - lo mío
  - aquello que era mío
  lexicon: BDAG
  rationale: El posesivo sustantivado señala la propia propiedad del hablante. «Lo que era mío» preserva el valor posesivo con claridad y fluidez.
- source_word: σὺν τόκῳ
  english_pob_choice: with interest
  chosen_spanish: con interés
  alternatives_spanish:
  - con rédito
  - con usura
  lexicon: BDAG
  rationale: τόκος designa interés monetario en este contexto. «Con interés» es la opción más clara y neutral en español; «usura» sería engañosa por su carga moral moderna.
theological_decisions:
- issue: Lenguaje financiero y posible sobreinterpretación moral del interés
  english_pob_reading: Translate the financial terms straightforwardly as part of the parable's imagery without implying an endorsement or condemnation of all interest-taking.
  chosen_spanish_reading: Traducir los términos financieros de manera directa como parte de la imagen parabólica, sin convertir la frase en una declaración doctrinal sobre toda forma de interés.
  alternative_spanish_readings:
  - usar «usura» para reflejar debate moral tradicional
  - suavizar la referencia económica con una paráfrasis general
  rationale: El verso emplea lenguaje económico ordinario para la lógica interna de la parábola. Mantenerlo neutral evita importar debates posteriores sobre la licitud del cobro de interés que el texto no formula explícitamente.
  doctrine_reference: 'Principio de traducción: no importar afirmaciones doctrinales que el texto no hace; priorizar el primado del idioma fuente.'
translation_notes:
  revision_awareness: El texto de partida y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas; esta versión sigue esa lectura estable, manteniendo la equivalencia óptima con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; aquí no aparece.
  - Se mantiene «con interés» para τόκος, evitando «usura» por su sobrecarga moral.
  - «Banqueros» conserva la fuerza económica del contexto y armoniza con el valor de depósito.
  - La nota al pie marca la alternativa literal de ἀργύριά μου sin introducir una segunda lectura doctrinal.
