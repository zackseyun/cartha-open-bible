review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayoría de las decisiones léxicas del griego: «Por tanto», «depositado», «mi dinero», «banqueros», «lo que era mío» y «con interés» corresponden adecuadamente a οὖν, βαλεῖν, τὰ ἀργύριά μου, τραπεζίταις, τὸ ἐμὸν y σὺν τόκῳ. También preserva correctamente el sentido contrafactual de ἐκομισάμην ἂν con «habría recibido». Sin embargo, «cuando yo viniera» no es la mejor representación aquí: aunque puede sonar hipotético, en español actual resulta menos natural y menos directo que «cuando yo viniera / volviera»; además, dado el inglés auditado «when I came», conviene una formulación más idiomática en contexto parabológico. Más importante, «debiste haber» suena discutido o menos recomendable en registro cuidado; «debías haber» o «debiste haber» pueden oírse, pero para español bíblico digno y claro «debías haber» fluye mejor con el imperfecto de ἔδει.'
  spanish_quality_summary: El texto es legible, pero requiere un ajuste de naturalidad y registro. «Debiste haber depositado» es comprensible, pero «debías haber depositado» suena más estable y mejor alineado con el imperfecto griego. «Cuando yo viniera» es gramatical, pero algo rígido y menos natural en español ampliamente legible; «cuando yo regresara» o «cuando yo volviera» expresa mejor la secuencia temporal hipotética del amo que vuelve. El resto del verso está bien formulado y mantiene dignidad moderna sin calcos pesados.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «dinero», «banqueros» e «interés» concuerdan con la justificación auditada y evitan sobrecargas teológicas como «usura». La nota «mi plata» conserva apropiadamente la alternativa más literal para ἀργύριά.
  issues:
  - severity: medium
    issue: «debiste haber» en lugar de una forma más cuidada como «debías haber»
    rationale: Aunque es entendible y común en algunas variedades, «debías haber» refleja mejor el imperfecto impersonal ἔδει y suena más natural en un registro bíblico digno y panhispánico.
  - severity: medium
    issue: «cuando yo viniera» suena rígido y menos idiomático
    rationale: La construcción intenta expresar el escenario contrafactual, pero en español de lectura amplia resulta más natural «cuando yo regresara» o «cuando yo volviera», manteniendo la relación temporal del participio ἐλθὼν con el resultado hipotético.
  revised_spanish_text: Por tanto, debías haber depositado mi dinero con los banqueros, y cuando yo regresara, habría recibido lo que era mío con interés.[a]
  revised_footnotes:
  - marker: a
    text: O «mi plata».
    reason: lexical_alternative
  revision_rationale: Se ajusta «debiste haber» a «debías haber» para reflejar mejor ἔδει en español cuidado y se cambia «cuando yo viniera» por «cuando yo regresara» para una expresión más natural y clara del retorno del amo en el escenario hipotético. Se mantiene la nota léxica sobre «plata», pero se ancla correctamente en el texto revisado.
