revisions:
- from: Por tanto, debiste[a] haber depositado mi dinero con los banqueros, y cuando yo viniera, habría recibido lo que era mío con interés.
  to: Por tanto, debías haber depositado mi dinero con los banqueros, y cuando yo regresara, habría recibido lo que era mío con interés.[a]
  rationale: Se ajusta «debiste haber» a «debías haber» para reflejar mejor ἔδει en español cuidado y se cambia «cuando yo viniera» por «cuando yo regresara» para una expresión más natural y clara del retorno del amo en el escenario hipotético. Se mantiene la nota léxica sobre «plata», pero se ancla correctamente en el texto revisado.
