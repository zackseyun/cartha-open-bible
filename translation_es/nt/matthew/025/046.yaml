translation:
  language: es
  text: Y estos se irán a castigo eterno[a], pero los justos a vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'castigo de la era' ... 'vida de la era'. El adjetivo αἰώνιος es debatido en algunos contextos, pero aquí modifica tanto 'castigo' como 'vida'; por eso la traducción mantiene 'eterno' en ambas cláusulas para conservar el paralelismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελεύσονται
  english_pob_choice: will go away
  chosen_spanish: irán
  alternatives_spanish:
  - se irán
  - se alejarán
  - se apartarán
  lexicon: BDAG
  rationale: El futuro de ἀπέρχομαι comunica salida o alejamiento. En español, 'irán' expresa bien el movimiento hacia el destino señalado sin añadir matices innecesarios; 'se irán' o 'se apartarán' serían posibles, pero 'irán' resulta más natural y conciso en esta estructura.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: éstos
  alternatives_spanish:
  - estas personas
  - ellos
  lexicon: BDAG
  rationale: El demostrativo retoma al grupo recién descrito. 'Éstos' mantiene la referencia directa y el contraste con 'los justos' sin introducir una expansión explicativa que no está en el griego.
- source_word: κόλασιν
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - punición
  - pena
  lexicon: BDAG
  rationale: En este contexto judicial, κόλασις denota consecuencia punitiva. 'Castigo' es la opción más natural y fiel en español; 'pena' puede sonar demasiado técnico o ambiguo, y 'corrección' debilitaría el sentido retributivo.
- source_word: αἰώνιον
  english_pob_choice: eternal
  chosen_spanish: eterno
  alternatives_spanish:
  - eterno/a
  - perpetuo
  - de la era
  lexicon: BDAG
  rationale: 'Se conserva la misma traducción en ambas cláusulas para respetar el paralelismo del griego: castigo eterno / vida eterna. ''De la era'' o ''de tiempo indefinido'' introducirían una resolución interpretativa no impuesta por el texto y podrían borrar la tensión lexical documentada.'
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: BDAG
  rationale: Como adjetivo sustantivado, δίκαιοι se refiere al grupo caracterizado por la justicia. 'Los justos' es idiomático en español y conserva el peso moral-covenantal mejor que 'los rectos'; 'los justificados' introduciría una formulación más doctrinal que el término mismo no exige aquí.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida eterna
  lexicon: BDAG
  rationale: 'ζωή se traduce normalmente como ''vida''. En español conviene mantener la frase breve y paralela: ''vida eterna''; añadir explicaciones rompería la simetría del versículo.'
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - en cambio
  lexicon: BDAG
  rationale: La partícula marca contraste entre los dos destinos. 'Pero' comunica de forma clara y natural la oposición adversativa en español.
theological_decisions:
- issue: Traducción de αἰώνιον en las dos expresiones paralelas
  english_pob_reading: Render αἰώνιον as 'eternal' in both clauses
  chosen_spanish_reading: Traducir αἰώνιον como 'eterno' en ambos miembros del paralelismo
  alternative_spanish_readings:
  - '''eterno'' / ''de la era'''
  - '''perpetuo'''
  - '''de larga duración'''
  rationale: El mismo adjetivo modifica 'castigo' y 'vida', por lo que la traducción debe conservar la simetría. Se deja constancia de la alternativa debatida sin adoptarla en el texto principal, para no resolver unilateralmente la discusión lexical-teológica sobre el alcance de αἰώνιος.
  doctrine_reference: Preservar la tensión lexical y la simetría del paralelismo; no suavizar la fuerza del juicio ni de la vida.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios adicionales respecto del texto base auditado; se mantiene la misma decisión de preservar el paralelismo de αἰώνιος en ambas cláusulas.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra convención de máscara porque el versículo no contiene el nombre divino.
  - Se mantuvo 'castigo' en lugar de 'corrección' para respetar el sentido judicial del contexto.
  - '''Los justos'' conserva mejor el adjetivo sustantivado que una paráfrasis explicativa.'
  - La nota al pie marca la alternativa lexical debatida sin alterar el texto principal.
