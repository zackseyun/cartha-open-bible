translation:
  language: es
  text: Porque a todo el que tiene se le dará, y tendrá abundancia[a]; pero del que no tiene, aun lo que tiene se le quitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «abundará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ ... ἔχοντι παντί
  english_pob_choice: to everyone who has
  chosen_spanish: al que tiene
  alternatives_spanish:
  - a todo el que tiene
  - a cada uno que tiene
  lexicon: BDAG
  rationale: El participio con artículo en dativo funciona como expresión sustantiva y general; en español, 'al que tiene' conserva la fuerza representativa singular y suena natural. 'A todo se le dará' mantiene el alcance distributivo de παντί sin forzar una construcción más rígida.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: γάρ introduce apoyo explicativo para la declaración anterior. 'Porque' transmite bien la conexión causal/explicativa en español sin perder la relación discursiva.
- source_word: δοθήσεται
  english_pob_choice: will be given
  chosen_spanish: se le dará
  alternatives_spanish:
  - le será dado
  - será dado
  lexicon: BDAG
  rationale: El futuro pasivo de δίδωμι se expresa naturalmente en español con pasiva refleja. El dativo beneficiario queda bien representado con 'se le dará'.
- source_word: περισσευθήσεται
  english_pob_choice: he will have an abundance
  chosen_spanish: tendrá abundancia
  alternatives_spanish:
  - abundará
  - tendrá más que suficiente
  lexicon: BDAG
  rationale: El sentido es de resultado de superabundancia. 'Tendrá abundancia' comunica esa idea de manera idiomática en español y evita la calca 'abundará' si se entiende menos naturalmente aquí.
- source_word: τοῦ δὲ μὴ ἔχοντος
  english_pob_choice: but from the one who does not have
  chosen_spanish: pero al que no tiene
  alternatives_spanish:
  - pero del que no tiene
  - pero al que no posee
  lexicon: BDAG
  rationale: La construcción genitiva articular contrastiva se vierte con una frase personal natural en español. 'Al que no tiene' preserva el paralelo con la primera cláusula.
- source_word: καὶ ὃ ἔχει
  english_pob_choice: even what he has
  chosen_spanish: aun lo que tiene
  alternatives_spanish:
  - también lo que tiene
  - incluso lo que tiene
  lexicon: BDAG
  rationale: 'El καί ascendente se traduce con ''aun'', que preserva el énfasis paradojal: no solo carece, sino que incluso lo que posee será retirado.'
- source_word: ἀρθήσεται
  english_pob_choice: will be taken away
  chosen_spanish: le será quitado
  alternatives_spanish:
  - será quitado
  - le será removido
  lexicon: BDAG
  rationale: αἴρω en este contexto significa quitar/retirar. 'Le será quitado' es natural en español y mantiene el matiz de despojo.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: le
  alternatives_spanish:
  - de él
  - de su lado
  lexicon: BDAG
  rationale: La preposición de separación ya queda implícita en 'quitado'; el complemento indirecto 'le' hace fluida la frase española y conserva la idea de pérdida personal.
theological_decisions:
- issue: Fuerza singular genérica frente a pluralización
  english_pob_reading: Use 'everyone/the one ... he/him' to preserve the singular representative masculine force
  chosen_spanish_reading: Mantener singular genérico con 'al que... le' y 'el que...'
  alternative_spanish_readings:
  - usar plural 'a los que tienen... se les dará'
  - neutralizar con 'quien tiene... se le dará'
  rationale: El griego usa participios singulares con valor representativo. En español, conservar el singular ayuda a preservar el paralelismo y la lógica proverbial sin convertir el dicho en plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Matiz de abundancia en περισσευθήσεται
  english_pob_reading: he will have an abundance
  chosen_spanish_reading: tendrá abundancia
  alternative_spanish_readings:
  - abundará
  - tendrá más que suficiente
  rationale: No se debe diluir el aumento prometido ni sustituirlo por una explicación excesiva. 'Tendrá abundancia' mantiene la superabundancia del verbo sin introducir una paráfrasis interpretativa fuerte.
  doctrine_reference: BDAG περισσεύω
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto, sin revisiones aplicadas en la pasada más reciente. La única zona con ligera tensión es περισσευθήσεται, donde el inglés optó por una paráfrasis idiomática ('he will have an abundance'); en español se preserva esa idea con una formulación igualmente natural y se deja constancia de la alternativa verbal.
  spanish_consistency_notes:
  - Se mantiene el paralelo singular genérico ('al que... / al que...') para reflejar la estructura del griego.
  - Se usa 'Yahvé' solo cuando corresponda al nombre divino; aquí no aplica.
  - Se evita 'Cristo' porque el pasaje no contiene Χριστός.
  - '''Tener abundancia'' preserva mejor el sentido de περισσεύω en contexto que un calco rígido.'
  - La pasiva refleja 'se le dará' y 'le será quitado' conserva bien la voz pasiva del griego y la relación de beneficio/pérdida.
