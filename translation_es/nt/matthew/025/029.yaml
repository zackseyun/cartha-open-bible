revisions:
- from: Porque al que tiene, a todo se le dará, y tendrá abundancia[a]; pero al que no tiene, aun lo que tiene le será quitado.
  to: Porque a todo el que tiene se le dará, y tendrá abundancia[a]; pero del que no tiene, aun lo que tiene se le quitará.
  rationale: Se integró el valor distributivo de παντί en «a todo el que tiene» para un español más natural y más cercano a la función del griego. También se cambió «pero al que no tiene» por «pero del que no tiene» para reflejar mejor la lógica de separación en la segunda cláusula y armonizar con «se le quitará». Se mantuvo la nota sobre «abundará» porque preserva la alternativa léxica documentada en el rastro inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:26:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: mantiene la estructura proverbial, el contraste entre el que tiene y el que no tiene, el valor ascensivo de καί con «aun», y la idea de abundancia en περισσευθήσεται con una nota alternativa adecuada. Sin embargo, en la segunda cláusula el griego dice literalmente «de/desde el que no tiene» (τοῦ δὲ μὴ ἔχοντος ... ἀρθήσεται ἀπ’ αὐτοῦ), mientras que el español draft repite «al que no tiene», lo cual suena menos natural con «será quitado» y debilita el matiz de separación expresado por ἀπό.'
  spanish_quality_summary: El español es claro y legible, pero «Porque al que tiene, a todo se le dará» suena algo trabado por separar el distributivo «a todo» del referente personal; además, «pero al que no tiene» combina menos bien con «le será quitado» que una formulación con «del que». Una leve reestructuración mejora la naturalidad sin perder el paralelismo ni la fuerza singular genérica.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son apropiadas: «abundancia» para περισσευθήσεται con nota alternativa «abundará», y singular genérico mantenido. El ajuste propuesto solo mejora la fidelidad sintáctica y la idiomaticidad española.'
  issues:
  - severity: medium
    issue: «a todo se le dará» es poco natural en esta construcción
    rationale: παντί modifica distributivamente al participio sustantivado; en español suena mejor integrarlo como «a todo el que tiene» que separarlo como «al que tiene, a todo se le dará».
  - severity: medium
    issue: «pero al que no tiene» no refleja tan bien el matiz de separación de ἀπ’ αὐτοῦ
    rationale: La segunda cláusula culmina con «será quitado de él / de su parte». En español, «del que no tiene» encaja mejor con «se le quitará» y preserva mejor la relación con ἀπό.
  revised_spanish_text: Porque a todo el que tiene se le dará, y tendrá abundancia[a]; pero del que no tiene, aun lo que tiene se le quitará.
  revised_footnotes:
  - marker: a
    text: 'O: «abundará».'
    reason: lexical_alternative
  revision_rationale: Se integró el valor distributivo de παντί en «a todo el que tiene» para un español más natural y más cercano a la función del griego. También se cambió «pero al que no tiene» por «pero del que no tiene» para reflejar mejor la lógica de separación en la segunda cláusula y armonizar con «se le quitará». Se mantuvo la nota sobre «abundará» porque preserva la alternativa léxica documentada en el rastro inglés.
