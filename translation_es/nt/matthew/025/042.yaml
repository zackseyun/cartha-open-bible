translation:
  language: es
  text: Porque tuve hambre, y no me dieron de comer[a]; tuve sed, y no me dieron de beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa más literal: «no me dieron a comer ... no me dieron a beber».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπείνασα
  english_pob_choice: I was hungry
  chosen_spanish: tuve hambre
  alternatives_spanish:
  - estaba hambriento
  - hambre tuve
  lexicon: BDAG
  rationale: El aoristo expresa la situación pasada de hambre. En español, «tuve hambre» es natural y directo, y mantiene el carácter de estado experimentado por el hablante sin volverlo demasiado literario.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón en relación con el juicio del contexto inmediato. «Porque» conserva con claridad ese valor explicativo en español.
- source_word: ἐδώκατέ μοι φαγεῖν
  english_pob_choice: you gave me nothing to eat
  chosen_spanish: no me dieron de comer
  alternatives_spanish:
  - no me dieron nada de comer
  - no me dieron para comer
  lexicon: BDAG
  rationale: La construcción griega literalmente significa «no me dieron a comer». En español, «no me dieron de comer» reproduce bien el sentido y es idiomático; la ausencia de alimento queda implícita, como en la versión inglesa auditada.
- source_word: μoi
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo personal se conserva como complemento indirecto natural en español, manteniendo el foco en la falta de cuidado hacia la persona del hablante.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: de comer
  alternatives_spanish:
  - para comer
  - a comer
  lexicon: BDAG
  rationale: El infinitivo complementa a δίδωμι con valor verbal. «De comer» es la forma más natural en español para expresar ese complemento sin perder la relación verbal del original.
- source_word: ἐδίψησα
  english_pob_choice: I was thirsty
  chosen_spanish: tuve sed
  alternatives_spanish:
  - estaba sediento
  - sed tuve
  lexicon: BDAG
  rationale: El paralelo con ἐπείνασα favorece una construcción breve y idiomática. «Tuve sed» preserva la sencillez del paralelismo griego.
- source_word: ἐποτίσατέ με
  english_pob_choice: you gave me nothing to drink
  chosen_spanish: no me dieron de beber
  alternatives_spanish:
  - no me dieron nada de beber
  - no me dieron para beber
  lexicon: BDAG
  rationale: ποτίζω aquí expresa la provisión de bebida. «No me dieron de beber» es una equivalencia natural y mantiene el paralelismo con «no me dieron de comer».
theological_decisions:
- issue: Cómo traducir las cláusulas negadas de provisión
  english_pob_reading: you gave me nothing to eat / you gave me nothing to drink
  chosen_spanish_reading: no me dieron de comer / no me dieron de beber
  alternative_spanish_readings:
  - no me dieron nada de comer / no me dieron nada de beber
  - no me dieron para comer / no me dieron para beber
  rationale: No hay una disputa doctrinal en el contenido, pero sí una tensión entre literalidad y naturalidad. La elección conserva la denuncia personal del descuido y evita una formulación forzada en español, sin agregar elementos que el griego no exige.
  doctrine_reference: Discurso de juicio de Jesús en Mateo 25; equivalencia óptima con preservación del paralelismo y de la responsabilidad moral implícita.
translation_notes:
  revision_awareness: El paquete auditado en inglés no presenta revisiones sustantivas; la traducción española sigue la misma lectura y mantiene el paralelismo entre hambre/sed y dar de comer/dar de beber, con ajuste idiomático propio del español.
  spanish_consistency_notes:
  - Se mantiene «tuve hambre / tuve sed» para reflejar el paralelismo aorístico.
  - Se conserva el foco personal en «me» para reproducir el énfasis del dative griego.
  - Se evita «SEÑOR» o terminología no presente en el texto; este versículo no contiene el nombre divino ni títulos cristológicos.
  - La nota al pie marca la alternativa más literal sin desplazar la redacción principal, de acuerdo con el audit trail inglés.
