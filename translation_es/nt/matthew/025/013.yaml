translation:
  language: es
  text: Por tanto[a], manténganse despiertos, porque no saben el día ni la hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanezcan vigilantes» o «estén vigilantes». El imperativo griego expresa una vigilancia continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: γρηγορεῖτε
  english_pob_choice: stay awake
  chosen_spanish: manténganse despiertos
  alternatives_spanish:
  - permanezcan despiertos
  - estén vigilantes
  - estén alertas
  lexicon: BDAG
  rationale: El imperativo presente plural pide vigilancia continua. «Manténganse despiertos» conserva la imagen del estar despierto y suena natural en español moderno; «estén vigilantes» también es posible, pero desplaza más el matiz metafórico hacia la vigilancia abstracta.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: La partícula introduce una conclusión lógica a partir de la parábola previa. «Por tanto» refleja bien ese valor inferencial en español y mantiene el tono formal y bíblico sin sonar forzado.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón del mandato. «Porque» expresa de manera directa y natural la fuerza causal del griego sin añadir matices ajenos.
- source_word: οὐκ οἴδατε
  english_pob_choice: you do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no conocen
  - no saben con certeza
  lexicon: BDAG
  rationale: El verbo οἶδα expresa conocimiento, no mera percepción. «No saben» es la forma natural en español y conserva la negación simple del original sin ampliar innecesariamente a «con certeza».
- source_word: τὴν ἡμέραν
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - ese día
  - aquel día
  lexicon: BDAG
  rationale: Se conserva el artículo definido porque el texto griego lo presenta así. En contexto apunta al momento exacto de la venida, pero la traducción evita especificarlo más de lo que el versículo dice.
- source_word: οὐδὲ τὴν ὥραν
  english_pob_choice: or the hour
  chosen_spanish: ni la hora
  alternatives_spanish:
  - o la hora
  - ni siquiera la hora
  lexicon: BDAG
  rationale: οὐδέ coordina un segundo elemento negado. En español, tras una negación previa, «ni la hora» reproduce de forma natural la continuidad de la negación y conserva el paralelismo del griego.
theological_decisions:
- issue: Imagen de vigilancia en el imperativo
  english_pob_reading: stay awake
  chosen_spanish_reading: manténganse despiertos
  alternative_spanish_readings:
  - permanezcan vigilantes
  - estén vigilantes
  rationale: La frase mantiene la imagen de alerta continua sin convertirla en una formulación más técnica o eclesiástica. No añade un sistema escatológico más específico que el que el versículo expresa.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Alcance de «el día ni la hora»
  english_pob_reading: retain the expression without explicit interpretive expansion
  chosen_spanish_reading: el día ni la hora
  alternative_spanish_readings:
  - el día o la hora de la venida del Hijo del Hombre
  - el tiempo señalado
  rationale: El versículo no explicita el referente completo; por eso se conserva la expresión breve. Así se respeta la economía del griego y la cautela interpretativa del POB en inglés.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego SBLGNT y el auditor inglés sin cambios relevantes: la traducción inglesa ya refleja alta concordancia con el texto fuente, y no hubo revisiones aplicadas en la última pasada. La versión española conserva la conclusión inferencial, el mandato de vigilancia continua y la estructura breve de la razón causal sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé/Mesías» como norma general del proyecto, aunque este versículo no los incluye.
  - Se eligió una negación natural en español («no saben ... ni la hora») para reflejar οὐκ ... οὐδὲ sin sonar artificial.
  - No se añadió información sobre la venida del Hijo del Hombre porque el versículo griego no la explicita aquí.
  - El tono es formal y publicable, con sintaxis moderna y sin calco rígido del inglés.
