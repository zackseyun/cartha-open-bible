lexical_decisions:
- source_word: ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Del mismo modo
  alternatives_spanish:
  - Asimismo
  - Igualmente
  - De la misma manera
  lexicon: BDAG
  rationale: El adverbio conecta la acción de este siervo con la del anterior. «Del mismo modo» conserva esa relación comparativa de forma natural en español, sin sonar demasiado rígido.
- source_word: ὁ τὰ δύο
  english_pob_choice: the one with the two
  chosen_spanish: el que tenía dos
  alternatives_spanish:
  - el que tenía los dos
  - el de los dos
  - el que recibió dos
  lexicon: BDAG
  rationale: La construcción artículo + frase acusativa es elíptica y remite al siervo caracterizado por los dos talentos del contexto. «El que tenía dos» mantiene esa referencia de manera fluida y no sobreexplica el texto.
- source_word: ἐκέρδησεν
  english_pob_choice: gained
  chosen_spanish: ganó
  alternatives_spanish:
  - obtuvo
  - sacó ganancia
  - ganó para sí
  lexicon: BDAG
  rationale: El aoristo de κερδαίνω aquí expresa que obtuvo una ganancia adicional. «Ganó» conserva el sentido económico con concisión y corresponde bien al contexto.
- source_word: ἄλλα δύο
  english_pob_choice: two more
  chosen_spanish: dos más
  alternatives_spanish:
  - otros dos
  - dos adicionales
  - dos más de la misma clase
  lexicon: BDAG
  rationale: ἄλλα con δύο indica dos adicionales del mismo tipo. «Dos más» es la forma más natural en español y preserva la idea de adición sin cambiar el sentido.
translation_notes:
  revision_awareness: El griego y el aparato de auditoría en inglés están en alta concordancia; no se observan revisiones que alteren el sentido base. La traducción sigue de cerca la secuencia del original y mantiene la elipsis del sujeto referencial.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y publicable, sin añadir explicaciones narrativas inexistentes en el versículo.
  - «Ganó» se usa en sentido de obtener ganancia económica, no de victoria competitiva.
  - La nota conserva una alternativa lexical breve, coherente con el auditorio español y con el matiz del audit trail inglés.
