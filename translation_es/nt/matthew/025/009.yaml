translation:
  language: es
  text: 'Pero las prudentes respondieron[a], diciendo: «No, no sea que no haya bastante para nosotras y para ustedes. Vayan más bien a los que venden, y compren para ustedes mismas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «no sea que de ningún modo haya bastante para nosotras y para ustedes». El griego usa una negación enfática con «no sea que», expresando una preocupación intensa de que el suministro resulte insuficiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: BDAG
  rationale: El verbo narrativo de respuesta se vierte naturalmente como «respondieron», que conserva el intercambio dialogal sin añadir matiz innecesario.
- source_word: αἱ φρόνιμοι
  english_pob_choice: the wise
  chosen_spanish: las prudentes
  alternatives_spanish:
  - las sabias
  - las sensatas
  lexicon: BDAG
  rationale: «φρόνιμοι» puede expresar prudencia/sensatez práctica. En este contexto de la parábola, «las prudentes» preserva la cualidad moral-práctica y suena natural en español.
- source_word: λέγουσαι
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: BDAG
  rationale: El participio de modo/acompañamiento se refleja bien con «diciendo», manteniendo la estructura narrativa del griego.
- source_word: Μήποτε ⸂οὐ μὴ⸃ ἀρκέσῃ
  english_pob_choice: No, lest there should not be enough
  chosen_spanish: No, no sea que no haya bastante
  alternatives_spanish:
  - No, para que no falte
  - No, no sea que no alcance
  lexicon: BDAG
  rationale: La combinación μήποτε + negación enfática expresa temor/precaución ante una posible insuficiencia. «No, no sea que no haya bastante» conserva esa tensión sin suavizarla ni explicar de más.
- source_word: ἀρκέσῃ
  english_pob_choice: be enough
  chosen_spanish: haya bastante
  alternatives_spanish:
  - alcance
  - sea suficiente
  lexicon: BDAG
  rationale: «Haya bastante» es idiomático en español y transmite la idea de suficiencia material con claridad.
- source_word: ἡμῖν καὶ ὑμῖν
  english_pob_choice: for us and for you
  chosen_spanish: para nosotras y para ustedes
  alternatives_spanish:
  - para nosotras y para vosotros
  - para nosotros y para ustedes
  lexicon: BDAG
  rationale: El dativo de ventaja se vierte con «para». Dado el referente femenino del contexto de la parábola, «nosotras» refleja el grupo original; «ustedes» mantiene un español amplio y respetuoso.
- source_word: πορεύεσθε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Váyanse
  lexicon: BDAG
  rationale: El imperativo plural se expresa con «Vayan». Evita una formulación más abrupta o coloquial que alteraría el tono del diálogo.
- source_word: μᾶλλον
  english_pob_choice: instead
  chosen_spanish: más bien
  alternatives_spanish:
  - en cambio
  - mejor
  lexicon: BDAG
  rationale: «Más bien» reproduce de forma natural la idea de alternativa preferida marcada por μᾶλλον.
- source_word: πρὸς τοὺς πωλοῦντας
  english_pob_choice: to those who sell
  chosen_spanish: a los que venden
  alternatives_spanish:
  - a los vendedores
  - hacia los que venden
  lexicon: BDAG
  rationale: La frase participial sustantivada se vierte de forma transparente como «los que venden», manteniendo la referencia general sin añadir un objeto explícito.
- source_word: ἀγοράσατε
  english_pob_choice: buy
  chosen_spanish: compren
  alternatives_spanish:
  - adquieran
  - compren para ustedes
  lexicon: BDAG
  rationale: «Compren» es el equivalente común y directo del imperativo; evita el tecnicismo de «adquieran».
- source_word: ἑαυταῖς
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes mismas
  alternatives_spanish:
  - para sí mismas
  - para ustedes
  lexicon: BDAG
  rationale: El reflexivo femenino plural se hace explícito con «ustedes mismas», conservando el referente femenino del grupo y la idea de compra para uso propio.
theological_decisions:
- issue: Negación enfática con μήποτε + οὐ μή
  english_pob_reading: No, lest there not be enough for us and for you.
  chosen_spanish_reading: No, no sea que no haya bastante para nosotras y para ustedes.
  alternative_spanish_readings:
  - No, para que no falte para nosotras y para ustedes.
  - No, no vaya a ser que no alcance para nosotras y para ustedes.
  rationale: La secuencia griega expresa una preocupación fuerte por la insuficiencia futura; no es mera cortesía ni una negativa simple. La traducción conserva esa cautela reforzada sin diluir el doble negativo.
  doctrine_reference: No aplica; decisión de fuerza modal y retórica del texto.
translation_notes:
  revision_awareness: 'La redacción sigue el giro revisado del audit trail inglés, que eliminó el auxiliar innecesario «should» para reflejar más directamente el griego. En español, eso se refleja evitando perífrasis como «debería haber» y usando una construcción directa con subjuntivo: «no sea que no haya bastante».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías» según el estándar del proyecto, pero este versículo no contiene esos términos.
  - Se preserva el referente femenino del grupo con «las prudentes», «nosotras» y «ustedes mismas», acorde con el contexto narrativo.
  - «Haya bastante» se eligió para suficiencia concreta de provisión, no como abstracción doctrinal.
  - El tono es sobrio y publicable, sin recurrir a arcaísmos innecesarios.
