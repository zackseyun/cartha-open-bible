  glossary_alignment: '«Señor» para κύριος está alineado con la política. No hay términos de glosario mayor en conflicto, pero la decisión para διακονέω debería ajustarse al razonamiento documentado del POB: no reducirlo a un simple «servir» si el audit trail ya reforzó el matiz de ministrar/atender. «Forastero» para ξένος es defendible y no contradice la guía.'
