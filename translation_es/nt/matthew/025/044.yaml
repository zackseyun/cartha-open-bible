translation:
  language: es
  text: 'Entonces ellos también responderán, diciendo: «Señor, ¿cuándo te vimos hambriento o sediento o forastero[a] o desnudo o enfermo o en prisión, y no te atendimos[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extranjero» o «desconocido» para ξένος; aquí se adopta «forastero» por su matiz de alguien fuera del círculo habitual de acogida.
    reason: lexical_alternative
  - marker: b
    text: O «te servimos» o «te ministramos» para διακονέω; aquí «te atendimos» expresa de manera natural el sentido de prestar ayuda o cuidado.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Marca la secuencia temporal del diálogo judicial; «Entonces» es natural, claro y mantiene el avance narrativo sin añadir matices no presentes.
- source_word: ἀποκριθήσονται
  english_pob_choice: will answer
  chosen_spanish: responderán
  alternatives_spanish:
  - contestarán
  - darán respuesta
  lexicon: BDAG
  rationale: El futuro de ἀποκρίνομαι aquí pide un verbo natural de réplica. «Responderán» conserva la idea de contestar a una pregunta en estilo digno y directo.
- source_word: καὶ αὐτοὶ
  english_pob_choice: they too
  chosen_spanish: ellos también
  alternatives_spanish:
  - también ellos
  - incluso ellos
  lexicon: BDAG
  rationale: La combinación añade énfasis inclusivo; «ellos también» reproduce ese relieve idiomáticamente en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras dicen
  lexicon: BDAG
  rationale: Participio acompañante de habla directa; en español «diciendo» funciona de manera natural tras «responderán».
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Vocativo dirigido a Jesús. «Señor» es el equivalente establecido y digno, conservando el valor titular y la reverencia del original.
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: ¿cuándo?
  alternatives_spanish:
  - ¿en qué momento?
  - ¿a qué hora?
  lexicon: BDAG
  rationale: Interrogativo temporal directo; «cuándo» es la forma natural en español.
- source_word: εἴδομεν
  english_pob_choice: did we see
  chosen_spanish: te vimos
  alternatives_spanish:
  - te miramos
  - te observamos
  lexicon: BDAG
  rationale: Aoristo en pregunta de pasado. En español, la forma simple «vimos» es la más natural y fiel, sin necesidad de auxiliar.
- source_word: πεινῶντα
  english_pob_choice: hungry
  chosen_spanish: hambriento
  alternatives_spanish:
  - con hambre
  - hambriento de comida
  lexicon: BDAG
  rationale: Funciona predicativamente tras «ver». «Hambriento» preserva la fuerza adjetival y el paralelismo de la lista.
- source_word: διψῶντα
  english_pob_choice: thirsty
  chosen_spanish: sediento
  alternatives_spanish:
  - con sed
  - sediento de agua
  lexicon: BDAG
  rationale: Paralelo a «hambriento»; «sediento» mantiene simetría y tono formal.
- source_word: ξένον
  english_pob_choice: a stranger
  chosen_spanish: forastero
  alternatives_spanish:
  - extraño
  - desconocido
  lexicon: BDAG
  rationale: En este contexto de misericordia y acogida, ξένος puede referirse a alguien ajeno al hogar o comunidad. «Forastero» comunica bien esa condición sin restringirla a nacionalidad.
- source_word: γυμνὸν
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - sin ropa
  - mal vestido
  lexicon: BDAG
  rationale: Traducción directa y sobria que conserva la fuerza lexical. En el contexto puede implicar falta de ropa adecuada, pero «desnudo» preserva el término base.
- source_word: ἀσθενῆ
  english_pob_choice: sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - débil
  - mal de salud
  lexicon: BDAG
  rationale: Dentro de esta lista de necesidad corporal, «enfermo» es la opción más natural en español y mantiene la referencia a aflicción física.
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en prisión
  alternatives_spanish:
  - en la cárcel
  - encarcelado
  lexicon: BDAG
  rationale: La expresión denota encarcelamiento. «En prisión» es formal, claro y equivalente al griego.
- source_word: διηκονήσαμέν σοι
  english_pob_choice: minister to you
  chosen_spanish: te servimos
  alternatives_spanish:
  - te ministramos
  - te atendimos
  lexicon: BDAG
  rationale: διακονέω abarca servir, atender y ministrar. «Servimos» conserva la amplitud semántica del verbo en español; en una nota se preserva la alternativa de «ministrar/atender» por si el lector necesita ese matiz.
theological_decisions:
- issue: Título cristológico κύριος aplicado a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En Mateo, el vocativo a Jesús debe conservar la dignidad titulativa y la resonancia cristológica que la tradición POB ya documenta para κύριος. «Señor» es la forma más fiel y natural en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido de διακονέω en el acto final
  english_pob_reading: minister to you
  chosen_spanish_reading: te servimos
  alternative_spanish_readings:
  - te ministramos
  - te atendimos
  - te servimos en ministerio
  rationale: El texto contrasta la omisión de acciones concretas de misericordia. «Servimos» mantiene la amplitud de διακονέω sin restringirlo solo a la esfera eclesial; en español, «ministrar» puede sonar técnico o denominacional.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El audit trail inglés revisó la última formulación de διηκονήσαμέν σοι desde «serve you» a «minister to you». En español se optó por «te servimos», porque conserva el campo semántico amplio de διακονέω y suena más natural y sobrio en esta lista de misericordia; la alternativa «te ministramos» queda documentada en la decisión léxica y en la nota, sin borrar el matiz ministerial reconocido por el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος como título dirigido a Jesús, coherente con el criterio doctrinal del proyecto.
  - Se usa «forastero» para ξένος por ser más preciso en la escena de acogida y menos restringido que «extranjero».
  - 'Se conserva la forma adjetival de la lista: hambriento, sediento, forastero, desnudo, enfermo, en prisión.'
  - La negación final se expresa naturalmente con «y no te servimos», siguiendo la coordinación del griego sin añadir énfasis interpretativo excesivo.
