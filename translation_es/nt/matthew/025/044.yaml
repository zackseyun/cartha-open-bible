  text: τότε ἀποκριθήσονται καὶ αὐτοὶ λέγοντες· Κύριε, πότε σε εἴδομεν πεινῶντα ἢ διψῶντα ἢ ξένον ἢ γυμνὸν ἢ ἀσθενῆ ἢ ἐν φυλακῇ καὶ οὐ διηκονήσαμέν σοι;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/025/044.yaml
  text: Then they too will answer[a], saying, ‘Lord, when did we see you hungry or thirsty or a stranger or naked or sick or in prison, and not minister to you?’
