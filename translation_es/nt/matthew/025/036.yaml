translation:
  language: es
  text: Estaba desnudo y me vestisteis; estaba enfermo y me visitasteis[a]; estaba en la cárcel y vinisteis a mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me atendisteis»; el verbo griego puede incluir la idea de visitar con cuidado o interés.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vinisteis a mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: γυμνὸς
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - sin ropa
  - pobremente vestido
  lexicon: BDAG
  rationale: γυμνός denota literalmente estar desnudo o sin ropa. En español, «desnudo» es la correspondencia directa y mantiene el paralelismo con la acción de vestirlo. «Pobremente vestido» explicita una posible implicación contextual, pero atenúa la fuerza del término.
- source_word: περιεβάλετέ
  english_pob_choice: clothed
  chosen_spanish: me vestiste[n]
  alternatives_spanish:
  - me cubriste
  - me pusiste ropa
  lexicon: BDAG
  rationale: περιβάλλω aquí significa poner ropa sobre alguien. «Me vestiste[n]» es natural en español y conserva la relación directa con γυμνός. El corchete refleja la segunda persona plural del griego sin sobrecargar el estilo de lectura continua.
- source_word: ἠσθένησα
  english_pob_choice: I was sick
  chosen_spanish: estaba enfermo
  alternatives_spanish:
  - estaba débil
  - estaba enferma
  lexicon: BDAG
  rationale: Aunque el verbo puede abarcar debilidad, en este contexto de misericordia corporal el sentido más probable es enfermedad. «Estaba enfermo» transmite el valor idiomático y concreto que la POB inglesa también preserva.
- source_word: ἐπεσκέψασθέ
  english_pob_choice: visited
  chosen_spanish: me visitaste[o]
  alternatives_spanish:
  - me cuidaste
  - me atendiste
  lexicon: BDAG
  rationale: ἐπισκέπτομαι puede implicar visitar con interés o cuidado. «Me visitaste» es la traducción más transparente; el posible matiz de cuidado queda en el contexto, sin expandir el texto más allá de lo dicho. El marcador refleja la alternativa que el auditable inglés conservó para este verbo.
- source_word: φυλακῇ
  english_pob_choice: prison
  chosen_spanish: la cárcel
  alternatives_spanish:
  - la prisión
  - el encierro
  lexicon: BDAG
  rationale: φυλακή puede referirse a un lugar de detención. «La cárcel» es una forma natural y ampliamente entendible en español; «prisión» sería igualmente válida, pero «cárcel» suena un poco más directo y menos jurídico en este contexto narrativo.
- source_word: ἤλθατε πρός με
  english_pob_choice: you came to me
  chosen_spanish: viniste a mí
  alternatives_spanish:
  - viniste a verme
  - te acercaste a mí
  lexicon: BDAG
  rationale: La frase griega es simplemente «viniste(ron) a mí». En español, la forma plural «viniste[n]» armoniza con el sujeto implícito de la segunda persona plural, y conserva la sencillez del original. No se añade el matiz de «visitar» porque ya pertenece al verbo anterior.
theological_decisions:
- issue: Grado de expansión interpretativa en las obras de misericordia
  english_pob_reading: Retain the concrete actions 'clothed,' 'visited,' and 'came to me' without paraphrastic expansion.
  chosen_spanish_reading: 'Conservar acciones concretas: «me vestiste[n]», «me visitaste[o]», «viniste a mí».'
  alternative_spanish_readings:
  - «me cuidaste» para ἐπεσκέψασθέ με
  - «viniste a visitarme» para ἤλθατε πρός με
  rationale: El versículo enfatiza gestos concretos de misericordia. Mantener la formulación directa evita introducir inferencias pastorales no explícitas. La lectura conserva la tensión semántica del verbo de visita, sin resolverla con una paráfrasis más interpretativa.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego de SBLGNT y el audit trail inglés: conserva el paralelismo verbal y las opciones léxicas principales sin ampliar el sentido. No se requieren cambios respecto del último pase revisado, solo una explicitación en español de las alternativas ya reconocidas por la POB inglesa.'
  spanish_consistency_notes:
  - Se mantiene el tuteo plural implícito del griego con formas en segunda persona plural.
  - «Desnudo» y «vestiste» preservan el contraste directo entre falta de ropa y acción de vestir.
  - «En la cárcel» se traduce con un sustantivo corriente y no con una perífrasis interpretativa.
  - No se usa «Cristo» ni terminología eclesiástica ajena al contenido de la frase.
