translation:
  language: es
  text: Pero cuando venga el Hijo del Hombre en su gloria, y todos los ángeles con él, entonces se sentará en su trono glorioso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el trono de su gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - cuando llegue el momento en que
  lexicon: BDAG
  rationale: La cláusula temporal expresa un hecho futuro e indefinido; en español, «cuando» comunica de forma natural ese valor sin añadir matices iterativos que no encajan con el contexto escatológico singular.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición discursiva. «Pero» conserva el giro suave y es idiomático al inicio de la frase en español.
- source_word: ἔλθῃ
  english_pob_choice: comes
  chosen_spanish: venga
  alternatives_spanish:
  - llegue
  - haya venido
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras ὅταν se refiere a un evento futuro; en español, el subjuntivo presente «venga» expresa bien esa expectativa futura de manera natural.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título establecido y su resonancia daniélica y cristológica. «Hijo del Hombre» es la forma española tradicional y transparente para este título.
- source_word: ἐν τῇ δόξῃ αὐτοῦ
  english_pob_choice: in his glory
  chosen_spanish: en su gloria
  alternatives_spanish:
  - en su esplendor
  - en la gloria de él
  lexicon: BDAG
  rationale: «Gloria» mantiene el peso teológico usual de δόξα y su resonancia bíblica. La construcción posesiva simple es natural en español.
- source_word: πάντες ⸀οἱ ἄγγελοι
  english_pob_choice: all the angels
  chosen_spanish: todos los ángeles
  alternatives_spanish:
  - todos sus ángeles
  lexicon: BDAG
  rationale: El griego no explicita un posesivo; «todos los ángeles» sigue de cerca la fuente y evita importar «sus» desde paralelos o inferencias contextuales.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - acompañándolo
  - junto con él
  lexicon: BDAG
  rationale: La idea es simple compañía; «con él» es la forma más directa y natural en español.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - después
  - en ese momento
  lexicon: BDAG
  rationale: Indica la acción consecuente. «Entonces» preserva la secuencia con claridad y concisión.
- source_word: καθίσει
  english_pob_choice: he will sit
  chosen_spanish: se sentará
  alternatives_spanish:
  - tomará asiento
  - se pondrá a sentar
  lexicon: BDAG
  rationale: El futuro de καθίζω se expresa con naturalidad como «se sentará». Conserva la acción directa de sentarse sin sobreinterpretar.
- source_word: ἐπὶ θρόνου
  english_pob_choice: on ... throne
  chosen_spanish: en un trono
  alternatives_spanish:
  - sobre un trono
  - en el trono
  lexicon: BDAG
  rationale: La preposición con genitivo permite idea de posición sobre/en. En español, «en un trono» es idiomático y evita forzar una estructura más pesada.
- source_word: θρόνου δόξης αὐτοῦ
  english_pob_choice: his glorious throne
  chosen_spanish: un trono de gloria
  alternatives_spanish:
  - el trono de su gloria
  - su trono glorioso
  lexicon: BDAG
  rationale: 'Se preserva la construcción más literal y la tensión de la genitiva: el trono caracterizado por gloria. «Un trono de gloria» suena natural y mantiene la posibilidad de la alternativa más literal en nota.'
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser humano
  - el Hombre
  rationale: Se retiene el título tradicional para no diluir la referencia daniélica ni la autoidentificación judicial de Jesús. La traducción mantiene la tensión teológica del texto en lugar de interpretarlo de manera explicativa.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Construcción θρόνου δόξης αὐτοῦ
  english_pob_reading: his glorious throne / the throne of his glory
  chosen_spanish_reading: un trono de gloria
  alternative_spanish_readings:
  - el trono de su gloria
  - su trono glorioso
  rationale: La frase presenta entronización y autoridad judicial. Se eligió una forma idiomática en español que no borra el trasfondo más literal, que queda preservado mediante la nota textual.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés; no hubo revisiones aplicadas en el registro inglés reciente, y la versión española mantiene esa solución con equivalencia óptima y una nota para la alternativa más literal del sintagma final.
  spanish_consistency_notes:
  - Se conserva «Hijo del Hombre» como título cristológico fijo.
  - Se traduce δόξα como «gloria» en ambos casos, manteniendo coherencia terminológica.
  - Se evita añadir posesivo en «todos los ángeles», siguiendo la economía del griego.
  - La nota de «un trono de gloria» preserva la alternativa literal sin romper la fluidez del texto principal.
