revisions:
- from: Pero cuando venga el Hijo del Hombre en su gloria[a], y todos los ángeles con él, entonces se sentará en un trono de gloria[b].
  to: Pero cuando venga el Hijo del Hombre en su gloria, y todos los ángeles con él, entonces se sentará en su trono glorioso[a].
  rationale: 'Se elimina la nota innecesaria sobre «en su gloria» y se corrige la frase final para incluir el posesivo αὐτοῦ de manera natural en español, alineándose con la decisión auditada del POB: texto principal idiomático («su trono glorioso») y alternativa más literal en nota («el trono de su gloria»).'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:21:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: cláusula temporal futura, título «el Hijo del Hombre», «todos los ángeles con él», y la secuencia «entonces…». Sin embargo, dos decisiones no reflejan fielmente el expediente inglés ni la mejor equivalencia del griego: (1) la nota [a] introduce una alternativa incorrecta, porque ἐν τῇ δόξῃ αὐτοῦ significa «en su gloria», no más literalmente «en la gloria de él» como si el posesivo simple fuera menos literal; (2) «en un trono de gloria» omite el posesivo αὐτοῦ y debilita la decisión auditada, que en inglés preserva «his glorious throne» con nota para «the throne of his glory».'
  spanish_quality_summary: El español es claro y legible, pero «en un trono de gloria» suena algo indefinido y menos natural que «en su trono glorioso». La nota [a] también resulta poco útil y algo artificiosa. Una revisión pequeña mejora fidelidad, naturalidad y alineación con el proyecto.
  glossary_alignment: 'Se mantienen bien los términos clave: «el Hijo del Hombre» para ὁ υἱὸς τοῦ ἀνθρώπου y «gloria» para δόξα. No hay conflictos con la terminología base del proyecto. La principal desalineación es no reflejar αὐτοῦ en θρόνου δόξης αὐτοῦ dentro del texto principal.'
  issues:
  - severity: high
    issue: El texto principal omite el posesivo αὐτοῦ en θρόνου δόξης αὐτοῦ al traducir «en un trono de gloria».
    rationale: El griego incluye explícitamente «de él / suyo». El expediente inglés decidió «his glorious throne» como equivalente principal y reservó «the throne of his glory» para nota. El español debe conservar ese posesivo en el texto principal, idealmente como «su trono glorioso».
  - severity: medium
    issue: 'La nota [a] ofrece una alternativa inadecuada: «en la gloria de él».'
    rationale: No corresponde a una alternativa significativa preservada por el expediente inglés y produce un español forzado sin valor exegético real. «En su gloria» ya representa correctamente el griego.
  - severity: low
    issue: La preposición «en» con «trono» es aceptable, pero la combinación «en un trono de gloria» suena menos idiomática que la solución posesiva auditada.
    rationale: Con «su trono glorioso», la frase fluye mejor en español y preserva tanto el sentido como la decisión lexical documentada.
  revised_spanish_text: Pero cuando venga el Hijo del Hombre en su gloria, y todos los ángeles con él, entonces se sentará en su trono glorioso[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «el trono de su gloria».
    reason: lexical_alternative
  revision_rationale: 'Se elimina la nota innecesaria sobre «en su gloria» y se corrige la frase final para incluir el posesivo αὐτοῦ de manera natural en español, alineándose con la decisión auditada del POB: texto principal idiomático («su trono glorioso») y alternativa más literal en nota («el trono de su gloria»).'
