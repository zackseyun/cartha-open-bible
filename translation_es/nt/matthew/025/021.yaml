revisions:
- from: 'Su amo le dijo[a]: «Bien hecho, buen y fiel esclavo. Fuiste fiel en lo poco; te pondré sobre lo mucho[b]. Entra en el gozo de tu amo».'
  to: 'Su amo le dijo[a]: «Bien hecho, siervo bueno y fiel. Fuiste fiel en lo poco; te pondré sobre muchas cosas. Entra en el gozo de tu amo[b]».'
  rationale: 'Se revisa para alinear el español con la decisión auditada del inglés: δοῦλος queda como «siervo» en el texto principal con «esclavo» en nota, y se restaura la nota léxica sobre κύριος → «amo / señor». También se mejora la naturalidad con «sobre muchas cosas» y se corrige la inconsistencia editorial de la nota [a].'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:26:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: elogio, fidelidad en lo poco, promoción a mayor responsabilidad, y entrada en el gozo del amo. Sin embargo, se aparta innecesariamente de la auditoría inglesa y de la política léxica al convertir δοῦλος en «esclavo» en el texto principal cuando el inglés escogió «servant» con alternativa en nota. También la nota [a] es incorrecta, porque ofrece como alternativa exactamente la misma palabra usada en el texto. La nota [b] omite la alternativa auditada sobre κύριος = «señor / amo» y la reemplaza por una observación distinta sobre «muchas cosas».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos problemas de calidad editorial: «buen y fiel esclavo» suena menos natural que «siervo bueno y fiel» o «buen siervo y fiel», y la nota [a] no funciona porque contradice el texto anclado. Además, «sobre lo mucho» es comprensible, pero «sobre muchas cosas» suena más natural y se alinea mejor con la explicitación ya presente en la traducción inglesa.'
  glossary_alignment: κύριος como «amo» está bien justificado en esta parábola. δοῦλος, según las pautas del proyecto, normalmente tiende a «esclavo» cuando el inglés eligió «slave», pero aquí la auditoría inglesa documentó una excepción contextual y mantuvo «servant» en el texto principal con nota alternativa. Por fidelidad al rastro auditado, en español conviene usar «siervo» en el texto principal y conservar «esclavo» en nota. «Gozo» para χαρά es apropiado.
  issues:
  - severity: high
    issue: El texto principal usa «esclavo» para δοῦλος cuando la auditoría inglesa eligió «servant» con nota alternativa «slave».
    rationale: La revisión debe seguir primero la evidencia fuente, pero también preservar la decisión lexical y teológica documentada. Aquí no hay nueva razón fuente suficientemente fuerte para invertir la decisión principal del inglés.
  - severity: high
    issue: La nota [a] es inválida porque presenta «esclavo» como alternativa cuando «esclavo» ya aparece en el texto principal.
    rationale: Esto rompe la trazabilidad de la nota y confunde al lector sobre cuál es la lectura alternativa real.
  - severity: medium
    issue: La nota [b] no preserva la alternativa auditada sobre κύριος.
    rationale: La POB inglesa documenta que κύριος también podría traducirse «lord». En español, la alternativa relevante es «señor», no una nota sobre «muchas cosas».
  - severity: low
    issue: «Sobre lo mucho» es menos natural que «sobre muchas cosas» en español contemporáneo eclesial.
    rationale: Aunque «lo mucho» puede defenderse, la explicitación mejora la fluidez y sigue de cerca la solución inglesa «many things».
  revised_spanish_text: 'Su amo le dijo[a]: «Bien hecho, siervo bueno y fiel. Fuiste fiel en lo poco; te pondré sobre muchas cosas. Entra en el gozo de tu amo[b]».'
  revised_footnotes:
