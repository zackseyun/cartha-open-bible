translation:
  language: es
  text: 'Su amo le dijo[a]: «Bien hecho, siervo bueno y fiel. Fuiste fiel en lo poco; te pondré sobre muchas cosas. Entra en el gozo de tu amo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «esclavo»: «Bien hecho, esclavo bueno y fiel». El griego δοῦλος puede significar «siervo» o «esclavo» según el contexto.'
    reason: alternative_reading
  - marker: b
    text: El griego κύριος aquí también podría traducirse «señor», pero «amo» encaja mejor en la relación entre amo y siervo dentro de la parábola.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le habló
  - le declaró
  lexicon: BDAG
  rationale: En español, «dijo» es la fórmula narrativa natural para introducir discurso directo y corresponde bien al valor de φημί en este contexto.
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: amo
  alternatives_spanish:
  - señor
  - maestro
  lexicon: BDAG
  rationale: En la escena parabólica se trata de la relación dueño-siervo/esclavo. «Amo» comunica con claridad esa relación de autoridad y evita introducir un título cristológico o eclesiástico que el contexto inmediato no exige.
- source_word: δοῦλε
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: El griego δοῦλος tiene fuerza de esclavitud/bondad servil. Dado el valor contextual y la decisión auditada del inglés de preservar la tensión entre «servant» y «slave», «esclavo» conserva mejor el peso lexical que «siervo».
- source_word: Εὖ
  english_pob_choice: Well done
  chosen_spanish: Bien hecho
  alternatives_spanish:
  - Muy bien
  - Excelente
  lexicon: BDAG
  rationale: «Bien hecho» expresa en español la aprobación formulada de manera idiomática, equivalente a la función encomiástica de εὖ en esta frase fija.
- source_word: ἀγαθὲ
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - excelente
  lexicon: BDAG
  rationale: «Bueno» es la traducción directa y sobria del vocativo ἀγαθέ, manteniendo el paralelismo con πιστέ.
- source_word: πιστέ / πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - confiable
  lexicon: BDAG
  rationale: «Fiel» es la equivalencia natural para πιστός en vocativo y predicativo; preserva la repetición y la idea de lealtad confiable.
- source_word: ἐπὶ ὀλίγα
  english_pob_choice: over a few things
  chosen_spanish: en lo poco
  alternatives_spanish:
  - sobre pocas cosas
  - con pocas cosas
  lexicon: BDAG
  rationale: El complemento preposicional en este contexto expresa esfera de responsabilidad. En español, «en lo poco» reproduce de forma natural la idea de administración limitada sin forzar un giro más pesado.
- source_word: καταστήσω
  english_pob_choice: I will appoint
  chosen_spanish: te pondré
  alternatives_spanish:
  - te nombraré
  - te asignaré
  lexicon: BDAG
  rationale: «Pondré» en español bíblico/común puede expresar colocación en una responsabilidad o cargo. Con el objeto indirecto explícito, comunica la futura asignación de autoridad de manera fluida.
- source_word: ἐπὶ πολλῶν
  english_pob_choice: over many things
  chosen_spanish: sobre lo mucho
  alternatives_spanish:
  - sobre muchas cosas
  - en mucho
  lexicon: BDAG
  rationale: Se conserva el contraste con ἐπὶ ὀλίγα. «Lo mucho» refleja el aumento de la esfera encomendada sin obligar a añadir «cosas» donde el griego no lo explicita.
- source_word: εἴσελθε εἰς τὴν χαρὰν
  english_pob_choice: Enter into the joy
  chosen_spanish: Entra en el gozo
  alternatives_spanish:
  - Ven al gozo
  - Participa del gozo
  lexicon: BDAG
  rationale: «Entra en» sigue el valor de εἰσέρχομαι + εἰς y mantiene la imagen de ingreso en una realidad de alegría.
- source_word: χαρὰν
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: BDAG
  rationale: «Gozo» suena natural en registro bíblico y conserva la intensidad positiva de χαρά sin perder dignidad literaria.
- source_word: τοῦ κυρίου σου
  english_pob_choice: of your master
  chosen_spanish: de tu amo
  alternatives_spanish:
  - de tu señor
  - de tu maestro
  lexicon: BDAG
  rationale: Se mantiene la coherencia con la decisión de κύριος como «amo». En español, la repetición refuerza el vínculo narrativo entre el dueño y el siervo/esclavo.
theological_decisions:
- issue: Cómo reflejar δοῦλος sin suavizar la relación de dominio del relato
  english_pob_reading: servant, with a footnoted alternative 'slave'
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La POB inglesa preserva la alternativa «slave» porque la relación de dependencia es real. En español, «esclavo» transmite esa fuerza lexical con mayor precisión que «siervo», evitando domesticar el término.
  doctrine_reference: 'Contested terms: δοῦλος → servant / slave (context-dependent)'
- issue: Cómo traducir κύριος en la parábola sin importar un título doctrinal ajeno al nivel narrativo
  english_pob_reading: master
  chosen_spanish_reading: amo
  alternative_spanish_readings:
  - señor
  - dueño
  rationale: En el marco parabólico, la relación es la de un amo con su esclavo. «Amo» preserva el nivel de la escena y no enmascara el término con una fórmula más religiosa.
  doctrine_reference: 'Translation philosophy §§1, 3; Contested terms: κύριος → Lord, Master'
- issue: Si «gozo» debe verse como solo emoción o como una realidad a la que se ingresa
  english_pob_reading: Enter into the joy
  chosen_spanish_reading: Entra en el gozo
  alternative_spanish_readings:
  - Participa del gozo
  - Entra en la alegría
  rationale: «Entra en» conserva la imagen espacial del mandato y no reduce χαρά a mera emoción interior; la expresión admite una dimensión participativa sin añadirla explícitamente.
  doctrine_reference: Translation philosophy §1; lexical decision for εἴσελθε εἰς τὴν χαρὰν
translation_notes:
  revision_awareness: El texto español sigue la lectura final del expediente inglés, que se mantuvo sin cambios en la última revisión (high agreement, verdict agree). No hay revisiones aplicadas que afecten el sentido; se conserva la tensión léxica de δοῦλος y κύριος en forma auditable.
  spanish_consistency_notes:
  - Se mantiene una coherencia terminológica interna entre «amo» y «esclavo», con el posesivo correspondiente («tu amo»).
  - «Gozo» se usa de manera consistente con registro bíblico y no se reemplaza por «alegría» para evitar aplanar el tono.
  - La segunda mitad conserva el paralelismo de «en lo poco / sobre lo mucho» para reflejar el contraste del griego.
  - Los marcadores de nota a y b aparecen exactamente en el texto donde corresponden.
