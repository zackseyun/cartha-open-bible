    text: 'O «esclavo»: «Bien hecho, esclavo bueno y fiel». El griego δοῦλος puede significar «siervo» o «esclavo» según el contexto.'
    reason: alternative_reading
  - marker: b
    text: El griego κύριος aquí también podría traducirse «señor», pero «amo» encaja mejor en la relación entre amo y siervo dentro de la parábola.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear el español con la decisión auditada del inglés: δοῦλος queda como «siervo» en el texto principal con «esclavo» en nota, y se restaura la nota léxica sobre κύριος → «amo / señor». También se mejora la naturalidad con «sobre muchas cosas» y se corrige la inconsistencia editorial de la nota [a].'
