review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: secuencia temporal, destinatarios a la izquierda, mandato de separación, apelativo de maldición, fuego eterno y destino preparado para el diablo y sus ángeles. Sin embargo, «al fuego eterno» atenúa ligeramente el valor direccional de εἰς; «vayan... al fuego» o «entren en el fuego» serían más marcados, pero con «Apártense de mí» la combinación actual es aceptable en español. El ajuste principal necesario no es de sentido básico sino de fidelidad al rastro auditado: la nota inglesa preserva la alternativa sobre οἱ κατηραμένοι («you who are cursed»), mientras que la nota española actual preserva una alternativa distinta sobre «a la izquierda», menos necesaria dado el contexto.'
  spanish_quality_summary: El español es natural, claro y digno. «Apártense de mí» suena solemne y legible. «Los que están a la izquierda» funciona, aunque «los de la izquierda» sería algo más conciso. La principal mejora de calidad editorial es alinear la única nota con la alternativa léxica realmente significativa del original y del POB inglés.
  glossary_alignment: 'No hay conflicto con la glosa del proyecto: no aparecen Yahvé, Mesías, δοῦλος, etc. «Diablo», «ángeles», «eterno» y «malditos» están bien alineados con las decisiones léxicas y teológicas auditadas. La excepción a corregir es la gestión de la nota: debe conservar la alternativa de οἱ κατηραμένοι, no desplazarla a εὐωνύμων.'
  issues:
  - severity: medium
    issue: La nota al pie no sigue la alternativa léxica preservada por el POB inglés.
    rationale: La nota inglesa documenta una alternativa para οἱ κατηραμένοι («you who are cursed»). La nota española actual se mueve a «a su izquierda», que no es la alternativa principal auditada y aporta menos valor textual.
  - severity: low
    issue: La formulación «a los que están a la izquierda» es algo más larga de lo necesario.
    rationale: No es incorrecta, pero «a los de la izquierda» suena más idiomática y mantiene el mismo sentido. Aun así, esto es estilístico, no un error de fidelidad.
  revised_spanish_text: 'Entonces dirá también a los que están a la izquierda: “Apártense de mí, ustedes malditos[a], al fuego eterno preparado para el diablo y sus ángeles.”'
  revised_footnotes:
  - marker: a
    text: 'O: «ustedes que están malditos».'
    reason: lexical_alternative
  revision_rationale: 'Se traslada la nota al pie al lugar donde el rastro auditado conserva una alternativa léxica significativa: οἱ κατηραμένοι. El texto principal puede mantenerse, porque es fiel, natural y teológicamente adecuado; la corrección necesaria es editorial y de alineación con la documentación del POB inglés.'
