translation:
  language: es
  text: 'Entonces dirá también a los que están a la izquierda: “Apártense de mí, ustedes malditos[a], al fuego eterno preparado para el diablo y sus ángeles.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes que están malditos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca secuencia en la escena de juicio; «Entonces» es natural, claro y mantiene el orden narrativo sin añadir contenido.
- source_word: ἐρεῖ
  english_pob_choice: he will ... say
  chosen_spanish: dirá
  alternatives_spanish:
  - dirá también
  - dirá
  lexicon: BDAG
  rationale: El futuro de λέγω se rinde con el futuro simple «dirá»; en español no hace falta repetir «decir» con auxiliar, y el contexto ya incluye la continuación del discurso.
- source_word: τοῖς ἐξ εὐωνύμων
  english_pob_choice: to those on the left
  chosen_spanish: a los que están a la izquierda
  alternatives_spanish:
  - a los de la izquierda
  - a los que están a su izquierda
  lexicon: BDAG
  rationale: La expresión idiomática del grupo colocado a la izquierda del rey/juez se traduce de forma clara y natural en español. «A la izquierda» conserva la escena sin forzar un calco.
- source_word: Πορεύεσθε ἀπ’ ἐμοῦ
  english_pob_choice: Go away from me
  chosen_spanish: Apártense de mí
  alternatives_spanish:
  - Váyanse de mí
  - Aléjense de mí
  lexicon: BDAG
  rationale: El imperativo plural medio de πορεύομαι expresa salida/separación de la presencia del hablante; «Apártense de mí» comunica esa distancia con dignidad y naturalidad, mejor que un calco mecánico.
- source_word: οἱ κατηραμένοι
  english_pob_choice: you cursed
  chosen_spanish: ustedes malditos
  alternatives_spanish:
  - ustedes malditos
  - los malditos
  - ustedes, los malditos
  lexicon: BDAG
  rationale: El participio pasivo perfecto funciona como vocativo. «Malditos» mantiene la fuerza judicial del pasaje; se evita suavizarlo a «condenados» porque el texto habla de maldición/juicio, no solo de sentencia.
- source_word: εἰς τὸ πῦρ τὸ αἰώνιον
  english_pob_choice: into the eternal fire
  chosen_spanish: al fuego eterno
  alternatives_spanish:
  - al fuego eterno
  - hacia el fuego eterno
  lexicon: BDAG
  rationale: En español, la combinación de imperativo de separación con destino se expresa de modo natural con «al». Se conserva el valor direccional de εἰς sin sobrerrepresentar el movimiento con una fórmula rígida.
- source_word: τὸ ἡτοιμασμένον
  english_pob_choice: prepared
  chosen_spanish: preparado
  alternatives_spanish:
  - preparado
  - dispuesto
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica un estado resultante de una preparación previa; «preparado» es la opción directa y fiel en español.
- source_word: τῷ διαβόλῳ
  english_pob_choice: for the devil
  chosen_spanish: para el diablo
  alternatives_spanish:
  - para el diablo
  - para Satanás
  lexicon: BDAG
  rationale: διάβολος es el designador personal establecido; «diablo» es el equivalente idiomático y teológicamente transparente en español.
- source_word: τοῖς ἀγγέλοις αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus ángeles
  - sus mensajeros
  lexicon: BDAG
  rationale: En este contexto escatológico, ἄγγελοι designa seres sobrenaturales asociados con el diablo, no mensajeros humanos. «Ángeles» preserva ese referente.
theological_decisions:
- issue: Valor de αἰώνιον en el juicio final
  english_pob_reading: eternal
  chosen_spanish_reading: eterno
  alternative_spanish_readings:
  - eterno
  - sempiterno
  - de larga duración
  rationale: En este contexto de juicio, «eterno» transmite la gravedad y permanencia del destino sin imponer un sistema doctrinal más estrecho que el del texto. Se evita «de larga duración» por debilitar indebidamente el sentido.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: Naturaleza de διάβολος y ἄγγελοι
  english_pob_reading: the devil and his angels
  chosen_spanish_reading: el diablo y sus ángeles
  alternative_spanish_readings:
  - el diablo y sus ángeles
  - el calumniador y sus mensajeros
  rationale: El contexto es escatológico y apocalíptico; la referencia personal a Satanás y a sus seguidores angelicales está firmemente establecida. Traducir literalmente como categorías genéricas debilitaría el pasaje.
  doctrine_reference: 'DOCTRINE.md: readable modern language, not archaic or academic'
- issue: Tono del imperativo en 2.ª persona plural
  english_pob_reading: Go away from me
  chosen_spanish_reading: Apártense de mí
  alternative_spanish_readings:
  - Apártense de mí
  - Aléjense de mí
  - Váyanse de mí
  rationale: En español, un imperativo plural formal o de juicio debe sonar natural y solemne. «Apártense de mí» preserva la separación y el rechazo sin cargar el texto con un registro demasiado coloquial.
  doctrine_reference: 'DOCTRINE.md: readable modern language, not archaic or academic'
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios; el texto español sigue de cerca el griego y el audit trail inglés, manteniendo el orden temporal, el imperativo de separación, la maldición vocativa y el destino final preparado para el diablo y sus ángeles.
  spanish_consistency_notes:
  - Se mantiene «diablo» para διάβολος, en línea con la decisión inglesa y la terminología POB.
  - Se usa «ángeles» para ἄγγελοι en sentido sobrenatural, no «mensajeros».
  - Se conserva «eterno» para αἰώνιον, evitando atenuar el alcance escatológico.
  - Se evita «SEÑOR» o máscaras equivalentes porque aquí no aparece κύριος como sustituto del nombre divino.
