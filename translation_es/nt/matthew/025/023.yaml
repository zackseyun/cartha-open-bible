    text: O «siervo». El griego δοῦλος puede designar a un siervo o a un esclavo según el contexto.
    reason: alternative_reading
  revision_rationale: Se revisa κύριος a «amo» en ambos lugares para ajustarse al sentido contextual de superior humano y a la decisión documentada en inglés («master»), evitando la ambigüedad de «señor». Se conserva «esclavo» para δοῦλος porque el borrador lo defendió con base léxica y es compatible con la política del proyecto, pero se corrige la nota para que la alternativa sea «siervo». También se mejora «sobre mucho» a «sobre muchas cosas» para mayor naturalidad y mejor correspondencia con el plural griego.
