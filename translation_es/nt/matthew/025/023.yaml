translation:
  language: es
  text: 'Su amo le dijo[a]: «Bien hecho, buen y fiel esclavo. Has sido fiel en lo poco; te pondré sobre muchas cosas. Entra en el gozo de tu amo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El griego δοῦλος puede designar a un siervo o a un esclavo según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: BDAG
  rationale: En español, la fórmula directa y natural en discurso introducido es «le dijo»; conserva el valor narrativo de ἔφη sin añadir matiz innecesario.
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  lexicon: BDAG
  rationale: En esta parábola, κύριος designa al superior humano del siervo/esclavo. «Señor» mantiene la relación de autoridad sin forzar el título divino; «su señor» también permite la correspondencia del posesivo final del versículo.
- source_word: δοῦλε
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: El griego δοῦλος puede abarcar «siervo» o «esclavo», pero el audit trail inglés preservó en nota la fuerza de «slave». En español, «esclavo» conserva mejor esa carga léxica y la relación de subordinación marcada por el contexto.
- source_word: Εὖ
  english_pob_choice: Well done
  chosen_spanish: Bien hecho
  alternatives_spanish:
  - Bien
  - Excelente
  lexicon: BDAG
  rationale: La expresión es una aprobación idiomática; «Bien hecho» transmite el elogio de forma natural y digna en español.
- source_word: ἀγαθὲ καὶ πιστέ
  english_pob_choice: good and faithful
  chosen_spanish: buen y fiel
  alternatives_spanish:
  - bueno y fiel
  - bondadoso y fiel
  lexicon: BDAG
  rationale: «Buen» es la forma natural ante sustantivo masculino singular y conserva ἀγαθός; «fiel» mantiene la relación léxica con πιστός en la línea siguiente.
- source_word: ἐπὶ ὀλίγα
  english_pob_choice: over a few things
  chosen_spanish: en lo poco
  alternatives_spanish:
  - sobre pocas cosas
  - con pocas responsabilidades
  lexicon: BDAG
  rationale: La construcción con ἐπί expresa esfera o encargo. «En lo poco» comunica con claridad la idea de responsabilidad limitada sin sonar forzado en español.
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: «Fiel» reproduce el valor central de πιστός y mantiene la repetición intencional entre el vocativo y la evaluación del desempeño.
- source_word: ἐπὶ πολλῶν
  english_pob_choice: over many things
  chosen_spanish: sobre mucho
  alternatives_spanish:
  - sobre muchas cosas
  - en muchas responsabilidades
  lexicon: BDAG
  rationale: Se conserva el paralelismo con «en lo poco» y el contraste semántico de expansión de encargo. «Mucho» funciona de modo natural en español para un ámbito más amplio de responsabilidad.
- source_word: καταστήσω
  english_pob_choice: I will put you
  chosen_spanish: te pondré
  alternatives_spanish:
  - te estableceré
  - te nombraré
  lexicon: BDAG
  rationale: El futuro de καθίστημι aquí comunica poner o establecer en una posición. «Te pondré» es la opción más idiomática y clara en español, y deja implícita la investidura en autoridad.
- source_word: εἴσελθε εἰς τὴν χαρὰν
  english_pob_choice: Enter into the joy
  chosen_spanish: Entra en el gozo
  alternatives_spanish:
  - Entra en la alegría
  - Participa del gozo
  lexicon: BDAG
  rationale: El imperativo aoristo con εἰς conserva una imagen de entrada. «Gozo» es el término más natural y reverente en este registro, y evita reducir la frase a mera emoción.
- source_word: τοῦ κυρίου σου
  english_pob_choice: of your master
  chosen_spanish: de tu señor
  alternatives_spanish:
  - de tu amo
  - de tu dueño
  lexicon: BDAG
  rationale: Se mantiene la misma decisión contextual tomada para κύριος al inicio del versículo, evitando cambiar de registro dentro de la misma escena.
theological_decisions:
- issue: κύριος en una parábola con superior humano
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  rationale: El referente narrativo es humano, no una designación directa de Dios o del Mesías. «Señor» funciona en español como título de autoridad sin importar una lectura teológica ajena al contexto; el posesivo «tu» en el cierre refuerza la relación personal del amo con el esclavo.
  doctrine_reference: 'DOCTRINE.md: contested terms table for κύριος; translation philosophy on context-sensitive rendering'
- issue: δοῦλος y la fuerza social de la relación de dependencia
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: La escena presupone una relación de propiedad y rendición de cuentas, no solo de servicio voluntario. Traducir δοῦλος como «esclavo» conserva esa tensión social y evita suavizarla; el elogio del amo queda así anclado en el marco de la parábola.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δοῦλος; lexical audit on slave/servant rendering'
translation_notes:
  revision_awareness: 'La revisión más reciente quedó sin cambios: el texto fuente, el audit trail inglés y el cotejo externo coinciden plenamente. Esta versión española sigue esa línea estable, manteniendo la tensión léxica de δοῦλος y el valor contextual de κύριος sin introducir armonizaciones no justificadas.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo «en lo poco / sobre mucho» para reflejar la estructura del griego ἐπὶ ὀλίγα / ἐπὶ πολλῶν.
  - Se evitó «Cristo» o «Señor» con valor divino; aquí κύριος es el superior humano dentro de la parábola.
  - El registro es formal y publicable, pero no arcaizante.
  - La nota al pie conserva la alternativa léxica documentada para δοῦλος y queda anclada en el texto en el primer «esclavo».
