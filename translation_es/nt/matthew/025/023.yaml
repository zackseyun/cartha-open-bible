- from: 'Su señor le dijo[a]: «Bien hecho, buen y fiel esclavo. Has sido fiel en lo poco; te pondré sobre mucho. Entra en el gozo de tu señor».'
  to: 'Su amo le dijo[a]: «Bien hecho, buen y fiel esclavo. Has sido fiel en lo poco; te pondré sobre muchas cosas. Entra en el gozo de tu amo».'
  rationale: Se revisa κύριος a «amo» en ambos lugares para ajustarse al sentido contextual de superior humano y a la decisión documentada en inglés («master»), evitando la ambigüedad de «señor». Se conserva «esclavo» para δοῦλος porque el borrador lo defendió con base léxica y es compatible con la política del proyecto, pero se corrige la nota para que la alternativa sea «siervo». También se mejora «sobre mucho» a «sobre muchas cosas» para mayor naturalidad y mejor correspondencia con el plural griego.
