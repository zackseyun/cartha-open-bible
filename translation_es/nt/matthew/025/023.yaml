review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: elogio, fidelidad en lo poco, promoción a más responsabilidad y entrada al gozo del superior. Sin embargo, hay dos desalineaciones importantes con el audit trail y con el contexto: κύριος en esta parábola debe rendirse como «amo» o «maestro», no «señor», para evitar resonancia titulativa impropia; y la nota al pie contradice el texto principal, porque el texto usa «esclavo» mientras la nota ofrece «O «esclavo»».'
  spanish_quality_summary: El español es legible y digno, pero «su señor / tu señor» suena ambiguo y menos natural en contexto parabólico de relación doméstica. «Bien hecho» funciona, aunque «¡Bien hecho!» o «Muy bien» serían más idiomáticos; no obstante, puede mantenerse. «Sobre mucho» es aceptable, pero «sobre muchas cosas» expresa mejor el paralelismo con ἐπὶ ὀλίγα y suena más natural en español. La nota necesita corregirse para reflejar la alternativa real.
  glossary_alignment: No hay términos del glosario doctrinal principal en conflicto excepto el manejo contextual de κύριος y δοῦλος. Según la documentación inglesa, κύριος aquí no debe leerse como título divino sino como superior humano; en español «amo» comunica eso mejor que «señor». El proyecto permite «esclavo» para δοῦλος cuando se quiere conservar la fuerza léxica; eso es defendible aquí, pero entonces la nota debe ofrecer «siervo» como alternativa, no repetir «esclavo».
  issues:
  - severity: high
    issue: «su señor / tu señor» para κύριος en contexto parabólico humano
    rationale: El audit trail inglés decidió explícitamente «master» para evitar implicación titulativa. En español, «señor» aquí puede sonar como título honorífico o incluso activar lectura religiosa. «Amo» expresa mejor la relación de autoridad doméstica del relato.
  - severity: high
    issue: La nota al pie contradice el texto principal
    rationale: Si el texto principal dice «esclavo», la nota no puede decir «O «esclavo»». Debe ofrecer la alternativa contextual real, p. ej. «siervo».
  - severity: medium
    issue: «sobre mucho» es menos natural que «sobre muchas cosas»
    rationale: Aunque comprensible, «sobre muchas cosas» refleja mejor el plural griego πολλῶν y mantiene el paralelismo con «lo poco» o «pocas cosas» de forma más idiomática en español.
  revised_spanish_text: 'Su amo le dijo[a]: «Bien hecho, buen y fiel esclavo. Has sido fiel en lo poco; te pondré sobre muchas cosas. Entra en el gozo de tu amo».'
  revised_footnotes:
