revisions:
- from: Porque tuve hambre, y me diste de comer; tuve sed, y me diste de beber; fui forastero, y me recibiste.
  to: Porque tuve hambre y me diste de comer; tuve sed y me diste de beber; era forastero y me acogiste[a],
  rationale: Se ajusta «fui» a «era» para reflejar mejor el imperfecto ἤμην y sonar más natural en español. Se cambia «me recibiste» por «me acogiste» para expresar con mayor claridad la hospitalidad implícita en συνηγάγετέ με junto con ξένος, sin añadir «en» ni «en casa». Se añade una nota léxica para conservar la alternativa documentada en el rastro inglés.
