translation:
  language: es
  text: Porque tuve hambre y me diste de comer; tuve sed y me diste de beber; era forastero y me acogiste[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me recibiste». El verbo griego literalmente significa «reuniste» o «juntaste», pero aquí se refiere a recibir hospitalariamente a un forastero.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπείνασα
  english_pob_choice: I was hungry
  chosen_spanish: tuve hambre
  alternatives_spanish:
  - estuve hambriento
  - tuve hambre
  lexicon: BDAG
  rationale: El aoristo expresa una experiencia pasada. En español, «tuve hambre» es natural y conserva el valor experiencial mejor que una forma más rígida como «estuve hambriento».
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamentación. «Porque» comunica bien esa relación causal/explanatoria en español y mantiene la fluidez del enunciado.
- source_word: ἐδώκατέ μοι φαγεῖν
  english_pob_choice: you gave me something to eat
  chosen_spanish: me diste de comer
  alternatives_spanish:
  - me diste algo de comer
  - me diste comida
  lexicon: BDAG
  rationale: La construcción griega con dar + infinitivo se expresa de modo idiomático en español con «dar de comer». Añadir «algo» sería posible, pero no necesario para transmitir la idea.
- source_word: ἐδίψησα
  english_pob_choice: I was thirsty
  chosen_spanish: tuve sed
  alternatives_spanish:
  - estuve sediento
  - tuve sed
  lexicon: BDAG
  rationale: Como con «tuve hambre», la forma española más natural para la experiencia pasada es «tuve sed».
- source_word: ἐποτίσατέ με
  english_pob_choice: you gave me something to drink
  chosen_spanish: me diste de beber
  alternatives_spanish:
  - me diste algo de beber
  - me diste de tomar
  lexicon: BDAG
  rationale: ποτίζω significa dar de beber o hacer beber. En este contexto de provisión misericordiosa, «me diste de beber» reproduce bien la idea sin añadir contenido no explícito.
- source_word: ξένος
  english_pob_choice: a stranger
  chosen_spanish: forastero
  alternatives_spanish:
  - extraño
  - desconocido
  - forastero
  lexicon: BDAG
  rationale: Aquí ξένος se refiere a alguien sin pertenencia social inmediata ni hospedaje. «Forastero» conserva la idea de persona ajena o no integrada al grupo; «extraño» puede sonar demasiado general en español moderno.
- source_word: συνηγάγετέ με
  english_pob_choice: you welcomed me
  chosen_spanish: me recibiste
  alternatives_spanish:
  - me acogiste
  - me recibiste
  - me hospedaste
  lexicon: BDAG
  rationale: Aunque el verbo griego literalmente significa «reunir/juntar», en este contexto con ξένος apunta a la recepción hospitalaria. «Me recibiste» es sobrio y natural; «me acogiste» también sería posible, pero «recibir» evita añadir una intensidad no explícita.
theological_decisions:
- issue: Hospitalidad hacia el forastero en ξένος ... συνηγάγετέ με
  english_pob_reading: 'Render the clause as personal hospitality: ''I was a stranger and you welcomed me in.'''
  chosen_spanish_reading: «Fui forastero, y me recibiste» como hospitalidad personal sin añadir «en» ni expandir la escena.
  alternative_spanish_readings:
  - fui forastero, y me acogiste
  - fui extraño, y me recibiste en casa
  rationale: El punto teológico/ético del versículo es la acogida misericordiosa del vulnerable. «Me recibiste» comunica esa hospitalidad sin introducir complementos que el griego no tiene. También evita cargar el texto con matices modernos ajenos al contexto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que eliminó «in» tras «welcomed me», por lo que el español evita igualmente añadir un equivalente locativo no sustentado por el griego. La solución mantiene la secuencia de tres actos de misericordia y la parataxis del original.
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y publicable, sin calcar la sintaxis griega de forma forzada.
  - Se eligieron verbos de hospitalidad directos y comunes («me recibiste») para reproducir la decisión auditada del POB inglés.
  - No se usó «Cristo», «SEÑOR» ni otras terminologías no presentes en el versículo.
  - Se preservó la repetición de primera persona y la estructura acumulativa del texto fuente.
