  spanish_quality_summary: El texto es claro y legible, pero puede mejorarse en naturalidad y precisión contextual. «Era forastero» fluye mejor en español bíblico actual que «fui forastero», y «me acogiste» comunica mejor la hospitalidad misericordiosa que el contexto exige. También conviene añadir una nota con la alternativa «me recibiste»/«me diste alojamiento» para preservar el rango semántico documentado.
  glossary_alignment: 'No hay términos de glosario mayor en juego. La decisión sobre ξένος/suνηγάγετέ με debe alinearse con la política de hospitalidad personal: mejor «forastero» o «extraño» con un verbo de acogida. «Forastero» es aceptable; el ajuste principal es verbal: «me acogiste» mejor que «me recibiste».'
  issues:
  - severity: medium
    issue: «fui forastero» para ξένος ἤμην
    rationale: El griego usa ἤμην, imperfecto de estado. En español, «era forastero» expresa más naturalmente la condición continua que subyace a la escena; «fui forastero» puede sonar puntual o estilísticamente menos idiomático aquí.
  - severity: medium
    issue: «me recibiste» debilita el matiz de acogida hospitalaria de συνηγάγετέ με
    rationale: Aunque «recibiste» es posible, el contexto de ξένος pide una recepción acogedora. «Me acogiste» comunica mejor la hospitalidad sin añadir un complemento no presente en el griego.
  - severity: low
    issue: Falta nota léxica para la alternativa de συνηγάγετέ με
    rationale: El expediente inglés conserva una nota sobre la alternativa «you took me in». En español conviene reflejar una alternativa como «me recibiste» o «me diste alojamiento» para preservar la evidencia lexical y evitar pérdida de transparencia.
  revised_spanish_text: Porque tuve hambre y me diste de comer; tuve sed y me diste de beber; era forastero y me acogiste[a],
  revised_footnotes:
