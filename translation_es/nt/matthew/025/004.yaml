translation:
  language: es
  text: Pero las sabias tomaron aceite en sus recipientes con sus lámparas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antorchas» para «lámparas» (griego λαμπάς); el término puede denotar una lámpara o una antorcha según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρόνιμοι
  english_pob_choice: wise
  chosen_spanish: prudentes
  alternatives_spanish:
  - sabias
  - sensatas
  - sabias/prudentes
  lexicon: BDAG
  rationale: φρόνιμος expresa prudencia práctica o sensatez. En español, «prudentes» comunica bien esa capacidad de actuar con previsión en el contexto de la parábola, sin forzar el sentido hacia una sabiduría meramente intelectual.
- source_word: ἔλαβον
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - tomaron consigo
  - recibieron
  lexicon: BDAG
  rationale: En este contexto narrativo, λαμβάνω indica que las vírgenes se proveyeron de aceite; «tomaron» es natural en español y conserva el valor de acción concreta. «Recibieron» no corresponde al contexto.
- source_word: ἔλαιον
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: BDAG
  rationale: ἔλαιον significa aceite, normalmente de oliva. «Aceite» basta en español y no añade una precisión que el griego no exige.
- source_word: ἀγγείοις
  english_pob_choice: containers
  chosen_spanish: recipientes
  alternatives_spanish:
  - vasijas
  - vasos
  - envases
  lexicon: BDAG
  rationale: ἀγγεῖον es un término genérico para recipiente o vasija. «Recipientes» conserva esa amplitud sin especificar forma ni material.
- source_word: λαμπάδων
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - antorchas
  lexicon: BDAG
  rationale: λαμπάς puede significar lámpara o antorcha. En español, «lámparas» funciona bien en la lectura tradicional de la parábola y mantiene la referencia a aceite extra; «antorchas» sigue siendo una alternativa léxica válida.
- source_word: ἑαυτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - propias
  - de ellas
  lexicon: BDAG
  rationale: El reflexivo subraya posesión por parte de las mismas personas mencionadas. En español, «sus» expresa de forma natural esa relación; añadir «propias» sería posible pero innecesario.
- source_word: μετὰ τῶν λαμπάδων ἑαυτῶν
  english_pob_choice: with their lamps
  chosen_spanish: con sus lámparas
  alternatives_spanish:
  - junto con sus lámparas
  lexicon: BDAG
  rationale: μετά con genitivo indica acompañamiento. «Con sus lámparas» es breve, idiomático y preserva la idea de que el aceite se llevaba además de las lámparas.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; la versión española sigue esa lectura sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se mantiene un estilo neutral y reverente, con sintaxis sencilla y actual.
  - Se evita el calco excesivo de la estructura inglesa; aun así, se conserva la secuencia informativa del original griego.
  - «Recipientes» se usa para reflejar el sentido genérico de ἀγγεῖοι sin concretarlo indebidamente.
