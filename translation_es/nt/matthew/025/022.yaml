    issue: Orden poco natural en «dos talentos me entregaste»
    rationale: Aunque comprensible, reproduce de forma demasiado cercana el orden griego y suena marcada en español. «Me entregaste dos talentos» preserva plenamente el sentido y mejora la legibilidad.
  - severity: low
    issue: Anclaje de la nota cultural en «Mira» en vez de en «talentos»
    rationale: La nota b explica qué significa «talento» como unidad monetaria, por lo que debe marcarse en la palabra pertinente para evitar confusión y seguir mejor la práctica de notas semánticas.
