translation:
  language: es
  text: 'Entonces se acercó también el que había recibido los dos talentos y dijo[a]: «Señor, me entregaste dos talentos[b]. Mira, gané otros dos talentos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Maestro». El título griego es kyrios, comúnmente traducido «Señor»; en esta parábola también puede funcionar como un trato respetuoso hacia un amo.
    reason: alternative_reading
  - marker: b
    text: Un talento era una gran unidad de dinero, no una habilidad natural.
    reason: cultural_note
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came forward
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - se presentó
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι introduce la aproximación del siervo para hablar. En español, «se acercó» conserva la acción de llegar ante el amo sin sonar forzado.
- source_word: δὲ καὶ
  english_pob_choice: Then ... also
  chosen_spanish: Entonces ... también
  alternatives_spanish:
  - Y ... también
  - Ahora ... también
  lexicon: BDAG
  rationale: La combinación expresa continuidad narrativa y adición respecto del siervo anterior. «Entonces» marca el avance del relato y «también» conserva la idea de paralelismo.
- source_word: ὁ τὰ δύο τάλαντα
  english_pob_choice: the one who had received the two talents
  chosen_spanish: el que había recibido los dos talentos
  alternatives_spanish:
  - el de los dos talentos
  - el hombre de los dos talentos
  lexicon: BDAG
  rationale: La construcción articula al siervo por la cantidad encomendada. En español, añadir «había recibido» hace explícito el referente implícito del contexto de la parábola.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se conserva la correspondencia tradicional y reverente de κύριε. «Señor» funciona naturalmente en español y mantiene la decisión auditada de la POB inglesa, sin forzar un cambio terminológico.
- source_word: παρέδωκας
  english_pob_choice: you handed over
  chosen_spanish: me entregaste
  alternatives_spanish:
  - me confiaste
  - me diste
  lexicon: BDAG
  rationale: παραδίδωμι tiene el sentido concreto de entregar o poner en manos de otro. «Me entregaste» preserva esa fuerza; el complemento dativo se integra naturalmente en español.
- source_word: ἴδε
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Observa
  lexicon: BDAG
  rationale: La interjección exhorta a fijarse en el resultado. «Mira» reproduce esa fuerza deíctica en español moderno sin recurrir a un arcaísmo.
- source_word: ἄλλα δύο τάλαντα
  english_pob_choice: two more talents
  chosen_spanish: otros dos talentos
  alternatives_spanish:
  - dos talentos más
  - dos talentos adicionales
  lexicon: BDAG
  rationale: ἄλλα con numeral señala una cantidad adicional equivalente. «Otros dos talentos» comunica naturalmente la adición sin perder el valor cuantitativo.
- source_word: ἐκέρδησα
  english_pob_choice: I gained
  chosen_spanish: gané
  alternatives_spanish:
  - obtuve
  - produje
  lexicon: BDAG
  rationale: κερδαίνω significa ganar, obtener o sacar provecho. «Gané» es una traducción breve y fiel que conserva el resultado del trabajo o inversión implícitos.
- source_word: τάλαντα
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - grandes sumas de dinero
  lexicon: BDAG
  rationale: Se mantiene el término tradicional «talentos», que en el contexto de la parábola refiere una unidad monetaria y no una capacidad personal.
theological_decisions:
- issue: Título κύριος en un discurso parabólico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Aunque el escenario social podría admitir «Maestro», la línea doctrinal del proyecto conserva κύριος como «Señor». En este versículo no hay motivo para desviar la equivalencia auditada.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada marcador de nota aparezca anclado en el texto español: [a] en «dijo[a]» y [b] en «Mira[b]». La formulación mantiene la lectura auditada de la POB inglesa y el sentido del griego sin introducir paráfrasis innecesarias.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε conforme al criterio doctrinal del proyecto.
  - Se conserva «talentos» como término técnico monetario, con nota cultural para evitar la lectura de habilidades.
  - «Se acercó» refleja el participio de aproximación sin sobreinterpretarlo.
  - «Otros dos talentos» reproduce ἄλλα δύο τάλαντα como cantidad adicional equivalente.
