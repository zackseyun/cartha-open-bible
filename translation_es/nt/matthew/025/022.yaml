  text: προσελθὼν ⸀δὲ καὶ ὁ τὰ δύο ⸀τάλαντα εἶπεν· Κύριε, δύο τάλαντά μοι παρέδωκας· ἴδε ἄλλα δύο τάλαντα ⸀ἐκέρδησα.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/025/022.yaml
  text: Then the one who had received the two talents also came forward and said[a], ‘Lord, you handed over to me two talents. Look[b], I gained two more talents.’
  footnotes:
  - marker: a
    text: Or “Master.” The Greek title is kyrios, commonly rendered “Lord”; in this parable it can also function as a respectful address to a master.
    reason: alternative_reading
  - marker: b
    text: A talent was a large unit of money, not a natural ability.
    reason: cultural_note
