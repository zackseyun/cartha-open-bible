review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del griego: τότε = «Entonces», ἀποκριθήσεται αὐτοῖς λέγων = «les responderá diciendo», ἐφ’ ὅσον = «en cuanto», y la doble negación correlativa se conserva adecuadamente. También mantiene la identificación directa entre «uno de estos…» y Jesús sin resolver la disputa interpretativa. Sin embargo, hay dos ajustes importantes: la nota [a] está anclada en «responderá» pero en realidad comenta la fórmula Ἀμὴν λέγω ὑμῖν; y «De cierto les digo» suena demasiado heredado/arcaizante para el estilo meta y no coincide tan bien con la racionalidad documentada como «En verdad les digo».'
  spanish_quality_summary: El español es claro y comprensible, pero «De cierto les digo» suena más tradicionalista y menos natural para un español moderno y panhispánico que «En verdad les digo». Además, la colocación del marcador [a] crea confusión porque parece glosar «responderá» en lugar de la fórmula solemne de Jesús. El resto fluye bien y «para uno… para mí» es natural en este contexto.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías/esclavo. La decisión sobre «más pequeños» es aceptable y respeta la nota interpretativa abierta. La principal corrección de alineación es estilística y de anclaje de nota en la fórmula Ἀμὴν λέγω ὑμῖν.
  issues:
  - severity: medium
    issue: Marcador de nota [a] mal ubicado
    rationale: La nota [a] explica una alternativa para Ἀμὴν λέγω ὑμῖν («Amén, les digo»), pero en el texto está anclada a «responderá», lo que induce a pensar que comenta ἀποκριθήσεται.
  - severity: medium
    issue: «De cierto les digo» suena demasiado arcaizante para el estilo meta
    rationale: Aunque es comprensible y tradicional, el proyecto pide español moderno pero digno. «En verdad les digo» conserva la solemnidad y se alinea mejor con la decisión inglesa «Truly I say to you».
