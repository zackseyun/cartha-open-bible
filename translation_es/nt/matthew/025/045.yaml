translation:
  language: es
  text: 'Entonces les responderá diciendo: «En verdad[a] les digo: en cuanto no lo hicieron para uno de estos más pequeños[b], tampoco lo hicieron para mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Amén, les digo».'
    reason: lexical_alternative
  - marker: b
    text: «Uno de estos más pequeños» puede entenderse específicamente como los discípulos de Jesús, o más ampliamente como los humildes y necesitados; la traducción deja la frase tal como está en el texto.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces, en ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca la secuencia del juicio. «Entonces» es natural y solemne en español, sin añadir matiz no presente en el griego.
- source_word: ἀποκριθήσεται
  english_pob_choice: he will answer
  chosen_spanish: les responderá
  alternatives_spanish:
  - les contestará
  - les dará respuesta
  lexicon: BDAG
  rationale: El verbo deponencial indica responder/replicar. En español, «responderá» conserva el sentido judicial y el destinatario plural del dativo αὐτοῖς.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con clítico en español. Mantiene la referencia a quienes están siendo juzgados.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dirá
  - al decir
  lexicon: BDAG
  rationale: Participio de habla concomitante. «Diciendo» preserva la estructura griega sin forzar una coordinación ajena al texto.
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: De cierto les digo
  alternatives_spanish:
  - Amén, les digo
  - Verdaderamente les digo
  - En verdad les digo
  lexicon: BDAG
  rationale: La fórmula de Jesús tiene valor fijo y solemne. «De cierto» conserva la función enfática y resulta idiomático en español; se evita reemplazarlo por una fórmula eclesiástica menos transparente para el flujo del discurso.
- source_word: ἐφ’ ὅσον
  english_pob_choice: insofar as
  chosen_spanish: en cuanto
  alternatives_spanish:
  - en la medida en que
  - hasta donde
  lexicon: BDAG
  rationale: La construcción expresa alcance o medida. «En cuanto» comunica bien la extensión del acto omitido sin convertir la frase en causal o explicativa.
- source_word: οὐκ ἐποιήσατε
  english_pob_choice: you did not do it
  chosen_spanish: no lo hicieron
  alternatives_spanish:
  - no hicieron eso
  - no lo hicieron ustedes
  lexicon: BDAG
  rationale: En contexto, ποιέω remite a la acción concreta hacia las personas mencionadas; el objeto implícito se recupera con «lo». Se mantiene el cambio de segunda persona plural y se evita sobrecargar la frase.
- source_word: ἑνὶ τούτων τῶν ἐλαχίστων
  english_pob_choice: one of the least of these
  chosen_spanish: uno de estos más pequeños
  alternatives_spanish:
  - uno de estos pequeñísimos
  - uno de estos los más pequeños
  lexicon: BDAG
  rationale: El griego combina singular representativo con superlativo plural. «Más pequeños» comunica el superlativo de modo natural en español; se evita «los más pequeños» porque puede sonar menos fluido con «uno de estos».
- source_word: οὐδὲ ἐμοὶ ἐποιήσατε
  english_pob_choice: neither did you do it for me
  chosen_spanish: tampoco lo hicieron para mí
  alternatives_spanish:
  - ni lo hicieron para mí
  - tampoco me lo hicieron
  lexicon: BDAG
  rationale: οὐδέ introduce la segunda negación correlativa. «Tampoco» reproduce la relación lógica con la primera cláusula. Se conserva «para mí» siguiendo el audit trail inglés y la naturalidad del objeto implícito en este contexto.
theological_decisions:
- issue: Identificación de Jesús con «uno de estos más pequeños»
  english_pob_reading: The translation preserves the text's direct identification—failure to act toward 'one of the least of these' is failure to act toward Jesus—without specifying beyond the verse itself who the group includes.
  chosen_spanish_reading: 'La traducción mantiene la identificación directa del texto: no haber actuado para uno de estos más pequeños equivale a no haberlo hecho para Jesús, sin definir más allá del versículo quiénes son exactamente ese grupo.'
  alternative_spanish_readings:
  - «estos más pequeños» se refiere específicamente a discípulos o enviados de Jesús
  - «estos más pequeños» se refiere en general a los pobres y necesitados
  rationale: El versículo afirma la identificación, pero no la delimita con precisión suficiente como para resolver la discusión interpretativa en la traducción. Conviene conservar la tensión textual en vez de imponer una lectura denominacional.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla por traducción.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el expediente inglés POB, incluyendo la decisión revisada de expresar ἐποιήσατε con un matiz natural de finalidad/beneficio en el último sintagma («para mí») y de mantener la identificación textual sin resolver la amplitud referencial de «los más pequeños».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene la fórmula solemne de Jesús con «De cierto» por fidelidad funcional y legibilidad.
  - «Más pequeños» conserva el superlativo de ἐλαχίστων sin introducir una paráfrasis interpretativa.
  - Las notas al pie preservan la alternativa formal de la fórmula y la ambigüedad interpretativa del grupo referido.
