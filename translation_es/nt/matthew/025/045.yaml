  to: 'Entonces les responderá diciendo: «En verdad[a] les digo: en cuanto no lo hicieron para uno de estos más pequeños[b], tampoco lo hicieron para mí».'
  rationale: Se revisa «De cierto» a «En verdad» para un español más natural y contemporáneo sin perder solemnidad, y se mueve la nota [a] al lugar correcto para que glosa la fórmula Ἀμὴν λέγω ὑμῖν en vez del verbo «responderá». Se mantiene el resto porque representa fielmente el griego y el audit trail inglés.
