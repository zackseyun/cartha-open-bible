  text: τότε ἀποκριθήσεται αὐτοῖς λέγων· Ἀμὴν λέγω ὑμῖν, ἐφ’ ὅσον οὐκ ἐποιήσατε ἑνὶ τούτων τῶν ἐλαχίστων, οὐδὲ ἐμοὶ ἐποιήσατε.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/025/045.yaml
  text: Then he will answer them[a], saying, ‘Truly I say to you, insofar as you did not do it for one of the least of these[b], neither did you do it for me.’
  footnotes:
  - marker: a
    text: Or, more formally, 'Amen, I say to you.'
    reason: lexical_alternative
  - marker: b
    text: '''The least of these'' may be understood specifically as Jesus'' disciples or more broadly as the lowly and needy; the translation leaves the phrase as stated in the text.'
    reason: alternative_reading
