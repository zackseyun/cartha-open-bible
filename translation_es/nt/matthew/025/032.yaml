revisions:
- from: Y todas las naciones serán reunidas delante de él[a], y él las separará unas de otras, así como el pastor separa las ovejas de los cabritos[b].
  to: Y todas las naciones serán reunidas ante él[a], y él las separará entre sí, así como el pastor separa las ovejas de los cabritos[b],
  rationale: Se ajusta «delante de él» a «ante él» por mejor naturalidad y registro, se cambia «unas de otras» por «entre sí» para una separación mutua más idiomática con «las naciones», y se conserva la coma final para reflejar la sintaxis continua del original. Se mantienen las notas léxicas existentes porque siguen siendo pertinentes.
