translation:
  language: es
  text: Y todas las naciones serán reunidas ante él[a], y él las separará entre sí, así como el pastor separa las ovejas de los cabritos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los pueblos»; el griego dice literalmente «todas las naciones» (πάντα τὰ ἔθνη).
    reason: lexical_alternative
  - marker: b
    text: El griego ἐρίφων puede significar más específicamente «cabritos» o «chivos jóvenes».
    reason: lexical_alternative
lexical_decisions:
- source_word: συναχθήσονται
  english_pob_choice: will be gathered
  chosen_spanish: serán reunidas
  alternatives_spanish:
  - serán congregadas
  - serán juntadas
  lexicon: BDAG
  rationale: El futuro pasivo de συνάγω pide un pasivo natural en español. «Serán reunidas» conserva la idea de ser llevadas a un solo lugar sin añadir un agente explícito.
- source_word: ἔμπροσθεν αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: BDAG
  rationale: «Delante de él» expresa bien la escena judicial y es claro en español; mantiene la relación espacial del griego sin volverla demasiado formal.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentiles
  lexicon: BDAG
  rationale: Se conserva la amplitud léxica de ἔθνη como «naciones». «Pueblos» también es posible, pero «naciones» sigue más de cerca el griego y preserva mejor la forma del dicho.
- source_word: ἀφορίσει
  english_pob_choice: will separate
  chosen_spanish: separará
  alternatives_spanish:
  - dividirá
  - pondrá aparte
  lexicon: BDAG
  rationale: «Separará» es el equivalente más directo y transparente de ἀφορίζω en este contexto de distinguir un grupo de otro.
- source_word: αὐτοὺς ἀπ’ ἀλλήλων
  english_pob_choice: them from one another
  chosen_spanish: unas de otras
  alternatives_spanish:
  - unos de otros
  - entre sí
  lexicon: BDAG
  rationale: Como el antecedente es neutro plural «las naciones», «unas de otras» reproduce la separación mutua con concordancia natural en español.
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: BDAG
  rationale: «Así como» marca con claridad la comparación y suena natural en registro bíblico actual.
- source_word: ὁ ποιμὴν
  english_pob_choice: the shepherd
  chosen_spanish: el pastor
  alternatives_spanish:
  - el pastor de ovejas
  - el pastor
  lexicon: BDAG
  rationale: En español «pastor» comunica el oficio sin necesidad de ampliar. Aunque el griego tiene artículo, aquí funciona como figura genérica de la comparación.
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - los corderos
  - el rebaño
  lexicon: BDAG
  rationale: πρόβατα significa propiamente «ovejas». Se evita «rebaño» porque cambiaría el referente concreto por un colectivo.
- source_word: τῶν ἐρίφων
  english_pob_choice: the goats
  chosen_spanish: los cabritos
  alternatives_spanish:
  - las cabras
  - los chivos
  lexicon: BDAG
  rationale: Aunque ἔριφος puede referirse más específicamente a un cabrito/animal joven, en español «cabritos» conserva mejor esa posible precisión que solo «cabras» y mantiene la contraposición pastoral.
theological_decisions:
- issue: Alcance de πάντα τὰ ἔθνη
  english_pob_reading: all the nations
  chosen_spanish_reading: todas las naciones
  alternative_spanish_readings:
  - todos los pueblos
  - todas las gentiles
  rationale: Se conserva la amplitud del griego sin interpretar de antemano si la referencia es étnica, política o universal. La traducción mantiene la tensión escatológica del texto en vez de resolverla.
  doctrine_reference: Primacía del lenguaje original; mantener la amplitud semántica sin sobreespecificar
- issue: Valor de ἐρίφων
  english_pob_reading: the goats
  chosen_spanish_reading: los cabritos
  alternative_spanish_readings:
  - los chivos
  - las cabras jóvenes
  rationale: El inglés POB retiene «goats» y nota la posible especificación «young goats» o «kids». En español, «cabritos» preserva mejor esa precisión léxica sin perder la imagen tradicional de la separación pastoral.
  doctrine_reference: Decisión léxica con cautela de matiz; no forzar una equivalencia más amplia de la que el griego permite
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado informó alta concordancia con observaciones menores; por eso se mantiene la solución semántica principal y solo se afina el español para naturalidad y concordancia.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según corresponda en el proyecto, aunque este versículo no los menciona.
  - 'Se conserva la imagen pastoral concreta: ovejas vs. cabritos, sin convertirla en una metáfora abstracta.'
  - El sujeto plural neutro «las naciones» se refleja con «unas de otras» para evitar un giro menos natural en español.
