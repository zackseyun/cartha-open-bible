  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Naciones» respeta la decisión para ἔθνη. No hay términos doctrinales sensibles del glosario principal implicados aquí. La decisión «cabritos» para ἐρίφων es aceptable si se mantiene la nota léxica explicativa.
