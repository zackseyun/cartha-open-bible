review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del griego y respeta la imaginería nupcial sin expansión interpretativa. Sin embargo, dos decisiones requieren ajuste para alinearse mejor con la evidencia fuente y el rastro auditado: ἀπερχομένων se atenúa demasiado en «iban», perdiendo el matiz de alejarse/salir, y la nota [a] introduce una alternativa no preservada por el POB inglés y explica gramática en lugar de una alternativa léxica relevante. Además, conviene reflejar la alternativa documentada para εἰς τοὺς γάμους.'
  spanish_quality_summary: El español es claro y legible, con registro digno y natural. «El novio» y «las que estaban listas» funcionan bien. «A las bodas» es inteligible, pero dado que el POB inglés explicitó «wedding feast» con nota de alternativas, en español conviene usar una forma más clara como «al banquete de bodas» y conservar en nota la amplitud posible del plural griego. «La puerta fue cerrada» es fiel, aunque algo más pesada que «se cerró»; no obstante, mantiene bien la pasividad/finalidad.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la necesidad de no sobreinterpretar la imaginería. «Novio» para νυμφίος es adecuado. No hay conflicto con Yahvé/Mesías/etc. La revisión propuesta mejora la correspondencia con la decisión léxica auditada sobre γάμοι.
  issues:
  - severity: medium
    issue: «mientras ellas iban» debilita el matiz de ἀπερχομένων
    rationale: El participio de ἀπέρχομαι expresa que se iban/alejaban para comprar. «Iban» comunica simultaneidad, pero no el movimiento de salida tan claramente como «se iban» o «iban a comprar» con valor de partida.
  - severity: medium
    issue: La nota [a] no sigue la razón lexical del POB inglés
    rationale: El POB inglés usa la nota para alternativas de εἰς τοὺς γάμους («banquete de bodas», «boda»), no para explicar que ἀγοράσαι puede ser «para comprar». La nota actual añade metalenguaje gramatical innecesario y desvía la atención de la alternativa semántica importante.
  - severity: low
    issue: «a las bodas» es posible, pero menos claro que una referencia explícita al banquete/celebración
    rationale: Aunque «a las bodas» puede abarcar la celebración entera, en español moderno latinoamericano «al banquete de bodas» comunica mejor el referente contextual y se ajusta a la elección principal del POB inglés, dejando «a la boda» o «a las bodas» para nota.
  revised_spanish_text: Pero mientras ellas se iban a comprar, llegó el novio, y las que estaban listas entraron con él al banquete de bodas[a], y la puerta fue cerrada.
  revised_footnotes:
