revisions:
- from: Pero mientras ellas iban a comprar[a], llegó el novio, y las que estaban listas entraron con él a las bodas, y la puerta fue cerrada.
  to: Pero mientras ellas se iban a comprar, llegó el novio, y las que estaban listas entraron con él al banquete de bodas[a], y la puerta fue cerrada.
  rationale: Se ajusta ἀπερχομένων a «se iban» para preservar mejor el matiz de alejarse; se reemplaza «a las bodas» por «al banquete de bodas» para mayor claridad y conformidad con la decisión léxica auditada; y se traslada la única nota a γάμοι, donde el POB inglés documentó las alternativas relevantes. Se mantiene «la puerta fue cerrada» por fidelidad al pasivo griego.
