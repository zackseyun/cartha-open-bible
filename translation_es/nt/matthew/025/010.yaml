translation:
  language: es
  text: Pero mientras ellas se iban a comprar, llegó el novio, y las que estaban listas entraron con él al banquete de bodas[a], y la puerta fue cerrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la boda» o simplemente «a las bodas». El plural griego puede referirse a la celebración nupcial en su conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπερχομένων δὲ αὐτῶν
  english_pob_choice: while they were going away
  chosen_spanish: mientras ellas iban
  alternatives_spanish:
  - mientras se iban
  - mientras iban de camino
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción simultánea; en español, «mientras ellas iban» comunica bien la simultaneidad sin cargar la frase. Se mantiene el movimiento de salida/alejamiento implícito en ἀπέρχομαι mediante el verbo «iban», reforzado por el contexto inmediato de ir a comprar.
- source_word: ἀγοράσαι
  english_pob_choice: to buy
  chosen_spanish: a comprar
  alternatives_spanish:
  - para comprar
  - a adquirir
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito. «A comprar» es natural en español y conserva la finalidad inmediata sin agregar el objeto que ya se entiende por el contexto.
- source_word: νυμφίος
  english_pob_choice: bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: «Novio» es el equivalente natural y actual para el participante masculino de la boda; en español bíblico moderno evita una expresión demasiado arcaica y conserva la imagen narrativa. «Esposo» sería menos preciso aquí, porque el contexto es el evento nupcial.
- source_word: αἱ ἕτοιμοι
  english_pob_choice: those who were ready
  chosen_spanish: las que estaban listas
  alternatives_spanish:
  - las preparadas
  - las que estaban preparadas
  lexicon: BDAG
  rationale: El adjetivo sustantivado femenino plural se refiere a las vírgenes preparadas. «Las que estaban listas» es idiomático en español y mantiene el sentido de preparación activa sin sonar técnico o forzado.
- source_word: εἰσῆλθον μετ’ αὐτοῦ
  english_pob_choice: went in with him
  chosen_spanish: entraron con él
  alternatives_spanish:
  - entraron con él
  - fueron adentro con él
  lexicon: BDAG
  rationale: «Entraron con él» refleja el movimiento narrativo del aoristo y suena más natural en español que una construcción demasiado literal. Se conserva la idea de acompañamiento («con él»).
- source_word: εἰς τοὺς γάμους
  english_pob_choice: to the wedding feast
  chosen_spanish: a las bodas
  alternatives_spanish:
  - al banquete de bodas
  - a la fiesta de bodas
  lexicon: BDAG
  rationale: El plural γάμοι puede referirse a la celebración nupcial en su conjunto. «A las bodas» es una forma breve, tradicional y bíblicamente inteligible en español, y evita decidir de manera excesiva entre «banquete» o «fiesta» cuando el griego abarcaría la celebración completa.
- source_word: ἐκλείσθη ἡ θύρα
  english_pob_choice: the door was shut
  chosen_spanish: la puerta fue cerrada
  alternatives_spanish:
  - la puerta fue cerrada
  - la puerta se cerró
  lexicon: BDAG
  rationale: El aoristo pasivo indica que la puerta recibió la acción. «Fue cerrada» conserva la pasividad gramatical y la solemnidad final de la escena. Aunque «se cerró» es posible en español, suaviza el matiz pasivo del griego.
theological_decisions:
- issue: Imaginería nupcial en la parábola sin interpretación añadida
  english_pob_reading: Retain 'bridegroom' and 'wedding feast' as ordinary narrative imagery without making implicit christological interpretation explicit in the translation.
  chosen_spanish_reading: Conservar la escena nupcial como imaginería narrativa normal, sin explicitar una identificación cristológica en el texto traducido.
  alternative_spanish_readings:
  - usar una forma más interpretativa que aluda al Mesías
  - explicitar el sentido de la boda como símbolo
  rationale: La fuerza teológica debe surgir del contexto de la parábola, no de una expansión interpretativa en el versículo. El español conserva la escena y su cierre solemne sin añadir explicación doctrinal al texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés indica alta concordancia y ningún cambio aplicado; por tanto, el borrador español sigue de cerca la lectura auditada sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque el griego aquí no usa Χριστός; la escena mantiene su lenguaje parabólico literal.
  - 'Se prefiere un español natural y reverente: «novio», «las que estaban listas», «a las bodas», «la puerta fue cerrada».'
