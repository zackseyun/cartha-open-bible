translation:
  language: es
  text: 'Pero las insensatas dijeron a las prudentes: «Denos un poco de su aceite, porque nuestras lámparas[a] se están apagando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lámparas» traduce λαμπάδες; también puede entenderse como «antorchas», porque el término griego puede referirse a un portador de luz de mano, y el contexto admite más de una reconstrucción del objeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωραὶ
  english_pob_choice: the foolish
  chosen_spanish: las insensatas
  alternatives_spanish:
  - las necias
  - las imprudentes
  lexicon: BDAG
  rationale: El adjetivo sustantivado describe al grupo de vírgenes con contraste moral/prudencial frente a φρονίμοις. «Insensatas» comunica esa falta de sensatez en español natural sin imponer una lectura más fuerte que el contexto.
- source_word: φρονίμοις
  english_pob_choice: the wise
  chosen_spanish: las prudentes
  alternatives_spanish:
  - las sabias
  - las sensatas
  lexicon: BDAG
  rationale: En la parábola, el rasgo es la previsión práctica y la preparación. «Prudentes» conserva mejor esa idea que una sabiduría meramente abstracta y mantiene el contraste con «insensatas».
- source_word: Δότε
  english_pob_choice: Give
  chosen_spanish: Denos
  alternatives_spanish:
  - Den
  - Danos
  lexicon: BDAG
  rationale: El imperativo plural directo se vuelve una petición en discurso citado; en español, el clítico de cortesía plural no aplica aquí. «Denos» refleja la súplica dirigida al grupo con un registro natural y fiel al mandato/request griego.
- source_word: ἐκ τοῦ ἐλαίου ὑμῶν
  english_pob_choice: some of your oil
  chosen_spanish: un poco de su aceite
  alternatives_spanish:
  - algo de su aceite
  - parte de su aceite
  - de su aceite
  lexicon: BDAG
  rationale: 'ἐκ con genitivo tiene sentido partitivo: una porción del suministro. «Un poco de su aceite» expresa bien la fracción pedida en español idiomático y evita la dureza de «de su aceite».'
- source_word: λαμπάδες
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - antorchas
  - lamparillas
  lexicon: BDAG
  rationale: Aunque el inglés POB preservó la alternativa «torches», en español «lámparas» es la correspondencia más clara y natural en este contexto; mantiene la imagen de la luz alimentada por aceite sin decidir excesivamente entre tipos de objeto.
- source_word: σβέννυνται
  english_pob_choice: are going out
  chosen_spanish: se están apagando
  alternatives_spanish:
  - se apagan
  - están por apagarse
  - se van apagando
  lexicon: BDAG
  rationale: El presente pasivo/medio expresa un proceso en curso. «Se están apagando» conserva ese valor progresivo mejor que una forma puntual, y suena natural en español actual.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la causa de la petición. «Porque» es la forma más clara y directa en español contemporáneo.
theological_decisions:
- issue: Contraste moral/prudencial entre las dos grupos de vírgenes
  english_pob_reading: the foolish / the wise
  chosen_spanish_reading: las insensatas / las prudentes
  alternative_spanish_readings:
  - las necias / las sabias
  - las imprudentes / las sabias
  rationale: La escena no presenta una oposición doctrinal abstracta sino una diferencia de preparación práctica. «Insensatas» y «prudentes» preservan ese contraste sin sobrecargarlo con un juicio filosófico o académico.
  doctrine_reference: Parábola de las vírgenes; sabiduría como preparación fiel y obediencia práctica.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios relevantes en la última revisión y el cotejo reporta alto acuerdo; por eso no se introducen emendaciones textuales ni variantes de manuscritos, solo decisiones equivalentes para el español.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se conserva el contraste léxico entre los dos grupos mediante pares opuestos naturales en español.
  - No se oculta la ambigüedad de λαμπάδες; se señala en nota como alternativa lexical abierta.
  - Se traduce el valor partitivo de ἐκ con una expresión idiomática española que conserva el sentido de porción.
