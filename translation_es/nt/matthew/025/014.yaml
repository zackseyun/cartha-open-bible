    changes_summary: 'Changed ''slaves'' to ''servants'' for a more natural formal register while still accurately rendering δούλους in this context; otherwise retained the draft. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque será como un hombre que, al irse de viaje[a], llamó a sus propios esclavos y les confió sus bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al partir» o «que se iba de viaje». El participio griego ἀποδημῶν indica que salía o se ausentaba por viaje.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὥσπερ γὰρ
  english_pob_choice: For it is like
  chosen_spanish: Porque será como
  alternatives_spanish:
  - Porque es como
  - Pues será como
  - Porque será semejante a
  lexicon: BDAG
  rationale: El griego introduce una comparación explicativa; en español, "porque" conserva el enlace con el contexto previo y "será como" expresa con naturalidad la comparación futura implícita en la parábola.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El sustantivo singular masculino se refiere a una figura masculina dentro de la parábola; "hombre" respeta ese rasgo sin añadir genericidad innecesaria.
- source_word: ἀποδημῶν
  english_pob_choice: going on a journey
  chosen_spanish: al irse de viaje
  alternatives_spanish:
  - yéndose de viaje
  - viajando
  - al partir
  lexicon: BDAG
  rationale: El participio indica salida para un trayecto o ausencia; "al irse de viaje" suena natural en español y conserva la idea de partida sin precisar más de lo que el griego dice.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: BDAG
  rationale: '"Llamó" es la correspondencia directa y suficientemente clara; "convocó" sería más formal y "mandó llamar" añade una mediación no explícita en el texto.'
- source_word: τοὺς ἰδίους δούλους
  english_pob_choice: his own slaves
  chosen_spanish: sus propios esclavos
  alternatives_spanish:
  - sus propios siervos
  - sus propios criados
  - sus propios esclavos domésticos
  lexicon: BDAG
  rationale: Se mantiene "esclavos" porque el contexto del amo, la propiedad y la autoridad hacen saliente la condición de dependencia fuerte de δοῦλος. "Sus propios" reproduce ἰδίους con valor de pertenencia/intimidad.
- source_word: παρέδωκεν
  english_pob_choice: entrusted
  chosen_spanish: les entregó
  alternatives_spanish:
  - les confió
  - les encomendó
  - les puso a cargo
  lexicon: BDAG
  rationale: Aunque el inglés opta por "entrusted" por el matiz de mayordomía, el griego básico es "entregar". En español, "les entregó" conserva el hecho del traspaso sin introducir un verbo más interpretativo que el texto no exige.
- source_word: τὰ ὑπάρχοντα αὐτοῦ
  english_pob_choice: his possessions
  chosen_spanish: sus bienes
  alternatives_spanish:
  - sus posesiones
  - lo que tenía
  - su propiedad
  lexicon: BDAG
  rationale: La frase se refiere a sus pertenencias/bienes. "Bienes" funciona bien en registro bíblico moderno y preserva el ámbito económico del pasaje sin sonar tan técnico como "propiedad".
theological_decisions:
- issue: Renderizado de δοῦλος en la parábola
  english_pob_reading: slave(s) because the master's ownership and authority are prominent
  chosen_spanish_reading: esclavos, porque la pertenencia al amo y su autoridad quedan en primer plano
  alternative_spanish_readings:
  - siervos
  - servidores
  - criados
  rationale: Se conserva "esclavos" para no suavizar la relación de dominio implicada por δοῦλος. Aunque "siervos" es más eclesiástico/tradicional, atenúa la fuerza social del término y no refleja tan bien la lectura auditada del POB en este contexto.
  doctrine_reference: 'DOCTRINE.md: término controvertido δοῦλος; principio de mantener la fuerza léxica donde el contexto lo exige'
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre 'slaves' y 'servants', con restauración final de 'slaves' por fidelidad doctrinal y léxica. Esta versión española sigue la decisión restaurada y evita suavizar δοῦλος. También evita traducir παρέδωκεν con un verbo excesivamente interpretativo como 'encomendó', porque el griego sólo exige la entrega de bienes, aunque el contexto implique confianza administrativa.
  spanish_consistency_notes:
  - Se usa 'esclavos' de manera consistente con la política POB para δοῦλος cuando la relación de propiedad/autoridad es visible en el contexto.
  - Se usa 'bienes' para τὰ ὑπάρχοντα αὐτοῦ por ser idiomático en español y mantener el campo semántico de posesiones.
  - La puntuación conserva la frase subordinada participial con una construcción española fluida, sin añadir contenido ausente en el griego.
