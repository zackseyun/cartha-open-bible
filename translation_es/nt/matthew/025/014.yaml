  text: Ὥσπερ γὰρ ἄνθρωπος ἀποδημῶν ἐκάλεσεν τοὺς ἰδίους δούλους καὶ παρέδωκεν αὐτοῖς τὰ ὑπάρχοντα αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/matthew/025/014.yaml
  text: For it is like a man going on a journey[a], who called his own slaves and entrusted his possessions to them.
  footnotes:
  - marker: a
    text: Or "his own servants" or "his own bondservants." The Greek word is doulos, which can denote a servant or a slave depending on context; here "slaves" was chosen because the master's ownership and authority are prominent.
    reason: alternative_reading
