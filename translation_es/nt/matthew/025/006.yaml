  revision_rationale: Se ajusta el registro al español neutral latinoamericano («Miren», «Salgan»), se corrige la nota para que preserve una alternativa real y útil para ἰδού, y se afina εἰς ἀπάντησιν αὐτοῦ con «a encontrarse con él», que refleja mejor el sentido de encuentro sin añadir un matiz innecesario de recepción.
