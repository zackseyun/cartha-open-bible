translation:
  language: es
  text: 'Pero a medianoche se oyó un grito: «¡Miren[a], el novio! ¡Salgan a encontrarse con él!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí, el novio».
    reason: lexical_alternative
lexical_decisions:
- source_word: μέσης δὲ νυκτός
  english_pob_choice: But at midnight
  chosen_spanish: Pero a medianoche
  alternatives_spanish:
  - Y a medianoche
  - Ahora bien, a medianoche
  lexicon: BDAG
  rationale: La construcción genitiva indica tiempo y en español se expresa de manera natural con «a medianoche». «Pero» mantiene el matiz narrativo leve de δέ sin volver el verso artificial.
- source_word: κραυγὴ γέγονεν
  english_pob_choice: a cry rang out
  chosen_spanish: se oyó un grito
  alternatives_spanish:
  - hubo un grito
  - se levantó un clamor
  lexicon: BDAG
  rationale: γέγονεν introduce el acontecimiento de una voz/clamor en la noche. «Se oyó un grito» conserva la irrupción del anuncio en español natural, sin forzar un calco como «un grito aconteció».
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mirad[a]
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: BDAG
  rationale: ἰδού funciona como llamado de atención. «Mirad» preserva la fuerza deíctica; se añade una nota por la alternativa «Behold/Behold» del inglés POB y porque en español el imperativo plural puede sonar más marcado, aunque es fiel al énfasis del original.
- source_word: ὁ νυμφίος
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: νυμφίος es «bridegroom». En español contemporáneo «novio» comunica la figura nupcial con más naturalidad que «desposado»; se evita capitalizarlo para no resolver de antemano la identificación parabólica.
- source_word: ἐξέρχεσθε
  english_pob_choice: Come out
  chosen_spanish: Salid
  alternatives_spanish:
  - Salgan
  - Salid fuera
  lexicon: BDAG
  rationale: El imperativo plural se mantiene. «Salid» conserva la brevedad y el tono de convocatoria; el complemento siguiente completa el sentido sin necesidad de duplicar «fuera».
- source_word: εἰς ἀπάντησιν αὐτοῦ
  english_pob_choice: to meet him
  chosen_spanish: a recibirlo
  alternatives_spanish:
  - para encontrarlo
  - a su encuentro
  lexicon: BDAG
  rationale: La expresión idiomática apunta al encuentro con él. «A recibirlo» suena natural en español y puede abarcar el matiz procesional del contexto matrimonial, sin introducir una formulación más explicativa que el griego.
theological_decisions:
- issue: Identificación del νυμφίος dentro de la parábola
  english_pob_reading: Render simply as 'the bridegroom' without capitalizing or making the Christological identification explicit in the translation.
  chosen_spanish_reading: Traducir simplemente «el novio», sin mayúscula ni identificación cristológica explícita en el texto.
  alternative_spanish_readings:
  - el Novio
  - el Cristo
  rationale: El verso presenta la figura dentro de la parábola; la traducción no debe adelantarse a la interpretación. Mantener minúscula preserva la tensión literaria y la posibilidad de lectura parabológica sin sobreexplicar.
  doctrine_reference: Preservar la tensión teológica del pasaje; no importar una identificación doctrinal que el verso no formula explícitamente.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se mantiene la transición narrativa leve de δέ, la irrupción súbita del anuncio, el deíctico ἰδού, el sustantivo nupcial en minúscula y el imperativo plural. No se registran revisiones posteriores ni cambios editoriales adicionales en el expediente aportado.'
  spanish_consistency_notes:
  - Se usa «novio» para νυμφίος, coherente con un registro bíblico claro y actual; no se sustituye por «Cristo» ni por una mayúscula interpretativa.
  - «Se oyó un grito» evita el calco excesivo y conserva el carácter repentino del anuncio.
  - La nota al pie solo registra la alternativa lexical de ἰδοὺ; no se añade nota para «el novio» porque la elección principal ya es suficientemente transparente en el texto.
