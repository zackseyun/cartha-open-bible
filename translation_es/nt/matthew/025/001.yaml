    text: 'O «será comparado con». El verbo griego está en voz pasiva: «será comparado con» o «será asemejado a».'
    reason: lexical_alternative
  - marker: b
    text: O «antorchas». El término griego puede referirse a una fuente de luz portátil, especialmente en una procesión.
    reason: lexical_alternative
  - marker: c
    text: O «será comparado con».
    reason: previous_rendering
  revision_rationale: Se revisa el texto para reflejar mejor εἰς ὑπάντησιν con «salieron al encuentro del novio», corregir la nota léxica de λαμπάδες para que preserve la alternativa real «antorchas», y hacer más natural el participio con «tomaron ... y salieron». También se ajusta la nota c para que corresponda al historial de formulación previa en inglés, en lugar de repetir el texto principal.
