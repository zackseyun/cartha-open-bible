translation:
  language: es
  text: Entonces el reino de los cielos será como diez vírgenes[a][c], que tomaron sus lámparas[b] y salieron al encuentro del novio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «será comparado con». El verbo griego está en voz pasiva: «será comparado con» o «será asemejado a».'
    reason: lexical_alternative
  - marker: b
    text: O «antorchas». El término griego puede referirse a una fuente de luz portátil, especialmente en una procesión.
    reason: lexical_alternative
  - marker: c
    text: O «será comparado con».
    reason: previous_rendering
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese tiempo
  lexicon: BDAG
  rationale: Marcador temporal y discursivo. «Entonces» conserva la conexión narrativa con el contexto anterior y suena natural en español bíblico contemporáneo.
- source_word: ὁμοιωθήσεται
  english_pob_choice: will be like / will be compared to
  chosen_spanish: será como
  alternatives_spanish:
  - será comparado con
  - será asemejado a
  lexicon: BDAG
  rationale: El griego usa futuro pasivo de ὁμοιόω, pero en español una pasiva explícita resultaría pesada. «Será como» comunica la comparación de manera natural, sin negar la fuerza comparativa del verbo, que se preserva en nota.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  lexicon: BDAG
  rationale: Expresión mateana estable. «Cielos» mantiene el plural genitivo del griego y coincide con el uso tradicional y bíblico en español, sin sustituirlo por una forma menos idiomática.
- source_word: δέκα παρθένοις
  english_pob_choice: ten virgins
  chosen_spanish: diez vírgenes
  alternatives_spanish:
  - diez doncellas
  - diez jóvenes solteras
  lexicon: BDAG
  rationale: «Vírgenes» conserva la fuerza léxica de παρθένος en el marco nupcial. Otras opciones suavizan el término, pero pierden precisión y el contraste narrativo.
- source_word: λαβοῦσαι
  english_pob_choice: took
  chosen_spanish: habiendo tomado
  alternatives_spanish:
  - tomando
  - tomaron
  lexicon: BDAG
  rationale: Participio aoristo antecedente. «Habiendo tomado» mantiene la secuencia previa a la acción principal y evita una simple coordinación que borraría el matiz temporal.
- source_word: τὰς λαμπάδας
  english_pob_choice: their lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus antorchas
  - sus teas
  lexicon: BDAG
  rationale: «Lámparas» es la equivalencia directa y suficientemente amplia para λαμπάς. En este contexto procesional puede abarcar una fuente portátil de luz; no se impone «antorchas» como único sentido.
- source_word: ἑαυτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellas
  - propias
  lexicon: BDAG
  rationale: El posesivo recíproco queda bien expresado con «sus». Agregar «propias» es posible, pero no necesario en español y puede cargar la frase innecesariamente.
- source_word: ἐξῆλθον
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - salieron afuera
  lexicon: BDAG
  rationale: Aoristo de ἐξέρχομαι. «Salieron» es natural y claro, y conserva el movimiento hacia fuera sin redundancia.
- source_word: εἰς ὑπάντησιν
  english_pob_choice: to meet
  chosen_spanish: a recibir
  alternatives_spanish:
  - para encontrar
  - para salir al encuentro de
  lexicon: BDAG
  rationale: La expresión idiomática indica ir al encuentro con propósito de recibir/entablar encuentro. «A recibir» funciona bien en español y comunica la finalidad de la salida; «salir al encuentro de» también sería posible, pero aquí no es indispensable.
- source_word: τοῦ νυμφίου
  english_pob_choice: the bridegroom
  chosen_spanish: al novio
  alternatives_spanish:
  - al esposo
  - al recién casado
  lexicon: BDAG
  rationale: El término designa al hombre en contexto nupcial. «Novio» es natural en español contemporáneo y mantiene la imagen matrimonial; «esposo» podría sonar demasiado general aquí. Dado el registro del pasaje, «novio» es claro y digno.
theological_decisions:
- issue: Forma pasiva del verbo de comparación
  english_pob_reading: the kingdom of heaven will be like / will be compared to ten virgins
  chosen_spanish_reading: el reino de los cielos será como diez vírgenes
  alternative_spanish_readings:
  - el reino de los cielos será comparado con diez vírgenes
  - el reino de los cielos será asemejado a diez vírgenes
  rationale: El griego explicita una pasiva verbal; el español más natural la expresa con una comparación directa. La nota preserva la alternativa más literal para no borrar la tensión entre forma griega y estilo español.
  doctrine_reference: Translation philosophy §1, §5
- issue: νυμφίος en contexto parabólico
  english_pob_reading: the bridegroom
  chosen_spanish_reading: el novio
  alternative_spanish_readings:
  - el esposo
  - el esposo de bodas
  rationale: No hay cambio doctrinal; es una decisión de registro y precisión contextual. «Novio» conserva el campo nupcial sin introducir una equivalencia más eclesiástica o más técnica que el texto no exige.
  doctrine_reference: Translation philosophy §1
- issue: παρθένοις y su fuerza social/sexual
  english_pob_reading: virgins
  chosen_spanish_reading: vírgenes
  alternative_spanish_readings:
  - doncellas
  - jóvenes solteras
  rationale: Se conserva la especificidad lexical del griego. En la parábola, el término contribuye al cuadro narrativo y no debe diluirse en una descripción social más amplia.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El contexto auditado en inglés muestra una revisión posterior que prefirió una formulación más natural («will be like») aunque conservó en nota el valor pasivo del verbo griego. Esta versión española sigue esa misma lógica: usa una comparación idiomática en el texto principal y preserva en nota la opción más literal para mantener la transparencia del análisis.'
  spanish_consistency_notes:
  - Se mantiene «reino de los cielos» en coherencia con el uso mateano y con el estándar del proyecto para ἡ βασιλεία τῶν οὐρανῶν.
  - Se usa «vírgenes» por la fuerza lexical del término; no se suaviza a «doncellas» en el texto principal.
  - «Lámparas» se conserva por fidelidad léxica, dejando abierta la alternativa procesional en nota.
  - La salida se expresa como «salieron a recibir» para reflejar la finalidad de εἰς ὑπάντησιν sin volver la frase pesada.
  - No se introduce terminología eclesiástica tradicional ajena al pasaje; el tono es narrativo y sobrio.
