revisions:
- from: Entonces el reino de los cielos será como diez vírgenes[a][b][c], que, habiendo tomado sus lámparas, salieron a recibir al novio.
  to: Entonces el reino de los cielos será como diez vírgenes[a][c], que tomaron sus lámparas[b] y salieron al encuentro del novio.
  rationale: Se revisa el texto para reflejar mejor εἰς ὑπάντησιν con «salieron al encuentro del novio», corregir la nota léxica de λαμπάδες para que preserve la alternativa real «antorchas», y hacer más natural el participio con «tomaron ... y salieron». También se ajusta la nota c para que corresponda al historial de formulación previa en inglés, en lugar de repetir el texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:25:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: «Entonces», «el reino de los cielos», «diez vírgenes», la secuencia de tomar las lámparas y salir, y el contexto nupcial. Sin embargo, dos elecciones no preservan óptimamente el sentido auditado: «a recibir» suaviza εἰς ὑπάντησιν, que en contexto se expresa mejor como «al encuentro de»/«a encontrarse con», y la nota b está mal formulada porque ofrece «lámparas» como alternativa cuando el texto principal ya dice «lámparas»; la alternativa documentada es «antorchas».'
  spanish_quality_summary: El español es mayormente claro y digno. No obstante, «habiendo tomado» suena algo pesado; una coordinación simple mejora la naturalidad sin perder el sentido. «Al novio» es entendible, pero «al novio» junto con «vírgenes» y el registro parabólico puede mantenerse; aun así, «salieron al encuentro del novio» suena más idiomático y más fiel que «salieron a recibir al novio». Las notas necesitan ajuste para evitar redundancia y confusión.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Vírgenes» alinea bien con παρθένοις. «Reino de los cielos» respeta la fórmula mateana. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc. La principal desalineación está en la nota léxica de λαμπάδες, donde debe preservarse la alternativa «antorchas».
  issues:
  - severity: medium
    issue: «a recibir» no refleja tan bien εἰς ὑπάντησιν
    rationale: La construcción griega significa salir con el propósito de encontrarse con alguien, idiomáticamente «salir al encuentro de». «A recibir» es posible en algunos contextos, pero aquí estrecha y desplaza el matiz hacia una recepción formal más que hacia el encuentro.
  - severity: medium
    issue: La nota b repite el texto principal en vez de dar la alternativa correcta
    rationale: El texto principal usa «lámparas», por lo que la nota «O «lámparas»» es errónea. Según el expediente inglés, la alternativa preservada debe ser «antorchas».
  - severity: low
    issue: «habiendo tomado» suena más forzado de lo necesario
    rationale: Aunque reproduce bien el participio aoristo, en español bíblico natural una coordinación como «tomaron ... y salieron» mantiene la secuencia de forma más fluida.
  - severity: low
    issue: La nota c no corresponde bien al historial inglés
    rationale: 'La nota c en inglés preserva una formulación previa: «will be compared to». En español, si el texto principal ya dice «será como», la nota c no debería repetir «será como», sino señalar la alternativa pasiva/documental.'
  revised_spanish_text: Entonces el reino de los cielos será como diez vírgenes[a][c], que tomaron sus lámparas[b] y salieron al encuentro del novio.
  revised_footnotes:
