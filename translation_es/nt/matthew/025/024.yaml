  text: προσελθὼν δὲ καὶ ὁ τὸ ἓν τάλαντον εἰληφὼς εἶπεν· Κύριε, ἔγνων σε ὅτι σκληρὸς εἶ ἄνθρωπος, θερίζων ὅπου οὐκ ἔσπειρας καὶ συνάγων ὅθεν οὐ διεσκόρπισας·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/025/024.yaml
  text: Then the one who had received the one talent also came and said[a], ‘Lord, I knew that you are a hard man[b], reaping where you did not sow and gathering where you did not scatter.’
  footnotes:
  - marker: a
    text: Or 'harsh man.' The Greek σκληρός can mean hard, harsh, or severe.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'gathering from where you did not scatter.' 'Seed' is supplied in English to make the agricultural image explicit.
    reason: lexical_alternative
