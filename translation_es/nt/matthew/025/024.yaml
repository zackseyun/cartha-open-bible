translation:
  language: es
  text: 'Entonces también se acercó el que había recibido un talento y dijo: «Señor, sabía que eras un hombre duro[a], que siegas donde no sembraste y recoges de donde no esparciste[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre severo». El griego σκληρός puede significar duro, severo o áspero.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de donde no esparciste». No se añade «semilla» porque no está expresada en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa al habla. En español, «se acercó» conserva el movimiento hacia el interlocutor y suena natural en narrativa.
- source_word: δὲ καὶ
  english_pob_choice: Then ... also
  chosen_spanish: Entonces también
  alternatives_spanish:
  - Y también
  - Ahora también
  lexicon: BDAG
  rationale: «Entonces» preserva el avance narrativo de δέ, y «también» refleja la adición de καί a la serie de siervos.
- source_word: ὁ τὸ ἓν τάλαντον εἰληφὼς
  english_pob_choice: the one who had received the one talent
  chosen_spanish: el que había recibido el único talento
  alternatives_spanish:
  - el que había recibido un talento
  - el hombre que había recibido el único talento
  lexicon: BDAG
  rationale: La construcción articular participial identifica al siervo por lo que recibió. «Había recibido» refleja bien el perfecto; «el único talento» mantiene el numeral sin forzar una repetición pesada de «uno» en español.
- source_word: τάλαντον
  english_pob_choice: talent
  chosen_spanish: talento
  alternatives_spanish:
  - suma de dinero
  - bolsa de dinero
  lexicon: BDAG
  rationale: «Talento» conserva el término parabólico y su carga lexical tradicional dentro del relato, sin explicarlo de más.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aunque el hablante se dirige al dueño de la parábola, el término griego es κύριος y el español bíblico natural aquí es «Señor».
- source_word: ἔγνων σε
  english_pob_choice: I knew that you are
  chosen_spanish: sabía que eres
  alternatives_spanish:
  - te conocía
  - supe que eres
  lexicon: BDAG
  rationale: El aoristo expresa la afirmación del siervo sobre su conocimiento del carácter del amo. En español, «sabía que eres» reproduce la relación entre conocimiento y contenido sin añadir una fórmula más pesada.
- source_word: σκληρὸς
  english_pob_choice: hard
  chosen_spanish: duro
  alternatives_spanish:
  - duro de carácter
  - severo
  - áspero
  lexicon: BDAG
  rationale: σκληρός puede significar duro, severo o áspero. «Duro» preserva la tensión del término sin resolverla hacia una valoración más interpretativa como «severo».
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y se refiere al amo del relato; «hombre» mantiene ese valor y la correspondencia directa con el original.
- source_word: θερίζων
  english_pob_choice: reaping
  chosen_spanish: que siegas
  alternatives_spanish:
  - que cosechas
  - segando
  lexicon: BDAG
  rationale: El participio presente conserva la caracterización continua del amo. «Siegas» mantiene la imagen agrícola y la pareja tradicional con «sembraste».
- source_word: ὅπου οὐκ ἔσπειρας
  english_pob_choice: where you did not sow
  chosen_spanish: donde no sembraste
  alternatives_spanish:
  - donde no plantaste
  lexicon: BDAG
  rationale: σπείρω significa «sembrar»; mantener ese verbo preserva el paralelismo agrícola del pasaje.
- source_word: συνάγων
  english_pob_choice: gathering
  chosen_spanish: y recoges
  alternatives_spanish:
  - y reúnes
  - y juntas
  lexicon: BDAG
  rationale: συνάγω puede traducirse como reunir, recoger o juntar. «Recoges» encaja de manera natural con el campo semántico agrícola del versículo.
- source_word: ὅθεν οὐ διεσκόρπισας
  english_pob_choice: where you did not scatter
  chosen_spanish: donde no esparciste
  alternatives_spanish:
  - de donde no esparciste
  - donde no dispersaste
  lexicon: BDAG
  rationale: διασκορπίζω significa esparcir/dispersar. «Esparciste» conserva el paralelismo con «sembraste» y evita añadir un objeto inexistente en el griego.
theological_decisions:
- issue: Rendering of κύριος in the servant’s address
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene la forma estándar para κύριος según el criterio del proyecto. En esta parábola, «Señor» conserva tanto el respeto del discurso como la continuidad terminológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Characterization of the master as σκληρός
  english_pob_reading: hard man
  chosen_spanish_reading: hombre duro
  alternative_spanish_readings:
  - hombre severo
  - hombre áspero
  rationale: La traducción deja intacta la acusación del siervo sin suavizarla ni convertirla en una evaluación editorial. «Duro» conserva la ambigüedad semántica y la tensión teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Agricultural imagery in the final clause
  english_pob_reading: where you did not scatter
  chosen_spanish_reading: donde no esparciste
  alternative_spanish_readings:
  - de donde no esparciste
  rationale: No se añade «semilla» porque no está explícita en el griego. La imagen agrícola sigue clara por el contexto inmediato de sembrar y segar.
  doctrine_reference: 'Applied revision awareness: remove unwarranted supplied objects in metaphorical clauses'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se evitó añadir un objeto implícito como «semilla» en la última cláusula y se mantuvo el valor relacional de «sabía que eres» sin introducir una frase innecesariamente explicativa. También se conservó la tensión del insulto del siervo, sin decidir por traducción si el juicio sobre el amo es exacto o no.'
  spanish_consistency_notes:
  - Se mantiene «talento» para τάλαντον, coherente con la terminología POB y con la lectura parabólica del texto.
  - Se usa «Señor» para κύριος en la línea directa de discurso, de acuerdo con el estándar del proyecto.
  - La cadena agrícola se conserva con «sembraste / siegas / recoges / esparciste» para preservar el paralelismo del griego.
  - No se introduce «semilla» ni otros complementos no explícitos en el original.
  - El sujeto identificado por el participio articular se traduce de manera natural como «el que había recibido el único talento», sin añadir interpretaciones innecesarias.
