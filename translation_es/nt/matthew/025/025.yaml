translation:
  language: es
  text: Y, por miedo[a], fui y escondí tu talento en el suelo. Mira, tienes lo que es tuyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran suma de dinero»; un talento era una unidad monetaria de alto valor, no una referencia a la habilidad natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβηθεὶς
  english_pob_choice: being afraid
  chosen_spanish: por haber tenido miedo
  alternatives_spanish:
  - estando asustado
  - temiendo
  lexicon: BDAG
  rationale: El participio aoristo se usa de modo circunstancial para expresar la causa inmediata de la acción. En español, "por haber tenido miedo" conserva la relación causal y el valor participial sin volverlo una paráfrasis más libre que el griego.
- source_word: ἀπελθὼν
  english_pob_choice: I went away
  chosen_spanish: fui
  alternatives_spanish:
  - me fui
  - habiendo ido
  lexicon: BDAG
  rationale: El participio acompaña al verbo finito siguiente y marca secuencia narrativa. "Fui" transmite de manera natural el desplazamiento previo a esconder el talento y evita una construcción pesada en español.
- source_word: ἔκρυψα
  english_pob_choice: hid
  chosen_spanish: escondí
  alternatives_spanish:
  - oculté
  - enterré
  lexicon: BDAG
  rationale: κρύπτω significa esconder/ocultar. "Escondí" es el equivalente directo y natural en español. "Enterré" sería más interpretativo y añadiría una precisión no expresa en el verbo mismo.
- source_word: τὸ τάλαντόν σου
  english_pob_choice: your talent
  chosen_spanish: tu talento
  alternatives_spanish:
  - tu talento monetario
  - tu gran suma de dinero
  lexicon: BDAG
  rationale: Se conserva el término histórico "talento" como unidad monetaria del relato, siguiendo la continuidad literaria del pasaje. En español, "talento" podría sugerir habilidad personal, por lo que la nota aclara el sentido monetario sin sustituir el vocablo del texto.
- source_word: ἐν τῇ γῇ
  english_pob_choice: in the ground
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el suelo
  - en el terreno
  lexicon: BDAG
  rationale: γῆ puede referirse a tierra/suelo/terreno. "En la tierra" conserva la imagen concreta y funciona bien en español, aunque "suelo" también sería posible según el registro.
- source_word: ἴδε
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Ve
  lexicon: BDAG
  rationale: Es un llamado de atención deíctico. "Mira" es natural y fiel en español moderno, con la misma función discursiva que el inglés "Look".
- source_word: ἔχεις τὸ σόν
  english_pob_choice: you have what is yours
  chosen_spanish: tienes lo que es tuyo
  alternatives_spanish:
  - tienes lo tuyo
  - aquí tienes lo que es tuyo
  lexicon: BDAG
  rationale: La expresión es elíptica. "Lo que es tuyo" preserva el énfasis posesivo y comunica que el siervo devuelve la propiedad del amo sin añadir interpretaciones.
theological_decisions:
- issue: Sentido de τάλαντον frente al uso moderno de "talento" como habilidad
  english_pob_reading: Retain 'talent' in the main text as the historical monetary term used by the parable, while clarifying the monetary sense in a footnote.
  chosen_spanish_reading: Conservar "talento" en el texto principal como término histórico monetario, y aclararlo en una nota para evitar la lectura moderna de habilidad personal.
  alternative_spanish_readings:
  - gran suma de dinero
  - bolsa de oro
  rationale: El griego alude a dinero, no a capacidad innata. Mantener "talento" preserva la forma tradicional del relato y su continuidad literaria, mientras la nota evita el malentendido semántico en español.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el registro fuente; la versión inglesa más reciente permanece sin cambios, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se usó "talento" como término histórico monetario, coherente con el audit trail inglés y con el uso POB de preservar la continuidad del pasaje.
  - Se evitó "SEÑOR" o fórmulas de máscara porque no aparecen en este versículo; el texto se mantiene ajustado al griego.
  - '"Mira" y "tienes lo que es tuyo" conservan el tono directo y la elipsis del cierre griego sin sobreexplicación.'
