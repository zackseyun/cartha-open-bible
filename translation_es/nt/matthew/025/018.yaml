translation:
  language: es
  text: Pero el que había recibido el único talento se fue, cavó en la tierra y escondió el dinero[a] de su amo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «su plata».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But the one
  chosen_spanish: Pero el que
  alternatives_spanish:
  - Y el que
  - Ahora, el que
  lexicon: BDAG
  rationale: δέ marca contraste con el siervo anterior; «Pero» conserva ese giro. El artículo con valor sustantivo se expresa naturalmente en español como «el que».
- source_word: τὸ ἓν
  english_pob_choice: the one talent
  chosen_spanish: el único talento
  alternatives_spanish:
  - el talento único
  - el talento uno
  lexicon: BDAG
  rationale: El griego remite al talento mencionado en el contexto inmediato. En español, «el único talento» comunica con claridad la referencia anafórica y el valor de singularidad sin añadir contenido ajeno.
- source_word: λαβὼν
  english_pob_choice: who had received
  chosen_spanish: había recibido
  alternatives_spanish:
  - habiendo recibido
  - recibió
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales; el pluscuamperfecto español expresa bien esa acción previa y mantiene el orden narrativo.
- source_word: ἀπελθὼν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se marchó
  - partió
  lexicon: BDAG
  rationale: La forma verbal indica alejamiento antes de las acciones siguientes. «Se fue» es natural en español y conserva la secuencia.
- source_word: ὤρυξεν γῆν
  english_pob_choice: dug in the ground
  chosen_spanish: cavó en la tierra
  alternatives_spanish:
  - hizo un hoyo en la tierra
  - cavó en el suelo
  lexicon: BDAG
  rationale: La expresión griega significa cavar en la tierra/suelo. «Cavó en la tierra» es directa y fiel, sin forzar una frase explicativa innecesaria.
- source_word: ἔκρυψεν
  english_pob_choice: hid
  chosen_spanish: escondió
  alternatives_spanish:
  - ocultó
  - guardó
  lexicon: BDAG
  rationale: κρύπτω se expresa de forma natural como «esconder»; «escondió» es la correspondencia más simple y clara en español.
- source_word: τὸ ἀργύριον
  english_pob_choice: money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - el dinero de plata
  lexicon: BDAG
  rationale: En esta parábola, ἀργύριον puede referirse a dinero o plata. El texto español principal usa «dinero» por claridad moderna, y la nota preserva la lectura más literal «plata».
- source_word: τοῦ κυρίου αὐτοῦ
  english_pob_choice: his master's
  chosen_spanish: de su señor
  alternatives_spanish:
  - de su amo
  - de su maestro
  lexicon: BDAG
  rationale: Aquí κύριος designa al superior humano dentro de la parábola. «Señor» mantiene la correspondencia semántica básica del término griego sin convertirlo en título divino en este contexto.
theological_decisions:
- issue: Renderizar κύριος en un contexto parabólico no divino
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - maestro
  rationale: El referente es el superior humano del relato, no una referencia directa al título divino. «Señor» conserva la relación de autoridad del original; el contexto narrativo evita una lectura cristológica aquí.
  doctrine_reference: 'DOCTRINE.md: contested terms table (κύριος → Lord; context-sensitive alternatives documented)'
- issue: Valor de ἀργύριον en la parábola
  english_pob_reading: money
  chosen_spanish_reading: dinero
  alternative_spanish_readings:
  - plata
  rationale: La equivalencia funcional es adecuada para el lector moderno; la nota mantiene la alternativa más literal, por lo que no se pierde la tensión léxica entre dinero y plata.
  doctrine_reference: 'DOCTRINE.md: lexical transparency and contextual equivalence'
translation_notes:
  revision_awareness: Se corrigió la validación anterior agregando el marcador [a] directamente en el texto español donde aparece «dinero», de modo que la nota quede anclada y auditable.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «señor» humano del relato y el uso teológico habitual de κύριος cuando el contexto lo requiere.
  - «Talento» se conserva como unidad monetaria/contextual del pasaje; el adjetivo «único» expresa la referencia a τὸ ἓν sin perder naturalidad.
  - La puntuación sigue el orden narrativo del griego con cláusulas breves y claras.
