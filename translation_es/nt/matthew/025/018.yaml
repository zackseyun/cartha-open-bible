  rationale: Se conserva casi todo el borrador por su fidelidad y buena legibilidad. Solo se ajusta «de su señor» a «de su amo» para representar con mayor claridad el sentido no divino de κύριος en el contexto parabólico y alinearlo con la decisión auditada del POB inglés («master»), evitando una ambigüedad innecesaria en español.
