  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión «cabritos» para ἐρίφια está en línea con la justificación léxica documentada, siempre que se preserve la alternativa «goats/cabras jóvenes» en nota.
