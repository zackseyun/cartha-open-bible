translation:
  language: es
  text: Y pondrá las ovejas a su derecha[a], pero los cabritos[b] a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, el griego dice «desde la derecha ... desde la izquierda», un giro idiomático para indicar ubicación a la derecha y a la izquierda.
    reason: lexical_alternative
  - marker: b
    text: «Cabritos» conserva mejor el matiz de ἐρίφια, que puede referirse a cabras jóvenes o cabritos.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσει
  english_pob_choice: will place
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - pondrá en su lugar
  lexicon: BDAG
  rationale: 'El futuro de ἵστημι aquí tiene sentido causativo: hacer que algo quede situado en un lugar. En español, «pondrá» comunica con naturalidad la acción de ubicar en una posición concreta sin perder el matiz de disposición judicial del contexto.'
- source_word: πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - las reses lanudas
  - los animales del rebaño
  lexicon: BDAG
  rationale: πρόβατα es el término normal para ovejas. Se conserva el referente animal literal del contraste pastoral del pasaje, manteniendo el artículo porque el grupo ya está determinado por la escena.
- source_word: ἐκ δεξιῶν αὐτοῦ
  english_pob_choice: at his right hand
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a su lado derecho
  - a su mano derecha
  lexicon: BDAG
  rationale: La construcción idiomática griega con ἐκ/ἐξ + genitivo expresa ubicación en el lado derecho. En español, «a su derecha» transmite esa posición de forma natural y sin introducir una formulación más rígida que la fuente no exige.
- source_word: ἐρίφια
  english_pob_choice: the goats
  chosen_spanish: los cabritos
  alternatives_spanish:
  - las cabras jóvenes
  - los chivos
  lexicon: BDAG
  rationale: ἐρίφια puede significar cabritos o cabras jóvenes. En español, «cabritos» conserva mejor la precisión léxica del diminutivo griego que «cabras», y evita perder el matiz de animales jóvenes presente en el término.
- source_word: ἐξ εὐωνύμων
  english_pob_choice: at the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - a su izquierda
  - del lado izquierdo
  lexicon: BDAG
  rationale: La expresión griega indica ubicación en el lado izquierdo. «A la izquierda» mantiene el paralelismo con «a su derecha» y refleja la relación espacial sin sobreinterpretar simbólicamente el término.
- source_word: μὲν ... δὲ
  english_pob_choice: but
  chosen_spanish: y ... y
  alternatives_spanish:
  - por una parte ... por otra
  - pero
  lexicon: BDAG
  rationale: La correlación μὲν ... δὲ marca contraste entre dos grupos. En español, una coordinación simple con repetición de «y» puede sonar más natural en una enumeración sentenciosa; el contraste queda garantizado por la oposición de derecha/izquierda y ovejas/cabritos. Se evita «pero» porque podría sugerir una oposición lógica más fuerte que la meramente distributiva del griego.
theological_decisions:
- issue: Preservar el valor simbólico de derecha e izquierda sin explicarlo en el texto principal
  english_pob_reading: 'Translate as spatial placement only: ''at his right hand ... at the left'''
  chosen_spanish_reading: 'Traducir como ubicación espacial: ''a su derecha ... a la izquierda'''
  alternative_spanish_readings:
  - a la diestra ... a la siniestra
  - en lugar de favor ... en lugar de rechazo
  rationale: El griego describe primero una colocación espacial dentro de la escena. Aunque el contexto del juicio da peso evaluativo a derecha e izquierda, no conviene insertar esa interpretación en el cuerpo del versículo. La traducción conserva la tensión narrativa y deja que el contexto haga su trabajo.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; no importar una glosa doctrinal que el texto no formula.'
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés no introdujo cambios; el texto se mantiene en acuerdo alto y no requiere ajuste adicional. Se siguió la lectura estable del pasaje, conservando la oposición espacial y la alternativa léxica para ἐρίφια.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al nombre divino; en este versículo no aparece.
  - Se eligió «cabritos» para mantener la alternativa léxica documentada de ἐρίφια.
  - Se evitó «diestra/siniestra» en el texto principal para no forzar un registro arcaizante y para mantener claridad moderna.
  - Se mantuvo una estructura breve y paralela acorde con el contraste del original griego.
