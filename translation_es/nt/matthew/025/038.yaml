    text: Literally 'gathered in' or 'received'; the sense here is offering hospitality by taking someone in.
    reason: lexical_alternative
  - marker: c
    text: Or 'poorly clothed.' The Greek can refer either to being naked or to lacking adequate clothing.
    reason: lexical_alternative
