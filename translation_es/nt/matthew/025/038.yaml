translation:
  language: es
  text: ¿Y cuándo te vimos como forastero[a] y te acogimos[b], o desnudo[c] y te vestimos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extranjero». El término griego puede referirse a alguien extraño, desconocido o de fuera del propio círculo; aquí el sentido es una persona necesitada de hospitalidad.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «reunimos en» o «recibimos»; aquí el sentido es ofrecer hospitalidad al acoger a alguien.
    reason: lexical_alternative
  - marker: c
    text: O «pobremente vestido». El griego puede referirse tanto a estar desnudo como a carecer de ropa suficiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: cuándo
  alternatives_spanish:
  - cuando
  lexicon: BDAG
  rationale: Interrogativo temporal natural en español. En una pregunta directa, «cuándo» refleja mejor la referencia temporal que un simple «cuando» conjuntivo.
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ enlaza la pregunta con la anterior sin fuerte contraste; «Y» mantiene el flujo discursivo.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Pronombre de objeto directo/indirecto en segunda persona singular, natural en español coloquial y respetuoso.
- source_word: εἴδομεν
  english_pob_choice: did we see
  chosen_spanish: vimos
  alternatives_spanish:
  - hemos visto
  lexicon: BDAG
  rationale: Aoristo en pregunta pasada; en español, el pretérito perfecto simple expresa de forma natural la acción puntual pasada.
- source_word: ξένον
  english_pob_choice: as a stranger
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - desconocido
  - foráneo
  lexicon: BDAG
  rationale: El audit trail inglés opta por «stranger» por el matiz de alguien sin hospitalidad. En español, «extranjero» mantiene la posible amplitud semántica de ξένος y funciona bien en contexto de acogida, aunque puede sonar también nacional; por eso se conserva la tensión sin añadir paráfrasis.
- source_word: συνηγάγομεν
  english_pob_choice: take you in
  chosen_spanish: te acogimos
  alternatives_spanish:
  - te recibimos
  - te hospedamos
  - te recogimos
  lexicon: BDAG
  rationale: El verbo literalmente sugiere «reunir/recibir», pero en contexto de hospitalidad significa ofrecer acogida. «Acogimos» comunica hospitalidad de manera natural y fiel.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: BDAG
  rationale: Conjunción disyuntiva estándar en español.
- source_word: γυμνὸν
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - sin ropa
  - pobremente vestido
  - mal vestido
  lexicon: BDAG
  rationale: El término puede abarcar desnudez literal o falta de ropa suficiente. «Desnudo» conserva la fuerza del griego sin suavizarla indebidamente.
- source_word: περιεβάλομεν
  english_pob_choice: clothe you
  chosen_spanish: te vestimos
  alternatives_spanish:
  - te cubrimos
  - te pusimos ropa
  lexicon: BDAG
  rationale: El verbo significa poner ropa sobre alguien. «Vestimos» es conciso, natural y semánticamente exacto en este contexto.
theological_decisions:
- issue: ξένος en un contexto de juicio y misericordia
  english_pob_reading: stranger
  chosen_spanish_reading: extranjero
  alternative_spanish_readings:
  - forastero
  - desconocido
  rationale: La lectura inglesa preserva la dimensión social de una persona ajena y necesitada de hospitalidad. En español, «extranjero» mantiene esa extrañeza/ajenidad sin imponer una categoría doctrinal; se deja abierta la tensión entre desconocido, forastero y alguien de fuera del círculo.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve source tension; hospitality ethics in Matthew 25.'
- issue: γυμνός y el grado de desnudez/falta de ropa
  english_pob_reading: naked
  chosen_spanish_reading: desnudo
  alternative_spanish_readings:
  - pobremente vestido
  - sin ropa suficiente
  rationale: El inglés conserva «naked» y anota la posible extensión semántica a falta de ropa adecuada. En español, «desnudo» mantiene la literalidad y la amplitud interpretativa; la nota evita borrar la alternativa de ropa insuficiente.
  doctrine_reference: Lexical transparency; Matthew 25 mercy theme.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando cada nota al texto español mediante los marcadores [a], [b] y [c]. No se introdujeron notas sin anclaje. La redacción sigue el audit trail inglés y el griego, manteniendo la tensión léxica de ξένος y γυμνός.
  spanish_consistency_notes:
  - Se usa «Y» para δέ como enlace suave, coherente con el flujo interrogativo.
  - «Acogimos» refleja hospitalidad y evita un calco mecánico de συνάγω.
  - «Vestimos» es preferible a «clothed» literal por naturalidad española, sin perder el sentido de περιβάλλω.
  - Se conserva «extranjero» en el texto principal porque la nota permite leerlo también como «forastero», preservando la amplitud semántica.
  - Los marcadores de nota aparecen exactamente en las palabras correspondientes del texto español.
