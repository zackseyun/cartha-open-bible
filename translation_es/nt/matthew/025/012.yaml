translation:
  language: es
  text: 'Pero él respondió[a]: «En verdad les digo: no los conozco».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no los reconozco». El griego dice más literalmente «no los conozco», lo cual en el contexto puede implicar no reconocimiento relacional.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἀποκριθεὶς εἶπεν
  english_pob_choice: But he answered
  chosen_spanish: Pero él respondió
  alternatives_spanish:
  - Y él respondió
  - Pero respondió
  lexicon: BDAG
  rationale: La secuencia participio + verbo finito es una fórmula narrativa común; en español, «respondió» comunica de forma natural la réplica y conserva el contraste de δέ con «Pero».
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - De cierto
  lexicon: BDAG
  rationale: En la fórmula sinóptica Ἀμὴν λέγω ὑμῖν, «En verdad» reproduce la solemnidad sin introducir una transliteración menos transparente para el lector español.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les afirmo
  - les hablo
  lexicon: BDAG
  rationale: «Les digo» mantiene el habla directa y la fórmula solemne de la expresión griega, con naturalidad en español y pluralidad explícita por el contexto.
- source_word: οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: no los conozco
  alternatives_spanish:
  - no sé quiénes son
  - no los reconozco
  lexicon: BDAG
  rationale: Aunque οἶδα significa literalmente «sé/conozco», en este contexto la POB inglesa destacó la posible carga relacional de no reconocimiento. En español, «no los conozco» preserva la literalidad básica y deja abierta esa fuerza relacional sin sobreexplicarla.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  lexicon: BDAG
  rationale: El plural de segunda persona se entiende en contexto. «Los» evita una redundancia menos idiomática tras «les digo» y mantiene el objeto plural del verbo.
theological_decisions:
- issue: Fuerza de exclusión y no reconocimiento en «οὐκ οἶδα ὑμᾶς»
  english_pob_reading: Retain the relationally weighty but textually simple wording 'I do not know you' without expanding it into a doctrinal statement about salvation beyond the verse itself.
  chosen_spanish_reading: Conservar «no los conozco» sin ampliarlo a una paráfrasis doctrinal.
  alternative_spanish_readings:
  - no los reconozco
  - no tengo relación con ustedes
  rationale: La frase en contexto implica exclusión y desautorización relacional, pero el texto griego no explicita más. La traducción debe conservar esa tensión sin resolverla ni cargarla con una interpretación más amplia que la del versículo.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail inglés: mantiene la fórmula narrativa breve, traduce Ἀμὴν con un solemne «En verdad» y conserva la ambigüedad relacional de οὐκ οἶδα sin ampliar el sentido del texto.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con español moderno pero digno.
  - Se evita «Cristo»/«SEÑOR» porque este versículo no lo requiere.
  - Se conserva la segunda persona plural de forma contextual, sin marcarla artificialmente en el cuerpo del texto.
