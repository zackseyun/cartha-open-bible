translation:
  language: es
  text: Era forastero[a] y no me acogieron; desnudo[b] y no me vistieron; enfermo y en la cárcel y no me visitaron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘extranjero’ / ‘desconocido’; aquí ξένος designa a alguien fuera del hogar o de la comunidad que necesita acogida hospitalaria.
    reason: lexical_alternative
  - marker: b
    text: O ‘sin ropa suficiente’ / ‘pobremente vestido’; el griego γυμνός puede abarcar desnudez literal o falta grave de vestido.
    reason: lexical_alternative
  - marker: c
    text: ‘Visitar’ también puede implicar cuidado o atención, no solo una visita social.
    reason: lexical_alternative
lexical_decisions:
- source_word: ξένος
  english_pob_choice: a stranger
  chosen_spanish: forastero
  alternatives_spanish:
  - extraño
  - desconocido
  - extranjero
  lexicon: BDAG
  rationale: En este contexto de misericordia negada, ξένος señala a alguien ajeno al hogar o al círculo de acogida. 'Forastero' comunica bien esa ajenidad social sin cargar tanto la idea étnica de 'extranjero'. 'Extraño' puede sonar más relacional o incluso inquietante; 'desconocido' debilita la condición social de vulnerabilidad.
- source_word: συνηγάγετέ
  english_pob_choice: welcome
  chosen_spanish: recibieron
  alternatives_spanish:
  - acogieron
  - me dieron alojamiento
  - me recibieron con hospitalidad
  lexicon: BDAG
  rationale: El verbo griego literalmente es 'reunir', pero aquí, con ξένος, expresa recibir hospitalariamente. 'Recibieron' es natural en español y permite que el contexto de hospitalidad haga el trabajo semántico; 'acogieron' y 'recibieron con hospitalidad' son válidas, pero algo más explícitas o menos fluidas.
- source_word: γυμνός
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - sin ropa
  - mal vestido
  - pobremente vestido
  lexicon: BDAG
  rationale: γυμνός puede ir de desnudez literal a falta de ropa suficiente. 'Desnudo' mantiene la fuerza directa del griego y coincide con la gravedad de la escena; las alternativas suavizan demasiado el término.
- source_word: περιεβάλετέ
  english_pob_choice: clothe
  chosen_spanish: vistieron
  alternatives_spanish:
  - cubrieron
  - me pusieron ropa
  - me dieron ropa
  lexicon: BDAG
  rationale: El verbo significa literalmente 'poner alrededor', de donde 'vestir / poner ropa'. 'Vistieron' es idiomático en español y conserva la acción concreta esperada de misericordia.
- source_word: ἀσθενής
  english_pob_choice: sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - débil
  - doliente
  - malherido
  lexicon: BDAG
  rationale: En esta serie de necesidades, ἀσθενής alude de forma natural a enfermedad física. 'Enfermo' es la equivalencia directa y clara; 'débil' sería demasiado general y podría desviar el sentido.
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - preso
  - encarcelado
  - en prisión
  lexicon: BDAG
  rationale: φυλακή designa aquí el lugar de detención. 'En la cárcel' es plenamente comprensible y ligeramente más natural en español corriente; 'en prisión' también es correcto, pero suena algo más formal.
- source_word: ἐπεσκέψασθέ
  english_pob_choice: visit
  chosen_spanish: visitaron
  alternatives_spanish:
  - me atendieron
  - me cuidaron
  - me fueron a ver
  lexicon: BDAG
  rationale: ἐπισκέπτομαι puede implicar visita con atención y cuidado. 'Visitaron' conserva la forma verbal de la lista y mantiene la posibilidad de ese matiz; el contexto ya sugiere que no es una mera visita social.
theological_decisions:
- issue: Alcance de la omisión en ἐπεσκέψασθέ με
  english_pob_reading: visit me
  chosen_spanish_reading: me visitaron
  alternative_spanish_readings:
  - me cuidaron
  - me atendieron
  - me fueron a ver
  rationale: La culpa condenada es no acercarse con atención compasiva a la persona vulnerable. 'Me visitaron' conserva la acción explícita del griego sin convertirla en una paráfrasis interpretativa; la nota puede recordar que la idea incluye cuidado.
  doctrine_reference: Translation philosophy §3, §6
- issue: Tensión entre desnudez literal y carencia de vestido en γυμνός
  english_pob_reading: naked
  chosen_spanish_reading: desnudo
  alternative_spanish_readings:
  - sin ropa
  - pobremente vestido
  rationale: El término griego es suficientemente fuerte para una lectura directa. 'Desnudo' preserva esa fuerza sin atenuar la denuncia moral. No se suaviza a 'pobremente vestido' porque el texto presenta una carencia seria de provisión.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El pasaje se mantiene alineado con la revisión más reciente, que no requirió cambios. Se conserva la secuencia de necesidades y la fuerza de las negativas, con español idiomático pero sin debilitar los matices léxicos del griego.
  spanish_consistency_notes:
  - Se usa un registro sobrio y bíblico, pero con español actual.
  - Se mantiene la diferencia entre 'forastero' y 'en la cárcel' para no cargar innecesariamente la frase.
  - '''Visitaron'' preserva la forma simple y deja el matiz de cuidado para la nota.'
  - La puntuación respeta la enumeración triádica del griego y del texto auditado en inglés.
