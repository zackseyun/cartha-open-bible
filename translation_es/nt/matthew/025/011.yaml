translation:
  language: es
  text: 'Más tarde[a], también vienen las otras vírgenes, diciendo: «Señor, señor[b], ábrenos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las restantes vírgenes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Maestro, maestro». El griego dice: «Kyrios, kyrios».'
    reason: alternative_reading
  - marker: c
    text: El griego dice simplemente «ábrenos»; la puerta se sobreentiende por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  english_pob_choice: Later
  chosen_spanish: Más tarde
  alternatives_spanish:
  - Luego
  - Después
  - Más adelante
  lexicon: BDAG
  rationale: Adverbio temporal que marca la secuencia narrativa. «Más tarde» conserva la posterioridad sin añadir interpretación temporal excesiva y suena natural en español actual.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora bien
  lexicon: BDAG
  rationale: δέ es un conector leve; en español puede quedar implícito en el giro narrativo sin forzar una conjunción explícita.
- source_word: ἔρχονται
  english_pob_choice: come
  chosen_spanish: vienen
  alternatives_spanish:
  - llegan
  - se acercan
  - están viniendo
  lexicon: BDAG
  rationale: El presente narrativo se expresa bien con «vienen», que mantiene vivacidad y evita una paráfrasis más interpretativa como «llegan».
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: Aquí καί añade a las otras vírgenes a la escena; «también» reproduce mejor ese valor aditivo que una simple coordinación.
- source_word: αἱ λοιπαὶ παρθένοι
  english_pob_choice: the other virgins
  chosen_spanish: las otras vírgenes
  alternatives_spanish:
  - las restantes vírgenes
  - las vírgenes que quedan
  lexicon: BDAG
  rationale: λοιπαί significa «las otras / las restantes». «Las otras vírgenes» es directo y fiel. Se conserva «vírgenes» por ser el término explícito del texto griego.
- source_word: λέγουσαι
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras dicen
  lexicon: BDAG
  rationale: Participio presente que introduce el discurso directo. «Diciendo» es la correspondencia más simple y natural en español.
- source_word: Κύριε κύριε
  english_pob_choice: Lord, lord
  chosen_spanish: Señor, Señor
  alternatives_spanish:
  - Señor, señor
  - Maestro, maestro
  - Señor, Maestro
  lexicon: BDAG
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí κύριε es vocativo de κύριος en una súplica dirigida al dueño/señor de la parábola. «Señor» mantiene la ambigüedad entre respeto social y resonancia teológica que el inglés POB preserva con «Lord».
- source_word: ἄνοιξον ἡμῖν
  english_pob_choice: open to us
  chosen_spanish: ábrenos
  alternatives_spanish:
  - ábrenos la puerta
  - ábranos
  - abre para nosotros
  lexicon: BDAG
  rationale: El griego dice literalmente «ábrenos»; el objeto («la puerta») está implícito por el contexto, así que no se añade al texto principal.
theological_decisions:
- issue: Tensión entre vocativo de respeto y posible carga cristológica en κύριε
  english_pob_reading: Lord / Sir / Master, with Lord as default to preserve theological resonance
  chosen_spanish_reading: Señor, Señor
  alternative_spanish_readings:
  - Señor, señor
  - Maestro, maestro
  - Señor, Maestro
  rationale: En Mateo, κύριος puede funcionar como tratamiento respetuoso y a la vez resonar con el lenguaje teológico de «Señor». Mantener «Señor» en ambos vocativos preserva esa tensión sin cerrarla a un solo matiz social.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; preserve theological tension in contested terms'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: conserva el presente narrativo, la adición de καί, el vocativo repetido κύριε κύριε y el objeto implícito de ἄνοιξον ἡμῖν sin expandirlo en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en vocativo directo, coherente con el tratamiento doctrinal del término en contextos de parábola.
  - Se evita introducir «puerta» en el cuerpo del versículo, porque no aparece en el griego; la aclaración queda en nota.
  - El estilo es sobrio y publicable, con puntuación española y comillas angulares para el discurso directo.
