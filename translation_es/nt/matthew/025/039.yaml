review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura interrogativa y el sentido general del griego: πότε δέ σε εἴδομεν ἀσθενοῦντα ἢ ἐν φυλακῇ se transmite fielmente como «¿Y cuándo te vimos enfermo o en la cárcel...?». Sin embargo, ἤλθομεν πρός σε significa más directamente «vinimos/fuimos a ti» o «fuimos a ti», no «fuimos a verte», que añade explícitamente el propósito de ver. La nota inglesa preserva precisamente esa distinción frente a la lectura interpretativa «visit you», por lo que el español principal debe ceñirse más a la expresión de movimiento.'
  spanish_quality_summary: El español es claro y natural, pero «fuimos a verte» suaviza en exceso la literalidad defendida por la auditoría POB. Una solución como «fuimos a ti» suena algo rígida; «fuimos a ti» es fiel pero menos idiomática. «Vinimos a ti» también suena bíblico pero menos natural en español contemporáneo. La mejor reparación mínima y digna es «fuimos a ti», con nota que preserve «a verte» o «visitarte» como alternativas idiomáticas/interpretativas.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Enfermo» para ἀσθενοῦντα y «en la cárcel» para ἐν φυλακῇ son adecuados. El punto clave es respetar la decisión léxica auditada de no convertir ἤλθομεν πρός σε en «visitarte» ni en una formulación española que explicite más de lo que dice el griego.
  issues:
  - severity: medium
    issue: «fuimos a verte» añade una idea no explícita en ἤλθομεν πρός σε
    rationale: El griego expresa movimiento hacia la persona («vinimos/fuimos a ti»), no el acto específico de verla. La auditoría inglesa subraya justamente esa contención semántica frente a «visit you».
  - severity: low
    issue: La nota actual mezcla dos alternativas y deja como principal una formulación menos literal
    rationale: Si el texto principal se corrige a una expresión de movimiento, la nota puede ordenar mejor las alternativas idiomáticas («a verte», «visitarte») y explicar que el griego dice más literalmente «venir/ir a ti».
  revised_spanish_text: ¿Y cuándo te vimos enfermo o en la cárcel y fuimos a ti?[a]
  revised_footnotes:
  - marker: a
    text: O «a verte» o «visitarte». El griego dice más literalmente «venir a ti» o «ir a ti».
    reason: lexical_alternative
