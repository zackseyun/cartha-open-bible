translation:
  language: es
  text: ¿Y cuándo te vimos enfermo o en la cárcel y fuimos a ti?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a verte» o «visitarte». El griego dice más literalmente «venir a ti» o «ir a ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: ¿Y cuándo
  alternatives_spanish:
  - ¿Cuándo
  lexicon: BDAG
  rationale: πότε pregunta por el tiempo de la acción; «cuándo» es el equivalente natural en español. Se mantiene el conector inicial «Y» para reflejar δέ como enlace suave en la secuencia de preguntas.
- source_word: δέ
  english_pob_choice: and
  chosen_spanish: Y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector leve, no como oposición fuerte. «Y» conserva ese enlace discursivo sin introducir contraste que el griego no exige.
- source_word: εἴδομεν
  english_pob_choice: did we see
  chosen_spanish: vimos
  alternatives_spanish:
  - hemos visto
  lexicon: BDAG
  rationale: El aoristo indicativo se vierte con pretérito simple en español. En interrogación directa, «vimos» es natural y conserva la referencia pasada.
- source_word: ἀσθενοῦντα
  english_pob_choice: sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - enferma
  - débil
  - enfermo de salud
  lexicon: BDAG
  rationale: El participio presente describe a una persona con enfermedad física en este contexto. «Enfermo» es la forma más clara y sobria en español; «débil» sería demasiado amplio.
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - en prisión
  - encarcelado
  lexicon: BDAG
  rationale: φυλακή aquí denota un lugar de confinamiento. «En la cárcel» es plenamente idiomático en español y comunica el sentido básico sin perder formalidad; «en prisión» sería una alternativa más técnica.
- source_word: ἤλθομεν πρός σε
  english_pob_choice: come to you
  chosen_spanish: fuimos a verte
  alternatives_spanish:
  - vinimos a ti
  - te fuimos a ver
  lexicon: BDAG
  rationale: La frase griega es literalmente «vinimos a ti / fuimos hacia ti». En español, «fuimos a verte» expresa con claridad el movimiento hacia la persona, manteniendo la transparencia del acto sin introducir el verbo interpretativo «visitar» como forma principal. La lectura alternativa «te fuimos a ver» preserva todavía más el valor direccional del griego, pero suena menos natural.
theological_decisions:
- issue: Si ἤλθομεν πρός σε debe traducirse como «visitarte» o con una expresión más literal de movimiento hacia la persona
  english_pob_reading: come to you
  chosen_spanish_reading: fuimos a verte
  alternative_spanish_readings:
  - visitarte
  - vinimos a ti
  rationale: La POB inglesa opta por «come to you» para no cargar el verbo con la especificidad de una visita formal. En español, «fuimos a verte» conserva la idea básica de acercarse a la persona y evita introducir «visitar» como si estuviera explícito en el griego, aunque «visitarte» sigue siendo una posibilidad interpretativa secundaria.
  doctrine_reference: 'Translation philosophy: original-language primacy and restraint against paraphrase beyond the source.'
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego directamente y armoniza con la decisión auditada de la POB inglesa de mantener la expresión de movimiento como lectura principal, preservando la alternativa interpretativa de ‘visitar’ en nota.
  spanish_consistency_notes:
  - Se usó un español neutral y solemne, adecuado para lectura eclesial amplia.
  - Se preservó el orden interrogativo natural del español sin forzar calcos sintácticos del griego.
  - «Enfermo» y «en la cárcel» mantienen la claridad contextual del paralelismo del pasaje.
  - La nota recoge la alternativa semántica documentada por la POB inglesa sin desplazarla al texto principal.
