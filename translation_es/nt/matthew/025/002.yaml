- from: Y cinco de ellas eran insensatas, y cinco sensatas.
  to: Y cinco de ellas eran necias, y cinco eran prudentes.
  rationale: Se ajusta el contraste léxico para reflejar mejor μωραί / φρόνιμοι en el contexto de la parábola y para lograr un español más natural y eclesialmente reconocible. También se explicita el segundo 'eran' para mayor claridad y mejor cadencia sin alterar el sentido fuente.
