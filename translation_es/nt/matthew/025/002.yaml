translation:
  language: es
  text: Y cinco de ellas eran necias, y cinco eran prudentes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πέντε
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - cinco
  lexicon: BDAG
  rationale: Número cardinal directo; se conserva la repetición para reflejar el paralelismo y el contraste del griego.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ enlaza la frase de manera suave más que adversativa; 'y' mantiene la conexión narrativa sin forzar contraste adicional.
- source_word: ἐξ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: de ellas
  alternatives_spanish:
  - de entre ellas
  - entre ellas
  lexicon: BDAG
  rationale: La expresión partititiva señala que cinco pertenecen al grupo ya mencionado. En español, 'de ellas' comunica esa pertenencia de forma natural y concordante con el referente femenino plural implícito.
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  lexicon: BDAG
  rationale: El imperfecto de εἰμί funciona como copulativo descriptivo; 'eran' reproduce bien ese estado característico en español.
- source_word: μωραὶ
  english_pob_choice: foolish
  chosen_spanish: insensatas
  alternatives_spanish:
  - necias
  - fatuas
  lexicon: BDAG
  rationale: μωρός expresa falta de prudencia o sentido. 'Insensatas' evita una rusticidad innecesaria y mantiene el valor de juicio moral/cognitivo, mientras conserva el contraste con 'sensatas'.
- source_word: φρόνιμοι
  english_pob_choice: wise
  chosen_spanish: sensatas
  alternatives_spanish:
  - prudentes
  - sabias
  lexicon: BDAG
  rationale: φρόνιμος puede significar sabio, prudente o sensato. 'Sensatas' funciona bien como antítesis de 'insensatas' en español y preserva el matiz de juicio práctico del término.
theological_decisions:
- issue: Contraste moral entre dos grupos de vírgenes/acompañantes en la parábola
  english_pob_reading: foolish ... wise
  chosen_spanish_reading: insensatas ... sensatas
  alternative_spanish_readings:
  - necias ... prudentes
  - fatuas ... sabias
  rationale: No se introduce contenido doctrinal ajeno; se conserva el contraste caracterizador de la parábola. La pareja 'insensatas/sensatas' mantiene la oposición moral-práctica con buena naturalidad en español.
  doctrine_reference: Mateo 25:1-13; sabiduría práctica en literatura sapiencial
- issue: Elipsis del segundo miembro del paralelismo
  english_pob_reading: and five were wise
  chosen_spanish_reading: y cinco sensatas
  alternative_spanish_readings:
  - y cinco eran sensatas
  - y cinco eran prudentes
  rationale: El griego omite de nuevo el verbo en la segunda cola; en español también puede omitirse para conservar la concisión y el paralelismo. La idea verbal queda suficientemente implícita por el contexto.
  doctrine_reference: Sintaxis del paralelismo semítico/grecizante en narración bíblica
translation_notes:
  revision_awareness: 'Coincide con el texto griego SBLGNT y con la solución inglesa auditada: partitivo simple, enlace suave de δέ, y doble contraste adjetival sin expansión interpretativa. No se registran revisiones aplicadas en el contexto inglés.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra convención ajena porque no hay aquí el tetragrámaton ni κύριος divino.
  - Se prefirió 'sensatas' sobre 'sabias' para lograr una antítesis más transparente con 'insensatas' y respetar el tono proverbial de la escena.
  - Se omitió una repetición explícita de 'eran' en el segundo miembro porque el griego también elide el verbo y el español lo tolera naturalmente.
