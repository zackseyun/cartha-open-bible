review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: cinco como subconjunto del grupo previo, copulativo descriptivo en imperfecto, y contraste entre μωραί y φρόνιμοι. Sin embargo, la pareja ''insensatas / sensatas'' atenúa el contraste tradicional y semántico de ''foolish / wise'' y reduce φρόνιμος a mera sensatez, cuando en esta parábola el contraste apunta más naturalmente a ''necias'' frente a ''prudentes'' o ''sabias''. Además, la elipsis del segundo verbo es posible en español, pero aquí ''y cinco sensatas'' suena algo recortado.'
  spanish_quality_summary: El español es comprensible, pero 'insensatas ... sensatas' suena demasiado simétrico y algo moderno/psicologizante para un registro bíblico digno. 'Necias ... prudentes' lee con más naturalidad e inteligibilidad eclesial amplia, preservando mejor el tono parabólico. También conviene explicitar 'eran' en el segundo miembro para una cadencia más natural en español.
  glossary_alignment: 'No hay términos de glosario mayor involucrados. A nivel léxico, la revisión mejora la alineación con las decisiones auditadas en inglés: μωραί no se reduce solo a ''insensatas'', y φρόνιμοι se acerca mejor con ''prudentes'' que con ''sensatas''.'
  issues:
  - severity: medium
    issue: μωραὶ traducido como 'insensatas'
    rationale: Aunque posible, 'insensatas' debilita el matiz más fuerte y más tradicional de falta de juicio propio de μωραί en esta parábola. 'Necias' refleja mejor el contraste bíblico establecido.
  - severity: medium
    issue: φρόνιμοι traducido como 'sensatas'
    rationale: '''Sensatas'' comunica parte del sentido, pero φρόνιμοι en este contexto parabólico apunta más claramente a prudencia práctica. ''Prudentes'' es más preciso y natural.'
  - severity: low
    issue: Elipsis en 'y cinco sensatas'
    rationale: La omisión de 'eran' es gramaticalmente posible, pero en español esta frase queda menos fluida que 'y cinco eran prudentes', especialmente en un texto bíblico leído en voz alta.
  revised_spanish_text: Y cinco de ellas eran necias, y cinco eran prudentes.
  revision_rationale: Se ajusta el contraste léxico para reflejar mejor μωραί / φρόνιμοι en el contexto de la parábola y para lograr un español más natural y eclesialmente reconocible. También se explicita el segundo 'eran' para mayor claridad y mejor cadencia sin alterar el sentido fuente.
