translation:
  language: es
  text: Entonces se levantaron todas aquellas vírgenes y prepararon sus lámparas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antorchas» para λαμπάδας; el término puede referirse a una fuente de luz llevada en la mano, y el contexto de aceite y preparación permite ambas posibilidades.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Y entonces
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata. «Entonces» conserva el valor temporal y fluye con naturalidad en español bíblico moderno.
- source_word: ἠγέρθησαν
  english_pob_choice: got up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: BDAG
  rationale: En este contexto el verbo indica incorporarse desde el reposo o el sueño. «Se levantaron» es la forma más natural y fiel al movimiento descrito.
- source_word: πᾶσαι αἱ παρθένοι ἐκεῖναι
  english_pob_choice: all those virgins
  chosen_spanish: todas aquellas vírgenes
  alternatives_spanish:
  - todas aquellas jóvenes
  - todas aquellas doncellas
  lexicon: BDAG
  rationale: «Vírgenes» conserva la especificidad léxica de παρθένοι y encaja con el marco nupcial de la parábola. «Jóvenes» o «doncellas» suavizarían o arcaizarían el término.
- source_word: ἐκόσμησαν
  english_pob_choice: trimmed
  chosen_spanish: prepararon
  alternatives_spanish:
  - aderezaron
  - arreglaron
  - prepararon sus lámparas
  lexicon: BDAG
  rationale: El verbo puede significar ordenar o poner en condición adecuada. En español, «prepararon» comunica el sentido funcional del gesto respecto de las lámparas sin forzar una imagen técnica que podría sonar extraña.
- source_word: τὰς λαμπάδας
  english_pob_choice: lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus antorchas
  lexicon: BDAG
  rationale: λαμπάς puede referirse a una lámpara o a una antorcha. Dado el contexto inmediato de aceite y preparación, «lámparas» es una traducción legítima y natural; se mantiene la posibilidad alternativa en nota.
- source_word: ἑαυτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - propias
  lexicon: BDAG
  rationale: El genitivo reflexivo plural expresa posesión; en español basta «sus». «Propias» sería más enfático de lo requerido por el contexto.
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene alta concordancia y no requiere revisión sustantiva; se conserva la secuencia narrativa, el valor léxico de παρθένοι y la ambigüedad razonable de λαμπάς mediante nota.
  spanish_consistency_notes:
  - Se mantiene «vírgenes» para παρθένοι por consistencia con el valor léxico documentado y el contexto matrimonial de la parábola.
  - Se usa «lámparas» en el texto principal y se preserva la alternativa «antorchas» en nota, siguiendo la tensión léxica señalada en el audit trail.
  - «Prepararon» reproduce en español el sentido contextual de κοσμέω sin imponer un tecnicismo innecesario como «tricaron» o «aderezaron» en el texto principal.
  - La puntuación y el orden reflejan el avance narrativo inmediato del griego con estilo natural en español bíblico contemporáneo.
