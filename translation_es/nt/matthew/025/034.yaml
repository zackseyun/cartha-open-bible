  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del griego: «Entonces», «el Rey», la invitación imperativa, «hereden», «el reino preparado para ustedes» y la conexión de «desde la fundación del mundo» con el reino preparado. Sin embargo, las notas al pie están desancladas/mal ubicadas respecto a las alternativas documentadas en el inglés POB: la nota sobre «los bendecidos de mi Padre» debe anclarse en «bendecidos por mi Padre», y la nota sobre «desde/la fundación del mundo» debe anclarse en esa frase final, no en «a su derecha».'
  spanish_quality_summary: El español es claro, natural y de registro digno. Hay, no obstante, una ligera torpeza en «Vengan, ustedes, los bendecidos...», que puede simplificarse a una forma más fluida sin perder fidelidad. «a los que están a su derecha» es correcto, aunque «a los de su derecha» suena algo más conciso; no es necesario cambiarlo. La principal reparación necesaria es la colocación correcta de las notas y una leve mejora de fluidez en el vocativo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Rey», «Padre», «reino» y «bendecidos» están alineados con el griego y con las decisiones auditadas. No aparece ninguna de las entradas terminológicas sensibles del proyecto que requieran ajuste especial.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas a frases incorrectas.
    rationale: La nota [a] en el inglés POB explica la alternativa más literal de «you who are blessed by my Father»; en español debe ir sobre «bendecidos por mi Padre», no sobre «a su derecha». La nota [b] corresponde a «from/since the foundation of the world» y debe anclarse en la frase final, no en «por mi Padre».
  - severity: low
    issue: La redacción «Vengan, ustedes, los bendecidos...» suena algo rígida en español.
    rationale: Aunque es comprensible, «Vengan, bendecidos por mi Padre» mantiene mejor el tono solemne y el vocativo natural en español sin añadir ni quitar sentido.
  - severity: low
    issue: El texto de la nota [b] repite la lectura principal en vez de ofrecer una alternativa real.
    rationale: La decisión inglesa distingue «from» y la alternativa «since». En español, si el texto principal usa «desde», la alternativa debe diferenciarse, por ejemplo «desde la creación del mundo» o una nota explicativa sobre el matiz. Como el proyecto pide preservar alternativas significativas, conviene reflejar una alternativa española genuina que corresponda al contraste documentado.
  revised_spanish_text: 'Entonces el Rey dirá a los que están a su derecha: «Vengan, bendecidos por mi Padre[a]; hereden el reino preparado para ustedes desde la fundación del mundo[b]».'
