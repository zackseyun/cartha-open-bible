translation:
  language: es
  text: 'Entonces el Rey dirá a los que están a su derecha: «Vengan, bendecidos por mi Padre[a]; hereden el reino preparado para ustedes desde la fundación del mundo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «los bendecidos de mi Padre».
    reason: lexical_alternative
  - marker: b
    text: O, «desde la creación del mundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca la secuencia del juicio; «Entonces» es natural en español y conserva el valor narrativo.
- source_word: ἐρεῖ
  english_pob_choice: will say
  chosen_spanish: dirá
  alternatives_spanish:
  - hablará
  - va a decir
  lexicon: BDAG
  rationale: Futuro de λέγω en discurso directo; «dirá» es la forma más directa y sobria en español.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - el rey
  lexicon: BDAG
  rationale: Título definido en contexto. Se capitaliza como título personal del juez escatológico, no como sustantivo genérico.
- source_word: τοῖς ἐκ δεξιῶν αὐτοῦ
  english_pob_choice: to those on his right
  chosen_spanish: a los que están a su derecha
  alternatives_spanish:
  - a los que están a su mano derecha
  - a los de su derecha
  lexicon: BDAG
  rationale: La expresión idiomática señala el grupo colocado al lado derecho del rey; «a su derecha» conserva el sentido espacial y honorífico con naturalidad en español.
- source_word: Δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan acá
  - Pasen
  lexicon: BDAG
  rationale: Imperativo de invitación solemne. En español, el plural «Vengan» corresponde al plural del griego y mantiene el tono de convocatoria.
- source_word: οἱ εὐλογημένοι
  english_pob_choice: you who are blessed
  chosen_spanish: los bendecidos
  alternatives_spanish:
  - los benditos
  - ustedes, los bendecidos
  lexicon: BDAG
  rationale: Participio pasivo sustantivado. «Bendecidos» preserva la voz pasiva y evita sustituirla por un término más interpretativo; el vocativo se hace explícito por el contexto.
- source_word: τοῦ πατρός μου
  english_pob_choice: by my Father
  chosen_spanish: por mi Padre
  alternatives_spanish:
  - de mi Padre
  - de parte de mi Padre
  lexicon: BDAG
  rationale: El genitivo con εὐλογημένοι expresa fuente/agencia de la bendición; «por mi Padre» comunica esa procedencia sin volver la frase rígidamente literal.
- source_word: κληρονομήσατε
  english_pob_choice: inherit
  chosen_spanish: hereden
  alternatives_spanish:
  - reciban como herencia
  - tomen posesión de
  lexicon: BDAG
  rationale: Imperativo aoristo de κληρονομέω. «Hereden» conserva la fuerza jurídica y familiar de la herencia mejor que un simple «reciban».
- source_word: τὴν ... βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reino real
  - la realeza
  lexicon: BDAG
  rationale: En este contexto de herencia escatológica, «reino» es el equivalente más claro y fiel en español para βασιλεία.
- source_word: ἡτοιμασμένην ὑμῖν
  english_pob_choice: prepared for you
  chosen_spanish: preparado para ustedes
  alternatives_spanish:
  - hecho listo para ustedes
  - preparado para vosotros
  lexicon: BDAG
  rationale: Participio perfecto pasivo que indica una preparación ya realizada con resultado vigente. «Preparado para ustedes» es idiomático y transparente.
- source_word: ἀπὸ καταβολῆς κόσμου
  english_pob_choice: from the foundation of the world
  chosen_spanish: desde la fundación del mundo
  alternatives_spanish:
  - desde la creación del mundo
  - desde el principio del mundo
  lexicon: BDAG
  rationale: Expresión idiomática bíblica estable; «desde» refleja bien ἀπό y mantiene la relación temporal directa con la preparación del reino.
theological_decisions:
- issue: Relación del participio εὐλογημένοι con el genitivo τοῦ πατρός μου
  english_pob_reading: '"you who are blessed by my Father"; alternative "you blessed of my Father"'
  chosen_spanish_reading: '"los bendecidos por mi Padre"'
  alternative_spanish_readings:
  - '"los benditos de mi Padre"'
  - '"ustedes, bendecidos por mi Padre"'
  rationale: Se conserva la idea de bendición proveniente del Padre sin ocultar la construcción griega. «Por mi Padre» hace explícita la fuente/agencia, mientras que «bendecidos» mantiene el pasivo del participio.
  doctrine_reference: Translation philosophy §6 (claridad moderna sin perder el valor gramatical)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; este borrador conserva la sintaxis y las decisiones léxicas centrales del audit trail inglés, adaptándolas a un español natural y públicamente legible.
  spanish_consistency_notes:
  - Se mantiene «Rey» con mayúscula como título personal coherente con el inglés POB.
  - Se usa «reino» para βασιλεία, en línea con la decisión inglesa, evitando términos más abstractos como «reinado» que debilitarían el matiz de herencia.
  - La frase final se vincula a «preparado» y no a toda la invitación, siguiendo la lectura sintáctica más cercana del griego.
  - «Por mi Padre» conserva la agencia de la bendición sin introducir una paráfrasis doctrinal.
  - El plural español de trato formal «ustedes» se usa por concordancia con el plural griego y por registro reverente.
