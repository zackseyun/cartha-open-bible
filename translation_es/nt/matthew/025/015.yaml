translation:
  language: es
  text: Y a uno le dio cinco talentos[a], a otro dos, y a otro uno, a cada uno según su propia capacidad[b]; y se fue inmediatamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sumas grandes de dinero»; un talento era una unidad monetaria muy grande, no una habilidad natural o destreza personal.
    reason: lexical_alternative
  - marker: b
    text: O «según la capacidad de cada uno».
    reason: lexical_alternative
lexical_decisions:
- source_word: τάλαντα
  english_pob_choice: talents
  chosen_spanish: talentos
  alternatives_spanish:
  - sumas grandes de dinero
  - talentos monetarios
  lexicon: BDAG
  rationale: En este contexto la palabra designa una unidad monetaria/ponderal muy grande, no una habilidad innata. «Talentos» conserva el término histórico y evita confundirlo con talento en sentido moderno de capacidad personal. La nota preserva la aclaración semántica.
- source_word: ᾧ μὲν ... ᾧ δὲ ... ᾧ δὲ
  english_pob_choice: to one ... to another ... and to another
  chosen_spanish: a uno ... a otro ... y a otro
  alternatives_spanish:
  - a uno ... a uno ... a uno
  - a uno ... al siguiente ... y al siguiente
  lexicon: BDAG
  rationale: La construcción distributiva marca destinatarios diferenciados. «A uno ... a otro ... y a otro» reproduce con naturalidad el contraste de μέν/δέ en español y mantiene la progresión del reparto.
- source_word: ἕν
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un talento
  - uno de los talentos
  lexicon: BDAG
  rationale: El sustantivo «talentos» queda implícito por el contexto inmediato, como en la traducción inglesa. En español, «uno» funciona de modo natural y no añade repetición innecesaria.
- source_word: ἑκάστῳ
  english_pob_choice: to each
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada persona
  - a cada cual
  lexicon: BDAG
  rationale: El dativo distributivo se expresa con claridad y naturalidad como «a cada uno», preservando el valor de distribución individual de la frase.
- source_word: κατὰ τὴν ἰδίαν δύναμιν
  english_pob_choice: according to his own ability
  chosen_spanish: según su propia capacidad
  alternatives_spanish:
  - según su propia habilidad
  - conforme a su propia capacidad
  lexicon: BDAG
  rationale: δύναμις aquí alude a capacidad o aptitud personal, no a poder milagroso. «Capacidad» evita el sesgo moderno de «talento» como dote artística y conserva el sentido de medida proporcional.
- source_word: ἀπεδήμησεν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se ausentó
  lexicon: BDAG
  rationale: El verbo significa irse o marcharse; en este contexto el matiz de viaje puede inferirse, pero la forma breve «se fue» es fiel y natural en español. La oración siguiente mantiene el adverbio de inmediatez.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: BDAG
  rationale: El adverbio modifica con precisión la salida del personaje. «Inmediatamente» es claro, formal y adecuado para un registro bíblico contemporáneo.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Luego
  lexicon: BDAG
  rationale: Se mantiene la conexión narrativa sin introducir matiz interpretativo adicional.
theological_decisions:
- issue: Naturaleza de ταλάντα en la parábola
  english_pob_reading: talents as monetary units
  chosen_spanish_reading: talentos como unidades monetarias
  alternative_spanish_readings:
  - talentos como habilidades
  - sumas grandes de dinero
  rationale: El contexto trata de bienes confiados para administración, no de capacidades innatas. Por eso el texto principal conserva «talentos» como término técnico con valor monetario, y la nota evita que el lector lo entienda como “dones” personales.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Representación del sujeto distributivo singular
  english_pob_reading: his own ability
  chosen_spanish_reading: su propia capacidad
  alternative_spanish_readings:
  - su propia habilidad
  - su propia capacidad, o la de cada uno
  rationale: El griego usa formas singulares con fuerza distributiva. El español permite mantener el singular representativo sin forzar pluralización. «Su» conserva la fluidez y no añade información ajena al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés están en fuerte acuerdo sobre el reparto distributivo, el valor monetario de τάλαντα y el sentido de δύναμις como capacidad personal. La revisión más reciente no introdujo cambios, y la versión española refleja esa estabilidad textual sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se usa «talentos» en sentido monetario técnico, no como habilidades personales.
  - Se mantiene la secuencia distributiva «a uno ... a otro ... y a otro» para reproducir el contraste del griego.
  - «Capacidad» se eligió para δύναμις por claridad contextual y por coherencia con el audit trail inglés.
  - El adverbio final se coloca en español al final de la cláusula principal, conservando su función de modificar la partida inmediata.
