translation:
  language: es
  text: 'Pero su amo respondió y le dijo: «Siervo[a] malo y perezoso, ¿sabías que siego donde no sembré y recojo donde no esparcí[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavo». El griego doulos puede significar «siervo» o «esclavo», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Sabías que siego donde no sembré y recojo donde no esparcí». El griego puede leerse como una afirmación, no como una pregunta retórica.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ κύριος αὐτοῦ
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su maestro
  lexicon: BDAG
  rationale: En esta escena parabólica, κύριος designa la relación de autoridad del dueño sobre el siervo. En español, «señor» conserva esa relación jerárquica sin forzar el registro moderno de «amo», y evita el título cristológico que aquí no es el sentido principal.
- source_word: Πονηρὲ
  english_pob_choice: Wicked
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - perverso
  lexicon: BDAG
  rationale: πονηρός expresa una evaluación moral negativa. «Malo» es el equivalente más natural y público en español; «malvado» o «perverso» intensifican el juicio, pero pueden sonar más interpretativos que el griego en este contexto.
- source_word: δοῦλε
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - esclavo
  - criado
  lexicon: BDAG
  rationale: Aunque δοῦλος puede significar «esclavo», en este verso la POB inglesa opta por «servant» para el flujo narrativo y la función de responsabilidad encomendada. «Siervo» mantiene esa relación subordinada con dignidad idiomática en español; la alternativa «esclavo» se preserva como posibilidad lexical legítima.
- source_word: ὀκνηρέ
  english_pob_choice: lazy
  chosen_spanish: perezoso
  alternatives_spanish:
  - holgazán
  - ocioso
  lexicon: BDAG
  rationale: ὀκνηρός denota desgana para actuar o indolencia. «Perezoso» comunica bien el rasgo moral y conductual en español moderno, sin sonar tan coloquial como «holgazán».
- source_word: ᾔδεις
  english_pob_choice: you knew
  chosen_spanish: sabías
  alternatives_spanish:
  - tú sabías
  - conocías
  lexicon: BDAG
  rationale: La forma verbal expresa conocimiento asumido por el amo en la réplica. «Sabías» es la opción natural en español; «conocías» sería posible, pero menos idiomática aquí.
- source_word: θερίζω
  english_pob_choice: I reap
  chosen_spanish: siego
  alternatives_spanish:
  - siego y recojo
  - cosecho
  lexicon: BDAG
  rationale: El verbo agrícola básico es θερίζω. «Siego» conserva la imagen de la siega y la correspondencia con «sembré»; «cosecho» sería comprensible, pero diluye la metáfora de siega/siembra presente en el griego.
- source_word: ὅπου οὐκ ἔσπειρα
  english_pob_choice: where I did not sow
  chosen_spanish: donde no sembré
  alternatives_spanish:
  - donde no he sembrado
  - en donde no sembré
  lexicon: BDAG
  rationale: 'La cláusula de lugar con aoristo se expresa de forma simple y directa en español con pretérito perfecto simple: «no sembré».'
- source_word: συνάγω
  english_pob_choice: gather
  chosen_spanish: recojo
  alternatives_spanish:
  - junto
  - reúno
  lexicon: BDAG
  rationale: En el paralelismo agrícola, συνάγω no solo es «reunir» sino recoger lo producido. «Recojo» preserva la relación con la siega y la siembra, y suena natural en español.
- source_word: ὅθεν οὐ διεσκόρπισα
  english_pob_choice: where I did not scatter
  chosen_spanish: donde no esparcí
  alternatives_spanish:
  - donde no dispersé
  - donde no regué
  lexicon: BDAG
  rationale: διασκορπίζω significa «dispersar/esparcir». «Esparcí» es el equivalente más directo y mantiene la ambigüedad agrícola sin introducir «semilla» que no está en el griego.
theological_decisions:
- issue: Valor de δοῦλος en una escena de autoridad parabólica
  english_pob_reading: The Greek word doulos can mean either 'servant' or 'slave,' depending on context.
  chosen_spanish_reading: δοῦλος puede traducirse como «siervo» o «esclavo», según el contexto.
  alternative_spanish_readings:
  - δοῦλος también puede entenderse como «esclavo»
  - δοῦλος admite el matiz de «sirviente»
  rationale: La POB inglesa preserva la tensión lexical sin resolverla de manera absoluta. En español, «siervo» funciona bien en el registro narrativo y mantiene la subordinación; la nota conserva «esclavo» como alternativa legítima para no borrar la fuerza del término griego.
  doctrine_reference: Mantener la tensión lexical sobre estatus y autoridad; no suavizar el trasfondo social del texto.
- issue: 'Fuerza del cierre: pregunta retórica o afirmación'
  english_pob_reading: The Greek may be read as a statement rather than a rhetorical question.
  chosen_spanish_reading: El griego también puede leerse como una afirmación, no solo como pregunta retórica.
  alternative_spanish_readings:
  - 'Puede leerse: «Sabías que siego donde no sembré y recojo donde no esparcí».'
  - Puede entenderse como una pregunta retórica con sentido irónico.
  rationale: El griego permite ambas lecturas y la POB inglesa conserva esa tensión con una nota. En español, el interrogativo se mantiene en el texto principal por su naturalidad discursiva, mientras la nota preserva la lectura alternativa afirmativa sin cerrarla.
  doctrine_reference: Preservar la tensión interpretativa y no resolver el matiz del griego donde el texto lo deja abierto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó «seed» por no estar en el griego; por eso la línea española dice simplemente «donde no esparcí», sin añadir objeto implícito. También se conservó la posibilidad interpretativa del final como pregunta retórica en el texto principal, con nota para la lectura afirmativa alternativa.
  spanish_consistency_notes:
  - Se usó «siervo» en el texto principal por fluidez y por el patrón de la POB inglesa, pero se preservó «esclavo» en nota por fidelidad lexical.
  - «Señor» se emplea como equivalente relacional de κύριος en este contexto parabólico, no como título divino.
  - Se evitó introducir «semilla» o «seed» en español, siguiendo la revisión auditada del inglés y el griego.
  - El paralelismo agrícola se mantuvo con «siego / sembré / recojo / esparcí» para conservar la imagen del original.
