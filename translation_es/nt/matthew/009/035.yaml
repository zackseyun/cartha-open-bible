translation:
  language: es
  text: Y Jesús recorría todas las ciudades y aldeas, enseñando en sus sinagogas y proclamando las buenas noticias del reino[a], y sanando toda enfermedad y toda dolencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «evangelio del reino».
    reason: lexical_alternative
  - marker: b
    text: O «toda debilidad» o «toda infirmidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: περιῆγεν
  english_pob_choice: went throughout
  chosen_spanish: recorría
  alternatives_spanish:
  - iba por
  - andaba por
  - anduvo por
  lexicon: BDAG
  rationale: El imperfecto griego marca una actividad continua e itinerante. «Recorría» conserva ese movimiento sostenido con naturalidad en español, sin volverlo una paráfrasis.
- source_word: τὰς πόλεις πάσας καὶ τὰς κώμας
  english_pob_choice: all the cities and villages
  chosen_spanish: todas las ciudades y aldeas
  alternatives_spanish:
  - todas las ciudades y pueblos
  - todas las ciudades y villas
  lexicon: BDAG
  rationale: Mantiene la distinción entre centros urbanos grandes y asentamientos menores. «Aldeas» comunica bien κώμαι en español bíblico contemporáneo.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - instruyendo
  lexicon: BDAG
  rationale: El participio presente conserva acción en curso coordinada con las demás acciones de Jesús. «Enseñando» es directo y fiel.
- source_word: ἐν ταῖς συναγωγαῖς αὐτῶν
  english_pob_choice: their synagogues
  chosen_spanish: en sus sinagogas
  alternatives_spanish:
  - en las sinagogas de ellos
  - en las sinagogas
  lexicon: BDAG
  rationale: «Sinagogas» conserva el término histórico-religioso. «Sus» reproduce naturalmente αὐτῶν y mantiene la referencia a las comunidades locales.
- source_word: κηρύσσων τὸ εὐαγγέλιον τῆς βασιλείας
  english_pob_choice: proclaiming the good news of the kingdom
  chosen_spanish: proclamando el buen mensaje del reino
  alternatives_spanish:
  - proclamando las buenas nuevas del reino
  - predicando el evangelio del reino
  lexicon: BDAG
  rationale: «Buen mensaje» expresa el sentido básico de εὐαγγέλιον sin imponer de entrada el tecnicismo eclesiástico «evangelio». «Del reino» conserva el genitivo de manera sobria.
- source_word: θεραπεύων
  english_pob_choice: healing
  chosen_spanish: sanando
  alternatives_spanish:
  - curando
  - sanando
  lexicon: BDAG
  rationale: En contexto de milagros, θεραπεύω se refiere a restaurar la salud. «Sanando» suena natural en español y conserva el carácter activo de la acción.
- source_word: πᾶσαν νόσον
  english_pob_choice: every disease
  chosen_spanish: toda enfermedad
  alternatives_spanish:
  - toda dolencia
  - toda enfermedad
  lexicon: BDAG
  rationale: «Enfermedad» traduce bien νόσος y mantiene su fuerza general. El artículo distributivo de πᾶσαν se refleja con «toda».
- source_word: πᾶσαν μαλακίαν
  english_pob_choice: every sickness
  chosen_spanish: toda dolencia
  alternatives_spanish:
  - toda debilidad
  - toda dolencia
  - toda enfermedad
  lexicon: BDAG
  rationale: μαλακία puede significar debilidad, dolencia o enfermedad. «Dolencia» ayuda a diferenciarla de νόσος y preserva la amplitud del término sin fijarlo excesivamente.
theological_decisions:
- issue: Renderizado de εὐαγγέλιον
  english_pob_reading: good news
  chosen_spanish_reading: buen mensaje
  alternative_spanish_readings:
  - evangelio
  - buenas nuevas
  rationale: Se eligió una expresión transparente y comprensible que comunica el contenido de la proclamación sin depender del tecnicismo eclesiástico. No cambia el sentido teológico del anuncio del reino.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish; avoid unnecessary ecclesiastical jargon)
- issue: Alcance total de la sanidad en πᾶσαν νόσον καὶ πᾶσαν μαλακίαν
  english_pob_reading: every disease and every sickness
  chosen_spanish_reading: toda enfermedad y toda dolencia
  alternative_spanish_readings:
  - toda enfermedad y toda enfermedad
  - toda enfermedad y toda debilidad
  rationale: Se conserva la repetición de πᾶσαν con «toda ... y toda ...» para reflejar el alcance integral de la afirmación. La distinción léxica evita borrar la diferencia entre νόσος y μαλακία.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Uso de «sinagogas»
  english_pob_reading: their synagogues
  chosen_spanish_reading: sus sinagogas
  alternative_spanish_readings:
  - las sinagogas de ellos
  rationale: No se sustituye por una frase genérica, porque el texto nombra una institución religiosa concreta y históricamente significativa. Mantenerla conserva la localización de la enseñanza de Jesús.
  doctrine_reference: Historical-lexical fidelity principle
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés sin depender mecánicamente del inglés. Se mantiene la estructura participial, la distinción entre πόλεις y κώμαι, el término histórico «sinagogas», el valor proclamativo de κηρύσσω y la doble fórmula de sanidad con repetición de πᾶσαν. No se registraron revisiones aplicadas en el contexto fuente, así que el draft asume el estado más reciente sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se prefiere «Mesías» solo cuando el griego lo exija como título; aquí aparece «reino», no el título mesiánico.
  - «Buen mensaje» se emplea para εὐαγγέλιον siguiendo la estrategia de transparencia semántica del proyecto, con alternativa tradicional en nota.
  - La alternancia «enfermedad / dolencia» preserva la distinción entre νόσος y μαλακία en español.
  - La puntuación y el orden de cláusulas reflejan el flujo del griego con naturalidad en español contemporáneo.
