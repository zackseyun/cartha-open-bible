    issue: «buen mensaje» para εὐαγγέλιον
    rationale: Aunque intenta reflejar el sentido no técnico, en español suena poco natural y no es la mejor equivalencia semántica para ‘good news’. «Buenas noticias» o «buenas nuevas» preserva mejor el valor lexical y la legibilidad.
  - severity: low
