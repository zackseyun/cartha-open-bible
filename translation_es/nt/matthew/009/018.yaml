translation:
  language: es
  text: 'Mientras él les hablaba estas cosas, he aquí, vino un[a] jefe y se postró ante él, diciendo: «Mi hija acaba de morir. Pero ven y pon tu mano sobre ella, y vivirá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo adoró». El verbo griego puede denotar postración reverente, homenaje o adoración según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα αὐτοῦ λαλοῦντος αὐτοῖς
  english_pob_choice: While he was saying these things to them
  chosen_spanish: Mientras él les hablaba estas cosas
  alternatives_spanish:
  - Mientras él les decía estas cosas
  - Mientras les hablaba acerca de estas cosas
  lexicon: BDAG
  rationale: El genitivo absoluto y el participio presente indican acción simultánea; en español, «Mientras él les hablaba estas cosas» mantiene esa simultaneidad con una sintaxis natural y digna.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: BDAG
  rationale: En este registro, «he aquí» conserva el valor discursivo de llamada de atención y la sensación de irrupción del relato sin sonar tan coloquial como «mirad».
- source_word: ἄρχων εἷς
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un magistrado
  - un líder
  - un oficial
  lexicon: BDAG
  rationale: ἄρχων denota una persona en autoridad. «Gobernante» comunica esa autoridad de manera amplia; como el oficio exacto no se especifica en el verso, evita precisar más de lo que el griego dice.
- source_word: ἐλθὼν
  english_pob_choice: came
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: El participio aoristo previo al verbo principal puede expresarse de forma natural con un verbo finito en español. «Se acercó» capta el movimiento hacia Jesús y encaja con la escena de súplica.
- source_word: προσεκύνει αὐτῷ
  english_pob_choice: bowed down before him
  chosen_spanish: se postró ante él
  alternatives_spanish:
  - se arrodilló ante él
  - lo adoró
  lexicon: BDAG
  rationale: προσκυνέω puede expresar postración reverente, homenaje o adoración. «Se postró ante él» preserva el acto visible de reverencia sin resolver en la traducción si el hombre entiende aquí adoración plena; por eso se evita «lo adoró» como decisión interpretativa excesiva.
- source_word: λέγων ὅτι
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio de habla se vierte de forma directa y sobria con «diciendo», que mantiene la introducción del discurso directo.
- source_word: Ἡ θυγάτηρ μου
  english_pob_choice: My daughter
  chosen_spanish: Mi hija
  alternatives_spanish:
  - Mi hijita
  lexicon: BDAG
  rationale: θυγάτηρ significa «hija». En el griego no aparece diminutivo; por eso «Mi hija» es lo más fiel y evita añadir ternura no marcada explícitamente.
- source_word: ἄρτι
  english_pob_choice: just
  chosen_spanish: acaba de
  alternatives_spanish:
  - recién
  - hace un momento
  lexicon: BDAG
  rationale: ἄρτι indica inmediatez temporal. «Acaba de» expresa esa reciente ocurrencia de forma natural en español.
- source_word: ἐτελεύτησεν
  english_pob_choice: has just died
  chosen_spanish: morir
  alternatives_spanish:
  - ha muerto
  - acabó de morir
  lexicon: BDAG
  rationale: El aoristo de τελευτάω indica la muerte como hecho concluido. En el contexto, «acaba de morir» integra ἄρτι + ἐτελεύτησεν de manera fluida y fiel al sentido de muerte reciente.
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Marca contraste entre la muerte de la hija y la petición que sigue. «Pero» es la conjunción más natural en español aquí.
- source_word: ἐλθὼν ἐπίθες
  english_pob_choice: come and lay
  chosen_spanish: ven y pon
  alternatives_spanish:
  - ven, y coloca
  - acércate y pon
  lexicon: BDAG
  rationale: La construcción de participio aoristo más imperativo se expresa idiomáticamente como dos imperativos coordinados. «Ven y pon» conserva la urgencia y la sencillez del griego.
- source_word: τὴν χεῖρά σου ἐπ’ αὐτήν
  english_pob_choice: your hand on her
  chosen_spanish: tu mano sobre ella
  alternatives_spanish:
  - tu mano encima de ella
  - tu mano sobre su cuerpo
  lexicon: BDAG
  rationale: «Tu mano sobre ella» reproduce la gestualidad sanadora con una preposición natural en español; «sobre» permite la misma imagen física del texto griego.
- source_word: καὶ ζήσεται
  english_pob_choice: and she will live
  chosen_spanish: y vivirá
  alternatives_spanish:
  - y vivirá de nuevo
  - y volverá a vivir
  lexicon: BDAG
  rationale: El futuro de ζάω expresa la expectativa de vida/restauración. «Vivirá» es breve, directo y deja intacta la fuerza milagrosa de la afirmación.
theological_decisions:
- issue: Valor de προσκυνέω frente a Jesús
  english_pob_reading: bowed down before him
  chosen_spanish_reading: se postró ante él
  alternative_spanish_readings:
  - lo adoró
  - se arrodilló ante él
  rationale: El verbo puede significar homenaje reverente o adoración, según el contexto. La traducción principal preserva la tensión teológica y narrativa describiendo la acción visible, sin cerrar prematuramente la interpretación cristológica del hombre.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: ὁ ἄρχων y la identificación del personaje
  english_pob_reading: a ruler
  chosen_spanish_reading: un gobernante
  alternative_spanish_readings:
  - un líder
  - un magistrado
  rationale: El término griego presenta autoridad, pero no especifica con precisión el cargo. Mantener una designación amplia evita introducir una identificación institucional no respaldada por el verso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal sobre «un[a]», de modo que cada marcador aparezca exactamente en la traducción. La redacción también ajusta ἰδοὺ a un registro más formal con «he aquí», en línea con la última revisión inglesa, y conserva la tensión semántica de προσκυνέω sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» sin ocurrencia en este versículo, por lo que no aplica terminología divina.
  - «Se postró» conserva el valor reverencial de προσκυνέω sin forzar «adoró» en el texto principal.
  - «Hija» traduce θυγάτηρ sin diminutivo, conforme al griego.
  - La combinación «acaba de morir» integra ἄρτι + ἐτελεύτησεν de forma natural en español.
  - «He aquí» reproduce el marcador discursivo ἰδοὺ con registro bíblico formal, coherente con la revisión auditada.
