  source_alignment_summary: 'El borrador español refleja fielmente el griego y la auditoría inglesa: el participio temporal/contemporáneo παράγοντι ἐκεῖθεν se comunica bien con «al pasar Jesús de allí»; ἠκολούθησαν αὐτῷ como «lo siguieron» preserva el seguimiento físico; δύο τυφλοὶ como «dos ciegos» es natural en español; κράζοντες καὶ λέγοντες queda adecuadamente como «clamando y diciendo»; Ἐλέησον ἡμᾶς como «Ten misericordia de nosotros» es preciso; y «Hijo de David» conserva correctamente el título mesiánico.'
