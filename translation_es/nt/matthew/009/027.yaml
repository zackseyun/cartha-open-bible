translation:
  language: es
  text: 'Y al pasar Jesús de allí, lo siguieron dos ciegos, clamando y diciendo: «¡Ten misericordia de nosotros, Hijo de David![a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijo de David» es un título real y mesiánico que identifica a Jesús como el heredero prometido de la línea de David.
    reason: cross_reference
lexical_decisions:
- source_word: παράγοντι ἐκεῖθεν
  english_pob_choice: as Jesus was passing on from there
  chosen_spanish: al pasar Jesús de allí
  alternatives_spanish:
  - mientras Jesús pasaba de allí
  - cuando Jesús pasaba de allí
  lexicon: BDAG
  rationale: El participio presente con ἐκεῖθεν expresa una acción en curso y un desplazamiento desde ese lugar. «Al pasar Jesús de allí» conserva el valor narrativo y suena natural en español sin añadir matices innecesarios.
- source_word: ἠκολούθησαν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - le siguieron
  - iban tras él
  lexicon: BDAG
  rationale: ἀκολουθέω aquí describe seguimiento físico inmediato. «Lo siguieron» es idiomático en español y mantiene la relación directa con Jesús.
- source_word: δύο τυφλοὶ
  english_pob_choice: two blind men
  chosen_spanish: dos ciegos
  alternatives_spanish:
  - dos hombres ciegos
  - dos ciegos hombres
  lexicon: BDAG
  rationale: Aunque el griego usa un adjetivo sustantivado en masculino plural, en español «dos ciegos» comunica de forma natural el sujeto implícito sin sobrecargar el texto.
- source_word: κράζοντες
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - clamando a voces
  lexicon: BDAG
  rationale: κράζω denota un clamor fuerte y urgente. «Clamando» conserva esa intensidad con un registro bíblico claro y natural.
- source_word: λέγοντες
  english_pob_choice: and saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - y exclamando
  lexicon: BDAG
  rationale: El participio introduce directamente el contenido del ruego; «y diciendo» reproduce la secuencia gramatical del griego sin añadir interpretación.
- source_word: Ἐλέησον ἡμᾶς
  english_pob_choice: Have mercy on us
  chosen_spanish: Ten misericordia de nosotros
  alternatives_spanish:
  - Ten piedad de nosotros
  - Míranos con misericordia
  lexicon: BDAG
  rationale: El imperativo de ἐλεάω pide una acción misericordiosa concreta. «Ten misericordia de nosotros» es preciso, solemne y ampliamente inteligible en español.
- source_word: υἱὲ Δαυίδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - Descendiente de David
  lexicon: BDAG
  rationale: Se conserva el título mesiánico tradicional como en el griego y en la auditoría inglesa. «Hijo de David» mantiene la carga real-mesiánica sin explicitarla en el cuerpo del versículo.
theological_decisions:
- issue: Título mesiánico «Hijo de David»
  english_pob_reading: Render as the title 'Son of David' in the main text
  chosen_spanish_reading: Mantener «Hijo de David» en el texto principal
  alternative_spanish_readings:
  - Traducirlo como «descendiente de David»
  - Explicitarlo como «Hijo mesiánico de David»
  rationale: El griego usa el título sin explicación adicional. La traducción debe preservar esa tensión y dejar que el contexto mateano identifique su sentido real y mesiánico, en vez de resolverlo con una paráfrasis.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota [a] directamente en «Hijo de David» dentro del texto español, de modo que la marca de nota corresponda exactamente al lugar donde se requiere la aclaración.
  spanish_consistency_notes:
  - Se mantuvo un registro moderno y digno, sin arcaísmos innecesarios.
  - Se preservó el título mesiánico «Hijo de David» en lugar de explicitarlo en el cuerpo del versículo.
  - La puntuación de diálogo y de cita sigue la convención española y conserva el tono reverente del pasaje.
