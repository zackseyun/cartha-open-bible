translation:
  language: es
  text: 'Porque, ¿qué es más fácil: decir: «Tus pecados te son perdonados[a]», o decir: «Levántate y camina»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tus pecados han sido perdonados». El presente pasivo griego puede entenderse con un sentido de estado resultante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γάρ ἐστιν εὐκοπώτερον
  english_pob_choice: For which is easier
  chosen_spanish: Porque, ¿qué es más fácil
  alternatives_spanish:
  - ¿Qué es más fácil?
  - Porque, ¿cuál es más fácil?
  lexicon: BDAG
  rationale: τί con el comparativo εὐκοπώτερον plantea una elección entre dos opciones; en español, «¿qué es más fácil?» comunica de forma natural la comparación. Se conserva γάρ con «Porque» para reflejar la conexión explicativa con el contexto anterior.
- source_word: εἰπεῖν
  english_pob_choice: to say
  chosen_spanish: decir
  alternatives_spanish:
  - declarar
  lexicon: BDAG
  rationale: El infinitivo de λέγω aquí es una referencia simple al acto de hablar; «decir» es la equivalencia más directa y clara en español, y se repite en ambas cláusulas por coherencia.
- source_word: Ἀφίενταί σου αἱ ἁμαρτίαι
  english_pob_choice: Your sins are forgiven
  chosen_spanish: Tus pecados son perdonados
  alternatives_spanish:
  - Tus pecados han sido perdonados
  - Tus pecados están perdonados
  lexicon: BDAG
  rationale: ἀφίενταί es presente pasivo con sentido de estado resultante posible; en español, el pasivo directo «son perdonados» mantiene la fuerza inmediata de la declaración sin forzar una resolución aspectual. «Han sido perdonados» sigue siendo viable, pero aquí se prefiere la forma más directa y menos interpretativa.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - pecados-deuda
  lexicon: BDAG
  rationale: ἁμαρτίαι se traduce de manera estándar como «pecados»; no hay indicio contextual suficiente para expandir la metáfora a una deuda.
- source_word: Ἔγειρε
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levántate de una vez
  lexicon: BDAG
  rationale: En contexto de sanidad, ἐγείρω funciona como un mandato físico. «Levántate» es natural en español y conserva el imperativo directo.
- source_word: περιπάτει
  english_pob_choice: and walk
  chosen_spanish: y camina
  alternatives_spanish:
  - y anda
  - y sigue caminando
  lexicon: BDAG
  rationale: El presente imperativo de περιπατέω expresa acción de caminar; «camina» reproduce bien el mandato sin sobrecargarlo. En este contexto, «andar» sería posible, pero menos claro para lectura amplia.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tus
  alternatives_spanish:
  - tu
  lexicon: BDAG
  rationale: El genitivo singular de segunda persona se expresa naturalmente con «tus» para concordar con «pecados» en plural.
theological_decisions:
- issue: Tiempo/aspecto del perdón declarado
  english_pob_reading: Your sins are forgiven
  chosen_spanish_reading: Tus pecados son perdonados
  alternative_spanish_readings:
  - Tus pecados han sido perdonados
  rationale: 'El griego presente pasivo admite un matiz de estado resultante, pero no obliga a una lectura más elaborada. Se conserva la tensión textual: una declaración presente y autoritativa, sin resolverla en una paráfrasis temporal más explícita.'
  doctrine_reference: Preservar la tensión teológica sin neutralizarla.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece anclado en el texto español junto a la expresión relevante, y la nota alternativa se mantiene ligada a la decisión sobre el presente pasivo griego.'
  spanish_consistency_notes:
  - Se usa «pecados» de manera uniforme para ἁμαρτίαι.
  - Se preserva la simetría retórica de las dos cláusulas con «decir».
  - Se mantiene «Levántate» como imperativo natural para Ἔγειρε.
  - No se introduce terminología eclesiástica ajena al griego del verso.
