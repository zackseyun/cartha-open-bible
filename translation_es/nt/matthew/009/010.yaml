translation:
  language: es
  text: Y mientras él estaba a la mesa en la casa[a], he aquí[b] que muchos recaudadores de impuestos y pecadores vinieron y se pusieron a la mesa con Jesús y sus discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «mientras estaba cenando en la casa». El griego dice con más precisión que estaba «a la mesa», reflejando la postura habitual en las comidas.
    reason: lexical_alternative
  - marker: b
    text: El texto dice simplemente «en la casa» y no identifica explícitamente de quién era en este versículo aislado.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: And as ...
  chosen_spanish: Y sucedió que, mientras ...
  alternatives_spanish:
  - Y aconteció que, mientras ...
  - Y mientras ...
  lexicon: BDAG
  rationale: La fórmula narrativa griega λειτουργa como transición; en español, «Y sucedió que» conserva el valor discursivo sin sonar rígido. La cláusula temporal «mientras» refleja bien el participio en contexto.
- source_word: ἀνακειμένου
  english_pob_choice: was reclining at table
  chosen_spanish: estaba recostado a la mesa
  alternatives_spanish:
  - estaba reclinado a la mesa
  - estaba sentado a la mesa
  lexicon: BDAG
  rationale: En contexto de comida, el verbo alude a la postura de recostarse para comer. «Recostado a la mesa» conserva esa imagen de banquete y evita reducirla a simple «sentado».
- source_word: ἐν τῇ οἰκίᾳ
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en su casa
  - en el hogar
  lexicon: BDAG
  rationale: El griego dice solo «en la casa»; el español mantiene esa indeterminación sin especificar de quién era.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - y he aquí
  lexicon: BDAG
  rationale: «He aquí» reproduce la función marcadora de atención del griego con un registro bíblico claro y natural en español.
- source_word: τελῶναι
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - publicanos
  - cobradores de impuestos
  lexicon: BDAG
  rationale: Se prefiere «recaudadores de impuestos» por claridad contemporánea. «Publicanos» es tradicional, pero puede sonar más eclesiástico que transparente; el término mantiene la carga social del grupo.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  - los pecadores
  lexicon: BDAG
  rationale: El sustantivo plural se traduce de forma directa como «pecadores», preservando la categorización social y religiosa del texto.
- source_word: ἐλθόντες
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - habiendo venido
  lexicon: BDAG
  rationale: En la secuencia narrativa, el participio aoristo se expresa de manera natural con un verbo finito en español. «Vinieron» conserva la sencillez del movimiento hacia la escena.
- source_word: συνανέκειντο
  english_pob_choice: were reclining at table with
  chosen_spanish: se recostaban a la mesa con
  alternatives_spanish:
  - comían con
  - se sentaban a la mesa con
  lexicon: BDAG
  rationale: El verbo compuesto enfatiza la postura compartida y la comunión de mesa. «Se recostaban a la mesa con» mantiene tanto la imagen como la relación de convivencia, mejor que «comían con».
- source_word: τῷ Ἰησοῦ
  english_pob_choice: with Jesus
  chosen_spanish: con Jesús
  alternatives_spanish:
  - junto a Jesús
  lexicon: BDAG
  rationale: El nombre propio se mantiene con la forma estándar «Jesús».
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  - sus seguidores
  lexicon: BDAG
  rationale: «Discípulos» es la equivalencia estable y precisa para μαθηταί en el evangelio; preserva la relación maestro-discípulo sin diluirla.
theological_decisions:
- issue: Imagen de mesa y comunión
  english_pob_reading: Retain 'reclining at table' language rather than simplifying to 'eating' or 'dining.'
  chosen_spanish_reading: Conservar «recostado/se recostaban a la mesa» en lugar de simplificar a «comiendo» o «cenando».
  alternative_spanish_readings:
  - comiendo
  - cenando
  - a la mesa
  rationale: La escena subraya la comunión de mesa, social y narrativamente importante. La formulación elegida mantiene visible esa implicación sin añadir interpretación doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: No especificar de quién era la casa
  english_pob_reading: Do not specify whose house in the main text.
  chosen_spanish_reading: Mantener «la casa» sin atribuirla a un dueño específico.
  alternative_spanish_readings:
  - su casa
  - la casa de Mateo
  - la casa de él
  rationale: El griego no identifica explícitamente al dueño en este versículo; por fidelidad textual, el español no debe anticipar una identificación contextual que el verso no formula.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final fue marcado como sin cambios, con alto acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estándar del nombre propio.
  - Se usa «discípulos» para μαθηταί de manera consistente con el léxico evangélico.
  - «Recostado a la mesa» y «se recostaban a la mesa» preservan la imagen de comida compartida sin sustituirla por un verbo más general.
  - La casa se deja indeterminada en el texto principal, siguiendo el griego y el audit trail en inglés.
