    text: Or, more idiomatically, 'while he was dining in the house.' The Greek more specifically says 'reclining at table,' reflecting the customary meal posture.
    reason: lexical_alternative
  - marker: b
    text: The text says simply 'in the house' and does not explicitly identify whose house it was in this verse alone.
    reason: alternative_reading
