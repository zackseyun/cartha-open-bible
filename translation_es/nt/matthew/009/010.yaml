revisions:
- from: Y sucedió que, mientras él estaba recostado a la mesa en la casa[a], he aquí[b] que muchos recaudadores de impuestos y pecadores vinieron y se recostaban a la mesa con Jesús y sus discípulos.
  to: Y mientras él estaba a la mesa en la casa[a], he aquí[b] que muchos recaudadores de impuestos y pecadores vinieron y se pusieron a la mesa con Jesús y sus discípulos.
  rationale: La revisión conserva todas las decisiones exegéticas principales del original y de la auditoría inglesa, pero sustituye dos calcos poco naturales por español más claro y digno. «Estaba a la mesa» mantiene el contexto de comida sin sonar rígido, y «se pusieron a la mesa con» expresa mejor la incorporación de los recaudadores de impuestos y pecadores a la comida compartida con Jesús y sus discípulos. También se aligera la apertura eliminando «sucedió que», que en español aquí no aporta suficiente valor para justificar su pesadez.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:07:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego y sigue de cerca la auditoría inglesa: mantiene la indefinición de «en la casa», conserva «he aquí», y traduce correctamente τελῶναι/ἁμαρτωλοὶ como grupos sociales. Sin embargo, «vinieron y se recostaban» crea una secuencia aspectual menos natural y menos precisa para el imperfecto narrativo συνανέκειντο; en español aquí conviene «se pusieron a la mesa» o «estaban a la mesa». Además, repetir «recostado… se recostaban» suena forzado en español moderno.'
  spanish_quality_summary: El texto es mayormente legible, pero «Y sucedió que» resulta algo pesado y «se recostaban a la mesa» suena poco idiomático en español eclesial general. Una leve revisión mejora naturalidad sin perder la imagen de mesa. «Estaba a la mesa»/«se pusieron a la mesa» comunica mejor la escena compartida que un calco rígido de la postura antigua.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Jesús», «discípulos», «pecadores» y «recaudadores de impuestos» están bien. No intervienen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La decisión de no especificar de quién era la casa está correctamente alineada con la evidencia.'
  issues:
  - severity: medium
    issue: «se recostaban a la mesa» es un calco poco natural para συνανέκειντο
    rationale: Aunque preserva la postura antigua, en español moderno suena torpe y no expresa bien la idea de compartir mesa con Jesús y sus discípulos. Una formulación como «se pusieron a la mesa con» conserva el ingreso a la comida compartida y mejora la legibilidad.
  - severity: low
    issue: Secuencia verbal «vinieron y se recostaban»
    rationale: Combinar pretérito perfecto simple con imperfecto aquí produce una progresión algo extraña en español. Dado el participio ἐλθόντες seguido del imperfecto, «vinieron y se pusieron a la mesa» o «vinieron y estaban a la mesa» fluye mejor narrativamente.
  - severity: low
    issue: «Y sucedió que» suena más pesado de lo necesario
    rationale: La fórmula narrativa puede conservarse de manera más natural como «Y mientras él estaba…» sin pérdida de sentido. El español no necesita reproducir plenamente el peso formular de καὶ ἐγένετο en este contexto.
  revised_spanish_text: Y mientras él estaba a la mesa en la casa[a], he aquí[b] que muchos recaudadores de impuestos y pecadores vinieron y se pusieron a la mesa con Jesús y sus discípulos.
  revised_footnotes:
  - marker: a
    text: O, de manera más idiomática, «mientras estaba cenando en la casa». El griego dice con más precisión que estaba «a la mesa», reflejando la postura habitual en las comidas.
    reason: lexical_alternative
  - marker: b
    text: El texto dice simplemente «en la casa» y no identifica explícitamente de quién era en este versículo aislado.
    reason: alternative_reading
  revision_rationale: La revisión conserva todas las decisiones exegéticas principales del original y de la auditoría inglesa, pero sustituye dos calcos poco naturales por español más claro y digno. «Estaba a la mesa» mantiene el contexto de comida sin sonar rígido, y «se pusieron a la mesa con» expresa mejor la incorporación de los recaudadores de impuestos y pecadores a la comida compartida con Jesús y sus discípulos. También se aligera la apertura eliminando «sucedió que», que en español aquí no aporta suficiente valor para justificar su pesadez.
