translation:
  language: es
  text: 'Pero cuando lo oyó, dijo: «Los que están bien[a] no tienen necesidad de médico, sino los que están enfermos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sanos»; el contraste idiomático con «los enfermos» también puede expresarse así.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when he heard it
  chosen_spanish: cuando lo oyó
  alternatives_spanish:
  - habiéndolo oído
  - al oírlo
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad temporal respecto del verbo principal. En español, «cuando lo oyó» comunica con naturalidad esa relación y conserva el objeto implícito del contexto sin sobreexplicarlo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce transición con matiz adversativo suave. «Pero» reproduce bien el giro de respuesta frente al contexto previo.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: BDAG
  rationale: λέγω funciona aquí como verbo ordinario de habla. «Dijo» es directo y fiel; «respondió» sería interpretativo porque el griego no lo explicita.
- source_word: Οὐ χρείαν ἔχουσιν
  english_pob_choice: have no need
  chosen_spanish: no tienen necesidad
  alternatives_spanish:
  - no necesitan
  - no les hace falta
  lexicon: BDAG
  rationale: La expresión idiomática χρείαν ἔχειν se vierte de manera natural como «tener necesidad». Mantiene la estructura nominal del griego y su tono proverbial.
- source_word: οἱ ἰσχύοντες
  english_pob_choice: those who are well
  chosen_spanish: los que están bien
  alternatives_spanish:
  - los sanos
  - los que están saludables
  lexicon: BDAG
  rationale: Aunque ἰσχύω puede significar «ser fuerte», el contexto médico hace que el contraste funcional sea el de estar bien frente a estar enfermo. «Los que están bien» conserva ese matiz idiomático sin forzar una paráfrasis excesiva.
- source_word: ἰατροῦ
  english_pob_choice: a physician
  chosen_spanish: de médico
  alternatives_spanish:
  - de un médico
  - de un doctor
  lexicon: BDAG
  rationale: ἰατρός significa médico/physician. En español, «médico» es natural y digno; el genitivo tras «tener necesidad» se expresa con «de».
- source_word: οἱ κακῶς ἔχοντες
  english_pob_choice: those who are sick
  chosen_spanish: los que están enfermos
  alternatives_spanish:
  - los que están mal
  - los que están enfermos de
  lexicon: BDAG
  rationale: La locución κακῶς ἔχω se usa idiomáticamente para «estar enfermo» o «sentirse mal». «Los que están enfermos» es claro y conserva el paralelismo con la primera cola del proverbio.
theological_decisions:
- issue: Tensión entre sentido literal médico y aplicación espiritual implícita
  english_pob_reading: Render the saying in straightforward medical terms without making the spiritual application explicit in the main text.
  chosen_spanish_reading: Presentar el proverbio en términos médicos directos, sin explicitar en la línea principal la aplicación a pecadores.
  alternative_spanish_readings:
  - Traducir de forma interpretativa para subrayar la necesidad espiritual de los pecadores
  - Parafrasear el dicho como una referencia explícita a la misión de Jesús
  rationale: El griego formula un proverbio médico literal; la aplicación teológica al contexto circundante debe quedar para la lectura contextual, no para la expansión del versículo. Así se preserva la tensión textual y el lector puede percibir el argumento de Jesús sin que la traducción lo resuelva anticipadamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó «strong» por «well» para reflejar mejor el contraste idiomático con «sick». La versión española sigue esa decisión: evita «fuertes» y prefiere «están bien», manteniendo el paralelismo natural con «están enfermos».'
  spanish_consistency_notes:
  - Se mantiene «médico» para ἰατρός por ser el equivalente natural y sobrio en español.
  - Se evita «fuerte» o «sano» como traducción principal de ἰσχύοντες para no perder el matiz idiomático observado en la revisión inglesa.
  - 'El orden de la frase conserva el contraste del griego: bienestar frente a enfermedad, sin explicitar la aplicación espiritual en el cuerpo del versículo.'
