translation:
  language: es
  text: 'Y al ver esto los fariseos[a], decían a sus discípulos: “¿Por qué come su maestro con cobradores de impuestos y pecadores?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: “Y al ver esto, los fariseos dijeron a sus discípulos...”. El participio griego deja implícito el objeto de ‘ver’, referido por contexto a la escena de la comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when ... saw it
  chosen_spanish: al ver esto
  alternatives_spanish:
  - cuando vieron esto
  - después de ver esto
  lexicon: BDAG
  rationale: El participio aoristo se expresa naturalmente en español con una construcción temporal breve. Se explicita ‘esto’ porque el griego deja implícito el objeto visto, y el contexto inmediato es la escena de la comida.
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - dijeron
  lexicon: BDAG
  rationale: El imperfecto griego sugiere una acción verbal continua o en desarrollo. ‘Decían’ conserva bien ese valor aspectual sin sonar forzado en español narrativo.
- source_word: μαθηταῖς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: ‘Discípulos’ es la equivalencia estándar y más fiel al vínculo maestro-discípulo propio del contexto evangélico.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por qué razón?
  lexicon: BDAG
  rationale: Interrogativo idiomático directo en español; mantiene la concisión y naturalidad del griego.
- source_word: τελωνῶν
  english_pob_choice: tax collectors
  chosen_spanish: cobradores de impuestos
  alternatives_spanish:
  - publicanos
  - recaudadores de impuestos
  lexicon: BDAG
  rationale: Se evita ‘publicanos’ por ser más eclesiástico/tradicional y menos transparente para lectores modernos. ‘Cobradores de impuestos’ comunica el oficio con claridad y conserva la carga social negativa implícita.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  lexicon: BDAG
  rationale: ‘Pecadores’ reproduce de forma directa el grupo etiquetado por los fariseos. No se suaviza con perífrasis, porque el término griego también funciona como designación social y moral.
- source_word: ἐσθίει
  english_pob_choice: eat
  chosen_spanish: come
  alternatives_spanish:
  - está comiendo
  - come a
  lexicon: BDAG
  rationale: El presente simple en español expresa bien el presente gnómico/narrativo del verbo griego. ‘Come’ mantiene la sencillez del léxico básico sin añadir formalidad de ‘dina’ o ‘toma una comida’.
- source_word: διδάσκαλος
  english_pob_choice: teacher
  chosen_spanish: maestro
  alternatives_spanish:
  - maestro/maestra
  - profesor
  lexicon: BDAG
  rationale: ‘Maestro’ es la traducción directa y natural de διδάσκαλος aquí. Evita ‘rabí’ porque el texto griego usa el título común ‘maestro’, y la versión española busca transparencia léxica.
theological_decisions:
- issue: Objeto implícito de ‘ver’
  english_pob_reading: Supplied 'it' in English; the Greek leaves the object implicit, referring to the meal scene in context.
  chosen_spanish_reading: Se explicita ‘esto’ en la traducción.
  alternative_spanish_readings:
  - Y al ver, los fariseos...
  - Y al verlo, los fariseos...
  rationale: El contexto inmediato exige suplir el referente implícito para que el español fluya con naturalidad. ‘Esto’ evita introducir un pronombre ambiguo (‘lo’) sin sacrificar el sentido narrativo.
  doctrine_reference: Principio de equivalencia óptima; prioridad del contexto original sin añadir contenido doctrinal.
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas en el pasaje inglés; la redacción española sigue la misma solución interpretativa principal, haciendo explícito el objeto implícito de ‘ver’ y manteniendo el imperfecto narrativo.
  spanish_consistency_notes:
  - 'Se conserva el orden narrativo básico del griego: observación de los fariseos, su խոս? ; no aplica (typo removed)'
  - Se mantiene ‘maestro’ como equivalente transparente de διδάσκαλος, coherente con la política POB de traducir títulos cuando el contexto lo permite.
  - ‘Cobradores de impuestos’ se elige sobre ‘publicanos’ por transparencia moderna, sin perder la fuerza social del término.
