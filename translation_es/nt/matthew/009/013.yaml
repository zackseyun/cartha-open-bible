base_translation:
  language: en
  yaml_path: translation/nt/matthew/009/013.yaml
  text: 'But go and learn what this means: ‘I desire mercy and not sacrifice.’ For I did not come to call the righteous[c][b][a], but sinners.'
  footnotes:
  - marker: a
    text: Or, more literally, “Go and learn what this is.”
    reason: lexical_alternative
  - marker: b
    text: Quoted from Hosea 6:6.
    reason: cross_reference
  - marker: c
    text: Or possibly “those who think they are righteous”; the Greek simply says “the righteous.”
    reason: alternative_reading
