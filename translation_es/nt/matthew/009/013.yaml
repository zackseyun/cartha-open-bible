translation:
  language: es
  text: 'Pero vayan y aprendan lo que esto significa: «Misericordia[a] quiero y no sacrificio[b]». Porque no vine a llamar a justos[c], sino a pecadores.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Vayan y aprendan qué es esto».'
    reason: lexical_alternative
  - marker: b
    text: Cita de Oseas 6:6.
    reason: cross_reference
  - marker: c
    text: 'O posiblemente: «a los que piensan que son justos»; el griego dice simplemente «a justos».'
    reason: alternative_reading
lexical_decisions:
- source_word: πορευθέντες
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - vayan y
  - habiendo ido
  lexicon: BDAG
  rationale: El participio aoristo con valor idiomático se entiende naturalmente como una exhortación enlazada con el imperativo siguiente. «Vayan» conserva el movimiento y la fuerza exhortativa sin sonar forzado en español.
- source_word: μάθετε
  english_pob_choice: learn
  chosen_spanish: aprendan
  alternatives_spanish:
  - aprendan bien
  - entiendan
  lexicon: BDAG
  rationale: El imperativo mantiene el tono de instrucción y reprensión. «Aprendan» conserva la idea de adquirir conocimiento o captar el sentido, en línea con el griego y con el matiz pedagógico.
- source_word: τί ἐστιν
  english_pob_choice: what this means
  chosen_spanish: lo que esto significa
  alternatives_spanish:
  - qué es esto
  - qué significa
  lexicon: BDAG
  rationale: La pregunta idiomática introduce la cita y su sentido. «Lo que esto significa» comunica de forma natural el valor interpretativo sin perder el vínculo con el texto citado.
- source_word: Ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordia leal
  lexicon: BDAG
  rationale: «Misericordia» es la opción más estable en español para ἔλεος y preserva el eco bíblico de Oseas 6:6. Se evita expandirlo a una paráfrasis que debilite la cita.
- source_word: θέλω
  english_pob_choice: I desire
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - quiero
  lexicon: BDAG
  rationale: En una cita profética, el verbo simple «quiero» reproduce con claridad la voluntad divina expresada en el original. «Deseo» sería posible, pero aquí «quiero» suena más directo y fiel al contraste.
- source_word: θυσίαν
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - sacrificio ritual
  - ofrenda sacrificial
  lexicon: BDAG
  rationale: «Sacrificio» conserva el término general y el contraste profético de la cita. No se expande a «ofrenda» porque el griego usa θυσία con valor amplio y tradicional.
- source_word: ἦλθον
  english_pob_choice: I did not come
  chosen_spanish: no he venido
  alternatives_spanish:
  - no vine
  - no he venido
  lexicon: BDAG
  rationale: El aoristo de misión se expresa con naturalidad en español con perfecto presente. «No he venido» comunica la relevancia vigente de la misión de Jesús.
- source_word: καλέσαι
  english_pob_choice: to call
  chosen_spanish: llamar
  alternatives_spanish:
  - llamar
  - convocar
  lexicon: BDAG
  rationale: «Llamar» preserva el campo semántico de καλέω sin introducir una tonalidad más técnica como «convocar». Mantiene la sencillez del dicho.
- source_word: δικαίους
  english_pob_choice: the righteous
  chosen_spanish: a justos
  alternatives_spanish:
  - a justos
  - a los justos
  - a los rectos
  lexicon: BDAG
  rationale: El adjetivo sustantivado se vierte como «justos», que en español refleja bien el contraste moral/legal del término. Se evita «rectos» por ser menos transparente en este contexto.
- source_word: ἁμαρτωλούς
  english_pob_choice: sinners
  chosen_spanish: a pecadores
  alternatives_spanish:
  - a pecadores
  - a personas pecadoras
  lexicon: BDAG
  rationale: «Pecadores» conserva el sustantivo de identidad usado en el contraste. Se mantiene la oposición directa con «justos» sin suavizarla.
theological_decisions:
- issue: Cita de Oseas 6:6 y su fuerza en la reprensión de Jesús
  english_pob_reading: Render the citation straightforwardly as a divine preference for mercy over sacrifice without expanding it into an abolition of sacrifice in every sense.
  chosen_spanish_reading: Presentar la cita de manera directa como una preferencia divina por la misericordia sobre el sacrificio, sin convertirla en una abolición absoluta de todo sacrificio.
  alternative_spanish_readings:
  - Dios rechaza por completo todo sacrificio
  - Dios solo prefiere la misericordia en esta ocasión
  rationale: El griego reproduce la tensión profética entre misericordia y sacrificio. La traducción debe conservar esa tensión sin resolverla teológicamente ni sobrecargar el sentido del dicho.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Referencia a «los justos»
  english_pob_reading: Translate as 'the righteous' without specifying whether Jesus means truly righteous persons or those who consider themselves righteous.
  chosen_spanish_reading: Traducir como «justos» sin añadir en el texto principal si Jesús se refiere a personas verdaderamente justas o a quienes se consideran justas.
  alternative_spanish_readings:
  - los que se creen justos
  - los autojustificados
  rationale: El griego solo dice δικαίους. La ambigüedad interpretativa puede notarse, pero no debe imponerse en la línea principal. Así se preserva el alcance del texto y su tensión contextual.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del POB en inglés y no introduce cambios sustanciales frente al último pase de revisión. Se mantuvieron las decisiones auditadas: imperativo idiomático con «vayan y aprendan», cita de Oseas 6:6, y la ambigüedad sobre «justos» sin resolverla en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se conserva «misericordia» como término bíblico estándar para ἔλεος, sin sustituirlo por una paráfrasis.
  - «Justos» y «pecadores» mantienen el contraste lexical del griego y la formulación del POB en inglés.
  - La puntuación con comillas angulares no se usa aquí para mantener un estilo editorial simple y consistente con el resto del borrador.
