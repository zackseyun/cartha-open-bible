translation:
  language: es
  text: 'Entonces les dice a sus discípulos[a]: «La cosecha ciertamente es abundante, pero los obreros son pocos».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La cosecha es abundante, pero los trabajadores son pocos»'
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa un presente histórico: «dice». Algunas traducciones lo traducen «dijo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa; «Entonces» es natural en español y conserva el valor temporal conciso del griego.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: El presente histórico del griego se refleja mejor con presente en español; «les dice» mantiene la vivacidad narrativa sin sonar forzado.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  lexicon: BDAG
  rationale: Se conserva el posesivo explícito αὐτοῦ con «sus»; «discípulos» es el equivalente estándar y preciso de μαθηταῖς.
- source_word: Ὁ μὲν ... οἱ δὲ
  english_pob_choice: indeed ... but
  chosen_spanish: en efecto ... pero
  alternatives_spanish:
  - por un lado ... pero
  - sí ... pero
  lexicon: BDAG
  rationale: La construcción μέν...δέ introduce contraste. «En efecto ... pero» comunica bien la primera afirmación reforzadora y la oposición siguiente sin caer en literalidad rígida.
- source_word: θερισμός
  english_pob_choice: harvest
  chosen_spanish: la cosecha
  alternatives_spanish:
  - la siega
  - la mies
  lexicon: BDAG
  rationale: En español, «cosecha» expresa con claridad el campo agrícola del término y resulta idiomático para lectores amplios; conserva la metáfora sin explicarla.
- source_word: πολύς
  english_pob_choice: plentiful
  chosen_spanish: es mucha
  alternatives_spanish:
  - es abundante
  - es grande
  lexicon: BDAG
  rationale: Con un sustantivo como «cosecha», la idea de abundancia se expresa de forma natural con «es mucha». Mantiene el sentido de plenitud sin sobrecargar el estilo.
- source_word: ἐργάται
  english_pob_choice: workers
  chosen_spanish: los obreros
  alternatives_spanish:
  - los trabajadores
  - los laboradores
  lexicon: BDAG
  rationale: «Obreros» conserva el matiz de personas que trabajan manualmente o en una labor concreta, y es un equivalente bíblico claro para este contexto agrícola.
- source_word: ὀλίγοι
  english_pob_choice: few
  chosen_spanish: son pocos
  alternatives_spanish:
  - hay pocos
  - son escasos
  lexicon: BDAG
  rationale: Predicado simple y directo que reproduce el contraste con la abundancia anterior; «son pocos» es natural y fiel.
theological_decisions:
- issue: Metáfora agrícola y su fuerza missional
  english_pob_reading: Retain the agricultural metaphor without explicating its missional referent in the translation.
  chosen_spanish_reading: Mantener la imagen agrícola sin explicitar en el texto principal que alude a la misión.
  alternative_spanish_readings:
  - Parafrasear como referencia a personas listas para responder al ministerio de Jesús
  - Explicar explícitamente la aplicación misionera dentro del versículo
  rationale: El versículo presenta la imagen y no la desarrolla; traducirla de forma transparente evita añadir interpretación y preserva la tensión literaria y teológica del contexto inmediato.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego usa presente histórico en λέγει; por eso la versión española mantiene presente («les dice») en lugar de pasado. No se detectaron revisiones aplicadas en el audit trail inglés, y el acuerdo de revisión fue alto sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «discípulos» como término estable para μαθηταί.
  - Se conserva la metáfora agrícola con vocabulario natural en español, sin convertirla en una explicación.
  - Se ha usado un contraste idiomático para μέν...δέ que no depende de una calca mecánica.
  - La puntuación y las comillas siguen el uso editorial del español.
