translation:
  language: es
  text: 'Entonces tocó sus ojos, diciendo: «Según la fe[a] de ustedes, que se les haga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Según su confianza, que se les haga». El griego pistis también puede traducirse «confianza» o, en algunos contextos, «fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca secuencia narrativa inmediata. «Entonces» es natural en español y conserva el valor temporal sin añadir matices ajenos.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: les tocó
  alternatives_spanish:
  - tocó
  - puso su mano sobre
  lexicon: BDAG
  rationale: El verbo aquí expresa un contacto físico real. En español, la construcción «les tocó» comunica de forma directa y natural ese acto sobre sus ojos.
- source_word: τῶν ὀφθαλμῶν αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  - los ojos de ellos
  lexicon: BDAG
  rationale: Tras «tocó», el complemento queda claro en español sin repetir excesivamente el posesivo; el pronombre dativo «les» ya señala a los destinatarios y «los ojos» expresa el objeto tocado.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: y dijo
  alternatives_spanish:
  - diciendo
  - al decir
  lexicon: BDAG
  rationale: Aunque el participio griego enlaza con la acción anterior, en español la coordinación «y dijo» resulta más idiomática y conserva la relación narrativa sin sonar forzada.
- source_word: Κατὰ
  english_pob_choice: According to
  chosen_spanish: Según
  alternatives_spanish:
  - De acuerdo con
  - Conforme a
  lexicon: BDAG
  rationale: La preposición con acusativo expresa correspondencia o medida. «Según» transmite bien esa relación en español sin introducir causalidad.
- source_word: τὴν πίστιν ὑμῶν
  english_pob_choice: your faith
  chosen_spanish: la fe de ustedes
  alternatives_spanish:
  - su fe
  - la confianza de ustedes
  lexicon: BDAG
  rationale: Se mantiene «fe» como equivalente principal de πίστις, conforme al criterio doctrinal. «De ustedes» evita ambigüedad de número y conserva el plural explícito del griego.
- source_word: γενηθήτω
  english_pob_choice: let it be done
  chosen_spanish: que se les haga
  alternatives_spanish:
  - que sea hecho para ustedes
  - que les ocurra
  lexicon: BDAG
  rationale: El imperativo pasivo aoristo funciona como pronunciamiento performativo. «Que se les haga» conserva el pasivo y la fuerza de mandato sin perder naturalidad en español.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: se les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: En español, la dativa de beneficio o destinatario se expresa de forma más natural con «se les» dentro de la fórmula pasiva, manteniendo el sentido de acción dirigida a ellos.
theological_decisions:
- issue: πίστις como fe o confianza en un contexto de sanidad
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: El contexto es la respuesta creyente de los dos hombres ante Jesús y su poder de sanar. Se conserva «fe» en el texto principal, como en la decisión inglesa, dejando abierta la matización lexical sin desplazar el término habitual del pasaje.
  doctrine_reference: 'DOCTRINE.md: contested terms — πίστις default ''faith'''
translation_notes:
  revision_awareness: 'El texto griego y la auditoría inglesa concuerdan en una lectura simple y estable: secuencia narrativa con τότε, contacto físico real con ἥψατο, y un dicho performativo con κατά + acusativo y γενηθήτω. No se requieren revisiones respecto del paquete fuente; la nota se conserva solo para la alternativa léxica de πίστις.'
  spanish_consistency_notes:
  - Se evita «Señor» o «Cristo» porque no aparecen en el versículo.
  - Se conserva la pluralidad explícita («de ustedes», «se les») para reflejar ὑμῶν / ὑμῖν.
  - La formulación «que se les haga» mantiene el pasivo del griego y el tono performativo de la declaración de Jesús.
