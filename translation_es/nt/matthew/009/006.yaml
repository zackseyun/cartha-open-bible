    reason: lexical_alternative
  - marker: b
    text: O “camilla” para “cama”. El griego κλίνη puede referirse a una cama, un lecho, un diván o una estera para dormir.
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor y no doctrinal: se mejora la naturalidad de αἴρω + κλίνη con ''recoge tu cama'', se hace más idiomático ''le dice al paralítico'', y se corrige la nota léxica eliminando ''palleta''. El resto del borrador preserva bien el sentido fuente y las decisiones POB.'
