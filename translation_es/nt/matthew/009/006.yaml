translation:
  language: es
  text: 'Pero para que sepan que el Hijo del Hombre tiene autoridad en la tierra para perdonar pecados”—entonces le dice al paralítico[a]: “Levántate, recoge tu cama[b] y vete a tu casa.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el Ser Humano” para “el Hijo del Hombre”. Se conserva la forma tradicional porque preserva el título de Jesús y su probable resonancia con Daniel 7.
    reason: lexical_alternative
  - marker: b
    text: O “camilla” para “cama”. El griego κλίνη puede referirse a una cama, un lecho, un diván o una estera para dormir.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ εἰδῆτε
  english_pob_choice: But so that you may know
  chosen_spanish: Pero para que sepan
  alternatives_spanish:
  - Pero para que sepan ustedes
  - Pero a fin de que sepan
  lexicon: ἵνα; οἶδα
  rationale: ἵνα expresa finalidad; con δέ introduce un giro discursivo suave. En español, 'Pero para que sepan' conserva la transición y la finalidad sin recargar la frase. Se omite el pronombre explícito porque el verbo ya marca la persona y el contexto es público.
- source_word: ἐξουσίαν ἔχει
  english_pob_choice: has authority
  chosen_spanish: tiene autoridad
  alternatives_spanish:
  - tiene poder
  - tiene derecho
  lexicon: BDAG
  rationale: ἐξουσία apunta aquí a autoridad legítima, no solo capacidad. 'Autoridad' mantiene ese peso jurídico y cristológico.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hombre
  - el Ser Humano
  lexicon: BDAG
  rationale: Se conserva el título tradicional porque funciona como autodesignación de Jesús y preserva el eco daniélico/intertextual. 'El Hijo del Hombre' es la forma más reconocible y fiel en español.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra de aquí
  lexicon: BDAG
  rationale: La preposición con genitivo puede expresar esfera o ámbito. 'En la tierra' comunica de forma natural el contraste con la prerrogativa divina y evita sonar demasiado interpretativo.
- source_word: ἀφιέναι ἁμαρτίας
  english_pob_choice: to forgive sins
  chosen_spanish: para perdonar pecados
  alternatives_spanish:
  - para remitir pecados
  - para absolver pecados
  lexicon: BDAG
  rationale: ἀφίημι en este contexto significa perdonar/remitir. 'Perdonar pecados' es la opción clara y estándar en español, sin perder el sentido jurídico-moral.
- source_word: τῷ παραλυτικῷ
  english_pob_choice: to the paralytic
  chosen_spanish: al paralítico
  alternatives_spanish:
  - al hombre paralítico
  - al enfermo paralítico
  lexicon: BDAG
  rationale: El adjetivo funciona como sustantivo. 'Al paralítico' es breve, idiomático y fiel al griego, que no repite explícitamente 'hombre'.
- source_word: Ἐγερθεὶς
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levantándote
  lexicon: BDAG
  rationale: Aunque formalmente es un participio aoristo, en esta secuencia imperativa funciona como un llamado directo. 'Levántate' reproduce bien la fuerza del mandato en español.
- source_word: ἆρόν
  english_pob_choice: pick up
  chosen_spanish: toma
  alternatives_spanish:
  - recoge
  - alza
  lexicon: BDAG
  rationale: αἴρω aquí tiene el sentido de levantar y llevar consigo. 'Toma tu cama' sigue el uso idiomático bíblico en español y mantiene la orden compacta. 'Recoge' suena menos natural con 'cama'.
- source_word: κλίνην
  english_pob_choice: bed
  chosen_spanish: cama
  alternatives_spanish:
  - camilla
  - esterilla
  lexicon: BDAG
  rationale: κλίνη puede significar cama, lecho, camilla o estera/pallet. 'Cama' es la opción más amplia y natural en español; 'camilla' estrecha demasiado el referente, y 'esterilla' introduce un matiz más específico de lo que exige el texto.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - marcha
  lexicon: BDAG
  rationale: ὕπαγε es un mandato directo de irse. 'Vete' conserva la inmediatez imperativa y suena natural en una orden dirigida.
- source_word: εἰς τὸν οἶκόν σου
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  - a tu casa
  lexicon: BDAG
  rationale: οἶκος puede significar casa u hogar; aquí el sentido concreto funciona mejor como destino físico. 'A tu casa' es natural y fiel.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser Humano
  - el Hombre
  rationale: Se mantiene el título tradicional para no diluir la autodesignación de Jesús ni perder el posible eco de Daniel 7. La traducción interpretativa 'el Ser Humano' suavizaría una tensión que el texto conserva.
  doctrine_reference: Afirmaciones; filosofía de traducción §§2–3
- issue: Sentido de ἐξουσία en el perdón de pecados
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - poder
  - derecho
  rationale: El punto del versículo no es solo que Jesús pueda hacerlo, sino que posee la autoridad legítima para perdonar pecados en la tierra. 'Autoridad' conserva esa afirmación teológica y legal.
  doctrine_reference: Filosofía de traducción §§1, 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, incluida la puntuación de cierre tras «pecados» antes del discurso directo. También conserva el enfoque de equivalencia óptima y la decisión de mantener 'authority'/'Son of Man' como ejes léxico-teológicos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto cuando corresponda; aquí no aparece el tetragrámaton.
  - Se mantiene 'Hijo del Hombre' en lugar de una paráfrasis para conservar la tensión intertextual documentada.
  - Se traduce ἐξουσία como 'autoridad', no 'poder', para reflejar la fuerza jurídica del contexto.
  - Se traduce ἀφίημι aquí como 'perdonar', no como 'soltar' o 'dejar', porque el contexto es el perdón de pecados.
  - 'El imperativo encadenado en español conserva la rapidez del original: mandato de levantarse, tomar la cama y volver a casa.'
