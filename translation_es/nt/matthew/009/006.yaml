revisions:
- from: 'Pero para que sepan que el Hijo del Hombre tiene autoridad en la tierra para perdonar pecados”—entonces dice al paralítico[a]: “Levántate, toma tu cama[b] y vete a tu casa.”'
  to: 'Pero para que sepan que el Hijo del Hombre tiene autoridad en la tierra para perdonar pecados”—entonces le dice al paralítico[a]: “Levántate, recoge tu cama[b] y vete a tu casa.”'
  rationale: 'La revisión es menor y no doctrinal: se mejora la naturalidad de αἴρω + κλίνη con ''recoge tu cama'', se hace más idiomático ''le dice al paralítico'', y se corrige la nota léxica eliminando ''palleta''. El resto del borrador preserva bien el sentido fuente y las decisiones POB.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:08:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en los puntos principales: mantiene la finalidad de ἵνα, traduce ἐξουσία como ''autoridad'', conserva el título ''el Hijo del Hombre'', refleja ἐπὶ τῆς γῆς como esfera terrenal, y preserva la secuencia imperativa dirigida al paralítico. También retiene bien el presente histórico ''dice''. Sin embargo, hay un ajuste menor necesario: ''toma tu cama'' suena menos natural y menos preciso para αἴρω + κλίνη en este contexto que ''recoge tu cama'' o ''toma tu camilla''. Dado que la nota ya abre la alternativa ''camilla'', conviene mejorar la naturalidad sin apartarse del sentido fuente.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. La sintaxis general funciona bien, y 'a tu casa' es natural. No obstante, 'toma tu cama' resulta algo rígido y poco idiomático en español contemporáneo, porque normalmente no se 'toma' una cama sino que se la 'recoge', 'carga' o se habla de 'camilla/lecho'. Además, la nota b contiene 'palleta', que en español no corresponde aquí; debe decir 'jergón' o 'estera' si se quiere ampliar el rango semántico. También es preferible usar una puntuación española más natural alrededor del inciso.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: ''Hijo del Hombre'', ''autoridad'', ''perdonar pecados'' y ''dice'' concuerdan con las decisiones auditadas. No hay conflicto con los glosarios principales. La revisión propuesta solo mejora la naturalidad de αἴρω/κλίνη y depura la nota léxica.'
  issues:
  - severity: medium
    issue: La frase 'toma tu cama' es poco idiomática en español para αἴρω + κλίνη.
    rationale: Aunque formalmente posible, en español suena extraño 'tomar' una cama. En este contexto de curación y desplazamiento, 'recoge tu cama' comunica mejor la acción de levantarla y llevársela, sin alejarse del griego ni del inglés 'pick up your bed'.
  - severity: low
    issue: La nota b usa 'palleta', término incorrecto en español en este contexto.
    rationale: '''Palleta'' no es la forma adecuada para un lecho o estera para dormir. Esto afecta la calidad léxica de la nota y puede confundir al lector.'
  - severity: low
    issue: La puntuación del inciso puede ajustarse para sonar más natural en español.
    rationale: Tras el guion de cierre, 'entonces' no necesita ir forzado como enlace pesado; '—entonces le dice al paralítico' fluye mejor, y añadir 'le' hace el español más natural con 'decir'.
  revised_spanish_text: 'Pero para que sepan que el Hijo del Hombre tiene autoridad en la tierra para perdonar pecados”—entonces le dice al paralítico[a]: “Levántate, recoge tu cama[b] y vete a tu casa.”'
  revised_footnotes:
