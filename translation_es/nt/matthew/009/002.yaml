translation:
  language: es
  text: 'Y he aquí, le trajeron un paralítico acostado en una cama. Cuando Jesús vio la fe de ellos[a], le dijo al paralítico: «Ten ánimo[b], niño; tus pecados son perdonados[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego «la fe de ellos»; el plural puede referirse al paralítico y a quienes lo traían, o al grupo de los portadores como conjunto.
    reason: alternative_reading
  - marker: b
    text: O «Ten corazón».
    reason: lexical_alternative
  - marker: c
    text: O «tus pecados han sido perdonados».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - observa
  lexicon: BDAG
  rationale: «He aquí» conserva el valor discursivo de llamada de atención y encaja de manera natural en el registro narrativo de Mateo.
- source_word: προσέφερον
  english_pob_choice: they brought
  chosen_spanish: le trajeron
  alternatives_spanish:
  - lo estaban trayendo
  - lo llevaban
  lexicon: BDAG
  rationale: El imperfecto griego puede expresar acción en curso, pero en este contexto narrativo la forma simple española «le trajeron» comunica con claridad la acción sin perder la escena dinámica.
- source_word: παραλυτικὸν
  english_pob_choice: a paralytic
  chosen_spanish: un paralítico
  alternatives_spanish:
  - un hombre paralítico
  lexicon: BDAG
  rationale: Se conserva el sustantivo/adjetivo sustantivado sin añadir «hombre», que no está explícito en el griego.
- source_word: ἐπὶ κλίνης βεβλημένον
  english_pob_choice: lying on a bed
  chosen_spanish: acostado en una cama
  alternatives_spanish:
  - tendido en una cama
  - puesto sobre una cama
  lexicon: BDAG
  rationale: «Acostado» transmite el estado/posición del hombre de forma natural en español; «cama» corresponde al objeto de soporte sin forzar una especificación adicional como «camilla» o «estera».
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  lexicon: BDAG
  rationale: Se mantiene la renderización estándar «fe», que preserva el sentido de confianza activa expresada por el grupo.
- source_word: Θάρσει
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Ten valor
  - Ánimo
  lexicon: BDAG
  rationale: «Ten ánimo» es una exhortación breve y natural en español que preserva el tono de aliento; evita un calco rígido y mantiene la fuerza imperativa.
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo mío
  - niño
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «hijo/niño» con matiz afectuoso, en español «hijo» reproduce bien la cercanía personal en un registro bíblico comprensible; «niño» sonaría menos natural en este contexto de varón adulto.
- source_word: ἀφίενταί σου αἱ ἁμαρτίαι
  english_pob_choice: your sins are forgiven
  chosen_spanish: tus pecados te son perdonados
  alternatives_spanish:
  - tus pecados han sido perdonados
  - tus pecados son perdonados
  lexicon: BDAG
  rationale: Se conserva el pasivo con valor declarativo y se explicita el dativo beneficiario con «te», reflejando con fidelidad la forma griega y la pronunciación de perdón sin resolver indebidamente la agencia en la traducción principal.
theological_decisions:
- issue: Alcance de «su fe» / «their faith»
  english_pob_reading: Jesus responds to the faith of the group associated with the paralytic, including at least those who brought him.
  chosen_spanish_reading: Jesús responde a la fe del grupo vinculado con el paralítico, sin especificar si incluye solo a los que lo trajeron o también al propio paralítico.
  alternative_spanish_readings:
  - Jesús responde solo a la fe de los que lo trajeron
  - Jesús responde solo a la fe del paralítico
  rationale: El plural griego αὐτῶν se conserva implícito en la lectura colectiva de «su fe», sin cerrar la referencia más de lo que permite el texto.
  doctrine_reference: Preservar la tensión interpretativa del original; no resolver indebidamente el referente plural.
- issue: Naturaleza del anuncio de perdón
  english_pob_reading: 'A declarative pronouncement: ''your sins are forgiven.'''
  chosen_spanish_reading: 'Un anuncio declarativo de perdón: «tus pecados te son perdonados».'
  alternative_spanish_readings:
  - «tus pecados han sido perdonados»
  - «tus pecados son perdonados»
  rationale: El presente pasivo español permite mantener el valor de declaración en curso o vigente sin introducir explicaciones doctrinales adicionales. Se evita especificar la agencia en el cuerpo del texto, conforme al pasivo griego.
  doctrine_reference: Primacía del original y preservación de la tensión teológica del pasivo divino.
translation_notes:
  revision_awareness: Se revisó la redacción para evitar soluciones demasiado mecánicas y mantener un español publicable, conservando el paralelismo narrativo del griego y el pasivo declarativo de la frase final. También se corrigió la anclación de las notas al incluir todos los marcadores directamente en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - Se usa «fe» para πίστις en coherencia con la terminología del proyecto.
  - Se conserva el pasivo en «te son perdonados» para reflejar ἀφίενταί sin introducir agencia explícita.
  - «Hijo» se eligió por naturalidad contextual en español, aunque el griego usa τέκνον con matiz afectuoso general.
