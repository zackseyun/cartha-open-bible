review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la secuencia básica del griego: καὶ = «Y», ἐγερθεὶς = acción de levantarse/incorporarse, ἀπῆλθεν = salir/irse, εἰς τὸν οἶκον αὐτοῦ = «a su casa». Sin embargo, «poniéndose en pie» suena más pesado y menos natural que el sentido simple e idiomático del participio intransitivo, y el uso de comas tras «Y» y alrededor de la frase participial resulta innecesariamente marcado en español para una narración tan breve.'
  spanish_quality_summary: La redacción es comprensible, pero «Y, poniéndose en pie, se fue...» se siente algo rígida y poco natural en español bíblico contemporáneo. «Y se levantó y se fue a su casa» conserva mejor la fluidez narrativa y la dignidad del registro sin perder sentido. La nota al pie necesita ajustarse tipográficamente para sonar natural en español.
  glossary_alignment: No hay términos del glosario mayor en juego. La elección «casa» para οἶκος es adecuada. La alternativa léxica para ἀπῆλθεν puede conservarse como «partió» o mejor «se marchó»; dado el rastro inglés, «partió» es aceptable como alternativa más formal.
  issues:
  - severity: medium
    issue: «poniéndose en pie» para ἐγερθεὶς
    rationale: Aunque semánticamente posible, aquí resulta menos natural que «se levantó» para una acción narrativa simple. El inglés auditado eligió una forma verbal finita idiomática («he got up»), y el español puede hacer lo mismo sin perder fidelidad.
  - severity: low
    issue: Puntuación innecesaria en «Y, poniéndose en pie, ...»
    rationale: Las comas interrumpen la fluidez de una secuencia narrativa breve y no aportan claridad. En español moderno y legible, una coordinación simple funciona mejor.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: '«''O: «partió a su casa».''» es tipográficamente torpe. Una forma limpia como «O: «partió a su casa».» mejora la presentación sin cambiar el contenido.'
  revised_spanish_text: Y se levantó y se fue a su casa[a].
