- from: Y, poniéndose en pie, se fue a su casa[a].
  to: Y se levantó y se fue a su casa[a].
  rationale: Se ajusta ἐγερθεὶς a la forma verbal idiomática «se levantó», que en español comunica con más naturalidad la acción intransitiva del participio griego en esta narrativa. También se simplifica la puntuación para reflejar el flujo directo del original y se normaliza la presentación de la nota al pie.
