translation:
  language: es
  text: Y se levantó y se fue a su casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «partió a su casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción coordina la acción con la escena anterior sin añadir una relación temporal más fuerte de la que exige el griego. 'Y' mantiene el flujo narrativo simple; 'Entonces' introduciría un matiz más interpretativo.
- source_word: ἐγερθεὶς
  english_pob_choice: he got up
  chosen_spanish: poniéndose en pie
  alternatives_spanish:
  - se levantó
  - levantándose
  lexicon: BDAG
  rationale: El participio aoristo pasivo funciona aquí de manera intransitiva. En español, 'poniéndose en pie' conserva el valor de incorporarse de modo natural y digno, sin forzar una traducción participial demasiado rígida. 'Se levantó' también sería posible, pero la forma elegida mantiene mejor el matiz de acción preparatoria enlazada con el verbo principal.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι expresa salida/partida. 'Se fue' es la forma más natural en español y transmite claramente el abandono del lugar; 'partió' es más formal y 'se marchó' añade un matiz ligeramente más coloquial.
- source_word: εἰς τὸν οἶκον αὐτοῦ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su vivienda
  - a su casa
  lexicon: BDAG
  rationale: εἰς con οἶκος indica movimiento hacia el domicilio. 'A su casa' preserva el sustantivo concreto sin sobreinterpretarlo como 'hogar', que sería más afectivo. En español, la preposición 'a' expresa adecuadamente el destino del movimiento.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios; el presente borrador sigue esa lectura estable, manteniendo la estructura narrativa simple y la equivalencia léxica documentada para el verbo de salida y el complemento de destino.
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y moderno, sin recurrir a formulaciones arcaizantes innecesarias.
  - No se introduce terminología teológica ajena al versículo; la frase mantiene únicamente la descripción narrativa del movimiento del sujeto.
  - El marcador de nota [a] en el texto corresponde a la alternativa léxica documentada para ἀπῆλθεν.
