translation:
  language: es
  text: Y Jesús se levantó y lo siguió, y sus discípulos también siguieron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγερθεὶς
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - habiéndose levantado
  lexicon: BDAG
  rationale: El participio aoristo pasivo se usa aquí con valor intransitivo para introducir la siguiente acción. En español, "se levantó" comunica de forma natural el paso de estar quieto a ponerse en movimiento, sin volver la frase pesada con un participio absoluto.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: NA/uso estándar del nombre propio
  rationale: Nombre propio directo y estable en español; no requiere adaptación adicional.
- source_word: ἠκολούθει
  english_pob_choice: followed
  chosen_spanish: lo siguió
  alternatives_spanish:
  - iba siguiéndolo
  - seguía a él
  lexicon: BDAG
  rationale: El imperfecto puede sugerir acción en curso, pero en narración española breve "lo siguió" conserva la relación de seguimiento sin sobredeterminar el aspecto progresivo. El objeto directo explícito en español evita la construcción poco natural "siguió a él".
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: El dativo con ἀκολουθέω se expresa naturalmente en español con objeto directo de persona en esta construcción narrativa. "Lo" mantiene claridad referencial y evita una locución más pesada.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  - sus seguidores
  lexicon: BDAG
  rationale: '"Discípulos" es el equivalente regular y más preciso para μαθηταί en los Evangelios. El posesivo "sus" refleja el vínculo con Jesús y mantiene el flujo natural de la frase.'
- source_word: καὶ οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: and his disciples followed too
  chosen_spanish: y sus discípulos también siguieron
  alternatives_spanish:
  - y sus discípulos lo siguieron también
  - y también sus discípulos siguieron
  lexicon: BDAG
  rationale: La elipsis del verbo en griego puede resolverse en español repitiendo "siguieron" para hacer explícita la acción coordinada. "También" expresa la simultaneidad/añadidura que el griego coordina sin necesidad de una fórmula idiomática como "hicieron lo mismo".
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una solución elíptica con 'did too' a una formulación más explícita ('followed too') para reflejar mejor el verbo griego. En español, esa claridad se conserva repitiendo "siguieron" en la segunda cláusula coordinada.
  spanish_consistency_notes:
  - Se mantiene "Jesús" como nombre propio y "discípulos" como término técnico estable en los Evangelios.
  - Se evita un calco rígido del participio griego; la solución española prioriza una narración fluida sin perder la secuencia verbal.
  - No se introduce nota textual porque el versículo no presenta variante relevante en el paquete fuente provisto.
