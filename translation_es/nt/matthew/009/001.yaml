revisions:
- from: Y después de subir a una barca, cruzó y llegó a su propia ciudad[a].
  to: Y después de entrar en una barca, cruzó y vino a su propia ciudad[a].
  rationale: Se ajusta ἦλθεν a «vino» para reflejar más directamente el verbo griego y la decisión del POB inglés. Se cambia «subir a» por «entrar en» para representar con mayor precisión ἐμβὰς εἰς, manteniendo un español natural. Se conserva «cruzó» como opción suficientemente natural y fiel, y se mantiene la neutralidad de «su propia ciudad» con la nota léxica correspondiente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:04:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: participio temporal seguido de dos verbos principales, y mantiene la neutralidad de «su propia ciudad». Sin embargo, «llegó» para ἦλθεν atenúa el valor básico de «vino/vino a» y «cruzó» pierde algo del matiz de «cruzó al otro lado», aunque esto último es aceptable. La revisión propuesta mejora la cercanía al texto fuente sin volverlo torpe.'
  spanish_quality_summary: El español es claro y natural. No obstante, «después de subir a una barca» suena un poco menos preciso que «después de entrar en una barca» o «después de subir a la barca», porque el griego expresa entrar/embarcar, no meramente subirse. Además, «vino» corresponde mejor a ἦλθεν que «llegó» en una traducción más ceñida. La nota está bien formulada y es legible.
  glossary_alignment: No hay términos del glosario principal especialmente activados en este versículo. «Barca» para πλοῖον y «su propia ciudad» para ἰδίαν πόλιν concuerdan con la filosofía del proyecto. La nota conserva correctamente la alternativa «su ciudad natal» sin introducirla en el texto principal.
  issues:
  - severity: medium
    issue: «llegó» para ἦλθεν
    rationale: Aunque es idiomático, «llegó» desplaza el foco de movimiento simple («vino») a resultado de arribo. El POB inglés justificó «came» como la opción más directa.
  - severity: low
    issue: «subir a una barca» para ἐμβὰς εἰς πλοῖον
    rationale: Es natural en español, pero el griego expresa más específicamente entrar/embarcar en la barca. «Entrar en» preserva mejor el valor del participio con εἰς.
  revised_spanish_text: Y después de entrar en una barca, cruzó y vino a su propia ciudad[a].
