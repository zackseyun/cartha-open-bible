translation:
  language: es
  text: Y después de entrar en una barca, cruzó y vino a su propia ciudad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su ciudad natal». El griego dice «su propia ciudad», lo cual puede referirse a la ciudad asociada con él en esta etapa de la narración, probablemente Cafarnaúm.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβὰς
  english_pob_choice: after getting into
  chosen_spanish: después de subir a
  alternatives_spanish:
  - después de entrar en
  - tras embarcarse en
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales. «Después de subir a» conserva la secuencia temporal y suena natural en español sin perder la idea de entrada en la embarcación.
- source_word: πλοῖον
  english_pob_choice: a boat
  chosen_spanish: una barca
  alternatives_spanish:
  - un bote
  - una embarcación
  lexicon: BDAG
  rationale: En este contexto narrativo y geográfico, «barca» comunica bien el agua/traslado sin sonar técnico ni demasiado moderno. Mantiene la referencia general a un pequeño medio de transporte acuático.
- source_word: διεπέρασεν
  english_pob_choice: he crossed over
  chosen_spanish: cruzó
  alternatives_spanish:
  - cruzó al otro lado
  - atravesó
  lexicon: BDAG
  rationale: El verbo griego indica el paso de un lado a otro, probablemente por agua. En español, «cruzó» preserva la idea direccional de forma breve y natural; el complemento implícito queda claro por el contexto.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: BDAG
  rationale: Aunque ἔρχομαι puede ser «venir/ir», aquí el foco narrativo está en el arribo al destino. «Llegó» comunica bien el resultado del movimiento sin añadir información.
- source_word: ἰδίαν πόλιν
  english_pob_choice: his own city
  chosen_spanish: su propia ciudad
  alternatives_spanish:
  - su ciudad
  - su ciudad natal
  lexicon: BDAG
  rationale: «Su propia ciudad» reproduce la fuerza posesiva de ἴδιος y evita resolver de antemano si se trata específicamente de Nazaret, Cafarnaúm o un «hogar» en sentido más amplio. Se conserva así la formulación abierta del griego.
- source_word: Καὶ ... καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Entonces ... y
  - Y ... luego
  lexicon: BDAG
  rationale: La repetición de καί marca la sucesión narrativa. «Y ... y» refleja esa conexión simple sin introducir matices interpretativos fuertes.
theological_decisions:
- issue: Identificación de «su propia ciudad»
  english_pob_reading: Rendered neutrally as 'his own city' without specifying the city in the main text.
  chosen_spanish_reading: Se traduce de modo neutral como «su propia ciudad», sin identificarla en el texto principal.
  alternative_spanish_readings:
  - entendida como Cafarnaúm por el contexto mateano
  - entendida más ampliamente como su base de ministerio en Galilea
  rationale: El griego no nombra la ciudad. La traducción debe respetar esa apertura y no incorporar una identificación en el cuerpo principal, aunque el contexto narrativo la sugiera con fuerza.
  doctrine_reference: Primacía del texto original; preservar tensiones o ambigüedades legítimas en la traducción.
translation_notes:
  revision_awareness: El pasaje coincide con el texto base y con la revisión más reciente; no se registran cambios aplicados en el flujo de control de revisiones. La solución española mantiene la misma decisión auditada de no especificar la ciudad en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino sin aplicar este verso, por no aparecer en el texto.
  - Se evitó traducir mecánicamente con calcos ingleses; la secuencia participial se naturalizó en español manteniendo el orden temporal.
  - «Su propia ciudad» conserva la ambigüedad deliberada del griego y queda respaldado por nota.
  - La puntuación y capitalización siguen el uso editorial estándar del español bíblico contemporáneo.
