revisions:
- from: Pero cuando la multitud[a] fue puesta fuera, él entró y le tomó de la mano, y la niña se levantó.
  to: Pero cuando habían sacado afuera a la multitud, él entró, la tomó de la mano, y la niña[a] se levantó.
  rationale: Se reemplaza 'fue puesta fuera' por 'habían sacado afuera a la multitud' para evitar un calco poco natural y comunicar con claridad el valor pasivo-contextual de ἐξεβλήθη en español idiomático. También se ajusta 'le tomó de la mano' a 'la tomó de la mano' por mayor naturalidad con referente femenino directo explícito, y se ancla la nota en 'la niña' para que la alternativa 'fue levantada' corresponda claramente al verbo final. Se conserva 'se levantó' para mantener la tensión documentada del griego ἠγέρθη.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:05:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: la cláusula temporal, la pasiva de ἐξεβλήθη, la entrada de Jesús, el gesto de tomarla de la mano y el resultado final. También conserva correctamente la nota de alternativa para ἠγέρθη. Sin embargo, la formulación española ''fue puesta fuera'' es poco natural para personas y suena calcada del inglés; el sentido pasivo se preserva mejor con ''habían sacado afuera'' o ''habían hecho salir''.'
  spanish_quality_summary: 'El texto es mayormente claro y fiel, pero necesita un ajuste de naturalidad importante en ''la multitud fue puesta fuera''. En español bíblico legible, eso suena forzado. El resto del versículo fluye bien: ''entró'', ''la tomó de la mano'' y ''la niña se levantó'' son naturales y dignos.'
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. 'La multitud' para ὁ ὄχλος y 'la niña' para τὸ κοράσιον son aceptables. 'Se levantó' para ἠγέρθη concuerda con la decisión del POB de preservar la tensión entre 'rose' y 'was raised', siempre que se mantenga la nota alternativa.
  issues:
  - severity: medium
    issue: Calco poco natural en 'la multitud fue puesta fuera'
    rationale: Aunque intenta reflejar la pasiva de ἐξεβλήθη, en español esa construcción no es idiomática para personas en este contexto. El original describe que sacaron al gentío del lugar; una formulación como 'cuando habían sacado afuera a la multitud' preserva el sentido y lee con naturalidad.
  - severity: low
    issue: Redacción de la nota al pie con comilla y puntuación poco natural
    rationale: 'La nota actual empieza con una comilla innecesaria y puede formularse con más naturalidad: ''O: «la niña fue levantada». El verbo griego puede expresarse de ambas maneras en español.'''
