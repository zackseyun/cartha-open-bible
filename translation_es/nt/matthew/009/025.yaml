translation:
  language: es
  text: Pero cuando habían sacado afuera a la multitud, él entró, la tomó de la mano, y la niña[a] se levantó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la niña fue levantada». El verbo griego puede expresarse de ambas maneras en español.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: ὅτε introduce una cláusula temporal (‘cuando’), y δέ añade una transición suave. En español, ‘Pero cuando’ conserva el giro narrativo y el matiz de contraste/avance sin sonar forzado.
- source_word: ἐξεβλήθη
  english_pob_choice: had been put outside
  chosen_spanish: fue puesta fuera
  alternatives_spanish:
  - fue echada fuera
  - fue expulsada
  - había sido puesta fuera
  lexicon: BDAG
  rationale: El pasivo aoristo de ἐκβάλλω expresa que alguien fue sacado fuera. ‘Fue puesta fuera’ comunica el pasivo y el acto de remover sin cargar la escena con una fuerza excesiva que en español podría sugerir expulsión dramática o exorcística. Se mantiene la tensión entre una remoción literal y la pasividad del verbo.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος suele referirse a una masa de personas; aquí ‘multitud’ es natural en español bíblico y mantiene el alcance colectivo del término.
- source_word: εἰσελθὼν
  english_pob_choice: he went in
  chosen_spanish: entró
  alternatives_spanish:
  - habiendo entrado
  - al entrar
  - fue adentro
  lexicon: BDAG
  rationale: El participio aoristo funciona narrativamente como acción subsecuente. En español, ‘entró’ es la forma más natural y fiel al flujo del relato.
- source_word: ἐκράτησεν τῆς χειρὸς αὐτῆς
  english_pob_choice: took her by the hand
  chosen_spanish: le tomó de la mano
  alternatives_spanish:
  - le tomó la mano
  - la sostuvo de la mano
  - le agarró la mano
  lexicon: BDAG
  rationale: κρατέω con genitivo indica tomar o asir. ‘Le tomó de la mano’ es idiomático en español y conserva la acción concreta sin introducir una aspereza innecesaria.
- source_word: ἠγέρθη
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - fue levantada
  - resucitó
  - se alzó
  lexicon: BDAG
  rationale: El aoristo pasivo de ἐγείρω puede reflejarse en español como un intransitivo. ‘Se levantó’ reproduce la lectura narrativa e inmediata que el POB inglés expresó con ‘rose’, sin resolver de antemano si se enfatiza levantarse físicamente o ser restaurada a la vida.
- source_word: τὸ κοράσιον
  english_pob_choice: the girl
  chosen_spanish: la niña
  alternatives_spanish:
  - la muchacha
  - la joven
  - la niña pequeña
  lexicon: BDAG
  rationale: κοράσιον denota a una niña o muchacha joven. ‘La niña’ es claro, natural y suficientemente preciso en este contexto.
theological_decisions:
- issue: Valor de ἠγέρθη en un contexto de milagro/resurrección
  english_pob_reading: rose
  chosen_spanish_reading: se levantó
  alternative_spanish_readings:
  - fue levantada
  - resucitó
  rationale: 'El griego permite una formulación intransitiva que no obliga a explicitar la agencia en la frase final. ‘Se levantó’ conserva la ambigüedad productiva del original: describe el resultado visible sin cerrar interpretativamente si el foco inmediato está en levantarse o en ser levantada a la vida. Esto preserva la tensión teológica documentada por el POB inglés.'
  doctrine_reference: Preservar la tensión textual sin resolverla de antemano.
translation_notes:
  revision_awareness: La versión española sigue el pasaje griego directamente y toma como apoyo el audit trail inglés para sostener decisiones de pasiva, movimiento narrativo y el valor semántico de ἐγείρω. No se introdujeron cambios respecto del sentido base; se mantuvo la ambigüedad intencional del cierre, ahora expresada de manera natural en español.
  spanish_consistency_notes:
  - Se usa ‘multitud’ para ὄχλος, en continuidad con el registro bíblico común y la neutralidad del contexto.
  - Se evitó ‘SEÑOR’ u otras sustituciones porque no aparecen en este versículo.
  - ‘Se levantó’ conserva la posibilidad de lectura pasiva/causativa sin sobreexplicar el milagro.
  - 'El orden de la cláusula refleja la progresión narrativa del griego: remoción de la multitud, entrada, toma de la mano, levantamiento.'
