translation:
  language: es
  text: 'Cuando entró en la casa[a], los ciegos se acercaron a él, y Jesús les dijo: «¿Creen que puedo hacer esto?». Ellos le dijeron: «Sí, Señor[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando entró en la casa, los ciegos vinieron a él».'
    reason: previous_rendering
  - marker: b
    text: 'O: «Sí, señor». Aquí κύριε puede funcionar como tratamiento respetuoso, pero se traduce «Señor» para preservar la posible referencia a la autoridad de Jesús.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλθόντι δὲ εἰς τὴν οἰκίαν
  english_pob_choice: When he entered the house
  chosen_spanish: Cuando entró en la casa
  alternatives_spanish:
  - Y cuando entró en la casa
  - Después de entrar en la casa
  lexicon: SBLGNT / BDAG
  rationale: El participio aoristo con δέ introduce una acción temporal previa o concomitante; en español, «Cuando entró» fluye con naturalidad y conserva el valor narrativo sin sobrecargar la frase. «Casa» reproduce οἰκία con la misma sencillez del registro narrativo.
- source_word: προσῆλθον αὐτῷ
  english_pob_choice: the blind men approached him
  chosen_spanish: los ciegos se acercaron a él
  alternatives_spanish:
  - los ciegos vinieron a él
  - los ciegos llegaron a él
  lexicon: BDAG
  rationale: προσέρχομαι expresa acercarse o venir hacia alguien. «Se acercaron» conserva mejor el matiz direccional que un simple «vinieron» y evita repetir «entró» con otro verbo demasiado general.
- source_word: οἱ τυφλοί
  english_pob_choice: the blind men
  chosen_spanish: los ciegos
  alternatives_spanish:
  - los ciegos hombres
  - los hombres ciegos
  lexicon: BDAG
  rationale: El griego usa un sustantivo adjetival. En español, «los ciegos» es natural y suficiente; el contexto inmediato ya identifica a los dos suplicantes, por lo que no es necesario añadir «hombres».
- source_word: λέγει αὐτοῖς ὁ Ἰησοῦς
  english_pob_choice: Jesus said to them
  chosen_spanish: Jesús les dijo
  alternatives_spanish:
  - Jesús les dice
  lexicon: BDAG
  rationale: Aunque el griego tiene presente histórico, el contexto narrativo en español fluye con mayor naturalidad en pasado. La elección sigue la revisión inglesa más reciente y conserva el sentido sin forzar un presente estilístico poco natural en español.
- source_word: Πιστεύετε
  english_pob_choice: Do you believe
  chosen_spanish: ¿Creen
  alternatives_spanish:
  - ¿Creéis
  - ¿Tienen fe
  lexicon: BDAG
  rationale: πιστεύω aquí pide una pregunta directa sobre confianza en la capacidad de Jesús. «Creen» es el equivalente más natural y amplio en español; «tienen fe» sería menos directo y más interpretativo.
- source_word: ὅτι δύναμαι
  english_pob_choice: that I am able
  chosen_spanish: que puedo
  alternatives_spanish:
  - que soy capaz de
  - que tengo poder para
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad. En español, «puedo» transmite esa capacidad de forma clara y idiomática; aunque «soy capaz de» es más literal, resulta menos ágil en la pregunta de Jesús.
- source_word: τοῦτο ποιῆσαι
  english_pob_choice: to do this
  chosen_spanish: hacer esto
  alternatives_spanish:
  - realizar esto
  - hacer esta cosa
  lexicon: BDAG
  rationale: La construcción infinitiva se vierte de manera simple y directa. «Hacer esto» es suficientemente precisa y mantiene abierta la referencia al acto de sanidad solicitado.
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le respondieron
  alternatives_spanish:
  - Le dijeron
  - Le contestaron
  lexicon: BDAG
  rationale: El verbo λέγω aquí introduce una réplica. «Respondieron» hace explícita la función de respuesta en el diálogo español y evita repetición estilística con «dijo».
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Sí, claro
  - Así es
  lexicon: BDAG
  rationale: La partícula afirmativa se traduce de forma directa y no marcada.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - señor
  lexicon: 'DOCTRINE.md Contested terms: κύριος → Lord'
  rationale: La traducción base en inglés usa «Lord» para preservar el valor reverencial y la posible reconocimiento de la autoridad de Jesús. En español, el equivalente natural y eclesialmente inteligible es «Señor», que mantiene esa carga sin reducirlo a un mero tratamiento civil como «señor».
theological_decisions:
- issue: Tratamiento de κύριε en la respuesta a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  rationale: La decisión doctrinal del POB es conservar la dignidad y posible reconocimiento de autoridad en κύριε. En español, «Señor» reproduce esa función reverencial y cristológica de manera más fiel que «señor», que sonaría demasiado débil o meramente cortés.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Uso del tiempo verbal en la narración
  english_pob_reading: Preserved as past tense ('said' / 'They said')
  chosen_spanish_reading: Pasado simple («dijo» / «respondieron»)
  alternative_spanish_readings:
  - Presente histórico («dice» / «responden»)
  rationale: Aunque el griego usa presente histórico en las réplicas, el español narrativo suele preferir el pasado simple para mayor naturalidad y claridad. Esta elección no altera el contenido y sigue el movimiento de la revisión inglesa más reciente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La versión inglesa más reciente pasó de presente histórico a pasado simple en los verbos narrativos. En español se adopta el pasado simple por naturalidad narrativa, mientras se conserva el sentido del griego y la referencia respetuosa de κύριε con «Señor».
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio fijo.
  - «Los ciegos» sigue el uso sustantivado de οἱ τυφλοί sin añadir elementos no requeridos por el texto.
  - «Señor» se usa en sentido reverencial, no como simple tratamiento civil.
  - Se evita mecanizar el presente histórico griego cuando el español suena más natural en pasado simple.
