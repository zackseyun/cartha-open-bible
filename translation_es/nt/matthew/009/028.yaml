  text: ἐλθόντι δὲ εἰς τὴν οἰκίαν προσῆλθον αὐτῷ οἱ τυφλοί, καὶ λέγει αὐτοῖς ὁ Ἰησοῦς· Πιστεύετε ὅτι δύναμαι τοῦτο ποιῆσαι; λέγουσιν αὐτῷ· Ναί, κύριε.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/009/028.yaml
  text: When he entered the house[a], the blind men approached him, and Jesus said to them, “Do you believe that I am able to do this?” They said to him, “Yes[b], Lord.”
  footnotes:
  - marker: a
    text: Or, 'Yes, sir.' The Greek κύριε can be a respectful form of address, but here it is rendered 'Lord' in keeping with the translation's default for κύριος and to preserve the possible recognition of Jesus' authority.
    reason: alternative_reading
  - marker: b
    text: Or 'When he came into the house, the blind men came to him'.
    reason: previous_rendering
