revisions:
- from: 'Y Jesús[a], conociendo sus pensamientos, dijo: «¿Por qué pensáis cosas malas en vuestros corazones?»'
  to: 'Y Jesús[a], conociendo sus pensamientos, dijo: «¿Por qué piensan el mal en su corazón?»'
  rationale: Se ajusta el tratamiento verbal al español neutral latinoamericano («piensan»), se evita el posesivo plural peninsular, y se reemplaza «cosas malas» por «el mal» para seguir más de cerca el griego sustantivado y la revisión del POB inglés, manteniendo «corazón» como metáfora bíblica del interior.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:03:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: Jesús conoce los pensamientos internos de ellos y les pregunta por qué piensan mal en sus corazones. La nota alternativa para εἰδὼς también coincide con la pista inglesa. Sin embargo, el uso de «pensáis ... vuestros» introduce voseo/plural peninsular, fuera del objetivo de español neutral latinoamericano, y «cosas malas» añade un sustantivo no presente en el texto cuando el POB inglés revisado prefirió dejar el adjetivo sustantivado más conciso.'
  spanish_quality_summary: La redacción es clara y digna, pero no plenamente neutral para un público latinoamericano amplio por «pensáis/vuestros». «Piensan ... sus corazones» sería indirecto y menos adecuado en discurso directo; lo natural y neutral es «piensan ... sus corazones» solo si se convierte toda la cita a tercera persona, lo cual no corresponde. La mejor solución es «piensan ... en su corazón» o «están pensando ... en su corazón/corazones» con tratamiento de ustedes. También conviene simplificar «cosas malas» a «el mal» o «maldades»; «el mal» preserva mejor la concisión del griego y del inglés auditado.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Jesús», «pensamientos» y «corazones» están bien. La principal desviación es estilística regional, no terminológica. La decisión sobre καρδίαις como «corazones» debe mantenerse por fidelidad metafórica.
  issues:
  - severity: medium
    issue: 'Registro regional no neutral: «pensáis ... vuestros»'
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. Estas formas son marcadamente peninsulares y reducen la accesibilidad.
  - severity: medium
    issue: «cosas malas» sobreexplicita πονηρά
    rationale: El texto griego usa el adjetivo sustantivado de forma concisa, y la revisión inglesa quitó explícitamente «things». En español puede preservarse mejor con «el mal», evitando añadir un sustantivo interpretativo.
  revised_spanish_text: 'Y Jesús[a], conociendo sus pensamientos, dijo: «¿Por qué piensan el mal en su corazón?»'
  revised_footnotes:
  - marker: a
    text: O «percibiendo sus pensamientos».
    reason: lexical_alternative
  revision_rationale: Se ajusta el tratamiento verbal al español neutral latinoamericano («piensan»), se evita el posesivo plural peninsular, y se reemplaza «cosas malas» por «el mal» para seguir más de cerca el griego sustantivado y la revisión del POB inglés, manteniendo «corazón» como metáfora bíblica del interior.
