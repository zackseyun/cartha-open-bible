translation:
  language: es
  text: 'Y Jesús[a], conociendo sus pensamientos, dijo: «¿Por qué piensan el mal en su corazón?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «percibiendo sus pensamientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: conociendo
  alternatives_spanish:
  - sabiendo
  - percibiendo
  lexicon: BDAG
  rationale: El participio expresa conciencia o percepción de lo interior. «Conociendo» mantiene el sentido de awareness de manera natural en español y conserva la relación con el verbo de percepción sin imponer una lectura más fuerte que el texto.
- source_word: τὰς ἐνθυμήσεις
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - reflexiones
  - razonamientos
  lexicon: BDAG
  rationale: El sustantivo se refiere a pensamientos, deliberaciones o razonamientos internos. «Pensamientos» es claro, neutral y fiel al contexto inmediato de lo que Jesús detecta en ellos.
- source_word: Ἱνατί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Para qué razón?
  lexicon: BDAG
  rationale: La partícula interrogativa pide la causa o motivo. «¿Por qué» es el equivalente natural y directo en español.
- source_word: ἐνθυμεῖσθε
  english_pob_choice: are you thinking
  chosen_spanish: pensáis
  alternatives_spanish:
  - estáis pensando
  - consideráis
  lexicon: BDAG
  rationale: El verbo presenta una acción mental en curso. «Pensáis» resulta más idiomático y sobrio en español bíblico moderno que una perífrasis más larga, sin perder el valor presente del verbo.
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: cosas malas
  alternatives_spanish:
  - malas
  - maldad
  lexicon: BDAG
  rationale: El adjetivo neutro plural funciona sustantivamente y en el contexto se refiere a contenidos o intenciones malas del pensamiento. «Cosas malas» explicita ese valor sustantivado, aunque también se ofrece «malas» como posibilidad más concisa; el texto principal opta por una formulación natural en español que evita la ambigüedad de un adjetivo suelto.
- source_word: καρδίαις
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - mentes
  - interior
  lexicon: BDAG
  rationale: «Corazones» preserva la metáfora bíblica del centro interior de la persona, incluyendo pensamiento y voluntad. En español, sigue siendo inteligible y teológicamente cargado, por lo que no se reduce a «mentes».
theological_decisions:
- issue: Jesús conoce pensamientos no expresados
  english_pob_reading: Jesus, knowing their thoughts
  chosen_spanish_reading: Y Jesús, conociendo sus pensamientos
  alternative_spanish_readings:
  - Y Jesús, sabiendo sus pensamientos
  - Y Jesús, percibiendo sus pensamientos
  rationale: La frase mantiene la afirmación del texto de que Jesús tiene acceso a los pensamientos internos de los presentes. «Conociendo» conserva la tensión cristológica sin explicarla ni intensificarla más allá de la evidencia textual.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa que retiró «things» para reflejar mejor el adjetivo sustantivado griego. En español, esa concisión se refleja en la opción principal «cosas malas», pero se mantiene la posibilidad de una lectura más breve en la nota, evitando exagerar el objeto del pensamiento.
  spanish_consistency_notes:
  - Se usa «Jesús» sin artículo, como nombre propio.
  - Se mantiene el plural de segunda persona «pensáis» para el griego 2PMI-P--.
  - «Corazones» conserva el lenguaje antropológico bíblico del texto.
  - No se introduce lenguaje doctrinal adicional sobre omnisciencia; la frase se limita a la afirmación narrativa del versículo.
