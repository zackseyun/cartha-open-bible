translation:
  language: es
  text: 'Y he aquí[a], algunos de los escribas se dijeron entre sí: «Este hombre blasfema».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se dijeron a sí mismos». La expresión griega puede indicar habla privada o deliberación interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se conserva la coordinación narrativa simple con una conjunción natural en español; 'Y' mantiene la secuencia del relato sin añadir matiz temporal no explícito.
- source_word: ἰδού
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ver
  lexicon: BDAG
  rationale: '''He aquí'' reproduce bien la función de llamada de atención del marcador discursivo y conserva la vivacidad narrativa que el inglés auditado quiso retener.'
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  lexicon: BDAG
  rationale: '''Algunos'' expresa con naturalidad el valor indefinido plural del griego, sin precisar más de lo que el texto dice.'
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - expertos en la ley
  lexicon: BDAG
  rationale: '''Escribas'' es el equivalente asentado y más cercano al término griego en el contexto evangélico; evita explicitar funciones interpretativas que el texto no añade.'
- source_word: εἶπαν ἐν ἑαυτοῖς
  english_pob_choice: said among themselves
  chosen_spanish: se dijeron entre sí
  alternatives_spanish:
  - se dijeron a sí mismos
  - pensaron
  lexicon: BDAG
  rationale: La construcción griega puede indicar habla privada o deliberación interna. 'Se dijeron entre sí' conserva el plural y no reduce indebidamente el sentido a pensamiento silencioso.
- source_word: Οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Este sujeto
  - Él
  lexicon: BDAG
  rationale: '''Este hombre'' comunica de modo natural el deíctico con tono despectivo implícito en la acusación, sin suavizarlo ni volverlo excesivamente coloquial.'
- source_word: βλασφημεῖ
  english_pob_choice: is blaspheming
  chosen_spanish: blasfema
  alternatives_spanish:
  - está blasfemando
  - dice blasfemias
  lexicon: BDAG
  rationale: El presente griego se expresa de forma directa y idiomática con 'blasfema'. En español, esta forma verbal mantiene el contenido acusatorio sin introducir una perífrasis innecesaria.
theological_decisions:
- issue: Conservar la fuerza de la acusación de los escribas sin resolverla narrativamente
  english_pob_reading: This man is blaspheming
  chosen_spanish_reading: Este hombre blasfema
  alternative_spanish_readings:
  - Este hombre está blasfemando
  - Este hombre dice blasfemias
  rationale: La traducción mantiene la acusación tal como aparece en el relato, sin suavizarla ni interpretarla a la luz de la corrección doctrinal posterior. Se preserva así la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión teológica del relato sin armonización prematura.
translation_notes:
  revision_awareness: El texto griego coincide con el audit trail inglés en todos los puntos relevantes; no se requieren revisiones textuales adicionales. La única decisión delicada es la matización de ἐν ἑαυτοῖς, que en español se resuelve con una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'escribas' de manera uniforme para γραμματεῖς.
  - Se conserva 'blasfema' como verbo directo, evitando perífrasis que debiliten la acusación.
  - Se mantiene 'he aquí' para reflejar el marcador discursivo ἰδού sin omitirlo.
