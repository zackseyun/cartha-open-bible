    text: O «mucho» o «muchas veces»; el griego πολλά con «ayunar» expresa práctica frecuente.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «mucho» por «a menudo» porque comunica de manera natural en español el valor adverbial de frecuencia de πολλά con νηστεύω, tal como lo documenta la auditoría inglesa. Se conserva una nota con la alternativa más literal («mucho») y otra equivalente («muchas veces»), manteniendo el rastro lexical sin sacrificar claridad en el texto principal.
