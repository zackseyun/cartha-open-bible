review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: secuencia temporal («Entonces»), acercamiento a Jesús, identificación de «los discípulos de Juan», pregunta causal, contraste entre «nosotros y los fariseos» frente a «tus discípulos», y valor habitual de los presentes verbales. Sin embargo, la elección española «ayunamos mucho» para πολλά no preserva con claridad el sentido adverbial de frecuencia documentado en la auditoría inglesa («often / many times»). En español, «ayunar mucho» suena principalmente a intensidad o cantidad, no a práctica frecuente.'
  spanish_quality_summary: El texto es claro y natural en general, con registro moderno y digno. No obstante, «ayunamos mucho» resulta poco idiomático y puede confundir al lector. «Ayunamos a menudo» o «muchas veces» expresa mejor el uso normal del español y la práctica habitual señalada por el contexto. La puntuación y la sintaxis están bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Juan», «discípulos», «fariseos» y «ayunar» están bien. La revisión necesaria es léxica/idiomática respecto de πολλά, no terminológica-teológica.
  issues:
  - severity: medium
    issue: «mucho» para πολλά con «ayunar»
    rationale: Aunque el griego permite una literalidad superficial, la propia auditoría inglesa documenta que πολλά con νηστεύω expresa frecuencia. En español, «ayunar mucho» no comunica naturalmente «ayunar con frecuencia», sino cantidad o intensidad. Esto debilita la fidelidad semántica y la legibilidad.
  - severity: low
    issue: La nota al pie corrige de facto el texto principal
    rationale: La nota ofrece «a menudo» y «muchas veces», que son precisamente las opciones más naturales y fieles. Cuando la nota rescata el sentido principal que el texto no comunica bien, conviene ajustar el texto base y dejar la nota para la alternativa más literal.
  revised_spanish_text: 'Entonces se acercaron a él los discípulos de Juan, diciendo: «¿Por qué nosotros y los fariseos ayunamos a menudo[a], pero tus discípulos no ayunan?»'
  revised_footnotes:
