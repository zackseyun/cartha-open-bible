revisions:
- from: 'Entonces se acercaron a él los discípulos de Juan, diciendo: «¿Por qué nosotros y los fariseos ayunamos[a] mucho, pero tus discípulos no ayunan?»'
  to: 'Entonces se acercaron a él los discípulos de Juan, diciendo: «¿Por qué nosotros y los fariseos ayunamos a menudo[a], pero tus discípulos no ayunan?»'
  rationale: Se reemplaza «mucho» por «a menudo» porque comunica de manera natural en español el valor adverbial de frecuencia de πολλά con νηστεύω, tal como lo documenta la auditoría inglesa. Se conserva una nota con la alternativa más literal («mucho») y otra equivalente («muchas veces»), manteniendo el rastro lexical sin sacrificar claridad en el texto principal.
