translation:
  language: es
  text: 'Entonces se acercaron a él los discípulos de Juan, diciendo: «¿Por qué nosotros y los fariseos ayunamos a menudo[a], pero tus discípulos no ayunan?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mucho» o «muchas veces»; el griego πολλά con «ayunar» expresa práctica frecuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca temporal de secuencia narrativa. «Entonces» es natural en español y conserva el avance del relato sin añadir matiz interpretativo.
- source_word: προσέρχονται αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se llegaron a él
  lexicon: BDAG
  rationale: προσέρχομαι expresa acercarse o venir hacia alguien. «Se acercaron a él» conserva el movimiento hacia Jesús de forma idiomática en español.
- source_word: οἱ μαθηταὶ Ἰωάννου
  english_pob_choice: John's disciples
  chosen_spanish: los discípulos de Juan
  alternatives_spanish:
  - los discípulos de Juan el Bautista
  - los seguidores de Juan
  lexicon: BDAG
  rationale: La relación posesiva del genitivo se expresa con naturalidad como «de Juan». Se mantiene el referente personal sin sobreespecificar más allá del texto.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - mientras decían
  lexicon: BDAG
  rationale: El participio contemporáneo se reproduce con un gerundio que enlaza de modo fluido la llegada con la pregunta, sin perder la continuidad narrativa.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué se debe que
  - ¿Por qué razón
  lexicon: BDAG
  rationale: Interrogativo causal directo. «¿Por qué» es la equivalencia más natural y fiel en español.
- source_word: ἡμεῖς καὶ οἱ Φαρισαῖοι
  english_pob_choice: we and the Pharisees
  chosen_spanish: nosotros y los fariseos
  alternatives_spanish:
  - nosotros, al igual que los fariseos
  - nosotros junto con los fariseos
  lexicon: BDAG
  rationale: Conserva la comparación explícita entre el grupo que habla y los fariseos, sin suavizar la formulación contrastiva del griego.
- source_word: νηστεύομεν
  english_pob_choice: fast
  chosen_spanish: ayunamos
  alternatives_spanish:
  - ayunamos como práctica religiosa
  - nos abstemos de comer
  lexicon: BDAG
  rationale: «Ayunar» es el equivalente estándar y fiel para νηστεύω en contexto religioso. Evita paráfrasis innecesarias.
- source_word: πολλά
  english_pob_choice: often
  chosen_spanish: mucho[a]
  alternatives_spanish:
  - a menudo
  - frecuentemente
  - muchas veces
  lexicon: BDAG
  rationale: El adverbio griego modifica la práctica de ayunar con fuerza de cantidad/frecuencia. En español, «mucho» conserva la tensión literal con νηστεύω, mientras que la nota recoge la lectura frecuente documentada por la traducción inglesa.
- source_word: οἱ δὲ μαθηταί σου
  english_pob_choice: but your disciples
  chosen_spanish: pero tus discípulos
  alternatives_spanish:
  - en cambio tus discípulos
  - sin embargo, tus discípulos
  lexicon: BDAG
  rationale: «Pero» reproduce el valor adversativo de δέ en este contexto de contraste entre grupos.
- source_word: οὐ νηστεύουσιν
  english_pob_choice: do not fast
  chosen_spanish: no ayunan
  alternatives_spanish:
  - no están ayunando
  - no practican el ayuno
  lexicon: BDAG
  rationale: El presente indica práctica habitual, no una acción momentánea en progreso. «No ayunan» preserva esa costumbre contrastiva.
theological_decisions:
- issue: Sentido de πολλά con νηστεύω
  english_pob_reading: Render the question as a comparison of customary religious practice, not as a doctrinal judgment beyond the text.
  chosen_spanish_reading: 'La frase se entiende como contraste de práctica habitual: nosotros y los fariseos ayunamos mucho, pero tus discípulos no ayunan.'
  alternative_spanish_readings:
  - nosotros y los fariseos ayunamos a menudo
  - nosotros y los fariseos ayunamos muchas veces
  rationale: El griego combina νηστεύω con πολλά, y el contexto del POB inglés subraya frecuencia/práctica habitual. El español conserva la tensión con «mucho» y la nota explicativa registra la lectura adverbial de frecuencia sin borrar la literalidad.
  doctrine_reference: Preservar la tensión lexical sin resolver el sentido en una interpretación doctrinal o disciplinaria más allá del texto.
- issue: Comparación implícita sobre la conducta de los discípulos de Jesús
  english_pob_reading: The translation preserves the complaint without importing a stronger accusation or narrowing it to a single event.
  chosen_spanish_reading: La pregunta mantiene la queja comparativa sin convertirla en acusación doctrinal ni limitarla a una sola ocasión.
  alternative_spanish_readings:
  - Tus discípulos no ayunan en absoluto
  - Tus discípulos omiten el ayuno
  rationale: El presente plural y el contraste general sostienen una observación de costumbre. La formulación española evita intensificar el reclamo más allá de lo que muestra el griego.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Concordancia alta con la auditoría inglesa: se mantuvo la secuencia narrativa, el contraste explícito entre grupos y la ambigüedad léxica de πολλά con νηστεύω. No se introdujeron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se eligió «discípulos de Juan» para reflejar el genitivo posesivo sin cargarlo con glosa innecesaria.
  - «Ayunamos mucho» preserva la tensión del griego; la nota orienta hacia la lectura frecuente ya documentada en la auditoría inglesa.
  - Se usó puntuación de cita española con comillas angulares implícitas en estilo editorial y pregunta directa dentro del discurso.
  - Se evitó «SEÑOR» u այլ terminología no pertinente porque el versículo no contiene vocabulario divino explícito.
