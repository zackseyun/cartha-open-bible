translation:
  language: es
  text: 'Y cuando el demonio fue expulsado, el mudo[a] habló. Y las multitudes se maravillaron, diciendo: «Nunca se ha visto algo así en Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el sordo». La palabra griega puede significar «sordo» o «mudo»; aquí el contexto favorece «mudo», porque el énfasis está en que habló.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκβληθέντος
  english_pob_choice: when ... had been cast out
  chosen_spanish: cuando ... fue expulsado
  alternatives_spanish:
  - después de que ... fue expulsado
  - una vez que ... había sido expulsado
  lexicon: BDAG
  rationale: El participio aoristo pasivo en genitivo absoluto expresa una acción previa respecto del verbo principal. En español, «cuando fue expulsado» conserva bien la relación temporal sin sonar forzado. «Había sido expulsado» también sería posible, pero el aoristo aquí se vuelve más natural con un pasado simple en una construcción temporal.
- source_word: δαιμονίου
  english_pob_choice: the demon
  chosen_spanish: el demonio
  alternatives_spanish:
  - el demonio maligno
  - el espíritu maligno
  lexicon: BDAG
  rationale: En contextos de exorcismo en los evangelios, δαιμόνιον se traduce con precisión como «demonio». «Espíritu maligno» es comprensible, pero introduce un matiz interpretativo menos directo que el término griego.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - empezó a hablar
  - dijo
  lexicon: BDAG
  rationale: El aoristo de λαλέω se puede rendir simplemente como «habló». «Empezó a hablar» añade un matiz ingresivo no explícito. «Dijo» sería demasiado específico y menos idiomático en este contexto narrativo.
- source_word: ὁ κωφός
  english_pob_choice: the mute man
  chosen_spanish: el mudo
  alternatives_spanish:
  - el que no hablaba
  - el sordo
  lexicon: BDAG
  rationale: Aunque κωφός puede abarcar «sordo» o «mudo», el contexto inmediato subraya que el hombre habló, por lo que la limitación relevante aquí es la mudez. En español, «el mudo» transmite ese sentido de forma breve y natural. No se añade «hombre» porque el referente ya queda claro por el contexto narrativo previo.
- source_word: ἐθαύμασαν
  english_pob_choice: marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - quedaron asombradas
  - se asombraron
  lexicon: BDAG
  rationale: θαυμάζω expresa asombro o maravilla. «Se maravillaron» conserva un registro digno y cercano al tono del texto, y corresponde bien al matiz formal que la revisión inglesa prefirió frente a «were amazed».
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la gente
  - las muchedumbres
  lexicon: BDAG
  rationale: ὄχλοι es plural y designa grupos de personas que siguen a Jesús. «Las multitudes» mantiene el plural y un registro bíblico comprensible en español, aunque «la gente» sería más coloquial.
- source_word: Οὐδέποτε
  english_pob_choice: Never
  chosen_spanish: Nunca
  alternatives_spanish:
  - Jamás
  - Nunca antes
  lexicon: BDAG
  rationale: Οὐδέποτε se vierte de manera directa y natural como «Nunca». «Jamás» sería equivalente, pero «Nunca» encaja mejor con el ritmo de la exclamación.
- source_word: ἐφάνη
  english_pob_choice: has anything like this been seen
  chosen_spanish: se ha visto
  alternatives_spanish:
  - ha aparecido
  - se ha manifestado
  lexicon: BDAG
  rationale: El pasivo de φαίνω en este contexto se entiende como «ser visto». En español, «se ha visto» expresa con naturalidad la experiencia extraordinaria que destaca la multitud, sin forzar un sujeto explícito innecesario.
- source_word: οὕτως
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de tal manera
  lexicon: BDAG
  rationale: οὕτως apunta a la manera del hecho presenciado. En la exclamación, «así» es la opción más natural y concisa en español.
- source_word: ἐν τῷ Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: BDAG
  rationale: La frase preposicional se traduce de forma estándar como «en Israel». Mantiene la referencia geográfica y comunitaria sin sobreinterpretarla.
theological_decisions:
- issue: Sentido de κωφός en el contexto de sanidad/exorcismo
  english_pob_reading: Render as 'mute man' rather than 'deaf man.'
  chosen_spanish_reading: Renderizar como «el mudo» y no como «el sordo».
  alternative_spanish_readings:
  - el sordo
  - el que no hablaba
  rationale: El término griego puede abarcar sordera o mudez, pero la narración enfatiza que el hombre habló después del exorcismo. Por eso la elección principal en español destaca la mudez, siguiendo la primacía del contexto inmediato y la decisión auditada del texto inglés.
  doctrine_reference: Principio POB de primacía del texto original y de no introducir una segunda condición sin apoyo contextual.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió un verbo de asombro más formal («marveled») y una expresión pasiva más natural para ἐφάνη («been seen»). En español, eso se refleja con «se maravillaron» y «se ha visto», manteniendo el tono formal y la fuerza exclamativa del pasaje.
  spanish_consistency_notes:
  - Se usa «demonio» para δαιμόνιον, conforme al uso evangélico y al audit trail inglés.
  - Se preserva el contraste narrativo entre el exorcismo y el habla del hombre con una construcción temporal natural en español.
  - Se evita reemplazar términos del texto por formas eclesiásticas tradicionales sin necesidad contextual.
  - La exclamación final se mantiene breve y idiomática para conservar el impacto retórico del griego.
