revisions:
- from: Pero nadie pone un parche[a] de tela sin encoger sobre un vestido viejo, porque el parche tira de él y se produce una rotura peor.
  to: Pero nadie pone un parche[a] de tela sin encoger sobre una prenda vieja, porque el parche se arranca de la prenda, y resulta una rasgadura peor.
  rationale: Se reemplazó 'vestido viejo' por 'prenda vieja' para reflejar mejor ἱμάτιον en español general. Se cambió 'tira de él' por 'se arranca de la prenda' para preservar mejor la fuerza contextual de αἴρει ... ἀπὸ τοῦ ἱματίου y alinearse con la revisión auditada en inglés. También se afinó 'rotura' a 'rasgadura' para representar mejor σχίσμα y se pulió la nota al pie para mayor naturalidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:03:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y la imagen de la comparación, pero no preserva con suficiente fidelidad dos puntos del griego y del rastro de auditoría inglés: ἱματίῳ παλαιῷ se traduce mejor como ''prenda vieja'' que como ''vestido viejo'', y αἴρει ... ἀπὸ τοῦ ἱματίου en este contexto debe reflejar que el parche se arranca/desgarra de la prenda, no solo que ''tira de él''.'
  spanish_quality_summary: El español es mayormente claro, pero 'vestido viejo' en español actual suele sugerir una prenda femenina específica y estrecha indebidamente ἱμάτιον. Además, 'tira de él' deja el referente algo menos natural y debilita la imagen del desgarro. 'Prenda vieja' y 'se desprende de la prenda' o 'se arranca de la prenda' suenan más naturales y fieles.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La nota léxica sobre ἀγνάφου está bien encaminada; conviene pulir la redacción española de la nota y mantener la alternativa técnica 'sin fullar'.
  issues:
  - severity: high
    issue: '''vestido viejo'' para ἱματίῳ παλαιῷ'
    rationale: ἱμάτιον es una prenda/vestidura/garment en sentido general, no específicamente un 'vestido'. En español moderno, 'vestido' suele estrechar demasiado el referente y puede inducir una imagen equivocada.
  - severity: high
    issue: '''porque el parche tira de él'' para αἴρει ... ἀπὸ τοῦ ἱματίου'
    rationale: El rastro inglés revisado corrigió 'pulls away' a 'tears away' para reflejar mejor la fuerza contextual. 'Tira de él' no expresa que el parche se arranca o desgarra de la prenda y atenúa el resultado del daño.
  - severity: medium
    issue: '''rotura'' es menos preciso que ''rasgadura/desgarro'' para σχίσμα'
    rationale: σχίσμα en este contexto es una rasgadura o desgarro en tela. 'Rotura' es comprensible, pero más amplio y menos imagético.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: 'La nota actual es entendible, pero puede expresarse con español más natural: ''tela aún no procesada'' y ''prenda vieja'' armonizan mejor con el texto principal.'
  revised_spanish_text: Pero nadie pone un parche[a] de tela sin encoger sobre una prenda vieja, porque el parche se arranca de la prenda, y resulta una rasgadura peor.
  revised_footnotes:
  - marker: a
    text: 'O: «de tela sin fullar»; el griego describe una tela aún no procesada, con el sentido de que no se ha encogido y por eso tirará de la prenda vieja.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'vestido viejo' por 'prenda vieja' para reflejar mejor ἱμάτιον en español general. Se cambió 'tira de él' por 'se arranca de la prenda' para preservar mejor la fuerza contextual de αἴρει ... ἀπὸ τοῦ ἱματίου y alinearse con la revisión auditada en inglés. También se afinó 'rotura' a 'rasgadura' para representar mejor σχίσμα y se pulió la nota al pie para mayor naturalidad.
