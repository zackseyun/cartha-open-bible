translation:
  language: es
  text: Pero nadie pone un parche[a] de tela sin encoger sobre una prenda vieja, porque el parche se arranca de la prenda, y resulta una rasgadura peor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de tela sin fullar»; el griego describe una tela aún no procesada, con el sentido de que no se ha encogido y por eso tirará de la prenda vieja.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no hay nadie
  lexicon: BDAG
  rationale: Sujeto negativo indefinido; 'nadie' es natural en español y preserva el sentido universal sin introducir género.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca transición con contraste suave respecto al contexto anterior; 'Pero' reproduce bien ese giro.
- source_word: ἐπιβάλλει
  english_pob_choice: puts
  chosen_spanish: pone
  alternatives_spanish:
  - aplica
  - coloca
  - cose
  lexicon: BDAG
  rationale: El verbo básico es 'poner/aplicar'. En español, 'pone' conserva la imagen sin forzar un tecnicismo de costura que el verbo no expresa explícitamente.
- source_word: ἐπίβλημα
  english_pob_choice: patch
  chosen_spanish: parche
  alternatives_spanish:
  - remiendo
  - pieza
  lexicon: BDAG
  rationale: Designa una pieza aplicada a una prenda; 'parche' es la opción idiomática más clara en español moderno.
- source_word: ῥάκους ἀγνάφου
  english_pob_choice: of unshrunk cloth
  chosen_spanish: de tela sin encoger
  alternatives_spanish:
  - de tela sin fullar
  - de tela sin procesar
  - de tela cruda
  lexicon: BDAG
  rationale: ἄγναφος describe tela no preparada/encogida; 'sin encoger' comunica con precisión la consecuencia práctica de la ilustración. 'Tela' resulta más natural que un calco literal de 'paño' aquí.
- source_word: ἐπὶ ἱματίῳ παλαιῷ
  english_pob_choice: on an old garment
  chosen_spanish: sobre un vestido viejo
  alternatives_spanish:
  - sobre una prenda vieja
  - sobre un manto viejo
  - sobre un vestido antiguo
  lexicon: BDAG
  rationale: ἱμάτιον es una prenda exterior o vestidura; 'vestido' en español amplio puede abarcar una prenda puesta. 'Vestido viejo' mantiene la naturalidad y evita una traducción demasiado técnica o rígida.
- source_word: αἴρει
  english_pob_choice: tears away
  chosen_spanish: tira de él
  alternatives_spanish:
  - desgarra
  - arranca
  - lo rasga
  lexicon: BDAG
  rationale: El verbo expresa la acción de quitar/levantar con el efecto de tensión sobre la prenda. 'Tira de él' preserva la imagen del esfuerzo mecánico sin sobreespecificar el modo.
- source_word: τὸ πλήρωμα αὐτοῦ
  english_pob_choice: the patch
  chosen_spanish: el parche
  alternatives_spanish:
  - su relleno
  - su plenitud
  - la pieza que lo llena
  lexicon: BDAG
  rationale: En este contexto de costura, la expresión apunta a la pieza aplicada, es decir, el parche mismo. Se conserva el referente funcional sin traducir literalmente 'plenitud', que sería opaco en español.
- source_word: ἀπὸ τοῦ ἱματίου
  english_pob_choice: from the garment
  chosen_spanish: de él
  alternatives_spanish:
  - de la prenda
  - del vestido
  lexicon: BDAG
  rationale: El pronombre retoma la prenda mencionada y evita redundancia excesiva en español. El referente sigue claro por el contexto inmediato.
- source_word: χεῖρον σχίσμα γίνεται
  english_pob_choice: a worse tear results
  chosen_spanish: se produce una rotura peor
  alternatives_spanish:
  - resulta una rotura peor
  - se hace un desgarro peor
  - surge un rasgón peor
  lexicon: BDAG
  rationale: χείρων es comparativo ('peor') y σχίσμα es rotura/rasgadura. 'Se produce' expresa el resultado; 'rotura' comunica el daño en forma amplia y natural en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'tears away' frente a 'pulls away' para reflejar con mayor fuerza αἴρει en este contexto y mantener la imagen de un daño que empeora. En español se optó por 'tira de él' para conservar esa tensión mecánica; la nota aclara la alternativa más técnica del griego.
  spanish_consistency_notes:
  - Se conserva 'parche' como término principal para ἐπίβλημα, en coherencia con el valor contextual del pasaje.
  - '''Tela sin encoger'' refleja la alternativa auditada ''unshrunk cloth'' y evita un calco menos transparente.'
  - Se usó 'vestido' para ἱμάτιον por fluidez; en este contexto abarca una prenda exterior sin perder el sentido de la ilustración.
  - '''Rotura peor'' mantiene el paralelismo con el griego σχίσμα y el comparativo χεῖρον.'
