  text: οὐδεὶς δὲ ἐπιβάλλει ἐπίβλημα ῥάκους ἀγνάφου ἐπὶ ἱματίῳ παλαιῷ· αἴρει γὰρ τὸ πλήρωμα αὐτοῦ ἀπὸ τοῦ ἱματίου, καὶ χεῖρον σχίσμα γίνεται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/009/016.yaml
  text: But no one puts a patch of unshrunk cloth on an old garment[a], for the patch tears away from the garment, and a worse tear results.
  footnotes:
  - marker: a
    text: Or 'of unfulled cloth'; the Greek describes cloth not yet processed, with the sense that it has not been shrunk and so will pull against the old garment.
    reason: lexical_alternative
