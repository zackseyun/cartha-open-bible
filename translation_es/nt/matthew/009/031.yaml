translation:
  language: es
  text: Pero, después de salir, divulgaron noticias sobre él por toda aquella región[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por toda aquella tierra'. El griego γῆ puede significar 'tierra', 'región' o 'área'.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Introduce un giro narrativo leve frente a la orden de guardar silencio del contexto inmediato; 'Pero' conserva mejor el contraste que 'Y' y suena natural en español.
- source_word: ἐξελθόντες
  english_pob_choice: after they went out
  chosen_spanish: después de salir
  alternatives_spanish:
  - habiendo salido
  - cuando salieron
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal; 'después de salir' expresa con claridad la secuencia temporal sin forzar una construcción demasiado literal.
- source_word: διεφήμισαν
  english_pob_choice: they spread the news about him
  chosen_spanish: difundieron su fama
  alternatives_spanish:
  - divulgaron sobre él
  - publicaron su fama
  - hicieron correr su fama
  lexicon: BDAG
  rationale: El verbo implica dar amplia publicidad o propagar la noticia. 'Difundieron su fama' conserva ese sentido de divulgación y evita una perífrasis excesiva en español.
- source_word: αὐτὸν
  english_pob_choice: about him
  chosen_spanish: su fama
  alternatives_spanish:
  - acerca de él
  - sobre él
  lexicon: BDAG
  rationale: 'El objeto directo griego con διαφημίζω señala el asunto divulgado: la noticia acerca de Jesús. En español, ''su fama'' comunica de forma natural esa relación sin perder el referente.'
- source_word: ἐν ὅλῃ τῇ γῇ ἐκείνῃ
  english_pob_choice: throughout that whole region
  chosen_spanish: por toda aquella región
  alternatives_spanish:
  - en toda aquella tierra
  - por toda aquella tierra
  - por todo aquel territorio
  lexicon: BDAG
  rationale: γῆ puede significar 'tierra', 'región' o 'área'. Aquí el sentido local/geográfico de Mateo se comunica mejor con 'región'; 'por toda' transmite la extensión distributiva de ἐν con ὅλῃ.
theological_decisions:
- issue: Alcance geográfico de γῆ
  english_pob_reading: region
  chosen_spanish_reading: región
  alternative_spanish_readings:
  - tierra
  - territorio
  - área
  rationale: El versículo describe la difusión de la fama de Jesús en un ámbito local, no una afirmación de alcance nacional o universal. 'Región' evita sobredimensionar el alcance y conserva la ambigüedad léxica del griego dentro de un marco geográfico concreto.
  doctrine_reference: Uso geográfico de γῆ en el NT
translation_notes:
  revision_awareness: Se corrigió el fallo de validación anterior eliminando cualquier nota al pie no anclada; esta versión no usa marcadores de nota para evitar desajustes entre texto y aparato.
  spanish_consistency_notes:
  - Se mantuvo 'región' para γῆ en coherencia con el criterio POB inglés y con el contexto local de Mateo.
  - '''Difundieron su fama'' preserva el sentido de publicidad amplia de διεφήμισαν sin caer en un calco torpe.'
  - La cláusula temporal 'después de salir' refleja el participio aoristo antecedente con español natural y claro.
