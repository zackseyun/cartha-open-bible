  text: ὁ δὲ Ἰησοῦς ⸀στραφεὶς καὶ ἰδὼν αὐτὴν εἶπεν· Θάρσει, θύγατερ· ἡ πίστις σου σέσωκέν σε. καὶ ἐσώθη ἡ γυνὴ ἀπὸ τῆς ὥρας ἐκείνης.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/009/022.yaml
  text: But Jesus[a], turning and seeing her, said, “Take courage, daughter[d][c][b]; your faith has saved you.” And the woman was healed from that hour.
  footnotes:
  - marker: a
    text: Or 'your faith has made you well' or 'your faith has healed you.' The Greek verb can mean save, heal, or make well; the main text preserves the broader sense in Jesus' words.
    reason: lexical_alternative
  - marker: b
    text: Or 'Take heart, daughter.'
    reason: lexical_alternative
  - marker: c
    text: πίστις can also be rendered 'trust' here.
    reason: alternative_reading
  - marker: d
    text: Or 'turned, and seeing her'.
    reason: previous_rendering
