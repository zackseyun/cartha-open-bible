translation:
  language: es
  text: 'Pero Jesús[a], volviéndose y viéndola, dijo: «Ten ánimo, hija[b][c][d]; tu fe te ha salvado[e].» Y la mujer fue sanada desde aquella hora.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volvió y, al verla» o «volviéndose, al verla».
    reason: previous_rendering
  - marker: b
    text: O «Ten valor, hija».
    reason: lexical_alternative
  - marker: c
    text: πίστις también puede traducirse «confianza» aquí.
    reason: alternative_reading
  - marker: d
    text: O «Ten ánimo, hija». El vocativo puede entenderse junto con toda la exhortación.
    reason: lexical_alternative
  - marker: e
    text: O «te ha sanado» o «te ha hecho bien». El verbo griego puede significar salvar, sanar o poner bien; el texto principal conserva el sentido más amplio en las palabras de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turned
  chosen_spanish: volviéndose
  alternatives_spanish:
  - girándose
  - volviéndose atrás
  lexicon: BDAG
  rationale: El participio aoristo de στρέφω expresa un giro/voltearse previo a la acción de ver. «Volviéndose» conserva la secuencia participial del griego y suena natural en español, sin añadir una dirección explícita que el texto no precisa.
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: viéndola
  alternatives_spanish:
  - al verla
  - y al verla
  lexicon: BDAG
  rationale: Mantiene la relación de participio contemporáneo/secuencial con el verbo principal. «Viéndola» conserva la fluidez del griego y evita una expansión innecesaria.
- source_word: Θάρσει
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Ten valor
  - Recobra ánimo
  - Ten confianza
  lexicon: BDAG
  rationale: El imperativo de θαρσέω pide ánimo/confianza/coraje. En español, «Ten ánimo» comunica bien la exhortación sin sonar rígido y mantiene la cercanía pastoral del vocativo siguiente.
- source_word: θύγατερ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - hija mía
  - querida hija
  lexicon: BDAG
  rationale: «Hija» preserva el vocativo afectuoso y directo sin añadir intensificadores que no están en el griego. Refleja la ternura de la dirección de Jesús.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - creencia
  lexicon: BDAG
  rationale: La forma nominal πίστις se traduce de manera estándar como «fe». En este contexto implica la confianza creyente de la mujer, pero «fe» conserva la consistencia doctrinal y la amplitud semántica.
- source_word: σέσωκέν σε
  english_pob_choice: has saved you
  chosen_spanish: te ha salvado
  alternatives_spanish:
  - te ha sanado
  - te ha hecho bien
  lexicon: BDAG
  rationale: σῴζω puede abarcar salvar, sanar o hacer bien. En la palabra de Jesús, «te ha salvado» conserva el alcance más amplio y no reduce prematuramente el sentido a lo físico; la narración posterior explicita el resultado corporal.
- source_word: ἐσώθη
  english_pob_choice: was healed
  chosen_spanish: quedó sana
  alternatives_spanish:
  - fue sanada
  - fue salvada
  - quedó curada
  lexicon: BDAG
  rationale: El pasivo aoristo de σῴζω aquí se refiere al desenlace visible en la historia. «Quedó sana» comunica con naturalidad el resultado de sanidad y preserva el vínculo semántico con «salvó» en la frase anterior sin forzar una terminología técnica.
- source_word: ἀπὸ τῆς ὥρας ἐκείνης
  english_pob_choice: from that hour
  chosen_spanish: desde aquella hora
  alternatives_spanish:
  - desde esa hora
  - a partir de aquella hora
  lexicon: BDAG
  rationale: Es una equivalencia casi literal y solemne del marcador temporal. «Aquella» mantiene la distancia narrativa del griego ἐκείνης.
- source_word: γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la mujer aquella
  - la mujer enferma
  lexicon: BDAG
  rationale: Es la referencia narrativa estándar a la mujer del episodio. «La mujer» es suficiente y natural en español.
theological_decisions:
- issue: Doble uso de σῴζω en la declaración de Jesús y en la conclusión narrativa
  english_pob_reading: Main text uses 'has saved you' in Jesus' statement and 'was healed' in the narrative conclusion
  chosen_spanish_reading: 'En la palabra de Jesús: «te ha salvado»; en la conclusión: «quedó sana»'
  alternative_spanish_readings:
  - «te ha sanado» / «fue sanada»
  - «te ha hecho bien» / «quedó curada»
  - 'usar la misma raíz en ambos miembros: «te ha salvado» / «fue salvada»'
  rationale: 'Se preserva la tensión semántica de σῴζω: en boca de Jesús, el verbo mantiene su amplitud soteriológica y sanadora; en el cierre narrativo, el resultado físico se expresa de forma clara y natural. No se reduce el dicho de Jesús a mera curación.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: Valor de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fe creyente
  rationale: «Fe» es el equivalente estable y doctrinalmente transparente para πίστις. «Confianza» es posible como matiz, pero el texto no exige desplazar el término principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Exhortación Θάρσει
  english_pob_reading: Take courage
  chosen_spanish_reading: Ten ánimo
  alternative_spanish_readings:
  - Ten valor
  - Recobra ánimo
  - Ten confianza
  rationale: La orden expresa aliento y fortaleza. «Ten ánimo» comunica bien el impulso exhortativo sin exagerar ni suavizar el imperativo.
  doctrine_reference: BDAG, θάρσει; stylistic clarity in Spanish
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que mantuvo la frase participial con puntuación natural y la decisión inglesa de conservar la amplitud semántica de σῴζω en las palabras de Jesús, mientras que el desenlace narrativo se hizo explícitamente físico. La versión española replica esa tensión: «te ha salvado» en el dicho de Jesús y «quedó sana» en la conclusión.'
  spanish_consistency_notes:
  - Se usó «fe» para πίστις, alineado con el término doctrinal estándar del proyecto.
  - Se evitó «SEÑOR» o perífrasis eclesiásticas; el nombre propio es «Jesús» conforme a la política del proyecto.
  - 'La secuencia participial se mantuvo con dos gerundios coordinados: «volviéndose y viéndola».'
  - «Desde aquella hora» conserva la marcación temporal solemne del griego y la redacción inglesa auditada.
