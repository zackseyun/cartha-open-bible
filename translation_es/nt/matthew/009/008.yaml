base_translation:
  language: en
  yaml_path: translation/nt/matthew/009/008.yaml
  text: But when the crowds saw it[a], they were afraid and glorified God[b], who had given such authority to men.
  footnotes:
  - marker: a
    text: Or 'were filled with awe.' The Greek verb more literally means 'were afraid,' but the fear may include reverent amazement.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to people'' or ''to human beings.'' Greek: ''to men,'' which can function representatively for humans in general.'
    reason: lexical_alternative
