translation:
  language: es
  text: Pero cuando las multitudes lo vieron[a], tuvieron miedo y glorificaron a Dios, que había dado tal autoridad a los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedaron llenos de asombro». El verbo griego significa más literalmente «tuvieron miedo», aunque el temor puede incluir admiración reverente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a las personas» o «a los seres humanos». El griego dice «a los hombres», forma masculina plural que puede funcionar representativamente para la humanidad en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when the crowds saw it
  chosen_spanish: cuando las multitudes lo vieron
  alternatives_spanish:
  - al ver
  - después de ver
  lexicon: BDAG
  rationale: El participio aoristo se vuelve una cláusula temporal natural en español. Se añade "lo" por el objeto implícito del contexto, sin ampliar indebidamente el sentido.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición narrativa y contraste con la escena anterior; "Pero" comunica mejor el giro que una simple coordinación.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la multitud
  - las gentes
  lexicon: BDAG
  rationale: El plural griego se conserva mejor con un plural español. "Multitudes" es natural, digno y fiel al valor colectivo.
- source_word: ἐφοβήθησαν
  english_pob_choice: were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - fueron sobrecogidos de temor
  - quedaron llenos de asombro
  lexicon: BDAG
  rationale: φοβέομαι significa primariamente temer / tener miedo. Se mantiene ese sentido fuerte sin resolverlo prematuramente como mera admiración reverente.
- source_word: ἐδόξασαν
  english_pob_choice: glorified
  chosen_spanish: glorificaron
  alternatives_spanish:
  - dieron gloria a
  - alabaron
  lexicon: BDAG
  rationale: δοξάζω conserva su peso teológico con "glorificar"; evita suavizarlo a un verbo más general como "alabar".
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: El acusativo con verbo transitivo se expresa de manera natural en español con objeto directo introducido por "a".
- source_word: τὸν δόντα
  english_pob_choice: who had given
  chosen_spanish: que había dado
  alternatives_spanish:
  - que dio
  - el que había dado
  lexicon: BDAG
  rationale: El participio articular aoristo funciona atributivamente con "Dios"; la relativa con pluscuamperfecto refleja acción previa respecto de la reacción de la multitud.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: '"Autoridad" comunica mejor la noción de poder delegado o derecho conferido, especialmente en el marco de la autoridad para perdonar pecados.'
- source_word: τοιαύτην
  english_pob_choice: such
  chosen_spanish: tal
  alternatives_spanish:
  - una autoridad así de grande
  - semejante
  lexicon: BDAG
  rationale: '"Tal" reproduce de forma concisa el matiz demostrativo de τοιαύτην sin sobreexplicar.'
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: to men
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego para respetar la redacción del texto. En español, "los hombres" puede funcionar de manera representativa para la humanidad en general.
theological_decisions:
- issue: 'La reacción de la multitud: miedo o asombro reverente'
  english_pob_reading: they were afraid
  chosen_spanish_reading: tuvieron miedo
  alternative_spanish_readings:
  - quedaron llenos de asombro
  - fueron sobrecogidos de temor
  rationale: Se preserva el valor lexical directo de φοβέομαι. Aunque el contexto puede incluir asombro reverente, la traducción no debe disolver la tensión emocional del relato.
  doctrine_reference: Preservar la tensión teológica y emocional del texto fuente.
- issue: Renderizar τοῖς ἀνθρώποις de manera género-accurate
  english_pob_reading: to men
  chosen_spanish_reading: a los hombres
  alternative_spanish_readings:
  - a las personas
  - a los seres humanos
  rationale: El griego usa el masculino plural, y la POB inglesa retuvo "men" por fidelidad representativa. En español se mantiene la misma decisión, con fuerza genérica posible en el uso bíblico.
  doctrine_reference: Precisión de género gramatical sin borrar el alcance representativo.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión indicada: no se reportaron cambios aplicados y el resumen de comparación mostró alta concordancia con solo cuestiones menores. La redacción española conserva las mismas decisiones nucleares del auditable inglés: miedo/temor, glorificar, autoridad, y el masculino plural representativo en τοῖς ἀνθρώποις.'
  spanish_consistency_notes:
  - Se usa "Dios" con artículo y objeto directo introducido por "a" conforme al español bíblico actual.
  - '"Multitudes" preserva el plural del griego mejor que un singular colectivo.'
  - Se mantiene "hombres" en el texto principal por fidelidad al género gramatical del original, con nota inclusiva para claridad lectora.
  - '"Glorificaron" conserva el registro teológico de δοξάζω mejor que opciones más generales.'
  - La puntuación y el orden de cláusulas buscan naturalidad en español sin perder la estructura narrativa del griego.
