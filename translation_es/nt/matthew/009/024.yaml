translation:
  language: es
  text: 'Él decía: «Apártense, porque la niña no ha muerto, sino que duerme». Y se burlaban[a] de él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se reían de él» o «lo ridiculizaban». El verbo griego puede significar reírse de alguien en tono de burla o ridiculizarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: He was saying
  chosen_spanish: estaba diciendo
  alternatives_spanish:
  - dijo
  - decía
  lexicon: BDAG
  rationale: El imperfecto griego comunica una acción en curso o reiterada; «estaba diciendo» preserva ese valor aspectual mejor que un simple pretérito. En español suena natural en una escena narrativa directa.
- source_word: Ἀναχωρεῖτε
  english_pob_choice: Go away
  chosen_spanish: Apártense
  alternatives_spanish:
  - Retírense
  - Váyanse
  lexicon: BDAG
  rationale: Es un imperativo plural dirigido a varias personas. «Apártense» comunica la orden de retirarse o dejar espacio sin introducir un matiz demasiado fuerte o ajeno al contexto.
- source_word: οὐ γὰρ
  english_pob_choice: for ... not
  chosen_spanish: porque ... no
  alternatives_spanish:
  - pues ... no
  - ya que ... no
  lexicon: BDAG
  rationale: γάρ introduce la razón de la orden; «porque» expresa esa relación causal de manera clara y natural en español.
- source_word: ἀπέθανεν
  english_pob_choice: has not died
  chosen_spanish: no ha muerto
  alternatives_spanish:
  - no murió
  - no está muerta
  lexicon: BDAG
  rationale: El aoristo presenta la muerte como evento. «No ha muerto» conserva bien la referencia al hecho consumado con un perfecto natural en español, manteniendo el contraste con «duerme».
- source_word: τὸ κοράσιον
  english_pob_choice: the girl
  chosen_spanish: la niña
  alternatives_spanish:
  - la muchacha
  - la jovencita
  lexicon: BDAG
  rationale: κοράσιον denota una niña o muchacha joven. Aquí «la niña» es idiomático, claro y acorde con el contexto narrativo, sin añadir el diminutivo «pequeña» que no exige el griego.
- source_word: ἀλλὰ καθεύδει
  english_pob_choice: but is sleeping
  chosen_spanish: sino que duerme
  alternatives_spanish:
  - sino que está durmiendo
  - sino que está dormida
  lexicon: BDAG
  rationale: Se mantiene el contraste literal entre muerte y sueño sin resolver la tensión interpretativa del dicho de Jesús. «Duerme» reproduce la metáfora de forma sobria; «sino que» preserva bien la oposición griega ἀλλά.
- source_word: κατεγέλων αὐτοῦ
  english_pob_choice: they were laughing at him
  chosen_spanish: se burlaban de él
  alternatives_spanish:
  - se reían de él
  - lo ridiculizaban
  lexicon: BDAG
  rationale: El verbo puede significar reírse de, burlarse de o ridiculizar. En este contexto, la burla está claramente implicada; «se burlaban de él» transmite el desprecio narrativo con naturalidad en español.
theological_decisions:
- issue: Jesús dice que la niña no ha muerto, sino que duerme
  english_pob_reading: Retain the literal metaphor 'sleeping' in the main text without interpretive expansion.
  chosen_spanish_reading: Mantener «duerme» en el texto principal, sin explicar la metáfora ni suavizarla.
  alternative_spanish_readings:
  - «está solo dormida»
  - añadir una glosa explicativa sobre el uso metafórico
  rationale: El griego presenta la frase en su forma provocadora y abierta. Conservar «duerme» mantiene la tensión narrativa y teológica sin resolverla en la traducción.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue de cerca la lectura auditada del POB inglés y del griego SBLGNT, conservando el imperfecto de habla, el imperativo plural, la metáfora de dormir y el matiz de burla del verbo final. No se detectaron cambios de revisión posteriores que alteren la decisión de traducción.
  spanish_consistency_notes:
  - Se usa «Dios» y «Yahvé» según la política general del proyecto, aunque este versículo no los contiene.
  - Se prefiere «niña» para κοράσιον por naturalidad y fidelidad contextual; no se fuerza «muchacha» porque en español puede sonar más ambigua en edad.
  - Se conserva el paralelismo adversativo con «sino que» para reflejar ἀλλὰ con claridad.
  - La nota al pie se ancla en «se burlaban» porque allí se concentra la alternativa léxica principal.
