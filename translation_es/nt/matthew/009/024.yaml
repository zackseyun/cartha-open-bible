  - severity: low
    issue: «Él estaba diciendo» suena algo pesado en español narrativo
    rationale: Aunque reproduce el imperfecto, «Él decía» preserva igualmente el aspecto y resulta más idiomático y fluido en español bíblico contemporáneo.
