  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la precisión semántica sin cambiar el sentido: ''Ni'' en lugar de ''Ni tampoco'', ''De lo contrario'' como advertencia más idiomática, y ''se arruinan'' para reflejar mejor que los odres quedan inservibles. Se mantuvo la distinción clave ''vino nuevo'' / ''odres frescos'' y la nota léxica correspondiente.'
