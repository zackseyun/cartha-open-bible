  yaml_path: translation/nt/matthew/009/017.yaml
  text: Nor do they put new wine into old wineskins. Otherwise[a], the wineskins burst, and the wine is spilled, and the wineskins are ruined. Rather, they put new wine into fresh wineskins, and both are preserved.
  footnotes:
