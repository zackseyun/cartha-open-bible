  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: contrasta vino nuevo con odres viejos/frescos, expresa la consecuencia de ponerlos incorrectamente y cierra con la preservación de ambos. También conserva correctamente la distinción léxica entre νέος y καινός mediante ''nuevo'' y ''frescos''.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero hay dos ajustes menores de naturalidad y precisión contextual. 'Ni tampoco' es algo redundante al inicio; 'Ni' basta. Además, para ἀπόλλυνται, 'se pierden' es comprensible pero menos preciso que 'se arruinan' en este contexto de odres que quedan inservibles. 'De otro modo' podría mantenerse, pero 'De lo contrario' suena más idiomático aquí.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Odres' es una excelente elección para ἀσκοί. La distinción νέος/καινός se preserva adecuadamente con 'vino nuevo' / 'odres frescos', y la nota léxica refleja bien la racionalidad documentada en la POB inglesa.
  issues:
  - severity: low
    issue: Inicio con 'Ni tampoco'
    rationale: οὐδὲ introduce una continuación negativa; en español, 'Ni' ya expresa bien esa función. 'Ni tampoco' suena redundante y ligeramente menos elegante.
  - severity: medium
    issue: '''Se pierden'' para ἀπόλλυνται'
    rationale: El contexto describe odres que quedan inservibles tras reventarse. 'Se arruinan' refleja mejor el valor práctico de 'are ruined' documentado por la POB que 'se pierden', que en español puede sugerir extravío más que deterioro.
  - severity: low
    issue: '''De otro modo'' puede afinarse a ''De lo contrario'''
    rationale: Ambas opciones son válidas para εἰ δὲ μή γε, pero 'De lo contrario' es más idiomática en este tipo de advertencia consecutiva en español bíblico actual.
  revised_spanish_text: Ni ponen vino nuevo en odres viejos. De lo contrario[a], los odres se rompen, y el vino se derrama, y los odres se arruinan. Más bien, ponen vino nuevo en odres frescos, y ambos se conservan.
  revised_footnotes:
  - marker: a
    text: O 'odres nuevos'. El griego distingue entre vino nuevo (νέος) y odres que son frescos/nuevos en condición (καινός).
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la precisión semántica sin cambiar el sentido: ''Ni'' en lugar de ''Ni tampoco'', ''De lo contrario'' como advertencia más idiomática, y ''se arruinan'' para reflejar mejor que los odres quedan inservibles. Se mantuvo la distinción clave ''vino nuevo'' / ''odres frescos'' y la nota léxica correspondiente.'
