translation:
  language: es
  text: Ni ponen vino nuevo en odres viejos. De lo contrario[a], los odres se rompen, y el vino se derrama, y los odres se arruinan. Más bien, ponen vino nuevo en odres frescos, y ambos se conservan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'odres nuevos'. El griego distingue entre vino nuevo (νέος) y odres que son frescos/nuevos en condición (καινός).
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Nor
  chosen_spanish: Ni tampoco
  alternatives_spanish:
  - Ni
  - Tampoco
  lexicon: BDAG
  rationale: Expresa la continuación negativa del dicho anterior con una conexión natural en español, sin volverlo mecánico.
- source_word: βάλλουσιν
  english_pob_choice: put
  chosen_spanish: ponen
  alternatives_spanish:
  - meten
  - colocan
  lexicon: BDAG
  rationale: En el contexto de guardar vino, 'ponen' es idiomático y conserva la idea de introducir el vino en los odres.
- source_word: οἶνον νέον
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino reciente
  - vino joven
  lexicon: BDAG
  rationale: Mantiene la expresión fija y clara para el vino recién hecho; 'nuevo' conserva el contraste temporal del griego νέος.
- source_word: ἀσκοὺς
  english_pob_choice: wineskins
  chosen_spanish: odres
  alternatives_spanish:
  - pieles
  - odres de vino
  lexicon: BDAG
  rationale: '''Odres'' es el equivalente natural en español para los contenedores de cuero usados para vino; evita la repetición explicativa innecesaria.'
- source_word: παλαιούς
  english_pob_choice: old
  chosen_spanish: viejos
  alternatives_spanish:
  - antiguos
  - gastados
  lexicon: BDAG
  rationale: '''Viejos'' reproduce de forma directa el contraste de edad/condición con καινούς.'
- source_word: εἰ δὲ μή γε
  english_pob_choice: Otherwise
  chosen_spanish: De otro modo
  alternatives_spanish:
  - Si no
  - De lo contrario
  lexicon: BDAG
  rationale: Transmite la advertencia consecuente de manera natural en español, preservando la relación causa-efecto del original.
- source_word: ῥήγνυνται
  english_pob_choice: burst
  chosen_spanish: se rompen
  alternatives_spanish:
  - revientan
  - se rasgan
  lexicon: BDAG
  rationale: '''Se rompen'' comunica con claridad el fallo de los odres bajo presión; es idiomático y suficientemente fuerte.'
- source_word: ἐκχεῖται
  english_pob_choice: is spilled
  chosen_spanish: se derrama
  alternatives_spanish:
  - se vacía
  - se desparrama
  lexicon: BDAG
  rationale: '''Se derrama'' refleja bien la pérdida del vino tras romperse los odres y suena natural en español.'
- source_word: ἀπόλλυνται
  english_pob_choice: are ruined
  chosen_spanish: se pierden
  alternatives_spanish:
  - se arruinan
  - se destruyen
  lexicon: BDAG
  rationale: '''Se pierden'' comunica el resultado práctico de quedar inservibles; evita sobredeterminar con un matiz absoluto de destrucción.'
- source_word: ἀλλὰ
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - Sino
  - En cambio
  lexicon: BDAG
  rationale: Marca el contraste correctivo de forma fluida y natural en español.
- source_word: καινούς
  english_pob_choice: fresh
  chosen_spanish: frescos
  alternatives_spanish:
  - nuevos
  - recientes
  lexicon: BDAG
  rationale: 'Conserva la distinción de la POB entre νέος y καινός: el vino es ''nuevo'' y los odres son ''frescos'', es decir, en buen estado/apropiados para contenerlo.'
- source_word: ἀμφότεροι
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: BDAG
  rationale: '''Ambos'' es breve y natural en español, y refiere al vino y los odres conjuntamente.'
- source_word: συντηροῦνται
  english_pob_choice: are preserved
  chosen_spanish: se conservan
  alternatives_spanish:
  - se preservan
  - permanecen intactos
  lexicon: BDAG
  rationale: '''Se conservan'' expresa que ambos permanecen íntegros y útiles, con un registro digno y claro.'
theological_decisions:
- issue: Distinción entre νέος y καινός en el mismo versículo
  english_pob_reading: Render νέος as 'new' and καινός as 'fresh'
  chosen_spanish_reading: vino nuevo / odres frescos
  alternative_spanish_readings:
  - vino nuevo / odres nuevos
  - vino reciente / odres nuevos
  rationale: 'Se mantiene la distinción léxica del griego: el vino es nuevo por su condición temporal, mientras que los odres son frescos, es decir, aptos para contenerlo. Esto preserva la tensión observada por la POB sin borrarla.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto a 'De otro modo'.
  spanish_consistency_notes:
  - Se mantuvo 'odres' como equivalente regular de ἀσκοί, en lugar de 'peleles' o una glosa explicativa.
  - Se conservó la distinción entre 'nuevo' y 'frescos' para reflejar el contraste entre νέος y καινός.
  - El cierre 'se conservan' sigue la lectura de preservación integral de ambos elementos.
