translation:
  language: es
  text: Al ver a las multitudes[a], se compadeció de ellas, porque estaban acosadas y abatidas, como ovejas que no tienen pastor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acosadas y desamparadas». Los términos griegos también pueden entenderse de manera más interpretativa como una descripción de las multitudes agotadas y sin capacidad de cuidarse a sí mismas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν
  english_pob_choice: when he saw
  chosen_spanish: Al ver
  alternatives_spanish:
  - cuando vio
  - viendo
  lexicon: BDAG
  rationale: El participio aoristo se vierte en español como construcción temporal natural. «Al ver» conserva la relación temporal sin sonar forzado.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: (sin equivalente explícito; avance narrativo por coma)
  alternatives_spanish:
  - Y
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ aquí solo conecta y hace avanzar la narración. En español, una coma y la continuidad verbal suelen comunicar mejor ese valor leve que añadir una conjunción pesada.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las turbas
  - la gente
  lexicon: BDAG
  rationale: ὄχλοι designa grupos numerosos reunidos. «Multitudes» refleja bien el plural y el alcance colectivo; «gente» pierde fuerza y «turbas» añade un matiz no presente.
- source_word: ἐσπλαγχνίσθη περὶ αὐτῶν
  english_pob_choice: he had compassion on them
  chosen_spanish: se compadeció de ellas
  alternatives_spanish:
  - tuvo compasión de ellas
  - fue movido a compasión por ellas
  lexicon: BDAG
  rationale: σπλαγχνίζομαι expresa compasión profunda. En español, «se compadeció de ellas» comunica esa reacción misericordiosa de manera natural. Se mantiene el referente plural de «multitudes» con «ellas».
- source_word: ἐσκυλμένοι
  english_pob_choice: harassed
  chosen_spanish: maltratadas
  alternatives_spanish:
  - acosadas
  - hostigadas
  - fatigadas
  lexicon: BDAG
  rationale: σκύλλω puede expresar trato duro, aflicción o ser desgastado por otros. Dado el contexto pastoral, «maltratadas» conserva la idea de opresión y daño recibido sin volver demasiado interpretativo el texto.
- source_word: ἐρριμμένοι
  english_pob_choice: cast down
  chosen_spanish: derribadas
  alternatives_spanish:
  - echadas abajo
  - postradas
  - arrojadas
  lexicon: BDAG
  rationale: ῥίπτω sugiere ser echado o lanzado abajo. «Derribadas» preserva la imagen de caída y abatimiento con buen español contemporáneo.
- source_word: ὡσεὶ πρόβατα
  english_pob_choice: like sheep
  chosen_spanish: como ovejas
  alternatives_spanish:
  - como ovejas
  - cual ovejas
  lexicon: BDAG
  rationale: ὡσεὶ introduce comparación. «Como ovejas» es la equivalencia más natural y clara en español.
- source_word: μὴ ἔχοντα ποιμένα
  english_pob_choice: without a shepherd
  chosen_spanish: que no tienen pastor
  alternatives_spanish:
  - sin pastor
  - que no tienen un pastor
  lexicon: BDAG
  rationale: El griego expresa la ausencia de un pastor. «Que no tienen pastor» mantiene la metáfora bíblica de guía y cuidado, y suena más directo que una abstracción.
theological_decisions:
- issue: Compasión de Jesús
  english_pob_reading: he had compassion on them
  chosen_spanish_reading: se compadeció de ellas
  alternative_spanish_readings:
  - tuvo compasión de ellas
  - fue movido a compasión por ellas
  rationale: 'La frase conserva la fuerza afectiva y misericordiosa del verbo griego sin imponerse con una fórmula demasiado rígida. También evita diluir el sujeto cristológico: es Jesús quien responde con misericordia ante la condición de la gente.'
  doctrine_reference: Translation philosophy §6; mantener el sentido sin arcaísmo
- issue: Estado de las multitudes
  english_pob_reading: harassed and cast down
  chosen_spanish_reading: maltratadas y derribadas
  alternative_spanish_readings:
  - acosadas y abatidas
  - hostigadas y postradas
  - maltratadas y abatidas
  rationale: Los participios griegos describen personas dañadas y echadas abajo. «Maltratadas y derribadas» retiene la fuerza concreta de la imagen mejor que una traducción más interpretativa como «desamparadas».
  doctrine_reference: Translation philosophy §1 y §5; preservar la imagen sin sobreinterpretarla
translation_notes:
  revision_awareness: 'Coincide con el último repaso auditado: no se registraron revisiones aplicadas y el acuerdo de revisión fue alto. La redacción española sigue la misma decisión de traducir el participio inicial con valor temporal, el verbo de compasión con una fórmula natural, y la doble serie de participios con una imagen concreta sin convertirla en paráfrasis.'
  spanish_consistency_notes:
  - Se mantiene «multitudes» para ὄχλους, coherente con el valor colectivo del plural griego.
  - Se usa «pastor» para ποιμήν, manteniendo la metáfora bíblica sin sustituirla por un equivalente explicativo.
  - Se conserva la comparación explícita «como ovejas» para ὡσεὶ πρόβατα.
  - La nota al pie recoge la alternativa interpretativa del inglés POB y la amplía de forma controlada para el español.
