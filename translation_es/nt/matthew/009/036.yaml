review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: Jesús ve a las multitudes, siente compasión, y la razón es su condición de vulnerabilidad, expresada por los participios ἐσκυλμένοι y ἐρριμμένοι, comparadas con ovejas sin pastor. Sin embargo, «multitudes» suena menos natural en español contemporáneo que «las multitudes/la gente» según contexto, y sobre todo «maltratadas y derribadas» resulta algo rígido y físico en combinación con personas. El POB inglés preserva la imagen de ‘harassed and cast down’ con una nota alternativa; en español conviene una formulación más natural pero aún cercana a la imagen.'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse en naturalidad y fluidez. «Se compadeció de ellas» es correcto, aunque «tuvo compasión de ellas» o «se compadeció de ellas» ambos funcionan; no es un problema mayor. La principal mejora es léxica: «acosadas y abatidas» comunica mejor el desgaste y el estar echadas abajo que «maltratadas y derribadas», evitando una lectura demasiado corporal. También la nota al pie debería alinearse mejor con el inglés auditado: la alternativa es «acosadas y desamparadas», y la explicación interpretativa debe mantenerse.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La metáfora pastoral «ovejas ... sin pastor» debe conservarse. La elección de «pastor» es correcta. La revisión propuesta mantiene la cercanía al razonamiento léxico documentado en inglés para σκύλλω/ῥίπτω.
  issues:
  - severity: medium
    issue: «maltratadas y derribadas» suena poco natural para describir a las multitudes
    rationale: Aunque ambas palabras pueden defenderse léxicamente, juntas evocan demasiado daño físico. El griego describe gente vejada, agotada y echada abajo; «acosadas y abatidas» conserva mejor esa fuerza en español idiomático.
  - severity: low
    issue: La nota al pie puede alinearse mejor con la alternativa documentada por el POB inglés
    rationale: El inglés ofrece «harassed and helpless» como alternativa interpretativa. En español, «acosadas y desamparadas» refleja mejor esa oposición entre una opción más literal y otra más interpretativa que la glosa actual.
  revised_spanish_text: Al ver a las multitudes[a], se compadeció de ellas, porque estaban acosadas y abatidas, como ovejas que no tienen pastor.
  revised_footnotes:
  - marker: a
    text: O «acosadas y desamparadas». Los términos griegos también pueden entenderse de manera más interpretativa como una descripción de las multitudes agotadas y sin capacidad de cuidarse a sí mismas.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la pareja léxica principal para que el español suene más natural y siga de cerca el campo semántico documentado por el POB inglés: presión/hostigamiento y abatimiento. Se conserva la metáfora de ovejas sin pastor y la nota alternativa interpretativa.'
