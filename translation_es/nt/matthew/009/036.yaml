- from: Al ver a las multitudes[a], se compadeció de ellas, porque estaban maltratadas y derribadas, como ovejas que no tienen pastor.
  to: Al ver a las multitudes[a], se compadeció de ellas, porque estaban acosadas y abatidas, como ovejas que no tienen pastor.
  rationale: 'Se ajusta la pareja léxica principal para que el español suene más natural y siga de cerca el campo semántico documentado por el POB inglés: presión/hostigamiento y abatimiento. Se conserva la metáfora de ovejas sin pastor y la nota alternativa interpretativa.'
