review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: pregunta retórica, contraste temporal, imagen del novio y anuncio del ayuno futuro. Sin embargo, la elección principal para υἱοὶ τοῦ νυμφῶνος no sigue la decisión auditada de ver un modismo y no una expresión literal en el texto principal. Además, el borrador pierde parte de la fuerza idiomática y naturalidad del español al dejar ''los hijos de la sala de bodas'' en el cuerpo del versículo.'
  spanish_quality_summary: El español es en general claro y digno, pero 'los hijos de la sala de bodas' suena calcado y poco natural para lectura eclesial general. 'Estar de duelo' es aceptable para πενθεῖν, aunque 'hacer duelo' o 'estar de luto' también serían posibles; no requiere cambio. La secuencia 'cuando el novio les será quitado' es comprensible, pero en español fluye mejor 'cuando el novio les sea quitado' o 'cuando le sea quitado'.
  glossary_alignment: 'No hay conflicto con terminología doctrinal central del proyecto. La revisión necesaria es sobre fidelidad al razonamiento léxico documentado: el texto principal debe expresar el sentido idiomático de υἱοὶ τοῦ νυμφῶνος de manera natural, dejando la literalidad en nota. La nota sobre ἀπαρθῇ debe mantenerse porque preserva la fuerza pasiva de ''ser quitado''.'
  issues:
  - severity: high
    issue: υἱοὶ τοῦ νυμφῶνος se dejó casi literalmente como 'los hijos de la sala de bodas' en el texto principal.
    rationale: La auditoría inglesa documenta que la frase es un modismo para los acompañantes del novio o asistentes de la boda; en español esa literalidad oscurece el sentido y suena poco idiomática. Debe trasladarse el sentido al texto principal y reservar la literalidad para nota.
  - severity: medium
    issue: La redacción 'cuando el novio les será quitado' es poco natural en español.
    rationale: 'Aunque refleja la pasiva futura, tras ''cuando'' el español prefiere subjuntivo: ''cuando el novio les sea quitado''. Esto mejora la legibilidad sin alterar el matiz de remoción pasiva.'
  - severity: low
    issue: La nota a dice 'acompañantes del novio o los asistentes a la boda'.
    rationale: Es válida, pero conviene que el texto principal escoja una opción concreta y la nota conserve la literalidad y el rango semántico, no al revés.
  revised_spanish_text: 'Y Jesús les dijo: «¿Acaso pueden los acompañantes del novio[a] estar de duelo mientras el novio está con ellos? Pero vendrán días cuando el novio les[b] sea quitado, y entonces ayunarán».'
  revised_footnotes:
  - marker: a
    text: Literalmente, 'los hijos de la sala de bodas', un modismo para los acompañantes del novio o los asistentes a la boda.
    reason: lexical_alternative
  - marker: b
    text: O 'cuando el novio les sea quitado'. La voz pasiva sugiere algo más que una salida ordinaria.
    reason: lexical_alternative
  revision_rationale: Se cambia el texto principal para reflejar el sentido idiomático de υἱοὶ τοῦ νυμφῶνος en español natural, en línea con la decisión léxica auditada, y se conserva la literalidad en nota. También se ajusta la construcción verbal tras 'cuando' a un español más natural ('sea quitado') sin perder la fuerza pasiva de ἀπαρθῇ.
