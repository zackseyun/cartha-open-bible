  rationale: Se cambia el texto principal para reflejar el sentido idiomático de υἱοὶ τοῦ νυμφῶνος en español natural, en línea con la decisión léxica auditada, y se conserva la literalidad en nota. También se ajusta la construcción verbal tras 'cuando' a un español más natural ('sea quitado') sin perder la fuerza pasiva de ἀπαρθῇ.
