translation:
  language: es
  text: 'Y Jesús les dijo: «¿Acaso pueden los acompañantes del novio[a] estar de duelo mientras el novio está con ellos? Pero vendrán días cuando el novio les[b] sea quitado, y entonces ayunarán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'los hijos de la sala de bodas', un modismo para los acompañantes del novio o los asistentes a la boda.
    reason: lexical_alternative
  - marker: b
    text: O 'cuando el novio les sea quitado'. La voz pasiva sugiere algo más que una salida ordinaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς
  english_pob_choice: And Jesus said to them
  chosen_spanish: Y Jesús les dijo
  alternatives_spanish:
  - Y Jesús dijo a ellos
  - Y Jesús les habló
  lexicon: Greek syntax
  rationale: Conserva la coordinación narrativa simple y el dativo de destinatario en forma natural en español con 'les dijo'.
- source_word: υἱοὶ τοῦ νυμφῶνος
  english_pob_choice: the wedding attendants
  chosen_spanish: los hijos de la sala de bodas
  alternatives_spanish:
  - los hijos de la boda
  - los asistentes de la boda
  - los acompañantes del novio
  lexicon: BDAG
  rationale: Sigo de cerca la metáfora literal 'hijos de...' para no borrar el giro idiomático documentado, pero adapto νυμφών como 'sala de bodas' para que el español suene comprensible sin perder la imagen semítica. La nota explica el sentido social del modismo.
- source_word: πενθεῖν
  english_pob_choice: mourn
  chosen_spanish: estar de duelo
  alternatives_spanish:
  - llorar
  - lamentarse
  - mourning
  lexicon: BDAG
  rationale: '''Estar de duelo'' expresa bien el luto colectivo o ritual que contrasta con el ayuno, y evita la posible ambigüedad de un simple ''lamentar''.'
- source_word: ἐφ’ ὅσον
  english_pob_choice: as long as
  chosen_spanish: mientras
  alternatives_spanish:
  - en tanto que
  - durante el tiempo que
  - mientras tanto
  lexicon: BDAG
  rationale: '''Mientras'' comunica la duración de la presencia del novio de manera natural y fiel al valor temporal.'
- source_word: νυμφίος
  english_pob_choice: bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, 'novio' es claro y mantiene la imagen del entorno nupcial sin introducir un registro demasiado arcaico.
- source_word: ἀπαρθῇ
  english_pob_choice: is taken away
  chosen_spanish: les será quitado
  alternatives_spanish:
  - será llevado de ellos
  - será removido de ellos
  - será quitado de entre ellos
  lexicon: BDAG
  rationale: La pasiva sugiere una acción sobre el novio y no una simple partida; 'les será quitado' conserva esa fuerza y refleja el complemento implícito 'de ellos' sin sobredeterminar el agente.
- source_word: νηστεύσουσιν
  english_pob_choice: they will fast
  chosen_spanish: ayunarán
  alternatives_spanish:
  - practicarán ayuno
  - estarán ayunando
  lexicon: BDAG
  rationale: El futuro simple es suficiente y natural en español para el acto de ayunar.
theological_decisions:
- issue: Imagen del novio y su posible carga cristológica
  english_pob_reading: Retain 'bridegroom' as a metaphor without making its theological implication explicit in the translation.
  chosen_spanish_reading: Mantener 'el novio' como metáfora sin explicitar en la traducción su implicación cristológica.
  alternative_spanish_readings:
  - Identificar explícitamente a Jesús como el Mesías novio
  - Añadir una glosa interpretativa sobre la figura nupcial
  rationale: El versículo presenta la imagen; la traducción no debe resolverla interpretativamente. Así se conserva la tensión teológica y se deja al lector inferir la resonancia mesiánica.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla.
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con el inglés auditado: se mantuvo la pregunta retórica, el contraste temporal y la pasiva de ἀπαρθῇ. Se ajustó el modismo υἱοὶ τοῦ νυμφῶνος a una forma española transparente (''los hijos de la sala de bodas'') para preservar la tensión entre literalidad e inteligibilidad, y se eligió ''el novio'' por naturalidad bíblica en español sin perder la metáfora.'
  spanish_consistency_notes:
  - Se evitó 'Señor' o cualquier sustitución devocional; el nombre propio permanece como 'Jesús'.
  - Se conservó el paralelismo entre duelo y ayuno.
  - La nota a responde al modismo griego documentado por la auditoría inglesa, y la nota b preserva la alternativa pasiva sin forzar una interpretación más allá del texto.
