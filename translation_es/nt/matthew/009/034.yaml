translation:
  language: es
  text: 'Pero los fariseos decían: «Por el jefe[a] de los demonios expulsa a los demonios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por el príncipe de los demonios expulsa a los demonios».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca contraste con la reacción positiva anterior; «Pero» conserva el giro adversativo de forma natural en español.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos de entonces
  lexicon: BDAG
  rationale: Se conserva el nombre del grupo judío con artículo, como en el griego, sin añadir explicación que el texto no requiere.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - decían repetidamente
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en desarrollo o repetida; en español, «decían» transmite ese valor sin sonar forzado.
- source_word: Ἐν τῷ ἄρχοντι
  english_pob_choice: By the ruler
  chosen_spanish: Por el gobernante
  alternatives_spanish:
  - Por el príncipe
  - Por medio del gobernante
  lexicon: BDAG
  rationale: ἐν con dativo aquí es instrumental. «Por» expresa agencia/medio de manera idiomática en español. «Gobernante» refleja ἄρχων como autoridad; se evita imponer «príncipe» como única opción.
- source_word: ἄρχοντι
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - príncipe
  - líder
  lexicon: BDAG
  rationale: «Gobernante» comunica autoridad ejercida, más que rango nobiliario. Mantiene la idea de poder/mandato implicada por ἄρχων.
- source_word: τῶν δαιμονίων
  english_pob_choice: of the demons
  chosen_spanish: de los demonios
  alternatives_spanish:
  - de los demonios malignos
  lexicon: BDAG
  rationale: Se mantiene «demonios» como equivalente preciso de δαιμόνια en contexto de exorcismo, sin suavizar el referente sobrenatural.
- source_word: ἐκβάλλει
  english_pob_choice: he casts out
  chosen_spanish: expulsa
  alternatives_spanish:
  - echa fuera
  - arroja fuera
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «expulsa» transmite bien la acción de echar fuera en contextos de liberación/exorcismo; evita una literalidad dura que sonaría menos natural.
- source_word: τὰ δαιμόνια
  english_pob_choice: the demons
  chosen_spanish: a los demonios
  alternatives_spanish:
  - los demonios
  lexicon: BDAG
  rationale: Se mantiene el objeto directo plural con artículo; en español, el clítico no es necesario aquí porque el verbo ya marca claramente la acción sobre ese objeto.
theological_decisions:
- issue: δαιμόνια en contexto de exorcismo
  english_pob_reading: demons
  chosen_spanish_reading: demonios
  alternative_spanish_readings:
  - espíritus malignos
  rationale: El griego dice δαιμόνια, no πνεύματα. «Demonios» conserva la precisión léxica y la fuerza de la acusación farisea, sin reinterpretarla en un lenguaje más general.
  doctrine_reference: Primacía del texto original y preservación de la referencia sobrenatural específica.
- issue: Valor de ἐν τῷ ἄρχοντι como agencia instrumental
  english_pob_reading: By the ruler of the demons
  chosen_spanish_reading: Por el gobernante de los demonios
  alternative_spanish_readings:
  - Con el gobernante de los demonios
  - Por medio del gobernante de los demonios
  rationale: La acusación no describe ubicación sino fuente o medio de acción. «Por» reproduce ese valor instrumental sin oscurecer la carga polémica del dicho.
  doctrine_reference: Criterio sintáctico-semántico del dativo instrumental.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto fuente y con la auditoría inglesa: se conserva el contraste adversativo, el imperfecto discursivo, el valor instrumental de ἐν, y el léxico demonológico. Se optó por «gobernante» como equivalente español de ἄρχων, mientras que la nota preserva la alternativa tradicional «príncipe», tal como la auditoría inglesa documenta.'
  spanish_consistency_notes:
  - Se mantuvo «demonios» para δαιμόνια de forma consistente con la preferencia POB de precisión léxica.
  - Se usó «expulsa» para ἐκβάλλει, coherente con el campo semántico de exorcismo.
  - Se evitó «SEÑOR» u այլ masking conventions porque no hay aquí el nombre divino.
  - La nota textual marca la alternativa de ἄρχων sin duplicar la forma principal en el texto.
