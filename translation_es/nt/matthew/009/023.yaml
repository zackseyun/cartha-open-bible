review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: llegada de Jesús, entrada en la casa del ἄρχων, visión de los αὐληταί y de la multitud en ruido/agitación. También preserva correctamente la indeterminación de ἄρχοντος mediante «gobernante» y mantiene las notas del rastro inglés. Sin embargo, «la multitud alborotada» desplaza el sentido de θορυβούμενον desde una acción audible/progresiva («haciendo alboroto», «en conmoción/ruido») hacia un estado más adjetival, y el anclaje triple de notas sobre toda la frase final es poco claro en español.'
  spanish_quality_summary: 'El español es legible y digno, pero puede mejorarse. «Y cuando Jesús entró» es natural. «Gobernante» es aceptable, aunque algo menos idiomático que «dirigente» o «jefe»; aquí se justifica por el rastro léxico. La principal mejora necesaria es hacer más natural y fiel la última frase con un giro verbal: «a la multitud haciendo alboroto» o «que hacía alboroto». Además, conviene reordenar los marcadores de nota para que cada uno ancle en el elemento pertinente.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» es correcto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «gobernante» para ἄρχων es defendible y coherente con la rationale documentada, siempre con la nota alternativa.
  issues:
  - severity: medium
    issue: θορυβούμενον se vierte como «alborotada»
    rationale: El participio presente describe a la multitud como produciendo ruido/conmoción. «Alborotada» puede sugerir más bien una cualidad o estado general, mientras que el griego enfatiza la acción ruidosa observable. Un giro como «haciendo alboroto» preserva mejor el aspecto y el matiz audible.
  - severity: low
    issue: Los marcadores [a][b][c] están todos al final de la frase
    rationale: Aunque no es incorrecto, en español queda más claro anclar [a] en «gobernante», [b] en «flautistas» y [c] en la expresión que traduce θορυβούμενον, reflejando mejor la relación de cada nota con su término.
  revised_spanish_text: Y cuando Jesús entró en la casa del gobernante[a] y vio a los flautistas[b] y a la multitud haciendo alboroto[c],
  revised_footnotes:
  - marker: a
    text: O «el oficial» o, por comparación con los relatos paralelos, «el líder de la sinagoga». El griego de Mateo aquí dice simplemente «el gobernante».
    reason: alternative_reading
  - marker: b
    text: Es decir, ya había plañideros profesionales presentes, incluidos los flautistas habituales en los funerales.
    reason: cultural_note
  - marker: c
    text: O «en alboroto».
    reason: lexical_alternative
