translation:
  language: es
  text: Y cuando Jesús entró en la casa del gobernante[a] y vio a los flautistas[b] y a la multitud haciendo alboroto[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el oficial» o, por comparación con los relatos paralelos, «el líder de la sinagoga». El griego de Mateo aquí dice simplemente «el gobernante».
    reason: alternative_reading
  - marker: b
    text: Es decir, ya había plañideros profesionales presentes, incluidos los flautistas habituales en los funerales.
    reason: cultural_note
  - marker: c
    text: O «en alboroto».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: when Jesus came
  chosen_spanish: Y cuando Jesús entró
  alternatives_spanish:
  - al haber entrado Jesús
  - después de que Jesús entró
  lexicon: BDAG
  rationale: El participio aoristo expresa secuencia temporal/acción concomitante. En español, «y cuando Jesús entró» reproduce la progresión narrativa con naturalidad sin perder el valor temporal.
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  lexicon: BDAG
  rationale: «Casa» corresponde al sentido básico y narrativo del griego. «Hogar» añade matiz afectivo que no está exigido por el texto.
- source_word: ἄρχοντος
  english_pob_choice: ruler
  chosen_spanish: del gobernante
  alternatives_spanish:
  - del oficial
  - del líder
  lexicon: BDAG
  rationale: El griego dice solo ἄρχων, un término amplio de autoridad. «Gobernante» conserva esa amplitud mejor que «oficial» y evita importar la identificación más específica de los pasajes paralelos.
- source_word: ἰδὼν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - al ver
  lexicon: BDAG
  rationale: Verbo narrativo simple; «vio» es la equivalencia más natural y directa en español.
- source_word: αὐλητὰς
  english_pob_choice: flute players
  chosen_spanish: a los flautistas
  alternatives_spanish:
  - a los músicos de flauta
  - a los piperos
  lexicon: BDAG
  rationale: «Flautistas» comunica de manera clara y actual a quienes tocaban flauta o pito. Mantiene el dato cultural del duelo sin sonar arcaico.
- source_word: ὄχλον
  english_pob_choice: crowd
  chosen_spanish: a la multitud
  alternatives_spanish:
  - a la gente reunida
  - a la muchedumbre
  lexicon: BDAG
  rationale: «Multitud» es el equivalente habitual de ὄχλος en narración bíblica y conserva el sentido colectivo.
- source_word: θορυβούμενον
  english_pob_choice: making a commotion
  chosen_spanish: alborotada
  alternatives_spanish:
  - en alboroto
  - haciendo un gran ruido
  - tumultuosa
  lexicon: BDAG
  rationale: El participio presente describe ruido y agitación. «Alborotada» condensa bien esa idea en español; conserva la ambigüedad entre tumulto sonoro y disturbio general. La nota mantiene la alternativa lexical preservada por la POB inglesa.
theological_decisions:
- issue: Identificación del dueño de la casa
  english_pob_reading: the ruler
  chosen_spanish_reading: el gobernante
  alternative_spanish_readings:
  - el oficial
  - el líder de la sinagoga
  rationale: El texto griego solo dice ἄρχων. Se evita importar detalles de los paralelos. «Gobernante» conserva la generalidad del término y deja abierta la identificación histórica precisa.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión/indeterminación cuando el griego no especifica más.
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y el control cruzado informó alta concordancia; esta propuesta conserva ese estado sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς.
  - Se usa «Gobernante» para ἄρχων, evitando la armonización con los relatos paralelos.
  - Se prefiere «flautistas» como equivalente idiomático y transparente para αὐλητάς.
  - «Multitud alborotada» intenta reproducir la combinación de ὄχλον θορυβούμενον sin cerrar indebidamente el matiz a solo emoción o solo ruido.
