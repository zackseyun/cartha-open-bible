revisions:
- from: Y cuando Jesús entró en la casa del gobernante y vio a los flautistas y a la multitud alborotada[a][b][c],
  to: Y cuando Jesús entró en la casa del gobernante[a] y vio a los flautistas[b] y a la multitud haciendo alboroto[c],
  rationale: 'Se ajusta θορυβούμενον a una expresión verbal más fiel al participio presente y al matiz de conmoción audible: «haciendo alboroto». También se redistribuyen los marcadores de nota para anclarlos en los términos correspondientes y mejorar la claridad editorial en español, sin cambiar las decisiones léxicas principales del borrador.'
  reviewer_model: gpt-5.4
