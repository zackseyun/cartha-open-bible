translation:
  language: es
  text: Mientras salían, he aquí que le trajeron un hombre mudo[a] y endemoniado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sordo»; la palabra griega puede significar «mudo» o «sordo» según el contexto. Aquí, la afirmación del siguiente versículo de que habló favorece «mudo».
    reason: lexical_alternative
  - marker: b
    text: O «demonizado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτῶν δὲ ἐξερχομένων
  english_pob_choice: As they were going out
  chosen_spanish: Y mientras ellos salían
  alternatives_spanish:
  - Y cuando ellos salían
  - Mientras salían
  lexicon: SBLGNT; BDAG
  rationale: El genitivo absoluto con δέ marca transición narrativa y simultaneidad. «Mientras ellos salían» preserva la relación temporal de forma natural en español y mantiene el enlace discursivo sin sobretraducir δέ.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira, he aquí
  lexicon: BDAG
  rationale: «He aquí» conserva la función de señalamiento y vivacidad narrativa de ἰδού en un registro bíblico comprensible y digno.
- source_word: προσήνεγκαν αὐτῷ
  english_pob_choice: they brought to him
  chosen_spanish: le trajeron
  alternatives_spanish:
  - lo trajeron a él
  - le presentaron
  lexicon: BDAG
  rationale: En español, el dativo de destinatario se expresa con naturalidad mediante «le trajeron». Mantiene la direccionalidad de αὐτῷ sin una construcción pesada.
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El referente es un varón adulto en el relato de sanidad; «hombre» respeta el valor semántico y el género del sustantivo griego.
- source_word: κωφὸν
  english_pob_choice: mute
  chosen_spanish: mudo
  alternatives_spanish:
  - sordo
  - sordo-mudo
  - incapaz de hablar
  lexicon: BDAG
  rationale: Como en el contexto inmediato el versículo siguiente dirá que habló, «mudo» es la equivalencia más ajustada funcionalmente. Se conserva la tensión lexical de κωφός, que puede significar también «sordo», mediante nota.
- source_word: δαιμονιζόμενον
  english_pob_choice: who was demon-possessed
  chosen_spanish: endemoniado
  alternatives_spanish:
  - demonizado
  - que estaba poseído por un demonio
  lexicon: BDAG
  rationale: «Endemoniado» es una forma española estable y transparente para δαιμονιζόμενον en contexto de exorcismo. Evita una paráfrasis más larga sin perder la referencia a una aflicción demoníaca real.
theological_decisions:
- issue: Alcance de κωφός en contexto narrativo
  english_pob_reading: mute, with note that it can also mean deaf
  chosen_spanish_reading: mudo, con nota de que κωφός también puede significar sordo
  alternative_spanish_readings:
  - sordo
  - sordo-mudo
  rationale: La narración posterior enfatiza que el hombre habló, por lo que «mudo» es la mejor lectura contextual. Se preserva la alternativa léxica relevante para no borrar la ambigüedad documentada del término griego.
  doctrine_reference: Lexical transparency; Translation philosophy §6
- issue: Lenguaje de aflicción demoníaca
  english_pob_reading: demon-possessed / demonized
  chosen_spanish_reading: endemoniado
  alternative_spanish_readings:
  - demonizado
  - poseído por un demonio
  rationale: El texto presenta una aflicción demoníaca de manera directa, sin especular sobre su mecánica. «Endemoniado» comunica esa realidad en español natural y mantiene el tono narrativo del pasaje.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión para compactar la sintaxis («a mute, demon-possessed man»), pero la lectura final permaneció estable. La versión española sigue esa misma equivalencia compacta y conserva las dos decisiones léxicas relevantes: κωφός = «mudo» por el contexto inmediato, y δαιμονιζόμενον = «endemoniado» como equivalente idiomático de la aflicción demoníaca.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se evita «Cristo» porque el versículo no usa Χριστός.
  - La puntuación y el orden reflejan la secuencia narrativa del griego sin forzar un calco.
  - Los corchetes de nota se colocan solo en los puntos donde existe una alternativa léxica documentada.
