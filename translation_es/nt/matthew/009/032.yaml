revisions:
- from: Y mientras ellos salían, he aquí, le trajeron un hombre mudo y endemoniado[a][b].
  to: Mientras salían, he aquí que le trajeron un hombre mudo[a] y endemoniado[b].
  rationale: 'La revisión hace ajustes menores de naturalidad y precisión editorial sin cambiar el sentido: simplifica el arranque temporal, mejora la integración de ἰδού con «he aquí que», y corrige la nota léxica de δαιμονιζόμενον para que ofrezca una alternativa real y útil.'
