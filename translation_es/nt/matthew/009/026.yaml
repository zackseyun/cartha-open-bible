translation:
  language: es
  text: Y esta noticia salió por toda aquella región[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por toda aquella tierra» o «por todo aquel territorio». El griego γῆ puede significar tierra, territorio o región; aquí lo más probable es el área circundante, no toda la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción es una continuación narrativa directa. 'Y' conserva el flujo simple del texto sin añadir inferencias.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se difundió
  - fue y salió
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι es literalmente 'salió'. En español, 'salió' mantiene la imagen de algo que pasa de un lugar a extenderse desde allí, con naturalidad narrativa.
- source_word: ἡ φήμη αὕτη
  english_pob_choice: this report
  chosen_spanish: esta noticia
  alternatives_spanish:
  - este informe
  - este reporte
  lexicon: BDAG
  rationale: φήμη puede ser 'report' o 'news'. En español, 'noticia' comunica bien la circulación pública del hecho sin la posible connotación negativa de 'rumor'. 'Esta' preserva la referencia específica al hecho recién narrado.
- source_word: εἰς ὅλην τὴν γῆν ἐκείνην
  english_pob_choice: into all that region
  chosen_spanish: por toda aquella región
  alternatives_spanish:
  - en toda aquella región
  - por toda aquella tierra
  - en todo aquel territorio
  lexicon: BDAG
  rationale: γῆ puede significar tierra, territorio o región. Por el contexto local, el sentido es geográfico y cercano, no universal; 'región' evita sugerir 'tierra' en el sentido de planeta y 'por toda' expresa alcance extendido de manera natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail inglés: se preserva el movimiento de ἐξῆλθεν con ''salió'' y el alcance local de γῆ con ''región'', evitando una ampliación innecesaria a ''tierra'' en sentido global. La nota reproduce la ambigüedad lexical documentada para γῆ.'
  spanish_consistency_notes:
  - Se usa 'noticia' como equivalente funcional de φήμη, siguiendo el valor de circulación pública sin cargar el término con sospecha de falsedad.
  - '''Región'' mantiene la interpretación local del contexto narrativo y armoniza con el criterio POB de no traducir γῆ automáticamente como ''tierra'' o ''mundo''.'
  - No se introduce vocabulario eclesiástico ajeno al texto; la frase permanece breve y descriptiva, acorde con el griego y con el registro del pasaje.
