translation:
  language: es
  text: 'Y Jesús, pasando de allí, vio a un hombre llamado Mateo, sentado en el puesto de impuestos[a], y le dice: «Sígueme». Y él se levantó y lo siguió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oficina de impuestos».
    reason: lexical_alternative
lexical_decisions:
- source_word: παράγων
  english_pob_choice: as Jesus was passing on from there
  chosen_spanish: pasando de allí
  alternatives_spanish:
  - pasando por allí
  - al pasar de allí
  lexicon: BDAG
  rationale: El participio presente conserva acción en curso. «Pasando de allí» reproduce el movimiento y evita una forma excesivamente rígida en español.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - desde allí
  lexicon: BDAG
  rationale: Adverbio locativo simple; «de allí» es natural y fiel al valor espacial del griego.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El griego especifica un varón concreto; «un hombre» preserva esa referencia sin neutralizarla.
- source_word: καθήμενον ἐπὶ τὸ τελώνιον
  english_pob_choice: sitting at the tax booth
  chosen_spanish: sentado en la oficina de impuestos
  alternatives_spanish:
  - sentado en el puesto de impuestos
  - sentado en el cobro de impuestos
  lexicon: BDAG
  rationale: El término describe el puesto de recaudación. En español, «oficina de impuestos» comunica la función con claridad; se evita «oficina» como institucionalización excesiva, pero sigue siendo comprensible y natural. Se conserva la localización funcional del griego.
- source_word: Μαθθαῖον λεγόμενον
  english_pob_choice: called Matthew
  chosen_spanish: llamado Mateo
  alternatives_spanish:
  - nombrado Mateo
  lexicon: BDAG
  rationale: λεγόμενον introduce el nombre por el que es conocido. «Llamado Mateo» es la forma más directa y idiomática en español.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico. En español, «le dice» preserva ese efecto narrativo sin sonar forzado.
- source_word: Ἀκολούθει μοι
  english_pob_choice: Follow me
  chosen_spanish: Sígueme
  alternatives_spanish:
  - Ven y sígueme
  - Sígueme a mí
  lexicon: BDAG
  rationale: Imperativo de discipulado; «Sígueme» transmite con precisión la invitación sin añadir explicación.
- source_word: ἀναστὰς
  english_pob_choice: he rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo indica respuesta inmediata previa a la acción principal. «Se levantó» es natural en español y mantiene la secuencia narrativa.
- source_word: ἠκολούθησεν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: lo siguió
  alternatives_spanish:
  - le siguió
  - se hizo su seguidor
  lexicon: BDAG
  rationale: «Lo siguió» expresa la acción concreta y conserva el sentido de discipulado sin paráfrasis.
theological_decisions:
- issue: Forma del llamado de Jesús a Mateo
  english_pob_reading: Render Ἀκολούθει μοι simply as 'Follow me' without expanding it into a technical call narrative formula.
  chosen_spanish_reading: Traducir simplemente «Sígueme» sin ampliar a una fórmula explicativa de discipulado.
  alternative_spanish_readings:
  - Ven y sé mi discípulo
  - Acompáñame
  rationale: El texto presenta un mandato breve y directo. La versión española debe conservar esa sobriedad y no resolver interpretativamente más de lo que expresa el griego.
  doctrine_reference: 'Translation philosophy: preserve theological tension and do not paraphrase beyond the source warrant.'
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios; esta propuesta sigue de cerca el audit trail inglés y mantiene la misma lectura histórica del presente, el llamado breve y la respuesta inmediata.
  spanish_consistency_notes:
  - Se usa «Jesús» y no un título alternativo para Ἰησοῦς.
  - Se mantiene «Mateo» como forma española del nombre propio.
  - Se conserva el presente histórico «le dice» siguiendo la decisión inglesa documentada.
  - Se prefiere el verbo concreto «siguió» para ἠκολούθησεν, sin convertirlo en paráfrasis de adhesión espiritual.
