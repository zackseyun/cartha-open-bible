    rationale: Si la alternativa «puesto de impuestos» es mejor semántica y contextualmente, debe subir al texto principal y no quedar relegada a nota.
  - severity: low
    issue: Puntuación algo rígida con punto y coma antes de «y le dice»
    rationale: El griego coordina de forma simple; en español una coma mantiene mejor el flujo narrativo sin sobrecargar la frase.
