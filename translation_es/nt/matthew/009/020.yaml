translation:
  language: es
  text: Y he aquí[a] una mujer que sufría de hemorragias desde hacía doce años se acercó por detrás y tocó el borde[b] de su prenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Véanse Números 15:38 y Deuteronomio 22:12 para el trasfondo de los flecos o borlas de las vestiduras en la ley de Israel.
    reason: cross_reference
  - marker: b
    text: O «fleco», «borla» o «dobladillo»; el término griego puede referirse al borde o ribete de una prenda, posiblemente incluyendo los flecos asociados con la vestimenta judía.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y entonces he aquí
  lexicon: BDAG
  rationale: Conserva el marcador discursivo y la vividez de ἰδού sin omitirlo; «he aquí» es natural en español bíblico y mantiene el efecto de sorpresa narrativa.
- source_word: γυνὴ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una señora
  - una mujer cierta
  lexicon: BDAG
  rationale: Referencia indefinida y directa; no hay motivo contextual para precisar más.
- source_word: αἱμορροοῦσα
  english_pob_choice: who had been suffering from bleeding
  chosen_spanish: que sufría de hemorragias
  alternatives_spanish:
  - que tenía una hemorragia
  - que padecía flujo de sangre
  lexicon: BDAG
  rationale: El participio expresa una condición continuada. «Sufría de hemorragias» comunica duración y malestar de manera clara y digna en español; evita sonar demasiado técnica o demasiado antigua.
- source_word: δώδεκα ἔτη
  english_pob_choice: for twelve years
  chosen_spanish: desde hacía doce años
  alternatives_spanish:
  - por doce años
  - durante doce años
  lexicon: BDAG
  rationale: En español, la duración desde un punto inicial pasado se expresa con naturalidad con «desde hacía»; refleja el valor de extensión temporal del griego.
- source_word: προσελθοῦσα
  english_pob_choice: came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino hacia
  - se acercó hasta
  lexicon: BDAG
  rationale: Participio aoristo de acción concomitante previa a la principal. «Se acercó» es natural y mantiene el movimiento hacia Jesús sin sobrecargar el texto.
- source_word: ὄπισθεν
  english_pob_choice: behind him
  chosen_spanish: por detrás
  alternatives_spanish:
  - desde atrás
  - detrás de él
  lexicon: BDAG
  rationale: Explicita la dirección de su aproximación de manera idiomática en español. Se evita repetir «él» de forma innecesaria dentro del flujo narrativo principal.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - se aferró a
  - agarró
  lexicon: BDAG
  rationale: En este contexto de sanidad, el verbo significa simplemente tocar. «Tocó» es fiel y no intensifica indebidamente el contacto.
- source_word: τοῦ κρασπέδου
  english_pob_choice: the fringe
  chosen_spanish: el borde
  alternatives_spanish:
  - la franja
  - el fleco
  - el borde con borlas
  lexicon: BDAG
  rationale: κράσπεδον puede designar borde, ribete, franja o borla/tassel. «Borde» es una opción amplia y sobria en el cuerpo del texto; la posible referencia a los flecos rituales queda preservada en nota.
- source_word: τοῦ ἱματίου αὐτοῦ
  english_pob_choice: of his garment
  chosen_spanish: de su manto
  alternatives_spanish:
  - de su vestido
  - de su ropa
  lexicon: BDAG
  rationale: ἱμάτιον es un vestido exterior o manto. «Manto» es un equivalente español natural y más preciso que «ropa»; «garment» en inglés se resuelve mejor aquí con un término de prenda exterior reconocible.
theological_decisions:
- issue: Posible trasfondo judío de κράσπεδον como flecos o borlas de la vestimenta
  english_pob_reading: Render generally as 'fringe' in the main text; preserve the possibility of tassel/border in a footnote
  chosen_spanish_reading: «el borde» en el texto principal, con nota que abre la posibilidad de «fleco» o «borla/fleco ritual»
  alternative_spanish_readings:
  - «el fleco»
  - «la borla»
  - «el borde del manto»
  rationale: El término puede aludir al borde de la vestimenta y, posiblemente, a los flecos prescritos en la ley judía, pero el verso no desarrolla esa simbolización por sí mismo. La traducción principal mantiene el sentido lexical amplio y la nota conserva la tensión interpretativa sin imponerse al texto.
  doctrine_reference: Números 15:38; Deuteronomio 22:12
- issue: Referencia a la indumentaria de Jesús mediante ἱμάτιον
  english_pob_reading: of his garment
  chosen_spanish_reading: «de su manto»
  alternative_spanish_readings:
  - «de su vestidura»
  - «de su ropa»
  rationale: En el contexto narrativo, una prenda exterior es la mejor equivalencia. «Manto» es claro para el lector español y no introduce una especificación excesiva; además, encaja bien con la mención del borde de la prenda.
  doctrine_reference: Uso léxico contextual, sin implicación doctrinal específica
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y con el audit trail inglés. Se conservó la estructura narrativa, el valor durativo del participio de sufrimiento y la ambigüedad léxica de κράσπεδον mediante nota. No se requirieron revisiones respecto del último pase auditado.
  spanish_consistency_notes:
  - Se usó «Y he aquí» para mantener el marcador discursivo de ἰδού con el tono bíblico natural del español.
  - «Tocó» se mantuvo simple para no sobreinterpretar ἥψατο.
  - «Manto» traduce ἱμάτιον como prenda exterior general y armoniza con «borde».
  - Se evitó «SEÑOR» o lenguaje interpretativo no presente en el versículo; no hay referencia a κύριος aquí.
