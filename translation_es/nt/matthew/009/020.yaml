    text: Or 'tassel' or 'hem'; the Greek term can refer to the fringe or border of a garment, possibly including the tassel-like border associated with Jewish dress.
    reason: lexical_alternative
  - marker: b
    text: See Numbers 15:38 and Deuteronomy 22:12 for the background of garment fringes/tassels in Israel's law.
    reason: cross_reference
