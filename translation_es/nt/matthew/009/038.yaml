translation:
  language: es
  text: Por tanto, rueguen con insistencia al Señor de la cosecha para que envíe[a] obreros a su cosecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saque» o «expulse» obreros; el verbo griego es más fuerte que un simple «enviar», aunque aquí se refiere al despacho de trabajadores a la cosecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεήθητε
  english_pob_choice: pray earnestly
  chosen_spanish: oren con insistencia
  alternatives_spanish:
  - oren fervientemente
  - suplican
  - rueguen con insistencia
  lexicon: δέομαι
  rationale: La forma imperativa aorista expresa una súplica urgente. «Oren» conserva el carácter de oración, y «con insistencia» transmite la urgencia sin sonar artificioso en español.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: οὖν
  rationale: Marca la conclusión lógica de lo dicho antes. «Por tanto» reproduce bien la inferencia y mantiene un tono bíblico claro en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: κύριος
  rationale: En este contexto designa al que tiene autoridad sobre la cosecha. «Señor» es la equivalencia natural y tradicionalmente bíblica en español, sin especificar más de lo que el texto dice.
- source_word: θερισμοῦ
  english_pob_choice: harvest
  chosen_spanish: cosecha
  alternatives_spanish:
  - cosecha de la mies
  - mies
  lexicon: θερισμός
  rationale: El campo semántico es el de la cosecha/ingathering. «Cosecha» es transparente en español moderno y preserva la metáfora sin forzar una frase más pesada.
- source_word: ὅπως
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - que
  lexicon: ὅπως
  rationale: Aquí introduce el contenido final de la súplica. En español, «para que» comunica bien el propósito/resulta natural con un verbo subjuntivo posterior.
- source_word: ἐκβάλῃ
  english_pob_choice: send out
  chosen_spanish: envíe
  alternatives_spanish:
  - saque
  - lance fuera
  - mande
  lexicon: ἐκβάλλω
  rationale: El verbo griego es fuerte, pero en este contexto se refiere al envío de obreros a la labor. «Envíe» comunica la función contextual; la fuerza del verbo queda reconocida en la decisión lexical del registro, aunque no se sobretraduce como «expulse».
- source_word: ἐργάτας
  english_pob_choice: workers
  chosen_spanish: obreros
  alternatives_spanish:
  - trabajadores
  - laboradores
  lexicon: ἐργάτης
  rationale: Se refiere a quienes trabajan en la cosecha. «Obreros» es natural, digno y suficientemente literal en español bíblico contemporáneo.
- source_word: εἰς τὸν θερισμὸν αὐτοῦ
  english_pob_choice: into his harvest
  chosen_spanish: a su cosecha
  alternatives_spanish:
  - dentro de su cosecha
  - a su campo de cosecha
  lexicon: εἰς + θερισμός + αὐτοῦ
  rationale: La preposición indica movimiento hacia la esfera de la cosecha. En español, «a su cosecha» mantiene la dirección y evita agregar «campo» o «de la cosecha» sin base explícita en el griego.
theological_decisions:
- issue: Identidad del «Señor de la cosecha»
  english_pob_reading: Render generically as 'the Lord of the harvest' without specifying whether this refers to the Father, Jesus, or God more broadly.
  chosen_spanish_reading: Se mantiene de forma genérica como «el Señor de la cosecha».
  alternative_spanish_readings:
  - el Padre de la cosecha
  - Jesús como Señor de la cosecha
  - Dios como Señor de la cosecha
  rationale: El versículo no identifica de manera explícita al referente más allá del título. La traducción conserva esa tensión teológica y evita imponer una identificación más estrecha que la que el texto garantiza.
  doctrine_reference: Preservar la tensión teológica; κύριος se traduce por su valor básico de autoridad.
translation_notes:
  revision_awareness: El pasaje coincide con el último pase de revisión indicado como sin cambios; la redacción española se ha ajustado directamente al griego y al rastro auditado en inglés sin introducir revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con el uso bíblico estándar y con la decisión auditada en inglés.
  - Se conserva la metáfora de la cosecha sin añadir «campo», porque el griego no lo expresa explícitamente.
  - «Obreros» se usa como equivalente natural de ἐργάτας en un registro bíblico moderno y respetuoso.
  - La nota [a] conserva la tensión entre el verbo fuerte ἐκβάλῃ y el sentido contextual de envío.
