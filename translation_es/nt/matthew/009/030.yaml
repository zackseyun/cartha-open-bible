translation:
  language: es
  text: 'Y se abrieron sus ojos[a]. Y Jesús les advirtió severamente, diciendo[b]: «Miren que nadie lo sepa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron abiertos». El griego usa un pasivo que describe la restauración de la vista sin señalar un agente.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Miren que nadie sepa». El objeto «lo» está implícito por el contexto de la curación y en español suele expresarse para mayor claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνεῴχθησαν
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertos
  - se les abrieron
  lexicon: BDAG
  rationale: El griego usa un pasivo aoristo de ἀνοίγω. En español, el pasivo reflejo 'se abrieron' comunica de manera natural la restauración de la vista sin añadir un agente explícito.
- source_word: οἱ ὀφθαλμοί
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de ellos
  lexicon: BDAG
  rationale: El posesivo plural 'sus' conserva la referencia explícita a 'sus ojos' en un español natural y respeta el genitivo plural del griego.
- source_word: ἐνεβριμήθη
  english_pob_choice: sternly warned
  chosen_spanish: los reprendió con severidad
  alternatives_spanish:
  - los advirtió con severidad
  - les dio una orden estricta
  - los amonestó con severidad
  lexicon: BDAG
  rationale: ἐμβριμάομαι expresa fuerza emocional y en este contexto va unido a una prohibición directa. 'Los reprendió con severidad' mantiene el tono fuerte y permite que la advertencia concreta aparezca en la cita siguiente.
- source_word: Ὁρᾶτε
  english_pob_choice: See that
  chosen_spanish: Miren que
  alternatives_spanish:
  - Tengan cuidado de que
  - Vean que
  - Atiendan a que
  lexicon: BDAG
  rationale: El imperativo plural funciona como una advertencia introductoria. 'Miren que' es una forma idiomática, clara y sobria en español, equivalente a 'See that'.
- source_word: μηδεὶς γινωσκέτω
  english_pob_choice: no one knows
  chosen_spanish: nadie se entere
  alternatives_spanish:
  - nadie lo sepa
  - no se entere nadie
  - nadie llegue a saberlo
  lexicon: BDAG
  rationale: 'El griego expresa una prohibición: que nadie llegue a saberlo. En español, ''nadie se entere'' transmite de forma natural la idea de mantener el hecho en secreto sin imponer un objeto explícito que el texto griego no dice.'
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio contemporáneo se rinde con 'diciendo' para conservar la conexión entre la reprensión y el contenido de la advertencia.
theological_decisions:
- issue: Fuerza de la orden de Jesús después de la curación
  english_pob_reading: Jesús da una prohibición fuerte contra divulgar el hecho, sin explicar su motivo.
  chosen_spanish_reading: Jesús da una reprensión/advertencia fuerte y luego prohíbe que el hecho se divulgue.
  alternative_spanish_readings:
  - Jesús los regañó
  - Jesús les dio una orden estricta
  - Jesús los increpó
  rationale: El texto presenta el tono enérgico de Jesús pero no explica por qué manda silencio. La traducción conserva esa tensión y evita añadir una motivación teológica que el versículo no proporciona.
  doctrine_reference: Preservar la tensión textual sin resolverla especulativamente.
translation_notes:
  revision_awareness: Se siguió el ajuste de la POB inglesa más reciente que eliminó el objeto explícito 'it' en la prohibición. Para el español, se optó por una fórmula igualmente implícita ('nadie se entere') que mantiene la brevedad y el sentido del griego.
  spanish_consistency_notes:
  - Se mantuvo 'Jesús' como nombre propio estándar.
  - Se evitó 'SEÑOR' o 'Cristo' porque el versículo no contiene ni requiere esos términos.
  - Se preservó el tono fuerte del verbo ἐνεβριμήθη sin convertirlo en una explicación del motivo de Jesús.
  - La prohibición final se formuló sin objeto explícito, en línea con el griego y con la revisión inglesa reciente.
