    text: 'O: «fueron abiertos». El griego usa un pasivo que describe la restauración de la vista sin señalar un agente.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Miren que nadie sepa». El objeto «lo» está implícito por el contexto de la curación y en español suele expresarse para mayor claridad.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó «los reprendió con severidad» por «les advirtió severamente» para reflejar mejor ἐνεβριμήθη como advertencia/mandato enérgico, no meramente regaño. Se cambió «nadie se entere» por «nadie lo sepa» para acercarse más a γινωσκέτω y mantener un español bíblico claro y natural. Se ajustó la nota correspondiente para explicar el objeto implícito contextual.
