review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente el griego: οὕτως = «Así», ἔσονται = «serán», y el paralelismo «los últimos… los primeros» / «los primeros… últimos» está bien conservado sin sobreinterpretar el alcance de la inversión. También mantiene la concisión proverbial del original y del English POB.'
  spanish_quality_summary: La redacción es clara y natural en español. Sin embargo, para ajustarse mejor al rastro de auditoría del English POB, conviene conservar la nota alternativa para οὕτως («Así» / «De este modo»), anclada en el primer término. Además, es preferible omitir la coma en la segunda cláusula para mantener la tersura aforística del griego y del inglés base.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. «Los últimos» / «los primeros» concuerda con las decisiones léxicas documentadas y evita opciones más interpretativas como «los postreros» o «los principales».
  issues:
  - severity: medium
    issue: Falta la nota de alternativa léxica para οὕτως
    rationale: El English POB preserva explícitamente la alternativa «Thus». En español corresponde mantener una nota equivalente, especialmente porque «Así» también puede representarse como «De este modo».
  - severity: low
    issue: La coma antes de «últimos» no es necesaria
    rationale: «Y los primeros últimos» suena más sentencioso y más cercano a la estructura breve del griego. La coma no cambia el sentido, pero recarga ligeramente el ritmo.
  revised_spanish_text: Así[a], los últimos serán primeros y los primeros últimos.
