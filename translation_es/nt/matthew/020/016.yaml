translation:
  language: es
  text: Así[a], los últimos serán primeros y los primeros últimos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «De este modo, los últimos serán primeros y los primeros últimos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: BDAG
  rationale: οὕτως introduce la conclusión proverbial de la parábola. «Así» comunica la relación resultativa sin sobrecargar el enunciado ni forzar una causalidad más fuerte que la del griego.
- source_word: ἔσονται
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - van a ser
  - estarán
  lexicon: BDAG
  rationale: El futuro de εἰμί se vierte naturalmente con «serán» en español, manteniendo la sentencia breve y proverbial.
- source_word: οἱ ἔσχατοι
  english_pob_choice: the last
  chosen_spanish: los últimos
  alternatives_spanish:
  - los que son últimos
  - los postreros
  lexicon: BDAG
  rationale: El artículo con el adjetivo funciona de manera sustantiva; «los últimos» conserva el paralelismo directo con «los primeros» y no añade matices de valor social que el griego no explicita.
- source_word: πρῶτοι
  english_pob_choice: first
  chosen_spanish: primeros
  alternatives_spanish:
  - los primeros
  - principales
  lexicon: BDAG
  rationale: Como predicativo, «primeros» mantiene la antítesis breve y equilibrada del dicho. En español, el plural sustantivado ya resulta natural con el artículo precedente.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: La coordinación simple del griego pide «y»; «pero» introduciría un matiz adversativo no expresado explícitamente.
- source_word: οἱ πρῶτοι
  english_pob_choice: the first
  chosen_spanish: los primeros
  alternatives_spanish:
  - los que son primeros
  - los principales
  lexicon: BDAG
  rationale: Se conserva la misma estructura sustantivada que en «los últimos» para reproducir el paralelismo de la sentencia.
- source_word: ἔσχατοι
  english_pob_choice: last
  chosen_spanish: últimos
  alternatives_spanish:
  - postreros
  - los últimos
  lexicon: BDAG
  rationale: Cierra la fórmula de inversión con el mismo término usado en la primera mitad, preservando la simetría retórica del griego.
theological_decisions:
- issue: Alcance de la inversión "últimos/primeros"
  english_pob_reading: Render as a concise reversal proverb without specifying whether 'last/first' refers to chronology, social status, reward, or salvation.
  chosen_spanish_reading: Traducir como un proverbio conciso de inversión, sin precisar si la relación entre «últimos» y «primeros» es cronológica, social, de recompensa o de salvación.
  alternative_spanish_readings:
  - Interpretar la inversión como un cambio de estatus social
  - Interpretarla como una inversión de recompensas dentro del discipulado
  - Interpretarla como una afirmación sobre el orden de salvación
  rationale: El griego formula la inversión de manera sentenciosa, pero no determina su ámbito exacto. La traducción debe conservar esa tensión teológica sin resolverla más allá del enunciado inmediato.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se conserva la brevedad proverbial, la simetría sintáctica y la tensión interpretativa sin añadir explicaciones ausentes del griego.'
  spanish_consistency_notes:
  - Se usa «últimos/primeros» de modo uniforme para reflejar οἱ ἔσχατοι / οἱ πρῶτοι.
  - No se introduce «Cristo», «SEÑOR» ni otra terminología no presente en el versículo.
  - El orden y la puntuación buscan reflejar el paralelismo enfático del griego con una cadencia natural en español.
