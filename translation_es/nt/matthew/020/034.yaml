translation:
  language: es
  text: Y Jesús[a], movido a compasión, tocó sus ojos, y enseguida recobraron la vista y lo siguieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvieron a ver». El verbo griego puede significar «recobrar la vista» o, más literalmente, «mirar hacia arriba», pero en este contexto se refiere a la restauración de la vista.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπλαγχνισθεὶς
  english_pob_choice: moved with compassion
  chosen_spanish: movido a compasión
  alternatives_spanish:
  - con compasión
  - lleno de compasión
  lexicon: BDAG
  rationale: El participio expresa una compasión profunda y entrañable. «Movido a compasión» conserva el impulso afectivo de la acción y suena natural en español sin rebajar la fuerza emocional del griego.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo suave. «Y» mantiene el flujo del relato en español y evita introducir un contraste que el contexto no exige.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - puso la mano en
  - tomó contacto con
  lexicon: BDAG
  rationale: En este contexto de sanidad, ἅπτομαι indica un toque físico. «Tocó» comunica con claridad el acto sin añadir matices ajenos al texto.
- source_word: τῶν ὀμμάτων αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de ellos
  lexicon: BDAG
  rationale: El griego usa el genitivo con el sustantivo «ojos», pero en español la forma natural y fiel es el posesivo directo «sus ojos».
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: La palabra marca inmediatez. «Enseguida» preserva esa rapidez de manera idiomática en español, con un tono narrativo ágil y digno.
- source_word: ἀνέβλεψαν
  english_pob_choice: received their sight
  chosen_spanish: recobraron la vista
  alternatives_spanish:
  - volvieron a ver
  - vieron de nuevo
  lexicon: BDAG
  rationale: En contexto de sanidad, ἀναβλέπω señala la recuperación de la vista. «Recobraron la vista» expresa esa restauración real y mantiene la fuerza de la lectura inglesa sin reducirla a «miraron hacia arriba».
- source_word: ἠκολούθησαν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - fueron tras él
  lexicon: BDAG
  rationale: «Lo siguieron» reproduce de manera natural el sentido básico de ἀκολουθέω. Preserva el seguimiento literal y la posible resonancia de discipulado sin convertirla en una afirmación más explícita de la que el versículo formula.
theological_decisions:
- issue: Naturaleza del resultado de ἀνέβλεψαν
  english_pob_reading: A real, immediate restoration of sight
  chosen_spanish_reading: Una restauración real e inmediata de la vista
  alternative_spanish_readings:
  - Que simplemente empezaron a mirar hacia arriba
  - Que solo recuperaron parcialmente la visión
  rationale: La combinación de εὐθέως con ἀνέβλεψαν en un relato de milagro indica una curación concreta e instantánea. La traducción debe reflejar restauración de la vista, no solo un gesto de mirar hacia arriba.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Alcance de ἠκολούθησαν αὐτῷ
  english_pob_reading: followed him
  chosen_spanish_reading: lo siguieron
  alternative_spanish_readings:
  - se hicieron discípulos de él
  - lo acompañaron como discípulos
  rationale: El texto afirma que siguieron a Jesús, pero no especifica explícitamente la duración ni define doctrinalmente el grado de discipulado. «Lo siguieron» conserva el dato textual sin sobreinterpretarlo.
  doctrine_reference: Translation philosophy 3
translation_notes:
  revision_awareness: El último paso de revisión indicó acuerdo alto y no introdujo cambios. Esta redacción sigue de cerca el griego SBLGNT y mantiene las decisiones léxicas ya auditadas en la tradición inglesa POB, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «Jesús» como forma fija del nombre propio.
  - Se evita «Cristo» porque el versículo no usa Χριστός como título.
  - «Recobraron la vista» preserva la lectura milagrosa de ἀνέβλεψαν sin forzar una explicación más técnica en el cuerpo del texto.
  - La nota[a] se coloca sobre «Jesús» siguiendo el antecedente de la auditoría inglesa, aunque la alternativa léxica afecta al verbo final; se conserva el mismo marcador para mantener trazabilidad textual.
