translation:
  language: es
  text: 'Pero Jesús respondió y dijo: «No saben lo que piden. ¿Pueden beber la copa[a] que yo voy a beber?». Ellos le dijeron: «Podemos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «la copa del sufrimiento que yo voy a beber». El griego conserva la metáfora «copa», una imagen bíblica común de la porción asignada a alguien, especialmente el sufrimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν
  english_pob_choice: But Jesus answered and said
  chosen_spanish: Pero Jesús respondió y dijo
  alternatives_spanish:
  - Y Jesús respondió y dijo
  - Pero Jesús respondió
  lexicon: BDAG
  rationale: 'Conserva la fórmula narrativa completa: δέ se refleja naturalmente con «Pero», y el participio más el verbo finito se mantienen con «respondió y dijo» sin forzar una paráfrasis.'
- source_word: Οὐκ οἴδατε
  english_pob_choice: You do not know
  chosen_spanish: No saben
  alternatives_spanish:
  - No conocen
  - No entienden
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento; en español, «no saben» comunica directamente esa falta de conocimiento y mantiene el tono de reprensión.
- source_word: τί αἰτεῖσθε
  english_pob_choice: what you are asking
  chosen_spanish: lo que piden
  alternatives_spanish:
  - lo que están pidiendo
  - lo que solicitan
  lexicon: BDAG
  rationale: El presente medio se traduce con una acción de petición en curso. «Piden» es idiomático en español y preserva el sentido sin sobrecargarlo.
- source_word: δύνασθε
  english_pob_choice: Are you able
  chosen_spanish: ¿Pueden
  alternatives_spanish:
  - ¿Son capaces
  - ¿Tienen capacidad para
  lexicon: BDAG
  rationale: En pregunta directa, «¿Pueden» expresa capacidad de manera natural en español y corresponde al valor de δύναμαι sin debilitarlo.
- source_word: πιεῖν
  english_pob_choice: to drink
  chosen_spanish: beber
  alternatives_spanish:
  - tomar
  - beber de
  lexicon: BDAG
  rationale: Infinitivo directo y natural en español; mantiene el verbo de la metáfora sin explicitarlo.
- source_word: τὸ ποτήριον
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el cáliz
  - la copa de sufrimiento
  lexicon: BDAG
  rationale: Se conserva la metáfora de la copa, común en el lenguaje bíblico. «Copa» es claro en español y evita resolverla prematuramente como sufrimiento.
- source_word: ὃ ἐγὼ μέλλω πίνειν
  english_pob_choice: that I am about to drink
  chosen_spanish: que yo estoy por beber
  alternatives_spanish:
  - que voy a beber
  - que he de beber
  lexicon: BDAG
  rationale: «Estoy por beber» refleja la inminencia de μέλλω con una formulación natural en español y conserva el paralelismo con la metáfora de beber la copa.
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le dijeron
  alternatives_spanish:
  - Le dijeron
  - Dijeron a él
  lexicon: BDAG
  rationale: La forma plena «Ellos le dijeron» es clara y conserva el sujeto explícito del griego, aunque en español también sería posible omitirlo.
- source_word: Δυνάμεθα
  english_pob_choice: We are able
  chosen_spanish: Podemos
  alternatives_spanish:
  - Somos capaces
  - Sí podemos
  lexicon: BDAG
  rationale: En respuesta breve, «Podemos» es la equivalencia más natural y conserva la idea de capacidad presente en δύναμαι.
theological_decisions:
- issue: La metáfora de la copa
  english_pob_reading: Retain 'the cup' in the main text without explicating it as suffering or death.
  chosen_spanish_reading: Conservar «la copa» en el texto principal sin explicitarla como sufrimiento o muerte.
  alternative_spanish_readings:
  - la copa del sufrimiento
  - el sufrimiento que estoy por padecer
  rationale: La metáfora tiene peso teológico y narrativo propio. Mantenerla abierta evita resolver interpretativamente el dicho de Jesús y preserva la tensión que el texto presenta.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El inglés POB y la revisión más reciente coinciden plenamente; no hubo cambios aplicados. La versión española sigue esa misma decisión de conservar la metáfora de la copa y la formulación directa de la reprensión de Jesús.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y claro, con puntuación de discurso directo conforme al español moderno.
  - Se eligió «copa» en lugar de «cáliz» para evitar una tonalidad litúrgica más marcada que no está exigida por el griego.
  - La pregunta con capacidad se expresó con «¿Pueden» por naturalidad, sin perder el valor de δύναμαι.
  - No se explicitó el contenido de la copa en el texto principal para respetar la tensión teológica del original.
