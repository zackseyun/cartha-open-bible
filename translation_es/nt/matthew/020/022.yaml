base_translation:
  language: en
  yaml_path: translation/nt/matthew/020/022.yaml
  text: But Jesus answered and said[a], “You do not know what you are asking. Are you able to drink the cup that I am about to drink?” They said to him, “We are able.”
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the cup of suffering that I am about to drink.' The Greek keeps the metaphor 'cup,' a common biblical image for one's appointed portion, especially suffering.
    reason: lexical_alternative
