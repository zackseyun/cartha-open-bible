translation:
  language: es
  text: Después de acordar con los trabajadores por un denario al día[a], los envió a su viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un denario era el salario diario estándar de un trabajador.
    reason: cultural_note
lexical_decisions:
- source_word: συμφωνήσας
  english_pob_choice: After agreeing
  chosen_spanish: Después de acordar
  alternatives_spanish:
  - habiendo acordado
  - tras llegar a un acuerdo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa a la principal. En español, «Después de acordar» comunica bien la relación temporal y suena natural sin añadir contenido no presente en el griego.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector suave. En español no requiere equivalencia explícita porque la secuencia narrativa ya queda clara con la construcción participial.
- source_word: ἐργατῶν
  english_pob_choice: workers
  chosen_spanish: trabajadores
  alternatives_spanish:
  - obreros
  - jornaleros
  lexicon: BDAG
  rationale: «Trabajadores» es claro y natural en español general. «Jornaleros» sería una opción más específica, pero el texto solo dice «los trabajadores» y no obliga a ese matiz.
- source_word: ἐκ δηναρίου
  english_pob_choice: for one denarius
  chosen_spanish: un denario
  alternatives_spanish:
  - por un denario
  - a un denario
  lexicon: BDAG
  rationale: El griego expresa la tarifa convenida. En español, «un denario» basta dentro de la frase verbal de acuerdo; la preposición implícita del pacto se entiende por el contexto sin sobrecargar la sintaxis.
- source_word: τὴν ἡμέραν
  english_pob_choice: for the day
  chosen_spanish: por el día
  alternatives_spanish:
  - para el día
  - por la jornada
  lexicon: BDAG
  rationale: La expresión señala el pago diario. «Por el día» reproduce la idea de remuneración por jornada con un español natural y fiel al valor temporal/cuantitativo.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: los envió
  alternatives_spanish:
  - los mandó
  - los despachó
  lexicon: BDAG
  rationale: «Enviar» corresponde bien al verbo narrativo y evita un tono más duro o administrativo que «despachar».
- source_word: ἀμπελῶνα
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - viña de uvas
  lexicon: BDAG
  rationale: En español bíblico, «viña» es el equivalente más directo y reconocido para ἀμπελών. «Viñedo» puede sonar más técnico o moderno y desplaza el matiz tradicional del lugar de cultivo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El posesivo remite al dueño de la viña. «Su» es la forma natural en español y mantiene la referencia sin introducir redundancia.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y coincide sustancialmente con la lectura inglesa auditada; no se documentan revisiones sustantivas en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable en este versículo.
  - Se usa «viña» para ἀμπελῶνα según el uso bíblico común y la continuidad del campo semántico.
  - No se introduce terminología doctrinal ajena al texto narrativo.
