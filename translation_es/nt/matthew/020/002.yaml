review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: acción previa de συμφωνήσας, envío de los trabajadores, y destino a la viña. Sin embargo, «acordar con los trabajadores un denario por el día» suena algo incompleto en español y atenúa el valor remunerativo explícito de ἐκ δηναρίου τὴν ἡμέραν. La idea es un acuerdo salarial: «por un denario al día».'
  spanish_quality_summary: El español es claro y mayormente natural, pero «un denario por el día» resulta menos idiomático que «por un denario al día». Además, «viña» es aceptable y bíblicamente reconocible. La nota cultural está bien, aunque «salario» o «jornal» suena más natural que «paga».
  glossary_alignment: No hay términos teológicos sensibles aquí. «Trabajadores» concuerda con la decisión POB para ἐργατῶν. «Viña» es una opción válida para ἀμπελῶνα. Se preserva «denario» correctamente con nota cultural.
  issues:
  - severity: medium
    issue: La expresión «un denario por el día» no suena plenamente idiomática en español.
    rationale: Aunque comprensible, en español natural la tarifa diaria se expresa mejor como «por un denario al día» o «por un denario por la jornada». Esto representa mejor ἐκ δηναρίου τὴν ἡμέραν como acuerdo de salario diario.
  - severity: low
    issue: La nota al pie usa «paga diaria estándar», formulación algo menos natural.
    rationale: «Salario diario» o «jornal diario» comunica con mayor naturalidad la función cultural del denario sin cambiar el contenido.
  revised_spanish_text: Después de acordar con los trabajadores por un denario al día[a], los envió a su viña.
  revised_footnotes:
  - marker: a
    text: Un denario era el salario diario estándar de un trabajador.
    reason: cultural_note
  revision_rationale: 'Se ajusta la expresión salarial para reflejar con más fidelidad e idiomaticidad el griego ἐκ δηναρίου τὴν ἡμέραν: no solo la cantidad, sino el pago convenido por jornada. También se pule la nota cultural para un español más natural.'
