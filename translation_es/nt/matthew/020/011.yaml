lexical_decisions:
- source_word: λαβόντες
  english_pob_choice: after receiving it
  chosen_spanish: después de recibirlo
  alternatives_spanish:
  - habiendo recibido
  - cuando recibieron
  lexicon: BDAG
  rationale: El participio aoristo indica anterioridad temporal respecto del verbo principal. En español, «después de recibirlo» conserva esa secuencia y evita una construcción demasiado pesada. El objeto implícito se explicita con «lo» por claridad contextual, ya que en la parábola se entiende el denario.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como un conector narrativo suave. «Y» reproduce ese avance discursivo sin imponer contraste.
- source_word: ἐγόγγυζον
  english_pob_choice: they began grumbling
  chosen_spanish: comenzaron a murmurar
  alternatives_spanish:
  - estaban murmurando
  - se quejaban
  - comenzaron a quejarse
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en desarrollo o incipiente. «Comenzaron a murmurar» conserva ese valor inceptivo y el matiz de descontento. «Murmurar» mantiene el tono más cercano al griego que «quejarse».
- source_word: κατὰ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - contra de
  lexicon: BDAG
  rationale: Con genitivo, κατά expresa oposición dirigida a alguien. «Contra» es la correspondencia natural en español.
- source_word: τοῦ οἰκοδεσπότου
  english_pob_choice: the master of the house
  chosen_spanish: el amo de la casa
  alternatives_spanish:
  - el dueño de la casa
  - el jefe de la casa
  - el mayordomo de la casa
  lexicon: BDAG
  rationale: οἰκοδεσπότης designa al cabeza de la casa o del hogar/propiedad. «Amo de la casa» conserva el valor de autoridad y la imagen compuesta del término. «Dueño de la casa» es posible, pero puede desplazar el matiz de señorío doméstico; «amo» mantiene mejor la fuerza semántica sin introducir una terminología eclesiástica.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no registran revisiones sustantivas; la versión española sigue esa lectura estable, conservando el orden temporal y el matiz de descontento sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene «murmurar» para γογγύζω, en continuidad con el valor de queja baja o resabio expresado en el griego.
  - Se usa «amo de la casa» para οἰκοδεσπότης, evitando sustituirlo por fórmulas eclesiásticas como «Señor» o por una paráfrasis que borre la imagen doméstica.
  - El objeto implícito de λαβόντες se hace explícito en el texto principal con «lo», y la nota conserva la alternativa de lectura más literal.
