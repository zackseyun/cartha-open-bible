  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia temporal de λαβόντες, el valor narrativo suave de δέ, la oposición de κατὰ y el sentido general de ἐγόγγυζον. Sin embargo, «amo de la casa» para τοῦ οἰκοδεσπότου suena menos natural y puede introducir un matiz social más duro de lo necesario en español contemporáneo; «dueño de la casa» o «señor de la casa» comunica mejor el referente del contexto parabólico. También conviene ajustar la nota para que coincida exactamente con las alternativas conservadas en la auditoría inglesa.
  spanish_quality_summary: La frase es clara y legible, pero «comenzaron a murmurar» tiene un registro algo bíblico-tradicional; sigue siendo aceptable. El punto principal de calidad es mejorar «amo de la casa» por una opción más natural y amplia para lectura eclesial actual. La nota al pie debe evitar añadir una alternativa no preservada en inglés sin necesidad.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión principal es léxica: οἰκοδεσπότου se expresa mejor como «dueño de la casa» en español neutral, manteniendo el sentido de cabeza/propietario del hogar sin el peso potencial de «amo».'
  issues:
