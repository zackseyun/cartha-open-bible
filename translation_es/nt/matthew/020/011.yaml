translation:
  language: es
  text: Y después de recibirlo[a], comenzaron a murmurar contra el dueño de la casa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habiendo recibido, estaban murmurando contra el terrateniente».

      '
