    issue: «el amo de la casa» suena menos natural y puede sobredeterminar τοῦ οἰκοδεσπότου
    rationale: οἰκοδεσπότης es el cabeza o propietario de la casa/propiedad. En español actual, «amo» puede evocar relación amo-esclavo y resultar menos idiomático que «dueño de la casa» en este contexto parabólico.
  - severity: low
    issue: La nota al pie no coincide exactamente con la auditoría inglesa
    rationale: La nota inglesa preserva «having received» y «they were grumbling against the landowner». La española actual ofrece «cuando lo recibieron», que era una alternativa léxica documentada para λαβόντες, pero omite la alternativa completa sobre el verbo principal y el referente «landowner». Conviene alinear mejor la nota preservada.
  revised_spanish_text: Y después de recibirlo[a], comenzaron a murmurar contra el dueño de la casa,
