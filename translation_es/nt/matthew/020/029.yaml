revisions:
- from: Y al salir ellos de Jericó, los siguió una gran multitud.
  to: Y al salir ellos de Jericó[a], una gran multitud lo siguió.
  rationale: 'Se corrige el error principal de sentido: el referente de αὐτῷ es singular, por lo que la multitud siguió a Jesús, no a «ellos». Se mantiene «al salir ellos» como una forma natural de reflejar el participio temporal plural, y se conserva una nota breve para la alternativa léxica documentada en la auditoría inglesa.'
  reviewer_model: gpt-5.4
