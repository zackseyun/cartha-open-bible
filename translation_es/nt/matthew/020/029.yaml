translation:
  language: es
  text: Y al salir ellos de Jericó[a], una gran multitud lo siguió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al partir de Jericó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορευομένων
  english_pob_choice: as they were going out
  chosen_spanish: al salir ellos
  alternatives_spanish:
  - mientras salían
  - cuando salían
  lexicon: BDAG
  rationale: El participio genitivo plural tiene valor temporal y describe una acción en curso. En español, «al salir ellos» conserva esa relación temporal sin forzar una subordinada pesada ni perder el matiz de movimiento hacia afuera.
- source_word: ἀπὸ Ἰεριχὼ
  english_pob_choice: from Jericho
  chosen_spanish: de Jericó
  alternatives_spanish:
  - desde Jericó
  - fuera de Jericó
  lexicon: BDAG
  rationale: Ἀπό marca procedencia o alejamiento. «De Jericó» es natural en español y comunica la fuente del movimiento sin añadir matices interpretativos no exigidos por el texto.
- source_word: ἠκολούθησεν
  english_pob_choice: followed
  chosen_spanish: los siguió
  alternatives_spanish:
  - lo siguió
  - acompañó tras ellos
  lexicon: BDAG
  rationale: El aoristo de ἀκολουθέω se rinde con «seguir». En español, el clítico plural «los» refleja el antecedente plural inmediato («ellos») y evita ambigüedad sintáctica en la frase inicial, manteniendo el sentido de ir detrás.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - les
  - a él
  lexicon: BDAG
  rationale: El dativo singular griego señala a un referente singular. En contexto, el singular se conserva como objeto directo clítico en español («lo») para reflejar que la acción se focaliza en Jesús, sin suavizar la transición del plural al singular.
- source_word: ὄχλος πολύς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - una multitud numerosa
  lexicon: BDAG
  rationale: La combinación sustantivo-adjetivo expresa una multitud numerosa. «Gran multitud» es idiomático, claro y mantiene el valor cuantitativo sin volverlo meramente estilístico.
theological_decisions:
- issue: Cambio del plural temporal al singular del objeto de ἀκολουθέω
  english_pob_reading: The crowd followed Jesus ('him').
  chosen_spanish_reading: La multitud siguió a Jesús, preservando el cambio de plural a singular en la construcción verbal.
  alternative_spanish_readings:
  - La multitud siguió al grupo
  - seguían con ellos
  rationale: El griego pasa de un sujeto/escena plural («ellos») a un objeto singular («a él/lo»). La traducción conserva esa oscilación y no la resuelve en un referente plural más cómodo. El clítico «los» en la primera parte pertenece al sujeto explícito («ellos»); el clítico «lo» después recupera el singular del referente de seguimiento en el contexto inmediato.
  doctrine_reference: Preservar la tensión sintáctica del texto original y la prioridad del referente singular sugerido por el griego.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el griego SBLGNT y el expediente inglés POB, especialmente la nota sobre la alternativa lexical de ἀπὸ Ἰεριχώ. No se detectaron revisiones previas que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene «Jericó» como topónimo estándar en español.
  - Se conserva la distinción entre el sujeto plural («ellos») y el referente singular implícito de seguimiento en la segunda cláusula.
  - El registro es neutral y eclesiásticamente legible, sin arcaísmos innecesarios.
