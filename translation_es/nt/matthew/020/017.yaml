translation:
  language: es
  text: 'Y Jesús, mientras subía a Jerusalén, tomó aparte[a] a los doce discípulos, y en el camino les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«aparte» traduce el sentido de κατ’ ἰδίαν: separados del resto, para hablarles en privado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβαίνων
  english_pob_choice: was going up
  chosen_spanish: mientras subía
  alternatives_spanish:
  - mientras iba subiendo
  - cuando subía
  - subiendo
  lexicon: BDAG
  rationale: El participio presente indica acción simultánea con παρέλαβεν. En español, «mientras subía» conserva la simultaneidad y el sentido direccional de ascenso hacia Jerusalén sin sonar forzado.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: Con nombre de ciudad, εἰς se expresa naturalmente como «a». «Jerusalén» reproduce el topónimo estándar en español y mantiene la referencia geográfica del texto.
- source_word: παρέλαβεν
  english_pob_choice: took
  chosen_spanish: tomó aparte
  alternatives_spanish:
  - tomó
  - llevó aparte
  - tomó consigo
  lexicon: BDAG
  rationale: El verbo puede significar tomar/traer consigo. Aquí el complemento inmediato κατ’ ἰδίαν obliga a reflejar el acto de apartarlos; por eso «tomó aparte» preserva el valor básico de «tomó» y la separación contextual.
- source_word: τοὺς δώδεκα μαθητὰς
  english_pob_choice: the twelve disciples
  chosen_spanish: a los doce discípulos
  alternatives_spanish:
  - a los doce
  - a los doce aprendices
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente normal de μαθηταί en el contexto evangélico. Se conserva «los doce» porque el griego lo explicita y funciona como designación grupal identificable.
- source_word: κατ’ ἰδίαν
  english_pob_choice: aside by themselves
  chosen_spanish: aparte
  alternatives_spanish:
  - en privado
  - separados de los demás
  - aparte de los demás
  lexicon: BDAG
  rationale: La expresión idiomática denota retirada del grupo para conversación privada. En español, «aparte» en este contexto ya comunica la separación; la nota de pie aclara el matiz relacional y privativo.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - de camino
  - por el camino
  - mientras iban
  lexicon: BDAG
  rationale: «En el camino» es una forma natural y fiel de la frase locativa/dativa, preservando el marco de viaje sin añadir inferencias.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les comentó
  lexicon: BDAG
  rationale: El verbo λέγω se traduce con el verbo ordinario de hablar. Como la cita continúa en el verso siguiente, «les dijo» es la fórmula más natural y fiel.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y el audit trail inglés: conserva el movimiento ascendente hacia Jerusalén, la separación privada de los doce y la escena de camino. No se detectaron revisiones textuales ni variantes que alteren la base de traducción.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Jerusalén» para Ἱεροσόλυμα.
  - Se usa «discípulos» para μαθηταί, consistente con el contexto evangélico.
  - Se evita «SEÑOR» u այլ masking terminology porque no aparece el nombre divino en este versículo.
  - La puntuación sigue el patrón narrativo español con coma tras la cláusula introductoria y dos puntos al final para preparar la cita siguiente.
