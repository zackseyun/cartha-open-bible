translation:
  language: es
  text: Y el que quiera ser el primero entre ustedes será su esclavo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El griego usa δοῦλος, un término más fuerte que el del versículo anterior, y con frecuencia denota un esclavo o un siervo por contrato.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἂν θέλῃ
  english_pob_choice: whoever wants
  chosen_spanish: cualquiera que quiera
  alternatives_spanish:
  - quien quiera
  - todo el que quiera
  lexicon: BDAG
  rationale: La construcción indefinida con ἂν + subjuntivo expresa una condición general. En español, «cualquiera que quiera» comunica esa apertura indefinida y conserva el sentido volitivo de θέλω sin sonar forzado.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: En este contexto de jerarquía y comunidad, la preposición se entiende mejor como relación dentro del grupo, no mera ubicación física. «Entre ustedes» es natural en español y preserva la idea de posición dentro de la comunidad.
- source_word: εἶναι πρῶτος
  english_pob_choice: to be first
  chosen_spanish: ser el primero
  alternatives_spanish:
  - llegar a ser el primero
  - ser el más importante
  lexicon: BDAG
  rationale: La infinitiva con πρῶτος expresa aspiración a rango o precedencia. «Ser el primero» es la forma más directa y fiel en español; evita añadir una interpretación de importancia que no está explícita en el griego.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - deberá ser
  - ha de ser
  lexicon: BDAG
  rationale: El futuro indicativo se traduce de manera directa como «será». En este dicho funciona con fuerza normativa, pero el español puede conservarla sin reemplazarla por un modal más explícito.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - de vosotros
  lexicon: BDAG
  rationale: 'El genitivo indica pertenencia o relación: la persona será esclavo de los demás miembros del grupo. En español, «su esclavo» conserva esa relación; el contexto ya fija el plural de segunda persona.'
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  - siervo esclavo
  lexicon: BDAG
  rationale: POB documenta que δοῦλος debe rendirse como «esclavo» cuando la condición de sometimiento es saliente. Aquí Jesús intensifica el término anterior de servicio con δοῦλος; «esclavo» preserva esa fuerza y evita aplanar la distinción lexical.
theological_decisions:
- issue: Escalada deliberada de vocabulario de servicio frente al contexto inmediato
  english_pob_reading: The Greek uses doulos, a stronger term than the one in the previous verse and often denotes a slave or bonded servant.
  chosen_spanish_reading: El griego usa δοῦλος, un término más fuerte que el del versículo anterior; por eso se traduce «esclavo».
  alternative_spanish_readings:
  - «siervo»
  - «servidor»
  - «servidor esclavo»
  rationale: La decisión evita neutralizar la intensificación de Jesús en el contexto. En español, «esclavo» comunica mejor la condición de sujeción que «siervo», y mantiene la tensión retórica entre ambición de rango y abajamiento radical.
  doctrine_reference: 'DOCTRINE.md: Tabla de términos controvertidos para δοῦλος; principios de preservación de fuerza lexical'
translation_notes:
  revision_awareness: 'El control de revisión indica que no hubo cambios necesarios en el pasaje base (último pase: sin cambios; acuerdo alto). La redacción española mantiene la fuerza de δοῦλος como «esclavo», en continuidad con el audit trail inglés y sin introducir una suavización no justificada.'
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y eclesialmente readable, sin calcos innecesarios.
  - Se conservó la distinción lexical entre el servicio general del contexto y δοῦλος como término más fuerte.
  - Se usó «ustedes» como forma neutral latinoamericana, coherente con el objetivo de español amplio.
  - La nota al pie se ancló en «esclavo» porque allí está la alternativa lexical documentada.
