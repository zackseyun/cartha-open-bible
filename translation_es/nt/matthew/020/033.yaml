  - severity: medium
    issue: «Permite que» añade material interpretativo no presente en el texto
    rationale: Aunque intenta reflejar el valor peticional de ἵνα, introduce un verbo explícito de permiso que el griego no expresa. Es mejor una petición directa en subjuntivo.
  - severity: medium
