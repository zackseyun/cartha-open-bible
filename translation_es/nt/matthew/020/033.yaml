lexical_decisions:
- source_word: λέγουσιν
  english_pob_choice: They said
  chosen_spanish: Le dijeron
  alternatives_spanish:
  - Le dicen
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en pasado narrativo en español, como en el inglés POB, para mantener fluidez sin perder el carácter de respuesta reportada.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con el clítico indirecto en español; se puede explicitar con 'a él' para énfasis, pero no es necesario.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Sir
  lexicon: BDAG
  rationale: Como vocativo dirigido a Jesús, 'Señor' conserva la dignidad y el peso confesional del término sin rebajarlo a una fórmula social como 'Señor' en sentido civil o 'Sir'.
- source_word: ἵνα
  english_pob_choice: let
  chosen_spanish: permite que
  alternatives_spanish:
  - para que
  - que
  lexicon: BDAG
  rationale: En este ruego, ἵνα introduce el contenido deseado de la petición. 'Permite que' reproduce mejor en español la fuerza peticional que el inglés POB expresó con 'let'.
- source_word: ἀνοιγῶσιν
  english_pob_choice: may be opened
  chosen_spanish: sean abiertos
  alternatives_spanish:
  - se abran
  - fueran abiertos
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo se refleja con una pasiva en español. 'Sean abiertos' conserva el carácter pasivo del griego y evita volver la frase activa.
- source_word: οἱ ὀφθαλμοὶ ἡμῶν
  english_pob_choice: our eyes
  chosen_spanish: nuestros ojos
  alternatives_spanish:
  - los ojos de nosotros
  lexicon: BDAG
  rationale: La construcción artículo + sustantivo + pronombre posesivo se naturaliza en español como 'nuestros ojos', manteniendo el sentido colectivo y la posesión genitiva.
theological_decisions:
- issue: Tratamiento de κύριος como vocativo dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Sir
  - Maestro
  rationale: Se conserva la forma tradicional y reverente del vocativo en español, coherente con la lectura del POB de 'Lord' y sin añadir una confesión más explícita de la que exige el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: La revisión inglesa pasó de 'that our eyes may be opened' a 'let our eyes be opened' para hacer más natural ἵνα en una petición. La redacción española sigue esa revisión con 'permite que', que comunica una súplica directa y mantiene la pasiva del griego.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, conforme al criterio doctrinal del proyecto.
  - Se conserva la pasiva en 'sean abiertos' para reflejar ἀνοιγῶσιν y no transformar la petición en acción activa de los ojos.
  - El clítico 'le' evita una duplicación innecesaria del dativo, pero la nota permite una explicitación si se desea mayor transparencia formal.
