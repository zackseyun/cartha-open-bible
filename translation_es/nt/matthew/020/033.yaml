translation:
  language: es
  text: 'Le dijeron: «Señor[a], que se abran nuestros ojos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Señor» puede entenderse como «Señor» o «señor» en sentido respetuoso; también, «que nuestros ojos sean abiertos».
