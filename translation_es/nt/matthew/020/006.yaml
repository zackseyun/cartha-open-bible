revisions:
- from: 'Y alrededor de la undécima hora salió y encontró a otros de pie allí[a], y les dice[b]: «¿Por qué han estado aquí todo el día sin hacer nada?»'
  to: 'Y alrededor de la undécima hora salió y encontró a otros allí de pie[a], y les dice[b]: «¿Por qué han estado aquí de pie todo el día sin trabajar?»'
  rationale: La revisión hace explícito en español el estado continuado de ἑστήκατε mediante «han estado aquí de pie», mantiene el presente histórico auditado, y sustituye «sin hacer nada» por «sin trabajar» para reflejar mejor ἀργοί dentro del contexto de jornaleros, sin sobreinterpretar el término como «desempleados». También se mejora levemente la fluidez de «allí de pie».
