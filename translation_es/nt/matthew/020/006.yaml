review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del griego: aproximación temporal («alrededor de la undécima hora»), salida, hallazgo de otros, presente histórico («les dice») y la pregunta causal. Sin embargo, en la pregunta final se pierde parte del matiz de ἑστήκατε («han estado de pie / permaneciendo aquí») al reducirse a «han estado aquí», y «sin hacer nada» es claro pero atenúa el valor más directo de ἀργοί como «ociosos»/«sin trabajar».'
  spanish_quality_summary: 'El español es natural y legible, con buen registro narrativo. No obstante, «de pie allí» suena algo pesado junto con el posterior «aquí», y la cláusula final puede ganar precisión y fluidez si se hace explícita la idea de permanencia o postura continua: «¿Por qué han estado aquí de pie todo el día sin trabajar?»'
  glossary_alignment: No hay términos del glosario mayor implicados de forma sensible en este versículo. La decisión de conservar el presente histórico («les dice») concuerda con el rastro auditado. La alternativa horaria en nota también está bien preservada.
  issues:
  - severity: medium
    issue: Pérdida parcial del matiz aspectual de ἑστήκατε
    rationale: 'El griego usa perfecto de ἵστημι, con sentido de estado continuado: «han estado de pie / han permanecido». «Han estado aquí» por sí solo no conserva suficientemente esa imagen.'
  - severity: low
    issue: «sin hacer nada» es algo más interpretativo que el adjetivo ἀργοί
    rationale: La frase comunica bien la idea general, pero «sin trabajar» se acerca más al contexto laboral inmediato de la parábola sin introducir la categoría socioeconómica de «desempleados».
  - severity: low
    issue: Ligera torpeza espacial entre «allí» y «aquí»
    rationale: No es incorrecto, pero «a otros allí de pie» fluye mejor que «a otros de pie allí» y armoniza mejor con la pregunta posterior.
  revised_spanish_text: 'Y alrededor de la undécima hora salió y encontró a otros allí de pie[a], y les dice[b]: «¿Por qué han estado aquí de pie todo el día sin trabajar?»'
  revised_footnotes:
  - marker: a
    text: 'O: «alrededor de las once de la mañana». Literalmente: «alrededor de la undécima hora».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les dijo». El griego usa un presente histórico: «dice».'
    reason: lexical_alternative
  revision_rationale: La revisión hace explícito en español el estado continuado de ἑστήκατε mediante «han estado aquí de pie», mantiene el presente histórico auditado, y sustituye «sin hacer nada» por «sin trabajar» para reflejar mejor ἀργοί dentro del contexto de jornaleros, sin sobreinterpretar el término como «desempleados». También se mejora levemente la fluidez de «allí de pie».
