translation:
  language: es
  text: 'Y alrededor de la undécima hora salió y encontró a otros allí de pie[a], y les dice[b]: «¿Por qué han estado aquí de pie todo el día sin trabajar?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alrededor de las once de la mañana». Literalmente: «alrededor de la undécima hora».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les dijo». El griego usa un presente histórico: «dice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ τὴν ἑνδεκάτην
  english_pob_choice: about the eleventh hour
  chosen_spanish: alrededor de la undécima hora
  alternatives_spanish:
  - como a las once
  - alrededor de las once
  lexicon: BDAG
  rationale: περί con acusativo expresa aproximación. «Alrededor de la undécima hora» conserva el marco temporal idiomático del pasaje y evita reducirlo innecesariamente a una hora moderna exacta.
- source_word: ἐξελθὼν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: Aunque el griego es participio aoristo, el valor narrativo en español fluye mejor con verbo finito. «Salió» sigue de cerca la revisión inglesa aprobada y mantiene la secuencia de la acción sin sobrecargar la frase.
- source_word: εὗρεν
  english_pob_choice: he found
  chosen_spanish: encontró
  alternatives_spanish:
  - halló
  - se encontró con
  lexicon: BDAG
  rationale: Es el equivalente directo y natural de εὑρίσκω en este contexto narrativo.
- source_word: ἄλλους
  english_pob_choice: others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otros hombres
  - a más trabajadores
  lexicon: BDAG
  rationale: El sustantivo implícito funciona de manera genérica. En español, «a otros» comunica esa indefinición sin añadir especificaciones que el texto no da.
- source_word: ἑστῶτας
  english_pob_choice: standing there
  chosen_spanish: de pie allí
  alternatives_spanish:
  - allí de pie
  - parados allí
  lexicon: BDAG
  rationale: El participio perfecto de ἵστημι describe un estado continuado. «De pie allí» conserva esa postura de manera natural en español y evita la ambigüedad de «parados» en algunos registros.
- source_word: καὶ λέγει αὐτοῖς
  english_pob_choice: and he says to them
  chosen_spanish: y les dice
  alternatives_spanish:
  - y les dijo
  lexicon: BDAG
  rationale: Se preserva el presente histórico del griego narrativo. «Les dice» mantiene la viveza del texto fuente, como documenta la POB inglesa.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  - ¿Por qué razón
  lexicon: BDAG
  rationale: Aunque literalmente σημαίνει «qué», en esta construcción interrogativa el sentido idiomático es causal. «¿Por qué» es la equivalencia española más clara y fiel.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: BDAG
  rationale: Adverbio locativo simple; «aquí» es la forma más natural en español.
- source_word: ἑστήκατε
  english_pob_choice: have you been standing
  chosen_spanish: han estado
  alternatives_spanish:
  - están
  - han permanecido
  lexicon: BDAG
  rationale: El perfecto de ἵστημι subraya un estado continuo. En español, «han estado» con el complemento de postura implícito en contexto transmite esa duración de manera fluida; el resto de la frase ya comunica la situación de estar allí de pie.
- source_word: ὅλην τὴν ἡμέραν
  english_pob_choice: all day
  chosen_spanish: todo el día
  alternatives_spanish:
  - durante todo el día
  - el día entero
  lexicon: BDAG
  rationale: Equivalente idiomático natural de la duración acusativa.
- source_word: ἀργοί
  english_pob_choice: idle
  chosen_spanish: sin hacer nada
  alternatives_spanish:
  - ociosos
  - inactivos
  - sin trabajar
  lexicon: BDAG
  rationale: «Idles/ociosos» puede sonar rígido o ambiguo en español contemporáneo. «Sin hacer nada» expresa la fuerza semántica de ἀργός en un registro claro y publicable, sin introducir la connotación socioeconómica de «desempleados».
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió un verbo finito simple para ἐξελθὼν («he went out») y conservó el presente histórico de λέγει. También refleja la resolución de la POB inglesa de mantener «the eleventh hour» como idiomático, con nota alternativa para la lectura horaria moderna.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término base del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evita «Cristo»/«Mesías» porque no hay cristología en este versículo.
  - «Sin hacer nada» se eligió como equivalente funcional de ἀργοί para no sobretraducir a «desempleados», que sería más interpretativo que el griego.
