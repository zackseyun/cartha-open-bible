translation:
  language: es
  text: 'Jesús les dijo: «Sí beberán mi copa[a], pero sentarse a mi derecha y a mi izquierda[b] no me corresponde conceder, sino a aquellos para quienes ha sido preparado por mi Padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La «copa» es una metáfora del sufrimiento o del destino asignado a Jesús, que sus discípulos también compartirán.
    reason: cross_reference
  - marker: b
    text: 'O: «sentarse a mi derecha y a mi izquierda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει αὐτοῖς
  english_pob_choice: He said to them
  chosen_spanish: Jesús les dijo
  alternatives_spanish:
  - Les dijo
  - Él les dijo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte de forma natural en pasado simple en español narrativo. Se explicita «Jesús» para mantener claridad referencial en una cita directa sin perder el sujeto implícito del contexto.
- source_word: ποτήριόν μου
  english_pob_choice: my cup
  chosen_spanish: mi copa
  alternatives_spanish:
  - mi cáliz
  - la copa que es mía
  lexicon: BDAG
  rationale: «Copa» conserva la metáfora del texto griego y del audit trail inglés sin adelantar interpretación en el cuerpo principal. Se evita «cáliz» por su matiz litúrgico menos directo en español contemporáneo.
- source_word: πίεσθε
  english_pob_choice: you will indeed drink
  chosen_spanish: Ciertamente beberán
  alternatives_spanish:
  - Beberán
  - En verdad beberán
  lexicon: BDAG
  rationale: El futuro se expresa con valor de certeza/afirmación. «Ciertamente» recoge la fuerza contrastiva de μὲν que el inglés marca con «indeed», sin volver la frase forzada.
- source_word: καθίσαι ἐκ δεξιῶν μου καὶ ἐξ εὐωνύμων
  english_pob_choice: to sit at my right and at my left
  chosen_spanish: sentarse a mi derecha y a mi izquierda
  alternatives_spanish:
  - sentarse al lado derecho mío y al lado izquierdo mío
  - sentarse a mi diestra y a mi siniestra
  lexicon: BDAG
  rationale: La construcción se naturaliza en español como posiciones de honor junto a Jesús. Se evita «en mi derecha/izquierda» por poco idiomático; «a mi derecha e izquierda» mantiene la relación espacial y honorífica.
- source_word: οὐκ ἔστιν ἐμὸν δοῦναι
  english_pob_choice: is not mine to grant
  chosen_spanish: no me corresponde otorgarlo
  alternatives_spanish:
  - no es mío darlo
  - no me toca darlo
  lexicon: BDAG
  rationale: «Otorgarlo» comunica adecuadamente la asignación de lugares de honor. «Me corresponde» preserva el matiz de prerrogativa/competencia sin suavizar la negación del texto; se evita añadir armonizaciones doctrinales.
- source_word: ἀλλ’ οἷς ἡτοίμασται
  english_pob_choice: but it is for those for whom it has been prepared
  chosen_spanish: sino a aquellos para quienes ha sido preparado
  alternatives_spanish:
  - sino para aquellos para quienes ha sido preparado
  - sino a los que ha sido preparado
  lexicon: BDAG
  rationale: Se mantiene la cláusula relativa con sujeto impersonal/pasivo para reflejar el pasivo perfecto griego. «Ha sido preparado» conserva la idea de una preparación realizada con efecto vigente.
- source_word: ὑπὸ τοῦ πατρός μου
  english_pob_choice: by my Father
  chosen_spanish: por mi Padre
  alternatives_spanish:
  - por mi Padre solo
  - por el Padre mío
  lexicon: BDAG
  rationale: Traducción directa del agente en la pasiva. «Padre» se capitaliza por referencia a Dios; no se añade «solo» porque no está explícito en el griego ni en el audit trail inglés.
theological_decisions:
- issue: Tensión cristológica en «no me corresponde otorgarlo»
  english_pob_reading: Render the statement straightforwardly without adding qualifiers that diminish or explain away Jesus' authority.
  chosen_spanish_reading: Traducir la afirmación de manera directa, sin añadir explicaciones que atenúen la frase.
  alternative_spanish_readings:
  - no me corresponde concederlo aparte del Padre
  - no me corresponde darlo, salvo en armonía con el Padre
  rationale: La traducción preserva la tensión del pasaje tal como aparece en el original y en el audit trail inglés. No se inserta una glosa doctrinal para resolver la distinción entre la autoridad de Jesús y la preparación del Padre.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido metafórico de «mi copa»
  english_pob_reading: The 'cup' is a metaphor for the suffering or destiny appointed to Jesus, which his disciples will also share.
  chosen_spanish_reading: Mantener «mi copa» en el texto principal y explicar su valor metafórico en nota.
  alternative_spanish_readings:
  - mi sufrimiento
  - mi destino
  - mi cáliz
  rationale: El texto griego usa una metáfora que el inglés conserva. En español, «copa» mantiene la imagen sin convertirla prematuramente en explicación; la nota permite orientar al lector sin borrar la tensión semántica.
  doctrine_reference: 'POB lexical policy: preserve source imagery and document interpretive force in notes.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios posteriores al pass más reciente, y el resumen de control cruzado indica alto acuerdo sin observaciones pendientes. La redacción española mantiene el mismo sentido que el texto griego y el auditoría inglesa, sin añadir armonizaciones doctrinales.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como sujeto explícito para claridad narrativa.
  - Se conserva «copa» como metáfora central y se explica en nota, siguiendo la decisión inglesa.
  - Se evita «SEÑOR» y no se introduce una equivalencia litúrgica no requerida por el pasaje.
  - Se usa «Padre» con mayúscula por referencia directa a Dios, consistente con el registro bíblico en español.
  - Se respeta la relación espacial de honor con «a mi derecha y a mi izquierda» y se documenta la alternativa preposicional.
  - No se suaviza la frase sobre la prerrogativa de Jesús; la redacción conserva la tensión teológica del original.
