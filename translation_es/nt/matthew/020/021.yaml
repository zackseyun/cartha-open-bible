review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: pregunta directa, petición de colocación honorífica a la derecha e izquierda de Jesús, y referencia a su reino. Sin embargo, el rastro auditado del POB inglés documenta una tensión léxica en Εἰπὲ: aunque el griego es literalmente «di», la revisión inglesa adoptó «Command». En español, «Ordena» es aceptable, pero conviene preservar en nota la literalidad del verbo griego, ya que la justificación léxica misma reconoce que el verbo base es «decir».'
  spanish_quality_summary: El español es claro, natural y digno. «¿Qué quieres?» y «uno a tu derecha... uno a tu izquierda» son muy legibles. Las notas a y b son comprensibles, pero podrían alinearse mejor con la alternativa documentada del inglés («a tu derecha / a tu izquierda» frente a «a tu lado derecho / izquierdo»), que en español no añade mucho valor. La mejora más importante es introducir una nota para «Ordena» que explique la literalidad de «Di».
  glossary_alignment: No hay términos del glosario principal en disputa aquí, salvo βασιλεία, bien vertido como «reino» con nota sobre «reinado»/«realeza». No hay conflicto con Yahvé, Mesías/Cristo, Espíritu, etc. La decisión «Ordena» para Εἰπὲ no contradice el glosario del proyecto, pero sí requiere mejor transparencia frente a la base griega y al propio razonamiento auditado.
  issues:
  - severity: medium
    issue: Falta una nota en «Ordena» que preserve la literalidad de Εἰπὲ
    rationale: El griego usa el imperativo de λέγω, literalmente «di». Aunque el audit trail inglés terminó con «Command», también documentó expresamente la alternativa literal. En español conviene reflejar esa tensión para no oscurecer la base léxica.
  - severity: low
    issue: Las notas «a tu lado derecho/izquierdo» aportan poco como alternativas léxicas
    rationale: «A tu derecha / a tu izquierda» ya es la expresión española más natural y fiel. «A tu lado derecho/izquierdo» suena más pesado y no preserva mejor el griego. Las notas pueden usarse mejor para la decisión más debatible, «Ordena».
  revised_spanish_text: 'Y él le dijo: «¿Qué quieres?». Ella le dijo: «Ordena[a] que estos dos hijos míos se sienten, uno a tu derecha y uno a tu izquierda, en tu reino[b]».'
  revised_footnotes:
  - marker: a
    text: O «Di». El verbo griego es literalmente «di/decir»; «ordena» hace explícita la fuerza de la petición en este contexto.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «reinado» o «realeza».
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto base casi intacto, pero se simplifican las notas espaciales poco útiles y se añade una nota en «Ordena» para reflejar con mayor fidelidad la literalidad de Εἰπὲ y la justificación léxica del audit trail. También se ajusta la puntuación del discurso directo a un uso español más natural.
