translation:
  language: es
  text: 'Y él le dijo: «¿Qué quieres?». Ella le dijo: «Ordena[a] que estos dos hijos míos se sienten, uno a tu derecha y uno a tu izquierda, en tu reino[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Di». El verbo griego es literalmente «di/decir»; «ordena» hace explícita la fuerza de la petición en este contexto.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «reinado» o «realeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί θέλεις
  english_pob_choice: What do you want?
  chosen_spanish: ¿Qué quieres?
  alternatives_spanish:
  - ¿Qué deseas?
  - ¿Qué quieres pedir?
  lexicon: BDAG
  rationale: θέλω expresa aquí una petición directa; en español, «¿Qué quieres?» comunica de forma natural y sobria la misma pregunta sin añadir matices interpretativos.
- source_word: Εἰπὲ
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Di
  - Manda
  - Declara
  lexicon: BDAG
  rationale: Aunque el verbo griego es literalmente «decir», en este contexto la petición depende de que Jesús emita una disposición efectiva. «Ordena» conserva la fuerza pragmática que el audit trail inglés adoptó para no dejar la solicitud en un mero acto de habla.
- source_word: ἵνα καθίσωσιν
  english_pob_choice: that ... may sit
  chosen_spanish: que ... se sienten
  alternatives_spanish:
  - que ... puedan sentarse
  - que ... estén sentados
  lexicon: BDAG
  rationale: El ἵνα introduce el contenido de la petición. «Se sienten» es una forma natural y fiel del resultado pedido, sin convertirlo en pasivo innecesario.
- source_word: οὗτοι οἱ δύο υἱοί μου
  english_pob_choice: these two sons of mine
  chosen_spanish: estos dos hijos míos
  alternatives_spanish:
  - mis dos hijos
  - estos dos hijos de mí
  lexicon: BDAG
  rationale: El demostrativo οὗτοι se conserva con «estos» y μου con la relación posesiva natural «míos», manteniendo el énfasis personal del griego.
- source_word: εἷς ἐκ δεξιῶν σου
  english_pob_choice: one at your right
  chosen_spanish: uno a tu derecha
  alternatives_spanish:
  - uno a tu lado derecho
  - uno a tu derecha mano
  lexicon: BDAG
  rationale: La expresión idiomática señala posición de honor al lado derecho. «A tu derecha» es la formulación española más clara y equivalente, y la nota mantiene la alternativa espacial inglesa.
- source_word: εἷς ἐξ εὐωνύμων σου
  english_pob_choice: one at your left
  chosen_spanish: uno a tu izquierda
  alternatives_spanish:
  - uno a tu lado izquierdo
  lexicon: BDAG
  rationale: El paralelismo con «derecha» pide una equivalencia simétrica y natural. «A tu izquierda» comunica el sentido espacial sin sobreexplicar el eufemismo griego.
- source_word: ἐν τῇ βασιλείᾳ σου
  english_pob_choice: in your kingdom
  chosen_spanish: en tu reino
  alternatives_spanish:
  - en tu realeza
  - en tu reinado
  lexicon: BDAG
  rationale: βασιλεία puede abarcar reino o reinado; aquí la referencia a asientos de honor favorece «reino» como traducción más natural y tradicional en español, sin decidir la fase escatológica.
theological_decisions:
- issue: Lugar de honor en relación con el reino de Jesús
  english_pob_reading: Render spatially and royally as a request for places of honor 'in your kingdom' without specifying an earthly or heavenly phase of the kingdom.
  chosen_spanish_reading: Presentar la petición como puestos de honor «en tu reino», sin precisar si se trata de una fase terrenal, celestial o consumada.
  alternative_spanish_readings:
  - en tu reinado
  - en tu gobierno regio
  rationale: El texto griego solo ubica a los dos hijos a la derecha e izquierda de Jesús dentro de su βασιλεία. La traducción debe conservar esa tensión sin resolverla dogmáticamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés revisado: se mantuvo la fuerza imperativa de Εἰπὲ como una petición de autoridad («Ordena») y se conservaron las alternativas espaciales para derecha/izquierda y βασιλεία sin resolver la tensión teológica.'
  spanish_consistency_notes:
  - Se usó «reino» para βασιλεία por naturalidad y por coherencia con el registro bíblico en español, sin perder la posibilidad semántica de «reinado».
  - Se evitó «SEÑOR» para κύριος porque este versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
  - Se eligió «hijos» para υἱοί siguiendo el valor filial masculino explícito del griego.
