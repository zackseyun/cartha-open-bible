  text: ὁ δὲ εἶπεν αὐτῇ· Τί θέλεις; λέγει αὐτῷ· Εἰπὲ ἵνα καθίσωσιν οὗτοι οἱ δύο υἱοί μου εἷς ἐκ δεξιῶν ⸀σου καὶ εἷς ἐξ εὐωνύμων σου ἐν τῇ βασιλείᾳ σου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/020/021.yaml
  text: And he said to her[a], “What do you want?” She said to him, “Command that these two sons of mine may sit, one at your right and one at your left[c][b], in your kingdom.”
  footnotes:
  - marker: a
    text: Or “one on your right and one on your left.”
    reason: lexical_alternative
  - marker: b
    text: “Say” could be rendered “command” or, more interpretively, “grant,” but the Greek verb is simply “say.”
    reason: lexical_alternative
  - marker: c
    text: “Kingdom” may also be understood as “reign” or “royal rule.”
    reason: lexical_alternative
