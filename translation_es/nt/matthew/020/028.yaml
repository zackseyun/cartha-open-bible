translation:
  language: es
  text: Así como el Hijo del Hombre no vino para ser servido[a], sino para servir y para dar su vida como rescate por muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «como rescate en lugar de muchos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: Así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: BDAG
  rationale: La comparación abre la frase con fuerza correlativa; «Así como» es natural en español y conserva la relación con la enseñanza anterior sin endurecer el estilo.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su resonancia daniélica, tal como lo hace la POB en inglés, porque en español «el Hijo del Hombre» sigue siendo la forma más reconocible y fiel al valor titular.
- source_word: οὐκ ἦλθεν
  english_pob_choice: did not come
  chosen_spanish: no vino
  alternatives_spanish:
  - no ha venido
  - no llegó
  lexicon: BDAG
  rationale: El aoristo se vierte con pretérito simple en español. «Vino» expresa bien la entrada a la misión sin añadir matices de presente perfecto o movimiento local no explícitos.
- source_word: διακονηθῆναι
  english_pob_choice: to be served
  chosen_spanish: ser servido
  alternatives_spanish:
  - ser atendido
  - recibir servicio
  lexicon: BDAG
  rationale: Mantiene el contraste verbal con el infinitivo activo siguiente y conserva el sentido básico de recibir servicio, sin desplazarlo a un tono eclesiástico o interpretativo.
- source_word: ἀλλὰ διακονῆσαι
  english_pob_choice: but to serve
  chosen_spanish: sino para servir
  alternatives_spanish:
  - sino para ministrar
  - sino para atender
  lexicon: BDAG
  rationale: «Sino» reproduce el giro adversativo fuerte de ἀλλά tras la negación, y «para servir» mantiene la oposición con «ser servido» en un español natural.
- source_word: καὶ δοῦναι
  english_pob_choice: and to give
  chosen_spanish: y para dar
  alternatives_spanish:
  - y a dar
  - y entregar
  lexicon: BDAG
  rationale: El infinitivo coordinado se integra con el paralelismo anterior mediante «para», que en español clarifica la finalidad de la venida de Jesús sin alterar el contenido.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: BDAG
  rationale: En este contexto ψυχή se refiere a la vida entregada hasta la muerte; «su vida» comunica con precisión el sentido contextual y evita una lectura más abstracta de «alma».
- source_word: λύτρον
  english_pob_choice: a ransom
  chosen_spanish: como rescate
  alternatives_spanish:
  - como precio de rescate
  - como redención
  lexicon: BDAG
  rationale: «Rescate» transmite el valor de pago liberador de λύτρον en un español claro. Se conserva la metáfora económica/jurídica sin convertirla en paráfrasis doctrinal.
- source_word: ἀντὶ πολλῶν
  english_pob_choice: for many
  chosen_spanish: por muchos
  alternatives_spanish:
  - en lugar de muchos
  - en vez de muchos
  lexicon: BDAG
  rationale: «Por muchos» es la forma idiomática y tradicional en español para este dicho. Sin embargo, ἀντί puede tener fuerza de sustitución; por eso se documenta la alternativa más explícita sin imponerla en el texto principal.
theological_decisions:
- issue: Fuerza de ἀντί en la frase final del rescate
  english_pob_reading: Rendered idiomatically as 'for many' in the main text while preserving the more explicit substitutional nuance in a footnote.
  chosen_spanish_reading: «por muchos» en el texto principal, con nota que explicita «en lugar de muchos».
  alternative_spanish_readings:
  - en lugar de muchos
  - en vez de muchos
  rationale: El dicho de Jesús presenta su entrega en términos de rescate con una posible fuerza sustitutiva. En español, «por muchos» suena natural y no niega esa idea; la nota conserva la tensión semántica documentada por la POB inglesa y evita resolverla demasiado pronto.
  doctrine_reference: Conservar la tensión lexical y teológica; documentar alternativas significativas sin borrarlas.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios respecto de la versión aprobada; por ello, la traducción española sigue de cerca la decisión establecida y mantiene la nota léxica sobre ἀντί sin ampliarla indebidamente.
  spanish_consistency_notes:
  - «Hijo del Hombre» se mantiene como título fijo y reconocible, coherente con la tradición exegética y con la decisión inglesa documentada.
  - Se conserva «servido/servir» para reflejar el contraste verbal de διακονέω.
  - «Rescate» se usa para λύτρον en vez de un término eclesiástico como «redención» para respetar el matiz de precio pagado.
  - La nota al pie explicita la posible lectura sustitutiva de ἀντί, siguiendo el criterio auditado de no suavizar tensiones teológicas.
