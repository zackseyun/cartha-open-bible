review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: Jesús llama a los discípulos, afirma que saben cómo gobiernan los gobernantes de los gentiles, y mantiene el paralelismo entre κατακυριεύουσιν y κατεξουσιάζουσιν. También conserva correctamente «gentiles» para τῶν ἐθνῶν en línea con la decisión contextual auditada. La nota [a] para «las naciones» está bien fundada. La nota [b] también preserva las alternativas léxicas documentadas para οἱ μεγάλοι.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero hay dos ajustes menores de naturalidad y fidelidad idiomática. «Llamándolos a sí» suena algo calcado; en español natural y preciso, «llamándolos hacia sí» o «llamándolos a su lado» expresa mejor el valor medio. Además, el anclaje de la nota [b] está colocado tras «ellos», pero la nota explica «sus grandes hombres»; por disciplina editorial, debe anclarse en la frase relevante. El resto del verso es legible, y «se enseñorean de» aunque algo elevado, sigue siendo aceptable en registro bíblico moderno-digno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Jesús», «Dios» no aparecen aquí; «gentiles» concuerda con la decisión teológica auditada; no hay títulos mesiánicos ni nombres divinos en juego. La elección «grandes hombres» preserva el masculino plural según la racionalidad documentada. Se recomienda mantenerla con la nota léxica correspondiente correctamente anclada.
  issues:
  - severity: medium
    issue: «Llamándolos a sí» suena calco y no es la formulación española más natural para προσκαλεσάμενος.
    rationale: El participio medio indica que Jesús los atrae o llama hacia él antes de hablar. «Hacia sí» expresa mejor el movimiento relacional en español sin rigidez literalista.
  - severity: medium
    issue: La nota [b] está anclada al pronombre «ellos» en vez de a la frase «sus grandes hombres».
    rationale: La nota documenta alternativas de οἱ μεγάλοι, no de αὐτῶν. El marcador debe aparecer en el término o sintagma que la nota explica.
  revised_spanish_text: 'Pero Jesús[a], llamándolos hacia sí, les dijo: «Ustedes saben que los gobernantes de los gentiles se enseñorean de ellos, y sus grandes hombres[b] ejercen autoridad sobre ellos».'
  revised_footnotes:
  - marker: a
    text: O «los gobernantes de las naciones».
    reason: alternative_reading
  - marker: b
    text: O «sus grandes» o «sus altos funcionarios».
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad española de προσκαλεσάμενος («llamándolos hacia sí») y para corregir el anclaje de la nota [b], colocándola sobre la expresión que realmente comenta («sus grandes hombres»). No se alteró el sentido ni las decisiones léxicas principales del texto auditado.
