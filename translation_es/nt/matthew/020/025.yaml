translation:
  language: es
  text: 'Pero Jesús[a], llamándolos hacia sí, les dijo: «Ustedes saben que los gobernantes de los gentiles se enseñorean de ellos, y sus grandes hombres[b] ejercen autoridad sobre ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gobernantes de las naciones».
    reason: alternative_reading
  - marker: b
    text: O «sus grandes» o «sus altos funcionarios».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: calling them to himself
  chosen_spanish: llamándolos a sí
  alternatives_spanish:
  - llamándolos
  - haciéndolos llamar
  lexicon: BDAG
  rationale: El participio aoristo medio comunica que Jesús los llama hacia sí antes de hablar. «Llamándolos a sí» conserva ese matiz reflexivo sin sonar forzado en español.
- source_word: Οἴδατε
  english_pob_choice: You know
  chosen_spanish: Ustedes saben
  alternatives_spanish:
  - Saben
  - Ustedes conocen
  lexicon: BDAG
  rationale: οἶδα es perfecto en forma pero presente en sentido. En español, «saben» expresa naturalmente el valor presente e ինտenta mantener el tono directo de Jesús.
- source_word: ἄρχοντες
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - rulers
  - príncipes
  - líderes
  lexicon: BDAG
  rationale: ἄρχοντες se refiere a quienes gobiernan o rigen. «Gobernantes» es claro y neutral en español, y preserva el campo semántico político sin introducir un matiz nobiliario innecesario.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de las naciones
  lexicon: BDAG
  rationale: En este contexto judío, ἔθνη suele contrastar con Israel y apunta a los no judíos. «Gentiles» conserva ese uso contextual y coincide con la decisión auditada en inglés.
- source_word: κατακυριεύουσιν
  english_pob_choice: lord it over
  chosen_spanish: se enseñorean de
  alternatives_spanish:
  - dominan sobre
  - se imponen sobre
  lexicon: BDAG
  rationale: El verbo compuesto expresa dominio abusivo o señorial. «Se enseñorean de» transmite bien la fuerza pejorativa y el sentido de ejercicio tiránico de poder.
- source_word: οἱ μεγάλοι
  english_pob_choice: their great men
  chosen_spanish: sus grandes hombres
  alternatives_spanish:
  - sus grandes
  - sus altos funcionarios
  - las personas importantes de ellos
  lexicon: BDAG
  rationale: El adjetivo sustantivado está en masculino plural. «Sus grandes hombres» conserva la forma gramatical y el valor de personas prominentes; se mantiene una nota porque el referente puede abarcar autoridades o notables en sentido representativo.
- source_word: κατεξουσιάζουσιν
  english_pob_choice: exercise authority over
  chosen_spanish: ejercen autoridad sobre
  alternatives_spanish:
  - dominan sobre
  - hacen valer su autoridad sobre
  lexicon: BDAG
  rationale: El verbo significa ejercer autoridad, a menudo con tono opresivo. «Ejercen autoridad sobre» es fiel y natural; el matiz abusivo queda reforzado por el paralelo con «se enseñorean de».
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - esas gentes
  - los pueblos sometidos
  lexicon: BDAG
  rationale: El pronombre genitivo retoma a los sujetos gobernados. En español, repetir «ellos» mantiene la referencia directa y la paralelía del griego.
theological_decisions:
- issue: Renderizar ἐθνῶν en una enseñanza de contraste dentro del ámbito judío
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: En este dicho de Jesús, el contraste no es meramente geopolítico sino étnico-covenantal. «Gentiles» preserva esa lectura contextual sin ampliar innecesariamente el sentido a una abstracción de «naciones».
  doctrine_reference: Translation philosophy §1, §6
- issue: Mantener el matiz de poder abusivo en los verbos de gobierno
  english_pob_reading: lord it over / exercise authority over
  chosen_spanish_reading: se enseñorean de / ejercen autoridad sobre
  alternative_spanish_readings:
  - dominan sobre / gobiernan sobre
  - se imponen sobre / ejercen poder sobre
  rationale: El texto contrapone el estilo de gobierno de este mundo con el modo de los discípulos en el contexto inmediato. La traducción conserva la tensión entre autoridad legítima y uso opresivo del poder, sin suavizarla.
  doctrine_reference: Translation philosophy §4, §6
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la revisión auditada: no se requieren cambios sustanciales respecto del sentido griego ni de las decisiones inglesas. Se conservaron la lectura contextual de ἐθνῶν como «gentiles» y la fuerza peyorativa de los verbos compuestos de dominación.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponde al tetragrámaton; aquí no aplica.
  - Se preservó la distinción entre autoridad legítima y dominio abusivo mediante «se enseñorean de» y «ejercen autoridad sobre».
  - Se usó un español bíblico contemporáneo, no arcaizante, pero suficientemente solemne para lectura pública.
