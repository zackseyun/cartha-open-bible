  rationale: Se hizo una reparación menor para mejorar la naturalidad española de προσκαλεσάμενος («llamándolos hacia sí») y para corregir el anclaje de la nota [b], colocándola sobre la expresión que realmente comenta («sus grandes hombres»). No se alteró el sentido ni las decisiones léxicas principales del texto auditado.
