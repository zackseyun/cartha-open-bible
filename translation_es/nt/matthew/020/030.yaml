translation:
  language: es
  text: 'Y he aquí, dos ciegos, sentados junto al camino, al oír que Jesús pasaba, gritaron diciendo: «¡Señor, ten misericordia de nosotros, Hijo de David!»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: BDAG
  rationale: La partícula deíctica introduce vivacidad y llama la atención del lector; «he aquí» conserva ese valor discursivo con registro natural en español bíblico sin volverlo mecánico.
- source_word: τυφλοὶ
  english_pob_choice: blind men
  chosen_spanish: dos ciegos
  alternatives_spanish:
  - dos hombres ciegos
  - los ciegos
  lexicon: BDAG
  rationale: El griego masculino plural se refiere a dos individuos concretos; en español, «dos ciegos» es conciso, natural y mantiene la precisión referencial sin añadir peso interpretativo.
- source_word: καθήμενοι παρὰ τὴν ὁδόν
  english_pob_choice: sitting by the road
  chosen_spanish: sentados junto al camino
  alternatives_spanish:
  - sentados al borde del camino
  - sentados junto a la carretera
  lexicon: BDAG
  rationale: «Junto al camino» transmite el cuadro espacial con naturalidad; «camino» conserva mejor el matiz narrativo de ὁδός que una traducción más técnica como «carretera».
- source_word: ἀκούσαντες ὅτι Ἰησοῦς παράγει
  english_pob_choice: when they heard that Jesus was passing by
  chosen_spanish: al oír que Jesús pasaba
  alternatives_spanish:
  - cuando oyeron que Jesús pasaba
  - habiendo oído que Jesús pasaba
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente; «al oír» expresa esa relación con naturalidad en español. «Pasaba» reproduce bien el sentido de παράγει en este contexto de tránsito.
- source_word: ἔκραξαν
  english_pob_choice: cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - exclamaron
  lexicon: BDAG
  rationale: El verbo κράζω implica un clamor fuerte; «gritaron» comunica la intensidad de forma clara en español. «Clamaron» también sería posible, pero es menos directo para esta escena.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: Se conserva «Señor» por el valor reverencial y porque la guía doctrinal del proyecto asigna a κύριος este equivalente por defecto, especialmente en un ruego dirigido a Jesús.
- source_word: ἐλέησον ἡμᾶς
  english_pob_choice: have mercy on us
  chosen_spanish: ten misericordia de nosotros
  alternatives_spanish:
  - apiádate de nosotros
  - muéstranos misericordia
  lexicon: BDAG
  rationale: «Ten misericordia de nosotros» es la formulación más idiomática y fiel para la petición imperativa de compasión. Mantiene el peso súplice del aoristo imperativo sin suavizarlo.
- source_word: υἱὸς Δαυίδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - descendiente de David
  lexicon: BDAG
  rationale: Se conserva el título mesiánico reconocido en Mateo. «Hijo de David» preserva la resonancia bíblica y no reduce la expresión a una mera genealogía.
theological_decisions:
- issue: Tratamiento de κύριος en el ruego a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  rationale: La decisión mantiene el valor reverencial y cristológico potencial del vocativo sin desplazarlo hacia «Maestro», que debilitaría el peso devocional del clamor. La elección sigue la guía doctrinal del POB para κύριος.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: Preservación del título mesiánico υἱὸς Δαυίδ
  english_pob_reading: Son of David
  chosen_spanish_reading: Hijo de David
  alternative_spanish_readings:
  - descendiente de David
  rationale: El título se conserva de forma literal porque en Mateo funciona como apelación mesiánica, no solo como descripción genealógica. «Hijo de David» mantiene esa carga intertextual y mesiánica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; no hubo correcciones de fondo. La presente redacción española sigue esa lectura estable y procura reflejar tanto la sintaxis narrativa como la fuerza del clamor sin añadir explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se conservó el vocativo «Señor» para κύριος conforme a la política terminológica del proyecto.
  - Se eligió «Hijo de David» para preservar el título mesiánico reconocido en Mateo.
  - «Camino» se usó para ὁδός por ser más natural y menos técnico que alternativas como «sendero» o «carretera».
  - No se añadieron notas textuales porque no hay variante relevante en el paquete fuente ni en el audit trail inglés.
