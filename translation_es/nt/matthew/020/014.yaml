translation:
  language: es
  text: Toma lo que es tuyo y vete. Pero yo quiero dar a este último obrero[a] lo mismo que a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a este último lo mismo que a ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἆρον
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  - Lleva
  lexicon: BDAG
  rationale: El imperativo aoristo de αἴρω aquí funciona como una orden para que el trabajador tome lo que le corresponde y se retire. «Toma» conserva la concisión y la inmediatez del mandato sin introducir matices ajenos.
- source_word: τὸ σὸν
  english_pob_choice: what is yours
  chosen_spanish: lo que es tuyo
  alternatives_spanish:
  - lo tuyo
  - tu propio pago
  lexicon: BDAG
  rationale: La frase neutra posesiva se entiende naturalmente en español como «lo que es tuyo». Mantiene la amplitud semántica del griego sin especificar «pago» más allá de lo que el texto dice.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - ponte en camino
  lexicon: BDAG
  rationale: En contexto, el imperativo funciona como despedida. «Vete» transmite con naturalidad el movimiento de salida implícito en el griego, sin volverlo más hostil de lo que exige la fuente.
- source_word: θέλω δὲ
  english_pob_choice: But I want
  chosen_spanish: Pero yo quiero
  alternatives_spanish:
  - Pero deseo
  - Y yo quiero
  lexicon: BDAG
  rationale: θέλω expresa voluntad o intención. «Yo quiero» refleja esa intención de forma directa; el pronombre explícito ayuda a marcar el contraste con la instrucción anterior.
- source_word: τούτῳ τῷ ἐσχάτῳ
  english_pob_choice: to this last man
  chosen_spanish: a este último
  alternatives_spanish:
  - a este último hombre
  - a este último obrero
  lexicon: BDAG
  rationale: El dativo con el demostrativo y ἐσχάτῳ señala al que llega o queda al final. En español, «este último» es natural y suficientemente personal en el contexto de la parábola; evita añadir «hombre» u «obrero» cuando el griego no los explicita aquí.
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - pagar
  lexicon: BDAG
  rationale: El infinitivo de δίδωμι es «dar». Aunque el contexto es salarial, «dar» preserva la libertad del dueño al conceder, sin reducir el verbo a la sola idea de pagar.
- source_word: ὡς καὶ σοί
  english_pob_choice: the same as to you
  chosen_spanish: lo mismo que a ti
  alternatives_spanish:
  - así como a ti
  - igual que a ti
  lexicon: BDAG
  rationale: La comparación indica igualdad de trato. «Lo mismo que a ti» comunica con claridad esa equivalencia en español actual.
theological_decisions:
- issue: Referencia masculina singular en el último trabajador
  english_pob_reading: this last man
  chosen_spanish_reading: este último
  alternative_spanish_readings:
  - este último hombre
  - este último obrero
  rationale: El griego usa formas masculinas singulares para un individuo concreto de la parábola, pero en español la referencia personal queda clara en el contexto sin necesidad de añadir un sustantivo genérico. Se evita sobreespecificar cuando la fuente no lo hace.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al texto mediante [a] y manteniendo una sola nota con marcador único presente exactamente en la traducción.
  spanish_consistency_notes:
  - Se mantuvo un estilo moderno y digno, sin calco rígido.
  - «Toma» y «vete» reproducen la fuerza imperativa breve del griego.
  - «Lo mismo que a ti» conserva la comparación de igualdad sin añadir especificaciones salariales inexistentes en la cláusula.
  - Se evitó «Señor»/«SEÑOR» porque el pasaje no contiene el nombre divino.
  - Se preservó la referencia personal del último trabajador sin neutralizar innecesariamente el masculino singular del contexto.
