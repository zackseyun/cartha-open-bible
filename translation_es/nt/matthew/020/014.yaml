revisions:
- from: Toma lo que es tuyo y vete. Pero yo quiero dar a este último[a] lo mismo que a ti.
  to: Toma lo que es tuyo y vete. Pero yo quiero dar a este último obrero[a] lo mismo que a ti.
  rationale: Se revisa 'este último' a 'este último obrero' para preservar mejor en español la decisión auditada del POB de mantener un referente masculino singular personal ('this last man'), a la vez que se conserva una lectura natural y contextual dentro de la parábola de los trabajadores. La nota alternativa retiene la opción más breve y cercana al griego.
