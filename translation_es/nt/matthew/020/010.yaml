translation:
  language: es
  text: Cuando vinieron los primeros[a], pensaron que recibirían más; pero ellos también recibieron un denario[b] cada uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los primeros’; la expresión se refiere al grupo de obreros contratados primero en la parábola.
    reason: lexical_alternative
  - marker: b
    text: Un denario era un salario diario común para un trabajador.
    reason: cultural_note
lexical_decisions:
- source_word: ἐλθόντες
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - habiendo venido
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente, equivalente a 'cuando ... came'. En español, 'vinieron' mantiene la secuencia narrativa de manera natural y fiel al valor temporal del participio.
- source_word: οἱ πρῶτοι
  english_pob_choice: the first ones
  chosen_spanish: los primeros
  alternatives_spanish:
  - el primero
  - los que fueron primero
  lexicon: BDAG
  rationale: La frase se refiere al primer grupo de obreros en la parábola. 'Los primeros' conserva el plural y evita una lectura abstracta o singular.
- source_word: ἐνόμισαν
  english_pob_choice: they thought
  chosen_spanish: pensaron
  alternatives_spanish:
  - supusieron
  - se imaginaron
  lexicon: BDAG
  rationale: Aquí νομίζω expresa expectativa o suposición. 'Pensaron' es idiomático en español y no añade certeza que el griego no exige.
- source_word: πλεῖον
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - algo más
  - una cantidad mayor
  lexicon: BDAG
  rationale: El comparativo neutro funciona como adverbio/substantivo para una paga mayor. 'Más' reproduce con concisión la expectativa de recibir una cantidad superior.
- source_word: λήμψονται
  english_pob_choice: they would receive
  chosen_spanish: recibirían
  alternatives_spanish:
  - van a recibir
  - iban a recibir
  lexicon: BDAG
  rationale: El futuro en discurso indirecto después de un verbo pasado se expresa naturalmente en español con condicional. 'Recibirían' refleja la expectativa desde el punto de vista narrativo.
- source_word: τὸ ἀνὰ δηνάριον
  english_pob_choice: a denarius each
  chosen_spanish: un denario cada uno
  alternatives_spanish:
  - el denario por cabeza
  - un denario por cada uno
  lexicon: BDAG
  rationale: ἀνά con acusativo tiene sentido distributivo. 'Un denario cada uno' expresa de forma clara y natural la distribución individual del pago.
- source_word: καὶ αὐτοί
  english_pob_choice: they too
  chosen_spanish: ellos también
  alternatives_spanish:
  - también ellos
  - incluso ellos
  lexicon: BDAG
  rationale: La partícula enfática subraya la igualdad inesperada del pago. 'Ellos también' conserva ese énfasis de manera directa en español.
theological_decisions:
- issue: Énfasis narrativo en la igualdad del salario
  english_pob_reading: they too received a denarius each
  chosen_spanish_reading: pero ellos también recibieron un denario cada uno
  alternative_spanish_readings:
  - pero también ellos recibieron un denario
  - y ellos recibieron también un denario
  rationale: 'No hay carga doctrinal añadida, pero el orden y el ''también'' preservan el contraste narrativo del griego: los primeros reciben lo mismo que los demás, sorpresa central de la parábola.'
  doctrine_reference: Mateo 20:1-16; tema narrativo de la gracia soberana en la parábola de los obreros de la viña
translation_notes:
  revision_awareness: Se conservó el valor temporal del participio ἐλθόντες con una estructura natural en español; no se introdujeron cambios respecto al sentido base del texto griego y del audit trail inglés. La distribución de ἀνά + acusativo se resolvió con 'cada uno' para reflejar el sentido distributivo sin añadir explicación al cuerpo del versículo.
  spanish_consistency_notes:
  - Se usa 'denario' de manera consistente con el valor cultural y monetario indicado por el audit trail inglés.
  - Se mantiene 'ellos también' para conservar el matiz enfático de καὶ αὐτοί.
  - El plural 'los primeros' evita ambigüedad y sigue la referencia al grupo de trabajadores en la parábola.
