translation:
  language: es
  text: Ellos se fueron. Saliendo de nuevo cerca de la hora sexta y de la novena[a], hizo lo mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, cerca del mediodía y de las tres de la tarde según el cómputo judío.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ ἀπῆλθον
  english_pob_choice: So they went away
  chosen_spanish: Ellos se fueron
  alternatives_spanish:
  - Y se fueron
  - Entonces se fueron
  - Se fueron
  lexicon: BDAG
  rationale: οἱ retoma a los obreros mencionados antes, y δὲ aporta una conexión suave; en español, la secuencia simple «Ellos se fueron» comunica bien el movimiento narrativo sin sobrecargar con un conector más fuerte de lo que exige el griego.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: πάλιν expresa repetición. «De nuevo» es natural en español y conserva el valor repetitivo de manera directa.
- source_word: ἐξελθὼν
  english_pob_choice: Going out
  chosen_spanish: Saliendo
  alternatives_spanish:
  - Al salir
  - Después de salir
  - Cuando salió
  lexicon: BDAG
  rationale: El participio aoristo mantiene la idea de acción concomitante o sucesiva en la narración. «Saliendo» conserva la estructura participial sin convertirla en una subordinada más interpretativa.
- source_word: περὶ ἕκτην καὶ ἐνάτην ὥραν
  english_pob_choice: about the sixth and ninth hour
  chosen_spanish: cerca de la hora sexta y la novena
  alternatives_spanish:
  - alrededor de la hora sexta y la novena
  - cerca de la sexta y novena hora
  - aproximadamente al mediodía y a las tres de la tarde
  lexicon: BDAG
  rationale: περὶ pide aproximación, por eso «cerca de». Mantener «hora sexta y la novena» conserva la forma cultural/judía del original, en lugar de reemplazarla por equivalentes modernos en el texto principal.
- source_word: ἐποίησεν
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - procedió igual
  - actuó igual
  - hizo lo mismo
  lexicon: BDAG
  rationale: ποιέω aquí es verbalmente ligero y toma su contenido de ὡσαύτως. «Hizo» mantiene la concisión y permite que la comparación recaiga en la frase final.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: lo mismo
  alternatives_spanish:
  - igualmente
  - de la misma manera
  - asimismo
  lexicon: BDAG
  rationale: ὡσαύτως significa «de la misma manera / igualmente». En español, «hizo lo mismo» integra el sentido comparativo de forma natural y comunica bien la repetición de la acción en este contexto narrativo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no requieren revisión sustantiva; la opción española conserva la secuencia narrativa, la aproximación temporal de περὶ y la referencia cultural de las horas judías mediante nota.
  spanish_consistency_notes:
  - Se mantiene «hora sexta y la novena» en el texto principal para respetar la expresión cultural del original.
  - La nota aclara el valor aproximado de las horas sin sustituir el giro fuente en el cuerpo del versículo.
  - «Saliendo» conserva el participio griego sin forzar una subordinación temporal que el texto no explicita.
