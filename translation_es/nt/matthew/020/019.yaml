translation:
  language: es
  text: y lo entregarán a los gentiles para burlarse de él, azotar y crucificar, y al tercer día será resucitado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será levantado». El verbo griego está en voz pasiva, una expresión común de resurrección que puede implicar la acción de Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: παραδώσουσιν
  english_pob_choice: will hand ... over
  chosen_spanish: lo entregarán
  alternatives_spanish:
  - lo pondrán en manos de
  - lo entregarán en poder de
  lexicon: BDAG
  rationale: παραδίδωμι expresa la idea de entregar a alguien al poder de otros. «Lo entregarán» es natural en español y conserva la noción de transferencia a autoridades hostiles sin añadir el matiz más específico de «traicionar».
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  - a los paganos
  lexicon: BDAG
  rationale: En este anuncio de la pasión, ἔθνη apunta a no judíos concretos en el marco narrativo. «Gentiles» es preciso y ya funciona en español eclesial.
- source_word: ἐμπαῖξαι
  english_pob_choice: to mock
  chosen_spanish: burlarse
  alternatives_spanish:
  - escarnecer
  - ridiculizar
  lexicon: BDAG
  rationale: El infinitivo articular con εἰς indica propósito. «Burlarse» comunica bien el acto de desprecio y es idiomático en español; «escarnecer» sería más tradicional, pero menos transparente para lectores modernos.
- source_word: μαστιγῶσαι
  english_pob_choice: flog
  chosen_spanish: azotar
  alternatives_spanish:
  - flagelar
  - dar latigazos
  lexicon: BDAG
  rationale: «Azotar» es el equivalente natural en español para castigo judicial con látigo. Conserva la dureza del verbo griego sin sonar técnico o arcaico.
- source_word: σταυρῶσαι
  english_pob_choice: crucify
  chosen_spanish: crucificar
  alternatives_spanish:
  - ejecutar por crucifixión
  lexicon: BDAG
  rationale: El verbo significa directamente «crucificar». Se mantiene el infinitivo coordinado sin agregar un objeto explícito, igual que la revisión inglesa que eliminó la repetición innecesaria.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - a los tres días
  lexicon: BDAG
  rationale: La expresión temporal dativa se vierte con la locución española natural «al tercer día», que preserva la referencia temporal sin forzar una estructura más literal.
- source_word: ἐγερθήσεται
  english_pob_choice: he will be raised
  chosen_spanish: será resucitado
  alternatives_spanish:
  - será levantado
  - resucitará
  lexicon: BDAG
  rationale: El futuro pasivo de ἐγείρω en contextos de resurrección puede reflejar acción divina; «será resucitado» conserva ese pasivo y la tensión teológica mejor que «resucitará», que suena más activo.
theological_decisions:
- issue: Voz pasiva en la resurrección
  english_pob_reading: he will be raised
  chosen_spanish_reading: será resucitado
  alternative_spanish_readings:
  - resucitará
  - será levantado
  rationale: Se preserva el pasivo del griego como una forma de resonar con la acción de Dios en la resurrección, sin negar la agencia propia de Jesús. La formulación mantiene la tensión documentada por la POB inglesa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del texto fuente al no repetir un objeto explícito con «crucificar», porque el griego tampoco lo repite. También respeta la preferencia auditable de la POB por conservar la voz pasiva en la referencia a la resurrección.
  spanish_consistency_notes:
  - Se usa «gentiles» para ἔθνη conforme al contexto judío de la pasión.
  - Se evita «Cristo» porque este versículo no lo requiere como forma fija ni nombre propio; la escena habla del sujeto tácito de la predicción.
  - «Azotar» se prefiere a «flagelar» por claridad moderna, manteniendo la fuerza judicial del término.
  - La nota de pie de página se ancla solo en «resucitado», donde aparece la alternativa de voz activa/pasiva.
