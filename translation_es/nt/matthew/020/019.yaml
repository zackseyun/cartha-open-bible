revisions:
- from: y lo entregarán a los gentiles para burlarse y azotar[a] y crucificar, y al tercer día será resucitado.
  to: y lo entregarán a los gentiles para burlarse de él, azotar y crucificar, y al tercer día será resucitado[a].
  rationale: Se corrige «para burlarse» a «para burlarse de él» para expresar con fidelidad el objeto implícito del griego y producir un español natural. Se reubica la nota [a] a «será resucitado», que es donde pertenece la alternativa sobre el pasivo de ἐγερθήσεται. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:15:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: «lo entregarán» para παραδώσουσιν, «a los gentiles» para τοῖς ἔθνεσιν, la secuencia de propósitos con infinitivos y el pasivo de ἐγερθήσεται. Sin embargo, «para burlarse» no preserva fielmente el objeto implícito del infinitivo ἐμπαῖξαι; en español significa que los gentiles se burlan de sí mismos o simplemente ''se divierten'', cuando el sentido es que se burlen de él. Además, la nota al pie está mal anclada: la nota sobre ἐγερθήσεται aparece en «azotar» en vez de en la frase de resurrección.'
  spanish_quality_summary: El texto es mayormente claro y natural, pero «para burlarse y azotar y crucificar» suena gramaticalmente incompleto en español por el primer infinitivo pronominal sin complemento expreso. «Burlarse de él» restaura claridad y lectura natural. «Será resucitado» es comprensible y preserva la voz pasiva, aunque algo menos idiomático que «será levantado»; dado el razonamiento POB, puede mantenerse. La puntuación general es adecuada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Gentiles» concuerda con la decisión auditada. La preservación del pasivo en «será resucitado» sigue la decisión teológica inglesa. El problema principal es léxico-sintáctico con ἐμπαῖξαι y la colocación de la nota.
  issues:
  - severity: high
    issue: «para burlarse» no expresa correctamente ἐμπαῖξαι
    rationale: El griego significa 'burlarse de él' / 'ridiculizarlo'. En español, «burlarse» normalmente requiere complemento con «de» para expresar el objeto; sin ello, el sentido queda incompleto o ambiguo.
  - severity: high
    issue: La nota [a] está anclada en «azotar» pero explica ἐγερθήσεται
    rationale: Las instrucciones exigen que cada nota aparezca en el lugar pertinente dentro de `spanish_text`. La nota alternativa sobre «será levantado» debe marcar la frase de resurrección, no un verbo anterior.
  - severity: medium
    issue: La decisión léxica para ἐμπαῖξαι debería ajustarse
    rationale: Si el texto revisado usa «burlarse de él» o «burlarse de él», la explicación actual de «burlarse» sin complemento ya no describe con precisión la solución española necesaria para fidelidad y naturalidad.
  revised_spanish_text: y lo entregarán a los gentiles para burlarse de él, azotar y crucificar, y al tercer día será resucitado[a].
  revised_footnotes:
  - marker: a
    text: 'O: «será levantado». El verbo griego está en voz pasiva, una expresión común de resurrección que puede implicar la acción de Dios.'
    reason: alternative_reading
  revision_rationale: Se corrige «para burlarse» a «para burlarse de él» para expresar con fidelidad el objeto implícito del griego y producir un español natural. Se reubica la nota [a] a «será resucitado», que es donde pertenece la alternativa sobre el pasivo de ἐγερθήσεται. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
