translation:
  language: es
  text: 'diciendo[a]: «Estos últimos trabajaron una hora, y los hiciste iguales a nosotros que soportamos la carga del día y el calor abrasador».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los trataste como iguales a nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  lexicon: BDAG
  rationale: El participio presente nominativo plural sigue el flujo narrativo de la cláusula anterior; «diciendo» preserva esa relación participial sin forzar un verbo finito innecesario.
- source_word: Οὗτοι οἱ ἔσχατοι
  english_pob_choice: These last
  chosen_spanish: Estos últimos
  alternatives_spanish:
  - Estos de los últimos
  - Estos que llegaron al final
  lexicon: BDAG
  rationale: «ἔσχατοι» se refiere a los trabajadores contratados al final. «Estos últimos» conserva el contraste con los demás y suena natural en español.
- source_word: μίαν ὥραν ἐποίησαν
  english_pob_choice: worked one hour
  chosen_spanish: trabajaron una hora
  alternatives_spanish:
  - hicieron una hora
  - estuvieron trabajando una hora
  lexicon: BDAG
  rationale: En este contexto, ποιέω con una expresión de tiempo expresa el tiempo empleado trabajando. «Trabajaron una hora» transmite el sentido idiomático con naturalidad.
- source_word: ἴσους ... ἐποίησας
  english_pob_choice: you made them equal to us
  chosen_spanish: los hiciste iguales a nosotros
  alternatives_spanish:
  - los trataste como iguales a nosotros
  - los hiciste equivalentes a nosotros
  lexicon: BDAG
  rationale: La construcción significa hacer a alguien igual a otro. «Los hiciste iguales a nosotros» mantiene la queja de manera directa y fiel al griego.
- source_word: τοῖς βαστάσασι
  english_pob_choice: who bore
  chosen_spanish: que soportamos
  alternatives_spanish:
  - que llevamos
  - que cargamos
  lexicon: BDAG
  rationale: βαστάζω puede significar llevar, cargar o soportar. En el contexto laboral, «soportamos» comunica la idea de cargar una fatiga o peso, no solo transportar algo físicamente.
- source_word: τὸ βάρος τῆς ἡμέρας
  english_pob_choice: the burden of the day
  chosen_spanish: la carga del día
  alternatives_spanish:
  - el peso del día
  - el trabajo del día
  lexicon: BDAG
  rationale: βάρος es literalmente peso/carga; aquí es la pesada jornada de trabajo. «La carga del día» conserva la imagen y funciona bien en español.
- source_word: τὸν καύσωνα
  english_pob_choice: the scorching heat
  chosen_spanish: el calor abrasador
  alternatives_spanish:
  - el calor sofocante
  - el ardor del sol
  lexicon: BDAG
  rationale: καύσων denota un calor opresivo y ardiente. «Calor abrasador» comunica con precisión la intensidad sin exagerar ni suavizar el término.
theological_decisions:
- issue: Queja de los obreros sobre igualdad y trato justo en la parábola
  english_pob_reading: Render the workers' protest straightforwardly without importing theological interpretation about divine justice into the translation.
  chosen_spanish_reading: Presentar la protesta de los obreros de forma directa, sin añadir una interpretación que resuelva la tensión de la parábola.
  alternative_spanish_readings:
  - Traducir de modo interpretativo para subrayar la injusticia percibida
  - Suavizar la queja para armonizarla con el punto teológico de la parábola
  rationale: El versículo registra la queja de los trabajadores; la traducción debe conservar su fuerza y la tensión narrativa sin resolverla en el propio texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El control de revisión en inglés eliminó solo una coma antes de la cláusula relativa para hacer más fluido el estilo; en español se mantuvo una estructura igualmente natural sin alterar el sentido. La solución española sigue de cerca el griego y conserva la protesta de los obreros sin interpretarla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «trabajaron» para ποιέω en una expresión de tiempo, siguiendo el valor idiomático contextual.
  - Se evitó «siervos» o «criados» porque no corresponde al léxico de δοῦλος en este pasaje; el texto trata de jornaleros, no de esclavitud.
  - «Calor abrasador» preserva el matiz intensivo de καύσων y evita reducirlo a un calor genérico.
  - La nota al pie se ancla en «iguales» para conservar la alternativa semántica reconocida por el audit trail inglés.
