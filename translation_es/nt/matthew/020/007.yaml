translation:
  language: es
  text: 'Le dijeron[a]: «Porque nadie nos ha contratado». Les dice: «Vayan ustedes también a la viña».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa presente histórico en las dos réplicas («dicen» / «dice»). En español puede traducirse con pasado para mayor fluidez narrativa; aquí se traduce la primera con pasado y se conserva el presente en la segunda para reflejar la vivacidad del relato.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  english_pob_choice: They said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dicen
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo fluido resulta natural el pasado. Mantengo el cambio de perspectiva del discurso directo sin volverlo rígido.
- source_word: Ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Que
  lexicon: BDAG
  rationale: Aquí introduce la razón de su respuesta; «porque» conserva mejor el valor explicativo que un simple «que».
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: «Nadie» es el equivalente natural y claro en español para la negación indefinida personal.
- source_word: ἐμισθώσατο
  english_pob_choice: has hired
  chosen_spanish: ha contratado
  alternatives_spanish:
  - ha alquilado
  - ha empleado
  lexicon: BDAG
  rationale: El verbo se refiere a contratar para trabajo. «Ha contratado» comunica bien la acción con resultado vigente; «empleado» suena más técnico y «alquilado» no encaja en español.
- source_word: λέγει
  english_pob_choice: He says
  chosen_spanish: Él les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Conservo el presente histórico en la segunda réplica para reflejar el cambio aspectual del griego y mantener la vivacidad narrativa.
- source_word: Ὑπάγετε
  english_pob_choice: go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan allá
  - Vayan ustedes
  lexicon: BDAG
  rationale: Imperativo plural natural en español. «Vayan» reproduce el mandato directo sin añadir matices ajenos.
- source_word: καὶ ὑμεῖς
  english_pob_choice: You also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes igual
  lexicon: BDAG
  rationale: La colocación «ustedes también» preserva la inclusión enfática del grupo en español de forma idiomática.
- source_word: ἀμπελῶνα
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  lexicon: BDAG
  rationale: «Viña» es el equivalente bíblico más directo y natural para ἀμπελῶνα. «Viñedo» puede sugerir un término agrícola más técnico en español moderno.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje griego directamente y toma en cuenta el audit trail inglés: se conserva la explicación causal de Ὅτι, la inclusión enfática de καὶ ὑμεῖς y el valor narrativo del presente histórico. No se adopta «SEÑOR» ni terminología eclesiástica añadida porque el texto no lo requiere.'
  spanish_consistency_notes:
  - Se usa «viña» para ἀμπελῶνα, coherente con el uso bíblico habitual y con el sentido agrícola del contexto.
  - Se mantiene la alternancia de tiempos verbales en el discurso directo para respetar el efecto del original griego.
  - «Ha contratado» evita una traducción demasiado mecánica y expresa adecuadamente la acción de emplear para trabajo.
