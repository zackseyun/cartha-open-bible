translation:
  language: es
  text: Miren[a], vamos subiendo a Jerusalén, y el Hijo del Hombre[b] será entregado[c] a los sumos sacerdotes y escribas, y lo condenarán a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He aquí».
    reason: lexical_alternative
  - marker: b
    text: «Hijo del Hombre» es la autodesignación característica de Jesús y puede evocar Daniel 7:13–14.
    reason: cross_reference
  - marker: c
    text: O «será entregado en manos de»; el verbo también puede traducirse «será traicionado» en un contexto más específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - Miren
  - ¡Miren aquí!
  - He aquí
  lexicon: BDAG
  rationale: El marcador llama la atención de los oyentes; en español, "¡Miren!" conserva esa fuerza discursiva de manera natural y pública. "He aquí" sería más tradicional, pero más marcado y menos idiomático para el registro objetivo.
- source_word: ἀναβαίνομεν
  english_pob_choice: we are going up
  chosen_spanish: Vamos subiendo
  alternatives_spanish:
  - Vamos
  - Subimos
  - Estamos subiendo
  lexicon: BDAG
  rationale: El presente con movimiento hacia Jerusalén expresa un avance en curso. "Vamos subiendo" conserva el matiz progresivo y la idea convencional de ascenso a Jerusalén sin sonar forzado.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se mantiene el título tradicional y textual del dicho de Jesús. En español, esta forma conserva mejor la resonancia bíblica y la posible alusión a Daniel 7:13–14 que una paráfrasis como "el Hombre" o "el ser humano".
- source_word: παραδοθήσεται
  english_pob_choice: will be handed over
  chosen_spanish: será entregado
  alternatives_spanish:
  - será entregado en manos de
  - será traicionado
  lexicon: BDAG
  rationale: '"Ser entregado" reproduce bien la voz pasiva futura y el sentido amplio de quedar en poder de otros. "Ser traicionado" sería demasiado específico para este versículo, pues el griego no nombra aquí al agente ni reduce el acto a la traición de Judas.'
- source_word: τοῖς ἀρχιερεῦσιν
  english_pob_choice: to the chief priests
  chosen_spanish: a los sumos sacerdotes
  alternatives_spanish:
  - a los principales sacerdotes
  - a los jefes de los sacerdotes
  lexicon: BDAG
  rationale: '"Sumos sacerdotes" es la equivalencia natural en español para el plural de los líderes sacerdotales. "Principales sacerdotes" también es posible, pero menos estable en el uso bíblico en español.'
- source_word: γραμματεῦσιν
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la Ley
  - doctores de la ley
  lexicon: BDAG
  rationale: '"Escribas" corresponde directamente al término griego y preserva la identificación del grupo sin interpretarlo como función pedagógica específica.'
- source_word: κατακρινοῦσιν
  english_pob_choice: they will condemn
  chosen_spanish: lo condenarán
  alternatives_spanish:
  - lo sentenciarán
  - lo declararán culpable
  lexicon: BDAG
  rationale: El verbo expresa juicio adverso en contexto judicial. "Condenarán" es la forma más natural y precisa en español para esa acción legal.
- source_word: θανάτῳ
  english_pob_choice: to death
  chosen_spanish: a muerte
  alternatives_spanish:
  - para muerte
  - hasta la muerte
  lexicon: BDAG
  rationale: La construcción española "condenar a muerte" reproduce de forma idiomática el resultado punitivo del dativo griego.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hombre
  - el Ser Humano
  rationale: Se conserva el título cristológico tradicional para no diluir su carga bíblica y su posible eco daniélico. La traducción mantiene la tensión entre auto-designación de Jesús y título apocalíptico sin explicarla en el texto principal.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de παραδοθήσεται
  english_pob_reading: will be handed over
  chosen_spanish_reading: será entregado
  alternative_spanish_readings:
  - será traicionado
  - será entregado en manos de ellos
  rationale: La forma pasiva conserva el énfasis en que Jesús será puesto en poder de sus adversarios. No se adelanta la especificación narrativa de la traición, que el versículo no menciona explícitamente.
  doctrine_reference: Translation philosophy §1; §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura inglesa auditada y el griego: mantiene el marcador de atención Ἰδοὺ, el presente progresivo ἀναβαίνομεν, el pasivo futuro παραδοθήσεται, y el futuro de condena κατακρινοῦσιν. No se aplicaron revisiones posteriores al texto base; el estado de revisión más reciente indica acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando el texto base contiene el nombre divino; aquí no aparece.
  - Se preserva «el Hijo del Hombre» como título fijo, no como descripción genérica.
  - «Ser entregado» se mantiene amplio y no se sustituye por «ser traicionado».
  - «Escribas» se conserva como término técnico bíblico coherente con el resto del proyecto.
  - 'La puntuación sigue el español: exclamación inicial y coma antes de la oración principal.'
