translation:
  language: es
  text: 'Cuando llegó la tarde, el dueño[a] de la viña dijo[b] a su mayordomo: «Llama a los trabajadores y págales su jornal, comenzando por los últimos hasta los primeros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el propietario de la viña».
    reason: lexical_alternative
  - marker: b
    text: El griego usa el presente histórico «dice», una forma vívida de narración; el español suele naturalizarlo como pasado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψίας δὲ γενομένης
  english_pob_choice: When evening came
  chosen_spanish: Cuando llegó la tarde
  alternatives_spanish:
  - Al caer la tarde
  - Cuando anochecía
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca un cambio temporal; «Cuando llegó la tarde» comunica de forma natural ese tránsito en español sin perder el valor temporal del griego.
- source_word: ὁ κύριος τοῦ ἀμπελῶνος
  english_pob_choice: the master of the vineyard
  chosen_spanish: el dueño de la viña
  alternatives_spanish:
  - el señor de la viña
  - el propietario de la viña
  lexicon: BDAG
  rationale: En esta parábola κύριος designa al propietario humano del viñedo, no un título divino. «Dueño» expresa posesión y autoridad en español de manera más natural que «señor», y conserva mejor el sentido social del contexto.
- source_word: τῷ ἐπιτρόπῳ αὐτοῦ
  english_pob_choice: to his steward
  chosen_spanish: a su mayordomo
  alternatives_spanish:
  - a su administrador
  - a su capataz
  lexicon: BDAG
  rationale: ἐπίτροπος denota a quien tiene encargo de supervisión o administración. «Mayordomo» mantiene la idea de autoridad delegada y es comprensible en español bíblico sin sonar corporativo.
- source_word: Κάλεσον
  english_pob_choice: Call
  chosen_spanish: Llama
  alternatives_spanish:
  - Convoca
  - Haz llamar
  lexicon: BDAG
  rationale: El imperativo aoristo da una orden directa. «Llama» es simple, claro y acorde con el tono narrativo del pasaje.
- source_word: τοὺς ἐργάτας
  english_pob_choice: the workers
  chosen_spanish: los trabajadores
  alternatives_spanish:
  - los obreros
  - los jornaleros
  lexicon: BDAG
  rationale: ἐργάται se refiere a trabajadores contratados para laborar en la viña. «Trabajadores» es la opción más clara y neutral en español contemporáneo; «jornaleros» sería más específica pero menos general.
- source_word: ἀπόδος αὐτοῖς τὸν μισθόν
  english_pob_choice: pay them their wages
  chosen_spanish: págales su jornal
  alternatives_spanish:
  - págales su paga
  - dales su salario
  lexicon: BDAG
  rationale: ἀποδίδωμι con μισθός implica pagar lo debido. En el contexto de trabajo diario en una viña, «jornal» transmite mejor la remuneración pactada por jornada que «salario», y conserva el matiz de compensación concreta.
- source_word: ἀρξάμενος
  english_pob_choice: beginning
  chosen_spanish: comenzando
  alternatives_spanish:
  - empezando
  lexicon: BDAG
  rationale: El participio indica el orden en que debe hacerse el pago. «Comenzando» mantiene esa relación participial de manera natural en español.
- source_word: ἀπὸ τῶν ἐσχάτων ἕως τῶν πρώτων
  english_pob_choice: with the last and ending with the first
  chosen_spanish: desde los últimos hasta los primeros
  alternatives_spanish:
  - de los últimos a los primeros
  - empezando por los últimos y terminando con los primeros
  lexicon: BDAG
  rationale: La secuencia expresa un orden desde los contratados al final hasta los primeros. «Desde... hasta...» reproduce de modo directo el rango del griego y mantiene la inversión retórica del pasaje.
theological_decisions:
- issue: Rendering κύριος in a parabolic, non-Christological context
  english_pob_reading: master
  chosen_spanish_reading: dueño
  alternative_spanish_readings:
  - señor
  - propietario
  rationale: Siguiendo el valor contextual de κύριος en la parábola, se evita un título devocional y se mantiene la relación de autoridad humana del viñedo. «Dueño» preserva la posesión y el mando sin confundir el referente con un uso cristológico.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; translation philosophy on source sense over inherited church wording'
translation_notes:
  revision_awareness: El inglés POB revisó «says» por «said» para ajustarlo al pasado narrativo natural; en español se siguió directamente ese valor narrativo con «dijo». También se mantuvo la lectura de κύριος como dueño humano del viñedo, y se preservó la secuencia invertida «de los últimos a los primeros» como rasgo retórico del texto.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para κύριος porque el contexto es parabólico y no cristológico.
  - Se prefirió «jornal» en vez de «salario» para reflejar mejor la paga diaria implícita en μισθός dentro de la escena.
  - La inversión final se conservó sin suavizarla, porque forma parte del énfasis narrativo del verso.
