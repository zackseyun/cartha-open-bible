review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la escena, los participantes y la secuencia básica del pago. Sin embargo, las notas al pie están desancladas respecto del contenido que describen: [a] está colocada en «jornal» pero la nota trata de una alternativa para «el dueño de la viña dijo a su mayordomo» y [b] está colocada al final de la cláusula de orden, aunque explica el presente histórico «dice». Además, el inglés auditado conservó la alternativa «master/owner» y la nota sobre «says/said»; en español conviene reflejar esas alternativas en los lugares correctos. También es mejor ajustar «comenzando desde» a «comenzando por», que suena más natural en español y representa bien ἀρξάμενος ἀπὸ.'
  spanish_quality_summary: 'El español es claro y legible, con tono digno y natural. «Dueño», «mayordomo» y «jornal» son opciones defendibles y comprensibles en un registro bíblico neutral. La principal deficiencia es editorial: las notas están mal ubicadas y por eso crean confusión. «Comenzando desde» resulta algo pesado; «comenzando por» o «desde los últimos hasta los primeros» sin gerundio sería más idiomático.'
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. κύριος en contexto parabólico está bien resuelto como «dueño»/«amo»/«propietario» según matiz; «dueño» es aceptable. ἐπίτροπος como «mayordomo» concuerda con la justificación auditada. No aparecen términos de glosario mayor como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota [a] explica una alternativa para «el dueño de la viña dijo a su mayordomo», no para «jornal»; la nota [b] explica el presente histórico «dice/dijo», no la frase «desde los últimos hasta los primeros». Esto afecta la fidelidad al rastro de auditoría y la claridad editorial.
  - severity: low
    issue: «Comenzando desde» suena menos natural que otras opciones.
    rationale: Aunque comprensible, la combinación de gerundio + «desde» es algo torpe en español. «Comenzando por los últimos» o «desde los últimos hasta los primeros» suena más fluido y mantiene el sentido griego.
  revised_spanish_text: 'Cuando llegó la tarde, el dueño[a] de la viña dijo[b] a su mayordomo: «Llama a los trabajadores y págales su jornal, comenzando por los últimos hasta los primeros».

    '
  revised_footnotes:
