    text: O, «el propietario de la viña».
    reason: lexical_alternative
  - marker: b
    text: El griego usa el presente histórico «dice», una forma vívida de narración; el español suele naturalizarlo como pasado.
    reason: lexical_alternative
  revision_rationale: 'Se reubicaron las notas para que correspondan exactamente a las decisiones léxicas auditadas: una sobre κύριος («dueño/propietario») y otra sobre λέγει («dice/dijo»). También se suavizó «comenzando desde» a «comenzando por» para mejorar la naturalidad del español sin alterar el sentido.'
