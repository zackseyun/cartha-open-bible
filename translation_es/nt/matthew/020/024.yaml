translation:
  language: es
  text: Y al oírlo los diez, se indignaron[a] con los dos hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de oírlo» o «habiendo oído».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἀκούσαντες
  english_pob_choice: And when the ten heard it
  chosen_spanish: Y al oírlo
  alternatives_spanish:
  - Y cuando lo oyeron
  - Y después de oírlo
  - Y habiendo oído esto
  lexicon: BDAG
  rationale: El participio aoristo con valor temporal se expresa de forma natural en español con «al oírlo». El objeto implícito se mantiene como pronombre neutro «lo», siguiendo la necesidad de claridad del contexto sin introducir contenido ajeno.
- source_word: οἱ δέκα
  english_pob_choice: the ten
  chosen_spanish: los diez
  alternatives_spanish:
  - los otros diez
  - los diez discípulos
  lexicon: BDAG
  rationale: La referencia son los otros diez discípulos, pero el griego usa la expresión breve «los diez». «Los diez» conserva la forma del original sin expansión interpretativa.
- source_word: ἠγανάκτησαν
  english_pob_choice: became indignant
  chosen_spanish: se indignaron
  alternatives_spanish:
  - se enojaron
  - quedaron indignados
  - mostraron indignación
  lexicon: BDAG
  rationale: «Se indignaron» preserva la fuerza de fuerte disgusto o indignación mejor que un simple «se enojaron», y suena natural en español moderno.
- source_word: περὶ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  - por
  - respecto de
  lexicon: BDAG
  rationale: Aunque perí puede traducirse de varias maneras, en este contexto la relación idiomática en español es «indignarse con alguien» o «contra alguien». «Con» sigue la revisión del audit trail y reproduce el vínculo relacional sin sobrecargarlo.
- source_word: τῶν δύο ἀδελφῶν
  english_pob_choice: the two brothers
  chosen_spanish: los dos hermanos
  alternatives_spanish:
  - los dos hermanos [Santiago y Juan]
  - los dos hermanos varones
  lexicon: BDAG
  rationale: ἀδελφῶν significa literalmente «hermanos». Se mantiene el número y la relación fraterna sin nombrarlos en el texto principal, como hace el inglés auditado.
theological_decisions:
- issue: Identidad de «los dos hermanos»
  english_pob_reading: Retain the literal expression 'the two brothers' without naming them in the main text.
  chosen_spanish_reading: Mantener «los dos hermanos» sin identificarlos en el cuerpo del versículo.
  alternative_spanish_readings:
  - nombrarlos como Santiago y Juan en el texto principal
  - añadir una aclaración explicativa en el texto principal
  rationale: El contexto inmediato permite identificarlos, pero el texto griego conserva la expresión relacional. Mantenerla evita expansión interpretativa y respeta la economía del original.
  doctrine_reference: Translation philosophy §1, §4, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió la relación idiomática equivalente a «with/at» para περὶ en este contexto. Por eso se eligió «se indignaron con» y no una construcción más distante como «se indignaron por» o «contra».
  spanish_consistency_notes:
  - Se mantiene «los diez» sin expandir a «los otros diez» para conservar la economía del griego.
  - «Se indignaron con» refleja una relación personal directa, acorde con el ajuste final del inglés auditado.
  - El pronombre neutro «lo» cubre el objeto implícito del aoristo participial sin añadir información inexistente en el versículo.
