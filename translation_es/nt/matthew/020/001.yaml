review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido global del griego y sigue de cerca la línea del POB en cuanto a comparación, reino de los cielos, salida temprano, contratación de obreros y referencia a la viña. Sin embargo, la construcción inicial con «Porque» suena menos natural en español bíblico corrido que «Pues», y «temprano por la mañana» resulta algo redundante frente a ἅμα πρωῒ. Además, el texto ancla una nota en «un[a] dueño de casa», pero la nota misma incluye una opción problemática («maestro de casa») que no es buena solución idiomática en español.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero conviene pulir la fluidez: «Pues el reino de los cielos es semejante a un dueño de casa que salió muy temprano para contratar obreros para su viña» lee con mayor naturalidad y sobriedad. También es mejor eliminar la coma antes de «que», ya que la relativa es restrictiva.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «El reino de los cielos» está bien. «Dueño de casa» es defendible para οἰκοδεσπότῃ y preserva el énfasis doméstico mejor que «hacendado». «Obreros» y «viña» son apropiados. La nota léxica debe conservar alternativas útiles pero evitar una formulación poco idiomática como «maestro de casa».
  issues:
  - severity: medium
    issue: Conector inicial «Porque»
    rationale: γάρ sí tiene fuerza explicativa, pero al inicio de esta frase «Pues» suena más natural y literario en español bíblico; «Porque» puede sentirse más duro o dependiente de una estructura previa no visible.
  - severity: low
    issue: Expresión temporal «temprano por la mañana»
    rationale: Comunica bien el sentido, pero es algo redundante en español. «Muy temprano» o «temprano en la mañana» fluye mejor para ἅμα πρωῒ.
  - severity: low
    issue: Coma antes de la relativa «que salió»
    rationale: En español, la relativa aquí es especificativa, no explicativa; la coma estorba la lectura natural.
  - severity: medium
    issue: Nota al pie incluye «maestro de casa»
    rationale: Aunque intenta reflejar la literalidad inglesa, «maestro de casa» no es una opción idiomática recomendable en español. La nota debe presentar alternativas fieles y naturales.
  revised_spanish_text: Pues el reino de los cielos es semejante a un[a] dueño de casa que salió muy temprano para contratar obreros para su viña.
  revised_footnotes:
  - marker: a
    text: 'También: «un amo de casa», «un hacendado» o «un jefe de familia»; el griego significa más literalmente «amo» o «dueño de una casa».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el conector a «Pues» para reflejar γάρ con mejor naturalidad en español, se elimina la coma ante la relativa restrictiva, se simplifica la expresión temporal para evitar redundancia, y se corrige la nota léxica para mantener alternativas fieles e idiomáticas sin usar «maestro de casa».
