    timestamp: '2026-04-18T19:42:38Z'
    output_hash: 5972137fb4696f1026d29cf820a38e95515630b5934e576f9c353b8d6e51dbb7
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:57:00Z'
    unchanged: false
    changes_summary: Removed the appositional 'a man,' since οἰκοδεσπότῃ already means 'master of a house/householder,' making the draft slightly redundant in English. Kept the rest of the wording substantially the same for accuracy and naturalness.
translation:
  language: es
  text: Pues el reino de los cielos es semejante a un[a] dueño de casa que salió muy temprano para contratar obreros para su viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «un amo de casa», «un hacendado» o «un jefe de familia»; el griego significa más literalmente «amo» o «dueño de una casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁμοία
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - se parece a
  lexicon: BDAG
  rationale: La forma predicativa introduce una comparación; en español, 'es semejante a' conserva el valor de similitud sin forzar una construcción demasiado coloquial.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva el enlace explicativo con el contexto previo. 'Porque' funciona bien al inicio de una oración en español y mantiene la fuerza causal/explicativa.
- source_word: βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reinado de los cielos
  lexicon: BDAG
  rationale: Se sigue la expresión mateana establecida en español bíblico, con 'cielos' como equivalente idiomático de la construcción griega plural.
- source_word: οἰκοδεσπότῃ
  english_pob_choice: a master of a house
  chosen_spanish: un dueño de casa
  alternatives_spanish:
  - un amo de casa
  - un jefe de familia
  - un hacendado
  lexicon: BDAG
  rationale: '''Dueño de casa'' comunica con naturalidad la idea de cabeza de hogar/propietario doméstico. ''Hacendado'' estrecha demasiado el sentido hacia propiedad rural, y ''amo'' suena más duro que el matiz del término.'
- source_word: ὅστις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: BDAG
  rationale: Funciona como relativo explicativo en español y evita una repetición innecesaria.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue fuera
  - se salió
  lexicon: BDAG
  rationale: '''Salió'' es la equivalencia natural y directa del movimiento de salida expresado por el aoristo de ἐξέρχομαι.'
- source_word: ἅμα πρωῒ
  english_pob_choice: early in the morning
  chosen_spanish: temprano por la mañana
  alternatives_spanish:
  - de madrugada
  - al amanecer
  lexicon: BDAG
  rationale: Recoge el valor temporal sin precisar más de lo que el griego da. 'Temprano por la mañana' es claro y suficientemente sobrio.
- source_word: μισθώσασθαι
  english_pob_choice: to hire
  chosen_spanish: contratar
  alternatives_spanish:
  - alquilar
  - tomar a jornal
  lexicon: BDAG
  rationale: En el contexto de trabajadores asalariados, 'contratar' expresa bien la acción de tomar obreros para trabajo remunerado. 'Tomar a jornal' sería más técnico y menos transparente para lectura pública.
- source_word: ἐργάτας
  english_pob_choice: workers
  chosen_spanish: obreros
  alternatives_spanish:
  - trabajadores
  - jornaleros
  lexicon: BDAG
  rationale: '''Obreros'' mantiene dignidad y concreción laboral. ''Jornaleros'' es posible, pero introduce un matiz más específico de trabajo por jornada que el griego aquí no explicita.'
- source_word: ἀμπελῶνα
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - plantación de uvas
  lexicon: BDAG
  rationale: '''Viña'' es la forma bíblica y natural en español para ἀμπελών. ''Viñedo'' es posible, pero en registro bíblico ''viña'' suena más directo y tradicional sin perder claridad.'
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - propia
  lexicon: BDAG
  rationale: Pronombre posesivo normal en español para referirse al dueño de casa.
theological_decisions:
- issue: 'Título del personaje de la parábola: οἰκοδεσπότης'
  english_pob_reading: a master of a house
  chosen_spanish_reading: un dueño de casa
  alternative_spanish_readings:
  - un hacendado
  - un jefe de familia
  rationale: Se conserva el sentido doméstico/administrativo del término sin trasladarlo innecesariamente al campo agrícola. El contexto de la viña se desarrolla después; por eso no conviene anticipar 'hacendado' como si fuera la única lectura posible.
  doctrine_reference: DOCTRINE.md §Lexical transparency and contextual restraint
- issue: Expresión mateana βασιλεία τῶν οὐρανῶν
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reino del cielo
  - el reinado de los cielos
  rationale: Se mantiene la expresión tradicional de Mateo en español por fidelidad intertextual y claridad eclesial, sin reemplazarla por una paráfrasis interpretativa como 'reinado'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que eliminó el appositional 'a man' por redundante frente a 'master of a house'. Por eso el español evita cualquier equivalente redundante y va directo a 'un dueño de casa'. También se respetó la decisión de no hacer más específica la imagen temporal que 'temprano por la mañana'.
  spanish_consistency_notes:
  - Se conservó 'reino de los cielos' por coherencia mateana y por la terminología POB ya establecida.
  - Se prefirió 'obrero' sobre 'trabajador' para mantener un registro bíblico claro y digno.
  - '''Viña'' se usó como equivalente estable de ἀμπελών en español bíblico, sin ampliar a ''viñedo'' o ''plantación''.'
