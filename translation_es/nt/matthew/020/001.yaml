source:
  edition: SBLGNT
  text: Ὁμοία γάρ ἐστιν ἡ βασιλεία τῶν οὐρανῶν ἀνθρώπῳ οἰκοδεσπότῃ ὅστις ἐξῆλθεν ἅμα πρωῒ μισθώσασθαι ἐργάτας εἰς τὸν ἀμπελῶνα αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/020/001.yaml
  text: For the kingdom of heaven is like a master of a house who went out early in the morning to hire workers for his vineyard[a].
  footnotes:
  - marker: a
    text: Or 'a landowner' or 'a householder'; the Greek more literally means 'a master of a house.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
