revisions:
- from: Porque el reino de los cielos es semejante a un[a] dueño de casa, que salió temprano por la mañana para contratar obreros para su viña.
  to: Pues el reino de los cielos es semejante a un[a] dueño de casa que salió muy temprano para contratar obreros para su viña.
  rationale: Se ajusta el conector a «Pues» para reflejar γάρ con mejor naturalidad en español, se elimina la coma ante la relativa restrictiva, se simplifica la expresión temporal para evitar redundancia, y se corrige la nota léxica para mantener alternativas fieles e idiomáticas sin usar «maestro de casa».
