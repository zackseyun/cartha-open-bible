translation:
  language: es
  text: 'Pero la multitud los reprendió para que se callaran[a]. Sin embargo, ellos clamaron todavía más, diciendo: «¡Señor, ten misericordia de nosotros[b], Hijo de David!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más fuerte». El comparativo griego puede enfatizar tanto un aumento de intensidad general como del volumen de la voz.
    reason: lexical_alternative
  - marker: b
    text: «Hijo de David» es un título mesiánico, no solo una afirmación de ascendencia.
    reason: cultural_note
lexical_decisions:
- source_word: ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: BDAG
  rationale: ὄχλος denota un grupo numeroso reunido alrededor de Jesús. «Multitud» es natural en español bíblico y conserva el sentido colectivo sin bajar el registro demasiado coloquial.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: los reprendió
  alternatives_spanish:
  - los reprendió severamente
  - los censuró
  - los reprendió con dureza
  lexicon: BDAG
  rationale: ἐπιτιμάω expresa reprensión fuerte o censura. «Reprendió» transmite la fuerza correctiva del verbo sin añadir una intensidad no explicitada por el texto.
- source_word: ἵνα σιωπήσωσιν
  english_pob_choice: so that they would be silent
  chosen_spanish: para que se callaran
  alternatives_spanish:
  - para que guardaran silencio
  - para hacerlos callar
  - a fin de que se callaran
  lexicon: BDAG
  rationale: La cláusula ἵνα expresa propósito o resultado. «Para que se callaran» es idiomático en español y preserva el intento de silenciarlos.
- source_word: μεῖζον
  english_pob_choice: all the more
  chosen_spanish: todavía más
  alternatives_spanish:
  - aún más
  - con mayor fuerza
  - más y más
  lexicon: BDAG
  rationale: El comparativo intensifica el clamor. «Todavía más» mantiene la idea de aumento en la respuesta, sin decidir demasiado entre volumen e intensidad, como hace el inglés POB.
- source_word: ἔκραξαν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - exclamaron
  - dieron voces
  lexicon: BDAG
  rationale: κράζω implica un clamor fuerte. «Clamaron» conserva el carácter insistente y sonoro del verbo en un registro bíblico natural.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: La forma de dirección a Jesús se traduce con «Señor», según el valor habitual de κύριος y el criterio doctrinal del proyecto. «Señor» conserva respeto y posible resonancia cristológica.
- source_word: ἐλέησον ἡμᾶς
  english_pob_choice: have mercy on us
  chosen_spanish: ten misericordia de nosotros
  alternatives_spanish:
  - ten compasión de nosotros
  - muéstranos misericordia
  - apiádate de nosotros
  lexicon: BDAG
  rationale: La petición imperativa se expresa de manera directa y comprensible. «Ten misericordia de nosotros» es la forma litúrgica y bíblica más inmediata en español; en este contexto mantiene fidelidad y claridad.
- source_word: υἱὸς Δαυίδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - descendiente de David
  lexicon: BDAG
  rationale: La expresión funciona como título mesiánico en Mateo y no debe diluirse en una simple relación genealógica. «Hijo de David» preserva la forma tradicional y el peso narrativo-teológico del título.
theological_decisions:
- issue: Título mesiánico 'Hijo de David'
  english_pob_reading: Render as 'Son of David' because it is a messianic title, not merely ancestry.
  chosen_spanish_reading: Traducir «Hijo de David» literalmente, manteniendo su valor mesiánico.
  alternative_spanish_readings:
  - descendiente de David
  rationale: En Mateo, la expresión no solo informa genealogía; identifica a Jesús con la esperanza davídica. La traducción literal conserva esa carga sin explicitar más de lo que el versículo dice.
  doctrine_reference: Affirmations; Translation philosophy §§2, 3
- issue: Dirección a Jesús con κύριε
  english_pob_reading: Translate Κύριε as 'Lord' to preserve respect and christological resonance.
  chosen_spanish_reading: Traducir «Κύριε» como «Señor».
  alternative_spanish_readings:
  - Maestro
  rationale: «Señor» es el equivalente normal de κύριος y preserva la posible profundidad cristológica del título en el contexto de Mateo. «Maestro» reduciría indebidamente el alcance del término.
  doctrine_reference: 'Contested terms: κύριος → Lord; Translation philosophy §3'
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed; the Spanish draft follows the high-agreement English audit trail and preserves the remaining minor ambiguity in μεῖζον with a note.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριε conforme al criterio del proyecto y al audit trail inglés.
  - Se usó «ten misericordia de nosotros» como fórmula bíblica natural en español, equivalente a 'have mercy on us'.
  - Se eligió «multitud» como equivalente más natural de ὄχλος en español bíblico moderno.
  - La ambigüedad de μεῖζον se conserva en nota, sin fijarla exclusivamente a volumen o intensidad.
