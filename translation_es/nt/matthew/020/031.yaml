base_translation:
  language: en
  yaml_path: translation/nt/matthew/020/031.yaml
  text: But the crowd rebuked them so that they would be silent[a]. Yet they cried out all the more, saying, “Lord, have mercy on us[b], Son of David.”
  footnotes:
  - marker: a
    text: Or 'more loudly.' The Greek comparative may emphasize either increased intensity generally ('all the more') or volume specifically.
    reason: lexical_alternative
  - marker: b
    text: '''Son of David'' is a messianic title, not merely a statement of ancestry.'
    reason: cultural_note
