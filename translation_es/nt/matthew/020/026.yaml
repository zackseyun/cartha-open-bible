translation:
  language: es
  text: No será así entre ustedes[a]. Pero el que quiera llegar a ser grande entre ustedes será servidor de ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No es así entre ustedes». El griego usa un verbo futuro («será»), que puede expresar cómo no deben ser las cosas entre los seguidores de Jesús.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ οὕτως ἔσται ἐν ὑμῖν
  english_pob_choice: It shall not be so among you
  chosen_spanish: No será así entre ustedes
  alternatives_spanish:
  - No es así entre ustedes
  - No será de ese modo entre ustedes
  lexicon: BDAG
  rationale: Se conserva el futuro de ἔσται con «será», porque el griego expresa una norma orientada al futuro y no solo un estado presente. «Entre ustedes» reproduce naturalmente el sentido social de ἐν ὑμῖν en este contexto comunitario.
- source_word: ἀλλ’ ὃς ἂν θέλῃ
  english_pob_choice: But whoever wants
  chosen_spanish: Pero el que quiera
  alternatives_spanish:
  - Pero quien quiera
  - Pero cualquiera que desee
  lexicon: BDAG
  rationale: ὃς ἂν con subjuntivo expresa una condición general e indefinida; «el que quiera» comunica bien esa idea en español sin endurecer el tono. «Quiera» mantiene el matiz volitivo de θέλῃ.
- source_word: μέγας γενέσθαι
  english_pob_choice: to become great
  chosen_spanish: llegar a ser grande
  alternatives_spanish:
  - volverse grande
  - ser grande
  lexicon: BDAG
  rationale: γενέσθαι es ingresivo, por lo que conviene expresar un proceso de llegada a una nueva condición. «Llegar a ser grande» conserva mejor ese matiz que un simple «ser grande».
- source_word: διάκονος
  english_pob_choice: servant
  chosen_spanish: servidor
  alternatives_spanish:
  - siervo
  - servidor/a
  lexicon: BDAG
  rationale: En este contexto διάκονος designa a quien sirve, no un cargo eclesial. «Servidor» suena natural en español contemporáneo y conserva la idea de servicio personal; se evita «diácono» y también «ministerio» por introducir una lectura institucional ajena al pasaje.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  lexicon: BDAG
  rationale: El genitivo posesivo se vierte de manera idiomática con «su» en «su servidor», manteniendo la relación comunitaria sin pesadez sintáctica.
theological_decisions:
- issue: Contraste normativo con la jerarquía de poder
  english_pob_reading: Render the statement as a normative reversal of worldly hierarchy without importing later ecclesial structures
  chosen_spanish_reading: Presentar la frase como una inversión normativa de la grandeza mundana, sin convertir διάκονος en un cargo eclesiástico
  alternative_spanish_readings:
  - Leerlo como referencia al oficio de diácono
  - Suavizarlo a una exhortación genérica a la humildad
  rationale: El contexto inmediato contrapone el estilo de liderazgo de las naciones con el de los discípulos de Jesús. La traducción mantiene el lenguaje concreto de servicio y el futuro normativo, evitando tanto institucionalizar el término como diluirlo en una abstracción moral.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide con el audit trail inglés en la preservación del futuro de ἔσται, la generalidad de ὃς ἂν θέλῃ, el matiz ingresivo de γενέσθαι y la función servicial de διάκονος. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se prefiere «entre ustedes» para ἐν ὑμῖν por naturalidad y claridad comunitaria.
  - Se evita «siervo» porque en este contexto «servidor» comunica mejor la función de servicio sin resonancias de esclavitud que no están en διάκονος.
  - La puntuación conserva el corte en dos miembros como en el griego y en la traducción inglesa auditada.
