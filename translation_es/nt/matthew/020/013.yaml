translation:
  language: es
  text: 'Pero él, respondiendo, dijo a uno de ellos: «Amigo, no te hago ninguna injusticia[a]. ¿No acordaste conmigo por un denario[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te hago ningún agravio».'
    reason: lexical_alternative
  - marker: b
    text: Un denario era una moneda romana de plata estándar, entendida comúnmente como el pago típico de una jornada de trabajo para un obrero.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - en respuesta
  - contestando
  lexicon: BDAG
  rationale: El participio introduce la respuesta del dueño; «respondiendo» conserva esa estructura participial y suena natural en español. «Contestando» es posible, pero puede sonar menos neutral. «En respuesta» suaviza demasiado la forma verbal.
- source_word: ἑνὶ αὐτῶν
  english_pob_choice: to one of them
  chosen_spanish: a uno de ellos
  alternatives_spanish:
  - a uno entre ellos
  - a uno de los dos
  lexicon: BDAG
  rationale: El dativo con genitivo partitivo indica que se dirige a un individuo del grupo. «A uno de ellos» mantiene la referencia grupal sin añadir precisión no explicitada por el griego.
- source_word: Ἑταῖρε
  english_pob_choice: Friend
  chosen_spanish: Amigo
  alternatives_spanish:
  - Compañero
  - Camarada
  lexicon: BDAG
  rationale: «Amigo» es el equivalente más idiomático y fiel para el vocativo. En este contexto puede sonar formal o distante, lo que preserva la posible tensión del trato. «Compañero» y «Camarada» resultan menos naturales aquí.
- source_word: οὐκ ἀδικῶ σε
  english_pob_choice: I am not wronging you
  chosen_spanish: no te hago ningún agravio
  alternatives_spanish:
  - no te hago ningún mal
  - no te hago injusticia
  - no te hago ningún daño
  lexicon: BDAG
  rationale: ἀδικέω expresa obrar injustamente, agraviar o hacer mal. «No te hago ningún agravio» conserva la fuerza personal y jurídica del verbo mejor que una paráfrasis más general. La formulación evita borrar la tensión entre justicia y trato personal.
- source_word: οὐχὶ
  english_pob_choice: Did you not
  chosen_spanish: ¿No...?
  alternatives_spanish:
  - ¿Acaso no...?
  - ¿No es cierto que...?
  lexicon: BDAG
  rationale: La partícula introduce una pregunta con expectativa de respuesta afirmativa. En español, la inversión interrogativa simple con «¿No...?» comunica bien ese forcejeo retórico sin sobrecargar la frase.
- source_word: δηναρίου
  english_pob_choice: for a denarius
  chosen_spanish: un denario
  alternatives_spanish:
  - por un denario
  - a cambio de un denario
  lexicon: BDAG
  rationale: El genitivo de precio se expresa de forma natural con «un denario» en la pregunta de acuerdo laboral. Se conserva el término monetario histórico en lugar de sustituirlo por una equivalencia interpretativa.
- source_word: συνεφώνησάς μοι
  english_pob_choice: agree with me
  chosen_spanish: acordaste conmigo
  alternatives_spanish:
  - llegaste a un acuerdo conmigo
  - conviniste conmigo
  lexicon: BDAG
  rationale: συμφωνέω aquí refiere a pactar o llegar a un acuerdo. «Acordaste conmigo» es claro, natural y refleja el compromiso previo. «Conviniste conmigo» es más literal, pero menos común en español actual.
theological_decisions:
- issue: Tono de la dirección «Ἑταῖρε» en contexto de reprensión
  english_pob_reading: Friend, I am not wronging you.
  chosen_spanish_reading: Amigo, no te hago ningún agravio.
  alternative_spanish_readings:
  - Amigo, no te hago ningún mal.
  - Compañero, no te hago ningún agravio.
  rationale: El texto no añade un insulto explícito, pero sí un vocativo que puede ser distanciado. «Amigo» preserva la forma del original sin intensificar indebidamente la reprensión. La elección permite que el tono se perciba por el contexto, no por una traducción interpretativa.
  doctrine_reference: Mateo 20:13; cf. el uso de ἑταῖρε en Mateo 22:12; 26:50
- issue: Valor de justicia en οὐκ ἀδικῶ σε
  english_pob_reading: I am not wronging you
  chosen_spanish_reading: no te hago ningún agravio
  alternative_spanish_readings:
  - no te hago ninguna injusticia
  - no te hago ningún daño
  rationale: ἀδικέω tiene una carga de injusticia objetiva, no solo de sentimiento ofendido. «Agravio» conserva mejor esa dimensión de trato injusto o lesivo. Esto evita convertir la afirmación en mero consuelo emocional y mantiene la cuestión de la equidad del pago.
  doctrine_reference: Mateo 20:1-16; justicia en el marco de la parábola del reino
- issue: Moneda histórica en la cláusula de acuerdo
  english_pob_reading: Did you not agree with me for a denarius?
  chosen_spanish_reading: ¿No acordaste conmigo un denario?
  alternative_spanish_readings:
  - ¿No hiciste trato conmigo por un denario?
  - ¿No conviniste conmigo por un denario?
  rationale: Se conserva «denario» como unidad histórica concreta, porque el sentido depende de una suma específica acordada. No se expande a «salario diario» en el texto principal para no sustituir el dato del original; esa aclaración puede mantenerse implícita en nota cultural.
  doctrine_reference: Mateo 20:2, 13; contexto económico de la parábola
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego y el audit trail inglés. Se adoptó una equivalencia óptima: se preserva la estructura participial de ἀποκριθεὶς, el dative-partitive de ἑνὶ αὐτῶν, el vocativo Ἑταῖρε, la negación fuerte de οὐκ ἀδικῶ σε y la pregunta retórica de οὐχὶ δηναρίου συνεφώνησάς μοι. No se requirieron cambios de revisión respecto al contexto auditado; el único ajuste relevante en español fue optar por una formulación más natural de συμφωνέω como «acordaste conmigo» en lugar de una traducción más literal pero menos idiomática.'
  spanish_consistency_notes:
  - Se usa «denario» de manera consistente como término histórico concreto.
  - Se mantiene «Amigo» para Ἑταῖρε, evitando la sustitución por un título eclesial o una paráfrasis afectiva.
  - «Agravio» conserva mejor la fuerza de ἀδικέω que un simple «mal» en este contexto.
  - La puntuación reproduce el cierre interrogativo del griego con una sola pregunta final.
