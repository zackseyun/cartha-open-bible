translation:
  language: es
  text: Entonces la madre de los hijos de Zebedeo se acercó a él con sus hijos[a], postrándose y pidiéndole algo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'adorando'; el verbo griego puede significar postrarse en reverencia, rendir homenaje o adorar, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca una secuencia temporal narrativa natural en español y mantiene el valor consecutivo del adverbio griego sin añadir interpretación.
- source_word: προσῆλθεν
  english_pob_choice: came
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino a él
  - se le acercó
  lexicon: BDAG
  rationale: προσέρχομαι indica venir hacia o acercarse a alguien. 'Se acercó' suena natural en español y conserva el movimiento hacia Jesús.
- source_word: ἡ μήτηρ τῶν υἱῶν Ζεβεδαίου
  english_pob_choice: the mother of the sons of Zebedee
  chosen_spanish: la madre de los hijos de Zebedeo
  alternatives_spanish:
  - la madre de los hijos de Zebedeo
  - la madre de Zebedeo
  lexicon: BDAG
  rationale: La construcción genitiva identifica a la mujer por su relación con los hijos de Zebedeo. 'Hijos' refleja bien υἱῶν y evita ambigüedad.
- source_word: μετὰ τῶν υἱῶν αὐτῆς
  english_pob_choice: with her sons
  chosen_spanish: con sus hijos
  alternatives_spanish:
  - acompañada por sus hijos
  - junto con sus hijos
  lexicon: BDAG
  rationale: μετά con genitivo expresa compañía. 'Con sus hijos' es directo y fiel; mantiene la simpleza del original.
- source_word: προσκυνοῦσα
  english_pob_choice: bowing down
  chosen_spanish: postrándose
  alternatives_spanish:
  - arrodillándose
  - rindiéndole homenaje
  - adorándolo
  lexicon: BDAG
  rationale: προσκυνέω puede ir desde postración reverente hasta adoración. 'Postrándose' preserva el gesto físico de reverencia sin resolver de antemano su alcance teológico; la alternativa 'adorándolo' queda descartada en el texto principal por ir más allá del contexto inmediato.
- source_word: καὶ αἰτοῦσά τι παρ’ αὐτοῦ
  english_pob_choice: and asking something from him
  chosen_spanish: y pidiéndole algo
  alternatives_spanish:
  - y solicitándole algo
  - y haciéndole una petición
  lexicon: BDAG
  rationale: αἰτέω significa pedir/solicitar; τι es un indefinido, 'algo'. La construcción con παρά indica procedencia o dirección de la petición hacia él, bien expresada en español con 'pidiéndole algo'.
theological_decisions:
- issue: Alcance de προσκυνοῦσα respecto de Jesús
  english_pob_reading: bowing down
  chosen_spanish_reading: postrándose
  alternative_spanish_readings:
  - adorándolo
  - rindiéndole homenaje
  - arrodillándose
  rationale: El verbo admite reverencia física o adoración, y el contexto cercano no obliga a decidir entre ambas. 'Postrándose' preserva esa tensión y evita imponer una lectura más fuerte que la que el texto exige en este versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el texto se mantuvo estable tras la última verificación; por ello, el borrador español sigue de cerca el audit trail inglés sin introducir ajustes no motivados por la fuente.
  spanish_consistency_notes:
  - Se usó 'hijos de Zebedeo' para reflejar la relación genitiva del griego de forma transparente.
  - '''Se acercó a él'' mantiene la dirección verbal de προσέρχομαι con un español natural.'
  - '''Postrándose'' conserva la ambigüedad reverente de προσκυνοῦσα, con nota alternativa para ''adorando''.'
  - '''Pidiéndole algo'' refleja el indefinido τι sin especificar el contenido de la petición.'
