translation:
  language: es
  text: 'Y Jesús[a] se detuvo, los llamó y dijo: «¿Qué quieren que les haga?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «¿Qué desean que yo les haga?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  english_pob_choice: stopped
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se paró
  - habiéndose detenido
  lexicon: BDAG / sentido idiomático del participio aoristo
  rationale: El participio aoristo de ἵστημι funciona de modo idiomático antes del verbo principal y marca que Jesús interrumpió su movimiento. «Se detuvo» expresa esa acción de manera natural en español y conserva el valor narrativo sin sonar mecánico.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - el Jesús
  lexicon: BDAG / nombre propio
  rationale: El artículo griego no se traslada con el nombre propio en español. «Jesús» mantiene la referencia directa y el registro natural del texto.
- source_word: ἐφώνησεν
  english_pob_choice: called
  chosen_spanish: los llamó
  alternatives_spanish:
  - los convocó
  - los llamó a gritos
  lexicon: BDAG
  rationale: φωνέω aquí es llamar o llamar a alguien con voz audible. «Los llamó» reproduce bien la acción dirigida a los dos hombres y es más natural que «convocó» en este contexto narrativo.
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Qué cosa
  lexicon: BDAG
  rationale: El pronombre interrogativo se rinde con la forma simple y directa «¿Qué?», sin expansión innecesaria.
- source_word: θέλετε
  english_pob_choice: do you want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - quieren ustedes
  lexicon: BDAG
  rationale: θέλω expresa querer o desear. En español, dentro de la cita de Jesús a dos personas, «¿Qué quieren...?» suena natural y fiel; el sujeto plural queda claro por el contexto y por el pronombre enclítico de la forma verbal.
- source_word: ποιήσω
  english_pob_choice: me to do
  chosen_spanish: que les haga
  alternatives_spanish:
  - que yo haga para ustedes
  - que les haga yo
  lexicon: BDAG
  rationale: La construcción griega con subjuntivo expresa el contenido de lo que ellos desean que Jesús haga. En español, la estructura más idiomática es «que les haga», que conserva el sentido benefactivo sin forzar una perífrasis más pesada.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El dativo aquí tiene valor benefactivo. En español, el clítico «les» transmite de forma natural que la acción sería en favor de ellos; «para ustedes» es posible, pero menos conciso en la pregunta directa.
theological_decisions:
- issue: Tono de la pregunta de Jesús
  english_pob_reading: 'A direct question of compassionate invitation: ''What do you want me to do for you?'''
  chosen_spanish_reading: 'Una pregunta directa de invitación compasiva: «¿Qué quieren que les haga?»'
  alternative_spanish_readings:
  - «¿Qué desean que yo haga por ustedes?»
  - «¿Qué quieren que haga por ustedes?»
  rationale: El texto no contiene un término doctrinalmente controvertido, pero sí presenta el tono pastoral de Jesús. La formulación elegida mantiene la cercanía, la claridad y la fuerza directa de la pregunta, sin elevar el registro de forma artificial.
  doctrine_reference: Philosophy of translation §§5–6
translation_notes:
  revision_awareness: El control de revisión más reciente indica que el texto inglés fue aprobado sin cambios y con alto acuerdo entre revisores; por eso esta propuesta sigue de cerca la decisión auditada de conservar una pregunta directa y compasiva, adaptándola a un español natural sin perder la relación entre el participio inicial, el llamado verbal y la pregunta final.
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de la segunda persona implícita en el griego con «quieren / les / ustedes» en la nota formal.
  - Se evita «SEÑOR» y otras sustituciones litúrgicas porque aquí el texto griego nombra explícitamente a Jesús.
  - La nota alternativa conserva la tensión entre una lectura más directa e idiomática y una más formal, como en el audit trail inglés.
