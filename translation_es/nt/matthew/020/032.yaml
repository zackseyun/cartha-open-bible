    issue: La nota va anclada a «Jesús» en lugar de a la pregunta, aunque su contenido explica una alternativa de formulación de la pregunta.
    rationale: No afecta la fidelidad del texto principal, pero el anclaje ideal del marcador estaría junto a la cita o dentro de ella. Dado que la instrucción permite aprobar sin cambios cuando no se requiere reparación, esto queda como observación menor.
