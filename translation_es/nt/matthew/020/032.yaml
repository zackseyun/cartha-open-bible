  source_alignment_summary: 'El borrador español refleja fielmente el griego: «Y Jesús se detuvo, los llamó y dijo: “¿Qué quieren que les haga?”» corresponde bien a καὶ στὰς ὁ Ἰησοῦς ἐφώνησεν αὐτοὺς καὶ εἶπεν· Τί θέλετε ποιήσω ὑμῖν; Se preservan el valor narrativo de στὰς como interrupción del movimiento, la acción de ἐφώνησεν como llamada dirigida a ellos, y la pregunta benefactiva final.'
  spanish_quality_summary: El español es natural, claro y digno. «Se detuvo» y «los llamó» suenan idiomáticos; la pregunta «¿Qué quieren que les haga?» mantiene cercanía y solemnidad suficiente sin rigidez. La puntuación y la cita directa están bien resueltas.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. «Jesús» coincide con la convención del proyecto. Las decisiones léxicas principales siguen adecuadamente la auditoría inglesa y el sentido del griego.
  issues:
