translation:
  language: es
  text: ¿No me es lícito hacer lo que quiero con lo mío? ¿O tu ojo es malo porque yo soy bueno?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Eres envidioso porque yo soy bueno?». La expresión «tu ojo es malo» es un modismo griego para la envidia o el resentimiento por lo que otro recibe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξεστίν
  english_pob_choice: is it lawful
  chosen_spanish: ¿No me es lícito...?
  alternatives_spanish:
  - ¿No tengo derecho...
  - ¿No me está permitido...
  lexicon: BDAG
  rationale: ἔξεστι expresa lo permitido o lícito. «Me es lícito» conserva el matiz jurídico/de derecho del propietario en la pregunta retórica, y suena natural en español bíblico moderno.
- source_word: ὃ θέλω ποιῆσαι
  english_pob_choice: to do what I want
  chosen_spanish: hacer lo que quiero
  alternatives_spanish:
  - hacer lo que deseo
  - hacer lo que yo quiero
  lexicon: BDAG
  rationale: La cláusula expresa voluntad personal. «Lo que quiero» refleja θέλω de manera directa y natural, sin elevar el registro innecesariamente.
- source_word: ἐν τοῖς ἐμοῖς
  english_pob_choice: with what is mine
  chosen_spanish: con lo mío
  alternatives_spanish:
  - con mis bienes
  - con lo que es mío
  lexicon: BDAG
  rationale: La construcción idiomática apunta a posesión/propiedad. «Con lo mío» comunica pertenencia de forma breve y transparente en español; «con mis bienes» interpretaría más de lo que el griego dice.
- source_word: ὀφθαλμός σου πονηρός
  english_pob_choice: is your eye evil
  chosen_spanish: tu ojo es malo
  alternatives_spanish:
  - tienes mal ojo
  - tu ojo es envidioso
  - tu mirada es mala
  lexicon: BDAG
  rationale: Se preserva la imagen literal del griego para no borrar la tensión retórica. «Malo» mantiene el idiomatismo «ojo malo» y deja abierta la lectura idiomática de envidia/resentimiento, en vez de resolverla en el texto principal.
- source_word: ἀγαθός
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - generoso
  - benigno
  lexicon: BDAG
  rationale: ἀγαθός significa «bueno» de manera básica. En este contexto implica generosidad, pero «bueno» conserva mejor la forma léxica y el contraste con «malo» del miembro anterior.
theological_decisions:
- issue: Si interpretar o no la expresión «tu ojo es malo» en el texto principal
  english_pob_reading: Preserve the literal idiom 'is your eye evil' in the main text; footnote explains envy/resentment.
  chosen_spanish_reading: Preservar la imagen literal «tu ojo es malo» en el texto principal, con nota explicativa sobre la posible idea de envidia o resentimiento.
  alternative_spanish_readings:
  - ¿Eres envidioso porque yo soy bueno?
  - ¿Te molesta que yo sea bueno?
  - ¿Estás resentido porque yo soy bueno?
  rationale: La traducción principal mantiene la metáfora y la tensión retórica del griego; la nota ofrece la interpretación idiomática probable sin reemplazarla en el cuerpo del texto. Esto sigue la pauta de no resolver de antemano la imagen fuente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/retórica en vez de resolverla'
translation_notes:
  revision_awareness: 'Alineado con la última pasada de revisión sin cambios sustanciales: se mantiene la lectura literal del modismo y se conserva el contraste entre la bondad del dueño y la reacción del interlocutor. No se documentaron revisiones aplicadas adicionales.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; aquí no aparece.
  - Se prefirió «lícito» para ἔξεστι por su valor jurídico y su naturalidad en español.
  - Se mantuvo «bueno/malo» para conservar el paralelismo léxico con ἀγαθός/πονηρός.
  - La nota a pie de página se ancla en «malo» para preservar la ambigüedad idiomática sin perder inteligibilidad.
