translation:
  language: es
  text: Y los que llegaron alrededor de la undécima hora recibieron un denario cada uno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un denario era una moneda romana de plata estándar, comúnmente entendida como el salario típico de un día para un trabajador.
    reason: cultural_note
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: La conjunción simple mantiene la continuidad narrativa sin añadir una relación temporal que el griego no exige en este versículo aislado.
- source_word: ἐλθόντες
  english_pob_choice: who came
  chosen_spanish: llegaron
  alternatives_spanish:
  - habiendo llegado
  - que vinieron
  lexicon: BDAG
  rationale: El participio aoristo se integra de forma natural en español como un verbo finito en pasado. 'Llegaron' conserva el movimiento de llegada sin sonar forzado como un participio absoluto.
- source_word: οἱ περὶ τὴν ἑνδεκάτην ὥραν
  english_pob_choice: those who came about the eleventh hour
  chosen_spanish: los que llegaron cerca de la undécima hora
  alternatives_spanish:
  - los que llegaron alrededor de la undécima hora
  - los que vinieron hacia la undécima hora
  lexicon: BDAG
  rationale: περί con acusativo temporal expresa aproximación; 'cerca de' reproduce esa cercanía temporal con buen español. Se conserva 'hora' como unidad narrativa del pasaje, sin introducir 'contratados' o 'llamados', que no aparecen aquí.
- source_word: ἔλαβον
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - obtuvieron
  - tomaron
  lexicon: BDAG
  rationale: En contexto de pago, 'recibieron' expresa la entrega de la paga de manera natural y fiel. 'Tomaron' sonaría más activo de lo que sugiere el griego en este contexto.
- source_word: ἀνὰ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno por
  - aparte
  lexicon: BDAG
  rationale: El valor distributivo de ἀνά se expresa con 'cada uno', que es la forma más idiomática en español y mantiene la distribución individual de la paga.
- source_word: δηνάριον
  english_pob_choice: a denarius
  chosen_spanish: un denario
  alternatives_spanish:
  - un denario romano
  - una moneda de denario
  lexicon: BDAG
  rationale: Se conserva el término histórico 'denario' por ser el equivalente directo del griego y por su valor cultural en el relato. En español eclesial moderno es comprensible sin necesidad de paráfrasis.
translation_notes:
  revision_awareness: Se ha revisado la lectura de ἐλθόντες y el sintagma temporal para evitar una traducción demasiado literal que sonaría poco natural en español. También se preserva el valor distributivo de ἀνά con una expresión idiomática.
  spanish_consistency_notes:
  - Se mantiene 'denario' de forma coherente con la terminología histórica del POB.
  - '''Llegaron'' evita sobrecargar el participio griego con una construcción perifrástica innecesaria en español.'
  - La nota cultural explica el valor monetario sin alterar el texto principal.
