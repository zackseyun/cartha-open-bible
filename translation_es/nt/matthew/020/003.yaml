translation:
  language: es
  text: Y saliendo cerca de la tercera hora[a], vio a otros de pie en la plaza de mercado[b], sin trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cerca de las nueve de la mañana». La expresión «la tercera hora» refleja el conteo judío del día desde el amanecer.'
    reason: cultural_note
  - marker: b
    text: 'O: «ociosos». El griego dice literalmente «ociosos» o «desocupados», describiendo que no estaban trabajando en ese momento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: going out
  chosen_spanish: saliendo
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una construcción participial natural en español que conserva la acción sucesiva sin recargar la frase.
- source_word: περὶ τρίτην ὥραν
  english_pob_choice: about the third hour
  chosen_spanish: cerca de la hora tercera
  alternatives_spanish:
  - alrededor de la hora tercera
  - cerca de las nueve de la mañana
  lexicon: BDAG
  rationale: Se conserva en el texto principal la expresión horaria judía para mantener la transparencia frente al original; la equivalencia explicativa queda para nota.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - notó
  - observó
  lexicon: BDAG
  rationale: Verbo simple y directo que corresponde al valor narrativo básico de ὁράω.
- source_word: ἄλλους
  english_pob_choice: others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otros hombres
  lexicon: BDAG
  rationale: Se mantiene el sustantivo implícito como en el griego, sin añadir 'hombres' sin necesidad explícita del texto.
- source_word: ἑστῶτας
  english_pob_choice: standing
  chosen_spanish: que estaban
  alternatives_spanish:
  - de pie
  - parados
  lexicon: BDAG
  rationale: El participio perfecto con fuerza estática se expresa de modo natural en español mediante una relativa; el contexto ya deja claro que estaban de pie en la plaza.
- source_word: ἐν τῇ ἀγορᾷ
  english_pob_choice: in the marketplace
  chosen_spanish: en la plaza
  alternatives_spanish:
  - en el mercado
  - en la plaza de mercado
  lexicon: BDAG
  rationale: ἀγορά puede designar la plaza pública o mercado; 'plaza' comunica bien el lugar donde se reunían los jornaleros y evita una sobreespecificación comercial.
- source_word: ἀργούς
  english_pob_choice: idle
  chosen_spanish: ociosos
  alternatives_spanish:
  - sin trabajo
  - inactivos
  lexicon: BDAG
  rationale: '''Ociosos'' transmite la idea de estar sin ocupación en ese momento y conserva la fuerza descriptiva de ἀργός sin convertirla en una categoría económica moderna.'
translation_notes:
  revision_awareness: La versión inglesa reciente se mantuvo sin cambios tras revisión; el español conserva la misma estructura semántica y el mismo nivel de transparencia respecto de la hora judía y de ἀργούς.
  spanish_consistency_notes:
  - Se mantiene 'hora tercera' en el texto principal por transparencia, con nota explicativa para lectores no familiarizados con el cómputo judío.
  - Se eligió 'ociosos' para ἀργούς por ser natural en español y suficientemente fiel a 'idle'.
  - Se evita añadir 'hombres' porque ἄλλους funciona sustantivado y el contexto ya identifica a los trabajadores potenciales.
