revisions:
- from: Y saliendo cerca de la hora tercera[a], vio a otros que estaban ociosos en la plaza.
  to: Y saliendo cerca de la tercera hora[a], vio a otros de pie en la plaza de mercado[b], sin trabajo.
  rationale: Se ajusta «la hora tercera» a «la tercera hora» por naturalidad idiomática; se hace explícito el matiz contextual de ἀργούς con «sin trabajo» en el texto principal y se preserva la alternativa literal «ociosos» en nota, en línea con la auditoría inglesa. También se refuerza el valor de ἀγορά con «plaza de mercado».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:14:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa del griego: ἐξελθὼν = «saliendo», εἶδεν = «vio», ἄλλους = «a otros», ἑστῶτας = «de pie/estaban», y ἀργούς = personas sin trabajo en ese momento. Sin embargo, faltó preservar la alternativa léxica documentada para ἀργούς (''unemployed'' / «sin trabajo») en nota, y «en la plaza» atenúa un poco el valor de ἀγορά como lugar de mercado/reunión pública.'
  spanish_quality_summary: El español es claro y natural, pero «la hora tercera» suena más calcado que idiomático; «la tercera hora» es más natural y sigue siendo transparente. Además, «ociosos» en español puede sugerir pereza moral más que simple falta de empleo, por lo que conviene aclararlo con nota léxica. «Plaza» es posible, pero «plaza de mercado» comunica mejor el entorno de ἀγορά sin sonar forzado.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La revisión propuesta mantiene fidelidad léxica al griego y al rastro de decisiones del POB, especialmente al conservar «la tercera hora» en el texto y añadir la alternativa «sin trabajo» para ἀργούς, como hizo el inglés con «unemployed».
  issues:
  - severity: medium
    issue: Falta la nota léxica correspondiente a ἀργούς.
    rationale: El POB inglés conservó una alternativa importante ('unemployed') para evitar que 'idle' se lea como pereza. En español, «ociosos» necesita aún más esa aclaración porque puede implicar juicio moral.
  - severity: low
    issue: «la hora tercera» suena poco natural en español.
    rationale: Aunque fiel, el orden más idiomático y claramente legible es «la tercera hora», sin perder transparencia frente al original.
  - severity: low
    issue: «en la plaza» puede diluir el sentido de ἀγορά.
    rationale: ἀγορά se refiere al área de mercado/plaza pública; «plaza de mercado» o «mercado» refleja mejor el entorno donde se reunían jornaleros.
  revised_spanish_text: Y saliendo cerca de la tercera hora[a], vio a otros de pie en la plaza de mercado[b], sin trabajo.
  revised_footnotes:
  - marker: a
    text: 'O: «cerca de las nueve de la mañana». La expresión «la tercera hora» refleja el conteo judío del día desde el amanecer.'
    reason: cultural_note
  - marker: b
    text: 'O: «ociosos». El griego dice literalmente «ociosos» o «desocupados», describiendo que no estaban trabajando en ese momento.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «la hora tercera» a «la tercera hora» por naturalidad idiomática; se hace explícito el matiz contextual de ἀργούς con «sin trabajo» en el texto principal y se preserva la alternativa literal «ociosos» en nota, en línea con la auditoría inglesa. También se refuerza el valor de ἀγορά con «plaza de mercado».
