translation:
  language: es
  text: 'Y les dijo: «Vayan ustedes también a la viña, y lo que sea justo[a] se lo daré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que sea recto» o «lo que sea equitativo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνοις
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a esos
  - a aquellos
  lexicon: BDAG
  rationale: El dativo plural demostrativo se refiere a los otros trabajadores ya mencionados. En español, el pronombre átono 'les' conserva la referencia sin recargar la frase con un demostrativo innecesario.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les contó
  lexicon: BDAG
  rationale: '''Decir'' es la traducción narrativa normal de λέγω aquí y mantiene la introducción del discurso directo con naturalidad.'
- source_word: Ὑπάγετε
  english_pob_choice: go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan allá
  - Salgan
  - Vayan a ir
  lexicon: BDAG
  rationale: El imperativo plural de ὑπάγω funciona como una orden simple de ir al lugar indicado. 'Vayan' es idiomático y fiel al mandato.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - ustedes igualmente
  - también ustedes
  - ustedes mismos también
  lexicon: BDAG
  rationale: 'La combinación expresa inclusión y énfasis: estos trabajadores, igual que los anteriores, también son enviados. ''Ustedes también'' conserva ese énfasis de manera natural en español.'
- source_word: ἀμπελῶνα
  english_pob_choice: vineyard
  chosen_spanish: la viña
  alternatives_spanish:
  - el viñedo
  - la viña de uvas
  lexicon: BDAG
  rationale: ἀμπελών designa un viñedo o viña. 'La viña' es el equivalente más natural y tradicional en español bíblico, sin añadir precisión innecesaria.
- source_word: ὃ ἐὰν ᾖ δίκαιον
  english_pob_choice: whatever is right
  chosen_spanish: lo que sea justo
  alternatives_spanish:
  - lo que sea recto
  - lo que sea correcto
  - lo que sea justo o equitativo
  lexicon: BDAG
  rationale: La cláusula neutra relativa significa 'lo que sea justo/recto'. En español, 'lo que sea justo' preserva el sentido moral y la amplitud semántica de δίκαιον sin reducirlo exclusivamente a justicia legal.
- source_word: δώσω ὑμῖν
  english_pob_choice: I will give you
  chosen_spanish: les daré
  alternatives_spanish:
  - se los daré
  - les pagaré
  lexicon: BDAG
  rationale: δίδωμι significa 'dar'. Aunque el contexto es salarial, el griego no usa un verbo explícito de pago; por eso 'les daré' sigue mejor el texto fuente y deja que el contexto sugiera el salario.
theological_decisions:
- issue: Matiz de δίκαιον en un contexto de salario
  english_pob_reading: whatever is right
  chosen_spanish_reading: lo que sea justo
  alternative_spanish_readings:
  - lo que sea recto
  - lo que sea fair / equitativo
  rationale: '''Justo'' conserva la dimensión ética de δίκαιον sin imponer una terminología jurídica más fuerte de la que exige el griego. También evita desplazar el énfasis hacia una noción meramente coloquial de ''fair''.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] en el texto principal exactamente donde corresponde al matiz de δίκαιον, para que la nota quede anclada y auditable.
  spanish_consistency_notes:
  - Se usó 'viña' para ἀμπελῶνα conforme al uso bíblico natural en español.
  - Se evitó 'pagar' porque el verbo griego aquí es δίδωμι ('dar'), no un verbo específico de salario.
  - Se mantuvo 'ustedes' para reflejar el plural del imperativo y de ὑμεῖς, con tono respetuoso y claro.
  - Se prefirió 'justo' como equivalente principal de δίκαιον, preservando la tensión semántica con 'recto' y 'correcto' en la nota.
