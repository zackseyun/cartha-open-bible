translation:
  language: es
  text: 'Jesé engendró a David, el rey[a]. David engendró a Salomón de la mujer de Urías,


    [a] Griego literalmente: «de la [mujer] de Urías», una expresión elíptica que significa «por la mujer de Urías». Mateo no nombra aquí a Betsabé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «de la [mujer] de Urías», una expresión elíptica que significa «de la mujer de Urías». Mateo no nombra aquí a Betsabé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰεσσαὶ
  english_pob_choice: Jesse
  chosen_spanish: Jesé
  alternatives_spanish:
  - Jesse
  lexicon: Transliteración bíblica estándar
  rationale: El nombre propio se adapta a la forma habitual en español bíblico, Jesé, que corresponde al hebreo Yishay y mantiene reconocimiento lector.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró a
  - fue padre de
  lexicon: BDAG
  rationale: En genealogías, γεννάω expresa paternidad/descendencia masculina. «Engendró» conserva esa fuerza genealógica y es natural en español bíblico. «Fue padre de» sería más explicativo, pero menos conciso.
- source_word: τὸν Δαυὶδ τὸν βασιλέα
  english_pob_choice: David the king
  chosen_spanish: a David, el rey
  alternatives_spanish:
  - a David, el rey
  - a David, el rey David
  lexicon: BDAG
  rationale: 'El artículo con βασιλεύς señala a David como una figura específica: «el rey». En español conviene conservar la aposición titulativa sin añadir material ajeno al griego.'
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: Transliteración bíblica estándar
  rationale: Nombre propio estándar en español.
- source_word: Σολομῶνα
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Salomón
  lexicon: Transliteración bíblica estándar
  rationale: Forma bíblica usual en español para el nombre propio Σολομών.
- source_word: ἐκ τῆς τοῦ Οὐρίου
  english_pob_choice: by the wife of Uriah
  chosen_spanish: de la mujer de Urías
  alternatives_spanish:
  - por la esposa de Urías
  - de la esposa de Urías
  - de la mujer de Urías
  lexicon: BDAG
  rationale: El griego dice literalmente «de la [mujer] de Urías», con el sustantivo omitido. «De la mujer de Urías» mantiene la expresión elíptica y la referencia indirecta sin suplir el nombre de Betsabé. «Esposa» sería interpretativo; «mujer» reproduce mejor la ambigüedad deliberada del texto.
- source_word: δέ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona solo como enlace leve en la secuencia genealógica. En español puede omitirse sin pérdida de sentido.
theological_decisions:
- issue: Referencia indirecta a Betsabé por medio de Urías
  english_pob_reading: Retain the indirect expression 'by the wife of Uriah' rather than supplying Bathsheba's name.
  chosen_spanish_reading: Conservar «de la mujer de Urías» en vez de introducir el nombre Betsabé.
  alternative_spanish_readings:
  - de Betsabé
  - de la esposa de Urías
  - de aquella que fue esposa de Urías
  rationale: Mateo mantiene la identificación de la mujer por su relación con Urías, y esa elección conserva la resonancia narrativa y moral de 2 Samuel. Nombrarla Betsabé suavizaría el rasgo literario del pasaje y añadiría información que el griego aquí no da.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso del control cruzado coincide con la lectura principal. Se mantuvo la tensión deliberada del griego en la expresión indirecta sobre la mujer de Urías.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «engendró» para mantener el paralelismo genealógico del griego en una frase breve y auditable.
  - Se evitó suplir «Betsabé» porque la fuente griega no la nombra y el audit trail inglés también preserva la indirecta.
