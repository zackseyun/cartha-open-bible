translation:
  language: es
  text: 'He aquí[a], la virgen[b] concebirá y dará a luz un hijo, y le pondrán por nombre Emanuel[c][d], que traducido significa[e]: «Dios con nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira» o «Miren». En este contexto, el griego Ἰδοὺ funciona como un llamado enfático a prestar atención; «He aquí» preserva mejor el tono profético.
    reason: lexical_alternative
  - marker: b
    text: O «la joven». En el contexto de Mateo, sin embargo, el griego παρθένος y el relato del nacimiento apoyan «la virgen».
    reason: lexical_alternative
  - marker: c
    text: También se translitera «Emmanuel».
    reason: lexical_alternative
  - marker: d
    text: El griego dice «le pondrán por nombre» o literalmente «llamarán», una forma plural indefinida.
    reason: lexical_alternative
  - marker: e
    text: O «que es traducido».
    reason: previous_rendering
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - Mira
  lexicon: BDAG
  rationale: El marcador de atención profética se reproduce con una interjección natural en español. '¡He aquí!' es más tradicional, pero '¡Mira!' comunica con claridad el llamado enfático sin sonar mecánico.
- source_word: παρθένος
  english_pob_choice: virgin
  chosen_spanish: la virgen
  alternatives_spanish:
  - la joven
  - la muchacha
  lexicon: BDAG
  rationale: En Mateo 1:23, el contexto narrativo del nacimiento y la cita de Isaías favorecen claramente 'virgen' como sentido principal. Se conserva la fuerza lexical y teológica del término frente a alternativas más generales.
- source_word: ἐν γαστρὶ ἕξει
  english_pob_choice: will conceive
  chosen_spanish: concebirá
  alternatives_spanish:
  - estará encinta
  - llevará en el vientre
  lexicon: BDAG
  rationale: Aunque la expresión griega es idiomática, en español 'concebirá' expresa de forma natural y precisa el futuro del embarazo. Evita un calco pesado y mantiene el valor del texto fuente.
- source_word: τέξεται
  english_pob_choice: bear
  chosen_spanish: dará a luz
  alternatives_spanish:
  - parirá
  - tendrá
  lexicon: BDAG
  rationale: '''Dará a luz'' es la forma más clara y reverente en español para el acto de parto, y corresponde bien al verbo griego de nacimiento.'
- source_word: υἱόν
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: BDAG
  rationale: '''Un hijo'' es la equivalencia directa y natural del acusativo griego, preservando la referencia masculina sin añadir matiz ajeno.'
- source_word: καλέσουσιν
  english_pob_choice: they will call
  chosen_spanish: llamarán
  alternatives_spanish:
  - lo llamarán
  - se llamará
  lexicon: BDAG
  rationale: El plural indefinido griego se mantiene con una forma impersonal/plural en español. 'Llamarán' conserva la ambigüedad del sujeto sin convertir la frase en pasiva.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: BDAG
  rationale: Es la equivalencia idiomática natural en español para el sintagma posesivo griego.
- source_word: Ἐμμανουήλ
  english_pob_choice: Immanuel
  chosen_spanish: Emanuel
  alternatives_spanish:
  - Emmanuel
  - Immanuel
  lexicon: BDAG
  rationale: Se adopta 'Emanuel' como transliteración ampliamente reconocible en español y coherente con el valor explicativo del nombre. Se evita 'Cristo' o cualquier glosa que altere el nombre propio.
- source_word: μεθερμηνευόμενον
  english_pob_choice: which is translated
  chosen_spanish: que significa
  alternatives_spanish:
  - que traducido es
  - que traducido quiere decir
  lexicon: BDAG
  rationale: En español bíblico, 'que significa' transmite con naturalidad la función explicativa del participio sin sonar forzado. Mantiene la aclaración semántica para el lector.
- source_word: Μεθ’ ἡμῶν ὁ θεός
  english_pob_choice: God with us
  chosen_spanish: Dios con nosotros
  alternatives_spanish:
  - Con nosotros Dios
  - Dios está con nosotros
  lexicon: BDAG
  rationale: Se conserva la estructura nominal breve del griego y el peso teológico de la fórmula. 'Dios con nosotros' es fiel, sobrio y fácilmente reconocible en español.
theological_decisions:
- issue: Sentido de παρθένος en un texto clave para la concepción virginal
  english_pob_reading: virgin
  chosen_spanish_reading: la virgen
  alternative_spanish_readings:
  - la joven
  rationale: El contexto inmediato de Mateo y la tradición interpretativa del pasaje sostienen que el sentido principal aquí es 'virgen'. La alternativa se mantiene implícitamente en el trasfondo de la discusión lexical, pero no desplaza el sentido central del versículo.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Presentación del nombre Emanuel como explicación textual, no como paráfrasis doctrinal
  english_pob_reading: Render the name meaning as 'God with us' without expanding it into a doctrinal paraphrase
  chosen_spanish_reading: 'que significa: “Dios con nosotros”'
  alternative_spanish_readings:
  - Con nosotros es Dios
  - Dios está con nosotros
  rationale: La frase del evangelista debe traducirse como explicación del nombre, no como ampliación doctrinal. 'Dios con nosotros' mantiene la sobriedad del texto y deja intacto el valor interpretativo del nombre.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La redacción española sigue de cerca el griego de Mateo 1:23 y la trayectoria auditada de la POB en inglés. Se mantuvo el nombre propio y la glosa interpretativa, pero se adaptó la sintaxis al español para evitar calcos. Se preservó la tensión lexical de παρθένος como 'virgen' en el texto principal y se documentó la posibilidad alternativa en nota.
  spanish_consistency_notes:
  - Se usa 'Emanuel' como transliteración principal en español, coherente con uso bíblico extendido y legible para audiencias de iglesia.
  - Se optó por 'Dios con nosotros' sin invertir el orden en el texto principal, para respetar la fórmula breve y la explicación dada por el evangelista.
  - La voz plural indefinida de 'llamarán' conserva el sujeto no especificado del griego.
  - Se mantuvo un estilo reverente pero actual, evitando arcaísmos innecesarios como 'he aquí' en el cuerpo principal.
