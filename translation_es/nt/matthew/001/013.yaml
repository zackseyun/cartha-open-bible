translation:
  language: es
  text: Zorobabel engendró a Abiud[a], Abiud engendró a Eliakim, y Eliakim engendró a Azor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue padre de»; en las genealogías bíblicas, el verbo repetido puede presentar el linaje de forma condensada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ζοροβαβὲλ
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubabel
  - Zorobabel
  lexicon: Nombre propio transliterado; cf. uso bíblico establecido
  rationale: Se mantiene el nombre propio por transliteración, no por traducción. «Zorobabel» sigue de cerca la forma griega Ζοροβαβέλ y es una forma comprensible en español bíblico; se evita sustituirlo por una adaptación más interpretativa.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró/engendró a
  lexicon: γεννάω en genealogías
  rationale: En una genealogía, γεννάω funciona de manera fórmula y genealógica. «Engendró» conserva la relación de paternidad/descendencia con suficiente literalidad y mantiene la tensión de si la secuencia resume generaciones o no.
- source_word: Ἀβιούδ
  english_pob_choice: Abiud
  chosen_spanish: Abiud
  alternatives_spanish:
  - Abiúd
  lexicon: Nombre propio transliterado; uso bíblico tradicional
  rationale: Se conserva el nombre propio en transliteración estándar. La forma sin tilde corresponde mejor a un nombre bíblico extranjero y evita introducir acentuación no apoyada por el texto fuente.
- source_word: Ἐλιακίμ
  english_pob_choice: Eliakim
  chosen_spanish: Eliakim
  alternatives_spanish:
  - Eliacim
  lexicon: Nombre propio transliterado; uso bíblico tradicional
  rationale: Se sigue la transliteración bíblica habitual en español para este nombre propio, cercana a la forma griega y ampliamente reconocible.
- source_word: Ἀζώρ
  english_pob_choice: Azor
  chosen_spanish: Azor
  alternatives_spanish:
  - Azór
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio como transliteración simple, sin añadir diacríticos que el español no requiere aquí.
- source_word: δὲ
  english_pob_choice: and / mild connective
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  lexicon: Conector discursivo en secuencia genealógica
  rationale: En español, «y» mantiene el encadenamiento genealógico natural. No se reproduce cada δέ con una adversativa, porque aquí no expresa contraste fuerte sino continuidad de la lista.
theological_decisions:
- issue: El verbo genealógico γεννάω y la posible compresión de generaciones
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
  - fue padre de
  - fue antepasado de
  rationale: La genealogía de Mateo usa una fórmula repetida y comprimida. «Engendró» preserva el valor genealógico directo sin resolver por adelantado si la línea omite generaciones intermedias.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than flatten it.'
translation_notes:
  revision_awareness: El texto fuente griego y el audit trail inglés muestran alta concordancia y sin revisiones aplicadas; se mantiene el valor genealógico de γεννάω y la transliteración estándar de los nombres.
  spanish_consistency_notes:
  - Se usa «engendró» de modo uniforme para el verbo genealógico repetido.
  - Los nombres propios se transliteran sin traducirse ni sustituirse por títulos.
  - Se conserva una coordinación simple con «y» para reflejar la progresión de la lista genealógica.
  - La nota al pie preserva la alternativa semántica documentada por el POB inglés.
