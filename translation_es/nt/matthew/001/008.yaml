translation:
  language: es
  text: 'Asaf engendró a Josafat[a], Josafat engendró a Joram, y Joram engendró a Uzías.


    [a] Algunos manuscritos leen ''Asa'' en lugar de ''Asaf''; ''Asa'' también coincide con el rey de Judá que se espera en la genealogía del Antiguo Testamento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen 'Asa' en lugar de 'Asaf'; 'Asa' también coincide con el rey de Judá que se espera en la genealogía del Antiguo Testamento.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀσὰφ
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asa
  lexicon: BDAG
  rationale: Sigo la forma griega presente en el texto fuente, que corresponde a la transliteración normal del nombre Ἀσάφ. En español, 'Asaf' conserva esa forma sin forzar la armonización histórica; 'Asa' queda como alternativa vinculada a la variante textual y al trasfondo genealógico del AT.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: BDAG
  rationale: En una genealogía, γεννάω expresa descendencia paterna directa. 'Engendró' reproduce esa fuerza genealógica en español con dignidad y sin la expansión más explicativa de 'fue padre de'.
- source_word: Ἰωσαφάτ
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Josaphat
  lexicon: BDAG
  rationale: '''Josafat'' es la forma castellana usual y reconocible del nombre bíblico, y se ajusta bien al flujo de la genealogía.'
- source_word: Ἰωράμ
  english_pob_choice: Joram
  chosen_spanish: Joram
  alternatives_spanish:
  - Jehoram
  lexicon: BDAG
  rationale: El griego Ἰωράμ corresponde de manera natural a 'Joram'. Mantengo la forma breve y estándar en español, reservando 'Jehoram' como reflejo del hebreo más completo.
- source_word: Ὀζίαν
  english_pob_choice: Uzziah
  chosen_spanish: Ozías
  alternatives_spanish:
  - Uzías
  lexicon: BDAG
  rationale: El nombre griego Ὀζίας se translitera de forma directa como 'Ozías'. Aunque 'Uzías' es tradicional en español bíblico, 'Ozías' conserva más de cerca la forma del texto griego; en un registro lector, ambas son transparentes.
theological_decisions:
- issue: Variante textual en el primer nombre de la genealogía
  english_pob_reading: Keep 'Asaph' in the main text and preserve 'Asa' in a footnote.
  chosen_spanish_reading: Mantener 'Asaf' en el texto principal y señalar en nota la variante 'Asa'.
  alternative_spanish_readings:
  - Usar 'Asa' en el texto principal por armonización con la genealogía del AT.
  rationale: La prioridad del texto fuente requiere reflejar la forma griega transmitida, sin corregirla silenciosamente según el trasfondo histórico. La nota preserva la tensión documental entre la lectura griega y la identificación genealógica esperada.
  doctrine_reference: Translation philosophy §1
- issue: Cadena genealógica con repeticiones de δὲ y ἐγέννησεν
  english_pob_reading: Compress the repeated clauses into smooth English while retaining each father-son link.
  chosen_spanish_reading: Conservar la secuencia genealógica en español con repeticiones naturales de 'engendró'.
  alternative_spanish_readings:
  - Asaf fue padre de Josafat; Josafat fue padre de Joram; y Joram fue padre de Ozías.
  rationale: La repetición del verbo en el griego forma parte del tejido genealógico. 'Engendró' permite mantener esa estructura con claridad y sin perder el enlace padre-hijo de cada tramo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por eso el borrador español mantiene la lectura griega documentada y conserva la nota textual sobre la variante de nombre sin armonizarla en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo 'engendró' para la fuerza genealógica de γεννάω, coherente con la política POB de preservar el enlace paterno sin suavizarlo a una formulación menos directa.
  - Se usó 'Ozías' en vez de 'Uzías' para seguir la transliteración más cercana al griego; si el proyecto prefiere la forma castellana tradicional, puede armonizarse sin afectar la estructura del verso.
  - La puntuación con coma y 'y' final reproduce una cadencia natural en español para la lista genealógica.
