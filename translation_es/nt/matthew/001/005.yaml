review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura genealógica del griego, mantiene explícitas las referencias maternas introducidas por ἐκ y refleja adecuadamente el valor secuencial de δέ con «y». Los nombres principales corresponden al referente canónico. Sin embargo, la elección «por Rahab / por Rut» en español suena menos natural para filiación que «de Rahab / de Rut», precisamente la alternativa documentada en la nota inglesa; además, falta el anclaje [a] también junto a «Rut» si la nota cubre ambas expresiones, como indica el texto de la nota.
  spanish_quality_summary: El español es claro y legible, pero «fue padre de ... por Rahab / por Rut» resulta algo forzado en registro bíblico-natural. «Fue padre de ... de Rahab / de Rut» o «engendró ... de Rahab / de Rut» suena más idiomático para genealogía. Dado que el propio borrador evita arcaísmo, conviene mantener «fue padre de» y ajustar solo la preposición. También debe corregirse la colocación de la nota para que corresponda exactamente a los dos lugares mencionados.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. Las formas onomásticas españolas «Salmón», «Booz», «Obed», «Rut» y «Jesé» son defendibles por continuidad canónica en español. La principal cuestión léxica es ἐκ: la documentación inglesa permite «from», y en español «de» preserva mejor ese valor de procedencia materna que «por».'
  issues:
  - severity: medium
    issue: La preposición «por» para ἐκ con nombres de madre suena poco natural en español genealógico.
    rationale: Aunque calca la solución idiomática inglesa «by», el griego ἐκ expresa procedencia/origen, y en español «de Rahab / de Rut» comunica mejor la parentela materna sin extrañeza estilística.
  - severity: medium
    issue: La nota [a] aparece solo tras «Rahab», pero su contenido también cubre «de Rut».
    rationale: Las instrucciones exigen que el marcador exacto aparezca en el texto en el lugar pertinente. Si una sola nota explica ambas expresiones, el mismo marcador debe anclarse donde corresponda, o reformularse la nota para referirse solo al primer caso.
  revised_spanish_text: Salmón fue padre de Booz de Rahab[a], y Booz fue padre de Obed de Rut[a], y Obed fue padre de Jesé,
  revision_rationale: Se cambia «por» a «de» para reflejar con más naturalidad en español el valor de ἐκ en la fórmula genealógica y se añade el anclaje [a] también en «Rut» porque la nota explica ambas expresiones («de Rahab» y «de Rut»). Se conserva «fue padre de» por claridad moderna y continuidad con la decisión auditada sobre γεννάω.
