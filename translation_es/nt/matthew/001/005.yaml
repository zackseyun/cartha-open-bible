translation:
  language: es
  text: Salmón fue padre de Booz de Rahab[a], y Booz fue padre de Obed de Rut[a], y Obed fue padre de Jesé,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de Rahab” y “de Rut”. El griego usa ἐκ con cada nombre de madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: fue padre de
  alternatives_spanish:
  - engendró
  - engendró a
  - fue el padre de
  lexicon: BDAG
  rationale: En la genealogía de Mateo, γεννάω marca la línea genealógica paterna. En español, “fue padre de” conserva ese valor relacional de manera natural y clara, sin el arcaísmo de “engendró” ni la rigidez de una calca.
- source_word: ἐκ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - de
  - a través de
  lexicon: BDAG
  rationale: Con los nombres de las madres, ἐκ señala el origen/parentesco materno. En español, “por Rahab” y “por Rut” preserva esa inclusión maternal en una forma breve y legible. “De” sería más literal, pero en esta construcción puede sonar menos natural y menos explícito para el vínculo personal.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - ahora
  - pero
  - entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace suave dentro de una secuencia genealógica. “Y” reproduce ese valor conectivo sin introducir contraste.
- source_word: Σαλμὼν
  english_pob_choice: Salmon
  chosen_spanish: Salmón
  alternatives_spanish:
  - Salmon
  lexicon: BDAG
  rationale: Se usa la forma española estándar del nombre bíblico, con acento ortográfico propio del español.
- source_word: Βόες
  english_pob_choice: Boaz
  chosen_spanish: Booz
  alternatives_spanish:
  - Boaz
  lexicon: BDAG
  rationale: Aunque el griego presenta Βόες, la figura bíblica se reconoce en español tradicionalmente como Booz. Esta forma conserva la continuidad canónica con Rut y la genealogía de Mateo.
- source_word: Ῥαχάβ
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  alternatives_spanish:
  - Rajab
  - Racab
  lexicon: BDAG
  rationale: Se conserva la forma bíblica ampliamente reconocible en español. “Rajab” o “Racab” son menos transparentes para lectores bíblicos contemporáneos.
- source_word: Ἰωβὴδ
  english_pob_choice: Obed
  chosen_spanish: Obed
  alternatives_spanish:
  - Jobed
  lexicon: BDAG
  rationale: Se mantiene la forma establecida en español para asegurar continuidad con el relato de Rut y la tradición bíblica en castellano.
- source_word: Ῥούθ
  english_pob_choice: Ruth
  chosen_spanish: Rut
  alternatives_spanish:
  - Ruth
  lexicon: BDAG
  rationale: En español bíblico estándar, el nombre se adapta como Rut. Esta forma es la usual en traducciones y facilita la lectura pública.
- source_word: Ἰεσσαί
  english_pob_choice: Jesse
  chosen_spanish: Jesé
  alternatives_spanish:
  - Jesse
  lexicon: BDAG
  rationale: La forma española tradicional es Jesé. Mantiene la identificación inmediata con el padre de David y con la tradición bíblica en español.
theological_decisions:
- issue: Inclusion of mothers in the genealogy
  english_pob_reading: Retain explicit maternal references with 'by Rahab' and 'by Ruth' while preserving the paternal genealogy with 'fathered.'
  chosen_spanish_reading: Mantener las referencias maternas explícitas con “por Rahab” y “por Rut”, sin borrar la línea paterna con “fue padre de”.
  alternative_spanish_readings:
  - Salmón fue padre de Booz de Rahab
  - Salmón engendró a Booz de Rahab
  - Salmón fue padre de Booz y Booz fue padre de Obed
  rationale: El griego usa ἐκ con cada madre, lo que introduce un rasgo notable de la genealogía. La redacción española debe conservar esa visibilidad materna, evitando una paráfrasis que la neutralice o la oculte.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El contexto de auditoría inglesa muestra alta coincidencia y ninguna revisión pendiente; por eso no se introducen cambios textuales adicionales, solo una adaptación española fiel a la misma solución interpretativa.
  spanish_consistency_notes:
  - Se mantiene la genealogía en serie con coordinación simple por “y”, acorde con el flujo del griego.
  - Los nombres propios se presentan en formas españolas bíblicas estándar para favorecer reconocimiento canónico.
  - Se conserva la nota sobre las madres porque el rasgo sintáctico de ἐκ es significativo y no debe borrarse en español.
