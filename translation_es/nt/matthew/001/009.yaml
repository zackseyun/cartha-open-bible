translation:
  language: es
  text: Uzías engendró a Jotam[a], y Jotam engendró a Acaz, y Acaz engendró a Ezequías,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego ἐγέννησεν se traduce aquí con ‘engendró’ para conservar la fórmula genealógica repetida; en castellano también podría decirse ‘fue el padre de’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀζίας
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Ozías
  lexicon: nombre propio bíblico
  rationale: Se sigue la forma castellana establecida para el rey de Judá, cercana al nombre hebreo y transparente para lectores bíblicos en español. ‘Ozías’ refleja más la forma griega, pero ‘Uzías’ es la convención bíblica más reconocible en español y conserva mejor la identificación histórica.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue el padre de
  - engendró a
  lexicon: γεννάω
  rationale: En genealogías, γεννάω expresa descendencia paterna directa. ‘Engendró’ conserva la fuerza genealógica y el ritmo repetitivo del texto. Se evita una expansión más explicativa como ‘fue el padre de’, que sería clara pero menos compacta.
- source_word: Ἰωαθάμ
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Joatam
  lexicon: nombre propio bíblico
  rationale: Se adopta la forma tradicional y más usada en español para el rey de Judá. ‘Jotam’ mantiene la identificación bíblica y evita una transliteración menos natural para el lector hispanohablante.
- source_word: Ἀχάζ
  english_pob_choice: Ahaz
  chosen_spanish: Acaz
  alternatives_spanish:
  - Ajaz
  lexicon: nombre propio bíblico
  rationale: La forma española bíblica común es ‘Acaz’. Aunque el griego muestra Ἀχάζ, la convención castellana asentada favorece esta forma, que además es la más reconocible en contextos de historia de Judá.
- source_word: Ἑζεκίαν
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: nombre propio bíblico
  rationale: Se usa la forma bíblica española estándar para el rey de Judá. ‘Ezequías’ es plenamente natural en español y corresponde al nombre hebreo transmitido en la tradición bíblica.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y luego
  - además
  lexicon: δέ
  rationale: En esta serie genealógica, δέ funciona como conector suave de avance. ‘Y’ reproduce el encadenamiento del texto sin añadir matiz adversativo ni temporal que el contexto no exige.
theological_decisions:
- issue: Alcance genealógico de γεννάω
  english_pob_reading: Rendered as direct genealogical succession ('fathered') without expanding to a broader 'was the ancestor of' in the main text.
  chosen_spanish_reading: 'Se traduce con una sucesión genealógica directa: ‘engendró’.'
  alternative_spanish_readings:
  - fue el padre de
  - fue antepasado de
  rationale: La frase presenta la fórmula genealógica repetida de Mateo sin ampliar su alcance. ‘Engendró’ preserva la relación paterna explícita y el patrón literario del versículo, evitando una paráfrasis interpretativa innecesaria.
  doctrine_reference: 'Principio de equivalencia óptima: mantener lo que el texto dice con precisión, sin expandir la genealogía más allá de su formulación.'
translation_notes:
  revision_awareness: Se tomó como base el expediente inglés con acuerdo alto y sin revisiones aplicadas. La redacción española mantiene la estructura genealógica tripartita y la elección de un verbo genealógico directo, ajustando los nombres propios a las formas bíblicas corrientes en español.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y genealógico, sin expandir la secuencia con conectores innecesarios.
  - Los nombres propios siguen formas bíblicas españolas consolidadas para facilitar reconocimiento y consistencia en toda la obra.
  - Se conservó el orden y la repetición del patrón verbal para reflejar el paralelismo del original.
