translation:
  language: es
  text: Abraham engendró a Isaac[a], y Isaac engendró a Jacob, y Jacob engendró a Judá y a sus hermanos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegó a ser el padre de». El verbo griego también puede expresarse de modo más formal como «fue padre de».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue el padre de
  - hizo padre a
  lexicon: BDAG
  rationale: En una genealogía, γεννάω conserva fuerza de paternidad/descendencia. En español, «engendró» es la forma tradicional y precisa que mantiene el valor genealógico sin volverse perifrástica. «Fue el padre de» sería más explícito pero menos ágil; «hizo padre a» no es idiomático en este contexto.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ solo enlaza los eslabones de la genealogía. «Y» reproduce el flujo secuencial natural del español sin introducir contraste ni matiz discursivo adicional.
- source_word: Ἀβραάμ / Ἰσαάκ / Ἰακώβ
  english_pob_choice: Abraham / Isaac / Jacob
  chosen_spanish: Abraham / Isaac / Jacob
  lexicon: BDAG
  rationale: Se conservan los nombres propios en sus formas españolas estándar, que son ampliamente reconocibles y corresponden a las convenciones bíblicas del español.
- source_word: Ἰούδαν
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judas
  lexicon: BDAG
  rationale: El referente es el patriarca hijo de Jacob, no Judas del período del Nuevo Testamento. En español, «Judá» señala correctamente a la figura del Antiguo Testamento y evita ambigüedad.
- source_word: ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos de sangre
  lexicon: BDAG
  rationale: ἀδελφοί es masculino plural y en este contexto designa específicamente a los hermanos varones de Judá, los otros hijos de Jacob. «Sus hermanos» es natural en español y preserva el referente masculino sin necesidad de explicitarlo.
theological_decisions:
- issue: Elección del verbo genealógico
  english_pob_reading: Use 'fathered' throughout the genealogy
  chosen_spanish_reading: Usar «engendró» de manera consistente en la genealogía
  alternative_spanish_readings:
  - usar «fue el padre de»
  - usar «engendró a» con más perífrasis
  rationale: La genealogía subraya la línea paterna de descendencia. «Engendró» preserva esa fuerza semántica con una forma bíblica estable en español. No se introduce ninguna implicación adicional sobre la inmediatez o extensión de la descendencia.
  doctrine_reference: Tradición genealógica bíblica; equivalencia óptima y claridad moderna.
translation_notes:
  revision_awareness: 'El texto sigue la revisión estable más reciente del POB inglés para Mateo 1:2, sin cambios sustantivos en la lectura: mantiene el verbo genealógico en una forma clara y moderna, preserva la secuencia coordinada de la genealogía y distingue correctamente a Judá del nombre Judas.'
  spanish_consistency_notes:
  - Se mantiene «engendró» como equivalente principal de γεννάω en genealogías, coherente con el valor genealógico documentado.
  - Se usa «y» para δέ en serie genealógica, evitando sobreinterpretación discursiva.
  - «Judá» se conserva como forma bíblica estándar en español para el patriarca.
  - La nota al pie ofrece una alternativa formal sin desplazar el texto principal.
