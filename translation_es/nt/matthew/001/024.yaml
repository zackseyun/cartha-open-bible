review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: ἐγερθεὶς… ἐποίησεν… καὶ παρέλαβεν está bien representado por «despertado… hizo… y tomó». «Esposa» para γυνή encaja con el contexto legal-matrimonial. La nota sobre παρέλαβεν preserva correctamente la alternativa léxica de ‘recibir/tomar para sí’. El punto que requiere corrección es ὁ ἄγγελος κυρίου: en este versículo la fuente inmediata es griega κύριος, y el audit trail inglés/documentación teológica fijan aquí «the angel of the Lord», no una sustitución automática por «Yahvé».'
  spanish_quality_summary: El español es claro y digno. Sin embargo, «hizo como le había mandado» suena menos natural y algo más perifrástico que «hizo como le mandó» o «hizo tal como le mandó». Además, conviene mantener la fórmula bíblica idiomática «el ángel del Señor» en este contexto griego y documentado. El resto del verso fluye bien en español eclesial contemporáneo.
  glossary_alignment: Alineación parcial con la terminología del proyecto. «Jesús/José/esposa» no presentan problema. La desviación principal es la aplicación de «Yahvé» a κυρίου en una frase donde el expediente inglés y la decisión teológica del proyecto para este caso específico prefieren «Lord/Señor». Dado que la instrucción general pide explicar cuando κύριος cita o alude al nombre divino, aquí debe conservarse «Señor» por fidelidad al source/audit trail, no imponerse «Yahvé».
  issues:
  - severity: high
    issue: «el ángel de Yahvé» no sigue la evidencia inmediata ni la decisión auditada para ὁ ἄγγελος κυρίου
    rationale: La fuente es griega κύριος, no el tetragrámaton explícito, y el POB inglés documenta específicamente «the angel of the Lord». En este pasaje debe preservarse la fórmula «el ángel del Señor» en español, explicando la excepción al default de «Yahvé».
  - severity: medium
    issue: «hizo como le había mandado» introduce un pluscuamperfecto no necesario
    rationale: Aunque la anterioridad puede inferirse, el aoristo προσέταξεν se expresa de manera más directa y natural en español narrativo con «le mandó» o «le ordenó», manteniendo mejor la simplicidad del griego.
  revised_spanish_text: Entonces José[a], habiendo despertado del sueño, hizo como le mandó el ángel del Señor y tomó a su esposa.
  revised_footnotes:
  - marker: a
    text: O «recibió a su esposa» o «tomó a su esposa para sí». El verbo griego puede llevar la idea de tomar a alguien en la propia casa.
    reason: lexical_alternative
  revision_rationale: Se corrige «Yahvé» a «Señor» para ajustarse a la fuente griega inmediata, a la fórmula mateana «ὁ ἄγγελος κυρίου» y al audit trail doctrinal/lexical del POB para este versículo. También se simplifica «le había mandado» a «le mandó» para reflejar con más naturalidad el aoristo narrativo sin sobreinterpretación temporal. Se conserva la nota léxica sobre παρέλαβεν.
