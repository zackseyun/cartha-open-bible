revisions:
- from: Entonces José[a], habiendo despertado del sueño, hizo como le había mandado el ángel de Yahvé y tomó a su esposa.
  to: Entonces José[a], habiendo despertado del sueño, hizo como le mandó el ángel del Señor y tomó a su esposa.
  rationale: Se corrige «Yahvé» a «Señor» para ajustarse a la fuente griega inmediata, a la fórmula mateana «ὁ ἄγγελος κυρίου» y al audit trail doctrinal/lexical del POB para este versículo. También se simplifica «le había mandado» a «le mandó» para reflejar con más naturalidad el aoristo narrativo sin sobreinterpretación temporal. Se conserva la nota léxica sobre παρέλαβεν.
  reviewer_model: gpt-5.4
