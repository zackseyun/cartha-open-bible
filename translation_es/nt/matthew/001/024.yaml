translation:
  language: es
  text: Entonces José[a], habiendo despertado del sueño, hizo como le mandó el ángel del Señor y tomó a su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibió a su esposa» o «tomó a su esposa para sí». El verbo griego puede llevar la idea de tomar a alguien en la propia casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθεὶς
  english_pob_choice: having awakened
  chosen_spanish: habiendo despertado
  alternatives_spanish:
  - después de despertar
  - cuando despertó
  - levantado
  lexicon: BDAG
  rationale: El participio aoristo pasivo aquí funciona de manera intransitiva y marca la secuencia narrativa. «Habiendo despertado» conserva el valor participial y la referencia al despertar del sueño sin sonar artificial en español.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - y
  - ahora
  - pero
  lexicon: BDAG
  rationale: δέ introduce progreso narrativo, no contraste fuerte. «Entonces» reproduce bien ese avance temporal en español natural.
- source_word: ἀπὸ τοῦ ὕπνου
  english_pob_choice: from sleep
  chosen_spanish: del sueño
  alternatives_spanish:
  - de su sueño
  - tras el sueño
  lexicon: BDAG
  rationale: La expresión idiomática indica que José despierta del sueño. «Del sueño» es fiel, conciso y no añade posesivo que el griego no expresa.
- source_word: ἐποίησεν ὡς
  english_pob_choice: did as
  chosen_spanish: hizo como
  alternatives_spanish:
  - hizo según
  - actuó como
  - hizo tal como
  lexicon: BDAG
  rationale: La construcción expresa conformidad con una orden. «Hizo como» es breve y natural, y mantiene la relación de obediencia del griego.
- source_word: προσέταξεν
  english_pob_choice: commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había instruido
  lexicon: BDAG
  rationale: «Mandar» comunica bien la fuerza directiva del verbo y funciona con un sujeto angélico sin perder autoridad. El pluscuamperfecto en español refleja adecuadamente la anterioridad respecto a la acción de José.
- source_word: ὁ ἄγγελος κυρίου
  english_pob_choice: the angel of the Lord
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el ángel del Señor
  - el ángel de Dios
  lexicon: BDAG
  rationale: El proyecto usa «Yahvé» para יהוה; aquí la construcción griega κυρίου evoca la fórmula bíblica del mensajero divino. Aunque el inglés usa «Lord», en español se prefiere «Yahvé» para transparentar el nombre divino en la referencia bíblica subyacente, conforme a la norma del proyecto.
- source_word: παρέλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - la llevó a su casa
  - la tomó para sí
  lexicon: BDAG
  rationale: παραλαμβάνω puede significar «tomar/recibir para uno mismo». En este contexto matrimonial, «tomó» es la opción más directa y deja la implicación social en el contexto, sin sobreexplicar en el texto principal.
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  - a la que era su esposa
  - a su mujer como esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa» según el contexto. Aquí el marco legal-matrimonial de Mateo hace que «esposa» sea la lectura natural y clara en español, sin afirmar más de lo que el pasaje dice.
theological_decisions:
- issue: Cómo reflejar κύριος en ὁ ἄγγελος κυρίου
  english_pob_reading: the angel of the Lord
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el ángel del Señor
  - el ángel de Dios
  rationale: Aunque el audit trail inglés conserva «Lord», la política del proyecto para יהוה/YHWH es traducirlo como «Yahvé» en el texto principal. En esta fórmula veterotestamentaria de mensajero divino, «el ángel de Yahvé» es la forma más transparente para el lector español y evita la máscara devocional «SEÑOR».
  doctrine_reference: 'Contested terms: κύριος → Lord; project default for YHWH → Yahvé'
- issue: Cómo traducir γυνή en un contexto previo a la consumación
  english_pob_reading: his wife
  chosen_spanish_reading: a su esposa
  alternative_spanish_readings:
  - a su mujer
  - a la mujer que era su esposa
  rationale: Aunque el pasaje siguiente aclara que no hubo relaciones conyugales aún, el contexto narrativo de Mateo ya sitúa a María dentro del marco legal del matrimonio. «Esposa» refleja ese estatus sin introducir una consumación no mencionada aquí.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el registro inglés más reciente; el acuerdo de revisión fue alto y el pasaje quedó sin cambios, por lo que el español sigue de cerca el texto fuente y las decisiones auditadas existentes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se conserva «esposa» para γυνή en este contexto marital, en armonía con la lectura contextual del inglés POB.
  - La nota al pie marca la ambigüedad de παρέλαβεν sin introducir una paráfrasis larga en el texto principal.
  - «Entonces» y el pluscuamperfecto «había mandado» ayudan a expresar la secuencia narrativa sin pérdida de sentido.
