translation:
  language: es
  text: 'Y Jacob engendró a José, el esposo de María, de la cual nació Jesús[b], quien es llamado el Mesías[a].


    [a] O: «quien es llamado el Cristo». Aquí χριστός se traduce como título, «Mesías», porque todavía no funciona como forma de nombre propio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que es llamado el Cristo». Aquí χριστός se traduce como título, «Mesías», porque no funciona todavía como forma de nombre propio.'
    reason: alternative_reading
  - marker: b
    text: 'O: «de quien fue nacido Jesús, el llamado el Mesías». El orden español se ajusta para que la relación con María y la identificación de Jesús resulten naturales sin cambiar el sentido.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ aquí enlaza suavemente la genealogía; en español, 'Y' conserva la continuidad sin introducir un contraste que el contexto no exige.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: BDAG
  rationale: En la genealogía, γεννάω expresa generación/paternidad. 'Engendró' conserva la fuerza genealógica y el registro formal sin sonar tan explicativo como 'fue padre de'.
- source_word: ἄνδρα
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - hombre
  lexicon: BDAG
  rationale: Con 'de María', ἀνήρ indica claramente relación marital. 'Esposo' es el equivalente natural y digno en español; 'marido' sería más coloquial.
- source_word: ἐξ ἧς
  english_pob_choice: from whom
  chosen_spanish: de quien
  alternatives_spanish:
  - de la cual
  - de ella
  lexicon: BDAG
  rationale: La referencia femenina singular apunta a María y marca el giro respecto a la fórmula masculina repetida en la genealogía. 'De quien' mantiene la relación de procedencia con un español fluido.
- source_word: ἐγεννήθη
  english_pob_choice: was born
  chosen_spanish: nació
  alternatives_spanish:
  - fue nacido
  - fue engendrado
  lexicon: BDAG
  rationale: El pasivo de γεννάω, aplicado a Jesús, cambia del engendrar masculino a la nacencia desde María. 'Nació' comunica bien ese cambio en español moderno y conserva la pasiva semántica del contexto.
- source_word: ὁ λεγόμενος
  english_pob_choice: who is called
  chosen_spanish: el llamado
  alternatives_spanish:
  - el que es llamado
  - el que llaman
  lexicon: BDAG
  rationale: La construcción participial identifica a Jesús por el título con que es conocido. 'El llamado' es breve, natural y deja visible el carácter identificador de la frase.
- source_word: χριστός
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí χριστός funciona como título, no como nombre propio. Siguiendo la decisión POB de traducir el título, 'Mesías' preserva el sentido ungido/escatológico en español.
theological_decisions:
- issue: Término Χριστός como título en una fórmula identificatoria
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'El griego presenta χριστός con artículo y en función descriptiva: ''el llamado Mesías''. Traducirlo mantiene el valor titular y evita convertirlo en un nombre eclesiástico fijo donde el texto lo usa como identificación.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → ''Mesías'' cuando es título; ''Cristo'' cuando es forma ya fijada como nombre'
- issue: Cambio deliberado entre la genealogía masculina y el nacimiento de Jesús
  english_pob_reading: Joseph is fathered by Jacob, but Jesus is born from Mary
  chosen_spanish_reading: Jacob engendra a José, pero de María nació Jesús
  alternative_spanish_readings:
  - José es padre de Jesús
  - Jesús fue engendrado por José
  rationale: El griego pasa de un verbo activo de engendrar en la línea masculina a un pasivo con sujeto femenino ('de quien'). La traducción conserva ese giro y no lo armoniza para evitar borrar la tensión textual sobre la procedencia de Jesús.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión del inglés en cuanto a fluidez y orden de palabras: mantiene la estructura genealógica, coloca a Jesús junto a la cláusula identificatoria y conserva el giro de procedencia desde María sin suavizarlo doctrinalmente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando aparezca el nombre divino; aquí no aplica.
  - '''Mesías'' se usa para χριστός como título; no se introduce ''Cristo'' salvo como alternativa anotada.'
  - '''Engendró'' conserva la fuerza genealógica de γεννάω en la línea de Jacob y José.'
  - '''Nació'' evita un calco pesado y mantiene la diferencia entre engendrar y nacer.'
  - Las notas a y b están ancladas exactamente en el texto para cumplir la trazabilidad editorial.
  manual_repairs:
