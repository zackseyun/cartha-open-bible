translation:
  language: es
  text: Ezequías engendró a Manasés[a], Manasés engendró a Amós, y Amós engendró a Josías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones leen «Amon» aquí, armonizando el nombre con el rey de Judá de 2 Reyes 21; el griego de Mateo lee «Amós».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: BDAG
  rationale: En una genealogía, γεννάω expresa la relación de paternidad/descentencia masculina. En español, «engendró» mantiene esa fuerza genealógica de forma breve y natural, sin perder la línea formal del griego. «Fue padre de» sería más explícito pero más perifrástico.
- source_word: Ἑζεκίας
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequias
  lexicon: Convención bíblica hispana
  rationale: El nombre propio se adapta a la forma bíblica establecida en español. «Ezequías» es la equivalencia reconocible y estándar para el rey de Judá.
- source_word: Μανασσῆς
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasé
  lexicon: Convención bíblica hispana
  rationale: Se usa la forma tradicional y reconocible del nombre propio en español, correspondiente a la transliteración habitual de Manasseh.
- source_word: Ἀμώς
  english_pob_choice: Amos
  chosen_spanish: Amós
  alternatives_spanish:
  - Amon
  lexicon: BDAG / forma griega del texto
  rationale: El texto griego de Mateo lee Ἀμώς, por lo que la traducción debe reflejar esa forma directamente como «Amós». Aunque el trasfondo histórico del rey de Judá suele identificarse con «Amon», la lectura griega transmitida por Mateo no se armoniza en el cuerpo del texto.
- source_word: Ἰωσίας
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josia
  lexicon: Convención bíblica hispana
  rationale: Se conserva la forma bíblica establecida en español para el nombre propio, fiel a la transliteración convencional de Ἰωσίας.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  lexicon: BDAG
  rationale: En esta secuencia genealógica, δέ funciona como enlace simple de continuidad. «Y» reproduce bien la progresión de la lista en español sin sobredeterminar contraste ni temporalidad.
theological_decisions:
- issue: Diferencia onomástica entre el griego de Mateo y el nombre más conocido del rey en 2 Reyes 21
  english_pob_reading: Follow the Greek text's personal name 'Amos' in the main text
  chosen_spanish_reading: 'Seguir la forma griega del texto: «Amós»'
  alternative_spanish_readings:
  - «Amon» para armonizar con 2 Reyes 21
  rationale: La POB privilegia el testimonio del texto fuente. Dado que el griego de Mateo dice Ἀμώς, el texto español debe conservar esa lectura, aun cuando el lector pueda notar la tensión con el nombre histórico más conocido. La armonización se reserva para la nota, no para el cuerpo del versículo.
  doctrine_reference: Principio de primacía del texto original; preservar tensiones textuales en lugar de resolverlas implícitamente
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje base; la solución mantiene la lectura griega de Mateo y conserva la alternativa histórica en nota.'
  spanish_consistency_notes:
  - Se usa «engendró» para mantener la fuerza genealógica del verbo griego, en coherencia con el registro bíblico.
  - Los nombres propios siguen las formas bíblicas estándar en español para facilitar la lectura pública.
  - La conjunción «y» se usa como enlace genealógico natural en español.
  - Se conserva la tensión textual entre «Amós» y la posible armonización con «Amon» mediante nota, sin alterarla en el texto principal.
