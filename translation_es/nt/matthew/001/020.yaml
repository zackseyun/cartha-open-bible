    [a] O, «tomar a María, tu esposa». La expresión griega se refiere a recibirla en tu casa como esposa dentro del matrimonio.'
  revision_rationale: Se añadió la nota [a] a «estas cosas» para preservar la alternativa documentada por el POB inglés en el mismo lugar del versículo. Se cambió «recibir a María, tu esposa» por «tomar contigo a María, tu esposa» para reflejar mejor παραλαβεῖν en contexto matrimonial y mantener un español natural. Se cambió «engendrado» por «concebido» porque expresa mejor el sentido prenatal de τὸ ἐν αὐτῇ γεννηθὲν y alinea la traducción con la decisión lexical auditada en inglés. También se reordenó levemente «un ángel de Yahvé se le apareció» para una sintaxis española más fluida.
