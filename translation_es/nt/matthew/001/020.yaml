translation:
  language: es
  text: 'Pero mientras él consideraba estas cosas[a], he aquí, un ángel de Yahvé se le apareció en sueños, diciendo: «José, hijo de David, no temas tomar contigo a María, tu esposa, porque lo que ha sido concebido en ella proviene del Espíritu Santo».


    [a] O, «tomar a María, tu esposa». La expresión griega se refiere a recibirla en tu casa como esposa dentro del matrimonio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tomar a María, tu esposa». La expresión griega se refiere a recibirla en tu casa como esposa dentro del matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνθυμηθέντος
  english_pob_choice: was considering
  chosen_spanish: consideraba
  alternatives_spanish:
  - estaba pensando
  - reflexionaba
  - meditaba
  lexicon: BDAG
  rationale: El participio genitivo absoluto expresa una deliberación interna en curso; «consideraba» comunica bien la reflexión sin implicar una decisión ya cerrada.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: BDAG
  rationale: «He aquí» mantiene el valor discursivo de interrupción vívida y se lee de manera natural en español bíblico sin volverlo demasiado arcaico.
- source_word: ἄγγελος κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel de Yahvé
  alternatives_spanish:
  - un ángel del Señor
  - el ángel de Yahvé
  lexicon: BDAG
  rationale: Aunque el griego no tiene artículo con ἄγγελος, en español la expresión fluye de forma natural con artículo indefinido. Se usa «Yahvé» conforme al criterio del proyecto para κύριος cuando nombra a Dios, en vez de enmascararlo como «SEÑOR».
- source_word: κατ’ ὄναρ
  english_pob_choice: in a dream
  chosen_spanish: en sueños
  alternatives_spanish:
  - en un sueño
  - mientras dormía
  lexicon: BDAG
  rationale: La locución griega es idiomática; «en sueños» reproduce la experiencia onírica de forma natural y concisa en español.
- source_word: ἐφάνη
  english_pob_choice: appeared
  chosen_spanish: se le apareció
  alternatives_spanish:
  - apareció
  - se mostró
  lexicon: BDAG
  rationale: «Se le apareció» expresa la aparición revelatoria con claridad narrativa y conserva el matiz dirigido a José.
- source_word: υἱὸς Δαυίδ
  english_pob_choice: son of David
  chosen_spanish: hijo de David
  alternatives_spanish:
  - descendiente de David
  - hijo davídico
  lexicon: BDAG
  rationale: La traducción literal preserva la resonancia genealógica y mesiánica del vocativo.
- source_word: μὴ φοβηθῇς
  english_pob_choice: do not be afraid
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no te asustes
  lexicon: BDAG
  rationale: «No temas» es una prohibición natural y fiel al valor de φοβέομαι en este contexto.
- source_word: παραλαβεῖν Μαρίαν τὴν γυναῖκά σου
  english_pob_choice: to take Mary your wife
  chosen_spanish: recibir a María, tu esposa
  alternatives_spanish:
  - tomar a María, tu esposa
  - llevar a María, tu esposa
  - acoger a María, tu esposa
  lexicon: BDAG
  rationale: παραλαμβάνω aquí alude a recibirla en la casa y en el vínculo matrimonial; «recibir» mantiene la fuerza verbal sin forzar una formulación más interpretativa. «Tu esposa» refleja γυνή en este contexto como esposa, no simplemente mujer.
- source_word: γυναῖκά
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - mujer-esposa
  lexicon: BDAG
  rationale: En el contexto de desposorio/matrimonio, «esposa» comunica de modo claro el sentido contextual de γυνή y evita la ambigüedad de «mujer» en español.
- source_word: τὸ ἐν αὐτῇ γεννηθὲν
  english_pob_choice: what has been conceived in her
  chosen_spanish: lo que ha sido engendrado en ella
  alternatives_spanish:
  - lo que ha sido concebido en ella
  - el hijo concebido en ella
  - lo nacido en ella
  lexicon: BDAG
  rationale: El participio neutro sustantivado se vuelve «lo que». Se eligió «engendrado» para mantener más cerca el valor de γεννάω, aunque en español «concebido» es una alternativa válida y más explicitada biológicamente.
- source_word: ἐκ πνεύματός ἐστιν ἁγίου
  english_pob_choice: is from the Holy Spirit
  chosen_spanish: proviene del Espíritu Santo
  alternatives_spanish:
  - es del Espíritu Santo
  - viene del Espíritu Santo
  - es por el Espíritu Santo
  lexicon: BDAG
  rationale: ἐκ marca origen; «proviene de» expresa bien la procedencia sin añadir causalidad secundaria. «Espíritu Santo» mantiene la designación personal reconocida en el texto.
theological_decisions:
- issue: Tratamiento de κύριος en ἄγγελος κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - de Yahvé
  rationale: Siguiendo el criterio del proyecto, κύριος cuando designa al Dios de Israel se rinde como «Yahvé» en el texto principal. En esta fórmula, «ángel de Yahvé» conserva el eco bíblico sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Yahvé'
- issue: Referencia de πνεύματός ... ἁγίου
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu santo
  - un espíritu santo
  rationale: En el contexto de la infancia de Jesús en Mateo, la frase apunta al Espíritu Santo como persona divina, no a un espíritu indefinido ni a una mera fuerza.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §6
- issue: Sentido de παραλαβεῖν en el contexto matrimonial
  english_pob_reading: to take Mary your wife
  chosen_spanish_reading: recibir a María, tu esposa
  alternative_spanish_readings:
  - tomar a María, tu esposa
  - acoger a María, tu esposa
  rationale: La formulación evita traducir mecánicamente con «tomar» si en español puede sonar brusca o ambiguamente sexual; «recibir» conserva la idea de incorporación formal al hogar y al matrimonio, sin añadir más de lo que el griego exige.
  doctrine_reference: BDAG; English POB revision note
- issue: γυνή como «esposa»
  english_pob_reading: wife
  chosen_spanish_reading: esposa
  alternative_spanish_readings:
  - mujer
  rationale: Aunque γυνή puede significar «mujer», el contexto matrimonial exige «esposa». Esto mantiene la precisión semántica y evita una lectura demasiado general.
  doctrine_reference: BDAG
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés al evitar una paráfrasis que sugiera un cambio de estado no explícito. También conserva el valor discursivo de ἰδοὺ y refleja la tensión lexical de παραλαμβάνω con una nota alternativa. Se tomó la decisión de usar «Yahvé» para κύριος según el estándar del proyecto, y «Espíritu Santo» para πνεῦμα ἅγιον por el contexto narrativo-teológico de Mateo.
  spanish_consistency_notes:
  - 'Se mantuvo un registro reverente pero moderno: «he aquí», «se le apareció», «no temas».'
  - Se prefirió «esposa» para γυνή en este contexto, en continuidad con el sentido matrimonial del pasaje.
  - Se usó «Yahvé» en lugar de «Señor» conforme al criterio terminológico del proyecto para el nombre divino.
  - «Espíritu Santo» se capitaliza por referencia personal y teológica.
  - La nota al pie marca la alternativa de παραλαβεῖν sin duplicar innecesariamente la idea principal en el cuerpo del texto.
