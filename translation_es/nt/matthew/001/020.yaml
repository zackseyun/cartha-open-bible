review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del griego: José está deliberando, un ángel se le aparece en sueño, lo llama «hijo de David», le prohíbe temer, y afirma que lo concebido en María procede del Espíritu Santo. También respeta correctamente el indefinido en «un ángel». Sin embargo, dos elecciones se apartan del mejor reflejo del audit trail y del sentido contextual: «recibir a María, tu esposa» suaviza demasiado παραλαβεῖν frente al inglés auditado «take Mary your wife», y «lo que ha sido engendrado» no comunica tan claramente como el inglés auditado y el contexto prenatal de γεννηθέν aquí, donde «concebido» es preferible en español.'
  spanish_quality_summary: El español es claro y digno, pero tiene un par de giros menos naturales o menos precisos que la mejor opción disponible. «He aquí» funciona, aunque suena algo elevado; es aceptable. «En sueños» es natural. «Recibir a María, tu esposa» se entiende, pero en este contexto matrimonial suena algo interpretativo y menos directo que «tomar contigo a María, tu esposa» o «tomar a María, tu esposa». «Engendrado» puede sonar biológicamente masculino o teológicamente cargado en español y no es la forma más clara para un embarazo ya descrito; «concebido» lee mejor y coincide con la racionalidad documentada del POB inglés.
  glossary_alignment: Buena alineación con la terminología del proyecto en «Yahvé», «Espíritu Santo» y «esposa». No hay conflicto doctrinal serio. La principal desviación terminológica es que el POB inglés revisó expresamente hacia «take Mary your wife»; por tanto, el español debería reflejar más de cerca esa decisión contextual. También conviene alinear τὸ ἐν αὐτῇ γεννηθὲν con «concebido» en vez de «engendrado», conforme a la justificación lexical auditada.
  issues:
  - severity: medium
    issue: «recibir[a] a María, tu esposa» debilita παραλαβεῖν en este contexto
    rationale: Aunque «recibir» es posible, el audit trail inglés corrigió deliberadamente hacia una formulación más directa equivalente a «take Mary your wife». En español, «tomar contigo a María, tu esposa» comunica mejor la incorporación marital al hogar sin sonar sexual ni perder el matiz contextual.
  - severity: medium
    issue: «lo que ha sido engendrado en ella» no es la mejor opción para τὸ ἐν αὐτῇ γεννηθὲν
    rationale: El propio rationale inglés explica que en contexto prenatal «conceived» comunica mejor el estado del niño en el vientre. En español, «concebido» es más claro, más natural y menos potencialmente confuso que «engendrado».
  - severity: low
    issue: La nota al pie debe alinearse con la revisión principal del verbo
    rationale: Si el texto principal cambia de «recibir» a «tomar contigo», la alternativa y explicación de la nota deben ajustarse para no crear desalineación interna.
