translation:
  language: es
  text: Josías engendró a Jeconías y a sus hermanos en tiempos de la deportación a Babilonia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “durante el exilio a Babilonia”. El término griego puede denotar traslado forzoso o exilio; “deportación” destaca el carácter coercitivo del evento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωσίας
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josas
  lexicon: uso transliterado estándar del nombre bíblico
  rationale: El nombre propio se vierte con la forma española bíblica habitual y reconocible. "Josías" es la transliteración estable en español para Ἰωσίας.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  - procreó
  lexicon: BDAG
  rationale: En la genealogía de Mateo, γεννάω expresa relación genealógica/paternidad. "Engendró" conserva esa fuerza y mantiene mayor cercanía formal al griego que una paráfrasis explicativa.
- source_word: Ἰεχονίαν
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Jechonías
  lexicon: uso transliterado estándar del nombre bíblico
  rationale: Se conserva la forma española bíblica corriente del nombre propio. "Jeconías" es clara y corresponde al referente del texto.
- source_word: ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  - a sus hermanos de sangre
  lexicon: BDAG
  rationale: El plural masculino ἀδελφοὺς es específico; en español, "hermanos" mantiene esa referencia masculina sin introducir neutralización innecesaria. La preposición "a" fluye con el objeto directo personal español.
- source_word: ἐπὶ τῆς μετοικεσίας Βαβυλῶνος
  english_pob_choice: at the time of the deportation to Babylon
  chosen_spanish: en el tiempo de la deportación a Babilonia
  alternatives_spanish:
  - durante el exilio a Babilonia
  - en la deportación a Babilonia
  lexicon: BDAG
  rationale: μετοικεσία puede denotar traslado forzoso, deportación o exilio. "Deportación" preserva el carácter coercitivo destacado por la POB inglesa, y "en el tiempo de" refleja el valor temporal de ἐπί con genitivo en este contexto.
- source_word: δὲ
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce de manera independiente]'
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: δέ funciona como conectivo suave en la genealogía. En español, omitir un equivalente explícito produce un texto más natural sin pérdida de sentido.
theological_decisions:
- issue: Formulación genealógica y posible compresión de linaje
  english_pob_reading: Translate the stated genealogy straightforwardly without attempting to resolve historical questions in the main text.
  chosen_spanish_reading: Traducir la genealogía tal como está expresada, sin intentar armonizar o aclarar en el texto principal las cuestiones históricas del linaje.
  alternative_spanish_readings:
  - Interpretar el verbo como descendencia genealógica no necesariamente inmediata en cada eslabón
  - Expandir el texto para explicar la posible compresión genealógica
  rationale: La traducción debe reflejar el griego recibido y conservar la tensión histórica sin resolverla dentro del versículo. "Engendró" permite la fórmula genealógica de Mateo sin sobreexplicación.
  doctrine_reference: Principio de primacía del texto original y conservación de tensiones interpretativas.
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con el audit trail inglés: no se documentan revisiones aplicadas, y la solución mantiene alta concordancia con la fuente griega y la decisión inglesa de destacar la deportación.'
  spanish_consistency_notes:
  - Se mantiene el orden genealógico natural en español sin alterar el sentido temporal del participio preposicional.
  - Se conserva la transliteración bíblica estándar de los nombres propios para coherencia interna con otras genealogías.
  - '"Deportación" se usa de forma consistente con el valor coercitivo de μετοικεσία y con la nota alternativa al exilio.'
