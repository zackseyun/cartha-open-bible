translation:
  language: es
  text: 'Después de la deportación a Babilonia[a], Jeconías fue padre de Salatiel, y Salatiel fue padre de Zorobabel.


    [a] O «el exilio en Babilonia». El término griego se refiere al traslado forzoso del pueblo al exilio babilónico.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el exilio a Babilonia». El término griego se refiere al traslado forzoso del pueblo al exilio babilónico.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ
  english_pob_choice: After
  chosen_spanish: Después de
  alternatives_spanish:
  - Y después de
  - Ahora bien, después de
  lexicon: BDAG
  rationale: μετά con acusativo expresa secuencia temporal; en español, «después de» comunica esa relación de manera natural. Se omite δέ como conector explícito, como hace la traducción inglesa al absorberlo estilísticamente.
- source_word: τὴν μετοικεσίαν Βαβυλῶνος
  english_pob_choice: the deportation to Babylon
  chosen_spanish: la deportación a Babilonia
  alternatives_spanish:
  - el exilio a Babilonia
  - el traslado a Babilonia
  lexicon: BDAG
  rationale: μετοικεσία denota un traslado forzado, una remoción o deportación. «Deportación» conserva la fuerza impuesta del término mejor que «exilio», aunque «exilio» sigue siendo una alternativa válida y tradicional.
- source_word: Ἰεχονίας
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Jechonías
  lexicon: BDAG
  rationale: El nombre se translitera al español con la forma bíblica estable «Jeconías», reconocible y cercana al griego Ἰεχονίας.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró / fue padre de
  lexicon: BDAG
  rationale: En genealogías, γεννάω puede expresarse con un verbo de generación. «Engendró» mantiene la fórmula genealógica y la continuidad masculina del linaje; aunque «fue padre de» sería más explicativo, aquí la forma breve es más fiel al patrón textual.
- source_word: Σαλαθιήλ
  english_pob_choice: Shealtiel
  chosen_spanish: Salatiel
  alternatives_spanish:
  - Sela­tiel
  - Sealtiel
  lexicon: BDAG
  rationale: Para el nombre Σαλαθιήλ, «Salatiel» es la transliteración española tradicional y clara, funcional en lectura bíblica.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  lexicon: BDAG
  rationale: En la segunda cláusula, δέ enlaza elementos sucesivos de la genealogía; «y» reproduce naturalmente la continuidad sin introducir contraste.
- source_word: Ζοροβαβέλ
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubabél
  - Zorobabel
  lexicon: BDAG
  rationale: El nombre se vierte con la forma bíblica española «Zorobabel», tradicional y ampliamente reconocible.
theological_decisions:
- issue: γεννάω en una genealogía
  english_pob_reading: Use 'fathered' for direct genealogical succession without specifying biological immediacy beyond what Matthew's genealogy convention requires.
  chosen_spanish_reading: Usar «engendró» para la sucesión genealógica directa, sin añadir matices biológicos que el género literario no exige.
  alternative_spanish_readings:
  - fue padre de
  - engendró
  rationale: La genealogía de Mateo emplea lenguaje convencional de descendencia. «Engendró» mantiene la fórmula y el valor genealógico sin sobrecargar el sentido con explicaciones ajenas al texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el contexto inglés; el texto inglés actual fue confirmado como sin cambios en la última pasada. La propuesta española sigue de cerca el audit trail y no introduce ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo y «Jeconías/Salatiel/Zorobabel» con formas bíblicas españolas reconocibles.
  - Se conserva la fuerza genealógica del verbo con una solución breve y natural en español.
  - La nota al pie preserva la alternativa lexical documentada entre «deportación» y «exilio» sin borrar la tensión semántica.
