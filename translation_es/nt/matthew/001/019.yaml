translation:
  language: es
  text: Y José[a], su esposo, siendo un hombre justo y no queriendo exponerla a la vergüenza pública[b], se propuso divorciarse de ella en privado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su prometido». El griego dice «su hombre/esposo», reflejando la fuerza legal del desposorio judío.
    reason: lexical_alternative
  - marker: b
    text: O «a avergonzarla públicamente» o «a hacerla objeto de escarnio público».
    reason: lexical_alternative
  - marker: c
    text: O «dejarla privadamente». En contexto, esto se refiere a un divorcio formal durante el desposorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰωσὴφ δὲ
  english_pob_choice: And Joseph
  chosen_spanish: Y José
  alternatives_spanish:
  - Pero José
  - Ahora bien, José
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector narrativo suave; en español, «Y» mantiene el avance del relato sin añadir contraste fuerte que el griego no exige.
- source_word: ὁ ἀνὴρ αὐτῆς
  english_pob_choice: her husband
  chosen_spanish: su esposo
  alternatives_spanish:
  - su marido
  - su prometido
  lexicon: BDAG
  rationale: ἀνήρ puede significar «hombre» o «esposo/esposo legal» según el contexto. En este relato de desposorio con fuerza jurídica, «esposo» comunica mejor la relación legal que luego explica ἀπολῦσαι («dejarla/divorciarse de ella»), sin perder la tensión con el estado de desposorio.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: un hombre justo
  alternatives_spanish:
  - un hombre recto
  - un hombre justo delante de Dios
  lexicon: BDAG
  rationale: δίκαιος expresa rectitud moral y fidelidad conforme a Dios. «Justo» es natural en español y conserva el peso bíblico-teológico mejor que una paráfrasis explicativa.
- source_word: μὴ θέλων αὐτὴν δειγματίσαι
  english_pob_choice: not wanting to expose her to public disgrace
  chosen_spanish: no queriendo exponerla a vergüenza pública
  alternatives_spanish:
  - no queriendo avergonzarla públicamente
  - no queriendo hacerla objeto de escarnio público
  lexicon: BDAG
  rationale: δειγματίζω en este contexto implica exponer públicamente con deshonra. «Vergüenza pública» expresa bien la fuerza de oprobio social sin añadir elementos no sustentados por el griego.
- source_word: δειγματίσαι
  english_pob_choice: to expose her to public disgrace
  chosen_spanish: exponerla a vergüenza pública
  alternatives_spanish:
  - hacerla objeto de escarnio
  - deshonrarla públicamente
  lexicon: BDAG
  rationale: La idea de «mostrar» o «poner como ejemplo» puede sonar demasiado literal en español y oscurecer el matiz de humillación pública que el contexto demanda.
- source_word: ἐβουλήθη
  english_pob_choice: intended
  chosen_spanish: se propuso
  alternatives_spanish:
  - quiso
  - decidió
  lexicon: BDAG
  rationale: βούλομαι indica una intención reflexiva o una resolución. «Se propuso» reproduce bien ese matiz de decisión considerada, más fuerte que «quería» y más natural que un calco como «intentó».
- source_word: λάθρᾳ
  english_pob_choice: quietly
  chosen_spanish: en secreto
  alternatives_spanish:
  - privadamente
  - discretamente
  lexicon: BDAG
  rationale: λάθρᾳ significa de manera oculta o privada. Aquí «en secreto» comunica mejor la discreción requerida en el contexto de un divorcio formal durante el desposorio.
- source_word: ἀπολῦσαι αὐτήν
  english_pob_choice: to divorce her
  chosen_spanish: dejarla
  alternatives_spanish:
  - divorciarse de ella
  - despedirla
  lexicon: BDAG
  rationale: En este contexto judío de desposorio, ἀπολύω tiene fuerza legal de disolver la relación. En español, «dejarla» es más breve y puede sonar más natural, pero conserva la idea de separación formal; la nota aclara el sentido jurídico de divorcio.
theological_decisions:
- issue: Caracterización de José como δίκαιος
  english_pob_reading: Rendered as 'righteous man' without specifying whether this means strict law-observance, compassion, or both.
  chosen_spanish_reading: «un hombre justo» sin resolver si su justicia implica principalmente observancia legal, compasión, o ambas.
  alternative_spanish_readings:
  - «un hombre recto»
  - «un hombre justo y compasivo»
  rationale: El texto griego une la justicia de José con su negativa a humillar a María. La traducción conserva esa tensión sin escoger una explicación teológica única que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Estado legal de José y María
  english_pob_reading: Used 'husband' and 'divorce' in the main text.
  chosen_spanish_reading: Usé «esposo» y «dejarla en secreto» en el texto principal, con la nota que aclara el valor jurídico de la separación.
  alternative_spanish_readings:
  - «prometido» y «romper el compromiso»
  - «marido» y «divorciarse de ella»
  rationale: La forma griega y el contexto del desposorio judío sugieren una relación legalmente vinculante. En español, «esposo» comunica ese vínculo sin sonar tan extraño como «prometido» en un contexto donde ἀπολῦσαι exige una disolución formal. La nota preserva la equivalencia jurídica con mayor claridad.
  doctrine_reference: Primacía del original; equivalencia óptima.
translation_notes:
  revision_awareness: 'Revisión más reciente: sin cambios necesarios; el pasaje mantiene el consenso alto del cotejo, así que no se introdujeron modificaciones adicionales respecto del último pase auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto del Tetragrámaton porque no aplica en este versículo.
  - «Justo» se usa para δίκαιος por consistencia bíblica y naturalidad en español.
  - «En secreto» comunica la intención de discreción de λάθρᾳ sin volver el texto más fuerte de lo que el griego exige.
  - La nota de a conserva la tensión entre «esposo» y «prometido», importante para el marco jurídico del desposorio.
