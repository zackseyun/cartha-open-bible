    rationale: El texto principal dice «en secreto», pero la nota ofrece «dejarla privadamente». Si se mantiene la fuerza jurídica en el texto principal, la nota puede preservar mejor la alternativa más literal «despedirla/apartarse de ella privadamente» con aclaración contextual.
  - severity: low
    issue: «exponerla a vergüenza pública» es entendible pero algo menos idiomático
    rationale: En español suena más natural «exponerla a la vergüenza pública» o «avergonzarla públicamente». No obstante, no es un error serio de fidelidad.
  revised_spanish_text: Y José[a], su esposo, siendo un hombre justo y no queriendo exponerla a la vergüenza pública[b], se propuso divorciarse de ella en privado[c].
  revision_rationale: 'La revisión conserva la buena base del borrador pero corrige el punto crucial de fidelidad: ἀπολῦσαι se vierte como «divorciarse de ella», en línea con la decisión del POB inglés y con la fuerza legal del desposorio judío. «En privado» comunica bien λάθρᾳ de forma natural en español. Se simplifica el anclaje de notas para que [b] quede en la expresión de vergüenza pública y [c] en la alternativa de formulación más literal para la acción de ἀπολύω.'
