base_translation:
  language: en
  yaml_path: translation/nt/matthew/001/019.yaml
  text: And Joseph[a], her husband, being a righteous man and not wanting to expose her to public disgrace[c][b], intended to divorce her quietly.
  footnotes:
  - marker: a
    text: Or 'her betrothed.' The Greek says 'her man/husband,' reflecting the legal force of Jewish betrothal.
    reason: lexical_alternative
  - marker: b
    text: Or 'to make an example of her' or 'to disgrace her publicly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to send her away privately.' In context this refers to formal divorce during betrothal.
    reason: lexical_alternative
