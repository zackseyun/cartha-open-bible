translation:
  language: es
  text: Azor engendró a Zadok, Zadok engendró a Achim, y Achim engendró a Eliud.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀζώρ
  english_pob_choice: Azor
  chosen_spanish: Azor
  alternatives_spanish:
  - Azór
  lexicon: nombre propio
  rationale: Se translitera el nombre propio según la convención estable del español bíblico, sin traducirlo.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  - procreó a
  lexicon: γεννάω
  rationale: En genealogía, γεννάω expresa engendrar/ser padre de. En español, «engendró» conserva la relación genealógica con fuerza directa y es más preciso que una paráfrasis como «fue padre de».
- source_word: Σαδώκ
  english_pob_choice: Zadok
  chosen_spanish: Zadoc
  alternatives_spanish:
  - Zadok
  lexicon: nombre propio
  rationale: Se usa la forma española tradicional y reconocible «Zadoc», manteniendo la identificación del nombre propio en contexto genealógico.
- source_word: Ἀχίμ
  english_pob_choice: Achim
  chosen_spanish: Achim
  alternatives_spanish:
  - Ajim
  - Akim
  lexicon: nombre propio
  rationale: Se translitera el nombre propio de forma sencilla y legible en español, sin adaptar innecesariamente la ortografía.
- source_word: Ἐλιούδ
  english_pob_choice: Eliud
  chosen_spanish: Eliud
  alternatives_spanish:
  - Eliúd
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en transliteración estándar; la tilde no es necesaria en la forma usual del nombre bíblico en español.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  - ', (sin traducir)'
  lexicon: δέ
  rationale: En esta genealogía, δέ funciona como conector secuencial simple. En español, «y» transmite la continuidad de la cadena genealógica con naturalidad.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego de la genealogía y la solución inglesa auditada, con ajuste idiomático mínimo: se prefirió «engendró» para reflejar γεννάω en contexto genealógico y se normalizó la puntuación en una serie de cláusulas coordinadas.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden genealógico del original: Azor → Zadoc → Achim → Eliud.'
  - Se evitó introducir términos interpretativos ajenos a la simple relación de descendencia.
  - La conjunción final se expresa con «y» para reflejar la cadena continua de δέ en español natural.
