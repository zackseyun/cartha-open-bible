translation:
  language: es
  text: Ella dará a luz un hijo[a], y le pondrás por nombre Jesús, porque él salvará a su pueblo de sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre Jesús corresponde a la forma griega de un nombre hebreo/arameo relacionado con la idea «Yahvé salva». Mateo aprovecha ese sentido en la frase «porque él salvará».
    reason: lexical_alternative
lexical_decisions:
- source_word: τέξεται
  english_pob_choice: will bear
  chosen_spanish: dará a luz
  alternatives_spanish:
  - parirá
  - tendrá un hijo
  lexicon: BDAG
  rationale: El futuro medio de τίκτω en contexto de nacimiento se expresa naturalmente en español con 'dará a luz'. Mantiene la referencia al parto sin sonar artificial ni reducir el matiz de anuncio predictivo.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: δέ funciona como enlace suave. En español puede omitirse para conservar fluidez, sin perder la progresión narrativa del anuncio.
- source_word: υἱὸν
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: BDAG
  rationale: El acusativo sin artículo en este contexto se expresa naturalmente como 'un hijo'. 'Hijo varón' sería posible, pero más pesado y menos idiomático en español.
- source_word: καλέσεις τὸ ὄνομα αὐτοῦ
  english_pob_choice: you shall call his name
  chosen_spanish: llamarás su nombre
  alternatives_spanish:
  - le pondrás por nombre
  - lo llamarás
  lexicon: BDAG
  rationale: Se conserva la fórmula semítica 'llamarás su nombre' porque refleja mejor el giro del griego y prepara el juego etimológico con el nombre Jesús. 'Le pondrás por nombre' sería más natural, pero menos transparente al texto fuente.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Josué
  lexicon: BDAG
  rationale: 'Como nombre propio del NT, se traduce según la convención establecida del proyecto: ''Jesús''. Se preserva la forma reconocible para la comunidad lectora.'
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: Aquí el pronombre enfatiza al sujeto, pero el español puede reproducir esa referencia simplemente con 'él'. 'Él mismo' sería posible, aunque más marcado de lo que el flujo español requiere en este versículo.
- source_word: σώσει
  english_pob_choice: will save
  chosen_spanish: salvará
  alternatives_spanish:
  - rescatará
  - librará
  lexicon: BDAG
  rationale: σῴζω se entiende aquí en sentido soteriológico por el objeto y el complemento causal. 'Salvará' es la equivalencia directa y la más adecuada en español bíblico contemporáneo.
- source_word: τὸν λαὸν αὐτοῦ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - al pueblo que es suyo
  lexicon: BDAG
  rationale: En español, el objeto directo personal se introduce naturalmente con 'a'. 'Su pueblo' conserva el valor de λαός con resonancia de pertenencia y comunidad pactal.
- source_word: ἀπὸ τῶν ἁμαρτιῶν αὐτῶν
  english_pob_choice: from their sins
  chosen_spanish: de sus pecados
  alternatives_spanish:
  - de sus faltas
  - de sus transgresiones
  lexicon: BDAG
  rationale: ἀπό marca separación; en español, 'de sus pecados' expresa con claridad la liberación respecto de aquello que los domina. Se mantiene el plural de ἁμαρτίαι para reflejar actos concretos y estados de culpa.
theological_decisions:
- issue: Preservación del nombre Jesús con el trasfondo de 'YHWH salva' sin expandir el texto principal
  english_pob_reading: The name Jesus is the Greek form corresponding to Hebrew/Aramaic Yeshua (Joshua), associated with the idea 'Yahweh saves'; Matthew's explanation 'for he will save' reflects this wordplay.
  chosen_spanish_reading: Jesús se mantiene en el texto principal; la nota explica su relación con 'Yahvé salva' y el juego de palabras de Mateo.
  alternative_spanish_readings:
  - Josué
  - Yahvé salva
  rationale: El texto griego presenta el nombre propio Ἰησοῦν, que debe permanecer como nombre de persona. El trasfondo etimológico se preserva en nota para no sobrecargar el versículo y, a la vez, mantener la conexión interpretativa señalada por el audit trail.
  doctrine_reference: Mateo 1:21; Nota etimológica del POB inglés; principio de primacía de las fuentes originales
- issue: Alcance de 'su pueblo'
  english_pob_reading: his people
  chosen_spanish_reading: a su pueblo
  alternative_spanish_readings:
  - a Israel, su pueblo
  - a todos los que le pertenecen
  rationale: La frase se deja abierta como en el griego. No se restringe a Israel ni se expande a toda la humanidad, porque el verso no lo especifica; la traducción conserva esa tensión interpretativa.
  doctrine_reference: Mateo 1:21; continuidad con el contexto mateano y la filosofía de no resolver tensiones teológicas sin base textual
- issue: Valor del pronombre enfático αὐτός
  english_pob_reading: he
  chosen_spanish_reading: él
  alternative_spanish_readings:
  - él mismo
  rationale: Aunque αὐτός puede llevar énfasis, el español puede expresarlo de modo sobrio con 'él' en un contexto tan breve. No se añade una intensificación que pueda sonar forzada; el énfasis queda disponible por el orden y el contexto.
  doctrine_reference: Gramática del griego koiné; revisión inglesa posterior que eliminó 'himself' por innecesario
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'himself' y dejó simplemente 'he will save', considerando que αὐτός no exigía intensificación explícita en inglés. La versión española sigue esa misma línea, usando 'él salvará' sin añadir 'él mismo'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' en la nota etimológica, conforme al estándar del proyecto para el nombre divino.
  - Se usa 'pecados' en plural para reflejar ἁμαρτιῶν y no reducir el alcance a una sola noción abstracta.
  - La fórmula 'llamarás su nombre' mantiene la transparencia hacia el griego y el eco semítico del pasaje.
