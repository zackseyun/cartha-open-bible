base_translation:
  language: en
  yaml_path: translation/nt/matthew/001/025.yaml
  text: And he did not know her until she gave birth to a son[c][b][a], and he called his name Jesus.
  footnotes:
  - marker: a
    text: Or more explicitly, 'he did not have marital relations with her.' The Greek says 'did not know her,' using 'know' as a euphemism.
    reason: lexical_alternative
  - marker: b
    text: '''Until'' marks what was true up to Jesus''s birth; by itself it does not decide what happened afterward.'
    reason: alternative_reading
  - marker: c
    text: Or, more idiomatically, 'he named him Jesus.'
    reason: lexical_alternative
