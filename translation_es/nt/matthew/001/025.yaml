translation:
  language: es
  text: Y no la conoció[a] hasta que dio a luz a un hijo[b]; y llamó su nombre Jesús[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más explícitamente: «no tuvo relaciones maritales con ella». El griego dice literalmente «no la conoció», usando «conocer» como eufemismo.'
    reason: lexical_alternative
  - marker: b
    text: «Hasta que» señala lo que fue verdadero hasta el nacimiento de Jesús; por sí sola no decide qué ocurrió después.
    reason: alternative_reading
  - marker: c
    text: 'O, más idiomáticamente: «le puso por nombre Jesús» o «lo llamó Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγίνωσκεν
  english_pob_choice: did not know
  chosen_spanish: no la conoció
  alternatives_spanish:
  - no tuvo relaciones maritales con ella
  - no mantuvo relaciones con ella
  lexicon: BDAG
  rationale: Conocer en español puede conservar el eufemismo bíblico de manera natural. «No la conoció» reproduce con transparencia la idiomática griega γινώσκω como eufemismo, sin explicitar más de lo que el texto dice.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta
  lexicon: BDAG
  rationale: «Hasta que» es el equivalente temporal natural en español y conserva el límite señalado por el griego sin decidir por sí mismo qué ocurrió después.
- source_word: ἔτεκεν
  english_pob_choice: gave birth
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: BDAG
  rationale: «Dar a luz» es la forma natural y digna en español moderno para τίκτω en este contexto narrativo.
- source_word: υἱόν
  english_pob_choice: a son
  chosen_spanish: a un hijo
  alternatives_spanish:
  - a un hijo varón
  - a un varón
  lexicon: BDAG
  rationale: El acusativo anartro se vierte de forma indefinida como «un hijo». En español, «hijo» comunica naturalmente el sentido del griego sin añadir matices innecesarios.
- source_word: ἐκάλεσεν τὸ ὄνομα αὐτοῦ Ἰησοῦν
  english_pob_choice: he called his name Jesus
  chosen_spanish: le puso por nombre Jesús
  alternatives_spanish:
  - lo llamó Jesús
  - nombró a su hijo Jesús
  lexicon: BDAG
  rationale: La construcción semítica griega se expresa de manera idiomática en español con «le puso por nombre», preservando el acto nominal sin sonar forzado.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Josué
  lexicon: BDAG
  rationale: En el Nuevo Testamento, el nombre propio se traduce convencionalmente como «Jesús».
theological_decisions:
- issue: Sentido de «hasta que» respecto de la relación marital posterior
  english_pob_reading: Render ἕως οὗ simply as 'until' without implying either that marital relations did or did not occur afterward.
  chosen_spanish_reading: «Hasta que» marca el límite temporal hasta el nacimiento, sin decidir por sí mismo si hubo o no relaciones después.
  alternative_spanish_readings:
  - Algunos lectores toman la frase como indicio de relaciones maritales posteriores.
  - Otros entienden que la expresión no afirma nada sobre lo posterior.
  rationale: La expresión temporal delimita el estado previo al nacimiento, pero no resuelve la cuestión posterior. La traducción mantiene esa tensión y evita imponer una conclusión doctrinal ajena al texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto base y el audit trail inglés no muestran revisiones aplicadas en esta pasada; la presente redacción sigue la lectura confirmada de alta concordancia y conserva la tensión interpretativa sobre ἕως οὗ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; aquí no corresponde.
  - Se usa «Jesús» como forma estable del nombre propio en el NT.
  - Se conserva el eufemismo de «conocer» para ἐγίνωσκεν, con nota explicativa.
  - La sintaxis final adopta una construcción idiomática española para el semitismo nominal.
  - Las notas usan marcadores únicos y en orden, sin reutilización.
