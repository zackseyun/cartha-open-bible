  rationale: Se conserva «Aram» con nota alternativa «Ram», se mantiene «engendró» como equivalente genealógico adecuado de ἐγέννησεν, se sustituye «Naasón» por «Nahsón» para mejor reconocimiento bíblico en español, y se reemplazan los punto y coma por «y» para reflejar más fielmente la función secuencial repetida de δέ en el original y en la auditoría inglesa.
