translation:
  language: es
  text: Aram engendró a Aminadab[a], y Aminadab engendró a Nahsón, y Nahsón engendró a Salmón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ram». El texto griego lee Ἀράμ, mientras que muchas versiones y genealogías hebreas usan la forma «Ram».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀρὰμ
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Ram
  lexicon: nombre propio
  rationale: Conservo la forma griega del texto fuente, tal como hace la POB en inglés. La alternativa «Ram» refleja la forma hebrea tradicional y se reserva para una nota, porque el testimonio griego lee Ἀράμ.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró a
  - fue padre de
  - procreó
  lexicon: γεννάω
  rationale: En genealogías, γεννάω expresa la relación de paternidad/descendencia. «Engendró» preserva esa fuerza genealógica de forma breve y natural en español, sin diluirla con un giro más explicativo.
- source_word: Ἀμιναδάβ
  english_pob_choice: Amminadab
  chosen_spanish: Aminadab
  alternatives_spanish:
  - Amminadab
  lexicon: nombre propio
  rationale: Opto por la transliteración española más transparente desde el griego, manteniendo el nombre reconocible. La forma inglesa usa doble consonante por convención; en español no es necesaria para reflejar mejor el original.
- source_word: Ναασσών
  english_pob_choice: Nahshon
  chosen_spanish: Naasón
  alternatives_spanish:
  - Naassón
  - Nashón
  lexicon: nombre propio
  rationale: El POB en inglés sigue la convención bíblica inglesa «Nahshon». En español, «Naasón» comunica el mismo nombre con una adaptación gráfica sobria y lectura natural; «Naassón» conserva más de cerca la doble sigma griega, pero resulta menos idiomática.
- source_word: Σαλμών
  english_pob_choice: Salmon
  chosen_spanish: Salmón
  alternatives_spanish:
  - Salmon
  lexicon: nombre propio
  rationale: Mantengo la forma bíblica tradicional en español, que coincide con la convención cristiana amplia y distingue el nombre propio del sustantivo común homógrafo. La tilde ayuda a la pronunciación en español.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: ;
  alternatives_spanish:
  - y
  - entonces
  - —
  lexicon: δέ
  rationale: En esta genealogía repetitiva, δέ funciona como simple conector secuencial. En español, la puntuación con punto y coma reproduce bien el avance en cadena sin sobrecargar el texto con repeticiones de «y».
translation_notes:
  revision_awareness: Se revisó la línea con la auditoría inglesa y el texto griego SBLGNT. No se requieren cambios doctrinales ni variantes textuales adicionales; la única tensión relevante es la forma del nombre Ἀράμ/«Ram», conservada en nota.
  spanish_consistency_notes:
  - Se mantuvo la repetición genealógica con el mismo verbo en cada enlace para reflejar el paralelismo del griego.
  - Se optó por nombres propios en una forma española transparente y consistente, sin introducir armonizaciones no documentadas.
  - La puntuación con punto y coma ayuda a mostrar la secuencia genealógica del original sin alterar el contenido.
