source:
  edition: SBLGNT
  text: Τοῦ δὲ ⸀Ἰησοῦ χριστοῦ ἡ ⸀γένεσις οὕτως ἦν. ⸀μνηστευθείσης τῆς μητρὸς αὐτοῦ Μαρίας τῷ Ἰωσήφ, πρὶν ἢ συνελθεῖν αὐτοὺς εὑρέθη ἐν γαστρὶ ἔχουσα ἐκ πνεύματος ἁγίου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/001/018.yaml
  text: 'Now the birth of Jesus Messiah happened in this way: when his mother Mary had been betrothed to Joseph[a], before they came together[c][b], she was found to be pregnant from the Holy Spirit.'
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: '''Betrothed'' refers to a formal, legally recognized commitment more binding than a modern engagement.'
    reason: cultural_note
  - marker: c
    text: Or 'before they came together' may imply before marital union was consummated.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 49bc6bb2dc356c0e02456a60381e1b58ce22d4c15c58a84d5f54d81a0e490b98
    timestamp: '2026-04-18T18:37:32Z'
    output_hash: e5cf5a301b72d018eb196296c39314d2747baacc293e625ff47c5d406d48e21a
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:54:56Z'
    unchanged: false
    changes_summary: 'Changed “Jesus the Messiah” to “Jesus Christ” for closer lexical correspondence to the Greek Χριστοῦ and more formal register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Ahora bien, el nacimiento de Jesús Mesías ocurrió así: cuando su madre María había sido desposada con José[a], antes de que ellos se unieran[c][b], se halló encinta del Espíritu Santo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Desposada" aquí refleja un compromiso matrimonial formal y legalmente reconocido, más fuerte que un compromiso moderno.'
    reason: cultural_note
  - marker: b
    text: 'O: "antes de que consumaran su unión". La frase griega puede implicar la consumación del matrimonio.'
    reason: lexical_alternative
  - marker: c
    text: La expresión se traduce de manera sobria como una unión matrimonial; el contexto decide si incluye la idea de convivencia o de consumación.
    reason: alternative_reading
lexical_decisions:
- source_word: γένεσις
  english_pob_choice: birth
  chosen_spanish: nacimiento
  alternatives_spanish:
  - origen
  - genealogía
  lexicon: BDAG
  rationale: En este contexto, γένεσις introduce el relato del comienzo de la vida terrena de Jesús, no una idea abstracta de origen. "Nacimiento" comunica de forma natural esa apertura narrativa sin perder el sentido del pasaje.
- source_word: Ἰησοῦ χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como mero apellido. "Mesías" preserva su valor semántico y sigue el criterio del POB para este término cuando aparece con fuerza titulativa.
- source_word: οὕτως ἦν
  english_pob_choice: happened in this way
  chosen_spanish: ocurrió así
  alternatives_spanish:
  - fue así
  - pasó de esta manera
  lexicon: BDAG
  rationale: La frase introduce la manera en que sucede el hecho. "Ocurrió así" mantiene el valor narrativo e idiomático de forma clara y sobria en español.
- source_word: μνηστευθείσης
  english_pob_choice: had been betrothed
  chosen_spanish: había sido desposada
  alternatives_spanish:
  - había sido prometida en matrimonio
  - había sido comprometida
  lexicon: BDAG
  rationale: El participio denota un compromiso formal y legalmente reconocido, más fuerte que un noviazgo o compromiso moderno. "Desposada" conserva ese matiz jurídico-cultural, aunque se añade nota para evitar lectura anacrónica.
- source_word: πρὶν ἢ συνελθεῖν αὐτοὺς
  english_pob_choice: before they came together
  chosen_spanish: antes de que ellos se unieran
  alternatives_spanish:
  - antes de que convivieran
  - antes de que consumaran su unión
  lexicon: BDAG
  rationale: La expresión griega puede apuntar a la unión marital en general y, por contexto, a su consumación. "Se unieran" es una fórmula española natural y relativamente sobria; la nota preserva la alternativa implícita de consumación sin imponerla en el texto principal.
- source_word: εὑρέθη
  english_pob_choice: was found
  chosen_spanish: se halló
  alternatives_spanish:
  - fue hallada
  - se descubrió
  lexicon: BDAG
  rationale: El pasivo se mantiene de forma natural en español. "Se halló" refleja el hallazgo/resulta visible del estado de María sin añadir matiz interpretativo extra.
- source_word: ἐν γαστρὶ ἔχουσα
  english_pob_choice: to be pregnant
  chosen_spanish: estaba encinta
  alternatives_spanish:
  - estaba embarazada
  - tenía en el vientre
  lexicon: BDAG
  rationale: El giro idiomático significa embarazo. "Encinta" es un español digno y claro, y evita una formulación demasiado clínica sin perder precisión.
- source_word: ἐκ πνεύματος ἁγίου
  english_pob_choice: from the Holy Spirit
  chosen_spanish: por obra del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo
  - procedente del Espíritu Santo
  lexicon: BDAG
  rationale: ἐκ expresa origen, pero en español una formulación estrictamente literal sonaría dura o ambigua. "Por obra del Espíritu Santo" comunica origen causal/agencial de forma natural y conserva la referencia al Espíritu Santo personal y divino.
theological_decisions:
- issue: Renderizado de Χριστός como título mesiánico
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La traducción sigue la decisión auditada del POB de preservar el sentido del título Χριστός. En español, "Mesías" comunica mejor el valor cristológico sin convertir el término en un nombre fijo.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Sentido de πνεύματος ἁγίου
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - un espíritu santo
  - espíritu santo
  rationale: En el contexto de la narración de la infancia de Jesús, la referencia es al Espíritu Santo divino, no a una fuerza impersonal ni a un espíritu indefinido. La mayúscula y la formulación explícita preservan esa lectura.
  doctrine_reference: DOCTRINE.md Affirmations; translation should not undertranslate explicit Trinitarian/Christological claims
- issue: Valor legal-cultural de μνηστευθείσης
  english_pob_reading: betrothed
  chosen_spanish_reading: desposada
  alternative_spanish_readings:
  - comprometida
  - prometida en matrimonio
  rationale: '"Desposada" comunica mejor la formalidad jurídica del compromiso en el mundo judío del primer siglo. La nota explica que no se trata de un simple compromiso moderno.'
  doctrine_reference: Matthew 1:18 cultural-historical context
- issue: Posible implicación de συνελθεῖν αὐτούς
  english_pob_reading: before they came together
  chosen_spanish_reading: antes de que ellos se unieran
  alternative_spanish_readings:
  - antes de que consumaran su unión
  - antes de que vivieran juntos
  rationale: El griego puede sugerir unión marital y, por contexto, consumación. El texto principal evita explicitar más de lo que el griego dice, mientras la nota conserva la alternativa interpretativa sin imponerla.
  doctrine_reference: Matthew 1:18 lexical nuance
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que intentó volver Χριστός a "Christ", pero la corrección posterior restauró "Messiah" conforme a la política doctrinal del POB. La versión española sigue esa línea y además adapta el valor cultural de μνηστευθείσης y la relación causal de ἐκ πνεύματος ἁγίου con una formulación idiomática en español.
  spanish_consistency_notes:
  - Se mantiene "Mesías" para Χριστός en el texto principal, coherente con la política auditada del proyecto.
  - Se usa "Espíritu Santo" con mayúsculas por referencia personal y divina.
  - '"Desposada" se emplea en sentido técnico-cultural; no equivale a un compromiso moderno.'
  - La puntuación con dos puntos tras "así" reproduce la función explicativa del original y del inglés auditado.
