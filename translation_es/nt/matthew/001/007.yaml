translation:
  language: es
  text: Salomón fue padre de Roboam, Roboam fue padre de Abías, y Abías fue padre de Asaf[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Asa», en consonancia con el rey de Judá mencionado en 1 Reyes 15 y 2 Crónicas 14–16; el texto griego aquí lee «Asaf».
    reason: textual_variant
lexical_decisions:
- source_word: Σολομών
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: nombre propio
  rationale: Se conserva el nombre propio bíblico en su forma española estándar y reconocible.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró como padre
  - fue padre de
  - engendró/ fue padre de
  lexicon: BDAG
  rationale: En una genealogía, γεννάω expresa generación/descendencia. 'Engendró' mantiene la fuerza genealógica y la relación de paternidad sin suavizarla a una perífrasis menos directa.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conectivo débil en la cadena genealógica; 'y' comunica continuidad natural en español.
- source_word: Ῥοβοάμ
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: nombre propio
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre bíblico.
- source_word: Ἀβιά
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abia
  lexicon: nombre propio
  rationale: Se prefiere la forma española usual del nombre real, más estable en el uso bíblico en español.
- source_word: Ἀσάφ
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asa
  lexicon: nombre propio
  rationale: Se sigue la lectura griega transmitida por el texto base con la transliteración española habitual de Ἀσάφ. La alternativa 'Asa' se reserva para la nota textual porque corresponde a la armonización con la lista real del Antiguo Testamento.
theological_decisions:
- issue: Lectura de Ἀσάφ frente a la expectativa genealógica de Asa
  english_pob_reading: Retain 'Asaph' in the main text; note the variant 'Asa'
  chosen_spanish_reading: Mantener 'Asaf' en el texto principal; indicar en nota la variante 'Asa'
  alternative_spanish_readings:
  - Harmonizar en el texto principal como 'Asa'
  rationale: La primacía del texto griego disponible exige no armonizar silenciosamente con 1 Reyes 15 y 2 Crónicas 14–16. La nota preserva la tensión textual y orienta al lector sobre la variante manuscrita y la expectativa histórica.
  doctrine_reference: Primacía del texto original y transparencia textual en la traducción POB
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la lectura principal se mantiene conforme al texto griego SBLGNT y al control cruzado del expediente inglés.
  spanish_consistency_notes:
  - Se mantienen nombres propios bíblicos en formas españolas estándar para facilitar la lectura e ինտeligibilidad eclesial.
  - Se conserva la estructura genealógica repetitiva con 'engendró' para reflejar la secuencia del original.
  - La nota textual usa terminología sobria y transparente, sin resolver artificialmente la discrepancia entre el texto griego y la genealogía del AT.
