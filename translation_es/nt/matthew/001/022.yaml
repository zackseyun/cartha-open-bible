translation:
  language: es
  text: Ahora todo esto sucedió para que se cumpliera lo que fue dicho por el Señor mediante el profeta, diciendo,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Ahora sucedió todo esto» o «Todo esto sucedió». La frase griega τοῦτο δὲ ὅλον destaca la totalidad de los hechos recién narrados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δὲ ὅλον
  english_pob_choice: Now all this happened
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Ahora todo esto
  - Toda esta cosa
  lexicon: BDAG
  rationale: El conjunto neutro singular señala los hechos inmediatamente anteriores como una unidad total. «Todo esto» conserva la referencia discursiva y la fuerza de totalidad sin sonar artificial en español.
- source_word: γέγονεν
  english_pob_choice: happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - aconteció
  - pasó
  - ha sucedido
  lexicon: BDAG
  rationale: El perfecto de γίνομαι se entiende naturalmente como evento ocurrido en la narración. «Sucedió» es idiomático en español bíblico contemporáneo y mantiene el tono narrativo.
- source_word: ἵνα πληρωθῇ
  english_pob_choice: so that ... might be fulfilled
  chosen_spanish: para que se cumpliera
  alternatives_spanish:
  - a fin de que se cumpliera
  - para que fuera cumplido
  lexicon: BDAG
  rationale: En español, «para que» comunica bien la relación de finalidad/resultado de ἵνα. «Se cumpliera» preserva la pasiva y la fórmula de cumplimiento sin sonar forzado.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que fue dicho
  alternatives_spanish:
  - lo dicho
  - lo que había sido dicho
  lexicon: BDAG
  rationale: El participio pasivo sustantivado de λέγω se puede verter de forma natural como «lo que fue dicho». Mantiene la pasiva y evita introducir contenido extra.
- source_word: ὑπὸ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por el Señor
  - por Dios
  lexicon: BDAG
  rationale: De acuerdo con la norma del proyecto para יהוה/YHWH, se usa «Yahvé» en el texto principal. Aquí κύριος funciona como referencia al hablante divino detrás de la cita profética, y el contexto permite explicitar el nombre divino en español.
- source_word: διὰ τοῦ προφήτου
  english_pob_choice: through the prophet
  chosen_spanish: mediante el profeta
  alternatives_spanish:
  - por medio del profeta
  - a través del profeta
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación instrumental. «Mediante» conserva esa relación con estilo natural y algo más formal que «por medio de».
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - que decía
  lexicon: BDAG
  rationale: El participio genitivo introduce la cita que sigue. «Diciendo» es la equivalencia breve y estándar en español, manteniendo la apertura a la cita siguiente.
theological_decisions:
- issue: Agencia profética y habla divina
  english_pob_reading: The Lord is the ultimate speaker; the prophet is the mediating instrument.
  chosen_spanish_reading: Yahvé aparece como el hablante último, y el profeta como el mediador humano.
  alternative_spanish_readings:
  - lo dicho por el profeta
  - lo que fue dicho por medio del profeta
  rationale: El griego distingue ὑπό + genitivo para el agente último y διά + genitivo para la mediación profética. La traducción conserva esa distinción sin fusionar ambas relaciones.
  doctrine_reference: Translation philosophy; Affidavits on divine speech and prophetic mediation
- issue: Fórmula de cumplimiento en Mateo
  english_pob_reading: so that what was spoken ... might be fulfilled
  chosen_spanish_reading: para que se cumpliera lo que fue dicho
  alternative_spanish_readings:
  - con el fin de que se cumpliera
  - y así se cumplió
  rationale: La construcción con ἵνα + subjuntivo permite finalidad o resultado. «Para que se cumpliera» preserva esa tensión sin resolverla demasiado en una sola dirección.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior añadiendo la marca [a] en el texto español donde corresponde y manteniendo la nota como alternativa lexical anclada. Se conserva la lectura de cumplimiento de Mateo sin mecanizar el inglés, y se alinea el nombre divino con la terminología estándar del proyecto en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para κύριος cuando el contexto identifica al hablante divino detrás de la cita profética.
  - «Todo esto» reproduce la deíxis neutra singular y la suma de los eventos anteriores.
  - «Se cumpliera» mantiene la voz pasiva y la fórmula mateana de cumplimiento.
  - La puntuación introduce la cita con coma antes de «diciendo» para fluir en español estándar.
