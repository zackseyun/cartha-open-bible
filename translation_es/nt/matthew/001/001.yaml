translation:
  language: es
  text: Libro de la genealogía[a] de Jesús, el Mesías[b], hijo de David, hijo de Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del origen» o «del nacimiento». La palabra griega puede abarcar un sentido más amplio de «génesis» u «origen», aunque «genealogía» encaja mejor con la lista de ascendencia que sigue.
    reason: alternative_reading
  - marker: b
    text: O «Cristo». Aquí el título griego Χριστός se vierte como «Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: Βίβλος
  english_pob_choice: The book
  chosen_spanish: Libro
  alternatives_spanish:
  - Un libro
  - Registro
  lexicon: BDAG
  rationale: βίβλος puede referirse a un libro, rollo o registro escrito. En un encabezado genealógico, «Libro» conserva el tono formal y el carácter de título; «Registro» sonaría más explicativo y menos natural como inicio solemne de la sección.
- source_word: γενέσεως
  english_pob_choice: of the genealogy
  chosen_spanish: de la genealogía
  alternatives_spanish:
  - del origen
  - del nacimiento
  - de la generación
  lexicon: BDAG
  rationale: En este contexto inmediato sigue una línea de ascendencia, por lo que «genealogía» es la mejor opción principal. Aun así, γένεσις también puede sugerir origen o nacimiento; esa tensión se conserva en una nota.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español, transliterado según el uso cristiano ampliamente entendido.
- source_word: χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como apellido fijo. La guía de terminología del proyecto favorece «Mesías» cuando el sentido titular está en vista, porque preserva la carga judía de un ungido esperado. «Cristo» queda como alternativa tradicional reconocida.
- source_word: υἱοῦ Δαυὶδ
  english_pob_choice: the son of David
  chosen_spanish: hijo de David
  alternatives_spanish:
  - descendiente de David
  lexicon: BDAG
  rationale: «Hijo de David» mantiene la fórmula genealógica y el peso mesiánico del título. Aunque el sentido implica descendencia, cambiarlo por «descendiente» diluiría la expresión establecida y su resonancia real-mesiánica.
- source_word: υἱοῦ Ἀβραάμ
  english_pob_choice: the son of Abraham
  chosen_spanish: hijo de Abraham
  alternatives_spanish:
  - descendiente de Abraham
  lexicon: BDAG
  rationale: Se conserva el paralelismo y el valor genealógico literal de υἱός. «Descendiente» es posible, pero la forma tradicional y directa comunica mejor la secuencia de ascendencia del versículo.
theological_decisions:
- issue: Rendición de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto introductorio del evangelio presenta a Jesús en su identidad prometida; «Mesías» hace explícito el valor titular de Χριστός y evita convertirlo prematuramente en un nombre fijo. La alternativa tradicional «Cristo» se reconoce, pero no se usa como forma principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Sentido amplio de γενέσεως en el encabezado
  english_pob_reading: genealogy with a possible broader resonance of origin/birth
  chosen_spanish_reading: genealogía con posible resonancia de origen
  alternative_spanish_readings:
  - origen
  - nacimiento
  rationale: La línea inmediata es una lista de ancestros, así que «genealogía» es la lectura principal. Sin embargo, el griego puede evocar más que una lista familiar; por eso se preserva la resonancia de «origen» en nota en vez de resolverla de manera reductiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el estado más reciente del expediente: el inglés POB volvió de «Jesus Christ» a «Jesus Messiah» tras una corrección de regresión. Por eso se mantiene «Mesías» en el texto principal, evitando la forma tradicional «Cristo» salvo como alternativa registrada.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός cuando funciona como título, conforme a la política terminológica del proyecto.
  - Se conserva la fórmula genealógica «hijo de» para mantener la transparencia del parentesco y la resonancia mesiánica.
  - El encabezado se formula con mayúscula inicial solo en la primera palabra, en estilo español natural de inicio de sección.
