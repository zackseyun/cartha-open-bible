translation:
  language: es
  text: Así que todas las generaciones de Abraham a David fueron catorce generaciones[a]; de David a la deportación a Babilonia[b], catorce generaciones; y de la deportación a Babilonia al Mesías[c], catorce generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “De modo que todas las generaciones...”. οὖν introduce una conclusión o resumen genealógico.'
    reason: alternative_reading
  - marker: b
    text: 'O: “la deportación a Babilonia” o “el cautiverio en Babilonia”. El griego μετοικεσία destaca el traslado al exilio.'
    reason: lexical_alternative
  - marker: c
    text: 'O: “el Cristo”. Aquí Χριστός se entiende como título mesiánico; por eso se traduce “Mesías”.'
    reason: alternative_reading
lexical_decisions:
- source_word: Πᾶσαι οὖν αἱ γενεαὶ
  english_pob_choice: So all the generations
  chosen_spanish: Así que todas las generaciones
  alternatives_spanish:
  - Por tanto, todas las generaciones
  - De modo que todas las generaciones
  lexicon: BDAG
  rationale: Πᾶσαι αἱ γενεαὶ se expresa naturalmente como 'todas las generaciones'; οὖν aporta una transición inferencial o resumitiva, bien rendida por 'Así que' en español actual sin perder el vínculo con lo anterior.
- source_word: γενεαὶ
  english_pob_choice: generations
  chosen_spanish: generaciones
  alternatives_spanish:
  - descendencias
  - líneas genealógicas
  lexicon: BDAG
  rationale: Aquí γενεά se refiere a sucesivas generaciones en una genealogía. 'Generaciones' es la forma más clara y directa en español, y conserva el patrón repetido del texto.
- source_word: ἀπὸ ... ἕως
  english_pob_choice: from ... to
  chosen_spanish: de ... a
  alternatives_spanish:
  - desde ... hasta
  - de ... hasta
  lexicon: BDAG
  rationale: La pareja ἀπό ... ἕως marca el tramo genealógico entre dos puntos. 'De ... a' es idiomático en español y mantiene la estructura paralela de las tres cláusulas.
- source_word: μετοικεσίας Βαβυλῶνος
  english_pob_choice: the exile to Babylon
  chosen_spanish: el exilio en Babilonia
  alternatives_spanish:
  - la deportación a Babilonia
  - el cautiverio en Babilonia
  lexicon: BDAG
  rationale: μετοικεσία denota traslado/deportación al exilio. 'Exilio en Babilonia' expresa bien el hecho histórico-teológico y suena natural en español; 'deportación' sería más técnico, pero menos idiomático aquí.
- source_word: τοῦ χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  - Cristo
  lexicon: BDAG
  rationale: En esta genealogía, Χριστός funciona como título culminante. Se traduce 'Mesías' para preservar su valor semántico y la decisión POB documentada de no ocultar el título con una forma litúrgica tradicional cuando el contexto es titular.
- source_word: Δαυὶδ / Ἀβραὰμ / Βαβυλῶνος
  english_pob_choice: David / Abraham / Babylon
  chosen_spanish: David / Abraham / Babilonia
  alternatives_spanish:
  - Davíd / Abrahán / Babilonia
  lexicon: convención onomástica española
  rationale: Se siguen las formas españolas estándar de nombres propios bíblicos ampliamente reconocibles. 'Babilonia' mantiene la referencia geográfica y histórica del texto.
- source_word: γενεαὶ δεκατέσσαρες
  english_pob_choice: fourteen generations
  chosen_spanish: catorce generaciones
  alternatives_spanish:
  - catorce descendencias
  lexicon: BDAG
  rationale: La frase nominal se vierte de modo directo y repetido como 'catorce generaciones', conservando el paralelismo enfático de la lista genealógica.
theological_decisions:
- issue: Χριστός como título en la culminación genealógica
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  - Cristo
  rationale: El verso culmina la genealogía en la identidad mesiánica. Traducir 'Mesías' mantiene el contenido del título y evita que el término se perciba solo como nombre propio o forma eclesial fija.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah'' where title; Translation philosophy §2'
- issue: Referencia al exilio babilónico
  english_pob_reading: the exile to Babylon
  chosen_spanish_reading: el exilio en Babilonia
  alternative_spanish_readings:
  - la deportación a Babilonia
  - el cautiverio en Babilonia
  rationale: La palabra griega enfatiza el traslado al exilio. 'Exilio en Babilonia' conserva la carga histórica y permite una lectura clara sin suavizar el acontecimiento.
  doctrine_reference: Uso histórico-teológico del periodo exílico en la genealogía de Mateo
translation_notes:
  revision_awareness: 'La base inglesa pasó por ajustes para preservar el paralelismo triple y luego corrigió una oscilación entre ''Messiah'' y ''Christ'', restableciendo ''Messiah'' por política doctrinal. La versión española sigue esa decisión y mantiene la estructura simétrica del griego: tres tramos genealógicos, cada uno con catorce generaciones.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός en coherencia con la política POB de traducir el título en contextos titulativos.
  - '''Exilio en Babilonia'' se usa de forma consistente para μετοικεσία, sin convertirlo en un eufemismo más general como ''cautiverio''.'
  - Se conserva el paralelismo repetitivo del original con puntuación que separa las tres cláusulas sin romper la cadencia.
  - Los nombres propios siguen formas españolas estándar y no se latiniza 'Mesías' como nombre propio.
