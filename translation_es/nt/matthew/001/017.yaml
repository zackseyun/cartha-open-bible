  text: Πᾶσαι οὖν αἱ γενεαὶ ἀπὸ Ἀβραὰμ ἕως Δαυὶδ γενεαὶ δεκατέσσαρες, καὶ ἀπὸ Δαυὶδ ἕως τῆς μετοικεσίας Βαβυλῶνος γενεαὶ δεκατέσσαρες, καὶ ἀπὸ τῆς μετοικεσίας Βαβυλῶνος ἕως τοῦ χριστοῦ γενεαὶ δεκατέσσαρες.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/001/017.yaml
  text: So all the generations from Abraham to David were fourteen generations[a], and from David to the exile to Babylon fourteen generations[b], and from the exile to Babylon to the Messiah fourteen generations.
