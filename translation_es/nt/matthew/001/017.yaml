revisions:
- from: Así que todas las generaciones, de Abraham a David, fueron catorce generaciones[a]; y de David al exilio en Babilonia, catorce generaciones[b]; y del exilio en Babilonia al Mesías, catorce generaciones[c].
  to: Así que todas las generaciones de Abraham a David fueron catorce generaciones[a]; de David a la deportación a Babilonia, catorce generaciones; y de la deportación a Babilonia al Mesías[c], catorce generaciones.
  rationale: Se conserva fielmente la estructura resumitiva y paralela del griego, se mantiene 'Mesías' conforme a la política POB para Χριστός como título, y se ajusta μετοικεσία a 'deportación a Babilonia' para representar mejor el sentido de traslado al exilio. También se limpia la puntuación para un español más natural. La nota [b] se elimina porque deja de ser necesaria en esta redacción; [a] y [c] siguen siendo pertinentes y sus marcadores permanecen anclados en el texto.
