revisions:
- from: Judá engendró a Pérez y a Zara de Tamar[a]; Pérez engendró a Hezrón, y Hezrón engendró a Aram.
  to: Judá engendró a Pérez y a Zérah de Tamar[a]; Pérez engendró a Hezrón, y Hezrón engendró a Aram.
  rationale: Se mantiene casi todo el borrador porque representa bien el griego y su estilo genealógico en español. Solo se revisa «Zara» a «Zérah» para reflejar la decisión léxica auditada de priorizar la continuidad con la forma hebrea/canónica del nombre, tal como hizo el POB inglés con «Zerah». La nota [a] sobre «Aram»/«Ram» permanece correctamente anclada en «Tamar[a]», siguiendo el expediente recibido.
  reviewer_model: gpt-5.4
