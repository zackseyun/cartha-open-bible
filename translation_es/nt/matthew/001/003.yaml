translation:
  language: es
  text: Judá engendró a Pérez y a Zérah de Tamar[a]; Pérez engendró a Hezrón, y Hezrón engendró a Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas traducciones en español tienen «Ram» aquí, reflejando otra tradición de transliteración; el texto griego aquí lee «Aram».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰούδας
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judas
  lexicon: BDAG
  rationale: En la genealogía patriarcal, el referente es el antepasado tribal de Israel, no el personaje neotestamentario llamado Judas. «Judá» es la forma establecida en español bíblico y mantiene la continuidad canónica con el Antiguo Testamento.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: BDAG
  rationale: En genealogías, γεννάω expresa generación/descendencia. «Engendró» conserva la fuerza genealógica y el tono formal sin volverse perifrástico.
- source_word: Φαρὲς
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Fares
  - Farez
  lexicon: BDAG
  rationale: El nombre corresponde al hebreo פֶּרֶץ. «Pérez» es la transliteración tradicional y reconocible en español bíblico, y enlaza con la tradición veterotestamentaria.
- source_word: Ζάρα
  english_pob_choice: Zerah
  chosen_spanish: Zara
  alternatives_spanish:
  - Zérah
  - Sera
  lexicon: BDAG
  rationale: La forma griega Ζάρα se refleja de modo natural en español como «Zara». Aunque la tradición del AT suele ofrecer «Zérah», aquí se prefiere una transliteración cercana al griego, siguiendo la primacía del texto fuente.
- source_word: ἐκ τῆς Θαμάρ
  english_pob_choice: by Tamar
  chosen_spanish: de Tamar
  alternatives_spanish:
  - por Tamar
  - a través de Tamar
  lexicon: BDAG
  rationale: En la construcción genealógica, ἐκ con nombre materno indica origen materno. «De Tamar» es español natural y conserva la mención destacada de la madre sin sobreexplicarla.
- source_word: Θαμάρ
  english_pob_choice: Tamar
  chosen_spanish: Tamar
  lexicon: BDAG
  rationale: Nombre propio ya asentado en español bíblico; no requiere adaptación adicional.
- source_word: Ἑσρώμ
  english_pob_choice: Hezron
  chosen_spanish: Hezrón
  alternatives_spanish:
  - Esrom
  lexicon: BDAG
  rationale: El nombre corresponde al hebreo חֶצְרוֹן. «Hezrón» mantiene la forma canónica usual en español y la continuidad con el Antiguo Testamento; «Esrom» sería una latinización más antigua.
- source_word: Ἀράμ
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Ram
  lexicon: BDAG
  rationale: La edición griega leída aquí tiene Ἀράμ, por lo que la forma principal debe seguir esa lectura. Se conserva la tradición alternativa «Ram» solo como variante documentada, no en el texto principal.
theological_decisions:
- issue: Si armonizar el último nombre con la tradición genealógica conocida en otras versiones bíblicas
  english_pob_reading: Aram
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - Ram
  rationale: La prioridad del proyecto es el texto griego disponible. Aunque otras tradiciones y algunos lectores esperan «Ram», la forma transmitida aquí es Ἀράμ, y por eso se mantiene «Aram» en el cuerpo del texto. La variante se documenta para transparencia textual.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio necesario; esta redacción sigue fielmente el texto griego SBLGNT y el criterio auditado de la POB en inglés, conservando la variante tradicional solo en nota.
  spanish_consistency_notes:
  - Se mantuvo «engendró» como verbo genealógico uniforme en la sección.
  - Se prefirió transliteración bíblica estándar en español cuando coincide con la tradición canónica; se evitó latinizaciones innecesarias.
  - La nota a pie preserva la tensión textual entre la forma griega presente y la variante tradicional «Ram».
