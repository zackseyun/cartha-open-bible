translation:
  language: es
  text: '¡Ay de ustedes[a], guías ciegos, que dicen: «Quien jura por el templo, no vale nada[b]; pero quien jura por el oro del templo, queda obligado»!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Quien jura en el templo». Aquí «por el templo» refleja la fórmula de juramento pretendida por el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «no es nada», es decir, tal juramento se trata como no vinculante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ti/ustedes!
  lexicon: BDAG
  rationale: En español, «¡Ay de ustedes!» conserva la fuerza profética de denuncia de Οὐαί sin sonar artificiosamente solemne. Mantiene el valor de reprensión judicial del original, equivalente a «Woe to you».
- source_word: ὁδηγοὶ τυφλοὶ
  english_pob_choice: blind guides
  chosen_spanish: ciegos guías
  alternatives_spanish:
  - guías ciegos
  - ciegos líderes
  lexicon: BDAG
  rationale: La imagen central es la de quienes orientan a otros estando ciegos. «Guías» reproduce bien ὁδηγοί; el adjetivo antepuesto «ciegos» mantiene el énfasis de la acusación. Se conserva el orden enfático del griego con naturalidad española.
- source_word: οἱ λέγοντες
  english_pob_choice: who say
  chosen_spanish: que dicen
  alternatives_spanish:
  - que están diciendo
  - diciendo
  lexicon: BDAG
  rationale: La participio articular funciona como una relativa; en español, «que dicen» es la forma más clara y natural para introducir la cita.
- source_word: Ὃς ἂν ὀμόσῃ
  english_pob_choice: Whoever swears
  chosen_spanish: Quien jura
  alternatives_spanish:
  - El que jure
  - Cualquiera que jure
  lexicon: BDAG
  rationale: El griego expresa una condición general indefinida. «Quien jura» transmite el sentido sin sobrecargarlo. En español, «jurar» comunica el acto de prestar juramento; aunque la fórmula es técnicamente «jurar por», aquí se entiende por el contexto del dicho.
- source_word: ἐν τῷ ναῷ
  english_pob_choice: by the temple
  chosen_spanish: por el templo
  alternatives_spanish:
  - en el templo
  - en el santuario
  lexicon: BDAG
  rationale: El auditorio entiende una fórmula de juramento. Aunque ἐν es literalmente «en», el contexto exige el valor formulístico del juramento. «Por el templo» evita la lectura espacial plana y refleja la función oclusiva del dicho, siguiendo la decisión auditada en inglés.
- source_word: οὐδέν ἐστιν
  english_pob_choice: it is nothing
  chosen_spanish: no es nada
  alternatives_spanish:
  - no vale nada
  - nada es
  lexicon: BDAG
  rationale: La frase griega es breve y elíptica. «No es nada» preserva esa concisión y la idea de que ese juramento se considera sin valor vinculante, sin expandir demasiado el sentido.
- source_word: χρυσῷ τοῦ ναοῦ
  english_pob_choice: the gold of the temple
  chosen_spanish: el oro del templo
  alternatives_spanish:
  - el oro del santuario
  - el oro perteneciente al templo
  lexicon: BDAG
  rationale: Se mantiene el genitivo sencillo y la contraposición entre el templo y su oro. «Oro» es la forma directa y fiel; «del templo» conserva la relación posesiva sin añadir precisión no presente en el texto.
- source_word: ὀφείλει
  english_pob_choice: is bound
  chosen_spanish: queda obligado
  alternatives_spanish:
  - está obligado
  - debe
  - es deudor
  lexicon: BDAG
  rationale: El verbo σημαίνει «deber/estar obligado». En este contexto, la idea es de vinculación legal-moral por juramento. «Queda obligado» comunica esa fuerza sin añadir explícitamente «por su juramento», que el griego no repite.
theological_decisions:
- issue: Fórmula de juramento y fuerza vinculante implícita
  english_pob_reading: The first clause is rendered tersely ('it is nothing'), while the second clause makes explicit that the speaker is considered obligated by the oath.
  chosen_spanish_reading: La primera cláusula queda breve («no es nada») y la segunda expresa que quien jura por el oro «queda obligado».
  alternative_spanish_readings:
  - «no significa nada»
  - «es nada»
  - «está obligado»
  rationale: El versículo critica una casuística sobre qué juramentos obligan. La españolización debe preservar la tersura del original y la asimetría entre ambas cláusulas. «No es nada» retiene la brusquedad del griego; «queda obligado» comunica la obligación inferida sin sobredeterminarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al no añadir una expansión como «por su juramento» en la segunda cláusula. También conserva la tersura de «it is nothing» mediante «no es nada», y mantiene la opción de juramento formulístico en la primera cláusula.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto exige el nombre divino; aquí no aparece.
  - Se usa «obligado» para ὀφείλει, coherente con la decisión inglesa de evitar una expansión innecesaria.
  - «Templo» se mantiene como traducción directa de ναός en este contexto narrativo-discursivo.
  - La puntuación con comillas angulares y signos de apertura sigue la norma tipográfica del español.
