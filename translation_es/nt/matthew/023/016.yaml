review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: denuncia profética, «guías ciegos», la fórmula de juramento entendida como «por el templo», la elipsis de «οὐδέν ἐστιν», y la obligación implícita en «ὀφείλει». Sin embargo, «no es nada» en español suena más naturalmente referido a la persona o cosa misma que al valor vinculante del juramento, y aquí conviene una formulación más idiomática que siga preservando la elipsis semántica.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «ciegos guías» suena menos natural que «guías ciegos» en español eclesial general. Además, el signo de exclamación final después de la cita completa hace más confusa la puntuación; conviene cerrar la exclamación en la cláusula introductoria y dejar la cita interna con su propia puntuación. «No vale nada» comunica mejor el sentido casuístico del juramento que «no es nada».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «templo», «oro del templo» y «queda obligado»/«está obligado» son compatibles con las decisiones auditadas. La revisión propuesta mantiene la decisión contextual de traducir ἐν τῷ ναῷ como «por el templo», con nota léxica.
  issues:
  - severity: medium
    issue: «ciegos guías» es poco idiomático
    rationale: Aunque posible, en español natural y ampliamente legible suena más fluido «guías ciegos», sin pérdida del sentido ni de la fuerza retórica.
  - severity: medium
    issue: «no es nada» suena torpe o potencialmente equívoco en español
    rationale: Preserva la forma griega de cerca, pero en español moderno la expresión no comunica bien que el juramento se considera sin valor vinculante. «No vale nada» mantiene la concisión y expresa mejor el contraste casuístico.
  - severity: low
    issue: Puntuación exclamativa externa mal cerrada respecto de la cita
    rationale: 'Es más claro escribir «¡Ay de ustedes, guías ciegos, que dicen: …!» o cerrar la exclamación antes de la cita. La versión actual añade un cierre exclamativo después de las comillas de forma poco elegante.'
  revised_spanish_text: '¡Ay de ustedes[a], guías ciegos, que dicen: «Quien jura por el templo, no vale nada[b]; pero quien jura por el oro del templo, queda obligado»!'
  revised_footnotes:
