revisions:
- from: '¡Ay de ustedes[a], ciegos guías, que dicen: «Quien jura por el templo, no es nada[b]; pero quien jura por el oro del templo, queda obligado»!'
  to: '¡Ay de ustedes[a], guías ciegos, que dicen: «Quien jura por el templo, no vale nada[b]; pero quien jura por el oro del templo, queda obligado»!'
  rationale: 'Se ajusta el español para mayor naturalidad y claridad sin apartarse del griego ni del audit trail inglés: «guías ciegos» es más idiomático; «no vale nada» comunica mejor en español el sentido de un juramento tenido por no vinculante, mientras la nota conserva la alternativa más literal «no es nada»; y se regulariza la puntuación de la frase completa.'
