review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: ἰδοὺ como llamado de atención, ἀφίεται en pasiva, ὁ οἶκος ὑμῶν como «su casa», y ἔρημος como «desolada». También preserva correctamente la nota alternativa sobre «templo». Sin embargo, «les queda» suaviza y desplaza un poco la fuerza pasiva de ἀφίεται hacia un giro más idiomático-resultativo; una forma más directa como «les es dejada» o «queda abandonada para ustedes» preservaría mejor el matiz de ''is left to you''.'
  spanish_quality_summary: El español es claro y legible, pero «¡Miren!» con signo de exclamación añade una intensidad no requerida por el griego, y la mayúscula en «Su» tras la interjección no es la puntuación más natural en continuidad. Además, el registro puede mejorar con «Miren[a], su casa les es dejada desolada» o similar, que suena más solemne y fiel. La redacción revisada mantiene claridad sin sonar arcaica.
  glossary_alignment: No hay conflicto con la terminología proyectual. «Su casa» conserva la amplitud metafórica en línea con la decisión POB; «desolada» corresponde bien a ἔρημος. La revisión se enfoca en alinear mejor la pasiva de ἀφίεται y la naturalidad/puntuación del español.
  issues:
  - severity: medium
    issue: «les queda» para ἀφίεται
    rationale: Aunque idiomático, este giro puede sonar más como estado resultante o posesión remanente que como pasiva de 'ser dejada/abandonada'. El inglés auditado y el griego favorecen una formulación que retenga más claramente la voz pasiva.
  - severity: low
    issue: Exclamación en «¡Miren!»
    rationale: ἰδοὺ es un llamado de atención solemne, pero no exige necesariamente exclamación en español. Sin exclamación, el tono queda más sobrio y más cercano al valor discursivo del original.
  - severity: low
    issue: Mayúscula en «Su» después de la llamada inicial
    rationale: En una sola oración continua, «su» debe ir en minúscula tras la coma para ajustarse mejor a la puntuación española estándar.
  revised_spanish_text: Miren[a], su casa les es dejada desolada.
  revised_footnotes:
  - marker: a
    text: O «su templo»; la frase «su casa» puede referirse específicamente al templo, aunque el griego deja la expresión más amplia.
    reason: alternative_reading
