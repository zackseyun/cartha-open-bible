translation:
  language: es
  text: Miren[a], su casa les es dejada desolada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su templo»; la frase «su casa» puede referirse específicamente al templo, aunque el griego deja la expresión más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - Miren
  - Vean
  - ¡Miren ustedes!
  lexicon: BDAG
  rationale: La interjección llama la atención de forma natural en español moderno. «¡Miren!» conserva el tono solemne de anuncio sin recurrir a un arcaísmo como «He aquí» o «Mirad».
- source_word: ἀφίεται
  english_pob_choice: is left
  chosen_spanish: les queda
  alternatives_spanish:
  - es dejado a ustedes
  - queda abandonada para ustedes
  - es abandonada
  lexicon: BDAG
  rationale: El pasivo presente expresa una situación resultante en curso. En español, «les queda» comunica bien la idea de quedar entregada/abandonada a su estado, sin añadir de manera demasiado explícita un agente que el griego no nombra.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo se vierte de manera natural con el clítico indirecto «les», que preserva la relación de destinación o afectación sin forzar una frase preposicional pesada.
- source_word: ὁ οἶκος ὑμῶν
  english_pob_choice: your house
  chosen_spanish: Su casa
  alternatives_spanish:
  - su templo
  - su hogar
  - su casa
  lexicon: BDAG
  rationale: Se conserva la expresión literal «casa» en vez de resolverla como «templo» en el texto principal. En español, la mayúscula reverencial no es necesaria; «su casa» mantiene la amplitud metafórica del griego y deja abierta la referencia contextual.
- source_word: ἔρημος
  english_pob_choice: desolate
  chosen_spanish: desolada
  alternatives_spanish:
  - abandonada
  - desierta
  - devastada
  lexicon: BDAG
  rationale: «Desolada» reproduce bien el valor profético de ruina y abandono. Es más fuerte que «desierta» y menos interpretativa que «devastada», conservando la resonancia de juicio del adjetivo griego.
theological_decisions:
- issue: Referente de «su casa»
  english_pob_reading: Kept as 'your house' without specifying temple or Jerusalem in the main text.
  chosen_spanish_reading: Se mantiene «su casa» sin especificar «templo» ni «Jerusalén» en el texto principal.
  alternative_spanish_readings:
  - su templo
  - Jerusalén queda desolada
  - la nación/la casa de Israel
  rationale: El contexto inmediato sugiere el templo y la ciudad bajo juicio, pero el griego dice literalmente «su casa». Mantener la expresión amplia preserva la tensión interpretativa documentada por la POB y evita cerrar el sentido más de lo que el texto permite.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del registro auditado y no incorpora revisiones adicionales; conserva la ambigüedad textual sobre el referente de «casa» tal como la POB inglesa la documenta.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aplica.
  - Se conserva el registro solemne pero moderno, evitando arcaísmos innecesarios.
  - No se resuelve la metáfora de «casa» en el cuerpo del texto para respetar el alcance del griego.
