translation:
  language: es
  text: Pero ustedes no han de ser llamados «Rabí», porque uno es su maestro[a], y todos ustedes son hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maestro». El título transliterado «Rabí» conserva el trasfondo judío, mientras que διδάσκαλος expresa el sentido de enseñanza que no debe borrarse en español.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» traduce el plural masculino ἀδελφοί. En este contexto puede referirse al grupo de discípulos en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ κληθῆτε
  english_pob_choice: are not to be called
  chosen_spanish: no han de ser llamados
  alternatives_spanish:
  - no deben ser llamados
  - no se les debe llamar
  lexicon: BDAG
  rationale: La construcción prohibitiva en pasiva se expresa en español con naturalidad mediante una prohibición de ser llamados. «No han de ser llamados» conserva el tono normativo sin endurecerlo más de lo que exige el griego.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabí (Rabbi)
  - Rabbi
  lexicon: BDAG
  rationale: Conservo la transliteración judía como título propio y con uso conocido en español bíblico. «Rabí» mantiene el valor histórico y evita traducirlo prematuramente como «maestro», que ya aparece después con διδάσκαλος.
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: uno solo
  alternatives_spanish:
  - uno
  - solamente uno
  lexicon: BDAG
  rationale: «Uno solo» comunica la singularidad enfatizada por εἷς y su fuerza restrictiva en el contexto, sin agregar una paráfrasis doctrinal ajena al versículo.
- source_word: ὁ διδάσκαλος
  english_pob_choice: your teacher
  chosen_spanish: su maestro
  alternatives_spanish:
  - su maestro
  - el maestro de ustedes
  lexicon: BDAG
  rationale: «Maestro» es el equivalente natural en español para διδάσκαλος en este contexto. «Su maestro» conserva la relación posesiva del griego con ὑμῶν y evita duplicar el mismo término con «Rabí».
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Mantengo el masculino plural como forma colectiva representativa, tal como hace la POB inglesa con «brothers». En el contexto del discipulado, el término funciona como designación comunitaria inclusiva sin neutralizar la forma del original.
- source_word: πάντες δὲ ὑμεῖς
  english_pob_choice: you are all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - ustedes todos
  - todos vosotros
  lexicon: BDAG
  rationale: «Todos ustedes» reproduce de manera natural el énfasis colectivo del griego y mantiene el orden comunicativo claro en español latinoamericano.
theological_decisions:
- issue: Si la prohibición sobre llamar «Rabí» debe leerse como regla absoluta sobre todo título honorífico o como una instrucción contextual contra la búsqueda de estatus
  english_pob_reading: The translation preserves the direct prohibition without expanding it into an absolute doctrinal rule beyond the verse's wording.
  chosen_spanish_reading: La redacción conserva la prohibición directa sin convertirla en una regla doctrinal absoluta más amplia que el versículo mismo.
  alternative_spanish_readings:
  - Una prohibición absoluta de usar cualquier título semejante
  - Una crítica solo a la ambición hipócrita dentro de la comunidad
  rationale: El griego presenta una prohibición y su razón, pero no desarrolla aquí todas sus aplicaciones posteriores. La traducción debe permanecer ceñida al texto y no resolver la tensión interpretativa que el propio versículo deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'Coincide con la última revisión del texto base: no se documentan cambios posteriores ni ajustes pendientes en el audit trail; por eso la propuesta sigue de cerca la decisión inglesa de mantener la distinción entre el título transliterado y el término común para ‘maestro’.'
  spanish_consistency_notes:
  - Se mantiene «Rabí» en transliteración para el título, y «maestro» para διδάσκαλος, preservando la distinción léxica del original.
  - Se usa el plural masculino colectivo «hermanos» como equivalente de ἀδελφοί, en línea con la política POB y con una nota explicativa.
  - La prohibición se formula con un español natural y digno, sin añadir una amplitud doctrinal que el versículo no explicita.
