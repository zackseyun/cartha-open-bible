translation:
  language: es
  text: '¡Ay de ustedes, escribas y fariseos, hipócritas! Porque diezman la menta, el eneldo y el comino, y han dejado de lado los asuntos más importantes de la ley: la justicia, la misericordia y la fe[a]. Estas cosas debían hacerlas, sin descuidar las otras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fidelidad». El término griego puede denotar fe, confianza o fidelidad; en este contexto ético muchos entienden fidelidad de pacto.
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay de vosotros!
  - ¡Ay!
  lexicon: BDAG
  rationale: El interjección profética expresa denuncia y lamento; en español, «¡Ay de ustedes!» comunica mejor el tono acusatorio y solemne que una simple exclamación neutra.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y establecido en el contexto evangélico; evita ampliar interpretativamente el cargo.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  lexicon: BDAG
  rationale: Término transliterado tradicionalmente en español y plenamente transparente para el lector bíblico.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - pretendedores
  - actores fingidos
  lexicon: BDAG
  rationale: Aquí el sentido moral figurado es el pertinente; «hipócritas» conserva la fuerza de la reprensión sin suavizarla.
- source_word: ἀποδεκατοῦτε
  english_pob_choice: tithe
  chosen_spanish: diezman
  alternatives_spanish:
  - pagan el diezmo de
  - entregan el diezmo de
  lexicon: BDAG
  rationale: El verbo significa dar la décima parte. «Diezman» mantiene la brevedad y el valor cultual/legal del acto.
- source_word: ἡδύοσμον
  english_pob_choice: mint
  chosen_spanish: menta
  lexicon: BDAG
  rationale: Glosa botánica estándar para la hierba mencionada.
- source_word: ἄνηθον
  english_pob_choice: dill
  chosen_spanish: eneldo
  lexicon: BDAG
  rationale: Glosa estándar de la planta nombrada por el texto griego.
- source_word: κύμινον
  english_pob_choice: cumin
  chosen_spanish: comino
  alternatives_spanish:
  - cúmino
  lexicon: BDAG
  rationale: «Comino» es el término natural y transparente en español moderno; conserva la referencia culinaria del texto.
- source_word: ἀφήκατε
  english_pob_choice: have neglected
  chosen_spanish: han dejado de lado
  alternatives_spanish:
  - han descuidado
  - han abandonado
  lexicon: BDAG
  rationale: En este contexto ἀφίημι significa apartar o descuidar; «han dejado de lado» reproduce bien la idea de omitir lo más importante sin exagerar a abandono total.
- source_word: τὰ βαρύτερα τοῦ νόμου
  english_pob_choice: the weightier matters of the law
  chosen_spanish: los asuntos más importantes de la ley
  alternatives_spanish:
  - las cosas más pesadas de la ley
  - las cosas más graves de la ley
  lexicon: BDAG
  rationale: Se conserva el contraste de importancia que implica βαρύτερα; «asuntos más importantes» suena natural en español y evita un calco rígido de «más pesados».
- source_word: κρίσιν
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  lexicon: BDAG
  rationale: En esta tríada ética, κρίσις remite a la justicia recta, no al acto de juzgar; por eso «justicia» es la mejor equivalencia.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: la misericordia
  alternatives_spanish:
  - la compasión
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente bíblico natural y mantiene el registro ético-covenantal del pasaje.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la fe/fidelidad
  lexicon: BDAG
  rationale: El texto principal sigue la elección auditada de «faith»; en español, «fe» mantiene la lectura base, aunque el contexto permite la noción de fidelidad.
- source_word: ταῦτα ἔδει ποιῆσαι
  english_pob_choice: These you ought to have done
  chosen_spanish: Estas cosas debían hacerlas
  alternatives_spanish:
  - Esto debían hacerlo
  - Era necesario hacer estas cosas
  lexicon: BDAG
  rationale: ἔδει expresa obligación pasada. «Debían hacerlas» conserva la fuerza normativa y suena natural en español.
- source_word: κἀκεῖνα μὴ ἀφιέναι
  english_pob_choice: without neglecting the others
  chosen_spanish: sin dejar aquellas otras
  alternatives_spanish:
  - sin descuidar aquellas otras
  - y no dejar aquellas otras
  lexicon: BDAG
  rationale: La cláusula final equilibra la anterior y señala que lo menor no debía omitirse; «sin dejar aquellas otras» mantiene esa contraposición de forma concisa.
theological_decisions:
- issue: Valor de πίστις en la tríada ética
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la fe entendida como fidelidad
  rationale: Se conserva la lectura principal auditada por el POB inglés. Aunque en este contexto ético algunos entienden una idea de fidelidad de pacto, el texto español mantiene «la fe» y deja abierta esa tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; footnote alternatives where contested'
translation_notes:
  revision_awareness: La versión auditada en inglés quedó sin cambios en la última pasada (high_agreement; no applied revisions). La redacción española sigue de cerca el griego y el trail inglés, preservando la tríada ética y la tensión interpretativa de πίστις mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto en el proyecto, pero aquí no aparece el nombre divino.
  - Se mantiene «escribas», «fariseos», «hipócritas» y «fe» para alinearse con el audit trail y el registro bíblico.
  - «La justicia, la misericordia y la fe» reproduce la tríada del texto base y permite la alternativa de «fidelidad» en nota.
