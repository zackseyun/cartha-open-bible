translation:
  language: es
  text: '¡Ciegos! ¿Pues qué es mayor: el don[a] o el altar que santifica[b] el don?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ofrenda» para «el don».
    reason: lexical_alternative
  - marker: b
    text: O «que hace santo el don».
    reason: lexical_alternative
lexical_decisions:
- source_word: τυφλοί
  english_pob_choice: Blind men
  chosen_spanish: ¡Ciegos!
  alternatives_spanish:
  - ¡Ciegos hombres!
  - ¡Hombres ciegos!
  - ¡Ciegos, ustedes!
  lexicon: BDAG
  rationale: En vocativo plural, el griego funciona como una reprensión directa y despectiva. En español, el vocativo exclamativo «¡Ciegos!» comunica con naturalidad el insulto sin añadir «hombres», que en esta línea no aporta claridad y suena forzado. Se mantiene el tono de amonestación sin intensificarlo más allá del texto.
- source_word: τί γὰρ μεῖζον
  english_pob_choice: for which is greater
  chosen_spanish: ¿Pues qué es mayor?
  alternatives_spanish:
  - ¿Pues cuál es mayor?
  - ¿Pues qué es más grande?
  - ¿Pues qué es más importante?
  lexicon: BDAG
  rationale: τί con γάρ introduce una pregunta explicativa/comparativa. «¿Qué es mayor?» preserva el comparativo μεῖζον y suena natural en español. «Más importante» interpretaría demasiado el contraste; «más grande» es posible, pero «mayor» mantiene mejor el registro de comparación general.
- source_word: τὸ δῶρον
  english_pob_choice: the gift
  chosen_spanish: el don
  alternatives_spanish:
  - la ofrenda
  - el regalo
  lexicon: BDAG
  rationale: Aunque δῶρον puede referirse a una ofrenda en contexto cultual, el sentido básico es «don». Se eligió «don» porque conserva la cercanía al griego y permite que el contexto sacrificial siga operando sin forzar una aclaración interpretativa. «Ofrenda» es una alternativa válida, pero desplaza el matiz léxico básico.
- source_word: θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: BDAG
  rationale: «Altar» es la equivalencia normal y suficiente para θυσιαστήριον en contexto cultual. La forma ampliada «altar sacrificial» sería explicativa de más y no necesaria aquí.
- source_word: τὸ ἁγιάζον
  english_pob_choice: that sanctifies
  chosen_spanish: que santifica
  alternatives_spanish:
  - que hace santo
  - que consagra
  lexicon: BDAG
  rationale: Se conserva el verbo «santifica» para mantener la conexión léxica con ἁγιάζω y la lógica de santidad cultual del argumento. «Que hace santo» explicita el sentido pero suena más perifrástico; «consagra» puede sugerir solo separación ritual y perder la amplitud de la acción.
theological_decisions:
- issue: Valor cultual de ἁγιάζω respecto del altar y el don
  english_pob_reading: that sanctifies the gift
  chosen_spanish_reading: que santifica el don
  alternative_spanish_readings:
  - que hace santo el don
  - que consagra el don
  rationale: La frase presupone que el altar comunica santidad al don. «Santifica» preserva esa relación sin reducirla a mera formalidad ritual ni suavizarla con paráfrasis. Mantener este término ayuda a conservar la lógica teológica del dicho de Jesús.
  doctrine_reference: Translation philosophy §5; preserve theological weight without paraphrase
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se mantiene la lectura estable del texto griego y la decisión inglesa de conservar el contraste entre δῶρον y θυσιαστήριον, adaptándolo al español con una formulación natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «don» como equivalente principal de δῶρον por fidelidad léxica, aunque «ofrenda» queda como nota alternativa por el contexto sacrificial.
  - «Santifica» conserva la terminología cultual sin sustituirla por una explicación más libre.
  - La puntuación y el orden siguen la pregunta comparativa del griego y reflejan el tono de reprensión directa.
