  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Santifica» preserva bien ἁγιάζω; «altar» y «Dios» no plantean problemas aquí. La decisión de usar «don» en vez de «ofrenda» es coherente con el rastro léxico inglés, siempre que la alternativa quede correctamente anotada.
