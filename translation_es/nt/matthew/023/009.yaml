translation:
  language: es
  text: Y no llamen padre[a] a nadie en la tierra, porque uno es su Padre[b], el que está en los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y no llamen a nadie en la tierra su padre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque uno es su Padre, el Padre celestial», o «porque uno es su Padre, el celestial».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καλέσητε
  english_pob_choice: call no man
  chosen_spanish: llamen
  alternatives_spanish:
  - no llamen
  - no llamen a nadie
  - no consideren padre a nadie
  lexicon: BDAG
  rationale: El aoristo subjuntivo con μή expresa una prohibición. En español, «llamen» mantiene la fuerza directa del mandato y suena natural; el contexto completa la idea de no aplicar ese título a nadie en la tierra.
- source_word: πατέρα
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - un padre
  - padre (como título)
  - progenitor
  lexicon: BDAG
  rationale: Aquí el término funciona como título u honorífico, no como referencia biológica. «Padre» conserva la repetición con la segunda cláusula y evita suavizar el peso del dicho.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - vuestro
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma natural en español con «su», referido al grupo al que Jesús habla. Es la opción más fluida y sobria en este contexto.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - aquí en la tierra
  lexicon: BDAG
  rationale: La frase indica el ámbito terrenal en contraste con el Padre celestial. «En la tierra» es claro, idiomático y reproduce bien la oposición espacial del texto.
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: uno solo
  alternatives_spanish:
  - uno
  - único
  lexicon: BDAG
  rationale: «Uno solo» comunica con naturalidad la exclusividad implícita en el dicho sin perder el valor literal de εἷς. En español ayuda a evitar una lectura meramente numérica y mantiene la tensión teológica.
- source_word: ὁ πατήρ
  english_pob_choice: your Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - el Padre
  - su Padre
  lexicon: BDAG
  rationale: Aunque el texto griego tiene un valor relacional claro, el posesivo español debe ajustarse al sujeto plural implícito. «Su Padre» preserva la relación personal con los destinatarios.
- source_word: οὐράνιος
  english_pob_choice: the heavenly One
  chosen_spanish: el celestial
  alternatives_spanish:
  - el Padre celestial
  - quien está en el cielo
  - el celestial Padre
  lexicon: BDAG
  rationale: El adjetivo λειτουργa de modo sustantivado en el contexto. «El celestial» conserva la forma marcada del griego sin expandir prematuramente a una paráfrasis explicativa; a la vez, sigue siendo comprensible en español eclesial.
theological_decisions:
- issue: Alcance de la prohibición de llamar 'padre' a alguien en la tierra
  english_pob_reading: Render the saying as a direct prohibition against assigning ultimate spiritual honorific fatherhood to anyone on earth, without paraphrasing it into an absolute ban on all uses of 'father.'
  chosen_spanish_reading: Presentar el dicho como una prohibición directa de otorgar a una persona en la tierra el título de padre en sentido honorífico o de autoridad espiritual, sin convertirlo en una prohibición absoluta de todo uso de la palabra.
  alternative_spanish_readings:
  - Interpretarlo como una prohibición absoluta de cualquier uso humano de 'padre'
  - Suavizarlo como una hipérbole sin mandato vinculante
  rationale: El griego es tajante y la traducción debe conservar esa contundencia. Al mismo tiempo, el español no debe resolver de antemano la tensión del pasaje con una paráfrasis aclaratoria que el texto no exige. Mantener la literalidad controlada deja que el contexto bíblico delimite el alcance.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'El draft sigue de cerca el texto griego SBLGNT y el audit trail inglés: mantiene la prohibición directa, conserva la exclusividad de εἷς y refleja el participio/adjetivo οὐράνιος sin resolverlo demasiado. Se adoptó un español natural, con leves ajustes para que la relación posesiva y el orden de palabras resulten publicables en español.'
  spanish_consistency_notes:
  - Se usó «Dios/Padre celestial» solo donde la fuente lo requiere; aquí se mantuvo «el celestial» para respetar la forma marcada del griego.
  - Se evitó «SEÑOR» y también cualquier sustitución interpretativa de «Padre» por un término menos preciso.
  - Se mantuvo el tratamiento plural implícito en «llamen» y «su Padre», coherente con el discurso a los discípulos.
