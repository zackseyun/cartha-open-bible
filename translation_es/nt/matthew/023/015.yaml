translation:
  language: es
  text: ¡Ay de ustedes, escribas y fariseos, hipócritas! Porque recorren mar y tierra para hacer un prosélito[a], y cuando llega a serlo, lo hacen hijo de Gehenna[b], el doble que ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «convertido».
    reason: lexical_alternative
  - marker: b
    text: 'O «hijo del infierno». Griego: «hijo de Gehenna».'
    reason: alternative_reading
lexical_decisions:
- source_word: Οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes,
  lexicon: BDAG
  rationale: La interjección profética οὐαί transmite denuncia y lamento; en español, «¡Ay de ustedes!» conserva esa fuerza sin sonar demasiado arcaico. Mantiene el tono directo de reprensión del texto.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - expertos en la Ley
  - maestros de la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente estable y reconocido para este grupo judío. Las otras opciones explicitan función, pero son más interpretativas.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Transliteración estándar en español para el grupo judío mencionado.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - pretendientes
  - simuladores
  lexicon: BDAG
  rationale: «Hipócritas» conserva el valor moral-religioso bien establecido y corresponde al uso bíblico tradicional sin perder claridad.
- source_word: περιάγετε τὴν θάλασσαν καὶ τὴν ξηρὰν
  english_pob_choice: travel over sea and land
  chosen_spanish: recorren mar y tierra
  alternatives_spanish:
  - cruzan mar y tierra
  - viajan por mar y tierra
  lexicon: BDAG
  rationale: La expresión griega es una merismo de amplitud y esfuerzo. «Recorren mar y tierra» comunica esa amplitud con naturalidad en español sin perder la imagen.
- source_word: ποιῆσαι ἕνα προσήλυτον
  english_pob_choice: to make one convert
  chosen_spanish: para hacer un prosélito
  alternatives_spanish:
  - para hacer un convertido
  - para hacer un prosélito
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «convert», el griego προσήλυτος designa específicamente un prosélito; en español, «prosélito» preserva mejor el término de origen y la referencia histórica-religiosa. Se evita reducirlo a «convertido», que sería más general.
- source_word: ὅταν γένηται
  english_pob_choice: when he becomes one
  chosen_spanish: y cuando llega a serlo
  alternatives_spanish:
  - y cuando se hace prosélito
  - y cuando llega a ser un prosélito
  lexicon: BDAG
  rationale: La forma griega retoma al prosélito implícito. «Llega a serlo» mantiene la referencia pronominal y la progresión del proceso sin sobreactuar el género en español; el contexto sigue claramente singular.
- source_word: υἱὸν γεέννης
  english_pob_choice: a son of Gehenna
  chosen_spanish: hijo de Gehenna
  alternatives_spanish:
  - hijo del infierno
  - hijo del Gehena
  lexicon: BDAG
  rationale: Se preserva «Gehenna» porque el texto griego usa γεέννα y el audit trail inglés distingue este término de «hell». En español, mantener el préstamo evita aplanar el trasfondo judío y la tensión escatológica.
- source_word: διπλότερον ὑμῶν
  english_pob_choice: twice as much ... as yourselves
  chosen_spanish: dos veces más que ustedes
  alternatives_spanish:
  - el doble que ustedes
  - dos veces más que ustedes mismos
  lexicon: BDAG
  rationale: «Dos veces más que ustedes» reproduce el comparativo de duplicación de διπλότερον con fluidez natural. Se conserva el contraste directo con los interlocutores.
theological_decisions:
- issue: Rendering of γεέννα
  english_pob_reading: Gehenna
  chosen_spanish_reading: Gehenna
  alternative_spanish_readings:
  - infierno
  - Gehena
  rationale: El texto griego no usa un término genérico para el destino final, sino γεέννα. Seguir con «Gehenna» respeta la primacía del original y conserva la carga histórica y escatológica sin reinterpretarla por completo como «infierno».
  doctrine_reference: Translation philosophy §1, §6
- issue: Masculine singular reference after προσήλυτον
  english_pob_reading: when he becomes one ... make him
  chosen_spanish_reading: cuando llega a serlo ... lo hacen
  alternative_spanish_readings:
  - cuando llega a ser una persona ... la hacen
  - cuando llega a serlo ... le hacen
  rationale: El griego conserva formas masculinas singulares; la traducción mantiene esa referencia de modo natural en español con «lo» y «lo hacen», sin neutralizar el sujeto implícito más allá del alcance del texto.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de POB y no se registraron revisiones aplicadas en la fuente. La versión española mantiene el valor profético de οὐαί, preserva el término técnico προσήλυτος como «prosélito», y retiene γεέννα como «Gehenna» para no aplanar el trasfondo judío del texto.
  spanish_consistency_notes:
  - Se emplea «escribas» para γραμματεῖς, conforme al uso bíblico establecido.
  - Se emplea «fariseos» como transliteración estándar.
  - Se conserva «Gehenna» en el texto principal y se explica la alternativa «infierno» en nota.
  - Se usa «mar y tierra» como merismo natural en español.
  - Se mantiene el singular masculino implícito en «lo» para reflejar la forma griega.
  - La puntuación busca reflejar el tono de reprensión directa del original.
