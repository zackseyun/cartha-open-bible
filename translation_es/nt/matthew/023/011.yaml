translation:
  language: es
  text: Pero el mayor entre ustedes será su servidor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el mayor de ustedes será su servidor». El comparativo griego puede funcionar de manera idiomática para la persona de mayor rango dentro del grupo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce contraste con la búsqueda de honor y títulos en el contexto inmediato; «Pero» conserva la fuerza adversativa de forma natural en español.
- source_word: μείζων
  english_pob_choice: the greatest
  chosen_spanish: el mayor
  alternatives_spanish:
  - el más grande
  - el que es mayor
  lexicon: BDAG
  rationale: El comparativo griego funciona aquí con sentido de rango o estatus dentro del grupo, no como simple comparación de tamaño; «el mayor» suena natural en español y preserva esa lectura de preeminencia.
- source_word: ὑμῶν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: 'La primera aparición del genitivo es partitiva: el que tiene mayor rango dentro del grupo dirigido. «Entre ustedes» expresa mejor esa relación que un posesivo literal.'
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - estará
  lexicon: BDAG
  rationale: El futuro de εἰμί se rinde de manera directa y moderna con «será».
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - de vosotros
  lexicon: BDAG
  rationale: El segundo genitivo es relacional con διάκονος; en español, el posesivo «su» da una frase natural, equivalente a «your servant» en inglés.
- source_word: διάκονος
  english_pob_choice: servant
  chosen_spanish: servidor
  alternatives_spanish:
  - siervo
  - ministro
  - diácono
  lexicon: BDAG
  rationale: En este contexto no se trata de un oficio eclesiástico técnico, sino de servicio humilde. «Servidor» comunica bien la idea en español contemporáneo y evita la ambigüedad confesional de «ministro» o «diácono»; «siervo» es posible, pero suena más cargado o arcaizante en este dicho.
theological_decisions:
- issue: Lenguaje de grandeza y servicio como inversión de honor
  english_pob_reading: the greatest among you will be your servant
  chosen_spanish_reading: el mayor entre ustedes será su servidor
  alternative_spanish_readings:
  - el mayor de ustedes será su siervo
  - el que es mayor entre ustedes será su servidor
  rationale: 'La frase debe conservar la inversión ética: la verdadera grandeza se expresa en servicio. «Entre ustedes» mantiene el sentido grupal de rango; «servidor» evita introducir un título eclesiástico y mantiene el tono de humildad práctica.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; prefer modern readable Spanish without denominational overlay.'
translation_notes:
  revision_awareness: 'El español sigue de cerca la lectura y decisiones auditadas del POB inglés: conserva el valor adversativo de δέ, el comparativo idiomático de μείζων, la fuerza partitiva de ὑμῶν y evita introducir lenguaje técnico de oficina para διάκονος. No se requirieron revisiones adicionales respecto del análisis base.'
  spanish_consistency_notes:
  - Se prefirió «entre ustedes» para la primera ocurrencia de ὑμῶν y el posesivo «su» para la segunda, siguiendo la distinción sintáctica del griego.
  - «Servidor» se mantuvo en registro neutral y eclesialmente amplio, coherente con el contexto de enseñanza sobre servicio.
  - La puntuación y capitalización siguen el uso español moderno; no se agregó vocabulario ajeno al texto fuente.
