translation:
  language: es
  text: '¡Necios y ciegos! Porque ¿cuál es mayor: el oro, o el templo[a] que santifica[b] el oro?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ναός puede referirse más específicamente al santuario del templo.
    reason: cultural_note
  - marker: b
    text: O «que hizo santo el oro».
    reason: lexical_alternative
lexical_decisions:
- source_word: μωροὶ
  english_pob_choice: fools
  chosen_spanish: ¡Necios!
  alternatives_spanish:
  - ¡Fools!
  - ¡Insensatos!
  - ¡Torpes!
  lexicon: BDAG
  rationale: El vocativo plural exige un reproche directo. «Necios» conserva la fuerza de la reprensión sin caer en coloquialismos excesivos y refleja bien el matiz de falta de juicio del término griego.
- source_word: τυφλοί
  english_pob_choice: blind men
  chosen_spanish: ciegos
  alternatives_spanish:
  - ciegos de hombres
  - ciegos y hombres
  - ciegos
  lexicon: BDAG
  rationale: Como vocativo plural coordinado con el anterior, «ciegos» reproduce la invectiva directa de modo natural en español. No hace falta explicitar «hombres» en el texto principal, porque el plural masculino ya cumple esa función en español bíblico y literario.
- source_word: τίς γὰρ μείζων ἐστίν
  english_pob_choice: for which is greater
  chosen_spanish: ¿pues, qué es mayor?
  alternatives_spanish:
  - ¿pues, cuál es mayor?
  - porque, ¿cuál es mayor?
  lexicon: BDAG
  rationale: El griego plantea una comparación entre dos opciones concretas; en español, «qué es mayor» mantiene la pregunta retórica y el valor explicativo de γάρ con «pues». «Cuál» también es posible, pero «qué» suena más natural en esta formulación breve.
- source_word: ὁ χρυσὸς
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - el oro precioso
  - el oro allí mencionado
  lexicon: BDAG
  rationale: «Χρυσός» puede referirse al metal precioso o al oro como materia/objeto concreto. En este contexto de juramentos del templo, «el oro» es más natural y transparente en español que «el dorado» o una paráfrasis más explicativa.
- source_word: ὁ ναὸς
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el templo-santuario
  lexicon: BDAG
  rationale: «Naós» puede señalar el santuario propiamente dicho. Se mantiene «templo» porque es claro, idiomático y suficiente para el contraste argumentativo del versículo; una nota puede preservar la posible especificidad cultual.
- source_word: ὁ ἁγιάσας
  english_pob_choice: that sanctifies
  chosen_spanish: que santifica
  alternatives_spanish:
  - que santificó
  - que consagró
  - que hace santo
  lexicon: BDAG
  rationale: El participio aoristo en esta construcción funciona como descripción del templo en su relación con el oro. «Que santifica» conserva el valor cultual de ἁγιάζω y, en español, expresa de forma natural la verdad general que la escena presupone.
- source_word: τὸν χρυσόν
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - aquel oro
  - ese oro
  lexicon: BDAG
  rationale: Se repite «el oro» para mantener el paralelismo retórico del griego y la claridad en la comparación.
theological_decisions:
- issue: Valor cultual de ἁγιάζω en relación con el templo
  english_pob_reading: sanctifies
  chosen_spanish_reading: santifica
  alternative_spanish_readings:
  - santificó
  - consagra
  - hace santo
  rationale: 'La comparación no trata de moralidad general, sino de estatus sagrado. «Santifica» conserva el registro cultual y la lógica del argumento: el templo es lo que confiere carácter santo al oro.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que actualizó la redacción a «sanctifies» para reflejar mejor el participio aoristo como verdad general. En español se optó igualmente por el presente («santifica») para conservar esa función aspectual y retórica.
  spanish_consistency_notes:
  - Se mantuvo «oro» de manera constante para ὁ χρυσός y τὸν χρυσόν, siguiendo el paralelismo del original.
  - Se prefirió «templo» en el texto principal; si se necesitara mayor precisión cultual, «santuario» queda como alternativa documentada.
  - El orden y la puntuación buscan reproducir la brevedad sentenciosa y la pregunta retórica del griego.
