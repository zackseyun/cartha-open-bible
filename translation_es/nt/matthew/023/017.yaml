revisions:
- from: '¡Necios y ciegos[a], pues, ¿qué es mayor: el oro, o el templo que santifica[b] el oro?'
  to: '¡Necios y ciegos! Porque ¿cuál es mayor: el oro, o el templo[a] que santifica[b] el oro?'
  rationale: Se ajusta «qué» a «cuál» para reflejar mejor la elección entre dos opciones concretas; se reordena γάρ como «Porque» para un español más natural; se elimina la nota redundante del vocativo; se añade la nota sobre ναός conforme al rastro inglés; y se simplifica la nota de ἁγιάζω para conservar la alternativa lexical sin sobreinterpretación gramatical. No hace falta adjudicación adicional.
