revisions:
- from: 'diciendo[a]: «Los escribas y los fariseos se sientan en la cátedra de Moisés».'
  to: 'diciendo[a]: «Los escribas y los fariseos están sentados en la cátedra de Moisés».'
  rationale: Se ajusta únicamente el verbo principal para eliminar el reflexivo poco feliz de «se sientan» y para expresar de manera más natural en español la idea de ocupar la posición de autoridad representada por «la cátedra de Moisés». También se armoniza la nota al pie con esa decisión.
