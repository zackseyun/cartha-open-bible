review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: participio introductorio («diciendo»), grupos («los escribas y los fariseos») y la metáfora de autoridad asociada a «la cátedra de Moisés». Sin embargo, el verbo principal ἐκάθισαν fue revisado en el rastro POB desde una formulación con matiz más fuerte a la lectura simple «sit». En español, «se sientan» introduce un matiz reflexivo/habitual que puede sonar más como acción de sentarse que como estado de ocupar el lugar. «Están sentados en la cátedra de Moisés» o «se han sentado…» resolverían eso, pero el inglés POB final eligió la lectura simple presente. La mejor correspondencia idiomática y fiel en español es «ocupan la cátedra de Moisés» si se prioriza claridad, pero eso explicita un poco más la idea. Dado el rastro auditado, conviene una reparación menor hacia una forma más neutral y natural.'
  spanish_quality_summary: «Cátedra de Moisés» es una buena elección en español eclesial y comunica autoridad docente con claridad. «Diciendo» funciona bien como enlace participial. El punto débil principal es «se sientan», que en español moderno puede leerse como presente iterativo o como acción física, y además añade un reflexivo no presente en el texto griego. También la nota al pie actual no armoniza bien con la redacción principal, porque habla de evitar matiz reflexivo mientras el texto lo introduce con «se sientan».
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Los escribas», «los fariseos» y «Moisés» están bien. «Cátedra» concuerda con la decisión léxica documentada para καθέδρα en este contexto.
  issues:
  - severity: medium
    issue: «se sientan» añade un matiz reflexivo no explícito y suena menos natural para una ocupación de autoridad estable
    rationale: ἐκάθισαν aquí, según el rastro POB final, se vierte mejor con una lectura simple tipo «sit». En español, «se sientan» puede sugerir la acción de sentarse o un hábito, no tanto el hecho de ocupar un puesto reconocido.
  - severity: medium
    issue: La nota al pie actual entra en tensión con el texto principal
    rationale: Afirma que la redacción principal evita un matiz reflexivo no explícito, pero «se sientan» sí incorpora formalmente un reflexivo en español.
