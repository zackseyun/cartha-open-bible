translation:
  language: es
  text: 'diciendo[a]: «Los escribas y los fariseos están sentados en la cátedra de Moisés».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se han sentado en la cátedra de Moisés» o «están en la cátedra de Moisés». El verbo griego puede entenderse de forma más neutral; esta redacción expresa que ocupan una posición de autoridad sin forzar un matiz reflexivo más fuerte.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presente introduce el discurso de Jesús y conviene reflejarlo en español con un gerundio para conservar la unión sintáctica con el contexto previo, en lugar de convertirlo en una forma finita.
- source_word: ἐπὶ τῆς Μωϋσέως καθέδρας
  english_pob_choice: in Moses’ seat
  chosen_spanish: en la cátedra de Moisés
  alternatives_spanish:
  - sobre la cátedra de Moisés
  - en el asiento de Moisés
  lexicon: BDAG
  rationale: La preposición con genitivo y la expresión fija apuntan a una posición de autoridad. 'Cátedra' comunica bien en español la idea de una sede o puesto de enseñanza con autoridad, sin reducirla a un mueble literal.
- source_word: Μωϋσέως
  english_pob_choice: Moses’
  chosen_spanish: de Moisés
  alternatives_spanish:
  - de Moysés
  lexicon: BDAG
  rationale: Se conserva el nombre propio en su forma usual en español. El genitivo se expresa naturalmente con 'de'.
- source_word: καθέδρας
  english_pob_choice: seat
  chosen_spanish: cátedra
  alternatives_spanish:
  - asiento
  - silla
  lexicon: BDAG
  rationale: Aunque 'asiento' sería más literal, 'cátedra' preserva mejor el valor de autoridad docente que la frase tiene en este contexto y suena natural en español bíblico contemporáneo.
- source_word: οἱ γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los maestros de la ley
  lexicon: BDAG
  rationale: '''Escribas'' es la equivalencia estable y concisa para el grupo judío experto en la Ley. La alternativa explicativa añade interpretación no necesaria aquí.'
- source_word: οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Se mantiene la transliteración consagrada en español para el grupo religioso mencionado por el texto.
theological_decisions:
- issue: 'Valor del verbo ἐκάθισαν: simple ubicación o ocupación de una posición autorizada'
  english_pob_reading: sit in Moses’ seat
  chosen_spanish_reading: se sientan en la cátedra de Moisés
  alternative_spanish_readings:
  - se han sentado en la cátedra de Moisés
  - se han instalado en la cátedra de Moisés
  rationale: El aoristo puede leerse con valor de resultado o estado. En español, 'se sientan' preserva la lectura más directa y evita añadir una reflexividad o una instalación explícita que el griego no exige, pero mantiene la idea de ocupación de una posición de autoridad.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión que prefirió ''sit'' sobre ''have seated themselves'' para ajustarse mejor al griego sin imponer un matiz reflexivo. La versión española sigue esa revisión: usa un presente reflexivo sencillo (''se sientan'') y evita sobretraducir el verbo.'
  spanish_consistency_notes:
  - Se mantiene 'cátedra' para conservar el valor de autoridad docente de la metáfora.
  - Se conserva la designación 'escribas' y 'fariseos' como nombres de grupos reconocibles y estables en español bíblico.
  - La puntuación de cita sigue el estilo español con comillas angulares simples adaptadas al formato del registro.
