  text: πάντα δὲ τὰ ἔργα αὐτῶν ποιοῦσιν πρὸς τὸ θεαθῆναι τοῖς ἀνθρώποις· πλατύνουσι ⸀γὰρ τὰ φυλακτήρια αὐτῶν καὶ μεγαλύνουσι τὰ ⸀κράσπεδα,
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/005.yaml
  text: But they do all their works to be seen by people[b][a], for they widen their phylacteries and enlarge their tassels.
  footnotes:
  - marker: a
    text: Or 'prayer boxes.' These were small leather cases containing Scripture passages, worn by some Jews in obedience to passages such as Deuteronomy 6:8.
    reason: cultural_note
  - marker: b
    text: Or 'fringes.' Compare Numbers 15:38–39 for the tassels worn on garments.
    reason: lexical_alternative
