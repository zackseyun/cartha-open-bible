translation:
  language: es
  text: Pero hacen todas sus obras para ser vistos por la gente; porque ensanchan sus filacterias[a] y agrandan sus flecos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cajas de oración». Eran pequeños estuches de cuero que contenían pasajes de la Escritura y que algunos judíos llevaban en obediencia a textos como Deuteronomio 6:8.
    reason: cultural_note
  - marker: b
    text: O «franjas». Compárese Números 15:38–39 para los flecos que se llevaban en las vestiduras.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ... τὰ ἔργα
  english_pob_choice: all their works
  chosen_spanish: todas sus obras
  alternatives_spanish:
  - todos sus hechos
  - todas sus acciones
  lexicon: BDAG
  rationale: ἔργα conserva el sentido de acciones/obras realizadas; 'obras' mantiene la relación léxica y es natural en español. 'Hechos' o 'acciones' son posibles, pero 'obras' refleja mejor el sustantivo griego en este contexto.
- source_word: ποιοῦσιν
  english_pob_choice: they do
  chosen_spanish: hacen
  alternatives_spanish:
  - realizan
  - practican
  lexicon: BDAG
  rationale: Con ἔργα, ποιέω funciona de manera idiomática como 'hacer'. 'Hacen' es el equivalente más natural y directo en español.
- source_word: πρὸς τὸ θεαθῆναι
  english_pob_choice: to be seen
  chosen_spanish: para ser vistos
  alternatives_spanish:
  - con el fin de ser vistos
  - para que los vean
  lexicon: BDAG
  rationale: La construcción expresa propósito. 'Para ser vistos' mantiene la intención sin añadir interpretación extra.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: by people
  chosen_spanish: por la gente
  alternatives_spanish:
  - por las personas
  - por los hombres
  lexicon: BDAG
  rationale: ἄνθρωποι designa a los seres humanos en general; 'la gente' suena natural y evita un masculino genérico innecesario.
- source_word: φυλακτήρια
  english_pob_choice: phylacteries
  chosen_spanish: filacterias
  alternatives_spanish:
  - cajas de oración
  - amuletos
  lexicon: BDAG
  rationale: '''Filacterias'' es el término técnico tradicional en español para estos estuches de cuero con pasajes de la Escritura. Se conserva el referente específico, como en la decisión inglesa, y se evita sugerir que el objeto en sí sea ilegítimo.'
- source_word: πλατύνουσι
  english_pob_choice: widen
  chosen_spanish: ensanchan
  alternatives_spanish:
  - agrandan
  - hacen más anchas
  lexicon: BDAG
  rationale: El verbo significa hacer ancho o más ancho. 'Ensanchan' comunica bien la imagen física y es idiomático en español.
- source_word: κράσπεδα
  english_pob_choice: tassels
  chosen_spanish: flecos
  alternatives_spanish:
  - borlas
  - franjas
  lexicon: BDAG
  rationale: En este contexto se refiere a los flecos rituales de las vestiduras. 'Flecos' es claro y natural en español; mantiene la referencia concreta sin excesiva tecnicidad.
- source_word: μεγαλύνουσι
  english_pob_choice: enlarge
  chosen_spanish: agrandan
  alternatives_spanish:
  - hacen más grandes
  - engrandecen
  lexicon: BDAG
  rationale: El verbo significa hacer grande. 'Agrandan' reproduce con sencillez la intensificación física del texto.
theological_decisions:
- issue: Objetos judíos de piedad presentados en un contexto crítico
  english_pob_reading: Use the precise term 'phylacteries' in the main text and explain it in a footnote; render κράσπεδα as 'tassels.'
  chosen_spanish_reading: 'Conservar términos específicos: ''filacterias'' y ''flecos'', con nota explicativa para ''filacterias'' y alternativa léxica para ''flecos''.'
  alternative_spanish_readings:
  - cajas de oración
  - franjas
  rationale: La crítica recae sobre la ostentación, no sobre la práctica en sí. Mantener el referente concreto evita una lectura anti-judía o una paráfrasis que borre el objeto cultural del pasaje.
  doctrine_reference: Éxodo 13:9; Deuteronomio 6:8; Números 15:38–39
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto griego de Mateo 23:5 y el criterio auditado de la POB en inglés: mantiene la estructura de propósito, conserva los referentes culturales judíos con precisión y evita suavizar la crítica de la ostentación. No se documentaron revisiones posteriores que requirieran ajustar la redacción.'
  spanish_consistency_notes:
  - Se usa 'obras' para ἔργα y 'hacen' para ποιεῖν, manteniendo la relación léxica principal.
  - '''Filacterias'' preserva el término técnico; la nota explica su sentido sin desplazarlo del texto principal.'
  - '''Flecos'' y la nota alternativa para ''franjas'' reproducen la alternativa lexical observada en inglés.'
  - '''Por la gente'' evita una lectura masculina de ἀνθρώποις y conserva el valor genérico humano.'
