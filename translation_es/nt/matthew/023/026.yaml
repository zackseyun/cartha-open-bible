translation:
  language: es
  text: Fariseo ciego[a], limpia primero el interior de la copa y del plato, para que también su exterior quede limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuente», «cuenco», «bandeja» o «plato hondo» para παροψίς; es una vasija o recipiente para servir comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Φαρισαῖε
  english_pob_choice: Pharisee
  chosen_spanish: Fariseo
  alternatives_spanish:
  - ¡tú, fariseo!
  lexicon: BDAG
  rationale: Es vocativo singular de trato directo. «Fariseo» conserva la designación del grupo sin añadir palabras que el griego no exige; el castellano admite el vocativo por el contexto y el tono de reprensión.
- source_word: τυφλέ
  english_pob_choice: Blind
  chosen_spanish: ciego
  alternatives_spanish:
  - ¡ciego!
  - ciego espiritual
  lexicon: BDAG
  rationale: Mantiene el insulto/metáfora del vocativo con naturalidad en español. Evité explicitar «espiritual» en el texto principal para no interpretar más allá de la imagen concreta.
- source_word: καθάρισον
  english_pob_choice: clean
  chosen_spanish: limpia
  alternatives_spanish:
  - purifica
  - limpia cuidadosamente
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decisiva. «Limpia» es la correspondencia más natural para los recipientes y conserva la fuerza verbal sin volver abstracta la imagen.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - ante todo
  lexicon: BDAG
  rationale: Expresa prioridad lógica y secuencial, tal como en el inglés POB y el griego, sin añadir matiz doctrinal.
- source_word: τὸ ἐντὸς
  english_pob_choice: the inside
  chosen_spanish: el interior
  alternatives_spanish:
  - lo de dentro
  - el dentro
  lexicon: BDAG
  rationale: El sustantivado adverbial se vierte mejor como «el interior» en español, que suena natural y conserva el contraste con «el exterior».
- source_word: ποτηρίου
  english_pob_choice: of the cup
  chosen_spanish: de la copa
  alternatives_spanish:
  - del vaso
  - del cáliz
  lexicon: BDAG
  rationale: «Copa» es el equivalente normal en este contexto evangélico y mantiene la imagen de un recipiente para beber.
- source_word: καὶ τῆς παροψίδος
  english_pob_choice: and the dish
  chosen_spanish: y del plato
  alternatives_spanish:
  - y de la fuente
  - y del cuenco
  - y de la bandeja
  lexicon: BDAG
  rationale: παροψίς designa un recipiente/servicio para comida. «Plato» es una opción amplia, clara y publicación-readable en español. En la nota se preserva la variedad posible de sentidos.
- source_word: ἵνα γένηται
  english_pob_choice: so that ... may become
  chosen_spanish: para que también llegue a quedar
  alternatives_spanish:
  - para que también se haga
  - de modo que también llegue a ser
  lexicon: BDAG
  rationale: γίνομαι expresa llegar a ser o quedar en un estado resultante. «Llegue a quedar» comunica bien el valor resultativo sin convertirlo en una paráfrasis moralizante.
- source_word: τὸ ἐκτὸς
  english_pob_choice: its outside
  chosen_spanish: su exterior
  alternatives_spanish:
  - lo de fuera
  - el exterior
  lexicon: BDAG
  rationale: Como sustantivado paralelo a «el interior», «su exterior» conserva la relación con el objeto total de manera idiomática en español.
- source_word: αὐτοῦ
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - del mismo
  lexicon: BDAG
  rationale: El pronombre genitivo retoma el conjunto de la copa y el plato en la imagen. «Su» es la forma más natural en español para esa referencia.
- source_word: καθαρόν
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: BDAG
  rationale: Mantiene la imagen concreta de limpieza de utensilios, tal como en el griego y en la versión inglesa auditada.
theological_decisions:
- issue: Imagen concreta del utensilio frente a interpretación moral explícita
  english_pob_reading: Retain the literal image of cleaning the inside and outside of the cup and dish without making the metaphor explicit in the main text.
  chosen_spanish_reading: Conservar la imagen literal de limpiar el interior y el exterior de la copa y el plato, sin explicitar en el texto principal la aplicación moral.
  alternative_spanish_readings:
  - limpia tu vida interior primero, para que tu conducta exterior también quede limpia
  - purifica primero tu interior, para que lo de fuera también quede puro
  rationale: El dicho de Jesús funciona por metáfora encarnada en objetos concretos. Hacer explícita la referencia moral reduciría la fuerza retórica del pasaje y añadiría interpretación que el griego no formula.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source imagery and refrain from explanatory paraphrase.'
translation_notes:
  revision_awareness: La revisión final del audit trail en inglés no introduce cambios; la propuesta española sigue de cerca la lectura aprobada y mantiene la misma decisión de conservar la imagen concreta sin explicitar la metáfora.
  spanish_consistency_notes:
  - Se usó «copa» para ποτήριον y «plato» para παροψίς, evitando mezclar niveles léxicos más específicos sin base textual.
  - Se conservó la oposición interior/exterior con sintaxis natural en español.
  - No se empleó «Cristo», «SEÑOR» ni vocabulario doctrinal ajeno al verso.
  - La nota al pie se ancla en «plato» para preservar la alternativa léxica documentada.
