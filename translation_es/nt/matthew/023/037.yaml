translation:
  language: es
  text: Jerusalén, Jerusalén, la que mata a los profetas y apedrea a los enviados a ella[a]—¡cuántas veces quise reunir a tus hijos, como la gallina reúne[b] a sus polluelos bajo sus alas, y no quisieron!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la que mata a los profetas y apedrea a los enviados a ella».
    reason: lexical_alternative
  - marker: b
    text: «Gallina» traduce aquí un vocablo griego que puede significar «ave» en general, pero el contexto de reunir a los polluelos bajo las alas apunta específicamente a una gallina.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰερουσαλὴμ Ἰερουσαλήμ
  english_pob_choice: Jerusalem, Jerusalem
  chosen_spanish: Jerusalén, Jerusalén
  alternatives_spanish:
  - ¡Jerusalén, Jerusalén!
  lexicon: BDAG
  rationale: Se conserva la repetición enfática del nombre propio y el tono de lamento. En español, la forma natural y fiel es «Jerusalén, Jerusalén».
- source_word: ἡ ἀποκτείνουσα
  english_pob_choice: the one who kills
  chosen_spanish: la que mata
  alternatives_spanish:
  - la que mata continuamente
  - la que asesina
  lexicon: BDAG
  rationale: El participio presente se expresa de modo natural con una relativa en presente. «Mata» mantiene el valor característico/habitual sin recargar el estilo.
- source_word: τοὺς προφήτας
  english_pob_choice: the prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: El objeto directo personal en español requiere la preposición «a». Se conserva el referente exacto del original.
- source_word: λιθοβολοῦσα
  english_pob_choice: stoning
  chosen_spanish: apedrea
  alternatives_spanish:
  - lanza piedras contra
  - mata a pedradas
  lexicon: BDAG
  rationale: «Apedrea» es el equivalente más directo y transparente de λιθοβολέω en español bíblico moderno, manteniendo la fuerza del verbo sin deformarlo.
- source_word: τοὺς ἀπεσταλμένους πρὸς αὐτήν
  english_pob_choice: those sent to her
  chosen_spanish: a los enviados a ella
  alternatives_spanish:
  - a los que le fueron enviados
  - a los enviados a ti
  lexicon: BDAG
  rationale: «Enviados» conserva el participio pasivo y «a ella» mantiene la personificación de Jerusalén. Se evita convertir el pasivo en una formulación demasiado interpretativa.
- source_word: ποσάκις
  english_pob_choice: how often
  chosen_spanish: ¡cuántas veces!
  alternatives_spanish:
  - cuán a menudo
  - muchas veces
  lexicon: BDAG
  rationale: La exclamación española «¡cuántas veces!» comunica bien la lamentación y el valor repetitivo del adverbio griego.
- source_word: ἠθέλησα
  english_pob_choice: I wanted
  chosen_spanish: quise
  alternatives_spanish:
  - quise hacerlo
  - deseé
  lexicon: BDAG
  rationale: «Quise» expresa voluntad/intención de manera concisa y natural, preservando la tensión volitiva destacada en el audit trail sin añadir matices ajenos.
- source_word: ἐπισυναγαγεῖν
  english_pob_choice: to gather
  chosen_spanish: reunir
  alternatives_spanish:
  - juntar
  - agrupar
  lexicon: BDAG
  rationale: «Reunir» transmite bien el valor de juntar personas bajo una sola acción y suena natural con «tus hijos». Mantiene la relación léxica con el verbo del símil.
- source_word: τὰ τέκνα σου
  english_pob_choice: your children
  chosen_spanish: a tus hijos
  alternatives_spanish:
  - a tus hijos e hijas
  - a tus hijos
  lexicon: BDAG
  rationale: «Hijos» es idiomático en español para los miembros de una ciudad personificada y conserva la relación metáforica sin precisar más de lo que el texto dice.
- source_word: ὃν τρόπον
  english_pob_choice: the way
  chosen_spanish: como
  alternatives_spanish:
  - de la manera que
  - tal como
  lexicon: BDAG
  rationale: En español la comparación queda más natural con «como». Evita una construcción rígida y conserva el paralelo comparativo.
- source_word: ὄρνις
  english_pob_choice: a hen
  chosen_spanish: la gallina
  alternatives_spanish:
  - la clueca
  - un ave
  lexicon: BDAG
  rationale: El contexto de reunir a los polluelos bajo las alas especifica el sentido de ὄρνις. «Gallina» reproduce la imagen maternal con claridad en español.
- source_word: ἐπισυνάγει
  english_pob_choice: gathers
  chosen_spanish: reúne
  alternatives_spanish:
  - junta
  - agrupa
  lexicon: BDAG
  rationale: Se usa el mismo campo semántico que en ἐπισυναγαγεῖν para preservar el paralelismo entre la acción deseada por Jesús y la del ave en el símil.
- source_word: τὰ νοσσία αὐτῆς
  english_pob_choice: her chicks
  chosen_spanish: a sus polluelos
  alternatives_spanish:
  - a sus crías
  - a sus pollos
  lexicon: BDAG
  rationale: «Polluelos» es la mejor equivalencia para νοσσία en el contexto aviar. Mantiene la ternura y la especificidad de la imagen.
- source_word: ὑπὸ τὰς πτέρυγας
  english_pob_choice: under her wings
  chosen_spanish: debajo de sus alas
  alternatives_spanish:
  - bajo sus alas
  - bajo sus plumas
  lexicon: BDAG
  rationale: «Debajo de sus alas» es claro, natural y conserva la metáfora protectora. Se eligió «debajo» por fluidez en español, sin perder el sentido de cobertura.
- source_word: καὶ οὐκ ἠθελήσατε
  english_pob_choice: and you were not willing
  chosen_spanish: y no quisiste
  alternatives_spanish:
  - y no quisieron
  - y no estuvieron dispuestos
  lexicon: BDAG
  rationale: La segunda persona plural del original se traslada a una forma directa y solemne. «Quisiste» preserva la oposición voluntaria con el «quise» precedente, sin resolver la tensión interpretativa.
theological_decisions:
- issue: Contraste volitivo entre Jesús y Jerusalén
  english_pob_reading: Render both instances of θέλω with willingness/desire language without resolving broader debates about divine will, human responsibility, or Christology beyond the text.
  chosen_spanish_reading: Conservar el contraste entre «quise» y «no quisiste» sin convertirlo en una afirmación doctrinal más amplia.
  alternative_spanish_readings:
  - «deseé» / «no deseaste»
  - «estuve dispuesto» / «no estuviste dispuesto»
  rationale: El texto expresa una voluntad real de Jesús frente a la negativa de Jerusalén. La traducción debe mantener esa tensión, no diluirla en mero sentimiento ni convertirla en una tesis sistemática.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Jerusalén como ciudad personificada y sus «hijos»
  english_pob_reading: Keep 'your children' as the inhabitants/people associated with Jerusalem, without specifying a narrower subgroup.
  chosen_spanish_reading: Mantener «tus hijos» como los pertenecientes a Jerusalén personificada, sin restringirlos a un grupo más específico.
  alternative_spanish_readings:
  - tu pueblo
  - tus habitantes
  rationale: La personificación es parte de la fuerza retórica del pasaje. «Tus hijos» conserva la imagen y evita una interpretación reductiva.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y conserva el paralelismo verbal del original griego: el participio presente característico en la primera cláusula, el contraste volitivo de θέλω, y el símil aviar con el mismo verbo de reunir. También atiende la revisión inglesa que prefirió una relativa más natural («the one who kills») sin perder el sentido aspectual; en español se resolvió con una relativa presente equivalente («la que mata»).'
  spanish_consistency_notes:
  - Se usa «Jerusalén» como forma estable del nombre propio, con repetición enfática.
  - Se mantiene «Yahvé» fuera del versículo porque el texto no contiene el nombre divino explícito.
  - Se preserva la metáfora de ciudad personificada con pronombres de segunda persona y tercera persona femenina según corresponda.
  - Se mantiene el paralelismo léxico entre «reunir» y «reúne» para reflejar el verbo compartido del griego.
