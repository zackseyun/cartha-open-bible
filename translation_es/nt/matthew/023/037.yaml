  text: Ἰερουσαλὴμ Ἰερουσαλήμ, ἡ ⸀ἀποκτείνουσα τοὺς προφήτας καὶ λιθοβολοῦσα τοὺς ἀπεσταλμένους πρὸς αὐτήν— ποσάκις ἠθέλησα ἐπισυναγαγεῖν τὰ τέκνα σου, ὃν τρόπον ⸂ὄρνις ἐπισυνάγει⸃ τὰ νοσσία ⸀αὐτῆς ὑπὸ τὰς πτέρυγας, καὶ οὐκ ἠθελήσατε;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/037.yaml
  text: Jerusalem[a], Jerusalem, the one who kills the prophets and stones those sent to her—how often I wanted to gather your children together, the way a hen gathers her chicks under her wings[b], and you were not willing!
  footnotes:
  - marker: a
    text: Or 'who kills the prophets and stones those sent to her.'
    reason: lexical_alternative
  - marker: b
    text: '''A hen'' translates a Greek word that can mean ''bird'' more generally, but the context of gathering young under wings points specifically to a hen.'
    reason: lexical_alternative
