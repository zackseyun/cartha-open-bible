  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del audit trail inglés en casi todo: conserva la repetición enfática de «Jerusalén», la caracterización habitual de la ciudad («la que mata… y apedrea…»), la imagen de la gallina y los polluelos, y el contraste volitivo entre Jesús y Jerusalén. Sin embargo, hay un problema significativo de persona/número en la cláusula final: οὐκ ἠθελήσατε es segunda persona plural («no quisieron/no estuvieron dispuestos ustedes»), pero el texto español dice «no quisiste», que es segunda persona singular. Además, la nota [a] está mal anclada: el marcador aparece tras «Jerusalén» aunque la nota explica la cláusula relativa «la que mata…».'
  spanish_quality_summary: El español es claro, natural y digno. «Apedrea», «polluelos» y «bajo sus alas»/«debajo de sus alas» son idiomáticos. Conviene ajustar el cierre a una forma plural natural y mantener la personificación sin forzar un singular incoherente. También es preferible recolocar la nota [a] junto a la frase a la que realmente corresponde.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones léxicas principales son adecuadas: «la que mata», «apedrea», «enviados a ella», «gallina», «polluelos». Sí debe corregirse la correspondencia morfosintáctica de θέλω final a plural («no quisieron» o equivalente).'
  issues:
  - severity: high
    issue: La forma «y no quisiste» no refleja el plural griego οὐκ ἠθελήσατε.
    rationale: El original está en segunda persona plural, contrastando con ἠθέλησα («quise»). El singular «quisiste» altera la gramática y puede confundir el referente de Jerusalén/persona colectiva.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota dice «O “la que mata a los profetas y apedrea a los enviados a ella”», pero el marcador aparece tras «Jerusalén» en lugar de junto a la cláusula alternativa que comenta.
  - severity: low
    issue: «Debajo de sus alas» podría simplificarse a «bajo sus alas».
    rationale: Ambas opciones son fieles, pero «bajo sus alas» es más tersa y más idiomática en registro bíblico contemporáneo sin perder sentido.
  revised_spanish_text: Jerusalén, Jerusalén, la que mata a los profetas y apedrea a los enviados a ella[a]—¡cuántas veces quise reunir a tus hijos, como la gallina reúne[b] a sus polluelos bajo sus alas, y no quisieron!
  revised_footnotes:
