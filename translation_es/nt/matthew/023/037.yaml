  to: Jerusalén, Jerusalén, la que mata a los profetas y apedrea a los enviados a ella[a]—¡cuántas veces quise reunir a tus hijos, como la gallina reúne[b] a sus polluelos bajo sus alas, y no quisieron!
  rationale: Se corrige la forma verbal final para reflejar el plural griego («no quisieron»), que preserva mejor el contraste volitivo con «quise» sin introducir interpretación adicional. También se mueve la nota [a] para que ancle la cláusula que realmente comenta. Se pule «debajo de sus alas» a «bajo sus alas» por mejor fluidez, manteniendo plena fidelidad semántica.
