translation:
  language: es
  text: y saludos en los mercados[a], y ser llamados por la gente, «Rabí».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Maestro». «Rabí» es un título honorífico judío que significa «maestro» o «mi maestro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασμοὺς
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - saludos formales
  - salutaciones
  lexicon: BDAG
  rationale: ἀσπασμός puede referirse a saludos o muestras públicas de respeto. «Saludos» es natural en español y mantiene el valor social del término sin ampliar indebidamente el texto.
- source_word: ἐν ταῖς ἀγοραῖς
  english_pob_choice: in the marketplaces
  chosen_spanish: en las plazas de mercado
  alternatives_spanish:
  - en los mercados
  - en las plazas
  lexicon: BDAG
  rationale: ἀγορά puede denotar mercado o plaza pública. «Plazas de mercado» conserva la idea de un espacio público donde se exhibe honor y resulta comprensible en español moderno.
- source_word: καλεῖσθαι
  english_pob_choice: to be called
  chosen_spanish: el ser llamados
  alternatives_spanish:
  - ser llamados
  - que los llamen
  lexicon: BDAG
  rationale: El infinitivo pasivo expresa el deseo de recibir un título de parte de otros. «El ser llamados» conserva la pasividad y el carácter nominal del giro griego.
- source_word: ὑπὸ τῶν ἀνθρώπων
  english_pob_choice: by people
  chosen_spanish: por la gente
  alternatives_spanish:
  - por las personas
  - por la gente en general
  lexicon: BDAG
  rationale: ἄνθρωποι aquí significa seres humanos en general. «La gente» es una solución natural en español que mantiene el sentido colectivo sin forzar marca masculina innecesaria.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: El texto conserva el título semítico transliterado. «Rabí» reproduce esa forma en español y preserva el matiz honorífico; «Maestro» queda como equivalente semántico posible.
theological_decisions:
- issue: Título honorífico semítico Ῥαββί
  english_pob_reading: Rabbi, with footnote meaning 'Teacher'
  chosen_spanish_reading: Rabí, con nota equivalente semántica 'Maestro'
  alternative_spanish_readings:
  - Maestro
  - Rabino
  rationale: Conviene conservar la forma histórica del título en el cuerpo del texto, porque el griego ya la translitera y el contexto retórico depende de su uso público. La nota preserva el equivalente de sentido sin reemplazar la forma recibida.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Representación de ὑπὸ τῶν ἀνθρώπων
  english_pob_reading: by people
  chosen_spanish_reading: por la gente
  alternative_spanish_readings:
  - por las personas
  - por la gente en general
  rationale: El plural griego es genérico y humano, no doctrinalmente restrictivo. En español, «la gente» comunica bien el valor colectivo y evita una masculinización innecesaria, en línea con la revisión inglesa más reciente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La base inglesa revisada cambió de 'by men' a 'by people'; la versión española sigue esa revisión y evita una solución masculina donde el griego es genérico. También conserva el título semítico 'Rabí' como en el texto fuente, con la equivalencia semántica en nota.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos miembros unidos por «y».
  - «Plazas de mercado» traduce el espacio público de ἀγοραῖς sin introducir una imagen distinta.
  - La nota única está anclada en «Rabí» y no se añaden notas sin marcador en el texto.
  - El registro es formal y público, apto para lectura eclesial moderna.
