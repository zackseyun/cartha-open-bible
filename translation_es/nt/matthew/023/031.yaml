translation:
  language: es
  text: De modo que ustedes dan testimonio contra sí mismos[a] de que son hijos de los que asesinaron a los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘dan testimonio a sí mismos’. La expresión griega puede traducirse más literalmente así, aunque en este contexto significa que su testimonio los incrimina.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: De modo que
  alternatives_spanish:
  - Así que
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Expresa de forma natural en español el valor inferencial del término griego, sin forzar una conclusión demasiado mecánica.
- source_word: μαρτυρεῖτε
  english_pob_choice: you testify
  chosen_spanish: dan testimonio
  alternatives_spanish:
  - testifican
  - dan testimonio en favor de
  - atestiguan
  lexicon: BDAG
  rationale: ‘Dar testimonio’ conserva el valor jurídico-retórico del verbo y suena natural en español bíblico actual.
- source_word: ἑαυτοῖς
  english_pob_choice: against yourselves
  chosen_spanish: contra sí mismos
  alternatives_spanish:
  - a sí mismos
  - para sí mismos
  - sobre sí mismos
  lexicon: BDAG
  rationale: La frase griega literalmente apunta ‘a ustedes mismos’, pero en este contexto el testimonio los incrimina; ‘contra sí mismos’ comunica esa fuerza idiomática sin perder el sentido de autoimplicación.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido del testimonio en español con fluidez después de ‘dan testimonio’, manteniendo la relación de contenido y evitando una construcción dura.
- source_word: υἱοί
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  - hijos e hijas
  lexicon: BDAG
  rationale: Aunque el griego es masculino plural, en español ‘hijos’ puede conservar la filiación y la acusación de continuidad familiar sin sonar artificial; ‘hijos’ aquí comunica mejor la relación lineal que ‘descendientes’.
- source_word: τῶν φονευσάντων
  english_pob_choice: of those who murdered
  chosen_spanish: de los que mataron
  alternatives_spanish:
  - de los que asesinaron
  - de quienes mataron
  - de los homicidas que
  lexicon: BDAG
  rationale: ‘Mataron’ mantiene el hecho violento de forma directa y natural; ‘asesinaron’ sería más interpretativo y puede sonar más fuerte de lo que el español bíblico requiere aquí.
- source_word: τοὺς προφήτας
  english_pob_choice: the prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: Con el verbo ‘matar’, el acusativo personal en español se expresa naturalmente con la preposición ‘a’.
theological_decisions:
- issue: Cómo reflejar la autoacusación implícita en μαρτυρεῖτε ἑαυτοῖς.
  english_pob_reading: you testify against yourselves
  chosen_spanish_reading: dan testimonio contra sí mismos
  alternative_spanish_readings:
  - dan testimonio a sí mismos
  - testifican de sí mismos
  rationale: La cláusula no es meramente reflexiva; en el contexto de la reprensión de Jesús, su testimonio funciona como evidencia en su contra. ‘Contra sí mismos’ preserva esa tensión acusatoria.
  doctrine_reference: Mateo 23:31; lectura contextual del juicio de Jesús contra la hipocresía
- issue: Cómo traducir υἱοί sin neutralizar el lenguaje filial masculino del griego.
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - descendientes
  - muchachos
  rationale: El griego usa un plural masculino que expresa filiación y continuidad moral con los antepasados homicidas. ‘Hijos’ mantiene esa relación sin eliminar el carácter familiar de la acusación.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El inglés POB mantiene una lectura jurídica/incriminatoria de μαρτυρεῖτε ἑαυτοῖς y conserva ‘sons’ para υἱοί. La presente versión sigue ese juicio, pero lo adapta al español con una formulación natural (‘dar testimonio contra sí mismos’) y con ‘hijos’ como equivalente idiomático que no borra la filiación masculina del original.
  spanish_consistency_notes:
  - Se mantiene ‘profetas’ sin tecnicismos adicionales, conforme al uso bíblico común y al griego directo.
  - No se introduce ‘Mesías’, ‘Señor’ ni otras terminologías no presentes en el versículo.
  - La preposición ‘a’ ante ‘los profetas’ responde a la sintaxis española con verbos de afectación como ‘matar’.
