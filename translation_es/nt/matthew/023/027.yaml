  text: Οὐαὶ ὑμῖν, γραμματεῖς καὶ Φαρισαῖοι ὑποκριταί, ὅτι ⸀παρομοιάζετε τάφοις κεκονιαμένοις, οἵτινες ἔξωθεν μὲν φαίνονται ὡραῖοι ἔσωθεν δὲ γέμουσιν ὀστέων νεκρῶν καὶ πάσης ἀκαθαρσίας·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/027.yaml
  text: Woe to you[a], scribes and Pharisees, hypocrites! For you are like whitewashed tombs, which outwardly appear beautiful[b], but inwardly are full of dead people's bones and every kind of uncleanness.
  footnotes:
  - marker: a
    text: Or 'graves whitewashed with lime.'
    reason: lexical_alternative
  - marker: b
    text: '''Uncleanness'' can include both ritual impurity and moral corruption in this context.'
    reason: cultural_note
