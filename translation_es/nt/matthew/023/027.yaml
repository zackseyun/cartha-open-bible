translation:
  language: es
  text: ¡Ay de ustedes, escribas y fariseos, hipócritas! Porque son como sepulcros blanqueados[a], que por fuera se ven hermosos, pero por dentro están llenos de huesos de muertos y de toda clase de impureza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sepulcros blanqueados con cal’.
    reason: lexical_alternative
  - marker: b
    text: «Impureza» puede abarcar tanto impureza ritual como corrupción moral en este contexto.
    reason: cultural_note
lexical_decisions:
- source_word: Οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Woe para ustedes!
  - ¡Ay de vosotros!
  lexicon: BDAG
  rationale: En español, «¡Ay de ustedes!» conserva el tono profético de denuncia y lamento/juicio sin forzar un calco inglés; es más natural y solemne para una invectiva de Jesús.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» reproduce de manera estable y precisa el oficio/grupo judío señalado por el griego; «maestros de la ley» explicita pero interpreta más.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Transliteración estándar del grupo, mantenida en español.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - simuladores
  - pretendientes
  lexicon: BDAG
  rationale: «Hipócritas» es el equivalente directo y más idiomático para la acusación moral-religiosa del contexto; preserva el filo denunciatorio.
- source_word: παρομοιάζετε
  english_pob_choice: you are like
  chosen_spanish: son como
  alternatives_spanish:
  - se parecen a
  - son comparables a
  lexicon: BDAG
  rationale: El verbo expresa comparación; en español, «son como» es la forma más natural y exacta para la comparación directa dirigida a ellos.
- source_word: τάφοις κεκονιαμένοις
  english_pob_choice: whitewashed tombs
  chosen_spanish: sepulcros blanqueados
  alternatives_spanish:
  - tumbas blanqueadas
  - sepulcros encalados
  lexicon: BDAG
  rationale: «Sepulcros blanqueados» reproduce el cuadro cultural del texto. «Sepulcros» mantiene el matiz de construcciones funerarias, y «blanqueados» comunica el recubrimiento de cal/yeso sin necesidad de mecanizar el detalle en el texto principal.
- source_word: ἔξωθεν μὲν ... ἔσωθεν δὲ
  english_pob_choice: outwardly ... but inwardly
  chosen_spanish: por fuera ... pero por dentro
  alternatives_spanish:
  - externamente ... pero internamente
  - de afuera ... pero de adentro
  lexicon: BDAG
  rationale: La oposición espacial es clara en español con «por fuera / por dentro», una pareja natural que conserva el contraste retórico.
- source_word: φαίνονται ὡραῖοι
  english_pob_choice: appear beautiful
  chosen_spanish: se ven hermosos
  alternatives_spanish:
  - parecen hermosos
  - se ven bellos
  lexicon: BDAG
  rationale: «Se ven hermosos» conserva la idea de apariencia visual, no de realidad, y fluye mejor en español que una fórmula más literal.
- source_word: γέμουσιν
  english_pob_choice: are full of
  chosen_spanish: están llenos de
  alternatives_spanish:
  - se llenan de
  - rebosan de
  lexicon: BDAG
  rationale: Expresa de manera directa el estado resultante de plenitud interior.
- source_word: ὀστέων νεκρῶν
  english_pob_choice: dead people's bones
  chosen_spanish: huesos de muertos
  alternatives_spanish:
  - huesos de los muertos
  - huesos de gente muerta
  lexicon: BDAG
  rationale: «Huesos de muertos» transmite el genitivo descriptivo con naturalidad en español y evita una formulación excesivamente explicativa.
- source_word: πάσης ἀκαθαρσίας
  english_pob_choice: every kind of uncleanness
  chosen_spanish: toda clase de impureza
  alternatives_spanish:
  - toda impureza
  - toda clase de inmundicia
  lexicon: BDAG
  rationale: «Impureza» permite mantener la amplitud de ἀκαθαρσία sin cerrarla solo a lo ritual o solo a lo moral; «toda clase de» preserva el alcance total del griego. «Inmundicia» es posible, pero en español puede sonar más cargada moralmente y menos abarcadora.
theological_decisions:
- issue: Alcance de ἀκαθαρσία en la metáfora de los sepulcros
  english_pob_reading: Render broadly as 'uncleanness' without narrowing to either ritual impurity alone or moral corruption alone.
  chosen_spanish_reading: traducirlo ampliamente como «impureza», sin reducirlo ni a la impureza ritual sola ni a la corrupción moral sola
  alternative_spanish_readings:
  - «inmundicia»
  - «impureza ritual»
  - «corrupción moral»
  rationale: El contexto del sepulcro evoca contaminación ritual en el marco judío, pero la reprensión de Jesús apunta también a la condición moral interna. «Impureza» preserva esa tensión teológica en vez de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica sin resolverla en exceso.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide en sustancia con el audit trail inglés, manteniendo la imagen metafórica de sepulcros blanqueados, el contraste exterior/interior y la amplitud semántica de ἀκαθαρσία. La decisión principal en español fue elegir vocabulario natural y público («¡Ay de ustedes!», «sepulcros blanqueados», «se ven hermosos») sin perder la fuerza profética ni la tensión ritual/moral.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto subyacente lo requiera; aquí no aparece.
  - Se usa «escribas» y «fariseos» como términos estables y reconocibles en español bíblico.
  - Se conserva «impureza» para ἀκαθαρσία por su amplitud semántica, con nota explicativa.
  - El registro es solemne pero idiomático, evitando un calco rígido del inglés.
