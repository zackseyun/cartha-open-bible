translation:
  language: es
  text: ¡Guías ciegos, que coláis[a] el jején[b], pero se tragan el camello!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «filtráis». El verbo griego se refiere a colar un líquido para apartar una impureza.
    reason: lexical_alternative
  - marker: b
    text: O «mosquito». El término griego designa un insecto muy pequeño; «jején» refleja mejor el valor de ‘gnat’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁδηγοὶ
  english_pob_choice: guides
  chosen_spanish: guías
  alternatives_spanish:
  - líderes
  lexicon: BDAG
  rationale: ὁδηγοί designa a quienes conducen o dirigen a otros. «Guías» conserva el valor metafórico y es natural en español para este reproche a dirigentes religiosos.
- source_word: τυφλοί
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - cegados
  lexicon: BDAG
  rationale: El adjetivo es metafórico y directo. «Ciegos» reproduce la fuerza acusatoria y la imagen de incapacidad espiritual sin suavizarla.
- source_word: διϋλίζοντες
  english_pob_choice: straining out
  chosen_spanish: que coláis
  alternatives_spanish:
  - que filtráis
  - que coláis fuera
  lexicon: BDAG
  rationale: El verbo describe colar o filtrar un líquido para apartar una impureza. «Coláis» es idiomático en español y conserva la acción concreta sin explicarla de más.
- source_word: τὸν κώνωπα
  english_pob_choice: the gnat
  chosen_spanish: el mosquito
  alternatives_spanish:
  - el jején
  - el mosquito pequeño
  lexicon: BDAG
  rationale: κώνωψ puede referirse a un insecto diminuto tipo mosquito/jején. «Mosquito» comunica bien el contraste proverbial en español, aunque la especie exacta no se precisa en el texto.
- source_word: τὴν δὲ κάμηλον
  english_pob_choice: but swallowing the camel
  chosen_spanish: y se tragan el camello
  alternatives_spanish:
  - pero se tragan el camello
  - y se engullen el camello
  lexicon: BDAG
  rationale: La partícula δέ introduce contraste; en español, «y» puede mantener el encadenamiento proverbial, mientras el sentido contrastivo queda implícito por la oposición absurda. «Se tragan» preserva el verbo concreto y la hipérbole.
- source_word: καταπίνοντες
  english_pob_choice: swallowing
  chosen_spanish: se tragan
  alternatives_spanish:
  - tragan
  - engullen
  lexicon: BDAG
  rationale: El participio expresa tragar o engullir. «Se tragan» suena natural en español y mantiene el tono fuerte del reproche.
theological_decisions:
- issue: Imagen proverbial de impureza ritual frente a desproporción moral
  english_pob_reading: Retain the concrete image of filtering out an unclean gnat and swallowing an unclean camel as a rebuke of hypocritical moral proportion.
  chosen_spanish_reading: Conservar la imagen concreta de colar un insecto impuro y tragarse un camello como reprensión de la desproporción hipócrita.
  alternative_spanish_readings:
  - Reducir la frase a una paráfrasis sobre faltas pequeñas y grandes
  - Suavizar la imagen animal por claridad
  rationale: La fuerza del verso depende del absurdo de cuidar escrupulosamente una impureza mínima mientras se tolera una enorme. Mantener la imagen concreta evita paraphrasear más allá del griego y preserva el golpe retórico.
  doctrine_reference: Principio de primacía del texto original; equivalencia óptima
- issue: Tensión lexical de κώνωψ en español
  english_pob_reading: the gnat
  chosen_spanish_reading: mosquito
  alternative_spanish_readings:
  - jején
  - jejen
  rationale: El griego puede abarcar un insecto muy pequeño similar al mosquito. En español, «mosquito» es ampliamente comprensible y mantiene la idea de un insecto diminuto en contraste con «camello».
  doctrine_reference: Precisión semántica y legibilidad en español
- issue: Contraste de δέ en la segunda cola
  english_pob_reading: but swallowing the camel
  chosen_spanish_reading: y se tragan el camello
  alternative_spanish_readings:
  - pero se tragan el camello
  - sin embargo, se tragan el camello
  rationale: Aunque δέ suele marcar contraste, la antítesis ya está cargada por la imagen misma; «y» evita sobrecargar el ritmo sentencioso en español sin perder el contraste contextual.
  doctrine_reference: Equivalencia discursiva y ritmo proverbial
translation_notes:
  revision_awareness: 'Se revisó el juego entre el griego y la solución inglesa: se mantuvo la imagen proverbial concreta, se evitó una paráfrasis moralizante, y se conservó el valor de colar/filtrar de διϋλίζοντες mediante una nota alternativa. También se tuvo en cuenta que la relación gramatical de δέ admite más de una equivalencia española, por lo que se deja una alternativa explícita en nota.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera de esta unidad; no aplica aquí.
  - Se conserva el tono acusatorio directo mediante vocativo y participio presente.
  - «Camello» se mantiene literal por el contraste proverbial, sin domesticarlo a una figura abstracta.
