translation:
  language: es
  text: ¡Serpientes[a], descendencia de víboras! ¿Cómo escaparán del juicio de Gehenna?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el juicio del infierno». Griego: «Gehenna».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὄφεις
  english_pob_choice: snakes
  chosen_spanish: serpientes
  alternatives_spanish:
  - culebras
  - víboras
  lexicon: BDAG
  rationale: Se trata de un vocativo insultante. «Serpientes» es natural en español y conserva la imagen y el tono de reproche sin volverlo arcaico.
- source_word: γεννήματα
  english_pob_choice: offspring
  chosen_spanish: raza
  alternatives_spanish:
  - descendencia
  - prole
  - hijos
  lexicon: BDAG
  rationale: La estructura genitivo + sustantivo expresa origen o pertenencia; «raza» comunica en español la idea de linaje o clase caracterizada por las víboras, aunque con un matiz más idiomático que literal.
- source_word: ἐχιδνῶν
  english_pob_choice: vipers
  chosen_spanish: víboras
  alternatives_spanish:
  - víboras ponzoñosas
  - serpientes venenosas
  lexicon: BDAG
  rationale: «Víboras» mantiene el animal específico y la intensificación de la denuncia. No se diluye en una categoría más general.
- source_word: πῶς φύγητε
  english_pob_choice: How will you escape
  chosen_spanish: ¿Cómo escaparán?
  alternatives_spanish:
  - ¿Cómo podrán escapar?
  - ¿Cómo huirán?
  lexicon: BDAG
  rationale: El valor retórico pregunta por la posibilidad futura de evasión. «Escaparán» reproduce bien el sentido natural en español; «huirán» sería más literal respecto de φύγω, pero menos idiomático con «del juicio».
- source_word: κρίσεως
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condena
  - sentencia
  lexicon: BDAG
  rationale: «Juicio» conserva el sentido judicial amplio del término sin anticipar más de lo que la forma griega exige por sí sola.
- source_word: γεέννης
  english_pob_choice: Gehenna
  chosen_spanish: Gehenna
  alternatives_spanish:
  - infierno
  lexicon: BDAG
  rationale: Se conserva el término técnico del original para mantener la referencia judía y escatológica. No se sustituye por «infierno» en el texto principal para no borrar esa especificidad.
theological_decisions:
- issue: Rendering de γέεννα
  english_pob_reading: Gehenna, with footnote offering “hell”
  chosen_spanish_reading: Gehenna, con nota que ofrece «infierno» como equivalente común
  alternative_spanish_readings:
  - infierno
  rationale: El griego usa un término propio con trasfondo histórico y escatológico; mantener «Gehenna» preserva la precisión del source. La nota ayuda al lector que espere el equivalente tradicional.
  doctrine_reference: Translation philosophy §1 (primacía del original); §6 (legible y moderna, sin borrar terminología específica)
- issue: Fuerza de la acusación vocativa
  english_pob_reading: You snakes, offspring of vipers!
  chosen_spanish_reading: ¡Serpientes, raza de víboras!
  alternative_spanish_readings:
  - ¡Serpientes, descendencia de víboras!
  - ¡Serpientes, prole de víboras!
  rationale: La combinación busca reproducir la dureza profética y la metáfora de procedencia/identidad sin suavizarla con un término piadoso. «Raza» funciona en español como insulto de pertenencia o tipo, aunque no sea una transliteración literal.
  doctrine_reference: Translation philosophy §2 (fidelidad semántica y fuerza retórica)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «How will you escape» por sobre una formulación más rígida. En español, «¿Cómo escaparán?» refleja esa misma naturalidad futura sin perder el tono retórico.
  spanish_consistency_notes:
  - Se mantuvo «Gehenna» en el texto principal para conservar la especificidad del término griego, siguiendo el criterio POB de primacía del original.
  - «Juicio» se eligió por su amplitud judicial; no se intensificó a «condena» en el texto principal porque el griego, aislado, no obliga a esa estrechez.
  - Se prefirió el vocativo plural directo («serpientes») para reproducir el insulto inmediato del griego.
  - La nota al pie usa una alternativa culturalmente esperable («infierno») sin reemplazar el término técnico del original en el cuerpo del texto.
