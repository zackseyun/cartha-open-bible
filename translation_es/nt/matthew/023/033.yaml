review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: doble vocativo insultante, pregunta retórica sobre escapar, «juicio» para κρίσις y conservación de «Gehenna» con nota alternativa. Sin embargo, «raza de víboras» no preserva con suficiente precisión el sentido de γεννήματα ἐχιδνῶν (‘descendencia/prole de víboras’) y añade en español un matiz de clase o tipo que no corresponde tan directamente al sustantivo griego.'
  spanish_quality_summary: El texto es claro y legible, pero «raza de víboras» suena algo menos natural y menos exacto que «descendencia de víboras» o «prole de víboras». Además, para un registro bíblico digno y natural, «¿Cómo escaparán del juicio de la Gehenna?» funciona, aunque «de Gehenna» sin artículo resulta más limpio en español cuando se conserva el nombre propio transliterado.
  glossary_alignment: Alinea bien con la terminología del proyecto al conservar «Gehenna» en el texto principal y «infierno» en nota. No hay términos de glosario mayores en conflicto, pero conviene ajustar γεννήματα a «descendencia» para seguir mejor la decisión auditada de ‘offspring’.
  issues:
  - severity: medium
    issue: «raza» para γεννήματα
    rationale: «Raza de víboras» es comprensible, pero desplaza el sentido de ‘lo engendrado/producido por’ hacia una categoría o clase. «Descendencia de víboras» preserva mejor la imagen de procedencia y sigue más de cerca la justificación léxica del POB inglés.
  - severity: low
    issue: Artículo en «la Gehenna»
    rationale: 'No es incorrecto, pero en español bíblico moderno suena más natural «Gehenna» como nombre propio sin artículo en esta construcción: «el juicio de Gehenna».'
