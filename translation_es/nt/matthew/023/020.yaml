translation:
  language: es
  text: Por tanto, el que jura por el altar jura por él y por todo lo que hay sobre él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "y por todas las cosas sobre él". La frase griega es más amplia que una sola "ofrenda" y puede incluir todo lo puesto sobre el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ οὖν ὀμόσας
  english_pob_choice: Therefore, the one who swears
  chosen_spanish: Por tanto, el que jura
  alternatives_spanish:
  - Así, el que jura
  - Por tanto, quien jura
  lexicon: BDAG
  rationale: ὁ οὖν ὀμόσας funciona como participio articular con valor genérico; en español, "el que jura" expresa bien ese sujeto general. "Por tanto" conserva el valor inferencial de οὖν sin introducir una paráfrasis más fuerte que el texto.
- source_word: ἐν τῷ θυσιαστηρίῳ
  english_pob_choice: by the altar
  chosen_spanish: por el altar
  alternatives_spanish:
  - ante el altar
  - en el altar
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente "en", en fórmulas de juramento con ὀμνύω la equivalencia idiomática es "por". "Por el altar" mantiene el sentido de la fórmula juratoria y evita una lectura espacial ajena al uso.
- source_word: ὀμνύει
  english_pob_choice: swears
  chosen_spanish: jura
  alternatives_spanish:
  - jura solemnemente
  - hace un juramento
  lexicon: BDAG
  rationale: '"Jura" es la forma breve y natural en español para el acto de prestar juramento. Preserva la fuerza gnómica del presente sin añadir expansión explicativa.'
- source_word: ἐν αὐτῷ
  english_pob_choice: by it
  chosen_spanish: por él
  alternatives_spanish:
  - en él
  lexicon: BDAG
  rationale: El pronombre remite al altar. En este contexto, ἐν se entiende idiomáticamente como "por" dentro de la fórmula de juramento; "por él" conserva la referencia y la repetición retórica del versículo.
- source_word: καὶ ἐν πᾶσι τοῖς ἐπάνω αὐτοῦ
  english_pob_choice: and by everything on it
  chosen_spanish: y por todo lo que está sobre él
  alternatives_spanish:
  - y por todas las cosas sobre él
  - y por todo lo que hay encima de él
  lexicon: BDAG
  rationale: La expresión griega es más amplia que una sola "ofrenda" y abarca todo lo colocado sobre el altar. "Todo lo que está sobre él" conserva esa amplitud sin estrechar indebidamente el referente, y refleja el valor de ἐπάνω como "sobre/encima de".
theological_decisions:
- issue: Alcance de "todo lo que está sobre él"
  english_pob_reading: A general reference to all that is upon the altar, without specifying sacrificial gifts in the translation.
  chosen_spanish_reading: Referencia general a todo lo que está sobre el altar, sin precisar en la traducción que se trate solo de una ofrenda.
  alternative_spanish_readings:
  - todas las ofrendas sobre él
  - el regalo sobre él
  rationale: El contexto inmediato habla del altar y de lo que hay sobre él, pero la frase griega es más amplia que "la ofrenda". Mantener la generalidad en español preserva la tensión interpretativa del pasaje y evita restringir el texto más de lo que permite el original.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla demasiado pronto.
translation_notes:
  revision_awareness: El texto español sigue de cerca el valor inferencial de οὖν, el uso idiomático de ἐν en fórmulas de juramento, y el alcance más amplio de πᾶσι τοῖς ἐπάνω αὐτοῦ. No se requieren notas textuales adicionales porque la versión española puede expresar la alternativa léxica dentro del cuerpo del versículo sin pérdida de claridad.
  spanish_consistency_notes:
  - Se usa "jura" para ὀμνύω, siguiendo la fuerza verbal simple del presente gnómico.
  - Se usa "por" en dos lugares para reflejar la fórmula juratoria idiomática y mantener la cohesión retórica.
  - Se evita "ofrenda" para no estrechar indebidamente el alcance de "todo lo que está sobre él".
