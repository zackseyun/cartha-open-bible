    text: O «miren» o «vean».
    reason: lexical_alternative
  - marker: b
    text: O «hombres sabios» o «sabios».
    reason: lexical_alternative
  revision_rationale: Se corrigió la nota mal anclada para que las alternativas léxicas correspondan a σοφοὺς («sabios»), no a «crucificarán». Se ajustó ἰδοὺ a «he aquí» para un registro más solemne y más alineado con el inglés auditado «behold», conservando alternativa moderna en nota. Se cambió «sus sinagogas» a «las sinagogas de ustedes» para expresar sin ambigüedad el posesivo de segunda persona plural del griego. El resto del versículo se mantuvo porque ya era fiel y natural.
