translation:
  language: es
  text: Por lo tanto, he aquí[a], yo les envío profetas, sabios[b] y escribas. A algunos de ellos ustedes matarán y crucificarán, y a algunos de ellos azotarán en las sinagogas de ustedes y perseguirán de ciudad en ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miren» o «vean».
    reason: lexical_alternative
  - marker: b
    text: O «hombres sabios» o «sabios».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: BDAG
  rationale: Conecta de manera inferencial con la acusación anterior. «Por lo tanto» conserva la relación consecuencial sin sonar excesivamente pesada.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: BDAG
  rationale: La partícula llama la atención del oyente. «Miren» comunica esa fuerza deíctica en español actual sin perder solemnidad.
- source_word: ἐγὼ ἀποστέλλω
  english_pob_choice: I am sending
  chosen_spanish: yo les envío
  alternatives_spanish:
  - yo envío
  - yo mandaré
  lexicon: BDAG
  rationale: Se conserva el presente enfático y la primera persona explícita. «Les envío» suena natural en español y mantiene la acción dirigida hacia los destinatarios.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - hacia ustedes
  - contra ustedes
  lexicon: BDAG
  rationale: El movimiento hacia los oyentes se expresa con una preposición natural en español. «A ustedes» evita sobreinterpretar el valor de oposición que aún no está explícito en la preposición.
- source_word: προφήτας
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - profetas de Dios
  lexicon: BDAG
  rationale: Es la correspondencia directa y estándar del término.
- source_word: σοφοὺς
  english_pob_choice: wise men
  chosen_spanish: sabios
  alternatives_spanish:
  - hombres sabios
  - sage(s)
  lexicon: BDAG
  rationale: El adjetivo sustantivado admite en español una forma natural sin forzar género explícito. «Sabios» preserva la amplitud del término y evita una sobreespecificación innecesaria.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - escribas de la ley
  - doctores de la ley
  lexicon: BDAG
  rationale: «Escribas» reproduce la categoría histórica y religiosa de forma directa, sin expandirla más allá de la evidencia del texto.
- source_word: ἐξ αὐτῶν
  english_pob_choice: Some of them
  chosen_spanish: A algunos de ellos
  alternatives_spanish:
  - De entre ellos
  - Algunos de ellos
  lexicon: BDAG
  rationale: El valor partitivo se expresa con claridad en español. La repetición mantiene el paralelismo del griego y evita convertir la frase en un universal absoluto.
- source_word: ἀποκτενεῖτε
  english_pob_choice: you will kill
  chosen_spanish: matarán
  alternatives_spanish:
  - darán muerte
  - los matarán
  lexicon: BDAG
  rationale: El futuro activa una acción violenta futura; «matarán» es directo y fiel. El sujeto se entiende del contexto, y en español el giro impersonal favorece fluidez sin alterar el sentido.
- source_word: σταυρώσετε
  english_pob_choice: crucify
  chosen_spanish: crucificarán
  alternatives_spanish:
  - colgarán en una cruz
  - ejecutarán en cruz
  lexicon: BDAG
  rationale: «Crucificarán» es la equivalencia precisa y estable para σταυρόω, preservando la forma verbal de futuro.
- source_word: μαστιγώσετε
  english_pob_choice: flog
  chosen_spanish: azotarán
  alternatives_spanish:
  - flagelarán
  - darán latigazos
  lexicon: BDAG
  rationale: «Azotar» comunica la violencia corporal de manera natural en español bíblico contemporáneo. «Flagelar» sería más técnico; «azotar» es más transparente.
- source_word: ἐν ταῖς συναγωγαῖς ὑμῶν
  english_pob_choice: in your synagogues
  chosen_spanish: en sus sinagogas
  alternatives_spanish:
  - en vuestras sinagogas
  - en las sinagogas de ustedes
  lexicon: BDAG
  rationale: En español, el posesivo de tercera persona plural puede funcionar como tratamiento de cortesía o referencia contextual. Aquí conserva el valor posesivo sin sonar artificioso.
- source_word: διώξετε
  english_pob_choice: persecute
  chosen_spanish: perseguirán
  alternatives_spanish:
  - acosarán
  - hostigarán
  lexicon: BDAG
  rationale: «Perseguirán» mantiene el sentido de persecución sostenida ya establecido por el contexto y evita reducirlo a simple persecución física momentánea.
- source_word: ἀπὸ πόλεως εἰς πόλιν
  english_pob_choice: from city to city
  chosen_spanish: de ciudad en ciudad
  alternatives_spanish:
  - de una ciudad a otra
  - de pueblo en pueblo
  lexicon: BDAG
  rationale: La fórmula idiomática española reproduce el movimiento repetido y la idea de desplazamiento continuo.
theological_decisions:
- issue: Autoridad del que habla en primera persona
  english_pob_reading: 'Retained the first-person claim without softening: Jesus speaks as the one who sends prophets, wise men, and scribes.'
  chosen_spanish_reading: 'Se mantiene sin suavizar la afirmación en primera persona: Jesús habla como quien envía profetas, sabios y escribas.'
  alternative_spanish_readings:
  - «Dios les enviará...»
  - «El Señor enviará...»
  rationale: El griego dice explícitamente «yo envío». La traducción conserva esa fuerza cristológica sin introducir una paráfrasis teológica que el texto no formula.
  doctrine_reference: Cristología alta; confesión nicena (381 d.C.)
- issue: Valor partitivo de «algunos de ellos»
  english_pob_reading: Some of them you will kill and crucify... and some of them you will flog...
  chosen_spanish_reading: 'Se conserva el valor partitivo: «a algunos de ellos...» en ambos miembros.'
  alternative_spanish_readings:
  - «a todos ellos»
  - omitir la repetición partitiva
  rationale: El griego limita los sujetos afectados a una parte del grupo enviado. Mantener la repetición protege esa restricción y evita una lectura totalizante que el texto no autoriza.
  doctrine_reference: Semántica gramatical del griego koiné
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del inglés POB que prefirió «behold» sobre «look». En español, esa solemnidad se refleja con «miren» en lugar de una forma más coloquial, mientras se conserva la estructura completa del verso y el valor partitivo de las dos frases con ἐξ αὐτῶν.
  spanish_consistency_notes:
  - Se mantiene «profetas / sabios / escribas» como triada estable sin ampliar los cargos.
  - Se conserva el futuro plural en toda la secuencia verbal para reflejar la cadena de acciones futuras.
  - «Sinagogas» y «perseguirán» permanecen en registro bíblico claro y moderno.
  - La nota [b] queda anclada en «sabios» porque el español también admite la alternativa tradicional «sages», aunque no sea la preferida.
