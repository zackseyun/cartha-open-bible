review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura básica del griego: conector inferencial, primera persona enfática («yo»), envío de «profetas, sabios y escribas», doble valor partitivo («a algunos de ellos»), y la secuencia futura de matar/crucificar, azotar en las sinagogas y perseguir de ciudad en ciudad. Sin embargo, hay dos problemas de fidelidad/documentación: (1) la nota [b] está mal anclada y mal redactada, porque el alternante «sabios / sages» corresponde a σοφοὺς, no a «crucificarán»; (2) «sus sinagogas» en español puede leerse como tercera persona y debilita el posesivo de segunda persona plural del griego («vuestras/de ustedes»).'
  spanish_quality_summary: El texto es mayormente natural y legible en español eclesial contemporáneo. «Por lo tanto» y «yo les envío» funcionan bien; «azotarán» y «perseguirán de ciudad en ciudad» también. No obstante, «miren» es algo menos digno que «he aquí» o «vean» en este contexto solemne, y la mezcla de «les» con «ustedes» más «sus sinagogas» crea una ligera inconsistencia referencial. La reparación necesaria es pequeña.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Profetas», «sabios» y «escribas» son adecuados; «sabios» es una excepción razonable frente al inglés «wise men», ya que en español «hombres sabios» sonaría forzado. La decisión teológica de mantener «yo envío» está correctamente preservada. La principal desalineación está en la nota léxica de σοφοὺς, que debe ir en «sabios[a]» y no en «crucificarán[b]».
  issues:
  - severity: high
    issue: La nota [b] está colocada sobre «crucificarán» pero su contenido trata de «sabios / sages».
    rationale: Esto falsea la trazabilidad léxica del audit trail y confunde al lector sobre qué palabra ofrece alternativas.
  - severity: medium
    issue: «sus sinagogas» es ambiguo para el griego ὑμῶν (‘de ustedes/vuestras’).
    rationale: En español neutro, «sus» puede referirse a ellos, a ustedes o a otra tercera persona. «las sinagogas de ustedes» expresa con claridad la segunda persona plural del original.
  - severity: low
    issue: «miren» es posible para ἰδοὺ, pero en un registro más digno «he aquí» encaja mejor con la revisión inglesa a «behold».
    rationale: No es un error semántico, pero una formulación más solemne armoniza mejor con el tono y con la nota alternativa ya presente.
  revised_spanish_text: Por lo tanto, he aquí[a], yo les envío profetas, sabios[b] y escribas. A algunos de ellos ustedes matarán y crucificarán, y a algunos de ellos azotarán en las sinagogas de ustedes y perseguirán de ciudad en ciudad.
  revised_footnotes:
