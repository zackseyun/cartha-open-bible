revisions:
- from: Por lo tanto[a], miren, yo les envío profetas, sabios y escribas. A algunos de ellos ustedes matarán y crucificarán[b], y a algunos de ellos azotarán en sus sinagogas y perseguirán de ciudad en ciudad.
  to: Por lo tanto, he aquí[a], yo les envío profetas, sabios[b] y escribas. A algunos de ellos ustedes matarán y crucificarán, y a algunos de ellos azotarán en las sinagogas de ustedes y perseguirán de ciudad en ciudad.
  rationale: Se corrigió la nota mal anclada para que las alternativas léxicas correspondan a σοφοὺς («sabios»), no a «crucificarán». Se ajustó ἰδοὺ a «he aquí» para un registro más solemne y más alineado con el inglés auditado «behold», conservando alternativa moderna en nota. Se cambió «sus sinagogas» a «las sinagogas de ustedes» para expresar sin ambigüedad el posesivo de segunda persona plural del griego. El resto del versículo se mantuvo porque ya era fiel y natural.
  reviewer_model: gpt-5.4
