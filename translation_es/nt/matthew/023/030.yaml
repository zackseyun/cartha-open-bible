  - severity: medium
    issue: La nota [b] está colocada sobre «nuestros padres», pero su contenido explica «en la sangre de los profetas».
    rationale: El requerimiento exige que el marcador aparezca en la palabra o frase pertinente. La explicación trata de la participación en el derramamiento/culpa de sangre, no del referente de «padres».
