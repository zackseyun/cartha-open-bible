translation:
  language: es
  text: 'Y dicen: «Si hubiéramos estado en los días de nuestros padres, no habríamos sido partícipes[a] con ellos en la sangre[b] de los profetas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «participantes con ellos» o «compartícipes con ellos»; el término griego puede indicar participación compartida o complicidad.
    reason: lexical_alternative
  - marker: b
    text: Es decir, participación en el derramamiento de la sangre de los profetas; una afirmación de no compartir la culpa de sangre de sus antepasados.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγετε
  english_pob_choice: you say
  chosen_spanish: y dicen
  alternatives_spanish:
  - y ustedes dicen
  - y dicen ustedes
  lexicon: BDAG
  rationale: El presente indicativo plural expresa una acusación directa y continua en el discurso de Jesús. En español, «dicen» conserva la fuerza del presente y evita una formulación demasiado pesada.
- source_word: Εἰ ἤμεθα
  english_pob_choice: If we had been living
  chosen_spanish: Si hubiéramos estado
  alternatives_spanish:
  - Si hubiéramos vivido
  - Si estuviéramos
  lexicon: BDAG
  rationale: El imperfecto de εἰμί en una condición contraria a los hechos del pasado se vierte naturalmente con pluscuamperfecto de subjuntivo en español. «Hubiéramos estado» mantiene bien el valor hipotético sin añadir desarrollo interpretativo.
- source_word: ἐν ταῖς ἡμέραις
  english_pob_choice: in the days
  chosen_spanish: en los días
  alternatives_spanish:
  - durante los días
  - en el tiempo
  lexicon: BDAG
  rationale: Es un modismo temporal bíblico que en español se entiende con claridad y conserva la cadencia del original.
- source_word: τῶν πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  lexicon: BDAG
  rationale: Se conserva el valor literal de πατέρων como «padres», tal como permite el español bíblico. «Antepasados» aclara el sentido, pero neutraliza la forma masculina explícita del texto.
- source_word: οὐκ ἂν ἤμεθα
  english_pob_choice: we would not have been
  chosen_spanish: no habríamos sido
  alternatives_spanish:
  - no estaríamos
  - no hubiéramos estado
  lexicon: BDAG
  rationale: La apódosis contrafactual del pasado se expresa con el condicional compuesto. «Habríamos sido» reproduce con naturalidad el valor de irrealidad pasada.
- source_word: αὐτῶν κοινωνοὶ
  english_pob_choice: partners with them
  chosen_spanish: partícipes con ellos
  alternatives_spanish:
  - socios con ellos
  - compañeros con ellos
  - participantes con ellos
  lexicon: BDAG
  rationale: κοινωνός denota participación o compartición. «Partícipes» conserva esa idea sin introducir de entrada una lectura jurídica más fuerte como «cómplices»; en contexto, la nota puede explicitar la posibilidad de «participantes» o «compartidores».
- source_word: ἐν τῷ αἵματι
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - en el derramamiento de la sangre
  - en la muerte violenta
  lexicon: BDAG
  rationale: Se mantiene la imagen concreta de «sangre» porque el contexto habla de la culpabilidad por la muerte de los profetas. La forma literal preserva la fuerza retórica sin expandir el texto.
- source_word: τῶν προφητῶν
  english_pob_choice: of the prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - de los profetas de Dios
  lexicon: BDAG
  rationale: προφητῶν se traduce de manera directa como «profetas», el equivalente normal y fiel en este contexto.
theological_decisions:
- issue: Grado de complicidad implicado por κοινωνοὶ ἐν τῷ αἵματι
  english_pob_reading: The statement denies participation in the bloodguilt of those who killed the prophets, rendered as 'partners with them in the blood of the prophets.'
  chosen_spanish_reading: La frase niega que los hablantes fueran partícipes de la culpa de derramar la sangre de los profetas.
  alternative_spanish_readings:
  - cómplices en el asesinato de los profetas
  - compartidores de la sangre de los profetas
  rationale: «Partícipes» mantiene la relación de participación/comunión del término griego sin convertir prematuramente la frase en una interpretación totalmente explícita. La nota permite aclarar que el sentido incluye participación en la culpabilidad de la violencia contra los profetas, conforme al contexto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y el audit trail inglés muestran alto acuerdo, sin observaciones pendientes. Se mantuvo la lectura contrafactual del pasado, el valor temporal idiomático de «en los días», y la ambigüedad productiva de κοινωνοὶ mediante una solución española natural pero auditables en nota.'
  spanish_consistency_notes:
  - Se mantiene «padres» para τῶν πατέρων ἡμῶν, en continuidad con el valor masculino explícito del original.
  - Se conserva «sangre» en lugar de expandir a «derrama(miento)» en el texto principal, siguiendo la literalidad retórica del griego.
  - «Partícipes» se usa como equivalente de κοινωνοί para preservar la idea de participación sin cargar el texto principal con una interpretación más fuerte que la del griego.
