  glossary_alignment: 'La terminología está en línea con el proyecto: «escribas», «fariseos», «hipócritas», y la fórmula mateana «el reino de los cielos». No hay conflicto con glosario mayor. La opción «dejan entrar» es posible para ἀφίετε…εἰσελθεῖν, pero dado que la auditoría inglesa prefirió explicitar el infinitivo final, en español resulta más fiel y limpio «no permiten que los que están entrando entren».'
