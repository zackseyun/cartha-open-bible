translation:
  language: es
  text: Pero ¡ay de ustedes, escribas y fariseos, hipócritas! Porque cierran el reino de los cielos[a] delante de las personas; pues ustedes no entran, ni permiten que los que están entrando[b] entren[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el reino del cielo». Mateo usa con frecuencia esta expresión donde otros contextos dirían «el reino de Dios».
    reason: lexical_alternative
  - marker: b
    text: O «los que tratan de entrar». El participio griego puede referirse a quienes están en proceso de entrar o buscan entrar.
    reason: lexical_alternative
  - marker: c
    text: O «ni dejan entrar a los que están entrando».
    reason: previous_rendering
lexical_decisions:
- source_word: Οὐαὶ
  english_pob_choice: woe
  chosen_spanish: ¡ay de...!
  alternatives_spanish:
  - ¡qué lamentación para...!
  - ¡ay...!
  lexicon: BDAG
  rationale: «Ay de» conserva el tono profético de denuncia y lamento de οὐαί sin suavizarlo a una exclamación meramente emotiva.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Pues
  lexicon: BDAG
  rationale: Aquí δέ introduce continuidad con contraste discursivo; «Pero» funciona de manera natural en español para abrir la nueva invectiva.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente establecido y suficientemente transparente; «maestros de la ley» sería más interpretativo.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Transliteración estándar del grupo religioso, plenamente reconocible en español.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - pretendientes
  - fingidos
  lexicon: BDAG
  rationale: «Hipócritas» reproduce el juicio moral-religioso del término y mantiene la fuerza de la acusación.
- source_word: κλείετε
  english_pob_choice: shut
  chosen_spanish: cierran
  alternatives_spanish:
  - cierran con llave
  - cierran el paso a
  lexicon: BDAG
  rationale: «Cerrar» en español transmite bien la metáfora de bloquear acceso; con «el reino» el verbo se entiende naturalmente sin añadir un giro demasiado interpretativo.
- source_word: βασιλείαν τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reino de los cielos
  lexicon: BDAG
  rationale: Se conserva la fórmula mateana tradicional en español, que reproduce el circunloquio reverencial del texto griego y es idiomática.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  english_pob_choice: before people
  chosen_spanish: delante de la gente
  alternatives_spanish:
  - ante la gente
  - frente a la gente
  lexicon: BDAG
  rationale: «Delante de la gente» expresa la relación espacial/metafórica de ἔμπροσθεν sin caer en un calco rígido; «gente» mantiene el valor genérico de ἀνθρώπων.
- source_word: ἀνθρώπων
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: El referente es genérico y no masculino específico; «la gente» suena natural en español y preserva el sentido colectivo.
- source_word: εἰσέρχεσθε
  english_pob_choice: enter
  chosen_spanish: entran
  alternatives_spanish:
  - entran
  - ingresan
  lexicon: BDAG
  rationale: «Entrar» es el verbo directo para el acceso al reino; en la forma plural de segunda persona se traduce como «entran» dentro del contexto de acusación directa.
- source_word: τοὺς εἰσερχομένους
  english_pob_choice: those who are entering
  chosen_spanish: a los que están entrando
  alternatives_spanish:
  - a los que entran
  - a los que tratan de entrar
  lexicon: BDAG
  rationale: La forma progresiva preserva el aspecto presente del participio y evita limitar el sentido a mera intención o esfuerzo.
- source_word: ἀφίετε
  english_pob_choice: allow
  chosen_spanish: dejan entrar
  alternatives_spanish:
  - permiten
  - dejan
  lexicon: BDAG
  rationale: En este contexto, ἀφίημι significa permitir. «Dejan entrar» comunica de forma natural la negación de permiso de acceso.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  lexicon: BDAG
  rationale: El infinitivo completa la idea de acceso al reino; se traduce simplemente por «entrar» para mantener claridad y naturalidad.
theological_decisions:
- issue: Expresión mateana βασιλεία τῶν οὐρανῶν
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reino del cielo
  rationale: Se conserva el circunloquio característico de Mateo sin reemplazarlo por una formulación más teológica o más genérica. En español, la forma plural tradicional «los cielos» es fiel al matiz reverencial del griego y al uso mateano.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor de ἔμπροσθεν τῶν ἀνθρώπων
  english_pob_reading: before people
  chosen_spanish_reading: delante de la gente
  alternative_spanish_readings:
  - ante la gente
  - frente a la gente
  rationale: La frase indica posición/barrera visible ante otros. «Delante de la gente» mantiene la imagen sin añadir una interpretación de hostilidad que el texto ya comunica por el verbo «cierran».
  doctrine_reference: Translation philosophy §4
- issue: Participio presente τοὺς εἰσερχομένους
  english_pob_reading: those who are entering
  chosen_spanish_reading: a los que están entrando
  alternative_spanish_readings:
  - a los que entran
  - a los que tratan de entrar
  rationale: El presente participial puede expresar acción en curso o personas en proceso de entrar. «Están entrando» preserva esa progresividad sin convertirla en una mera tentativa.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial inglés: se evitó el calco incómodo equivalente a «allow those who are entering to enter» y se optó por una forma española fluida que conserva la doble idea de proceso y acceso. También se respetó la revisión que prefirió «before people» al equivalente más coloquial, trasladándolo a un español formal y natural («delante de la gente»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún tetragrámaton.
  - Se conserva «reino de los cielos» como fórmula mateana estable y no se sustituye por «reino de Dios».
  - Se emplea «escribas» y «fariseos» como transliteraciones/equivalentes ya asentados en español bíblico.
  - Se usa un presente progresivo («están entrando») para reflejar el participio presente sin forzar una interpretación de mera intención.
  - Los corchetes de notas aparecen solo donde hay alternativa textual o lexical relevante, y cada marcador se usa una sola vez.
