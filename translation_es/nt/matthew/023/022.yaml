translation:
  language: es
  text: Y el que jura por el cielo jura por el trono de Dios y por el que está sentado sobre él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el que está sentado sobre él".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὀμόσας
  english_pob_choice: whoever swears
  chosen_spanish: el que jura
  alternatives_spanish:
  - quien jura
  - quien haya jurado
  lexicon: BDAG
  rationale: El participio articular aoristo funciona de manera genérica y sustantivada. En español, "el que jura" comunica con naturalidad la idea de una persona que realiza esa acción en general, sin forzar un pasado puntual.
- source_word: ἐν
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - en
  lexicon: BDAG
  rationale: En fórmulas de juramento, la preposición griega con dativo expresa el medio o base del juramento; en español, la equivalencia idiomática natural es "por" (“jurar por el cielo”).
- source_word: οὐρανῷ
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo del cielo
  - el cielo (como morada de Dios)
  lexicon: BDAG
  rationale: En este contexto religioso, οὐρανός puede referirse al ámbito celestial; en español, "el cielo" es la forma idiomática y suficientemente reverente para el juramento, manteniendo la relación con el trono de Dios.
- source_word: ὀμνύει
  english_pob_choice: swears
  chosen_spanish: jura
  alternatives_spanish:
  - está jurando
  lexicon: BDAG
  rationale: El presente indica una afirmación general. "Jura" es la forma natural y directa en español para el acto de swear/jurar en este contexto.
- source_word: θρόνῳ τοῦ θεοῦ
  english_pob_choice: the throne of God
  chosen_spanish: el trono de Dios
  alternatives_spanish:
  - el trono de Dios
  lexicon: BDAG
  rationale: 'Se conserva la estructura explícita del genitivo: "el trono de Dios". Mantiene la solemnidad y evita suavizar la relación posesiva/entronizadora.'
- source_word: τῷ καθημένῳ
  english_pob_choice: the one seated
  chosen_spanish: el que está sentado
  alternatives_spanish:
  - el sentado
  - el que se sienta
  lexicon: BDAG
  rationale: El participio de κάθημαι describe al que está entronizado allí. En español, "el que está sentado" es reverente y natural, y preserva la circunlocución sin identificarlo de forma explícita en el texto principal.
- source_word: ἐπάνω αὐτοῦ
  english_pob_choice: upon it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre eso
  lexicon: BDAG
  rationale: El antecedente es el trono, que en español es masculino; por eso "sobre él" mantiene la referencia y evita introducir una paráfrasis más libre. "Sobre él" refleja bien el valor locativo de ἐπάνω en este contexto de trono.
theological_decisions:
- issue: Referente de "el que está sentado sobre él"
  english_pob_reading: A reverential circumlocution for God enthroned in heaven
  chosen_spanish_reading: Una circunlocución reverente para Dios entronizado en el cielo
  alternative_spanish_readings:
  - una referencia menos explícita, simplemente al entronizado allí
  - una alusión impersonal al que ocupa el trono
  rationale: La mención previa del "trono de Dios" fija el referente. La traducción conserva la circunlocución en lugar de reemplazarla por "Dios" en el texto principal, respetando el matiz reverente y la lógica del dicho.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3
translation_notes:
  revision_awareness: El texto sigue de cerca el griego y coincide con la lectura aprobada del inglés POB. No se registran revisiones posteriores que alteren el sentido o requieran nota textual adicional.
  spanish_consistency_notes:
  - Se usa "Dios" para θεός y se mantiene la estructura explícita "trono de Dios".
  - Se traduce ἐν idiomáticamente como "por" en dos ocurrencias para conservar el sentido de juramento.
  - Se conserva la circunlocución reverente para el entronizado, sin sustituirla por una identificación directa en el cuerpo del versículo.
  - La puntuación y el orden responden al ritmo natural del español sin añadir contenido interpretativo.
