    text: O «personas»; el griego anthrōpōn se usa aquí en sentido representativo para los seres humanos en general.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con su dedo». El singular expresa que no hacen ni el menor esfuerzo.
    reason: lexical_alternative
  revision_rationale: La revisión conserva todas las decisiones principales del borrador, pero corrige una expresión menos natural y menos precisa frente al griego. «Con un dedo» es idiomático en español y comunica claramente la idea de esfuerzo mínimo; la nota preserva la forma singular posesiva del original. También se omite el sujeto inicial por fluidez, sin afectar el sentido.
