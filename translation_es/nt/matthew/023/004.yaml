translation:
  language: es
  text: Atan cargas pesadas y las ponen sobre los hombros de los hombres[a], pero ellos mismos no quieren moverlas con un dedo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas»; el griego anthrōpōn se usa aquí en sentido representativo para los seres humanos en general.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «con su dedo». El singular expresa que no hacen ni el menor esfuerzo.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεσμεύουσιν
  english_pob_choice: tie up
  chosen_spanish: atan
  alternatives_spanish:
  - amarran
  - vinculan
  - ligan
  lexicon: BDAG
  rationale: El griego expresa la acción de sujetar o atar. «Atan» conserva la imagen concreta y es natural en español; comunica bien la preparación o sujeción de las cargas sin volverlo más interpretativo de lo que permite el texto.
- source_word: φορτία βαρέα
  english_pob_choice: heavy burdens
  chosen_spanish: cargas pesadas
  alternatives_spanish:
  - pesadas cargas
  - bultos pesados
  - cargas gravosas
  lexicon: BDAG
  rationale: φορτία son cargas o bultos, y βαρέα añade peso. «Cargas pesadas» mantiene la imagen física y también sugiere su carácter opresivo sin explicitar más de lo que dice el griego.
- source_word: ἐπιτιθέασιν ἐπὶ τοὺς ὤμους
  english_pob_choice: lay them on the shoulders
  chosen_spanish: las ponen sobre los hombros
  alternatives_spanish:
  - las colocan sobre los hombros
  - las echan sobre los hombros
  - las ponen en los hombros
  lexicon: BDAG
  rationale: La construcción indica poner algo encima. «Las ponen sobre los hombros» es idiomático y conserva la imagen corporal concreta del original.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres[a]
  alternatives_spanish:
  - de la gente
  - de las personas
  - de los seres humanos
  lexicon: BDAG
  rationale: ἄνθρωποι aparece en plural masculino y puede funcionar de modo representativo para seres humanos en general. Se mantiene «hombres» para respetar la forma del griego y se aclara su sentido genérico en la nota.
- source_word: αὐτοὶ δὲ
  english_pob_choice: but they themselves
  chosen_spanish: pero ellos mismos
  alternatives_spanish:
  - pero ellos
  - sin embargo, ellos mismos
  - pero por su parte ellos mismos
  lexicon: BDAG
  rationale: El pronombre es enfático. «Ellos mismos» conserva ese contraste entre lo que imponen a otros y lo que ellos rehúsan hacer.
- source_word: τῷ δακτύλῳ αὐτῶν
  english_pob_choice: with their finger
  chosen_spanish: ni con su dedo
  alternatives_spanish:
  - ni siquiera con su dedo
  - ni con un dedo
  - ni con el dedo de ellos
  lexicon: BDAG
  rationale: El singular «dedo» expresa la mínima acción posible. En español, añadir «ni» refuerza la idea de que no quieren hacer el menor esfuerzo, reflejando bien la fuerza retórica del griego.
- source_word: οὐ θέλουσιν κινῆσαι αὐτά
  english_pob_choice: are unwilling to move them
  chosen_spanish: no quieren moverlas
  alternatives_spanish:
  - no están dispuestos a moverlas
  - se niegan a moverlas
  - no quieren moverlas ni siquiera
  lexicon: BDAG
  rationale: θέλω señala voluntad, no incapacidad; κινῆσαι es mover. «No quieren moverlas» transmite la negativa deliberada. Se integra con la frase anterior para conservar el énfasis en la falta de voluntad.
theological_decisions:
- issue: Naturaleza de las cargas impuestas
  english_pob_reading: Retain the concrete image 'heavy burdens' without explicating the referent.
  chosen_spanish_reading: Mantener la imagen concreta de «cargas pesadas» sin especificar qué reglamentos o exigencias representan.
  alternative_spanish_readings:
  - interpretar explícitamente como mandatos legales
  - explicar como reglas religiosas opresivas
  rationale: El texto griego presenta la metáfora sin nombrar el contenido exacto de esas cargas. En español conviene preservar esa tensión y no cerrar el sentido con una explicación que el versículo no da por sí mismo.
  doctrine_reference: Preservar la tensión interpretativa del texto; evitar una paráfrasis doctrinal excesiva.
translation_notes:
  revision_awareness: El borrador sigue de cerca el análisis léxico y la decisión interpretativa del POB en inglés, manteniendo la metáfora de las cargas y el contraste enfático entre lo que ellos imponen y lo que rehúsan hacer. No se introdujeron clarificaciones doctrinales ajenas al griego ni se suavizó el valor representativo de ἄνθρωποι.
  spanish_consistency_notes:
  - Se mantuvo «cargas pesadas» para conservar tanto el peso literal como la fuerza metafórica.
  - Se usó «hombres» con nota para reflejar el plural griego con sentido representativo.
  - Se eligió «dedo» en singular para preservar el hipérbole de mínima acción.
  - Se evitó «SEÑOR» u այլ terminología no pertinente, ya que este versículo no contiene el nombre divino.
