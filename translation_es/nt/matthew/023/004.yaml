revisions:
- from: Ellos atan cargas pesadas y las ponen sobre los hombros de los hombres[a], pero ellos mismos no quieren moverlas ni con su dedo.
  to: Atan cargas pesadas y las ponen sobre los hombros de los hombres[a], pero ellos mismos no quieren moverlas con un dedo[b].
  rationale: La revisión conserva todas las decisiones principales del borrador, pero corrige una expresión menos natural y menos precisa frente al griego. «Con un dedo» es idiomático en español y comunica claramente la idea de esfuerzo mínimo; la nota preserva la forma singular posesiva del original. También se omite el sujeto inicial por fluidez, sin afectar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:17:36Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: atan cargas pesadas, las ponen sobre los hombros de otros, y ellos mismos no quieren moverlas. Conserva correctamente la imagen concreta de φορτία βαρέα y no sobreinterpreta el referente. También mantiene el énfasis de αὐτοὶ δὲ con «ellos mismos». Sin embargo, «ni con su dedo» añade una partícula negativa que no corresponde directamente a la sintaxis griega; el griego expresa el instrumento positivo «con su dedo» dentro de la negación verbal. En español la forma más natural y fiel es «con su dedo» o, más idiomáticamente, «con un dedo».'
  spanish_quality_summary: El texto es claro y legible, pero puede mejorarse en naturalidad e idiomaticidad. «Ellos atan» suena un poco redundante al inicio del discurso; «Atan» funciona mejor. Más importante, «no quieren moverlas ni con su dedo» suena algo forzado en español. La expresión idiomática y fiel es «no quieren moverlas con un dedo», que comunica que no hacen ni el mínimo esfuerzo. Eso sí, para no alejarse del singular del griego conviene explicarlo en nota si se adopta «un dedo».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la política de preservar el sentido concreto y no doctrinalizar la metáfora, lo cual el borrador cumple. La decisión sobre ἀνθρώπων como «hombres[a]» con nota alternativa está alineada con el rastro auditado en inglés. No hay conflicto con Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: «ni con su dedo» no refleja de la mejor manera τῷ δακτύλῳ αὐτῶν
    rationale: El griego dice literalmente que no quieren moverlas «con su dedo»; la negación recae sobre «no quieren moverlas», no sobre una construcción «ni con». En español, «ni con su dedo» suena menos natural y puede sentirse añadido. «Con un dedo» transmite mejor la idea de mínimo esfuerzo.
  - severity: low
    issue: «Ellos atan» es ligeramente pesado estilísticamente
    rationale: El sujeto explícito no es necesario en español al comienzo de la oración. Puede omitirse sin perder contraste, que ya queda marcado después por «pero ellos mismos».
  revised_spanish_text: Atan cargas pesadas y las ponen sobre los hombros de los hombres[a], pero ellos mismos no quieren moverlas con un dedo[b].
  revised_footnotes:
