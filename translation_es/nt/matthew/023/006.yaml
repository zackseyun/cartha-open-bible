translation:
  language: es
  text: Y aman los lugares de honor en los banquetes y los asientos principales en las sinagogas[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los lugares principales a la mesa» para «los lugares de honor», reflejando la posición honrada de reclinación en comidas formales del mundo antiguo.
    reason: lexical_alternative
  - marker: b
    text: O «los mejores asientos» para «los asientos principales». El griego subraya asientos de mayor rango o precedencia.
    reason: lexical_alternative
  - marker: c
    text: Los banquetes en el Mediterráneo antiguo estaban organizados por rangos visibles de honor; por eso la frase apunta al deseo de estatus público, no solo de comodidad.
    reason: cultural_note
lexical_decisions:
- source_word: φιλοῦσι
  english_pob_choice: they love
  chosen_spanish: aman
  alternatives_spanish:
  - les gustan mucho
  - prefieren
  - se deleitan en
  lexicon: BDAG
  rationale: El verbo φιλέω aquí expresa una fuerte preferencia o apego por los puestos de prestigio. «Aman» conserva la intensidad moral del reproche de Jesús y suena natural en español; no implica necesariamente amor de alianza, sino gusto marcado por el honor.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: δέ funciona como enlace suave que continúa la descripción. «Y» reproduce esa conexión sin añadir un contraste más fuerte del que el griego exige.
- source_word: πρωτοκλισίαν
  english_pob_choice: the places of honor
  chosen_spanish: los lugares de honor
  alternatives_spanish:
  - el lugar de honor
  - el puesto principal a la mesa
  - los puestos de honor
  lexicon: BDAG
  rationale: πρωτοκλισία alude a los lugares de reclinación más honrados en una comida formal. «Lugares de honor» comunica el valor social del término en español y mantiene la referencia a la posición privilegiada en la mesa.
- source_word: ἐν τοῖς δείπνοις
  english_pob_choice: at banquets
  chosen_spanish: en los banquetes
  alternatives_spanish:
  - en las cenas
  - en los festines
  - en los convivios
  lexicon: BDAG
  rationale: δεῖπνον designa una comida principal y, en este contexto de estatus público, corresponde mejor a «banquetes» que a una cena genérica. La preposición se conserva de forma directa.
- source_word: πρωτοκαθεδρίας
  english_pob_choice: the best seats
  chosen_spanish: las mejores sillas
  alternatives_spanish:
  - los asientos principales
  - los puestos de honor
  - las sillas principales
  lexicon: BDAG
  rationale: πρωτοκαθεδρία señala asientos de mayor rango o precedencia. «Las mejores sillas» refleja la decisión del POB en inglés de usar una formulación idiomática; en español conserva la idea de prominencia y evita un calco rígido.
- source_word: ἐν ταῖς συναγωγαῖς
  english_pob_choice: in the synagogues
  chosen_spanish: en las sinagogas
  alternatives_spanish:
  - en sinagogas
  lexicon: BDAG
  rationale: La frase es locativa e institucional. «En las sinagogas» es la traducción directa y natural en español, manteniendo el marco judío del texto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de SBLGNT y armoniza con el audit trail inglés sin depender mecánicamente de él. Se preserva la doble imagen social: lugares de honor en comidas formales y asientos de mayor precedencia en sinagogas.'
  spanish_consistency_notes:
  - Se mantuvo «Y» para δέ por continuidad narrativa.
  - Se usó «aman» para reflejar la intensidad de φιλέω en este contexto de preferencia moralmente criticada.
  - Se tradujo πρωτοκλισία con un término comprensible pero se preservó la alternativa de mesa en nota.
  - Se tradujo πρωτοκαθεδρία con una expresión idiomática española, manteniendo la noción de rango.
  - «Sinagogas» se mantiene sin glosa por ser término estable y transparente en español eclesial y académico.
