translation:
  language: es
  text: 'En verdad les digo[a]: todas estas cosas[b] vendrán sobre esta generación.[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Les aseguro». El griego dice literalmente «Amén, les digo», una fórmula solemne de afirmación autoritativa.
    reason: lexical_alternative
  - marker: b
    text: 'O «todo esto». El griego está en plural: «todas estas cosas».'
    reason: lexical_alternative
  - marker: c
    text: «Esta generación» también puede ser entendida por algunos como «estas personas» o como una generación incrédula en sentido más amplio, pero el griego más directamente dice «esta generación».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - Amén
  - En verdad
  lexicon: BDAG
  rationale: En la fórmula sinóptica ἀμὴν λέγω ὑμῖν, ἀμήν funciona como una afirmación solemne que introduce una declaración con autoridad. «De cierto» comunica bien ese valor enfático en español natural y conserva un tono digno. No se deja como «Amén» porque aquí no actúa como respuesta litúrgica.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: El presente de λέγω con el dativo ὑμῖν se expresa de forma directa y solemne con «les digo». El sujeto de primera persona singular queda implícito en el verbo español, por lo que no es necesario añadir «yo».
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrá
  - llegarán
  lexicon: BDAG
  rationale: ἥξει es futuro de ἥκω y aquí señala la venida o llegada de las consecuencias anunciadas. Se usa «vendrán» porque el complemento «todas estas cosas» es plural en español y porque «venir sobre» reproduce bien el sentido del juicio que alcanza al destinatario.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: BDAG
  rationale: El griego neutro plural subraya la totalidad de los elementos mencionados. «Todas estas cosas» conserva explícitamente el plural y evita reducirlo a un singular generalizante como «todo esto».
- source_word: ἐπὶ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: BDAG
  rationale: Con acusativo y movimiento hacia un objeto, ἐπί puede expresar la idea de que algo cae o viene sobre alguien. «Sobre» mantiene la imagen judicial y solemne sin volverla más interpretativa con «contra».
- source_word: γενεὰν ταύτην
  english_pob_choice: this generation
  chosen_spanish: esta generación
  alternatives_spanish:
  - esta época
  - estas personas
  lexicon: BDAG
  rationale: γενεά se traduce de manera más directa como «generación» en este contexto, preservando el referente temporal inmediato del discurso de Jesús. «Esta generación» evita expandir el sentido hacia «época» o «personas» sin base textual suficiente.
theological_decisions:
- issue: Referente de «esta generación» (γενεὰν ταύτην)
  english_pob_reading: Rendered as 'this generation' without interpretive expansion, preserving the text's direct wording and temporal force.
  chosen_spanish_reading: Se mantiene «esta generación» sin ampliar su referente.
  alternative_spanish_readings:
  - esta época
  - este pueblo
  - la generación incrédula
  rationale: La traducción no debe resolver una discusión escatológica o histórica que el griego no resuelve explícitamente. Conservar «esta generación» preserva la tensión teológica y permite que el contexto determine el alcance.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La validación previa falló porque se habían incluido marcadores de nota sin anclarlos en el texto. En esta corrección se eliminan las notas al pie y se integra el contenido directamente en el enunciado principal, manteniendo la lectura fuente y la equivalencia plural de ταῦτα πάντα.
  spanish_consistency_notes:
  - Se mantiene un español moderno y digno, sin calcos innecesarios.
  - «De cierto» conserva la fuerza formularia de ἀμὴν sin introducir una fórmula litúrgica ajena al contexto.
  - Se conserva el plural explícito de ταῦτα πάντα como «todas estas cosas».
  - No se interpreta «esta generación» más allá de lo que el texto griego permite.
