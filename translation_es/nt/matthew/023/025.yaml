translation:
  language: es
  text: ¡Ay de ustedes[a], escribas y fariseos, hipócritas! Porque limpian la parte exterior[b] del vaso y del plato, pero por dentro están llenos de codicia y de desenfreno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ay de vosotros!».
    reason: alternative_reading
  - marker: b
    text: O «el exterior».
    reason: lexical_alternative
  - marker: c
    text: O «están llenos de robo o extorsión y de falta de dominio propio». Los términos griegos también pueden tener sentidos más fuertes de toma explotadora y exceso sin control.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay de vosotros!
  - ¡Ay!
  lexicon: BDAG
  rationale: Conserva el valor profético de denuncia y lamento de οὐαί. En español, «¡Ay de ustedes!» comunica con naturalidad esa carga exclamativa sin suavizarla ni convertirla en una mera expresión de tristeza.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y tradicional para γραμματεῖς en contexto polémico de los evangelios; evita la interpretación más explicativa «maestros de la Ley».
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  lexicon: BDAG
  rationale: Transliteración estable y transparente del grupo judío mencionado por el texto.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - pretendientes
  lexicon: BDAG
  rationale: «Hipócritas» preserva el reproche moral-religioso fuerte del término y es el equivalente más natural en español contemporáneo.
- source_word: καθαρίζετε τὸ ἔξωθεν
  english_pob_choice: you clean the outside
  chosen_spanish: limpian lo de afuera
  alternatives_spanish:
  - limpian el exterior
  - limpian la parte exterior
  lexicon: BDAG
  rationale: «Lo de afuera» reproduce bien la oposición adentro/afuera del griego y suena más natural que «el exterior» en este giro idiomático español.
- source_word: ποτηρίου
  english_pob_choice: cup
  chosen_spanish: vaso
  alternatives_spanish:
  - copa
  - taza
  lexicon: BDAG
  rationale: «Vaso» funciona en español como recipiente de mesa y evita limitar innecesariamente el objeto; además permite una pareja más natural con «plato».
- source_word: παροψίδος
  english_pob_choice: dish
  chosen_spanish: plato
  alternatives_spanish:
  - fuente
  - bandeja
  lexicon: BDAG
  rationale: «Plato» es una equivalencia amplia y idiomática para el recipiente de mesa referido por παροψίς; mantiene el contraste con el vaso sin forzar una especificación innecesaria.
- source_word: ἔσωθεν
  english_pob_choice: inside
  chosen_spanish: por dentro
  alternatives_spanish:
  - dentro
  - en el interior
  lexicon: BDAG
  rationale: «Por dentro» mantiene la simetría con «lo de afuera» y expresa bien el contraste espacial del texto.
- source_word: γέμουσιν
  english_pob_choice: they are full
  chosen_spanish: están llenos
  alternatives_spanish:
  - se llenan
  lexicon: BDAG
  rationale: La pluralidad del verbo se conserva naturalmente en español con «están llenos», que refleja el estado resultante del interior de los recipientes.
- source_word: ἁρπαγῆς
  english_pob_choice: greed
  chosen_spanish: robo
  alternatives_spanish:
  - rapiña
  - extorsión
  - codicia
  lexicon: BDAG
  rationale: 'Aunque el inglés POB eligió «greed» en el texto principal, el audit trail reconoce el sentido más fuerte de ἁρπαγή: toma violenta, rapiña, extorsión o robo. En español, «robo» mantiene esa fuerza concreta sin volver la frase excesivamente abstracta.'
- source_word: ἀκρασίας
  english_pob_choice: self-indulgence
  chosen_spanish: desenfreno
  alternatives_spanish:
  - falta de dominio propio
  - incontinencia
  - exceso
  lexicon: BDAG
  rationale: «Desenfreno» comunica la idea de falta de autocontrol y exceso desordenado con buena fluidez española; evita la frialdad técnica de «falta de dominio propio».
theological_decisions:
- issue: Metáfora del interior de los recipientes versus referir explícitamente a las personas
  english_pob_reading: Keep the imagery focused on the cup and dish themselves ('inside they are full') rather than explicitly unpacking the metaphor as the leaders' hearts.
  chosen_spanish_reading: 'Mantener la imagen centrada en el vaso y el plato: «por dentro están llenos».'
  alternative_spanish_readings:
  - por dentro ustedes están llenos
  - por dentro tienen el corazón lleno
  rationale: El griego conserva la metáfora en el nivel de los recipientes y no explicita un sujeto humano en esta cláusula. La traducción española sigue esa decisión para no añadir una interpretación no formulada en el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el último pasaje de revisión: sin cambios respecto del estado más reciente; se mantiene la alta concordancia del cotejo con el texto fuente y el audit trail en inglés.'
  spanish_consistency_notes:
  - Se preserva el contraste espacial afuera/adentro con un lenguaje natural en español.
  - Se evita traducir ἁρπαγή y ἀκρασία de manera suavizada; el texto principal conserva la fuerza moral del reproche.
  - «Vaso» y «plato» se eligieron por claridad y fluidez, sin sobreespecificar el tipo exacto de recipiente.
  - Las notas de pie reflejan alternativas reales reconocidas por el audit trail y no introducen lecturas ajenas al griego.
