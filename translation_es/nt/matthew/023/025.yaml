revisions:
- from: ¡Ay de ustedes[a], escribas y fariseos, hipócritas! Porque limpian lo de afuera[b] del vaso y del plato, pero por dentro están llenos de robo y de desenfreno.
  to: ¡Ay de ustedes[a], escribas y fariseos, hipócritas! Porque limpian la parte exterior[b] del vaso y del plato, pero por dentro están llenos de codicia y de desenfreno[c].
  rationale: Se ajusta ἁρπαγῆς a «codicia» para seguir la decisión principal del POB inglés en este contexto metafórico, y se preservan en nota las alternativas más fuertes («robo/extorsión») junto con «falta de dominio propio» para ἀκρασίας. También se eleva ligeramente el registro de «lo de afuera» a «la parte exterior», manteniendo naturalidad y la oposición exterior/interior del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:18:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego y conserva correctamente la imagen metafórica centrada en el vaso y el plato. Sin embargo, se aparta del audit trail inglés en un punto léxico principal: ἁρπαγῆς fue llevado al texto principal inglés como ''greed'' por su sentido moral metafórico, mientras que el español escogió ''robo'', que endurece y concreta el sentido más de lo documentado para el texto base. Además, faltó trasladar la nota léxica inglesa que preserva las alternativas más fuertes.'
  spanish_quality_summary: El español es claro y legible, con buen registro eclesial moderno. No obstante, 'limpian lo de afuera' suena algo coloquial frente al tono del pasaje; 'la parte exterior' o 'el exterior' resulta más digno y preciso. 'Desenfreno' funciona, pero 'indulgencia propia' sería menos idiomático; 'desenfreno' o 'falta de dominio propio' son aceptables. La revisión propuesta mantiene fluidez y mayor fidelidad al expediente.
  glossary_alignment: 'No hay conflictos con terminología base del proyecto (no aparecen Yahvé, Mesías, esclavo, etc.). Sí hay un desajuste con la decisión léxica auditada para ἁρπαγῆς: conviene alinear el texto principal con ''codicia'' y dejar ''robo/rapiña/extorsión'' en nota, tal como el POB inglés mantuvo el matiz alternativo fuerte.'
  issues:
  - severity: medium
    issue: ἁρπαγῆς traducido como «robo» en el texto principal
    rationale: El audit trail inglés eligió 'greed' como sentido principal en este contexto moral metafórico, reservando 'robbery/extortion' como alternativa en nota. «Robo» desplaza el énfasis hacia un acto concreto y no preserva bien la decisión principal documentada.
  - severity: medium
    issue: Falta una nota que preserve los sentidos alternativos más fuertes de ἁρπαγῆς y ἀκρασίας
    rationale: La nota inglesa documenta que los términos pueden significar 'robo/extorsión' y 'falta de dominio propio'. Dado el cambio semántico en español y para conservar el expediente, esta nota debe trasladarse.
  - severity: low
    issue: «lo de afuera» es algo coloquial para el registro del pasaje
    rationale: Aunque comprensible, suena menos digno que otras opciones naturales en español bíblico contemporáneo. «La parte exterior» mantiene mejor el contraste con «por dentro» sin rigidez excesiva.
  revised_spanish_text: ¡Ay de ustedes[a], escribas y fariseos, hipócritas! Porque limpian la parte exterior[b] del vaso y del plato, pero por dentro están llenos de codicia y de desenfreno[c].
  revised_footnotes:
