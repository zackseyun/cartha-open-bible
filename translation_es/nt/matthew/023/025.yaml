base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/025.yaml
  text: Woe to you[a], scribes and Pharisees, hypocrites! For you clean the outside of the cup and the dish, but inside they are full of greed and self-indulgence.
  footnotes:
