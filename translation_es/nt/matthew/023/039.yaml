translation:
  language: es
  text: 'Porque les digo: desde ahora ciertamente no me verán[a] hasta que digan[b]: «Bendito el que viene en el nombre del Señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de ninguna manera me verán desde ahora hasta que digan». El griego usa una negación enfática (οὐ μή).'
    reason: lexical_alternative
  - marker: b
    text: Cita o alusión a Salmo 118:26.
    reason: cross_reference
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: For I tell you
  chosen_spanish: Porque os digo
  alternatives_spanish:
  - Porque les digo
  - Pues os digo
  - Porque les aseguro
  lexicon: BDAG
  rationale: λέγω con dativo de segunda persona funciona como fórmula directa de discurso. «Porque» conserva la fuerza explicativa de γάρ. Se prefiere «os digo» por la cercanía estilística con el original y por mantener la dirección personal del enunciado; «les digo» sería más neutro, pero menos acorde con la segunda persona plural explícita.
- source_word: οὐ μή με ἴδητε
  english_pob_choice: you will certainly not see me
  chosen_spanish: no me veréis ciertamente
  alternatives_spanish:
  - no me veréis de ninguna manera
  - nunca me veréis
  - no me llegaréis a ver
  lexicon: BDAG
  rationale: οὐ μή con subjuntivo aoristo expresa negación enfática. «Ciertamente» comunica esa fuerza sin volver la frase artificiosa. «Veréis» mantiene el valor simple de ἴδητε como «ver», y el orden «no me veréis» es natural en español.
- source_word: ἀπ’ ἄρτι
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de ahora en adelante
  - desde este momento
  - ahora en adelante
  lexicon: BDAG
  rationale: ἀπ’ ἄρτι señala el comienzo temporal desde el presente. «Desde ahora» es conciso, claro y plenamente equivalente en español contemporáneo.
- source_word: ἕως ἂν εἴπητε
  english_pob_choice: until you say
  chosen_spanish: hasta que digáis
  alternatives_spanish:
  - hasta que digan
  - hasta que ustedes digan
  - hasta que ustedes digáis
  lexicon: BDAG
  rationale: ἕως ἄν con subjuntivo marca un límite futuro contingente. «Hasta que digáis» conserva la segunda persona plural y la dependencia temporal del original. Se evita una construcción más explicativa para no añadir matices no presentes en el texto.
- source_word: Εὐλογημένος
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Bienaventurado
  - Bendecido
  - Alabado
  lexicon: BDAG
  rationale: En la cita de Salmo 118:26, εὐλογημένος funciona como fórmula bíblica de proclamación. «Bendito» conserva el eco escritural y encaja con el registro de la cita. «Bienaventurado» sería posible, pero suena más interpretativo y menos directo aquí.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: he who comes
  chosen_spanish: el que viene
  alternatives_spanish:
  - el que viene en camino
  - el que ha de venir
  - el que viene
  lexicon: BDAG
  rationale: El participio articular se rinde de forma natural como «el que viene». «He who comes» del audit trail en inglés justifica una forma personal; en español, «el que viene» mantiene la misma referencia y fluidez sin introducir una lectura más titulada que la exigida por la frase.
- source_word: ἐν ὀνόματι κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - en nombre del Señor
  - en el nombre de Yahvé
  - en nombre de Dios
  lexicon: BDAG
  rationale: La cita reproduce el giro bíblico estable «en el nombre de…». Aquí κύριος se traduce «Señor» porque la frase cita Salmo 118:26 en forma convencional y la expresión española litúrgica resulta más reconocible en una cita directa. No se usa «Yahvé» en el cuerpo por tratarse de una fórmula de cita tradicional ya fijada en español, aunque el trasfondo remite al nombre divino.
theological_decisions:
- issue: Alcance de la promesa negativa y momento de la futura confesión
  english_pob_reading: A solemn declaration of judicial absence until a future acknowledgment expressed in the quoted blessing, without specifying the exact historical or eschatological moment beyond the text.
  chosen_spanish_reading: Una declaración solemne de ausencia hasta una futura confesión expresada en la bendición citada, sin fijar en el texto el momento histórico o escatológico exacto.
  alternative_spanish_readings:
  - Referencia específica a la entrada triunfal
  - Referencia específica a la segunda venida
  - Referencia a un arrepentimiento futuro de Israel
  rationale: El griego afirma que no lo verán desde ahora hasta que digan la cita, pero no identifica explícitamente qué evento o cronología debe encajar con esa condición. La redacción española conserva esa tensión interpretativa en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica sin imponer una armonización interpretativa.
translation_notes:
  revision_awareness: La versión española toma en cuenta la revisión más reciente del POB inglés, que prefirió una formulación más tradicional para ὁ ἐρχόμενος («he who comes») sin abandonar la fuerza enfática de οὐ μή. Por eso el español conserva una formulación bíblica natural («el que viene») y mantiene «ciertamente» para reflejar la negación enfática.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparece el nombre divino explícito; aquí, por tratarse de la cita bíblica fija «el nombre del Señor», se mantiene «Señor» para conservar el eco escritural del Salmo 118:26.
  - Se conserva la segunda persona plural («os digo», «digáis») por corresponder al ὑμῖν / εἴπητε del original.
  - «Bendito» mantiene el registro de fórmula litúrgico-bíblica sin añadir interpretación.
  - La nota textual sobre οὐ μή explica la fuerza enfática sin sobretraducirla en el cuerpo principal.
