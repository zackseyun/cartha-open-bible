revisions:
- from: 'Porque os digo[a], desde ahora no me veréis ciertamente hasta que digáis[b]: «Bendito el que viene en el nombre del Señor».'
  to: 'Porque les digo: desde ahora ciertamente no me verán[a] hasta que digan[b]: «Bendito el que viene en el nombre del Señor».'
  rationale: Se cambia a un registro más neutral («les… verán… digan») y se rehace la negación enfática como «ciertamente no me verán», que suena natural en español y conserva mejor la fuerza de οὐ μή. También se mueve la nota léxica al segmento que realmente comenta la negación enfática.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:23:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: conserva γάρ con «Porque», ἀπ’ ἄρτι con «desde ahora», el límite futuro de ἕως ἂν εἴπητε con «hasta que digáis», y la cita de Salmo 118:26. También mantiene la tensión teológica sin sobredeterminar el momento del cumplimiento. Sin embargo, la representación de οὐ μή como «no me veréis ciertamente» suena poco natural en español y no transmite de la mejor manera la negación enfática; además, la nota a [a] está anclada en «digo» cuando en realidad comenta la cláusula de negación completa.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero mezcla un registro peninsular («os», «veréis», «digáis») con una meta declarada de español neutral latinoamericano. La principal reparación necesaria es estilística y semántica menor: «no me veréis ciertamente» resulta forzado. Una formulación como «ciertamente no me verán» mejora la naturalidad y conserva la fuerza enfática. Conviene además alinear toda la frase con «ustedes» para neutralidad amplia.'
  glossary_alignment: La cita usa «Señor» para κύριος. Dado que aquí se trata de una cita de Salmo 118:26 transmitida en griego como κύριος, «Señor» es defendible en el cuerpo del texto; no hace falta forzar «Yahvé» en esta línea, aunque el trasfondo del salmo remita al nombre divino. «Bendito» para Εὐλογημένος y «el que viene» para ὁ ἐρχόμενος están bien. No hay conflictos con otros términos del glosario.
  issues:
  - severity: medium
    issue: «no me veréis ciertamente» es español poco natural para οὐ μή
    rationale: La negación enfática griega se expresa mejor en español con un adverbio que modifique la negación o con una perífrasis enfática, p. ej. «ciertamente no me verán» o «de ninguna manera me verán». El orden actual suena calcado.
  - severity: medium
    issue: 'Registro pronominal no neutral: «os / veréis / digáis»'
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. El voseo peninsular de segunda persona plural no es el registro más amplio; «les digo / verán / digan» o «les aseguro / ustedes» sería más neutral.
  - severity: low
    issue: La nota [a] está anclada en «digo» pero explica la negación enfática
    rationale: La nota debe marcar la palabra o frase relevante. El contenido de la nota comenta la cláusula «ciertamente no me verán…», no «les digo».
  revised_spanish_text: 'Porque les digo: desde ahora ciertamente no me verán[a] hasta que digan[b]: «Bendito el que viene en el nombre del Señor».'
  revised_footnotes:
  - marker: a
    text: 'O: «de ninguna manera me verán desde ahora hasta que digan». El griego usa una negación enfática (οὐ μή).'
    reason: lexical_alternative
  - marker: b
    text: Cita o alusión a Salmo 118:26.
    reason: cross_reference
  revision_rationale: Se cambia a un registro más neutral («les… verán… digan») y se rehace la negación enfática como «ciertamente no me verán», que suena natural en español y conserva mejor la fuerza de οὐ μή. También se mueve la nota léxica al segmento que realmente comenta la negación enfática.
