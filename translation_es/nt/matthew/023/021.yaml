translation:
  language: es
  text: Y el que jura por el templo, jura por él y por el que habita en él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el templo ... en él»; la preposición griega es literalmente «en», pero en esta fórmula de juramento tiene el sentido de «por».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὀμόσας
  english_pob_choice: whoever swears
  chosen_spanish: el que jura
  alternatives_spanish:
  - quien jura
  - el que presta juramento
  lexicon: BDAG
  rationale: El participio articular en griego funciona de manera sustantiva y general. «El que jura» conserva ese valor genérico de cualquier persona y suena natural en español sin perder el tono proverbial.
- source_word: ἐν τῷ ναῷ
  english_pob_choice: by the temple
  chosen_spanish: por el templo
  alternatives_spanish:
  - en el templo
  lexicon: BDAG
  rationale: Aunque ἐν normalmente significa «en», en esta fórmula de juramento expresa el objeto invocado, es decir, el sentido pragmático de «por». «Por el templo» mantiene la fuerza del juramento sin ocultar el matiz idiomático.
- source_word: ναῷ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: «Templo» es la equivalencia más clara y natural en este contexto. «Santuario» sería posible, pero aquí el discurso se refiere al templo de Jerusalén y la expresión tradicional es más transparente.
- source_word: ὀμνύει
  english_pob_choice: swears
  chosen_spanish: jura
  alternatives_spanish:
  - está jurando
  - presta juramento
  lexicon: BDAG
  rationale: El presente indicativo expresa una regla general. «Jura» es breve, idiomático y conserva el valor jurídico/proverbial del verbo sin añadir perífrasis innecesarias.
- source_word: ἐν αὐτῷ
  english_pob_choice: by it
  chosen_spanish: por él
  alternatives_spanish:
  - en él
  lexicon: BDAG
  rationale: La misma preposición ἐν en esta fórmula de juramento continúa el valor pragmático de invocación. En español, «por él» reproduce mejor ese sentido que «en él».
- source_word: τῷ κατοικοῦντι αὐτόν
  english_pob_choice: the One dwelling in it
  chosen_spanish: el que habita en él
  alternatives_spanish:
  - el que mora en él
  - el que reside en él
  lexicon: BDAG
  rationale: El participio sustantivado κατοικοῦντι se refiere al que habita en el templo. «Habita» mantiene el valor durativo del participio y es más natural que una traducción demasiado literaria. No se capitaliza para no introducir una convención ajena al español bíblico; el referente divino se desprende del contexto.
- source_word: αὐτόν
  english_pob_choice: it
  chosen_spanish: él
  alternatives_spanish:
  - ello
  - lo
  lexicon: BDAG
  rationale: Aunque el antecedente griego es ναός (masculino), en español la referencia personal del participio favorece «él». Aquí el antecedente implícito es el templo como lugar habitado, pero la frase final en español funciona mejor como «el que habita en él».
theological_decisions:
- issue: Identidad del que habita en el templo
  english_pob_reading: the One dwelling in it refers to God
  chosen_spanish_reading: el que habita en él se entiende como Dios
  alternative_spanish_readings:
  - el que habita en él, sin explicitar el referente
  - el que mora en él
  rationale: El contexto inmediato muestra que Jesús vincula el juramento con Dios cuya presencia santifica el templo. En el texto principal se mantiene la formulación sobria, y la referencia a Dios se deja implícita pero reconocible, sin añadir una aclaración interpretativa al cuerpo del versículo.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: 'El texto base en inglés ya reflejaba la lectura de ἐν con valor idiomático de juramento y entendía al habitante del templo como referencia divina. La versión española conserva esa decisión semántica, pero opta por una formulación más natural y directa: «por el templo ... por él».'
  spanish_consistency_notes:
  - Se mantiene «templo» y no «santuario» por coherencia con el contexto de juramentos en Mateo 23.
  - Se preserva el paralelismo «por el templo ... por él» para reflejar la estructura repetida del griego.
  - La referencia al habitante del templo queda intencionalmente sobria, sin desarrollar una explicación doctrinal en el texto principal.
