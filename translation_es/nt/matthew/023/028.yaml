translation:
  language: es
  text: De la misma manera, ustedes también por fuera parecen justos a la gente[a], pero por dentro están llenos de hipocresía y de desprecio por la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a los hombres'. El griego ἀνθρώποις es aquí un término genérico para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: In the same way
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Así
  - Igualmente
  lexicon: BDAG
  rationale: Conserva la conexión comparativa con la imagen anterior y suena natural en español; evita un calco rígido de 'así' cuando la relación discursiva requiere explícitamente la comparación.
- source_word: ἔξωθεν
  english_pob_choice: outwardly
  chosen_spanish: por fuera
  alternatives_spanish:
  - externamente
  - en el exterior
  lexicon: BDAG
  rationale: Mantiene el contraste adverbial con ἔσωθεν y resulta idiomático en español contemporáneo.
- source_word: φαίνεσθε
  english_pob_choice: appear
  chosen_spanish: parecen
  alternatives_spanish:
  - aparecen
  - se muestran
  - parecen ser vistos
  lexicon: BDAG
  rationale: '''Parecen'' expresa bien la percepción externa sin afirmar que la justicia sea real; conserva el matiz de apariencia que el contexto exige.'
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: to people
  chosen_spanish: a la gente
  alternatives_spanish:
  - a las personas
  - a los hombres
  - a los seres humanos
  lexicon: BDAG
  rationale: Traduce el dativo de referencia con un español natural y genérico, sin imponer un masculino innecesario.
- source_word: δίκαιοι
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - justos en apariencia
  - piadosos
  lexicon: BDAG
  rationale: '''Justos'' conserva el valor ético-religioso de δίκαιοι. En este contexto se entiende como justicia aparente ante los demás, no como justicia verdadera ante Dios.'
- source_word: ἔσωθεν
  english_pob_choice: inwardly
  chosen_spanish: por dentro
  alternatives_spanish:
  - internamente
  - en el interior
  lexicon: BDAG
  rationale: Equilibra 'por fuera' y preserva el contraste espacial/metafórico entre exterior e interior.
- source_word: μεστοὶ
  english_pob_choice: full of
  chosen_spanish: llenos de
  alternatives_spanish:
  - colmados de
  - rebosantes de
  lexicon: BDAG
  rationale: '''Llenos de'' es la equivalencia directa y natural para el adjetivo de plenitud.'
- source_word: ὑποκρίσεως
  english_pob_choice: hypocrisy
  chosen_spanish: hipocresía
  alternatives_spanish:
  - simulación
  - doblez
  - pretexto
  lexicon: BDAG
  rationale: Es el equivalente más establecido y exacto para el pecado de apariencia religiosa falsa denunciado por Jesús.
- source_word: ἀνομίας
  english_pob_choice: lawlessness
  chosen_spanish: anarquía
  alternatives_spanish:
  - ilegalidad
  - desobediencia a la ley
  - iniquidad
  lexicon: BDAG
  rationale: Se eligió 'anarquía' para acercarse al sentido de falta de ley/orden normativo; sin embargo, esta opción es menos natural y puede sonar sociopolítica. Conviene evaluar si en una revisión posterior se prefiere una expresión más claramente bíblica como 'falta de ley' o 'iniquidad'.
theological_decisions:
- issue: 'Valor de δίκαιοι: justicia auténtica o solo apariencia humana'
  english_pob_reading: merely apparent righteousness in human perception
  chosen_spanish_reading: justicia solo aparente ante la gente
  alternative_spanish_readings:
  - justicia real
  - rectitud auténtica
  rationale: El verbo 'parecen' y la oposición con 'por dentro están llenos' obligan a leer la justicia como apariencia externa, no como estado moral verdadero. La traducción conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Mantener la distinción entre apariencia pública y realidad interior conforme al contexto inmediato del dicho de Jesús.
- issue: Sentido de ἀνομίας
  english_pob_reading: lawlessness
  chosen_spanish_reading: anarquía / falta de ley
  alternative_spanish_readings:
  - iniquidad
  - ilegalidad
  - rebeldía contra la ley
  rationale: ἀνομία no es simplemente maldad genérica; remite a ausencia o rechazo de la ley de Dios. 'Anarquía' intenta retener la idea de falta de ley, aunque en español común puede requerir glosa o sustitución por una formulación más clara.
  doctrine_reference: Preservar el peso legal-covenantal del término sin diluirlo en una noción moral demasiado vaga.
translation_notes:
  revision_awareness: Sin cambios respecto al estado más reciente del test griego/inglés; el verso mantiene el contraste entre apariencia externa y realidad interna, con especial atención al valor de ἀνομίας como 'falta de ley'.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando fórmulas eclesiásticas arcaizantes.
  - '''Por fuera / por dentro'' preserva la antítesis del griego ἔξωθεν / ἔσωθεν.'
  - Se prefirió 'justos' para δίκαιοι porque en contexto describe una percepción externa, no una aprobación divina.
  - El único punto potencialmente revisable es 'anarquía' para ἀνομίας; se documentó como opción de fuerza lexical, aunque podría requerir ajuste por naturalidad estilística en una futura revisión.
