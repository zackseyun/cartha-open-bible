  text: οὕτως καὶ ὑμεῖς ἔξωθεν μὲν φαίνεσθε τοῖς ἀνθρώποις δίκαιοι, ἔσωθεν δέ ⸂ἐστε μεστοὶ⸃ ὑποκρίσεως καὶ ἀνομίας.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/028.yaml
  text: In the same way[a], you also outwardly appear righteous to people, but inwardly you are full of hypocrisy and lawlessness.
