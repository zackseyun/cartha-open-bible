revisions:
- from: De la misma manera[a], ustedes también por fuera parecen justos a la gente, pero por dentro están llenos de hipocresía y de anarquía.
  to: De la misma manera, ustedes también por fuera parecen justos a la gente[a], pero por dentro están llenos de hipocresía y de desprecio por la ley.
  rationale: Se mantiene la redacción general porque refleja bien el contraste del original y la decisión teológica sobre justicia aparente. Se elimina la nota en 'De la misma manera' porque no existe apoyo auditado para una alternativa preservada allí. Se conserva la nota léxica en 'a la gente'. El cambio esencial es sustituir 'anarquía' por 'desprecio por la ley', que comunica de forma más fiel y natural la fuerza de ἀνομία/'lawlessness' en este contexto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:18:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura contrastiva del griego: οὕτως καὶ ὑμεῖς = ''De la misma manera, ustedes también''; ἔξωθεν/ἔσωθεν = ''por fuera/por dentro''; φαίνεσθε conserva la idea de apariencia; δίκαιοι se entiende correctamente como justicia aparente ante observadores humanos; μεστοὶ ὑποκρίσεως se vierte fielmente como ''llenos de hipocresía''. El problema principal es ἀνομίας: ''anarquía'' no preserva bien el sentido bíblico de desprecio por la ley y suena sociopolítico en español.'
  spanish_quality_summary: El español es claro y natural en general. 'De la misma manera', 'por fuera', 'a la gente' y 'por dentro' son legibles y dignos. Sin embargo, 'anarquía' introduce una resonancia moderna impropia del contexto y debilita la inteligibilidad eclesial. Una formulación como 'maldad' sería demasiado genérica; 'iniquidad' es más bíblica pero no conserva tan claramente la fuerza de ἀνομία como 'desprecio por la ley'.
  glossary_alignment: No hay conflicto con los términos globales principales del proyecto. La decisión clave pendiente es alinear ἀνομία con el razonamiento léxico auditado en inglés ('lawlessness'). En español, 'desprecio por la ley' preserva mejor esa fuerza que 'anarquía'.
  issues:
  - severity: high
    issue: '''anarquía'' para ἀνομίας'
    rationale: Aunque etimológicamente sugiere falta de ley, en español actual suele sonar política o socialmente ('anarquismo', desorden civil) y no comunica con claridad la idea moral-religiosa de desprecio por la ley de Dios que el griego y la auditoría inglesa enfatizan.
  - severity: low
    issue: Falta artículo repetido antes del segundo sustantivo abstracto
    rationale: '''llenos de hipocresía y de desprecio por la ley'' suena más equilibrado que omitir la segunda preposición/artículo en esta construcción, aunque ambas opciones serían comprensibles.'
  revised_spanish_text: De la misma manera, ustedes también por fuera parecen justos a la gente[a], pero por dentro están llenos de hipocresía y de desprecio por la ley.
  revised_footnotes:
  - marker: a
    text: O 'a los hombres'. El griego ἀνθρώποις es aquí un término genérico para los seres humanos.
    reason: lexical_alternative
  revision_rationale: Se mantiene la redacción general porque refleja bien el contraste del original y la decisión teológica sobre justicia aparente. Se elimina la nota en 'De la misma manera' porque no existe apoyo auditado para una alternativa preservada allí. Se conserva la nota léxica en 'a la gente'. El cambio esencial es sustituir 'anarquía' por 'desprecio por la ley', que comunica de forma más fiel y natural la fuerza de ἀνομία/'lawlessness' en este contexto.
