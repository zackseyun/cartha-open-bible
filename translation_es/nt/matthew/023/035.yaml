revisions:
- from: para que toda sangre justa derramada sobre la tierra[a] venga sobre ustedes, desde la sangre del justo Abel hasta la sangre de Zacarías, hijo de Berequías[b], a quien mataron entre el santuario y el altar.
  to: para que toda la sangre justa derramada sobre la tierra[a] venga sobre ustedes, desde la sangre del justo Abel hasta la sangre de Zacarías, hijo de Berequías[b], a quien asesinaron entre el santuario y el altar.
  rationale: Se ajusta «mataron» a «asesinaron» para reflejar mejor la fuerza de φονεύω y la decisión léxica del POB inglés. Se cambia «toda sangre justa» por «toda la sangre justa» para mejorar la naturalidad sin perder el singular colectivo del griego. Se corrige la nota [a] para que la alternativa recaiga en el sentido de γῆ («tierra»/«país»), que es el punto léxico documentado.
  reviewer_model: gpt-5.4
