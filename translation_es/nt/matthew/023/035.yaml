translation:
  language: es
  text: para que toda la sangre justa derramada sobre la tierra[a] venga sobre ustedes, desde la sangre del justo Abel hasta la sangre de Zacarías, hijo de Berequías[b], a quien asesinaron entre el santuario y el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el país». La palabra griega puede significar «tierra» o «país».
    reason: lexical_alternative
  - marker: b
    text: La identidad de «Zacarías, hijo de Berequías» es debatida. Algunos lo relacionan con el profeta Zacarías; otros, con Zacarías hijo de Joiada (2 Cr 24:20–22). La traducción sigue el griego tal como está escrito.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ὅπως introduce una finalidad o resultado. «Para que» es natural en español y conserva el valor telico sin endurecer la sintaxis.
- source_word: ἔλθῃ ἐφ’ ὑμᾶς
  english_pob_choice: may come upon you
  chosen_spanish: venga sobre ustedes
  alternatives_spanish:
  - pueda venir sobre ustedes
  - caiga sobre ustedes
  lexicon: BDAG
  rationale: El subjuntivo con ὅπως se refleja con «venga». «Sobre ustedes» mantiene el matiz de ἐπί con acusativo y el sentido judicial de cargar culpa sobre los oyentes.
- source_word: πᾶν αἷμα δίκαιον
  english_pob_choice: all the righteous blood
  chosen_spanish: toda sangre justa
  alternatives_spanish:
  - toda la sangre de los justos
  - toda sangre de justos
  lexicon: BDAG
  rationale: Se conserva el singular colectivo de αἷμα y el uso adjetival de δίκαιος. «Sangre justa» suena algo más compacto que una expansión explicativa, y mantiene la fuerza metonímica del griego.
- source_word: ἐκχυννόμενον
  english_pob_choice: poured out
  chosen_spanish: derramada
  alternatives_spanish:
  - vertida
  - derramándose
  lexicon: BDAG
  rationale: El participio pasivo expresa sangre ya derramada. «Derramada» es idiomático en español bíblico y conserva la imagen de sangre derramada sin perder el valor pasivo/resultativo.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el mundo
  lexicon: BDAG
  rationale: γῆ puede significar «tierra» o «tierra/país» según contexto. Aquí se mantiene la amplitud de la referencia con «tierra», dejando abierta la posible lectura de «país» sin resolverla en el texto principal.
- source_word: ἀπὸ τοῦ αἵματος Ἅβελ τοῦ δικαίου
  english_pob_choice: from the blood of righteous Abel
  chosen_spanish: desde la sangre del justo Abel
  alternatives_spanish:
  - desde la sangre de Abel el justo
  - desde la sangre del Abel justo
  lexicon: BDAG
  rationale: «Desde» reproduce el rango temporal/origen de ἀπό...ἕως. «El justo Abel» sigue la construcción atributiva del griego y resulta natural en español.
- source_word: ἕως τοῦ αἵματος Ζαχαρίου υἱοῦ Βαραχίου
  english_pob_choice: to the blood of Zechariah son of Berechiah
  chosen_spanish: hasta la sangre de Zacarías, hijo de Berequías
  alternatives_spanish:
  - hasta la sangre de Zacarías, hijo de Barquías
  - hasta la sangre de Zacarías, hijo de Berequías
  lexicon: BDAG
  rationale: «Hasta» reproduce la extensión del rango ἀπό...ἕως. «Berequías» es la transliteración española convencional de Βαραχίας; se conserva la forma del texto griego sin armonizar el nombre.
- source_word: ὃν ἐφονεύσατε
  english_pob_choice: whom you murdered
  chosen_spanish: a quien mataron
  alternatives_spanish:
  - a quien asesinaron
  - a quien ustedes mataron
  lexicon: BDAG
  rationale: φονεύω puede llevar una carga de homicidio/muerte violenta, pero en español «matar» es la forma más directa y menos interpretativa; el contexto acusatorio ya transmite la gravedad. Se evita una intensificación no obligada.
- source_word: μεταξὺ τοῦ ναοῦ καὶ τοῦ θυσιαστηρίου
  english_pob_choice: between the sanctuary and the altar
  chosen_spanish: entre el santuario y el altar
  alternatives_spanish:
  - entre el templo y el altar
  - entre el recinto sagrado y el altar
  lexicon: BDAG
  rationale: ναός designa el santuario o templo en sentido estricto, no el complejo entero. «Santuario» preserva esa precisión; θυσιαστήριον se traduce naturalmente como «altar».
theological_decisions:
- issue: Identidad de Zacarías, hijo de Berequías
  english_pob_reading: Retain the text as written without harmonizing or emending the name.
  chosen_spanish_reading: Se conserva el nombre tal como está en el griego, sin armonizar ni corregir en el texto principal.
  alternative_spanish_readings:
  - Identificarlo con el profeta Zacarías hijo de Berequías
  - Identificarlo con Zacarías hijo de Joiada y tratar «hijo de Berequías» como dificultad textual o tradicional
  rationale: La traducción debe reflejar el texto griego recibido. Como la identificación histórica es debatida, se preserva la tensión en nota en vez de resolverla silenciosamente en la línea principal.
  doctrine_reference: Principio de primacía del idioma original; preservar tensión histórica/textual sin armonización interpretativa.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se mantuvo la cláusula final en forma idiomática y se reflejó el participio de ἐκχυννόμενον con un participio/adjetivo resultativo («derramada») en lugar de una perífrasis más pesada. También se respetó la decisión auditada de no armonizar el nombre de Zacarías.'
  spanish_consistency_notes:
  - Se mantuvo un español moderno y sobrio, evitando calcos innecesarios.
  - «Santuario» se usa para ναός siguiendo la distinción auditada con el inglés POB.
  - «Tierra» se eligió para γῆ en el texto principal, con nota que preserva la alternativa «país».
  - Se mantuvo la estructura de rango «desde... hasta...» para ἀπό...ἕως.
  - La acusación final usa «mataron» por fidelidad y naturalidad; la nota de decisiones explica la relación con la carga moral de φονεύω.
