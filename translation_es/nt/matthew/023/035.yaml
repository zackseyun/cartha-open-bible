review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: conserva la finalidad de ὅπως, el alcance judicial de «venga sobre ustedes», el rango «desde... hasta», la precisión de ναός como «santuario» y la nota sobre la identidad debatida de Zacarías hijo de Berequías. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: (1) πᾶν αἷμα δίκαιον se vierte mejor como «toda la sangre justa» o equivalente; «toda sangre justa» suena algo truncado en español. (2) ἐφονεύσατε tiene carga de homicidio/asesinato, y dado que el POB inglés eligió «murdered», «mataron» debilita innecesariamente la acusación moral del original.'
  spanish_quality_summary: El texto es claro y legible, con buen registro bíblico contemporáneo. No obstante, «toda sangre justa» resulta menos idiomático que «toda la sangre justa», y la nota [a] introduce «en la tierra» como alternativa a «sobre la tierra», cuando la alternativa documentada realmente corresponde al sentido de γῆ como «tierra» o «país», no tanto a la preposición. También conviene mantener una formulación más fuerte en «asesinaron».
  glossary_alignment: No hay términos del glosario principal en conflicto directo. Se respetan «Jesús»/«Mesías»/«Yahvé» por irrelevancia contextual. La decisión «santuario» para ναός está bien alineada con la racionalidad léxica documentada. La principal desalineación es con la decisión auditada para φονεύω, que en inglés se reforzó como «murdered» y en español debe preservarse como «asesinaron».
  issues:
  - severity: medium
    issue: «a quien mataron» debilita ὃν ἐφονεύσατε
    rationale: φονεύω denota matar criminalmente/asesinar. El POB inglés documentó y adoptó «murdered» por su carga moral. «Mataron» es comprensible, pero rebaja el matiz acusatorio del original.
  - severity: low
    issue: «toda sangre justa» suena poco natural en español
    rationale: Aunque refleja el singular colectivo, en español bíblico y general «toda la sangre justa» fluye mejor y preserva el sentido metonímico sin aspereza innecesaria.
  - severity: low
    issue: La nota [a] desplaza la alternativa léxica de γῆ hacia la preposición
    rationale: La alternativa auditada es «earth/land». En español conviene notar «tierra» o «país», no «sobre/en la tierra», porque el contraste principal no está en ἐπί sino en γῆ.
  revised_spanish_text: para que toda la sangre justa derramada sobre la tierra[a] venga sobre ustedes, desde la sangre del justo Abel hasta la sangre de Zacarías, hijo de Berequías[b], a quien asesinaron entre el santuario y el altar.
  revised_footnotes:
