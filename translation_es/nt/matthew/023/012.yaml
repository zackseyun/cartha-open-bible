translation:
  language: es
  text: Pero quien se exalta será humillado[b][a], y quien se humilla será exaltado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa pronombres reflexivos masculinos singulares en una afirmación general, con valor representativo para cualquier persona.
    reason: cultural_note
  - marker: b
    text: 'O: «será rebajado» ... «será levantado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: whoever
  chosen_spanish: quien
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: El griego introduce una afirmación general de valor proverbial. En español, «quien» suena natural y mantiene el valor indefinido sin añadir énfasis innecesario.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca una ligera transición/contraste desde el contexto previo; «Pero» refleja bien ese giro en español.
- source_word: ὑψώσει
  english_pob_choice: exalts
  chosen_spanish: se enaltece
  alternatives_spanish:
  - se exalta
  - se eleva
  - se engrandece
  lexicon: BDAG
  rationale: El verbo en contexto expresa autoexaltación honorable o de estatus. «Se enaltece» preserva la idea de elevarse a sí mismo sin sonar tan mecánico como «exalta» en español reflexivo.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - a sí mismo/a
  - a sí mismo
  lexicon: BDAG
  rationale: El griego usa un pronombre reflexivo masculino singular de manera representativa. En español, «a sí mismo» conserva el sentido reflexivo general sin perder la fuerza del original.
- source_word: ταπεινωθήσεται
  english_pob_choice: will be humbled
  chosen_spanish: será humillado
  alternatives_spanish:
  - será abatido
  - será rebajado
  - será humillado
  lexicon: BDAG
  rationale: El pasivo futuro conserva la voz pasiva sin nombrar agente. «Será humillado» es la equivalencia más directa y natural para preservar la reversión de honor y vergüenza.
- source_word: ταπεινώσει
  english_pob_choice: humbles
  chosen_spanish: se humilla
  alternatives_spanish:
  - se abaja
  - se rebaja
  - se humilla
  lexicon: BDAG
  rationale: La forma activa con valor reflexivo expresa auto-humillación. «Se humilla» conserva la reciprocidad verbal y la simetría con el primer miembro.
- source_word: ὑψωθήσεται
  english_pob_choice: will be exalted
  chosen_spanish: será enaltecido
  alternatives_spanish:
  - será exaltado
  - será levantado
  - será enaltecido
  lexicon: BDAG
  rationale: El pasivo futuro mantiene la agencia implícita. «Será enaltecido» responde al verbo del primer hemistiquio con un paralelismo claro en español, sin forzar una agencia explícita.
theological_decisions:
- issue: Agencia implícita en los pasivos
  english_pob_reading: Retain passive forms without naming the agent
  chosen_spanish_reading: Conservar los pasivos sin nombrar al agente
  alternative_spanish_readings:
  - Dios lo humillará y Dios lo enaltecerá
  - será levantado por Dios
  rationale: El griego no nombra al agente de los pasivos. Mantener «será humillado / será enaltecido» respeta la formulación y preserva la agencia divina implícita sin resolverla explícitamente.
  doctrine_reference: Preservar la tensión teológica en vez de explicitarla.
- issue: Valor representativo del singular masculino
  english_pob_reading: Use 'himself' in both clauses
  chosen_spanish_reading: Usar una forma reflexiva general y natural en español
  alternative_spanish_readings:
  - a sí mismos
  - a sí mismo/a
  rationale: El griego es masculino singular pero funciona de manera genérica. En español, «a sí mismo» y «se humilla» mantienen el valor representativo sin introducir una solución pesada o artificiosa.
  doctrine_reference: Precisión gramatical con fuerza representativa.
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y ninguna revisión aplicada; se mantiene el sentido proverbial, la voz pasiva sin agente expreso y el paralelismo léxico entre exaltarse/humillarse.
  spanish_consistency_notes:
  - Se conserva el paralelismo entre los dos miembros de la sentencia.
  - Se usa «enaltecer/enaltecido» para evitar una redacción demasiado dependiente del inglés y mantener un registro bíblico claro.
  - Las notas respetan la tensión sobre la agencia de los pasivos y el masculino genérico representativo.
