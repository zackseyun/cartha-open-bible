translation:
  language: es
  text: Entonces Jesús habló a las multitudes y a sus discípulos,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Adverbio temporal que marca secuencia narrativa. «Entonces» conserva la progresión natural del relato en español sin añadir matiz interpretativo.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - el Jesús
  lexicon: BDAG
  rationale: Nombre propio con artículo en griego narrativo normal; en español se omite el artículo y se conserva el nombre propio «Jesús».
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - se dirigió
  - dijo
  lexicon: BDAG
  rationale: Aoristo de λαλέω con sentido de hablar; «habló» preserva la acción simple sin introducir una formulación demasiado libre.
- source_word: τοῖς ὄχλοις
  english_pob_choice: to the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a las multitudes reunidas
  - a la gente
  lexicon: BDAG
  rationale: El plural dativo pide un plural en español. «Multitudes» refleja bien el valor colectivo y plural de ὄχλοις, y mantiene un registro bíblico sobrio. Aunque «multitudes» es más solemne que «multitudes» no es una calca; aquí funciona como equivalente natural del plural griego.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  lexicon: BDAG
  rationale: La relación posesiva se expresa naturalmente con «sus» en español. «Discípulos» es el equivalente estándar y preciso de μαθηταί en el contexto de los Evangelios.
theological_decisions:
- issue: 'Alcance de «ὄχλοις»: singular colectivo o plural colectivo'
  english_pob_reading: to the crowds
  chosen_spanish_reading: a las multitudes
  alternative_spanish_readings:
  - a la multitud
  - a la gente
  rationale: El griego es plural con artículo, por lo que el español debe conservar la pluralidad. «A las multitudes» evita reducir a un singular colectivo y mantiene el matiz de grupos reunidos. No se añade ninguna interpretación eclesial o moral.
  doctrine_reference: No aplica; decisión de número y referencialidad en el texto narrativo.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hay variantes textuales, ni notas previas, ni revisiones aplicadas que requieran comentario adicional. La redacción española sigue de cerca la estructura del griego y la solución óptima en inglés.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - Se conserva la pluralidad de ὄχλοις mediante «las multitudes».
  - No se añadió puntuación final para respetar el flujo de la unidad breve y la forma abierta del enunciado en español de estilo POB.
