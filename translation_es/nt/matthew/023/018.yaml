revisions:
- from: 'Y[a]: «Quien jure por el altar, nada es[b]; pero quien jure por la ofrenda que está sobre él, está obligado.»'
  to: 'Y: «Quien jure por el altar, no es nada[b]; pero quien jure por la ofrenda[a] que está sobre él, está obligado.»'
  rationale: Se reubica la nota léxica al término que realmente comenta («ofrenda») y se mejora «nada es» a «no es nada» para un español natural y fiel. Se conserva «ofrenda» como mejor opción contextual para δῶρον en el ámbito del templo, manteniendo la alternativa en nota. No se añade objeto a «está obligado», en conformidad con el griego y con la decisión teológica documentada.
