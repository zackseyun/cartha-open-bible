    issue: Marcador de nota [a] mal anclado
    rationale: La nota a explica la alternativa de δῶρον («ofrenda» / «don»), pero el marcador aparece en «Y[a]» en vez de junto a «ofrenda». Esto incumple la disciplina de notas y puede confundir al lector.
  - severity: medium
