translation:
  language: es
  text: 'Y: «Quien jure por el altar, no es nada[b]; pero quien jure por la ofrenda[a] que está sobre él, está obligado.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el don». El griego puede denotar una ofrenda presentada a Dios en el templo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, según la enseñanza que Jesús está condenando, un juramento por el altar «no cuenta», mientras que un juramento por la ofrenda que está sobre él se considera vinculante.
    reason: cultural_note
lexical_decisions:
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - También
  lexicon: BDAG
  rationale: Conserva la continuidad del discurso citado y es la forma más natural y breve para introducir una nueva sentencia en español.
- source_word: Ὃς ἂν ... ὀμόσῃ / ὃς δ’ ἂν ... ὀμόσῃ
  english_pob_choice: Whoever swears ... but whoever swears
  chosen_spanish: Quien jure ... pero quien jure
  alternatives_spanish:
  - Si alguien jura ... pero si alguien jura
  - El que jure ... pero el que jure
  lexicon: BDAG
  rationale: La construcción general indefinida se expresa de modo idiomático con 'quien jure', manteniendo el valor genérico y la alternancia adversativa del griego.
- source_word: ἐν τῷ θυσιαστηρίῳ
  english_pob_choice: by the altar
  chosen_spanish: por el altar
  alternatives_spanish:
  - en el altar
  - ante el altar
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente 'en', en este contexto de juramento funciona idiomáticamente en relación con el altar; 'por el altar' reproduce el valor instrumental del juramento en español.
- source_word: θυσιαστήριον
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  lexicon: BDAG
  rationale: Es el equivalente directo y claro para el altar sacrificial del contexto del templo.
- source_word: οὐδέν ἐστιν
  english_pob_choice: it is nothing
  chosen_spanish: nada es
  alternatives_spanish:
  - no es nada
  - no cuenta
  lexicon: BDAG
  rationale: Mantiene la sequedad y la fuerza evaluativa de la expresión griega, sin añadir explicaciones que no están en el texto.
- source_word: ἐν τῷ δώρῳ
  english_pob_choice: by the gift
  chosen_spanish: por la ofrenda
  alternatives_spanish:
  - en la ofrenda
  - por el don
  lexicon: BDAG
  rationale: En contexto del templo, δῶρον puede referirse a la ofrenda presentada a Dios; 'ofrenda' comunica mejor esa carga cultual en español que 'don'.
- source_word: τῷ ἐπάνω αὐτοῦ
  english_pob_choice: on top of it
  chosen_spanish: que está sobre él
  alternatives_spanish:
  - encima de él
  - sobre él
  lexicon: BDAG
  rationale: Aclara naturalmente que la ofrenda está sobre el altar, preservando la referencia del pronombre sin sonar artificial en español.
- source_word: ὀφείλει
  english_pob_choice: is obligated
  chosen_spanish: está obligado
  alternatives_spanish:
  - debe
  - queda obligado
  lexicon: BDAG
  rationale: Expresa la fuerza de obligación moral/jurídica del verbo sin introducir un objeto explícito que el griego omite.
theological_decisions:
- issue: Alcance de la nulidad del juramento por el altar
  english_pob_reading: 'Render ''οὐδέν ἐστιν'' as a casuistic claim: ''it is nothing,'' i.e., under the teaching being condemned, the oath by the altar counts for nothing.'
  chosen_spanish_reading: '''nada es'' conserva la tesis devaluadora sin explicarla dentro del texto.'
  alternative_spanish_readings:
  - no vale nada
  - no cuenta
  rationale: El griego es deliberadamente breve y tajante; el español debe reflejar esa formulación sin expandirla con una paráfrasis interpretativa en el cuerpo principal.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Obligación implícita en el juramento por la ofrenda
  english_pob_reading: Render ὀφείλει as 'is obligated' without adding an explicit object such as 'to perform it' or 'to keep his oath.'
  chosen_spanish_reading: '''está obligado'' mantiene la omisión del objeto, igual que el griego.'
  alternative_spanish_readings:
  - está obligado a cumplirlo
  - queda vinculado por su juramento
  rationale: La frase griega deja el complemento tácito; el español puede conservar esa misma sobriedad y evitar una interpretación añadida.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente y del audit trail inglés no introdujo cambios; el pasaje quedó confirmado sin ajustes, con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se mantiene 'altar' para θυσιαστήριον y 'ofrenda' como opción contextual de δῶρον, coherente con el uso cultual del pasaje.
  - Se conserva la fuerza breve de 'οὐδέν ἐστιν' y de 'ὀφείλει' sin añadir objetos explícitos en la línea principal.
  - El marcador [a] se usa solo donde la alternativa léxica afecta directamente a 'por el altar'/'por la ofrenda'.
