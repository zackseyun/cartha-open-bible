base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/018.yaml
  text: And[a], ‘Whoever swears by the altar, it is nothing[b]; but whoever swears by the gift on top of it is obligated.’
  footnotes:
  - marker: a
    text: Or 'by the offering.' The Greek word can denote a gift presented to God in the temple.
    reason: lexical_alternative
  - marker: b
    text: That is, according to the teaching Jesus is condemning, an oath by the altar 'counts for nothing,' but an oath by the gift on it is considered binding.
    reason: cultural_note
