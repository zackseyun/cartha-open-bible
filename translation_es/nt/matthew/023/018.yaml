  timestamp: '2026-05-07T20:17:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: continuación con καί, condición general con «quien jure», juramento «por el altar / por la ofrenda», y la obligación implícita de ὀφείλει sin añadir objeto. También conserva correctamente la nota cultural de que Jesús condena esa casuística. Sin embargo, «nada es» para οὐδέν ἐστιν, aunque formalmente cercano, suena poco natural en español y debilita la inteligibilidad del dicho.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Y[a]:» no funciona bien porque la nota a remite a «ofrenda», no a «Y»; el anclaje del marcador es incorrecto. Además, «nada es» es gramaticalmente posible pero antinatural en español corriente; «no es nada» preserva mejor el sentido y la tersura. El resto («por el altar», «la ofrenda que está sobre él», «está obligado») es legible y fiel.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Ofrenda» es una excepción contextual bien justificada frente a «don/regalo» por el entorno cultual; debe mantenerse con nota léxica anclada en «ofrenda».
  issues:
