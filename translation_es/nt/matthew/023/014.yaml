  yaml_path: translation/nt/matthew/023/014.yaml
  text: Woe[a] to you, scribes and Pharisees, hypocrites! For you devour widows' houses, and as a pretext make long prayers; therefore you will receive greater condemnation.
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including 4th-century Sinaiticus and Vaticanus) and early Coptic translations, but is preserved in the Byzantine majority tradition, the Old Latin, the Vulgate, and the Syriac. It was likely added by later scribes to harmonize with similar statements in Mark 12:40 and Luke 20:47. Manuscripts that include it vary on whether it appears before or after verse 13.
    reason: textual_critical
