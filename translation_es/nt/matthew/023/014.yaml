translation:
  language: es
  text: ¡Ay[a] de ustedes, escribas y fariseos, hipócritas! Porque devoran las casas de las viudas, y con pretexto hacen largas oraciones; por eso recibirán mayor condenación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos (incluidos el Sinaítico y el Vaticano, del siglo IV) y en traducciones coptas tempranas, pero se conserva en la tradición bizantina mayoritaria, el latín antiguo, la Vulgata y el siriaco. Probablemente fue añadido por escribas posteriores para armonizarlo con afirmaciones semejantes en Marcos 12:40 y Lucas 20:47. Los manuscritos que lo incluyen varían en si aparece antes o después del versículo 13.
    reason: textual_critical
lexical_decisions:
- source_word: Οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes,
  lexicon: BDAG
  rationale: Expresa en español la interjección de lamento y denuncia profética sin debilitar su fuerza. '¡Ay de ustedes!' mantiene el tono dirigido y judicial del griego.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - letrados
  lexicon: BDAG
  rationale: '''Escribas'' es el equivalente directo y tradicional para el oficio judío referido en el pasaje.'
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Nombre grupal ya asentado en español bíblico; no requiere adaptación adicional.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - farsantes
  - actores fingidos
  lexicon: BDAG
  rationale: Conserva el insulto moral del texto con un término natural y transparente en español.
- source_word: κατεσθίετε
  english_pob_choice: devour
  chosen_spanish: devoran
  alternatives_spanish:
  - consumen
  - se comen
  lexicon: BDAG
  rationale: El verbo conserva la metáfora de consumo voraz y explotación abusiva que el audit trail destaca.
- source_word: τὰς οἰκίας
  english_pob_choice: houses
  chosen_spanish: las casas
  alternatives_spanish:
  - los hogares
  - las propiedades
  lexicon: BDAG
  rationale: '''Casas'' reproduce la expresión concreta del griego y puede abarcar el patrimonio/hogar según contexto; el texto sugiere la ruina de los bienes de las viudas.'
- source_word: προφάσει
  english_pob_choice: as a pretext
  chosen_spanish: con pretexto
  alternatives_spanish:
  - como pretexto
  - con una excusa
  lexicon: BDAG
  rationale: Reproduce la idea de motivo fingido o aparente señalada en el contexto auditado, con español natural y sobrio.
- source_word: μακρὰ προσευχόμενοι
  english_pob_choice: make long prayers
  chosen_spanish: hacen largas oraciones
  alternatives_spanish:
  - oran largamente
  - hacen oraciones largas
  lexicon: BDAG
  rationale: Mantiene la estructura verbal y la observación de una religiosidad extensa en apariencia, sin suavizar la crítica.
- source_word: περισσότερον κρίμα
  english_pob_choice: greater condemnation
  chosen_spanish: mayor condenación
  alternatives_spanish:
  - condena más severa
  - mayor sentencia
  lexicon: BDAG
  rationale: '''Condenación'' traduce el sentido punitivo del κρίμα en este contexto, y ''mayor'' conserva la comparación de grado del original.'
theological_decisions:
- issue: Posible variante textual por ausencia en algunos manuscritos antiguos
  english_pob_reading: This verse is absent from the earliest Greek manuscripts ... but is preserved in the Byzantine majority tradition ... likely added by later scribes to harmonize with similar statements in Mark 12:40 and Luke 20:47.
  chosen_spanish_reading: Se mantiene el versículo en el texto principal con aviso crítico en nota.
  alternative_spanish_readings:
  - Omitir el versículo del cuerpo principal
  - Colocarlo en nota marginal o entre corchetes
  rationale: La tarea pide una redacción del registro español para el texto recibido; el audit trail inglés preserva la advertencia textual, así que la solución adecuada es conservar el versículo y señalar la variante documentalmente.
  doctrine_reference: Crítica textual del Nuevo Testamento; tradición bizantina vs. testimonio manuscrito temprano
translation_notes:
  revision_awareness: El último pase de revisión indicó que no hubo cambios necesarios y el cotejo final reportó alta concordancia (1.0) con veredicto de acuerdo, por lo que no se introducen alteraciones al sentido auditado del versículo.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Condenación'' se usa para κρίμα siguiendo el valor punitivo indicado por el audit trail en este contexto.'
  - La metáfora de 'devoran' se mantiene para no perder la acusación de explotación voraz sobre las viudas.
