translation:
  language: es
  text: ¡Ay de ustedes, escribas y fariseos, hipócritas, porque edifican las tumbas de los profetas y adornan los monumentos[a] de los justos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «memoriales». El término griego puede referirse a monumentos o a memoriales funerarios; aquí se traduce «monumentos» para distinguirlo de «tumbas» al comienzo del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  - ¡Ay de vosotros!
  lexicon: BDAG
  rationale: '''¡Ay!'' reproduce la exclamación profética de denuncia o lamento. Se añade ''de ustedes'' para conservar el destinatario explícito del griego ὑμῖν y del inglés POB ''to you''.'
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - maestros de la ley
  lexicon: BDAG
  rationale: '''Escribas'' es el equivalente estable y directo de γραμματεῖς, más fiel que una glosa interpretativa.'
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Se translitera el nombre del grupo en español como 'fariseos', conforme al uso bíblico estándar y al principio del proyecto de conservar nombres/grupos propios.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - pretendientes
  - fingidos
  lexicon: BDAG
  rationale: En este contexto polémico, 'hipócritas' conserva la fuerza moral y religiosa del término mejor que una paráfrasis más débil.
- source_word: οἰκοδομεῖτε
  english_pob_choice: you build
  chosen_spanish: edifican
  alternatives_spanish:
  - construyen
  - levantan
  lexicon: BDAG
  rationale: '''Edifican'' mantiene el sentido de construir/levantar y funciona bien con ''tumbas'' en español bíblico sin sonar demasiado técnico.'
- source_word: τάφους
  english_pob_choice: tombs
  chosen_spanish: las tumbas
  alternatives_spanish:
  - los sepulcros
  - las sepulturas
  lexicon: BDAG
  rationale: '''Tumbas'' comunica con claridad el sitio funerario construido y evita una lectura demasiado solemne o arcaica.'
- source_word: προφητῶν
  english_pob_choice: of the prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - de los profetas
  lexicon: BDAG
  rationale: Genitivo posesivo/relacional simple; la traducción directa es la más fiel.
- source_word: κοσμεῖτε
  english_pob_choice: decorate
  chosen_spanish: adornan
  alternatives_spanish:
  - decoran
  - embellecen
  lexicon: BDAG
  rationale: '''Adornan'' conserva la idea de embellecer/ornamentar y evita la posible trivialidad de ''decoran'' en español contemporáneo.'
- source_word: μνημεῖα
  english_pob_choice: monuments
  chosen_spanish: monumentos
  alternatives_spanish:
  - memoriales
  - sepulcros
  lexicon: BDAG
  rationale: Se mantiene la distinción con τάφους mediante 'monumentos', como hizo el POB inglés con 'monuments', para preservar la tensión lexical del pasaje.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los rectos de corazón
  lexicon: BDAG
  rationale: '''Los justos'' conserva la categoría moral-teológica del adjetivo sustantivado y permite la correspondencia tradicional con el lenguaje bíblico español.'
theological_decisions:
- issue: Cómo renderizar μνημεῖα sin borrar la distinción con τάφους
  english_pob_reading: monuments
  chosen_spanish_reading: monumentos
  alternative_spanish_readings:
  - memoriales
  - sepulcros
  rationale: El texto griego usa dos términos relacionados pero no idénticos. 'Monumentos' preserva la segunda denominación y evita colapsarla en 'tumbas/sepulcros', manteniendo la tensión lexical del versículo.
  doctrine_reference: 'Contested terms table: μνημεῖον as monument/memorial with contextual differentiation from τάφος'
- issue: Valor de δικαίων en una reprensión profética
  english_pob_reading: the righteous
  chosen_spanish_reading: los justos
  alternative_spanish_readings:
  - los rectos
  - los justos
  rationale: '''Los justos'' conserva la categoría de personas moralmente rectas sin introducir categorías doctrinales ajenas al pasaje. En español bíblico es claro y natural.'
  doctrine_reference: 'Contested terms table: δικαιοσύνη → justicia / rectitud (analogous preference for righteous language)'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que unificó la exclamación como 'Woe to you, scribes and Pharisees, hypocrites, because...'. En español se mantuvo una sola estructura exclamativa con '¡Ay de ustedes, ... porque...' para reflejar la misma relación causal sin fragmentar la oración. También se respetó la decisión revisada de mantener una conexión directa entre la denuncia y su razón.
  spanish_consistency_notes:
  - Se usa 'hipócritas' y no una paráfrasis como 'pretendientes', por coherencia con el valor establecido en el POB.
  - Se mantiene la distinción lexical entre 'tumbas' y 'monumentos' siguiendo el patrón del texto inglés auditado.
  - Se prefirió 'justos' como equivalente estable de 'the righteous' para uniformidad con el vocabulario bíblico del proyecto.
  - Se usó 'escribas' para γραμματεῖς, en línea con la terminología bíblica estándar en español.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes porque no aparecen en el versículo y no hay motivo para introducirlas.
