translation:
  language: es
  text: 'Y no sean llamados instructores[a], porque su instructor es uno: el Mesías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». Aquí Χριστός se traduce «Mesías» porque funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδὲ
  english_pob_choice: And do not
  chosen_spanish: Y no
  alternatives_spanish:
  - Ni
  - Y tampoco
  lexicon: BDAG
  rationale: En español, la negativa coordinada natural para continuar la prohibición es «Y no». Conserva la fuerza conectiva de μηδὲ sin endurecer el ritmo de manera artificial.
- source_word: κληθῆτε
  english_pob_choice: be called
  chosen_spanish: seáis llamados
  alternatives_spanish:
  - seáis nombrados
  - seáis designados
  - se os llame
  lexicon: BDAG
  rationale: El pasivo de καλέω aquí indica recibir una designación o título. «Seáis llamados» conserva esa idea de apelación pública y mantiene el paralelismo con el sustantivo de título.
- source_word: καθηγηταί
  english_pob_choice: instructors
  chosen_spanish: instructores
  alternatives_spanish:
  - guías
  - líderes
  - maestros
  lexicon: BDAG
  rationale: «Instructores» refleja el valor de καθηγητής como quien guía o enseña, y evita confundirlo con διδάσκαλος, que en el contexto cercano ya cumple la función de «maestro».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: «Porque» expresa de manera clara y directa la razón de la prohibición, sin sobrecargar el verso con matices no necesarios aquí.
- source_word: καθηγητὴς
  english_pob_choice: instructor
  chosen_spanish: instructor
  alternatives_spanish:
  - guía
  - líder
  - maestro
  lexicon: BDAG
  rationale: Se mantiene la misma elección léxica que en el plural para conservar coherencia semántica dentro del versículo.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: vuestro
  alternatives_spanish:
  - su
  - de ustedes
  lexicon: BDAG
  rationale: «Vuestro» comunica posesión directa en un registro bíblico solemne; en español latinoamericano puede sentirse más marcado, pero aquí funciona dentro de una exhortación en estilo elevado y claro.
- source_word: ἐστιν εἷς
  english_pob_choice: is one
  chosen_spanish: es uno
  alternatives_spanish:
  - es uno solo
  - hay uno solo
  lexicon: BDAG
  rationale: «Es uno» preserva la concisión del griego y la afirmación de singularidad sin añadir énfasis interpretativo que el texto no exige.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Como en el audit trail inglés, Χριστός funciona aquí como título; por eso se traduce «Mesías» para conservar el sentido judío-mesiánico y no convertirlo en forma litúrgica fija.
theological_decisions:
- issue: Traducción de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La construcción con artículo y el contexto del versículo presentan Χριστός como título, no como mero nombre propio. Traducirlo por «Mesías» comunica mejor la referencia y evita oscurecer el trasfondo judío del enunciado.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms for Χριστός'
translation_notes:
  revision_awareness: La versión española sigue el pass final sin cambios reportados en el audit trail inglés. Se conserva la decisión clave de traducir Χριστός como título («Mesías») y se mantiene el paralelismo léxico de καθηγητής en singular y plural.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni un sustituto del Nombre divino.
  - Se mantiene «instructores» para no colapsar el término con «maestros» en el contexto inmediato de Mateo 23.
  - 'La puntuación con dos puntos reproduce con naturalidad la explicación causal del griego: prohibición seguida de fundamento.'
