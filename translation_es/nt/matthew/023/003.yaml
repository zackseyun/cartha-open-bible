translation:
  language: es
  text: Por tanto, hagan y guarden todo lo que les digan, pero no hagan según sus obras[a], porque dicen y no hacen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hagan como ellos hacen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα οὖν ὅσα ἐὰν
  english_pob_choice: Therefore, everything
  chosen_spanish: Por tanto, todo lo que
  alternatives_spanish:
  - Así que, todo lo que
  - Por consiguiente, todo cuanto
  lexicon: BDAG
  rationale: La expresión griega es totalizadora; en español, «todo lo que» conserva esa amplitud de forma natural. «Por tanto» comunica la inferencia de οὖν sin endurecer el estilo.
- source_word: εἴπωσιν ὑμῖν
  english_pob_choice: they tell you
  chosen_spanish: les digan
  alternatives_spanish:
  - les dicen
  - les instruyan
  lexicon: BDAG
  rationale: λέγω puede significar «decir» o «decir a». En este contexto, «les digan» mantiene la referencia al habla dirigida a los oyentes sin añadir una idea de instrucción formal que el griego no exige.
- source_word: ποιήσατε
  english_pob_choice: do
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan esto
  - cumplan
  lexicon: BDAG
  rationale: El imperativo aoristo de ποιέω pide acción. «Hagan» es directo y conserva la repetición verbal con los verbos posteriores.
- source_word: τηρεῖτε
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - mantengan
  lexicon: BDAG
  rationale: τηρέω puede significar «guardar» u «observar». «Guarden» diferencia bien este verbo de ποιέω y funciona de manera natural en español bíblico contemporáneo.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  english_pob_choice: according to their works
  chosen_spanish: según sus obras
  alternatives_spanish:
  - de acuerdo con sus obras
  - como ellos hacen
  lexicon: BDAG
  rationale: κατά con acusativo expresa aquí norma o conformidad. «Según sus obras» preserva esa fuerza y mantiene el sustantivo «obras» para no perder el eco léxico del griego. La alternativa más idiomática «como ellos hacen» se reserva para nota.
- source_word: μὴ ποιεῖτε
  english_pob_choice: do not do
  chosen_spanish: no hagan
  alternatives_spanish:
  - no obren
  - no practiquen
  lexicon: BDAG
  rationale: El presente imperativo con μή prohíbe una conducta sostenida. «No hagan» conserva la repetición de ποιέω con una construcción natural en español.
- source_word: λέγουσιν γὰρ καὶ οὐ ποιοῦσιν
  english_pob_choice: for they say and do not do
  chosen_spanish: porque dicen y no hacen
  alternatives_spanish:
  - porque dicen y no practican
  - pues hablan y no hacen
  lexicon: BDAG
  rationale: La frase griega es breve y contrastiva. «Dicen y no hacen» mantiene la repetición de λέγω/ποιέω y el contraste entre palabra y acción sin añadir contenido implícito.
theological_decisions:
- issue: Cómo reflejar la relación entre las órdenes de obedecer y el contexto de autoridad de los maestros anteriores
  english_pob_reading: Leave the object implicit in this verse and translate only what verse 3 states.
  chosen_spanish_reading: 'Mantener el objeto implícito: «todo lo que les digan».'
  alternative_spanish_readings:
  - todo lo que les enseñen
  - todo lo que les ordenen
  rationale: El versículo no repite el sujeto ni amplía el contenido de lo dicho; por eso la traducción se limita a la frase del versículo y no inserta explicaciones contextuales.
  doctrine_reference: Principio de fidelidad textual y no expansión explicativa
- issue: Cómo preservar la tensión retórica entre obediencia externa y práctica hipócrita
  english_pob_reading: Preserve the repetition of 'do/keep ... do not do ... say and do not do.'
  chosen_spanish_reading: 'Conservar la repetición: «hagan y guarden ... no hagan ... dicen y no hacen».'
  alternative_spanish_readings:
  - cumplan y observen ... no imiten ... predican pero no practican
  - hagan y sigan ... no hagan como ellos
  rationale: La repetición de ποιέω expone la incoherencia entre lo que dicen y lo que hacen. En español conviene conservar esa reiteración para no suavizar el reproche.
  doctrine_reference: Principio de equivalencia óptima y respeto al énfasis retórico del original
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el registro del POB en inglés, conservando la triple secuencia de verbos de acción y la conclusión inferencial de οὖν. No se amplía el objeto de «les digan» ni se suaviza la contraposición final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene «obras» para ἔργα, evitando «hechos» para conservar el eco léxico con el verbo de acción.
  - Se conserva la diferencia entre «hagan/guarden» y «no hagan» para reflejar ποιέω y τηρέω como verbos distintos.
  - La nota al pie marca únicamente una alternativa de traducción para οὖν; no introduce variantes doctrinales.
