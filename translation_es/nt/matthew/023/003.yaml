  spanish_quality_summary: 'El español es claro, natural y digno. «Hagan y guarden todo lo que les digan» funciona bien, y «porque dicen y no hacen» preserva la concisión. La única reparación necesaria es de aparato: trasladar la nota al segmento «según sus obras» para conservar la alternativa idiomática documentada («como ellos hacen») y evitar una nota menos significativa sobre οὖν.'
