  text: εἰ δὲ ἐν πνεύματι θεοῦ ἐγὼ ἐκβάλλω τὰ δαιμόνια, ἄρα ἔφθασεν ἐφ’ ὑμᾶς ἡ βασιλεία τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/012/028.yaml
  text: But if I cast out the demons by the Spirit of God[b][a], then the kingdom of God has come upon you.
  footnotes:
  - marker: a
    text: Or 'in the Spirit of God.' The Greek phrase can be rendered either way; here it is taken as expressing means or agency.
    reason: lexical_alternative
  - marker: b
    text: Or 'has overtaken you' or 'has arrived upon you.' The Greek verb emphasizes that God's kingdom has reached them in Jesus' works.
    reason: lexical_alternative
