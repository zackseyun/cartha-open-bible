translation:
  language: es
  text: Pero si yo echo fuera los demonios por el Espíritu de Dios[a], entonces el reino de Dios[b] ha venido sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el Espíritu de Dios». La frase griega puede entenderse de cualquiera de esas dos maneras; aquí se toma como expresión de medio o agencia.
    reason: lexical_alternative
  - marker: b
    text: O «ha llegado hasta ustedes» o «los ha alcanzado». El verbo griego destaca que el reino de Dios los ha alcanzado en las obras de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Mas si
  - Y si
  lexicon: BDAG
  rationale: Conserva el giro condicional con contraste suave de δέ; «Pero si» es natural en español y mantiene el enlace argumentativo del pasaje.
- source_word: ἐν πνεύματι θεοῦ
  english_pob_choice: by the Spirit of God
  chosen_spanish: por el Espíritu de Dios
  alternatives_spanish:
  - en el Espíritu de Dios
  - por el Espíritu de Dios
  lexicon: BDAG
  rationale: La construcción con ἐν más dativo puede expresar medio o agencia; «por» comunica bien la idea de acción mediante agencia divina y suena natural en español, sin perder la referencia personal al Espíritu.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para reflejar el énfasis del griego, aunque en español pudiera omitirse.
- source_word: ἐκβάλλω
  english_pob_choice: cast out
  chosen_spanish: echo fuera
  alternatives_spanish:
  - expulso
  - arrojo fuera
  - echo fuera
  lexicon: BDAG
  rationale: En contexto de exorcismo, «echo fuera» reproduce con claridad la fuerza verbal de ἐκβάλλω y mantiene el registro bíblico sin sonar arcaico.
- source_word: τὰ δαιμόνια
  english_pob_choice: the demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los demonios
  - los espíritus malignos
  lexicon: BDAG
  rationale: «Demonios» es el equivalente moderno y directo de δαιμόνια; se conserva el artículo para la referencia concreta a los seres expulsados.
- source_word: ἄρα
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica de modo natural en español, sin añadir solemnidad innecesaria.
- source_word: ἔφθασεν
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - ha arribado
  - ha llegado
  lexicon: BDAG
  rationale: El aoristo de φθάνω comunica alcance o llegada efectiva; «ha llegado» expresa ese sentido con naturalidad y conserva la idea de que el reino ha alcanzado a los oyentes.
- source_word: ἐφ’ ὑμᾶς
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - sobre ustedes
  - a ustedes
  - contra ustedes
  lexicon: BDAG
  rationale: «Sobre ustedes» conserva la imagen de llegada/repercusión de ἐπί con acusativo después de φθάνω, y puede sugerir también la fuerza confrontativa del contexto.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: la realeza de Dios
  alternatives_spanish:
  - el reino de Dios
  - la realeza de Dios
  - el reinado de Dios
  lexicon: BDAG
  rationale: Se opta por «realeza» para dejar ver la dimensión de soberanía/autoridad real de βασιλεία, sin borrar la tensión semántica entre reino y reinado; en el contexto de esta traducción se prioriza ese matiz de gobierno activo.
theological_decisions:
- issue: Sentido de βασιλεία τοῦ θεοῦ en relación con las obras de Jesús
  english_pob_reading: The verse presents Jesus' casting out of demons by the Spirit as evidence that God's kingdom has already arrived upon his hearers in a real, present sense.
  chosen_spanish_reading: El versículo presenta la expulsión de demonios por el Espíritu como evidencia de que la realeza de Dios ya ha llegado de manera real y presente sobre los oyentes.
  alternative_spanish_readings:
  - El reino de Dios se ha acercado pero no ha llegado plenamente
  - La frase se refiere solo a una consumación futura
  rationale: «Ha llegado» mantiene el valor de arribo efectivo del aoristo ἔφθασεν y, junto con el contexto de los exorcismos, expresa la irrupción presente del gobierno de Dios sin negar su consumación futura.
  doctrine_reference: Preservar la tensión del reino ya presente y todavía no consumado.
- issue: Referencia de «Espíritu de Dios»
  english_pob_reading: A personal reference to the Spirit of God, not an impersonal divine force.
  chosen_spanish_reading: Una referencia personal al Espíritu de Dios, no a una fuerza divina impersonal.
  alternative_spanish_readings:
  - Una referencia general al poder divino
  rationale: La frase se traduce con mayúscula en «Espíritu» para reflejar el referente personal entendido en el contexto cristiano, sin añadir contenido ajeno al texto.
  doctrine_reference: Credo Niceno-Constantinopolitano (381 d.C.)
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota dentro del texto español. Se mantuvo la decisión auditada de leer ἐν πνεύματι θεοῦ como medio/agencia y ἔφθασεν como llegada efectiva del reino.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula para el referente pneumatológico personal.
  - Se prefirió «realeza de Dios» para hacer explícito el matiz de soberanía activa de βασιλεία, siguiendo la decisión lexical dada.
  - Se mantuvo un estilo público, sobrio y readable, sin depender de calcos innecesarios del inglés.
