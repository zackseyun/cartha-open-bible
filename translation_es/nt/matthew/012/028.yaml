revisions:
- from: Pero si yo echo fuera los demonios [a] por el Espíritu de Dios, entonces la realeza de Dios [b] ha llegado sobre ustedes.
  to: Pero si yo echo fuera los demonios por el Espíritu de Dios[a], entonces el reino de Dios[b] ha venido sobre ustedes.
  rationale: Se reemplaza «realeza de Dios» por «reino de Dios» para ajustarse al sentido más fiel y natural de βασιλεία en este contexto y a la decisión documentada del POB. Se mejora la idiomaticidad de ἔφθασεν ἐφ’ ὑμᾶς con «ha venido sobre ustedes», manteniendo el matiz de irrupción sobre los oyentes. También se mueve la nota [a] para anclarla correctamente a «por el Espíritu de Dios».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:10:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura condicional, la agencia del Espíritu, la inferencia lógica y la llegada efectiva del reino. Sin embargo, se aparta innecesariamente del sentido y de la decisión documentada de βασιλεία τοῦ θεοῦ al usar «realeza de Dios» en vez de «reino de Dios», y «ha llegado sobre ustedes» suena menos natural en español que una formulación que conserve el matiz de ἐφ’ ὑμᾶς sin calco torpe.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos tropiezos de legibilidad: la posición del marcador [a] tras «demonios» en vez de anclarlo a la frase pertinente «por el Espíritu de Dios», y la expresión «la realeza de Dios ha llegado sobre ustedes», que resulta poco idiomática en español eclesial general. «Reino de Dios» es mucho más natural y fiel al proyecto, y «ha venido sobre ustedes» o «ha llegado hasta ustedes» suena mejor.'
  glossary_alignment: Cumple con «Espíritu de Dios», «demonios» y la lógica del pasaje. No alinea bien con la preferencia del proyecto y del expediente inglés para βασιλεία como «reino», no «realeza», especialmente aquí donde no hay justificación fuerte para apartarse. No hay conflicto con Yahvé/Mesías en este versículo.
  issues:
  - severity: high
    issue: «la realeza de Dios» para ἡ βασιλεία τοῦ θεοῦ
    rationale: El expediente inglés eligió explícitamente «the kingdom of God» y descartó opciones más abstractas como «reign» como elección principal. En español, «realeza» normalmente denota cualidad o estatus de ser real, no el dominio/reino; por tanto estrecha y desvía el sentido establecido y suena poco natural.
  - severity: medium
    issue: «ha llegado sobre ustedes» es un calco poco idiomático
    rationale: Aunque intenta reflejar ἐφ’ ὑμᾶς, en español esta combinación con «ha llegado» suena forzada. Una opción como «ha venido sobre ustedes» conserva mejor el impacto espacial, mientras la nota puede preservar «ha llegado hasta ustedes» y «los ha alcanzado» como alternativas.
  - severity: low
    issue: El marcador [a] está colocado después de «demonios»
    rationale: La nota [a] explica «por/en el Espíritu de Dios», así que el anclaje correcto debe ir en esa frase para evitar ambigüedad.
  revised_spanish_text: Pero si yo echo fuera los demonios por el Espíritu de Dios[a], entonces el reino de Dios[b] ha venido sobre ustedes.
  revised_footnotes:
  - marker: a
    text: O «en el Espíritu de Dios». La frase griega puede entenderse de cualquiera de esas dos maneras; aquí se toma como expresión de medio o agencia.
    reason: lexical_alternative
  - marker: b
    text: O «ha llegado hasta ustedes» o «los ha alcanzado». El verbo griego destaca que el reino de Dios los ha alcanzado en las obras de Jesús.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «realeza de Dios» por «reino de Dios» para ajustarse al sentido más fiel y natural de βασιλεία en este contexto y a la decisión documentada del POB. Se mejora la idiomaticidad de ἔφθασεν ἐφ’ ὑμᾶς con «ha venido sobre ustedes», manteniendo el matiz de irrupción sobre los oyentes. También se mueve la nota [a] para anclarla correctamente a «por el Espíritu de Dios».
