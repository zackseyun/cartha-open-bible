revisions:
- from: 'Y he aquí[a] un hombre con una mano seca. Y le preguntaron, diciendo: «¿Es lícito sanar en los sábados?» para acusarlo.'
  to: 'Y he aquí, un hombre con una mano marchita. Y le preguntaron, diciendo: «¿Es lícito sanar en sábado[a]?» para acusarlo.'
  rationale: Se ajusta «mano seca» a «mano marchita» para reflejar mejor el sentido contextual de ξηράν en español bíblico natural. Se cambia «en los sábados» a «en sábado» en el texto principal por legibilidad, conservando en nota la pluralidad griega documentada por el POB inglés. También se normaliza la nota al español.
  reviewer_model: gpt-5.4
