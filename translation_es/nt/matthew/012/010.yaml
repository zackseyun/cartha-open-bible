base_translation:
  language: en
  yaml_path: translation/nt/matthew/012/010.yaml
  text: And behold[a], there was a man with a withered hand. And they asked him, saying, “Is it lawful to heal on the Sabbaths?” so that they might accuse him.
  footnotes:
