review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: ἰδοὺ se refleja, ἄνθρωπος es «un hombre», la pregunta legal sobre sanar en sábado queda clara, y la cláusula final de propósito «para acusarlo» preserva ἵνα κατηγορήσωσιν αὐτοῦ. Sin embargo, dos puntos requieren ajuste para fidelidad y legibilidad: «mano seca» no comunica bien en español el valor contextual de χεῖρα ἔχων ξηράν en un contexto de curación; «mano paralizada» o «mano atrofiada» sería interpretación demasiado específica, pero «mano marchita» reproduce mejor el uso bíblico establecido y el sentido de miembro reseco/inhabilitado. Además, «en los sábados» es demasiado poco natural en español; dado que el POB inglés preservó la pluralidad pero reconoció la idiomaticidad singular en nota, el español debe hacer lo mismo con una formulación más natural en el texto principal.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos expresiones torpes: «mano seca» suena física y literalmente seca más que lisiada/marchita, y «en los sábados» resulta antinatural para un lector hispanohablante. «Y he aquí» funciona, aunque «Y miren» sería demasiado coloquial; mantener «he aquí» es aceptable. «Le preguntaron, diciendo» es algo rígido pero todavía válido y cercano al griego.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La principal cuestión léxica es mejorar χεῖρα ἔχων ξηράν a «mano marchita» y trasladar la transparencia del plural τοῖς σάββασιν a una nota, usando en el cuerpo un español idiomático «en sábado», conforme al precedente documentado del POB inglés.
  issues:
  - severity: medium
    issue: «con una mano seca» para χεῖρα ἔχων ξηράν
    rationale: Aunque ξηράν literalmente remite a sequedad, en este contexto de sanidad la expresión española «mano seca» no transmite bien una mano atrofiada/marchita. «Mano marchita» es más natural y fiel sin sobreinterpretar médicamente.
  - severity: medium
    issue: «en los sábados» en el texto principal
    rationale: Preserva mecánicamente el plural griego, pero en español es marcadamente antinatural. Como el audit trail inglés ya documenta la alternativa idiomática singular, conviene usar «en sábado» en el texto y explicar el plural en nota.
  - severity: low
    issue: Nota al pie en inglés
    rationale: La nota incluida comienza con «Or, more idiomatically in Spanish», que no está en español y debe normalizarse al idioma meta.
