translation:
  language: es
  text: 'Y he aquí, un hombre con una mano marchita. Y le preguntaron, diciendo: «¿Es lícito sanar en sábado[a]?» para acusarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más literal, «en los sábados». El griego tiene el plural «en los sábados», una manera común de referirse a los días de sábado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: ἰδού introduce la escena con fuerza discursiva. «He aquí» conserva ese valor de atención y el tono narrativo sin volver la frase innecesariamente artificiosa en español.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El sustantivo singular masculino señala a un individuo varón concreto; «un hombre» mantiene esa referencia con naturalidad en español.
- source_word: χεῖρα ἔχων ξηράν
  english_pob_choice: with a withered hand
  chosen_spanish: con una mano seca
  alternatives_spanish:
  - con una mano tullida
  - con una mano marchita
  lexicon: BDAG
  rationale: La construcción participial se vuelve naturalmente posesiva en español con «con». «Seca» refleja el valor básico de ξηρός y evita especificar más de lo que el texto griego dice; «withered» en inglés resume bien el estado, pero en español «mano seca» preserva mejor la cercanía al original y deja abierta la condición exacta.
- source_word: ἐπηρώτησαν
  english_pob_choice: they asked
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - le interrogaron
  - le inquirieron
  lexicon: BDAG
  rationale: «Preguntaron» conserva el verbo básico sin cargarlo de hostilidad; el matiz adversarial queda explicado por la cláusula de propósito final.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - preguntando
  lexicon: BDAG
  rationale: «Diciendo» reproduce la relación participial con el verbo principal y mantiene el flujo narrativo.
- source_word: ἔξεστι
  english_pob_choice: is it lawful
  chosen_spanish: ¿es lícito?
  alternatives_spanish:
  - ¿está permitido?
  - ¿se puede?
  lexicon: BDAG
  rationale: En el contexto del sábado, la pregunta es de permiso bajo la ley; «lícito» conserva esa fuerza legal-religiosa mejor que una formulación meramente práctica.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbaths
  chosen_spanish: en los sábados
  alternatives_spanish:
  - en el sábado
  - durante el sábado
  lexicon: BDAG
  rationale: Se mantiene el plural del griego para transparencia al texto fuente, aunque en español el singular puede sonar más idiomático. «En los sábados» preserva esa huella formal y permite ver la pluralidad del original.
- source_word: θεραπεύειν
  english_pob_choice: to heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  - restaurar
  lexicon: BDAG
  rationale: En contexto de milagro y recuperación física, «sanar» es natural y fiel. «Curar» podría sonar más técnico, pero «sanar» funciona bien en registro bíblico contemporáneo sin alejarse del sentido.
- source_word: ἵνα κατηγορήσωσιν αὐτοῦ
  english_pob_choice: so that they might accuse him
  chosen_spanish: para acusarlo
  alternatives_spanish:
  - a fin de acusarlo
  - para formular acusaciones contra él
  lexicon: BDAG
  rationale: La cláusula de propósito en español se expresa de forma concisa con «para». El verbo «acusarlo» conserva el sentido jurídico de κατηγορέω; no se explicita el subjuntivo modal del griego, pero sí la finalidad hostil.
theological_decisions:
- issue: Plural griego de “sábados” frente al singular idiomático
  english_pob_reading: on the Sabbaths
  chosen_spanish_reading: en los sábados
  alternative_spanish_readings:
  - en el sábado
  rationale: El texto griego usa el plural τοῖς σάββασιν. Se conserva en el cuerpo del texto por fidelidad auditable, aunque el singular es una equivalencia idiomática posible en español. Mantener el plural evita normalizar una decisión interpretativa que el original no hace.
  doctrine_reference: Principio POB de primacía del idioma original y preservación de alternativas significativas
- issue: Tono legal de ἔξεστι en una controversia sabática
  english_pob_reading: is it lawful
  chosen_spanish_reading: ¿es lícito?
  alternative_spanish_readings:
  - ¿está permitido?
  - ¿se puede?
  rationale: La controversia no es solo sobre conveniencia social, sino sobre lo permitido por la ley religiosa. «Lícito» preserva ese campo semántico sin exagerar el tono judicial más allá de lo que exige el pasaje.
  doctrine_reference: Uso contextual de vocabulario legal-religioso en los Evangelios
- issue: Relación entre la pregunta y la intención hostil final
  english_pob_reading: so that they might accuse him
  chosen_spanish_reading: para acusarlo
  alternative_spanish_readings:
  - a fin de acusarlo
  - para formular acusaciones contra él
  rationale: La finalidad hostil debe quedar explícita, pero sin añadir detalles externos. «Para acusarlo» comunica la intención de forma directa y fiel al ἵνα final.
  doctrine_reference: Lectura sintáctica de cláusula de propósito
translation_notes:
  revision_awareness: Se revisó el pasaje contra el griego SBLGNT y el audit trail en inglés. Se mantuvieron el valor de atención de ἰδού, la referencia plural de τοῖς σάββασιν y el sentido legal de ἔξεστι. No se introdujeron ampliaciones interpretativas fuera del texto fuente.
  spanish_consistency_notes:
  - Se prefirió «sanar» para θεραπεύειν por su uso natural en relatos de milagros.
  - «Acusarlo» conserva el matiz jurídico-adversarial de κατηγορήσωσιν χωρίς sobretraducción.
  - Se evitó «SEÑOR» y otras convenciones no pertinentes porque el versículo no contiene el nombre divino.
