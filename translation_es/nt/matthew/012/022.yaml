revisions:
- from: Entonces le llevaron un endemoniado[a], ciego y mudo; y lo sanó, de modo que el mudo hablaba y veía.
  to: Entonces le fue traído un endemoniado[a], ciego y mudo; y lo sanó, de modo que el mudo habló y vio.
  rationale: Se ajusta la voz verbal para reflejar mejor el pasivo griego sin agente expreso («le fue traído») y se cambia «hablaba y veía» por «habló y vio» para expresar con más fidelidad el resultado puntual de la sanidad. Se conserva «endemoniado» y la nota sobre «mudo/sordo», que están bien fundamentadas.
