translation:
  language: es
  text: Entonces le fue traído un endemoniado[a], ciego y mudo; y lo sanó, de modo que el mudo habló y vio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sordo». La palabra griega puede referirse a alguien que es sordo o que no puede hablar; aquí el contexto favorece «mudo», porque el resultado es que habló y vio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca continuidad narrativa temporal de forma natural en español; «Entonces» conserva el valor discursivo de secuencia sin añadir matiz interpretativo.
- source_word: προσηνέχθη αὐτῷ
  english_pob_choice: was brought to him
  chosen_spanish: le llevaron
  alternatives_spanish:
  - fue llevado a él
  - lo trajeron a él
  lexicon: BDAG
  rationale: El pasivo griego omite el agente; en español, la pasiva refleja o perifrástica suena menos natural. «Le llevaron» expresa el hecho sin añadir sujeto explícito indebido.
- source_word: δαιμονιζόμενος
  english_pob_choice: demon-possessed
  chosen_spanish: endemoniado
  alternatives_spanish:
  - endemoniado por un demonio
  - poseído por un demonio
  lexicon: BDAG
  rationale: «Endemoniado» es el equivalente natural y fiel en español bíblico contemporáneo; conserva la referencia a influencia demoníaca sin suavizarla.
- source_word: τυφλὸς
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - sin vista
  - cegado
  lexicon: BDAG
  rationale: Equivalente directo y claro.
- source_word: κωφός
  english_pob_choice: mute / unable to speak
  chosen_spanish: mudo
  alternatives_spanish:
  - incapaz de hablar
  - sordo
  lexicon: BDAG
  rationale: El contexto inmediato culmina en que «hablaba y veía», lo que favorece el sentido de incapacidad para hablar. «Mudo» mantiene la concisión del griego y sigue la revisión más reciente del POB inglés.
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: lo sanó
  alternatives_spanish:
  - lo curó
  - lo sanó completamente
  lexicon: BDAG
  rationale: «Sanar» es el verbo habitual y sobrio para θεραπεύω en relatos de milagro; preserva el registro bíblico sin sobreexplicar.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - de manera que
  - así que
  lexicon: BDAG
  rationale: Introduce resultado de manera formal y fluida en español; evita una construcción demasiado coloquial.
- source_word: τὸν κωφὸν
  english_pob_choice: the mute man
  chosen_spanish: el mudo
  alternatives_spanish:
  - el hombre mudo
  - el que no podía hablar
  lexicon: BDAG
  rationale: El artículo con adjetivo funciona sustantivamente; «el mudo» conserva la concisión y mantiene la correspondencia con la primera ocurrencia de κωφός.
- source_word: λαλεῖν
  english_pob_choice: spoke
  chosen_spanish: hablaba
  alternatives_spanish:
  - habló
  - comenzó a hablar
  lexicon: BDAG
  rationale: Aunque el infinitivo expresa resultado, en español «hablaba» reproduce de forma natural el efecto resultante y evita forzar un aspecto inceptivo no explícito.
- source_word: βλέπειν
  english_pob_choice: saw
  chosen_spanish: veía
  alternatives_spanish:
  - vio
  - podía ver
  lexicon: BDAG
  rationale: Sigue el paralelismo con «hablaba» y comunica la restauración de la vista como resultado del sanamiento.
theological_decisions:
- issue: Lenguaje explícito de posesión/demonización
  english_pob_reading: 'Retain explicit demonic language: ''demon-possessed'''
  chosen_spanish_reading: 'Conservar lenguaje explícito de influencia demoníaca: «endemoniado»'
  alternative_spanish_readings:
  - afligido
  - trastornado
  rationale: El griego atribuye la condición a agencia demoníaca; la traducción no debe naturalizarla en términos clínicos o vagos. «Endemoniado» mantiene esa afirmación.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Sentido contextual de κωφός
  english_pob_reading: Render as inability to speak rather than deafness
  chosen_spanish_reading: Tomarlo aquí como incapacidad para hablar, no como sordera
  alternative_spanish_readings:
  - sordo
  - sordo y mudo
  rationale: El resultado del versículo es que habló y vio; eso confirma la dimensión de habla, no la de audición. «Mudo» conserva la tensión textual sin añadir una sordera no explicitada en el resultado.
  doctrine_reference: Translation philosophy 1 and 5
translation_notes:
  revision_awareness: Seguí la revisión más reciente del POB inglés, que prefirió «mute» frente a «unable to speak» para κωφός por concisión y formalidad. En español, «mudo» cumple esa misma función y se ajusta al paralelismo del versículo.
  spanish_consistency_notes:
  - Mantengo «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Uso «endemoniado» en vez de una paráfrasis clínica para conservar el marco demonológico del texto.
  - Conservo «mudo» para κωφός en concordancia con la decisión auditada del inglés POB y con el resultado narrativo.
  - Evito añadir sujeto explícito en el primer verbo para respetar el pasivo griego y la omisión del agente.
