translation:
  language: es
  text: He aquí, mi siervo a quien he escogido, mi amado en quien mi alma se ha deleitado[a]. Pondré mi Espíritu sobre él, y proclamará justicia[b] a las naciones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alma se complació» para «mi alma se ha deleitado».
    reason: lexical_alternative
  - marker: b
    text: O «juicio» para «justicia» (κρίσις).
    reason: lexical_alternative
  - marker: c
    text: O «a los gentiles» para «a las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: BDAG
  rationale: Conserva la fuerza de llamada profética y de atención del texto sin sonar tan arcaico como «he aquí» puede sonar en otros contextos; en una cita solemne resulta natural y fiel.
- source_word: παῖς
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - esclavo
  - hijo
  lexicon: BDAG
  rationale: En este contexto de cita isaiana, παῖς designa al agente servidor elegido por Dios. «Siervo» mantiene la intertextualidad profética y evita introducir «hijo», que no está dado por este término aquí.
- source_word: ᾑρέτισα
  english_pob_choice: have chosen
  chosen_spanish: he escogido
  alternatives_spanish:
  - elegí
  - he seleccionado
  lexicon: BDAG
  rationale: 'El aoristo queda bien en pretérito perfecto en una cita bíblica en español: «he escogido» expresa una elección ya realizada con vigencia presente, de modo natural y solemne.'
- source_word: ἀγαπητός
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - predilecto
  lexicon: BDAG
  rationale: «Amado» es el equivalente español más estable para un término de afecto divino solemne; conserva dignidad y evita una nota demasiado coloquial.
- source_word: εὐδόκησεν ἡ ψυχή μου
  english_pob_choice: my soul has delighted
  chosen_spanish: se ha deleitado mi alma
  alternatives_spanish:
  - mi alma se complació
  - mi alma está contenta
  lexicon: BDAG
  rationale: Se conserva el sujeto explícito «mi alma», como en el griego y en la decisión inglesa. «Se ha deleitado» transmite la complacencia afectiva con un verbo natural en español.
- source_word: πνεῦμά
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: BDAG
  rationale: Aquí el referente es el Espíritu de Dios en habla divina directa; por eso se capitaliza «Espíritu» en español para marcar la referencia personal y teológica.
- source_word: κρίσιν
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  lexicon: BDAG
  rationale: Siguiendo la decisión auditada, «justicia» comunica mejor la misión mesiánica de establecer y proclamar el orden recto de Dios a las naciones. «Juicio» queda como alternativa semántica, pero no como forma principal.
- source_word: ἔθνεσιν
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  lexicon: BDAG
  rationale: «Naciones» reproduce el alcance universal del pasaje de Isaías y mantiene la referencia amplia del texto, en vez de restringirla a una lectura confesional posterior.
- source_word: ἀπαγγελεῖ
  english_pob_choice: will proclaim
  chosen_spanish: anunciará
  alternatives_spanish:
  - proclamará
  - declarará
  lexicon: BDAG
  rationale: «Anunciará» funciona bien en español para una declaración pública y formal; suena natural y conserva el carácter proclamativo del verbo griego.
theological_decisions:
- issue: Sentido de παῖς en la cita mesiánica
  english_pob_reading: Render παῖς as 'servant' in keeping with the Isaianic servant quotation.
  chosen_spanish_reading: Traducir παῖς como «siervo» en la línea principal.
  alternative_spanish_readings:
  - hijo
  - esclavo
  rationale: La cita reproduce el lenguaje del Siervo de Isaías y presenta a Jesús en ese rol. «Siervo» preserva el vínculo intertextual y no fuerza una filiación que aquí no expresa el término. «Esclavo» sería demasiado fuerte para la lectura española de este versículo concreto.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: κρίσις en el marco de la misión del Siervo
  english_pob_reading: Translate κρίσις as 'justice' in the main text.
  chosen_spanish_reading: Traducir κρίσις como «justicia».
  alternative_spanish_readings:
  - juicio
  rationale: En este contexto profético, el énfasis recae en la instauración y proclamación del orden justo de Dios entre las naciones. «Justicia» expresa mejor esa misión que «juicio», aunque esta última sea una posibilidad léxica real.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Se revisó el expediente inglés auditado y no se detectaron cambios posteriores: el texto, las notas léxicas y la lectura teológica se mantienen estables. La presente redacción sigue ese acuerdo alto sin introducir innovaciones no justificadas por la fuente griega.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «siervo» para παῖς conforme al contexto isaiano y la auditoría inglesa.
  - Se capitaliza «Espíritu» por tratarse del Espíritu de Dios en discurso directo.
  - Se conserva «naciones» como alcance universal primario; la alternativa «gentiles» queda en nota.
  - La puntuación reproduce la cadencia de cita profética y separa con claridad las cláusulas del original griego.
