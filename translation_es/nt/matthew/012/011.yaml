review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la estructura y sentido del griego: pregunta retórica, masculino representativo, condición con presente idiomático, y acción de rescatar la oveja. Sin embargo, pierde precisión en varios puntos: omite el énfasis de «una» como singular destacado al no mantenerlo claramente en la frase completa, usa «en el sábado», que no es español natural para τοῖς σάββασιν, y «se agarrará de ella», que en español sugiere que la persona se sostiene de la oveja más que sujetarla. También la nota [a] no preserva una alternativa significativa del original ni del audit trail.'
  spanish_quality_summary: 'El texto es comprensible, pero varias expresiones suenan poco naturales o torpes en español bíblico claro: «en el sábado» debería ser «en sábado» o «en el día de reposo»; «se agarrará de ella» es impropio aquí; y la puntuación de la cláusula condicional puede simplificarse. Una formulación más natural y fiel es «¿Qué hombre entre ustedes, si tiene una sola oveja y esta cae en un hoyo en sábado, no la agarrará y la sacará?».'
  glossary_alignment: 'No hay términos del glosario principal especialmente controvertidos en este versículo. Se preserva correctamente ἄνθρωπος como «hombre». La decisión sobre σάββασιν debe alinearse con el rationale documentado: plural idiomático con sentido singular; en español corresponde mejor «en sábado» que «en el sábado». Para ἐγείρω, en contexto de rescate desde un hoyo, «la sacará» comunica mejor que «la levantará» el sentido contextual admitido por la auditoría inglesa («lift it out» / alternativa «raise it up»).'
  issues:
  - severity: medium
    issue: «en el sábado» es poco natural en español
    rationale: Aunque busca reflejar el singular idiomático de τοῖς σάββασιν, la expresión normal y clara en español es «en sábado». «En el sábado» suena calcada y reduce la legibilidad.
  - severity: medium
    issue: «no se agarrará de ella» malinterpreta la relación verbal
    rationale: κρατήσει αὐτό significa sujetar/agarrar la oveja, no agarrarse de ella. La forma pronominal cambia el sentido natural en español.
  - severity: medium
    issue: La nota [a] es innecesaria y no sigue el audit trail inglés
    rationale: El inglés anota el plural idiomático «on the Sabbaths» y la alternativa para ἐγερεῖ, no un simple «a ellos». Esa nota no aporta una alternativa significativa para el lector.
  - severity: low
    issue: Falta una mejor representación del énfasis de ἕν
    rationale: «una oveja» es posible, pero «una sola oveja» refleja mejor el valor enfático del numeral en el contexto retórico sin sonar forzado.
