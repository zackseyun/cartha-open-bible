revisions:
- from: 'Pero él les dijo[a]: «¿Qué hombre entre ustedes, si tiene una oveja[b], y esta cae en un hoyo en el sábado, no se agarrará de ella y la levantará?»'
  to: 'Pero él les dijo: «¿Qué hombre entre ustedes, si tiene una sola oveja y esta cae en un hoyo en sábado[a], no la agarrará y la sacará[b]?».'
  rationale: Se eliminó la nota innecesaria sobre «a ellos», se corrigió «en el sábado» a «en sábado» por naturalidad y fidelidad idiomática, se cambió «se agarrará de ella» por «la agarrará» para reflejar correctamente κρατήσει αὐτό, y se ajustó «la levantará» a «la sacará» en el texto principal para comunicar mejor el rescate desde el hoyo, preservando «la levantará» como alternativa documentada en nota. También se añadió «sola» para reflejar mejor el énfasis de πρόβατον ἕν.
