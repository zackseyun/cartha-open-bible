translation:
  language: es
  text: 'Pero él les dijo: «¿Qué hombre entre ustedes, si tiene una sola oveja y esta cae en un hoyo en sábado[a], no la agarrará y la sacará[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «en los sábados», un plural idiomático que significa «en sábado».'
    reason: lexical_alternative
  - marker: b
    text: O «y la levantará».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς ἔσται ἐξ ὑμῶν ἄνθρωπος
  english_pob_choice: Which man among you
  chosen_spanish: ¿Qué hombre entre ustedes
  alternatives_spanish:
  - ¿Cuál hombre entre ustedes
  - ¿Qué persona entre ustedes
  lexicon: BDAG
  rationale: La pregunta retórica mantiene el singular masculino representativo de ἄνθρωπος. «Qué hombre» suena natural en español y conserva el valor ejemplar de la pregunta sin neutralizar el género del original.
- source_word: ἕξει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - tendrá
  - posee
  lexicon: BDAG
  rationale: 'Aunque la forma griega es futura, en esta construcción condicional el español expresa mejor la condición con presente: «si tiene». Evita una futuridad demasiado rígida y mantiene la naturalidad del argumento.'
- source_word: πρόβατον ἕν
  english_pob_choice: one sheep
  chosen_spanish: una oveja
  alternatives_spanish:
  - una sola oveja
  - una oveja sola
  lexicon: BDAG
  rationale: «Oveja» es el equivalente normal y claro en español. El numeral «una» preserva el énfasis en que se trata de un solo animal, tal como en el griego.
- source_word: ἐὰν ἐμπέσῃ τοῦτο
  english_pob_choice: if it falls
  chosen_spanish: y esta cae
  alternatives_spanish:
  - si cae
  - y si cae
  lexicon: BDAG
  rationale: El antecedente inmediato es la oveja, por eso «esta» mantiene la referencia explícita del original. Se conserva la estructura condicional sin forzar un calco pesado.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en el sábado
  alternatives_spanish:
  - en los sábados
  - en sábado
  lexicon: BDAG
  rationale: El plural griego tiene valor idiomático; en español la forma más clara es el singular «en el sábado», que comunica el día de reposo como marco de la controversia.
- source_word: εἰς βόθυνον
  english_pob_choice: into a pit
  chosen_spanish: en un hoyo
  alternatives_spanish:
  - en un pozo
  - en una fosa
  lexicon: BDAG
  rationale: βόθυνος designa una depresión o hueco. «Hoyo» es amplio, natural y menos específico que «pozo», por lo que evita precisar más de lo que el texto dice.
- source_word: οὐχὶ κρατήσει
  english_pob_choice: will not take hold of it
  chosen_spanish: no se agarrará de ella
  alternatives_spanish:
  - no la sujetará
  - no la tomará
  lexicon: BDAG
  rationale: κρατέω aquí expresa agarrar con firmeza. «Se agarrará de ella» reproduce bien la idea de sujetar con la mano y mantiene el matiz de acción decidida.
- source_word: καὶ ἐγερεῖ
  english_pob_choice: and lift it out
  chosen_spanish: y la levantará
  alternatives_spanish:
  - y la alzará
  - y la sacará
  lexicon: BDAG
  rationale: ἐγείρω puede significar levantar o poner en pie. En este contexto, «la levantará» comunica el movimiento de sacarla del hoyo sin añadir más de lo que el griego exige.
theological_decisions:
- issue: Uso del plural idiomático σάββασιν
  english_pob_reading: on the Sabbath
  chosen_spanish_reading: en el sábado
  alternative_spanish_readings:
  - en los sábados
  - en sábado
  rationale: Se conserva el sentido idiomático del plural griego sin trasladar una pluralidad literal que confundiría al lector español. El singular refleja correctamente el caso de controversia sobre el día de reposo.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
- issue: Lenguaje masculino representativo en la pregunta retórica
  english_pob_reading: Which man among you
  chosen_spanish_reading: ¿Qué hombre entre ustedes
  alternative_spanish_readings:
  - ¿Qué persona entre ustedes
  rationale: La forma masculina singular es parte del planteamiento retórico del texto y no debe suavizarse sin necesidad. Mantener «hombre» preserva la correspondencia formal y la fuerza ejemplar del argumento.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y coincide con la lectura auditada en inglés: pregunta retórica, singular representativo, oveja singular, y el plural idiomático de σάββασιν entendido como «el sábado». Se eligió una expresión española natural sin borrar las decisiones léxicas documentadas. No se detectan revisiones aplicadas en el expediente inglés; el draft refleja el estado final acordado.'
  spanish_consistency_notes:
  - Se mantiene Yahvé/Mesías cuando corresponda; este versículo no contiene ninguno de esos términos.
  - Se usó «sábado» en singular para reflejar el idiomatismo griego y la lectura auditada en inglés.
  - Se conservó la referencia femenina «ella» para la oveja, conforme al sustantivo español «oveja».
