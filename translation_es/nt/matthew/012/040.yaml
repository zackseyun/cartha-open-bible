translation:
  language: es
  text: Porque así como Jonás estuvo en el vientre de la gran criatura marina[a] tres días y tres noches[c], así estará el Hijo del Hombre en el corazón de la tierra[b] tres días y tres noches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gran pez». El término griego designa una gran criatura del mar y es más amplio que un término zoológico específico.
    reason: lexical_alternative
  - marker: b
    text: «El corazón de la tierra» puede referirse a la sepultura, la tumba o las profundidades/el reino de los muertos; la expresión griega se deja metafórica en el texto principal.
    reason: alternative_reading
  - marker: c
    text: «Tres días y tres noches» a veces se entiende como un modismo que incluye partes de tres días, aunque otros lo toman más estrictamente.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Porque como
  - Así como
  lexicon: BDAG
  rationale: Conserva la relación comparativa de ὥσπερ y la conexión explicativa de γάρ en un español natural. «Porque así como» mantiene la lógica discursiva sin volverla rígida.
- source_word: Ἰωνᾶς
  english_pob_choice: Jonah
  chosen_spanish: Jonás
  alternatives_spanish:
  - Jonas
  lexicon: BDAG
  rationale: Nombre propio tradicional y reconocido en español bíblico. «Jonás» es la forma habitual y clara para el lector hispanohablante.
- source_word: ἐν τῇ κοιλίᾳ
  english_pob_choice: in the belly
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en la barriga
  - en el interior
  lexicon: BDAG
  rationale: «Vientre» comunica el sentido corporal de κοιλία en un registro bíblico claro y natural en español. Evita un tecnicismo innecesario y conserva la imagen narrativa.
- source_word: τοῦ κήτους
  english_pob_choice: of the sea creature
  chosen_spanish: del gran pez
  alternatives_spanish:
  - de la gran criatura marina
  - del monstruo marino
  lexicon: BDAG
  rationale: Aunque el griego es más amplio que «pez», en español «gran pez» es la forma más idiomática y reconocible del eco de Jonás. El adjetivo «gran» preserva la amplitud y evita imponer una clasificación zoológica estricta.
- source_word: τρεῖς ἡμέρας καὶ τρεῖς νύκτας
  english_pob_choice: three days and three nights
  chosen_spanish: tres días y tres noches
  alternatives_spanish:
  - durante tres días y tres noches
  lexicon: BDAG
  rationale: Se mantiene la expresión temporal exacta del griego, sin intentar resolver su valor idiomático dentro del texto principal.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual manera
  - de la misma manera
  lexicon: BDAG
  rationale: «Así» reproduce de forma breve y directa la transición comparativa hacia la segunda cláusula.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional y textual «Hijo del Hombre», que corresponde directamente al griego y mantiene su resonancia bíblica.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: estará
  alternatives_spanish:
  - será
  lexicon: BDAG
  rationale: En español, «estará» expresa mejor la localización espacial de la frase y el valor futuro de εἰμί en este contexto, sin añadir una interpretación adicional.
- source_word: ἐν τῇ καρδίᾳ τῆς γῆς
  english_pob_choice: in the heart of the earth
  chosen_spanish: en el corazón de la tierra
  alternatives_spanish:
  - en las profundidades de la tierra
  - en el seno de la tierra
  lexicon: BDAG
  rationale: Se mantiene la metáfora de καρδία con «corazón» para no resolver interpretativamente la expresión. «Tierra» conserva γῆ y deja abierta la referencia exacta, tal como el audit trail inglés decidió preservar la tensión metafórica.
theological_decisions:
- issue: Sentido de «el corazón de la tierra»
  english_pob_reading: Rendered literally as 'the heart of the earth' without specifying whether it refers to burial, death, the grave, or the realm of the dead.
  chosen_spanish_reading: Se traduce literalmente como «el corazón de la tierra» sin precisar si alude a sepultura, muerte, la tumba o el reino de los muertos.
  alternative_spanish_readings:
  - la tumba
  - las profundidades de la tierra
  - el reino de los muertos
  rationale: El griego conserva una metáfora abierta; por fidelidad al texto y a la filosofía del proyecto, la traducción principal no debe resolver la ambigüedad. La nota permite al lector conocer lecturas posibles sin imponer una sola.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de «tres días y tres noches»
  english_pob_reading: Kept as a literal temporal expression in the main text.
  chosen_spanish_reading: 'Se mantiene como expresión temporal literal: «tres días y tres noches».'
  alternative_spanish_readings:
  - un modo semítico de contar partes de tres días
  - un período estricto de setenta y dos horas
  rationale: La frase se preserva tal como aparece en el griego, dejando para el comentario o nota la discusión cronológica. Así se evita resolver en la traducción principal un debate que el versículo mismo no zanja.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto sigue el último estado revisado del expediente inglés: no hubo cambios en la última pasada, y el acuerdo de revisión fue alto/total. Por eso la redacción española mantiene la misma estrategia: metáforas preservadas, temporalidad literal y nombre propio normalizado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el original requiere el nombre divino; este versículo no lo contiene.
  - Se mantiene «Hijo del Hombre» como título fijo, coherente con la terminología del proyecto.
  - Se evita «SEÑOR» como sustituto de nombres divinos, porque no aplica aquí y no debe introducirse sin base textual.
  - «Gran pez» sigue la ambigüedad amplia del griego κῆτος dentro de un español idiomático y reconocible.
