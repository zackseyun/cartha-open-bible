source:
  edition: SBLGNT
  text: ὥσπερ γὰρ ἦν Ἰωνᾶς ἐν τῇ κοιλίᾳ τοῦ κήτους τρεῖς ἡμέρας καὶ τρεῖς νύκτας, οὕτως ἔσται ὁ υἱὸς τοῦ ἀνθρώπου ἐν τῇ καρδίᾳ τῆς γῆς τρεῖς ἡμέρας καὶ τρεῖς νύκτας.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/012/040.yaml
  text: For just as Jonah was in the belly of the sea creature three days and three nights[c][b][a], so the Son of Man will be in the heart of the earth three days and three nights.
  footnotes:
  - marker: a
    text: Or 'great fish.' The Greek word denotes a large sea creature and is broader than a specific zoological term.
    reason: lexical_alternative
  - marker: b
    text: '''In the heart of the earth'' may refer to burial, the grave, or the depths/realm of the dead; the Greek expression is left metaphorical in the main text.'
    reason: alternative_reading
  - marker: c
    text: '''Three days and three nights'' is sometimes understood idiomatically as including parts of three days, though others take it more strictly.'
    reason: alternative_reading
