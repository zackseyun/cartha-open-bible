translation:
  language: es
  text: 'Entonces algunos de los escribas y fariseos le respondieron[a], diciendo: «Maestro, queremos ver una señal de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una señal milagrosa». El término griego puede designar una señal con significado milagroso, pero el texto principal conserva el término más amplio «señal».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal narrativo que introduce la siguiente acción. «Entonces» preserva la secuencia del relato de forma natural en español.
- source_word: ἀπεκρίθησαν
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron a él
  lexicon: BDAG
  rationale: En español, «respondieron» comunica bien el valor narrativo de ἀποκρίνομαι. Se evita una construcción demasiado rígida y se mantiene el sentido de réplica.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: 'El dativo se integra de forma idiomática como objeto indirecto en español: «le respondieron». Conserva el destinatario sin sobrecargar la frase.'
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: Indica que no fueron todos los escribas y fariseos, sino un subconjunto. «Algunos» es la equivalencia más clara y neutral.
- source_word: τῶν γραμματέων
  english_pob_choice: of the scribes
  chosen_spanish: de los escribas
  alternatives_spanish:
  - de los expertos en la Ley
  - de los doctores de la Ley
  lexicon: BDAG
  rationale: «Escribas» reproduce el término del texto base y evita ampliar interpretativamente el oficio. Las alternativas explican más, pero no son necesarias aquí.
- source_word: καὶ Φαρισαίων
  english_pob_choice: and Pharisees
  chosen_spanish: y fariseos
  alternatives_spanish:
  - y los fariseos
  lexicon: BDAG
  rationale: Nombre de grupo sectario bien establecido en español bíblico. Se mantiene la transliteración tradicional por claridad y fidelidad.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio introduce el discurso directo. «Diciendo» conserva la estructura griega sin forzar una reformulación más libre.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro/Maestra
  - Profesor
  lexicon: BDAG
  rationale: Vocativo dirigido a Jesús. «Maestro» expresa el sentido de διδάσκαλος de modo natural en español y mantiene el tono de tratamiento.
- source_word: θέλομεν
  english_pob_choice: we want
  chosen_spanish: queremos
  alternatives_spanish:
  - deseamos
  - queremos ver
  lexicon: BDAG
  rationale: «Queremos» comunica volición directa y natural. Es fiel al valor del verbo sin sonar rebuscado en español contemporáneo.
- source_word: ἀπὸ σοῦ
  english_pob_choice: from you
  chosen_spanish: de parte tuya
  alternatives_spanish:
  - de ti
  - de tu parte
  lexicon: BDAG
  rationale: La preposición ἀπό aquí señala procedencia/origen de la señal. «De parte tuya» expresa con claridad que la señal debe venir de Jesús, sin sonar mecánico.
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una señal milagrosa
  lexicon: BDAG
  rationale: «Señal» es el equivalente más natural y amplio para σημεῖον. Se preserva la amplitud semántica del término, sin cerrar prematuramente el sentido a «milagrosa» en el texto principal.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - contemplar
  - presenciar
  lexicon: BDAG
  rationale: Infinitivo de ὁράω. «Ver» es la correspondencia directa y más sencilla en español.
theological_decisions:
- issue: Sentido de σημεῖον en el pedido de los interlocutores
  english_pob_reading: Rendered as 'sign' rather than 'miraculous sign' in the main text.
  chosen_spanish_reading: «una señal» en el texto principal.
  alternative_spanish_readings:
  - «una señal milagrosa»
  rationale: El contexto sugiere una validación sobrenatural, pero el término griego en sí es más amplio que «milagro». Mantener «señal» preserva la tensión lexical y deja que el contexto determine el matiz.
  doctrine_reference: Prioridad del valor léxico del texto original sobre una explicitación interpretativa innecesaria.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés: mantiene ἀποκρίνομαι como respuesta narrativa, conserva el grupo «escribas y fariseos», traduce el vocativo como «Maestro» y preserva σημεῖον con el término amplio «señal». No se introdujeron cambios revisionales respecto del estado más reciente, que estaba marcado como sin cambios.'
  spanish_consistency_notes:
  - Se usa el tratamiento de objeto indirecto «le respondieron» para integrar el dativo griego de forma natural.
  - «Señal» se mantiene en el texto principal para respetar la amplitud de σημεῖον; la nota ofrece la lectura alternativa «milagrosa» sin imponerla.
  - La puntuación y las comillas siguen normas habituales del español editorial bíblico en registro formal.
