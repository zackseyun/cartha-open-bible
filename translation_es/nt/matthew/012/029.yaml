translation:
  language: es
  text: ¿O cómo puede alguien entrar en la casa del hombre fuerte y arrebatar sus bienes[a], a menos que primero ate[b] al hombre fuerte? Y entonces saqueará su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus posesiones' para 'sus bienes'; el término griego puede referirse literalmente a utensilios o, más ampliamente, a pertenencias.
    reason: lexical_alternative
  - marker: b
    text: O 'ata' para 'ate'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O
  lexicon: BDAG
  rationale: Conserva la alternativa introductoria y la forma interrogativa-retórica del griego con una partícula natural en español.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - en qué forma
  lexicon: BDAG
  rationale: Mantiene el adverbio interrogativo directo sin explicar el argumento más allá de lo que el texto dice.
- source_word: δύναταί τις
  english_pob_choice: can someone
  chosen_spanish: puede alguien
  alternatives_spanish:
  - puede una persona
  - puede cualquiera
  lexicon: BDAG
  rationale: Conserva el sujeto indefinido y la modalidad de posibilidad, con un español idiomático y sobrio.
- source_word: εἰσελθεῖν εἰς τὴν οἰκίαν
  english_pob_choice: enter the house
  chosen_spanish: entrar en la casa
  alternatives_spanish:
  - meterse en la casa
  - ir a la casa
  lexicon: BDAG
  rationale: '''Entrar en'' reproduce con naturalidad el movimiento hacia el interior sin perder la literalidad de la imagen.'
- source_word: τοῦ ἰσχυροῦ / τὸν ἰσχυρόν
  english_pob_choice: the strong man
  chosen_spanish: el hombre fuerte
  alternatives_spanish:
  - el fuerte
  - el poderoso
  lexicon: BDAG
  rationale: Se mantiene el sustantivo masculino que exige el contexto metafórico y se expresa de forma natural en español como 'hombre fuerte', evitando neutralizar el rasgo representativo del griego.
- source_word: τὰ σκεύη αὐτοῦ
  english_pob_choice: his goods
  chosen_spanish: sus bienes
  alternatives_spanish:
  - sus posesiones
  - sus pertenencias
  - sus objetos
  lexicon: BDAG
  rationale: '''σκεύη'' puede referirse literalmente a utensilios o más ampliamente a pertenencias; en esta metáfora de despojo, ''bienes'' conserva la amplitud semántica sin limitarse a ''vasijas'' ni volverlo demasiado abstracto.'
- source_word: ἁρπάσαι
  english_pob_choice: seize
  chosen_spanish: arrebatar
  alternatives_spanish:
  - tomar por la fuerza
  - apoderarse de
  - robar
  lexicon: BDAG
  rationale: '''Arrebatar'' expresa la fuerza súbita del verbo sin adelantar plenamente la idea intensiva que luego aporta διαρπάσει.'
- source_word: ἐὰν μὴ πρῶτον δήσῃ
  english_pob_choice: unless he first binds
  chosen_spanish: a menos que primero ate
  alternatives_spanish:
  - si no ata primero
  - a menos que antes lo ate
  lexicon: BDAG
  rationale: '''Ate'' conserva el sentido de atar/bind; ''primero'' traslada πρῶτον y mantiene el orden argumental.'
- source_word: τὸν ἰσχυρόν
  english_pob_choice: the strong man
  chosen_spanish: al hombre fuerte
  alternatives_spanish:
  - al fuerte
  - al poderoso
  lexicon: BDAG
  rationale: Se repite la misma expresión sustantivada para mantener la referencia interna del pasaje y la fuerza metafórica.
- source_word: καὶ τότε
  english_pob_choice: And then
  chosen_spanish: Y entonces
  alternatives_spanish:
  - y después
  - entonces
  lexicon: BDAG
  rationale: Preserva la secuencia temporal explícita y el enlace narrativo del griego.
- source_word: διαρπάσει
  english_pob_choice: will plunder
  chosen_spanish: saqueará
  alternatives_spanish:
  - despojará
  - robará por completo
  - plundeará
  lexicon: BDAG
  rationale: El compuesto intensifica la acción más allá de 'arrebatar'; 'saqueará' comunica el despojo total de la casa con buena naturalidad en español.
- source_word: τὴν οἰκίαν αὐτοῦ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su vivienda
  lexicon: BDAG
  rationale: Se conserva el sentido concreto de la casa como objetivo del saqueo, sin convertirlo en una interpretación alegórica.
theological_decisions:
- issue: Lenguaje masculino representativo en la metáfora
  english_pob_reading: the strong man / someone
  chosen_spanish_reading: el hombre fuerte / alguien
  alternative_spanish_readings:
  - el fuerte / cualquiera
  - una persona fuerte / alguien
  rationale: El griego usa formas masculinas dentro de una comparación concreta; el español mantiene esa imaginería con 'hombre fuerte' y el sujeto indefinido 'alguien' sin alterar el alcance del enunciado.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Alcance metafórico de casa y bienes
  english_pob_reading: Retain the concrete burglary metaphor without importing a full allegorical explanation into the translation
  chosen_spanish_reading: Conservar la metáfora concreta de allanamiento y despojo
  alternative_spanish_readings:
  - reinterpretar como dominio y posesiones
  - explicitar una alusión espiritual
  rationale: La traducción deja intacta la imagen de robo/saqueo, ya que el texto no obliga a convertirla en paráfrasis interpretativa; la lectura teológica se deja al contexto, no al vocabulario.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 y 3
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en la auditoría inglesa y no requiere cambios revisionales; se ha mantenido la estructura retórica, la metáfora de despojo y la progresión temporal del original griego.
  spanish_consistency_notes:
  - Se usó 'hombre fuerte' para reflejar la expresión sustantivada masculina del griego, en paralelo con la decisión inglesa.
  - '''Arrebatar'' se reservó para ἁρπάσαι y ''saqueará'' para διαρπάσει, preservando la diferencia aspectual/intensiva entre ambos verbos.'
  - '''Bienes'' se eligió como término amplio y natural para σκεύη en este contexto de robo.'
  - La secuencia 'a menos que primero ate' / 'Y entonces' reproduce la lógica condicional y consecutiva del texto griego.
