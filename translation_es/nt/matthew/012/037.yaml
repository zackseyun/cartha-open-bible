translation:
  language: es
  text: Porque por tus palabras serás justificado[a], y por tus palabras serás condenado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'serás vindicado' o 'serás absuelto'. El verbo griego puede llevar un sentido judicial de ser declarado en lo correcto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - a partir de
  - mediante
  - en base a
  lexicon: BDAG
  rationale: ἐκ con genitivo señala base o fundamento del veredicto. En español, 'por' comunica de forma natural ese fundamento instrumental o evidencial sin perder el matiz forense.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón de la afirmación anterior. 'Porque' reproduce esa relación causal o explicativa en español actual de manera clara y sobria.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras dichas
  - expresiones
  - dichos
  lexicon: BDAG
  rationale: λόγος en plural aquí se refiere a expresiones habladas. 'Palabras' conserva la repetición paralela y la naturalidad del castellano.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tus
  alternatives_spanish:
  - de ti
  - tuyas
  lexicon: BDAG
  rationale: El pronombre genitivo posee valor posesivo directo. 'Tus' mantiene la relación inmediata con 'palabras' en ambas cláusulas.
- source_word: δικαιωθήσῃ
  english_pob_choice: you will be justified
  chosen_spanish: serás justificado[a]
  alternatives_spanish:
  - serás vindicado
  - serás absuelto
  - serás declarado justo
  lexicon: BDAG
  rationale: El futuro pasivo de δικαιόω en este contexto es judicial. 'Serás justificado' conserva el registro forense y la conexión bíblica del término, mientras que la nota preserva las alternativas semánticas que el inglés POB explicitó.
- source_word: καταδικασθήσῃ
  english_pob_choice: you will be condemned
  chosen_spanish: serás condenado
  alternatives_spanish:
  - serás sentenciado
  - serás hallado culpable
  lexicon: BDAG
  rationale: καταδικάζω expresa condena judicial y forma el contraste deliberado con δικαιόω. 'Serás condenado' es el equivalente español más claro y mantiene la antítesis del texto.
theological_decisions:
- issue: Sentido forense de δικαιόω en relación con palabras y juicio
  english_pob_reading: you will be justified, with the note that the Greek can also mean vindicated or acquitted in a judicial sense
  chosen_spanish_reading: serás justificado, entendido en sentido judicial
  alternative_spanish_readings:
  - serás vindicado
  - serás absuelto
  - serás declarado justo
  rationale: El contraste inmediato con 'serás condenado' hace explícito el marco de tribunal. 'Justificado' conserva la continuidad canónica y teológica del verbo sin cargar aquí una formulación doctrinal completa ajena al versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La comparación con el texto griego SBLGNT y el audit trail inglés muestra alta concordancia; no se registran revisiones aplicadas en la fuente base. La versión española mantiene la antítesis judicial y la nota conserva las alternativas léxicas documentadas para δικαιωθήσῃ.
  spanish_consistency_notes:
  - Se preservó Yahvé no porque el verso no contiene el nombre divino, sino para mantener coherencia terminológica del proyecto cuando corresponda.
  - Se eligió 'por' para ἐκ porque en español expresa mejor la base o evidencia del veredicto que un literal 'de' o 'desde'.
  - Se mantuvo 'justificado' en lugar de 'declarado justo' para conservar la continuidad terminológica bíblica y la fuerza forense del texto.
  - Se usó 'condenado' como antítesis directa de 'justificado', siguiendo el contraste deliberado del griego.
