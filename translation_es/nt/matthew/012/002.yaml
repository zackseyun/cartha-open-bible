translation:
  language: es
  text: 'Pero cuando los fariseos lo vieron[a], le dijeron: «Mira, tus discípulos están haciendo lo que no es lícito hacer en sábado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que no está permitido hacer en sábado».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca contraste narrativo con la escena anterior; «Pero» comunica bien el valor adversativo en español natural sin añadir interpretación.
- source_word: ἰδόντες
  english_pob_choice: when ... saw it
  chosen_spanish: lo vieron
  alternatives_spanish:
  - al verlo
  - habiéndolo visto
  lexicon: BDAG
  rationale: 'El participio aoristo se integra de modo temporal en el español. El pronombre «lo» expresa el objeto implícito por el contexto: la acción de los discípulos.'
- source_word: εἶπαν αὐτῷ
  english_pob_choice: they said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le hablaron
  - le dijeron a él
  lexicon: BDAG
  rationale: Fórmula normal de habla directa; «le dijeron» es la equivalencia más breve y natural en español.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Fíjate
  lexicon: BDAG
  rationale: Interjección deíctica que llama la atención sobre la acusación. «Mira» conserva el impulso inmediato y evita el tono arcaico de «He aquí».
- source_word: μαθηταί
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el término establecido para μαθηταί en contextos de los Evangelios y preserva la relación maestro-discípulo.
- source_word: ποιοῦσιν ... ποιεῖν
  english_pob_choice: are doing ... to do
  chosen_spanish: están haciendo ... hacer
  alternatives_spanish:
  - hacen ... hacer
  - están realizando ... realizar
  lexicon: BDAG
  rationale: Se conserva la repetición de ποιέω con «hacer ... hacer» para reflejar el énfasis acusatorio del griego sin suavizarlo.
- source_word: ὃ οὐκ ἔξεστιν
  english_pob_choice: what is not lawful
  chosen_spanish: lo que no es lícito
  alternatives_spanish:
  - lo que no está permitido
  - lo que no es legal
  lexicon: BDAG
  rationale: ἔξεστιν expresa lo permitido o permitido por norma; «lícito» reproduce bien el registro legal-religioso de la objeción farisea sin decidir si la base es la Ley escrita o una tradición interpretativa.
- source_word: ἐν σαββάτῳ
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - durante el sábado
  - en el día de reposo
  lexicon: BDAG
  rationale: «En sábado» es la forma más natural en español para la observancia del día. Mantiene la referencia institucional sin imponer una glosa explicativa.
theological_decisions:
- issue: Naturaleza de la objeción farisaica
  english_pob_reading: Render ἔξεστιν in legal-permissive terms ('not lawful') without specifying whether the issue is biblical law or Pharisaic tradition.
  chosen_spanish_reading: Traducir ἔξεστιν como «no es lícito» sin precisar si la base de la prohibición es la Ley bíblica o la tradición farisaica.
  alternative_spanish_readings:
  - no está permitido
  - es ilegal
  rationale: La frase presenta la acusación sin resolver su validez ni identificar con precisión su fuente normativa. «No es lícito» conserva la tensión textual y el registro jurídico-religioso del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje fue revisado y el último pase indicó que no se requerían cambios; la redacción española mantiene la equivalencia óptima del inglés auditado y la tensión legal del griego sin añadir glosas interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo para el nombre divino cuando aparezca; aquí no aplica.
  - Se mantiene «discípulos» para μαθηταί, conforme al uso estable en los Evangelios.
  - Se conserva el registro jurídico-religioso con «lícito» para ἔξεστιν, alineado con la decisión inglesa de «not lawful».
  - «En sábado» sigue el uso español natural para ἐν σαββάτῳ sin reescritura explicativa.
