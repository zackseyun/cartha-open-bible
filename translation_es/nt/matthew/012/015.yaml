translation:
  language: es
  text: Pero Jesús[a], al saber esto, se retiró de allí. Y lo siguieron muchos, y los sanó a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Jesús, al saberlo, se retiró de allí." El griego deja implícito el objeto de "saber"; el contexto anterior lo aporta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  english_pob_choice: knowing this
  chosen_spanish: al saber esto
  alternatives_spanish:
  - sabiéndolo
  - al conocerlo
  - al enterarse de esto
  lexicon: γινώσκω
  rationale: El participio aoristo expresa conocimiento previo que motiva la acción principal. En español, "al saber esto" conserva la relación causal/narrativa con el contexto anterior sin forzar un objeto explícito ajeno al texto. Mantiene la ambigüedad controlada del griego, que en la línea inmediata depende de lo dicho antes.
- source_word: ἀνεχώρησεν
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se retiró de allí
  - se fue
  lexicon: ἀναχωρέω
  rationale: '"Se retiró" comunica el matiz de apartarse/retirarse ante oposición o peligro, más preciso que un simple "se fue". En español suena natural y preserva la intención narrativa de retirada deliberada sin añadir cobardía ni exceso interpretativo.'
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de allí mismo
  lexicon: ἐκεῖθεν
  rationale: Adverbio locativo estándar de salida desde un lugar previamente mencionado. "De allí" es la forma más breve y natural en español, equivalente directo de "from there".
- source_word: ἠκολούθησαν αὐτῷ πολλοί
  english_pob_choice: many followed him
  chosen_spanish: lo siguieron muchos
  alternatives_spanish:
  - muchos lo siguieron
  - lo siguieron grandes multitudes
  - muchas personas lo siguieron
  lexicon: ἀκολουθέω
  rationale: El griego dice literalmente que "muchos" lo siguieron, sin especificar "multitudes". Se conserva esa simpleza. El orden "lo siguieron muchos" respeta mejor el énfasis del original y sigue siendo idiomático en español.
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: los sanó
  alternatives_spanish:
  - los curó
  - los sanó a todos
  lexicon: θεραπεύω
  rationale: En contexto evangélico, θεραπεύω se traduce naturalmente como "sanar". "Sanó" es breve, claro y estándar en español bíblico contemporáneo; evita una lectura demasiado técnica de "curar" y mantiene el foco en restauración de salud.
- source_word: αὐτοὺς πάντας
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - los sanó a todos
  lexicon: πᾶς
  rationale: El griego subraya el alcance total con πάντας. En español, "a todos" transmite esa fuerza distributiva de manera natural. En combinación con el objeto pronominal previo, mantiene claridad y fluidez.
theological_decisions:
- issue: Objeto implícito de γνοὺς
  english_pob_reading: Jesus knew the hostile intent/counsel described in the previous verse, rendered as 'knowing this.'
  chosen_spanish_reading: Jesús, al saber esto, se retiró de allí.
  alternative_spanish_readings:
  - Jesús, sabiendo eso, se retiró de allí.
  - Jesús, al enterarse de ello, se retiró de allí.
  rationale: El griego no expresa el objeto de "saber"; depende del contexto inmediato. "Esto" mantiene la referencia contextual sin sobreespecificar. Evita introducir palabras más interpretativas como "intento hostil" en el texto principal, pero sigue siendo perfectamente legible en español.
  doctrine_reference: Translation philosophy §1, §6
- issue: Matiz de la retirada de Jesús
  english_pob_reading: withdrew
  chosen_spanish_reading: se retiró
  alternative_spanish_readings:
  - se apartó
  - se retiró de allí
  - se fue
  rationale: La traducción debe reflejar una retirada intencional, no meramente un cambio de lugar. "Se retiró" conserva el matiz narrativo de prudencia ante la oposición, sin implicar temor indebido ni una tesis doctrinal añadida.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios necesarios y la evaluación comparativa indicó alto acuerdo. La redacción española sigue de cerca el texto griego y conserva la ambigüedad contextual de γνοὺς mediante una nota alternativa breve.'
  spanish_consistency_notes:
  - Se mantiene "Jesús" para Ἰησοῦς según el criterio del proyecto.
  - Se usa "sanó" para θεραπεύω en contexto de curación narrativa evangélica.
  - '"Se retiró" preserva el valor de ἀναχωρέω como retirada deliberada.'
  - No se introduce vocabulario eclesiástico no sustentado por el texto.
  - 'La nota al pie marca la única ambigüedad textual relevante: el objeto implícito de "saber".'
