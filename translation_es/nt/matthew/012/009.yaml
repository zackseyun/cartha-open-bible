lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Conserva la función coordinante simple del καί sin añadir matiz temporal que el griego no explicita.
- source_word: μεταβὰς
  english_pob_choice: departing
  chosen_spanish: apartándose
  alternatives_spanish:
  - partiendo
  - yéndose
  - dejando
  lexicon: BDAG
  rationale: El participio aoristo de μεταβαίνω expresa un desplazamiento desde el lugar anterior. «Apartándose» mantiene la idea de transición y suena natural en español bíblico actual.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde ese lugar
  - de aquel lugar
  lexicon: BDAG
  rationale: Reproduce el valor de procedencia espacial de forma directa y idiomática.
- source_word: ἦλθεν
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - se dirigió
  lexicon: BDAG
  rationale: En español narrativo, «fue» comunica el movimiento a un nuevo lugar de manera natural y cercana al valor del verbo de movimiento en contexto.
- source_word: εἰς τὴν συναγωγὴν
  english_pob_choice: into their synagogue
  chosen_spanish: a su sinagoga
  alternatives_spanish:
  - a la sinagoga de ellos
  - hacia su sinagoga
  lexicon: BDAG
  rationale: Aunque εἰς puede marcar entrada, en español «a» transmite con naturalidad el movimiento hacia ese destino; «sinagoga» conserva el término establecido para el lugar de reunión judío.
- source_word: συναγωγὴν
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  - lugar de reunión
  lexicon: BDAG
  rationale: «Sinagoga» es la equivalencia estable y precisa en este contexto; una glosa explicativa sería innecesariamente parfrástica.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de su gente
  lexicon: BDAG
  rationale: El posesivo singular en español suena natural con un antecedente plural implícito; se mantiene la referencia genitiva sin cargar el texto con una perífrasis más pesada.
theological_decisions:
- issue: Referencia de «su sinagoga»
  english_pob_reading: Rendered neutrally as 'their synagogue' without specifying a hostile or sectarian group.
  chosen_spanish_reading: «su sinagoga» se deja de forma neutral, sin identificar más allá del contexto narrativo.
  alternative_spanish_readings:
  - la sinagoga de ellos
  - su lugar de reunión
  rationale: El griego solo indica posesión con αὐτῶν; no añade una identificación polémica. La traducción conserva esa neutralidad y no introduce énfasis interpretativos adicionales.
  doctrine_reference: Mantener la tensión y la precisión del texto fuente sin resolverla por tradición interpretativa.
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en que no se requieren notas ni revisiones textuales: el griego es claro, y la versión inglesa aprobada también se mantiene sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; este versículo no lo contiene.
  - «Sinagoga» se mantiene como término técnico estable en español bíblico.
  - Se evita introducir matices de hostilidad o pertenencia sectaria que el griego no explicita.
  - La construcción «apartándose de allí, fue» preserva la secuencia narrativa sin sobreinterpretar el participio.
