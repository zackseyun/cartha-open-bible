review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la secuencia básica del griego: conexión narrativa, salida del lugar previo, movimiento hacia la sinagoga y posesivo neutral. Sin embargo, «a su sinagoga» debilita el valor direccional de εἰς («a/into») y además introduce una ambigüedad en español, porque «su» puede leerse como singular de cortesía o como posesivo de Jesús, mientras que αὐτῶν es plural explícito: «de ellos / their».'
  spanish_quality_summary: El español es claro y natural, pero la coma tras «Y» es innecesaria en español moderno, y «su sinagoga» suena algo ambiguo. «Apartándose de allí» es aceptable, aunque «al irse de allí» o «después de salir de allí» serían más coloquiales; no hace falta cambiarlo. La mejor reparación mínima es quitar la coma y explicitar el plural posesivo con «la sinagoga de ellos».
  glossary_alignment: No hay términos de glosario mayor en juego. «Sinagoga» está bien. La decisión teológica documentada de mantener «their synagogue» de forma neutral se preserva mejor con «la sinagoga de ellos» que con «su sinagoga», porque evita reasignar el referente.
  issues:
  - severity: medium
    issue: «su sinagoga» no refleja con suficiente claridad el plural de αὐτῶν
    rationale: El griego dice explícitamente «de ellos / their». En español, «su» puede ser plural, pero también singular y ambiguo respecto del referente. Dado que la decisión auditada subraya la neutralidad del posesivo plural, conviene explicitarlo.
  - severity: low
    issue: La coma después de «Y» es antinatural en español
    rationale: La conjunción inicial no lleva coma aquí; su presencia entorpece levemente la fluidez.
  - severity: low
    issue: «a su sinagoga» atenúa el matiz de entrada de εἰς
    rationale: Aunque «a» es posible en español, «entró en» no está en el griego y «a su sinagoga» puede sonar solo direccional. «Fue a la sinagoga de ellos» sigue siendo natural y preserva mejor el complemento sin introducir interpretación adicional.
  revised_spanish_text: Y apartándose de allí, fue a la sinagoga de ellos.
  revision_rationale: 'Se hace una corrección mínima para mejorar la fidelidad al plural αὐτῶν y la claridad del español: se elimina la coma tras «Y» y se sustituye «su sinagoga» por «la sinagoga de ellos», que preserva mejor la neutralidad y evita ambigüedad referencial.'
