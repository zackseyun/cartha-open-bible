translation:
  language: es
  text: En aquel tiempo Jesús pasó por los sembrados en sábado[a], y sus discípulos sintieron hambre y comenzaron a arrancar espigas y a comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «en los sábados», un plural idiomático que aquí significa «en sábado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῳ τῷ καιρῷ
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En esa ocasión
  - Por aquel tiempo
  lexicon: BDAG
  rationale: καιρός señala aquí una ocasión o momento narrativo, no una hora precisa. «En aquel tiempo» reproduce bien ese marcador temporal con naturalidad en español.
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: pasó
  alternatives_spanish:
  - fue
  - iba
  - caminó
  lexicon: BDAG
  rationale: En este contexto narrativo, πορεύομαι puede expresarse de manera natural como «pasó por» al ir a través de una zona; así se integra mejor con διὰ τῶν σπορίμων sin forzar una traducción demasiado literal.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: '[a]'
  alternatives_spanish:
  - en sábado
  - el sábado
  - en los sábados
  lexicon: BDAG
  rationale: La forma plural griega es idiomática para referirse al día de reposo. En español, «el sábado» o «en sábado» reflejarían la referencia singular habitual, pero la nota preserva la tensión entre la forma griega plural y el sentido contextual singular.
- source_word: διὰ τῶν σπορίμων
  english_pob_choice: through the grainfields
  chosen_spanish: por los sembrados
  alternatives_spanish:
  - por los campos de grano
  - por los trigales
  - por los campos sembrados
  lexicon: BDAG
  rationale: σπόριμος designa campos sembrados, especialmente de grano. «Sembrados» es breve, claro y suficientemente exacto para el lector español; «campos de grano» también sería posible, pero suena más explicativo que el griego.
- source_word: ἐπείνασαν
  english_pob_choice: became hungry
  chosen_spanish: sintieron hambre
  alternatives_spanish:
  - tuvieron hambre
  - se sintieron hambrientos
  lexicon: BDAG
  rationale: El aoristo puede presentar el surgimiento de la necesidad. «Sintieron hambre» comunica ese comienzo de la sensación con naturalidad; «tuvieron hambre» es también válido, pero un poco más estático.
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: ἄρχομαι con infinitivo marca el inicio de la acción. «Comenzaron» mantiene esa función de manera directa y formal.
- source_word: τίλλειν
  english_pob_choice: to pluck
  chosen_spanish: arrancar
  alternatives_spanish:
  - desgajar
  - desprender
  - cortar
  lexicon: BDAG
  rationale: τίλλω implica jalar o arrancar algo con la mano. «Arrancar» conserva esa fuerza; «cortar» introduciría una acción distinta.
- source_word: στάχυας
  english_pob_choice: heads of grain
  chosen_spanish: espigas
  alternatives_spanish:
  - espigas de grano
  - cabecillas de grano
  lexicon: BDAG
  rationale: στάχυς es la espiga o cabeza del cereal. «Espigas» es el equivalente español más natural y preciso.
- source_word: ἐσθίειν
  english_pob_choice: and eat
  chosen_spanish: y a comer
  alternatives_spanish:
  - y comer
  - y para comer
  lexicon: BDAG
  rationale: En español, después de «comenzaron», la coordinación más natural es «a comer». Mantiene la estructura verbal del griego sin recargar la frase.
theological_decisions:
- issue: Referencia al Sabbath/sábado en plural griego
  english_pob_reading: on the Sabbath
  chosen_spanish_reading: «el sábado» en sentido idiomático, con nota sobre el plural griego
  alternative_spanish_readings:
  - «en los sábados»
  - «en sábado»
  rationale: No se trata de múltiples días, sino de un uso idiomático plural para el día de reposo. La nota conserva la observación filológica sin imponer una traducción engañosa al lector español.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el expediente auditado en inglés. Se mantiene el valor idiomático de σάββασιν sin volverlo una pluralidad literal, y se conserva la secuencia narrativa simple del versículo sin añadir explicaciones no presentes en la fuente.
  spanish_consistency_notes:
  - «Jesús» se usa para Ἰησοῦς conforme al estándar del proyecto.
  - «Espigas» comunica mejor στάχυας que una paráfrasis más larga.
  - Se prefirió «sembrados» para διὰ τῶν σπορίμων por ser breve, claro y fiel al campo semántico de campos sembrados de grano.
  - La coordinación «comenzaron a arrancar ... y a comer» conserva la doble acción infinitiva del griego de manera idiomática en español.
