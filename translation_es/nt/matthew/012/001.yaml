  - severity: low
    issue: La formulación de la nota «en el sábado» suena menos natural en español.
    rationale: En español eclesial y general, «el sábado» o «en sábado» expresa mejor el valor idiomático sin rigidez innecesaria.
  revised_spanish_text: En aquel tiempo Jesús pasó por los sembrados en sábado[a], y sus discípulos sintieron hambre y comenzaron a arrancar espigas y a comer.
