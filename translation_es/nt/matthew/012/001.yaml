    rationale: El griego incluye explícitamente esta información, y el inglés POB también la conserva en el cuerpo del texto. Sustituirla por una nota desalineada no preserva el significado completo.
  - severity: medium
    issue: La nota está anclada en «pasó[a]», pero el contenido de la nota corresponde a «sábado».
