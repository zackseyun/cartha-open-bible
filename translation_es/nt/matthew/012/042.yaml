translation:
  language: es
  text: La reina del Sur[b] se levantará en el juicio con esta generación y la condenará, porque vino de los extremos de la tierra para oír la sabiduría de Salomón, y he aquí, algo mayor que Salomón está aquí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno mayor que Salomón está aquí». El griego usa una forma neutra («algo mayor»), que puede subrayar la grandeza que supera a Salomón presente en Jesús y su ministerio.
    reason: alternative_reading
  - marker: b
    text: La «reina del Sur» alude a la reina de Saba (1 Reyes 10:1–13; 2 Crónicas 9:1–12), aunque el griego no la nombra explícitamente.
    reason: cross_reference
lexical_decisions:
- source_word: βασίλισσα νότου
  english_pob_choice: the queen of the South
  chosen_spanish: la reina del Sur
  alternatives_spanish:
  - la reina del sur
  - la reina de Saba
  lexicon: BDAG
  rationale: Mantengo la construcción geográfica directa del griego. «Sur» con mayúscula sigue la decisión inglesa de tratarlo como designación geográfica, pero en español la minúscula también sería posible; no se nombra a Saba porque el griego no la menciona explícitamente.
- source_word: ἐγερθήσεται
  english_pob_choice: will rise up
  chosen_spanish: se levantará
  alternatives_spanish:
  - será levantada
  - se pondrá de pie
  lexicon: BDAG
  rationale: El futuro pasivo de ἐγείρω puede expresar levantarse o ser levantada. «Se levantará» conserva la fuerza judicial/resurreccional sin forzar el mecanismo en español.
- source_word: ἐν τῇ κρίσει
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio final
  - en el juicio escatológico
  lexicon: BDAG
  rationale: «Juicio» es el equivalente natural y fiel de κρίσις. Añadir «final» o «escatológico» precisaría más de lo que el texto griego dice.
- source_word: μετὰ τῆς γενεᾶς ταύτης
  english_pob_choice: with this generation
  chosen_spanish: con esta generación
  alternatives_spanish:
  - contra esta generación
  - junto con esta generación
  lexicon: BDAG
  rationale: μετά con genitivo normalmente significa «con». Conservo ese valor y dejo que la fuerza adversativa venga de «la condenará».
- source_word: κατακρινεῖ αὐτήν
  english_pob_choice: and will condemn it
  chosen_spanish: la condenará
  alternatives_spanish:
  - condenará a esta generación
  - la sentenciará
  lexicon: BDAG
  rationale: «Condenará» expresa bien κατακρίνω. En español no hace falta repetir «a esta generación» porque el antecedente femenino ya es claro por el contexto.
- source_word: ἐκ τῶν περάτων τῆς γῆς
  english_pob_choice: from the ends of the earth
  chosen_spanish: de los extremos de la tierra
  alternatives_spanish:
  - desde los confines de la tierra
  - de los confines del mundo
  lexicon: BDAG
  rationale: «Extremos de la tierra» reproduce el modismo de distancia extrema. «Confines» sería igualmente viable, pero «extremos» refleja bien el paralelismo con el inglés POB y el griego idiomático.
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito. «Oír» mantiene la simpleza formal del griego; «escuchar» añadiría una matización más voluntaria que el texto no exige.
- source_word: τὴν σοφίαν Σολομῶνος
  english_pob_choice: the wisdom of Solomon
  chosen_spanish: la sabiduría de Salomón
  alternatives_spanish:
  - la sabiduría salomónica
  - la sabiduría de Salomón
  lexicon: BDAG
  rationale: Conservo la construcción genitiva directa. «Sabiduría salomónica» suena más interpretativa y menos transparente para una lectura pública.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: BDAG
  rationale: «He aquí» preserva el tono enfático y solemne de ἰδού en un registro natural para español bíblico sin quedar demasiado arcaico.
- source_word: πλεῖον Σολομῶνος
  english_pob_choice: something greater than Solomon
  chosen_spanish: algo mayor que Salomón
  alternatives_spanish:
  - uno mayor que Salomón
  - algo más grande que Salomón
  lexicon: BDAG
  rationale: El neutro πλεῖον se conserva mejor con «algo mayor» que con «uno mayor», evitando resolver de antemano la referencia hacia una persona masculina concreta. Esto mantiene la tensión documental que el POB inglés preserva.
- source_word: ὧδε
  english_pob_choice: is here
  chosen_spanish: está aquí
  alternatives_spanish:
  - aquí está
  - aquí
  lexicon: BDAG
  rationale: En español hace falta explicitar el verbo. «Está aquí» es la forma más natural y mantiene el deíctico del griego.
theological_decisions:
- issue: Cómo preservar el neutro comparativo πλεῖον sin perder la referencia a Jesús
  english_pob_reading: something greater than Solomon
  chosen_spanish_reading: algo mayor que Salomón
  alternative_spanish_readings:
  - uno mayor que Salomón
  - más que Salomón
  rationale: 'El griego usa un neutro, no un masculino personal. Traducir «algo mayor» conserva la forma y la amplitud semántica: la grandeza que supera a Salomón, presente en Jesús y su ministerio, sin borrar la tensión entre forma gramatical y referente cristológico.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla prematuramente.'
- issue: Referencia implícita a la reina de Saba
  english_pob_reading: The 'queen of the South' alludes to the queen of Sheba
  chosen_spanish_reading: La «reina del Sur» allude a la reina de Saba, aunque el griego no la nombra
  alternative_spanish_readings:
  - identificar directamente a la reina de Saba
  - dejarla sin identificación
  rationale: 'Sigo el mismo equilibrio del POB inglés: el texto griego dice «reina del Sur» y la identificación con Saba pertenece al trasfondo bíblico, no a la forma explícita del versículo.'
  doctrine_reference: Principio POB de distinguir entre texto explícito y trasfondo canónico.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del audit trail inglés y del griego SBLGNT. No se detectaron revisiones aplicadas en el registro fuente; por ello la redacción española sigue la lectura estable, preservando la tensión del neutro πλεῖον y el trasfondo implícito de la reina de Saba sin introducir armonizaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «Mesías»/«Cristo» fuera de este pasaje; aquí el texto contrasta con Salomón, no con un título mesiánico explícito.
  - «Juicio» se usa para κρίσις, y «condenará» para κατακρίνω, manteniendo la diferencia léxica.
  - La mayúscula en «Sur» sigue la pauta del audit trail inglés; podría normalizarse a minúscula según estilo editorial español sin cambiar el sentido.
