translation:
  language: es
  text: ¡Cuánto más vale, entonces, un hombre que una oveja! Así que es lícito hacer el bien en los sábados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: ''en sábado''. El griego usa el plural ''en los sábados'', un modismo común para la observancia del sábado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πόσῳ
  english_pob_choice: How much more
  chosen_spanish: Cuánto más
  alternatives_spanish:
  - Cuánto
  - Por cuánto
  lexicon: BDAG
  rationale: La construcción comparativa conserva el valor argumentativo de ‘how much more’ en español natural, manteniendo la fuerza del argumento de menor a mayor.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Expresa la inferencia del razonamiento anterior sin sonar forzado; en español combina bien con la pregunta retórica inicial.
- source_word: διαφέρει
  english_pob_choice: is more valuable
  chosen_spanish: vale más
  alternatives_spanish:
  - es más valioso
  - supera en valor
  lexicon: BDAG
  rationale: En este contexto el verbo comunica valor comparativo. ‘Vale más’ reproduce de forma natural la valoración implícita sin perder la comparación de peso argumental.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: BDAG
  rationale: Se mantiene el singular masculino representativo como en el griego y como en la decisión auditada en inglés, sin neutralizar innecesariamente la forma gramatical.
- source_word: προβάτου
  english_pob_choice: a sheep
  chosen_spanish: una oveja
  alternatives_spanish:
  - un cordero
  - una res ovina
  lexicon: BDAG
  rationale: ‘Oveja’ es el equivalente natural y fiel; el genitivo comparativo se expresa en español con ‘que’.
- source_word: ἔξεστιν
  english_pob_choice: it is lawful
  chosen_spanish: es lícito
  alternatives_spanish:
  - está permitido
  - es permitido
  lexicon: BDAG
  rationale: ‘Lícito’ conserva bien el matiz legal/ético del debate sobre el sábado, más preciso que una mera posibilidad o permiso informal.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbaths
  chosen_spanish: en los sábados
  alternatives_spanish:
  - en el sábado
  - durante los sábados
  lexicon: BDAG
  rationale: Se preserva el plural del griego para transparencia al texto fuente, aun cuando en español la forma más idiomática suele ser singular. Aquí ‘en los sábados’ mantiene la huella del plural sin sonar demasiado extraña.
- source_word: καλῶς ποιεῖν
  english_pob_choice: to do good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - hacer lo bueno
  - actuar bien
  lexicon: BDAG
  rationale: La expresión griega es un modismo de acción benéfica; en español ‘hacer el bien’ es natural y cercano al sentido del original.
theological_decisions:
- issue: Argumento de mayor a menor en una pregunta retórica
  english_pob_reading: How much more valuable, then, is a man than a sheep!
  chosen_spanish_reading: ¿Cuánto más vale, entonces, un hombre que una oveja!
  alternative_spanish_readings:
  - ¿Cuánto más valioso es, entonces, un hombre que una oveja!
  - ¡Cuánto más vale, entonces, un hombre que una oveja!
  rationale: La estructura interrogativa retórica comunica mejor el razonamiento de Jesús que una afirmación llana; el español conserva la fuerza argumentativa y la exclamación del cierre.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
- issue: Plural idiomático de ‘Sabbaths’
  english_pob_reading: on the Sabbaths
  chosen_spanish_reading: en los sábados
  alternative_spanish_readings:
  - en el sábado
  - en sábado
  rationale: El griego usa el plural σάββασιν. Mantener el plural en español sirve a la transparencia auditada; sin embargo, el sentido sigue siendo observancia sabática, no una pluralidad de días distintos.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 y 5
translation_notes:
  revision_awareness: La redacción sigue el giro retórico y la puntuación revisada del inglés auditado, manteniendo la exclamación después de ‘oveja’ para reflejar la fuerza del argumento. También conserva la pluralidad de ‘sábados’ por transparencia al griego, con nota de alternativa más idiomática.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no lo contiene.
  - Se usó ‘es lícito’ para reproducir el matiz legal de ἔξεστιν.
  - Se preservó el plural de σάββασιν en el texto principal y se aclaró su idiomatismo en nota.
  - ‘Hacer el bien’ refleja mejor el modismo καλῶς ποιεῖν que una traducción literal palabra por palabra.
