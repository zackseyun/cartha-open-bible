translation:
  language: es
  text: Y todo el que diga una palabra contra el Hijo del Hombre[a], le será perdonado; pero todo el que diga contra el Espíritu Santo, no le será perdonado[c][b], ni en esta era ni en la venidera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «diga una palabra» puede verterse «hable una palabra» o «pronuncie una palabra».'
    reason: lexical_alternative
  - marker: b
    text: αἰών significa aquí «era»; la versión tradicional en español a menudo dice «mundo».
    reason: lexical_alternative
  - marker: c
    text: 'O más explícitamente: «ni en la era venidera». El griego dice literalmente «ni en la venidera», y se sobreentiende «era» por la frase anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς ἐὰν / ὃς δ’ ἂν
  english_pob_choice: whoever ... but whoever
  chosen_spanish: cualquiera que ... pero cualquiera que
  alternatives_spanish:
  - quienquiera que ... pero quienquiera que
  - todo el que ... pero todo el que
  lexicon: BDAG
  rationale: La construcción relativa con ἐὰν / ἄν expresa una condición general e indefinida. «Cualquiera que» conserva ese valor abierto y suena natural en español bíblico contemporáneo.
- source_word: εἴπῃ λόγον
  english_pob_choice: speaks a word
  chosen_spanish: diga una palabra
  alternatives_spanish:
  - hable una palabra
  - pronuncie una palabra
  lexicon: BDAG
  rationale: λέγω con λόγον es idiomático; «diga una palabra» mantiene la presencia de λόγον y refleja con claridad el acto de hablar sin sobreparafrasear.
- source_word: κατὰ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en contra de
  - frente a
  lexicon: BDAG
  rationale: En ambos miembros de la frase, κατά con genitivo expresa habla hostil dirigida a alguien. «Contra» es la forma directa y idiomática en español.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  - el Hijo del ser humano
  lexicon: BDAG
  rationale: Se conserva el título establecido y su resonancia mesiánica/apocalíptica. No se reduce a «el hombre» ni se reformula, porque el griego usa una designación fija.
- source_word: ἀφεθήσεται αὐτῷ
  english_pob_choice: it will be forgiven him
  chosen_spanish: le será perdonado
  alternatives_spanish:
  - se le perdonará
  - le será absuelto
  lexicon: BDAG
  rationale: El pasivo futuro de ἀφίημι se mantiene con una construcción pasiva impersonal en español. «Le será perdonado» conserva el foco en la falta o palabra dicha, sin cambiar innecesariamente la voz.
- source_word: τοῦ πνεύματος τοῦ ἁγίου
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo
  - el Espíritu Sagrado
  lexicon: BDAG
  rationale: Es la forma estable y fiel en español para el título. La mayúscula en «Espíritu Santo» preserva el referente personal divino.
- source_word: οὐκ ἀφεθήσεται αὐτῷ
  english_pob_choice: it will not be forgiven him
  chosen_spanish: no le será perdonado
  alternatives_spanish:
  - no se le perdonará
  - no le será absuelto
  lexicon: BDAG
  rationale: Se conserva la misma estructura pasiva que en la primera cláusula para mantener el contraste y la simetría del texto.
- source_word: οὔτε ἐν τούτῳ τῷ αἰῶνι
  english_pob_choice: neither in this age
  chosen_spanish: ni en esta era
  alternatives_spanish:
  - ni en esta edad
  - ni en este siglo
  lexicon: BDAG
  rationale: αἰών se entiende aquí temporalmente. «Era» comunica bien la contraposición escatológica y evita la lectura espacial de «mundo».
- source_word: οὔτε ἐν τῷ μέλλοντι
  english_pob_choice: nor in the coming one
  chosen_spanish: ni en la venidera
  alternatives_spanish:
  - ni en la venidera era
  - ni en la era venidera
  lexicon: BDAG
  rationale: El participio sustantivado μέλλοντι depende del αἰῶνι anterior; en español se puede recuperar el sustantivo implícito. «La venidera» conserva la elipsis griega y sigue siendo comprensible.
theological_decisions:
- issue: Contraste temporal de αἰών / μέλλων
  english_pob_reading: neither in this age nor in the coming one
  chosen_spanish_reading: ni en esta era ni en la venidera
  alternative_spanish_readings:
  - ni en este mundo ni en el mundo venidero
  - ni en esta edad ni en la edad venidera
  rationale: La frase contrasta el orden presente con el futuro, no espacios físicos. «Era» preserva el marco escatológico y evita importar la fórmula tradicional «mundo» donde el griego no la exige.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Alcance del pecado imperdonable
  english_pob_reading: Retain the text's warning without specifying a later doctrinal definition of 'blasphemy against the Holy Spirit'.
  chosen_spanish_reading: Mantener la advertencia del texto sin definirla más allá de lo que el versículo dice.
  alternative_spanish_readings:
  - Definirlo como una blasfemia histórica única contra los exorcismos de Jesús
  - Entenderlo como una impenitencia final
  rationale: El versículo nombra la consecuencia de hablar contra el Espíritu Santo, pero no desarrolla aquí una definición doctrinal posterior. La traducción conserva la advertencia y deja la explicación interpretativa fuera del texto principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Sin cambios aplicados respecto del último pase revisado; el texto fuente y el control cruzado mostraron alto acuerdo, por lo que se preserva la solución aprobada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva «Espíritu Santo» con mayúscula por tratarse del referente divino personal.
  - Se eligió «era» para αἰών en coherencia con la lectura temporal del contexto escatológico.
  - Se mantuvo la pasiva impersonal «le será perdonado» / «no le será perdonado» para reflejar ἀφεθήσεται.
  - El marcador [c][b] sigue la secuencia de anclaje del texto auditado para preservar la correspondencia con la tradición del registro.
