translation:
  language: es
  text: 'Por eso les digo[a]: todo pecado y blasfemia serán perdonados a la gente, pero la blasfemia contra el Espíritu no será perdonada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «blasfemia contra el Espíritu Santo». El referente es el Espíritu Santo por el contexto cercano, aunque este versículo dice simplemente «el Espíritu».
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa la conclusión lógica del contexto inmediato con naturalidad en español, manteniendo el valor inferencial de la frase.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: Conserva la dirección al auditorio y el tono solemne sin sonar forzado en español contemporáneo.
- source_word: πᾶσα ἁμαρτία καὶ βλασφημία
  english_pob_choice: every sin and blasphemy
  chosen_spanish: todo pecado y blasfemia
  alternatives_spanish:
  - cada pecado y blasfemia
  - todo pecado y toda blasfemia
  lexicon: BDAG
  rationale: '"Todo" reproduce bien el valor distributivo con sustantivos singulares; la coordinación mantiene el paralelismo del griego.'
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado moral
  lexicon: BDAG
  rationale: Término teológico estándar y claro en español para ἁμαρτία.
- source_word: βλασφημία
  english_pob_choice: blasphemy
  chosen_spanish: blasfemia
  alternatives_spanish:
  - calumnia
  - injuria religiosa
  lexicon: BDAG
  rationale: En este contexto se trata de discurso irreverente u hostil contra lo divino; "blasfemia" conserva la fuerza técnica mejor que opciones más amplias.
- source_word: ἀφεθήσεται
  english_pob_choice: will be forgiven
  chosen_spanish: será perdonado
  alternatives_spanish:
  - será perdonada
  - será remitido
  lexicon: BDAG
  rationale: El pasivo futuro de ἀφίημι aquí significa perdón. Se usa el masculino singular genérico en español por el sujeto compuesto resumido "todo pecado y blasfemia".
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: people
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a la gente
  lexicon: BDAG
  rationale: El dativo marca los destinatarios del perdón. Se conserva una traducción genérica que refleja la referencia humana amplia del griego; "a las personas" sería también posible, pero "a los hombres" es más directo y tradicionalmente reconoce el valor colectivo del término.
- source_word: ἡ δὲ τοῦ πνεύματος βλασφημία
  english_pob_choice: but blasphemy against the Spirit
  chosen_spanish: pero la blasfemia contra el Espíritu
  alternatives_spanish:
  - pero la blasfemia del Espíritu
  - pero la blasfemia contra el Espíritu Santo
  lexicon: BDAG
  rationale: El genitivo se entiende mejor como objeto de la blasfemia, por eso se traduce con "contra". Se mantiene "Espíritu" en el texto principal porque el griego de este versículo no añade ἁγίου.
- source_word: πνεύματος
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - Espíritu Santo
  lexicon: BDAG
  rationale: Respeta el texto de este versículo, que dice simplemente "el Espíritu". La identificación con el Espíritu Santo proviene del contexto inmediato, no de una expansión en el cuerpo del versículo.
theological_decisions:
- issue: Si traducir πνεύματος como "Espíritu" o expandir a "Espíritu Santo" en el texto principal
  english_pob_reading: Spirit in main text; Holy Spirit preserved as alternative reading in footnote
  chosen_spanish_reading: Espíritu en el texto principal
  alternative_spanish_readings:
  - Espíritu Santo
  rationale: El griego de Mateo 12:31 dice solo τοῦ πνεύματος. Aunque el contexto identifica claramente al Espíritu Santo, la lectura principal conserva el modo en que este versículo lo formula y deja la expansión para nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión para hacer más natural la primera cláusula, pero mantuvo la estructura pasiva y el contraste con la segunda cláusula. La redacción española sigue ese criterio: conserva la pasiva de perdón y expresa con claridad el genitivo como "contra el Espíritu".'
  spanish_consistency_notes:
  - Se mantiene «Espíritu» sin expansión en el texto principal para respetar el griego del versículo, con ampliación solo en nota.
  - «Perdonado» se usa en voz pasiva para reflejar ἀφεθήσεται; no se reexpresa como construcción activa para no perder el paralelismo del original.
  - Se prefirió «Por eso» como equivalente natural de διὰ τοῦτο, manteniendo el sentido inferencial sin sobrecargar el registro.
