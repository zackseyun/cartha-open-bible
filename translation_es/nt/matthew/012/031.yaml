revisions:
- from: 'Por eso les digo[a]: todo pecado y blasfemia será perdonado[b] a los hombres, pero la blasfemia contra el Espíritu no será perdonada.'
  to: 'Por eso les digo[a]: todo pecado y blasfemia serán perdonados a la gente, pero la blasfemia contra el Espíritu no será perdonada.'
  rationale: Se corrige la concordancia española («serán perdonados»), se sustituye «a los hombres» por el genérico natural «a la gente» para reflejar mejor τοῖς ἀνθρώποις, y se elimina la nota b porque no aportaba una alternativa real. Se mantiene «Espíritu» en el texto principal con nota para «Espíritu Santo», conforme a la decisión fuente-documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:06:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: «Por eso les digo», «todo pecado y blasfemia», el contraste con «la blasfemia contra el Espíritu», y la decisión de mantener «Espíritu» en el texto principal con nota para «Espíritu Santo» están bien alineados con la evidencia fuente y con el expediente inglés. Sin embargo, hay un problema de fidelidad/claridad en la primera cláusula: «será perdonado a los hombres» usa singular masculino («perdonado») con sujeto coordinado femenino («todo pecado y blasfemia»), lo cual es gramaticalmente deficiente en español y oscurece la relación sintáctica del original.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «a los hombres» suena innecesariamente masculino donde el griego es genérico, y «será perdonado» debería concordar con «blasfemia» en la coordinación resumida mejor como plural: «serán perdonados». Además, la nota b actualmente repite esencialmente la lectura principal y no aporta una alternativa útil. Una formulación más natural y fiel en español es «todo pecado y blasfemia serán perdonados a la gente» o «a las personas».'
  glossary_alignment: Se respeta correctamente «Espíritu»/«Espíritu Santo» según la decisión documentada. «Blasfemia» y «pecado» están bien. La principal desviación terminológica es «a los hombres» para τοῖς ἀνθρώποις; según el expediente inglés y la política de precisión de género, conviene un genérico inclusivo como «a la gente» o «a las personas».
  issues:
  - severity: medium
    issue: Concordancia verbal/adjetival defectuosa en «todo pecado y blasfemia será perdonado»
    rationale: 'Con dos sustantivos coordinados, el español natural y correcto aquí pide plural: «serán perdonados» o una reestructuración equivalente. La forma singular masculina resulta torpe y menos fiel al sentido distributivo de πᾶσα ἁμαρτία καὶ βλασφημία.'
  - severity: medium
    issue: «a los hombres» no refleja de la mejor manera el valor genérico de τοῖς ἀνθρώποις
    rationale: En español contemporáneo de registro eclesial amplio, «a los hombres» puede sonar masculino-exclusivo. El griego es genérico (‘people/human beings’), y el expediente inglés ya evitó ‘men’. «A la gente» o «a las personas» comunica mejor el referente humano general.
  - severity: low
    issue: La nota b no preserva una alternativa significativa
    rationale: La nota «O “será perdonado a los hombres”» coincide prácticamente con el texto principal y no ayuda al lector. Si se mantiene una nota, debería reflejar una alternativa real; de lo contrario, debe omitirse.
  revised_spanish_text: 'Por eso les digo[a]: todo pecado y blasfemia serán perdonados a la gente, pero la blasfemia contra el Espíritu no será perdonada.'
  revised_footnotes:
  - marker: a
    text: O «blasfemia contra el Espíritu Santo». El referente es el Espíritu Santo por el contexto cercano, aunque este versículo dice simplemente «el Espíritu».
    reason: alternative_reading
  revision_rationale: Se corrige la concordancia española («serán perdonados»), se sustituye «a los hombres» por el genérico natural «a la gente» para reflejar mejor τοῖς ἀνθρώποις, y se elimina la nota b porque no aportaba una alternativa real. Se mantiene «Espíritu» en el texto principal con nota para «Espíritu Santo», conforme a la decisión fuente-documentada.
