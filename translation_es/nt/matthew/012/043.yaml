translation:
  language: es
  text: Ahora bien, cuando el espíritu inmundo sale del hombre, pasa por lugares sin agua[a] buscando descanso, y no lo encuentra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lugares secos». El griego dice literalmente «lugares sin agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Introduce una condición temporal general. En español, «cuando» comunica de forma natural esa relación sin añadir matices no presentes en el griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - pero
  - y
  lexicon: BDAG
  rationale: Conserva el valor discursivo de transición suave que el POB inglés marcó con «Now». «Ahora bien» suena natural en español y no fuerza una oposición que el contexto no exige.
- source_word: τὸ ἀκάθαρτον πνεῦμα
  english_pob_choice: the unclean spirit
  chosen_spanish: el espíritu inmundo
  alternatives_spanish:
  - el espíritu impuro
  lexicon: BDAG
  rationale: «Inmundo» preserva mejor la resonancia de pureza/impureza del término bíblico en contextos de exorcismo. «Impuro» es posible, pero atenúa esa asociación tradicional del campo semántico sin ganancia clara aquí.
- source_word: ἐξέλθῃ
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale fuera
  - se va
  lexicon: BDAG
  rationale: El aoristo subjuntivo en una condición general se vierte naturalmente en presente español. «Sale» mantiene la sencillez y el movimiento de separación del hombre.
- source_word: ἀπὸ τοῦ ἀνθρώπου
  english_pob_choice: from the man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de la persona
  lexicon: BDAG
  rationale: El artículo griego apunta a un referente singular ilustrativo. «Del hombre» sigue el valor del original sin generalizar indebidamente a «persona».
- source_word: διέρχεται
  english_pob_choice: it passes through
  chosen_spanish: anda
  alternatives_spanish:
  - pasa por
  - recorre
  lexicon: BDAG
  rationale: Aquí el verbo expresa desplazamiento continuo por distintos lugares. «Anda» en español bíblico y moderno transmite esa errancia mejor que una simple repetición mecánica de «pasa».
- source_word: δι’ ἀνύδρων τόπων
  english_pob_choice: through waterless places
  chosen_spanish: por lugares sin agua
  alternatives_spanish:
  - por lugares desérticos
  - por parajes secos
  lexicon: BDAG
  rationale: El griego dice literalmente «sin agua». «Por lugares sin agua» conserva la imagen concreta y evita interpretar de antemano como «desérticos» o «secos».
- source_word: ζητοῦν
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - en busca de
  - buscando un lugar
  lexicon: BDAG
  rationale: El participio expresa una acción simultánea al desplazamiento. «Buscando» es natural en español y mantiene el valor verbal del original.
- source_word: ἀνάπαυσιν
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - alivio
  lexicon: BDAG
  rationale: «Descanso» es la equivalencia más directa y comprensible en español. «Reposo» sería posible, pero suena más literario y menos inmediato en este contexto.
- source_word: οὐχ εὑρίσκει
  english_pob_choice: does not find it
  chosen_spanish: no lo encuentra
  alternatives_spanish:
  - no encuentra descanso
  - no halla nada
  lexicon: BDAG
  rationale: El objeto es implícito en griego y se refiere al «descanso». En español, «lo encuentra» evita repetir el sustantivo y conserva la fluidez; el referente queda claro por contexto.
theological_decisions:
- issue: Naturaleza del πνεῦμα en contexto de exorcismo
  english_pob_reading: spirit rather than demon
  chosen_spanish_reading: espíritu inmundo
  alternative_spanish_readings:
  - demonio inmundo
  - espíritu demoníaco
  rationale: El texto griego no usa δαιμόνιον sino πνεῦμα. Traducirlo como «espíritu» respeta la forma de la fuente y evita introducir una especificación no dada por el término elegido en el original, aunque el referente sea malévolo.
  doctrine_reference: Principio de primacía del texto original; mantener la distinción lexical entre πνεῦμα y δαιμόνιον.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el borrador se mantiene alineado con el pasaje y con el razonamiento auditado del POB inglés.
  spanish_consistency_notes:
  - Se mantiene «espíritu inmundo» para conservar la terminología bíblica y la distinción lexical del griego.
  - Se traduce ἀνάπαυσις como «descanso», en armonía con el sentido directo del sustantivo.
  - Se evita «SEÑOR» o fórmulas de sustitución porque el versículo no contiene el nombre divino.
  - La nota al pie conserva la alternativa semántica relevante para ἀνύδρων sin sobreinterpretar el paisaje.
