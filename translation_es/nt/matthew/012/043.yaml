  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: πνεῦμα -> «espíritu», ἀκάθαρτον -> «inmundo», ἀνάπαυσιν -> «descanso». No hay conflictos con términos teológicos por defecto. La principal corrección es estilístico-lexical en διέρχεται y técnica en la ubicación de la nota.'
