translation:
  language: es
  text: Pero les digo que por toda palabra descuidada[a] que hablen las personas, darán cuenta el día del juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ociosa». El adjetivo griego puede significar «ociosa», «improductiva» o «descuidada».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: But I tell you
  chosen_spanish: Pero les digo
  alternatives_spanish:
  - Y les digo
  - Ahora les digo
  lexicon: BDAG
  rationale: λέγω en primera persona presente introduce una advertencia directa; «les digo» es natural en español. δέ añade contraste o continuación enfática; aquí «Pero» conserva el giro admonitorio del contexto sin forzar una oposición excesiva.
- source_word: πᾶν ῥῆμα
  english_pob_choice: every careless word
  chosen_spanish: toda palabra
  alternatives_spanish:
  - cada palabra
  - toda expresión
  - cada dicho
  lexicon: BDAG
  rationale: 'πᾶν con singular es distributivo: «todo/toda» en sentido de cada instancia. ῥῆμα refiere a una palabra o dicho pronunciado; «palabra» es la equivalencia más natural y suficientemente precisa en español.'
- source_word: ἀργὸν
  english_pob_choice: careless
  chosen_spanish: descuidada
  alternatives_spanish:
  - ociosa
  - inútil
  - vacía
  lexicon: BDAG
  rationale: ἀργός puede significar «ocioso», «inactivo» o «improductivo», pero en este contexto de discurso bajo juicio debe transmitir responsabilidad moral. «Descuidada» comunica habla negligente o irresponsable sin reducir el sentido a mera ociosidad.
- source_word: ὃ λαλήσουσιν οἱ ἄνθρωποι
  english_pob_choice: that people speak
  chosen_spanish: que hablen los seres humanos
  alternatives_spanish:
  - que hablen las personas
  - que digan los hombres
  - que pronuncien los seres humanos
  lexicon: BDAG
  rationale: λαλέω significa «hablar/decir»; en esta cláusula relativa, el futuro se expresa con naturalidad en español mediante subjuntivo futuro de relativo o presente de subjuntivo según estilo. οἱ ἄνθρωποι es genérico, así que «los seres humanos» mantiene la referencia inclusiva y el tono solemne.
- source_word: ἀποδώσουσιν
  english_pob_choice: they will give
  chosen_spanish: darán cuenta
  alternatives_spanish:
  - rendirán cuenta
  - responderán
  - darán un informe
  lexicon: BDAG
  rationale: Con λόγον, ἀποδίδωμι forma un modismo de rendir cuenta. En español, «darán cuenta» reproduce bien la expresión idiomática y conserva la fuerza judicial del contexto.
- source_word: περὶ αὐτοῦ λόγον
  english_pob_choice: an account for it
  chosen_spanish: de ella
  alternatives_spanish:
  - sobre ella
  - acerca de ella
  - por ella
  lexicon: BDAG
  rationale: El griego añade la materia de la rendición de cuentas con περί + genitivo. En español, la estructura idiomática ya queda expresada en «darán cuenta»; «de ella» explicita el objeto sin sobrecargar la frase. Se eligió femenino por concordancia con «palabra».
- source_word: ἐν ἡμέρᾳ κρίσεως
  english_pob_choice: on the day of judgment
  chosen_spanish: en el día del juicio
  alternatives_spanish:
  - en el día del juicio final
  - en el día de la condena
  - el día del juicio
  lexicon: BDAG
  rationale: ἐν con dativo temporal se puede verter naturalmente como «en» o «el día de». κρίσις aquí es juicio judicial; «juicio» conserva la amplitud jurídica del término sin introducir una concreción doctrinal no explícita en el griego.
theological_decisions:
- issue: Fuerza moral de ἀργός en una advertencia de juicio
  english_pob_reading: Rendered as 'careless' to convey culpable, irresponsible speech that is subject to divine judgment.
  chosen_spanish_reading: «Descuidada» comunica que no se trata solo de habla trivial, sino de palabras pronunciadas sin la atención moral debida y por ello sujetas al juicio de Dios.
  alternative_spanish_readings:
  - ociosa
  - inútil
  - vacía
  rationale: El contexto inmediato es judicial y ético; por eso la traducción debe llevar el peso de irresponsabilidad moral, no solo de falta de productividad. «Descuidada» mantiene la gravedad sin exagerar el matiz hacia malicia explícita.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance genérico de οἱ ἄνθρωποι
  english_pob_reading: Rendered inclusively as 'people.'
  chosen_spanish_reading: «Los seres humanos» refleja el valor genérico inclusivo del griego, no limitado a varones.
  alternative_spanish_readings:
  - las personas
  - los hombres
  - la gente
  rationale: El plural articular griego es genérico para la humanidad. «Los seres humanos» es claro, formal y evita una lectura exclusivamente masculina, conservando la intención inclusiva del original.
  doctrine_reference: Translation philosophy §4
- issue: Idiomático jurídico de ἀποδίδωμι + λόγον
  english_pob_reading: '''they will give an account'''
  chosen_spanish_reading: «darán cuenta» preserva la fórmula idiomática española de responsabilidad y evaluación.
  alternative_spanish_readings:
  - rendirán cuenta
  - darán un informe
  - responderán
  rationale: La combinación de ἀποδίδωμι con λόγον es un modismo de rendición de cuentas. «Darán cuenta» es la forma más estable y natural en español, y comunica tanto la obligación como el carácter forense del enunciado.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para eliminar una redundancia idiomática («for it») sin cambiar el sentido. En español, la formulación «darán cuenta de ella» ya expresa de manera natural el objeto de la rendición de cuentas, por lo que no requiere expansión adicional.
  spanish_consistency_notes:
  - Se mantuvo «juicio» para κρίσις, en continuidad con el uso POB del campo judicial.
  - Se evitó «palabras ociosas» como calco rígido; «descuidada» transmite mejor la fuerza ética en español contemporáneo.
  - La referencia anafórica femenina de «ella» sigue «palabra», no «rhema» como entidad neutra abstracta.
  - «Seres humanos» preserva el sentido genérico inclusivo de οἱ ἄνθρωποι.
  - La estructura «darán cuenta» conserva el modismo forense de ἀποδίδωμι + λόγον.
