    rationale: El inglés auditado eliminó «for it» por redundancia estilística; en español ocurre algo similar. El sentido permanece claro sin el pronombre explícito, y la frase queda más natural.
  - severity: low
    issue: «los seres humanos» suena más pesado de lo necesario
    rationale: Aunque fiel al valor genérico de οἱ ἄνθρωποι, «las personas» expresa la inclusividad con mayor naturalidad en español general y tono suficiente para el contexto.
  - severity: low
    issue: «en el día del juicio» es menos idiomático que «el día del juicio»
    rationale: Con expresiones temporales de este tipo, el español moderno prefiere normalmente omitir «en»; la referencia temporal sigue siendo plenamente clara.
  - severity: low
    issue: La razón de la nota [b] no coincide con el audit trail inglés
    rationale: La nota inglesa [b] preserva una redacción previa («they will give an account for it»), no una alternativa léxica principal. Si se mantiene una nota paralela en español, debe etiquetarse como previous_rendering.
  revised_spanish_text: Pero les digo que por toda palabra descuidada[a] que hablen las personas, darán cuenta el día del juicio.
