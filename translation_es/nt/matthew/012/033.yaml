translation:
  language: es
  text: O hagan[a] bueno el árbol y bueno su fruto, o hagan podrido el árbol y podrido su fruto[b]; porque por su fruto se conoce el árbol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El repetido «hagan» puede funcionar retóricamente como «consideren» o «muestren ser», pero la forma griega es imperativa.
    reason: alternative_reading
  - marker: b
    text: O «malo» en lugar de «podrido» para σαπρός; el griego puede denotar algo echado a perder, corrompido o sin valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιήσατε
  english_pob_choice: make
  chosen_spanish: hagan
  alternatives_spanish:
  - consideren
  - reconozcan
  - declaren
  lexicon: BDAG
  rationale: El imperativo aoristo plural de ποιέω conserva en español mejor la fuerza directa con «hagan». Mantiene el paralelismo retórico de la frase sin suavizarla a una paráfrasis interpretativa.
- source_word: δένδρον
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - árbol frutal
  - planta
  lexicon: BDAG
  rationale: El sentido básico es el de un árbol; «árbol» es natural en español y preserva la imagen metafórica central.
- source_word: καλός
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - sano
  - apropiado
  - excelente
  lexicon: BDAG
  rationale: En este contexto metafórico-moral, «bueno» reproduce mejor la amplitud de καλός que una opción más física como «sano».
- source_word: καρπός
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producto
  lexicon: BDAG
  rationale: «Fruto» es el equivalente español estable para la metáfora, y conserva tanto el sentido literal como el valor figurado.
- source_word: σαπρός
  english_pob_choice: rotten
  chosen_spanish: malo
  alternatives_spanish:
  - podrido
  - corrupto
  - dañado
  lexicon: BDAG
  rationale: Aunque el campo semántico incluye lo corrompido o echado a perder, en español «malo» preserva la oposición paralela con καλός sin forzar una imagen demasiado física. Se registra la alternativa más vívida en nota.
- source_word: ἐκ γὰρ τοῦ καρποῦ
  english_pob_choice: for ... by its fruit
  chosen_spanish: porque por su fruto
  alternatives_spanish:
  - pues por su fruto
  - porque a partir de su fruto
  - ya que por su fruto
  lexicon: BDAG
  rationale: La preposición ἐκ, en esta pasiva, se expresa de manera idiomática con «por», y γάρ con «porque», manteniendo la relación explicativa del griego.
- source_word: γινώσκεται
  english_pob_choice: is known
  chosen_spanish: se conoce
  alternatives_spanish:
  - es conocido
  - se reconoce
  - se identifica
  lexicon: BDAG
  rationale: La pasiva presente se vierte con la pasiva refleja «se conoce», que en español es clara, natural y suficientemente formal.
- source_word: αὐτοῦ
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - sus
  lexicon: BDAG
  rationale: El posesivo neutro referido a «árbol» se expresa naturalmente como «su» en español; el contexto elimina ambigüedad.
theological_decisions:
- issue: Fuerza imperativa de la metáfora
  english_pob_reading: Retained as direct imperatives ('make the tree...') rather than converting to declarative paraphrase.
  chosen_spanish_reading: Se mantienen los imperativos directos («hagan...»), sin convertirlos en una paráfrasis declarativa.
  alternative_spanish_readings:
  - Consideren el árbol bueno...
  - Si hacen bueno el árbol...
  - Reconozcan el árbol como bueno...
  rationale: El griego usa imperativos aoristos repetidos. En español, «hagan» conserva la contundencia del desafío de Jesús y evita suavizar el argumento mediante una lectura explicativa que el texto no explicita.
  doctrine_reference: Principio de primacía del idioma original; preservar la tensión retórica del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés, manteniendo la estructura imperativa paralela y la imagen del árbol y su fruto. No se introdujeron revisiones previas; el resultado permanece estable respecto al contexto auditado.
  spanish_consistency_notes:
  - Se usa «fruto» de manera uniforme para καρπός y «árbol» para δένδρον.
  - Se evita «SEÑOR» y no hay términos divinos en este versículo.
  - La alternancia «bueno/malo» preserva la simetría retórica del griego, con nota para la alternativa más vívida de σαπρός.
  - «Se conoce» mantiene la pasiva del original sin forzar una voz activa.
