translation:
  language: es
  text: ¿O no han leído en la Ley que los [a]sábados los sacerdotes en el templo profanan el sábado y quedan sin culpa?[b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Sábados'' conserva el plural del griego, que probablemente alude a ocasiones sabáticas repetidas, no a un solo sábado.'
    reason: lexical_alternative
  - marker: b
    text: '''Profanan'' puede entenderse también como ''violan'' o ''quebrantan'' el sábado; el verbo griego expresa tratar algo como común o profano.'
    reason: lexical_alternative
  - marker: c
    text: '''La Ley'' aquí se refiere a la Ley mosaica/Escritura, probablemente incluyendo las normas sobre el servicio sacerdotal en sábado (cf. Núm. 28:9–10).'
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿Acaso no
  - ¿O acaso
  lexicon: BDAG
  rationale: Mantiene la transición retórica de Jesús a un argumento alternativo sin añadir sentido no requerido por el griego.
- source_word: οὐκ ἀνέγνωτε
  english_pob_choice: have you not read
  chosen_spanish: ¿no han leído
  alternatives_spanish:
  - ¿no leyeron
  - ¿acaso no leyeron
  lexicon: BDAG
  rationale: Conserva la pregunta retórica dirigida a los oyentes y reproduce de manera natural el valor aorístico en español.
- source_word: ἐν τῷ νόμῳ
  english_pob_choice: in the Law
  chosen_spanish: en la Ley
  alternatives_spanish:
  - en la ley
  lexicon: BDAG
  rationale: La mayúscula refleja el uso escriturario/mosaico, no una ley abstracta. Es el equivalente natural en español bíblico contemporáneo.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbaths
  chosen_spanish: en los [a]sábados
  alternatives_spanish:
  - en los sábados
  - en el sábado
  lexicon: BDAG
  rationale: Se conserva el plural griego con un sustantivo plural en español para no borrar la posible referencia a ocasiones sabáticas repetidas. La preposición 'en' funciona aquí como equivalente temporal natural.
- source_word: ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: BDAG
  rationale: Traducción directa y precisa del oficio sacerdotal en contexto del templo.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo; 'templo' es la forma natural y fiel en español.
- source_word: τὸ σάββατον
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el día de reposo
  lexicon: BDAG
  rationale: Aunque la tradición española ofrece 'día de reposo', 'sábado' preserva mejor la relación léxica con el plural 'sábados' y la tensión del pasaje.
- source_word: βεβηλοῦσιν
  english_pob_choice: profane
  chosen_spanish: profanan
  alternatives_spanish:
  - violan
  - quebrantan
  - tratan como común
  lexicon: BDAG
  rationale: '''Profanan'' conserva la fuerza provocativa de tratar algo sagrado como común/profano, en línea con la decisión inglesa de no suavizar el verbo.'
- source_word: ἀναίτιοί εἰσιν
  english_pob_choice: are guiltless
  chosen_spanish: están sin culpa
  alternatives_spanish:
  - son inocentes
  - son inculpables
  - son sin culpa
  lexicon: BDAG
  rationale: '''Sin culpa'' expresa con claridad la ausencia de responsabilidad o culpabilidad legal, manteniendo el contraste con ''profanan'' sin añadir una cualidad moral más amplia que el contexto no exige.'
theological_decisions:
- issue: Tensión entre la aparente profanación del sábado y la inocencia de los sacerdotes
  english_pob_reading: Retain the strong wording 'profane the Sabbath' while preserving that they 'are guiltless'
  chosen_spanish_reading: Mantener 'profanan el sábado' y 'están sin culpa'
  alternative_spanish_readings:
  - violan el sábado y son inocentes
  - quebrantan el sábado y son blameless
  rationale: 'El griego conserva la tensión retórica: el servicio sacerdotal en el templo puede describirse como una profanación literal del sábado, pero la Ley misma no los hace culpables. La traducción debe preservar esa tensión en vez de resolverla suavizando el verbo.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referencia de 'la Ley'
  english_pob_reading: The 'Law' here refers to the Mosaic Law/Scripture, likely including regulations about priestly service on the Sabbath
  chosen_spanish_reading: '''La Ley'' como referencia a la Ley mosaica/Escritura'
  alternative_spanish_readings:
  - ley en sentido general
  - mandato legal
  rationale: La mayúscula y el contexto judío apuntan al corpus mosaico-escriturario; esto evita una lectura abstracta y conserva la alusión a la regulación sacerdotal del sábado.
  doctrine_reference: Cf. Núm. 28:9–10
translation_notes:
  revision_awareness: 'La versión coincide con la lectura inglesa auditada en el punto principal: mantiene el plural ''sábados'', el valor fuerte de ''profanan'' y el contraste con ''están sin culpa''. No se identificaron revisiones previas ni cambios necesarios en el pasaje base.'
  spanish_consistency_notes:
  - Se usa 'Ley' con mayúscula para el corpus mosaico-escriturario.
  - Se conserva 'sábado/sábados' para mantener la conexión léxica del original griego.
  - '''Sin culpa'' mantiene el matiz forense de ἀναίτιοι sin expandirlo a ''inocentes'' en sentido general.'
  - La puntuación interrogativa española se adapta a la pregunta retórica del griego sin añadir partículas explicativas.
