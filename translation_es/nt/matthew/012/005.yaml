  text: ἢ οὐκ ἀνέγνωτε ἐν τῷ νόμῳ ὅτι τοῖς σάββασιν οἱ ἱερεῖς ἐν τῷ ἱερῷ τὸ σάββατον βεβηλοῦσιν καὶ ἀναίτιοί εἰσιν;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/012/005.yaml
  text: Or have you not read in the Law that on the Sabbaths the priests in the temple profane the Sabbath and are guiltless?[a][b][c]
  footnotes:
  - marker: a
    text: Or 'violate the Sabbath' or 'break the Sabbath.' The Greek verb has the sense of treating something as common or profane.
    reason: lexical_alternative
  - marker: b
    text: Greek 'on the Sabbaths,' likely referring to repeated Sabbath occasions rather than a single instance.
    reason: lexical_alternative
  - marker: c
    text: The 'Law' here refers to the Mosaic Law/Scripture, likely including regulations about priestly service on the Sabbath (cf. Num 28:9–10).
    reason: cross_reference
