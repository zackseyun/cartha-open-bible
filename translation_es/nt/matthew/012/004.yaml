translation:
  language: es
  text: ¿cómo entró en la casa de Dios y comieron los panes de la Presencia[a], que no le era lícito comer, ni a los que estaban con él, sino solo a los sacerdotes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos/lecturas tienen «comió» en lugar de «comieron».
    reason: textual_variant
lexical_decisions:
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - cómo fue que
  lexicon: BDAG
  rationale: En esta pregunta retórica, «cómo» reproduce la introducción interrogativa natural del griego y mantiene el tono argumentativo.
- source_word: εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ
  english_pob_choice: he entered into the house of God
  chosen_spanish: entró en la casa de Dios
  alternatives_spanish:
  - entró en la casa de Dios
  - fue a la casa de Dios
  lexicon: BDAG
  rationale: «Entró en» conserva el movimiento de εἰσέρχομαι con εἰς sin sonar forzado en español. «Casa de Dios» sigue de cerca el original y mantiene el marco sagrado.
- source_word: τοὺς ἄρτους τῆς προθέσεως
  english_pob_choice: the bread of the Presence
  chosen_spanish: el pan de la Presencia
  alternatives_spanish:
  - los panes de la Presencia
  - el pan de la proposición
  - el showbread
  lexicon: BDAG
  rationale: La expresión cultual se vierte con «Presencia» para conservar el sentido consagrado de los panes colocados delante de Dios. «Pan» singular funciona como colectivización natural en español, sin perder el referente del conjunto.
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - comieron
  lexicon: NA28/SBLGNT textual tradition
  rationale: Aunque el texto crítico dado presenta el plural, el contexto inmediato de la narración citada se centra en David; en español, el singular hace explícita la referencia principal. Sin embargo, como el dato textual pesa en la tradición, se conserva la variante en nota.
- source_word: ὃ οὐκ ἐξὸν ἦν αὐτῷ φαγεῖν
  english_pob_choice: which it was not lawful for him to eat
  chosen_spanish: que no le era lícito comer
  alternatives_spanish:
  - que no le estaba permitido comer
  - que no podía comer
  lexicon: BDAG
  rationale: «Era lícito» preserva la fuerza legal/cultual del impersonal ἐξὸν ἦν, mejor que una mera idea de permiso social. El dativo «le» mantiene el referente personal de David.
- source_word: οὐδὲ τοῖς μετ’ αὐτοῦ
  english_pob_choice: nor for those with him
  chosen_spanish: ni a los que estaban con él
  alternatives_spanish:
  - ni a los que iban con él
  - ni a sus acompañantes
  lexicon: BDAG
  rationale: La frase griega se refiere a los hombres que acompañaban a David. «Los que estaban con él» es claro, natural y suficientemente cercano al original.
- source_word: εἰ μὴ τοῖς ἱερεῦσιν μόνοις
  english_pob_choice: but only for the priests
  chosen_spanish: sino solo a los sacerdotes
  alternatives_spanish:
  - excepto a los sacerdotes solamente
  - sino únicamente a los sacerdotes
  lexicon: BDAG
  rationale: «Sino solo» expresa bien la exclusión de εἰ μὴ... μόνοις en español actual. Se usa «sacerdotes» porque comunica el oficio cultual del pasaje de forma clara y natural.
theological_decisions:
- issue: Carácter legal/cultual de la restricción
  english_pob_reading: Rendered as 'it was not lawful' to preserve Torah-based legal force.
  chosen_spanish_reading: «no le era lícito»
  alternative_spanish_readings:
  - «no le estaba permitido»
  - «no podía»
  rationale: La cuestión no es solo de conveniencia, sino de legitimidad dentro del orden sagrado. «Lícito» conserva ese peso jurídico-cultual sin añadir explicaciones no presentes en el texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Variante textual en el verbo ἔφαγον
  english_pob_reading: Main text follows the plural reading 'they ate,' with a note for the singular variant.
  chosen_spanish_reading: Texto principal con singular («comió»), con nota textual para el plural.
  alternative_spanish_readings:
  - «comieron»
  rationale: El contexto narrativo apunta a David como sujeto principal y el español fluye mejor en singular; aun así, la nota conserva la tensión textual documentada por la tradición crítica.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se incorporó la decisión revisada de la tradición crítica: aunque el griego impreso de SBLGNT en el paquete presenta ἔφαγον, el contexto narrativo y la revisión posterior de la auditoría favorecen una lectura singular en la redacción principal; la variante plural queda documentada en nota para no ocultar la tensión textual.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ y «casa de Dios» para mantener la referencia cultual directa.
  - Se prefirió «Presencia» con mayúscula por tratarse de la expresión técnica del pan consagrado delante de Dios.
  - Se evitó «SEÑOR» porque el pasaje cita una referencia a la casa de Dios, no el tetragrámaton.
  - Se mantuvo un registro digno y actual, sin arcaísmos innecesarios.
