revisions:
- from: ¿cómo entró en la casa de Dios y comió el pan de la Presencia[a], que no le era lícito comer, ni a los que estaban con él, sino solo a los sacerdotes?
  to: ¿cómo entró en la casa de Dios y comieron los panes de la Presencia[a], que no le era lícito comer, ni a los que estaban con él, sino solo a los sacerdotes?
