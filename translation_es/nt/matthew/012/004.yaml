review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la mayor parte del sentido del griego: «cómo», «entró en la casa de Dios», «no le era lícito comer», «ni a los que estaban con él» y la excepción sacerdotal están bien representados. Sin embargo, no sigue fielmente la evidencia fuente ni el rastro de auditoría en dos puntos importantes: (1) el griego tiene plural ἄρτους, por lo que «los panes de la Presencia» refleja mejor la forma cultual que el singular colectivizado; y (2) la nota textual está invertida respecto al expediente inglés y al SBLGNT dado. El texto auditado preserva en nota la variante singular «he ate» frente al plural impreso, mientras que el borrador pone singular en el texto principal y plural en nota, contrariando la evidencia documentada.'
  spanish_quality_summary: El español es claro, natural y digno. «No le era lícito» mantiene bien el tono legal/cultual. Conviene ajustar «el pan» a «los panes» para mayor precisión bíblica y naturalidad referencial en este contexto cultual. La sintaxis de la pregunta es correcta y eclesialmente legible.
  glossary_alignment: 'No hay conflicto con los términos proyectuales principales; «Dios» y «Presencia» son apropiados. La decisión sobre ἄρτους debe alinearse mejor con el griego plural y con la expresión cultual establecida en español: «los panes de la Presencia». También debe alinearse la variante textual de ἔφαγον con el expediente POB: texto principal plural y nota para la lectura singular.'
  issues:
  - severity: high
    issue: La variante textual de ἔφαγον está manejada al revés del expediente fuente.
    rationale: El SBLGNT dado imprime plural («ellos comieron»), y el POB inglés conserva la variante singular en nota. El borrador español pone singular en el texto principal («comió») y plural en nota, contradiciendo tanto la evidencia fuente como la documentación auditada.
  - severity: medium
    issue: «el pan de la Presencia» debilita el plural explícito τοὺς ἄρτους.
    rationale: Aunque el singular colectivo puede entenderse, el griego usa plural y en español bíblico-cultual «los panes de la Presencia» es claro y fiel. Además evita perder la referencia estable al conjunto de panes consagrados.
  - severity: low
    issue: La decisión léxica adjunta para ἔφαγον justifica un singular contrario al texto crítico provisto.
    rationale: La explicación interna del borrador apela al contexto narrativo para preferir singular, pero la tarea pide trabajar desde la evidencia fuente primero y usar el expediente inglés como contexto auditado, no invertirlo.
  revised_spanish_text: ¿cómo entró en la casa de Dios y comieron los panes de la Presencia[a], que no le era lícito comer, ni a los que estaban con él, sino solo a los sacerdotes?
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos/lecturas tienen «comió» en lugar de «comieron».
    reason: textual_variant
  revision_rationale: 'Se corrige el manejo de la variante textual para seguir el SBLGNT y el expediente POB: texto principal con plural «comieron» y nota para la variante singular «comió». También se cambia «el pan» por «los panes» para reflejar con mayor fidelidad el plural griego τοὺς ἄρτους y la expresión cultual en español. Se mantiene «no le era lícito» por su buena preservación de la fuerza legal/cultual de ἐξὸν ἦν.'
