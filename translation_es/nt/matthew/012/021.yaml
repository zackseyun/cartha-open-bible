lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante simple; en español 'y' conserva la continuidad con la cita anterior sin añadir matiz.
- source_word: τῷ ὀνόματι αὐτοῦ
  english_pob_choice: in his name
  chosen_spanish: en su nombre
  alternatives_spanish:
  - en su reputación
  - en su autoridad
  lexicon: BDAG
  rationale: El dativo con ἐλπίζω se vierte naturalmente con 'en' en español. 'Nombre' conserva el valor bíblico de identidad, autoridad y presencia representada por el nombre, sin reducirlo a mera etiqueta.
- source_word: ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: En este contexto de cita mesiánica, 'naciones' conserva mejor el horizonte veterotestamentario y el alcance amplio del término, sin estrecharlo solo a una etiqueta étnico-religiosa.
- source_word: ἐλπιοῦσιν
  english_pob_choice: will hope
  chosen_spanish: esperarán
  alternatives_spanish:
  - pondrán su esperanza
  - confiarán
  lexicon: BDAG
  rationale: El futuro indicativo se conserva con 'esperarán'. Aunque 'confiarán' puede expresar la idea contextual, 'esperar' reproduce mejor el valor léxico de ἐλπίζω y mantiene el tono profético.
theological_decisions:
- issue: ἔθνη en una cita mesiánica
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: Se mantiene 'las naciones' para reflejar la cita de Isaías y preservar la amplitud del alcance mesiánico. 'Los gentiles' sigue siendo una lectura posible, pero estrecha el término de modo que puede oscurecer el trasfondo profético.
  doctrine_reference: Preservar la tensión interpretativa documentada; no resolverla por una sola etiqueta cuando el contexto admite ambas.
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y con la traducción inglesa auditada; no se documentan revisiones aplicadas en el historial reciente.
  spanish_consistency_notes:
  - Se mantiene 'naciones' como término principal para ἔθνη, en consonancia con la decisión inglesa auditada.
  - '''Esperarán'' conserva la futura profética del griego y evita introducir ''confiarán'' como lectura principal sin necesidad textual.'
  - '''En su nombre'' sigue la construcción bíblica habitual y es la forma más transparente en español para el dativo con ἐλπίζω.'
