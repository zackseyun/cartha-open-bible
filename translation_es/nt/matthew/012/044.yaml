translation:
  language: es
  text: 'Entonces dice: «Volveré a mi casa, de donde salí»; y cuando llega, la encuentra desocupada[a], barrida y puesta en orden[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vacía» para «desocupada».
    reason: lexical_alternative
  - marker: b
    text: O «adornada» / «decorada» para «puesta en orden».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que introduce la continuación inmediata del relato; «Entonces» es natural, claro y conserva la secuencia narrativa.
- source_word: λέγει
  english_pob_choice: it says
  chosen_spanish: dice
  alternatives_spanish:
  - dice él
  - dice el espíritu
  lexicon: BDAG
  rationale: El griego usa presente histórico. En español, «dice» conserva ese valor vívido sin añadir un sujeto explícito que el texto no formula aquí.
- source_word: Εἰς τὸν οἶκόν μου ἐπιστρέψω
  english_pob_choice: I will return to my house
  chosen_spanish: Volveré a mi casa
  alternatives_spanish:
  - Regresaré a mi casa
  - Iré de vuelta a mi casa
  lexicon: BDAG
  rationale: ἐπιστρέφω expresa volver/retornar. «Volveré» es la opción más natural en español y preserva la dirección hacia la propia casa.
- source_word: ὅθεν ἐξῆλθον
  english_pob_choice: from which I came out
  chosen_spanish: de donde salí
  alternatives_spanish:
  - de donde salí fuera
  - de donde salí de allí
  - desde donde salí
  lexicon: BDAG
  rationale: ὅθεν + ἐξῆλθον comunica el lugar de salida. «De donde salí» es idiomático y mantiene el enlace con «mi casa» sin volverlo explicativo.
- source_word: ἐλθὸν
  english_pob_choice: when it comes
  chosen_spanish: cuando llega
  alternatives_spanish:
  - cuando viene
  - al llegar
  lexicon: BDAG
  rationale: El participio aoristo se vierte naturalmente con una cláusula temporal. «Cuando llega» conserva la secuencia sin calco excesivo.
- source_word: εὑρίσκει
  english_pob_choice: it finds
  chosen_spanish: la encuentra
  alternatives_spanish:
  - la halla
  lexicon: BDAG
  rationale: Como el antecedente es «la casa», «la encuentra» es el equivalente directo y claro de εὑρίσκει.
- source_word: σχολάζοντα
  english_pob_choice: unoccupied
  chosen_spanish: desocupada
  alternatives_spanish:
  - vacía
  - sin ocupantes
  - libre
  lexicon: BDAG
  rationale: σχολάζω puede significar libre, desocupado o vacío. En este contexto, «desocupada» conserva la idea de ausencia de ocupante, sin forzar «vacía» como única posibilidad.
- source_word: σεσαρωμένον
  english_pob_choice: swept
  chosen_spanish: barrida
  alternatives_spanish:
  - barrida y limpia
  - barrida de polvo
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo de σαρόω indica un estado resultante: la casa ha sido barrida. «Barrida» es breve y fiel.'
- source_word: κεκοσμημένον
  english_pob_choice: put in order
  chosen_spanish: puesta en orden
  alternatives_spanish:
  - ordenada
  - adornada
  - decorada
  lexicon: BDAG
  rationale: κοσμέω puede significar arreglar, poner en orden o adornar. En este contexto, «puesta en orden» conserva la idea de ordenamiento sin exagerar el sentido ornamental.
theological_decisions:
- issue: Mantenimiento de la imagen de «casa» como metáfora
  english_pob_reading: Retain 'house' literally in the main text without explicating the metaphor as 'person' or 'life.'
  chosen_spanish_reading: Mantener «casa» literalmente en el texto principal, sin explicitar la metáfora como «persona» o «vida».
  alternative_spanish_readings:
  - Volveré a la persona que dejé
  - Volveré al lugar que abandoné
  rationale: La unidad inmediata explica la imagen, pero el versículo mismo habla de una casa. Conservar la metáfora evita paráfrasis y respeta la formulación de Jesús.
  doctrine_reference: Principio de primacía del texto original; no ampliar el sentido más allá de lo que el versículo expresa.
translation_notes:
  revision_awareness: 'Coincide con el último pase del audit trail: no se registraron revisiones aplicadas y el acuerdo de revisión fue alto, así que se mantiene la lectura principal sin cambios sustantivos.'
  spanish_consistency_notes:
  - Se mantuvo «casa» para οἶκος, coherente con el lenguaje del pasaje.
  - Se usó «desocupada» para σχολάζοντα, preservando la alternativa tradicional «vacía» en nota.
  - Se tradujo κεκοσμημένον como «puesta en orden», siguiendo la decisión auditada de evitar sobrecargar con 'decorada' como sentido principal.
  - La puntuación con comillas angulares y dos puntos sigue el estilo editorial español y mantiene la división del discurso directo.
