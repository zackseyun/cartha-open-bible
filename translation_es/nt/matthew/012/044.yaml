  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La elección de «casa» preserva la decisión teológica documentada. «Desocupada» para σχολάζοντα y «puesta en orden» para κεκοσμημένον siguen correctamente la justificación léxica del POB en inglés.
