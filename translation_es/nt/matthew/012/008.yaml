    rationale: «Dueño» desplaza el matiz de κύριος hacia propiedad/posesión. La alternativa inglesa auditada es «master over the Sabbath»; en español suena mejor «señor sobre el sábado» o «amo del sábado», pero «amo» es poco natural. Conviene una alternativa más cercana al razonamiento léxico documentado.
