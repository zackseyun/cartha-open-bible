translation:
  language: es
  text: Porque el Hijo del Hombre es señor del sábado[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Hijo del Hombre tiene autoridad sobre el sábado».'
    reason: lexical_alternative
  - marker: b
    text: «Hijo del Hombre» es la autodesignación característica de Jesús en los Evangelios; alternativamente, podría traducirse de forma más genérica como «el ser humano», pero eso debilita su probable resonancia titular.
    reason: alternative_reading
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: La partícula introduce explicación o fundamento de la afirmación anterior; «Porque» conserva esa fuerza causal/explanatoria en español de manera natural.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - amo
  - maestro
  lexicon: BDAG
  rationale: «Señor» mantiene el valor titular y de autoridad que el POB documenta para κύριος. «Amo» o «maestro» debilitan o desplazan el peso cristológico del término en este contexto.
- source_word: τοῦ σαββάτου
  english_pob_choice: of the Sabbath
  chosen_spanish: del sábado
  alternatives_spanish:
  - sobre el sábado
  - del Sabbat
  lexicon: BDAG
  rationale: 'El genitivo se expresa naturalmente en español como relación posesiva: «Señor del sábado». «Sábado» comunica mejor que una transliteración y preserva la referencia al día/institución judía.'
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el ser humano
  - el hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional porque el POB lo entiende como autodesignación característica de Jesús. Traducirlo como «el ser humano» o «el hombre» aplanaría su resonancia titulary e intertextual.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: Copulativa simple; «es» reproduce de forma directa y sobria el presente del griego sin añadir matiz aspectual innecesario.
theological_decisions:
- issue: Fuerza cristológica de κύριος τοῦ σαββάτου
  english_pob_reading: 'Render as a strong title of authority: ''the Son of Man is Lord of the Sabbath.'''
  chosen_spanish_reading: «el Hijo del Hombre es Señor del sábado»
  alternative_spanish_readings:
  - «el Hijo del Hombre es amo del sábado»
  - «el Hijo del Hombre tiene autoridad sobre el sábado»
  rationale: La formulación española debe conservar la afirmación de autoridad sin suavizarla ni reinterpretarla. «Señor» preserva el peso cristológico y la formulación más directa del original; las alternativas explicitan o debilitan esa fuerza.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Señor); afirmaciones sobre cristología histórica'
- issue: Tratamiento de ὁ υἱὸς τοῦ ἀνθρώπου como título
  english_pob_reading: Treat as the titular self-designation 'the Son of Man.'
  chosen_spanish_reading: «el Hijo del Hombre»
  alternative_spanish_readings:
  - «el hombre»
  - «el ser humano»
  rationale: Se conserva el título tradicional para no perder la posible resonancia daniélica y la autodesignación característica de Jesús en los Evangelios. Las alternativas serían más genéricas y reducirían esa tensión teológica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el texto fuente griego SBLGNT y con la solución auditada en inglés: explicación con γάρ, título cristológico fuerte para κύριος, y conservación de «Hijo del Hombre» como designación titular. No se registraron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se mantiene «sábado» en minúscula por ser un sustantivo común de calendario/institución en español, aunque en inglés se capitalice «Sabbath».
  - Se usa «Señor» como equivalente regular de κύριος en este contexto, coherente con el POB y con el valor titular del pasaje.
  - La nota [a] recoge la alternativa lexical documentada por el audit trail sin imponerla en el texto principal.
