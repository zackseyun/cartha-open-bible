review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: γάρ como explicación, ὁ υἱὸς τοῦ ἀνθρώπου como título, y κύριος ... τοῦ σαββάτου como afirmación fuerte de autoridad. Sin embargo, en español bíblico y eclesial «Señor» usado como título cristológico debe escribirse en minúscula cuando no funciona como nombre propio divino; «señor del sábado» preserva mejor el sentido del griego y evita una capitalización teológicamente sobrecargada no exigida por la fuente.'
  spanish_quality_summary: 'La frase es natural y clara. «Porque» funciona bien, aunque «pues» también sería posible. La única reparación necesaria es ortográfica/estilística: cambiar «Señor» por «señor» en el texto principal y armonizar la nota alternativa para evitar «dueño», que suena más posesivo y menos idiomático que la alternativa auditada «master over / Lord of».'
  glossary_alignment: 'Alinea bien con los valores del proyecto: «Hijo del Hombre» preserva el título; «sábado» es adecuado para σάββατον; no hay conflicto con Yahvé/Mesías. Para κύριος, el equivalente español correcto aquí es «señor», no como sustituto del nombre divino sino como título de autoridad cristológica.'
  issues:
  - severity: medium
    issue: Capitalización de «Señor» en el texto principal
    rationale: El griego κύριος aquí es un título de autoridad aplicado al Hijo del Hombre, no una instancia del nombre divino. En español, la minúscula «señor» es la forma más precisa y natural en este contexto; la mayúscula puede introducir una lectura devocional adicional no marcada por la fuente.
  - severity: low
