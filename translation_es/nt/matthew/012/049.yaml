translation:
  language: es
  text: 'Y extendiendo su mano hacia sus discípulos[a], dijo: «Miren[b], mi madre y mis hermanos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguidores».
    reason: lexical_alternative
  - marker: b
    text: También podría expresarse como «Vean» o «He aquí».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκτείνας
  english_pob_choice: stretching out
  chosen_spanish: extendiendo
  alternatives_spanish:
  - estirando
  - habiendo extendido
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción concomitante previa al verbo principal; en español, «extendiendo» comunica el gesto físico sin sonar forzado. «Estirando» sería más coloquial y menos natural en este contexto.
- source_word: χεῖρα
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - brazo
  lexicon: BDAG
  rationale: La referencia concreta es a la mano extendida en un gesto de señalamiento o presentación; «mano» es la equivalencia más natural y precisa.
- source_word: ἐπὶ
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - sobre
  lexicon: BDAG
  rationale: Con acusativo y en un contexto de gesto, expresa dirección. «Hacia» conserva el movimiento y evita la ambigüedad espacial de «sobre».
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el término normal y más preciso en los Evangelios para μαθηταί, manteniendo la relación maestro-discípulo.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren bien
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «Miren» transmite bien el imperativo de atención de ἰδού sin el matiz arcaizante de «He aquí» o «He aquí, miren». La nota marca la alternativa de registro frente a «Behold».
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: BDAG
  rationale: Término familiar directo; «madre» conserva el registro digno y el paralelo con «hermanos».
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  lexicon: BDAG
  rationale: El plural masculino griego se conserva como «hermanos», tal como la POB inglesa retuvo «brothers» sin expandirlo a «brothers and sisters». En español, el masculino plural puede funcionar de manera genérica o literal; aquí se mantiene la forma del texto.
theological_decisions:
- issue: Lenguaje de parentesco en la redefinición de la familia de Jesús
  english_pob_reading: 'Retain literal family terms: ''mother'' and ''brothers'''
  chosen_spanish_reading: 'Mantener los términos concretos de parentesco: «madre» y «hermanos»'
  alternative_spanish_readings:
  - usar «familia» o «parientes»
  - expandir a «hermanos y hermanas»
  rationale: El dicho de Jesús intencionalmente usa términos familiares concretos para identificar a sus discípulos como su verdadera familia. Una paráfrasis más amplia atenuaría la fuerza retórica y añadiría interpretación no explicitada en el griego.
  doctrine_reference: Translation philosophy §§3-4
translation_notes:
  revision_awareness: El borrador corrige el problema de validación anterior al anclar explícitamente las notas [a] y [b] en el texto español. También mantiene la decisión auditada de no expandir ἀδελφοί a una forma inclusiva, en continuidad con la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene el tono bíblico sobrio y claro.
  - «Hacia» reproduce la dirección del gesto sin sobreinterpretación.
  - Se conserva «hermanos» como plural masculino del original, coherente con la política POB documentada.
