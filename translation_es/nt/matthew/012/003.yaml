translation:
  language: es
  text: 'Pero él les dijo: «¿No han leído lo que hizo David cuando tuvo hambre, y los que estaban con él también tuvieron hambre[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No han leído lo que hizo David cuando él y los que estaban con él tuvieron hambre?». El griego puede entenderse de modo que el hambre se aplique tanto a David como a los que estaban con él, aunque el verbo singular se refiere explícitamente a David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Entonces él
  lexicon: BDAG
  rationale: δέ funciona aquí como conectivo discursivo suave tras la acusación previa; «Pero él» preserva la transición y suena natural en español.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les respondió
  lexicon: BDAG
  rationale: La construcción con dativo se expresa de forma directa y natural con «les dijo»; «respondió» sería más interpretativo.
- source_word: Οὐκ ἀνέγνωτε
  english_pob_choice: Have you not read
  chosen_spanish: ¿No han leído
  alternatives_spanish:
  - ¿No leyeron
  - ¿No han estado leyendo
  lexicon: BDAG
  rationale: La pregunta retórica de reproche bíblico se comunica con el perfecto compuesto plural, que en español conserva bien la apelación a la Escritura y evita un calco poco natural.
- source_word: τί ἐποίησεν
  english_pob_choice: what ... did
  chosen_spanish: lo que hizo
  alternatives_spanish:
  - qué hizo
  - lo que realizó
  lexicon: BDAG
  rationale: τί ἐποίησεν pide un objeto neutro; «lo que hizo» es la opción más idiomática y fiel al sentido histórico simple de ποιέω.
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Davíd
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: ὅτε ἐπείνασεν
  english_pob_choice: when he was hungry
  chosen_spanish: cuando tuvo hambre
  alternatives_spanish:
  - cuando estaba hambriento
  - cuando tuvo hambre
  lexicon: BDAG
  rationale: πεινάω significa «tener hambre»; «tuvo hambre» es la forma más natural en español y mantiene la referencia al estado de David sin sobretraducir el aspecto.
- source_word: καὶ οἱ μετ’ αὐτοῦ
  english_pob_choice: and those with him
  chosen_spanish: y los que estaban con él [a]
  alternatives_spanish:
  - y los que con él estaban
  - y sus acompañantes
  lexicon: BDAG
  rationale: La frase articular se vierte literalmente como «los que estaban con él». Se conserva la posibilidad de que el hambre también alcance a ese grupo, por eso el texto admite la nota alternativa sin imponerla como única lectura.
theological_decisions:
- issue: Alcance de la hambre en la cláusula final
  english_pob_reading: and those with him were hungry?
  chosen_spanish_reading: y los que estaban con él [a]
  alternative_spanish_readings:
  - y los que estaban con él tuvieron hambre
  - y sus acompañantes tuvieron hambre
  rationale: El griego permite que el verbo implícito de hambre se entienda también para el grupo asociado, aunque el verbo explícito está en singular con David. La nota preserva esa tensión sin cerrarla indebidamente.
  doctrine_reference: No doctrinal issue; discourse/grammar ambiguity preserved
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que añadió la hambre implícita para «los que estaban con él». En español se mantiene la misma completitud semántica mediante una nota alternativa, sin forzar una sola lectura.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «les dijo» mantiene el dativo plural sin añadir matices no presentes.
  - Se conserva el pronombre explícito «él» para reflejar el sujeto personal de la cláusula narrativa.
  - La nota [a] está anclada en el texto y corresponde exactamente a la ambigüedad reconocida por el POB inglés.
