  source_alignment_summary: 'El borrador sigue bien el griego: δὲ como contraste inicial, ἀκούσαντες con sentido temporal, Οὗτος con matiz despectivo, ἐκβάλλει τὰ δαιμόνια como exorcismo, εἰ μὴ ἐν... con valor de medio/agencia, y Βεελζεβούλ conservado según la forma del SBLGNT. La nota sobre la variante tradicional también coincide con la auditoría inglesa. Sin embargo, la nota al pie está anclada en «oyeron», aunque su contenido corresponde a «Beelzebul»; esto rompe la disciplina requerida de anclaje y puede confundir al lector.'
