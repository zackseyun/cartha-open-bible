translation:
  language: es
  text: 'Pero cuando los fariseos lo oyeron, dijeron: «Este hombre no expulsa a los demonios sino por Beelzebul[a], el gobernante de los demonios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Beelzebul: tradicionalmente, «Beelzebub».'
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: En español, 'Pero' conserva el contraste adversativo con la reacción positiva anterior y suena natural al inicio de la oración.
- source_word: ἀκούσαντες
  english_pob_choice: when the Pharisees heard it
  chosen_spanish: cuando los fariseos lo oyeron
  alternatives_spanish:
  - al oírlo los fariseos
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo se expresa naturalmente con una subordinada temporal. 'Lo' recupera el objeto implícito del contexto sin añadir contenido.
- source_word: Οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: '''Este hombre'' conserva el tono despectivo o desdeñoso del demostrativo en este contexto, más que un simple ''él''.'
- source_word: ἐκβάλλει
  english_pob_choice: cast out
  chosen_spanish: expulsa
  alternatives_spanish:
  - echa fuera
  - arroja fuera
  lexicon: BDAG
  rationale: En contexto de exorcismo, 'expulsa' comunica con claridad la acción de sacar demonios sin sonar forzado en español.
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  lexicon: BDAG
  rationale: '''Demonios'' es la equivalencia directa y convencional en este contexto sinóptico.'
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino por
  alternatives_spanish:
  - excepto por
  - a no ser por
  lexicon: BDAG
  rationale: En esta construcción, la acusación presenta el único medio supuesto; en español 'sino por' comunica bien la exclusión y la causalidad implícita.
- source_word: ἐν τῷ Βεελζεβοὺλ
  english_pob_choice: by Beelzebul
  chosen_spanish: por Beelzebul
  alternatives_spanish:
  - por medio de Beelzebul
  - en Beelzebul
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente 'en', aquí expresa medio o agencia; 'por' transmite mejor la acusación sin sobreexplicar.
- source_word: Βεελζεβοὺλ
  english_pob_choice: Beelzebul
  chosen_spanish: Beelzebul
  alternatives_spanish:
  - Beelzebub
  lexicon: BDAG
  rationale: Se conserva la forma griega del texto fuente. La variante tradicional se deja para nota.
- source_word: ἄρχοντι τῶν δαιμονίων
  english_pob_choice: the ruler of the demons
  chosen_spanish: el gobernante de los demonios
  alternatives_spanish:
  - el príncipe de los demonios
  - el jefe de los demonios
  lexicon: BDAG
  rationale: '''Gobernante'' mantiene el sentido de autoridad de ἄρχων y suena más natural y sobrio en español que ''príncipe'' en este contexto.'
theological_decisions:
- issue: Tono despectivo del demostrativo Οὗτος
  english_pob_reading: This man
  chosen_spanish_reading: Este hombre
  alternative_spanish_readings:
  - Este
  - Él
  rationale: La frase de los fariseos es acusatoria y despreciativa. 'Este hombre' preserva ese matiz sin añadir interpretación doctrinal.
  doctrine_reference: Translation philosophy §1 (source-language primacy) y §6 (claridad moderna).
- issue: Forma del nombre Βεελζεβοὺλ
  english_pob_reading: Beelzebul
  chosen_spanish_reading: Beelzebul
  alternative_spanish_readings:
  - Beelzebub
  rationale: La forma principal sigue el texto griego SBLGNT. La variante tradicional se documenta solo como alternativa, sin desplazar la forma atestiguada por la fuente.
  doctrine_reference: Translation philosophy §1 y §2 (nombres transliterados).
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente; el control cruzado indicó alta concordancia y ningún ajuste necesario.
  spanish_consistency_notes:
  - Se mantuvo 'Beelzebul' en el texto principal por fidelidad al griego fuente.
  - Se usó 'demonios' de manera consistente con el contexto sinóptico y la elección inglesa auditable.
  - '''Pero'' conserva la fuerza adversativa de δὲ sin mecanicismo.'
  - La nota [a] está anclada en 'Beelzebul' para documentar la variante tradicional sin alterar el texto principal.
