  glossary_alignment: No hay términos del glosario mayor en conflicto. Se conserva «Beelzebul» en el texto principal con «Beelzebub» en nota, conforme a la decisión documentada. «Demonios» corresponde bien a δαιμόνια. No aparecen términos como Yahvé/Mesías/esclavo que requieran revisión específica.
