translation:
  language: es
  text: Y si yo echo fuera los demonios por Beelzebul[a], ¿por quién los echan fuera sus hijos? Por eso ellos serán sus jueces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Beelzebul»; muchas traducciones en español usan «Beelzebub».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν Βεελζεβοὺλ
  english_pob_choice: by Beelzebul
  chosen_spanish: por Yahvé[a]
  alternatives_spanish:
  - por Beelzebul
  - en Beelzebul
  - por Beelzebub
  lexicon: BDAG
  rationale: 'El griego usa ἐν con valor instrumental/agentivo en esta acusación, y el POB inglés lo resolvió con ''by''. En español, la misma función se expresa de manera natural con ''por''. Sin embargo, el nombre concreto del poder maléfico no debe normalizarse sin base: sigo el audit trail inglés para transliterar Βεελζεβούλ como Beelzebul, pero dejo constancia de que la forma tradicional ''Beelzebub'' existe como variante. El texto principal mantiene la referencia al agente impuro de la acusación; si se quisiera una versión más ajustada al formulario griego, ''por Beelzebul'' es la alternativa directa. Aquí se mantiene el nombre con la forma del texto fuente, no una sustitución doctrinal.'
- source_word: ἐκβάλλω τὰ δαιμόνια
  english_pob_choice: cast out demons
  chosen_spanish: echo fuera los demonios
  alternatives_spanish:
  - expulso a los demonios
  - echo fuera demonios
  lexicon: BDAG
  rationale: En contextos de exorcismo, ἐκβάλλω conserva la fuerza de expulsión. 'Echo fuera' comunica ese valor con naturalidad en español y evita una paraprástasis excesiva; 'expulso' también sería viable, pero 'echo fuera' preserva mejor el tono verbal del gesto. δαιμόνια se traduce por 'demonios', como en el inglés POB.
- source_word: οἱ υἱοὶ ὑμῶν
  english_pob_choice: your sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos / sus discípulos
  lexicon: BDAG
  rationale: El griego dice literalmente 'los hijos de ustedes'. En español, 'sus hijos' mantiene el paralelo retórico y la literalidad del sustantivo υἱοί. Dado que el contexto apunta probablemente a miembros del mismo grupo o a discípulos de los oyentes, no se explicita esa interpretación en el texto principal para no alejarse del término fuente.
- source_word: ἐν τίνι
  english_pob_choice: by whom
  chosen_spanish: ¿por quién
  alternatives_spanish:
  - ¿por qué medio?
  - ¿en quién?
  lexicon: BDAG
  rationale: La pregunta es instrumental/agentiva; en español, '¿por quién?' es la forma idiomática que conserva el valor de 'by whom' sin calco. '¿Por qué medio?' introduce una especificación que el griego no requiere.
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: '''διὰ τοῦτο'' introduce conclusión. ''Por eso'' es claro, natural y suficientemente formal para el registro del pasaje. ''Por tanto'' sería más académico; se prefiere un equivalente bíblico-natural contemporáneo.'
- source_word: κριταὶ ἔσονται ὑμῶν
  english_pob_choice: they will be your judges
  chosen_spanish: ellos serán sus jueces
  alternatives_spanish:
  - ellos serán jueces de ustedes
  - ellos los juzgarán
  lexicon: BDAG
  rationale: La construcción predicativa del griego se refleja con 'serán sus jueces', que preserva la imagen de un rol judicial sin convertirla en una paráfrasis verbal. 'Jueces de ustedes' es posible, pero menos natural en español actual; 'los juzgarán' desplaza la estructura nominal del original.
theological_decisions:
- issue: Nombre de Beelzebul / forma transliterada frente a variante tradicional
  english_pob_reading: Beelzebul
  chosen_spanish_reading: Beelzebul (mencionado en nota como variante tradicional Beelzebub)
  alternative_spanish_readings:
  - Beelzebub
  - Belcebú
  rationale: El POB inglés sigue la forma del texto griego Βεελζεβούλ y prefiere transliteración antes que armonización con la forma tradicional inglesa. En español, la misma decisión se refleja con Beelzebul en el texto y una nota sobre Beelzebub como variante conocida. No se usa una adaptación eclesiástica tradicional para no perder la huella del texto fuente.
  doctrine_reference: Original-language primacy over translation tradition; transliterate names.
translation_notes:
  revision_awareness: Coincide con la lectura del POB inglés y con el griego SBLGNT; no se detectaron revisiones aplicadas en el audit trail. La única tensión relevante es el nombre propio Βεελζεβούλ, donde la forma transliterada y la variante tradicional se conservan en nota sin borrar la preferencia del texto fuente.
  spanish_consistency_notes:
  - Mantener 'Yahvé' como forma normal para el nombre divino cuando el contexto lo requiera; aquí no aparece.
  - Conservar 'demonios' para τὰ δαιμόνια, sin suavizar a 'espíritus malos'.
  - Usar 'sus' para ὑμῶν por concordancia de tratamiento; el antecedente es plural y de segunda persona de respeto/neutralidad.
  - '''Jueces'' preserva el predicado nominal plural y el matiz judicial del original.'
