  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «pensamientos», «reino», «ciudad», «casa» y «no permanecerá» son compatibles con el expediente inglés. La excepción recomendada es cambiar «sabiendo» por «conociendo» por razones de naturalidad española, no de glosario.
