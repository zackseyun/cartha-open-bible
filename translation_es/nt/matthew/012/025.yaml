translation:
  language: es
  text: 'Pero, conociendo sus pensamientos[a], les dijo: «Todo reino dividido contra sí mismo queda desolado[b], y toda ciudad o casa[c] dividida contra sí misma no permanecerá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «razonamientos» o «intenciones» para «pensamientos».
    reason: lexical_alternative
  - marker: b
    text: O «es llevado a la desolación» o «queda arruinado».
    reason: lexical_alternative
  - marker: c
    text: «Casa» también puede llevar aquí el sentido de «casa/familia» o «familia».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - al saber
  lexicon: BDAG
  rationale: El participio aquí introduce una percepción mental previa a la respuesta de Jesús. «Sabiendo» preserva la relación participial y suena natural en español sin añadir el modo de conocimiento.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca un giro suave y contrastivo. «Pero» refleja bien el cambio argumentativo en el contexto inmediato.
- source_word: τὰς ἐνθυμήσεις
  english_pob_choice: thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus razonamientos
  - sus intenciones
  lexicon: BDAG
  rationale: ἐνθυμήσεις puede abarcar pensamientos, razonamientos o intenciones. «Pensamientos» es claro y directo; el posesivo explicita en español el referente de αὐτῶν sin cambiar el sentido.
- source_word: Πᾶσα βασιλεία
  english_pob_choice: Every kingdom
  chosen_spanish: Todo reino
  alternatives_spanish:
  - Cada reino
  - Cualquier reino
  lexicon: BDAG
  rationale: πᾶσα con singular proverbial puede traducirse de forma universal. «Todo reino» transmite la fuerza general del dicho con naturalidad en español.
- source_word: μερισθεῖσα καθ’ ἑαυτῆς
  english_pob_choice: divided against itself
  chosen_spanish: dividido contra sí mismo
  alternatives_spanish:
  - dividido en sí mismo
  - dividido dentro de sí
  lexicon: BDAG
  rationale: La frase expresa división interna con oposición reflexiva. «Contra sí mismo» reproduce bien la imagen idiomática y su fuerza polémica.
- source_word: ἐρημοῦται
  english_pob_choice: is laid waste
  chosen_spanish: queda desolado
  alternatives_spanish:
  - es devastado
  - queda arruinado
  lexicon: BDAG
  rationale: El verbo puede significar volverse desolado o arruinado. «Queda desolado» conserva el resultado de la división y deja abierta la alternativa de ruina sin forzar un solo matiz.
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: πόλις se traduce de manera directa por «ciudad».
- source_word: ἢ οἰκία
  english_pob_choice: city or house
  chosen_spanish: o casa
  alternatives_spanish:
  - o hogar
  - o familia
  lexicon: BDAG
  rationale: οἰκία puede significar casa o casa/familia como unidad doméstica. «Casa» preserva la forma del griego y permite por implicación el sentido de hogar o casa familiar.
- source_word: οὐ σταθήσεται
  english_pob_choice: will not stand
  chosen_spanish: no permanecerá
  alternatives_spanish:
  - no se mantendrá
  - no resistirá
  lexicon: BDAG
  rationale: En este dicho, ἵστημι en futuro pasivo expresa permanecer firme o subsistir. «No permanecerá» comunica bien la idea de no subsistir ni mantenerse estable.
theological_decisions:
- issue: Modo del conocimiento de Jesús sobre los pensamientos internos
  english_pob_reading: Render the text simply as Jesus 'knowing their thoughts' without specifying whether this knowledge was supernatural omniscience, prophetic insight, or perceptive discernment.
  chosen_spanish_reading: Traducir simplemente «sabiendo sus pensamientos», sin precisar si el conocimiento fue omnisciencia sobrenatural, discernimiento profético o percepción contextual.
  alternative_spanish_readings:
  - conociendo sobrenaturalmente sus pensamientos
  - deduciendo sus pensamientos por el contexto
  rationale: El versículo afirma el hecho del conocimiento, pero no explica su mecanismo. La traducción mantiene esa tensión teológica y evita agregar una afirmación doctrinal no explicitada por el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se requirieron cambios en la pasada de revisión más reciente; el borrador mantiene la lectura de alta concordancia y conserva las tensiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se usó «Pero» para δέ, coherente con el giro argumentativo del contexto.
  - Se prefirió «pensamientos» como equivalente base de ἐνθυμήσεις y se dejó nota de alternativas.
  - Se mantuvo «casa» para οἰκία, con nota que preserva la posible extensión a hogar/familia.
  - Se evitó introducir lenguaje doctrinal sobre la fuente del conocimiento de Jesús.
  - La puntuación y las comillas siguen el uso español estándar.
