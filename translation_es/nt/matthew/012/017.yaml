translation:
  language: es
  text: 'para que se cumpliera lo que fue dicho por medio[a] del profeta Isaías, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «por Isaías el profeta». «Por medio de» refleja más literalmente el griego διά con genitivo y resalta la mediación profética.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce una cláusula de propósito/resultado. En español, 'para que' conserva bien la fuerza final sin sonar forzado.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplido
  - llegara a cumplirse
  lexicon: BDAG
  rationale: El subjuntivo pasivo expresa la idea de cumplimiento de la fórmula mateana. 'Se cumpliera' es natural en español y mantiene el sentido de realización de la escritura.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que fue dicho
  alternatives_spanish:
  - lo dicho
  - lo que se había dicho
  lexicon: BDAG
  rationale: El participio sustantivado pasivo se vierte de forma directa. 'Lo que fue dicho' conserva el pasivo y la referencia al dicho citado.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por
  - a través de
  lexicon: BDAG
  rationale: Con genitivo y un profeta nombrado, διά expresa mediación. 'Por medio de' preserva la idea de instrumento humano sin borrar que Dios es la fuente última del mensaje.
- source_word: Ἠσαΐου
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaías
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: τοῦ προφήτου
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: BDAG
  rationale: Mantiene la aposición explícita del griego y la fórmula de cita de Mateo.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - al decir
  lexicon: BDAG
  rationale: Introduce la cita que continúa en el versículo siguiente; 'diciendo' conserva el enlace directo y es idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Agencia profética en la fórmula de cita
  english_pob_reading: through Isaiah the prophet
  chosen_spanish_reading: por medio de Isaías, el profeta
  alternative_spanish_readings:
  - por Isaías, el profeta
  - a través de Isaías, el profeta
  rationale: La preposición española elegida refleja mediación, no autoría última. Esto mantiene la lectura teológica de que Dios habla a través del profeta y sigue de cerca la fuerza de διά con genitivo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español donde corresponde.
  spanish_consistency_notes:
  - Se usó 'profeta' como aposición explícita, en línea con la fórmula de cita de Mateo.
  - Se prefirió 'se cumpliera' para mantener el valor de cumplimiento profético sin sobretraducir la modalidad verbal.
  - No se introdujo 'Mesías' ni terminología ajena al pasaje; el contenido es una fórmula de cumplimiento escritural.
