translation:
  language: es
  text: Entonces se va y toma consigo siete otros espíritus[a], más malvados que él, y, al entrar, habitan allí; y el estado final de aquel hombre llega a ser peor que el primero[b]. Así también será con esta generación mala.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete espíritus diferentes, más perversos que él».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «las últimas cosas de aquel hombre llegan a ser peores que las primeras», una expresión idiomática que significa que su condición final es peor que la anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural en español y conserva el valor temporal y discursivo.
- source_word: πορεύεται
  english_pob_choice: it goes
  chosen_spanish: se va
  alternatives_spanish:
  - va
  - parte
  lexicon: BDAG
  rationale: En este contexto demoníaco, la idea básica es de desplazamiento/departida. «Se va» reproduce bien el movimiento narrativo sin sobrecargar el verbo.
- source_word: παραλαμβάνει μεθ’ ἑαυτοῦ
  english_pob_choice: brings with itself
  chosen_spanish: toma consigo
  alternatives_spanish:
  - lleva consigo
  - toma con él mismo
  lexicon: BDAG
  rationale: El griego expresa acompañamiento reflexivo. «Toma consigo» es idiomático en español y preserva la noción de llevar algo junto con uno.
- source_word: ἑπτὰ ἕτερα πνεύματα
  english_pob_choice: seven other spirits
  chosen_spanish: siete espíritus diferentes
  alternatives_spanish:
  - siete otros espíritus
  - siete espíritus distintos
  lexicon: BDAG
  rationale: ἕτερα puede ser «otros» o «diferentes»; aquí el matiz relevante es que son espíritus adicionales y no simplemente repetición del primero. «Diferentes» evita una repetición dura y mantiene la alternativa semántica preservada por el inglés.
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - demonios
  lexicon: BDAG
  rationale: Se conserva el sustantivo del texto griego. Aunque el contexto es demoníaco, traducir «demonios» añadiría especificidad no presente en esta cláusula.
- source_word: πονηρότερα ἑαυτοῦ
  english_pob_choice: more evil than itself
  chosen_spanish: más malos que él mismo
  alternatives_spanish:
  - más perversos que él mismo
  - más malignos que él mismo
  lexicon: BDAG
  rationale: El comparativo expresa mayor maldad moral. En español, «más malos» es directo y transparente; el referente sigue siendo el espíritu inicial, por eso se mantiene el pronombre singular «él mismo» para reflejar la comparación del texto fuente.
- source_word: εἰσελθόντα κατοικεῖ ἐκεῖ
  english_pob_choice: they enter and live there
  chosen_spanish: y, al entrar, habitan allí
  alternatives_spanish:
  - y entran y viven allí
  - y, habiendo entrado, habitan allí
  lexicon: BDAG
  rationale: 'El participio aoristo plural se vierte de forma participial en español para conservar la secuencia: entran y luego habitan. «Habitan allí» refleja κατοικέω con un registro digno y claro.'
- source_word: κατοικεῖ
  english_pob_choice: live there
  chosen_spanish: habitan allí
  alternatives_spanish:
  - viven allí
  - residen allí
  lexicon: BDAG
  rationale: «Habitar» comunica residencia permanente o asentamiento, más fuerte que «vivir» en este contexto de ocupación del lugar.
- source_word: τὰ ἔσχατα τοῦ ἀνθρώπου ἐκείνου
  english_pob_choice: the last state of that man
  chosen_spanish: el estado final de aquel hombre
  alternatives_spanish:
  - las últimas cosas de aquel hombre
  - la condición final de aquel hombre
  lexicon: BDAG
  rationale: 'El griego es idiomático: literalmente «las últimas cosas». El español claro y fiel es «estado final», que conserva la idea de condición resultante sin perder el contraste con «el primero».'
- source_word: χείρονα τῶν πρώτων
  english_pob_choice: worse than the first
  chosen_spanish: peor que el primero
  alternatives_spanish:
  - peor que las primeras cosas
  - peor que el estado anterior
  lexicon: BDAG
  rationale: La comparación final contrasta el resultado con el estado inicial. «El primero» mantiene la referencia implícita del griego y el paralelo con la frase anterior.
- source_word: τοῦ ἀνθρώπου ἐκείνου
  english_pob_choice: of that man
  chosen_spanish: de aquel hombre
  alternatives_spanish:
  - de esa persona
  lexicon: BDAG
  rationale: Se conserva el masculino singular del original, en línea con la lectura del POB inglés y su decisión de no neutralizar el sustantivo.
- source_word: οὕτως ἔσται καὶ τῇ γενεᾷ ταύτῃ τῇ πονηρᾷ
  english_pob_choice: So it will be also with this evil generation
  chosen_spanish: Así también será con esta generación mala
  alternatives_spanish:
  - Así será también para esta generación mala
  - Así también le sucederá a esta generación mala
  lexicon: BDAG
  rationale: La aplicación se expresa de forma directa y natural. «Con esta generación mala» reproduce el dativo de relación y mantiene la valoración moral del adjetivo sin suavizarlo.
theological_decisions:
- issue: Referencia demoníaca de πνεύματα sin explicitar «demonios»
  english_pob_reading: spirits
  chosen_spanish_reading: espíritus
  alternative_spanish_readings:
  - demonios
  rationale: El texto griego dice «espíritus», y el contexto ya establece que son malignos. Mantener «espíritus» respeta la primacía del original y evita una aclaración interpretativa no expresada en la cláusula.
  doctrine_reference: Primacía del original; evitar ampliación semántica innecesaria
- issue: Valor del masculino singular ἀνθρώπου
  english_pob_reading: that man
  chosen_spanish_reading: aquel hombre
  alternative_spanish_readings:
  - aquella persona
  rationale: El ejemplo es singular y masculino en griego. Se conserva el masculino en español para no neutralizar la forma del texto ni borrar la referencia ejemplar.
  doctrine_reference: Principio de precisión gramatical y semántica
- issue: Idiomatismo de τὰ ἔσχατα ... χείρονα τῶν πρώτων
  english_pob_reading: the last state ... becomes worse than the first
  chosen_spanish_reading: el estado final ... peor que el primero
  alternative_spanish_readings:
  - las últimas cosas ... peor que las primeras
  - la condición final ... peor que la anterior
  rationale: La expresión griega es idiomática y no debe leerse literalmente de manera extraña en español. «Estado final» comunica la condición resultante sin borrar la comparación de final vs. inicial.
  doctrine_reference: Lectura idiomática controlada por el griego
- issue: Comparativo moral de πονηρᾷ / πονηρότερα
  english_pob_reading: evil
  chosen_spanish_reading: mala
  alternative_spanish_readings:
  - malvada
  - perversa
  rationale: Se mantiene la consistencia léxica entre ambos adjetivos. «Mala» es comprensible, sobria y suficientemente fuerte en español; no se intensifica más allá del alcance del comparativo griego.
  doctrine_reference: Consistencia léxica y no sobretraducción moral
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se introdujeron cambios de sentido sustanciales. La principal decisión de estilo fue elegir una formulación española más natural para «it goes and brings with itself» y para el idiomatismo «the last things ... worse than the first», manteniendo intactas las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se conservó «espíritus» en lugar de «demonios» para respetar el sustantivo griego.
  - Se mantuvo el masculino singular «él mismo / aquel hombre» como reflejo del original.
  - Se eligió «mala» para πονηρᾷ a fin de mantener coherencia con «más malos» en el comparativo.
  - Se usó «habitan allí» para κατοικεῖ por su matiz de residencia estable y tono digno.
  - Las notas al pie reflejan las alternativas léxicas documentadas sin añadir otras no atestiguadas.
