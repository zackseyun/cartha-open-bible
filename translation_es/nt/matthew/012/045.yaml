    reason: lexical_alternative
  revision_rationale: 'La revisión corrige la principal desalineación con el rastro POB: pone «otros» en el texto principal para ἕτερα y deja «diferentes» como alternativa en nota. También mejora la naturalidad de «más malos que él mismo» a «más malvados que él», preservando el comparativo moral sin sobreinterpretar. Se normaliza además la nota b. No hace falta adjudicación adicional porque los cambios son menores, claros y directamente sustentados por el griego y el audit trail.'
