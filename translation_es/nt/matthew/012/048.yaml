translation:
  language: es
  text: 'Pero él respondió al que le hablaba[a]: «¿Quién es mi madre, y quiénes son mis hermanos?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Pero él respondió y dijo al que le hablaba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἀποκριθεὶς εἶπεν
  english_pob_choice: But he answered
  chosen_spanish: Pero él respondió
  alternatives_spanish:
  - Y él respondió
  - Pero respondiendo, dijo
  lexicon: BDAG
  rationale: En español, «respondió» comunica el valor del giro idiomático griego ἀποκριθεὶς εἶπεν sin forzar una redundancia innecesaria. «Pero» conserva el cambio discursivo marcado por δέ.
- source_word: τῷ λέγοντι αὐτῷ
  english_pob_choice: the one speaking to him
  chosen_spanish: al que le hablaba
  alternatives_spanish:
  - al que le decía
  - al que le estaba hablando
  lexicon: BDAG
  rationale: El participio presente funciona como sustantivo y señala a la persona que se dirige a Jesús. «Le hablaba» mantiene la acción en curso con naturalidad en español y conserva el referente relacional del dativo.
- source_word: Τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Qué persona
  lexicon: BDAG
  rationale: La pregunta busca identidad personal; «¿Quién» es la forma natural y precisa en español.
- source_word: μήτηρ μου
  english_pob_choice: my mother
  chosen_spanish: mi madre
  alternatives_spanish:
  - mi mamá
  lexicon: BDAG
  rationale: Es una correspondencia directa del término de parentesco, con el registro digno apropiado al contexto.
- source_word: καὶ τίνες
  english_pob_choice: and who
  chosen_spanish: y quiénes
  alternatives_spanish:
  - y cuáles personas
  lexicon: BDAG
  rationale: El plural griego se conserva con «quiénes», que resulta natural en español y refleja la repetición paralela de la pregunta.
- source_word: οἱ ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis hermanos y hermanas
  - mis parientes
  lexicon: BDAG
  rationale: En español, «hermanos» mantiene el valor masculino plural del griego ἀδελφοί y la referencia inmediata del pasaje. No se amplía a «hermanos y hermanas» porque el contexto narrativo no lo exige.
theological_decisions:
- issue: La pregunta de Jesús sobre su familia no debe explicarse ni suavizarse en la traducción.
  english_pob_reading: Retain the literal rhetorical questions without explanatory expansion
  chosen_spanish_reading: Mantener las preguntas retóricas literales sin expansión explicativa
  alternative_spanish_readings:
  - ¿Quién cuenta como mi madre, y quién cuenta como mis hermanos?
  - ¿Quién es, pues, mi madre, y quiénes son mis hermanos?
  rationale: El versículo prepara la redefinición de parentesco en el contexto inmediato, pero aquí la traducción no debe adelantar esa interpretación. La literalidad preserva la tensión narrativa y teológica.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Valor de ἀδελφοί en este contexto
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: El referente inmediato es masculino plural y la escena presenta la formulación tal como aparece en el griego. «Hermanos» conserva esa precisión sin introducir una expansión no documentada en este versículo.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El texto griego y el control auditado en inglés muestran alta concordancia y no registran revisiones aplicadas; esta versión española sigue esa estabilidad, preservando la estructura retórica y las opciones léxicas básicas sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Pero» para δέ y «respondió» para ἀποκριθεὶς εἶπεν, evitando un calco pesado.
  - «Al que le hablaba» conserva el participio presente como acción en curso y no lo convierte en una construcción explicativa más larga.
  - Se usa «hermanos» por fidelidad al plural masculino ἀδελφοί, sin neutralización del referente.
  - La puntuación y las comillas siguen normas editoriales del español; el marcador de nota está anclado en la frase verbal correspondiente.
