translation:
  language: es
  text: El hombre bueno[a] saca cosas buenas de su buen tesoro[b], y el hombre malo saca cosas malas de su mal tesoro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'persona' para 'hombre'; el griego usa ἄνθρωπος en sentido representativo masculino singular.
    reason: lexical_alternative
  - marker: b
    text: El contexto inmediato tiene que ver con las palabras, así que 'cosas buenas' y 'cosas malas' pueden referirse especialmente a palabras.
    reason: cross_reference
lexical_decisions:
- source_word: ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - recto
  - virtuoso
  lexicon: BDAG
  rationale: Conserva el paralelismo con ἀγαθά y la oposición moral con πονηρός, usando en español un adjetivo natural y directo para la persona y para lo que produce.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: BDAG
  rationale: Mantiene el valor masculino singular del griego como tipo representativo, en línea con la decisión auditada de la POB inglesa. 'Persona' suavizaría esa forma marcada.
- source_word: θησαυροῦ
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - depósito
  - reserva
  - almacén
  lexicon: BDAG
  rationale: '''Tesoro'' es el equivalente natural y conserva la metáfora de un acopio interior del cual salen las acciones o palabras.'
- source_word: ἐκβάλλει
  english_pob_choice: brings out
  chosen_spanish: saca
  alternatives_spanish:
  - hace salir
  - extrae
  - arroja
  lexicon: BDAG
  rationale: '''Saca'' comunica el movimiento de salida de ἐκβάλλω con naturalidad en español, sin volver la imagen demasiado violenta como ''arroja'' ni demasiado abstracta como ''produce''.'
- source_word: ἀγαθά
  english_pob_choice: good things
  chosen_spanish: cosas buenas
  alternatives_spanish:
  - bienes
  - lo bueno
  - cosas buenas y útiles
  lexicon: BDAG
  rationale: El neutro plural sustantivado se vuelve explícito como 'cosas buenas', preservando el sentido amplio del griego sin estrecharlo solo a palabras o acciones.
- source_word: πονηρὸς
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - maligno
  - perverso
  lexicon: BDAG
  rationale: '''Malo'' funciona bien en la simetría proverbial del versículo y permite un contraste claro con ''bueno''; ''malvado'' intensificaría el juicio sin necesidad textual inmediata.'
- source_word: πονηρά
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - males
  - lo malo
  - cosas perversas
  lexicon: BDAG
  rationale: Como con ἀγαθά, el plural neutro sustantivado se expresa de modo natural como 'cosas malas', conservando la amplitud semántica del original.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - de dentro de
  lexicon: BDAG
  rationale: La preposición 'de' fluye con el sustantivo 'tesoro' en español y ya queda implícita la procedencia; 'de dentro de' sería más pesado sin aportar más fidelidad esencial.
theological_decisions:
- issue: Alcance de 'cosas buenas / cosas malas' en el contexto inmediato de habla
  english_pob_reading: The verse keeps the broader wording of 'good things' and 'evil things,' while the immediate context suggests speech may be especially in view.
  chosen_spanish_reading: La traducción mantiene 'cosas buenas' y 'cosas malas' en el texto principal, dejando que el contexto cercano indique si se trata especialmente de palabras.
  alternative_spanish_readings:
  - '''buenas palabras'' / ''malas palabras'''
  - '''buenas cosas'' / ''malas cosas'' con nota restrictiva a palabras'
  rationale: El griego usa adjetivos sustantivados neutros plurales, no un sustantivo explícito para 'palabras'; por eso el texto principal no debe cerrar prematuramente el sentido. La referencia contextual a la enseñanza sobre la խոսa se puede señalar en nota sin empobrecer el versículo.
  doctrine_reference: Preservar la tensión contextual sin resolverla por adelantado.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje mantiene la formulación auditada de la POB inglesa sin cambios sustanciales. La versión española sigue esa misma línea, conservando el paralelismo y la amplitud semántica del griego.
  spanish_consistency_notes:
  - Se prefirió 'bueno/malo' sobre 'recto/impío' para reflejar la simetría léxica del griego ἀγαθός/πονηρός.
  - Se usó 'tesoro' como traducción uniforme de θησαυρός.
  - Se eligió 'saca' para ἐκβάλλει por su naturalidad en español y por conservar la idea de salida desde un depósito interno.
  - Las notas mantienen la ambigüedad entre acciones y palabras, en línea con el audit trail inglés.
