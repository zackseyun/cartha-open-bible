translation:
  language: es
  text: No disputará ni gritará[a], y nadie oirá su voz en las calles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No contenderá ni clamará, y nadie oirá su voz en las plazas públicas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρίσει
  english_pob_choice: will quarrel
  chosen_spanish: contenderá
  alternatives_spanish:
  - peleará
  - disputará
  - riñirá
  lexicon: BDAG
  rationale: ἐρίζω expresa entrar en contienda o disputa. «Contenderá» conserva el matiz de disputa sin sonar tan coloquial como «peleará» y evita el tono más arcaico de «disputará» en este contexto profético.
- source_word: κραυγάσει
  english_pob_choice: will cry out
  chosen_spanish: gritará
  alternatives_spanish:
  - clamará
  - alzará la voz
  - exclamará
  lexicon: BDAG
  rationale: κραυγάζω indica gritar o clamar en voz alta. «Gritará» reproduce bien la intensidad sonora y mantiene el paralelismo con la negación anterior; «clamará» sería posible, pero en español puede sonar más litúrgico que descriptivo.
- source_word: ἀκούσει τις
  english_pob_choice: no one will hear
  chosen_spanish: nadie oirá
  alternatives_spanish:
  - no oirá nadie
  - nadie escuchará
  lexicon: BDAG
  rationale: La construcción negada con τις funciona idiomáticamente como «nadie». «Nadie oirá» es natural en español y preserva el sentido de que no habrá recepción pública de su voz.
- source_word: ἐν ταῖς πλατείαις
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas públicas
  - en los lugares públicos
  - en las vías anchas
  lexicon: BDAG
  rationale: πλατεῖα puede referirse a una calle ancha o espacio público abierto. «Calles» es el equivalente más natural y suficientemente amplio; «plazas públicas» interpreta más específicamente el espacio y puede ir más allá de lo que exige el griego.
- source_word: φωνὴν αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - su clamor
  lexicon: BDAG
  rationale: φωνή aquí significa «voz». «Su voz» es la forma clara y directa en español, adecuada para una cita que enfatiza la manera pública de hablar del Siervo/Mesías.
theological_decisions:
- issue: Carácter del Mesías como Siervo no contencioso en la cita de Isaías
  english_pob_reading: The verse describes the Messiah as non-contentious and not self-promoting in public display.
  chosen_spanish_reading: El versículo presenta al Mesías como no pendenciero ni dado a exhibirse en público.
  alternative_spanish_readings:
  - El versículo presenta al Mesías como completamente silencioso en público.
  - El versículo describe solo una voz suave, sin excluir toda proclamación pública.
  rationale: El griego afirma una ausencia de contienda y de griterío, y que su voz no se oirá en las calles; esto caracteriza su modo de actuar, no impone un silencio absoluto. «No pendenciero» y «no dado a exhibirse en público» conservan esa tensión sin exagerarla.
  doctrine_reference: Mateo 12:19; Isaías 42:2
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión del contexto inglés: no se requieren cambios sustanciales respecto a la lectura auditada, solo una formulación española natural y fiel al paralelo negado del griego.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» en la explicación teológica por tratarse de la cita de Isaías aplicada a Jesús, aunque el versículo mismo no nombra al personaje.
  - «Calles» traduce de forma idiomática πλατεῖαι sin borrar su matiz de espacio público transitado; la nota ofrece «plazas públicas» como alternativa válida.
  - Se conserva la progresión negativa del griego con «ni... ni...» implícito en la coordinación española, sin añadir matices doctrinales ajenos al texto.
