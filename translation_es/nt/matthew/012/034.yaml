translation:
  language: es
  text: ¡Cría de víboras[a]! ¿Cómo pueden hablar cosas buenas, siendo malos? Porque de lo que rebosa[b] el corazón habla la boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Prole de víboras».
    reason: lexical_alternative
  - marker: b
    text: O «de la abundancia del corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: γεννήματα ἐχιδνῶν
  english_pob_choice: Offspring of vipers
  chosen_spanish: Generación de víboras
  alternatives_spanish:
  - Prole de víboras
  - Cría de víboras
  lexicon: BDAG
  rationale: γέννημα expresa lo engendrado, producido o nacido; con el genitivo ἐχιδνῶν forma una metáfora de linaje y carácter. En español, «generación» conserva bien la idea de descendencia/colectividad y suena más natural y solemne que un calco como «offspring». «Víboras» mantiene la imagen dura del original.
- source_word: πῶς δύνασθε
  english_pob_choice: how can you
  chosen_spanish: cómo pueden
  alternatives_spanish:
  - cómo son capaces de
  - de qué manera pueden
  lexicon: BDAG
  rationale: La combinación expresa incapacidad o imposibilidad retórica. «Cómo pueden» reproduce con naturalidad esa fuerza en español y conserva el tono de reprensión.
- source_word: ἀγαθὰ λαλεῖν
  english_pob_choice: speak good things
  chosen_spanish: hablar cosas buenas
  alternatives_spanish:
  - hablar lo bueno
  - decir cosas buenas
  lexicon: BDAG
  rationale: ἀγαθά es neutro plural con función sustantiva; λαλεῖν significa hablar/decir. «Hablar cosas buenas» mantiene la relación entre el contenido del habla y la calificación moral, sin sonar forzado en español.
- source_word: πονηροὶ ὄντες
  english_pob_choice: when you are evil
  chosen_spanish: siendo malos
  alternatives_spanish:
  - cuando son malos
  - puesto que son malos
  lexicon: BDAG
  rationale: El participio expresa la condición concomitante o circunstancial del hablante. «Siendo malos» preserva esa relación y deja visible la valoración moral fuerte de πονηροί; «malos» es más directo que «malvados» y evita intensificar sin base adicional.
- source_word: ἐκ γὰρ τοῦ περισσεύματος
  english_pob_choice: For out of the overflow
  chosen_spanish: Porque de la abundancia
  alternatives_spanish:
  - Porque del desbordamiento
  - Porque de lo que rebosa
  lexicon: BDAG
  rationale: περίσσευμα puede significar abundancia, sobrante o rebosamiento. En español, «abundancia» es la opción más natural y suficientemente fiel; mantiene la imagen de algo interno que llena y se manifiesta hacia afuera. Se conserva la alternativa «overflow/abundancia» en la nota.
- source_word: τῆς καρδίας
  english_pob_choice: of the heart
  chosen_spanish: del corazón
  alternatives_spanish:
  - del interior
  - de la mente
  lexicon: BDAG
  rationale: καρδία en uso bíblico denota la persona interior, no solo emociones. «Corazón» es el equivalente estándar y más amplio en español, por lo que preserva el campo semántico sin reducirlo.
- source_word: τὸ στόμα λαλεῖ
  english_pob_choice: the mouth speaks
  chosen_spanish: habla la boca
  alternatives_spanish:
  - la boca dice
  - la boca habla
  lexicon: BDAG
  rationale: La cláusula es literal y proverbial. «Habla la boca» sigue de cerca el orden y la imagen del griego; en español suena natural y conserva el paralelismo con el corazón.
theological_decisions:
- issue: Metáfora del ‘corazón’ como centro interior
  english_pob_reading: Retain 'heart' as the biblical term for the inner person rather than interpreting it as merely emotions or mind.
  chosen_spanish_reading: Mantener «corazón» como término bíblico para la persona interior, sin reducirlo a emoción o a mente.
  alternative_spanish_readings:
  - interior
  - mente
  rationale: El versículo fundamenta el hablar externo en el centro moral e interior de la persona. «Corazón» preserva esa antropología bíblica y evita estrechar el sentido del griego.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza moral de πονηροί
  english_pob_reading: Translate πονηροί as 'evil' rather than softening to 'bad.'
  chosen_spanish_reading: Traducir πονηροί como «malos», manteniendo la reprensión moral sin suavizarla indebidamente.
  alternative_spanish_readings:
  - malvados
  - malos
  rationale: En español, «malos» comunica una evaluación moral clara y directa, suficientemente fuerte para el contexto de reprensión. «Malvados» podría sonar más intenso de lo que el griego exige en esta formulación breve.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El pasaje fue revisado y el último pase marcó 'unchanged'; no hay cambios pendientes respecto del control previo. La redacción española sigue el mismo sentido auditado, con equivalentes naturales y conservando las dos alternativas léxicas principales en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantiene «corazón» para καρδία y no se sustituye por «mente» o «interior» en el texto principal.
  - Se conserva el paralelismo proverbial entre el interior y la boca mediante una sintaxis española natural.
  - Las notas al pie sólo registran alternativas léxicas documentadas por el audit trail inglés.
