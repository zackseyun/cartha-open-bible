revisions:
- from: ¡Generación de víboras[a], cómo pueden hablar cosas buenas, siendo malos? Porque de la abundancia[b] del corazón habla la boca.
  to: ¡Cría de víboras[a]! ¿Cómo pueden hablar cosas buenas, siendo malos? Porque de lo que rebosa[b] el corazón habla la boca.
  rationale: Se reemplaza «Generación» por «Cría» para reflejar mejor γεννήματα como descendencia/prole producida, preservando la metáfora dura del original. Se ajusta περίσσευμα a «lo que rebosa» para mantener como principal la imagen de desbordamiento/overflow documentada en el POB inglés, dejando «abundancia» como alternativa en nota. También se corrige la puntuación interrogativa española. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:07:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: el vocativo insultante, la imposibilidad retórica de hablar bien siendo moralmente corruptos, y la explicación proverbial sobre el corazón y la boca. Sin embargo, hay dos desajustes importantes frente al original y al rastro POB en inglés: «Generación de víboras» no reproduce bien γεννήματα ἐχιδνῶν, que apunta a descendencia/cría/prole más que a «generación»; y la nota b está invertida respecto de la decisión principal inglesa, pues el texto español usa «abundancia» mientras el POB inglés privilegia la imagen más vívida de «overflow».'
  spanish_quality_summary: El español es legible y digno, pero «¡Generación de víboras!» suena menos natural y menos preciso que «¡Cría de víboras!» o «¡Prole de víboras!». Además, en interrogativas directas corresponde «¿cómo...?» y no solo coma tras el vocativo. «Habla la boca» es aceptable, aunque «la boca habla» fluye mejor en español estándar; sin embargo, mantener el orden final también puede funcionar por énfasis. Conviene alinear el texto principal con la imagen de rebosamiento/desbordamiento.
  glossary_alignment: No hay conflictos con términos globales del proyecto. La principal cuestión léxica es escoger una opción española para γεννήματα que preserve descendencia/linaje metafórico. También conviene mantener la fuerza de πονηροί con «malos» o «malvados»; «malos» es aceptable. Para περίσσευμα, «desbordamiento» o «lo que rebosa» refleja mejor la decisión principal inglesa que «abundancia», aunque esta última puede quedar en nota.
  issues:
  - severity: high
    issue: «Generación de víboras» para γεννήματα ἐχιδνῶν
    rationale: «Generación» en español suele referirse a cohorte/época o linaje colectivo de forma más abstracta, no a lo engendrado o producido. El griego apunta a descendencia/cría/prole y la metáfora insultante se preserva mejor con «cría» o «prole».
  - severity: medium
    issue: La nota b no corresponde a la elección principal inglesa sobre περίσσευμα
    rationale: El POB inglés eligió «overflow» como texto principal y dejó «abundance» como alternativa. El borrador español invierte esa relación al poner «abundancia» en el texto y «desbordamiento» solo en nota.
  - severity: low
    issue: Puntuación inicial de la interrogación
    rationale: En español debe abrirse la pregunta con «¿» tras el vocativo exclamativo o, más naturalmente, usar solo la interrogación para toda la frase después del vocativo.
  revised_spanish_text: ¡Cría de víboras[a]! ¿Cómo pueden hablar cosas buenas, siendo malos? Porque de lo que rebosa[b] el corazón habla la boca.
