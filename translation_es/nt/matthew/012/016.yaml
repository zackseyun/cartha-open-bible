revisions:
- from: Y lo reprendió[a] para que no lo dieran a conocer.
  to: Y les advirtió[a] que no lo dieran a conocer.
  rationale: Se corrige el referente de αὐτοῖς con «les», y se sustituye «reprendió» por «advirtió» para alinearse con la decisión léxica del POB inglés y con el contexto de una prohibición de divulgarlo. Se mantiene «no lo dieran a conocer» como una representación natural y fiel de φανερὸν ... ποιήσωσιν. «Que no» suena más idiomático tras «advirtió» que «para que no», sin cambiar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:11:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: El griego καὶ ἐπετίμησεν αὐτοῖς ἵνα μὴ φανερὸν αὐτὸν ποιήσωσιν significa que Jesús dirigió una advertencia/mandato enérgico a ellos para que no lo hicieran conocido. El borrador español pierde el referente explícito de αὐτοῖς al decir «lo reprendió» (singular) en lugar de un plural indirecto como «les advirtió/les ordenó», y «reprendió» inclina demasiado hacia censura moral frente al matiz contextual documentado de advertencia fuerte.
  spanish_quality_summary: La segunda cláusula «para que no lo dieran a conocer» es idiomática y fiel. El problema principal de legibilidad y gramática es «lo reprendió», que sugiere un objeto singular y contradice el dativo plural del original. Una formulación como «Y les advirtió[a] que no lo dieran a conocer» suena natural, clara y digna en español eclesial general.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. La decisión clave es ἐπετίμησεν: según el rastro inglés, el valor preferido es «warned», con alternativas «strictly warned» u «ordered». En español, «advirtió» alinea mejor con esa decisión que «reprendió»; la nota puede conservar «les advirtió severamente» o «les ordenó» como alternativas.'
  issues:
  - severity: high
    issue: Pronombre incorrecto para αὐτοῖς
    rationale: El borrador dice «lo reprendió», pero αὐτοῖς es dativo plural «a ellos/les». Esto altera el sentido básico y la referencia gramatical del versículo.
  - severity: medium
    issue: «Reprendió» no refleja bien la decisión léxica auditada para ἐπετίμησεν
    rationale: Aunque ἐπιτιμάω puede significar «reprender», en este contexto el POB inglés documenta «warned» como preferencia por el contenido prohibitivo de la cláusula ἵνα μὴ. «Advirtió» preserva mejor ese matiz sin sobreinterpretar.
  - severity: low
    issue: La nota actual queda desalineada con el texto principal
    rationale: Si el texto principal cambia a «les advirtió», la nota debe presentar alternativas reales distintas del texto base, no repetirlo de forma casi idéntica sin necesidad.
  revised_spanish_text: Y les advirtió[a] que no lo dieran a conocer.
  revised_footnotes:
  - marker: a
    text: O «les advirtió severamente» o «les ordenó».
    reason: lexical_alternative
  revision_rationale: Se corrige el referente de αὐτοῖς con «les», y se sustituye «reprendió» por «advirtió» para alinearse con la decisión léxica del POB inglés y con el contexto de una prohibición de divulgarlo. Se mantiene «no lo dieran a conocer» como una representación natural y fiel de φανερὸν ... ποιήσωσιν. «Que no» suena más idiomático tras «advirtió» que «para que no», sin cambiar el sentido.
