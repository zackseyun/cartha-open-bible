translation:
  language: es
  text: Y les advirtió[a] que no lo dieran a conocer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les advirtió severamente» o «les ordenó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  english_pob_choice: warned
  chosen_spanish: reprendió
  alternatives_spanish:
  - amonestó
  - advirtió
  - ordenó severamente
  lexicon: BDAG
  rationale: ἐπιτιμάω puede expresar reprensión, censura o una advertencia/orden enérgica según el contexto. En español, «reprendió» comunica la fuerza de la acción sin reducirla a una simple advertencia débil ni convertirla en un mandato más técnico de lo que el griego exige.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - les
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se entiende por el contexto inmediato como destinatarios de la reprensión; en la cláusula subordinada, el referente de «no lo dieran a conocer» queda claro en español mediante el pronombre de objeto directo «lo», que retoma a Jesús de manera natural.
- source_word: ἵνα μὴ
  english_pob_choice: not to
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: Después de un verbo de reprensión u orden, ἵνα μή con subjuntivo expresa propósito o contenido prohibitivo. «Para que no» conserva esa fuerza final sin sonar forzado en español.
- source_word: φανερὸν ... ποιήσωσιν
  english_pob_choice: make him known
  chosen_spanish: lo dieran a conocer
  alternatives_spanish:
  - lo hicieran público
  - lo revelaran
  - lo hicieran conocido
  lexicon: BDAG
  rationale: La expresión φανερὸν ποιέω significa hacer conocido, divulgar o hacer público. «Dar a conocer» es idiomático en español y mantiene el sentido de divulgación pública sin sobreespecificar.
theological_decisions:
- issue: Naturaleza de la acción de Jesús hacia ellos
  english_pob_reading: A strong warning to avoid public disclosure of his identity/activity
  chosen_spanish_reading: Una reprensión/advertencia enérgica para que no divulgaran su identidad o actividad
  alternative_spanish_readings:
  - Una orden formal
  - Una simple advertencia
  rationale: El griego permite una instrucción severa, pero no obliga a decidir entre reprender, advertir u ordenar. «Reprendió» conserva la tensión entre corrección y prohibición sin añadir motivos teológicos no explícitos en el versículo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, asociado a la palabra de fuerza verbal.
  spanish_consistency_notes:
  - Se mantiene un español natural y digno, con verbos y construcciones idiomáticas.
  - Se evitó traducir mecánicamente desde el inglés; la solución se apoya en el valor de ἐπιτιμάω y en la cláusula de propósito ἵνα μὴ.
  - «Dar a conocer» conserva el matiz de divulgación pública de φανερὸν ποιέω.
