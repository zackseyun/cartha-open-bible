translation:
  language: es
  text: El que no está conmigo está contra mí[a], y el que no reúne conmigo dispersa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien no está conmigo está contra mí, y quien no reúne conmigo dispersa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὴ ὢν
  english_pob_choice: the one who is not
  chosen_spanish: el que no está
  alternatives_spanish:
  - quien no está
  - el que no se encuentra
  lexicon: BDAG
  rationale: El artículo con participio funciona de manera sustantiva y designa a una persona en general. «El que no está» conserva ese valor genérico y suena natural en español sin volverlo excesivamente arcaico.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - de mi parte
  lexicon: BDAG
  rationale: La preposición μετά con genitivo expresa asociación o compañía. «Conmigo» reproduce esa relación de manera directa y idiomática.
- source_word: κατ’ ἐμοῦ
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - en contra de mí
  - opuesto a mí
  lexicon: BDAG
  rationale: κατά con genitivo expresa oposición. «Contra mí» es la equivalencia más clara y fuerte en español.
- source_word: συνάγων
  english_pob_choice: gather
  chosen_spanish: recoge
  alternatives_spanish:
  - junta
  - reúne
  lexicon: BDAG
  rationale: Aunque «gather» puede traducirse como «reunir» o «juntar», en este contexto la imagen de recoger contrasta bien con «desparrama» y mantiene la antítesis del dicho. «Recoge» también es idiomático en español.
- source_word: σκορπίζει
  english_pob_choice: scatters
  chosen_spanish: desparrama
  alternatives_spanish:
  - dispersa
  - esparce
  lexicon: BDAG
  rationale: σκορπίζω significa esparcir o dispersar. «Desparrama» preserva la fuerza verbal y el contraste con «recoge» en una cadencia natural para el español.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: La conjunción enlaza dos afirmaciones paralelas. «Y» conserva la coordinación del griego sin introducir un matiz adversativo no explicitado.
theological_decisions:
- issue: Antítesis absoluta sobre la relación con Jesús
  english_pob_reading: The verse is rendered as an uncompromising statement of alignment with or opposition to Jesus, without softening the polarity.
  chosen_spanish_reading: 'El versículo queda como una afirmación tajante: o se está con Jesús o se está contra él, y no se atenúa esa polaridad.'
  alternative_spanish_readings:
  - Una paráfrasis más suave que diluya el contraste absoluto
  - Un giro interpretativo que lo convierta solo en una observación práctica
  rationale: El griego presenta dos cláusulas paralelas y opuestas sin matiz de conciliación. La traducción mantiene esa tensión teológica y retórica sin ampliarla ni resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Coincide con la lectura de alta concordancia del expediente en inglés; no se detectaron revisiones aplicadas en la fuente auditada, y se mantuvo la antítesis absoluta del dicho con equivalencia óptima en español.
  spanish_consistency_notes:
  - Se usó «conmigo» para μετ’ ἐμοῦ y «contra mí» para κατ’ ἐμοῦ, manteniendo el paralelismo.
  - «Recoge / desparrama» conserva el contraste verbal breve y oral del dicho.
  - Se empleó una formulación genérica singular («el que») como equivalente natural de ὁ con participio sustantivado.
