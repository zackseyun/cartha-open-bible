review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura paralela del griego y mantiene la antítesis absoluta: «conmigo / contra mí» y «gather / scatters». Sin embargo, «recoge ... desparrama» desplaza levemente la imagen semántica de συνάγων / σκορπίζει desde reunir-dispersar hacia recoger-desparramar. No es gravemente infiel, pero «reúne ... dispersa» preserva mejor la pareja léxica y el paralelismo conceptual del original y del POB inglés.'
  spanish_quality_summary: 'El español es claro y natural. «El que no está conmigo está contra mí» suena bien y es ampliamente comprensible. El único punto mejorable es la segunda cláusula: «recoge ... desparrama» es idiomática, pero menos precisa y algo más coloquial que «reúne ... dispersa», que suena más digno y más ajustado al contexto proverbial.'
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. La decisión sobre ὁ μὴ ὢν como «El que no está» está bien. «Conmigo» y «contra mí» concuerdan con el análisis fuente. La mejora propuesta se centra en συνάγων / σκορπίζει: preferir «reúne / dispersa» para conservar mejor la pareja léxica documentada por el POB inglés.'
  issues:
  - severity: medium
    issue: La pareja «recoge / desparrama» no refleja tan estrechamente συνάγων / σκορπίζει como «reúne / dispersa».
    rationale: συνάγων significa ‘reunir/juntar’, no primariamente ‘recoger’; y σκορπίζει empareja mejor con ‘dispersa’ en una antítesis conceptual directa. La revisión mejora la fidelidad semántica y el registro sin cambiar el sentido general.
  - severity: low
    issue: La nota alternativa incluye «Todo el que...», que añade ‘todo’ frente al griego/artículo participial.
    rationale: Como nota de alternativa estilística es aceptable, pero «Quien no está conmigo...» o «El que no está conmigo...» se apega más al valor genérico singular del original. Conviene ajustar la nota para evitar una expansión innecesaria.
  revised_spanish_text: El que no está conmigo está contra mí[a], y el que no reúne conmigo dispersa.
  revised_footnotes:
  - marker: a
    text: 'O: «Quien no está conmigo está contra mí, y quien no reúne conmigo dispersa».'
    reason: lexical_alternative
  revision_rationale: Se recomienda una revisión menor para alinear más estrechamente la segunda cláusula con el griego y con la decisión léxica del POB inglés. «Reúne ... dispersa» preserva mejor el paralelismo y evita un matiz más coloquial o imagístico en «recoge ... desparrama». También se ajusta la nota alternativa para reflejar mejor el valor del artículo con participio sin añadir ‘todo’.
