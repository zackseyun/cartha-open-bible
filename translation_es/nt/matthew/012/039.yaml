translation:
  language: es
  text: 'Pero él respondió y les dijo: «Una generación mala y adúltera busca una señal[a], y no se le dará ninguna señal excepto la señal de Jonás el profeta[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Adúltera» probablemente evoca también la infidelidad de pacto, además de la inmoralidad sexual literal; compárese el uso profético de la imagen del adulterio para la infidelidad espiritual.
    reason: cross_reference
  - marker: b
    text: 'O: «la señal del profeta Jonás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y les dijo
  alternatives_spanish:
  - les respondió
  - contestó y les dijo
  lexicon: BDAG
  rationale: La construcción participial + verbo finito es una fórmula narrativa semítica frecuente. En español, «respondió y les dijo» conserva ambos elementos sin sonar forzado.
- source_word: Γενεὰ
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - gente
  - pueblo
  - edad
  lexicon: BDAG
  rationale: «Generación» mantiene el valor colectivo singular y la caracterización moral de un grupo contemporáneo, tal como en el griego y en la POB inglesa.
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  - maligna
  lexicon: BDAG
  rationale: «Mala» es natural y suficientemente fuerte en español moderno. «Malvada» o «perversa» intensifican el juicio, pero pueden sonar más marcadas o menos fluidas según el registro.
- source_word: μοιχαλὶς
  english_pob_choice: adulterous
  chosen_spanish: adúltera
  alternatives_spanish:
  - infiel
  - idólatra
  - adultera
  lexicon: BDAG
  rationale: «Adúltera» preserva la metáfora profética y la tensión entre infidelidad del pacto y posible resonancia moral/sexual. No se reduce a «infiel» para no borrar esa carga bíblica.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - milagro
  - señal milagrosa
  lexicon: BDAG
  rationale: «Señal» es el equivalente más natural y amplio en español bíblico; evita sobreespecificar como «milagro» lo que el griego no explicita.
- source_word: ἐπιζητεῖ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - demanda
  - busca con insistencia
  - requiere
  lexicon: BDAG
  rationale: «Busca» reproduce bien el sentido básico del verbo. «Demanda» añadiría una carga interpretativa que el texto no exige en la frase misma.
- source_word: δοθήσεται
  english_pob_choice: will be given
  chosen_spanish: se le dará
  alternatives_spanish:
  - le será dada
  - será dada
  lexicon: BDAG
  rationale: 'La pasiva futura se vuelve naturalmente reflexiva en español: «se le dará». Mantiene la impersonalidad del griego.'
- source_word: αὐτῇ
  english_pob_choice: to it
  chosen_spanish: se le
  alternatives_spanish:
  - a ella
  - a esta generación
  lexicon: BDAG
  rationale: El antecedente es femenino singular («generación»), pero en español el referente colectivo se expresa mejor con «se le». Evita el personalismo de «a ella» y conserva la referencia impersonal.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a no ser
  - si no
  lexicon: BDAG
  rationale: «Excepto» comunica con claridad la exclusión introducida por εἰ μὴ y suena natural en español moderno.
- source_word: τὸ σημεῖον Ἰωνᾶ τοῦ προφήτου
  english_pob_choice: the sign of Jonah the prophet
  chosen_spanish: la señal de Jonás, el profeta
  alternatives_spanish:
  - la señal del profeta Jonás
  - la señal de Jonás el profeta
  lexicon: BDAG
  rationale: La forma elegida sigue de cerca el orden griego y deja abierta la interpretación del significado de la señal, tal como hace la POB inglesa.
theological_decisions:
- issue: Sentido de μοιχαλὶς
  english_pob_reading: Retain the metaphorical-prophetic term 'adulterous' in the main text rather than interpretively paraphrasing it as 'unfaithful.'
  chosen_spanish_reading: Conservar «adúltera» en el texto principal, en vez de resolverla como «infiel».
  alternative_spanish_readings:
  - infiel
  - desleal al pacto
  rationale: «Adúltera» preserva la tensión profética y la posible alusión a infidelidad de pacto sin cancelar la fuerza literal-metafórica del término. «Infiel» aclara, pero interpreta demasiado.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Alcance de la frase «la señal de Jonás»
  english_pob_reading: Leave the phrase untranslated beyond its lexical sense and do not explain it in the main text.
  chosen_spanish_reading: Mantener «la señal de Jonás, el profeta» sin explicar su contenido en el texto principal.
  alternative_spanish_readings:
  - una señal como la de Jonás
  - la señal que es Jonás mismo
  rationale: La expresión introduce una referencia que el contexto inmediato aclara; la traducción no debe adelantar una interpretación específica.
  doctrine_reference: Translation philosophy §1 y §3.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pase de revisión más reciente, que no introdujo cambios. La redacción española sigue de cerca el texto griego y el audit trail inglés, conservando la ambigüedad controlada de «la señal de Jonás» y la carga profética de «adúltera».
  spanish_consistency_notes:
  - Se usó «señal» para σημεῖον, consistente con la terminología POB en español.
  - Se mantuvo «adúltera» y no «infiel» para respetar la tensión léxico-teológica documentada.
  - La pasiva futura griega se vertió con «se le dará», forma natural en español para un sujeto colectivo femenino singular.
