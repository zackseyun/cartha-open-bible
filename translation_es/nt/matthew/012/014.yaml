revisions:
- from: Pero los fariseos salieron y tomaron consejo[a] contra él, para destruirlo.
  to: Pero los fariseos salieron y consultaron entre sí contra él, sobre cómo destruirlo[a].
  rationale: Se reemplaza «tomaron consejo» por «consultaron entre sí» para evitar un calco poco idiomático y representar de manera natural el giro συμβούλιον ἔλαβον. Se ajusta «para destruirlo» a «sobre cómo destruirlo» para reflejar mejor la deliberación expresada por ὅπως en este contexto. Se mantiene «destruirlo» con la nota léxica de alternativas letales, en línea con la POB inglesa y el griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:06:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: salida de los fariseos, acción deliberativa hostil contra Jesús, y propósito de destruirlo. Conserva correctamente «contra él» y «destruirlo» con nota léxica adecuada para ἀπολέσωσιν. Sin embargo, «tomaron consejo» suena poco natural en español bíblico actual y no reproduce bien el giro idiomático συμβούλιον ἔλαβον; una formulación como «consultaron» o «tramaron» sería más natural, pero para mantener la cercanía formal al inglés auditado y al griego, «consultaron entre sí» expresa mejor la idea de deliberación hostil sin sobreinterpretar.'
  spanish_quality_summary: El texto es claro, pero «tomaron consejo» resulta calcado y poco idiomático en español general. «Pero los fariseos salieron y consultaron contra él» tampoco sería natural; por eso conviene reestructurar a «consultaron entre sí contra él» o equivalente. Además, tras un verbo de consulta en español, la cláusula final queda más natural como «sobre cómo destruirlo» que como «para destruirlo», porque el griego ὅπως aquí, después de una acción deliberativa, puede reflejar contenido deliberado además de propósito.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Fariseos» y «destruirlo» están bien. La nota sobre «matarlo»/«ponerlo a muerte» preserva correctamente la alternativa léxica documentada por la POB inglesa.
  issues:
  - severity: medium
    issue: «Tomaron consejo» es un calco poco natural de συμβούλιον ἔλαβον.
    rationale: Aunque formalmente cercano al inglés auditado, en español suena forzado y no es la manera normal de expresar deliberación hostil. La traducción debe ser fiel pero también legible en español eclesial actual.
  - severity: low
    issue: «Para destruirlo» reduce levemente el matiz deliberativo de ὅπως tras un verbo de consulta.
    rationale: Después de «consultaron», el español fluye mejor con «sobre cómo destruirlo», que refleja que estaban deliberando acerca del modo de lograrlo, no solo el propósito abstracto.
  revised_spanish_text: Pero los fariseos salieron y consultaron entre sí contra él, sobre cómo destruirlo[a].
  revised_footnotes:
