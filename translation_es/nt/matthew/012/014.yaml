translation:
  language: es
  text: Pero los fariseos salieron y consultaron entre sí contra él, sobre cómo destruirlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «matarlo» o «ponerlo a muerte». El griego dice «destruirlo», lo cual en este contexto puede incluir intención letal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior o simultánea que introduce la reacción de los fariseos. «Salieron» comunica de forma natural el movimiento de salida sin sobrecargar la frase con una construcción participial más pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición narrativa con matiz adversativo leve; «Pero» refleja bien el contraste entre la acción de Jesús en el contexto inmediato y la respuesta hostil de los fariseos.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Nombre propio de grupo judío; en español se conserva la transliteración tradicional y clara.
- source_word: συμβούλιον ἔλαβον
  english_pob_choice: took counsel
  chosen_spanish: tomaron consejo
  alternatives_spanish:
  - deliberaron
  - trazaron un plan
  - tomaron acuerdo
  lexicon: BDAG
  rationale: La expresión griega es literalmente «tomaron consejo». En este contexto hostil puede implicar una trama, pero la revisión inglesa prefirió mantener la forma más cercana al griego. «Tomaron consejo» conserva esa literalidad formal en español sin imponer de inmediato una especificación que el sintagma por sí solo no exige.
- source_word: κατ’ αὐτοῦ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en contra de él
  lexicon: BDAG
  rationale: La preposición con genitivo tiene fuerza adversativa/hostil en contexto. «Contra él» es la equivalencia natural y fiel en español.
- source_word: ὅπως
  english_pob_choice: how they might
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Aquí introduce la finalidad de su consejo. En español, «para destruirlo» comunica el propósito de manera fluida y evita una frase innecesariamente enrevesada.
- source_word: ἀπολέσωσιν
  english_pob_choice: destroy him
  chosen_spanish: destruirlo
  alternatives_spanish:
  - matarlo
  - quitarlo de en medio
  lexicon: BDAG
  rationale: ἀπόλλυμι puede significar destruir o matar según el contexto. Se conserva «destruirlo» para mantener la amplitud semántica del griego, tal como hizo la POB inglesa, sin cerrar el sentido a una sola opción.
theological_decisions:
- issue: Alcance de ἀπολέσωσιν en un contexto de hostilidad
  english_pob_reading: destroy him
  chosen_spanish_reading: destruirlo
  alternative_spanish_readings:
  - matarlo
  - quitarlo de en medio
  rationale: El contexto indica intención hostil real, pero el verbo griego no dice de manera explícita «matar». Mantener «destruirlo» preserva la tensión lexical y evita añadir precisión que el texto no da por sí mismo.
  doctrine_reference: Principio de transparencia textual y de no resolver por paráfrasis una tensión léxica que el original deja abierta.
translation_notes:
  revision_awareness: La POB inglesa revisó su redacción desde una forma más interpretativa («conspired») a una más directa («took counsel») para reflejar con mayor precisión συμβούλιον ἔλαβον. Esta versión española sigue esa revisión, prefiriendo «tomaron consejo» en lugar de una paráfrasis más fuerte, y conserva «destruirlo» para respetar la amplitud del verbo ἀπόλλυμι.
  spanish_consistency_notes:
  - Se mantiene «fariseos» como transliteración estable del grupo.
  - Se evita «Cristo» o vocabulario cristiano técnico porque no aparece en el versículo.
  - La frase final conserva el infinitivo de propósito en español, acorde con el valor de ὅπως.
  - La nota al pie se ancla en «destruirlo» porque allí reside la alternativa léxica principal.
