translation:
  language: es
  text: Y si Satanás expulsa a Satanás, está dividido contra sí mismo[a][b]. ¿Cómo, entonces, permanecerá su reino[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'echa fuera a Satanás.'
    reason: lexical_alternative
  - marker: b
    text: O 'está dividido contra sí mismo.'
    reason: lexical_alternative
  - marker: c
    text: O '¿Cómo, entonces, puede permanecer su reino?'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἰ
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: BDAG
  rationale: Conserva la conexión lógica del καὶ inicial junto con la condición εἰ. En español, "Y si" mantiene mejor el flujo argumentativo que solo "Si".
- source_word: ὁ Σατανᾶς / τὸν Σατανᾶν
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Se translitera el nombre/título propio Σατανᾶς como "Satanás", siguiendo el valor nominal de la fuente y el criterio POB de no sustituirlo por una glosa interpretativa.
- source_word: ἐκβάλλει
  english_pob_choice: casts out
  chosen_spanish: expulsa
  alternatives_spanish:
  - echa fuera
  - arroja fuera
  - expulsa a
  lexicon: BDAG
  rationale: '"Expulsa" comunica bien ἐκβάλλω en contextos de expulsión y evita la rigidez de un calco. Se evita "echar fuera" por sonar más coloquial en registro bíblico formal.'
- source_word: ἐφ’ ἑαυτὸν
  english_pob_choice: against himself
  chosen_spanish: contra sí mismo
  alternatives_spanish:
  - en contra de sí mismo
  - sobre sí mismo
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con la preposición natural en español para oposición interna. "Contra sí mismo" preserva la idea de conflicto interno sin sobreinterpretar.
- source_word: ἐμερίσθη
  english_pob_choice: he is divided
  chosen_spanish: está dividido
  alternatives_spanish:
  - ha sido dividido
  - fue dividido
  lexicon: BDAG
  rationale: El aoristo pasivo en este razonamiento proverbial se traduce con valor de estado resultante. "Está dividido" expresa la condición presente derivada de la acción hipotética, tal como hace el inglés POB con "is divided".
- source_word: πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, entonces?
  alternatives_spanish:
  - ¿Cómo, pues?
  - ¿Cómo entonces?
  lexicon: BDAG
  rationale: Se conserva el valor interrogativo e inferencial. "Entonces" refleja οὖν con claridad moderna y tono natural en español.
- source_word: σταθήσεται
  english_pob_choice: will ... stand
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se mantendrá
  - subsistirá
  - quedará en pie
  lexicon: BDAG
  rationale: En este contexto, el verbo no solo significa "estar de pie" sino continuar establecido. "Permanecerá" comunica la idea de continuidad/estabilidad de manera natural en español, manteniendo la metáfora de permanencia sin sonar forzado.
- source_word: ἡ βασιλεία αὐτοῦ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reinado
  - el reino de él
  lexicon: BDAG
  rationale: Aunque βασιλεία puede significar reinado, aquí la imagen de un dominio dividido encaja bien con "reino" y reproduce el registro habitual de la argumentación. Se preserva la referencia posesiva con "su".
theological_decisions:
- issue: Autodivisión de Satanás y lógica reductio
  english_pob_reading: 'The verse is rendered as a reductio argument: if Satan were expelling Satan, his own dominion would be internally divided and unable to endure.'
  chosen_spanish_reading: 'El versículo se entiende como un argumento por reducción al absurdo: si Satanás expulsara a Satanás, su propio dominio quedaría internamente dividido y no podría sostenerse.'
  alternative_spanish_readings:
  - Una paráfrasis podría enfatizar la imagen de una casa dividida del contexto amplio.
  - Podría traducirse "permanecerá" con "se mantendrá" para enfatizar estabilidad más que permanencia.
  rationale: 'La traducción preserva la lógica explícita del griego sin añadir explicaciones ajenas al enunciado. Se mantiene la tensión teológica y argumentativa del texto: la autocontradicción interna haría imposible la permanencia de su reino.'
  doctrine_reference: Preservar la tensión teológica sin resolverla; primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el audit trail inglés POB, sin revisiones posteriores aplicadas; se conserva la decisión de leer ἐμερίσθη con valor resultativo y πῶς οὖν como pregunta inferencial.
  spanish_consistency_notes:
  - Se mantiene "Satanás" como transliteración consistente del nombre/título.
  - '"Reino" se usa para βασιλεία en coherencia con el sentido de dominio/autoridad del argumento.'
  - El tono es bíblico-formal moderno, evitando arcaísmos innecesarios.
  - Las notas a pie distinguen entre alternativas léxicas reales y una alternativa modal para la pregunta final.
