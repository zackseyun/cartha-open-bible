review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite correctamente la lógica condicional del griego y la idea central de autodivisión de Satanás. Sin embargo, una nota al pie repite exactamente la lectura principal para ἐμερίσθη y no preserva la alternativa documentada en el audit trail inglés ('ha sido dividido'). Además, la nota [c] cambia 'stand' a 'permanecer' de forma aceptable, pero conviene ajustar mínimamente la redacción general para reflejar mejor la alternativa inglesa y mantener consistencia formal.
  spanish_quality_summary: 'El español es claro, natural y digno. ''Y si'', ''Satanás'', ''contra sí mismo'' y ''su reino'' funcionan bien. ''Expulsa'' es aceptable, aunque ''echa fuera'' también sería idiomático en contexto de exorcismo. La única falla real es editorial: la nota [b] no aporta una alternativa distinta.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Satanás' respeta la transliteración esperada; no hay términos sensibles del glosario principal en disputa. La elección 'permanecerá' para σταθήσεται es válida en español, aunque 'se mantendrá' o 'quedará en pie' serían más cercanos a la metáfora de 'stand'.
  issues:
  - severity: medium
    issue: La nota [b] repite la lectura principal en vez de ofrecer una alternativa real para ἐμερίσθη.
    rationale: El audit trail inglés documenta como alternativa 'has been divided against himself'. En español, la nota debería reflejar una opción distinta, por ejemplo 'ha sido dividido contra sí mismo', no duplicar 'está dividido contra sí mismo'.
  - severity: low
    issue: La nota [c] usa 'puede permanecer' en lugar de una alternativa más cercana a 'can/will stand'.
    rationale: No es incorrecto, pero 'mantenerse en pie' o 'sostenerse' preserva mejor la metáfora subyacente de σταθήσεται. Aun así, no exige una reescritura mayor del texto principal.
  revised_spanish_text: Y si Satanás expulsa a Satanás, está dividido contra sí mismo[a][b]. ¿Cómo, entonces, permanecerá su reino[c]?
  revised_footnotes:
  - marker: a
    text: O 'echa fuera a Satanás.'
    reason: lexical_alternative
  - marker: b
    text: O 'ha sido dividido contra sí mismo.'
    reason: lexical_alternative
  - marker: c
    text: O '¿Cómo, entonces, puede mantenerse en pie su reino?'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrigen las notas para que realmente preserven las alternativas documentadas en el audit trail inglés y reflejen mejor el matiz verbal de ἐμερίσθη y σταθήσεται.
