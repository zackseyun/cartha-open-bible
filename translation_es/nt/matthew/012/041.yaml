  text: ἄνδρες Νινευῖται ἀναστήσονται ἐν τῇ κρίσει μετὰ τῆς γενεᾶς ταύτης καὶ κατακρινοῦσιν αὐτήν· ὅτι μετενόησαν εἰς τὸ κήρυγμα Ἰωνᾶ, καὶ ἰδοὺ πλεῖον Ἰωνᾶ ὧδε.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/012/041.yaml
  text: The men of Nineveh will rise up in the judgment with this generation and will condemn it[a], because they repented at the preaching of Jonah, and behold[b], something greater than Jonah is here.
  footnotes:
  - marker: a
    text: Or "one greater than Jonah is here"; Greek has a neuter expression, literally "something greater than Jonah," which may emphasize the greater reality present in Jesus rather than only a comparison of persons.
    reason: alternative_reading
  - marker: b
    text: Or "in response to the proclamation of Jonah."
    reason: lexical_alternative
