translation:
  language: es
  text: Los hombres de Nínive se levantarán en el juicio junto con esta generación y la condenarán, porque se arrepintieron ante la proclamación de Jonás[b], y he aquí, algo mayor que Jonás está aquí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno mayor que Jonás está aquí»; el griego usa una expresión neutra, literalmente «algo mayor que Jonás», lo que puede subrayar la realidad mayor presente en Jesús más que solo una comparación de personas.
    reason: alternative_reading
  - marker: b
    text: O «en respuesta a la proclamación de Jonás».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνδρες Νινευῖται
  english_pob_choice: The men of Nineveh
  chosen_spanish: Los hombres de Nínive
  alternatives_spanish:
  - La gente de Nínive
  - Los ninivitas
  lexicon: BDAG
  rationale: ἄνδρες es un sustantivo masculino plural y conviene conservar su fuerza específica con «hombres». «Nínive» nombra el origen étnico/geográfico. «Ninivitas» es posible, pero atenúa la literalidad de ἄνδρες.
- source_word: ἀναστήσονται
  english_pob_choice: will rise up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - resucitarán
  - se alzarán
  lexicon: BDAG
  rationale: En este contexto judicial-escatológico, «se levantarán» conserva el movimiento de ἀνίστημι sin definir de más si la imagen es estrictamente resurreccional o de comparecencia ante el juicio.
- source_word: ἐν τῇ κρίσει
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en la condenación
  - en el juicio final
  lexicon: BDAG
  rationale: «Juicio» refleja κρίσις de manera natural en español y mantiene el sentido judicial/escatológico. «Condenación» sería demasiado específico y «juicio final» añade precisión no explicitada por la forma griega.
- source_word: μετὰ τῆς γενεᾶς ταύτης
  english_pob_choice: with this generation
  chosen_spanish: junto con esta generación
  alternatives_spanish:
  - con esta generación
  - contra esta generación
  lexicon: BDAG
  rationale: μετά con genitivo significa «con». En español, «junto con» expresa mejor la coexistencia en el juicio y evita que la frase suene demasiado moderna o ambigua. La oposición aparece en el verbo siguiente.
- source_word: κατακρινοῦσιν αὐτήν
  english_pob_choice: will condemn it
  chosen_spanish: la condenarán
  alternatives_spanish:
  - la juzgarán culpable
  - la sentenciarán
  lexicon: BDAG
  rationale: «Condenarán» es la correspondencia más directa de κατακρίνω. El pronombre femenino «la» mantiene el antecedente implícito de γενεά («generación»).
- source_word: μετενόησαν
  english_pob_choice: they repented
  chosen_spanish: se arrepintieron
  alternatives_spanish:
  - cambiaron de mente
  - se volvieron
  lexicon: BDAG
  rationale: En este contexto, μετανοέω comunica arrepentimiento ante el mensaje profético; «se arrepintieron» es la opción española más clara y teológicamente reconocible sin diluir el sentido.
- source_word: εἰς τὸ κήρυγμα Ἰωνᾶ
  english_pob_choice: at the preaching of Jonah
  chosen_spanish: ante la proclamación de Jonás
  alternatives_spanish:
  - a causa de la proclamación de Jonás
  - en respuesta a la proclamación de Jonás
  lexicon: BDAG
  rationale: κήρυγμα es «proclamación» o «predicación». Con εἰς tras μετανοέω, la idea es una respuesta dirigida al mensaje; «ante» conserva bien esa orientación en español. «Predicación» también es viable, pero «proclamación» corresponde mejor al sustantivo griego.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - véase
  lexicon: BDAG
  rationale: «He aquí» reproduce el marcador discursivo de énfasis solemne de ἰδού, con un registro adecuado para lenguaje bíblico.
- source_word: πλεῖον Ἰωνᾶ ὧδε
  english_pob_choice: something greater than Jonah is here
  chosen_spanish: algo mayor que Jonás está aquí
  alternatives_spanish:
  - uno mayor que Jonás está aquí
  - alguien mayor que Jonás está aquí
  lexicon: BDAG
  rationale: El neutro πλεῖον sugiere literalmente «algo mayor». En español, «algo mayor que Jonás» preserva esa forma neutra y la tensión interpretativa que el POB inglés documenta, sin forzar la frase a una referencia masculina explícita.
theological_decisions:
- issue: Cómo reflejar el neutro πλεῖον Ἰωνᾶ en relación con Jesús
  english_pob_reading: something greater than Jonah is here
  chosen_spanish_reading: algo mayor que Jonás está aquí
  alternative_spanish_readings:
  - uno mayor que Jonás está aquí
  - alguien mayor que Jonás está aquí
  rationale: Se conserva el valor neutro del griego, que no dice simplemente «una persona mayor», sino una realidad mayor presente en Jesús y su ministerio. «Algo mayor» mantiene esa tensión sin perder claridad cristológica.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: La referencia de αὐτήν a «esta generación»
  english_pob_reading: will condemn it
  chosen_spanish_reading: la condenarán
  alternative_spanish_readings:
  - condenarán a esta generación
  - la sentenciarán
  rationale: El pronombre femenino concuerda con γενεά, y «la condenarán» mantiene la referencia de manera fiel y breve. Añadir «a esta generación» sería interpretativo, no necesario.
  doctrine_reference: Grammar and antecedent agreement; Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que reemplazó «changed their thinking» por «repented», y se preservó el matiz neutro de πλεῖον con una solución española equivalente. También se mantuvo la lectura gender-accurate de ἄνδρες y el sentido judicial de κρίσις y κατακρίνω.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - Se prefirió «Jonás» en lugar de «Jonah» para la forma española estándar del nombre bíblico.
  - Se mantuvo un registro sobrio y bíblico, evitando calcos innecesarios como «resucitarán» o «cambiaron de mente».
  - «Algo mayor» conserva una tensión semántica importante; no se normalizó a «uno mayor» en el texto principal.
