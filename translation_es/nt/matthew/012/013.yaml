translation:
  language: es
  text: 'Entonces le dice al hombre: «Extiende tu mano». Él la extendió, y quedó restaurada[a], sana como la otra.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedó sanada»; el verbo griego enfatiza la restauración a una condición adecuada.
    reason: lexical_alternative
  - marker: b
    text: Lit., «sana como la otra», con «la otra» refiriéndose a la otra mano del hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca secuencia narrativa de manera natural en español y conserva el valor temporal del adverbio sin añadir matiz interpretativo.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: El presente histórico en griego se mantiene mejor con presente narrativo en español; 'le dice' preserva vividez y continuidad del relato.
- source_word: τῷ ἀνθρώπῳ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  lexicon: BDAG
  rationale: ἄνθρωπος aquí se refiere a un individuo masculino concreto; 'hombre' es preciso y natural en español.
- source_word: Ἔκτεινόν
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Tiende
  - Estira
  lexicon: BDAG
  rationale: Imperativo directo de una acción física; 'extiende' comunica bien el gesto sin sonar forzado.
- source_word: σου τὴν χεῖρα
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu brazo
  lexicon: BDAG
  rationale: χεῖρ normalmente significa 'mano'; 'mano' es la correspondencia más directa y clara en este contexto de sanidad.
- source_word: ἐξέτεινεν
  english_pob_choice: he stretched it out
  chosen_spanish: la extendió
  alternatives_spanish:
  - la estiró
  - extendió la mano
  lexicon: BDAG
  rationale: El español puede suplir el pronombre objeto de forma natural tras el mandato previo; 'la extendió' reproduce la respuesta inmediata y evita repetición pesada.
- source_word: ἀπεκατεστάθη
  english_pob_choice: it was restored
  chosen_spanish: quedó restaurada
  alternatives_spanish:
  - fue restaurada
  - quedó sana
  lexicon: BDAG
  rationale: El pasivo de ἀποκαθίστημι enfatiza restauración a un estado debido; 'quedó restaurada' conserva esa idea mejor que 'fue sanada' sin borrar la dimensión de restablecimiento.
- source_word: ὑγιὴς
  english_pob_choice: healthy
  chosen_spanish: sana
  alternatives_spanish:
  - saludable
  - sana y fuerte
  lexicon: BDAG
  rationale: ὑγιής expresa salud/sanidad; 'sana' es la forma más natural en español bíblico contemporáneo y mantiene la referencia física.
- source_word: ὡς ἡ ἄλλη
  english_pob_choice: like the other one
  chosen_spanish: como la otra
  alternatives_spanish:
  - como la otra mano
  - igual que la otra
  lexicon: BDAG
  rationale: El comparativo femenino apunta implícitamente a la otra mano; en español puede dejarse implícito sin perder claridad.
theological_decisions:
- issue: Relación entre restauración y sanidad
  english_pob_reading: The verse describes the man's hand as restored to health, without adding further doctrinal interpretation.
  chosen_spanish_reading: La mano queda restaurada y sana, sin añadir interpretación doctrinal extra.
  alternative_spanish_readings:
  - fue sanada
  - quedó hecha completa
  rationale: Se conserva la tensión léxica entre restauración y salud que el griego permite, evitando reducir ἀπεκατεστάθη a una sola idea.
  doctrine_reference: Preservar la tensión léxica sin resolverla de forma prematura.
translation_notes:
  revision_awareness: 'Coincide con el paso de revisión más reciente: no se detectaron cambios necesarios; se mantiene el acuerdo alto del control cruzado y la solución estable para el valor de ἀπεκατεστάθη y la comparación final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general de proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que exija aplicarlo.
  - Se conserva el presente narrativo en 'le dice' para reflejar el presente histórico griego.
  - '''Restaurada'' y ''sana'' quedan juntos para no borrar la doble fuerza del original: restitución funcional y estado de salud.'
