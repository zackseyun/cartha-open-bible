translation:
  language: es
  text: Pero les digo que hay aquí algo[a] más grande que el templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alguien más grande que el templo está aquí» o «uno más grande que el templo está aquí». El griego usa una forma neutra («más grande»), dejando el referente formalmente sin expresar.'
    reason: alternative_reading
  - marker: b
    text: 'O: «en este lugar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: But I tell you
  chosen_spanish: Pero les digo
  alternatives_spanish:
  - Y les digo
  - Sin embargo, les digo
  - Pero les digo a ustedes
  lexicon: BDAG
  rationale: La fórmula es una introducción directa de discurso; «les digo» comunica el dativo de destinatario sin forzar un calco. «Pero» refleja el matiz adversativo/continuativo de δέ en el contraste con el argumento previo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido de la afirmación de Jesús; en español «que» mantiene la subordinación de forma natural y clara.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  - el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν suele referirse al complejo del templo, no al santuario interior. «El templo» es la equivalencia más natural y fiel en español.
- source_word: μεῖζόν
  english_pob_choice: something greater
  chosen_spanish: algo más grande
  alternatives_spanish:
  - alguien más grande
  - uno más grande
  lexicon: BDAG
  rationale: El griego usa un neutro singular sustantivado y deja el referente formalmente indeterminado. «Algo más grande» preserva esa indeterminación sin resolverla en la frase principal.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  lexicon: BDAG
  rationale: Con la expresión locativa ὧδε, «está aquí» suena natural en español y reproduce bien la presencia indicada por el griego.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: ὧδε puede traducirse como «aquí» o «en este lugar». «Aquí» es breve, idiomático y conserva la fuerza de presencia inmediata.
theological_decisions:
- issue: Referente implícito del comparativo neutro μεῖζόν
  english_pob_reading: Render impersonally as 'something greater' rather than explicitly 'one greater' or directly naming Jesus in the main text.
  chosen_spanish_reading: Traducir impersonalmente como «algo más grande» en el texto principal.
  alternative_spanish_readings:
  - alguien más grande
  - uno más grande
  - uno mayor
  rationale: 'El griego conserva un neutro que no identifica explícitamente el referente. La traducción mantiene esa tensión: el contexto apunta a Jesús, pero el texto no lo dice de forma gramaticalmente explícita. La nota permite las lecturas personales sin imponerlas en el cuerpo principal.'
  doctrine_reference: Preservar la tensión teológica y gramatical sin resolverla indebidamente.
translation_notes:
  revision_awareness: El último repaso editorial no introdujo cambios; el texto queda alineado con la decisión inglesa de preservar la forma neutra de μεῖζόν y con la preferencia por una equivalencia óptima no mecánica.
  spanish_consistency_notes:
  - Se mantiene «templo» para ἱερόν por consistencia con el valor contextual del complejo sagrado.
  - Se usa «aquí» para ὧδε, pero la nota conserva la alternativa espacial «en este lugar».
  - La indeterminación de μεῖζόν se preserva en el texto principal mediante «algo más grande», evitando una identificación personal explícita.
