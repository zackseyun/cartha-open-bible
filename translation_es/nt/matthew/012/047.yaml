revisions:
- from: 'Entonces alguien le dijo: «Mira, tu madre y tus hermanos están afuera, buscando hablar contigo».[a]'
  to: 'Entonces alguien le dijo[a]: «Mira, tu madre y tus hermanos están de pie afuera, buscando hablarte».'
  rationale: 'Se hace una reparación menor para mejorar la correspondencia con el griego y cumplir el formato editorial: «están de pie afuera» refleja mejor ἔξω ἑστήκασιν; «hablarte» sigue más de cerca σοι λαλῆσαι; y el marcador de nota se ancla correctamente en el texto. No se requiere adjudicación adicional.'
