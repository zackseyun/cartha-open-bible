review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca la auditoría inglesa: «Entonces alguien le dijo», «Mira», «tu madre y tus hermanos», y la nota textual están bien encaminados. Sin embargo, «están afuera» omite el matiz más específico de ἔξω ἑστήκασιν (''están de pie / están parados afuera''), y «hablar contigo» se aleja ligeramente de σοι λαλῆσαι, que se orienta mejor como ''hablarte'' o ''hablar con/tener una palabra contigo'' según registro. Además, la marca de nota [a] debe ir en el punto relevante dentro del texto, no solo al final sin el formato exigido.'
  spanish_quality_summary: 'El español es claro y natural, con registro moderno y digno. No obstante, una pequeña corrección mejora la fidelidad sin volverlo rígido: «están de pie afuera» preserva mejor el valor resultativo de ἑστήκασιν. También conviene ajustar la colocación del marcador de nota al formato requerido `[a]`.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos narrativos están bien resueltos. La principal mejora es de precisión verbal, no de glosario teológico.
  issues:
  - severity: medium
    issue: «están afuera» atenúa ἔξω ἑστήκασιν
    rationale: El griego expresa más que mera ubicación; ἑστήκασιν comunica que están de pie/plantados afuera. «Están afuera» es comprensible, pero pierde parte del cuadro narrativo preservado en la auditoría inglesa ('are standing outside').
  - severity: low
    issue: «hablar contigo» es ligeramente menos directo que σοι λαλῆσαι
    rationale: El dativo σοι con λαλῆσαι se vierte con más cercanía formal como «hablarte». «Hablar contigo» no es erróneo, pero puede sugerir conversación mutua más que simplemente dirigirse a Jesús.
  - severity: low
    issue: El marcador de nota no usa el anclaje exigido dentro de `spanish_text`
    rationale: Las instrucciones requieren que cualquier nota aparezca anclada exactamente en el texto con formato `[a]`. El borrador muestra `.[a]` fuera del texto citado, lo que conviene normalizar en el texto final.
  revised_spanish_text: 'Entonces alguien le dijo[a]: «Mira, tu madre y tus hermanos están de pie afuera, buscando hablarte».'
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos omiten este versículo.
