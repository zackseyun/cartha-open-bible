    reason: textual_variant
lexical_decisions:
- source_word: εἶπεν δέ τις αὐτῷ
  english_pob_choice: Then someone said to him
  chosen_spanish: Entonces alguien le dijo
  alternatives_spanish:
  - Y alguien le dijo
  - Ahora alguien le dijo
  lexicon: BDAG
  rationale: δέ funciona como transición narrativa suave; «Entonces» comunica bien la continuación del relato sin forzar contraste. τις es indefinido, por eso «alguien» evita la rigidez de «una cierta persona».
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira, pues
  - He aquí
  lexicon: BDAG
  rationale: Ἰδοὺ es un llamado de atención. «Mira» conserva la fuerza deíctica en español contemporáneo y es más natural que «He aquí».
- source_word: μήτηρ σου
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - su madre
  lexicon: BDAG
  rationale: La relación posesiva es directa y se expresa con el posesivo de segunda persona singular, coherente con σοι/σου en el contexto.
- source_word: οἱ ἀδελφοί σου
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus hermanos varones
  - tus hermanos
  lexicon: BDAG
  rationale: ἀδελφοί se refiere aquí a miembros masculinos de la familia en la escena narrativa. «Hermanos» comunica de forma natural y mantiene el dato de género sin añadir glosa.
- source_word: ἔξω ἑστήκασιν
  english_pob_choice: are standing outside
  chosen_spanish: están afuera
  alternatives_spanish:
  - están de pie afuera
  - permanecen afuera
  lexicon: BDAG
  rationale: El perfecto de ἵστημι expresa un estado presente; en español, «están afuera» comunica ese estado con naturalidad. «Están de pie afuera» sería más literal, pero más pesado. Se conserva ἔξω con «afuera».
- source_word: ζητοῦντές
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - buscando hablar
  - queriendo
  lexicon: BDAG
  rationale: El participio de ζητέω admite «buscar». En contexto, la construcción natural en español es «buscando», que mantiene el valor participial y el sentido de intención sin sobreinterpretarlo.
- source_word: σοι λαλῆσαι
  english_pob_choice: to speak to you
  chosen_spanish: hablar contigo
  alternatives_spanish:
  - hablarte
  - dirigirse a ti
  lexicon: BDAG
  rationale: La combinación de dativo + infinitivo se puede expresar con «hablar contigo» en español natural. «Hablarte» también sería posible, pero «hablar contigo» refleja mejor la relación interpersonal sugerida por λαλῆσαι.
theological_decisions:
- issue: 'Variante textual: omisión de Mateo 12:47 en algunos manuscritos'
  english_pob_reading: Include the verse in the main text as represented in the provided SBLGNT source, while noting its omission in some manuscripts.
  chosen_spanish_reading: Incluir el versículo en el texto principal, según el SBLGNT provisto, y señalar en nota que algunos manuscritos lo omiten.
  alternative_spanish_readings:
  - Omitir el versículo en el texto principal
  - Colocarlo solo en nota textual
  rationale: La fuente para esta tarea presenta el versículo; por transparencia editorial, se traduce tal como está y se conserva la observación crítica en una nota, sin ocultar la variante manuscrita.
  doctrine_reference: Preservar la tensión textual y documentar variantes sin resolverlas por silencio editorial.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado permanece sin modificaciones y con alto acuerdo entre revisiones y cotejo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se conserva el tono narrativo breve y directo del griego, con puntuación española estándar.
  - La nota textual se coloca en el versículo para reflejar la variante manuscrita señalada en el audit trail.
