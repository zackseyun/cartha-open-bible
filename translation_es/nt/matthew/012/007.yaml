translation:
  language: es
  text: 'Pero si hubieran sabido[a] qué significa esto: «Misericordia quiero y no sacrificio»[b], no habrían condenado a los inocentes[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entendido».
    reason: lexical_alternative
  - marker: b
    text: Jesús cita Oseas 6:6.
    reason: cross_reference
  - marker: c
    text: O «los que no tienen culpa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώκειτε
  english_pob_choice: you had known
  chosen_spanish: hubieran sabido
  alternatives_spanish:
  - hubieran conocido
  - hubieran entendido
  lexicon: BDAG
  rationale: El valor más natural en español para la condición contrafáctica es el pluscuamperfecto de subjuntivo compuesto. 'Saber' comunica el conocimiento previo que Jesús reprocha; 'entendido' sería posible, pero desplaza el foco hacia comprensión interpretativa más que conocimiento del dicho citado.
- source_word: τί ἐστιν
  english_pob_choice: what this means
  chosen_spanish: qué significa esto
  alternatives_spanish:
  - qué es esto
  - qué quiere decir esto
  lexicon: BDAG
  rationale: En el contexto de una cita bíblica, la pregunta no es de identificación sino de sentido. 'Qué significa esto' preserva el valor idiomático del griego y sugiere comprensión del texto citado, no mera definición.
- source_word: Ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - amor leal
  lexicon: BDAG
  rationale: '''Misericordia'' es la forma más estable y pública para esta cita de Oseas en español. Mantiene la prioridad ética del término sin diluir su fuerza; ''compasión'' es posible, pero menos tradicional en este pasaje y ''amor leal'' sería una expansión interpretativa.'
- source_word: θέλω
  english_pob_choice: I desire
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  lexicon: BDAG
  rationale: En español, 'quiero' reproduce de manera directa la declaración divina/citacional del hebreo y del griego. 'Deseo' sería más elevado, pero aquí el paralelismo profético funciona con mejor naturalidad en una forma breve y enfática.
- source_word: θυσίαν
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda sacrificial
  lexicon: BDAG
  rationale: '''Sacrificio'' conserva el contraste clásico de Oseas 6:6 y evita una expansión innecesaria. ''Ofrenda sacrificial'' explicita demasiado lo que el griego deja en una sola palabra.'
- source_word: κατεδικάσατε
  english_pob_choice: would not have condemned
  chosen_spanish: habrían condenado
  alternatives_spanish:
  - habrían sentenciado contra
  - habrían declarado culpables
  lexicon: BDAG
  rationale: El verbo compuesto expresa juicio condenatorio; en la apódosis contrafáctica, el español exige una forma completa con 'habrían'. 'Condenado' retiene el matiz judicial sin sobretraducir.
- source_word: ἀναιτίους
  english_pob_choice: the guiltless
  chosen_spanish: a los inocentes
  alternatives_spanish:
  - a los sin culpa
  - a los inocentes de culpa
  - a los culpables no
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió 'the guiltless' y anotó 'Or the innocent', en español 'los inocentes' es la opción más natural y bíblica para un adjetivo plural sustantivado. El sentido forense se mantiene por el contexto de 'condenar'; la alternativa 'sin culpa' es más literal, pero menos idiomática.
theological_decisions:
- issue: La cita de Oseas 6:6 como prioridad de misericordia sobre sacrificio sin borrar el valor cultual en su propio marco
  english_pob_reading: I desire mercy and not sacrifice
  chosen_spanish_reading: Misericordia quiero y no sacrificio
  alternative_spanish_readings:
  - Quiero misericordia y no sacrificio
  - Misericordia deseo y no sacrificio
  rationale: 'La formulación breve y proverbial debe conservar la tensión profética: no se trata de abolir todo sacrificio, sino de afirmar la prioridad de la misericordia cuando el rito se separa de la fidelidad del pacto. ''Misericordia quiero'' mantiene el eco bíblico y el paralelismo directo con el griego.'
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje griego y el dossier inglés: mantiene el condicional contrafáctico, la cita de Oseas en forma proverbial y la ambigüedad forense de ἀναιτίους. No se observan revisiones aplicadas en el archivo inglés más reciente; por eso no se incorporan cambios adicionales.'
  spanish_consistency_notes:
  - Se usa 'misericordia' para ἔλεος conforme al uso español tradicional y al valor covenantal del término en esta cita.
  - Se conserva el contraste 'misericordia... y no sacrificio' sin suavizarlo, para respetar la prioridad profética del texto.
  - '''Inocentes'' se eligió por naturalidad en español; la nota recoge la alternativa ''sin culpa'' para conservar la opción forense documentada por el inglés.'
  - El tono es bíblico y publicable, pero evita arcaísmos innecesarios; 'hubieran sabido' transmite el pluscuamperfecto del griego de modo claro.
