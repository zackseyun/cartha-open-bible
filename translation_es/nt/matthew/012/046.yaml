translation:
  language: es
  text: Mientras él aún hablaba a las multitudes[a], he aquí, su madre y sus hermanos estaban de pie afuera, buscando hablarle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus hermanos y hermanas”, si ἀδελφοί se toma en un sentido más amplio de parientes cercanos; aquí el término griego es masculino plural y en el texto principal se rinde como “hermanos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι δὲ
  english_pob_choice: While ... still
  chosen_spanish: Mientras ... aún
  alternatives_spanish:
  - Y mientras ... aún
  - Pero mientras ... aún
  - Aún mientras ...
  lexicon: BDAG
  rationale: Ἔτι expresa continuidad temporal (“aún”) y δέ introduce una transición narrativa suave. “Mientras ... aún” conserva ambas funciones con naturalidad en español.
- source_word: αὐτοῦ λαλοῦντος
  english_pob_choice: he was ... speaking
  chosen_spanish: él aún hablaba
  alternatives_spanish:
  - él aún estaba hablando
  - él estaba hablando todavía
  lexicon: BDAG
  rationale: El genitivo absoluto marca acción simultánea. En español, “hablaba” comunica bien la acción en curso, y “aún” preserva el valor de continuidad.
- source_word: τοῖς ὄχλοις
  english_pob_choice: to the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a la multitud
  - a las turbas
  lexicon: BDAG
  rationale: ὄχλοις es plural; “multitudes” refleja mejor ese número que un singular colectivo. “Turbas” sería más peyorativo de lo que el griego exige.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - observa
  lexicon: BDAG
  rationale: ἰδού funciona como marcador discursivo de atención. “He aquí” conserva el énfasis narrativo solemne sin sonar excesivamente arcaico.
- source_word: ἡ μήτηρ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - la madre
  lexicon: BDAG
  rationale: El posesivo se sobreentiende por el contexto; en español “su madre” es la forma natural y fiel.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y hermanas
  - sus parientes cercanos
  lexicon: BDAG
  rationale: ἀδελφοί es masculino plural y el contexto narrativo permite el sentido básico de “hermanos”. “Sus hermanos” mantiene la superficie léxica sin resolver debates genealógicos.
- source_word: εἱστήκεισαν
  english_pob_choice: were standing
  chosen_spanish: estaban fuera
  alternatives_spanish:
  - estaban de pie
  - habían tomado posición
  lexicon: BDAG
  rationale: El verbo expresa una postura durativa; en español la combinación “estaban fuera” comunica la escena con claridad, aunque la postura física se infiere también del contexto inmediato.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - por fuera
  lexicon: BDAG
  rationale: “Fuera” es natural y directo en español bíblico moderno; conserva el contraste espacial con el interior implícito en la escena.
- source_word: ζητοῦντες
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - intentando
  - queriendo
  lexicon: BDAG
  rationale: ζητέω puede rendirse por “buscar” en sentido intencional. “Buscando” mantiene la acción en curso y el matiz de propósito.
- source_word: αὐτῷ λαλῆσαι
  english_pob_choice: to speak to him
  chosen_spanish: hablarle
  alternatives_spanish:
  - hablar con él
  - dirigirse a él
  lexicon: BDAG
  rationale: La construcción con dativo e infinitivo se expresa de forma idiomática con “hablarle”. Resume con fidelidad el propósito sin añadir relación interpersonal no explicitada.
theological_decisions:
- issue: Referencia a los ἀδελφοί de Jesús
  english_pob_reading: his brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus hermanos y hermanas
  - sus parientes cercanos
  rationale: Se conserva la forma masculina plural del griego sin ampliar el texto. La decisión no pretende resolver debates doctrinales sobre el parentesco exacto; mantiene la tensión léxica del pasaje.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de SBLGNT y coincide en lo esencial con el audit trail inglés: acción simultánea, marcador discursivo ἰδού, plural de ὄχλοις y lectura masculina plural de ἀδελφοί. No se registran revisiones posteriores en el paquete proporcionado.'
  spanish_consistency_notes:
  - Se prefiere “multitudes” para reflejar el plural de ὄχλοις.
  - “He aquí” conserva el valor enfático de ἰδού sin reemplazarlo por una paráfrasis.
  - “Hablarle” es la forma idiomática más natural para αὐτῷ λαλῆσαι en español.
  - El pie de nota mantiene abierta la alternativa lexical sobre ἀδελφοί sin sobreextenderla.
