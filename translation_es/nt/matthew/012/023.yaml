translation:
  language: es
  text: 'Y toda la gente se asombraba y decía[b][a]: «¿Puede ser este el Hijo de David?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Hijo de David» es un título mesiánico que se refiere al libertador real prometido de la línea de David.
    reason: cross_reference
  - marker: b
    text: 'O, de manera más literal según la fuerza de la pregunta: «¿No será este el Hijo de David, acaso?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  english_pob_choice: were astonished
  chosen_spanish: se asombraban
  alternatives_spanish:
  - quedaban atónitas
  - estaban asombradas
  lexicon: BDAG
  rationale: El imperfecto expresa una reacción continua; en español, «se asombraban» mantiene ese valor aspectual y suena natural. «Atónitas» sería posible, pero «asombrarse» comunica bien la reacción de sorpresa sin endurecer el registro.
- source_word: πάντες οἱ ὄχλοι
  english_pob_choice: all the crowds
  chosen_spanish: todas las multitudes
  alternatives_spanish:
  - todo el pueblo
  - toda la multitud
  lexicon: BDAG
  rationale: El griego usa el plural ὄχλοι, no un singular. «Todas las multitudes» preserva mejor ese plural que «toda la multitud» y evita suavizar el matiz colectivo de Mateo.
- source_word: ἔλεγον
  english_pob_choice: said
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto sugiere una reacción hablada que se desarrolla; «decían» es el equivalente narrativo natural en español y conserva la continuidad sin sonar forzado.
- source_word: Μήτι
  english_pob_choice: Can this be
  chosen_spanish: ¿Puede ser este... ?
  alternatives_spanish:
  - ¿Será este... ?
  - ¿Acaso este es... ?
  lexicon: BDAG
  rationale: Μήτι introduce una pregunta que espera cautela o una respuesta negativa implícita. En español, «¿Puede ser este...?» reproduce bien la sorpresa interrogativa sin convertirla en una negación explícita que el griego no formula abiertamente.
- source_word: ὁ υἱὸς Δαυίδ
  english_pob_choice: the Son of David
  chosen_spanish: el Hijo de David
  alternatives_spanish:
  - el hijo de David
  - el Mesías
  lexicon: BDAG
  rationale: Se conserva el título literal «el Hijo de David» porque el griego presenta una designación mesiánica reconocible, no una glosa interpretativa. «Mesías» explicitaría el sentido, pero borraría la forma titular que el texto usa.
theological_decisions:
- issue: Sentido mesiánico de «Hijo de David»
  english_pob_reading: Retain the title 'the Son of David' in the main text without paraphrasing it as 'the Messiah.'
  chosen_spanish_reading: Mantener «el Hijo de David» en el texto principal, sin convertirlo en «el Mesías».
  alternative_spanish_readings:
  - el Mesías
  - el heredero prometido de David
  rationale: La expresión es un título cargado de expectativa mesiánica en Mateo. Traducirla literalmente preserva la tensión histórica y teológica del pasaje; la nota aclara su fuerza sin sustituir el término del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar el término del texto y explicar su peso mesiánico en nota, en vez de resolverlo en una paráfrasis interpretativa.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y coincide con el sentido y las decisiones auditadas de la versión inglesa POB, sin cambios de contenido en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene «Hijo de David» con mayúsculas por tratarse de un título mesiánico, consistente con el uso en el resto del proyecto.
  - «Multitudes» refleja el plural griego ὄχλοι y evita singularizar indebidamente el sujeto.
  - Se usa puntuación interrogativa española completa y comillas angulares para formato publicable.
