revisions:
- from: 'Y todas las multitudes se asombraban y decían[b][a]: «¿Puede ser este el Hijo de David?»'
  to: 'Y toda la gente se asombraba y decía[b][a]: «¿Puede ser este el Hijo de David?»'
  rationale: Se revisa el sintagma inicial para evitar un calco poco idiomático en español. Aunque el griego tiene plural («las multitudes»), «toda la gente» comunica naturalmente el referente colectivo en español. También se corrige la redacción de la nota explicativa para que suene natural y gramaticalmente correcta.
