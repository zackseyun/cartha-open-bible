revisions:
- from: Porque cualquiera que haga la voluntad de mi Padre que está en los cielos[a], ese es mi hermano, y hermana, y madre.
  to: Porque cualquiera que haga la voluntad de mi Padre que está en los cielos[a], él es mi hermano y hermana y madre.
  rationale: 'Se conserva fielmente el sentido y la decisión teológica del masculino representativo, pero se corrige la expresión española para mayor naturalidad y precisión: «él» refleja mejor αὐτός que «ese», y se elimina la puntuación impropia en la lista coordinada. La nota también se normaliza al español revisado.'
