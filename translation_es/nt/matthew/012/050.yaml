review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: una afirmación explicativa introducida por γὰρ, una condición general con ὅστις ... ἂν + subjuntivo, y la identificación enfática de quien hace la voluntad del Padre como verdadera familia de Jesús. Sin embargo, la formulación española actual introduce torpeza sintáctica y puntuación no motivada por el original, especialmente en «ese es mi hermano, y hermana, y madre», que no refleja bien la coordinación griega simple ni suena natural en español.'
  spanish_quality_summary: La redacción es mayormente comprensible, pero necesita pulido para sonar natural y digna en español eclesial moderno. «Porque» es aceptable, aunque «Pues» sería algo más idiomático en continuidad discursiva; no es indispensable cambiarlo. Los problemas principales son la puntuación con comas antes de cada «y» y el demostrativo «ese», que suena algo señalado y menos natural que «él» o «esa persona» en este contexto. También conviene ajustar la nota alternativa para que la opción citada sea español más natural.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Los equivalentes «voluntad», «Padre», «hermano», «hermana» y «madre» están bien. La decisión sobre el masculino representativo debe conservarse, pero en español se expresa mejor como «él es mi hermano y hermana y madre» que como «ese es...».
  issues:
  - severity: medium
    issue: Uso de «ese» para αὐτός
    rationale: Aunque αὐτός es enfático, «ese» en español añade un matiz de señalamiento deíctico que no está exigido por el griego y suena menos natural en una máxima general. «Él» preserva mejor el singular masculino representativo documentado por el POB.
  - severity: medium
    issue: Puntuación antinatural en la serie «mi hermano, y hermana, y madre»
    rationale: El griego coordina simplemente con καὶ sin comas. En español, las comas antes de cada «y» resultan incorrectas o muy forzadas. Debe ser «mi hermano y hermana y madre».
  - severity: low
    issue: Nota al pie con alternativa poco natural
    rationale: La alternativa citada «cualquiera que hace...» y la repetición de comas antes de «y» no representan el mejor español posible. Conviene alinear la nota con una alternativa realmente usable en español, por ejemplo «cualquiera que haga..., él es...».
  revised_spanish_text: Porque cualquiera que haga la voluntad de mi Padre que está en los cielos[a], él es mi hermano y hermana y madre.
  revised_footnotes:
  - marker: a
    text: 'O: «cualquiera que haga la voluntad de mi Padre que está en los cielos, él es mi hermano y hermana y madre». El griego usa una forma singular masculina con valor genérico.'
    reason: lexical_alternative
  revision_rationale: 'Se conserva fielmente el sentido y la decisión teológica del masculino representativo, pero se corrige la expresión española para mayor naturalidad y precisión: «él» refleja mejor αὐτός que «ese», y se elimina la puntuación impropia en la lista coordinada. La nota también se normaliza al español revisado.'
