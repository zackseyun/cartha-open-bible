translation:
  language: es
  text: Porque cualquiera que haga la voluntad de mi Padre que está en los cielos[a], él es mi hermano y hermana y madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cualquiera que haga la voluntad de mi Padre que está en los cielos, él es mi hermano y hermana y madre». El griego usa una forma singular masculina con valor genérico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις ... ἂν
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: La construcción indefinida con ἂν expresa una condición general. «Cualquiera que» conserva ese valor abierto y suena natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa con el contexto previo. En español, «Porque» funciona aquí de manera directa y clara.
- source_word: ποιήσῃ
  english_pob_choice: does
  chosen_spanish: haga
  alternatives_spanish:
  - hace
  - cumpla
  lexicon: BDAG
  rationale: Con θέλημα, ποιέω suele ser «hacer» en el sentido de llevar a cabo o poner en práctica. «Haga» conserva esa fuerza sin convertirlo en una mera paráfrasis de «obedecer».
- source_word: τὸ θέλημα
  english_pob_choice: the will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - lo que quiere
  - el querer
  lexicon: BDAG
  rationale: «La voluntad» preserva el sustantivo abstracto del griego y su resonancia teológica, sin suavizarlo demasiado.
- source_word: τοῦ πατρός μου τοῦ ἐν οὐρανοῖς
  english_pob_choice: of my Father in heaven
  chosen_spanish: de mi Padre que está en los cielos
  alternatives_spanish:
  - de mi Padre en el cielo
  - de mi Padre celestial
  lexicon: BDAG
  rationale: «Que está en los cielos» reproduce con fidelidad la estructura atributiva del griego y evita una solución más interpretativa como «celestial».
- source_word: αὐτός
  english_pob_choice: he
  chosen_spanish: ese
  alternatives_spanish:
  - él
  - esa persona
  lexicon: BDAG
  rationale: El griego usa un singular masculino genérico con valor enfático. En español, «ese» puede señalar al sujeto ya definido por la relativa sin forzar una neutralización que borre la forma del original.
- source_word: ἀδελφὸς
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano/a
  - pariente
  lexicon: BDAG
  rationale: Equivalente directo y estándar para ἀδελφός.
- source_word: ἀδελφὴ
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana mujer
  lexicon: BDAG
  rationale: Equivalente directo y explícito para ἀδελφή; se conserva la lista de roles familiares del griego.
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: BDAG
  rationale: Equivalente directo y digno para μήτηρ.
- source_word: ἐστίν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: Copula simple y natural en español para el predicado nominal.
theological_decisions:
- issue: Lenguaje masculino genérico en una afirmación inclusiva
  english_pob_reading: he is my brother and sister and mother
  chosen_spanish_reading: ese es mi hermano, y hermana, y madre
  alternative_spanish_readings:
  - él es mi hermano, y hermana, y madre
  - esa persona es mi hermano, y hermana, y madre
  rationale: El griego emplea una forma masculina singular genérica. Se preserva la referencia representativa sin convertirla en una formulación totalmente neutral que oculte la gramática original. La inclusión queda explícita por los sustantivos «hermana» y «madre».
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] en el texto principal exactamente donde corresponde, de modo que toda nota al pie queda anclada en la traducción.
  spanish_consistency_notes:
  - Se mantuvo «Padre» y «cielos» para reflejar la frase fija del original sin sustituirla por una formulación más interpretativa.
  - Se conservó la enumeración «hermano, y hermana, y madre» para respetar la secuencia del griego.
  - Se evitó «SEÑOR» u otras equivalencias no presentes en el versículo.
  - La elección de «ese» intenta reflejar el valor enfático de αὐτός, aunque el español no reproduce exactamente el mismo matiz gramatical que el griego.
