translation:
  language: es
  text: 'Pilato les dijo: «¿Qué debo hacer, entonces, con Jesús, el llamado Mesías[a]?» Todos dijeron: «¡Que sea crucificado!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el llamado Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτοῖς ὁ Πιλᾶτος
  english_pob_choice: Pilate said to them
  chosen_spanish: Pilato les dijo
  alternatives_spanish:
  - Pilato les decía
  - Pilato les habló
  lexicon: BDAG
  rationale: λέγει es un presente histórico; en español narrativo se expresa naturalmente en pasado. Les dijo conserva el dativo destinatario αὐτοῖς sin añadir matices ajenos.
- source_word: Τί οὖν ποιήσω
  english_pob_choice: What then should I do
  chosen_spanish: ¿Qué haré, entonces?
  alternatives_spanish:
  - ¿Qué debo hacer, entonces?
  - ¿Qué voy a hacer, entonces?
  lexicon: BDAG
  rationale: ποιήσω es deliberativo; en español, una pregunta deliberativa se expresa con un futuro o una perífrasis equivalente. Haré mantiene el carácter de decisión/pregunta reflexiva, y entonces refleja οὖν.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención estándar.
- source_word: τὸν λεγόμενον χριστόν
  english_pob_choice: who is called Messiah
  chosen_spanish: el llamado Mesías
  alternatives_spanish:
  - el que es llamado Mesías
  - el llamado Cristo
  lexicon: BDAG
  rationale: λεγόμενον funciona atributivamente como 'el llamado'. Χριστός se traduce como Mesías por ser aquí un título, no un nombre fijo; se preserva así el sentido judío del término.
- source_word: λέγουσιν πάντες
  english_pob_choice: They all said
  chosen_spanish: Todos dijeron
  alternatives_spanish:
  - Todos respondieron
  - Y todos dijeron
  lexicon: BDAG
  rationale: El presente histórico se vierte naturalmente en pasado en español. Todos preserva el alcance colectivo de πάντες.
- source_word: Σταυρωθήτω
  english_pob_choice: Let him be crucified
  chosen_spanish: ¡Que sea crucificado!
  alternatives_spanish:
  - Crucifíquenlo
  - Que lo crucifiquen
  lexicon: BDAG
  rationale: El imperativo pasivo de tercera persona se expresa de forma idiomática en español con 'Que sea crucificado', manteniendo el pasivo y el mandato. Se añade exclamación para reflejar la fuerza colectiva de la respuesta.
theological_decisions:
- issue: Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός es un título; traducirlo como Mesías preserva el sentido y evita tratarlo como un nombre propio. 'Cristo' queda como alternativa posible, pero no es la principal aquí.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el anclaje [a] en el texto español y manteniendo una única nota de pie para la variante tradicional 'Cristo'.
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός como título, en coherencia con el POB en inglés y con el criterio del proyecto.
  - Se mantiene el registro narrativo sobrio y directo, sin calco excesivo del inglés.
  - Se conserva el pasivo de Σταυρωθήτω mediante 'Que sea crucificado', que es idiomático en español y fiel al imperativo pasivo.
