translation:
  language: es
  text: 'Pero algunos de los que estaban allí, al oírlo[a], decían: «Este está llamando a Elías»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probablemente los presentes malinterpretaron el grito de Jesús en el versículo anterior como una apelación a Elías.
    reason: cross_reference
  - marker: b
    text: 'O también: «Este llama a Elías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὲς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  - ciertos
  lexicon: BDAG
  rationale: Plural indefinido para un subconjunto no identificado de los presentes; «algunos» es natural y conserva la indefinición.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Marca un giro narrativo suave desde la escena anterior; «Pero» funciona bien en español y mantiene el contraste.
- source_word: τῶν ἐκεῖ ⸀ἑστηκότων
  english_pob_choice: of those standing there
  chosen_spanish: de los que estaban allí
  alternatives_spanish:
  - de los que estaban de pie allí
  - de los presentes allí
  lexicon: BDAG
  rationale: El participio perfecto sustantivado describe a los presentes en la escena; en español, «estaban allí» comunica la situación sin rigidez y sin perder el referente de testigos presenciales.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard it
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando lo oyeron
  - habiéndolo oído
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; «al oírlo» es una solución española natural y breve, con el objeto implícito recuperado por el contexto.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa habla en desarrollo; en español, «decían» conserva esa imperfectividad sin sonar forzado.
- source_word: Ἠλίαν
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías el profeta
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español.
- source_word: φωνεῖ
  english_pob_choice: is calling
  chosen_spanish: está llamando
  alternatives_spanish:
  - llama
  - está invocando
  lexicon: BDAG
  rationale: El presente en contexto reporta la percepción de los bystanders; «está llamando» reproduce el aspecto progresivo y evita introducir un matiz interpretativo innecesario.
- source_word: οὗτος
  english_pob_choice: This man
  chosen_spanish: Este
  alternatives_spanish:
  - Este hombre
  - Éste
  lexicon: BDAG
  rationale: Demostrativo deíctico con posible tono distante; en español, «Este» mantiene la referencia breve y puede conservar cierta carga de señalamiento sin añadir «hombre».
theological_decisions:
- issue: Si la frase de los presentes debe interpretarse como comprensión correcta o malentendido de la exclamación previa de Jesús
  english_pob_reading: 'Render as reported perception: ''This man is calling Elijah.'''
  chosen_spanish_reading: 'Presentar la expresión como percepción reportada: «Este está llamando a Elías».'
  alternative_spanish_readings:
  - «Este está llamando a Elías el profeta»
  - «Está invocando a Elías»
  rationale: El griego registra lo que dicen los presentes después de oír el grito de Jesús, sin resolver si lo entendieron bien. La traducción conserva esa tensión narrativa y no la explica en el texto principal.
  doctrine_reference: Preservar la tensión narrativa sin decidir el malentendido en el texto principal.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «for» para reflejar más directamente φωνεῖ Ἠλίαν. En español, se evitó añadir equivalentes interpretativos como «a favor de» o «para», y se mantuvo una redacción breve que preserve la ambigüedad del original.
  spanish_consistency_notes:
  - Se mantuvo «Elías» como forma española estable del nombre propio.
  - Se usó «Pero» para δὲ por coherencia narrativa.
  - Se evitó «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - La cita directa conserva la ambigüedad del griego y no añade comentarios explicativos en el cuerpo del texto.
