- from: 'Pero algunos de los que estaban allí[a], al oírlo, decían[b]: «Este está llamando a Elías»[a].'
  to: 'Pero algunos de los que estaban allí, al oírlo[a], decían: «Este está llamando a Elías»[b].'
  rationale: Se corrigen los marcadores de nota para que sean únicos y estén anclados correctamente. Se elimina la nota léxica redundante y se la reemplaza por una alternativa española genuina relacionada con la aspectualidad de φωνεῖ («llama» / «está llamando»). Se conserva el texto principal, que es fiel al griego y al razonamiento teológico documentado.
