revisions:
- from: Y de inmediato uno de ellos corrió[a], tomó una esponja, la empapó de vino agrio[b], la puso en una caña y le dio de beber.
  to: Y de inmediato[a] uno de ellos corrió, tomó una esponja, la llenó con vino agrio[b], la puso en una caña y le dio de beber.
  rationale: Se reubica la nota [a] para que ancle correctamente εὐθέως en «de inmediato», y se cambia «empapó» por «llenó con» para reflejar mejor πλήσας y alinearse más estrechamente con el expediente léxico del POB inglés, sin perder naturalidad en español.
