translation:
  language: es
  text: Y de inmediato[a] uno de ellos corrió, tomó una esponja, la llenó con vino agrio[b], la puso en una caña y le dio de beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «inmediatamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vinagre». El griego ὄξος puede referirse al vino agrio o al vinagre de vino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la rapidez súbita del adverbio, sin arcaísmo ni énfasis excesivo.
- source_word: δραμὼν
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - fue corriendo
  - había corrido
  lexicon: BDAG
  rationale: El participio aoristo se integra de forma natural en una cadena narrativa de acciones; 'corrió' conserva la urgencia del movimiento.
- source_word: εἷς ἐξ αὐτῶν
  english_pob_choice: one of them
  chosen_spanish: uno de ellos
  alternatives_spanish:
  - uno entre ellos
  - uno de entre ellos
  lexicon: BDAG
  rationale: Corresponde al valor partitivo idiomático y mantiene claro que se trata de un individuo del grupo.
- source_word: λαβὼν σπόγγον
  english_pob_choice: taking a sponge
  chosen_spanish: tomó una esponja
  alternatives_spanish:
  - habiendo tomado una esponja
  - agarró una esponja
  lexicon: BDAG
  rationale: La secuencia verbal española fluye mejor con un verbo finito coordinado; 'tomó' preserva el orden de acciones sin sobrecargar la sintaxis.
- source_word: πλήσας τε ὄξους
  english_pob_choice: filled it with sour wine
  chosen_spanish: la empapó de vino agrio
  alternatives_spanish:
  - la llenó de vino agrio
  - la empapó de vinagre
  lexicon: BDAG
  rationale: ὄξος puede designar vino agrio o vinagre de vino; 'vino agrio' sigue la opción más precisa del POB inglés y evita asociarlo automáticamente con el condimento moderno 'vinagre'.
- source_word: περιθεὶς καλάμῳ
  english_pob_choice: put it on a reed
  chosen_spanish: la puso en una caña
  alternatives_spanish:
  - la colocó en un junco
  - la puso en un bastón
  lexicon: BDAG
  rationale: '''Caña'' es el equivalente más directo y natural de καλάμος en este contexto; conserva la imagen de un tallo/reed usado para alcanzar a Jesús.'
- source_word: ἐπότιζεν αὐτόν
  english_pob_choice: gave him a drink
  chosen_spanish: le dio de beber
  alternatives_spanish:
  - lo dio de beber
  - lo estuvo dando de beber
  lexicon: BDAG
  rationale: El imperfecto puede sugerir acción en desarrollo, pero aquí una traducción simple y natural comunica la escena sin forzar una perífrasis en español.
theological_decisions:
- issue: Naturaleza de la bebida ofrecida a Jesús
  english_pob_reading: sour wine
  chosen_spanish_reading: vino agrio
  alternative_spanish_readings:
  - vinagre
  - vino avinagrado
  rationale: '''Vino agrio'' comunica el valor léxico de ὄξος como bebida ácida de tipo vinagre/vino agrio, sin cargar el texto con connotaciones modernas de condimento que ''vinagre'' puede sugerir.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó la secuencia a verbos finitos coordinados y cambió 'kept giving him a drink' por 'gave him a drink'. Esta versión española sigue esa línea de fluidez narrativa, pero conserva el matiz de ὄξος con 'vino agrio' y expresa la acción final con 'le dio de beber' para un registro natural y fiel.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque el versículo no usa Χριστός como título.
  - Se usa 'vino agrio' en lugar de 'vinagre' para reflejar el rango semántico del griego ὄξος.
  - '''Caña'' traduce καλάμος de manera transparente y consistente con el contexto de la crucifixión.'
