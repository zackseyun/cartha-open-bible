translation:
  language: es
  text: Al día siguiente, que es después del día de la Preparación[a], se reunieron los principales sacerdotes y los fariseos ante Pilato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que es después de la Preparación». El término griego puede designar el día de preparación antes del sábado; traducirlo como «viernes» sería más interpretativo de lo que exige el texto fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ δὲ ἐπαύριον
  english_pob_choice: Now on the next day
  chosen_spanish: Al día siguiente
  alternatives_spanish:
  - Al día siguiente, ahora
  - Y al día siguiente
  lexicon: BDAG
  rationale: La expresión idiomática marca avance temporal. En español, 'Al día siguiente' transmite el valor adverbial sin añadir una partícula discursiva innecesaria; 'δὲ' queda reflejado de manera ligera por el enlace natural del contexto.
- source_word: ἥτις ἐστὶν μετὰ τὴν παρασκευήν
  english_pob_choice: which is after the day of Preparation
  chosen_spanish: que es después del día de la Preparación
  alternatives_spanish:
  - que es después de la Preparación
  - que es después del día de preparación
  lexicon: BDAG
  rationale: Conservo la cláusula explicativa con 'que es' y el valor temporal de 'μετά'. 'El día de la Preparación' mantiene la expresión calendárica judía de forma clara y fiel; evitar 'viernes' preserva la cautela interpretativa del texto fuente y del audit trail.
- source_word: παρασκευήν
  english_pob_choice: the day of Preparation
  chosen_spanish: el día de la Preparación
  alternatives_spanish:
  - Preparación
  - viernes
  lexicon: BDAG
  rationale: La referencia probable es el día previo al sábado. El sintagma completo es más transparente en español que una simple transliteración, y más fiel que especificar 'viernes' en el texto principal.
- source_word: συνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: BDAG
  rationale: El pasivo funciona con sentido intransitivo. 'Se reunieron' expresa con naturalidad que el grupo fue convocado o se congregó, sin perder el matiz del evento colectivo.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes sacerdotales
  lexicon: BDAG
  rationale: '''Chief priests'' en español puede rendirse como ''principales sacerdotes'' para evitar una equivalencia demasiado técnica o jerárquica que no siempre comunica bien la pluralidad de autoridades sacerdotales. ''Sumos sacerdotes'' es posible, pero puede sonar más rígido y menos transparente para lectores amplios.'
- source_word: οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Se conserva el nombre del grupo religioso con transliteración estable en español.
- source_word: πρὸς Πιλᾶτον
  english_pob_choice: before Pilate
  chosen_spanish: ante Pilato
  alternatives_spanish:
  - ante Pilato
  - delante de Pilato
  - a Pilato
  lexicon: BDAG
  rationale: Con personas, πρός puede indicar movimiento o comparecencia ante alguien. 'Ante Pilato' comunica bien el marco judicial-político y preserva la idea de presentarse frente a él mejor que un simple 'a Pilato'.
- source_word: Πιλᾶτον
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Pilato
  lexicon: BDAG
  rationale: Se usa la forma estable del nombre propio en español.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se requieren cambios respecto del análisis auditado; se mantiene la cautela sobre παρασκευή y el valor temporal de πρός con persona.'
  spanish_consistency_notes:
  - Se mantiene 'día de la Preparación' en lugar de 'Preparación' sola para conservar la referencia calendárica completa.
  - '''Ante Pilato'' sigue la decisión auditada de ''before Pilate'' y evita una traducción meramente direccional.'
  - '''Principales sacerdotes'' conserva la pluralidad de autoridades y evita confundir el plural con el oficio singular de sumo sacerdote.'
