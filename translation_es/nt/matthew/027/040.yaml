    text: O «lo reconstruyes». El verbo griego significa simplemente «edificar»; el contexto de la burla puede sugerir la idea de volver a edificar el templo.
    reason: lexical_alternative
  revision_rationale: Se corrige el matiz de Ὁ καταλύων para reflejar mejor la burla aludiendo a una supuesta afirmación de Jesús («ibas a destruir»), y se reubica la nota léxica al verbo correcto («lo edificas»). Se elimina la nota sobre «baja/desciende» por no ser necesaria según la evidencia auditada y para mantener notas solo donde aportan valor real.
