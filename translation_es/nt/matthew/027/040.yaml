review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del POB inglés: mantiene la burla, el título «el Hijo de Dios», «templo», «sálvate», y «cruz». Sin embargo, no preserva del todo una decisión fuente importante: Ὁ καταλύων fue auditado en inglés como «You who would destroy», es decir, una alusión burlona a la acusación/pretensión atribuida a Jesús, no una aseveración simple presente. «Tú que destruyes» es comprensible, pero debilita ese matiz de cita burlona o supuesto. Además, la nota [a] está anclada en «diciendo», cuando la alternativa documentada corresponde a «lo edificas».'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. «Lo edificas» suena digno y natural con «templo». «Baja de la cruz» es idiomático. No obstante, la colocación de notas es incorrecta y conviene ajustar «Tú que destruyes» a una formulación más fiel al matiz de burla citada; «Tú que destruirías» suena algo rígido en español, por lo que una solución más natural es «Tú que ibas a destruir».
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Dios», «Hijo de Dios» y «cruz» están bien. No aplica Yahvé/Mesías/siervo-esclavo, etc. Se preserva adecuadamente el título cristológico.
  issues:
  - severity: medium
    issue: Ὁ καταλύων se traduce como «Tú que destruyes» en vez de reflejar el matiz auditado «You who would destroy».
    rationale: El inglés POB documenta explícitamente que el matiz de burla alude a la acusación/afirmación atribuida a Jesús. En español, un presente simple puede sonar como descripción literal actual, no como cita burlona o supuesto.
  - severity: medium
    issue: La nota [a] está colocada en «diciendo», pero su contenido trata la alternativa de οἰκοδομῶν («edificar/reconstruir»).
    rationale: Las instrucciones requieren que cada nota se ancle exactamente en la palabra o frase pertinente. Tal como está, la nota induce confusión y no corresponde al término anotado.
  - severity: low
    issue: La nota [b] sobre «baja/desciende» no es necesaria para preservar la evidencia fuente o el rastro de auditoría inglés.
    rationale: El POB inglés no incluyó nota aquí, y en español «baja» comunica bien el imperativo. Puede omitirse para evitar sobreanotación, salvo que se quiera conservar una alternativa estilística no esencial.
  revised_spanish_text: 'y diciendo: «Tú que ibas a destruir el templo y en tres días lo edificas[a], sálvate a ti mismo; si eres el Hijo de Dios, baja de la cruz»'
  revised_footnotes:
