revisions:
- from: 'y diciendo[a]: «Tú que destruyes el templo y en tres días lo edificas, sálvate a ti mismo; si eres el Hijo de Dios, baja[b] de la cruz»'
  to: 'y diciendo: «Tú que ibas a destruir el templo y en tres días lo edificas[a], sálvate a ti mismo; si eres el Hijo de Dios, baja de la cruz»'
  rationale: Se corrige el matiz de Ὁ καταλύων para reflejar mejor la burla aludiendo a una supuesta afirmación de Jesús («ibas a destruir»), y se reubica la nota léxica al verbo correcto («lo edificas»). Se elimina la nota sobre «baja/desciende» por no ser necesaria según la evidencia auditada y para mantener notas solo donde aportan valor real.
