translation:
  language: es
  text: 'y diciendo: «Tú que ibas a destruir el templo y en tres días lo edificas[a], sálvate a ti mismo; si eres el Hijo de Dios, baja de la cruz»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo reconstruyes». El verbo griego significa simplemente «edificar»; el contexto de la burla puede sugerir la idea de volver a edificar el templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: and saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - y decían
  - diciendo
  lexicon: BDAG
  rationale: Mantiene la continuidad narrativa del participio y conserva el tono de la burla sin sobreespecificar sujeto o tiempo verbal.
- source_word: Ὁ καταλύων
  english_pob_choice: You who would destroy
  chosen_spanish: Tú que destruyes
  alternatives_spanish:
  - Tú que destruirías
  - Destructor de
  lexicon: BDAG
  rationale: El artículo con participio funciona como apelativo directo; en español, «Tú que destruyes» refleja mejor la acusación/escarnio que una forma nominalizada.
- source_word: καταλύω
  english_pob_choice: destroy
  chosen_spanish: destruyes
  alternatives_spanish:
  - derribas
  - demueles
  lexicon: BDAG
  rationale: En este contexto, «destruir» es la equivalencia más natural para el verbo, y la segunda persona del presente conserva el tono de insulto dirigido a Jesús.
- source_word: ναός
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: «Templo» es la forma más clara y natural para lectores españoles en este contexto narrativo; «santuario» sería más técnico de lo necesario.
- source_word: ἐν τρισὶν ἡμέραις
  english_pob_choice: in three days
  chosen_spanish: en tres días
  alternatives_spanish:
  - dentro de tres días
  - en el transcurso de tres días
  lexicon: BDAG
  rationale: Expresión temporal directa y idiomática que preserva el valor de la frase griega sin añadir matices interpretativos.
- source_word: οἰκοδομῶν
  english_pob_choice: build it
  chosen_spanish: lo edificas
  alternatives_spanish:
  - lo construyes
  - lo vuelves a edificar
  lexicon: BDAG
  rationale: «Edificar» conserva con dignidad el valor de construir/levantar y suena natural con «templo» en español bíblico; no se fuerza «reconstruir», ya que el griego dice simplemente «construir/edificar».
- source_word: σῶσον σεαυτόν
  english_pob_choice: save yourself
  chosen_spanish: sálvate a ti mismo
  alternatives_spanish:
  - sálvate
  - ríndete a ti mismo
  lexicon: BDAG
  rationale: La forma reflexiva expresa con claridad la orden burlesca; en español, añadir «a ti mismo» enfatiza el matiz del griego y evita ambigüedad.
- source_word: εἰ υἱὸς εἶ τοῦ θεοῦ
  english_pob_choice: If you are the Son of God
  chosen_spanish: si eres el Hijo de Dios
  alternatives_spanish:
  - si eres Hijo de Dios
  - si eres el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico de forma transparente y reverente; «Hijo de Dios» es la manera natural y doctrinalmente precisa de expresar el griego.
- source_word: κατάβηθι
  english_pob_choice: come down
  chosen_spanish: baja
  alternatives_spanish:
  - desciende
  - ven abajo
  lexicon: BDAG
  rationale: «Baja» es el imperativo natural en español para una orden de movimiento descendente desde la cruz; «desciende» sería más formal pero menos directo.
- source_word: σταυρός
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - madero
  - estaca
  lexicon: BDAG
  rationale: En la pasión, «cruz» es la equivalencia contextual estándar y comunica claramente el instrumento de ejecución sin oscurecer el sentido narrativo.
theological_decisions:
- issue: El título cristológico «Hijo de Dios» en un contexto de burla
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios
  - el Hijo de Dios
  rationale: La traducción mantiene intacto el título cristológico y su fuerza irónica en la boca de los burladores, sin suavizarlo ni expandirlo más allá del texto.
  doctrine_reference: Affirmations; Translate titles; transliterate names
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y conserva la tensión lexical documentada entre «build» y la posible inferencia contextual de «rebuild». No introduce una reconstrucción explícita en el texto principal, pero la anota como alternativa legítima. También mantiene el insulto directo del vocativo y el tono burlesco de la escena.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto para el nombre divino, pero aquí el texto griego tiene θεοῦ y el contexto cristológico pide «Dios».
  - Se prefirió «Hijo de Dios» por ser el título tradicional y más transparente en español bíblico.
  - Se eligió «cruz» por consistencia con el relato de la pasión y la equivalencia contextual establecida por el audit trail.
  - La redacción mantiene el participio narrativo con «y diciendo» para conservar continuidad con el contexto inmediato.
