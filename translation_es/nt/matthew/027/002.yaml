revisions:
- from: Y después de haberlo[a] atado, lo llevaron y lo entregaron a Pilato, el gobernador.
  to: Y después de atarlo[a], se lo llevaron y lo entregaron a Pilato, el gobernador.
  rationale: Se ajusta ἀπήγαγον a 'se lo llevaron' para conservar mejor el sentido de llevarlo bajo custodia y apartarlo de allí. También se aligera la primera frase a 'después de atarlo', que sigue expresando la anterioridad del participio δήσαντες en un español más natural. Se mantiene 'lo entregaron' para παραδίδωμι y 'el gobernador' para ἡγεμόνι, en línea con la evidencia y el audit trail.
