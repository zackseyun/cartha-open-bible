review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: acción previa del participio δήσαντες, seguida por ἀπήγαγον y παρέδωκαν. ''Lo entregaron a Pilato, el gobernador'' preserva adecuadamente el sentido judicial de παρέδωκαν y ἡγεμόνι. La principal desviación es ''lo llevaron'', que atenúa el matiz de ἀπήγαγον (''llevarse/alejar, conducir de un lugar'') frente al inglés auditado ''led him away''.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para reflejar mejor el movimiento de alejamiento/custodia. 'Después de haberlo atado' es correcto aunque algo más pesado; 'después de atarlo' suena más natural y sigue expresando anterioridad. El resto del verso es plenamente legible y digno.
  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios y cargos. 'Pilato' y 'gobernador' están bien alineados con la política del proyecto. 'Lo entregaron' concuerda con la decisión auditada para παραδίδωμι.
  issues:
  - severity: medium
    issue: ἀπήγαγον se traduce como 'lo llevaron' en vez de una forma que exprese 'lo llevaron away / se lo llevaron / lo condujeron'
    rationale: El griego ἀπάγω en este contexto incluye el matiz de llevarse o apartar a alguien bajo custodia. 'Lo llevaron' no es falso, pero pierde parte del valor direccional/custodial que sí preserva el audit trail inglés.
  - severity: low
    issue: '''después de haberlo atado'' suena más pesado de lo necesario'
    rationale: La construcción es fiel, pero en español bíblico moderno 'después de atarlo' conserva la anterioridad del participio aoristo con mejor fluidez.
  revised_spanish_text: Y después de atarlo[a], se lo llevaron y lo entregaron a Pilato, el gobernador.
  revised_footnotes:
