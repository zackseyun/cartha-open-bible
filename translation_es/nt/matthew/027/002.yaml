translation:
  language: es
  text: Y después de atarlo[a], se lo llevaron y lo entregaron a Pilato, el gobernador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiéndolo atado».
    reason: lexical_alternative
lexical_decisions:
- source_word: δήσαντες
  english_pob_choice: after binding
  chosen_spanish: después de haberlo atado
  alternatives_spanish:
  - habiéndolo atado
  - después de atarlo
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a los verbos principales. En español, 'después de haberlo atado' conserva la anterioridad y mantiene el sentido concreto de 'atar'. 'Atado' evita una formulación más abstracta y sigue la fuerza narrativa del texto.
- source_word: ἀπήγαγον
  english_pob_choice: they led him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo llevaron lejos
  lexicon: BDAG
  rationale: El verbo indica llevar o conducir físicamente a alguien fuera de un lugar. 'Lo llevaron' es natural en español y conserva el movimiento custodial sin introducir una carga idiomática excesiva. 'Condujeron' es posible, pero menos corriente aquí.
- source_word: παρέδωκαν
  english_pob_choice: handed him over
  chosen_spanish: lo entregaron
  alternatives_spanish:
  - lo entregaron en manos de
  - lo entregaron a
  lexicon: BDAG
  rationale: '''Entregar'' en español expresa bien la acción de poner a alguien bajo la autoridad o custodia de otro. Mantiene la fuerza judicial del verbo griego sin forzar una lectura doctrinal explícita. ''Entregarlo'' también preserva la ambigüedad entre cesión legal y traición/custodia.'
- source_word: Πιλάτῳ
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Poncio Pilato
  lexicon: Transliteración estándar
  rationale: Se translitera el nombre propio como 'Pilato', conforme a la práctica del proyecto. 'Poncio Pilato' es posible, pero el griego solo nombra a Pilato.
- source_word: ἡγεμόνι
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el prefecto
  - el magistrado
  lexicon: BDAG
  rationale: '''Gobernador'' es la equivalencia clara y amplia para ἡγεμών en este contexto. ''Prefecto'' sería históricamente más específico, pero el término griego es más general, así que ''gobernador'' refleja mejor el alcance del original.'
- source_word: καὶ δήσαντες αὐτὸν
  english_pob_choice: And after binding him
  chosen_spanish: Y después de haberlo atado
  alternatives_spanish:
  - Y habiéndolo atado
  lexicon: BDAG
  rationale: Se conserva la secuencia narrativa y el objeto directo explícito. La partícula inicial καί se traduce con 'Y' para mantener el flujo del relato, y la construcción verbal preserva la prioridad temporal del participio.
- source_word: καὶ παρέδωκαν
  english_pob_choice: and handed him over
  chosen_spanish: y lo entregaron
  alternatives_spanish:
  - y lo entregaron a
  lexicon: BDAG
  rationale: La segunda coordinada se mantiene con 'y'. En español no hace falta repetir el sujeto; el verbo 'entregaron' conserva la transición de custodia/autoridad sin perder la tensión legal del pasaje.
theological_decisions:
- issue: παραδίδωμι en el relato de la pasión
  english_pob_reading: handed him over
  chosen_spanish_reading: lo entregaron
  alternative_spanish_readings:
  - lo entregaron
  - lo entregaron en manos de otro
  rationale: 'Se conserva la ambigüedad importante del verbo: puede describir una entrega judicial y, al mismo tiempo, resonar con la teología de la pasión en contextos más amplios. ''Lo entregaron'' es suficientemente literal y no impone por sí mismo una interpretación doctrinal cerrada.'
  doctrine_reference: Mantener la tensión lexicoteológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se revisó el encaje con el griego SBLGNT y con el audit trail inglés. No se siguió mecánicamente la sintaxis inglesa: se optó por una solución española natural que conserva la anterioridad del participio, la coordinación narrativa y la fuerza custodial/judicial de los verbos clave.'
  spanish_consistency_notes:
  - Se usa 'Pilato' sin añadir 'Poncio', porque el texto fuente no lo incluye.
  - '''Gobernador'' mantiene el valor amplio de ἡγεμών sin sobreespecificar el cargo.'
  - '''Entregaron'' preserva la ambigüedad entre custodia y acción legal, en línea con la filosofía POB.'
  - La nota [a] se ancla en el participio para preservar la alternativa 'habiéndolo atado'.
