translation:
  language: es
  text: Pero Jesús volvió a clamar con voz fuerte y entregó su espíritu[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dio su último aliento». El griego dice literalmente «entregó el espíritu», una expresión idiomática para morir.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca continuación con un matiz de transición o contraste leve. «Pero» funciona de manera natural en español narrativo y conserva ese giro suave.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: πάλιν indica repetición. «Otra vez» es claro, idiomático y mantiene la brevedad del griego.
- source_word: κράξας
  english_pob_choice: cried out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - exclamando
  lexicon: BDAG
  rationale: El participio aoristo de κράζω expresa un clamor fuerte. «Clamando» conserva el carácter intenso y solemne mejor que un simple «dijo» o «habló».
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz
  alternatives_spanish:
  - con voz fuerte
  - en alta voz
  lexicon: BDAG
  rationale: La frase dativa expresa manera. «Con gran voz» sigue de cerca la forma del griego y mantiene la fuerza solemne de la expresión; «con voz fuerte» sería más explicativo, pero menos cercano al texto.
- source_word: ἀφῆκεν
  english_pob_choice: gave up
  chosen_spanish: entregó
  alternatives_spanish:
  - dejó ir
  - cedió
  - soltó
  lexicon: BDAG
  rationale: En este contexto de muerte, ἀφίημι funciona idiomáticamente. «Entregó» conserva la idea de dejar ir la vida/espíritu sin reducir el término a «respiró» ni forzar una paráfrasis interpretativa.
- source_word: τὸ πνεῦμα
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - el espíritu
  - su aliento
  lexicon: BDAG
  rationale: Aunque el griego tiene artículo, el español natural pide posesivo en esta expresión de muerte. «Espíritu» preserva el peso léxico de πνεῦμα; «aliento» sería posible, pero desplaza demasiado el término hacia una lectura física.
theological_decisions:
- issue: Expresión idiomática de muerte en ἀφῆκεν τὸ πνεῦμα
  english_pob_reading: gave up his spirit
  chosen_spanish_reading: entregó su espíritu
  alternative_spanish_readings:
  - dio su último aliento
  - exhaló su último aliento
  - cedió su espíritu
  rationale: La frase griega puede entenderse como un modismo para morir, pero el texto conserva πνεῦμα. «Entregó su espíritu» mantiene la solemnidad y el vínculo con el vocabulario original, sin convertirlo en una glosa fisiológica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el estado más reciente indica concordancia alta y sin cambios necesarios. La versión española mantiene esa línea, preservando el paralelismo entre el clamor final y la expresión idiomática de la muerte.
  spanish_consistency_notes:
  - Se conserva «espíritu» para πνεῦμα, en línea con el criterio proyectual de no diluir el término en «aliento» salvo necesidad contextual.
  - Se evita «SEÑOR» u այլ sustituciones reverenciales no pertinentes; no hay nombre divino en este versículo.
  - «Pero» y «otra vez» reproducen el flujo narrativo de δὲ y πάλιν sin sobrerinterpretar el contraste.
