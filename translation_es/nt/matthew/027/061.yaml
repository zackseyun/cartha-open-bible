translation:
  language: es
  text: Ahora estaban allí María Magdalena y la otra María, sentadas frente al sepulcro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦν δὲ ἐκεῖ
  english_pob_choice: were there / Now
  chosen_spanish: Ahora estaban allí
  alternatives_spanish:
  - Y estaban allí
  - Estaban allí
  lexicon: BDAG
  rationale: El griego usa una forma singular de εἰμί con una escena narrativa de presencia; en español resulta natural expresar la transición con «Ahora» y el plural «estaban» para reflejar a las dos mujeres mencionadas, sin perder el valor de ubicación de ἐκεῖ con «allí».
- source_word: Μαριὰμ ἡ Μαγδαληνὴ
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María, la Magdalena
  - Mariam la Magdalena
  lexicon: BDAG
  rationale: Se conserva el nombre propio reconocido en español y la identificación por procedencia/título. «María Magdalena» es la forma natural y fiel al referente del texto.
- source_word: ἡ ἄλλη Μαρία
  english_pob_choice: the other Mary
  chosen_spanish: la otra María
  alternatives_spanish:
  - la otra María llamada así
  - la otra María
  lexicon: BDAG
  rationale: ἄλλη distingue a esta María de María Magdalena ya nombrada; «la otra María» reproduce esa oposición de manera directa y clara.
- source_word: καθήμεναι
  english_pob_choice: sitting
  chosen_spanish: sentadas
  alternatives_spanish:
  - sentándose
  - sentadas allí
  lexicon: BDAG
  rationale: El participio presente describe su postura continuada. En español, «sentadas» comunica el estado/postura de manera natural y manteniendo el aspecto progresivo implícito.
- source_word: ἀπέναντι
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuestas a
  lexicon: BDAG
  rationale: La preposición señala ubicación frente a un objeto. «Frente a» es idiomático en español y conserva bien la relación espacial sin sonar rígido.
- source_word: τοῦ τάφου
  english_pob_choice: the tomb
  chosen_spanish: el sepulcro
  alternatives_spanish:
  - la tumba
  - el sepulcro
  lexicon: BDAG
  rationale: En este contexto funerario, «sepulcro» mantiene el matiz de lugar de entierro y armoniza con el registro bíblico en español. «Tumba» también sería posible, pero «sepulcro» es más preciso para este pasaje.
translation_notes:
  revision_awareness: 'El texto griego y el contexto auditado en inglés presentan acuerdo alto y no requieren enmiendas textuales ni notas de variante; la principal decisión fue idiomática: mantener el sujeto plural en español para una escena con dos mujeres y traducir ἀπέναντι con una relación espacial natural.'
  spanish_consistency_notes:
  - Se mantuvo «María Magdalena» como nombre establecido en español, sin añadir glosas innecesarias.
  - Se eligió «sepulcro» para conservar el registro funerario bíblico y la precisión contextual.
  - No se introdujeron términos teológicos sensibles ni equivalencias doctrinales no presentes en el versículo.
