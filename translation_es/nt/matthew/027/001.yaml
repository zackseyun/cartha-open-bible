review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: transición temporal, participación total de los líderes, hostilidad contra Jesús y propósito de darle muerte. Sin embargo, «tomaron consejo» suena poco natural en español actual y no preserva tan bien la fuerza idiomática/formal de συμβούλιον ἔλαβον como una opción más idiomática.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un pequeño ajuste de naturalidad y precisión idiomática. «Cuando amaneció» funciona bien; «los principales sacerdotes», «los ancianos del pueblo», «contra Jesús» y «para darle muerte» son adecuados. La coma antes de «para darle muerte» no es necesaria en español. La principal mejora es reemplazar «tomaron consejo» por «celebraron consejo» o una formulación equivalente más natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» está correcto. No aparecen términos sensibles como Yahvé, Mesías/Cristo, Espíritu, etc. «Principales sacerdotes» alinea bien con ἀρχιερεῖς en plural.
  issues:
  - severity: medium
    issue: «tomaron consejo» es poco idiomático en español bíblico moderno
    rationale: Aunque calca de cerca el inglés y refleja el valor deliberativo, en español suena forzado. Para συμβούλιον ἔλαβον, «celebraron consejo» o «deliberaron» transmite mejor la acción formal de consulta sin perder gravedad judicial.
  - severity: low
    issue: Coma innecesaria antes de «para darle muerte»
    rationale: 'El complemento final de propósito fluye mejor sin coma en español: «contra Jesús para darle muerte».'
  revised_spanish_text: Cuando amaneció[a], todos los principales sacerdotes y los ancianos del pueblo celebraron consejo[b] contra Jesús para darle muerte.
