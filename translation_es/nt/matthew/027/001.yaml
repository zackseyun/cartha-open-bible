translation:
  language: es
  text: Cuando amaneció[a], todos los principales sacerdotes y los ancianos del pueblo celebraron consejo[b] contra Jesús para darle muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al amanecer».
    reason: lexical_alternative
  - marker: b
    text: O «tomaron consejo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρωΐας δὲ γενομένης
  english_pob_choice: When morning came
  chosen_spanish: Cuando amaneció
  alternatives_spanish:
  - Al amanecer
  - Cuando llegó la mañana
  - Al despuntar el día
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca un cambio temporal. En español, «Cuando amaneció» comunica con naturalidad ese inicio temporal y conserva la transición marcada por δὲ sin añadir peso interpretativo innecesario.
- source_word: συμβούλιον ἔλαβον
  english_pob_choice: took counsel
  chosen_spanish: tomaron consejo
  alternatives_spanish:
  - celebraron consejo
  - deliberaron
  - tomaron una decisión
  lexicon: BDAG
  rationale: «Tomaron consejo» preserva el sentido deliberativo y formal de la expresión griega, manteniendo la gravedad judicial del contexto. «Celebraron consejo» sería posible, pero suena más institucional que el giro griego y puede sonar menos directo.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  lexicon: BDAG
  rationale: Conviene mantener la totalidad explícita del grupo dirigente. «Todos» es el equivalente natural y fiel en español.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los principales sacerdotes del templo
  lexicon: BDAG
  rationale: Aunque «sumos sacerdotes» es tradicional, la fórmula griega en los evangelios designa el liderazgo sacerdotal en plural. «Principales sacerdotes» evita sugerir erróneamente un único cargo singular y se alinea bien con el matiz del inglés POB.
- source_word: οἱ πρεσβύτεροι τοῦ λαοῦ
  english_pob_choice: the elders of the people
  chosen_spanish: los ancianos del pueblo
  alternatives_spanish:
  - los ancianos del pueblo
  - los líderes del pueblo
  lexicon: BDAG
  rationale: Se conserva la estructura de liderazgo formal del genitivo. «Ancianos del pueblo» es la opción más transparente y concordante con el registro bíblico sin volverla más interpretativa que el original.
- source_word: κατὰ τοῦ Ἰησοῦ
  english_pob_choice: against Jesus
  chosen_spanish: contra Jesús
  alternatives_spanish:
  - en contra de Jesús
  - acerca de Jesús
  lexicon: BDAG
  rationale: En este contexto hostil, κατά con genitivo tiene fuerza adversativa. «Contra Jesús» reproduce de forma natural y precisa esa oposición.
- source_word: ὥστε θανατῶσαι αὐτόν
  english_pob_choice: so as to put him to death
  chosen_spanish: para darle muerte
  alternatives_spanish:
  - con el fin de matarlo
  - para ejecutarlo
  - para quitarle la vida
  lexicon: BDAG
  rationale: El infinitivo expresa propósito o resultado intencional. «Para darle muerte» mantiene el tono formal del inglés POB («put him to death») y evita tanto la crudeza de «matarlo» como la especificación jurídica excesiva de «ejecutarlo».
theological_decisions:
- issue: Naturaleza de la acción de los líderes contra Jesús
  english_pob_reading: 'Render the phrase as a hostile deliberation culminating in intent to secure Jesus'' death: ''took counsel against Jesus so as to put him to death.'''
  chosen_spanish_reading: 'Presentar la acción como una deliberación hostil que culmina en la intención de causar la muerte de Jesús: «tomaron consejo contra Jesús, para darle muerte».'
  alternative_spanish_readings:
  - «conspiraron contra Jesús»
  - «consultaron sobre Jesús»
  rationale: El griego indica oposición clara (κατὰ τοῦ Ἰησοῦ) y finalidad letal (ὥστε θανατῶσαι αὐτόν), pero no obliga a cargar el texto con una connotación más conspirativa de la que la frase por sí sola exige. «Tomaron consejo» conserva el peso judicial y la hostilidad sin exagerar el matiz.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia entre el control cruzado y la última revisión: no se registraron cambios en la pasada más reciente. La redacción española sigue esa estabilidad y conserva las decisiones léxicas principales del audit trail inglés sin añadir expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque el texto griego nombra a «Jesús» directamente.
  - «Principales sacerdotes» conserva el plural del griego y evita la posible lectura restringida de un cargo singular.
  - La formulación «tomaron consejo» mantiene el registro formal, coherente con el contexto judicial del relato.
  - Las notas al pie solo se usan donde el inglés POB preservó alternativas léxicas relevantes.
