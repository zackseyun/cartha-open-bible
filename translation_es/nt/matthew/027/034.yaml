translation:
  language: es
  text: Le dieron vino mezclado con hiel[a] para beber; pero, después de probarlo, no quiso beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: χολή puede significar «hiel» o, de manera más general, una sustancia amarga. Se conserva «hiel» para reflejar el vocabulario de Mateo; compárese el relato paralelo de Marcos 15:23, que menciona mirra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκαν
  english_pob_choice: They gave
  chosen_spanish: Le dieron
  alternatives_spanish:
  - Le ofrecieron
  lexicon: BDAG
  rationale: El aoristo de δίδωμι expresa una acción directa de dar. «Le dieron» reproduce con naturalidad esa relación y conserva el objeto indirecto marcado por αὐτῷ.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: Le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo pronominal funciona como objeto indirecto; en español, el clítico dativo es la opción más natural y fiel.
- source_word: πιεῖν
  english_pob_choice: to drink
  chosen_spanish: para beber
  alternatives_spanish:
  - a beber
  - para que bebiera
  lexicon: BDAG
  rationale: 'El infinitivo complementario con ἔδωκαν se vierte mejor en español como finalidad: «para beber». Mantiene la relación verbal sin forzar una paráfrasis.'
- source_word: οἶνον
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino de beber
  lexicon: BDAG
  rationale: οἶνος es el término ordinario para vino; «vino» es el equivalente directo y claro en español.
- source_word: μετὰ χολῆς
  english_pob_choice: mixed with gall
  chosen_spanish: mezclado con hiel
  alternatives_spanish:
  - mezclado con bilis
  - mezclado con amargura
  lexicon: BDAG
  rationale: La POB inglesa preserva «gall» por la forma léxica de χολή. En español, «hiel» conserva la misma imagen bíblica y su resonancia tradicional, sin perder la nota de amargura implícita.
- source_word: μεμιγμένον
  english_pob_choice: mixed
  chosen_spanish: mezclado
  alternatives_spanish:
  - mezclado/minglado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de μίγνυμι describe el estado del vino. «Mezclado» es preciso, natural y suficientemente formal.
- source_word: γευσάμενος
  english_pob_choice: after tasting it
  chosen_spanish: después de probarlo
  alternatives_spanish:
  - habiéndolo probado
  - tras probarlo
  lexicon: BDAG
  rationale: El participio aoristo medio de γεύομαι expresa haber probado. «Después de probarlo» refleja el avance narrativo con fluidez en español.
- source_word: οὐκ ἠθέλησεν
  english_pob_choice: he was unwilling
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se negó
  lexicon: BDAG
  rationale: θέλω expresa voluntad. «No quiso» preserva esa negación volitiva sin intensificarla más de lo que el griego exige.
- source_word: πιεῖν
  english_pob_choice: to drink
  chosen_spanish: beberlo
  alternatives_spanish:
  - beber
  - tomarlo
  lexicon: BDAG
  rationale: Se mantiene el infinitivo de acción como complemento de «quiso». El pronombre enclítico recupera el vino mencionado antes y evita ambigüedad.
theological_decisions:
- issue: 'χoλή en el contexto de la pasión: hiel vs. bilis/amargura'
  english_pob_reading: gall
  chosen_spanish_reading: hiel
  alternative_spanish_readings:
  - bilis
  - amargura
  rationale: La decisión inglesa conserva «gall» para respetar el término de Mateo y su posible eco escritural. En español, «hiel» es el correlato bíblico más transparente y tradicional para χολή, y preserva tanto el color lexical como la tensión de una sustancia amarga sin explicarla de más.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve lexical/theological tension rather than flatten it'
- issue: La adversativa discursiva en καὶ γευσάμενος
  english_pob_reading: but after tasting it
  chosen_spanish_reading: pero, después de probarlo
  alternative_spanish_readings:
  - y después de probarlo
  - y habiéndolo probado
  rationale: Aunque καί es coordinante, el flujo narrativo introduce contraste con la negativa siguiente. «Pero» comunica bien ese giro discursivo en español sin añadir contenido doctrinal.
  doctrine_reference: Narrative discourse rendering within optimal-equivalence
- issue: Naturaleza de la negativa de voluntad en οὐκ ἠθέλησεν
  english_pob_reading: he was unwilling
  chosen_spanish_reading: no quiso
  alternative_spanish_readings:
  - no estuvo dispuesto
  - no quiso beber
  rationale: El griego subraya voluntad, no una acción consumada de rechazo. «No quiso» mantiene esa fuerza volitiva con sobriedad y evita exagerar el matiz.
  doctrine_reference: Lexical precision over interpretive intensification
translation_notes:
  revision_awareness: El texto español se ajusta de forma directa al griego de SBLGNT y coincide sustancialmente con el trazado auditado en inglés. No se requieren revisiones adicionales; se mantiene la tensión léxica de χολή sin resolverla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa «hiel» para χολή en vez de una glosa más explicativa como «bilis» o «amargura», porque preserva mejor el eco bíblico y la especificidad léxica.
  - Se evita «Cristo» o terminología teológica no presente en el versículo.
  - «Le dieron» reproduce con naturalidad el dativo aὐτῷ sin añadir explícitamente un sujeto innecesario.
  - El pronombre «lo» en «probarlo» y «beberlo» remite con claridad al vino mencionado antes.
