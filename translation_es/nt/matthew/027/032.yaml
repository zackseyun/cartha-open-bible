translation:
  language: es
  text: Y al salir, encontraron a un hombre de Cirene llamado Simón[a]. Lo obligaron a llevar su cruz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mientras salían'. El participio griego indica una acción en curso con valor temporal.
    reason: alternative_reading
  - marker: b
    text: Es decir, la cruz de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐξερχόμενοι
  english_pob_choice: as they were going out
  chosen_spanish: al salir
  alternatives_spanish:
  - mientras salían
  - cuando salían
  lexicon: BDAG
  rationale: El participio presente con valor temporal se expresa de forma natural en español con un infinitivo introducido por 'al', manteniendo la simultaneidad con la acción principal sin volverlo pesado.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo leve. 'Y' conserva el avance del relato sin añadir contraste inexistente.
- source_word: εὗρον
  english_pob_choice: they found
  chosen_spanish: encontraron
  alternatives_spanish:
  - hallaron
  - se toparon con
  lexicon: BDAG
  rationale: El aoristo de εὑρίσκω se traduce de manera directa y natural con 'encontraron'.
- source_word: ἄνθρωπον Κυρηναῖον
  english_pob_choice: a man of Cyrene
  chosen_spanish: un hombre de Cirene
  alternatives_spanish:
  - un cireneo
  - un hombre cireneo
  lexicon: BDAG
  rationale: La expresión identifica el origen geográfico del hombre. 'De Cirene' conserva ese sentido de procedencia sin forzar un etnónimo menos transparente.
- source_word: ὀνόματι Σίμωνα
  english_pob_choice: named Simon
  chosen_spanish: llamado Simón
  alternatives_spanish:
  - de nombre Simón
  - que se llamaba Simón
  lexicon: BDAG
  rationale: El dativo con ὄνομα es una fórmula idiomática de identificación. 'Llamado Simón' es idiomático y fiel en español.
- source_word: ἠγγάρευσαν
  english_pob_choice: they compelled
  chosen_spanish: lo obligaron
  alternatives_spanish:
  - lo forzaron
  - lo presionaron a servir
  lexicon: BDAG
  rationale: ἀγγαρεύω denota imponer servicio por autoridad. 'Obligaron' comunica la coerción de forma clara y natural; 'forzaron' es posible pero algo más abrupto.
- source_word: ἵνα ἄρῃ
  english_pob_choice: to carry
  chosen_spanish: a llevar
  alternatives_spanish:
  - para que llevara
  - a cargar
  lexicon: BDAG
  rationale: En este contexto ἵνα + subjuntivo expresa propósito. El infinitivo español 'a llevar' reproduce de forma natural la finalidad. 'Llevar' es preferible a 'cargar' por ser la manera más directa de expresar el acto con la cruz.
- source_word: τὸν σταυρὸν
  english_pob_choice: cross
  chosen_spanish: su cruz
  alternatives_spanish:
  - la cruz de él
  - el madero
  lexicon: BDAG
  rationale: σταυρός se traduce normalmente por 'cruz'. El posesivo se mantiene según el pronombre griego, y en contexto se entiende que se refiere a Jesús.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de Jesús
  lexicon: BDAG
  rationale: Se conserva el pronombre posesivo del griego. En español, 'su' mantiene la misma referencia contextual sin resolverla con una sustitución explícita.
theological_decisions:
- issue: Referencia de αὐτοῦ ('su')
  english_pob_reading: The pronoun refers to Jesus, yielding 'his cross' in context.
  chosen_spanish_reading: El posesivo 'su' se entiende en contexto como la cruz de Jesús.
  alternative_spanish_readings:
  - La cruz de Jesús
  - la cruz de él
  rationale: La escena narrativa deja claro que Simón lleva la cruz del condenado, es decir, de Jesús. Se conserva la forma pronominal del griego para no sustituirla por una explicitación que el texto no da.
  doctrine_reference: Preservar la referencia contextual sin sobreexplicitar; no hay tensión doctrinal, sino una decisión de claridad textual.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente cambió ''this man'' por ''him'' para mayor naturalidad, sin alterar el referente. La versión española sigue el mismo principio: conserva el referente implícito sin añadir una explicitación innecesaria en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene 'cruz' para σταυρός, conforme al uso POB documentado.
  - Se usa 'Cirene' como topónimo y no como adjetivo étnico para conservar la identificación geográfica.
  - '''Obligaron'' refleja el valor coercitivo de ἀγγαρεύω sin introducir un matiz demasiado técnico en el texto principal.'
