base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/032.yaml
  text: And as they were going out[a], they found a man of Cyrene named Simon[b]. They compelled him to carry his cross.
  footnotes:
  - marker: a
    text: Or 'they forced' or 'they pressed into service.' The Greek verb refers to compulsory service imposed by authority.
    reason: lexical_alternative
  - marker: b
    text: That is, Jesus' cross.
    reason: alternative_reading
