translation:
  language: es
  text: 'diciendo: «Señor, nos acordamos de que ese engañador dijo mientras aún vivía[a]: “Después de tres días, yo resucito[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras aún vivía ese engañador dijo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Después de tres días, yo resucitaré» o «Después de tres días, yo seré resucitado». El griego usa un verbo en forma presente: «yo soy levantado / yo resucito».'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio presente introduce el contenido de la petición y enlaza naturalmente con el contexto inmediato; «diciendo» conserva esa relación participial en español sin añadir una coordinación innecesaria.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - sir
  lexicon: BDAG
  rationale: En este vocativo dirigido a Pilato, «Señor» reproduce el valor de respeto de κύριε y sigue la decisión auditada en inglés, sin convertirlo en un título divino en este contexto.
- source_word: ἐμνήσθημεν
  english_pob_choice: we remember
  chosen_spanish: nos acordamos
  alternatives_spanish:
  - recordamos
  - nos hemos acordado
  lexicon: BDAG
  rationale: El aoristo de μιμνῄσκομαι aquí expresa una rememoración relevante al presente. «Nos acordamos» es natural en español y conserva la vigencia de la memoria sin forzar un pasado simple.
- source_word: ἐκεῖνος
  english_pob_choice: that
  chosen_spanish: ese
  alternatives_spanish:
  - aquel
  - ese hombre
  lexicon: BDAG
  rationale: El demostrativo tiene fuerza de distanciamiento despectivo. «Ese» refleja bien esa carga en español y mantiene la referencia peyorativa.
- source_word: ὁ πλάνος
  english_pob_choice: that deceiver
  chosen_spanish: engañador
  alternatives_spanish:
  - impostor
  - seductor
  lexicon: BDAG
  rationale: πλάνος denota a quien engaña o extravía. «Engañador» comunica el insulto con claridad en español; se evita suavizarlo con «seductor» o un término menos directo.
- source_word: ἔτι ζῶν
  english_pob_choice: while he was still alive
  chosen_spanish: mientras aún vivía
  alternatives_spanish:
  - mientras estaba todavía vivo
  - aún en vida
  lexicon: BDAG
  rationale: La combinación temporal marca cuándo habló la persona respecto de su muerte. «Mientras aún vivía» es fluido y reproduce la relación temporal sin añadir elementos interpretativos.
- source_word: Μετὰ τρεῖς ἡμέρας
  english_pob_choice: After three days
  chosen_spanish: Después de tres días
  alternatives_spanish:
  - Dentro de tres días
  - Al cabo de tres días
  lexicon: BDAG
  rationale: μετά con acusativo significa «después de». Se conserva esa forma, sin armonizarla con otras expresiones cronológicas del Evangelio.
- source_word: ἐγείρομαι
  english_pob_choice: I rise / I am raised
  chosen_spanish: yo resucito
  alternatives_spanish:
  - yo me levanto
  - seré resucitado
  - soy levantado
  lexicon: BDAG
  rationale: El presente medio/pasivo de ἐγείρω en este contexto se refiere claramente a la resurrección anunciada. «Yo resucito» suena natural en español y mantiene la tensión textual entre forma verbal presente y referencia futura, sin resolverla con una futurización explícita.
theological_decisions:
- issue: Conservar la forma verbal presente de la predicción de resurrección
  english_pob_reading: After three days I rise
  chosen_spanish_reading: Después de tres días, yo resucito
  alternative_spanish_readings:
  - Después de tres días, yo soy resucitado
  - Después de tres días, yo resucitaré
  rationale: El griego usa ἐγείρομαι en presente. La versión española conserva ese valor verbal con «yo resucito», para no normalizar el dicho a un futuro que el texto no expresa. Esto preserva la tensión documental señalada en el POB inglés.
  doctrine_reference: Primacía del texto original; preservar la tensión lexical sin armonización.
translation_notes:
  revision_awareness: 'Se siguió el archivo auditado en inglés: se respetó la preferencia por el presente de ἐγείρομαι/ἐγείρω en la cita, y se mantuvo el matiz despectivo de ὁ πλάνος con un demonstrativo de distancia. También se evitó armonizar la frase temporal con lecturas más estilizadas, conservando la secuencia del griego.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε como vocativo de respeto en contexto humano, no como sustituto del nombre divino.
  - «Resucito» preserva el presente griego y no introduce futurización; la nota ofrece las alternativas auditadas.
  - «Engañador» mantiene la fuerza peyorativa de πλάνος sin suavizarla a un término más neutral.
