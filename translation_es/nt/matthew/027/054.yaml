    text: O «un hijo de Dios». La expresión griega θεοῦ υἱός carece de artículo; en este contexto, la traducción la entiende como un título coherente con la presentación de Jesús en Mateo.
    reason: alternative_reading
  revision_rationale: La revisión conserva el sentido del griego y mejora la naturalidad del español, pero sobre todo restituye la nota exegética principal del expediente POB sobre θεοῦ υἱός. Se elimina una nota secundaria no priorizada por el inglés y otra nota derivada de historial de redacción inglesa que no aporta claridad al lector español.
