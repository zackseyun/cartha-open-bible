  text: Ὁ δὲ ἑκατόνταρχος καὶ οἱ μετ’ αὐτοῦ τηροῦντες τὸν Ἰησοῦν ἰδόντες τὸν σεισμὸν καὶ τὰ ⸀γενόμενα ἐφοβήθησαν σφόδρα λέγοντες· Ἀληθῶς ⸂θεοῦ υἱὸς⸃ ἦν οὗτος.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/054.yaml
  text: Now when the centurion and those with him who were guarding Jesus saw the earthquake and the things that had happened[a], they were greatly afraid and said[c][b], “Truly this was the Son of God.”
  footnotes:
  - marker: a
    text: Or “a son of God.” The Greek expression θεοῦ υἱός lacks the article; in context, the translation takes it as a title consistent with Matthew’s presentation of Jesus.
    reason: alternative_reading
  - marker: b
    text: Or 'the centurion and those with him who were guarding Jesus'.
    reason: previous_rendering
  - marker: c
    text: Or 'those guarding Jesus with him'.
    reason: previous_rendering
