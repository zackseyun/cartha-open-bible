translation:
  language: es
  text: 'Y el centurión y los que estaban con él y custodiaban a Jesús, al ver el terremoto y las cosas que habían sucedido, tuvieron mucho miedo y dijeron: «Verdaderamente, este era Hijo de Dios[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hijo de Dios». La expresión griega θεοῦ υἱός carece de artículo; en este contexto, la traducción la entiende como un título coherente con la presentación de Jesús en Mateo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἑκατόνταρχος
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - comandante de cien
  lexicon: BDAG
  rationale: Es el equivalente natural y preciso en español para el oficial romano de cien hombres.
- source_word: τηροῦντες
  english_pob_choice: were guarding
  chosen_spanish: guardaban
  alternatives_spanish:
  - custodiaban
  - vigilaban
  lexicon: BDAG
  rationale: En el contexto de una ejecución, el verbo expresa custodia/guardia activa, no mera observación; 'guardaban' transmite bien esa función sin sonar artificial.
- source_word: ἰδόντες
  english_pob_choice: saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo se vierte con valor temporal en una construcción natural del español.
- source_word: σεισμόν
  english_pob_choice: earthquake
  chosen_spanish: terremoto
  alternatives_spanish:
  - sismo
  - temblor
  lexicon: BDAG
  rationale: Es el sentido contextual directo de σεισμός en el relato de la pasión; 'terremoto' es claro y solemne en español.
- source_word: τὰ γενόμενα
  english_pob_choice: the things that had happened
  chosen_spanish: las cosas que habían sucedido
  alternatives_spanish:
  - lo que había sucedido
  - los acontecimientos que habían ocurrido
  lexicon: BDAG
  rationale: La frase griega es amplia y plural; 'las cosas que habían sucedido' conserva esa amplitud y la referencia a los hechos extraordinarios en conjunto.
- source_word: ἐφοβήθησαν σφόδρα
  english_pob_choice: were greatly afraid
  chosen_spanish: tuvieron mucho miedo
  alternatives_spanish:
  - temieron grandemente
  - se atemorizaron mucho
  lexicon: BDAG
  rationale: La combinación verbal con el intensificador se expresa de modo idiomático en español, manteniendo la intensidad del miedo.
- source_word: Ἀληθῶς
  english_pob_choice: Truly
  chosen_spanish: Verdaderamente
  alternatives_spanish:
  - Ciertamente
  - De veras
  lexicon: BDAG
  rationale: Conserva el tono confesional y solemne de la exclamación.
- source_word: θεοῦ υἱὸς
  english_pob_choice: the Son of God
  chosen_spanish: Hijo de Dios
  alternatives_spanish:
  - un hijo de Dios
  - Hijo de Dios
  lexicon: BDAG
  rationale: Se mantiene el título cristológico en español. Dado que el griego carece de artículo, la lectura indefinida permanece como alternativa interpretativa, pero la forma titular es la más adecuada en el contexto mateano.
- source_word: οὗτος
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - él
  lexicon: BDAG
  rationale: Refleja directamente el demostrativo y conserva la inmediatez del testimonio.
theological_decisions:
- issue: Interpretación de θεοῦ υἱὸς en la confesión del centurión
  english_pob_reading: the Son of God
  chosen_spanish_reading: Hijo de Dios
  alternative_spanish_readings:
  - un hijo de Dios
  - Hijo de Dios (como título)
  rationale: En Mateo, 'Hijo de Dios' es una designación cargada cristológicamente para Jesús. Aunque la construcción griega es anartrosa y admite discusión, el contexto narrativo favorece la lectura titular; se conserva en español sin añadir el artículo para no forzar una determinación más allá de lo que el griego exige.
  doctrine_reference: Affirmations (Nicene/Chalcedonian bounds); Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, incluidas las revisiones que corrigieron la relación de 'con él' con el verbo 'guardaban', y se evitó una traducción que aislara indebidamente al centurión de su grupo.
  spanish_consistency_notes:
  - Se mantuvo 'Hijo de Dios' sin artículo para respetar el valor anartro del griego y la tensión interpretativa documentada.
  - '''Al ver'' reproduce el participio aoristo con naturalidad en español sin añadir una temporalidad más fuerte de la necesaria.'
  - '''Las cosas que habían sucedido'' conserva el alcance amplio de τὰ γενόμενα y evita reducirlo solo al terremoto.'
