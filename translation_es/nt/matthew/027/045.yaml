- from: Y desde la hora sexta hubo oscuridad sobre toda la tierra[a][b] hasta la hora novena.
  to: Desde la hora sexta hubo oscuridad sobre toda la región[a][b] hasta la hora novena.
  rationale: Se ajusta γῆ en el texto principal a una opción española que refleje mejor la decisión auditada 'land' sin convertirla en una afirmación global. También se corrige la nota lexical para preservar exactamente la alternativa documentada ('earth') y se suaviza el conector inicial para un español más natural.
