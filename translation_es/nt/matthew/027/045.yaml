translation:
  language: es
  text: Desde la hora sexta hubo oscuridad sobre toda la región[a][b] hasta la hora novena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La hora sexta es aproximadamente el mediodía, y la hora novena es aproximadamente las tres de la tarde.
    reason: cultural_note
  - marker: b
    text: O «sobre toda la tierra». La palabra griega puede significar «región/país» o «tierra» en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ
  english_pob_choice: Now from
  chosen_spanish: Y desde
  alternatives_spanish:
  - Mas desde
  - Pero desde
  lexicon: ἀπό; δέ
  rationale: ἀπό marca el punto de inicio temporal y δέ funciona como un conector leve. En español, «Y desde» conserva la secuencia narrativa sin sobrerrepresentar contraste. «Mas/pero» introducirían una oposición que el contexto no exige.
- source_word: ἕκτης ὥρας
  english_pob_choice: the sixth hour
  chosen_spanish: la hora sexta
  alternatives_spanish:
  - el mediodía
  lexicon: ἕκτος; ὥρα
  rationale: Se mantiene la expresión temporal del texto fuente para preservar la referencia judía/romana de la hora. «La hora sexta» es clara en español bíblico y evita reemplazar la medida original por su equivalente interpretativo en el cuerpo del versículo.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  lexicon: σκότος
  rationale: «Oscuridad» transmite el sentido básico y natural en español moderno. «Tinieblas» es posible, pero puede sonar más literario o tradicional; aquí «oscuridad» conserva la sobriedad del evento.
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: hubo
  alternatives_spanish:
  - vino
  - sobrevino
  - llegó a haber
  lexicon: γίνομαι
  rationale: El verbo indica el inicio de una condición. En español, «hubo oscuridad» expresa de forma idiomática la aparición de esa condición sin forzar una metáfora de movimiento que el texto no exige.
- source_word: ἐπὶ πᾶσαν τὴν γῆν
  english_pob_choice: over all the land
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra habitada
  - sobre todo el país
  - sobre toda la tierra/país
  lexicon: γῆ
  rationale: Se conserva la amplitud de γῆ con una formulación natural en español. «Tierra» puede abarcar tanto «land» como «earth»; por eso se mantiene la tensión lexical sin decidirla prematuramente en el texto principal.
- source_word: ἕως ὥρας ἐνάτης
  english_pob_choice: until the ninth hour
  chosen_spanish: hasta la hora novena
  alternatives_spanish:
  - hasta las tres de la tarde
  lexicon: ἕως; ὥρα; ἔνατος
  rationale: Se mantiene la expresión temporal original en el texto principal. La equivalencia explicativa («tres de la tarde») queda implícita como posibilidad contextual, pero no sustituye la forma fuente.
theological_decisions:
- issue: Alcance de γῆ en la oscuridad
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - tierra habitada
  - mundo
  - país
  rationale: γῆ es léxicamente amplio. «Tierra» permite conservar la ambigüedad respetando la lectura contextual restringida de «land», sin cerrar la posibilidad de una comprensión más amplia que algunos lectores ven en el pasaje.
  doctrine_reference: Preservar la tensión lexical y teológica documentada en la fuente; no resolverla sin necesidad.
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del audit trail inglés y no introduce revisiones adicionales; conserva la expresión temporal fuente y la ambigüedad de γῆ con nota, en paralelo con la POB inglesa.
  spanish_consistency_notes:
  - Se usa «hora sexta» y «hora novena» de manera consistente con el registro bíblico.
  - Se evita «SEÑOR» u այլ substituciones no pertinentes, ya que no aparecen en este versículo.
  - Se emplea «tierra» para mantener la posible amplitud de γῆ sin decidirla en el cuerpo del texto.
  - La puntuación y el orden buscan una lectura fluida en español sin perder la estructura temporal del griego.
