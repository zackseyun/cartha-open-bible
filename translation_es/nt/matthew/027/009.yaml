    unchanged: false
    changes_summary: Revised “priced” to “valued” for more natural formal English, removed “some of” because it is not in the Greek, and rendered ἀπὸ υἱῶν Ἰσραήλ as “from among the sons of Israel” more completely.
translation:
  language: es
  text: 'Entonces se cumplió lo que fue dicho por medio de Jeremías el profeta[a], diciendo: «Y tomaron las treinta piezas de plata, el precio del que había sido valorado, a quien valoraron de entre los hijos de Israel[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Mateo atribuye esta palabra profética a Jeremías. La redacción se aproxima más estrechamente a Zacarías 11:12–13, y los intérpretes la explican de diversas maneras: cita compuesta, referencia a una colección profética o problema textual en la transmisión.'
    reason: textual_variant
  - marker: b
    text: 'O: «de los hijos de Israel». El griego ἀπό aquí es difícil, y puede expresar un matiz partitivo o de procedencia dentro del grupo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Adverbio temporal de secuencia narrativa; «Entonces» es natural en español y conserva la progresión del relato.
- source_word: ἐπληρώθη
  english_pob_choice: was fulfilled
  chosen_spanish: se cumplió
  alternatives_spanish:
  - fue cumplido
  - llegó a cumplirse
  lexicon: BDAG
  rationale: En fórmulas mateanas de cumplimiento, «se cumplió» es una equivalencia directa y fluida que preserva la voz pasiva/reflexiva del griego.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que fue dicho
  alternatives_spanish:
  - lo dicho
  - aquello que fue dicho
  lexicon: BDAG
  rationale: El participio articular se vierte de modo idiomático como una cláusula nominal que conserva la referencia a una palabra previa pronunciada.
- source_word: διὰ Ἰερεμίου τοῦ προφήτου
  english_pob_choice: through Jeremiah the prophet
  chosen_spanish: por medio de Jeremías el profeta
  alternatives_spanish:
  - por Jeremías el profeta
  - a través de Jeremías el profeta
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación/agencia; «por medio de» preserva esa mediación profética sin forzar una construcción poco natural.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - al decir
  lexicon: BDAG
  rationale: Introducción convencional de la cita; «diciendo» mantiene la relación sintáctica con la fórmula de cita.
- source_word: ἔλαβον
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  - se llevaron
  lexicon: BDAG
  rationale: Aquí λαμβάνω en la cita suena con fuerza de «tomar/recibir»; «tomaron» conserva el eco verbal y la conexión con la cita bíblica.
- source_word: τὰ τριάκοντα ἀργύρια
  english_pob_choice: the thirty pieces of silver
  chosen_spanish: las treinta piezas de plata
  alternatives_spanish:
  - los treinta siclos de plata
  - las treinta monedas de plata
  lexicon: BDAG
  rationale: «Piezas de plata» es una equivalencia clara y tradicional para ἀργύρια, manteniendo el valor monetario sin reducirlo a una moneda moderna específica.
- source_word: τὴν τιμὴν
  english_pob_choice: the price
  chosen_spanish: el precio
  alternatives_spanish:
  - el valor
  - la tasación
  lexicon: BDAG
  rationale: En este contexto comercial/jurídico, τιμή tiene fuerza de «precio»; «precio» conserva la concreción y el tono irónico de la cita.
- source_word: τοῦ τετιμημένου
  english_pob_choice: of the one who had been valued
  chosen_spanish: del que había sido valorado
  alternatives_spanish:
  - del que había sido estimado
  - del que había sido tasado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de τιμάω conserva la idea de una valoración/tasación hecha sobre una persona; «valorado» mantiene la relación léxica con el verbo siguiente.
- source_word: ὃν ἐτιμήσαντο
  english_pob_choice: whom they valued
  chosen_spanish: a quien valoraron
  alternatives_spanish:
  - a quien tasaron
  - a quien estimaron
  lexicon: BDAG
  rationale: Se mantiene la repetición de la raíz τιμάω con «valoraron», reflejando la continuidad léxica del griego y la ironía de la cita.
- source_word: ἀπὸ υἱῶν Ἰσραήλ
  english_pob_choice: from among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - de entre los hijos de Israel
  - a partir de los hijos de Israel
  lexicon: BDAG
  rationale: ἀπό aquí admite un matiz partitivo; «entre» expresa de forma natural que la acción ocurrió dentro del grupo de Israel, sin añadir ‘algunos’ que no está en el griego.
theological_decisions:
- issue: Atribución profética a Jeremías aunque la redacción se parece a Zacarías 11:12–13
  english_pob_reading: Retain the explicit text as 'Jeremiah the prophet' in the main text without harmonization.
  chosen_spanish_reading: Conservar explícitamente «Jeremías el profeta» en el texto principal sin armonizarlo con Zacarías.
  alternative_spanish_readings:
  - Sustituir por Zacarías para armonizar
  - Añadir una corrección interpretativa en el texto
  rationale: La traducción debe representar el griego tal como está y no resolver en el cuerpo del texto la cuestión histórica/textual de la atribución. La tensión debe permanecer visible, no suavizada.
  doctrine_reference: 'Principio POB: primacía del original y preservación de tensiones textuales; no armonización traductiva.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que descartó una glosa equivalente a «algunos» por no estar en el griego y que prefirió una formulación más completa para ἀπὸ υἱῶν Ἰσραήλ. En español se mantuvo la tensión textual, pero sin introducir una cuantificación no explícita; se optó por «entre los hijos de Israel» como solución natural para el matiz partitivo/procedencial.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «hijos de Israel» conforme al valor gramatical del griego y al patrón POB para υἱοί en expresiones étnicas.
  - La repetición de la raíz τιμάω se conserva con «valorado/valoraron» para transparentar el juego léxico.
  - La puntuación de cita española emplea comillas angulares, con el versículo en una sola oración fluida y apta para publicación.
