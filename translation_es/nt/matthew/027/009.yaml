source:
  edition: SBLGNT
  text: τότε ἐπληρώθη τὸ ῥηθὲν διὰ Ἰερεμίου τοῦ προφήτου λέγοντος· Καὶ ἔλαβον τὰ τριάκοντα ἀργύρια, τὴν τιμὴν τοῦ τετιμημένου ὃν ἐτιμήσαντο ἀπὸ υἱῶν Ἰσραήλ,
base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/009.yaml
  text: Then what was spoken through Jeremiah the prophet was fulfilled[a], saying, ‘And they took the thirty pieces of silver, the price of the one who had been valued[b], whom they valued from among the sons of Israel,’
  footnotes:
  - marker: a
    text: Matthew attributes this prophetic word to Jeremiah. The wording most closely parallels Zechariah 11:12–13, and interpreters variously explain this as a composite citation, a reference to a prophetic collection, or a textual problem in transmission.
    reason: textual_variant
  - marker: b
    text: Or 'from the sons of Israel'; the Greek phrase is difficult, and 'some of the sons of Israel' reflects a likely partitive sense.
    reason: lexical_alternative
