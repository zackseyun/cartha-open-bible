translation:
  language: es
  text: 'Y colocaron encima de su cabeza la acusación contra él[a] escrita: «Este es Jesús[b], el Rey de los judíos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cargo contra él». El griego αἰτίαν tiene aquí un sentido judicial.
    reason: lexical_alternative
  - marker: b
    text: O «el Rey de los judeanos». El griego Ἰουδαίων puede significar «judíos» o «judeanos», según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέθηκαν
  english_pob_choice: they placed
  chosen_spanish: colocaron
  alternatives_spanish:
  - pusieron
  - colocaron arriba
  lexicon: BDAG
  rationale: El verbo griego indica la acción concreta de poner o colocar físicamente la inscripción. «Colocaron» suena natural en español actual y conserva esa concreción sin sobreinterpretar.
- source_word: ἐπάνω τῆς κεφαλῆς αὐτοῦ
  english_pob_choice: above his head
  chosen_spanish: encima de su cabeza
  alternatives_spanish:
  - sobre su cabeza
  - arriba de su cabeza
  lexicon: BDAG
  rationale: La preposición con genitivo expresa posición superior. «Encima de su cabeza» comunica con claridad la ubicación del letrero sin el posible malentendido de «sobre su cabeza» en español coloquial.
- source_word: τὴν αἰτίαν αὐτοῦ
  english_pob_choice: the charge against him
  chosen_spanish: la acusación
  alternatives_spanish:
  - la acusación contra él
  - el cargo contra él
  lexicon: BDAG
  rationale: En contexto judicial αἰτία tiene fuerza de acusación o cargo. En español, «la acusación» es natural y conserva el sentido legal; la relación con Jesús queda suficientemente dada por el contexto inmediato y por la nota.
- source_word: γεγραμμένην
  english_pob_choice: written
  chosen_spanish: escrita
  alternatives_spanish:
  - inscrita
  - redactada
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe la acusación como texto ya escrito. «Escrita» es la opción más directa y fiel en español.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este es el que es
  - Éste es
  lexicon: BDAG
  rationale: La construcción demostrativa más verbo copulativo se vierte de modo directo como «Este es», que reproduce bien el tono de la inscripción.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ὁ βασιλεὺς τῶν Ἰουδαίων
  english_pob_choice: the King of the Jews
  chosen_spanish: el Rey de los judíos
  alternatives_spanish:
  - el Rey de los Judeanos
  lexicon: BDAG
  rationale: βασιλεύς aquí es título real, por eso se traduce «Rey» con mayúscula titulativa. Para Ἰουδαίων, el sentido tradicional y contextual en la fórmula de la pasión es «judíos»; se mantiene la alternativa «Judeanos» en nota por la posibilidad semántica del etnónimo griego.
theological_decisions:
- issue: Valor judicial de αἰτία en la inscripción de la cruz
  english_pob_reading: the charge against him
  chosen_spanish_reading: la acusación
  alternative_spanish_readings:
  - la acusación contra él
  - el cargo contra él
  rationale: La inscripción funciona como motivo formal de ejecución, por lo que conviene conservar la fuerza legal sin añadir explicaciones. «La acusación» expresa ese valor judicial de forma breve y natural en español.
  doctrine_reference: Mateo 27:37; Juan 19:19-20
- issue: Sentido de Ἰουδαίων en el título
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los Judeanos
  rationale: En esta fórmula fija de la pasión, «los judíos» preserva el referente tradicional del pasaje y la sonoridad del letrero. La alternativa «Judeanos» se conserva por rigor semántico, ya que Ἰουδαῖος puede significar «judeano» según el contexto.
  doctrine_reference: Mateo 27:37; Juan 19:19
- issue: Mantenimiento del tono de inscripción pública
  english_pob_reading: 'written: “This is Jesus, the King of the Jews.”'
  chosen_spanish_reading: 'escrita: «Este es Jesús, el Rey de los judíos»'
  alternative_spanish_readings:
  - 'escrita: «Este es Jesús, Rey de los judíos»'
  rationale: La puntuación con dos puntos y comillas reproduce el carácter de rótulo o cartel oficial. Se mantiene el artículo en «el Rey» porque el griego lo expresa y en español suena natural en una titulatura pública.
  doctrine_reference: Mateo 27:37
translation_notes:
  revision_awareness: El pasaje no muestra revisiones sustantivas en el audit trail más reciente; la versión inglesa permanece sin cambios tras la última revisión y el control cruzado reporta alta concordancia. Por eso la propuesta española sigue de cerca las decisiones léxicas ya aprobadas, preservando el valor judicial de αἰτία y la ambigüedad contextual de Ἰουδαίων en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún nombre divino.
  - «Jesús» se mantiene como nombre propio estándar sin variación.
  - «Rey» conserva mayúscula titulativa por tratarse de un letrero oficial.
  - La frase «los judíos» sigue la fórmula tradicional de la pasión, mientras la nota preserva la alternativa semántica «Judeanos».
  - La colocación de la nota [a] en «acusación» y de [b] en «Jesús» coincide con las decisiones léxicas del audit trail.
