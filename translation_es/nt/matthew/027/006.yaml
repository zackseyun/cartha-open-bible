translation:
  language: es
  text: 'Pero los principales sacerdotes, tomando las piezas de plata, dijeron: «No es lícito echarlas en el tesoro del templo[a], porque es precio de sangre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego κορβανᾶν (Corbán), término que se refiere al tesoro del templo o a fondos sagrados.
    reason: lexical_alternative
  - marker: b
    text: O «dinero de sangre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: En plural, el término designa a la autoridad sacerdotal superior. «Principales sacerdotes» conserva esa función y resulta natural en español, evitando una fórmula demasiado técnica o una sobreinterpretación jerárquica.
- source_word: λαβόντες
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - después de tomar
  lexicon: BDAG
  rationale: El participio aoristo expresa acción concomitante o anterior. «Tomando» mantiene la secuencia natural en español sin forzar una construcción más pesada.
- source_word: τὰ ἀργύρια
  english_pob_choice: the silver pieces
  chosen_spanish: las piezas de plata
  alternatives_spanish:
  - la plata
  - el dinero
  - las monedas de plata
  lexicon: BDAG
  rationale: El contexto remite al pago en plata mencionado antes. «Piezas de plata» conserva el sentido concreto del metal como pago y evita especificar una moneda que el griego no nombra.
- source_word: Οὐκ ἔξεστιν
  english_pob_choice: It is not lawful
  chosen_spanish: No es lícito
  alternatives_spanish:
  - No está permitido
  - No se puede
  lexicon: BDAG
  rationale: La expresión apunta a prohibición en términos de conveniencia religiosa/legal. «No es lícito» reproduce bien ese matiz formal y coincide con el tono de los sacerdotes.
- source_word: βαλεῖν
  english_pob_choice: to put
  chosen_spanish: echarlas
  alternatives_spanish:
  - ponerlas
  - arrojarlas
  lexicon: BDAG
  rationale: Aunque el verbo griego puede significar «arrojar», aquí se usa para depositar dinero. «Echarlas» suena natural en español y conserva el gesto de introducirlas en un recipiente o fondo.
- source_word: κορβανᾶν
  english_pob_choice: the temple treasury
  chosen_spanish: el tesoro del templo
  alternatives_spanish:
  - el tesoro sagrado
  - el Corbán
  - el depósito del templo
  lexicon: BDAG
  rationale: El término señala el depósito sagrado del templo. «Tesoro del templo» comunica el referente sin perder la asociación cultual; se preserva en nota la forma tradicional transliterada.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la razón de la prohibición. «Porque» es la conexión causal más natural en español en este contexto, sin añadir énfasis innecesario.
- source_word: τιμὴ αἵματός
  english_pob_choice: the price of blood
  chosen_spanish: precio de sangre
  alternatives_spanish:
  - dinero de sangre
  - precio por sangre derramada
  lexicon: BDAG
  rationale: La frase griega es breve y fuerte. «Precio de sangre» mantiene la construcción nominal y la tensión semántica entre valor y culpa, sin suavizarla con una paráfrasis más explicativa.
theological_decisions:
- issue: Cómo rendir κορβανᾶν sin ocultar la referencia al fondo sagrado del templo
  english_pob_reading: the temple treasury
  chosen_spanish_reading: el tesoro del templo
  alternative_spanish_readings:
  - el tesoro sagrado
  - el Corbán
  rationale: La escena trata de fondos vinculados al templo y de su uso considerado impropio. «Tesoro del templo» hace visible ese marco cultual; la nota preserva la alternativa transliterada para quien busque el término tradicional.
  doctrine_reference: 'Translation philosophy: readable modern Spanish, with source-traceable alternatives preserved in notes.'
- issue: Cómo tratar la frase τιμὴ αἵματός ἐστιν sin borrar su carga ética
  english_pob_reading: they are the price of blood
  chosen_spanish_reading: es precio de sangre
  alternative_spanish_readings:
  - es dinero de sangre
  - es el precio de la sangre
  rationale: 'La formulación mantiene la concisión del griego y la acusación implícita: el dinero está manchado por la muerte de Jesús. «Precio de sangre» conserva la ambigüedad productiva entre costo y culpa; la nota ofrece la lectura idiomática alternativa.'
  doctrine_reference: 'Doctrinal neutrality: preserve the ethical force of the source text without over-expanding into commentary.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés. Se mantuvo la estructura narrativa, el matiz jurídico de «No es lícito», la referencia cultual de κορβανᾶν con traducción explicativa, y la expresión nominal breve de «precio de sangre» sin diluirla.
  spanish_consistency_notes:
  - Se usa «principales sacerdotes» para ἀρχιερεῖς, en armonía con el plural de autoridad sacerdotal.
  - «Tesoro del templo» evita el transliterado en el cuerpo principal pero lo conserva en nota por fidelidad auditada.
  - «Precio de sangre» mantiene la dureza del original y no la sustituye por una explicación interpretativa en el texto principal.
  - La puntuación española y el uso de comillas angulares se ajustan a norma editorial, sin alterar el contenido fuente.
