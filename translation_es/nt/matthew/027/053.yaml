translation:
  language: es
  text: Y saliendo de los sepulcros después de su resurrección[a], entraron en la ciudad santa[b] y aparecieron a muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más fluida: «Y salieron de los sepulcros después de su resurrección, entraron en la ciudad santa y aparecieron a muchos». El griego coloca «después de su resurrección» entre «de los sepulcros» y «entraron».'
    reason: alternative_reading
  - marker: b
    text: «La ciudad santa» se refiere a Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: ἐξελθόντες
  english_pob_choice: coming out
  chosen_spanish: saliendo
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo se conserva como acción subordinada al verbo principal. «Saliendo» suena natural en español y mantiene la relación temporal sin añadir una reestructuración excesiva.
- source_word: μνημείων
  english_pob_choice: tombs
  chosen_spanish: sepulcros
  alternatives_spanish:
  - tumbas
  - sepulcros funerarios
  lexicon: BDAG
  rationale: En este contexto, μνημεῖον designa un lugar de entierro. «Sepulcros» es claro en español bíblico y comunica el sentido de lugar funerario con dignidad; «tumbas» es posible, pero menos solemne.
- source_word: μετὰ τὴν ἔγερσιν αὐτοῦ
  english_pob_choice: after his resurrection
  chosen_spanish: después de su resurrección
  alternatives_spanish:
  - después de que resucitó
  - después de que fue levantado
  lexicon: BDAG
  rationale: μετά con acusativo expresa secuencia temporal. «Después de su resurrección» reproduce bien el valor temporal y evita interpretar de más el referente de αὐτοῦ, que el contexto identifica como Jesús.
- source_word: εἰσῆλθον
  english_pob_choice: they entered
  chosen_spanish: entraron
  alternatives_spanish:
  - ingresaron
  - se metieron
  lexicon: BDAG
  rationale: El verbo narrativo simple se traduce de forma directa y natural con «entraron».
- source_word: τὴν ἁγίαν πόλιν
  english_pob_choice: the holy city
  chosen_spanish: la ciudad santa
  alternatives_spanish:
  - la ciudad sagrada
  - la santa ciudad
  lexicon: BDAG
  rationale: La expresión tradicional bíblica para Jerusalén se conserva como «la ciudad santa», sin explicitar el nombre en el texto principal, tal como hace el inglés POB.
- source_word: ἐνεφανίσθησαν
  english_pob_choice: appeared
  chosen_spanish: se aparecieron
  alternatives_spanish:
  - aparecieron
  - fueron vistos
  lexicon: BDAG
  rationale: El pasivo comunica que llegaron a ser visibles para otros. «Se aparecieron» refleja esa visibilidad manifestada de manera más concreta que un simple «aparecieron».
- source_word: πολλοῖς
  english_pob_choice: to many
  chosen_spanish: a muchos
  alternatives_spanish:
  - ante muchos
  - a mucha gente
  lexicon: BDAG
  rationale: El dativo plural se expresa de manera sobria con «a muchos», que sigue de cerca el griego y es idiomático en español.
theological_decisions:
- issue: Relación entre la salida de los sepulcros y el momento de la resurrección de Jesús
  english_pob_reading: 'The English POB preserves the Greek sequence: coming out of the tombs after his resurrection, then entering the holy city and appearing to many, without smoothing the timing tension.'
  chosen_spanish_reading: 'La frase mantiene la secuencia temporal: salieron de los sepulcros después de su resurrección, luego entraron en la ciudad santa y se aparecieron a muchos.'
  alternative_spanish_readings:
  - Y después de su resurrección salieron de los sepulcros y entraron en la ciudad santa, apareciéndose a muchos.
  - Y salieron de los sepulcros, después de su resurrección, entraron en la ciudad santa y se aparecieron a muchos.
  rationale: El griego coloca la expresión temporal después de «saliendo de los sepulcros». La redacción española conserva ese orden y la relación temporal sin resolver ni ampliar la tensión narrativa del texto.
  doctrine_reference: Mantener la secuencia del texto sin armonización interpretativa adicional.
translation_notes:
  revision_awareness: 'El contexto inglés muestra una revisión reciente que simplifica la sintaxis sin cambiar el contenido: se evita una doble marca temporal innecesaria en inglés, pero se preserva el orden del griego. La versión española sigue esa misma lógica de naturalidad sin perder la dependencia del participio.'
  spanish_consistency_notes:
  - Se usa «sepulcros» para μνημεῖα en coherencia con el registro bíblico y con la decisión inglesa de 'tombs'.
  - Se mantiene «ciudad santa» como fórmula estable para Jerusalén.
  - No se introduce «Cristo» ni «SEÑOR»; el versículo no contiene esos términos.
  - La traducción conserva el orden temporal del griego sin agregar conectores interpretativos.
  - «Se aparecieron» expresa la manifestación visible del pasivo mejor que una forma puramente estática.
