    text: 'O, de forma más fluida: «Y salieron de los sepulcros después de su resurrección, entraron en la ciudad santa y aparecieron a muchos». El griego coloca «después de su resurrección» entre «de los sepulcros» y «entraron».'
    reason: alternative_reading
  - marker: b
    text: «La ciudad santa» se refiere a Jerusalén.
    reason: cross_reference
  revision_rationale: Se reemplaza «se aparecieron» por «aparecieron» para reflejar mejor ἐνεφανίσθησαν en español natural y conservar el sentido narrativo de hacerse visibles a muchas personas. Se añaden las notas más útiles ya respaldadas por la auditoría inglesa, adaptadas idiomáticamente al español.
