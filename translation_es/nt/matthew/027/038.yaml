translation:
  language: es
  text: Entonces son crucificados con él[a] dos ladrones, uno a la derecha y uno a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandidos»; el término griego puede referirse a ladrones violentos y, en algunos contextos, coincidir con actividad insurgente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural en español bíblico moderno y conserva la relación temporal sin añadir explicación.
- source_word: σταυροῦνται
  english_pob_choice: are crucified
  chosen_spanish: crucifican
  alternatives_spanish:
  - son crucificados
  - están siendo crucificados
  lexicon: BDAG
  rationale: El presente pasivo narrativo griego puede conservarse en español con presente histórico; «crucifican» mantiene vivacidad y evita una perífrasis pesada, aunque el sujeto implícito queda impersonal en español.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con él mismo
  lexicon: BDAG
  rationale: σύν con dativo expresa acompañamiento. «Con él» es la equivalencia más directa y natural en español.
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: BDAG
  rationale: Número cardinal directo que modifica a λῃσταί.
- source_word: λῃσταί
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - salteadores
  - bandoleros
  - bandidos
  lexicon: BDAG
  rationale: La POB inglesa optó por «robbers» como opción general; en español, «ladrones» es el equivalente más transparente y público. «Salteadores» o «bandoleros» pueden sonar más literarios o regionales. No se introduce la lectura política de «insurgentes» porque el verso no la exige.
- source_word: εἷς ἐκ δεξιῶν
  english_pob_choice: one on the right
  chosen_spanish: uno a la derecha
  alternatives_spanish:
  - uno a su derecha
  - uno del lado derecho
  lexicon: BDAG
  rationale: La expresión idiomática señala posición, no procedencia. «A la derecha» comunica con claridad la ubicación espacial en español.
- source_word: εἷς ἐξ εὐωνύμων
  english_pob_choice: one on the left
  chosen_spanish: uno a la izquierda
  alternatives_spanish:
  - uno del lado izquierdo
  - uno a su izquierda
  lexicon: BDAG
  rationale: Se mantiene el contraste simétrico con δεξιῶν. «A la izquierda» es la forma natural y fiel al sentido posicional.
theological_decisions:
- issue: Sentido de λῃσταί y posible sobrelectura política
  english_pob_reading: Rendered as 'robbers' without importing a more specific political meaning.
  chosen_spanish_reading: «ladrones» sin convertirlos en «insurgentes» o «revolucionarios».
  alternative_spanish_readings:
  - bandidos
  - bandoleros
  - insurgentes
  rationale: El término puede abarcar violencia y, en algunos contextos, actividad insurgente, pero este versículo por sí solo no obliga a esa precisión histórica. La traducción evita importar una reconstrucción no explicitada en el texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; no importar afirmaciones históricas o doctrinales que el texto no expresa.'
translation_notes:
  revision_awareness: Se siguió el contexto auditado de la POB inglesa, que mantiene la secuencia narrativa y evita sobreespecificar λῃσταί. No hubo revisiones aplicadas en el registro inglés, y la decisión española conserva esa cautela semántica.
  spanish_consistency_notes:
  - Se mantiene «él» para αὐτῷ, sin introducir el nombre de Jesús porque el verso no lo repite.
  - «Entonces» preserva la progresión narrativa inmediata.
  - Se conserva el paralelismo espacial «a la derecha / a la izquierda» como equivalencia idiomática clara.
  - La nota a pie de página acompaña solo a «ladrones» porque ahí reside la alternativa léxica relevante.
