  rationale: Se revisa «crucifican» a «son crucificados» para reflejar fielmente el pasivo griego y la decisión documentada de la POB inglesa. Se mantiene «ladrones» como equivalente principal de λῃσταί y se conserva la nota alternativa con una redacción más natural en español.
