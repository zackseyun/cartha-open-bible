  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia narrativa, el acompañamiento con Jesús, el número de personas y la ubicación espacial a derecha e izquierda. Sin embargo, «crucifican» en voz activa/impersonal no preserva con suficiente precisión el pasivo griego σταυροῦνται, que la auditoría inglesa representó explícitamente como «are crucified».
  spanish_quality_summary: El español es claro y natural, pero «Entonces crucifican con él a dos ladrones» suena menos cuidado y más indefinido que el original; «son crucificados» o «crucifican...?» en impersonal cambia el foco. La opción revisada mejora fidelidad y dignidad sin perder legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ladrones» es aceptable para λῃσταί y la nota conserva la alternativa «bandidos» con la cautela sobre posible solapamiento insurgente, en línea con la POB inglesa.
  issues:
  - severity: medium
    issue: La voz verbal no conserva el pasivo de σταυροῦνται.
    rationale: 'El griego usa presente pasivo indicativo: «son crucificados / están siendo crucificados». El español «crucifican» introduce una construcción activa impersonal que desplaza el énfasis del padecimiento de los dos hombres y se aparta de la decisión auditada en inglés.'
  - severity: low
    issue: La nota léxica usa «solaparse», que suena algo técnica.
    rationale: No es incorrecto, pero «coincidir» o «relacionarse» sería más natural para lectura eclesial amplia. Aun así, el problema es menor y puede ajustarse con una leve mejora estilística.
  revised_spanish_text: Entonces son crucificados con él[a] dos ladrones, uno a la derecha y uno a la izquierda.
  revised_footnotes:
  - marker: a
    text: O «bandidos»; el término griego puede referirse a ladrones violentos y, en algunos contextos, coincidir con actividad insurgente.
    reason: lexical_alternative
