translation:
  language: es
  text: 'Entonces Pilato le dice: «¿No oyes de cuántas cosas dan testimonio contra ti?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «testifican contra ti» o «dan testimonio en tu contra». El verbo griego tiene un sentido legal o forense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces mismo
  lexicon: BDAG
  rationale: Marca secuencia narrativa inmediata; «Entonces» es natural en español y conserva el avance del relato sin añadir matices temporales no presentes.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dice ahora
  - dijo
  lexicon: BDAG
  rationale: El presente histórico griego se refleja bien con «dice», que mantiene la vivacidad narrativa. «Dijo» suavizaría esa forma verbal del original.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre dativo se expresa de manera natural con «le»; el referente se entiende por el contexto sin expandirlo en el texto principal.
- source_word: ὁ Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - el Pilato
  lexicon: BDAG
  rationale: Nombre propio en español sin artículo; corresponde al uso normal y evita una construcción ajena al idioma.
- source_word: Οὐκ ἀκούεις
  english_pob_choice: Do you not hear
  chosen_spanish: ¿No oyes
  alternatives_spanish:
  - ¿No escuchas
  - ¿Acaso no oyes
  lexicon: BDAG
  rationale: «ἀκούω» aquí es oír/escuchar en sentido básico. «Oyes» conserva la pregunta negativa y su tono directo; «escuchas» sería posible, pero menos literal en este contexto.
- source_word: πόσα
  english_pob_choice: how many things
  chosen_spanish: cuántas cosas
  alternatives_spanish:
  - cuántas acusaciones
  - cuántos cargos
  lexicon: BDAG
  rationale: El neutro plural pregunta por la cantidad de asuntos alegados. «Cuántas cosas» sigue de cerca el alcance del griego sin interpretar explícitamente como «cargos» o «acusaciones».
- source_word: σου
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - en tu contra
  - sobre ti
  lexicon: BDAG
  rationale: En combinación con καταμαρτυροῦσιν, el genitivo tiene sentido adversativo. «Contra ti» expresa con claridad la relación forense sin sobretraducir.
- source_word: καταμαρτυροῦσιν
  english_pob_choice: they are testifying against you
  chosen_spanish: testifican contra ti
  alternatives_spanish:
  - dan testimonio contra ti
  - deponen contra ti
  - acusan
  lexicon: BDAG
  rationale: El verbo tiene un matiz legal-forense de testificar en contra. «Testifican contra ti» mantiene ese valor sin reducirlo al más general «acusan», que interpreta más de lo que dice el griego.
theological_decisions:
- issue: Valor forense de la acusación contra Jesús
  english_pob_reading: The Greek verb has a legal-forensic sense.
  chosen_spanish_reading: Se conserva el matiz judicial con «testifican contra ti».
  alternative_spanish_readings:
  - «acusan contra ti»
  - «dan testimonio en tu contra»
  rationale: La escena es judicial; el español debe reflejar el carácter testimonial de καταμαρτυρέω. «Testifican» preserva la evidencia verbal/legal sin convertir el verbo en una acusación directa que el texto no formula.
  doctrine_reference: Pasión de Jesús; proceso judicial en los Evangelios
- issue: Presente histórico narrativo
  english_pob_reading: The Greek present tense is preserved as 'says'.
  chosen_spanish_reading: Se mantiene con «dice».
  alternative_spanish_readings:
  - «dijo»
  rationale: El presente histórico comunica la inmediatez del relato y sigue de cerca la forma verbal griega; no implica una doctrina, pero sí una decisión de fidelidad narrativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Sin cambios respecto al sentido base del texto griego y del análisis auditado en inglés; la versión española conserva la secuencia narrativa, el presente histórico y el matiz forense de la pregunta de Pilato.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Pilato» sin artículo, conforme al uso natural del español.
  - «Testifican contra ti» evita el término más fuerte «acusan», preservando la tensión lexical del verbo griego.
  - La pregunta se formula con «¿No oyes...?» para reflejar el interrogativo negativo del original sin añadir una glosa interpretativa.
