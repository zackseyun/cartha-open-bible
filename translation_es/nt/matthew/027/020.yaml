revisions:
- from: Pero los principales sacerdotes y los ancianos persuadieron a las multitudes para que pidieran a Barrabás[a], pero para destruir a Jesús.
  to: Pero los principales sacerdotes y los ancianos persuadieron a las multitudes para que pidieran a Barrabás[a], pero destruyeran a Jesús.
  rationale: Se conserva la decisión léxica clave «destruyeran» para ἀπολέσωσιν, en línea con el POB inglés, pero se corrige la sintaxis española para que la segunda acción coordinada dependa naturalmente de «para que». También se mejora la nota alternativa a una expresión española más idiomática y clara para el contexto de ejecución judicial. El segundo «pero» mantiene el contraste de δέ, aunque ahora en una estructura gramatical aceptable en español.
