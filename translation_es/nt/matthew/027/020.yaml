translation:
  language: es
  text: Pero los principales sacerdotes y los ancianos persuadieron a las multitudes para que pidieran a Barrabás[a], pero destruyeran a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «dieran muerte a Jesús».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes sacerdotales
  lexicon: BDAG
  rationale: La expresión griega designa al liderazgo sacerdotal de Jerusalén; en español, «principales sacerdotes» conserva ese sentido colectivo sin sugerir erróneamente un solo cargo.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: BDAG
  rationale: «Ancianos» es el equivalente histórico e institucional más natural en contexto judío y mantiene la paridad con el texto fuente.
- source_word: ἔπεισαν
  english_pob_choice: persuaded
  chosen_spanish: persuadieron
  alternatives_spanish:
  - convencieron
  - indujeron
  lexicon: BDAG
  rationale: El aoristo presenta una acción completada; «persuadieron» reproduce con precisión la fuerza del verbo sin sobreinterpretar el medio de influencia.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a las turbas
  - a la gente
  lexicon: BDAG
  rationale: El plural griego subraya grupos reunidos; «multitudes» conserva esa pluralidad y el matiz de agrupación masiva mejor que un singular colectivo.
- source_word: αἰτήσωνται
  english_pob_choice: ask for
  chosen_spanish: pidieran
  alternatives_spanish:
  - solicitaran
  - requirieran
  lexicon: BDAG
  rationale: Tras un verbo de persuasión, el subjuntivo de finalidad/contenido se expresa naturalmente en español con una cláusula final; «pidieran» comunica la idea de solicitar para sí de forma idiomática. La nota mantiene la alternativa lexical de «pedir por / pedir para» implícita en el griego medio.
- source_word: Βαραββᾶν
  english_pob_choice: Barabbas
  chosen_spanish: Barrabás
  alternatives_spanish:
  - Barabás
  lexicon: Convención onomástica española
  rationale: Se usa la forma consagrada en español bíblico «Barrabás», que es la transliteración habitual y plenamente reconocible para los lectores.
- source_word: ἀπολέσωσιν
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - hacer morir
  - quitar la vida a
  lexicon: BDAG
  rationale: «Destruir» preserva el valor léxico amplio de ἀπόλλυμι, tal como lo hace la traducción inglesa POB, sin reducirlo prematuramente a un término técnico de ejecución.
- source_word: τὸν δὲ Ἰησοῦν
  english_pob_choice: but Jesus
  chosen_spanish: pero a Jesús
  alternatives_spanish:
  - y a Jesús
  - mientras que a Jesús
  lexicon: BDAG
  rationale: El δέ adversativo introduce contraste entre Barrabás y Jesús; en español, «pero a Jesús» mantiene esa oposición y, con la preposición «a», respeta la sintaxis del objeto directo personal.
theological_decisions:
- issue: Sentido de ἀπολέσωσιν en un contexto judicial de ejecución
  english_pob_reading: destroy Jesus
  chosen_spanish_reading: destruir a Jesús
  alternative_spanish_readings:
  - hacer morir a Jesús
  - matar a Jesús
  rationale: La forma verbal griega es más amplia que un tecnicismo legal y literalmente significa causar la destrucción o perdición de alguien. Se conserva ese relieve léxico en el texto principal; las alternativas en español reflejan la lectura ejecución/sentencia sin sustituirla en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor adversativo de δέ en la segunda mitad del verso
  english_pob_reading: but to destroy Jesus
  chosen_spanish_reading: pero a Jesús
  alternative_spanish_readings:
  - y a Jesús
  - mientras que a Jesús
  rationale: El segundo δέ refuerza la oposición entre las dos peticiones. «Pero» reproduce con claridad ese contraste narrativo y evita suavizar la tensión entre ambos objetos de la persuasión.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y que el acuerdo con el texto fuente es alto; por ello se mantiene una solución estable que conserva la fuerza léxica de ἀπόλλυμι y la oposición marcada por δέ sin añadir glosas innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Barrabás» para Βαραββᾶν según la convención onomástica española.
  - Se evita «SEÑOR» u otros sustitutos teológicos porque no aparece el Tetragrámaton ni κύριος en este versículo.
  - «Destruir» se conserva como traducción principal de ἀπόλλυμι para respetar la amplitud léxica documentada en el audit trail.
  - La estructura con dos infinitivos finales en español se evita en favor de una cláusula subordinada más natural y precisa en castellano contemporáneo.
