review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: contraste adversativo, sujetos institucionales correctos, plural de «crowds», petición de Barrabás y destrucción/muerte de Jesús. Sin embargo, la redacción española «pero para destruir a Jesús» suena poco natural y no representa con buena fluidez la construcción coordinada de ἵνα + subjuntivos. También conviene mejorar la alternativa de nota para que suene idiomática en español judicial/narrativo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una torpeza sintáctica importante en la segunda mitad. «Persuadieron a las multitudes para que pidieran a Barrabás, pero para destruir a Jesús» resulta desequilibrado; en español natural debe repetirse el verbo subordinado o rehacerse la coordinación. «Multitudes» es aceptable, aunque «multitudes»/«multitudes reunidas» no es necesario corregir. La principal reparación es de fluidez y sintaxis, no de sentido.
  glossary_alignment: No hay términos del glosario mayor afectados. «Jesús» y «Dios» no presentan conflicto. «Principales sacerdotes» y «ancianos» son compatibles con las decisiones auditadas. «Destruir» conserva la decisión léxica de ἀπολέσωσιν y debe mantenerse en el texto principal, con una nota alternativa más idiomática como «dar muerte a Jesús».
  issues:
  - severity: high
    issue: 'Construcción española poco natural: «pero para destruir a Jesús»'
    rationale: Aunque intenta reflejar el segundo δέ y el infinitivo inglés, el griego tiene una sola cláusula de propósito/contenido con dos subjuntivos coordinados. En español, esa coordinación requiere una formulación como «para que pidieran a Barrabás y que destruyeran a Jesús» o, más naturalmente, «para que pidieran a Barrabás y destruyeran a Jesús». La forma actual suena truncada y poco idiomática.
  - severity: medium
    issue: Nota al pie «hacer morir a Jesús» suena forzada
    rationale: La alternativa inglesa «put Jesus to death» se expresa con más naturalidad en español como «dar muerte a Jesús» o «hacer que mataran a Jesús». «Hacer morir» no es imposible, pero suena menos natural y menos precisa en este contexto.
  - severity: low
    issue: Posible mejora estilística en «multitudes»
    rationale: «Las multitudes» es fiel al plural, pero en español bíblico contemporáneo «la gente» sería más natural. Sin embargo, dado que el proyecto quiere preservar el plural de ὄχλους, no es necesario cambiarlo.
  revised_spanish_text: Pero los principales sacerdotes y los ancianos persuadieron a las multitudes para que pidieran a Barrabás[a], pero destruyeran a Jesús.
  revised_footnotes:
  - marker: a
    text: O, «dieran muerte a Jesús».
    reason: lexical_alternative
  revision_rationale: Se conserva la decisión léxica clave «destruyeran» para ἀπολέσωσιν, en línea con el POB inglés, pero se corrige la sintaxis española para que la segunda acción coordinada dependa naturalmente de «para que». También se mejora la nota alternativa a una expresión española más idiomática y clara para el contexto de ejecución judicial. El segundo «pero» mantiene el contraste de δέ, aunque ahora en una estructura gramatical aceptable en español.
