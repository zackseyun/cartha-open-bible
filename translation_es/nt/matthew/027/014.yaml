translation:
  language: es
  text: Y no le respondió ni con una sola palabra[a], de modo que el gobernador quedó muy asombrado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni una sola palabra».
    reason: lexical_alternative
  - marker: b
    text: O «el gobernador se maravilló mucho».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: did not answer
  chosen_spanish: no le respondió
  alternatives_spanish:
  - no contestó
  - no le dio respuesta
  lexicon: BDAG
  rationale: ἀποκρίνομαι aquí expresa la acción de responder. En español, «no le respondió» conserva el valor verbal directo y natural, sin añadir contenido interpretativo.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al gobernador
  lexicon: BDAG
  rationale: El dativo se expresa mejor con el complemento indirecto «le». El antecedente en contexto es el gobernador/Pilato; dejar el pronombre mantiene la fluidez del verso.
- source_word: πρὸς οὐδὲ ἓν ῥῆμα
  english_pob_choice: with even one word
  chosen_spanish: ni una sola palabra
  alternatives_spanish:
  - con ni una sola palabra
  - con una sola palabra
  lexicon: BDAG
  rationale: 'La construcción idiomática intensifica la negación: no respondió en absoluto. «Ni una sola palabra» comunica bien el valor enfático de οὐδὲ ἕν ῥῆμα en español natural.'
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - por lo cual
  lexicon: BDAG
  rationale: Introduce una consecuencia resultante. «De modo que» preserva la relación causal/resultativa sin sonar forzado.
- source_word: θαυμάζειν
  english_pob_choice: was greatly amazed
  chosen_spanish: quedó muy asombrado
  alternatives_spanish:
  - se maravilló mucho
  - se asombró grandemente
  lexicon: BDAG
  rationale: El infinitivo resultativo se vuelve una construcción finita natural en español. «Quedó muy asombrado» expresa el efecto de la escena sobre el gobernador sin perder fuerza.
- source_word: ἡγεμόνα
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el gobernante
  - el magistrado
  lexicon: BDAG
  rationale: En este contexto romano, ἡγεμών designa a Pilato como gobernador. «Gobernador» es preciso y transparente en español.
- source_word: λίαν
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - excesivamente
  lexicon: BDAG
  rationale: λίαν intensifica la reacción. «Muy» es idiomático y suficiente en esta cláusula; la combinación con «asombrado» ya transmite intensidad.
theological_decisions:
- issue: La respuesta silenciosa de Jesús ante la autoridad civil
  english_pob_reading: He did not answer him with even one word, so that the governor was greatly amazed.
  chosen_spanish_reading: Y no le respondió ni una sola palabra, de modo que el gobernador quedó muy asombrado.
  alternative_spanish_readings:
  - Y no le contestó ni una sola palabra, de modo que el gobernador se maravilló mucho.
  - Y no le dio respuesta alguna, de modo que el gobernador quedó muy sorprendido.
  rationale: 'No hay una decisión doctrinal añadida, pero sí conviene preservar la fuerza narrativa: el silencio de Jesús y la reacción de Pilato. La redacción elegida mantiene la tensión del pasaje sin suavizarla ni explicarla más allá del texto.'
  doctrine_reference: Matthew 27:14; compare Isaiah 53:7 as a broader canonical background
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el audit trail inglés. La principal decisión fue conservar el énfasis de οὐδὲ ἕν ῥῆμα con una negación idiomática en español y resolver el infinitivo resultativo ὥστε θαυμάζειν con una construcción natural («quedó muy asombrado»). No se introdujeron cambios textuales ni lecturas variantes relevantes en este versículo.
  spanish_consistency_notes:
  - Se usó «gobernador» para ἡγεμών, consistente con el contexto de Pilato.
  - Se mantuvo «asombrado» para θαυμάζειν, evitando diluir el impacto narrativo.
  - «Le respondió» conserva el dativo personal de αὐτῷ con naturalidad en español.
  - La negación enfática se expresó con «ni una sola palabra» para reflejar el valor de οὐδὲ ἕν ῥῆμα.
