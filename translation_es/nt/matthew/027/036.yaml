translation:
  language: es
  text: Y sentados allí[a], lo vigilaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y habiéndose sentado allí, lo vigilaban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza la acción con el contexto narrativo anterior; en español, 'Y' conserva esa continuidad sin añadir matiz temporal que no está explícito en el griego.
- source_word: καθήμενοι
  english_pob_choice: sitting there
  chosen_spanish: sentados allí
  alternatives_spanish:
  - habiéndose sentado allí
  - estando sentados allí
  lexicon: BDAG
  rationale: 'El participio de κάθημαι expresa estado: estar sentados. ''Sentados allí'' comunica con naturalidad ese estado concomitante y preserva la escena situada antes de la acción principal.'
- source_word: ἐτήρουν
  english_pob_choice: kept watch over
  chosen_spanish: lo vigilaban
  alternatives_spanish:
  - lo custodiaban
  - lo guardaban
  lexicon: BDAG
  rationale: El imperfecto indica acción continua. 'Lo vigilaban' transmite bien la vigilancia sostenida y suena más natural en español que una perífrasis demasiado pesada; mantiene la fuerza de control y observación del contexto de crucifixión.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre de objeto directo se refiere a Jesús; en español, 'lo' es la forma directa y más natural en esta construcción.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: El adverbio locativo marca el lugar de la acción. 'Allí' conserva el valor de ubicación y encaja mejor con el tono narrativo que 'ahí' en este contexto.
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene la escena con una participialidad de circunstancia concomitante y un imperfecto durativo; la versión española conserva ese valor sin forzar un calco sintáctico.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque el referente inmediato es un pronombre anafórico a Jesús en el relato, sin requerir el título.
  - '''Vigilaban'' conserva la acción durativa del imperfecto griego.'
  - La nota alternativa refleja la posibilidad de explicitar el participio como 'habiéndose sentado'.
