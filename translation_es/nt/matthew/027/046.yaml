revisions:
- from: 'Ahora, como a la hora novena, Jesús exclamó con voz fuerte[a], diciendo: «Eli, Eli, lema sabactani?», es decir: «Dios mío, Dios mío[b], ¿por qué me has abandonado?»'
  to: 'Como a la hora novena, Jesús exclamó con voz fuerte[a], diciendo: «¿Eli, Eli, lema sabachthani?», es decir: «Dios mío, Dios mío[b], ¿por qué me has abandonado?»'
  rationale: Se corrige la transliteración para alinearla con la fuente y con el POB inglés, se normaliza la puntuación española de la pregunta, se simplifica levemente el arranque para mayor naturalidad, y se repara la nota léxica para que preserve la alternativa real documentada por el audit trail.
