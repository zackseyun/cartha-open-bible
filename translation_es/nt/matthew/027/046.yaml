base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/046.yaml
  text: Now about the ninth hour Jesus cried out with a loud voice[a], saying, “Eli, Eli, lema sabachthani?” that is, “My God, my God[b], why have you forsaken me?”
  footnotes:
  - marker: a
    text: The wording echoes Psalm 22:1.
    reason: cross_reference
  - marker: b
    text: Or, 'did you forsake me?' The Greek verb is aorist; English present perfect is used here to preserve the natural force of the cry and its familiar Psalmic resonance.
    reason: lexical_alternative
