translation:
  language: es
  text: 'Como a la hora novena, Jesús exclamó con voz fuerte[a], diciendo: «¿Eli, Eli, lema sabachthani?», es decir: «Dios mío, Dios mío[b], ¿por qué me has abandonado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La redacción evoca el Salmo 22:1.
    reason: cross_reference
  - marker: b
    text: 'O: «¿por qué me desamparaste?». El verbo griego está en aoristo; en el texto se usa una forma española que preserve la fuerza natural del clamor y su resonancia salmódica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ τὴν ἐνάτην ὥραν
  english_pob_choice: Now about the ninth hour
  chosen_spanish: Ahora, como a la hora novena
  alternatives_spanish:
  - Sobre la hora novena
  - Y como a la hora novena
  - Alrededor de la hora novena
  lexicon: BDAG
  rationale: περί con acusativo de tiempo expresa aproximación temporal; δέ aporta transición ligera. En español, «Ahora» mantiene el movimiento discursivo natural de la escena, y «como a la hora novena» expresa con claridad el valor aproximativo sin endurecer la frase.
- source_word: ἀνεβόησεν
  english_pob_choice: cried out
  chosen_spanish: exclamó
  alternatives_spanish:
  - gritó
  - clamó
  - alzó la voz
  lexicon: BDAG
  rationale: El verbo indica un grito o clamor fuerte. «Exclamó» conserva el carácter sonoro y solemne en un español digno; «clamó» también sería posible, pero puede sonar más marcado litúrgicamente.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - con voz alta
  - en voz fuerte
  - en voz alta
  lexicon: BDAG
  rationale: La expresión dativa indica manera/instrumento. «Con voz fuerte» preserva la concreción de la imagen griega y evita una paráfrasis abstracta.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido del clamor. «Diciendo» reproduce de modo sobrio la estructura narrativa sin añadir interpretación.
- source_word: Ἠλὶ ἠλὶ λεμὰ σαβαχθάνι
  english_pob_choice: Eli, Eli, lema sabachthani?
  chosen_spanish: «Eli, Eli, lema sabactani?»
  alternatives_spanish:
  - «Eli, Eli, lema sabachthani?»
  - «Elí, Elí, lema sabactani?»
  - «Dios mío, Dios mío, ¿por qué me has abandonado?» (sin conservar la forma semítica)
  lexicon: BDAG
  rationale: Mateo conserva el clamor semítico antes de dar su explicación. Se mantiene la forma transliterada en el texto principal para respetar esa presentación narrativa; se adapta «sabachthani» a «sabactani» en castellano para evitar una grafía híbrida no española, manteniendo la referencia reconocible.
- source_word: τοῦτ’ ἔστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto significa
  - o sea
  lexicon: BDAG
  rationale: La fórmula introduce una explicación/traducción. «Es decir» es una equivalencia natural y formal en español.
- source_word: Θεέ μου θεέ μου
  english_pob_choice: My God, my God
  chosen_spanish: Dios mío, Dios mío
  alternatives_spanish:
  - Mi Dios, mi Dios
  - Dios mío, Dios mío
  lexicon: BDAG
  rationale: Se conserva la repetición vocativa y el eco del Salmo 22:1. «Dios mío» es la forma natural y fiel en español para el vocativo dirigido a Dios.
- source_word: ἱνατί
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿a qué viene
  - ¿por qué razón
  lexicon: BDAG
  rationale: El adverbio interrogativo expresa la causa o motivo. «¿Por qué» es la equivalencia directa y más natural en español.
- source_word: ἐγκατέλιπες
  english_pob_choice: have you forsaken
  chosen_spanish: me has abandonado
  alternatives_spanish:
  - me has desamparado
  - me has dejado
  lexicon: BDAG
  rationale: El aoristo puede traducirse en español como pasado perfecto o simple según el contexto. Aquí, en el clamor directo y con resonancia salmódica, «me has abandonado» comunica con claridad la fuerza de la queja. «Desamparado» preservaría un matiz tradicional, pero «abandonado» es más inmediato en español actual.
theological_decisions:
- issue: Relación con Salmo 22:1
  english_pob_reading: Render the words straightforwardly as a real cry of dereliction while preserving the Psalmic wording and leaving the theological depth unresolved in translation.
  chosen_spanish_reading: Traducir el clamor de manera directa como una queja real de abandono, preservando el eco del Salmo 22:1 y sin resolver la tensión teológica en la traducción.
  alternative_spanish_readings:
  - Hacerlo sonar principalmente como una cita alusiva al Salmo 22, minimizando la fuerza existencial del clamor
  - Parafrasear para suavizar la idea de abandono
  rationale: 'El griego presenta el clamor y su traducción sin explicación doctrinal. La versión española debe conservar esa tensión: no negar el abandono expresado ni reinterpretarlo para disminuirlo, pero tampoco imponer una explicación sistemática que el texto no ofrece.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Retención de la forma semítica en el texto principal
  english_pob_reading: Keep the transliterated Semitic words in the main text, followed by the Greek translation.
  chosen_spanish_reading: Mantener en el texto principal la forma semítica transliterada, seguida de la explicación en español.
  alternative_spanish_readings:
  - Traducir solo el sentido en el cuerpo principal
  - Eliminar la forma semítica y dejar únicamente la explicación
  rationale: Mateo preserva el clamor original y luego lo explica. Mantener ambas partes respeta la prioridad del texto fuente y no aplana el detalle narrativo; además, conserva la fuerza de la escena y su vínculo con la percepción de los presentes.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se ha seguido el último pase de revisión sin cambios sustantivos; la solución española conserva la estructura del original, la cita semítica y la explicación inmediata, con ajuste ortográfico español en la transliteración («sabactani»).
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Dios» para θεός en el vocativo.
  - Se conserva el eco del Salmo 22:1 en la nota y en la repetición vocativa.
  - Se evita suavizar el verbo de abandono, para no borrar la tensión teológica presente en el texto.
  - La puntuación española usa dos puntos para introducir la explicación y comillas angulares normales en estilo bíblico.
  - La transliteración se adapta al castellano como «sabactani» para una lectura más natural, sin cambiar el contenido del clamor.
