base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/011.yaml
  text: Now Jesus stood before the governor[a], and the governor questioned him, saying, “Are you the King of the Jews?” And Jesus said[b], “You say so.”
  footnotes:
  - marker: a
    text: Or, “You say it,” or “It is as you say.” Jesus’ reply is concise and somewhat elliptical in Greek.
    reason: alternative_reading
  - marker: b
    text: Or “the King of the Judeans.” The Greek term can refer either to Jews more broadly or, in some contexts, to Judeans specifically.
    reason: lexical_alternative
