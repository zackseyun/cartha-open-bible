translation:
  language: es
  text: 'Jesús estuvo ante el gobernador, y el gobernador le preguntó, diciendo: «¿Tú eres el Rey de los judíos[b]?». Jesús dijo: «Tú dices[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tú lo dices» o «Es como tú dices». La respuesta de Jesús es concisa y algo elíptica en griego.
    reason: alternative_reading
  - marker: b
    text: O «de los judeanos». El término griego puede referirse a los judíos en general o, en algunos contextos, más específicamente a los judeanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστάθη
  english_pob_choice: stood
  chosen_spanish: estaba
  alternatives_spanish:
  - estuvo
  - se puso de pie
  - fue puesto de pie
  lexicon: BDAG
  rationale: En español, «estaba delante» comunica bien la colocación ante la autoridad judicial y evita sugerir con demasiada fuerza una acción puntual de ponerse en pie. Aunque el griego aoristo puede leerse de forma simple como «estuvo», aquí «estaba» suena natural y conserva el encuadre narrativo sin añadir causación.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» es claro y natural en español. «Ante» también sería posible y más formal; «en presencia de» expande un poco la idea. La escena judicial queda bien expresada sin sobretraducción.
- source_word: ἡγεμών / ἡγεμόνος
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - gobernante
  - prefecto
  lexicon: BDAG
  rationale: «Gobernador» es la equivalencia más clara y estable para el funcionario romano en este contexto. «Prefecto» sería históricamente más técnico, pero menos accesible; «gobernante» es demasiado general.
- source_word: ἐπηρώτησεν
  english_pob_choice: questioned
  chosen_spanish: le preguntó
  alternatives_spanish:
  - lo interrogó
  - le cuestionó
  lexicon: BDAG
  rationale: El verbo indica formular una pregunta en un contexto formal. En español, «le preguntó» mantiene la naturalidad; «lo interrogó» suena más intenso de lo que exige el griego; «le cuestionó» es menos directo en este registro.
- source_word: βασιλεὺς
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - rey
  lexicon: BDAG
  rationale: Aquí funciona como título real directo en la acusación formulada a Jesús. En español, se mantiene la mayúscula por ser un título en discurso directo. La forma sustantiva es «Rey».
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En este pasaje de la pasión, la referencia es la formulación política habitual sobre el pueblo judío en la acusación romana. «Judeanos» es lexicamente posible, pero «judíos» es la opción más natural y reconocible en español, y coincide con la lectura auditada del POB en inglés.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: respondió
  alternatives_spanish:
  - dijo
  - contestó
  lexicon: BDAG
  rationale: Aunque el verbo griego introduce simplemente la réplica de Jesús, en español «respondió» comunica mejor la función discursiva en este intercambio. «Dijo» sería más literal; «contestó» es posible, pero algo menos sobrio.
- source_word: Σὺ λέγεις
  english_pob_choice: You say so
  chosen_spanish: Tú dices
  alternatives_spanish:
  - Tú lo dices
  - Eso dices tú
  - Tú dices eso
  lexicon: BDAG
  rationale: 'La frase griega es breve y elíptica. «Tú dices» preserva esa concisión y la ambigüedad: no convierte la respuesta en una afirmación explícita ni en una negación. En español, «Tú dices» deja abierta la misma tensión que el POB inglés quiso conservar con «You say so».'
theological_decisions:
- issue: 'Alcance de la respuesta de Jesús: afirmación indirecta y elíptica'
  english_pob_reading: An indirect, qualified affirmation rendered as 'You say so.'
  chosen_spanish_reading: 'Una respuesta indirecta y elíptica: «Tú dices»'
  alternative_spanish_readings:
  - «Eso dices tú»
  - «Tú lo dices»
  - «Así dices»
  rationale: El griego Σὺ λέγεις no resuelve la tensión entre afirmación y distanciamiento. La traducción española debe mantener esa reserva; por eso se evita una paráfrasis que vuelva explícita la afirmación. «Tú dices» conserva la brevedad y la ambigüedad del original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés auditado ofrece alto acuerdo y no registra revisiones aplicadas. Esta versión española sigue la misma lectura base, pero ajusta la formulación a una sintaxis natural en español y preserva la tensión de la respuesta de Jesús sin resolverla.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» solo cuando corresponda; aquí no aparece.
  - «Rey» conserva el valor titular del griego βασιλεὺς en discurso directo.
  - 'La escena judicial se expresa con un registro sobrio y natural: «delante de», «le preguntó», «respondió».'
  - Se preserva la ambigüedad de Σὺ λέγεις sin convertirla en una confesión más fuerte que la del original.
