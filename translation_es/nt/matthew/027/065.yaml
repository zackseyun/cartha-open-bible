revisions:
- from: 'Pilato les dijo: «Ustedes tienen una guardia[a]. Vayan y asegúrenlo[b] como saben hacerlo».'
  to: 'Pilato les dijo: «Ustedes tienen una guardia[a]. Vayan; dejen todo bien asegurado[b], como saben hacerlo».'
  rationale: Se reemplazó «asegúrenlo» por «dejen todo bien asegurado» para evitar un pronombre con referente poco claro y para expresar de manera más natural en español la fuerza de ἀσφαλίσασθε. Se mantuvo la ambigüedad de «Ustedes tienen una guardia» y se conservó la nota principal sobre Ἔχετε κουστωδίαν. La nota b se ajustó a una alternativa española más idiomática y más cercana al historial auditado en inglés.
