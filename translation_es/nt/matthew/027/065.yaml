review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido griego básico: «Pilato les dijo», «tienen una guardia», «vayan», y la cláusula final «como saben hacerlo» preservan adecuadamente ἔφη, αὐτοῖς, Ἔχετε κουστωδίαν, ὑπάγετε y ὡς οἴδατε. También conserva correctamente en nota la ambigüedad de Ἔχετε κουστωδίαν, tal como documenta el audit trail inglés. Sin embargo, «asegúrenlo» introduce un problema de referente: el griego ἀσφαλίσασθε aquí implica asegurar el sepulcro/situación, no un objeto masculino explícito en español. El inglés evitó fijar un objeto expreso con «make it secure»; en español, «asegúrenlo» suena algo opaco y puede sugerir un referente masculino no establecido.'
  spanish_quality_summary: El texto es claro y de registro adecuado, pero puede mejorarse en naturalidad y precisión con «dejen todo bien asegurado» o «asegúrenlo bien». La opción actual es comprensible, aunque menos idiomática por el pronombre directo sin antecedente claro. La nota b también conviene ajustar para que refleje mejor la alternativa inglesa previa y suene natural en español formal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «guardia» para κουστωδίαν está bien y mantiene el valor colectivo. No aparecen términos sensibles del glosario mayor. La decisión principal sobre Ἔχετε κουστωδίαν está bien alineada con la política de conservar la ambigüedad en el texto principal y explicarla en nota.
  issues:
  - severity: medium
    issue: «asegúrenlo» tiene referente implícito poco claro
    rationale: El griego manda asegurar la tumba/el asunto, pero no expresa un antecedente masculino explícito en esta frase española. «Asegúrenlo» puede sonar ambiguo o ligeramente forzado para lectores hispanos.
  - severity: low
    issue: La nota b es poco natural en español
    rationale: «háganlo seguro» reproduce demasiado de cerca la estructura inglesa y no es la forma más idiomática en español para expresar la alternativa previa.
  revised_spanish_text: 'Pilato les dijo: «Ustedes tienen una guardia[a]. Vayan; dejen todo bien asegurado[b], como saben hacerlo».'
  revised_footnotes:
  - marker: a
    text: 'O: «Tomen una guardia», o posiblemente: «Ustedes tienen su propia guardia». El griego puede entenderse tanto como una concesión de una guardia como una referencia a una ya disponible para ellos.'
    reason: alternative_reading
  - marker: b
    text: 'O: «asegúrenlo como saben hacerlo».'
    reason: previous_rendering
  revision_rationale: Se reemplazó «asegúrenlo» por «dejen todo bien asegurado» para evitar un pronombre con referente poco claro y para expresar de manera más natural en español la fuerza de ἀσφαλίσασθε. Se mantuvo la ambigüedad de «Ustedes tienen una guardia» y se conservó la nota principal sobre Ἔχετε κουστωδίαν. La nota b se ajustó a una alternativa española más idiomática y más cercana al historial auditado en inglés.
