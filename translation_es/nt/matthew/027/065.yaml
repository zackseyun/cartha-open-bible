translation:
  language: es
  text: 'Pilato les dijo: «Ustedes tienen una guardia[a]. Vayan; dejen todo bien asegurado[b], como saben hacerlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tomen una guardia», o posiblemente: «Ustedes tienen su propia guardia». El griego puede entenderse tanto como una concesión de una guardia como una referencia a una ya disponible para ellos.'
    reason: alternative_reading
  - marker: b
    text: 'O: «asegúrenlo como saben hacerlo».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les habló
  - les dijo
  lexicon: φημί
  rationale: El verbo narrativo φημί se vierte de manera natural por «decir»; «dijo» conserva el valor simple de habla directa sin añadir matices no presentes en el griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los demás
  lexicon: αὐτός
  rationale: El dativo plural marca destinatario del habla; en español, el clítico dativo «les» es la forma más natural y concisa.
- source_word: Ἔχετε
  english_pob_choice: You have
  chosen_spanish: Ustedes tienen
  alternatives_spanish:
  - Tomen
  - Aquí tienen
  lexicon: ἔχω
  rationale: Se conserva el sentido básico de posesión/disponibilidad sin resolver en el texto principal la ambigüedad entre concesión y constatación, tal como ocurre en el griego y en el audit trail inglés.
- source_word: κουστωδίαν
  english_pob_choice: a guard
  chosen_spanish: una guardia
  alternatives_spanish:
  - un guardia
  - una custodia
  - un destacamento de guardia
  lexicon: κουστωδία
  rationale: El préstamo latino indica una fuerza de vigilancia o guardia. «Guardia» comunica bien el sentido colectivo o de custodia y evita reducirlo necesariamente a una sola persona.
- source_word: ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Id
  - Vayan de una vez
  lexicon: ὑπάγω
  rationale: Imperativo de partida; «vayan» es el equivalente natural y mantiene el tono directo del mandato.
- source_word: ἀσφαλίσασθε
  english_pob_choice: make it secure
  chosen_spanish: asegúrenlo
  alternatives_spanish:
  - háganlo seguro
  - protégelo
  - aseguren su seguridad
  lexicon: ἀσφαλίζω
  rationale: El verbo medio imperativo pide la acción de asegurar/proteger algo. «Asegúrenlo» es breve, idiomático y fiel a la fuerza imperativa.
- source_word: ὡς οἴδατε
  english_pob_choice: as you know how
  chosen_spanish: como saben hacerlo
  alternatives_spanish:
  - como saben
  - como mejor sepan
  - según sepan
  lexicon: οἶδα
  rationale: La expresión idiomática comunica capacidad o pericia según lo que ellos saben; «como saben hacerlo» preserva ese matiz práctico sin sobreinterpretarlo.
theological_decisions:
- issue: 'Ambigüedad de Ἔχετε κουστωδίαν: concesión de una guardia romana o referencia a una guardia ya disponible para ellos'
  english_pob_reading: Render neutrally as 'You have a guard' with alternatives preserved
  chosen_spanish_reading: «Ustedes tienen una guardia»
  alternative_spanish_readings:
  - «Tomen una guardia»
  - «Ustedes tienen su propia guardia»
  rationale: La frase griega permite más de una lectura histórica y funcional. La traducción principal mantiene la ambigüedad sin decidirla, mientras la nota conserva las opciones reflejadas en el audit trail inglés.
  doctrine_reference: Preservar tensión textual e histórica sin resolverla por anticipado.
translation_notes:
  revision_awareness: 'El texto inglés de referencia pasó por revisiones menores en la cláusula final: de ''make it secure'' a ''secure it'' y luego de regreso a ''make it secure'' por naturalidad formal. La versión española usa una forma breve y natural («asegúrenlo») que conserva la fuerza del imperativo sin depender de esa oscilación estilística.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el tetragrámaton ni un equivalente explícito.
  - Se usa «guardia» para κουστωδία por ser el equivalente más claro y neutral en español; no se fuerza «custodia» ni «guardia romana» sin base textual adicional.
  - Se conserva el plural de cortesía/segunda persona plural en todo el mandato para reflejar el destinatario plural del griego.
