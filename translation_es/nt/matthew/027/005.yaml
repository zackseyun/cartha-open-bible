translation:
  language: es
  text: Y arrojando la plata al templo[a], se retiró, y fue y se ahorcó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al santuario»; el griego usa naós, que a menudo se refiere específicamente al santuario del templo más que a todo el complejo del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥίψας
  english_pob_choice: throwing
  chosen_spanish: arrojando
  alternatives_spanish:
  - tirando
  - echando
  - habiendo arrojado
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Arrojando» conserva la secuencia verbal sin añadir una paráfrasis excesiva; «tirando» suena más coloquial y «habiendo arrojado» resulta más pesado en español.
- source_word: τὰ ἀργύρια
  english_pob_choice: the silver
  chosen_spanish: las monedas de plata
  alternatives_spanish:
  - la plata
  - el dinero
  - las monedas
  lexicon: BDAG
  rationale: En español, «la plata» puede sonar demasiado abstracto o incluso ambigua. «Las monedas de plata» hace explícito el referente monetario implícito en contexto, sin alejarse del sentido lexical de ἀργύρια.
- source_word: εἰς τὸν ναὸν
  english_pob_choice: into the temple
  chosen_spanish: al templo
  alternatives_spanish:
  - al santuario
  - al templo-santuario
  - dentro del templo
  lexicon: BDAG
  rationale: ναός puede referirse específicamente al santuario, no al complejo completo. La redacción principal mantiene «templo» por claridad; el matiz más específico queda preservado en la nota.
- source_word: ἀνεχώρησεν
  english_pob_choice: he departed
  chosen_spanish: se retiró
  alternatives_spanish:
  - se fue
  - se apartó
  - partió
  lexicon: BDAG
  rationale: El verbo puede significar retirarse o marcharse. «Se retiró» conserva el tono narrativo sobrio y evita una repetición innecesaria con el segundo movimiento verbal.
- source_word: ἀπελθὼν
  english_pob_choice: went and
  chosen_spanish: fue y
  alternatives_spanish:
  - se fue y
  - al irse,
  - habiéndose ido, fue y
  lexicon: BDAG
  rationale: El participio de movimiento seguido del verbo principal es idiomático. «Fue y» reproduce con naturalidad la secuencia sin perder el valor del desplazamiento previo.
- source_word: ἀπήγξατο
  english_pob_choice: hanged himself
  chosen_spanish: se ahorcó
  alternatives_spanish:
  - se colgó
  - se estranguló
  lexicon: BDAG
  rationale: El contexto apunta claramente a suicidio por ahorcamiento. «Se ahorcó» es el equivalente idiomático más claro en español; «se colgó» puede ser más ambiguo y «se estranguló» no es el matiz usual aquí.
theological_decisions:
- issue: Sentido específico de ναός frente al término general para templo
  english_pob_reading: Renderizado como 'temple' en el texto principal, con una nota que preserva la posibilidad de 'sanctuary'.
  chosen_spanish_reading: Renderizado como «templo» en el texto principal, con nota que preserva la posibilidad de «santuario».
  alternative_spanish_readings:
  - santuario
  - templo-santuario
  rationale: No es una disputa doctrinal, pero sí una distinción léxica relevante. Mantener «templo» hace el texto natural; la nota conserva el matiz más preciso de ναός.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego directamente y refleja la revisión más reciente del inglés POB: se mantiene la secuencia verbal breve y natural, sin añadir «después de». También conserva el contraste entre el verbo de retirada y el verbo de marcha, para no borrar la doble acción del original.'
  spanish_consistency_notes:
  - Se usó «Y» al inicio para reproducir el encadenamiento narrativo del griego.
  - Se prefirió «se ahorcó» por ser la forma idiomática más clara en español para el acto descrito.
  - «Templo» se mantiene en el texto principal; la especificación semántica se reserva para la nota.
  - No se introdujo lenguaje eclesiástico tradicional no sustentado por el texto, como «casa de Dios» o «santuario» en el cuerpo principal.
