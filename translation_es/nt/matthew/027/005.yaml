  rationale: Se ajusta τὰ ἀργύρια a «la plata» para seguir más de cerca el griego y la decisión léxica del POB inglés sin perder claridad en español. Se mantiene «al templo» con nota sobre «santuario». Se pule la redacción de la nota para mayor naturalidad.
