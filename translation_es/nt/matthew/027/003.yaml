translation:
  language: es
  text: Entonces Judas, que lo había traicionado, al ver que había sido condenado, sintió remordimiento y devolvió las treinta piezas de plata[a] a los principales sacerdotes y a los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las treinta monedas de plata».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca temporal discursiva que introduce la siguiente acción en secuencia. «Entonces» es natural en español y mantiene la transición narrativa sin añadir matiz innecesario.
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vio
  lexicon: BDAG
  rationale: El participio aoristo expresa circunstancia temporal ligada a la acción principal. «Al ver» conserva esa relación de manera fluida en español.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  lexicon: Nombre propio
  rationale: Transliteración estándar y transparente del nombre propio.
- source_word: ὁ παραδιδοὺς αὐτόν
  english_pob_choice: who had betrayed him
  chosen_spanish: que lo había traicionado
  alternatives_spanish:
  - que lo entregaba
  - el que lo entregó
  - que lo había entregado
  lexicon: BDAG
  rationale: El participio articular presente identifica a Judas por su papel. En este contexto narrativo, «traicionado» comunica con precisión el valor contextual de παραδίδωμι y mantiene la fuerza relacional del relativo sin sonar mecánico.
- source_word: ὅτι κατεκρίθη
  english_pob_choice: that he had been condemned
  chosen_spanish: que había sido condenado
  alternatives_spanish:
  - que fue condenado
  - que se le había dictado sentencia
  lexicon: BDAG
  rationale: ὅτι introduce el contenido de lo percibido. El aoristo pasivo pide una referencia ya cumplida; «había sido condenado» preserva el orden temporal y la pasividad.
- source_word: μεταμεληθεὶς
  english_pob_choice: regretted it
  chosen_spanish: se arrepintió
  alternatives_spanish:
  - lo lamentó
  - sintió remordimiento
  - se lamentó
  lexicon: BDAG
  rationale: μεταμέλομαι expresa pesar o arrepentimiento por lo hecho. En español, «se arrepintió» comunica adecuadamente el cambio afectivo-moral sin forzar todavía una lectura técnica de μετανοέω. Dado el contexto, «lo lamentó» sería posible, pero menos fuerte.
- source_word: ἔστρεψεν
  english_pob_choice: returned
  chosen_spanish: devolvió
  alternatives_spanish:
  - regresó
  - entregó de vuelta
  - restituyó
  lexicon: BDAG
  rationale: Con dinero como objeto directo, el verbo significa devolver/restituir. «Devolvió» es natural, preciso y evita la ambigüedad de «regresó».
- source_word: τὰ τριάκοντα ἀργύρια
  english_pob_choice: the thirty silver coins / pieces of silver
  chosen_spanish: las treinta piezas de plata
  alternatives_spanish:
  - los treinta siclos de plata
  - las treinta monedas de plata
  lexicon: BDAG
  rationale: ἀργύρια refiere a moneda o piezas de plata. «Piezas de plata» conserva el giro tradicional y la resonancia intertextual del pasaje, sin perder claridad en español. «Monedas de plata» sería más explicativo, pero menos acorde con la expresión heredada del texto.
- source_word: τοῖς ἀρχιερεῦσιν καὶ πρεσβυτέροις
  english_pob_choice: to the chief priests and elders
  chosen_spanish: a los principales sacerdotes y a los ancianos
  alternatives_spanish:
  - a los sumos sacerdotes y a los ancianos
  - a los jefes de los sacerdotes y a los ancianos
  lexicon: BDAG
  rationale: ἀρχιερεῖς se vierte aquí como «principales sacerdotes», siguiendo el uso contextual de Mateo para el liderazgo sacerdotal judío. «Ancianos» traduce πρεσβύτεροι en su sentido de líderes del pueblo, no simplemente personas de edad.
theological_decisions:
- issue: Valor de μεταμεληθεὶς en la reacción de Judas
  english_pob_reading: Express Judas's response as regret/remorse, not full repentance
  chosen_spanish_reading: se arrepintió como expresión de pesar por su acción, sin convertirla en una afirmación doctrinal de arrepentimiento salvador
  alternative_spanish_readings:
  - se arrepintió plenamente
  - sintió remordimiento
  - lo lamentó
  rationale: El verbo es μεταμέλομαι, no μετανοέω. Por eso la traducción debe expresar el pesar real de Judas sin resolver más de lo que el texto dice sobre su estado espiritual. «Se arrepintió» funciona en español si se entiende en este sentido limitado y narrativo; no debe leerse como una afirmación doctrinal plena sobre salvación o conversión.
  doctrine_reference: Distinción léxica μεταξύ μεταμέλομαι y μετανοέω; principio de no sobreinterpretar el estado espiritual del personaje
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que volvió a una sintaxis más directa y a la forma tradicional «pieces of silver». En español se optó por una estructura igualmente directa («Entonces Judas... al ver... se arrepintió...») y por «piezas de plata», manteniendo la resonancia tradicional sin perder transparencia.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se usa «principales sacerdotes» para ἀρχιερεῖς según el uso contextual de Mateo, no «sumos sacerdotes», para mantener continuidad terminológica con el POB inglés auditado.
  - «Se arrepintió» se entiende aquí como traducción limitada de μεταμεληθεὶς; no debe confundirse con una traducción técnica de μετανοέω.
  - La nota [a] se ancla en «piezas de plata» para preservar la alternativa lexical documentada en el audit trail inglés.
