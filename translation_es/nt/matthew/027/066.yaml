translation:
  language: es
  text: Entonces fueron y aseguraron[a] la tumba, sellando la piedra con la guardia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «aseguraron» traduce ἠσφαλίσαντο; también puede expresarse como «hicieron segura» o «pusieron bajo seguridad».
    reason: lexical_alternative
  - marker: b
    text: «con la guardia» refleja el sentido de acompañamiento de μετὰ τῆς κουστωδίας; también podría entenderse «con el destacamento de guardia», o más explícitamente «sellando la piedra y poniendo guardia».
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ πορευθέντες
  english_pob_choice: So they went
  chosen_spanish: Entonces fueron
  alternatives_spanish:
  - Y fueron
  - Luego fueron
  lexicon: BDAG
  rationale: El participio de movimiento funciona como acción acompañante de la principal y en español natural puede resolverse con un verbo finito. «Entonces» conserva la continuidad narrativa de δέ sin cargar un contraste más fuerte del que el contexto exige.
- source_word: ἠσφαλίσαντο
  english_pob_choice: secured
  chosen_spanish: aseguraron
  alternatives_spanish:
  - hicieron seguro
  - aseguraron cuidadosamente
  lexicon: BDAG
  rationale: ἀσφαλίζω expresa hacer seguro o asegurar. «Aseguraron» comunica bien la medida tomada para impedir alteraciones en la tumba, en un español moderno y claro.
- source_word: τὸν τάφον
  english_pob_choice: the tomb
  chosen_spanish: la tumba
  alternatives_spanish:
  - el sepulcro
  - la sepultura
  lexicon: BDAG
  rationale: En este contexto τάφος designa el lugar de entierro de Jesús. «Tumba» es natural, preciso y suficientemente solemne para el registro bíblico en español.
- source_word: σφραγίσαντες
  english_pob_choice: sealing
  chosen_spanish: sellando
  alternatives_spanish:
  - al sellar
  - habiendo sellado
  lexicon: BDAG
  rationale: El participio aoristo expresa el medio o acción concomitante por la cual aseguraron la tumba. «Sellando» conserva esa relación sin forzar una secuencia más explícita que la del griego.
- source_word: τὸν λίθον
  english_pob_choice: the stone
  chosen_spanish: la piedra
  alternatives_spanish:
  - la roca
  - la losa
  lexicon: BDAG
  rationale: λίθος aquí es la piedra colocada a la entrada del sepulcro. «Piedra» es suficiente y no añade detalles que el texto no explicita.
- source_word: μετὰ τῆς κουστωδίας
  english_pob_choice: with the guard
  chosen_spanish: junto con la guardia
  alternatives_spanish:
  - con la guardia
  - con el guardia
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento, y κουστωδία es el destacamento de guardia. «Junto con la guardia» preserva la idea de acompañamiento y deja abierta la relación exacta entre el sellado y la presencia/participación de la guardia, como hace el griego.
theological_decisions:
- issue: Relación entre el sellado de la piedra y la guardia
  english_pob_reading: The tomb was secured by sealing the stone, with the guard also involved/present.
  chosen_spanish_reading: La tumba fue asegurada sellando la piedra, junto con la guardia.
  alternative_spanish_readings:
  - La tumba fue asegurada sellando la piedra con la guardia
  - La tumba fue asegurada al sellar la piedra y poner guardia
  rationale: El griego es breve y permite entender la cláusula de la guardia como acompañamiento, sin precisar si fue una acción adicional separada o simplemente la presencia del destacamento. La redacción española conserva esa tensión y no la resuelve de manera indebida.
  doctrine_reference: Preservar la ambigüedad textual donde el griego no decide explícitamente el procedimiento.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que favoreció una construcción participial más natural y mantuvo el valor de acompañamiento de μετὰ τῆς κουστωδίας. En español se refleja con «sellando» y «junto con la guardia», sin convertir la frase en dos acciones separadas.
  spanish_consistency_notes:
  - Se usa «tumba» para τάφος, en coherencia con el registro bíblico moderno.
  - Se usa «guardia» para κουστωδία, evitando forzar «vigilancia» o «guardia romana» que el griego no especifica.
  - Se evita «SEÑOR» u otra sustitución innecesaria porque aquí no aparece el nombre divino.
  - Se mantiene una sintaxis natural en español sin perder la relación participial del original.
