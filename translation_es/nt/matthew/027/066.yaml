review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: οἱ δὲ πορευθέντες se resuelve de forma natural con verbo finito; ἠσφαλίσαντο se refleja adecuadamente con «aseguraron»; τὸν τάφον como «la tumba» y σφραγίσαντες τὸν λίθον como «sellando la piedra» preservan el contenido y la relación participial. El único ajuste importante es μετὰ τῆς κουστωδίας: «junto con la guardia» es comprensible, pero en español suena más pesado y menos directo que el inglés auditado «with the guard», y puede insinuar coordinación externa más que simple acompañamiento. «Con la guardia» preserva mejor la concisión y ambigüedad del griego.'
  spanish_quality_summary: El español es claro y legible, pero «Entonces fueron» suena algo calcado; «Entonces fueron y aseguraron...» no es incorrecto, aunque «Entonces fueron y aseguraron...» sigue siendo aceptable. El problema principal de fluidez está en «junto con la guardia», que resulta menos natural y más aparatoso en este contexto narrativo. También conviene que la nota [a] no defina ἠσφαλίσαντο cuando el ancla está puesta en «tumba»; la nota debe corresponder al lugar anclado o moverse el ancla.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tumba» es aceptable para τάφος. No intervienen nombres divinos ni títulos mesiánicos. «Guardia» refleja bien κουστωδία como destacamento/watch. La revisión propuesta mantiene la ambigüedad teológica y mejora la correspondencia entre anclas y notas.
  issues:
  - severity: medium
    issue: «junto con la guardia» es menos natural y menos fiel a la concisión de μετὰ τῆς κουστωδίας
    rationale: La frase griega expresa acompañamiento de forma compacta. En español, «con la guardia» comunica mejor esa relación sin sugerir una coordinación más marcada ni recargar el estilo.
  - severity: medium
    issue: La nota [a] está anclada en «tumba» pero explica «aseguraron»
    rationale: Las notas deben corresponder exactamente al punto anclado en el texto. Tal como está, el lector asociará la explicación léxica con «tumba», lo cual es engañoso.
  - severity: low
    issue: La nota [b] incluye «sellando la piedra y poniendo guardia», formulación algo más interpretativa
    rationale: Como alternativa posible puede mantenerse, pero conviene presentarla como lectura más explícita, no como equivalencia principal, para no resolver una ambigüedad que el griego deja abierta.
  revised_spanish_text: Entonces fueron y aseguraron[a] la tumba, sellando la piedra con la guardia[b].
  revised_footnotes:
  - marker: a
    text: «aseguraron» traduce ἠσφαλίσαντο; también puede expresarse como «hicieron segura» o «pusieron bajo seguridad».
    reason: lexical_alternative
  - marker: b
    text: «con la guardia» refleja el sentido de acompañamiento de μετὰ τῆς κουστωδίας; también podría entenderse «con el destacamento de guardia», o más explícitamente «sellando la piedra y poniendo guardia».
    reason: alternative_reading
  revision_rationale: Se cambió «junto con la guardia» por «con la guardia» para reflejar mejor la concisión y ambigüedad del griego y sonar más natural en español. También se movió la nota léxica sobre ἠσφαλίσαντο al verbo «aseguraron», para que el ancla coincida con el contenido de la nota.
