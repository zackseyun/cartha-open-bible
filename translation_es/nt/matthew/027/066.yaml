- from: Entonces fueron y aseguraron la tumba[a], sellando la piedra junto con la guardia[b].
  to: Entonces fueron y aseguraron[a] la tumba, sellando la piedra con la guardia[b].
  rationale: Se cambió «junto con la guardia» por «con la guardia» para reflejar mejor la concisión y ambigüedad del griego y sonar más natural en español. También se movió la nota léxica sobre ἠσφαλίσαντο al verbo «aseguraron», para que el ancla coincida con el contenido de la nota.
