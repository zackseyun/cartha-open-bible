translation:
  language: es
  text: 'Pero los demás decían: «Déjenlo[a]. Veamos si Elías viene a salvarlo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los otros decían».
    reason: lexical_alternative
  - marker: b
    text: O «si Elías viene a salvarlo». El griego usa un presente («viene») dentro de una pregunta indirecta introducida por «si».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ λοιποὶ
  english_pob_choice: But the rest
  chosen_spanish: Pero los demás
  alternatives_spanish:
  - Pero el resto
  - Pero los otros
  lexicon: BDAG
  rationale: λοιποί designa a los que quedan en contraste con los que hablaron antes. «Los demás» conserva esa oposición de manera natural en español y evita una formulación demasiado literal como «el resto» cuando se refiere a personas.
- source_word: ἔλεγον
  english_pob_choice: said
  chosen_spanish: decían
  alternatives_spanish:
  - decían continuamente
  - dijeron
  lexicon: BDAG
  rationale: El imperfecto puede sugerir repetición o continuidad. En español, «decían» comunica mejor ese valor aspectual que un pretérito simple, sin forzarlo demasiado.
- source_word: Ἄφες
  english_pob_choice: Leave him alone
  chosen_spanish: Déjenlo
  alternatives_spanish:
  - Déjenlo solo
  - No lo interrumpan
  - Déjenlo tranquilo
  lexicon: BDAG
  rationale: Aunque el imperativo griego es singular y literalmente significa «deja/permite», el contexto muestra que se dirige a quienes están interviniendo. En español, un plural de cortesía o de grupo es más natural en el discurso y «Déjenlo» conserva la fuerza de detener la acción sin añadir más interpretación que la necesaria.
- source_word: ἴδωμεν
  english_pob_choice: Let us see
  chosen_spanish: Veamos
  alternatives_spanish:
  - Vamos a ver
  - Veamos entonces
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de primera persona plural se expresa de forma directa y natural con «Veamos».
- source_word: εἰ ἔρχεται
  english_pob_choice: whether ... is coming
  chosen_spanish: si Elías viene
  alternatives_spanish:
  - si Elías está viniendo
  - si Elías está por venir
  lexicon: BDAG
  rationale: La partícula εἰ introduce aquí una pregunta indirecta. En español, «si» es el equivalente más natural; el presente «viene» comunica la inmediatez del griego ἔρχεται sin sonar forzado.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elijah
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español.
- source_word: σώσων αὐτόν
  english_pob_choice: to save him
  chosen_spanish: a salvarlo
  alternatives_spanish:
  - para salvarlo
  - a rescatarlo
  lexicon: BDAG
  rationale: El participio futuro expresa intención o finalidad con ἔρχεται. En español, «a salvarlo» reproduce bien esa relación final y mantiene el vínculo léxico con σῴζω. «Salvar» se conserva porque es la equivalencia ordinaria del verbo y preserva la ironía narrativa del pasaje.
theological_decisions:
- issue: Valor de σῴζω en el contexto de la crucifixión
  english_pob_reading: Rendered σώσων αὐτόν as 'to save him' in its immediate narrative sense of physical deliverance/rescue.
  chosen_spanish_reading: Se traduce «a salvarlo» en el sentido narrativo inmediato de librarlo de la muerte o del sufrimiento visible.
  alternative_spanish_readings:
  - a rescatarlo
  - a librarlo
  rationale: Los que hablan se burlan de una posible intervención visible en la cruz, no hacen una afirmación doctrinal sobre salvación eterna. «Salvarlo» conserva el valor normal de σῴζω y también deja intacta la ironía del relato.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el pasaje griego y concuerda con el audit trail inglés en los puntos clave: λοιποὶ como «los demás», el imperfecto narrativo como «decían», el imperativo breve como «Déjenlo», la pregunta indirecta con εἰ como «si», y el participio futuro σώσων con valor final como «a salvarlo». No se detectaron revisiones recientes que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se mantiene un tono bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se usa «Elías» como nombre propio estándar en español.
  - Se evita «Cristo» porque el versículo no lo exige y el texto trata del personaje bíblico por nombre.
  - La nota al pie sobre «viene» preserva la observación gramatical del presente griego sin recargar el cuerpo principal.
