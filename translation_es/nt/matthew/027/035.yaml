translation:
  language: es
  text: Y después de haberlo crucificado[a], repartieron sus ropas echando suertes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y cuando lo hubieron crucificado, repartieron sus ropas, echando suertes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σταυρώσαντες
  english_pob_choice: after they crucified
  chosen_spanish: después de haberlo crucificado
  alternatives_spanish:
  - cuando lo hubieron crucificado
  - habiéndolo crucificado
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; en español, 'después de haberlo crucificado' expresa con naturalidad la secuencia temporal sin perder el valor previo del participio.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: δέ introduce una conexión narrativa suave; 'Y' conserva el avance del relato con un conector simple y natural en español.
- source_word: διεμερίσαντο
  english_pob_choice: they divided
  chosen_spanish: repartieron
  alternatives_spanish:
  - dividieron
  - distribuyeron
  - se repartieron
  lexicon: BDAG
  rationale: El verbo expresa dividir o repartir entre varios. 'Repartieron' comunica bien la acción concreta sobre las prendas y suena natural en español narrativo.
- source_word: τὰ ἱμάτια αὐτοῦ
  english_pob_choice: his garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus prendas
  - sus ropas
  - sus vestiduras
  lexicon: BDAG
  rationale: ἱμάτια puede referirse de manera amplia a ropa/vestiduras. 'Vestidos' mantiene un registro sobrio y bíblico en español sin forzar una precisión inexistente en el contexto.
- source_word: βάλλοντες κλῆρον
  english_pob_choice: by casting lots
  chosen_spanish: echando suertes
  alternatives_spanish:
  - echando lotes
  - por suerte
  - a suertes
  lexicon: BDAG
  rationale: La expresión idiomática bíblica española 'echar suertes' comunica con claridad el medio indicado por el participio y preserva el sentido tradicional del acto de sorteo.
theological_decisions:
- issue: Relación entre el participio βάλλοντες κλῆρον y el verbo principal διεμερίσαντο
  english_pob_reading: The casting of lots is rendered as the means by which the soldiers divided Jesus' garments.
  chosen_spanish_reading: 'La frase se traduce como medio: repartieron sus vestidos echando suertes.'
  alternative_spanish_readings:
  - repartieron sus vestidos, echando suertes
  - y, echando suertes, repartieron sus vestidos
  rationale: El griego presenta el acto de echar suertes como el modo en que se realizó el reparto. El español elegido conserva esa relación instrumental de forma fluida y sin añadir interpretación doctrinal.
  doctrine_reference: Transparencia sintáctica; preservación del sentido narrativo directo del texto.
translation_notes:
  revision_awareness: El pasaje ha sido revisado con alto grado de acuerdo y sin cambios posteriores; no hay revisiones aplicadas en el expediente auditado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó 'Cristo' porque el versículo no usa Χριστός.
  - Se conservó una formulación bíblica natural para 'echar suertes', coherente con el valor idiomático del griego y con el español eclesial contemporáneo.
