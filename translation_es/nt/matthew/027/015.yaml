translation:
  language: es
  text: En la fiesta, el gobernador tenía por costumbre poner en libertad a la multitud un preso, el que querían.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «festival».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ δὲ ἑορτὴν
  english_pob_choice: Now at the feast
  chosen_spanish: Ahora, en la fiesta
  alternatives_spanish:
  - En la fiesta
  - Ahora durante la fiesta
  - Según la fiesta
  lexicon: BDAG
  rationale: κατά con acusativo tiene valor temporal aquí; por eso se traduce con una expresión natural de tiempo. δέ aporta una transición suave, que en español puede quedar como «Ahora». ἑορτή puede ser «fiesta» o «festival»; «fiesta» mantiene naturalidad y el contexto pascual ya está presente en el relato.
- source_word: εἰώθει
  english_pob_choice: was accustomed
  chosen_spanish: solía
  alternatives_spanish:
  - estaba acostumbrado a
  - tenía la costumbre de
  - acostumbraba a
  lexicon: BDAG
  rationale: El perfecto pluscuamperfectivo de costumbre expresa una práctica habitual del pasado. «Solía» transmite bien esa regularidad en español sin sonar forzado.
- source_word: ὁ ἡγεμὼν
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el prefecto
  - el gobernante
  - el jefe
  lexicon: BDAG
  rationale: ἡγεμών se refiere aquí al gobernador romano provincial. «Gobernador» es la equivalencia clara y estándar en español actual.
- source_word: ἀπολύειν
  english_pob_choice: to release
  chosen_spanish: soltar
  alternatives_spanish:
  - liberar
  - dejar libre
  - poner en libertad
  lexicon: BDAG
  rationale: ἀπολύω aquí significa dejar salir de custodia. «Soltar» refleja la acción de liberar a un preso de manera directa y comprensible; «liberar» también sería posible, pero «soltar» conserva mejor la brevedad narrativa.
- source_word: ἕνα
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - un solo
  lexicon: BDAG
  rationale: ἕνα indica un único preso. En español, «un preso» expresa naturalmente ese valor numérico.
- source_word: τῷ ὄχλῳ
  english_pob_choice: to the crowd
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la multitud
  - a la gente
  - a la muchedumbre
  lexicon: BDAG
  rationale: Aunque ὄχλος es literalmente «multitud» o «muchedumbre», en este contexto jurídico-narrativo el sentido es el grupo popular que recibe la concesión del gobernador. «Al pueblo» comunica esa función colectiva con naturalidad; se mantiene la opción «a la multitud» como alternativa más literal.
- source_word: δέσμιον
  english_pob_choice: prisoner
  chosen_spanish: preso
  alternatives_spanish:
  - prisionero
  - cautivo
  lexicon: BDAG
  rationale: δέσμιος designa a alguien atado o bajo custodia. «Preso» es un equivalente natural y preciso en español; «prisionero» también es posible, pero «preso» suele sonar más directo en este contexto.
- source_word: ὃν ἤθελον
  english_pob_choice: whom they wanted
  chosen_spanish: al que ellos querían
  alternatives_spanish:
  - a quien ellos querían
  - al que deseaban
  - a quien deseaban
  lexicon: BDAG
  rationale: La cláusula relativa identifica al preso escogido por la multitud. «Al que ellos querían» refleja el singular del antecedente («un preso») y evita una construcción más pesada en español.
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego y el audit trail en inglés, preservando el valor temporal de κατά + acusativo, el sentido habitual de εἰώθει y la referencia concreta de ἡγεμών. Se optó por un español natural y publicable sin borrar la tensión entre «fiesta» y «festival», que queda indicada en la nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque no aparece Χριστός en el versículo.
  - «Preso» se eligió para δέσμιον por coherencia con el campo semántico de custodia.
  - «Pueblo» traduce aquí ὄχλος en sentido colectivo contextual, mientras la alternativa más literal queda documentada en las decisiones léxicas.
