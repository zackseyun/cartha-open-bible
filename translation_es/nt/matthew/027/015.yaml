revisions:
- from: Ahora, en la fiesta, el gobernador solía[a] soltar al pueblo un preso, al que ellos querían.
  to: En la fiesta, el gobernador tenía por costumbre poner en libertad a la multitud un preso, el que querían.[a]
  rationale: Se ajusta τῷ ὄχλῳ a «la multitud» para reflejar con precisión ὄχλος; se sustituye «soltar» por «poner en libertad» para un registro más judicial y fiel a ἀπολύειν; se elimina la nota innecesaria sobre «solía» y se conserva la alternativa documentada para ἑορτή con una nota breve en español. La sintaxis final mantiene el sentido de selección por parte de la multitud sin añadir interpretación.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:23:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: marco temporal de la fiesta, costumbre habitual del gobernador, liberación de un preso y selección por parte del grupo. Sin embargo, dos elecciones debilitan la alineación fina con el sentido fuente y con el rastro de auditoría inglés: «al pueblo» desplaza ὄχλος de «multitud/gente/crowd» a «pueblo», y «soltar» es posible pero menos preciso que una formulación judicial como «poner en libertad» o «liberar».'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para sonar más exacto y digno en registro bíblico moderno. «Ahora» funciona, aunque «En la fiesta» basta; la nota en «solía» no es necesaria y no preserva la alternativa del inglés sobre «fiesta/festival». «Al que ellos querían» es comprensible, pero «al preso que querían» o «al que querían» sin énfasis innecesario sería más fluido.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal cuestión terminológica es ὄχλος, que debería mantenerse como «multitud» o equivalente cercano, no «pueblo». Para δέσμιος, «preso» o «prisionero» son adecuados; para ἀπολύειν, conviene una opción más jurídica que «soltar».
  issues:
  - severity: medium
    issue: «al pueblo» para τῷ ὄχλῳ
    rationale: ὄχλος en este contexto significa la multitud/la muchedumbre, no «el pueblo» en sentido colectivo-nacional. «Pueblo» introduce un matiz semántico distinto y menos preciso que el audit trail inglés ('the crowd').
  - severity: medium
    issue: «soltar» para ἀπολύειν
    rationale: Aunque puede entenderse, «soltar» suena más coloquial y menos judicial. El contexto es la liberación de custodia; «poner en libertad» o «liberar» preserva mejor la precisión del verbo griego y el registro del pasaje.
  - severity: low
    issue: La nota al pie está anclada en «solía» en vez de preservar la alternativa léxica documentada para ἑορτή
    rationale: El POB inglés preserva la alternativa 'festival' para ἑορτή. La nota española actual explica un matiz ya bien expresado por «solía», pero no refleja la alternativa fuente relevante.
  revised_spanish_text: En la fiesta, el gobernador tenía por costumbre poner en libertad a la multitud un preso, el que querían.[a]
  revised_footnotes:
