review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido general del griego: Pilato ve que sus esfuerzos no logran nada, que el desorden aumenta, toma agua, se lava las manos públicamente y declara su supuesta inocencia. También preserva acertadamente «esta sangre» sin añadir «de este hombre». Sin embargo, «ustedes verán» en español queda demasiado opaco y no comunica suficientemente el valor idiomático de ὑμεῖς ὄψεσθε, que en este contexto apunta a «encárguense ustedes / ustedes mismos verán qué hacen / ustedes asumirán esto».'
  spanish_quality_summary: El español es claro y digno. «Motín» es defendible, aunque algo más fuerte que «alboroto/disturbio». La frase principal fluye bien. El problema principal de legibilidad está en «ustedes verán», que en español moderno puede sonar truncado o meramente predictivo, sin el matiz de responsabilidad. Una leve explicitación mejora la naturalidad sin traicionar el griego.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se mantiene adecuadamente «inocente», «agua», «multitud» y «sangre». La decisión de conservar «esta sangre» coincide con la revisión auditada en inglés. La única tensión léxica relevante es ὑμεῖς ὄψεσθε, donde conviene una formulación española más idiomática.
  issues:
  - severity: medium
    issue: «ustedes verán» es demasiado ambiguo para ὑμεῖς ὄψεσθε en este contexto
    rationale: Aunque el griego literal permite «verán», el uso idiomático aquí señala que la multitud debe hacerse cargo del asunto. En español, «ustedes verán» puede entenderse, pero queda menos claro y menos natural en un contexto judicial. «Ustedes mismos verán» conserva la forma cercana al literal y mejora el énfasis del pronombre ὑμεῖς.
  - severity: low
    issue: La nota b puede afinarse para reflejar mejor el énfasis de ὑμεῖς
    rationale: Ya explica el sentido posible de responsabilidad, pero puede presentarlo con más precisión si el texto se revisa a «ustedes mismos verán».
