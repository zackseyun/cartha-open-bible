  rationale: Se hace una reparación menor para que ὑμεῖς ὄψεσθε suene natural y comprensible en español sin perder su cercanía al literal ni la ambigüedad contextual. «Ustedes mismos verán» refleja mejor el énfasis de ὑμεῖς y evita que «ustedes verán» suene demasiado elíptico.
