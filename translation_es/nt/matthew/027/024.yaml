- from: 'Entonces, cuando Pilato vio que no ganaba nada, sino que más bien se estaba produciendo un motín, tomó agua y se lavó las manos delante de la multitud, diciendo: «Soy inocente de esta sangre[a]; ustedes verán[b]».'
