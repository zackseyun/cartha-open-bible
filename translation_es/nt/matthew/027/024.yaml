  text: ἰδὼν δὲ ὁ Πιλᾶτος ὅτι οὐδὲν ὠφελεῖ ἀλλὰ μᾶλλον θόρυβος γίνεται λαβὼν ὕδωρ ἀπενίψατο τὰς χεῖρας ⸀ἀπέναντι τοῦ ὄχλου λέγων· Ἀθῷός εἰμι ἀπὸ τοῦ ⸀αἵματος τούτου· ὑμεῖς ὄψεσθε.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/024.yaml
  text: So when Pilate saw that he was gaining nothing[a], but rather that a riot was developing, he took water and washed his hands before the crowd, saying, “I am innocent of this blood[c][b]; you yourselves will see to it.”
  footnotes:
  - marker: a
    text: Or 'an uproar was arising' or 'a disturbance was happening.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'I am innocent from this blood.' The expression means freedom from responsibility for a person's death.
    reason: lexical_alternative
  - marker: c
    text: Or 'see to it yourselves'; literally 'you will see.'
    reason: lexical_alternative
