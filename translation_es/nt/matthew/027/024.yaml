    text: 'Literalmente: «de esta sangre». La expresión indica exención de responsabilidad por la muerte de una persona.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vean ustedes mismos»; literalmente: «ustedes verán». Puede implicar: «ustedes asumirán la responsabilidad» o «ustedes se encargarán de ello».'
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para que ὑμεῖς ὄψεσθε suene natural y comprensible en español sin perder su cercanía al literal ni la ambigüedad contextual. «Ustedes mismos verán» refleja mejor el énfasis de ὑμεῖς y evita que «ustedes verán» suene demasiado elíptico.
