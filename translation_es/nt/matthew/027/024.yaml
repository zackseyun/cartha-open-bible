translation:
  language: es
  text: 'Entonces, cuando Pilato vio que no ganaba nada, sino que más bien se estaba produciendo un motín, tomó agua y se lavó las manos delante de la multitud, diciendo: «Soy inocente de esta sangre[a]; ustedes mismos verán[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «de esta sangre». La expresión indica exención de responsabilidad por la muerte de una persona.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «vean ustedes mismos»; literalmente: «ustedes verán». Puede implicar: «ustedes asumirán la responsabilidad» o «ustedes se encargarán de ello».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν δὲ
  english_pob_choice: So when ... saw
  chosen_spanish: Entonces, cuando ... vio
  alternatives_spanish:
  - Pero cuando ... vio
  - Ahora, cuando ... vio
  lexicon: BDAG
  rationale: La construcción participial con δέ introduce el siguiente paso narrativo. «Entonces, cuando» expresa bien la transición secuencial sin forzar un contraste que el contexto no exige.
- source_word: οὐδὲν ὠφελεῖ
  english_pob_choice: he was gaining nothing
  chosen_spanish: no ganaba nada
  alternatives_spanish:
  - no estaba logrando nada
  - no estaba consiguiendo nada
  lexicon: BDAG
  rationale: El sentido es que la intervención de Pilato resultaba inútil. «No ganaba nada» es natural en español y conserva la idea de falta de provecho/eficacia.
- source_word: ἀλλὰ μᾶλλον θόρυβος γίνεται
  english_pob_choice: but rather that a riot was developing
  chosen_spanish: sino que más bien se estaba produciendo un motín
  alternatives_spanish:
  - sino que más bien surgía un disturbio
  - sino que más bien estaba aumentando el alboroto
  lexicon: BDAG
  rationale: θόρυβος puede abarcar tumulto, alboroto, disturbio o motín. En este contexto público y judicial, «motín» comunica con fuerza la escalada de desorden; «se estaba produciendo» refleja el aspecto en progreso de γίνεται.
- source_word: λαβὼν ὕδωρ
  english_pob_choice: he took water
  chosen_spanish: tomó agua
  alternatives_spanish:
  - tomando agua
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. En español, el verbo finito «tomó» reproduce con claridad la secuencia narrativa.
- source_word: ἀπενίψατο τὰς χεῖρας
  english_pob_choice: washed his hands
  chosen_spanish: se lavó las manos
  alternatives_spanish:
  - se enjuagó las manos
  - lavó sus manos
  lexicon: BDAG
  rationale: El verbo significa lavarse o lavar algo para quitar lo adherido. «Se lavó las manos» es la forma natural y preserva el gesto simbólico.
- source_word: ἀπέναντι τοῦ ὄχλου
  english_pob_choice: before the crowd
  chosen_spanish: delante de la multitud
  alternatives_spanish:
  - ante la multitud
  - en presencia de la multitud
  lexicon: BDAG
  rationale: La frase señala visibilidad pública y carácter solemne del gesto. «Delante de la multitud» comunica bien esa exposición ante el pueblo reunido.
- source_word: Ἀθῷός εἰμι
  english_pob_choice: I am innocent
  chosen_spanish: Soy inocente
  alternatives_spanish:
  - Soy inocente de culpa
  - Soy libre de culpa
  lexicon: BDAG
  rationale: Ἀθῷος expresa inocencia o ausencia de responsabilidad legal. «Soy inocente» es la equivalencia más clara y directa en el registro judicial del pasaje.
- source_word: ἀπὸ τοῦ αἵματος τούτου
  english_pob_choice: I am innocent of this blood
  chosen_spanish: de esta sangre
  alternatives_spanish:
  - de la sangre de este hombre
  - de la muerte de este hombre
  lexicon: BDAG
  rationale: El griego dice literalmente «de esta sangre» y funciona como expresión de exención de responsabilidad por una muerte. Se conserva la formulación breve para no borrar la tensión textual; el sentido idiomático queda implícito en el contexto.
- source_word: ὑμεῖς ὄψεσθε
  english_pob_choice: you yourselves will see to it
  chosen_spanish: ustedes verán
  alternatives_spanish:
  - ustedes mismos verán
  - ustedes verán por ello
  lexicon: BDAG
  rationale: El futuro de ὁράω aquí puede ser idiomático y aludir a asumir la responsabilidad, pero el griego literal dice «ustedes verán». Se mantiene la forma breve, dejando abierta la ambigüedad que el contexto permite.
theological_decisions:
- issue: Declaración de inocencia de Pilato
  english_pob_reading: Rendered as Pilate's claimed innocence/responsibility disclaimer without endorsing its truth.
  chosen_spanish_reading: Se presenta como la afirmación reclamada por Pilato, sin resolver su veracidad moral o jurídica.
  alternative_spanish_readings:
  - Podría parafrasearse como una exención de responsabilidad más explícita
  - Podría traducirse de modo más interpretativo como «yo no soy responsable»
  rationale: 'La traducción conserva la tensión narrativa: Pilato declara inocencia, pero el texto no obliga a que la traducción confirme esa inocencia. Mantener la frase directa respeta el peso del discurso y la ambigüedad moral del episodio.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el último texto auditado en inglés, pero revierte al valor literal de «this blood» sin añadir «hombre», conforme a la revisión más reciente. También conserva la tensión entre la literalidad de «verán» y el posible matiz idiomático de responsabilidad que la nota explica.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino, pero este versículo no contiene el tetragrámaton ni un equivalente griego relevante.
  - Se mantiene «multitud» para ὄχλος y «motín» para θόρυβος por claridad contextual.
  - «Soy inocente» conserva el tono judicial del griego Ἀθῷός εἰμι.
  - Las notas al pie distinguen entre la formulación literal y el posible sentido idiomático sin desplazar el texto principal.
