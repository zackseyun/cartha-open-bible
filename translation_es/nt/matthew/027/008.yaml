lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: La partícula introduce una conclusión inferida de lo narrado antes; «Por eso» conserva la relación resultativa de manera natural en español sin perder el vínculo lógico.
- source_word: ἐκλήθη
  english_pob_choice: has been called
  chosen_spanish: ha sido llamado
  alternatives_spanish:
  - fue llamado
  - se le ha llamado
  lexicon: BDAG
  rationale: El aoristo pasivo de καλέω indica el acto de nombrar; el perfecto perifrástico en español expresa que ese nombre quedó establecido y sigue vigente, en armonía con «hasta el día de hoy».
- source_word: ὁ ἀγρὸς ἐκεῖνος
  english_pob_choice: that field
  chosen_spanish: aquel campo
  alternatives_spanish:
  - ese campo
  - ese terreno
  lexicon: BDAG
  rationale: ἀγρός significa «campo» y ἐκεῖνος aporta distancia demostrativa; «aquel» reproduce mejor esa deixis que un simple «ese», y mantiene el sustantivo principal de la palabra repetida en el nombre.
- source_word: Ἀγρὸς Αἵματος
  english_pob_choice: Field of Blood
  chosen_spanish: Campo de Sangre
  alternatives_spanish:
  - Campo Sangriento
  - Campo de la Sangre
  lexicon: BDAG
  rationale: 'Se conserva la estructura nominal del nombre propio: ἀγρός + genitivo αἵματος. «Campo de Sangre» es transparente en español y mantiene la fuerza del apelativo sin suavizarla ni interpretarla.'
- source_word: αἵματος
  english_pob_choice: Blood
  chosen_spanish: Sangre
  alternatives_spanish:
  - la sangre
  lexicon: BDAG
  rationale: El genitivo singular αἵματος forma parte del topónimo; en español, la mayúscula interna en «Sangre» ayuda a señalar que integra el nombre propio, no una referencia meramente descriptiva.
- source_word: ἕως τῆς σήμερον
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta el presente día
  lexicon: BDAG
  rationale: La expresión temporal idiomática señala que el nombre permanecía en uso al tiempo de la narración; «hasta el día de hoy» es natural, precisa y equivalente en registro.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa concordan de cerca; no hay revisiones sustantivas aplicadas en el audit trail, y la única cuestión de estilo es la elección entre un demostrativo más distal («aquel») y uno más cercano («ese») para reflejar ἐκεῖνος.
  spanish_consistency_notes:
  - Se usa «campo» de forma consistente para ἀγρός, manteniendo la repetición del nombre.
  - «Sangre» se capitaliza dentro del topónimo para reflejar que forma parte del nombre propio.
  - La cola temporal se vierte con una fórmula idiomática española equivalente a «to this day».
