translation:
  language: es
  text: 'diciendo: «He pecado por haber entregado[a] sangre inocente». Pero ellos dijeron: «¿Qué nos importa a nosotros? Tú verás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «habiendo entregado sangre inocente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἥμαρτον
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Pecé
  lexicon: BDAG
  rationale: El aoristo expresa la confesión del hecho culpable; en español, «He pecado» comunica de forma natural una culpa reconocida que permanece vigente, sin añadir paráfrasis innecesaria.
- source_word: παραδοὺς
  english_pob_choice: by betraying
  chosen_spanish: al haber entregado
  alternatives_spanish:
  - traicionando
  - habiendo traicionado
  - al haber traicionado
  lexicon: BDAG
  rationale: La idea causal/instrumental del participio aoristo se mantiene con una construcción de infinitivo compuesto. Se elige «entregado» para conservar el campo semántico de παραδίδωμι, mientras que la traición queda implícita por el contexto narrativo de Judas.
- source_word: αἷμα ἀθῷον
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - la sangre de un inocente
  - sangre de un hombre inocente
  lexicon: BDAG
  rationale: La expresión griega es idiomática y bíblica; «sangre inocente» es la equivalencia más natural en español y preserva el peso legal-moral del giro sin explicitar un referente que el texto deja implícito.
- source_word: Τί πρὸς ἡμᾶς;
  english_pob_choice: What is that to us?
  chosen_spanish: ¿Qué nos importa a nosotros?
  alternatives_spanish:
  - ¿Qué tiene que ver eso con nosotros?
  - ¿Qué es eso para nosotros?
  lexicon: BDAG
  rationale: La pregunta griega expresa desentendimiento y rechazo de responsabilidad. «¿Qué nos importa a nosotros?» reproduce bien ese tono despectivo y suena idiomático en español.
- source_word: σὺ ὄψῃ
  english_pob_choice: You see to it
  chosen_spanish: Tú verás
  alternatives_spanish:
  - Tú verás a eso
  - Ocúpate tú de eso
  - Tú te encargas
  lexicon: BDAG
  rationale: El futuro medio λειτουργa aquí como una salida brusca y responsabilizadora. «Tú verás» conserva la fuerza coloquial de desentenderse, y en español puede sonar incluso más natural que una traducción más literal.
theological_decisions:
- issue: Referencia implícita de la sangre inocente
  english_pob_reading: Keep the object implicit as 'innocent blood' without adding 'Jesus' or 'an innocent man' to the main text.
  chosen_spanish_reading: Mantener implícita la referencia con «sangre inocente», sin añadir «Jesús» ni «de un inocente» en el texto principal.
  alternative_spanish_readings:
  - He pecado al haber entregado la sangre de un inocente
  - He pecado al haber entregado sangre inocente de Jesús
  rationale: El griego conserva el giro idiomático y no explicita el referente. La traducción española debe preservar esa tensión y no resolverla por explicación, para respetar la primacía del texto fuente.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; no ampliar el texto más allá de lo que el griego dice.'
- issue: Tono dismissivo de σὺ ὄψῃ
  english_pob_reading: You see to it
  chosen_spanish_reading: Tú verás
  alternative_spanish_readings:
  - Tú verás por ello
  - Eso te toca a ti
  - Ocúpate tú de eso
  rationale: En contexto, la frase no es una simple predicción sino un rechazo de responsabilidad. «Tú verás» reproduce bien esa función pragmática en español, sin perder la forma breve y cortante del original.
  doctrine_reference: Contextual idiom recognition in translation; preserve pragmatic force without flattening the Greek into a paraphrase.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió «You see to it» por encima de «You will see to it», entendiendo σὺ ὄψῃ como una fórmula idiomática de desentendimiento. La versión española adopta una solución equivalente («Tú verás») que conserva ese matiz.
  spanish_consistency_notes:
  - Se usa «sangre inocente» de manera consistente con la decisión inglesa y con el idioma bíblico español natural.
  - Se evita introducir «Jesús» en el texto principal para no resolver una referencia implícita que el griego deja abierta.
  - «Tú verás» mantiene el tono abrupto y coloquial del desentendimiento sin caer en calco rígido.
