translation:
  language: es
  text: Y José tomó el cuerpo y lo envolvió[a] en una sábana de lino limpia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo envolvió a él». El pronombre griego es neutro y se refiere gramaticalmente a «el cuerpo», aunque también puede traducirse según el referente personal, Jesús.
    reason: lexical_alternative
  - marker: b
    text: O «en una mortaja de lino limpia». El término griego σινδών puede referirse a un paño de lino usado como lienzo funerario.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ λαβὼν
  english_pob_choice: And Joseph took
  chosen_spanish: Y José tomó
  alternatives_spanish:
  - Entonces José tomó
  - Y José, habiendo tomado
  lexicon: BDAG
  rationale: El participio aoristo λαβών expresa una acción previa a la principal; en español narrativo, «tomó» comunica con naturalidad la secuencia sin sobrecargar el estilo. «Y» conserva el enlace narrativo de καί, y se omite una forma perifrástica más pesada porque el contexto ya muestra la sucesión de acciones.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - su cuerpo
  - el cadáver
  lexicon: BDAG
  rationale: σῶμα significa de manera directa «cuerpo». Se evita «su cuerpo» porque el griego no añade posesivo explícito; «el cadáver» sería más interpretativo y desplazaría el matiz del término.
- source_word: ἐνετύλιξεν
  english_pob_choice: wrapped
  chosen_spanish: lo envolvió
  alternatives_spanish:
  - lo envolvió cuidadosamente
  - lo arrolló
  lexicon: BDAG
  rationale: ἐντυλίσσω significa envolver o enfardar. «Lo envolvió» es la equivalencia natural en español y conserva el acto funerario sin añadir detalle no expresado por el texto.
- source_word: αὐτὸ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - a él
  lexicon: BDAG
  rationale: El pronombre griego es neutro y concuerda con σῶμα; en español, la referencia a «el cuerpo» se expresa con el objeto directo masculino singular «lo». Esto mantiene la relación gramatical sin forzar un possessivo que no aparece en el griego.
- source_word: σινδόνι καθαρᾷ
  english_pob_choice: in a clean linen cloth
  chosen_spanish: en una sábana de lino limpia
  alternatives_spanish:
  - en una tela de lino limpia
  - en un lienzo limpio de lino
  - en una mortaja de lino limpia
  lexicon: BDAG
  rationale: σινδών designa un paño de lino, a menudo funerario. «Sábana de lino» ofrece una imagen clara y natural en español, sin perder la referencia al tejido de enterramiento; «mortaja» es posible pero más cargada de tradición y más específica de lo que el término exige. «Limpia» traduce καθαρᾷ de forma directa.
theological_decisions:
- issue: 'Referente pronominal: «lo» vs. «él»'
  english_pob_reading: The Greek pronoun is neuter ('it'), referring grammatically to 'the body.' English may also render according to the personal referent, Jesus.
  chosen_spanish_reading: «Lo» se mantiene como referente gramatical directo de «el cuerpo», sin cambiarlo a un pronombre personal.
  alternative_spanish_readings:
  - «lo» con referencia personal implícita a Jesús
  - «él»
  rationale: El griego apunta de forma gramatical al sustantivo neutro σῶμα. En español, «lo» conserva ese vínculo formal y evita introducir una personalización que el texto no marca aquí. La identidad de Jesús queda clara por el contexto inmediato, pero no se explicita mediante un pronombre distinto.
  doctrine_reference: Gramática del texto y referencia contextual; no introduce diferencia doctrinal.
translation_notes:
  revision_awareness: Se siguió el paquete de fuente griego SBLGNT y el auditor inglés. No se detectaron revisiones aplicadas en el rastro inglés; se mantuvo la equivalencia óptima con ajuste natural de español para la secuencia participial y el pronombre neutro.
  spanish_consistency_notes:
  - Se preservó el orden narrativo simple con «Y» para καί.
  - «Cuerpo» traduce σῶμα sin añadir posesivo no presente.
  - «Sábana de lino» mantiene el valor funerario de σινδών sin imponer «mortaja» como término obligatorio.
  - El pronombre «lo» refleja el referente inmediato gramatical del texto griego y es compatible con el español bíblico contemporáneo.
