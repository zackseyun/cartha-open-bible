translation:
  language: es
  text: 'Y todo el pueblo respondió[a]: «Que su sangre caiga sobre nosotros y sobre nuestros hijos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el pueblo reunido y hablando en la escena; esta redacción no debe entenderse como una imputación de culpa perpetua a todos los judíos de todas las generaciones.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondiendo
  alternatives_spanish:
  - respondiendo
  - contestando
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona de modo idiomático con εἶπεν para introducir una respuesta. En español, «respondiendo» conserva ese valor sin volver la frase pesada o mecánica.
- source_word: πᾶς ὁ λαὸς
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la multitud
  lexicon: BDAG
  rationale: La expresión es colectiva y se refiere al conjunto de los presentes en la escena. «Todo el pueblo» preserva esa fuerza colectiva con un término natural en español y fiel al griego λαός.
- source_word: Τὸ αἷμα αὐτοῦ
  english_pob_choice: His blood
  chosen_spanish: Su sangre
  alternatives_spanish:
  - La sangre de él
  - Su sangre derramada
  lexicon: BDAG
  rationale: La construcción es idiomática y breve. «Su sangre» reproduce la concisión del griego; el matiz judicial de responsabilidad por la muerte queda implícito, como en la fuente, sin expandirse interpretativamente en el texto principal.
- source_word: ἐφ’ ἡμᾶς
  english_pob_choice: be on us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - caiga sobre nosotros
  - que esté sobre nosotros
  lexicon: BDAG
  rationale: El griego es elíptico; en español la preposición simple puede sostener la fuerza imprecatoria sin añadir un verbo que no está en el original. «Sobre nosotros» mantiene la paralelidad con la segunda cláusula.
- source_word: ἐπὶ τὰ τέκνα ἡμῶν
  english_pob_choice: and on our children
  chosen_spanish: y sobre nuestros hijos
  alternatives_spanish:
  - y sobre nuestros descendientes
  - y sobre nuestros hijos e hijas
  lexicon: BDAG
  rationale: τέκνα significa de manera natural «hijos/niños»; «hijos» es la forma más directa y fiel en español. Se conserva la repetición de ἐπί para reflejar el paralelismo del griego.
theological_decisions:
- issue: Lectura antijudía o de culpa perpetua a partir de πᾶς ὁ λαός
  english_pob_reading: Translate the phrase straightforwardly as the narrative's immediate crowd-level collective statement, 'all the people,' without expanding it into an ethnic or transhistorical claim.
  chosen_spanish_reading: Traducir la frase de manera directa como la declaración colectiva de los presentes en la escena, sin convertirla en una acusación étnica o transhistórica.
  alternative_spanish_readings:
  - todo el pueblo
  - toda la multitud
  rationale: La traducción debe conservar el alcance narrativo inmediato del griego y, al mismo tiempo, evitar que el lector infiera una culpa perpetua no expresada por el versículo. La nota aclara ese límite sin suavizar la redacción del texto.
  doctrine_reference: Principio de primacía del original; preservar la tensión teológica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] exactamente en el texto principal junto al elemento al que remite la nota. No se introdujeron otros marcadores ni notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque el versículo no contiene el nombre divino.
  - Se eligió «pueblo» en lugar de «multitud» para reflejar λαός y la redacción narrativa colectiva.
  - Se conservó la repetición de «sobre» para reproducir el paralelismo de ἐφ’ ἡμᾶς / ἐπὶ τὰ τέκνα ἡμῶν.
  - No se añadió un verbo explícito en la primera cláusula para no sobreinterpretar el griego elíptico.
