translation:
  language: es
  text: Él fue a Pilato y pidió el cuerpo de Jesús. Entonces Pilato ordenó que le fuera entregado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ordenó que le fuera dado» o «ordenó que se le entregara». El infinitivo griego admite varias traducciones cercanas aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Este hombre
  - Este
  lexicon: BDAG
  rationale: El demostrativo vuelve a José de Arimatea, mencionado en el contexto inmediato; en español narrativo natural, el pronombre explícito 'Él' mantiene la referencia sin sonar forzado.
- source_word: προσελθὼν
  english_pob_choice: went to
  chosen_spanish: fue a
  alternatives_spanish:
  - se acercó a
  - se presentó ante
  lexicon: BDAG
  rationale: '''Fue a'' comunica el movimiento hacia Pilato con naturalidad en español y refleja adecuadamente la acción previa al verbo principal.'
- source_word: ᾐτήσατο
  english_pob_choice: asked for
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - pidió que le dieran
  lexicon: BDAG
  rationale: El medio de αἰτέω aquí expresa solicitar algo; 'pidió' es la forma idiomática y fiel en español para un objeto concreto como 'el cuerpo de Jesús'.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cadáver
  lexicon: BDAG
  rationale: '''Cuerpo'' reproduce el sentido básico de σῶμα sin volver más clínico o duro el pasaje; ''cadáver'' sería posible pero añade una tonalidad más marcada que el griego no exige.'
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Enseguida
  lexicon: BDAG
  rationale: '''Entonces'' funciona como conector narrativo temporal claro y natural en español.'
- source_word: ἐκέλευσεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: BDAG
  rationale: κελεύω expresa dar una orden; 'ordenó' conserva el tono administrativo y conciso del relato.
- source_word: ἀποδοθῆναι
  english_pob_choice: to be given to him
  chosen_spanish: que le fuera entregado
  alternatives_spanish:
  - que le fuera dado
  - que se le entregara
  - que le fuera entregado a él
  lexicon: BDAG
  rationale: El infinitivo pasivo de ἀποδίδωμι admite 'dar' o 'entregar'; 'entregado' preserva la idea de transferencia autorizada por Pilato y suena natural en español. Se evita sobrecargar con un complemento explícito innecesario, ya que el destinatario queda claro por el contexto.
translation_notes:
  revision_awareness: El texto español sigue de cerca la forma revisada del inglés POB, pero ajusta la última cláusula para expresar con naturalidad en español la pasiva con beneficiario implícito ('le fuera entregado'), manteniendo el rango semántico de ἀποδοθῆναι. No se introduce una lectura doctrinal nueva ni una distinción textual adicional; la variación es solo léxica y sintáctica.
  spanish_consistency_notes:
  - Se conserva 'Jesús' para Ἰησοῦς conforme al criterio del proyecto.
  - Se usa 'cuerpo' y no 'cadáver' para σῶμα, siguiendo la decisión inglesa de evitar una formulación excesivamente clínica.
  - '''Entregado'' mantiene la idea de transferencia/cesión implícita en ἀποδοθῆναι sin añadir interpretaciones ajenas al contexto.'
  - 'La puntuación y el orden de cláusulas siguen el flujo narrativo del griego: acción previa, pedido, consecuencia temporal, orden de Pilato.'
