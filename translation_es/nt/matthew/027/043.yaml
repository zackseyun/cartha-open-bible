translation:
  language: es
  text: 'Ha confiado en Dios[a]; que Dios lo rescate ahora, si lo quiere, pues dijo[b]: «Soy el Hijo de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si se complace en él». La redacción recuerda el Salmo 22:8, donde resalta la idea del favor divino.'
    reason: alternative_reading
  - marker: b
    text: Este sarcasmo evoca de manera cercana el Salmo 22:8, vinculando la burla contra Jesús con el justo sufriente de ese salmo.
    reason: cross_reference
lexical_decisions:
- source_word: πέποιθεν
  english_pob_choice: has trusted
  chosen_spanish: ha confiado
  alternatives_spanish:
  - confía
  - ha puesto su confianza
  lexicon: BDAG
  rationale: El perfecto de πέποιθεν expresa un estado asentado a partir de una confianza previa. En español, «ha confiado» conserva bien ese valor resultativo sin forzar una forma más pesada. «Confía» suavizaría el aspecto, y «ha puesto su confianza» es correcto pero menos natural.
- source_word: ἐπὶ τὸν θεόν
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - sobre Dios
  lexicon: BDAG
  rationale: Con πείθω/πέποιθα, ἐπί + acusativo expresa confianza dirigida a alguien. En español, la equivalencia natural y transparente es «en Dios»; «sobre Dios» sería ajeno al uso normal y menos fiel al valor idiomático.
- source_word: ῥυσάσθω
  english_pob_choice: let God rescue him
  chosen_spanish: que Dios lo rescate
  alternatives_spanish:
  - que Dios lo libre
  - que Dios lo salve
  lexicon: BDAG
  rationale: El imperativo aoristo medio de ῥύομαι pide una acción puntual de librar o rescatar del peligro. «Rescate» mantiene ese matiz de intervención concreta. «Libre» es posible, pero más amplio; «salve» es demasiado general en español.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  lexicon: BDAG
  rationale: El adverbio marca urgencia inmediata dentro de la burla. «Ahora» reproduce esa inmediatez de forma simple y natural.
- source_word: εἰ θέλει αὐτόν
  english_pob_choice: if he wants him
  chosen_spanish: si lo quiere
  alternatives_spanish:
  - si lo desea
  - si se complace en él
  - si lo favorece
  lexicon: BDAG
  rationale: θέλω significa primariamente querer, desear o querer para sí. En el texto griego la lectura más directa es «si lo quiere». Se mantiene así la transparencia al original, mientras la alusión a Salmo 22:8 queda registrada aparte. «Se complace en él» o «lo favorece» interpretan más de lo que el griego dice explícitamente.
- source_word: εἶπεν γὰρ
  english_pob_choice: for he said
  chosen_spanish: pues dijo
  alternatives_spanish:
  - porque dijo
  - ya que dijo
  lexicon: BDAG
  rationale: La partícula γάρ introduce la razón del dicho burlón. «Pues dijo» conserva la relación explicativa sin volver la frase pesada.
- source_word: ὅτι Θεοῦ εἰμι υἱός
  english_pob_choice: I am the Son of God
  chosen_spanish: Soy Hijo de Dios
  alternatives_spanish:
  - Soy el Hijo de Dios
  - Soy un hijo de Dios
  lexicon: BDAG
  rationale: La construcción griega es predicativa y, en el contexto mateano, funciona como título cristológico. En español, «Hijo de Dios» preserva el título sin añadir un artículo que el griego no expresa de modo explícito. Se evita «un hijo de Dios» porque debilita el sentido cristológico; «el Hijo de Dios» es posible interpretativamente, pero aquí la redacción mantiene más cerca la forma griega.
theological_decisions:
- issue: Cómo reflejar la posible resonancia con Salmo 22:8 en εἰ θέλει αὐτόν
  english_pob_reading: if he wants him
  chosen_spanish_reading: si lo quiere
  alternative_spanish_readings:
  - si se complace en él
  - si lo favorece
  rationale: El griego de Mateo permite oír el eco del Salmo 22:8, pero el verbo presente es θέλει, cuyo sentido más directo es querer/desear. La traducción principal conserva ese valor y deja la resonancia intertextual para la nota, en vez de resolverla en el texto principal.
  doctrine_reference: Principio de primacía del texto original; preservación de la tensión intertextual
- issue: Cómo traducir Θεοῦ εἰμι υἱός sin perder el valor titular
  english_pob_reading: I am the Son of God
  chosen_spanish_reading: Soy Hijo de Dios
  alternative_spanish_readings:
  - Soy el Hijo de Dios
  - Soy un hijo de Dios
  rationale: En Mateo esta afirmación no es una filiación genérica, sino una proclamación con carga cristológica. El español sin artículo («Soy Hijo de Dios») conserva la fuerza titular y sigue de cerca la estructura griega, mientras evita introducir una formulación más dogmática de la que el verso por sí solo exige.
  doctrine_reference: Cristología mateana; lectura titular frente a lectura indefinida
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que hizo explícito el sujeto «Dios» en «let God rescue him now». También conserva la decisión revisada de mantener el verbo de θέλω en su sentido directo («si lo quiere») y no en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por «SEÑOR», conforme al criterio POB.
  - Se usa «rescate» para ῥύομαι por su precisión de intervención concreta frente a peligro.
  - Se conserva «Hijo de Dios» con mayúsculas por tratarse de un título cristológico en contexto.
  - La puntuación con dos puntos introduce la cita directa de forma natural en español.
  - La nota a distingue la lectura alternativa ligada al eco del Salmo 22:8 sin desplazar la traducción principal.
