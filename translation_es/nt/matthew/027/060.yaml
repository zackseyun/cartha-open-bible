translation:
  language: es
  text: y lo puso en su propio sepulcro nuevo[a], que había labrado en la roca. Y, después de hacer rodar una gran piedra hasta la entrada del sepulcro, se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la puerta del sepulcro». El griego usa lenguaje de «puerta/entrada»; se eligió «entrada» por claridad en el contexto de un sepulcro excavado en roca.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκεν
  english_pob_choice: placed
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo depositó
  lexicon: BDAG
  rationale: τίθημι aquí expresa la acción simple de poner el cuerpo en el sepulcro. «Lo puso» conserva esa simplicidad y suena natural en español; «colocó» o «depositó» serían posibles, pero añaden un matiz más técnico o formal.
- source_word: μνημείῳ / μνημείου
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - túmulo funerario
  lexicon: BDAG
  rationale: En este contexto funerario de sepultura en roca, μνημεῖον designa un lugar de entierro. «Sepulcro» comunica bien esa realidad en español bíblico moderno y mantiene la dignidad del pasaje; «tumba» también sería viable, pero «sepulcro» encaja mejor con el estilo narrativo tradicional sin volverse arcaizante.
- source_word: καινῷ
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - recién hecho
  - sin usar
  lexicon: BDAG
  rationale: καινός significa «nuevo». Se conserva «nuevo» sin introducir la implicación de «sin usar», que en la fuente no se explicita.
- source_word: αὐτοῦ
  english_pob_choice: his own
  chosen_spanish: su propio
  alternatives_spanish:
  - su
  - de él
  lexicon: BDAG
  rationale: El posesivo en griego marca pertenencia y el contexto hace claro que el sepulcro era de José. «Su propio» refleja ese énfasis posesivo de forma idiomática en español.
- source_word: ἐλατόμησεν
  english_pob_choice: had cut
  chosen_spanish: había labrado
  alternatives_spanish:
  - había cortado
  - había tallado
  - había excavado
  lexicon: BDAG
  rationale: λατομέω se usa para labrar o tallar roca, especialmente en trabajos de cantera. «Había labrado» transmite mejor la idea de un sepulcro abierto en la roca que «había cortado», y evita una literalidad poco natural.
- source_word: ἐν τῇ πέτρᾳ
  english_pob_choice: into the rock
  chosen_spanish: en la roca
  alternatives_spanish:
  - dentro de la roca
  - en piedra
  lexicon: BDAG
  rationale: Aunque la versión inglesa opta por «into the rock» para expresar el sentido espacial, el griego dice literalmente «en la roca». En español, «había labrado en la roca» comunica adecuadamente el sepulcro excavado sin forzar la preposición.
- source_word: προσκυλίσας
  english_pob_choice: after rolling
  chosen_spanish: después de hacer rodar
  alternatives_spanish:
  - tras rodar
  - habiendo rodado
  lexicon: BDAG
  rationale: El participio aoristo indica una acción anterior al verbo principal. «Después de hacer rodar» expresa con claridad la secuencia narrativa en español.
- source_word: λίθον μέγαν
  english_pob_choice: a large stone
  chosen_spanish: una gran piedra
  alternatives_spanish:
  - una piedra grande
  - una piedra enorme
  lexicon: BDAG
  rationale: μέγας puede significar «grande» o «gran». «Una gran piedra» es natural, solemne y fiel al texto.
- source_word: τῇ θύρᾳ τοῦ μνημείου
  english_pob_choice: to the entrance of the tomb
  chosen_spanish: hasta la entrada del sepulcro
  alternatives_spanish:
  - a la puerta del sepulcro
  - contra la entrada del sepulcro
  lexicon: BDAG
  rationale: θύρα puede significar «puerta» o «entrada». Siguiendo el criterio del POB en inglés, se prefiere «entrada» por claridad en un sepulcro tallado en roca; «hasta» refleja el movimiento del rodamiento de la piedra hacia ese punto.
- source_word: ἀπῆλθεν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se marchó
  - partió
  lexicon: BDAG
  rationale: ἀπέρχομαι indica simplemente partida. «Se fue» es la forma más natural y directa en español, sin perder el sentido narrativo.
translation_notes:
  revision_awareness: El texto griego y el rastro auditado en inglés muestran acuerdo alto y no registran revisiones sustantivas; la traducción española sigue esa lectura estable, manteniendo la secuencia narrativa y la distinción contextual de θύρα como «entrada».
  spanish_consistency_notes:
  - Se mantuvo «sepulcro» de manera consistente para μνημεῖον en este contexto funerario.
  - 'Se prefirió un registro bíblico moderno y digno: «lo puso», «había labrado», «se fue».'
  - La nota al pie preserva la alternativa léxica relevante para θύρα sin duplicar el sentido principal del texto.
