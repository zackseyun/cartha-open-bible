  source_alignment_summary: 'El borrador español transmite fielmente el sentido del griego: José puso el cuerpo en su sepulcro nuevo, previamente labrado en la roca, hizo rodar una gran piedra hasta la entrada del sepulcro y luego se fue. La secuencia verbal y las relaciones sintácticas del original están bien preservadas.'
  spanish_quality_summary: El español es natural, claro y digno. «Sepulcro», «había labrado en la roca» y «después de hacer rodar» suenan bien en registro bíblico moderno sin caer en arcaísmo excesivo. La puntuación y fluidez son adecuadas.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. «Sepulcro» para μνημεῖον y «entrada» para θύρα están bien justificadas. El uso de «su propio» refleja correctamente el matiz posesivo de αὐτοῦ.
  issues:
  - severity: low
    issue: «Lo puso» es algo más coloquial que «lo colocó» o «lo depositó».
    rationale: Sin embargo, sigue siendo plenamente fiel a ἔθηκεν y la propia auditoría léxica documenta que la sencillez del verbo es intencional. No requiere cambio.
  - severity: low
    issue: «Hasta la entrada del sepulcro» interpreta el movimiento hacia el punto de cierre.
    rationale: Es una opción defendible y coherente con la nota al pie del inglés. Aunque «a la entrada» también sería posible, la formulación actual no distorsiona el sentido.
