    reason: alternative_reading
  - marker: b
    text: 'O: «que había sido hecho discípulo por Jesús» o «que también era discípulo de Jesús».'
    reason: alternative_reading
  revision_rationale: Se ajusta el orden de «también él» para reflejar el énfasis de ὃς καὶ αὐτὸς con español más natural. Se reubica la nota [b] al predicado relevante y se sustituye su contenido por alternativas semánticas reales para ἐμαθητεύθη, conforme al expediente inglés, en lugar de comentar una redacción española menos idiomática.
