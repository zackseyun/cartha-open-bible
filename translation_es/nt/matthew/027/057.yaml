revisions:
- from: Al caer la tarde[a], vino un hombre rico de Arimatea, llamado José[b], que él mismo también había llegado a ser discípulo de Jesús.
  to: Al caer la tarde[a], vino un hombre rico de Arimatea, llamado José, que también él había llegado a ser discípulo de Jesús[b].
  rationale: Se ajusta el orden de «también él» para reflejar el énfasis de ὃς καὶ αὐτὸς con español más natural. Se reubica la nota [b] al predicado relevante y se sustituye su contenido por alternativas semánticas reales para ἐμαθητεύθη, conforme al expediente inglés, en lugar de comentar una redacción española menos idiomática.
