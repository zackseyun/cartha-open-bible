translation:
  language: es
  text: Al caer la tarde[a], vino un hombre rico de Arimatea, llamado José, que también él había llegado a ser discípulo de Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando cayó la tarde», «Al anochecer».'
    reason: alternative_reading
  - marker: b
    text: 'O: «que había sido hecho discípulo por Jesús» o «que también era discípulo de Jesús».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  english_pob_choice: Now when evening had come
  chosen_spanish: Al caer la tarde
  alternatives_spanish:
  - Cuando llegó la tarde
  - Cuando ya era tarde
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca transición temporal. «Al caer la tarde» comunica ese cambio de escena de forma natural en español y conserva la idea de un momento ya llegado, sin endurecer la sintaxis.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: BDAG
  rationale: El aoristo simple de ἔρχομαι pide un verbo narrativo directo. «Vino» es natural en español bíblico y mantiene el movimiento hacia la escena.
- source_word: ἄνθρωπος πλούσιος
  english_pob_choice: a rich man
  chosen_spanish: un hombre rico
  alternatives_spanish:
  - un hombre adinerado
  - un hombre muy rico
  lexicon: BDAG
  rationale: La combinación sustantivo-adjetivo se vierte de manera directa y idiomática. «Hombre rico» preserva la fuerza lexical sin añadir matices no requeridos.
- source_word: ἀπὸ Ἁριμαθαίας
  english_pob_choice: from Arimathea
  chosen_spanish: de Arimatea
  alternatives_spanish:
  - procedente de Arimatea
  - de la región de Arimatea
  lexicon: BDAG
  rationale: ἀπό indica origen. «De Arimatea» es la forma más transparente y sobria en español.
- source_word: τοὔνομα Ἰωσήφ
  english_pob_choice: named Joseph
  chosen_spanish: llamado José
  alternatives_spanish:
  - de nombre José
  - cuyo nombre era José
  lexicon: BDAG
  rationale: La expresión apposicional se expresa de forma breve y natural en español. «Llamado José» conserva la función identificadora sin sobrecargar la frase.
- source_word: ὃς καὶ αὐτὸς
  english_pob_choice: who himself also
  chosen_spanish: que él mismo también
  alternatives_spanish:
  - que también él mismo
  - que también él
  lexicon: BDAG
  rationale: 'Ambos elementos añaden énfasis: José no era un caso aislado. «Él mismo también» conserva esa intensificación con orden natural en español.'
- source_word: ἐμαθητεύθη τῷ Ἰησοῦ
  english_pob_choice: had become a disciple of Jesus
  chosen_spanish: había llegado a ser discípulo de Jesús
  alternatives_spanish:
  - había sido hecho discípulo de Jesús
  - era también discípulo de Jesús
  lexicon: BDAG
  rationale: El pasivo de μαθητεύω admite una lectura de ingreso a la condición de discípulo. En español, «había llegado a ser discípulo de Jesús» preserva el valor resultativo sin decidir en exceso entre «ser hecho discípulo» y la mera identificación como discípulo.
theological_decisions:
- issue: Sentido del pasivo ἐμαθητεύθη en relación con Jesús
  english_pob_reading: Joseph had become a disciple of Jesus
  chosen_spanish_reading: José había llegado a ser discípulo de Jesús
  alternative_spanish_readings:
  - José había sido hecho discípulo de Jesús
  - José era también discípulo de Jesús
  rationale: 'El texto identifica a José como perteneciente al grupo de discípulos de Jesús, pero no obliga a precisar el mecanismo. La traducción conserva esa tensión: puede entenderse como entrada a la condición de discípulo o como ser incorporado a esa relación, sin resolverla prematuramente.'
  doctrine_reference: Preservar la tensión teológica y semántica sin sobreespecificar.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó el orden de los elementos enfáticos en ὃς καὶ αὐτὸς para mayor naturalidad sin alterar el sentido. En español, ese énfasis se refleja con «él mismo también», colocado de modo que suene natural y conserve la insistencia del original.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se evitó «SEÑOR» o formulaciones litúrgicas no presentes en el verso.
  - «Discípulo» se conservó para μαθητεύω/μαθητής en línea con el valor relacional del contexto.
  - No se introdujo «Cristo», pues el versículo no lo requiere.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, como exige la validación.
