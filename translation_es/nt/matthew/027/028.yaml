translation:
  language: es
  text: Y después de despojarlo[a], le pusieron una capa escarlata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manto escarlata». El término griego puede referirse más ampliamente a una prenda exterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκδύσαντες
  english_pob_choice: after stripping
  chosen_spanish: despojarlo
  alternatives_spanish:
  - desnudarlo
  - quitarle la ropa
  lexicon: BDAG
  rationale: El aoristo participial expresa una acción anterior a la del verbo principal. «Despojarlo» comunica esa acción de quitarle las vestiduras sin sonar excesivamente técnico o crudo en español, y mantiene bien la relación temporal del griego.
- source_word: χλαμύδα
  english_pob_choice: cloak
  chosen_spanish: capa
  alternatives_spanish:
  - manto
  - capa militar
  - roba
  lexicon: BDAG
  rationale: χλαμύς designa un manto o prenda exterior; en español «capa» es natural y recoge la idea de una vestidura exterior. «Manto» también es posible, pero «capa» transmite mejor la imagen y conserva la ambigüedad amplia del término griego.
- source_word: κοκκίνην
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - roja
  - carmesí
  lexicon: BDAG
  rationale: κόκκινος refiere un rojo intenso. «Escarlata» preserva la viveza del color y coincide con el registro bíblico tradicional, sin debilitar el matiz cromático.
- source_word: περιέθηκαν αὐτῷ
  english_pob_choice: they put ... on him
  chosen_spanish: le pusieron ...
  alternatives_spanish:
  - le colocaron ...
  - se la pusieron
  lexicon: BDAG
  rationale: El verbo con dativo indica colocar algo sobre alguien. «Le pusieron ...» es la forma más natural en español para expresar la acción directa, sin añadir información que el griego no exige.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Luego
  lexicon: BDAG
  rationale: La conjunción enlaza de manera simple con la escena anterior. «Y» refleja de forma directa la conexión narrativa del griego.
theological_decisions:
- issue: Naturaleza de la prenda en la escena de burla
  english_pob_reading: scarlet cloak
  chosen_spanish_reading: capa escarlata
  alternative_spanish_readings:
  - manto escarlata
  - capa roja
  rationale: El texto griego usa χλαμύς, una prenda exterior que puede corresponder a una capa o manto. «Capa» conserva el valor léxico general sin imponer una lectura más específica de la que el contexto necesita. «Escarlata» mantiene el color intenso señalado por κόκκινος.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto griego SBLGNT y con la lectura auditada en inglés: aoristo participial anterior al verbo principal, χλαμύς como prenda exterior y κόκκινος como rojo intenso/escarlata. No se registran revisiones que alteren la decisión de traducción.'
  spanish_consistency_notes:
  - Se mantuvo «Y» para καί siguiendo la conexión narrativa simple del griego.
  - Se evitó «SEÑOR» o terminología doctrinal ajena porque no aparecen en este versículo.
  - La nota al pie conserva la alternativa léxica principal documentada en la auditoría inglesa.
