  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: burla, retiro de la χλαμύς, nueva colocación de sus ἱμάτια, y traslado con propósito de crucifixión. Sin embargo, dos matices conviene ajustarlos para reflejar mejor la fuerza y la precisión del original y del rastro POB: ἀπήγαγον incluye idea de apartarlo/llevarlo de allí, y ἐξέδυσαν tiene un poco más de fuerza que un simple ''quitaron''.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y exacto con 'se lo llevaron' en vez de 'lo llevaron', y con 'lo despojaron de la capa' para reflejar mejor la acción de quitarle la prenda. 'Vestiduras' es aceptable en registro bíblico y readable; la nota sobre χλαμύς está bien orientada.
  glossary_alignment: No hay términos del glosario principal en juego salvo la consistencia general de estilo. La elección 'capa' para χλαμύς concuerda con la decisión léxica documentada; la alternativa 'manto' en nota también es apropiada. No hay conflicto teológico ni terminológico mayor.
  issues:
  - severity: medium
    issue: '`lo llevaron` atenúa el matiz de ἀπήγαγον'
    rationale: El verbo ἀπάγω normalmente expresa 'llevar(se) away / conducir fuera', no solo 'llevar'. En español, 'se lo llevaron' o 'lo condujeron' conserva mejor el sentido de remoción custodial del lugar.
  - severity: medium
    issue: '`le quitaron la capa` es algo más débil que ἐξέδυσαν'
    rationale: Aunque comprensible, ἐκδύω tiene fuerza de desvestir/despojar. 'Lo despojaron de la capa' refleja mejor la acción sin volverse artificial.
  - severity: low
    issue: La nota dice 'prenda regia de burla'
    rationale: Es entendible, pero 'prenda de burla real' o 'prenda real de burla' sonaría algo más natural; no obstante, el contenido es fiel y no requiere adjudicación compleja.
  revised_spanish_text: Y cuando se habían burlado de él, lo despojaron de la capa[a] y le pusieron sus propias vestiduras, y se lo llevaron para crucificarlo.
