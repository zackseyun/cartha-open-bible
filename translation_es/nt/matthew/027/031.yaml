translation:
  language: es
  text: Y cuando se habían burlado de él, lo despojaron de la capa[a] y le pusieron sus propias vestiduras, y se lo llevaron para crucificarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el manto». χλαμύς designa una prenda exterior, frecuentemente una capa; en este contexto es la prenda de burla real colocada sobre Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνέπαιξαν
  english_pob_choice: had mocked
  chosen_spanish: se habían burlado de él
  alternatives_spanish:
  - lo habían escarnecido
  - se habían mofado de él
  lexicon: BDAG
  rationale: El verbo griego expresa burla cruel y humillante. En español, «burlarse de» comunica bien el sentido de ridiculización y conserva la carga vejatoria; «escarnecer» es más formal pero menos natural para lectura pública moderna.
- source_word: χλαμύδα
  english_pob_choice: the cloak
  chosen_spanish: la capa
  alternatives_spanish:
  - el manto
  - la clámide
  lexicon: BDAG
  rationale: χλαμύς designa una prenda exterior tipo capa o manto. «Capa» es el equivalente más natural y claro en español; «clámide» sería más técnico pero menos transparente para lectores generales.
- source_word: ἐξέδυσαν αὐτὸν τὴν χλαμύδα
  english_pob_choice: they stripped the cloak off him
  chosen_spanish: le quitaron la capa
  alternatives_spanish:
  - le arrancaron la capa
  - lo despojaron de la capa
  lexicon: BDAG
  rationale: ἐκδύω implica quitar una prenda, incluso despojar. En español, «le quitaron la capa» mantiene la acción sin sonar forzado; «despojar» reproduce mejor la fuerza, pero aquí la combinación con la prenda ya comunica claramente la humillación.
- source_word: ἐνέδυσαν αὐτὸν τὰ ἱμάτια αὐτοῦ
  english_pob_choice: put his own clothes on him
  chosen_spanish: le pusieron sus propias vestiduras
  alternatives_spanish:
  - le pusieron su propia ropa
  - lo vistieron con sus prendas
  lexicon: BDAG
  rationale: ἱμάτια es un término amplio para ropa/vestiduras. «Vestiduras» conserva el tono algo más solemne del relato y corresponde al plural del griego; «sus propias» expresa con claridad el contraste con la capa burlona recién retirada.
- source_word: ἱμάτια
  english_pob_choice: clothes
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropa
  - prendas
  lexicon: BDAG
  rationale: Aunque «ropa» es más coloquial, «vestiduras» mantiene dignidad narrativa y sirve bien para un contexto de pasión. No añade contenido extra, pero conserva el registro bíblico sin caer en arcaísmo excesivo.
- source_word: ἀπήγαγον
  english_pob_choice: led him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo llevaron away
  lexicon: BDAG
  rationale: ἀπάγω puede significar llevarse a alguien, conducirlo o apartarlo. Aquí, en contexto de custodia militar y ejecución, «lo llevaron» funciona de modo natural en español y conserva la dirección narrativa; el complemento de propósito en la cláusula siguiente especifica la finalidad.
- source_word: εἰς τὸ σταυρῶσαι
  english_pob_choice: to crucify him
  chosen_spanish: para crucificarlo
  alternatives_spanish:
  - a fin de crucificarlo
  - para llevarlo a la crucifixión
  lexicon: BDAG
  rationale: La construcción con εἰς + infinitivo articular expresa finalidad. «Para crucificarlo» es la forma más idiomática en español y reproduce el valor final sin sobreexplicar.
theological_decisions:
- issue: Preservar la humillación corporal y narrativa de la escena
  english_pob_reading: The verse describes a sequence of mockery, removal of the mock garment, redressing in his own clothes, and leading him away to crucify him.
  chosen_spanish_reading: 'El español conserva la secuencia completa de humillación: se burlaron de él, le quitaron la capa, le pusieron sus propias vestiduras y lo llevaron para crucificarlo.'
  alternative_spanish_readings:
  - lo ridiculizaron y luego lo llevaron a crucificar
  - le hicieron burla y lo sacaron para crucificarlo
  rationale: La escena no es solo traslado; es humillación ritual y física. La redacción elegida mantiene la progresión de acciones sin atenuar la violencia ni la degradación que el griego presenta.
  doctrine_reference: Narrativa de la pasión; humillación de Cristo (cf. Mt 27:27-31)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren revisión sustantiva. Se mantuvo la fuerza de ἐνέπαιξαν como burla cruel, el valor de finalidad de εἰς τὸ σταυρῶσαι y la identificación de χλαμύς como prenda exterior. La principal decisión española fue optar por un registro natural y digno («capa», «vestiduras», «para crucificarlo») sin perder la humillación narrada.
  spanish_consistency_notes:
  - Se usa «capa» para χλαμύς, en línea con la nota lexical y la claridad para lectores hispanos.
  - Se mantiene «sus propias vestiduras» para reflejar el contraste con la prenda de burla y conservar el plural del griego.
  - Se traduce la finalidad con «para crucificarlo», acorde con la construcción griega y el inglés auditado.
  - El tono es reverente pero no arcaizante, consistente con un español bíblico moderno y publicable.
