revisions:
- from: Y cuando se habían burlado de él[a], le quitaron la capa y le pusieron sus propias vestiduras, y lo llevaron para crucificarlo.
  to: Y cuando se habían burlado de él, lo despojaron de la capa[a] y le pusieron sus propias vestiduras, y se lo llevaron para crucificarlo.
  rationale: Se ajusta 'le quitaron' a 'lo despojaron de' para reflejar mejor la fuerza de ἐξέδυσαν, y 'lo llevaron' a 'se lo llevaron' para conservar el matiz de ἀπήγαγον como traslado-apartamiento. Se mantiene 'capa' como equivalente principal de χλαμύς, con 'manto' en nota, y 'vestiduras' por su registro digno y claro en español bíblico moderno.
