  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: existencia de muchas mujeres en la escena, observación a distancia, seguimiento previo de Jesús desde Galilea y servicio continuo a él. Sin embargo, las notas al pie no preservan fielmente las alternativas documentadas en el rastro inglés: la nota [a] debería corresponder a θεωροῦσαι/ἀπὸ μακρόθεν como alternativa a ''miraban desde lejos'', y la nota sobre διακονοῦσαι αὐτῷ (''sirviéndole'' / ''ministrándole'') falta en el texto español. Además, las notas actuales introducen una repartición distinta de los puntos anotados.'
  spanish_quality_summary: El español es claro y natural, con registro digno y legible. 'Había allí muchas mujeres... que miraban desde lejos' suena idiomático. No obstante, la ubicación y contenido de las notas necesitan ajuste, y 'las cuales' puede simplificarse a 'quienes' para una lectura más fluida sin pérdida de sentido.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Jesús' está correcto. 'Sirviéndole' alinea bien con la decisión de traducir διακονοῦσαι como servicio práctico sin tecnicismo eclesiástico; conviene conservar la alternativa 'ministrándole' en nota, como en el POB inglés.
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden a las alternativas léxicas auditadas en inglés.
    rationale: El POB inglés anota (a) una alternativa para 'watching from a distance' y (b) una alternativa para 'serving him'. El borrador español pone dos notas sobre la observación y ninguna sobre 'sirviéndole', alterando el rastro de decisiones.
  - severity: low
    issue: El marcador [a] está anclado en 'mujeres' en vez de en la frase observacional pertinente.
    rationale: La alternativa 'looking on from far away' corresponde semánticamente a 'miraban desde lejos', no a 'mujeres'. Aunque no cambia el sentido principal, conviene anclar la nota donde pertenece.
  - severity: low
    issue: '''Las cuales'' es algo más pesado de lo necesario.'
    rationale: '''Quienes'' comunica la misma relación de manera más natural en español eclesial moderno, preservando la referencia identificadora del relativo sin rigidez.'
  revised_spanish_text: Había allí muchas mujeres, que miraban desde lejos[a], quienes habían seguido a Jesús desde Galilea, sirviéndole[b].
