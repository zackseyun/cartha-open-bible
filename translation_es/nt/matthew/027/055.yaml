translation:
  language: es
  text: Había allí muchas mujeres, que miraban desde lejos[a], quienes habían seguido a Jesús desde Galilea, sirviéndole[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «observando desde una distancia»; o «mirando desde lejos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ministrándole». El verbo griego puede denotar servicio práctico o apoyo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ
  english_pob_choice: Now there were
  chosen_spanish: Había allí
  alternatives_spanish:
  - Y había allí
  - Entonces había allí
  lexicon: BDAG
  rationale: Ἦσαν expresa existencia en imperfecto y δέ funciona como conector leve; en español, 'Había allí' comunica naturalmente la escena sin forzar contraste ni añadir contenido temporal excesivo.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allí mismo
  lexicon: BDAG
  rationale: El adverbio locativo señala presencia en el lugar de la crucifixión. 'Allí' es natural y fiel al valor locativo.
- source_word: γυναῖκες πολλαὶ
  english_pob_choice: many women
  chosen_spanish: muchas mujeres
  alternatives_spanish:
  - varias mujeres
  - numerosas mujeres
  lexicon: BDAG
  rationale: La combinación adjetival es directa; 'muchas mujeres' preserva de modo claro número y género sin matiz añadido.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - desde un lugar lejano
  lexicon: BDAG
  rationale: La frase denota separación espacial. 'Desde lejos' es idiomático en español y conserva la observación a distancia.
- source_word: θεωροῦσαι
  english_pob_choice: watching
  chosen_spanish: que miraban
  alternatives_spanish:
  - que observaban
  - que contemplaban
  lexicon: BDAG
  rationale: El participio presente describe una acción visual continua. 'Que miraban' reproduce la observación sostenida de forma natural; el matiz de 'observaban' queda como alternativa válida.
- source_word: αἵτινες
  english_pob_choice: who
  chosen_spanish: las cuales
  alternatives_spanish:
  - quienes
  - quien
  lexicon: BDAG
  rationale: El relativo tiene matiz cualitativo/identificador; 'las cuales' es un equivalente formalmente claro en español y encaja con el antecedente femenino plural.
- source_word: ἠκολούθησαν
  english_pob_choice: had followed
  chosen_spanish: habían seguido
  alternatives_spanish:
  - siguieron
  - habían acompañado
  lexicon: BDAG
  rationale: El aoristo relativo refiere a una acción anterior al presente narrativo. El pluscuamperfecto español marca esa anterioridad de manera clara.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - de Jesús
  - para Jesús
  lexicon: BDAG
  rationale: Aunque el griego usa dativo, en español 'seguir' rige complemento con 'a'. Mantiene naturalidad sin perder la referencia personal.
- source_word: ἀπὸ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: desde Galilea
  alternatives_spanish:
  - de Galilea
  - a partir de Galilea
  lexicon: BDAG
  rationale: La preposición marca el punto de procedencia. 'Desde Galilea' conserva el sentido geográfico y el movimiento implícito.
- source_word: διακονοῦσαι αὐτῷ
  english_pob_choice: serving him
  chosen_spanish: sirviéndole
  alternatives_spanish:
  - ministrándole
  - dándole servicio
  lexicon: BDAG
  rationale: διακονέω puede denotar servicio práctico o apoyo. 'Sirviéndole' es fiel, sobrio y no introduce categorías eclesiásticas posteriores; la forma enclítica evita repetición pesada.
theological_decisions:
- issue: Valor de διακονοῦσαι respecto del papel de las mujeres
  english_pob_reading: serving him
  chosen_spanish_reading: sirviéndole
  alternative_spanish_readings:
  - ministrándole
  - ayudándole
  rationale: El verbo expresa servicio real y concreto, sin limitarse a una función doméstica ni convertirlo en un término técnico eclesial. 'Sirviéndole' preserva esa amplitud semántica.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Relación temporal entre su seguimiento y la escena actual
  english_pob_reading: had followed Jesus from Galilee
  chosen_spanish_reading: habían seguido a Jesús desde Galilea
  alternative_spanish_readings:
  - siguieron a Jesús desde Galilea
  rationale: El aoristo relativo apunta a una acción anterior a la escena del versículo. El pluscuamperfecto español mantiene con claridad esa anterioridad.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo en el texto español los anclajes exactos [a] y [b] junto a los elementos correspondientes. No se introdujeron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo un español neutral, moderno y reverente.
  - Se evitó 'ministeriándoles' o terminología eclesiástica que estrechara διακονέω sin base inmediata.
  - '''Jesús'' se conservó como nombre propio estándar; ''Galilea'' como topónimo familiar.'
  - 'La sintaxis sigue de cerca la secuencia griega: existencia -> observación a distancia -> seguimiento previo -> servicio.'
