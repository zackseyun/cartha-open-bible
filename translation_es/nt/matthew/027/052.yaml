translation:
  language: es
  text: Y se abrieron los sepulcros, y muchos cuerpos de los santos que habían dormido[a] fueron levantados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Habían dormido» conserva el eufemismo griego para la muerte; la alternativa explícita sería «habían muerto».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - También
  lexicon: BDAG
  rationale: La coordinación narrativa simple se conserva mejor con «Y»; no añade una relación temporal o explicativa que el griego no exige.
- source_word: τὰ μνημεῖα
  english_pob_choice: the tombs
  chosen_spanish: los sepulcros
  alternatives_spanish:
  - las tumbas
  - los túmulos funerarios
  lexicon: BDAG
  rationale: μνημεῖον designa un lugar de sepultura; «sepulcros» es natural en español bíblico y comunica el lugar funerario con dignidad, sin volverlo mecánicamente más moderno de lo necesario.
- source_word: ἀνεῴχθησαν
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertos
  - quedaron abiertos
  lexicon: BDAG
  rationale: El pasivo aoristo se expresa con naturalidad en español como «se abrieron», que mantiene la pasividad del evento sin forzar una construcción más pesada.
- source_word: πολλὰ σώματα
  english_pob_choice: many bodies
  chosen_spanish: muchos cuerpos
  alternatives_spanish:
  - muchos cadáveres
  - muchos cuerpos muertos
  lexicon: BDAG
  rationale: σῶμα se traduce de forma neutral como «cuerpos»; «cadáveres» introduce una dureza interpretativa que el griego no exige.
- source_word: τῶν κεκοιμημένων
  english_pob_choice: who had fallen asleep
  chosen_spanish: que habían dormido
  alternatives_spanish:
  - que habían fallecido
  - que habían muerto
  lexicon: BDAG
  rationale: El participio κοιμάομαι funciona aquí como eufemismo de muerte; «habían dormido» conserva esa imagen. La versión más explícita se deja como alternativa, pero el texto principal mantiene la tensión idiomática.
- source_word: ἁγίων
  english_pob_choice: the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los consagrados
  - de los santos de Dios
  lexicon: BDAG
  rationale: ἅγιοι como sustantivo se vierte con el término ya establecido en el uso bíblico, «santos», sin especificar más allá del texto.
- source_word: ἠγέρθησαν
  english_pob_choice: were raised
  chosen_spanish: fueron levantados
  alternatives_spanish:
  - resucitaron
  - fueron resucitados
  lexicon: BDAG
  rationale: ἐγείρω en pasivo admite «ser levantado» o «ser resucitado». Se prefiere «fueron levantados» para seguir de cerca la neutralidad del inglés POB y preservar la ambigüedad teológica del pasaje; el contexto ampliado decidirá el alcance exacto.
theological_decisions:
- issue: 'Alcance de ἠγέρθησαν: levantados o resucitados'
  english_pob_reading: Translate neutrally as “were raised” without specifying “resurrected,” preserving the text’s wording and leaving theological synthesis to context.
  chosen_spanish_reading: Traducir con «fueron levantados» sin precisar «resucitados», manteniendo abierta la cuestión del tipo exacto de levantamiento.
  alternative_spanish_readings:
  - fueron resucitados
  - resucitaron
  rationale: El verbo puede implicar resurrección, pero en este versículo aislado la formulación más cercana y menos interpretativa es la que simplemente refleja el acto de ser levantados. Así se preserva la tensión textual para que el contexto mayor la determine.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el inglés auditado en el sentido y la estructura: sepulcros abiertos y cuerpos levantados. No se requieren revisiones respecto del último pase, y se mantiene la misma decisión de no especificar más allá de ἠγέρθησαν.'
  spanish_consistency_notes:
  - Se mantiene «santos» para ἅγιοι, coherente con el uso bíblico estándar y con el audit trail en inglés.
  - «Sepulcros» funciona mejor que «tumbas» en español bíblico por registro, sin cambiar el referente.
  - La fórmula pasiva «fueron levantados» conserva la ambigüedad entre levantamiento y resurrección, alineada con la política POB de preservar tensión teológica.
