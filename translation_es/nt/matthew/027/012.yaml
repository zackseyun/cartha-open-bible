translation:
  language: es
  text: Y mientras era acusado por los jefes de los sacerdotes y los ancianos[a], no respondió nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no dio respuesta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ κατηγορεῖσθαι
  english_pob_choice: while he was being accused
  chosen_spanish: y mientras era acusado
  alternatives_spanish:
  - cuando era acusado
  - al ser acusado
  lexicon: BDAG
  rationale: La construcción ἐν + infinitivo articular expresa simultaneidad. «Mientras era acusado» conserva el sentido durativo y resulta natural en español contemporáneo.
- source_word: κατηγορεῖσθαι
  english_pob_choice: was being accused
  chosen_spanish: era acusado
  alternatives_spanish:
  - estaba siendo acusado
  - era denunciado
  lexicon: BDAG
  rationale: El pasivo subraya que se le formulaban acusaciones. En español, «era acusado» mantiene la fuerza judicial sin sonar recargado.
- source_word: ὑπὸ τῶν ἀρχιερέων καὶ πρεσβυτέρων
  english_pob_choice: by the chief priests and elders
  chosen_spanish: por los principales sacerdotes y los ancianos
  alternatives_spanish:
  - por los sumos sacerdotes y los ancianos
  - por los sacerdotes principales y los ancianos
  lexicon: BDAG
  rationale: ἀρχιερεῖς en los evangelios suele referirse al liderazgo sacerdotal; «principales sacerdotes» refleja ese grupo sin convertirlo en un título eclesiástico tradicional ajeno al contexto.
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna respuesta
  - en nada
  lexicon: BDAG
  rationale: Como complemento directo de ἀπεκρίνατο, οὐδέν se expresa de forma directa con «nada», manteniendo la brevedad del griego.
- source_word: ἀπεκρίνατο
  english_pob_choice: he answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - dio respuesta
  lexicon: BDAG
  rationale: El aoristo medio deponente admite «respondió». En combinación con οὐδέν, la frase natural en español es «no respondió nada», equivalente funcional de «he answered nothing».
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Entonces
  lexicon: BDAG
  rationale: La conjunción enlaza la narración sin introducir contraste. «Y» conserva el flujo narrativo simple del griego.
theological_decisions:
- issue: El silencio de Jesús ante sus acusadores
  english_pob_reading: Render the statement plainly as narrative description without importing fulfillment language into the verse itself.
  chosen_spanish_reading: Presentar el hecho narrativo de su silencio sin añadir explícitamente lenguaje de cumplimiento profético en el versículo.
  alternative_spanish_readings:
  - «guardó silencio»
  - «no hizo ninguna réplica»
  rationale: El texto griego informa la ausencia de respuesta. «No respondió nada» comunica el dato de manera sobria, sin expandirlo interpretativamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en el control inglés; no se requieren revisiones sustantivas. La redacción española sigue de cerca la sintaxis del griego, manteniendo la simultaneidad y la negación directa.
  spanish_consistency_notes:
  - Se preservó «principales sacerdotes» para ἀρχιερεῖς conforme al uso evangélico, evitando una sustitución automática por «sumos sacerdotes» sin justificación local.
  - Se eligió «no respondió nada» para conservar la concisión de οὐδὲν ἀπεκρίνατο y permitir una alternativa de nota mínima.
  - La inicial «Y» refleja la continuidad narrativa del καί griego.
