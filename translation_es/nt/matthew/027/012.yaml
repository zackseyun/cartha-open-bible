    rationale: 'La nota actual incluye comillas y puntuación poco natural: «''O: «no dio respuesta».''». Debe simplificarse a un formato limpio e idiomático.'
  revised_spanish_text: Y mientras era acusado por los jefes de los sacerdotes y los ancianos[a], no respondió nada.
