translation:
  language: es
  text: 'Del mismo modo[a], los principales sacerdotes también, burlándose de él junto con los escribas y los ancianos, decían:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Igualmente»; «De la misma manera».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: Del mismo modo
  alternatives_spanish:
  - Igualmente
  - De la misma manera
  - Asimismo
  lexicon: BDAG
  rationale: Adverbio de correspondencia con la escena previa de burlas. 'Del mismo modo' conserva el valor comparativo sin sonar forzado en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - incluso
  - además
  lexicon: BDAG
  rationale: Aquí añade a los principales sacerdotes a los ya mencionados que se burlan. 'También' expresa mejor el valor aditivo que un simple 'y'.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: En plural, el término se refiere a las máximas autoridades sacerdotales. 'Principales sacerdotes' mantiene el sentido institucional sin sugerir erróneamente varios sumos sacerdotes como oficio singular.
- source_word: ἐμπαίζοντες
  english_pob_choice: were mocking him
  chosen_spanish: burlándose de él
  alternatives_spanish:
  - mofándose de él
  - ridiculizándolo
  - haciéndose burla de él
  lexicon: BDAG
  rationale: El participio expresa burla despectiva. 'Burlándose de él' es natural y fiel; evita endurecer el español con una forma más pesada como 'estaban burlándose' sin necesidad.
- source_word: μετὰ
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - en compañía de
  - asociados con
  lexicon: BDAG
  rationale: Con genitivo, la preposición indica asociación en la acción. 'Junto con' comunica participación conjunta de escribas y ancianos en la burla.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - doctores de la ley
  lexicon: BDAG
  rationale: '''Escribas'' es la equivalencia directa y estándar en los evangelios; las alternativas son más interpretativas.'
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - líderes
  - mayores
  lexicon: BDAG
  rationale: Aquí denota una categoría de liderazgo judío. 'Ancianos' preserva el sentido institucional y la terminología bíblica usual.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  - dijeron
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso. En español, 'decían' transmite ese valor de manera fluida sin recargar la frase.
theological_decisions:
- issue: Identificación conjunta de los burladores
  english_pob_reading: The chief priests, scribes, and elders are all participating together in mocking Jesus.
  chosen_spanish_reading: Los principales sacerdotes, junto con los escribas y los ancianos, participan juntos en la burla contra Jesús.
  alternative_spanish_readings:
  - Los principales sacerdotes se burlaban mientras los escribas y los ancianos estaban presentes.
  - Los principales sacerdotes se burlaban en presencia de los escribas y los ancianos.
  rationale: La sintaxis con μετά más genitivo indica asociación, no mera cercanía. Por eso la traducción presenta a los tres grupos como participantes en la misma acción de burla.
  doctrine_reference: Narrative-historical syntax; no doctrinal dispute
translation_notes:
  revision_awareness: 'La redacción sigue la revisión del texto inglés que acercó la estructura al griego: participio de burla + complemento de asociación + verbo de habla en imperfecto. La versión española conserva ese orden relacional y el valor progresivo del imperfecto con una construcción natural: «burlándose de él junto con... decían».'
  spanish_consistency_notes:
  - Se usa «principales sacerdotes» para ἀρχιερεῖς, siguiendo el sentido plural institucional del griego.
  - Se mantiene «escribas» y «ancianos» como términos técnicos bíblicos coherentes con el registro del Evangelio.
  - No se introduce «Cristo» ni otras sustituciones teológicas ajenas al versículo.
  - El participio se resuelve con gerundio español para conservar simultaneidad y no forzar una perífrasis demasiado pesada.
