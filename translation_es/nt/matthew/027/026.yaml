  source_alignment_summary: 'El borrador sigue bien el sentido del griego: τότε = secuencia narrativa, ἀπέλυσεν αὐτοῖς = liberó a Barrabás para ellos/a ellos, δέ = contraste, φραγελλώσας = acción anterior a παρέδωκεν, y ἵνα σταυρωθῇ = finalidad/resultado de ser crucificado. No hay inversión de orden ni problema doctrinal.'
  spanish_quality_summary: El español es claro y natural, pero 'les soltó a Barrabás' suena menos idiomático y algo coloquial en registro bíblico; 'soltó' también es más débil que el contexto judicial. Además, la nota al pie con ancla en 'Barrabás' no corresponde al término alternativo real, que explica el verbo de castigo. Conviene mover la ancla al segmento de 'azotar' y usar una formulación judicial más natural.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Jesús' está bien. Para φραγελλώσας, 'azotar' es aceptable en español general, con nota que preserve la alternativa 'flagelar'/'azotar' y la referencia al castigo romano. Para ἀπέλυσεν, 'dejó libre' o 'liberó' encaja mejor que 'soltó' en este contexto judicial.
  issues:
