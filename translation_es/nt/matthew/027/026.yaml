translation:
  language: es
  text: Entonces les dejó libre a Barrabás, pero después de azotar[a] a Jesús, lo entregó para que fuera crucificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'después de flagelar a Jesús'. El verbo griego se refiere al castigo romano de azotar o flagelar.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Entonces mismo
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia narrativa de manera natural en español y preserva el valor temporal de transición sin añadir matices innecesarios.
- source_word: ἀπέλυσεν
  english_pob_choice: released
  chosen_spanish: les soltó
  alternatives_spanish:
  - lo liberó
  - lo dejó libre
  - lo soltó
  lexicon: BDAG
  rationale: En el contexto judicial de un preso, 'soltar' comunica el acto de dejarlo ir. 'Les soltó' refleja el dativo αὐτοῖς como destinatarios del acto; evita una formulación más abstracta que debilite el contraste narrativo.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo funciona naturalmente como complemento indirecto en español. 'Les' conserva la referencia a la multitud o a quienes recibieron la liberación de Barrabás.
- source_word: Βαραββᾶν
  english_pob_choice: Barabbas
  chosen_spanish: Barrabás
  alternatives_spanish:
  - Barabás
  lexicon: convención onomástica española
  rationale: Se usa la forma española establecida del nombre propio, conforme a la convención de transliteración/tradición bíblica en español.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: Introduce el contraste entre la liberación de Barrabás y el trato de Jesús. 'Pero' reproduce mejor esa oposición que una simple conjunción aditiva.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: convención onomástica española
  rationale: Nombre propio estándar en español bíblico.
- source_word: φραγελλώσας
  english_pob_choice: after flogging
  chosen_spanish: después de azotar
  alternatives_spanish:
  - tras flagelar
  - después de flagelar
  - habiendo azotado
  lexicon: BDAG
  rationale: El participio aoristo expresa acción anterior a la del verbo principal. 'Azotar' comunica el castigo romano de manera clara y natural; 'flagelar' sería más técnico, pero menos accesible para el lector general.
- source_word: παρέδωκεν
  english_pob_choice: he handed him over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo puso en manos de
  - lo entregó a
  lexicon: BDAG
  rationale: '''Entregar'' conserva el valor judicial de παραδίδωμι en el relato de la pasión y es natural en español. El objeto directo implícito queda claro por el contexto inmediato.'
- source_word: ἵνα σταυρωθῇ
  english_pob_choice: to be crucified
  chosen_spanish: para que fuera crucificado
  alternatives_spanish:
  - para ser crucificado
  - a fin de que fuera crucificado
  lexicon: BDAG
  rationale: La cláusula de propósito con ἵνα + subjuntivo pasivo se expresa con claridad en español mediante 'para que fuera crucificado', conservando el sentido de finalidad sin rigidizar la sintaxis.
theological_decisions:
- issue: Orden de la acción y agencia en el proceso de Jesús
  english_pob_reading: Pilate released Barabbas, then after flogging Jesus, handed him over for crucifixion.
  chosen_spanish_reading: Pilato soltó a Barrabás al pueblo, y luego, después de azotar a Jesús, lo entregó para crucifixión.
  alternative_spanish_readings:
  - Jesús fue azotado y luego entregado
  - lo entregó después del azote
  rationale: El participio aoristo φραγελλώσας indica antecedencia respecto del verbo principal παρέδωκεν. La traducción preserva ese orden y la agencia implícita en el acto judicial, sin invertir la secuencia ni suavizar el castigo.
  doctrine_reference: Principio de primacía del texto original; mantener el orden narrativo y la agencia según el griego.
translation_notes:
  revision_awareness: El texto sigue el pasaje griego SBLGNT y es coherente con el audit trail inglés POB, manteniendo la secuencia temporal, el contraste entre Barrabás y Jesús, y la equivalencia funcional de φραγελλώσας con un verbo español natural. No se requirieron revisiones adicionales según el registro disponible.
  spanish_consistency_notes:
  - Se mantiene 'Barrabás' y 'Jesús' como nombres propios estándar en español.
  - '''Entonces'' conserva la progresión narrativa de τότε sin añadir interpretaciones.'
  - '''Les soltó'' expresa con naturalidad el acto judicial de ἀπέλυσεν en este contexto.'
  - '''Azotar'' traduce el castigo romano con claridad para lectores actuales, mientras la nota preserva la alternativa técnica ''flagelar''.'
  - '''Lo entregó'' respeta el uso judicial de παραδίδωμι en la pasión.'
  - La cláusula final 'para que fuera crucificado' conserva el propósito de ἵνα + subjuntivo pasivo.
