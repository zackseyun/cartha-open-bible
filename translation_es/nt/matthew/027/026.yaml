- from: Entonces les soltó a Barrabás[a], pero después de azotar a Jesús, lo entregó para que fuera crucificado.
  to: Entonces les dejó libre a Barrabás, pero después de azotar[a] a Jesús, lo entregó para que fuera crucificado.
  rationale: Se corrige la colocación de la nota al pie para que corresponda al verbo φραγελλώσας, y se mejora 'les soltó' a 'les dejó libre' para reflejar mejor el contexto judicial de ἀπέλυσεν en un español más natural y digno. El resto del sentido y orden narrativo se conserva.
