    rationale: No es un error; ambas opciones preservan ἵνα σταυρωθῇ. Se puede mantener la estructura actual o aligerarla ligeramente. La revisión propuesta conserva claridad y naturalidad.
  revised_spanish_text: Entonces les dejó libre a Barrabás, pero después de azotar[a] a Jesús, lo entregó para que fuera crucificado.
  revised_footnotes:
