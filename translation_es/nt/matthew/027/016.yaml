translation:
  language: es
  text: Ahora bien, en ese tiempo tenían un preso notorio, llamado Jesús Barrabás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen simplemente «Barrabás», omitiendo «Jesús».
    reason: textual_variant
lexical_decisions:
- source_word: εἶχον
  english_pob_choice: they had
  chosen_spanish: tenían
  alternatives_spanish:
  - había
  - poseían
  lexicon: BDAG
  rationale: El imperfecto de ἔχω con sujeto plural implícito expresa una situación en curso de posesión o custodia. «Tenían» conserva esa relación verbal de tenencia/custodia mejor que una impersonal como «había».
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: δέ funciona como un conector suave de transición. «Ahora bien» comunica esa apertura narrativa en un español natural sin forzar una secuencia más fuerte de la que el griego exige.
- source_word: τότε
  english_pob_choice: at that time
  chosen_spanish: en ese tiempo
  alternatives_spanish:
  - entonces
  lexicon: BDAG
  rationale: τότε es temporal. «En ese tiempo» preserva el valor explícito del adverbio y evita confundirlo con el matiz discursivo ya cubierto por δέ.
- source_word: δέσμιον
  english_pob_choice: prisoner
  chosen_spanish: un preso
  alternatives_spanish:
  - un prisionero
  - un cautivo
  lexicon: BDAG
  rationale: δέσμιος designa a alguien retenido bajo custodia. «Preso» es claro, natural y mantiene la idea judicial de persona encarcelada o detenida.
- source_word: ἐπίσημον
  english_pob_choice: notorious
  chosen_spanish: famoso
  alternatives_spanish:
  - notorio
  - bien conocido
  lexicon: BDAG
  rationale: El contexto no obliga a un juicio moral tan cargado como «notorio» en español. «Famoso» conserva la idea de ser ampliamente conocido sin introducir de forma automática una connotación negativa que el griego permite pero no impone con total certeza.
- source_word: λεγόμενον
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - conocido como
  - nombrado
  lexicon: BDAG
  rationale: El participio introduce el nombre o designación de la persona. «Llamado» es la equivalencia directa e idiomática en español.
- source_word: Ἰησοῦν Βαραββᾶν
  english_pob_choice: Jesus Barabbas
  chosen_spanish: Jesús Barrabás
  alternatives_spanish:
  - Barrabás
  lexicon: BDAG
  rationale: El texto griego recibido incluye Ἰησοῦν, así que la traducción debe reflejarlo en el cuerpo principal. «Barrabás» reproduce la forma conocida del nombre propio en español; la omisión de «Jesús» queda como variante textual.
theological_decisions:
- issue: Variante textual del nombre completo de Barrabás
  english_pob_reading: 'Include ''Jesus'' in the main text: ''Jesus Barabbas.'''
  chosen_spanish_reading: 'Incluir «Jesús» en el texto principal: «Jesús Barrabás».'
  alternative_spanish_readings:
  - Leer simplemente «Barrabás»
  rationale: La base griega proporcionada lee Ἰησοῦν Βαραββᾶν, y la prioridad de la fuente original exige conservar ese nombre completo en el texto principal. Dado que muchos manuscritos omiten «Jesús», la nota preserva la alternativa textual sin resolverla artificialmente.
  doctrine_reference: Primacía de la fuente original; preservación de la variante textual sin armonización
- issue: Tensión narrativa entre título común y nombre propio
  english_pob_reading: notorious prisoner called Jesus Barabbas
  chosen_spanish_reading: un preso famoso, llamado Jesús Barrabás
  alternative_spanish_readings:
  - un preso notorio, llamado Jesús Barrabás
  rationale: La palabra griega ἐπίσημος admite un rango de sentido entre ‘conocido’ y ‘notable/prominente’, con posible matiz negativo según el contexto. «Famoso» conserva la notoriedad pública sin cerrar indebidamente la evaluación moral que el griego deja abierta.
  doctrine_reference: Preservar la tensión léxica sin sobredeterminarla
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT provisto. La decisión más sensible es ἐπίσημον: aunque la traducción inglesa optó por «notorious», en español se eligió «famoso» para no cargar de antemano una valoración negativa más fuerte de la que la forma griega exige de manera inequívoca. Se mantuvo el nombre completo «Jesús Barrabás» en el texto principal por fidelidad a la lectura base, con nota textual sobre la variante omitida.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Barrabás» como forma española estable del nombre.
  - «Ahora bien» y «en ese tiempo» separan con claridad el conector discursivo de la referencia temporal.
  - Se prefiere «preso» por naturalidad contemporánea sin perder el sentido de custodia.
  - La nota textual marca explícitamente la omisión de «Jesús» en algunos manuscritos.
