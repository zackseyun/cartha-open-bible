base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/027.yaml
  text: Then the governor’s soldiers took Jesus into the praetorium and gathered the whole cohort around him[a][b].
  footnotes:
  - marker: a
    text: Or 'the governor’s headquarters.' The Greek term refers to the official residence or military headquarters of the Roman governor.
    reason: lexical_alternative
  - marker: b
    text: '''Cohort'' translates a Roman military term; it can refer to a unit of soldiers rather than necessarily every soldier in a full cohort being physically present.'
    reason: cultural_note
