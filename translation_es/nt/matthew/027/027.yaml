translation:
  language: es
  text: Entonces, los soldados del gobernador llevaron a Jesús al pretorio[a] y reunieron a toda la cohorte[b] alrededor de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la residencia oficial del gobernador». El término griego se refiere a la residencia oficial o al cuartel general militar del gobernador romano.
    reason: lexical_alternative
  - marker: b
    text: «Cohorte» traduce un término militar romano; puede referirse a una unidad de soldados, no necesariamente a que cada soldado de una cohorte completa estuviera físicamente presente.
    reason: cultural_note
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Al momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» conserva el valor temporal sin sonar forzado en español.
- source_word: οἱ στρατιῶται τοῦ ἡγεμόνος
  english_pob_choice: the governor’s soldiers
  chosen_spanish: los soldados del gobernador
  alternatives_spanish:
  - los soldados del gobernante
  - los soldados del prefecto
  lexicon: BDAG
  rationale: El genitivo expresa pertenencia o relación con el gobernante romano; en español, «del gobernador» es claro, natural y mantiene la referencia histórica.
- source_word: ἡγεμόνος
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - gobernante
  - prefecto
  lexicon: BDAG
  rationale: En el contexto de la pasión, el referente es el magistrado romano; «gobernador» comunica bien el cargo sin añadir precisión histórica no exigida por la forma léxica.
- source_word: παραλαβόντες
  english_pob_choice: took
  chosen_spanish: llevaron
  alternatives_spanish:
  - tomaron
  - llevando consigo
  lexicon: BDAG
  rationale: El participio aoristo expresa que tomaron a Jesús consigo para conducirlo al lugar indicado; «llevaron» integra bien esa acción en una construcción narrativa natural en español.
- source_word: εἰς τὸ πραιτώριον
  english_pob_choice: into the praetorium
  chosen_spanish: al pretorio
  alternatives_spanish:
  - a la residencia del gobernador
  - a las dependencias del gobernador
  lexicon: BDAG
  rationale: Se conserva el término histórico «pretorio» por su valor técnico y porque el contexto ya identifica el espacio oficial del gobernador; la preposición «al» expresa la dirección sin recargar la frase.
- source_word: συνήγαγον
  english_pob_choice: gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - juntaron
  - congregaron
  lexicon: BDAG
  rationale: El verbo indica que los soldados se concentraron en torno a Jesús; «reunieron» reproduce bien la idea de congregar sin perder fluidez.
- source_word: ἐπ’ αὐτὸν
  english_pob_choice: around him
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - contra él
  - sobre él
  lexicon: BDAG
  rationale: La combinación con συνάγω sugiere convergencia en torno a Jesús; «alrededor de él» refleja mejor la escena que una opción más adversativa.
- source_word: ὅλην τὴν σπεῖραν
  english_pob_choice: the whole cohort
  chosen_spanish: toda la cohorte
  alternatives_spanish:
  - todo el destacamento
  - toda la compañía
  lexicon: BDAG
  rationale: «Cohorte» preserva el término militar romano específico que el griego usa; «toda» refleja ὅλην y mantiene el efecto de totalidad sin implicar necesariamente que cada soldado individual estuviera físicamente presente.
translation_notes:
  revision_awareness: La redacción española sigue el mismo trazado semántico del texto griego y conserva la terminología militar romana técnica que el POB inglés retuvo («praetorium», «cohort»), pero la vierte en español con sintaxis natural y sin añadir explicaciones en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «pretorio» como transliteración histórica coherente con el valor técnico de πραιτώριον.
  - Se prefirió «cohorte» para σπεῖραν, conservando el matiz militar romano del pasaje.
  - «Entonces» y «alrededor de él» preservan la progresión narrativa y la escena de reunión en torno a Jesús.
