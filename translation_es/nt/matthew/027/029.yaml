translation:
  language: es
  text: 'Después de trenzar una corona de espinas, la pusieron sobre su cabeza, y una caña en su mano derecha; y, arrodillándose delante de él, se burlaron de él, diciendo: «¡Salve, rey de los judíos[a]! »'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rey de los judeanos». El griego Ἰουδαίων puede referirse a judeanos o judíos; aquí aparece en el título real burlón dirigido contra Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλέξαντες
  english_pob_choice: after weaving
  chosen_spanish: después de trenzar
  alternatives_spanish:
  - habiendo trenzado
  - después de tejer
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales. «Después de trenzar» conserva la secuencia temporal y suena natural en español; «tejer» sería posible, pero aquí «trenzar» comunica mejor la acción concreta de entrelazar material vegetal.
- source_word: στέφανον
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - diadema
  lexicon: BDAG
  rationale: En este contexto de burla real, «corona» comunica el valor irónico y regio mejor que «guirnalda». No se opta por «diadema» porque en español suena más ornamental y menos acorde con la escena de escarnio.
- source_word: ἐξ ἀκανθῶν
  english_pob_choice: of thorns
  chosen_spanish: de espinas
  alternatives_spanish:
  - de zarzas
  - de cardos
  lexicon: BDAG
  rationale: «De espinas» es la forma más natural y ampliamente entendida en español para el material del que estaba hecha la corona. Mantiene la imagen física sin desplazarla hacia una planta específica.
- source_word: ἐπέθηκαν ἐπὶ τῆς κεφαλῆς αὐτοῦ
  english_pob_choice: they put it on his head
  chosen_spanish: la pusieron sobre su cabeza
  alternatives_spanish:
  - la colocaron sobre su cabeza
  - la pusieron en su cabeza
  lexicon: BDAG
  rationale: «Sobre su cabeza» es la colocación más idiomática y fiel a la preposición ἐπὶ. «Pusieron» preserva sencillez narrativa; «colocaron» es posible, pero más formal sin ventaja evidente.
- source_word: κάλαμον
  english_pob_choice: a reed
  chosen_spanish: una caña
  alternatives_spanish:
  - un carrizo
  - un junco
  lexicon: BDAG
  rationale: En español, «caña» es un equivalente claro de κάλαμος en este contexto y puede funcionar como objeto regios mock-scepter. «Reed»/«junco» serían más técnicos o menos naturales para lectores amplios.
- source_word: ἐν τῇ δεξιᾷ αὐτοῦ
  english_pob_choice: in his right hand
  chosen_spanish: en su mano derecha
  alternatives_spanish:
  - a su derecha
  - en su diestra
  lexicon: BDAG
  rationale: «En su mano derecha» expresa con claridad la colocación del objeto y evita arcaísmos como «diestra», aunque esta sea comprensible. La imagen de cetro burlado queda intacta.
- source_word: γονυπετήσαντες
  english_pob_choice: kneeling
  chosen_spanish: arrodillándose
  alternatives_spanish:
  - habiéndose arrodillado
  - de rodillas
  lexicon: BDAG
  rationale: El participio aoristo describe la postura adoptada antes de la burla. «Arrodillándose» transmite la acción con fluidez en español y mantiene el matiz de homenaje parodiado.
- source_word: ἔμπροσθεν αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: BDAG
  rationale: «Delante de él» es natural y conserva el sentido de posición en la escena de burla. «Ante él» también sería fiel, pero puede sonar algo más solemne o literario sin necesidad.
- source_word: ἐνέπαιξαν αὐτῷ
  english_pob_choice: they mocked him
  chosen_spanish: se burlaban de él
  alternatives_spanish:
  - se mofaban de él
  - lo ridiculizaban
  lexicon: BDAG
  rationale: El imperfecto en español («se burlaban») expresa bien la acción continuada o reiterada que el aoristo narra en conjunto. «Burlarse» mantiene el tono narrativo sin añadir una dureza interpretativa extra.
- source_word: Χαῖρε
  english_pob_choice: Hail
  chosen_spanish: ¡Salve!
  alternatives_spanish:
  - ¡Viva!
  - ¡Saludos!
  lexicon: BDAG
  rationale: En una burla de corte real, «¡Salve!» preserva mejor el tono de saludo solemne y paródico que «Saludos», que sería demasiado coloquial. «¡Viva!» desplazaría el sentido hacia aclamación más que saludo.
- source_word: βασιλεῦ τῶν Ἰουδαίων
  english_pob_choice: King of the Jews
  chosen_spanish: Rey de los judíos
  alternatives_spanish:
  - rey de los judeanos
  - rey de Judea
  lexicon: BDAG
  rationale: Se conserva «judíos» siguiendo el valor ya auditado para la fórmula de la pasión. «Judeanos» es posible, pero en español puede sonar técnico y menos reconocible en esta proclamación burlona; la capitalización de «Rey» refleja el título directo dentro del discurso.
theological_decisions:
- issue: Cómo preservar la ironía del saludo real sin neutralizarla
  english_pob_reading: “Hail, King of the Jews!”
  chosen_spanish_reading: «¡Salve, Rey de los judíos!»
  alternative_spanish_readings:
  - «¡Saludos, Rey de los judíos!»
  - «¡Viva, Rey de los judíos!»
  rationale: La escena es una parodia de homenaje real. «¡Salve!» conserva la solemnidad de un saludo formal y, por tanto, la ironía de la burla; evita rebajar la escena a un simple «saludos» y no altera el contenido cristológico del título.
  doctrine_reference: Principios de traducción POB §6 (registro legible sin aplanar el peso narrativo y teológico)
- issue: Cómo rendir Ἰουδαίων sin perder el sentido histórico-narrativo de la acusación
  english_pob_reading: “Jews”
  chosen_spanish_reading: «judíos»
  alternative_spanish_readings:
  - «judeanos»
  - «de Judea»
  rationale: En esta fórmula de la pasión, el título funciona como carga política y religiosa ligada a la realeza de Jesús. «Judíos» reproduce la recepción narrativa habitual y la fuerza pública del escarnio; «judeanos» sería lexicamente defendible, pero menos transparente para la audiencia española y no añade claridad aquí.
  doctrine_reference: Principios de traducción POB §1 y §6 (primacía del texto fuente y claridad comunicativa)
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto inglés auditado; se mantiene la misma estructura narrativa y las mismas decisiones clave (corona de espinas, caña, arrodillarse, burla y saludo real), con adaptación idiomática al español y sin cambios textuales sustantivos respecto al último pase revisado.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reproducir el encadenamiento narrativo del griego.
  - Se conserva el título «Rey de los judíos» como fórmula conocida en la pasión, con nota para la alternativa lexical «judeanos».
  - La elección de «caña» para κάλαμος evita introducir «bastón» o «cetro», que interpretarían más de lo que el texto dice.
  - Se emplea el imperfecto «se burlaban» para reflejar la acción escarnecedora en curso dentro del relato.
  - La puntuación y las comillas españolas se ajustan al uso editorial moderno y legible.
