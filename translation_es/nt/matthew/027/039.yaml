  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: sujeto sustantivado (''los que pasaban''), acción continua de abuso verbal contra Jesús, y el gesto simultáneo de mover la cabeza. Sin embargo, ''iban blasfemándolo'' no suena natural en español y sobrerrecalca una forma verbal poco idiomática; además, ''meneando la cabeza'' en singular pierde innecesariamente el plural explícito del griego y suena menos nítido junto con ''los que''.'
  spanish_quality_summary: El texto es generalmente claro, pero necesita una reparación pequeña para lograr español natural y digno. 'Lo blasfemaban' preserva mejor el valor léxico fuerte sin la torpeza de 'iban blasfemándolo'. 'Sacudiendo sus cabezas' o 'meneando sus cabezas' conserva mejor el plural fuente; 'sacudiendo' suena más claro y natural en español general que 'meneando' en este contexto.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la decisión sobre βλασφημέω. Conviene mantener el verbo fuerte en el texto principal, con nota alternativa 'lo insultaban' o 'lo injuriaban'. La nota sobre el gesto de escarnio está alineada con la documentación inglesa y con Salmo 22:7.
  issues:
  - severity: medium
    issue: 'Expresión poco idiomática: ''iban blasfemándolo'''
    rationale: Aunque intenta reflejar el imperfecto, en español suena forzado. 'Lo blasfemaban' comunica mejor la acción continua sin perder fuerza léxica.
  - severity: low
    issue: '''Meneando la cabeza'' en singular'
    rationale: El griego tiene plural ('sus cabezas'). En español puede singularizarse idiomáticamente, pero aquí no hace falta; mantener 'sus cabezas' preserva mejor el detalle fuente y evita ambigüedad colectiva.
  - severity: low
    issue: Comillas y formato de la nota a
    rationale: La nota empieza con una comilla simple innecesaria antes de 'O:'. Puede normalizarse para mayor limpieza editorial.
