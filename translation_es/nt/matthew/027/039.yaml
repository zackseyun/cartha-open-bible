translation:
  language: es
  text: Y los que pasaban lo blasfemaban[a], sacudiendo sus cabezas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo insultaban». El verbo griego puede implicar lenguaje abusivo o injurioso, no solo «blasfemar» en el sentido restringido de hablar contra Dios.'
    reason: lexical_alternative
  - marker: b
    text: Gesto de escarnio o burla; compárese Salmo 22:7.
    reason: cross_reference
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And those
  chosen_spanish: Y los que
  alternatives_spanish:
  - Y aquellos que
  - Pero los que
  lexicon: BDAG
  rationale: El artículo con participio funciona como sustantivo; en español, "los que" reproduce bien ese valor sin introducir una distinción innecesaria. "Y" mantiene la conexión narrativa suave de δέ.
- source_word: παραπορευόμενοι
  english_pob_choice: passing by
  chosen_spanish: pasaban
  alternatives_spanish:
  - iban pasando
  - pasaban por allí
  - los transeúntes
  lexicon: BDAG
  rationale: El participio presente describe a personas que iban de paso junto al lugar de la crucifixión. "Pasaban" es natural en español y conserva el matiz progresivo/continuado mejor que un sustantivo como "transeúntes".
- source_word: ἐβλασφήμουν
  english_pob_choice: were blaspheming
  chosen_spanish: iban blasfemándolo
  alternatives_spanish:
  - lo blasfemaban
  - lo maldecían
  - lo insultaban
  lexicon: BDAG
  rationale: Se conserva la fuerza del verbo con "blasfemar" porque el griego usa un término fuerte, no un simple "burlarse". El giro "iban blasfemándolo" intenta reflejar el imperfecto de acción continua y el objeto directo sin perder legibilidad. La alternativa "lo maldecían" sería más suave, pero debilita la carga lexical.
- source_word: κινοῦντες
  english_pob_choice: shaking
  chosen_spanish: meneando
  alternatives_spanish:
  - sacudiendo
  - agitando
  - moviendo
  lexicon: BDAG
  rationale: '"Meneando" expresa el gesto de sacudir o mover la cabeza de manera despectiva y suena más idiomático en español bíblico que "agitando". Preserva el valor simultáneo del participio con una imagen clara.'
- source_word: τὰς κεφαλὰς αὐτῶν
  english_pob_choice: their heads
  chosen_spanish: la cabeza
  alternatives_spanish:
  - las cabezas
  - sus cabezas
  lexicon: BDAG
  rationale: En español, el giro idiomático suele aparecer en singular al referirse al gesto colectivo de burla. Aunque el griego es plural, "la cabeza" comunica naturalmente el mismo gesto; se mantiene el sentido de desaprobación corporal. La alternativa plural podría sonar más literal pero menos idiomática.
theological_decisions:
- issue: Fuerza de βλασφημέω aplicada a Jesús en contexto de pasión
  english_pob_reading: Retain the stronger rendering 'blaspheming' in the main text
  chosen_spanish_reading: Conservar "blasfemándolo" en el texto principal
  alternative_spanish_readings:
  - insultándolo
  - burlándose de él
  - hablando injuriosamente de él
  rationale: Se preserva la tensión teológica y lexical del verbo fuerte; en el relato de la pasión, la hostilidad contra Jesús no se suaviza. "Blasfemar" en español mantiene la intensidad del griego mejor que "burlarse", aunque puede oírse principalmente en relación con Dios; por eso se conserva y se deja abierta la posibilidad interpretativa en la documentación.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gesto de escarnio con la cabeza
  english_pob_reading: A gesture of scorn or derision; compare Psalm 22:7.
  chosen_spanish_reading: Meneando la cabeza[b]
  alternative_spanish_readings:
  - sacudiendo la cabeza
  - haciendo un gesto de burla con la cabeza
  rationale: Se mantiene el valor de escarnio sin cargar el texto con explicación. La referencia cultural/antibíblica queda compatible con el paralelismo con Salmo 22:7, y el gesto resulta comprensible para el lector español.
  doctrine_reference: Psalm 22:7; Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió de cerca el auditable inglés POB y su nota lexical para βλασφημέω, pero se ajustó la sintaxis al español para evitar un calco duro. La principal decisión revisada fue expresar el imperfecto continuo con una perífrasis verbal más natural ('iban blasfemándolo') sin perder la fuerza del término. También se adaptó el gesto de la cabeza a una forma idiomática en español.
  spanish_consistency_notes:
  - Se mantiene "blasfemar" como término fuerte y teológicamente cargado, coherente con el criterio POB de no suavizar el verbo.
  - Se evita sustituirlo por "burlarse" en el texto principal, reservando esa alternativa para la nota.
  - La nota sobre el gesto conserva la referencia a Salmo 22:7, como en el audit trail inglés.
  - El pronombre objeto se mantiene unido al verbo por fluidez española, sin alterar el referente a Jesús.
