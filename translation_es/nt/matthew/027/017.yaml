  text: συνηγμένων οὖν αὐτῶν εἶπεν αὐτοῖς ὁ Πιλᾶτος· Τίνα θέλετε ἀπολύσω ὑμῖν, ⸂Ἰησοῦν τὸν⸃ Βαραββᾶν ἢ Ἰησοῦν τὸν λεγόμενον χριστόν;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/017.yaml
  text: 'So when they had gathered together[a], Pilate said to them, “Which one do you want me to release to you: Jesus Barabbas[b], or Jesus who is called Messiah?”'
  footnotes:
  - marker: a
    text: Some manuscripts read simply 'Barabbas' instead of 'Jesus Barabbas.'
    reason: textual_variant
  - marker: b
    text: Or 'Christ.' The Greek title is Christos, here rendered 'Messiah' because it functions as a title.
    reason: alternative_reading
