    changes_summary: 'Changed “Messiah” to “Christ” to reflect the Greek χριστόν more directly and maintain formal consistency with the expression “who is called Christ.” [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Entonces, cuando se habían reunido, Pilato les dijo: «¿A cuál quieren que les ponga en libertad: a Jesús Barrabás[a], o a Jesús, llamado Mesías[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen simplemente «Barrabás» en lugar de «Jesús Barrabás».
    reason: textual_variant
  - marker: b
    text: O «Cristo». El término griego es christos, aquí traducido «Mesías» porque funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: συνηγμένων
  english_pob_choice: when they had gathered together
  chosen_spanish: cuando se habían reunido
  alternatives_spanish:
  - cuando estuvieron reunidos
  - después de haberse reunido
  lexicon: BDAG
  rationale: El genitivo absoluto con participio perfecto pasivo expresa una acción anterior y completa respecto de la pregunta de Pilato. «Se habían reunido» conserva esa anterioridad y suena natural en español.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca transición narrativa. «Así que» mantiene el valor conectivo sin sonar demasiado rígido en español contemporáneo.
- source_word: Τίνα
  english_pob_choice: Which one
  chosen_spanish: ¿A cuál
  alternatives_spanish:
  - ¿Cuál de los dos
  - ¿A quién
  lexicon: BDAG
  rationale: La pregunta plantea una elección entre dos personas nombradas. «¿A cuál?» expresa de forma idiomática esa selección binaria.
- source_word: θέλετε
  english_pob_choice: do you want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - prefieren
  lexicon: BDAG
  rationale: Aquí θέλω expresa preferencia o voluntad. En español, la forma «quieren» en una pregunta directa reproduce con claridad esa intención.
- source_word: ἀπολύσω
  english_pob_choice: me to release
  chosen_spanish: que les suelte
  alternatives_spanish:
  - que les libere
  - que les ponga en libertad
  lexicon: BDAG
  rationale: En este contexto judicial ἀπολύω significa liberar a un preso. «Soltar» comunica bien la liberación efectiva y conserva el tono del acto de dejar ir a alguien; la mención del dativo «a ustedes» queda representada en «les».
- source_word: Ἰησοῦν τὸν Βαραββᾶν
  english_pob_choice: Jesus Barabbas
  chosen_spanish: Jesús Barrabás
  alternatives_spanish:
  - Jesús, Barrabás
  - Barrabás
  lexicon: BDAG
  rationale: El texto griego incluido por la fuente contiene Ἰησοῦν, por lo que se conserva «Jesús» antes de Barrabás. En español, el nombre compuesto se presenta de forma directa y reconocible.
- source_word: Ἰησοῦν τὸν λεγόμενον χριστόν
  english_pob_choice: Jesus who is called Messiah
  chosen_spanish: a Jesús, al que llaman Mesías
  alternatives_spanish:
  - a Jesús, al que llaman Cristo
  - a Jesús, llamado Mesías
  lexicon: BDAG
  rationale: λεγόμενον se expresa naturalmente como «al que llaman». Χριστός, cuando funciona como título, se traduce «Mesías» según la política del proyecto; «Cristo» se reserva para casos de nombre o formulación litúrgica documentada.
- source_word: χριστόν
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí χριστόν es un título en contraste con el otro Jesús, no un apellido. Por eso se traduce como «Mesías», manteniendo el valor titular y la distinción auditable frente a un uso nominal de «Cristo».
theological_decisions:
- issue: Tratamiento de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura inglesa trata χριστόν como título, no como nombre propio. En español, «Mesías» comunica mejor ese valor titular y sigue la política del proyecto de traducir los títulos cristológicos.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; Χριστός → Mesías cuando funciona como título'
- issue: Presencia de «Jesús» antes de Barrabás
  english_pob_reading: Included in main text as 'Jesus Barabbas'
  chosen_spanish_reading: Incluido en el texto principal como «Jesús Barrabás»
  alternative_spanish_readings:
  - Barrabás
  rationale: La forma griega provista incluye Ἰησοῦν antes de Βαραββᾶν, y el español la refleja. Se preserva así la tensión textual conocida sin borrar la lectura documentada.
  doctrine_reference: Consistencia con el texto fuente griego y con el aparato de variantes del POB
translation_notes:
  revision_awareness: La redacción sigue la lectura SBLGNT proporcionada, que incluye «Jesús» antes de Barrabás, y adopta «Mesías» para χριστόν conforme al criterio doctrinal restaurado en la revisión final. Se evitó la sustitución por «Cristo» para no diluir el valor titular del término ni contradecir el historial de revisión.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Mesías» para χριστόν cuando es título.
  - «Así que» se usa para οὖν como conector narrativo natural en español.
  - La construcción interrogativa «¿A cuál quieren que les suelte?» conserva la elección entre dos personas y el matiz judicial de ἀπολύω.
  - Las notas de pie de página se anclan en los lugares pertinentes del texto con [a] y [b].
