translation:
  language: es
  text: y dieron esas monedas por el campo del alfarero[b], tal como el Señor me instruyó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Instruyó» traduce un verbo que también puede significar «mandó» o «ordenó».
    reason: lexical_alternative
  - marker: b
    text: Mateo conserva aquí la primera persona («me») en la cita/alusión profética, en vez de suavizarla para ajustarla al contexto narrativo.
    reason: cross_reference
lexical_decisions:
- source_word: ἔδωκαν
  english_pob_choice: they gave
  chosen_spanish: los dieron
  alternatives_spanish:
  - los entregaron
  - los pagaron
  lexicon: BDAG
  rationale: El aoristo de δίδωμι conserva el sentido básico de dar; en este contexto, el español natural con el referente a las monedas es «los dieron». «Entregaron» es posible, pero añade un matiz más formal/administrativo; «pagaron» interpreta más de lo que el verbo griego expresa por sí solo.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - las
  - eso
  lexicon: BDAG
  rationale: El pronombre neutro plural se refiere a las monedas mencionadas en el contexto. En español, el clítico masculino plural funciona como plural no marcado para ese referente y evita una repetición pesada.
- source_word: εἰς τὸν ἀγρὸν
  english_pob_choice: for the ... field
  chosen_spanish: para el campo
  alternatives_spanish:
  - al campo
  - hacia el campo
  lexicon: BDAG
  rationale: Con δίδωμι, εἰς expresa aquí finalidad o destino práctico en un contexto de disposición monetaria; «para el campo» refleja mejor esa función que un movimiento literal. «Al campo» sería más literal, pero menos transparente en español.
- source_word: τοῦ κεραμέως
  english_pob_choice: the potter's
  chosen_spanish: del alfarero
  alternatives_spanish:
  - del potrero
  - del alfarero
  lexicon: BDAG
  rationale: Κεραμεύς significa «alfarero». En español, el genitivo posesivo se expresa naturalmente con «del alfarero», equivalente a «the potter's». Mantiene la imagen tradicional del campo sin introducir una reinterpretación.
- source_word: καθὰ
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: Καθά introduce correspondencia exacta con una indicación previa. «Tal como» comunica bien la conformidad requerida y es idiomático en español.
- source_word: συνέταξέν
  english_pob_choice: directed
  chosen_spanish: indicó
  alternatives_spanish:
  - mandó
  - ordenó
  - instruyó
  lexicon: BDAG
  rationale: Συντάσσω puede significar ordenar, mandar, instruir o disponer. «Indicó» suena más natural en español moderno y mantiene la idea de una directriz dada; las alternativas más fuertes («mandó», «ordenó») son posibles, pero cargan más el tono.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo personal se conserva con «me» dentro de la locución verbal española. Esto preserva el primer plano de la primera persona que el griego mantiene.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - el Amo
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir יהוה como «Yahvé», aquí el griego usa κύριος en una cita/alusión profética y el audit trail inglés ya fija «the Lord». En español, «el Señor» reproduce con fidelidad esa forma griega y mantiene la resonancia bíblica sin resolver de antemano la identificación del referente.
theological_decisions:
- issue: Preservación del «me» en la cita/alusión profética
  english_pob_reading: Retain first-person 'me' as in the Greek, without attempting to resolve the broader citation-composite issue in the translation itself.
  chosen_spanish_reading: Conservar «me» tal como aparece en el griego, sin armonizarlo con el contexto narrativo o con una fuente del AT en tercera persona.
  alternative_spanish_readings:
  - armonizarlo con el contexto narrativo
  - reformularlo en tercera persona para hacerlo coincidir con la fuente de fondo
  rationale: El texto griego preserva μοι, y la traducción debe mantener esa tensión textual en vez de resolverla por paráfrasis. Esto conserva la transparencia al testimonio de Mateo sobre su forma de citar y evita ocultar una tensión literaria real.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Última revisión: sin cambios necesarios; se mantiene la lectura de alta concordancia del texto griego y del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος en conformidad con el audit trail inglés y con el uso bíblico de esta cita/alusión.
  - Se usa «campo» para ἀγρός y no una expresión más interpretativa, para conservar la imagen concreta del texto.
  - Se conserva la primera persona singular («me») sin armonización, porque esa tensión está documentada en el registro fuente.
