revisions:
- from: y los dieron para el campo del alfarero[b][a], tal como me lo indicó el Señor.
  to: y dieron esas monedas por el campo del alfarero[b], tal como el Señor me instruyó[a].
  rationale: Se revisa para lograr español más natural y a la vez más fiel al griego. «Dieron esas monedas» hace explícito el referente de αὐτά sin la torpeza de «los dieron». «Por el campo» expresa mejor el sentido de disposición/pago en este contexto. «Me instruyó» evita añadir el objeto «lo» y conserva adecuadamente la fuerza de συνέταξέν μοι. Se mantiene la nota sobre la primera persona, pero el anclaje [b] se coloca sobre la frase pertinente sin duplicar marcadores.
