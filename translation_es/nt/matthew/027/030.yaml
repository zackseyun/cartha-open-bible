translation:
  language: es
  text: Y después de escupirle, tomaron la caña[a] y seguían golpeándolo[b] en la cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el bastón de caña». El griego κάλαμος puede designar una caña o, por extensión, un palo semejante a una caña.
    reason: lexical_alternative
  - marker: b
    text: O «le golpeaban la cabeza». El imperfecto griego puede destacar una acción repetida o en curso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμπτύσαντες
  english_pob_choice: after spitting on
  chosen_spanish: después de escupirle
  alternatives_spanish:
  - escupiéndole
  - habiéndole escupido
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales; en español, «después de escupirle» conserva la secuencia narrativa sin sonar forzado. «Escupirle» expresa el sentido idiomático de εἰς αὐτόν con el objeto persona.
- source_word: εἰς αὐτὸν
  english_pob_choice: on him
  chosen_spanish: le
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: BDAG
  rationale: Con ἐμπτύω, εἰς + acusativo funciona idiomáticamente como agresión dirigida a la persona. En español, el clítico dativo «le» comunica naturalmente el agravio sin perder el sentido de menosprecio.
- source_word: ἔλαβον
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - agarraron
  - sujetaron
  lexicon: BDAG
  rationale: El aoristo de λαμβάνω se vierte con un verbo simple y directo. «Tomaron» conserva la acción inmediata y enlaza con el objeto concreto de la escena.
- source_word: κάλαμον
  english_pob_choice: the reed
  chosen_spanish: la caña[a]
  alternatives_spanish:
  - el junco
  - el bastón de caña
  lexicon: BDAG
  rationale: κάλαμος puede significar «caña» o, por extensión, un palo de caña. «Caña» preserva el vínculo léxico con el objeto ya puesto en la escena y mantiene la ironía del relato; la nota aclara la alternativa de un objeto similar a bastón.
- source_word: ἔτυπτον
  english_pob_choice: kept striking
  chosen_spanish: seguían golpeándole
  alternatives_spanish:
  - le golpeaban
  - seguían golpeando su cabeza
  lexicon: BDAG
  rationale: El imperfecto expresa acción repetida o en curso. «Seguían golpeándole» reproduce esa iteración de forma natural en español y mantiene la crudeza del abuso.
- source_word: εἰς τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: his head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - sobre la cabeza
  - en la cabeza
  lexicon: BDAG
  rationale: Con τύπτω, la construcción señala el blanco de los golpes. En español, «golpearle la cabeza» expresa el destino del impacto sin necesidad de una preposición adicional.
theological_decisions:
- issue: Presentación del maltrato a Jesús
  english_pob_reading: Render the actions plainly and concretely without softening or embellishing.
  chosen_spanish_reading: Presentar las acciones de forma directa y concreta, sin atenuarlas ni adornarlas.
  alternative_spanish_readings:
  - Usar un registro más formal y distante
  - Suavizar la violencia con una formulación menos explícita
  rationale: El pasaje es narrativo y describe humillación física; la traducción debe conservar la brutalidad y la repetición implícita en el imperfecto griego. «Seguían golpeándole» mantiene el sentido de acción continua y la violencia del contexto sin añadir interpretación.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar el sentido llano del texto fuente sin paráfrasis.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden plenamente en la secuencia de acciones y en el valor iterativo del imperfecto; no se requieren cambios respecto del sentido base, solo una formulación española natural que conserve la violencia repetida y la referencia al objeto de caña.
  spanish_consistency_notes:
  - Se usa «caña» para κάλαμος, evitando «bastón» en el texto principal para conservar el enlace léxico con la imagen original; la alternativa queda en nota.
  - Se opta por el clítico «le» para εἰς αὐτόν con ἐμπτύσαντες, porque en español suena más natural que una preposición explícita en este contexto de agresión.
  - «Seguían golpeándole» representa el imperfecto ἔτυπτον como acción continua o repetida, en línea con el audit trail inglés.
  - Se evita «SEÑOR» u այլ terminología teológica no pertinente; el verso es puramente narrativo.
