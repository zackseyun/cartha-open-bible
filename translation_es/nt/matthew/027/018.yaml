translation:
  language: es
  text: Porque él sabía que por envidia[a] lo habían entregado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por celos» o «a causa de envidia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾔδει
  english_pob_choice: he knew
  chosen_spanish: él sabía
  alternatives_spanish:
  - él conocía
  - él entendía
  lexicon: οἶδα
  rationale: οἶδα expresa conocimiento o percepción asentada. «Sabía» comunica de manera natural y directa la certeza de Pilato, conservando el valor explicativo del verbo griego.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: γάρ
  rationale: Aquí γάρ introduce la razón de la afirmación anterior; «Porque» mantiene esa relación explicativa en español con fluidez.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: ὅτι
  rationale: En este contexto ὅτι introduce el contenido de lo que Pilato sabía, por eso «que» es la equivalencia más natural.
- source_word: διὰ φθόνον
  english_pob_choice: because of envy
  chosen_spanish: por envidia
  alternatives_spanish:
  - a causa de envidia
  - por celos
  lexicon: διά + acusativo; φθόνος
  rationale: διά con acusativo expresa causa o motivo. «Por envidia» conserva la fuerza causal y la carga moral de φθόνος sin añadir explicación adicional. «Celos» es posible, pero en español puede desviar el matiz hacia rivalidad afectiva.
- source_word: παρέδωκαν
  english_pob_choice: had handed him over
  chosen_spanish: lo habían entregado
  alternatives_spanish:
  - lo habían entregado a él
  - lo habían puesto en manos de
  lexicon: παραδίδωμι
  rationale: En el contexto de la pasión, παραδίδωμι significa entregar a una autoridad o poner en manos de otro. «Lo habían entregado» conserva ese sentido sin restringirlo indebidamente a «traicionar».
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: αὐτός
  rationale: El pronombre acusativo retoma a Jesús; «lo» es la referencia directa y natural en español.
theological_decisions:
- issue: Motivo de la entrega de Jesús
  english_pob_reading: Pilate recognized envy as the motive for their handing Jesus over.
  chosen_spanish_reading: Pilato reconoció la envidia como el motivo de que lo entregaran.
  alternative_spanish_readings:
  - Pilato reconoció los celos como el motivo.
  - Pilato vio que lo habían entregado por resentimiento.
  rationale: La frase griega atribuye la acción a φθόνος, y la traducción conserva ese motivo sin ampliarlo ni suavizarlo. «Envidia» mantiene la tensión moral y psicológica del texto, tal como lo hace la versión inglesa auditada.
  doctrine_reference: Preservar la tensión textual sin resolverla ni reinterpretarla.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés están en alto acuerdo; no se detectan revisiones aplicadas. La redacción española sigue de cerca la relación causal y el tiempo narrativo implícito del aoristo en contexto.
  spanish_consistency_notes:
  - Se usa «entregar» para παραδίδωμι en el contexto de la pasión, evitando «traicionar» porque sería demasiado estrecho.
  - Se conserva «envidia» como opción principal para φθόνος, en línea con la decisión inglesa auditada.
  - El orden español prioriza claridad natural sin perder la relación explicativa introducida por γάρ.
