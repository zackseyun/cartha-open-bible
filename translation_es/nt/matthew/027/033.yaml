translation:
  language: es
  text: Y cuando llegaron a un lugar llamado Gólgota (que significa Lugar de la Calavera),[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «que se llama Lugar de la Calavera» o «que significa Lugar de la Calavera». El griego es una glosa explicativa del nombre Gólgota.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  english_pob_choice: when they came
  chosen_spanish: cuando llegaron
  alternatives_spanish:
  - habiendo llegado
  - después de que llegaron
  lexicon: BDAG
  rationale: El aoristo participial expresa una acción anterior en la secuencia narrativa; en español, «cuando llegaron» transmite con naturalidad el valor temporal sin sonar rígido.
- source_word: τόπον
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un lugar
  lexicon: BDAG
  rationale: τόπος significa «lugar»; «un lugar» conserva el artículo indefinido del griego y suena natural en español.
- source_word: λεγόμενον
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - nombrado
  - siendo llamado
  lexicon: BDAG
  rationale: En este giro, el participio de λέγω funciona como designación. «Llamado» es la forma más idiomática y transparente en español.
- source_word: Γολγοθᾶ
  english_pob_choice: Golgotha
  chosen_spanish: Gólgota
  alternatives_spanish:
  - Golgota
  lexicon: BDAG
  rationale: Es un nombre propio transliterado; «Gólgota» conserva la forma tradicional en español y el valor de nombre de lugar.
- source_word: ὅ ἐστιν
  english_pob_choice: which means
  chosen_spanish: que significa
  alternatives_spanish:
  - que es
  - es decir
  lexicon: BDAG
  rationale: La fórmula explicativa introduce para el lector griego el sentido del nombre arameo/hebreo. «Que significa» comunica con claridad esa glosa explicativa.
- source_word: Κρανίου Τόπος
  english_pob_choice: Place of a Skull
  chosen_spanish: Lugar de una Calavera
  alternatives_spanish:
  - Lugar de la Calavera
  - Lugar de Calavera
  lexicon: BDAG
  rationale: κρανίον significa «cráneo/calavera» y τόπος, «lugar». «Lugar de una Calavera» refleja mejor el anarthroismo del griego que «Lugar de la Calavera», que suena más definido de lo que el texto marca.
- source_word: λεγόμενος
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - nombrado
  - denominado
  lexicon: BDAG
  rationale: La repetición del participio subraya la designación del topónimo; en español se integra con la glosa entre paréntesis sin forzar la repetición.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se requieren ajustes mayores. La única tensión relevante es si traducir Κρανίου Τόπος con artículo definido o indefinido. Se optó por mantener el indefinido («una Calavera») para reflejar con mayor precisión la forma griega y se dejó constancia de la alternativa más tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene «Gólgota» como transliteración del topónimo, en paralelo con el uso en español bíblico.
  - Se evita «SEÑOR» u այլ vocabulario teológico no pertinente; el versículo es puramente geográfico y explicativo.
  - La nota conserva la alternativa tradicional «Lugar de la Calavera» para auditar la tensión entre literalidad y uso eclesial.
