review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite la acción principal, pero omite en el texto principal ἐξ αὐτῶν ('con ellas / con ese dinero'), que en la fuente forma parte de la proposición verbal. También 'para sepultura de los extranjeros' suena menos natural y menos preciso que 'como lugar de sepultura para extranjeros' o equivalente para εἰς ταφὴν τοῖς ξένοις.
  spanish_quality_summary: El español es mayormente claro, pero la omisión de la frase pronominal en el cuerpo del texto debilita la fidelidad. Además, la nota [a] está anclada a 'Campo del Alfarero', aunque explica ἐξ αὐτῶν, lo cual desubica la nota. 'Así que' es aceptable, pero 'Entonces' fluye mejor en narración bíblica; 'forasteros' funciona mejor como alternativa en nota que como principal.
  glossary_alignment: 'No hay conflicto con la terminología doctrinal del proyecto. ''Campo del Alfarero'' y ''extranjeros'' son adecuados. La principal desviación es metodológica: el inglés POB mantuvo ἐξ αὐτῶν en el texto principal, y el español también debería conservarlo de manera idiomática.'
  issues:
  - severity: high
    issue: Se omitió ἐξ αὐτῶν en el texto principal.
    rationale: La fuente griega incluye explícitamente la referencia a las monedas; relegarla solo a nota reduce la correspondencia con el original y con el rastro de auditoría del POB en inglés.
  - severity: medium
    issue: La nota [a] está anclada al sintagma equivocado.
    rationale: La nota explica 'con ellas / de ellos', pero el marcador aparece en 'Campo del Alfarero' en vez de junto a la frase que representa ἐξ αὐτῶν.
  - severity: medium
    issue: '''para sepultura de los extranjeros'' no es la formulación española más natural para εἰς ταφὴν τοῖς ξένοις.'
    rationale: En español suena más claro 'como lugar de sepultura para extranjeros' o 'para sepultar a extranjeros', que reflejan mejor finalidad y destinatario.
  - severity: low
    issue: '''Así que'' puede leerse levemente consecutivo-causal más que meramente narrativo.'
    rationale: Aunque posible para δέ, 'Entonces' o simplemente omitir el conector sería algo más natural en este contexto narrativo.
  revised_spanish_text: Entonces, después de deliberar, compraron con ellas[a] el Campo del Alfarero como lugar de sepultura para extranjeros[b].
  revised_footnotes:
  - marker: a
    text: O «con ese dinero»; el griego dice literalmente «de ellos», refiriéndose a las monedas de plata mencionadas en el contexto anterior.
    reason: lexical_alternative
  - marker: b
    text: O «para forasteros».
    reason: lexical_alternative
  revision_rationale: Se restituye en el texto principal la referencia de ἐξ αὐτῶν con una formulación española natural ('con ellas'), se coloca la nota en el lugar correcto y se mejora la expresión de finalidad/destinatario para εἰς ταφὴν τοῖς ξένοις. 'Entonces' refleja bien el valor narrativo de δέ sin cargarlo de causalidad.
