- from: Así que, después de deliberar, compraron el Campo del Alfarero[a] para sepultura de los extranjeros[b].
  to: Entonces, después de deliberar, compraron con ellas[a] el Campo del Alfarero como lugar de sepultura para extranjeros[b].
  rationale: Se restituye en el texto principal la referencia de ἐξ αὐτῶν con una formulación española natural ('con ellas'), se coloca la nota en el lugar correcto y se mejora la expresión de finalidad/destinatario para εἰς ταφὴν τοῖς ξένοις. 'Entonces' refleja bien el valor narrativo de δέ sin cargarlo de causalidad.
