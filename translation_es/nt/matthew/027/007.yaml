translation:
  language: es
  text: Entonces, después de deliberar, compraron con ellas[a] el Campo del Alfarero como lugar de sepultura para extranjeros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con ese dinero»; el griego dice literalmente «de ellos», refiriéndose a las monedas de plata mencionadas en el contexto anterior.
    reason: lexical_alternative
  - marker: b
    text: O «para forasteros».
    reason: lexical_alternative
lexical_decisions:
- source_word: συμβούλιον ... λαβόντες
  english_pob_choice: after taking counsel
  chosen_spanish: después de deliberar
  alternatives_spanish:
  - después de tomar consejo
  - después de consultar juntos
  lexicon: BDAG
  rationale: La construcción participial expresa una acción previa de deliberación. «Después de deliberar» conserva el sentido de decisión tomada tras consulta, con un español natural y digno.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: δέ aquí continúa la narración sin contraste fuerte. «Así que» refleja bien la transición narrativa en español sin añadir oposición.
- source_word: ἠγόρασαν
  english_pob_choice: they bought
  chosen_spanish: compraron
  alternatives_spanish:
  - adquirieron
  - compraron
  lexicon: BDAG
  rationale: El aoristo de ἀγοράζω se rinde de forma directa y natural con «compraron».
- source_word: ἐξ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: '[a]'
  alternatives_spanish:
  - con ellas
  - con ese dinero
  - de ellos
  lexicon: BDAG
  rationale: El griego dice literalmente «de ellos / de ellas», con referencia contextual a las monedas de plata ya mencionadas. En español, la nota conserva la relación lexical sin forzar una paráfrasis dentro del texto principal.
- source_word: τὸν Ἀγρὸν τοῦ Κεραμέως
  english_pob_choice: the Potter’s Field
  chosen_spanish: el Campo del Alfarero
  alternatives_spanish:
  - el campo del alfarero
  - el Campo del Alfarero
  lexicon: BDAG
  rationale: Se mantiene el nombre convencional del lugar en forma publicable y transparente. La mayúscula refleja su función como designación identificable dentro del relato.
- source_word: εἰς ταφὴν
  english_pob_choice: as a burial place
  chosen_spanish: para sepultura
  alternatives_spanish:
  - como lugar de sepultura
  - para un sepulcro
  lexicon: BDAG
  rationale: La preposición εἰς con ταφή expresa finalidad. «Para sepultura» conserva el valor funcional en un español conciso y fiel.
- source_word: τοῖς ξένοις
  english_pob_choice: for foreigners
  chosen_spanish: de los extranjeros[b]
  alternatives_spanish:
  - para los extranjeros
  - de los forasteros
  - para forasteros
  lexicon: BDAG
  rationale: ξένος aquí se refiere a personas de fuera, no simplemente a desconocidos. «Extranjeros» es la opción más clara y precisa en español; la nota conserva la alternativa tradicional «forasteros/strangers».
theological_decisions:
- issue: Sentido de ἐξ αὐτῶν en contexto de las monedas devueltas por Judas
  english_pob_reading: The pronoun refers to the silver coins returned by Judas, rendered idiomatically as 'with them.'
  chosen_spanish_reading: El texto principal evita decidir una glosa explícita y deja la referencia contextual en la nota, vinculándola con las monedas mencionadas antes.
  alternative_spanish_readings:
  - con ese dinero
  - de ellas
  - con ellas
  rationale: La fuente griega es breve y depende del contexto inmediato. En español, una nota permite mantener la relación referencial sin sobreexplicar en la línea principal.
  doctrine_reference: 'Translation philosophy: original-language primacy; optimal equivalence.'
- issue: Alcance de ξένοις
  english_pob_reading: for foreigners
  chosen_spanish_reading: para los extranjeros
  alternative_spanish_readings:
  - para los forasteros
  - para los extraños
  rationale: No hay indicio de un sentido doctrinal especial; se trata de un uso semántico concreto de ξένοις. «Extranjeros» evita la ambigüedad de «extraños» en español y conserva la idea de no pertenecientes a la comunidad local.
  doctrine_reference: Lexical precision in context; no doctrinal tension.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura final del POB en inglés para Mateo 27:7, manteniendo la secuencia narrativa, el referente contextual de ἐξ αὐτῶν y la designación convencional del «Potter’s Field». La única adaptación principal es el ajuste natural del español para expresar la finalidad de εἰς ταφὴν con «para sepultura», y la explicitación en nota del valor referencial de las monedas del contexto anterior.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada cuando no aparece el Tetragrámaton en este versículo; no aplica aquí.
  - Se conserva «extranjeros» en el texto principal y se ofrece «forasteros» en nota para reflejar la alternativa inglesa «strangers».
  - La puntuación y el orden responden a una sintaxis española natural sin perder la relación de causa/resultado narrativa del δέ inicial.
  - No se añadió nota de variante textual porque no hay evidencia de variante relevante en el paquete fuente.
