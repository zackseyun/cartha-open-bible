review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura general del griego: imperativo oficial («ordena»), seguridad del sepulcro, límite temporal «hasta el tercer día», temor preventivo, robo del cuerpo expresado con pronombre personal, anuncio al pueblo y comparación entre el engaño final y el primero. También conserva correctamente la variante textual sobre «de noche» en nota. Sin embargo, falla en un punto clave del sentido fuente y del rastro de auditoría POB: Ἠγέρθη es pasivo y el inglés POB decidió preservarlo en el texto principal, no solo en nota. «Ha resucitado» cambia la voz a intransitiva/activa media y suaviza una decisión teológica y lexical explícitamente documentada.'
  spanish_quality_summary: El español es claro, natural y ampliamente legible. «Por tanto», «ordena», «se asegure la tumba», «no sea que» y «digan al pueblo» funcionan bien. La frase principal requiere solo una reparación puntual para reflejar la voz pasiva de Ἠγέρθη de forma natural en español. «Ha sido resucitado» sería algo pesado; «fue resucitado» suena menos idiomático pero es fiel y ya está documentado como alternativa. Para español bíblico moderno y digno, «ha sido levantado de entre los muertos» preserva la pasiva con buena legibilidad, aunque se aleja del verbo español tradicional «resucitar». La opción más directa y comprensible aquí es «ha sido resucitado de entre los muertos», manteniendo la nota alternativa si se desea registrar la opción aorística simple.
  glossary_alignment: 'No hay términos del glosario maestro especialmente controvertidos en este versículo. «tumba» para τάφος, «pueblo» para λαός y «engaño» para πλάνη concuerdan con las decisiones auditadas. El único desajuste importante es teológico-lexical: el proyecto pide preservar la tensión del original y la decisión inglesa fijó la voz pasiva en Ἠγέρθη; por tanto, «Ha resucitado» no se alinea con la política documentada.'
  issues:
  - severity: high
    issue: La cláusula «Ha resucitado de entre los muertos» no preserva la voz pasiva de Ἠγέρθη.
    rationale: El griego usa pasivo y el English POB eligió expresamente «He has been raised» por importancia teológica. Pasarlo a «ha resucitado» introduce un cambio interpretativo en el texto principal que la nota no compensa.
  - severity: medium
    issue: La nota b presenta «Fue resucitado...» como alternativa, pero en realidad esa forma debería pasar al texto principal.
    rationale: La nota actualmente corrige una decisión del texto, cuando el rastro de auditoría pide que el texto principal preserve la pasiva y la nota solo recoja la alternativa temporal/aspectual.
