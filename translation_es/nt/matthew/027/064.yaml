  to: 'Por tanto, ordena que se asegure la tumba[a] hasta el tercer día, no sea que sus discípulos vayan y lo roben y digan al pueblo[b]: «Ha sido resucitado de entre los muertos», y el último engaño será peor que el primero.'
  rationale: Se revisa únicamente la formulación de Ἠγέρθη para que el texto principal español preserve la voz pasiva, conforme al griego y a la decisión teológica/lexical ya auditada en el English POB. El resto del versículo está bien resuelto y no requiere cambios.
