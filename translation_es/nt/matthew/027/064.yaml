translation:
  language: es
  text: 'Por tanto, ordena que se asegure la tumba[a] hasta el tercer día, no sea que sus discípulos vayan y lo roben y digan al pueblo[b]: «Ha sido resucitado de entre los muertos», y el último engaño será peor que el primero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden «de noche» después de «vayan»: «no sea que sus discípulos vayan de noche y lo roben». Se sigue aquí la lectura más corta.'
    reason: textual_variant
  - marker: b
    text: 'O: «Fue resucitado de entre los muertos». El griego está en voz pasiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κέλευσον
  english_pob_choice: order
  chosen_spanish: ordena
  alternatives_spanish:
  - da la orden
  - manda
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una instrucción oficial y decisiva. En español, «ordena» conserva ese matiz de autoridad sin sonar excesivamente duro o arcaico.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Marca la conclusión lógica de lo anterior. «Por tanto» preserva con claridad la inferencia y funciona bien en español formal.
- source_word: ἀσφαλισθῆναι
  english_pob_choice: to be secured
  chosen_spanish: se asegure
  alternatives_spanish:
  - se haga segura
  - se vigile
  lexicon: BDAG
  rationale: El infinitivo pasivo apunta a que la tumba sea puesta en estado seguro. «Se asegure» es suficientemente amplio para no especificar más de lo que el griego dice.
- source_word: τὸν τάφον
  english_pob_choice: the tomb
  chosen_spanish: la tumba
  alternatives_spanish:
  - el sepulcro
  - la sepultura
  lexicon: BDAG
  rationale: En el contexto del entierro de Jesús, «tumba» es natural y claro en español. «Sepulcro» también sería posible, pero «tumba» comunica mejor el lugar funerario rocoso sin sonar demasiado litúrgico.
- source_word: ἕως τῆς τρίτης ἡμέρας
  english_pob_choice: until the third day
  chosen_spanish: hasta el tercer día
  alternatives_spanish:
  - hasta el día tercero
  lexicon: BDAG
  rationale: Es la forma más idiomática en español y mantiene la relación con la predicción de la resurrección.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - quizá
  lexicon: BDAG
  rationale: Introduce una posibilidad temida o preventiva. «No sea que» transmite bien ese valor sin volverlo demasiado interpretativo.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La construcción posesiva en español se expresa de forma natural con «sus discípulos».
- source_word: κλέψωσιν αὐτὸν
  english_pob_choice: steal him
  chosen_spanish: lo roben
  alternatives_spanish:
  - lo hurten
  - lo sustraigan
  lexicon: BDAG
  rationale: El objeto directo es Jesús, referido por «lo». «Roben» conserva la fuerza del verbo sin introducir una aclaración explícita sobre «el cuerpo» que el griego no menciona.
- source_word: εἴπωσιν τῷ λαῷ
  english_pob_choice: say to the people
  chosen_spanish: digan al pueblo
  alternatives_spanish:
  - digan a la gente
  - cuenten al pueblo
  lexicon: BDAG
  rationale: «Pueblo» refleja mejor λαός que «gente» en este contexto de habla pública y religiosa. «Digan al pueblo» es directo y cercano al griego.
- source_word: Ἠγέρθη
  english_pob_choice: He has been raised
  chosen_spanish: Ha resucitado
  alternatives_spanish:
  - Fue resucitado
  - Ha sido levantado
  lexicon: BDAG
  rationale: En español, «ha resucitado» es la fórmula más natural y ampliamente entendida para el anuncio pascual. Aunque el griego es pasivo, esta frase conserva el resultado de la acción; el matiz pasivo se explica en la nota.
- source_word: ἀπὸ τῶν νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  lexicon: BDAG
  rationale: «De entre los muertos» refleja mejor la expresión idiomática de resurrección y mantiene más de cerca el plural griego.
- source_word: ἡ ἐσχάτη πλάνη
  english_pob_choice: the last deception
  chosen_spanish: el último engaño
  alternatives_spanish:
  - el engaño final
  - la última ilusión
  lexicon: BDAG
  rationale: πλάνη aquí se refiere a una afirmación considerada engañosa por los hablantes. «Engaño» expresa bien esa valoración hostil en español.
- source_word: χείρων τῆς πρώτης
  english_pob_choice: worse than the first
  chosen_spanish: peor que el primero
  alternatives_spanish:
  - más grave que el primero
  - peor que la primera
  lexicon: BDAG
  rationale: Mantiene el contraste comparativo de forma natural en español. «El primero» retiene la referencia anafórica del griego.
theological_decisions:
- issue: Valor pasivo de Ἠγέρθη en el anuncio reportado
  english_pob_reading: He has been raised from the dead
  chosen_spanish_reading: Ha resucitado de entre los muertos
  alternative_spanish_readings:
  - Fue resucitado de entre los muertos
  - Ha sido resucitado de entre los muertos
  rationale: El griego usa voz pasiva, y la tradición narrativa en español suele decir «ha resucitado». Para no perder la tensión documental, la nota explica que el griego es pasivo y que también puede entenderse como «fue resucitado».
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la primacía del idioma fuente; no resolver implícitamente quién realiza la acción más allá de lo que el texto dice.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el cierre de revisión del texto inglés: se evitó añadir «away» o cualquier equivalente explicativo que no esté en el griego. La versión española sigue la lectura más breve y mantiene el lenguaje pasivo indicado por el audit trail, aunque en el cuerpo principal se eligió la forma idiomática «ha resucitado».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se prefirió «tumba» como término neutral y claro en contexto funerario de Jesús.
  - «Pueblo» se mantuvo para λαός, en coherencia con el registro bíblico y comunitario.
  - Se evitó «Cristo» porque el pasaje no usa Χριστός.
  - La nota de la variante textual deja claro que «de noche» no pertenece a la lectura seguida.
