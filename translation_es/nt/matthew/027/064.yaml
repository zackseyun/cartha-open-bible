source:
  edition: SBLGNT
  text: κέλευσον οὖν ἀσφαλισθῆναι τὸν τάφον ἕως τῆς τρίτης ἡμέρας, μήποτε ἐλθόντες οἱ μαθηταὶ ⸀αὐτοῦ κλέψωσιν αὐτὸν καὶ εἴπωσιν τῷ λαῷ· Ἠγέρθη ἀπὸ τῶν νεκρῶν, καὶ ἔσται ἡ ἐσχάτη πλάνη χείρων τῆς πρώτης.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/064.yaml
  text: Therefore[a], order the tomb to be secured until the third day, lest his disciples come and steal him and say to the people[b], ‘He has been raised from the dead,’ and the last deception will be worse than the first.
  footnotes:
  - marker: a
    text: 'Some manuscripts add ''by night'' after ''come'': ''lest his disciples come by night and steal him away.'' The shorter reading is followed here.'
    reason: textual_variant
  - marker: b
    text: Or, 'He was raised from the dead.' The Greek is passive.
    reason: lexical_alternative
  ai_draft:
