translation:
  language: es
  text: Salvó a otros; no puede salvarse a sí mismo. Es el Rey de Israel; que baje ahora de la cruz[a], y creeremos en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si es el Rey de Israel, que baje ahora de la cruz, y creeremos en él». Algunas traducciones hacen explícita la burla añadiendo una condición, pero el griego aquí presenta el título de manera directa.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄλλους
  english_pob_choice: others
  chosen_spanish: a otros
  alternatives_spanish:
  - a los demás
  - a otras personas
  lexicon: BDAG
  rationale: El acusativo plural funciona sustantivamente y en español se expresa de forma natural como objeto directo plural. «A otros» conserva la brevedad y el contraste burlón con «a sí mismo».
- source_word: ἔσωσεν
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - rescató
  - ha salvado
  lexicon: BDAG
  rationale: El aoristo de σῴζω se vierte con pretérito simple para mantener la acción puntual atribuida a Jesús. «Salvó» conserva la amplitud semántica de liberación/salvación sin sobreexplicar.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre reflexivo marca el contraste directo con «a otros». En español, «a sí mismo» es más claro y mantiene el énfasis reflexivo.
- source_word: οὐ δύναται σῶσαι
  english_pob_choice: cannot save
  chosen_spanish: no puede salvarse
  alternatives_spanish:
  - no es capaz de salvar
  - no puede salvar
  lexicon: BDAG
  rationale: 'El griego expresa incapacidad para salvar(se). En español, la forma reflexiva comunica mejor la burla: «no puede salvarse a sí mismo». Aunque el griego no repite el objeto, el sentido está implícito en el contraste con el pronombre reflexivo anterior.'
- source_word: βασιλεὺς Ἰσραήλ
  english_pob_choice: the King of Israel
  chosen_spanish: Rey de Israel
  alternatives_spanish:
  - el Rey de Israel
  - Rey de Israel
  lexicon: BDAG
  rationale: La frase es un título nominal directo. En español, la omisión del artículo en un grito burlón resulta natural y conserva el tono de invectiva. La mayúscula en «Rey» señala el carácter titular, no una simple descripción.
- source_word: καταβάτω
  english_pob_choice: let him come down
  chosen_spanish: que baje
  alternatives_spanish:
  - que descienda
  - que se baje
  lexicon: BDAG
  rationale: El imperativo exhortativo/de desafío se expresa con «que + subjuntivo» en español. «Que baje» es idiomático y conserva el tono de provocación.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - en este momento
  lexicon: BDAG
  rationale: Adverbio temporal que intensifica la exigencia inmediata. «Ahora» es el equivalente directo y natural.
- source_word: ἀπὸ τοῦ σταυροῦ
  english_pob_choice: from the cross
  chosen_spanish: de la cruz
  alternatives_spanish:
  - desde la cruz
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo se expresa de manera natural con «de». «De la cruz» mantiene la referencia concreta al instrumento de ejecución sin volverlo más interpretativo.
- source_word: πιστεύσομεν ἐπ’ αὐτόν
  english_pob_choice: we will believe in him
  chosen_spanish: creeremos en él
  alternatives_spanish:
  - confiaríamos en él
  - creeremos sobre él
  lexicon: BDAG
  rationale: πιστεύω con ἐπί + acusativo puede expresar confianza/belief dirigido a una persona. «Creeremos en él» es la formulación más natural en español y preserva la dirección relacional del verbo sin añadir matices ajenos.
theological_decisions:
- issue: Conservar la afirmación burlona «Rey de Israel» sin convertirla en condicional
  english_pob_reading: He is the King of Israel; let him come down now from the cross, and we will believe in him.
  chosen_spanish_reading: Rey de Israel es; que baje ahora de la cruz, y creeremos en él.
  alternative_spanish_readings:
  - Si es el Rey de Israel, que baje ahora de la cruz, y creeremos en él.
  rationale: 'El griego, tal como está, presenta un enunciado nominal directo y no introduce una condición explícita. La traducción mantiene esa tensión: los burladores repiten el título de manera irónica, en vez de convertirlo en una hipótesis que suavice la burla.'
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión retórica sin resolución interpretativa artificial.
translation_notes:
  revision_awareness: 'Coincide con el último control de revisión: no se registraron cambios necesarios; la versión se mantiene alineada con el análisis griego y con el audit trail inglés, especialmente en la preservación del enunciado nominal ''Rey de Israel'' sin condicional explícita.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «cruz» para σταυρός por correspondencia directa y uso histórico-contextual.
  - Se traduce πιστεύω con ἐπί + acusativo como «creer en» para conservar la dirección personal de la fe/burla sin sobrecargar el español.
  - No se introduce «Cristo» porque el texto fuente no usa Χριστός aquí.
