  text: Καθημένου δὲ αὐτοῦ ἐπὶ τοῦ βήματος ἀπέστειλεν πρὸς αὐτὸν ἡ γυνὴ αὐτοῦ λέγουσα· Μηδὲν σοὶ καὶ τῷ δικαίῳ ἐκείνῳ, πολλὰ γὰρ ἔπαθον σήμερον κατ’ ὄναρ δι’ αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/027/019.yaml
  text: While he was sitting on the judgment seat[a], his wife sent word to him, saying, “Have nothing to do with that righteous man[b], for I have suffered greatly today in a dream because of him.”
  footnotes:
  - marker: a
    text: Or 'that innocent man.' The Greek adjective can mean 'righteous,' 'just,' or, in legal context, 'innocent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because I suffered greatly today in a dream because of him.'.
    reason: previous_rendering
