translation:
  language: es
  text: 'Mientras él estaba sentado en el estrado[a], su esposa le mandó decir: «No tengas nada que ver con ese hombre justo[b], porque hoy he sufrido mucho en un sueño a causa de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el tribunal» o «en el asiento de juicio». βῆμα puede designar el estrado oficial de un juez o gobernante.
    reason: lexical_alternative
  - marker: b
    text: O «ese hombre inocente». El adjetivo griego puede significar «justo», «recto» o, en contexto legal, «inocente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καθημένου ... αὐτοῦ
  english_pob_choice: While he was sitting
  chosen_spanish: Mientras él estaba sentado
  alternatives_spanish:
  - Cuando él estaba sentado
  - Mientras estaba sentado
  lexicon: BDAG
  rationale: El participio genitivo circunstancial expresa una acción contemporánea; en español, «mientras él estaba sentado» conserva bien el aspecto en curso y suena natural.
- source_word: ἐπὶ τοῦ βήματος
  english_pob_choice: on the judgment seat
  chosen_spanish: en el estrado
  alternatives_spanish:
  - en el tribunal
  - en el asiento de juicio
  lexicon: BDAG
  rationale: βῆμα aquí designa el asiento o plataforma oficial de juicio. «Estrado» comunica la idea de una sede judicial sin sonar tan marcadamente eclesiástico como «tribunal» en algunos contextos, aunque esta última sigue siendo una alternativa válida.
- source_word: ἀπέστειλεν πρὸς αὐτὸν
  english_pob_choice: sent word to him
  chosen_spanish: le envió un recado
  alternatives_spanish:
  - le mandó decir
  - le envió un mensaje
  lexicon: BDAG
  rationale: La construcción indica el envío de una comunicación por medio de otro; «le envió un recado» es idiomático en español y preserva la idea de mensaje indirecto.
- source_word: ἡ γυνὴ αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: BDAG
  rationale: En este contexto γυνή significa esposa; «su esposa» evita ambigüedad en español.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el contenido del mensaje; «diciendo» mantiene el enlace sintáctico con el verbo de envío.
- source_word: Μηδὲν σοὶ καὶ τῷ δικαίῳ ἐκείνῳ
  english_pob_choice: Have nothing to do with that righteous man
  chosen_spanish: No tengas nada que ver con ese hombre justo
  alternatives_spanish:
  - No te involucres con ese hombre justo
  - No tengas nada contra ese hombre justo
  lexicon: BDAG
  rationale: La expresión idiomática exige una solución natural en español. «No tengas nada que ver con» comunica la advertencia con claridad. «Justo» conserva el valor de δίκαιος, manteniendo la tensión entre juicio moral y posible inocencia legal.
- source_word: τῷ δικαίῳ ἐκείνῳ
  english_pob_choice: that righteous man
  chosen_spanish: ese hombre justo
  alternatives_spanish:
  - ese hombre inocente
  - ese hombre recto
  lexicon: BDAG
  rationale: Se mantiene δίκαιος como «justo» para no reducirlo a una mera absolución legal. En notas se puede conservar la alternativa «inocente», dada la carga judicial del pasaje.
- source_word: πολλὰ ... ἔπαθον
  english_pob_choice: I suffered greatly
  chosen_spanish: he sufrido mucho
  alternatives_spanish:
  - he padecido mucho
  - he sufrido gravemente
  lexicon: BDAG
  rationale: Aunque el aoristo apunta a un sufrimiento puntual en la experiencia del sueño, en español «he sufrido mucho» transmite bien la intensidad y el efecto vigente de la experiencia. Se evita forzar un pasado simple que suene menos urgente.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: BDAG
  rationale: Adverbio temporal directo; «hoy» es la equivalencia natural y clara.
- source_word: κατ’ ὄναρ
  english_pob_choice: in a dream
  chosen_spanish: en sueños
  alternatives_spanish:
  - en un sueño
  - por medio de un sueño
  lexicon: BDAG
  rationale: La expresión griega es una fórmula idiomática de experiencia onírica. «En sueños» suena natural en español y conserva el carácter de experiencia de sueño.
- source_word: δι’ αὐτόν
  english_pob_choice: because of him
  chosen_spanish: a causa de él
  alternatives_spanish:
  - por él
  - debido a él
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo; «a causa de él» es claro y mantiene la relación causal explícita.
theological_decisions:
- issue: δίκαιος aplicado a Jesús en boca de la esposa de Pilato
  english_pob_reading: righteous man
  chosen_spanish_reading: hombre justo
  alternative_spanish_readings:
  - hombre inocente
  - hombre recto
  rationale: Se conserva el peso moral de δίκαιος sin convertirlo exclusivamente en un veredicto jurídico. «Justo» mantiene la amplitud semántica y deja abierta la tensión con el contexto judicial.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, especialmente la preferencia por una relación causal directa para δι’ αὐτόν y la mejora del flujo frente a repeticiones de «because». En español, esto se reflejó con «a causa de él», evitando sobrecargar la cláusula con dos giros idénticos de causalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «hombre justo» para δίκαιος, en coherencia con la decisión del POB inglés de preservar la amplitud moral/judicial del término.
  - «Estrado» funciona aquí como equivalente sobrio de βῆμα en contexto de juicio.
  - «En sueños» preserva la cualidad idiomática de κατ’ ὄναρ sin añadir interpretación doctrinal.
