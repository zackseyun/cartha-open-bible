revisions:
- from: 'Pero él dijo: «¿Qué mal ha hecho?». Pero ellos gritaban con mayor insistencia, diciendo: «¡Que sea crucificado![a]»'
  to: 'Pero él dijo: «¿Qué mal ha hecho?». Pero ellos gritaban aún más, diciendo: «¡Que sea crucificado![a]»'
  rationale: Se corrige la nota al pie para que coincida con el lugar y el sentido relevantes del texto griego y de la auditoría inglesa. También se ajusta «con mayor insistencia» a «aún más» para reflejar de forma más directa περισσῶς, manteniendo un español natural. La forma pasiva final se conserva por fidelidad a σταυρωθήτω.
