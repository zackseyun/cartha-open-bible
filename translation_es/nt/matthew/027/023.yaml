translation:
  language: es
  text: 'Pero él dijo: «¿Qué mal ha hecho?». Pero ellos gritaban aún más, diciendo: «¡Que sea crucificado![a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación tradicional suele ser «Crucifíquenlo». Más literalmente, el griego dice «Que sea crucificado».
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: él dijo
  alternatives_spanish:
  - respondió
  - dijo
  lexicon: BDAG
  rationale: El aoristo de φημί funciona aquí como introducción narrativa al discurso. «Él dijo» es natural en español y conserva el contraste con la multitud mediante el pronombre explícito, aunque puede omitirse si el contexto lo hace evidente.
- source_word: Τί γὰρ κακὸν ἐποίησεν;
  english_pob_choice: What evil has he done?
  chosen_spanish: ¿Qué mal ha hecho?
  alternatives_spanish:
  - ¿Qué mal ha hecho, pues?
  - ¿Qué mal ha cometido?
  lexicon: BDAG
  rationale: τί γάρ es una pregunta desafiante; en español, «¿Qué mal ha hecho?» conserva la fuerza interrogativa sin forzar un giro poco natural. «Mal» retiene el valor moral de κακόν; «ha hecho» refleja el acto completo ya puesto en juicio.
- source_word: κακὸν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - evil
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva «evil» para la fuerza moral, en español «mal» comunica mejor el término sin sonar excesivamente abstracto o arcaico. «Maldad» intensifica más el sustantivo y se aparta un poco del uso sencillo del griego.
- source_word: περισσῶς
  english_pob_choice: all the more
  chosen_spanish: con mayor insistencia
  alternatives_spanish:
  - aún más
  - con más vehemencia
  - todavía con más fuerza
  lexicon: BDAG
  rationale: El adverbio intensifica la respuesta de la multitud. «Con mayor insistencia» expresa bien el aumento de presión/resonancia sin limitarlo solo al volumen. Se evita «excedidamente» por ser poco idiomático.
- source_word: ἔκραζον
  english_pob_choice: cried out
  chosen_spanish: gritaban
  alternatives_spanish:
  - seguían gritando
  - clamaban
  lexicon: BDAG
  rationale: El imperfecto señala acción continua o repetida; «gritaban» mantiene esa duración de modo natural en español. «Clamaban» sería más elevado, pero menos directo para esta escena de protesta pública.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - mientras decían
  - y decían
  lexicon: BDAG
  rationale: El participio contemporáneo se vierte de forma directa con «diciendo», que funciona bien como enlace al clamor citado.
- source_word: Σταυρωθήτω
  english_pob_choice: Let him be crucified
  chosen_spanish: ¡Que sea crucificado!
  alternatives_spanish:
  - Crucifíquenlo
  - Que lo crucifiquen
  lexicon: BDAG
  rationale: El griego usa un imperativo pasivo de tercera persona; «¡Que sea crucificado!» preserva esa forma pasiva con claridad en español. Se evita el activo tradicional por fidelidad formal al matiz de la construcción.
- source_word: ὁ δὲ ... οἱ δὲ
  english_pob_choice: But he ... But they ...
  chosen_spanish: Pero él ... Pero ellos ...
  alternatives_spanish:
  - Entonces él ... pero ellos ...
  - Y él ... y ellos ...
  lexicon: BDAG
  rationale: δέ introduce contraste y continuidad. Repetir «Pero» ayuda a mantener la oposición narrativa entre Pilato y la multitud.
theological_decisions:
- issue: Forma pasiva del mandato final
  english_pob_reading: Let him be crucified
  chosen_spanish_reading: ¡Que sea crucificado!
  alternative_spanish_readings:
  - Crucifíquenlo
  - Que lo crucifiquen
  rationale: La forma pasiva del griego (σταυρωθήτω) no debe aplanarse sin necesidad. En español, «¡Que sea crucificado!» reproduce el valor pasivo del mandato y evita introducir un sujeto agente explícito que el texto no da.
  doctrine_reference: Principio de primacía del texto original; conservar la forma gramatical cuando no distorsiona el español.
translation_notes:
  revision_awareness: Se siguió el contexto de revisión del POB en inglés, que opta por una pregunta directa sin añadir un equivalente de «for» y por un imperfecto narrativo sencillo para el clamor. La versión española refleja esa misma economía y conserva el mandato pasivo final con claridad.
  spanish_consistency_notes:
  - Se mantuvo «Pero» para reproducir el contraste de δέ en ambas cláusulas.
  - Se eligió «mal» para κακόν por claridad natural en español, sin perder el peso moral del término.
  - El mandato final conserva la pasividad del original en lugar de convertirlo en un imperativo activo tradicional.
