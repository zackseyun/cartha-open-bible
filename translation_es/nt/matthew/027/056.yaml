translation:
  language: es
  text: entre las cuales estaban María la Magdalena[a] y María la madre de Jacobo y de José, y la madre de los hijos de Zebedeo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y lecturas tienen «Joses» en lugar de «José».
    reason: textual_variant
lexical_decisions:
- source_word: ἐν αἷς
  english_pob_choice: among whom
  chosen_spanish: entre las cuales
  alternatives_spanish:
  - entre ellas
  - entre quienes
  lexicon: BDAG
  rationale: El relativo femenino plural exige en español una referencia natural al grupo anterior de mujeres. «Entre las cuales» conserva la relación relativa y el sentido de pertenencia dentro del grupo, de modo comparable a «among whom».
- source_word: ἦν
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - había
  - eran
  lexicon: BDAG
  rationale: Aunque el verbo griego está en singular, introduce de manera existencial una lista plural. En español, «estaban» suena natural para expresar la presencia de varias mujeres en ese grupo.
- source_word: Μαρία ἡ Μαγδαληνὴ
  english_pob_choice: Mary Magdalene
  chosen_spanish: María la Magdalena
  alternatives_spanish:
  - María Magdalena
  - María, la Magdalena
  lexicon: BDAG
  rationale: Se conserva el nombre propio con el epíteto identificador. «La Magdalena» es una forma clara y tradicional en español bíblico, equivalente a «Magdalene» sin volverlo áspero o demasiado literal.
- source_word: Μαρία ἡ τοῦ Ἰακώβου καὶ ⸀Ἰωσὴφ μήτηρ
  english_pob_choice: Mary the mother of James and Joseph
  chosen_spanish: María la madre de Jacobo y de José
  alternatives_spanish:
  - María, madre de Jacobo y de José
  - María la madre de Santiago y de José
  lexicon: BDAG
  rationale: El griego identifica a esta María por sus hijos mediante μήτηρ. Se mantiene la estructura explícita «la madre de…» para no diluir la relación apposicional. «Jacobo» conserva el nombre griego Ἰάκωβος con mayor cercanía al original; «José» representa Ἰωσήφ de forma natural en español.
- source_word: Ἰάκωβος
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  - Jacobo
  lexicon: BDAG
  rationale: Aunque el inglés POB usa la forma tradicional «James», en español la correspondencia más cercana y menos interpretativa con Ἰάκωβος es «Jacobo». «Santiago» sería la forma eclesial común, pero introduce una tradición nominal distinta que no siempre es transparente al original.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  - Joseph
  lexicon: BDAG
  rationale: El nombre griego se vierte con la forma hispana corriente «José», que corresponde naturalmente a Ἰωσήφ/Ἰωσὴφ y resulta más idiomática que el transliterado «Joseph».
- source_word: ἡ μήτηρ τῶν υἱῶν Ζεβεδαίου
  english_pob_choice: the mother of the sons of Zebedee
  chosen_spanish: la madre de los hijos de Zebedeo
  alternatives_spanish:
  - la madre de los hijos de Zebedeo
  - la madre de Zebedeo, sus hijos
  lexicon: BDAG
  rationale: Se conserva la relación genitiva directa del griego con una construcción clara en español. «Hijos de Zebedeo» reproduce el vínculo familiar sin introducir especificaciones ajenas al texto.
- source_word: Ζεβεδαίου
  english_pob_choice: Zebedee
  chosen_spanish: Zebedeo
  alternatives_spanish:
  - Zebedeo
  lexicon: BDAG
  rationale: Se mantiene la transliteración tradicional del nombre propio en español, equivalente al usado en inglés.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto griego SBLGNT y con el registro auditado en inglés. No se detectan tensiones doctrinales; la única decisión relevante es la variante textual del nombre de José/Joses, que se conserva en nota. Se optó por un español natural y transparente, manteniendo la identificación de cada mujer y la estructura relacional del original.
  spanish_consistency_notes:
  - Se conserva el nombre divino sin ocultamientos porque este versículo no contiene el tetragrámaton ni κύριος en referencia directa.
  - Se prefirió «Jacobo» por cercanía formal al griego; en contextos editoriales del proyecto podría alternarse con otras formas solo si el marco del libro lo exigiera.
  - La nota textual no altera el cuerpo del texto principal y refleja la variante del testimonio manuscrito mencionada en el audit trail inglés.
