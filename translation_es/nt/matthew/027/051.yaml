translation:
  language: es
  text: Y he aquí[a], la cortina[b] del templo fue rasgada de arriba abajo en dos, y la tierra tembló, y las rocas se partieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miren». El griego ἰδοὺ funciona como marcador de atención solemne; «he aquí» conserva mejor ese tono que una forma más coloquial.
    reason: lexical_alternative
  - marker: b
    text: O «velo». El griego καταπέτασμα puede referirse al velo interior del santuario; se ha preferido «cortina» por ser más clara en español moderno, aunque «velo» sigue siendo una alternativa tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mira
  lexicon: BDAG
  rationale: Conserva el marcador discursivo de atención súbita y énfasis solemne. En español, «he aquí» transmite mejor el tono narrativo elevado que «miren» o «mira».
- source_word: καταπέτασμα
  english_pob_choice: curtain
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  - cortinaje
  lexicon: BDAG
  rationale: La tradición de español bíblico conoce «velo» para este elemento del templo, y el término comunica bien la pieza separadora del santuario. Aunque «cortina» sería más transparente en español moderno, aquí «velo» mantiene con más naturalidad el referente cultual sin perder inteligibilidad.
- source_word: ναοῦ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: «Templo» es la equivalencia natural en español para el conjunto referido en esta construcción. «Santuario» puede sugerir de modo más específico el interior, pero el contexto ya deja implícita esa referencia por el «velo».
- source_word: ἐσχίσθη
  english_pob_choice: was torn
  chosen_spanish: fue rasgado
  alternatives_spanish:
  - fue partido
  - se rasgó
  lexicon: BDAG
  rationale: «Fue rasgado» conserva bien el pasivo aoristo y el valor eventivo del verbo, además de ser idiomático para una tela. «Se rasgó» es posible, pero el pasivo explícito mantiene mejor la forma de la oración.
- source_word: ἀπ’ ἄνωθεν ἕως κάτω
  english_pob_choice: from top to bottom
  chosen_spanish: de arriba abajo
  alternatives_spanish:
  - de arriba hasta abajo
  - desde arriba hasta abajo
  lexicon: BDAG
  rationale: Expresa de manera natural en español la dirección del rasgado y reproduce la fuerza enfática de la construcción griega.
- source_word: εἰς δύο
  english_pob_choice: in two
  chosen_spanish: en dos
  alternatives_spanish:
  - en dos partes
  - en dos pedazos
  lexicon: BDAG
  rationale: La frase breve y literal «en dos» funciona bien en español después de «rasgado» y conserva la concisión del original.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  lexicon: BDAG
  rationale: «La tierra» conserva el alcance amplio del signo cósmico. «El suelo» reduciría demasiado el sentido; «la tierra» es natural y suficientemente amplio en español.
- source_word: ἐσείσθη
  english_pob_choice: shook
  chosen_spanish: tembló
  alternatives_spanish:
  - fue sacudida
  - se estremeció
  lexicon: BDAG
  rationale: «Tembló» es la forma más natural y breve para el movimiento sísmico indicado por el aoristo pasivo. «Fue sacudida» sería más literal, pero menos idiomática.
- source_word: πέτραι
  english_pob_choice: rocks
  chosen_spanish: las piedras
  alternatives_spanish:
  - las rocas
  - los peñascos
  lexicon: BDAG
  rationale: «Piedras» comunica la idea de masas pétreas y evita un tecnicismo innecesario. «Rocas» también es posible; se prefirió una palabra clara y general en español.
- source_word: ἐσχίσθησαν
  english_pob_choice: were split
  chosen_spanish: fueron partidas
  alternatives_spanish:
  - se partieron
  - fueron rajadas
  lexicon: BDAG
  rationale: «Fueron partidas» mantiene la pasiva y el valor de ruptura del verbo σχίζω. En español, aplicado a piedras, «partidas» suena más natural que repetir «rasgadas» o usar una expresión más interpretativa.
theological_decisions:
- issue: Sentido del signo del velo del templo
  english_pob_reading: Translate the event straightforwardly as a historical-temple curtain tearing without adding interpretive explanation in the main text.
  chosen_spanish_reading: 'Presentar el hecho de manera descriptiva: el velo del templo fue rasgado, sin añadir en el texto principal una explicación simbólica o doctrinal.'
  alternative_spanish_readings:
  - el acceso a Dios quedó abierto
  - el sistema del templo fue juzgado
  rationale: El versículo narra el acontecimiento y los signos acompañantes, pero no explicita por sí mismo su interpretación. Para preservar la tensión teológica y no incorporar comentario, el español se mantiene descriptivo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pasaje revisado: no se requieren cambios sustantivos respecto del análisis auditado; la elección española mantiene el evento de forma directa y sin expansión interpretativa.'
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia de acciones del griego: rasgado del velo, temblor de la tierra y partición de las piedras.'
  - Se evitó traducir mecánicamente «earth» como «suelo»; «la tierra» conserva mejor el alcance cósmico del signo.
  - Se preservó la pasiva en las acciones principales con «fue rasgado» y «fueron partidas».
  - La nota sobre καταπέτασμα refleja la tensión lexical entre «velo» y «cortina» sin resolverla de manera dogmática.
