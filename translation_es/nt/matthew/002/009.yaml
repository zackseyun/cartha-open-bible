    issue: Construcción poco idiomática en 'sobre donde estaba el niño'
    rationale: Aunque comprensible, 'sobre donde' suena menos natural en español cuidado. El griego ἐπάνω οὗ ἦν pide una expresión locativa superior; 'encima de donde estaba el niño' conserva bien el sentido y mejora la fluidez.
