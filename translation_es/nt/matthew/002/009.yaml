translation:
  language: es
  text: Después de oír al rey[a], se pusieron en camino; y he aquí, la estrella que habían visto en el oriente iba delante de ellos hasta que llegó y se detuvo encima de donde estaba el niño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en su salida"; la expresión griega puede referirse tanto al oriente como región o dirección como al momento en que una estrella sale o se levanta.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: After hearing
  chosen_spanish: Después de oír
  alternatives_spanish:
  - habiendo oído
  - cuando oyeron
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y en español suena natural como cláusula temporal. "Después de oír" conserva la secuencia sin volverla demasiado rígida.
- source_word: τοῦ βασιλέως
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - del rey
  - al rey Herodes
  lexicon: BDAG
  rationale: El genitivo con ἀκούω puede señalar a la persona escuchada. "Al rey" reproduce la referencia explícita del griego sin añadir "Herodes", que no aparece en este versículo.
- source_word: ἐπορεύθησαν
  english_pob_choice: they went on their way
  chosen_spanish: se pusieron en camino
  alternatives_spanish:
  - fueron
  - partieron
  lexicon: BDAG
  rationale: πορεύομαι expresa ir o viajar. En español, "se pusieron en camino" comunica bien el movimiento narrativo y el matiz de continuar el viaje.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: Se conserva el marcador discursivo de sorpresa o atención repentina. "He aquí" mantiene la fuerza narrativa con un registro digno y bíblico.
- source_word: ἀστήρ
  english_pob_choice: star
  chosen_spanish: la estrella
  lexicon: BDAG
  rationale: Sentido léxico directo y estándar.
- source_word: ὃν εἶδον
  english_pob_choice: that they had seen
  chosen_spanish: que habían visto
  alternatives_spanish:
  - que vieron
  lexicon: BDAG
  rationale: El pluscuamperfecto en español aclara que la visión ocurrió antes de la escena presente, como en el inglés POB.
- source_word: ἐν τῇ ἀνατολῇ
  english_pob_choice: in the east
  chosen_spanish: en el oriente
  alternatives_spanish:
  - en el este
  - en su salida
  lexicon: BDAG
  rationale: '"Oriente" es una opción natural y más elevada en español bíblico; conserva la posible referencia geográfica sin resolver la ambigüedad astronómica.'
- source_word: προῆγεν αὐτούς
  english_pob_choice: went before them
  chosen_spanish: iba delante de ellos
  alternatives_spanish:
  - los guiaba
  - los precedía
  lexicon: BDAG
  rationale: La imagen de ir delante se conserva de forma natural en español, sin añadir una explicación mecanicista del modo en que la estrella conducía.
- source_word: ἕως ἐλθὼν ἐστάθη
  english_pob_choice: until it came and stood
  chosen_spanish: hasta que llegó y se detuvo
  alternatives_spanish:
  - hasta que, al llegar, se detuvo
  - hasta que vino y se quedó quieta
  lexicon: BDAG
  rationale: La secuencia de llegada y detención queda clara y fluida en español. "Se detuvo" evita un calco extraño de "estuvo de pie" aplicado a la estrella.
- source_word: ἐπάνω οὗ ἦν
  english_pob_choice: over where
  chosen_spanish: sobre donde estaba
  alternatives_spanish:
  - encima de donde estaba
  - sobre el lugar donde estaba
  lexicon: BDAG
  rationale: La construcción mantiene la localización espacial de modo idiomático. "Sobre donde estaba" sigue de cerca el griego sin sonar forzado.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el pequeño
  - el niño pequeño
  lexicon: BDAG
  rationale: '"Niño" es una equivalencia directa y clara; no se añade "pequeño" porque el griego no lo exige.'
theological_decisions:
- issue: Sentido de ἐν τῇ ἀνατολῇ en la narración de la estrella
  english_pob_reading: in the east
  chosen_spanish_reading: en el oriente
  alternative_spanish_readings:
  - en su salida
  rationale: La expresión puede referirse al oriente como región/dirección o al momento de la salida de una estrella. Se mantiene "en el oriente" por claridad y tradición bíblica en español, preservando la ambigüedad relevante sin resolverla indebidamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado usa una equivalencia óptima sin cambios en la revisión más reciente; la versión española sigue esa misma decisión, manteniendo la ambigüedad de ἐν τῇ ἀνατολῇ con una nota alternativa y sin introducir nombres o aclaraciones ajenas al versículo.
  spanish_consistency_notes:
  - Se conserva "he aquí" como marcador narrativo consistente con la tradición bíblica y con el valor discursivo del griego.
  - '"Oriente" se usa de forma coherente con el registro bíblico y evita la monotonía de "este" cuando el contexto puede admitir la ambigüedad astronómica.'
  - No se introduce "Herodes" en el texto principal porque el griego solo dice "el rey".
  - '"El niño" mantiene la referencia precisa a τὸ παιδίον sin añadir matices no explicitados.'
