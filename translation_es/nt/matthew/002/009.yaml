- from: Después de oír al rey[a], se pusieron en camino; y he aquí, la estrella que habían visto en el oriente iba delante de ellos hasta que llegó y se detuvo sobre donde estaba el niño.
  to: Después de oír al rey[a], se pusieron en camino; y he aquí, la estrella que habían visto en el oriente iba delante de ellos hasta que llegó y se detuvo encima de donde estaba el niño.
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin alterar el sentido del griego ni la decisión auditada del POB. 'Encima de donde estaba' expresa mejor la relación espacial de ἐπάνω οὗ ἦν que 'sobre donde estaba'. También se pule levemente la redacción de la nota al pie ('región o dirección') para que suene más natural en español.
