  text: καὶ συναγαγὼν πάντας τοὺς ἀρχιερεῖς καὶ γραμματεῖς τοῦ λαοῦ ἐπυνθάνετο παρ’ αὐτῶν ποῦ ὁ χριστὸς γεννᾶται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/002/004.yaml
  text: And gathering together all the chief priests and scribes of the people[a], he was inquiring of them where the Messiah was to be born.
  footnotes:
  - marker: a
    text: Or, 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve the Jewish messianic context.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: b8b7ac0e31a41feb2363801252dcc1cfd8aec7c7c95c30f62f53c829bbef0b8b
    timestamp: '2026-04-18T19:23:48Z'
    output_hash: 9574d185d59d85cd8f859e8b56c769da9a141bbe3cb0bff17a49bbefb446c167
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:54:48Z'
    unchanged: false
    changes_summary: 'Replaced ''after gathering'' with ''gathering together'' to reflect the participle more directly; changed ''was asking them'' to ''was inquiring of them'' for better lexical accuracy; changed ''the Messiah is to be born'' to ''the Christ was to be born'' to reflect ὁ χριστός and the past-frame indirect question more naturally. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Y reuniendo a todos los principales sacerdotes y escribas del pueblo[a], les preguntaba dónde había de nacer el Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo». El título griego Χριστός se vierte aquí «el Mesías» para conservar el contexto mesiánico judío.'
    reason: alternative_reading
lexical_decisions:
- source_word: συναγαγὼν
  english_pob_choice: gathering together
  chosen_spanish: reuniendo
  alternatives_spanish:
  - después de reunir
  - habiendo reunido
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal se expresa de modo natural en español como acción previa o concomitante. «Reuniendo» conserva la relación de antecedencia sin forzar una perífrasis menos idiomática.
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos los
  - todos
  lexicon: BDAG
  rationale: Mantiene la amplitud del adjetivo griego y encaja con la sintaxis española al introducir el complemento directo.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Principales sacerdotes» refleja el plural del liderazgo sacerdotal sin sugerir erróneamente varios titulares del sumo sacerdocio. Se evita «sumos sacerdotes» por su posible lectura demasiado técnica o restrictiva en español.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - expertos en la ley
  lexicon: BDAG
  rationale: «Escribas» es la equivalencia directa y mantiene la referencia histórica y religiosa del término con menor interpretación añadida.
- source_word: τοῦ λαοῦ
  english_pob_choice: of the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - del pueblo judío
  - de la nación
  lexicon: BDAG
  rationale: Sigue de cerca el genitivo sin introducir una glosa étnica explicativa en el texto principal.
- source_word: ἐπυνθάνετο
  english_pob_choice: he was inquiring of them
  chosen_spanish: les preguntaba
  alternatives_spanish:
  - les inquiría
  - seguía preguntándoles
  lexicon: BDAG
  rationale: El imperfecto medio expresa una acción en curso. En español, «les preguntaba» conserva bien el aspecto durativo y resulta más natural que una forma demasiado formal como «les inquiría».
- source_word: παρ’ αὐτῶν
  english_pob_choice: of them
  chosen_spanish: les
  alternatives_spanish:
  - de ellos
  - a ellos
  lexicon: BDAG
  rationale: El complemento queda absorbido por la construcción verbal española con «preguntar», aunque el matiz de fuente/interlocución sigue presente en el contexto.
- source_word: ποῦ
  english_pob_choice: where
  chosen_spanish: dónde
  alternatives_spanish:
  - en qué lugar
  lexicon: BDAG
  rationale: Interrogativo directo y natural en español para una pregunta de ubicación.
- source_word: ὁ χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular y el contexto mesiánico judío. «Mesías» es el equivalente más transparente en español y sigue la decisión doctrinal de traducir el título Χριστός cuando funciona como designación.
- source_word: γεννᾶται
  english_pob_choice: is to be born
  chosen_spanish: había de nacer
  alternatives_spanish:
  - nacería
  - nace
  lexicon: BDAG
  rationale: El presente pasivo en una pregunta indirecta con marco pasado se vuelve naturalmente futuridad esperada en español. «Había de nacer» preserva la expectativa profética sin sonar forzado.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: En este contexto se trata del rey prometido esperado por la tradición judía, no de un nombre propio litúrgico. Traducirlo como «Mesías» conserva la fuerza titular y el contexto histórico-teológico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested term Χριστός'
- issue: Referencia a la sede de consulta de Herodes
  english_pob_reading: he was inquiring of them
  chosen_spanish_reading: les preguntaba
  alternative_spanish_readings:
  - les inquiría
  rationale: No se introduce ninguna conclusión adicional sobre la motivación de Herodes; la redacción española mantiene solo la acción interrogativa en curso que el imperfecto griego expresa.
  doctrine_reference: Aspecto verbal e indirecta interrogativa en griego koiné
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente griego y la auditoría inglesa: conserva el participio antecedente, el imperfecto de acción en curso, y la decisión doctrinal de traducir Χριστός como título mesiánico. Se evitó traducir mecánicamente la sintaxis inglesa; en particular, se prefirió una construcción verbal natural en español («les preguntaba») y una futuridad esperada para γεννᾶται («había de nacer»).'
  spanish_consistency_notes:
  - Se usa «Mesías» de manera consistente para Χριστός como título.
  - Se evita «SEÑOR» porque no aparece יהוה en este versículo.
  - «Principales sacerdotes» se mantiene como plural de liderazgo sacerdotal, no como un solo oficio.
  - La puntuación y el orden reflejan un español bíblico moderno, sin arcaísmos innecesarios.
