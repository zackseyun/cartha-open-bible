revisions:
- from: Y habiendo sido advertidos en sueños de no volver a Herodes[a], se retiraron a su país[b] por otro camino.
  to: Y habiendo sido advertidos en un sueño de no volver a Herodes, partieron a su país por otro camino[a].
  rationale: Se corrige «en sueños» a «en un sueño» para reflejar mejor κατ’ ὄναρ y la decisión auditada. Se cambia «se retiraron» por «partieron» para expresar con mayor naturalidad el valor narrativo de ἀνεχώρησαν. Se elimina la nota mal anclada sobre Herodes y se recoloca una única nota lexical en «por otro camino[a]», donde realmente corresponde la alternativa de δι’ ἄλλης ὁδοῦ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T19:56:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general el sentido del griego: advertencia recibida en sueño, contenido de no volver a Herodes, salida por una ruta distinta y regreso al país de origen. Sin embargo, hay dos desajustes con el audit trail: (1) «en sueños» cambia el singular idiomático κατ’ ὄναρ / ''in a dream'' a un plural español que sugiere una formulación algo distinta; (2) la nota [b] está mal anclada, porque el alternante «por otro camino» corresponde a δι’ ἄλλης ὁδοῦ, no a «Herodes». Además, «se retiraron» es posible para ἀνεχώρησαν, pero en este contexto narrativo de viaje «partieron» o «se fueron» refleja mejor ''departed''.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y fidelidad. «En un sueño» es más preciso y directo aquí que «en sueños». «Partieron» encaja mejor con una acción de viaje que «se retiraron», que en español puede sugerir apartarse o retirarse de escena más que emprender viaje. El resto del verso es legible y adecuado.
  glossary_alignment: No hay términos del glosario mayor en juego salvo nombres propios. «Herodes» y la construcción pasiva están bien manejados. La decisión de no explicitar a Dios en el texto principal está correctamente alineada con la rationale teológica documentada.
  issues:
  - severity: medium
    issue: «en sueños» por κατ’ ὄναρ
    rationale: El griego usa la expresión idiomática singular 'en un sueño'. Aunque «en sueños» puede sonar natural en español, desplaza levemente la forma y no sigue de cerca la decisión documentada del POB.
  - severity: high
    issue: Nota [b] mal ubicada
    rationale: La nota con «O «por otro camino»» está anclada a «Herodes», pero la alternativa pertenece a la frase final que traduce δι’ ἄλλης ὁδοῦ. Esto crea confusión textual y documental.
  - severity: medium
    issue: «se retiraron» para ἀνεχώρησαν
    rationale: Es léxicamente posible, pero en este contexto de desplazamiento geográfico el sentido principal es 'partieron/departieron'. «Se retiraron» puede sonar menos natural y menos preciso en español contemporáneo.
  revised_spanish_text: Y habiendo sido advertidos en un sueño de no volver a Herodes, partieron a su país por otro camino[a].
  revised_footnotes:
  - marker: a
    text: O «por otra ruta».
    reason: lexical_alternative
  revision_rationale: Se corrige «en sueños» a «en un sueño» para reflejar mejor κατ’ ὄναρ y la decisión auditada. Se cambia «se retiraron» por «partieron» para expresar con mayor naturalidad el valor narrativo de ἀνεχώρησαν. Se elimina la nota mal anclada sobre Herodes y se recoloca una única nota lexical en «por otro camino[a]», donde realmente corresponde la alternativa de δι’ ἄλλης ὁδοῦ.
