translation:
  language: es
  text: Y habiendo sido advertidos en un sueño de no volver a Herodes, partieron a su país por otro camino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por otra ruta».
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηματισθέντες
  english_pob_choice: having been warned
  chosen_spanish: habiendo sido advertidos
  alternatives_spanish:
  - habiendo recibido advertencia
  - habiendo sido instruidos
  - habiendo sido advertidos divinamente
  lexicon: BDAG
  rationale: El participio pasivo indica que recibieron una advertencia; en español, «habiendo sido advertidos» conserva el pasivo y no explicita a Dios en el texto principal, aunque el contexto sugiere origen divino.
- source_word: κατ’ ὄναρ
  english_pob_choice: in a dream
  chosen_spanish: en sueños
  alternatives_spanish:
  - en un sueño
  - por medio de un sueño
  - durante un sueño
  lexicon: BDAG
  rationale: La expresión es idiomática y alude a una revelación recibida mientras soñaban. «En sueños» suena natural en español y preserva el sentido narrativo.
- source_word: μὴ ἀνακάμψαι
  english_pob_choice: not to return
  chosen_spanish: de no volver
  alternatives_spanish:
  - de no regresar
  - de no retornar
  - de no dar vuelta
  lexicon: BDAG
  rationale: El infinitivo con μή expresa el contenido de la advertencia. «Volver» comunica bien el movimiento de regreso y es natural en español.
- source_word: πρὸς Ἡρῴδην
  english_pob_choice: to Herod
  chosen_spanish: a Herodes
  alternatives_spanish:
  - hacia Herodes
  - de vuelta a Herodes
  lexicon: BDAG
  rationale: Con acusativo de persona, πρός marca dirección hacia Herodes. En español, «a Herodes» es la forma más directa y clara.
- source_word: δι’ ἄλλης ὁδοῦ
  english_pob_choice: by another route
  chosen_spanish: por otro camino
  alternatives_spanish:
  - por otra ruta
  - por otro sendero
  - por otra vía
  lexicon: BDAG
  rationale: ὁδός puede ser camino, ruta o vía. «Por otro camino» conserva el sentido concreto de itinerario y es idiomático en español bíblico contemporáneo.
- source_word: ἀνεχώρησαν
  english_pob_choice: they departed
  chosen_spanish: se retiraron
  alternatives_spanish:
  - partieron
  - se fueron
  - se marcharon
  lexicon: BDAG
  rationale: ἀναχωρέω puede significar retirarse o marcharse. «Se retiraron» mantiene el matiz de apartarse y encaja con el cambio de itinerario.
- source_word: εἰς τὴν χώραν αὐτῶν
  english_pob_choice: for their own country
  chosen_spanish: a su país
  alternatives_spanish:
  - a su tierra
  - a su patria
  - a su región
  lexicon: BDAG
  rationale: χώρα aquí designa el territorio de origen o lugar propio. «A su país» transmite el destino de regreso con naturalidad; el posesivo se conserva sin añadir «propio» en exceso.
theological_decisions:
- issue: Origen implícito de la advertencia
  english_pob_reading: The warning is rendered as passive ('having been warned') without explicitly adding 'by God' in the main text.
  chosen_spanish_reading: La advertencia queda en pasivo («habiendo sido advertidos») sin nombrar a Dios en el texto principal.
  alternative_spanish_readings:
  - habiendo sido advertidos por Dios
  - habiendo recibido advertencia divina
  rationale: El griego no nombra a Dios, aunque el pasivo sugiere agencia divina en el contexto mateano. La traducción conserva esa tensión sin explicitar más de lo que el verso dice.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo los marcadores de nota [a] y [b] exactamente en el texto español, anclados en las expresiones correspondientes.
  spanish_consistency_notes:
  - Se mantuvo el pasivo para χρηματισθέντες, evitando añadir explícitamente a Dios en la línea principal.
  - «En sueños» conserva el valor idiomático de κατ’ ὄναρ sin endurecerlo.
  - «Por otro camino» y la nota alternativa «por otro camino» reflejan la posible variación léxica de ὁδός.
  - Se usó «Herodes» como nombre propio sin artículo, conforme al español bíblico estándar.
