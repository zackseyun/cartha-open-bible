translation:
  language: es
  text: 'diciendo[a]: «¿Dónde está el que ha nacido rey de los judíos? Porque vimos su estrella en el oriente[b] y hemos venido para rendirle homenaje[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega λέγοντες introduce el contenido de su pregunta; en español puede leerse como «diciendo» como enlace narrativo.
    reason: source_note
  - marker: b
    text: 'O: «al salir» o «en su salida». La expresión ἐν τῇ ἀνατολῇ puede referirse al oriente o al levantamiento de la estrella.'
    reason: alternative_reading
  - marker: c
    text: 'O: «para adorarlo». El verbo griego puede significar tanto homenaje a un rey como adoración, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - diciendo esto
  lexicon: BDAG
  rationale: El participio presente funciona como introducción narrativa del discurso de los magos. «Diciendo» conserva esa función de enlace sin añadir matices no presentes en el griego.
- source_word: Ποῦ ἐστιν
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde se encuentra?
  - ¿Dónde puede estar?
  lexicon: BDAG
  rationale: Es una pregunta locativa directa. «¿Dónde está?» mantiene la naturalidad del español y el valor simple del griego.
- source_word: ὁ τεχθεὶς
  english_pob_choice: the one who has been born
  chosen_spanish: el que ha nacido
  alternatives_spanish:
  - el nacido
  - el que fue nacido
  lexicon: BDAG
  rationale: El participio aoristo pasivo sustantivado señala al que ha sido traído al mundo. En español, «el que ha nacido» conserva la referencia al nacimiento sin forzar una expresión más arcaica.
- source_word: βασιλεὺς τῶν Ἰουδαίων
  english_pob_choice: king of the Jews
  chosen_spanish: rey de los judíos
  alternatives_spanish:
  - el rey de los judíos
  - rey de Judea
  lexicon: BDAG
  rationale: La forma española usual y fiel es «rey de los judíos». Mantiene el título real y su carga política y mesiánica sin suavizarla.
- source_word: εἴδομεν γὰρ
  english_pob_choice: For we saw
  chosen_spanish: Porque vimos
  alternatives_spanish:
  - pues vimos
  - porque hemos visto
  lexicon: BDAG
  rationale: 'γάρ introduce la razón de la pregunta. El aoristo εἴδομεν se expresa de manera natural con pasado simple en español: «vimos».'
- source_word: αὐτοῦ τὸν ἀστέρα
  english_pob_choice: his star
  chosen_spanish: su estrella
  alternatives_spanish:
  - la estrella de él
  - la estrella que le pertenecía
  lexicon: BDAG
  rationale: El pronombre posesivo se expresa con naturalidad como «su estrella». Conserva la relación posesiva sin explicitar más de lo que el griego dice.
- source_word: ἐν τῇ ἀνατολῇ
  english_pob_choice: in the east
  chosen_spanish: en el oriente
  alternatives_spanish:
  - en el este
  - al salir
  - en su salida
  lexicon: BDAG
  rationale: «ἀνατολή» puede referirse al oriente geográfico o al levantarse de un astro. Se mantiene «en el oriente» como opción clara y digna; la ambigüedad astronómica se preserva en nota.
- source_word: ἤλθομεν
  english_pob_choice: have come
  chosen_spanish: hemos venido
  alternatives_spanish:
  - vinimos
  - llegamos
  lexicon: BDAG
  rationale: El perfecto en inglés refleja la pertinencia actual del viaje ya concluido. En español, «hemos venido» expresa bien ese estado de llegada con relevancia presente.
- source_word: προσκυνῆσαι αὐτῷ
  english_pob_choice: to pay him homage
  chosen_spanish: rendirle homenaje
  alternatives_spanish:
  - adorarlo
  - postrarnos ante él
  lexicon: BDAG
  rationale: προσκυνέω puede significar homenaje reverente o adoración, según el contexto. Aquí, al tratarse del recién nacido «rey de los judíos», «rendirle homenaje» preserva el sentido de honor real sin resolver prematuramente la tensión teológica.
theological_decisions:
- issue: προσκυνῆσαι aplicado al niño Jesús
  english_pob_reading: to pay him homage
  chosen_spanish_reading: rendirle homenaje
  alternative_spanish_readings:
  - adorarlo
  - postrarnos ante él
  rationale: El contexto inmediato es la búsqueda del rey recién nacido; por eso la lectura primaria es de homenaje regio. Se conserva la ambigüedad del verbo para no cerrar la interpretación más allá del versículo, en línea con el POB en inglés.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se siguió la lectura auditada del POB en inglés, manteniendo la ambigüedad de ἀνατολή y de προσκυνέω. La redacción española adopta un registro natural y público, sin añadir aclaraciones que el original no exige. No se registran revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «homenaje» para προσκυνέω en armonía con la decisión auditada del POB en inglés.
  - Se conserva «Mesías/Cristo» fuera de este versículo; aquí el título explícito es «rey de los judíos».
  - «oriente» mantiene la amplitud semántica de ἀνατολή y evita cerrar la lectura a una sola interpretación astronómica.
