translation:
  language: es
  text: Entonces Herodes mandó llamar en secreto a los magos y averiguó de ellos con exactitud el tiempo en que había aparecido la estrella.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sabios». El griego μάγοι es más específicamente «magos», con referencia a sabios astrólogos de Oriente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marcador discursivo temporal que introduce la siguiente acción en la secuencia narrativa. «Entonces» preserva el avance del relato en español natural.
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herodés
  lexicon: Nombre propio
  rationale: Transliteración usual en español bíblico para el nombre propio.
- source_word: λάθρᾳ
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - en secreto
  - a escondidas
  lexicon: BDAG
  rationale: Adverbio de ocultamiento. «Secretamente» conserva el sentido de actuación oculta en un registro sobrio.
- source_word: καλέσας
  english_pob_choice: summoned
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: BDAG
  rationale: El participio aoristo se integra de manera natural en español como una acción previa o concomitante. «Llamó» es más neutral y directo que «convocó», y evita sobrerrepresentar un matiz oficial que el contexto no exige necesariamente.
- source_word: τοὺς μάγους
  english_pob_choice: the magi
  chosen_spanish: los magos
  alternatives_spanish:
  - los magos de oriente
  - los sabios
  lexicon: BDAG
  rationale: Se mantiene «magos» porque el término griego μάγοι designa de forma más directa a estos personajes y el POB inglés preserva esa elección, dejando la alternativa tradicional en nota.
- source_word: ἠκρίβωσεν
  english_pob_choice: determined
  chosen_spanish: averiguó con exactitud
  alternatives_spanish:
  - determinó
  - preguntó cuidadosamente
  - indagó con precisión
  lexicon: BDAG
  rationale: El verbo expresa una indagación precisa. «Averiguó con exactitud» comunica la fuerza de ἀκριβόω sin sonar técnico o ambiguo en español.
- source_word: παρ’ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - por medio de ellos
  - a ellos
  lexicon: BDAG
  rationale: La preposición con genitivo indica fuente. «De ellos» es el equivalente directo y mantiene la relación de procedencia.
- source_word: τὸν χρόνον
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la fecha
  - el momento
  lexicon: BDAG
  rationale: χρόνος aquí denota el tiempo referido en la investigación de Herodes. «El tiempo» preserva la amplitud del término sin cerrar prematuramente el sentido a «fecha» o «momento».
- source_word: τοῦ φαινομένου ἀστέρος
  english_pob_choice: when the star had appeared
  chosen_spanish: en que había aparecido la estrella
  alternatives_spanish:
  - de la estrella que aparecía
  - del aparecimiento de la estrella
  lexicon: BDAG
  rationale: La frase genitiva participial se vierte naturalmente como cláusula temporal en español. «Había aparecido» capta el evento ya ocurrido en relación con la pesquisa de Herodes.
translation_notes:
  revision_awareness: El texto inglés POB vigente se mantuvo sin cambios de sentido en esta revisión; la elección española conserva la secuencia narrativa, el matiz de ocultamiento, el valor de indagación precisa de ἀκριβόω y la referencia temporal al aparecer de la estrella.
  spanish_consistency_notes:
  - Se mantuvo «magos» como término principal para μάγοι, coherente con el POB inglés y con el significado léxico del griego.
  - Se prefirió «Entonces» para Τότε por fluidez narrativa en español.
  - «Averiguó con exactitud» refleja la precisión de ἠκρίβωσεν sin añadir contenido doctrinal o interpretativo.
  - La cláusula final se construyó como temporal para reproducir el genitivo participial griego de manera natural en español.
