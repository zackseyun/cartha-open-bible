revisions:
- from: Entonces Herodes, secretamente, llamó a los magos y averiguó con exactitud de ellos el tiempo en que había aparecido la estrella.[a]
  to: Entonces Herodes mandó llamar en secreto a los magos y averiguó de ellos con exactitud el tiempo en que había aparecido la estrella.[a]
  rationale: Se ajusta «llamó» a «mandó llamar» para reflejar mejor el matiz de convocatoria deliberada de καλέσας, se mejora la naturalidad de λάθρᾳ con «en secreto», y se pule el orden de la frase para un español más fluido sin perder precisión semántica. La nota se conserva con una leve mejora estilística.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T19:56:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del griego: «Entonces», «Herodes», «los magos», la averiguación precisa, y la cláusula temporal sobre la aparición de la estrella. Sin embargo, «llamó» atenúa el matiz de καλέσας según la auditoría inglesa, que prefirió «summoned» por su fuerza deliberada; en español «mandó llamar» o «convocó» lo preserva mejor. Además, «secretamente» es comprensible, pero «en secreto» suena más natural y sobrio en español bíblico moderno.'
  spanish_quality_summary: El texto es claro y legible, pero la puntuación con comas alrededor de «secretamente» resulta algo rígida, y «llamó... y averiguó con exactitud de ellos» suena menos natural que una formulación más fluida. Una leve revisión mejora naturalidad y fidelidad sin cambiar el sentido.
  glossary_alignment: No hay términos teológicos conflictivos en este versículo. «Magos» concuerda con la decisión del POB y la nota alternativa «los sabios» es adecuada. No intervienen aquí los términos de glosario más sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «llamó» debilita el matiz de καλέσας
    rationale: La auditoría inglesa justificó «summoned» como una convocatoria deliberada; «llamó» es demasiado plano. «Mandó llamar» preserva mejor el acto intencional de Herodes y suena natural en español.
  - severity: low
    issue: «secretamente» y la puntuación suenan menos naturales
    rationale: Aunque fiel, «Entonces Herodes, secretamente, ...» es algo acartonado. «Entonces Herodes mandó llamar en secreto...» mantiene el valor adverbial de λάθρᾳ con mejor fluidez en español.
  - severity: low
    issue: Orden y combinación de «averiguó con exactitud de ellos»
    rationale: Es entendible, pero «determinó por ellos» no sería correcto; mejor «averiguó de ellos con exactitud» o «averiguó con exactitud, por medio de ellos / de ellos, el tiempo». La revisión propuesta mejora naturalidad manteniendo la fuente de información.
  revised_spanish_text: Entonces Herodes mandó llamar en secreto a los magos y averiguó de ellos con exactitud el tiempo en que había aparecido la estrella.[a]
  revised_footnotes:
  - marker: a
    text: O «los sabios». El griego μάγοι es más específicamente «magos», con referencia a sabios astrólogos de Oriente.
    reason: lexical_alternative
  revision_rationale: Se ajusta «llamó» a «mandó llamar» para reflejar mejor el matiz de convocatoria deliberada de καλέσας, se mejora la naturalidad de λάθρᾳ con «en secreto», y se pule el orden de la frase para un español más fluido sin perder precisión semántica. La nota se conserva con una leve mejora estilística.
