  source_alignment_summary: 'El borrador español sigue bien la estructura y sentido del griego: voz oída en Ramá, llanto/lamento, Raquel llorando, y negativa a recibir consuelo por la pérdida de sus hijos. Conserva la figura profética de Raquel y el tono de cita. Sin embargo, hay dos ajustes de fidelidad y naturalidad: τέκνα se preserva mejor como «hijos» o mejor aún «hijos/hijos»? No, en español actual y neutral aquí conviene «hijos» o «hijos»; pero para evitar matiz masculino innecesario, «hijos» puede pasar, aunque «hijos» sigue siendo menos preciso que «hijos». El problema principal es «porque ya no existen», que suena más filosófico/ontológico que el idiomatismo sobrio del griego; «porque ya no están» preserva mejor la elipsis y suena más natural en español bíblico moderno.'
