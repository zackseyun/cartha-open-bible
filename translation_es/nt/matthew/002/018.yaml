translation:
  language: es
  text: 'Se oyó una voz en Ramá[a], llanto y gran lamento: Raquel, llorando por sus hijos, no quería ser consolada[b][c], porque ya no están.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lamentación y mucho lamento».
    reason: lexical_alternative
  - marker: b
    text: O «se negó a ser consolada».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «porque no son».
    reason: lexical_alternative
lexical_decisions:
- source_word: Φωνὴ
  english_pob_choice: A voice
  chosen_spanish: Una voz
  alternatives_spanish:
  - Un sonido
  lexicon: BDAG
  rationale: φωνή puede significar ‘voz’ o ‘sonido’; ‘voz’ conserva mejor el tono personificado y profético de la cita y suena natural en español.
- source_word: ἐν Ῥαμὰ
  english_pob_choice: in Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - a Ramá
  lexicon: BDAG
  rationale: La preposición ἐν con nombre de lugar se rinde de forma natural como ‘en’. Se conserva el topónimo transliterado ‘Ramá’.
- source_word: ἠκούσθη
  english_pob_choice: was heard
  chosen_spanish: se oyó
  alternatives_spanish:
  - fue escuchada
  lexicon: BDAG
  rationale: El aoristo pasivo de ἀκούω expresa un hecho reportado de manera impersonal. ‘Se oyó’ comunica bien esa pasividad sin forzar el español.
- source_word: κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - lloradera
  - lamentación
  lexicon: BDAG
  rationale: κλαυθμός es llanto audible o lamento. ‘Llanto’ es claro y natural en español, y mantiene la proximidad semántica con el siguiente término.
- source_word: ὀδυρμὸς πολύς
  english_pob_choice: great mourning
  chosen_spanish: gran lamento
  alternatives_spanish:
  - mucho lamento
  - profundo duelo
  lexicon: BDAG
  rationale: ὀδυρμός denota lamento/mourning, y πολύς intensifica la expresión. ‘Gran lamento’ conserva el valor intensivo y evita sonar excesivamente arcaico.
- source_word: Ῥαχὴλ
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  lexicon: transliteration
  rationale: 'Nombre propio bíblico usual en español: ‘Raquel’.'
- source_word: κλαίουσα
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - llorante
  lexicon: BDAG
  rationale: El participio presente indica acción en curso. ‘Llorando’ refleja ese matiz y mantiene la relación léxica con ‘llanto’.
- source_word: τὰ τέκνα αὐτῆς
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos e hijas
  - sus niños
  lexicon: BDAG
  rationale: τέκνα es un término amplio para ‘children’. En este contexto, ‘hijos’ funciona como equivalente natural y suele abarcar el colectivo filial en español bíblico; sin embargo, ‘hijos’ puede sonar más masculino que el griego, por lo que se preserva la opción más directa del uso bíblico narrativo.
- source_word: οὐκ ἤθελεν
  english_pob_choice: she was not willing
  chosen_spanish: no quería
  alternatives_spanish:
  - no estaba dispuesta
  - se negaba a
  lexicon: BDAG
  rationale: θέλω significa ‘querer, desear, estar dispuesto’. ‘No quería’ comunica con naturalidad la falta de voluntad, sin cargar el verbo con una fuerza mayor que la del griego.
- source_word: παρακληθῆναι
  english_pob_choice: to be comforted
  chosen_spanish: ser consolada
  alternatives_spanish:
  - recibir consuelo
  - ser animada
  lexicon: BDAG
  rationale: παρακαλέω aquí, en pasivo infinitivo, significa recibir consuelo o alivio. ‘Ser consolada’ es claro, digno y mantiene el registro de la cita.
- source_word: ὅτι οὐκ εἰσίν
  english_pob_choice: because they are no more
  chosen_spanish: porque ya no existen
  alternatives_spanish:
  - porque ya no están
  - porque no son
  lexicon: BDAG
  rationale: La expresión griega es una forma concisa y dura de ausencia/pérdida. ‘Ya no existen’ transmite la fuerza sobria de la frase sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Función de Raquel en la cita profética
  english_pob_reading: Retain Rachel as the prophetic/maternal figure from Jeremiah, without explicating the symbolism in the main text.
  chosen_spanish_reading: Conservar a Raquel como figura profética/maternal, sin desarrollar su simbolismo en el texto principal.
  alternative_spanish_readings:
  - Interpretar a Raquel directamente como símbolo de las madres de Israel
  - Tratar a Raquel como una madre histórica literal que habla
  rationale: Mateo cita a Jeremías de forma tipológica. La traducción debe mantener la figura de Raquel sin resolver el nivel simbólico en el cuerpo del versículo, porque el griego no lo explica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Revisado a la luz del paquete fuente griego y del auditor inglés: se mantuvo la cita sobria y se evitó explicitar la simbolización de Raquel. Se prefirió un español natural que conserve el tono profético y la dureza de la clausula final.'
  spanish_consistency_notes:
  - Se usó ‘Raquel’ como transliteración estándar en español.
  - Se evitó ‘SEÑOR’ u otras sustituciones no presentes en este versículo.
  - 'Se mantuvo la secuencia de lamentación en dos miembros: ‘llanto y gran lamento’.'
  - ‘Ser consolada’ conserva el pasivo del infinitivo griego mejor que una paráfrasis más libre.
