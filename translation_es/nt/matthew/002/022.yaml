translation:
  language: es
  text: Pero cuando oyó que Arquelao reinaba sobre Judea en lugar de su padre Herodes, tuvo miedo de ir allá. Y, después de haber sido advertido[a] en un sueño, se retiró a las regiones de Galilea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo sido advertido»; el verbo normalmente implica una advertencia o instrucción divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - después de oír
  - al oír
  lexicon: BDAG
  rationale: La forma de aoristo participial introduce una circunstancia temporal previa a la acción principal; «cuando oyó» expresa con naturalidad ese valor temporal en español sin perder la secuencia narrativa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí marca un giro narrativo respecto de la intención previa de José; «Pero» mantiene bien ese contraste en español.
- source_word: βασιλεύει
  english_pob_choice: was reigning
  chosen_spanish: reinaba
  alternatives_spanish:
  - era rey
  - gobernaba
  lexicon: BDAG
  rationale: El presente en discurso indirecto se vierte bien con imperfecto en español; «reinaba» conserva el matiz real de βασιλεύω mejor que una simple glosa como «gobernaba».
- source_word: τῆς Ἰουδαίας
  english_pob_choice: over Judea
  chosen_spanish: sobre Judea
  alternatives_spanish:
  - en Judea
  - de Judea
  lexicon: BDAG
  rationale: Con βασιλεύω + genitivo, «sobre Judea» reproduce el alcance territorial del reinado y suena natural en español.
- source_word: ἀντὶ τοῦ πατρὸς αὐτοῦ Ἡρῴδου
  english_pob_choice: in place of his father Herod
  chosen_spanish: en lugar de su padre Herodes
  alternatives_spanish:
  - en vez de su padre Herodes
  - sucediendo a su padre Herodes
  lexicon: BDAG
  rationale: ἀντί expresa reemplazo o sucesión; «en lugar de» es fiel, claro y cercano al griego sin cargar una interpretación más fuerte de la necesaria.
- source_word: ἐφοβήθη
  english_pob_choice: he was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - temió
  lexicon: BDAG
  rationale: La forma deponente pasiva se expresa con un verbo natural en español; «tuvo miedo» comunica el sentido directo y evita un giro demasiado literal.
- source_word: ἐκεῖ ἀπελθεῖν
  english_pob_choice: to go there
  chosen_spanish: de ir allá
  alternatives_spanish:
  - de ir allí
  - de ir a ese lugar
  lexicon: BDAG
  rationale: El infinitivo complementa a «tuvo miedo»; «ir allá» conserva la deixis de ἐκεῖ de manera fluida en español.
- source_word: χρηματισθεὶς
  english_pob_choice: after being warned
  chosen_spanish: después de haber sido advertido
  alternatives_spanish:
  - habiendo sido advertido
  - después de haber recibido advertencia divina
  lexicon: BDAG
  rationale: En Mateo este verbo suele implicar comunicación divina, pero el agente queda tácito; la pasiva en español respeta esa reserva y preserva la tensión lexical sin explicitar más de lo que dice el texto.
- source_word: κατ’ ὄναρ
  english_pob_choice: in a dream
  chosen_spanish: en un sueño
  alternatives_spanish:
  - durante un sueño
  - por medio de un sueño
  lexicon: BDAG
  rationale: Es la expresión mateana normal para una advertencia recibida durante el sueño; «en un sueño» es la equivalencia más directa y comprensible.
- source_word: ἀνεχώρησεν
  english_pob_choice: he withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se fue
  lexicon: BDAG
  rationale: El verbo suele implicar una retirada intencional por causa de peligro o circunstancia; «se retiró» preserva mejor esa nuance que un simple «se fue».
- source_word: εἰς τὰ μέρη τῆς Γαλιλαίας
  english_pob_choice: to the regions of Galilee
  chosen_spanish: a las regiones de Galilea
  alternatives_spanish:
  - a la región de Galilea
  - a las partes de Galilea
  lexicon: BDAG
  rationale: El plural μέρη se refleja mejor con «regiones», indicando una zona amplia y no solo un punto de destino.
theological_decisions:
- issue: Si hacer explícita la fuente divina de la advertencia en χρηματισθείς
  english_pob_reading: Kept the passive 'after being warned' in the main text without adding 'by God'.
  chosen_spanish_reading: Se mantuvo la pasiva «después de haber sido advertido» sin añadir «por Dios».
  alternative_spanish_readings:
  - después de haber sido advertido por Dios
  - después de haber recibido instrucción divina
  rationale: El verbo suele implicar una comunicación divina en Mateo, pero aquí el agente no se expresa. Para no sobretraducir, la redacción española conserva la pasiva y deja la implicación en el trasfondo, igual que el griego.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete de origen; se mantiene la concordancia alta con la última pasada y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino explícito en el texto fuente.
  - Se usó «Mesías/Cristo» no pertinente aquí; se conservaron los nombres propios «Jesús», «Arquelao», «Herodes» y «Galilea» según el original.
  - La nota al pie [a] se ancla en «advertido» para reflejar la alternativa lexical documentada en el texto inglés.
