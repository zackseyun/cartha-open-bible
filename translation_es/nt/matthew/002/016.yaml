translation:
  language: es
  text: Entonces Herodes, al ver que había sido burlado[a] por los magos[b], se enojó mucho y, enviando hombres, mató a todos los niños varones que había en Belén y en todos sus alrededores, de dos años para abajo, conforme al tiempo que había averiguado de los magos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'había sido objeto de burla' por los magos.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, 'sabios'. El término griego se refiere a magos, es decir, sabio-astrólogos orientales.
    reason: cultural_note
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel tiempo
  - Luego
  lexicon: BDAG
  rationale: Marca secuencia temporal narrativa de manera natural en español sin añadir matiz interpretativo.
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herodes el rey
  lexicon: N/A
  rationale: Nombre propio transliterado por convención bíblica en español.
- source_word: ἰδὼν ὅτι
  english_pob_choice: seeing that
  chosen_spanish: al ver que
  alternatives_spanish:
  - viendo que
  - cuando vio que
  lexicon: BDAG
  rationale: Conserva el valor perceptivo-causal del participio y la cláusula ὅτι en un giro natural en español.
- source_word: ἐνεπαίχθη
  english_pob_choice: had been tricked
  chosen_spanish: había sido burlado
  alternatives_spanish:
  - había sido engañado
  - había sido ridiculizado
  lexicon: BDAG
  rationale: Ἐμπαίζω puede expresar burla o trato de hacer el ridículo; 'burlado' mantiene esa carga y evita borrar la tensión entre 'mocked' y el sentido contextual de haber sido frustrado por los magos.
- source_word: ὑπὸ τῶν μάγων
  english_pob_choice: by the magi
  chosen_spanish: por los magos
  alternatives_spanish:
  - por los sabios
  - por los magos de oriente
  lexicon: BDAG
  rationale: '''Magos'' conserva el término específico, mientras que ''por los sabios'' interpretaría el referente tradicional. No se añade ''de oriente'' porque no está en este versículo.'
- source_word: ἐθυμώθη λίαν
  english_pob_choice: became very angry
  chosen_spanish: se enojó muchísimo
  alternatives_spanish:
  - se enfureció muchísimo
  - se irritó mucho
  lexicon: BDAG
  rationale: Expresa con claridad la intensificación de λίαν y el cambio de estado emocional del verbo sin sobredramatizar.
- source_word: ἀποστείλας
  english_pob_choice: sending men
  chosen_spanish: enviando hombres
  alternatives_spanish:
  - después de enviar hombres
  - tras enviar hombres
  lexicon: BDAG
  rationale: Representa el participio circunstancial con una expansión necesaria en español; 'hombres' está implícito por el contexto de la acción ejecutada.
- source_word: ἀνεῖλεν
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - asesinó
  lexicon: BDAG
  rationale: Verbo directo y preciso para ἀναιρέω en este contexto narrativo; evita una formulación demasiado técnica o excesivamente interpretativa.
- source_word: πάντας τοὺς παῖδας
  english_pob_choice: all the boys
  chosen_spanish: a todos los niños
  alternatives_spanish:
  - a todos los varones niños
  - a todos los muchachos
  lexicon: BDAG
  rationale: En español 'niños' comunica mejor el grupo de menores afectados; el masculino genérico no elimina el referente de sexo masculino en este contexto, y la edad especificada después preserva la precisión narrativa.
- source_word: τοὺς ἐν Βηθλέεμ καὶ ἐν πᾶσι τοῖς ὁρίοις αὐτῆς
  english_pob_choice: in Bethlehem and in all its surrounding districts
  chosen_spanish: que había en Belén y en todos sus alrededores
  alternatives_spanish:
  - de Belén y de toda su región
  - en Belén y en todas sus fronteras
  lexicon: BDAG
  rationale: '''Alrededores'' comunica de forma natural la extensión territorial de ὅρια; la relativa ''que había'' evita dejar en español una construcción pesada y preserva el sentido distributivo.'
- source_word: ἀπὸ διετοῦς καὶ κατωτέρω
  english_pob_choice: from two years old and under
  chosen_spanish: desde los de dos años y menores
  alternatives_spanish:
  - desde los de dos años para abajo
  - desde los de dos años y menos
  lexicon: BDAG
  rationale: Mantiene la idea de límite inclusivo de edad. La formulación evita un calco torpe y sigue siendo comprensible en registro bíblico contemporáneo.
- source_word: κατὰ τὸν χρόνον
  english_pob_choice: according to the time
  chosen_spanish: conforme al tiempo
  alternatives_spanish:
  - según el tiempo
  - de acuerdo con el tiempo
  lexicon: BDAG
  rationale: '''Conforme a'' refleja bien la idea de correspondencia/ajuste temporal de κατά con el acusativo.'
- source_word: ὃν ἠκρίβωσεν
  english_pob_choice: that he had determined
  chosen_spanish: que había averiguado
  alternatives_spanish:
  - que había determinado con exactitud
  - que había investigado
  lexicon: BDAG
  rationale: ἀκριβόω significa averiguar con exactitud o determinar cuidadosamente. 'Averiguado' preserva la idea de indagación precisa sin forzar una lectura exclusivamente mental o puramente administrativa.
- source_word: παρὰ τῶν μάγων
  english_pob_choice: from the magi
  chosen_spanish: de los magos
  alternatives_spanish:
  - por medio de los magos
  - de los sabios
  lexicon: BDAG
  rationale: La preposición παρά con genitivo señala procedencia/fuente; 'de los magos' es la forma más directa y consistente con la mención previa.
theological_decisions:
- issue: Rendering of μάγοι
  english_pob_reading: magi
  chosen_spanish_reading: magos
  alternative_spanish_readings:
  - sabios
  - sabios de oriente
  rationale: Se conserva el término específico sin sustituirlo por una glosa tradicional. En español, 'magos' es el equivalente más transparente y mantiene la referencia cultural-histórica sin suavizarla.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of ἐνεπαίχθη
  english_pob_reading: had been tricked
  chosen_spanish_reading: había sido burlado
  alternative_spanish_readings:
  - había sido engañado
  - había sido ridiculizado
  rationale: El pasivo comunica que Herodes percibió una afrenta y una frustración causada por los magos. 'Burlado' conserva la tensión semántica entre burla, ridículo y el efecto contextual de haber sido frustrado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of παῖδας in this context
  english_pob_reading: boys
  chosen_spanish_reading: niños
  alternative_spanish_readings:
  - varones niños
  - muchachos
  rationale: Aunque el referente es masculino por el contexto, en español 'niños' es la forma más natural y evita una construcción pesada. La precisión de edad en la cláusula siguiente ayuda a delimitar el grupo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés auditado al representar ἀποστείλας de manera explícita como una acción circunstancial ('enviando hombres'). También conserva la lectura revisada de la secuencia narrativa con el verbo principal de matar, sin omitir la correspondencia temporal y causal del original griego.
  spanish_consistency_notes:
  - Se mantiene 'magos' de forma consistente con el término técnico del audit trail inglés y con el uso POB de evitar 'sabios' como traducción principal.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene el Tetragrámaton ni κύριος en función divina.
  - La estructura 'al ver que... se enojó muchísimo; y, enviando hombres...' conserva el encadenamiento de participio + verbo principal del griego sin volverla rígidamente literal.
