    text: O, más literalmente, 'había sido objeto de burla' por los magos.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, 'sabios'. El término griego se refiere a magos, es decir, sabio-astrólogos orientales.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota cultural para que acompañe a 'magos', se explicita el sexo masculino implícito en παῖδας mediante 'niños varones', y se mejora la naturalidad de la expresión de edad con 'de dos años para abajo'. También se suaviza el coloquialismo de 'muchísimo' a 'mucho' para un registro más digno, sin perder la intensificación básica de λίαν.
