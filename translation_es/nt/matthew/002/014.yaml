translation:
  language: es
  text: Entonces se levantó, tomó al niño y a su madre durante la noche, y partió a Egipto.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para Egipto».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Así que
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector narrativo leve que avanza la acción. «Entonces» conserva esa progresión natural en español sin sobrecargar la relación lógica.
- source_word: ἐγερθεὶς
  english_pob_choice: got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - habiéndose levantado
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción inmediata de José al responder. «Se levantó» es el equivalente narrativo natural en español y evita una forma demasiado literal o pesada.
- source_word: παρέλαβε
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó consigo
  - tomó consigo
  lexicon: BDAG
  rationale: En este contexto παραλαμβάνω significa tomar a alguien para ir con uno. «Tomó» reproduce bien la simplicidad del movimiento; «tomó consigo» sería más explícito, pero no necesario.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: al niño
  alternatives_spanish:
  - al pequeño
  - al niño pequeño
  lexicon: BDAG
  rationale: παιδίον se refiere al niño; en español, «al niño» es claro y fiel. No se añade «pequeño» porque el griego aquí no exige enfatizar edad adicional.
- source_word: τὴν μητέρα αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre del niño
  - a la madre de él
  lexicon: BDAG
  rationale: El pronombre posesivo remite naturalmente al niño, no a José. «A su madre» es idiomático en español y mantiene la referencia relacional del griego.
- source_word: νυκτὸς
  english_pob_choice: during the night
  chosen_spanish: de noche
  alternatives_spanish:
  - durante la noche
  - por la noche
  lexicon: BDAG
  rationale: El genitivo temporal indica que la acción ocurrió en la noche. «De noche» es breve, natural y conserva el valor temporal sin rigidizar la frase.
- source_word: ἀνεχώρησεν
  english_pob_choice: departed
  chosen_spanish: partió
  alternatives_spanish:
  - se retiró
  - se fue
  lexicon: BDAG
  rationale: ἀναχωρέω aquí expresa salir o partir hacia otro lugar. «Partió» comunica el desplazamiento decidido sin introducir la matización de retiro que podría sugerir una retirada táctica.
- source_word: εἰς Αἴγυπτον
  english_pob_choice: for Egypt
  chosen_spanish: hacia Egipto
  alternatives_spanish:
  - a Egipto
  - para Egipto
  lexicon: BDAG
  rationale: εἰς marca dirección hacia un destino. «Hacia Egipto» conserva el matiz de movimiento y es natural en español; «a Egipto» también sería válido, pero menos expresivo del rumbo.
translation_notes:
  revision_awareness: No se detectan revisiones textuales ni cambios significativos en el audit trail inglés; la redacción sigue de cerca el griego y la solución inglesa aprobada, con adaptación natural al español.
