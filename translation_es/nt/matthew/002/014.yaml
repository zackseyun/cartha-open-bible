- from: Entonces él se levantó, tomó al niño y a su madre de noche, y partió hacia Egipto.
  to: Entonces se levantó, tomó al niño y a su madre durante la noche, y partió a Egipto.[a]
  rationale: Se ajusta «hacia Egipto» a «a Egipto» para reflejar mejor εἰς como destino; se conserva la alternativa documentada en nota; y se mejora ligeramente la naturalidad del español al omitir «él» y usar «durante la noche».
  reviewer_model: gpt-5.4
