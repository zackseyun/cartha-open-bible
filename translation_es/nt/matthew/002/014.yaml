  - Se mantuvo una sintaxis narrativa sencilla y lineal, acorde con el breve aoristo secuencial del griego.
  - Se evitó «Cristo» o terminología doctrinal no presente en el versículo.
  - Se prefirió vocabulario común y eclesialmente legible en español latino neutro.
