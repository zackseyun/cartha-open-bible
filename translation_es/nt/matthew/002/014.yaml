review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del griego: acción inmediata de José, toma del niño y su madre, tiempo nocturno y salida rumbo a Egipto. Sin embargo, «hacia Egipto» debilita ligeramente εἰς como destino efectivo, y falta reflejar la alternativa documentada en la auditoría inglesa para la frase final.'
  spanish_quality_summary: El texto es natural y claro en español. «Entonces él» suena un poco marcado; omitir «él» mejora la fluidez. «De noche» es entendible, pero «durante la noche» refleja mejor el valor temporal de νυκτός en registro narrativo bíblico moderno. El conjunto requiere solo ajustes menores.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «niño», «madre», «partió» y «Egipto» están alineadas con el proyecto. Conviene preferir «a Egipto» como correspondencia más directa de εἰς Αἴγυπτον, dejando «hacia Egipto» como alternativa si se desea, pero aquí no es la mejor opción principal.
  issues:
  - severity: medium
    issue: «hacia Egipto» es menos preciso que «a Egipto».
    rationale: εἰς + acusativo expresa movimiento hacia un destino. En español, «partió a Egipto» o «partió para Egipto» comunican mejor la llegada pretendida que «hacia Egipto», que puede sonar solo direccional.
  - severity: low
    issue: Falta la nota de alternativa léxica heredada del POB inglés.
    rationale: La auditoría inglesa preserva una alternativa para la frase final («to Egypt»). Si en español se ofrece una formulación principal, conviene conservar la alternativa equivalente en nota para mantener la trazabilidad.
  - severity: low
    issue: El pronombre explícito «él» es innecesario.
    rationale: En español narrativo, «Entonces se levantó» fluye mejor y no pierde referencia, ya que el sujeto está claro por el contexto.
  revised_spanish_text: Entonces se levantó, tomó al niño y a su madre durante la noche, y partió a Egipto.[a]
  revised_footnotes:
  - marker: a
    text: O «para Egipto».
    reason: lexical_alternative
  revision_rationale: Se ajusta «hacia Egipto» a «a Egipto» para reflejar mejor εἰς como destino; se conserva la alternativa documentada en nota; y se mejora ligeramente la naturalidad del español al omitir «él» y usar «durante la noche».
