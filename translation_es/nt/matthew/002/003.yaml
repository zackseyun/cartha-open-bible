translation:
  language: es
  text: Cuando el rey Herodes oyó esto[a], se turbó[b], y toda Jerusalén con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al oír esto».
    reason: lexical_alternative
  - marker: b
    text: O «se perturbó». «Toda Jerusalén» usa el nombre de la ciudad para sus habitantes; puede ser una manera general o hiperbólica de describir la alarma compartida de la ciudad.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: heard this
  chosen_spanish: oyó esto
  alternatives_spanish:
  - habiendo oído esto
  - cuando oyó esto
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente. En español, «oyó esto» conserva la relación con el hecho mencionado en el contexto inmediato y suena más natural que una construcción absoluta más pesada.
- source_word: δὲ
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: La partícula δὲ cumple aquí una función transicional suave; el español la expresa adecuadamente con una cláusula temporal introducida por «cuando» sin añadir contraste que el griego no exige.
- source_word: ὁ βασιλεὺς Ἡρῴδης
  english_pob_choice: King Herod
  chosen_spanish: el rey Herodes
  alternatives_spanish:
  - Herodes el rey
  lexicon: BDAG
  rationale: Se conserva el valor titular de βασιλεύς y el nombre propio estándar en español. «El rey Herodes» es la forma más natural y fiel al mismo tiempo.
- source_word: ἐταράχθη
  english_pob_choice: was troubled
  chosen_spanish: se turbó
  alternatives_spanish:
  - se perturbó
  - se alborotó
  lexicon: BDAG
  rationale: El aoristo pasivo de ταράσσω indica perturbación interior o alarma. «Se turbó» reproduce bien el sentido sin sobrecargarlo; «perturbó» puede sonar menos idiomático en este contexto.
- source_word: πᾶσα Ἱεροσόλυμα
  english_pob_choice: all Jerusalem
  chosen_spanish: toda Jerusalén
  alternatives_spanish:
  - Jerusalén entera
  - todo Jerusalén
  lexicon: BDAG
  rationale: Se mantiene el uso metonímico de la ciudad por sus habitantes. «Toda Jerusalén» preserva la forma del griego y deja abierta la fuerza corporativa o hiperbólica sin explicarla en el texto principal.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: BDAG
  rationale: La preposición μετά con genitivo se vierte de manera directa. «Con él» conserva la asociación del turbamiento de Jerusalén con el de Herodes.
theological_decisions:
- issue: Alcance de «toda Jerusalén»
  english_pob_reading: A corporate/metonymic reference to the city and its populace being disturbed along with Herod
  chosen_spanish_reading: Una referencia corporativa/metonímica a la ciudad y a su población, turbada junto con Herodes
  alternative_spanish_readings:
  - Una hipérbole que significa muchos en Jerusalén
  - Una referencia sobre todo a los círculos dirigentes de Jerusalén
  rationale: El griego nombra la ciudad como conjunto, y la traducción conserva esa formulación sin restringirla a líderes ni explicarla en el cuerpo del texto. Así se mantiene la tensión narrativa y el alcance abierto del enunciado.
  doctrine_reference: Preservar la tensión textual sin resolverla interpretativamente
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo entre revisiones: no se requieren cambios sustantivos respecto del sentido y la estructura del texto fuente. Se mantuvo la equivalencia óptima del inglés POB y la metonimia de «toda Jerusalén» sin ampliarla ni reducirla.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este versículo no contiene el tetragrámaton.
  - Se conserva el nombre propio «Jerusalén» y el título «rey» en minúscula cuando acompaña al nombre personal, conforme al uso normal en español.
  - Se usa «turbó» por su fuerza semántica cercana a «was troubled» y su naturalidad en registro bíblico actual.
