translation:
  language: es
  text: 'Y al entrar en la casa, vieron al niño con María, su madre, y postrándose le rindieron homenaje[a]; y abriendo sus tesoros, le ofrecieron dones: oro, franquincienso y mirra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo adoraron». El verbo griego puede denotar adoración o un acto de homenaje reverente, según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - morada
  lexicon: BDAG
  rationale: οἰκία denota una casa o vivienda concreta. «Casa» es la equivalencia directa y natural en español, sin añadir matiz interpretativo de hogar familiar o residencia solemne.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - niño pequeño
  - crío
  lexicon: BDAG
  rationale: παιδίον se refiere a un niño o niño pequeño. En este contexto, «niño» comunica con claridad y naturalidad, y evita la redundancia de «niño pequeño».
- source_word: μετὰ Μαρίας τῆς μητρὸς αὐτοῦ
  english_pob_choice: with Mary his mother
  chosen_spanish: con María, su madre
  alternatives_spanish:
  - con María, la madre de él
  lexicon: BDAG
  rationale: μετά con genitivo significa «con». La aposición identifica a María como su madre; el español fluye mejor con una coma que conserva la relación sin forzar el orden.
- source_word: πεσόντες
  english_pob_choice: falling down
  chosen_spanish: postrándose
  alternatives_spanish:
  - cayendo de rodillas
  - habiendo caído
  lexicon: BDAG
  rationale: El participio aoristo describe la acción acompañante de inclinarse o echarse rostro en tierra. «Postrándose» expresa el gesto corporal con buena naturalidad en español bíblico y conserva la fuerza visual del acto.
- source_word: προσεκύνησαν
  english_pob_choice: paid homage
  chosen_spanish: rindieron homenaje
  alternatives_spanish:
  - adoraron
  - se postraron ante él
  lexicon: BDAG
  rationale: προσκυνέω puede significar adoración o homenaje reverente, según el contexto. «Rindieron homenaje» preserva esa amplitud semántica sin resolverla de modo prematuro hacia una sola lectura teológica.
- source_word: θησαυροὺς
  english_pob_choice: treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - arcas
  - riquezas
  lexicon: BDAG
  rationale: θησαυρός puede referirse a tesoros o a depósitos de tesoro. «Tesoros» es la opción más directa y natural, y funciona bien con el verbo «abrir».
- source_word: προσήνεγκαν
  english_pob_choice: offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - presentaron
  - trajeron
  lexicon: BDAG
  rationale: προσφέρω aquí significa ofrecer o presentar. «Ofrecieron» encaja con el contexto de dones y mantiene el matiz formal del acto.
- source_word: δῶρα
  english_pob_choice: gifts
  chosen_spanish: regalos
  alternatives_spanish:
  - dones
  - ofrendas
  lexicon: BDAG
  rationale: δῶρον significa regalo o don; en algunos contextos, ofrenda. «Regalos» es claro en español moderno, y aquí no obliga a leerlos como sacrificios cultuales.
- source_word: χρυσὸν
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: BDAG
  rationale: χρυσός significa oro. «Oro» es la traducción directa y esperable.
- source_word: λίβανον
  english_pob_choice: frankincense
  chosen_spanish: incienso
  alternatives_spanish:
  - franquincienso
  lexicon: BDAG
  rationale: λίβανος designa específicamente el aromático resinoso conocido tradicionalmente como frankincense. En español, «incienso» es el equivalente más comprensible y corriente; «franquincienso» es más preciso etimológicamente, pero menos natural.
- source_word: σμύρναν
  english_pob_choice: myrrh
  chosen_spanish: mirra
  alternatives_spanish:
  - mirra aromática
  lexicon: BDAG
  rationale: σμύρνα denota mirra. «Mirra» es la forma tradicional y precisa en español.
theological_decisions:
- issue: Alcance de προσκυνέω respecto al niño Jesús
  english_pob_reading: paid homage, with footnoted alternative worshiped him
  chosen_spanish_reading: rindieron homenaje, con nota alternativa «adoraron»
  alternative_spanish_readings:
  - adoraron
  - se postraron ante él
  rationale: En el contexto narrativo, la acción de los magos puede entenderse como homenaje reverente a un rey, y también, en lectura canónica, como adoración. La versión principal conserva la tensión semántica sin cerrarla; la nota permite la lectura más fuerte sin imponerla en el texto base.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Referencia implícita al acto de postración física
  english_pob_reading: falling down
  chosen_spanish_reading: postrándose
  alternative_spanish_readings:
  - cayendo de rodillas
  - prosternándose
  rationale: El participio griego sugiere la postura corporal de postrarse. «Postrándose» comunica el gesto de manera fiel y natural en español e integra bien la secuencia de acciones.
  doctrine_reference: 'DOCTRINE.md: Follow source syntax and preserve bodily imagery'
translation_notes:
  revision_awareness: Se revisó el antecedente inglés y el pasaje griego con sus decisiones léxicas. La versión española mantiene la misma tensión interpretativa en προσκυνέω, preserva el orden narrativo de las acciones y traduce los dones con equivalentes naturales en español sin perder precisión semántica.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - Se mantuvo «Mesías»/«Cristo» fuera del texto porque el pasaje no los contiene.
  - «Tesoros» se usó para θησαυρούς en coherencia con el valor concreto/plural del sustantivo.
  - 'La secuencia verbal conserva el avance narrativo: entrar, ver, postrarse/rendir homenaje, abrir, ofrecer.'
  - Se evitó un calco excesivo de la sintaxis inglesa para lograr un español publicable sin perder la base griega.
