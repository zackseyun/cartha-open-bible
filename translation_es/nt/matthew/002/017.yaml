translation:
  language: es
  text: Entonces se cumplió lo dicho por medio de Jeremías el profeta, diciendo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que dice:». El griego λέγοντος introduce la cita que sigue; «diciendo» lo refleja más directamente en español.'
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural en español y conserva la progresión del relato sin añadir matiz temporal extra.
- source_word: ἐπληρώθη
  english_pob_choice: was fulfilled
  chosen_spanish: se cumplió
  alternatives_spanish:
  - fue cumplido
  - llegó a cumplirse
  lexicon: BDAG
  rationale: En la fórmula mateana de cumplimiento, «se cumplió» conserva la afirmación literario-teológica de cumplimiento sin volverla pesada en español.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo dicho
  alternatives_spanish:
  - lo hablado
  - aquello que fue dicho
  lexicon: BDAG
  rationale: El participio sustantivado neutro pide un referente nominal breve; «lo dicho» es idiomático y preserva el carácter de palabra pronunciada.
- source_word: διὰ Ἰερεμίου
  english_pob_choice: through Jeremiah
  chosen_spanish: por medio de Jeremías
  alternatives_spanish:
  - por Jeremías
  - a través de Jeremías
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación/agencia. «Por medio de» hace explícita esa mediación profética en español y mantiene a Jeremías como canal del mensaje.
- source_word: τοῦ προφήτου
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - como profeta
  lexicon: BDAG
  rationale: Genitivo en aposición que identifica a Jeremías; se conserva la designación directa y clara «el profeta».
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: que dice
  alternatives_spanish:
  - diciendo
  - el cual dice
  lexicon: BDAG
  rationale: El participio presente introduce la cita siguiente. En español, «que dice» enlaza de forma natural con la cita profética y evita una construcción demasiado literal o enredada.
theological_decisions:
- issue: Fórmula mateana de cumplimiento
  english_pob_reading: 'Retain explicit fulfillment language: ''was fulfilled'''
  chosen_spanish_reading: 'Conservar lenguaje explícito de cumplimiento: «se cumplió»'
  alternative_spanish_readings:
  - «llegó a cumplirse»
  - «fue cumplido»
  rationale: Mateo presenta el evento como cumplimiento profético; la traducción mantiene esa afirmación sin suavizarla ni explicarla de más.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación entre el cumplimiento y la cita profética
  english_pob_reading: '''what was spoken through Jeremiah the prophet ... saying:'''
  chosen_spanish_reading: «lo dicho por medio de Jeremías el profeta, que dice»
  alternative_spanish_readings:
  - «lo dicho ... diciendo»
  - «lo dicho ... y dice»
  rationale: El griego une el enunciado de cumplimiento con una cita introducida por un participio. En español, «que dice» conserva la referencia a la profecía que sigue y evita atribuir el acto de hablar al cumplimiento mismo.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: El inglés auditado pasó por una corrección desde «was fulfilled, which says:» de vuelta a «was fulfilled, saying:» para reflejar más directamente λέγοντος y recuperar naturalidad formal. La propuesta española sigue esa intención, pero la expresa con una unión más idiomática en español («que dice»).
  spanish_consistency_notes:
  - Se mantiene «Jeremías» y no se sustituye por un equivalente tradicional eclesiástico menos transparente.
  - «Se cumplió» conserva la fórmula mateana sin convertirla en una paráfrasis interpretativa.
  - «Por medio de» refleja la mediación profética de διά con genitivo de manera clara y auditable.
