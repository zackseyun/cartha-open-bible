- from: Y al ver la estrella, se alegraron con un gozo muy grande[a].
  to: Y al ver la estrella[a], se regocijaron con inmensa alegría.
  rationale: Se ajusta la redacción para reflejar mejor la intensidad de χαρὰν μεγάλην σφόδρα en español natural y digno. 'Se regocijaron' preserva mejor la fuerza verbal de ἐχάρησαν, e 'inmensa alegría' comunica de manera idiomática el énfasis acumulado. Se conserva una nota literal para no perder el rasgo enfático destacado en el POB inglés.
