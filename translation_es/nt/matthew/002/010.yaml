review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: participio temporal (''al ver''), conector narrativo (''Y''), referencia definida a ''la estrella'' y verbo principal de gozo. Sin embargo, atenúa la fuerza enfática de χαρὰν μεγάλην σφόδρα. El griego acumula énfasis (''se regocijaron con gozo grande sobremanera/excesivamente''), y ''con un gozo muy grande'' suena algo inflado pero menos idiomático y menos intenso que una formulación española más natural y enfática.'
  spanish_quality_summary: El texto es legible y digno, pero 'se alegraron con un gozo muy grande' resulta menos natural en español bíblico actual que 'se regocijaron con inmensa alegría' o 'se llenaron de inmensa alegría'. Dado que el inglés POB conserva explícitamente 'rejoiced' y además añade nota por la expresión enfática, conviene mantener fuerza verbal y altura de registro. La nota actual también usa una literalidad española torpe ('gozo grande en gran manera') que puede mejorarse.
  glossary_alignment: 'No hay términos del glosario maestro especialmente controvertidos en este versículo. La decisión clave es estilístico-lexical: para ἐχάρησαν es preferible ''se regocijaron'' aquí, porque preserva mejor la elevación de ''they rejoiced''; y para χαρὰν μεγάλην σφόδρα, una combinación como ''con inmensa alegría'' comunica mejor el intensificador acumulado en español natural, apoyada por nota literal.'
  issues:
  - severity: medium
    issue: La expresión 'se alegraron con un gozo muy grande' es poco idiomática y debilita el énfasis del griego.
    rationale: El griego usa un acusativo cognado intensificado por μεγάλην y σφόδρα. En español, la frase actual suena forzada sin reproducir plenamente el clímax enfático; una formulación más natural puede conservar mejor sentido y tono.
  - severity: low
    issue: El verbo 'se alegraron' es correcto, pero menos fuerte que 'se regocijaron' en este contexto.
    rationale: El inglés auditado eligió 'they rejoiced' por su fuerza verbal y tono elevado. En este versículo de alegría intensa, 'se regocijaron' encaja bien y preserva mejor ese matiz.
  - severity: low
    issue: La nota al pie puede expresarse con un español más claro y fiel a la observación del POB en inglés.
    rationale: La nota inglesa explica que es una expresión fuertemente enfática; la formulación española actual es demasiado literal y tosca. Conviene mantener el dato literal pero con mejor redacción.
  revised_spanish_text: Y al ver la estrella[a], se regocijaron con inmensa alegría.
