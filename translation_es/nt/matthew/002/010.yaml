translation:
  language: es
  text: Y al ver la estrella[a], se regocijaron con inmensa alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, 'se regocijaron con gran gozo sobremanera', una expresión fuertemente enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - después de ver
  - habiendo visto
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal. En español, 'al ver' conserva esa relación temporal de manera natural y breve, sin volver la frase pesada.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ solo enlaza la narración; 'Y' reproduce bien ese avance narrativo sin sugerir contraste fuerte.
- source_word: τὸν ἀστέρα
  english_pob_choice: the star
  chosen_spanish: la estrella
  alternatives_spanish:
  - la estrella aquella
  - esa estrella
  lexicon: BDAG
  rationale: ἀστήρ significa 'estrella'. En español se mantiene el artículo definido por la referencia específica ya introducida en el contexto.
- source_word: ἐχάρησαν
  english_pob_choice: they rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - tuvieron gozo
  lexicon: BDAG
  rationale: El verbo χαίρω admite en español un equivalente natural y digno como 'alegrarse'. 'Se regocijaron' es posible, pero suena más marcado; 'tuvieron gozo' desplaza la fuerza verbal a una construcción nominal.
- source_word: χαρὰν μεγάλην
  english_pob_choice: with great joy
  chosen_spanish: con un gozo muy grande
  alternatives_spanish:
  - con gran gozo
  - con mucha alegría
  - con un gran gozo
  lexicon: BDAG
  rationale: La construcción de acusativo cognado intensifica el verbo. 'Con un gozo muy grande' conserva la idea intensiva y el tono elevado, manteniendo 'gozo' como sustantivo fuerte y bien bíblico en español.
- source_word: σφόδρα
  english_pob_choice: exceedingly
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sobremanera
  - excesivamente
  lexicon: BDAG
  rationale: σφόδρα intensifica toda la expresión. En español, 'muy' integrado en 'muy grande' comunica la fuerza total de modo natural; alternativas como 'sobremanera' o 'en gran manera' son más marcadas y menos fluidas aquí.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en una lectura altamente estable; no se observaron revisiones sustantivas recientes que afecten la línea española. Se conserva la intensidad del original sin calco rígido.
  spanish_consistency_notes:
  - Se mantiene 'gozo' para la fuerza sustantiva de χαρά, en lugar de reducirlo a una alegría más coloquial.
  - '''Al ver'' reproduce la relación temporal del participio aoristo sin añadir tiempo verbal innecesario.'
  - Se conserva la intensificación total de la cláusula mediante 'muy grande' y la nota explica el énfasis griego.
