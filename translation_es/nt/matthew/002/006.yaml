translation:
  language: es
  text: Y tú, Belén, tierra de Judá, de ningún modo eres la menor entre los gobernantes de Judá; porque de ti saldrá[a] un gobernante, que pastoreará[b] a mi pueblo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vendrá»; más literalmente, «saldrá» o «saldrá fuera».
    reason: lexical_alternative
  - marker: b
    text: «Pastoreará» también puede llevar el sentido de «gobernará», conservando la imagen de liderazgo real junto con el cuidado pastoral.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βηθλέεμ γῆ Ἰούδα
  english_pob_choice: Bethlehem, land of Judah
  chosen_spanish: Belén, tierra de Judá
  alternatives_spanish:
  - Belén, país de Judá
  - Belén, territorio de Judá
  lexicon: BDAG
  rationale: γῆ en aposición a Belén y con genitivo de Judá señala la región asociada, no la tierra en sentido amplio. «Tierra» conserva la referencia geográfica de forma natural en español y sigue de cerca el valor de la formulación citada.
- source_word: οὐδαμῶς
  english_pob_choice: by no means
  chosen_spanish: de ningún modo
  alternatives_spanish:
  - en absoluto
  - de ninguna manera
  lexicon: BDAG
  rationale: El adverbio intensifica la negación; «de ningún modo» reproduce bien esa fuerza enfática sin suavizarla.
- source_word: ἐλαχίστη
  english_pob_choice: least
  chosen_spanish: la menor
  alternatives_spanish:
  - la más pequeña
  - la menos importante
  lexicon: BDAG
  rationale: La superlativa en contexto expresa rango o importancia, no solo tamaño físico. «La menor» es natural en español y conserva la comparación de estatus.
- source_word: ἡγεμόσιν
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los líderes
  - los príncipes
  lexicon: BDAG
  rationale: El dativo plural apunta a figuras de gobierno o jefatura dentro de Judá. «Gobernantes» mantiene la amplitud política del término sin forzar un cargo más específico.
- source_word: ἐξελεύσεται
  english_pob_choice: will come
  chosen_spanish: saldrá
  alternatives_spanish:
  - vendrá
  - saldrá de allí
  lexicon: BDAG
  rationale: El verbo significa literalmente «saldrá / irá fuera», y en esta cita el movimiento desde Belén es importante. «Saldrá» conserva mejor el eco de origen que un simple «vendrá».
- source_word: ἡγούμενος
  english_pob_choice: a ruler
  chosen_spanish: un gobernante
  alternatives_spanish:
  - un líder
  - un jefe
  lexicon: BDAG
  rationale: Como participio sustantivado, describe la función de mando de la persona prometida. «Gobernante» preserva el sentido de autoridad y permite que la imagen pastoral posterior quede intacta.
- source_word: ποιμανεῖ
  english_pob_choice: will shepherd
  chosen_spanish: pastoreará
  alternatives_spanish:
  - apacentará
  - guiará como pastor
  lexicon: BDAG
  rationale: El verbo conserva la imagen de pastoreo, importante en el trasfondo mesiánico. «Pastoreará» comunica tanto cuidado como dirección, sin borrar la metáfora.
- source_word: τὸν λαόν μου τὸν Ἰσραήλ
  english_pob_choice: my people Israel
  chosen_spanish: mi pueblo Israel
  alternatives_spanish:
  - mi pueblo, Israel
  - mi pueblo, el Israel
  lexicon: BDAG
  rationale: La frase mantiene el vínculo de pacto entre el hablante y su pueblo. En español, «mi pueblo Israel» reproduce la relación apposicional de manera clara y fiel.
theological_decisions:
- issue: Tensión entre autoridad real y cuidado pastoral del Mesías
  english_pob_reading: Retain both dimensions by rendering ἡγούμενος as 'a ruler' and ποιμανεῖ as 'will shepherd.'
  chosen_spanish_reading: Mantener ambas dimensiones con «un gobernante» y «pastoreará».
  alternative_spanish_readings:
  - «un líder» y «gobernará»
  - «un pastor» y «cuidará»
  rationale: La cita combina gobierno y pastoreo. La versión española preserva esa tensión en lugar de resolverla en una sola imagen, para no perder la riqueza mesiánica del texto.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del paquete fuente, sin revisiones aplicadas en el último pase. Se conservó la combinación de negación enfática, origen local y la doble imagen de autoridad pastoral del candidato mesiánico, en línea con el audit trail inglés y el griego.
  spanish_consistency_notes:
  - Se usa «Belén» como forma estable del topónimo en español.
  - Se prefirió «tierra de Judá» para γῆ por ser geográfico y natural en español.
  - Se mantuvo «Israel» sin artículo para reproducir la fórmula bíblica breve del griego.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no presentes en el versículo.
  - La nota sobre ποιμανεῖ conserva la alternativa de «gobernar» para reflejar la tensión semántica documentada.
