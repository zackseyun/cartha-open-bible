base_translation:
  language: en
  yaml_path: translation/nt/matthew/002/006.yaml
  text: And you[a], Bethlehem, land of Judah, are by no means least among the rulers of Judah[b]; for from you will come a ruler who will shepherd my people Israel.
  footnotes:
