translation:
  language: es
  text: Después de que nació Jesús en Belén de Judea, en los días de Herodes el rey, he aquí unos magos[a] del oriente llegaron a Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Magos» traduce el término griego μάγοι. Puede referirse a hombres eruditos del oriente, vinculados probablemente con la astrología o con la sabiduría de la corte; por eso también puede verterse «sabios».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦ δὲ Ἰησοῦ γεννηθέντος
  english_pob_choice: Now after Jesus was born
  chosen_spanish: Después de que Jesús nació
  alternatives_spanish:
  - Cuando Jesús nació
  - Después de que Jesús hubiera nacido
  lexicon: BDAG
  rationale: El genitivo absoluto marca una circunstancia anterior a la acción principal. En español, «Después de que Jesús nació» transmite con naturalidad ese valor temporal sin añadir más de lo que el griego dice. Se evita una formulación excesivamente literal o arcaica.
- source_word: ἐν Βηθλέεμ τῆς Ἰουδαίας
  english_pob_choice: in Bethlehem of Judea
  chosen_spanish: en Belén de Judea
  alternatives_spanish:
  - en Belén, en Judea
  lexicon: BDAG
  rationale: 'Se conserva el nombre propio de la ciudad y el genitivo se vierte como pertenencia/localización: «de Judea». Esto distingue esta Belén de otras referencias posibles y sigue el sentido histórico-geográfico del griego.'
- source_word: ἐν ἡμέραις Ἡρῴδου τοῦ βασιλέως
  english_pob_choice: in the days of Herod the king
  chosen_spanish: en los días de Herodes el rey
  alternatives_spanish:
  - durante el reinado de Herodes el rey
  - en tiempos de Herodes el rey
  lexicon: BDAG
  rationale: La expresión idiomática se mantiene con «en los días de», que en español bíblico comunica bien el marco histórico. Se conserva la aposición «el rey» para reflejar el orden y la función del griego sin convertirlo automáticamente en un título modernizado.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mirad
  lexicon: BDAG
  rationale: «He aquí» reproduce el marcador discursivo de atención del griego con dignidad bíblica y claridad en español. Aunque es una forma tradicional, aquí también funciona como equivalente directo de la fuerza de ἰδού.
- source_word: μάγοι
  english_pob_choice: wise men
  chosen_spanish: unos magos[a]
  alternatives_spanish:
  - unos sabios
  - unos astrólogos
  lexicon: BDAG
  rationale: Se conserva «magos» porque el término griego designa a figuras orientales eruditas asociadas con sabiduría de corte y/o astrología, y no simplemente a «sabios» en sentido general. El artículo indefinido plural evita añadir número o estatus no presentes en el texto. La nota explica la alternativa semántica que el inglés POB preservó.
- source_word: ἀπὸ ἀνατολῶν
  english_pob_choice: from the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - desde el este
  - de las regiones orientales
  lexicon: BDAG
  rationale: En español bíblico, «oriente» comunica con naturalidad la procedencia geográfica y conserva el tono solemne del original. El plural griego puede aludir a las regiones del este; «del oriente» expresa esa procedencia sin sobreespecificarla.
- source_word: παρεγένοντο
  english_pob_choice: arrived
  chosen_spanish: llegaron
  alternatives_spanish:
  - arribaron
  - se presentaron
  lexicon: BDAG
  rationale: El verbo expresa llegada o aparición en destino. «Llegaron» es la forma más natural y precisa en español, y encaja bien con «a Jerusalén» sin perder el matiz de arribo.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: in Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: BDAG
  rationale: Aunque εἰς suele equivaler a «a/hacia», con un verbo de llegada en español la expresión más natural es «a Jerusalén». Se mantiene el movimiento hacia la ciudad que indica el griego.
theological_decisions:
- issue: μάγοι sin importar tradición posterior
  english_pob_reading: wise men
  chosen_spanish_reading: unos magos
  alternative_spanish_readings:
  - unos sabios
  - unos astrólogos
  rationale: Se evita traducir con «sabios» como si el término fuera meramente un elogio genérico. «Magos» conserva la rareza histórica del grupo y deja abierta la caracterización exacta que el texto no desarrolla aquí. La nota aclara el alcance del término sin introducir detalles legendarios.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo con la revisión más reciente: no se reportan cambios pendientes y la opción inglesa mantenida para μάγοι fue glosada en nota, no incorporada como reinterpretación del relato. La versión española sigue esa misma línea de transparencia lexical.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «Dios»/«Yahvé» según corresponda en el proyecto; este versículo no contiene ninguna de esas formas.
  - Se conserva la distinción entre localización y llegada con «del oriente» y «llegaron a Jerusalén».
  - No se añade información sobre número, reyes o regalos de los magos, porque el verso no la contiene.
