translation:
  language: es
  text: 'y estuvo allí hasta la muerte de Herodes, para que se cumpliera lo que fue dicho por el Señor por medio del profeta, diciendo[c][b]: «De Egipto[a] llamé a mi hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Desde Egipto llamé a mi hijo».
    reason: lexical_alternative
  - marker: b
    text: Mateo cita Oseas 11:1, donde originalmente se habla de Israel como hijo de Dios; aquí presenta a Jesús como cumplimiento de esa Escritura.
    reason: cross_reference
  - marker: c
    text: O «lo que el Señor había dicho por medio del profeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἦν ἐκεῖ
  english_pob_choice: was there
  chosen_spanish: y estuvo allí
  alternatives_spanish:
  - y estaba allí
  - y permaneció allí
  lexicon: SBLGNT / BDAG
  rationale: El imperfecto con ἐκεῖ expresa una permanencia situada; en español, «estuvo allí» conserva la idea de presencia continua sin añadir más de lo que el griego dice. «Estaba allí» también es posible, pero «estuvo» ayuda a marcar el cierre narrativo del período.
- source_word: ἕως τῆς τελευτῆς Ἡρῴδου
  english_pob_choice: until the death of Herod
  chosen_spanish: hasta la muerte de Herodes
  alternatives_spanish:
  - hasta que Herodes murió
  - hasta el fin de Herodes
  lexicon: BDAG
  rationale: τελευτή aquí denota muerte, no solo término. «Hasta la muerte de Herodes» reproduce la construcción nominal del griego y es natural en español. «Hasta que Herodes murió» es válida, pero verbaliza la frase más de lo necesario.
- source_word: ἵνα πληρωθῇ
  english_pob_choice: so that ... might be fulfilled
  chosen_spanish: para que se cumpliera
  alternatives_spanish:
  - a fin de que se cumpliera
  - para cumplir
  lexicon: BDAG
  rationale: La cláusula final/presentada como resultado en Mateo debe conservarse como propósito o resultado. «Para que se cumpliera» preserva la forma y la tensión de cumplimiento sin convertirla en un simple infinitivo.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que había sido dicho
  alternatives_spanish:
  - lo que fue dicho
  - la palabra dicha
  lexicon: BDAG
  rationale: El participio pasivo articular se expresa naturalmente como una cláusula sustantiva en español. «Lo que había sido dicho» mantiene el sentido pasivo y encaja bien con la secuencia narrativa de la cita.
- source_word: ὑπὸ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - por el Señor Dios
  - por Yahvé
  lexicon: 'Contested terms table: κύριος → Lord'
  rationale: Sigo la decisión POB de κύριος como «Señor» en esta fórmula de citación. Aunque el contexto evoca la Escritura de Israel y puede aludir al nombre divino, el griego presente usa κυρίου; por eso no se sustituye por «Yahvé» en el cuerpo del versículo.
- source_word: διὰ τοῦ προφήτου
  english_pob_choice: through the prophet
  chosen_spanish: por medio del profeta
  alternatives_spanish:
  - a través del profeta
  - por el profeta
  lexicon: BDAG
  rationale: διά con genitivo indica mediación instrumental. «Por medio del profeta» expresa con claridad que el profeta es el mediador humano de la palabra divina, sin confundirlo con la fuente última.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - al decir
  lexicon: BDAG
  rationale: Como participio introductor de la cita, «diciendo» es la equivalencia más directa y fluida en español. Conserva el enlace narrativo sin añadir una reestructuración interpretativa.
- source_word: Ἐξ Αἰγύπτου
  english_pob_choice: Out of Egypt
  chosen_spanish: De Egipto
  alternatives_spanish:
  - Desde Egipto
  - Fuera de Egipto
  lexicon: BDAG
  rationale: ἐκ/ἐξ admite «de» o «desde»; en esta cita de Oseas, «De Egipto» suena natural en español bíblico y no fuerza una imagen espacial extra. Se deja abierta la alternativa de «Desde Egipto» en nota por la ambigüedad léxica.
- source_word: ἐκάλεσα
  english_pob_choice: I called
  chosen_spanish: llamé
  alternatives_spanish:
  - llamé hacia afuera
  - convocqué
  lexicon: BDAG
  rationale: καλέω aquí mantiene el sentido básico de «llamar», importante por la alusión a Oseas 11:1. «Llamé» preserva la simplicidad y la intertextualidad; «convocar» sería demasiado fuerte y menos exacto.
- source_word: τὸν υἱόν μου
  english_pob_choice: my son
  chosen_spanish: a mi hijo
  alternatives_spanish:
  - mi hijo
  - a mi Hijo
  lexicon: BDAG
  rationale: El acusativo directo con verbo de llamar se expresa naturalmente con «a mi hijo» en español. Se mantiene «hijo» en singular, porque la referencia de Oseas y su uso en Mateo depende de esa filiación específica.
theological_decisions:
- issue: Fórmula de cumplimiento en Mateo y relación con Oseas 11:1
  english_pob_reading: The verse is translated to preserve Matthew's claim that Jesus' return from Egypt fulfills what the Lord spoke through the prophet, without narrowing the mechanism of fulfillment beyond the text itself.
  chosen_spanish_reading: La traducción conserva que el regreso de Jesús de Egipto cumple lo dicho por el Señor por medio del profeta, sin resolver en el texto el modo exacto de ese cumplimiento.
  alternative_spanish_readings:
  - cumplimiento predictivo directo
  - cumplimiento tipológico de Israel en Jesús
  rationale: Mateo afirma cumplimiento, pero la traducción no debe imponer una teoría única. Mantener la fórmula abierta preserva la tensión teológica entre profecía, cita y aplicación cristológica.
  doctrine_reference: Preservar tensión teológica en la fórmula de cumplimiento.
- issue: κύριος en la fórmula de citación
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: La lectura de POB para κυρίου es «Lord/Señor». En esta cita no hay forma especial que obligue a reemplazarla por el nombre divino en el texto principal; sin embargo, la posible resonancia con el nombre de Yahvé queda reconocida en la decisión léxica.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la revisión más reciente: no se requieren cambios sustanciales respecto del análisis auditado. Se conservan la estructura de fórmula de cumplimiento, la mediación profética y la cita de Oseas con la tensión teológica abierta.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κυρίου, en coherencia con el criterio POB documentado.
  - Se usa «Jesús» solo en la nota explicativa, porque el versículo no lo nombra explícitamente; el sujeto implícito se entiende por contexto inmediato.
  - Se prefiere «llamé» frente a formulaciones más interpretativas para no debilitar la cita de Oseas.
  - La puntuación sigue el español actual y conserva comillas angulares para la cita directa.
