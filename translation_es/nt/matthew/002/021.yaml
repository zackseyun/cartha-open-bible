translation:
  language: es
  text: Entonces se levantó, tomó al niño y a su madre, y entró en la tierra de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Y
  lexicon: BDAG
  rationale: δὲ marca aquí avance narrativo, no contraste fuerte. «Así que» mantiene esa progresión con un enlace natural en español.
- source_word: ἐγερθεὶς
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - habiéndose levantado
  lexicon: BDAG
  rationale: El participio aoristo funciona aquí como acción previa e intransitiva. «Se levantó» es natural en español y conserva la secuencia verbal sin forzar un gerundio o una forma demasiado literal.
- source_word: παρέλαβε
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó consigo
  - tomó consigo
  lexicon: BDAG
  rationale: παραλαμβάνω aquí significa tomar consigo. «Tomó» reproduce bien el valor narrativo simple que el inglés POB resolvió como «took».
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: al niño
  alternatives_spanish:
  - al niño pequeño
  - al infante
  lexicon: BDAG
  rationale: παιδίον denota un niño; en este contexto, «al niño» es claro y fiel. El artículo con preposición evita una calca innecesaria y suena natural en español.
- source_word: τὴν μητέρα αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre del niño
  - a su madre
  lexicon: BDAG
  rationale: El pronombre αὐτοῦ remite naturalmente al niño. «A su madre» conserva la referencia posesiva implícita en español sin repetir «del niño».
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - ingresó
  lexicon: BDAG
  rationale: εἰσέρχομαι significa entrar. «Entró» es la forma más directa y natural; el complemento posterior ya expresa la dirección.
- source_word: εἰς γῆν Ἰσραήλ
  english_pob_choice: the land of Israel
  chosen_spanish: en la tierra de Israel
  alternatives_spanish:
  - en la tierra de Israel
  - en el país de Israel
  lexicon: BDAG
  rationale: γῆ con un genitivo propio se entiende como una expresión territorial. «Tierra» conserva el valor geográfico amplio del griego y evita modernizarlo como «país».
translation_notes:
  revision_awareness: El inglés POB ya había resuelto la escena con alta concordancia respecto al griego; no hay revisiones aplicadas ni tensiones léxicas relevantes en este versículo.
