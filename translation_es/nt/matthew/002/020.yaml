translation:
  language: es
  text: 'diciendo: «Levántate, toma al niño y a su madre, y ve a la tierra de Israel, porque los que buscaban la vida del niño han muerto[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque los que buscaban la vida del niño han muerto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presente introduce el discurso del ángel y enlaza estrechamente con el versículo anterior; «diciendo» conserva mejor esa dependencia que una coordinación finita.
- source_word: Ἐγερθείς
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levantado
  lexicon: BDAG
  rationale: El participio aoristo usado idiomáticamente antes del imperativo se comunica de forma natural en español con una orden breve y directa como «Levántate».
- source_word: παράλαβε
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - lleva contigo
  - recibe
  lexicon: BDAG
  rationale: Aquí el verbo implica tomar consigo al niño; «toma» es breve y fiel, y evita añadir una expansión innecesaria.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el pequeño
  - el niño pequeño
  lexicon: BDAG
  rationale: παιδίον designa al niño; «el niño» reproduce el sentido básico sin añadir una precisión de edad que el griego no exige.
- source_word: τὴν μητέρα αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre del niño
  lexicon: BDAG
  rationale: 'En español, el posesivo funciona con naturalidad en la relación madre-hijo: «su madre». La preposición «a» es necesaria por el objeto directo personal.'
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - ponte en camino
  lexicon: BDAG
  rationale: El imperativo medio de πορεύομαι suele funcionar como mandato simple de ir. «Vete» conserva esa dirección personal y es idiomático en español.
- source_word: εἰς γῆν Ἰσραήλ
  english_pob_choice: to the land of Israel
  chosen_spanish: a la tierra de Israel
  alternatives_spanish:
  - a la tierra de Israel
  - a la tierra de Israel
  lexicon: BDAG
  rationale: γῆ con genitivo de Ἰσραήλ señala territorio/país. «Tierra» conserva el matiz geográfico y bíblico del griego mejor que reducirlo a «Israel» sin más.
- source_word: τεθνήκασιν
  english_pob_choice: are dead
  chosen_spanish: han muerto
  alternatives_spanish:
  - están muertos
  lexicon: BDAG
  rationale: El perfecto de θνῄσκω subraya el estado resultante de la muerte. En español, «han muerto» refleja bien ese resultado sin sonar forzado.
- source_word: οἱ ζητοῦντες
  english_pob_choice: those seeking
  chosen_spanish: los que buscaban
  alternatives_spanish:
  - los que buscan
  - los que intentaban encontrar
  lexicon: BDAG
  rationale: El participio sustantivado puede expresarse como relativo en español. Dado el contexto narrativo, el imperfecto «buscaban» comunica la acción pasada en curso antes de quedar frustrada.
- source_word: τὴν ψυχὴν τοῦ παιδίου
  english_pob_choice: the child’s life
  chosen_spanish: la vida del niño
  alternatives_spanish:
  - el alma del niño
  - la vida del pequeño
  lexicon: BDAG
  rationale: En este giro, ψυχή significa «vida» y no «alma». «La vida del niño» evita introducir una lectura teológica ajena al contexto inmediato de intento de matar al niño.
theological_decisions:
- issue: Sentido de ψυχή en un contexto de amenaza mortal
  english_pob_reading: the child’s life
  chosen_spanish_reading: la vida del niño
  alternative_spanish_readings:
  - el alma del niño
  rationale: La expresión griega equivale aquí a buscar la vida de alguien, es decir, querer matarlo. Traducir «alma» oscurecería el sentido narrativo y añadiría una carga doctrinal no requerida por el pasaje.
  doctrine_reference: Primacía del contexto inmediato y del uso idiomático original sobre una equivalencia devocional tradicional.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios necesarios y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino ni una cita directa del tetragrama.
  - Se usa «niño» para παιδίον por fidelidad léxica y coherencia con el contexto narrativo.
  - Se conserva el valor idiomático de ψυχή como «vida» para evitar una lectura espiritualizante indebida.
  - La puntuación y comillas siguen el uso español; el participio inicial queda fuera de la cita principal para reflejar su función introductoria.
