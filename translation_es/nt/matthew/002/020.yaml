review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mandato de levantarse, tomar al niño y a su madre, ir a la tierra de Israel, y la razón de que quienes buscaban la vida del niño ya murieron. Sin embargo, las notas léxicas no preservan fielmente la auditoría inglesa: la nota sobre «diciendo» no corresponde a una alternativa significativa, y la nota final marca como alternativa una redacción que en realidad repite el texto principal en español en vez de reflejar la alternativa inglesa más literal centrada en «la vida del niño».'
  spanish_quality_summary: El español es claro y natural. No obstante, «vete» puede sonar algo coloquial frente al registro bíblico digno; «ve» o «ponte en camino» encajan mejor. También sobra la nota [a], y la puntuación de la nota [b] debe anclarse dentro del enunciado relevante sin crear una nota redundante.
  glossary_alignment: No hay conflicto con los términos de proyecto. «niño», «vida» y «tierra de Israel» están bien alineados. La decisión de traducir ψυχή como «vida» es correcta y teológicamente adecuada en contexto.
  issues:
  - severity: medium
    issue: La nota [a] sobre «diciendo» es improcedente.
    rationale: 'La auditoría inglesa sí marca «saying[a]», pero su nota ofrece como alternativa «and said», no una glosa más literal de «diciendo». En español, una nota que diga «O, más literalmente: “diciendo”» no aporta nada y no preserva una alternativa real útil para el lector.'
  - severity: medium
    issue: La nota [b] repite el texto principal en vez de reflejar la alternativa documentada.
    rationale: La nota inglesa distingue entre «are dead» y la alternativa más literal «have died», junto con «the life of the child». En el borrador español, la nota reproduce exactamente «porque han muerto los que buscaban la vida del niño», que ya es el texto principal, por lo que falla como nota léxica.
  - severity: low
    issue: «Vete» puede sonar demasiado coloquial para el registro meta.
    rationale: Aunque no es incorrecto, «ve» mantiene mejor un tono neutral y digno en español bíblico moderno sin perder naturalidad.
  revised_spanish_text: 'diciendo: «Levántate, toma al niño y a su madre, y ve a la tierra de Israel, porque los que buscaban la vida del niño han muerto[a]».'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «porque los que buscaban la vida del niño han muerto».'
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre «diciendo», se corrige la nota léxica para que preserve la alternativa documentada en la auditoría inglesa, y se ajusta «vete» a «ve» por mejor registro sin alterar el sentido.
