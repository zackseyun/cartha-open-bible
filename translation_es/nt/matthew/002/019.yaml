translation:
  language: es
  text: Pero después de que Herodes murió, he aquí un ángel[a] del Señor aparece en un sueño a José en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el ángel del Señor». El griego aquí dice «un ángel del Señor», sin artículo antes de «ángel».'
    reason: alternative_reading
lexical_decisions:
- source_word: Τελευτήσαντος
  english_pob_choice: after Herod died
  chosen_spanish: después de que Herodes murió
  alternatives_spanish:
  - cuando Herodes murió
  - después de la muerte de Herodes
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto funciona temporalmente; en español, la subordinada temporal expresa con naturalidad esa relación sin perder el hecho puntual de la muerte.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce transición narrativa; «Pero» conserva ese giro ligero y sigue siendo natural en español bíblico contemporáneo.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: La partícula marca atención enfática y solemnidad narrativa. «He aquí» preserva mejor ese valor literario que una forma demasiado coloquial.
- source_word: ἄγγελος κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel del Señor
  alternatives_spanish:
  - el ángel del Señor
  lexicon: BDAG
  rationale: Como el griego no tiene artículo antes de ἄγγελος, la forma indefinida «un ángel» refleja mejor la sintaxis. «Señor» evita el uso de una convención de máscara y mantiene el título divino de modo claro en español.
- source_word: φαίνεται
  english_pob_choice: appears
  chosen_spanish: se aparece
  alternatives_spanish:
  - aparece
  - es visto
  lexicon: BDAG
  rationale: El presente histórico en narrativa puede conservar vividez en español con «se aparece». Esta opción también refleja la experiencia visionaria del texto sin volverlo más pasivo de lo necesario.
- source_word: κατ’ ὄναρ
  english_pob_choice: in a dream
  chosen_spanish: en sueños
  alternatives_spanish:
  - en un sueño
  - por medio de un sueño
  lexicon: BDAG
  rationale: La locución idiomática indica revelación recibida durante un sueño. «En sueños» es una manera natural y bíblicamente reconocible de expresar esa experiencia en español.
- source_word: τῷ Ἰωσὴφ
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - para José
  lexicon: BDAG
  rationale: El dativo marca destinatario; «a José» es la correspondencia directa y idiomática en español.
- source_word: ἐν Αἰγύπτῳ
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  lexicon: BDAG
  rationale: Valor locativo simple; «en Egipto» reproduce la referencia geográfica sin adición interpretativa.
theological_decisions:
- issue: κύριος en la expresión ἄγγελος κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: 'En esta construcción idiomática, el español natural requiere el artículo: «del Señor». Aunque el nombre divino YHWH se vierte normalmente como «Yahvé» en la POB española, aquí la fuente griega usa κύριος en una frase fija y el texto auditado en inglés también preserva la forma tradicional «Lord/Señor»; por eso se mantiene «Señor» en el main text.'
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; y el tratamiento contextual del Nombre divino en expresiones fijadas'
- issue: Artículo con ἄγγελος
  english_pob_reading: an angel of the Lord
  chosen_spanish_reading: un ángel del Señor
  alternative_spanish_readings:
  - el ángel del Señor
  rationale: La ausencia del artículo en griego delante de ἄγγελος favorece una lectura indefinida. Se conserva esa distinción en español, aunque se anota la alternativa con artículo por su asociación tradicional en la recepción eclesial.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción
translation_notes:
  revision_awareness: El inglés auditado usa el presente histórico «appears» y corrige solo la puntuación final; la propuesta española conserva esa vividez con «se aparece» y mantiene la distinción indefinida de «ἄγγελος» documentada en la nota. No se añadieron elementos ausentes del griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en esta expresión fija, coherente con el tratamiento doctrinal del término, sin sustituirlo por una máscara tipográfica.
  - «He aquí» conserva la función de marcador narrativo enfático de ἰδού.
  - La elección de «en sueños» evita endurecer el idiomatismo de κατ’ ὄναρ y resulta natural para lectores hispanohablantes de iglesia.
  - La puntuación final y la sintaxis respetan la brevedad del versículo y su encadenamiento narrativo.
