revisions:
- from: Pero después de que Herodes murió, he aquí, un ángel del Señor[a] se aparece en sueños a José en Egipto.
  to: Pero después de que Herodes murió, he aquí un ángel[a] del Señor aparece en un sueño a José en Egipto.
  rationale: 'Se ajusta el español para mayor naturalidad y precisión: «aparece» refleja mejor φαίνεται sin matiz añadido; «en un sueño» expresa con claridad κατ’ ὄναρ; se recoloca la nota al sustantivo «ángel», que es donde está la variante de artículo; y se suaviza la puntuación con «he aquí» sin alterar el tono solemne. No se requiere adjudicación adicional.'
