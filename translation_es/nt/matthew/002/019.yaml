review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido del griego: genitivo absoluto temporal («después de que Herodes murió»), marcador narrativo («Pero»), ἰδού con valor de atención, artículo indefinido en «un ángel del Señor», presente histórico en φαίνεται, y ubicación «en Egipto». También preserva correctamente la nota sobre la alternativa «el ángel del Señor».'
  spanish_quality_summary: El texto es mayormente natural y claro, pero «he aquí» seguido de coma interrumpe algo la fluidez, y «se aparece en sueños» suena menos natural que «aparece en un sueño» en este contexto. Además, la nota al pie debe anclarse al elemento cuya alternativa explica, es decir «ángel», no «Señor».
  glossary_alignment: Buena alineación general con la terminología del proyecto. «Señor» para κύριος es defendible aquí por tratarse de la expresión griega fija ἄγγελος κυρίου y por el expediente auditado en inglés. No hay conflicto con el default de «Yahvé» porque la fuente inmediata es κύριος, no יהוה. Los nombres propios («José», «Egipto») y el resto del léxico están bien resueltos.
  issues:
  - severity: medium
    issue: La locución «se aparece en sueños» es menos idiomática que otras opciones.
    rationale: φαίνεται es simplemente «aparece» en presente histórico; el reflexivo «se aparece» añade un matiz no necesario, y «en sueños» con plural genérico suena menos preciso que «en un sueño» para κατ’ ὄναρ.
  - severity: low
    issue: La nota [a] está anclada a «Señor» en vez de «ángel».
    rationale: La alternativa documentada contrasta «un ángel» con «el ángel», no una variante sobre «Señor». El marcador debe colocarse donde el lector identifique la diferencia textual relevante.
  - severity: low
    issue: La puntuación alrededor de «he aquí» puede pulirse.
    rationale: 'Sin la segunda coma, la frase fluye mejor en español: «Pero después de que Herodes murió, he aquí un ángel...».'
  revised_spanish_text: Pero después de que Herodes murió, he aquí un ángel[a] del Señor aparece en un sueño a José en Egipto.
  revised_footnotes:
  - marker: a
    text: 'O: «el ángel del Señor». El griego aquí dice «un ángel del Señor», sin artículo antes de «ángel».'
    reason: alternative_reading
  revision_rationale: 'Se ajusta el español para mayor naturalidad y precisión: «aparece» refleja mejor φαίνεται sin matiz añadido; «en un sueño» expresa con claridad κατ’ ὄναρ; se recoloca la nota al sustantivo «ángel», que es donde está la variante de artículo; y se suaviza la puntuación con «he aquí» sin alterar el tono solemne. No se requiere adjudicación adicional.'
