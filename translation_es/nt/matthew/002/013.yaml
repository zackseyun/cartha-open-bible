translation:
  language: es
  text: 'Después de que se fueron[a], he aquí, un ángel de Yahvé se le apareció a José en un sueño, diciendo: «Levántate, toma al niño y a su madre, y huye a Egipto, y quédate allí hasta que yo te diga[b]; porque Herodes está por buscar al niño para destruirlo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando se retiraron». El griego usa un genitivo absoluto que marca acción previa.
    reason: alternative_reading
  - marker: b
    text: 'Griego: «está por buscar», que expresa intención inminente.'
    reason: lexical_alternative
  - marker: c
    text: O «para matarlo». El griego dice «para destruirlo», aquí con el sentido de causar su muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναχωρησάντων δὲ αὐτῶν
  english_pob_choice: After they had departed
  chosen_spanish: Después de que ellos se fueron
  alternatives_spanish:
  - Cuando ellos se retiraron
  - Después de retirarse ellos
  lexicon: BDAG
  rationale: El genitivo absoluto marca acción anterior; en español, «Después de que ellos se fueron» preserva la secuencia temporal de manera natural y pública, sin añadir contenido no sustentado. Se conserva el referente implícito del contexto sin explicitarlo en exceso.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ve
  lexicon: BDAG
  rationale: Se mantiene el marcador narrativo enfático típico de Mateo. «He aquí» es una fórmula española digna y reconocible que conserva la irrupción repentina del relato.
- source_word: ἄγγελος κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel de Yahvé
  alternatives_spanish:
  - un ángel del Señor
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «Lord» por su marco doctrinal, el proyecto español pide traducir יהוה / YHWH como «Yahvé»; aquí la construcción griega sin artículo y el contexto veterotestamentario apoyan esa referencia divina. Se evita «Señor» como máscara convencional para mantener trazabilidad del nombre divino.
- source_word: φαίνεται κατ’ ὄναρ
  english_pob_choice: appeared to Joseph in a dream
  chosen_spanish: apareció a José en sueños
  alternatives_spanish:
  - se le apareció a José en un sueño
  - apareció a José en un sueño
  lexicon: BDAG
  rationale: La expresión idiomática κατ’ ὄναρ se vierte con naturalidad como «en sueños». «Apareció» conserva el valor narrativo; la dative τῷ Ἰωσὴφ se integra de forma idiomática.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  lexicon: BDAG
  rationale: Participio introductorio de discurso directo; «diciendo» preserva la estructura griega sin recargar la frase.
- source_word: Ἐγερθεὶς
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte en pie
  - Alzate
  lexicon: BDAG
  rationale: Aunque formalmente es participio, aquí funciona como mandato secuencial. «Levántate» es el equivalente imperativo natural y claro en español.
- source_word: παράλαβε
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - toma contigo
  - recibe
  lexicon: BDAG
  rationale: El verbo implica tomar consigo; «toma» es conciso y suficiente en contexto, con el acompañamiento claro por el objeto directo y la secuencia narrativa.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: al niño
  alternatives_spanish:
  - al pequeño
  - al niño pequeño
  lexicon: BDAG
  rationale: En español, el acusativo personal de un objeto animado se expresa con «a». «Niño» comunica el diminutivo griego con naturalidad y evita sobreexplicación.
- source_word: τὴν μητέρα αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: y a su madre
  alternatives_spanish:
  - y a la madre de él
  lexicon: BDAG
  rationale: El posesivo se refiere al niño; «su madre» es claro y natural en español, preservando la relación sin repetir innecesariamente «del niño».
- source_word: φεῦγε εἰς Αἴγυπτον
  english_pob_choice: flee to Egypt
  chosen_spanish: huye a Egipto
  alternatives_spanish:
  - escapa a Egipto
  - ponte a salvo en Egipto
  lexicon: BDAG
  rationale: «Huye» preserva la urgencia y el peligro implícito en φεῦγε. «A Egipto» comunica dirección con naturalidad española.
- source_word: ἴσθι ἐκεῖ
  english_pob_choice: stay there
  chosen_spanish: quédate allí
  alternatives_spanish:
  - permanece allí
  - está allí
  lexicon: BDAG
  rationale: Aunque literalmente sería «sé allí», el valor idiomático es de permanencia. «Quédate allí» es la forma más clara y equivalente en español moderno.
- source_word: ἕως ἂν εἴπω σοι
  english_pob_choice: until I tell you
  chosen_spanish: hasta que yo te diga
  alternatives_spanish:
  - hasta que te hable
  - hasta que te lo diga
  lexicon: BDAG
  rationale: La construcción expresa un límite futuro indefinido. «Hasta que yo te diga» conserva la dependencia de la futura palabra divina sin introducir objetos no expresados.
- source_word: μέλλει γὰρ Ἡρῴδης ζητεῖν
  english_pob_choice: for Herod is about to seek
  chosen_spanish: porque Herodes está por buscar
  alternatives_spanish:
  - porque Herodes va a buscar
  - porque Herodes piensa buscar
  lexicon: BDAG
  rationale: μέλλει indica inminencia. «Está por buscar» conserva mejor la proximidad del acto que un futuro simple, y mantiene la tensión narrativa.
- source_word: τὸ παιδίον
  english_pob_choice: the child
  chosen_spanish: al niño
  alternatives_spanish:
  - al pequeño
  lexicon: BDAG
  rationale: Se mantiene la misma referencia concreta del verso, con el artículo y la preposición personal requeridos por el español.
- source_word: τοῦ ἀπολέσαι αὐτό
  english_pob_choice: in order to destroy him
  chosen_spanish: para destruirlo
  alternatives_spanish:
  - para matarlo
  - con el fin de destruirlo
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Destruirlo» conserva la amplitud léxica de ἀπόλλυμι, que en contexto implica muerte, sin reducirlo de entrada a una sola paráfrasis interpretativa.
theological_decisions:
- issue: Traducción de κυρίου en ἄγγελος κυρίου
  english_pob_reading: an angel of the Lord
  chosen_spanish_reading: un ángel de Yahvé
  alternative_spanish_readings:
  - un ángel del Señor
  rationale: En el texto griego la construcción no lleva artículo, pero la referencia al nombre divino se mantiene audible por el contexto bíblico. Dado el estándar español del proyecto para יהוה / YHWH, se traduce «Yahvé» en vez de ocultarlo tras «Señor»; así se preserva la trazabilidad del nombre divino sin alterar el contenido narrativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se ha revisado la elección de «ángel de Yahvé» frente a «ángel del Señor» para alinear la versión española con la política del proyecto sobre el nombre divino, sin perder la ambigüedad relativa del anartro griego. También se ha mantenido la fuerza de inminencia de μέλλω y el valor de propósito de τοῦ ἀπολέσαι αὐτό.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en la voz narrativa.
  - Se conserva «niño» para παιδίον y no se eleva a «hijo», porque el contexto no lo requiere.
  - «En sueños» expresa correctamente la locución idiomática griega.
  - Se evita una traducción mecánica de los participios imperativos; el español usa imperativos naturales.
  - La referencia pronominal de αὐτό se vierte como «lo», coherente con el antecedente «el niño».
