    text: Or 'the angel of the Lord.' The Greek lacks the article, but some readers may hear the phrase as a familiar biblical expression.
    reason: alternative_reading
  - marker: b
    text: Greek 'is about to seek,' expressing imminent intent.
    reason: lexical_alternative
  - marker: c
    text: Or 'to kill him.' The Greek says 'to destroy him,' here in the sense of causing his death.
    reason: lexical_alternative
