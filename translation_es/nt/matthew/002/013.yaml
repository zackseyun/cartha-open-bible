    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de notas para que cada marcador corresponda a la frase pertinente. Además, se mejora la naturalidad y precisión idiomática de φαίνεται κατ’ ὄναρ con «se le apareció a José en un sueño», y se aligera la apertura omitiendo el pronombre explícito innecesario.
