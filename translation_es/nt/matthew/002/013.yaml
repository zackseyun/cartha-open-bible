review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: el genitivo absoluto temporal, la aparición del ángel en sueño, la cadena de mandatos, la permanencia hasta nuevo aviso y el propósito homicida de Herodes. Sin embargo, hay dos puntos que conviene ajustar: (1) la nota [c] está anclada en «te diga», pero su contenido corresponde a «destruirlo»; esto rompe la disciplina de notas. (2) «apareció a José en sueños» es comprensible, pero «se le apareció a José en un sueño» representa mejor la construcción idiomática y evita una formulación menos natural en español contemporáneo.'
  spanish_quality_summary: El español es claro y mayormente digno y legible. «He aquí» funciona bien para ἰδού. «Levántate», «huye», «quédate allí» y «para destruirlo» son buenas decisiones. «Después de que ellos se fueron» suena algo menos pulido que «después de que se fueron», pero no es erróneo. La mejora principal es naturalidad idiomática en «se le apareció ... en un sueño» y corrección del anclaje de notas.
  glossary_alignment: 'La decisión «Yahvé» en «un ángel de Yahvé» es defendible dentro de la política española del proyecto, aunque el griego tiene κύριος y el rastro inglés usa «Lord». No requiere adjudicación mayor aquí porque el propio paquete documenta la excepción española. El resto del vocabulario clave queda alineado: παιδίον→«niño», φεῦγε→«huye», ἀπόλλυμι→«destruirlo» con nota alternativa «matarlo».'
  issues:
  - severity: high
    issue: La nota [c] está colocada sobre «te diga» pero explica «destruirlo / matarlo».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, induce a confusión y viola la disciplina requerida de marcadores.
  - severity: medium
    issue: «Apareció a José en sueños» es menos idiomático que «se le apareció a José en un sueño».
    rationale: κατ’ ὄναρ significa «en un sueño»; el singular refleja mejor el modismo del pasaje y «se le apareció» suena más natural en español eclesial general.
  - severity: low
    issue: «Después de que ellos se fueron» es algo pesado por el sujeto explícito.
    rationale: El español normalmente omite «ellos» aquí. No afecta fidelidad, pero puede pulirse para mejor fluidez.
