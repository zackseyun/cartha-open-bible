translation:
  language: es
  text: 'Y después de enviarlos a Belén, les dijo: «Vayan y busquen cuidadosamente al niño; y cuando lo encuentren, infórmenme, para que yo también vaya y lo adore[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le rinda homenaje» o «se postre ante él». El verbo griego puede denotar tanto adoración como un acto de reverencia ante una figura real.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμψας
  english_pob_choice: after sending
  chosen_spanish: y después de enviarlos
  alternatives_spanish:
  - habiéndolos enviado
  - después de mandarles
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa acción previa; «después de enviarlos» comunica bien la secuencia narrativa sin sonar forzado en español.
- source_word: εἰς Βηθλέεμ
  english_pob_choice: to Bethlehem
  chosen_spanish: a Belén
  alternatives_spanish:
  - hacia Belén
  - hasta Belén
  lexicon: BDAG
  rationale: La preposición εἰς marca dirección; en español natural se expresa con «a Belén».
- source_word: Πορευθέντες
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan por su camino
  - Vayan y
  lexicon: BDAG
  rationale: El participio funciona con fuerza imperativa junto con el mandato siguiente; «Vayan» preserva el tono directivo en español.
- source_word: ἐξετάσατε ἀκριβῶς
  english_pob_choice: search carefully
  chosen_spanish: busquen cuidadosamente
  alternatives_spanish:
  - investiguen con exactitud
  - examinen cuidadosamente
  - busquen diligentemente
  lexicon: BDAG
  rationale: La combinación verbal-adverbial pide una búsqueda/investigación minuciosa. «Busquen cuidadosamente» es claro, natural y mantiene el matiz de exactitud.
- source_word: περὶ τοῦ παιδίου
  english_pob_choice: for the child
  chosen_spanish: al niño
  alternatives_spanish:
  - acerca del niño
  - sobre el niño
  lexicon: BDAG
  rationale: En este contexto de búsqueda, περί introduce el objeto de la indagación. En español, «buscar al niño» expresa mejor ese sentido que «acerca del niño».
- source_word: παιδίου
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - niño pequeño
  - pequeño niño
  lexicon: BDAG
  rationale: παιδίον puede traducirse simplemente como «niño»; el contexto no exige una ampliación como «niño pequeño».
- source_word: ἐπὰν δὲ εὕρητε
  english_pob_choice: and when you find him
  chosen_spanish: y cuando lo encuentren
  alternatives_spanish:
  - y si lo encuentran
  - y una vez que lo encuentren
  lexicon: BDAG
  rationale: La construcción puede tener matiz condicional, pero en una instrucción narrativa el español natural usa «cuando» para la contingencia esperada.
- source_word: ἀπαγγείλατέ μοι
  english_pob_choice: report to me
  chosen_spanish: avísenme
  alternatives_spanish:
  - infórmenme
  - denme aviso
  lexicon: BDAG
  rationale: ἀπαγγέλλω implica llevar un informe o noticia de vuelta. «Avísenme» conserva la idea de notificación en un español sobrio y directo; la alternativa más explícita «infórmenme» queda disponible.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: La conjunción introduce propósito; «para que» es la forma más natural y precisa en este contexto.
- source_word: κἀγὼ
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  lexicon: BDAG
  rationale: La crasis enfatiza la participación de Herodes junto con los magos. «Yo también» reproduce ese énfasis de forma idiomática.
- source_word: προσκυνήσω αὐτῷ
  english_pob_choice: may come and worship him
  chosen_spanish: vaya y lo adore
  alternatives_spanish:
  - vaya y le rinda homenaje
  - vaya y se postre ante él
  - vaya y lo adore con reverencia
  lexicon: BDAG
  rationale: προσκυνέω puede referirse a homenaje reverente o a adoración. Dado el marco de Mateo y la opción de la POB inglesa, «adorar» preserva la tensión léxica y la posibilidad teológica sin cerrarla a una sola lectura social o cortesana.
theological_decisions:
- issue: Sentido de προσκυνήσω αὐτῷ respecto del niño Jesús
  english_pob_reading: worship him
  chosen_spanish_reading: lo adore
  alternative_spanish_readings:
  - le rinda homenaje
  - se postre ante él
  rationale: El verbo griego admite tanto reverencia ante una figura real como adoración. La POB inglesa opta por «worship», y en español «adorar» mantiene esa amplitud con el peso teológico que Mateo suele dar al verbo, sin negar la lectura de homenaje reverente.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios adicionales y el análisis cruzado mostró alto acuerdo; por eso esta propuesta sigue de cerca la auditoría inglesa y aplica equivalencias naturales en español sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no la requiere.
  - Se usa «adorar» para προσκυνέω, en continuidad con la decisión inglesa documentada; la nota preserva la alternativa de homenaje.
  - Se conserva el tiempo narrativo y el imperativo implícito del griego en un español fluido y publicable.
  - «Belén» y «niño» siguen el uso bíblico corriente y el contexto inmediato del pasaje.
