translation:
  language: es
  text: 'Y llegó y habitó en una ciudad llamada Nazaret[a], para que se cumpliera lo dicho por medio de los profetas: “Será llamado nazareno.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “nazoreo”. El trasfondo profético exacto de “será llamado nazareno” es debatido; Mateo puede estar resumiendo temas de los profetas más que citando un solo texto específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: he came
  chosen_spanish: y llegó
  alternatives_spanish:
  - y vino
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio aoristo previo al verbo principal expresa secuencia narrativa. En español, “llegó” con coordinación refleja bien el avance de la acción sin forzar una construcción más pesada como “habiendo llegado”.
- source_word: κατῴκησεν
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  - residió
  lexicon: BDAG
  rationale: κατοικέω indica tomar residencia. “Habitó” mantiene un tono digno y bíblico en español, y conserva mejor la idea de residencia que “vivió”, sin cargar excesivamente la permanencia como podría sugerir “se estableció”.
- source_word: εἰς πόλιν λεγομένην Ναζαρέτ
  english_pob_choice: in a city called Nazareth
  chosen_spanish: en una ciudad llamada Nazaret
  alternatives_spanish:
  - en un pueblo llamado Nazaret
  - hacia una ciudad llamada Nazaret
  lexicon: BDAG
  rationale: Aunque εἰς puede ser literalmente “a/into”, con κατοικέω el sentido natural en español es “en”. πόλις se traduce de forma directa por “ciudad”, manteniendo la correspondencia léxica del griego.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: La cláusula introduce finalidad en la fórmula de cumplimiento. “Para que” es la equivalencia natural y clara en español.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplido
  - llegara a cumplirse
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo en la fórmula mateana se expresa de modo idiomático con “se cumpliera”. Conserva el sentido de cumplimiento sin sonar mecánico.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo dicho
  alternatives_spanish:
  - lo que fue dicho
  - lo que se había dicho
  lexicon: BDAG
  rationale: La fórmula articular participial se naturaliza en español como “lo dicho”. Es breve, fiel y mantiene el carácter de enunciado profético.
- source_word: διὰ τῶν προφητῶν
  english_pob_choice: through the prophets
  chosen_spanish: por medio de los profetas
  alternatives_spanish:
  - a través de los profetas
  - por los profetas
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación/instrumentalidad. “Por medio de” conserva con claridad que Dios habló mediante los profetas, sin reducirlo a una simple autoría humana.
- source_word: Ναζωραῖος
  english_pob_choice: Nazarene
  chosen_spanish: nazareno
  alternatives_spanish:
  - nazoreo
  lexicon: BDAG
  rationale: En español, la forma establecida y comprensible es “nazareno”. “Nazoreo” preservaría más de cerca la forma griega, pero es menos natural y menos reconocible para lectores en español.
- source_word: κληθήσεται
  english_pob_choice: he will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω en fórmula profética se traduce naturalmente como “será llamado”, preservando la voz pasiva y el estilo de cita.
theological_decisions:
- issue: Origen profético plural y alusivo de la cita
  english_pob_reading: Render the formula straightforwardly as a plural-prophets summary citation without identifying a specific source in the main text.
  chosen_spanish_reading: Traducir la fórmula como una referencia resumida a los profetas, sin identificar en el texto principal una profecía única concreta.
  alternative_spanish_readings:
  - interpretar la cita como alusión a Isaías 11:1
  - presentarla como una síntesis temática del testimonio profético
  rationale: El griego dice explícitamente “por medio de los profetas” (plural). La traducción debe conservar esa amplitud y no cerrar indebidamente la referencia en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de Ναζωραῖος
  english_pob_reading: Nazarene
  chosen_spanish_reading: nazareno
  alternative_spanish_readings:
  - nazoreo
  rationale: La forma principal en español debe ser natural y comprensible. Al mismo tiempo, la nota conserva la alternativa más formal (“nazoreo”) para no ocultar la ambigüedad histórica y lexicográfica del término.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de SBLGNT y coincide con la lectura auditada del inglés POB en los puntos clave: secuencia narrativa con ἐλθὼν, residencia con κατῴκησεν, finalidad con ὅπως y fórmula de cumplimiento con ὅτι/κληθήσεται. No se detectaron revisiones aplicadas en el expediente inglés, y el control cruzado reportó alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del versículo porque no aparece en el texto fuente.
  - ‘Mesías’ no aparece en este versículo; no se introduce terminología cristológica adicional.
  - Se conservó el paralelismo con la fórmula mateana de cumplimiento sin añadir aclaraciones interpretativas al cuerpo del texto.
  - La nota al pie usa una única marca y preserva la alternativa léxica documentada en el expediente inglés.
