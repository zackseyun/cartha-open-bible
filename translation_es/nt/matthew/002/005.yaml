translation:
  language: es
  text: 'Y ellos le dijeron: «En Belén de Judea, porque así está escrito[a] por medio del profeta:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha sido escrito». El griego usa el perfecto pasivo, una fórmula estándar de cita bíblica.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Entonces ellos
  - Y respondieron
  lexicon: BDAG
  rationale: El artículo sustantivado señala a los interlocutores del versículo anterior; δέ aporta una continuidad leve. «Y ellos» conserva la conexión natural en español sin intensificar innecesariamente el contraste.
- source_word: εἶπαν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dijeron a él
  - le hablaron
  lexicon: BDAG
  rationale: λέγω con dativo se expresa con naturalidad como «le dijeron». Mantiene el valor simple de declaración dirigida a él.
- source_word: Ἐν Βηθλέεμ
  english_pob_choice: In Bethlehem
  chosen_spanish: En Belén
  alternatives_spanish:
  - En Betlehem
  lexicon: BDAG
  rationale: Se conserva el nombre bíblico usual en español, «Belén», que es plenamente reconocible y fiel al topónimo griego.
- source_word: τῆς Ἰουδαίας
  english_pob_choice: of Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - en Judea
  - de la Judea
  lexicon: BDAG
  rationale: El genitivo identifica cuál Belén se trata. «De Judea» refleja de cerca la construcción griega y mantiene la función identificadora.
- source_word: οὕτως γὰρ
  english_pob_choice: for thus
  chosen_spanish: porque así
  alternatives_spanish:
  - pues así
  - porque de este modo
  lexicon: BDAG
  rationale: γάρ introduce la razón de la respuesta, y οὕτως mira hacia la cita bíblica que sigue. «Porque así» comunica con claridad esa relación causal y anticipadora.
- source_word: γέγραπται
  english_pob_choice: it has been written
  chosen_spanish: ha sido escrito
  alternatives_spanish:
  - está escrito
  - está escrito y permanece
  lexicon: BDAG
  rationale: El perfecto pasivo de γράφω es una fórmula habitual de cita bíblica. «Ha sido escrito» conserva mejor la forma verbal griega que el más idiomático «está escrito», aunque este último sería una alternativa válida.
- source_word: διὰ τοῦ προφήτου
  english_pob_choice: through the prophet
  chosen_spanish: por medio del profeta
  alternatives_spanish:
  - por el profeta
  - a través del profeta
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación o agencia. «Por medio del profeta» mantiene la idea de mediación humana sin borrar que la escritura es de origen divino.
theological_decisions:
- issue: Mediación profética en la cita bíblica
  english_pob_reading: through the prophet
  chosen_spanish_reading: por medio del profeta
  alternative_spanish_readings:
  - por el profeta
  - a través del profeta
  rationale: La traducción conserva la mediación del profeta como instrumento de la palabra escrita, evitando reducir la formulación a una mera agencia humana. Esto refleja bien el valor de διά + genitivo y la estructura bíblica de la cita.
  doctrine_reference: Principio de mediación profética en la Escritura; traducción con primacía del texto original
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por ajustes menores de puntuación y de formulación: se prefirió mantener la cita continua con una pausa fuerte antes de la explicación causal, y se conservó la idea de «thus»/«so» como anticipación de la cita siguiente. La versión española refleja esa estructura con una coma interna y una explicación causal que sigue de inmediato.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «Mesías» para el título cuando corresponda; aquí no aparece.
  - «Belén» es el topónimo español estándar y no requiere transliteración.
  - La nota al pie marca la alternativa verbal del perfecto pasivo griego sin alterar la lectura principal.
  - Se mantiene «profeta» en singular, como en el griego, y se preserva la mediación con «por medio de».
