source:
  edition: SBLGNT
  text: Ὃς δ’ ἂν σκανδαλίσῃ ἕνα τῶν μικρῶν τούτων τῶν πιστευόντων εἰς ἐμέ, συμφέρει αὐτῷ ἵνα κρεμασθῇ μύλος ὀνικὸς ⸀εἰς τὸν τράχηλον αὐτοῦ καὶ καταποντισθῇ ἐν τῷ πελάγει τῆς θαλάσσης.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/006.yaml
  text: But whoever causes one of these little ones who believe in me to stumble[c][b][a], it is better for him that a donkey millstone be hung around his neck and that he be drowned in the open sea.
  footnotes:
  - marker: a
    text: Or 'causes one of these little ones who believe in me to sin.' The Greek verb can mean to cause someone to stumble, fall away, or sin.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a donkey millstone,' that is, a large millstone turned by a donkey.
    reason: cultural_note
  - marker: c
    text: Or 'in the depth of the sea.' The Greek more specifically refers to the open sea.
    reason: lexical_alternative
