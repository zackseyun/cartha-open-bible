translation:
  language: es
  text: Pero cualquiera que haga tropezar[a] a uno de estos pequeños[b] que creen en mí, mejor le sería que le colgaran al cuello una piedra de molino de asno[c] y que lo hundieran en mar abierto[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'haga pecar' o 'haga caer'. El verbo griego puede significar hacer tropezar, hacer caer o inducir al pecado.
    reason: lexical_alternative
  - marker: b
    text: O 'niños pequeños'. Aquí μικροί puede referirse no solo a la edad, sino también a los vulnerables o de poca consideración.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'piedra de molino de asno', es decir, una piedra grande de molino movida por un asno.
    reason: cultural_note
  - marker: d
    text: O 'en la profundidad del mar'. El griego se refiere más específicamente al mar abierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίσῃ
  english_pob_choice: causes ... to stumble
  chosen_spanish: haga tropezar
  alternatives_spanish:
  - haga caer en pecado
  - escandalice
  - haga caer
  lexicon: BDAG
  rationale: σκανδαλίζω conserva la imagen de hacer caer o tropezar; en español, 'hacer tropezar' mantiene el valor metafórico y es natural. 'Escandalice' suena más eclesiástico y puede oscurecer la idea física/metafórica del tropiezo.
- source_word: μικρῶν τούτων
  english_pob_choice: these little ones
  chosen_spanish: estos pequeños
  alternatives_spanish:
  - estos pequeños de edad
  - estos pequeñitos
  - estos humildes
  lexicon: BDAG
  rationale: El griego apunta a los pequeños/vulnerables, no necesariamente solo niños de edad. 'Estos pequeños' preserva esa amplitud sin restringir indebidamente el referente.
- source_word: τῶν πιστευόντων εἰς ἐμέ
  english_pob_choice: who believe in me
  chosen_spanish: que creen en mí
  alternatives_spanish:
  - que confían en mí
  - que tienen fe en mí
  lexicon: BDAG
  rationale: La construcción participial identifica a los pequeños como creyentes. 'Creen en mí' es la forma más directa y idiomática en español para πιστεύω εἰς con objeto personal.
- source_word: συμφέρει αὐτῷ
  english_pob_choice: it is better for him
  chosen_spanish: mejor le sería
  alternatives_spanish:
  - le sería más provechoso
  - le convendría más
  lexicon: BDAG
  rationale: συμφέρει expresa ventaja o beneficio; en este contexto de advertencia severa, 'mejor le sería' transmite el comparativo de forma natural y sobria.
- source_word: μύλος ὀνικός
  english_pob_choice: a donkey millstone
  chosen_spanish: una piedra de molino de asno
  alternatives_spanish:
  - una piedra de molino movida por asno
  - una gran piedra de molino
  - una piedra de molino asnal
  lexicon: BDAG
  rationale: ὀνικός especifica una piedra de molino asociada al asno, es decir, una piedra grande movida por asno. 'Piedra de molino de asno' conserva el rasgo lexical distintivo y mantiene un registro bíblico claro.
- source_word: εἰς τὸν τράχηλον αὐτοῦ
  english_pob_choice: around his neck
  chosen_spanish: al cuello
  alternatives_spanish:
  - alrededor de su cuello
  - sobre su cuello
  lexicon: BDAG
  rationale: Con la imagen de colgar, 'al cuello' en español comunica de forma idiomática la localización y evita una expresión demasiado pesada.
- source_word: καταποντισθῇ
  english_pob_choice: he be drowned
  chosen_spanish: lo hundieran
  alternatives_spanish:
  - lo ahogaran
  - lo sumergieran
  - lo sepultaran en el agua
  lexicon: BDAG
  rationale: El verbo describe ser arrojado/hundido en agua profunda. 'Lo hundieran' preserva la violencia del pasivo y permite mantener el paralelismo con la imagen anterior; 'ahogaran' explicita el resultado pero desplaza el foco del hundimiento al ahogo.
- source_word: ἐν τῷ πελάγει τῆς θαλάσσης
  english_pob_choice: in the open sea
  chosen_spanish: en lo profundo del mar
  alternatives_spanish:
  - en el mar abierto
  - en la profundidad del mar
  - en el mar abierto y profundo
  lexicon: BDAG
  rationale: πέλαγος refiere al mar abierto/profundo. 'En lo profundo del mar' comunica bien la severidad en español y mantiene la fuerza idiomática del pasaje; se conserva la tensión entre precisión léxica y estilo readable.
theological_decisions:
- issue: Alcance de 'estos pequeños'
  english_pob_reading: Rendered broadly as vulnerable believers rather than restricting the phrase to children alone.
  chosen_spanish_reading: Se traduce de forma amplia como 'estos pequeños' que creen en mí, sin limitarlo solo a niños.
  alternative_spanish_readings:
  - estos niños que creen en mí
  - estos discípulos pequeños
  rationale: El contexto inmediato usa un niño como ilustración, pero la cláusula 'que creen en mí' amplía el referente hacia creyentes vulnerables o humildes. La traducción preserva esa amplitud sin resolver la tensión interpretativa.
  doctrine_reference: Preservar la tensión exegética en lugar de cerrarla prematuramente.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del texto inglés POB, que ajustó 'donkey-driven millstone' a 'donkey millstone' para hacer más literal y natural μύλος ὀνικός. En español se preserva esa especificidad con 'piedra de molino de asno' y se mantiene la imagen severa de hundimiento en el mar abierto/profundo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no corresponde aquí porque el texto no contiene el nombre divino.
  - Se mantiene 'creen en mí' para πιστεύουσιν εἰς ἐμέ, siguiendo un uso bíblico natural en español.
  - '''Hacer tropezar'' conserva el matiz metafórico sin reemplazarlo por una lectura doctrinal más cerrada como ''hacer pecar''.'
  - '''Lo profundo del mar'' mantiene una equivalencia funcional con ''open sea'' evitando la tradición de ''profundidad del mar'' como mera fórmula si no fuera necesaria.'
