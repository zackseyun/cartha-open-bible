translation:
  language: es
  text: Entonces el amo de aquel esclavo, movido[a] a compasión, lo dejó ir y le perdonó la deuda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conmovido», «movido de compasión» o «lleno de compasión». El griego expresa una compasión profunda y visceral.
    reason: lexical_alternative
  - marker: b
    text: O «el préstamo». El griego δάνειον puede denotar más específicamente un préstamo o algo prestado, pero en este contexto la idea de deuda es la más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπλαγχνισθεὶς
  english_pob_choice: moved with compassion
  chosen_spanish: movido a compasión
  alternatives_spanish:
  - conmovido
  - movido de compasión
  - lleno de compasión
  lexicon: BDAG
  rationale: El participio aoristo pasivo de σπλαγχνίζομαι expresa una compasión profunda. «Movido a compasión» mantiene el matiz de emoción interna y es natural en español, sin debilitarlo a un simple «tener compasión».
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - maestro
  - dueño
  lexicon: BDAG
  rationale: En esta parábola el referente es humano, no divino. En español, «señor» conserva mejor la correspondencia léxica con κύριος que «amo», y evita una calca demasiado dura; el contexto de posesión queda reforzado por «esclavo».
- source_word: δοῦλου
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - sirviente
  lexicon: BDAG
  rationale: Se mantiene «esclavo» porque el contexto de propiedad y deuda es socialmente concreto y no conviene suavizarlo a «siervo».
- source_word: ἀπέλυσεν αὐτόν
  english_pob_choice: released him
  chosen_spanish: lo soltó
  alternatives_spanish:
  - lo dejó ir
  - lo liberó
  - lo despidió
  lexicon: BDAG
  rationale: ἀπολύω puede significar soltar, dejar ir o liberar. «Lo soltó» funciona de manera natural en español y comunica la acción inmediata de dejarlo ir sin introducir más de lo que el contexto exige.
- source_word: τὸ δάνειον
  english_pob_choice: the debt
  chosen_spanish: la deuda
  alternatives_spanish:
  - el préstamo
  - el crédito
  - lo prestado
  lexicon: BDAG
  rationale: Aunque δάνειον puede referirse más específicamente a un préstamo, el contexto de remisión en la parábola hace que «deuda» sea la opción más transparente en español, como en la revisión final inglesa.
- source_word: ἀφῆκεν αὐτῷ
  english_pob_choice: forgave him
  chosen_spanish: le perdonó
  alternatives_spanish:
  - se la canceló
  - le remitió
  - le condonó
  lexicon: BDAG
  rationale: ἀφίημι admite la idea de perdonar, remitir o cancelar. Dado que el objeto es una obligación financiera dentro de la parábola, «le perdonó la deuda» preserva la carga teológica y la imagen jurídica de la remisión.
theological_decisions:
- issue: Posible sobrelectura de κύριος como título divino
  english_pob_reading: Rendered as lowercase 'master' referring to the human master in the parable
  chosen_spanish_reading: «señor» en sentido humano, no como título divino
  alternative_spanish_readings:
  - amo
  - Señor
  rationale: El personaje es el dueño humano del esclavo dentro de la parábola. «Señor» en minúscula mantiene la ambigüedad léxica de κύριος sin convertirlo en un título divino; el contexto narrativo aclara la referencia.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Tratamiento de δοῦλος en un registro socialmente concreto
  english_pob_reading: Translated as 'slave'
  chosen_spanish_reading: «esclavo»
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La relación de propiedad y autoridad es relevante para la parábola. «Esclavo» conserva esa fuerza social y evita suavizar la tensión ética del término.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del contexto inglés: se evita «señor» con mayúscula o una formulación que sugiera un título divino; también se prefiere «deuda» en vez de «préstamo» por la revisión más reciente del audit trail, aunque se conserva la nota lexical sobre el valor específico de δάνειον. La elección de «esclavo» responde al criterio doctrinal del proyecto y no a una suavización eclesiástica.'
  spanish_consistency_notes:
  - Se mantiene el trato narrativo en tercera persona con un pasado simple natural en español.
  - Se evita «Cristo» o cualquier terminología cristológica ajena al versículo.
  - La puntuación sigue el español moderno con comas para aislar el participio de circunstancia.
  - «Señor» se usa en minúscula para reflejar un referente humano dentro de la parábola.
  - «Esclavo» y «deuda» preservan la concreción social y económica del pasaje.
