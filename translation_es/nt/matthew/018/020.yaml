translation:
  language: es
  text: Porque donde dos o tres están reunidos en mi nombre[a], allí estoy yo en medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘entre ellos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - dondequiera que
  lexicon: BDAG
  rationale: Introduce una cláusula locativa natural en español. 'Donde' conserva la relación correlativa 'donde ... allí' sin ampliar indebidamente el alcance como haría 'dondequiera que'.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La función explicativa de γάρ se expresa con claridad en español mediante 'porque'. Mantiene la conexión discursiva con el contexto inmediato sin sonar rígido.
- source_word: δύο ἢ τρεῖς
  english_pob_choice: two or three
  chosen_spanish: dos o tres
  alternatives_spanish:
  - dos o tres personas
  lexicon: BDAG
  rationale: Número directo y formalmente equivalente. No se añade 'personas' porque el griego tampoco lo explicita.
- source_word: συνηγμένοι
  english_pob_choice: are gathered
  chosen_spanish: están reunidos
  alternatives_spanish:
  - han sido reunidos
  - están congregados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante de haber sido juntados. 'Están reunidos' comunica bien ese estado en español natural, sin volverlo demasiado interpretativo.
- source_word: εἰς τὸ ἐμὸν ὄνομα
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - para mi nombre
  - bajo mi nombre
  lexicon: BDAG
  rationale: La expresión es idiomática y en español se dice de forma natural 'en mi nombre'. Conserva la referencia a la autoridad, pertenencia y orientación hacia Jesús sin calcar 'hacia' o 'dentro de'.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: BDAG
  rationale: Correlato locativo de 'donde'. 'Allí' mantiene la estructura griega 'donde ... allí' con estilo claro y solemne.
- source_word: εἰμι
  english_pob_choice: I am
  chosen_spanish: estoy
  alternatives_spanish:
  - soy
  - estoy presente
  lexicon: BDAG
  rationale: En español, para una presencia localizada, 'estoy' resulta más idiomático que un simple 'soy'. Evita sobreinterpretar con 'estoy presente', que explicita más de lo que el griego dice.
- source_word: ἐν μέσῳ αὐτῶν
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en medio de su medio
  - entre ellos
  lexicon: BDAG
  rationale: La imagen espacial del griego se conserva con 'en medio de ellos'. 'Entre ellos' también es posible, pero 'en medio de ellos' refleja mejor el valor de μέσῳ y la elección inglesa de 'in their midst'.
theological_decisions:
- issue: Presencia de Jesús con los discípulos reunidos
  english_pob_reading: The verse states Jesus' real presence with those gathered in his name, without defining a denominational mode of presence.
  chosen_spanish_reading: El versículo afirma la presencia real de Jesús con quienes están reunidos en su nombre, sin precisar el modo teológico de esa presencia.
  alternative_spanish_readings:
  - Jesús está presente de manera sacramental
  - Jesús solo está espiritualmente con ellos
  rationale: La traducción debe afirmar lo que el texto afirma y no añadir una teoría eclesiológica o sacramental que el griego no especifica. 'En medio de ellos' conserva la afirmación de cercanía/presencia sin fijar el modo.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Relación entre la reunión y el nombre de Jesús
  english_pob_reading: '''in my name'' indicates reference to, authority of, or allegiance to Jesus'' name.'
  chosen_spanish_reading: '''en mi nombre'' conserva la idea de referencia, autoridad y lealtad a Jesús sin desglosarla en la línea principal.'
  alternative_spanish_readings:
  - bajo mi autoridad
  - por causa de mi nombre
  rationale: El español 'en mi nombre' ya lleva la carga idiomática necesaria. Desarrollarlo en el texto principal haría la línea más interpretativa de lo que permite el griego; esa explicación queda mejor para nota si se necesita.
  doctrine_reference: Affirmations; lexical note on idiom
- issue: Modo de reunión expresado por el participio perfecto pasivo
  english_pob_reading: '''are gathered'' preserves the resultant state of having been brought together.'
  chosen_spanish_reading: '''están reunidos'' expresa el estado resultante sin forzar una voz verbal más analítica.'
  alternative_spanish_readings:
  - han sido reunidos
  - se han reunido
  rationale: El pasivo resultativo del griego no obliga a una construcción pasiva en español. 'Están reunidos' es fiel al estado descrito y suena natural; 'se han reunido' sugeriría más iniciativa de los sujetos que el pasivo griego.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; por eso la versión española se mantiene sobria, sin introducir variantes no atestiguadas. La principal decisión fue conservar la correlación locativa 'donde ... allí' y el modismo 'en mi nombre' con una sintaxis española natural.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'Jesús' implícito mediante el posesivo 'mi' y el contexto; no se añade 'Cristo' porque el texto fuente no lo exige.
  - '''en medio de ellos'' conserva la imagen espacial sin sustituirla por una formulación doctrinal.'
  - El pie de nota a cubre la alternativa semántica documentada por el audit trail inglés ('among them').
