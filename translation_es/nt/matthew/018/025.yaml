    changes_summary: Changed 'had nothing to repay' to 'was unable to repay' to reflect μὴ ἔχοντος ... ἀποδοῦναι more accurately. Changed 'the lord' to 'the master' for more natural contextual sense in the parable while preserving κύριος.
translation:
  language: es
  text: Pero como no podía pagar, el amo[a] ordenó que fuera vendido, junto con su esposa y sus hijos y todo lo que tenía[b], y que se hiciera el pago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el señor». El griego κύριος puede significar «señor» o «amo» según el contexto; aquí designa al superior humano del esclavo en la parábola.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, él y su familia iban a ser vendidos y sus bienes liquidados para poder cubrir la deuda.
    reason: cultural_note
lexical_decisions:
- source_word: μὴ ἔχοντος δὲ αὐτοῦ ἀποδοῦναι
  english_pob_choice: But since he was unable to repay
  chosen_spanish: Pero como no podía pagar
  alternatives_spanish:
  - Pero como no tenía con qué pagar
  - Pero ya que no podía devolver la deuda
  lexicon: BDAG
  rationale: 'La construcción de genitivo absoluto expresa la circunstancia causal: al no tener posibilidad de devolver lo debido. En español, "no podía pagar" comunica de forma natural la incapacidad para saldar la deuda sin forzar una calca.'
- source_word: ἀποδοῦναι
  english_pob_choice: to repay
  chosen_spanish: pagar
  alternatives_spanish:
  - pagar de vuelta
  - reembolsar
  lexicon: BDAG
  rationale: Aquí ἀποδίδωμι se refiere al pago de una deuda. "Pagar" es la opción más natural en español; la idea de devolución queda implícita por el contexto de deuda.
- source_word: ἐκέλευσεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden
  lexicon: BDAG
  rationale: κελεύω implica una orden con autoridad. "Ordenó" conserva bien ese valor y es claro en español actual.
- source_word: ὁ κύριος
  english_pob_choice: the master
  chosen_spanish: el amo
  alternatives_spanish:
  - el señor
  - el patrón
  lexicon: BDAG
  rationale: En la parábola κύριος designa al superior humano del esclavo; por eso se evita "Señor" como título divino. "Amo" conserva la relación de autoridad y el trasfondo social del pasaje.
- source_word: πραθῆναι
  english_pob_choice: that he be sold
  chosen_spanish: que fuera vendido
  alternatives_spanish:
  - que lo vendieran
  - que fuese vendido
  lexicon: BDAG
  rationale: El infinitivo pasivo se vierte como una subordinada de contenido en español. "Fuera vendido" refleja bien la pasividad del sujeto y mantiene el sentido de venta forzada.
- source_word: τὴν γυναῖκα
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - la esposa
  lexicon: BDAG
  rationale: El artículo griego no lleva posesivo explícito, pero el referente es claramente la esposa del deudor. "Esposa" ofrece un registro más digno y claro que "mujer" en este contexto.
- source_word: τὰ τέκνα
  english_pob_choice: children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - los hijos
  - sus niños
  lexicon: BDAG
  rationale: τέκνα significa hijos/niños. En este contexto familiar, "sus hijos" comunica con claridad que pertenecen al deudor; se evita una traducción genérica que suene menos precisa.
- source_word: πάντα ὅσα ἔχει
  english_pob_choice: all that he had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todo cuanto poseía
  - todas sus posesiones
  lexicon: BDAG
  rationale: La frase denota la totalidad de sus bienes. "Todo lo que tenía" sigue de cerca el griego y suena natural en español, sin añadir de manera explícita "posesiones".
- source_word: καὶ ἀποδοθῆναι
  english_pob_choice: and that payment be made
  chosen_spanish: y que se hiciera el pago
  alternatives_spanish:
  - y que se efectuara el pago
  - y que se pagara
  lexicon: BDAG
  rationale: 'La pasiva infinitiva final retoma el objetivo de la venta: obtener el pago de la deuda. "Se hiciera el pago" mantiene la impersonalidad y evita introducir un objeto no expresado en el griego.'
theological_decisions:
- issue: κόστος social y valor de κύριος en una parábola
  english_pob_reading: the master
  chosen_spanish_reading: el amo
  alternative_spanish_readings:
  - el señor
  - el patrón
  rationale: Se evita cualquier lectura cristológica o divina de κύριος porque el contexto narrativo muestra a un superior humano del esclavo. "Amo" conserva la jerarquía social y el sentido del relato.
  doctrine_reference: 'DOCTRINE.md: términos contestados / uso contextual de κύριος en parábolas'
- issue: Venta de la esposa, los hijos y los bienes como medio de pago
  english_pob_reading: he and his family were to be sold and his possessions liquidated in order to make repayment
  chosen_spanish_reading: que fuera vendido, junto con su esposa y sus hijos y todo lo que tenía, y que se hiciera el pago
  alternative_spanish_readings:
  - que lo vendieran con su familia y sus bienes para pagar la deuda
  - que él, su familia y todo lo suyo fueran vendidos para saldar
  rationale: 'La frase conserva la dureza jurídica y social del texto: la venta de la familia y de los bienes tiene como fin la satisfacción de la deuda. No se suaviza la violencia del escenario narrativo.'
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima, preservación del contexto socioeconómico'
translation_notes:
  revision_awareness: 'El borrador sigue el ajuste final del audit trail inglés: se traduce μὴ ἔχοντος ... ἀποδοῦναι con una expresión natural de incapacidad para pagar, y κύριος con un término contextual no divino. También se conserva la escena de venta forzada y el propósito de pago final sin añadir elementos ajenos al griego.'
  spanish_consistency_notes:
  - Se mantuvo un registro neutro y publicable, evitando calcos como «devolver» para ἀποδοῦναι en español corriente.
  - Se prefirió «amo» a «señor» para no oscurecer el valor contextual de κύριος en la parábola.
  - Se usó «esposa» y «sus hijos» para una lectura clara y digna en español, sin perder la referencia familiar del texto.
  - Las notas [a] y [b] aparecen exactamente en el texto base y están ancladas a las expresiones con ambigüedad lexical/cultural.
