source:
  edition: SBLGNT
  text: μὴ ἔχοντος δὲ αὐτοῦ ἀποδοῦναι ἐκέλευσεν αὐτὸν ὁ ⸀κύριος πραθῆναι καὶ τὴν ⸀γυναῖκα καὶ τὰ τέκνα καὶ πάντα ὅσα ⸀ἔχει καὶ ἀποδοθῆναι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/025.yaml
  text: But since he was unable to repay[a], the master ordered that he be sold, along with his wife and children and all that he had[b], and that payment be made.
  footnotes:
  - marker: a
    text: Or 'the master.' Greek κύριος can mean 'lord' or 'master' depending on context; here it refers to the servant’s human superior in the parable.
    reason: lexical_alternative
  - marker: b
    text: That is, he and his family were to be sold and his possessions liquidated in order to make repayment.
    reason: cultural_note
  ai_draft:
    model_id: gpt-5.4
