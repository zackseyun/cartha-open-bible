translation:
  language: es
  text: Entonces, enojado, su amo lo entregó a los torturadores[a] hasta que pagara todo lo que debía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tormentadores» o, menos fuerte, «carceleros». El término griego se refiere a quienes infligen tormento, no solo a guardias comunes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργισθεὶς
  english_pob_choice: in anger
  chosen_spanish: airado
  alternatives_spanish:
  - enojado
  - iracundo
  - estando airado
  lexicon: BDAG
  rationale: El participio aoristo de ὀργίζομαι funciona de manera adverbial antes del verbo principal. «Airado» conserva el tono emocional y la relación causal sin recargar la frase; «estando airado» sería más explícito pero menos natural en español.
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su señor y dueño
  - el Señor
  lexicon: BDAG
  rationale: En la parábola, κύριος designa al superior humano del esclavo, no un título divino directo. «Su señor» mantiene la relación narrativa y evita imponer «el Señor» donde el contexto no lo exige.
- source_word: παρέδωκεν
  english_pob_choice: handed ... over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo entregó en manos de
  - lo pasó a
  - lo puso bajo
  lexicon: BDAG
  rationale: παραδίδωμι aquí expresa ceder a alguien al control de otros. «Lo entregó» es natural en español y conserva la fuerza judicial/punitiva del acto.
- source_word: βασανισταῖς
  english_pob_choice: the torturers
  chosen_spanish: a los torturadores
  alternatives_spanish:
  - a los tormentadores
  - a los carceleros
  - a los verdugos
  lexicon: BDAG
  rationale: βασανιστής designa a quienes infligen tormento, no solo guardias de prisión. «Torturadores» preserva la severidad del término; «carceleros» la atenúa demasiado.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: BDAG
  rationale: La construcción temporal se expresa de forma natural con «hasta que» en español, manteniendo el sentido prospectivo.
- source_word: ἀποδῷ
  english_pob_choice: he should pay
  chosen_spanish: pagara
  alternatives_spanish:
  - pagase
  - pague
  - hubiera pagado
  lexicon: BDAG
  rationale: El aoristo subjuntivo después de ἕως οὗ marca una meta futura/esperada. En español, el imperfecto de subjuntivo en la cláusula temporal («hasta que pagara») transmite bien esa expectativa sin sonar arcaico.
- source_word: πᾶν τὸ ὀφειλόμενον
  english_pob_choice: all that was owed
  chosen_spanish: todo lo que debía
  alternatives_spanish:
  - toda la deuda
  - todo lo debido
  - todo lo que se le debía
  lexicon: BDAG
  rationale: La expresión participial significa literalmente «todo lo que estaba siendo debido/lo debido». «Todo lo que debía» mantiene la noción de obligación sin introducir «deuda» como término técnico donde el griego es más amplio.
theological_decisions:
- issue: 'κύριος en un contexto parabólico: título divino o dueño humano'
  english_pob_reading: master
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - el Señor
  - su amo
  rationale: La POB inglesa evita el título cristológico en la línea principal porque el referente inmediato es el superior humano del siervo dentro de la parábola. «Su señor» preserva esa lectura, sin borrar que el lector pueda advertir la resonancia más amplia del término.
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος), Translation philosophy points 1 y 5'
- issue: 'βασανισταῖς en contexto de castigo: intensidad del término'
  english_pob_reading: torturers
  chosen_spanish_reading: torturadores
  alternative_spanish_readings:
  - tormentadores
  - carceleros
  rationale: El griego apunta a quienes causan tormento, no a funcionarios carcelarios genéricos. «Torturadores» conserva la aspereza del juicio narrado y evita suavizar la escena.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se reportaron cambios necesarios y el cotejo externo mostró alto acuerdo con la lectura actual. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantuvo «señor» para κύριος en lugar de «Señor» mayúsculo, porque el referente es el amo humano en la parábola.
  - Se eligió «torturadores» para βασανισταῖς para preservar la fuerza punitiva del término.
  - «Todo lo que debía» evita rigidizar la frase con «deuda» y conserva la amplitud semántica del participio ὀφειλόμενον.
  - La puntuación y el orden siguen un español natural sin perder la secuencia causal y temporal del griego.
