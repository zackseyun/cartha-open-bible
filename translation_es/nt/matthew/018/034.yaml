review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en su estructura básica: ὀργισθεὶς = estado de enojo, παρέδωκεν = lo entregó, βασανισταῖς = torturadores, ἕως οὗ ἀποδῷ = hasta que pagara, πᾶν τὸ ὀφειλόμενον = todo lo que debía. Sin embargo, κύριος aquí se refiere al amo humano de la parábola, y la línea principal española «su señor» no refleja con suficiente claridad la decisión auditada de evitar un matiz titular/divino; «su amo» o «su dueño» sería más fiel al sentido contextual documentado.'
  spanish_quality_summary: 'El español es claro, pero «Y airado» suena algo rígido y literario en forma poco natural para registro bíblico moderno; «Entonces, enojado» o «Y, enojado,» fluye mejor. Además, la nota al pie entra en tensión con el texto principal: dice que por eso se traduce «su señor» cuando precisamente la alternativa documentada es «señor» y la elección contextual inglesa es «master». Conviene armonizar texto y nota.'
  glossary_alignment: No hay conflicto con glosario mayor salvo el manejo de κύριος. Dado que no se refiere a Dios/Jesús, no debe forzarse «Señor». En español, «amo» alinea mejor con la racionalidad lexical y teológica auditada que «señor». «Torturadores» está bien y preserva la fuerza de βασανισταῖς.
  issues:
  - severity: medium
    issue: «su señor» para κύριος en la línea principal
    rationale: Aunque posible en español, aquí introduce una ambigüedad innecesaria con el título «Señor». El expediente inglés eligió deliberadamente «master» para evitar ese efecto en la parábola. «Su amo» comunica mejor la relación narrativa.
  - severity: low
    issue: Frase inicial «Y airado» poco natural
    rationale: No es incorrecta, pero suena más forzada que el equivalente natural español de un participio adverbial. «Entonces, enojado» mantiene el sentido y mejora la legibilidad.
  - severity: medium
    issue: Nota al pie desalineada con la decisión principal
    rationale: La nota actual presenta «señor» como alternativa pero el texto principal también usa «señor», lo que invalida la función explicativa de la nota. Debe indicar como alternativa «señor» mientras el texto principal use «amo».
  revised_spanish_text: Entonces, enojado, su amo lo entregó a los torturadores[a] hasta que pagara todo lo que debía.
  revised_footnotes:
  - marker: a
    text: O «tormentadores» o, menos fuerte, «carceleros». El término griego se refiere a quienes infligen tormento, no solo a guardias comunes.
    reason: lexical_alternative
  revision_rationale: Se ajusta κύριος a «amo» para reflejar mejor el referente humano dentro de la parábola y evitar resonancia titular innecesaria. Se mejora la naturalidad de ὀργισθεὶς con «Entonces, enojado». Se conserva «torturadores» por fidelidad a βασανισταῖς y se preserva la alternativa léxica documentada en nota. La nota sobre κύριος puede omitirse en español si el texto principal ya resuelve claramente la ambigüedad contextual.
