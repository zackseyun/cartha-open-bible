revisions:
- from: Y airado, su señor lo entregó a los torturadores[a] hasta que pagara todo lo que debía.
  to: Entonces, enojado, su amo lo entregó a los torturadores[a] hasta que pagara todo lo que debía.
  rationale: Se ajusta κύριος a «amo» para reflejar mejor el referente humano dentro de la parábola y evitar resonancia titular innecesaria. Se mejora la naturalidad de ὀργισθεὶς con «Entonces, enojado». Se conserva «torturadores» por fidelidad a βασανισταῖς y se preserva la alternativa léxica documentada en nota. La nota sobre κύριος puede omitirse en español si el texto principal ya resuelve claramente la ambigüedad contextual.
