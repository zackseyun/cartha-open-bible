revisions:
- from: ¿No debías tú también haber tenido misericordia de tu consiervo[a], así como yo también tuve misericordia de ti?
  to: ¿No debías tú también haber tenido misericordia de tu compañero esclavo[a], así como yo también tuve misericordia de ti?
  rationale: Se revisa únicamente σύνδουλος para alinearlo con la decisión lexical y teológica documentada por el POB de preservar la fuerza de δοῦλος como «slave» en este contexto. «Compañero esclavo» es más claro y ampliamente entendible que «coesclavo», y evita el suavizamiento de «consiervo», mientras mantiene la idea del prefijo σύν- mediante «compañero». El resto del versículo puede mantenerse.
