translation:
  language: es
  text: ¿No debías tú también haber tenido misericordia de tu compañero esclavo[a], así como yo también tuve misericordia de ti?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu consiervo» o «tu compañero de servicio». El griego σύνδουλος se refiere a uno que comparte el mismo señor; «compañero esclavo» se usa aquí para conservar el sentido de condición servil en esta parábola.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ ἔδει
  english_pob_choice: Should ... not have
  chosen_spanish: ¿No debías tú también haber... ?
  alternatives_spanish:
  - ¿No era necesario que también tú... ?
  - ¿No tenías que también tú... ?
  lexicon: BDAG
  rationale: El griego impersonal ἔδει expresa obligación o necesidad moral en una pregunta de reprensión. En español, «debías» comunica esa obligación de forma natural y mantiene el tono de reproche sin volverse pesado o mecánico.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - inclusive
  - además
  lexicon: BDAG
  rationale: καί añade correspondencia entre la acción esperada del siervo y la acción previa del rey. «También» conserva ese paralelismo de manera directa y fluida en español.
- source_word: ἐλεῆσαι / ἠλέησα
  english_pob_choice: had mercy on / had mercy on
  chosen_spanish: haber tenido misericordia / tuve misericordia
  alternatives_spanish:
  - haber mostrado misericordia / mostré misericordia
  - haber compadecido / me compadecí
  lexicon: BDAG
  rationale: Mantengo la misma raíz semántica en ambas formas para conservar la repetición del verbo ἐλεάω. «Tener misericordia» es natural en español bíblico actual y transmite mejor el peso ético del término que «compadecerse» en este contexto.
- source_word: τὸν σύνδουλόν σου
  english_pob_choice: your fellow slave
  chosen_spanish: tu consiervo[a]
  alternatives_spanish:
  - tu consiervo
  - tu fellow servant
  - tu compañero esclavo
  lexicon: BDAG
  rationale: σύνδουλος designa a alguien que comparte el mismo señor; en español, «consiervo» comunica esa relación compartida de manera idiomática. Aunque el audit trail inglés preserva «slave» para resaltar el vínculo de dependencia, en español «esclavo» aquí sonaría menos natural; «consiervo» conserva la idea de co-pertenencia al mismo amo y evita una dureza innecesaria en la forma, sin borrar la relación servil del contexto parabólico.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: ὡς marca comparación directa entre la misericordia esperada y la ya recibida. «Así como» reproduce bien el paralelismo y suena plenamente natural en español.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  lexicon: BDAG
  rationale: κἀγώ (= καὶ ἐγώ) incluye explícitamente al hablante en la comparación. «Yo también» mantiene esa inclusión y el equilibrio retórico con el «también» anterior.
theological_decisions:
- issue: Término de parentesco/estatus para σύνδουλος en una parábola de deuda y autoridad
  english_pob_reading: fellow slave
  chosen_spanish_reading: consiervo
  alternative_spanish_readings:
  - esclavo compañero
  - compañero esclavo
  - siervo
  rationale: El inglés POB eligió «fellow slave» para preservar la fuerza del vínculo de dependencia en la parábola. En español, «consiervo» mantiene la idea de compartir el mismo señor, que es el rasgo teológicamente relevante del contexto. «Siervo» suavizaría demasiado el término y perdería parte de la tensión del pasaje; «esclavo» sería semánticamente posible pero menos idiomático en español bíblico actual.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested δοῦλος terminology
- issue: Repetición verbal de ἐλεέω como elemento de acusación moral
  english_pob_reading: had mercy on / had mercy on
  chosen_spanish_reading: haber tenido misericordia / tuve misericordia
  alternative_spanish_readings:
  - haber mostrado misericordia / mostré misericordia
  - haber compasión / tuve compasión
  rationale: 'La repetición del mismo verbo refuerza la acusación: el siervo debía responder con la misma misericordia que recibió. Mantener «misericordia» en ambas cláusulas preserva esa tensión lexical y teológica. «Compasión» es cercana, pero «misericordia» es más exacta para el intercambio de perdón y clemencia del pasaje.'
  doctrine_reference: Lexical consistency principle; parable context in Matthew 18
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al conservar la repetición de ἐλεάω con una formulación española natural de misericordia. También refleja la decisión del POB inglés de mantener el matiz de dependencia en σύνδουλος, aunque en español se resuelva con «consiervo» por idiomaticidad y claridad.
  spanish_consistency_notes:
  - He usado «misericordia» de manera uniforme para ἐλεῆσαι e ἠλέησα, evitando alternar con «compasión» para no diluir la repetición.
  - He preferido «consiervo» frente a «siervo» porque el contexto exige una relación compartida bajo el mismo amo.
  - La estructura interrogativa reproduce la reprensión implícita del griego sin añadir explicaciones interpretativas.
  - No se ha usado «Señor» como sustituto de ningún término del texto, ya que aquí no aparece el nombre divino ni κύριος.
