translation:
  language: es
  text: Pues el Hijo[a] del Hombre vino a salvar a los perdidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos (incluidos Sinaiticus y Vaticanus del siglo IV) y en traducciones coptas tempranas, pero está presente en el Códice Bezae del siglo V, en la mayoría bizantina y en la Vulgata latina. Probablemente fue añadido más tarde por escribas para armonizarlo con Lucas 19:10.
    reason: textual_variant
lexical_decisions:
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo humano
  lexicon: BDAG
  rationale: La expresión es el título cristológico tradicional y directo para el griego, y en español 'Hijo del Hombre' conserva la fórmula establecida sin perder la referencia al título.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - librar
  lexicon: BDAG
  rationale: '''Salvar'' expresa de manera natural y fiel la acción soteriológica del verbo en este contexto, manteniendo la amplitud de rescate espiritual sin añadir paráfrasis.'
- source_word: τὸ ἀπολωλός
  english_pob_choice: the lost
  chosen_spanish: los perdidos
  alternatives_spanish:
  - lo perdido
  - los que estaban perdidos
  - lo que estaba perdido
  lexicon: BDAG
  rationale: El participio neutro singular funciona sustantivamente como colectivo; en español, 'los perdidos' comunica de forma natural ese grupo de personas en estado de perdición o extravío, conservando el valor sustantivado.
theological_decisions:
- issue: Alcance de 'the lost' como colectivo soteriológico
  english_pob_reading: the lost
  chosen_spanish_reading: los perdidos
  alternative_spanish_readings:
  - lo perdido
  - los que estaban perdidos
  rationale: La lectura inglesa toma ἀπολωλός como sustantivo colectivo. En español, 'los perdidos' preserva esa fuerza colectiva y humana mejor que una abstracción neutra, sin debilitar la tensión entre ruina y necesidad de salvación.
  doctrine_reference: Soteriología; condición humana caída y necesidad de salvación
translation_notes:
  revision_awareness: El inglés POB mantiene una decisión estable y sin revisiones en este pasaje; la redacción española sigue de cerca esa lectura, con adaptación idiomática mínima y sin introducir contenido adicional.
  spanish_consistency_notes:
  - Se mantuvo 'Hijo del Hombre' como forma cristológica estable y reconocible.
  - Se eligió 'salvar' para σῴζω por su naturalidad bíblica en español y su fidelidad soteriológica.
  - '''Los perdidos'' preserva el sustantivo colectivo implícito en el participio neutro griego.'
