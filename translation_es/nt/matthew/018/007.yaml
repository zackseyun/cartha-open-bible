  text: οὐαὶ τῷ κόσμῳ ἀπὸ τῶν σκανδάλων· ἀνάγκη ⸀γὰρ ἐλθεῖν τὰ σκάνδαλα, πλὴν οὐαὶ τῷ ⸀ἀνθρώπῳ δι’ οὗ τὸ σκάνδαλον ἔρχεται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/007.yaml
  text: Woe to the world because of stumbling blocks[a]; for it is necessary that the stumbling blocks come[b], but woe to the man through whom the stumbling block comes.
  footnotes:
  - marker: a
    text: Or 'offenses,' 'causes of sin,' or 'traps.' The Greek σκάνδαλον/σκάνδαλα refers to something that causes a person to stumble, whether by offense, enticement, or occasion for sin.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' is grammatically masculine singular in Greek and here represents any individual through whom such a stumbling block comes.'
    reason: cultural_note
