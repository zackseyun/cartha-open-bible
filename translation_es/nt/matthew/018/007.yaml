translation:
  language: es
  text: ¡Ay del mundo por causa de los tropiezos[a]! Porque es necesario que vengan los tropiezos, pero ¡ay del hombre[b] por quien viene el tropiezo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escándalos», «causas de pecado» o «trampas». El griego σκάνδαλον/σκάνδαλα designa algo que hace tropezar a una persona, ya sea por ofensa, seducción u ocasión para pecar.
    reason: lexical_alternative
  - marker: b
    text: «El hombre» es gramaticalmente masculino singular en griego y aquí representa a cualquier individuo por medio de quien venga tal tropiezo.
    reason: cultural_note
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay del!
  lexicon: BDAG
  rationale: «¡Ay!» conserva el tono profético y de lamento/jucio del griego οὐαί. En español, la forma con exclamación transmite mejor la fuerza retórica que un término más débil.
- source_word: κόσμῳ
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo ordenado
  - la humanidad
  lexicon: BDAG
  rationale: «El mundo» es la forma natural y suficientemente amplia para κόσμος aquí, sin introducir una explicación interpretativa que el texto no exige.
- source_word: ἀπὸ
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: En este contexto ἀπό expresa causa o motivo; «por causa de» comunica bien esa relación en español y mantiene la referencia a los tropiezos como fuente del ay.
- source_word: σκάνδαλα / σκάνδαλον
  english_pob_choice: stumbling blocks
  chosen_spanish: tropiezos
  alternatives_spanish:
  - escándalos
  - ocasiones de pecado
  - trampas
  lexicon: BDAG
  rationale: El campo semántico de σκάνδαλον incluye aquello que hace tropezar, ofender o caer en pecado. «Tropiezos» conserva la imagen del obstáculo y sugiere adecuadamente la idea de algo que induce a caer, sin reducirlo a un sentido meramente moral o social.
- source_word: ἀνάγκη
  english_pob_choice: it is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - tiene que ser
  - hay necesidad de
  lexicon: BDAG
  rationale: «Es necesario» reproduce de forma natural la expresión impersonal de necesidad y deja abierta la base de esa necesidad, como hace el griego.
- source_word: ἐλθεῖν ... ἔρχεται
  english_pob_choice: come ... comes
  chosen_spanish: vengan ... viene
  alternatives_spanish:
  - lleguen ... llega
  - aparezcan ... aparece
  lexicon: BDAG
  rationale: La repetición verbal de «venir» refleja el paralelismo del griego ἐλθεῖν / ἔρχεται y conserva la imagen de algo que «llega» a presentarse.
- source_word: πλήν
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - no obstante
  lexicon: BDAG
  rationale: «Pero» marca con claridad el giro adversativo entre la inevitabilidad de los tropiezos y la denuncia dirigida al agente humano.
- source_word: ἀνθρώπῳ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - quien
  lexicon: BDAG
  rationale: Se conserva el singular masculino del griego con «el hombre», tal como la POB inglesa retiene «the man» por fidelidad morfológica. En español funciona también de modo representativo para cualquier individuo en ese papel.
- source_word: δι’ οὗ
  english_pob_choice: through whom
  chosen_spanish: por quien
  alternatives_spanish:
  - por medio de quien
  - a través de quien
  lexicon: BDAG
  rationale: «Por quien» expresa de manera natural la agencia instrumental de δι’ οὗ en español, sin sonar forzado. Mantiene la referencia personal al agente por el que viene el tropiezo.
theological_decisions:
- issue: Naturaleza de la necesidad en ἀνάγκη γὰρ ἐλθεῖν τὰ σκάνδαλα
  english_pob_reading: Statement of necessity/inevitability without specifying divine causation.
  chosen_spanish_reading: 'Se traduce como una afirmación de necesidad: «es necesario», sin explicitar si esa necesidad es providencial, lógica o situacional.'
  alternative_spanish_readings:
  - «tiene que ser»
  - «es inevitable que vengan los tropiezos»
  rationale: El griego afirma necesidad, pero no explica su fundamento. La versión española conserva esa tensión y evita atribuir una causalidad divina directa que el texto no formula.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
- issue: Valor representativo de ἀνθρώπῳ
  english_pob_reading: Main text keeps 'the man' with representative force; inclusivity is clarified in a footnote.
  chosen_spanish_reading: El texto principal conserva «el hombre»; su valor representativo es visible en el contexto sin necesidad de neutralizarlo.
  alternative_spanish_readings:
  - «la persona»
  - «quien»
  rationale: La forma gramatical es masculina singular y la POB inglesa la preserva. En español, «el hombre» mantiene esa fidelidad formal y puede entenderse genéricamente dentro del enunciado.
  doctrine_reference: 'Translation philosophy §4: Fidelidad morfológica con lectura representativa.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios sustanciales; esta versión mantiene la lectura de alta concordancia del audit trail inglés, pero adapta el registro a un español publicable y consistente con las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene la distinción entre plural («tropiezos») y singular («tropiezo») tal como en el griego.
  - Se conserva el tono profético de «¡Ay!» en ambas cláusulas.
  - No se introduce un equivalente interpretativo fuerte para la base de la necesidad en ἀνάγκη.
  - La elección de «el hombre» sigue la fidelidad morfológica del original y la POB inglesa.
  - La nota de pie a explica el rango semántico de σκάνδαλον sin sustituir la traducción principal.
