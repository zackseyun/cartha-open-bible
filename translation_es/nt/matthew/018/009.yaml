translation:
  language: es
  text: Y si tu ojo te hace tropezar[a], arráncalo y arrójalo lejos de ti. Es mejor para ti entrar en la vida con un solo ojo que, teniendo dos ojos, ser arrojado a la Gehenna[b] de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te hace pecar». El verbo griego puede significar hacer tropezar, caer o pecar.
    reason: lexical_alternative
  - marker: b
    text: «Gehenna» designa el lugar de juicio final; tradicionalmente se ha rendido como «infierno».
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζει
  english_pob_choice: causes you to stumble
  chosen_spanish: te hace tropezar
  alternatives_spanish:
  - te hace caer
  - te hace pecar
  - te es tropiezo
  lexicon: BDAG
  rationale: La imagen básica es de tropiezo o caída, y el español natural mantiene mejor esa metáfora con «te hace tropezar». Evita restringir el sentido solo a pecado interior, pero deja abierta la posibilidad moral del contexto.
- source_word: ἔξελε
  english_pob_choice: tear it out
  chosen_spanish: sácalo
  alternatives_spanish:
  - arráncalo
  - extráelo
  - quítatelo
  lexicon: BDAG
  rationale: El imperativo es enérgico y de separación violenta; «sácalo» conserva la urgencia sin sonar artificial en español. En combinación con el siguiente verbo se mantiene la fuerza de la orden.
- source_word: βάλε ἀπὸ σοῦ
  english_pob_choice: throw it away from you
  chosen_spanish: arrójalo lejos de ti
  alternatives_spanish:
  - échalo de ti
  - tíralo lejos de ti
  - ponlo lejos de ti
  lexicon: BDAG
  rationale: La construcción expresa remoción decisiva. «Arrójalo lejos de ti» preserva el movimiento de expulsión y comunica con claridad la separación completa.
- source_word: καλόν σοί ἐστιν
  english_pob_choice: It is better for you
  chosen_spanish: Te conviene más
  alternatives_spanish:
  - Es mejor para ti
  - Te resulta mejor
  - Más te vale
  lexicon: BDAG
  rationale: Aquí καλόν no describe solo bondad moral sino conveniencia comparativa frente a la alternativa. «Te conviene más» transmite bien esa preferencia práctica y mantiene el contraste del pasaje.
- source_word: μονόφθαλμον
  english_pob_choice: with one eye
  chosen_spanish: con un solo ojo
  alternatives_spanish:
  - tuerto
  - de un solo ojo
  lexicon: BDAG
  rationale: El griego dice literalmente «monóftalmo», ‘con un solo ojo’. «Con un solo ojo» conserva la imagen física sin cargar la frase con un adjetivo idiomático que podría sonar menos transparente.
- source_word: εἰς τὴν ζωὴν
  english_pob_choice: into life
  chosen_spanish: entrar en la vida
  alternatives_spanish:
  - entrar en la vida eterna
  - entrar en la vida
  lexicon: BDAG
  rationale: El texto griego no añade «eterna», así que se preserva solo «vida». El infinitivo «entrar» se vierte naturalmente en español como «entrar en la vida», sin sobreespecificar el alcance escatológico.
- source_word: βληθῆναι
  english_pob_choice: to be thrown
  chosen_spanish: ser arrojado
  alternatives_spanish:
  - ser echado
  - ser lanzado
  - ser puesto
  lexicon: BDAG
  rationale: El pasivo conserva la pasividad del sujeto al recibir el juicio. «Ser arrojado» sigue de cerca la imagen de βάλλω en pasivo y suena natural y solemne en español.
- source_word: γέενναν
  english_pob_choice: Gehenna
  chosen_spanish: la Gehenna
  alternatives_spanish:
  - el infierno
  - el lugar de castigo
  - el Gehena
  lexicon: BDAG
  rationale: Se mantiene el término técnico «Gehenna» como en el POB inglés, porque el griego usa un vocablo específico con trasfondo histórico y escatológico. Traducirlo como «infierno» borraría esa precisión.
- source_word: τοῦ πυρός
  english_pob_choice: of fire
  chosen_spanish: de fuego
  alternatives_spanish:
  - ardiente
  - de las llamas
  lexicon: BDAG
  rationale: 'El genitivo se conserva de forma directa: «de fuego». Así se mantiene la imagen vívida sin suavizarla ni interpretarla más allá del texto.'
theological_decisions:
- issue: Rendering of γέεννα
  english_pob_reading: Gehenna
  chosen_spanish_reading: la Gehenna
  alternative_spanish_readings:
  - el infierno
  - el Gehena
  rationale: La decisión mantiene el término original del griego para no mezclarlo con conceptos posteriores o más amplios de «infierno». Esto preserva la tensión histórica y escatológica del dicho de Jesús sin resolverla por paráfrasis.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of εἰς τὴν ζωὴν
  english_pob_reading: into life
  chosen_spanish_reading: entrar en la vida
  alternative_spanish_readings:
  - entrar en la vida eterna
  - entrar a la vida
  rationale: El griego solo dice «vida», no «vida eterna». La traducción conserva esa sobriedad textual y deja que el contexto mateano aporte el peso escatológico sin añadirlo explícitamente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Forceful hyperbole of self-amputation imagery
  english_pob_reading: tear it out / throw it away
  chosen_spanish_reading: sácalo y arrójalo lejos de ti
  alternative_spanish_readings:
  - arráncalo y échalo lejos de ti
  - quítatelo y deséchalo
  rationale: Se conserva la hipérbole moral del dicho sin suavizarla. El español debe reflejar la severidad del imperativo y la separación radical que el griego comunica.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios y el control cruzado mostró alta concordancia con solo observaciones menores; por eso se mantuvo la opción terminológica de Gehenna y la sobriedad de «vida» sin añadir «eterna».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - «Gehenna» se conserva como término técnico coherente con el POB inglés y con el griego γέεννα.
  - No se introdujo «Cristo» ni otras equivalencias doctrinales ajenas al texto.
  - La frase «te hace tropezar» preserva la metáfora de σκανδαλίζω sin reducirla a una sola implicación moral.
