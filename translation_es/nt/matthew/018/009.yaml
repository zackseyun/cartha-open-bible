  text: καὶ εἰ ὁ ὀφθαλμός σου σκανδαλίζει σε, ἔξελε αὐτὸν καὶ βάλε ἀπὸ σοῦ· καλόν σοί ἐστιν μονόφθαλμον εἰς τὴν ζωὴν εἰσελθεῖν, ἢ δύο ὀφθαλμοὺς ἔχοντα βληθῆναι εἰς τὴν γέενναν τοῦ πυρός.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/009.yaml
  text: And if your eye causes you to stumble[a], tear it out and throw it away from you. It is better for you to enter into life with one eye than, having two eyes[b], to be thrown into the Gehenna of fire.
  footnotes:
  - marker: a
    text: Or 'causes you to sin.' The Greek verb can mean to cause someone to stumble, fall, or sin.
    reason: lexical_alternative
  - marker: b
    text: '''Gehenna'' refers to the place of final judgment; traditionally rendered ''hell.'''
    reason: alternative_reading
