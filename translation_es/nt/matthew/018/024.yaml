translation:
  language: es
  text: Y cuando comenzó a hacer cuentas, le fue traído un solo deudor que debía diez mil talentos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un talento era una unidad monetaria muy grande; «diez mil talentos» representa una deuda inimaginablemente grande dentro del marco de la parábola.
    reason: cultural_note
lexical_decisions:
- source_word: ἀρξαμένου ... αὐτοῦ
  english_pob_choice: when he began
  chosen_spanish: y cuando comenzó
  alternatives_spanish:
  - así que, al comenzar
  - cuando empezó
  lexicon: BDAG
  rationale: El genitivo absoluto introduce la circunstancia temporal de la acción principal. «Y cuando comenzó» conserva esa relación y suena natural en español, sin añadir una secuencia más fuerte de la que el griego exige.
- source_word: συναίρειν
  english_pob_choice: to settle accounts
  chosen_spanish: a ajustar cuentas
  alternatives_spanish:
  - a liquidar cuentas
  - a hacer cuentas
  lexicon: BDAG
  rationale: En este contexto financiero, el verbo expresa poner las cuentas en orden o liquidarlas. «Ajustar cuentas» mantiene la imagen contable y resulta idiomático en español contemporáneo; evita el tono demasiado burocrático de algunas alternativas.
- source_word: προσηνέχθη
  english_pob_choice: was brought
  chosen_spanish: le fue presentado
  alternatives_spanish:
  - fue traído
  - le trajeron
  lexicon: BDAG
  rationale: El pasivo aoristo indica que alguien fue llevado o presentado ante el rey. «Le fue presentado» conserva el matiz pasivo y funciona bien en español bíblico, aunque «fue traído» también sería posible.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - ante él
  - a él
  lexicon: BDAG
  rationale: El dativo con προσφέρω en pasivo se vierte naturalmente con objeto indirecto en español. «Le» evita una repetición pesada y conserva la dirección hacia el rey.
- source_word: εἷς ὀφειλέτης
  english_pob_choice: one debtor
  chosen_spanish: un deudor
  alternatives_spanish:
  - un deudor, uno
  - un hombre que debía
  lexicon: BDAG
  rationale: Aunque εἷς es explícito en griego, en español el artículo indefinido suele comunicar bien la introducción de un caso particular. Se deja fuera «uno» porque sonaría redundante en este contexto narrativo y no aporta claridad adicional.
- source_word: μυρίων ταλάντων
  english_pob_choice: ten thousand talents
  chosen_spanish: diez mil talentos
  alternatives_spanish:
  - miriadas de talentos
  - un número incalculable de talentos
  lexicon: BDAG
  rationale: μύριοι tiene aquí su sentido numérico literal de «diez mil». Se conserva «talentos» como unidad histórica de peso/moneda, porque convertirla a moneda moderna sería especulativo y podría ocultar la exageración del relato.
translation_notes:
  revision_awareness: El contexto auditado en inglés mantiene la lectura financiera de συναίρειν y la cuantificación literal de μυρίων ταλάντων; no se requirieron revisiones textuales ni cambios de sentido respecto del pass revisado más reciente.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y bíblico, pero con español contemporáneo.
  - Se preserva la imagen contable de la escena sin modernizar la unidad monetaria.
  - La nota al pie acompaña solo el término con ambigüedad útil en español.
