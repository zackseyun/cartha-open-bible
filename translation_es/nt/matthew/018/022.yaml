translation:
  language: es
  text: 'Jesús le dice: «No te digo hasta siete veces, sino hasta setenta veces siete[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «setenta y siete veces».'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente narrativo griego se conserva naturalmente en español con «dice», manteniendo la viveza del relato sin forzar un pasado donde el texto fuente usa presente.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo indirecto se refleja con el pronombre átono «le», más natural en español y fiel al pronombre griego sin sustituirlo por el nombre propio.
- source_word: Οὐ λέγω σοι
  english_pob_choice: I do not say to you
  chosen_spanish: No te digo
  alternatives_spanish:
  - No te estoy diciendo
  - No te digo a ti
  lexicon: BDAG
  rationale: «No te digo» reproduce con sencillez la negación y el destinatario directo; evita una perífrasis menos compacta que no aporta precisión adicional al griego.
- source_word: ἕως
  english_pob_choice: up to
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta el límite de
  - hasta
  lexicon: BDAG
  rationale: En un contexto numérico, «hasta» expresa mejor el límite cuantitativo que «hasta que» o «hasta el punto de».
- source_word: ἑπτάκις
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete ocasiones
  - siete veces cada una
  lexicon: BDAG
  rationale: El adverbio de frecuencia se rinde de forma directa como «siete veces», que es idiomático y conserva el valor cuantitativo.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En español, después de una negación previa, «sino» expresa mejor la corrección contrastiva del segundo miembro que «pero».
- source_word: ἑβδομηκοντάκις ἑπτά
  english_pob_choice: seventy times seven
  chosen_spanish: setenta veces siete
  alternatives_spanish:
  - setenta y siete veces
  - setenta veces por siete
  lexicon: BDAG
  rationale: Se conserva la forma más cercana al griego y al audit trail inglés. La expresión permanece ambigua en español, como en el original, sin resolverla anticipadamente hacia «setenta y siete veces».
theological_decisions:
- issue: Ambigüedad numérica en la expresión final
  english_pob_reading: seventy times seven / seventy-seven times
  chosen_spanish_reading: setenta veces siete
  alternative_spanish_readings:
  - setenta y siete veces
  rationale: La POB inglesa mantuvo la tensión interpretativa con nota alternativa. En español, «setenta veces siete» preserva la formulación más literal y deja abierta la cuestión aritmética sin apagar la fuerza hiperbólica del dicho sobre el perdón.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que ajustó la frase final hacia una forma más directa del griego, pero mantuvo la ambigüedad interpretativa. La versión española conserva esa misma tensión con una expresión literal y una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como sujeto explícito, coherente con el griego y con la práctica POB.
  - Se usa puntuación tipográfica española con comillas angulares.
  - No se introduce lenguaje eclesiástico tradicional que no esté exigido por el texto.
  - La nota conserva la alternativa numérica sin decidirla en el cuerpo del versículo.
