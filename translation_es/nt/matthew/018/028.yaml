base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/028.yaml
  text: But when that slave went out[a], he found one of his fellow slaves who owed him a hundred denarii, and seizing him, he began choking him, saying[b], ‘Pay back what you owe.’
  footnotes:
  - marker: a
    text: Or, more literally, “Pay back if you owe anything.”
    reason: lexical_alternative
  - marker: b
    text: A denarius was a common daily wage for a laborer or soldier.
    reason: cultural_note
