translation:
  language: es
  text: 'Pero cuando aquel esclavo salió, encontró a uno de sus compañeros esclavos, que le debía cien denarios[b], y agarrándolo, empezó a estrangularlo, diciendo: «Paga lo que debes[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Paga si debes algo».'
    reason: lexical_alternative
  - marker: b
    text: Un denario era una moneda de uso común, aproximadamente el salario diario de un jornalero o soldado.
    reason: cultural_note
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: El contexto de deuda, coerción y violencia exige conservar la fuerza social del término. «Esclavo» refleja mejor el vínculo de subordinación que «siervo», y sigue la decisión del POB inglés de no suavizar el término.
- source_word: ἐξελθὼν δὲ
  english_pob_choice: But when ... went out
  chosen_spanish: Pero cuando ... salió
  alternatives_spanish:
  - Y cuando ... salió
  - Pero al salir
  lexicon: BDAG
  rationale: Se mantiene el contraste narrativo de δέ con «Pero», y el participio aoristo se vierte de forma natural en español como una acción temporal previa.
- source_word: συνδούλων
  english_pob_choice: fellow slaves
  chosen_spanish: consiervos
  alternatives_spanish:
  - compañeros esclavos
  - con-esclavos
  lexicon: BDAG
  rationale: En español «consiervo» es una forma estable y comprensible para σύνδουλος; conserva la idea de pertenencia a la misma condición. No se usa «compañeros esclavos» por sonar menos natural.
- source_word: ὤφειλεν
  english_pob_choice: owed
  chosen_spanish: le debía
  alternatives_spanish:
  - le adeudaba
  - estaba debiéndole
  lexicon: BDAG
  rationale: La deuda es financiera y directa; «le debía» es el equivalente más natural y claro en español, sin perder la relación de obligación.
- source_word: ἑκατὸν δηνάρια
  english_pob_choice: a hundred denarii
  chosen_spanish: cien denarios
  alternatives_spanish:
  - cien monedas de denario
  - cien denarios de plata
  lexicon: BDAG
  rationale: Se conserva el término histórico «denarios» para no borrar la medida monetaria del texto ni la tensión económica del relato.
- source_word: κρατήσας
  english_pob_choice: seizing him
  chosen_spanish: agarrándolo
  alternatives_spanish:
  - sujetándolo
  - tomándolo por la fuerza
  lexicon: BDAG
  rationale: El participio expresa una acción física violenta e inmediata; «agarrándolo» comunica la fuerza del gesto en español sin sobreexplicar.
- source_word: ἔπνιγεν
  english_pob_choice: he began choking him
  chosen_spanish: empezó a ahogarlo
  alternatives_spanish:
  - lo estaba estrangulando
  - lo asfixiaba
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso o iniciada; «empezó a ahogarlo» preserva ese valor aspectual y la violencia del verbo. En español, «ahogar» comunica la agresión física con suficiente claridad.
- source_word: Ἀπόδος
  english_pob_choice: Pay back
  chosen_spanish: Paga
  alternatives_spanish:
  - Devuelve
  - Recompensa
  lexicon: BDAG
  rationale: En contexto de deuda, el imperativo tiene fuerza de reclamación inmediata. «Paga» es breve y natural; la idea de restitución queda reforzada por el complemento siguiente.
- source_word: εἴ τι ὀφείλεις
  english_pob_choice: what you owe
  chosen_spanish: lo que debes
  alternatives_spanish:
  - si debes algo
  - cualquier cosa que debas
  lexicon: BDAG
  rationale: Se conserva el sentido directo del pedido/amenaza sin ampliar indebidamente el alcance. «Lo que debes» refleja la lectura revisada del POB inglés y es más cercano que una paráfrasis más libre.
theological_decisions:
- issue: Rendering of δοῦλος in a parabolic scene of debt and coercion
  english_pob_reading: slave / fellow slaves
  chosen_spanish_reading: esclavo / consiervos
  alternative_spanish_readings:
  - siervo / consiervos
  - esclavo / compañeros esclavos
  rationale: La escena presenta una relación de dominio y coerción, no mero servicio. «Esclavo» evita suavizar la dinámica social del pasaje; «consiervos» mantiene la relación paralela entre quienes comparten la misma condición.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Force of the closing imperative in a debt demand
  english_pob_reading: Pay back what you owe
  chosen_spanish_reading: Paga lo que debes
  alternative_spanish_readings:
  - Devuelve lo que debes
  - Paga cualquier deuda que tengas
  rationale: El griego contiene una orden tajante en contexto de cobro agresivo. «Paga lo que debes» conserva el carácter imperativo sin introducir matices no presentes en el texto.
  doctrine_reference: BDAG on ἀποδίδωμι; audit trail revision pass on εἴ τι ὀφείλεις
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura revisada del POB inglés en εἴ τι ὀφείλεις: se prefirió «lo que debes» sobre una formulación más amplia como «cualquier cosa que debas», para ajustarse mejor al griego y mantener un español natural. También se preservó la decisión léxica fuerte para δοῦλος, coherente con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo «esclavo» para δοῦλος y «consiervos» para συνδούλων, siguiendo la fuerza social del contexto.
  - Se conservó «denarios» como término monetario histórico, sin convertirlo en equivalencia moderna.
  - El cierre imperativo quedó breve y directo («Paga lo que debes») para reflejar la demanda urgente del griego.
  - Se usó puntuación española estándar y comillas angulares para el discurso directo.
