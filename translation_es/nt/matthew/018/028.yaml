review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia narrativa y el sentido básico del griego: el esclavo sale, encuentra a otro, reconoce la deuda de cien denarios, lo agarra violentamente y le exige pago. También conserva correctamente «esclavo» para δοῦλος y «denarios» para δηνάρια. Sin embargo, hay dos desajustes relevantes con el texto fuente y con la auditoría inglesa: (1) συνδούλων se suaviza como «consiervos», que rompe la consistencia con «esclavo / fellow slaves» y debilita la fuerza social explícita del pasaje; (2) la nota [a] está anclada en «consiervos», pero en el POB inglés la nota textual corresponde a la expresión final εἴ τι ὀφείλεις («if you owe anything»), no a συνδούλων. Además, ἔπνιγεν se expresa mejor en español como «empezó a estrangularlo» que «ahogarlo», para evitar sugerir ahogamiento por inmersión y reflejar con más precisión la acción de estrangular/apretar el cuello.'
  spanish_quality_summary: El español es mayormente claro y natural, pero «consiervos» suena eclesiástico y además entra en tensión con «esclavo» en el mismo versículo. «Compañeros esclavos» o «coesclavos» preserva mejor el sentido; «compañeros esclavos» es más legible para un público amplio. También conviene mover la nota léxica al cierre de la cita, donde realmente corresponde. La nota cultural sobre el denario es útil y puede mantenerse con anclaje en «denarios».
  glossary_alignment: Alinea bien con el glosario en «esclavo» para δοῦλος, pero falla en la consistencia al usar «consiervos» para συνδούλων, cuando la decisión inglesa y la guía doctrinal piden mantener la fuerza de «slave / fellow slaves». «Compañeros esclavos» conserva el prefijo σύν- de forma idiomática. «Paga lo que debes» encaja con Ἀπόδος εἴ τι ὀφείλεις y con la revisión inglesa, con una nota opcional para la alternativa más literal «si debes algo».
  issues:
  - severity: high
    issue: «consiervos» para συνδούλων debilita la consistencia con δοῦλος = «esclavo».
    rationale: El audit trail inglés decidió «slave / fellow slaves» por razones léxicas y teológicas; «consiervos» reintroduce un término más suave y menos preciso socialmente.
  - severity: high
    issue: La nota [a] está aplicada al lugar equivocado.
    rationale: La nota inglesa marcada como alternativa léxica explica εἴ τι ὀφείλεις («if you owe anything»), no συνδούλων. En español debe anclarse en la frase final citada, no en «consiervos».
  - severity: medium
    issue: «empezó a ahogarlo» no es la mejor opción para ἔπνιγεν.
    rationale: En español «ahogar» puede sugerir sofocación o inmersión; «estrangular» refleja mejor el acto violento de agarrar por el cuello/choking.
  - severity: low
    issue: La nota cultural del denario está anclada en «diciendo».
    rationale: Por claridad editorial, la nota sobre «denario» debe anclarse en «denarios», donde el lector espera la explicación cultural.
  revised_spanish_text: 'Pero cuando aquel esclavo salió, encontró a uno de sus compañeros esclavos, que le debía cien denarios[b], y agarrándolo, empezó a estrangularlo, diciendo: «Paga lo que debes[a]».'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Paga si debes algo».'
    reason: lexical_alternative
  - marker: b
    text: Un denario era una moneda de uso común, aproximadamente el salario diario de un jornalero o soldado.
    reason: cultural_note
  revision_rationale: 'Se revisa para alinear el español con el griego y con la auditoría del POB inglés: «compañeros esclavos» preserva συνδούλων sin suavizar δοῦλος; «estrangularlo» refleja mejor ἔπνιγεν; la nota léxica se mueve a la frase final, donde corresponde a εἴ τι ὀφείλεις; y la nota cultural se ancla en «denarios».'
