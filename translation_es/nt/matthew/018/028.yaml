revisions:
- from: 'Pero cuando aquel esclavo salió, encontró a uno de sus consiervos[a], que le debía cien denarios, y agarrándolo, empezó a ahogarlo, diciendo[b]: «Paga lo que debes».'
  to: 'Pero cuando aquel esclavo salió, encontró a uno de sus compañeros esclavos, que le debía cien denarios[b], y agarrándolo, empezó a estrangularlo, diciendo: «Paga lo que debes[a]».'
  rationale: 'Se revisa para alinear el español con el griego y con la auditoría del POB inglés: «compañeros esclavos» preserva συνδούλων sin suavizar δοῦλος; «estrangularlo» refleja mejor ἔπνιγεν; la nota léxica se mueve a la frase final, donde corresponde a εἴ τι ὀφείλεις; y la nota cultural se ancla en «denarios».'
