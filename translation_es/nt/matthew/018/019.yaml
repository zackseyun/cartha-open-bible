  text: Πάλιν ⸀ἀμὴν λέγω ὑμῖν ὅτι ἐὰν δύο ⸂συμφωνήσωσιν ἐξ ὑμῶν⸃ ἐπὶ τῆς γῆς περὶ παντὸς πράγματος οὗ ἐὰν αἰτήσωνται, γενήσεται αὐτοῖς παρὰ τοῦ πατρός μου τοῦ ἐν οὐρανοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/019.yaml
  text: Again[a], truly I tell you, if two of you agree on earth about any matter they ask for[c][b], it will be done for them by my Father in heaven.
  footnotes:
  - marker: a
    text: Or 'if two from among you are in agreement.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'in the heavens'; rendered idiomatically as 'in heaven.'
    reason: lexical_alternative
  - marker: c
    text: In context, this saying follows Jesus' teaching about the community's authority and discipline (18:15–18), though the wording here itself speaks broadly of agreed requests.
    reason: cross_reference
