translation:
  language: es
  text: De nuevo[a], en verdad les digo que, si dos de ustedes se ponen de acuerdo en la tierra acerca de cualquier asunto que pidan[c], se les hará por mi Padre que está en el cielo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si dos de entre ustedes están de acuerdo».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «en los cielos»; se traduce idiomáticamente como «en el cielo» en el texto principal.'
    reason: lexical_alternative
  - marker: c
    text: En contexto, este dicho sigue la enseñanza de Jesús sobre la autoridad y la disciplina de la comunidad (18:15–18), aunque la redacción aquí habla en sentido amplio de peticiones acordadas.
    reason: cross_reference
lexical_decisions:
- source_word: Πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Otra vez más
  lexicon: BDAG
  rationale: Marca la continuación solemne del dicho de Jesús. «Otra vez» comunica bien la repetición/discurso retomado sin sonar mecánico.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: truly I tell you
  chosen_spanish: en verdad les digo
  alternatives_spanish:
  - ciertamente les digo
  - amen, les digo
  lexicon: BDAG
  rationale: Expresa la fórmula solemne de Jesús con naturalidad en español. «En verdad» conserva el énfasis sin introducir una transliteración innecesaria.
- source_word: ἐὰν δύο συμφωνήσωσιν ἐξ ὑμῶν
  english_pob_choice: if two of you agree
  chosen_spanish: si dos de ustedes se ponen de acuerdo
  alternatives_spanish:
  - si dos de entre ustedes se ponen de acuerdo
  - si dos de ustedes están de acuerdo
  lexicon: BDAG
  rationale: «Se ponen de acuerdo» traduce συμφωνέω como acuerdo real, no solo coexistencia. «De ustedes» representa ἐξ ὑμῶν de modo idiomático y fiel.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - aquí en la tierra
  lexicon: BDAG
  rationale: «En la tierra» preserva el contraste espacial con «en los cielos» y resulta claro en español contemporáneo.
- source_word: περὶ παντὸς πράγματος
  english_pob_choice: about any matter
  chosen_spanish: acerca de cualquier asunto
  alternatives_spanish:
  - sobre cualquier cosa
  - acerca de cualquier materia
  lexicon: BDAG
  rationale: «Asunto» transmite la amplitud de πρᾶγμα como cuestión, tema o caso, sin estrecharlo indebidamente a «cosa».
- source_word: οὗ ἐὰν αἰτήσωνται
  english_pob_choice: they ask for
  chosen_spanish: que pidan
  alternatives_spanish:
  - que soliciten
  - que rueguen
  lexicon: BDAG
  rationale: αἰτέω en este contexto de petición se expresa bien con «pedir». «Que pidan» mantiene la apertura de la construcción indefinida sin sobreespecificar el tipo de petición.
- source_word: γενήσεται αὐτοῖς
  english_pob_choice: it will be done for them
  chosen_spanish: les será hecho
  alternatives_spanish:
  - se hará para ellos
  - les sucederá
  lexicon: BDAG
  rationale: La construcción verbal se presta a una pasiva impersonal en español. «Les será hecho» conserva la idea de resultado concedido sin añadir un agente explícito en la frase.
- source_word: παρὰ τοῦ πατρός μου
  english_pob_choice: by my Father
  chosen_spanish: por mi Padre
  alternatives_spanish:
  - de parte de mi Padre
  - por parte de mi Padre
  lexicon: BDAG
  rationale: Con el pasivo de resultado, παρά + genitivo puede implicar origen o agencia. «Por mi Padre» comunica la agencia de manera natural en español.
- source_word: τοῦ ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: que está en los cielos
  alternatives_spanish:
  - que está en el cielo
  - que está en los cielos
  lexicon: BDAG
  rationale: Se preserva el plural «cielos» porque el griego usa οὐρανοῖς. La perífrasis «que está en» explicita el participio implícito de forma fluida y reverente.
theological_decisions:
- issue: Alcance de la promesa
  english_pob_reading: Render the statement straightforwardly without adding qualifiers about prayer, church discipline, or divine will beyond what the Greek explicitly states.
  chosen_spanish_reading: Traducir la afirmación de manera directa, sin convertirla en una promesa limitada solo a disciplina eclesial ni ampliarla a un cheque en blanco para cualquier petición.
  alternative_spanish_readings:
  - si dos de ustedes oran de común acuerdo
  - si dos de ustedes, como iglesia, deciden
  rationale: El contexto inmediato sugiere acuerdo comunitario y relación con la enseñanza previa, pero el versículo mismo habla con amplitud de cualquier asunto pedido. La traducción conserva esa tensión sin resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Revisión más reciente sin cambios sustanciales; el texto griego y el auditorial inglés muestran alta concordancia y no requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no aparece.
  - Se mantiene «en los cielos» para οὐρανοῖς, conservando el plural del griego.
  - «Les será hecho» preserva la pasiva de resultado sin añadir una glosa interpretativa en el texto principal.
  - «En verdad les digo» conserva la solemnidad de ἀμήν λέγω ὑμῖν en español natural.
