  to: De la misma manera, no es la voluntad ante su Padre que está en los cielos que perezca[a] uno de estos pequeños.
  rationale: Se corrige el anclaje de la nota para que corresponda al verbo ἀπόληται, se mejora la naturalidad de οὕτως con «De la misma manera», se sustituye «vuestro» por «su» para ajustarse al español neutral, y se conserva una representación suficientemente explícita de ἔμπροσθεν con «ante».
