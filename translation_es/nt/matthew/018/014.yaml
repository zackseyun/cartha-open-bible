review_pass:
  verdict: revise
  source_alignment_summary: 'La idea central del griego está mayormente conservada: οὕτως introduce la aplicación del ejemplo anterior; θέλημα se vierte correctamente como «voluntad»; ἵνα ἀπόληται se refleja bien con «que perezca», y la nota preserva adecuadamente la alternativa contextual «que se pierda». Sin embargo, la redacción «delante de vuestro Padre» suena poco idiomática en español en esta construcción, y «vuestro» desentona con el estilo meta solicitado. Además, falta anclar la nota [a] al término relevante («perezca»), no a «Así».'
  spanish_quality_summary: El borrador es entendible, pero necesita un ajuste menor para sonar natural y ampliamente legible en español neutral eclesial. «Así» puede funcionar, pero «De la misma manera» expresa mejor la fuerza comparativa de οὕτως. «Delante de vuestro Padre» es una reproducción demasiado literal y algo áspera; «ante su Padre que está en los cielos» conserva ἔμπροσθεν con mejor dignidad y naturalidad. También conviene evitar «vuestro» en favor de «su» o «ustedes» para mantener neutralidad latinoamericana. La nota al pie debe colocarse sobre «perezca[a]», que es donde surge la alternativa léxica.
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. «Padre», «cielos» y «perezca» están dentro de los márgenes aceptables. La principal cuestión es estilística y de fidelidad idiomática, no terminológica.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «Así» en vez de al verbo «perezca».
    rationale: La nota explica la alternativa léxica de ἀπόληται («perezca» / «se pierda»), por lo que el marcador debe aparecer en el punto correspondiente del texto.
  - severity: medium
    issue: «Delante de vuestro Padre» suena poco natural en español en esta construcción.
    rationale: Aunque intenta reflejar ἔμπροσθεν, en español bíblico natural «no es la voluntad ante su Padre...» comunica mejor la idea sin caer en un calco tosco.
  - severity: low
    issue: «Vuestro» no encaja bien con el objetivo de español neutral latinoamericano.
    rationale: El proyecto pide un español ampliamente legible; «su Padre» evita regionalismo peninsular y mantiene claridad.
  - severity: low
    issue: «Así» es posible, pero no expresa tan claramente la relación comparativa de οὕτως como «De la misma manera».
    rationale: El contexto conecta esta afirmación con la parábola precedente; una formulación un poco más explícita mejora la legibilidad sin añadir contenido.
  revised_spanish_text: De la misma manera, no es la voluntad ante su Padre que está en los cielos que perezca[a] uno de estos pequeños.
  revised_footnotes:
  - marker: a
    text: 'O: «que se pierda». El verbo griego puede significar tanto «perecer» como «perderse»; el contexto inmediato de la oveja perdida favorece esta segunda posibilidad.'
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al verbo ἀπόληται, se mejora la naturalidad de οὕτως con «De la misma manera», se sustituye «vuestro» por «su» para ajustarse al español neutral, y se conserva una representación suficientemente explícita de ἔμπροσθεν con «ante».
