translation:
  language: es
  text: De la misma manera, no es la voluntad ante su Padre que está en los cielos que perezca[a] uno de estos pequeños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se pierda». El verbo griego puede significar tanto «perecer» como «perderse»; el contexto inmediato de la oveja perdida favorece esta segunda posibilidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: In the same way
  chosen_spanish: Así
  alternatives_spanish:
  - De la misma manera
  - En la misma forma
  lexicon: BDAG
  rationale: El griego enlaza esta declaración con el ejemplo anterior; en español, «Así» conserva la relación comparativa con naturalidad y sin alargar innecesariamente la frase.
- source_word: θέλημα
  english_pob_choice: the will
  chosen_spanish: la voluntad
  alternatives_spanish:
  - el deseo
  - lo que quiere
  lexicon: BDAG
  rationale: «Voluntad» reproduce bien el valor de θέλημα cuando expresa intención o propósito; es el equivalente más estable y claro en este contexto.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: La revisión inglesa optó por «before» para reflejar ἔμπροσθεν más explícitamente. En español, «delante de» mantiene esa idea espacial/de presencia con una formulación natural y evita borrar la tensión literal del texto.
- source_word: πατρὸς ὑμῶν τοῦ ἐν οὐρανοῖς
  english_pob_choice: your Father in heaven
  chosen_spanish: vuestro Padre que está en los cielos
  alternatives_spanish:
  - vuestro Padre en el cielo
  - vuestro Padre celestial
  lexicon: BDAG
  rationale: Se conserva la relación posesiva y la localización «en los cielos» del griego. «Que está en los cielos» evita una mera etiqueta tradicional y mantiene la estructura descriptiva del original.
- source_word: ἵνα ἀπόληται
  english_pob_choice: that ... should perish
  chosen_spanish: que perezca
  alternatives_spanish:
  - que se pierda
  - que sea perdido
  lexicon: BDAG
  rationale: El verbo ἀπόλλυμι puede significar «perecer» o «perderse». Siguiendo la decisión inglesa, se mantiene «perezca» como lectura principal porque expresa con fuerza el resultado negativo; «perderse» queda implícitamente disponible por el contexto de la oveja perdida.
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - ni uno
  - uno solo
  lexicon: BDAG
  rationale: El griego no añade el matiz de «even» en el texto final revisado; «uno» refleja con precisión el singular enfático sin introducir un intensificador no expresado.
- source_word: τῶν μικρῶν τούτων
  english_pob_choice: of these little ones
  chosen_spanish: de estos pequeños
  alternatives_spanish:
  - de estos pequeñitos
  - de estos niños pequeños
  lexicon: BDAG
  rationale: «Pequeños» conserva el valor metafórico de μικροί dentro del contexto discipular, sin restringirlo innecesariamente a edad infantil; corresponde bien a la opción inglesa «little ones».
theological_decisions:
- issue: 'Sentido de ἀπόληται: «perecer» vs. «perderse»'
  english_pob_reading: should perish
  chosen_spanish_reading: que perezca
  alternative_spanish_readings:
  - que se pierda
  - que sea perdido
  rationale: 'La POB inglesa conserva «perish» en el texto principal y solo anota «be lost» como alternativa por el contexto de la oveja perdida. En español se mantiene esa misma tensión: «perezca» suena fuerte y serio, mientras la nota conserva la posibilidad contextual de «perderse».'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: refleja ἔμπροσθεν de forma más explícita con «delante de», evita introducir un intensificador no presente en el griego, y mantiene la tensión semántica de ἀπόληται entre «perecer» y «perderse».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no corresponde.
  - Se conserva «vuestro Padre» para mantener el paralelismo con el griego, sin convertirlo en una paráfrasis más libre.
  - «Pequeños» sigue la terminología POB para μικροί en contextos discipulares.
  - La puntuación busca una lectura natural en español sin fragmentar indebidamente la cláusula principal y la subordinada final.
