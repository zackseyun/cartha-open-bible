translation:
  language: es
  text: Y el que reciba a un niño así en mi nombre, me recibe a mí[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «da la bienvenida». El verbo griego puede significar «recibir», «dar la bienvenida» o «aceptar».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «un niño así» o «un niño de esta clase»; el griego no añade el adjetivo «pequeño» en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἐὰν
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - el que
  lexicon: BDAG
  rationale: La construcción relativa con ἐὰν expresa una condición general e indefinida. «Cualquiera que» preserva bien ese alcance genérico en español y suena natural en un registro bíblico contemporáneo.
- source_word: δέξηται / δέχεται
  english_pob_choice: receives / receives
  chosen_spanish: reciba / recibe
  alternatives_spanish:
  - dé la bienvenida / me da la bienvenida
  - acepte / acepta
  lexicon: BDAG
  rationale: Se mantiene la repetición del mismo verbo en ambas cláusulas para reflejar la relación directa del griego entre recibir al niño y recibir a Jesús. «Recibir» conserva mejor esa correspondencia que «dar la bienvenida», aunque esta última es una alternativa posible.
- source_word: ἓν παιδίον τοιοῦτο
  english_pob_choice: one such child
  chosen_spanish: un niño como este
  alternatives_spanish:
  - uno así de niño
  - un niño de este tipo
  lexicon: BDAG
  rationale: El griego dice literalmente «un niño tal/como este». En español, «un niño como este» comunica de forma natural la referencia al niño puesto delante de ellos sin añadir «pequeño», que no aparece en el texto.
- source_word: ἐπὶ τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - con referencia a mi nombre
  lexicon: BDAG
  rationale: «En mi nombre» es la manera más natural y fiel de expresar la idea de recibir con referencia, autoridad o lealtad a Jesús. Evita precisar indebidamente una sola nuance del preposición ἐπί.
- source_word: ἐμὲ
  english_pob_choice: me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  lexicon: BDAG
  rationale: La forma enfática del acusativo se conserva en español con «a mí» al final de la cláusula, lo cual mantiene el paralelismo y el peso retórico de la identificación representativa.
theological_decisions:
- issue: Identificación representativa entre el niño y Jesús
  english_pob_reading: Receiving a child of this kind in Jesus' name is equivalent to receiving Jesus himself.
  chosen_spanish_reading: Recibir a un niño como este en el nombre de Jesús equivale a recibir a Jesús mismo.
  alternative_spanish_readings:
  - solo honra a Jesús al tratar bien a ese niño
  - recibe a Jesús de manera meramente simbólica
  rationale: La estructura directa del versículo une el mismo verbo con el niño y con Jesús, por lo que la traducción conserva esa identificación fuerte sin suavizarla. No se añade ninguna implicación eclesial o sacramental que el texto no exprese.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todos los marcadores de nota aparecen explícitamente en el texto español; ahora [a] y [b] están anclados en la cláusula final «a mí me recibe[a][b]».
  spanish_consistency_notes:
  - Se prefirió «Y cualquiera que» para reflejar el valor indefinido de ὃς ἐὰν.
  - Se mantuvo la repetición de «recibir» para δέξηται / δέχεται.
  - Se evitó introducir «pequeño» en el cuerpo principal, siguiendo la observación textual del audit trail.
  - Se usó «en mi nombre» para conservar la formulación idiomática y la amplitud semántica de ἐπί + dativo.
