translation:
  language: es
  text: Pero si se niega a escuchar a ellos, díselo a la asamblea[a]. Y si también se niega a escuchar a la asamblea, sea para ti como el gentil y el recaudador de impuestos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «iglesia» o «congregación» para ἐκκλησία.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακούσῃ
  english_pob_choice: refuses to listen
  chosen_spanish: no les hace caso / tampoco hace caso
  alternatives_spanish:
  - se niega a escuchar
  - desobedece
  - los ignora
  lexicon: BDAG
  rationale: παρακούω en este contexto disciplinario expresa una negativa volitiva a atender. «No les hace caso» conserva la idea de no escuchar/atender sin subir el tono a «desobedece», que sería más interpretativo.
- source_word: εἰπὸν
  english_pob_choice: tell it
  chosen_spanish: díselo
  alternatives_spanish:
  - repórtalo
  - di eso
  - comunícaselo
  lexicon: BDAG
  rationale: El imperativo de λέγω introduce el siguiente paso del procedimiento. «Díselo» es natural en español y conserva la función de comunicar el asunto sin añadir detalles que el griego no especifica.
- source_word: ἐκκλησίᾳ / ἐκκλησίας
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - iglesia
  - congregación
  lexicon: BDAG
  rationale: ἐκκλησία designa primariamente una comunidad reunida. «Asamblea» preserva ese sentido básico y evita imponer de entrada la carga institucional de «iglesia»; «congregación» también es posible, pero «asamblea» resulta más directa al matiz del término.
- source_word: ἔστω σοι
  english_pob_choice: let him be to you
  chosen_spanish: sea para ti
  alternatives_spanish:
  - tenlo por
  - considéralo como
  - sea para ustedes
  lexicon: BDAG
  rationale: La forma imperativa de εἰμί con dativo se refleja bien con «sea para ti», que mantiene el valor exhortativo y el destinatario implícito. La opción «considéralo como» sería más explicativa y menos cercana a la sintaxis griega.
- source_word: ὥσπερ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: BDAG
  rationale: Es una comparación simple; «como» es la equivalencia natural en español y no intensifica indebidamente la relación.
- source_word: ὁ ἐθνικὸς
  english_pob_choice: the Gentile
  chosen_spanish: el gentil
  alternatives_spanish:
  - un gentil
  - el pagano
  lexicon: BDAG
  rationale: En el contexto judío de Mateo, ἐθνικός se refiere al no perteneciente al pueblo del pacto. «El gentil» preserva esa categoría sin introducir el matiz adicional de «pagano», que puede sonar más valorativo de lo que exige el término.
- source_word: ὁ τελώνης
  english_pob_choice: the tax collector
  chosen_spanish: el recaudador de impuestos
  alternatives_spanish:
  - el publicano
  - un recaudador de impuestos
  lexicon: BDAG
  rationale: «Recaudador de impuestos» comunica con claridad la referencia histórica y evita que «publicano» suene arcaico o eclesiástico en español actual. Se retiene el artículo para reflejar la categorización griega.
theological_decisions:
- issue: Traducción de ἐκκλησία en una instrucción disciplinaria de Jesús
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - iglesia
  - congregación
  rationale: Se mantiene el sentido de comunidad reunida sin proyectar una institución posterior. La nota permite reconocer que «iglesia» sigue siendo una alternativa tradicional viable, pero el texto principal prioriza el valor léxico de ἐκκλησία.
  doctrine_reference: Translation philosophy §1, §5
- issue: Grado de separación sugerido por la comparación con el gentil y el recaudador de impuestos
  english_pob_reading: let him be to you like the Gentile and the tax collector
  chosen_spanish_reading: sea para ti como el gentil y el recaudador de impuestos
  alternative_spanish_readings:
  - trátalo como gentil y recaudador de impuestos
  - considéralo un outsider
  rationale: La redacción conserva la comparación del texto sin convertirla en una fórmula jurídica completa de expulsión. Así no se añade más procedimiento del que el versículo expresa, pero sí se conserva la fuerza relacional de la instrucción.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el estado revisado más reciente del inglés POB, que mantuvo sin cambios su solución óptima: «assembly» para ἐκκλησία, «refuses to listen» para παρακούσῃ y la comparación final sin sobrerinterpretación. No hubo revisiones aplicadas en el paquete fuente, así que la versión española refleja ese mismo nivel de estabilidad textual.'
  spanish_consistency_notes:
  - Se usa «asamblea» de manera consistente para ἐκκλησία en ambas ocurrencias del versículo.
  - Se evita «iglesia» en el texto principal para no confundir el término con una institución posterior; la alternativa queda en nota.
  - «Gentil» se conserva como categoría étnico-covenantal, no como juicio moral.
  - «Recaudador de impuestos» reemplaza el arcaísmo «publicano» para mayor transparencia semántica en español actual.
