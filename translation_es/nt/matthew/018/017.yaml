revisions:
- from: Pero si no les hace caso[a], díselo a la asamblea. Y si tampoco hace caso a la asamblea, sea para ti como el gentil y el recaudador de impuestos.
  to: Pero si se niega a escuchar a ellos, díselo a la asamblea[a]. Y si también se niega a escuchar a la asamblea, sea para ti como el gentil y el recaudador de impuestos.
  rationale: Se reubica la nota al pie para anclarla correctamente en «asamblea», que es el término al que corresponde la alternativa léxica documentada. Además, se reemplaza «no les hace caso» por «se niega a escuchar» para reflejar mejor el matiz volitivo de παρακούω y mantener un registro más digno y cercano al POB inglés. No se requieren cambios doctrinales ni de estructura.
