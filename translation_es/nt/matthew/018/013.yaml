translation:
  language: es
  text: Y si llega a encontrarlo[a], en verdad les digo que se alegra más por él que por los noventa y nueve que no se han extraviado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «si sucede que lo encuentra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que no se desviaron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Se conserva el conector simple para mantener el flujo inmediato de la ilustración sin añadir matiz inferido.
- source_word: ἐὰν γένηται εὑρεῖν αὐτό
  english_pob_choice: if he happens to find it
  chosen_spanish: si llega a encontrarlo
  alternatives_spanish:
  - si lo encuentra
  - si llegara a encontrarlo
  lexicon: BDAG
  rationale: La construcción expresa contingencia con el matiz de eventualidad; «llega a encontrarlo» preserva ese valor sin sonar forzado en español.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: truly I tell you
  chosen_spanish: en verdad les digo
  alternatives_spanish:
  - de cierto les digo
  - amén, les digo
  lexicon: BDAG
  rationale: Se traduce la fórmula solemne de Jesús con una expresión natural y reverente en español, conservando la fuerza enfática sin arcaísmo innecesario.
- source_word: χαίρει ἐπ’ αὐτῷ
  english_pob_choice: he rejoices over it
  chosen_spanish: se alegra por él
  alternatives_spanish:
  - se regocija por él
  - se alegra sobre él
  lexicon: BDAG
  rationale: «Se alegra» comunica el verbo χαίρω de modo idiomático y digno; «por él» expresa el objeto de la alegría en español más natural que una calca con «sobre».
- source_word: μᾶλλον ἢ
  english_pob_choice: more than
  chosen_spanish: más ... que
  alternatives_spanish:
  - más bien que
  - antes que
  lexicon: BDAG
  rationale: La comparación se expresa de forma directa para no suavizar la tensión del dicho ni introducir una exclusión no requerida por el griego.
- source_word: τοῖς ἐνενήκοντα ἐννέα
  english_pob_choice: the ninety-nine
  chosen_spanish: los noventa y nueve
  alternatives_spanish:
  - las noventa y nueve ovejas
  - los noventa y nueve ovejas
  lexicon: BDAG
  rationale: Se deja implícito «ovejas», como en el griego, pero el contexto lo hace transparente para el lector español.
- source_word: τοῖς μὴ πεπλανημένοις
  english_pob_choice: that have not gone astray
  chosen_spanish: que no se han extraviado
  alternatives_spanish:
  - que no han andado descarriadas
  - que no se han desviado
  lexicon: BDAG
  rationale: «Extraviado» reproduce bien la imagen de πλανάω en el contexto pastoril y mantiene la fuerza resultativa del participio perfecto.
theological_decisions:
- issue: Comparación del gozo del pastor y posible implicación sobre los noventa y nueve
  english_pob_reading: The verse states that the shepherd rejoices more over the recovered one than over the ninety-nine that have not gone astray, without implying lack of care for the ninety-nine.
  chosen_spanish_reading: El versículo afirma que el pastor se alegra más por la oveja recuperada que por las noventa y nueve que no se han extraviado, sin insinuar desinterés por las otras.
  alternative_spanish_readings:
  - La comparación debe suavizarse para no sugerir preferencia
  - La frase implica que las noventa y nueve valen menos
  rationale: La comparación μᾶλλον ἢ se mantiene como comparación real. La traducción conserva la tensión del dicho sin resolverla con una paráfrasis doctrinal.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan estrechamente; no se requieren revisiones sustantivas. Se conserva la estructura condicional idiomática, la fórmula solemne y la comparación sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aplica.
  - «Se alegra» evita una calca poco natural de χαίρω, pero conserva el valor afectivo fuerte.
  - Se deja implícita «ovejas» siguiendo el griego y el contexto inmediato.
  - La comparación con «más ... que» preserva el matiz de μᾶλλον ἢ sin teologizarlo.
