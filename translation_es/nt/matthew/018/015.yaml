translation:
  language: es
  text: Pero si tu hermano[a] peca contra ti[b], ve y repréndelo[c] entre tú y él a solas. Si te escucha, has ganado a tu hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermano» es gramaticalmente masculino singular; en contexto puede referirse más ampliamente a un condiscípulo.
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos omiten «contra ti» y leen: «Si tu hermano peca, ve y repréndelo entre tú y él a solas».'
    reason: textual_variant
  - marker: c
    text: O «corrígelo»; «repréndelo» refleja mejor el sentido de ἐλέγχω en este contexto que «reprocharle» o «confrontarlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτήσῃ
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - peca contra
  - comete pecado
  lexicon: BDAG
  rationale: ἁμαρτάνω expresa aquí una falta moral real; en español, «peca» mantiene el peso ético y religioso del verbo sin alargar innecesariamente la frase. Se evita suavizarlo como simple «falla» o «hace mal».
- source_word: εἰς σέ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - contra ti, en algunos manuscritos omitido
  - contra ti mismo
  lexicon: BDAG
  rationale: La preposición εἰς + acusativo en este contexto se naturaliza bien como «contra». Se conserva la fuerza relacional del agravio y se respeta la lectura larga del texto SBLGNT, con la variante documentada en nota.
- source_word: ἀδελφός σου
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano o hermana
  - tu compañero de fe
  lexicon: BDAG
  rationale: Se mantiene el singular masculino del griego como forma textual, sin expandir interpretativamente a un inclusivo en el cuerpo principal. «Hermano» conserva además el uso cristiano natural en español.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  lexicon: BDAG
  rationale: El imperativo breve «ve» reproduce con fidelidad la urgencia y concisión del mandato griego.
- source_word: ἔλεγξον
  english_pob_choice: reprove
  chosen_spanish: repréndelo
  alternatives_spanish:
  - repruébalo
  - corrígelo
  - muéstrale su falta
  lexicon: BDAG
  rationale: '«Repréndelo» recoge bien el valor de ἐλέγχω en este contexto: señalar la falta con autoridad moral. Se prefiere una forma más precisa y formal que «confronta», y menos interpretativa que «muéstrale su falta».'
- source_word: μεταξὺ σοῦ καὶ αὐτοῦ μόνου
  english_pob_choice: between you and him alone
  chosen_spanish: entre tú y él solos
  alternatives_spanish:
  - en privado, entre tú y él solos
  - entre ustedes dos solos
  lexicon: BDAG
  rationale: La frase destaca exclusividad y privacidad. «Entre tú y él solos» sigue de cerca la estructura griega y suena natural en español, preservando el énfasis en que nadie más intervenga.
- source_word: ἀκούσῃ
  english_pob_choice: listens to you
  chosen_spanish: te escucha
  alternatives_spanish:
  - oye
  - atiende a ti
  - te hace caso
  lexicon: BDAG
  rationale: En este marco de reconciliación, «te escucha» comunica receptividad obediente sin convertir el verbo en «obedecer», que sería más fuerte de lo que pide el contexto.
- source_word: ἐκέρδησας
  english_pob_choice: you have gained
  chosen_spanish: has ganado
  alternatives_spanish:
  - has ganado para ti
  - lo has ganado de nuevo
  lexicon: BDAG
  rationale: «Has ganado» preserva la metáfora de κερδαίνω sin añadir la idea de recuperar algo perdido. La expresión mantiene el valor relacional del resultado.
theological_decisions:
- issue: Alcance de ἀδελφός en contexto eclesial
  english_pob_reading: your brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu hermano o hermana
  - un hermano en la fe
  rationale: El griego usa un masculino singular; la redacción principal conserva esa forma. La aplicación a toda la comunidad puede inferirse por contexto, pero no se introduce como expansión interpretativa en el texto base.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Variante textual de εἰς σέ
  english_pob_reading: include 'against you' in the main text
  chosen_spanish_reading: incluir «contra ti» en el texto principal
  alternative_spanish_readings:
  - 'omitir la frase: «si tu hermano peca»'
  rationale: La base SBLGNT incluye εἰς σέ, por lo que la traducción principal también la incluye. Dado que existe una variante conocida que omite la frase, se documenta en una nota textual en vez de silenciarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El inglés POB pasó de «confront» a «reprove» para ἔλεγξον en una revisión posterior; esta versión española sigue esa decisión revisada con «repréndelo», manteniendo el tono formal y preciso. También conserva la nota textual sobre εἰς σέ y la observación de que ἀδελφός es masculíno singular, sin ampliar el texto principal.
  spanish_consistency_notes:
  - Se usa «hermano» y no una forma inclusiva en el cuerpo principal, en coherencia con la forma gramatical del griego y con la política POB documentada.
  - Se mantiene «contra ti» como equivalente idiomático de εἰς σέ, no como simple repetición de «peca».
  - «Te escucha» preserva el matiz de oír con receptividad en vez de exigir obediencia total.
  - La nota b conserva una alternativa léxica real en español sin sobrecargar el versículo principal.
