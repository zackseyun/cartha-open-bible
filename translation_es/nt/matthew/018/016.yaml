translation:
  language: es
  text: Pero si no le hace caso, toma contigo uno o dos más[a], para que por boca de dos o tres testigos[b] se establezca todo asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alusión a Deuteronomio 19:15, donde un asunto se establece por dos o tres testigos.
    reason: cross_reference
  - marker: b
    text: 'O, de manera más interpretativa: «por el testimonio de dos o tres testigos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσῃ
  english_pob_choice: does not listen
  chosen_spanish: no le hace caso
  alternatives_spanish:
  - no escucha
  - no oye
  lexicon: BDAG
  rationale: En este contexto disciplinario, ἀκούω implica oír con atención obediente. «No le hace caso» comunica con naturalidad la negativa a atender, sin reducirlo a mera percepción auditiva.
- source_word: παράλαβε
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - lleva contigo
  - toma contigo
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una acción concreta e inmediata. «Toma» conserva el tono directivo y es natural en español; el complemento «contigo» se expresa enseguida.
- source_word: μετὰ σοῦ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - con usted
  lexicon: BDAG
  rationale: μετά con genitivo indica compañía. «Contigo» reproduce esa relación de acompañamiento de forma idiomática en español.
- source_word: ἔτι ἕνα ἢ δύο
  english_pob_choice: one or two others
  chosen_spanish: uno o dos más
  alternatives_spanish:
  - uno o dos adicionales
  - uno o dos
  lexicon: BDAG
  rationale: ἔτι añade la idea de algo adicional. «Más» mantiene esa noción de añadido sin sobreexplicar «otros», que no está explícito en el griego.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» es la equivalencia natural en español y conserva la fuerza final de la cláusula.
- source_word: ἐπὶ στόματος
  english_pob_choice: by the mouth of
  chosen_spanish: por boca de
  alternatives_spanish:
  - por el testimonio de
  - con la boca de
  lexicon: BDAG
  rationale: Se conserva el giro semítico/legal de la expresión, con una formulación española comprensible. «Por boca de» mantiene la imagen de la fórmula bíblica sin aplanarla del todo.
- source_word: μαρτύρων
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testificadores
  lexicon: BDAG
  rationale: El sentido jurídico del término encaja con el contexto de confirmación. «Testigos» es la opción estándar y precisa en español.
- source_word: σταθῇ
  english_pob_choice: may be established
  chosen_spanish: se establezca
  alternatives_spanish:
  - sea confirmado
  - permanezca establecido
  lexicon: BDAG
  rationale: El pasivo aoristo subjuntivo de ἵστημι en este marco legal expresa que algo quede validado o establecido. «Se establezca» transmite bien esa idea en español contemporáneo.
- source_word: πᾶν ῥῆμα
  english_pob_choice: every matter
  chosen_spanish: toda palabra
  alternatives_spanish:
  - todo asunto
  - cada cosa
  - todo dicho
  lexicon: BDAG
  rationale: Aunque el contexto allude a una formulación legal, ῥῆμα significa literalmente «palabra» o «dicho». Se conserva «palabra» para no borrar la forma verbal del griego, que la POB inglesa también mantiene en la nota como alternativa interpretativa.
theological_decisions:
- issue: Alusión legal a Deuteronomio 19:15 y disciplina comunitaria
  english_pob_reading: Render the Deuteronomic witness formula in clear legal English while preserving some biblical idiom.
  chosen_spanish_reading: Traducir la fórmula con un español claro que conserve el giro bíblico «por boca de dos o tres testigos» y la idea de establecimiento.
  alternative_spanish_readings:
  - que toda causa se confirme por dos o tres testigos
  - para que todo asunto quede confirmado por dos o tres testigos
  rationale: El versículo alude a Deuteronomio 19:15 y aplica ese principio al proceso de disciplina dentro de la comunidad. Mantener la imagen de «boca» preserva la intertextualidad bíblica; «se establezca» comunica el valor jurídico sin forzar un término más específico que el griego no exige aquí.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de acuerdo fue alto y se mantuvo la solución previa sin ajustes necesarios.
  spanish_consistency_notes:
  - Se mantiene «testigos» para el campo jurídico y no «mártires», que en español evocaría otro sentido.
  - Se conserva «por boca de» como giro bíblico reconocible, en lugar de sustituirlo por una paráfrasis totalmente moderna.
  - «Toda palabra» retiene la cercanía formal con ῥῆμα; la nota ofrece la lectura más interpretativa en línea con el audit trail inglés.
  - «Se establezca» reproduce el valor pasivo subjuntivo legal de σταθῇ con una forma natural en español.
