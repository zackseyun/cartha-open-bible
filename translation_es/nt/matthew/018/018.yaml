review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego y sigue correctamente la decisión auditada de traducir ἔσται + participio perfecto pasivo con futuro perfecto pasivo: ‘habrá sido atado/desatado’. También preserva la pareja metafórica ‘atar/desatar’ y el contraste ‘en la tierra / en el cielo’. Sin embargo, ὅσα es neutro plural (‘cuantas cosas’, ‘todo lo que’) y en español su referente no debe tratarse como singular en la subordinada pasiva resultante; por eso ‘todo lo que aten… habrá sido atado’ suena discordante y menos fiel que una formulación plural o una reestructuración idiomática.'
  spanish_quality_summary: La redacción es clara y digna, pero presenta una aspereza gramatical en español por la discordancia entre ‘todo lo que’ y ‘habrá sido atado/desatado’. Una pequeña reformulación mejora mucho la naturalidad sin perder precisión. La puntuación y el tono son adecuados. La nota al pie es útil, pero conviene afinarla para que el español sea más natural y para reflejar mejor la alternativa tradicional completa.
  glossary_alignment: No hay conflictos con el glosario del proyecto. ‘En verdad’, ‘les digo’, ‘atar/desatar’, ‘en la tierra’ y ‘en el cielo’ están bien alineados con las decisiones léxicas y teológicas del POB. La corrección propuesta no altera terminología clave; solo ajusta número y fluidez en español.
  issues:
  - severity: medium
    issue: Discordancia singular/plural en ‘todo lo que … habrá sido atado/desatado’
    rationale: Aunque ‘todo lo que’ puede funcionar idiomáticamente, aquí la continuación con ‘habrá sido atado/desatado’ en singular produce un español menos natural y debilita la correspondencia con ὅσα, neutro plural. ‘Todas las cosas que … habrán quedado atadas/desatadas’ o estructura equivalente evita la fricción.
  - severity: low
    issue: La nota al pie puede expresarse con español más natural
    rationale: ‘La redacción aquí refleja el futuro con participio perfecto’ es comprensible, pero ‘esta redacción refleja el verbo en futuro con participio perfecto’ o similar fluye mejor en español eclesial general.
  revised_spanish_text: 'En verdad les digo[a]: todas las cosas que aten en la tierra habrán quedado atadas en el cielo, y todas las cosas que desaten en la tierra habrán quedado desatadas en el cielo.'
