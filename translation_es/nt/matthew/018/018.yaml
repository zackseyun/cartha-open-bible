translation:
  language: es
  text: 'En verdad les digo[a]: todas las cosas que aten en la tierra habrán quedado atadas en el cielo, y todas las cosas que desaten en la tierra habrán quedado desatadas en el cielo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «les digo ... serán atadas en el cielo ... serán desatadas en el cielo». La forma griega puede traducirse así, pero esta redacción refleja el verbo en futuro con participio perfecto, que puede indicar un estado ya establecido en el cielo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Ciertamente
  lexicon: BDAG
  rationale: ἀμήν introduce una afirmación solemne y autorizada. En español, 'En verdad' comunica esa fuerza con naturalidad en el discurso directo. 'Amén' es posible, pero aquí funcionaría menos transparentemente como fórmula introductoria dentro de la oración.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  lexicon: BDAG
  rationale: La fórmula verbal se expresa de modo directo y natural en español con 'les digo', manteniendo la autoridad y la dirección al auditorio sin rigidizarla como 'les digo a ustedes'.
- source_word: ὅσα ἐὰν
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - lo que sea que
  - cualquier cosa que
  lexicon: BDAG
  rationale: La construcción relativa indefinida se vierte con 'todo lo que', que conserva el alcance general e idiomático del griego sin sonar forzado en español.
- source_word: δήσητε
  english_pob_choice: bind
  chosen_spanish: aten
  alternatives_spanish:
  - isen
  - liguen
  lexicon: BDAG
  rationale: δέω significa literalmente 'atar, ligar, sujetar'. En este contexto se mantiene el verbo concreto 'atar' para preservar la metáfora y la posible fuerza jurídica/autoritaria sin reducirla a una sola interpretación.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - aquí en la tierra
  lexicon: BDAG
  rationale: La preposición con la expresión de lugar se traduce de forma directa como 'en la tierra', conservando el contraste espacial con 'en el cielo'.
- source_word: ἔσται δεδεμένα
  english_pob_choice: will have been bound
  chosen_spanish: habrá sido atado
  alternatives_spanish:
  - será atado
  - quedará atado
  lexicon: BDAG
  rationale: La combinación de futuro de εἰμί con participio perfecto pasivo apunta a un estado ya producido con resultado vigente. En español, el futuro perfecto pasivo 'habrá sido atado' refleja mejor esa anterioridad que el simple futuro 'será atado'.
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo de Dios
  - en los cielos
  lexicon: BDAG
  rationale: Aquí οὐρανῷ funciona como la esfera divina; en español 'cielo' es la equivalencia más natural y clara. Se evita 'cielos' porque el singular griego apunta al ámbito celeste/divino.
- source_word: λύσητε
  english_pob_choice: loose
  chosen_spanish: desaten
  alternatives_spanish:
  - liberen
  - suelten
  lexicon: BDAG
  rationale: λύω se traduce con 'desatar' para conservar la pareja verbal con 'atar' y mantener la imagen concreta del texto. 'Liberar' explicaría una posible aplicación, pero debilitaría la correspondencia lexical.
- source_word: ἔσται λελυμένα
  english_pob_choice: will have been loosed
  chosen_spanish: habrá sido desatado
  alternatives_spanish:
  - será desatado
  - quedará desatado
  lexicon: BDAG
  rationale: Como en la primera cláusula, el futuro perfecto pasivo español comunica mejor el estado ya establecido en el cielo que el simple futuro pasivo.
theological_decisions:
- issue: Fuerza temporal y teológica de la fórmula de atar/desatar
  english_pob_reading: ‘will have been bound/loosed in heaven’ rather than ‘will be bound/loosed in heaven.’
  chosen_spanish_reading: ‘habrá sido atado/desatado en el cielo’ en lugar de ‘será atado/desatado en el cielo’.
  alternative_spanish_readings:
  - será atado/desatado en el cielo
  - queda atado/desatado en el cielo
  rationale: La gramática griega ἔσται + participio perfecto pasivo sugiere una condición futura ya resultante de una acción anterior. La forma española elegida preserva esa tensión y evita convertir el dicho en una mera ratificación posterior de lo que hacen los discípulos en la tierra.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Alcance de la autoridad en la comunidad
  english_pob_reading: The earthly binding/loosing corresponds to what stands already bound/loosed in heaven, without importing a denominational theory of ecclesial authority.
  chosen_spanish_reading: La traducción mantiene la correlación entre la acción en la tierra y el estado en el cielo, sin añadir una teoría confesional sobre la autoridad eclesial.
  alternative_spanish_readings:
  - La iglesia decide y el cielo ratifica.
  - El cielo simplemente confirma decisiones humanas.
  rationale: El texto griego por sí mismo no obliga a una explicación denominacional específica. La traducción conserva la tensión entre la acción terrenal y el estado celestial, sin sobreinterpretar el pasaje.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Se siguió el mismo criterio de la revisión inglesa más reciente: mantener el valor aspectual del futuro + participio perfecto en ambas cláusulas, en vez de nivelarlo al futuro pasivo simple. No se registraron revisiones aplicadas adicionales para este versículo.'
  spanish_consistency_notes:
  - Se mantiene 'en el cielo' para οὐρανῷ, coherente con el singular griego y con el uso de esfera divina en español.
  - Se conserva la pareja verbal 'atar/desatar' para reflejar la simetría léxica del griego.
  - Se usa 'habrá sido ...' en ambas cláusulas para sostener la misma decisión aspectual.
  - Se traduce ἀμήν con 'En verdad' por estilo, reservando 'Amén' para casos donde la forma litúrgica sea parte del sentido.
