revisions:
- from: 'En verdad les digo[a]: todo lo que aten en la tierra habrá sido atado en el cielo, y todo lo que desaten en la tierra habrá sido desatado en el cielo.'
  to: 'En verdad les digo[a]: todas las cosas que aten en la tierra habrán quedado atadas en el cielo, y todas las cosas que desaten en la tierra habrán quedado desatadas en el cielo.'
  rationale: Se ajusta la subordinada relativa a plural (‘todas las cosas que’) para corresponder mejor a ὅσα y evitar la discordancia del singular pasivo en español. Se usa ‘habrán quedado atadas/desatadas’ porque suena más idiomático en español que ‘habrán sido atadas/desatadas’ y sigue comunicando el valor resultativo del futuro con participio perfecto. La nota se mantiene, pero con formulación más natural.
