base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/031.yaml
  text: Therefore[a], when his fellow slaves saw what had happened, they were deeply grieved[b], and they came and reported to their lord everything that had happened.
  footnotes:
  - marker: a
    text: Or 'fellow servants.' The Greek term is σύνδουλοι, literally 'fellow slaves' or 'fellow servants'; here 'slaves' is used because their bonded status under the same lord is important to the parable.
    reason: lexical_alternative
  - marker: b
    text: Or 'to their master.' The Greek word is κύριος, commonly rendered 'lord' or 'master' depending on context.
    reason: lexical_alternative
