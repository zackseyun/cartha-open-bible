    text: O «coesclavos». El griego σύνδουλοι significa literalmente personas que comparten condición de esclavitud o servicio bajo el mismo señor. Aquí se prefiere «compañeros esclavos» para conservar esa fuerza de manera natural en español.
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente σύνδουλοι para preservar la fuerza de esclavitud compartida documentada en la auditoría inglesa y en la política del proyecto sobre δοῦλος. También se mejora la naturalidad del español reemplazando 'lo informaron a su señor' por 'informaron a su señor' y ajustando la secuencia verbal a una forma más fluida. Se elimina la nota b anterior porque el inglés no la asigna a ἐλυπήθησαν σφόδρα sino a κύριος, y aquí la necesidad principal de nota en español recae sobre σύνδουλοι.
