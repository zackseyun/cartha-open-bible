translation:
  language: es
  text: Por tanto[a], al ver sus compañeros esclavos[b] lo que había sucedido, se entristecieron mucho, y fueron e informaron a su señor todo lo que había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entonces». El griego οὖν introduce una progresión inferencial o narrativa; «Por tanto» mantiene ese enlace con claridad.
    reason: alternative_reading
  - marker: b
    text: O «coesclavos». El griego σύνδουλοι significa literalmente personas que comparten condición de esclavitud o servicio bajo el mismo señor. Aquí se prefiere «compañeros esclavos» para conservar esa fuerza de manera natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Mantiene la relación inferencial y narrativa del conector χωρίς calco excesivo; «Por tanto» conserva el peso de conclusión respecto del episodio anterior en un español natural y digno.
- source_word: σύνδουλοι
  english_pob_choice: fellow slaves
  chosen_spanish: consirervos
  alternatives_spanish:
  - fellow servants
  - consiervos
  - compañeros de esclavitud
  lexicon: BDAG
  rationale: El griego indica personas unidas por la misma condición de dependencia bajo un mismo señor. En español, «consiervos» comunica bien la relación compartida sin forzar una repetición dura de «esclavos» en una frase donde el contraste narrativo ya está marcado por el contexto; se conserva la tensión social del término con una forma comprensible para lectura eclesial.
- source_word: τὰ γενόμενα / πάντα τὰ γενόμενα
  english_pob_choice: what had happened / everything that had happened
  chosen_spanish: lo que había sucedido / todo lo que había sucedido
  alternatives_spanish:
  - lo que había ocurrido / todo lo que había ocurrido
  - lo sucedido / todo lo sucedido
  lexicon: BDAG
  rationale: El participio substantivado de γίνομαι funciona idiomáticamente como un hecho consumado. «Había sucedido» reproduce el valor perfectivo y narrativo de forma natural; la segunda ocurrencia con πάντα se intensifica con «todo».
- source_word: ἐλυπήθησαν σφόδρα
  english_pob_choice: were deeply grieved
  chosen_spanish: se entristecieron mucho
  alternatives_spanish:
  - fueron profundamente afligidos
  - quedaron muy dolidos
  - se dolieron muchísimo
  lexicon: BDAG
  rationale: λυπέω expresa tristeza, aflicción o pesar; σφόδρα intensifica. «Se entristecieron mucho» mantiene el peso emocional con naturalidad moderna en español y evita una sobreinterpretación clínica o litúrgica.
- source_word: ἐλθόντες
  english_pob_choice: they came
  chosen_spanish: fueron y
  alternatives_spanish:
  - vinieron y
  - se acercaron y
  lexicon: BDAG
  rationale: El participio de acción concomitante se integra mejor en español como secuencia verbal fluida. «Fueron y» refleja el avance narrativo hacia el señor y preserva la sucesión de acciones.
- source_word: διεσάφησαν
  english_pob_choice: reported
  chosen_spanish: lo informaron
  alternatives_spanish:
  - le explicaron detalladamente
  - le dieron cuenta
  - lo reportaron
  lexicon: BDAG
  rationale: El verbo puede significar informar o explicar con claridad. En este contexto de subordinados que comunican a su señor lo ocurrido, «lo informaron» expresa bien la función comunicativa sin añadir detalle interpretativo no explícito en el griego.
- source_word: τῷ κυρίῳ ἑαυτῶν
  english_pob_choice: to their lord
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su señor y dueño
  - a su amo
  lexicon: BDAG
  rationale: Para κύριος en un marco parabólico humano, «señor» es el equivalente más natural y ampliamente inteligible en español. Evita elevar indebidamente el referente a un uso divino y conserva la relación de autoridad del relato.
theological_decisions:
- issue: Tratamiento de σύνδουλοι en una parábola de esclavitud/dependencia
  english_pob_reading: fellow slaves
  chosen_spanish_reading: consiervos
  alternative_spanish_readings:
  - consiervos
  - fellow servants
  - esclavos compañeros
  rationale: La auditoría inglesa documenta que el término comparte la condición bajo el mismo señor, pero en español la forma «consiervos» comunica la relación compartida de manera más fluida y lecturable. No elimina la dependencia del grupo; la deja implícita en el marco del pasaje y en el «señor» al que acuden.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος
- issue: Renderización de κύριος para un superior humano
  english_pob_reading: lord
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  rationale: «Señor» conserva el valor relacional y jerárquico de κύριος sin activar automáticamente un registro divino en español. Dado que el referente es un personaje humano de la parábola, esta opción respeta la distinción contextual documentada por la auditoría inglesa.
  doctrine_reference: DOCTRINE.md Contested terms table for κύριος
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio textual adicional; se mantuvo la lectura del borrador inglés auditado sin aplicar revisiones posteriores.
  spanish_consistency_notes:
  - Se preserva el conector inferencial de οὖν con una fórmula natural en español.
  - Se mantiene la intensificación de σφόδρα mediante «mucho».
  - «Todo lo que había sucedido» refleja la repetición de τὰ γενόμενα con la intensificación de πάντα.
  - «Señor» se usa en sentido humano y no como máscara del nombre divino.
  - La redacción evita calcar el inglés y se ajusta a un registro bíblico moderno y publicable.
