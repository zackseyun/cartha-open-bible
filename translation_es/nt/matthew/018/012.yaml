translation:
  language: es
  text: ¿Qué les parece? Si un hombre tiene cien ovejas, y una de ellas se extravía[a], ¿no dejará las noventa y nueve en los montes[b] e irá a buscar a la que se extravía[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anda errante». El verbo griego puede significar «extraviarse», «andar errante» o, en algunos contextos, «ser llevado por mal camino».
    reason: lexical_alternative
  - marker: b
    text: O «en las colinas».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «la que se extravía»; tradicionalmente, «la perdida».
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ὑμῖν δοκεῖ
  english_pob_choice: What do you think?
  chosen_spanish: ¿Qué les parece?
  alternatives_spanish:
  - ¿Qué piensan?
  - ¿Qué opinan?
  lexicon: BDAG
  rationale: Es una pregunta idiomática que invita al juicio de los oyentes. «¿Qué les parece?» mantiene el tono directo y natural en español, sin perder el carácter de evaluación implícita del griego.
- source_word: ἐὰν γένηταί τινι ἀνθρώπῳ
  english_pob_choice: If a man has
  chosen_spanish: Si un hombre tiene
  alternatives_spanish:
  - Si alguien tiene
  - Si cierto hombre tiene
  lexicon: BDAG
  rationale: La construcción griega con γίνομαι + dativo expresa situación o posesión efectiva. «Un hombre» conserva el singular masculino genérico del texto y evita neutralizar la forma gramatical del original.
- source_word: ἑκατὸν πρόβατα
  english_pob_choice: a hundred sheep
  chosen_spanish: cien ovejas
  alternatives_spanish:
  - cien carneros
  - cien rebaños
  lexicon: BDAG
  rationale: «Ovejas» es el equivalente natural de πρόβατα en este contexto pastoral. Se mantiene el número literal sin ampliaciones interpretativas.
- source_word: πλανηθῇ ἓν ἐξ αὐτῶν
  english_pob_choice: one of them goes astray
  chosen_spanish: una de ellas se extravía
  alternatives_spanish:
  - una de ellas se desvía
  - una de ellas anda errante
  lexicon: BDAG
  rationale: «Se extravía» conserva el sentido de πλανάω en voz pasiva sin cargar de más la agencia. En español suena natural y retiene la metáfora de la oveja que se aparta.
- source_word: οὐχὶ ἀφήσει
  english_pob_choice: will he not leave
  chosen_spanish: ¿no dejará
  alternatives_spanish:
  - ¿no abandonará
  - ¿no soltará
  lexicon: BDAG
  rationale: «Dejará» reproduce el valor temporal y el sentido de apartarse momentáneamente, más suave que «abandonará», que sería excesivo para este contexto.
- source_word: τὰ ἐνενήκοντα ἐννέα
  english_pob_choice: the ninety-nine
  chosen_spanish: las noventa y nueve
  alternatives_spanish:
  - los noventa y nueve
  lexicon: BDAG
  rationale: Se traslada de forma directa el numeral con concordancia femenina por el sustantivo implícito «ovejas» en español.
- source_word: ἐπὶ τὰ ὄρη
  english_pob_choice: on the mountains
  chosen_spanish: en los montes
  alternatives_spanish:
  - en las montañas
  - en las colinas
  lexicon: BDAG
  rationale: «Montes» conserva el referente topográfico concreto de ὄρη y suena más natural que «montañas» en este tipo de contexto bíblico, sin recurrir a una glosa interpretativa como «colinas».
- source_word: καὶ πορευθεὶς ζητεῖ
  english_pob_choice: and go and seek
  chosen_spanish: y, yendo, buscará
  alternatives_spanish:
  - y va y busca
  - y va a buscar
  lexicon: BDAG
  rationale: La forma participial más el verbo principal se refleja con una construcción española que conserva la secuencia de acciones. «Buscará» mantiene la cercanía con ζητεῖ y el registro algo más formal que «va a buscar».
- source_word: τὸ πλανώμενον
  english_pob_choice: the one going astray
  chosen_spanish: la que se extravía
  alternatives_spanish:
  - la extraviada
  - la que anda errante
  - la perdida
  lexicon: BDAG
  rationale: 'Se conserva el participio presente como acción en curso: «la que se extravía». Así no se reemplaza por «la perdida», que introduciría otra raíz semántica y una resonancia teológica no explicitada por el griego.'
theological_decisions:
- issue: Masculino genérico en τινι ἀνθρώπῳ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - alguien
  - una persona
  rationale: El griego usa una forma masculina singular con valor representativo. Se conserva esa forma para no aplanar la marca gramatical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Riesgo de sobreinterpretar πλανάω como 'perdido'
  english_pob_reading: goes astray / the one going astray
  chosen_spanish_reading: se extravía / la que se extravía
  alternative_spanish_readings:
  - se desvía / la desviada
  - anda errante / la errante
  - se pierde / la perdida
  rationale: La elección preserva la imagen pastoral y la tensión lexical de πλανάω sin importar la terminología de ἀπόλλυμι ('perder'). Así se mantiene la relación entre el verbo finito y el participio presente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés, que prefirió «seek» frente a «look for» por mayor correspondencia con ζητεῖ y un registro ligeramente más formal. Por ello se eligió «buscará» en lugar de una paráfrasis más coloquial. También se preservó la doble ocurrencia de la idea de extraviarse mediante «se extravía / la que se extravía».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto, aunque este versículo no lo requiere.
  - Se usa «extraviarse» de manera consistente para πλανάω en la cláusula verbal y en el participio.
  - La forma de pregunta inicial conserva el tono discursivo directo del griego.
  - Se evitó «Cristo» u otra terminología no pertinente al versículo.
  - La puntuación refleja una frase en una sola unidad interrogativa, con ritmo cercano al original.
