    text: Or 'wanders off.' The Greek verb can mean 'go astray,' 'wander,' or in some contexts 'be led astray.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the hills.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the one going astray'; traditionally 'the lost one.'
    reason: lexical_alternative
