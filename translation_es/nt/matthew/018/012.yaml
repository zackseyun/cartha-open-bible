  text: τί ὑμῖν δοκεῖ; ἐὰν γένηταί τινι ἀνθρώπῳ ἑκατὸν πρόβατα καὶ πλανηθῇ ἓν ἐξ αὐτῶν, οὐχὶ ⸀ἀφήσει τὰ ἐνενήκοντα ἐννέα ἐπὶ τὰ ὄρη ⸀καὶ πορευθεὶς ζητεῖ τὸ πλανώμενον;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/012.yaml
  text: What do you think? If a man has a hundred sheep[a], and one of them goes astray[c][b], will he not leave the ninety-nine on the mountains and go and seek the one going astray?
  footnotes:
