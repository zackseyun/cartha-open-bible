translation:
  language: es
  text: Por tanto[a], el que se humille como este niño es el más importante en el reino de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa formas masculinas singulares («el que ... se humille ... es»), con valor genérico para cualquier persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: whoever
  chosen_spanish: el que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: La forma indefinida introduce una regla general. «El que» comunica bien el valor proverbial y condicional en español, con naturalidad y sin perder la apertura del griego.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca conclusión lógica a partir de lo dicho antes. «Por tanto» conserva mejor la fuerza inferencial que opciones más ligeras.
- source_word: ταπεινώσει ἑαυτὸν
  english_pob_choice: humbles himself
  chosen_spanish: se humille
  alternatives_spanish:
  - se humilla
  - se haga humilde
  lexicon: BDAG
  rationale: El futuro griego tiene valor gnómico en esta sentencia general. En español, el subjuntivo en la cláusula relativa condicional expresa bien la generalidad. El reflexivo conserva el énfasis en la auto-humillación.
- source_word: ὡς τὸ παιδίον τοῦτο
  english_pob_choice: like this child
  chosen_spanish: como este niño
  alternatives_spanish:
  - como este pequeño niño
  - así como este niño
  lexicon: BDAG
  rationale: ὡς expresa comparación. «Niño» es el equivalente natural de παιδίον; no se añade «pequeño» porque el sustantivo por sí solo ya basta y el inglés POB decidió no amplificar.
- source_word: ὁ μείζων
  english_pob_choice: the greatest
  chosen_spanish: el mayor
  alternatives_spanish:
  - el más grande
  - el mayor de todos
  lexicon: BDAG
  rationale: Aunque μορfológicamente es comparativo, aquí funciona con sentido superlativo por el contexto de rango. «El mayor» transmite esa idea de superioridad/rango de manera sobria y fiel.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  english_pob_choice: in the kingdom of heaven
  chosen_spanish: en el reino de los cielos
  alternatives_spanish:
  - en el reino del cielo
  - en el reino de los cielos
  lexicon: BDAG
  rationale: Se conserva la expresión mateana habitual en español, que traduce de manera clara la circunlocución reverencial del griego. «Reino de los cielos» respeta la fórmula sin suavizarla a un lenguaje más abstracto.
theological_decisions:
- issue: Referencia genérica con forma masculina singular
  english_pob_reading: he is / himself
  chosen_spanish_reading: el que ... se humille ... es
  alternative_spanish_readings:
  - quien ... se humille ... es
  - la persona que ... se humille ... es
  rationale: El griego usa formas masculinas singulares con valor genérico. El español mantiene esa estructura con «el que» y un verbo singular, sin introducir pluralización ni neutralizaciones que borren el eco formal del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de μείζων en contexto de jerarquía
  english_pob_reading: the greatest
  chosen_spanish_reading: el mayor
  alternative_spanish_readings:
  - el más grande
  - el principal
  rationale: En este contexto, el comparativo articular señala al que ocupa el lugar más alto. «El mayor» conserva la idea de rango sin sonar forzado en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se ajustó la nota generizada para que el marcador [a] aparezca en el texto español, corrigiendo la validación anterior. La redacción mantiene la relación inferencial de οὖν, el comparativo articular μείζων y el valor gnómico del futuro griego.
  spanish_consistency_notes:
  - Se mantiene «reino de los cielos» como equivalente fijo de la expresión mateana.
  - Se prefirió «el que» para el indefinido griego, por naturalidad y por conservar el valor proverbial.
  - «Se humille» conserva la auto-referencia reflexiva de ἑαυτόν.
  - No se añadió «pequeño» a «niño», siguiendo la sobriedad del POB inglés.
