    rationale: Aunque intenta conservar el matiz medio de προσκαλεσάμενος, en español bíblico natural 'llamando a un niño hacia sí' suena calcada. Conviene expresar que Jesús hizo que el niño se acercara a él de manera más fluida.
  - severity: low
    issue: Formato de la nota al pie mejorable.
    rationale: 'La nota actual incluye comillas y puntuación poco naturales: ''''O: «entre ellos».'''' Es preferible una forma simple y consistente, por ejemplo: ''O: «entre ellos».'''
  revised_spanish_text: Y llamando a un niño para que se acercara a él,[a] lo puso en medio de ellos.
