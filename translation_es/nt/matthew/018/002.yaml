translation:
  language: es
  text: Y llamando a un niño para que se acercara a él,[a] lo puso en medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: La conjunción simple mantiene la continuidad narrativa sin añadir matices temporales que el griego no exige.
- source_word: προσκαλεσάμενος
  english_pob_choice: calling a child to himself
  chosen_spanish: llamando a un niño hacia sí
  alternatives_spanish:
  - habiendo llamado a un niño
  - llamando a un niño para sí
  lexicon: BDAG
  rationale: El participio aoristo medio expresa que Jesús hace que el niño se acerque a él; 'hacia sí' conserva esa dirección sin sobredetallar una invitación formal.
- source_word: παιδίον
  english_pob_choice: a child
  chosen_spanish: un niño
  alternatives_spanish:
  - un niño pequeño
  - un pequeñuelo
  lexicon: BDAG
  rationale: '''Niño'' comunica con naturalidad el referente personal del diminutivo griego sin forzar la diminución más de lo que el contexto requiere.'
- source_word: ἔστησεν
  english_pob_choice: he set him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo hizo estar
  lexicon: BDAG
  rationale: En este contexto, ἵστημι en aoristo activo significa hacer que alguien quede en una posición/ubicación; 'lo puso' es natural en español y mantiene la idea de situarlo en un lugar preciso.
- source_word: ἐν μέσῳ αὐτῶν
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su medio
  - entre ellos
  lexicon: BDAG
  rationale: La expresión señala el centro espacial del grupo; 'en medio de ellos' es idiomático y transparente en español.
- source_word: αὐτὸ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Aunque παιδίον es neutro gramaticalmente, el referente es un niño personal; el objeto directo pronominal 'lo' es la forma natural en español.
translation_notes:
  revision_awareness: Se incorporó la alternativa inglesa de ἔστησεν ('set him') como 'lo puso', evitando el calco impropio 'lo sentó' o una paráfrasis más interpretativa. La nota reproduce la alternativa espacial documentada por la POB en inglés ('among them') como posibilidad válida en español.
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sobrio y readable.
  - No se introduce terminología eclesiástica ajena al griego.
  - Se conserva el sujeto implícito de Jesús por continuidad del contexto, como en el inglés auditado.
