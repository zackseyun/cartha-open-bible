translation:
  language: es
  text: Por este motivo, el reino de los cielos ha venido a ser semejante a un rey que quiso ajustar cuentas con sus esclavos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos» o «sirvientes»; el griego dice «esclavos» (δοῦλοι), subrayando su condición de dependencia bajo el rey.
    reason: alternative_reading
  - marker: b
    text: O «ha sido comparado con» o «fue hecho semejante a». El griego ὡμοιώθη es una pasiva de comparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por este motivo
  alternatives_spanish:
  - Por esta razón
  - Por lo tanto
  - A causa de esto
  lexicon: BDAG
  rationale: Expresa la relación inferencial/causal con la escena anterior de manera natural en español, manteniendo el enlace explicativo sin endurecerlo en una conclusión lógica excesiva.
- source_word: ὡμοιώθη
  english_pob_choice: has become like
  chosen_spanish: se ha semejado
  alternatives_spanish:
  - ha sido comparado con
  - es como
  - fue hecho semejante a
  lexicon: BDAG
  rationale: La pasiva de ὁμοιόω introduce comparación; «se ha semejado» conserva el valor verbal y la comparación sin volverlo una equivalencia plana.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reino celestial
  lexicon: BDAG
  rationale: Es la expresión mateana estable y reverente; en español, «cielos» mantiene el circunloquio plural del griego y la forma habitual del evangelio.
- source_word: ἀνθρώπῳ βασιλεῖ
  english_pob_choice: a king
  chosen_spanish: a un rey
  alternatives_spanish:
  - a un hombre, rey
  - a un rey humano
  lexicon: BDAG
  rationale: El dativo presenta a la figura como «hombre, rey»; en español la idea se comunica con naturalidad como «un rey», sin perder el matiz de persona real que sigue siendo central.
- source_word: ἠθέλησεν
  english_pob_choice: wanted
  chosen_spanish: quiso
  alternatives_spanish:
  - deseó
  - quiso hacer
  - decidió
  lexicon: BDAG
  rationale: ἠθέλησεν expresa voluntad o intención; «quiso» es breve, preciso y adecuado al tono narrativo.
- source_word: συνᾶραι λόγον
  english_pob_choice: to settle accounts
  chosen_spanish: hacer cuentas
  alternatives_spanish:
  - ajustar cuentas
  - rendir cuentas
  - liquidar cuentas
  lexicon: BDAG
  rationale: El giro idiomático alude a un recuento/ajuste económico-judicial. «Hacer cuentas» es idiomático en español y mantiene la idea de convocatoria para revisar obligaciones; en nota se preserva la alternativa más forense si el lector la necesita.
- source_word: μετὰ τῶν δούλων αὐτοῦ
  english_pob_choice: with his slaves
  chosen_spanish: con sus esclavos
  alternatives_spanish:
  - con sus siervos
  - con sus criados
  - con sus siervos esclavos
  lexicon: BDAG
  rationale: δοῦλοι denota estatus de esclavitud/posesión. En este contexto de rey y rendición de cuentas, «esclavos» preserva la fuerza lexical y la relación de dependencia obligada.
theological_decisions:
- issue: Renderización de δοῦλοι en un contexto parabólico real-económico
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - bondservicios
  rationale: Siguiendo el criterio del POB para δοῦλος cuando el estatus sometido es relevante, «esclavos» hace explícita la relación de pertenencia y obligación ante el rey. «Siervos» suaviza indebidamente la tensión social del término.
  doctrine_reference: 'DOCTRINE.md: contested terms for δοῦλος; translation philosophy on lexical transparency'
- issue: Valor de la pasiva de ὡμοιώθη
  english_pob_reading: has become like
  chosen_spanish_reading: se ha semejado
  alternative_spanish_readings:
  - ha sido comparado con
  - es como
  - fue hecho semejante a
  rationale: La pasiva aorística no debe vaciarse en una simple cópula. «Se ha semejado» conserva la acción comparativa introducida por el verbo sin sobreinterpretarla.
  doctrine_reference: Greco-syntax audit trail for ὁμοιόω in Matthean parables
translation_notes:
  revision_awareness: El borrador sigue el pasaje base sin introducir cambios textuales ni armonizaciones. Se mantiene la comparación verbal de ὡμοιώθη y el matiz fuerte de δοῦλοι; la única decisión de estilo fue escoger una formulación española natural («se ha semejado», «hacer cuentas») que conserve la estructura semántica del griego y el audit trail inglés. No se detectaron revisiones aplicadas en la fuente de control.
  spanish_consistency_notes:
  - Se usa «reino de los cielos» como término mateano estable, no «reino del cielo», para mantener consistencia interna del evangelio.
  - Se emplea «esclavos» para δοῦλοι según el estándar POB cuando la condición de subordinación es contextualmente saliente.
  - «Hacer cuentas» preserva el sentido idiomático de συνᾶραι λόγον sin convertirlo en una paráfrasis más extensa.
  - La puntuación reproduce el cierre con punto y coma implícito del griego mediante coma final en español de estilo narrativo, sin añadir contenido.
