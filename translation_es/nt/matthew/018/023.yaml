    reason: alternative_reading
  - marker: b
    text: O «ha sido comparado con» o «fue hecho semejante a». El griego ὡμοιώθη es una pasiva de comparación.
    reason: lexical_alternative
  revision_rationale: Se corrige la representación de ὡμοιώθη a una construcción española más natural y fiel al valor pasivo-comparativo, y se refuerza συνᾶραι λόγον con «ajustar cuentas», que expresa mejor la revisión formal de cuentas en este contexto parabólico. También se mejora la nota alternativa sobre δοῦλοι evitando «criados».
