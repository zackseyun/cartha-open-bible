  text: καὶ εἶπεν· Ἀμὴν λέγω ὑμῖν, ἐὰν μὴ στραφῆτε καὶ γένησθε ὡς τὰ παιδία, οὐ μὴ εἰσέλθητε εἰς τὴν βασιλείαν τῶν οὐρανῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/003.yaml
  text: And he said[a], “Truly I say to you, unless you turn and become like children[c][b], you will certainly not enter the kingdom of heaven.”
  footnotes:
  - marker: a
    text: Or 'like children.' The Greek has 'like the children,' likely echoing the child Jesus had set before them in the immediate context.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will never enter.' The Greek uses an emphatic negation.
    reason: lexical_alternative
  - marker: c
    text: '''Turn'' can also be rendered ''be turned'' or, in older English tradition, ''be converted.'''
    reason: alternative_reading
