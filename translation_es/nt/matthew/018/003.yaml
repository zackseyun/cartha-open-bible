translation:
  language: es
  text: 'Y dijo: «En verdad les digo que, si no se vuelven y llegan a ser como los niños, ustedes no entrarán jamás[a] en el reino de los cielos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ningún modo entrarán». El griego usa una negación enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - De cierto
  lexicon: BDAG
  rationale: En español, «En verdad» comunica la fórmula solemne y autoritativa sin introducir una transliteración opaca ni un arcaísmo innecesario.
- source_word: στραφῆτε
  english_pob_choice: turn
  chosen_spanish: se vuelven
  alternatives_spanish:
  - se conviertan
  - se vuelvan atrás
  - se giren
  lexicon: BDAG
  rationale: El verbo puede expresar una vuelta decisiva de orientación. «Se vuelvan» conserva el sentido de reorientación sin imponer el tecnicismo eclesiástico de «convertirse».
- source_word: γένησθε
  english_pob_choice: become
  chosen_spanish: llegan a ser
  alternatives_spanish:
  - se hagan
  - se conviertan en
  lexicon: BDAG
  rationale: «Llegan a ser» refleja el cambio de estado de γίνομαι de manera natural en español y encaja bien con la coordinación con «se vuelvan».
- source_word: ὡς τὰ παιδία
  english_pob_choice: like children
  chosen_spanish: como los niños
  alternatives_spanish:
  - como niños
  - como los pequeños
  lexicon: BDAG
  rationale: La referencia concreta a παιδία se mantiene con «los niños». El artículo en griego puede sonar genérico; en español, «como los niños» es natural y fiel sin forzar una cualidad no explicitada.
- source_word: οὐ μὴ εἰσέλθητε
  english_pob_choice: you will certainly not enter
  chosen_spanish: no entrarán de ninguna manera[a]
  alternatives_spanish:
  - no entrarán jamás
  - de ningún modo entrarán
  lexicon: BDAG
  rationale: La negación enfática οὐ μή pide una traducción igualmente fuerte. «No entrarán de ninguna manera» comunica la certeza negativa con naturalidad en español contemporáneo. La nota marca que también puede entenderse como negación absoluta/ intensificada.
- source_word: βασιλείαν τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reino celestial
  lexicon: BDAG
  rationale: Mateo usa la expresión establecida «el reino de los cielos». Es el equivalente idiomático y fiel de la fórmula mateana, sin sustituirla por una paráfrasis.
theological_decisions:
- issue: Sentido de στραφῆτε en contexto discipular
  english_pob_reading: Render as 'turn' without importing a technical term such as 'be converted'.
  chosen_spanish_reading: «se vuelvan» sin tecnicismo doctrinal
  alternative_spanish_readings:
  - se conviertan
  - sean convertidos
  rationale: El texto llama a un giro decisivo y a una nueva disposición, pero el griego no exige el término técnico de conversión. La formulación española mantiene la tensión entre cambio de orientación y transformación sin añadir un sistema interpretativo externo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia de παιδία en la comparación
  english_pob_reading: Translate concretely as 'children' rather than abstracting to qualities such as innocence or humility in the main text.
  chosen_spanish_reading: «como los niños»
  alternative_spanish_readings:
  - como niños
  - como pequeños
  rationale: La comparación se conserva concreta. No se explicita en el texto principal una cualidad moral específica, para no cerrar la apertura interpretativa del pasaje.
  doctrine_reference: Translation philosophy §3
- issue: Fuerza de la negación οὐ μή
  english_pob_reading: you will certainly not enter
  chosen_spanish_reading: «no entrarán de ninguna manera»
  alternative_spanish_readings:
  - no entrarán jamás
  - de ningún modo entrarán
  rationale: La negación enfática se traduce con una forma que en español mantiene el carácter absoluto y solemne del original. La nota ayuda a advertir la intensidad, equivalente a una negación reforzada.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa revisó «the children» a «children» por ser más natural y más cercana al sentido genérico de τὰ παιδία. La redacción española siguió esa decisión con «los niños», manteniendo el valor genérico y concreto. También se preservó la negación enfática de οὐ μή con una fórmula española intensificada.
  spanish_consistency_notes:
  - Se mantuvo «reino de los cielos» como equivalente establecido de la fórmula mateana.
  - Se evitó «convertirse» para no introducir un tecnicismo doctrinal que el griego no exige.
  - «Niños» conserva la comparación concreta sin añadir rasgos como «inocencia» o «humildad» que no están explícitos en el verso.
  - La nota [a] está anclada en el texto y corresponde a la intensidad de la negación griega.
