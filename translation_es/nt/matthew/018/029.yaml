translation:
  language: es
  text: 'Entonces su coesclavo cayó y le rogaba[a], diciendo: «Ten paciencia conmigo, y te lo pagaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consiervo». El griego σύνδουλος denota a uno que comparte el mismo señor; aquí se traduce «coesclavo» porque en la parábola es prominente la relación de esclavitud vinculada a la deuda y al señor.
    reason: alternative_reading
lexical_decisions:
- source_word: σύνδουλος
  english_pob_choice: fellow slave
  chosen_spanish: consiervo
  alternatives_spanish:
  - compañero esclavo
  - fellow slave
  lexicon: BDAG
  rationale: El griego σύνδουλος indica a alguien que comparte la misma condición de esclavo bajo un mismo señor. En español, «consiervo» comunica la relación compartida de servicio/subordinación sin sonar tan abrupto como «esclavo», y mantiene la idea de vínculo mutuo en la parábola. Dado el registro bíblico en español, esta forma preserva la fuerza relacional del término.
- source_word: παρεκάλει
  english_pob_choice: pleaded
  chosen_spanish: le rogaba
  alternatives_spanish:
  - le suplicaba
  - le imploraba
  - le pedía con insistencia
  lexicon: BDAG
  rationale: El imperfecto expresa una petición insistente y continuada. «Le rogaba» transmite bien esa insistencia en español moderno y encaja con el tono de súplica del contexto de deuda y misericordia.
- source_word: Μακροθύμησον
  english_pob_choice: Be patient
  chosen_spanish: Ten paciencia
  alternatives_spanish:
  - Sé paciente
  - Ten longanimidad
  - Ten paciencia conmigo
  lexicon: BDAG
  rationale: El imperativo pide forbearancia o paciencia. «Ten paciencia» es natural, claro y fiel al valor exhortativo del verbo, sin recurrir a un calco arcaico.
- source_word: ἐπ’ ἐμοί
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - para conmigo
  - hacia mí
  lexicon: BDAG
  rationale: La construcción idiomática significa la paciente consideración solicitada por el hablante. «Conmigo» es la forma más natural y exacta en español.
- source_word: ἀποδώσω
  english_pob_choice: I will repay
  chosen_spanish: te lo pagaré
  alternatives_spanish:
  - te lo retribuiré
  - te lo devolveré
  - te pagaré
  lexicon: BDAG
  rationale: En contexto de deuda, el verbo expresa devolver lo debido. «Te lo pagaré» comunica claramente la obligación de deuda en español; se incluye «lo» para hacer explícito el objeto implícito y evitar ambigüedad.
- source_word: πεσὼν
  english_pob_choice: fell down
  chosen_spanish: cayó
  alternatives_spanish:
  - se postró
  - cayó al suelo
  - cayó de rodillas
  lexicon: BDAG
  rationale: El participio aoristo describe una acción física de caer en actitud de súplica. «Cayó» es fiel al núcleo semántico, y el contexto de súplica ya aporta la postura reverente sin necesidad de amplificación.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  - Y entonces
  lexicon: BDAG
  rationale: Aquí funciona como conector narrativo-secuencial. «Entonces» conserva el avance de la escena con naturalidad en español.
theological_decisions:
- issue: σύνδουλος y la fuerza social de δουλος-language
  english_pob_reading: Use 'fellow slave' in the main text because the bonded relationship is prominent in the parable.
  chosen_spanish_reading: Usar «consiervo» en el texto principal para preservar la relación subordinada compartida sin perder legibilidad.
  alternative_spanish_readings:
  - compañero esclavo
  - coesclavo
  - siervo
  rationale: El contexto de la parábola pone en primer plano la dependencia frente al señor y la relación compartida entre subordinados. «Consiervo» mantiene esa conexión sin caer en una traducción demasiado áspera para el lector general. «Siervo» suavizaría indebidamente la fuerza del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tabla de términos disputados para δοῦλος
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido del griego SBLGNT y el criterio auditado de la POB inglesa: οὖν como conector narrativo, παρεκάλει con valor de súplica insistente, Μακροθύμησον como petición de paciencia, ἐπ’ ἐμοί como «conmigo», y ἀποδώσω en clave de deuda como promesa de pago. No hubo revisiones posteriores al último pase auditado.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» como máscara para el nombre divino porque este versículo no contiene el Tetragrámaton ni κύριος con referencia divina.
  - «Consiervo» se usa como solución española principal para σύνδουλος, manteniendo la relación de servicio compartido sin recurrir a una paráfrasis.
  - El objeto directo de ἀποδώσω se expresa con «lo» para clarificar la referencia al dinero/deuda implícita en el contexto.
