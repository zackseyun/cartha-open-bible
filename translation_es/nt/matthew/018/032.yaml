translation:
  language: es
  text: 'Entonces su amo lo llamó y le dijo: «¡Esclavo malvado[a]! Te perdoné[b] toda aquella deuda, porque me rogaste».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «malo». El griego πονηρέ expresa un reproche moral fuerte; se eligió «malvado» para reflejar mejor ese matiz en español.
    reason: lexical_alternative
  - marker: b
    text: O «te cancelé» o «te remití» toda aquella deuda. El verbo griego puede referirse a remitir una deuda; aquí se conserva «te perdoné» para mantener la conexión mateana entre deuda y perdón.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Así que
  lexicon: BDAG
  rationale: Conector temporal/narrativo natural en español para introducir la acción siguiente en la parábola.
- source_word: προσκαλεσάμενος
  english_pob_choice: summoned
  chosen_spanish: lo llamó
  alternatives_spanish:
  - lo convocó
  - lo hizo venir
  lexicon: BDAG
  rationale: El verbo medio indica llamar a alguien hacia sí; en español, «lo llamó» expresa la acción con naturalidad sin perder el matiz de convocatoria autoritativa del señor.
- source_word: ὁ κύριος αὐτοῦ
  english_pob_choice: his master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  lexicon: BDAG
  rationale: En esta parábola κύριος designa la relación de autoridad del señor sobre el esclavo. «Señor» conserva esa relación jerárquica; «amo» o «dueño» serían posibles, pero menos adecuados aquí para mantener la equivalencia con la lectura inglesa auditada y el registro bíblico. No se usa «Señor» con mayúscula porque aquí no funciona como título divino.
- source_word: Δοῦλε
  english_pob_choice: slave
  chosen_spanish: Esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: Siguiendo la decisión POB de preservar la fuerza de δοῦλος cuando la dependencia vinculada a propiedad y autoridad es central, «esclavo» comunica mejor la relación de sujeción en la parábola que «siervo».
- source_word: πονηρέ
  english_pob_choice: wicked
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - perverso
  lexicon: BDAG
  rationale: Es un vocativo de reproche moral. «Malo» es directo y natural en español; «malvado» intensificaría el matiz, pero podría sonar más fuerte de lo que exige el contexto inmediato.
- source_word: πᾶσαν τὴν ὀφειλὴν ἐκείνην
  english_pob_choice: all that debt
  chosen_spanish: toda aquella deuda
  alternatives_spanish:
  - toda la deuda aquella
  - toda esa deuda
  lexicon: BDAG
  rationale: ὀφειλή es «deuda»; πᾶσαν + ἐκείνην subraya totalidad y deixis. «Toda aquella deuda» conserva ambos elementos y suena natural en español.
- source_word: ἀφῆκά σοι
  english_pob_choice: I forgave you
  chosen_spanish: te perdoné
  alternatives_spanish:
  - te cancelé
  - te remití
  lexicon: BDAG
  rationale: En este contexto de deuda, ἀφίημι puede significar remitir/cancelar una deuda, pero Mateo mantiene la resonancia de perdón. «Te perdoné» preserva esa tensión teológica y resulta transparente para el lector español.
- source_word: ἐπεὶ
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la causa de la acción del señor; «porque» es la equivalencia más clara y directa.
- source_word: παρεκάλεσάς με
  english_pob_choice: you pleaded with me
  chosen_spanish: me rogaste
  alternatives_spanish:
  - me suplicaste
  - me imploraste
  lexicon: BDAG
  rationale: παρακαλέω aquí expresa ruego insistente. «Me rogaste» reproduce la petición con solemnidad y concisión, sin añadir intensidad innecesaria.
theological_decisions:
- issue: δοῦλος en una parábola de relación amo-esclavo
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La relación económica y jurídica entre el señor y el deudor es central en la parábola. Traducir como «esclavo» evita suavizar la fuerza social del término y sigue la decisión auditada del POB inglés.
  doctrine_reference: 'DOCTRINE.md: contested term δοῦλος; preserve bonded-status force where salient'
- issue: ἀφίημι en contexto de deuda
  english_pob_reading: I forgave you
  chosen_spanish_reading: te perdoné
  alternative_spanish_readings:
  - te cancelé
  - te remití la deuda
  rationale: Aunque el verbo puede ser traducido con lenguaje económico, Mateo enlaza la remisión de deuda con el perdón moral. «Te perdoné» conserva esa tensión sin borrar el trasfondo financiero.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than flattening it'
translation_notes:
  revision_awareness: El dossier inglés pasó por una revisión que osciló entre «slave» y «servant», pero la corrección final restauró «slave» conforme a la política doctrinal. La traducción española sigue esa decisión final y mantiene la tensión entre remisión de deuda y perdón personal que el audit trail considera deliberada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene la distinción entre «señor» (relación humana de autoridad) y el título divino «Señor».
  - Se evita «siervo» para δοῦλος porque el contexto de propiedad y deuda exige la fuerza de «esclavo».
  - El orden y la puntuación buscan una cadencia bíblica moderna, sin calco excesivo del inglés.
