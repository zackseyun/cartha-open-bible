  text: τότε προσκαλεσάμενος αὐτὸν ὁ κύριος αὐτοῦ λέγει αὐτῷ· Δοῦλε πονηρέ, πᾶσαν τὴν ὀφειλὴν ἐκείνην ἀφῆκά σοι, ἐπεὶ παρεκάλεσάς με·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/032.yaml
  text: Then his master summoned him and said to him[a], ‘Wicked slave[b], I forgave you all that debt because you pleaded with me.’
  footnotes:
  - marker: a
    text: Or 'I canceled for you all that debt.' The Greek verb can denote releasing or remitting a debt as well as forgiving.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant.' The Greek δοῦλος can mean 'servant' or 'slave'; here 'slave' is used because the bonded relationship to the master is central to the parable.
    reason: lexical_alternative
