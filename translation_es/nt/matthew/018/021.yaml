translation:
  language: es
  text: 'Entonces Pedro se acercó a él y le dijo: «Señor, ¿cuántas veces pecará contra mí mi hermano[a] y yo le perdonaré? ¿Hasta siete veces?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi hermano o hermana»; el griego dice «mi hermano» (masculino singular), lo cual puede referirse en contexto más ampliamente a un creyente compañero.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  lexicon: BDAG
  rationale: Marcador temporal-secuencial natural en español que conserva el avance narrativo sin añadir matiz interpretativo.
- source_word: προσελθὼν
  english_pob_choice: came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino hacia
  lexicon: BDAG
  rationale: El participio aoristo indica un acercamiento previo al discurso; «se acercó» es idiomático y comunica la acción sin sobrecarga formal.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Jesús
  lexicon: BDAG
  rationale: El dativo se explicita en español; «a él» sigue el referente inmediato sin introducir una identificación no presente en la cláusula griega.
- source_word: ὁ Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - el Pedro
  lexicon: BDAG
  rationale: Nombre propio en forma española estándar.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Aunque el verbo de habla es λέγω, en español la combinación «le dijo» suena natural con el complemento indirecto explícito y mantiene el valor de introducción del discurso.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Vocativo de κύριος aplicado a Jesús; «Señor» conserva el registro reverente y la resonancia teológica habitual sin desdibujar la dirección del habla.
- source_word: ποσάκις
  english_pob_choice: how many times
  chosen_spanish: ¿cuántas veces?
  alternatives_spanish:
  - ¿con qué frecuencia?
  lexicon: BDAG
  rationale: La referencia es a conteo de repeticiones; «cuántas veces» preserva con precisión el límite propuesto.
- source_word: ἁμαρτήσει εἰς ἐμὲ
  english_pob_choice: will ... sin against me
  chosen_spanish: pecará contra mí
  alternatives_spanish:
  - pecará en mi contra
  - me ofenderá
  lexicon: BDAG
  rationale: El futuro se conserva con «pecará» y la preposición εἰς se vierte de forma natural como dirección hostil, aquí «contra mí».
- source_word: ὁ ἀδελφός μου
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi hermano o hermana
  - mi prójimo
  lexicon: BDAG
  rationale: Se mantiene el masculino singular del griego; en el contexto puede funcionar representativamente, pero la forma fuente no se amplía en el cuerpo principal.
- source_word: καὶ ἀφήσω αὐτῷ
  english_pob_choice: and I forgive him
  chosen_spanish: y yo le perdonaré
  alternatives_spanish:
  - y le perdonaré
  - y yo lo perdonaré
  lexicon: BDAG
  rationale: Ἀφίημι en este contexto ético se expresa naturalmente como «perdonar»; el futuro mantiene la forma verbal griega. «Le» refleja el dativo de destinatario y evita una construcción menos idiomática.
- source_word: ἕως ἑπτάκις
  english_pob_choice: Up to seven times?
  chosen_spanish: ¿Hasta siete veces?
  alternatives_spanish:
  - ¿Como máximo siete veces?
  lexicon: BDAG
  rationale: ἕως introduce el límite máximo; «hasta» es la forma española más directa y precisa.
theological_decisions:
- issue: Alcance de ὁ ἀδελφός μου
  english_pob_reading: Rendered literally as 'my brother' in the main text.
  chosen_spanish_reading: «mi hermano» en el texto principal.
  alternative_spanish_readings:
  - «mi hermano o hermana»
  - «un hermano de la comunidad»
  rationale: La forma griega es masculina singular y la lectura POB prefiere conservarla literalmente en el texto principal. La posible referencia amplia queda implícita por el contexto, no por expansión interpretativa en la línea principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El registro inglés revisado añade una coma antes de la coordinación «and I forgive him»; en español se resolvió con una sintaxis clara de dos miembros interrogativos, sin necesidad de reproducir esa coma. No hay cambios textuales relevantes en el sentido del versículo respecto del control de revisión más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος conforme al criterio doctrinal del proyecto.
  - Se tradujo ἀφήσω como futuro («perdonaré») para reflejar el futuro indicativo del griego.
  - Se conservó el masculino singular de ὁ ἀδελφός μου en el texto principal, con nota de alternativa inclusiva.
  - La pregunta final usa «¿Hasta siete veces?» para reflejar ἕως ἑπτάκις de forma breve y natural en español.
