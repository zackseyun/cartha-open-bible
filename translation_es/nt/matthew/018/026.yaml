translation:
  language: es
  text: 'Así que el esclavo cayó postrado ante él[a] y le suplicaba, diciendo: «Ten paciencia conmigo, y te lo pagaré todo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postró ante él»; el verbo griego también puede traducirse «adoró» en otros contextos, pero aquí se refiere a una postración deferente ante un señor humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεσὼν
  english_pob_choice: fell down
  chosen_spanish: se postró
  alternatives_spanish:
  - cayó delante de él
  - se echó al suelo
  lexicon: BDAG
  rationale: El participio aoristo de πίπτω describe una acción física de humillación/prostración antes de hablar. En español, «se postró» comunica de forma natural esa postura deferente y conserva el valor narrativo del gesto.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca consecuencia narrativa respecto del versículo anterior. «Así que» mantiene el flujo inferencial en español moderno sin volverlo excesivamente lógico o formal.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: La situación de deuda y subordinación hace saliente el estatus dependiente del personaje. «Esclavo» preserva la fuerza social del término mejor que «siervo».
- source_word: προσεκύνει
  english_pob_choice: fell down before him and kept pleading
  chosen_spanish: se postró ante él y le suplicaba
  alternatives_spanish:
  - se inclinó ante él y lo adoraba
  - lo adoraba
  lexicon: BDAG
  rationale: En este contexto προσκυνέω expresa homenaje/deferencia ante un superior humano, no necesariamente adoración religiosa. «Se postró ante él» evita sobrerreligiosizar el gesto, y el imperfecto se refleja con «le suplicaba» para conservar la acción continua.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decía
  - clamando
  lexicon: BDAG
  rationale: Participio introductorio de discurso directo; «diciendo» es la equivalencia transparente y natural en español.
- source_word: Μακροθύμησον ἐπ’ ἐμοί
  english_pob_choice: Be patient with me
  chosen_spanish: Ten paciencia conmigo
  alternatives_spanish:
  - Sé paciente conmigo
  - Aguárdame
  lexicon: BDAG
  rationale: El imperativo pide paciencia/indulgencia ante la deuda. «Ten paciencia conmigo» es idiomático y conserva el matiz de forbearancia o demora en el juicio.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo cuanto
  - todas las cosas
  lexicon: BDAG
  rationale: El plural neutro funciona de manera comprehensiva en la promesa de pago. En español, «todo» transmite con naturalidad esa totalidad.
- source_word: ἀποδώσω σοι
  english_pob_choice: I will repay you
  chosen_spanish: te lo pagaré
  alternatives_spanish:
  - te lo reembolsaré
  - te lo devolveré
  lexicon: BDAG
  rationale: En contexto de deuda, ἀποδίδωμι significa devolver/pagar lo debido. «Te lo pagaré» suena natural en español y conserva la relación de obligación económica; el pronombre neutro «lo» recoge el sentido total de πάντα.
theological_decisions:
- issue: Sentido de προσκυνέω frente a un amo humano
  english_pob_reading: Rendered as an act of obeisance rather than religious worship
  chosen_spanish_reading: Se expresa como postración deferente, no como adoración religiosa
  alternative_spanish_readings:
  - lo adoraba
  - se inclinaba en adoración
  rationale: En la escena el destinatario es un rey/señor dentro de la parábola. Traducir con lenguaje de adoración añadiría una carga teológica que el contexto inmediato no exige. La formulación elegida conserva la reverencia sin resolver indebidamente la tensión lexical.
  doctrine_reference: Preservar la tensión textual y la primacía del sentido contextual sobre la tradición eclesiástica.
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión inglesa sin cambios sustantivos: mantiene la lectura de προσκυνέω como homenaje deferente, conserva el matiz continuo del imperfecto con una forma progresiva en español, y refleja la conclusión económica de la deuda con lenguaje natural.'
  spanish_consistency_notes:
  - Se mantiene «esclavo» para δοῦλος, en coherencia con el criterio POB cuando el estatus de servidumbre/dependencia es central.
  - Se evita «Cristo/Mesías» porque no aparece en este versículo.
  - «Yahvé» no aplica aquí; el pasaje no contiene el nombre divino.
  - El pronombre en «te lo pagaré» recoge el sentido total de πάντα sin perder fluidez en español.
  - La nota a pie preserva la alternativa de lectura para προσκυνέω, ya que el español también podría sugerir «adorar» fuera de este contexto.
