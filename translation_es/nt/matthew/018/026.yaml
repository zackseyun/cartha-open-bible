  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: consecuencia narrativa (οὖν), estatus de δοῦλος como «esclavo», petición de paciencia, y promesa de pago total. Sin embargo, «se postró ante él y le suplicaba» fusiona πεσὼν + προσεκύνει + λέγων de un modo aceptable pero algo redundante con la nota actual, y la nota al pie no presenta una verdadera alternativa porque repite la misma expresión del texto principal. Conviene ajustar la redacción para reflejar mejor la postración deferente y mantener una nota útil sobre la alternativa léxica.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse levemente. «Se postró ante él y le suplicaba» funciona, aunque «cayó postrado ante él» refleja mejor el participio πεσὼν junto con el gesto de προσκυνέω. La frase directa es buena y muy legible. La nota actual necesita corrección porque «O ‘se postró ante él’» no ofrece una alternativa real al texto.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: δοῦλος = «esclavo» está correctamente preservado; no hay conflictos con términos teológicos mayores. La decisión de no traducir προσκυνέω como «adoró» en este contexto está bien fundamentada y debe mantenerse, idealmente con una nota que sí contraste con el texto principal.'
  issues:
  - severity: medium
    issue: La nota al pie repite el mismo giro del texto principal
    rationale: El texto principal dice «se postró ante él», y la nota dice «O ‘se postró ante él’». Eso invalida la función de la nota como alternativa léxica documentada.
  - severity: low
    issue: La representación de πεσὼν podría reflejarse más explícitamente
    rationale: El participio aoristo «habiendo caído» añade un matiz físico previo al gesto de obeisance. «Cayó postrado ante él» lo expresa mejor en español sin volverlo torpe.
  revised_spanish_text: 'Así que el esclavo cayó postrado ante él[a] y le suplicaba, diciendo: «Ten paciencia conmigo, y te lo pagaré todo».'
