translation:
  language: es
  text: Y si tu mano o tu pie te hace tropezar[a], córtalo y arrójalo lejos de ti. Más te vale entrar en la vida manco o cojo que, teniendo dos manos o dos pies, ser echado en el fuego eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'te hace pecar'. El verbo griego significa literalmente 'te hace tropezar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίζει
  english_pob_choice: causes you to stumble
  chosen_spanish: te hace tropezar
  alternatives_spanish:
  - te hace pecar
  - te es tropiezo
  - te causa a caer
  lexicon: BDAG
  rationale: En español, "hacer tropezar" conserva la metáfora física del griego σκανδαλίζω y su sentido moral implícito sin reducirlo a una paráfrasis doctrinal. "Te hace pecar" explicita la implicación, pero borra la imagen original; "te es tropiezo" suena más nominal que verbal en este contexto.
- source_word: ἔκκοψον
  english_pob_choice: cut it off
  chosen_spanish: córtalo
  alternatives_spanish:
  - córtalo y sepáralo
  - extíralo
  lexicon: BDAG
  rationale: El imperativo aoristo es enérgico y concreto. "Córtalo" es la forma natural y directa en español para una mano o un pie, y preserva la fuerza de la orden sin suavizarla.
- source_word: βάλε ἀπὸ σοῦ
  english_pob_choice: throw it away from you
  chosen_spanish: arrójalo lejos de ti
  alternatives_spanish:
  - échalo de ti
  - arrójalo de ti
  lexicon: BDAG
  rationale: La combinación de βάλλω con ἀπό σοῦ expresa alejamiento decisivo. "Arrójalo lejos de ti" comunica bien tanto la acción como la separación, con un registro digno y claro.
- source_word: καλόν σοί ἐστιν
  english_pob_choice: It is better for you
  chosen_spanish: Más te vale
  alternatives_spanish:
  - Te conviene más
  - Es mejor para ti
  lexicon: BDAG
  rationale: En este contexto comparativo, καλόν σοί ἐστιν funciona idiomáticamente como una valoración de ventaja. "Más te vale" es una equivalencia natural en español y conserva el tono proverbial de advertencia.
- source_word: εἰσελθεῖν εἰς τὴν ζωὴν
  english_pob_choice: to enter into life
  chosen_spanish: entrar en la vida
  alternatives_spanish:
  - entrar en la vida eterna
  - entrar a la vida
  lexicon: BDAG
  rationale: Se mantiene "la vida" sin añadir "eterna", porque el griego no la explicita aquí. En español, "entrar en la vida" suena natural y conserva la carga escatológica que el contexto aporta.
- source_word: κυλλὸν
  english_pob_choice: maimed
  chosen_spanish: cojo
  alternatives_spanish:
  - manco
  - lisiado
  - mutilado
  lexicon: BDAG
  rationale: El término griego describe a alguien privado de una extremidad o con un miembro dañado. En esta frase coordinada con "dos manos o dos pies", "cojo" refleja bien la pérdida de capacidad de caminar, y en español bíblico resulta más idiomático que "mutilado"; "manco" también sería posible, pero aquí la pareja con "pie" favorece "cojo".
- source_word: χωλόν
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - rengo
  - lisiado
  lexicon: BDAG
  rationale: Aunque el inglés distingue "maimed" y "lame", en español una distinción natural aquí es entre "manco" para la mano y "cojo" para el pie. "Cojo" es el equivalente más transparente y contextualmente adecuado para χωλός.
- source_word: ἔχοντα
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - con
  - que tienen
  lexicon: BDAG
  rationale: El participio se vierte como una construcción participial natural en español para mantener la relación de posesión/condición con las manos o pies. "Teniendo" preserva la estructura del griego sin volverse pesado.
- source_word: βληθῆναι
  english_pob_choice: to be thrown
  chosen_spanish: ser echado
  alternatives_spanish:
  - ser arrojado
  - ser lanzado
  lexicon: BDAG
  rationale: El pasivo infinitivo de βάλλω admite "ser echado" en un registro bíblico claro y natural en español. Se evita una modernización excesiva que podría debilitar la solemnidad del juicio.
- source_word: τὸ πῦρ τὸ αἰώνιον
  english_pob_choice: the eternal fire
  chosen_spanish: el fuego eterno
  alternatives_spanish:
  - el fuego perpetuo
  - el fuego de la eternidad
  lexicon: BDAG
  rationale: '"Eterno" reproduce bien αἰώνιος en un contexto de juicio final y mantiene la equivalencia con la tradición bíblica sin necesidad de explicar "del siglo venidero" en el texto principal.'
theological_decisions:
- issue: Si σκανδαλίζει debe moralizarse como pecado o conservar la metáfora de tropiezo
  english_pob_reading: causes you to stumble
  chosen_spanish_reading: te hace tropezar
  alternative_spanish_readings:
  - te hace pecar
  - te escandaliza
  rationale: La fuente griega conserva la imagen de tropiezo. La versión española mantiene esa metáfora para no borrar la tensión lexical entre el tropiezo físico y la caída moral implícita.
  doctrine_reference: Principios de traducción del POB §1, §3
- issue: Si añadir 'eterna' a 'vida'
  english_pob_reading: retain 'life' rather than explicating 'eternal life'
  chosen_spanish_reading: entrar en la vida
  alternative_spanish_readings:
  - entrar en la vida eterna
  - entrar en la vida futura
  rationale: El griego dice solo 'vida'; el contexto ya contrapone esa vida con el fuego eterno. Mantener 'la vida' evita introducir una glosa no presente en el texto fuente.
  doctrine_reference: Principios de traducción del POB §1, §3
- issue: 'Cómo tratar el mandato de mutilación corporal: literalidad o paráfrasis figurativa'
  english_pob_reading: translate the command literally without softening or resolving whether it is hyperbolic
  chosen_spanish_reading: traducir el mandato de manera directa, sin suavizarlo ni resolver su carácter hiperbólico
  alternative_spanish_readings:
  - parafrasearlo como llamado a un arrepentimiento radical
  - explicarlo como metáfora en el cuerpo del texto
  rationale: La severidad del dicho pertenece al sentido del pasaje. La traducción española conserva la forma imperativa fuerte y deja que la interpretación del carácter hiperbólico se desarrolle fuera del texto principal.
  doctrine_reference: Principios de traducción del POB §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el último pase revisado, que no introdujo cambios, y mantiene las decisiones auditadas del inglés POB: conservar la metáfora de tropiezo, no explicitar ''vida eterna'' en el texto principal y traducir con literalidad la advertencia severa sin suavizarla.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se mantuvo 'la vida' sin artículo explicativo adicional, en coherencia con la economía del griego.
  - Se conservó un registro bíblico sobrio ('córtalo', 'arrójalo', 'ser echado') para mantener la fuerza retórica del pasaje.
  - Se distinguió entre mano y pie con 'manco' y 'cojo' en la explicación léxica, aunque el texto principal optó por una formulación uniforme y natural en español.
