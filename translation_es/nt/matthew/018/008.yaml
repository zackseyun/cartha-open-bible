  rationale: 'Se requiere una reparación pequeña pero necesaria: cambiar ''cojo o manco'' por ''manco o cojo'' para reflejar con mayor fidelidad κυλλόν ἢ χωλόν y mantener el contraste natural con ''mano ... pie''. El resto del versículo puede conservarse.'
