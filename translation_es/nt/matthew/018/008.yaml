review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: condición, mandato severo, contraste entre entrar en la vida y ser arrojado al fuego eterno. También preserva correctamente la metáfora de σκανδαλίζει con la nota alternativa. Sin embargo, invierte los dos adjetivos finales: κυλλόν corresponde mejor a ''manco''/''mutilado'' y χωλόν a ''cojo''. El texto español actual dice ''cojo o manco'', lo que desordena la secuencia semántica del original y debilita el vínculo con ''mano ... pie''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Más te vale' funciona, aunque es más coloquial que 'te conviene más' o 'es mejor para ti'; no obstante, sigue siendo aceptable y expresivo. 'Arrójalo lejos de ti' es idiomático. La principal reparación necesaria es léxica en 'cojo o manco'.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preservación metafórica de σκανδαλίζει, que está bien resuelta como 'te hace tropezar' con nota 'te hace pecar'. Las decisiones sobre 'vida' y 'fuego eterno' se alinean con el POB. Debe corregirse la asignación de κυλλόν/χωλόν para ajustarse a la evidencia fuente y a la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: Se invierte el sentido de κυλλόν y χωλόν en el texto principal.
    rationale: κυλλόν se refiere a alguien mutilado o manco, mientras que χωλόν corresponde a 'cojo'/'lame'. El borrador dice 'cojo o manco', pero el griego dice 'κυλλὸν ἢ χωλόν', por lo que conviene 'manco o cojo' para preservar el orden y la precisión semántica.
  - severity: low
    issue: La decisión léxica interna para κυλλὸν contradice la traducción elegida.
    rationale: En las notas léxicas se justifica 'cojo' para κυλλὸν, pero eso no concuerda con el valor habitual del término ni con la propia observación de que 'manco' sería la distinción natural para la mano. La revisión del texto principal corrige este desajuste.
  revised_spanish_text: Y si tu mano o tu pie te hace tropezar[a], córtalo y arrójalo lejos de ti. Más te vale entrar en la vida manco o cojo que, teniendo dos manos o dos pies, ser echado en el fuego eterno.
  revised_footnotes:
  - marker: a
    text: O 'te hace pecar'. El verbo griego significa literalmente 'te hace tropezar'.
    reason: lexical_alternative
  revision_rationale: 'Se requiere una reparación pequeña pero necesaria: cambiar ''cojo o manco'' por ''manco o cojo'' para reflejar con mayor fidelidad κυλλόν ἢ χωλόν y mantener el contraste natural con ''mano ... pie''. El resto del versículo puede conservarse.'
