  text: Εἰ δὲ ἡ χείρ σου ἢ ὁ πούς σου σκανδαλίζει σε, ἔκκοψον ⸀αὐτὸν καὶ βάλε ἀπὸ σοῦ· καλόν σοί ἐστιν εἰσελθεῖν εἰς τὴν ζωὴν ⸂κυλλὸν ἢ χωλόν⸃, ἢ δύο χεῖρας ἢ δύο πόδας ἔχοντα βληθῆναι εἰς τὸ πῦρ τὸ αἰώνιον.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/008.yaml
  text: And if your hand or your foot causes you to stumble[a], cut it off and throw it away from you. It is better for you to enter into life maimed or lame than, having two hands or two feet, to be thrown into the eternal fire.
  footnotes:
