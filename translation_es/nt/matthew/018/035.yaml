review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ‘Así también’, ‘mi Padre celestial’, la advertencia condicional, el perdón a ‘su hermano’ y la gravedad del juicio correspondiente a la parábola. Sin embargo, dos puntos no preservan del todo el audit trail: (1) ποιήσει ὑμῖν se vierte mejor como ‘hará con ustedes’ o ‘hará esto con ustedes’ que como un giro modificado por una nota innecesaria; y sobre todo (2) ἀπὸ τῶν καρδιῶν ὑμῶν no debe reducirse a ‘de corazón’, porque el original enfatiza pluralidad distributiva (‘de sus corazones’) y el inglés POB la preserva expresamente. También falta en español la nota cultural que explica el masculino representativo de ‘hermano’, mientras que las notas actuales no añaden valor real al lector.'
  spanish_quality_summary: 'El español es generalmente natural y digno. ‘Así también mi Padre celestial hará con ustedes’ suena claro. No obstante, las notas [a] y [b] son débiles o redundantes: [b] repite exactamente la frase del texto, y [a] ofrece una alternativa posible pero no necesaria, mientras omite una nota más útil sobre ‘hermano’. Además, ‘de corazón’ es idiomático, pero aquí empobrece un matiz deliberado del original y del POB en inglés. ‘De sus corazones’ suena un poco más literal, pero sigue siendo inteligible y fiel.'
  glossary_alignment: No hay conflicto con los términos marco del proyecto. ‘Padre celestial’, ‘perdona’, y ‘hermano’ concuerdan con las decisiones auditadas. La principal corrección es mantener el plural de καρδιῶν con ‘de sus corazones’. También conviene trasladar a una nota el valor representativo de ‘hermano’, en línea con la práctica del POB inglés.
  issues:
  - severity: medium
    issue: ‘de corazón’ no preserva plenamente ἀπὸ τῶν καρδιῶν ὑμῶν
    rationale: El griego tiene plural explícito (‘de vuestros/sus corazones’), y el audit trail inglés lo conserva de forma deliberada. ‘De corazón’ comunica sinceridad, pero borra la formulación plural y la correspondencia distributiva con la audiencia.
  - severity: medium
    issue: Falta la nota sobre el masculino representativo de ‘su hermano’
    rationale: El inglés POB incluyó una nota cultural importante para aclarar que el masculino singular funciona representativamente para condiscípulos o correligionarios. En español conviene conservar esa ayuda, especialmente porque se mantiene ‘su hermano’ por fidelidad gramatical.
  - severity: low
    issue: Las notas actuales no son útiles y una es redundante
    rationale: La nota [b] (‘O “a ustedes”’) repite exactamente el texto principal y no aporta alternativa real. La nota [a] es posible, pero menos valiosa que la nota cultural omitida.
  revised_spanish_text: Así también mi Padre celestial hará con ustedes, si cada uno no perdona a su hermano[a] de sus corazones.
  revised_footnotes:
  - marker: a
    text: ‘Su hermano’ traduce el masculino singular griego; en contexto funciona representativamente para cada condiscípulo o hermano en la fe.
    reason: cultural_note
  revision_rationale: Se elimina la aparatosa nota léxica redundante, se conserva la advertencia con formulación natural, se restituye el plural de ‘corazones’ para reflejar mejor el griego y el audit trail inglés, y se añade la nota cultural sobre ‘hermano’ para mantener la fidelidad gramatical sin perder claridad contextual.
