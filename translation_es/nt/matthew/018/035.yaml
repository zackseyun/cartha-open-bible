revisions:
- from: Así también mi Padre celestial [a] hará con ustedes [b], si cada uno no perdona a su hermano de corazón.
  to: Así también mi Padre celestial hará con ustedes, si cada uno no perdona a su hermano[a] de sus corazones.
  rationale: Se elimina la aparatosa nota léxica redundante, se conserva la advertencia con formulación natural, se restituye el plural de ‘corazones’ para reflejar mejor el griego y el audit trail inglés, y se añade la nota cultural sobre ‘hermano’ para mantener la fidelidad gramatical sin perder claridad contextual.
