translation:
  language: es
  text: Así también mi Padre celestial hará con ustedes, si cada uno no perdona a su hermano[a] de sus corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Su hermano’ traduce el masculino singular griego; en contexto funciona representativamente para cada condiscípulo o hermano en la fe.
    reason: cultural_note
lexical_decisions:
- source_word: Οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De la misma manera también
  - Del mismo modo también
  lexicon: BDAG
  rationale: Conserva la fuerza comparativa e inferencial del giro griego y funciona con naturalidad en español sin perder la relación con la parábola precedente.
- source_word: ὁ πατήρ μου ὁ οὐράνιος
  english_pob_choice: my heavenly Father
  chosen_spanish: mi Padre celestial
  alternatives_spanish:
  - mi Padre en los cielos
  - mi Padre, el celestial
  lexicon: BDAG
  rationale: ‘Celestial’ comunica bien el adjetivo οὐράνιος y mantiene la formulación posesiva ‘mi Padre’. ‘En los cielos’ sería una equivalencia posible, pero el griego usa un adjetivo, no una frase preposicional.
- source_word: ποιήσει ὑμῖν
  english_pob_choice: will do to you
  chosen_spanish: hará con ustedes
  alternatives_spanish:
  - hará esto con ustedes
  - los tratará así
  lexicon: BDAG
  rationale: En este contexto el verbo retoma la acción de la parábola y señala una respuesta divina seria. ‘Hará con ustedes’ preserva la apertura semántica sin volverlo demasiado interpretativo.
- source_word: ἐὰν μὴ
  english_pob_choice: if ... not
  chosen_spanish: si ... no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: BDAG
  rationale: La construcción condicional negativa queda transparente en español con ‘si ... no’. ‘A menos que’ también sería viable, pero aquí se conserva mejor la forma lógica del griego.
- source_word: ἀφῆτε
  english_pob_choice: forgive
  chosen_spanish: perdona
  alternatives_spanish:
  - perdone
  - deje ir
  - suelte
  lexicon: BDAG
  rationale: 'En el marco de ofensa y deuda, ἀφίημι significa ‘perdonar’. Se usa el presente del subjuntivo en una condición general en español: ‘si cada uno no perdona’.'
- source_word: ἕκαστος
  english_pob_choice: each of you
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ustedes
  - cada cual
  lexicon: BDAG
  rationale: El valor distributivo del singular griego se expresa naturalmente con ‘cada uno’, manteniendo que la obligación recae individualmente sobre cada miembro del grupo.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano o hermana
  - a su hermano en la fe
  - a su hermano de la comunidad
  lexicon: BDAG
  rationale: Se conserva el masculino singular del griego. En español, el posesivo y la preposición dativa hacen natural ‘a su hermano’. No se neutraliza en el texto principal para no borrar la forma gramatical del original.
- source_word: ἀπὸ τῶν καρδιῶν ὑμῶν
  english_pob_choice: from your hearts
  chosen_spanish: de corazón
  alternatives_spanish:
  - desde sus corazones
  - desde lo profundo de su corazón
  - de sus corazones
  lexicon: BDAG
  rationale: La imagen de origen interno se expresa de forma idiomática en español. ‘De corazón’ mantiene la sinceridad e interioridad del perdón; la pluralidad de ‘corazones’ puede sonar forzada en español, aunque el griego pluraliza el término.
theological_decisions:
- issue: Alcance de la advertencia divina
  english_pob_reading: The verse is rendered as a direct warning of divine judgment corresponding to the parable, without softening or expanding its theological implications.
  chosen_spanish_reading: La versión mantiene una advertencia directa y seria, sin suavizarla ni añadir una explicación doctrinal que el versículo no formula explícitamente.
  alternative_spanish_readings:
  - Dios los tratará de la misma manera
  - Esto apunta a una condena eterna específica
  rationale: El griego presenta una advertencia condicional sobria; la traducción conserva esa fuerza sin resolver la tensión teológica que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica sin expandirla más allá del texto.
- issue: Lenguaje representativo de ἀδελφῷ
  english_pob_reading: his brother
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - su hermano o hermana
  - su prójimo creyente
  - su hermano o su hermana
  rationale: Se conserva el masculino singular del griego como forma gramatical, mientras que el sentido representativo se deja implícito, tal como en el audit trail en inglés.
  doctrine_reference: Fidelidad gramatical frente a neutralización inclusiva no explicitada por el original.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto principal y manteniendo una sola ocurrencia de cada uno. La redacción sigue el paquete fuente griego y el audit trail inglés sin introducir marcadores huérfanos.
  spanish_consistency_notes:
  - Se conserva el registro reverente y sobrio adecuado para una Biblia pública.
  - ‘Padre celestial’ refleja bien οὐράνιος sin sustituirlo por una paráfrasis más larga.
  - ‘De corazón’ comunica la interioridad del perdón de forma idiomática en español, aunque el griego use el plural ‘corazones’.
  - Se mantiene el masculino singular de ‘hermano’ por fidelidad al original, con posibilidad representativa implícita.
