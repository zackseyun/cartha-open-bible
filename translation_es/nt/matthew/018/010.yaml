  text: Ὁρᾶτε μὴ καταφρονήσητε ἑνὸς τῶν μικρῶν τούτων, λέγω γὰρ ὑμῖν ὅτι οἱ ἄγγελοι αὐτῶν ἐν οὐρανοῖς διὰ παντὸς βλέπουσι τὸ πρόσωπον τοῦ πατρός μου τοῦ ἐν ⸀οὐρανοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/018/010.yaml
  text: See that you do not despise one of these little ones[c][b][a], for I tell you that their angels in heaven continually see the face of my Father who is in heaven.
  footnotes:
  - marker: a
    text: Or 'do not look down on' one of these little ones.
    reason: lexical_alternative
  - marker: b
    text: '''Their angels'' may refer to angels associated with or representing these little ones; the verse does not by itself settle the full doctrine of guardian angels.'
    reason: alternative_reading
  - marker: c
    text: Greek 'in the heavens' / 'who is in the heavens'; rendered idiomatically as 'in heaven.'
    reason: lexical_alternative
