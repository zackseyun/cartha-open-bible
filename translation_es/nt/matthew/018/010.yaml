translation:
  language: es
  text: Asegúrense de no despreciar[a][b] a uno de estos pequeños, porque les digo que sus ángeles en el cielo[c] ven continuamente el rostro de mi Padre que está en el cielo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no tengan en poco» a uno de estos pequeños.
    reason: lexical_alternative
  - marker: b
    text: «Despreciar» conserva el peso de καταφρονέω; la alternativa expresa la idea de menospreciar o subestimar.
    reason: lexical_alternative
  - marker: c
    text: Griego «en los cielos»; se expresa idiomáticamente en español como «en el cielo».
    reason: lexical_alternative
  - marker: d
    text: Griego «que está en los cielos»; se expresa idiomáticamente en español como «que está en el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁρᾶτε
  english_pob_choice: See that
  chosen_spanish: Mirad que
  alternatives_spanish:
  - Atended a que
  - Ved que
  lexicon: BDAG
  rationale: El imperativo presente introduce una advertencia solemne. «Mirad que» conserva la fuerza exhortativa y es natural en español bíblico contemporáneo sin volverlo mecánico.
- source_word: μὴ καταφρονήσητε
  english_pob_choice: you do not despise
  chosen_spanish: no despreciéis
  alternatives_spanish:
  - no tengáis en poco
  - no miréis con desprecio
  lexicon: BDAG
  rationale: καταφρονέω expresa tratar como insignificante o con desprecio. «Despreciéis» conserva el peso moral del término y evita suavizarlo indebidamente.
- source_word: ἑνὸς τῶν μικρῶν τούτων
  english_pob_choice: one of these little ones
  chosen_spanish: a uno de estos pequeños
  alternatives_spanish:
  - a uno de estos pequeños de edad
  - a uno de estos pequeños
  lexicon: BDAG
  rationale: La construcción partitiva exige «a uno de». «Pequeños» mantiene la amplitud de μικρῶν para no restringirlo solo a niños pequeños; en este contexto puede abarcar a niños y, por extensión, a los humildes discípulos.
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: for I tell you
  chosen_spanish: porque os digo
  alternatives_spanish:
  - pues os digo
  - porque les digo
  lexicon: BDAG
  rationale: γάρ introduce explicación o razón. «Porque» reproduce bien esa relación discursiva en español; «os digo» mantiene la primera persona enfática de la fórmula.
- source_word: οἱ ἄγγελοι αὐτῶν
  english_pob_choice: their angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - los ángeles de ellos
  - sus mensajeros
  lexicon: BDAG
  rationale: Se conserva la relación posesiva sin desarrollar una doctrina que el texto no define. «Sus ángeles» es la forma más natural y fiel al genitivo plural.
- source_word: ἐν οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo
  lexicon: BDAG
  rationale: Aunque el griego está en plural, la expresión idiomática en español suele ser singular. «En el cielo» transmite el sentido locativo de manera clara y natural.
- source_word: διὰ παντὸς
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: El adverbio indica continuidad o constancia. «Continuamente» conserva el matiz durativo del presente βλέπουσι sin exagerar con una absolutización innecesaria.
- source_word: βλέπουσι τὸ πρόσωπον
  english_pob_choice: see the face
  chosen_spanish: ven el rostro
  alternatives_spanish:
  - contemplan el rostro
  - ven la faz
  lexicon: BDAG
  rationale: Se mantiene la imagen de acceso y presencia directa. «Rostro» es un equivalente claro y moderno de πρόσωπον; «faz» sería más tradicional pero menos natural.
- source_word: τοῦ πατρός μου
  english_pob_choice: of my Father
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de mi Padre celestial
  - de mi Padre
  lexicon: BDAG
  rationale: Se conserva la posesión explícita y el lenguaje filial de Jesús. No se añade «celestial» porque la frase siguiente ya especifica la ubicación.
- source_word: τοῦ ἐν οὐρανοῖς
  english_pob_choice: who is in heaven
  chosen_spanish: que está en el cielo
  alternatives_spanish:
  - que está en los cielos
  - que está en el cielo
  lexicon: BDAG
  rationale: La frase atributiva se traduce de forma idiomática y natural. Se evita duplicar una construcción más literal como «en los cielos» porque el español común favorece el singular.
theological_decisions:
- issue: Alcance de «sus ángeles»
  english_pob_reading: Retain the phrase 'their angels' without specifying a formal doctrine of individual guardian angels.
  chosen_spanish_reading: Conservar «sus ángeles» sin definir si se trata de ángeles guardianes personales o de ángeles asociados/representantes de estos pequeños.
  alternative_spanish_readings:
  - Interpretarlo como ángeles guardianes asignados individualmente
  - Entenderlo como ángeles que representan o asisten a estos pequeños
  rationale: El griego afirma la relación posesiva y la acción de ver el rostro del Padre, pero no define el mecanismo angelológico preciso. La traducción debe conservar esa tensión y no resolverla con una doctrina más amplia que el versículo por sí solo no establece.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de «pequeños»
  english_pob_reading: '''little ones'' likely includes children and, by extension, humble believers.'
  chosen_spanish_reading: «Pequeños» se mantiene abierto a niños y, por extensión, a discípulos humildes.
  alternative_spanish_readings:
  - Reducirlo a niños pequeños
  - Aplicarlo solo a creyentes humildes
  rationale: En Mateo 18 el término tiene una amplitud contextual que no conviene estrechar artificialmente. La redacción española conserva la amplitud del original y deja que el contexto determine el alcance.
  doctrine_reference: Contextual reading of Matthew 18 within POB lexical policy.
translation_notes:
  revision_awareness: 'El texto inglés auditado no requirió cambios en la última revisión, y la coincidencia con la verificación cruzada es alta. La versión española mantiene la misma línea: traducción literal controlada, sin introducir aclaraciones doctrinales no presentes en el griego, y con la misma preservación de la tensión teológica sobre «sus ángeles».'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de referencia divina como «mi Padre» y «cielo»/«cielos» según idiomática española, sin sustituir por «SEÑOR».
  - «Pequeños» conserva la amplitud del término griego y evita restringirlo solo a niños.
  - «Sus ángeles» queda sin explicación doctrinal en el cuerpo del texto, en coherencia con la política de no resolver la ambigüedad angelológica.
  - La puntuación reproduce de forma natural la cadencia de advertencia + razón explicativa del original griego.
