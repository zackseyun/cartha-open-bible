    rationale: Aunque fiel al sentido de Ὁρᾶτε, «Mirad» se percibe como peninsular. Para una meta neutral latinoamericana/broadly church-readable, «Asegúrense de que no» o «Tengan cuidado de no» comunica mejor la exhortación vigilante sin perder fuerza.
  - severity: medium
    issue: Reutilización del marcador [c] para dos anclajes distintos
    rationale: Las instrucciones exigen marcadores únicos en orden y prohíben reutilizar el mismo marcador para dos notas diferentes en el mismo registro. Aquí una sola nota se aplica a dos lugares distintos del texto, por lo que deben distinguirse como [c] y [d].
  - severity: low
    issue: Segunda persona plural peninsular en «despreciéis» y «os digo»
    rationale: No es incorrecto, pero combinado con «Mirad» refuerza un registro menos neutral. Un ajuste a formas más ampliamente comprensibles mejora la legibilidad sin alterar el sentido.
