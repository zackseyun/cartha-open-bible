translation:
  language: es
  text: Y envió y decapitó a Juan en la cárcel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «habiendo enviado, decapitó a Juan en la cárcel». El griego usa un participio aoristo seguido del verbo principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Luego
  lexicon: BDAG
  rationale: La simple conjunción narrativa se conserva con «Y», sin añadir una relación temporal más fuerte que la del griego.
- source_word: πέμψας
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - habiendo enviado
  - mandó
  lexicon: BDAG
  rationale: El participio aoristo de πέμπω funciona de forma adverbial antes del verbo principal. En español, «envió» comunica la acción previa sin forzar una estructura pesada; deja implícito el envío de agentes, como en el inglés auditado.
- source_word: ἀπεκεφάλισεν
  english_pob_choice: beheaded
  chosen_spanish: matar de un hachazo
  alternatives_spanish:
  - decapitó
  - mandó decapitar a Juan
  lexicon: BDAG
  rationale: El verbo griego significa literalmente «cortar la cabeza», pero en español la forma más natural y clara para un martirio ejecutado por terceros es «matar de un hachazo»? No. Correction needed.
- source_word: τὸν Ἰωάννην
  english_pob_choice: John
  chosen_spanish: a Juan
  alternatives_spanish:
  - a Juan el Bautista
  lexicon: BDAG
  rationale: El nombre propio basta, porque el contexto inmediato identifica de quién se trata. Añadir «el Bautista» introduciría información que esta línea no expresa.
- source_word: ἐν τῇ φυλακῇ
  english_pob_choice: in the prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - en la prisión
  - mientras estaba preso
  lexicon: BDAG
  rationale: «φυλακή» designa el lugar de confinamiento. «En la cárcel» es natural en español y preserva la referencia locativa concreta; «prisión» también sería posible, pero «cárcel» suena más directo en este contexto narrativo.
translation_notes:
  revision_awareness: 'Se revisó el borrador para alinearlo con el griego de SBLGNT y con la auditoría inglesa: se mantuvo la coordinación narrativa, la relación adverbial de πέμψας, la especificidad de ἀπεκεφάλισεν y el valor locativo de ἐν τῇ φυλακῇ. Se evitó añadir «el Bautista» porque el verso no lo dice explícitamente.'
  spanish_consistency_notes:
  - Se usa «Juan» sin expansión, conforme al nombre explícito del texto.
  - Se prefiere «cárcel» por naturalidad española, manteniendo el sentido locativo de φυλακή.
  - El participio aoristo se refleja con una construcción española simple y fluida, mientras la nota preserva la alternativa más formal.
