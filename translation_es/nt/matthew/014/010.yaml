- from: Y envió a matar de un hachazo a Juan en la cárcel[a].
  to: Y envió y decapitó a Juan en la cárcel[a].
  rationale: Se reemplaza «matar de un hachazo» por «decapitó» para reflejar con precisión ἀπεκεφάλισεν. Se evita añadir un instrumento no expresado en el griego. Se conserva «Y» para καὶ, «envió» para πέμψας según la filosofía auditada, «Juan» sin expansión interpretativa, y «en la cárcel» como locativo natural y fiel. La nota se ajusta para ser coherente con el texto principal.
