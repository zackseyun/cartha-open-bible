translation:
  language: es
  text: Y cuando salió a tierra[a], vio una gran multitud, y tuvo compasión de ellos[b] y sanó a sus enfermos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «habiendo salido» o «cuando salió». En este contexto, probablemente se refiere a que salió de la barca a la orilla.
    reason: lexical_alternative
  - marker: b
    text: O «se conmovió por ellos» o «fue movido a compasión por ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: when he went ashore
  chosen_spanish: cuando bajó a tierra
  alternatives_spanish:
  - habiendo salido
  - cuando salió
  lexicon: BDAG
  rationale: El participio aoristo de ἐξέρχομαι significa literalmente 'habiendo salido' / 'cuando salió'. En este contexto narrativo, el movimiento desde la barca hacia la orilla queda mejor expresado en español con una fórmula natural que conserve la escena sin volverse mecánica.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - lo vio
  - miró
  lexicon: BDAG
  rationale: Es el aoristo simple de ὁράω. 'Vio' transmite de forma directa y natural la acción de percibir a la multitud.
- source_word: πολὺν ὄχλον
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran multitud de gente
  - una multitud grande
  lexicon: BDAG
  rationale: ὄχλος es 'multitud, muchedumbre'. 'Gran multitud' preserva la intensidad de πολύς y suena más natural y solemne en español bíblico que 'gente' o una repetición pesada.
- source_word: ἐσπλαγχνίσθη ἐπ’ αὐτοῖς
  english_pob_choice: he had compassion on them
  chosen_spanish: sintió compasión por ellos
  alternatives_spanish:
  - tuvo compasión de ellos
  - se conmovió por ellos
  - fue movido a compasión por ellos
  lexicon: BDAG
  rationale: σπλαγχνίζομαι expresa compasión profunda. 'Sintió compasión por ellos' conserva el sentido emocional sin forzar una perífrasis más interpretativa; 'por' mantiene en español el valor relacional de ἐπί con dativo en este uso.
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - los sanó
  lexicon: BDAG
  rationale: θεραπεύω aquí se refiere a curación física. 'Sanó' es el verbo más natural y bíblicamente transparente en español; evita la redundancia de 'he sang' o una paráfrasis.
- source_word: τοὺς ἀρρώστους αὐτῶν
  english_pob_choice: their sick
  chosen_spanish: a sus enfermos
  alternatives_spanish:
  - a los enfermos de ellos
  - a los que estaban enfermos entre ellos
  - a los enfermos
  lexicon: BDAG
  rationale: 'ἄρρωστος funciona aquí como adjetivo sustantivado: ''los enfermos''. En español, ''a sus enfermos'' conserva la posesión implícita en αὐτῶν y evita una expansión innecesaria.'
theological_decisions:
- issue: La emoción de Jesús como motivo de la sanidad
  english_pob_reading: he had compassion on them
  chosen_spanish_reading: sintió compasión por ellos
  alternative_spanish_readings:
  - tuvo compasión de ellos
  - se conmovió por ellos
  - fue movido a compasión por ellos
  rationale: La frase presenta la compasión de Jesús como el motivo inmediato de la curación. 'Sintió compasión por ellos' mantiene ese énfasis sin añadir una intensidad que el griego no exige; además evita diluir el vínculo entre la compasión y la sanidad.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en lectura y no muestran revisiones aplicadas; se conserva la decisión contextual de ἐξελθὼν como movimiento a la orilla, y de σπλαγχνίζομαι como compasión profunda sin sobreinterpretación.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene 'Jesús' implícito por el contexto narrativo, sin introducirlo en el versículo.
  - '''Sanó'' se prefiere a ''curó'' por naturalidad bíblica y porque no cambia el sentido de θεραπεύω en este contexto.'
  - Las notas a y b preservan las alternativas relevantes del audit trail inglés en forma natural para español.
