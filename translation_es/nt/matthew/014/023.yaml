translation:
  language: es
  text: Y después de despedir a las multitudes, subió al monte a solas[a] para orar. Al anochecer, estaba allí solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en privado»; la frase griega κατ’ ἰδίαν puede expresar retiro personal o privacidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολύσας
  english_pob_choice: after dismissing
  chosen_spanish: después de despedir
  alternatives_spanish:
  - habiendo despedido
  - después de enviar
  lexicon: BDAG
  rationale: 'El participio aoristo antecede al verbo principal y en español se expresa con naturalidad como acción previa: «después de despedir». Mantiene el matiz de enviar a la multitud fuera sin añadir información.'
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la gente
  lexicon: BDAG
  rationale: ὄχλοι en los Evangelios suele referirse a grupos reunidos de personas. «Multitudes» conserva el plural y el registro bíblico sin sonar arcaico.
- source_word: ἀνέβη εἰς τὸ ὄρος
  english_pob_choice: he went up on the mountain
  chosen_spanish: subió al monte
  alternatives_spanish:
  - subió al monte
  - subió a la montaña
  - ascendió al monte
  lexicon: BDAG
  rationale: La construcción denota movimiento ascendente hacia el lugar elevado. «Al monte» es breve y idiomático en español bíblico, sin perder el sentido topográfico.
- source_word: κατ’ ἰδίαν
  english_pob_choice: by himself
  chosen_spanish: aparte
  alternatives_spanish:
  - en privado
  - solo
  lexicon: BDAG
  rationale: La frase significa «en privado» o «por su cuenta». Aquí «aparte» recoge el retiro de los demás y evita duplicar la idea de soledad, que aparece después en el versículo.
- source_word: προσεύξασθαι
  english_pob_choice: to pray
  chosen_spanish: para orar
  alternatives_spanish:
  - para orar
  - a orar
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Para orar» es la manera natural y clara de reproducirlo en español.
- source_word: ὀψίας δὲ γενομένης
  english_pob_choice: When evening came
  chosen_spanish: al anochecer
  alternatives_spanish:
  - cuando llegó la tarde
  - cuando cayó la noche
  lexicon: BDAG
  rationale: El genitivo absoluto marca circunstancia temporal. «Al anochecer» transmite el paso al tiempo de la tarde-noche con concisión equivalente.
- source_word: μόνος ἦν ἐκεῖ
  english_pob_choice: he was there alone
  chosen_spanish: estaba allí solo
  alternatives_spanish:
  - estaba allí solo
  - estaba allí por su cuenta
  lexicon: BDAG
  rationale: «Solo» conserva la fuerza de μόνος. El orden «allí solo» es natural en español y refleja la localización seguida de la soledad.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y concuerda con el audit trail en inglés: participio temporal anterior, movimiento ascendente hacia el monte, matiz de retiro privado en κατ’ ἰδίαν, y circunstancia temporal final con énfasis en la soledad.'
  spanish_consistency_notes:
  - Se mantiene «monte» para τὸ ὄρος, en continuidad con un registro bíblico claro y no demasiado técnico.
  - No se introduce «SEÑOR» ni terminología teológica no presente en el versículo.
  - 'Se evita duplicar el matiz de privacidad/soledad: «aparte» corresponde a κατ’ ἰδίαν y «solo» a μόνος.'
