review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido básico del griego: ἀπολύσας como acción previa, ἀνέβη εἰς τὸ ὄρος como movimiento ascendente, el propósito de προσεύξασθαι y la soledad final de μόνος ἦν ἐκεῖ. Sin embargo, κατ’ ἰδίαν en este contexto se alinea mejor con ''a solas'' o ''por su cuenta/by himself'' que con ''aparte'', que en español puede sonar más adverbial de separación que de retiro personal. También ''las multitudes'' es comprensible, pero ''la gente'' o ''las multitudes'' no mejora sobre ''las multitudes''; aun así, el punto principal a corregir es κατ’ ἰδίαν.'
  spanish_quality_summary: El español es claro y digno, pero 'subió al monte aparte' suena algo rígido y menos natural que 'subió al monte a solas' o 'subió al monte para orar a solas'. La frase revisada mantiene buena legibilidad y evita una colocación poco idiomática. El resto del versículo lee bien en español neutral eclesial.
  glossary_alignment: No hay términos del glosario mayor en juego. La revisión propuesta mejora la correspondencia contextual de κατ’ ἰδίαν con la decisión auditada del POB inglés ('by himself' con nota 'privately').
  issues:
  - severity: medium
    issue: '''aparte'' para κατ’ ἰδίαν'
    rationale: Aunque es defendible y la nota lo explica, en español 'aparte' después de 'subió al monte' suena menos natural y puede enfatizar separación espacial más que retiro personal. 'A solas' expresa mejor 'by himself' y sigue permitiendo una nota con la alternativa 'en privado'.
  - severity: low
    issue: Naturalidad de la colocación 'subió al monte aparte'
    rationale: La combinación resulta algo forzada en español contemporáneo; una leve reubicación mejora la fluidez sin cambiar el sentido.
  revised_spanish_text: Y después de despedir a las multitudes, subió al monte a solas[a] para orar. Al anochecer, estaba allí solo.
  revised_footnotes:
  - marker: a
    text: O «en privado»; la frase griega κατ’ ἰδίαν puede expresar retiro personal o privacidad.
    reason: lexical_alternative
