- from: Y después de despedir a las multitudes, subió al monte aparte[a] para orar. Al anochecer, estaba allí solo.
  to: Y después de despedir a las multitudes, subió al monte a solas[a] para orar. Al anochecer, estaba allí solo.
  rationale: Se ajusta κατ’ ἰδίαν a 'a solas' para reflejar mejor el sentido contextual de retiro personal y mejorar la naturalidad del español, conservando en nota la alternativa 'en privado' documentada por el POB inglés. El resto del texto puede mantenerse.
  reviewer_model: gpt-5.4
