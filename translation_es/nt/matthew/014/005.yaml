translation:
  language: es
  text: Y queriendo matarlo, temió a la multitud, porque lo tenían por profeta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: θέλων
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - queriendo matarlo
  lexicon: BDAG
  rationale: 'El participio presente se vierte de manera directa como acción concomitante: «queriendo». En español, «queriendo matarlo» expresa la idea sin añadir una concesión que el griego no exige; se mantiene la relación participial con el verbo principal.'
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill
  chosen_spanish: matarlo
  alternatives_spanish:
  - quitarle la vida
  - ponerlo a muerte
  lexicon: BDAG
  rationale: El infinitivo aoristo σημαίνει 'matar' o 'dar muerte'. «Matarlo» es el equivalente natural y directo en español, sin introducir un matiz moral adicional.
- source_word: ἐφοβήθη
  english_pob_choice: he feared
  chosen_spanish: temió
  alternatives_spanish:
  - tuvo miedo de
  - le tuvo miedo
  lexicon: BDAG
  rationale: El aoristo de φοβέομαι se rinde bien con «temió», forma sobria y narrativa. Conserva el sujeto implícito y el tono del relato.
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre». «La multitud» es claro, digno y natural en español bíblico contemporáneo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la causa del temor, por lo que «porque» comunica con claridad la relación causal.
- source_word: ὡς προφήτην
  english_pob_choice: as a prophet
  chosen_spanish: por profeta
  alternatives_spanish:
  - como profeta
  - en calidad de profeta
  lexicon: BDAG
  rationale: La construcción ὡς con acusativo predicativo expresa la valoración que la multitud hacía de él. «Por profeta» suena natural en español y conserva la idea de estimación/reconocimiento; «como profeta» queda como alternativa más literal.
- source_word: αὐτὸν εἶχον
  english_pob_choice: they regarded him
  chosen_spanish: lo tenían
  alternatives_spanish:
  - lo consideraban
  - lo tenían por
  lexicon: BDAG
  rationale: El modismo ἔχω + acusativo predicativo equivale a considerar/estimar como. «Lo tenían por» reproduce bien el giro idiomático español y refleja el juicio de la multitud sin forzar la sintaxis.
theological_decisions:
- issue: Relación del participio con el verbo principal
  english_pob_reading: The participle is rendered non-concessively in the revised English, without adding 'although'.
  chosen_spanish_reading: 'Se traduce con un participio simple: «queriendo matarlo», sin introducir una concesión explícita.'
  alternative_spanish_readings:
  - aunque quería matarlo
  - y aunque quería matarlo
  rationale: El griego presenta un participio presente junto al verbo principal. La revisión inglesa eliminó la concesión explícita; el español sigue esa lectura para no añadir una relación lógica no marcada de forma directa por la forma verbal.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; optimal equivalence'
- issue: Valor de ὡς προφήτην αὐτὸν εἶχον
  english_pob_reading: they regarded him as a prophet
  chosen_spanish_reading: lo tenían por profeta
  alternative_spanish_readings:
  - lo consideraban profeta
  - lo estimaban como profeta
  rationale: La frase evita imponer incertidumbre o mera apariencia; expresa la valoración de la multitud. «Tener por» es un giro español idiomático que preserva la fuerza relacional del predicativo acusativo.
  doctrine_reference: Original-language syntax and idiom preservation
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del inglés POB: el participio no se hizo concesivo con «aunque», sino que se expresó de manera directa. También se preservó el valor idiomático de ἔχω con predicativo acusativo sin convertirlo en una explicación interpretativa más fuerte que la del griego.'
  spanish_consistency_notes:
  - Se usó «matarlo» para ἀποκτεῖναι, coherente con el valor léxico directo del verbo.
  - Se evitó «Cristo», «SEÑOR» u այլ terminología no presente en el versículo.
  - Se mantuvo un registro sobrio y narrativo, adecuado para la prosa del Evangelio.
  - No se añadieron nombres propios no explícitos en el versículo griego.
