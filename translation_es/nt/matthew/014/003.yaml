review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: Herodes arrestó a Juan, lo ató y lo puso en prisión por causa de Herodías. También preserva correctamente la identificación neutral de Herodías como esposa de Felipe, hermano de Herodes, sin adelantar la condena moral del v. 4. Sin embargo, «encadenado» sobretraduce ἔδησεν, que en el audit trail se fijó como «bound» sin especificar cadenas; además, conviene mejorar la apposición final para evitar una leve torpeza sintáctica en español.'
  spanish_quality_summary: El español es claro y legible, pero la secuencia verbal con pluscuamperfectos repetidos suena algo pesada, y «de Felipe, su hermano» es menos natural que «de su hermano Felipe» o «de Felipe, hermano suyo». La reparación propuesta mantiene la dignidad del estilo y mejora la fluidez sin apartarse del griego ni del audit trail.
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo nombres propios. «Juan», «Herodes», «Herodías» y «Felipe» están bien. La principal desalineación léxica está en δέω: el proyecto inglés documentó «bound», por lo que el español debe preferir «ató» o «lo dejó atado» antes que «encadenó», que añade un medio no expresado.'
  issues:
  - severity: medium
    issue: «lo había encadenado» añade un detalle no explicitado por ἔδησεν
    rationale: δέω significa «atar/bind». «Encadenar» especifica cadenas, una imagen más concreta que el texto griego y el audit trail inglés no exigen.
  - severity: low
    issue: «de Felipe, su hermano» suena algo rígido en español
    rationale: Aunque comprensible, la colocación es menos natural que «de su hermano Felipe», que sigue expresando con claridad que Felipe era hermano de Herodes.
  - severity: low
    issue: La nota alternativa puede sonar menos natural con «tomado preso»
    rationale: La alternativa inglesa es «having seized John ... placed him in prison». En español, «habiendo prendido a Juan ... lo puso en prisión» o «habiendo arrestado...» fluye mejor y refleja mejor el valor participial.
  revised_spanish_text: Porque Herodes había arrestado[a] a Juan, lo había atado y lo había puesto en prisión a causa de Herodías, la esposa de su hermano Felipe,
  revised_footnotes:
  - marker: a
    text: O «habiendo prendido a Juan ... lo puso en prisión».
    reason: lexical_alternative
