revisions:
- from: Porque Herodes había arrestado[a] a Juan, lo había encadenado y lo había puesto en prisión a causa de Herodías, la esposa de Felipe, su hermano,
  to: Porque Herodes había arrestado[a] a Juan, lo había atado y lo había puesto en prisión a causa de Herodías, la esposa de su hermano Felipe,
  rationale: Se cambia «encadenado» por «atado» para no sobreespecificar δέω; se ajusta el orden final a «su hermano Felipe» para una apposición más natural en español; y se pule la nota alternativa para reflejar mejor el participio griego y sonar idiomática.
