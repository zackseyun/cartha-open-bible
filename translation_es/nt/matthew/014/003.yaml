translation:
  language: es
  text: Porque Herodes había arrestado[a] a Juan, lo había atado y lo había puesto en prisión a causa de Herodías, la esposa de su hermano Felipe,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo prendido a Juan ... lo puso en prisión».
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la explicación o fundamento del enunciado anterior; «Porque» reproduce con naturalidad ese valor causal/expositivo en español.
- source_word: κρατήσας
  english_pob_choice: had arrested
  chosen_spanish: había arrestado
  alternatives_spanish:
  - había apresado
  - habiendo tomado preso
  lexicon: BDAG
  rationale: En contexto custodial, «arrestado» comunica el acto de detención con claridad moderna y conserva el valor previo al verbo principal, como en el audit trail inglés.
- source_word: ἔδησεν
  english_pob_choice: bound
  chosen_spanish: lo había encadenado
  alternatives_spanish:
  - lo había atado
  - lo había sujetado con cadenas
  lexicon: BDAG
  rationale: El verbo βασará la idea concreta de restricción física. «Encadenado» explicita el resultado de «bound» sin perder la violencia del acto, y suena natural en español bíblico contemporáneo.
- source_word: ἐν φυλακῇ ἀπέθετο
  english_pob_choice: put him in prison
  chosen_spanish: lo había puesto en prisión
  alternatives_spanish:
  - lo había metido en prisión
  - lo había colocado en prisión
  - lo había puesto bajo custodia
  lexicon: BDAG
  rationale: La combinación idiomática denota encarcelamiento. «Puesto en prisión» mantiene la referencia carcelaria directa y evita suavizarla hacia mera custodia.
- source_word: διὰ Ἡρῳδιάδα
  english_pob_choice: because of Herodias
  chosen_spanish: a causa de Herodías
  alternatives_spanish:
  - por Herodías
  - debido a Herodías
  lexicon: BDAG
  rationale: La preposición expresa causa. «A causa de» preserva ese valor explicativo de manera sobria y fiel al texto.
- source_word: γυναῖκα
  english_pob_choice: wife
  chosen_spanish: la esposa
  alternatives_spanish:
  - la mujer
  - su esposa
  lexicon: BDAG
  rationale: En esta construcción relacional, el sentido es «esposa» y no simplemente «mujer». Se evita «mujer» porque en español no refleja con claridad el vínculo matrimonial.
- source_word: Φιλίππου τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: of Philip his brother
  chosen_spanish: de Felipe, su hermano
  alternatives_spanish:
  - de Felipe, el hermano de Herodes
  - de Felipe, hermano de Herodes
  lexicon: BDAG
  rationale: 'Se conserva la relación appositiva del griego: Felipe es identificado como hermano de Herodes. El orden elegido es natural en español y mantiene la información de parentesco.'
theological_decisions:
- issue: No adelantar la evaluación moral de la relación de Herodías con Felipe
  english_pob_reading: Render the phrase neutrally as 'Herodias, the wife of Philip his brother' without importing the fuller charge of unlawful marriage from the surrounding context.
  chosen_spanish_reading: «Herodías, la esposa de Felipe, su hermano» sin añadir calificativos como «ilegal» o «adúltera».
  alternative_spanish_readings:
  - «Herodías, la esposa de su hermano Felipe»
  - «Herodías, la mujer de Felipe, su hermano»
  rationale: El versículo solo identifica a Herodías por su relación con Felipe y con Herodes; la acusación moral explícita aparece después. La traducción no debe anticipar un juicio que el verso no formula.
  doctrine_reference: 'Principio POB: no importar afirmaciones interpretativas que no estén explícitas en el texto; preservar la tensión textual y contextual.'
translation_notes:
  revision_awareness: Coincide con la revisión final inglesa (sin cambios) y con el dictamen de alta concordancia. Se ha mantenido la estructura causal y la secuencia verbal previa al verbo principal, evitando sobreinterpretar la referencia a Herodías.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene «Jesús» y «Mesías/Cristo» fuera de este pasaje, sin intervención terminológica adicional.
  - Se eligió «prisión» para ἐν φυλακῇ ἀπέθετο por claridad y fidelidad al campo semántico de encarcelamiento.
  - La nota textual en a recoge la alternativa más literal del audit trail inglés sin duplicar el sentido principal.
