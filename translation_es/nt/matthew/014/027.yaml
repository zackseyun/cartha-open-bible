translation:
  language: es
  text: 'Pero inmediatamente Jesús les habló, diciendo: «Tengan ánimo; soy yo[a]. No tengan miedo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «Yo soy». El griego puede funcionar aquí como simple autoidentificación, aunque algunos lectores oyen un posible eco de la auto-designación divina.'
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - de inmediato
  - enseguida
  lexicon: BDAG
  rationale: Reproduce el valor temporal inmediato de εὐθύς con un adverbio natural y claro en español contemporáneo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Marca el giro narrativo desde el temor de los discípulos al habla tranquilizadora de Jesús, en un contraste suave y natural en español.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: les habló
  alternatives_spanish:
  - les dijo
  - habló con ellos
  lexicon: BDAG
  rationale: La forma de λαλέω aquí introduce el discurso directo; en español, «les habló» conserva el acto de dirigirse a ellos sin volverlo redundante.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de modo natural con el clítico de objeto indirecto en español.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Mantiene la estructura participial del griego sin forzar una reorganización innecesaria en la frase española.
- source_word: Θαρσεῖτε
  english_pob_choice: Take courage
  chosen_spanish: Tengan ánimo
  alternatives_spanish:
  - Cobren ánimo
  - Tengan valor
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la valentía/confianza; «Tengan ánimo» es idiomático, claro y conserva el tono exhortativo.
- source_word: ἐγώ εἰμι
  english_pob_choice: it is I
  chosen_spanish: soy yo
  alternatives_spanish:
  - yo soy
  - soy el que soy
  lexicon: BDAG
  rationale: En este contexto inmediato Jesús se identifica a sí mismo a discípulos aterrados; «soy yo» comunica con naturalidad la autoidentificación, mientras evita sobrecargar el sentido en el texto principal.
- source_word: μὴ φοβεῖσθε
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengan miedo
  alternatives_spanish:
  - No teman
  - No se asusten
  lexicon: BDAG
  rationale: La prohibición con μή y φοβέομαι se expresa con un español natural y directo; «No tengan miedo» preserva el sentido exhortativo y pastoral.
theological_decisions:
- issue: Cómo reflejar ἐγώ εἰμι sin resolver de antemano si es solo autoidentificación o una posible alusión divina
  english_pob_reading: Main text renders the immediate narrative sense as 'it is I'; footnote preserves 'I am' as a more literal option with possible theological resonance.
  chosen_spanish_reading: El texto principal dice «soy yo», y la nota conserva «Yo soy» como lectura más literal, con posible resonancia teológica.
  alternative_spanish_readings:
  - Yo soy
  - Yo soy él
  rationale: El contexto inmediato es Jesús calmando a los discípulos y revelándose como la persona que habla; «soy yo» expresa ese sentido sin cerrar la posible resonancia con la fórmula divina, que se preserva en la nota.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue ese consenso y conserva la tensión teológica documentada por el POB en torno a ἐγώ εἰμι.
  spanish_consistency_notes:
  - Se usó «Jesús» como nombre propio, coherente con el estándar del proyecto.
  - Se mantuvo «Tengan ánimo»/«No tengan miedo» como equivalentes naturales y reverentes de los imperativos griegos.
  - La nota al pie preserva la alternativa literal «Yo soy» para no borrar la ambigüedad teológica documentada.
  - La puntuación y el estilo de comillas siguen las convenciones del español editorial moderno.
