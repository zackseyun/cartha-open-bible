translation:
  language: es
  text: 'Y dijo[a]: «Ven». Entonces Pedro descendió de la barca, caminó sobre el agua y fue hacia Jesús.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y vino a Jesús». El griego dice «fue hacia Jesús», subrayando el movimiento en su dirección.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐλθέ
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  - Acércate
  lexicon: BDAG
  rationale: El imperativo aoristo de ἔρχομαι funciona como una convocatoria directa. «Ven» conserva la brevedad y la fuerza del mandato sin añadir un complemento que el griego no expresa explícitamente.
- source_word: καταβὰς ἀπὸ τοῦ πλοίου
  english_pob_choice: got down from the boat
  chosen_spanish: descendió de la barca
  alternatives_spanish:
  - se bajó de la barca
  - bajó de la barca
  lexicon: BDAG
  rationale: καταβὰς indica la acción de bajar/descender. «Descendió de la barca» mantiene el valor direccional del participio y suena natural en español bíblico contemporáneo.
- source_word: πλοίου
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - lancha
  lexicon: BDAG
  rationale: En el contexto galileo y narrativo del evangelio, «barca» es el término más preciso y natural en español para πλοῖον; «barco» suena demasiado grande y «lancha» es demasiado moderno.
- source_word: περιεπάτησεν
  english_pob_choice: walked
  chosen_spanish: caminó
  alternatives_spanish:
  - anduvo
  - caminaba
  lexicon: BDAG
  rationale: περιπατέω significa normalmente «caminar/andar». «Caminó» reproduce el verbo de movimiento de forma clara y directa, sin introducir matices aspectuales no requeridos por el griego.
- source_word: ἐπὶ τὰ ὕδατα
  english_pob_choice: on the water
  chosen_spanish: sobre el agua
  alternatives_spanish:
  - sobre las aguas
  - encima del agua
  lexicon: BDAG
  rationale: ἐπὶ con acusativo expresa movimiento o apoyo sobre la superficie. En español, «sobre el agua» comunica bien el milagro con un sustantivo singular de uso natural; «las aguas» también es posible, pero cambia el registro y el número.
- source_word: πρὸς τὸν Ἰησοῦν
  english_pob_choice: came toward Jesus
  chosen_spanish: vino hacia Jesús
  alternatives_spanish:
  - fue hacia Jesús
  - se acercó a Jesús
  lexicon: BDAG
  rationale: πρός con acusativo indica dirección hacia Jesús. «Vino hacia Jesús» preserva explícitamente esa orientación, igual que la lectura inglesa auditable; «se acercó a Jesús» podría sugerir un cierre de distancia más interpretado.
theological_decisions:
- issue: Direccionalidad de πρὸς τὸν Ἰησοῦν
  english_pob_reading: and came toward Jesus
  chosen_spanish_reading: vino hacia Jesús
  alternative_spanish_readings:
  - vino a Jesús
  - se acercó a Jesús
  rationale: Se conserva la tensión narrativa de que el griego enfatiza movimiento en dirección a Jesús, no necesariamente la llegada consumada. «Hacia Jesús» mantiene ese matiz sin resolverlo a una meta final que el texto no subraya de manera explícita.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios y fue calificada con alta concordancia. La redacción española sigue esa misma línea, conservando la secuencia narrativa, el mandato breve de Jesús y la dirección de πρὸς sin normalizarla a una llegada plena.
  spanish_consistency_notes:
  - Se usa «Jesús» de manera consistente para Ἰησοῦς.
  - Se prefiere «barca» para πλοῖον en contexto galileo, conforme al registro narrativo.
  - «Sobre el agua» mantiene el singular natural del español y el valor locativo de ἐπὶ.
  - La nota al pie marca la alternativa de dirección para reflejar la ambigüedad preservada por el POB en inglés.
