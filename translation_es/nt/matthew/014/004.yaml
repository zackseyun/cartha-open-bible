lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: had been saying
  chosen_spanish: le estaba diciendo
  alternatives_spanish:
  - venía diciéndole
  - seguía diciéndole
  - le decía
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción continuada o repetida en el pasado. En español, «le estaba diciendo» conserva bien ese valor durativo sin sonar rígido.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: Aquí γάρ introduce explicación o trasfondo del contexto previo. «Porque» mantiene con claridad esa función explicativa en español.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Con λέγω, el dativo se expresa naturalmente en español como complemento indirecto. «Le» es más idiomático que repetir «a él».
- source_word: ὁ Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: BDAG
  rationale: El griego nombra al hablante simplemente como «Juan». Como el contexto inmediato ya lo identifica, se conserva el nombre breve.
- source_word: Οὐκ ἔξεστίν
  english_pob_choice: It is not lawful
  chosen_spanish: No te es lícito
  alternatives_spanish:
  - No te está permitido
  - No te es permitido
  - No es lícito para ti
  lexicon: BDAG
  rationale: ἔξεστιν expresa lo permitido o lícito. «No te es lícito» preserva con fuerza la idea jurídico-moral del original y su tono de reproche.
- source_word: σοι
  english_pob_choice: for you
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: BDAG
  rationale: Con la construcción impersonal, el dativo se vuelve de manera natural en español «te». Así se mantiene la fluidez sin perder el referente personal.
- source_word: ἔχειν
  english_pob_choice: to have
  chosen_spanish: tener
  alternatives_spanish:
  - poseer
  - tomar
  lexicon: BDAG
  rationale: El verbo griego conserva una formulación general que, en contexto, alude a tenerla como mujer. «Tenerla» reproduce la literalidad básica sin sobreexplicar.
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - a esa mujer
  lexicon: BDAG
  rationale: El pronombre refiere directamente a Herodías. En español, «la» encaja con el verbo y mantiene la referencia sin añadir una interpretación extra.
theological_decisions:
- issue: Valor moral-jurídico de ἔξεστιν
  english_pob_reading: 'Rendered as a legal-moral prohibition: ''It is not lawful for you to have her.'''
  chosen_spanish_reading: «No te es lícito tenerla» conserva la idea de prohibición moral y legal.
  alternative_spanish_readings:
  - No te está permitido tenerla
  - No está bien que la tengas
  rationale: La frase griega apunta a lo permitido o no permitido. En el contexto de la reprensión de Juan a Herodes, «lícito» retiene mejor el matiz legal-moral que una mera valoración de conveniencia.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve the source''s plain sense.'
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, sin notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo el nombre «Juan» sin expandir a «Juan el Bautista», conforme al griego y al audit trail en inglés.
  - Se conservó el registro sobrio y legal-moral de la prohibición con «no te es lícito».
  - La referencia pronominal se resolvió de forma natural en español con «la» y «le/te», sin añadir explicaciones interpretativas.
