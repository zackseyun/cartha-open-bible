translation:
  language: es
  text: 'Pero, viendo el viento fuerte[a], le dio miedo; y comenzando a hundirse, gritó, diciendo: «¡Señor[b], sálvame!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el viento violento».
    reason: lexical_alternative
  - marker: b
    text: O «rescátame». El verbo griego puede indicar liberación del peligro inmediato, así como salvación en un sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπων
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - cuando vio
  - al ver
  lexicon: BDAG
  rationale: El participio presente expresa percepción simultánea con la reacción siguiente. «Viendo» conserva esa relación verbal sin introducir una subordinación más interpretativa de lo necesario.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste narrativo con el éxito previo de Pedro; «Pero» reproduce mejor ese giro que una simple coordinación.
- source_word: ἄνεμον ἰσχυρόν
  english_pob_choice: the strong wind
  chosen_spanish: el viento fuerte
  alternatives_spanish:
  - el viento poderoso
  - el viento violento
  lexicon: BDAG
  rationale: «Fuerte» sigue de cerca ἰσχυρός y es natural en español. «Violento» refleja una alternativa semántica posible, pero intensifica más de lo que el texto exige como lectura principal.
- source_word: ἐφοβήθη
  english_pob_choice: he became afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - se asustó
  - empezó a tener miedo
  lexicon: BDAG
  rationale: La forma aorística puede indicar el inicio del miedo. «Tuvo miedo» transmite esa reacción puntual en español con naturalidad, sin forzar una perífrasis demasiado pesada.
- source_word: ἀρξάμενος καταποντίζεσθαι
  english_pob_choice: beginning to sink
  chosen_spanish: comenzando a hundirse
  alternatives_spanish:
  - al empezar a hundirse
  - empezando a hundirse
  lexicon: BDAG
  rationale: «Hundirse» comunica bien el sentido de καταποντίζεσθαι en este contexto de mar y peligro inmediato. «Comenzando a» mantiene la secuencia participial del griego.
- source_word: ἔκραξεν
  english_pob_choice: he cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: BDAG
  rationale: El verbo expresa un llamado fuerte y urgente. «Gritó» es breve y enérgico en español; la frase siguiente con «diciendo» preserva el matiz de apelación.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Mantiene la construcción participial antes del discurso directo, sin convertirla en una coordinación que suavice la secuencia del griego.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En el discurso dirigido a Jesús, «Señor» es el equivalente natural y reverente de κύριε en español. Se conserva el valor cristológico del título sin neutralizarlo.
- source_word: σῶσόν με
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - rescátame
  - líbrame
  lexicon: BDAG
  rationale: El imperativo aoristo pide auxilio urgente. «Sálvame» preserva el verbo de la raíz σῴζω y su resonancia amplia, mientras que «rescátame» estrecharía el foco al peligro físico inmediato.
theological_decisions:
- issue: Rendering κύριος in direct address to Jesus
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Se mantiene el tratamiento reverente y cristológicamente cargado del original. «Señor» es más idiomático que «Maestro» en este contexto y no rebaja el título.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Rendering σῴζω in an immediate danger context
  english_pob_reading: save me
  chosen_spanish_reading: sálvame
  alternative_spanish_readings:
  - rescátame
  rationale: Aunque el contexto es peligro físico, el verbo griego conserva un alcance más amplio que una mera extracción del riesgo. «Sálvame» mantiene esa amplitud semántica y su resonancia bíblica.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del contexto inglés: no se registraron cambios, y la propuesta mantiene el mismo sentido y la misma resolución léxica principal, adaptadas al español con equivalentes naturales y auditablemente cercanos al griego.'
  spanish_consistency_notes:
  - Se conserva la secuencia participial del griego con «viendo... comenzando... diciendo».
  - Se usa «viento fuerte» para ἄνεμον ἰσχυρόν, evitando intensificar innecesariamente a «violento» en el texto principal.
  - «Señor» se mantiene como tratamiento directo a Jesús, en línea con la decisión doctrinal del proyecto.
  - «Sálvame» preserva la amplitud de σῴζω; la nota ofrece «rescátame» como alternativa contextual.
  - La puntuación con punto y coma ayuda a reflejar la cadena narrativa breve del original sin añadir explicación interpretativa.
