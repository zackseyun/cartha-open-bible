translation:
  language: es
  text: Y cuando los hombres de aquel lugar lo reconocieron, enviaron por toda la región circundante de aquel lugar[a], y le trajeron a todos los que estaban enfermos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enviaron por toda aquella región circundante»; el objeto («mensaje» o «mensajeros») queda implícito en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνόντες
  english_pob_choice: recognized
  chosen_spanish: lo reconocieron
  alternatives_spanish:
  - lo identificaron
  - lo conocieron
  lexicon: BDAG
  rationale: El participio aoristo aquí indica reconocimiento visual o identificación al verlo, no un conocimiento relacional más amplio. «Lo reconocieron» conserva esa fuerza narrativa y suena natural en español.
- source_word: οἱ ἄνδρες τοῦ τόπου ἐκείνου
  english_pob_choice: the men of that place
  chosen_spanish: los hombres de aquel lugar
  alternatives_spanish:
  - la gente de aquel lugar
  - los hombres de aquella región
  lexicon: BDAG
  rationale: ἄνδρες es específicamente masculino plural, por lo que se mantiene «los hombres» en vez de generalizar a «la gente». τόπος se traduce con «lugar» porque aquí remite a la localidad concreta donde Jesús llegó.
- source_word: ἀπέστειλαν εἰς ὅλην τὴν περίχωρον ἐκείνην
  english_pob_choice: they sent into that whole surrounding region
  chosen_spanish: enviaron por toda aquella región circundante
  alternatives_spanish:
  - enviaron a toda aquella región circundante
  - enviaron por todo aquel distrito circundante
  lexicon: BDAG
  rationale: El verbo ἀποστέλλω aquí admite una acción de envío con destinatarios implícitos; en español, «enviaron por» comunica de forma natural la difusión del mensaje o la acción de mandar a buscar sin añadir explícitamente «palabra» o «mensajeros». περίχωρος se rinde como «región circundante» por su sentido de área alrededor de un lugar.
- source_word: προσήνεγκαν αὐτῷ
  english_pob_choice: brought to him
  chosen_spanish: le trajeron
  alternatives_spanish:
  - lo llevaron ante él
  - se los trajeron
  lexicon: BDAG
  rationale: προσφέρω en este contexto describe llevar personas a Jesús, no una ofrenda sacrificial. «Le trajeron» es la formulación más natural y fiel para español.
- source_word: πάντας τοὺς κακῶς ἔχοντας
  english_pob_choice: all who were sick
  chosen_spanish: a todos los que estaban enfermos
  alternatives_spanish:
  - a todos los que estaban mal
  - a todos los que estaban enfermos o mal de salud
  lexicon: BDAG
  rationale: La expresión idiomática κακῶς ἔχειν significa estar enfermo o no encontrarse bien. «Estaban enfermos» preserva el sentido idiomático en español sin perder claridad.
translation_notes:
  revision_awareness: El texto español sigue de cerca la revisión final del POB en inglés, especialmente la eliminación de «word» por no estar explícito en el griego. También conserva la opción de hacer explícito el envío generalizado sin añadir un objeto no expresado.
  spanish_consistency_notes:
  - Se mantiene el tratamiento masculino explícito de ἄνδρες con «los hombres».
  - «Región circundante» conserva el matiz espacial de περίχωρος sin sobrerrepresentarlo.
  - La referencia a la enfermedad se formula con una construcción natural en español para reflejar el idiomático κακῶς ἔχοντας.
