translation:
  language: es
  text: 'Entonces los que estaban en la barca lo adoraron[a], diciendo[b]: «Verdaderamente tú eres el Hijo de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postraron ante él» / «le rindieron homenaje». El verbo griego puede denotar reverencia expresada con inclinación o postración; aquí el contexto favorece «lo adoraron».
    reason: lexical_alternative
  - marker: b
    text: O «Hijo de Dios». Aunque el griego no lleva artículo delante de «Dios», en este contexto la frase funciona como título y no meramente como «un hijo de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: Then those
  chosen_spanish: Entonces los que estaban
  alternatives_spanish:
  - Y los que estaban
  - Pero los que estaban
  lexicon: BDAG
  rationale: δέ funciona como un conector suave; en español, «Entonces» expresa bien la continuación narrativa después del evento precedente. οἱ, aquí sustantivado, se hace explícito como «los que estaban» para evitar una forma demasiado rígida y mantener la referencia a los ocupantes de la barca.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el barco
  - a bordo de la barca
  lexicon: BDAG
  rationale: πλοῖον designa una embarcación; «barca» es un equivalente natural y bíblicamente claro en español. «En la barca» conserva la localización literal sin sonar forzado.
- source_word: προσεκύνησαν αὐτῷ
  english_pob_choice: worshiped him
  chosen_spanish: se postraron ante él
  alternatives_spanish:
  - lo adoraron
  - le rindieron homenaje
  - se inclinaron ante él
  lexicon: BDAG
  rationale: προσκυνέω puede abarcar postración, homenaje o adoración. En español, «se postraron ante él» preserva la ambigüedad reverente y permite el peso del contexto sin forzar de inmediato una lectura eclesiástica fija; el contexto cristológico sigue abierto a una comprensión de adoración.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio se vierte de manera directa y natural con «diciendo», manteniendo la relación subordinada con el gesto precedente.
- source_word: Ἀληθῶς
  english_pob_choice: Truly
  chosen_spanish: Verdaderamente
  alternatives_spanish:
  - En verdad
  - Ciertamente
  - De veras
  lexicon: BDAG
  rationale: «Verdaderamente» transmite bien la afirmación solemne de Ἀληθῶς y su tono confesional, sin caer en coloquialismo.
- source_word: θεοῦ υἱὸς
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  - el Hijo de Dios mismo
  - un hijo de Dios
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo delante de θεοῦ, en este contexto la construcción funciona como título cristológico definido. «El Hijo de Dios» evita una lectura indefinida y refleja el uso mateano del título.
- source_word: εἶ
  english_pob_choice: you are
  chosen_spanish: eres
  alternatives_spanish:
  - tú eres
  - estás
  lexicon: BDAG
  rationale: El verbo copulativo se expresa naturalmente en español con «eres». El pronombre explícito «tú» se conserva para dar énfasis al confesado y reflejar el orden enfático del griego.
theological_decisions:
- issue: Force of προσκυνέω toward Jesús
  english_pob_reading: Rendered as 'worshiped him'
  chosen_spanish_reading: se postraron ante él
  alternative_spanish_readings:
  - lo adoraron
  - le rindieron homenaje
  rationale: La escena admite tanto postración reverente como adoración. Dado que el español «se postraron ante él» conserva la acción corporal y deja abierta la carga cultual que el contexto mateano sugiere, evita decidir demasiado pronto entre homenaje y adoración. La confesión que sigue sostiene la lectura elevada sin introducir una paráfrasis más fuerte que la forma griega por sí sola.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Definiteness of θεοῦ υἱὸς
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios
  - un hijo de Dios
  rationale: En español, el artículo definido es el modo natural de expresar el título cristológico reconocido en este contexto. Traducirlo como indefinido debilitaría injustificadamente la confesión y no reflejaría el valor titular de la frase.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: El texto en inglés y la evaluación cruzada muestran concordancia alta y no requieren revisiones de fondo; el borrador español sigue la misma línea interpretativa, pero ajusta la elección de προσκυνέω a una formulación más neutral en español («se postraron ante él») para conservar la tensión lexical sin perder el peso confesional del contexto.
  spanish_consistency_notes:
  - Se mantiene «barca» para πλοῖον, en coherencia con un registro bíblico claro y moderno.
  - Se conserva «Hijo de Dios» como título cristológico definido, en línea con la lectura auditada del inglés.
  - La nota sobre προσκυνέω preserva la alternativa entre postración y adoración sin borrar la tensión semántica documentada.
  - La puntuación y el orden de la confesión siguen el ritmo natural del español bíblico contemporáneo.
