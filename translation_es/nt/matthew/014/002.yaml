revisions:
- from: 'Y dijo a sus sirvientes[a]: «Este es Juan el Bautista. Él ha sido levantado de entre los muertos, y por esto estas potencias están activas en él».'
  to: 'Y dijo a sus sirvientes[a]: «Este es Juan el Bautista. Él ha sido resucitado de entre los muertos, y por esto estos poderes[b] están actuando en él».'
  rationale: 'La revisión es menor y conservadora: mantiene la estructura del borrador, pero reemplaza ‘potencias’ por ‘poderes’ para una correspondencia más natural y fiel en español, fortalece ἐνεργοῦσιν con ‘están actuando’, corrige la nota al pie de παισίν y añade la nota necesaria sobre δυνάμεις siguiendo el rastro del POB inglés. También se ajusta ‘ha sido levantado’ a ‘ha sido resucitado’ para un español más idiomático sin perder el pasivo teológicamente importante.'
