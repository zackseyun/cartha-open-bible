translation:
  language: es
  text: 'Y dijo a sus sirvientes[a]: «Este es Juan el Bautista. Él ha sido resucitado de entre los muertos, y por esto estos poderes[b] están actuando en él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “asistentes” o “criados”. El griego παισίν puede abarcar varias relaciones de servicio o asistencia según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O “los poderes milagrosos”, o de manera más interpretativa, “los milagros”. El griego dice “los poderes” (αἱ δυνάμεις), refiriéndose al poder sobrenatural manifestado en obras poderosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: παισὶν
  english_pob_choice: servants
  chosen_spanish: sirvientes
  alternatives_spanish:
  - siervos
  - criados
  - asistentes
  lexicon: BDAG; el contexto de corte/hogar de Herodes favorece un término de relación servicial o de asistencia más que ‘niños’ o ‘muchachos’.
  rationale: παισὶν puede significar hijo, esclavo/siervo, o asistente según el contexto. Aquí Herodes habla a miembros de su entorno inmediato; ‘sirvientes’ comunica bien la relación social sin añadir un matiz demasiado formal o cortesano que el griego no exige. ‘Siervos’ es posible, pero en español puede sonar más religioso que doméstico/cortesano.
- source_word: ὁ βαπτιστής
  english_pob_choice: the Baptist
  chosen_spanish: el Bautista
  alternatives_spanish:
  - el Bautizador
  lexicon: BDAG; epíteto establecido para Juan.
  rationale: El título establecido en español es ‘Juan el Bautista’. Aunque ‘Bautizador’ refleja más transparentemente la forma griega, suena menos idiomático y no mejora la fidelidad del sentido en este contexto.
- source_word: ἠγέρθη
  english_pob_choice: has been raised
  chosen_spanish: ha sido levantado
  alternatives_spanish:
  - fue levantado
  - ha resucitado
  lexicon: BDAG; aoristo pasivo de ἐγείρω.
  rationale: El pasivo debe conservarse. ‘Ha sido levantado’ mantiene la voz pasiva y evita insinuar que él mismo se levantó. ‘Resucitado’ es una opción más tradicional, pero ‘levantado’ deja más visible el verbo de ἐγείρω y su conexión con el lenguaje de levantamiento/resurrección.
- source_word: ἀπὸ τῶν νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  lexicon: BDAG; giro idiomático griego.
  rationale: ‘De entre los muertos’ preserva la imagen idiomática y suena natural en español bíblico contemporáneo. ‘De los muertos’ es posible, pero algo menos explícito.
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por esto
  alternatives_spanish:
  - por esa razón
  - por lo cual
  lexicon: BDAG; expresión causal/inferencial.
  rationale: La frase introduce una inferencia causal. ‘Por esto’ es breve y fiel; evita endurecer el vínculo lógico con un ‘por tanto’ que en español puede sonar más conclusivo de lo que aquí sugiere el griego.
- source_word: αἱ δυνάμεις
  english_pob_choice: these powers
  chosen_spanish: estas potencias
  alternatives_spanish:
  - estos poderes
  - estas fuerzas milagrosas
  - los milagros
  lexicon: BDAG; δύναμις en plural puede referirse a poderes sobrenaturales operativos en hechos poderosos.
  rationale: Para evitar que ‘potencias’ suene a entidades políticas o abstractas, se usa aquí en sentido de poder sobrenatural operativo, cercano al valor de ‘powers’ del POB inglés. ‘Poderes’ también es viable, pero ‘potencias’ conserva mejor el plural sustantivado y la fuerza conceptual del término.
- source_word: ἐνεργοῦσιν
  english_pob_choice: are at work
  chosen_spanish: están activas
  alternatives_spanish:
  - están obrando
  - operan
  lexicon: BDAG; ἐνεργέω = estar en acción, actuar eficazmente.
  rationale: En español, con ‘potencias’ como sujeto, ‘están activas’ reproduce bien la idea de operación eficaz sin necesidad de una perífrasis demasiado literal. ‘Están obrando’ sería posible, pero puede personalizar más el sujeto de lo que el griego requiere.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por medio de él
  lexicon: BDAG; valor locativo/esférico de ἐν.
  rationale: 'Se mantiene la relación locativa más directa: las potencias actúan ‘en él’. ‘Por medio de él’ es interpretativo y desplaza el matiz más inmediato del griego.'
theological_decisions:
- issue: Naturaleza de la afirmación sobre Juan
  english_pob_reading: He has been raised from the dead
  chosen_spanish_reading: Él ha sido levantado de entre los muertos
  alternative_spanish_readings:
  - Él ha resucitado de entre los muertos
  - Él fue levantado de entre los muertos
  rationale: Se conserva el pasivo de ἠγέρθη para no suavizar ni transformar la afirmación de Herodes en una formulación menos directa. La traducción mantiene la tensión del dicho sin resolver la cuestión narrativo-teológica más allá de la gramática del griego.
  doctrine_reference: Prioridad del texto original; preservar la voz pasiva y la tensión exegética sin sobreinterpretación.
- issue: Sentido de δυνάμεις
  english_pob_reading: these powers are at work in him
  chosen_spanish_reading: estas potencias están activas en él
  alternative_spanish_readings:
  - estos poderes están obrando en él
  - estas fuerzas milagrosas están activas en él
  - los milagros están ocurriendo en él
  rationale: El plural δυνάμεις puede señalar poder sobrenatural manifestado en obras poderosas. La redacción principal conserva el término de poder sin colapsarlo inmediatamente en ‘milagros’, dejando abierta la lectura lexical y teológica que el contexto sugiere.
  doctrine_reference: Equivalencia óptima; mantener la referencia a poder sobrenatural sin cerrar prematuramente el matiz del término.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se preservó el pasivo de ἠγέρθη, el valor causal de διὰ τοῦτο y el término plural de δύναμις sin reducirlo a ‘milagros’. La versión española mantiene la tensión lexical de los ‘poderes’ mientras ajusta el estilo para que suene natural y publicable en español.'
  spanish_consistency_notes:
  - Se usó ‘Jesús’/‘Dios’ por norma general del proyecto, pero este verso no los contiene.
  - Se evitó ‘Cristo’ porque no aparece en el versículo y no corresponde introducirlo.
  - ‘Bautista’ se conserva como título establecido y no como traducción mecánica de una función verbal.
  - Se eligió una formulación pasiva visible (‘ha sido levantado’) para reflejar ἠγέρθη.
  - ‘Potencias’ se emplea como opción española auditable para δυνάμεις, manteniendo el plural y el matiz de poder sobrenatural.
