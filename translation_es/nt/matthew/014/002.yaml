  - severity: medium
    issue: ‘están activas’ para ἐνεργοῦσιν
    rationale: La idea griega no es solo estado (‘activas’) sino operación eficaz (‘están actuando/obrando’). La redacción actual atenúa el dinamismo verbal del original.
  - severity: low
    issue: Nota al pie de [a] mal formulada
    rationale: La nota ofrece como alternativa ‘los sirvientes’, que no es una alternativa real al texto base ‘sirvientes’. Debe listar alternativas genuinas como ‘asistentes’ o ‘criados’.
  - severity: low
    issue: ‘ha sido levantado’ suena algo rígido en español
    rationale: Preserva bien el pasivo, pero ‘ha sido resucitado’ es más natural en este contexto sin perder la decisión teológica del POB de mantener la voz pasiva. No es error grave, pero mejora la legibilidad.
