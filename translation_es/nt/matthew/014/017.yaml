    issue: La cláusula negativa «No tenemos aquí más que…» es fiel pero no refleja tan directamente la fuerza de «We have nothing here except… / We do not have here except…».
    rationale: Οὐκ ἔχομεν, en este contexto, puede expresarse en español de manera más completa como «No tenemos nada aquí, excepto…», lo cual preserva mejor la negación enfática sin perder naturalidad. «Más que» es idiomático, pero reduce un poco la explicitud de «nada» que el audit trail inglés decidió destacar.
  - severity: low
    issue: Falta una nota que preserve la alternativa idiomática/literal documentada en el audit trail inglés.
    rationale: El inglés incluyó una nota léxica para la formulación más literal. En español conviene conservar una nota equivalente, especialmente si se adopta una redacción principal distinta.
