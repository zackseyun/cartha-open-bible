translation:
  language: es
  text: 'Pero ellos le dijeron: «No tenemos nada aquí[a], excepto cinco panes y dos peces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «No tenemos aquí más que cinco panes y dos peces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Entonces ellos
  lexicon: BDAG
  rationale: δέ marca una leve oposición o transición respecto de la instrucción anterior; en español, «Pero» conserva ese contraste. Se explicita el sujeto con «ellos» para que la referencia a los discípulos quede clara y natural en español.
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dicen
  - le hablaron
  lexicon: BDAG
  rationale: El presente histórico griego se vierte de manera natural en pasado simple en español narrativo. «Le dijeron» mantiene la función discursiva sin perder fluidez.
- source_word: Οὐκ ἔχομεν
  english_pob_choice: We have nothing
  chosen_spanish: No tenemos
  alternatives_spanish:
  - No tenemos nada
  - No poseemos
  lexicon: BDAG
  rationale: La negación de posesión en español se expresa de forma más natural con «No tenemos». La idea de carencia total queda completada por la cláusula siguiente «más que».
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: ὧδε es un adverbio locativo; «aquí» es la equivalencia más directa y natural en español.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: más que
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: 'Después de una negación, εἰ μή introduce una excepción. En español, «más que» reproduce bien el valor restrictivo e idiomático en esta frase: «No tenemos aquí más que…».'
- source_word: πέντε ἄρτους
  english_pob_choice: five loaves
  chosen_spanish: cinco panes
  alternatives_spanish:
  - cinco hogazas
  - cinco panes de pan
  lexicon: BDAG
  rationale: ἄρτος puede significar «pan» o «panes/loaves» según el contexto. En español, «cinco panes» es natural, breve y conserva la referencia a unidades de pan sin sobreespecificar.
- source_word: δύο ἰχθύας
  english_pob_choice: two fish
  chosen_spanish: dos peces
  alternatives_spanish:
  - dos pescados
  - dos peces de agua
  lexicon: BDAG
  rationale: ἰχθύς significa «pez/pescado». En este contexto narrativo, «peces» conserva el sentido básico del sustantivo y la imagen del relato; «pescados» podría sonar más culinario.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de SBLGNT y concuerda con el audit trail en inglés: la negación de posesión y la estructura restrictiva εἰ μή se han vertido de forma idiomática en español sin perder el sentido literal. No se registran cambios de revisión en el expediente.'
  spanish_consistency_notes:
  - Se mantiene un registro neutral y reverente adecuado para lectura eclesial.
  - Se evita «SEÑOR» porque no aparece el tetragrama ni un equivalente directo en este versículo.
  - «Panes» se eligió como plural natural en español para ἄρτους, sin forzar la imagen a una glosa excesiva.
  - No se introducen notas al pie porque no hay una ambigüedad relevante que requiera anclaje textual en esta breve unidad.
