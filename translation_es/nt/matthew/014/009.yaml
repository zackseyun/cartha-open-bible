translation:
  language: es
  text: Y el rey, aunque entristecido[a], por causa de sus juramentos y de los que estaban a la mesa con él[b], ordenó que se concediera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aunque apesadumbrado». El griego presenta una idea concesiva: el rey actúa aun estando entristecido.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los que estaban reclinados a la mesa con él». La expresión griega alude a la costumbre de comer reclinados en esa época.'
    reason: cultural_note
  - marker: c
    text: El griego deja implícito el objeto de «se concediera»; el referente es la petición mencionada en el contexto anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπηθεὶς
  english_pob_choice: though grieved
  chosen_spanish: aunque apesadumbrado
  alternatives_spanish:
  - aunque entristecido
  - aunque afligido
  - aunque estaba dolido
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa que el rey quedó en estado de tristeza o pesar. En español, «aunque apesadumbrado» conserva bien el valor concesivo que la POB documenta en inglés y mantiene el contraste con la acción que sigue.
- source_word: βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el gobernante
  lexicon: BDAG
  rationale: βασιλεύς significa de manera directa «rey». «El rey» es la equivalencia natural y precisa en español.
- source_word: διὰ τοὺς ὅρκους
  english_pob_choice: because of his oaths
  chosen_spanish: por causa de sus juramentos
  alternatives_spanish:
  - a causa de sus juramentos
  - debido a sus juramentos
  - por sus juramentos
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Juramentos» refleja ὅρκους con la fuerza de compromisos solemnes; «sus» se sobreentiende del contexto y puede expresarse naturalmente en español.
- source_word: τοὺς συνανακειμένους
  english_pob_choice: those dining with him
  chosen_spanish: de los que estaban reclinados a la mesa con él
  alternatives_spanish:
  - de los que comían con él
  - de sus comensales
  - de los que estaban a la mesa con él
  lexicon: BDAG
  rationale: El participio remite al grupo que compartía la comida en la postura habitual del mundo antiguo. En español, «reclinados a la mesa» preserva ese trasfondo cultural que la POB documenta, sin perder claridad.
- source_word: ἐκέλευσεν
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes de
  lexicon: BDAG
  rationale: κελεύω significa ordenar o mandar. «Ordenó» es conciso y fiel al tono narrativo.
- source_word: δοθῆναι
  english_pob_choice: it to be given
  chosen_spanish: que se le diera
  alternatives_spanish:
  - que fuera dada
  - que se entregara
  - que le dieran
  lexicon: BDAG
  rationale: El infinitivo pasivo deja implícito el objeto, que se recupera del contexto previo. «Que se le diera» mantiene esa elipsis y no introduce un objeto explícito que el versículo griego no expresa.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de SBLGNT y conserva la tensión del texto: el rey actúa con pesar, movido por sus juramentos y por la presencia social de sus comensales. Se mantiene el objeto implícito de «dar» sin especificarlo, conforme al audit trail en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «juramentos» para ὅρκους por su fuerza de compromiso solemne, en lugar de suavizarlo a «promesas».
  - «Reclinados a la mesa» conserva el trasfondo cultural de συνανακειμένους y evita una modernización que borre la imagen antigua.
  - No hay decisiones sobre Cristo/Mesías, Espíritu o justicia en este versículo.
