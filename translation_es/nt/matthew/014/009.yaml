revisions:
- from: Y el rey[a], aunque apesadumbrado, por causa de sus juramentos y de los que estaban reclinados a la mesa con él[b], ordenó que se le diera.
  to: Y el rey, aunque entristecido[a], por causa de sus juramentos y de los que estaban a la mesa con él[b], ordenó que se concediera[c].
  rationale: Se reanclan correctamente las notas, se añade la nota exigida por la elipsis de δοθῆναι, y se suaviza el español sin perder el sentido del griego ni las decisiones documentadas por la POB. «Aunque entristecido» y «estaban a la mesa con él» son más naturales en español, mientras que las notas conservan las alternativas y el trasfondo cultural pertinentes.
