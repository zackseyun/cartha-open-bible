translation:
  language: es
  text: Pero la barca ya estaba a muchos estadios de distancia de la tierra[a], siendo azotada por las olas[c][b], porque el viento le era contrario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de la orilla’ / ‘de la costa’. El griego dice ‘de la tierra’.
    reason: lexical_alternative
  - marker: b
    text: Un estadio era una antigua unidad de distancia, de aproximadamente 185 metros.
    reason: cultural_note
  - marker: c
    text: O ‘siendo golpeada por las olas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: BDAG
  rationale: En este contexto de cruce en el mar de Galilea, πλοῖον puede ser ‘boat’/‘ship’. ‘Barca’ es natural en español para una nave pequeña o mediana de pesca y evita exagerar el tamaño con ‘barco’.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya para entonces
  - ya
  lexicon: BDAG
  rationale: ἤδη señala que la situación ya estaba en ese estado. ‘Ya’ reproduce bien esa idea en español con fluidez narrativa.
- source_word: σταδίους πολλοὺς
  english_pob_choice: many stadia
  chosen_spanish: a muchos estadios
  alternatives_spanish:
  - a gran distancia
  - a muchos estadios
  lexicon: BDAG
  rationale: Se conserva la unidad antigua ‘estadios’ para mantener transparencia al texto fuente, como hace la POB en inglés. No se convierte la medida en una paráfrasis.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la orilla
  - de la costa
  - de la tierra
  lexicon: BDAG
  rationale: γῆ puede significar tierra, suelo o tierra firme. Aquí el griego dice literalmente ‘de la tierra’; por eso se conserva ‘tierra’, dejando la posible idea contextual de ‘orilla’ como alternativa en nota.
- source_word: ἀπεῖχεν
  english_pob_choice: was ... from
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba alejada
  - se hallaba
  lexicon: BDAG
  rationale: ἀπέχω expresa distancia espacial. En español, ‘estaba ... de’ resulta más natural que una construcción demasiado rígida, manteniendo el sentido de separación respecto de la tierra.
- source_word: βασανιζόμενον
  english_pob_choice: being battered
  chosen_spanish: siendo azotada
  alternatives_spanish:
  - siendo golpeada
  - siendo sacudida
  - siendo castigada
  lexicon: BDAG
  rationale: βασανίζω aquí describe el padecimiento físico de la barca por el oleaje. ‘Siendo azotada’ comunica con fuerza el impacto de las olas sin trasladar innecesariamente la idea psicológica de ‘tormento’.
- source_word: ὑπὸ τῶν κυμάτων
  english_pob_choice: by the waves
  chosen_spanish: por las olas
  alternatives_spanish:
  - por las olas
  - por los oleajes
  lexicon: BDAG
  rationale: κύματα son ‘olas’ en este contexto. ‘Olas’ es la opción más natural y clara en español, y conserva la imagen marítima directa.
- source_word: ἐναντίος
  english_pob_choice: against it
  chosen_spanish: le era contrario
  alternatives_spanish:
  - estaba en contra
  - le era opuesto
  lexicon: BDAG
  rationale: ἐναντίος significa contrario/opuesto. En español, ‘le era contrario’ expresa bien la oposición del viento a la barca sin forzar un complemento explícito que el griego deja implícito por contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce transición con matiz de contraste. ‘Pero’ refleja adecuadamente el giro narrativo hacia la difícil condición de la barca.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación. ‘Porque’ es la forma más natural en español para dar la razón del estado de la barca.
translation_notes:
  revision_awareness: 'La revisión en inglés quedó sin cambios sustanciales; el acuerdo de revisión es alto y no se documentaron ajustes aplicados. Esta versión española sigue de cerca el texto griego y conserva las dos decisiones transparentes del audit trail: la medida antigua y la ambigüedad contextual de γῆ.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino y la terminología cristológica conforme a las normas del proyecto, aunque este versículo no los contiene.
  - Se conserva la medida antigua ‘estadios’ para reflejar la transparencia del original.
  - Se prefiere ‘barca’ por naturalidad contextual en una escena de navegación en Galilea.
  - Se evita introducir ‘mar’ donde el griego habla específicamente de ‘olas’ y del viento contrario.
