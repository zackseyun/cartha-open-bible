revisions:
- from: Pero la barca ya estaba a muchos estadios de la tierra[a], siendo azotada por las olas[c][b], porque el viento le era contrario.
  to: Pero la barca ya estaba a muchos estadios de distancia de la tierra[a], siendo azotada por las olas[c][b], porque el viento le era contrario.
  rationale: Se realiza una reparación menor para que el español exprese con naturalidad el valor de distancia espacial de ἀπέχω, sin alterar el contenido ni las notas léxicas ya bien planteadas.
