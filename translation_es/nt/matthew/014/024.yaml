    text: Or 'from shore' / 'from the shore.' The Greek says 'from the land.'
    reason: lexical_alternative
  - marker: b
    text: A stadion was an ancient unit of distance, roughly 185 meters (about 607 feet).
    reason: cultural_note
  - marker: c
    text: Or 'being buffeted by the waves.'
    reason: lexical_alternative
