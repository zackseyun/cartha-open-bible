    rationale: La alternativa documentada ‘Este es un lugar desolado’ corresponde claramente a Ἔρημός ἐστιν ὁ τόπος. Tal como está, la nota crea una asociación errónea con ἀπόλυσον τοὺς ὄχλους.
  - severity: medium
