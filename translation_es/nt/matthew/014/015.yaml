translation:
  language: es
  text: 'Ya al anochecer, los discípulos se acercaron a él y le dijeron: «El lugar está desierto[a], y ya es tarde. Despide a las multitudes, para que vayan a las aldeas y compren comida para sí mismos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Este es un lugar desolado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψίας δὲ γενομένης
  english_pob_choice: Now when evening came
  chosen_spanish: Ya al anochecer
  alternatives_spanish:
  - Cuando llegó la noche
  - Cuando ya anochecía
  lexicon: BDAG
  rationale: La construcción genitiva absoluta marca transición temporal. «Ya al anochecer» conserva el valor de cambio de escena con un español natural y breve; «ya» reproduce el matiz discursivo de δέ en continuidad narrativa.
- source_word: προσῆλθον αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - fueron a él
  lexicon: BDAG
  rationale: προσέρχομαι expresa acercarse o ir hacia alguien. «Se acercaron a él» mantiene la dirección y resulta más idiomático en español que un simple «vinieron», sin añadir sentido ausente.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  - los seguidores
  lexicon: BDAG
  rationale: El artículo identifica al grupo conocido en el relato; «discípulos» es la equivalencia directa y no requiere posesivo explícito.
- source_word: Ἔρημός ἐστιν ὁ τόπος
  english_pob_choice: The place is deserted
  chosen_spanish: El lugar está desierto
  alternatives_spanish:
  - Este es un lugar desolado
  - El lugar es un desierto
  lexicon: BDAG
  rationale: ἔρημος aquí describe un sitio apartado o sin población cercana. «Está desierto» comunica el estado del lugar de modo natural; se evita «desolado» porque en español puede sonar más emocional o geográfico de lo que exige el contexto.
- source_word: ἡ ὥρα ἤδη παρῆλθεν
  english_pob_choice: the hour is already late
  chosen_spanish: la hora ya es tarde
  alternatives_spanish:
  - el tiempo ya pasó
  - la hora ya ha pasado
  lexicon: BDAG
  rationale: La expresión es idiomática y señala que el día va avanzado. «La hora ya es tarde» conserva la imagen temporal sin volverla demasiado literal; se mantiene el valor de «ya» y el carácter de urgencia.
- source_word: ἀπόλυσον τοὺς ὄχλους
  english_pob_choice: Send the crowds away
  chosen_spanish: Despide a las multitudes
  alternatives_spanish:
  - Envía a la gente
  - Despacha a la multitud
  lexicon: BDAG
  rationale: ἀπολύω en este contexto significa despedir o enviar fuera. «Despide» preserva la fuerza de una autorización para que se vayan; «multitudes» sigue el plural del griego y del inglés POB, aunque «gente» sería más libre.
- source_word: ἵνα ἀπελθόντες
  english_pob_choice: so that they may go
  chosen_spanish: para que vayan
  alternatives_spanish:
  - a fin de que vayan
  - para que se vayan
  lexicon: BDAG
  rationale: El participio con ἵνα expresa propósito. En español, «para que vayan» es la forma más directa y clara, manteniendo el valor final sin sobrecargar la sintaxis.
- source_word: εἰς τὰς κώμας
  english_pob_choice: into the villages
  chosen_spanish: a las aldeas
  alternatives_spanish:
  - a los pueblos
  - en las aldeas
  lexicon: BDAG
  rationale: κώμη designa una aldea o poblado pequeño. «A las aldeas» transmite el destino de movimiento y evita el matiz urbano que «pueblos» puede tener en algunos contextos; no se añade «cercanas» porque no está explícito.
- source_word: ἀγοράσωσιν ἑαυτοῖς βρώματα
  english_pob_choice: buy food for themselves
  chosen_spanish: compren comida para sí mismos
  alternatives_spanish:
  - compren alimento para ellos mismos
  - adquieran provisiones para sí
  lexicon: BDAG
  rationale: βρῶμα es comida/alimento. «Comida» es la opción más natural y clara en español actual; se conserva ἑαυτοῖς con «para sí mismos» para reflejar el matiz reflexivo sin hacerlo más pesado que «para ellos mismos».
translation_notes:
  revision_awareness: La versión sigue de cerca el griego SBLGNT y concuerda con el audit trail inglés en el encuadre temporal, el valor de ἔρημος, el sentido de ἀπολύω como despedir, y el propósito final de la cláusula ἵνα. No se introdujeron revisiones textuales ni cambios doctrinales.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo sobrio y digno, con vocabulario ampliamente comprensible en español latinoamericano.
  - Se evitó «SEÑOR» porque no aparece el nombre divino ni una cita explícita de κύριος en este versículo.
  - «Multitudes» conserva el plural del griego y la opción del inglés POB; «la gente» habría suavizado el número, pero aquí no era necesario.
  - La nota al pie ancla únicamente la ambigüedad léxica de ἔρημος, siguiendo el patrón del audit trail inglés.
