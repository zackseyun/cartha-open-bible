translation:
  language: es
  text: 'Pero Jesús les dijo[a]: «No necesitan irse; denles ustedes mismos de comer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tienen necesidad de irse; ustedes mismos denles de comer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo leve y una contraposición implícita con la solución esperada por los discípulos. «Pero» conserva esa transición con naturalidad en español.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo a ellos
  lexicon: BDAG
  rationale: La fórmula narrativa se expresa de modo idiomático en español con «les dijo», que conserva el objeto indirecto y la sencillez del griego.
- source_word: Οὐ χρείαν ἔχουσιν
  english_pob_choice: They have no need
  chosen_spanish: No tienen necesidad
  alternatives_spanish:
  - No necesitan
  - No les hace falta
  lexicon: BDAG
  rationale: χρείαν ἔχουσιν mantiene la idea de necesidad/urgencia. «No tienen necesidad» reproduce bien la estructura y el matiz formal del griego sin perder claridad.
- source_word: ἀπελθεῖν
  english_pob_choice: to go away
  chosen_spanish: irse
  alternatives_spanish:
  - alejarse
  - marcharse
  lexicon: BDAG
  rationale: En este contexto de despedir a la multitud, «irse» es el equivalente más natural y directo; comunica la idea de salir del lugar sin añadir paráfrasis.
- source_word: δότε
  english_pob_choice: give
  chosen_spanish: denles
  alternatives_spanish:
  - dadles
  - ustedes den
  lexicon: BDAG
  rationale: El imperativo plural se vierte como mandato directo en español. «Denles» expresa con claridad la orden a los discípulos y mantiene el destinatario plural.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se refleja naturalmente con el clítico de objeto indirecto «les», que en español evita una construcción pesada.
- source_word: ὑμεῖς
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - vosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego. «Ustedes mismos» conserva esa insistencia sobre los discípulos como agentes, sin volver el español artificioso.
- source_word: φαγεῖν
  english_pob_choice: something to eat
  chosen_spanish: de comer
  alternatives_spanish:
  - algo para comer
  - comida
  lexicon: BDAG
  rationale: En la construcción con δίδωμι, el infinitivo se expresa de forma idiomática en español con «de comer». Mantiene el sentido de proveer alimento sin sobreespecificar el objeto implícito.
theological_decisions:
- issue: Énfasis en la responsabilidad de los discípulos
  english_pob_reading: Render ὑμεῖς emphatically as 'you yourselves'
  chosen_spanish_reading: «ustedes mismos»
  alternative_spanish_readings:
  - «ustedes»
  - «ustedes mismos denles»
  rationale: La forma enfática no introduce una interpretación nueva; solo preserva la presión retórica del mandato de Jesús sobre los discípulos como ejecutores de la acción.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal donde corresponde.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estable del nombre propio.
  - Se conserva la relación directa del mandato plural con «ustedes mismos» para reflejar el énfasis del griego.
  - «No tienen necesidad» y «irse» buscan fidelidad semántica y naturalidad española sin expandir el sentido.
