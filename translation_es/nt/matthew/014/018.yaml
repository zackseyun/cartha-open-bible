lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δὲ funciona como una conexión leve; en español, «Pero» reproduce bien el contraste inmediato con la objeción previa de los discípulos y mantiene un tono natural.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: él dijo
  alternatives_spanish:
  - les dijo
  - dijo
  lexicon: BDAG
  rationale: El aoristo de λέγω se vierte de forma directa con «dijo». Se mantiene el sujeto explícito para claridad narrativa, sin añadir la matiz de destinatario que no está en el verbo.
- source_word: Φέρετέ
  english_pob_choice: Bring
  chosen_spanish: Entréguenme
  alternatives_spanish:
  - Traigan
  - Tráiganlos
  lexicon: BDAG
  rationale: φέρω en imperativo plural expresa la orden de hacer llegar los elementos al hablante. En este contexto, «Entréguenme» capta mejor en español la idea de ponerlos en sus manos, sin perder el valor imperativo.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: BDAG
  rationale: El dativo de destino se naturaliza en español con el pronombre enclítico «me», más idiomático que una construcción analítica en esta orden breve.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  lexicon: BDAG
  rationale: ὧδε indica lugar cercano al hablante; «aquí» es la correspondencia más directa y sobria en español.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los mismos
  - éstos
  lexicon: BDAG
  rationale: Aunque el antecedente son los panes y los peces, el pronombre masculino plural griego se refiere a esos elementos. En español, el objeto directo plural se expresa naturalmente con «los», con el enclítico unido a la orden para reflejar el movimiento hacia el hablante.
translation_notes:
  revision_awareness: El texto griego es breve y directo; la revisión reciente no introdujo cambios textuales. La decisión principal fue conservar la fuerza imperativa y la referencia contextual implícita al antecedente del versículo previo, sin explicitarlo en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se preservó la referencia implícita del pronombre griego mediante una nota, en línea con el audit trail inglés.
  - «Entréguenme» se escogió por claridad contextual; aunque «Traiganlos aquí» sería más literal, suena menos natural para el español y no comunica tan bien la idea de poner los elementos a disposición de Jesús.
