translation:
  language: es
  text: Y después de cruzar[a], llegaron a la tierra de Genesaret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''llegaron a tierra en Genesaret''. El griego combina ''a la tierra'' con ''en Genesaret'', expresando la llegada a tierra o a la orilla en la región de Genesaret.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y así
  lexicon: conjunción coordinante
  rationale: Se conserva la simple coordinación narrativa del griego con una conjunción inicial natural en español.
- source_word: διαπεράσαντες
  english_pob_choice: after crossing over
  chosen_spanish: después de cruzar al otro lado
  alternatives_spanish:
  - habiendo cruzado al otro lado
  - después de haber cruzado
  lexicon: aoristo participial antecedente
  rationale: El participio aoristo previo al verbo principal expresa acción anterior; en español suena natural como circunstancia temporal antecedente. 'Al otro lado' mantiene la idea del cruce marítimo sin añadir detalles no presentes.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - arribaron
  lexicon: ἔρχομαι
  rationale: En contexto de desplazamiento y arribo por agua, 'llegaron' comunica con claridad el resultado del movimiento. 'Vinieron' suena menos preciso; 'arribaron' es más marcado y menos común.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra firme
  - a la orilla
  lexicon: ἐπί + γῆ
  rationale: El griego dice literalmente 'sobre/a la tierra'. 'A la tierra' preserva la imagen básica de llegada desde el agua sin sustituirla por una interpretación más específica como 'orilla'.
- source_word: εἰς Γεννησαρέτ
  english_pob_choice: of Gennesaret
  chosen_spanish: de Genesaret
  alternatives_spanish:
  - en Genesaret
  - a Genesaret
  lexicon: topónimo
  rationale: El nombre propio se translitera como 'Genesaret'. Con 'la tierra de Genesaret' se conserva el vínculo del destino geográfico y se evita forzar una preposición única que no refleje toda la construcción griega combinada.
translation_notes:
  revision_awareness: El texto griego combina ἐπὶ τὴν γῆν con εἰς Γεννησαρέτ; la versión inglesa auditada resolvió la fricción espacial con 'the land of Gennesaret'. En español, 'la tierra de Genesaret' mantiene esa misma relación natural entre llegada física y región geográfica sin perder la literalidad del movimiento.
  spanish_consistency_notes:
  - Se usa 'Genesaret' como transliteración estable del topónimo Γεννησαρέτ.
  - Se evita 'Cristo' o terminología doctrinal no presente; el versículo es narrativo y no introduce carga teológica explícita.
  - '''A la tierra'' conserva la ambigüedad útil entre tierra firme y zona/territorio, acorde al griego y al audit trail inglés.'
