translation:
  language: es
  text: Al oír esto[a], Jesús se retiró de allí en barca a un lugar desierto, para estar a solas. Pero cuando las multitudes oyeron, lo siguieron a pie desde los pueblos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un lugar deshabitado» o «a un lugar solitario». El griego describe un área aislada o no habitada, no necesariamente un desierto arenoso.
    reason: lexical_alternative
  - marker: b
    text: O «desde las ciudades». La palabra griega puede referirse a pueblos o ciudades según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσας δὲ
  english_pob_choice: Now when ... heard
  chosen_spanish: Al oír esto
  alternatives_spanish:
  - Y al oír
  - Pero al oír
  - Cuando oyó
  lexicon: SBLGNT; BDAG
  rationale: El participio aoristo se entiende temporalmente; en español, una construcción inicial con infinitivo de gerundio suena natural y mantiene el avance narrativo. δέ aquí introduce la secuencia del relato, no una oposición fuerte, por eso no se marca como contraste adversativo pleno.
- source_word: ἀνεχώρησεν
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se retiró de allí
  - se fue
  lexicon: BDAG
  rationale: '''Se retiró'' conserva la idea de apartarse o retirarse de un lugar sin fijar un motivo no explícito. Evita tanto ''huir'' como un simple ''irse'', manteniendo la tensión narrativa documentada.'
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de ahí
  lexicon: BDAG
  rationale: Adverbio locativo directo; 'de allí' es la equivalencia natural en español.
- source_word: ἐν πλοίῳ
  english_pob_choice: by boat
  chosen_spanish: en barca
  alternatives_spanish:
  - por barca
  - en un barco
  lexicon: BDAG
  rationale: La preposición expresa medio de transporte. 'En barca' reproduce con naturalidad el medio empleado y encaja bien con el contexto narrativo galileo.
- source_word: εἰς ἔρημον τόπον
  english_pob_choice: to a desolate place
  chosen_spanish: a un lugar desierto
  alternatives_spanish:
  - a un lugar deshabitado
  - a un lugar apartado
  - a un lugar solitario
  lexicon: BDAG
  rationale: ἔρημος describe un sitio aislado o no habitado, no necesariamente un desierto arenoso. 'Lugar desierto' conserva esa fuerza de soledad/inhabitación sin añadir geografía indebida.
- source_word: κατ’ ἰδίαν
  english_pob_choice: by himself
  chosen_spanish: aparte
  alternatives_spanish:
  - solo
  - en privado
  - por su cuenta
  lexicon: BDAG
  rationale: La frase indica estar separado de otros, en privado o aparte. En español, 'aparte' se integra con naturalidad al final de la expresión y evita forzar una lectura específicamente reflexiva que el texto no explicita.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las multitudes de gente
  - la multitud
  - las gentes
  lexicon: BDAG
  rationale: El plural griego ὄχλοι se refleja mejor con un plural español. 'Las multitudes' preserva el carácter colectivo y evita reducirlo a una sola masa indistinta.
- source_word: ἠκολούθησαν αὐτῷ
  english_pob_choice: they followed him
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - le siguieron
  - fueron tras él
  lexicon: BDAG
  rationale: La forma verbal y el objeto se traducen de manera directa y natural. En español, el clítico de objeto directo 'lo' es idiomático y claro.
- source_word: πεζῇ
  english_pob_choice: on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - andando
  - por tierra
  - caminando
  lexicon: BDAG
  rationale: πεζῇ significa desplazarse caminando. 'A pie' es la correspondencia más idiomática y precisa.
- source_word: ἀπὸ τῶν πόλεων
  english_pob_choice: from the towns
  chosen_spanish: desde las ciudades
  alternatives_spanish:
  - desde los pueblos
  - de las ciudades
  lexicon: BDAG
  rationale: πόλις puede abarcar ciudades o poblaciones más pequeñas según el contexto. Aquí se mantiene la amplitud semántica con 'ciudades', siguiendo la alternativa que la tradición textual inglesa consideró posible, sin cerrarla innecesariamente a 'pueblos'.
theological_decisions:
- issue: Motivo de la retirada de Jesús
  english_pob_reading: Render ἀνεχώρησεν neutrally as 'withdrew' without importing motives beyond the immediate context.
  chosen_spanish_reading: Traducir 'se retiró' de manera neutral, sin especificar un motivo no dicho por el texto.
  alternative_spanish_readings:
  - se retiró por seguridad
  - se apartó para estar solo
  - se fue a descansar
  rationale: El versículo muestra la acción de retirarse después de oír, pero no explica la motivación. La traducción conserva esa indeterminación y evita resolverla interpretativamente.
  doctrine_reference: Preservar la tensión interpretativa del texto, sin añadir explicación teológica no explícita.
translation_notes:
  revision_awareness: La base inglesa se revisó recientemente y quedó sin cambios; esta propuesta sigue de cerca el audit trail aprobado, manteniendo las decisiones léxicas y la cautela teológica documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para Ἰησοῦς.
  - Se conserva la distinción entre 'lugar desierto' y 'desierto' geográfico, según el valor de ἔρημος.
  - '''Las multitudes'' refleja el plural de ὄχλοι y evita singularizar el sujeto.'
  - '''A pie'' preserva el sentido instrumental de πεζῇ con español natural.'
  - Las notas al pie conservan las alternativas documentadas en el texto fuente inglés.
