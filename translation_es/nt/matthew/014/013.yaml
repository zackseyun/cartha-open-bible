base_translation:
  language: en
  yaml_path: translation/nt/matthew/014/013.yaml
  text: Now when Jesus heard this[a], he withdrew from there by boat to a desolate place by himself. But when the crowds heard[b], they followed him on foot from the towns.
  footnotes:
  - marker: a
    text: Or 'to a deserted place' or 'to a solitary place.' The Greek describes an isolated or uninhabited area, not necessarily a sandy desert.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the cities.' The Greek word can refer to towns or cities depending on context.
    reason: lexical_alternative
