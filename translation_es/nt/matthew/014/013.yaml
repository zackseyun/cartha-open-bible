revisions:
- from: Al oír esto[a], Jesús se retiró de allí en barca a un lugar desierto, aparte. Pero al oírlo[b] las multitudes, lo siguieron a pie desde las ciudades.
  to: Al oír esto[a], Jesús se retiró de allí en barca a un lugar desierto, para estar a solas. Pero cuando las multitudes oyeron, lo siguieron a pie desde los pueblos[b].
  rationale: Se corrige la ubicación de la nota [b] para que corresponda al término que realmente comenta. Se ajusta «ciudades» a «pueblos» para alinearse con la decisión lexical principal del POB en inglés sobre ἀπὸ τῶν πόλεων. También se mejora la naturalidad de κατ’ ἰδίαν con «para estar a solas», que comunica mejor en español el valor de separación/privacidad sin añadir motivo interpretativo.
