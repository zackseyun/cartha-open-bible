review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Jesús oye, se retira de allí en embarcación hacia un lugar aislado, y las multitudes lo siguen a pie. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y el rastro POB en inglés: (1) la nota [b] está anclada en «oírlo», pero el contenido de la nota trata ἀπὸ τῶν πόλεων, por lo que el marcador debe moverse a «ciudades»/«pueblos»; (2) «desde las ciudades» es posible, pero el inglés POB eligió como texto principal «from the towns», y en este contexto galileo «pueblos» o «poblaciones» refleja mejor la decisión documentada. Además, «aparte» suena algo suelto para κατ’ ἰδίαν; «para estar a solas» o «él solo» expresa mejor el valor adverbial en español.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta detalles mejorables de naturalidad y precisión. «A un lugar desierto, aparte» es comprensible, aunque algo cortado; una formulación más fluida sería «a un lugar desierto para estar a solas». «Las multitudes» es aceptable, aunque «las multitudes»/«la gente» depende del registro; no requiere cambio. El problema principal de calidad editorial es la mala colocación de la nota [b], que crea incoherencia entre texto y nota.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Jesús» está correcto. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La decisión «lugar desierto» concuerda con la nota que aclara que no implica desierto arenoso. Para ἀπὸ τῶν πόλεων conviene alinear mejor con la decisión auditada en inglés usando «pueblos» como texto principal y «ciudades» como alternativa en nota.
  issues:
  - severity: high
    issue: El marcador [b] está colocado sobre «oírlo», pero la nota explica ἀπὸ τῶν πόλεων.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí la nota lexical alternativa trata «pueblos/ciudades», no el verbo «oír».
  - severity: medium
    issue: «Desde las ciudades» no sigue la elección principal documentada del POB en inglés («from the towns»).
    rationale: Aunque πόλις puede significar ciudad o pueblo, el rastro auditado prefiere «towns» por el contexto. El español debería reflejar esa preferencia salvo razón fuerte en contra, que aquí no se documenta.
  - severity: low
    issue: «Aparte» como traducción de κατ’ ἰδίαν queda algo abrupto en la sintaxis española.
    rationale: El sentido es ‘a solas / en privado / él solo’. Una reformulación más idiomática mejora la legibilidad sin perder la neutralidad exegética.
  revised_spanish_text: Al oír esto[a], Jesús se retiró de allí en barca a un lugar desierto, para estar a solas. Pero cuando las multitudes oyeron, lo siguieron a pie desde los pueblos[b].
  revised_footnotes:
  - marker: a
    text: O «a un lugar deshabitado» o «a un lugar solitario». El griego describe un área aislada o no habitada, no necesariamente un desierto arenoso.
    reason: lexical_alternative
  - marker: b
    text: O «desde las ciudades». La palabra griega puede referirse a pueblos o ciudades según el contexto.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota [b] para que corresponda al término que realmente comenta. Se ajusta «ciudades» a «pueblos» para alinearse con la decisión lexical principal del POB en inglés sobre ἀπὸ τῶν πόλεων. También se mejora la naturalidad de κατ’ ἰδίαν con «para estar a solas», que comunica mejor en español el valor de separación/privacidad sin añadir motivo interpretativo.
