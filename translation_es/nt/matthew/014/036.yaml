    text: Or 'hem' or 'edge'; the Greek term can refer to the border or fringe of a garment, possibly including its tassel.
    reason: lexical_alternative
  - marker: b
    text: Or 'were made well'; the Greek verb can mean 'were healed,' 'were restored,' or more broadly 'were saved/rescued,' but here the context is physical healing.
    reason: lexical_alternative
