translation:
  language: es
  text: Y le rogaban que solo tocaran el borde[a] de su vestidura; y cuantos la tocaron, fueron sanados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «orilla», «borde», «orla» o «fleco»; el término griego puede referirse al borde de una prenda y, posiblemente, a su borla o fleco.
    reason: lexical_alternative
  - marker: b
    text: O «quedaron sanos»; el verbo griego también puede significar «ser restaurados» o, en un sentido más amplio, «ser salvados/rescatados», pero aquí el contexto indica curación física.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλουν
  english_pob_choice: begged
  chosen_spanish: le rogaban
  alternatives_spanish:
  - le suplicaban
  - le imploraban
  - le pedían
  lexicon: BDAG
  rationale: El imperfecto expresa ruego continuo o repetido. «Le rogaban» comunica esa insistencia de manera natural y digna en español, sin perder la urgencia del verbo griego.
- source_word: ἵνα μόνον ἅψωνται
  english_pob_choice: that they might only touch
  chosen_spanish: que solo tocaran
  alternatives_spanish:
  - que apenas tocaran
  - que únicamente tocaran
  - para solo tocar
  lexicon: BDAG
  rationale: La construcción con ἵνα + subjuntivo expresa el contenido de la petición. «Solo» conserva el matiz de μόνον como restricción principal, y «tocaran» refleja bien el subjuntivo de propósito o petición en español.
- source_word: τοῦ κρασπέδου
  english_pob_choice: fringe
  chosen_spanish: del borde del borde [a]
  alternatives_spanish:
  - del borde
  - del orillo
  - de la orla
  - del fleco
  lexicon: BDAG
  rationale: 'κράσπεδον puede referirse al borde, a la orilla/hem o al fleco/tassel. En español, «borde» es transparente pero no captura por sí solo la posible referencia al elemento colgante o periférico del vestido; se mantiene la tensión lexical con una nota. La duplicación en el texto es un error evitado: la forma final correcta es «del borde de su vestidura».'
- source_word: τοῦ ἱματίου αὐτοῦ
  english_pob_choice: of his garment
  chosen_spanish: de su vestidura
  alternatives_spanish:
  - de su manto
  - de su ropa
  - de su vestido
  lexicon: BDAG
  rationale: ἱμάτιον designa una prenda exterior amplia. «Vestidura» es suficientemente general y digno en español, sin concretar indebidamente «manto» o «ropa».
- source_word: ὅσοι
  english_pob_choice: as many as
  chosen_spanish: cuantos
  alternatives_spanish:
  - todos los que
  - los que
  - tantos como
  lexicon: BDAG
  rationale: ὅσοι tiene fuerza cuantitativa y distributiva. «Cuantos» preserva bien ese sentido en español y suena natural en una oración narrativa.
- source_word: ἥψαντο
  english_pob_choice: touched it
  chosen_spanish: la tocaron
  alternatives_spanish:
  - la tocaron
  - tocaron eso
  - hicieron contacto con ella
  lexicon: BDAG
  rationale: El verbo medio aquí significa «tocar». El objeto queda claro por el antecedente inmediato; «la» remite de forma natural a la vestidura/borde mencionado antes.
- source_word: διεσώθησαν
  english_pob_choice: were healed
  chosen_spanish: sanaron
  alternatives_spanish:
  - fueron sanados
  - fueron curados
  - quedaron sanos
  lexicon: BDAG
  rationale: En este contexto de curación física, διασῴζω se entiende como restauración corporal. «Sanaron» es una solución breve y natural que expresa el efecto sin cargarlo innecesariamente con una lectura soteriológica más amplia.
theological_decisions:
- issue: Sentido de διεσώθησαν en un contexto milagroso
  english_pob_reading: physical healing ('were healed')
  chosen_spanish_reading: sanaron (curación física)
  alternative_spanish_readings:
  - fueron salvados
  - fueron hechos salvos
  - fueron restaurados
  rationale: Aunque el verbo puede abarcar rescate o salvación en otros contextos, aquí el marco narrativo es la curación de personas que tocan a Jesús. Traducirlo como «sanaron» mantiene la lectura física que el contexto inmediato exige, sin borrar que el verbo tiene un alcance más amplio en griego.
  doctrine_reference: Preservar la tensión semántica sin imponer un sentido teológico ajeno al contexto inmediato
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no introdujo cambios sustanciales y alcanzó alta concordancia. El ajuste principal en español fue asegurar una formulación natural y evitar una redundancia accidental en la frase del «borde».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se conserva el sentido físico de la sanación sin forzar una lectura soteriológica.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos innecesarios.
  - La nota [a] preserva la ambigüedad léxica de κράσπεδον sin decidirla de forma excesiva.
