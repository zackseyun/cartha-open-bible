translation:
  language: es
  text: 'De inmediato Jesús extendió la mano, lo sujetó[a] y le dijo: «Hombre de poca fe, ¿por qué dudaste?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo tomó». El verbo griego puede expresar tomar, asir o sujetar; el contexto aquí permite una acción de rescate inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: Immediately
  chosen_spanish: De inmediato
  alternatives_spanish:
  - Inmediatamente
  - Al instante
  lexicon: BDAG
  rationale: Expresa la urgencia narrativa de forma natural en español y conserva el valor temporal inmediato del adverbio sin sonar forzado.
- source_word: ἐκτείνας τὴν χεῖρα
  english_pob_choice: stretched out his hand
  chosen_spanish: extendió la mano
  alternatives_spanish:
  - alargó la mano
  - estiró la mano
  lexicon: BDAG
  rationale: La imagen concreta es la de una acción física hacia Pedro; 'extendió la mano' es idiomático y fiel al gesto descrito.
- source_word: ἐπελάβετο αὐτοῦ
  english_pob_choice: took hold of him
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo sujetó
  - lo agarró
  lexicon: BDAG
  rationale: El verbo indica tomar o asir a alguien; 'lo tomó' mantiene brevedad y naturalidad, sin exagerar la violencia del acto.
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  - le habló
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el español narrativo fluye mejor en pasado. 'Le dijo' preserva el sentido y la naturalidad del relato.
- source_word: Ὀλιγόπιστε
  english_pob_choice: You of little faith
  chosen_spanish: Hombre de poca fe
  alternatives_spanish:
  - Tú, de poca fe
  - Hombre de fe pequeña
  lexicon: BDAG
  rationale: Se conserva el valor vocativo y la reprensión centrada en la fe deficiente. 'Hombre de poca fe' es una fórmula clara y tradicionalmente comprensible en español, sin convertirla en una acusación más fuerte que la del griego.
- source_word: εἰς τί
  english_pob_choice: why
  chosen_spanish: ¿por qué?
  alternatives_spanish:
  - ¿para qué?
  - ¿con qué fin?
  lexicon: BDAG
  rationale: En este contexto interrogativo, '¿por qué?' comunica mejor la pregunta de causa o motivo que el griego expresa de manera idiomática.
- source_word: ἐδίστασας
  english_pob_choice: did you doubt
  chosen_spanish: dudaste
  alternatives_spanish:
  - vacilaste
  - titubeaste
  lexicon: BDAG
  rationale: '''Dudar'' es el núcleo semántico más directo en español y coincide con la lectura principal del POB en inglés. Las alternativas conservan la posibilidad de matiz de vacilación o hesitación presente en el verbo.'
theological_decisions:
- issue: Valor de Ὀλιγόπιστε respecto de πίστις
  english_pob_reading: You of little faith
  chosen_spanish_reading: Hombre de poca fe
  alternative_spanish_readings:
  - Hombre de fe pequeña
  - Tú, de poca fe
  rationale: La reprensión no se amplía a incredulidad total ni a falta de lealtad; permanece centrada en una fe insuficiente. Se mantiene la tensión teológica del original y del POB inglés sobre πίστις como 'fe'.
  doctrine_reference: 'DOCTRINE.md: πίστις → fe'
translation_notes:
  revision_awareness: El inglés POB revisó solo el tiempo verbal de 'says' a 'said' por fluidez narrativa; el griego mantiene presente histórico. En español se optó directamente por el pasado natural del relato sin perder ese valor narrativo.
  spanish_consistency_notes:
  - Se mantiene 'fe' para πίστις, en continuidad con la política terminológica del POB.
  - Se evita 'SEÑOR' o 'Cristo' porque el versículo no los contiene.
  - La fórmula vocativa 'Hombre de poca fe' conserva el tono de reprensión sin añadir matices no presentes en el griego.
  - '''De inmediato'' y no ''inmediatamente'' es una elección de estilo; ambas son válidas, pero la primera suena más fluida en este contexto.'
