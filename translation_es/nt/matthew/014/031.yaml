review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la secuencia básica del griego: urgencia inmediata, gesto de extender la mano, acción de rescate, reprensión a Pedro y pregunta final. Sin embargo, la nota al pie está anclada en «la mano» cuando en realidad comenta ἐπελάβετο αὐτοῦ («lo tomó / tomó de él / se asió de él»), no ἐκτείνας τὴν χεῖρα. Además, «lo tomó» es comprensible pero menos preciso que el sentido de ''asir/tomar firmemente'' del verbo.'
  spanish_quality_summary: El español es natural y claro. «De inmediato» y «extendió la mano» funcionan bien. «Hombre de poca fe» es legible y fiel al vocativo, aunque «hombre» no está explícito en griego; aun así, suena idiomático en español bíblico. La principal reparación necesaria es mover la nota al verbo correspondiente y mejorar levemente la precisión léxica del rescate.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Jesús», «fe» y el resto del vocabulario están alineados. No intervienen términos sensibles como Yahvé, Mesías/Cristo, esclavo, etc. La decisión teológica sobre Ὀλιγόπιστε como «de poca fe» está bien preservada.'
  issues:
  - severity: medium
    issue: La nota al pie está colocada en el sintagma equivocado.
    rationale: La marca [a] aparece tras «la mano», pero la nota explica el verbo ἐπελάβετο αὐτοῦ. Eso distorsiona la relación entre texto y nota y no cumple bien la disciplina de anclaje.
  - severity: medium
    issue: «Lo tomó» subrepresenta el matiz de ἐπελάβετο αὐτοῦ.
    rationale: El verbo sugiere tomar/asir firmemente o sujetar, especialmente en contexto de rescate. «Lo sostuvo» sería interpretación; «lo agarró» puede sonar demasiado coloquial. «Lo sujetó» o «se agarró de él» reflejan mejor la fuerza verbal.
  revised_spanish_text: 'De inmediato Jesús extendió la mano, lo sujetó[a] y le dijo: «Hombre de poca fe, ¿por qué dudaste?»'
  revised_footnotes:
  - marker: a
    text: O «lo tomó». El verbo griego puede expresar tomar, asir o sujetar; el contexto aquí permite una acción de rescate inmediata.
    reason: lexical_alternative
  revision_rationale: Se movió la nota al verbo que realmente comenta y se ajustó «lo tomó» a «lo sujetó» para reflejar mejor ἐπελάβετο αὐτοῦ sin perder naturalidad. El resto del versículo es fiel y legible.
