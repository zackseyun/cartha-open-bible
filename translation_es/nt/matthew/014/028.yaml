- from: 'Y respondiendo Pedro, le dijo: «Señor, si eres tú, mándame que vaya a ti sobre las aguas[a]».'
  to: 'Pedro le respondió: «Señor, si eres tú, ordéname ir hacia ti sobre las aguas[a]».'
  rationale: Se ajusta la fórmula narrativa a un español más natural y se refuerza la precisión sintáctica y semántica de la petición de Pedro, manteniendo intactos el sentido, la terminología teológica y la nota sobre el plural griego.
