translation:
  language: es
  text: 'Pedro le respondió: «Señor, si eres tú, ordéname ir hacia ti sobre las aguas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre el agua». El griego dice «sobre las aguas» en plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς δὲ
  english_pob_choice: And ... answered
  chosen_spanish: Y respondiendo ... le dijo
  alternatives_spanish:
  - Pero respondiendo ... le dijo
  - Entonces respondiendo ... le dijo
  lexicon: BDAG
  rationale: La construcción narrativa se conserva de forma natural en español con «Y respondiendo ... le dijo». Mantiene la conexión discursiva de δέ sin sobrecargarla.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo de destinatario en español se expresa con el clítico indirecto «le», que suena natural y preserva la relación directa con Jesús.
- source_word: ὁ Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - el Pedro
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico y cristiano.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor mío
  lexicon: BDAG
  rationale: «Señor» preserva el valor de address formal y la posible carga cristológica. Se evita reducirlo a un simple «maestro» o «señor» cortesano.
- source_word: εἰ σὺ εἶ
  english_pob_choice: if it is you
  chosen_spanish: si eres tú
  alternatives_spanish:
  - si tú eres
  - si eres el que eres
  lexicon: BDAG
  rationale: En español, la identificación personal queda de manera natural y directa con «si eres tú», sin introducir explicaciones que el griego no exige aquí.
- source_word: κέλευσόν
  english_pob_choice: command
  chosen_spanish: mándame
  alternatives_spanish:
  - ordéname
  - comándame
  lexicon: BDAG
  rationale: «Mándame» comunica la fuerza imperativa y es idiomático en español. «Ordena» o «ordéname» son posibles, pero menos fluidos en este ruego directo.
- source_word: με ἐλθεῖν
  english_pob_choice: me to come
  chosen_spanish: que vaya
  alternatives_spanish:
  - que venga
  - que vaya a ti
  lexicon: BDAG
  rationale: Desde la perspectiva de Pedro hacia Jesús, en español «que vaya» expresa el movimiento hacia él con naturalidad. Se mantiene el matiz de desplazamiento solicitado.
- source_word: πρὸς σὲ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: BDAG
  rationale: La preposición griega indica movimiento hacia una persona; «a ti» es la solución más natural en español y conserva el sentido relacional.
- source_word: ἐπὶ τὰ ὕδατα
  english_pob_choice: on the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - sobre el agua
  - en las aguas
  lexicon: BDAG
  rationale: Se conserva el plural griego con «las aguas», como en la POB inglesa. «Sobre» reproduce bien la escena de caminar encima del agua y evita aplanar la imagen.
theological_decisions:
- issue: Título de Jesús en la dirección de Pedro
  english_pob_reading: Render as 'Lord' without reducing it to merely polite 'sir' or 'master'.
  chosen_spanish_reading: «Señor» sin rebajarlo a un trato meramente cortés.
  alternative_spanish_readings:
  - «Maestro»
  - «señor» en sentido social
  rationale: En el contexto de Mateo, la invocación a Jesús puede llevar más peso que simple cortesía. «Señor» preserva esa tensión cristológica sin resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: contested terms; preserve theological tension rather than flattening it'
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; este borrador respeta ese estado de alta concordancia y mantiene la decisión auditada de preservar el plural griego en «las aguas».
  spanish_consistency_notes:
  - Se usa «Señor» para κύριε, coherente con el valor cristológico retenido en la POB inglesa.
  - Se mantiene el plural «las aguas» para reflejar τὰ ὕδατα y se anota la alternativa singular idiomática.
  - El estilo es bíblico contemporáneo en español, con puntuación de cita adaptada a normas tipográficas españolas.
