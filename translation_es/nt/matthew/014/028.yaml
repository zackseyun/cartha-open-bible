review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: Pedro responde a Jesús, lo llama «Señor», expresa la condición de identificación («si eres tú»), pide una orden autoritativa y conserva «sobre las aguas» con nota sobre el singular alternativo. Sin embargo, «Y respondiendo Pedro, le dijo» suena calcado y menos natural que una formulación narrativa española más limpia. Además, para με ἐλθεῖν πρὸς σὲ, «que vaya a ti» es comprensible, pero en español bíblico-natural «ir hacia Jesús» desde la perspectiva del hablante funciona mejor como «ir hacia ti» u «ordenarme ir hacia ti»; mantener «venir» sería menos natural con Pedro como punto de partida. La reparación necesaria es estilística y de fluidez, no de fondo.'
  spanish_quality_summary: La redacción es mayormente clara y fiel, pero «Y respondiendo Pedro» es poco idiomática en español moderno digno. Una estructura como «Pedro le respondió» o «Entonces Pedro le respondió» preserva mejor la función narrativa sin calco innecesario. También conviene ajustar «mándame que vaya a ti» a «ordéname ir hacia ti» para reflejar mejor la construcción infinitiva griega y la fuerza de κελεύω, evitando una subordinada algo pesada.
  glossary_alignment: «Señor» para Κύριε está bien alineado con la política del proyecto y con la decisión teológica inglesa. No hay términos del glosario mayor en conflicto. «Sobre las aguas» preserva correctamente el plural griego y la nota léxica correspondiente.
  issues:
  - severity: medium
    issue: Calco narrativo en «Y respondiendo Pedro, le dijo»
    rationale: Aunque formalmente posible, esta construcción suena rígida y poco natural en español contemporáneo legible. El griego Ἀποκριθεὶς δὲ ... εἶπεν se expresa mejor como «Pedro le respondió» o similar.
  - severity: medium
    issue: Construcción menos precisa en «mándame que vaya a ti»
    rationale: El griego κέλευσόν με ἐλθεῖν πρὸς σὲ es más directo con infinitivo de complemento. En español, «ordéname ir hacia ti» reproduce mejor la relación sintáctica y la fuerza de ‘command’.
  revised_spanish_text: 'Pedro le respondió: «Señor, si eres tú, ordéname ir hacia ti sobre las aguas[a]».'
  revised_footnotes:
  - marker: a
    text: 'O: «sobre el agua». El griego dice «sobre las aguas» en plural.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula narrativa a un español más natural y se refuerza la precisión sintáctica y semántica de la petición de Pedro, manteniendo intactos el sentido, la terminología teológica y la nota sobre el plural griego.
