translation:
  language: es
  text: Y comieron todos y quedaron satisfechos[a], y recogieron doce canastas llenas de lo que sobró de los pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fragmentos». El griego puede referirse a pedazos rotos que quedaron después de la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - habían comido
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa de forma natural en español con el pretérito perfecto simple. «Comieron» mantiene la secuencia histórica sin añadir matices no presentes en el griego.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - ellos todos
  lexicon: BDAG
  rationale: El adjetivo plural incluye a todo el grupo. En español, «todos» funciona de manera directa y clara sin necesidad de explicitar un sujeto pronominal redundante.
- source_word: ἐχορτάσθησαν
  english_pob_choice: were satisfied
  chosen_spanish: quedaron satisfechos
  alternatives_spanish:
  - fueron saciados
  - quedaron llenos
  lexicon: BDAG
  rationale: El pasivo de χορτάζω indica haber sido alimentados hasta la saciedad. «Quedaron satisfechos» comunica el resultado completo de la comida en un español idiomático, sin perder la idea de plenitud.
- source_word: ἦραν
  english_pob_choice: they picked up
  chosen_spanish: recogieron
  alternatives_spanish:
  - levantaron
  - tomaron
  lexicon: BDAG
  rationale: En el contexto de juntar lo sobrante, «recogieron» es natural y preciso en español, conservando la acción de reunir lo que quedó.
- source_word: τὸ περισσεῦον
  english_pob_choice: the leftover
  chosen_spanish: lo que sobró
  alternatives_spanish:
  - el sobrante
  - lo excedente
  lexicon: BDAG
  rationale: El participio sustantivado de περισσεύω señala lo que quedó en exceso. «Lo que sobró» refleja bien esa idea de residuo sin forzar un sustantivo abstracto.
- source_word: τῶν κλασμάτων
  english_pob_choice: pieces
  chosen_spanish: de los pedazos
  alternatives_spanish:
  - de los fragmentos
  - de las piezas
  lexicon: BDAG
  rationale: κλάσματα son pedazos rotos, especialmente de pan. «Pedazos» conserva el sentido concreto y cotidiano; «fragmentos» sería más formal, pero menos natural aquí.
- source_word: δώδεκα
  english_pob_choice: twelve
  chosen_spanish: doce
  lexicon: BDAG
  rationale: Número cardinal traducido de forma directa.
- source_word: κοφίνους
  english_pob_choice: baskets
  chosen_spanish: canastas
  alternatives_spanish:
  - cestas
  - canastos
  lexicon: BDAG
  rationale: κόφινος designa una cesta o canasta. «Canastas» es transparente para el español general y evita una especificación innecesaria del tipo de recipiente.
- source_word: πλήρεις
  english_pob_choice: full
  chosen_spanish: llenas
  alternatives_spanish:
  - colmadas
  - repletas
  lexicon: BDAG
  rationale: El adjetivo concuerda con «canastas». «Llenas» es la equivalencia más natural y fiel en esta construcción.
theological_decisions:
- issue: La saciedad de la multitud en el milagro
  english_pob_reading: were satisfied
  chosen_spanish_reading: quedaron satisfechos
  alternative_spanish_readings:
  - fueron saciados
  - quedaron llenos
  rationale: La frase debe describir el resultado del milagro sin intensificarlo ni suavizarlo. «Quedaron satisfechos» conserva la plenitud del alimento y evita un lenguaje interpretativo adicional.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete griego SBLGNT y mantiene la equivalencia funcional del inglés POB «were satisfied» como decisión auditada. No se introducen cambios textuales respecto del contexto inglés, salvo la adaptación natural al español en el orden de palabras y en la expresión idiomática de la saciedad y la recolección de los restos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrama ni κύριος con valor de nombre divino.
  - Se usa «satisfechos» para conservar la idea de plenitud sin recurrir a una paráfrasis extensa.
  - «Canastas» y «pedazos» reflejan vocabulario común y comprensible; no se sobreespecifica el tipo exacto de recipiente ni se cambia el matiz de κλάσματα.
  - La nota al pie preserva la alternativa léxica «fragmentos» porque el griego admite esa lectura y el inglés POB la documenta.
