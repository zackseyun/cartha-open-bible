  - severity: low
    issue: «Por eso» puede sonar más coloquial/causal que el registro narrativo deseado.
    rationale: Aunque no es incorrecto, «Por tanto» mantiene mejor la fuerza inferencial de ὅθεν y un tono más digno y bíblico en español general.
