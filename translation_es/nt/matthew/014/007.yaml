translation:
  language: es
  text: Por tanto, con juramento, le prometió darle lo que ella pidiera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que ella llegara a pedir» o «lo que ella pidiere». El griego usa una cláusula relativa indefinida (ὃ ἐὰν αἰτήσηται) que expresa una petición futura e indeterminada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: El conector introduce una conclusión narrativa. «Por eso» comunica la relación inferencial con naturalidad en español sin perder el valor resultativo.
- source_word: μετὰ ὅρκου
  english_pob_choice: with an oath
  chosen_spanish: con juramento
  alternatives_spanish:
  - bajo juramento
  - con un juramento
  - jurando
  lexicon: BDAG
  rationale: 'La preposición con genitivo indica acompañamiento: la promesa se hizo de manera jurada. «Con juramento» es natural y conserva la formalidad legal del acto.'
- source_word: ὡμολόγησεν
  english_pob_choice: he promised
  chosen_spanish: le prometió
  alternatives_spanish:
  - le aseguró
  - se comprometió a
  - le declaró
  lexicon: BDAG
  rationale: En este contexto ὁμολογέω expresa una promesa o compromiso firme, no una confesión. En español, «le prometió» reproduce bien el acto verbal y su fuerza narrativa.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - para ella
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural con «le» en español, manteniendo la referencia a la joven sin recargar la frase.
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: darle
  alternatives_spanish:
  - que le daría
  - a darle
  lexicon: BDAG
  rationale: 'El infinitivo complementario depende de la promesa y en español puede integrarse como complemento verbal: «prometió darle».'
- source_word: ὃ ἐὰν αἰτήσηται
  english_pob_choice: whatever she might ask
  chosen_spanish: lo que ella pidiera
  alternatives_spanish:
  - lo que ella pidiere
  - lo que ella pida
  - cualquier cosa que pidiera
  lexicon: BDAG
  rationale: La cláusula relativa indefinida expresa una petición abierta y futura. «Lo que ella pidiera» conserva esa amplitud sin sonar forzado; el subjuntivo imperfecto refleja bien la contingencia.
translation_notes:
  revision_awareness: 'Se siguió de cerca el griego SBLGNT y el audit trail inglés: ὅθεν como inferencia narrativa, μετὰ ὅρκου como acto jurado, ὡμολόγησεν como promesa firme y la cláusula ὃ ἐὰν αἰτήσηται como petición abierta futura. No hubo revisiones textuales relevantes en el expediente inglés; el pasaje presentó alto acuerdo entre revisores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «juramento» en vez de «voto» o «juramento solemne» para conservar la concisión del original.
  - El subjuntivo imperfecto «pidiera» es la opción más natural para una petición futura e indefinida en español.
  - Se evitó «Cristo/Mesías» porque no aparecen en el versículo.
