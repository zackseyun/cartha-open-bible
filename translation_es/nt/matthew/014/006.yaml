translation:
  language: es
  text: Pero cuando llegó el cumpleaños de Herodes, la hija de Herodías danzó en medio[a] y agradó a Herodes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el medio». La frase probablemente significa que danzó en medio de la reunión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενεσίοις ... γενομένοις
  english_pob_choice: when Herod’s birthday came
  chosen_spanish: cuando llegó el cumpleaños de Herodes
  alternatives_spanish:
  - cuando vino el cumpleaños de Herodes
  - cuando se celebró el cumpleaños de Herodes
  - en el cumpleaños de Herodes
  lexicon: BDAG
  rationale: La construcción temporal con γενεσίοις ... γενομένοις señala la llegada o realización de la observancia del cumpleaños. En español, 'llegó el cumpleaños' mantiene la idea idiomática de un acontecimiento que arriba, sin ampliar indebidamente a 'fiesta' si el texto no lo explicita.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce transición narrativa con leve contraste. 'Pero' conserva esa conexión discursiva natural en español.
- source_word: ὠρχήσατο
  english_pob_choice: danced
  chosen_spanish: danzó
  alternatives_spanish:
  - bailó
  - ejecutó una danza
  lexicon: BDAG
  rationale: El aoristo medio de ὀρχέομαι significa 'danzar'. 'Danzó' es claro, digno y suficientemente preciso; 'bailó' sería más coloquial y 'ejecutó una danza' demasiado pesado.
- source_word: ἡ θυγάτηρ τῆς Ἡρῳδιάδος
  english_pob_choice: the daughter of Herodias
  chosen_spanish: la hija de Herodías
  alternatives_spanish:
  - la hija de Herodías
  - Herodías, su hija
  lexicon: BDAG
  rationale: Se conserva la relación genitiva simple del griego sin identificarla por nombre propio, ya que el texto no la da. La estructura española natural es 'la hija de Herodías'.
- source_word: ἐν τῷ μέσῳ
  english_pob_choice: in the midst
  chosen_spanish: en medio
  alternatives_spanish:
  - en el centro
  - en medio de todos
  lexicon: BDAG
  rationale: '''En medio'' reproduce la expresión idiomática y deja abierta la referencia al grupo presente. Es más transparente que ''en el centro'' y menos interpretativa que ''en medio de todos''.'
- source_word: ἤρεσεν τῷ Ἡρῴδῃ
  english_pob_choice: pleased Herod
  chosen_spanish: agradó a Herodes
  alternatives_spanish:
  - satisfizo a Herodes
  - fue agradable para Herodes
  lexicon: BDAG
  rationale: ἀρέσκω con dativo indica que algo resulta agradable o complaciente para alguien. 'Agradó a Herodes' refleja bien la construcción y evita un matiz psicológico excesivo.
- source_word: Ἡρῴδου / Ἡρῴδῃ
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herodes
  lexicon: BDAG
  rationale: Se usa la forma española estándar del nombre propio, coherente con la práctica bíblica en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que simplificó 'birthday celebration came' a 'birthday came'; por eso el español evita añadir 'fiesta' o 'celebración' en el texto principal. También se mantuvo la ambigüedad espacial de ἐν τῷ μέσῳ con una nota breve, siguiendo el rastro auditado.
  spanish_consistency_notes:
  - Se mantiene 'Herodes' y 'Herodías' con ortografía española estándar.
  - Se prefiere 'danzó' sobre 'bailó' para conservar un registro bíblico sobrio.
  - No se identifica a la hija por nombre propio, porque el griego y el audit trail inglés no lo hacen.
  - '''Agradó a Herodes'' conserva la valencia del dativo sin sobreinterpretar la reacción.'
