translation:
  language: es
  text: Ahora los que comieron eran unos cinco mil hombres[a], además de las mujeres y los niños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin contar las mujeres y los niños».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἐσθίοντες
  english_pob_choice: Now those who ate
  chosen_spanish: Ahora los que comieron
  alternatives_spanish:
  - Y los que comían
  - Los que estaban comiendo
  lexicon: BDAG
  rationale: El participio articular sustantivado se refiere al grupo que participó de la comida. En español, «los que comieron» conserva esa referencia de manera natural y refleja el cierre narrativo que marca δέ con «Ahora».
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  lexicon: BDAG
  rationale: El imperfecto copulativo se vierte de forma natural con «eran», que expresa el estado/cómputo del grupo en ese momento sin añadir matices aspectuales no requeridos por el texto.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: BDAG
  rationale: ἄνδρες designa varones y, en un contexto de conteo, «hombres» preserva la distinción de sexo presente en el griego. «Personas» borraría ese dato lexical.
- source_word: ὡσεὶ
  english_pob_choice: about
  chosen_spanish: unos
  alternatives_spanish:
  - aproximadamente
  - como unos
  lexicon: BDAG
  rationale: ὡσεὶ marca aproximación; «unos» es una forma idiomática y concisa en español que comunica estimación numérica sin sobrecargar la frase.
- source_word: πεντακισχίλιοι
  english_pob_choice: five thousand
  chosen_spanish: cinco mil
  alternatives_spanish:
  - unos cinco mil
  lexicon: BDAG
  rationale: Es el cardinal simple que modifica a ἄνδρες. En español se integra de manera natural en el sintagma numérico «unos cinco mil».
- source_word: χωρὶς
  english_pob_choice: besides
  chosen_spanish: sin contar
  alternatives_spanish:
  - además de
  - aparte de
  - sin incluir
  lexicon: BDAG
  rationale: χωρίς con genitivo señala exclusión del cómputo. «Sin contar» expresa con claridad que mujeres y niños no están incluidos en la cifra de cinco mil hombres.
- source_word: γυναικῶν
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - mujeres
  - esposas
  lexicon: BDAG
  rationale: γυνή aquí funciona como «mujer», no como «esposa». El artículo definido en español ayuda a reflejar el grupo excluido del conteo.
- source_word: παιδίων
  english_pob_choice: children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeños
  - los muchachos
  lexicon: BDAG
  rationale: παιδίον se traduce naturalmente como «niño/niña»; en plural, «los niños» es la forma más clara y común en español para el grupo mencionado.
theological_decisions:
- issue: Conteo masculino explícito en una multitud mixta
  english_pob_reading: Translate ἄνδρες as 'men' and retain the explicit exclusion phrase 'besides women and children.'
  chosen_spanish_reading: Traducir ἄνδρες como «hombres» y mantener la exclusión explícita «sin contar las mujeres y los niños».
  alternative_spanish_readings:
  - personas
  - gente
  rationale: El griego distingue a los varones contados de las mujeres y los niños. «Hombres» conserva ese dato social e histórico; «personas» o «gente» lo diluirían. La frase de exclusión en español mantiene el alcance del conteo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con el audit trail inglés en sentido y alcance; no se requieren revisiones adicionales. La decisión principal es conservar la distinción de género y el valor de exclusión de χωρὶς con una fórmula española idiomática.
  spanish_consistency_notes:
  - Se mantiene «hombres» para ἄνδρες, en coherencia con la política POB de precisión de género.
  - «Sin contar» reproduce mejor la exclusión numérica de χωρὶς que una simple adición como «además de».
  - Se usa «Ahora» para δέ como marcador narrativo suave, sin sobrecargar el ritmo.
  - «Los niños» es el plural natural de παιδίον en español contemporáneo, sin restringir indebidamente la edad.
