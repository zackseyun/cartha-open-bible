review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: contraste narrativo con «Pero», visión de Jesús caminando sobre el mar, reacción verbal de los discípulos y grito causado por el miedo. Sin embargo, «se turbaron» no refleja bien la intensidad contextual de ἐταράχθησαν aquí, que el propio expediente inglés justificó como «were terrified».'
  spanish_quality_summary: El español es claro y natural, pero «se turbaron» suena demasiado débil y algo literario frente al susto extremo del contexto. «Andando sobre el mar» es comprensible, aunque «caminando» sería ligeramente más natural en español general; no obstante, no exige cambio. La puntuación y legibilidad son buenas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Fantasma» para φάντασμα está bien y preserva la intención narrativa; la nota alternativa es útil. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «se turbaron» debilita ἐταράχθησαν
    rationale: En este contexto de miedo sobrenatural, seguido por la exclamación «¡Es un fantasma!» y el grito posterior, el verbo requiere una reacción más intensa. «Se asustaron» o «quedaron aterrados» encajan mejor; «se asustaron» mantiene naturalidad sin exagerar demasiado.
  - severity: low
    issue: La nota al pie repite «fantasma» como alternativa
    rationale: 'La nota dice: «O “una aparición” o “un fantasma”». Dado que el texto principal ya usa «fantasma», esa segunda alternativa no aporta información. Conviene conservar alternativas reales como «una aparición» o «un espectro / un fantasma», ajustando el texto principal según corresponda.'
  revised_spanish_text: 'Pero cuando los discípulos lo vieron andando sobre el mar[a], se asustaron, diciendo: «¡Es un fantasma!» Y gritaron de miedo.'
  revised_footnotes:
