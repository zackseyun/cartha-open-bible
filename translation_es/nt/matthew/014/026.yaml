  to: 'Pero cuando los discípulos lo vieron andando sobre el mar[a], se asustaron, diciendo: «¡Es un fantasma!» Y gritaron de miedo.'
  rationale: Se cambia «se turbaron» por «se asustaron» para reflejar mejor la fuerza contextual de ἐταράχθησαν sin sobretraducir. Se ajusta la nota para ofrecer alternativas léxicas reales a «fantasma», en línea con el expediente inglés.
