translation:
  language: es
  text: 'Pero cuando los discípulos lo vieron andando sobre el mar[a], se asustaron, diciendo: «¡Es un fantasma!» Y gritaron de miedo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una aparición» o «un espectro».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo suave y funciona naturalmente en español para introducir la reacción repentina de los discípulos.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo define al grupo; en contexto se trata de los discípulos de Jesús. "Los discípulos" es claro y fiel al relato.
- source_word: ἰδόντες αὐτὸν
  english_pob_choice: when the disciples saw him
  chosen_spanish: lo vieron
  alternatives_spanish:
  - cuando lo vieron
  - al verlo
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad temporal; en español, "lo vieron" dentro de la cláusula con "pero cuando" comunica bien la secuencia sin forzar la sintaxis.
- source_word: ἐπὶ τῆς θαλάσσης περιπατοῦντα
  english_pob_choice: walking on the sea
  chosen_spanish: andando sobre el mar
  alternatives_spanish:
  - caminando sobre el mar
  - andando sobre las aguas
  lexicon: BDAG
  rationale: '"Sobre el mar" conserva la preposición y el ámbito del original mejor que "sobre el agua". "Andando" suena natural en español y mantiene la idea de desplazamiento sobre la superficie.'
- source_word: ἐταράχθησαν
  english_pob_choice: they were terrified
  chosen_spanish: se turbaron
  alternatives_spanish:
  - se asustaron
  - quedaron aterrados
  lexicon: BDAG
  rationale: ταράσσω puede expresar quedar perturbado o agitado. Dado que el verso continúa con el grito de miedo, "se turbaron" conserva la perturbación intensa sin añadir más emoción de la que el griego obliga.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: Participio contemporáneo que introduce la exclamación; "diciendo" es la opción directa y natural.
- source_word: Φάντασμά ἐστιν
  english_pob_choice: It is a ghost!
  chosen_spanish: ¡Es un fantasma!
  alternatives_spanish:
  - ¡Es una aparición!
  - ¡Es un espectro!
  lexicon: BDAG
  rationale: '"Fantasma" comunica la percepción temerosa de los discípulos de manera clara y moderna. "Aparición" o "espectro" son alternativas posibles, pero "fantasma" es la más transparente para el lector actual.'
- source_word: ἀπὸ τοῦ φόβου
  english_pob_choice: from fear
  chosen_spanish: de miedo
  alternatives_spanish:
  - por miedo
  - a causa del miedo
  lexicon: BDAG
  rationale: La preposición expresa causa u origen; en español, "de miedo" es una formulación breve y natural que preserva el sentido causal.
- source_word: ἔκραξαν
  english_pob_choice: they cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - dieron un grito
  lexicon: BDAG
  rationale: κράζω denota un grito fuerte. "Gritaron" comunica bien la intensidad del verbo en español contemporáneo sin sobredeterminar el tipo de voz.
theological_decisions:
- issue: φάντασμα como percepción errónea de los discípulos, no afirmación doctrinal
  english_pob_reading: Rendered as 'ghost' in the main text
  chosen_spanish_reading: '"fantasma" en la voz de los discípulos'
  alternative_spanish_readings:
  - '"aparición"'
  - '"espectro"'
  rationale: El texto registra la interpretación temerosa de los discípulos. "Fantasma" reproduce esa reacción sin convertirla en una afirmación doctrinal sobre la realidad de espíritus, y mantiene el tono narrativo del pasaje.
  doctrine_reference: La traducción debe reflejar la percepción de los personajes sin añadir conclusiones doctrinales no expresadas por el texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la decisión de traducir ἐπὶ τῆς θαλάσσης como un desplazamiento "sobre el mar" y φάντασμα como una designación coloquial y temerosa se preservó en español con equivalentes naturales y fieles al contexto narrativo. No se adoptó una traducción más interpretativa ni se suavizó el terror de la escena.'
  spanish_consistency_notes:
  - Se mantiene "discípulos" como término fijo para μαθηταί.
  - '"Mar" se usa para θαλάσση/θάλασσα en lugar de "agua" para conservar la imagen del original.'
  - Se prefiere "fantasma" como equivalente principal de φάντασμα, con nota de alternativas por la ambigüedad léxica.
  - El tono general sigue siendo bíblico pero en español moderno y legible.
