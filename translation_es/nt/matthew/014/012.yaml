revisions:
- from: Y sus discípulos vinieron, tomaron el cuerpo[a], y lo sepultaron; luego fueron y se lo informaron a Jesús.
  to: Entonces sus discípulos fueron, tomaron el cuerpo[a] y lo sepultaron; luego fueron y le informaron a Jesús.
  rationale: Se ajusta «vinieron» a «fueron» para una secuencia narrativa más natural en español, se simplifica «se lo informaron a Jesús» a «le informaron a Jesús», y se limpia la puntuación. Se conserva la decisión principal «cuerpo» con nota alternativa «cadáver», en línea con el griego πτῶμα y el rastro de auditoría inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:14:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La traducción española sigue bien el sentido del griego: los discípulos de Juan vienen, toman el πτῶμα, lo sepultan y luego informan a Jesús. También preserva correctamente la nota léxica sobre πτῶμα como «cuerpo» / «cadáver». Sin embargo, «vinieron» para προσελθόντες suena menos natural aquí que «fueron» o «se acercaron», ya que el movimiento no está orientado al lector sino a la escena; además, «se lo informaron a Jesús» añade un clítico indirecto algo pesado donde el griego simplemente dice «informaron a Jesús».'
  spanish_quality_summary: El borrador es claro y legible, pero tiene dos puntos mejorables de estilo y naturalidad. Primero, «Y sus discípulos vinieron» resulta algo rígido en español narrativo bíblico; «Entonces sus discípulos fueron» fluye mejor en este contexto. Segundo, «se lo informaron a Jesús» es comprensible, pero «le informaron» o «le dieron la noticia» suena más idiomático. Conviene además evitar la coma innecesaria antes de «y lo sepultaron».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» es correcto para Ἰησοῦ. «Discípulos» preserva bien μαθηταί. «Cuerpo» con nota «O “cadáver”» refleja adecuadamente πτῶμα y la decisión documentada del POB en inglés.
  issues:
  - severity: medium
    issue: «vinieron» para προσελθόντες
    rationale: Aunque posible, en este contexto narrativo «vinieron» suena menos natural que «fueron» o «se acercaron». El participio indica que acudieron para hacerse cargo del cuerpo, no un movimiento deíctico hacia el lector.
  - severity: low
    issue: «se lo informaron a Jesús» es algo pesado
    rationale: El griego solo expresa que reportaron a Jesús. En español, «le informaron» es más natural y suficiente, ya que el contenido del reporte queda implícito por el contexto.
  - severity: low
    issue: Puntuación algo calcada
    rationale: La coma antes de «y lo sepultaron» no es necesaria en español y recarga levemente la frase.
  revised_spanish_text: Entonces sus discípulos fueron, tomaron el cuerpo[a] y lo sepultaron; luego fueron y le informaron a Jesús.
  revised_footnotes:
  - marker: a
    text: O «cadáver». El griego denota un cuerpo muerto.
    reason: lexical_alternative
  revision_rationale: Se ajusta «vinieron» a «fueron» para una secuencia narrativa más natural en español, se simplifica «se lo informaron a Jesús» a «le informaron a Jesús», y se limpia la puntuación. Se conserva la decisión principal «cuerpo» con nota alternativa «cadáver», en línea con el griego πτῶμα y el rastro de auditoría inglés.
