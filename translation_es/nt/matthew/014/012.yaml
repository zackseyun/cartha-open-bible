translation:
  language: es
  text: Entonces sus discípulos fueron, tomaron el cuerpo[a] y lo sepultaron; luego fueron y le informaron a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cadáver». El griego denota un cuerpo muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - se acercaron
  - fueron
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción de los discípulos en secuencia narrativa. «Vinieron» es natural en español y conserva el movimiento hacia la escena sin forzar una construcción más técnica que el contexto no exige.
- source_word: μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - sus seguidores
  lexicon: BDAG
  rationale: «Discípulos» mantiene el valor relacional y de aprendizaje de μαθηταί, y refleja bien el referente contextual de Juan el Bautista. «Sus seguidores» sería más general y perdería precisión lexical.
- source_word: ἦραν
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - recogieron
  lexicon: BDAG
  rationale: En este contexto funerario, αἴρω expresa tomar/levantar el cuerpo para disponer de él. «Tomaron» reproduce la concisión del griego y sigue siendo idiomático en español.
- source_word: πτῶμα
  english_pob_choice: body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cadáver
  lexicon: BDAG
  rationale: πτῶμα denota un cuerpo muerto. «El cuerpo» preserva la referencia sin endurecer innecesariamente el tono; «cadáver» sería más explícito pero más áspero, y el inglés POB también prefirió una forma más neutral.
- source_word: ἔθαψαν αὐτόν
  english_pob_choice: buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  lexicon: BDAG
  rationale: θάπτω significa dar sepultura/enterrar. «Lo sepultaron» es fiel, claro y digno; además mantiene un registro bíblico adecuado sin depender de una formulación litúrgica fija.
- source_word: ἐλθόντες
  english_pob_choice: then they went
  chosen_spanish: luego fueron
  alternatives_spanish:
  - después fueron
  - y fueron
  lexicon: BDAG
  rationale: El participio añade la acción posterior en la cadena narrativa. «Luego fueron» comunica bien la secuencia en español y evita una traducción demasiado literal del participio.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported it
  chosen_spanish: se lo informaron
  alternatives_spanish:
  - se lo comunicaron
  - lo reportaron
  lexicon: BDAG
  rationale: ἀπαγγέλλω implica informar o dar noticia. «Se lo informaron» expresa de manera natural que comunicaron el hecho ya implícito por el contexto; el complemento dativo se vuelve claro en español con el clítico adecuado.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús
  lexicon: BDAG
  rationale: Se conserva el nombre propio estándar en español, conforme a la convención del proyecto para Ἰησοῦς.
theological_decisions:
- issue: Identidad del referente de αὐτοῦ y de los discípulos
  english_pob_reading: Se entiende que son los discípulos de Juan el Bautista.
  chosen_spanish_reading: Sus discípulos
  alternative_spanish_readings:
  - los discípulos de él
  - los discípulos de Juan
  rationale: La continuidad narrativa del contexto inmediato hace que αὐτοῦ remita a Juan. «Sus discípulos» reproduce la relación posesiva del griego sin nombrar a Juan, que ya queda claro por el contexto.
  doctrine_reference: Contexto narrativo inmediato de Mateo 14:1-12
- issue: Valor de πτῶμα como 'cuerpo' y no como término más fuerte
  english_pob_reading: '''body'' with note ''Or corpse.'' The Greek word denotes a dead body.'
  chosen_spanish_reading: el cuerpo
  alternative_spanish_readings:
  - el cadáver
  rationale: El griego designa un cuerpo muerto, pero el español puede oscilar entre un término neutro y uno más crudo. Se eligió «el cuerpo» para mantener legibilidad y tono narrativo, sin negar que se trata de un muerto; la nota preserva la alternativa más explícita.
  doctrine_reference: Lexicografía de πτῶμα
- issue: Secuencia narrativa de los participios finales
  english_pob_reading: '''then they went and reported it to Jesus'''
  chosen_spanish_reading: luego fueron y se lo informaron a Jesús
  alternative_spanish_readings:
  - y fueron y se lo informaron a Jesús
  - después fueron e informaron a Jesús
  rationale: Los participios aoristos se vuelven acciones finitas en español para conservar la fluidez narrativa. «Luego» mantiene la sucesión sin añadir contenido interpretativo sustancial.
  doctrine_reference: Sintaxis narrativa griega
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego y el audit trail inglés. No hubo revisiones textuales aplicadas en el registro fuente; el punto principal de decisión fue la equivalencia natural de los participios y el matiz de πτῶμα. La traducción española conserva esa tensión entre neutralidad («el cuerpo») y explicitación lexical («cadáver») mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como forma estándar para Ἰησοῦς.
  - Se tradujo μαθηταί como «discípulos» en coherencia con el uso normal del proyecto.
  - 'Se prefirió un registro narrativo sobrio y digno: «sepultaron» en lugar de formulaciones más modernas o más eclesiásticas.'
  - La nota de πτῶμα preserva la alternativa lexical sin introducir una paráfrasis más larga en el texto principal.
