revisions:
- from: Y enseguida obligó a los discípulos a subir a la barca y adelantarse a él a la otra orilla, mientras él despedía a las multitudes.
  to: Y enseguida obligó a los discípulos a subir a la barca y adelantarse a él a la otra orilla, hasta que despidiera[a] a las multitudes.
  rationale: Se corrige la cláusula temporal final para reflejar fielmente ἕως οὗ ἀπολύσῃ como límite temporal prospectivo («hasta que despidiera») en lugar de simultaneidad («mientras despedía»). Se añade una nota para conservar la alternativa léxica documentada para ἀπολύω.
  reviewer_model: gpt-5.4
