review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del versículo: εὐθέως = «enseguida», ἠνάγκασεν = «obligó», ἐμβῆναι εἰς πλοῖον = «subir a la barca», προάγειν αὐτὸν = «adelantarse a él», εἰς τὸ πέραν = «a la otra orilla». Sin embargo, la cláusula final ἕως οὗ ἀπολύσῃ τοὺς ὄχλους no significa «mientras él despedía», sino «hasta que despidiera / hasta que despidió / hasta que enviara a las multitudes». El griego marca un límite temporal futuro relativo, no mera simultaneidad. También conviene preservar la alternativa léxica documentada para ἀπολύω.'
  spanish_quality_summary: El español es claro y digno, pero «mientras él despedía» cambia el sentido temporal y además introduce un imperfecto narrativo menos fiel al prospectivo del original. «Las multitudes» es comprensible, aunque «las multitudes» suena algo más tradicional; podría mantenerse o sustituirse por «las multitudes»/«las multitudes»—mejor dejarlo en «las multitudes» o «las multitudes»; sin embargo, no es un problema grave. La revisión mínima necesaria es corregir la cláusula temporal y añadir la nota léxica conservada en el POB inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, esclavo, etc. La elección «barca» para πλοῖον y «obligó» para ἠνάγκασεν es adecuada. Debe alinearse mejor ἀπολύσῃ con «despedir» y la alternativa «enviar ... lejos / despedir» en nota.
  issues:
  - severity: high
    issue: La frase «mientras él despedía a las multitudes» traduce incorrectamente ἕως οὗ ἀπολύσῃ.
    rationale: 'ἕως οὗ + subjuntivo aoristo indica un punto límite futuro relativo: «hasta que despidiera / hasta que despidió». «Mientras» expresa simultaneidad y altera la relación temporal del original.'
  - severity: medium
    issue: Falta la nota léxica equivalente a la del POB inglés sobre ἀπολύσῃ τοὺς ὄχλους.
    rationale: El expediente inglés preserva la alternativa «send the crowds away». Debe mantenerse una nota en español porque sigue siendo una alternativa significativa y natural.
  revised_spanish_text: Y enseguida obligó a los discípulos a subir a la barca y adelantarse a él a la otra orilla, hasta que despidiera[a] a las multitudes.
  revised_footnotes:
  - marker: a
    text: O «enviara a las multitudes» o «mandara a las multitudes a irse».
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula temporal final para reflejar fielmente ἕως οὗ ἀπολύσῃ como límite temporal prospectivo («hasta que despidiera») en lugar de simultaneidad («mientras despedía»). Se añade una nota para conservar la alternativa léxica documentada para ἀπολύω.
