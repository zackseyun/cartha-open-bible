translation:
  language: es
  text: Y enseguida obligó a los discípulos a subir a la barca y adelantarse a él a la otra orilla, hasta que despidiera[a] a las multitudes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enviara a las multitudes» o «mandara a las multitudes a irse».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: La idea central es la prontitud y el cambio repentino de escena. «Enseguida» suena natural en español y conserva bien ese valor temporal sin endurecer el ritmo narrativo.
- source_word: ἠνάγκασεν
  english_pob_choice: compelled
  chosen_spanish: obligó
  alternatives_spanish:
  - forzó
  - los hizo
  lexicon: BDAG
  rationale: ἀναγκάζω expresa presión o constricción para que alguien actúe. «Obligó» preserva la fuerza del verbo sin sugerir necesariamente violencia física. «Hizo» sería demasiado débil.
- source_word: μαθητὰς
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El griego presenta el grupo conocido por el artículo; el posesivo no está explícito. «Los discípulos» sigue más de cerca el texto y suena natural en español.
- source_word: ἐμβῆναι εἰς πλοῖον
  english_pob_choice: to get into the boat
  chosen_spanish: subir a la barca
  alternatives_spanish:
  - entrar en la barca
  - embarcarse
  lexicon: BDAG
  rationale: La expresión denota embarcarse/subir a una embarcación. «Subir a la barca» es idiomático en español bíblico moderno y conserva la imagen concreta. «Barca» comunica mejor el contexto narrativo que una traducción más genérica.
- source_word: πλοῖον
  english_pob_choice: the boat
  chosen_spanish: la barca
  alternatives_spanish:
  - el barco
  - la nave
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, el contexto identifica una embarcación concreta. «Barca» es el equivalente más natural en español para este tipo de escena, más preciso que «barco».
- source_word: προάγειν αὐτὸν
  english_pob_choice: go on ahead of him
  chosen_spanish: adelantarse a él
  alternatives_spanish:
  - ir delante de él
  - precederlo
  lexicon: BDAG
  rationale: La acción es ir por delante de Jesús. «Adelantarse a él» reproduce la dirección relacional del griego de forma fluida; «precederlo» sería más técnico y menos natural.
- source_word: εἰς τὸ πέραν
  english_pob_choice: to the other side
  chosen_spanish: a la otra orilla
  alternatives_spanish:
  - al otro lado
  - a la otra parte
  lexicon: BDAG
  rationale: La frase es un modismo de ubicación respecto al lago. «A la otra orilla» comunica con claridad el desplazamiento a la ribera opuesta y evita una calca abstracta.
- source_word: ἕως οὗ ἀπολύσῃ
  english_pob_choice: until he should dismiss
  chosen_spanish: mientras él despedía
  alternatives_spanish:
  - hasta que él despidiera
  - hasta que él las despidiera
  lexicon: BDAG
  rationale: El griego marca un límite temporal futuro relativo; en español, una construcción con «mientras» expresa de forma natural la simultaneidad de la despedida con la partida de los discípulos. Mantiene la idea de la acción en curso sin recargar el estilo.
- source_word: ἀπολύσῃ τοὺς ὄχλους
  english_pob_choice: dismiss the crowds
  chosen_spanish: despedía a las multitudes
  alternatives_spanish:
  - despachara a las multitudes
  - enviara a la gente
  lexicon: BDAG
  rationale: ἀπολύω en este contexto significa enviar fuera/despedir. «Despedía» conserva esa fuerza y funciona bien con el complemento plural. «Multitudes» mantiene el plural explícito del griego; «gente» sería más general y perdería algo de la formalidad del término.
- source_word: ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la gente
  lexicon: BDAG
  rationale: El plural griego es explícito. «Multitudes» conserva ese plural y un registro bíblico claro; «gente» diluye la referencia colectiva.
translation_notes:
  revision_awareness: El registro inglés auditado ya fue marcado como sin cambios necesarios en la última revisión; esta propuesta española sigue ese mismo sentido, ajustando solo la expresión para que suene natural en español sin alterar el contenido. No se detectan variantes textuales relevantes en el paquete fuente para esta línea.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se prefirió «barca» sobre «barco» por la naturalidad y precisión del contexto narrativo.
  - Se mantuvo el plural «multitudes» para reflejar el griego plural ὄχλους.
  - Se tradujo la cláusula temporal de manera funcional en español para preservar la secuencia narrativa sin forzar una estructura demasiado literal.
