review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: ordenar a las multitudes, recostarse sobre la hierba, tomar los panes y peces, mirar al cielo, bendecir sin objeto explícito, partir los panes y darlos a los discípulos, y estos a las multitudes. También preserva correctamente la elipsis final y la ambigüedad de εὐλόγησεν.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero hay dos puntos mejorables: 1) la nota al pie actual trata ''hierba/pasto'', aunque la nota inglesa auditada pertenece a ''bendijo'' y preserva la ambigüedad teológica/léxica; 2) ''alzando la mirada al cielo'' suena menos directo en la cadena narrativa que ''miró hacia el cielo'' o similar. Además, ''multitudes'' es aceptable, pero ''la gente'' o ''las multitudes'' ambas funcionan; no exige cambio.'
  glossary_alignment: No hay términos del glosario base especialmente conflictivos en este versículo. 'Panes', 'peces', 'cielo' y 'bendijo' están bien alineados. La decisión clave es mantener 'bendijo' sin complemento explícito y trasladar ahí la nota, conforme al expediente inglés.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'hierba' en vez de en 'bendijo'.
    rationale: El expediente inglés preserva como nota la ambigüedad del objeto de εὐλόγησεν, no una alternativa léxica para χόρτος. El borrador introduce una nota nueva secundaria y omite la nota teológicamente significativa documentada.
  - severity: low
    issue: '''alzando la mirada al cielo'' es algo pesado en la secuencia narrativa.'
    rationale: Aunque fiel, una forma finita como 'miró hacia el cielo' fluye mejor en español bíblico moderno sin perder el valor del participio anterior al verbo principal.
  revised_spanish_text: Y después de ordenar a las multitudes que se recostaran sobre la hierba, tomó los cinco panes y los dos peces, miró hacia el cielo, bendijo[a], y después de partir los panes se los dio a los discípulos, y los discípulos a las multitudes.
  revised_footnotes:
  - marker: a
    text: O «bendijo a Dios» o «dijo una bendición». El griego simplemente dice «bendijo», sin indicar explícitamente el objeto.
    reason: alternative_reading
  revision_rationale: Se movió la nota al verbo «bendijo» para reflejar la ambigüedad documentada en el griego y en la auditoría inglesa; se eliminó la nota sobre «hierba/pasto» por no ser la nota principal preservada por el expediente. También se suavizó «alzando la mirada al cielo» a «miró hacia el cielo» para mayor naturalidad narrativa en español, sin cambiar el sentido.
