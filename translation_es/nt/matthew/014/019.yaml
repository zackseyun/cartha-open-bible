base_translation:
  language: en
  yaml_path: translation/nt/matthew/014/019.yaml
  text: And after ordering the crowds to recline on the grass[a], he took the five loaves and the two fish, looked up to heaven, blessed, and after breaking the loaves he gave them to the disciples, and the disciples to the crowds.
  footnotes:
  - marker: a
    text: Or 'he blessed God' / 'he said a blessing.' The Greek simply says 'he blessed,' without stating the object explicitly.
    reason: alternative_reading
