translation:
  language: es
  text: Y después de ordenar a las multitudes que se recostaran sobre la hierba, tomó los cinco panes y los dos peces, miró hacia el cielo, bendijo[a], y después de partir los panes se los dio a los discípulos, y los discípulos a las multitudes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bendijo a Dios» o «dijo una bendición». El griego simplemente dice «bendijo», sin indicar explícitamente el objeto.
    reason: alternative_reading
lexical_decisions:
- source_word: κελεύσας
  english_pob_choice: after ordering
  chosen_spanish: después de ordenar
  alternatives_spanish:
  - habiendo mandado
  - tras mandar
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa a la principal. «Después de ordenar» conserva la secuencia narrativa natural en español y el matiz de instrucción/directiva.
- source_word: τοὺς ὄχλους
  english_pob_choice: crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las turbas
  - la gente
  lexicon: BDAG
  rationale: «Multitudes» refleja el plural de grupos reunidos y evita el matiz algo peyorativo de «turbas».
- source_word: ἀνακλιθῆναι
  english_pob_choice: to recline
  chosen_spanish: que se recostaran
  alternatives_spanish:
  - que se sentaran
  - que se echaran
  lexicon: BDAG
  rationale: El verbo remite a la postura de mesa o comida. «Recostarse» conserva mejor esa escena que el más genérico «sentarse».
- source_word: ἐπὶ τοῦ χόρτου
  english_pob_choice: on the grass
  chosen_spanish: sobre la hierba
  alternatives_spanish:
  - sobre el pasto
  - sobre la grama
  lexicon: BDAG
  rationale: «Hierba» reproduce el término básico χόρτος sin introducir el detalle específico de «verde» que no está en Mateo.
- source_word: λαβὼν
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - habiendo tomado
  - al tomar
  lexicon: BDAG
  rationale: Se vierte como verbo finito en español para fluidez narrativa, manteniendo la acción previa al bendecir.
- source_word: ἄρτους
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas
  - bollos
  lexicon: BDAG
  rationale: En el contexto de la alimentación milagrosa, ἄρτοι puede traducirse naturalmente por «panes», que es claro y fiel en español.
- source_word: ἰχθύας
  english_pob_choice: fish
  chosen_spanish: peces
  alternatives_spanish:
  - pescados
  lexicon: BDAG
  rationale: «Peces» es el equivalente directo y natural para el sustantivo plural en este contexto.
- source_word: ἀναβλέψας εἰς τὸν οὐρανόν
  english_pob_choice: looked up to heaven
  chosen_spanish: alzando la mirada al cielo
  alternatives_spanish:
  - miró al cielo
  - levantando los ojos al cielo
  lexicon: BDAG
  rationale: La imagen de levantar la vista se expresa de forma idiomática en español. «Cielo» traduce οὐρανός en este contexto reverente, como en el uso bíblico habitual.
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - dijo una bendición
  - bendijo a Dios
  lexicon: BDAG
  rationale: El griego no explicita el objeto de la bendición. En español, «bendijo» preserva esa ambigüedad sin forzar un objeto; por eso se omite cualquier complemento explícito.
- source_word: κλάσας
  english_pob_choice: after breaking the loaves
  chosen_spanish: después de partir los panes
  alternatives_spanish:
  - y partiendo los panes
  - habiendo partido los panes
  lexicon: BDAG
  rationale: «Partir los panes» expresa el gesto de fraccionar el pan para repartirlo. El objeto se explicita por contexto, como en el inglés POB revisado.
- source_word: ἔδωκεν τοῖς μαθηταῖς τοὺς ἄρτους
  english_pob_choice: he gave them to the disciples
  chosen_spanish: se los dio a los discípulos
  alternatives_spanish:
  - dio los panes a los discípulos
  - los dio a los discípulos
  lexicon: BDAG
  rationale: El pronombre átono «se los» evita repetición y conserva el referente de los panes, manteniendo naturalidad en español.
- source_word: οἱ δὲ μαθηταὶ τοῖς ὄχλοις
  english_pob_choice: and the disciples to the crowds
  chosen_spanish: y los discípulos a las multitudes
  alternatives_spanish:
  - y los discípulos a la gente
  - y los discípulos a las turbas
  lexicon: BDAG
  rationale: El griego elide el verbo en la segunda mitad. En español se mantiene la misma concisión narrativa y se sobreentiende el acto de distribuir desde el contexto inmediato.
theological_decisions:
- issue: Objeto implícito de εὐλόγησεν
  english_pob_reading: The Greek simply says 'he blessed,' without stating the object explicitly.
  chosen_spanish_reading: «bendijo» sin complemento explícito
  alternative_spanish_readings:
  - «bendijo a Dios»
  - «dio gracias»
  - «dijo una bendición»
  rationale: 'El texto griego no especifica el objeto. En español, lo más fiel es conservar la misma apertura semántica con «bendijo» sin añadir objeto alguno. Así se preserva la tensión: puede referirse a bendecir el alimento o a pronunciar una bendición dirigida a Dios.'
  doctrine_reference: Preservar ambigüedad textual y evitar resolver prematuramente el sentido.
translation_notes:
  revision_awareness: Se atendió la revisión que eliminó cualquier objeto añadido tras «bendijo» en el inglés auditado. En español, se mantuvo esa misma reserva y no se añadió complemento. También se evitó importar el detalle de «verde» para χόρτου, siguiendo el griego de Mateo.
  spanish_consistency_notes:
  - Se mantuvo el término «multitudes» de manera consistente para ὄχλους.
  - Se conservó la ambigüedad de εὐλόγησεν con «bendijo» sin objeto.
  - Se eligió un español natural y reverente, evitando calcos innecesarios.
  - La nota al pie está anclada exactamente en [a] dentro del texto, sin marcadores sueltos.
