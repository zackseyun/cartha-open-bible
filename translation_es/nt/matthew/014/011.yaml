translation:
  language: es
  text: Y su cabeza fue llevada en una bandeja y fue dada a la muchacha[a], y ella la llevó a su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre una bandeja» o «sobre un plato». El griego πίναξ se refiere a una bandeja de servicio o a un plato para presentar alimentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνέχθη
  english_pob_choice: was brought
  chosen_spanish: fue llevada
  alternatives_spanish:
  - fue traída
  - fue cargada
  lexicon: BDAG
  rationale: El aoristo pasivo de φέρω pide una pasiva narrativa. «Fue llevada» conserva el sentido de traslado y suena natural en español sin volver el verbo mecánico o excesivamente literal.
- source_word: κεφαλὴ αὐτοῦ
  english_pob_choice: his head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - la cabeza de él
  lexicon: BDAG
  rationale: La frase griega es directa y no sugiere eufemismo. En español, el posesivo «su» mantiene la referencia clara y natural.
- source_word: ἐπὶ πίνακι
  english_pob_choice: on a platter
  chosen_spanish: en una bandeja
  alternatives_spanish:
  - sobre un plato
  - sobre una fuente
  lexicon: BDAG
  rationale: πίναξ denota un recipiente de servicio, como bandeja o plato. «Bandeja» comunica bien la imagen en español y evita un anglicismo conceptual como «platter».
- source_word: ἐδόθη
  english_pob_choice: given
  chosen_spanish: dada
  alternatives_spanish:
  - entregada
  lexicon: BDAG
  rationale: La pasiva de δίδωμι se conserva con «dada». La construcción «fue llevada ... y dada» reproduce la secuencia verbal del griego.
- source_word: τῷ κορασίῳ
  english_pob_choice: to the girl
  chosen_spanish: a la muchacha
  alternatives_spanish:
  - a la niña
  - a la joven
  lexicon: BDAG
  rationale: κοράσιον puede referirse a una muchacha/niña joven. «Muchacha» transmite juventud sin infantilizarla ni sonar arcaico.
- source_word: ἤνεγκεν
  english_pob_choice: she brought it
  chosen_spanish: se la llevó
  alternatives_spanish:
  - la llevó
  - la trajo
  lexicon: BDAG
  rationale: El griego implica que la muchacha llevó el objeto a su madre; en español «se la llevó» expresa naturalmente el movimiento hacia otra persona y mantiene la referencia al objeto sin añadir palabras innecesarias.
- source_word: τῇ μητρὶ αὐτῆς
  english_pob_choice: to her mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre de ella
  lexicon: BDAG
  rationale: La relación posesiva es inequívoca en contexto. «A su madre» es la forma natural y clara en español.
translation_notes:
  revision_awareness: 'Alineado con el pasaje griego y con la auditoría inglesa: se mantiene la secuencia pasiva y el objeto presentado, sin introducir eufemismos ni expansión interpretativa. La revisión más reciente marcó el texto como sin cambios necesarios.'
  spanish_consistency_notes:
  - Se conserva «muchacha» para κοράσιον, en consonancia con el rango semántico del término y con el tono narrativo.
  - Se evita «Cristo», «SEÑOR» u otra terminología ajena al versículo; no hay términos teológicos disputados en este texto.
  - La nota lexical sobre πίναξ preserva la alternativa de traducción que también documenta el audit trail en inglés.
