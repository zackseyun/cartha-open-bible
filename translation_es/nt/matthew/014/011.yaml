  to: Y su cabeza fue llevada en una bandeja y fue dada a la muchacha[a], y ella la llevó a su madre.
  rationale: Se ajusta el verbo final a «la llevó» para evitar un matiz añadido no presente en el griego. Se repite «fue» antes de «dada» para una sintaxis española más natural y una mejor correspondencia con la doble pasiva griega. La nota se mantiene con leve afinación para reflejar mejor la relación con ἐπὶ.
