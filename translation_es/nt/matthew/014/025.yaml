    rationale: 'En el inglés, una nota cultural se ancla a «them» y otra nota alternativa a «sea». En español conviene reanclar ordenadamente: una nota cultural en «vigilia» y una nota alternativa en «mar», usando marcadores únicos y coherentes con el texto revisado.'
  revised_spanish_text: Y en la cuarta vigilia[a] de la noche, él vino a ellos, caminando sobre el mar[b].
  revised_footnotes:
