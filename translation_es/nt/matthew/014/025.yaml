translation:
  language: es
  text: Y en la cuarta vigilia[a] de la noche, él vino a ellos, caminando sobre el mar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La «cuarta vigilia de la noche» se refiere a la última vigilia nocturna, aproximadamente entre las 3:00 y las 6:00 a. m., en el sistema romano.
    reason: cultural_note
  - marker: b
    text: O «sobre el mar». Algunos han entendido la frase como «junto al mar», pero el contexto favorece claramente el movimiento sobre la superficie del agua.
    reason: alternative_reading
lexical_decisions:
- source_word: τετάρτῃ ... φυλακῇ τῆς νυκτός
  english_pob_choice: in the fourth watch of the night
  chosen_spanish: en la cuarta vigilia de la noche
  alternatives_spanish:
  - durante la cuarta vigilia de la noche
  - en la cuarta guardia de la noche
  lexicon: BDAG
  rationale: φυλακή en este contexto temporal se refiere a una división de la noche por turnos de guardia; «vigilia» conserva el marco histórico sin modernizarlo en exceso. «De la noche» mantiene el genitivo temporal del griego.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: δὲ funciona aquí como conector narrativo leve. «Y» es la equivalencia española más natural y conserva el avance de la narración sin añadir matiz temporal fuerte.
- source_word: ἦλθεν
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: BDAG
  rationale: Con πρός αὐτούς, ἔρχομαι expresa movimiento hacia los discípulos; «vino a ellos» reproduce bien esa orientación. «Llegó» es posible, pero suena menos dinámico en la escena.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  lexicon: BDAG
  rationale: La preposición πρός con acusativo indica dirección hacia las personas; en español, «a ellos» encaja naturalmente con «vino» sin perder el sentido direccional.
- source_word: περιπατῶν
  english_pob_choice: walking
  chosen_spanish: caminando
  alternatives_spanish:
  - andando
  - mientras caminaba
  lexicon: BDAG
  rationale: El participio presente expresa acción contemporánea con el verbo principal. «Caminando» conserva esa simultaneidad y suena natural en español.
- source_word: ἐπὶ τὴν θάλασσαν
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - sobre el mar
  - por encima del mar
  - sobre el lago
  lexicon: BDAG
  rationale: ἐπί con acusativo aquí indica movimiento sobre una superficie. «Sobre el mar» preserva la fuerza del griego y el sentido milagroso. Se evita «lago» porque θάλασσα es el término del texto griego y no debe sustituirse sin base léxica directa.
theological_decisions:
- issue: Movimiento milagroso de Jesús sobre el agua
  english_pob_reading: walking on the sea
  chosen_spanish_reading: caminando sobre el mar
  alternative_spanish_readings:
  - caminando por la orilla del mar
  - caminando junto al mar
  rationale: La sintaxis de περιπατῶν ἐπὶ τὴν θάλασσαν, en su contexto narrativo, favorece movimiento sobre la superficie del agua, no junto a la costa. La traducción mantiene el sentido llano del texto y su fuerza milagrosa sin explicitar más de lo que dice el griego.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
- issue: Marco temporal de la cuarta vigilia
  english_pob_reading: final night watch, roughly between 3:00 and 6:00 a.m. in the Roman system
  chosen_spanish_reading: la cuarta vigilia de la noche
  alternative_spanish_readings:
  - la última vigilia de la noche
  - la cuarta guardia de la noche
  rationale: No se incorpora la equivalencia horaria en el texto principal para no sobrecargarlo; la expresión conserva el trasfondo histórico del sistema de vigilias y permite una nota si se requiere aclaración cultural.
  doctrine_reference: Translation philosophy §2
- issue: Designación de θάλασσα
  english_pob_reading: sea
  chosen_spanish_reading: mar
  alternative_spanish_readings:
  - lago
  - mar de Galilea
  rationale: Aunque el referente geográfico sea el lago de Galilea, el lexema griego es θάλασσα. «Mar» respeta la forma del texto y evita una armonización explicativa no presente en el griego.
  doctrine_reference: Source fidelity and lexical consistency
translation_notes:
  revision_awareness: Se corrigió el fallo anterior anclando explícitamente ambas notas al texto español mediante los marcadores [a] y [b]. La redacción principal se mantiene en armonía alta con el audit trail inglés y con el griego SBLGNT.
  spanish_consistency_notes:
  - Se usa «vigilia» para φυλακή en sentido temporal, no «guardia» como término militar moderno, porque el contexto es la división nocturna.
  - Se mantiene «mar» para θάλασσα, aunque la escena ocurra en el lago de Galilea, por fidelidad al lexema griego.
  - Se evita introducir la equivalencia horaria en el versículo principal; queda reservada para una nota cultural si el aparato editorial la desea.
  - 'La estructura española conserva el orden narrativo simple: conector, tiempo, movimiento hacia los discípulos y modo de desplazamiento.'
