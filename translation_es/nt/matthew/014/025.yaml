- from: Y en la cuarta vigilia de la noche, él vino a ellos[a], caminando sobre el mar[b].
  to: Y en la cuarta vigilia[a] de la noche, él vino a ellos, caminando sobre el mar[b].
  rationale: Se conserva el texto principal casi intacto porque es fiel y natural, pero se reemplaza la nota innecesaria sobre «vino» por la nota cultural requerida para «cuarta vigilia», y se mantiene una nota de alternativa interpretativa en «mar» para reflejar la justificación auditada sobre ἐπὶ τὴν θάλασσαν. Así el español queda mejor alineado con el griego y con el expediente POB en inglés.
