translation:
  language: es
  text: Y cuando entraron en la barca[a], el viento cesó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «después de que subieron a la barca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβάντων αὐτῶν
  english_pob_choice: when they got into
  chosen_spanish: cuando ellos entraron
  alternatives_spanish:
  - cuando subieron
  - después de que subieron
  - cuando se embarcaron
  lexicon: BDAG
  rationale: El participio genitivo absoluto funciona naturalmente como cláusula temporal en español. Aunque ἀναβαίνω es literalmente 'subir', en este contexto con εἰς τὸ πλοῖον el sentido idiomático es de ingresar a la embarcación. 'Entraron' comunica la acción sin forzar un calco poco natural.
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - bote
  lexicon: BDAG
  rationale: En el contexto evangélico, πλοῖον designa la embarcación de los discípulos en el mar de Galilea. 'Barca' es un equivalente natural y digno en español bíblico; 'barco' suena demasiado grande, y 'bote' puede sonar demasiado coloquial o pequeño según el registro.
- source_word: ἐκόπασεν
  english_pob_choice: ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - se calmó
  - se apaciguó
  - amainó
  lexicon: BDAG
  rationale: κοπάζω significa cesar o amainar, especialmente de viento o tormenta. 'Cesó' mantiene la brevedad y la fuerza directa del aoristo. 'Se calmó' podría sugerir el estado del mar más que el cese del viento mismo.
- source_word: ὁ ἄνεμος
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - la tempestad
  - la borrasca
  lexicon: BDAG
  rationale: El sustantivo es sencillo y no requiere ampliación. 'El viento' conserva exactamente el sujeto gramatical y evita introducir un fenómeno más amplio que el texto no nombra.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: La conjunción continúa la secuencia narrativa sin añadir énfasis interpretativo. 'Y' es el equivalente español más directo y natural.
theological_decisions:
- issue: Alcance teológico de la cesación del viento
  english_pob_reading: Translate the event plainly without expanding its theological significance in the main text.
  chosen_spanish_reading: Traducir el hecho de manera sobria, sin explicitar en el texto principal la autoridad milagrosa de Jesús sobre la naturaleza.
  alternative_spanish_readings:
  - Introducir una formulación interpretativa que destaque el milagro
  - Añadir una explicación devocional en el cuerpo del versículo
  rationale: El verso narra el evento; su peso teológico se aprecia por el contexto inmediato, no por una ampliación del traductor. La traducción debe preservar esa sobriedad y dejar la implicación doctrinal al flujo narrativo.
  doctrine_reference: Primacía del texto original; mantener la tensión narrativa sin resolverla interpretativamente en la traducción.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto en español refleja directamente el acuerdo alto del cotejo con el original griego y la decisión inglesa de traducir el participio genitivo absoluto como cláusula temporal natural.
  spanish_consistency_notes:
  - Se mantiene 'barca' para πλοῖον, en línea con un registro bíblico natural en español.
  - Se conserva 'cesó' para ἐκόπασεν, evitando reinterpretar el verbo como una mera descripción del clima.
  - La nota alternativa señala el matiz literal de ἀναβάντων sin desplazar la lectura principal.
  - La conjunción inicial 'Y' conserva la continuidad narrativa del καί griego.
