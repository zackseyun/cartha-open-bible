review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: futuro de acción violenta («los echarán»), imagen concreta de juicio («el horno de fuego»), y la fórmula final de angustia y juicio. Sin embargo, el uso de las notas no preserva fielmente la lógica del expediente inglés: la nota [a] repite exactamente el texto principal y no ofrece una alternativa real, y la nota [b] atribuye a «allí» un matiz explicativo innecesario que no corresponde bien al estado final auditado en inglés, donde «there» quedó en el texto principal al final de la cláusula.'
  spanish_quality_summary: 'El español es claro y natural, pero la colocación de «Allí» al inicio suaviza la correspondencia con el griego revisado y con el inglés POB final («There will be ... there»). En español suena mejor y más fiel: «Habrá llanto y crujir de dientes allí». Además, «crujir de dientes» es comprensible, aunque «rechinar de dientes» es más establecido bíblicamente; no obstante, no exige cambio obligatorio. El problema principal es de notas y de orden locativo.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Horno de fuego» respeta la decisión documentada de no parafrasear como «horno ardiente». «Llanto» corresponde bien a κλαυθμός. «Crujir de dientes» es aceptable para βρυγμὸς τῶν ὀδόντων, aunque «rechinar de dientes» sería una alternativa española más tradicional e idiomática. No intervienen términos sensibles como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: La nota [a] no aporta una alternativa real.
    rationale: 'El texto principal ya dice «en el horno de fuego», por lo que la nota «O: «en el horno de fuego»» es redundante e inválida como nota léxica.'
  - severity: medium
    issue: La nota [b] explica indebidamente una alternativa que no aparece como tal en el texto final.
    rationale: En el expediente inglés final, «there» quedó en el texto principal y la nota documenta el griego/adaptación inglesa previa; en español no corresponde conservar una nota que crea confusión sobre «allí» sin ofrecer una alternativa útil.
  - severity: low
    issue: La posición de «Allí» al inicio no refleja tan bien la revisión final auditada.
    rationale: El griego tiene ἐκεῖ al inicio de la segunda cláusula, pero el inglés POB final lo colocó al final por naturalidad. En español, «Habrá llanto y crujir de dientes allí» conserva mejor el énfasis locativo sin sonar forzado y se alinea con la decisión auditada final.
  revised_spanish_text: y los echarán en el horno de fuego. Habrá llanto y crujir de dientes allí.
  revision_rationale: 'Se elimina el aparato de notas porque las dos notas existentes son impropias: una repite el texto exacto y la otra introduce una explicación innecesaria y poco fiel al estado final del expediente. También se recoloca «allí» al final de la cláusula para ajustarse mejor a la revisión inglesa final y a la naturalidad del español, sin alterar el sentido del griego.'
