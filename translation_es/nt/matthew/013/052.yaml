    reason: alternative_reading
  - marker: b
    text: O «cabeza de familia».
    reason: lexical_alternative
  - marker: c
    text: «Tesoro» también puede sugerir un depósito o almacén de donde se sacan cosas valiosas.
    reason: lexical_alternative
  revision_rationale: Se reubican las notas en sus palabras correspondientes para cumplir la disciplina editorial y evitar ambigüedad. Además, se mejora la naturalidad de la metáfora sustituyendo «un hombre, dueño de casa» por «un dueño de casa», sin pérdida sustancial del sentido del griego ni de la decisión auditada sobre οἰκοδεσπότης.
