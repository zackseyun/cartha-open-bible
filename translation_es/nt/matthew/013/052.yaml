translation:
  language: es
  text: 'Entonces él les dijo: «Por eso, todo escriba que ha sido formado[a] para el reino de los cielos es semejante a un dueño de casa[b] que saca de su tesoro[c] cosas nuevas y viejas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que se ha hecho discípulo del reino de los cielos». El participio griego puede sugerir tanto ser formado o instruido como llegar a ser discípulo.
    reason: alternative_reading
  - marker: b
    text: O «cabeza de familia».
    reason: lexical_alternative
  - marker: c
    text: «Tesoro» también puede sugerir un depósito o almacén de donde se sacan cosas valiosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa bien la inferencia lógica en español natural y mantiene la relación con la enseñanza anterior sin sonar forzado.
- source_word: πᾶς γραμματεὺς
  english_pob_choice: every scribe
  chosen_spanish: todo escriba
  alternatives_spanish:
  - todo maestro de la ley
  lexicon: BDAG
  rationale: «Escriba» conserva el término más directo del griego y evita sustituirlo por una glosa más interpretativa.
- source_word: μαθητευθεὶς
  english_pob_choice: who has been trained
  chosen_spanish: ha sido formado
  alternatives_spanish:
  - ha sido entrenado
  - ha sido instruido
  - se ha hecho discípulo
  lexicon: BDAG
  rationale: El participio pasivo puede incluir la idea de discipulado y de instrucción/formación. «Ha sido formado» comunica ese proceso sin restringirlo solo a conversión o solo a enseñanza académica.
- source_word: τῇ βασιλείᾳ τῶν οὐρανῶν
  english_pob_choice: for the kingdom of heaven
  chosen_spanish: para el reino de los cielos
  alternatives_spanish:
  - en el reino de los cielos
  - en relación con el reino de los cielos
  lexicon: BDAG
  rationale: «Reino de los cielos» respeta la fórmula característica de Mateo. «Para» expresa la orientación o finalidad sugerida por el dativo con μαθητευθείς, de modo natural en español.
- source_word: ὅμοιός ἐστιν
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - se parece a
  lexicon: BDAG
  rationale: «Es semejante a» mantiene el valor comparativo formal del griego y funciona bien en un registro bíblico sobrio.
- source_word: ἀνθρώπῳ οἰκοδεσπότῃ
  english_pob_choice: a master of a house
  chosen_spanish: un hombre, dueño de casa
  alternatives_spanish:
  - un padre de familia
  - un hombre, cabeza de familia
  - un casero
  lexicon: BDAG
  rationale: «Dueño de casa» comunica la función de οἰκοδεσπότης. Se añadió «un hombre» para reflejar el ἀνθρώπῳ del griego y conservar la imagen completa del símil.
- source_word: ἐκβάλλει
  english_pob_choice: brings out
  chosen_spanish: saca
  alternatives_spanish:
  - saca de
  - trae fuera
  lexicon: BDAG
  rationale: Con tesoro, ἐκβάλλω no tiene fuerza de expulsión sino de poner fuera o extraer. «Saca» expresa bien ese movimiento en español natural.
- source_word: ἐκ τοῦ θησαυροῦ αὐτοῦ
  english_pob_choice: out of his treasure
  chosen_spanish: de su tesoro
  alternatives_spanish:
  - de su tesoro guardado
  - de su depósito de riquezas
  lexicon: BDAG
  rationale: «Tesoro» preserva el valor de reserva y lo valioso del contenido; el matiz de almacén o depósito queda implicado sin sobrecargar el texto principal.
- source_word: καινὰ καὶ παλαιά
  english_pob_choice: new things and old
  chosen_spanish: cosas nuevas y viejas
  alternatives_spanish:
  - nuevas y viejas
  - cosas nuevas y antiguas
  lexicon: BDAG
  rationale: Los adjetivos neutros plurales implican elementos no nombrados. «Cosas nuevas y viejas» reproduce de forma natural la idea de items implícitos y el contraste del griego.
theological_decisions:
- issue: Sentido de μαθητευθεὶς aplicado al escriba
  english_pob_reading: A scribe who has been instructed/trained as a disciple for the kingdom of heaven
  chosen_spanish_reading: Un escriba que ha sido formado para el reino de los cielos
  alternative_spanish_readings:
  - Un escriba que se ha hecho discípulo del reino de los cielos
  - Un escriba instruido para el reino de los cielos
  rationale: La frase mantiene abierta la tensión entre discipulado e instrucción. «Formado» evita reducir el pasaje a una sola dimensión y conserva el movimiento de preparación para el reino que destaca el contexto inglés auditado.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de οἰκοδεσπότης en la metáfora
  english_pob_reading: master of a house
  chosen_spanish_reading: dueño de casa
  alternative_spanish_readings:
  - dueño del hogar
  - cabeza de familia
  - amo de casa
  rationale: «Dueño de casa» conserva la autoridad doméstica sin introducir ideas sociales posteriores. Es claro en español y mantiene la metáfora del administrador del tesoro familiar.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca la edición inglesa más reciente, que no requirió cambios de fondo. Se mantiene la misma lectura del participio μαθητευθεὶς y del símil doméstico, con adaptación al español y conservación de las alternativas auditadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto original lo requiera; aquí no aparece.
  - Se conserva «reino de los cielos» como fórmula mateana estable.
  - Se mantiene «escriba» para γραμματεύς, evitando la glosa interpretativa «maestro de la ley».
  - Se traduce θησαυρός como «tesoro» en el texto principal, con nota sobre el posible matiz de depósito o almacén.
  - Se emplea una construcción natural en español («ha sido formado») para respetar el participio pasivo sin perder la tensión entre formación e discipulado.
