translation:
  language: es
  text: Y cuando Jesús terminó estas parábolas[a], partió de allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y sucedió que, cuando Jesús terminó estas parábolas, partió de allí».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγένετο
  english_pob_choice: And when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y cuando
  - Y aconteció que, cuando
  - Y ocurrió que, cuando
  lexicon: BDAG
  rationale: El giro narrativo καὶ ἐγένετο suele funcionar como transición temporal. En español, «Y sucedió que, cuando» conserva ese valor introductorio sin volver la frase innecesariamente rígida; además mantiene el matiz de acontecimiento narrativo que el POB inglés deja entrever en su nota alternativa.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - después de que
  lexicon: BDAG
  rationale: ὅτε introduce una subordinada temporal directa. «Cuando» es la equivalencia natural y más transparente en español.
- source_word: ἐτέλεσεν
  english_pob_choice: had finished
  chosen_spanish: terminó
  alternatives_spanish:
  - había terminado
  - completó
  - acabó
  lexicon: BDAG
  rationale: El aoristo señala una acción concluida antes de la acción principal. En español, «terminó» expresa con claridad la conclusión del discurso; el contexto temporal ya queda claro por la subordinada con «cuando», por lo que no hace falta forzar un pluscuamperfecto que en español puede sonar menos directo.
- source_word: παραβολὰς
  english_pob_choice: parables
  chosen_spanish: parábolas
  alternatives_spanish:
  - ilustraciones
  - comparaciones
  lexicon: BDAG
  rationale: En el contexto sinóptico, παραβολή designa el género reconocible de «parábola». «Parábolas» conserva el sentido técnico y eclesial sin perder precisión.
- source_word: ταύτας
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas mismas
  - estas ya dichas
  lexicon: BDAG
  rationale: El demostrativo remite al conjunto inmediato de parábolas recién narradas. «Estas» reproduce esa referencia de forma natural y suficiente.
- source_word: μετῆρεν
  english_pob_choice: departed
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se retiró
  - se marchó
  lexicon: BDAG
  rationale: μεταίρω expresa el hecho de pasar de un lugar a otro. En español, «se fue» comunica de manera clara y natural que Jesús dejó ese lugar; «partió» o «se marchó» serían más literarios, pero menos directos.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ese lugar
  - de ahí
  lexicon: BDAG
  rationale: ἐκεῖθεν significa «desde allí / de allí». «De allí» es la equivalencia más idiomática y precisa en español.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia y no requieren correcciones textuales. La única tensión de traducción es estilística: si conservar explícitamente el arranque narrativo idiomático καὶ ἐγένετο o simplificarlo. Se optó por mantenerlo en español con una formulación natural.'
  spanish_consistency_notes:
  - Se usó «Jesús» como forma fija del nombre propio.
  - Se mantuvo «parábolas» para conservar el género narrativo-teológico del pasaje.
  - No se introdujeron términos eclesiásticos adicionales; el verso es puramente narrativo.
  - La puntuación reproduce la subordinación temporal del griego con una coma tras «sucedió que» y otra antes de la cláusula principal.
