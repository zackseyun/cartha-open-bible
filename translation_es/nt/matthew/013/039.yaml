review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y conserva correctamente «enemigo», «el diablo», «la siega» y «ángeles». También mantiene adecuadamente la decisión teológica de αἰών como «era» y preserva la nota alternativa. Sin embargo, falla en la referencia pronominal de αὐτά: el griego es plural («them»), referido a la cizaña/malas hierbas, y el español «la sembró» cambia indebidamente a singular.'
  spanish_quality_summary: El texto es claro y legible, con tono bíblico natural. No obstante, «que la sembró» suena menos fiel y menos natural que una referencia plural explícita. «La era» es defendible, aunque en español bíblico general «edad» suele sonar más idiomático; aun así, no exige cambio porque el proyecto ya documenta «era» aquí y es comprensible. La reparación necesaria es pequeña y localizada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «El diablo» para διάβολος, «ángeles» para ἄγγελοι y la preservación de «era» frente a «mundo» están alineadas con el expediente inglés. El único desajuste real es lexical/sintáctico en αὐτά, que debe mantenerse en plural en español.
  issues:
  - severity: high
    issue: αὐτά se tradujo como singular («la») en vez de plural
    rationale: El texto griego tiene objeto plural neutro («αὐτά»), y el inglés auditado lo refleja con «them». En el contexto de la parábola se refiere a la cizaña/malas hierbas sembradas. «La sembró» introduce un singular no presente en la fuente y debilita la anáfora.
  - severity: low
    issue: La justificación lexical de αὐτά defiende un singular colectivo poco convincente
    rationale: Aunque el español a veces usa singulares colectivos, aquí no hay necesidad de hacerlo, y además la forma propuesta no es la más natural tras «enemigo que…». «Que las sembró» o «que sembró eso» sería más fiel; la primera opción encaja mejor con el contexto.
  revised_spanish_text: Y el enemigo que las sembró es el diablo; la siega es el fin de la era[a], y los segadores son ángeles.
  revised_footnotes:
  - marker: a
    text: O «la consumación de la era»; tradicionalmente, «el fin del mundo».
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la referencia pronominal para reflejar el plural griego αὐτά y el sentido anafórico del contexto («las» = la cizaña/malas hierbas). El resto del versículo puede mantenerse, incluida la nota sobre «era».
