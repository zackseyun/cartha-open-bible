translation:
  language: es
  text: Y el enemigo que las sembró es el diablo; la siega es el fin de la era[a], y los segadores son ángeles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la consumación de la era»; tradicionalmente, «el fin del mundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχθρὸς
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - enemigo personal
  lexicon: BDAG
  rationale: «Enemigo» es la equivalencia natural y directa en español para ἐχθρός en este contexto, y conserva la oposición personal del pasaje sin añadir matices no presentes en el griego.
- source_word: ὁ σπείρας
  english_pob_choice: who sowed
  chosen_spanish: que la sembró
  alternatives_spanish:
  - que la plantó
  - el que la sembró
  lexicon: BDAG
  rationale: El participio aoristo identifica al enemigo por una acción ya realizada. «Sembró» preserva la imagen agrícola del pasaje y suena natural en español; «plantó» sería más general y menos ajustado a la metáfora del trigo y la cizaña.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: la
  alternatives_spanish:
  - las
  - aquellas
  lexicon: BDAG
  rationale: Aunque el griego es plural, en español el antecedente inmediato «la» puede referirse de forma colectiva a la cizaña/las malas hierbas ya mencionadas en la parábola. Se mantiene la referencia anafórica sin forzar una repetición poco fluida.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: Aquí διάβολος funciona como designación reconocida de Satanás, por lo que «el diablo» es la forma más clara y estable en español. Un rendering etimológico como «calumniador» oscurecería el referente.
- source_word: θερισμὸς
  english_pob_choice: harvest
  chosen_spanish: la siega
  alternatives_spanish:
  - la cosecha
  - la recolección
  lexicon: BDAG
  rationale: El contexto agrícola admite varias opciones, pero «siega» conserva bien la imagen de corte/recolección y mantiene un tono bíblico natural en español. «Cosecha» es posible, pero desplaza el foco hacia el resultado más que hacia el acto figurado.
- source_word: συντέλεια αἰῶνός
  english_pob_choice: the end of the age
  chosen_spanish: el fin de la era
  alternatives_spanish:
  - la consumación de la era
  - el fin del mundo
  lexicon: BDAG
  rationale: Se traduce αἰών como «era» para preservar el sentido temporal de época/edad y evitar introducir una lectura material de «mundo» que el griego no exige. «Fin de la era» comunica bien la idea de culminación; «consumación de la era» es viable pero menos natural en español continuo.
- source_word: θερισταὶ
  english_pob_choice: harvesters
  chosen_spanish: los segadores
  alternatives_spanish:
  - los cosechadores
  - los reaperos
  lexicon: BDAG
  rationale: «Segadores» reproduce con precisión la función del término y se ajusta a la imaginería de la siega. Es más tradicional y más concreto que «cosechadores» en este pasaje.
- source_word: ἄγγελοί
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto escatológico indica seres celestiales, por lo que «ángeles» es la traducción correcta y no meramente etimológica.
- source_word: δὲ
  english_pob_choice: and / punctuation-based transition
  chosen_spanish: y / puntuación de transición
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: La partícula δέ marca avance discursivo. En español, la repetición de «pero» o «ahora» en cada miembro sonaría forzada; la coordinación sencilla y la puntuación transmiten adecuadamente la progresión de la explicación.
theological_decisions:
- issue: Sentido de συντέλεια αἰῶνος en clave escatológica
  english_pob_reading: the end of the age
  chosen_spanish_reading: el fin de la era
  alternative_spanish_readings:
  - la consumación de la era
  - el fin del mundo
  rationale: Se mantiene el sentido de culminación temporal sin introducir una noción cosmológica más amplia de la que exige el griego. «Era» preserva la referencia a una etapa histórica/escatológica; «mundo» sería tradicional, pero menos preciso para αἰών.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran acuerdo alto y sin revisiones aplicadas. Esta versión española sigue esa línea estable, preservando la oposición personal entre enemigo y diablo, la metáfora agrícola de siega, y la distinción escatológica de αἰών como «era» más que «mundo».
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» por defecto en el proyecto, pero este versículo no contiene ninguno de esos términos.
  - Se optó por «el diablo» como equivalente fijo de διάβολος, coherente con el uso cristiano estándar y con el audit trail en inglés.
  - «Segadores» mantiene coherencia con la metáfora agrícola y evita alternar innecesariamente con «reaperos» o «cosechadores».
  - La elección de «era» para αἰών conserva el valor temporal de la expresión y evita una traducción doctrinalmente cargada como «mundo».
