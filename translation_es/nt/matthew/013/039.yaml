revisions:
- from: Y el enemigo que la sembró es el diablo; la siega es el fin de la era[a], y los segadores son ángeles.
  to: Y el enemigo que las sembró es el diablo; la siega es el fin de la era[a], y los segadores son ángeles.
  rationale: Se corrige únicamente la referencia pronominal para reflejar el plural griego αὐτά y el sentido anafórico del contexto («las» = la cizaña/malas hierbas). El resto del versículo puede mantenerse, incluida la nota sobre «era».
