translation:
  language: es
  text: 'Dejen que ambos crezcan juntos hasta la cosecha[a], y en el tiempo de la cosecha les diré a los segadores: «Junten primero la cizaña y átenla en haces para quemarla; pero reúnan el trigo en mi almacén»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mala hierba de darnel»; tradicionalmente, «cizaña».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφετε
  english_pob_choice: Let
  chosen_spanish: Dejen que
  alternatives_spanish:
  - Permitan que
  - Dejen
  lexicon: BDAG
  rationale: 'El imperativo de ἀφίημι aquí tiene valor permisivo: dejar/permitir. «Dejen que» comunica esa concesión de modo natural en español y conserva el mandato directo.'
- source_word: συναυξάνεσθαι
  english_pob_choice: grow together
  chosen_spanish: crezcan juntos
  alternatives_spanish:
  - crezcan juntamente
  - crezcan a la vez
  lexicon: BDAG
  rationale: El compuesto expresa crecimiento conjunto. «Crezcan juntos» mantiene la idea del σύν- sin sonar forzado en español.
- source_word: ἀμφότερα
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: BDAG
  rationale: Se refiere a los dos cultivos mencionados. «Ambos» es la forma más natural y precisa en español.
- source_word: μέχρι τοῦ θερισμοῦ
  english_pob_choice: until the harvest
  chosen_spanish: hasta la cosecha
  alternatives_spanish:
  - hasta la siega
  - hasta la recolección
  lexicon: BDAG
  rationale: θερισμός aquí alude a la cosecha/siega como evento definido. «Cosecha» es clara y digna en español, y funciona bien en el marco agrícola de la parábola.
- source_word: ἐν καιρῷ τοῦ θερισμοῦ
  english_pob_choice: at the time of harvest
  chosen_spanish: en el tiempo de la cosecha
  alternatives_spanish:
  - cuando llegue la cosecha
  - a su debido tiempo en la cosecha
  lexicon: BDAG
  rationale: καιρός señala el momento oportuno o señalado. «En el tiempo de la cosecha» conserva con bastante fidelidad la estructura y el matiz temporal del griego.
- source_word: θερισταῖς
  english_pob_choice: the reapers
  chosen_spanish: a los segadores
  alternatives_spanish:
  - a los cosechadores
  lexicon: BDAG
  rationale: θερισταί son quienes segan. «Segadores» es el término agrícola más exacto y tradicional en español.
- source_word: Συλλέξατε
  english_pob_choice: collect
  chosen_spanish: Reúnan
  alternatives_spanish:
  - Recojan
  - Junten
  lexicon: BDAG
  rationale: El verbo implica recoger juntos. «Reúnan» expresa la acción sin repetir innecesariamente el matiz de otro verbo posterior y suena natural en el mandato.
- source_word: πρῶτον
  english_pob_choice: First
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes que nada
  lexicon: BDAG
  rationale: Marca secuencia. «Primero» es directo y fiel.
- source_word: τὰ ζιζάνια
  english_pob_choice: the weeds
  chosen_spanish: la cizaña
  alternatives_spanish:
  - las malas hierbas
  - la mala hierba
  lexicon: BDAG
  rationale: ζιζάνια designa la mala hierba concreta de la parábola, tradicionalmente identificada como cizaña/darnel. «Cizaña» preserva la referencia parabolística establecida en español y evita una generalización excesiva.
- source_word: δήσατε
  english_pob_choice: tie
  chosen_spanish: átenla
  alternatives_spanish:
  - átenlas
  - atiénlan
  lexicon: BDAG
  rationale: 'El verbo es literal: atar. En español, «átenla» concuerda con «la cizaña» y mantiene la imagen concreta.'
- source_word: εἰς δέσμας
  english_pob_choice: into bundles
  chosen_spanish: en haces
  alternatives_spanish:
  - en manojos
  - en gavillas
  lexicon: BDAG
  rationale: δέσμη es haz, atado o gavilla. «Haces» es compacto y agrícola; además mantiene una forma tradicional y comprensible sin añadir un matiz más específico que el griego.
- source_word: πρὸς τὸ κατακαῦσαι αὐτά
  english_pob_choice: to burn them
  chosen_spanish: para quemarla
  alternatives_spanish:
  - para quemarlos
  - a fin de quemarla
  lexicon: BDAG
  rationale: La construcción expresa finalidad. Opto por «para quemarla» para reflejar el referente colectivo inmediato («la cizaña»). No se intensifica a «quemarla por completo» para no resolver el alcance del verbo más allá de lo que el texto dice.
- source_word: τὸν δὲ σῖτον
  english_pob_choice: but gather the wheat
  chosen_spanish: pero reúnan el trigo
  alternatives_spanish:
  - pero el trigo
  - mas reúnan el trigo
  lexicon: BDAG
  rationale: σῖτος aquí es trigo en contraste con la cizaña. El adversativo δέ se expresa con «pero», y el verbo se suministra de manera natural desde el contexto.
- source_word: συναγάγετε
  english_pob_choice: gather
  chosen_spanish: reúnan
  alternatives_spanish:
  - junten
  - acopien
  lexicon: BDAG
  rationale: συνάγω es reunir/juntar. «Reúnan» mantiene el contraste con el anterior «Reúnan» de forma estilística aceptable y comunica la acción de recoger hacia un lugar.
- source_word: ἀποθήκην μου
  english_pob_choice: my storehouse
  chosen_spanish: mi granero
  alternatives_spanish:
  - mi almacén
  - mi depósito
  lexicon: BDAG
  rationale: ἀποθήκη es un lugar de almacenamiento, y en el contexto agrícola puede entenderse como granero. «Granero» es la imagen más natural para el lector español sin estrechar indebidamente el término.
theological_decisions:
- issue: Imagen parabólica y separación final
  english_pob_reading: Retain the agricultural imagery without making the eschatological interpretation explicit in the translation.
  chosen_spanish_reading: Mantener la imagen agrícola sin explicitar en la traducción la aplicación escatológica o judicial.
  alternative_spanish_readings:
  - «para destruirla»
  - «para quemarla por completo»
  - «para condenarla»
  rationale: La parábola todavía presenta la escena como imagen; forzar el sentido hacia la explicación posterior desplaza el nivel narrativo del versículo. La redacción española conserva la tensión interpretativa y deja que el contexto posterior aclare el alcance.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: La redacción española sigue el pasaje revisado del inglés POB, especialmente la precisión temporal de ἐν καιρῷ τοῦ θερισμοῦ como «en el tiempo de la cosecha». También se preservó la separación entre la orden de dejar crecer ambos y la instrucción posterior a los segadores, sin introducir una paráfrasis escatológica.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - 'Se mantiene la distinción entre verbos de reunión: «crezcan juntos» para συναυξάνεσθαι, «reúnan» para συλλέξατε y συναγάγετε.'
  - «Cizaña» se usa como término parabolístico estable en español; la nota aclara la alternativa léxica.
  - «Granero» preserva la imagen de almacenamiento agrícola de ἀποθήκη sin sobredeterminarla.
