revisions:
- from: 'Dejen que ambos crezcan juntos hasta la cosecha[a], y en el tiempo de la cosecha les diré a los segadores: “Reúnan primero la cizaña y átenla en haces para quemarla; pero reúnan el trigo en mi granero”'
  to: 'Dejen que ambos crezcan juntos hasta la cosecha[a], y en el tiempo de la cosecha les diré a los segadores: «Junten primero la cizaña y átenla en haces para quemarla; pero reúnan el trigo en mi almacén»'
  rationale: Se corrige la nota al pie para que ofrezca una alternativa real y no repita el término del texto principal. Se cambia «mi granero» por «mi almacén» para reflejar mejor la amplitud de ἀποθήκη según la justificación auditada. También se ajusta el primer imperativo a «Junten» para distinguirlo del posterior «reúnan», en línea con la diferenciación de verbos del griego y del English POB. No se requiere adjudicación adicional porque son reparaciones menores y claras.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:13:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mandato permisivo, crecimiento conjunto hasta la cosecha, instrucción futura a los segadores, prioridad de recoger la cizaña, atarla en manojos/haces para quemarla, y reunir el trigo en el lugar de almacenamiento. Sin embargo, la nota al pie está invertida respecto a la decisión léxica documentada: el texto principal usa «cizaña», por lo que la nota no puede decir «O ‘cizaña’». Además, «mi granero» estrecha un poco ἀποθήκη frente al audit trail, que prefirió un término más amplio equivalente a “storehouse”; en español «mi almacén» o «mi depósito» preserva mejor esa amplitud sin perder naturalidad.'
  spanish_quality_summary: 'El español es claro, digno y mayormente natural. «Dejen que ambos crezcan juntos» y «en el tiempo de la cosecha» funcionan bien. «Segadores» es adecuado. Hay dos detalles de calidad: la repetición de «reúnan» para Συλλέξατε y συναγάγετε no es grave, pero «junten/recogan» seguido de «reúnan» distinguiría mejor los verbos; y la nota léxica actual resulta confusa para el lector. El ajuste principal necesario es corregir la nota y, por fidelidad al rationale, preferir «almacén» sobre «granero».'
  glossary_alignment: No hay términos del glosario mayor (Yahvé, Mesías, etc.) en este versículo. La decisión «cizaña» es totalmente defendible en español bíblico y está bien justificada, siempre que la nota preserve la alternativa correctamente. «Mi almacén» se alinea mejor con la decisión inglesa documentada para ἀποθήκην μου que «mi granero».
  issues:
  - severity: medium
    issue: La nota al pie contradice el texto principal y la decisión léxica.
    rationale: El texto principal ya usa «cizaña», así que la nota «O ‘cizaña’» es errónea. La alternativa debe presentar otra posibilidad, por ejemplo «mala hierba de darnel» o «mala hierba; tradicionalmente, ‘cizaña’», según la elección del texto principal.
  - severity: medium
    issue: «Mi granero» estrecha más de lo debido el sentido de ἀποθήκην μου.
    rationale: El audit trail inglés justificó ‘storehouse’ para no limitar el término a un granero específico. En español, «mi almacén» conserva mejor la amplitud semántica del griego y sigue siendo natural en el contexto agrícola.
  - severity: low
    issue: La distinción entre Συλλέξατε y συναγάγετε podría expresarse mejor en español.
    rationale: Usar «reúnan» para ambos verbos no falsifica el sentido, pero borra una leve diferencia estilística que el inglés procuró mantener. Un cambio a «Junten primero… pero reúnan…» o «Recogan primero… pero reúnan…» mejora la correspondencia.
  revised_spanish_text: 'Dejen que ambos crezcan juntos hasta la cosecha[a], y en el tiempo de la cosecha les diré a los segadores: «Junten primero la cizaña y átenla en haces para quemarla; pero reúnan el trigo en mi almacén»'
  revised_footnotes:
