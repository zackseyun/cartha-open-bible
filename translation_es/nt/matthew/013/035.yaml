review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del griego: conserva la fórmula de cumplimiento, la mediación profética, la cita en futuro y la lectura breve ἀπὸ καταβολῆς sin añadir «del mundo» al texto principal, con variante textual en nota. Sin embargo, hay un problema de anclaje de nota y un pequeño ajuste estilístico recomendable en la frase temporal.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico moderno y digno. «Por medio del profeta» y «Abriré mi boca en parábolas» funcionan bien. «Declararé cosas escondidas» es aceptable, aunque algo menos poético que «proclamaré» o «diré». El mayor problema formal es que el marcador [a] está puesto después de «fundación» en vez de anclar la variante a toda la frase pertinente; además, «desde la fundación» suena algo incompleto en español sin complemento expreso, por lo que conviene explicitar que la nota cubre la lectura tradicional más completa mientras el texto principal mantiene la brevedad del griego.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, esclavo, etc. La decisión de mantener «desde la fundación» en el texto principal concuerda con la racionalidad léxico-textual documentada; la variante «del mundo» debe mantenerse solo en nota.
  issues:
  - severity: medium
    issue: El marcador de nota [a] no está anclado de la manera más clara al segmento variante.
    rationale: La nota textual trata la lectura alternativa «desde la fundación del mundo», así que conviene colocar [a] junto a toda la frase temporal pertinente, no de forma suelta tras «fundación», para evitar ambigüedad de alcance.
  - severity: low
    issue: La expresión «desde la fundación» resulta algo rígida o truncada en español.
    rationale: Aunque refleja fielmente la brevedad del griego, en español suena menos natural que en inglés o griego. Mantenerla es defendible por fidelidad textual, pero una puntuación/anclaje más claro ayuda a la lectura sin añadir «del mundo» al texto principal.
  revised_spanish_text: 'de modo que se cumpliera lo que fue dicho por medio del profeta, cuando dijo: «Abriré mi boca en parábolas; declararé cosas escondidas desde la fundación[a].»'
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos leen «desde la fundación del mundo».
    reason: textual_variant
  revision_rationale: Se corrige el anclaje de la nota textual para que corresponda claramente a la frase variante y se hace un ajuste menor de fluidez/formulación formulaica con «se cumpliera» y «cuando dijo», ambos naturales en español y plenamente fieles al sentido del griego en contexto mateano.
