translation:
  language: es
  text: 'de modo que se cumpliera lo que fue dicho por medio del profeta, cuando dijo: «Abriré mi boca en parábolas; declararé cosas escondidas desde la fundación[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «desde la fundación del mundo».
    reason: textual_variant
lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - para que
  - así que
  lexicon: BDAG
  rationale: Expresa la relación de propósito/resultado de ὅπως de manera natural en español y mantiene el enlace con la fórmula de cumplimiento.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpla
  alternatives_spanish:
  - sea cumplido
  - llegue a cumplirse
  lexicon: BDAG
  rationale: En español, la pasiva del subjuntivo suena más pesada aquí; 'se cumpla' conserva la idea de cumplimiento sin perder fluidez ni la fuerza formulaica de Mateo.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que fue dicho
  alternatives_spanish:
  - lo dicho
  - lo que se habló
  lexicon: BDAG
  rationale: Reproduce el participio articular de forma idiomática y directa; 'dicho' conserva el carácter de una palabra pronunciada o enunciada.
- source_word: διὰ τοῦ προφήτου
  english_pob_choice: through the prophet
  chosen_spanish: por medio del profeta
  alternatives_spanish:
  - por el profeta
  - a través del profeta
  lexicon: BDAG
  rationale: '''Por medio de'' expresa bien la mediación instrumental de διά con genitivo y suena claro en español bíblico contemporáneo.'
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - al decir
  lexicon: BDAG
  rationale: Mantiene la introducción cita-textual de forma estándar y transparente.
- source_word: Ἀνοίξω
  english_pob_choice: I will open
  chosen_spanish: Abriré
  alternatives_spanish:
  - Yo abriré
  lexicon: BDAG
  rationale: Futuro simple natural en español; conserva el valor directo del verbo sin añadir énfasis innecesario.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - con parábolas
  lexicon: BDAG
  rationale: Preserva la preposición y el término técnico de enseñanza de Jesús sin desplazar su sentido a un mero instrumento.
- source_word: στόμα μου
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca
  lexicon: BDAG
  rationale: Correspondencia literal y natural en español; mantiene el tono poético de la cita.
- source_word: ἐρεύξομαι
  english_pob_choice: I will utter
  chosen_spanish: declararé
  alternatives_spanish:
  - proferiré
  - diré
  lexicon: BDAG
  rationale: El verbo griego sugiere sacar o emitir palabras en forma solemne. 'Declararé' comunica esa emisión verbal en español moderno sin caer en arcaísmo como 'proferiré'.
- source_word: κεκρυμμένα
  english_pob_choice: things hidden
  chosen_spanish: cosas escondidas
  alternatives_spanish:
  - cosas ocultas
  - cosas guardadas en secreto
  lexicon: BDAG
  rationale: '''Escondidas'' reproduce la idea de algo ocultado de manera concreta y mantiene el tono poético. ''Ocultas'' también sería posible, pero ''escondidas'' armoniza mejor con el giro de la cita.'
- source_word: ἀπὸ καταβολῆς
  english_pob_choice: from the foundation
  chosen_spanish: desde la fundación
  alternatives_spanish:
  - desde el comienzo
  - desde la fundación del mundo
  lexicon: BDAG
  rationale: El texto griego dado dice solo 'desde la fundación', sin añadir 'del mundo'. La traducción principal respeta esa forma breve; la lectura tradicional más completa se conserva en nota.
theological_decisions:
- issue: Fórmula de cumplimiento y mediación profética
  english_pob_reading: so that what was spoken through the prophet might be fulfilled
  chosen_spanish_reading: de modo que se cumpla lo que fue dicho por medio del profeta
  alternative_spanish_readings:
  - para que se cumpla lo que fue dicho por el profeta
  - de modo que se cumpla lo dicho por el profeta
  rationale: La frase conserva la estructura de cumplimiento característica de Mateo y la mediación profética sin introducir identificación adicional del profeta, que el texto griego no especifica aquí.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Alcance de ἀπὸ καταβολῆς
  english_pob_reading: from the foundation
  chosen_spanish_reading: desde la fundación
  alternative_spanish_readings:
  - desde la fundación del mundo
  - desde el principio
  rationale: El texto base no contiene κόσμου ('del mundo'), así que no debe incorporarse al cuerpo principal. Dado que la lectura tradicional más amplia existe en la tradición textual, se registra como variante en nota sin fusionarla al texto principal.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El audit trail inglés primero tradujo ἀπὸ καταβολῆς como “from the foundation”, y luego fue revisado a “from the foundation of the world” por una lectura idiomática y tradicional. Para el español, se siguió el texto griego base sin añadir «del mundo» en el cuerpo principal, pero se preservó la variante tradicional en nota, ya que el testimonio base no la contiene.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; aquí no aparece ningún tetragrámaton ni cita explícita del nombre divino.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se mantuvo «parábolas» y un registro bíblico contemporáneo, evitando arcaísmos innecesarios.
  - La nota [a] se ancla en «fundación» para reflejar la variante textual sobre el alcance de ἀπὸ καταβολῆς.
