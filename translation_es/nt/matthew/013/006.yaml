lexical_decisions:
- source_word: ἡλίου δὲ ἀνατείλαντος
  english_pob_choice: But when the sun rose
  chosen_spanish: Pero cuando salió el sol
  alternatives_spanish:
  - Y cuando salió el sol
  - Pero cuando el sol había salido
  lexicon: SBLGNT; BDAG
  rationale: El genitivo absoluto indica circunstancia temporal. «Salió el sol» es la forma natural y fiel en español; conserva el valor temporal y el matiz continuativo de δέ con «Pero».
- source_word: ἐκαυματίσθη
  english_pob_choice: it was scorched
  chosen_spanish: se quemó
  alternatives_spanish:
  - fue quemado
  - se chamuscó
  - se tostó
  lexicon: BDAG
  rationale: El pasivo de καυματίζω expresa daño por calor. En español, «se quemó» transmite bien la imagen agrícola sin forzar un tecnicismo ni exagerar el grado de destrucción.
- source_word: διὰ τὸ μὴ ἔχειν
  english_pob_choice: because it had no
  chosen_spanish: por no tener
  alternatives_spanish:
  - porque no tenía
  - a causa de no tener
  lexicon: BDAG
  rationale: διά + infinitivo articular expresa causa. «Por no tener» conserva la causalidad de forma compacta y natural en español.
- source_word: ῥίζαν
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - raíces
  lexicon: BDAG
  rationale: El singular griego se mantiene como singular en español. «Raíz» comunica la falta de arraigo necesaria para la imagen de la parábola.
- source_word: ἐξηράνθη
  english_pob_choice: it withered away
  chosen_spanish: se secó
  alternatives_spanish:
  - se marchitó
  - se secó por completo
  - se agostó
  lexicon: BDAG
  rationale: El verbo ξηραίνω en contexto vegetal puede significar secarse o marchitarse. «Se secó» es sobrio, natural y suficientemente amplio para abarcar el resultado en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y el trazado auditado en inglés, manteniendo el contraste temporal, la imagen de calor solar, la causalidad explícita y la metáfora vegetal sin añadir interpretación no sustentada. No se documentan revisiones textuales o variantes que alteren el sentido básico.
  spanish_consistency_notes:
  - Se preserva la cadencia breve y narrativa del versículo.
  - Se evita el calco excesivo en favor de una construcción idiomática española.
  - «Sol» y «raíz» mantienen la imaginería agrícola literal de la parábola.
  - La nota de pie conserva la alternativa léxica principal que en inglés se expresó como 'it dried up'.
