review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: circunstancia temporal («cuando salió el sol»), efecto del calor, causa («por no tener raíz») y resultado final. Sin embargo, la nota al pie está anclada en «sol[a]», pero la alternativa inglesa «Or ''it dried up.''» corresponde a ἐξηράνθη, no a ἡλίου δὲ ἀνατείλαντος. Además, en español «se quemó» puede sonar un poco más fuerte o más absoluto que «fue abrasado / se abrasó» para imagen agrícola.'
  spanish_quality_summary: El español es natural y legible. «Pero cuando salió el sol … por no tener raíz, se secó» fluye bien. La mejora principal es usar un verbo más propio del contexto vegetal para ἐκαυματίσθη y mover la nota al lugar correcto para evitar ambigüedad editorial.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Raíz» preserva bien ῥίζαν. La revisión propuesta mantiene fidelidad léxica y mejor adecuación al campo semántico agrícola.
  issues:
  - severity: high
    issue: La nota al pie está colocada en el segmento equivocado.
    rationale: La nota inglesa «Or 'it dried up.'» explica ἐξηράνθη, pero en el borrador el marcador [a] aparece en «sol[a]». Esto desinforma al lector sobre qué palabra tiene la alternativa léxica.
  - severity: medium
    issue: «Se quemó» para ἐκαυματίσθη puede sonar menos preciso en contexto agrícola.
    rationale: El griego describe ser abrasado por el calor del sol; «se abrasó» o «fue abrasado» encaja mejor con plantas y evita la impresión de combustión literal.
  revised_spanish_text: Pero cuando salió el sol, se abrasó, y por no tener raíz, se secó[a].
