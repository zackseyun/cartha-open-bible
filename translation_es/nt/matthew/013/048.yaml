    rationale: La nota sobre 'vasijas/vasos' debe anclarse en 'recipientes', y la de 'los malos' debe anclarse en 'podridos'. El texto actual ya pone [a] tras 'llenó' y [b] tras 'recipientes', lo que no corresponde a las decisiones auditadas.
  revised_spanish_text: Cuando se llenó, la arrastraron hasta la orilla, se sentaron y recogieron los buenos en recipientes[a], pero echaron fuera los podridos[b].
