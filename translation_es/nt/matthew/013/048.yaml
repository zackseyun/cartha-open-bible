translation:
  language: es
  text: Cuando se llenó, la arrastraron hasta la orilla, se sentaron y recogieron los buenos en recipientes[a], pero echaron fuera los podridos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vasijas' o 'vasos'. El término griego es genérico y no necesariamente significa canastas.
    reason: lexical_alternative
  - marker: b
    text: O 'los malos'. El griego puede significar 'podridos', 'descompuestos' o, más ampliamente, 'inútiles' o 'malos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἣν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  - la red
  lexicon: BDAG
  rationale: El referente inmediato es la red de la parábola; en español, el pronombre átono femenino 'la' es natural y mantiene la referencia sin repetir 'red' innecesariamente.
- source_word: ἐπληρώθη
  english_pob_choice: was filled
  chosen_spanish: se llenó
  alternatives_spanish:
  - estuvo llena
  - fue llenada
  lexicon: BDAG
  rationale: El pasivo aoristo expresa que la red llegó a estar llena; 'se llenó' es la forma más natural y directa en español.
- source_word: ἀναβιβάσαντες
  english_pob_choice: pulled it up
  chosen_spanish: la arrastraron hasta
  alternatives_spanish:
  - la izaron hasta
  - la subieron hasta
  lexicon: BDAG
  rationale: El participio describe sacar la red del agua hacia tierra. 'Arrastraron' comunica el esfuerzo de tracción sin sonar excesivamente técnico; 'la' conserva el referente de la red.
- source_word: ἐπὶ τὸν αἰγιαλόν
  english_pob_choice: onto the shore
  chosen_spanish: la orilla
  alternatives_spanish:
  - la playa
  - la costa
  lexicon: BDAG
  rationale: αἰγιαλός puede significar orilla o playa. 'La orilla' es amplio, preciso y no introduce una imagen más específica de la que el griego garantiza.
- source_word: καθίσαντες
  english_pob_choice: sat down
  chosen_spanish: se sentaron
  alternatives_spanish:
  - se sentaron a clasificar
  - se acomodaron
  lexicon: BDAG
  rationale: El aoristo participial marca una acción sucesiva; 'se sentaron' conserva el orden narrativo sin añadir interpretación.
- source_word: συνέλεξαν
  english_pob_choice: gathered
  chosen_spanish: recogieron
  alternatives_spanish:
  - juntaron
  - reunieron
  lexicon: BDAG
  rationale: El verbo implica reunir o recoger. 'Recogieron' funciona de modo natural en un contexto de pesca y clasificación.
- source_word: τὰ καλὰ
  english_pob_choice: the good fish
  chosen_spanish: lo bueno
  alternatives_spanish:
  - los buenos
  - los peces buenos
  lexicon: BDAG
  rationale: En español, 'lo bueno' conserva la sustantivación del adjetivo griego sin añadir 'peces', que el texto no expresa explícitamente. Mantiene también la amplitud evaluativa del término.
- source_word: εἰς ἄγγη
  english_pob_choice: into containers
  chosen_spanish: en recipientes
  alternatives_spanish:
  - en vasos
  - en contenedores
  lexicon: BDAG
  rationale: ἄγγος es un término genérico para recipiente o vasija. 'Recipientes' es neutral y suficientemente amplio, evitando especificar 'canastas' o 'vasos' sin base textual.
- source_word: τὰ δὲ σαπρά
  english_pob_choice: the rotten ones
  chosen_spanish: lo malo
  alternatives_spanish:
  - los podridos
  - los malos
  lexicon: BDAG
  rationale: σαπρός puede significar podrido, descompuesto, inútil o malo. Para evitar una concreción física excesiva en español y porque el contraste funciona como cualitativo en la escena, se traduce 'lo malo'; la nota preserva la alternativa más concreta.
- source_word: ἔξω ἔβαλον
  english_pob_choice: threw ... out
  chosen_spanish: lo echaron fuera
  alternatives_spanish:
  - lo arrojaron afuera
  - lo tiraron fuera
  lexicon: BDAG
  rationale: La combinación verbal expresa expulsar o tirar afuera. 'Echaron fuera' es idiomático y reproduce con claridad la separación/rechazo del material no aprovechable.
theological_decisions:
- issue: Nivel de interpretación en la imagen de la pesca
  english_pob_reading: Render the verse concretely as a fishing scene without importing the later allegorical explanation into the translation itself.
  chosen_spanish_reading: Mantener la escena concreta de pesca y selección, sin adelantar la explicación alegórica posterior.
  alternative_spanish_readings:
  - traducir de forma abiertamente alegórica como prefiguración del juicio final
  - introducir términos interpretativos como 'los justos' y 'los malos'
  rationale: El verso presenta la imagen; la interpretación viene después. Por eso conviene no cargar la traducción con una lectura teológica que el propio versículo aún no formula. Así se preserva la tensión literaria y exegética del texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del griego de SBLGNT y la auditoría inglesa: mantiene la secuencia narrativa, el carácter genérico de ἄγγη y la ambigüedad evaluativa de σαπρά, sin anticipar la explicación alegórica del pasaje siguiente. No se detectan revisiones aplicadas en el expediente más reciente.'
  spanish_consistency_notes:
  - Se evitó 'Cristo'/'Mesías' porque el versículo no contiene esa referencia.
  - Se usó 'la' para la red por coherencia con el referente implícito femenino en español.
  - '''Recipientes'' conserva el campo semántico amplio de ἄγγη, sin especificar canastas.'
  - '''Lo bueno'' y ''lo malo'' mantienen la sustantivación griega y dejan abierta la textura evaluativa del contraste.'
