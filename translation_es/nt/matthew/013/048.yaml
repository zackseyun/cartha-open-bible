revisions:
- from: Cuando se llenó[a], la arrastraron hasta la orilla, se sentaron y recogieron lo bueno en recipientes[b]; pero lo malo lo echaron fuera.
  to: Cuando se llenó, la arrastraron hasta la orilla, se sentaron y recogieron los buenos en recipientes[a], pero echaron fuera los podridos[b].
  rationale: 'La revisión conserva la estructura y naturalidad del borrador, pero restituye mejor el carácter concreto de la escena y el contraste léxico del griego: τὰ καλὰ / τὰ σαπρά se expresa de forma más idiomática y menos abstracta como ''los buenos ... los podridos''. Además, las notas se reubican para que sus marcadores correspondan exactamente a los términos que explican, en línea con el rastro de auditoría del POB inglés.'
