base_translation:
  language: en
  yaml_path: translation/nt/matthew/013/023.yaml
  text: But the one sown on the good soil—this is the one who hears the word and understands it[a], who indeed bears fruit and produces, in one case a hundred, in another sixty[b], and in another thirty.
