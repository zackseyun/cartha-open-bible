    text: 'Lit.: «uno cien, uno sesenta y uno treinta»; es decir, rendimientos variables de la cosecha. Muchas versiones lo expresan como «ciento por uno... sesenta... treinta».'
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva más de cerca la estructura del griego y el rastro de decisiones del POB: mantiene el participio sustantivado («el sembrado...»), refleja el énfasis de δή con «en efecto» sin volver la frase acartonada, y reemplaza una distribución final poco natural por una formulación española clara que sigue distinguiendo los rendimientos variables. También corrige la nota alternativa para que aporte una variante real y útil.'
