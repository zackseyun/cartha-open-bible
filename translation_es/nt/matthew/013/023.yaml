translation:
  language: es
  text: 'Pero el sembrado en la buena tierra[a], este es el que oye la palabra y la entiende, y en efecto da fruto y produce: en un caso cien, en otro sesenta[b] y en otro treinta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre la buena tierra»; también puede traducirse «en el buen suelo/terreno».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «uno cien, uno sesenta y uno treinta»; es decir, rendimientos variables de la cosecha. Muchas versiones lo expresan como «ciento por uno... sesenta... treinta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ τὴν καλὴν γῆν
  english_pob_choice: on the good soil
  chosen_spanish: en la buena tierra
  alternatives_spanish:
  - sobre la buena tierra
  - en el buen suelo
  lexicon: BDAG
  rationale: En el contexto agrícola de la parábola, γῆ puede referirse a tierra/suelo/terreno. «Tierra» es natural en español y conserva la imagen de la siembra; «buena» aquí sigue el valor de apta/fértil más que una cualidad moral. Se evitó «SEÑOR» u otro desplazamiento porque no corresponde al término.
- source_word: σπαρείς
  english_pob_choice: sown
  chosen_spanish: fue sembrado
  alternatives_spanish:
  - sembrado
  - habiendo sido sembrado
  lexicon: BDAG
  rationale: El participio aoristo pasivo describe al representado por la semilla. «Fue sembrado» mantiene la pasividad y suena natural en español, preservando la metáfora sin calcar la forma verbal inglesa.
- source_word: ὁ τὸν λόγον ἀκούων
  english_pob_choice: the one who hears the word
  chosen_spanish: el que oye la palabra
  alternatives_spanish:
  - el que escucha la palabra
  - el que oye el mensaje
  lexicon: BDAG
  rationale: «Oír» conserva bien el valor del presente participio como acción característica. «La palabra» mantiene la fórmula bíblica y el eco intertextual del λόγος, tal como en la auditoría inglesa.
- source_word: συνιείς
  english_pob_choice: understands it
  chosen_spanish: la entiende
  alternatives_spanish:
  - la comprende
  - la capta
  lexicon: BDAG
  rationale: συνίημι aquí expresa entender/percibir el sentido de la palabra oída. En español, el objeto directo femenino «la» retoma naturalmente «la palabra», evitando añadir explicaciones que el griego no explicita.
- source_word: δὴ
  english_pob_choice: indeed
  chosen_spanish: —
  alternatives_spanish:
  - en verdad
  - ciertamente
  - de hecho
  lexicon: BDAG
  rationale: El matiz enfático de δή es real, pero en español no requiere un marcador obligatorio para una lectura fluida. Se deja implícito para no sobrecargar la frase, aunque puede expresarse con adverbios si una revisión posterior lo requiere.
- source_word: καρποφορεῖ
  english_pob_choice: bears fruit
  chosen_spanish: da fruto
  alternatives_spanish:
  - lleva fruto
  - es fructífero
  lexicon: BDAG
  rationale: «Dar fruto» es una equivalencia idiomática y bíblicamente clara en español, fiel a la imagen agrícola y discipular.
- source_word: ποιεῖ
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - rinde
  - da
  lexicon: BDAG
  rationale: Se conserva un segundo verbo distinto de καρποφορεῖ, como en el griego. «Produce» refleja la idea de rendimiento/cosecha sin reducir la duplicación verbal del texto fuente.
- source_word: ὃ μὲν ἑκατὸν ὃ δὲ ἑξήκοντα ὃ δὲ τριάκοντα
  english_pob_choice: in one case a hundred, in another sixty, and in another thirty
  chosen_spanish: uno a ciento, otro a sesenta y otro a treinta
  alternatives_spanish:
  - uno al ciento, otro al sesenta y otro al treinta
  - uno de cien, otro de sesenta y otro de treinta
  lexicon: BDAG
  rationale: La construcción distributiva griega marca rendimientos variados. En español, «uno a ciento, otro a sesenta y otro a treinta» conserva la distribución y evita introducir un «-fold» que no está explícito en el texto. La puntuación puede leerse como enumeración de rendimientos.
theological_decisions:
- issue: Relación entre oír, entender y fructificar en la parábola
  english_pob_reading: 'The verse is rendered descriptively: the good-soil hearer hears, understands, and bears fruit in varying measure.'
  chosen_spanish_reading: La versión describe de forma directa al que oye, entiende y da fruto; no explicita categorías doctrinales posteriores.
  alternative_spanish_readings:
  - Podría leerse con énfasis en la perseverancia o en señales de conversión auténtica.
  - 'Podría sonar más interpretativo: el que oye con fe y persevera da fruto.'
  rationale: El griego subraya las acciones descritas en la parábola. La traducción conserva esas categorías sin importar conclusiones doctrinales que no están lexicalmente presentes en el versículo.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se detectaron cambios necesarios respecto del texto fuente ni del criterio óptimo de equivalencia del POB inglés. Se preservó la distribución numérica y la doble acción verbal del griego.'
  spanish_consistency_notes:
  - Se mantiene «palabra» para λόγος, en coherencia con el POB inglés y con el uso bíblico habitual.
  - Se usa «buena tierra» como equivalencia agrícola natural; no se moraliza el adjetivo «buena».
  - Se conserva la diferencia entre «da fruto» y «produce» para reflejar καρποφορεῖ y ποιεῖ como dos verbos distintos.
  - La nota numérica aclara que el griego no expresa explícitamente «a hundredfold» en la forma inglesa, sino una distribución de rendimientos.
  - No se introduce terminología doctrinal no presente en el texto base.
