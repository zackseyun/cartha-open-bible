  to: 'Y al llegar a su pueblo natal[a], les enseñaba en su sinagoga, de modo que ellos se asombraban y decían: «¿De dónde saca este hombre esta sabiduría y estos poderes?»'
  rationale: Se reemplaza 'patria' por 'pueblo natal' para reflejar con claridad el sentido local de πατρίδα conforme a la evidencia griega y a la decisión léxica del POB ('hometown'). Se conserva 'poderes' por fidelidad a δυνάμεις y 'este hombre' por el matiz de distancia de τούτῳ. También se corrige el uso del marcador de nota para que aparezca una sola vez y coincida exactamente con la nota correspondiente.
