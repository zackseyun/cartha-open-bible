translation:
  language: es
  text: 'Y al llegar a su pueblo natal[a], les enseñaba en su sinagoga, de modo que ellos se asombraban y decían: «¿De dónde saca este hombre esta sabiduría y estos poderes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su tierra natal»; aquí πατρίδα designa el lugar de origen y pertenencia local de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: πατρίδα
  english_pob_choice: hometown
  chosen_spanish: patria
  alternatives_spanish:
  - pueblo natal
  - lugar de origen
  - tierra natal
  lexicon: BDAG
  rationale: En este contexto narrativo, πατρίς/patrida designa el lugar de procedencia y pertenencia local de Jesús. 'Patria' conserva la idea de tierra propia o lugar natal sin reducirla a una nación-estado; 'pueblo natal' sería más explicativo pero menos compacto.
- source_word: ἐδίδασκεν
  english_pob_choice: was teaching
  chosen_spanish: les enseñaba
  alternatives_spanish:
  - les estaba enseñando
  - enseñaba
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso en pasado. 'Les enseñaba' comunica bien esa continuidad en español, con naturalidad y sin perder el matiz aspectual.
- source_word: συναγωγῇ
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En este marco judío, 'sinagoga' es la equivalencia clara y estándar para el lugar de reunión religioso.
- source_word: ὥστε ἐκπλήσσεσθαι αὐτοὺς καὶ λέγειν
  english_pob_choice: so that they were astonished and said
  chosen_spanish: de modo que ellos se asombraban y decían
  alternatives_spanish:
  - de manera que quedaban asombrados y decían
  - así que se asombraban y decían
  lexicon: BDAG
  rationale: ὥστε introduce resultado; en español, 'de modo que' preserva bien la relación de consecuencia. 'Se asombraban' refleja ἐκπλήσσομαι de manera directa y suficientemente fuerte.
- source_word: Πόθεν
  english_pob_choice: Where did ... get
  chosen_spanish: ¿De dónde saca...
  alternatives_spanish:
  - ¿De dónde obtuvo...
  - ¿De dónde tiene...
  lexicon: BDAG
  rationale: Πόθεν pregunta por origen o fuente. '¿De dónde saca...?' suena natural en el discurso y conserva la idea de procedencia de la sabiduría y los poderes.
- source_word: τούτῳ
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - éste
  - este
  lexicon: BDAG
  rationale: El demostrativo dativo tiene tono algo distanciador. 'Este hombre' reproduce esa referencia despectiva o al menos marcadamente externa, mejor que una forma más neutra.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: BDAG
  rationale: '''Sabiduría'' es la equivalencia directa y adecuada para σοφία en este contexto de enseñanza y autoridad reconocida.'
- source_word: δυνάμεις
  english_pob_choice: powers
  chosen_spanish: poderes
  alternatives_spanish:
  - obras poderosas
  - milagros
  lexicon: BDAG
  rationale: δύναμις en plural puede referirse a actos de poder o a obras portentosas por metonimia. 'Poderes' conserva la fuerza léxica más cercana al griego y mantiene abierta la referencia, sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Alcance de αἱ δυνάμεις en labios de la multitud
  english_pob_reading: powers
  chosen_spanish_reading: poderes
  alternative_spanish_readings:
  - obras poderosas
  - milagros
  rationale: El versículo registra la sorpresa por la sabiduría y la actividad poderosa de Jesús sin definir una categoría técnica de 'milagros'. 'Poderes' preserva el nivel léxico del griego y deja que el contexto determine la referencia a obras extraordinarias.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Matiz de distancia en τούτῳ
  english_pob_reading: this man
  chosen_spanish_reading: este hombre
  alternative_spanish_readings:
  - este
  - éste
  rationale: La forma española mantiene el tono de distancia perceptible en el griego sin añadir burla explícita que el texto no exige. Esto respeta el registro de la multitud en la escena.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: Se corrigió la anclaje de la nota al incorporar [a] en el texto en ambos lugares pertinentes, y se ajustó la puntuación para que la nota aparezca exactamente donde corresponde al término con alternativa léxica.
  spanish_consistency_notes:
  - Se mantuvo 'Jesús' implícito según el contexto, sin añadirlo porque el versículo usa un pronombre.
  - '''Sinagoga'' se conserva como término institucional judío.'
  - '''Poderes'' se eligió para δυνάμεις por coherencia con la POB inglesa y para evitar interpretar prematuramente como ''milagros''.'
  - La puntuación usa comillas angulares hispánicas para el discurso directo.
  - Se evitó 'SEÑOR' u otras mayúsculas teológicas porque no aparecen en este versículo.
