translation:
  language: es
  text: 'Él respondió[a]: «El que siembra la buena semilla es el Hijo del Hombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Ser Humano». La expresión griega es un título con resonancia de Daniel 7; se conserva aquí «el Hijo del Hombre» por su valor canónico y teológico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: He answered
  chosen_spanish: Él respondió
  alternatives_spanish:
  - respondió
  - él dijo
  - en respuesta, dijo
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona idiomáticamente como fórmula de introducción al discurso. En español, «respondió» comunica con naturalidad la función discursiva sin la redundancia de «respondiendo, dijo».
- source_word: Ὁ σπείρων
  english_pob_choice: The one who sows
  chosen_spanish: El que siembra
  alternatives_spanish:
  - el sembrador
  - quien siembra
  lexicon: BDAG
  rationale: El participio presente sustantivado identifica a la persona por su acción habitual o característica. «El que siembra» conserva bien ese valor y evita convertirlo demasiado pronto en un título nominal.
- source_word: τὸ καλὸν σπέρμα
  english_pob_choice: the good seed
  chosen_spanish: la buena semilla
  alternatives_spanish:
  - la semilla buena
  - la semilla buena y noble
  lexicon: BDAG
  rationale: καλός aquí señala lo bueno, apto o valioso, no solo lo bello. «Buena» es la correspondencia natural y fiel en español; «semilla» mantiene el singular colectivo del griego.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título cristológico establecido en los Evangelios. Aunque «el Humano» o «el Ser Humano» reflejan el sentido literal, «Hijo del Hombre» preserva mejor la resonancia canónica y de Daniel 7 que el POB documenta.
theological_decisions:
- issue: Título cristológico υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Humano
  - el Ser Humano
  rationale: En este contexto no se trata de una simple referencia genérica a un ser humano, sino de un título con peso apocalíptico y mesiánico. Mantener «el Hijo del Hombre» conserva esa carga intertextual y doctrinal.
  doctrine_reference: Afirmaciones; filosofía de traducción §2
translation_notes:
  revision_awareness: El contexto inglés no introdujo revisiones textuales ni cambios de última hora; el acuerdo entre revisores fue alto y no hubo objeciones. La redacción española sigue esa estabilidad, manteniendo las decisiones léxicas y teológicas principales con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Jesús en tercera persona singular con el pronombre explícito solo cuando ayuda a la fluidez.
  - «Hijo del Hombre» se conserva como título fijo y no se sustituye por una paráfrasis interpretativa en el texto principal.
  - La puntuación española coloca dos puntos antes de la cita directa y comillas angulares para un registro publicable y uniforme.
