review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: ἀμὴν γὰρ λέγω ὑμῖν = «en verdad les digo», πολλοὶ προφῆται καὶ δίκαιοι = «muchos profetas y personas justas», y mantiene correctamente implícitos los objetos de ver y oír. También conserva el paralelismo entre «ver/oír» y «no lo vieron/no lo oyeron».'
  spanish_quality_summary: 'El español es claro y digno, pero hay un punto de estilo importante: la puntuación con comas antes de «y no lo vieron» y antes de «y no lo oyeron», además del punto y coma intermedio, suena algo trabada y menos natural que una coordinación más fluida. También «desearon» es fiel pero algo más débil que el inglés auditado «longed» y que ἐπεθύμησαν en este contexto; «anhelaron» suena mejor en español bíblico contemporáneo sin perder naturalidad.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Personas justas» concuerda con la decisión auditada para δίκαιοι, y la nota alternativa «los justos» está bien justificada. No aparecen términos sensibles del glosario general que requieran ajuste.
  issues:
