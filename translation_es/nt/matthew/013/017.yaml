translation:
  language: es
  text: Porque en verdad les digo que muchos profetas y personas justas[a] anhelaron ver lo que ustedes ven y no lo vieron, y oír lo que ustedes oyen y no lo oyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los justos». El griego usa aquí un adjetivo sustantivado que significa personas justas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - amén
  lexicon: BDAG
  rationale: En la fórmula ἀμὴν γὰρ λέγω ὑμῖν, la fuerza es una solemne afirmación. «En verdad» expresa esa certeza con naturalidad en español sin conservar el préstamo litúrgico «amén» como si fuera un mero marcador ritual.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento. «Porque» comunica con claridad la relación justificativa con el dicho previo y suena natural en español bíblico contemporáneo.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: El giro formulaico se mantiene sin sobrecargar el español. El verbo en primera persona con clítico dativo expresa directamente el destinatario plural del griego.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de
  - numerosos
  lexicon: BDAG
  rationale: Adjetivo cuantitativo simple; «muchos» reproduce el valor básico sin artificio.
- source_word: προφῆται
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - profetas de Israel
  lexicon: BDAG
  rationale: Correspondencia directa con el sustantivo plural. No se añade especificación que el griego no exige en el versículo.
- source_word: δίκαιοι
  english_pob_choice: righteous people
  chosen_spanish: personas justas
  alternatives_spanish:
  - los justos
  - justos
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. «Personas justas» conserva la referencia a seres humanos y la fuerza moral/covenantal de δίκαιοι sin caer en una abstracción ni en un término eclesiástico más cargado.
- source_word: ἐπεθύμησαν
  english_pob_choice: longed
  chosen_spanish: desearon
  alternatives_spanish:
  - anhelaron
  - sintieron un gran deseo de
  lexicon: BDAG
  rationale: El verbo indica deseo intenso. «Desearon» es claro y fiel; «anhelaron» sería posible, pero puede sonar más afectivo que el griego en este contexto.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - ver con sus ojos
  lexicon: BDAG
  rationale: Infinitivo de propósito/complemento tras ἐπεθύμησαν. En español, el infinitivo simple «ver» preserva la estructura sin resultar forzado.
- source_word: ἃ βλέπετε
  english_pob_choice: what you see
  chosen_spanish: lo que ustedes ven
  alternatives_spanish:
  - lo que ven
  - las cosas que ustedes ven
  lexicon: BDAG
  rationale: La relativa con presente se vuelve naturalmente «lo que ustedes ven». Se conserva el presente para reflejar el contraste con el pasado de los profetas y justos.
- source_word: οὐκ εἶδαν
  english_pob_choice: did not see it
  chosen_spanish: no lo vieron
  alternatives_spanish:
  - no vieron eso
  - no llegaron a verlo
  lexicon: BDAG
  rationale: El aoristo negado expresa un hecho pasado completo. El pronombre «lo» retoma de forma natural el objeto implícito de «lo que ustedes ven».
- source_word: ἀκοῦσαι
  english_pob_choice: to hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  lexicon: BDAG
  rationale: Aquí el infinitivo paralelo a ἰδεῖν se refiere al acto de percibir auditivamente. «Oír» reproduce mejor la simetría del pasaje que «escuchar», que puede sugerir atención intencional.
- source_word: ἃ ἀκούετε
  english_pob_choice: what you hear
  chosen_spanish: lo que ustedes oyen
  alternatives_spanish:
  - lo que oyen
  - las cosas que ustedes oyen
  lexicon: BDAG
  rationale: Se mantiene el paralelo con «lo que ustedes ven». «Oyen» conserva el presente y el carácter directo de la percepción.
- source_word: οὐκ ἤκουσαν
  english_pob_choice: did not hear it
  chosen_spanish: no lo oyeron
  alternatives_spanish:
  - no lo escucharon
  - no llegaron a oírlo
  lexicon: BDAG
  rationale: Paralelo a «no lo vieron». «Oyeron» corresponde mejor a ἀκούω en este contexto de percepción sin añadir matiz volitivo.
theological_decisions:
- issue: Alcance de δίκαιοι
  english_pob_reading: Rendered as 'righteous people' alongside 'prophets' as a broader class beyond prophets alone.
  chosen_spanish_reading: «personas justas» junto a «profetas», como una clase amplia y no solo un título religioso técnico.
  alternative_spanish_readings:
  - «los justos»
  - «justos»
  rationale: El griego usa un adjetivo sustantivado en plural. «Personas justas» hace explícito que se trata de seres humanos fieles de generaciones anteriores, sin convertir la expresión en un tecnicismo eclesial ni perder la fuerza ética/covenantal del término.
  doctrine_reference: Translation philosophy §§5–6
- issue: Naturaleza de lo visto y oído
  english_pob_reading: Kept the objects implicit as 'what you see' and 'what you hear' without specifying Jesus, the kingdom, or messianic fulfillment in the main text.
  chosen_spanish_reading: 'Se mantiene la referencia implícita: «lo que ustedes ven» / «lo que ustedes oyen».'
  alternative_spanish_readings:
  - «al Mesías»
  - «los secretos del reino»
  - «la revelación del reino»
  rationale: El contexto apunta a la revelación en el ministerio de Jesús, pero el versículo no la nombra. La traducción conserva esa tensión, evitando resolver interpretativamente lo que el griego deja abierto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios, y la comprobación cruzada indicó alto acuerdo. Esta propuesta sigue la lectura inglesa auditada, pero ajusta el español para expresar de modo natural la solemnidad de ἀμὴν γὰρ λέγω ὑμῖν, el sustantivo plural δίκαιοι y la simetría verbal entre ver/oír.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene el registro formal y bíblico sin introducir explicaciones interpretativas no presentes en el texto.
  - Se preserva la paridad sintáctica entre «ver»/«oír» y sus negaciones para reflejar la estructura del griego.
