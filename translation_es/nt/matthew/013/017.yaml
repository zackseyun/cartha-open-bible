    issue: «desearon» atenúa ligeramente la fuerza de ἐπεθύμησαν
    rationale: El verbo griego expresa deseo intenso. Aunque «desearon» es posible, «anhelaron» comunica mejor la intensidad que el English POB fijó con «longed».
  - severity: low
    issue: Puntuación algo pesada en la coordinación paralela
    rationale: Las comas antes de «y no lo vieron / y no lo oyeron» y el punto y coma vuelven la frase menos fluida en español. El paralelismo se puede conservar con puntuación más natural sin cambiar el sentido.
  revised_spanish_text: Porque en verdad les digo que muchos profetas y personas justas[a] anhelaron ver lo que ustedes ven y no lo vieron, y oír lo que ustedes oyen y no lo oyeron.
  revised_footnotes:
  - marker: a
    text: O «los justos». El griego usa aquí un adjetivo sustantivado que significa personas justas.
    reason: lexical_alternative
  revision_rationale: 'Se propone una reparación menor: cambiar «desearon» por «anhelaron» para reflejar mejor la intensidad de ἐπεθύμησαν y alinear mejor con «longed» en la auditoría inglesa; además, se alisa la puntuación para un español más natural, manteniendo intacto el paralelismo y el sentido del griego.'
