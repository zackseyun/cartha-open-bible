  text: ὃ μικρότερον μέν ἐστιν πάντων τῶν σπερμάτων, ὅταν δὲ αὐξηθῇ μεῖζον τῶν λαχάνων ἐστὶν καὶ γίνεται δένδρον, ὥστε ἐλθεῖν τὰ πετεινὰ τοῦ οὐρανοῦ καὶ κατασκηνοῦν ἐν τοῖς κλάδοις αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/013/032.yaml
  text: It is indeed smaller than all the seeds[a], but when it has grown, it is larger than the garden plants and becomes a tree[b], so that the birds of the sky come and nest in its branches.
  footnotes:
  - marker: a
    text: Or 'the birds of the air,' a traditional rendering of τὰ πετεινὰ τοῦ οὐρανοῦ.
    reason: lexical_alternative
  - marker: b
    text: The imagery of birds lodging in the branches may echo Old Testament pictures of a great kingdom tree (for example, Ezekiel 17:23; Daniel 4:12), but the verse does not state the symbolism explicitly.
    reason: cross_reference
