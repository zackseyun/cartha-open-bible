translation:
  language: es
  text: Es, en verdad, menor que todas las semillas, pero cuando ha crecido, es mayor que las plantas del huerto y se convierte en árbol[b], de modo que las aves del cielo[a] vienen y anidan en sus ramas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aves del aire», un giro tradicional para τὰ πετεινὰ τοῦ οὐρανοῦ.
    reason: lexical_alternative
  - marker: b
    text: La imagen de aves que se alojan en las ramas puede evocar cuadros del Antiguo Testamento sobre un gran árbol de reino (por ejemplo, Ezequiel 17:23; Daniel 4:12), pero el versículo no lo declara explícitamente.
    reason: cross_reference
lexical_decisions:
- source_word: μικρότερον
  english_pob_choice: smaller
  chosen_spanish: menor
  alternatives_spanish:
  - más pequeño
  - más pequeño que
  lexicon: BDAG
  rationale: El comparativo griego se conserva con una forma comparativa natural en español. «Menor» evita convertirlo en superlativo y mantiene la relación de comparación con las semillas.
- source_word: πάντων τῶν σπερμάτων
  english_pob_choice: than all the seeds
  chosen_spanish: que todas las semillas
  alternatives_spanish:
  - que cualquier semilla
  - que todas las semillas
  lexicon: BDAG
  rationale: La comparación explícita del genitivo se expresa de manera directa y clara en español. «Semillas» conserva la amplitud del término sin especializarlo innecesariamente.
- source_word: μέν ... δέ
  english_pob_choice: indeed ... but
  chosen_spanish: en verdad ... pero
  alternatives_spanish:
  - ciertamente ... pero
  - por una parte ... pero
  lexicon: BDAG
  rationale: La pareja marca contraste discursivo entre pequeñez inicial y grandeza final. «En verdad ... pero» transmite esa tensión de forma natural en español.
- source_word: ὅταν ... αὐξηθῇ
  english_pob_choice: when it has grown
  chosen_spanish: cuando ha crecido
  alternatives_spanish:
  - cuando crece
  - cuando haya crecido
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ὅταν señala el crecimiento visto como completo antes del resultado siguiente. «Cuando ha crecido» reproduce ese matiz sin sonar forzado.
- source_word: μεῖζον
  english_pob_choice: larger
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - más grande que
  lexicon: BDAG
  rationale: «Mayor» mantiene el comparativo y suena natural junto con «menor» en español, preservando el contraste léxico del verso.
- source_word: τῶν λαχάνων
  english_pob_choice: than the garden plants
  chosen_spanish: que las plantas de huerto
  alternatives_spanish:
  - que las hortalizas
  - que las plantas del jardín
  lexicon: BDAG
  rationale: λάχανα puede abarcar plantas cultivadas de huerto, verduras u hortalizas. «Plantas de huerto» es amplio, natural y no estrecha indebidamente el campo semántico.
- source_word: γίνεται δένδρον
  english_pob_choice: becomes a tree
  chosen_spanish: se hace un árbol
  alternatives_spanish:
  - se vuelve un árbol
  - llega a ser un árbol
  lexicon: BDAG
  rationale: La expresión griega presenta el resultado de manera simple. «Se hace un árbol» conserva la imagen sin suavizarla ni interpretarla.
- source_word: ὥστε ἐλθεῖν
  english_pob_choice: so that ... come
  chosen_spanish: de modo que ... vienen
  alternatives_spanish:
  - de manera que ... vienen
  - así que ... vienen
  lexicon: BDAG
  rationale: ὥστε con infinitivo expresa resultado. «De modo que» comunica la consecuencia de forma idiomática en español.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del aire
  - las aves del cielo
  lexicon: BDAG
  rationale: Se preserva la imagen más literal del texto griego con «cielo», coherente con el valor de οὐρανός aquí. «Aves» es una opción digna y amplia en español.
- source_word: κατασκηνοῦν
  english_pob_choice: nest
  chosen_spanish: anidan
  alternatives_spanish:
  - se alojan
  - habitan
  lexicon: BDAG
  rationale: Con aves y ramas, el verbo se concreta naturalmente como «anidan», que comunica la idea de posarse y establecerse en el árbol.
- source_word: ἐν τοῖς κλάδοις αὐτοῦ
  english_pob_choice: in its branches
  chosen_spanish: en sus ramas
  alternatives_spanish:
  - entre sus ramas
  lexicon: BDAG
  rationale: La referencia posesiva se expresa con naturalidad en español. «Sus» concuerda con el árbol implícito y mantiene la imagen espacial simple.
theological_decisions:
- issue: Imagen de las aves en el árbol y posible alusión a reinos o naciones
  english_pob_reading: Retain the image literally without making the allusion explicit in the main text.
  chosen_spanish_reading: Conservar la imagen literalmente, sin explicitar en el texto principal una interpretación simbólica.
  alternative_spanish_readings:
  - Interpretar las aves como símbolo de las naciones o de los pueblos
  - Añadir una glosa interpretativa sobre el árbol del reino
  rationale: El griego presenta la imagen sin una interpretación explícita. La traducción mantiene esa tensión teológica y deja el posible eco veterotestamentario sin resolverlo en el texto principal.
  doctrine_reference: Preservar la tensión interpretativa sin sobrecargar el versículo.
translation_notes:
  revision_awareness: Se alineó la traducción con el valor comparativo de μικρότερον/μεῖζον y con el resultado de ὥστε ἐλθεῖν. Se decidió conservar la imagen de las aves en el árbol de forma literal, siguiendo el expediente auditado en inglés y evitando una glosa interpretativa en el texto principal.
  spanish_consistency_notes:
  - 'Se mantuvo un registro léxico uniforme: menor/mayor, semillas, plantas de huerto, árbol, aves del cielo, anidan.'
  - Se evitó «SEÑOR» u այլ terminología no pertinente; no hay vocabulario divino en este versículo.
  - La puntuación y el orden responden al español natural sin perder la estructura contrastiva del griego.
