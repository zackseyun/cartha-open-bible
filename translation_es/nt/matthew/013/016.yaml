translation:
  language: es
  text: 'Pero dichosos son ustedes: sus ojos[a], porque ven, y sus oídos, porque oyen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pues ven ... pues oyen». El griego ὅτι puede traducirse aquí también de esa manera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Conserva el matiz de contraste con el contexto inmediato; en español, 'Pero' comunica mejor la oposición que 'Y' y mantiene el giro adversativo del griego.
- source_word: μακάριοι
  english_pob_choice: blessed
  chosen_spanish: dichosos
  alternatives_spanish:
  - bienaventurados
  - benditos
  lexicon: BDAG
  rationale: En una bienaventuranza, 'dichosos' comunica de forma natural el estado de favor y dicha que el contexto atribuye a los discípulos, sin sonar tan eclesiástico como 'bienaventurados' ni introducir la idea de bendición como acto verbal.
- source_word: οἱ ὀφθαλμοὶ
  english_pob_choice: your eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - vuestros ojos
  - los ojos de ustedes
  lexicon: BDAG
  rationale: El griego se dirige a los oyentes con un posesivo de segunda persona plural; en español, 'sus' puede reflejar ese plural dirigido al grupo en un registro neutral y legible. Se evita 'vuestros' por regionalismo y 'los ojos de ustedes' por pesadez.
- source_word: ὅτι βλέπουσιν
  english_pob_choice: because they see
  chosen_spanish: porque ven
  alternatives_spanish:
  - pues ven
  - ya que ven
  - para que vean
  lexicon: BDAG
  rationale: '''Porque'' conserva la lectura causal preferida por el POB inglés. ''Ven'' es el equivalente natural de βλέπουσιν y mantiene la sencillez sensorial del texto sin ampliar a ''perciben''.'
- source_word: τὰ ὦτα ὑμῶν
  english_pob_choice: your ears
  chosen_spanish: sus oídos
  alternatives_spanish:
  - sus orejas
  - los oídos de ustedes
  lexicon: BDAG
  rationale: '''Oídos'' es el término más natural y digno en español para este paralelismo; ''orejas'' suena más corporal y menos idiomático en este registro.'
- source_word: ὅτι ἀκούουσιν
  english_pob_choice: because they hear
  chosen_spanish: porque oyen
  alternatives_spanish:
  - pues oyen
  - ya que oyen
  - porque escuchan
  lexicon: BDAG
  rationale: '''Oyen'' reproduce el verbo básico del griego y mantiene el paralelismo con ''ven''. ''Escuchan'' podría sugerir atención deliberada más que la simple capacidad auditiva que el pasaje expresa.'
theological_decisions:
- issue: Si explicitar aquí una comprensión espiritual de 'ven' y 'oyen'
  english_pob_reading: Retain the literal sensory language 'see' and 'hear' without adding 'understand' or 'receive.'
  chosen_spanish_reading: 'Conservar el lenguaje sensorial literal: ''ven'' y ''oyen'', sin añadir ''entienden'' ni ''reciben''.'
  alternative_spanish_readings:
  - Pero dichosos son sus ojos, porque perciben, y sus oídos, porque entienden.
  - Pero dichosos son sus ojos, porque ven, y sus oídos, porque reciben.
  rationale: El contexto inmediato sugiere una dimensión espiritual, pero este versículo afirma solo la capacidad de ver y oír. Mantener el lenguaje literal preserva la tensión teológica documentada por el POB inglés y evita resolverla prematuramente en la traducción.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios adicionales respecto del análisis previo; se mantiene la decisión de conservar el contraste adversativo y el valor causal de ὅτι, con una nota de alternativa legítima.'
  spanish_consistency_notes:
  - Se mantiene 'dichosos' como equivalente estable de μακάριοι en contextos de bienaventuranza.
  - Se conserva 'oídos' para el paralelo con 'ojos' y para evitar un registro demasiado coloquial.
  - La nota al pie marca la alternativa causal 'pues', consistente con la observación del POB inglés sobre ὅτι.
