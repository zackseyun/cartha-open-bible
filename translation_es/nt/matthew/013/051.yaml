translation:
  language: es
  text: '¿Han entendido todas estas cosas?[a] Ellos le dijeron: «Sí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Entienden todas estas cosas?»
    reason: lexical_alternative
lexical_decisions:
- source_word: Συνήκατε
  english_pob_choice: Have you understood
  chosen_spanish: Han entendido ustedes
  alternatives_spanish:
  - ¿Entienden ustedes?
  - ¿Han comprendido ustedes?
  lexicon: συνίημι
  rationale: El aoristo interrogativo en segunda persona plural apunta naturalmente a una comprensión alcanzada hasta ahora; en español, el perfecto compuesto transmite bien esa pregunta por una comprensión ya realizada. Se explicita el sujeto 'ustedes' para claridad natural en español y evitar ambigüedad verbal.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas cosas
  lexicon: οὗτος + πᾶς
  rationale: La combinación del demostrativo con πᾶς en neutro plural se refleja de forma transparente como 'todas estas cosas'. 'Todo esto' es más idiomático, pero 'todas estas cosas' mantiene con mayor visibilidad la referencia a las enseñanzas/parábolas anteriores.
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le respondieron
  alternatives_spanish:
  - Le dijeron
  - Le dijeron a él
  lexicon: λέγω
  rationale: Aunque el griego presenta presente histórico, en español narrativo fluye mejor el pasado simple. 'Respondieron' comunica con naturalidad que contestan a la pregunta; 'le dijeron' sería más literal, pero menos específico en este contexto dialogal.
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Sí, Señor
  lexicon: ναί
  rationale: La partícula afirmativa simple se traduce sin añadir títulos ni expansión reverencial. El texto griego no contiene 'Señor', por lo que se mantiene la respuesta desnuda y directa.
theological_decisions:
- issue: Si añadir un tratamiento reverencial en la respuesta
  english_pob_reading: Retain the simple reply 'Yes.'
  chosen_spanish_reading: Mantener solo 'Sí'.
  alternative_spanish_readings:
  - Sí, Señor
  - Sí, maestro
  rationale: La fuente griega contiene únicamente la afirmación ναί. Añadir un título introduciría contenido devocional o armonizante no presente en el versículo.
  doctrine_reference: Primacía del texto original; no importar formulaciones tradicionales ausentes del griego.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada. La redacción actual no requiere notas porque la alternativa lexical de συνίημι puede quedar suficientemente reflejada en las decisiones lexicográficas sin interrumpir el texto.
  spanish_consistency_notes:
  - Se mantiene un registro neutral y eclesialmente legible.
  - Se evita 'Señor' en la respuesta final para no ampliar el texto fuente.
  - '''Han entendido ustedes'' conserva la fuerza aspectual del aoristo mejor que un presente simple.'
