translation:
  language: es
  text: y los arrojarán en el horno de fuego[a]. Allí habrá llanto y rechinar de dientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de forma más idiomática, «el horno ardiente». El griego dice literalmente «el horno de fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: βαλοῦσιν
  english_pob_choice: they will throw
  chosen_spanish: arrojarán
  alternatives_spanish:
  - echarán
  - tirarán
  lexicon: BDAG
  rationale: El futuro activo de βάλλω aquí expresa una acción violenta de expulsión. En español, «arrojarán» conserva mejor esa fuerza que un simple «echarán», y evita un tono demasiado coloquial. La elección sigue la dirección semántica del POB inglés sin depender de él mecánicamente.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El pronombre acusativo plural se refiere a los justos o injustos del contexto previo; en español, el clítico objeto directo «los» resulta natural y fiel al referente plural masculino.
- source_word: κάμινον τοῦ πυρός
  english_pob_choice: the furnace of fire
  chosen_spanish: el horno de fuego
  alternatives_spanish:
  - el horno ardiente
  - el horno ígneo
  lexicon: BDAG
  rationale: Se mantiene la construcción genitiva de modo transparente. «Horno de fuego» refleja con mayor literalidad el griego que «horno ardiente»; esta última opción es idiomática, pero atenúa la forma de la imagen. En español bíblico, «horno de fuego» es entendible y preserva la tensión textual.
- source_word: ἐκεῖ
  english_pob_choice: In that place
  chosen_spanish: Allí
  alternatives_spanish:
  - en ese lugar
  - allí mismo
  lexicon: BDAG
  rationale: El adverbio locativo se traduce de manera breve y natural con «Allí», sin perder la referencia espacial del juicio final.
- source_word: ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  lexicon: BDAG
  rationale: En español, el futuro existencial «habrá» corresponde bien a ἔσται con predicado nominal y suena más natural que un literal «será» en este contexto.
- source_word: ὁ κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - lloro
  - gemido
  lexicon: BDAG
  rationale: κλαυθμός denota llanto/lamento. «Llanto» transmite la respuesta emocional sin forzar un matiz específico de lamentación que en español puede sonar redundante junto a la segunda expresión.
- source_word: ὁ βρυγμὸς τῶν ὀδόντων
  english_pob_choice: gnashing of teeth
  chosen_spanish: crujir de dientes
  alternatives_spanish:
  - rechinar de dientes
  - crujido de dientes
  lexicon: BDAG
  rationale: Aunque «gnashing of teeth» tiene equivalente tradicional en español, «crujir de dientes» expresa el idiomático bíblico con buena aceptación y mantiene la imagen de tensión/angustia. «Rechinar de dientes» también es posible, pero «crujir» conserva mejor el valor fijo del giro en este registro.
theological_decisions:
- issue: Imagen de juicio final en forma concreta
  english_pob_reading: Retain the concrete imagery 'the furnace of fire' and 'weeping and gnashing of teeth' without softening or interpretive expansion.
  chosen_spanish_reading: Conservar la imaginería concreta de «el horno de fuego» y «llanto y crujir de dientes» sin parafrasearla ni suavizarla.
  alternative_spanish_readings:
  - «el horno ardiente»
  - «allí habrá personas llorando y rechinando los dientes en angustia»
  rationale: El versículo forma parte de la explicación de Jesús sobre el juicio; la traducción debe preservar la dureza y la concreción de las metáforas. Por eso no se sustituye por una paráfrasis explicativa ni por un lenguaje más interpretativo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del texto de referencia; se mantiene el acuerdo alto con el auditor inglés.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - 'Se mantiene una terminología sobria y bíblica: «arrojarán», «horno de fuego», «llanto» y «crujir de dientes».'
  - La nota al pie marca la alternativa idiomática sin desplazar la traducción literal preferida por el audit trail.
