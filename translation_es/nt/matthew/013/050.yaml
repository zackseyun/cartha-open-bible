  to: y los arrojarán en el horno de fuego[a]. Allí habrá llanto y rechinar de dientes.
  rationale: Se conserva la traducción general del borrador porque sigue bien el griego y el razonamiento del POB inglés. Solo se corrige la locución final a 'rechinar de dientes', que es la equivalencia española más estable, natural y bíblicamente reconocible para ὁ βρυγμὸς τῶν ὀδόντων.
