translation:
  language: es
  text: 'Él les dijo otra parábola: «El reino de los cielos es semejante a la levadura[a][c][b], que una mujer tomó y escondió en tres medidas de harina hasta que todo quedó leudado»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fermento». El término griego designa un agente leudante usado en la masa.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «tres seahs de harina», una cantidad grande.'
    reason: cultural_note
  - marker: c
    text: O «escondió dentro de» o «mezcló en»; el griego dice literalmente «escondió en».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄλλην παραβολὴν
  english_pob_choice: another parable
  chosen_spanish: otra parábola
  alternatives_spanish:
  - una parábola נוספת
  - una parábola diferente
  lexicon: BDAG
  rationale: ἄλλην introduce una parábola adicional; «otra parábola» conserva el sentido aditivo de manera natural en español.
- source_word: ἐλάλησεν αὐτοῖς
  english_pob_choice: He told them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les contó
  lexicon: BDAG
  rationale: En español, «les dijo» funciona como introducción narrativa breve y fiel al acto de comunicar la parábola, sin sobreexplicar.
- source_word: Ὁμοία ἐστὶν
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - se parece a
  lexicon: BDAG
  rationale: La fórmula comparativa de las parábolas puede verterse con «es semejante a» para sonar natural y conservar el matiz comparativo.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino de los cielos
  lexicon: BDAG
  rationale: En Mateo, la expresión fija ἡ βασιλεία τῶν οὐρανῶν se traduce de forma reconocible como «el reino de los cielos»; en español conserva el uso habitual y la referencia mateana.
- source_word: ζύμῃ
  english_pob_choice: leaven
  chosen_spanish: la levadura
  alternatives_spanish:
  - la fermentación
  - el fermento
  lexicon: BDAG
  rationale: ζύμη designa el agente leudante. «Levadura» es el equivalente más claro y natural en español; se evita forzar una valoración teológica positiva o negativa en la palabra misma.
- source_word: ἣν λαβοῦσα γυνὴ
  english_pob_choice: which a woman took
  chosen_spanish: que una mujer tomó
  alternatives_spanish:
  - que una mujer, al tomarla
  - la cual tomó una mujer
  lexicon: BDAG
  rationale: El participio λαβοῦσα se integra de manera natural con «tomó»; el relativo «que» mantiene la referencia a la levadura sin añadir contenido.
- source_word: ἐνέκρυψεν εἰς
  english_pob_choice: hid in
  chosen_spanish: escondió en
  alternatives_spanish:
  - metió en secreto en
  - mezcló en
  lexicon: BDAG
  rationale: ἐγκρύπτω significa literalmente ocultar/esconder dentro de algo. «Escondió en» preserva la fuerza lexical mejor que una paráfrasis como «mezcló».
- source_word: ἀλεύρου σάτα τρία
  english_pob_choice: three measures of flour
  chosen_spanish: tres medidas de harina
  alternatives_spanish:
  - tres seahs de harina
  - tres medidas de harina
  lexicon: BDAG
  rationale: σάτον es una medida seca; «medidas» comunica el sentido con claridad. «Harina» sigue el contexto del material preparado para la masa y evita una traducción más arcaica.
- source_word: ἕως οὗ ἐζυμώθη ὅλον
  english_pob_choice: until it was all leavened
  chosen_spanish: hasta que todo quedó leudado
  alternatives_spanish:
  - hasta que quedó todo leudado
  - hasta que todo fue leudado
  lexicon: BDAG
  rationale: El pasivo ἐζυμώθη indica el resultado de quedar leudado. «Quedó leudado» mantiene el proceso de transformación sin sonar forzado en español.
theological_decisions:
- issue: Connotación de ζύμη en la parábola
  english_pob_reading: Render neutrally as 'leaven' without importing either a positive or negative theological valuation into the wording.
  chosen_spanish_reading: «Levadura» se mantiene como imagen neutral, sin resolver en la traducción si su valor simbólico es positivo o negativo.
  alternative_spanish_readings:
  - usar una palabra con connotación explícitamente positiva
  - usar una palabra con connotación explícitamente negativa
  rationale: La parábola se centra en la acción de ocultar y en la extensión del efecto; la traducción debe conservar esa tensión interpretativa sin imponer una lectura doctrinal previa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente: no hubo cambios necesarios y el sentido principal se mantiene estable. La redacción española busca reflejar el mismo estado textual y auditivo del inglés POB, pero directamente anclada en el griego.'
  spanish_consistency_notes:
  - Se mantiene «el reino de los cielos» como término mateano fijo.
  - Se usa «levadura» para ζύμη sin cargarla de valoración moral.
  - Se conserva la imagen de ocultar/esconder con un equivalente verbal directo.
  - «Tres medidas de harina» comunica la unidad de medida sin exigir tecnicismos al lector general.
