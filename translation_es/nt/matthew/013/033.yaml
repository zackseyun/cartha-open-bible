base_translation:
  language: en
  yaml_path: translation/nt/matthew/013/033.yaml
  text: 'He told them another parable: “The kingdom of heaven is like leaven[c][b][a], which a woman took and hid in three measures of flour until it was all leavened.”'
  footnotes:
