review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca el rastro POB en los puntos principales: «otra parábola», «el reino de los cielos», «levadura», «tres medidas de harina» y el resultado final de que toda la masa quedara leudada. También conserva correctamente la neutralidad teológica de ζύμη. Sin embargo, hay un problema claro de redacción en «e escondió», que en español debe ser «y escondió» porque la conjunción e solo se usa ante sonido /i/.'
  spanish_quality_summary: El texto es legible y digno, pero «e escondió» es un error gramatical/ortográfico de uso de conjunción. Además, «hasta que todo quedó leudado» es aceptable, pero «hasta que todo quedó fermentado» no sería apropiado; el borrador actual acierta con «leudado». El resto suena natural y eclesialmente comprensible.
  glossary_alignment: Buen alineamiento con la terminología del proyecto. No aparecen términos de glosario sensibles como Yahvé/Mesías. «Levadura» reproduce bien ζύμη como equivalente principal, con alternativa nota para «fermento». «Reino de los cielos» mantiene adecuadamente la expresión mateana.
  issues:
  - severity: medium
    issue: Uso incorrecto de la conjunción en «tomó e escondió»
    rationale: En español, la forma «e» reemplaza a «y» solo ante palabra que comienza con sonido /i/ o /hi/. «Escondió» comienza con sonido /es/, así que corresponde «y escondió». Es un error visible en el texto principal.
  - severity: low
    issue: 'Alternativa lexical en nota a: «fermento»'
    rationale: No es incorrecta, pero en español bíblico general «fermento» puede sonar menos natural que «levadura» para el agente leudante. Como alternativa en nota está bien y no requiere cambio obligatorio.
  revised_spanish_text: 'Él les dijo otra parábola: «El reino de los cielos es semejante a la levadura[a][c][b], que una mujer tomó y escondió en tres medidas de harina hasta que todo quedó leudado»'
  revised_footnotes:
  - marker: a
    text: O «fermento». El término griego designa un agente leudante usado en la masa.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «tres seahs de harina», una cantidad grande.'
    reason: cultural_note
  - marker: c
    text: O «escondió dentro de» o «mezcló en»; el griego dice literalmente «escondió en».
    reason: lexical_alternative
  revision_rationale: Se corrige la conjunción «e» a «y» antes de «escondió» para ajustarse a la gramática estándar del español. No se requieren otros cambios porque el borrador ya preserva fielmente el sentido del griego y las decisiones léxicas del POB.
