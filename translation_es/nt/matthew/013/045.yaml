translation:
  language: es
  text: De nuevo[a], el reino de los cielos es semejante a un mercader que busca perlas finas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el reino de los cielos es semejante a un hombre, un mercader, que busca perlas finas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  english_pob_choice: Again
  chosen_spanish: De nuevo
  alternatives_spanish:
  - Otra vez
  - Además
  - De nuevo
  lexicon: BDAG
  rationale: Introduce otra comparación dentro de la serie de parábolas del reino. «De nuevo» conserva la función discursiva de Πάλιν con naturalidad en español y evita un calco innecesario.
- source_word: ὁμοία ἐστὶν
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - es semejante a
  - se parece a
  lexicon: BDAG
  rationale: La construcción comparativa se expresa con una fórmula clara y bíblica en español. «Es semejante a» mantiene el valor de comparación sin empobrecerlo a una simple equivalencia.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino de los cielos
  - el reino de los cielos
  lexicon: BDAG
  rationale: Se conserva la expresión característica de Mateo. «Reino de los cielos» es la forma establecida en español y refleja el giro propio del evangelio sin introducir una paráfrasis teológica.
- source_word: ἀνθρώπῳ ἐμπόρῳ
  english_pob_choice: a merchant
  chosen_spanish: a un mercader
  alternatives_spanish:
  - a un mercader
  - a un comerciante
  - a un hombre, un mercader
  lexicon: BDAG
  rationale: El dativo de comparación presenta al personaje como «mercader». «Mercader» conserva el perfil lexical del griego ἔμπορος mejor que «comerciante» en un registro bíblico, y evita añadir «hombre» en el texto principal, como permite el audit trail inglés.
- source_word: ζητοῦντι
  english_pob_choice: seeking
  chosen_spanish: que busca
  alternatives_spanish:
  - que busca
  - buscando
  - que anda buscando
  lexicon: BDAG
  rationale: El participio presente describe la acción continua del mercader. «Que busca» comunica bien el valor verbal y es más natural en español que un gerundio forzado.
- source_word: καλοὺς μαργαρίτας
  english_pob_choice: fine pearls
  chosen_spanish: perlas finas
  alternatives_spanish:
  - perlas finas
  - perlas de gran calidad
  - perlas valiosas
  lexicon: BDAG
  rationale: καλός aquí indica calidad/excelencia, no mera belleza física. «Perlas finas» es idiomático y preserva la idea comercial de mercancía de alta calidad sin exagerar a «valiosas».
theological_decisions:
- issue: Alcance de la comparación en la fórmula parabólica
  english_pob_reading: The kingdom is compared to the merchant rather than explicitly to the pearls or the search process alone.
  chosen_spanish_reading: El reino se compara con el mercader, sin resolver aquí si la imagen apunta también al acto de buscar o a las perlas mismas.
  alternative_spanish_readings:
  - El reino es como la situación de un mercader que busca perlas finas.
  - El reino es como las perlas finas.
  - El reino es como la búsqueda de perlas finas.
  rationale: La sintaxis griega presenta como comparación inmediata al mercader. Mantener la formulación sencilla deja abierta la función plena de la parábola para el verso siguiente y preserva la tensión interpretativa documentada.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece anclado en el texto principal. No se añadieron notas sin anclaje. Se mantuvo la lectura de comparación simple documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se prefirió «reino de los cielos» por coherencia con Mateo y con el uso establecido en español.
  - Se evitó traducir mecánicamente «kingdom of heaven» como «reino del cielo(s)»; la forma tradicional y transparente es «reino de los cielos».
  - Se eligió «mercader» para reflejar el sustantivo griego ἔμπορος y conservar el matiz comercial.
  - Se tradujo el participio con una cláusula relativa natural en español para mantener claridad y aspecto continuo.
  - «Perlas finas» preserva la valoración de calidad del adjetivo καλός sin introducir una interpretación excesiva.
