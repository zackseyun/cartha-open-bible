translation:
  language: es
  text: Y mientras sembraba[a], unas semillas cayeron junto al camino, y vinieron las aves y las devoraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, “unas cosas cayeron junto al camino”; “semillas” se suple por el contexto del sembrador.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ σπείρειν αὐτὸν
  english_pob_choice: as he was sowing
  chosen_spanish: mientras él sembraba
  alternatives_spanish:
  - mientras sembraba
  - cuando él sembraba
  - al sembrar
  lexicon: BDAG
  rationale: La construcción con ἐν + infinitivo articular expresa tiempo contemporáneo. En español, "mientras él sembraba" conserva la simultaneidad de manera natural y fiel, sin forzar un calco."
- source_word: ἃ μὲν
  english_pob_choice: some seeds
  chosen_spanish: unas semillas
  alternatives_spanish:
  - algunas semillas
  - parte de la semilla
  - unas cosas
  lexicon: BDAG
  rationale: El relativo neutro plural literalmente significa "unas cosas", pero el contexto del sembrador exige suplir el referente implícito. "Semillas" mantiene el sentido agrícola y evita una traducción opaca.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - cayó
  - se cayeron
  - fueron a caer
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa bien con pasado simple. En español, el plural concuerda con "unas semillas"; por eso se usa "cayeron".
- source_word: παρὰ τὴν ὁδόν
  english_pob_choice: beside the path
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - junto al sendero
  - a la orilla del camino
  lexicon: BDAG
  rationale: παρά con acusativo indica posición al lado de. "Junto al camino" es natural en español y conserva la relación espacial sin arcaísmo.
- source_word: ἐλθόντα τὰ πετεινὰ
  english_pob_choice: the birds came
  chosen_spanish: las aves vinieron
  alternatives_spanish:
  - los pájaros vinieron
  - las aves llegaron
  - los pájaros llegaron
  lexicon: BDAG
  rationale: πετεινά designa aves/pájaros. "Aves" es un equivalente digno y amplio; "vinieron" reproduce el movimiento del participio aoristo adverbial con un verbo finito en secuencia narrativa.
- source_word: κατέφαγεν
  english_pob_choice: devoured
  chosen_spanish: se las comieron
  alternatives_spanish:
  - las devoraron
  - se las tragaron
  - las comieron
  lexicon: BDAG
  rationale: El verbo intensifica la acción de comer. En español, "se las comieron" comunica de modo idiomático el consumo total; también preserva el objeto implícito con claridad narrativa.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: se las
  alternatives_spanish:
  - las
  - a ellas
  - aquellas semillas
  lexicon: BDAG
  rationale: El pronombre se refiere a las semillas caídas. En español, el clítico átono con duplicación de objeto resulta natural y evita repetir "las semillas".
translation_notes:
  revision_awareness: Se siguió el paquete fuente griego SBLGNT y el audit trail inglés. Se mantuvo la equivalencia óptima del inglés POB, pero se ajustó la concordancia española (plural para "unas semillas") y se eligió "aves" para un registro más natural y respetuoso en español.
  spanish_consistency_notes:
  - Se conservó el tiempo narrativo simple para el aoristo griego.
  - Se evitó "SEÑOR"/"Cristo" porque no aparecen en este versículo.
  - Se prefirió "camino" sobre "sendero" o "vereda" por transparencia y uso bíblico claro.
  - La nota al pie marca la elipsis del sustantivo implícito en ἃ μὲν sin sobretraducir.
