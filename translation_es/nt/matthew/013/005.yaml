translation:
  language: es
  text: Otra semilla cayó en terreno rocoso[a], donde no había mucha tierra, y brotó enseguida porque la tierra no tenía profundidad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en los lugares rocosos»; la frase alude a una capa superficial de tierra sobre roca subyacente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα δὲ
  english_pob_choice: Other seed
  chosen_spanish: Otra semilla
  alternatives_spanish:
  - Pero otra semilla
  - Otras
  lexicon: BDAG
  rationale: El griego neutro plural retoma el contraste distributivo de la parábola; en español conviene explicitar el sustantivo implícito «semilla» para claridad sin perder el valor de «otra».
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se sembró
  - fue sembrada
  lexicon: BDAG
  rationale: El verbo significa simplemente «cayó» en la imagen narrativa; «se sembró» añadiría una acción no expresada en el griego.
- source_word: ἐπὶ τὰ πετρώδη
  english_pob_choice: on rocky ground
  chosen_spanish: en terreno rocoso
  alternatives_spanish:
  - sobre las rocas
  - en suelo pedregoso
  lexicon: BDAG
  rationale: πετρώδη señala lugares/terreno rocoso. «Terreno rocoso» comunica de modo natural la idea de una capa superficial de tierra sobre roca, que el contexto explicita.
- source_word: ὅπου οὐκ εἶχεν γῆν πολλήν
  english_pob_choice: where it did not have much soil
  chosen_spanish: donde no tenía mucha tierra
  alternatives_spanish:
  - donde no había mucha tierra
  - donde tenía poca tierra
  lexicon: BDAG
  rationale: γῆ aquí puede referirse al suelo/tierra arable. «Tierra» mantiene la imagen agrícola y evita un tecnicismo innecesario; el sujeto implícito queda natural en español.
- source_word: καὶ εὐθέως
  english_pob_choice: and it sprang up at once
  chosen_spanish: y brotó enseguida
  alternatives_spanish:
  - y brotó inmediatamente
  - y salió al instante
  lexicon: BDAG
  rationale: εὐθέως marca inmediatez; «enseguida» conserva ese valor en español sin sonar arcaico.
- source_word: ἐξανέτειλεν
  english_pob_choice: sprang up
  chosen_spanish: brotó
  alternatives_spanish:
  - creció
  - salió
  lexicon: BDAG
  rationale: En contexto agrícola el verbo describe la emergencia de la planta. «Brotó» es natural y preciso en español.
- source_word: διὰ τὸ μὴ ἔχειν βάθος γῆς
  english_pob_choice: because it had no depth of soil
  chosen_spanish: porque no tenía profundidad de tierra
  alternatives_spanish:
  - porque no tenía profundidad de suelo
  - porque la tierra no tenía profundidad
  lexicon: BDAG
  rationale: La construcción causal expresa la razón del rápido brote. «Profundidad de tierra» reproduce con fidelidad la imagen de poca capa de suelo sobre la roca, aunque en español suene ligeramente más literal que «suelo».
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego SBLGNT y concuerda con el audit trail inglés: mantiene el contraste distributivo de ἄλλα δὲ, el valor simple de ἔπεσεν como «cayó», la imagen agrícola de πετρώδη y la causalidad de διὰ τὸ μὴ ἔχειν βάθος γῆς. No se requieren revisiones adicionales según el estado de alta concordancia del expediente inglés.'
  spanish_consistency_notes:
  - Se mantiene un registro neutral y eclesialmente legible.
  - Se evita introducir «sembrada» para no sobretraducir ἔπεσεν.
  - «Terreno rocoso» y la nota preservan la alternativa lexical documentada en el inglés POB.
  - La repetición de «tierra» sigue la imagen del griego γῆ y hace consistente la metáfora agrícola.
