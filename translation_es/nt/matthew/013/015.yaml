review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta en general la estructura del griego y conserva la secuencia ver/oír/entender/volver/sanar, pero introduce varias decisiones menos fieles: ἐπαχύνθη se vierte mejor como ‘se ha embotado’ o ‘se ha vuelto insensible’ que ‘se ha endurecido’; βαρέως ἤκουσαν no suena natural como ‘oyeron pesadamente’ y además rompe la decisión auditada de valor gnómico/presente; μήποτε queda torpe y sobredesarrollado en ‘de modo que no sea que’; ἐπιστρέψωσιν se aleja del audit trail al traducirse ‘se conviertan’ en vez de una forma de ‘volver’; y ἰάσομαι es futuro, no subjuntivo (‘los sanaré’, no ‘los sane’).'
  spanish_quality_summary: 'El texto actual es comprensible, pero varias expresiones suenan poco naturales o innecesariamente forzadas en español: ‘oyeron pesadamente’, ‘sus ojos han cerrado’, y ‘de modo que no sea que’. Una revisión mínima puede mantener la dignidad bíblica y a la vez mejorar la fluidez: ‘oyen con dificultad’, ‘han cerrado sus ojos’, ‘no sea que’, ‘vuelvan’, ‘los sanaré’.'
  glossary_alignment: No hay conflictos con los términos globales principales del proyecto. La cuestión clave es mantener la decisión léxica documentada para ἐπιστρέψωσιν más cerca de ‘volver/retornar’ que de ‘convertirse’, y preservar el futuro de ἰάσομαι. También conviene alinear ἐπαχύνθη con el sentido de embotamiento/insensibilidad más que con ‘endurecimiento’, que en español puede sugerir otro campo semántico.
  issues:
  - severity: medium
    issue: ‘se ha endurecido’ para ἐπαχύνθη
    rationale: El griego habla de volverse grueso/embotado en la metáfora del corazón. ‘Endurecido’ es posible teológicamente, pero desplaza el matiz hacia otra imagen más típica de ‘hardening’. ‘Se ha embotado’ refleja mejor la decisión auditada ‘has grown dull’.
  - severity: high
    issue: ‘y con los oídos oyeron pesadamente’
    rationale: Es poco idiomático en español y además usa pretérito, mientras el audit trail justificó valor presente/gnómico dentro de la cita. ‘Con sus oídos oyen con dificultad’ preserva el sentido sin perder claridad.
  - severity: medium
    issue: ‘sus ojos han cerrado’
    rationale: El orden suena antinatural en español. ‘Han cerrado sus ojos’ o ‘han cerrado los ojos’ expresa mejor la agencia activa del sujeto.
  - severity: high
    issue: ‘de modo que no sea que’ para μήποτε
    rationale: La fórmula es pesada y poco natural. ‘No sea que’ basta para preservar la tensión de propósito/resultado sin sobreexplicar.
  - severity: high
    issue: ‘se conviertan’ para ἐπιστρέψωσιν
    rationale: La auditoría inglesa prefirió ‘turn back’ y documentó como alternativas ‘turn/return’. En español, ‘vuelvan’ o ‘se vuelvan’ conserva mejor esa direccionalidad sin importar lenguaje eclesiástico adicional.
  - severity: high
    issue: ‘y yo los sane’ para ἰάσομαι
    rationale: El verbo griego es futuro indicativo. En español debe reflejarse como ‘y yo los sanaré’ o ‘y los sanaré’, no con subjuntivo.
