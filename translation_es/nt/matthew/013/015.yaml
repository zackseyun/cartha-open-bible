  text: ἐπαχύνθη γὰρ ἡ καρδία τοῦ λαοῦ τούτου, καὶ τοῖς ὠσὶν βαρέως ἤκουσαν, καὶ τοὺς ὀφθαλμοὺς αὐτῶν ἐκάμμυσαν· μήποτε ἴδωσιν τοῖς ὀφθαλμοῖς καὶ τοῖς ὠσὶν ἀκούσωσιν καὶ τῇ καρδίᾳ συνῶσιν καὶ ἐπιστρέψωσιν, καὶ ἰάσομαι αὐτούς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/013/015.yaml
  text: For this people's heart has grown dull[a], and with their ears they hear heavily, and they have closed their eyes, lest they should see with their eyes and hear with their ears and understand with their heart and turn back[c][b], and I will heal them.
  footnotes:
  - marker: a
    text: Or 'with their ears they hear with difficulty,' literally 'they heard heavily.'
    reason: lexical_alternative
  - marker: b
    text: Or 'turn' or 'return' for 'turn back.'
    reason: lexical_alternative
  - marker: c
    text: Quoted from Isaiah 6:9–10.
    reason: cross_reference
