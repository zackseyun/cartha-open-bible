translation:
  language: es
  text: Porque el corazón de este pueblo se ha embotado[a], y con sus oídos oyen con dificultad, y han cerrado sus ojos; no sea que vean con los ojos, y oigan con los oídos, y entiendan con el corazón, y vuelvan[b], y yo los sanaré[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se ha vuelto insensible’; literalmente, ‘se ha engrosado’ o ‘se ha vuelto grueso’.
    reason: lexical_alternative
  - marker: b
    text: O ‘se vuelvan’ o ‘regresen’ para ‘vuelvan’.
    reason: lexical_alternative
  - marker: c
    text: Citado de Isaías 6:9–10.
    reason: cross_reference
lexical_decisions:
- source_word: ἐπαχύνθη
  english_pob_choice: has grown dull
  chosen_spanish: se ha endurecido
  alternatives_spanish:
  - se ha embotado
  - se ha vuelto insensible
  - se ha hecho grueso
  lexicon: BDAG
  rationale: En el contexto de καρδία, el griego expresa una condición espiritual/moral de insensibilidad o torpeza. En español, ‘se ha endurecido’ comunica bien esa idea sin volverla demasiado literal ni perder la fuerza metafórica.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - mente
  - interior
  lexicon: BDAG
  rationale: ‘Corazón’ es la forma natural y bíblica en español para el centro de la persona, incluyendo entendimiento y disposición. Mantiene la conexión interna con ‘entiendan con el corazón’.
- source_word: λαοῦ τούτου
  english_pob_choice: this people's
  chosen_spanish: de este pueblo
  alternatives_spanish:
  - de este pueblo
  - de este pueblo aquí
  lexicon: BDAG
  rationale: Se conserva el demostrativo ‘este’ y el sustantivo ‘pueblo’ en una construcción natural en español, sin perder la referencia específica del texto profético.
- source_word: βαρέως ἤκουσαν
  english_pob_choice: they hear heavily
  chosen_spanish: oyeron pesadamente
  alternatives_spanish:
  - oyen con dificultad
  - oyen pesadamente
  - oyen con pesadez
  lexicon: BDAG
  rationale: La combinación literal de ‘pesadamente’ conserva el matiz de peso/dificultad de βαρέως. Aunque es menos idiomática, aquí mantiene la imagen del griego sin suavizarla demasiado. Se eligió pretérito para seguir la forma aorística del verbo griego.
- source_word: ἐκάμμυσαν
  english_pob_choice: have closed
  chosen_spanish: han cerrado
  alternatives_spanish:
  - cerraron
  - han cerrado los ojos
  - cerraron los ojos
  lexicon: BDAG
  rationale: El griego indica una acción deliberada respecto de los ojos. ‘Han cerrado’ preserva el valor perfectivo y el sentido de agencia; el objeto ‘sus ojos’ ya queda explícito en el texto.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: de modo que no sea que
  alternatives_spanish:
  - para que no
  - no sea que
  - a fin de que no
  lexicon: BDAG
  rationale: Se buscó una fórmula española que preserve la función de advertencia/purpose de μήποτε sin resolver la tensión interpretativa. ‘No sea que’ es posible, pero ‘de modo que no sea que’ ayuda a mantener el matiz de consecuencia temida sin sonar demasiado abrupto.
- source_word: ἴδωσιν ... ἀκούσωσιν ... συνῶσιν ... ἐπιστρέψωσιν
  english_pob_choice: they should see ... hear ... understand ... turn back
  chosen_spanish: vean ... oigan ... entiendan ... se conviertan
  alternatives_spanish:
  - vean ... oigan ... entiendan ... vuelvan
  - vean ... oigan ... comprendan ... regresen
  - vean ... oigan ... entiendan ... se vuelvan
  lexicon: BDAG
  rationale: Los subjuntivos después de μήποτε se trasladan naturalmente al español con ‘vean, oigan, entiendan’. Para ἐπιστρέψωσιν se eligió ‘se conviertan’ porque en este contexto bíblico expresa el giro de retorno con claridad; se documenta la alternativa ‘vuelvan’ por su cercanía semántica.
- source_word: συνῶσιν
  english_pob_choice: understand
  chosen_spanish: entiendan
  alternatives_spanish:
  - comprendan
  - perciban
  - capten
  lexicon: BDAG
  rationale: ‘Entiendan’ es claro, natural y reproduce la noción de captar con discernimiento. ‘Comprendan’ también sería válido, pero ‘entiendan’ encaja mejor con el paralelismo del verso.
- source_word: ἐπιστρέψωσιν
  english_pob_choice: turn back
  chosen_spanish: se conviertan
  alternatives_spanish:
  - vuelvan
  - regresen
  - se vuelvan
  lexicon: BDAG
  rationale: El verbo puede significar volver/retornar y, en contexto de arrepentimiento, convertirse. Dado el trasfondo de Isaías 6:9–10 y la lógica del pasaje, ‘se conviertan’ comunica bien el retorno moral/espiritual sin perder la idea de voltearse hacia Dios.
- source_word: ἰάσομαι
  english_pob_choice: I will heal
  chosen_spanish: yo los sane
  alternatives_spanish:
  - yo los sanaré
  - los sanaré
  - los sane
  lexicon: BDAG
  rationale: El futuro griego se expresa en español con el subjuntivo final tras la secuencia ‘no sea que’. ‘Yo los sane’ preserva la relación condicional/temida dentro de la cita y mantiene la acción divina explícita con ‘yo’.
theological_decisions:
- issue: Tensión entre juicio divino y responsabilidad humana en la cita de Isaías
  english_pob_reading: lest they should see ... understand ... turn back, and I will heal them
  chosen_spanish_reading: de modo que no sea que vean ... entiendan ... se conviertan, y yo los sane
  alternative_spanish_readings:
  - no sea que vean ... entiendan ... se conviertan, y yo los sane
  - para que no vean ... entiendan ... se conviertan, y yo los sane
  - de manera que no vean ... entiendan ... se conviertan, y yo los sane
  rationale: La traducción conserva la ambigüedad funcional de μήποτε en la cita profética, sin decidir si el matiz es propósito, resultado o advertencia. También mantiene la responsabilidad humana en el endurecimiento y la capacidad de respuesta en el ‘se conviertan’.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Renderizado de ἐπιστρέψωσιν en un contexto de retorno arrepentido
  english_pob_reading: turn back
  chosen_spanish_reading: se conviertan
  alternative_spanish_readings:
  - vuelvan
  - regresen
  - se vuelvan
  rationale: En español bíblico contemporáneo, ‘se conviertan’ comunica el giro de retorno al que apunta el contexto sin recurrir a una frase excesivamente técnica. Se preserva así el vínculo con arrepentimiento/retorno sin sobrecargar el versículo.
  doctrine_reference: Repentance / turning back in prophetic citation.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió ‘they hear heavily’ frente a ‘they scarcely hear’ para reflejar más de cerca βαρέως ἤκουσαν. Por eso se mantuvo una formulación que conserva la metáfora de peso/dificultad. También se respetó la decisión revisada de no suavizar el valor agentivo de ‘they have closed their eyes’.
  spanish_consistency_notes:
  - Se usa ‘corazón’ de forma coherente como sede del entendimiento, en paralelo con ‘entiendan con el corazón’.
  - Se evita ‘SEÑOR’ para YHWH porque este versículo es una cita de Isaías y la referencia divina queda mejor representada con ‘yo’ en la clausula final de curación.
  - Se mantiene ‘se conviertan’ como opción bíblica natural para ἐπιστρέψωσιν, con nota alternativa para no borrar la posibilidad de ‘vuelvan’ o ‘regresen’.
  - Se conserva el paralelismo de ojos/oídos/corazón del original griego.
  - Se optó por una construcción española que preserve la tensión interpretativa de μήποτε sin resolverla de antemano.
