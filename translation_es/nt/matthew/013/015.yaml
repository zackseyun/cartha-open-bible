revisions:
- from: Porque el corazón de este pueblo se ha endurecido[a], y con los oídos oyeron pesadamente, y sus ojos han cerrado; de modo que no sea que vean con los ojos, y oigan con los oídos, y entiendan con el corazón, y se conviertan[b], y yo los sane[c].
  to: Porque el corazón de este pueblo se ha embotado[a], y con sus oídos oyen con dificultad, y han cerrado sus ojos; no sea que vean con los ojos, y oigan con los oídos, y entiendan con el corazón, y vuelvan[b], y yo los sanaré[c].
  rationale: 'La revisión corrige varios puntos donde el borrador se apartaba del sentido fuente o del audit trail: reemplaza ‘se ha endurecido’ por ‘se ha embotado’ para reflejar mejor ἐπαχύνθη; cambia ‘oyeron pesadamente’ a ‘oyen con dificultad’ para un español natural que mantenga el valor gnómico reconocido por la auditoría; normaliza ‘han cerrado sus ojos’; simplifica μήποτε a ‘no sea que’; ajusta ἐπιστρέψωσιν a ‘vuelvan’ para preservar el matiz de retorno; y restituye el futuro de ἰάσομαι con ‘los sanaré’.'
