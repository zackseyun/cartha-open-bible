translation:
  language: es
  text: El campo es el mundo, y la buena semilla—estos son los hijos[a] del reino. Y la cizaña[b] son los hijos del maligno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Hijos'' aquí es una expresión relacional representativa, refiriéndose a los que pertenecen al reino.'
    reason: cultural_note
  - marker: b
    text: O más específicamente, 'darnel'; tradicionalmente, 'cizaña'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγρός
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - campo agrícola
  - terreno
  lexicon: BDAG
  rationale: En la parábola, ἀγρός designa el espacio de cultivo; en español, 'campo' conserva la imagen agrícola de forma natural y clara.
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo habitado
  - humanidad
  lexicon: BDAG
  rationale: Aquí κόσμος se entiende como la esfera amplia en que ocurre la siembra; 'mundo' es la equivalencia más directa y natural en español.
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - bueno
  - excelente
  lexicon: BDAG
  rationale: Con σπέρμα, καλός expresa una cualidad positiva y adecuada; 'buena' fluye mejor en español con 'semilla' y mantiene el contraste con la cizaña.
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - simiente
  - sembrado
  lexicon: BDAG
  rationale: La imagen agrícola exige el sentido literal de 'semilla'; 'simiente' es posible, pero 'semilla' es más natural y transparente en español.
- source_word: οὗτοί
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - son estos
  lexicon: BDAG
  rationale: El pronombre plural masculino introduce la identificación de los referidos por el símbolo; 'estos son' refleja bien el cambio de imagen a referente.
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos
  - hijas e hijos
  - descendientes
  lexicon: BDAG
  rationale: Aunque el griego dice υἱοί, en español 'hijos' puede funcionar como expresión relacional representativa sin sonar forzado; 'hijos' preserva mejor la naturalidad que 'hijos varones' y evita una dureza innecesaria. La masculinidad gramatical queda explicada en nota si se desea.
- source_word: βασιλείας
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - soberanía real
  lexicon: BDAG
  rationale: En Mateo, βασιλεία normalmente se traduce 'reino'; esa forma es la más estable y reconocible en español e integra bien el lenguaje del pasaje.
- source_word: ζιζάνια
  english_pob_choice: weeds
  chosen_spanish: cizaña
  alternatives_spanish:
  - hierbas malas
  - maleza
  - darnel
  lexicon: BDAG
  rationale: En español bíblico y corriente, 'cizaña' conserva la oposición proverbial del pasaje y permite reconocer la referencia tradicional específica del término.
- source_word: πονηροῦ
  english_pob_choice: the evil one
  chosen_spanish: el maligno
  alternatives_spanish:
  - el malo
  - el perverso
  - mal
  lexicon: BDAG
  rationale: Con el artículo y el masculino singular genitivo, el texto apunta a un referente personal; 'el maligno' es el equivalente español más natural y asentado para ese uso, sin diluirlo en un abstracto.
theological_decisions:
- issue: Si τοῦ πονηροῦ debe leerse como una cualidad impersonal ('el mal') o como un referente personal
  english_pob_reading: the evil one
  chosen_spanish_reading: el maligno
  alternative_spanish_readings:
  - el mal
  - el malo
  - el perverso
  rationale: La forma griega con artículo y masculino singular favorece una lectura personal. 'El maligno' comunica bien esa lectura en español y mantiene el contraste entre dos grupos de pertenencia.
  doctrine_reference: Mantener la tensión gramatical y teológica del texto; no reducir una referencia personal a una abstracción moral.
- issue: Si υἱοὶ debe conservarse como masculino o volverse inclusivo en español
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos del reino
  - personas del reino
  - hijos e hijas
  rationale: El griego usa un masculino plural, pero en español 'hijos' puede funcionar como designación relacional amplia y fluida. La nota puede aclarar el valor representativo sin alterar el texto principal.
  doctrine_reference: Mantenimiento de la correspondencia semántica con υἱοί, con explicación pastoral de su valor representativo.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del audit trail al mantener la estructura en tres explicaciones paralelas y un enlace coordinado natural. Se optó por una sintaxis española más fluida que refleja la cadencia del griego sin copiar su orden de forma mecánica.
  spanish_consistency_notes:
  - Se mantiene 'reino' para βασιλεία, en línea con el uso estándar de Mateo en español.
  - Se conserva 'el maligno' como equivalente personal de τοῦ πονηροῦ, evitando una abstracción que perdería el contraste del pasaje.
  - '''Cizaña'' se usa como término bíblico natural en español, adecuado para la imagen tradicional del texto.'
  - '''Hijos'' preserva la relación de pertenencia expresada por υἱοί; la nota aclara su valor representativo sin introducir lenguaje ajeno al pasaje.'
