    issue: 'Construcción española algo forzada: “se les ha dado conocer”'
    rationale: Aunque refleja formalmente δέδοται + γνῶναι, en español puede sonar antinatural o ambigua, como si significara ‘se les ha revelado’, no exactamente ‘se les ha concedido conocer’. “Se les ha concedido conocer” conserva mejor el infinitivo y la naturalidad.
  - severity: medium
    issue: Falta la nota sobre el agente implícito del pasivo
    rationale: El English POB documenta expresamente que el pasivo ‘has been given’ deja implícito al dador, con sentido de concesión por Dios. Esa decisión teológica/audit trail debería preservarse en español.
  - severity: low
    issue: Puntuación española mejorable
    rationale: 'El punto final debe ir dentro de las comillas de cierre en este contexto: “... no se les ha dado.”'
