review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura básica del griego: Jesús responde, contrasta a los discípulos con los otros, conserva el pasivo divino implícito en δέδοται, y mantiene μυστήρια como “misterios”. Sin embargo, la construcción “se les ha dado conocer” suena menos natural y algo ambigua en español frente a una formulación más fiel al infinitivo γνῶναι como “se les ha dado entender/conocer” o, mejor, “a ustedes se les ha concedido conocer”. Además, falta en español una nota que refleje la decisión teológica documentada sobre el pasivo implícito, ya que el inglés POB la conserva.'
  spanish_quality_summary: El texto es claro y ampliamente comprensible, con buen registro bíblico. “Les respondió” y “reino de los cielos” funcionan bien. No obstante, “se les ha dado conocer” resulta algo forzado en español; “se les ha dado conocer” puede entenderse como ‘alguien les ha dado a conocer’, no tanto ‘se les ha concedido conocer’. También conviene colocar el punto final dentro de las comillas según puntuación española.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: no hay términos de Yahvé/Mesías en juego; μυστήρια se mantiene como “misterios”; se preserva el pasivo sin explicitar a Dios. La nota alternativa de “secretos” está bien. Debe añadirse una nota sobre el pasivo divino implícito, como en el rastro inglés.'
  issues:
