translation:
  language: es
  text: 'Él les respondió[a]: «A ustedes se les ha concedido conocer los misterios del reino de los cielos[b], pero a ellos no se les ha concedido[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “les contestó”.
    reason: lexical_alternative
  - marker: b
    text: O “secretos”.
    reason: lexical_alternative
  - marker: c
    text: El pasivo “se les ha concedido” deja implícito al que concede; el sentido es que este conocimiento es otorgado por Dios.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: He answered
  chosen_spanish: les respondió
  alternatives_spanish:
  - les contestó
  - respondió
  lexicon: BDAG
  rationale: La construcción participio + verbo finito es una fórmula semítica habitual que en español se expresa con naturalidad como “respondió/les respondió”. Añadir otro verbo sería redundante; se conserva el sentido directo de la respuesta.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les habló
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con pronombre indirecto en español. “Les respondió” conserva la relación directa con los interlocutores.
- source_word: Ὅτι
  english_pob_choice: To you it has been given...
  chosen_spanish: A ustedes
  alternatives_spanish:
  - Porque
  - Que
  lexicon: BDAG
  rationale: Aquí Ὅτι introduce el contenido explicativo de la respuesta, no una subordinada causal independiente. Por eso el español fluye mejor sin una conjunción equivalente, manteniendo la estructura del dicho.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  lexicon: BDAG
  rationale: El dativo marca a los receptores de lo concedido. “A ustedes” es la forma más clara y natural en español.
- source_word: δέδοται
  english_pob_choice: it has been given
  chosen_spanish: se les ha dado
  alternatives_spanish:
  - les ha sido dado
  - se les ha concedido
  lexicon: BDAG
  rationale: El perfecto pasivo mantiene la idea de un acto previo con resultado presente. En español, la pasiva refleja “se les ha dado” preserva bien la forma pasiva y la reserva del agente implícito.
- source_word: γνῶναι
  english_pob_choice: to know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - entender
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa la capacidad/acto de llegar a conocer. “Conocer” funciona mejor en español bíblico para el acceso real a las realidades reveladas, sin reducirlo a mera comprensión intelectual.
- source_word: τὰ μυστήρια
  english_pob_choice: the mysteries
  chosen_spanish: los misterios
  alternatives_spanish:
  - los secretos
  - las verdades ocultas
  lexicon: BDAG
  rationale: “Misterios” conserva la categoría bíblica de realidades antes ocultas y ahora reveladas. “Secretos” es posible, pero puede sonar más coloquial y atenuar la densidad teológica del término.
- source_word: τῆς βασιλείας τῶν οὐρανῶν
  english_pob_choice: of the kingdom of heaven
  chosen_spanish: del reino de los cielos
  alternatives_spanish:
  - del reino del cielo
  - del reino de los cielos
  lexicon: BDAG
  rationale: La expresión mateana se vierte de forma tradicional y precisa como “reino de los cielos”. En español mantiene el sentido idiomático sin perder el matiz reverente del giro semítico.
- source_word: ἐκείνοις
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a esos
  - a aquellos
  lexicon: BDAG
  rationale: El pronombre de contraste marca distancia respecto de los discípulos. “A ellos” conserva la oposición del texto y evita una paráfrasis innecesaria.
- source_word: οὐ δέδοται
  english_pob_choice: it has not been given
  chosen_spanish: no se les ha dado
  alternatives_spanish:
  - no les ha sido dado
  - no se les ha concedido
  lexicon: BDAG
  rationale: 'Se mantiene el paralelo con la primera cláusula y el mismo perfecto pasivo. La negación preserva la tensión: el acceso a estos misterios no depende del grupo opuesto sino de un don no concedido.'
theological_decisions:
- issue: Agente implícito en el pasivo divino
  english_pob_reading: Retain the divine passive without naming God explicitly
  chosen_spanish_reading: Conservar la pasiva impersonal/reflexiva sin nombrar a Dios explícitamente
  alternative_spanish_readings:
  - Dios les ha dado conocer...
  - Dios no se lo ha dado a ellos
  rationale: El griego usa pasivo perfecto y deja implícito al dador. El español mantiene esa reserva con “se les ha dado”, evitando interpretar de más y preservando el tono reverencial del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de μυστήρια en contexto del reino
  english_pob_reading: Render as 'mysteries' rather than reducing to a narrower interpretive gloss
  chosen_spanish_reading: Renderizar como “misterios” y no reducirlo a “secretos”
  alternative_spanish_readings:
  - secretos
  - verdades ocultas
  rationale: “Misterios” preserva la categoría bíblica de realidades divinamente reveladas. “Secretos” puede funcionar, pero baja el registro teológico y puede sonar demasiado informal en español.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail en inglés: se evita una causalidad implícita en Ὅτι, se conserva el pasivo divino sin explicitar al dador, y se mantiene el paralelismo entre “se les ha dado” y “no se les ha dado”.'
  spanish_consistency_notes:
  - Se usa “misterios” de manera consistente con la decisión léxica documentada para μυστήρια.
  - Se emplea “reino de los cielos” por ser la equivalencia mateana estándar y fiel al giro original.
  - Se conserva la distancia de contraste con “a ellos”/“a ustedes”, sin intensificarla artificialmente.
  - La pasiva refleja “se les ha dado” mantiene la reserva del agente implícito, en línea con el POB inglés.
