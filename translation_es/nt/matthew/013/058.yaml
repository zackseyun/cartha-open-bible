translation:
  language: es
  text: Y no hizo allí muchas obras poderosas[a] por su incredulidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos milagros» o «muchas obras de poder». El término griego se refiere a hechos de poder y, en este contexto, apunta a obras milagrosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ οὐκ
  english_pob_choice: And he did not
  chosen_spanish: Y no hizo
  alternatives_spanish:
  - Así que no hizo
  - Y no realizó
  lexicon: BDAG
  rationale: καὶ continúa la narración y οὐκ niega el verbo aoristo. En español, «Y no hizo» conserva la secuencia narrativa sin añadir una inferencia causal o conclusiva que el griego no expresa.
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - efectuó
  lexicon: BDAG
  rationale: ποιέω es un verbo amplio de «hacer/realizar». En esta construcción, «hizo» es natural en español y mantiene la sobriedad del aoristo sin forzar un matiz técnico.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: La forma adverbial local se traduce de manera directa como «allí», que es idiomática y fiel al valor de lugar del término.
- source_word: δυνάμεις πολλὰς
  english_pob_choice: many mighty works
  chosen_spanish: muchos hechos poderosos
  alternatives_spanish:
  - muchos milagros
  - muchas obras de poder
  lexicon: BDAG
  rationale: δυνάμεις en contextos de milagros designa actos o manifestaciones de poder. «Hechos poderosos» preserva el vínculo con «poder» sin reducirlo de entrada a «milagros», manteniendo la tensión lexical que el inglés POB también documenta.
- source_word: διὰ τὴν ἀπιστίαν αὐτῶν
  english_pob_choice: because of their unbelief
  chosen_spanish: debido a la incredulidad de ellos
  alternatives_spanish:
  - a causa de su incredulidad
  - por su incredulidad
  - por falta de fe
  lexicon: BDAG
  rationale: διά con acusativo expresa causa aquí. «Debido a» comunica la relación causal con claridad. «Incredulidad» conserva el sentido fuerte de ἀπιστία; «de ellos» refleja el genitivo pronominal sin reinterpretarlo como un posesivo más idiomático que pudiera suavizar la referencia.
theological_decisions:
- issue: Si el verso debe sugerir incapacidad o simple no ejecución de obras poderosas
  english_pob_reading: 'The translation renders the statement as non-performance: ''he did not do many mighty works there because of their unbelief.'''
  chosen_spanish_reading: 'La traducción expresa no ejecución: «no hizo allí muchos hechos poderosos debido a la incredulidad de ellos».'
  alternative_spanish_readings:
  - no pudo hacer allí muchos milagros
  - no realizó allí muchas obras de poder
  rationale: El griego dice οὐκ ἐποίησεν, «no hizo», no un verbo de incapacidad. Por eso se evita una traducción que afirme que no pudo. A la vez, «hechos poderosos» mantiene abierta la referencia a obras milagrosas sin resolverla más allá de lo que el texto dice.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del contexto auditado y mantiene la misma decisión central del inglés POB: no expresar incapacidad, sino no ejecución de muchos hechos poderosos a causa de la incredulidad. No se registraron revisiones aplicadas en el expediente, así que no hay cambios previos que incorporar.'
  spanish_consistency_notes:
  - Se conservó una sintaxis breve y narrativa, coherente con el registro de los Evangelios.
  - Se evitó «SEÑOR» o terminología eclesiástica añadida, porque el verso no contiene referencias nominales que lo requieran.
  - «Hechos poderosos» se eligió para mantener la amplitud semántica de δυνάμεις y dejar visible la alternativa milagrosa en nota, como en el inglés auditado.
