review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa del griego y la petición de los discípulos, pero tiene dos problemas de fidelidad/forma: (1) la nota [a] está anclada a «Entonces», aunque el contenido de la nota trata del participio ἀφεὶς («después de dejar»), no de Τότε; y (2) «fue a la casa» debilita εἰς τὴν οἰκίαν, que expresa entrada o movimiento hacia el interior. El resto de las decisiones principales son defendibles: «se acercaron a él» para προσῆλθον αὐτῷ, «Explícanos» para Διασάφησον ἡμῖν, y «cizaña» para ζιζάνια.'
  spanish_quality_summary: El español es claro y eclesialmente legible. Sin embargo, la colocación de la nota [a] resulta confusa, y «fue a la casa» suena menos preciso que «entró en la casa» o «fue a la casa» con matiz de destino externo. Además, la nota [b] como alternativa repite exactamente la frase ya usada en el texto, por lo que no funciona como alternativa real; conviene conservar la nota léxica pero ofreciendo una alternativa verdadera como «mala hierba» o «darnel».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Parábola» y «cizaña» están bien alineadas. El uso de «multitudes» es aceptable aunque «las multitudes» suena un poco más tradicional que «la gente» o «las multitudes/crowds»; no requiere cambio. No aparecen términos del glosario mayor como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al término equivocado.
    rationale: El marcador aparece en «Entonces[a]», pero la nota explica la formulación de ἀφεὶς («tras/depués de dejar»). Esto crea una desalineación entre texto y nota.
  - severity: medium
    issue: «Fue a la casa» no expresa con suficiente precisión εἰς τὴν οἰκίαν.
    rationale: El griego indica movimiento hacia/into la casa; en español, «entró en la casa» comunica mejor la idea que «fue a la casa», que puede sugerir solo dirección general.
  - severity: low
    issue: La nota [b] repite el texto principal como supuesta alternativa.
    rationale: La nota dice «O “la parábola de la cizaña del campo”», que es idéntico al texto principal. Una nota léxica útil debe aportar una alternativa real o una aclaración semántica.
  revised_spanish_text: 'Entonces, después de dejar[a] a las multitudes, entró en la casa. Y sus discípulos se acercaron a él, diciendo: «Explícanos la parábola de la cizaña del campo»[b].'
  revised_footnotes:
  - marker: a
    text: O «tras dejar a las multitudes». El participio griego expresa una acción anterior a la principal, y en español puede traducirse con varias formulaciones idiomáticas.
    reason: alternative_reading
  - marker: b
    text: O «la parábola de las malas hierbas del campo»; el término griego ζιζάνια puede referirse más específicamente al darnel, una hierba parecida al trigo.
    reason: lexical_alternative
