revisions:
- from: 'Entonces[a], después de dejar a las multitudes, fue a la casa. Y sus discípulos se acercaron a él, diciendo: «Explícanos la parábola de la cizaña del campo»[b].'
  to: 'Entonces, después de dejar[a] a las multitudes, entró en la casa. Y sus discípulos se acercaron a él, diciendo: «Explícanos la parábola de la cizaña del campo»[b].'
  rationale: Se reubica la nota [a] junto a la expresión que realmente comenta, se ajusta «fue a la casa» a «entró en la casa» para reflejar mejor εἰς τὴν οἰκίαν, y se corrige la nota [b] para que ofrezca una alternativa léxica real y útil sin perder la precisión de «cizaña».
