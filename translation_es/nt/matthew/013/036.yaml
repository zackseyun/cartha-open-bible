translation:
  language: es
  text: 'Entonces, después de dejar[a] a las multitudes, entró en la casa. Y sus discípulos se acercaron a él, diciendo: «Explícanos la parábola de la cizaña del campo»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tras dejar a las multitudes». El participio griego expresa una acción anterior a la principal, y en español puede traducirse con varias formulaciones idiomáticas.
    reason: alternative_reading
  - marker: b
    text: O «la parábola de las malas hierbas del campo»; el término griego ζιζάνια puede referirse más específicamente al darnel, una hierba parecida al trigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel momento
  - Luego
  lexicon: BDAG
  rationale: Marca temporal narrativa de secuencia; «Entonces» es natural en español y conserva el avance del relato.
- source_word: ἀφεὶς τοὺς ὄχλους
  english_pob_choice: after leaving the crowds
  chosen_spanish: después de dejar a las multitudes
  alternatives_spanish:
  - tras dejar a la multitud
  - habiendo dejado a las multitudes
  lexicon: BDAG
  rationale: El participio aoristo expresa acción anterior a la principal. «Después de dejar» comunica bien la relación temporal sin forzar el español.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - la multitud
  - las gentes
  lexicon: BDAG
  rationale: ὄχλους está en plural; «multitudes» preserva ese matiz mejor que un singular colectivo, y sigue siendo natural en español.
- source_word: ἦλθεν εἰς τὴν οἰκίαν
  english_pob_choice: he went into the house
  chosen_spanish: fue a la casa
  alternatives_spanish:
  - entró en la casa
  - fue dentro de la casa
  lexicon: BDAG
  rationale: El griego indica movimiento hacia el interior/espacio de la casa. En español, «fue a la casa» es fluido y suficientemente fiel; «la casa» retiene el artículo definido del texto griego.
- source_word: προσῆλθον αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se le acercaron
  lexicon: BDAG
  rationale: προσέρχομαι tiene sentido de aproximarse; «se acercaron a él» conserva ese matiz de movimiento hacia Jesús y suena natural en español.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: La relación posesiva es clara y la forma posesiva española es la más idiomática.
- source_word: Διασάφησον
  english_pob_choice: Explain
  chosen_spanish: Explícanos
  alternatives_spanish:
  - Acláranos
  - Interprétanos
  lexicon: BDAG
  rationale: El imperativo pide una explicación clara. «Explicarnos» refleja bien la petición directa y es más natural que «interpretar», que sería más específico de lo que exige el griego.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: BDAG
  rationale: 'El dativo de destinatario se expresa naturalmente en español como objeto enclítico con el imperativo: «Explícanos».'
- source_word: τὴν παραβολὴν
  english_pob_choice: the parable
  chosen_spanish: la parábola
  alternatives_spanish:
  - la comparación
  - la alegoría
  lexicon: BDAG
  rationale: En el contexto de los evangelios, παραβολή se traduce de forma consistente como «parábola», preservando el género literario.
- source_word: τῶν ζιζανίων
  english_pob_choice: of the weeds
  chosen_spanish: de la cizaña
  alternatives_spanish:
  - de las malas hierbas
  - de la darnel
  lexicon: BDAG
  rationale: ζιζάνια puede referirse específicamente a la cizaña o darnel. «Cizaña» es la equivalencia tradicional y precisa en español, y mantiene la tensión lexical mejor que una generalización como «malas hierbas».
- source_word: τοῦ ἀγροῦ
  english_pob_choice: of the field
  chosen_spanish: del campo
  alternatives_spanish:
  - del terreno
  - del sembrado
  lexicon: BDAG
  rationale: ἀγρός denota campo/terreno agrícola. «Del campo» es la forma más natural y mantiene el vínculo agrícola del contexto.
translation_notes:
  revision_awareness: Coincide con el pasaje griego y con la decisión inglesa de leer el movimiento narrativo como secuencia temporal, y ζιζάνια como un término de maleza específico con alternativa tradicional preservable en nota. No se detectaron revisiones aplicadas en el expediente inglés.
  spanish_consistency_notes:
  - Se mantuvo «parábola» para παραβολή por coherencia con el evangelio.
  - Se usó «cizaña» para ζιζάνια, reservando la alternativa más general en nota para reflejar el rango semántico del término.
  - Se conservó un estilo narrativo sobrio y cercano al griego sin calco excesivo.
