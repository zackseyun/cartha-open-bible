translation:
  language: es
  text: Entonces los justos resplandecerán como el sol en el reino de su Padre[a]. El que tiene oídos[b], que oiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «resplandecerán con fulgor». El verbo griego puede expresar brillo que sale o resplandece con fuerza.
    reason: lexical_alternative
  - marker: b
    text: 'La expresión griega está en singular representativo: «el que tiene oídos, que oiga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca la secuencia escatológica. «Entonces» es natural en español y conserva el valor temporal sin añadir interpretación.
- source_word: οἱ δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  lexicon: BDAG
  rationale: δίκαιοι funciona sustantivamente; «los justos» reproduce bien el campo moral y judicial/covenantal, y es una equivalencia estable en español bíblico sin diluir la categoría.
- source_word: ἐκλάμψουσιν
  english_pob_choice: will shine
  chosen_spanish: resplandecerán
  alternatives_spanish:
  - brillarán
  - resplandecerán con fulgor
  lexicon: BDAG
  rationale: El verbo implica brillo que sale hacia afuera. «Resplandecerán» conserva esa fuerza más plenamente que un simple «brillarán», y sigue siendo idiomático en español.
- source_word: ὡς ὁ ἥλιος
  english_pob_choice: like the sun
  chosen_spanish: como el sol
  alternatives_spanish:
  - como el astro
  - como el sol mismo
  lexicon: BDAG
  rationale: La comparación es directa; «como el sol» conserva la imagen sin sobreexplicar.
- source_word: ἐν τῇ βασιλείᾳ
  english_pob_choice: in the kingdom
  chosen_spanish: en el reino
  alternatives_spanish:
  - en la realeza
  - en el reinado
  lexicon: BDAG
  rationale: Aquí βασιλεία se entiende mejor como esfera/reino en que ocurre la acción final. «Reino» mantiene la imagen escatológica y la naturalidad del español.
- source_word: τοῦ πατρὸς αὐτῶν
  english_pob_choice: of their Father
  chosen_spanish: de su Padre
  alternatives_spanish:
  - de su Padre celestial
  - de su Padre
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma natural en español con «de su Padre». Se evita añadir «celestial» porque no está en el texto griego de este versículo.
- source_word: ὁ ἔχων ὦτα
  english_pob_choice: He who has ears
  chosen_spanish: El que tiene oídos
  alternatives_spanish:
  - Quien tenga oídos
  - El que tenga oídos
  lexicon: BDAG
  rationale: El participio singular masculino se rinde con una construcción representativa singular natural en español. «El que tiene oídos» preserva la forma y el llamado solemne al discernimiento.
- source_word: ἀκουέτω
  english_pob_choice: let him hear
  chosen_spanish: que oiga
  alternatives_spanish:
  - oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo tercero singular se expresa de modo directo y solemne con «que oiga». «Escuche» podría sonar más contemporáneo, pero «oiga» mantiene mejor la resonancia bíblica y la relación con «oídos».
theological_decisions:
- issue: Valor representativo del singular masculino en la exhortación final
  english_pob_reading: He who has ears, let him hear.
  chosen_spanish_reading: El que tiene oídos, que oiga.
  alternative_spanish_readings:
  - Quien tenga oídos, oiga.
  - El que tenga oídos, que oiga.
  rationale: Se conserva el singular representativo del griego (ὁ ἔχων ... ἀκουέτω) sin neutralizarlo a plural. En español, la construcción con «el que» comunica bien la forma genérica y solemne del dicho.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Sentido de βασιλεία en contexto escatológico
  english_pob_reading: in the kingdom of their Father
  chosen_spanish_reading: en el reino de su Padre
  alternative_spanish_readings:
  - en la realeza de su Padre
  - en el reinado de su Padre
  rationale: «Reino» refleja mejor la imagen locativa del texto y su marco escatológico. «Reinado» podría expresar el aspecto dinámico de soberanía, pero aquí la escena describe un ámbito en el que los justos resplandecen.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail en inglés, que ajustó la cláusula final a una forma singular masculina más natural y formal. También se tuvo en cuenta la nota léxica de ἐκλάμψουσιν, manteniendo en español un verbo que conserve la idea de resplandor intenso sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton; por eso no aplica aquí.
  - Se usó «reino» para βασιλεία en coherencia con el criterio del audit trail inglés y con el estilo bíblico del proyecto.
  - «Justos» traduce δίκαιοι con una forma sustantivada natural en español y no se sustituyó por «rectos» para no debilitar la carga legal/covenantal del término.
  - La clausula final conserva el imperativo singular representativo y el vínculo semántico con «oídos» mediante «que oiga».
