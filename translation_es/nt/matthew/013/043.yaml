  glossary_alignment: No hay términos del glosario global en conflicto. «Justos», «reino», «Padre» y «oiga» concuerdan con las decisiones auditadas. La elección de «resplandecerán» corresponde bien al matiz de ἐκλάμψουσιν, y la nota alternativa preserva adecuadamente el posible valor de «shine forth».
