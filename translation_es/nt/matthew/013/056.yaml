translation:
  language: es
  text: ¿No están todas sus hermanas con nosotros? ¿De dónde, pues, sacó este hombre todas estas cosas?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes femeninas». El griego normalmente significa «hermanas» aquí, pero algunos lo interpretan de manera más amplia a la luz de debates teológicos posteriores.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀδελφαὶ
  english_pob_choice: sisters
  chosen_spanish: hermanas
  alternatives_spanish:
  - parientes femeninas
  - mujeres de la familia
  lexicon: BDAG
  rationale: El sentido ordinario y directo del plural familiar es el que mejor corresponde al contexto del pueblo hablando de la familia de Jesús. “Hermanas” preserva ese valor sin introducir una explicación doctrinal ajena al texto.
- source_word: οὐχὶ πᾶσαι
  english_pob_choice: are not all
  chosen_spanish: ¿No están todas...
  alternatives_spanish:
  - ¿No son todas...
  - ¿Acaso no están todas...
  lexicon: BDAG
  rationale: La combinación plantea una pregunta retórica que espera asentimiento. “¿No están todas...?” conserva la fuerza interrogativa y el énfasis en la totalidad.
- source_word: πρὸς ἡμᾶς
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - entre nosotros
  - aquí con nosotros
  lexicon: BDAG
  rationale: La preposición con pronombre personal expresa cercanía o pertenencia al grupo. “Con nosotros” es natural en español y mantiene la idea de presencia/comunidad.
- source_word: πόθεν
  english_pob_choice: Where then did
  chosen_spanish: ¿De dónde, pues, sacó...
  alternatives_spanish:
  - ¿De dónde entonces obtuvo...
  - ¿Cómo es que sacó...
  lexicon: BDAG
  rationale: πόθεν pregunta por procedencia u origen. “¿De dónde... sacó...?” comunica bien el origen de “estas cosas” y suena natural en español.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Aquí introduce la inferencia del razonamiento de la multitud. “Pues” mantiene ese enlace lógico sin volver la frase demasiado formal.
- source_word: τούτῳ
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este sujeto
  lexicon: BDAG
  rationale: El demostrativo en dativo se refiere a Jesús con un matiz algo despectivo. “Este hombre” reproduce ese tono de manera idiomática en español.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - estas cosas todas
  lexicon: BDAG
  rationale: La frase apunta de modo amplio a la sabiduría y las obras mencionadas en el contexto. “Todas estas cosas” conserva el plural y la amplitud del griego.
theological_decisions:
- issue: Alcance de ἀδελφαὶ respecto de la familia de Jesús
  english_pob_reading: Translate ἀδελφαὶ in its ordinary lexical sense as 'sisters' without importing a doctrinal explanation about broader kinship or perpetual virginity.
  chosen_spanish_reading: Traducir ἀδελφαὶ como “hermanas” en su sentido ordinario, sin resolver debates doctrinales posteriores sobre parentesco ampliado.
  alternative_spanish_readings:
  - parientes femeninas
  - primas
  rationale: El texto griego, por sí mismo, usa el término familiar normal y no obliga a suavizarlo. La traducción debe reflejar esa sencillez léxica y dejar la tensión interpretativa abierta.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente y con la revisión más reciente: no se requieren cambios sustanciales. Se mantuvo la lectura directa de ἀδελφαὶ como “hermanas”, el valor retórico de οὐχὶ πᾶσαι y el matiz despectivo de τούτῳ en “este hombre”.'
  spanish_consistency_notes:
  - Se usó “Yahvé” como convención general del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió “hermanas” en vez de una paráfrasis de parentesco para no borrar la tensión léxica documentada.
  - “Todas estas cosas” conserva el plural del griego y evita reducir el alcance a una sola referencia.
