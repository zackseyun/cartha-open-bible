revisions:
- from: 'Entonces se acercaron los esclavos[a] del dueño de la casa y le dijeron: «Señor, ¿no sembraste buena semilla en tu campo? ¿De dónde, pues, tiene maleza?»'
  to: 'Entonces se acercaron los esclavos[a] del dueño de la casa y le dijeron: «Señor, ¿no sembraste buena semilla en tu campo? ¿De dónde, pues, salen las malas hierbas?»'
  rationale: Se corrige la pregunta final para que exprese de forma natural en español la procedencia implícita en πόθεν οὖν y la solución auditada inglesa («do the weeds come from»). También se cambia «maleza» por «malas hierbas» para reflejar mejor el plural concreto de ζιζάνια y mantener «cizaña» como alternativa tradicional en nota. Los demás términos principales del proyecto ya estaban bien alineados.
