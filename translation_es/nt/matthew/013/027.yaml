    changes_summary: 'Changed ‘slaves’ to ‘servants’ for more natural formal register here, and revised the final question from ‘Where then does it have weeds?’ to ‘Where then do the weeds come from?’ to reflect the Greek more naturally and accurately. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Entonces se acercaron los esclavos[a] del dueño de la casa y le dijeron: «Señor, ¿no sembraste buena semilla en tu campo? ¿De dónde, pues, salen las malas hierbas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cizaña»; el término griego probablemente se refiere al darnel, una mala hierba que se parece al trigo en sus primeras etapas.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: came to him
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron a él
  - se acercaron a él
  lexicon: BDAG
  rationale: 'El participio aoristo con valor antecedente se expresa de forma natural en español como acción previa: ‘se acercaron’. Mantiene el movimiento hacia el interlocutor sin sobrecargar la frase.'
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: En este contexto parabólico, la fuerza de δοῦλοι como personas bajo autoridad del amo se conserva mejor con ‘esclavos’. Evita suavizar el vínculo de dependencia que el griego presenta.
- source_word: οἰκοδεσπότου
  english_pob_choice: master of the house
  chosen_spanish: dueño de la casa
  alternatives_spanish:
  - amo de la casa
  - padre de familia
  - dueño de la hacienda
  lexicon: BDAG
  rationale: ‘Dueño de la casa’ comunica con claridad la autoridad doméstica del término griego y su relación con los esclavos del relato. ‘Ama/amo’ es posible, pero ‘dueño’ resulta más natural en español moderno sin perder la idea de propiedad y gobierno.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - señor
  lexicon: BDAG
  rationale: Se conserva la forma reverencial usual para κύριε. En este diálogo parábolico funciona como tratamiento respetuoso al dueño de la casa, y ‘Señor’ sigue siendo la opción más fiel y reconocible.
- source_word: οὐχὶ
  english_pob_choice: did you not
  chosen_spanish: ¿no
  alternatives_spanish:
  - ¿acaso no
  - ¿no es cierto que
  lexicon: BDAG
  rationale: La partícula introduce una pregunta que espera respuesta afirmativa. En español, ‘¿no sembraste…?’ conserva esa fuerza sin necesidad de una construcción más pesada.
- source_word: καλὸν σπέρμα
  english_pob_choice: good seed
  chosen_spanish: buena semilla
  alternatives_spanish:
  - semilla buena
  - semilla excelente
  lexicon: BDAG
  rationale: ‘Semilla’ es la equivalencia natural de σπέρμα en este contexto agrícola, y ‘buena’ reproduce el adjetivo sin añadir matiz interpretativo.
- source_word: ἔσπειρας
  english_pob_choice: sow
  chosen_spanish: sembraste
  alternatives_spanish:
  - sembraste tú
  - plantaste
  lexicon: BDAG
  rationale: σπείρω significa propiamente ‘sembrar’; ‘sembraste’ conserva el sentido preciso y la forma verbal española fluye bien en la pregunta directa.
- source_word: ἐν τῷ σῷ ἀγρῷ
  english_pob_choice: in your field
  chosen_spanish: en tu campo
  alternatives_spanish:
  - en tu propio campo
  - en tu terreno
  lexicon: BDAG
  rationale: La posesión se expresa de manera simple y natural con ‘tu campo’. No se necesita añadir ‘propio’, porque la relación posesiva ya está clara.
- source_word: πόθεν οὖν
  english_pob_choice: Where then
  chosen_spanish: ¿De dónde, pues
  alternatives_spanish:
  - ¿de dónde entonces
  - ¿de dónde, entonces
  lexicon: BDAG
  rationale: πόθεν pregunta por origen o procedencia. ‘¿De dónde, pues?’ preserva esa idea y el valor inferencial de οὖν, con un orden natural en español.
- source_word: ἔχει
  english_pob_choice: does it have
  chosen_spanish: tiene
  alternatives_spanish:
  - hay
  - aparece
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente ‘tiene’, en español resulta más idiomático mantener la misma idea con ‘tiene maleza’, evitando una reformulación excesiva y conservando la personificación del campo.
- source_word: ζιζάνια
  english_pob_choice: weeds
  chosen_spanish: maleza
  alternatives_spanish:
  - hierbas malas
  - cizaña
  lexicon: BDAG
  rationale: ζιζάνια designa malas hierbas dañinas; ‘maleza’ es amplio y claro en español moderno. Se evita ‘cizaña’ como único término principal porque puede sonar más figurado o tradicional que descriptivo; la ambigüedad se documenta en nota.
theological_decisions:
- issue: Rendering of δοῦλοι in a parabolic household context
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La parábola presenta una relación real de subordinación dentro de la casa del amo. ‘Esclavos’ mantiene esa fuerza social y evita suavizar el término hacia un lenguaje más neutral que no está en el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος
- issue: Rendering of κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - señor
  rationale: Se conserva el tratamiento reverencial estándar para κύριε. En este pasaje no hay razón contextual suficiente para apartarse de la equivalencia establecida, aunque el interlocutor sea un amo humano.
  doctrine_reference: DOCTRINE.md Contested terms table for κύριος
- issue: Rendering of ζιζάνια
  english_pob_reading: weeds
  chosen_spanish_reading: maleza
  alternative_spanish_readings:
  - cizaña
  - hierbas malas
  - darnel
  rationale: El término griego puede referirse a una hierba nociva específica o, más ampliamente, a mala hierba. ‘Maleza’ comunica bien el sentido general en español; la nota preserva la alternativa tradicional ‘cizaña’ y la referencia botánica a darnel sin imponerla en el texto principal.
  doctrine_reference: POB lexical policy on preserving meaningful alternatives; Matthew 13:27 audit trail
translation_notes:
  revision_awareness: 'El texto sigue la última restauración del audit trail que revirtió δοῦλος de ‘servants’ a ‘slaves’; por eso se mantiene ‘esclavos’ en el español. También incorpora la corrección final del cierre interrogativo para reflejar mejor el griego: no se pregunta dónde ‘lo tiene’, sino de dónde ‘tiene’ maleza. En español, esto se expresa de forma natural como ‘¿De dónde, pues, tiene maleza?’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene ‘Señor’ para κύριε conforme a la política del proyecto y al valor reverencial del vocativo.
  - ‘Esclavos’ preserva la fuerza de δοῦλοι, alineado con la terminología POB documentada.
  - ‘Maleza’ traduce ζιζάνια con claridad moderna; la nota conserva la alternativa ‘cizaña’ para el trasfondo lexical.
