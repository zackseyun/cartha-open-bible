review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: los esclavos del dueño de la casa se acercan, lo llaman «Señor», recuerdan la siembra de buena semilla en su campo y preguntan por el origen de las malas hierbas. Se preservan correctamente δοῦλοι → «esclavos», κύριε → «Señor», καλὸν σπέρμα → «buena semilla» y ἐν τῷ σῷ ἀγρῷ → «en tu campo». Sin embargo, la cláusula final no es fiel al sentido más natural auditado de πόθεν οὖν ἔχει ζιζάνια, porque «¿De dónde, pues, tiene maleza?» suena poco idiomático y no comunica bien la pregunta por procedencia/origen que el inglés auditado expresó como «Where then do the weeds come from?».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la pregunta final resulta forzada y poco natural. «Tiene maleza» además usa un sustantivo colectivo singular donde el griego y la auditoría preservan la idea de malezas/malas hierbas en plural. Conviene cambiar a una formulación idiomática que pregunte por procedencia: «¿De dónde, pues, salen las malas hierbas?» o similar. También es preferible ajustar la nota para que no introduzca innecesariamente el anglicismo botánico «darnel» sin aclaración suficiente en español.'
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto en los puntos clave: δοῦλοι → «esclavos» conforme a la política; κύριος/κύριε → «Señor»; no hay conflictos con Yahvé/Mesías u otros términos doctrinales. La única desalineación relevante es léxico-estilística en ζιζάνια/ἔχει: «maleza» y «tiene maleza» no siguen bien la solución auditada orientada a «weeds» con nota alternativa «tares/darnel». En español, «malas hierbas» en el texto y «cizaña» en nota preservan mejor claridad y alternativa tradicional.'
  issues:
  - severity: medium
    issue: La pregunta final «¿De dónde, pues, tiene maleza?» es poco idiomática y oscurece el sentido.
    rationale: Aunque ἔχει es literalmente «tiene», la auditoría inglesa ya estableció que en esta construcción la mejor equivalencia natural expresa origen de las hierbas. En español, «tiene maleza» suena extraño en una pregunta de procedencia y debilita πόθεν («de dónde»).
  - severity: low
    issue: «maleza» no refleja tan bien como «malas hierbas» el plural concreto de ζιζάνια.
    rationale: ζιζάνια es plural y en esta parábola se refiere a plantas dañinas entre el trigo. «Maleza» es entendible, pero más genérica/colectiva; «malas hierbas» comunica mejor el referente agrícola y deja «cizaña» como alternativa de nota.
  - severity: low
    issue: La nota con «darnel» podría aclararse mejor para lectores hispanohablantes.
    rationale: La evidencia inglesa preserva esa referencia botánica, pero en español conviene formularla como explicación secundaria, no como préstamo desnudo menos transparente.
  revised_spanish_text: 'Entonces se acercaron los esclavos[a] del dueño de la casa y le dijeron: «Señor, ¿no sembraste buena semilla en tu campo? ¿De dónde, pues, salen las malas hierbas?»'
  revised_footnotes:
  - marker: a
    text: O «cizaña»; el término griego probablemente se refiere al darnel, una mala hierba que se parece al trigo en sus primeras etapas.
    reason: lexical_alternative
  revision_rationale: Se corrige la pregunta final para que exprese de forma natural en español la procedencia implícita en πόθεν οὖν y la solución auditada inglesa («do the weeds come from»). También se cambia «maleza» por «malas hierbas» para reflejar mejor el plural concreto de ζιζάνια y mantener «cizaña» como alternativa tradicional en nota. Los demás términos principales del proyecto ya estaban bien alineados.
