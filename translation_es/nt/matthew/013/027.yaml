  text: προσελθόντες δὲ οἱ δοῦλοι τοῦ οἰκοδεσπότου εἶπον αὐτῷ· Κύριε, οὐχὶ καλὸν σπέρμα ⸀ἔσπειρας ἐν τῷ σῷ ἀγρῷ; πόθεν οὖν ἔχει ζιζάνια;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/013/027.yaml
  text: So the slaves of the master of the house came to him and said[a], ‘Lord, did you not sow good seed in your field? Where then do the weeds come from?’
  footnotes:
  - marker: a
    text: Or “tares”; the Greek term likely refers to darnel, a weed that resembles wheat in its early stages.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
