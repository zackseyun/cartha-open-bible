translation:
  language: es
  text: Pero cuando las plantas habían brotado y dado grano[a], entonces aparecieron también las malas hierbas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cizaña»; quizá una mala hierba específica, como el darnel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: ὅτε introduce la cláusula temporal 'cuando', y δέ añade una leve transición contrastiva. 'Pero cuando' conserva esa progresión narrativa natural en español.
- source_word: ἐβλάστησεν
  english_pob_choice: had sprouted
  chosen_spanish: había brotado
  alternatives_spanish:
  - brotó
  - había echado brotes
  - creció
  lexicon: BDAG
  rationale: El aoristo de βλαστάνω comunica la salida inicial del crecimiento. 'Había brotado' preserva bien la anterioridad en relación con el siguiente evento narrativo.
- source_word: ὁ χόρτος
  english_pob_choice: the plants
  chosen_spanish: la hierba
  alternatives_spanish:
  - el pasto
  - las plantas
  - la vegetación
  lexicon: BDAG
  rationale: χόρτος puede referirse a hierba o vegetación baja. En esta parábola agrícola, 'la hierba' mantiene la imagen del campo sin forzar una especie concreta antes de que aparezca el grano.
- source_word: καρπὸν ἐποίησεν
  english_pob_choice: produced grain
  chosen_spanish: dado grano
  alternatives_spanish:
  - producido fruto
  - dado fruto
  - producido grano
  lexicon: BDAG
  rationale: Literalmente significa 'hizo fruto', pero el contexto del campo hace que 'grano' sea la equivalencia más natural. 'Dado grano' conserva la idea de rendimiento agrícola sin volverla una paráfrasis amplia.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: BDAG
  rationale: τότε marca el siguiente paso de la secuencia narrativa; 'entonces' es el adverbio temporal directo y claro en español.
- source_word: ἐφάνη
  english_pob_choice: appeared
  chosen_spanish: aparecieron
  alternatives_spanish:
  - se hicieron visibles
  - se vieron
  lexicon: BDAG
  rationale: El verbo expresa hacerse visibles o manifestarse. 'Aparecieron' es idiomático y mantiene la sencillez del original.
- source_word: τὰ ζιζάνια
  english_pob_choice: the weeds also
  chosen_spanish: las malas hierbas también
  alternatives_spanish:
  - las hierbas dañinas también
  - la cizaña también
  - las zizanias también
  lexicon: BDAG
  rationale: ζιζάνια designa malas hierbas, tradicionalmente 'cizaña'. 'Malas hierbas' comunica el sentido general con claridad; en esta versión se deja abierta la identificación botánica precisa.
theological_decisions:
- issue: Identificación de ζιζάνια
  english_pob_reading: Rendered generically as 'weeds' in the main text, with a footnote noting 'tares' and possibly darnel.
  chosen_spanish_reading: '''malas hierbas'' en el texto principal, con nota alternativa sobre ''cizaña'' y posible darnel.'
  alternative_spanish_readings:
  - cizaña
  - darnel
  - hierbas dañinas
  rationale: El verso no exige una determinación botánica precisa. En español, 'malas hierbas' transmite el sentido común del término sin perder la tensión lexical; la nota conserva la alternativa tradicional 'cizaña' y la posibilidad de un referente más específico.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: No se aplicaron revisiones recientes al contenido de esta línea; la propuesta sigue de cerca el texto griego y el criterio auditado de la POB en inglés, adaptando las equivalencias al español natural y manteniendo la alternativa botánica en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda, pero este versículo no lo contiene.
  - Se evitó 'SEÑOR' porque no aplica aquí.
  - '''Grano'' se eligió por el contexto agrícola de la parábola; ''fruto'' sería demasiado general.'
  - '''Malas hierbas'' mantiene la ambigüedad del griego y evita fijar innecesariamente ''cizaña'' en el texto principal.'
  - La puntuación sigue el ritmo narrativo del original con una sola cláusula temporal principal y dos eventos sucesivos.
