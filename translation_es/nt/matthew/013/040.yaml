translation:
  language: es
  text: Por tanto, así como se recoge la cizaña[a] y se quema con fuego, así será al final de la era[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más generalmente, ‘las malas hierbas’. El término griego se refiere a malezas dañinas, probablemente vallico.
    reason: lexical_alternative
  - marker: b
    text: O, tradicionalmente, ‘al fin del mundo’; el griego dice ‘de la era’.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ οὖν
  english_pob_choice: Therefore, just as
  chosen_spanish: Por tanto, así como
  alternatives_spanish:
  - Así que, así como
  - Por consiguiente, así como
  lexicon: BDAG
  rationale: ὥσπερ introduce la comparación (‘así como’) y οὖν marca conclusión o inferencia (‘por tanto’). La combinación española conserva ambos valores sin sonar forzada.
- source_word: συλλέγεται
  english_pob_choice: are gathered
  chosen_spanish: se recogen
  alternatives_spanish:
  - se juntan
  - son recogidas
  lexicon: BDAG
  rationale: El verbo pasivo/medio se expresa naturalmente en español con voz refleja impersonal. ‘Recogen’ mantiene la imagen agrícola de juntar para retirar o disponer.
- source_word: τὰ ζιζάνια
  english_pob_choice: the weeds
  chosen_spanish: las malas hierbas
  alternatives_spanish:
  - las hierbas dañinas
  - la cizaña
  lexicon: BDAG
  rationale: ζιζάνια designa malezas nocivas, probablemente darnel. ‘Malas hierbas’ es claro y natural en español; ‘cizaña’ es tradicional, pero puede sonar más específica o idiomática que el término griego en este contexto. Se mantiene la nota para la alternativa tradicional.
- source_word: πυρὶ καίεται
  english_pob_choice: burned with fire
  chosen_spanish: se queman con fuego
  alternatives_spanish:
  - se queman en el fuego
  - son consumidas por fuego
  lexicon: BDAG
  rationale: El dativo πυρί se conserva como complemento instrumental/associativo con ‘con fuego’, sin sobreinterpretarlo. ‘Se queman’ refleja el pasivo y suena natural en plural con el sujeto neutro plural tratado en español como plural.
- source_word: οὕτως ἔσται
  english_pob_choice: so it will be
  chosen_spanish: así será
  alternatives_spanish:
  - de este modo será
  - así ocurrirá
  lexicon: BDAG
  rationale: La frase compara el ejemplo con su cumplimiento futuro. ‘Así será’ es breve, natural y conserva la referencia prospectiva.
- source_word: ἐν τῇ συντελείᾳ
  english_pob_choice: at the end
  chosen_spanish: al fin
  alternatives_spanish:
  - en la consumación
  - al final
  lexicon: BDAG
  rationale: συντέλεια expresa culminación o consumación. ‘Al fin’ comunica la idea de término de manera idiomática en español, sin perder el matiz escatológico.
- source_word: τοῦ αἰῶνος
  english_pob_choice: of the age
  chosen_spanish: de la era
  alternatives_spanish:
  - del siglo
  - del mundo
  lexicon: BDAG
  rationale: αἰών se traduce aquí como un período histórico-redentivo, no como el mundo físico. ‘Era’ transmite esa idea temporal de forma comprensible en español y evita reducirlo a ‘mundo’. Se conserva en la nota la alternativa tradicional más amplia.
theological_decisions:
- issue: ἰών / escatología temporal
  english_pob_reading: of the age
  chosen_spanish_reading: de la era
  alternative_spanish_readings:
  - del mundo
  - de este siglo
  rationale: La lectura del POB en inglés preserva el sentido temporal-redentivo de αἰών. En español, ‘era’ comunica mejor ese marco que ‘mundo’, que desplaza el énfasis hacia lo espacial o material. No se impone un esquema escatológico más específico que el del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió la lectura auditada del POB en inglés sin cambios sustanciales: la comparación agrícola y la referencia escatológica quedan intactas, y la decisión clave fue adaptar ζιζάνια y αἰών a equivalentes españoles naturales pero fieles al alcance semántico documentado. No se introdujeron variantes textuales ni revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa ‘era’ para αἰών en coherencia con la decisión teológica de preservar el matiz temporal-redentivo.
  - ‘Malas hierbas’ evita una traducción demasiado técnica o arcaizante y es consistente con el registro moderno-digno pedido para español.
