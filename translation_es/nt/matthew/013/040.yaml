revisions:
- from: Por tanto, así como se recogen las malas hierbas[a] y se queman con fuego[b], así será al fin de la era.
  to: Por tanto, así como se recoge la cizaña[a] y se quema con fuego, así será al final de la era[b].
  rationale: Se ajusta el texto para usar ‘cizaña’, término más natural y reconocible en español bíblico para ζιζάνια, mientras la nota preserva la alternativa más general. Se mejora la fluidez con ‘al final de la era’. Se elimina el anglicismo ‘darnel’ de la nota y se reemplaza por ‘vallico’. También se quita la nota [b] del segmento ‘con fuego’ porque la nota documentada en inglés corresponde a ‘of the age/world’, no a πυρὶ καίεται.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:09:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura comparativa del griego (ὥσπερ… οὕτως), el valor inferencial de οὖν, la voz pasiva con sujeto plural en español, y la distinción escatológica de αἰών como ‘era’ en vez de ‘mundo’. Sin embargo, la nota léxica introduce inglés innecesario (‘darnel’), y ‘malas hierbas’ puede mejorarse a una opción más bíblica y precisa en español sin perder claridad.
  spanish_quality_summary: El español es claro y natural, pero ‘malas hierbas’ suena algo genérico para un contexto parabólico muy conocido donde ‘cizaña’ es comprensible y digna en español eclesial amplio. ‘Al fin de la era’ funciona, aunque ‘al final de la era’ suena más natural en español general. La nota con ‘darnel’ no es idiomática en español; conviene ‘vallico’ o una formulación más general.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión ‘de la era’ alinea correctamente con la razón teológica documentada para αἰών. No aparecen términos sensibles del glosario principal. Se recomienda usar ‘cizaña’ como alternativa principal o incluso en el texto por su alta inteligibilidad bíblica en español, manteniendo una nota explicativa para el sentido de maleza nociva.
  issues:
  - severity: medium
    issue: La nota [a] usa ‘darnel’, anglicismo no natural en español.
    rationale: La nota debe ser legible para lectores hispanos. Si se desea precisión botánica, ‘vallico’ sería mejor; si no, basta decir ‘una maleza nociva’.
  - severity: medium
    issue: ‘Malas hierbas’ es correcto pero demasiado genérico frente a un término bíblicamente asentado y comprensible en español.
    rationale: ζιζάνια refiere maleza dañina en este contexto parabólico; ‘cizaña’ comunica mejor la referencia tradicional sin ser arcaico en español bíblico. Puede mantenerse nota para explicar que probablemente se refiere a una maleza específica.
  - severity: low
    issue: ‘Al fin de la era’ es entendible, pero menos natural que ‘al final de la era’.
    rationale: La mejora es estilística; ambas opciones preservan συντέλεια τοῦ αἰῶνος, pero ‘al final’ fluye mejor en español contemporáneo.
  revised_spanish_text: Por tanto, así como se recoge la cizaña[a] y se quema con fuego, así será al final de la era[b].
  revised_footnotes:
  - marker: a
    text: O, más generalmente, ‘las malas hierbas’. El término griego se refiere a malezas dañinas, probablemente vallico.
    reason: lexical_alternative
  - marker: b
    text: O, tradicionalmente, ‘al fin del mundo’; el griego dice ‘de la era’.
    reason: alternative_reading
  revision_rationale: Se ajusta el texto para usar ‘cizaña’, término más natural y reconocible en español bíblico para ζιζάνια, mientras la nota preserva la alternativa más general. Se mejora la fluidez con ‘al final de la era’. Se elimina el anglicismo ‘darnel’ de la nota y se reemplaza por ‘vallico’. También se quita la nota [b] del segmento ‘con fuego’ porque la nota documentada en inglés corresponde a ‘of the age/world’, no a πυρὶ καίεται.
