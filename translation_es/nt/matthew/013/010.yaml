translation:
  language: es
  text: 'Entonces los discípulos se acercaron y le dijeron[a]: «¿Por qué les hablas en parábolas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se aproximaron»; el participio griego προσελθόντες destaca que los discípulos primero se acercaron a Jesús antes de hablar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: BDAG
  rationale: La partícula coordinante aquí avanza la narración; «Entonces» conserva ese flujo temporal de manera natural en español sin añadir contenido nuevo.
- source_word: προσελθόντες
  english_pob_choice: came up
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - se aproximaron
  - vinieron hacia él
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento hacia Jesús antes de hablar. «Se acercaron» conserva la cercanía implícita y funciona con naturalidad en español.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo identifica al grupo conocido. En griego no aparece un posesivo explícito, por eso se mantiene «los discípulos» sin añadir «sus».
- source_word: εἶπαν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le preguntaron
  - le hablaron
  lexicon: BDAG
  rationale: La forma griega dice literalmente «dijeron». En español, «le dijeron» permite introducir naturalmente la pregunta directa sin sobreinterpretar el verbo como «preguntaron».
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A causa de qué?
  - ¿Con qué fin?
  lexicon: BDAG
  rationale: Es la interrogativa estándar de causa o motivo. «¿Por qué» es la equivalencia natural y fiel en español.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - con parábolas
  - por medio de parábolas
  lexicon: BDAG
  rationale: La preposición ἐν con dativo expresa modo o medio. «En parábolas» conserva la forma habitual y clara del griego y del español bíblico.
- source_word: λαλεῖς
  english_pob_choice: do you speak
  chosen_spanish: les hablas
  alternatives_spanish:
  - les dices
  - estás hablando a ellos
  lexicon: BDAG
  rationale: λαλέω señala el acto de hablar. En esta pregunta directa, «les hablas» reproduce el presente y mantiene el sentido de discurso dirigido a ellos.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de modo natural con el clítico indirecto «les» en español, que evita redundancia y conserva la dirección del habla.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail en inglés muestran un alto grado de acuerdo: la revisión más reciente no introdujo cambios y el pasaje no presenta tensiones textuales o doctrinales relevantes en esta unidad.'
  spanish_consistency_notes:
  - Se mantiene el registro narrativo simple y directo, sin añadir títulos ni aclaraciones que no están en el griego.
  - Se evita el posesivo «sus» porque el griego no lo expresa explícitamente.
  - La pregunta se conserva en estilo de diálogo bíblico natural para español moderno, sin perder literalidad innecesariamente.
