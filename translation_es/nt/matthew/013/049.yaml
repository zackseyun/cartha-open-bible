translation:
  language: es
  text: 'Así será al fin de la era[a]: los ángeles saldrán y separarán a los malvados de entre los justos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la consumación de la era». Tradicionalmente se ha traducido «al fin del mundo», pero el griego dice αἰών, «era/edad», no κόσμος, «mundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: BDAG
  rationale: οὕτως introduce la explicación o resultado de la parábola. «Así» conserva esa fuerza inferencial en español sin volver la frase pesada o artificiosa.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - habrá de ser
  lexicon: BDAG
  rationale: El verbo funciona como futuro simple de una afirmación general. «Será» es natural y fiel al valor futuro del griego.
- source_word: ἐν τῇ συντελείᾳ τοῦ αἰῶνος
  english_pob_choice: at the end of the age
  chosen_spanish: al fin del siglo
  alternatives_spanish:
  - en la consumación del siglo
  - al fin de la era
  lexicon: BDAG
  rationale: Se conserva la decisión de no ocultar αἰών con «mundo». «Siglo» mantiene el sentido de orden/época presente, aunque en español eclesial puede sonar menos usual; por eso se elige «al fin del siglo» con una nota textual para el matiz de «edad/era».
- source_word: ἐξελεύσονται
  english_pob_choice: will go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - irán fuera
  - irán
  lexicon: BDAG
  rationale: El futuro de ἐξέρχομαι se expresa de forma directa y natural con «saldrán».
- source_word: οἱ ἄγγελοι
  english_pob_choice: the angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - los mensajeros
  lexicon: BDAG
  rationale: En este contexto escatológico se trata de seres celestiales, no de mensajeros humanos.
- source_word: ἀφοριοῦσιν
  english_pob_choice: separate
  chosen_spanish: separarán
  alternatives_spanish:
  - apartarán
  - pondrán aparte
  lexicon: BDAG
  rationale: El verbo denota separar o delimitar un grupo de otro. «Separarán» reproduce con claridad la acción judicial de distinguir y apartar.
- source_word: τοὺς πονηροὺς
  english_pob_choice: the wicked
  chosen_spanish: a los malos
  alternatives_spanish:
  - a los impíos
  - a los perversos
  lexicon: BDAG
  rationale: Aunque «malos» es menos fuerte que «impíos», aquí conserva el carácter moral del adjetivo sin sonar excesivamente marcado o arcaico en español general. Se evita un endurecimiento innecesario que podría exceder el registro de la frase.
- source_word: ἐκ μέσου
  english_pob_choice: from among
  chosen_spanish: de entre
  alternatives_spanish:
  - del medio de
  - de en medio de
  lexicon: BDAG
  rationale: La expresión indica separación desde un grupo mixto. «De entre» es la forma española más natural para ese valor distributivo-separativo.
- source_word: τῶν δικαίων
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: BDAG
  rationale: «Justos» puede equivaler a «righteous» y suena más natural que una perífrasis. Se conserva el lenguaje forense/covenantal sin sobrerreformularlo.
theological_decisions:
- issue: Valor de αἰών en la frase escatológica
  english_pob_reading: age
  chosen_spanish_reading: siglo / época presente
  alternative_spanish_readings:
  - mundo
  - era
  rationale: Se evita «mundo» porque impondría una lectura no requerida por el griego. «Siglo» no es la opción más común hoy, pero conserva la distinción entre el orden presente y la creación material.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identidad de οἱ ἄγγελοι
  english_pob_reading: heavenly angels
  chosen_spanish_reading: ángeles celestiales
  alternative_spanish_readings:
  - mensajeros
  - ángeles
  rationale: El contexto del juicio final en la explicación de la parábola exige seres celestiales. El texto principal deja simplemente «los ángeles»; la nota aclara que no se trata de mensajeros humanos.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'El pasaje sigue el consenso alto del auditor: no hubo cambios de fondo respecto al sentido aprobado. La principal decisión española fue mantener la distinción de αἰών frente a «mundo», y expresar de manera natural la separación judicial de los malos respecto de los justos.'
  spanish_consistency_notes:
  - Se mantiene «ángeles» como término celeste, no «mensajeros».
  - Se conserva la oposición moral «malos / justos» para reflejar el contraste del griego.
  - La nota de αἰών protege la primacía del original sin imponer la traducción tradicional «mundo».
