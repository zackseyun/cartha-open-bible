revisions:
- from: 'Así será al fin del siglo: los ángeles saldrán y separarán a los malos de entre los justos.[a]'
  to: 'Así será al fin de la era[a]: los ángeles saldrán y separarán a los malvados de entre los justos.'
  rationale: Se ajusta el texto principal para reflejar con mayor claridad contemporánea la decisión documentada sobre αἰών («era» en vez de «siglo») y para conservar mejor la fuerza moral de πονηρούς («malvados» en vez de «malos»). No se requiere adjudicación adicional; son mejoras claras de fidelidad y legibilidad.
