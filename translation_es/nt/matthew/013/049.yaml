review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: οὕτως ἔσται = «Así será», ἐξελεύσονται οἱ ἄγγελοι = «los ángeles saldrán», ἀφοριοῦσιν = «separarán», ἐκ μέσου = «de entre». También preserva correctamente la decisión clave de αἰών como «edad/era» y no «mundo», mediante nota. Sin embargo, «al fin del siglo» en el texto principal suena menos claro en español actual y puede sugerir un siglo cronológico de cien años; además, «los malos» debilita el matiz judicial/moral de τοὺς πονηροὺς frente al inglés auditado «the wicked».'
  spanish_quality_summary: 'El texto es legible, pero conviene pulir dos puntos para mayor fidelidad y naturalidad eclesial amplia: 1) cambiar «al fin del siglo» por «al fin de la era[a]» o equivalente, que comunica mejor αἰών en español contemporáneo; 2) cambiar «los malos» por «los malvados», que refleja mejor el sustantivado moral del griego sin sonar arcaico como «los impíos». El resto del verso fluye bien y mantiene un registro digno y natural.'
  glossary_alignment: 'No hay términos del glosario mayor en conflicto. La decisión teológica documentada sobre αἰών debe mantenerse en el texto principal con apoyo de nota. «Justos» para δικαίων está bien. «Ángeles» está bien por el contexto escatológico. La principal divergencia con el rastro POB es léxica: «los malos» no conserva tan bien la fuerza de «the wicked».'
  issues:
  - severity: medium
    issue: «al fin del siglo» es potencialmente ambiguo o engañoso en español actual
    rationale: Aunque intenta evitar «mundo», «siglo» hoy suele oírse como período de cien años. El griego αἰών aquí apunta a era/edad, y la propia nota del borrador ya reconoce «edad/era» como mejor explicación. Conviene reflejarlo en el texto principal.
  - severity: medium
    issue: «los malos» debilita τοὺς πονηροὺς
    rationale: En contexto de juicio final, πονηροί denota los malvados/impíos, no meramente personas 'malas' en sentido leve o coloquial. «Los malvados» preserva mejor la fuerza moral y judicial sin exceso interpretativo.
  revised_spanish_text: 'Así será al fin de la era[a]: los ángeles saldrán y separarán a los malvados de entre los justos.'
  revised_footnotes:
  - marker: a
    text: O «en la consumación de la era». Tradicionalmente se ha traducido «al fin del mundo», pero el griego dice αἰών, «era/edad», no κόσμος, «mundo».
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal para reflejar con mayor claridad contemporánea la decisión documentada sobre αἰών («era» en vez de «siglo») y para conservar mejor la fuerza moral de πονηρούς («malvados» en vez de «malos»). No se requiere adjudicación adicional; son mejoras claras de fidelidad y legibilidad.
