translation:
  language: es
  text: En cuanto al que fue sembrado en terreno pedregoso[a], este es el que oye la palabra e inmediatamente la recibe con gozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «el que fue sembrado en lugares pedregosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἐπὶ τὰ πετρώδη σπαρείς
  english_pob_choice: As for the one sown on the rocky ground
  chosen_spanish: En cuanto al que fue sembrado en terreno pedregoso[a]
  alternatives_spanish:
  - Pero el que fue sembrado en lugares pedregosos
  - El que fue sembrado sobre suelo pedregoso
  lexicon: BDAG
  rationale: 'La frase participa del mismo valor sustantivo que en griego: identifica al representado por la imagen de siembra. «En cuanto al» reproduce bien el matiz discursivo de δέ sin volverlo demasiado interpretativo, y «terreno pedregoso» comunica con naturalidad la imagen agrícola de τὰ πετρώδη.'
- source_word: πετρώδη
  english_pob_choice: rocky ground
  chosen_spanish: terreno pedregoso
  alternatives_spanish:
  - lugares pedregosos
  - suelo pedregoso
  - tierra pedregosa
  lexicon: BDAG
  rationale: El adjetivo describe un terreno con piedras o con poca profundidad para arraigar. «Terreno pedregoso» conserva el campo semántico agrícola y evita el giro más literal «lugares pedregosos», que en español suena menos natural en este contexto.
- source_word: σπαρείς
  english_pob_choice: sown
  chosen_spanish: fue sembrado
  alternatives_spanish:
  - sembrado
  - habiendo sido sembrado
  lexicon: BDAG
  rationale: El participio aoristo pasivo se rinde con una pasiva simple, clara y fiel. «Fue sembrado» mantiene el valor pasivo y el trasfondo de la metáfora sin sobrecargar el aspecto en español.
- source_word: οὗτός ἐστιν
  english_pob_choice: this is
  chosen_spanish: este es
  alternatives_spanish:
  - este representa
  - esta persona es
  lexicon: BDAG
  rationale: La cláusula identificativa se traduce de forma directa. «Este es» preserva la estructura explicativa del texto y deja que la metáfora continúe operando sin expansión interpretativa.
- source_word: ὁ τὸν λόγον ἀκούων
  english_pob_choice: the one who hears the word
  chosen_spanish: el que oye la palabra
  alternatives_spanish:
  - el que escucha la palabra
  - el oyente de la palabra
  lexicon: BDAG
  rationale: El participio presente sustantivado se vierte naturalmente como oración relativa. «Oye la palabra» mantiene el verbo más común y digno en español bíblico contemporáneo; «palabra» conserva el eco temático de λόγος sin sustituirlo por «mensaje».
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - de inmediato
  - enseguida
  lexicon: BDAG
  rationale: «Inmediatamente» reproduce la rapidez enfática del adverbio griego con registro claro y sobrio.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - gozosamente
  lexicon: BDAG
  rationale: «Con gozo» conserva el sustantivo χαρά y su tono bíblico sin convertirlo en adverbio. En español de lectura eclesial, este giro es natural y fiel.
- source_word: λαμβάνων αὐτόν
  english_pob_choice: receives it
  chosen_spanish: la recibe
  alternatives_spanish:
  - la acepta
  - la toma
  lexicon: BDAG
  rationale: λαμβάνω aquí expresa recibir o aceptar lo oído. «La recibe» es idiomático y mantiene la referencia a «la palabra» con concordancia natural en español.
theological_decisions:
- issue: Tensión entre la metáfora de la semilla/terreno y la persona representada
  english_pob_reading: Render the metaphor as 'the one sown on the rocky ground' while allowing the following clause to identify the person represented.
  chosen_spanish_reading: Mantener la imagen del que fue sembrado en terreno pedregoso y dejar que la cláusula siguiente identifique al representado como el que oye la palabra y la recibe.
  alternative_spanish_readings:
  - Expresar explícitamente 'la semilla sembrada en terreno pedregoso representa a la persona que...'
  - Reformular como 'el que fue sembrado sobre suelo pedregoso es el que...'
  rationale: El griego conserva una compresión metafórica que no resuelve del todo la relación entre la semilla y la persona. La traducción española preserva esa tensión, evitando aclaraciones que borren el efecto parabólico.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: se mantiene la estructura identificativa, la metáfora agrícola y la tensión entre la imagen del sembrado y la persona explicada. No se detectaron revisiones posteriores que obliguen a ajustar la redacción.'
  spanish_consistency_notes:
  - Se preserva «palabra» para λόγος, en continuidad con el uso temático de Mateo.
  - Se usa «gozo» en lugar de «alegría» para mantener un registro bíblico claro y evitar una equivalencia demasiado moderna.
  - Se evita «Cristo» u otras terminologías no presentes en el verso.
  - La nota al pie marca una alternativa formal de traducción, no una variante textual.
