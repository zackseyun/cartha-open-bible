translation:
  language: es
  text: Pero mientras la gente dormía, vino su enemigo y sembró malezas[a] entre el trigo y se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cizaña». El griego ζιζάνια se refiere a malezas perjudiciales sembradas entre el grano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν δὲ τῷ καθεύδειν
  english_pob_choice: while ... were sleeping
  chosen_spanish: mientras la gente dormía
  alternatives_spanish:
  - cuando la gente dormía
  - durante el sueño de la gente
  lexicon: BDAG
  rationale: La construcción temporal con ἐν + infinitivo articular expresa simultaneidad. «Mientras» conserva bien ese valor y suena natural en español. «Dormía» mantiene el imperfecto narrativo equivalente a la acción continua del inglés POB.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the people
  chosen_spanish: la gente
  alternatives_spanish:
  - los hombres
  - las personas
  lexicon: BDAG
  rationale: Aunque el griego es morfológicamente masculino plural, en este contexto agrícola puede referirse al grupo de personas relacionadas con el campo. El audit trail inglés prefirió «the people»; «la gente» reproduce ese sentido colectivo sin forzar un masculino genérico innecesario en español.
- source_word: αὐτοῦ ὁ ἐχθρός
  english_pob_choice: his enemy
  chosen_spanish: su enemigo
  alternatives_spanish:
  - el enemigo de él
  - su adversario
  lexicon: BDAG
  rationale: El genitivo posesivo con ὁ ἐχθρός se vierte de forma idiomática como «su enemigo». Conserva la relación personal de oposición sin añadir matices no presentes en el texto.
- source_word: ἐπέσπειρεν
  english_pob_choice: sowed
  chosen_spanish: sembró
  alternatives_spanish:
  - esparció
  - volvió a sembrar
  lexicon: BDAG
  rationale: ἐπισπείρω indica sembrar encima o entre lo ya sembrado. En español, «sembró» comunica claramente la acción; el matiz hostil de intercalarlo entre el trigo queda expresado por la frase siguiente.
- source_word: ζιζάνια
  english_pob_choice: weeds
  chosen_spanish: malezas
  alternatives_spanish:
  - hierbas malas
  - zizania
  - cizaña
  lexicon: BDAG
  rationale: El griego ζιζάνια designa malezas dañinas; el POB inglés usa «weeds» como término general accesible. «Malezas» es el equivalente natural en español moderno. No se eleva «cizaña» al texto principal porque en español bíblico puede sonar tradicional o más interpretativo, y el verso aquí mantiene un sentido genérico.
- source_word: ἀνὰ μέσον τοῦ σίτου
  english_pob_choice: among the wheat
  chosen_spanish: entre el trigo
  alternatives_spanish:
  - en medio del trigo
  - entre los trigales
  lexicon: BDAG
  rationale: La expresión marca inserción en medio del cultivo. «Entre el trigo» es idiomático y preserva la distribución hostil de las malezas en el campo.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: ἀπέρχομαι aquí marca la retirada del enemigo tras su acción oculta. «Se fue» reproduce la fluidez narrativa del texto fuente y es el equivalente más natural en español.
theological_decisions:
- issue: Identificación específica de ζιζάνια
  english_pob_reading: Render generally as 'weeds' in the main text
  chosen_spanish_reading: Traducir de forma general como «malezas» en el texto principal
  alternative_spanish_readings:
  - cizaña
  - darnel
  - hierba mala
  rationale: El verso no obliga a una identificación botánica precisa. Mantener un término general conserva la transparencia del texto principal y evita introducir una precisión técnica que el contexto inmediato no demanda. Las opciones más específicas quedan para nota si fueran necesarias.
  doctrine_reference: 'Translation philosophy: optimal equivalence; claridad moderna sin perder la tensión lexical.'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión desde «the men» a «the people» para τοὺς ἀνθρώπους. Siguiendo esa decisión, se optó por «la gente» en español. También se mantuvo la preferencia del POB por un término general para ζιζάνια, adaptándolo como «malezas» por naturalidad en español.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo simple y directo, acorde con el estilo POB.
  - Se evitó «SEÑOR» u այլ sustitutos porque no hay nombre divino en este versículo.
  - «Malezas» funciona como equivalente general de weeds y conserva la opción de identificación específica en nota.
  - 'El orden de la frase sigue el flujo del griego y del inglés auditado: tiempo — sujeto — acción — objeto — movimiento final.'
