translation:
  language: es
  text: 'Y en ellos se cumple la profecía de Isaías, que dice: «De cierto oirán[a], pero nunca entenderán; y viendo verán, pero nunca percibirán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «Al oír oirán» o «Por oír oirán», una expresión enfática de estilo hebreo reproducida a través del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναπληροῦται
  english_pob_choice: is fulfilled
  chosen_spanish: se cumple
  alternatives_spanish:
  - está cumpliéndose
  - se está cumpliendo
  - se realiza
  lexicon: BDAG
  rationale: El presente pasivo griego expresa cumplimiento actual en relación con ellos. En español, «se cumple» comunica ese valor de presente sin forzar una perífrasis demasiado pesada. Mantiene la idea de realización profética sin exagerar el matiz de proceso.
- source_word: αὐτοῖς
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - para ellos
  - respecto de ellos
  - sobre ellos
  lexicon: BDAG
  rationale: La dativo idiomática señala el ámbito personal donde la profecía se realiza. «En ellos» es natural en español y conserva la idea de cumplimiento en su caso o dentro de su experiencia.
- source_word: προφητεία Ἠσαΐου
  english_pob_choice: the prophecy of Isaiah
  chosen_spanish: la profecía de Isaías
  alternatives_spanish:
  - la profecía de Isaías
  - la profecía isaiana
  lexicon: BDAG
  rationale: Se mantiene la construcción nominal cercana al griego y perfectamente natural en español. «La profecía de Isaías» evita una paráfrasis innecesaria.
- source_word: ἡ λέγουσα
  english_pob_choice: which says
  chosen_spanish: que dice
  alternatives_spanish:
  - la cual dice
  - diciendo
  lexicon: BDAG
  rationale: La participio atributiva introduce la cita. «Que dice» es la equivalencia española más directa y fluida para introducir la cita sin rigidez.
- source_word: Ἀκοῇ ἀκούσετε
  english_pob_choice: You will indeed hear
  chosen_spanish: Oirán ustedes con el oído
  alternatives_spanish:
  - Oirán de verdad
  - Escucharán ustedes al oír
  - Oirán ustedes ciertamente
  lexicon: BDAG
  rationale: Se conserva la construcción semítica enfática del griego con una repetición de raíz en español. «Con el oído» refleja con mayor literalidad la forma instrumental, y la nota explica la expresión enfática; así no se pierde la tensión entre forma y claridad.
- source_word: οὐ μὴ συνῆτε
  english_pob_choice: but never understand
  chosen_spanish: pero de ningún modo entenderán
  alternatives_spanish:
  - pero nunca entenderán
  - y de ningún modo entenderán
  - pero ciertamente no entenderán
  lexicon: BDAG
  rationale: La combinación οὐ μή con subjuntivo aoristo expresa negación enfática. «De ningún modo» reproduce bien esa fuerza sin sonar artificial; «entenderán» comunica el sentido cognitivo de συνίημι en este contexto.
- source_word: βλέποντες βλέψετε
  english_pob_choice: and seeing you will see
  chosen_spanish: y viendo verán
  alternatives_spanish:
  - y viendo, verán
  - y al ver, verán
  - y viendo, ustedes verán
  lexicon: BDAG
  rationale: Se preserva la redundancia enfática del griego. El participio presente seguido del futuro mantiene la imagen de percepción visual sin convertirla en una paráfrasis interpretativa.
- source_word: οὐ μὴ ἴδητε
  english_pob_choice: but never perceive
  chosen_spanish: pero de ningún modo percibirán
  alternatives_spanish:
  - pero nunca percibirán
  - pero de ninguna manera verán
  - y de ningún modo percibirán
  lexicon: BDAG
  rationale: Como el inglés POB distinguió ὁράω de βλέπω con «perceive», el español usa «percibirán» para conservar la diferencia entre ver físicamente y captar realmente. La negación enfática se refleja con «de ningún modo».
theological_decisions:
- issue: Naturaleza del cumplimiento profético
  english_pob_reading: The verse states that Isaiah's prophecy is fulfilled in the people's response, without specifying a deterministic mechanism beyond the text itself.
  chosen_spanish_reading: El versículo afirma que la profecía de Isaías se cumple en ellos, sin precisar el mecanismo teológico de ese cumplimiento más allá del texto.
  alternative_spanish_readings:
  - La profecía de Isaías simplemente se ejemplifica en ellos.
  - La profecía se cumple de forma exhaustiva y definitiva en ellos.
  rationale: Se conserva la fórmula de cumplimiento profético sin resolverla hacia una lectura de mera ejemplificación ni hacia una explicación determinista más fuerte. Esto respeta la tensión interpretativa que el POB inglés dejó abierta.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del contexto inglés que prefirió «is fulfilled» frente a «is being fulfilled» por naturalidad en esa lengua. En español, «se cumple» mantiene la fuerza del presente sin necesidad de una perífrasis progresiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en general, pero este versículo no lo contiene.
  - Se mantiene «profecía de Isaías» como giro natural y fiel al genitivo griego.
  - La distinción entre «oirán» y «percibirán» preserva el contraste entre oír/ver físicos y comprender/captar el sentido.
