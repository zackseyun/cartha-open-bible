revisions:
- from: 'Y en ellos se cumple la profecía de Isaías, que dice: «Oirán ustedes con el oído, pero de ningún modo entenderán; y viendo verán, pero de ningún modo percibirán».[a]'
  to: 'Y en ellos se cumple la profecía de Isaías, que dice: «De cierto oirán[a], pero nunca entenderán; y viendo verán, pero nunca percibirán».'
  rationale: Se reemplazó «Oirán ustedes con el oído» por «De cierto oirán» para comunicar la fuerza enfática de Ἀκοῇ ἀκούσετε sin una literalidad engañosa. Se cambiaron «de ningún modo» por «nunca» para mejorar la naturalidad y alinearse mejor con la decisión inglesa «never». Se movió la nota al punto exacto donde corresponde y se ajustó su redacción para reflejar la alternativa literal adecuada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:12:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura básica del griego: cumplimiento presente de la profecía en ellos, introducción de la cita de Isaías, paralelismo enfático en las dos cláusulas y distinción contextual entre ver físicamente y percibir. Sin embargo, «Oirán ustedes con el oído» no refleja bien la nota inglesa ni su justificación léxica: Ἀκοῇ ἀκούσετε es una expresión enfática semítica, no una mención explícita del órgano físico. Además, el borrador traslada el anclaje de nota al final de toda la oración, cuando corresponde a la primera frase citada.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «Oirán ustedes con el oído» suena forzada y poco natural en español e introduce una literalidad engañosa. «De ningún modo» es posible, pero «nunca» resulta más natural y comunica suficientemente la fuerza enfática de οὐ μή en un texto bíblico legible. También conviene evitar «ustedes» dentro de la cita, ya que el futuro simple ya marca la persona y la omisión mejora la fluidez literaria.
  glossary_alignment: No hay conflictos con los términos de proyecto principales. Las decisiones «se cumple», «la profecía de Isaías», «que dice» y «percibirán» concuerdan con el rastro de auditoría. La principal corrección léxica es ajustar Ἀκοῇ ἀκούσετε a una formulación enfática natural en español, manteniendo la alternativa más literal en nota.
  issues:
  - severity: high
    issue: «Oirán ustedes con el oído» introduce una imagen corporal no requerida por el griego ni por la nota auditada.
    rationale: Ἀκοῇ ἀκούσετε es una construcción enfática semítica equivalente a «de cierto oirán / ciertamente oirán / al oír oirán», no una referencia al órgano del oído. «Con el oído» suena extraño y puede desviar el sentido.
  - severity: medium
    issue: El marcador de nota [a] está anclado al final de toda la cita en lugar de la frase relevante.
    rationale: La nota explica específicamente «Ἀκοῇ ἀκούσετε» y debería anclarse en esa expresión dentro del texto para cumplir la disciplina de notas del proyecto.
  - severity: medium
    issue: «De ningún modo» en ambas negaciones es correcto pero menos natural que «nunca» en este contexto.
    rationale: El POB inglés eligió «never» para comunicar la fuerza de οὐ μή con buena legibilidad. En español bíblico moderno, «nunca entenderán / nunca percibirán» transmite bien la negación enfática sin rigidez.
  revised_spanish_text: 'Y en ellos se cumple la profecía de Isaías, que dice: «De cierto oirán[a], pero nunca entenderán; y viendo verán, pero nunca percibirán».'
  revised_footnotes:
  - marker: a
    text: Literalmente, «Al oír oirán» o «Por oír oirán», una expresión enfática de estilo hebreo reproducida a través del griego.
    reason: lexical_alternative
  revision_rationale: Se reemplazó «Oirán ustedes con el oído» por «De cierto oirán» para comunicar la fuerza enfática de Ἀκοῇ ἀκούσετε sin una literalidad engañosa. Se cambiaron «de ningún modo» por «nunca» para mejorar la naturalidad y alinearse mejor con la decisión inglesa «never». Se movió la nota al punto exacto donde corresponde y se ajustó su redacción para reflejar la alternativa literal adecuada.
