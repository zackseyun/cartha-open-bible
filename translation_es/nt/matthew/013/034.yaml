translation:
  language: es
  text: Jesús habló todas estas cosas a las multitudes en parábolas[a], y sin una parábola no les decía nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin una parábola no les dijo nada». El imperfecto griego puede entenderse como habitual o como simple pasado en español, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todas estas
  - estas cosas
  lexicon: BDAG
  rationale: La combinación del demostrativo y el adjetivo cuantificador expresa integralidad y referencia al discurso recién pronunciado. En español, «todas estas cosas» conserva ambos matices de forma natural.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: BDAG
  rationale: El verbo λαλέω en este contexto resume la acción de enseñanza/discurso de Jesús. «Habló» resulta natural en español y mantiene el sentido de pronunciamiento amplio del texto.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - por medio de parábolas
  - con parábolas
  lexicon: BDAG
  rationale: La preposición ἐν con dativo aquí indica modo o medio. «En parábolas» es la forma más directa y transparente en español, y conserva el patrón del griego.
- source_word: τοῖς ὄχλοις
  english_pob_choice: to the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a las multitudes reunidas
  - a la gente
  lexicon: BDAG
  rationale: El plural dativo sugiere grupos de oyentes, no solo una muchedumbre única. «Multitudes» comunica bien el carácter plural y amplio del auditorio.
- source_word: χωρὶς παραβολῆς
  english_pob_choice: apart from a parable
  chosen_spanish: aparte de una parábola
  alternatives_spanish:
  - sin una parábola
  - sin parábolas
  lexicon: BDAG
  rationale: χωρίς con genitivo significa «sin/aparte de». Se conserva el singular de παραβολῆς, que el texto griego presenta de manera explícita. «Aparte de una parábola» suena más fluido en español que una calca rígida.
- source_word: οὐδὲν ἐλάλει
  english_pob_choice: he said nothing
  chosen_spanish: no les decía nada
  alternatives_spanish:
  - no les dijo nada
  - no hablaba nada
  lexicon: BDAG
  rationale: El imperfecto ἐλάλει puede reflejar acción habitual o reiterada. En español, «no les decía nada» preserva mejor ese trasfondo durativo que un pasado simple, sin forzar una formulación artificial.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a las multitudes
  lexicon: BDAG
  rationale: El pronombre remite a las multitudes ya mencionadas. El clítico «les» evita repetición innecesaria y es la forma natural en español para el complemento indirecto.
theological_decisions:
- issue: Valor aspectual del imperfecto en la segunda cláusula
  english_pob_reading: The verse states that Jesus characteristically addressed the crowds only in parables in this setting.
  chosen_spanish_reading: El versículo sugiere que Jesús, en ese contexto, no les hablaba fuera de una parábola, sino de manera característica en parábolas.
  alternative_spanish_readings:
  - no les dijo nada
  - no les hablaba nada
  rationale: No se trata de una diferencia doctrinal, sino de matiz verbal. Se mantiene la idea de acción continuada o característica que el imperfecto aporta, sin perder claridad para el lector español.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El audit trail en inglés pasó de una forma progresiva («he was saying nothing») a un pasado simple naturalizado («he said nothing») para reflejar mejor el imperfecto griego en inglés formal. En español, se decidió conservar el matiz imperfectivo con «no les decía nada», que mantiene la posible lectura habitual/cursiva del verbo griego sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio sin transliteración adicional.
  - «Parábolas» se conserva de manera uniforme para παραβολή, sin introducir variantes como «comparaciones» que debilitarían la consistencia del pasaje.
  - Se eligió el plural «multitudes» para reflejar τοῖς ὄχλοις, en consonancia con el auditorio plural del contexto inmediato.
  - La nota al pie preserva la alternativa sintáctica principal entre «aparte de» y «sin», porque ambas son defendibles a partir de χωρίς con genitivo.
