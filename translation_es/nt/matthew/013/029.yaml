review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: respuesta negativa directa, advertencia preventiva con μήποτε, simultaneidad de «al recoger», y contraste entre ζιζάνια y σῖτος. Sin embargo, «junto con ella» no refleja correctamente αὐτοῖς, que es plural («con ellos/ellas»), y el singular colectivo no está justificado por la sintaxis griega. Además, «maleza» en singular colectivo hace menos natural la referencia pronominal y diluye la imagen concreta de plantas arrancadas.'
  spanish_quality_summary: El español es claro y digno, pero «la maleza ... junto con ella» suena menos natural en esta parábola que un plural contable. «Las malas hierbas» o «la cizaña» permiten una referencia anafórica natural en plural. La nota sobre φησιν es aceptable; la nota léxica sobre ζιζάνια conviene mantenerla.
  glossary_alignment: No hay términos del glosario principal en juego salvo la preferencia por claridad moderna. La decisión inglesa de usar un término moderno para ζιζάνια puede preservarse mejor en español con «las malas hierbas» que con «la maleza», mientras la nota mantiene «cizaña» como alternativa tradicional y la posible referencia a darnel.
  issues:
  - severity: medium
    issue: Pronombre singular «ella» para αὐτοῖς plural
    rationale: El griego ἅμα αὐτοῖς significa «junto con ellos/ellas». El singular «ella» no preserva fielmente la concordancia ni la imagen de arrancar las plantas malas junto con el trigo.
  - severity: medium
    issue: «La maleza» dificulta una referencia natural en este contexto
    rationale: Aunque semánticamente posible, «maleza» como colectivo singular hace menos idiomática la cláusula final. En esta parábola, un plural como «las malas hierbas» reproduce mejor la acción de recoger y arrancar elementos individuales.
  revised_spanish_text: 'Pero él dijo[a]: «No, no sea que, al recoger las malas hierbas[b], arranquéis junto con ellas el trigo».

