  rationale: 'Se cambia «la maleza» por «las malas hierbas» para conservar un equivalente moderno y claro de ζιζάνια, en línea con el POB inglés, y para permitir la concordancia natural con αὐτοῖς: «junto con ellas». Así se corrige la falta de fidelidad gramatical del borrador sin alterar su enfoque traductológico general.'
