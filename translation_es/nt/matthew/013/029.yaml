translation:
  language: es
  text: 'Pero él dijo[a]: «No, no sea que, al recoger las malas hierbas[b], arranquéis junto con ellas el trigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dice»; el presente histórico griego puede mantenerse, pero en español narrativo suele preferirse el pasado simple.
    reason: alternative_reading
  - marker: b
    text: O «cizaña»; también puede aludir más específicamente al darnel, una planta que puede parecer trigo en sus primeras etapas.
    reason: lexical_alternative
lexical_decisions:
- source_word: φησιν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: En narrativa española, el pasado simple comunica con naturalidad el valor histórico del presente griego, sin perder el sentido del enunciado.
- source_word: Οὔ
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No, en absoluto
  lexicon: BDAG
  rationale: La réplica negativa directa se expresa de forma breve y natural con «No».
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - no vaya a ser que
  lexicon: BDAG
  rationale: La partícula introduce una advertencia sobre un resultado indeseable; «no sea que» preserva ese matiz preventivo en español.
- source_word: συλλέγοντες
  english_pob_choice: while gathering
  chosen_spanish: al recoger
  alternatives_spanish:
  - mientras recogéis
  - cuando recogéis
  lexicon: BDAG
  rationale: El participio contemporáneo se vierte de manera natural con una construcción temporal breve; «al recoger» conserva la simultaneidad de la acción.
- source_word: ζιζάνια
  english_pob_choice: weeds
  chosen_spanish: la maleza
  alternatives_spanish:
  - la cizaña
  - las malas hierbas
  - la mala hierba
  lexicon: BDAG
  rationale: «Maleza» comunica el sentido general de plantas no deseadas en español moderno. Se preserva así la opción del POB inglés de usar un término claro y no arcaico; «cizaña» es una alternativa tradicional, pero en español puede sonar más proverbial o menos general.
- source_word: ἐκριζώσητε
  english_pob_choice: you uproot
  chosen_spanish: arranquéis
  alternatives_spanish:
  - arranquéis de raíz
  - desarraiguéis
  lexicon: BDAG
  rationale: El verbo implica sacar de raíz. «Arranquéis» es idiomático en español y, con el contexto, comunica suficientemente el efecto de arrancar completamente; la forma más explícita se deja como alternativa.
- source_word: ἅμα αὐτοῖς
  english_pob_choice: along with them
  chosen_spanish: junto con ella
  alternatives_spanish:
  - junto con ellas
  - al mismo tiempo que ellas
  lexicon: BDAG
  rationale: La frase expresa simultaneidad y compañía en la acción. En español, el antecedente inmediato «la maleza» es femenino plural de sentido colectivo; por eso se usa «ella» como colectivo singular estilístico en la referencia pronominal del par de miembros, manteniendo fluidez y evitando una duplicación pesada.
- source_word: σῖτον
  english_pob_choice: the wheat
  chosen_spanish: el trigo
  alternatives_spanish:
  - el grano
  lexicon: BDAG
  rationale: En este contexto agrícola, «trigo» es la correspondencia natural y concreta para σῖτος, como también refleja la decisión inglesa de especificar el cereal frente al sentido más general de «grain».
theological_decisions:
- issue: ζιζάνια como término de la parábola
  english_pob_reading: weeds; footnote preserves 'tares' and 'darnel' as alternatives
  chosen_spanish_reading: la maleza; nota preserva «cizaña» como alternativa tradicional
  alternative_spanish_readings:
  - la cizaña
  - las malas hierbas
  - la cizaña, posiblemente darnel
  rationale: No hay una disputa doctrinal en el versículo, pero sí una tensión traductológica/tradicional. El POB inglés opta por un término claro y moderno, preservando la tradición en nota; en español se sigue el mismo criterio con «maleza», mientras se documenta la opción tradicional «cizaña» para auditabilidad y continuidad eclesial.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisiones sustantivas. La principal decisión fue reproducir en español la elección del POB inglés por una traducción clara y moderna del término agrícola, manteniendo la advertencia preventiva de μήποτε y la simultaneidad de ἅμα αὐτοῖς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se conserva un registro formal y publicable, evitando arcaísmos innecesarios como «tares».
  - La referencia pronominal en «junto con ella» sigue el valor colectivo de «maleza» en español, sin alterar el sentido del plural griego en la acción conjunta.
