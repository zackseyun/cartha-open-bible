review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés en casi todos los elementos clave: comparación parabólica, «el reino de los cielos», tesoro escondido, «un hombre», valor causal de ἀπὸ τῆς χαρᾶς αὐτοῦ, venta total de posesiones y compra de «aquel campo». Sin embargo, la nota [a] pierde naturalidad y fidelidad al omitir el artículo indefinido en la alternativa («a tesoro escondido»), y la construcción principal puede mejorarse levemente con «es como», que es la fórmula más idiomática y bíblicamente natural en español para Ὁμοία ἐστίν.'
  spanish_quality_summary: El texto es claro y legible, con tono digno y natural. No presenta problemas teológicos ni terminológicos mayores. Aun así, «se parece a» es aceptable pero menos directo y menos usual en fórmulas parabólicas que «es como». Además, la repetición «escondido / escondió» funciona, pero «ocultó» en el segundo caso suena un poco más fluido en español sin alterar el significado. La nota [a] sí requiere corrección gramatical clara.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «reino de los cielos», «un hombre», y el resto del léxico principal respetan el audit trail. No hay conflicto con términos doctrinales sensibles. La revisión propuesta mantiene las decisiones del POB y solo pule formulación española y una nota alternativa defectuosa.'
  issues:
  - severity: medium
    issue: La nota [a] dice «a tesoro escondido en un campo».
    rationale: 'En español falta el artículo: debe ser «a un tesoro escondido en un campo» o reformularse. Tal como está, la nota es gramaticalmente deficiente y no representa bien la alternativa inglesa.'
  - severity: low
    issue: «Se parece a» es menos idiomático que «es como» para la fórmula parabólica.
    rationale: Aunque fiel, «es como» reproduce mejor la fórmula de comparación de Jesús en español bíblico natural y evita un giro algo más discursivo.
  - severity: low
    issue: La secuencia «halló y escondió» es correcta, pero «halló y lo ocultó» suena más natural al distinguir el estado previo del acto posterior.
    rationale: El griego usa κεκρυμμένῳ para el estado del tesoro y ἔκρυψεν para la acción del hombre. Variar el verbo en español mejora fluidez sin cambiar el sentido.
  revised_spanish_text: El reino de los cielos es como un tesoro[a] escondido en un campo, que un hombre halló y lo ocultó; y por su alegría va y vende todo lo que tiene, y compra aquel campo.
  revised_footnotes:
  - marker: a
    text: 'O: «El reino de los cielos es como un tesoro escondido en un campo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y, por su alegría, se va y vende todo cuanto tiene».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la nota [a] para que sea gramatical y fiel a la alternativa documentada. Se ajusta «se parece a» a «es como» por mayor naturalidad en una fórmula parabólica. También se mejora «escondió» a «lo ocultó» para distinguir con más claridad el estado del tesoro y la acción posterior del hombre. La nota [b] se conserva como alternativa válida, pero debe omitirse del arreglo final porque no está anclada en el texto revisado; si se desea conservarla, habría que insertar [b] en el texto. Dado el requisito de anclaje exacto, la presencia de [b] en las notas revisadas indica que el texto debería llevarla. Por tanto, se incluye a continuación la versión final anclada correctamente: «El reino de los cielos es como un tesoro[a] escondido en un campo, que un hombre halló y lo ocultó; y por su alegría[b] va y vende todo lo que tiene, y compra aquel campo».'
