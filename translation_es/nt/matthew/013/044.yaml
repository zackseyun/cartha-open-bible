translation:
  language: es
  text: El reino de los cielos se parece a un tesoro[a] escondido en un campo, que un hombre halló y escondió[b]; y por su alegría va y vende todo lo que tiene, y compra aquel campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El reino de los cielos se parece a tesoro escondido en un campo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y, por su alegría, se va y vende todo cuanto tiene».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁμοία ἐστὶν
  english_pob_choice: is like
  chosen_spanish: se parece a
  alternatives_spanish:
  - es como
  - es similar a
  lexicon: BDAG
  rationale: La fórmula comparativa de la parábola se expresa de manera natural en español con «se parece a», preservando la comparación sin sonar rígido.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reinado de los cielos
  lexicon: BDAG
  rationale: Conserva la expresión mateana tradicional y el sustantivo «reino», que refleja mejor βασιλεία que «reinado» en este contexto parabólico.
- source_word: θησαυρῷ
  english_pob_choice: a treasure
  chosen_spanish: un tesoro
  alternatives_spanish:
  - tesoro
  lexicon: BDAG
  rationale: 'El dativo sin artículo se vierte de forma indefinida: «un tesoro», siguiendo la fuerza comparativa del griego.'
- source_word: κεκρυμμένῳ ἐν τῷ ἀγρῷ
  english_pob_choice: hidden in a field
  chosen_spanish: escondido en un campo
  alternatives_spanish:
  - oculto en un campo
  - guardado en un campo
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante; «escondido» comunica bien esa condición y mantiene el tono narrativo sencillo.
- source_word: ὃν εὑρὼν ἄνθρωπος
  english_pob_choice: which a man found
  chosen_spanish: que un hombre halló
  alternatives_spanish:
  - que un hombre encontró
  - que una persona halló
  lexicon: BDAG
  rationale: «Un hombre» respeta el masculino singular de ἄνθρωπος, y «halló» reproduce con naturalidad el aoristo narrativo.
- source_word: ἔκρυψεν
  english_pob_choice: hid
  chosen_spanish: escondió
  alternatives_spanish:
  - lo escondió
  - ocultó
  lexicon: BDAG
  rationale: En español, «escondió» funciona bien en paralelo con «tesoro escondido» y conserva la idea de volver a ocultarlo.
- source_word: ἀπὸ τῆς χαρᾶς αὐτοῦ
  english_pob_choice: in his joy
  chosen_spanish: por su alegría
  alternatives_spanish:
  - a causa de su alegría
  - en su alegría
  lexicon: BDAG
  rationale: La preposición ἀπό aquí expresa motivo o causa; «por su alegría» es claro en español y conserva la relación causal.
- source_word: ὑπάγει
  english_pob_choice: he goes
  chosen_spanish: va
  alternatives_spanish:
  - se va
  - se marcha
  lexicon: BDAG
  rationale: El presente narrativo se puede traducir con un presente simple en español; «va» es breve y natural.
- source_word: πωλεῖ πάντα ὅσα ἔχει
  english_pob_choice: sells all that he has
  chosen_spanish: vende todo lo que tiene
  alternatives_spanish:
  - vende todo cuanto tiene
  - vende todo lo que posee
  lexicon: BDAG
  rationale: «Todo lo que tiene» conserva la amplitud de πάντα ὅσα ἔχει y suena más natural que un calco más pesado.
- source_word: ἀγοράζει τὸν ἀγρὸν ἐκεῖνον
  english_pob_choice: buys that field
  chosen_spanish: compra aquel campo
  alternatives_spanish:
  - compra ese campo
  - compra el mismo campo
  lexicon: BDAG
  rationale: «Aquel» refleja mejor el valor demostrativo de ἐκεῖνον y mantiene el énfasis sobre el campo específico.
theological_decisions:
- issue: Renderización de βασιλεία en la expresión mateana
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reino del cielo
  - el reinado de los cielos
  rationale: Se conserva «reino» como la equivalencia más estable para βασιλεία en Mateo, sin sustituirlo por una paráfrasis de la idea de gobierno; la forma pluralizada tradicional «de los cielos» reproduce la perífrasis reverente del evangelio.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Tratamiento de ἄνθρωπος
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  rationale: El griego usa un masculino singular y el relato presenta una figura representativa masculina; se evita neutralizarlo sin una exigencia contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor causal de ἀπὸ τῆς χαρᾶς αὐτοῦ
  english_pob_reading: in his joy
  chosen_spanish_reading: por su alegría
  alternative_spanish_readings:
  - a causa de su alegría
  - en su alegría
  rationale: La escena vincula la alegría con la acción de ir y vender; «por su alegría» conserva el matiz motivacional sin borrar la relación semántica de causa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto griego, la traducción inglesa POB y sus decisiones léxicas; no se registraron revisiones sustantivas en la última pasada. La versión española sigue ese trazado con equivalencias naturales y mantiene la ambigüedad alternativa donde la POB inglesa la documentó.
  spanish_consistency_notes:
  - Se mantiene «reino de los cielos» como término fijo mateano, no «reinado», por consistencia interna y fidelidad al uso evangélico.
  - Se usa «tesoro» y no «riqueza» u otra generalización, porque el griego θησαυρός es concreto en la comparación.
  - «Campo» traduce ἀγρός de manera estable y transparente en español.
  - Se conserva el contraste narrativo entre hallar, esconder, ir, vender y comprar, sin añadir explicación interpretativa.
  - Las notas al pie reproducen alternativas reales de traducción documentadas por la POB inglesa, adaptadas al español.
