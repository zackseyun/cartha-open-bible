revisions:
- from: 'Él les dijo[a]: «Un enemigo hizo esto». Entonces los esclavos le dijeron: «¿Quieres, pues, que vayamos y los recojamos?»'
  to: 'Les dijo: «Un enemigo hizo esto». Entonces los esclavos[a] le dijeron: «¿Quieres, entonces, que vayamos y los recojamos?»'
  rationale: Se movió la nota al término que realmente comenta, «esclavos», para mantener integridad entre texto y nota. Se cambió «pues» por «entonces» para alinearse mejor con la decisión auditada del POB inglés sobre οὖν y con el flujo natural del español. También se omitió «Él» por ser innecesario en español narrativo y se pulió levemente la formulación de la nota.
