translation:
  language: es
  text: 'Les dijo: «Un enemigo hizo esto». Entonces los esclavos[a] le dijeron: «¿Quieres, entonces, que vayamos y los recojamos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos» (griego doulos/douloi, que puede significar «esclavos» o «siervos», según el contexto).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: He said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les expresó
  lexicon: BDAG
  rationale: El verbo de habla es un aoristo narrativo simple; «les dijo» es la equivalencia natural y directa en español para introducir el discurso.
- source_word: Ἐχθρὸς ἄνθρωπος
  english_pob_choice: An enemy
  chosen_spanish: Un enemigo
  alternatives_spanish:
  - Un hombre enemigo
  - Una persona enemiga
  lexicon: BDAG
  rationale: La construcción griega literal añade ἄνθρωπος, pero en español la idea se expresa con naturalidad como «un enemigo»; el sustantivo ya individualiza al adversario sin necesidad de calco.
- source_word: τοῦτο ἐποίησεν
  english_pob_choice: did this
  chosen_spanish: hizo esto
  alternatives_spanish:
  - ha hecho esto
  - hizo esta cosa
  lexicon: BDAG
  rationale: El aoristo narrativo se vierte con pretérito simple; «hizo esto» conserva la deixis de τοῦτο sin sonar forzado.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: Se mantiene la fuerza léxica de δοῦλος con «esclavos», siguiendo la decisión inglesa de preservar el estatus dependiente de los personajes en este contexto parabólico.
- source_word: Θέλεις
  english_pob_choice: Do you want
  chosen_spanish: ¿Quieres
  alternatives_spanish:
  - ¿Deseas
  - ¿Quieres tú
  lexicon: BDAG
  rationale: «¿Quieres?» comunica de forma clara y actual la voluntad/deseo expresado por θέλω.
- source_word: οὖν
  english_pob_choice: Then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Aquí οὖν marca una transición discursiva dentro del diálogo; «pues» funciona bien en español para esa relación conversacional sin cargar el texto con inferencia lógica fuerte.
- source_word: ἀπελθόντες
  english_pob_choice: to go
  chosen_spanish: que vayamos
  alternatives_spanish:
  - que fuéramos
  - para ir
  lexicon: BDAG
  rationale: 'El participio aoristo queda mejor integrado en español con una subordinada de petición: «que vayamos». Así se conserva el movimiento previo a la acción de recoger sin literalismo pesado.'
- source_word: συλλέξωμεν
  english_pob_choice: gather ... up
  chosen_spanish: recojamos
  alternatives_spanish:
  - juntemos
  - cojamos
  lexicon: BDAG
  rationale: En este contexto agrícola, «recojamos» expresa la acción de reunir y retirar lo indeseado con naturalidad en español. Evita un calco innecesario y mantiene la imagen del pasaje.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - ellas
  - estos
  lexicon: BDAG
  rationale: El pronombre neutro plural se refiere a las malas hierbas/gramíneas del contexto inmediato; en español, «los» resulta la forma natural para retomar ese referente plural masculino genérico.
theological_decisions:
- issue: Renderizado de δοῦλοι con fuerza social conservada
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: La POB inglesa decidió conservar «slaves» para transparentar la relación de dependencia. En español, «esclavos» mantiene esa misma visibilidad social y evita suavizar el término hasta perder su fuerza descriptiva.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; contested term δοῦλος'
- issue: Tratamiento de οὖν en diálogo narrativo
  english_pob_reading: Then
  chosen_spanish_reading: pues
  alternative_spanish_readings:
  - entonces
  - así que
  rationale: No se entiende aquí como una inferencia doctrinal, sino como enlace conversacional. «Pues» preserva el flujo del diálogo sin forzar una conclusión lógica explícita.
  doctrine_reference: POB style guidance on discourse markers and narrative flow
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta versión mantiene la decisión auditada de la POB inglesa de conservar la fuerza de δοῦλος como «slaves/esclavos» y de traducir el diálogo con naturalidad idiomática en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «esclavos» en coherencia con la decisión POB para δοῦλος, sin reemplazarlo por «siervos» en el texto principal.
  - La puntuación de diálogo y la colocación de la nota siguen la convención española con comillas angulares no requeridas; se opta por comillas latinas simples de estilo bíblico para claridad editorial.
  - El pronombre final se adapta al referente contextual plural sin añadir información interpretativa extra.
