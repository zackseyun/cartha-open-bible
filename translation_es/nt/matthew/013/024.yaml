translation:
  language: es
  text: 'Les presentó otra parábola, diciendo: «El reino de los cielos es como un hombre que sembró buena semilla en su campo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἄλλην παραβολὴν
  english_pob_choice: another parable
  chosen_spanish: otra parábola
  alternatives_spanish:
  - una parábola diferente
  lexicon: BDAG
  rationale: ἄλλην con παραβολή introduce una parábola נוספת en la secuencia. «Otra parábola» es la manera natural y fiel en español para mantener la progresión narrativa.
- source_word: παρέθηκεν αὐτοῖς
  english_pob_choice: set before them
  chosen_spanish: les puso
  alternatives_spanish:
  - les presentó
  - les expuso
  lexicon: BDAG
  rationale: παρατίθημι aquí tiene el sentido de colocar o presentar algo ante alguien. «Les puso» conserva la imagen concreta del gesto introductorio y funciona con naturalidad en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio se expresa de forma natural en español con «diciendo» para unir la cláusula introductoria con el discurso citado.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino de los cielos
  lexicon: BDAG
  rationale: Se conserva la fórmula mateana estable. «Cielos» mantiene el plural reverencial del griego y es la expresión habitual y transparente en español bíblico para esta construcción.
- source_word: Ὡμοιώθη
  english_pob_choice: is like
  chosen_spanish: es semejante
  alternatives_spanish:
  - se ha hecho semejante
  - es como
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁμοιόω puede expresar una comparación formulada de modo proverbial. En español, «es semejante» reproduce bien la función de la fórmula parabólica sin forzar una literalidad extraña.
- source_word: ἀνθρώπῳ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y se refiere a un personaje concreto de la parábola. «Un hombre» respeta ese matiz y evita suavizarlo a un genérico.
- source_word: σπείραντι
  english_pob_choice: who sowed
  chosen_spanish: que sembró
  alternatives_spanish:
  - sembrando
  - que había sembrado
  lexicon: BDAG
  rationale: El participio aoristo se vierte naturalmente con una relativa descriptiva en español. «Que sembró» expresa la acción completada y mantiene la claridad narrativa.
- source_word: καλὸν σπέρμα
  english_pob_choice: good seed
  chosen_spanish: buena semilla
  alternatives_spanish:
  - semilla buena
  - semilla de buena calidad
  lexicon: BDAG
  rationale: Aunque σπέρμα puede traducirse más literalmente como «semilla», en español «buena semilla» es la expresión agrícola natural y mantiene la oposición implícita con la maleza del contexto inmediato.
- source_word: ἐν τῷ ἀγρῷ αὐτοῦ
  english_pob_choice: in his field
  chosen_spanish: en su campo
  alternatives_spanish:
  - en su campo de labor
  - en su terreno
  lexicon: BDAG
  rationale: ἀγρός designa un campo de cultivo o parcela. «Su campo» es idiomático en español y preserva la relación posesiva con el hombre de la parábola.
theological_decisions:
- issue: Fórmula mateana del reino
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reino del cielo
  rationale: No se introduce una reinterpretación doctrinal. Se conserva la circunlocución reverente característica de Mateo, que en español bíblico se expresa de forma estable como «el reino de los cielos».
  doctrine_reference: Consistencia terminológica del Reino; Mateo 13:24 en su fórmula parabólica
- issue: Valor de Ὡμοιώθη en la introducción parabólica
  english_pob_reading: is like
  chosen_spanish_reading: es semejante
  alternative_spanish_readings:
  - se ha hecho semejante
  - es como
  rationale: La traducción mantiene la comparación sin cargarla con una lectura más fuerte que la del contexto. «Es semejante» refleja adecuadamente la función de la fórmula sin añadir una afirmación ontológica.
  doctrine_reference: Filología de ὁμοιόω en fórmulas de parábola; principio de equivalencia óptima
translation_notes:
  revision_awareness: El contexto inglés revisó 'has become like' a 'is like' por naturalidad y ajuste a la fórmula parabólica. En español se optó por «es semejante», que integra esa revisión y conserva el paralelismo comparativo con Mateo sin sobretraducir el aoristo pasivo.
  spanish_consistency_notes:
  - Se mantiene «reino de los cielos» como fórmula estable de Mateo.
  - Se evita «Cristo» o terminología eclesiástica no presente en el texto.
  - «Semilla» se usa con valor agrícola; no se introduce una lectura alegórica adicional en el texto base.
  - La puntuación con comillas angulares sigue la convención española y separa limpiamente el discurso directo.
