review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del griego: introduce otra parábola, mantiene la fórmula mateana del reino, conserva el referente masculino de ἀνθρώπῳ y traduce bien «buena semilla» y «en su campo». La única desalineación relevante es «Les puso», que suena demasiado coloquial y débil para παρέθηκεν αὐτοῖς en este contexto de presentación formal de enseñanza.'
  spanish_quality_summary: El español es claro, pero «Les puso otra parábola» no suena natural ni digno en registro bíblico moderno. «Les presentó otra parábola» conserva mejor el sentido y mejora mucho la legibilidad. «Es semejante a» es aceptable, pero «es como» es más idiomático en esta fórmula parabólica. No se requieren notas al pie en español.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «El reino de los cielos» está bien como fórmula mateana. No aparecen términos sensibles del glosario principal como Yahvé, Mesías o esclavo. La decisión «es como» para Ὡμοιώθη sigue la línea del English POB revisado («is like») y resulta más natural que «es semejante».
  issues:
  - severity: medium
    issue: «Les puso otra parábola» es poco natural para παρέθηκεν αὐτοῖς
    rationale: Aunque literalmente conserva algo de la imagen de ‘poner delante’, en español actual suena coloquial y algo forzado. El verbo aquí introduce enseñanza; «les presentó» o «les propuso» comunica mejor el acto discursivo.
  - severity: low
    issue: «Es semejante a» es correcto pero menos idiomático que «es como» en la fórmula parabólica
    rationale: La fórmula de Mateo en español fluye mejor con «es como», que además reproduce bien la simplificación aprobada en el English POB para Ὡμοιώθη.
  revised_spanish_text: 'Les presentó otra parábola, diciendo: «El reino de los cielos es como un hombre que sembró buena semilla en su campo».'
  revision_rationale: Se ajusta el verbo introductorio para un español más natural y digno («les presentó»), y se sustituye «es semejante a» por «es como», que funciona mejor en la fórmula parabólica y se alinea con la revisión inglesa auditada. El resto del versículo es fiel al griego y terminológicamente adecuado.
