revisions:
- from: 'Les puso otra parábola, diciendo: «El reino de los cielos es semejante a un hombre que sembró buena semilla en su campo».'
  to: 'Les presentó otra parábola, diciendo: «El reino de los cielos es como un hombre que sembró buena semilla en su campo».'
  rationale: Se ajusta el verbo introductorio para un español más natural y digno («les presentó»), y se sustituye «es semejante a» por «es como», que funciona mejor en la fórmula parabólica y se alinea con la revisión inglesa auditada. El resto del versículo es fiel al griego y terminológicamente adecuado.
