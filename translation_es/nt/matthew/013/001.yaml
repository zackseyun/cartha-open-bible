translation:
  language: es
  text: Aquel día Jesús salió de la casa y se sentó junto al mar[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ese mismo día», si la expresión se entiende como énfasis en la continuidad con el contexto anterior más que solo como referencia temporal.
    reason: alternative_reading
  - marker: b
    text: O «junto al lago». La expresión griega indica una posición cerca del mar sin precisar la distancia exacta desde la orilla.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese mismo día
  - En ese día
  lexicon: BDAG
  rationale: La expresión temporal es una fórmula común. «En aquel día» conserva la referencia temporal con un tono sobrio y natural en español. «Ese mismo día» también es posible por continuidad contextual, pero esa matización no está explícita en el griego.
- source_word: ἐξελθὼν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo funciona adverbialmente antes del verbo principal. En español, «salió» mantiene el sentido de movimiento de manera natural y no fuerza una construcción participial pesada.
- source_word: τῆς οἰκίας
  english_pob_choice: of the house
  chosen_spanish: de la casa
  alternatives_spanish:
  - de la vivienda
  - desde la casa
  lexicon: BDAG
  rationale: Con ἐξέρχομαι, el genitivo marca el lugar del que sale. «De la casa» comunica bien ese origen en español y conserva el sustantivo οἰκία sin sobreexplicar.
- source_word: ἐκάθητο
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - estaba sentado
  - tomó asiento
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir una escena en desarrollo, el español aquí fluye mejor con una forma simple y narrativa. «Se sentó» conserva el acto de sentarse sin introducir una duración que el texto no exige explícitamente.
- source_word: παρὰ τὴν θάλασσαν
  english_pob_choice: beside the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - al lado del mar
  - por el mar
  lexicon: BDAG
  rationale: παρά con acusativo indica cercanía espacial. «Junto al mar» es idiomático y fiel al valor de proximidad sin precisar una distancia que el griego no especifica.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: 'Nombre propio transliterado según la práctica del proyecto: se traducen títulos y se transliteran nombres.'
translation_notes:
  revision_awareness: La revisión en inglés ajustó la escena de «was sitting» a «sat» para reflejar mejor el aoristo ἐκάθητο en inglés natural. En español, «se sentó» ya expresa de forma natural el acto narrativo, por lo que no hace falta una perífrasis progresiva. Se mantuvo la equivalencia cercana para τῆς οἰκίας y παρὰ τὴν θάλασσαν, respetando la misma decisión léxica básica del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para el nombre propio, conforme a la política del proyecto.
  - Se eligió «mar» en el texto principal porque es la forma más natural en español; la nota conserva «mar» como alternativa literal y aclara que la cercanía es lo decisivo.
  - La puntuación y el orden de los complementos siguen un español natural sin alterar el contenido semántico del griego.
