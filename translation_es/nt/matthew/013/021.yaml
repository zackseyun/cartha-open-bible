revisions:
- from: Sin embargo, no tiene raíz en sí mismo[a], sino que es temporal. Cuando sobreviene aflicción o persecución por causa de la palabra, inmediatamente tropieza[b].
  to: Sin embargo, no tiene raíz en sí mismo, sino que es temporal. Cuando sobreviene aflicción o persecución por causa de la palabra, inmediatamente se aparta[a].
  rationale: 'Se corrige la traducción principal de σκανδαλίζεται para alinearla con la decisión contextual del POB inglés (‘falls away’) y con el sentido de la parábola: la persona no persevera cuando llega la presión por la palabra. ‘Se aparta’ comunica mejor ese resultado en español que ‘tropieza’. Se elimina la nota [a] porque no aporta una alternativa válida ni necesaria, y se conserva una sola nota léxica para transparentar los matices más literales del verbo griego.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:07:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y la mayoría de las decisiones léxicas del griego: ‘raíz’, ‘en sí mismo’, ‘temporal’, ‘aflicción o persecución’, ‘por causa de la palabra’ e ‘inmediatamente’ reflejan fielmente el texto fuente y el rastro de auditoría del POB. Sin embargo, la decisión principal para σκανδαλίζεται no sigue la elección contextual del POB inglés, que aquí optó por ‘falls away’ y relegó ‘stumbles/is offended’ a nota. En español, ‘tropieza’ deja el sentido demasiado débil frente al colapso bajo presión que el contexto exige.'
  spanish_quality_summary: 'El español es claro y legible, con registro moderno y digno. La puntuación en dos oraciones funciona bien. La nota [a], sin embargo, no es adecuada: ‘arraigado en sí mismo’ no es una alternativa equivalente a ‘no tiene raíz en sí mismo’, sino una reformulación más interpretativa y además incompleta como nota aislada. La nota [b] también conviene ajustarla para reflejar mejor la relación entre la traducción principal contextual (‘se aparta’/‘cae’) y las alternativas más literales (‘tropieza’, ‘se escandaliza’).'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto como Yahvé, Mesías, Espíritu, etc. La desviación relevante es metodológica: el POB inglés documentó que σκανδαλίζεται debe traducirse contextualmente como ‘falls away’ en este versículo, manteniendo alternativas literales en nota. El español debería alinearse con esa decisión usando una forma como ‘se aparta’ en el texto principal y reservando ‘tropieza’/‘se escandaliza’ para la nota.'
  issues:
  - severity: high
    issue: σκανδαλίζεται se tradujo como ‘tropieza’ en el texto principal
    rationale: El contexto de la parábola describe falta de perseverancia cuando llega la aflicción o persecución; el POB inglés eligió ‘falls away’ precisamente para comunicar esa caída práctica sin cerrar en exceso la teología. ‘Tropieza’ preserva la imagen verbal, pero en español sugiere demasiado un traspié momentáneo y no comunica suficientemente el abandono o fracaso resultante.
  - severity: medium
    issue: 'La nota [a] ofrece una alternativa impropia: ‘arraigado en sí mismo’'
    rationale: El griego ῥίζαν ἐν ἑαυτῷ corresponde a ‘raíz en sí mismo’, no a una simple sustitución adjetival. La nota no preserva una alternativa textual significativa del POB inglés ni resuelve una ambigüedad nueva en español.
  - severity: medium
    issue: La nota [b] necesita reordenar los matices léxicos
    rationale: Si el texto principal se corrige a ‘se aparta’, la nota debe presentar las alternativas más literales y cercanas al verbo griego (‘tropieza’, ‘se escandaliza’, quizá ‘cae’) como posibilidades, explicando que el verbo puede referirse a tropezar, ofenderse o apartarse bajo presión.
  revised_spanish_text: Sin embargo, no tiene raíz en sí mismo, sino que es temporal. Cuando sobreviene aflicción o persecución por causa de la palabra, inmediatamente se aparta[a].
  revised_footnotes:
  - marker: a
    text: O ‘tropieza’, ‘se escandaliza’ o ‘cae’; el verbo griego puede expresar la idea de tropezar, ofenderse o apartarse bajo presión.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la traducción principal de σκανδαλίζεται para alinearla con la decisión contextual del POB inglés (‘falls away’) y con el sentido de la parábola: la persona no persevera cuando llega la presión por la palabra. ‘Se aparta’ comunica mejor ese resultado en español que ‘tropieza’. Se elimina la nota [a] porque no aporta una alternativa válida ni necesaria, y se conserva una sola nota léxica para transparentar los matices más literales del verbo griego.'
