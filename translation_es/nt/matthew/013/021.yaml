translation:
  language: es
  text: Sin embargo, no tiene raíz en sí mismo, sino que es temporal. Cuando sobreviene aflicción o persecución por causa de la palabra, inmediatamente se aparta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tropieza’, ‘se escandaliza’ o ‘cae’; el verbo griego puede expresar la idea de tropezar, ofenderse o apartarse bajo presión.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔχει ... ῥίζαν ἐν ἑαυτῷ
  english_pob_choice: has no root in himself
  chosen_spanish: no tiene raíz en sí mismo
  alternatives_spanish:
  - no tiene raíz dentro de sí
  - no está arraigado en sí mismo
  lexicon: BDAG
  rationale: Conserva la metáfora agrícola de ‘raíz’ y la fuerza reflexiva de ἐν ἑαυτῷ sin volverla más interpretativa de lo que permite el griego. ‘En sí mismo’ es natural en español y mantiene el sentido interno/personal.
- source_word: πρόσκαιρός
  english_pob_choice: temporary
  chosen_spanish: temporal
  alternatives_spanish:
  - de corta duración
  - efímero
  - provisional
  lexicon: BDAG
  rationale: ‘Temporal’ expresa que dura solo por un tiempo y funciona con claridad en español bíblico moderno. Mantiene el contraste con tener raíz, sin añadir matices no presentes en el texto.
- source_word: γενομένης δὲ θλίψεως ἢ διωγμοῦ
  english_pob_choice: when affliction or persecution arises
  chosen_spanish: Cuando sobreviene aflicción o persecución
  alternatives_spanish:
  - cuando ocurre aflicción o persecución
  - cuando viene aflicción o persecución
  - cuando llega aflicción o persecución
  lexicon: BDAG
  rationale: La construcción genitiva absoluta pide valor temporal. ‘Sobreviene’ comunica la irrupción del hecho con fluidez y conserva el tono eventivo de γενομένης. ‘Aflicción’ mantiene la carga de θλῖψις mejor que ‘problema’ o ‘trouble’.
- source_word: θλίψεως
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - angustia
  - opresión
  lexicon: BDAG
  rationale: ‘Aflicción’ es el equivalente más directo y sobrio para θλῖψις, preservando la idea de presión o sufrimiento sin arcaísmos innecesarios.
- source_word: διωγμοῦ
  english_pob_choice: persecution
  chosen_spanish: persecución
  alternatives_spanish:
  - hostigamiento
  - acoso
  lexicon: BDAG
  rationale: ‘Persecución’ es la correspondencia más precisa y reconocible para διωγμός en este contexto de hostilidad por la palabra.
- source_word: διὰ τὸν λόγον
  english_pob_choice: because of the word
  chosen_spanish: por causa de la palabra
  alternatives_spanish:
  - a causa de la palabra
  - por la palabra
  - debido a la palabra
  lexicon: BDAG
  rationale: Se mantiene ‘la palabra’ como expresión del mensaje proclamado, conservando el vínculo léxico con λόγος. ‘Por causa de’ expresa bien la relación causal en español y suena natural en un registro bíblico contemporáneo.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: BDAG
  rationale: ‘Inmediatamente’ reproduce la prontitud enfática de εὐθύς con claridad y sin ambigüedad.
- source_word: σκανδαλίζεται
  english_pob_choice: falls away
  chosen_spanish: tropieza
  alternatives_spanish:
  - se escandaliza
  - cae
  - se aparta
  lexicon: BDAG
  rationale: En español, ‘tropieza’ conserva la imagen verbal de σκανδαλίζω y deja abierta la tensión lexical que el inglés POB también preservó con la nota sobre ‘stumbles’/‘is offended’. En el contexto parabólico, puede implicar fracaso o caída, pero sin resolver excesivamente el alcance teológico.
- source_word: δὲ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - pero
  - y
  lexicon: BDAG
  rationale: ‘Sin embargo’ marca el contraste con la cláusula anterior de manera natural en español y corresponde al valor adversativo de δέ.
theological_decisions:
- issue: Sentido de σκανδαλίζεται en el cierre de la parábola
  english_pob_reading: falls away, with footnoted alternatives stumbles / is offended
  chosen_spanish_reading: tropieza, con nota sobre posibles matices de ‘se escandaliza’ o ‘cae’
  alternative_spanish_readings:
  - se escandaliza
  - cae
  - se aparta
  rationale: El contexto describe a alguien que recibe la palabra pero no persevera cuando llega la presión. ‘Tropieza’ retiene la amplitud del verbo griego sin fijarlo prematuramente en una sola conclusión doctrinal. La nota conserva la tensión entre tropiezo, ofensa y caída.
  doctrine_reference: Preservar la tensión lexical y no cerrar indebidamente el alcance del verbo.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto griego y el criterio auditado de la POB inglesa, especialmente en la temporalidad de la cláusula genitiva absoluta, el valor causal de διὰ τὸν λόγον y la amplitud de σκανδαλίζεται. Se eligió ‘tropieza’ para no cerrar el verbo en una sola lectura donde el griego y la auditoría inglesa preservan tensión semántica.
  spanish_consistency_notes:
  - Se mantiene ‘palabra’ para λόγος, en coherencia con el lenguaje del Evangelio y con el audit trail en inglés.
  - Se usa ‘aflicción’ para θλῖψις y ‘persecución’ para διωγμός, evitando una nivelación semántica excesiva.
  - Se conserva un registro bíblico moderno y claro, sin recurrir a ‘tribulación’ como término preferente salvo contexto más técnico.
  - La puntuación separa las dos unidades principales de manera natural en español, reflejando la revisión de fluidez observada en el inglés auditado.
