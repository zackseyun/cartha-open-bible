translation:
  language: es
  text: El que tiene oídos[a], oiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más inclusiva en español: «Quien tiene oídos, oiga».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que posee
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva y expresa una generalidad singular; «El que tiene» conserva esa forma representativa en español natural. «Quien tiene» también sería posible, pero «El que tiene» mantiene mejor la estructura breve e imperativa del dicho.
- source_word: ὦτα
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - orejas
  lexicon: BDAG
  rationale: El griego usa el plural de οὖς. En español, «oídos» es la equivalencia más natural y digna en este giro proverbial, y preserva el plural literal mejor que «orejas», que suena menos idiomático en este registro.
- source_word: ἀκουέτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo de tercera persona se refleja bien con «oiga», que mantiene la fuerza exhortativa y la relación léxica con ἀκούω. «Escuche» debilitaría el vínculo semántico con el verbo de oír; «que oiga» es posible, pero menos conciso.
theological_decisions:
- issue: Forma genérica singular en español
  english_pob_reading: The one who has ears, let him hear.
  chosen_spanish_reading: El que tiene oídos, oiga.
  alternative_spanish_readings:
  - Quien tiene oídos, oiga.
  - Quien tenga oídos, que oiga.
  rationale: El griego presenta un singular masculino genérico. La redacción elegida conserva esa forma sin pluralizarla ni suavizarla. «Quien tenga... que oiga» también comunica la idea, pero introduce una reexpresión menos directa del imperativo breve del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el texto griego y el audit trail inglés muestran alta concordancia, por lo que la versión española sigue de cerca la sintaxis breve y proverbial del original.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología ajena, porque no hay aquí nombre divino ni τίτλος cristológico que requiera ajuste terminológico.
  - Se mantuvo el tono proverbial e imperativo breve del texto fuente, sin añadir explicaciones interpretativas.
  - «Oídos» conserva el plural del griego y es la opción más idiomática en español para este dicho.
