translation:
  language: es
  text: 'Y el que fue sembrado entre espinos: este es el que oye la palabra[a], pero la preocupación de esta era y el engaño de las riquezas ahogan la palabra[b], y se queda sin fruto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las preocupaciones de esta era'. Más literalmente, el griego dice 'la preocupación de esta era'.
    reason: alternative_reading
  - marker: b
    text: O 'el engaño de la riqueza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἰς τὰς ἀκάνθας σπαρείς
  english_pob_choice: the one sown among the thorns
  chosen_spanish: el que fue sembrado entre espinos
  alternatives_spanish:
  - el que fue sembrado en los espinos
  - el que fue sembrado entre las espinas
  lexicon: BDAG
  rationale: El participio pasivo masculino singular se refiere a la persona representada por la semilla en la explicación de la parábola. 'Entre espinos' expresa de forma natural la imagen de εἰς con este contexto, sin volverlo un giro rígido. 'Fue sembrado' conserva el valor pasivo del participio.
- source_word: ὁ τὸν λόγον ἀκούων
  english_pob_choice: the one who hears the word
  chosen_spanish: el que oye la palabra
  alternatives_spanish:
  - el que escucha la palabra
  - el que está oyendo la palabra
  lexicon: BDAG
  rationale: ἀκούων puede expresarse con una relativa en español. 'Oye' es claro, natural y mantiene el presente descriptivo. 'Palabra' conserva λόγος en el sentido del mensaje proclamado.
- source_word: ἡ μέριμνα τοῦ αἰῶνος τούτου
  english_pob_choice: the worries of this age
  chosen_spanish: la preocupación de esta era
  alternatives_spanish:
  - la ansiedad de esta era
  - las preocupaciones de esta era
  - los afanes de esta era
  lexicon: BDAG
  rationale: μέριμνα denota cuidado ansioso, preocupación o afán. En español, 'preocupación' comunica bien la fuerza negativa y evita un uso demasiado amplio de 'afanes'. αἰών se traduce como 'era' para preservar el sentido de período/edad más que 'mundo' como máscara general.
- source_word: ἡ ἀπάτη τοῦ πλούτου
  english_pob_choice: the deceitfulness of wealth
  chosen_spanish: el engaño de las riquezas
  alternatives_spanish:
  - el engaño de la riqueza
  - la deceitfulness de las riquezas
  - la seducción de las riquezas
  lexicon: BDAG
  rationale: ἀπάτη es 'engaño' o 'decepción'. 'Riquezas' mantiene el sustantivo en plural que suele sonar más idiomático en español para πλοῦτος en este contexto, y conserva la fuerza de algo que seduce y desorienta.
- source_word: συμπνίγει
  english_pob_choice: choke
  chosen_spanish: ahogan
  alternatives_spanish:
  - ahoga
  - estrangulan
  - sofocan
  lexicon: BDAG
  rationale: El verbo compuesto expresa asfixiar o sofocar por presión conjunta. En español, con sujeto compuesto ('la preocupación... y el engaño...'), el plural 'ahogan' resulta natural y preserva la imagen agrícola sin suavizarla.
- source_word: ἄκαρπος γίνεται
  english_pob_choice: he becomes unfruitful
  chosen_spanish: queda sin fruto
  alternatives_spanish:
  - se vuelve infructuoso
  - se hace infructuoso
  - resulta sin fruto
  lexicon: BDAG
  rationale: El griego presenta un resultado personal. 'Queda sin fruto' conserva la idea de quedar en un estado de esterilidad/frustración de fruto, con un español fluido y bíblicamente inteligible. Se evita 'infructuoso' por sonar demasiado abstracto en esta imagen.
theological_decisions:
- issue: αἰών como 'edad/era' y no 'mundo'
  english_pob_reading: this age
  chosen_spanish_reading: esta era
  alternative_spanish_readings:
  - este mundo
  - este siglo
  rationale: αἰών designa ante todo una era o período, no el mundo físico. 'Esta era' preserva el contraste temporal y moral del texto. 'Este mundo' sigue siendo posible como equivalencia idiomática, pero borra parte de la precisión semántica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referente personal al final de la explicación
  english_pob_reading: he becomes unfruitful
  chosen_spanish_reading: queda sin fruto
  alternative_spanish_readings:
  - él queda sin fruto
  - se vuelve sin fruto
  - la palabra queda sin fruto
  rationale: La explicación de Jesús identifica al sembrado como 'el que oye la palabra'; por eso el desenlace debe seguir siendo personal, no atribuido a la palabra misma. 'Queda sin fruto' mantiene ese resultado en español sin forzar un pronombre explícito.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el auditorio inglés de POB, manteniendo las decisiones ya justificadas allí: αἰών como ''era'' y el cierre personal. No se adoptaron formulaciones más tradicionales como ''siglo'' o ''afanes'' porque el contexto de la parábola y la claridad actual favorecen ''era'' y ''preocupación''.'
  spanish_consistency_notes:
  - Se mantuvo 'palabra' para λόγος en todo el versículo, conforme al uso parabólico.
  - Se prefirió 'ricas/ezas' en plural ('las riquezas') para πλοῦτος, en consonancia con el matiz idiomático español y sin perder el referente de riqueza material.
  - No se usó 'Cristo', 'SEÑOR' ni otros términos no presentes en el versículo.
  - La puntuación con dos puntos y comas reproduce la relación explicativa y causal del griego de manera legible en español.
