translation:
  language: es
  text: El Hijo del Hombre enviará a sus ángeles, y ellos recogerán de su reino todas las causas de tropiezo[a] y a los que practican la iniquidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las piedras de tropiezo». El griego σκάνδαλα puede referirse a cosas que hacen caer o pecar.
    reason: lexical_alternative
  - marker: b
    text: O «a los que hacen la iniquidad». El participio presente subraya una conducta habitual y característica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστελεῖ
  english_pob_choice: will send out
  chosen_spanish: enviará
  alternatives_spanish:
  - mandará
  - enviará fuera
  lexicon: BDAG
  rationale: El futuro de ἀποστέλλω expresa envío con comisión; en español, «enviará» comunica naturalmente la acción sin añadir una partícula innecesaria. La idea de envío con autoridad queda implícita en el contexto escatológico y en el sujeto, «el Hijo del Hombre».
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: The Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su fuerza intertextual, especialmente la alusión a Daniel. «El Hijo del Hombre» es la forma más reconocible y fiel en español para este uso titular.
- source_word: τοὺς ἀγγέλους αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus mensajeros
  lexicon: BDAG
  rationale: En este contexto de juicio y consumación, ἄγγελοι se refiere a seres celestiales, no a mensajeros humanos. «Ángeles» es la opción precisa en español.
- source_word: συλλέξουσιν
  english_pob_choice: they will gather
  chosen_spanish: recogerán
  alternatives_spanish:
  - reunirán
  - juntarán
  lexicon: BDAG
  rationale: El verbo describe la acción de reunir y sacar de un ámbito. «Recogerán» funciona bien en español para expresar la recolección/separación con naturalidad, manteniendo la idea de agrupar para retirar.
- source_word: ἐκ τῆς βασιλείας αὐτοῦ
  english_pob_choice: out of his kingdom
  chosen_spanish: de su reino
  alternatives_spanish:
  - fuera de su reino
  - de en medio de su reino
  lexicon: BDAG
  rationale: El griego ἐκ marca salida desde el interior de una esfera. En español, «de su reino» comunica la procedencia de la remoción de forma natural; la noción de separación queda apoyada por el verbo «recogerán» y el contexto.
- source_word: πάντα τὰ σκάνδαλα
  english_pob_choice: all causes of stumbling
  chosen_spanish: todos los tropiezos
  alternatives_spanish:
  - todos los escándalos
  - todas las piedras de tropiezo
  lexicon: BDAG
  rationale: σκάνδαλα puede referirse a aquello que hace caer o pecar. «Tropiezos» mantiene la imagen bíblica sin reducirla a «ofensas» y sin sonar demasiado técnico; la nota preserva la alternativa de «causas de tropiezo» en caso de querer explicitar el valor activo.
- source_word: τοὺς ποιοῦντας τὴν ἀνομίαν
  english_pob_choice: those who practice lawlessness
  chosen_spanish: a los que practican la iniquidad
  alternatives_spanish:
  - a los que hacen la iniquidad
  - a los que practican la anarquía moral
  lexicon: BDAG
  rationale: La participio presente indica conducta habitual; «practican» lo refleja bien. ἀνομία implica conducta contraria a la ley de Dios; «iniquidad» es un término bíblico claro y natural en español, aunque «desobediencia a la ley» o «desorden» serían más explicativos en otros contextos.
theological_decisions:
- issue: Título mesiánico y resonancia daniélica
  english_pob_reading: The Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hijo del ser humano
  - el Hombre
  rationale: Se preserva el título tradicional para mantener la densidad cristológica y la referencia a Daniel 7. Traducirlo de forma más explicativa debilitaría la carga escatológica del pasaje.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Alcance de σκάνδαλα en un contexto de juicio
  english_pob_reading: all causes of stumbling
  chosen_spanish_reading: todos los tropiezos
  alternative_spanish_readings:
  - todas las causas de tropiezo
  - todos los escándalos
  rationale: En el contexto de separación final, la expresión incluye realidades que inducen a caída o pecado. «Tropiezos» conserva la imagen bíblica y no la restringe a la idea moderna de «escándalos» como simple molestia pública.
  doctrine_reference: Translation philosophy §1, §5
- issue: ἀνομία como conducta moral continua
  english_pob_reading: those who practice lawlessness
  chosen_spanish_reading: a los que practican la iniquidad
  alternative_spanish_readings:
  - a los que hacen el mal
  - a los que practican la desobediencia
  rationale: El participio presente sugiere práctica habitual. «Iniquidad» mantiene un registro bíblico fuerte y expresa oposición moral a la voluntad de Dios sin suavizar el término a una mera incorrección ética.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se elaboró un borrador sin cambios respecto al sentido base del texto griego y con concordancia alta con el auditorio inglés; no se detectaron ajustes textuales necesarios más allá de la adecuación natural del español.
  spanish_consistency_notes:
  - Se conserva «el Hijo del Hombre» para mantener el título cristológico y su eco daniélico.
  - Se usa «ángeles» en sentido celestial, no «mensajeros».
  - «Recogerán de su reino» expresa la salida/separación desde la esfera del reino sin sobrecargar la sintaxis.
  - «Tropiezos» traduce el valor activo de σκάνδαλα y la nota preserva la alternativa explicativa.
  - «Practican la iniquidad» refleja el carácter habitual del participio presente y mantiene el registro bíblico del término.
