    issue: «todos los tropiezos» debilita el sentido de σκάνδαλα
    rationale: El griego, según la auditoría inglesa, apunta a aquello que causa caída o pecado, no primariamente a los tropiezos como eventos. «Causas de tropiezo» preserva mejor el valor activo y el alcance amplio del término.
  - severity: medium
    issue: La nota [a] no preserva una alternativa real al texto principal
    rationale: La nota dice «O “todos los tropiezos”», pero esa es la propia redacción principal. Debe ofrecer una alternativa significativa, idealmente «todas las piedras de tropiezo» o equivalente, conforme al expediente inglés.
  revised_spanish_text: El Hijo del Hombre enviará a sus ángeles, y ellos recogerán de su reino todas las causas de tropiezo[a] y a los que practican la iniquidad[b].
