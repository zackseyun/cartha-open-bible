translation:
  language: es
  text: Y grandes multitudes se reunieron junto a él, de modo que subió a una barca y se sentó[a], y toda la multitud estaba de pie en la orilla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «subió a una barca y se sentó».
    reason: lexical_alternative
  - marker: b
    text: O «en la playa» o «junto a la orilla del mar».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: BDAG
  rationale: El griego expresa que las multitudes fueron reunidas/convocadas en torno a Jesús; en español, «se reunieron» conserva el movimiento intransitivo natural y no fuerza una construcción pasiva artificial.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: junto a él
  alternatives_spanish:
  - a él
  - cerca de él
  lexicon: BDAG
  rationale: «πρός + acusativo» indica movimiento hacia una persona. «Junto a él» comunica bien la cercanía resultante sin añadir explícitamente una distribución circular que el texto no dice.
- source_word: ὄχλοι πολλοί
  english_pob_choice: large crowds
  chosen_spanish: grandes multitudes
  alternatives_spanish:
  - muchas multitudes
  - multitudes numerosas
  lexicon: BDAG
  rationale: El plural con πολλοί enfatiza varias multitudes o grupos numerosos; en español, «grandes multitudes» suena natural y conserva la fuerza cuantitativa sin la rareza de «muchas multitudes».
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - con el resultado de que
  lexicon: BDAG
  rationale: La cláusula presenta resultado. «De modo que» mantiene la relación consecutiva de forma clara y sobria en español bíblico moderno.
- source_word: εἰς πλοῖον ἐμβάντα
  english_pob_choice: got into a boat
  chosen_spanish: subió a una barca
  alternatives_spanish:
  - entró en una barca
  - se embarcó en una barca
  lexicon: BDAG
  rationale: El participio con εἰς πλοῖον expresa entrar/abordar una embarcación. «Subió a una barca» es idiomático en español y conserva la imagen narrativa; «barca» puede ser más natural que «barco» en este contexto de ribera.
- source_word: καθῆσθαι
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - se puso a sentar
  - tomó asiento
  lexicon: BDAG
  rationale: El infinitivo de resultado expresa la postura asumida después de subir a la barca. «Se sentó» es la forma más directa y natural en español.
- source_word: πᾶς ὁ ὄχλος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - la multitud entera
  - toda la gente
  lexicon: BDAG
  rationale: Aunque antes el texto habla de multitudes en plural, aquí el griego las reúne como un conjunto singular. «Toda la multitud» preserva ese sentido colectivo sin perder fluidez.
- source_word: ἐπὶ τὸν αἰγιαλόν
  english_pob_choice: on the shore
  chosen_spanish: en la orilla
  alternatives_spanish:
  - sobre la playa
  - junto a la costa
  lexicon: BDAG
  rationale: αἰγιαλός puede significar orilla, playa o ribera. «En la orilla» es neutral y ampliamente comprensible; evita una especificación innecesaria de «playa» si el lector imagina una costa arenosa.
- source_word: εἱστήκει
  english_pob_choice: stood
  chosen_spanish: estaba
  alternatives_spanish:
  - permanecía
  - estaba de pie
  lexicon: BDAG
  rationale: El pluscuamperfectivo de ἵστημι describe la postura estable de la multitud. En español, «estaba en la orilla» transmite la escena con naturalidad; el contexto ya hace claro que no estaban sentados ni moviéndose.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y concuerda con la auditoría inglesa: mantiene el valor consecutivo de ὥστε, la imagen de abordar una barca y la localización en la orilla. Se evitó una calca excesiva en favor de un español natural, sin perder la estructura del versículo.'
  spanish_consistency_notes:
  - Se usa «barca» para πλοῖον por naturalidad narrativa en un contexto costero; en pasajes donde el tamaño o tipo de embarcación exija mayor precisión, podría variar a «barco» o «embarcación».
  - «Multitud» se emplea como singular colectivo para πᾶς ὁ ὄχλος, manteniendo la transición desde las «grandes multitudes» iniciales.
  - «Orilla» se eligió como término neutral para αἰγιαλός; si el contexto inmediato enfatizara arena o costa marina, podrían considerarse otras opciones sin alterar el sentido central.
