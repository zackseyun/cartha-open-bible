- from: Y grandes multitudes se reunieron junto a él[a], de modo que subió a una barca y se sentó[b], y toda la multitud estaba en la orilla.
  to: Y grandes multitudes se reunieron junto a él, de modo que subió a una barca y se sentó[a], y toda la multitud estaba de pie en la orilla[b].
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a la acción de entrar en la barca y sentarse, conforme al English POB audit trail. Se ajustó «estaba en la orilla» a «estaba de pie en la orilla» para reflejar mejor εἱστήκει. Se mantuvo el resto del texto por ser fiel, natural y claro.
