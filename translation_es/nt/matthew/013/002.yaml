review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: reunión de grandes multitudes, resultado de que Jesús entra en una embarcación y se sienta, y ubicación final de la multitud en la ribera. Sin embargo, hay dos desajustes importantes con el audit trail: la nota [a] está anclada en «junto a él» pero su contenido corresponde a «subió a una barca y se sentó», y «estaba en la orilla» debilita el valor posicional de εἱστήκει, que en contexto se expresa mejor como «estaba de pie» o «se quedó de pie».'
  spanish_quality_summary: El español es claro y natural, pero necesita reparar el anclaje de notas y ajustar la última cláusula para mayor fidelidad. «Grandes multitudes» y «de modo que» son plenamente legibles. «Junto a él» es aceptable, aunque «hacia él» o «a él» sería más literal; no requiere cambio. La frase final gana precisión y viveza con «estaba de pie en la orilla».
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto en este versículo. Las decisiones léxicas principales son en general adecuadas. La excepción es εἱστήκει, donde «estaba» no preserva suficientemente la idea de estar de pie. También debe preservarse correctamente la nota alternativa sobre αἰγιαλός en el lugar correspondiente.
  issues:
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: En el English POB, la nota a explica la alternativa para εἰς πλοῖον ἐμβάντα καθῆσθαι («boarded a boat and sat»), no para πρὸς αὐτόν («to him»). En español, el marcador debe ir sobre la frase «subió a una barca y se sentó», no sobre «junto a él».
  - severity: medium
    issue: «Estaba en la orilla» no expresa bien εἱστήκει.
    rationale: El verbo describe la postura de la multitud, no solo su localización. «Estaba de pie en la orilla» conserva mejor la escena y sigue siendo natural en español.
  - severity: low
    issue: La nota [b] debe anclarse al sintagma de lugar correspondiente.
    rationale: La nota sobre alternativas de αἰγιαλός debe vincularse a «la orilla», ya que explica ese término específico.
  revised_spanish_text: Y grandes multitudes se reunieron junto a él, de modo que subió a una barca y se sentó[a], y toda la multitud estaba de pie en la orilla[b].
  revised_footnotes:
  - marker: a
    text: O «subió a una barca y se sentó».
    reason: lexical_alternative
  - marker: b
    text: O «en la playa» o «junto a la orilla del mar».
    reason: lexical_alternative
