review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura causal del griego: διὰ τοῦτο > «Por este motivo», ἐν παραβολαῖς αὐτοῖς λαλῶ > «les hablo en parábolas», ὅτι causal > «porque», y mantiene la paradoja de βλέποντες/ἀκούοντες + verbo finito sin introducir la concesiva «aunque». También traduce adecuadamente συνίουσιν como «entienden». La única desalineación menor está en la nota al pie: presenta como alternativa «más formalmente» una frase idéntica al texto principal, por lo que no preserva de manera útil la alternativa documentada en el rastro inglés.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Por este motivo» suena bien, aunque «Por esta razón» también sería posible. La sintaxis principal funciona. El único problema real es editorial: la nota no aporta una alternativa distinta y por tanto resulta defectuosa. Conviene repararla con una opción formal genuina que use puntuación más marcada.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, esclavo, etc. Las elecciones «parábolas», «hablo», «entienden» son fieles y legibles.
  issues:
  - severity: medium
    issue: La nota al pie [a] duplica esencialmente el texto principal en vez de ofrecer una alternativa real.
    rationale: El rastro inglés conserva una alternativa formal para la construcción participial. En español, «viendo no ven, y oyendo no oyen» ya es el texto principal; repetirlo en la nota como «más formalmente» no añade información y falla el propósito de la nota lexical_alternative.
  revised_spanish_text: Por este motivo les hablo en parábolas[a], porque viendo no ven, y oyendo no oyen, ni entienden.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «viendo, no ven; y oyendo, no oyen».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego, al POB inglés revisado y al buen español. Solo se corrige la nota al pie para que ofrezca una alternativa formal genuina, con puntuación que haga más explícita la estructura participial, en vez de repetir exactamente la redacción principal.
