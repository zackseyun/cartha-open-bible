translation:
  language: es
  text: y, habiendo encontrado una sola perla de gran valor[a], se fue, vendió todo lo que tenía y la compró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una perla preciosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρὼν δὲ
  english_pob_choice: and having found
  chosen_spanish: y habiendo encontrado
  alternatives_spanish:
  - y al encontrar
  - cuando encontró
  - pero habiendo encontrado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a los verbos principales; en español, «habiendo encontrado» conserva esa anterioridad. «Y» reproduce el enlace leve de δέ sin convertirlo en oposición fuerte.
- source_word: ἕνα
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - un solo
  - una sola
  lexicon: BDAG
  rationale: El numeral debe mantenerse porque subraya la singularidad del objeto hallado. En español concuerda naturalmente con «perla».
- source_word: πολύτιμον
  english_pob_choice: of great value
  chosen_spanish: de gran valor
  alternatives_spanish:
  - preciosa
  - muy valiosa
  lexicon: BDAG
  rationale: «De gran valor» comunica bien el matiz de excepcional precio o worth sin sonar demasiado arcaico. Mantiene la fuerza valorativa del adjetivo griego.
- source_word: μαργαρίτην
  english_pob_choice: pearl
  chosen_spanish: perla
  alternatives_spanish:
  - gema
  - joya
  lexicon: BDAG
  rationale: El sentido léxico normal es «perla»; no hay motivo contextual para variarlo.
- source_word: ἀπελθὼν
  english_pob_choice: he went away
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El participio se integra de forma verbal simple para fluidez narrativa. «Fue» conserva la secuencia de acción sin añadir matices no atestiguados.
- source_word: πέπρακεν
  english_pob_choice: sold
  chosen_spanish: vendió
  alternatives_spanish:
  - ha vendido
  lexicon: BDAG
  rationale: Aunque el griego está en perfecto, en esta narración el español fluye mejor con pretérito perfecto simple. La idea de acción completada queda preservada.
- source_word: πάντα ὅσα εἶχεν
  english_pob_choice: all that he had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todo cuanto tenía
  - todo lo que poseía
  lexicon: BDAG
  rationale: La expresión totalizante se conserva de forma natural en español. «Tenía» es idiomático y suficiente para el alcance de posesión total.
- source_word: ἠγόρασεν
  english_pob_choice: bought
  chosen_spanish: compró
  alternatives_spanish:
  - adquirió
  lexicon: BDAG
  rationale: «Compró» es el equivalente directo y natural en español contemporáneo; comunica con claridad la transacción del texto.
- source_word: αὐτόν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la perla
  lexicon: BDAG
  rationale: Aunque el pronombre griego es masculino por concordancia con μαργαρίτην, su referente en español es femenino («perla»). Por claridad y naturalidad, el pronombre debe concordar con el referente, no con el género gramatical del griego.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con el borrador inglés auditado. Se mantiene la secuencia participial, el valor totalizante de «todo lo que tenía» y la referencia pronominal al objeto («la»), sin introducir cambios doctrinales o estilísticos no respaldados por el fuente.
  spanish_consistency_notes:
  - Se evita «Cristo» u otra terminología no pertinente al pasaje.
  - Se conserva el orden narrativo de acción previa + acciones principales.
  - La nota reproduce la alternativa léxica documentada en el audit trail inglés, adaptada al español.
