    rationale: La auditoría inglesa retiene 'one' para destacar la singularidad del objeto. En español, 'una perla' puede leerse simplemente como artículo indefinido; 'una sola perla' o similar preserva mejor el matiz numérico.
  - severity: low
    issue: '''fue'' suena menos natural para ἀπελθὼν'
    rationale: Aunque no es incorrecto, 'fue' aislado resulta algo áspero en español narrativo. 'Se fue' refleja mejor 'went away' sin alterar el sentido.
  revised_spanish_text: y, habiendo encontrado una sola perla de gran valor[a], se fue, vendió todo lo que tenía y la compró.
