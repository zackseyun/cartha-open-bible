- from: y habiendo encontrado una perla de gran valor[a], fue, vendió todo lo que tenía y la compró.
  to: y, habiendo encontrado una sola perla de gran valor[a], se fue, vendió todo lo que tenía y la compró.
  rationale: Se ajusta 'una perla' a 'una sola perla' para conservar el valor explícito de ἕνα, y 'fue' a 'se fue' para una narración más natural en español y más cercana a 'went away'. Se mantiene la nota léxica sobre πολύτιμον y el pronombre femenino 'la' por concordancia natural con 'perla'.
