    issue: «Presentó otra parábola delante de ellos» es una construcción poco natural
    rationale: Aunque intenta reflejar «set before them», en español bíblico y general «les presentó otra parábola» o «les expuso otra parábola» expresa mejor el idiomatismo de παρατίθημι con αὐτοῖς sin sonar calcado.
  - severity: low
    issue: «es semejante a» es correcto pero menos idiomático que «es como» en esta fórmula parabólica
    rationale: Ὁμοία ἐστὶν suele sonar más natural en español narrativo como «es como». No es un error de sentido, pero la fórmula revisada fluye mejor y sigue siendo fiel.
  revised_spanish_text: 'Les presentó otra parábola, diciendo: «El reino de los cielos es como una semilla de mostaza, que un hombre tomó y sembró en su campo».'
