translation:
  language: es
  text: 'Les presentó otra parábola, diciendo: «El reino de los cielos es como una semilla de mostaza, que un hombre tomó y sembró en su campo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρέθηκεν
  english_pob_choice: set another parable before them
  chosen_spanish: Presentó ... delante de ellos
  alternatives_spanish:
  - les expuso
  - puso ... ante ellos
  - les presentó
  lexicon: BDAG
  rationale: El griego παρατίθημι aquí tiene el sentido idiomático de presentar o exponer una parábola a un auditorio. «Presentó ... delante de ellos» conserva la imagen de poner ante el oyente y suena natural en español.
- source_word: παραβολὴν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - ilustración
  - comparación
  lexicon: BDAG
  rationale: «Parábola» es el término técnico adecuado en el contexto de la enseñanza sinóptica y preserva el género literario sin reducirlo a una explicación genérica.
- source_word: Ὁμοία ἐστὶν
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - es comparable a
  lexicon: BDAG
  rationale: La fórmula comparativa se expresa de forma natural en español con «es semejante a», que mantiene la relación de comparación sin forzar un giro inglés.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reinado de los cielos
  lexicon: BDAG
  rationale: Se conserva la fórmula característica de Mateo. «Reino de los cielos» es la equivalencia tradicional y fiel al genitivo plural griego, sin sustituirla por una paráfrasis abstracta.
- source_word: κόκκῳ σινάπεως
  english_pob_choice: a mustard seed
  chosen_spanish: una semilla de mostaza
  alternatives_spanish:
  - un grano de mostaza
  - una semilla de mostaza
  lexicon: BDAG
  rationale: κόκκος puede significar grano o semilla. En español, «semilla de mostaza» comunica con claridad la imagen agrícola y el tamaño diminuto del objeto en la comparación.
- source_word: ὃν λαβὼν ἄνθρωπος
  english_pob_choice: which a man took
  chosen_spanish: que un hombre tomó
  alternatives_spanish:
  - que alguien tomó
  - que un hombre, habiéndola tomado
  lexicon: BDAG
  rationale: Se mantiene el referente masculino singular de ἄνθρωπος y se vierte λαβών con el verbo simple «tomó», natural en español y fiel al movimiento narrativo del texto.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: BDAG
  rationale: Aunque ἄνθρωπος puede ser genérico, aquí funciona como actor individual en la parábola. «Un hombre» refleja bien el singular masculino del griego y el estilo narrativo.
- source_word: ἔσπειρεν
  english_pob_choice: sowed
  chosen_spanish: sembró
  alternatives_spanish:
  - esparció
  - plantó
  lexicon: BDAG
  rationale: σπείρω significa sembrar. «Sembró» es el equivalente preciso en español y conserva el campo semántico agrícola del original mejor que «plantó».
- source_word: ἐν τῷ ἀγρῷ αὐτοῦ
  english_pob_choice: in his field
  chosen_spanish: en su campo
  alternatives_spanish:
  - en su parcela
  - en su terreno
  lexicon: BDAG
  rationale: ἀγρός se rinde naturalmente por «campo» en este contexto agrícola. El posesivo αὐτοῦ se conserva con «su».
theological_decisions:
- issue: Fórmula mateana «ἡ βασιλεία τῶν οὐρανῶν»
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reinado de los cielos
  - el reino del cielo
  rationale: Se preserva la expresión fija de Mateo sin reemplazarla por una abstracción como «reinado», que estrecharía el alcance del término. La forma tradicional «reino de los cielos» es transparente y fiel al texto.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto de referencia mantiene alta concordancia entre el griego, la traducción inglesa POB y el audit trail, por lo que no se requieren notas de variante ni ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «reino de los cielos» como término fijo de Mateo para conservar consistencia interna.
  - Se usa «semilla de mostaza» por claridad natural en español; «grano de mostaza» queda como alternativa registrada porque el griego κόκκος admite ambas lecturas.
  - Se prefirió «presentó» para reflejar el valor de παρατίθημι sin volver la frase excesivamente literal.
  - No se añadieron notas al pie porque el pasaje no presenta variantes textuales ni tensiones léxicas que requieran marcadores en el texto español.
