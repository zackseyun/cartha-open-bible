translation:
  language: es
  text: Ustedes, pues, oigan la parábola del que sembró.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Ustedes, pues
  - Así como ustedes
  lexicon: BDAG
  rationale: El pronombre griego es explícito y enfático. En español, 'Ustedes' conserva bien esa focalización sin forzar una paráfrasis. Se mantiene el vocativo implícito con el orden natural de la frase.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: La partícula marca transición inferencial desde la explicación anterior. 'Pues' suena natural en español y conserva la conexión discursiva sin endurecer el tono como 'por tanto'.
- source_word: ἀκούσατε
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - atiendan
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀκούω pide un mandato directo. 'Oigan' reproduce el valor auditivo de 'hear' y evita ampliar el sentido a 'entender' o 'obedecer'.
- source_word: παραβολὴν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - ilustración
  lexicon: BDAG
  rationale: '''Parábola'' es el equivalente usual y preciso en este contexto sinóptico. Otras opciones diluyen el género literario específico.'
- source_word: τοῦ σπείραντος
  english_pob_choice: the one who sowed
  chosen_spanish: del que sembró
  alternatives_spanish:
  - del sembrador
  - del que ha sembrado
  lexicon: BDAG
  rationale: El participio aoristo sustantivado significa literalmente 'del que sembró'. 'Del que sembró' sigue de cerca la construcción griega y evita convertirlo en un título fijo. 'Sembrador' sería más idiomático pero menos directo respecto del participio.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó 'the sower' por 'the one who sowed' para reflejar con más precisión el participio griego y evitar tratarlo como título. En español se siguió la misma decisión con 'del que sembró'.
  spanish_consistency_notes:
  - Se mantuvo un registro formal pero natural para lectura pública.
  - Se preservó la relación inferencial de οὖν con 'pues' sin sobreinterpretación.
  - No se añadieron notas porque no surgieron ambigüedades textuales o teológicas que requirieran alternativas publicables.
