review_pass:
  verdict: revise
  source_alignment_summary: El borrador español preserva bien la estructura explicativa y contrastiva del griego, así como la generalidad del objeto implícito de «tener». También mantiene adecuadamente el valor ascensivo de καί en «aun». Sin embargo, en la cláusula final «se le quitará de él» no refleja buen español ni es la mejor equivalencia de ἀρθήσεται ἀπ’ αὐτοῦ; en español natural y fiel debe decir «le será quitado» o «se le quitará», no ambas marcas de extracción a la vez.
  spanish_quality_summary: El texto es generalmente claro y digno, pero «a cualquiera que tiene» suena menos natural que «al que tiene» o «a cualquiera que tenga» en este contexto proverbial. Más importante, «se le quitará de él» es torpe y redundante. La nota b tampoco explica bien el fenómeno, porque el español revisado puede conservar el singular genérico sin forzar «de él» en el texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de no explicitar el objeto implícito es correcta. El manejo del masculino singular genérico debe preservarse, pero mediante formas idiomáticas españolas («le», y si se desea, nota explicativa), no con una construcción antinatural como «de él».
  issues:
  - severity: medium
    issue: «se le quitará de él» es una construcción antinatural en español
    rationale: Aunque intenta reflejar ἀπό, en español esta duplicación suena forzada y reduce la legibilidad. «Le será quitado» comunica fielmente la remoción pasiva sin pérdida de sentido.
  - severity: low
    issue: «a cualquiera que tiene» suena menos idiomático en un dicho proverbial
    rationale: Es comprensible, pero «al que tiene» es más natural y mantiene el valor general de ὅστις sin rigidez.
  - severity: low
    issue: La nota b está anclada a una formulación defectuosa del texto
    rationale: Si el texto principal ya no dice «de él», la nota debe reformularse para explicar que el griego usa masculino singular genérico, visible en «le» y en la estructura singular del dicho.
