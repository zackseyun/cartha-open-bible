revisions:
- from: Porque a cualquiera que tiene, se le dará[a], y tendrá en abundancia; pero al que no tiene, aun lo que tiene se le quitará de él[b].
  to: Porque al que tiene[a], se le dará, y tendrá en abundancia; pero al que no tiene[b], aun lo que tiene le será quitado.
  rationale: Se corrige la cláusula final a un español natural y fiel («le será quitado»), se mejora la fluidez proverbial con «al que tiene», y se ajusta la nota sobre el masculino singular genérico para que explique el dato del griego sin imponer una formulación antinatural en el texto principal.
