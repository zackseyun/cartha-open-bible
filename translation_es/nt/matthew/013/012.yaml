translation:
  language: es
  text: Porque al que tiene[a], se le dará, y tendrá en abundancia; pero al que no tiene[b], aun lo que tiene le será quitado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se le dará, y abundará».
    reason: lexical_alternative
  - marker: b
    text: El griego usa formas masculinas singulares de manera genérica en este dicho.
    reason: cultural_note
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: whoever
  chosen_spanish: a cualquiera que
  alternatives_spanish:
  - quien
  - quienquiera que
  lexicon: BDAG
  rationale: El pronombre indefinido introduce una afirmación general. «A cualquiera que» conserva el valor distributivo y suena natural en español bíblico actual.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Marca la relación explicativa con la declaración anterior. «Porque» mantiene bien esa fuerza conectiva en español sin sonar forzado.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  lexicon: BDAG
  rationale: El presente de posesión se rinde de forma directa con «tiene», que es idiomático y mantiene la amplitud del dicho sin añadir un objeto explícito.
- source_word: δοθήσεται αὐτῷ
  english_pob_choice: more will be given to him
  chosen_spanish: se le dará
  alternatives_spanish:
  - le será dado
  - más le será dado
  lexicon: BDAG
  rationale: El griego dice simplemente «será dado a él»; el inglés POB añadió «more» por implicación contextual. En español conviene no explicitar «más» en la cláusula principal, porque la idea de incremento ya queda reforzada por «tendrá en abundancia».
- source_word: περισσευθήσεται
  english_pob_choice: he will have an abundance
  chosen_spanish: tendrá en abundancia
  alternatives_spanish:
  - abundará
  - rebosará
  lexicon: BDAG
  rationale: El futuro pasivo de περισσεύω expresa resultado de abundancia. «Tendrá en abundancia» es natural y mantiene la idea de desbordamiento sin volverla más interpretativa de lo que exige el griego.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - sino que
  lexicon: BDAG
  rationale: Introduce contraste directo entre ambos miembros del proverbio. «Pero» es la equivalencia más clara y común en español.
- source_word: οὐκ ἔχει
  english_pob_choice: does not have
  chosen_spanish: no tiene
  alternatives_spanish:
  - no posee
  lexicon: BDAG
  rationale: Negación simple de posesión; «no tiene» reproduce con naturalidad la forma general del dicho.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - hasta
  lexicon: BDAG
  rationale: 'Aquí καί intensifica la paradoja: «aun lo que tiene». «Aun» conserva esa fuerza ascendente de modo breve y preciso.'
- source_word: ὃ ἔχει
  english_pob_choice: what he has
  chosen_spanish: lo que tiene
  alternatives_spanish:
  - aquello que tiene
  - lo que posee
  lexicon: BDAG
  rationale: El relativo neutro se expresa naturalmente como «lo que tiene». Mantiene la generalidad del original sin especificar el objeto.
- source_word: ἀρθήσεται ἀπ’ αὐτοῦ
  english_pob_choice: will be taken from him
  chosen_spanish: se le quitará de él
  alternatives_spanish:
  - será tomado de él
  - le será quitado
  lexicon: BDAG
  rationale: El pasivo de αἴρω con ἀπό expresa remoción. «Se le quitará de él» conserva el sentido, aunque resulta algo redundante en español; se mantiene para reflejar con transparencia la dirección del movimiento y la forma pasiva del griego.
- source_word: αὐτῷ / αὐτοῦ
  english_pob_choice: him / him
  chosen_spanish: le / de él
  alternatives_spanish:
  - a él / de él
  - le / de él
  lexicon: BDAG
  rationale: Se conserva el singular masculino genérico del griego. En español, «le» y «de él» mantienen la referencia sin neutralizarla ni pluralizarla.
theological_decisions:
- issue: Objeto implícito de 'tener' y 'dar'
  english_pob_reading: The main text leaves the object unstated, preserving generality.
  chosen_spanish_reading: También se deja sin especificar el objeto en el texto principal.
  alternative_spanish_readings:
  - entendimiento
  - receptividad
  - conocimiento del reino
  rationale: En el contexto, la afirmación se relaciona con la recepción de las parábolas y los misterios del reino, pero el griego no nombra el objeto. La traducción conserva esa apertura y evita estrechar el sentido.
  doctrine_reference: 'Translation philosophy #3'
- issue: Masculino singular genérico
  english_pob_reading: Retained 'him' rather than shifting to plural or singular 'they.'
  chosen_spanish_reading: 'Se mantiene el singular masculino genérico: «se le dará», «tendrá», «de él».'
  alternative_spanish_readings:
  - se les dará
  - tendrán
  - de ellos
  rationale: El original usa formas masculinas singulares de manera genérica. El español puede reflejar esa misma forma sin forzar una pluralización ni una neutralización que borre la huella gramatical del griego.
  doctrine_reference: 'Translation philosophy #4'
translation_notes:
  revision_awareness: El pasaje coincide de cerca con el texto griego SBLGNT y con la solución inglesa aprobada. La principal diferencia de decisión en español es no explicitar «más» en la primera cláusula, porque la abundancia ya queda expresada con claridad en la segunda. También se ajustó la pasiva griega a un español natural sin perder la dirección del movimiento ni la genericidad del sujeto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplica en este versículo; no hay términos divinos directos.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - Se usa un registro bíblico moderno y claro, sin calcos innecesarios.
  - Se conserva la pasiva y la genericidad del griego en formas como «se le dará» y «se le quitará».
