translation:
  language: es
  text: ¿No es este el hijo del carpintero? ¿No se llama su madre María, y sus hermanos[a] Jacobo, José[b], Simón y Judas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'parientes' o 'familiares' para 'hermanos'; la palabra griega normalmente significa 'hermanos', pero algunos la entienden de modo más amplio en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen 'Joses' en lugar de 'José'.
    reason: textual_variant
lexical_decisions:
- source_word: τέκτονος
  english_pob_choice: carpenter’s
  chosen_spanish: del carpintero
  alternatives_spanish:
  - del constructor
  - del artesano
  lexicon: BDAG
  rationale: τέκτων puede abarcar a un artesano de madera o de construcción; en español, 'carpintero' es la forma más natural y tradicional aquí, y conserva bien el sentido probable del término en el contexto familiar inmediato.
- source_word: υἱός
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - descendiente
  lexicon: BDAG
  rationale: El contexto familiar hace inequívoco el sentido filial literal; 'hijo' es la correspondencia directa y más clara en español.
- source_word: οὐχ ... ;
  english_pob_choice: Is this not ... ? Is not ... ?
  chosen_spanish: ¿No es este ...? ¿No se llama ...?
  alternatives_spanish:
  - ¿No es éste ...? ¿No llaman a su madre ...?
  lexicon: BDAG
  rationale: Las preguntas retóricas griegas esperan una respuesta afirmativa; en español, la construcción negativa mantiene el tono y la estructura sin forzar un calco.
- source_word: λέγεται
  english_pob_choice: is called
  chosen_spanish: se llama
  alternatives_spanish:
  - es llamado
  - es conocido como
  lexicon: BDAG
  rationale: El pasivo presente idiomático se expresa de modo natural con 'se llama' en español; conserva la idea de denominación sin sonar artificial.
- source_word: Μαριὰμ
  english_pob_choice: Mary
  chosen_spanish: María
  alternatives_spanish:
  - Mariam
  lexicon: BDAG
  rationale: El nombre propio se adapta a la forma estándar española 'María', plenamente reconocible y fiel a la convención bíblica.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - familiares
  - consanguíneos
  lexicon: BDAG
  rationale: La acepción básica de ἀδελφοί es 'hermanos'. Se conserva en el texto principal para no resolver la discusión interpretativa sobre el parentesco de Jesús; las opciones más amplias quedan como alternativa implícita en la nota.
- source_word: Ἰάκωβος
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  - Jacobo
  lexicon: BDAG
  rationale: Para el nombre Ἰάκωβος, 'Jacobo' refleja bien la forma tradicional española derivada del mismo nombre bíblico, mientras que 'Santiago' sería una convención distinta y menos directa aquí.
- source_word: Ἰωσὴφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joséf
  - Joses
  lexicon: BDAG
  rationale: Aunque el texto base griego tiene Ἰωσήφ, la forma española normal del nombre es 'José'. Dado que la nota textual del inglés se refiere a la variante 'Joses', se preserva esa alternativa en la decisión textual sin imponerla al texto principal.
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simon
  lexicon: BDAG
  rationale: Transliteración española estándar del nombre propio griego.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Jude
  - Judá
  lexicon: BDAG
  rationale: '''Judas'' es la forma española directa del nombre griego en este pasaje; ''Jude'' sería una convención inglesa no necesaria aquí.'
theological_decisions:
- issue: Sentido de ἀδελφοὶ αὐτοῦ en relación con la familia de Jesús
  english_pob_reading: Render literally as 'his brothers' in the main text
  chosen_spanish_reading: Traducir literalmente 'sus hermanos' en el texto principal
  alternative_spanish_readings:
  - sus parientes
  - sus familiares
  - sus hermanos (en sentido amplio)
  rationale: Se preserva el valor léxico ordinario de ἀδελφοί sin resolver la discusión doctrinal sobre la relación exacta de estos hombres con Jesús. La nota mantiene abierta la posibilidad de un sentido más amplio sin desplazar la lectura literal del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el control cruzado informó alta coincidencia y se mantuvo el texto base sin ajustes sustantivos.
  spanish_consistency_notes:
  - Se usa 'hijo' y 'hermanos' con registro bíblico natural y fiel al original.
  - 'La secuencia de nombres se adapta a formas españolas estándar: María, Jacobo, José, Simón y Judas.'
  - Las notas [a] y [b] están ancladas explícitamente en el texto principal para cumplir la trazabilidad editorial.
