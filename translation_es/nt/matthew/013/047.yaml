translation:
  language: es
  text: Otra vez, el reino de los cielos es semejante a una red de arrastre[a] echada al mar y que recoge de toda clase[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «red»; el término griego se refiere más específicamente a una gran red de arrastre o barredera.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «de toda clase»; en la imagen de pesca se sobreentiende lo que se recoge, pero no aparece expresamente en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Otra vez más
  lexicon: BDAG
  rationale: Marca la continuidad con la parábola anterior. «Otra vez» es natural en español y conserva la idea de repetición sin añadir énfasis excesivo.
- source_word: ὁμοία ἐστὶν
  english_pob_choice: is like
  chosen_spanish: es semejante a
  alternatives_spanish:
  - es como
  - se parece a
  lexicon: BDAG
  rationale: La fórmula comparativa queda bien en español con «es semejante a», que mantiene el tono de comparación sin volverla demasiado coloquial.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino de Dios
  - el reinado de los cielos
  lexicon: BDAG
  rationale: Se preserva la expresión mateana tradicional y transparente en español. «Cielos» mantiene el plural del griego y la forma reconocible del evangelio de Mateo.
- source_word: σαγήνῃ
  english_pob_choice: a dragnet
  chosen_spanish: una red barredera[a]
  alternatives_spanish:
  - una red
  - una red de arrastre
  lexicon: BDAG
  rationale: El término griego designa una red grande arrastrada por el agua. «Red barredera» comunica mejor la precisión léxica que la red genérica, y evita perder la imagen técnica que el inglés POB también documenta.
- source_word: βληθείσῃ
  english_pob_choice: cast
  chosen_spanish: echada
  alternatives_spanish:
  - arrojada
  - lanzada
  lexicon: BDAG
  rationale: Para redes, «echada» suena natural en español y conserva la acción de ser puesta en el mar. No exige un tono más fuerte que el contexto no pide.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - al mar
  - dentro del mar
  lexicon: BDAG
  rationale: Se mantiene «mar» en vez de adaptar a «lago», porque el griego dice θάλασσα y el texto debe conservar la forma del original.
- source_word: καὶ ... συναγαγούσῃ
  english_pob_choice: and gathering
  chosen_spanish: y que reúne
  alternatives_spanish:
  - y reuniendo
  - y que recoge
  lexicon: BDAG
  rationale: El participio se vierte con una relativa natural en español para expresar la acción continua/resultante de la red. «Reúne» conserva la fuerza de συνάγω sin añadir el objeto explícito.
- source_word: ἐκ παντὸς γένους
  english_pob_choice: from every kind
  chosen_spanish: de toda clase[b]
  alternatives_spanish:
  - de todo género
  - de toda especie
  lexicon: BDAG
  rationale: «Clase» comunica bien la idea de kinds/sorts en español actual. Se evita especificar «peces» porque no está explícito en el griego; la nota preserva la tensión léxica que el inglés POB documentó.
theological_decisions:
- issue: Expresión mateana «reino de los cielos»
  english_pob_reading: Retain the Matthean phrase 'kingdom of heaven' without paraphrasing it as 'kingdom of God' or 'reign of God.'
  chosen_spanish_reading: Conservar «reino de los cielos» sin reformularlo como «reino de Dios» ni como «reinado».
  alternative_spanish_readings:
  - reino de Dios
  - reinado de los cielos
  rationale: La redacción mateana se preserva como forma propia del evangelio. No hay razón contextual aquí para resolver la expresión hacia otra formulación.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una redacción que explicaba «fish from every kind» a la forma revisada «from every kind», suprimiendo «fish» por no estar explícito en el griego. La propuesta española sigue esa revisión y evita añadir un objeto no presente en la fuente, manteniendo la imagen de la red y la ambigüedad controlada del participio.
  spanish_consistency_notes:
  - Se usa «reino de los cielos» de forma consistente con el estilo mateano y con la terminología POB prevista para τόπicos divinos en español.
  - Se evita «SEÑOR» o equivalentes de máscara, ya que el texto no contiene el nombre divino ni κύριος.
  - «Red barredera» y «de toda clase» mantienen la precisión del original sin sobreexplicar.
  - La puntuación y el orden oracional buscan naturalidad en español, pero sin abandonar la sintaxis comparativa del griego.
