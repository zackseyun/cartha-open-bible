  glossary_alignment: 'Buena alineación con la terminología del proyecto: «reino de los cielos» preserva la expresión mateana; no hay términos teológicos conflictivos. La decisión de no añadir «peces» está bien alineada con el rastro de auditoría inglés. La nota léxica sobre la red debe conservarse.'
