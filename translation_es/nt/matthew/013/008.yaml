review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: contraste adversativo («Pero»), movimiento literal de la semilla («cayó»), terreno fértil («la buena tierra») y aspecto imperfectivo («daba fruto»). Sin embargo, la expresión distributiva final no preserva con suficiente precisión el valor de rendimiento multiplicado. «Unas cien veces, otras sesenta y otras treinta» suena elíptico e impreciso en español bíblico moderno; conviene explicitar el sentido de multiplicación con «al ciento por uno» en paralelo con sesenta y treinta.'
  spanish_quality_summary: El español es natural y legible, pero la última cláusula puede mejorarse. «Buena tierra» y «daba fruto» son idiomáticos y dignos. La serie «unas cien veces, otras sesenta y otras treinta» resulta menos clara que una formulación agrícola establecida y comprensible para lectores eclesiales amplios.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones «semilla», «tierra», «fruto» y «Pero» son adecuadas. La única corrección necesaria es léxica/estilística en la frase distributiva para reflejar mejor ὃ μὲν... ὃ δὲ... ὃ δὲ... y el valor implícito de ‘fold’.
  issues:
  - severity: medium
    issue: La frase «unas cien veces, otras sesenta y otras treinta» no expresa con suficiente claridad el rendimiento multiplicado.
    rationale: El griego sobreentiende ‘veces/por uno’ como medida de cosecha. En español, «cien veces» sin apoyo puede sonar adverbial o ambiguo. «Al ciento por uno, al sesenta, y al treinta» comunica mejor el sentido agrícola tradicional y sigue siendo natural.
  - severity: low
    issue: La nota al pie repite una alternativa que no añade una verdadera variante española útil.
    rationale: La nota actual cita prácticamente el mismo texto base y propone «algunas... algunas... algunas», que es menos idiomático que «unas... otras... otras» o una forma con «unos... otros... otros» si se explicita ‘granos/rendimientos’. Debe actualizarse para corresponder a la revisión.
  revised_spanish_text: 'Pero otra semilla cayó en la buena tierra y daba fruto[a]: una al ciento por uno, otra al sesenta y otra al treinta.'
  revised_footnotes:
  - marker: a
    text: 'O, con una forma más cercana a la estructura griega, «daba fruto: unas a ciento por uno, otras a sesenta y otras a treinta».'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y del POB inglés, pero se ajusta la expresión distributiva para hacer explícito el rendimiento agrícola implícito y mejorar la claridad en español. También se actualiza la nota para ofrecer una alternativa real y pertinente.
