revisions:
- from: Pero otra semilla cayó en la buena tierra y daba fruto[a], unas cien veces, otras sesenta y otras treinta.
  to: 'Pero otra semilla cayó en la buena tierra y daba fruto[a]: una al ciento por uno, otra al sesenta y otra al treinta.'
  rationale: Se conserva el sentido del original y del POB inglés, pero se ajusta la expresión distributiva para hacer explícito el rendimiento agrícola implícito y mejorar la claridad en español. También se actualiza la nota para ofrecer una alternativa real y pertinente.
