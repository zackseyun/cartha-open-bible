translation:
  language: es
  text: 'Pero otra semilla cayó en la buena tierra y daba fruto[a]: una al ciento por uno, otra al sesenta y otra al treinta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con una forma más cercana a la estructura griega, «daba fruto: unas a ciento por uno, otras a sesenta y otras a treinta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα
  english_pob_choice: other seed
  chosen_spanish: otra semilla
  alternatives_spanish:
  - otras semillas
  - la otra semilla
  lexicon: BDAG
  rationale: El plural neutro sustantivado se refiere de nuevo a la semilla de la parábola. En español, el singular colectivo «semilla» conserva mejor la imagen agrícola que un plural genérico y evita una formulación forzada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con los resultados anteriores; «Pero» reproduce de forma natural el valor adversativo en español.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se sembró
  - llegó a caer
  lexicon: BDAG
  rationale: El verbo griego es literalmente «cayó». Aunque el contexto global es la siembra, mantener el movimiento de caída conserva la imagen del texto.
- source_word: ἐπὶ τὴν γῆν τὴν καλὴν
  english_pob_choice: on the good soil
  chosen_spanish: en la buena tierra
  alternatives_spanish:
  - sobre la buena tierra
  - en el buen suelo
  lexicon: BDAG
  rationale: γῆ puede ser tierra, suelo o campo; aquí «tierra» es natural en español y conserva el paralelismo agrícola. καλὴν se traduce «buena» en el sentido de apta/fértil, sin añadir explicación interpretativa.
- source_word: ἐδίδου καρπόν
  english_pob_choice: was producing fruit
  chosen_spanish: daba fruto
  alternatives_spanish:
  - estaba produciendo fruto
  - estaba dando fruto
  - produjo fruto
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o característica. «Daba fruto» comunica esa duratividad con naturalidad en español y preserva la metáfora bíblica de καρπός como fruto/rendimiento.
- source_word: ὃ μὲν ἑκατὸν ὃ δὲ ἑξήκοντα ὃ δὲ τριάκοντα
  english_pob_choice: some a hundredfold, some sixty, and some thirty
  chosen_spanish: unas cien veces, otras sesenta y otras treinta
  alternatives_spanish:
  - unas al ciento por uno, otras sesenta y otras treinta
  - unas cien por una, otras sesenta y otras treinta
  - unas a ciento por uno, otras a sesenta y otras a treinta
  lexicon: BDAG
  rationale: La construcción distributiva griega puede expresarse con «unas... otras... otras» para reflejar la variación de rendimientos. «Cien veces» evita una glosa técnica poco natural y comunica el sentido de multiplicación del fruto sin sobrecargar el texto.
theological_decisions:
- issue: Valor de la metáfora agraria y del rendimiento abundante
  english_pob_reading: was producing fruit, some a hundredfold, some sixty, and some thirty
  chosen_spanish_reading: daba fruto, unas cien veces, otras sesenta y otras treinta
  alternative_spanish_readings:
  - producía fruto, unas cien veces, otras sesenta y otras treinta
  - daba fruto, algunas cien veces, algunas sesenta y algunas treinta
  rationale: La redacción española conserva el valor metafórico de fruto como resultado visible de la semilla en buena tierra. No se interpreta más allá del texto; solo se mantiene la idea de abundancia y variación de la cosecha.
  doctrine_reference: Parábola del sembrador; fruto como evidencia de receptividad y productividad espiritual
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió una coma y la construcción distributiva con «some... some... some» para reflejar mejor el griego. En español, se adoptó una solución equivalente y natural con «unas... otras... otras», manteniendo la alternancia distributiva sin calcar el inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto.
  - Se usó «fruto» de manera consistente con el campo semántico agrícola bíblico; no se sustituyó por términos interpretativos como «resultado» o «éxito».
  - Se prefirió «buena tierra» sobre «buen suelo» por mayor naturalidad y tradición bíblica comprensible en español, sin perder precisión.
  - La nota al pie conserva la alternativa distributiva porque el griego permite más de una representación legítima en español.
