  source_alignment_summary: 'El borrador refleja bien la estructura del griego y el giro proverbial, pero dos elecciones principales no preservan con suficiente claridad el sentido auditado: «se ofendían de él» suena poco natural en español actual, y «su propia casa» en el texto principal pierde el valor social de οἰκία que el audit trail inglés privilegia como «household». Además, «propia patria» es comprensible pero menos precisa que una referencia local como «su propio pueblo».'
  spanish_quality_summary: El español es mayormente claro y digno, pero necesita pulido para sonar natural y ampliamente legible. «Se ofendían de él» no es la formulación más idiomática; «se ofendían por él» o mejor «se ofendían por causa de él»/«se ofendían de él» compite con usos regionales. «No carece de honra» es aceptable pero algo rígido; puede mantenerse por fidelidad proverbial. «Su propia casa» en el cuerpo del texto suena demasiado literal y menos claro que «su propia familia» o «los de su casa».
  glossary_alignment: No hay conflictos con términos troncales del proyecto. «Jesús» está correcto. La principal cuestión léxica es reflejar mejor πατρίς como localidad natal y οἰκία como círculo doméstico. Conviene mantener la forma proverbial con «honra» o «honor» y no expandir interpretativamente.
  issues:
  - severity: medium
    issue: «se ofendían de él» es poco natural
    rationale: Aunque apunta al sentido de ἐσκανδαλίζοντο ἐν αὐτῷ, en español general resulta menos idiomático que «se ofendían por causa de él» o «se escandalizaban por él». La traducción debe ser fiel y legible.
  - severity: medium
    issue: «su propia casa» debilita el sentido social de οἰκία
    rationale: El audit trail inglés prefirió «household» porque el dicho apunta al ámbito doméstico/familiar, no solo al edificio. En español conviene «su propia familia» o «los de su propia casa».
  - severity: low
    issue: «propia patria» puede sonar demasiado amplia
    rationale: πατρίς aquí se refiere a la localidad natal en el contexto de Nazaret. «Su propio pueblo» o «su lugar natal» comunica mejor ese alcance local para lectores modernos.
