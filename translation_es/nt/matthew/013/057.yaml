translation:
  language: es
  text: 'Y se ofendían[a] por causa de él. Pero Jesús les dijo: «Un profeta no carece de honra sino en su propio pueblo[b] y en su propia familia[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se escandalizaban por él»; literalmente, «eran hechos tropezar en él».
    reason: lexical_alternative
  - marker: b
    text: O «lugar natal» o «tierra natal». El griego se refiere a la localidad de origen.
    reason: lexical_alternative
  - marker: c
    text: O «su propia casa». El griego puede referirse a una casa o al círculo doméstico/familiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσκανδαλίζοντο ἐν αὐτῷ
  english_pob_choice: they took offense at him
  chosen_spanish: se ofendían de él
  alternatives_spanish:
  - se escandalizaban de él
  - tropezaban por causa de él
  lexicon: BDAG
  rationale: El verbo σκανδαλίζομαι en este contexto expresa ofensa o rechazo ante la persona de Jesús, no tropiezo literal. «Se ofendían de él» conserva el sentido relacional y resulta natural en español bíblico contemporáneo.
- source_word: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς
  english_pob_choice: But Jesus said to them
  chosen_spanish: Pero Jesús les dijo
  alternatives_spanish:
  - Y Jesús les dijo
  lexicon: BDAG
  rationale: δέ introduce un contraste suave con la reacción anterior; «Pero» refleja mejor ese giro discursivo que un simple «Y».
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  - mensajero profético
  lexicon: BDAG
  rationale: «Profeta» es el equivalente directo y transparente, y mantiene el carácter proverbial de la frase.
- source_word: ἄτιμος
  english_pob_choice: without honor
  chosen_spanish: no carece de honra
  alternatives_spanish:
  - es despreciado
  - está sin honra
  lexicon: BDAG
  rationale: La formulación proverbial οὐκ ἔστιν προφήτης ἄτιμος pide conservar la idea de honor/deshonra sin aplanarla. «No carece de honra» reproduce la negación del dicho y preserva el matiz honorífico.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  lexicon: BDAG
  rationale: En esta construcción de excepción, «sino» es la forma natural en español y conserva la estructura proverbial.
- source_word: πατρίδι
  english_pob_choice: hometown
  chosen_spanish: propia patria
  alternatives_spanish:
  - pueblo natal
  - lugar de origen
  - tierra natal
  lexicon: BDAG
  rationale: Πατρίς designa la localidad de origen; en español, «patria» puede sonar más amplia, pero con «propia» y el paralelismo con «casa» mantiene el ámbito local y la resonancia del proverbio. Se anota la alternativa porque el inglés POB documenta el posible sentido de localidad natal.
- source_word: οἰκίᾳ αὐτοῦ
  english_pob_choice: his own household
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su propio hogar
  - su familia
  - su propia casa o familia
  lexicon: BDAG
  rationale: οἰκία puede significar casa o círculo doméstico. Dado el proverbio, «su propia casa» conserva la ambigüedad entre edificio y familia/hogar, como el audit trail inglés señala.
theological_decisions:
- issue: Alcance del proverbio sobre el rechazo a Jesús
  english_pob_reading: Render the saying as a general proverb about a prophet lacking honor in his native setting, without importing a broader doctrinal claim about all rejection of Jesus.
  chosen_spanish_reading: Se mantiene el dicho proverbial sobre la falta de honra de un profeta en su propio ámbito natal y doméstico, sin ampliarlo a una paráfrasis doctrinal.
  alternative_spanish_readings:
  - Un énfasis interpretativo en la incredulidad familiar de Jesús
  rationale: El griego presenta un proverbio aplicado a la escena inmediata. La traducción debe preservar la tensión honor/deshonra y el marco local, sin convertir el versículo en una explicación doctrinal más amplia que el texto no formula.
  doctrine_reference: 'Principios de traducción POB: fidelidad al texto, conservación del género proverbial y no expansión interpretativa.'
translation_notes:
  revision_awareness: 'Coincide con el último control de revisión: no se requirieron cambios respecto del estado más reciente, y la versión propuesta mantiene la alta concordancia del auditor externo con la decisión de traducción.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se preserva «profeta» como término estable y reconocible.
  - «Casa» se mantiene para οἰκία porque conserva la ambigüedad documentada entre edificio y hogar/familia.
  - La nota sobre πατρίς refleja la alternativa semántica reconocida por el audit trail inglés, sin sobretraducir a un nacionalismo moderno.
