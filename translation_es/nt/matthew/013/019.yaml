translation:
  language: es
  text: Cuando alguien oye la palabra del reino y no la entiende[a], viene el maligno y arrebata lo que ha sido sembrado en su corazón. Este es el que fue sembrado junto al camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el malo».
    reason: lexical_alternative
  - marker: b
    text: O «el sembrado al lado del camino», o «junto a la orilla del camino».
    reason: lexical_alternative
lexical_decisions:
- source_word: παντὸς ἀκούοντος
  english_pob_choice: when anyone hears
  chosen_spanish: Cuando alguien oye
  alternatives_spanish:
  - Cuando cualquiera oye
  - Cuando toda persona oye
  lexicon: BDAG
  rationale: La construcción genitiva con participio funciona idiomáticamente como una cláusula general. «Cuando alguien oye» comunica el valor distributivo de πᾶς sin forzar un calco poco natural en español.
- source_word: λόγον τῆς βασιλείας
  english_pob_choice: the word of the kingdom
  chosen_spanish: la palabra del reino
  alternatives_spanish:
  - el mensaje del reino
  - la palabra acerca del reino
  lexicon: BDAG
  rationale: λόγος puede ser «palabra» o «mensaje», pero la imagen de la semilla en la parábola favorece conservar «palabra». «Del reino» mantiene la relación genitiva sin añadir explicaciones.
- source_word: μὴ συνιέντος
  english_pob_choice: does not understand it
  chosen_spanish: no la entiende
  alternatives_spanish:
  - no la comprende
  - no la capta
  lexicon: BDAG
  rationale: συνίημι aquí indica entender o captar el sentido. En español, «la» retoma naturalmente «la palabra del reino» y evita repetir el sustantivo de forma pesada.
- source_word: ὁ πονηρὸς
  english_pob_choice: the evil one
  chosen_spanish: el maligno
  alternatives_spanish:
  - el malo
  - el perverso
  lexicon: BDAG
  rationale: El artículo con este contexto apunta a un agente personal de oposición al mensaje. «El maligno» preserva esa lectura personal en español y suena más natural que «el malo».
- source_word: ἁρπάζει
  english_pob_choice: snatches away
  chosen_spanish: arrebata
  alternatives_spanish:
  - arranca
  - se lleva a la fuerza
  lexicon: BDAG
  rationale: ἁρπάζω expresa acción violenta y repentina. «Arrebata» transmite esa fuerza con buena naturalidad en español; el complemento implícito queda claro por el contexto.
- source_word: τὸ ἐσπαρμένον
  english_pob_choice: what has been sown
  chosen_spanish: lo que ha sido sembrado
  alternatives_spanish:
  - lo sembrado
  - lo que fue sembrado
  lexicon: BDAG
  rationale: El participio perfecto pasivo sustantivado se vierte de manera natural como «lo que ha sido sembrado», conservando el pasivo y la idea de un resultado presente.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su interior
  - en su ser interior
  lexicon: BDAG
  rationale: «Corazón» preserva el término antropológico bíblico sin expandirlo interpretativamente. El pronombre singular masculino queda reflejado en «su» conforme a la gramática del griego.
- source_word: οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Tal persona es
  - Este representa a
  lexicon: BDAG
  rationale: La fórmula introduce la identificación de la figura de la parábola. «Este es» es breve y natural en español, manteniendo la relación entre el oyente y el terreno/semilla.
- source_word: ὁ παρὰ τὴν ὁδὸν σπαρείς
  english_pob_choice: the one sown beside the road
  chosen_spanish: el que fue sembrado junto al camino
  alternatives_spanish:
  - el que fue sembrado al lado del camino
  - el sembrado junto a la senda
  lexicon: BDAG
  rationale: El griego dice literalmente «el sembrado junto al camino/road». «Junto al camino» conserva la imagen espacial y evita introducir una precisión que pudiera sonar demasiado técnica. «Fue sembrado» mantiene el pasivo y la referencia al elemento sembrado dentro de la metáfora.
theological_decisions:
- issue: Identidad de ὁ πονηρὸς
  english_pob_reading: a personal evil agent ('the evil one')
  chosen_spanish_reading: un agente personal maligno ('el maligno')
  alternative_spanish_readings:
  - una fuerza impersonal del mal ('el mal')
  - el malo
  rationale: El contexto inmediato presenta al que viene y arrebata la palabra como un personaje activo; por eso conviene preservar la lectura personal. «El maligno» evita resolver la tensión con una abstracción impersonal y refleja bien la fuerza del original.
  doctrine_reference: Afirmaciones; preservar la tensión teológica en lugar de resolverla prematuramente
- issue: Género gramatical en αὐτοῦ
  english_pob_reading: '''his heart'''
  chosen_spanish_reading: '''su corazón'' con referencia al singular masculino genérico'
  alternative_spanish_readings:
  - '''su corazón'' neutro en la traducción'
  - '''su interior'''
  rationale: El griego usa pronombre singular masculino; la referencia es representativa/generica dentro de «alguien». En español, «su corazón» conserva la forma del texto sin neutralizar innecesariamente la gramática fuente.
  doctrine_reference: 'Filosofía de traducción §4: mayor fidelidad gramatical que neutralización de género'
translation_notes:
  revision_awareness: El texto sigue de cerca el último pase del inglés POB, que quedó sin cambios tras la revisión. Se mantuvieron las decisiones estables sobre ὁ πονηρὸς como agente personal, la metáfora de la semilla/palabra y la identificación final de la persona sembrada junto al camino, ajustando solo la formulación natural del español.
  spanish_consistency_notes:
  - Se conserva «reino» y no se explicita «de Dios», siguiendo el griego y el inglés auditado.
  - «Palabra» se mantiene para λόγος por coherencia con la imagen de la parábola.
  - «Corazón» se usa en sentido antropológico bíblico, no como mera emoción.
  - La forma verbal pasiva «ha sido sembrado» preserva el valor del participio perfecto pasivo.
  - «El maligno» se usa de manera consistente para ὁ πονηρὸς en esta unidad.
  - La identificación final respeta la metáfora del sembrado, aunque en español se haga explícito «el que fue sembrado».
