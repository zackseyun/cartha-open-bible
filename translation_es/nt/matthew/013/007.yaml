translation:
  language: es
  text: Otras semillas cayeron entre las espinas[a], y las espinas crecieron y las sofocaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente “cayeron sobre las espinas”; se vierte “entre las espinas” por naturalidad en este contexto agrícola.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα
  english_pob_choice: Other seeds
  chosen_spanish: Otras semillas
  alternatives_spanish:
  - Otras
  - Otros granos
  lexicon: BDAG
  rationale: El adjetivo neutro plural se usa sustantivado y remite implícitamente a la semilla del contexto inmediato. En español, 'Otras semillas' hace explícito el referente sin añadir contenido nuevo y conserva la referencia parabólica.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como un conector suave de secuencia. 'Y' mantiene el avance narrativo natural en español sin cargar un matiz adversativo que el griego no exige.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron sembradas
  - se cayeron
  lexicon: BDAG
  rationale: El aoristo de πίπτω significa de manera directa 'caer'. En español, el plural 'cayeron' concuerda con 'otras semillas' y conserva la imagen básica del griego.
- source_word: ἐπὶ τὰς ἀκάνθας
  english_pob_choice: among the thorns
  chosen_spanish: entre las espinas
  alternatives_spanish:
  - sobre las espinas
  - en las espinas
  lexicon: BDAG
  rationale: Aunque ἐπί con acusativo es literalmente 'sobre/en', el contexto agrícola pide una expresión natural que comunique la caída dentro del ámbito de la maleza espinosa. 'Entre las espinas' refleja la decisión funcional de la versión inglesa sin perder la imagen.
- source_word: ἀκάνθας / ἄκανθαι
  english_pob_choice: thorns
  chosen_spanish: espinas
  alternatives_spanish:
  - cardos
  - zarzas espinosas
  lexicon: BDAG
  rationale: '''Espinas'' es el equivalente más directo y claro en español para ἄκανθα en este pasaje. ''Cardos'' o ''zarzas espinosas'' serían más específicos, pero aquí el término genérico conserva mejor la amplitud del original.'
- source_word: ἀνέβησαν
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - crecieron
  - brotaron
  lexicon: BDAG
  rationale: El verbo ἀναβαίνω significa literalmente 'subir' o 'venir arriba'. 'Subieron' preserva esa imagen ascendente del crecimiento; aunque en español puede sonar menos natural que 'crecieron' o 'brotaron', evita suavizar demasiado la metáfora verbal del griego.
- source_word: ἔπνιξαν
  english_pob_choice: choked
  chosen_spanish: las ahogaron
  alternatives_spanish:
  - las sofocaron
  - las estrangularon
  lexicon: BDAG
  rationale: πνίγω significa ahogar, sofocar o estrangular. Dado que el sujeto son las espinas y el objeto son las semillas, 'las ahogaron' transmite el efecto de asfixia/agobio con una imagen natural en español y conserva la fuerza figurada del verbo.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las semillas
  - los
  lexicon: BDAG
  rationale: El pronombre neutro plural retoma el referente implícito de las semillas. En español, 'las' armoniza con 'semillas' y evita una repetición excesiva, manteniendo la referencia contextual.
translation_notes:
  revision_awareness: Se siguió el paquete de fuente griega SBLGNT y el rastro de auditoría en inglés. La versión inglesa ya había decidido preservar la fuerza verbal de πίπτω y πνίγω, y optar por una equivalencia idiomática para ἐπὶ τὰς ἀκάνθας; la redacción española refleja esas decisiones sin depender mecánicamente del inglés. No hubo cambios revisados posteriores en el pase más reciente.
  spanish_consistency_notes:
  - Se usó 'espinas' de manera consistente para ἀκάνθαι/ἀκάνθας.
  - Se mantuvo el plural verbal y pronominal en español para concordar con 'otras semillas'.
  - Se preservó el paralelismo narrativo simple del griego con conectores breves y claros.
