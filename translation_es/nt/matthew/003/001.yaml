translation:
  language: es
  text: En aquellos días vino[a] Juan el Bautista, predicando en el desierto de Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apareció» para παραγίνεται; el griego usa un presente histórico.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν δὲ ταῖς ἡμέραις ἐκείναις
  english_pob_choice: Now in those days
  chosen_spanish: Ahora, en aquellos días
  alternatives_spanish:
  - En aquellos días
  - Y en aquellos días
  lexicon: BDAG
  rationale: La expresión temporal se conserva con valor narrativo. «Ahora» traduce bien el matiz discursivo de δέ como transición suave, sin forzar contraste fuerte. «En aquellos días» mantiene el marco temporal bíblico y fluye naturalmente en español.
- source_word: παραγίνεται
  english_pob_choice: came
  chosen_spanish: se presentó
  alternatives_spanish:
  - vino
  - apareció
  - llegó
  lexicon: BDAG
  rationale: El presente histórico griego puede verterse en español con un pretérito narrativo. «Se presentó» comunica la entrada de Juan en la escena con naturalidad y sin insinuar una aparición milagrosa. «Apareció» es posible, pero puede sonar más interpretativo; «vino» o «llegó» son válidos, aunque menos precisos para el cambio de escena.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan
  lexicon: standard onomastics
  rationale: Nombre propio transliterado según la convención española establecida.
- source_word: ὁ βαπτιστὴς
  english_pob_choice: the Baptist
  chosen_spanish: el Bautista
  alternatives_spanish:
  - el Bautizador
  lexicon: BDAG
  rationale: Como título identificador de Juan, «el Bautista» es la forma asentada e inteligible en español. «El Bautizador» sería más literal respecto al sustantivo verbal, pero menos idiomático. Se preserva el valor de epíteto sin desplazarlo por una formulación eclesiástica distinta.
- source_word: κηρύσσων
  english_pob_choice: preaching
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: El participio expresa la acción concomitante de Juan. «Proclamando» conserva el sentido de anunciar públicamente con sobriedad. «Predicando» es posible y natural en contexto religioso, pero puede sonar más cargado de terminología homilética que el griego aquí. «Anunciando» es más general.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la soledad
  lexicon: BDAG
  rationale: Ἔρημος denota un lugar deshabitado o despoblado. En español, «desierto» comunica bien esa idea y mantiene la resonancia bíblica. «Soledad» no es suficiente como equivalente geográfico. Se evita «wilderness» por no ser natural en español.
- source_word: τῆς Ἰουδαίας
  english_pob_choice: of Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - de Judea
  lexicon: BDAG
  rationale: La referencia es regional y corresponde a la provincia/zona de Judea, no a Judá como tribu.
theological_decisions:
- issue: 'Título identificador de Juan: βαπτιστής'
  english_pob_reading: the Baptist
  chosen_spanish_reading: el Bautista
  alternative_spanish_readings:
  - el Bautizador
  rationale: No hay disputa doctrinal; es una decisión léxica de título. «El Bautista» conserva el uso reconocible en español y no altera el sentido del epíteto. «El Bautizador» es una alternativa más transparente, pero menos natural para lectores de iglesia en español.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del expediente inglés: la lectura inglesa mantiene ‘came’ con nota alternativa ‘appeared’ por el presente histórico; no se registran revisiones aplicadas adicionales. La versión española sigue esa misma decisión, trasladándola de forma natural con «se presentó».'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Juan» y el epíteto fijo «el Bautista» para consistencia intra-bíblica.
  - Se conserva el paralelismo narrativo con una apertura temporal suave («Ahora, en aquellos días»).
  - «Desierto» se usa con valor bíblico-geográfico, no como metáfora.
  - 'El participio se vierte con gerundio español de finalidad simultánea: «proclamando».'
