    issue: «Ahora, en aquellos días» suena menos natural que «En aquellos días»
    rationale: δέ puede reflejar transición suave, pero en español narrativo «Ahora» aquí resulta algo forzado. «En aquellos días» preserva el marco temporal con mejor fluidez y suficiente fidelidad.
  - severity: medium
    issue: «se presentó» para παραγίνεται se aparta de la sencillez de «came»
    rationale: Aunque es defendible, «se presentó» añade un matiz de entrada escénica más marcado. «Vino» es más simple, más cercano a la decisión auditada y totalmente natural en español bíblico.
  - severity: low
    issue: La nota al pie no refleja de la mejor manera la alternativa principal para παραγίνεται
    rationale: La auditoría inglesa conserva «appeared» como alternativa a «came». Si el texto principal se revisa a «vino», conviene dejar «apareció» como alternativa y explicar el presente histórico.
  - severity: low
    issue: «proclamando» es menos alineado que «predicando» con κηρύσσων y la auditoría inglesa
    rationale: «Proclamando» es válido, pero «predicando» representa de forma más directa el uso contextual y la elección inglesa «preaching».
  revised_spanish_text: En aquellos días vino[a] Juan el Bautista, predicando en el desierto de Judea.
