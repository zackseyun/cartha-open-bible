revisions:
- from: Pero Juan mismo vestía ropa de pelo de camello y un cinturón de cuero alrededor de la cintura[a][b][c], y su alimento eran langostas y miel silvestre.
  to: Juan mismo vestía ropa de pelo de camello y un cinturón de cuero alrededor de su cintura[a][b][c], y su alimento eran saltamontes y miel silvestre.
  rationale: Se suaviza el conector para reflejar mejor δέ, se elimina la ambigüedad de «langostas» usando «saltamontes», y se mejora la naturalidad con «su cintura». También se ajusta la nota c para alinearla con el historial auditado.
