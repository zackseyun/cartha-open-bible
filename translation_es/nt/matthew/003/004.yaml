translation:
  language: es
  text: Juan mismo vestía ropa de pelo de camello y un cinturón de cuero alrededor de su cintura[a][b][c], y su alimento eran saltamontes y miel silvestre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La vestimenta de Juan recuerda la apariencia del profeta Elías en 2 Reyes 1:8, un trasfondo importante para la presentación de Juan en Mateo.
    reason: cross_reference
  - marker: b
    text: 'O: «su vestimenta era de pelo de camello».'
    reason: lexical_alternative
  - marker: c
    text: 'Redacción previa: «llevaba ropa hecha de».'
    reason: previous_rendering
lexical_decisions:
- source_word: αὐτὸς δὲ ὁ Ἰωάννης
  english_pob_choice: Now John himself
  chosen_spanish: Pero Juan mismo
  alternatives_spanish:
  - Y Juan mismo
  - Ahora bien, Juan mismo
  lexicon: BDAG
  rationale: αὐτός es enfático; por eso se conserva con «mismo». δέ introduce una transición suave; «Pero» mantiene el giro narrativo natural en español sin añadir interpretación.
- source_word: εἶχεν
  english_pob_choice: wore
  chosen_spanish: vestía
  alternatives_spanish:
  - tenía
  - llevaba puesto
  lexicon: BDAG
  rationale: El verbo griego es literalmente «tenía», pero en contexto describe la indumentaria habitual. «Vestía» comunica con naturalidad el estado continuo de estar vestido con esa ropa sin implicar fabricación ni un acto puntual.
- source_word: τὸ ἔνδυμα αὐτοῦ
  english_pob_choice: his clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestido
  - vestimenta
  - su indumento
  lexicon: BDAG
  rationale: ἔνδυμα puede ser prenda/vestimenta. «Ropa» funciona colectivamente para la descripción del conjunto en español moderno y evita sonar demasiado técnico o arcaico.
- source_word: ἀπὸ τριχῶν καμήλου
  english_pob_choice: made of camel’s hair
  chosen_spanish: de pelo de camello
  alternatives_spanish:
  - hecha de pelo de camello
  - de pelos de camello
  lexicon: BDAG
  rationale: ἀπό con material indica composición. «De pelo de camello» expresa el material de manera fiel y natural; «de pelos de camello» sonaría menos idiomático en español.
- source_word: ζώνην δερματίνην
  english_pob_choice: a leather belt
  chosen_spanish: un cinturón de cuero
  alternatives_spanish:
  - un cinturón de piel
  - una faja de cuero
  lexicon: BDAG
  rationale: ζώνη es un cinturón o banda; «cinturón» es el equivalente más claro. δερματίνη indica material de cuero/piel; «cuero» mantiene el valor material con mayor naturalidad.
- source_word: περὶ τὴν ὀσφὺν αὐτοῦ
  english_pob_choice: around his waist
  chosen_spanish: alrededor de la cintura
  alternatives_spanish:
  - alrededor de sus lomos
  - en torno a su cintura
  lexicon: BDAG
  rationale: ὀσφύς significa literalmente «lomo/cintura». «Cintura» es más comprensible y digno en español contemporáneo; «lomos» sería más literal pero más marcado y menos natural.
- source_word: ἡ δὲ τροφὴ ⸂ἦν αὐτοῦ⸃
  english_pob_choice: and his food was
  chosen_spanish: y su alimento eran
  alternatives_spanish:
  - y su comida era
  - y se alimentaba de
  lexicon: BDAG
  rationale: τροφή significa alimento/nutrición. Se usa «alimento» para conservar el registro un poco más formal que «comida» y «eran» en plural para concordar con la enumeración siguiente.
- source_word: ἀκρίδες
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - saltamontes
  - langostas del campo
  lexicon: BDAG
  rationale: El sentido léxico normal es el insecto «langostas». «Saltamontes» sería una conjetura innecesaria y podría debilitar la conexión con el texto.
- source_word: μέλι ἄγριον
  english_pob_choice: wild honey
  chosen_spanish: miel silvestre
  alternatives_spanish:
  - miel del monte
  - miel de campo
  lexicon: BDAG
  rationale: ἄγριος modifica la miel como procedente de la naturaleza silvestre, no de producción doméstica. «Silvestre» conserva esa fuerza de manera breve y clara en español.
theological_decisions:
- issue: Descripción austera y eco de Elías
  english_pob_reading: Render the description straightforwardly without importing interpretive commentary into the main text.
  chosen_spanish_reading: Traducir la descripción de forma directa y dejar la referencia intertextual para la nota.
  alternative_spanish_readings:
  - Formular el texto de modo más explícitamente alusivo a Elías
  - Incorporar una glosa interpretativa en el cuerpo del versículo
  rationale: El versículo presenta la vestimenta y la dieta de Juan como datos narrativos. Aunque el conjunto recuerda a Elías, la traducción principal no debe convertir esa resonancia en interpretación explícita; por eso se reserva para una nota.
  doctrine_reference: 2 Reyes 1:8; Mateo 11:14; principios POB de transparencia textual
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde una formulación más literal y ambigua («had his clothing made of») a una más natural («wore clothing made of») para evitar la idea de fabricación. En español se siguió esa decisión contextual con «vestía», que preserva el imperfecto descriptivo de εἶχεν y evita cualquier lectura de encargo o confección.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «Mesías/Cristo» no aplica aquí; no hay título cristológico en el versículo.
  - «langostas» se conservó por su sentido zoológico ordinario, sin suavizarlo.
  - «miel silvestre» mantiene la oposición natural/doméstico implícita en ἄγριον.
  - La puntuación y el orden español buscan fluidez sin borrar la estructura descriptiva doble del griego.
