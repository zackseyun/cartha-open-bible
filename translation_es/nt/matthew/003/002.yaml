translation:
  language: es
  text: 'y diciendo: «Arrepiéntanse[a], porque se ha acercado el reino de los cielos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «cambien su manera de pensar». El griego μετανοέω tiene literalmente la idea de cambiar la mente o el modo de pensar, pero aquí se usa «arrepiéntanse» por ser la forma española más natural, tradicional y eclesialmente clara en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Lit. «el reino de los cielos». Mateo conserva esta circunlocución reverencial característica; por eso el español mantiene «los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - entonces
  lexicon: BDAG
  rationale: Conjunción coordinante simple que enlaza esta cláusula participial con el contexto inmediato. «Y» es la opción natural y fiel en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - proclamando
  - predicando
  lexicon: BDAG
  rationale: El participio presente de λέγω se conserva de forma directa con «diciendo», evitando añadir una especificación homilética que el griego no exige.
- source_word: Μετανοεῖτε
  english_pob_choice: Repent
  chosen_spanish: Arrepiéntanse
  alternatives_spanish:
  - Cambien su manera de pensar
  - Cambien de mentalidad
  - Vuélvanse
  lexicon: BDAG
  rationale: El imperativo plural de μετανοέω pide una respuesta de arrepentimiento en español bíblico y eclesial. Aunque el verbo tiene un núcleo cognitivo de reorientación mental, «arrepiéntanse» comunica mejor en español la llamada profética sin perder el alcance moral y volitivo que la traducción inglesa POB decidió mantener en su revisión. Se conserva el matiz de llamado urgente, no solo de emoción o disculpa.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - ha llegado cerca
  - está cerca
  - ha llegado
  lexicon: BDAG
  rationale: El perfecto de ἐγγίζω expresa que el reino se ha aproximado con relevancia presente. «Se ha acercado» refleja bien ese valor aspectual y es idiomático en español.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base o razón del mandato anterior. «Porque» es claro y natural en español.
- source_word: ἡ βασιλεία
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reinado
  - la soberanía
  lexicon: BDAG
  rationale: En Mateo, βασιλεία forma la expresión estable del anuncio escatológico. «Reino» mantiene el registro bíblico y la amplitud semántica de dominio y ámbito sin forzar una paráfrasis.
- source_word: τῶν οὐρανῶν
  english_pob_choice: of heaven
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: BDAG
  rationale: Se conserva la forma plural literal del griego, «los cielos», porque el texto fuente usa οὐρανῶν y Mateo emplea esta circunlocución reverencial de manera característica. En español suena natural en registro bíblico y evita aplanar la referencia.
theological_decisions:
- issue: Naturaleza de μετανοεῖτε en el anuncio de Juan
  english_pob_reading: The call is for hearers to rethink everything in light of the kingdom's arrival, not primarily an emotional state.
  chosen_spanish_reading: La llamada a «arrepiéntanse» se entiende como una respuesta integral ante la cercanía del reino, incluyendo arrepentimiento real y reorientación de la vida.
  alternative_spanish_readings:
  - Cambien su manera de pensar
  - Reconsideren todo
  - Vuélvanse
  rationale: La decisión inglesa documenta el componente cognitivo de μετανοέω, pero la forma española más natural y eclesialmente transparente para una orden pública es «arrepiéntanse». El comentario lexical preserva que no se trata solo de tristeza emocional, sino de una respuesta completa ante el reino.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Expresión 'el reino de los cielos'
  english_pob_reading: Retain 'the kingdom of heaven' as Matthew's wording rather than interpretively paraphrasing it as 'God's reign' in the main text.
  chosen_spanish_reading: Mantener «el reino de los cielos» preserva la fórmula mateana y su circunlocución reverencial.
  alternative_spanish_readings:
  - el reinado de los cielos
  - el reino de Dios
  - la soberanía del cielo
  rationale: Mateo usa una formulación propia que conviene respetar en la traducción principal. «De los cielos» mantiene el plural del griego y la textura judía reverencial del texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: The English audit trail shows an earlier revision from 'Change your thinking' back to 'Repent' for formal translation register. The Spanish draft follows that revision-aware decision by using the ecclesially natural imperative 'Arrepiéntanse' while preserving the documented cognitive breadth in the lexical rationale and footnote.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el tetragrámaton.
  - Se usa «reino de los cielos» para reflejar la fórmula mateana y el plural griego οὐρανῶν.
  - Se conserva el matiz verbal de «diciendo» para reproducir el participio griego sin sobrerinterpretar la función narrativa.
  - «Arrepiéntanse» es plural de trato reverente o general, coherente con el imperativo plural del griego.
