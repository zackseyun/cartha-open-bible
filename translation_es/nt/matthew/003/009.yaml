review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: prohíbe una confianza presuntuosa en el linaje abrahámico y conserva la afirmación de que Dios puede suscitar descendencia para Abraham de las piedras. También mantiene correctamente la ambigüedad de λέγειν ἐν ἑαυτοῖς mediante nota. Sin embargo, «supongan decirse» suena poco natural en español y debilita la fuerza de μὴ δόξητε λέγειν; además, «hijos» estrecha innecesariamente el valor inclusivo de τέκνα frente al inglés auditado «children».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «no supongan decirse entre ustedes» resulta torpe; una formulación como «no presuman decir entre ustedes» o «no se crean con derecho a decir entre ustedes» sería más idiomática. Para un ajuste mínimo y fiel, «no presuman decir entre ustedes[a]» funciona bien. Asimismo, «hijos» en contexto genealógico es comprensible, pero «hijos e hijas» explicita demasiado y «descendientes» interpretaría; «hijos» sigue siendo aceptable en español eclesial, aunque pierde algo de la inclusividad léxica de τέκνα. Aun así, el problema principal es de naturalidad sintáctica en la primera cláusula.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός = «Dios» está correcto, y no aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión sobre τέκνα merece ajuste por fidelidad léxica; en español, «hijos» es tradicional pero menos inclusivo que «niños»/«hijos e hijas», y la mejor solución contextual es «hijos» solo si se acepta el matiz genealógico. Para mayor alineación con la auditoría inglesa, conviene «descendientes», pero eso se aleja del sustantivo filial. Se recomienda mantener «hijos» solo si se corrige la sintaxis principal; aquí el cambio indispensable es otro.'
  issues:
  - severity: medium
    issue: «No supongan decirse entre ustedes» es una construcción poco natural en español.
    rationale: Aunque intenta seguir μὴ δόξητε λέγειν, en español «suponer» no rige con naturalidad un infinitivo pronominal así. La frase suena trabada y puede distraer del sentido de advertencia contra una presunción arrogante.
  - severity: medium
    issue: La elección «supongan» atenúa el matiz de presunción autosuficiente de μὴ δόξητε.
    rationale: La auditoría inglesa justificó «do not presume» precisamente para comunicar confianza infundada, no solo pensamiento hipotético. En español, «presuman» transmite mejor esa fuerza en este contexto.
  - severity: low
    issue: «Hijos» no preserva plenamente la amplitud de τέκνα.
    rationale: τέκνα es inclusivo y refiere a descendencia en general. «Hijos» es comprensible y tradicional en un contexto de linaje, pero lexicalmente es algo más estrecho que el inglés auditado «children».
  revised_spanish_text: 'Y no presuman decir entre ustedes[a]: «Tenemos por padre a Abraham», porque les digo que Dios puede levantar hijos para Abraham de estas piedras.'
  revised_footnotes:
  - marker: a
    text: O «decir dentro de ustedes». La frase griega puede referirse tanto al habla interior como a lo que dicen entre ustedes como grupo.
    reason: alternative_reading
  revision_rationale: Se corrige la construcción inicial para que suene natural en español y conserve mejor la fuerza de μὴ δόξητε como advertencia contra una presunción indebida. Se mantiene la nota sobre la ambigüedad de λέγειν ἐν ἑαυτοῖς. No se fuerza un cambio mayor en «hijos», ya que sigue siendo aceptable en contexto genealógico, aunque menos amplio que τέκνα.
