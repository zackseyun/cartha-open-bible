revisions:
- from: 'Y no supongan decirse entre ustedes[a]: «Tenemos por padre a Abraham», porque les digo que Dios puede levantar hijos para Abraham de estas piedras.'
  to: 'Y no presuman decir entre ustedes[a]: «Tenemos por padre a Abraham», porque les digo que Dios puede levantar hijos para Abraham de estas piedras.'
  rationale: Se corrige la construcción inicial para que suene natural en español y conserve mejor la fuerza de μὴ δόξητε como advertencia contra una presunción indebida. Se mantiene la nota sobre la ambigüedad de λέγειν ἐν ἑαυτοῖς. No se fuerza un cambio mayor en «hijos», ya que sigue siendo aceptable en contexto genealógico, aunque menos amplio que τέκνα.
