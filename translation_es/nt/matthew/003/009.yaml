translation:
  language: es
  text: 'Y no presuman decir entre ustedes[a]: «Tenemos por padre a Abraham», porque les digo que Dios puede levantar hijos para Abraham de estas piedras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decir dentro de ustedes». La frase griega puede referirse tanto al habla interior como a lo que dicen entre ustedes como grupo.
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ δόξητε
  english_pob_choice: do not presume
  chosen_spanish: no supongan
  alternatives_spanish:
  - no piensen
  - no imaginen
  - no crean
  lexicon: BDAG
  rationale: El aoristo con μή prohíbe adoptar una idea falsa o una confianza indebida. En español, «suponer» transmite mejor que el mero acto mental una presunción no justificada, aunque sin sonar tan abstracto como «presumir» en algunos registros.
- source_word: λέγειν ἐν ἑαυτοῖς
  english_pob_choice: to say among yourselves
  chosen_spanish: decirse entre ustedes
  alternatives_spanish:
  - decirse a sí mismos
  - decirse dentro de ustedes
  - decirse unos a otros
  lexicon: BDAG
  rationale: La expresión puede aludir a discurso interior o a lo que se dicen como grupo. Dado el plural y la advertencia contra una confianza compartida en el linaje, «entre ustedes» conserva la dimensión comunitaria sin perder naturalidad en español.
- source_word: Πατέρα ἔχομεν τὸν Ἀβραάμ
  english_pob_choice: We have Abraham as our father
  chosen_spanish: Tenemos por padre a Abraham
  alternatives_spanish:
  - Abraham es nuestro padre
  - Tenemos a Abraham como padre
  lexicon: BDAG
  rationale: «Tener por padre» reproduce bien la relación de descendencia y la afirmación de privilegio ancestral. Evita la rigidez de una estructura demasiado inglesa y mantiene el peso retórico de la frase.
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: for I tell you
  chosen_spanish: porque les digo
  alternatives_spanish:
  - pues les digo
  - porque yo les digo
  - les digo
  lexicon: BDAG
  rationale: «Porque» refleja γάρ como explicación causal o justificativa. «Les digo» conserva la fórmula discursiva directa y solemne en español.
- source_word: δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: «Puede» es la forma más natural y fiel para la capacidad divina aquí. Mantiene la afirmación de poder sin sobrecargarla con perífrasis menos idiomáticas.
- source_word: ἐκ τῶν λίθων τούτων
  english_pob_choice: from these stones
  chosen_spanish: de estas piedras
  alternatives_spanish:
  - a partir de estas piedras
  - con estas piedras
  lexicon: BDAG
  rationale: La preposición ἐκ se expresa de manera natural en español con «de» en este contexto. Conserva la imagen material sin forzar un giro más explicativo.
- source_word: ἐγεῖραι
  english_pob_choice: to raise up
  chosen_spanish: levantar
  alternatives_spanish:
  - hacer surgir
  - hacer levantar
  - producir
  lexicon: BDAG
  rationale: En este pasaje el verbo no se refiere a resurrección, sino a suscitar o hacer surgir descendencia. «Levantar» preserva la fuerza verbal breve del griego y su resonancia bíblica, sin interpretar más de lo que el texto afirma.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - descendientes
  - niños
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «children», en este contexto genealógico y de filiación «hijos» comunica mejor la relación de descendencia ligada a Abraham. En español suena más natural que «hijos e hijas» y no añade una precisión ajena al texto.
- source_word: τῷ Ἀβραάμ
  english_pob_choice: for Abraham
  chosen_spanish: para Abraham
  alternatives_spanish:
  - a Abraham
  - en favor de Abraham
  lexicon: BDAG
  rationale: El dativo expresa aquí relación de pertenencia o referencia genealógica. «Para Abraham» reproduce bien la idea de descendencia que le corresponde, y evita hacerla sonar como simple dirección personal.
theological_decisions:
- issue: La seguridad basada en el linaje de Abraham
  english_pob_reading: The verse rejects reliance on physical descent from Abraham as sufficient before God, without denying Abraham's historical fatherhood to Israel.
  chosen_spanish_reading: El versículo rechaza la confianza en la descendencia física de Abraham como garantía suficiente delante de Dios, sin negar que Abraham sea realmente su padre histórico.
  alternative_spanish_readings:
  - La frase es solo una exageración retórica sin crítica teológica del privilegio de linaje
  - La frase implica el reemplazo de Israel étnico como tal
  rationale: La traducción debe dejar visible la reprensión de la confianza genealógica sin convertirla en una tesis doctrinal más amplia de la que el texto expresa. Así se conserva la tensión teológica documentada por el POB inglés.
  doctrine_reference: Preservar la tensión teológica; no importar conclusiones doctrinales que el versículo no formula.
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión sin cambios sustanciales: mantiene el sentido del inglés POB, pero ajusta la formulación española para sonar natural y a la vez conservar la advertencia comunitaria y la fuerza genealógica del texto griego.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «Abraham» como nombre propio establecido; no se translitera.
  - Se evita «Mesías/Cristo» porque el versículo no lo contiene.
  - «Hijos» refleja mejor el valor genealógico de τέκνα en este contexto que una traducción más genérica.
  - La nota a pie marca la ambigüedad de ἐν ἑαυτοῖς sin duplicar marcadores.
