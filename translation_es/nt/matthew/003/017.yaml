translation:
  language: es
  text: 'Y he aquí una voz desde los cielos[a], que decía: «Este es mi Hijo amado, en quien me complazco[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “desde el cielo”. El griego tiene el plural “desde los cielos”.
    reason: lexical_alternative
  - marker: b
    text: O “con quien estoy muy complacido”.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἰδοὺ
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y miren
  - Y vean
  lexicon: ἰδού (BDAG); καί (conector narrativo)
  rationale: He aquí conserva el valor discursivo de atención solemne de ἰδού mejor que una simple partícula coordinante, y unido a Y mantiene el arranque narrativo natural en español.
- source_word: φωνὴ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  lexicon: φωνή (BDAG)
  rationale: El contexto exige una voz articulada porque introduce palabras directas; 'voz' comunica esa fuerza mejor que 'sonido'.
- source_word: ἐκ τῶν οὐρανῶν
  english_pob_choice: from the heavens
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  lexicon: οὐρανός (BDAG)
  rationale: El griego usa el plural, por lo que 'los cielos' preserva la forma de la fuente. 'Desde los cielos' suena natural en español y mantiene la pluralidad mejor que el singular tradicional.
- source_word: λέγουσα
  english_pob_choice: said
  chosen_spanish: que decía
  alternatives_spanish:
  - diciendo
  lexicon: λέγω (BDAG)
  rationale: En español, una voz 'que decía' introduce con naturalidad la cita directa sin la dureza de un gerundio dependiente.
- source_word: Οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este mismo es
  lexicon: οὗτος (BDAG); εἰμί (BDAG)
  rationale: '''Este es'' expresa la identificación directa del griego con claridad y sin añadir énfasis no señalado por el texto.'
- source_word: ὁ υἱός μου
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi hijo
  lexicon: υἱός (BDAG)
  rationale: La mayúscula en Hijo refleja que el hablante divino identifica a Jesús en un sentido cristológico directo, siguiendo el valor del contexto y la práctica del POB inglés.
- source_word: ὁ ἀγαπητός
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - muy amado
  lexicon: ἀγαπητός (BDAG)
  rationale: '''Amado'' conserva la dignidad y la densidad relacional de ἀγαπητός; en español suena más natural que ''amado'' sin artículo excesivo, y evita un giro demasiado sentimental.'
- source_word: ἐν ᾧ
  english_pob_choice: with whom
  chosen_spanish: en quien
  alternatives_spanish:
  - con quien
  lexicon: ἐν + relativo (BDAG)
  rationale: La POB inglesa nota la alternativa literal 'in whom'. En español, 'en quien' conserva la relación preposicional de la fuente y hace audible la tensión con la lectura idiomática 'con quien'.
- source_word: εὐδόκησα
  english_pob_choice: I am well pleased
  chosen_spanish: me complazco
  alternatives_spanish:
  - he puesto mi complacencia
  - estoy muy complacido
  lexicon: εὐδοκέω (BDAG)
  rationale: '''Me complazco'' comunica aprobación y agrado divinos de forma idiomática en español. Mantiene el valor de declaración divina del aoristo sin forzar un tiempo perfecto que el contexto no exige.'
theological_decisions:
- issue: La filiación de Jesús en la voz celestial
  english_pob_reading: my beloved Son
  chosen_spanish_reading: mi Hijo amado
  alternative_spanish_readings:
  - mi Hijo muy amado
  - mi amado Hijo
  rationale: La redacción conserva la filiación explícita y la cualidad afectiva/eleccionaria de ὁ ἀγαπητός sin convertirla en una formulación doctrinal añadida. La mayúscula en Hijo sigue el sentido cristológico del contexto.
  doctrine_reference: Cristología nicena; bautismo de Jesús en los evangelios sinópticos
- issue: La pluralidad de οὐρανῶν
  english_pob_reading: from the heavens
  chosen_spanish_reading: desde los cielos
  alternative_spanish_readings:
  - desde el cielo
  rationale: Se preserva el plural del original, como hace el POB inglés con 'the heavens'. La opción singular queda implícita como lectura tradicional, pero no desplaza la forma fuente.
  doctrine_reference: Primacía de la forma original frente a la tradición de traducción
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el rastro auditado del POB inglés. No hubo revisiones aplicadas en el contexto inglés más reciente; se mantuvo la decisión de preservar el plural 'cielos' y la alternativa idiomática de εὐδοκέω en nota.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el texto fuente lo requiere; aquí no aparece.
  - Se usa Hijo con mayúscula por el contexto cristológico directo.
  - Se preserva la relación preposicional 'en quien' para hacer visible la tensión con la alternativa idiomática 'con quien'.
  - La puntuación sigue el estilo editorial español con comillas angulares no requeridas; se emplearon comillas latinas dobles por legibilidad de cita directa.
