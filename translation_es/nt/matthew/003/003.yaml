translation:
  language: es
  text: 'Porque este es aquel de quien se habló por medio del profeta Isaías, diciendo: «Voz de uno que clama en el desierto[b]: “Preparen el camino del Señor[a]; hagan rectos sus senderos”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Preparen el camino de Yahvé»; la cita evoca Isaías 40:3, donde el texto hebreo tiene el nombre divino YHWH.
    reason: alternative_reading
  - marker: b
    text: O «en el desierto».
    reason: previous_rendering
lexical_decisions:
- source_word: οὗτος
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - él
  lexicon: BDAG
  rationale: El demostrativo señala de manera deíctica a Juan el Bautista en el contexto inmediato. «Este» conserva esa referencia directa sin añadir matiz interpretativo innecesario.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la explicación de la afirmación anterior. En español, «porque» transmite con naturalidad el valor explicativo causal de γάρ en este contexto.
- source_word: ὁ ῥηθεὶς
  english_pob_choice: the one spoken of
  chosen_spanish: aquel de quien se habló
  alternatives_spanish:
  - el que fue hablado
  - el mencionado
  lexicon: BDAG
  rationale: El participio pasivo articular funciona sustantivamente. La pasiva impersonal «se habló» preserva el sentido de referencia/profecía sin forzar una construcción menos natural en español.
- source_word: διὰ Ἠσαΐου τοῦ προφήτου
  english_pob_choice: through Isaiah the prophet
  chosen_spanish: por medio del profeta Isaías
  alternatives_spanish:
  - por Isaías el profeta
  - a través del profeta Isaías
  lexicon: BDAG
  rationale: διά con genitivo en fórmulas de cumplimiento marca mediación. «Por medio de» conserva esa intermediación profética de forma clara y reverente.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - al decir
  lexicon: BDAG
  rationale: Introduce la cita bíblica. «Diciendo» sigue de cerca la función participial y es idiomático en español bíblico contemporáneo.
- source_word: Φωνὴ βοῶντος
  english_pob_choice: A voice of one crying
  chosen_spanish: Voz de uno que clama
  alternatives_spanish:
  - Una voz que clama
  - Voz del que clama
  lexicon: BDAG
  rationale: «Clama» preserva el tono proclamatorio del participio βοῶντος. Se omite el artículo en «Voz» para reproducir el carácter proverbial y poético de la cita.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/ la soledad
  - en el yermo
  lexicon: BDAG
  rationale: ἔρημος puede significar «desierto» o «desierto/lugar desolado». Aquí la opción más natural en español para el trasfondo de Isaías y del ministerio de Juan es «desierto».
- source_word: Ἑτοιμάσατε
  english_pob_choice: Prepare
  chosen_spanish: Preparad
  alternatives_spanish:
  - Preparen
  - Preparen ustedes
  lexicon: BDAG
  rationale: Imperativo plural de exhortación profética. «Preparad» conserva la fuerza directa del mandato; en español bíblico es claro y solemne.
- source_word: τὴν ὁδὸν
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - el sendero
  lexicon: BDAG
  rationale: Aunque ὁδός puede ser «camino» o «sendero», «camino» es la equivalencia más natural y estable en la cita de Isaías en español.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor
  lexicon: BDAG
  rationale: El texto griego dice κυρίου. En el cuerpo principal se mantiene «Señor» para seguir el término explícito del griego; la resonancia con Isaías 40:3 y el nombre divino queda explicada en nota.
- source_word: εὐθείας ποιεῖτε
  english_pob_choice: make straight
  chosen_spanish: haced rectos
  alternatives_spanish:
  - enderezad
  - hacé直os
  lexicon: BDAG
  rationale: La combinación verbal expresa la idea de volver recto o directo. «Haced rectos» conserva el paralelismo y la imagen sin sonar demasiado coloquial.
- source_word: τὰς τρίβους αὐτοῦ
  english_pob_choice: his paths
  chosen_spanish: sus senderos
  alternatives_spanish:
  - sus caminos
  - sus veredas
  lexicon: BDAG
  rationale: τρίβος designa senderos o trochas transitadas. «Senderos» conserva mejor la imagen poética de la cita y combina bien con «haced rectos».
theological_decisions:
- issue: κύριος en una cita de Isaías 40:3 donde el hebreo subyacente tiene el nombre divino
  english_pob_reading: the Lord, with footnote noting the divine name background
  chosen_spanish_reading: el Señor, con nota sobre el trasfondo de Yahvé en Isaías 40:3
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El griego de Mateo usa κυρίου, y el texto principal debe reflejar ese dato. Al mismo tiempo, la alusión a Isaías 40:3 requiere señalar que el trasfondo hebreo es el nombre divino. Por eso se mantiene «Señor» en el cuerpo y se explica la equivalencia con Yahvé en nota.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; יְהוָה → Yahvé en el texto base español, con nota cuando el griego cita el pasaje hebreo'
- issue: Ubicación de la voz que clama en el desierto
  english_pob_reading: 'A voice of one crying in the wilderness:'
  chosen_spanish_reading: 'Voz de uno que clama en el desierto:'
  alternative_spanish_readings:
  - 'Voz de uno que clama, en el desierto:'
  - 'Voz que clama en el desierto:'
  rationale: El griego permite leer la frase como una voz ubicada en el desierto, y esa es la lectura adoptada en el texto principal. Se conserva además la opción alternativa en nota porque la puntuación puede afectar la asociación de «en el desierto» con la voz o con el mandato siguiente.
  doctrine_reference: Registro del POB para citas poéticas con ambigüedad de puntuación y continuidad intertextual con Isaías 40:3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que reforzó la puntuación con dos puntos para separar la frase introductoria de la cita. En español se mantiene una puntuación equivalente con dos puntos después de «diciendo» para introducir limpiamente la cita directa. También se consideró la alta concordancia de revisores y se preservó la ambigüedad intertextual de Isaías 40:3 en la nota sobre «Señor/Yahvé».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española para el nombre divino en la nota, conforme al estándar del proyecto.
  - Se mantiene «Señor» en el texto principal porque el griego de Mateo dice κυρίου.
  - Se emplea «camino» y «senderos» para conservar el paralelismo poético de la cita.
  - La cita se puntúa con dos puntos para reflejar la introducción de una fórmula profética seguida de palabras citadas.
