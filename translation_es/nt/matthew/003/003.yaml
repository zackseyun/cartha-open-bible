base_translation:
  language: en
  yaml_path: translation/nt/matthew/003/003.yaml
  text: 'For this is the one spoken of through Isaiah the prophet[a], saying: “A voice of one crying in the wilderness: ‘Prepare the way of the Lord[b]; make his paths straight.’”'
  footnotes:
  - marker: a
    text: Or “Prepare the way of the LORD”; the quotation echoes Isaiah 40:3, where the Hebrew text has the divine name YHWH.
    reason: alternative_reading
  - marker: b
    text: Or 'in the wilderness,'.
    reason: previous_rendering
