source:
  edition: SBLGNT
  text: ⸂βαπτισθεὶς δὲ⸃ ὁ Ἰησοῦς ⸂εὐθὺς ἀνέβη⸃ ἀπὸ τοῦ ὕδατος· καὶ ἰδοὺ ⸀ἠνεῴχθησαν οἱ οὐρανοί, καὶ εἶδεν ⸀πνεῦμα θεοῦ καταβαῖνον ὡσεὶ ⸀περιστερὰν ἐρχόμενον ἐπ’ αὐτόν·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/003/016.yaml
  text: And when Jesus was baptized[a], he immediately came up from the water. And behold, the heavens were opened[c][b], and he saw the Spirit of God descending like a dove and coming upon him.
  footnotes:
  - marker: a
    text: Or 'came up out of the water.' The Greek says 'from the water' (ἀπὸ τοῦ ὕδατος).
    reason: lexical_alternative
  - marker: b
    text: Or 'descending as a dove.' The Greek uses a comparison term ('like/as if').
    reason: alternative_reading
  - marker: c
    text: Some English versions render 'coming upon him' as 'alighting on him,' but the Greek verb is more literally 'coming.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
