    unchanged: false
    changes_summary: Changed 'after Jesus was baptized' to 'when Jesus was baptized' to reflect the participial construction more directly and naturally, without implying a stronger temporal sequence than the Greek requires.
translation:
  language: es
  text: Y cuando Jesús fue bautizado, subió inmediatamente del agua[a]. Y he aquí, los cielos se abrieron, y vio al Espíritu de Dios descendiendo como una paloma[b] y que venía sobre él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «subió fuera del agua». El griego dice «del agua» (ἀπὸ τοῦ ὕδατος).
    reason: lexical_alternative
  - marker: b
    text: O «descendiendo cual paloma». El griego usa un término de comparación («como» / «como si»).
    reason: alternative_reading
  - marker: c
    text: Algunas versiones traducen «posándose sobre él», pero el verbo griego es más literalmente «viniendo».
    reason: lexical_alternative
lexical_decisions:
- source_word: βαπτισθεὶς
  english_pob_choice: when Jesus was baptized
  chosen_spanish: cuando Jesús fue bautizado
  alternatives_spanish:
  - después de que Jesús fue bautizado
  - cuando Jesús había sido bautizado
  lexicon: BDAG
  rationale: El participio aoristo pasivo funciona temporalmente antes de la acción principal. «Cuando Jesús fue bautizado» refleja bien la secuencia sin añadir una relación temporal más fuerte de la que exige el griego.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ enlaza la narración con suavidad. «Y» es natural en español y evita cargar el contraste.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: Conserva el valor de prontitud narrativa de Mateo con una forma clara y digna en español.
- source_word: ἀνέβη ἀπὸ τοῦ ὕδατος
  english_pob_choice: came up from the water
  chosen_spanish: subió del agua
  alternatives_spanish:
  - subió de las aguas
  - salió del agua
  lexicon: BDAG
  rationale: «Subió del agua» mantiene ἀπό con una relación directa y natural en español. No se fuerza «fuera de» porque el griego dice «desde/de» el agua.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: «He aquí» preserva el tono de señalamiento vívido del marcador discursivo y es plenamente reconocible en registro bíblico español.
- source_word: ἠνεῴχθησαν οἱ οὐρανοί
  english_pob_choice: the heavens were opened
  chosen_spanish: los cielos se abrieron
  alternatives_spanish:
  - los cielos fueron abiertos
  - el cielo se abrió
  lexicon: BDAG
  rationale: Se conserva el plural «los cielos» para reflejar οἱ οὐρανοί. La pasiva se expresa de forma natural en español con voz media/reflexiva.
- source_word: πνεῦμα θεοῦ
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - el espíritu de Dios
  - el Espíritu divino
  lexicon: BDAG
  rationale: En este contexto bautismal la referencia apunta con fuerza al Espíritu Santo, pero la formulación griega es «Espíritu de Dios». Se conserva la expresión exacta sin sustituirla por un título más interpretativo.
- source_word: καταβαῖνον
  english_pob_choice: descending
  chosen_spanish: descendiendo
  alternatives_spanish:
  - bajando
  - que descendía
  lexicon: BDAG
  rationale: El participio presente expresa movimiento en curso; «descendiendo» reproduce bien esa acción simultánea y conserva el tono solemne.
- source_word: ὡσεὶ περιστερὰν
  english_pob_choice: like a dove
  chosen_spanish: como una paloma
  alternatives_spanish:
  - cual paloma
  - a manera de paloma
  lexicon: BDAG
  rationale: ὡσεὶ marca comparación, no identidad. «Como una paloma» mantiene la analogía sin afirmar que el Espíritu sea literalmente una paloma.
- source_word: ἐρχόμενον ἐπ’ αὐτόν
  english_pob_choice: coming upon him
  chosen_spanish: viniendo sobre él
  alternatives_spanish:
  - llegando sobre él
  - cayendo sobre él
  lexicon: BDAG
  rationale: Se preserva el verbo de movimiento «venir» y la preposición «sobre», evitando suavizarlo con un término más interpretativo como «posándose» o «alighting».
theological_decisions:
- issue: How to render πνεῦμα θεοῦ in this baptism scene
  english_pob_reading: the Spirit of God
  chosen_spanish_reading: el Espíritu de Dios
  alternative_spanish_readings:
  - el espíritu de Dios
  - el Espíritu Santo
  rationale: El contexto narrativo apoya la referencia al Espíritu Santo, pero el texto griego dice literalmente «Espíritu de Dios». La traducción conserva esa forma para no sobreespecificar más allá del original, manteniendo a la vez la claridad teológica.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Whether ὡσεὶ περιστερὰν should be read as likeness or identification
  english_pob_reading: descending like a dove
  chosen_spanish_reading: descendiendo como una paloma
  alternative_spanish_readings:
  - descendiendo en forma de paloma
  - descendiendo cual paloma
  rationale: La partícula comparativa ὡσεὶ exige una relación de semejanza. La redacción española mantiene esa comparación y evita convertirla en identidad literal.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción sigue la última revisión aprobada del inglés POB para este versículo, especialmente en la elección temporal de βαπτισθεὶς («when Jesus was baptized») y en la conservación de la comparación de ὡσεὶ περιστερὰν. También respeta la decisión revisada de traducir ἐρχόμενον con un verbo de movimiento directo («coming upon him»), sin introducir una interpretación más tradicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «Espíritu de Dios» para reflejar el griego πνεῦμα θεοῦ sin cambiarlo por una formulación más expansiva.
  - Se conserva el plural «los cielos», siguiendo el valor del griego οἱ οὐρανοί.
  - No se añaden notas al pie porque no hay marcadores en el texto español y se evitó introducir variantes no ancladas.
