    reason: alternative_reading
  - marker: c
    text: Algunas versiones traducen «posándose sobre él», pero el verbo griego es más literalmente «viniendo».
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del borrador, pero se añaden las notas necesarias para reflejar el rastro auditado del POB y se ajusta levemente la redacción final a un español más natural sin perder la literalidad del griego.
