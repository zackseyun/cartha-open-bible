translation:
  language: es
  text: Yo, en efecto, los bautizo con agua[a] para arrepentimiento[b], pero el que viene detrás de mí es más fuerte que yo, de quien no soy digno de llevar sus sandalias. Él mismo los bautizará en el Espíritu Santo y fuego[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en agua' y, más adelante, 'en el Espíritu Santo y fuego'; la preposición griega ἐν puede rendirse de ambas maneras en estas expresiones.
    reason: lexical_alternative
  - marker: b
    text: '''Para arrepentimiento'' también puede entenderse como ''hacia arrepentimiento'', conservando el sentido direccional de la frase griega sin definir si el arrepentimiento precede al bautismo o es señalado por él.'
    reason: lexical_alternative
  - marker: c
    text: '''Y fuego'' puede aludir a purificación o a juicio; el griego deja abierta la imagen, y el contexto inmediato debe guiar la interpretación.'
    reason: alternative_reading
lexical_decisions:
- source_word: βαπτίζω
  english_pob_choice: baptize
  chosen_spanish: bautizo / bautizará
  alternatives_spanish:
  - sumergir
  - realizar el bautismo
  lexicon: BDAG
  rationale: Se conserva el verbo ritual establecido en español bíblico contemporáneo, sin especificar el modo del rito que el griego no define explícitamente en este versículo.
- source_word: ἐν ὕδατι
  english_pob_choice: in water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: BDAG
  rationale: En español, 'con agua' comunica naturalmente el medio/instrumento del bautismo y evita una literalidad rígida que sonaría menos idiomática; la alternancia semántica de ἐν queda preservada en la nota.
- source_word: εἰς μετάνοιαν
  english_pob_choice: for repentance
  chosen_spanish: para arrepentimiento
  alternatives_spanish:
  - hacia arrepentimiento
  - para arrepentirse
  lexicon: BDAG
  rationale: '''Para arrepentimiento'' mantiene la fuerza direccional o final de εἰς sin decidir en el texto principal si el arrepentimiento precede al bautismo o es su propósito/señal.'
- source_word: ὁ δὲ ὀπίσω μου ἐρχόμενος
  english_pob_choice: the one coming after me
  chosen_spanish: el que viene detrás de mí
  alternatives_spanish:
  - el que viene después de mí
  - el que está viniendo detrás de mí
  lexicon: BDAG
  rationale: '''Detrás de mí'' expresa bien la sucesión temporal y el contraste de posición/precedencia del participio sustantivado en un español natural y sobrio.'
- source_word: ἰσχυρότερός μού ἐστιν
  english_pob_choice: is stronger than I
  chosen_spanish: es más fuerte que yo
  alternatives_spanish:
  - es más poderoso que yo
  - es más fuerte que yo soy
  lexicon: BDAG
  rationale: '''Más fuerte'' es directo y fiel al comparativo ἰσχυρότερος; ''más poderoso'' sería posible pero desplaza el matiz hacia poder en lugar de fortaleza.'
- source_word: οὗ οὐκ εἰμὶ ἱκανὸς
  english_pob_choice: whose ... I am not worthy
  chosen_spanish: de quien no soy digno
  alternatives_spanish:
  - de quien no soy apto
  - de quien no soy suficiente
  lexicon: BDAG
  rationale: En esta fórmula de humildad, 'digno' reproduce bien el valor idiomático de ἱκανός en contexto y suena natural en español eclesial contemporáneo.
- source_word: τὰ ὑποδήματα βαστάσαι
  english_pob_choice: to carry his sandals
  chosen_spanish: llevar sus sandalias
  alternatives_spanish:
  - cargar sus sandalias
  - desatar sus sandalias
  lexicon: BDAG
  rationale: '''Llevar'' traduce βαστάσαι de manera directa y clara; ''sandalias'' es más preciso que ''zapatos'' y evita introducir la acción de desatar, que no está en el griego.'
- source_word: αὐτὸς
  english_pob_choice: He himself
  chosen_spanish: Él mismo
  alternatives_spanish:
  - Él
  - ese mismo
  lexicon: BDAG
  rationale: Se conserva el énfasis del pronombre con 'Él mismo', marcando el contraste enfático con la acción de Juan.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - con el Espíritu Santo
  - en Espíritu Santo
  lexicon: BDAG
  rationale: Se mantiene la construcción repetida con ἐν y el referente personal habitual de πνεῦμα ἅγιον en este contexto; 'Espíritu Santo' es la forma estable y reverente en español.
- source_word: καὶ πυρί
  english_pob_choice: and fire
  chosen_spanish: y fuego
  alternatives_spanish:
  - y con fuego
  - y fuego purificador
  - y fuego de juicio
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del sintagma final sin resolverla en el texto principal; 'fuego' deja abierta la imagen de purificación o juicio, conforme al audit trail inglés.
theological_decisions:
- issue: Sentido de 'para arrepentimiento'
  english_pob_reading: Retain the directional sense of εἰς χωρίς definir si el arrepentimiento precede or is signified by the baptism.
  chosen_spanish_reading: Conservar 'para arrepentimiento' sin explicitar relación causal o sacramental.
  alternative_spanish_readings:
  - hacia arrepentimiento
  - como señal de arrepentimiento
  rationale: El griego permite una relación direccional que no debe cerrarse prematuramente. La formulación española mantiene esa tensión interpretativa.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Identidad de 'el Espíritu Santo'
  english_pob_reading: Translate as 'the Holy Spirit' and avoid doctrinal overexpansion.
  chosen_spanish_reading: Traducir 'el Espíritu Santo' como referencia personal, sin añadir explicación interpretativa.
  alternative_spanish_readings:
  - espíritu santo
  - poder del Espíritu Santo
  rationale: En Mateo, la lectura más natural es la de la tercera persona divina; se conserva esa referencia sin expandirla más allá del texto.
  doctrine_reference: Nicene Creed (381 AD); original-language primacy over translation tradition.
- issue: Sentido de 'y fuego'
  english_pob_reading: 'Maintain the openness of the image: purification or judgment.'
  chosen_spanish_reading: Mantener 'y fuego' sin glosa interpretativa en el cuerpo del texto.
  alternative_spanish_readings:
  - y fuego purificador
  - y fuego de juicio
  rationale: El contexto inmediato puede apoyar más de una lectura; la traducción no debe decidirla prematuramente.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Conforme al último pase de revisión, no se introdujeron cambios sustantivos respecto del audit trail inglés; se mantuvo la equivalencia óptima y la ambigüedad teológica documentada.
  spanish_consistency_notes:
  - Se usó 'Espíritu Santo' con mayúsculas por tratarse del referente personal habitual en este contexto.
  - Se prefirió 'sandalias' por precisión cultural y léxica.
  - Se evitó 'SEÑOR' o 'Cristo' porque este versículo no contiene esas formas; no aplica la terminología de sustitución del nombre divino.
  - La sintaxis conserva el contraste enfático entre la acción de Juan y la del que viene detrás de él.
