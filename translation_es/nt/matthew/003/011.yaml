  text: Ἐγὼ μὲν ⸂ὑμᾶς βαπτίζω⸃ ἐν ὕδατι εἰς μετάνοιαν· ὁ δὲ ὀπίσω μου ἐρχόμενος ἰσχυρότερός μού ἐστιν, οὗ οὐκ εἰμὶ ἱκανὸς τὰ ὑποδήματα βαστάσαι· αὐτὸς ὑμᾶς βαπτίσει ἐν πνεύματι ἁγίῳ ⸂καὶ πυρί⸃·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/003/011.yaml
  text: I indeed baptize you in water for repentance[a], but the one coming after me is stronger than I, whose sandals I am not worthy to carry[c][b]. He himself will baptize you in the Holy Spirit and fire.
  footnotes:
  - marker: a
    text: Or 'with water' and later 'with the Holy Spirit and fire'; the Greek preposition ἐν can be rendered either way in these phrases.
    reason: lexical_alternative
  - marker: b
    text: '''For repentance'' may also be understood as ''unto repentance,'' preserving the Greek phrase''s directional sense without specifying whether repentance precedes or is signified by the baptism.'
    reason: lexical_alternative
  - marker: c
    text: '''And fire'' may be understood as referring to purification or to judgment; the Greek leaves the image open here, and the surrounding context should guide interpretation.'
    reason: alternative_reading
