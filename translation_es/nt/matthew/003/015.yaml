translation:
  language: es
  text: 'Pero Jesús le respondió: «Permítelo por ahora, porque así conviene que cumplamos toda justicia[a]». Entonces se lo permitió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda rectitud». El griego δικαιοσύνη puede denotar justicia o rectitud; aquí «justicia» preserva bien el sentido amplio de conformidad con la voluntad justa de Dios en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ ... εἶπεν πρὸς αὐτόν
  english_pob_choice: But Jesus answered him
  chosen_spanish: Pero Jesús le respondió
  alternatives_spanish:
  - Y Jesús le respondió
  - Entonces Jesús le respondió
  lexicon: BDAG
  rationale: El griego usa una fórmula semítica de ‘responder y decir’. En español, ‘le respondió’ comunica la acción sin calco innecesario, y ‘pero’ refleja el valor contrastivo de δέ frente a la objeción anterior de Juan.
- source_word: Ἄφες
  english_pob_choice: Permit it
  chosen_spanish: Permítelo
  alternatives_spanish:
  - Permite esto
  - Déjalo
  lexicon: BDAG
  rationale: Aquí ἀφίημι significa permitir o conceder, no ‘perdonar’. ‘Permítelo’ es natural en español y conserva el sentido imperativo de Jesús hacia Juan.
- source_word: ἄρτι
  english_pob_choice: for now
  chosen_spanish: por ahora
  alternatives_spanish:
  - ahora
  - en este momento
  lexicon: BDAG
  rationale: ἄρτι indica un tiempo inmediato y provisional. ‘Por ahora’ transmite bien esa temporalidad limitada.
- source_word: πρέπον ἐστὶν ἡμῖν
  english_pob_choice: it is fitting for us
  chosen_spanish: conviene que cumplamos
  alternatives_spanish:
  - es apropiado que cumplamos
  - es adecuado que cumplamos
  lexicon: BDAG
  rationale: ‘Conviene’ expresa adecuación moral y situacional en español con naturalidad. Al añadir ‘que cumplamos’ se conserva la idea de que la acción correcta incluye a ambos en este momento, sin perder el matiz de conveniencia/firmeza del griego.
- source_word: πληρῶσαι
  english_pob_choice: to fulfill
  chosen_spanish: cumplamos
  alternatives_spanish:
  - cumplir
  - llevar a cumplimiento
  lexicon: BDAG
  rationale: En Mateo, πληρόω suele tener peso de cumplimiento de propósito divino. ‘Cumplamos’ mantiene ese valor y hace fluida la frase en español.
- source_word: πᾶσαν δικαιοσύνην
  english_pob_choice: all righteousness
  chosen_spanish: toda justicia
  alternatives_spanish:
  - toda rectitud
  - toda justicia y rectitud
  lexicon: BDAG
  rationale: Se conserva la tensión lexical documentada por la POB inglesa entre ‘righteousness’ y ‘justice’. En español, ‘justicia’ es la forma más directa; ‘rectitud’ sería posible, pero ‘toda justicia’ mantiene la amplitud de δικαιοσύνη sin estrecharla a legalismo.
- source_word: τότε ἀφίησιν αὐτόν
  english_pob_choice: Then he permitted him
  chosen_spanish: Entonces lo permitió
  alternatives_spanish:
  - Entonces le permitió
  - Luego lo permitió
  lexicon: BDAG
  rationale: El presente histórico ἀφίησιν se vierte en pasado narrativo natural en español. ‘Lo permitió’ conserva el sentido de conceder/ceder a la petición en el contexto del bautismo.
theological_decisions:
- issue: Sentido de πᾶσαν δικαιοσύνην
  english_pob_reading: A broad reference to fulfilling what is fitting according to God's righteous will in this moment, specifically through Jesus receiving baptism from John.
  chosen_spanish_reading: Una referencia amplia a cumplir lo que corresponde según la voluntad justa de Dios en este momento, específicamente mediante el bautismo de Jesús por Juan.
  alternative_spanish_readings:
  - Un cumplimiento de todos los requisitos legales
  - Una referencia más estrecha a la ‘rectitud’ moral
  rationale: La frase no debe reducirse a mero legalismo ni ampliarse a una doctrina ajena al contexto inmediato. ‘Toda justicia’ conserva la amplitud de δικαιοσύνη y permite leerla como conformidad con la voluntad justa de Dios en la escena.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δικαιοσύνη; translation philosophy §§3, 5'
translation_notes:
  revision_awareness: 'Se corrigió el anclaje de la nota: el marcador [a] ahora aparece explícitamente en el texto español junto a la palabra correspondiente. No se realizaron cambios textuales adicionales respecto del sentido auditado.'
  spanish_consistency_notes:
  - Se mantiene ‘Jesús’ para Ἰησοῦς.
  - Se traduce ἀφίημι aquí como ‘permitir’, no como ‘perdonar’ ni ‘dejar’ sin motivo.
  - Se preserva la tensión de δικαιοσύνη con ‘justicia’, dejando una alternativa en nota.
  - Se usa español natural y publicable, evitando un calco rígido de la estructura griega.
