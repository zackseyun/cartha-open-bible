- from: 'Pero Jesús le respondió[a]: «Permítelo por ahora, porque así conviene que cumplamos toda justicia». Entonces lo permitió.'
  to: 'Pero Jesús le respondió: «Permítelo por ahora, porque así conviene que cumplamos toda justicia[a]». Entonces se lo permitió.'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «justicia», el término realmente comentado. También se mejora la naturalidad y claridad de la cláusula final con «Entonces se lo permitió», que expresa mejor el sentido contextual de ἀφίησιν αὐτόν en español. No se requiere cambio doctrinal ni adjudicación adicional.
