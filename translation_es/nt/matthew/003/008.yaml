lexical_decisions:
- source_word: ποιήσατε
  english_pob_choice: produce
  chosen_spanish: produzcan
  alternatives_spanish:
  - den
  - hagan
  lexicon: ποιέω
  rationale: El imperativo aoristo plural llama a una acción decisiva; en español, «produzcan» comunica bien la idea de generar o dar como resultado un fruto visible, sin caer en un calco torpe como «hagan fruto».},{
theological_decisions:
- issue: Sentido de καρπὸν ἄξιον τῆς μετανοίας
  english_pob_reading: A command for outward conduct that corresponds to genuine repentance
  chosen_spanish_reading: Un mandato de conducta visible que corresponda al arrepentimiento genuino
  alternative_spanish_readings:
  - Fruto que merezca el arrepentimiento
  - Fruto igual al arrepentimiento
  rationale: La construcción expresa adecuación o correspondencia, no mérito. Por eso se evita cualquier formulación que sugiera que las obras ganan el arrepentimiento. «Digno del arrepentimiento» mantiene la fuerza formal sin borrar la relación ética entre arrepentimiento verdadero y fruto observable.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El expediente inglés revisó la redacción desde una paráfrasis de «that changed mind» a «repentance» para recuperar la naturalidad y precisión de μετανοίας; la versión española sigue esa decisión y conserva la estructura imperativa formal.
  spanish_consistency_notes:
  - Se mantiene «arrepentimiento» para μετάνοια, siguiendo la revisión inglesa y el uso eclesial claro en español.
  - «Fruto» conserva el singular colectivo del griego.
  - «Así que» comunica οὖν con una relación inferencial natural en español.
