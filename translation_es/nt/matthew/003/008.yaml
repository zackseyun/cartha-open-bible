  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: un imperativo plural que exige fruto visible correspondiente al arrepentimiento. «produzcan fruto» representa aceptablemente ποιήσατε… καρπὸν, y «del arrepentimiento» conserva la relación genitiva de correspondencia. Sin embargo, «Así que» debilita un poco la fuerza inferencial de οὖν frente a «Por tanto»/«Por eso», y la nota puede formularse con español más natural y paralelo al inglés auditado.'
  spanish_quality_summary: 'El español es claro y comprensible, pero «fruto digno del arrepentimiento» suena algo rígido; aun así, es fiel y aceptable. La mejora principal es usar «Por tanto» para reflejar mejor la conexión lógica. También conviene limpiar la puntuación de la nota y hacerla más natural: «O bien: “fruto en conformidad con el arrepentimiento”» o similar.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «arrepentimiento» es la opción correcta para μετανοίας en este contexto. No intervienen aquí Yahvé, Mesías/Cristo, esclavo/siervo, etc.
  issues:
