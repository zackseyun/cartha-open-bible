    rationale: 'La nota actual lleva comillas y puntuación algo torpes: ''''O: «fruto en conformidad con el arrepentimiento».'' Conviene normalizarla para legibilidad y estilo editorial.'
  revised_spanish_text: Por tanto[a], produzcan fruto digno del arrepentimiento.
