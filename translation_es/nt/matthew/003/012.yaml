translation:
  language: es
  text: Tiene su horquilla aventadora[a] en la mano, y limpiará por completo su era, y recogerá su trigo en el granero[b], pero el tamo lo quemará por completo con fuego inextinguible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pala aventadora». El griego se refiere al implemento usado para aventar el grano; versiones antiguas a veces usan «aventador» por su función.
    reason: lexical_alternative
  - marker: b
    text: O «almacén» o «depósito» para «granero».
    reason: lexical_alternative
lexical_decisions:
- source_word: πτύον
  english_pob_choice: winnowing fork
  chosen_spanish: aventador
  alternatives_spanish:
  - horquilla aventadora
  - horquilla para aventar
  lexicon: BDAG
  rationale: El instrumento es el usado para aventar el grano y separar la paja. En español, «aventador» comunica la función agrícola con naturalidad; «horquilla» podría sonar más literal, pero menos idiomática sin una nota explicativa.
- source_word: διακαθαριεῖ
  english_pob_choice: will thoroughly clear
  chosen_spanish: limpiará completamente
  alternatives_spanish:
  - limpiará a fondo
  - purificará completamente
  lexicon: BDAG
  rationale: El verbo compuesto intensifica la acción de limpiar del todo. «Limpiará completamente» conserva esa fuerza sin introducir un matiz excesivamente moral o ritual.
- source_word: ἅλωνα
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - era de trillar
  - era de trilla
  lexicon: BDAG
  rationale: «Era» es el término español natural para el lugar donde se trilla y se avienta el grano. Mantiene la imagen agrícola exacta sin sobrecargar la frase.
- source_word: σῖτον
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  lexicon: BDAG
  rationale: Aunque puede significar «grano» en general, en este contraste con la paja el español natural y preciso es «trigo», que reproduce el valor idiomático del cuadro agrícola.
- source_word: ἀποθήκην
  english_pob_choice: storehouse
  chosen_spanish: granero
  alternatives_spanish:
  - almacén
  - depósito
  lexicon: BDAG
  rationale: El término griego es amplio, pero en este contexto agrícola «granero» es la opción más clara y acorde con la imagen. «Almacén» sería correcto pero menos concreto.
- source_word: ἄχυρον
  english_pob_choice: chaff
  chosen_spanish: paja
  alternatives_spanish:
  - cascarilla
  - afrecho
  lexicon: BDAG
  rationale: En la imagen de aventado, el desecho vegetal separable del trigo se expresa de modo natural en español como «paja». Aunque «chaff» puede acercarse más a «cascarilla», aquí «paja» preserva la oposición tradicional y comprensible.
- source_word: κατακαύσει
  english_pob_choice: will burn up
  chosen_spanish: quemará
  alternatives_spanish:
  - quemará por completo
  - consumirá por fuego
  lexicon: BDAG
  rationale: El prefijo intensivo expresa destrucción total. En español, «quemará» acompañado de «fuego inextinguible» ya transmite el juicio; se preserva la imagen sin redundancia excesiva.
- source_word: πυρὶ ἀσβέστῳ
  english_pob_choice: with unquenchable fire
  chosen_spanish: con fuego inextinguible
  alternatives_spanish:
  - con fuego que no puede apagarse
  - con fuego que no se apaga
  lexicon: BDAG
  rationale: La frase dativa indica el medio y el adjetivo significa «que no se apaga / no se puede extinguir». «Fuego inextinguible» es natural en español y mantiene la fuerza del original.
- source_word: οὗ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: BDAG
  rationale: El pronombre relativo genitivo retoma al personaje del contexto anterior. En español, el posesivo «su» es la forma más natural y mantiene la referencia sin forzar la sintaxis.
theological_decisions:
- issue: Imagen de juicio agrícola y separación final
  english_pob_reading: Retained the concrete agricultural metaphor and future judgment language without softening it.
  chosen_spanish_reading: Se conserva la metáfora agrícola concreta y el lenguaje de juicio futuro sin suavizarlo.
  alternative_spanish_readings:
  - Paráfrasis que expliciten en el texto principal el simbolismo de trigo y paja como justos e injustos.
  - Traducciones que atenúen el resultado final del fuego.
  rationale: El versículo presenta la imagen y su desenlace severo; el texto no debe convertir la metáfora en explicación ni diluir la fuerza del juicio.
  doctrine_reference: Preservar la tensión teológica sin resolverla por explicación interpretativa.
translation_notes:
  revision_awareness: No se observan revisiones posteriores en el paquete de referencia; la versión inglesa auditada aparece estable y con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el original lo exija; este versículo no contiene el nombre divino.
  - 'Se conserva el campo semántico agrícola con términos naturales en español: aventador, era, trigo, granero, paja.'
  - La traducción evita explicar el símbolo en el cuerpo del texto para respetar la metáfora y el tono judicial del pasaje.
