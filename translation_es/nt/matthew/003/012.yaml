review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la imagen agrícola, la secuencia verbal futura y el sentido general del juicio. Sin embargo, hay dos desajustes léxicos importantes frente al griego y al rastro POB en inglés: πτύον se refleja mejor como «horquilla aventadora» o equivalente, no simplemente «aventador», y ἄχυρον en este contexto de aventado corresponde mejor a «paja menuda/cascarilla» o, de forma más estándar bíblica, «tamo», no «paja», que sugiere straw más que chaff. También conviene reflejar mejor la fuerza de κατακαύσει con «quemará por completo» o «consumirá».'
  spanish_quality_summary: El español es legible y digno, pero la redacción actual suena algo mecánica por la puntuación y por «limpiará completamente su era». Una forma más natural es «limpiará por completo su era». Además, el punto y coma antes de «pero» no es necesario; una coma coordina mejor la frase larga. El resto fluye bien y mantiene registro eclesial comprensible.
  glossary_alignment: 'No hay términos del glosario maestro especialmente conflictivos en este versículo. Sí hay que alinear mejor las decisiones léxicas documentadas: πτύον debía conservar la idea de implemento agrícola específico; ἀποθήκη admite «granero» como opción contextual válida; πυρὶ ἀσβέστῳ está bien como «fuego inextinguible».'
  issues:
  - severity: medium
    issue: «aventador» para πτύον es demasiado funcional y puede referirse al acto o incluso a un aparato, no al implemento manual específico.
    rationale: El rastro inglés documenta «winnowing fork» con alternativa «winnowing shovel». En español conviene una expresión que nombre el utensilio concreto, como «horquilla aventadora».
  - severity: high
    issue: «paja» no representa con precisión ἄχυρον en la imagen de aventado.
    rationale: El contraste es entre el grano útil y el residuo liviano separado al aventar, es decir, chaff. «Paja» suele evocar straw; «tamo» es más preciso en registro bíblico y agrícola.
  - severity: medium
    issue: «quemará» atenúa la fuerza intensiva de κατακαύσει.
    rationale: El compuesto indica consumo total. «Quemará por completo» preserva mejor la intensificación sin sonar forzado.
  - severity: low
    issue: «limpiará completamente su era» es comprensible, pero menos natural que «limpiará por completo su era».
    rationale: La preposición «por» da una cadencia más idiomática en español general.
  revised_spanish_text: Tiene su horquilla aventadora[a] en la mano, y limpiará por completo su era, y recogerá su trigo en el granero[b], pero el tamo lo quemará por completo con fuego inextinguible.
  revised_footnotes:
  - marker: a
    text: O «pala aventadora». El griego se refiere al implemento usado para aventar el grano; versiones antiguas a veces usan «aventador» por su función.
    reason: lexical_alternative
  - marker: b
    text: O «almacén» o «depósito» para «granero».
    reason: lexical_alternative
  revision_rationale: Se ajusta πτύον a un implemento manual más específico, se corrige ἄχυρον a «tamo» para reflejar mejor «chaff», se refuerza κατακαύσει con «quemará por completo», y se pule la naturalidad de la frase en español.
