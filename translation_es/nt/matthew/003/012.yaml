revisions:
- from: Tiene su aventador en la mano[a], y limpiará completamente su era, y recogerá su trigo en el granero[b]; pero la paja la quemará con fuego inextinguible.
  to: Tiene su horquilla aventadora[a] en la mano, y limpiará por completo su era, y recogerá su trigo en el granero[b], pero el tamo lo quemará por completo con fuego inextinguible.
  rationale: Se ajusta πτύον a un implemento manual más específico, se corrige ἄχυρον a «tamo» para reflejar mejor «chaff», se refuerza κατακαύσει con «quemará por completo», y se pule la naturalidad de la frase en español.
  reviewer_model: gpt-5.4
