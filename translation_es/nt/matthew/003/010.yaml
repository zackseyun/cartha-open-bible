  - severity: medium
    issue: «es cortado» debilita la imagen específica de un árbol abatido
    rationale: En contexto arbóreo, ἐκκόπτεται se expresa mejor con una formulación que refleje la tala o el corte desde la base. «Es cortado de raíz» mantiene la metáfora y refuerza la idea de juicio decisivo sin introducir interpretación doctrinal.
