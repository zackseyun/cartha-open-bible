translation:
  language: es
  text: Y ya el hacha está puesta junto a la raíz de los árboles[a]. Por tanto, todo árbol que no produce buen fruto es cortado de raíz y echado al fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «yace junto a la raíz de los árboles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya desde ahora
  lexicon: BDAG
  rationale: «Ya» comunica la inmediatez y el carácter ya presente de la acción con naturalidad en español, preservando el matiz temporal de ἤδη sin añadir explicaciones.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conexión suave, no como oposición fuerte. «Y» mantiene el flujo discursivo de la advertencia anterior sin cargar el sentido con contraste.
- source_word: ἀξίνη
  english_pob_choice: axe
  chosen_spanish: hacha
  alternatives_spanish:
  - acha
  - hacha de cortar
  lexicon: BDAG
  rationale: «Hacha» es el equivalente natural y transparente en español para el instrumento de corte del juicio figurado.
- source_word: πρὸς τὴν ῥίζαν τῶν δένδρων κεῖται
  english_pob_choice: is laid at the root of the trees
  chosen_spanish: está puesta a la raíz de los árboles
  alternatives_spanish:
  - está al pie de los árboles
  - yace a la raíz de los árboles
  lexicon: BDAG
  rationale: La imagen griega expresa proximidad/posición ya establecida. «Está puesta a la raíz» conserva la idea de instrumento ya colocado para el corte. Se evita «yace» porque suena menos natural en español y puede oscurecer la escena.
- source_word: πᾶν οὖν δένδρον
  english_pob_choice: Therefore every tree
  chosen_spanish: Por tanto, todo árbol
  alternatives_spanish:
  - Así que todo árbol
  - Entonces todo árbol
  lexicon: BDAG
  rationale: «Por tanto» reproduce el valor inferencial de οὖν de manera clara y formal. «Todo árbol» mantiene el alcance general del griego.
- source_word: μὴ ποιοῦν
  english_pob_choice: not producing
  chosen_spanish: que no produce
  alternatives_spanish:
  - que no da
  - que no lleva
  lexicon: BDAG
  rationale: El participio presente expresa una acción característica/continua. «Que no produce» sigue de cerca la relación participial con fluidez natural en español.
- source_word: καρπὸν καλὸν
  english_pob_choice: good fruit
  chosen_spanish: buen fruto
  alternatives_spanish:
  - fruto bueno
  - fruto excelente
  lexicon: BDAG
  rationale: «Buen fruto» es la manera más idiomática y fiel de conservar el valor cualitativo de καλός. También mantiene la metáfora bíblica sin explicitarla.
- source_word: ἐκκόπτεται
  english_pob_choice: is cut down
  chosen_spanish: es cortado
  alternatives_spanish:
  - es talado
  - es derribado
  lexicon: BDAG
  rationale: En español, «es cortado» conserva la acción de cortar del verbo griego y deja abierta la imagen del árbol. Se evita «talado» por ser más específico y menos cercano al paralelismo literal del texto.
- source_word: εἰς πῦρ βάλλεται
  english_pob_choice: is thrown into the fire
  chosen_spanish: y echado al fuego
  alternatives_spanish:
  - y arrojado al fuego
  - y lanzado al fuego
  lexicon: BDAG
  rationale: «Echado al fuego» es una equivalencia natural y vívida para βάλλεται, manteniendo la fuerza de la imagen de juicio. Se conserva el complemento definido «al fuego» para no interpretar más allá del texto.
theological_decisions:
- issue: Alcance de la imagen del fuego
  english_pob_reading: Retained as 'the fire' without interpretive expansion.
  chosen_spanish_reading: Se mantiene como «el fuego» sin expansión interpretativa.
  alternative_spanish_readings:
  - el fuego del juicio
  - el infierno
  - el fuego escatológico
  rationale: El texto habla de fuego como imagen de juicio, pero no especifica su alcance doctrinal. Se conserva la tensión del pasaje sin imponer una identificación más estrecha que la forma griega no explicita.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el patrón auditado del POB en inglés, pero ajusta la sintaxis al español para que suene natural y publicable. Se preservan la conexión inferencial de οὖν, la inmediatez de ἤδη y la imagen de juicio sin ampliar el alcance de «el fuego».
  spanish_consistency_notes:
  - Se usa «hacha» para ἀξίνη, en coherencia con el valor léxico estándar y con el tono concreto de la metáfora.
  - Se mantiene «árboles»/«fruto»/«fuego» sin alegorización adicional, para respetar la imagen agrícola-judicial del original.
  - Se prefiere «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva «Por tanto» para la inferencia lógica de οὖν, evitando un enlace meramente narrativo.
