translation:
  language: es
  text: 'Pero cuando vio a muchos de los fariseos y de los saduceos que venían al bautismo de Juan, les dijo: «¡Camada de víboras![a] ¿Quién les advirtió que huyeran de la ira venidera[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Generación de víboras».
    reason: lexical_alternative
  - marker: b
    text: O «la ira que ha de venir».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν δὲ
  english_pob_choice: But when he saw
  chosen_spanish: Pero cuando vio
  alternatives_spanish:
  - Y cuando vio
  - Ahora bien, cuando vio
  lexicon: BDAG
  rationale: El participio aoristo con δέ funciona naturalmente como una cláusula temporal con matiz de transición. En español, «Pero cuando vio» conserva el contraste leve y el avance narrativo sin forzar una estructura participial.
- source_word: πολλοὺς τῶν Φαρισαίων καὶ Σαδδουκαίων
  english_pob_choice: many of the Pharisees and Sadducees
  chosen_spanish: a muchos de los fariseos y de los saduceos
  alternatives_spanish:
  - a muchos fariseos y saduceos
  - a muchos de entre los fariseos y saduceos
  lexicon: BDAG
  rationale: La construcción partitiva se refleja mejor con «a muchos de los...», indicando un subconjunto y no necesariamente a todos los miembros de esos grupos.
- source_word: ἐρχομένους ἐπὶ τὸ βάπτισμα αὐτοῦ
  english_pob_choice: coming for his baptism
  chosen_spanish: que venían para su bautismo
  alternatives_spanish:
  - que venían a su bautismo
  - que venían para ser bautizados por él
  lexicon: BDAG
  rationale: ἐπὶ con βάπτισμα expresa llegada hacia el evento/ministerio del bautismo. «Para su bautismo» mantiene la dirección hacia el rito sin añadir explícitamente una acción no dicha en el texto.
- source_word: Γεννήματα ἐχιδνῶν
  english_pob_choice: Offspring of vipers
  chosen_spanish: ¡Generación de víboras!
  alternatives_spanish:
  - ¡Camada de víboras!
  - ¡Hijos de víboras!
  lexicon: BDAG
  rationale: «Generación» comunica bien el sentido de grupo producido/engendrado y suena natural en español bíblico. «Víboras» conserva la fuerza insultante y la imagen animal del original. Se evita una domesticación excesiva del golpe profético.
- source_word: τίς ὑπέδειξεν ὑμῖν
  english_pob_choice: who warned you
  chosen_spanish: ¿Quién les advirtió?
  alternatives_spanish:
  - ¿Quién les mostró?
  - ¿Quién les indicó?
  lexicon: BDAG
  rationale: ὑποδείκνυμι puede significar mostrar, indicar o advertir; aquí, con la idea de huir de la ira futura, el sentido admonitorio es el más fuerte. «Advirtió» preserva la urgencia de la frase.
- source_word: φυγεῖν ἀπὸ
  english_pob_choice: to flee from
  chosen_spanish: que huyeran de
  alternatives_spanish:
  - que escaparan de
  - que se apartaran de
  lexicon: BDAG
  rationale: El infinitivo φυγεῖν expresa huida real e inmediata. En español, «huyeran de» conserva el movimiento urgente mejor que «escapar», que puede sonar más abstracto.
- source_word: τῆς μελλούσης ὀργῆς
  english_pob_choice: the coming wrath
  chosen_spanish: la ira venidera
  alternatives_spanish:
  - la ira que viene
  - la ira próxima
  lexicon: BDAG
  rationale: «Venidera» mantiene el valor de μέλλω como algo inminente o por venir y preserva el tono escatológico. «Ira» traduce ὀργή con su fuerza judicial y teológica, sin suavizarlo en «castigo» o «juicio».
theological_decisions:
- issue: Alcance de los fariseos y saduceos mencionados
  english_pob_reading: John addresses many from the Pharisees and Sadducees as they approach his baptism, without implying every Pharisee or Sadducee is present or equally characterized.
  chosen_spanish_reading: Juan reprende a muchos de entre los fariseos y saduceos que se acercaban, sin afirmar que todos los miembros de esos grupos estuvieran presentes o igualmente implicados.
  alternative_spanish_readings:
  - Juan se dirige a los fariseos y saduceos como grupos completos
  rationale: La estructura partitiva del griego y la lectura auditada en inglés favorecen limitar la afirmación a un subconjunto. Esto evita universalizar indebidamente la acusación y conserva la precisión del texto.
  doctrine_reference: 'Translation philosophy #1 and #5'
- issue: Fuerza escatológica de ὀργή
  english_pob_reading: wrath
  chosen_spanish_reading: ira
  alternative_spanish_readings:
  - juicio
  - castigo
  rationale: ὀργή designa aquí la ira divina venidera con peso judicial y escatológico. «Ira» conserva mejor esa gravedad que términos más genéricos como «juicio» o «castigo».
  doctrine_reference: 'Translation philosophy #1 and #6'
translation_notes:
  revision_awareness: La revisión más reciente del paquete inglés no introdujo cambios; el texto quedó sin modificaciones tras la última pasada, y el control cruzado informó alto acuerdo (1.0). La versión española sigue de cerca esa lectura estable, conservando el valor partitivo de «muchos de» y la opción léxica «ira venidera» para la expresión final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no se presenta.
  - Se usa «bautismo» en sentido ritual, sin desplazar el término por otras paráfrasis.
  - Se conserva el registro profético fuerte de la reprensión, evitando suavizarla.
  - La puntuación española abre y cierra correctamente el discurso directo, con admiración inicial para reproducir la intensidad del reproche.
