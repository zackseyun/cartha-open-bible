    rationale: Las notas deben marcar el término o frase relevante. Aquí la nota lexical_alternative corresponde al verbo 'salían', no al topónimo.
  - severity: medium
    issue: '''Hacia él'' es menos idiomático en español para este movimiento de personas hacia una persona.'
    rationale: Aunque semánticamente posible, en este contexto suena espacialmente torpe. 'A él' es más natural y suficiente para πρὸς αὐτόν con verbo de movimiento.
  revised_spanish_text: Entonces Jerusalén, toda Judea y toda la región alrededor del Jordán salían[a] a él.[b]
