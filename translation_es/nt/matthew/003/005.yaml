translation:
  language: es
  text: Entonces Jerusalén, toda Judea y toda la región alrededor del Jordán salían[a] a él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "iban saliendo continuamente a él"; el imperfecto griego sugiere una acción en curso o repetida.'
    reason: lexical_alternative
  - marker: b
    text: '"Toda Judea" y "toda la región alrededor del Jordán" son expresiones geográficas amplias que describen una respuesta extendida, no necesariamente a cada individuo.'
    reason: cultural_note
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Marca temporal y discursiva que enlaza la reacción con el ministerio previo de Juan. 'Entonces' es natural en español y mantiene el valor de transición narrativa sin añadir contenido.
- source_word: ἐξεπορεύετο
  english_pob_choice: were going out
  chosen_spanish: salían
  alternatives_spanish:
  - iban saliendo
  - estaban yendo hacia él
  lexicon: BDAG
  rationale: El imperfecto griego señala acción continua o repetida en el pasado. 'Salían' conserva esa duratividad de manera fluida en español; el contexto de movimiento hacia Juan se entiende por la frase siguiente.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: Con verbo de movimiento, πρός + acusativo expresa dirección hacia una persona. 'Hacia él' comunica mejor la orientación espacial que un simple 'a él'.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Nombre propio geográfico estándar en español bíblico y culto.
- source_word: πᾶσα ἡ Ἰουδαία
  english_pob_choice: all Judea
  chosen_spanish: toda Judea
  alternatives_spanish:
  - Judea entera
  - toda la región de Judea
  lexicon: BDAG
  rationale: πᾶσα con el artículo presenta la región como un todo. 'Toda Judea' es conciso y reproduce la amplitud geográfica sin forzar una lectura de totalidad individual.
- source_word: πᾶσα ἡ περίχωρος τοῦ Ἰορδάνου
  english_pob_choice: all the surrounding region of the Jordan
  chosen_spanish: toda la región alrededor del Jordán
  alternatives_spanish:
  - toda la región circundante del Jordán
  - todo el contorno del Jordán
  lexicon: BDAG
  rationale: περίχωρος denota la región circundante o vecindad amplia. 'Región alrededor del Jordán' es claro, mantiene el sentido geográfico y evita una paráfrasis excesiva.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - e ... e
  lexicon: BDAG
  rationale: La coordinación repetida enumera tres grupos geográficos en paralelo; 'y' conserva la acumulación retórica del original.
theological_decisions:
- issue: Alcance de las expresiones geográficas totales
  english_pob_reading: Use representative geographic language without implying mathematically every inhabitant
  chosen_spanish_reading: Usar lenguaje geográfico representativo sin implicar que absolutamente todos los habitantes salieron
  alternative_spanish_readings:
  - 'Traducir más dinámicamente: ''Gente de Jerusalén, de toda Judea y de toda la región del Jordán salía hacia él'''
  - Explicitar la amplitud con una nota interpretativa en el cuerpo del texto
  rationale: El griego usa expresiones regionales amplias con valor retórico para describir una respuesta muy extendida. La traducción conserva esa forma sin intensificarla ni convertirla en una afirmación estadística absoluta.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail en inglés. Se preservó el imperfecto con un verbo en pasado durativo ('salían') y se mantuvo la estructura acumulativa de las tres regiones. No hubo revisiones sustantivas en el pasaje inglés final, por lo que la propuesta española refleja el estado estable del texto fuente.
  spanish_consistency_notes:
  - Se usa 'Jordán' para el río y no 'Jordan', conforme al uso bíblico natural en español.
  - Se eligió 'Jerusalén' y 'Judea' como formas geográficas estándar y reconocibles para lectorado eclesial amplio.
  - La nota a se ancla en 'salían' para señalar la alternativa aspectual sin sobrecargar el texto principal.
  - La nota b se ancla en la secuencia geográfica completa para preservar la observación cultural del POB inglés.
