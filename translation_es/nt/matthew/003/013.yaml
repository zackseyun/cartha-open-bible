translation:
  language: es
  text: Entonces Jesús llega de Galilea al Jordán, a Juan, para ser bautizado por él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Marca transición narrativa y secuencia temporal. «Entonces» conserva el valor discursivo breve y natural en español.
- source_word: παραγίνεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - aparece
  lexicon: BDAG
  rationale: El presente histórico del griego aporta vividez narrativa. «Viene» conserva ese presente sin volver la frase forzada en español.
- source_word: ἀπὸ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: desde Galilea
  alternatives_spanish:
  - de Galilea
  - salido de Galilea
  lexicon: BDAG
  rationale: ἀπό indica origen o procedencia; «desde» expresa bien el punto de partida del movimiento.
- source_word: ἐπὶ τὸν Ἰορδάνην
  english_pob_choice: to the Jordan
  chosen_spanish: al Jordán
  alternatives_spanish:
  - hasta el Jordán
  - al río Jordán
  lexicon: BDAG
  rationale: Con movimiento, ἐπί + acusativo señala dirección hacia un lugar. «Al Jordán» es natural y fiel; «río» no es necesario en el verso.
- source_word: πρὸς τὸν Ἰωάννην
  english_pob_choice: to John
  chosen_spanish: a Juan
  alternatives_spanish:
  - hacia Juan
  - a Juan el Bautista
  lexicon: BDAG
  rationale: πρός con acusativo expresa movimiento hacia una persona. «A Juan» evita añadir el título que el verso no menciona.
- source_word: τοῦ βαπτισθῆναι
  english_pob_choice: to be baptized
  chosen_spanish: para ser bautizado
  alternatives_spanish:
  - para que lo bautizaran
  - a fin de ser bautizado
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para ser bautizado» comunica claramente esa finalidad en español.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por Juan
  lexicon: BDAG
  rationale: ὑπό con genitivo indica agente personal. «Por él» sigue de cerca el griego y mantiene la referencia implícita a Juan.
theological_decisions:
- issue: Presente histórico en παραγίνεται
  english_pob_reading: Present-tense vividness retained with 'comes'
  chosen_spanish_reading: Presente narrativo retenido con «viene»
  alternative_spanish_readings:
  - simple pasado «vino»
  - «llega» en presente
  rationale: El griego usa presente histórico para vivificar la narración. En español, «viene» preserva mejor ese efecto que un pasado simple, sin alterar el sentido doctrinal del pasaje.
  doctrine_reference: Translation philosophy §1, §6
- issue: No añadir el título de Juan
  english_pob_reading: Use 'John' only in the main text
  chosen_spanish_reading: Usar solo «Juan» en el texto principal
  alternative_spanish_readings:
  - «Juan el Bautista»
  rationale: El verso solo nombra a Juan. Añadir el título sería una expansión interpretativa no apoyada por el texto de este versículo.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión menor de estilo (un ajuste de puntuación y secuencia en la lista de destinos) sin cambio de sentido. La versión española conserva la secuencia de movimiento y el propósito del infinitivo articular, sin introducir material ausente del griego.
  spanish_consistency_notes:
  - Se mantiene «Jordán» como nombre propio del río, sin agregar «río» salvo que el contexto lo requiera.
  - Se conserva el presente histórico con «viene» para reflejar la vivacidad narrativa del griego.
  - No se introduce «Juan el Bautista» en el texto principal porque el verso no lo dice explícitamente.
  - «Bautizado» sigue el valor pasivo del infinitivo griego y evita una paráfrasis innecesaria.
