translation:
  language: es
  text: Les aseguro que esta generación no pasará hasta que todas estas cosas sucedan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'este pueblo' o 'esta raza'. La palabra griega puede entenderse más ampliamente, pero 'generación' es la traducción más directa aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - Amén
  - Verdaderamente
  lexicon: BDAG
  rationale: En la fórmula solemne ἀμὴν λέγω ὑμῖν, 'De cierto' transmite con naturalidad en español el valor enfático y aseverativo de la expresión sin volverla mecánica ni litúrgica.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo yo
  - les hablo
  lexicon: BDAG
  rationale: '''Les digo'' conserva el habla directa a los oyentes y evita una construcción más pesada como ''les digo yo'' o menos precisa como ''les hablo''.'
- source_word: οὐ μὴ παρέλθῃ
  english_pob_choice: will certainly not pass away
  chosen_spanish: no pasará
  alternatives_spanish:
  - no pasará de ninguna manera
  - ciertamente no pasará
  lexicon: BDAG
  rationale: El doble negativo griego expresa negación enfática. En español, 'no pasará' mantiene el sentido principal con suficiente fuerza; la certeza está reforzada por el contexto solemne y por 'De cierto'.
- source_word: ἡ γενεὰ αὕτη
  english_pob_choice: this generation
  chosen_spanish: esta generación
  alternatives_spanish:
  - este pueblo
  - esta raza
  lexicon: BDAG
  rationale: Se conserva el sentido léxico más directo de γενεά como 'generación', preservando la tensión interpretativa documentada en la nota inglesa sin resolverla en el texto principal.
- source_word: ἕως ἂν
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  lexicon: BDAG
  rationale: '''Hasta que'' es la forma más natural en español para introducir una cláusula futura dependiente y corresponde bien al valor temporal de ἕως ἄν.'
- source_word: πάντα ταῦτα
  english_pob_choice: all these things
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  - todas estas cosas sucedan
  lexicon: BDAG
  rationale: El griego neutro plural puede expresarse de manera natural en español con un singular colectivo, 'todo esto', sin perder la referencia al conjunto de eventos mencionados.
- source_word: γένηται
  english_pob_choice: happen
  chosen_spanish: suceda
  alternatives_spanish:
  - acontezca
  - tenga lugar
  lexicon: BDAG
  rationale: '''Suceda'' comunica bien el valor de γίνομαι como ocurrencia de eventos en un español moderno y digno, equivalente a ''happen''.'
theological_decisions:
- issue: Sentido de ἡ γενεὰ αὕτη
  english_pob_reading: Render lexically as 'this generation' without interpretive expansion.
  chosen_spanish_reading: Se traduce como 'esta generación' sin resolver la discusión exegética.
  alternative_spanish_readings:
  - este pueblo
  - esta raza
  - la generación contemporánea de Jesús
  rationale: La traducción debe preservar la tensión interpretativa registrada en el POB inglés. 'Esta generación' es la equivalencia más directa y no impone una identificación teológica específica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca en el texto principal exactamente donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se evitó 'Cristo' y 'Señor' porque no aparecen en el texto base.
  - Se preservó la tensión interpretativa de γενεά con la nota alternativa, sin expandir el texto principal más allá del griego.
  - La negación enfática se tradujo de forma natural en español sin introducir un matiz doctrinal adicional.
