revisions:
- from: De cierto les digo que esta generación no pasará[a] hasta que todo esto suceda.
  to: Les aseguro que esta generación no pasará hasta que todas estas cosas sucedan[a].
  rationale: Se reemplaza 'De cierto les digo' por 'Les aseguro' para lograr un español moderno, digno y natural que aún preserve la solemnidad de ἀμὴν λέγω ὑμῖν. Se cambia 'todo esto' por 'todas estas cosas' para reflejar mejor el neutro plural πάντα ταῦτα y seguir la decisión léxica documentada en el POB inglés. La nota se mantiene con leve pulido estilístico. Se conserva 'esta generación' para preservar la tensión interpretativa sin resolverla en la traducción.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:20:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: fórmula solemne, negación enfática, ''esta generación'', y la cláusula temporal final. Sin embargo, atenúa dos decisiones auditadas del POB: (1) ἀμὴν λέγω ὑμῖν se vierte como ''De cierto les digo'', una formulación inteligible pero algo arcaizante frente al objetivo de español moderno y digno; (2) πάντα ταῦτα se redujo a ''todo esto'', aunque el POB inglés documenta explícitamente que el neutro plural debe preservarse como ''all these things''.'
  spanish_quality_summary: El español es claro y comprensible, pero 'De cierto' suena más cercano a registro tradicional tipo Reina-Valera que al estilo moderno solicitado. 'Les aseguro' o 'En verdad les digo' fluye mejor. Además, 'todo esto' es natural, pero 'todas estas cosas' mantiene mejor el plural del original y la decisión del proyecto. El resto del verso lee bien.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto (Yahvé, Mesías, etc.). La decisión teológica sobre γενεά está bien preservada como ''esta generación'' con nota alternativa. La principal desalineación léxica es πάντως/πάντα ταῦτα: debe reflejarse mejor el plural en español. También conviene representar un poco más claramente la fuerza de οὐ μὴ, ya sea mediante la fórmula inicial o con ''de ningún modo''.'
  issues:
  - severity: medium
    issue: Registro de 'De cierto' demasiado tradicional/arcaizante
    rationale: Aunque fiel en sentido, no encaja tan bien con el objetivo de español moderno y ampliamente legible. El POB inglés evitó 'Amen' por naturalidad idiomática; en español conviene una solución igualmente natural como 'Les aseguro' o 'En verdad les digo'.
  - severity: medium
    issue: '''todo esto'' debilita la decisión documentada para πάντα ταῦτα'
    rationale: El expediente inglés justifica expresamente 'all these things' para conservar el neutro plural. En español, 'todas estas cosas' es natural y más alineado con esa decisión.
  - severity: low
    issue: La negación enfática οὐ μὴ podría expresarse con mayor fuerza
    rationale: '''No pasará'' no es incorrecto, pero el griego es enfático. La solemnidad inicial compensa en parte; aun así, una formulación como ''de ningún modo pasará'' sería más marcada. No es indispensable si la frase inicial se fortalece.'
  revised_spanish_text: Les aseguro que esta generación no pasará hasta que todas estas cosas sucedan[a].
  revised_footnotes:
  - marker: a
    text: O 'este pueblo' o 'esta raza'. La palabra griega puede entenderse más ampliamente, pero 'generación' es la traducción más directa aquí.
    reason: alternative_reading
  revision_rationale: Se reemplaza 'De cierto les digo' por 'Les aseguro' para lograr un español moderno, digno y natural que aún preserve la solemnidad de ἀμὴν λέγω ὑμῖν. Se cambia 'todo esto' por 'todas estas cosas' para reflejar mejor el neutro plural πάντα ταῦτα y seguir la decisión léxica documentada en el POB inglés. La nota se mantiene con leve pulido estilístico. Se conserva 'esta generación' para preservar la tensión interpretativa sin resolverla en la traducción.
