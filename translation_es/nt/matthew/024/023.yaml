review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: τότε = «Entonces», ἐάν τις ὑμῖν εἴπῃ = «si alguien les dice», Ἰδοὺ ὧδε ὁ χριστός = «Miren, aquí está el Mesías», y la segunda cita elíptica se resuelve de forma natural. Sin embargo, μὴ πιστεύσητε en contexto apunta a no creer la afirmación reportada; «no le crean» desplaza el objeto hacia la persona y no preserva tan bien la decisión del POB inglés («do not believe it»).'
  spanish_quality_summary: 'El español es claro y legible, con registro moderno y digno. Hay un ajuste menor de naturalidad y precisión: «no lo crean» o «no crean eso» refleja mejor la prohibición sobre la afirmación. También conviene capitalizar normalmente dentro de la exclamación: «¡Allí está!».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: Χριστός se traduce correctamente como «Mesías» en sentido titular, con nota alternativa para «el Cristo». No hay conflictos con otros términos doctrinales. La nota sobre la elipsis griega es adecuada.'
  issues:
  - severity: medium
    issue: «no le crean» personaliza indebidamente el objeto de μὴ πιστεύσητε
    rationale: El griego no expresa objeto personal; el POB inglés justificó «do not believe it» para referirse al reclamo, no a la persona. En español, «no le crean» suele significar ‘no le crean a él/ella’, lo que altera levemente el foco semántico.
  - severity: low
    issue: Minúscula tras signo de apertura en cita exclamativa
    rationale: «¡allí está!» es comprensible, pero en español se prefiere «¡Allí está!» al iniciar la exclamación citada.
