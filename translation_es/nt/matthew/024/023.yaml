translation:
  language: es
  text: 'Entonces, si alguien les dice[a]: «Miren, aquí está el Mesías», o[b] «¡Allí está!», no lo crean.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo». «Mesías» mantiene el sentido titular preferido en el texto principal.'
    reason: alternative_reading
  - marker: b
    text: La segunda exclamación es elíptica en griego; también puede entenderse como «¡Aquí está!» o «¡Está aquí!».
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que enlaza con la advertencia anterior. «Entonces» es natural en español y conserva la secuencia discursiva sin añadir matiz interpretativo.
- source_word: ἐάν τις ὑμῖν εἴπῃ
  english_pob_choice: if anyone says to you
  chosen_spanish: si alguien les dice
  alternatives_spanish:
  - si cualquiera les dice
  - si uno les dice
  lexicon: BDAG
  rationale: La construcción condicional con sujeto indefinido se expresa de forma idiomática con «si alguien». Se usa «les» para el destinatario plural del discurso.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren bien
  - Miren aquí
  - Vean
  lexicon: BDAG
  rationale: Imperativo de atención que funciona como deíctico. «Miren» transmite la fuerza exhortativa en español moderno sin el arcaísmo de «he aquí».
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - en este lugar
  lexicon: BDAG
  rationale: Adverbio de lugar. En la primera cláusula, «aquí» corresponde al demostrativo de cercanía y conserva la oposición con la segunda mención implícita.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  - Cristo
  lexicon: BDAG
  rationale: El artículo y el contexto de falsa identificación señalan el título mesiánico. Se mantiene «Mesías» como equivalente principal en español, conforme a la política terminológica del proyecto.
- source_word: ἤ· Ὧδε
  english_pob_choice: or, ‘There he is!’
  chosen_spanish: o[b] «¡allí está!»
  alternatives_spanish:
  - o «¡aquí está!»
  - o «¡está aquí!»
  lexicon: BDAG
  rationale: El griego es elíptico y repite de manera abrupta el deíctico. «Allí está» conserva la orientación espacial contrastiva y permite una frase breve, natural y fiel al reclamo citado.
- source_word: μὴ πιστεύσητε
  english_pob_choice: do not believe it
  chosen_spanish: no le crean
  alternatives_spanish:
  - no crean en él
  - no lo crean
  lexicon: BDAG
  rationale: La prohibición apunta a no aceptar la afirmación o reclamo reportado. «Le crean» mantiene un referente impersonal/indefinido para la declaración, evitando introducir un objeto demasiado específico que no está en el griego.
theological_decisions:
- issue: Χριστός como título mesiánico en una falsa pretensión de identidad
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  - el Cristo
  rationale: El pasaje advierte contra afirmaciones falsas sobre la identidad del esperado ungido. En español, «Mesías» conserva el valor titular y evita convertir el término en un nombre eclesiástico fijo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Mesías (where title; Cristo where name-like)'
- issue: 'Elipsis en la segunda cita: Ὧδε'
  english_pob_reading: There he is!
  chosen_spanish_reading: ¡allí está!
  alternative_spanish_readings:
  - ¡aquí está!
  - ¡está aquí!
  rationale: La traducción inglesa reciente resolvió la elipsis con «There he is!» para mayor naturalidad. En español, «¡allí está!» reproduce esa solución sin sobrecargar la frase, manteniendo el contraste con el «aquí» de la primera cláusula.
  doctrine_reference: 'DOCTRINE.md: Optimal equivalence may supply implied elements for clarity when the source is elliptical'
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, especialmente la revisión que resolvió la segunda cláusula como una exclamación más natural («There he is!»). Para el español, se optó por una solución equivalente y breve («¡allí está!»), preservando el contraste espacial y la advertencia contra aceptar tales reclamos. Se mantuvo el título «Mesías» conforme a la terminología doctrinal del proyecto.
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός como título, en continuidad con la política terminológica del proyecto.
  - Se prefirió «Miren»/«no le crean» por naturalidad moderna y claridad oral, sin perder la fuerza imperativa.
  - La segunda cita se dejó breve para respetar la elipsis griega y la alternancia deíctica del verso.
  - Se usó puntuación de cita española y comillas angulares para legibilidad pública.
