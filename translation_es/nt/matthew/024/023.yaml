    reason: alternative_reading
  - marker: b
    text: La segunda exclamación es elíptica en griego; también puede entenderse como «¡Aquí está!» o «¡Está aquí!».
    reason: alternative_reading
  revision_rationale: Se cambió «no le crean» por «no lo crean» para conservar mejor el sentido de no creer la afirmación reportada, en línea con el griego y con la decisión documentada del POB inglés. También se ajustó la capitalización de la exclamación citada para español estándar, sin alterar el sentido.
