translation:
  language: es
  text: 'Porque muchos vendrán en mi nombre, diciendo: «Yo soy el Mesías[a]», y extraviarán a muchos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo soy el Cristo». El título griego es ὁ χριστός.'
    reason: alternative_reading
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de personas
  - un gran número
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo y natural en español; conserva la amplitud de la advertencia sin añadir matiz innecesario.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Mantiene el valor explicativo/conectivo del griego. En español, «Porque» funciona bien al inicio de una cláusula explicativa y es plenamente natural.
- source_word: ἐλεύσονται
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - irán a venir
  - se presentarán
  lexicon: BDAG
  rationale: «Vendrán» reproduce de manera idiomática el futuro de ἔρχομαι. «Se presentarán» introduce una interpretación que el griego no exige.
- source_word: ἐπὶ τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - sobre mi nombre
  - bajo mi nombre
  - con mi nombre
  lexicon: BDAG
  rationale: La expresión idiomática española «en mi nombre» comunica bien la apelación a la autoridad e identidad de Jesús, tal como en el audit trail en inglés.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - sosteniendo
  lexicon: BDAG
  rationale: Participio introductorio de la declaración citada; «diciendo» es la opción más transparente y no sobreinterpreta la intención.
- source_word: Ἐγώ εἰμι ὁ χριστός
  english_pob_choice: I am the Messiah
  chosen_spanish: Yo soy el Mesías
  alternatives_spanish:
  - Yo soy el Cristo
  lexicon: BDAG
  rationale: Se traduce el título Χριστός como «Mesías», conforme al criterio doctrinal del proyecto para títulos cristológicos. En español, «Mesías» es claro y no funciona como nombre fijo de la misma manera que en algunas tradiciones.
- source_word: πλανήσουσιν
  english_pob_choice: will lead ... astray
  chosen_spanish: extraviarán
  alternatives_spanish:
  - engañarán
  - desviarán
  lexicon: BDAG
  rationale: «Extraviar» conserva la idea de hacer perder el rumbo, que integra bien la imagen de πλανάω de desviar/inducir al error. «Engañarán» es posible, pero reduce el matiz direccional.
- source_word: πολλοὺς
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - a bastantes
  lexicon: BDAG
  rationale: En español, el objeto directo preposicional «a muchos» fluye de forma natural y mantiene la concisión del griego.
theological_decisions:
- issue: Título Χριστός en una falsa confesión mesiánica
  english_pob_reading: I am the Messiah
  chosen_spanish_reading: Yo soy el Mesías
  alternative_spanish_readings:
  - Yo soy el Cristo
  rationale: El griego usa ὁ χριστός como título, no como nombre propio. Traducirlo como «Mesías» preserva la fuerza titular y evita una forma más litúrgica o nominalizada sin base contextual en español.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2; Contested terms table for Χριστός'
- issue: Matiz de πλανήσουσιν
  english_pob_reading: will lead many astray
  chosen_spanish_reading: extraviarán a muchos
  alternative_spanish_readings:
  - engañarán a muchos
  - desviarán a muchos
  rationale: «Extraviar» mantiene el doble campo semántico de error y desvío implícito en πλανάω, sin reducirlo solo a la mentira proposicional. Eso conserva mejor la advertencia escatológica del pasaje.
  doctrine_reference: BDAG / uso contextual de πλανάω
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre «Christ» y «Messiah», con corrección final a «Messiah» por política doctrinal. Esta traducción sigue esa corrección y la expresa en español con «Mesías», evitando la forma «Cristo» en el dicho de los falsos reclamantes.
  spanish_consistency_notes:
  - Uso «Mesías» para Χριστός cuando funciona como título, conforme al patrón del proyecto.
  - Conservo la estructura breve y advertencial del griego sin añadir elementos explicativos al cuerpo del versículo.
  - «En mi nombre» se mantiene literal-idiomático; la nota aclara la posible lectura de autoridad/representación.
  - «A muchos» se integra como objeto directo natural en español, sin perder la cuantificación del griego.
