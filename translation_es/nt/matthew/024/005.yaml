  to: 'Porque muchos vendrán en mi nombre, diciendo: «Yo soy el Mesías[a]», y extraviarán a muchos.'
  rationale: Se ajusta el orden de palabras para un español más natural («extraviarán a muchos») y se reemplaza la nota por una alternativa léxica que sí corresponde al audit trail inglés y a la decisión documentada sobre Χριστός. No se requiere adjudicación adicional porque la corrección es menor y está claramente respaldada por la evidencia fuente y la política del proyecto.
