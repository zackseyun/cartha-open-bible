    rationale: El inglés tiene una nota léxica genuina sobre ὁ χριστός («Messiah» / «Christ»). La nota española actual repite «en mi nombre» y añade explicación interpretativa, pero marcada como «O:», lo cual es engañoso como alternativa de traducción.
  - severity: low
