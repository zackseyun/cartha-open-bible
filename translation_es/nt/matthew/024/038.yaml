    issue: Inicio «Porque como» poco natural en español
    rationale: Aunque intenta conservar ὡς γὰρ, en español suena forzado. «Pues así como» mantiene tanto la función explicativa como la comparativa con mejor legibilidad.
  - severity: low
    issue: «en los días antes del diluvio» es gramatical pero menos idiomático
    rationale: «En los días anteriores al diluvio» o «en los días antes del diluvio» no alteran el sentido, pero la primera opción es más natural y digna para el registro meta.
  - severity: low
    issue: Nota al pie con «siendo dadas en matrimonio» algo rígida
    rationale: «siendo dadas en matrimonio» es comprensible, pero «siendo dadas en casamiento» o mantener «siendo dadas en matrimonio» con mejor sintaxis explicativa puede pulirse. La distinción léxica debe conservarse sin sonar demasiado literalista.
