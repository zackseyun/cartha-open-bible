translation:
  language: es
  text: Pues así como en los días anteriores al diluvio estaban comiendo y bebiendo, casándose y dando en matrimonio[a], hasta el día en que Noé entró en el arca,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo dadas en matrimonio». El griego distingue γαμοῦντες y γαμίζοντες; este último puede referirse a ser dado o dada en matrimonio, o a dar a alguien en matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς γὰρ
  english_pob_choice: For as
  chosen_spanish: Porque como
  alternatives_spanish:
  - Porque así como
  - Pues como
  - Como
  lexicon: BDAG
  rationale: La combinación abre una comparación explicativa. «Porque como» conserva el valor de γάρ y ὡς en español natural, con el mismo enlace lógico que el inglés POB.
- source_word: ἦσαν
  english_pob_choice: they were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - se hallaban
  lexicon: BDAG
  rationale: El imperfecto con participios presenta una actividad continua. «Estaban» reproduce bien ese valor aspectual en español sin añadir sujeto explícito.
- source_word: ἐν ταῖς ἡμέραις ταῖς πρὸ τοῦ κατακλυσμοῦ
  english_pob_choice: in the days before the flood
  chosen_spanish: en los días antes del diluvio
  alternatives_spanish:
  - en los días previos al diluvio
  - en los días antes del gran diluvio
  lexicon: BDAG
  rationale: «Diluvio» es el equivalente más natural y bíblicamente reconocible de κατακλυσμός en el contexto de Noé. «Antes de» mantiene la relación temporal simple del griego.
- source_word: κατακλυσμοῦ
  english_pob_choice: flood
  chosen_spanish: diluvio
  alternatives_spanish:
  - inundación
  - flood
  lexicon: BDAG
  rationale: En el marco de Génesis y Noé, «diluvio» es el término español establecido y comunica el intertexto con precisión.
- source_word: τρώγοντες καὶ πίνοντες
  english_pob_choice: eating and drinking
  chosen_spanish: estaban comiendo y bebiendo
  alternatives_spanish:
  - comían y bebían
  - andaban comiendo y bebiendo
  lexicon: BDAG
  rationale: Los participios describen acciones ordinarias en curso. «Comiendo y bebiendo» conserva el paralelismo; el auxiliar «estaban» hace natural el valor progresivo en español.
- source_word: γαμοῦντες
  english_pob_choice: marrying
  chosen_spanish: casándose
  alternatives_spanish:
  - casándose
  - contrayendo matrimonio
  lexicon: BDAG
  rationale: «Casándose» es la forma natural en español para γαμοῦντες y preserva la participación continua en la serie de acciones.
- source_word: γαμίζοντες
  english_pob_choice: giving in marriage
  chosen_spanish: dando en matrimonio[a]
  alternatives_spanish:
  - siendo dadas en matrimonio[a]
  - entregando en matrimonio[a]
  lexicon: BDAG
  rationale: Se mantiene la distinción léxica entre γαμοῦντες y γαμίζοντες. «Dar en matrimonio» puede referirse tanto a entregar como a casarse por arreglo familiar; por eso se conserva la nota alternativa como en el POB inglés.
- source_word: ἄχρι ἧς ἡμέρας
  english_pob_choice: until the day
  chosen_spanish: hasta el día en que
  alternatives_spanish:
  - hasta el día que
  - hasta que llegó el día
  lexicon: BDAG
  rationale: La construcción temporal marca el límite de las acciones. «Hasta el día en que» suena natural en español y refleja el sentido idiomático del griego.
- source_word: εἰσῆλθεν Νῶε εἰς τὴν κιβωτόν
  english_pob_choice: Noah entered the ark
  chosen_spanish: Noé entró en el arca
  alternatives_spanish:
  - Noé se metió en el arca
  - Noé ingresó en el arca
  lexicon: BDAG
  rationale: «Entró en el arca» es fiel e idiomático. «Arca» conserva el término bíblico preciso para κιβωτός en el relato de Noé.
theological_decisions:
- issue: Si las actividades mencionadas deben insinuar pecado o describir vida ordinaria antes del juicio
  english_pob_reading: Rendered the activities neutrally as ordinary human actions
  chosen_spanish_reading: Se presentan neutralmente como acciones humanas ordinarias
  alternative_spanish_readings:
  - Se cargan con un matiz de indulgencia o descuido moral
  - Se interpretan como conducta pecaminosa en sí misma
  rationale: El griego nombra actividades comunes sin calificativos morales. El punto del contexto es la normalidad inconsciente antes del juicio súbito, no condenar comer, beber o casarse como tales. La traducción debe preservar esa tensión.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el control cruzado reporta alta concordancia y la redacción inglesa quedó sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Diluvio» y «arca» conservan el trasfondo de Génesis y la terminología bíblica estable.
  - Se prefirió un español neutro y culto, evitando tanto arcaísmos innecesarios como parafraseo.
  - La nota [a] se ancla solo en «dando en matrimonio» para preservar la distinción léxica de γαμίζοντες.
