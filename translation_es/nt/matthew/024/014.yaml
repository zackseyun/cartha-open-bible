translation:
  language: es
  text: Y esta buena noticia del reino[a] será proclamada por toda la tierra habitada[b] como testimonio a todas las naciones[c], y entonces vendrá el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «evangelio del reino».
    reason: lexical_alternative
  - marker: b
    text: O «por todo el mundo».
    reason: lexical_alternative
  - marker: c
    text: O «a todos los pueblos».
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρυχθήσεται
  english_pob_choice: will be proclaimed
  chosen_spanish: será proclamado
  alternatives_spanish:
  - será predicado
  - será anunciado
  lexicon: BDAG
  rationale: El futuro pasivo de κηρύσσω destaca un anuncio público y autorizado. «Será proclamado» conserva ese matiz formal sin volverlo eclesiástico en exceso; «predicado» puede sonar demasiado técnico o homilético, y «anunciado» pierde algo de la fuerza del pregón.
- source_word: εὐαγγέλιον
  english_pob_choice: good news
  chosen_spanish: buen mensaje
  alternatives_spanish:
  - buena noticia
  - evangelio
  lexicon: BDAG
  rationale: El sentido básico es de noticia alegre o mensaje salvífico. «Buen mensaje» es claro y natural en español; «evangelio» es posible, pero puede introducir una forma tradicional fija donde el griego aquí no exige un término litúrgico. «Buena noticia» también funciona, pero «mensaje» ayuda a mantener el carácter proclamado del verbo κηρύσσω.
- source_word: τῆς βασιλείας
  english_pob_choice: of the kingdom
  chosen_spanish: del reino
  alternatives_spanish:
  - acerca del reino
  - del reinado
  lexicon: BDAG
  rationale: El genitivo se rinde de forma directa como «del reino», preservando la relación nominal sin interpretar de más. «Acerca del reino» es más explicativo que literal; «reinado» puede captar la idea, pero cambia el sustantivo base y hace menos transparente la conexión con el texto fuente.
- source_word: ἐν ὅλῃ τῇ οἰκουμένῃ
  english_pob_choice: throughout the whole world
  chosen_spanish: por toda la tierra habitada
  alternatives_spanish:
  - por todo el mundo
  - por toda la tierra habitada del mundo
  lexicon: BDAG
  rationale: οἰκουμένη alude al mundo habitado o conocido por la sociedad humana. «Por toda la tierra habitada» mantiene mejor ese valor léxico que «mundo», aunque esta última es más idiomática; la frase conserva amplitud global sin reducirla a una esfera meramente local.
- source_word: εἰς μαρτύριον
  english_pob_choice: as a testimony
  chosen_spanish: como testimonio
  alternatives_spanish:
  - para testimonio
  - como testigo
  lexicon: BDAG
  rationale: 'La expresión comunica finalidad o resultado: la proclamación funciona como testimonio. «Como testimonio» reproduce bien esa función evidencial sin decidir si el testimonio es principalmente favorable o acusatorio.'
- source_word: πᾶσιν τοῖς ἔθνεσιν
  english_pob_choice: to all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a los gentiles
  lexicon: BDAG
  rationale: Aquí ἔθνη se refiere de manera amplia a las naciones o pueblos del mundo. «Naciones» conserva la referencia lexical y la resonancia bíblica; «pueblos» sería una alternativa válida, pero «gentiles» estrecha indebidamente el alcance en este contexto.
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - llegará
  lexicon: BDAG
  rationale: ἥκω suele significar «venir» o «llegar». «Vendrá» es la forma más natural en este anuncio escatológico y conserva la inmediatez del cierre del versículo.
- source_word: τὸ τέλος
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - la consumación
  - el final
  lexicon: BDAG
  rationale: τέλος designa el fin o consumación. «El fin» es la opción más directa y sobria en español; «consumación» agrega un matiz más técnico, y «final» es menos idiomático como sustantivo absoluto en este pasaje.
theological_decisions:
- issue: Alcance de οἰκουμένη y ἔθνη en una declaración escatológica
  english_pob_reading: Render the statement with global scope language without narrowing it to either the Roman Empire alone or a later technical missiological category.
  chosen_spanish_reading: 'Traducir con un alcance global: «por toda la tierra habitada» y «a todas las naciones», sin reducirlo al Imperio romano ni convertirlo en una categoría misionera técnica.'
  alternative_spanish_readings:
  - «por todo el mundo» para un español más idiomático
  - «a todos los pueblos» para resaltar personas más que naciones
  rationale: El versículo presenta una amplitud universal previa a «el fin». La traducción debe conservar esa amplitud sin resolver debates sobre el cumplimiento histórico exacto o el calendario escatológico; así se preserva la tensión interpretativa documentada en el auditoría inglesa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La auditoría inglesa indica que no hubo cambios en la última pasada y que el acuerdo de revisión fue alto; por eso esta propuesta mantiene la misma decisión semántica central, pero la expresa en español con equivalentes naturales y transparentes, sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se conserva la distinción entre «reino» y «fin» sin glosar teológicamente el pasaje.
  - «Tierra habitada» mantiene el valor de οἰκουμένη mejor que un simple «mundo» en español, aunque se reconoce la alternativa idiomática en nota.
  - Se evita «SEÑOR» o terminología litúrgica ajena al texto, porque aquí no aparece el nombre divino ni κύριος.
  - 'El orden final refleja el griego: proclamación universal, testimonio a todas las naciones, y luego la llegada del fin.'
