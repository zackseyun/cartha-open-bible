review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura condicional y paralela del griego: ἐὰν οὖν εἴπωσιν ὑμῖν corresponde a «si les dicen», Ἰδοὺ se refleja con una llamada de atención natural, μὴ ἐξέλθητε con «no salgan», y μὴ πιστεύσητε con «no lo crean». También mantiene correctamente el sujeto implícito de ἐστίν sin añadir «Jesús» o «Mesías». Sin embargo, la elección principal «desierto» no sigue la preferencia del audit trail inglés por «wilderness» con nota alternativa «desert»; en español, «desierto» estrecha algo el sentido de ἐρήμῳ frente a una opción más amplia como «lugar despoblado».'
  spanish_quality_summary: El español es claro y público-lecturable. No obstante, «Miren» suena algo marcado como imperativo plural directo a los lectores, mientras que aquí funciona mejor una partícula citativa como «Miren» o «Fíjense» dentro de la cita; aun así no es un problema serio. El ajuste principal recomendado es reemplazar «desierto» por «lugar despoblado» en el texto principal para reflejar mejor el sentido amplio y dejar «desierto» como alternativa. «Aposentos interiores» es comprensible y digno, aunque algo elevado; sigue siendo una opción aceptable para ταμείοις.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. Se respeta la omisión de título para el referente implícito. La principal observación léxica es alinear mejor ἐρήμῳ con la decisión auditada de un término más amplio que «desierto», manteniendo «desierto» en nota. «Aposentos interiores» encaja razonablemente con «inner rooms».
  issues:
  - severity: medium
    issue: «desierto» como texto principal para ἐν τῇ ἐρήμῳ
    rationale: El audit trail inglés eligió «in the wilderness» como principal y dejó «in the desert» como alternativa. En español, «desierto» puede sonar más estrecho y arenoso que el griego ἔρημος. Una formulación como «lugar despoblado» o «la soledad» preserva mejor la amplitud semántica, dejando «desierto» en nota.
  - severity: low
    issue: La nota [a] repite el mismo texto que el principal
    rationale: La nota actual dice «O “en el desierto”», pero el texto principal ya dice «en el desierto». La nota debe preservar una alternativa real, no duplicar la lectura principal.
  revised_spanish_text: 'Así que, si les dicen: «Miren, está en un lugar despoblado»[a], no salgan; «Miren, está en los aposentos interiores»[b], no lo crean.'
