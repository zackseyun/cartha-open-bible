    text: O «en el desierto».
    reason: lexical_alternative
  - marker: b
    text: O «en los cuartos interiores», «en las cámaras interiores» o «en los almacenes». El griego puede referirse a habitaciones internas o privadas.
    reason: lexical_alternative
  revision_rationale: Se revisa ἐρήμῳ para reflejar mejor la amplitud semántica del griego y alinearse con la preferencia documentada del POB por una idea de lugar apartado/despoblado, dejando «desierto» como alternativa en nota. Se conserva el resto de la estructura, incluida la omisión del sujeto explícito y la distinción entre creer el informe y creerles a las personas.
