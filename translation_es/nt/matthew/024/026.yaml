    text: Or 'in the desert.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the storerooms' or 'in the secret chambers.' The Greek can refer to inner or private rooms.
    reason: lexical_alternative
  - marker: c
    text: Or 'do not go out. ‘Look, he is in the inner rooms,’'.
    reason: previous_rendering
