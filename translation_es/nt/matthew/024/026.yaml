  text: ἐὰν οὖν εἴπωσιν ὑμῖν· Ἰδοὺ ἐν τῇ ἐρήμῳ ἐστίν, μὴ ἐξέλθητε· Ἰδοὺ ἐν τοῖς ταμείοις, μὴ πιστεύσητε·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/026.yaml
  text: Therefore[a], if they say to you, ‘Look, he is in the wilderness,’ do not go out; ‘Look[c][b], he is in the inner rooms,’ do not believe it.
  footnotes:
