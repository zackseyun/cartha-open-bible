translation:
  language: es
  text: 'Así que, si les dicen: «Miren, está en un lugar despoblado»[a], no salgan; «Miren, está en los aposentos interiores»[b], no lo crean.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el desierto».
    reason: lexical_alternative
  - marker: b
    text: O «en los cuartos interiores», «en las cámaras interiores» o «en los almacenes». El griego puede referirse a habitaciones internas o privadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  english_pob_choice: Therefore, if
  chosen_spanish: Así que, si
  alternatives_spanish:
  - Por tanto, si
  - Entonces, si
  lexicon: BDAG
  rationale: οὖν marca consecuencia lógica, y ἐὰν introduce una condición. «Así que, si» conserva ambos valores en un español natural y apto para lectura pública.
- source_word: εἴπωσιν ὑμῖν
  english_pob_choice: they say to you
  chosen_spanish: les dicen
  alternatives_spanish:
  - les digan
  - alguien les diga
  lexicon: BDAG
  rationale: El sujeto es indefinido en tercera persona plural. En español, «les dicen» transmite bien la forma impersonal/indefinida del griego sin añadir un sujeto específico.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Fíjense
  lexicon: BDAG
  rationale: ἰδού funciona como llamado de atención. «Miren» es natural en español actual y mantiene la inmediatez del original.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto solitario
  - en la soledad
  lexicon: BDAG
  rationale: ἔρημος puede significar «desierto» o «lugar despoblado». Aquí se eligió «desierto» porque es la alternativa léxica reconocida en el audit trail y es plenamente válida en español, aunque la imagen bíblica también puede evocar un lugar apartado.
- source_word: ἐστίν
  english_pob_choice: he is
  chosen_spanish: está
  alternatives_spanish:
  - está allí
  - es
  lexicon: BDAG
  rationale: El griego omite el sujeto explícito. En español, «está» es suficiente cuando el referente se entiende por el contexto y evita sobreespecificar «él» si el texto no lo nombra.
- source_word: μὴ ἐξέλθητε
  english_pob_choice: do not go out
  chosen_spanish: no salgan
  alternatives_spanish:
  - no salgan de allí
  - no salgan afuera
  lexicon: BDAG
  rationale: La prohibición con μή + aoristo subjuntivo se expresa de forma natural con «no salgan». «Salir» reproduce el movimiento de ἐξέρχομαι.
- source_word: ἐν τοῖς ταμείοις
  english_pob_choice: in the inner rooms
  chosen_spanish: en los aposentos interiores
  alternatives_spanish:
  - en los cuartos interiores
  - en las cámaras interiores
  - en los almacenes
  lexicon: BDAG
  rationale: ταμεῖον puede referirse a una habitación interior, privada o reservada. «Aposentos interiores» conserva la idea de espacio interno/privado sin reducirlo a solo «almacenes» ni forzar una lectura exclusivamente secreta.
- source_word: μὴ πιστεύσητε
  english_pob_choice: do not believe it
  chosen_spanish: no lo crean
  alternatives_spanish:
  - no les crean
  - no lo crean
  lexicon: BDAG
  rationale: πιστεύω aquí apunta a creer el informe o la afirmación reportada. En español, «no lo crean» reproduce mejor el objeto implícito de la afirmación que «no les crean», que desplazaría el foco hacia las personas.
theological_decisions:
- issue: Referente implícito de la presencia reclamada
  english_pob_reading: The implied subject is the claimed presence of Jesus/Messiah, rendered simply as 'he is' without adding a title.
  chosen_spanish_reading: La alusión implícita se conserva sin añadir «Jesús» o «Mesías» en la frase principal; el español usa simplemente «está».
  alternative_spanish_readings:
  - está allí
  - el Mesías está allí
  - Jesús está allí
  rationale: El griego no nombra al sujeto en esta cláusula; la traducción debe preservar esa reserva y no resolverla con una explicitación que el texto no exige. El contexto sí orienta la interpretación, pero no autoriza a incorporar un título en el cuerpo del versículo.
  doctrine_reference: Primacía del texto original y preservación de tensiones contextuales sin sobreexplicación doctrinal.
- issue: Valor de ἔρημος en el contexto
  english_pob_reading: '''wilderness'' with an alternative lexical note ''desert''.'
  chosen_spanish_reading: «Desierto» en el texto principal, con la comprensión de lugar apartado o despoblado.
  alternative_spanish_readings:
  - desierto
  - lugar despoblado
  - soledad
  rationale: El audit trail inglés reconoce 'desert' como alternativa léxica legítima. En español, «desierto» es comprensible, bíblicamente reconocible y no exige una imagen arenosa estricta; la nota preserva la amplitud semántica.
  doctrine_reference: Lexicografía contextual bíblica; evitar reducir el campo semántico de ἔρημος.
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión menor sobre la estructura de dos avisos paralelos bajo una sola condición. En español se conservó esa paralelidad con dos advertencias entrecomilladas tras una sola cláusula condicional, sin introducir una conjunción disyuntiva que el griego no tiene.
  spanish_consistency_notes:
  - Se mantuvo «Miren» para ἰδού de forma uniforme en ambas apariciones.
  - Se evitó «SEÑOR» u otros sustitutos teológicos porque el versículo no contiene el nombre divino ni κύριος.
  - «Aposentos interiores» conserva la imagen de espacios privados/internos sin fijar indebidamente una sola acepción de ταμεῖον.
  - La negación «no lo crean» mantiene el referente implícito de la afirmación, no de las personas que la pronuncian.
