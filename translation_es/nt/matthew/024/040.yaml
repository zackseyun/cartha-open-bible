translation:
  language: es
  text: Entonces dos estarán en el campo; uno es tomado[a] y uno es dejado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno es llevado consigo». El verbo en sí mismo no especifica si el tomar es para rescate o para juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que enlaza la escena con el contexto escatológico anterior. «Entonces» es natural y conserva la secuencia sin añadir matiz interpretativo.
- source_word: δύο ἔσονται
  english_pob_choice: two will be
  chosen_spanish: dos estarán
  alternatives_spanish:
  - dos serán
  - dos habrá
  lexicon: BDAG
  rationale: El griego dice literalmente «dos serán/estarán». En español, «estarán» comunica con naturalidad la localización en la escena y mantiene el plural sin introducir género no especificado.
- source_word: ἐν τῷ ἀγρῷ
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo de labor
  - allí en el campo
  lexicon: BDAG
  rationale: «ἀγρός» puede referirse a campo o terreno de labor; «campo» es la equivalencia directa y readable en español. Se evita precisar más de lo que el texto dice.
- source_word: παραλαμβάνεται
  english_pob_choice: is taken
  chosen_spanish: es tomado
  alternatives_spanish:
  - es llevado consigo
  - es tomado consigo
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del verbo, como en la traducción inglesa auditada. «Es tomado» no resuelve si el tomar implica rescate o juicio.
- source_word: ἀφίεται
  english_pob_choice: is left
  chosen_spanish: es dejado
  alternatives_spanish:
  - queda
  - es abandonado
  lexicon: BDAG
  rationale: El pasivo de ἀφίημι se puede traducir de forma simple como «es dejado». «Es abandonado» sería más fuerte de lo que el verbo exige.
theological_decisions:
- issue: Si παραλαμβάνεται debe insinuar rescate o juicio
  english_pob_reading: Retain the neutral rendering 'is taken' in the main text
  chosen_spanish_reading: 'Mantener una formulación neutral: «es tomado»'
  alternative_spanish_readings:
  - es llevado consigo para salvación
  - es llevado para juicio
  rationale: El contexto inmediato admite debate interpretativo. La traducción debe conservar la tensión sin decidirla a favor de un sistema escatológico específico.
  doctrine_reference: Preservar la tensión teológica
- issue: Si debe explicitarse el género en español
  english_pob_reading: Use 'two will be' after revision rather than 'two men will be'
  chosen_spanish_reading: No explicitar género; usar «dos»
  alternative_spanish_readings:
  - dos hombres estarán
  - dos personas estarán
  rationale: El texto griego no añade un sustantivo para «hombres»; sólo dice «dos». El español puede reflejar esa neutralidad sin perder claridad.
  doctrine_reference: Precisión textual sobre especificación inferida
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'men' porque el griego sólo dice 'two'; por eso la versión española también evita especificar género. Se mantuvo la neutralidad semántica de παραλαμβάνεται/ἀφίεται sin añadir interpretaciones escatológicas.
  spanish_consistency_notes:
  - Se usa «campo» para ἀγρός, terminología natural y transparente.
  - Se evita «SEÑOR» u otras convenciones no presentes en el texto.
  - 'La frase verbal breve conserva el paralelismo del griego: uno es tomado y uno es dejado.'
