  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, esclavo, etc. Se mantiene adecuadamente la neutralidad teológica en παραλαμβάνεται. Debe alinearse mejor con el rastro auditado incorporando la alternativa léxica documentada en nota.
