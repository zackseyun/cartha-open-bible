translation:
  language: es
  text: Porque se levantará nación contra nación[a], y reino contra reino, y habrá hambrunas y terremotos en diversos lugares[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alzará contra nación». El giro griego expresa el estallido de hostilidad entre pueblos.
    reason: lexical_alternative
  - marker: b
    text: O «en diferentes lugares» o «de lugar en lugar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθήσεται
  english_pob_choice: will rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - se alzará
  - surgirá
  lexicon: BDAG
  rationale: En este dicho idiomático, el valor es el de levantarse o alzarse en conflicto. «Se levantará» comunica bien la idea de oposición mutua en español sin volver mecánico el pasivo griego.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula conecta explicativamente con el contexto previo. «Porque» mantiene esa relación discursiva de forma natural en español bíblico contemporáneo.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - etnia
  lexicon: BDAG
  rationale: En la pareja paralela con «reino contra reino», «nación» preserva el alcance colectivo y político-social del término sin estrecharlo a una mera etnia.
- source_word: ἐπὶ ἔθνος
  english_pob_choice: against nation
  chosen_spanish: contra nación
  alternatives_spanish:
  - sobre nación
  lexicon: BDAG
  rationale: Con acusativo, ἐπί en este giro expresa hostilidad; «contra» es la equivalencia española natural y mantiene el sentido bélico del enunciado.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  lexicon: BDAG
  rationale: Aquí el paralelismo apunta a entidades políticas. «Reino» conserva la imagen del texto y su registro apocalíptico.
- source_word: ἔσονται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirán
  - ocurrirán
  lexicon: BDAG
  rationale: El uso existencial de εἰμί se expresa con naturalidad en español mediante «habrá», evitando una formulación más pesada.
- source_word: λιμοὶ
  english_pob_choice: famines
  chosen_spanish: hambres
  alternatives_spanish:
  - hambrunas
  - escaseces de alimento
  lexicon: BDAG
  rationale: «Hambres» conserva el plural concreto y el tono sobrio del catálogo profético. «Hambrunas» sería también válido, pero es más interpretativo y menos directo.
- source_word: σεισμοὶ
  english_pob_choice: earthquakes
  chosen_spanish: terremotos
  alternatives_spanish:
  - sismos
  - temblores
  lexicon: BDAG
  rationale: «Terremotos» es claro y plenamente bíblico en español. Mantiene el fenómeno natural específico al que apunta σεισμοί en este contexto.
- source_word: κατὰ τόπους
  english_pob_choice: in various places
  chosen_spanish: en diversos lugares
  alternatives_spanish:
  - en diferentes lugares
  - de lugar en lugar
  lexicon: BDAG
  rationale: La frase distributiva indica pluralidad de localidades; «en diversos lugares» reproduce ese matiz sin sonar idiomáticamente extraña.
theological_decisions:
- issue: Alcance de ἔθνος en una profecía de conflicto
  english_pob_reading: nation
  chosen_spanish_reading: nación
  alternative_spanish_readings:
  - pueblo
  - etnia
  rationale: La construcción paralela con «reino contra reino» sugiere unidades colectivas amplias, no una categoría étnica restringida. «Nación» conserva mejor la amplitud del anuncio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor del futuro pasivo ἐγερθήσεται
  english_pob_reading: will rise against
  chosen_spanish_reading: se levantará contra
  alternative_spanish_readings:
  - será levantada contra
  - surgirá contra
  rationale: El griego describe el estallido de hostilidad; en español conviene expresarlo como acción recíproca sin introducir una causalidad divina explícita que el versículo no formula.
  doctrine_reference: Translation philosophy §3
- issue: Distribución de κατὰ τόπους
  english_pob_reading: in various places
  chosen_spanish_reading: en diversos lugares
  alternative_spanish_readings:
  - en diferentes lugares
  - de lugar en lugar
  rationale: La expresión señala ocurrencia dispersa en múltiples sitios. «En diversos lugares» comunica esa dispersión con naturalidad y sin perder el carácter de lista profética.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego SBLGNT y el audit trail inglés sin cambios sustanciales respecto de la última revisión: la lectura y el sentido general están altamente acordes con el testimonio comparado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Nación», «reino», «hambres» y «terremotos» conservan el registro apocalíptico y el paralelismo del original.
  - Las notas al pie preservan la alternativa de ἐγερθήσεται y la distribución espacial de κατὰ τόπους sin sobreexplicar el texto.
