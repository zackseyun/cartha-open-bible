review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: futuro de oír, advertencia contra la alarma, necesidad de que ocurra y afirmación de que el fin aún no llega. Sin embargo, en dos puntos se aparta del expediente auditado y del mejor valor léxico: (1) ἀκοὰς πολέμων se traduce en el texto principal como «rumores de guerras», mientras que el POB inglés eligió «reports of wars» y reservó «rumors» para nota; en español conviene igualmente usar una forma más amplia en el texto principal. (2) «esto suceda» añade un demostrativo no presente en el griego, cuando la revisión inglesa justamente volvió a «it must happen» para evitar esa explicitación.'
  spanish_quality_summary: El español es claro y digno, pero «oiréis de guerras» suena algo menos natural que «vais a oír de guerras» o «oiréis hablar de guerras». Además, «Mirad que» es comprensible, aunque «Miren/Mirad que» depende del registro; puede mantenerse con una reparación mínima en el resto del versículo. El cambio principal necesario es sustituir «rumores» por «noticias» o «informes» en el texto base y quitar «esto».
  glossary_alignment: 'No hay conflicto con los términos doctrinales principales del proyecto. La cuestión relevante es léxica: ἀκοή debe conservarse con amplitud semántica en el texto principal, dejando «rumores» como alternativa en nota, en línea con el POB inglés. «El fin» preserva correctamente τὸ τέλος.'
  issues:
  - severity: medium
    issue: Texto principal usa «rumores de guerras» para ἀκοὰς πολέμων
    rationale: El expediente inglés adoptó «reports of wars» por ser más amplio y más transparente léxicamente; «rumors» quedó como alternativa en nota. En español, «rumores» estrecha innecesariamente el sentido y debería ir en nota, no en el texto principal.
  - severity: medium
    issue: «esto suceda» añade un elemento no expreso en δεῖ γὰρ γενέσθαι
    rationale: La revisión auditada eliminó la explicitación «these things». En español, «es necesario que suceda» o «debe suceder» refleja mejor el griego sin añadir «esto».
  - severity: low
    issue: La nota al pie repite la misma opción que ya aparece en el texto
    rationale: Si el texto principal dice «rumores de guerras», la nota «O “rumores de guerras”» deja de funcionar como alternativa léxica. La nota solo tiene sentido si el texto principal usa una opción más amplia como «noticias» o «informes».
  revised_spanish_text: Y oiréis de guerras y de noticias de guerras. Mirad que no os alarméis[a], porque es necesario que suceda, pero todavía no es el fin.
