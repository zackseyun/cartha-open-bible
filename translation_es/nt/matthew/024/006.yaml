revisions:
- from: Y oiréis de guerras y de rumores de guerras. Mirad que no os alarméis[a], porque es necesario que esto suceda, pero todavía no es el fin.
  to: Y oiréis de guerras y de noticias de guerras. Mirad que no os alarméis[a], porque es necesario que suceda, pero todavía no es el fin.
  rationale: Se cambia «rumores de guerras» por «noticias de guerras» en el texto principal para reflejar mejor la amplitud de ἀκοὰς πολέμων y alinearse con la decisión auditada del POB inglés, dejando «rumores» como alternativa en nota. También se elimina «esto» de «que esto suceda» para no añadir un elemento no expreso en el griego. Se conserva el resto por ser fiel, claro y teológicamente adecuado.
