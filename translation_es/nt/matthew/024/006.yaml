translation:
  language: es
  text: Y oiréis de guerras y de noticias de guerras. Mirad que no os alarméis[a], porque es necesario que suceda, pero todavía no es el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rumores de guerras». El griego puede denotar informes, noticias o rumores.
    reason: lexical_alternative
lexical_decisions:
- source_word: μελλήσετε
  english_pob_choice: you are going to
  chosen_spanish: oiréis
  alternatives_spanish:
  - vais a oír
  - escucharéis
  lexicon: BDAG
  rationale: El griego con μέλλω + infinitivo expresa un futuro prospectivo o inminente. En español, «oiréis» mantiene la referencia futura de manera natural y sobria; «vais a oír» sería más explícito pero menos solemne.
- source_word: ἀκούειν
  english_pob_choice: hear of
  chosen_spanish: oír
  alternatives_spanish:
  - oír de
  - enteraros de
  lexicon: BDAG
  rationale: Aquí el objeto son guerras y sus noticias, por lo que el sentido es recibir información. En español, «oiréis de» suena forzado; el contexto ya hace claro que se trata de noticias o informes.
- source_word: πολέμους
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - conflictos
  - batallas
  lexicon: BDAG
  rationale: πόλεμος designa guerra en sentido normal. «Guerras» es la correspondencia directa y más precisa.
- source_word: ἀκοὰς πολέμων
  english_pob_choice: reports of wars
  chosen_spanish: rumores de guerras
  alternatives_spanish:
  - informes de guerras
  - noticias de guerras
  lexicon: BDAG
  rationale: ἀκοή puede significar noticia, informe, rumor o lo oído. Se eligió «rumores» porque reproduce bien la amplitud semántica y conserva la opción tradicional, sin afirmar necesariamente falsedad.
- source_word: ὁρᾶτε
  english_pob_choice: See that
  chosen_spanish: Mirad que
  alternatives_spanish:
  - Ved que
  - Tened cuidado de
  lexicon: BDAG
  rationale: 'El imperativo funciona como advertencia: «Mirad que» comunica bien la exhortación a asegurarse de algo antes que un mero acto de visión.'
- source_word: μὴ θροεῖσθε
  english_pob_choice: you are not alarmed
  chosen_spanish: no os alarméis
  alternatives_spanish:
  - no os turbéis
  - no tengáis miedo
  - no os inquietéis
  lexicon: BDAG
  rationale: θροέομαι denota agitación, alarma o turbación. «No os alarméis» preserva esa fuerza sin exagerarla hacia «terror» o «pánico».
- source_word: δεῖ
  english_pob_choice: it must happen
  chosen_spanish: es necesario
  alternatives_spanish:
  - debe suceder
  - tiene que ocurrir
  lexicon: BDAG
  rationale: δεῖ expresa necesidad impersonal. En español, «es necesario» conserva la fuerza de necesidad sin añadir un sujeto explícito que el griego no da aquí.
- source_word: γενέσθαι
  english_pob_choice: to happen
  chosen_spanish: que esto suceda
  alternatives_spanish:
  - que ocurra
  - que tenga lugar
  lexicon: BDAG
  rationale: γίνομαι en este infinitivo aoristo apunta a acontecer o llegar a suceder. «Suceda» es natural y mantiene el valor de evento.
- source_word: τὸ τέλος
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - el final
  - la consumación
  lexicon: BDAG
  rationale: τὸ τέλος se deja amplio, como en el inglés POB, para no fijar una cronología escatológica específica. «El fin» es la forma más directa y sobria en español.
theological_decisions:
- issue: Alcance escatológico de τὸ τέλος
  english_pob_reading: the end
  chosen_spanish_reading: el fin
  alternative_spanish_readings:
  - la consumación
  - el fin definitivo
  rationale: Se conserva la indeterminación del griego y del POB inglés. No se introduce una lectura doctrinal más específica sobre la secuencia final de los eventos.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
- issue: Fuerza de μὴ θροεῖσθε en contexto apocalíptico
  english_pob_reading: do not be alarmed
  chosen_spanish_reading: no os alarméis
  alternative_spanish_readings:
  - no os turbéis
  - no tengáis miedo
  rationale: El mandato busca evitar la reacción de pánico ante noticias de guerra. «No os alarméis» comunica adecuadamente la admonición sin convertirla en una promesa de ausencia de sufrimiento.
  doctrine_reference: Exhortación pastoral, no negación de la tribulación.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al mantener la expresión singular de necesidad («es necesario») y evitar una ampliación innecesaria como «estas cosas». También se conservó la amplitud de τὸ τέλος como «el fin», sin especificarlo doctrinalmente.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico natural y publicable en español, con imperativos plurales de trato directo.
  - Se evitó el calco excesivo de «oír de» porque en español resultaría menos idiomático; el contexto ya aporta el matiz de noticias.
  - Se preservó la nota alternativa sobre ἀκοή porque el español «rumores» puede sugerir falsedad; la nota aclara que el griego es más amplio.
