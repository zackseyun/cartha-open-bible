review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura comparativa del griego y mantiene correctamente «venida» para παρουσία con nota alternativa «presencia». También conserva bien «Hijo del Hombre». Sin embargo, «Porque, así como» suena algo forzado en español en inicio de versículo, y «el relámpago sale del oriente» resulta menos natural que una formulación con «aparece» o «sale desde el oriente».
  spanish_quality_summary: El español es claro y comprensible, pero puede pulirse para mayor naturalidad y dignidad eclesial. La principal mejora es quitar la pausa tras «Porque» y usar una formulación más fluida para el fenómeno del relámpago. El resto del versículo es sólido y legible.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Venida» para παρουσία sigue la decisión auditada, con «presencia» preservado en nota. «Hijo del Hombre» está bien mantenido como título tradicional y transparente.
  issues:
  - severity: medium
    issue: Inicio con «Porque, así como»
    rationale: Aunque intenta reflejar γάρ + ὥσπερ, en español suena trabado e innecesariamente pesado al comienzo del versículo. «Porque así como» o simplemente «Porque, tal como» serían mejores, pero la opción más natural aquí es conservar «Porque así como» sin coma.
  - severity: medium
    issue: «el relámpago sale del oriente» suena poco idiomático
    rationale: El griego ἐξέρχεται admite una imagen de procedencia, pero en español con «relámpago» la construcción «sale del oriente» es menos natural. «aparece en el oriente» mejora la fluidez, aunque desplaza levemente el matiz de procedencia; «sale desde el oriente» conserva mejor ese matiz y suena más natural que la redacción actual.
  revised_spanish_text: Porque así como el relámpago sale desde el oriente y se ve hasta el occidente, así será la venida[a] del Hijo del Hombre.
  revised_footnotes:
  - marker: a
    text: 'O «presencia»: el término griego παρουσία puede significar «presencia» o «llegada», pero aquí, por el contexto, se refiere a la venida futura del Hijo del Hombre.'
    reason: lexical_alternative
