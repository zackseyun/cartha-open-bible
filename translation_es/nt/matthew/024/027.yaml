translation:
  language: es
  text: Porque así como el relámpago sale desde el oriente y se ve hasta el occidente, así será la venida[a] del Hijo del Hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «presencia»: el término griego παρουσία puede significar «presencia» o «llegada», pero aquí, por el contexto, se refiere a la venida futura del Hijo del Hombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Porque, tal como
  - Así como
  lexicon: BDAG
  rationale: γάρ aporta conexión explicativa y ὥσπερ introduce la comparación. En español, «Porque, así como» conserva ambos valores de manera natural sin volver la frase pesada.
- source_word: ἀστραπὴ
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - rayo
  - chispa de relámpago
  lexicon: BDAG
  rationale: El referente es el fenómeno luminoso y fulgurante visible en el cielo. «Relámpago» es la equivalencia más natural en español para este contexto comparativo.
- source_word: ἐξέρχεται
  english_pob_choice: comes
  chosen_spanish: sale
  alternatives_spanish:
  - sale de
  - sale hacia
  - aparece
  lexicon: BDAG
  rationale: Literalmente significa «sale/va afuera». En español, «sale del oriente» conserva la imagen de procedencia y evita una paráfrasis demasiado libre.
- source_word: ἀπὸ ἀνατολῶν
  english_pob_choice: from the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - del este
  - desde el oriente
  lexicon: BDAG
  rationale: ἀνατολή se relaciona con el lugar del amanecer, y el par con δυσμῶν forma una oposición oriente-occidente. «Oriente» mantiene esa correspondencia y es un equivalente claro en español bíblico moderno.
- source_word: φαίνεται
  english_pob_choice: is seen
  chosen_spanish: se ve
  alternatives_spanish:
  - es visto
  - aparece
  lexicon: BDAG
  rationale: La forma media/pasiva describe la visibilidad del relámpago. «Se ve» expresa de manera natural que el fenómeno llega a ser visible a gran distancia.
- source_word: ἕως δυσμῶν
  english_pob_choice: as far as the west
  chosen_spanish: hasta el occidente
  alternatives_spanish:
  - hasta el oeste
  - hasta el poniente
  lexicon: BDAG
  rationale: ἕως marca extensión hasta un límite, y δυσμή refiere al oeste/puesta del sol. «Hasta el occidente» conserva el contraste direccional completo con «oriente».
- source_word: οὕτως ἔσται
  english_pob_choice: so will ... be
  chosen_spanish: así será
  alternatives_spanish:
  - de esta manera será
  - así ocurrirá
  lexicon: BDAG
  rationale: La construcción introduce la apódosis comparativa. «Así será» preserva la sencillez y la fuerza futura del verbo sin añadir elementos ajenos.
- source_word: παρουσία
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En este contexto escatológico, παρουσία apunta a la futura venida del Hijo del Hombre. «Venida» comunica bien el sentido eventivo en español, mientras que «presencia» queda como alternativa lexical válida pero menos explícita en esta escena.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: del Hijo del Hombre
  alternatives_spanish:
  - del Hijo del hombre
  - del Hijo humano
  lexicon: BDAG
  rationale: Se mantiene el título tradicional y transparente del original, con mayúsculas por tratarse de una designación titular. «Hijo del Hombre» conserva la resonancia bíblica e intertextual del griego.
theological_decisions:
- issue: Sentido de παρουσία en un dicho escatológico
  english_pob_reading: coming
  chosen_spanish_reading: venida
  alternative_spanish_readings:
  - presencia
  - llegada
  rationale: El contraste con el relámpago subraya una manifestación pública e inconfundible de la παρουσία del Hijo del Hombre. «Venida» comunica mejor ese evento futuro en español, sin cerrar indebidamente la amplitud léxica del término, que puede también significar «presencia» o «llegada».
  doctrine_reference: Translation philosophy §3; Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto griego y el auditable inglés coinciden en el marco comparativo y en el valor escatológico de παρουσία; no se detectan revisiones posteriores que exijan ajustar el sentido principal. La traducción española conserva la tensión léxica de παρουσία mediante una nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «oriente/occidente» para mantener el paralelismo direccional clásico y claro en español.
  - Se evita «Cristo» porque el griego aquí usa el título «Hijo del Hombre», no el mesianato nominal.
  - Se prefiere «venida» sobre «presencia» en el texto principal, reservando esta última como alternativa lexical en nota.
