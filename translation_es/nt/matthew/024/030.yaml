revisions:
- from: Entonces aparecerá la señal del Hijo del Hombre en el cielo[a], y entonces se lamentarán[b] todas las tribus de la tierra[c], y verán al Hijo del Hombre viniendo sobre las nubes del cielo con poder y gran gloria.
  to: Entonces aparecerá la señal del Hijo del Hombre en el cielo[a], y entonces se lamentarán[b] todas las tribus de la tierra[c], y verán al Hijo del Hombre viniendo sobre las nubes del cielo[d] con poder y gran gloria.
  rationale: 'Se conserva el texto principal casi intacto porque es fiel y natural, pero se corrige el aparato de notas para alinearlo mejor con el expediente inglés: se simplifica la alternativa de οὐρανός, se mantiene la alternativa de duelo, se depura la nota sobre γῆ y se añade la nota intertextual a Daniel 7:13 con su marcador en el texto.'
  reviewer_model: gpt-5.4
