review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido principal del griego: aparición de la señal, lamento de todas las tribus, visión del Hijo del Hombre viniendo sobre las nubes con poder y gran gloria. También preserva correctamente la ambigüedad de «la señal del Hijo del Hombre» y el valor principal de γῆ como «tierra». Sin embargo, no conserva una nota importante del POB inglés sobre la alusión a Daniel 7:13, y la nota sobre οὐρανός introduce alternativas más interpretativas («firmamento», «cielo visible») en lugar de la alternativa documentada más simple «cielo»/«cielo visible» = «sky».'
  spanish_quality_summary: 'El texto principal es natural, digno y bien legible en español. «Se lamentarán» funciona bien, aunque «harán duelo» también sería posible. La redacción de las notas necesita ajuste para mayor precisión y economía: algunas formulaciones son redundantes o demasiado explicativas, y falta la nota intertextual. Conviene mantener notas más cercanas al expediente inglés y evitar ampliar indebidamente el campo semántico.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hijo del Hombre», «tierra», «cielo», «poder» y «gloria» están bien. La principal corrección es de aparato de notas, no de glosario principal.
  issues:
  - severity: medium
    issue: Falta la nota de referencia cruzada a Daniel 7:13
    rationale: El POB inglés preserva explícitamente la alusión de «coming on the clouds of heaven» a Daniel 7:13. Esa razón literaria y teológica debe conservarse en español.
  - severity: medium
    issue: La nota [a] sobre οὐρανός se aparta del expediente auditado
    rationale: El inglés documenta la alternativa simple «in the sky». La versión española introduce «firmamento» y «cielo visible», que son más interpretativos y menos directos; además, «cielo/firmamento» en una misma glosa es poco natural.
  - severity: low
    issue: La nota [c] usa «país» donde el expediente inglés usa «land»
    rationale: «País» no es imposible, pero «tierra» o «la tierra»/«el país» puede sonar más político-moderno. «La tierra» / «la tierra (o la tierra/territorio)» sería más cercano, pero en español bíblico «de la tierra» con nota «o de la tierra» no ayuda; lo mejor es «o “de la tierra” en sentido de “del país/de la región”» o, más sencillamente, «o “de la tierra/territorio”». Dado que se busca un ajuste pequeño, puede mantenerse «del país» como alternativa aclaratoria, pero conviene pulir la formulación.
  revised_spanish_text: Entonces aparecerá la señal del Hijo del Hombre en el cielo[a], y entonces se lamentarán[b] todas las tribus de la tierra[c], y verán al Hijo del Hombre viniendo sobre las nubes del cielo[d] con poder y gran gloria.
  revised_footnotes:
  - marker: a
    text: O «en el cielo visible». El griego οὐρανός puede significar «cielo» o «cielo visible», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «harán duelo». El verbo griego κόπτω en este dicho tiene el sentido de lamentarse o guardar luto.
    reason: lexical_alternative
  - marker: c
    text: O «del país». El griego γῆ puede significar «tierra» o «país».
    reason: alternative_reading
  - marker: d
    text: La frase «viniendo sobre las nubes del cielo» evoca Daniel 7:13.
    reason: cross_reference
  revision_rationale: 'Se conserva el texto principal casi intacto porque es fiel y natural, pero se corrige el aparato de notas para alinearlo mejor con el expediente inglés: se simplifica la alternativa de οὐρανός, se mantiene la alternativa de duelo, se depura la nota sobre γῆ y se añade la nota intertextual a Daniel 7:13 con su marcador en el texto.'
