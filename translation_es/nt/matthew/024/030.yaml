translation:
  language: es
  text: Entonces aparecerá la señal del Hijo del Hombre en el cielo[a], y entonces se lamentarán[b] todas las tribus de la tierra[c], y verán al Hijo del Hombre viniendo sobre las nubes del cielo[d] con poder y gran gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el cielo visible». El griego οὐρανός puede significar «cielo» o «cielo visible», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «harán duelo». El verbo griego κόπτω en este dicho tiene el sentido de lamentarse o guardar luto.
    reason: lexical_alternative
  - marker: c
    text: O «del país». El griego γῆ puede significar «tierra» o «país».
    reason: alternative_reading
  - marker: d
    text: La frase «viniendo sobre las nubes del cielo» evoca Daniel 7:13.
    reason: cross_reference
lexical_decisions:
- source_word: φανήσεται
  english_pob_choice: will appear
  chosen_spanish: aparecerá
  alternatives_spanish:
  - será visto
  - se hará visible
  lexicon: BDAG
  rationale: El futuro pasivo/medio de φαίνω se entiende aquí como manifestación visible. «Aparecerá» conserva la idea de presencia perceptible con español natural y digno.
- source_word: τὸ σημεῖον
  english_pob_choice: sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el signo
  - el portento
  lexicon: BDAG
  rationale: «Señal» es transparente en español y comunica bien el valor básico de σημεῖον sin cargarlo innecesariamente con matiz ominoso que «portento» podría sugerir.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: of the Son of Man
  chosen_spanish: del Hijo del Hombre
  alternatives_spanish:
  - perteneciente al Hijo del Hombre
  - la señal que es el Hijo del Hombre
  lexicon: BDAG
  rationale: 'Se conserva la construcción genitiva con el título tradicional «Hijo del Hombre» para mantener la ambigüedad del griego: puede ser una señal asociada con él o, menos probablemente, él mismo como señal.'
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo[a]
  alternatives_spanish:
  - en el cielo
  - en el cielo/firmamento
  lexicon: BDAG
  rationale: «Cielo» funciona de modo natural en español y puede abarcar tanto el sentido de «cielo» como el de «cielo/firmamento». La nota preserva la alternativa espacial «en el cielo / en el cielo (como cielo visible)» que en inglés se expresó como «in the sky».
- source_word: κόψονται
  english_pob_choice: will mourn
  chosen_spanish: se lamentarán
  alternatives_spanish:
  - harán duelo
  - se dolerán
  lexicon: BDAG
  rationale: El valor idiomático de κόπτω aquí es lamento/mourn. «Se lamentarán» comunica el duelo sin imponer una imagen corporal específica; se mantiene el tono apocalíptico y colectivo.
- source_word: φυλαὶ
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - pueblos
  - clanes
  lexicon: BDAG
  rationale: «Tribus» reproduce con mayor precisión la forma léxica φυλή y conserva el eco bíblico de lenguaje profético/apocalíptico.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra[c]
  alternatives_spanish:
  - de la tierra/país
  - de la tierra (o del país)
  lexicon: BDAG
  rationale: En este contexto cósmico, «tierra» es la lectura principal adecuada para γῆ. Se conserva en nota la posibilidad de «tierra/país» o «tierra/land» para no borrar la tensión interpretativa documentada.
- source_word: ὄψονται
  english_pob_choice: they will see
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - verán con sus ojos
  lexicon: BDAG
  rationale: La forma simple de ὁράω se traduce con el futuro directo «verán», claro y fiel.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - que viene
  - al venir
  lexicon: BDAG
  rationale: El participio durativo se expresa de manera natural con «viniendo», que mantiene el movimiento del original y encaja en la frase apocalíptica.
- source_word: ἐπὶ τῶν νεφελῶν τοῦ οὐρανοῦ
  english_pob_choice: on the clouds of heaven
  chosen_spanish: sobre las nubes del cielo
  alternatives_spanish:
  - sobre las nubes del cielo
  - en las nubes del cielo
  - con las nubes del cielo
  lexicon: BDAG
  rationale: «Sobre las nubes del cielo» es la correspondencia más directa y mantiene el eco de Daniel 7:13. Se evita suavizar el sentido preposicional del griego.
- source_word: μετὰ δυνάμεως καὶ δόξης πολλῆς
  english_pob_choice: with power and great glory
  chosen_spanish: con poder y gran gloria
  alternatives_spanish:
  - con gran poder y gloria
  - con poder y mucha gloria
  lexicon: BDAG
  rationale: La estructura española más natural es «con poder y gran gloria». Conserva la intensificación de δόξης πολλῆς sin sonar torpe.
theological_decisions:
- issue: Ambigüedad de «la señal del Hijo del Hombre»
  english_pob_reading: Retained the genitival ambiguity with 'the sign of the Son of Man' rather than specifying whether the sign belongs to him or is him.
  chosen_spanish_reading: Se mantiene «la señal del Hijo del Hombre» sin precisar si la señal le pertenece o si él mismo es la señal.
  alternative_spanish_readings:
  - la señal perteneciente al Hijo del Hombre
  - la señal, es decir, el mismo Hijo del Hombre
  rationale: El griego no obliga a una sola interpretación. La redacción española preserva la tensión exegética en lugar de resolverla artificialmente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Alcance de γῆ en «todas las tribus de la tierra»
  english_pob_reading: Rendered γῆ as 'earth' in the main text.
  chosen_spanish_reading: Se traduce γῆ como «tierra» en el texto principal.
  alternative_spanish_readings:
  - país
  - tierra/país
  rationale: El contexto es apocalíptico y de alcance universal, por lo que «tierra» es la opción principal. Sin embargo, se preserva la posibilidad de una referencia más localizada o terrenal mediante la nota.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Referencia a Daniel 7:13 en «las nubes del cielo»
  english_pob_reading: The phrase 'coming on the clouds of heaven' echoes Daniel 7:13.
  chosen_spanish_reading: Se deja visible el eco de Daniel 7:13 mediante la expresión «sobre las nubes del cielo».
  alternative_spanish_readings:
  - viniendo con las nubes del cielo
  - viniendo en las nubes del cielo
  rationale: La traducción preserva la formulación alusiva para que el lector perciba la intertextualidad sin depender de una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios y que el acuerdo con el control cruzado era alto. La redacción española sigue esa línea: conserva las ambigüedades documentadas, mantiene el eco de Daniel 7:13 y evita resolver interpretaciones debatidas que el griego no obliga a fijar.'
  spanish_consistency_notes:
  - Se usa «Hijo del Hombre» de forma consistente para υἱὸς τοῦ ἀνθρώπου.
  - Se prefiere «Yahvé» solo para el tetragrámaton; no aplica en este versículo.
  - Se mantiene «cielo» para οὐρανός en el texto principal, con nota para la alternativa espacial.
  - Se mantiene «tierra» para γῆ en el texto principal, con nota sobre su posible matiz de «país».
  - «Se lamentarán»/«se lamentarán» refleja el valor idiomático de κόψονται sin concretar el gesto corporal.
