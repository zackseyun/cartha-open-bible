translation:
  language: es
  text: 'Mientras él estaba sentado en el Monte de los Olivos, los discípulos se acercaron a él en privado y le dijeron: «Dinos, ¿cuándo sucederán estas cosas y cuál será la señal de tu venida[a] y del fin de la era[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tu presencia’ o ‘tu llegada’ para ‘tu venida’.
    reason: lexical_alternative
  - marker: b
    text: O ‘la consumación de la era’; tradicionalmente, ‘el fin del mundo’.
    reason: alternative_reading
lexical_decisions:
- source_word: Καθημένου
  english_pob_choice: as he was sitting
  chosen_spanish: Mientras él estaba sentado
  alternatives_spanish:
  - así como estaba sentado
  - cuando estaba sentado
  - mientras se sentaba
  lexicon: BDAG
  rationale: El participio en genitivo absoluto funciona como marco temporal circunstancial. «Mientras él estaba sentado» conserva la acción en curso sin sonar forzado en español.
- source_word: Ὄρους τῶν Ἐλαιῶν
  english_pob_choice: the Mount of Olives
  chosen_spanish: el Monte de los Olivos
  alternatives_spanish:
  - el monte de olivos
  - la colina de los olivos
  lexicon: BDAG
  rationale: Es el nombre geográfico establecido. En español, la forma idiomática y reconocible es «Monte de los Olivos», sin perder el contenido literal del griego.
- source_word: προσῆλθον αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se aproximaron a él
  lexicon: BDAG
  rationale: El verbo implica movimiento hacia Jesús; «se acercaron a él» es natural en español y refleja bien la escena narrativa.
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - aparte
  - a solas
  - privadamente
  lexicon: BDAG
  rationale: La expresión indica separación de los demás. «En privado» comunica la idea con claridad y mantiene el matiz relacional de confidencialidad.
- source_word: Εἰπὸν ἡμῖν
  english_pob_choice: Tell us
  chosen_spanish: Dinos
  alternatives_spanish:
  - Háblanos
  - Díganos
  lexicon: BDAG
  rationale: El imperativo aoristo de λέγω aquí es una petición directa. «Dinos» es la forma natural en español para reproducir esa súplica breve.
- source_word: πότε ταῦτα ἔσται
  english_pob_choice: when will these things be
  chosen_spanish: ¿cuándo sucederán estas cosas?
  alternatives_spanish:
  - ¿cuándo serán estas cosas?
  - ¿cuándo tendrán lugar estas cosas?
  lexicon: BDAG
  rationale: «Suced­erán» expresa futuridad concreta y evita una literalidad extraña con «serán». Se mantiene el demostrativo «estas cosas» como en el griego.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - marca
  - indicio
  lexicon: BDAG
  rationale: En español bíblico, «señal» comunica bien un indicio observable con valor profético. Es natural y consistente con el contexto escatológico.
- source_word: παρουσίας
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: «Venida» conserva el valor de llegada futura y es una forma bíblica comprensible en español. Aunque «presencia» es una alternativa lexical posible, aquí «venida» mantiene mejor la expectativa escatológica.
- source_word: συντελείας
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - consumación
  - terminación
  - cierre
  lexicon: BDAG
  rationale: «Fin» es la equivalencia más natural y directa en este contexto. Preserva la fuerza de culminación sin sobrecargar el texto.
- source_word: αἰῶνος
  english_pob_choice: age
  chosen_spanish: la era
  alternatives_spanish:
  - el siglo
  - el mundo
  lexicon: BDAG
  rationale: «Era» traduce bien αἰών como período de tiempo o orden histórico, evitando el sentido más fuerte de «mundo». Mantiene la distinción que el inglés POB preserva con «age».
theological_decisions:
- issue: παρουσία en discurso escatológico
  english_pob_reading: coming
  chosen_spanish_reading: venida
  alternative_spanish_readings:
  - presencia
  - llegada
  rationale: El contexto de Mateo 24 es una pregunta futura sobre la manifestación de Jesús. «Venida» conserva la tensión escatológica sin resolverla en un concepto más estático como «presencia».
  doctrine_reference: Preservar la tensión teológica sin cerrarla prematuramente
- issue: συντέλεια τοῦ αἰῶνος
  english_pob_reading: the end of the age
  chosen_spanish_reading: el fin de la era
  alternative_spanish_readings:
  - la consumación de la era
  - el fin del mundo
  rationale: El griego habla del término de una era, no de modo explícito de la aniquilación del mundo material. «Fin de la era» mantiene la precisión del original y evita importar una interpretación más amplia.
  doctrine_reference: Primacía del original sobre la tradición de traducción
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje se mantiene en alto acuerdo con el auditor y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo el nombre geográfico «Monte de los Olivos» como forma natural y transparente.
  - Se usó «señal» para σημεῖον y «venida» para παρουσία, coherentes con el registro escatológico del pasaje.
  - «Era» preserva el valor de αἰών como período, evitando el más interpretativo «mundo».
  - La puntuación reproduce la estructura interrogativa doble del griego y la cita directa de los discípulos.
