translation:
  language: es
  text: ¿Quién, entonces, es el esclavo[a] fiel y prudente, a quien el amo[b] ha nombrado encargado de su servidumbre para darles su comida a su tiempo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo». El griego puede significar «esclavo» o «siervo» según el contexto; aquí «esclavo» conserva con más fuerza la relación de autoridad implícita.
    reason: lexical_alternative
  - marker: b
    text: O «señor». En esta imagen doméstica, la palabra griega se vierte como «amo» para ajustarse al escenario de la parábola.
    reason: alternative_reading
lexical_decisions:
- source_word: Τίς ἄρα
  english_pob_choice: Who then
  chosen_spanish: ¿Quién, entonces…?
  alternatives_spanish:
  - ¿Quién, pues…?
  - ¿Quién, por tanto…?
  lexicon: BDAG
  rationale: La pregunta interrogativa con ἄρα conserva una fuerza inferencial o de conclusión. «Entonces» mantiene bien ese matiz en español actual sin volver la frase artificial.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - confiable
  lexicon: BDAG
  rationale: «Fiel» es el equivalente más natural y reverente en español para la confiabilidad moral y práctica que describe πιστός en este contexto.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo[a]
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: POB opta por la fuerza lexical de δοῦλος. «Esclavo» conserva la relación de dependencia bajo autoridad; se deja la alternativa en nota porque «siervo» es una expectativa común en contextos bíblicos en español, pero suaviza el término.
- source_word: φρόνιμος
  english_pob_choice: wise
  chosen_spanish: prudente
  alternatives_spanish:
  - sabio
  - sensato
  lexicon: BDAG
  rationale: En esta parábola, φρόνιμος tiene un sentido de juicio práctico y previsión. «Prudente» expresa mejor esa habilidad para actuar con discernimiento que «sabio», que en español puede sonar más general o más intelectual.
- source_word: κατέστησεν
  english_pob_choice: has appointed
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha nombrado
  - ha establecido
  lexicon: BDAG
  rationale: El verbo indica colocación en una posición de responsabilidad. «Ha puesto sobre» funciona bien con la imagen doméstica y conserva la idea de asignación/encargo. «Nombrado» sería posible, pero menos pictórico.
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: amo[b]
  alternatives_spanish:
  - señor
  - dueño
  lexicon: BDAG
  rationale: En una escena de casa y administración, κύριος remite al dueño/amo de la casa. «Amo» refleja la relación de autoridad del relato; se preserva la alternativa contextual equivalente en nota para lectores que esperan «señor».
- source_word: οἰκετείας
  english_pob_choice: household
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - familia
  lexicon: BDAG
  rationale: οἰκετεία apunta al conjunto doméstico bajo una casa; en español, «casa» mantiene la imagen concreta y es natural en la parábola. «Hogar» puede sonar más afectivo de lo que pide el contexto.
- source_word: τοῦ δοῦναι
  english_pob_choice: to give
  chosen_spanish: para dar
  alternatives_spanish:
  - para entregar
  - con el fin de dar
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito. «Para dar» es la forma más fluida y fiel en español.
- source_word: τροφὴν
  english_pob_choice: their food
  chosen_spanish: su comida
  alternatives_spanish:
  - su alimento
  - sus raciones
  lexicon: BDAG
  rationale: τροφὴν es alimento/comida. «Su comida» suena natural y suficiente en español; «raciones» añadiría especificidad no requerida por el griego.
- source_word: ἐν καιρῷ
  english_pob_choice: at the proper time
  chosen_spanish: a su tiempo
  alternatives_spanish:
  - en el tiempo debido
  - a tiempo
  lexicon: BDAG
  rationale: καιρός señala el momento oportuno o debido. «A su tiempo» conserva la idea de oportunidad y resulta idiomático en español bíblico moderno.
theological_decisions:
- issue: Rendering of κύριος in a household parable
  english_pob_reading: master
  chosen_spanish_reading: amo
  alternative_spanish_readings:
  - señor
  - dueño
  rationale: La escena es doméstica y parabólica; «amo» preserva la metáfora social sin introducir un título más solemne que pudiera oscurecer el sentido inmediato. La posible referencia más amplia al Señor queda en el nivel del relato, no en una decisión de superficie léxica.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος default ''Lord''; context-sensitive variance must be documented)'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje permanece estable según el último paso de revisión, con alta concordancia entre auditoría y texto de base.
  spanish_consistency_notes:
  - Se mantuvo «esclavo» para δοῦλος conforme a la política léxica de POB y se ofreció «siervo» como alternativa en nota.
  - Se tradujo κύριος como «amo» por el contexto doméstico de la parábola, preservando la tensión documentada entre la lectura doméstica y la titulación más solemne.
  - Se eligió «prudente» para φρόνιμος por su valor de discernimiento práctico en vez de «sabio», que en español puede sonar más abstracto.
  - «A su tiempo» conserva el valor de καιρός como momento oportuno o debido, sin reducirlo a mera cronología.
