    rationale: En la explicación aparece «esjatológico» en lugar de «escatológico». No afecta el texto bíblico, pero conviene corregirlo en revisión editorial.
  revised_spanish_text: Pues entonces habrá una gran tribulación[a], como no la ha habido desde el comienzo del mundo hasta ahora, ni nunca la habrá.
