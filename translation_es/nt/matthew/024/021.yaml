translation:
  language: es
  text: Pues entonces habrá una gran tribulación[a], como no la ha habido desde el comienzo del mundo hasta ahora, ni nunca la habrá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gran angustia» o «gran aflicción». El término griego puede denotar graves dificultades, presión u opresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψις μεγάλη
  english_pob_choice: great tribulation
  chosen_spanish: gran tribulación
  alternatives_spanish:
  - gran angustia
  - gran aflicción
  lexicon: BDAG
  rationale: θλῖψις puede denotar presión, opresión, angustia o aflicción. En español, «tribulación» conserva el peso esjatológico y el registro bíblico tradicional sin perder inteligibilidad. «Gran» reproduce μεγάλη de forma directa.
- source_word: οἵα
  english_pob_choice: such as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - de la clase que
  lexicon: BDAG
  rationale: El pronombre cualitativo introduce una comparación de intensidad y singularidad. «Como» en español transmite esa relación comparativa con naturalidad.
- source_word: γέγονεν
  english_pob_choice: has not been
  chosen_spanish: ha habido
  alternatives_spanish:
  - ha ocurrido
  - se ha producido
  lexicon: BDAG
  rationale: El perfecto de γίνομαι aquí apunta a algo que ha llegado a existir o a acontecer hasta el presente. En español, «ha habido» suena más natural que una construcción más rígida y mantiene la referencia a la existencia/ocurrencia de la tribulación.
- source_word: ἀπ’ ἀρχῆς κόσμου
  english_pob_choice: from the beginning of the world
  chosen_spanish: desde el comienzo del mundo
  alternatives_spanish:
  - desde el principio del mundo
  - desde el comienzo de la creación
  lexicon: BDAG
  rationale: «Comienzo del mundo» reproduce con claridad la expresión temporal idiomática y conserva el valor de κόσμος como «mundo». «Creación» sería una expansión contextual posible, pero no está explícita en el griego.
- source_word: ἕως τοῦ νῦν
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta el presente
  lexicon: BDAG
  rationale: La frase temporal es directa; «hasta ahora» es la opción más natural y precisa en español.
- source_word: οὐδ’ οὐ μὴ γένηται
  english_pob_choice: never will be
  chosen_spanish: ni nunca la habrá
  alternatives_spanish:
  - y nunca ocurrirá
  - ni jamás habrá otra
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con el subjuntivo expresa una negación futura intensificada. «Ni nunca la habrá» refleja esa contundencia sin añadir «de nuevo» ni especificar «ocurrirá», y mantiene la referencia implícita a la tribulación femenina en español.
- source_word: ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirá
  - será
  lexicon: BDAG
  rationale: Con θλῖψις como sujeto, en español es natural usar «habrá» para expresar la existencia futura de esa tribulación.
- source_word: γὰρ τότε
  english_pob_choice: For then
  chosen_spanish: Porque entonces
  alternatives_spanish:
  - Pues entonces
  - Ya que entonces
  lexicon: BDAG
  rationale: γάρ aporta una conexión explicativa con el contexto inmediato, y τότε señala el tiempo. «Porque entonces» conserva ambas funciones en forma concisa.
theological_decisions:
- issue: Rendering of eschatologically charged θλῖψις
  english_pob_reading: tribulation
  chosen_spanish_reading: tribulación
  alternative_spanish_readings:
  - angustia
  - aflicción
  rationale: La escena pertenece al discurso escatológico de Jesús. «Tribulación» preserva el peso del término y su resonancia bíblica sin imponer una interpretación doctrinal adicional. «Angustia» o «aflicción» son posibles, pero atenúan la carga técnica/tradicional que el POB quiso mantener.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolving it'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del POB en inglés: conserva el valor perfecto de γέγονεν con una forma española natural («ha habido») y refleja la negación enfática final de οὐ μὴ γένηται sin añadir una glosa interpretativa como «otra vez».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «tribulación» de manera coherente con la terminología esjatológica del POB y se explica la alternativa léxica en nota.
  - La forma femenina del referente implícito en español («la habrá») ayuda a conservar la concordancia con «tribulación» sin alterar el contenido del griego.
