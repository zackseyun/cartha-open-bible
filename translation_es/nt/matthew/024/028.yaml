translation:
  language: es
  text: Dondequiera que esté el cadáver[a], allí se juntarán los buitres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «águilas». La palabra griega puede referirse a águilas, pero «buitres» encaja mejor con la imagen de aves reuniéndose alrededor de un cadáver.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἐὰν ᾖ
  english_pob_choice: Wherever ... is
  chosen_spanish: Dondequiera que esté
  alternatives_spanish:
  - Donde esté
  - Dondequiera que pueda estar
  lexicon: BDAG
  rationale: La combinación expresa una localización indefinida. «Dondequiera que esté» conserva bien esa fuerza general e idiomática en español, sin sobrecargar el sentido con posibilidad hipotética que el griego no exige explícitamente.
- source_word: πτῶμα
  english_pob_choice: corpse
  chosen_spanish: cadáver
  alternatives_spanish:
  - cuerpo muerto
  - carcasa
  - cuerpo
  lexicon: BDAG
  rationale: πτῶμα designa un cuerpo caído, especialmente un cadáver. «Cadáver» es preciso, natural en español contemporáneo y mantiene el tono sobrio del proverbio. «Carcasa» sugeriría más bien animales.
- source_word: συναχθήσονται
  english_pob_choice: will gather
  chosen_spanish: se juntarán
  alternatives_spanish:
  - serán reunidos
  - se reunirán
  lexicon: BDAG
  rationale: Aunque la forma griega es pasiva futura, el español natural para aves que convergen en una carroña es un verbo intransitivo/reflexivo. «Se juntarán» preserva la escena sin una pasiva forzada.
- source_word: ἀετοί
  english_pob_choice: vultures
  chosen_spanish: buitres
  alternatives_spanish:
  - águilas
  lexicon: BDAG
  rationale: Aunque ἀετός puede significar «águila», en este contexto la imagen de aves que se congregan sobre un cadáver encaja mejor con «buitres». Esa elección sigue el razonamiento del POB inglés y evita una imagen menos natural en español.
theological_decisions:
- issue: Sentido proverbial e implicación escatológica
  english_pob_reading: Translate the image straightforwardly without resolving its broader eschatological referent.
  chosen_spanish_reading: Traducir la imagen de manera directa, sin decidir en el texto principal qué representa el cadáver ni a qué alude el proverbio en su dimensión escatológica.
  alternative_spanish_readings:
  - Un proverbio sobre el juicio inevitable
  - Una referencia visible a la venida del Hijo del Hombre
  - Una alusión a la destrucción de Jerusalén o a estandartes romanos
  rationale: El griego presenta una imagen proverbial sin explicitar su referente simbólico. La traducción debe conservar esa tensión interpretativa y no imponer una lectura interpretativa específica en el texto principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: La revisión más reciente no propuso cambios; el texto se mantiene conforme al último pase, con la misma resolución lexical principal del POB inglés para ἀετοί y la misma preservación de la imagen proverbial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se evita «serán reunidos» para ἀετοί, porque en español la escena de aves sobre un cadáver pide un verbo intransitivo más natural.
  - «Cadáver» mantiene mejor el valor de πτῶμα que «cuerpo muerto», con un registro digno y claro.
  - La nota al pie conserva la alternativa tradicional «águilas» para reflejar la ambigüedad léxica documentada en la fuente.
