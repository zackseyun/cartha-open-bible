translation:
  language: es
  text: Pero todas estas cosas son el comienzo de los dolores de parto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dolores de alumbramiento' o 'dolores del parto'. El griego evoca los dolores del parto como metáfora de la etapa inicial de una gran aflicción venidera.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todo
  - todas estas cosas
  lexicon: BDAG
  rationale: Con ταῦτα, πάντα forma la expresión referencial 'todas estas cosas'. En español, 'todas' concuerda naturalmente con 'estas cosas' y conserva el alcance total del griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ introduce un giro discursivo suave desde la lista previa hacia la valoración de Jesús. 'Pero' comunica bien ese contraste o transición en español natural.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  lexicon: BDAG
  rationale: El demostrativo remite a los acontecimientos mencionados antes. 'Estas cosas' mantiene la referencia explícita y evita la elipsis que en español podría sonar menos clara.
- source_word: ἀρχὴ
  english_pob_choice: the beginning
  chosen_spanish: el comienzo
  alternatives_spanish:
  - el principio
  - un comienzo
  lexicon: BDAG
  rationale: 'Aunque el griego no tiene artículo, la estructura predicativa en español pide una forma definida: ''son el comienzo de...''. ''Comienzo'' suena natural y conserva la idea de una etapa inicial.'
- source_word: ὠδίνων
  english_pob_choice: birth pains
  chosen_spanish: los dolores de parto
  alternatives_spanish:
  - los dolores del parto
  - los dolores de alumbramiento
  lexicon: BDAG
  rationale: ὠδίνες alude a los dolores del parto. 'Dolores de parto' preserva la metáfora de nacimiento y es plenamente inteligible en español; además evita perder la imagen escatológica que el inglés POB conserva.
theological_decisions:
- issue: Metáfora de parto y tensión escatológica
  english_pob_reading: Retain the childbirth metaphor as 'birth pains' rather than flattening it to 'sufferings' or 'troubles.'
  chosen_spanish_reading: Mantener la metáfora como 'dolores de parto' y no reducirla a 'sufrimientos' o 'tribulaciones'.
  alternative_spanish_readings:
  - sufrimientos
  - tribulaciones
  - dolores
  - dolores del parto
  rationale: El texto presenta estos acontecimientos como el inicio de un proceso mayor, no como el desenlace final. Conservar la imagen del parto mantiene esa tensión del original sin añadir un esquema doctrinal ajeno al versículo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura aprobada en inglés y no introduce cambios sustantivos respecto del audit trail: conserva el giro discursivo, la referencia retrospectiva y la metáfora de parto, con una formulación española natural y fiel al griego.'
  spanish_consistency_notes:
  - Se usa 'dolores de parto' de manera consistente con la metáfora bíblica documentada para ὠδίνων.
  - '''Pero'' refleja adecuadamente el matiz de transición/contraste de δέ en una frase breve.'
  - '''Estas cosas'' mantiene la deixis retrospectiva hacia el contexto inmediato anterior.'
