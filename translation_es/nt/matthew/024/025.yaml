lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  - He aquí
  lexicon: BDAG
  rationale: ἰδού es una partícula interjectiva que llama la atención. En español, «He aquí» conserva el tono formal y deíctico del giro, sin caer en un calco demasiado arcaizante como «Behold».
- source_word: προείρηκα
  english_pob_choice: I have told beforehand
  chosen_spanish: les he dicho de antemano
  alternatives_spanish:
  - les he dicho previamente
  - les he avisado de antemano
  - les he prevenido
  lexicon: BDAG
  rationale: El perfecto de προλέγω expresa una acción ya realizada con relevancia presente. «Les he dicho de antemano» mantiene el valor temporal de προηγ- y el matiz de comunicación previa sin forzar el sentido a «advertir» más de lo que el verbo exige.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  - les
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente en español con complemento indirecto. «Les» evita redundancia innecesaria y mantiene la referencia plural del griego.
theological_decisions:
- issue: Fuerza del dicho de Jesús en el discurso escatológico
  english_pob_reading: A straightforward assertion that Jesus has already informed his disciples ahead of the events in view.
  chosen_spanish_reading: Una afirmación directa de que Jesús ya informó con anticipación a sus discípulos sobre los eventos que vienen.
  alternative_spanish_readings:
  - 'Una advertencia enfática: «les he prevenido»'
  - «les he advertido de antemano»
  rationale: El verbo griego puede sugerir advertencia, pero el texto base dice ante todo que Jesús habló con anticipación. Por eso la redacción conserva esa prioridad y no intensifica el verbo más allá de la evidencia textual.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «Look» a «Behold» para un registro más formal; en español se refleja con «He aquí», que conserva esa solemnidad sin necesidad de nota al pie. Se evita añadir una nota de alternativa porque el texto español no introduce ambigüedad adicional y el marcador debe estar anclado en el verso.
  spanish_consistency_notes:
  - Se mantiene un registro formal y eclesial, pero con sintaxis natural en español.
  - No se introduce «advertido» como lectura principal para no sobreespecificar el griego προείρηκα.
  - La forma plural se conserva con «les», acorde con ὑμῖν.
