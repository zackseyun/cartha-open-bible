review_pass:
  verdict: revise
  source_alignment_summary: La frase griega ἰδοὺ προείρηκα ὑμῖν significa literalmente una llamada de atención seguida de una afirmación de que Jesús ya lo ha dicho de antemano. El borrador español transmite correctamente el sentido básico, pero «He aquí» suena más deíctico/literario que interjectivo en español actual y resulta menos natural en registro eclesial moderno para una partícula como ἰδοὺ. «Miren[a]» preserva mejor la fuerza apelativa inmediata del original. «Les he dicho de antemano» refleja bien προείρηκα ὑμῖν y evita sobredeterminarlo como advertencia.
  spanish_quality_summary: El borrador es comprensible y fiel, pero requiere un ajuste menor para mejorar naturalidad y legibilidad en español neutral moderno sin perder dignidad. «Miren» fluye mejor que «He aquí» en este contexto breve y exhortativo. El resto de la oración está bien formado.
  glossary_alignment: No hay términos del glosario principal en juego. La decisión clave es ἰδοὺ, donde conviene apartarse de la opción demasiado literaria «He aquí» y preferir una interjección natural en español. «Les he dicho de antemano» está alineado con la decisión inglesa «I have told you beforehand» y con la nota alternativa documentada.
  issues:
  - severity: medium
    issue: «He aquí» para ἰδοὺ suena menos natural en español contemporáneo neutral
    rationale: Aunque es posible y formal, en este contexto breve funciona más como giro literario/deíctico que como llamada inmediata de atención. La filosofía del proyecto pide español moderno pero digno; «Miren» conserva mejor la función discursiva de ἰδοὺ.
  - severity: low
    issue: Falta la nota léxica alternativa preservada en el English POB
    rationale: El English POB conserva alternativas para προείρηκα ('in advance', 'forewarned'). Conviene mantener una nota breve en español porque documenta la decisión y evita perder matiz léxico relevante.
  revised_spanish_text: Miren[a], les he dicho de antemano.
  revised_footnotes:
  - marker: a
    text: 'O: «les he dicho por adelantado» o «les he advertido de antemano».'
    reason: lexical_alternative
