lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - les respondió
  lexicon: BDAG
  rationale: 'El participio aoristo de ἀποκρίνομαι funciona idiomáticamente como fórmula narrativa de respuesta. En español, «respondió» transmite la acción sin el calco pesado «respondiendo». '
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: answered them
  chosen_spanish: les respondió
  alternatives_spanish:
  - les dijo
  - respondió a ellos
  lexicon: BDAG
  rationale: La combinación ἀποκριθεὶς ... εἶπεν es una fórmula semítica habitual; «les respondió» integra respuesta y habla de manera natural en español y evita redundancia innecesaria.
- source_word: Βλέπετε
  english_pob_choice: See that
  chosen_spanish: Cuídense de
  alternatives_spanish:
  - Miren que
  - Estén atentos a
  - Vigilen que
  lexicon: BDAG
  rationale: El imperativo plural aquí tiene fuerza exhortativa de vigilancia o precaución. «Cuídense de» comunica bien la advertencia preventiva en español sin perder el matiz de estar alerta.
- source_word: μή τις
  english_pob_choice: that no one
  chosen_spanish: que nadie
  alternatives_spanish:
  - para que nadie
  - no sea que alguien
  lexicon: BDAG
  rationale: La construcción con μή y subjuntivo expresa prevención. «Que nadie» es la forma natural y clara en español para este valor prohibitivo-preventivo.
- source_word: πλανήσῃ
  english_pob_choice: leads you astray
  chosen_spanish: los extravíe
  alternatives_spanish:
  - los engañe
  - los desvíe
  - los haga errar
  lexicon: BDAG
  rationale: πλανάω puede abarcar engañar, hacer errar o desviar del camino. «Extravíe» conserva la idea de apartar del camino correcto y mantiene la tensión entre engaño y desviación; «engañe» queda como alternativa léxica cercana.
theological_decisions:
- issue: Alcance del peligro en πλανήσῃ
  english_pob_reading: a warning against being misled/deceived generally, rendered 'leads you astray'
  chosen_spanish_reading: una advertencia contra ser extraviados o engañados, sin reducirla a un solo matiz
  alternative_spanish_readings:
  - una advertencia solo contra el engaño intelectual
  - una advertencia principalmente contra el desvío práctico
  rationale: 'La frase debe conservar la amplitud del griego y del criterio POB: no solo error mental, sino también apartarse del camino correcto. «Extravíe» en español mantiene esa tensión sin resolverla prematuramente.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto sigue el pasaje griego y el audit trail inglés sin cambios adicionales; se mantiene la advertencia general contra el extravío, en consonancia con la última revisión sin alteraciones.
  spanish_consistency_notes:
  - Se conservó «Jesús» como nombre propio fijo.
  - Se evitó «SEÑOR» porque el texto no contiene el nombre divino ni κύριος aquí.
  - Se prefirió un verbo de advertencia comprensible y natural en español, alineado con el valor preventivo de βλέπετε.
  - Se mantuvo una sola nota léxica para reflejar la alternativa documentada entre extraviar y engañar.
