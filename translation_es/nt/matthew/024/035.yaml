translation:
  language: es
  text: El cielo y la tierra pasarán[a], pero mis palabras ciertamente no pasarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nunca pasarán». El griego usa una negación enfática (οὐ μή).'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielos
  lexicon: BDAG
  rationale: En esta merisma con γῆ, οὐρανός designa la creación visible por encima de la tierra, no solo el cielo meteorológico. En español, «cielo y tierra» es la equivalencia natural y ampliamente entendida de «heaven and earth».
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  - suelo
  lexicon: BDAG
  rationale: Dentro de la expresión fija «cielo y tierra», γῆ apunta a la tierra como parte del orden creado en conjunto con el cielo. «Tierra» conserva el alcance cósmico y el paralelismo con οὐρανός.
- source_word: παρελεύσεται
  english_pob_choice: will pass away
  chosen_spanish: pasarán
  alternatives_spanish:
  - pasarán de largo
  - desaparecerán
  - llegarán a su fin
  lexicon: BDAG
  rationale: El futuro de παρέρχομαι expresa el tránsito o desaparición del orden presente. «Pasarán» reproduce bien la imagen y evita sobreinterpretar el mecanismo del cambio.
- source_word: λόγοι
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - declaraciones
  - enseñanzas
  lexicon: BDAG
  rationale: λόγοι aquí se refiere a lo que Jesús ha dicho. «Palabras» es directo, natural y suficientemente amplio para abarcar sus declaraciones y enseñanza.
- source_word: οὐ μὴ παρέλθωσιν
  english_pob_choice: will certainly not pass away
  chosen_spanish: ciertamente no pasarán
  alternatives_spanish:
  - jamás pasarán
  - de ninguna manera pasarán
  - nunca pasarán
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo aoristo expresa una negación enfática. «Ciertamente no pasarán» comunica esa fuerza en español moderno sin depender de una formulación arcaica.
theological_decisions:
- issue: Fuerza de la afirmación sobre la permanencia de las palabras de Jesús
  english_pob_reading: Render the statement straightforwardly as an emphatic contrast between the passing created order and the enduring authority and permanence of Jesus' words.
  chosen_spanish_reading: 'Presentar el contraste de forma sobria y directa: el orden creado pasa, pero las palabras de Jesús no pasan.'
  alternative_spanish_readings:
  - Reforzar interpretativamente la autoridad divina de las palabras de Jesús
  - Traducir con una fórmula más doctrinal o litúrgica
  rationale: El verso afirma con fuerza la permanencia de las palabras de Jesús; la traducción conserva esa tensión sin añadir explicaciones doctrinales externas al texto.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El paquete fuente y el auditor inglés coinciden plenamente; no hay revisiones aplicadas ni cambios pendientes. La redacción española sigue de cerca la lectura validada, preservando la negación enfática de οὐ μή y la merisma «cielo y tierra».
  spanish_consistency_notes:
  - Se usa «cielo»/«tierra» para mantener la merisma clásica y natural en español.
  - Se evita «SEÑOR» u otra sustitución teológica porque el texto no contiene el nombre divino ni κύριος.
  - «Palabras» conserva el plural de λόγοι y su alcance amplio sin restringirlo a «dichos».
  - La nota al pie marca la alternativa natural «nunca pasarán» y explica la negación enfática del griego.
