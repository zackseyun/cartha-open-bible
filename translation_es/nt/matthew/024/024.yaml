review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: falsos mesías y falsos profetas surgirán, harán grandes señales y prodigios, y el propósito/resultado es desviar a otros. Sin embargo, dos elecciones no siguen fielmente el rastro auditado del POB: πλανῆσαι se debilitó a ''engañen'' en vez de conservar mejor el matiz direccional de ''extraviar/desviar'', y εἰ δυνατὸν se cargó con un matiz más contrafactual en ''si fuera posible'' en lugar del más directo ''si es posible''/''si es posible[aquí]''.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para sonar más natural y a la vez más fiel al griego. 'De modo que engañen' funciona, pero 'para extraviar' o 'de modo que extravíen' preserva mejor la fuerza léxica. 'Aun a los escogidos' es comprensible; 'aun a los escogidos' o 'incluso a los escogidos' son idiomáticos, pero el artículo actual es aceptable. La nota al pie sobre 'escogidos/elegidos' no corresponde a una necesidad del inglés auditado y distrae de las notas realmente relevantes.
  glossary_alignment: Alineación buena en 'mesías' para ψευδόχριστοι y en el registro bíblico general. No hay términos del glosario mayor en conflicto. La principal desalineación es con la decisión lexical auditada de πλανῆσαι ('lead astray') y con la decisión teológica/lexical de εἰ δυνατὸν ('if possible').
  issues:
  - severity: medium
    issue: πλανῆσαι se tradujo como 'engañen'
    rationale: El rastro POB privilegia 'lead astray' sobre 'deceive' para conservar el matiz de desviar/extraviar. 'Engañen' es posible, pero pierde parte de la imagen direccional del verbo griego.
  - severity: medium
    issue: εἰ δυνατὸν se tradujo 'si fuera posible'
    rationale: El inglés auditado eligió 'if possible' precisamente para no introducir un matiz contrafactual no explícito. En español, 'si fuera posible' suena más hipotético/counterfactual que el griego requiere.
  - severity: low
    issue: La nota sobre 'los elegidos' no es la nota más pertinente
    rationale: El audit trail inglés conserva notas sobre 'false Christs', 'deceive/lead astray' e 'if possible/if it were possible'. La nota española existente introduce una alternativa menor que no responde a los principales puntos auditados.
  revised_spanish_text: Porque se levantarán falsos mesías[a] y falsos profetas, y harán grandes señales y prodigios, para extraviar[b], si es posible[c], aun a los escogidos.
  revised_footnotes:
