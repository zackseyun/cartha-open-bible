revisions:
- from: Porque se levantarán falsos mesías y falsos profetas, y harán grandes señales y prodigios, de modo que engañen, si fuera posible, aun[a] a los escogidos.
  to: Porque se levantarán falsos mesías[a] y falsos profetas, y harán grandes señales y prodigios, para extraviar[b], si es posible[c], aun a los escogidos.
  rationale: 'Se revisa para alinearse con las decisiones auditadas del POB en dos puntos clave: conservar el matiz de πλανῆσαι como desviar/extraviar y evitar que εἰ δυνατὸν suene más contrafactual de lo que expresa el griego. También se sustituyen las notas al pie por las que corresponden a los puntos significativos del audit trail inglés y se mantiene ''falsos mesías'' conforme a la política terminológica del proyecto.'
