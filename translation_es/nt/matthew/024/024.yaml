translation:
  language: es
  text: Porque se levantarán falsos mesías[a] y falsos profetas, y harán grandes señales y prodigios, para extraviar[b], si es posible[c], aun a los escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «falsos Cristos». El griego usa el título Christos; aquí se traduce «mesías» porque el sentido es titular más que de nombre propio.'
    reason: alternative_reading
  - marker: b
    text: 'O: «engañar». El verbo puede significar hacer que alguien se desvíe o se extravíe; por eso «extraviar» conserva mejor ese matiz.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «si fuera posible». El griego dice simplemente «si es posible», sin explicitar la implicación teológica.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγερθήσονται
  english_pob_choice: will arise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - aparecerán
  - surgirán
  lexicon: BDAG
  rationale: El futuro pasivo aquí es idiomático para personas que aparecen en escena o se presentan públicamente. En español, 'se levantarán' conserva esa idea de emerger o presentarse sin sugerir resurrección.
- source_word: ψευδόχριστοι
  english_pob_choice: false messiahs
  chosen_spanish: falsos mesías
  alternatives_spanish:
  - falsos Cristos
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como 'Mesías', siguiendo la decisión POB de evitar 'Cristos' como forma heredada cuando el contexto es un título. 'Falsos mesías' es natural en español y preserva el contraste con el Mesías verdadero.
- source_word: ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_spanish: falsos profetas
  alternatives_spanish:
  - profetas falsos
  lexicon: BDAG
  rationale: Es la traducción directa y habitual del compuesto. El orden adjetivo-sustantivo es más natural en español y mantiene el paralelismo con 'falsos mesías'.
- source_word: δώσουσιν
  english_pob_choice: they will perform
  chosen_spanish: harán
  alternatives_spanish:
  - producirán
  - realizarán
  lexicon: BDAG
  rationale: Con 'señales y prodigios', δίδωμι expresa la realización o producción de actos portentosos. 'Harán' es más natural en español que una calca como 'darán'.
- source_word: σημεῖα μεγάλα
  english_pob_choice: great signs
  chosen_spanish: grandes señales
  alternatives_spanish:
  - grandes signos
  - grandes milagros
  lexicon: BDAG
  rationale: Se conserva 'señales' para no borrar el valor evidencial o portentoso de σημεῖα. 'Grandes' traduce el adjetivo sin sobreinterpretarlo como 'milagros'.
- source_word: τέρατα
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - portentos
  lexicon: BDAG
  rationale: '''Prodigios'' comunica el carácter asombroso de τέρατα en un registro bíblico digno, y evita reducir el término a ''milagros'' sin necesidad. En español, también conserva cierta fuerza retórica junto a ''señales''.'
- source_word: ὥστε πλανῆσαι
  english_pob_choice: so as to lead astray
  chosen_spanish: de modo que engañen
  alternatives_spanish:
  - para extraviar
  - para desviar
  lexicon: BDAG
  rationale: La construcción con infinitivo expresa resultado o intención. En español, 'de modo que' más subjuntivo da una equivalencia natural y respeta la función del pasaje, mientras 'engañen' recoge el efecto de πλανάω en contexto.
- source_word: πλανῆσαι
  english_pob_choice: lead astray
  chosen_spanish: engañen
  alternatives_spanish:
  - desvíen
  - extravíen
  lexicon: BDAG
  rationale: Aunque πλανάω puede sugerir 'extraviar' o 'hacer errar', en este contexto la idea principal es inducir a error. 'Engañen' comunica bien el resultado esperado en español sin perder la tensión de la advertencia.
- source_word: εἰ δυνατὸν
  english_pob_choice: if possible
  chosen_spanish: si fuera posible
  alternatives_spanish:
  - si es posible
  - de ser posible
  lexicon: BDAG
  rationale: Se opta por 'si fuera posible' para reflejar con naturalidad la cláusula condicional y mantener abierta la implicación teológica. Esta forma no resuelve la cuestión sobre los escogidos, sino que preserva la ambigüedad del griego.
- source_word: καὶ τοὺς ἐκλεκτούς
  english_pob_choice: even the elect
  chosen_spanish: aun[a] a los escogidos
  alternatives_spanish:
  - incluso a los elegidos
  - hasta a los escogidos
  lexicon: BDAG
  rationale: '''Los escogidos'' es un equivalente transparente y bíblicamente reconocible para ἐκλεκτούς. Se conserva el valor ascendente de καί con ''aun'', sin forzar la interpretación doctrinal del alcance de la seducción.'
theological_decisions:
- issue: Título Χριστός en ψευδόχριστοι
  english_pob_reading: false messiahs
  chosen_spanish_reading: falsos mesías
  alternative_spanish_readings:
  - falsos Cristos
  rationale: El griego usa un título, no un nombre propio; por eso 'Mesías' preserva mejor el sentido mesiánico judío del pasaje. Esto sigue la línea POB de evitar la inercia tradicional cuando el título es lo que está en juego.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — Χριστός → Mesías (where title; Cristo where name-like)'
- issue: Alcance de la cláusula εἰ δυνατὸν respecto de los escogidos
  english_pob_reading: if possible
  chosen_spanish_reading: si fuera posible
  alternative_spanish_readings:
  - si es posible
  - de ser posible
  rationale: La traducción conserva la incertidumbre del original y no decide si el énfasis es sobre la imposibilidad real o sobre una posibilidad limitada. Así se preserva la tensión teológica en lugar de resolverla por anticipado.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT provisto y con la traducción auditada en inglés; no se registran revisiones posteriores que exijan ajustes. Se ha mantenido la misma decisión sobre Χριστός como título y sobre la cláusula condicional final, sin endurecerla doctrinalmente.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός en armonía con la terminología POB y con el valor titular del contexto.
  - '''Señales y prodigios'' conserva el paralelismo léxico del griego sin reducir ambos términos a ''milagros''.'
  - '''Si fuera posible'' preserva la cautela del texto y evita cerrar la tensión acerca de los escogidos.'
  - '''Escogidos'' es el equivalente consistente para ἐκλεκτούς en este contexto bíblico.'
