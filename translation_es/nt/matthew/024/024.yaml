    text: 'O: «engañar». El verbo puede significar hacer que alguien se desvíe o se extravíe; por eso «extraviar» conserva mejor ese matiz.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «si fuera posible». El griego dice simplemente «si es posible», sin explicitar la implicación teológica.'
    reason: alternative_reading
  revision_rationale: 'Se revisa para alinearse con las decisiones auditadas del POB en dos puntos clave: conservar el matiz de πλανῆσαι como desviar/extraviar y evitar que εἰ δυνατὸν suene más contrafactual de lo que expresa el griego. También se sustituyen las notas al pie por las que corresponden a los puntos significativos del audit trail inglés y se mantiene ''falsos mesías'' conforme a la política terminológica del proyecto.'
