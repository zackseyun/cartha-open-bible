translation:
  language: es
  text: Cuando Jesús salió del templo[a] y se iba, sus discípulos se acercaron para mostrarle los edificios del templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al templo como complejo o recinto, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - saliendo
  - había salido
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción acompañante anterior a la principal. En español, «salió» transmite de modo natural la acción de salir sin añadir temporalidad no explicitada.
- source_word: ἱεροῦ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - recinto del templo
  - complejo del templo
  lexicon: BDAG
  rationale: ἱερόν designa el conjunto o recinto del templo, no el santuario interior (ναός). «Templo» es la forma más natural y fiel en el texto principal; la nota conserva la precisión léxica.
- source_word: ἐπορεύετο
  english_pob_choice: was going away
  chosen_spanish: mientras se iba
  alternatives_spanish:
  - iba de camino
  - se alejaba
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. «Mientras se iba» preserva bien ese aspecto progresivo en español y encaja con la secuencia narrativa.
- source_word: προσῆλθον
  english_pob_choice: came
  chosen_spanish: se le acercaron
  alternatives_spanish:
  - vinieron
  - se acercaron
  lexicon: BDAG
  rationale: En este contexto, el verbo implica aproximación hacia Jesús. «Se le acercaron» conserva la dirección del movimiento mejor que un simple «vinieron».
- source_word: ἐπιδεῖξαι
  english_pob_choice: to show
  chosen_spanish: para mostrarle
  alternatives_spanish:
  - para señalarle
  - para enseñarle
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Para mostrarle» es la equivalencia más directa y natural para indicar lo que los discípulos querían hacer.
- source_word: οἰκοδομὰς
  english_pob_choice: buildings
  chosen_spanish: los edificios
  alternatives_spanish:
  - las construcciones
  - las edificaciones
  lexicon: BDAG
  rationale: El sustantivo se refiere a edificaciones visibles del conjunto del templo. «Edificios» comunica con claridad esa referencia concreta en español actual.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del recinto del templo
  - del complejo del templo
  lexicon: BDAG
  rationale: Repite la referencia al mismo ἱερόν. Mantener «del templo» conserva la estructura del original y la cohesión narrativa.
theological_decisions:
- issue: Distinción μεταξύ ἱερόν y ναός
  english_pob_reading: temple / temple complex rather than inner sanctuary
  chosen_spanish_reading: templo / recinto del templo, no «santuario»
  alternative_spanish_readings:
  - complejo del templo
  - recinto del templo
  rationale: El griego usa ἱερόν, término más amplio que el santuario interior. En el texto principal se conserva «templo» por naturalidad; la nota explica que el sentido es el recinto o complejo templario. Así se evita una precisión indebida y se mantiene auditable la distinción.
  doctrine_reference: Principios de traducción POB §§1, 5, 6
translation_notes:
  revision_awareness: 'Se siguió el mismo juicio de revisión del POB inglés: no hubo cambios sustanciales en la lectura base. La versión española mantiene la distinción léxica de ἱερόν con una nota, sin alterar el flujo narrativo.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - «Templo» se mantiene en el texto principal para ἱερόν, con precisión ampliada en nota.
  - «Se le acercaron» conserva mejor el movimiento implícito que una traducción meramente estática.
  - La puntuación española y la colocación de la nota siguen un estilo publicable y sobrio.
