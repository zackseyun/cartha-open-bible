revisions:
- from: Y entonces muchos[a] se apartarán, y se entregarán unos a otros[b], y se odiarán unos a otros.
  to: Y entonces muchos[a] se apartarán, y se traicionarán unos a otros[b] y se odiarán unos a otros.
  rationale: Se cambia 'se entregarán unos a otros' por 'se traicionarán unos a otros' para reflejar mejor el valor contextual de παραδίδωμι según la auditoría inglesa y para evitar una lectura española equívoca de entrega voluntaria. La alternativa más literal 'se entregarán unos a otros' se preserva en nota. Se suaviza además la puntuación para un español más natural sin pérdida de ritmo discursivo.
