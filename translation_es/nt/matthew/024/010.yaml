translation:
  language: es
  text: Y entonces muchos[a] se apartarán, y se traicionarán unos a otros[b] y se odiarán unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán hechos tropezar» o «tomarán ofensa».
    reason: lexical_alternative
  - marker: b
    text: O «se entregarán unos a otros».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en aquel tiempo
  - luego
  lexicon: Gramática griega
  rationale: Marca la secuencia temporal dentro del discurso de Jesús; «entonces» es natural en español y conserva el avance narrativo.
- source_word: σκανδαλισθήσονται
  english_pob_choice: will fall away
  chosen_spanish: se apartarán
  alternatives_spanish:
  - tropezarán
  - se escandalizarán
  - serán llevados a tropezar
  lexicon: BDAG
  rationale: En este contexto escatológico, el verbo pasivo sugiere una ruptura seria con la fidelidad. «Se apartarán» comunica la idea de deserción o caída sin forzar una sola interpretación doctrinal, y evita que «escandalizar» suene demasiado técnico o ambiguo en español.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  lexicon: BDAG
  rationale: Adjetivo sustantivado sencillo; «muchos» es la correspondencia más directa y natural.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre sí
  lexicon: BDAG
  rationale: Pronombre recíproco que indica acción mutua; «unos a otros» preserva claramente la reciprocidad en español bíblico moderno.
- source_word: παραδώσουσιν
  english_pob_choice: will betray
  chosen_spanish: se entregarán
  alternatives_spanish:
  - se traicionarán
  - los entregarán
  - se pondrán en manos de
  lexicon: BDAG
  rationale: El griego puede significar «entregar/poner en manos de». En este contexto hostil, el inglés POB opta por «betray». En español, «se entregarán unos a otros» conserva el sentido de entregar a otro a la violencia o persecución sin añadir de modo directo la idea de engaño que trae «traicionar».
- source_word: μισήσουσιν
  english_pob_choice: hate
  chosen_spanish: se odiarán
  alternatives_spanish:
  - odiarán
  - mostrarán odio
  lexicon: BDAG
  rationale: Verbo futuro de hostilidad activa; «se odiarán» mantiene el reciprocidad y la fuerza del término.
- source_word: καὶ τότε ... καὶ ... καὶ ...
  english_pob_choice: And then ... and ... and ...
  chosen_spanish: Y entonces ... y ... y ...
  alternatives_spanish:
  - Entonces ... y ... y ...
  lexicon: Gramática griega
  rationale: Se conserva la acumulación coordinada del griego y el ritmo escalonado del versículo.
theological_decisions:
- issue: Sentido de σκανδαλισθήσονται en un contexto de persecución y ruptura comunitaria
  english_pob_reading: will fall away
  chosen_spanish_reading: se apartarán
  alternative_spanish_readings:
  - serán llevados a tropezar
  - se escandalizarán
  - caerán
  rationale: La lectura inglesa evita reducir el verbo a un simple disgusto momentáneo. En español, «se apartarán» comunica una deflexión real de la fidelidad y preserva el peso de la crisis sin imponer de antemano una formulación técnica sobre apostasia.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el texto sigue de cerca el griego SBLGNT y el expediente auditado en inglés, manteniendo la progresión temporal, la reciprocidad y la fuerza hostil de los verbos.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se mantiene «unos a otros» para todos los recipientes recíprocos, coherente con el griego ἀλλήλους.
  - «Se apartarán» conserva la tensión léxica de σκανδαλίζω sin convertirla en un tecnicismo eclesiástico.
