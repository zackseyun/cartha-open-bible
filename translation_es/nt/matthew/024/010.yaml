review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la secuencia temporal y el sentido general de ruptura, traición/entrega y odio mutuo. Sin embargo, en παραδώσουσιν el español principal se aleja de la decisión auditada del POB inglés ('will betray') y además la nota b repite exactamente el texto principal en vez de preservar la alternativa literal 'hand over'.
  spanish_quality_summary: El español es legible y digno, pero 'se entregarán unos a otros' suena en español como rendición mutua o entrega voluntaria, no como delación o traición mutua. 'Se traicionarán unos a otros' comunica mejor la hostilidad interpersonal del contexto. También conviene quitar la coma antes de cada 'y' en una serie simple para una puntuación más natural.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión 'se apartarán' para σκανδαλισθήσονται es defendible y se alinea razonablemente con 'will fall away'. La principal desalineación está en παραδώσουσιν, donde el POB inglés eligió el matiz contextual de 'betray'; en español debe reflejarse en el texto principal, preservando 'entregar' en nota como alternativa léxica.
  issues:
  - severity: high
    issue: παραδώσουσιν está traducido como 'se entregarán unos a otros' en el texto principal.
    rationale: En español esta frase normalmente sugiere rendirse o ponerse mutuamente en manos ajenas, y no comunica con claridad la traición recíproca del contexto. El POB inglés documentó 'betray' como lectura principal por la fuerza contextual de hostilidad y persecución.
  - severity: high
    issue: La nota b repite el texto principal en vez de ofrecer una alternativa real.
    rationale: La nota inglesa preserva la alternativa literal 'will hand one another over'. En español, si el texto principal se corrige a 'se traicionarán', la nota debe conservar 'se entregarán unos a otros' como alternativa léxica.
  - severity: low
    issue: Puntuación algo calcada con comas antes de cada 'y'.
    rationale: En español una coordinación simple de tres predicados fluye mejor sin esas comas, salvo que se busque una pausa enfática muy marcada, que aquí no es necesaria.
  revised_spanish_text: Y entonces muchos[a] se apartarán, y se traicionarán unos a otros[b] y se odiarán unos a otros.
  revised_footnotes:
  - marker: a
    text: O «serán hechos tropezar» o «tomarán ofensa».
    reason: lexical_alternative
  - marker: b
    text: O «se entregarán unos a otros».
    reason: lexical_alternative
  revision_rationale: Se cambia 'se entregarán unos a otros' por 'se traicionarán unos a otros' para reflejar mejor el valor contextual de παραδίδωμι según la auditoría inglesa y para evitar una lectura española equívoca de entrega voluntaria. La alternativa más literal 'se entregarán unos a otros' se preserva en nota. Se suaviza además la puntuación para un español más natural sin pérdida de ritmo discursivo.
