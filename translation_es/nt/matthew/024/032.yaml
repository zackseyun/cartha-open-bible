translation:
  language: es
  text: 'Aprendan la parábola[a] de la higuera: en cuanto su rama se pone tierna y brotan las hojas[b], saben que el verano[c] está cerca.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la lección' o 'la ilustración' para 'la parábola'.
    reason: lexical_alternative
  - marker: b
    text: O 'echa hojas'.
    reason: lexical_alternative
  - marker: c
    text: θέρος puede denotar 'verano' y, en algunos contextos, la temporada de la cosecha; aquí el sentido estacional encaja mejor con la imagen de la higuera.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ τῆς συκῆς
  english_pob_choice: Now learn the parable from the fig tree
  chosen_spanish: Aprendan la parábola de la higuera
  alternatives_spanish:
  - Aprendan la lección de la higuera
  - Aprendan la ilustración de la higuera
  - Aprendan de la higuera la parábola
  lexicon: BDAG
  rationale: Ἀπό con genitivo expresa procedencia o punto de partida; en español, 'de la higuera' transmite de forma natural la fuente de la enseñanza. El matiz transicional de δέ queda bien cubierto por el arranque directo sin necesidad de un marcador adicional como 'ahora'.
- source_word: μάθετε
  english_pob_choice: learn
  chosen_spanish: Aprendan
  alternatives_spanish:
  - Aprended
  - Entiendan
  - Tomen una lección
  lexicon: BDAG
  rationale: El aoristo imperativo de μανθάνω pide una orden directa. 'Aprendan' conserva el valor exhortativo y suena natural en español contemporáneo y eclesial.
- source_word: τὴν παραβολήν
  english_pob_choice: the parable
  chosen_spanish: la parábola
  alternatives_spanish:
  - la lección
  - la ilustración
  lexicon: BDAG
  rationale: '''Parábola'' preserva el término técnico de los Evangelios. Las alternativas ''lección'' e ''ilustración'' explican el sentido, pero suavizan la correspondencia léxica con παραβολή.'
- source_word: ὅταν ἤδη
  english_pob_choice: as soon as
  chosen_spanish: cuando ya
  alternatives_spanish:
  - en cuanto
  - tan pronto como
  - cuando
  lexicon: BDAG
  rationale: ὅταν con ἤδη marca el inicio visible de la señal. 'Cuando ya' conserva esa idea de comienzo sin sobretraducirla; 'en cuanto' o 'tan pronto como' serían más idiomáticos, pero añaden una inmediatez que el griego no exige con la misma fuerza.
- source_word: ὁ κλάδος αὐτῆς γένηται ἁπαλὸς
  english_pob_choice: its branch becomes tender
  chosen_spanish: su rama se pone tierna
  alternatives_spanish:
  - su rama se vuelve tierna
  - su rama se hace tierna
  - su rama se ablanda
  lexicon: BDAG
  rationale: γένηται expresa cambio de estado; 'se pone tierna' es una solución natural en español para el cambio de condición de un brote. 'Tierno' comunica mejor que 'suave' o 'blando' el crecimiento vegetal joven.
- source_word: καὶ τὰ φύλλα ἐκφύῃ
  english_pob_choice: and puts out leaves
  chosen_spanish: y brotan las hojas
  alternatives_spanish:
  - y echa hojas
  - y saca hojas
  - y salen las hojas
  lexicon: BDAG
  rationale: ἐκφύῃ significa brotar o echar fuera. 'Brotan las hojas' mantiene la imagen vegetal con naturalidad. 'Echa hojas' es posible, pero menos general y más regional en español.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - reconocen
  - saben ustedes
  lexicon: BDAG
  rationale: 'El presente indicativo plural encaja con una afirmación general: ''saben''. En español, el sujeto implícito y el valor gnómico quedan bien expresados sin añadir pronombres innecesarios.'
- source_word: ἐγγὺς τὸ θέρος
  english_pob_choice: summer is near
  chosen_spanish: el verano está cerca
  alternatives_spanish:
  - está cerca el verano
  - la estación cálida está cerca
  - la cosecha está cerca
  lexicon: BDAG
  rationale: '''θέρος'' designa normalmente el verano en este contexto de señal estacional. ''El verano está cerca'' conserva tanto el sentido temporal como la imagen observable del pasaje.'
theological_decisions:
- issue: Valor de la imagen de la higuera
  english_pob_reading: Rendered as a seasonal illustration without importing symbolic identification of the fig tree with Israel into the translation itself.
  chosen_spanish_reading: La higuera se presenta como ilustración estacional observable, sin fijar en la traducción una identificación simbólica adicional.
  alternative_spanish_readings:
  - La higuera simboliza a Israel
  - La higuera es solo un ejemplo natural
  rationale: El griego presenta una comparación basada en signos visibles para reconocer cercanía. La traducción debe preservar la imagen y no resolver en el texto una lectura escatológica debatida que el versículo no explicita.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una identificación alegórica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del griego SBLGNT y coincide con el estado de revisión más reciente sin incorporar cambios posteriores; se priorizó una equivalencia óptima con español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene 'higuera' para συκῆ, en coherencia con el registro bíblico y el campo botánico del contexto.
  - '''Parábola'' se conserva como término técnico, evitando sustituirlo por una glosa interpretativa en el cuerpo principal.'
  - '''Verano'' se eligió para θέρος por ser el valor contextual más probable en la señal estacional descrita.'
  - No se añadieron notas al pie porque las alternativas léxicas quedan suficientemente recogidas en las decisiones léxicas y no se requiere desambiguación textual en el versículo principal.
