base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/043.yaml
  text: 'But know this: if the master of the house had known in what watch the thief was coming[b][a], he would have stayed awake and would not have let his house be broken into.'
  footnotes:
  - marker: a
    text: Or, more explicitly, 'in which watch of the night.'
    reason: cultural_note
  - marker: b
    text: Literally, 'be dug through,' reflecting houses that could be breached through a wall or roof in the ancient setting.
    reason: lexical_alternative
