translation:
  language: es
  text: 'Pero sepan esto: si el dueño de la casa hubiera sabido en qué vigilia[a] venía el ladrón, habría estado despierto y no habría permitido que entraran por la fuerza en su casa[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Vigilia’ reproduce la división nocturna implícita en φυλακή; también puede entenderse como ‘vigilia de la noche’.
    reason: cultural_note
  - marker: b
    text: Literalmente, ‘que su casa fuera excavada a través’ o ‘abierta a través’, reflejando casas que podían ser vulneradas por un muro o techo en el contexto antiguo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνο δὲ γινώσκετε
  english_pob_choice: But know this
  chosen_spanish: Pero sepan esto
  alternatives_spanish:
  - Pero entiendan esto
  - Y sepan esto
  lexicon: BDAG
  rationale: Conserva la transición discursiva de δέ y el imperativo dirigido a los oyentes, con una fórmula natural en español.
- source_word: οἰκοδεσπότης
  english_pob_choice: the master of the house
  chosen_spanish: el dueño de la casa
  alternatives_spanish:
  - el amo de la casa
  - el cabeza de familia
  - el dueño del hogar
  lexicon: BDAG
  rationale: En español, 'dueño de la casa' comunica bien la figura social del responsable del hogar sin sonar forzado. 'Amo' puede resultar más duro y 'cabeza de familia' añade un matiz no explícito en el griego.
- source_word: ποίᾳ φυλακῇ
  english_pob_choice: in what watch
  chosen_spanish: en qué vigilia
  alternatives_spanish:
  - en qué guardia
  - en cuál vigilia de la noche
  - a qué hora de la noche
  lexicon: BDAG
  rationale: '''φυλακή'' aquí designa una división de la noche; ''vigilia'' preserva ese valor temporal-cultural en español y es más exacto que ''hora''.'
- source_word: ὁ κλέπτης ἔρχεται
  english_pob_choice: the thief was coming
  chosen_spanish: venía el ladrón
  alternatives_spanish:
  - iba a venir el ladrón
  - llegaba el ladrón
  - venía el ladrón
  lexicon: BDAG
  rationale: El presente griego funciona en una construcción condicional con valor de llegada futura vista desde el pasado; 'venía' reproduce bien la perspectiva sin sonar mecánico.
- source_word: ἐγρηγόρησεν ἂν
  english_pob_choice: he would have stayed awake
  chosen_spanish: habría estado despierto
  alternatives_spanish:
  - habría velado
  - habría permanecido despierto
  - habría estado en vela
  lexicon: BDAG
  rationale: '''γρηγορέω'' puede significar mantenerse despierto/velar; ''habría estado despierto'' es claro y natural, y evita una expresión demasiado literal que podría sonar rígida.'
- source_word: οὐκ ἂν εἴασεν
  english_pob_choice: would not have let
  chosen_spanish: no habría permitido
  alternatives_spanish:
  - no habría dejado
  - no habría consentido
  - no habría permitido
  lexicon: BDAG
  rationale: '''Permitir'' expresa bien el matiz de dejar que ocurra algo, con un registro digno y natural en español.'
- source_word: διορυχθῆναι τὴν οἰκίαν αὐτοῦ
  english_pob_choice: his house be broken into
  chosen_spanish: que le perforaran la casa
  alternatives_spanish:
  - que le allanaran la casa
  - que le abrieran un boquete en la casa
  - que le perforaran la casa
  lexicon: BDAG
  rationale: '''διορύσσω'' significa literalmente ''excavar/perforar''; se conserva el valor léxico concreto del verbo, que en el contexto alude a entrar por muro o techo. La formulación evita sustituir por un equivalente totalmente idiomático y mantiene la tensión lexical documentada.'
theological_decisions:
- issue: Imagen del dueño de la casa
  english_pob_reading: the master of the house
  chosen_spanish_reading: el dueño de la casa
  alternative_spanish_readings:
  - el amo de la casa
  - el cabeza de familia
  rationale: Se trata de una ilustración parabólica, no de un título doctrinal. 'Dueño de la casa' conserva la relación doméstica y la responsabilidad del personaje sin sobrecargarla con categorías modernas.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imágenes de robo y acceso forzado
  english_pob_reading: be broken into
  chosen_spanish_reading: que le perforaran la casa
  alternative_spanish_readings:
  - que le allanaran la casa
  - que le rompieran la pared de la casa
  rationale: La lectura inglesa preserva la idea cultural de una entrada hecha 'a través' de la estructura. El español conserva la concreción de διορυχθῆναι mediante un verbo físico que no diluye la imagen antigua.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas al texto español con [a] y [b], manteniendo ambas notas junto a las palabras pertinentes.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' / 'Yahvé' sin necesidad en este versículo.
  - Se evitó 'SEÑOR' porque no aparece en el pasaje.
  - '''vigilia'' conserva la especificidad cultural de la división nocturna.'
  - '''perforaran la casa'' intenta preservar la literalidad de διορυχθῆναι sin perder inteligibilidad; la nota explica la imagen antigua.'
