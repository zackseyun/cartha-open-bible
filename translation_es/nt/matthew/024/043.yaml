revisions:
- from: 'Pero sepan esto: si el dueño de la casa hubiera sabido en qué vigilia[a] venía el ladrón[b], habría estado despierto y no habría permitido que le perforaran la casa.'
  to: 'Pero sepan esto: si el dueño de la casa hubiera sabido en qué vigilia[a] venía el ladrón, habría estado despierto y no habría permitido que entraran por la fuerza en su casa[b].'
  rationale: 'La revisión mantiene las buenas decisiones del borrador, pero corrige el punto central donde el español se apartaba de la auditoría inglesa y de la legibilidad natural: el texto principal ahora expresa idiomáticamente la irrupción del ladrón, mientras la nota conserva la imagen literal de διορυχθῆναι. También se corrige el contenido y el lugar de la nota b para que corresponda exactamente al término explicado.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:20:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura condicional y la mayor parte del sentido del griego: ''Pero sepan esto'', ''el dueño de la casa'', ''en qué vigilia'', ''habría estado despierto'' y ''no habría permitido'' corresponden adecuadamente a ἐκεῖνο δὲ γινώσκετε, οἰκοδεσπότης, ποίᾳ φυλακῇ, ἐγρηγόρησεν ἂν y οὐκ ἂν εἴασεν. Sin embargo, el manejo de διορυχθῆναι y de la nota b no sigue fielmente la auditoría inglesa: el texto principal debe comunicar el sentido idiomático ''ser forzada/entrar por la fuerza'' y la nota debe preservar el literal ''ser excavada/abierta a través'', no comentar erróneamente ''mientras el ladrón venía''.'
  spanish_quality_summary: El español es generalmente claro y digno. 'En qué vigilia' es aceptable con nota aclaratoria. El principal problema de legibilidad es 'que le perforaran la casa', que en español suena extraño y poco idiomático para un robo domiciliario. Una solución como 'que entraran por la fuerza en su casa' comunica mejor el sentido y permite conservar la imagen antigua en nota. También conviene ajustar la puntuación/ubicación de notas para que anclen donde corresponde.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son compatibles con POB. La excepción necesaria es que, siguiendo la racionalidad documentada en inglés, διορυχθῆναι debe verterse idiomáticamente en el texto español principal, con la literalidad física preservada en nota, no al revés.
  issues:
  - severity: high
    issue: La traducción de διορυχθῆναι como 'que le perforaran la casa' no preserva bien la decisión auditada de sentido idiomático principal.
    rationale: El inglés POB eligió 'be broken into' en el texto y reservó 'be dug through' para nota. 'Perforaran la casa' suena antinatural en español y puede sugerir un agujero puntual más que un allanamiento/entrada forzada.
  - severity: high
    issue: La nota b no corresponde al elemento correcto del griego ni al contenido de la auditoría inglesa.
    rationale: La nota actual dice 'Literalmente, “mientras el ladrón venía”', pero la literalidad relevante en la auditoría es sobre διορυχθῆναι ('ser excavada/abierta a través'), no sobre ἔρχεται.
  - severity: medium
    issue: El anclaje de la nota b está colocado en 'ladrón' cuando debería relacionarse con la acción de irrumpir en la casa.
    rationale: Para cumplir la disciplina de notas, el marcador debe aparecer en la palabra o frase a la que la nota explica.
  revised_spanish_text: 'Pero sepan esto: si el dueño de la casa hubiera sabido en qué vigilia[a] venía el ladrón, habría estado despierto y no habría permitido que entraran por la fuerza en su casa[b].'
  revised_footnotes:
  - marker: a
    text: ‘Vigilia’ reproduce la división nocturna implícita en φυλακή; también puede entenderse como ‘vigilia de la noche’.
    reason: cultural_note
  - marker: b
    text: Literalmente, ‘que su casa fuera excavada a través’ o ‘abierta a través’, reflejando casas que podían ser vulneradas por un muro o techo en el contexto antiguo.
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene las buenas decisiones del borrador, pero corrige el punto central donde el español se apartaba de la auditoría inglesa y de la legibilidad natural: el texto principal ahora expresa idiomáticamente la irrupción del ladrón, mientras la nota conserva la imagen literal de διορυχθῆναι. También se corrige el contenido y el lugar de la nota b para que corresponda exactamente al término explicado.'
