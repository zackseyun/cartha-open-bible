translation:
  language: es
  text: Pero en cuanto a aquel día y hora, nadie sabe, ni siquiera los ángeles del cielo, ni el Hijo[a], solo el Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos omiten «ni el Hijo». El texto principal sigue la lectura del SBLGNT.
    reason: textual_variant
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: But concerning
  chosen_spanish: Pero en cuanto a
  alternatives_spanish:
  - Ahora, en cuanto a
  - Respecto a
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema; δέ añade transición y leve contraste. «Pero en cuanto a» conserva ambos valores en un español natural y readable para iglesia.
- source_word: τῆς ἡμέρας ἐκείνης καὶ ὥρας
  english_pob_choice: that day and hour
  chosen_spanish: aquel día y hora
  alternatives_spanish:
  - ese día y esa hora
  - aquel día y aquella hora
  lexicon: BDAG
  rationale: El demostrativo ἐκείνης modifica el conjunto temporal. «Aquel día y hora» es idiomático y mantiene la referencia escatológica específica sin redundancia forzada.
- source_word: οὐδεὶς οἶδεν
  english_pob_choice: no one knows
  chosen_spanish: nadie sabe
  alternatives_spanish:
  - nadie conoce
  - ninguna persona sabe
  lexicon: BDAG
  rationale: οὐδείς expresa negación universal; οἶδα en valor presente se traduce naturalmente «saber» en español. «Nadie sabe» es claro y fiel.
- source_word: οὐδὲ οἱ ἄγγελοι τῶν οὐρανῶν
  english_pob_choice: not even the angels of heaven
  chosen_spanish: ni siquiera los ángeles de los cielos
  alternatives_spanish:
  - ni aun los ángeles del cielo
  - ni siquiera los ángeles del cielo
  lexicon: BDAG
  rationale: οὐδέ aquí añade un elemento negativo enfático. «Ni siquiera» reproduce esa fuerza. Se conserva el plural «de los cielos» para reflejar τῶν οὐρανῶν con mayor cercanía al griego, sin perder inteligibilidad.
- source_word: οὐδὲ ὁ υἱός
  english_pob_choice: nor the Son
  chosen_spanish: ni el Hijo
  alternatives_spanish:
  - ni siquiera el Hijo
  - ni tampoco el Hijo
  lexicon: BDAG
  rationale: La coordinación negativa sigue la serie precedente. En español, «ni el Hijo» mantiene la inclusión de οὐδὲ ὁ υἱός sin suavizar la tensión cristológica; el artículo se conserva como título reconocido.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino solo
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: Después de una negación, εἰ μή equivale a «excepto/except». «Sino solo» expresa con naturalidad la exclusividad del Padre y enlaza bien con la clausura de la frase.
- source_word: ὁ πατὴρ μόνος
  english_pob_choice: the Father alone
  chosen_spanish: el Padre
  alternatives_spanish:
  - el Padre solo
  - solamente el Padre
  lexicon: BDAG
  rationale: La exclusividad ya queda explicitada por «sino solo». En español, repetir «solo» en el final sería redundante; por eso se simplifica a «el Padre» dentro de la misma cláusula. El título se capitaliza por su función divina en contexto.
theological_decisions:
- issue: La frase «ni el Hijo» y su tensión cristológica
  english_pob_reading: Retain the full phrase 'nor the Son' in the main text without softening or explanatory expansion.
  chosen_spanish_reading: Conservar «ni el Hijo» en el texto principal, sin omitirlo ni explicarlo dentro del versículo.
  alternative_spanish_readings:
  - omitir la frase por variantes textuales
  - parafrasear para atenuar la aparente tensión
  rationale: El texto griego incluido en SBLGNT contiene οὐδὲ ὁ υἱός. La traducción debe preservar la lectura dada y mantener la tensión teológica en vez de resolverla por paráfrasis. La síntesis doctrinal pertenece a la teología sistemática, no a la traducción.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451); principio POB de preservar la tensión teológica
- issue: Cómo expresar la exclusividad final del Padre
  english_pob_reading: '''except the Father alone'''
  chosen_spanish_reading: «sino solo el Padre»
  alternative_spanish_readings:
  - «excepto el Padre solo»
  - «salvo el Padre únicamente»
  rationale: La construcción griega εἰ μὴ + μόνος restringe el conocimiento exclusivamente al Padre. «Sino solo el Padre» comunica esa exclusividad con naturalidad en español y evita duplicar marcadores de restricción de forma pesada.
  doctrine_reference: Monoteísmo bíblico y paternidad divina en el contexto de Mt 24:36
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura SBLGNT y el audio de revisión en inglés sin cambios sustantivos. Se mantuvo la variante textual con nota, y se eligieron equivalencias españolas naturales para la apertura temática, la negación enfática y la clausura exclusiva.
  spanish_consistency_notes:
  - Usa «Padre» con mayúscula por tratarse de un título divino en contexto.
  - «ni siquiera» se reserva para οὐδέ con fuerza enfática.
  - Se evitó «SEÑOR» porque aquí no aparece κύριος ni un sustituto del nombre divino.
  - Se mantuvo «Hijo» como título cristológico reconocido, no como sustantivo común.
