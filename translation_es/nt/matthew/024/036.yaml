  glossary_alignment: No hay conflictos con la terminología base del proyecto. «el Hijo» y «el Padre» están bien como títulos. No intervienen Yahvé/Mesías/etc. La decisión de no suavizar «ni el Hijo» está correctamente alineada con la racional teológica del POB.
