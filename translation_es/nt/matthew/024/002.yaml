translation:
  language: es
  text: 'Pero él respondió y les dijo[a]: «¿No ven todas estas cosas? En verdad les digo: no quedará aquí ni una piedra sobre otra que no sea derribada[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y les respondió». La expresión griega participio + verbo finito es una fórmula narrativa común; ambas partes se conservan para reflejar la respuesta con énfasis semítico.
    reason: lexical_alternative
  - marker: b
    text: O «ser destruida». El verbo griego puede indicar demolición o desmantelamiento; «ser derribada» conserva mejor la imagen física de una estructura echada abajo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y les dijo
  alternatives_spanish:
  - respondió
  - les dijo en respuesta
  lexicon: BDAG
  rationale: La combinación participio + verbo finito conserva en griego la fórmula narrativa de respuesta. En español, «respondió y les dijo» mantiene ambos elementos sin sonar forzado; «les dijo» explicita el dativo αὐτοῖς.
- source_word: Οὐ βλέπετε
  english_pob_choice: Do you not see
  chosen_spanish: ¿No ven
  alternatives_spanish:
  - ¿No miran
  - ¿No se dan cuenta de
  lexicon: BDAG
  rationale: «Ver» conserva tanto la percepción visual literal como el reconocimiento de lo que Jesús les hace notar. El plural respeta el sujeto implícito del contexto.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: BDAG
  rationale: La combinación de demostrativo neutro plural con πᾶς queda bien como «todas estas cosas», clara y natural en español para el conjunto de edificios/elementos mencionados.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I tell you
  chosen_spanish: En verdad les digo
  alternatives_spanish:
  - De cierto les digo
  - Amén les digo
  lexicon: BDAG
  rationale: «En verdad» preserva la solemnidad idiomática de ἀμήν en español moderno. «Les digo» mantiene la forma de discurso directo y evita una calca menos natural.
- source_word: οὐ μὴ ἀφεθῇ
  english_pob_choice: will be left
  chosen_spanish: no quedará
  alternatives_spanish:
  - no será dejado
  - no permanecerá
  lexicon: BDAG
  rationale: En este contexto arquitectónico, «quedará» expresa con naturalidad la negación enfática de que permanezca en pie algo de la estructura. La fuerza de οὐ μή se conserva con la negación absoluta del conjunto.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: «Aquí» es la equivalencia locativa más directa y natural, y funciona bien en referencia inmediata al templo y su recinto.
- source_word: λίθος ἐπὶ λίθον
  english_pob_choice: one stone ... upon another
  chosen_spanish: piedra sobre piedra
  alternatives_spanish:
  - una piedra sobre otra
  - piedra tras piedra
  lexicon: BDAG
  rationale: El giro idiomático se conserva con la imagen compacta «piedra sobre piedra». En español no es necesario añadir «una» para que la expresión sea transparente.
- source_word: καταλυθήσεται
  english_pob_choice: will be thrown down
  chosen_spanish: ser derribada
  alternatives_spanish:
  - ser demolida
  - ser destruida
  lexicon: BDAG
  rationale: «Derribada» mantiene la imagen física de demolición/caída que el inglés POB quiso preservar con «thrown down». «Demolida» y «destruida» son posibles, pero menos imagéticas.
theological_decisions:
- issue: Alcance de la profecía sobre el templo
  english_pob_reading: A concrete prophecy of total structural destruction is expressed without importing a specific eschatological system beyond the verse itself.
  chosen_spanish_reading: Se expresa una profecía concreta de destrucción estructural total sin añadir un sistema escatológico particular que el versículo no explicita.
  alternative_spanish_readings:
  - Una afirmación principalmente simbólica de juicio
  - Una referencia ya determinada por un marco escatológico posterior
  rationale: La imagen de piedra sobre piedra y de derribo debe permanecer concreta y arquitectónica. La redacción española evita resolver la tensión interpretativa y no introduce explicaciones doctrinales ajenas al texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente: no se registraron cambios necesarios en el texto base. Esta propuesta conserva el tono sobrio, la imaginería de demolición y la negación enfática del griego, ajustándolos a un español publicable y natural.'
  spanish_consistency_notes:
  - Se mantiene «les» para αὐτοῖς, en coherencia con el español bíblico moderno y el referente plural.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el nombre divino ni un título cristológico.
  - «En verdad» traduce la fórmula solemne ἀμήν sin arcaísmo excesivo.
  - «Piedra sobre piedra» conserva el paralelismo idiomático y la amplitud semántica de la demolición total.
