    reason: lexical_alternative
  - marker: b
    text: O «ser destruida». El verbo griego puede indicar demolición o desmantelamiento; «ser derribada» conserva mejor la imagen física de una estructura echada abajo.
    reason: lexical_alternative
  revision_rationale: 'Se revisa la cláusula central para representar con más precisión la fuerza distributiva y totalizante de λίθος ἐπὶ λίθον dentro de la negación enfática: «ni una piedra sobre otra». También se ajusta levemente la nota de «derribada» para describir mejor la imagen de demolición estructural.'
