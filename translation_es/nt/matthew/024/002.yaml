  rationale: 'Se revisa la cláusula central para representar con más precisión la fuerza distributiva y totalizante de λίθος ἐπὶ λίθον dentro de la negación enfática: «ni una piedra sobre otra». También se ajusta levemente la nota de «derribada» para describir mejor la imagen de demolición estructural.'
