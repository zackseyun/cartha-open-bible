review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del POB en inglés: conserva «respondió y les dijo», la pregunta retórica «¿No ven...?», la solemnidad de «En verdad les digo», y la imagen concreta de demolición total del templo. Sin embargo, en «piedra sobre piedra» pierde la explicitación distributiva que el griego λίθος ἐπὶ λίθον y el POB inglés representan como «one stone ... upon another». En español bíblico-natural, «ni una piedra sobre otra» expresa mejor la fuerza totalizante del original junto con οὐ μὴ ἀφεθῇ.'
  spanish_quality_summary: El español es claro, natural y digno. La puntuación y el registro son adecuados. La principal mejora de legibilidad/fidelidad es evitar la secuencia algo menos idiomática «no quedará aquí piedra sobre piedra» y reemplazarla por la forma estable y más precisa «no quedará aquí ni una piedra sobre otra».
  glossary_alignment: 'No hay términos de glosario mayores en juego. Las decisiones léxicas principales están bien alineadas con el proyecto: «En verdad» para ἀμήν, «derribada» para καταλυθήσεται como opción imagética válida, y mantenimiento de la fórmula «respondió y les dijo».'
  issues:
  - severity: medium
    issue: La expresión «no quedará aquí piedra sobre piedra» omite el matiz de «ni una/una ... sobre otra».
    rationale: El griego λίθος ἐπὶ λίθον en esta construcción negativa expresa que no quedará ni una sola piedra en su lugar sobre otra. La formulación española más fiel y natural es «no quedará aquí ni una piedra sobre otra».
  - severity: low
    issue: La nota léxica de «derribada» habla de «caída» más que de acción de demolición.
    rationale: No es incorrecta, pero puede afinarse para reflejar mejor que καταλύω aquí se refiere a desmantelar/demoler una estructura, no solo a una caída pasiva.
