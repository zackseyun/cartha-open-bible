translation:
  language: es
  text: y comienza a golpear a sus compañeros esclavos[a], y come y bebe con los borrachos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «coesclavos». El griego subraya su condición compartida bajo un mismo amo.
    reason: alternative_reading
  - marker: b
    text: O «con los que se emborrachan». El participio griego puede referirse a quienes se caracterizan por la embriaguez.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρξηται
  english_pob_choice: begins
  chosen_spanish: comienza
  alternatives_spanish:
  - empieza
  - se pone a
  lexicon: BDAG
  rationale: El aoristo subjuntivo medio de ἄρχω, con infinitivo, expresa inicio de acción. «Comienza» conserva ese matiz inceptivo en español con un registro natural y digno.
- source_word: τύπτειν
  english_pob_choice: to beat
  chosen_spanish: golpear
  alternatives_spanish:
  - pegar
  - azotar
  - dar golpes a
  lexicon: BDAG
  rationale: τύπτω significa golpear o pegar. En este contexto de abuso hacia subordinados, «golpear» comunica violencia real sin añadir por sí mismo la idea de castigo formal que «azotar» podría sugerir.
- source_word: συνδούλους
  english_pob_choice: fellow slaves
  chosen_spanish: consiervos
  alternatives_spanish:
  - compañeros esclavos
  - fellow slaves (transliterado en nota)
  - siervos compañeros
  lexicon: BDAG
  rationale: El griego indica literalmente «coesclavos». Para el español, «consiervos» conserva la relación compartida dentro de la casa del amo, pero evita una expresión pesada. Dado que la tradición POB favorece «esclavo» cuando el vínculo de propiedad es central, aquí se mantiene la idea de subordinación sin perder fluidez.
- source_word: ἐσθίῃ ... καὶ πίνῃ
  english_pob_choice: eats and drinks
  chosen_spanish: come y bebe
  alternatives_spanish:
  - come y toma
  - come y está bebiendo
  - banquetea y bebe
  lexicon: BDAG
  rationale: Los presentes subjuntivos describen conducta característica. «Come y bebe» reproduce la pareja verbal de modo simple, sin intensificar indebidamente la escena como si necesariamente se tratara de un banquete.
- source_word: μετὰ τῶν μεθυόντων
  english_pob_choice: with drunkards
  chosen_spanish: con los borrachos
  alternatives_spanish:
  - con los que se emborrachan
  - con los ebrios
  - con quienes se embriagan
  lexicon: BDAG
  rationale: El participio presente μεθυόντων puede describir a quienes se caracterizan por la embriaguez. «Con los borrachos» comunica bien esa caracterización en español y coincide con la revisión más directa del inglés POB.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  lexicon: BDAG
  rationale: Aquí δέ es conectivo suave, no adversativo fuerte. «Y» conserva el flujo de la enumeración moral sin introducir contraste innecesario.
theological_decisions:
- issue: συνδούλους y la terminología esclavo/siervo
  english_pob_reading: fellow slaves
  chosen_spanish_reading: consiervos
  alternative_spanish_readings:
  - compañeros esclavos
  - consiervos esclavos
  - siervos
  rationale: El audit trail inglés subraya la condición compartida de esclavos bajo un solo amo. En español, «consiervos» preserva la relación mutua y evita diluir el trasfondo social. Aunque «siervos» es más tradicional, aquí puede suavizar indebidamente la fuerza del término griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; tabla de términos controvertidos para δοῦλος
- issue: μεθυόντων y la caracterización habitual
  english_pob_reading: drunkards
  chosen_spanish_reading: los borrachos
  alternative_spanish_readings:
  - los que se emborrachan
  - los ebrios
  - los bebedores
  rationale: El participio presente puede señalar una conducta habitual, no solo un estado momentáneo. «Los borrachos» funciona como caracterización de personas marcadas por la embriaguez y es congruente con el valor lexical documentado en el contexto auditado.
  doctrine_reference: BDAG sobre μεθύω; nota lexical del POB inglés
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió «drunkards» sobre «those who get drunk» para representar de manera más directa el participio μεθυόντων. En español, se siguió esa línea con «los borrachos», manteniendo al mismo tiempo la posibilidad de una lectura caracterizadora mediante nota. También se preservó la fuerza social de συνδούλους sin recurrir automáticamente a «siervos».
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando corresponda; este versículo no la contiene.
  - Se evitó «Cristo» porque el texto no incluye Χριστός.
  - «Consiervos» mantiene la relación de pertenencia compartida; si en el contexto editorial se prefiere mayor transparencia, la nota a ofrece la alternativa literal «compañeros esclavos».
  - La puntuación sigue la coordinación del griego con dos segmentos unidos por καὶ/δὲ, sin añadir énfasis interpretativo.
