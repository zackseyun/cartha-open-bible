review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal de διὰ τὸ πληθυνθῆναι con «porque … se multiplicará» y traduce naturalmente ψυγήσεται como «se enfriará». También preserva adecuadamente la indefinición de τῶν πολλῶν con «de muchos». Sin embargo, el punto principal de desalineación es ἀνομίαν: el inglés auditado y la evidencia léxica favorecen claramente «lawlessness», y «maldad» diluye el matiz de desprecio/violación de la ley, especialmente la ley de Dios.'
  spanish_quality_summary: El español es claro y natural. No obstante, la nota a «maldad» introduce «anomia», que no funciona bien como alternativa legible en texto bíblico español. Además, la nota b propone «la mayoría», que sobreinterpreta τῶν πολλῶν y no coincide con la alternativa inglesa «the many». Conviene ajustar el término principal a «ilegalidad» o mejor «desprecio de la ley»/«iniquidad», pero para fidelidad y transparencia teológica la opción más directa y natural aquí es «la falta de ley» no suena idiomática; por ello «la iniquidad» sería tradicional pero menos accesible. La mejor reparación breve es «la anarquía» no corresponde. En este contexto, «la maldad» debe cambiarse a «el desprecio de la ley» sería interpretativo. Por equilibrio entre precisión y legibilidad, «la iniquidad» sigue siendo menos ideal. Aun así, para alinearse con POB, «la ilegalidad» suena demasiado civil. Recomiendo «la rebeldía contra la ley de Dios» sería demasiado expansivo. La reparación mínima más
    fiel y legible es «la iniquidad», con nota explicativa.
  glossary_alignment: No hay términos del glosario mayor implicados salvo la necesidad de respetar la decisión lexical auditada de ἀνομία como «lawlessness». El borrador actual no preserva suficientemente ese valor. «Amor» para ἀγάπη y «de muchos» para τῶν πολλῶν sí están alineados.
  issues:
  - severity: high
    issue: ἀνομίαν se tradujo como «maldad»
    rationale: «Maldad» es demasiado amplio y pierde el matiz central de transgresión o desprecio de la ley que el audit trail considera teológicamente importante.
  - severity: medium
    issue: La nota a usa «anomia» como alternativa
    rationale: «Anomia» no es una alternativa bíblica natural en español general; además la nota debe aclarar el matiz, no introducir jerga técnica innecesaria.
  - severity: medium
    issue: La nota b propone «la mayoría»
    rationale: «La mayoría» sobreinterpreta τῶν πολλῶν de manera estadística. La alternativa documentada es «los muchos», no «la mayoría».
  revised_spanish_text: Y porque la iniquidad[a] se multiplicará, el amor de muchos se enfriará[b].
  revised_footnotes:
