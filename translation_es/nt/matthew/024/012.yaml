revisions:
- from: Y porque la maldad[a] se multiplicará, el amor de muchos se enfriará[b].
  to: Y porque la iniquidad[a] se multiplicará, el amor de muchos se enfriará[b].
  rationale: Se revisa ἀνομίαν para reflejar mejor el valor de «lawlessness» documentado en la auditoría, evitando el exceso de amplitud de «maldad». También se corrigen las notas para que conserven las alternativas auditadas sin sobreinterpretar τῶν πολλῶν.
  reviewer_model: gpt-5.4
