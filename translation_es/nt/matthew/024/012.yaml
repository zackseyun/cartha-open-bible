translation:
  language: es
  text: Y porque la iniquidad[a] se multiplicará, el amor de muchos se enfriará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque aumentará la violación de la ley»; el griego se refiere a la transgresión o desprecio de la ley, especialmente la de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el amor de los muchos se enfriará»; el griego no especifica qué grupo exacto está en vista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ πληθυνθῆναι
  english_pob_choice: because ... will be multiplied
  chosen_spanish: porque ... se multiplicará
  alternatives_spanish:
  - debido a que ... se multiplicará
  - por el hecho de que ... se multiplicará
  - porque ... aumentará
  lexicon: BDAG
  rationale: La construcción causal con διά + articular infinitivo se expresa naturalmente en español con «porque». El infinitivo aoristo pasivo πληθυνθῆναι conserva mejor la idea verbal con «se multiplicará» que con una nominalización demasiado pesada.
- source_word: ἀνομίαν
  english_pob_choice: lawlessness
  chosen_spanish: maldad
  alternatives_spanish:
  - anomia
  - desobediencia a la ley
  - iniquidad
  lexicon: BDAG
  rationale: El sentido básico es la ausencia o violación de la ley de Dios. En español, «maldad» comunica bien la fuerza moral del término, aunque es más amplio que «anomia». Se evita «iniquidad» por ser más tradicional y menos transparente; «anomia» se reserva como posible término técnico, pero no como opción principal aquí.
- source_word: ψυγήσεται
  english_pob_choice: will grow cold
  chosen_spanish: se enfriará
  alternatives_spanish:
  - se volverá fría
  - se enfriará poco a poco
  - será enfriado
  lexicon: BDAG
  rationale: El verbo expresa enfriamiento emocional o relacional. «Se enfriará» conserva la metáfora en español de forma natural y fiel, sin volverla demasiado literal o pasiva.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor fraternal
  - caridad
  - afecto
  lexicon: BDAG
  rationale: «Amor» es la equivalencia directa y mantiene el alcance relacional/covenantal del término sin restringirlo de antemano a una sola esfera.
- source_word: τῶν πολλῶν
  english_pob_choice: of many
  chosen_spanish: de muchos
  alternatives_spanish:
  - de la mayoría
  - de los muchos
  - de la gente
  lexicon: BDAG
  rationale: «De muchos» es la forma idiomática más natural en español y preserva la indefinición del grupo. No se precisa si son discípulos, personas en general, o un conjunto mixto.
theological_decisions:
- issue: Alcance de «el amor de muchos»
  english_pob_reading: Rendered without specifying whether this refers to humanity in general, professed disciples, or a mixed group.
  chosen_spanish_reading: Se traduce sin especificar si se refiere a la humanidad en general, a discípulos profesantes o a un grupo mixto.
  alternative_spanish_readings:
  - el amor entre los creyentes se enfriará
  - el amor humano en la sociedad se enfriará
  rationale: El griego τῶν πολλῶν es indefinido. La traducción conserva esa amplitud y no resuelve la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin cerrarla interpretativamente.
- issue: Valor de ἀνομίαν
  english_pob_reading: lawlessness
  chosen_spanish_reading: maldad / ausencia de ley de Dios
  alternative_spanish_readings:
  - anomia
  - iniquidad
  - impiedad
  rationale: El término apunta a la violación o desprecio de la ley divina. «Maldad» comunica el efecto moral en español, y la nota lexical deja constancia del matiz legal/teológico.
  doctrine_reference: Mantener el forcejeo entre valor moral y valor jurídico del término.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el rastro auditado en inglés, manteniendo la causalidad de διὰ τὸ πληθυνθῆναι, la metáfora de enfriamiento de ψυγήσεται y la indefinición de τῶν πολλῶν sin resolverla de antemano. No se requieren revisiones adicionales respecto al último pase auditado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se evita «Señor» como sustituto automático, ya que no corresponde a este versículo.
  - Se mantiene un español moderno y publicable, con metáfora bíblica conservada donde el griego la emplea.
  - La puntuación y el orden siguen el ritmo natural del español sin perder la estructura causal del original.
