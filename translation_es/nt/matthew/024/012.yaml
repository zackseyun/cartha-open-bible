    text: 'O: «porque aumentará la violación de la ley»; el griego se refiere a la transgresión o desprecio de la ley, especialmente la de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el amor de los muchos se enfriará»; el griego no especifica qué grupo exacto está en vista.'
    reason: lexical_alternative
  revision_rationale: Se revisa ἀνομίαν para reflejar mejor el valor de «lawlessness» documentado en la auditoría, evitando el exceso de amplitud de «maldad». También se corrigen las notas para que conserven las alternativas auditadas sin sobreinterpretar τῶν πολλῶν.
