translation:
  language: es
  text: 'Pero si aquel siervo[a] malvado dice en su corazón: «Mi amo[b] se demora»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavo». El griego doulos puede significar «siervo» o «esclavo», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «mi señor». En esta escena, κύριος designa al superior doméstico del relato.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: BDAG
  rationale: La construcción condicional se mantiene con «si», y «pero» conserva el matiz de transición/contraste de δέ en un español natural.
- source_word: εἴπῃ
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijere
  - diga
  lexicon: BDAG
  rationale: En español, el presente de indicativo funciona bien para una condición general y evita un giro rígido o arcaizante.
- source_word: ὁ κακὸς δοῦλος ἐκεῖνος
  english_pob_choice: that wicked servant
  chosen_spanish: aquel siervo malo
  alternatives_spanish:
  - aquel siervo perverso
  - aquel esclavo malo
  lexicon: BDAG
  rationale: «Aquel» conserva el demostrativo enfático de ἐκεῖνος. Se mantiene «siervo» como equivalente narrativo en la casa/parábola, y «malo» traduce κακός con sencillez directa. El orden «siervo malo» permite la nota lexical sobre la alternativa «esclavo».
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí mismo
  - dentro de sí
  lexicon: BDAG
  rationale: Es una expresión idiomática que conserva la imagen interior del pensamiento o autoexhortación sin forzar una paráfrasis.
- source_word: Χρονίζει
  english_pob_choice: is delaying
  chosen_spanish: se tarda
  alternatives_spanish:
  - está tardando
  - se demora
  lexicon: BDAG
  rationale: «Se tarda» expresa con naturalidad la idea de demora percibida en el contexto de la parábola. «Se demora» también sería válido, pero «se tarda» es más directo en español contemporáneo.
- source_word: μου ὁ κύριος
  english_pob_choice: My master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi dueño
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefirió «master» por el contexto doméstico, en español «señor» comunica con claridad la relación de superioridad dentro de la escena. Se evita «Señor» con mayúscula porque aquí no es una designación teológica explícita en la voz del siervo.
theological_decisions:
- issue: Qué matiz dar a κύριος en la voz del siervo dentro de la parábola
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  rationale: En la escena inmediata, κύριος funciona como superior doméstico. «Señor» mantiene el valor relacional y es perfectamente idiomático en español; no se capitaliza para no importar una lectura cristológica directa que el contexto inmediato no exige.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; Translation philosophy #1 y #5'
- issue: Cómo reflejar δοῦλος sin perder la tensión lexical entre 'servant' y 'slave'
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  - criado
  rationale: «Siervo» permite conservar la ambigüedad controlada entre servicio y sujeción, y es una opción aceptable en español para el contexto parabólico. La alternativa «esclavo» se preserva como posibilidad lexical, pero no se adopta en el texto principal por el registro y la fluidez de la escena.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy #1 y #5'
translation_notes:
  revision_awareness: La versión española se ajusta al testimonio griego directo y al audit trail inglés, corrigiendo la validación anterior mediante anclajes explícitos [a], [b] y [c] en el texto principal.
  spanish_consistency_notes:
  - Se conserva el orden natural del español, pero se mantiene la fuerza demostrativa de ἐκεῖνος con «aquel».
  - Se evita la mayúscula teológica en «señor» porque el contexto inmediato es parabólico y doméstico.
  - Se deja visible la alternativa lexical entre «siervo» y «esclavo» para auditar la elección sin alterar la lectura principal.
