  to: Y el que está en el campo no vuelva atrás para tomar su prenda[a].
  rationale: Se mantiene toda la estructura del borrador, pero se ajusta ἱμάτιον de «manto» a «prenda» para reflejar mejor el valor léxico amplio del griego y la auditoría inglesa, evitando un matiz innecesariamente estrecho o literario. La nota conserva alternativas más específicas y contextualmente plausibles.
