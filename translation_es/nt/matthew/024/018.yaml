translation:
  language: es
  text: Y el que está en el campo no vuelva atrás para tomar su prenda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su manto» o «su prenda exterior».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐν τῷ ἀγρῷ
  english_pob_choice: the one in the field
  chosen_spanish: el que está en el campo
  alternatives_spanish:
  - el hombre que está en el campo
  - quien está en el campo
  lexicon: BDAG
  rationale: La frase con artículo funciona de modo sustantivo y denota a una persona caracterizada por estar en el campo. «El que está en el campo» conserva el valor singular y representativo sin restringir indebidamente el referente a varón, en línea con la decisión auditada en inglés.
- source_word: μὴ ἐπιστρεψάτω
  english_pob_choice: let ... not turn back
  chosen_spanish: no vuelva atrás
  alternatives_spanish:
  - no regrese
  - no se dé vuelta
  lexicon: BDAG
  rationale: El aoristo imperativo con μή expresa prohibición. En español, «no vuelva atrás» comunica con naturalidad la orden urgente y mantiene la fuerza imperativa sin volverla meramente descriptiva.
- source_word: ὀπίσω
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - de vuelta
  - hacia atrás
  lexicon: BDAG
  rationale: En combinación con ἐπιστρέφω, ὀπίσω es idiomático y significa «atrás»/«de vuelta», no simplemente una ubicación espacial abstracta. «Atrás» es conciso y natural en español.
- source_word: ἆραι
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - llevarse
  - recoger
  lexicon: BDAG
  rationale: 'Aquí el infinitivo expresa propósito tras el verbo de movimiento: volver para tomar algo. «Tomar» es la equivalencia más directa y transparente en español.'
- source_word: τὸ ἱμάτιον αὐτοῦ
  english_pob_choice: his cloak
  chosen_spanish: su manto
  alternatives_spanish:
  - su vestido
  - su prenda exterior
  - su capa
  lexicon: BDAG
  rationale: ἱμάτιον suele referirse a una prenda exterior. «Manto» comunica bien esa idea en español bíblico contemporáneo y evita reducir innecesariamente el sentido a una sola prenda moderna.
theological_decisions:
- issue: Representación de género en el artículo sustantivado masculino
  english_pob_reading: the one in the field
  chosen_spanish_reading: el que está en el campo
  alternative_spanish_readings:
  - el hombre que está en el campo
  rationale: El griego usa una forma masculina gramatical, pero el contexto es representativo/generico. Se evita estrechar el referente a varones, preservando el foco en cualquier persona que esté en el campo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El cruce con el texto griego y el audit trail inglés muestra plena concordancia en la estructura prohibitiva, el valor representativo de ὁ ἐν τῷ ἀγρῷ y el sentido de ἱμάτιον como prenda exterior. No se registran revisiones posteriores que requieran ajuste.
  spanish_consistency_notes:
  - Se mantuvo «atrás» para ὀπίσω por su naturalidad idiomática en español.
  - Se evitó «SEÑOR» u otra convención irrelevante, ya que el versículo no contiene el nombre divino.
  - «Manto» preserva la referencia a una prenda exterior sin forzar una modernización excesiva.
