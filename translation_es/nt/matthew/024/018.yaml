review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: sujeto sustantivado genérico («el que está en el campo»), prohibición urgente («no vuelva atrás»), propósito infinitivo («para tomar») y objeto personal. Sin embargo, «manto» introduce un matiz algo más específico y literario que no preserva tan bien como en inglés la gama léxica documentada de ἱμάτιον (‘cloak/garment/outer garment’).'
  spanish_quality_summary: La redacción es natural y clara en español eclesial contemporáneo. La única mejora recomendable es sustituir «manto» por una opción más transparente y menos potencialmente arcaizante o especializada para lectores amplios, manteniendo la nota de alternativa léxica.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión de género inclusivo («el que está en el campo») está bien alineada con la filosofía auditada. El punto léxico relevante es ἱμάτιον: conviene una base española más amplia, como «prenda», con nota para «manto»/«prenda exterior».'
  issues:
  - severity: medium
    issue: «su manto» puede estrechar o estilizar demasiado ἱμάτιον
    rationale: ἱμάτιον denota de manera general una prenda de vestir, frecuentemente exterior. «Manto» funciona, pero en español actual puede sonar más literario o específico que el abanico documentado en la auditoría inglesa. «Prenda» preserva mejor el núcleo semántico y permite retener la especificidad en nota.
  - severity: low
    issue: La nota actual omite la alternativa más directa «su manto»
    rationale: Si se adopta una base más amplia en el texto, conviene conservar «manto» como alternativa léxica válida, ya que forma parte de las posibilidades naturales en español para ἱμάτιον en contexto bíblico.
