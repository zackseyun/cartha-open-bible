translation:
  language: es
  text: Bienaventurado aquel esclavo[a] a quien su señor, cuando venga, hallará actuando así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dichoso». El griego μακάριος expresa una bienaventuranza de tono religioso, no solo emoción o fortuna.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: BDAG
  rationale: Conserva el tono de bienaventuranza y el peso religioso/covenantal del griego mejor que «feliz», que en español suena demasiado subjetivo o emotivo.
- source_word: δοῦλος
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «servant» por naturalidad en contexto parabólico, el término griego es δοῦλος y el proyecto privilegia su fuerza léxica cuando el contexto no exige suavizarla. «Esclavo» mantiene mejor la relación de pertenencia y subordinación del original.
- source_word: ἐκεῖνος
  english_pob_choice: that
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - el
  lexicon: BDAG
  rationale: «Aquel» reproduce la fuerza demostrativa de ἐκεῖνος y conserva la referencia específica al esclavo ya introducido.
- source_word: ἐλθὼν
  english_pob_choice: when he comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - habiendo venido
  - al venir
  lexicon: BDAG
  rationale: La cláusula temporal expresa con naturalidad la relación temporal del participio aoristo en español; «cuando venga» es claro y fiel sin volver la frase rígida.
- source_word: κύριος
  english_pob_choice: master / lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - maestro
  - dueño
  lexicon: BDAG
  rationale: En la escena parabólica, κύριος designa al superior del esclavo. «Señor» conserva la relación de autoridad sin introducir necesariamente la carga cristológica de «Señor» en mayúscula. «Amo» sería más fuerte socialmente, pero aquí el texto y la tradición POB en inglés mantienen un término de autoridad más neutral.
- source_word: εὑρήσει
  english_pob_choice: will find
  chosen_spanish: hallará
  alternatives_spanish:
  - encontrará
  lexicon: BDAG
  rationale: «Hallará» y «encontrará» son equivalentes; «hallará» mantiene un registro ligeramente más bíblico y funciona bien con la cadencia de la bienaventuranza.
- source_word: οὕτως ποιοῦντα
  english_pob_choice: doing so
  chosen_spanish: haciendo así
  alternatives_spanish:
  - obrando así
  - actuando así
  lexicon: BDAG
  rationale: La expresión apunta de manera anafórica a la conducta descrita en el versículo anterior. «Haciendo así» reproduce esa referencia sin sobreespecificar la acción.
theological_decisions:
- issue: κύριος en una parábola de esclavo y señor
  english_pob_reading: Lowercase 'master/lord' for the servant's human superior within the parable, while preserving possible eschatological overtones in context
  chosen_spanish_reading: «señor» en minúscula para el superior humano dentro de la parábola
  alternative_spanish_readings:
  - «Señor» con mayúscula si se leyera más directamente como referencia a Cristo
  - «amo» para enfatizar la relación de propiedad/autoridad
  rationale: La gramática inmediata identifica al κύριος como superior del esclavo dentro de la parábola. Traducirlo con mayúscula resolvería interpretativamente más de lo que el versículo exige. «Señor» en minúscula preserva la tensión entre sentido narrativo y posible trasfondo cristológico.
  doctrine_reference: 'DOCTRINE.md: κύριος con traducción sensible al contexto; preservar la tensión teológica cuando el pasaje es parabólico'
- issue: δοῦλος y la fuerza social del término
  english_pob_reading: servant in English for idiomatic readability, while acknowledging the lexical force of δοῦλος
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: En español, «siervo» podría suavizar demasiado la relación de dependencia. Dado que el POB audita el término como δοῦλος y no como un vocablo más genérico, «esclavo» conserva mejor la fuerza semántica del original en este contexto.
  doctrine_reference: 'DOCTRINE.md: δοῦλος normalmente ''esclavo'' donde el peso léxico lo requiere'
translation_notes:
  revision_awareness: El inglés POB pasó de 'lord' a 'master' en una revisión posterior para κύριος, buscando mayor naturalidad contextual con δοῦλος. El español conserva la misma lectura contextual de superior humano, pero la expresa con «señor», que en español puede funcionar como equivalente neutral y reverente sin capitalización teológica. También se siguió la fuerza léxica de δοῦλος más de cerca que la versión inglesa, porque en español 'esclavo' resulta auditable y no requiere suavización para esta línea.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico digno sin arcaísmo excesivo.
  - Se evitó capitalizar «Señor» para no resolver prematuramente la tensión parabólica.
  - «Haciendo así» preserva la referencia anafórica a la conducta anterior sin añadir contenido interpretativo.
  - La puntuación sigue el sentido del griego y del flujo de la oración principal con cláusula temporal.
