revisions:
- from: Bienaventurado[a] aquel esclavo a quien su señor, cuando venga, hallará haciendo así.
  to: Bienaventurado aquel esclavo[a] a quien su señor, cuando venga, hallará actuando así.
  rationale: 'Se corrige la nota de μακάριος para que aporte una alternativa real y se coloca el marcador en una posición limpia. También se ajusta «haciendo así» a «actuando así» para mejorar la naturalidad del español sin perder el valor anafórico de οὕτως ποιοῦντα. El resto del texto puede mantenerse: «esclavo» es defendible por la política léxica del proyecto y «señor» en minúscula preserva el contexto parabólico.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:21:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: μακάριος + sujeto demostrado, participio temporal ἐλθὼν como «cuando venga», futuro εὑρήσει como «hallará», y οὕτως ποιοῦντα con referencia anafórica. Sin embargo, hay dos desajustes con la auditoría POB y la legibilidad española: (1) la nota [a] está mal planteada porque repite la misma palabra del texto en vez de ofrecer una alternativa real; (2) «haciendo así» suena algo calcado en español bíblico corriente, y «actuando así» comunica mejor el valor anafórico sin perder fidelidad. Además, dado que la revisión inglesa final prefirió «master», conviene en español mantener «señor» pero explicarlo mejor en nota como alternativa contextual a «amo»/«maestro» si se nota ambigüedad.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero la combinación «Bienaventurado[a]» es defectuosa porque el anclaje de nota interrumpe una palabra sin necesidad y la nota no justifica una alternativa útil. «Bienaventurado» funciona bien en registro bíblico; «aquel esclavo» es comprensible; «su señor» es natural en parábola y evita una mayúscula interpretativa; «hallará» es aceptable. La mejora principal es reemplazar «haciendo así» por «actuando así» para un español más fluido.
  glossary_alignment: 'Alineación parcialmente buena con los términos del proyecto: δοῦλος como «esclavo» es defendible según la política por defecto, aunque el inglés contextualizó «servant»; κύριος como «señor» en minúscula está bien en esta parábola; no hay conflicto con Yahvé/Mesías. La nota de μακάριος debe corregirse para presentar una alternativa real como «dichoso», no repetir «bienaventurado».'
  issues:
  - severity: medium
    issue: La nota [a] de «Bienaventurado[a]» no ofrece una alternativa genuina y está mal anclada.
    rationale: El texto principal ya dice «Bienaventurado», pero la nota dice «O «bienaventurado»», lo cual no añade información. Además, insertar el marcador dentro de la palabra resulta tipográficamente torpe. La nota debe o eliminarse o ofrecer una alternativa real como «dichoso».
  - severity: medium
    issue: «Haciendo así» suena poco natural en español.
    rationale: Aunque es formalmente cercano a οὕτως ποιοῦντα, en español bíblico general «actuando así» u «obrando así» conserva mejor la referencia al comportamiento previo sin sonar calcado.
  - severity: low
    issue: No se conserva en nota la posible alternativa contextual para κύριος.
    rationale: No es obligatorio, pero dado el historial inglés entre «lord» y «master», una nota opcional podría aclarar que aquí «señor» se refiere al superior humano del esclavo. No hace falta adjudicación mayor.
  revised_spanish_text: Bienaventurado aquel esclavo[a] a quien su señor, cuando venga, hallará actuando así.
  revised_footnotes:
  - marker: a
    text: O «dichoso». El griego μακάριος expresa una bienaventuranza de tono religioso, no solo emoción o fortuna.
    reason: alternative_reading
  revision_rationale: 'Se corrige la nota de μακάριος para que aporte una alternativa real y se coloca el marcador en una posición limpia. También se ajusta «haciendo así» a «actuando así» para mejorar la naturalidad del español sin perder el valor anafórico de οὕτως ποιοῦντα. El resto del texto puede mantenerse: «esclavo» es defendible por la política léxica del proyecto y «señor» en minúscula preserva el contexto parabólico.'
