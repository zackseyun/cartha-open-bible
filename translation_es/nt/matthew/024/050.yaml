translation:
  language: es
  text: vendrá el amo[a] de aquel esclavo[b] el día que no espera y a una hora que no sabe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor» o «dueño». El griego κύριος puede significar «señor» o «amo»; aquí se refiere al superior humano dentro de la parábola.
    reason: lexical_alternative
  - marker: b
    text: O «siervo» o «sirviente». El griego δοῦλος denota una relación de servicio forzado o vinculado; se traduce «esclavo» porque ese estatus es saliente en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - llegará
  - vendrá
  lexicon: BDAG
  rationale: El futuro de ἥκω expresa llegada o venida. En español, «vendrá» reproduce de forma natural la idea de la llegada inesperada del superior en el marco de la parábola, sin perder el movimiento futuro del verbo.
- source_word: κύριος
  english_pob_choice: master
  chosen_spanish: dueño
  alternatives_spanish:
  - señor
  - amo
  - dueño
  lexicon: BDAG
  rationale: Aquí κύριος nombra al superior humano dentro de la escena parabólica. «Dueño» comunica con claridad la relación de posesión y autoridad en español sin introducir la lectura reverencial de «Señor».
- source_word: δοῦλου
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - esclavo
  lexicon: BDAG
  rationale: El contexto de relación servil dependiente hace saliente el sentido fuerte de δοῦλος. «Esclavo» preserva esa fuerza social y evita suavizar indebidamente el término.
- source_word: ἐκείνου
  english_pob_choice: that
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: El demostrativo retoma al esclavo específico ya mencionado. «Aquel» mantiene la distancia referencial y suena natural en español.
- source_word: ἐν ἡμέρᾳ ᾗ
  english_pob_choice: on a day
  chosen_spanish: en un día
  alternatives_spanish:
  - en un día en que
  - el día en que
  lexicon: BDAG
  rationale: La construcción temporal se conserva de forma directa. «En un día» mantiene la indefinición del original; el relativo siguiente completa la frase sin sobrerreformularla.
- source_word: οὐ προσδοκᾷ
  english_pob_choice: he does not expect
  chosen_spanish: no espera
  alternatives_spanish:
  - no lo espera
  - no lo anticipa
  lexicon: BDAG
  rationale: προσδοκάω significa esperar o aguardar. En español, «no espera» es la forma más natural y concisa para expresar la expectativa ausente del esclavo.
- source_word: ἐν ὥρᾳ ᾗ
  english_pob_choice: at an hour
  chosen_spanish: a una hora
  alternatives_spanish:
  - a la hora
  - a una hora en que
  lexicon: BDAG
  rationale: Se conserva el paralelismo día/hora del griego. «A una hora» refleja la referencia temporal puntual sin añadir contenido interpretativo.
- source_word: οὐ γινώσκει
  english_pob_choice: he does not know
  chosen_spanish: no sabe
  alternatives_spanish:
  - no conoce
  - no sabe
  lexicon: BDAG
  rationale: γινώσκω aquí tiene el sentido simple de conocer o saber. «No sabe» es idiomático en español y mantiene el paralelismo con «no espera».
theological_decisions:
- issue: κύριος en contexto parabólico como título divino o humano
  english_pob_reading: master
  chosen_spanish_reading: dueño
  alternative_spanish_readings:
  - señor
  - amo
  rationale: El sujeto es el superior humano de la parábola, no una referencia directa al título divino. «Dueño» evita una lectura cristológica automática y conserva la escena social del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος; context governs whether the term denotes a divine title or a human superior.'
- issue: δοῦλος y la fuerza social del término
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: La guía doctrinal favorece mantener la fuerza de pertenencia y dependencia cuando el contexto la hace saliente. En una relación amo-esclavo, «esclavo» preserva mejor la tensión del texto que una forma suavizada.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy example for doulos; Contested terms table for δοῦλος.'
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo entre revisiones y no requiere cambios respecto del análisis auditado más reciente; se mantiene la decisión de traducir κύριος y δοῦλος con términos que preservan la relación social del contexto parabólico.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre un superior humano de la parábola y un título divino, por lo que no se usó «Señor» en el texto principal.
  - Se preservó la fuerza de δοῦλος con «esclavo», siguiendo la preferencia documental cuando la condición de dependencia es central.
  - El paralelismo «día / hora» se mantuvo de manera directa para conservar el ritmo y la estructura temporal del griego.
  - Las formas verbales en presente («espera», «sabe») reflejan el valor natural de la negación en español y conservan el paralelismo del original.
