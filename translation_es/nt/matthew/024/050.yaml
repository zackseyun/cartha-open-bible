  source_alignment_summary: 'El borrador refleja bien la estructura del griego: futuro de llegada, relación entre superior humano y esclavo, y el paralelismo temporal día/hora con indefinición. Sin embargo, «dueño» para κύριος no sigue tan de cerca la decisión auditada del POB («master») como «amo», y la nota b está internamente errada porque ofrece «esclavo» como alternativa cuando ese es precisamente el término elegido.'
  spanish_quality_summary: La frase es comprensible y natural, pero «en un día» suena menos idiomático que «el día que» o «en el día en que» en español corriente; aun así, puede mantenerse para preservar la indefinición si se ajusta levemente la sintaxis. «Amo» encaja mejor con «esclavo» en registro parabólico-bíblico que «dueño», y evita un matiz meramente posesivo.
  glossary_alignment: Alinea bien con la preferencia del proyecto por «esclavo» para δοῦλος en contextos de servidumbre. Para κύριος en contexto humano, «amo» corresponde mejor al valor de «master» documentado en el rastro inglés que «dueño». No hay conflicto con la política de «Yahvé», pues κύριος aquí no es título divino.
  issues:
  - severity: medium
    issue: κύριος traducido como «dueño» en vez de «amo»
    rationale: Aunque «dueño» no es imposible, la decisión inglesa auditada privilegia «master» por la relación social superior-esclavo. En español bíblico y parabólico, «amo» expresa mejor esa relación que «dueño», que puede sonar más posesivo o comercial.
  - severity: medium
    issue: Nota al pie b contiene una alternativa incorrecta
    rationale: La nota dice «O “esclavo” o “siervo”» cuando el texto principal ya usa «esclavo». Debe ofrecer alternativas reales, por ejemplo «siervo» o «sirviente», y explicar por qué se mantiene «esclavo».
  - severity: low
    issue: «en un día» es algo rígido en español
    rationale: Es una reproducción muy literal de ἐν ἡμέρᾳ ᾗ. Una forma como «el día que» suena más natural sin perder el sentido, aunque aquí no es un error grave.
