review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: una declaración solemne seguida de la promesa de poner al siervo sobre todos los bienes del amo. Sin embargo, ''lo pondrá'' debilita el matiz administrativo de καταστήσει (''nombrará/designará/pondrá a cargo''), y ''De cierto'' suena más arcaico y menos natural para el español meta que una fórmula solemne moderna como ''En verdad''.'
  spanish_quality_summary: El español es comprensible, pero 'De cierto les digo' suena marcado por registro tradicional y menos natural para un español neutral contemporáneo. 'Lo pondrá sobre...' también puede sonar algo físico o impreciso; 'lo pondrá a cargo de' o 'lo nombrará sobre' expresa mejor la idea de encargo/administración. La nota al pie necesita puntuación normalizada sin comillas innecesarias dentro del texto de la nota.
  glossary_alignment: No hay términos del glosario principal en conflicto. La revisión propuesta mejora la correspondencia con la decisión léxica inglesa de καταστήσει = 'appoint' y mantiene la alternativa documentada para τοῖς ὑπάρχουσιν.
  issues:
  - severity: medium
    issue: Fórmula inicial 'De cierto les digo'
    rationale: Aunque no es infiel, suena más arcaica/tradicional que el objetivo de español moderno y digno. 'En verdad les digo' conserva la solemnidad de ἀμὴν con mejor naturalidad.
  - severity: medium
    issue: Renderización de καταστήσει como 'lo pondrá'
    rationale: El verbo griego en este contexto expresa nombramiento o designación a una responsabilidad. 'Lo pondrá' es posible, pero menos preciso que 'lo pondrá a cargo de' o 'lo nombrará sobre'.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: 'La nota ''O: «sobre todo lo que tiene».'' puede normalizarse a ''O: "sobre todo lo que tiene".'' o, mejor, sin comillas españolas incrustadas para mayor limpieza editorial.'
  revised_spanish_text: En verdad les digo que lo pondrá a cargo de todas sus posesiones[a].
