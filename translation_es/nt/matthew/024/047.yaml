translation:
  language: es
  text: En verdad les digo que lo pondrá a cargo de todas sus posesiones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "sobre todo lo que tiene".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - Amén
  - Ciertamente
  lexicon: BDAG
  rationale: La fórmula solemne de Jesús se vierte naturalmente en español como 'De cierto', que conserva el valor enfático y declarativo sin introducir una transliteración innecesaria.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: La construcción directa mantiene la fórmula de habla autoritativa de Jesús; 'les digo' es claro y fiel, y el pronombre explícito 'a ustedes' no es necesario en español.
- source_word: ἐπὶ πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ
  english_pob_choice: over all his possessions
  chosen_spanish: sobre todo lo que le pertenece
  alternatives_spanish:
  - sobre todas sus posesiones
  - sobre todo lo que tiene
  - sobre toda su propiedad
  lexicon: BDAG
  rationale: '''ὑπάρχουσιν'' apunta a las cosas que le pertenecen o posee; ''lo que le pertenece'' preserva esa amplitud sin restringirla solo a bienes materiales. ''Sobre'' refleja bien la relación de autoridad/encargo implícita en ἐπί con dativo en este contexto.'
- source_word: καταστήσει
  english_pob_choice: he will appoint
  chosen_spanish: lo pondrá
  alternatives_spanish:
  - lo nombrará
  - lo designará
  - lo establecerá
  lexicon: BDAG
  rationale: Aunque 'appoint' tiene un matiz administrativo claro en inglés, en español 'lo pondrá' comunica de forma natural la acción de colocarlo en un cargo o responsabilidad. Se evita 'nombrará' porque puede sonar demasiado específico a una ceremonia formal y no refleja tan bien el gesto de asignación en la parábola.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Se conserva el referente masculino singular del griego. En español, el clítico 'lo' es la forma más fluida y natural para este tipo de objeto directo.
theological_decisions:
- issue: Alcance de la recompensa/encargo
  english_pob_reading: Render the statement straightforwardly as appointment over the master's possessions without importing eschatological systematization.
  chosen_spanish_reading: La frase se traduce como una asignación de autoridad sobre lo que pertenece al amo, sin convertirla en una declaración explícita sobre recompensa celestial o estructura eclesial.
  alternative_spanish_readings:
  - Interpretarlo como recompensa escatológica
  - Interpretarlo como metáfora de autoridad eclesial
  rationale: El versículo, en su sentido llano, habla de una promoción dentro de la lógica de la parábola. La traducción evita añadir una lectura doctrinal que el texto no formula directamente, preservando la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete auditado; el texto base coincide con la última pasada aprobada y no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene 'De cierto' para ἀμὴν, en línea con un registro solemne y bíblico, sin recurrir a 'Amén' como transliteración.
  - '''lo pondrá'' conserva el valor de nombrar/asignar en contexto narrativo, evitando una sobrelectura administrativa más fuerte de la necesaria.'
  - '''sobre todo lo que le pertenece'' deja abierta la amplitud semántica de ὑπάρχοντα sin limitarla solo a posesiones materiales.'
  - La nota al pie ofrece la alternativa textual-léxica más cercana al griego y al inglés auditado.
