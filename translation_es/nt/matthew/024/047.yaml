revisions:
- from: De cierto les digo que lo pondrá[a] sobre todo lo que le pertenece.
  to: En verdad les digo que lo pondrá a cargo de todas sus posesiones[a].
  rationale: Se ajusta la fórmula solemne a un español neutral contemporáneo ('En verdad') y se refuerza el matiz administrativo de καταστήσει con 'lo pondrá a cargo de', que preserva la lógica de encargo del pasaje. 'Todas sus posesiones' refleja con naturalidad ἐπὶ πᾶσιν τοῖς ὑπάρχουσιν αὐτοῦ, mientras la nota conserva la alternativa más literal documentada en el audit trail inglés.
