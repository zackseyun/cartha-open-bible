translation:
  language: es
  text: Dos mujeres[a] estarán moliendo con la muela[b]; una es tomada y una es dejada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dos mujeres moliendo con la muela»; el participio griego es femenino plural, por lo que los sujetos son específicamente mujeres.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el molino de mano» o «en el molino»; el griego puede referirse más específicamente al aparato de molienda.'
    reason: lexical_alternative
  - marker: c
    text: El griego dice simplemente «una es tomada y una es dejada», sin especificar aquí si la toma es para salvación o para juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: δύο
  english_pob_choice: Two women
  chosen_spanish: Dos mujeres
  alternatives_spanish:
  - Dos
  lexicon: BDAG
  rationale: El numeral griego introduce a un par; en español conviene explicitar el sustantivo femenino que el participio ya exige, para reflejar con naturalidad y precisión que se trata de mujeres.
- source_word: ἀλήθουσαι
  english_pob_choice: women will be grinding
  chosen_spanish: estarán moliendo
  alternatives_spanish:
  - molerán
  - están moliendo
  - mujeres moliendo
  lexicon: BDAG
  rationale: El participio presente femenino plural indica mujeres en acción de moler. 'Estarán moliendo' conserva la fuerza aspectual de escena en progreso y suena natural en español sin perder el matiz verbal.
- source_word: ἐν τῷ μύλῳ
  english_pob_choice: at the mill
  chosen_spanish: en el molino
  alternatives_spanish:
  - en la muela
  - en el molino de mano
  - junto al molino
  lexicon: BDAG
  rationale: μύλος puede referirse al molino o al molino de mano/muela. 'En el molino' comunica de forma clara y sobria el lugar de la acción; el matiz más específico queda señalado en nota.
- source_word: μία
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - una de ellas
  lexicon: BDAG
  rationale: El distributivo se preserva con 'una ... y una ...', manteniendo el contraste entre las dos mujeres sin añadir información no presente en el griego.
- source_word: παραλαμβάνεται
  english_pob_choice: is taken
  chosen_spanish: es tomada
  alternatives_spanish:
  - es llevada
  - es recibida
  - es tomada consigo
  lexicon: BDAG
  rationale: El pasivo presente de παραλαμβάνω se traduce de manera directa con 'es tomada'. Esta forma preserva la ambigüedad del destino o sentido de la acción, como hace el texto griego.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: La conjunción coordinante no introduce contraste explícito; 'y' refleja el enlace simple del griego.
- source_word: ἀφίεται
  english_pob_choice: is left
  chosen_spanish: es dejada
  alternatives_spanish:
  - queda
  - es abandonada
  - es dejada atrás
  lexicon: BDAG
  rationale: El pasivo presente de ἀφίημι se rinde con 'es dejada' para conservar la paridad con 'es tomada' y mantener abierta la tensión interpretativa sin añadir 'atrás' ni 'abandonada'.
theological_decisions:
- issue: Si se debe resolver el sentido escatológico de 'es tomada' y 'es dejada'
  english_pob_reading: Retain the neutral wording 'is taken' / 'is left' without resolving the eschatological significance in the main text
  chosen_spanish_reading: Mantener 'es tomada' / 'es dejada' sin decidir en el cuerpo del texto si la toma es para salvación o para juicio
  alternative_spanish_readings:
  - es tomada para salvación y es dejada para juicio
  - es tomada en juicio y es dejada como preservada
  rationale: El versículo solo afirma la separación; no especifica el valor teológico de la acción. La redacción española conserva esa tensión y evita imponer una lectura que el texto inmediato no explicita.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Si conviene explicitar que los sujetos implícitos son mujeres
  english_pob_reading: Explicitly render the implied subject as 'women'
  chosen_spanish_reading: Expresar 'Dos mujeres' en lugar de un sujeto genérico
  alternative_spanish_readings:
  - Dos moliendo en el molino
  - Dos personas moliendo en el molino
  rationale: El participio femenino plural griego señala referentes femeninos; traducirlo como 'mujeres' respeta el dato gramatical y evita neutralizar indebidamente el sujeto.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el archivo auditado en inglés. Se mantuvo la ambigüedad de παραλαμβάνεται/ἀφίεται, se explicitó el referente femenino por el participio plural, y se conservó la posible amplitud semántica de μύλος sin sobreespecificarla en el texto principal.
  spanish_consistency_notes:
  - Se usó 'mujeres' para reflejar el participio femenino plural y la precisión de género del original.
  - Se prefirió 'moliendo' / 'estarán moliendo' para conservar la imagen de una acción continua o en curso.
  - '''Es tomada'' y ''es dejada'' mantienen la simetría y la ambigüedad teológica del pasaje.'
  - '''Molino'' se eligió como término base neutral; la nota conserva las alternativas más específicas.'
  - La puntuación y el orden buscan ser publicables en español moderno sin perder la estructura breve del griego.
