translation:
  language: es
  text: Y si aquellos días no hubieran sido acortados[a], ningún ser humano[b] se habría salvado; pero por causa de los elegidos, aquellos días serán acortados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hubieran sido abreviados ... serán abreviados». El verbo griego puede expresarse de ambas maneras; se eligió «acortados» por ser más natural y directo en español.
    reason: lexical_alternative
  - marker: b
    text: Lit. «toda carne». Es un modismo bíblico que aquí significa ningún ser humano, nadie vivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκολοβώθησαν / κολοβωθήσονται
  english_pob_choice: had not been cut short / will be cut short
  chosen_spanish: hubieran sido acortados / serán acortados
  alternatives_spanish:
  - hubieran sido abreviados / serán abreviados
  - hubieran sido acortados / habrán sido acortados
  lexicon: BDAG
  rationale: κολοβόω expresa la idea de hacer más corto o recortar. En español, «acortar» conserva con claridad la imagen verbal y suena natural; «abreviar» es posible, pero algo más abstracto. Mantengo el mismo verbo en ambos miembros para reflejar la correspondencia del griego.
- source_word: οὐκ ἂν ἐσώθη
  english_pob_choice: would have been saved
  chosen_spanish: se habría salvado
  alternatives_spanish:
  - se habría preservado
  - habría sobrevivido
  lexicon: BDAG
  rationale: σῴζω puede significar salvar, rescatar o preservar la vida. Aquí el contexto apunta a la preservación física en días de tribulación, pero «se habría salvado» mantiene el valor lexical de σῴζω sin reducirlo demasiado a «sobrevivir».
- source_word: πᾶσα σάρξ
  english_pob_choice: no flesh
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna carne
  - ningún ser humano
  - ninguna persona
  lexicon: BDAG
  rationale: La expresión hebrea/griega «toda carne» es un modismo para la humanidad. En español, «nadie» comunica de forma natural la fuerza negativa del pasaje; la nota conserva el trasfondo literal de «carne» y evita una frase extraña como «ninguna carne» en el texto principal.
- source_word: διὰ δὲ τοὺς ἐκλεκτοὺς
  english_pob_choice: but for the sake of the elect
  chosen_spanish: pero por causa de los elegidos
  alternatives_spanish:
  - pero a causa de los elegidos
  - pero por el bien de los elegidos
  - pero por causa de los escogidos
  lexicon: BDAG
  rationale: διά con acusativo aquí expresa razón o beneficio. «Por causa de» reproduce bien esa relación. Para ἐκλεκτοί, «elegidos» es la forma más directa y readable en español; «escogidos» también sería posible, pero «elegidos» conserva con naturalidad el matiz técnico sin forzar una tradición denominacional.
- source_word: αἱ ἡμέραι ἐκεῖναι
  english_pob_choice: those days
  chosen_spanish: aquellos días
  alternatives_spanish:
  - esos días
  - aquellos días mismos
  lexicon: BDAG
  rationale: La deixis de ἐκεῖναι se refleja bien con «aquellos». Es una forma natural en español bíblico contemporáneo y mantiene la distancia referencial del griego.
- source_word: καὶ εἰ μὴ
  english_pob_choice: And if ... not
  chosen_spanish: Y si ... no
  alternatives_spanish:
  - Y a menos que
  - Y si no
  lexicon: BDAG
  rationale: Conservo la estructura condicional explícita del griego. «Y si ... no» mantiene la relación sintáctica sin convertirla en una reexpresión más interpretativa como «a menos que».
theological_decisions:
- issue: Alcance de πᾶσα σάρξ en contexto de juicio y tribulación
  english_pob_reading: '"No flesh" is a biblical idiom meaning no human being, no one alive.'
  chosen_spanish_reading: «Nadie» en el texto principal, con la nota de que el trasfondo literal es «toda carne».
  alternative_spanish_readings:
  - ningún ser humano
  - ninguna persona viva
  - toda carne
  rationale: El modismo bíblico apunta a la humanidad entera, pero en español «nadie» expresa con mayor naturalidad el alcance del negativo. La nota preserva la tensión entre el modismo literal y su sentido idiomático, evitando perder el eco bíblico de σάρξ.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de σῴζω en una descripción apocalíptica
  english_pob_reading: Translate as 'saved' while allowing the immediate context to imply physical preservation.
  chosen_spanish_reading: «se habría salvado» con el trasfondo de preservación física.
  alternative_spanish_readings:
  - se habría preservado
  - habría sobrevivido
  rationale: «Se habría salvado» conserva la conexión verbal con σῴζω y no fuerza una paráfrasis reductiva. El contexto permite entender una salvación en sentido de preservación de la vida, sin cerrar la amplitud semántica del verbo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Identidad de «los elegidos» en el discurso escatológico
  english_pob_reading: Retain the term 'the elect' without interpretive expansion.
  chosen_spanish_reading: «los elegidos» sin expandir su identidad teológica.
  alternative_spanish_readings:
  - los escogidos
  - el pueblo escogido
  - los creyentes
  rationale: El texto nombra un grupo teológicamente cargado, pero no especifica aquí su composición exacta. Mantener «los elegidos» conserva la tensión doctrinal y evita resolver debates que el versículo no resuelve.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del texto base y del audit trail inglés, sin revisiones aplicadas posteriores; se mantiene la decisión de traducir κολοβόω con un verbo que conserve la imagen de reducción temporal y σάρξ como modismo humano en el negativo.
  spanish_consistency_notes:
  - Se mantiene «aquellos días» para αἱ ἡμέραι ἐκεῖναι en ambas ocurrencias.
  - Se conserva «los elegidos» de manera uniforme para ἐκλεκτοὺς.
  - La voz pasiva perifrástica en español refleja las formas pasivas griegas sin añadir agente explícito.
  - Se evita alternar entre «salvar» y «preservar» para no debilitar la conexión lexical con σῴζω.
