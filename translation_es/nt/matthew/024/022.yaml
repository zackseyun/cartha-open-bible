  text: καὶ εἰ μὴ ἐκολοβώθησαν αἱ ἡμέραι ἐκεῖναι, οὐκ ἂν ἐσώθη πᾶσα σάρξ· διὰ δὲ τοὺς ἐκλεκτοὺς κολοβωθήσονται αἱ ἡμέραι ἐκεῖναι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/022.yaml
  text: And if those days had not been cut short[a], no flesh would have been saved; but for the sake of the elect[b], those days will be cut short.
  footnotes:
  - marker: a
    text: Or 'had not been shortened ... will be shortened.' The Greek verb can be rendered either way; 'cut short' was chosen for clearer idiomatic force in English.
    reason: lexical_alternative
  - marker: b
    text: '''No flesh'' is a biblical idiom meaning no human being, no one alive.'
    reason: lexical_alternative
