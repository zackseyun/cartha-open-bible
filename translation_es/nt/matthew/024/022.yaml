    reason: lexical_alternative
  - marker: b
    text: Lit. «toda carne». Es un modismo bíblico que aquí significa ningún ser humano, nadie vivo.
    reason: lexical_alternative
  revision_rationale: Se propone una reparación menor para alinear mejor el español con la decisión léxica y filosófica auditada sobre πᾶσα σάρξ. «Ningún ser humano» sigue siendo natural en español, evita el giro extraño «ninguna carne» y preserva mejor que «nadie» el alcance humano universal del original; la nota mantiene explícitamente el modismo bíblico «toda carne». No se requieren más cambios.
