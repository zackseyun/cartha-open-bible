review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, el contraste y el sentido general del griego. «Acortados» corresponde adecuadamente a ἐκολοβώθησαν / κολοβωθήσονται, y «se habría salvado» preserva bien σῴζω. Sin embargo, la decisión principal sobre πᾶσα σάρξ se aparta innecesariamente del rastro auditado de POB, que preserva el modismo bíblico «no flesh» en el texto principal. En español, «nadie» es claro pero reduce la textura bíblica y elimina el eco de σάρξ que el inglés decidió conservar con nota.
  spanish_quality_summary: El español es claro, natural y de buen nivel eclesial. No obstante, «por causa de los elegidos» suena un poco menos idiomático y menos benefactivo que «por causa de»/«por el bien de» en este contexto; además, «ninguna carne» en el texto principal, aunque más literal, sería poco natural. La mejor reparación menor es mantener naturalidad con «ningún ser humano» y una nota que preserve el modismo «toda carne».
  glossary_alignment: 'Cumple en general con la terminología del proyecto. No hay términos de nombre divino ni mesiánicos en juego. «Los elegidos» es aceptable para ἐκλεκτοί. La cuestión principal es σάρξ: el proyecto pide no aplanar innecesariamente, y aquí conviene conservar en nota el trasfondo literal y en el texto principal una formulación más cercana al valor humano-colectivo que «nadie».'
  issues:
  - severity: medium
    issue: πᾶσα σάρξ se vierte como «nadie»
    rationale: Aunque idiomático, «nadie» se aleja más de la decisión auditada inglesa «no flesh» y borra por completo el eco léxico de σάρξ. «Ningún ser humano» mantiene mejor el referente humano universal, mientras la nota conserva el modismo literal «toda carne».
  - severity: low
    issue: La nota b describe el modismo, pero no compensa del todo la pérdida en el texto principal
    rationale: La nota ayuda, pero dado que el texto principal pasa a un pronombre indefinido absoluto, la conexión con «carne» queda demasiado diluida para una traducción de equivalencia óptima.
