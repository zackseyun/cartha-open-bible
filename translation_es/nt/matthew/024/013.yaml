translation:
  language: es
  text: Pero el que persevera hasta el fin[a] será salvo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta el fin».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será librado». El griego puede significar rescatar o salvar; se conserva un sentido más amplio porque el contexto no exige restringirlo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ... ὑπομείνας
  english_pob_choice: the one who endures
  chosen_spanish: el que persevera
  alternatives_spanish:
  - el que endurece
  - el que permanece firme
  - el que aguanta
  lexicon: BDAG
  rationale: El participio con artículo funciona de modo sustantivo y describe a la persona caracterizada por mantenerse bajo prueba. En español, «el que persevera» expresa de forma natural esa idea de resistencia continua sin perder el valor representativo singular.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce contraste con las advertencias previas; «Pero» comunica bien ese giro en español y mantiene la fuerza adversativa.
- source_word: ὑπομείνας
  english_pob_choice: endures
  chosen_spanish: persevera
  alternatives_spanish:
  - resiste
  - permanece firme
  - aguanta
  lexicon: BDAG
  rationale: ὑπομένω implica permanecer bajo presión, resistir y perseverar. «Persevera» es una equivalencia idiomática clara en español y conserva el sentido de continuidad y fidelidad en la prueba.
- source_word: εἰς τέλος
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: BDAG
  rationale: La frase expresa continuidad hasta un punto terminal. «Hasta el fin» es una forma natural en español y mantiene la misma amplitud que el inglés POB.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvo
  alternatives_spanish:
  - será rescatado
  - será librado
  lexicon: BDAG
  rationale: σῴζω puede significar salvar o librar/deliver. En este contexto escatológico, «será salvo» conserva la amplitud teológica que el POB inglés retuvo, sin restringirlo solo a rescate temporal.
theological_decisions:
- issue: Alcance de «será salvo» en un contexto de perseverancia escatológica
  english_pob_reading: Retain the broader wording 'will be saved' without specifying whether the salvation is final eschatological salvation, deliverance through tribulation, or both.
  chosen_spanish_reading: Conservar «será salvo» sin precisar si se trata de salvación final, libramiento temporal en la tribulación, o ambos.
  alternative_spanish_readings:
  - será librado
  - alcanzará la salvación final
  rationale: El versículo no resuelve explícitamente el alcance de la salvación prometida. La redacción española mantiene esa tensión doctrinal, como lo hace el POB inglés, en lugar de inclinarse por una interpretación confesional cerrada.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por una revisión que eliminó un appositive literal demasiado rígido y mantuvo la estructura idiomática «the one who endures to the end will be saved». La versión española sigue esa línea: conserva el sujeto sustantivado, la idea de continuidad hasta el fin y el verbo pasivo futuro con amplitud semántica.'
  spanish_consistency_notes:
  - Se usa «Pero» para δέ por su matiz adversativo.
  - Se prefiere «persevera» sobre «resiste» o «aguanta» por naturalidad y precisión contextual.
  - «Será salvo» se mantiene en voz pasiva con valor amplio, evitando estrecharlo a liberación meramente temporal.
  - La nota a pie de página sobre εἰς τέλος se coloca en «hasta el fin» porque ahí recae la alternativa léxica relevante.
