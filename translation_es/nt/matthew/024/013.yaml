review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica correctamente el sentido básico del griego: contraste con δέ, sujeto sustantivado «el que...», continuidad «hasta el fin» y promesa futura de salvación/liberación. Sin embargo, la nota [a] no preserva la alternativa inglesa, porque repite esencialmente la misma lectura en vez de ofrecer la variante real «hasta el final».'
  spanish_quality_summary: El español es claro y eclesialmente natural. «Pero el que persevera hasta el fin será salvo» suena bien y mantiene la tensión teológica. La única reparación necesaria es la nota [a], cuya redacción actual es defectuosa y no aporta una alternativa útil.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Persevera» es una opción aceptable para ὑπομείνας, aunque algo más interpretiva que «soporta/endura»; aquí sigue la justificación auditada. «Será salvo» preserva correctamente la amplitud de σωθήσεται, y la nota [b] mantiene la alternativa «será librado».
  issues:
  - severity: medium
    issue: La nota [a] no refleja la alternativa léxica documentada.
    rationale: 'El inglés POB da como alternativa «until the end». En español, el texto principal ya dice «hasta el fin», por lo que la nota «O: “hasta el fin”» repite el texto en vez de ofrecer una alternativa real. Debe decir algo como «O: “hasta el final”».'
  - severity: low
    issue: Comillas y formulación de la nota [a] son poco naturales.
    rationale: La construcción entre comillas simples y dobles es innecesariamente torpe en español editorial. Conviene normalizarla a una formulación simple y clara.
  revised_spanish_text: Pero el que persevera hasta el fin[a] será salvo[b].
  revised_footnotes:
  - marker: a
    text: 'O: «hasta el final».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «será librado». El griego puede significar rescatar o salvar; se conserva un sentido más amplio porque el contexto no exige restringirlo.'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige la nota [a] para que refleje una alternativa real al griego εἰς τέλος en vez de repetir la misma redacción.
