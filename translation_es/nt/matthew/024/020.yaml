  to: Pero oren para que su huida no ocurra en invierno ni en un sábado[a].
  rationale: Se ajusta σαββάτῳ para reflejar mejor la lectura principal auditada «on a Sabbath» mediante «en un sábado», y se corrige la nota para que preserve una alternativa genuina y más tradicional/definida en español.
