translation:
  language: es
  text: Pero oren para que su huida no ocurra en invierno ni en un sábado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en el sábado».
    reason: alternative_reading
lexical_decisions:
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - oren continuamente
  - oren intensamente
  lexicon: BDAG
  rationale: El imperativo presente plural pide una acción de oración dirigida a varios oyentes; «oren» comunica naturalmente el mandato en español sin sobrecargar el matiz aspectual, que puede quedar implícito.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ marca una transición contrastiva suave desde la advertencia previa; «Pero» preserva bien ese giro discursivo en español bíblico actual.
- source_word: ἵνα μὴ γένηται
  english_pob_choice: that ... may not happen
  chosen_spanish: para que no ocurra
  alternatives_spanish:
  - para que no suceda
  - para que no tenga lugar
  lexicon: BDAG
  rationale: Después de προσεύχεσθε, ἵνα con subjuntivo expresa la finalidad o contenido de la oración. «Para que no ocurra» es idiomático y conserva el sentido eventivo de γίνομαι.
- source_word: ἡ φυγὴ ὑμῶν
  english_pob_choice: your flight
  chosen_spanish: su huida
  alternatives_spanish:
  - su fuga
  - su escape
  lexicon: BDAG
  rationale: φυγή denota huida o fuga. «Huida» comunica el movimiento de escapar sin forzar una interpretación más específica de «escape» en español contemporáneo.
- source_word: χειμῶνος
  english_pob_choice: in winter
  chosen_spanish: en invierno
  alternatives_spanish:
  - durante el invierno
  - en la temporada de invierno
  lexicon: BDAG
  rationale: El genitivo de tiempo se vierte con naturalidad como «en invierno», que es la forma más clara y fiel en español.
- source_word: μηδὲ σαββάτῳ
  english_pob_choice: or on a Sabbath
  chosen_spanish: ni en sábado
  alternatives_spanish:
  - ni en el sábado
  - ni en un sábado
  lexicon: BDAG
  rationale: σάββατον aquí se refiere al día de reposo judío. En español, «en sábado» expresa la circunstancia temporal de modo natural y mantiene el artículo indefinido/no marcado del griego mejor que «en el sábado».
theological_decisions:
- issue: Valor del término σάββατῳ sin artículo definido
  english_pob_reading: on a Sabbath
  chosen_spanish_reading: ni en sábado
  alternative_spanish_readings:
  - ni en el sábado
  - ni en un sábado
  rationale: El griego no usa artículo; por eso se evita fijar de más la expresión con un equivalente necesariamente definido. «En sábado» conserva la referencia al día sabático sin imponer una formulación tradicional más cerrada.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión lexical donde el griego no especifica más de lo que dice.
translation_notes:
  revision_awareness: No se requirieron cambios según el último pase de revisión; el texto griego, la traducción inglesa auditada y la valoración cruzada muestran alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «huida» para φυγή, evitando sustituirlo por un término más interpretativo.
  - Se evitó «el sábado» como forma principal porque el griego carece de artículo y el audit trail inglés preserva esa apertura con una nota alternativa.
