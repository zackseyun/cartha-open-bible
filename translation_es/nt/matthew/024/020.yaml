review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego: «Pero/oren/para que/no ocurra/su huida/en invierno» refleja adecuadamente προσεύχεσθε δὲ ἵνα μὴ γένηται ἡ φυγὴ ὑμῶν χειμῶνος. El punto principal a corregir es μηδὲ σαββάτῳ: el inglés auditado preserva la indefinición con «on a Sabbath» y nota la alternativa «on the Sabbath». El español principal «ni en sábado» es comprensible, pero su nota al pie repite prácticamente la misma lectura y no preserva la alternativa definida documentada.'
  spanish_quality_summary: El texto es legible y digno. «Su huida» y «en invierno» son naturales. Sin embargo, «ni en sábado» suena algo elíptico en español; «ni en un sábado» refleja mejor la indefinición del griego y la decisión del POB, aunque sigue siendo un poco marcado. La nota debe ajustarse para ofrecer la alternativa tradicional «ni en el sábado» o mejor «ni en sábado» según se elija el texto principal.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión sobre σαββάτῳ debe alinearse con la política auditada de conservar la falta de artículo en el texto principal y relegar la lectura más tradicional/definida a nota.
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa auditada
    rationale: Si el texto principal dice «ni en sábado», la nota «O, «en sábado»» no aporta una lectura alternativa real. Debe reflejar la opción definida/tradicional correspondiente a «on the Sabbath».
  - severity: low
    issue: La formulación principal de σαββάτῳ puede afinarse en español
    rationale: «Ni en sábado» es posible, pero «ni en un sábado» representa más claramente la indefinición del griego y del inglés POB. Aunque es algo marcado, es defendible por fidelidad formal.
  revised_spanish_text: Pero oren para que su huida no ocurra en invierno ni en un sábado[a].
