base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/039.yaml
  text: And they did not know until the flood came and took them all away[b][a]; so will be the coming of the Son of Man.
  footnotes:
  - marker: a
    text: Or 'took them all away.' The Greek verb can be rendered more literally as 'took away'; 'swept ... away' brings out the flood imagery in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'presence' or 'arrival' for 'coming' (Greek παρουσία). In this context, 'coming' best conveys the eschatological event in view.
    reason: alternative_reading
