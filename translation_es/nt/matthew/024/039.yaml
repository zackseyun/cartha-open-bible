review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ignorancia hasta la llegada del diluvio, remoción total de las personas, y comparación con la venida del Hijo del Hombre. Sin embargo, introduce dos matices no apoyados por el texto auditado: «Pero» para καὶ, que aquí no es adversativo, y «también» después de «así será», cuando la revisión inglesa eliminó ''also'' por no ser necesario en este contexto. Además, conviene preservar la alternativa léxica de παρουσία mediante nota, ya que el inglés POB la conserva.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «El diluvio», «la venida» y «el Hijo del Hombre» son buenas elecciones. La frase mejora en fidelidad y fluidez si se reemplaza «Pero» por «Y» y se elimina «también», evitando un contraste y un énfasis no exigidos por el griego ni por la auditoría inglesa.
  glossary_alignment: 'Alineado con la terminología del proyecto en los términos relevantes: παρουσία -> «venida» y υἱὸς τοῦ ἀνθρώπου -> «el Hijo del Hombre». No hay conflictos con Yahvé/Mesías/etc. Falta solamente reflejar en nota la alternativa documentada para παρουσία, ya preservada en el POB inglés.'
  issues:
  - severity: medium
    issue: «Pero» traduce καὶ con un matiz adversativo indebido
    rationale: El griego comienza con καὶ, coordinante simple. «Pero» sugiere contraste; «Y» o su omisión serían más fieles.
  - severity: medium
    issue: «también» añade énfasis comparativo no requerido
    rationale: La auditoría inglesa revisó explícitamente la frase para quitar 'also'. Mantener «también» se aparta de esa decisión documentada.
  - severity: low
    issue: Falta nota sobre la alternativa léxica de παρουσία
    rationale: El POB inglés conserva nota para 'coming' con alternativas 'presence'/'arrival'. En español corresponde preservar esa información como «presencia» o «llegada».
  revised_spanish_text: Y no supieron hasta que vino el diluvio y se los llevó a todos; así será la venida[a] del Hijo del Hombre.
  revised_footnotes:
  - marker: a
    text: O «presencia» o «llegada» para «venida» (griego παρουσία). En este contexto, «venida» comunica mejor el acontecimiento escatológico que está en vista.
    reason: alternative_reading
  revision_rationale: Se corrige «Pero» a «Y» para reflejar la coordinación simple de καὶ, se elimina «también» conforme a la revisión auditada del inglés POB, y se añade una nota para preservar las alternativas léxicas documentadas de παρουσία. También se ajusta «los llevó a todos» a «se los llevó a todos», giro más natural en español para expresar que el diluvio se llevó a esas personas.
