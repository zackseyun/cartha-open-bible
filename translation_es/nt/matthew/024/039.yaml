revisions:
- from: Pero no supieron hasta que vino el diluvio y los llevó a todos; así será también la venida del Hijo del Hombre.
  to: Y no supieron hasta que vino el diluvio y se los llevó a todos; así será la venida[a] del Hijo del Hombre.
  rationale: Se corrige «Pero» a «Y» para reflejar la coordinación simple de καὶ, se elimina «también» conforme a la revisión auditada del inglés POB, y se añade una nota para preservar las alternativas léxicas documentadas de παρουσία. También se ajusta «los llevó a todos» a «se los llevó a todos», giro más natural en español para expresar que el diluvio se llevó a esas personas.
