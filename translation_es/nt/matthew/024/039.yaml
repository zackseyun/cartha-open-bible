translation:
  language: es
  text: Y no supieron hasta que vino el diluvio y se los llevó a todos; así será la venida[a] del Hijo del Hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presencia» o «llegada» para «venida» (griego παρουσία). En este contexto, «venida» comunica mejor el acontecimiento escatológico que está en vista.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνωσαν
  english_pob_choice: did not know
  chosen_spanish: no supieron
  alternatives_spanish:
  - no conocieron
  - no se dieron cuenta
  lexicon: BDAG
  rationale: En este contexto narrativo, γινώσκω expresa ignorancia o falta de percepción previa ante un acontecimiento inminente. «No supieron» comunica esa falta de conocimiento de modo natural en español y conserva el matiz de no haber reconocido lo que venía.
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras
  lexicon: BDAG
  rationale: Marca el punto temporal en que termina la ignorancia. «Hasta que» es la equivalencia más clara y idiomática en español.
- source_word: κατακλυσμός
  english_pob_choice: the flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - el gran diluvio
  - la inundación
  lexicon: BDAG
  rationale: En el contexto de Noé, «diluvio» es la forma española más estable y evocadora para el evento de Génesis. Mantiene la referencia bíblica sin perder el sentido de juicio por agua.
- source_word: ἦρεν
  english_pob_choice: took them all away
  chosen_spanish: los llevó a todos
  alternatives_spanish:
  - los quitó a todos
  - los arrebató a todos
  lexicon: BDAG
  rationale: El verbo αἴρω puede significar «tomar/llevar». En este contexto, la imagen es la de ser removidos por el juicio asociado al diluvio. «Los llevó a todos» sigue de cerca el valor verbal y funciona de modo natural en español, sin añadir la imagen interpretativa de «barrer».
- source_word: ἅπαντας
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - todos
  lexicon: BDAG
  rationale: El adjetivo intensivo expresa totalidad. En español, «a todos» comunica de forma clara y directa que nadie quedó fuera de la acción verbal.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de ese modo
  lexicon: BDAG
  rationale: Introduce la comparación entre los días de Noé y el evento futuro. «Así» preserva la relación comparativa de manera breve y natural.
- source_word: παρουσία
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En el contexto escatológico de Mateo 24, la palabra se refiere al evento de la llegada/manifestación final. «Venida» es el equivalente español más reconocido y directo para este uso, sin convertirlo en un simple estado de «presencia».
- source_word: υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y bíblicamente cargado de Jesús. Aunque puede sonar solemne, es la forma más fiel al valor titular y a su resonancia daniélica.
theological_decisions:
- issue: Sentido escatológico de παρουσία
  english_pob_reading: coming
  chosen_spanish_reading: venida
  alternative_spanish_readings:
  - presencia
  - llegada
  rationale: En Mateo 24 el paralelo con el diluvio apunta a un acontecimiento futuro, repentino y decisivo. «Venida» comunica mejor ese carácter eventivo que «presencia», que podría sonar estático en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Título υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el ser humano
  - el hombre
  rationale: Se mantiene el título cristológico sin reinterpretarlo. Esto conserva la tensión teológica y la conexión con Daniel, en lugar de reducirlo a una paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ''swept them all away'' a ''took them all away'' por mayor cercanía a ἦρεν, y eliminó ''also'' para no añadir énfasis no exigido por el griego. La redacción española sigue esa decisión: usa un verbo de traslado/remoción cercano al valor léxico básico y omite un equivalente explícito de ''also'', conservando el paralelismo simple del griego.'
  spanish_consistency_notes:
  - Se usa «diluvio» para mantener la referencia bíblica de Noé y la imaginería del juicio por agua.
  - Se mantiene «el Hijo del Hombre» como título fijo, no como paráfrasis.
  - «Venida» se elige para παρουσία por el contexto escatológico; «presencia» quedaría demasiado estático en español.
  - 'La cláusula final conserva la estructura comparativa breve del griego: «así será ... la venida ...».'
