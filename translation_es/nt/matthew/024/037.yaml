translation:
  language: es
  text: Porque así como en los días de Noé, así será la venida[a] del Hijo del Hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «presencia»: el término griego puede significar «presencia» o «llegada», pero aquí se refiere a la venida futura del Hijo del Hombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: porque así como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: Mantiene la relación comparativa enfática y la conexión explicativa que introduce el ejemplo de Noé. En español, 'porque así como' conserva bien el enlace con el contexto anterior y prepara la correlación con 'así será'.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - en efecto
  lexicon: BDAG
  rationale: La partícula explica o enlaza con el contexto previo. 'Porque' es natural al inicio de una oración y reproduce la función discursiva sin sonar forzado.
- source_word: αἱ ἡμέραι τοῦ Νῶε
  english_pob_choice: the days of Noah were
  chosen_spanish: fueron los días de Noé
  alternatives_spanish:
  - los días de Noé
  - los días de Noé fueron
  lexicon: BDAG
  rationale: El griego usa una construcción elíptica que en español necesita completarse. 'Fueron' expresa la cópula implícita sin añadir contenido interpretativo, y 'los días de Noé' conserva el giro bíblico familiar.
- source_word: Νῶε
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: Uso onomástico estándar
  rationale: Se emplea la forma española habitual del nombre propio bíblico.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de igual modo
  lexicon: BDAG
  rationale: Correlaciona con 'así como' y mantiene la estructura comparativa 'así como... así...'. 'Así' es la forma más directa y natural en español.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - llegará a ser
  lexicon: BDAG
  rationale: El futuro de εἰμί se traduce de modo simple como 'será', sin sobreinterpretar el verbo ni introducir matices eventivos no necesarios.
- source_word: παρουσία
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En este contexto escatológico, 'venida' comunica con claridad el sentido de advento futuro. Se preserva la tensión semántica entre 'venida' y 'presencia' mediante nota, porque el término griego puede abarcar ambas ideas.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional porque es el equivalente más fiel y reconocible en español, con resonancia intertextual y teológica.
theological_decisions:
- issue: παρουσία en un dicho escatológico
  english_pob_reading: coming
  chosen_spanish_reading: venida
  alternative_spanish_readings:
  - presencia
  - llegada
  rationale: El contexto habla del futuro desenlace escatológico; por eso 'venida' expresa mejor el carácter de acontecimiento. No obstante, se mantiene la nota sobre 'presencia' para no borrar la amplitud lexical del término griego.
  doctrine_reference: Translation philosophy §3; preservar tensión lexical sin resolverla prematuramente
translation_notes:
  revision_awareness: 'Coincide con el pasaje griego SBLGNT y con el audit trail inglés: la cláusula comparativa se mantiene, la elipsis de ''los días de Noé'' se completa mínimamente en español, y παρουσία se rinde como ''venida'' con nota transparente sobre la alternativa ''presencia''. No se detectan revisiones adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa 'Noé' como forma castellana estándar del nombre propio.
  - Se conserva 'Hijo del Hombre' como título cristológico fijo.
  - La correlación 'así como... así...' reproduce la estructura comparativa del griego.
  - '''Venida'' se prefiere en el texto principal por claridad escatológica, sin ocultar la alternativa lexical ''presencia''.'
