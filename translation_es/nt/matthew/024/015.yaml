revisions:
- from: Así que, cuando vean la abominación de la desolación[a], de la cual se habló por medio de Daniel el profeta, colocada en un lugar santo[b], el que lee, entienda.
  to: Así que, cuando vean la abominación de la desolación[b], de la que se habló por medio de Daniel el profeta, de pie en un lugar santo[a], el que lee, entienda.
  rationale: Se corrigen los anclajes de las notas para que correspondan a las expresiones que explican, y se sustituye «colocada» por «de pie» para reflejar con más fidelidad ἑστὸς sin añadir interpretación. También se aligera la relativa a «de la que se habló» para un español más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:21:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en gran medida el sentido del griego y sigue bien la línea del POB en «la abominación de la desolación», «por medio de Daniel el profeta» y «en un lugar santo». Sin embargo, hay dos problemas importantes: los marcadores de notas están invertidos respecto de su anclaje semántico, y «colocada» para ἑστὸς desplaza el sentido de «standing/estando en pie» hacia una idea más interpretativa de instalación o colocación.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «de la cual se habló» suena algo más pesado que «de la que se habló», y «colocada» no es la opción más fiel ni la más natural aquí. También conviene hacer que la nota tradicional «en el lugar santo» esté anclada a «un lugar santo», no a «desolación».
  glossary_alignment: No hay conflictos con la terminología global del proyecto. La frase apocalíptica se conserva bien. La principal cuestión terminológica es ἑστὸς, para la cual «de pie» o «estando de pie» preserva mejor el valor del participio que «colocada».
  issues:
  - severity: high
    issue: Los marcadores de notas [a] y [b] están colocados en los lugares equivocados.
    rationale: La nota [a] explica la alternativa de ἐν τόπῳ ἁγίῳ («en el lugar santo»), por lo que debe anclarse en «un lugar santo». La nota [b] explica alternativas para «la abominación de la desolación», por lo que debe anclarse en esa frase. Tal como está, el lector recibe notas semánticamente desalineadas.
  - severity: medium
    issue: «colocada» para ἑστὸς sobreinterpreta el participio.
    rationale: ἑστὸς significa «standing», no necesariamente «colocada/puesta». «Colocada» introduce la noción de instalación intencional, mientras que el griego se limita a describir su presencia en pie/en un lugar.
  - severity: low
    issue: «de la cual se habló» es menos natural que una relativa más ligera.
    rationale: Una formulación como «de la que se habló» o «de la cual habló» mejora la fluidez sin perder precisión.
  revised_spanish_text: Así que, cuando vean la abominación de la desolación[b], de la que se habló por medio de Daniel el profeta, de pie en un lugar santo[a], el que lee, entienda.
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, «en el lugar santo».
    reason: alternative_reading
  - marker: b
    text: O «la abominación desoladora» o «la abominación que causa desolación», en eco de Daniel.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las expresiones que explican, y se sustituye «colocada» por «de pie» para reflejar con más fidelidad ἑστὸς sin añadir interpretación. También se aligera la relativa a «de la que se habló» para un español más natural.
