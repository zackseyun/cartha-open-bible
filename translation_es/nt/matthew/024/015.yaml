translation:
  language: es
  text: Así que, cuando vean la abominación de la desolación[b], de la que se habló por medio de Daniel el profeta, de pie en un lugar santo[a], el que lee, entienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «en el lugar santo».
    reason: alternative_reading
  - marker: b
    text: O «la abominación desoladora» o «la abominación que causa desolación», en eco de Daniel.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuandoquiera que
  lexicon: BDAG
  rationale: La cláusula expresa una contingencia futura; «cuando» es la correspondencia natural en español y conserva el valor temporal del griego sin rigidizarlo.
- source_word: οὖν
  english_pob_choice: so
  chosen_spanish: así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca transición/inferencia desde el discurso anterior. «Así que» suena natural en español moderno y preserva la conexión lógica.
- source_word: ἴδητε
  english_pob_choice: you see
  chosen_spanish: vean
  alternatives_spanish:
  - vean ustedes
  - alcancen a ver
  lexicon: BDAG
  rationale: 'El subjuntivo aoristo en la cláusula temporal se rinde de forma directa con el futuro/mandato implícito dirigido a los oyentes: «vean».'
- source_word: τὸ βδέλυγμα τῆς ἐρημώσεως
  english_pob_choice: the abomination of desolation
  chosen_spanish: la abominación de la desolación
  alternatives_spanish:
  - la abominación desoladora
  - la abominación que causa desolación
  lexicon: BDAG
  rationale: Se conserva la fórmula apocalíptica tradicional y su enlace intertextual con Daniel. «De la desolación» mantiene la construcción nominal sin convertirla en paráfrasis interpretativa.
- source_word: τὸ ῥηθὲν
  english_pob_choice: spoken of
  chosen_spanish: de la cual se habló
  alternatives_spanish:
  - de la que se habló
  - mencionada
  lexicon: BDAG
  rationale: El participio pasivo apunta a lo dicho/proclamado en la profecía. En español, la relativa «de la cual se habló» comunica bien ese sentido de cosa anunciada.
- source_word: διὰ Δανιὴλ τοῦ προφήτου
  english_pob_choice: through Daniel the prophet
  chosen_spanish: por medio de Daniel el profeta
  alternatives_spanish:
  - por Daniel el profeta
  - por conducto de Daniel el profeta
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación/agencia profética. «Por medio de» conserva la idea de mediación mejor que un simple «por».
- source_word: ἑστὸς
  english_pob_choice: standing
  chosen_spanish: colocada
  alternatives_spanish:
  - puesta
  - estando
  lexicon: BDAG
  rationale: El participio aparece con valor descriptivo y, por su referencia neutra al sintagma, en español se entiende mejor como una entidad «colocada» en un lugar. Se evita forzar una imagen menos natural con «estando».
- source_word: ἐν τόπῳ ἁγίῳ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en el lugar santo
  - en un sitio santo
  lexicon: BDAG
  rationale: El griego no lleva artículo ante τόπῳ; «un lugar santo» refleja bien la indefinición formal. «Lugar santo» conserva la sacralidad sin cerrar el referente más allá del texto.
- source_word: ὁ ἀναγινώσκων νοείτω
  english_pob_choice: let the reader understand
  chosen_spanish: el que lee, entienda
  alternatives_spanish:
  - el que lee, comprenda
  - que entienda el lector
  lexicon: BDAG
  rationale: La exhortación parentética se vierte con una estructura natural en español. «El que lee, entienda» mantiene la fuerza imperativa y la referencia abierta al lector.
theological_decisions:
- issue: Definiteness of τόπῳ ἁγίῳ and possible temple-specific interpretation
  english_pob_reading: in a holy place
  chosen_spanish_reading: en un lugar santo
  alternative_spanish_readings:
  - en el lugar santo
  rationale: El griego carece de artículo, por lo que no obliga a una referencia definida. Se mantiene la formulación anarthrous para no restringir el pasaje más de lo que el texto griego exige; la opción más tradicional queda implícitamente disponible como lectura contextual, no como imposición textual.
  doctrine_reference: 'Translation philosophy #1, #3, #5'
- issue: Rendering of the Danielic phrase βδέλυγμα τῆς ἐρημώσεως
  english_pob_reading: the abomination of desolation
  chosen_spanish_reading: la abominación de la desolación
  alternative_spanish_readings:
  - la abominación desoladora
  - la abominación que causa desolación
  rationale: La expresión es una alusión establecida a Daniel y debe conservarse con su densidad apocalíptica. Se evita explicarla en exceso para no borrar la tensión lexical y profética presente en el griego.
  doctrine_reference: 'Translation philosophy #1, #3'
translation_notes:
  revision_awareness: No se detectan cambios sustanciales respecto al último pase auditado en inglés; la traducción española mantiene la misma decisión de conservar la expresión daniélica y la ambigüedad de τόπῳ ἁγίῳ, con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se conserva el registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - La nota sobre «lugar santo» preserva la diferencia entre la forma anarthrous del griego y la lectura tradicional más específica.
