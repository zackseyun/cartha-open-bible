translation:
  language: es
  text: Entonces los entregarán[a] a aflicción, y los matarán, y serán odiados por todas las naciones[b] por causa de mi nombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tribulación» o «a persecución». El griego θλῖψις puede denotar angustia, opresión o tribulación.
    reason: lexical_alternative
  - marker: b
    text: O «por todas las naciones» o, menos probablemente en este contexto, «por todos los gentiles».
    reason: lexical_alternative
  - marker: c
    text: Literalmente «por causa de mi nombre»; es decir, por lealtad a Jesús y a lo que su nombre representa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel tiempo
  lexicon: BDAG
  rationale: Marca continuidad temporal y secuencia discursiva; «Entonces» es natural en español y conserva el avance profético del pasaje.
- source_word: παραδώσουσιν
  english_pob_choice: will hand over
  chosen_spanish: los entregarán
  alternatives_spanish:
  - los entregarán en manos de
  - los pondrán en manos de
  lexicon: BDAG
  rationale: παραδίδωμι expresa entregar a otro poder; «entregar» conserva la idea de poner a alguien bajo dominio hostil sin introducir la noción específica de traición.
- source_word: εἰς θλῖψιν
  english_pob_choice: to affliction
  chosen_spanish: a tribulación
  alternatives_spanish:
  - a aflicción
  - a persecución
  - a sufrimiento
  lexicon: BDAG
  rationale: θλῖψις abarca aflicción, opresión y tribulación. «Tribulación» preserva mejor el peso del término y su posible resonancia escatológica en Mateo 24 que un equivalente más débil o estrecho.
- source_word: ἀποκτενοῦσιν
  english_pob_choice: kill
  chosen_spanish: los matarán
  alternatives_spanish:
  - los pondrán a muerte
  - los darán muerte
  lexicon: BDAG
  rationale: Verbo futuro directo y claro; «matar» reproduce el sentido básico sin añadir matices morales que el verbo griego no explicita.
- source_word: ἔσεσθε μισούμενοι
  english_pob_choice: you will be hated
  chosen_spanish: serán odiados
  alternatives_spanish:
  - llegarán a ser odiados
  - serán objeto de odio
  lexicon: BDAG
  rationale: La perífrasis griega futuro de εἰμί + participio pasivo se rinde naturalmente con «serán odiados» en español, manteniendo el valor pasivo y futuro.
- source_word: ὑπὸ πάντων τῶν ἐθνῶν
  english_pob_choice: by all the nations
  chosen_spanish: por todas las naciones
  alternatives_spanish:
  - por todas las naciones del mundo
  - por todos los pueblos
  lexicon: BDAG
  rationale: ἔθνη aquí se entiende mejor como «naciones» en un sentido de alcance universal; conservar «las naciones» mantiene la forma más cercana al griego y evita restringirlo indebidamente a «gentiles».
- source_word: διὰ τὸ ὄνομά μου
  english_pob_choice: because of my name
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - por mi nombre
  - a causa de mi nombre
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. «Por causa de mi nombre» comunica bien el trasfondo bíblico de «nombre» como representación de la persona y lealtad a Jesús.
theological_decisions:
- issue: θλῖψις en contexto escatológico
  english_pob_reading: affliction / tribulation tension preserved
  chosen_spanish_reading: tribulación
  alternative_spanish_readings:
  - aflicción
  - persecución
  - sufrimiento
  rationale: En Mateo 24, θλῖψις conserva tensión entre sufrimiento ordinario y carga escatológica. «Tribulación» preserva esa amplitud sin resolverla hacia un sistema doctrinal ajeno al texto.
  doctrine_reference: Mantener la tensión teológica del término en el discurso de Jesús.
- issue: ἔθνη como universalidad de la oposición
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: Aunque ἔθνη puede significar «gentiles», aquí la oposición universal se expresa mejor con «las naciones». Así se evita introducir una contraposición étnica más estrecha de la que pide el contexto.
  doctrine_reference: Primacía del sentido del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «tribulation» por «affliction» por naturalidad, pero el historial auditado mantiene que θλῖψις conserva una tensión semántica más amplia en este contexto. Por eso el español usa «tribulación», que preserva mejor esa amplitud y la posible resonancia escatológica sin perder claridad.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito en la nota de «mi nombre» sin añadirlo al texto, conforme al original.
  - Se usa «las naciones» para reflejar el griego con artículo y el alcance universal del pasaje.
  - Se evita «SEÑOR» y cualquier sustitución reverencial ajena al término fuente.
  - La construcción verbal plural «los entregarán / los matarán / serán odiados» conserva la referencia al plural de ὑμᾶς.
