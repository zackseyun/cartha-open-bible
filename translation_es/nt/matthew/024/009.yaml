  text: Τότε παραδώσουσιν ὑμᾶς εἰς θλῖψιν καὶ ἀποκτενοῦσιν ὑμᾶς, καὶ ἔσεσθε μισούμενοι ὑπὸ πάντων τῶν ἐθνῶν διὰ τὸ ὄνομά μου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/009.yaml
  text: Then they will hand you over to affliction and kill you[c][b][a], and you will be hated by all the nations because of my name.
  footnotes:
  - marker: a
    text: Or 'to affliction' or 'to persecution.' The Greek word can denote distress, oppression, or tribulation.
    reason: lexical_alternative
  - marker: b
    text: Or 'by all nations' or, less likely in this context, 'by all the Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'because of my name'; that is, because of allegiance to Jesus and what his name represents.
    reason: lexical_alternative
