    rationale: La nota [c] explica «los cuatro vientos» y la [d] explica «desde un extremo de los cielos hasta el otro», pero ambas aparecen junto a «escogidos». Esto desorienta al lector y no cumple la instrucción de que cada marcador aparezca en la palabra o frase relevante.
  - severity: medium
    issue: La nota [c] usa «idiomatismo», que suena técnico y menos natural.
    rationale: «Modismo» o «expresión idiomática» sería más natural en español general y mantiene la misma precisión.
  - severity: low
    issue: La alternativa «electos» en la nota [b] es comprensible pero menos idiomática que «elegidos» en español bíblico general.
    rationale: Puede conservarse por transparencia con «elect», pero en español corriente «elegidos» suena más natural. No es un error grave porque la nota es solo alternativa.
