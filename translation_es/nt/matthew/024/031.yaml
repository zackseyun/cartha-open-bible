translation:
  language: es
  text: Y enviará a sus ángeles con una gran trompeta[a], y reunirán a sus escogidos[b] de los cuatro vientos[c], desde un extremo de los cielos hasta el otro[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una gran trompeta» o «con un toque de trompeta».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «electos».'
    reason: lexical_alternative
  - marker: c
    text: La expresión «los cuatro vientos» es un modismo que indica los confines más lejanos en todas direcciones.
    reason: cultural_note
  - marker: d
    text: 'Griego: «desde los extremos de los cielos hasta sus extremos», un modismo que significa de un extremo al otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστελεῖ
  english_pob_choice: he will send out
  chosen_spanish: enviará
  alternatives_spanish:
  - mandará
  - enviará fuera
  lexicon: BDAG
  rationale: El futuro de ἀποστέλλω expresa envío/mandato. En español, «enviará» comunica naturalmente la acción sin introducir una perífrasis pesada; el contexto escatológico ya sugiere que no se trata de un simple traslado, sino de una misión conferida.
- source_word: ἀγγέλους
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En este contexto escatológico, la referencia es claramente a seres celestiales. «Ángeles» conserva el valor léxico habitual y evita una ambigüedad innecesaria en español.
- source_word: μετὰ σάλπιγγος μεγάλης
  english_pob_choice: with a loud trumpet
  chosen_spanish: con una gran trompeta
  alternatives_spanish:
  - con una trompeta fuerte
  - con un toque de trompeta
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento. σάλπιγξ es «trompeta»; μεγάλη puede reflejarse como «gran» o «fuerte/sonora». Se conserva la imagen concreta de la trompeta en el texto principal, y la nota recoge la posible lectura idiomática de «toque» o «gran trompeta».
- source_word: ἐπισυνάξουσιν
  english_pob_choice: they will gather
  chosen_spanish: reunirán
  alternatives_spanish:
  - juntarán
  - congregarán
  lexicon: BDAG
  rationale: El verbo intensifica la idea de congregar. «Reunirán» es claro y natural en español, y preserva la acción colectiva sin sobrecargarla con terminología eclesiástica.
- source_word: ἐκλεκτούς
  english_pob_choice: chosen ones
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - electos
  lexicon: BDAG
  rationale: «Escogidos» comunica el sentido de ἐκλεκτοί con transparencia y sin la carga doctrinal adicional que puede tener «electos» en español. Como en el original, el énfasis recae en quienes han sido elegidos por Dios.
- source_word: ἐκ τῶν τεσσάρων ἀνέμων
  english_pob_choice: from the four winds
  chosen_spanish: de los cuatro vientos
  alternatives_spanish:
  - de los cuatro puntos cardinales
  - de los cuatro confines
  lexicon: BDAG
  rationale: La expresión es un idiomatismo de totalidad direccional. «Vientos» preserva la imagen bíblica y evita la paráfrasis interpretativa de «direcciones» o «puntos cardinales» en el texto principal.
- source_word: ἀπ’ ἄκρων οὐρανῶν ἕως τῶν ἄκρων αὐτῶν
  english_pob_choice: from one end of the heavens to the other
  chosen_spanish: desde un extremo de los cielos hasta el otro
  alternatives_spanish:
  - desde los extremos de los cielos hasta sus extremos
  - de un extremo del cielo al otro
  lexicon: BDAG
  rationale: La frase es un merismo que expresa extensión total. Se mantiene «cielos» en plural para reflejar el griego οὐρανῶν, y «desde un extremo... hasta el otro» expresa con naturalidad el alcance total sin resolver la imagen.
theological_decisions:
- issue: Renderizado de ἐκλεκτούς en un contexto escatológico
  english_pob_reading: chosen ones
  chosen_spanish_reading: escogidos
  alternative_spanish_readings:
  - electos
  - elegidos
  rationale: «Escogidos» conserva el sentido léxico y evita importar un tecnicismo confesional donde el texto no lo explicita. Se mantiene la referencia a quienes son reunidos por los ángeles del Hijo del Hombre sin imponer una lectura sistemática adicional.
  doctrine_reference: Affirmations; Translation philosophy §§3, 6
- issue: Alcance idiomático del recogimiento universal
  english_pob_reading: from the four winds, from one end of the heavens to the other
  chosen_spanish_reading: de los cuatro vientos, desde un extremo de los cielos hasta el otro
  alternative_spanish_readings:
  - de los cuatro puntos cardinales, desde un extremo del cielo hasta el otro
  rationale: La traducción conserva la imaginería cósmica y la tensión idiomática del original en lugar de reducirla a una paráfrasis geográfica. Esto protege tanto la fuerza poética como la amplitud semántica del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el audit trail inglés sin cambios sustantivos respecto al sentido revisado más reciente; se conserva la imaginería cósmica y la ambigüedad idiomática documentada, con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se mantiene «ángeles» para ἀγγέλους por el contexto escatológico.
  - Se usa «escogidos» para ἐκλεκτούς, conforme a la preferencia de transparencia léxica y evitando tecnicismo confesional no explícito.
  - Se conserva el plural «cielos» para οὐρανῶν, en línea con el griego y con la imagen merística del pasaje.
  - La puntuación con comas reproduce la coordinación del griego y la fluidez del español bíblico contemporáneo.
