translation:
  language: es
  text: Por esta razón[a], ustedes también deben estar preparados, porque el Hijo del Hombre viene a una hora que no esperan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a una hora que no piensan». El verbo griego puede significar «pensar», «suponer» o, por implicación en este contexto, «esperar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por tanto
  - Por eso
  - Debido a esto
  lexicon: BDAG
  rationale: La construcción con διά + acusativo remite a la advertencia anterior y expresa relación inferencial-causal. «Por esta razón» conserva esa conexión explícita en un español natural y digno.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - ustedes asimismo
  - también ustedes
  - ustedes mismos también
  lexicon: BDAG
  rationale: El καί con el pronombre explícito añade inclusión y énfasis. «Ustedes también» mantiene ese realce sin sobrecargar la frase.
- source_word: γίνεσθε ἕτοιμοι
  english_pob_choice: must be ready
  chosen_spanish: deben estar listos
  alternatives_spanish:
  - estén listos
  - permanezcan listos
  - estén preparados
  lexicon: BDAG
  rationale: El imperativo presente medio plural pide una disposición continua. En español, «deben estar listos» comunica con claridad la fuerza exhortativa y el estado requerido, sin perder la idea de preparación sostenida.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón de la exhortación, no solo el contenido. «Porque» es la forma causal más directa y natural en español.
- source_word: ᾗ οὐ δοκεῖτε ὥρᾳ
  english_pob_choice: at an hour you do not expect
  chosen_spanish: a la hora que no esperan
  alternatives_spanish:
  - a la hora que no piensan
  - en la hora que no imaginan
  - a la hora que no suponen
  lexicon: BDAG
  rationale: La expresión temporal griega es idiomática. «A la hora que no esperan» conserva el sentido de imprevisibilidad. «Esperan» se ajusta al valor contextual de δοκέω aquí, que puede significar pensar/suponer, pero en este aviso escatológico equivale a no esperar.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Humano
  - el Hijo humano
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional y literal del griego, manteniendo su trasfondo semítico y su peso teológico sin paraphrasearlo.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está llegando
  - vendrá
  lexicon: BDAG
  rationale: El presente en griego funciona como presente futurizante y da viveza a la escena. «Viene» reproduce bien ese valor en español, de forma natural y breve.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Humano
  - el Hijo del ser humano
  rationale: Se preserva la formulación tradicional y literal para no resolver ni suavizar la carga daniélica y cristológica del título. El texto invita a mantener la tensión interpretativa, no a reemplazarla por una glosa explicativa.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés y el control cruzado indican alta concordancia y ningún cambio reciente; por eso la redacción española se mantiene alineada con la lectura estable del pasaje, sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título cristológico fijo.
  - Se usa «viene» para reproducir el presente futurizante de ἔρχεται sin forzar el futuro simple.
  - Se evita «SEÑOR» o equivalentes no presentes en el texto.
  - Se opta por «por esta razón» para reflejar la conexión lógica con el contexto inmediato.
  - La nota [a] queda anclada en el matiz de δοκεῖτε, donde el español «esperan» capta el sentido contextual.
