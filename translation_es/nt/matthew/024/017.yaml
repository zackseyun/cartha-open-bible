translation:
  language: es
  text: El que esté sobre la azotea[a] no baje para tomar las cosas de su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «techo». El griego se refiere a la parte plana y utilizable del techo de una casa.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ἐπὶ τοῦ δώματος
  english_pob_choice: the one on the housetop
  chosen_spanish: el que esté sobre la azotea[a]
  alternatives_spanish:
  - el que esté en el techo
  - quien esté sobre la azotea
  lexicon: BDAG
  rationale: La construcción con artículo funciona como sujeto genérico singular; en español, «el que esté» conserva ese valor representativo. «Azotea» mantiene la imagen de un techo plano y utilizable en el contexto doméstico antiguo, más precisa que un simple «techo».
- source_word: δώματος
  english_pob_choice: housetop
  chosen_spanish: azotea
  alternatives_spanish:
  - techo
  - terraza
  lexicon: BDAG
  rationale: δώμα designa el techo de una casa, a menudo plano y transitable. «Azotea» comunica mejor en español la idea de una superficie superior usable, y evita la ambigüedad de «techo», que puede sonar a la cubierta interior de una habitación.
- source_word: μὴ καταβάτω
  english_pob_choice: let ... not go down
  chosen_spanish: no baje
  alternatives_spanish:
  - no debe bajar
  - que no baje
  lexicon: BDAG
  rationale: El imperativo prohibitivo se vierte naturalmente como «no baje» en español, preservando la urgencia de la orden sin sobrecargar la frase. «Bajar» refleja fielmente el movimiento de descender desde la azotea.
- source_word: ἆραι
  english_pob_choice: to take
  chosen_spanish: para tomar
  alternatives_spanish:
  - para llevar
  - para sacar
  lexicon: BDAG
  rationale: El infinitivo de propósito expresa bajar con el fin de tomar o recoger algo. «Tomar» es la opción más directa y cercana al valor contextual de αἴρω aquí.
- source_word: τὰ ἐκ τῆς οἰκίας αὐτοῦ
  english_pob_choice: the things out of his house
  chosen_spanish: lo que tiene en su casa
  alternatives_spanish:
  - las cosas de su casa
  - sus pertenencias de la casa
  lexicon: BDAG
  rationale: La expresión neutra plural es elíptica para los objetos/posesiones de la casa. «Lo que tiene en su casa» transmite el sentido de pertenencias sin volver la frase pesada en español, manteniendo el carácter general del original.
- source_word: οἰκίας
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - vivienda
  lexicon: BDAG
  rationale: En este contexto concreto, «casa» conserva el sentido físico del edificio desde cuya azotea se baja. «Hogar» desplazaría el foco hacia lo afectivo y «vivienda» sonaría más técnico.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de uno
  lexicon: BDAG
  rationale: En español, el posesivo átono «su» comunica de manera natural el genérico singular masculino del griego, sin necesidad de marcar género explícitamente como en inglés. El referente sigue siendo individual y representativo.
theological_decisions:
- issue: Prohibición urgente en forma singular representativa
  english_pob_reading: Retain singular masculine 'his' in English
  chosen_spanish_reading: Mantener un singular representativo y directo en español
  alternative_spanish_readings:
  - el suyo
  - su propia casa
  rationale: El griego usa una construcción singular genérica; en español conviene conservar esa fuerza directa sin convertirla en plural ni añadir énfasis ajeno al texto. La opción elegida mantiene la instrucción inmediata y concreta.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene la imagen concreta de la azotea/housetop, la prohibición urgente de no descender y el objeto indefinido de la casa. No se detectan revisiones aplicadas en el paquete fuente, y el consenso de revisión es alto.'
  spanish_consistency_notes:
  - Se prefirió «azotea» para conservar la referencia cultural de una cubierta plana y transitable.
  - Se mantuvo el posesivo singular representativo con «su» sin neutralizar el referente.
  - La frase final usa «lo que tiene en su casa» para evitar una construcción demasiado pesada, pero sin perder el sentido de pertenencias implícito en el griego.
