lexical_decisions:
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: BDAG
  rationale: Marca secuencia temporal en el discurso de Jesús. «Entonces» es natural en español y conserva la progresión temporal sin añadir matiz.
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: those in Judea
  chosen_spanish: los que están en Judea
  alternatives_spanish:
  - los de Judea
  - los que se hallan en Judea
  lexicon: BDAG
  rationale: El artículo con frase preposicional funciona de modo sustantivo, refiriéndose a personas ubicadas en Judea. En español, «los que están en Judea» mantiene esa referencia de manera clara y natural.
- source_word: Ἰουδαίᾳ
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  lexicon: BDAG
  rationale: Es el nombre geográfico estándar y transparente en español.
- source_word: φευγέτωσαν
  english_pob_choice: must flee
  chosen_spanish: deben huir
  alternatives_spanish:
  - huyan
  - tienen que huir
  lexicon: BDAG
  rationale: El imperativo de tercera persona plural expresa una orden urgente. «Deben huir» comunica esa fuerza imperativa de forma natural en español moderno, sin perder la sensación de instrucción urgente. «Huyan» sería más literal, pero menos explícito respecto de la fuerza pragmática destacada en el audit trail inglés.
- source_word: ἐπὶ τὰ ὄρη
  english_pob_choice: to the mountains
  chosen_spanish: a los montes
  alternatives_spanish:
  - a las montañas
  - hacia los montes
  - a las colinas
  lexicon: BDAG
  rationale: Con verbo de movimiento, ἐπί + acusativo indica destino. «A los montes» es fiel y idiomático; «montes» conserva el término bíblico y no debilita ὄρη como podría hacerlo «colinas».
theological_decisions:
- issue: Fuerza del mandato urgente en un aviso escatológico
  english_pob_reading: 'Rendered as a direct urgent command: ''must flee'''
  chosen_spanish_reading: «deben huir» como mandato urgente y directo
  alternative_spanish_readings:
  - «huyan»
  - «tienen que huir»
  rationale: No se trata de suavizar el imperativo sino de reproducir su urgencia en un español claro y publicable. «Deben huir» mantiene la obligación práctica sin introducir una formulación demasiado rígida o arcaica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the plain force of the warning without adding doctrinal interpretation.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: temporalidad secuencial, sujeto sustantivado, imperativo urgente y destino con preposición de movimiento. No se documentan revisiones posteriores en el expediente proporcionado.'
  spanish_consistency_notes:
  - Se usa «Judea» como topónimo estándar y «montes» para conservar el registro bíblico del original.
  - Se mantiene una sintaxis natural en español sin perder la fuerza imperativa del griego.
  - La nota alternativa conserva la opción más literal («huyan») que el inglés audit trail preserva con 'let them flee'.
