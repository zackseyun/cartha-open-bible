translation:
  language: es
  text: Y muchos falsos profetas se levantarán y desviarán a muchos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «engañarán a muchos».
    reason: lexical_alternative
  - marker: b
    text: O «serán levantados».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  - muchos de ellos
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo; en español, «muchos» reproduce de forma natural y fiel la cantidad amplia sin añadir matiz innecesario.
- source_word: ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_spanish: falsos profetas
  alternatives_spanish:
  - profetas falsos
  - pseudo-profetas
  lexicon: BDAG
  rationale: El compuesto designa profetas que son falsos o engañosos. «Falsos profetas» es la equivalencia bíblica establecida en español y conserva el valor lexical sin sobretraducción.
- source_word: ἐγερθήσονται
  english_pob_choice: will arise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - surgirán
  - aparecerán
  - serán levantados
  lexicon: BDAG
  rationale: El futuro pasivo puede leerse como «serán levantados», pero en este contexto describe la irrupción de figuras engañosas. «Se levantarán» mantiene el sentido eventivo de surgir/emerger sin sugerir resurrección.
- source_word: πλανήσουσιν
  english_pob_choice: will lead ... astray
  chosen_spanish: desviarán
  alternatives_spanish:
  - engañarán
  - desviarán de la verdad
  - llevarán astray
  lexicon: BDAG
  rationale: «Desviar» conserva el campo semántico de πλανάω, que incluye extraviar, inducir al error y hacer vagar. En español, la forma verbal simple «desviarán» es clara y digna; la idea de extravío queda implícita en el contexto escatológico.
- source_word: πολλούς
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - a gran número de personas
  lexicon: BDAG
  rationale: Objeto directo de πλανήσουσιν. «A muchos» expresa correctamente el alcance de la acción en español y conserva el paralelo con el griego.
- source_word: καὶ ... καὶ
  english_pob_choice: And ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Y ... también
  - tanto ... como
  lexicon: BDAG
  rationale: La coordinación repetida se preserva con «Y ... y» para mantener la estructura acumulativa del aviso de Jesús.
theological_decisions:
- issue: Alcance del engaño de los falsos profetas
  english_pob_reading: The verse warns that false prophets will mislead many people, without specifying the exact mechanism or extent of that deception.
  chosen_spanish_reading: El versículo advierte que los falsos profetas desviarán a muchos, sin precisar el mecanismo ni limitar el tipo de extravío.
  alternative_spanish_readings:
  - engañarán a muchos
  - los llevarán al error
  - los apartarán del camino
  rationale: El verbo griego πλανάω es suficientemente amplio para abarcar engaño doctrinal, moral o espiritual. «Desviarán» conserva esa amplitud y evita reducir la advertencia a una sola categoría.
  doctrine_reference: Preservar la tensión teológica sin resolverla de manera excesiva.
translation_notes:
  revision_awareness: Se corrigió la validación anterior insertando los marcadores [a] y [b] exactamente en el texto principal. La redacción española mantiene la paralela coordinación griega y conserva la amplitud semántica de πλανήσουσιν y ἐγερθήσονται.
  spanish_consistency_notes:
  - Se prefirió «Y» inicial para reflejar el καί coordinante.
  - «Falsos profetas» se mantiene como término bíblico estable y claro en español.
  - «Se levantarán» evita una lectura pasiva de resurrección, coherente con el contexto de aparición de falsos maestros.
  - «Desviarán» preserva el campo de extravío/engaño sin estrechar el verbo griego a una sola modalidad.
