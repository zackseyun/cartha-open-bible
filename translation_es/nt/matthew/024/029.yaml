review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: inmediatez temporal, tribulación de aquellos días, oscurecimiento del sol, retiro de la luz de la luna, caída de las estrellas y conmoción de las potencias de los cielos. También preserva adecuadamente la ambigüedad apocalíptica de αἱ δυνάμεις τῶν οὐρανῶν. Sin embargo, hay un desajuste de notas: la nota [a] en inglés corresponde a la alternativa de ''heaven/sky'' para ἀπὸ τοῦ οὐρανοῦ, pero en español se aplicó a ''tribulación''. Además, ''será oscurecido'' es fiel al pasivo griego, pero resulta menos natural en español que ''se oscurecerá'', que comunica el mismo evento con mejor legibilidad.'
  spanish_quality_summary: El español es generalmente claro, digno y de registro bíblico moderno. 'Pero inmediatamente después de la tribulación de aquellos días...' suena natural. 'Las potencias de los cielos' es defendible y mantiene la amplitud del original. La principal mejora de estilo es cambiar 'el sol será oscurecido' por 'el sol se oscurecerá', que evita una pasiva forzada en español. También conviene corregir la ubicación y contenido de las notas para que sigan el expediente auditado y no introduzcan una nota innecesaria sobre 'tribulación'.
  glossary_alignment: 'La terminología clave está bien alineada: θλῖψις como ''tribulación'', οὐρανός como ''cielo'' en español por naturalidad, y δυνάμεις como ''potencias'' para preservar ambigüedad. No hay conflicto con los términos doctrinales del proyecto. La excepción respecto a ''from heaven'' -> ''del cielo'' está bien justificada por idiomaticidad española.'
  issues:
  - severity: medium
    issue: La nota [a] está mal asignada y no corresponde al expediente inglés.
    rationale: En el POB inglés, la primera nota preserva la alternativa léxica para ἀπὸ τοῦ οὐρανοῦ ('from heaven' / 'the sky'), no para θλῖψις. La nota española sobre 'tribulación' introduce información no requerida y desplaza la nota documentada.
  - severity: low
    issue: '''Será oscurecido'' suena poco idiomático en español.'
    rationale: Aunque refleja la voz pasiva griega, en español bíblico moderno 'se oscurecerá' comunica mejor el sentido sin pérdida semántica relevante.
