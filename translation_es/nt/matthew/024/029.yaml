translation:
  language: es
  text: Pero inmediatamente después de la tribulación de aquellos días, el sol se oscurecerá, y la luna no dará su luz, y las estrellas caerán del cielo[a], y las potencias de los cielos[b] serán sacudidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del firmamento' para 'del cielo' en 'las estrellas caerán del cielo'.
    reason: lexical_alternative
  - marker: b
    text: '''Las potencias de los cielos'' puede referirse a fuerzas cósmicas, cuerpos celestes o potestades celestiales; la expresión griega se mantiene amplia de manera intencional.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - de inmediato
  - enseguida
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la idea de inmediatez fuerte del adverbio griego, manteniendo el tono profético sin arcaísmo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca la transición discursiva hacia lo que sigue a la tribulación; 'Pero' conserva el matiz de contraste suave que el POB inglés señaló con 'But'.
- source_word: μετὰ τὴν θλῖψιν
  english_pob_choice: after the tribulation
  chosen_spanish: después de la tribulación
  alternatives_spanish:
  - después de la angustia
  - después de la aflicción
  lexicon: BDAG
  rationale: '''Tribulación'' reproduce bien el peso escatológico del término y sigue la elección del POB inglés; se evita rebajar su fuerza con ''angustia'' o ''aflicción''.'
- source_word: τῶν ἡμερῶν ἐκείνων
  english_pob_choice: of those days
  chosen_spanish: de aquellos días
  alternatives_spanish:
  - en aquellos días
  lexicon: BDAG
  rationale: Conserva la referencia temporal del genitivo y su enlace con la tribulación sin reordenar innecesariamente la estructura griega.
- source_word: σκοτισθήσεται
  english_pob_choice: will be darkened
  chosen_spanish: será oscurecido
  alternatives_spanish:
  - se oscurecerá
  - será cubierto de oscuridad
  lexicon: BDAG
  rationale: El pasivo futuro se mantiene con 'será oscurecido', que preserva la voz y el tono solemne; en español es más idiomático que un simple 'se oscurecerá' cuando el sujeto es el sol.
- source_word: οὐ δώσει τὸ φέγγος αὐτῆς
  english_pob_choice: will not give its light
  chosen_spanish: no dará su luz
  alternatives_spanish:
  - no dará su resplandor
  - no emitirá su luz
  lexicon: BDAG
  rationale: '''Dar su luz'' es una forma natural y fiel de reproducir la imagen del griego y del POB inglés; ''luz'' comunica mejor que una paráfrasis como ''resplandor''.'
- source_word: πεσοῦνται
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se precipitarán
  - se desplomarán
  lexicon: BDAG
  rationale: '''Caerán'' reproduce el futuro simple con claridad y sin añadir dramatización innecesaria; mantiene la imagen directa del texto.'
- source_word: ἀπὸ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo/desde el cielo
  lexicon: BDAG
  rationale: Aunque el POB inglés opta por 'heaven' para el registro bíblico, en español 'del cielo' es la forma más natural y digna para comunicar el mismo campo semántico sin sonar forzada.
- source_word: αἱ δυνάμεις τῶν οὐρανῶν
  english_pob_choice: the powers of the heavens
  chosen_spanish: las potencias de los cielos
  alternatives_spanish:
  - los poderes de los cielos
  - las fuerzas de los cielos
  - las potencias celestiales
  lexicon: BDAG
  rationale: Se conserva la ambigüedad apocalíptica del sintagma. 'Potencias' es un equivalente español tradicional y comprensible para δυνάμεις; 'de los cielos' mantiene el plural del griego y evita resolver si se trata de cuerpos celestes, fuerzas cósmicas o potestades celestiales.
- source_word: σαλευθήσονται
  english_pob_choice: will be shaken
  chosen_spanish: serán sacudidas
  alternatives_spanish:
  - serán conmovidas
  - serán agitadas
  lexicon: BDAG
  rationale: '''Serán sacudidas'' conserva el pasivo y la imagen de conmoción física o cósmica, en línea con la literalidad controlada del POB inglés.'
theological_decisions:
- issue: Naturaleza de las señales cósmicas apocalípticas
  english_pob_reading: Retain the imagery straightforwardly without resolving whether it is strictly literal astronomical collapse, prophetic-symbolic language, or both.
  chosen_spanish_reading: Mantener la imagen sin decidir si describe un colapso astronómico literal, lenguaje profético-simbólico, o ambas cosas.
  alternative_spanish_readings:
  - Interpretación estrictamente literal de los fenómenos cósmicos
  - Interpretación principalmente simbólica de conmoción judicial o política
  rationale: La traducción debe preservar la tensión apocalíptica del texto sin imponer un sistema escatológico concreto. 'Potencias de los cielos' y 'serán sacudidas' dejan abierta la lectura, tal como el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó el contexto inglés y la nueva redacción española para mantener la fuerza temporal de Εὐθέως, la ambigüedad apocalíptica de αἱ δυνάμεις τῶν οὐρανῶν y el registro bíblico de οὐρανός sin mecanizar calcos innecesarios. No se requirieron cambios adicionales frente al audit trail vigente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene 'tribulación' para θλῖψις por consistencia con el léxico POB ya auditado.
  - Se opta por 'cielo(s)' como equivalente natural de οὐρανός en este contexto, sin perder el registro bíblico.
  - Se evita 'Cristo/Mesías' porque no aparece en el versículo.
  - Se conserva el pasivo en español ('será oscurecido', 'serán sacudidas') para reflejar la voz griega.
