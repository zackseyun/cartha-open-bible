  text: Εὐθέως δὲ μετὰ τὴν θλῖψιν τῶν ἡμερῶν ἐκείνων ὁ ἥλιος σκοτισθήσεται, καὶ ἡ σελήνη οὐ δώσει τὸ φέγγος αὐτῆς, καὶ οἱ ἀστέρες πεσοῦνται ἀπὸ τοῦ οὐρανοῦ, καὶ αἱ δυνάμεις τῶν οὐρανῶν σαλευθήσονται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/029.yaml
  text: But immediately after the tribulation of those days[a], the sun will be darkened, and the moon will not give its light, and the stars will fall from heaven[b], and the powers of the heavens will be shaken.
  footnotes:
  - marker: a
    text: Or 'the sky' for 'heaven' in 'the stars will fall from heaven.'
    reason: lexical_alternative
  - marker: b
    text: '''The powers of the heavens'' may refer to cosmic forces, heavenly bodies, or heavenly powers; the Greek expression is intentionally left broad.'
    reason: lexical_alternative
