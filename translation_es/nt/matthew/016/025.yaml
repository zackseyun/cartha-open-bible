translation:
  language: es
  text: Porque todo el que quiera salvar su vida[a] la perderá; pero todo el que pierda su vida por mi causa la encontrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma» en todo el versículo; el griego psychē puede significar «vida», «yo mismo» o «alma», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς γὰρ ἐὰν / ὃς δ’ ἂν
  english_pob_choice: whoever ... but whoever
  chosen_spanish: Porque todo el que ...; pero todo el que ...
  alternatives_spanish:
  - Porque quienquiera que ...; pero quienquiera que ...
  - Pues el que ...; pero el que ...
  lexicon: BDAG
  rationale: La construcción griega expresa una condición general indefinida; en español, 'todo el que' comunica con naturalidad esa generalidad. Se conserva 'Porque' para la conexión con el contexto anterior y 'pero' para marcar el contraste adversativo entre las dos cláusulas.
- source_word: θέλῃ
  english_pob_choice: wants
  chosen_spanish: quiera
  alternatives_spanish:
  - quiera de veras
  - desee
  lexicon: BDAG
  rationale: θέλω expresa voluntad o deseo. 'Quiera' es la forma más natural en español para una condición general y mantiene el matiz de disposición volitiva sin endurecer el estilo.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: BDAG
  rationale: En este dicho, ψυχή se usa en el sentido de la vida propia, en tensión con salvarla, perderla y hallarla. 'Vida' conserva mejor el paralelismo y la paradoja. Se reconoce la alternativa 'alma' porque el término griego también puede llevar ese sentido según el contexto.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - preservar
  lexicon: BDAG
  rationale: σῴζω se traduce con 'salvar', que en español mantiene el paralelo verbal con 'perder' y resulta claro y directo en este contexto de discipulado.
- source_word: ἀπολέσει / ἀπολέσῃ
  english_pob_choice: will lose / loses
  chosen_spanish: la perderá / pierda
  alternatives_spanish:
  - la destruirá / destruya
  - la arruinará / arruine
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí no describe aniquilación, sino pérdida en contraste con salvar. 'Perder' reproduce bien la antítesis y evita sobreinterpretar el verbo.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: for my sake
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - por mi causa
  - por amor a mí
  lexicon: BDAG
  rationale: ἕνεκεν con genitivo expresa motivo o causa. 'Por causa de mí' es natural en español bíblico moderno, conserva la idea de lealtad personal a Jesús y evita una formulación demasiado libre.
- source_word: εὑρήσει
  english_pob_choice: will find
  chosen_spanish: la encontrará
  alternatives_spanish:
  - la hallará
  - la encontrará de nuevo
  lexicon: BDAG
  rationale: εὑρίσκω se vierte con 'encontrar', que es claro y conserva la paradoja del dicho. 'Hallar' sería posible, pero 'encontrar' es más transparente para lectores contemporáneos.
- source_word: αὐτοῦ / αὐτήν
  english_pob_choice: his / it
  chosen_spanish: su / la
  alternatives_spanish:
  - su / eso
  - su / ella
  lexicon: Greek grammar
  rationale: El griego usa formas masculinas singulares con valor genérico/representativo. En español, 'su vida' evita forzar género personal sobre un sustantivo femenino, y 'la' retoma naturalmente 'vida' en la segunda mitad del versículo.
theological_decisions:
- issue: Sentido de ψυχή en un dicho sobre discipulado y pérdida de la vida
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - vida propia
  - ser
  rationale: La secuencia salvar/perder/encontrar pide en español un término que preserve el contraste concreto del dicho. 'Vida' mantiene el sentido de la existencia que puede ser puesta en juego por seguir a Jesús. Se deja constancia de 'alma' como alternativa teológicamente importante, sin imponerla donde el contexto inmediato favorece 'vida'.
  doctrine_reference: Translation philosophy §§3, 4, 5
- issue: Fuerza del contraste moral y discipular
  english_pob_reading: For whoever wants to save his life will lose it, but whoever loses his life for my sake will find it.
  chosen_spanish_reading: Porque todo el que quiera salvar su vida, la perderá; pero todo el que pierda su vida por causa de mí, la encontrará.
  alternative_spanish_readings:
  - Pues el que quiera salvar su vida, la perderá; pero el que pierda su vida por causa de mí, la encontrará.
  rationale: La traducción mantiene el paralelismo y la tensión ética del dicho sin suavizar el costo del discipulado. 'Por causa de mí' conserva el motivo de lealtad personal a Jesús, que es central en la cláusula final.
  doctrine_reference: Translation philosophy §§3, 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y concuerda con el análisis inglés de la POB: construcción general indefinida, contraste adversativo, y ψυχή como ''vida'' en el contexto de discipulado. No se introdujeron revisiones textuales; se preserva la alternativa léxica ''alma'' en nota porque el audit trail inglés la documenta como posibilidad significativa.'
  spanish_consistency_notes:
  - Se usa «vida» para ψυχή en el cuerpo del texto por coherencia con el paralelismo salvar/perder/encontrar.
  - Se mantiene «por causa de mí» para ἕνεκεν ἐμοῦ, en lugar de una formulación más devocional como «por amor a mí», para respetar el motivo explícito del griego.
  - «Todo el que» traduce la generalidad de ὃς ... ἐὰν / ἂν sin masculinizar innecesariamente el enunciado en español.
  - La nota al pie usa «alma» como alternativa léxica reconocida, no como lectura principal.
