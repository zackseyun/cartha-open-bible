translation:
  language: es
  text: 'Entonces Jesús dijo a sus discípulos[a]: «Si alguien quiere venir en pos de mí, que se niegue a sí mismo, tome su cruz y me siga.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si alguien quiere venir en pos de mí, que se niegue a sí mismo y tome su cruz y me siga». El griego es singular y masculino en forma, usado aquí con sentido representativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Marca temporal-discursiva que introduce el dicho en secuencia narrativa. «Entonces» es natural en español y conserva la relación consecutiva sin añadir interpretación.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - habló
  lexicon: BDAG
  rationale: Verbo narrativo estándar para introducir discurso directo. «Dijo» conserva la simplicidad del griego sin matices adicionales.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a sus aprendices
  - a sus seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente establecido de μαθηταί en el contexto evangélico. El posesivo «sus» reproduce αὐτοῦ.
- source_word: Εἴ τις θέλει
  english_pob_choice: If anyone wants
  chosen_spanish: Si alguien quiere
  alternatives_spanish:
  - Si cualquiera quiere
  - Si alguno quiere
  lexicon: BDAG
  rationale: La construcción condicional expresa voluntad general. «Alguien» mantiene el alcance indefinido y el verbo «quiere» refleja θέλει con claridad natural en español.
- source_word: ὀπίσω μου ἐλθεῖν
  english_pob_choice: to come after me
  chosen_spanish: venir en pos de mí
  alternatives_spanish:
  - venir detrás de mí
  - venir después de mí
  lexicon: BDAG
  rationale: La expresión es idiomática para seguir como discípulo. «En pos de mí» preserva la metáfora relacional sin reducirla prematuramente al verbo explícito de seguir.
- source_word: ἀπαρνησάσθω ἑαυτὸν
  english_pob_choice: let him deny himself
  chosen_spanish: que se niegue a sí mismo
  alternatives_spanish:
  - que renuncie a sí mismo
  - debe negarse a sí mismo
  lexicon: BDAG
  rationale: El imperativo en tercera persona pide una acción decisiva de auto-negación. «Que se niegue a sí mismo» conserva el mandato y el reflexivo del griego con buena fluidez en español.
- source_word: ἀράτω
  english_pob_choice: take up
  chosen_spanish: tome
  alternatives_spanish:
  - levante
  - cargue
  lexicon: BDAG
  rationale: En la colocación con «cruz», el aoristo imperativo de αἴρω puede expresarse naturalmente como «tomar» en español bíblico actual, manteniendo la idea de asumir/coger para llevar. La frase completa «tome su cruz» conserva la fuerza idiomática.
- source_word: τὸν σταυρὸν αὐτοῦ
  english_pob_choice: his cross
  chosen_spanish: su cruz
  alternatives_spanish:
  - la cruz que le pertenece
  - la propia cruz
  lexicon: BDAG
  rationale: «Cruz» traduce literalmente σταυρός. El posesivo «su» reproduce αὐτοῦ y mantiene el sentido individualizado del costo del discipulado.
- source_word: ἀκολουθείτω μοι
  english_pob_choice: follow me
  chosen_spanish: me siga
  alternatives_spanish:
  - sígame
  - siga siguiéndome
  lexicon: BDAG
  rationale: El imperativo presente sugiere continuidad. «Me siga» comunica adecuadamente el mandato y su orientación discipular en español sin sonar forzado.
theological_decisions:
- issue: Gramática singular masculina representativa
  english_pob_reading: 'Retain masculine singular in English: ''If anyone... let him deny himself'''
  chosen_spanish_reading: 'Conservar el singular representativo en español: «Si alguien quiere... que se niegue a sí mismo»'
  alternative_spanish_readings:
  - «Si alguien quiere... que se nieguen a sí mismos»
  - «Si alguien quiere... que se niegue a sí misma/o»
  rationale: El griego usa τις con imperativos y pronombre reflexivo singulares masculinos. En español, «alguien» y «se niegue a sí mismo» reproducen el valor genérico sin añadir pluralización ni reformulación inclusiva que borre la forma fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Matiz durativo del imperativo final
  english_pob_reading: follow me
  chosen_spanish_reading: «me siga» como imperativo que en contexto implica continuidad
  alternative_spanish_readings:
  - «siga siguiéndome»
  - «esté siguiéndome»
  rationale: ἀκολουθείτω está en presente imperativo y puede sugerir acción continua. En español, «me siga» es la forma más natural y fiel, dejando la continuidad implícita en el contexto de discipulado.
  doctrine_reference: BDAG / uso aspectual del presente imperativo
translation_notes:
  revision_awareness: Comparé el texto griego SBLGNT con el expediente inglés POB y su nota de alternativa inclusiva. No hubo revisiones aplicadas en el registro inglés más reciente; por eso mantengo una solución española directa, de registro bíblico moderno, que conserva el singular representativo y la secuencia verbal del original.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «discípulos» para μαθηταί, manteniendo el valor técnico del término en los Evangelios.
  - Se usa «cruz» para σταυρός sin suavizar el referente histórico.
  - Se evita «Cristo» porque el texto no contiene Χριστός.
  - Se conserva «venir en pos de mí» para reflejar la metáfora de seguimiento antes del imperativo explícito «me siga».
