    rationale: El griego usa infinitivo pasivo y el audit trail inglés explícitamente preserva «be raised». Cambiarlo a «resucitar» en el texto principal pierde una decisión lexical y teológica documentada.
  - severity: high
    issue: La nota c está invertida respecto del texto y del griego.
    rationale: Actualmente dice «O “ser resucitado”» mientras el texto principal ya usa «resucitar». La nota debe presentar como alternativa activa «resucitar» y explicar que el griego es pasivo.
  - severity: medium
