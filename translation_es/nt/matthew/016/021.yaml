translation:
  language: es
  text: Desde entonces, Jesús comenzó a mostrar a sus discípulos que le era necesario ir a Jerusalén, y sufrir muchas cosas[a] de parte de los ancianos, de los principales sacerdotes y de los escribas[b], y ser muerto, y ser resucitado[c] al tercer día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sufrir mucho». El griego dice literalmente «sufrir muchas cosas», subrayando la variedad de padecimientos.
    reason: lexical_alternative
  - marker: b
    text: O «a manos de los ancianos, de los principales sacerdotes y de los escribas».
    reason: alternative_reading
  - marker: c
    text: 'O «resucitar». El griego es pasivo: «ser resucitado» o, más literalmente, «ser levantado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ τότε
  english_pob_choice: From that time
  chosen_spanish: Desde entonces
  alternatives_spanish:
  - A partir de ese momento
  - Desde aquel tiempo
  lexicon: BDAG
  rationale: Marca un giro narrativo. «Desde entonces» conserva el valor temporal y suena natural en español sin perder solemnidad.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: Expresa el inicio de una nueva fase en la enseñanza de Jesús con un verbo natural y formal.
- source_word: δεικνύειν
  english_pob_choice: to show
  chosen_spanish: mostrar
  alternatives_spanish:
  - hacer ver
  - explicar
  lexicon: BDAG
  rationale: «Mostrar» reproduce bien el sentido de dar a conocer o señalar, sin añadir una explicación más interpretativa que el griego no exige.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  lexicon: BDAG
  rationale: Conserva la relación posesiva y la construcción natural del español con el verbo «mostrar».
- source_word: δεῖ
  english_pob_choice: he must
  chosen_spanish: le era necesario
  alternatives_spanish:
  - tenía que
  - debía
  lexicon: BDAG
  rationale: La necesidad impersonal del griego se vierte bien con «le era necesario», que preserva la fuerza de obligación sin explicitar en la frase principal su fundamento teológico.
- source_word: εἰς Ἱεροσόλυμα ἀπελθεῖν
  english_pob_choice: go to Jerusalem
  chosen_spanish: ir a Jerusalén
  alternatives_spanish:
  - dirigirse a Jerusalén
  - partir a Jerusalén
  lexicon: BDAG
  rationale: Es la forma más natural y fiel para el movimiento hacia un destino.
- source_word: πολλὰ παθεῖν
  english_pob_choice: suffer many things
  chosen_spanish: sufrir muchas cosas[a]
  alternatives_spanish:
  - padecer mucho
  - sufrir mucho
  lexicon: BDAG
  rationale: Mantiene la forma más cercana al plural neutro griego. La nota aclara que el giro puede equivaler a «sufrir mucho», pero «muchas cosas» refleja mejor la variedad de sufrimientos.
- source_word: ἀπὸ τῶν πρεσβυτέρων καὶ ἀρχιερέων καὶ γραμματέων
  english_pob_choice: from the elders and chief priests and scribes
  chosen_spanish: de parte de los ancianos, de los principales sacerdotes y de los escribas[b]
  alternatives_spanish:
  - por parte de los ancianos, de los jefes de los sacerdotes y de los escribas
  - a manos de los ancianos, de los principales sacerdotes y de los escribas
  lexicon: BDAG
  rationale: «De parte de» refleja ἀπό como procedencia/fuente de la aflicción y deja abierta la relación de agencia, tal como en el inglés auditado. «Ancianos», «principales sacerdotes» y «escribas» corresponden a los grupos de liderazgo judío del contexto.
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - líderes
  lexicon: BDAG
  rationale: «Ancianos» es el equivalente habitual y transparente para el grupo de liderazgo judío.
- source_word: ἀρχιερέων
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  lexicon: BDAG
  rationale: En plural, esta expresión puede renderizarse como «principales sacerdotes» para preservar la referencia al grupo dirigente sacerdotal sin sugerir varios sumos sacerdotes individuales al mismo tiempo.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente más directo y formalmente unido al término griego.
- source_word: ἀποκτανθῆναι
  english_pob_choice: be killed
  chosen_spanish: ser muerto[c]
  alternatives_spanish:
  - ser asesinado
  - ser ejecutado
  lexicon: BDAG
  rationale: La pasiva griega se conserva mejor con «ser muerto», que mantiene la forma pasiva y la sobriedad del enunciado. La nota ofrece la alternativa «resucitar/rise» para el siguiente verbo, pero aquí se conserva el asesinato como acto pasivo.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  lexicon: BDAG
  rationale: Equivale de forma natural al dativo temporal griego y es la expresión usual en español bíblico contemporáneo.
- source_word: ἐγερθῆναι
  english_pob_choice: be raised
  chosen_spanish: resucitar
  alternatives_spanish:
  - ser levantado
  - ser resucitado
  lexicon: BDAG
  rationale: Aunque el griego es pasivo, en español «resucitar» comunica con claridad el hecho de volver a la vida. Se mantiene la referencia temporal y la frase resulta más natural; la pasividad implícita queda preservada por el contexto y puede explicarse en nota si se desea.
theological_decisions:
- issue: Necesidad expresada por δεῖ en la predicción de la pasión
  english_pob_reading: Render as 'he must' without specifying the source of necessity in the main text.
  chosen_spanish_reading: «le era necesario» sin explicitar en el texto principal si la necesidad proviene del plan divino, del cumplimiento escritural o de la inevitabilidad histórica.
  alternative_spanish_readings:
  - «tenía que»
  - «debía»
  - «era necesario que él fuera»
  rationale: El griego afirma necesidad, pero no la desglosa. La formulación española conserva esa tensión y evita resolver en la traducción lo que el pasaje no explica de manera explícita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Valor pasivo de ἐγερθῆναι
  english_pob_reading: Use passive 'be raised' rather than active/intransitive 'rise.'
  chosen_spanish_reading: «resucitar» en el texto principal, con la nota que reconoce la lectura pasiva subyacente del griego.
  alternative_spanish_readings:
  - «ser resucitado»
  - «ser levantado»
  - «volver a la vida»
  rationale: El griego es pasivo, y esa pasividad es teológicamente significativa. En español, sin embargo, «resucitar» es la forma más clara y natural; la tensión se preserva al documentar la voz del original en la decisión lexical y, si se requiere, en una nota textual.
  doctrine_reference: Primacía del original y preservación de la tensión teológica.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y no se detectaron cambios necesarios respecto de la lectura base; la versión española mantiene la estructura, el alcance semántico y las tensiones lexicales/teológicas documentadas.
  spanish_consistency_notes:
  - Se conserva «Jesús» para Ἰησοῦς.
  - Se usa «Dios»/«Yahvé» según corresponda en este registro, aunque este versículo no las contiene.
  - Se evita «SEÑOR» como máscara para el nombre divino, irrelevante aquí.
  - «Escribas» se mantiene como término técnico consistente con el proyecto.
  - La pasiva del griego se documenta en nota para no perder la tensión verbal aunque la superficie española use una forma más natural.
