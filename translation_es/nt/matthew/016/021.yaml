review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: giro narrativo («Desde entonces»), inicio de una nueva fase («comenzó»), necesidad («le era necesario»), viaje a Jerusalén, sufrimiento a manos/de parte de los líderes judíos, muerte y referencia temporal al tercer día. Sin embargo, falla en un punto importante del audit trail y del griego: ἐγερθῆναι es pasivo y el español principal lo vierte como activo/intransitivo («resucitar»). Además, la nota c invierte erróneamente la relación principal/alternativa: el texto principal debería conservar la pasiva y la nota puede ofrecer «resucitar» como alternativa. También «ser muerto» es comprensible pero menos natural que «ser matado» o «ser muerto»; aquí conviene mantener una forma pasiva clara y sobria.'
  spanish_quality_summary: 'El español es mayormente claro y digno, con registro bíblico legible. «Desde entonces» y «comenzó a mostrar» funcionan bien. «Le era necesario» es fiel, aunque algo más pesado que «debía»; sigue siendo aceptable. «De parte de» suena algo administrativo pero es defendible para reflejar ἀπό sin interpretar demasiado; no exige cambio. La principal mejora necesaria es hacer más natural y fiel la última cláusula pasiva: «ser resucitado al tercer día» o mejor «ser levantado al tercer día» si se quisiera máxima literalidad, pero en español bíblico general «ser resucitado» comunica mejor. La puntuación con comas es aceptable.'
  glossary_alignment: 'No hay conflictos con los términos de proyecto como Yahvé/Mesías/etc. Los términos de liderazgo judío están bien alineados: «ancianos», «principales sacerdotes», «escribas». La decisión sobre ἐγερθῆναι no sigue la rationale inglesa, que pidió preservar la pasiva en el texto principal. La nota c también debe ajustarse para que la alternativa sea «resucitar» y la forma principal sea pasiva.'
  issues:
