translation:
  language: es
  text: Y yo también te digo que tú eres Pedro, y sobre esta roca[a] edificaré mi iglesia, y las puertas del Hades[b] no prevalecerán contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «sobre esta roca» puede entenderse como referencia a Pedro, a la confesión de Pedro, o a Pedro como confesor y representante apostólico.
    reason: alternative_reading
  - marker: b
    text: Griego «Hades»; es decir, el reino de los muertos. Tradicionalmente, «infierno».
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ δέ
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y yo
  - Y yo, por mi parte
  lexicon: BDAG
  rationale: κἀγώ añade énfasis de respuesta (“yo también / yo asimismo”), y δέ continúa el discurso. “Y yo también” conserva esa fuerza responsiva sin exagerar contraste.
- source_word: σοι λέγω
  english_pob_choice: say to you
  chosen_spanish: te digo
  alternatives_spanish:
  - te digo a ti
  - te hablo
  lexicon: BDAG
  rationale: En español directo, “te digo” reproduce con naturalidad la introducción solemne del dicho sin cambiar el sentido de λέγω.
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Petro
  lexicon: BDAG
  rationale: Los nombres propios bíblicos se adaptan al uso español estándar. “Pedro” mantiene la identificación personal y permite el juego de palabras con “roca” tanto como el español lo permite.
- source_word: ἐπὶ ταύτῃ τῇ πέτρᾳ
  english_pob_choice: on this rock
  chosen_spanish: sobre esta roca
  alternatives_spanish:
  - en esta roca
  - sobre esta peña
  lexicon: BDAG
  rationale: ἐπί con dativo aquí se expresa de modo natural con “sobre”. “Esta roca” conserva el demostrativo y no resuelve la referencia interpretativa.
- source_word: οἰκοδομήσω
  english_pob_choice: I will build
  chosen_spanish: edificaré
  alternatives_spanish:
  - construiré
  - levantaré
  lexicon: BDAG
  rationale: El verbo castellano “edificar” comunica bien la imagen de construcción y es idiomático en registro bíblico para οἰκοδομέω. “Construiré” sería más literal, pero menos tradicional y menos elegante aquí.
- source_word: μου τὴν ἐκκλησίαν
  english_pob_choice: my church
  chosen_spanish: mi iglesia
  alternatives_spanish:
  - mi asamblea
  - mi congregación
  lexicon: BDAG
  rationale: ἐκκλησία en este contexto designa la comunidad perteneciente a Jesús. “Iglesia” es la forma española más reconocible y comunica esa comunidad sin deshacer el vínculo posesivo “mi”.
- source_word: πύλαι ᾅδου
  english_pob_choice: the gates of Hades
  chosen_spanish: las puertas del Hades
  alternatives_spanish:
  - las puertas del reino de los muertos
  - las puertas del infierno
  lexicon: BDAG
  rationale: “Hades” preserva la precisión del término griego ᾅδης y evita cargar el texto con asociaciones posteriores de “infierno”. “Puertas” conserva la imagen de un poder/ámbito que se opone.
- source_word: οὐ κατισχύσουσιν αὐτῆς
  english_pob_choice: will not prevail against it
  chosen_spanish: no prevalecerán contra ella
  alternatives_spanish:
  - no la vencerán
  - no podrán contra ella
  lexicon: BDAG
  rationale: “Prevalecer contra” reproduce bien κατισχύω con su sentido de dominar o imponerse sobre algo, manteniendo el tono adversativo del griego.
theological_decisions:
- issue: Referente de “esta roca”
  english_pob_reading: Retained as 'this rock' without specifying whether it refers to Peter, Peter's confession, or Peter as confessor/apostolic representative.
  chosen_spanish_reading: Mantenido como “esta roca”, sin precisar si se refiere a Pedro, a su confesión, o a Pedro como confesor y representante apostólico.
  alternative_spanish_readings:
  - Pedro
  - la confesión de Pedro
  - Pedro en su función apostólica
  rationale: El griego conserva el juego Πέτρος / πέτρα y no exige cerrar la disputa interpretativa. La traducción española debe preservar esa tensión teológica, no resolverla.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sentido de ᾅδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - infierno
  - reino de los muertos
  rationale: “Hades” evita importar al texto la carga doctrinal posterior de “infierno” y sigue de cerca el término griego. Cuando se desea explicitar, puede glosarse como ámbito de los muertos, pero no debe sustituirse en el texto principal.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés de la POB. La versión española conserva la ambigüedad interpretativa de “esta roca”, mantiene “Hades” por precisión lexical y traduce ἐκκλησία con “iglesia” en el texto principal, dejando una nota para el valor literal de “asamblea/congregación”. No hubo revisiones previas aplicadas en el expediente inglés, así que no se incorporaron cambios de última hora.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en segunda persona singular (“te”, “tú”) como en el griego.
  - Se conserva el paralelismo sonoro Pedro/roca sin forzar una equivalencia etimológica artificial.
  - “Hades” se usa consistentemente como término transliterado, no como “infierno”.
  - “Iglesia” se reserva para ἐκκλησία en el texto principal, con nota explicativa sobre su sentido más literal.
