translation:
  language: es
  text: 'Y dijeron[a]: «Unos dicen: “Juan el Bautista”; otros, “Elías”; y otros, “Jeremías” o “uno de los profetas”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «Unos dicen que tú eres Juan el Bautista, otros Elías, y otros Jeremías o uno de los profetas».'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: And they said
  chosen_spanish: Y dijeron
  alternatives_spanish:
  - Y respondieron
  - Entonces dijeron
  lexicon: BDAG
  rationale: δέ se vierte con una simple continuidad narrativa en español mediante «Y», sin forzar contraste. εἶπαν, de λέγω, se traduce naturalmente por «dijeron» en discurso reportado.
- source_word: Οἱ μὲν
  english_pob_choice: Some say
  chosen_spanish: Unos
  alternatives_spanish:
  - Algunos dicen
  - Unos dicen que
  lexicon: BDAG
  rationale: La secuencia distributiva de μέν/ἄλλοι/ἕτεροι en español queda bien reflejada con «Unos... otros... y otros...». Se evita añadir explícitamente «dicen que» para no sobrecargar una elipsis que el contexto inmediato ya sostiene.
- source_word: Ἰωάννην τὸν βαπτιστήν
  english_pob_choice: John the Baptist
  chosen_spanish: Juan el Bautista
  alternatives_spanish:
  - Juan el Bautizador
  lexicon: BDAG
  rationale: «Bautista» es el equivalente asentado y plenamente inteligible en español para βαπτιστής. «Bautizador» sería más transparente léxicamente, pero menos natural en español bíblico y eclesial.
- source_word: ἄλλοι δὲ
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - pero otros
  - y otros
  lexicon: BDAG
  rationale: Se mantiene la simple coordinación distributiva de la lista, sin añadir contraste fuerte.
- source_word: Ἠλίαν
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: BDAG
  rationale: Se usa la forma estándar en español para el profeta.
- source_word: ἕτεροι δὲ
  english_pob_choice: and others
  chosen_spanish: y otros
  alternatives_spanish:
  - otros
  - aún otros
  lexicon: BDAG
  rationale: ἕτεροι introduce otro grupo dentro de la misma enumeración; «y otros» conserva la progresión sin agregar matices no explicitados.
- source_word: Ἰερεμίαν
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: BDAG
  rationale: Se emplea la transliteración habitual en español para el profeta.
- source_word: ἢ ἕνα τῶν προφητῶν
  english_pob_choice: or one of the prophets
  chosen_spanish: o uno de los profetas
  alternatives_spanish:
  - o uno de los otros profetas
  lexicon: BDAG
  rationale: ἤ expresa alternativa; el griego no dice «otros», por lo que no se añade en el texto principal. La traducción conserva la apertura de la identificación sin ampliar el sentido.
theological_decisions:
- issue: Objeto implícito de las identificaciones
  english_pob_reading: The translation leaves the object implicit in the verse itself ('Some say John the Baptist...'), relying on the immediately preceding context rather than adding 'that you are.'
  chosen_spanish_reading: 'El texto español conserva la elipsis: «Unos, Juan el Bautista...», apoyándose en el contexto previo para entender que se trata de la identificación de Jesús.'
  alternative_spanish_readings:
  - Algunos dicen que tú eres Juan el Bautista...
  rationale: El griego de este versículo enumera identificaciones de forma elíptica. En español puede mantenerse esa concisión sin perder claridad dentro del flujo narrativo inmediato.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego SBLGNT y el auditorio inglés POB: la versión inglesa mantiene la elipsis del objeto implícito, y la española hace lo mismo por fidelidad al texto y por fluidez natural. No hubo revisiones posteriores relevantes; el estado de concordancia fue alto, con observaciones menores sin cambio textual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Bautista» por ser la forma establecida en español para βαπτιστής, sin perder la referencia al oficio de Juan.
  - La estructura distributiva «Unos... otros... y otros...» reproduce la progresión griega sin forzar equivalentes explicativos adicionales.
