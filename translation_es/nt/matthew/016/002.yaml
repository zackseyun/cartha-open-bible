translation:
  language: es
  text: 'Pero él respondió y les dijo[a]: «Cuando llega la tarde, dicen: “Buen tiempo, porque el cielo está rojo”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el firmamento está rojo». Aquí la palabra griega puede significar «cielo» o «heaven», pero en este dicho sobre el clima claramente se refiere al cielo visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo forma una fórmula narrativa con εἶπεν. «Respondió» conserva la función discursiva de contestar a otros; en español fluye mejor que una repetición más pesada, y se complementa con «les dijo» para reflejar la fórmula completa.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - manifestó
  lexicon: BDAG
  rationale: «Dijo» es la equivalencia directa y natural para la introducción de discurso en narrativa.
- source_word: Ὀψίας γενομένης
  english_pob_choice: When evening comes
  chosen_spanish: Cuando llega la tarde
  alternatives_spanish:
  - Cuando cae la tarde
  - Al atardecer
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa tiempo; «cuando llega la tarde» conserva el valor temporal y suena natural en español contemporáneo.
- source_word: λέγετε
  english_pob_choice: you say
  chosen_spanish: decís
  alternatives_spanish:
  - dicen
  - ustedes dicen
  lexicon: BDAG
  rationale: El presente indica una observación habitual o proverbial. Se eligió la segunda persona plural de uso amplio en registro bíblico para reflejar el plural del griego; en una edición hispana neutral también podría leerse como «ustedes dicen».
- source_word: Εὐδία
  english_pob_choice: Fair weather
  chosen_spanish: Buen tiempo
  alternatives_spanish:
  - Tiempo despejado
  - Tiempo bueno
  lexicon: BDAG
  rationale: Se trata de buen tiempo atmosférico. «Buen tiempo» es idiomático en español y mantiene la fuerza proverbial sin sobreexplicar.
- source_word: πυρράζει
  english_pob_choice: is red
  chosen_spanish: está rojo
  alternatives_spanish:
  - se pone rojo
  - se enrojece
  lexicon: BDAG
  rationale: Describe la apariencia del cielo. «Está rojo» sigue de cerca el predicado descriptivo griego y evita añadir matices no garantizados por el texto.
- source_word: ὁ οὐρανός
  english_pob_choice: the sky
  chosen_spanish: el cielo
  alternatives_spanish:
  - el firmamento
  - el cielo visible
  lexicon: BDAG
  rationale: En este contexto meteorológico, οὐρανός se refiere al cielo visible. «Cielo» mantiene la imagen del proverbio y, en español, puede abarcar tanto el espacio atmosférico como el celestial sin ambigüedad forzada.
theological_decisions:
- issue: Sentido de οὐρανός en un dicho sobre el clima
  english_pob_reading: sky, not heaven
  chosen_spanish_reading: el cielo, en sentido atmosférico, no el cielo como morada divina
  alternative_spanish_readings:
  - el firmamento
  - el cielo visible
  rationale: El contexto meteorológico obliga a leer οὐρανός como referencia al cielo atmosférico. En español, «cielo» es suficientemente natural; la nota lexical explicita que no se trata de una referencia teológica al cielo de Dios.
  doctrine_reference: Uso contextual del vocabulario bíblico; no hay afirmación doctrinal directa en el versículo.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego y el audit trail inglés. Se evitó calcar mecánicamente la sintaxis inglesa; se conservó la fórmula narrativa «respondió y les dijo» y se resolvió οὐρανός por «cielo» en sentido meteorológico, conforme al contexto y a la nota lexical del POB inglés.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - Se preserva la distinción contextual de «cielo» como fenómeno atmosférico, no como referencia teológica.
  - La nota al pie se ancla explícitamente en «cielo» para reflejar la alternativa lexical documentada.
