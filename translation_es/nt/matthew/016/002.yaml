  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión de mantener «cielo» para οὐρανός es aceptable en español, siempre que la nota aclare el sentido atmosférico. Las decisiones léxicas sobre «respondió», «dijo», «buen tiempo» y «está rojo» son fieles y naturales.
