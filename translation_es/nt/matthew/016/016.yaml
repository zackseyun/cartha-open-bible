translation:
  language: es
  text: 'Simón Pedro respondió: «Tú eres el Mesías, el Hijo del Dios vivo».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Cristo». El título griego Χριστός puede traducirse «Cristo»; aquí se vierte «Mesías» para conservar su sentido titular y su contexto mesiánico judío.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς ... εἶπεν
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: La combinación participio + verbo de decir funciona en narrativa como introducción de respuesta. En español, «respondió» comunica de forma natural la función discursiva sin la redundancia de «respondió y dijo».
- source_word: Σίμων Πέτρος
  english_pob_choice: Simon Peter
  chosen_spanish: Simón Pedro
  alternatives_spanish:
  - Pedro
  - Simón, Pedro
  lexicon: BDAG
  rationale: Se conservan ambos nombres propios con transliteración estándar en español, como designación personal fija del discípulo.
- source_word: Σὺ
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Tú eres
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego; en español se conserva al inicio de la cláusula para mantener ese énfasis.
- source_word: ὁ χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Χριστός aquí funciona como título mesiánico, no como nombre propio. En español, «Mesías» preserva mejor el sentido titular y el contexto judío que «Cristo».
- source_word: ὁ υἱὸς
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el Hijo de
  lexicon: BDAG
  rationale: 'El artículo con sustantivo conserva el valor titular: no se trata de una descripción genérica, sino de una confesión identificadora.'
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: del Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: En español, la secuencia «el Hijo del Dios viviente» reproduce de forma clara la relación genitiva con el sustantivo precedido por artículo en la frase completa.
- source_word: τοῦ ζῶντος
  english_pob_choice: the living
  chosen_spanish: viviente
  alternatives_spanish:
  - vivo
  - que vive
  lexicon: BDAG
  rationale: «Viviente» es la forma más natural y reverente en español para la construcción atributiva con θεοῦ, manteniendo la fuerza cualitativa de «living God».
theological_decisions:
- issue: Título mesiánico de Χριστός
  english_pob_reading: Messiah rather than Christ
  chosen_spanish_reading: Mesías en vez de Cristo
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene la decisión auditada de tratar Χριστός como título. En español, «Mesías» evita la cristianización automática del término y conserva el matiz judío del testimonio de Pedro.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve messianic sense'
- issue: Confesión sobre la filiación divina
  english_pob_reading: the Son of the living God
  chosen_spanish_reading: el Hijo del Dios viviente
  alternative_spanish_readings:
  - el Hijo de Dios viviente
  - el Hijo del Dios vivo
  rationale: La formulación conserva la confesión sin expandirla doctrinalmente. «Dios viviente» mantiene la descripción atributiva y el valor confesional del original.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés concluye que no hubo cambios necesarios en la última revisión; por eso la versión española sigue de cerca la resolución ya validada: ἀποκριθεὶς + εἶπεν se rinde naturalmente como «respondió», y Χριστός se traduce como «Mesías» con nota alternativa «Cristo».'
  spanish_consistency_notes:
  - 'Se mantiene la transliteración estándar de nombres propios: Simón Pedro.'
  - Se evita la fórmula literal «respondió y dijo» por ser redundante en español moderno.
  - «Mesías» se usa como título, no como nombre propio litúrgico.
  - «Dios viviente» conserva la estructura confesional establecida por el original griego.
