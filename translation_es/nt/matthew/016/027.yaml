translation:
  language: es
  text: Porque el Hijo del Hombre está a punto de venir en la gloria de su Padre con sus ángeles[a], y entonces retribuirá a cada uno conforme a su obra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «va a venir» o «está por venir». El griego dice «está a punto de venir», conservando un sentido de inminencia.
    reason: lexical_alternative
  - marker: b
    text: O «según lo que ha hecho». El griego usa el singular «obra/acción», con valor distributivo para la conducta de cada persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλλει
  english_pob_choice: is about to
  chosen_spanish: está a punto de
  alternatives_spanish:
  - va a
  - está por
  - pronto vendrá
  lexicon: BDAG
  rationale: μέλλω + infinitivo expresa inminencia o acción inminente. «Está a punto de» conserva esa cercanía temporal mejor que un futuro simple y mantiene la tensión escatológica del texto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: γάρ introduce la razón de la afirmación anterior. «Porque» es natural en español y conserva la relación causal/explanatoria sin añadir énfasis extra.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo de hombre
  lexicon: BDAG
  rationale: Es la designación establecida y más fiel en español para la autoidentificación mesiánica; preserva su resonancia intertextual con Daniel sin explicitarla en el texto.
- source_word: ἔρχεσθαι
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  - acudir
  lexicon: BDAG
  rationale: El infinitivo complementa a μέλλει. «Venir» es la forma natural y directa en español, adecuada para el movimiento escatológico del pasaje.
- source_word: ἐν τῇ δόξῃ τοῦ πατρὸς αὐτοῦ
  english_pob_choice: in the glory of his Father
  chosen_spanish: en la gloria de su Padre
  alternatives_spanish:
  - con la gloria de su Padre
  - en la gloria de su Padre celestial
  lexicon: BDAG
  rationale: «En» conserva la idea de esfera o manifestación en la que ocurre la venida. «De su Padre» mantiene explícita la relación posesiva sin oscurecerla.
- source_word: μετὰ τῶν ἀγγέλων αὐτοῦ
  english_pob_choice: with his angels
  chosen_spanish: con sus ángeles
  alternatives_spanish:
  - acompañado de sus ángeles
  - junto con sus ángeles
  lexicon: BDAG
  rationale: μετά con genitivo indica acompañamiento. «Con sus ángeles» es la equivalencia más directa y fluida en español.
- source_word: καὶ τότε
  english_pob_choice: and then
  chosen_spanish: y entonces
  alternatives_spanish:
  - y luego
  - entonces
  lexicon: BDAG
  rationale: 'La expresión marca secuencia temporal: primero la venida, luego la retribución. «Y entonces» conserva el enlace y el avance narrativo.'
- source_word: ἀποδώσει
  english_pob_choice: will repay
  chosen_spanish: retribuirá
  alternatives_spanish:
  - pagará
  - recompensará
  - devolverá
  lexicon: BDAG
  rationale: ἀποδίδωμι en contexto judicial puede significar devolver lo debido o retribuir. «Retribuirá» conserva el sentido de dar a cada uno lo que corresponde sin sonar arcaico.
- source_word: ἑκάστῳ
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - cada uno
  - a cada persona
  lexicon: BDAG
  rationale: El dativo es distributivo. «A cada uno» refleja bien el destinatario individual de la retribución y suena natural en español.
- source_word: κατὰ τὴν πρᾶξιν αὐτοῦ
  english_pob_choice: according to his deed
  chosen_spanish: conforme a su obra
  alternatives_spanish:
  - según su acción
  - de acuerdo con lo que hizo
  - conforme a lo que hizo
  lexicon: BDAG
  rationale: πρᾶξις puede significar hecho, acción u obra. «Obra» permite mantener el singular griego y el sentido distributivo/total de conducta, mientras «conforme a» reproduce bien κατά.
theological_decisions:
- issue: Inminencia de la venida del Hijo del Hombre
  english_pob_reading: Retain the imminence nuance with 'is about to come' rather than flattening to a simple future.
  chosen_spanish_reading: Mantener «está a punto de venir» para conservar la cercanía implícita en μέλλει + infinitivo.
  alternative_spanish_readings:
  - vendrá
  - va a venir
  - está por venir
  rationale: El griego no usa un futuro simple, sino una construcción que normalmente añade inmediatez. La traducción debe preservar esa tensión sin resolverla ni atenuarla.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Retribución según la conducta/obra
  english_pob_reading: Render ἀποδώσει ... κατὰ τὴν πρᾶξιν αὐτοῦ as 'he will repay each one according to his deed.'
  chosen_spanish_reading: Traducir «retribuirá a cada uno conforme a su obra» para conservar el sentido judicial de correspondencia.
  alternative_spanish_readings:
  - recompensará a cada uno según sus acciones
  - pagará a cada uno según lo que hizo
  rationale: El texto afirma una retribución individual en clave judicial. «Retribuirá» y «conforme a su obra» preservan ese valor sin expandirlo hacia una doctrina más amplia que el versículo no formula explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
translation_notes:
  revision_awareness: El texto griego y el contexto de auditoría inglesa se mantienen en alto acuerdo; no hubo revisiones aplicadas en el pasaje base. La decisión principal fue preservar la inminencia de μέλλει y el valor judicial-distributivo de πρᾶξις sin sobreexplicar el juicio.
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título fijo y reconocible en español.
  - Se usa «Padre» con mayúscula por referencia a Dios dentro de una relación posesiva cristológica.
  - «Ángeles» se conserva sin glosa, pues el contexto no exige distinguir entre mensajeros celestiales y otro sentido.
  - «Retribuirá» evita la ambigüedad de «recompensará» y preserva la neutralidad judicial del griego.
  - La preposición «conforme a» reproduce adecuadamente κατά con acusativo en este contexto de norma/criterio.
