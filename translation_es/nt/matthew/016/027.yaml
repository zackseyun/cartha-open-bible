    text: Or 'will come' or 'is going to come.' The Greek says 'is about to come,' preserving a sense of imminence.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to what he has done.' The Greek has the singular 'deed/action,' used distributively for each person's conduct.
    reason: lexical_alternative
