base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/004.yaml
  text: An evil and adulterous generation seeks a sign[a], and no sign will be given to it except the sign of Jonah. And leaving them[b], he went away.
  footnotes:
  - marker: a
    text: Or 'unfaithful generation.' The Greek says 'adulterous,' likely echoing prophetic language of covenant infidelity.
    reason: lexical_alternative
  - marker: b
    text: '''The sign of Jonah'' is explained in Matthew 12:39–40 as referring to Jonah''s three days and three nights, a pattern applied to the Son of Man.'
    reason: cross_reference
  ai_draft:
