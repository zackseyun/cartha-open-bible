translation:
  language: es
  text: Una generación mala y adúltera[a] busca una señal, y no se le dará señal alguna, sino la señal de Jonás[b]. Y dejándolos, se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «infiel». El griego dice literalmente «adúltera», probablemente en eco del lenguaje profético de infidelidad al pacto.
    reason: lexical_alternative
  - marker: b
    text: «La señal de Jonás» se explica en Mateo 12:39–40 como referencia a los tres días y tres noches de Jonás, patrón aplicado al Hijo del Hombre.
    reason: cross_reference
lexical_decisions:
- source_word: Γενεὰ
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - gente
  - linaje
  - edad
  lexicon: BDAG
  rationale: γενεά suele referirse a una generación o cohorte de personas. «Generación» conserva la referencia al grupo contemporáneo de Jesús sin añadir interpretación.
- source_word: πονηρὰ
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - impía
  - maligna
  lexicon: BDAG
  rationale: En español, «mala» funciona de manera natural y sobria para πονηρά en este contexto. Evita un matiz más cargado que podría sonar menos idiomático que el griego exige aquí.
- source_word: μοιχαλὶς
  english_pob_choice: adulterous
  chosen_spanish: adúltera
  alternatives_spanish:
  - infiel
  - adúltera espiritualmente
  lexicon: BDAG
  rationale: «Adúltera» preserva la metáfora del texto griego y su eco profético. «Infiel» explicita una posible connotación del pacto, pero suaviza la imagen; por eso queda como alternativa, no como base.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - milagro
  - señal milagrosa
  lexicon: BDAG
  rationale: «Señal» es el equivalente más natural y transparente en español para σημεῖον aquí. «Signo» es posible, pero menos usual en este registro; «milagro» especificaría más de lo que el griego dice.
- source_word: ἐπιζητεῖ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - busca con insistencia
  - exige
  - anda buscando
  lexicon: BDAG
  rationale: ἐπιζητέω puede expresar búsqueda insistente o demandante. «Busca» mantiene la concisión del griego; el tono hostil se entiende por el contexto inmediato.
- source_word: δοθήσεται
  english_pob_choice: will be given
  chosen_spanish: se le dará
  alternatives_spanish:
  - le será dada
  - se le concederá
  lexicon: BDAG
  rationale: El futuro pasivo de δίδωμι se vierte de forma directa como «se le dará». Mantiene la pasiva del original sin añadir énfasis interpretativo.
- source_word: αὐτῇ
  english_pob_choice: to it
  chosen_spanish: se le
  alternatives_spanish:
  - a ella
  - a esta generación
  lexicon: BDAG
  rationale: Aunque el griego usa un pronombre femenino singular concordando con γενεά, en español resulta más natural la construcción impersonal «se le». Así se conserva el referente colectivo sin forzar «a ella».
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: Aquí εἰ μὴ introduce la única excepción; «sino» es la forma más idiomática en español después de una negación.
- source_word: τὸ σημεῖον Ἰωνᾶ
  english_pob_choice: the sign of Jonah
  chosen_spanish: la señal de Jonás
  alternatives_spanish:
  - la señal de Jonas
  - la señal de Jonás el profeta
  lexicon: BDAG
  rationale: Se conserva el sintagma literal y sobrio. «Jonás» es la forma castellana habitual del nombre; no se añade la explicación del contenido de la señal en el texto principal.
- source_word: καταλιπὼν
  english_pob_choice: leaving
  chosen_spanish: dejándolos
  alternatives_spanish:
  - al dejarlos
  - habiéndolos dejado
  lexicon: BDAG
  rationale: El participio aoristo se rinde con una forma participial natural en español. «Dejándolos» mantiene la secuencia narrativa sin volverla más pesada.
- source_word: ἀπῆλθεν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se marchó
  - partió
  - se alejó
  lexicon: BDAG
  rationale: «Se fue» expresa con naturalidad el movimiento de alejamiento de Jesús. Es menos marcado que «partió» o «se marchó», pero suficientemente fiel al verbo de salida.
theological_decisions:
- issue: Conserving the force of «adúltera»
  english_pob_reading: Retain the metaphor 'adulterous' in the main text, allowing both moral and covenant-unfaithfulness connotations.
  chosen_spanish_reading: Mantener «adúltera» en el texto principal, dejando abierta tanto la lectura moral como la de infidelidad al pacto.
  alternative_spanish_readings:
  - «infiel» como interpretación explícita
  - «adúltera» con nota explicativa
  rationale: El griego usa la metáfora de adulterio y el audit trail inglés decide no desactivarla con una glosa interpretativa. En español, «adúltera» preserva esa tensión; la nota puede explicar la posible resonancia profética sin sustituir la metáfora.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Meaning of «la señal de Jonás»
  english_pob_reading: Keep the phrase untranslated beyond a literal rendering, without specifying resurrection in the main text.
  chosen_spanish_reading: Mantener «la señal de Jonás» literalmente, sin explicar en el cuerpo del versículo que alude a la muerte y resurrección de Jesús.
  alternative_spanish_readings:
  - interpretarla explícitamente como muerte y resurrección de Jesús
  - añadir una paráfrasis explicativa
  rationale: Aunque Mateo 12:39–40 desarrolla la tipología, este versículo conserva la expresión breve. La traducción no debe importar esa explicación al texto principal y debe respetar la concisión del original.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition; §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con el audit trail inglés: conserva «adúltera», mantiene la expresión breve «la señal de Jonás» sin expandirla en el cuerpo, y traduce la cláusula final con una secuencia narrativa natural en español. No se incorporaron revisiones textuales adicionales porque el pasaje muestra alto acuerdo en el control cruzado.'
  spanish_consistency_notes:
  - Se usó «señal» de forma consistente para σημεῖον, evitando alternar con «signo» en el mismo versículo.
  - Se prefirió «se le dará» para conservar la pasiva del original sin volver la frase artificiosamente formal.
  - «Jonás» sigue la forma castellana estándar del nombre bíblico, coherente con el registro bíblico en español.
  - La nota de la letra a aborda la posible alternativa interpretativa sin sustituir la metáfora principal del texto.
