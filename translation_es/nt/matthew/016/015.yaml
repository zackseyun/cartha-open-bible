translation:
  language: es
  text: 'Les dice: «Pero ustedes, ¿quién dicen que soy yo?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει
  english_pob_choice: He says
  chosen_spanish: Les dice
  alternatives_spanish:
  - Les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con el presente español, manteniendo vivacidad narrativa sin forzar un pasado.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: Les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con el clítico de objeto indirecto en español.
- source_word: Ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - tú
  lexicon: BDAG
  rationale: El pronombre explícito es enfático; en español se conserva con «ustedes» para reflejar la segunda persona plural y dar relieve al contraste.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con las opiniones previas; «Pero» reproduce bien la fuerza adversativa.
- source_word: τίνα
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - a quién
  - cuál
  lexicon: BDAG
  rationale: El interrogativo funciona como predicativo en discurso indirecto; en español la forma natural es «quién».
- source_word: με
  english_pob_choice: I
  chosen_spanish: soy yo
  alternatives_spanish:
  - soy
  - yo
  lexicon: BDAG
  rationale: 'El acusativo griego en la construcción de infinitivo se vuelve una cláusula finita natural en español: «que soy yo».'
- source_word: λέγετε
  english_pob_choice: do you say
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - decís
  lexicon: BDAG
  rationale: Se traduce con presente de indicativo para mantener la fuerza del interrogativo presente.
- source_word: εἶναι
  english_pob_choice: that I am
  chosen_spanish: que soy
  alternatives_spanish:
  - que yo sea
  - de ser
  lexicon: BDAG
  rationale: La infinitiva griega se expresa idiomáticamente con subordinada finita en español, evitando un calco artificial.
theological_decisions:
- issue: Contraste entre la opinión pública y la confesión personal de los discípulos
  english_pob_reading: Render the contrast as 'But who do you say that I am?'
  chosen_spanish_reading: «Pero ustedes, ¿quién dicen que soy yo?»
  alternative_spanish_readings:
  - «Pero ustedes, ¿quién dicen que soy?»
  - «Y ustedes, ¿quién dicen que soy yo?»
  rationale: Se conserva el giro contrastivo sin añadir contenido doctrinal ajeno al verso. La colocación de «ustedes» al inicio mantiene el énfasis del pronombre explícito griego.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada; la traducción ahora no incluye marcadores de nota, de modo que el texto principal y los metadatos quedan consistentes.
  spanish_consistency_notes:
  - Se mantiene el presente histórico («Les dice») como equivalente del griego.
  - Se conserva el énfasis del pronombre explícito con «ustedes».
  - La pregunta se formula con sintaxis española natural, sin perder la construcción indirecta subyacente del griego.
  - No se emplean términos eclesiásticos tradicionales innecesarios; el verso queda en registro bíblico claro y contemporáneo.
