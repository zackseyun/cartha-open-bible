translation:
  language: es
  text: 'Ahora bien, cuando Jesús llegó a la región de Cesarea de Filipo, les preguntaba a sus discípulos, diciendo: «¿Quién dice la gente que es el Hijo del Hombre?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿A quién dice la gente que es el Hijo del Hombre?» «Hijo del Hombre» es la autodesignación característica de Jesús; alternativamente, algunos lo traducen «el Ser Humano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλθὼν δὲ
  english_pob_choice: Now when ... came
  chosen_spanish: Ahora bien, cuando ... llegó
  alternatives_spanish:
  - Y cuando ... llegó
  - Entonces ... llegó
  lexicon: BDAG
  rationale: El participio aoristo con δέ introduce una nueva escena con transición suave. «Ahora bien, cuando ... llegó» conserva ese movimiento narrativo y suena natural en español sin perder el valor temporal.
- source_word: εἰς τὰ μέρη
  english_pob_choice: into the region
  chosen_spanish: a la región
  alternatives_spanish:
  - a los alrededores
  - al distrito
  lexicon: BDAG
  rationale: μέρη aquí señala territorio o comarca circundante, no “partes” literales. «Región» refleja bien el sentido idiomático y es claro para el lector español.
- source_word: Καισαρείας τῆς Φιλίππου
  english_pob_choice: Caesarea Philippi
  chosen_spanish: Cesarea de Filipo
  alternatives_spanish:
  - Cesarea Filipo
  - la Cesarea de Filipo
  lexicon: BDAG
  rationale: La construcción genitiva identifica el lugar conocido como Caesarea Philippi. «Cesarea de Filipo» conserva la referencia geográfica y la relación con Filipo sin sonar forzada en español.
- source_word: ἠρώτα
  english_pob_choice: he was asking
  chosen_spanish: estaba preguntando
  alternatives_spanish:
  - preguntó
  - les preguntaba
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso o iniciada en la narración. «Estaba preguntando» preserva mejor ese aspecto que un pretérito simple.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - aprendices
  lexicon: BDAG
  rationale: En contexto evangélico, μαθηταί se traduce de manera estable como «discípulos». Es la forma más fiel y reconocible en español bíblico.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - mientras decía
  lexicon: BDAG
  rationale: El participio se representa con «diciendo» para conservar la relación sintáctica del griego sin añadir una coordinación que el texto no exige.
- source_word: Τίνα λέγουσιν οἱ ἄνθρωποι
  english_pob_choice: Who do people say
  chosen_spanish: ¿Quién dicen las personas
  alternatives_spanish:
  - ¿A quién dicen las personas
  - ¿Quién dice la gente
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico, no masculino específico; por eso «las personas» evita el sesgo de género. «Quién» es la forma idiomática en español para esta pregunta indirecta/predicativa.
- source_word: εἶναι
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - ser
  - está siendo
  lexicon: BDAG
  rationale: En español, la pregunta indirecta se expresa naturalmente con el verbo finito «es». Esto comunica la función del infinitivo griego sin calco pesado.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo de Hombre
  - el Ser Humano
  lexicon: BDAG
  rationale: Se conserva el título tradicional y la resonancia intertextual del griego. Traducirlo de otra forma resolvería en exceso una expresión que el texto mantiene con carga titulativa.
theological_decisions:
- issue: Término cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Humanó
  - el Ser Humano
  rationale: La expresión funciona como autodesignación característica de Jesús y mantiene una tensión teológica e intertextual que conviene no desactivar. En español, «el Hijo del Hombre» preserva mejor esa densidad que una paráfrasis aclaratoria.
  doctrine_reference: Translation philosophy §§2–3
- issue: Valor del imperfecto ἠρώτα
  english_pob_reading: he was asking
  chosen_spanish_reading: estaba preguntando
  alternative_spanish_readings:
  - preguntó
  - preguntaba
  rationale: El imperfecto no se reduce a un hecho puntual; presenta la acción en desarrollo. La elección española intenta mantener ese matiz narrativo sin sobrecargar la frase.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y armoniza con la auditoría inglesa POB. No se introdujeron cambios de sentido respecto del análisis previo; se conservaron la escena narrativa, el aspecto imperfectivo de ἠρώτα y la opción titulativa para υἱὸς τοῦ ἀνθρώπου. Se ajustó el español para fluidez natural sin perder trazabilidad.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς de forma consistente.
  - Se traduce ἄνθρωποι como «las personas» para reflejar el valor genérico humano y evitar masculino no marcado innecesario.
  - Se mantiene «el Hijo del Hombre» como fórmula titulativa estable, alineada con el uso bíblico y la decisión auditada en inglés.
  - Se opta por «región» para μέρη, coherente con el sentido geográfico del pasaje.
  - La puntuación reproduce una pregunta directa en discurso citado con cierre de comillas en estilo español.
