  timestamp: '2026-05-07T20:17:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: Jesús responde a Simón, pronuncia una bienaventuranza, atribuye la confesión no a fuente humana sino al Padre, y conserva el atributo celestial del Padre. También mantiene acertadamente el patronímico arameo con nota. Sin embargo, hay una desviación léxica significativa en «carne ni sangre»: el griego tiene la expresión fija coordinada «σὰρξ καὶ αἷμα» = «carne y sangre», y el inglés auditado la preserva explícitamente. Cambiarla a «ni» altera la forma idiomática recibida y debilita la fidelidad al giro fuente.'
  spanish_quality_summary: El español es claro y digno. «Y Jesús le respondió» y «porque no te lo reveló» son naturales. «Bienaventurado eres tú» es comprensible, pero en español bíblico actual suena más natural «Bienaventurado eres, Simón…» sin «tú». Además, «mi Padre, el que está en los cielos» es entendible, pero la coma hace la relativa algo más parentética de lo necesario; «mi Padre que está en los cielos» fluye mejor y corresponde bien al inglés auditado revisado. La nota c no debe presentar como obligación una conservación del plural por fidelidad, sino explicar la alternativa; el texto principal puede conservarlo sin problema.
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. «Jesús», «Padre» y «reveló» están bien. El tratamiento de σάρξ debe alinearse con el principio de no aplanar ni alterar innecesariamente: aquí corresponde la expresión idiomática establecida «carne y sangre», no «carne ni sangre».'
  issues:
  - severity: medium
    issue: La expresión idiomática «σὰρξ καὶ αἷμα» fue vertida como «carne ni sangre».
    rationale: El griego dice literalmente «carne y sangre», y el POB inglés decidió conservar esa forma por su fuerza idiomática. «Ni» puede sonar natural bajo negación en español, pero cambia la formulación fija y hace menos transparente la nota que cita «carne y sangre».
  - severity: low
    issue: «Bienaventurado eres tú» suena más enfático y menos natural de lo necesario.
    rationale: El pronombre «tú» no es requerido por el griego ni por el español aquí. Omitirlo mejora la naturalidad sin pérdida de sentido.
  - severity: low
    issue: «mi Padre, el que está en los cielos» es algo más torpe que una relativa integrada.
    rationale: «Mi Padre que está en los cielos» reproduce con más fluidez el valor atributivo de ὁ πατήρ μου ὁ ἐν τοῖς οὐρανοῖς y armoniza con la revisión inglesa «my Father who is in heaven did».
  - severity: low
    issue: La nota c formula la conservación del plural como una decisión cerrada de fidelidad.
    rationale: La evidencia inglesa auditada trató «in the heavens / in heaven» como alternativa idiomática. Conviene en español presentar la literalidad del plural y no sugerir que el singular sería infiel en todos los casos.
  revised_spanish_text: 'Y Jesús le respondió: «Bienaventurado eres, Simón Bar-Joná[a], porque carne y sangre[b] no te lo revelaron, sino mi Padre que está en los cielos[c]».'
  revised_footnotes:
  - marker: a
    text: O «Simón hijo de Jonás». El griego conserva una forma patronímica aramea, aquí transliterada como «Bar-Joná».
    reason: lexical_alternative
  - marker: b
    text: 'Expresión idiomática literal: «carne y sangre», usada para referirse a origen o agencia meramente humana.'
    reason: cultural_note
  - marker: c
    text: Literalmente, «en los cielos».
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión idiomática a «carne y sangre» para ajustarla al griego y al rastro de auditoría inglés. También se mejora la naturalidad y precisión del español con «Bienaventurado eres» y «mi Padre que está en los cielos». Además, se simplifica la nota c para reflejar con sobriedad la literalidad del plural griego sin sobreargumentar la decisión.
