translation:
  language: es
  text: 'Y Jesús le respondió: «Bienaventurado eres, Simón Bar-Joná[a], porque carne y sangre[b] no te lo revelaron, sino mi Padre que está en los cielos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Simón hijo de Jonás». El griego conserva una forma patronímica aramea, aquí transliterada como «Bar-Joná».
    reason: lexical_alternative
  - marker: b
    text: 'Expresión idiomática literal: «carne y sangre», usada para referirse a origen o agencia meramente humana.'
    reason: cultural_note
  - marker: c
    text: Literalmente, «en los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ ... εἶπεν
  english_pob_choice: And Jesus answered him
  chosen_spanish: Y Jesús le respondió
  alternatives_spanish:
  - Y Jesús contestó
  - Y Jesús, respondiendo, le dijo
  lexicon: BDAG
  rationale: La construcción participio + verbo finito expresa una respuesta formulada en forma narrativa. En español, «le respondió» comunica la acción sin la redundancia de «respondiendo le dijo», y «Y» conserva el flujo narrativo de δέ.
- source_word: Μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Bendito
  lexicon: BDAG
  rationale: «Bienaventurado» preserva el peso declarativo y teológico de μακάριος en labios de Jesús, mejor que «dichoso», que suena más psicológico, o «bendito», que en español suele sonar más a una invocación o estado pasivo.
- source_word: Σίμων Βαριωνᾶ
  english_pob_choice: Simon Bar-Jonah
  chosen_spanish: Simón Bar-Joná
  alternatives_spanish:
  - Simón hijo de Jonás
  lexicon: BDAG
  rationale: Se conserva el patronímico arameo transliterado para respetar la forma del griego. En la nota se explicita la alternativa semítica equivalente «hijo de Jonás», porque el texto griego preserva una forma patronímica aramea.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la bienaventuranza, por lo que «porque» es la opción más directa y natural en español.
- source_word: σὰρξ καὶ αἷμα
  english_pob_choice: flesh and blood
  chosen_spanish: carne ni sangre
  alternatives_spanish:
  - carne y sangre
  - ser humano
  - mera condición humana
  lexicon: BDAG
  rationale: Se mantiene el idioma figurado con una estructura natural en español. Como el contraste es entre fuente humana y revelación divina, «carne ni sangre» conserva el valor idiomático sin explicitar en exceso, y evita vaciar la expresión de su fuerza lexical.
- source_word: ἀπεκάλυψέν σοι
  english_pob_choice: did not reveal this to you
  chosen_spanish: no te lo reveló
  alternatives_spanish:
  - no te lo dio a conocer
  - no te lo manifestó
  lexicon: BDAG
  rationale: «Reveló» conserva la resonancia de ἀποκαλύπτω en un contexto de conocimiento dado por Dios. El objeto implícito se expresa con «lo» para fluidez en español.
- source_word: ὁ πατήρ μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - el Padre mío
  lexicon: BDAG
  rationale: Se mantiene la relación filial directa y natural en español, sin añadir determinaciones innecesarias.
- source_word: ὁ ἐν τοῖς οὐρανοῖς
  english_pob_choice: who is in heaven
  chosen_spanish: el que está en los cielos
  alternatives_spanish:
  - quien está en el cielo
  - el Padre que está en los cielos
  lexicon: BDAG
  rationale: Se preserva el plural reverencial del griego, «en los cielos», en vez de reducirlo a un singular idiomático, porque el POB inglés revisó precisamente para acercarse más al griego. La relativa «el que está» reproduce con claridad el atributo del Padre.
theological_decisions:
- issue: Contraste entre origen humano y revelación divina
  english_pob_reading: Jesus contrasts merely human source ('flesh and blood') with divine revelation from the Father, without specifying a full doctrine of inspiration beyond this immediate disclosure.
  chosen_spanish_reading: Jesús contrapone una fuente meramente humana («carne ni sangre») con la revelación procedente del Padre, sin convertir el pasaje en una doctrina más amplia de inspiración.
  alternative_spanish_readings:
  - carne y sangre como referencia a personas humanas específicas
  - carne y sangre como simple expresión de mortalidad
  rationale: 'La formulación española mantiene la tensión del texto: el conocimiento de Pedro no proviene de origen humano, sino del Padre. No se estrecha el sentido a una sola opción interpretativa para no exceder el alcance del versículo.'
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto inmediato.
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más reciente del POB inglés, que ajustó la cláusula final a «who is in heaven» para reflejar más de cerca ὁ ἐν τοῖς οὐρανοῖς. En español se optó por mantener ese ajuste con «el que está en los cielos», evitando la reducción a un singular idiomático.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no contiene el tetragrámaton.
  - «Bienaventurado» se emplea de forma consistente para μακάριος en contexto de dicha declarativa.
  - «Reveló» mantiene el campo semántico de ἀποκαλύπτω sin reemplazarlo por un término menos cargado teológicamente.
  - «Cielos» conserva el plural reverencial donde el griego lo exige y donde el POB inglés ya señaló la diferencia con el inglés idiomático.
