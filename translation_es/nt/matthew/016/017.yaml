revisions:
- from: 'Y Jesús le respondió: «Bienaventurado eres tú, Simón Bar-Joná[a], porque no te lo reveló carne ni sangre[b], sino mi Padre, el que está en los cielos[c]».'
  to: 'Y Jesús le respondió: «Bienaventurado eres, Simón Bar-Joná[a], porque carne y sangre[b] no te lo revelaron, sino mi Padre que está en los cielos[c]».'
  rationale: Se corrige la expresión idiomática a «carne y sangre» para ajustarla al griego y al rastro de auditoría inglés. También se mejora la naturalidad y precisión del español con «Bienaventurado eres» y «mi Padre que está en los cielos». Además, se simplifica la nota c para reflejar con sobriedad la literalidad del plural griego sin sobreargumentar la decisión.
