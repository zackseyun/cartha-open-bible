  text: ⸂ἀποκριθεὶς δὲ⸃ ὁ Ἰησοῦς εἶπεν αὐτῷ· Μακάριος εἶ, Σίμων Βαριωνᾶ, ὅτι σὰρξ καὶ αἷμα οὐκ ἀπεκάλυψέν σοι ἀλλ’ ὁ πατήρ μου ὁ ἐν τοῖς οὐρανοῖς·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/017.yaml
  text: And Jesus answered him[a], “Blessed are you, Simon Bar-Jonah, because flesh and blood did not reveal this to you[c][b], but my Father who is in heaven did.”
  footnotes:
  - marker: a
    text: Or 'Simon son of Jonah.' The Greek preserves an Aramaic patronymic form, here transliterated as 'Bar-Jonah.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'flesh and blood,' an idiom for human beings or merely human source.
    reason: cultural_note
  - marker: c
    text: Greek 'in the heavens'; rendered 'in heaven' as standard English idiom.
    reason: lexical_alternative
