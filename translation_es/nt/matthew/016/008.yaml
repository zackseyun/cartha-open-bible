translation:
  language: es
  text: 'Pero Jesús[a], al saber esto, dijo: «¿Por qué discuten entre ustedes, ustedes de poca fe, que no tienen pan?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «que no trajeron panes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  english_pob_choice: knowing this
  chosen_spanish: al saber esto
  alternatives_spanish:
  - al darse cuenta de esto
  - conociendo esto
  lexicon: BDAG
  rationale: El participio aoristo introduce el conocimiento previo de Jesús antes de hablar. «Al saber esto» conserva esa relación temporal y causal sin añadir más contenido que el implícito en el contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición con leve contraste narrativo al pasar al reproche de Jesús. «Pero» funciona de forma natural en español.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - preguntó
  - habló
  lexicon: BDAG
  rationale: Verbo narrativo normal para introducir discurso directo, aunque el contenido sea interrogativo.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  - ¿A qué se debe
  lexicon: BDAG
  rationale: En esta construcción con διαλογίζεσθε y la cláusula con ὅτι, τί pide la razón de la discusión, no solo su contenido. «¿Por qué» refleja mejor la fuerza adverbial.
- source_word: διαλογίζεσθε
  english_pob_choice: are you discussing
  chosen_spanish: deliberan
  alternatives_spanish:
  - razonan
  - discuten
  lexicon: BDAG
  rationale: El verbo puede expresar razonar, discutir o deliberar internamente. En español, «deliberan» comunica bien la idea de estar ocupados en un intercambio mental o discursivo; aquí se entiende en contexto como su cavilación entre ellos.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - entre sí
  - dentro de ustedes
  lexicon: BDAG
  rationale: La frase puede referirse a reflexión interna o a conversación mutua. En este contexto, donde Jesús reprende la discusión de los discípulos, «entre ustedes» preserva el sentido relacional sin forzar una interioridad exclusiva.
- source_word: ὀλιγόπιστοι
  english_pob_choice: you of little faith
  chosen_spanish: hombres de poca fe
  alternatives_spanish:
  - ustedes, de poca fe
  - personas de poca fe
  lexicon: BDAG
  rationale: Es un vocativo de reprensión ligado a la fe insuficiente. «Hombres de poca fe» sigue una forma tradicional en español y comunica la acusación sin suavizarla; el masculino plural funciona como vocativo grupal en un contexto mixto o no marcado.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: BDAG
  rationale: Introduce el contenido de la preocupación de los discípulos. «Que» mantiene la estructura discursiva del griego mejor que una causalización prematura.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: panes
  alternatives_spanish:
  - pan
  - barras de pan
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «bread» como masa, el plural griego ἄρτους es literalmente «panes/loaves». En español, «panes» conserva el plural y la referencia concreta a panes físicos disponibles o transportables.
- source_word: οὐκ ἐλάβετε
  english_pob_choice: you have no bread
  chosen_spanish: no trajeron
  alternatives_spanish:
  - no tomaron
  - no recibieron
  lexicon: BDAG
  rationale: λαμβάνω aquí puede referirse a tomar o llevar consigo; el contexto favorece la idea de no haber traído panes. «No trajeron» expresa de manera natural el sentido implícito que el audit trail inglés también reconoce como alternativa más literal.
theological_decisions:
- issue: Fuerza del reproche ὀλιγόπιστοι
  english_pob_reading: A rebuke of the disciples' inadequate trust, rendered without expanding into a broader doctrinal statement.
  chosen_spanish_reading: Un reproche por la poca fe de los discípulos, sin convertirlo en una formulación doctrinal más amplia.
  alternative_spanish_readings:
  - Una simple corrección por malentendido, con menos énfasis en la fe
  - Una reprensión más fuerte que enfatiza la incredulidad
  rationale: El texto dirige una reprensión real a la insuficiencia de fe en la situación inmediata. La traducción conserva esa tensión teológica y no la diluye en una mera confusión logística ni la amplía hacia categorías doctrinales ajenas al pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el griego SBLGNT y el audit trail inglés, pero ajusta el fraseo para que suene natural en español: mantiene el participio inicial con valor temporal («al saber esto»), traduce el vocativo de reproche de forma idiomática («hombres de poca fe») y conserva el plural concreto de ἄρτους con «panes».'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se evita «SEÑOR» porque aquí no aparece κύριος ni una cita del nombre divino.
  - «Panes» conserva mejor el plural del griego que el singular masa cuando el énfasis está en la provisión concreta.
  - La nota al pie preserva la alternativa más literal reconocida por el audit trail inglés.
