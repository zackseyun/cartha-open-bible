translation:
  language: es
  text: ¿Cómo no entienden que no les hablé a ustedes sobre el pan? Pero cuídense de la levadura de los fariseos y de los saduceos[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estén alerta ante la levadura de los fariseos y de los saduceos».'
    reason: lexical_alternative
  - marker: b
    text: «Levadura» es una metáfora aquí; en el versículo siguiente se explica como la enseñanza de los fariseos y de los saduceos.
    reason: cross_reference
lexical_decisions:
- source_word: πῶς οὐ νοεῖτε
  english_pob_choice: How do you not understand
  chosen_spanish: ¿Cómo no entendéis
  alternatives_spanish:
  - ¿Cómo es que no entendéis
  - ¿Por qué no entendéis
  lexicon: BDAG
  rationale: πῶς con οὐ y νοέω formula una reprensión por no captar el sentido. «Entendéis» reproduce el valor cognitivo de νοέω de forma natural en español, y el interrogativo inicial conserva la fuerza retórica.
- source_word: ὅτι οὐ περὶ ἄρτων εἶπον ὑμῖν
  english_pob_choice: that I did not speak to you about bread
  chosen_spanish: que no les hablé acerca del pan
  alternatives_spanish:
  - que no les hablé de pan
  - que no les dije nada sobre pan
  lexicon: BDAG
  rationale: περὶ ἄρτων se expresa con naturalidad como «acerca del pan». Aunque ἄρτων está en plural, en español el sustantivo colectivo «pan» comunica mejor el sentido que «panes» en este contexto. «Les hablé» conserva el valor de εἶπον ὑμῖν sin forzar una paráfrasis.
- source_word: προσέχετε
  english_pob_choice: beware
  chosen_spanish: guardaos
  alternatives_spanish:
  - tened cuidado
  - prestaos atención a
  - cuidaos de
  lexicon: BDAG
  rationale: El imperativo aquí es una advertencia preventiva. «Guardaos de» reproduce bien la idea de mantenerse apartados de algo peligroso, y encaja con la frase preposicional siguiente.
- source_word: ἀπὸ τῆς ζύμης
  english_pob_choice: of the leaven
  chosen_spanish: de la levadura
  alternatives_spanish:
  - del fermento
  - de la masa fermentada
  lexicon: BDAG
  rationale: Se mantiene la metáfora con «levadura», que es la equivalencia más estable y comprensible en español bíblico. «De» refleja el griego ἀπό en la advertencia de evitarla.
- source_word: τῶν Φαρισαίων καὶ Σαδδουκαίων
  english_pob_choice: of the Pharisees and Sadducees
  chosen_spanish: de los fariseos y de los saduceos
  alternatives_spanish:
  - de los fariseos y saduceos
  lexicon: BDAG
  rationale: Se conservan las transliteraciones habituales de estos grupos judíos. Repetir «de» ante ambos grupos mejora la claridad y la cadencia en español.
theological_decisions:
- issue: Fuerza metafórica de «levadura»
  english_pob_reading: Retain the metaphor 'leaven' in the main text without explicating it as 'teaching' here.
  chosen_spanish_reading: Mantener «levadura» en el texto principal sin explicarla aquí como «enseñanza».
  alternative_spanish_readings:
  - Pero guardaos de la enseñanza de los fariseos y de los saduceos
  rationale: El versículo usa ζύμη de modo figurado. La explicación aparece en el versículo siguiente; por eso conviene preservar la metáfora en el texto principal y no adelantar la interpretación.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y coincide con la lectura publicada en inglés.
  spanish_consistency_notes:
  - Se mantiene «fariseos» y «saduceos» como nombres transliterados estándar.
  - Se preserva la metáfora de «levadura» para evitar una paráfrasis interpretativa prematura.
  - El tono de reprensión se conserva con la pregunta inicial y el imperativo de advertencia.
