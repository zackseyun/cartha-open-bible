    rationale: Se mezcla segunda persona plural peninsular con objeto indirecto de tercera plural. Aunque «les» puede referirse a ustedes, el resultado suena inestable; «a ustedes» aclara el referente y mejora la naturalidad.
  - severity: low
    issue: «acerca del pan» es algo rígido
    rationale: Es fiel, pero «sobre el pan» o «del pan» suena más natural en español contemporáneo sin perder sentido.
