  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: contraste discursivo («Pero»), habla de Jesús, doble advertencia imperativa, y la metáfora de «levadura» aplicada a fariseos y saduceos. Sin embargo, la preposición en «a la levadura» no preserva bien el valor idiomático de ἀπὸ con verbos de advertencia; en español natural y fiel debe ser «de la levadura».'
  spanish_quality_summary: El texto es claro y legible, pero «tengan cuidado ... a la levadura» suena antinatural en español. Además, la nota al pie actual dice «O “levadura”», lo cual no funciona como alternativa porque el texto principal ya usa «levadura». Conviene corregir la nota para reflejar la alternativa real «fermento» o «levadura/masa madre» no, mejor «fermento» como opción léxica española secundaria frente a la elección principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «fariseos», «saduceos» y «levadura» concuerdan con el audit trail. Se mantiene correctamente la metáfora sin explicarla en el texto principal.
  issues:
  - severity: high
    issue: Preposición incorrecta en «estén atentos a la levadura»
    rationale: El griego ἀπὸ con verbos de advertencia aquí corresponde en español a «de», como en «cuídense de» o «tengan cuidado con». «A la levadura» resulta poco idiomático y debilita la fidelidad semántica.
  - severity: medium
    issue: La nota al pie no presenta una alternativa real
    rationale: La nota dice «O “levadura”», pero esa es exactamente la forma ya usada en el texto principal. Debe indicar la alternativa léxica pertinente, por ejemplo «O “fermento”», mientras explica que el griego usa «levadura» metafóricamente.
  revised_spanish_text: 'Pero Jesús les dijo: «Tengan cuidado y estén atentos a la levadura[a] de los fariseos y saduceos».'
