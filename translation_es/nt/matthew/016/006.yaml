translation:
  language: es
  text: 'Pero Jesús les dijo: «Tengan cuidado y estén atentos a la levadura[a] de los fariseos y saduceos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fermento». El griego usa «levadura» como metáfora; Jesús más adelante la explica en relación con la enseñanza o influencia de los fariseos y saduceos.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En este giro discursivo, δὲ marca transición con matiz leve de contraste; «Pero» reproduce bien esa función en español natural y mantiene la continuidad con el contexto anterior.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo a ellos
  lexicon: BDAG
  rationale: El dativo pronominal se expresa de forma idiomática con «les dijo», claro y fiel al valor directo de λέγω con complemento indirecto.
- source_word: Ὁρᾶτε
  english_pob_choice: Watch out
  chosen_spanish: Tengan cuidado
  alternatives_spanish:
  - Estén atentos
  - Mirad
  - Vigilen
  lexicon: BDAG
  rationale: Aquí ὁράω funciona como advertencia imperativa; «Tengan cuidado» conserva el tono de alerta sin sonar forzado en español.
- source_word: προσέχετε
  english_pob_choice: beware
  chosen_spanish: estén atentos
  alternatives_spanish:
  - presten atención
  - manténganse alertas
  - cuidado con
  lexicon: BDAG
  rationale: El segundo imperativo intensifica la advertencia. «Estén atentos» preserva la duplicación retórica de dos mandatos cercanos sin convertirlo en una redundancia torpe.
- source_word: ἀπὸ τῆς ζύμης
  english_pob_choice: of the leaven
  chosen_spanish: a la levadura
  alternatives_spanish:
  - de la levadura
  - del fermento
  lexicon: BDAG
  rationale: Aunque ἀπό puede traducirse «de» idiomáticamente, el español fluye mejor aquí con «a la» dentro de la construcción de advertencia («tener cuidado a algo» no es la opción más natural, pero el verbo de advertencia compensa la relación). «Levadura» conserva la metáfora bíblica documentada en el texto fuente y en el audit trail inglés.
- source_word: Φαρισαίων
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Transliteración habitual y estándar del grupo judío; en español se adapta morfológicamente como sustantivo común plural.
- source_word: Σαδδουκαίων
  english_pob_choice: Sadducees
  chosen_spanish: saduceos
  alternatives_spanish:
  - saduceos
  lexicon: BDAG
  rationale: Transliteración estándar del grupo; la forma «saduceos» es la natural en español bíblico contemporáneo.
theological_decisions:
- issue: Metáfora de la levadura
  english_pob_reading: Retain 'leaven' as a metaphor without explicating it in the main text.
  chosen_spanish_reading: Mantener «levadura» como metáfora sin explicarla en el texto principal.
  alternative_spanish_readings:
  - explicarla como «enseñanza»
  - explicarla como «influencia»
  rationale: El verso no desarrolla la interpretación; Jesús la explicará más adelante en el contexto. Conservar la metáfora respeta la tensión literaria y evita anticipar una glosa interpretativa que no está en este enunciado.
  doctrine_reference: Primacía del texto fuente y preservación de la imagen metafórica sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en «les dijo[a]». No se introdujeron marcas sueltas ni notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - Se eligió el par de imperativos con tono de advertencia natural en español, preservando la duplicación retórica del griego.
  - «Levadura» se conservó por la metáfora bíblica y por coherencia con el audit trail inglés; no se sustituyó por «fermento» o por una explicación interpretativa en el cuerpo principal.
