revisions:
- from: Entonces comprendieron que no les había dicho que se guardaran de la levadura[a] de los panes, sino de la enseñanza de los fariseos y saduceos.
  to: Entonces comprendieron que no había dicho que se cuidaran de la levadura de los panes[a], sino de la enseñanza de los fariseos y saduceos.
  rationale: Se elimina «les» para ajustarse más estrechamente al griego, se sustituye «se guardaran de» por «se cuidaran de» para mayor naturalidad en español contemporáneo sin perder la fuerza de advertencia, y se mueve la nota al pie a «panes[a]» porque el comentario textual corresponde al plural de ἄρτων. También se adapta la nota al español para reflejar la alternativa idiomática «del pan», paralela a la decisión inglesa principal.
