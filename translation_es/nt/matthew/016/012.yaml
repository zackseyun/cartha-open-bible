translation:
  language: es
  text: Entonces comprendieron que no había dicho que se cuidaran de la levadura de los panes[a], sino de la enseñanza de los fariseos y saduceos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del pan». El griego tiene aquí un sustantivo plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca el momento en que los discípulos finalmente entendieron; «Entonces» es natural y preciso en español.
- source_word: συνῆκαν
  english_pob_choice: they understood
  chosen_spanish: comprendieron
  alternatives_spanish:
  - entendieron
  - se dieron cuenta
  lexicon: BDAG
  rationale: El aoristo de συνίημι expresa llegar a entender. «Comprendieron» conserva el sentido cognitivo con un español claro y digno.
- source_word: οὐκ εἶπεν
  english_pob_choice: he had not said
  chosen_spanish: no les había dicho
  alternatives_spanish:
  - no dijo
  - no les había hablado
  lexicon: BDAG
  rationale: El contexto muestra una comprensión posterior de lo que Jesús quiso decir; el pluscuamperfecto español refleja bien esa relación temporal sin añadir contenido.
- source_word: προσέχειν
  english_pob_choice: to beware
  chosen_spanish: que se guardaran de
  alternatives_spanish:
  - que estuvieran alerta de
  - que evitaran
  lexicon: BDAG
  rationale: En este contexto advertencial, προσέχω tiene la idea de estar prevenido o guardarse de algo. «Que se guardaran de» suena natural y conserva la fuerza de advertencia.
- source_word: ἀπὸ τῆς ζύμης
  english_pob_choice: of the leaven
  chosen_spanish: de la levadura
  alternatives_spanish:
  - de la masa fermentada
  - del fermento
  lexicon: BDAG
  rationale: ζύμη significa literalmente «levadura/fermento». «Levadura» mantiene la imagen bíblica y la metáfora, tal como la conserva el POB en inglés.
- source_word: τῶν ἄρτων
  english_pob_choice: of bread
  chosen_spanish: de los panes
  alternatives_spanish:
  - del pan
  - de las hogazas
  lexicon: BDAG
  rationale: Aunque el griego usa plural, en español «de los panes» refleja de forma más directa el plural y evita neutralizar la lectura. Conserva la posible alusión literal al pan.
- source_word: διδαχῆς
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la doctrina
  - la instrucción
  lexicon: BDAG
  rationale: διδαχή puede significar enseñanza o doctrina. «Enseñanza» es el equivalente español más natural y evita un tecnicismo eclesiástico no exigido por el texto.
- source_word: Φαρισαίων
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado de manera estándar en español.
- source_word: Σαδδουκαίων
  english_pob_choice: Sadducees
  chosen_spanish: saduceos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado de manera estándar en español.
theological_decisions:
- issue: Fuerza metafórica de «levadura»
  english_pob_reading: The verse explains the metaphor as referring to teaching, without further specifying the moral quality of that teaching.
  chosen_spanish_reading: El versículo explica la metáfora como referencia a la enseñanza, sin precisar aquí si se trata de corrupción, hipocresía u otra cualidad moral.
  alternative_spanish_readings:
  - Sustituir la metáfora por una explicación interpretativa como «doctrina corrupta» en el texto principal.
  - Añadir «hipocresía» en el texto principal.
  rationale: Se mantiene el nivel de explicación del propio versículo. No se resuelve la tensión interpretativa que el pasaje deja abierta, para no importar conclusiones de paralelos no citados aquí.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreinterpretar.
translation_notes:
  revision_awareness: El texto sigue la lectura auditada del POB en inglés y no requiere cambios de revisión según el resumen de revisión más reciente; se conserva la equivalencia óptima con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva «fariseos» y «saduceos» como transliteraciones estándar.
  - «Levadura» mantiene la imagen metafórica establecida por el contexto inmediato.
  - «Enseñanza» refleja bien διδαχή sin cargar el término con tecnicismo doctrinal innecesario.
