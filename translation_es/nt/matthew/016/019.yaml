  text: ⸀δώσω σοι τὰς ⸀κλεῖδας τῆς βασιλείας τῶν οὐρανῶν, καὶ ὃ ⸀ἐὰν δήσῃς ἐπὶ τῆς γῆς ἔσται δεδεμένον ἐν τοῖς οὐρανοῖς, καὶ ὃ ⸁ἐὰν λύσῃς ἐπὶ τῆς γῆς ἔσται λελυμένον ἐν τοῖς οὐρανοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/019.yaml
  text: I will give you the keys of the kingdom of heaven[a], and whatever you bind on earth will have been bound in heaven[c][b], and whatever you loose on earth will have been loosed in heaven.
  footnotes:
  - marker: a
    text: Or more literally, 'the kingdom of the heavens.' Matthew frequently uses this expression.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often reads 'will be bound ... will be loosed.' The Greek more precisely can be understood as 'will have been bound ... will have been loosed.'
    reason: alternative_reading
  - marker: c
    text: '''Bind'' and ''loose'' can carry the sense of forbidding and permitting, or of imposing and lifting obligations, though the translation preserves the Greek metaphor.'
    reason: cultural_note
