translation:
  language: es
  text: Yo te daré las llaves del reino de los cielos[a], y todo lo que ates en la tierra habrá sido atado en los cielos[c][b], y todo lo que desates en la tierra habrá sido desatado en los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con una forma más cercana a otras traducciones, «el reino del cielo»; Mateo usa con frecuencia la expresión «los cielos».
    reason: lexical_alternative
  - marker: b
    text: La forma griega puede entenderse con más precisión como «habrá sido atado / desatado»; la traducción tradicional suele decir «será atado / desatado».
    reason: alternative_reading
  - marker: c
    text: «Atar» y «desatar» pueden incluir el sentido de prohibir y permitir, o de imponer y levantar obligaciones; aquí se conserva la metáfora griega.
    reason: cultural_note
lexical_decisions:
- source_word: δώσω
  english_pob_choice: I will give
  chosen_spanish: te daré
  alternatives_spanish:
  - yo te daré
  - te voy a dar
  lexicon: BDAG
  rationale: El futuro activo indica una promesa futura directa. En español, «te daré» comunica naturalmente el valor del futuro sin calco innecesario, y el pronombre enfático «yo» puede conservarse para reflejar la persona verbal y el énfasis del griego.
- source_word: σοι
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - a ti te
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural en español con el clítico dativo «te» en una construcción con «dar».
- source_word: κλεῖδας
  english_pob_choice: keys
  chosen_spanish: las llaves
  alternatives_spanish:
  - las claves
  lexicon: BDAG
  rationale: Se mantiene el sustantivo literal y metafórico. «Llaves» es la forma más natural y transparente en español para preservar la imagen de autoridad sin interpretarla.
- source_word: βασιλείας τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino de los cielos
  - el reino de los cielos
  lexicon: BDAG
  rationale: En Mateo, la expresión fija es «el reino de los cielos». Aunque el griego es literalmente plural («los cielos»), en español la fórmula tradicional y más clara conserva ese plural. No se sustituye por una paráfrasis interpretativa.
- source_word: ὃ ἐὰν
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - lo que sea que
  - cualquier cosa que
  lexicon: BDAG
  rationale: La construcción relativa indefinida se vierte de manera idiomática como «todo lo que», que mantiene el alcance general de la cláusula sin endurecer el español.
- source_word: δήσῃς
  english_pob_choice: bind
  chosen_spanish: ates
  alternatives_spanish:
  - amarres
  - ligues
  lexicon: BDAG
  rationale: «Atar» conserva la metáfora verbal del griego y su resonancia jurídica/autoritaria. Se evita explicitar «prohibir» para no borrar la imagen documentada por el texto.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  lexicon: BDAG
  rationale: La preposición con genitivo expresa contraste espacial con «en los cielos». «En la tierra» es natural en español y mantiene la antítesis.
- source_word: ἔσται δεδεμένον
  english_pob_choice: will have been bound
  chosen_spanish: habrá sido atado
  alternatives_spanish:
  - será atado
  - quedará atado
  lexicon: BDAG
  rationale: La combinación de futuro de εἰμί con participio perfecto pasivo señala un estado futuro resultante de una acción anterior. «Habrá sido atado» preserva mejor ese matiz que «será atado».
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  lexicon: BDAG
  rationale: Se conserva el plural del griego y la forma mateana habitual. En español, «los cielos» reproduce mejor la referencia del texto y su registro bíblico.
- source_word: λύσῃς
  english_pob_choice: loose
  chosen_spanish: desates
  alternatives_spanish:
  - liberes
  - desates
  lexicon: BDAG
  rationale: «Desatar» mantiene el paralelismo con «atar» y preserva la metáfora. «Liberar» explicaría la idea, pero reduciría la simetría verbal del original.
- source_word: ἔσται λελυμένον
  english_pob_choice: will have been loosed
  chosen_spanish: habrá sido desatado
  alternatives_spanish:
  - será desatado
  - quedará desatado
  lexicon: BDAG
  rationale: Se mantiene la misma solución aspectual que en la cláusula anterior para reflejar el estado resultante anterior al futuro referenciado.
theological_decisions:
- issue: Aspecto verbal de «habrá sido atado / desatado»
  english_pob_reading: Rendered the clauses as 'will have been bound/loosed in heaven' rather than 'will be bound/loosed in heaven.'
  chosen_spanish_reading: «Habrá sido atado / desatado en los cielos»
  alternative_spanish_readings:
  - «Será atado / desatado en los cielos»
  rationale: El griego usa futuro de εἰμί con participio perfecto pasivo, lo que sugiere un estado futuro que resulta de una acción ya realizada. La traducción española conserva ese valor aspectual y evita aplanar la forma verbal.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de «las llaves del reino de los cielos»
  english_pob_reading: Kept the metaphor 'keys' without interpretive expansion.
  chosen_spanish_reading: Se conserva la metáfora de «las llaves».
  alternative_spanish_readings:
  - autoridad para admitir y excluir
  - autoridad de mayordomía
  rationale: El texto presenta una imagen, no una explicación. Mantener «las llaves» evita imponer un sistema eclesiológico que el versículo no enuncia explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Posible valor funcional de «atar» y «desatar»
  english_pob_reading: '''Bind'' and ''loose'' can carry the sense of forbidding and permitting, or of imposing and lifting obligations, though the translation preserves the Greek metaphor.'
  chosen_spanish_reading: Se conserva la metáfora de «atar» y «desatar» sin explicitar «prohibir» y «permitir».
  alternative_spanish_readings:
  - prohibir y permitir
  - imponer y levantar obligaciones
  rationale: Aunque esas lecturas funcionales son posibles, el español puede conservar la metáfora con claridad. Así se preserva la tensión léxica sin eliminar el potencial jurídico del lenguaje.
  doctrine_reference: Affirmations; lexical notes on bind/loose
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés y conserva sus decisiones clave: la metáfora de las llaves, la fórmula mateana «reino de los cielos» y el matiz aspectual de los perfectos pasivos futuros. No se requirieron cambios respecto al último pase revisado, y la versión española se ajusta a la misma lectura de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural por coherencia con la fórmula mateana y con la decisión del POB inglés de preservar el plural como alternativa visible.
  - Se usa «atar/desatar» para conservar la metáfora y el paralelismo verbal; no se sustituye por «prohibir/permitir» en el cuerpo principal.
  - Se evita «SEÑOR» u otras sustituciones teológicas no pertinentes, porque aquí no aparece el nombre divino.
  - La puntuación y el registro son de español bíblico contemporáneo, sobrio y publicable.
