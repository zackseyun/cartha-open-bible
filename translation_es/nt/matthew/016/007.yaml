translation:
  language: es
  text: 'Y ellos estaban discutiendo entre sí, diciendo: «No trajimos pan[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no llevamos pan con nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Pero ellos
  - Ahora ellos
  lexicon: οἱ + δέ
  rationale: El enlace narrativo es suave; en español, «Y ellos» mantiene la continuidad sin sobrecargar el contraste que δέ no exige aquí.
- source_word: διελογίζοντο
  english_pob_choice: were discussing
  chosen_spanish: estaban discutiendo
  alternatives_spanish:
  - estaban razonando
  - estaban deliberando
  - estaban conversando
  lexicon: διαλογίζομαι
  rationale: El imperfecto indica una acción en curso; «estaban discutiendo» comunica bien la deliberación interna del grupo en español natural y mantiene el matiz procesual.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - entre ellos
  - consigo mismos
  lexicon: ἐν ἑαυτοῖς
  rationale: La expresión señala una conversación dentro del propio grupo; «entre sí» es la equivalencia idiomática más concisa y natural en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - al decir
  lexicon: λέγω
  rationale: El participio introduce el contenido de la discusión; «diciendo» conserva la relación sintáctica simple del griego.
- source_word: Ἄρτους
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  - bastimento
  lexicon: ἄρτος
  rationale: Aunque el plural puede sugerir «panes», en español el sustantivo singular «pan» funciona de modo natural como alimento/provisión general, igual que el inglés POB usa «bread».
- source_word: οὐκ ἐλάβομεν
  english_pob_choice: we did not bring
  chosen_spanish: no hemos traído
  alternatives_spanish:
  - no trajimos
  - no llevamos
  - no hemos llevado
  lexicon: λαμβάνω
  rationale: En este contexto de provisiones para el viaje, la idea es no haber traído consigo pan; «no hemos traído» expresa la carga idiomática de forma clara y fiel, sin forzar un calco de «tomar» o «recibir».
theological_decisions:
- issue: Valor de ἄρτος como alimento/provisión y no como término litúrgico
  english_pob_reading: bread
  chosen_spanish_reading: pan
  alternative_spanish_readings:
  - panes
  - alimento
  rationale: Aquí no hay un uso sacramental explícito; el contexto inmediato es el de provisiones olvidadas. «Pan» preserva la referencia ordinaria y evita introducir una lectura litúrgica no sustentada por el verso.
  doctrine_reference: Contexto narrativo inmediato; no implica Eucaristía en este versículo.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar la adición interpretativa «It is because» y el objeto innecesario «it», quedando una formulación más cercana al griego. La presente traducción española sigue esa revisión y no introduce explicación causal adicional.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo directo y sobrio.
  - «entre sí» conserva la relación recíproca sin añadir matices inexistentes.
  - «no hemos traído» evita una paráfrasis causal y refleja correctamente la queja implícita del grupo.
