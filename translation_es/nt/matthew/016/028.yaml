base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/028.yaml
  text: Truly I tell you[c][b][a], there are some standing here who will certainly not taste death until they see the Son of Man coming in his kingdom.
  footnotes:
  - marker: a
    text: Or 'will by no means taste death'; the Greek uses an emphatic negation.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the Son of Man coming in his kingdom' may refer to the transfiguration, resurrection/exaltation, judgment on Jerusalem, or the final coming; the text itself does not specify which event.
    reason: alternative_reading
  - marker: c
    text: Or 'in his reign' or 'in his royal rule.'
    reason: lexical_alternative
