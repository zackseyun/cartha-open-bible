translation:
  language: es
  text: 'En verdad les digo: hay algunos de entre los que están aquí que de ningún modo probarán la muerte[a] hasta que vean al Hijo del Hombre viniendo en su reino[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de ningún modo probarán la muerte»; la negación griega es enfática.
    reason: lexical_alternative
  - marker: b
    text: La frase «el Hijo del Hombre viniendo en su reino» puede referirse a la transfiguración, a la resurrección/exaltación, al juicio sobre Jerusalén o a la venida final; el texto mismo no especifica cuál acontecimiento es.
    reason: alternative_reading
  - marker: c
    text: O «en su reinado» o «en su gobierno real».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Verdaderamente
  lexicon: BDAG
  rationale: Se trata de una fórmula solemne de afirmación introductoria. «En verdad» conserva la fuerza enfática y suena natural en español bíblico moderno sin transliterar innecesariamente.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les hablo
  lexicon: BDAG
  rationale: La primera persona presente con objeto dativo se expresa de forma natural como «les digo», manteniendo la dirección personal y la solemnidad del dicho.
- source_word: εἰσίν τινες
  english_pob_choice: there are some
  chosen_spanish: hay algunos
  alternatives_spanish:
  - existen algunos
  - algunos son
  lexicon: BDAG
  rationale: La construcción existencial se vierte idiomáticamente con «hay algunos», que conserva el sentido de existencia y no fuerza una estructura calcada.
- source_word: τῶν ὧδε ἑστώτων
  english_pob_choice: standing here
  chosen_spanish: de los que están aquí
  alternatives_spanish:
  - de los que están de pie aquí
  - de entre los que están aquí
  lexicon: BDAG
  rationale: El participio de perfecto «ἑστώτων» identifica a los presentes; en español, «los que están aquí» comunica de manera natural el grupo localizado y evita una rigidez artificial. La idea de estar de pie queda implícita en el contexto inmediato de presencia física.
- source_word: οὐ μὴ γεύσωνται
  english_pob_choice: will certainly not taste
  chosen_spanish: de ningún modo probarán
  alternatives_spanish:
  - no probarán en absoluto
  - no gustarán
  lexicon: BDAG
  rationale: La negación enfática οὐ μή pide una equivalencia fuerte. «De ningún modo» reproduce bien el énfasis y «probarán» conserva el verbo idiomático de la imagen de «gustar/probar la muerte».
- source_word: γεύσωνται θανάτου
  english_pob_choice: taste death
  chosen_spanish: probarán la muerte
  alternatives_spanish:
  - experimentarán la muerte
  - morirán
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica «probar la muerte», que es literal y reconocible, en lugar de reducirla a «morirán».
- source_word: ἕως ἂν ἴδωσιν
  english_pob_choice: until they see
  chosen_spanish: hasta que vean
  alternatives_spanish:
  - hasta el momento en que vean
  - hasta ver
  lexicon: BDAG
  rationale: La cláusula temporal futura con subjuntivo se expresa con «hasta que vean», forma natural en español y fiel al valor prospectivo del griego.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: al Hijo del Hombre
  alternatives_spanish:
  - al Hijo del Hombre
  - al Hijo del ser humano
  lexicon: BDAG
  rationale: Se mantiene el título fijo «Hijo del Hombre», tradicional y fiel al uso autodenominativo y apocalíptico de Jesús.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - que viene
  - llegando
  lexicon: BDAG
  rationale: El participio presente se traduce de manera directa como «viniendo», preservando la acción en curso sin añadir contenido ajeno al verso.
- source_word: ἐν τῇ βασιλείᾳ αὐτοῦ
  english_pob_choice: in his kingdom
  chosen_spanish: en su reino
  alternatives_spanish:
  - en su reino
  - en su reinado
  - en su realeza
  lexicon: BDAG
  rationale: «βασιλεία» puede ser reino o reinado. Se elige «reino» porque coincide con la redacción base y conserva la imagen concreta sin resolver la tensión interpretativa entre dominio y esfera real.
theological_decisions:
- issue: Alcance de la venida del Hijo del Hombre
  english_pob_reading: Render the phrase straightforwardly without specifying whether it refers to the transfiguration, resurrection/exaltation, Jerusalem's judgment, Pentecost, or the final coming.
  chosen_spanish_reading: Traducir la frase de forma directa, sin decidir en el texto si alude a la transfiguración, la resurrección/exaltación, el juicio sobre Jerusalén o la venida final.
  alternative_spanish_readings:
  - la transfiguración
  - la resurrección/exaltación
  - el juicio sobre Jerusalén
  - Pentecostés
  - la venida escatológica final
  rationale: El griego no identifica el acontecimiento con precisión. Por eso la traducción debe conservar la tensión interpretativa en vez de resolverla con una explicación implícita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de βασιλεία
  english_pob_reading: kingdom
  chosen_spanish_reading: reino
  alternative_spanish_readings:
  - reinado
  - gobierno real
  rationale: «Reino» conserva la imagen concreta y el uso habitual de la frase en el contexto sinóptico. «Reinado» sería posible, pero desplaza el énfasis hacia una abstracción que el versículo no exige.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios y el informe de control cruzado mostró alta concordancia; por tanto, no se aplicaron modificaciones adicionales al contenido base.
  spanish_consistency_notes:
  - 'Se mantuvo el orden retórico del dicho: fórmula solemne, anuncio existencial, negación enfática, límite temporal y visión del Hijo del Hombre.'
  - Se preservó «Hijo del Hombre» como título fijo, sin parafrasearlo.
  - «Reino» se conserva para βασιλεία por coherencia con el audit trail en inglés y por su transparencia en español.
  - La negación enfática se reflejó con «de ningún modo», que comunica mejor el valor de οὐ μή que una simple negación.
  - 'Las notas se anclan en los lugares correspondientes del texto: la primera en la negación enfática, la segunda en la cláusula del Hijo del Hombre, la tercera en βασιλεία.'
