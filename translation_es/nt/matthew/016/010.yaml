translation:
  language: es
  text: ¿O los siete panes para los cuatro mil[a], y cuántas canastas grandes recogieron ustedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de los cuatro mil’.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Or
  chosen_spanish: ¿O no…?
  alternatives_spanish:
  - ¿Ni…?
  - ¿O tampoco…?
  lexicon: BDAG
  rationale: En una secuencia de preguntas retóricas, οὐδὲ introduce otro elemento recordado por Jesús. En español, ‘¿O no…?’ conserva la fuerza interrogativa y el enlace discursivo sin sonar forzado. ‘Ni’ sería más literal, pero menos natural en esta construcción.
- source_word: τοὺς ἑπτὰ ἄρτους
  english_pob_choice: the seven loaves
  chosen_spanish: los siete panes
  alternatives_spanish:
  - los siete hogazas
  - los siete panes de pan
  lexicon: BDAG
  rationale: ἄρτους aquí se refiere a panes/loaves en el relato de la multiplicación. ‘Panes’ comunica bien la imagen concreta en español; ‘hogazas’ sería más específico pero menos general y más marcado regionalmente.
- source_word: τῶν τετρακισχιλίων
  english_pob_choice: for the four thousand
  chosen_spanish: de los cuatro mil
  alternatives_spanish:
  - para los cuatro mil
  - de las cuatro mil personas
  lexicon: BDAG
  rationale: El genitivo expresa la relación con el milagro de la alimentación de los cuatro mil. ‘De los cuatro mil’ es la forma más natural y fiel en español, manteniendo la asociación narrativa sin añadir explícitamente ‘personas’.
- source_word: πόσας
  english_pob_choice: how many
  chosen_spanish: cuántas
  alternatives_spanish:
  - cuántas de
  - qué cantidad de
  lexicon: BDAG
  rationale: πόσας modifica a σπυρίδας como pregunta de cantidad. ‘Cuántas’ reproduce directamente la interrogación en español.
- source_word: σπυρίδας
  english_pob_choice: large baskets
  chosen_spanish: canastas grandes
  alternatives_spanish:
  - canastos grandes
  - cestas grandes
  lexicon: BDAG
  rationale: σπυρίς designa una canasta de mayor tamaño, distinta de otros términos para cesta en los Evangelios. ‘Canastas grandes’ conserva esa distinción léxica de forma clara y neutral para el lector hispanohablante.
- source_word: ἐλάβετε
  english_pob_choice: you picked up
  chosen_spanish: recogieron
  alternatives_spanish:
  - levantaron
  - tomaron
  lexicon: BDAG
  rationale: En este contexto de recolectar sobras tras la comida milagrosa, ‘recogieron’ expresa de manera natural la acción de juntar lo que quedó. Aunque el griego está en segunda persona, el español puede sonar más idiomático en una pregunta dirigida al grupo con un verbo semánticamente equivalente.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego y el expediente inglés POB, conservando la progresión retórica de la pregunta y la distinción léxica de σπυρίς como canasta de mayor tamaño. No hubo revisiones aplicadas en el pasaje inglés reciente.
  spanish_consistency_notes:
  - Se usa ‘panes’ para ἄρτους en coherencia con el valor concreto de ‘loaves’ y con el estilo bíblico natural del español.
  - Se mantiene ‘canastas grandes’ para preservar la distinción terminológica entre tipos de recipientes en los relatos de alimentación.
  - La pregunta se formula con ‘¿O no…?’ para reflejar el enlace discursivo de οὐδὲ sin introducir una paráfrasis extensa.
