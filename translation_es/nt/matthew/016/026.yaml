review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego y la auditoría inglesa: mantiene la pregunta retórica, «el mundo entero», la pérdida de «su vida» para ψυχή y la segunda pregunta sobre lo dado «a cambio». También preserva correctamente la nota léxica sobre «alma». Sin embargo, la apertura «¿Porque de qué...?» es incorrecta en español y no representa bien τί γὰρ; además, «le sirve» cambia el matiz futuro de ὠφεληθήσεται, que en esta construcción pide algo como «le aprovechará» o «le servirá».'
  spanish_quality_summary: 'La redacción es casi natural, pero contiene un error ortográfico/gramatical importante: interrogativo «por qué/de qué» fue escrito como causal «Porque». Además, repetir la misma nota [a] en ambas ocurrencias no sigue la disciplina del proyecto: una sola nota puede anclarse en la primera ocurrencia y referirse a ambas. El resto es claro y de registro adecuado.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión de traducir ψυχή como «vida» con nota «alma» concuerda con la auditoría inglesa y la rationale teológica. «El hombre» conserva el singular genérico documentado.
  issues:
  - severity: high
    issue: «¿Porque de qué le sirve...?» es incorrecto en español.
    rationale: En pregunta corresponde «por qué» o, mejor aquí, simplemente «¿De qué le aprovechará...?» / «¿De qué le sirve...?»; «porque» es conjunción causal y no funciona en esta frase.
  - severity: medium
    issue: «le sirve» no preserva bien el futuro de ὠφεληθήσεται.
    rationale: Aunque idiomático, el presente debilita la forma futura del griego y del POB inglés. «Le aprovechará» mantiene mejor la pregunta retórica y suena natural en español bíblico moderno.
  - severity: medium
    issue: La misma nota [a] aparece dos veces en el texto.
    rationale: La instrucción del proyecto pide marcadores únicos y no reutilizados para notas diferentes; aquí es la misma nota, pero basta un solo anclaje en la primera «vida» porque la nota ya aclara «en ambas ocurrencias».
  revised_spanish_text: Porque ¿de qué le aprovechará al hombre si gana el mundo entero pero pierde su vida?[a] ¿O qué dará el hombre a cambio de su vida?
  revised_footnotes:
  - marker: a
    text: O «alma» en ambas ocurrencias de «vida». El griego ψυχή puede significar «vida», «yo» o «alma», según el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la apertura para reflejar mejor τί γὰρ y el español natural: «Porque ¿de qué...?» preserva la fuerza explicativa de γάρ sin el error «¿Porque...?». Se cambia «le sirve» por «le aprovechará» para mantener el futuro de ὠφεληθήσεται y un matiz más cercano a «profit». Se conserva «vida» para ψυχή con nota sobre «alma», y se deja un solo anclaje de nota, suficiente para cubrir ambas ocurrencias como ya indica la nota.'
