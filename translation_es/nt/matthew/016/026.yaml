translation:
  language: es
  text: Porque ¿de qué le aprovechará al hombre si gana el mundo entero pero pierde su vida?[a] ¿O qué dará el hombre a cambio de su vida?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma» en ambas ocurrencias de «vida». El griego ψυχή puede significar «vida», «yo» o «alma», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γὰρ
  english_pob_choice: For what
  chosen_spanish: ¿Porque de qué le sirve
  alternatives_spanish:
  - ¿Pues qué le aprovechará
  - ¿De qué le sirve
  lexicon: BDAG
  rationale: τί introduce una pregunta retórica; γάρ añade fuerza explicativa. En español, «¿Porque de qué le sirve?» conserva el tono explicativo-retórico y la relación con el contexto, aunque se evita un calco demasiado rígido. Se mantiene el sentido de utilidad/beneficio con un registro natural.
- source_word: ὠφεληθήσεται
  english_pob_choice: will it profit
  chosen_spanish: le sirve
  alternatives_spanish:
  - le aprovechará
  - le beneficiará
  - le reportará provecho
  lexicon: BDAG
  rationale: El futuro pasivo de ὠφελέω expresa recibir beneficio. «Le sirve» es una forma idiomática y clara en español para expresar utilidad o provecho, sin sobrecargar la frase con tecnicismos.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El griego usa ἄνθρωπος en singular genérico. Se conserva «el hombre» para reflejar ese valor representativo y mantener la correspondencia con la auditoría inglesa, evitando neutralizar sin necesidad.
- source_word: τὸν κόσμον ὅλον
  english_pob_choice: the whole world
  chosen_spanish: el mundo entero
  alternatives_spanish:
  - todo el mundo
  - el mundo completo
  lexicon: BDAG
  rationale: κόσμος con ὅλον denota la totalidad del mundo como objeto de ganancia. «El mundo entero» es idiomático y exacto en español.
- source_word: κερδήσῃ
  english_pob_choice: gains
  chosen_spanish: gana
  alternatives_spanish:
  - obtiene
  - consigue
  - se adueña de
  lexicon: BDAG
  rationale: κερδαίνω indica ganar u obtener. «Gana» mantiene el contraste económico/comercial del dicho y suena natural en español.
- source_word: τὴν δὲ ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su propia vida
  - su ser
  lexicon: BDAG
  rationale: ψυχή puede significar vida, alma o yo mismo según el contexto. Aquí la contraposición con ganar el mundo y el paralelo con «a cambio de su vida» favorecen «vida» como lectura principal. Se preserva la alternativa tradicional «alma» en nota por la tensión lexical documentada.
- source_word: ζημιωθῇ
  english_pob_choice: forfeits
  chosen_spanish: pierde
  alternatives_spanish:
  - sufre pérdida
  - queda privado de
  - se perjudica
  lexicon: BDAG
  rationale: ζημιόω en pasivo significa sufrir pérdida o quedar privado de algo valioso. «Pierde» es la forma más natural en español para el contraste retórico, sin añadir matices no explícitos.
- source_word: ἢ τί
  english_pob_choice: Or what
  chosen_spanish: ¿O qué
  alternatives_spanish:
  - ¿O qué cosa
  - ¿O qué podría
  lexicon: BDAG
  rationale: Introduce la segunda pregunta retórica paralela a la primera. «¿O qué?» conserva brevedad, paralelismo y fuerza interrogativa.
- source_word: δώσει
  english_pob_choice: will ... give
  chosen_spanish: dará
  alternatives_spanish:
  - entregará
  - ofrecerá
  lexicon: BDAG
  rationale: Futuro de δίδωμι. «Dará» preserva la forma verbal y funciona bien con la construcción «a cambio de».
- source_word: ἀντάλλαγμα
  english_pob_choice: in exchange
  chosen_spanish: a cambio
  alternatives_spanish:
  - en intercambio
  - como pago
  - como compensación
  lexicon: BDAG
  rationale: ἀντάλλαγμα designa lo dado en retorno o cambio. «A cambio» comunica el valor comercial sin forzar una lectura de rescate o precio de redención.
- source_word: τῆς ψυχῆς αὐτοῦ
  english_pob_choice: for his life
  chosen_spanish: de su vida
  alternatives_spanish:
  - de su alma
  - por su vida
  lexicon: BDAG
  rationale: La construcción con ἀντάλλαγμα pide el referente por el cual se ofrece el intercambio. Se mantiene «vida» por consistencia con la primera mitad del versículo y porque el contraste apunta a la vida en su valor total.
theological_decisions:
- issue: Sentido de ψυχή en un dicho sobre pérdida final
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser
  - vida propia
  rationale: El texto no obliga a una distinción doctrinal técnica entre cuerpo y alma inmortal. Aquí ψυχή abarca la vida/persona en su valor último. Traducir «vida» evita imponer una antropología más estrecha que la del pasaje, mientras que «alma» queda preservada como alternativa válida por su carga teológica tradicional.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it); §6 (readable modern Spanish)
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del audit trail inglés: se mantiene ψυχή como «vida» en el texto principal, pero se conserva la alternativa «alma» en nota. También se refleja el valor retórico de las dos preguntas sin suavizar la fuerza del contraste entre ganar el mundo y perder lo más valioso.'
  spanish_consistency_notes:
  - Se usa «vida» de forma consistente para ψυχή en ambos casos dentro del versículo.
  - Se conserva el paralelismo de las dos preguntas retóricas con vocabulario breve y directo.
  - Se evita introducir «Cristo», «Señor» u այլ terminología ajena al versículo.
  - La nota al pie marca una alternativa lexical real, no una paráfrasis libre.
