revisions:
- from: ¿Porque de qué le sirve al hombre si gana el mundo entero y pierde su vida?[a] ¿O qué dará el hombre a cambio de su vida?[a]
  to: Porque ¿de qué le aprovechará al hombre si gana el mundo entero pero pierde su vida?[a] ¿O qué dará el hombre a cambio de su vida?
  rationale: 'Se corrige la apertura para reflejar mejor τί γὰρ y el español natural: «Porque ¿de qué...?» preserva la fuerza explicativa de γάρ sin el error «¿Porque...?». Se cambia «le sirve» por «le aprovechará» para mantener el futuro de ὠφεληθήσεται y un matiz más cercano a «profit». Se conserva «vida» para ψυχή con nota sobre «alma», y se deja un solo anclaje de nota, suficiente para cubrir ambas ocurrencias como ya indica la nota.'
