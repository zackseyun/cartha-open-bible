review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: Pedro lleva a Jesús aparte, comienza a reprenderlo, lo llama «Señor» y niega enfáticamente que eso vaya a sucederle. Sin embargo, la nota al pie introduce una alternativa en inglés dentro de un texto español, y la cláusula final en español pierde algo de la fuerza enfática de οὐ μὴ ἔσται.'
  spanish_quality_summary: 'El español es claro y natural, pero requiere dos ajustes menores: mover el marcador de nota para no abrir la cita con un corchete innecesario y reemplazar la alternativa inglesa de la nota por formulaciones españolas. También conviene reforzar levemente la negación final para reflejar mejor el énfasis griego sin sonar forzado.'
  glossary_alignment: «Señor» para κύριε está bien alineado con la pauta del proyecto. «Lejos de ti» es una solución defendible para Ἵλεώς σοι y respeta la revisión inglesa que evita añadir «Dios» en el texto principal. «Comenzó a reprenderlo» y «lo tomó aparte» también están bien. El único desajuste terminológico real está en la nota, que no debe conservar una alternativa en inglés.
  issues:
  - severity: medium
    issue: 'La nota al pie contiene una alternativa en inglés: «Far be it from you, Lord».'
    rationale: Las notas deben estar en español y ser útiles para lectores hispanohablantes; mantener una alternativa en inglés rompe la legibilidad y no cumple la finalidad editorial del texto español.
  - severity: medium
    issue: «Esto no te sucederá» atenúa la fuerza enfática de οὐ μὴ con futuro.
    rationale: Aunque es comprensible, el griego expresa una negación especialmente fuerte. «De ningún modo te sucederá» o «jamás te sucederá» reflejan mejor esa fuerza en español contemporáneo.
  - severity: low
    issue: El marcador [a] al inicio de la cita antes de «Lejos» se siente tipográficamente torpe.
    rationale: Es mejor anclar la nota directamente a la frase relevante, por ejemplo «Lejos de ti[a]», para que el flujo de lectura sea más natural y la referencia sea más precisa.
  revised_spanish_text: 'Y Pedro lo tomó aparte y comenzó a reprenderlo, diciendo: «Lejos de ti[a], Señor; esto de ningún modo te sucederá»'
  revised_footnotes:
  - marker: a
    text: 'O: «Eso esté lejos de ti, Señor»; o: «¡Dios no lo quiera, Señor!». La expresión griega es idiomática y elíptica.'
    reason: lexical_alternative
  revision_rationale: Se conserva la buena base del borrador, pero se corrige la nota para que esté íntegramente en español, se ubica mejor el marcador y se refuerza la negación final para reflejar con más fidelidad el énfasis de οὐ μὴ ἔσται. No hace falta adjudicación adicional porque son ajustes editoriales y léxicos menores dentro de un rango ya documentado por el expediente inglés.
