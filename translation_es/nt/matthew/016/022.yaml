translation:
  language: es
  text: 'Y Pedro lo tomó aparte y comenzó a reprenderlo, diciendo: «Lejos de ti[a], Señor; esto de ningún modo te sucederá»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Eso esté lejos de ti, Señor»; o: «¡Dios no lo quiera, Señor!». La expresión griega es idiomática y elíptica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσλαβόμενος
  english_pob_choice: took him aside
  chosen_spanish: lo tomó aparte
  alternatives_spanish:
  - lo tomó
  - lo apartó
  - lo llevó aparte
  lexicon: BDAG
  rationale: El participio medio sugiere una acción de llevar a Jesús a un lado o a solas para hablarle. «Lo tomó aparte» conserva la idea de una interrupción privada sin sobreinterpretar el matiz corporal exacto.
- source_word: ἤρξατο ἐπιτιμᾶν
  english_pob_choice: began to rebuke
  chosen_spanish: comenzó a reprenderlo
  alternatives_spanish:
  - empezó a reprenderlo
  - comenzó a increparlo
  - empezó a censurarlo
  lexicon: BDAG
  rationale: La construcción ingresiva con ἄρχομαι + infinitivo pide un «comenzó a…». ἐπιτιμάω tiene fuerza de reprensión seria; «reprender» es claro, natural y fiel al registro.
- source_word: Ἵλεώς σοι
  english_pob_choice: Far be it from you
  chosen_spanish: Lejos de ti
  alternatives_spanish:
  - ¡Dios no lo quiera!
  - Que Dios te sea propicio
  - Aparta eso de ti
  lexicon: BDAG
  rationale: La expresión es idiomática y elíptica; literalmente apunta a favor/propicio, pero en español «Lejos de ti» reproduce la protesta sin introducir «Dios» que no aparece en el griego. Se conserva la tensión semántica con una nota alternativa.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Soberano
  lexicon: BDAG
  rationale: «Señor» mantiene el valor léxico de κύριος y el tono reverente con que Pedro se dirige a Jesús, además de la resonancia cristológica habitual en los evangelios.
- source_word: οὐ μὴ ἔσται σοι τοῦτο
  english_pob_choice: this will certainly not happen to you
  chosen_spanish: esto no te sucederá
  alternatives_spanish:
  - esto jamás te sucederá
  - esto de ningún modo te sucederá
  - esto no te ocurrirá
  lexicon: BDAG
  rationale: La negación enfática οὐ μὴ con futuro expresa una negación fuerte e insistente. En español, «esto no te sucederá» comunica el sentido con naturalidad; el énfasis se preserva por el contexto y la puntuación, con nota alternativa para la fuerza idiomática.
theological_decisions:
- issue: Cómo traducir la protesta de Pedro sin añadir una formulación no explícita en el griego
  english_pob_reading: Far be it from you, Lord; this will certainly not happen to you.
  chosen_spanish_reading: Lejos de ti, Señor; esto no te sucederá.
  alternative_spanish_readings:
  - ¡Dios no lo quiera, Señor; esto no te sucederá!
  - Aparta eso de ti, Señor; esto no te sucederá.
  rationale: El griego Ἵλεώς σοι es una fórmula idiomática, breve y elíptica. «Lejos de ti» conserva el carácter de protesta y rechazo sin insertar «Dios», que no está en el texto. Se evita también una paráfrasis excesiva que suavice la fuerza de la objeción de Pedro.
  doctrine_reference: Translation philosophy §§1, 3, 6; Contested terms table for κύριος
- issue: Si κύριος debe verterse como término reverencial o como nombre cristológico fijo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor mío
  rationale: En este contexto Pedro se dirige a Jesús con respeto; «Señor» es la equivalencia más estable y fiel, sin necesidad de una perífrasis que cambie el tono del diálogo.
  doctrine_reference: Contested terms table for κύριος
translation_notes:
  revision_awareness: Se ha tenido en cuenta la revisión más reciente del inglés POB, que retrocedió desde una explicación explícita con «God» a la fórmula más idiomática «Far be it from you». Por eso el español evita añadir «Dios» en el texto principal y refleja la idiomaticidad mediante «Lejos de ti», dejando las alternativas en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se usa «Señor» para κύριος, coherente con la terminología cristológica del proyecto.
  - Se conserva el valor fuerte de ἐπιτιμάω con «reprender», no con un verbo más débil como «advertir».
  - La negación enfática se expresa de forma natural en español sin perder el rechazo tajante del griego.
