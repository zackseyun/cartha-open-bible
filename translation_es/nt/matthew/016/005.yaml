translation:
  language: es
  text: Y cuando los discípulos llegaron al otro lado, se habían olvidado de llevar pan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «panes» (plural); aquí se traduce «pan» por naturalidad en español en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  english_pob_choice: when ... came
  chosen_spanish: cuando ... llegaron
  alternatives_spanish:
  - habiendo llegado
  - después de llegar
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente en español natural con «cuando», preservando la relación con la acción principal sin forzar una construcción participial pesada.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: En los Evangelios μαθηταί designa de forma estable a los discípulos de Jesús; «discípulos» es el equivalente español natural y contextual.
- source_word: εἰς τὸ πέραν
  english_pob_choice: to the other side
  chosen_spanish: al otro lado
  alternatives_spanish:
  - al lado opuesto
  - a la otra orilla
  lexicon: BDAG
  rationale: La expresión es idiomática en el contexto narrativo del cruce; «al otro lado» comunica con naturalidad la idea espacial sin añadir precisión geográfica no explícita en el verso.
- source_word: ἐπελάθοντο
  english_pob_choice: they had forgotten
  chosen_spanish: se habían olvidado
  alternatives_spanish:
  - olvidaron
  - habían olvidado
  lexicon: BDAG
  rationale: El verbo medio de olvidar se expresa naturalmente con «se habían olvidado», manteniendo el valor anterior a la acción narrativa principal que el inglés POB captó con un pluscuamperfecto.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: panes
  alternatives_spanish:
  - pan
  - hogazas
  lexicon: BDAG
  rationale: El griego está en plural («loaves/breads»). Aquí se conserva el plural con «panes» para no nivelar la pluralidad del original; aunque «pan» sería más idiomático en español, el plural mantiene mejor la forma de la fuente.
- source_word: λαβεῖν
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - llevar
  - traer
  lexicon: BDAG
  rationale: El infinitivo complementario expresa la acción de llevar consigo provisiones; «tomar» refleja con fidelidad el valor básico de λαβεῖν y funciona bien en español.
translation_notes:
  revision_awareness: Revisado frente al texto griego SBLGNT y al rastro de auditoría en inglés POB. Se mantuvo la equivalencia óptima del inglés donde no afectaba la forma del original, pero se recuperó el plural de ἄρτους en español («panes») para mayor transparencia fuente-centrada.
  spanish_consistency_notes:
  - Se usa «discípulos» para μαθηταί según el uso técnico del Evangelio.
  - Se conserva «al otro lado» como giro idiomático y textual, sin introducir una localización más específica que la del griego.
  - Se optó por el pluscuamperfecto «se habían olvidado» para reflejar la anterioridad narrativa de ἐπελάθοντο.
