translation:
  language: es
  text: 'Pero él, volviéndose, dijo a Pedro: «¡Ve detrás de mí, Satanás![a] Eres para mí una piedra de tropiezo, porque no piensas en las cosas de Dios[b], sino en las de los hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «¡Ponte detrás de mí, Satanás!»
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «las de los hombres»; es decir, asuntos meramente humanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turned
  chosen_spanish: volviéndose
  alternatives_spanish:
  - se volvió
  - volvió
  lexicon: BDAG
  rationale: El participio aoristo expresa un cambio de orientación antes de hablar. «Volviéndose» mantiene la secuencia narrativa y suena natural en español sin perder el movimiento físico.
- source_word: Ὕπαγε ὀπίσω μου
  english_pob_choice: Go behind me
  chosen_spanish: ¡Apártate de mí!
  alternatives_spanish:
  - ¡Vete detrás de mí!
  - ¡Ponte detrás de mí!
  - ¡Sígueme detrás de mí!
  lexicon: BDAG
  rationale: La expresión es idiomática y la tradición española la vierte de modo imperativo fuerte. «Apártate de mí» preserva la reprensión y comunica bien la idea de alejarse de Jesús; una nota puede conservar la alternativa más literal del griego.
- source_word: Σατανᾶ
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satán
  lexicon: BDAG
  rationale: Aquí funciona como vocativo propio/título. «Satanás» es la forma más reconocible en español bíblico y conserva la fuerza de la reprensión sin reinterpretarlo como simple «adversario».
- source_word: σκάνδαλον
  english_pob_choice: stumbling block
  chosen_spanish: un obstáculo
  alternatives_spanish:
  - una piedra de tropiezo
  - un tropiezo
  - un lazo
  lexicon: BDAG
  rationale: La metáfora apunta a algo que estorba o hace tropezar. «Un obstáculo» es natural en español y mantiene el sentido obstructivo; «piedra de tropiezo» sería más literal, pero menos fluido en un uso directo de reprensión.
- source_word: ἐμοῦ
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - respecto de mí
  lexicon: BDAG
  rationale: 'Con σκάνδαλον, el genitivo se expresa naturalmente en español con dativo de afectación: «me eres un obstáculo». Evita una construcción artificial y conserva la relación personal con Jesús.'
- source_word: φρονεῖς
  english_pob_choice: are setting your mind on
  chosen_spanish: no piensas en
  alternatives_spanish:
  - no tienes en mente
  - no te ocupas de
  - no estás pensando en
  lexicon: BDAG
  rationale: φρονέω aquí denota orientación mental y de valores, no un pensamiento pasajero. «No piensas en» comunica esa disposición en español de manera clara y sobria, sin añadir demasiado.
- source_word: τὰ τοῦ θεοῦ
  english_pob_choice: the things of God
  chosen_spanish: las cosas de Dios
  alternatives_spanish:
  - los asuntos de Dios
  - los intereses de Dios
  - las cosas que son de Dios
  lexicon: BDAG
  rationale: La expresión plural sustantivada se mantiene bastante literal para preservar el contraste. «Las cosas de Dios» es transparente y sigue de cerca el griego sin volverlo demasiado abstracto.
- source_word: τὰ τῶν ἀνθρώπων
  english_pob_choice: the things of men
  chosen_spanish: las de los hombres
  alternatives_spanish:
  - las cosas de los hombres
  - las cosas humanas
  - las de la gente
  lexicon: BDAG
  rationale: Se conserva el contraste breve del griego con el posesivo sustantivado «las de los hombres». El sustantivo masculino plural refleja la forma griega y mantiene el paralelismo con «las cosas de Dios».
theological_decisions:
- issue: Fuerza de la reprensión «Satanás» dirigida a Pedro
  english_pob_reading: Jesus directly rebukes Peter with the designation 'Satan' without requiring the translation to specify whether Peter is being identified with Satan himself or acting as Satan's adversarial instrument.
  chosen_spanish_reading: Jesús reprende directamente a Pedro con «Satanás» sin resolver en la traducción si lo identifica con Satanás mismo o si lo trata como instrumento de oposición.
  alternative_spanish_readings:
  - Jesús llama a Pedro «adversario»
  - Jesús se dirige a Satanás que obra por medio de Pedro
  rationale: La traducción debe conservar la dureza y la ambigüedad del texto griego. Mantener «Satanás» preserva la resonancia canónica y evita cerrar una interpretación que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Renderizado de ἀνθρώπων
  english_pob_reading: Render as 'men' in the main text with an explanatory footnote.
  chosen_spanish_reading: Renderizar con «los hombres» en el texto principal, manteniendo el contraste representativo con Dios.
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  - la gente
  rationale: El griego usa el plural masculino ἀνθρώπων en un contraste deliberado con Dios. «Los hombres» conserva la forma y el paralelismo; una nota puede explicar que el sentido es humano/representativo sin borrar el dato léxico.
  doctrine_reference: Precisión de género según la forma del original, con nota explicativa cuando ayuda a la comprensión.
translation_notes:
  revision_awareness: El pasaje fue revisado en el último pase y quedó sin cambios, con alta concordancia general y solo observaciones menores. La redacción española sigue el griego con equivalencia óptima, manteniendo la reprensión directa, la metáfora de obstáculo y el contraste entre las cosas de Dios y las de los hombres.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Satanás» para Σατανᾶ, en línea con las terminologías base del proyecto.
  - «Las cosas de Dios» y «las de los hombres» conservan el paralelismo del griego sin suavizar la oposición conceptual.
  - El tono es bíblico y sobrio, pero evita arcaísmos innecesarios salvo donde la reprensión exige fuerza idiomática.
