revisions:
- from: 'Pero él, volviéndose, dijo a Pedro: «¡Apártate de mí, Satanás! Me eres[a] un obstáculo, porque no piensas en las cosas de Dios[b], sino en las de los hombres».'
  to: 'Pero él, volviéndose, dijo a Pedro: «¡Ve detrás de mí, Satanás![a] Eres para mí una piedra de tropiezo, porque no piensas en las cosas de Dios[b], sino en las de los hombres».'
  rationale: Se corrige la orden inicial para reflejar fielmente Ὕπαγε ὀπίσω μου con su sentido espacial («detrás de mí») y se reemplaza la nota [a] por la alternativa tradicional pertinente. También se fortalece σκάνδαλον con «piedra de tropiezo», que preserva mejor la metáfora del original sin dejar de ser comprensible en español eclesial amplio.
