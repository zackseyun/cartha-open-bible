translation:
  language: es
  text: Entonces les ordenó firmemente[a] a los discípulos que no le dijeran a nadie que él es el Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «les dio instrucciones estrictas». La expresión intenta reflejar la fuerza del verbo griego διαστέλλομαι.
    reason: lexical_alternative
  - marker: b
    text: O, «el Cristo». Χριστός es un título; aquí se traduce como «Mesías» para conservar su sentido.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces, en ese momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es la equivalencia natural y concisa en español.
- source_word: διεστείλατο
  english_pob_choice: strictly instructed
  chosen_spanish: dio una instrucción estricta
  alternatives_spanish:
  - les ordenó estrictamente
  - les mandó con firmeza
  - les dio una orden
  lexicon: BDAG
  rationale: El verbo medio expresa una prohibición/mandato enfático. «Dio una instrucción estricta» conserva la fuerza directiva sin volver el español innecesariamente áspero.
- source_word: τοῖς μαθηταῖς
  english_pob_choice: the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  - a los discípulos
  lexicon: BDAG
  rationale: El grupo está definido por el contexto; en español, el dativo se expresa naturalmente con «a». No es necesario añadir «sus» para la claridad.
- source_word: ἵνα μηδενὶ εἴπωσιν
  english_pob_choice: to tell no one
  chosen_spanish: para que no dijeran a nadie
  alternatives_spanish:
  - para no decir a nadie
  - que no le dijeran a nadie
  lexicon: BDAG
  rationale: La cláusula con ἵνα + subjuntivo expresa finalidad/prohibición. «Para que no dijeran a nadie» mantiene la estructura y el matiz de mandato.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que él
  - cómo
  lexicon: BDAG
  rationale: Introduce el contenido de lo que no debían decir.
- source_word: αὐτός ἐστιν
  english_pob_choice: he is
  chosen_spanish: él era
  alternatives_spanish:
  - él es
  - él mismo era
  lexicon: BDAG
  rationale: En español, el discurso indirecto tras un verbo en pasado suele acomodarse a la concordancia temporal con «era». El sentido referencial sigue siendo presente en el discurso reportado.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título. Siguiendo la decisión auditada del POB en inglés, «Mesías» preserva el sentido titulado y evita un simple transliteração litúrgica.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: El contexto identifica a Jesús con el título mesiánico reconocido. Traducirlo como «Mesías» conserva su valor semántico e intertextual en español.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve messianic sense of Χριστός'
translation_notes:
  revision_awareness: Coincide con el último paso de revisión del POB en inglés, que permaneció sin cambios y fue aprobado con alta concordancia. No se detectan revisiones adicionales necesarias para esta sección.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός, conforme al criterio del proyecto para títulos mesiánicos.
  - Se usa una concordancia natural de pasado en el discurso indirecto español («él era») para reflejar el contenido reportado sin alterar la referencia.
  - La puntuación y el orden de la cláusula respetan el flujo narrativo breve del griego.
