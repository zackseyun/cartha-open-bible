translation:
  language: es
  text: 'Y por la mañana[a]: «Hoy habrá mal tiempo, porque el cielo está rojo y sombrío. Ustedes saben discernir la apariencia[b] del cielo, pero no pueden discernir las señales de los tiempos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la mañana».
    reason: lexical_alternative
  - marker: b
    text: O «el rostro del cielo».
    reason: lexical_alternative
  - marker: c
    text: «Las señales de los tiempos» puede referirse más específicamente al carácter espiritualmente significativo del momento presente, incluidas las obras mesiánicas de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: πρωΐ
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - por la mañana temprano
  lexicon: BDAG
  rationale: Es un adverbio temporal; «por la mañana» suena natural en español y conserva la marca temporal del enunciado meteorológico.
- source_word: χειμών
  english_pob_choice: stormy weather
  chosen_spanish: tempestad
  alternatives_spanish:
  - tiempo tormentoso
  - mal tiempo
  - inviernos
  lexicon: BDAG
  rationale: Aquí el término apunta al estado del clima, no a la estación «invierno». «Tempestad» comunica con fuerza la idea de mal tiempo/tormenta, sin reducirla al calendario.
- source_word: πυρράζει
  english_pob_choice: is red
  chosen_spanish: enrojece
  alternatives_spanish:
  - es rojo
  - se pone rojo
  - arde rojizo
  lexicon: BDAG
  rationale: El verbo describe un aspecto rojizo del cielo; «enrojece» conserva el movimiento visual y suena natural en español.
- source_word: στυγνάζων
  english_pob_choice: overcast
  chosen_spanish: se muestra sombrío
  alternatives_spanish:
  - nublado
  - oscuro
  - amenazante
  lexicon: BDAG
  rationale: El participio describe un cielo sombrío o amenazante. «Se muestra sombrío» mantiene el valor descriptivo sin perder la resonancia meteorológica.
- source_word: πρόσωπον
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - rostro
  - faz
  lexicon: BDAG
  rationale: Aunque literalmente es «rostro/faz», en esta expresión se refiere al aspecto visible del cielo. «Apariencia» expresa bien el sentido idiomático.
- source_word: γινώσκετε διακρίνειν
  english_pob_choice: know how to discern
  chosen_spanish: saben discernir
  alternatives_spanish:
  - saben interpretar
  - pueden distinguir
  - saben reconocer
  lexicon: BDAG
  rationale: La construcción expresa capacidad adquirida. En español, «saben discernir» reproduce tanto el conocimiento como la habilidad evaluativa.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - indicios
  - portentos
  lexicon: BDAG
  rationale: «Señales» es claro y fiel al campo semántico de σημεῖα; además encaja con el uso de Mateo para hechos reveladores y evidenciales.
- source_word: καιρῶν
  english_pob_choice: of the times
  chosen_spanish: de los tiempos
  alternatives_spanish:
  - de los momentos
  - de las épocas
  - de los tiempos señalados
  lexicon: BDAG
  rationale: καιρός aquí apunta a tiempos significativos o decisivos, no a estaciones climáticas. «De los tiempos» conserva esa amplitud sin cerrarla demasiado.
- source_word: δύνασθε
  english_pob_choice: you are not able to discern
  chosen_spanish: no pueden discernir
  alternatives_spanish:
  - no pueden interpretar
  - no son capaces de discernir
  lexicon: BDAG
  rationale: El verbo expresa incapacidad. Repetir «discernir» mantiene el contraste con la cláusula anterior y evita perder la conexión verbal.
theological_decisions:
- issue: Sentido de «las señales de los tiempos»
  english_pob_reading: Retain the phrase without narrowing it to specifically eschatological signs alone.
  chosen_spanish_reading: Conservar «las señales de los tiempos» sin reducirla solo a un sentido escatológico.
  alternative_spanish_readings:
  - las señales de estos tiempos presentes
  - las señales mesiánicas de la era
  - los signos del tiempo final
  rationale: El griego permite una referencia amplia al significado espiritual del momento presente, incluyendo la obra mesiánica de Jesús y también posibles resonancias escatológicas. La traducción conserva esa tensión en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego SBLGNT y el criterio auditado de la POB inglesa: mantener la imagen meteorológica, conservar la repetición de «discernir» y no estrechar «las señales de los tiempos» a una sola lectura.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefiere «señales» para σημεῖα, en continuidad con la POB inglesa y con el registro bíblico natural en español.
  - «Discernir» se repite en ambas cláusulas para preservar el contraste argumentativo del texto.
  - La puntuación conserva la separación retórica de la comparación meteorológica y la reprensión final.
