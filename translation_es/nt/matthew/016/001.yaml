review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: llegada de fariseos y saduceos, participio adversativo/hostil πειράζοντες, petición de una señal del cielo. Sin embargo, «acercándose» suena menos natural aquí que una forma finita coordinada, y «probándolo» en español moderno puede sonar físico o ambiguo, mientras que «poniéndolo a prueba» preserva mejor el valor de πειράζοντες y la nota léxica del inglés.'
  spanish_quality_summary: La redacción es comprensible, pero puede mejorarse en fluidez y naturalidad bíblica moderna. «Y se acercaron los fariseos y saduceos» suena más idiomático que «Y acercándose...». «Poniéndolo a prueba» comunica mejor la intención hostil sin sobreinterpretar. El resto del verso es claro y digno.
  glossary_alignment: No hay términos del glosario mayor en conflicto. Los nombres de grupo («fariseos», «saduceos») y «señal» están bien. La revisión propuesta mantiene la decisión auditada de no intensificar πειράζοντες a «tratando de atraparlo», pero evita la ambigüedad de «probándolo».
  issues:
  - severity: medium
    issue: «acercándose» como arranque de la oración
    rationale: 'Aunque corresponde formalmente a προσελθόντες, en español narrativo bíblico suena más natural y claro resolverlo como verbo finito coordinado: «se acercaron». Esto conserva la secuencia de acción sin rigidez participial.'
  - severity: medium
    issue: «probándolo» para πειράζοντες
    rationale: «Probar» en español puede sugerir ensayo, degustación o comprobación neutral, y aquí no transmite con suficiente claridad el matiz hostil de poner a alguien a prueba. «Poniéndolo a prueba» preserva mejor el sentido lexical auditado de 'testing him'.
  - severity: low
    issue: Falta la nota de alternativa léxica preservada en el inglés
    rationale: El English POB conserva alternativas para πειράζοντες ('tempting him' / 'trying to trap him'). Conviene mantener una nota en español para reflejar ese abanico semántico sin cargar el texto principal.
  revised_spanish_text: Y se acercaron los fariseos y saduceos y, poniéndolo a prueba[a], le pidieron que les mostrara una señal del cielo.
  revised_footnotes:
  - marker: a
    text: O «tentándolo» o «tratando de atraparlo».
    reason: lexical_alternative
