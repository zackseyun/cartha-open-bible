revisions:
- from: Y acercándose los fariseos y saduceos, probándolo, le pidieron que les mostrara una señal del cielo.
  to: Y se acercaron los fariseos y saduceos y, poniéndolo a prueba[a], le pidieron que les mostrara una señal del cielo.
  rationale: Se ajusta la sintaxis inicial a un español más natural y se reemplaza «probándolo» por «poniéndolo a prueba» para reflejar mejor πειράζοντες según la auditoría inglesa, manteniendo el matiz hostil sin sobreinterpretarlo. Se añade la nota léxica alternativa correspondiente.
