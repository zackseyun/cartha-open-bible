translation:
  language: es
  text: Y se acercaron los fariseos y saduceos y, poniéndolo a prueba[a], le pidieron que les mostrara una señal del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tentándolo» o «tratando de atraparlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: came
  chosen_spanish: acercándose
  alternatives_spanish:
  - vinieron
  - se acercaron
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa al verbo principal. En español, «acercándose» conserva bien la secuencia y suena natural en una narración fluida.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - Fariseos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado de forma estándar al español bíblico.
- source_word: Σαδδουκαῖοι
  english_pob_choice: Sadducees
  chosen_spanish: saduceos
  alternatives_spanish:
  - Saduceos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado de forma estándar al español bíblico.
- source_word: πειράζοντες
  english_pob_choice: testing
  chosen_spanish: probándolo
  alternatives_spanish:
  - tentándolo
  - tratando de atraparlo
  lexicon: BDAG
  rationale: «Probándolo» mantiene el sentido básico de πειράζω sin añadir una interpretación más fuerte que el griego no exige por sí mismo. En contexto, conserva la tensión hostil.
- source_word: ἐπηρώτησαν
  english_pob_choice: asked
  chosen_spanish: le pidieron
  alternatives_spanish:
  - le preguntaron
  - le cuestionaron
  lexicon: BDAG
  rationale: En esta construcción con infinitivo de complemento, «le pidieron» comunica con naturalidad la petición de mostrar una señal. «Preguntaron» es posible, pero suena menos preciso con ἐπιδεῖξαι.
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una señal milagrosa
  lexicon: BDAG
  rationale: «Señal» corresponde bien a σημεῖον y preserva la forma simple del texto. «Milagrosa» sería explicativa y excede el griego.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - del firmamento
  lexicon: BDAG
  rationale: «Del cielo» es la forma española más natural para expresar origen celeste y corresponde a la frase idiomática del original.
- source_word: ἐπιδεῖξαι
  english_pob_choice: to show
  chosen_spanish: mostrara
  alternatives_spanish:
  - enseñara
  - demostrara
  lexicon: BDAG
  rationale: Tras «pidieron que», el subjuntivo «mostrara» expresa correctamente la acción solicitada. «Mostrar» es el contenido directo de ἐπιδείκνυμι.
theological_decisions:
- issue: Matiz hostil de πειράζοντες
  english_pob_reading: Render as 'testing him' rather than a more neutral 'asking' or a more interpretive 'trying to trap him.'
  chosen_spanish_reading: «probándolo» en vez de suavizar la intención o convertirla abiertamente en «tratando de atraparlo».
  alternative_spanish_readings:
  - tentándolo
  - tratando de atraparlo
  - poniéndolo a prueba
  rationale: La traducción conserva la tensión adversarial sin resolverla por interpretación. «Probándolo» deja al lector percibir la hostilidad del contexto, pero no añade más de lo que el participio griego dice de manera explícita.
  doctrine_reference: Preservar la tensión teológica y narrativa sin sobreinterpretar.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; esta versión no incluye notas, porque el texto español no usa marcador alguno.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y claro, sin calcos innecesarios.
  - «Del cielo» conserva la referencia espacial/origenal de ἐκ τοῦ οὐρανοῦ.
  - «Señal» y no «signo milagroso» preserva la sobriedad del griego.
  - La estructura verbal española reproduce la relación entre el participio inicial y el verbo principal.
