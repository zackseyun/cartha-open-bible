review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura general: transición temática («περὶ δὲ»), «resurrección de los muertos», pregunta retórica «¿no han leído...?», y la agencia divina «por Dios». Sin embargo, «cuando dijo» no refleja bien λέγοντος, que introduce la cita siguiente con valor de participio concomitante («diciendo» / «que dice»), no una cláusula temporal. Además, la nota alternativa conserva el mismo problema.'
  spanish_quality_summary: El español es claro y digno, pero «lo que les fue dicho por Dios, cuando dijo» suena algo pesado y menos natural que «lo que Dios les dijo» o «lo que les fue dicho por Dios, diciendo». Para mantener la pasiva del POB y la naturalidad en español, conviene ajustar solo la cola introductoria de la cita.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «resurrección» y «muertos» están bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La revisión propuesta preserva la decisión teológica documentada de mantener tanto la autoría divina como la dirección del mensaje a los oyentes.
  issues:
  - severity: medium
    issue: «cuando dijo» para λέγοντος
    rationale: λέγοντος es un participio presente que introduce la cita inmediata; «cuando dijo» lo convierte en una circunstancia temporal y no reproduce bien la relación sintáctica ni el flujo del original.
  - severity: low
    issue: La nota alternativa repite la misma dificultad
    rationale: «lo que Dios les dijo, cuando dijo» tampoco mejora la representación de λέγοντος; la alternativa auditada en inglés corresponde mejor a «lo que Dios les dijo, diciendo» o simplemente «lo que Dios les dijo».
  revised_spanish_text: 'Ahora bien, en cuanto a la resurrección de los muertos, ¿no han leído lo que les fue dicho por Dios, diciendo[a]:'
  revised_footnotes:
  - marker: a
    text: 'O: «¿no han leído lo que Dios les dijo:»'
    reason: alternative_reading
  revision_rationale: Se corrige «cuando dijo» a «diciendo» para reflejar con más fidelidad el participio λέγοντος como introductor de la cita siguiente, sin cambiar la decisión principal de conservar la pasiva («lo que les fue dicho por Dios»). También se ajusta la nota alternativa para que coincida con la alternativa léxica documentada en inglés y con un español natural.
