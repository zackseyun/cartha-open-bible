revisions:
- from: Ahora bien, en cuanto a la resurrección de los muertos, ¿no han leído lo que les fue dicho por Dios, cuando dijo[a]?
  to: 'Ahora bien, en cuanto a la resurrección de los muertos, ¿no han leído lo que les fue dicho por Dios, diciendo[a]:'
  rationale: Se corrige «cuando dijo» a «diciendo» para reflejar con más fidelidad el participio λέγοντος como introductor de la cita siguiente, sin cambiar la decisión principal de conservar la pasiva («lo que les fue dicho por Dios»). También se ajusta la nota alternativa para que coincida con la alternativa léxica documentada en inglés y con un español natural.
