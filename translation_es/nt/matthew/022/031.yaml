translation:
  language: es
  text: 'Ahora bien, en cuanto a la resurrección de los muertos, ¿no han leído lo que les fue dicho por Dios, diciendo[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿no han leído lo que Dios les dijo:»'
    reason: alternative_reading
lexical_decisions:
- source_word: περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Ahora bien, en cuanto a
  alternatives_spanish:
  - Pero en cuanto a
  - Y en cuanto a
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema en discusión; δέ marca transición. «Ahora bien, en cuanto a» comunica bien el cambio de tema con un tono natural en español sin forzar una oposición más fuerte que la del griego.
- source_word: ἀναστάσεως
  english_pob_choice: resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - levantamiento
  - alzamiento
  - subida
  lexicon: BDAG
  rationale: En este contexto se trata de la resurrección corporal debatida por los saduceos. «Resurrección» es el término normal y preciso en español cristiano y refleja el sentido técnico del pasaje.
- source_word: τῶν νεκρῶν
  english_pob_choice: of the dead
  chosen_spanish: de los muertos
  alternatives_spanish:
  - de los fallecidos
  - de entre los muertos
  lexicon: BDAG
  rationale: El genitivo identifica a los muertos como la clase relacionada con la resurrección. «De los muertos» reproduce con naturalidad la estructura del griego y evita adelantar la formulación idiomática «de entre los muertos» que no está en esta cláusula.
- source_word: οὐκ ἀνέγνωτε
  english_pob_choice: have you not read
  chosen_spanish: ¿no han leído
  alternatives_spanish:
  - ¿no han leído ustedes?
  - ¿no leyeron?
  lexicon: BDAG
  rationale: La pregunta retórica de Jesús interpela a sus oyentes sobre su conocimiento de la Escritura. «¿No han leído?» transmite bien la fuerza acusatoria y el registro natural del español actual; el presente perfecto funciona adecuadamente para una lectura continuada de la Escritura.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo que les fue dicho
  alternatives_spanish:
  - lo dicho
  - lo que fue hablado
  lexicon: BDAG
  rationale: El participio pasivo sustantivado pide un sustantivo neutro. «Lo que les fue dicho» conserva el pasivo y el carácter de palabra dirigida, sin sonar forzado en español.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo funciona como destinatario del dicho. En español, el clítico indirecto plural mantiene la referencia a los oyentes con economía y naturalidad dentro de la oración.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de parte de Dios
  - por el Dios
  lexicon: BDAG
  rationale: ὑπό con genitivo expresa agente. «Por Dios» es la forma española normal para marcar agencia, conservando la afirmación de que Dios es quien habla.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: cuando dijo
  alternatives_spanish:
  - diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio presente introduce la cita que sigue. «Cuando dijo» integra con naturalidad la cita en español y conserva la conexión con el discurso divino sin añadir contenido.
theological_decisions:
- issue: Divina autoría y dirección de la Escritura
  english_pob_reading: what was spoken to you by God
  chosen_spanish_reading: lo que les fue dicho por Dios
  alternative_spanish_readings:
  - lo que Dios les dijo
  - lo que fue dicho por Dios
  rationale: 'La formulación mantiene dos elementos del griego: la Escritura como palabra procedente de Dios y como palabra dirigida a los oyentes. «Les fue dicho por Dios» preserva la voz pasiva sin convertirla en una simple paráfrasis activa.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alta concordancia; no se detectaron revisiones aplicadas. La versión española sigue la misma línea de lectura, conservando la transición discursiva, la referencia a la resurrección, la interpelación retórica y la agencia divina.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «resurrección» por el valor técnico del término en este contexto.
  - Se evita «SEÑOR» o una paráfrasis eclesiástica donde el griego dice explícitamente «Dios».
  - El marcador de nota [a] está anclado en la cláusula final para reflejar la alternativa lexical del participio y del encadenamiento de la cita.
