translation:
  language: es
  text: Y envió a sus siervos[a] a llamar a los que habían sido invitados[b] al banquete de bodas[c], pero no quisieron venir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «esclavos». El término griego puede denotar tanto esclavos como siervos; aquí se eligió «siervos» porque la parábola enfatiza su función como agentes del rey más que su condición servil.
    reason: lexical_alternative
  - marker: b
    text: O, «a los llamados». El griego repite la misma familia verbal que «a llamar», pero en este contexto se refiere a personas ya invitadas.
    reason: lexical_alternative
  - marker: c
    text: O, «al banquete nupcial».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω se expresa de manera natural y precisa con "envió". "Mandó" desplaza el foco hacia la orden más que hacia el acto de envío, y "despachó" resulta menos idiomático en español bíblico contemporáneo.
- source_word: δούλους
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: BDAG
  rationale: La POB inglesa documenta la alternativa lexical 'slaves' para δοῦλος. Dado que el texto griego usa δούλους y no un término más neutro, "esclavos" conserva la fuerza lexical primaria. En esta parábola, aun cuando la función narrativa sea la de mensajeros del rey, el término de base sigue siendo el mismo y no conviene suavizarlo sin razón textual.
- source_word: καλέσαι
  english_pob_choice: to call
  chosen_spanish: a llamar
  alternatives_spanish:
  - a invitar
  - a convocar
  lexicon: BDAG
  rationale: Se mantiene la raíz semántica de καλέω con "llamar" para conservar la relación verbal con κεκλημένους. "Invitar" sería más fluido, pero atenúa la repetición explícita del griego.
- source_word: κεκλημένους
  english_pob_choice: those who had been invited
  chosen_spanish: a los que habían sido invitados
  alternatives_spanish:
  - a los llamados
  - a los invitados
  lexicon: BDAG
  rationale: El participio perfecto pasivo comunica una invitación ya realizada antes de la acción del envío. "Habían sido invitados" expresa con claridad ese estado previo. "Los llamados" sería más literal, pero en el contexto del banquete puede sonar menos transparente en español.
- source_word: εἰς τοὺς γάμους
  english_pob_choice: to the wedding feast
  chosen_spanish: al banquete de bodas
  alternatives_spanish:
  - a la fiesta de bodas
  - a las bodas
  lexicon: BDAG
  rationale: En este contexto, γάμοι se refiere a la celebración nupcial, no solo al acto matrimonial. "Banquete de bodas" conserva el sentido festivo y la imagen narrativa. Se eligió "al" por exigencia gramatical del español.
- source_word: οὐκ ἤθελον ἐλθεῖν
  english_pob_choice: they were unwilling to come
  chosen_spanish: no quisieron venir
  alternatives_spanish:
  - no estaban dispuestos a venir
  - no quisieron ir
  lexicon: BDAG
  rationale: La construcción con θέλω + infinitivo expresa voluntad. "No quisieron venir" comunica de forma natural la negativa de voluntad, sin añadir una inferencia más fuerte como "se negaron".
theological_decisions:
- issue: δοῦλος en una parábola con emisarios reales
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  rationale: Aunque la función narrativa sea la de agentes del rey, el griego usa δοῦλοι. La POB inglesa optó por 'servants' por razones de estilo y contexto, pero en español "esclavos" preserva mejor la tensión lexical sin ocultarla con un término más ameno. Esto mantiene abierta la discusión semántica donde el texto la permite.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Repetición de la raíz καλέω en llamar / invitados
  english_pob_reading: to call / had been invited
  chosen_spanish_reading: a llamar / habían sido invitados
  alternative_spanish_readings:
  - a invitar / habían sido invitados
  - a llamar / los llamados
  rationale: Se conserva la relación formal entre los dos miembros de la frase para no perder el eco lexical del griego. Traducir ambos con vocabulario distinto debilitaría la conexión intencional entre la acción de enviar 'a llamar' y los ya 'invitados'.
  doctrine_reference: Principio de correspondencia lexical de la POB; Matthew 22:3 audit trail
translation_notes:
  revision_awareness: El registro inglés más reciente no introdujo cambios y el cotejo de revisión informó alto acuerdo (1.0). Esta versión española sigue ese estado estable, pero ajusta la decisión de δοῦλος al criterio lexical del griego y mantiene la repetición de καλέω de forma visible en español.
  spanish_consistency_notes:
  - Se conserva el paralelismo entre 'a llamar' y 'habían sido invitados' para reflejar καλέω/κεκλημένους.
  - Se usa 'banquete de bodas' como equivalente idiomático de γάμοι en este contexto.
  - Se evita 'SEÑOR' o máscaras devocionales porque el versículo no contiene κύριος/יהוה.
  - La puntuación y el orden siguen una sintaxis natural en español sin añadir contenido interpretativo.
