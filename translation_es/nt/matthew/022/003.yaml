base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/003.yaml
  text: And he sent his servants to call those who had been invited to the wedding feast[c][b][a], and they were unwilling to come.
  footnotes:
  - marker: a
    text: Or, 'slaves.' The Greek word can denote either servants or slaves; here 'servants' was chosen because the parable emphasizes their role as the king's agents rather than their bonded status.
    reason: lexical_alternative
  - marker: b
    text: Or, 'those who had been called.' The Greek repeats the same verb family as 'to call,' but in this context it refers to those already invited.
    reason: lexical_alternative
  - marker: c
    text: Or, 'to the wedding banquet.'
    reason: lexical_alternative
