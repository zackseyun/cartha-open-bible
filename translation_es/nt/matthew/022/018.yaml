translation:
  language: es
  text: 'Pero Jesús[a], al conocer la mala intención de ellos, dijo: «¿Por qué me ponen a prueba[b], hipócritas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su malicia» o «su perversidad».
    reason: lexical_alternative
  - marker: b
    text: O «me tientan». El verbo griego puede significar «probar», «poner a prueba» o «tentar», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  english_pob_choice: knowing
  chosen_spanish: al conocer
  alternatives_spanish:
  - sabiendo
  - al darse cuenta de
  - al percibir
  lexicon: γινώσκω
  rationale: El participio aoristo expresa una acción circunstancial anterior al verbo principal. «Al conocer» conserva esa relación temporal y la conciencia de Jesús sobre la intención de ellos sin sonar forzado en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: δέ
  rationale: Aquí δέ introduce contraste suave frente a la maniobra de sus interlocutores. «Pero» comunica bien la transición adversativa en español.
- source_word: πονηρίαν
  english_pob_choice: evil intent
  chosen_spanish: mala intención
  alternatives_spanish:
  - malicia
  - maldad
  - intención perversa
  lexicon: πονηρία
  rationale: En este contexto no se trata solo de maldad abstracta, sino de la intención hostil detrás de la pregunta. «Mala intención» preserva ese matiz contextual de manera natural y transparente.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - respondió
  lexicon: λέγω
  rationale: El aoristo narrativo de λέγω se vierte de forma estándar como «dijo». Es la opción más directa y sobria en español bíblico contemporáneo.
- source_word: Τί με πειράζετε
  english_pob_choice: Why are you testing me
  chosen_spanish: ¿Por qué me ponen a prueba
  alternatives_spanish:
  - ¿Por qué me prueban?
  - ¿Por qué me tientan?
  - ¿Para qué me ponen a prueba?
  lexicon: πειράζω
  rationale: πειράζω puede significar probar, poner a prueba o tentar. En el contexto de una trampa, «ponen a prueba» conserva la idea de examen hostil sin reducirlo solo a tentación moral. Se mantiene además el presente progresivo natural en español.
- source_word: ὑποκριταί
  english_pob_choice: hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - pretendedores
  - actores
  lexicon: ὑποκριτής
  rationale: «Hipócritas» es el equivalente establecido y fiel. Conserva el valor de personas que fingen sinceridad mientras ocultan su intención real.
theological_decisions:
- issue: Jesús discierne la intención interna de sus opositores
  english_pob_reading: Jesus is described as knowing their evil intent.
  chosen_spanish_reading: Jesús es presentado como quien conoce la mala intención de ellos antes de responder.
  alternative_spanish_readings:
  - Jesús percibió su maldad
  - Jesús supo de su malicia
  rationale: 'La traducción preserva la afirmación del texto sin ampliarla doctrinalmente: Jesús no solo oye la pregunta, sino que discierne la intención hostil detrás de ella. «Mala intención» mantiene el enfoque en el motivo, como en el audit trail en inglés.'
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Valor de πειράζω en un contexto de confrontación
  english_pob_reading: Why are you testing me?
  chosen_spanish_reading: ¿Por qué me ponen a prueba?
  alternative_spanish_readings:
  - ¿Por qué me tientan?
  - ¿Por qué me prueban?
  rationale: El contexto favorece el sentido de intento de prueba o trampa. «Poner a prueba» refleja el carácter adversativo de la interacción sin importar una lectura exclusivamente moralizante de tentación.
  doctrine_reference: 'BDAG; Translation philosophy #1'
translation_notes:
  revision_awareness: 'Se alineó la redacción con el pasaje griego y con el audit trail en inglés: δὲ como contraste leve, πονηρίαν como intención hostil contextual, y πειράζω como «poner a prueba» en vez de una traducción puramente mecánica. No se detectaron revisiones previas que exigieran ajuste.'
  spanish_consistency_notes:
  - Se usó «hipócritas» como término estable en vez de una paráfrasis.
  - Se mantuvo «Jesús» sin adaptación litúrgica adicional.
  - Se evitó «SEÑOR» porque el texto no contiene el nombre divino ni κύριος en esta cláusula.
  - La puntuación en estilo bíblico español conserva el discurso directo con comillas angulares.
  - La elección «mala intención» busca ser transparente y naturalmente comprensible para lectores eclesiales amplios.
