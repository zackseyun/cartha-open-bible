revisions:
- from: Esta es la gran y primera[a] mandamiento.
  to: Este es el gran y primer mandamiento[a].
  rationale: Se corrige la concordancia gramatical del español sin perder ninguna distinción del griego ni del POB en inglés. «Este» retoma naturalmente el mandamiento citado; «gran» preserva μεγάλη; «primer» preserva πρώτη en forma idiomática antes de un sustantivo masculino singular; y la nota mantiene la alternativa documentada («mandamiento principal») aclarando que el griego expresa dos descriptores coordinados.
  reviewer_model: gpt-5.4
