lexical_decisions:
- source_word: αὕτη
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Ésta
  - Esta cosa
  lexicon: BDAG
  rationale: El demostrativo retoma el mandamiento recién citado en el v. 37. «Esta» conserva la referencia anafórica de forma natural en español sin añadir énfasis innecesario.
- source_word: ἐστὶν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: El verbo copulativo se vierte de manera directa con «es».
- source_word: μεγάλη
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - mayor
  lexicon: BDAG
  rationale: «Gran» funciona en español como equivalente natural de valor o importancia. Mantiene el sentido de magnitud/trascendencia sin forzar un superlativo que el griego no usa.
- source_word: πρώτη
  english_pob_choice: first
  chosen_spanish: primera
  alternatives_spanish:
  - primordial
  - principal
  - más importante
  lexicon: BDAG
  rationale: πρῶτος aquí indica primacía u orden de rango. «Primera» conserva esa relación de forma directa y coordinada con «gran».
- source_word: ἐντολή
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - comando
  - orden
  - precepto
  lexicon: BDAG
  rationale: En un contexto bíblico-jurídico, «mandamiento» preserva mejor el registro escritural y la conexión con la discusión sobre la Ley.
theological_decisions:
- issue: Relación entre μεγάλη y πρώτη
  english_pob_reading: 'Render both adjectives coordinately: ''the great and first commandment.'''
  chosen_spanish_reading: «la gran y primera mandamiento»
  alternative_spanish_readings:
  - «el mandamiento grande y primero»
  - «el mandamiento más grande y primero»
  - «el mandamiento principal»
  rationale: Se mantienen los dos adjetivos coordinados para no fusionar la fuerza retórica del griego en una sola idea. «Gran» y «primera» preservan tanto la importancia como la primacía del mandamiento.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Género y concordancia en español con 'mandamiento'
  english_pob_reading: This is the great and first commandment.
  chosen_spanish_reading: «Esta es la gran y primera mandamiento»
  alternative_spanish_readings:
  - «Este es el gran y primer mandamiento»
  - «Este es el mandamiento grande y primero»
  rationale: Aunque la concordancia normativa en español pide «este» y «mandamiento» masculino, el enfoque de este borrador prioriza el apego a la combinación adjetival del griego. Sin embargo, la forma plenamente idiomática y publicable sería la concordante; si se desea, puede revisarse a «Este es el gran y primer mandamiento» sin alterar el sentido.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El pasaje griego es breve y estable; el audit trail inglés no presenta revisiones sustantivas. La única cuestión relevante es cómo reflejar en español los dos adjetivos coordinados μεγάλη y πρώτη sin colapsarlos en un superlativo interpretativo. También se advierte una tensión de concordancia de género en español con «mandamiento», que aquí se ha señalado en las decisiones para no ocultarla.
  spanish_consistency_notes:
  - Se ha preservado la distinción entre «gran» y «primera» para reflejar los dos adjetivos del griego.
  - Se ha usado «mandamiento» para mantener el registro bíblico-jurídico.
  - La nota al pie conserva la alternativa semántica documentada en el inglés POB ('foremost'), adaptada de forma natural al español.
