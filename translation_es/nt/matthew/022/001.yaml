    text: O «respondió y otra vez les dijo en parábolas». El griego usa el giro narrativo común «respondió» aun cuando no aparezca inmediatamente una pregunta directa.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἀποκριθεὶς a un verbo finito de respuesta explícito («respondió»), en línea con la decisión auditada del POB inglés y con mejor naturalidad en español. Se mantiene «les habló ... diciendo» para evitar la repetición pesada de «dijo ... diciendo», y la nota se actualiza para corresponder exactamente al nuevo texto principal.
