translation:
  language: es
  text: 'Y Jesús respondió y de nuevo les habló en parábolas[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «respondió y otra vez les dijo en parábolas». El griego usa el giro narrativo común «respondió» aun cuando no aparezca inmediatamente una pregunta directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: Conserva el enlace narrativo simple del griego sin añadir matiz temporal que el texto no explicita.
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondiendo
  alternatives_spanish:
  - contestando
  - dio respuesta
  lexicon: BDAG
  rationale: En español, «respondiendo» reproduce bien el giro idiomático narrativo de ἀποκρίνομαι. Evita forzar «respondió» cuando la sintaxis ya continúa con otro verbo principal y mantiene la misma tensión observada en el inglés POB.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: nombre propio
  rationale: Nombre propio sin artículo en español, conforme al uso normal y al griego con artículo definido.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: «De nuevo» expresa repetición de forma natural y sobria; conserva la secuencia discursiva del relato.
- source_word: εἶπεν
  english_pob_choice: spoke
  chosen_spanish: les habló
  alternatives_spanish:
  - les dijo
  - habló
  lexicon: BDAG
  rationale: Como en el inglés POB, se evita la repetición pesada de «dijo ... diciendo». «Les habló» conserva el valor de introducción del discurso y suena natural en español.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - por medio de parábolas
  - con parábolas
  lexicon: BDAG
  rationale: La preposición y el dativo expresan modo/medio; «en parábolas» es la equivalencia directa y reconocible en español bíblico contemporáneo.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a la gente
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de manera natural con el pronombre átono «les» en español.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Mantiene la estructura participial introductoria del griego sin convertirla en una segunda oración independiente.
theological_decisions:
- issue: Conservar el giro idiomático narrativo de ἀποκριθείς pese a que no haya pregunta explícita inmediata
  english_pob_reading: Retain 'answered' rather than smoothing to 'responded' or omitting it
  chosen_spanish_reading: 'Mantener un verbo de respuesta: «respondiendo»'
  alternative_spanish_readings:
  - respondió
  - empezó a hablar
  rationale: No se trata de una afirmación doctrinal sino de una convención narrativa griega. La traducción conserva esa forma sin sobreinterpretarla ni eliminarla.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El control cruzado inglés reporta alta concordancia y no registra revisiones aplicadas; por tanto, este borrador sigue de cerca el estado revisado más reciente sin introducir cambios de fondo.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio sin artículo.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni κύριος.
  - Se conserva «en parábolas» para reflejar el dativo plural con ἐν.
  - La puntuación sigue el flujo narrativo del griego y del POB inglés, con dos puntos al final para abrir la cita siguiente.
