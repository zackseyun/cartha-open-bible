revisions:
- from: Pero los demás, después de apoderarse de sus esclavos[a], los ultrajaron y los mataron.
  to: Pero los demás, apoderándose de sus esclavos[a], los maltrataron y los mataron.
  rationale: Se ajusta el participio para reflejar más directamente κρατήσαντες sin sobreexplicar la secuencia, y se reemplaza «ultrajaron» por «maltrataron» para expresar con mayor claridad y naturalidad el sentido amplio de ὕβρισαν en español contemporáneo, manteniendo la decisión terminológica «esclavos».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:15:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste con «Pero los demás», captura de los enviados, maltrato y muerte. Sin embargo, «después de apoderarse de» sobretraduce el participio κρατήσαντες frente al POB auditado («seizing») y añade una secuencia más explícita de la necesaria; además, «apoderarse de» puede sugerir apropiación más que simple captura física. «Los ultrajaron» es posible, pero en español actual eclesial «los maltrataron» comunica mejor el valor amplio de ὕβρισαν como abuso vergonzoso, no meramente afrenta solemne.'
  spanish_quality_summary: El texto es legible, pero «después de apoderarse de» suena más pesado de lo necesario, y «ultrajaron» resulta algo literario y menos transparente para lectura amplia. Una formulación más natural y fiel sería «Pero los demás, apoderándose de sus esclavos[a], los maltrataron y los mataron».
  glossary_alignment: Alinea bien con la política de δοῦλος -> «esclavos», y conserva correctamente la nota alternativa «siervos». No hay conflictos con la terminología base del proyecto.
  issues:
  - severity: medium
    issue: «después de apoderarse de» sobreexplica κρατήσαντες
    rationale: El participio aoristo antecedente puede expresarse en español sin introducir «después de», especialmente porque el audit trail inglés final eligió «seizing» y eliminó «after». Además, «apoderarse de» ya comunica la captura; añadir «después de» hace la frase más pesada.
  - severity: medium
    issue: «los ultrajaron» es menos claro que «los maltrataron» para ὕβρισαν
    rationale: Aunque «ultrajar» puede reflejar afrenta grave, en español contemporáneo puede sonar elevado o ambiguo. ὑβρίζω aquí incluye abuso vergonzoso y maltrato; «maltrataron» comunica mejor el campo semántico amplio y coincide más estrechamente con la decisión inglesa documentada («mistreated them»).
  revised_spanish_text: Pero los demás, apoderándose de sus esclavos[a], los maltrataron y los mataron.
  revised_footnotes:
  - marker: a
    text: O «sus siervos» (griego doulous).
    reason: lexical_alternative
  revision_rationale: Se ajusta el participio para reflejar más directamente κρατήσαντες sin sobreexplicar la secuencia, y se reemplaza «ultrajaron» por «maltrataron» para expresar con mayor claridad y naturalidad el sentido amplio de ὕβρισαν en español contemporáneo, manteniendo la decisión terminológica «esclavos».
