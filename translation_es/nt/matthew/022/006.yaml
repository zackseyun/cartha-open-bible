translation:
  language: es
  text: Pero los demás, apoderándose de sus esclavos[a], los maltrataron y los mataron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus siervos» (griego doulous).
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ λοιποὶ
  english_pob_choice: But the rest
  chosen_spanish: Pero los demás
  alternatives_spanish:
  - Pero el resto
  - Y los demás
  lexicon: BDAG; contexto narrativo de la parábola
  rationale: λοιποί se refiere a los que quedaban de los invitados previos; «los demás» comunica bien ese grupo restante. «Pero» conserva la fuerza adversativa de δέ en contraste con la respuesta anterior.
- source_word: κρατήσαντες
  english_pob_choice: seizing
  chosen_spanish: después de apoderarse de
  alternatives_spanish:
  - tomando
  - habiendo tomado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a los verbos principales. En español, «después de apoderarse de» hace explícita la secuencia sin perder la relación participial y suena natural.
- source_word: τοὺς δούλους αὐτοῦ
  english_pob_choice: his slaves
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: BDAG; decisión POB sobre δοῦλος
  rationale: δοῦλος tiene aquí el sentido de persona bajo autoridad y propiedad del rey. «Esclavos» mantiene esa fuerza social y lexical; «siervos» suaviza indebidamente el término.
- source_word: ὕβρισαν
  english_pob_choice: mistreated them
  chosen_spanish: los ultrajaron
  alternatives_spanish:
  - los maltrataron
  - los insultaron
  lexicon: BDAG
  rationale: ὑβρίζω incluye trato abusivo y deshonroso, no solo insulto verbal. «Ultrajaron» conserva la violencia y la afrenta implícitas mejor que una opción meramente verbal.
- source_word: ἀπέκτειναν
  english_pob_choice: killed them
  chosen_spanish: los mataron
  alternatives_spanish:
  - los asesinaron
  - los dieron muerte
  lexicon: BDAG
  rationale: ἀποκτείνω se traduce de forma directa con «matar». «Asesinaron» añadiría una valoración jurídica/moral no exigida por el verbo.
theological_decisions:
- issue: δοῦλος en contexto parabólico con relación de propiedad
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La guía POB favorece «esclavos» cuando el vínculo de pertenencia y sujeción es parte del sentido. Aquí se trata de enviados del rey, pero el relato preserva la realidad social de su condición; por eso no se atenúa con «siervos».
  doctrine_reference: 'DOCTRINE.md: contested terms table for δοῦλος; Translation philosophy §§1, 5'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que eliminó «after» para reflejar más directamente el participio aoristo κρατήσαντες; por eso se traduce con una construcción participial española equivalente: «después de apoderarse de». También se mantuvo la elección transparente de «esclavos», coherente con la decisión inglesa y con la política POB sobre δοῦλος.'
  spanish_consistency_notes:
  - Se conserva «Pero» para δέ con valor adversativo suave.
  - «Los demás» refleja el grupo restante implícito en λοιποί.
  - Se evita una traducción demasiado eclesiástica de δοῦλος; la elección permanece socialmente concreta.
  - 'El orden verbal español respeta la secuencia: primero apoderarse, luego ultrajar, luego matar.'
