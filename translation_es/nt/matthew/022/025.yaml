    text: Literalmente, «sin semilla». Aquí «semilla» significa descendencia o posteridad.
    reason: lexical_alternative
  - marker: b
    text: 'Alude a la costumbre del levirato: el hermano del difunto debía tomar a la viuda para levantar descendencia para él; véase Deuteronomio 25:5.'
    reason: cultural_note
  revision_rationale: La revisión corrige la colocación de las notas para que correspondan exactamente a los elementos del texto que explican, mejora la naturalidad de «no teniendo» a «sin tener», y ajusta «para su hermano» a «a su hermano» para reflejar mejor el dativo griego sin añadir matiz de finalidad. No se requieren cambios doctrinales ni de terminología base.
