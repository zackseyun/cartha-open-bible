revisions:
- from: Ahora bien, había entre nosotros siete hermanos[a]. El primero se casó y murió, y no teniendo descendencia[b], dejó a su esposa para su hermano.
  to: Ahora bien, había entre nosotros siete hermanos. El primero se casó y murió, y sin tener descendencia[a], dejó a su esposa a su hermano[b].
  rationale: La revisión corrige la colocación de las notas para que correspondan exactamente a los elementos del texto que explican, mejora la naturalidad de «no teniendo» a «sin tener», y ajusta «para su hermano» a «a su hermano» para reflejar mejor el dativo griego sin añadir matiz de finalidad. No se requieren cambios doctrinales ni de terminología base.
  reviewer_model: gpt-5.4
