translation:
  language: es
  text: Ahora bien, había entre nosotros siete hermanos. El primero se casó y murió, y sin tener descendencia[a], dejó a su esposa a su hermano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sin semilla». Aquí «semilla» significa descendencia o posteridad.
    reason: lexical_alternative
  - marker: b
    text: 'Alude a la costumbre del levirato: el hermano del difunto debía tomar a la viuda para levantar descendencia para él; véase Deuteronomio 25:5.'
    reason: cultural_note
lexical_decisions:
- source_word: παρ’ ἡμῖν
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - entre nosotros mismos
  - en medio de nosotros
  lexicon: BDAG
  rationale: παρά con dativo expresa presencia o asociación dentro del grupo. «Entre nosotros» comunica de manera natural que el caso pertenece al círculo de los hablantes, sin añadir más de lo que dice el griego.
- source_word: ἑπτὰ ἀδελφοί
  english_pob_choice: seven brothers
  chosen_spanish: siete hermanos
  alternatives_spanish:
  - siete hermanos varones
  - siete hermanos / parientes
  lexicon: BDAG
  rationale: En este contexto ἀδελφοί se refiere claramente a hermanos masculinos dentro de un caso de levirato. «Hermanos» es fiel y natural en español.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el mayor
  - el primer hermano
  lexicon: BDAG
  rationale: πρῶτος señala el primero en la secuencia, no necesariamente el de mayor edad. «El primero» conserva esa relación de orden.
- source_word: γήμας
  english_pob_choice: married
  chosen_spanish: se casó
  alternatives_spanish:
  - habiéndose casado
  - después de casarse
  lexicon: BDAG
  rationale: El participio aoristo indica una acción anterior a la muerte. «Se casó» expresa con naturalidad la secuencia sin sobrecargar el español.
- source_word: ἐτελεύτησεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - llegó a su fin
  lexicon: BDAG
  rationale: τελευτάω significa morir o llegar al fin de la vida. «Murió» es directo y evita eufemismos innecesarios.
- source_word: μὴ ἔχων σπέρμα
  english_pob_choice: having no offspring
  chosen_spanish: no teniendo descendencia
  alternatives_spanish:
  - sin descendencia
  - no teniendo hijos
  lexicon: BDAG
  rationale: σπέρμα literalmente es «semilla», pero aquí remite a descendencia en sentido genealógico y legal. «Descendencia» conserva ese valor mejor que un literalismo opaco.
- source_word: ἀφῆκεν τὴν γυναῖκα αὐτοῦ
  english_pob_choice: he left his wife
  chosen_spanish: dejó a su esposa
  alternatives_spanish:
  - dejó a su mujer
  - dejó atrás a su esposa
  lexicon: BDAG
  rationale: ἀφίημι aquí significa dejar atrás al morir, no repudiar ni abandonar. «Dejó a su esposa» es claro en español y mantiene el sentido contextual.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  english_pob_choice: to his brother
  chosen_spanish: para su hermano
  alternatives_spanish:
  - a su hermano
  - en favor de su hermano
  lexicon: BDAG
  rationale: El dativo aquí apunta al hermano superviviente como destinatario dentro de la expectativa de levirato. «Para su hermano» preserva la orientación relacional y permite que el contexto legal se entienda sin expandir el texto.
theological_decisions:
- issue: Si explicitar el trasfondo del levirato en el texto principal
  english_pob_reading: Keep the wording implicit and translate only what the Greek states.
  chosen_spanish_reading: Mantener implícito el trasfondo legal y traducir solo lo que dice el griego.
  alternative_spanish_readings:
  - dejó a su esposa para que su hermano la tomara por mujer
  - dejó a su esposa para su hermano, según la ley del levirato
  rationale: El texto griego no añade explícitamente «para casarse» ni desarrolla la ley; eso pertenece al trasfondo cultural asumido. Por fidelidad al original, conviene dejarlo implícito en el cuerpo y señalar la referencia cultural en nota.
  doctrine_reference: Principio de primacía de la lengua original; no ampliar el texto más allá de lo que el griego afirma.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y el criterio POB de equivalencia óptima. No se hicieron cambios respecto al sentido auditado en inglés; se adaptó la formulación al español manteniendo la tensión lexical de σπέρμα mediante nota y conservando implícito el trasfondo legal del levirato.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «descendencia» para σπέρμα en el texto principal, preservando en nota la literalidad «semilla».
  - Se evitó «siervo» porque el término relevante aquí es ἀδελφός, que en este contexto significa «hermano».
  - 'La estructura verbal española intenta reflejar la secuencia de acciones: casarse, morir, no tener descendencia, dejar a la esposa.'
