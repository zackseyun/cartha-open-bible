  text: ἦσαν δὲ παρ’ ἡμῖν ἑπτὰ ἀδελφοί· καὶ ὁ πρῶτος ⸀γήμας ἐτελεύτησεν, καὶ μὴ ἔχων σπέρμα ἀφῆκεν τὴν γυναῖκα αὐτοῦ τῷ ἀδελφῷ αὐτοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/025.yaml
  text: Now there were seven brothers among us[a]. The first married and died, and having no offspring[b], he left his wife to his brother.
  footnotes:
  - marker: a
    text: Literally, 'having no seed.' Here 'seed' means offspring or descendants.
    reason: lexical_alternative
  - marker: b
    text: This reflects the levirate-marriage custom, in which a deceased man's brother was expected to marry the widow to raise up offspring for him; see Deuteronomy 25:5.
    reason: cultural_note
