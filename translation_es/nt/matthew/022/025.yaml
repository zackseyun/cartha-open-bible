review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: «entre nosotros», «siete hermanos», «el primero se casó y murió», y la idea de no tener descendencia. Sin embargo, hay un desajuste importante entre anclas y notas: la nota [a] está colocada en «siete hermanos», pero el contenido de la nota explica «sin semilla/descendencia», que corresponde a μὴ ἔχων σπέρμα. Además, «dejó a su esposa para su hermano» suena menos natural y algo más interpretativo que «a su hermano», mientras que el griego tiene dativo simple.'
  spanish_quality_summary: El español es claro y digno, pero requiere una reparación menor de legibilidad y consistencia editorial. «No teniendo descendencia» es entendible, aunque «sin tener descendencia» fluye mejor. La frase «dejó a su esposa para su hermano» resulta algo forzada en español y puede sugerir finalidad más que destinatario; «dejó a su esposa a su hermano» reproduce mejor el giro sin sobreexplicar. También deben corregirse las notas para que sus marcadores coincidan con los lugares correctos del texto.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Descendencia» para σπέρμα es adecuada en este contexto legal-genealógico. «Hermanos», «esposa» y «murió» son fieles y naturales. La decisión principal a corregir es sintáctica: para τῷ ἀδελφῷ αὐτοῦ conviene «a su hermano» en vez de «para su hermano».'
  issues:
  - severity: high
    issue: Marcador de nota [a] anclado en la frase equivocada
    rationale: La nota [a] explica el sentido literal de σπέρμα («semilla»), pero en el borrador está puesta tras «siete hermanos» en vez de junto a «descendencia». Esto rompe la trazabilidad editorial y desinforma al lector.
  - severity: medium
    issue: Marcador de nota [b] usado para la nota cultural en el lugar del comentario léxico
    rationale: La nota cultural del levirato debería anclarse donde el lector percibe la alusión cultural, es decir, cerca de «dejó a su esposa a su hermano», no en «descendencia».
  - severity: medium
    issue: «para su hermano» es menos fiel y menos natural que «a su hermano»
    rationale: El dativo τῷ ἀδελφῷ αὐτοῦ se vierte más directamente como «a su hermano». «Para» puede introducir un matiz final o explicativo no expresado en el griego.
  revised_spanish_text: Ahora bien, había entre nosotros siete hermanos. El primero se casó y murió, y sin tener descendencia[a], dejó a su esposa a su hermano[b].
  revised_footnotes:
