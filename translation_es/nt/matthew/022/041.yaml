  text: Ahora bien, mientras los fariseos estaban reunidos, Jesús les preguntó,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Συνηγμένων
  english_pob_choice: were gathered together
  chosen_spanish: estaban reunidos
  alternatives_spanish:
  - se habían reunido
  - estaban congregados
  lexicon: BDAG; συνάγω
  rationale: 'El participio genitivo absoluto expresa una circunstancia de fondo: no la acción principal, sino el marco temporal en que ocurre la pregunta de Jesús. «Estaban reunidos» mantiene ese valor circunstancial en español con naturalidad. «Congregados» sería más formal y eclesiástico; «se habían reunido» sugiere más claramente anterioridad, pero aquí el griego funciona como estado circunstancial simultáneo.'
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora
  lexicon: BDAG; δέ
  rationale: δὲ introduce una transición suave, no una oposición fuerte. «Ahora bien» comunica ese avance narrativo en español sin cargar el conector con contraste indebido. «Y» o «Entonces» serían posibles, pero menos precisos respecto del matiz discursivo.
- source_word: τῶν Φαρισαίων
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - el partido fariseo
  lexicon: BDAG; Φαρισαῖοι
  rationale: 'Se conserva el nombre de grupo estándar «fariseos». La genitiva se integra naturalmente en español como sujeto del marco circunstancial: «mientras los fariseos estaban reunidos». «El partido fariseo» es posible, pero no necesario y suena menos directo.'
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: les preguntó
  alternatives_spanish:
  - los interrogó
  - les inquirió
  lexicon: BDAG; ἐπερωτάω
  rationale: «Preguntó» reproduce el valor básico del verbo sin intensificarlo indebidamente. «Interrogó» puede sonar más hostil de lo que exige el contexto; «inquirió» es correcto, pero menos natural para lectura pública.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - los
  lexicon: BDAG; αὐτός
  rationale: El pronombre de objeto indirecto en español refleja mejor la construcción de «preguntó a ellos». Aunque el griego usa objeto directo, en español la pregunta se formula naturalmente con «preguntó a/les». Mantiene la referencia a los fariseos sin forzar un calco sintáctico.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG; Ἰησοῦς
  rationale: Nombre propio estándar en español. Se omite el artículo, como corresponde al uso normal en español con nombres personales.
translation_notes:
  revision_awareness: 'El texto griego y el registro inglés concuerdan en alto grado: se mantiene el marco circunstancial del genitivo absoluto, el valor transicional suave de δέ y el verbo simple de interrogación sin intensificación polémica. No hay notas textuales ni decisiones doctrinales especiales en este versículo.'
  spanish_consistency_notes:
  - 'Se evita el calco rígido de la estructura griega, pero se conserva el orden informativo: conector transicional, marco circunstancial, sujeto, verbo principal y complemento.'
  - Se prefirió «estaban reunidos» sobre «se habían reunido» para no desplazar el foco temporal del participio a una anterioridad que el contexto no exige.
  - No se introduce terminología eclesiástica no motivada por el texto; la traducción busca lectura pública clara y sobria.
