translation:
  language: es
  text: 'diciendo[a]: «Maestro, Moisés dijo: “Si un hombre muere sin tener hijos, su hermano se casará con su esposa y levantará descendencia para su hermano”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «su hermano cumplirá con el deber de cuñado hacia la viuda». El griego se refiere específicamente al matrimonio levirático.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maese
  - Maestro, en el sentido de 'Doctor'
  lexicon: BDAG
  rationale: La forma de tratamiento directa a Jesús en este contexto es más natural como "Maestro" en español y conserva el valor de instructor sin introducir una connotación eclesiástica ajena al griego.
- source_word: Ἐάν τις ἀποθάνῃ
  english_pob_choice: If a man dies
  chosen_spanish: Si un hombre muere
  alternatives_spanish:
  - Si alguien muere
  lexicon: BDAG
  rationale: El griego usa un indefinido singular con masculino genérico en un caso legal. "Un hombre" preserva esa precisión de género sin neutralizar la formulación de la ley citada.
- source_word: μὴ ἔχων τέκνα
  english_pob_choice: without having children
  chosen_spanish: sin tener hijos
  alternatives_spanish:
  - sin tener hijos ni descendencia
  - sin hijos
  lexicon: BDAG
  rationale: τέκνα es plural y se refiere naturalmente a "hijos" en este contexto familiar. "Sin tener hijos" mantiene la construcción participial y suena más natural que una traducción más abstracta.
- source_word: ἐπιγαμβρεύσει
  english_pob_choice: shall marry
  chosen_spanish: se casará con
  alternatives_spanish:
  - cumplirá el deber de cuñado con
  - tomará por esposa
  lexicon: BDAG
  rationale: El verbo alude específicamente al matrimonio levirático. "Se casará con" comunica el acto central de forma clara en español; la especificidad jurídica queda implícita en el contexto y puede explicitarse en nota.
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su mujer
  alternatives_spanish:
  - su esposa
  - la mujer de él
  lexicon: BDAG
  rationale: '"Mujer" conserva el paralelismo simple del griego γυναῖκα y funciona bien en español bíblico sin volver más técnico el pasaje.'
- source_word: ἀναστήσει σπέρμα
  english_pob_choice: raise up offspring
  chosen_spanish: levantará descendencia
  alternatives_spanish:
  - levantará simiente
  - producirá descendencia
  lexicon: BDAG
  rationale: σπέρμα en este giro idiomático se refiere a descendencia. "Levantará descendencia" reproduce la fuerza idiomática de ἀναστήσει con un español digno y comprensible, evitando el calco duro de "simiente".
- source_word: τῷ ἀδελφῷ αὐτοῦ
  english_pob_choice: for his brother
  chosen_spanish: para su hermano
  alternatives_spanish:
  - a favor de su hermano
  - por su hermano
  lexicon: BDAG
  rationale: 'El dativo expresa beneficio/referencia: la descendencia se contabiliza en favor del hermano fallecido. "Para su hermano" es la manera más clara y breve de reflejar esa relación.'
theological_decisions:
- issue: Preservación del marco levirático
  english_pob_reading: The Greek refers specifically to levirate marriage.
  chosen_spanish_reading: El griego se refiere específicamente al matrimonio levirático.
  alternative_spanish_readings:
  - El griego habla de un deber de cuñado.
  - El griego se refiere a que el hermano debe tomar a la viuda.
  rationale: La cláusula no describe un matrimonio cualquiera, sino una práctica legal israelita específica. Mantener ese trasfondo evita diluir el sentido del texto y conserva la tensión terminológica documentada por la POB en inglés.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (Preserve source-specific legal and theological precision)'
translation_notes:
  revision_awareness: El audit trail en inglés mantiene la lectura masculina y la explicación del matrimonio levirático. No se introdujeron cambios de sentido; la versión española sigue esa decisión, pero adapta la expresión para que suene natural en español bíblico sin perder precisión jurídica.
  spanish_consistency_notes:
  - Se preservó el tratamiento directo «Maestro» para Διδάσκαλε, coherente con el uso bíblico contemporáneo y sin recurrir a «Señor» o «Rabí».
  - «Un hombre» mantiene el valor masculino explícito que el audit trail en inglés defendía.
  - «Levantará descendencia» evita el calco «simiente» y conserva el idioma idiomático del pasaje.
  - La nota al pie explicita la alternativa más formal del matrimonio levirático, siguiendo la decisión auditada del texto inglés.
