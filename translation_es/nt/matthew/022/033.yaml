review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: conexión narrativa con καὶ, valor temporal de ἀκούσαντες, plural de οἱ ὄχλοι, reacción de ἐξεπλήσσοντο y causa/base con ἐπὶ τῇ διδαχῇ αὐτοῦ. También preserva bien la nota alternativa sobre el participio.'
  spanish_quality_summary: 'El español es claro, pero ''las multitudes'' suena menos natural en español bíblico general que ''las multitudes''/''las muchedumbres''; aun así, la principal mejora necesaria es verbal: ''se asombraban'' puede sugerir iteración o duración más marcada de la que pide la escena, mientras que ''quedaron asombradas'' o ''estaban asombradas'' suena más idiomático para una reacción puntual narrada. Además, ''al oírlo'' funciona bien, pero ''cuando lo oyeron'' corresponde más directamente a la decisión auditada en inglés (''when the crowds heard it'').'
  glossary_alignment: No hay términos del glosario teológico principal en juego. 'Enseñanza' para διδαχή está bien y evita el tecnicismo de 'doctrina'.
  issues:
  - severity: medium
    issue: '''se asombraban'' para ἐξεπλήσσοντο'
    rationale: Aunque el imperfecto puede reflejar una reacción vívida, en español narrativo 'se asombraban' suena algo iterativo o progresivo. Una forma como 'quedaron asombradas' comunica mejor la reacción al oír la respuesta, manteniendo naturalidad y fuerza.
  - severity: low
    issue: '''las multitudes'' es menos idiomático que otras opciones'
    rationale: Preserva el plural, pero en español eclesial amplio 'las multitudes' suena un poco rígido. 'Las multitudes' no es incorrecto; sin embargo, 'las multitudes' sigue siendo aceptable. No requiere adjudicación mayor.
