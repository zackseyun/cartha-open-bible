- from: Y al oírlo[a], las multitudes se asombraban de su enseñanza.
  to: Y cuando lo oyeron[a], las multitudes quedaron asombradas de su enseñanza.
  rationale: Se ajusta ἀκούσαντες a una cláusula temporal que sigue más de cerca la decisión auditada en inglés ('when they heard it') y se reemplaza 'se asombraban' por 'quedaron asombradas' para un español narrativo más natural que exprese la reacción de la multitud ante la enseñanza de Jesús sin pérdida del sentido del griego. Se conserva 'enseñanza' y la nota lexical alternativa.
