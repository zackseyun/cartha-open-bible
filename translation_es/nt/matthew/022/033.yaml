lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: Se conserva la simple continuidad narrativa del griego con una conjunción coordinante breve y natural en español.
- source_word: ἀκούσαντες
  english_pob_choice: when [they] heard it
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando lo oyeron
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo se vierte con un giro temporal natural en español; el objeto implícito se expresa con 'lo' por el contexto del dicho anterior de Jesús.
- source_word: οἱ ὄχλοι
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las muchedumbres
  - la multitud
  lexicon: BDAG
  rationale: El plural griego se preserva con un sustantivo plural en español. 'Multitudes' mantiene el valor colectivo mejor que el singular 'la multitud'.
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were astonished
  chosen_spanish: se asombraban
  alternatives_spanish:
  - estaban asombradas
  - quedaban asombradas
  lexicon: BDAG
  rationale: El imperfecto expresa una reacción continua o vividísima; 'se asombraban' transmite bien ese matiz sin sonar demasiado técnico. 'Astonished' en inglés se traduce naturalmente con 'asombrarse' en español.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  english_pob_choice: at his teaching
  chosen_spanish: de su enseñanza
  alternatives_spanish:
  - por su enseñanza
  - acerca de su enseñanza
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo marca aquí la ocasión o base de la reacción. En español, 'de su enseñanza' resulta natural para expresar el motivo o motivo inmediato del asombro. 'Enseñanza' conserva διδαχή mejor que 'doctrina', que sería más técnico y menos contextual.
translation_notes:
  revision_awareness: Se corrigió el problema anterior asegurando que el marcador [a] aparezca exactamente en el texto principal y que la nota de pie corresponda a ese anclaje. La redacción mantiene el sentido temporal del participio y la reacción de asombro del imperfecto griego.
  spanish_consistency_notes:
  - Se evitó 'doctorina' o 'doctrina' para διδαχή, siguiendo la decisión auditada de POB de preferir 'teaching/enseñanza' en este contexto.
  - Se mantuvo el plural 'multitudes' para reflejar οἱ ὄχλοι.
  - El objeto implícito del participio se expresó con 'lo' para enlazar con la respuesta anterior de Jesús en el contexto inmediato.
