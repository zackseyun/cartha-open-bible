  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'saduceos', 'resurrección' y la referencia pronominal a Jesús están bien. No aparecen términos sensibles como Yahvé, Mesías/Cristo, esclavo/siervo, etc.
