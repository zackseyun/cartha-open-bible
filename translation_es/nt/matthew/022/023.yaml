translation:
  language: es
  text: Ese día se acercaron a él los saduceos[a], diciendo que no hay resurrección, y le preguntaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «los saduceos, que dicen que no hay resurrección».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese día
  - En ese mismo día
  lexicon: BDAG
  rationale: La expresión temporal es una fórmula narrativa natural. 'En aquel día' conserva el valor deíctico de ἐκείνῃ sin forzar un calco innecesario; 'aquel' mantiene distancia narrativa mejor que 'ese' en este contexto.
- source_word: προσῆλθον αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se le acercaron
  lexicon: BDAG
  rationale: προσέρχομαι puede expresar tanto 'venir a' como 'acercarse a'. Aquí 'se acercaron a él' transmite el movimiento y el tono de aproximación verbal previo a la pregunta, sin perder naturalidad en español.
- source_word: Σαδδουκαῖοι
  english_pob_choice: Sadducees
  chosen_spanish: los saduceos
  alternatives_spanish:
  - saduceos
  lexicon: BDAG
  rationale: Se conserva el nombre de grupo transliterado y adaptado al español bíblico común. El artículo definido ayuda a la fluidez narrativa.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que decían
  - los cuales decían
  lexicon: BDAG
  rationale: El participio presente se vierte de forma adverbial con 'diciendo', manteniendo la relación de contenido sin introducir una subordinación más pesada de lo necesario.
- source_word: μὴ εἶναι ἀνάστασιν
  english_pob_choice: there is no resurrection
  chosen_spanish: que no hay resurrección
  alternatives_spanish:
  - que no existe resurrección
  - que no hay una resurrección
  lexicon: BDAG
  rationale: La subordinada de contenido refleja de modo claro la negación atribuida a los saduceos. 'Resurrección' conserva el valor técnico-teológico de ἀνάστασις; 'que no hay resurrección' suena más natural que un giro literal como 'no ser resurrección'.
- source_word: ἀνάστασιν
  english_pob_choice: resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - levantamiento
  - volver a la vida
  lexicon: BDAG
  rationale: Se mantiene el término doctrinal estándar porque aquí el griego usa el sustantivo técnico para la resurrección de los muertos. Otras opciones pierden precisión o introducen paráfrasis.
- source_word: ἐπηρώτησαν αὐτόν
  english_pob_choice: they questioned him
  chosen_spanish: le preguntaron
  alternatives_spanish:
  - lo interrogaron
  - le hicieron preguntas
  lexicon: BDAG
  rationale: ἐπερωτάω admite 'preguntar' o 'cuestionar'. En español, 'le preguntaron' comunica la acción de forma sobria y idiomática; 'cuestionaron' podría sugerir confrontación más fuerte de la que el versículo por sí solo exige.
theological_decisions:
- issue: Cómo expresar la negación saducea sin resolverla ni suavizarla
  english_pob_reading: there is no resurrection
  chosen_spanish_reading: que no hay resurrección
  alternative_spanish_readings:
  - que no existe resurrección
  - que no hay una resurrección
  rationale: La frase se mantiene como contenido de la afirmación de los saduceos, no como voz autoritativa del narrador. No se añade ningún matiz apologético; simplemente se reporta su postura doctrinal.
  doctrine_reference: Preservar la tensión narrativa y doctrinal del texto; no convertir la descripción en una afirmación del narrador.
translation_notes:
  revision_awareness: 'La redacción sigue el valor narrativo simple del griego y el cierre auditado de la versión inglesa: una entrada temporal, el acercamiento de los saduceos, su negación de la resurrección y la pregunta dirigida a Jesús. No se detectan revisiones adicionales en el paquete aportado.'
  spanish_consistency_notes:
  - Se usa 'resurrección' de forma consistente como término técnico de ἀνάστασις.
  - Se prefiere 'saduceos' con minúscula por tratarse de un nombre de grupo en español corriente.
  - '''Le preguntaron'' evita una dureza innecesaria y mantiene el sentido de ἐπηρώτησαν.'
  - La nota al pie conserva la alternativa inglesa de modo explícito sin recargar el texto principal.
