  source_alignment_summary: 'El borrador sigue bien el sentido del griego: Τότε = «Entonces», οἱ Φαρισαῖοι = «los fariseos», y la cláusula final expresa correctamente el propósito de atraparlo por medio de lo que dijera. También conserva la neutralidad deliberativa de συμβούλιον ἔλαβον en lugar de sobreinterpretarla como «maquinaron».'
