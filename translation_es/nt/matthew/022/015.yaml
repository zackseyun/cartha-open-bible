translation:
  language: es
  text: Entonces los fariseos fueron y consultaron[a] cómo podrían atraparlo por lo que dijera[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maquinaron cómo atraparlo».
    reason: lexical_alternative
  - marker: b
    text: Lit. «en palabra»; es decir, por algo que dijera.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca la secuencia narrativa. «Entonces» conserva la relación inmediata con el contexto y suena natural en español bíblico contemporáneo.
- source_word: πορευθέντες
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: BDAG
  rationale: El participio aoristo funciona narrativamente con el verbo finito. «Fueron» transmite el movimiento de manera breve y natural, sin sobrecargar la frase con un giro participial artificial.
- source_word: οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los Fariseos
  lexicon: BDAG
  rationale: Nombre del grupo religioso. Se mantiene el artículo y se usa la forma usual en español. No se capitaliza en medio de la oración salvo por norma inicial.
- source_word: συμβούλιον ἔλαβον
  english_pob_choice: took counsel
  chosen_spanish: tomaron consejo
  alternatives_spanish:
  - consultaron
  - trazaron un plan
  lexicon: BDAG
  rationale: La idiomática griega expresa deliberación o consulta. «Tomaron consejo» conserva mejor el valor literal y el sentido de deliberar; la nota aclara la alternativa más interpretativa de «plantearon/maquinaron» según el contexto hostil.
- source_word: ὅπως
  english_pob_choice: how
  chosen_spanish: sobre cómo
  alternatives_spanish:
  - para ver cómo
  - de qué manera
  lexicon: BDAG
  rationale: Introduce el contenido de su deliberación. «Sobre cómo» refleja bien la función discursiva y evita una traducción demasiado rígida como «para que» en español.
- source_word: παγιδεύσωσιν
  english_pob_choice: trap
  chosen_spanish: atraparlo
  alternatives_spanish:
  - enredarlo
  - hacerlo caer en una trampa
  lexicon: BDAG
  rationale: Verbo metafórico de capturar en una trampa. «Atraparlo» comunica la hostilidad con claridad y es idiomático; la imagen de la trampa queda reforzada por el contexto y la nota textual.
- source_word: ἐν λόγῳ
  english_pob_choice: in his words
  chosen_spanish: en sus palabras
  alternatives_spanish:
  - por lo que dijera
  - con sus palabras
  lexicon: BDAG
  rationale: λόγος aquí se refiere a lo dicho, al habla. «En sus palabras» es una traducción directa y natural del giro, manteniendo la idea de que buscaban sorprenderlo mediante lo que él dijera.
theological_decisions:
- issue: Matiz de hostilidad en la deliberación
  english_pob_reading: Render the phrase neutrally as 'took counsel' and let the purpose clause express the malicious intent.
  chosen_spanish_reading: Conservar una formulación relativamente neutral en «tomaron consejo» y dejar que el propósito exprese la intención maliciosa.
  alternative_spanish_readings:
  - «maquinaron»
  - «trazaron un plan»
  rationale: El griego del primer sintagma describe deliberación; la malicia queda explícita en la finalidad de atraparlo. Por eso conviene no cargar de antemano el verbo principal con un matiz más fuerte que el que el texto da allí mismo.
  doctrine_reference: Principio de primacía del texto original y de equivalencia óptima; distinción entre deliberación y propósito hostil en el enunciado.
translation_notes:
  revision_awareness: 'Coincide con el auditoría inglesa de alta concordancia: se mantiene la secuencia temporal, la deliberación de συμβούλιον ἔλαβον se conserva relativamente neutra, y la hostilidad se deja para el propósito de atraparlo mediante su habla.'
  spanish_consistency_notes:
  - Se usa «fariseos» en minúscula como nombre común de grupo, de acuerdo con el uso bíblico estándar en español.
  - Se eligió «sus palabras» para hacer explícito en español el objeto del engaño verbal, en armonía con el valor de λόγος en este contexto.
  - Se evita «SEÑOR» u otras convenciones no pertinentes; no hay término divino en este versículo.
  - La puntuación mantiene la relación de propósito sin forzar un calco gramatical del griego.
