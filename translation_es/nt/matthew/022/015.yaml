revisions:
- from: Entonces los fariseos fueron y tomaron consejo[a] sobre cómo podrían atraparlo en sus palabras[b].
  to: Entonces los fariseos fueron y consultaron[a] cómo podrían atraparlo por lo que dijera[b].
  rationale: Se ajusta el borrador para mejorar la naturalidad del español sin apartarse del griego ni del audit trail inglés. «Consultaron» conserva el sentido deliberativo neutral de συμβούλιον ἔλαβον mejor que el calco «tomaron consejo». Se simplifica «sobre cómo» a «cómo». Se cambia «en sus palabras» por «por lo que dijera» en el texto principal porque comunica mejor en español el sentido de ἐν λόγῳ como medio de atraparlo, mientras la nota preserva el matiz más literal.
