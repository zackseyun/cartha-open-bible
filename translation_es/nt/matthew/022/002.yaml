translation:
  language: es
  text: El reino de los cielos fue comparado con un rey que dio un banquete de bodas para su hijo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'puede compararse con'. El verbo griego admite la fórmula parabólica habitual, aunque la forma aquí es literalmente 'fue comparado con' o 'fue hecho semejante a'.
    reason: lexical_alternative
  - marker: b
    text: Griego 'bodas' (plural), un modismo para las festividades de boda o un banquete de bodas.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡμοιώθη
  english_pob_choice: was compared to
  chosen_spanish: fue comparado con
  alternatives_spanish:
  - puede compararse con
  - fue hecho semejante a
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁμοιόω en esta fórmula parabólica admite una equivalencia natural en español con 'fue comparado con'. 'Fue hecho semejante a' sería más literal, pero menos idiomático. 'Puede compararse con' introduce una modalidad que el tiempo verbal griego no expresa de manera explícita.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reinado de los cielos
  lexicon: BDAG
  rationale: Se conserva la expresión mateana tradicional y propia del texto, sin sustituirla por 'reino de Dios'. 'Reino' comunica mejor en español la fórmula estable del Evangelio de Mateo; 'de los cielos' respeta el genitivo plural del griego y evita nivelar la expresión.
- source_word: βασιλεῖ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - un monarca
  - un rey humano
  lexicon: BDAG
  rationale: El contexto y el sustantivo βασιλεύς requieren 'rey'. En español no hace falta reproducir la apposición inglesa 'a king' con un giro más pesado; 'un rey' es suficiente y fiel.
- source_word: ὅστις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: BDAG
  rationale: La relativa simple se expresa con naturalidad en español mediante 'que'. 'Quien' o 'el cual' sonarían más marcados sin aportar un matiz necesario aquí.
- source_word: ἐποίησεν γάμους
  english_pob_choice: gave a wedding feast
  chosen_spanish: celebró unas bodas
  alternatives_spanish:
  - hizo unas bodas
  - dio un banquete de bodas
  - preparó unas bodas
  lexicon: BDAG
  rationale: Γάμοι en plural puede referirse a las festividades o celebración nupcial, no solo al acto matrimonial. 'Celebró unas bodas' conserva el valor idiomático del plural y suena natural en español. 'Banquete de bodas' también sería posible, pero 'bodas' refleja mejor la amplitud del término griego.
- source_word: τῷ υἱῷ αὐτοῦ
  english_pob_choice: for his son
  chosen_spanish: para su hijo
  alternatives_spanish:
  - por su hijo
  - para el hijo de él
  lexicon: BDAG
  rationale: 'El dativo expresa finalidad o interés: la celebración es en honor del hijo. ''Para su hijo'' es claro y fiel; no se añade ''bodas de su hijo'' porque el sustantivo plural griego ya lleva la carga festiva.'
theological_decisions:
- issue: Mantener la fórmula mateana 'reino de los cielos'
  english_pob_reading: Retain 'kingdom of heaven' as Matthew's wording without interpretive substitution.
  chosen_spanish_reading: Conservar 'reino de los cielos' sin sustituirla por 'reino de Dios' ni por una paráfrasis interpretativa.
  alternative_spanish_readings:
  - reino de Dios
  - reinado de los cielos
  rationale: La expresión forma parte del estilo distintivo de Mateo y no debe armonizarse con otras formulaciones. 'Reino de los cielos' preserva la redacción del texto y deja abierta la tensión entre ámbito y gobierno real sin resolverla prematuramente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente eliminó un equivalente explícito de ''a man'' y mantuvo ''was compared to'' y ''wedding feast''. En español se siguió esa misma línea: no se introdujo ''un hombre'' y se optó por una fórmula natural (''fue comparado con''), junto con ''celebró unas bodas'', que preserva el plural idiomático de γάμους.'
  spanish_consistency_notes:
  - Se mantiene 'reino de los cielos' como fórmula estable de Mateo.
  - Se evita introducir 'Cristo' o 'Mesías' porque no aparecen en el versículo.
  - '''Bodas'' traduce el plural griego γάμοι sin reducirlo a un simple acto matrimonial.'
  - El dativo final se expresa de forma natural con 'para su hijo'.
