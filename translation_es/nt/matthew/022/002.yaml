    text: Or 'may be compared to.' The Greek verb can be rendered in the familiar parabolic formula that way, though the form here is literally 'was compared to' or 'was made like.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'weddings' (plural), an idiom for wedding festivities or a wedding banquet.
    reason: lexical_alternative
