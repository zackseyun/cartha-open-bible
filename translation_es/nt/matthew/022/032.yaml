translation:
  language: es
  text: Yo soy el Dios de Abraham, el Dios de Isaac y el Dios de Jacob. No es el Dios de los muertos[a], sino de los vivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios no es el Dios de los muertos, sino de los vivos». El griego repite explícitamente «Dios» en la segunda oración; el texto principal usa la omisión natural del sujeto en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo estoy
  - Yo soy él
  lexicon: BDAG
  rationale: La autoidentificación presente se expresa naturalmente en español con «Yo soy». Mantiene la fuerza directa del griego y el eco bíblico de la fórmula sin añadir explicación.
- source_word: ὁ θεὸς Ἀβραὰμ ... ὁ θεὸς Ἰσαὰκ ... ὁ θεὸς Ἰακώβ
  english_pob_choice: the God of Abraham and the God of Isaac and the God of Jacob
  chosen_spanish: el Dios de Abraham, el Dios de Isaac y el Dios de Jacob
  alternatives_spanish:
  - el Dios de Abraham, Isaac y Jacob
  - Dios de Abraham, Isaac y Jacob
  lexicon: BDAG
  rationale: Conservo la repetición de «el Dios de…» porque el griego la repite explícitamente y esa reiteración tiene peso retórico en el argumento.
- source_word: οὐκ ἔστιν ὁ θεὸς
  english_pob_choice: He is not the God
  chosen_spanish: No es el Dios
  alternatives_spanish:
  - Dios no es el Dios
  - Él no es el Dios
  lexicon: BDAG
  rationale: El español permite omitir el pronombre explícito sin perder la referencia a Dios ya nombrado. La forma resultante suena natural y preserva la afirmación predicativa sin forzar una paráfrasis.
- source_word: νεκρῶν
  english_pob_choice: the dead
  chosen_spanish: de los muertos
  alternatives_spanish:
  - de muertos
  - de quienes están muertos
  lexicon: BDAG
  rationale: «Los muertos» reproduce el sentido sustantivado del genitivo plural y mantiene el contraste formal con «los vivos».
- source_word: ζώντων
  english_pob_choice: the living
  chosen_spanish: de los vivos
  alternatives_spanish:
  - de los que viven
  - de quienes están vivos
  lexicon: BDAG
  rationale: «Los vivos» conserva la antítesis breve y paralela con «los muertos» y funciona con naturalidad en español.
theological_decisions:
- issue: La identidad de Dios como Dios de los patriarcas en el argumento de Jesús
  english_pob_reading: Render the statement straightforwardly without expanding it into an explicit doctrinal paraphrase about resurrection or the intermediate state.
  chosen_spanish_reading: Traducir la afirmación de forma directa, sin convertirla en una paráfrasis doctrinal sobre la resurrección o el estado intermedio.
  alternative_spanish_readings:
  - Él no es Dios de muertos, sino de personas vivas para él
  - Dios no es el Dios de los muertos, sino de los vivos
  rationale: La traducción conserva la fuerza del argumento de Jesús sin resolver interpretativamente la tensión teológica que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica sin ampliarla más allá del texto.
translation_notes:
  revision_awareness: 'La versión revisada corrige la validación anterior: el marcador [a] ahora aparece en el texto español principal donde corresponde.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin recurrir a «SEÑOR» porque el pasaje no usa el Tetragrámaton.
  - Se conserva la repetición de la construcción «el Dios de…» para respetar la estructura enfática del griego.
  - «los muertos» / «los vivos» preserva la antítesis breve y sustantivada del original.
  - La omisión del pronombre en la segunda frase es una decisión de estilo español, no un cambio de sentido.
