translation:
  language: es
  text: En la resurrección[a], entonces, ¿esposa de cuál de los siete será? Porque todos la tuvieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita: «Porque los siete se casaron con ella». El griego dice literalmente: «Porque todos la tuvieron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ ἀναστάσει
  english_pob_choice: In the resurrection
  chosen_spanish: En la resurrección
  alternatives_spanish:
  - En el levantamiento
  - En la resurrección futura
  lexicon: BDAG
  rationale: ἀνάστασις en este contexto se refiere a la resurrección final de los muertos. En español, «resurrección» es el equivalente claro y teológicamente preciso; «levantamiento» sería poco natural y «resurrección futura» añade una glosa no presente en el texto.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - pues
  - por tanto
  lexicon: BDAG
  rationale: οὖν marca continuación inferencial en la pregunta. «Entonces» conserva esa progresión discursiva en español sin sonar excesivamente rígido.
- source_word: τίνος τῶν ἑπτὰ
  english_pob_choice: whose wife of the seven
  chosen_spanish: ¿de cuál de los siete
  alternatives_spanish:
  - ¿de quién de los siete
  - ¿de cuál de ellos
  lexicon: BDAG
  rationale: El genitivo τίνος con τῶν ἑπτὰ expresa pertenencia dentro de un grupo. En español, «de cuál de los siete» reproduce la relación del original y evita introducir una formulación más interpretativa.
- source_word: γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - mujer casada
  lexicon: BDAG
  rationale: Aquí γυνή tiene sentido matrimonial, no genérico de «mujer». «Esposa» comunica con naturalidad la relación legal/matrimonial exigida por el contexto.
- source_word: ἔσται
  english_pob_choice: will she be
  chosen_spanish: será
  alternatives_spanish:
  - va a ser
  - será ella
  lexicon: BDAG
  rationale: El futuro de εἰμί se expresa naturalmente con «será». La posición de la persona se entiende por el contexto y por el pronombre omitido en español.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - los siete
  lexicon: BDAG
  rationale: El sujeto es el conjunto de los siete hermanos. En español, «todos» conserva la referencia colectiva sin necesidad de repetir un pronombre explícito.
- source_word: ἔσχον αὐτήν
  english_pob_choice: they all had her
  chosen_spanish: la tuvieron
  alternatives_spanish:
  - se casaron con ella
  - la tomaron por esposa
  lexicon: BDAG
  rationale: La frase griega es deliberadamente breve y literal. «La tuvieron» preserva esa tersura y el valor idiomático sin convertir de entrada la expresión en una explicación interpretativa; las alternativas explicitan el sentido matrimonial pero van más allá de la forma del original.
theological_decisions:
- issue: Sentido de ἀνάστασις en la controversia con los saduceos
  english_pob_reading: Refers to the future resurrection of the dead, not merely a generalized afterlife.
  chosen_spanish_reading: Se refiere a la resurrección futura de los muertos, no a una noción general de vida después de la muerte.
  alternative_spanish_readings:
  - Se refiere a un más allá indefinido
  - Se refiere a la vida después de la muerte en general
  rationale: El contexto inmediato trata la postura de los saduceos sobre la resurrección, y Jesús responde al mismo tema en los versículos siguientes. Mantener «resurrección» evita diluir la afirmación doctrinal específica.
  doctrine_reference: 'Afirmaciones; Filosofía de traducción #3'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés auditado, que ajustó el orden para reflejar con más naturalidad «whose wife of the seven will she be». En español, se preserva esa misma relación sintáctica con «¿de cuál de los siete será esposa?», manteniendo la pregunta centrada en la pertenencia matrimonial dentro del grupo.
  spanish_consistency_notes:
  - Se mantiene «resurrección» para ἀνάστασις, coherente con el uso doctrinal del NT y con el audit trail inglés.
  - Se evita «Cristo/SEÑOR» porque no aparecen en el versículo.
  - «Esposa» se usa por el contexto matrimonial; no se generaliza a «mujer».
  - Se conserva el valor literal de ἔσχον αὐτήν con una nota que documenta la alternativa interpretativa «se casaron con ella».
