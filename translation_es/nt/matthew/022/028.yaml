review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: ἐν τῇ ἀναστάσει = «En la resurrección», οὖν = «entonces», γυνή = «esposa», y la nota preserva la alternativa explicativa para ἔσχον αὐτήν. Sin embargo, «¿de cuál de los siete será esposa?» no refleja bien τίνος, que pregunta «de quién/de cuál de los siete» como posesión relacional, y en español «cuál» sin sustantivo personal suena menos natural que «quién».'
  spanish_quality_summary: El español es claro y digno, pero «de cuál de los siete» suena algo rígido y poco idiomático para personas. Además, «Porque todos la tuvieron» es comprensible pero en español moderno puede sonar más brusco o ambiguo que en inglés; conviene mantenerlo por fidelidad, apoyado por la nota ya presente. Una leve mejora de orden y selección pronominal aumenta naturalidad sin perder literalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Resurrección» y «esposa» están bien. La decisión de mantener «la tuvieron» es defendible por fidelidad al griego y está correctamente respaldada con nota lexical alternativa.
  issues:
  - severity: medium
    issue: «de cuál de los siete» no representa de la forma más natural τίνος τῶν ἑπτὰ
    rationale: τίνος pregunta «de quién/ de cuál [persona]». En español aplicado a personas, «de quién de los siete» o mejor «esposa de cuál de los siete» comunica con más naturalidad y precisión la relación posesiva del original.
  - severity: low
    issue: La redacción actual del segmento interrogativo suena algo forzada
    rationale: «¿de cuál de los siete será esposa?» es entendible, pero «¿esposa de cuál de los siete será?» fluye mejor y refleja más de cerca la estructura posesiva que el inglés auditado quiso preservar.
