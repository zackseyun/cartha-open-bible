translation:
  language: es
  text: 'diciendo[a]: «¿Qué les parece acerca del Mesías? ¿Hijo de quién es?» Ellos le dijeron: «De David».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo». El griego Χριστός (Christos) aquí se usa en sentido mesiánico.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - mientras decía
  lexicon: BDAG
  rationale: El participio presente introduce el discurso de Jesús; en español, «diciendo» conserva esa función discursiva sin añadir una idea de simultaneidad excesiva ni alterar la secuencia narrativa.
- source_word: Τί ὑμῖν δοκεῖ
  english_pob_choice: What do you think
  chosen_spanish: ¿Qué les parece?
  alternatives_spanish:
  - ¿Qué piensan ustedes?
  - ¿Cuál es su opinión?
  lexicon: BDAG
  rationale: δοκέω con dativo pide juicio u opinión. «Les parece» reproduce el matiz de parecer/juzgar y suena natural en español, aunque «piensan» también sería posible.
- source_word: περὶ τοῦ χριστοῦ
  english_pob_choice: about the Messiah
  chosen_spanish: acerca del Mesías
  alternatives_spanish:
  - acerca del Cristo
  - sobre el Mesías
  lexicon: BDAG
  rationale: Aquí χριστός funciona como título en una discusión mesiánica judía; por la política terminológica del proyecto, se traduce «Mesías» en el texto principal. Se conserva el valor titular sin convertirlo en nombre propio litúrgico.
- source_word: τίνος υἱός ἐστιν
  english_pob_choice: Whose son is he
  chosen_spanish: ¿Hijo de quién es?
  alternatives_spanish:
  - ¿De quién es hijo?
  - ¿De quién es el Hijo?
  lexicon: BDAG
  rationale: La pregunta griega es sobre filiación/descendencia. En español, «¿Hijo de quién es?» es una formulación natural y fiel; el referente implícito sigue siendo el Mesías.
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le dijeron
  alternatives_spanish:
  - Le dijeron
  - Respondieron a él
  lexicon: BDAG
  rationale: Se conserva el sujeto explícito plural y el dativo indirecto. «Le dijeron» sería más breve, pero «Ellos le dijeron» mantiene mejor la estructura narrativa y el contraste con la pregunta.
- source_word: Τοῦ Δαυίδ
  english_pob_choice: David’s
  chosen_spanish: De David
  alternatives_spanish:
  - David
  - Hijo de David
  lexicon: BDAG
  rationale: 'El griego responde de modo elíptico: omite el sustantivo («hijo») ya inferible por la pregunta. «De David» preserva esa elipsis mejor que expandirla a «Hijo de David».'
theological_decisions:
- issue: Renderizado de Χριστός en un contexto mesiánico judío
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La audit trail inglesa documenta que Χριστός se entiende aquí como título mesiánico, no como nombre fijo. En español, «Mesías» expresa mejor ese valor titular y evita la ambigüedad devocional de «Cristo» como nombre propio.
  doctrine_reference: 'DOCTRINE.md: contested terms — Χριστός → Mesías cuando es título; Cristo cuando funciona como forma nominalizada fija'
translation_notes:
  revision_awareness: El expediente inglés pasó por una corrección que osciló entre «the Christ» y «the Messiah»; la fijación final volvió a «Messiah» por política terminológica. Esta draft española sigue esa decisión final y la vuelve explícita con «Mesías».
  spanish_consistency_notes:
  - Se usa «Mesías» en el texto principal para Χριστός según la convención del proyecto.
  - Se mantiene la elipsis de la respuesta («De David») sin expandirla a «Hijo de David», porque el griego no repite el sustantivo.
  - El registro es sobrio y de lectura eclesial amplia, evitando calcos rígidos pero sin parafrasear.
