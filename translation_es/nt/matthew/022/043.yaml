translation:
  language: es
  text: 'Él les dijo[a]: «¿Cómo, pues, David, en el Espíritu, lo llama Señor[b], diciendo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el Espíritu». La frase griega puede expresar esfera o agencia; «en el Espíritu» sigue más de cerca la forma del texto.
    reason: lexical_alternative
  - marker: b
    text: O «lo llama maestro». El término griego es κύριος, que normalmente se traduce «Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτοῖς
  english_pob_choice: He said to them
  chosen_spanish: Él les dijo
  alternatives_spanish:
  - Les dice
  lexicon: BDAG
  rationale: El presente histórico griego puede verterse naturalmente al pasado simple en español narrativo, sin perder la función discursiva de introducir la pregunta de Jesús.
- source_word: Πῶς οὖν
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, pues?
  alternatives_spanish:
  - ¿Cómo entonces?
  - ¿Cómo, pues, ...?
  lexicon: BDAG
  rationale: Conserva la fuerza interrogativa de πῶς y el matiz consecutivo de οὖν. En español, «pues» suena natural y fiel en una pregunta directa.
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - por el Espíritu
  - en espíritu
  lexicon: BDAG
  rationale: Se mantiene la preposición y el sustantivo de modo cercano al griego. La mayúscula señala que el referente es el Espíritu Santo, siguiendo la lectura auditada del POB en inglés.
- source_word: καλεῖ αὐτὸν κύριον
  english_pob_choice: call him Lord
  chosen_spanish: lo llama Señor
  alternatives_spanish:
  - lo llama maestro
  - lo llama dueño
  lexicon: BDAG
  rationale: κύριος se traduce aquí como «Señor», preservando el valor titular y la carga cristológica del argumento. «Señor» es también el equivalente natural y reconocido en español para este contexto escritural.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  lexicon: BDAG
  rationale: Participio sencillo que enlaza de forma directa con la cita siguiente sin añadir expansión interpretativa.
theological_decisions:
- issue: Sentido de ἐν πνεύματι
  english_pob_reading: the Holy Spirit is intended
  chosen_spanish_reading: el Espíritu Santo es el referente
  alternative_spanish_readings:
  - David habló en su propio espíritu
  - David habló en un estado espiritual
  rationale: En este contexto Jesús apela a la Escritura inspirada; por eso «en el Espíritu» comunica mejor la agencia/sfera del Espíritu Santo que una lectura meramente interior o psicológica.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Traducción de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En este pasaje la palabra funciona como título y enlaza con el argumento mesiánico y con el texto citado del salmo. «Señor» conserva tanto el sentido léxico como la fuerza intertextual.
  doctrine_reference: 'Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje de referencia; el borrador sigue la lectura auditada de alta concordancia y conserva las decisiones léxicas y teológicas del inglés POB, ajustándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Espíritu» va con mayúscula por el referente al Espíritu Santo, coherente con la decisión auditada.
  - «Señor» se usa como título cristológico y bíblico; no se sustituye por «maestro» en el texto principal.
  - La estructura de la pregunta conserva el orden y la relación lógica del griego sin sobreexplicarla.
