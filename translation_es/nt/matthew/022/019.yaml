translation:
  language: es
  text: Muéstrenme la moneda[a] del impuesto. Y ellos le trajeron un denario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el impuesto del censo» o «el impuesto de capitación» para κῆνσος, un impuesto romano imperial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδείξατέ
  english_pob_choice: Show me
  chosen_spanish: Muéstrenme
  alternatives_spanish:
  - Enséñenme
  - Muéstrenme para ver
  lexicon: BDAG
  rationale: El imperativo aoristo plural pide que presenten el objeto para inspección. «Muéstrenme» conserva el valor visual de ἐπιδείκνυμι y suena natural en español actual.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma directa con «me»; añadir «a mí» sería más enfático de lo que exige el griego.
- source_word: νόμισμα
  english_pob_choice: coin
  chosen_spanish: moneda
  alternatives_spanish:
  - moneda acuñada
  - pieza de moneda
  lexicon: BDAG
  rationale: νόμισμα designa una pieza monetaria circulante. «Moneda» es el equivalente natural en español y mantiene la referencia concreta que luego se especifica como un denario.
- source_word: τοῦ κήνσου
  english_pob_choice: for the tax
  chosen_spanish: del impuesto
  alternatives_spanish:
  - del impuesto del censo
  - del tributo
  - del impuesto de censo
  lexicon: BDAG
  rationale: κῆνσος es un préstamo latino que alude al impuesto romano en discusión. «Del impuesto» conserva la referencia sin sobreespecificar en el texto principal; las alternativas reflejan matices posibles del término.
- source_word: προσήνεγκαν
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - presentaron
  - llevaron
  lexicon: BDAG
  rationale: El aoristo de προσφέρω en esta escena narrativa se expresa de manera idiomática con «trajeron». Mantiene la acción concreta de llevar el objeto a Jesús.
- source_word: δηνάριον
  english_pob_choice: a denarius
  chosen_spanish: un denario
  alternatives_spanish:
  - un denario romano
  lexicon: BDAG
  rationale: δηνάριον nombra una moneda específica; transliterarla como «denario» preserva la precisión histórica y la conexión con el contexto monetario romano.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés, pero adapta la primera cláusula al español con plural de cortesía natural («Muéstrenme»). Se preserva la distinción entre la moneda genérica y la moneda específica («denario») sin añadir explicaciones innecesarias al texto principal.
  spanish_consistency_notes:
  - Se usa «impuesto» para κῆνσος, coherente con la elección inglesa de evitar una sobreespecificación en el cuerpo principal.
  - Se mantiene «denario» como transliteración estable para δηνάριον.
  - No se introduce «SEÑOR» ni terminología teológica ajena al versículo.
  - La puntuación separa con claridad las dos cláusulas narrativas siguiendo el griego.
