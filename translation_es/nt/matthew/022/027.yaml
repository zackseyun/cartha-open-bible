  source_alignment_summary: 'El borrador refleja bien el sentido del griego: ὕστερον δὲ πάντων se resume naturalmente como «Por último», ἀπέθανεν como «murió», y ἡ γυνή como «la mujer». No hay pérdida sustancial de contenido.'
