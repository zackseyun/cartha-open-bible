translation:
  language: es
  text: Por último[a], murió la mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Finalmente». El griego puede leerse como «Después, por último, murió la mujer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  english_pob_choice: Last
  chosen_spanish: Por último
  alternatives_spanish:
  - Después
  - Finalmente
  - Al final
  lexicon: BDAG
  rationale: En la expresión con πάντων, ὕστερον funciona idiomáticamente como cierre secuencial. «Por último» reproduce ese valor de culminación con naturalidad en español y conserva el tono de resumen temporal.
- source_word: δὲ
  english_pob_choice: of all,
  chosen_spanish: (integrado en «Por último» y la pausa de la oración)
  alternatives_spanish:
  - y
  - pero
  - entonces
  lexicon: BDAG
  rationale: δέ es un conector suave. En español no requiere un equivalente explícito aquí; queda absorbido por la construcción idiomática de cierre temporal, como en la decisión inglesa.
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: por último
  alternatives_spanish:
  - de todos
  - al final de todos
  lexicon: BDAG
  rationale: Con ὕστερον forma la idea idiomática de «lo último de todos / por último». En español, expresar literalmente «de todos» sonaría pesado; la frase elegida comunica el mismo cierre narrativo.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: BDAG
  rationale: El aoristo presenta el hecho de la muerte sin matiz añadido. «Murió» es la equivalencia directa, sobria y no eufemística, adecuada al registro del relato.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa». Aquí se conserva «la mujer» porque sigue de cerca el griego y evita introducir una relación posesiva que el texto no explicita en esta frase aislada.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden en el valor idiomático de ὕστερον πάντων como cierre secuencial. La versión española mantiene esa fuerza con una formulación natural y directa, sin añadir interpretación narrativa ni suavizar el verbo de muerte.
  spanish_consistency_notes:
  - Se usa «mujer» y no «esposa» para mantener la ambigüedad lexical de γυνή en esta oración.
  - Se evita «SEÑOR» u otras decisiones teológicas no pertinentes, ya que el versículo no contiene vocabulario divino.
  - La nota al pie conserva la alternativa temporal documentada en la auditoría inglesa y la adapta a un español natural.
