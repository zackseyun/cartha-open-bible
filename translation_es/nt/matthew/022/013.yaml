translation:
  language: es
  text: 'Entonces el rey dijo a los sirvientes[a]: «Aten sus pies y sus manos y échenlo en las tinieblas exteriores. Allí habrá llanto y crujir de dientes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aten sus manos y sus pies y échenlo en la oscuridad de afuera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal natural en español para introducir el siguiente acto narrativo sin perder la secuencia.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el soberano
  - el gobernante
  lexicon: BDAG
  rationale: βασιλεύς se refiere de manera directa a un rey; 'rey' conserva la imagen real de la parábola.
- source_word: τοῖς διακόνοις
  english_pob_choice: the attendants
  chosen_spanish: a los asistentes
  alternatives_spanish:
  - a los servidores
  - a los sirvientes
  lexicon: BDAG
  rationale: διάκονος puede ser servidor, asistente o ministro; en este contexto de banquete, 'asistentes' comunica a quienes sirven al rey sin cargar con matices eclesiásticos.
- source_word: Δήσαντες
  english_pob_choice: Bind
  chosen_spanish: Aten
  alternatives_spanish:
  - Atojen
  - Binden
  lexicon: BDAG
  rationale: El participio aoristo funciona de modo imperatival junto con el mandato principal. En español, 'aten' expresa con claridad la orden y mantiene la fuerza directa del griego.
- source_word: αὐτοῦ πόδας καὶ χεῖρας
  english_pob_choice: his feet and hands
  chosen_spanish: sus pies y sus manos
  alternatives_spanish:
  - sus manos y sus pies
  lexicon: BDAG
  rationale: Se conserva el orden griego 'pies y manos' para respetar la forma del texto, aunque el español pudiera preferir el orden inverso.
- source_word: ἐκβάλετε αὐτὸν
  english_pob_choice: throw him out
  chosen_spanish: échenlo
  alternatives_spanish:
  - arrójenlo
  - expúlsenlo
  lexicon: BDAG
  rationale: ἐκβάλλω expresa expulsión violenta o enérgica. 'Échenlo' transmite la orden con naturalidad y mantiene la brusquedad del acto.
- source_word: εἰς τὸ σκότος τὸ ἐξώτερον
  english_pob_choice: into the outer darkness
  chosen_spanish: en las tinieblas exteriores
  alternatives_spanish:
  - en la oscuridad exterior
  - en la oscuridad de afuera
  lexicon: BDAG
  rationale: '''Tinieblas exteriores'' preserva la expresión mateana tradicional y el plural intensivo del griego, evitando resolver la imagen en una explicación doctrinal más estrecha.'
- source_word: ἐκεῖ
  english_pob_choice: In that place
  chosen_spanish: Allí
  alternatives_spanish:
  - En ese lugar
  - Ahí
  lexicon: BDAG
  rationale: El adverbio locativo se expresa de forma breve y natural; el contexto ya determina el lugar al que se ha arrojado al hombre.
- source_word: ἔσται
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - será
  lexicon: BDAG
  rationale: Futuro de εἰμί en una construcción existencial. 'Habrá' es la equivalencia española más natural.
- source_word: ὁ κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - llanto y lágrimas
  - gemido
  lexicon: BDAG
  rationale: κλαυθμός puede abarcar llanto, lamento o gemido. 'Llanto' es idiomático y mantiene el tono de duelo y aflicción.
- source_word: ὁ βρυγμὸς τῶν ὀδόντων
  english_pob_choice: gnashing of teeth
  chosen_spanish: crujir de dientes
  alternatives_spanish:
  - rechinar de dientes
  - crujido de dientes
  lexicon: BDAG
  rationale: El modismo se vierte con una forma española tradicional y comprensible. 'Crujir de dientes' conserva la expresión figurada sin añadir interpretación.
theological_decisions:
- issue: Imagen de exclusión y juicio
  english_pob_reading: Retain the concrete metaphorical language of expulsion into 'the outer darkness' without interpreting it in the translation as hell, final judgment, or mere social shame.
  chosen_spanish_reading: Mantener la imagen concreta de expulsión a las 'tinieblas exteriores' sin identificarla en la traducción como infierno, juicio final o simple vergüenza social.
  alternative_spanish_readings:
  - Expulsarlo al infierno
  - Reducirlo a una expulsión del banquete
  rationale: El griego presenta una imagen de juicio vívida dentro de la parábola. La traducción debe conservar esa tensión sin cerrarla con una interpretación doctrinal que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del POB inglés que prefirió 'Bind' en lugar de 'Tie', y conserva la expresión fija 'outer darkness' con una equivalencia española transparente. También respeta la observación auditada sobre la posible inversión de 'hands and feet' frente a 'feet and hands'.
  spanish_consistency_notes:
  - Se mantiene 'rey' para βασιλεύς y 'asistentes' para διάκονος, evitando 'siervos' o 'ministros' por razones contextuales.
  - '''Tinieblas exteriores'' conserva la imaginería mateana y evita suavizar el tono de juicio.'
  - El modismo 'crujir de dientes' se eligió por su naturalidad y por ser un equivalente español establecido del griego idiomático.
