review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego: una pregunta dirigida a Jesús sobre cuál mandamiento ocupa el primer lugar dentro de la Ley. Sin embargo, se aparta del matiz léxico auditado en dos puntos: «qué» debilita la idea de selección dentro de un conjunto mejor expresada por ποία, y «el más grande» suena menos idiomático en español bíblico-jurídico que «el mayor» para rango/prioridad entre mandamientos.'
  spanish_quality_summary: «Maestro» y «mandamiento» son naturales y fieles. «En la Ley» está bien capitalizado. La frase actual es comprensible, pero «¿cuál mandamiento es el mayor en la Ley?» o mejor aún «¿cuál es el mayor mandamiento en la Ley?» suena más natural y claro en español general eclesial. La nota al pie actual no ayuda mucho y además no refleja bien la alternativa auditada en inglés.
  glossary_alignment: 'Alinea bien con los términos del proyecto en este versículo: no hay conflicto con nombres divinos ni títulos mesiánicos. «Maestro» para Διδάσκαλε y «mandamiento» para ἐντολή son adecuados. Conviene ajustar ποία a «cuál» y μεγάλη a «mayor» para conservar mejor la identificación dentro de un conjunto y la noción de primacía en español.'
  issues:
  - severity: medium
    issue: «qué mandamiento» para ποία
    rationale: Aunque es posible en español, ποία aquí pide identificar uno dentro de un conjunto definido. «Cuál» refleja mejor ese valor interrogativo selectivo y se alinea más estrechamente con la decisión inglesa «which».
  - severity: medium
    issue: «el más grande» para μεγάλη
    rationale: En contexto la pregunta es de rango o prioridad, no de tamaño. «El mayor» es más idiomático y preciso en español para mandamientos; evita una literalidad poco natural de «grande».
  - severity: low
    issue: Nota al pie mal formulada y poco útil
    rationale: 'La nota actual repite casi lo mismo y omite la alternativa relevante auditada: conservar la forma positiva del griego («grande») frente a la lectura idiomática de primacía. Debe reformularse para aportar valor real.'
