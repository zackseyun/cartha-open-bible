translation:
  language: es
  text: Maestro[a], ¿cuál es el mayor mandamiento en la Ley?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿cuál mandamiento es grande en la Ley?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro
  - Docente
  lexicon: BDAG
  rationale: En vocativo, διδάσκαλε es una forma de trato dirigida a Jesús. En español, «Maestro» comunica de forma natural la relación de discípulo y maestro sin la carga jerárquica de «Señor» o «Dueño».
- source_word: ποία
  english_pob_choice: which
  chosen_spanish: qué
  alternatives_spanish:
  - cuál
  - qué clase de
  lexicon: BDAG
  rationale: La pregunta pide identificar un mandamiento dentro de un conjunto. En español, «qué» suena más natural en una pregunta directa y mantiene el valor interrogativo de identificación.
- source_word: ἐντολὴ
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  lexicon: BDAG
  rationale: En el contexto de la Ley mosaica, ἐντολή se refiere a un mandato normativo. «Mandamiento» conserva bien el campo legal y bíblico en español.
- source_word: μεγάλη
  english_pob_choice: great / greatest
  chosen_spanish: el más grande
  alternatives_spanish:
  - grande
  - el mayor
  - el principal
  lexicon: BDAG
  rationale: El griego usa el adjetivo en forma positiva, pero el sentido pragmático de la pregunta es de rango entre mandamientos. En español, «el más grande» expresa esa comparación implícita sin perder la tensión documentada entre la forma griega y el sentido contextual.
- source_word: ἐν τῷ νόμῳ
  english_pob_choice: in the Law
  chosen_spanish: en la Ley
  alternatives_spanish:
  - en la ley
  - en la Torá
  lexicon: BDAG
  rationale: νόμος aquí designa la Ley de Moisés. «Ley» con mayúscula mantiene el referente bíblico-jurídico y es más accesible que «Torá» para una lectura eclesial amplia.
theological_decisions:
- issue: Cómo reflejar la comparación implícita de μεγάλη sin borrar la forma griega positiva
  english_pob_reading: great / greatest
  chosen_spanish_reading: el más grande
  alternative_spanish_readings:
  - grande
  - el mayor
  rationale: La pregunta no solo busca un mandamiento importante, sino el de mayor rango entre los mandamientos de la Ley. «El más grande» preserva la fuerza contextual de primacía y reconoce la tensión entre la forma griega y el sentido idiomático.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El contexto editorial inglés pasó de «is great» a «is greatest» para captar mejor el valor idiomático. La versión española sigue ese ajuste, pero conserva una redacción que no sobresatura el comparativo griego y deja visible la posibilidad alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Maestro» para διδάσκαλε, coherente con el tratamiento directo a Jesús en contexto narrativo.
  - Se usa «mandamiento» y «Ley» con mayúscula para mantener el marco judío-bíblico del pasaje.
  - Se evita «Cristo» u այլ terminología no presente en el versículo.
  - La nota a preserva la alternativa más literal sin alterar el texto principal.
