translation:
  language: es
  text: 'Entonces les dice a sus siervos: «El banquete de bodas está listo, pero los que habían sido invitados[a] no eran dignos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los que habían sido llamados». El participio griego puede verterse más literalmente así, pero en este contexto de banquete se refiere a los invitados a la boda.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal de secuencia narrativa; 'Entonces' mantiene el avance del relato con naturalidad en español y conserva el valor de transición.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico. 'Dice' preserva esa viveza narrativa mejor que un pasado simple.
- source_word: δούλοις
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: BDAG
  rationale: δοῦλος tiene fuerza léxica de esclavo; la guía POB pide normalmente 'esclavo' cuando el inglés eligió 'slave'. En esta parábola, aunque el oficio es cortesano, se conserva la dureza del término original sin suavizarlo a 'siervos'.
- source_word: Ὁ μὲν γάμος
  english_pob_choice: The wedding feast
  chosen_spanish: El banquete de bodas
  alternatives_spanish:
  - La boda
  - La fiesta de bodas
  - El banquete nupcial
  lexicon: BDAG
  rationale: γάμος puede referirse al festejo o banquete de bodas, no solo al acto matrimonial. 'Banquete de bodas' expresa mejor el contexto de invitación y comida. La partícula μὲν queda reflejada por el contraste con 'pero' en la segunda cláusula.
- source_word: ἕτοιμός ἐστιν
  english_pob_choice: is ready
  chosen_spanish: está listo
  alternatives_spanish:
  - está preparado
  - ya está preparado
  lexicon: BDAG
  rationale: Predicado adjetival simple con cópula; 'está listo' es idiomático y fiel al sentido de disponibilidad/preparación.
- source_word: κεκλημένοι
  english_pob_choice: those who were invited
  chosen_spanish: los que habían sido invitados
  alternatives_spanish:
  - los llamados
  - los convidados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de καλέω puede leerse literalmente como 'llamados', pero en el contexto del banquete el sentido principal es 'invitados'. La forma en pasiva compuesta conserva el matiz de anterioridad sin imponer la ambigüedad de 'llamados' en el texto principal.
- source_word: ἄξιοι
  english_pob_choice: worthy
  chosen_spanish: dignos
  alternatives_spanish:
  - merecedores
  - aptos
  lexicon: BDAG
  rationale: ἄξιος abarca digno/fit/worthy. 'Dignos' preserva la evaluación moral y social de manera natural en español; 'merecedores' sonaría más interpretativo aquí.
theological_decisions:
- issue: 'Participio κεκλημένοι: ''llamados'' vs. ''invitados'''
  english_pob_reading: Render as 'those who were invited' and footnote the more literal 'those who were called.'
  chosen_spanish_reading: Principalmente 'los que habían sido invitados', con nota sobre 'los llamados'.
  alternative_spanish_readings:
  - los llamados
  - los convidados
  rationale: En este contexto inmediato el referente son los invitados al banquete, por lo que 'invitados' evita importar categorías teológicas posteriores de 'llamamiento' que el verso no exige. Se preserva la tensión lexical con una nota para auditar la opción más literal.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se registraron revisiones aplicadas y el consenso de revisión fue alto, con acuerdo total sobre la lectura contextual de ''invitados''.'
  spanish_consistency_notes:
  - Se mantiene 'esclavos' para δοῦλοι conforme al valor léxico fuerte del término y a la pauta POB de no suavizarlo sin razón contextual.
  - Se usa 'banquete de bodas' para γάμος, preservando el matiz festivo explícito en el contexto parenético.
  - La nota de 'llamados' conserva la alternativa literal sin desplazar el sentido principal de 'invitados'.
  - La puntuación y el registro buscan un español bíblico moderno, claro y publicable, sin calcos innecesarios.
