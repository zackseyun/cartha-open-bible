revisions:
- from: 'Entonces les dice a sus esclavos[a]: «El banquete de bodas está listo, pero los que habían sido invitados no eran dignos».'
  to: 'Entonces les dice a sus siervos: «El banquete de bodas está listo, pero los que habían sido invitados[a] no eran dignos».'
  rationale: Se cambia solo «esclavos» por «siervos» para ajustarse a la decisión contextual documentada para δούλοις y conservar un español eclesial natural. Se mantiene la nota en «invitados» porque preserva la alternativa literal «llamados» sin cargar el texto principal con una ambigüedad teológica innecesaria. No se requieren más cambios.
