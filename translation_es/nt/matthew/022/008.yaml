review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa, el presente histórico («dice»), el sentido de γάμος como festejo nupcial y la evaluación «no eran dignos». También preserva correctamente la nota de alternativa para κεκλημένοι como «llamados». Sin embargo, se aparta del rastro auditado del POB en δούλοις: el inglés documentó explícitamente «servants» por contexto parabólico-cortesano, mientras que el español cambió a «esclavos», introduciendo una dureza léxica que aquí no es la decisión auditada.'
  spanish_quality_summary: El español es claro y natural, pero «les dice a sus esclavos» suena más áspero de lo que pide el contexto de la parábola. «A sus siervos» o «a sus sirvientes» leen con mayor naturalidad eclesial; «siervos» mantiene un registro digno y encaja mejor con la decisión contextual del inglés. El resto del versículo está bien formulado y no requiere cambios.
  glossary_alignment: 'Hay una excepción justificada al valor por defecto de δοῦλος -> «esclavo»: en este versículo el paquete fuente y las decisiones léxicas inglesas documentan que el estatus servil no es lo salientado, sino el papel de asistentes del rey en una parábola de banquete. Por eso corresponde «siervos» en español aquí. «Banquete de bodas», «invitados» y «dignos» se alinean bien con la terminología y la racionalidad documentada.'
  issues:
  - severity: medium
    issue: δούλοις se tradujo como «esclavos» en vez de una forma contextual equivalente a «servants».
    rationale: La auditoría inglesa eligió «servants» de manera explícita por el marco parabólico-cortesano. En español, «esclavos» intensifica el matiz de servidumbre y no preserva la decisión contextual auditada. «Siervos» transmite mejor la función narrada sin introducir una dureza adicional.
