translation:
  language: es
  text: De estos dos mandamientos dependen toda la Ley y los Profetas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «En estos dos mandamientos … cuelga». El griego usa ἐν («en») con el verbo «colgar», pero en español «depender de» expresa de manera más natural la misma idea de dependencia; «la Ley y los Profetas» resume el testimonio escritural en su conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταύταις ταῖς δυσὶν ἐντολαῖς
  english_pob_choice: On these two commandments
  chosen_spanish: En estos dos mandamientos[a]
  alternatives_spanish:
  - Sobre estos dos mandamientos
  - En estos dos preceptos
  lexicon: BDAG
  rationale: El griego usa ἐν (‘en’) con dativo para expresar la relación de apoyo o dependencia. En español, la estructura natural y fiel es ‘en estos dos mandamientos’, que mantiene la preposición del original; la nota explica que la metáfora sigue siendo de sostén, no de localización física.
- source_word: ὅλος ὁ νόμος
  english_pob_choice: the whole Law
  chosen_spanish: toda la Ley
  alternatives_spanish:
  - la Ley entera
  - toda la ley
  lexicon: BDAG
  rationale: ὅλος con νόμος singular expresa totalidad. ‘Toda la Ley’ conserva esa fuerza y resulta natural en español; la mayúscula en ‘Ley’ mantiene la referencia corpuscular al Torah/cuerpo legal bíblico, siguiendo el criterio auditado en inglés.
- source_word: κρέμαται
  english_pob_choice: hang
  chosen_spanish: se sostiene
  alternatives_spanish:
  - está suspendida
  - cuelga
  lexicon: BDAG
  rationale: El verbo significa literalmente ‘cuelga’, pero en español ‘colgar’ suena torpe aplicado a ‘la Ley y los Profetas’. ‘Se sostiene’ conserva la idea de dependencia/apoyo implícita en la metáfora y evita una imagen extraña, sin borrar el vínculo con el original; se documenta la alternativa literal en la nota.
- source_word: καὶ οἱ προφῆται
  english_pob_choice: and the Prophets
  chosen_spanish: y los Profetas
  alternatives_spanish:
  - y los profetas
  lexicon: BDAG
  rationale: Se trata de la fórmula estable ‘la Ley y los Profetas’, referencia canónica al testimonio escritural. La mayúscula en ‘Profetas’ refleja ese uso técnico, no una simple clase de personas.
theological_decisions:
- issue: Sentido de la fórmula 'la Ley y los Profetas'
  english_pob_reading: A reference to the scriptural/covenantal witness as a whole, summarized as dependent on the two love commandments
  chosen_spanish_reading: Referencia al testimonio escritural y pactal en su conjunto, resumido y sostenido por estos dos mandamientos de amor
  alternative_spanish_readings:
  - Solo una referencia a enseñanza ética legal y profética
  - Una paráfrasis como 'toda la Escritura'
  rationale: En Mateo, la fórmula es una expresión fija que abarca el corpus bíblico autorizado. Mantenerla visible en español preserva su resonancia canónica y evita reducirla a una simple suma de normas morales.
  doctrine_reference: Mt 5:17; Mt 7:12; Ro 13:8-10
translation_notes:
  revision_awareness: El estado de revisión más reciente indica que no se requirieron cambios y que hubo pleno acuerdo en la revisión cruzada; por eso el borrador sigue de cerca la lectura auditada en inglés, ajustando solo la idiomaticidad natural del español sin alterar el valor metafórico ni la fórmula canónica.
  spanish_consistency_notes:
  - Se usa ‘Ley’ y ‘Profetas’ con mayúscula como fórmula bíblica fija.
  - Se conserva ‘mandamientos’ para reflejar ἐντολαῖς y no se sustituye por un término más general.
  - La metáfora de κρέμαται se expresa de modo natural en español, pero queda documentada la alternativa literal.
  - El texto evita ‘SEÑOR’ u otras sustituciones innecesarias; aquí no aparece el nombre divino ni κύριος.
