revisions:
- from: En estos dos mandamientos[a] se sostiene toda la Ley y los Profetas[b].
  to: De estos dos mandamientos dependen toda la Ley y los Profetas[a].
  rationale: Se ajusta el verbo y la construcción preposicional para expresar con fidelidad y naturalidad la relación de dependencia de κρέμαται, manteniendo intacta la fórmula canónica «la Ley y los Profetas». La nota preserva la imagen literal griega y explica la decisión idiomática en español.
  reviewer_model: gpt-5.4
