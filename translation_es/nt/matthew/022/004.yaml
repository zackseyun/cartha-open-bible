translation:
  language: es
  text: 'Otra vez envió a otros esclavos[a], diciendo: «Digan a los invitados: “Miren, he preparado mi banquete[b]; mis bueyes y mis reses cebadas han sido degollados, y todo está listo. Vengan al banquete de bodas[c]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otros siervos». El griego doulous puede significar «siervos» o «esclavos» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «mi comida»; el griego se refiere a una comida preparada.
    reason: lexical_alternative
  - marker: c
    text: O simplemente «a la boda»; el griego plural puede referirse al conjunto de las celebraciones nupciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: BDAG
  rationale: Marca la acción repetida de forma natural en español narrativo; evita un giro demasiado literal y conserva el valor adverbial de reiteración.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: Verbo narrativo simple y directo que reproduce bien el aoristo de enviar sin añadir matiz técnico.
- source_word: ἄλλους δούλους
  english_pob_choice: other slaves
  chosen_spanish: otros esclavos
  alternatives_spanish:
  - otros siervos
  - otros servidores
  lexicon: BDAG
  rationale: Se mantiene el valor fuerte de δοῦλος con 'esclavos', coherente con la decisión POB en un contexto de casa real y autoridad vinculante.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y les dijo
  - con estas palabras
  lexicon: BDAG
  rationale: Introduce de manera natural el contenido del mensaje en español.
- source_word: Εἴπατε τοῖς κεκλημένοις
  english_pob_choice: Tell those who have been invited
  chosen_spanish: Digan a los invitados
  alternatives_spanish:
  - Digan a los que han sido invitados
  - Digan a los convocados
  lexicon: BDAG
  rationale: El participio perfecto pasivo sugiere personas ya invitadas; 'los invitados' comunica en español el estado resultante sin sobrecargar la frase.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren aquí
  lexicon: BDAG
  rationale: Partícula deíctica de atención; 'Miren' es natural, claro y conserva la fuerza discursiva.
- source_word: τὸ ἄριστόν μου
  english_pob_choice: my dinner
  chosen_spanish: mi comida
  alternatives_spanish:
  - mi cena
  - mi banquete
  lexicon: BDAG
  rationale: Ἄριστον refiere a una comida preparada; 'mi comida' evita especificar indebidamente una comida del día y conserva la referencia a un alimento/banquete ya listo.
- source_word: ἡτοίμακα
  english_pob_choice: I have prepared
  chosen_spanish: he preparado
  alternatives_spanish:
  - he dejado listo
  - he dispuesto
  lexicon: BDAG
  rationale: El perfecto expresa una preparación completada con relevancia presente; el pretérito perfecto español lo refleja de manera natural.
- source_word: οἱ ταῦροί μου
  english_pob_choice: my oxen
  chosen_spanish: mis toros
  alternatives_spanish:
  - mis bueyes
  - mis reses
  lexicon: BDAG
  rationale: ταῦροι son bovinos machos; 'toros' es más directo que 'bueyes' y mantiene el referente animal sin domesticarlo demasiado.
- source_word: τὰ σιτιστὰ
  english_pob_choice: my fattened cattle
  chosen_spanish: mis animales cebados
  alternatives_spanish:
  - mis reses cebadas
  - mis animales engordados
  lexicon: BDAG
  rationale: Evita añadir una especie no explícita en el griego. 'Cebados' comunica la idea de animales engordados especialmente para el banquete.
- source_word: τεθυμένα
  english_pob_choice: have been slaughtered
  chosen_spanish: han sido sacrificados
  alternatives_spanish:
  - han sido degollados
  - han sido matados
  lexicon: BDAG
  rationale: En español, 'sacrificados' expresa la acción de matar animales preparados para comer; aunque puede sugerir un matiz ritual, aquí sigue siendo compatible con el contexto de banquete y resulta idiomático.
- source_word: καὶ πάντα ἕτοιμα
  english_pob_choice: and everything is ready
  chosen_spanish: y todo está listo
  alternatives_spanish:
  - y todo está preparado
  - y ya está todo listo
  lexicon: BDAG
  rationale: Frase natural que conserva la totalidad de πάντα y el estado resultante de ἕτοιμα.
- source_word: δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan aquí
  - Acudan
  lexicon: BDAG
  rationale: Imperativo plural de invitación; 'Vengan' funciona bien en español contemporáneo y mantiene el llamado directo.
- source_word: εἰς τοὺς γάμους
  english_pob_choice: to the wedding feast
  chosen_spanish: a la boda
  alternatives_spanish:
  - al banquete de bodas
  - a las bodas
  lexicon: BDAG
  rationale: El plural puede referirse a las celebraciones nupciales como conjunto; 'la boda' es natural en español y permite ese sentido amplio sin recargar la frase.
theological_decisions:
- issue: δοῦλος en un contexto de parábola real
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: Se preserva el valor social fuerte de δοῦλος. En esta escena de un rey que manda mensajeros, 'esclavos' refleja mejor la relación de autoridad que una solución suavizada como 'siervos'.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: τὰ σιτιστὰ y τεθυμένα en una escena de banquete
  english_pob_reading: my fattened cattle have been slaughtered
  chosen_spanish_reading: mis animales cebados han sido sacrificados
  alternative_spanish_readings:
  - mis animales cebados han sido sacrificados para comer
  - mis reses cebadas han sido sacrificadas
  rationale: Se evita especificar 'calves' o introducir una especie no atestiguada. 'Sacrificados' se mantiene como traducción idiomática de la muerte de animales preparados para la comida, sin imponer un sentido cultual ajeno al contexto.
  doctrine_reference: BDAG on σιτιστός and θύω; POB audit trail revision pass
translation_notes:
  revision_awareness: El registro inglés fue revisado desde 'fattened calves' a 'fattened cattle' para no especificar 'calves' más allá del griego. La versión española sigue esa revisión evitando una especie no explícita y manteniendo la idea de animales cebados listos para el banquete.
  spanish_consistency_notes:
  - Se conservó 'esclavos' para δοῦλος conforme a la terminología POB, en lugar de suavizarla a 'siervos'.
  - Se eligió 'mi comida' / 'a la boda' por fluidez natural en español, pero con notas alternativas para reflejar que el griego apunta a una comida preparada y a las celebraciones nupciales en plural.
  - Se mantuvo 'sacrificados' como opción idiomática para θύω en contexto de alimentos, con nota alternativa para 'preparados' y sin cargar la escena con un sentido ritual no requerido.
