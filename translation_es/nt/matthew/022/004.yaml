review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte el sentido del griego y la línea del POB inglés: acción repetida, envío de otros esclavos, preparación completada del convite, animales ya muertos, todo listo, e invitación final. Sin embargo, hay dos desviaciones relevantes: «han sido sacrificados» para τεθυμένα introduce con más fuerza un matiz cultual que el contexto de banquete no pide, y «a la boda» reduce el matiz de γάμους como celebraciones/b banquete nupcial, que el POB inglés explicitó como «wedding feast».'
  spanish_quality_summary: 'El texto es legible y natural, pero puede mejorarse para mayor precisión y fluidez eclesial. «Mi comida» funciona, aunque en este contexto «mi banquete» suena más idiomático y digno en español sin perder la distinción con la invitación final. «Mis animales cebados» es comprensible, pero «mis reses cebadas» encaja mejor con la pareja «bueyes/reses» y con el registro. La nota [c] actual además está mal alineada: comenta «todo está preparado» en lugar de la alternativa documentada para γάμους.'
  glossary_alignment: Se alinea bien con el proyecto en «esclavos» para δοῦλος. No hay términos teológicos mayores en conflicto. Sí conviene ajustar θύω a «degollados» o «matados para el banquete» en vez de «sacrificados», y reflejar γάμους como «banquete de bodas» o mantener nota sobre «las bodas».
  issues:
  - severity: high
    issue: «han sido sacrificados» para τεθυμένα
    rationale: θύω aquí se refiere a animales muertos para la comida del banquete, no a sacrificio cultual. «Sacrificados» en español tiende a activar un matiz ritual no deseado; «degollados» o «han sido matados» preserva mejor el contexto.
  - severity: high
    issue: «Vengan a la boda» para εἰς τοὺς γάμους
    rationale: El plural γάμους en este contexto apunta a las celebraciones nupciales/banquete. El POB inglés lo tradujo «to the wedding feast» y conservó nota alternativa «to the wedding». En español, «a la boda» estrecha el sentido y pierde la dimensión festiva.
  - severity: medium
    issue: La nota [c] está anclada en «listo» pero comenta una alternativa para καὶ πάντα ἕτοιμα, no para γάμους
    rationale: El rastro de auditoría inglés preserva la nota alternativa en la frase final («to the wedding»). En español la nota debería acompañar «banquete de bodas» o «las bodas», no «todo está listo».
  - severity: low
    issue: «mis toros» puede sonar menos idiomático que «mis bueyes» en esta colocación festiva
    rationale: Aunque ταῦροι puede referirse a bovinos machos y «toros» no es imposible, «bueyes» es una formulación bíblica y natural en español para este tipo de lista alimentaria.
  - severity: low
    issue: «mi comida» es correcto pero algo plano para ἄριστον en un contexto real de bodas
    rationale: «Mi banquete» suena más natural y digno en español y coincide con la nota léxica inglesa que permitía «banquet» como alternativa.
