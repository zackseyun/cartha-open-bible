  to: 'Otra vez envió a otros esclavos[a], diciendo: «Digan a los invitados: “Miren, he preparado mi banquete[b]; mis bueyes y mis reses cebadas han sido degollados, y todo está listo. Vengan al banquete de bodas[c]”».'
  rationale: Se corrigió «sacrificados» a «degollados» para evitar un matiz cultual impropio de τεθυμένα en contexto de banquete. Se cambió «a la boda» por «al banquete de bodas» para reflejar mejor εἰς τοὺς γάμους y alinear la nota alternativa con el lugar correcto. También se ajustó «mi comida» a «mi banquete» y «toros / animales cebados» a «bueyes / reses cebadas» para un español más natural y digno sin apartarse del sentido fuente.
