lexical_decisions:
- source_word: Δευτέρα
  english_pob_choice: a second
  chosen_spanish: un segundo mandamiento
  alternatives_spanish:
  - el segundo mandamiento
  - un segundo
  lexicon: BDAG
  rationale: El griego usa un adjetivo ordinal en femenino sustantivado que, por el contexto, introduce el segundo mandamiento. En español, ‘un segundo mandamiento’ comunica con naturalidad el valor ordinal y mantiene el sustantivo implícito sin perder claridad.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: δέ aquí enlaza el enunciado con el anterior sin oposición fuerte; ‘Y’ conserva la continuidad discursiva en español.
- source_word: ὁμοία αὐτῇ
  english_pob_choice: is like it
  chosen_spanish: semejante a ésta
  alternatives_spanish:
  - es como ésta
  - es similar a ésta
  lexicon: BDAG
  rationale: ὁμοία con dativo expresa semejanza respecto del mandamiento previo. ‘Semejante a ésta’ preserva la relación comparativa y mantiene el referente femenino implícito (‘mandamiento’) que el español permite recuperar naturalmente.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Deberás amar
  - Debes amar
  lexicon: BDAG
  rationale: El futuro con valor imperatival en la cita de la Escritura se expresa de forma directa con ‘Amarás’, que conserva el tono de mandato bíblico sin endurecerlo en una perífrasis menos natural.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - al que está cerca de ti
  lexicon: BDAG
  rationale: πλησίον en esta fórmula ética corresponde al prójimo en sentido relacional, no meramente espacial. ‘Prójimo’ es el equivalente español más fiel y ampliamente entendido en contexto bíblico.
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como a uno mismo
  - como a ti
  lexicon: BDAG
  rationale: La comparación ética estándar se expresa con ‘como a ti mismo’. La inserción de ‘a’ refleja el valor pronominal reflexivo con naturalidad en español y conserva el alcance normativo de la frase.
theological_decisions:
- issue: Relación entre el segundo mandamiento y el primero
  english_pob_reading: a second is like it
  chosen_spanish_reading: un segundo mandamiento, semejante a ésta
  alternative_spanish_readings:
  - el segundo es semejante a éste
  - un segundo es como éste
  rationale: La formulación mantiene la idea de similitud o correspondencia entre el segundo mandamiento y el primero, sin fusionarlos ni explicar más de lo que el griego dice. Se preserva la tensión teológica de que el segundo es comparable en clase o peso, no idéntico.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete auditado; se conserva el sentido estable del texto griego y la decisión inglesa ‘a second is like it’ como base de comparación.
  spanish_consistency_notes:
  - Se usa ‘prójimo’ para πλησίον, conforme al uso bíblico establecido y al registro de mandato ético.
  - Se conserva ‘Amarás’ para el futuro con fuerza imperativa, en paralelo al estilo scriptural del original.
  - El demostrativo femenino ‘ésta’ remite al mandamiento previo, manteniendo la referencia del griego αὐτῇ.
