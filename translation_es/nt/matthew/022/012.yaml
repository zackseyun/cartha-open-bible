revisions:
- from: 'Y le dice: «Amigo, ¿cómo entraste aquí sin traje de boda?». Pero quedó mudo[a].'
  to: 'Y le dice: «Amigo, ¿cómo entraste aquí sin vestidura de boda?» Pero quedó mudo[a].'
  rationale: Se ajusta «traje de boda» a «vestidura de boda» para reflejar mejor ἔνδυμα γάμου sin introducir una imagen demasiado moderna o específica. También se pule la puntuación de la cita. Se conserva «quedó mudo» con la nota léxica, ya que comunica bien el resultado y la nota preserva la alternativa más literal documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:17:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido del griego: «Amigo» para Ἑταῖρε, «¿cómo?» para πῶς, «entraste aquí» para εἰσῆλθες ὧδε, «sin» para μὴ ἔχων, y una nota adecuada para el trasfondo léxico de ἐφιμώθη. Sin embargo, «traje de boda» puede sonar demasiado específico o moderno en español, mientras que ἔνδυμα γάμου apunta más ampliamente a una prenda o vestidura de boda. También la puntuación actual coloca el punto fuera de la cita de modo algo innecesario en este contexto.'
  spanish_quality_summary: El español es claro y legible, pero «traje de boda» puede sugerir un conjunto formal masculino contemporáneo y limitar indebidamente el sentido de la prenda nupcial requerida. «Vestidura de boda» suena más digno, más amplio semánticamente y más cercano al original sin volverse arcaico. «Quedó mudo» es natural, aunque ligeramente más fuerte que «quedó sin palabras»; aun así es aceptable con la nota literal.
  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. La decisión «Amigo» concuerda con la racionalidad documentada para Ἑταῖρε. La nota sobre ἐφιμώθη preserva correctamente la alternativa más literal «fue silenciado» y el matiz de «amordazado». La revisión principal recomendada es léxica-estilística para ἔνδυμα γάμου: «vestidura de boda».'
  issues:
  - severity: medium
    issue: «traje de boda» sobreespecifica ἔνδυμα γάμου
    rationale: En español actual, «traje» suele evocar un terno/conjunto formal concreto, mientras que el griego habla de una prenda o vestidura apropiada para la boda sin precisar tipo. «Vestidura de boda» preserva mejor la amplitud semántica y el tono del pasaje.
  - severity: low
    issue: Puntuación de la cita mejorable
    rationale: «¿...?»» Pero... puede simplificarse a «¿...?» Pero...» sin el punto adicional tras la cita, lo que fluye mejor en español con estilo narrativo bíblico.
  revised_spanish_text: 'Y le dice: «Amigo, ¿cómo entraste aquí sin vestidura de boda?» Pero quedó mudo[a].'
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «fue silenciado». El verbo griego también puede significar «fue amordazado».
    reason: lexical_alternative
  revision_rationale: Se ajusta «traje de boda» a «vestidura de boda» para reflejar mejor ἔνδυμα γάμου sin introducir una imagen demasiado moderna o específica. También se pule la puntuación de la cita. Se conserva «quedó mudo» con la nota léxica, ya que comunica bien el resultado y la nota preserva la alternativa más literal documentada.
