translation:
  language: es
  text: 'Y le dice: «Amigo, ¿cómo entraste aquí sin vestidura de boda?» Pero quedó mudo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «fue silenciado». El verbo griego también puede significar «fue amordazado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑταῖρε
  english_pob_choice: Friend
  chosen_spanish: Amigo
  alternatives_spanish:
  - Compañero
  - Señor
  lexicon: BDAG
  rationale: El vocativo conserva un tono formal y algo distanciado; «Amigo» es natural en español y mantiene la ironía sin volverlo más hostil de lo que exige el griego.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: ¿cómo?
  alternatives_spanish:
  - ¿por qué?
  lexicon: BDAG
  rationale: La pregunta se refiere al modo o medio de entrada, no a la motivación; por eso «cómo» reproduce mejor el valor del adverbio.
- source_word: εἰσῆλθες ὧδε
  english_pob_choice: did you come in here
  chosen_spanish: entraste aquí
  alternatives_spanish:
  - viniste aquí
  - ingresaste aquí
  lexicon: BDAG
  rationale: El aoristo señala la acción completa de entrar; en español «entraste aquí» suena natural y conserva el sentido de ingreso al lugar.
- source_word: μὴ ἔχων
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - no teniendo
  lexicon: BDAG
  rationale: La construcción participial se expresa con naturalidad mediante «sin», preservando la circunstancia de carencia del vestido requerido.
- source_word: ἔνδυμα γάμου
  english_pob_choice: wedding garment
  chosen_spanish: traje de boda
  alternatives_spanish:
  - vestido de boda
  - ropa de boda
  - vestidura nupcial
  lexicon: BDAG
  rationale: «Traje de boda» comunica con claridad una prenda apropiada para la fiesta y evita especificar más de lo que el griego exige; mantiene la singularidad del ἔνδυμα.
- source_word: ἐφιμώθη
  english_pob_choice: was speechless
  chosen_spanish: quedó mudo
  alternatives_spanish:
  - fue silenciado
  - fue enmudecido
  lexicon: BDAG
  rationale: 'El pasivo de φιμόω puede significar «ser silenciado» y también tiene el matiz literal de «amordazar». En español, «quedó mudo» comunica con naturalidad el resultado: incapaz de responder.'
theological_decisions:
- issue: Tono del vocativo Ἑταῖρε
  english_pob_reading: A courteous but implicitly reproving 'Friend'
  chosen_spanish_reading: 'Un vocativo cortés, pero con reproche implícito: «Amigo»'
  alternative_spanish_readings:
  - «Compañero»
  - «Señor»
  rationale: El texto no obliga a una lectura doctrinalmente cargada; «Amigo» preserva la tensión narrativa sin añadir dureza ni afecto excesivo.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor de ἐφιμώθη
  english_pob_reading: Result-focused idiom 'was speechless' in the main text
  chosen_spanish_reading: 'Resultado centrado en la incapacidad de responder: «quedó mudo»'
  alternative_spanish_readings:
  - «fue silenciado»
  - «fue enmudecido»
  rationale: La traducción prioriza la comprensión natural en español y conserva el efecto del pasivo; la imagen más literal de «amordazar» queda implícita en el verbo griego sin forzarla en el texto principal.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al verbo «quedó mudo» con el marcador [a] en el texto principal. La redacción mantiene el sentido del auditable English POB y evita introducir una nota suelta.
  spanish_consistency_notes:
  - Se preserva el tono formal-distanciado del vocativo sin usar terminología eclesiástica tradicional no respaldada por el griego.
  - «Amigo» y «quedó mudo» son soluciones idiomáticas de español contemporáneo que mantienen la ironía y el efecto narrativo.
  - Se evita «SEÑOR» como sustituto de un vocativo no divino y no se introduce «Cristo» ni otros equivalentes no presentes en el verso.
