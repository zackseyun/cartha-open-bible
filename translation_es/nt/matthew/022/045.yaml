translation:
  language: es
  text: Si[a], pues, David lo llama Señor, ¿cómo es su hijo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente por el contexto: «Si, pues, David llama al Mesías “Señor”, ¿cómo es su hijo?»'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ οὖν
  english_pob_choice: If, then
  chosen_spanish: Si, pues
  alternatives_spanish:
  - Entonces, si
  - Si, por tanto
  lexicon: BDAG
  rationale: Conserva la fuerza condicional e inferencial de εἰ + οὖν sin volver la frase artificial en español. «Si, pues» mantiene la lógica argumentativa del dicho de Jesús.
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar.
- source_word: καλεῖ
  english_pob_choice: calls
  chosen_spanish: lo llama
  alternatives_spanish:
  - lo nombra
  - lo denomina
  lexicon: BDAG
  rationale: «Llama» conserva el sentido de καλέω como nombrar o designar. Se añade el pronombre átono «lo» para hacer natural la relación con el objeto directo en español.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre átono es la forma más natural en español para el objeto directo masculino singular.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor soberano
  - amo
  lexicon: BDAG
  rationale: En este contexto el título tiene carga honorífica y mesiánica. En español, «Señor» es la equivalencia más directa y reverente; «amo» rebajaría el tono y «Señor soberano» añade explicación no presente en el griego.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: BDAG
  rationale: «Cómo» reproduce la pregunta lógica del texto de forma idiomática y breve.
- source_word: υἱὸς αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  - el hijo de él
  lexicon: BDAG
  rationale: «Su hijo» preserva la relación filial y la tensión retórica del pasaje. «Descendiente» sería más interpretativo y debilitaría la forma directa de la pregunta.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  lexicon: BDAG
  rationale: Copulativo simple, mantenido de manera directa.
theological_decisions:
- issue: Tensión entre el título «Señor» y la filiación davídica
  english_pob_reading: Retain the wording 'Lord' and 'his son' without explanatory expansion.
  chosen_spanish_reading: Mantener «Señor» y «su hijo» sin expandir explícitamente «Mesías» en el texto principal.
  alternative_spanish_readings:
  - Si, pues, David llama al Mesías «Señor», ¿cómo es su hijo?
  rationale: 'La pregunta depende de conservar la tensión retórica: David llama a la persona «Señor», pero esa misma persona es presentada como su hijo. Añadir «Mesías» en el cuerpo principal resolvería la referencia, pero iría más allá de lo expresado en este versículo aislado.'
  doctrine_reference: Preservar la tensión teológica y cristológica sin resolverla en traducción.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; el texto principal ya contiene la forma suficiente para la publicación y no requiere marcador de nota.
  spanish_consistency_notes:
  - Se mantiene «Señor» como equivalente de κύριος, en línea con el criterio del proyecto para este título.
  - Se usa «hijo» y no «descendiente» para no debilitar la fuerza de la pregunta de Jesús.
  - La estructura «Si, pues» refleja la inferencia de εἰ οὖν sin sonar forzada en español.
