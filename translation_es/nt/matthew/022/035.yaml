review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido básico del griego: «Y», «uno de ellos», «le preguntó» y «poniéndolo a prueba» reflejan bien καὶ, εἷς ἐξ αὐτῶν, ἐπηρώτησεν y πειράζων. Sin embargo, la nota al pie no preserva correctamente la lógica del audit trail inglés: en el texto principal ya se puso «un experto en la Ley», pero la nota dice «O: “un experto en la Ley”», que repite el texto en vez de ofrecer la alternativa documentada. Debe invertirse: si el texto principal mantiene «un experto en la Ley», la nota debe dar como alternativa «abogado» u otra forma equivalente documentada.'
  spanish_quality_summary: El español es natural, claro y digno. «Poniéndolo a prueba» suena bien y evita el falso matiz de «tentándolo». «Un experto en la Ley» es más claro que «abogado» en contexto bíblico. El único problema real es la nota, que está mal formulada respecto al texto principal.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. La elección de «Ley» con mayúscula es defendible en referencia a la Ley judía/Mosaica. La decisión de evitar «abogado» en el texto principal, pero conservarlo como alternativa explicativa, está alineada con la justificación léxica documentada.
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en lugar de ofrecer una alternativa léxica real.
    rationale: El audit trail inglés usa texto principal «a lawyer» con nota «Or 'an expert in the law.'». En español, al haber elegido «un experto en la Ley» como texto principal, la nota debe conservar la alternativa correspondiente, no duplicar la lectura principal.
  revised_spanish_text: Y uno de ellos[a], un experto en la Ley, le preguntó, poniéndolo a prueba.
  revised_footnotes:
  - marker: a
    text: 'O: «un abogado». El término griego se refiere a un especialista en la ley judía.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel al griego y más claro para lectores hispanohablantes, y se corrige la nota para que preserve una alternativa léxica genuina conforme al audit trail inglés.
