translation:
  language: es
  text: Y uno de ellos[a], un experto en la Ley, le preguntó, poniéndolo a prueba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un experto en la Ley». El término griego se refiere a un especialista en la ley judía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conector narrativo simple. «Y» conserva el flujo del relato sin añadir un matiz temporal no explícito en el griego.
- source_word: ἐπηρώτησεν
  english_pob_choice: asked him
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le hizo una pregunta
  - lo interrogó
  lexicon: BDAG
  rationale: El verbo expresa preguntar/inquirir. «Le preguntó» es natural en español y mantiene el valor interrogativo sin cargar el verbo con la dureza de «interrogó».
- source_word: εἷς ἐξ αὐτῶν
  english_pob_choice: one of them
  chosen_spanish: uno de ellos
  alternatives_spanish:
  - uno entre ellos
  - uno de entre ellos
  lexicon: BDAG
  rationale: Expresión partitiva idiomática. «Uno de ellos» preserva la pertenencia al grupo ya mencionado.
- source_word: νομικὸς
  english_pob_choice: a lawyer
  chosen_spanish: un experto en la Ley
  alternatives_spanish:
  - un letrado
  - un jurista
  lexicon: BDAG
  rationale: En este contexto judío, el término apunta a un especialista en la Ley de Moisés. Se evita «abogado» por su asociación moderna con el derecho civil. La nota conserva la equivalencia alternativa que el audit trail inglés documenta.
- source_word: πειράζων
  english_pob_choice: testing
  chosen_spanish: poniéndolo a prueba
  alternatives_spanish:
  - probándolo
  - tentándolo
  lexicon: BDAG
  rationale: 'El participio indica la intención o el modo de la pregunta: se acerca a Jesús con actitud de prueba hostil. «Poniéndolo a prueba» comunica ese sentido mejor que «tentándolo», que en español suele sugerir incitación al pecado.'
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús. «Lo» es la forma natural en español para una referencia directa y clara.
theological_decisions:
- issue: Sentido de πειράζων respecto a Jesús
  english_pob_reading: testing him
  chosen_spanish_reading: poniéndolo a prueba
  alternative_spanish_readings:
  - tentándolo
  rationale: El griego puede significar probar, examinar o tentar. Aquí el contexto es una evaluación adversarial, no una invitación a pecar. «Poniéndolo a prueba» preserva esa tensión sin resolverla de manera artificial.
  doctrine_reference: Mantener la tensión exegética del texto; no suavizar el carácter hostil de la escena ni convertirla en una tentación moral en sentido estrecho.
translation_notes:
  revision_awareness: El texto corrige el problema de validación anterior al anclar la nota con el marcador [a] dentro de la traducción. Se mantiene la supresión de cualquier palabra no presente explícitamente en el griego, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Ley» con mayúscula para reflejar la referencia a la Ley mosaica en este contexto judío.
  - Se evita «Cristo» porque este versículo usa el pronombre referido a Jesús, no el título.
  - El participio se vierte como acción circunstancial en español («poniéndolo a prueba») para conservar el matiz aspectual sin sobretraducir.
