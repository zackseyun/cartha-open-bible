translation:
  language: es
  text: Porque en la resurrección[a] ni se casan ni son dados en matrimonio, sino que son como los ángeles de Dios en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al resucitar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ... τῇ ἀναστάσει
  english_pob_choice: in the resurrection
  chosen_spanish: en la resurrección
  alternatives_spanish:
  - en la resurrección final
  - en la resurrección de los muertos
  - en el tiempo de la resurrección
  lexicon: BDAG
  rationale: La preposición ἐν se conserva naturalmente con 'en', y ἀνάστασις se vierte como 'resurrección' sin añadir explicaciones que el griego no expresa. 'En la resurrección' comunica el estado/ámbito al que se refiere la frase, como en la auditoría inglesa.
- source_word: γαμοῦσιν
  english_pob_choice: marry
  chosen_spanish: se casan
  alternatives_spanish:
  - se casan en matrimonio
  - contraen matrimonio
  - se maridan
  lexicon: BDAG
  rationale: El verbo griego es general para casarse. En español, 'se casan' es idiomático, claro y no sobrecarga el texto con una formulación jurídica. Mantiene la fuerza del verbo sin introducir un matiz inexistente en el original.
- source_word: γαμίζονται
  english_pob_choice: are given in marriage
  chosen_spanish: se dan en matrimonio
  alternatives_spanish:
  - son entregados en matrimonio
  - son casados
  - son dados en matrimonio
  lexicon: BDAG
  rationale: El pasivo distinto de γαμοῦσιν conviene conservarlo diferenciadamente. 'Se dan en matrimonio' refleja la voz pasiva y mantiene la distinción entre casarse y ser dado en matrimonio, aunque en español puede sonar menos natural que otras opciones.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: Aquí ὡς introduce comparación, no identidad. 'Como' preserva esa relación comparativa y evita sugerir que los resucitados se convierten en ángeles.
- source_word: ἄγγελοι θεοῦ
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - ángeles de Dios
  - los mensajeros de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo θεοῦ explícitamente con 'de Dios'. 'Ángeles de Dios' es la forma más transparente y fiel al griego, y mantiene el referente celestial sin sustituirlo por un término más interpretativo.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo
  - en el ámbito celestial
  - en los cielos
  lexicon: BDAG
  rationale: Aunque 'en el cielo' puede sonar más general que 'en heaven', en español bíblico es la equivalencia natural para οὐρανός en este contexto. No se usa 'cielo' como clima o firmamento, sino como morada celestial, en línea con la decisión inglesa.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón del enunciado previo. 'Porque' preserva claramente la relación explicativa y es natural en español al comienzo de una cláusula.
theological_decisions:
- issue: Comparación con los ángeles y no identificación ontológica
  english_pob_reading: Resurrected people are like angels with respect to not marrying, not transformed into angels.
  chosen_spanish_reading: Los resucitados son como los ángeles de Dios en este aspecto, no se afirma que se conviertan en ángeles.
  alternative_spanish_readings:
  - Los resucitados se vuelven ángeles.
  - Los resucitados viven como ángeles en todo sentido.
  rationale: El ὡς indica comparación; el contexto inmediato limita el punto de semejanza a la ausencia de matrimonio. La traducción con 'como' conserva la tensión teológica y evita resolver indebidamente la relación entre humanidad resucitada y seres angelicales.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El control de revisión externo indica que no hubo cambios pendientes y que el borrador previo fue confirmado con alta concordancia; por eso se mantiene una solución sobria que preserva la distinción verbal griega y la comparación con los ángeles sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'cielo' para οὐρανῷ, conforme a la terminología base del proyecto.
  - Se evita 'Cristo' y cualquier terminología eclesiástica no presente en el verso.
  - La estructura 'ni ... ni ... sino que' reproduce con claridad la correlación negativa y adversativa del griego.
  - El pie de nota marca una alternativa lexical real para ἀναστάσει sin desplazar el texto principal.
