translation:
  language: es
  text: 'Pero Jesús les respondió[a]: «Están equivocados, porque no conocen ni las Escrituras ni el poder de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Están engañados» o «Están en error».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς δὲ
  english_pob_choice: But ... answered
  chosen_spanish: Pero ... les respondió
  alternatives_spanish:
  - Y ... les respondió
  - En respuesta ... les respondió
  lexicon: BDAG
  rationale: Ἀποκριθεὶς δὲ introduce la respuesta de Jesús con un giro transicional/adversativo. En español, «Pero ... les respondió» conserva el cambio de interlocución y el matiz de contraste sin sonar forzado.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: Jesus answered them
  chosen_spanish: les respondió
  alternatives_spanish:
  - les dijo
  - Jesús respondió a ellos
  lexicon: BDAG
  rationale: Aunque εἶπεν literalmente es «dijo», aquí funciona como fórmula de respuesta junto con Ἀποκριθεὶς. «Les respondió» evita la redundancia y refleja la función idiomática del conjunto.
- source_word: Πλανᾶσθε
  english_pob_choice: You are mistaken
  chosen_spanish: Están equivocados
  alternatives_spanish:
  - Están engañados
  - Se extravían
  - Están en error
  lexicon: BDAG
  rationale: El verbo puede expresar estar en error o ser extraviado/engañado. «Están equivocados» es natural en español moderno y comunica el juicio directo de Jesús sin decidir de manera innecesaria por la causa interna o externa del error.
- source_word: μὴ εἰδότες
  english_pob_choice: because you know neither
  chosen_spanish: porque no conocen ni
  alternatives_spanish:
  - porque no saben ni
  - ya que no conocen ni
  lexicon: BDAG
  rationale: La construcción participial tiene fuerza causal. «Porque no conocen ni...» reproduce esa relación explicativa y prepara bien la doble negación coordinada.
- source_word: τὰς γραφὰς
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - las escrituras
  - los escritos sagrados
  lexicon: BDAG
  rationale: En plural, γραφαί se refiere a los escritos sagrados reconocidos. «Las Escrituras» es la equivalencia española estable y adecuada para ese uso técnico.
- source_word: μηδὲ τὴν δύναμιν τοῦ θεοῦ
  english_pob_choice: nor the power of God
  chosen_spanish: ni el poder de Dios
  alternatives_spanish:
  - ni el poderío de Dios
  - ni la potencia de Dios
  lexicon: BDAG
  rationale: δύναμις se traduce de forma directa como «poder». La coordinación con μή/μηδέ queda bien en español con «ni ... ni ...», manteniendo el paralelo entre ambos objetos de ignorancia.
- source_word: τοῦ θεοῦ
  english_pob_choice: God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios Padre
  lexicon: BDAG
  rationale: θεός en este contexto es el Dios único de las Escrituras judías. Se conserva la forma simple y reverente «de Dios» sin introducir formulaciones doctrinales ajenas al versículo.
theological_decisions:
- issue: Causa del error de los saduceos
  english_pob_reading: Jesus states that their error is due to ignorance of both the Scriptures and God's power.
  chosen_spanish_reading: Jesús afirma que su equivocación proviene de no conocer ni las Escrituras ni el poder de Dios.
  alternative_spanish_readings:
  - Jesús solo los corrige por estar equivocados, sin explicitar la causa.
  - Jesús los acusa de engaño externo más que de ignorancia
  rationale: La forma participial μὴ εἰδότες explica la equivocación. La traducción conserva esa causalidad en vez de reducirla a una simple reprensión, manteniendo la tensión del texto entre error, ignorancia y posible extravío.
  doctrine_reference: Primacía del dato original y preservación de la relación causal explícita en el griego.
- issue: Sentido de Πλανᾶσθε
  english_pob_reading: You are mistaken / You are deceived / You are in error.
  chosen_spanish_reading: Están equivocados
  alternative_spanish_readings:
  - Están engañados
  - Se extravían
  - Están en error
  rationale: El griego permite tanto la idea de error como de ser extraviados/engañados. «Están equivocados» funciona bien como traducción pública; las alternativas quedan abiertas para no borrar la tensión lexical documentada.
  doctrine_reference: Preservar la ambigüedad lexical del original sin resolverla prematuramente.
translation_notes:
  revision_awareness: El registro inglés más reciente no requirió cambios sustanciales; se conservó la lectura causal de μὴ εἰδότες y la traducción idiomática de la fórmula de respuesta, con el ajuste natural al español de «Están equivocados».
  spanish_consistency_notes:
  - Se mantuvo «las Escrituras» como término técnico para γραφαί en plural.
  - Se tradujo θεός como «Dios» sin mayúsculas especiales adicionales ni sustitución por «SEÑOR».
  - Se preservó la coordinación negativa con «ni ... ni ...» para reflejar μή/μηδέ.
  - El tono es directo y sobrio, adecuado para un registro bíblico público en español.
