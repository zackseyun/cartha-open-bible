translation:
  language: es
  text: Y nadie podía responderle una palabra[a], ni nadie se atrevió, desde aquel día, a hacerle más preguntas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "responderle una sola palabra". El giro griego dice literalmente "responderle una palabra".'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - no hubo quien
  lexicon: BDAG
  rationale: El pronombre negativo indefinido expresa ausencia total de persona capaz de responder. En español, 'nadie' es natural y preciso; 'ninguna persona' sería más pesado.
- source_word: ἐδύνατο
  english_pob_choice: was able
  chosen_spanish: podía
  alternatives_spanish:
  - era capaz de
  - pudo
  lexicon: BDAG
  rationale: El imperfecto de δύναμαι comunica incapacidad en un estado continuo o reiterado. 'Podía' conserva ese valor aspectual de manera natural en español; 'era capaz de' es más explicativo y menos idiomático.
- source_word: ἀποκριθῆναι αὐτῷ λόγον
  english_pob_choice: to answer him a word
  chosen_spanish: responderle una palabra[a]
  alternatives_spanish:
  - responderle una sola palabra
  - contestarle
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente incluye 'palabra'. Mantener 'una palabra' preserva la fuerza del giro; el clítico 'le' expresa el dativo. 'Contestarle' suaviza el idiomatismo y pierde la huella de λόγον.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y no
  - ni tampoco
  lexicon: BDAG
  rationale: '''Ni'' es la coordinación negativa más natural en español para enlazar la segunda cláusula con la primera sin perder la continuidad del reproche narrativo.'
- source_word: ἐτόλμησέν τις
  english_pob_choice: did anyone dare
  chosen_spanish: se atrevió nadie
  alternatives_spanish:
  - nadie osó
  - ninguno se atrevió
  lexicon: BDAG
  rationale: El verbo τολμάω expresa atreverse/osear. En español, 'se atrevió nadie' reproduce la combinación negativa y la idea de audacia; 'osó' sería más literario y menos común.
- source_word: ἀπ’ ἐκείνης τῆς ἡμέρας
  english_pob_choice: from that day on
  chosen_spanish: desde aquel día
  alternatives_spanish:
  - desde ese día
  - a partir de aquel día
  lexicon: BDAG
  rationale: La frase marca el punto de inicio de una continuidad posterior. 'Desde aquel día' comunica bien ese comienzo; el contexto de la segunda cláusula hace innecesario añadir 'en adelante' en el texto principal.
- source_word: ἐπερωτῆσαι
  english_pob_choice: to question
  chosen_spanish: interrogarlo
  alternatives_spanish:
  - preguntarle
  - cuestionarlo
  lexicon: BDAG
  rationale: 'Aquí el verbo implica más que ''preguntar'': se trata de ponerle preguntas en un marco de debate o prueba. ''Interrogarlo'' conserva mejor esa fuerza que ''preguntarle'', aunque es algo más intenso que el simple preguntar.'
- source_word: οὐκέτι
  english_pob_choice: any longer
  chosen_spanish: ya no más
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: BDAG
  rationale: La idea es de cese desde ese momento. 'Ya no más' preserva la continuidad negativa y resulta comprensible en español neutral; 'nunca más' sería más absoluto de lo que el griego exige.
theological_decisions:
- issue: Silencio e incapacidad de los opositores sin añadir interpretación teológica
  english_pob_reading: The verse states that no one could answer and no one dared question him further, without importing additional theological interpretation.
  chosen_spanish_reading: 'La traducción conserva el dato narrativo: nadie pudo responderle y nadie se atrevió a seguir interrogándolo, sin explicitar una conclusión doctrinal en el mismo enunciado.'
  alternative_spanish_readings:
  - una versión que enfatice directamente la superioridad de Jesús
  - una formulación que convierta el versículo en comentario teológico
  rationale: El contexto sugiere la autoridad de Jesús, pero el versículo mismo se limita a describir el fracaso y el silencio de los adversarios. La traducción mantiene esa sobriedad textual y no resuelve la tensión interpretativa con lenguaje explicativo.
  doctrine_reference: 'Translation philosophy: preserve the narrative claim as stated; do not import doctrinal conclusions beyond the verse.'
translation_notes:
  revision_awareness: 'El borrador sigue el alto acuerdo del control cruzado y mantiene sin cambios sustantivos la lectura de la edición base: incapacidad de responder, seguida de la falta de valentía para seguir interrogando a Jesús.'
  spanish_consistency_notes:
  - Se mantuvo 'Y' inicial para reflejar la continuidad narrativa del griego καὶ.
  - '''Nadie'' se usa de forma consistente en ambas cláusulas negativas para evitar un registro artificioso.'
  - '''Desde aquel día'' conserva el valor temporal de inicio continuo sin sobrecargar la frase.'
  - La nota al pie preserva la alternativa literal de λόγον, ya que el español no puede marcar con tanta naturalidad el idiomatismo sin aclaración.
