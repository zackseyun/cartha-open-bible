review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: incapacidad total de responder a Jesús y cese posterior de nuevas preguntas. Conserva adecuadamente el idiomático λόγον con ''una palabra'' y mantiene la nota alternativa. Sin embargo, la cola final ''ya no más'' suena poco natural y algo redundante con ''desde aquel día''; además, ''interrogarlo'' es posible pero algo más fuerte y policíaco de lo que exige ἐπερωτῆσαι en este contexto. Una leve revisión mejora fidelidad estilística sin alterar el contenido.'
  spanish_quality_summary: El español es generalmente claro, pero 'ni se atrevió nadie' suena marcado y menos natural que 'ni nadie se atrevió'. La secuencia 'a interrogarlo ya no más' es poco idiomática en español general; 'a hacerle más preguntas' o 'a seguir preguntándole' fluye mejor. También conviene evitar las comas innecesarias alrededor de 'desde aquel día'.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Nadie', 'podía', y 'responderle una palabra' están bien alineados con las decisiones auditadas. Se recomienda cambiar 'interrogarlo' por 'hacerle preguntas' para representar mejor ἐπερωτῆσαι en español eclesial neutral, manteniendo el matiz de cuestionamiento sin sobrecargarlo. 'Ya no más' debe ajustarse a 'más' o 'ya no' según la sintaxis.
  issues:
  - severity: medium
    issue: '''a interrogarlo ya no más'' es poco natural en español neutral'
    rationale: Aunque comunica cese, la construcción suena forzada y no corresponde bien al orden natural de οὐκέτι. Una formulación como 'a hacerle más preguntas' expresa mejor 'to question him any longer'.
  - severity: medium
    issue: '''interrogarlo'' puede ser demasiado fuerte para ἐπερωτῆσαι'
    rationale: El verbo griego aquí denota poner preguntas en contexto de debate; 'interrogar' en español moderno puede sonar judicial o policial. 'Hacerle preguntas' o 'preguntarle' mantiene mejor el registro narrativo.
  - severity: low
    issue: Orden marcado en 'ni se atrevió nadie'
    rationale: No es incorrecto, pero 'ni nadie se atrevió' es más natural y legible en español general.
  - severity: low
    issue: Comas innecesarias alrededor de 'desde aquel día'
    rationale: No aportan claridad y entorpecen el flujo de la cláusula temporal.
  revised_spanish_text: Y nadie podía responderle una palabra[a], ni nadie se atrevió, desde aquel día, a hacerle más preguntas.
  revised_footnotes:
  - marker: a
    text: 'O: "responderle una sola palabra". El giro griego dice literalmente "responderle una palabra".'
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido semántico central del original y la nota sobre el idiomático λόγον, pero se ajusta la segunda cláusula para un español más natural y más fiel al matiz de ἐπερωτῆσαι + οὐκέτι. 'Hacerle más preguntas' representa bien 'question him any longer' sin el tono excesivamente fuerte de 'interrogarlo' ni la construcción poco idiomática 'ya no más'.
