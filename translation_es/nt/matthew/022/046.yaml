revisions:
- from: Y nadie podía responderle una palabra[a], ni se atrevió nadie, desde aquel día, a interrogarlo ya no más.
  to: Y nadie podía responderle una palabra[a], ni nadie se atrevió, desde aquel día, a hacerle más preguntas.
  rationale: Se conserva el contenido semántico central del original y la nota sobre el idiomático λόγον, pero se ajusta la segunda cláusula para un español más natural y más fiel al matiz de ἐπερωτῆσαι + οὐκέτι. 'Hacerle más preguntas' representa bien 'question him any longer' sin el tono excesivamente fuerte de 'interrogarlo' ni la construcción poco idiomática 'ya no más'.
