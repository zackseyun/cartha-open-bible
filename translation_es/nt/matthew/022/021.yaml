review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: respuesta elíptica «Caesar’s» > «De César», secuencia narrativa con «Entonces», y el paralelismo del mandato a César y a Dios. Sin embargo, Ἀπόδοτε lleva matiz de devolver / dar lo debido, y «Den» es demasiado débil frente al rastro auditado del POB, que finalmente prefirió «render». En español, la mejor equivalencia natural y digna es «Devuelvan», que preserva mejor la idea de retribuir o devolver lo que corresponde sin reducirlo a impuesto.'
  spanish_quality_summary: El español es claro y legible, pero «Den, pues» suena algo llano para el registro buscado y pierde el matiz léxico del verbo. «Devuelvan, pues» mejora la fidelidad y mantiene buena naturalidad en español eclesial general. La nota [a] actual no corresponde al tipo de nota preservado en el inglés; el POB inglés anota el valor semántico de Ἀπόδοτε, no el presente histórico de λέγουσιν.
  glossary_alignment: 'No hay conflicto con la glosa de «Dios». No aparece terminología especial como Yahvé/Mesías. La principal cuestión terminológica es ἀποδίδωμι: conviene alinear el español con la decisión léxica documentada del POB mediante «Devuelvan» y una nota que conserve las alternativas «paguen» o «den lo debido / rindan».'
  issues:
  - severity: medium
    issue: «Den» debilita el matiz de Ἀπόδοτε.
    rationale: El verbo griego implica devolver, pagar o dar lo debido. «Den» comunica la acción general, pero pierde la fuerza de restitución/obligación reconocida en el expediente léxico inglés.
  - severity: medium
    issue: La nota [a] está anclada en «le dijeron» y trata el presente histórico, pero la nota inglesa preservada trata Ἀπόδοτε.
    rationale: Para seguir el rastro auditado, la nota debería acompañar al verbo del mandato y explicar las alternativas léxicas relevantes en español.
  - severity: low
    issue: El registro de «Den, pues» es menos digno/formal de lo deseado.
    rationale: «Devuelvan, pues» suena más natural y más acorde con el tono formal sin caer en arcaísmo.
  revised_spanish_text: 'Ellos le dijeron: «De César». Entonces él les dijo: «Devuelvan[a], pues, a César lo que es de César y a Dios lo que es de Dios».'
  revised_footnotes:
  - marker: a
    text: O «paguen» o «den lo debido». El verbo griego también puede significar «rendir» o «devolver lo que corresponde».
    reason: lexical_alternative
  revision_rationale: Se revisa el verbo principal para reflejar mejor Ἀπόδοτε y para alinearlo con la nota léxica preservada por el POB inglés. También se traslada la nota desde el presente histórico narrativo al imperativo, que es donde está la principal decisión léxica significativa en este versículo. El resto del texto se mantiene porque conserva bien la estructura, el paralelismo y la tensión teológica del original.
