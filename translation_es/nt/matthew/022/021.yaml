- from: 'Ellos le dijeron[a]: «De César». Entonces él les dijo: «Den, pues, a César lo que es de César y a Dios lo que es de Dios».'
  to: 'Ellos le dijeron: «De César». Entonces él les dijo: «Devuelvan[a], pues, a César lo que es de César y a Dios lo que es de Dios».'
