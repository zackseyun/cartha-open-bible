translation:
  language: es
  text: 'Ellos le dijeron: «De César». Entonces él les dijo: «Devuelvan[a], pues, a César lo que es de César y a Dios lo que es de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paguen» o «den lo debido». El verbo griego también puede significar «rendir» o «devolver lo que corresponde».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  english_pob_choice: They said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - dijeron
  lexicon: BDAG
  rationale: El presente histórico griego se naturaliza en pasado en español narrativo; el dativo αὐτῷ se expresa con el pronombre enclítico «le» para conservar la referencia directa al interlocutor.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: En español, el complemento indirecto pronominal es la forma más fluida y conserva la función del dativo sin añadir énfasis innecesario.
- source_word: Καίσαρος
  english_pob_choice: Caesar’s
  chosen_spanish: De César
  alternatives_spanish:
  - César
  lexicon: BDAG
  rationale: La respuesta de los interlocutores es elíptica en griego; en español, «De César» reproduce esa brevedad y responde de modo natural a la pregunta implícita sobre la inscripción o pertenencia de la moneda.
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Y entonces
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata entre la respuesta y la enseñanza de Jesús.
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: Se vierte el presente histórico como pasado para mantener fluidez en español; el plural indirecto conserva a los oyentes originales.
- source_word: Ἀπόδοτε
  english_pob_choice: render
  chosen_spanish: Den
  alternatives_spanish:
  - Devuelvan
  - Rindan
  lexicon: BDAG
  rationale: ἀποδίδωμι incluye la idea de devolver o dar lo que corresponde. En español, «den» junto con «a César lo que es de César» comunica la obligación de entregar lo debido sin sonar artificial; se evita estrechar el sentido a un mero pago monetario.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: pues
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: La partícula inferencial se integra naturalmente en la exhortación española con «pues», preservando la conclusión derivada del intercambio previo.
- source_word: τὰ Καίσαρος
  english_pob_choice: the things that are Caesar’s
  chosen_spanish: lo que es de César
  alternatives_spanish:
  - las cosas de César
  - lo debido a César
  lexicon: BDAG
  rationale: El neutro plural se expresa mejor en español con una construcción sustantivada neutra; así se conserva el paralelismo con la cláusula siguiente sin forzar un posesivo nominal poco natural.
- source_word: Καίσαρι
  english_pob_choice: to Caesar
  chosen_spanish: a César
  alternatives_spanish:
  - para César
  lexicon: BDAG
  rationale: El dativo se vierte con la preposición española usual para destinatario/beneficiario del mandato.
- source_word: τὰ τοῦ θεοῦ
  english_pob_choice: the things that are God’s
  chosen_spanish: lo que es de Dios
  alternatives_spanish:
  - las cosas de Dios
  - lo debido a Dios
  lexicon: BDAG
  rationale: Se mantiene la correspondencia con la primera cláusula para preservar la simetría retórica y la amplitud semántica del neutro plural.
- source_word: θεοῦ / τῷ θεῷ
  english_pob_choice: God / to God
  chosen_spanish: Dios / a Dios
  alternatives_spanish:
  - el Dios / al Dios
  lexicon: BDAG
  rationale: En este contexto monoteísta, «Dios» es la equivalencia normal y más reverente; la preposición «a» conserva la función dativa.
theological_decisions:
- issue: Tensión entre obligación civil y reclamo divino
  english_pob_reading: The translation preserves the parallel command without expanding it into a full political theory or reducing it to mere tax compliance.
  chosen_spanish_reading: La traducción conserva el mandato paralelo sin convertirlo en una teoría política completa ni reducirlo a un simple pago de impuestos.
  alternative_spanish_readings:
  - una defensa de obediencia absoluta al Estado
  - solo una orden sobre tributos
  rationale: 'El griego presenta dos esferas distinguidas por una misma estructura: lo de César y lo de Dios. La versión española debe dejar visible esa tensión sin resolverla prematuramente.'
  doctrine_reference: Preservar la tensión teológica del dicho de Jesús.
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota al incluir [a] en el texto español, preservando además el tono formal y la simetría del dicho de Jesús conforme al último pase de revisión en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios» como traducción de θεός en un contexto monoteísta.
  - Se evitó «SEÑOR» para θεός/κύριος porque el texto no contiene κύριος ni una cita del nombre divino.
  - Se preservó la paralelidad sintáctica entre «lo que es de César» y «lo que es de Dios».
  - Se escogió «Den» sobre «Rindan» para sonar natural en español sin perder el valor de obligación del imperativo.
