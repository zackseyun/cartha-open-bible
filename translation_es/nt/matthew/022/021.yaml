base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/021.yaml
  text: They said to him[a], “Caesar’s.” Then he said to them, “Therefore render to Caesar the things that are Caesar’s, and to God the things that are God’s.”
  footnotes:
