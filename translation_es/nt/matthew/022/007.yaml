translation:
  language: es
  text: Pero el rey se indignó, y enviando sus tropas[a], destruyó[b] a aquellos asesinos y quemó su ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ejércitos». El término griego se refiere a fuerzas militares y puede traducirse de manera más general que «tropas».
    reason: lexical_alternative
  - marker: b
    text: O «mató a aquellos asesinos» o «dio muerte a aquellos asesinos». El griego dice «destruyó», un término más amplio de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς
  english_pob_choice: But the king
  chosen_spanish: Pero el rey
  alternatives_spanish:
  - Y el rey
  - Ahora el rey
  lexicon: BDAG
  rationale: βασιλεύς se traduce naturalmente como «rey». δέ introduce contraste narrativo; «Pero» conserva ese giro adversativo con español claro y sobrio.
- source_word: ὠργίσθη
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se enfureció
  - se irritó
  lexicon: BDAG
  rationale: ὀργίζομαι expresa la reacción de enojo del rey. «Se enojó» es natural en español moderno y no intensifica más de lo que exige el verbo.
- source_word: πέμψας
  english_pob_choice: sending
  chosen_spanish: enviando
  alternatives_spanish:
  - habiendo enviado
  - y envió
  lexicon: BDAG
  rationale: El participio aoristo se conserva como gerundio para reflejar la secuencia de acciones sin volver la frase pesada o poco natural en español.
- source_word: τὰ στρατεύματα αὐτοῦ
  english_pob_choice: his troops
  chosen_spanish: sus tropas
  alternatives_spanish:
  - sus ejércitos
  - sus fuerzas militares
  lexicon: BDAG
  rationale: στρατεύματα designa fuerzas militares colectivas. «Tropas» mantiene el sentido bélico y evita una amplitud excesiva de «ejércitos».
- source_word: ἀπώλεσεν
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - mató
  - dio muerte a
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí tiene fuerza de destrucción o ruina/jucio. «Destruyó» preserva el alcance amplio del verbo sin especificar una ejecución que el griego no formula de modo explícito.
- source_word: τοὺς φονεῖς ἐκείνους
  english_pob_choice: those murderers
  chosen_spanish: a aquellos asesinos
  alternatives_spanish:
  - a esos asesinos
  - a aquellos homicidas
  lexicon: BDAG
  rationale: φονεύς se corresponde bien con «asesino» en español actual; el demonstrativo ἐκείνους se expresa con «aquellos» para mantener la distancia enfática del original.
- source_word: τὴν πόλιν αὐτῶν
  english_pob_choice: their city
  chosen_spanish: su ciudad
  alternatives_spanish:
  - la ciudad de ellos
  - su pueblo
  lexicon: BDAG
  rationale: πόλις se traduce por «ciudad». El posesivo singular «su» es natural en español para referirse al grupo mencionado, sin añadir precisión ajena al texto.
- source_word: ἐνέπρησεν
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - la incendió
  - la puso en llamas
  lexicon: BDAG
  rationale: ἐμπίμπρημι significa prender fuego o quemar. «Quemó» es directo y fiel; «incendió» puede sonar más técnico y mantener el resultado de la acción.
theological_decisions:
- issue: Cómo reflejar la severidad del juicio del rey sin volver explícita una acción que el verbo griego no nombra con precisión
  english_pob_reading: Retain the broader judicial term 'destroyed' in the main text.
  chosen_spanish_reading: Mantener «destruyó» en el texto principal.
  alternative_spanish_readings:
  - «mató»
  - «dio muerte a»
  rationale: La parábola presenta juicio severo, pero ἀπώλεσεν es más amplio que una fórmula estrictamente ejecutiva. «Destruyó» preserva esa amplitud y deja el peso judicial sin añadir precisión no exigida por el griego.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo expresar la fuerza militar enviada por el rey
  english_pob_reading: Use 'troops.'
  chosen_spanish_reading: Usar «tropas».
  alternative_spanish_readings:
  - «ejércitos»
  - «soldados»
  rationale: No es una cuestión doctrinal, pero sí de representación del acto de juicio. «Tropas» conserva el sentido colectivo y militar sin sobredimensionar el alcance del sustantivo griego.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail en inglés: el participio πέμψας se reflejó mejor con una forma participial («enviando») en vez de una coordinación finita. También se conservó el valor amplio de ἀπώλεσεν como juicio/destrozo, y no se sustituyó por una fórmula más explícitamente letal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero no aparece en este versículo.
  - Se evita «Cristo»/«Mesías» porque el pasaje no contiene Χριστός.
  - «Destruyó» conserva la tensión lexical de ἀπώλεσεν sin interpretarlo como ejecución literal.
  - «Aquellos» reproduce el valor demostrativo enfático de ἐκείνους.
  - La puntuación coordina acciones narrativas en un español natural, sin borrar la relación participial de πέμψας.
