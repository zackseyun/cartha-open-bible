translation:
  language: es
  text: 'Y le envían sus discípulos junto con los herodianos, diciendo: «Maestro, sabemos que eres verdadero y que enseñas el camino de Dios en verdad, y no te preocupa nadie, porque no miras la apariencia de los hombres[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no haces acepción de personas» o «no juzgas por las apariencias». El griego usa una imagen de «mirar el rostro» para indicar imparcialidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστέλλουσιν
  english_pob_choice: they send
  chosen_spanish: envían
  alternatives_spanish:
  - mandan
  - envían
  lexicon: BDAG
  rationale: Se conserva el presente narrativo del griego con un presente español natural. «Envían» refleja el envío con intención hostil sin añadir interpretación.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - estudiantes
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente normal en contexto evangélico y conserva la relación de seguimiento/aprendizaje.
- source_word: μετὰ τῶν Ἡρῳδιανῶν
  english_pob_choice: along with the Herodians
  chosen_spanish: junto con los herodianos
  alternatives_spanish:
  - con los herodianos
  lexicon: BDAG
  rationale: «Junto con» expresa con claridad la asociación/alianza sin exagerar el matiz de acompañamiento.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Rabí
  - Doctor
  lexicon: BDAG
  rationale: «Maestro» comunica el tratamiento respetuoso y docente de forma natural en español bíblico contemporáneo.
- source_word: ἀληθὴς
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - veraz
  - auténtico
  lexicon: BDAG
  rationale: «Verdadero» reproduce bien el predicado atributivo aplicado a Jesús; «veraz» podría sonar más restringido al hablar.
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  english_pob_choice: the way of God
  chosen_spanish: el camino de Dios
  alternatives_spanish:
  - la senda de Dios
  - el camino de Dios
  lexicon: BDAG
  rationale: Se mantiene la imagen de «camino» para no diluir el lenguaje bíblico del texto griego.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - con verdad
  lexicon: BDAG
  rationale: «En verdad» conserva la construcción preposicional y su fuerza de conformidad con la verdad.
- source_word: οὐ μέλει σοι περὶ οὐδενός
  english_pob_choice: you do not care about anyone
  chosen_spanish: no te importa nadie
  alternatives_spanish:
  - no te preocupas por nadie
  - no te importa de nadie
  lexicon: BDAG
  rationale: Se refleja la idiomaticidad del griego con una formulación breve y natural, sin introducir el comentario interpretativo del inglés anterior. La frase queda deliberadamente cercana al original, aun si suena algo abrupta, porque el hablante está adulando con ironía.
- source_word: οὐ γὰρ βλέπεις εἰς πρόσωπον ἀνθρώπων
  english_pob_choice: for you do not look at the face of men
  chosen_spanish: porque no miras la apariencia de los hombres
  alternatives_spanish:
  - porque no miras el rostro de los hombres
  - porque no haces acepción de personas
  lexicon: BDAG
  rationale: Se preserva el modismo de «mirar el rostro/apariencia» y, a la vez, se evita una traducción demasiado extraña en español. «Apariencia» comunica el sentido de no juzgar por exterioridades.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: Se mantiene la forma genérica masculina del griego, tal como la nota inglesa, sin impedir que se entienda de manera inclusiva en el contexto.
theological_decisions:
- issue: Presente narrativo en ἀποστέλλουσιν
  english_pob_reading: They send
  chosen_spanish_reading: Y le envían
  alternative_spanish_readings:
  - Y le enviaron
  rationale: El griego usa presente histórico; el español puede conservarlo sin perder naturalidad. Esto sigue la revisión inglesa más cercana al tiempo verbal del original.
  doctrine_reference: Translation philosophy §§3, 4
- issue: Idiom of impartiality in βλέπεις εἰς πρόσωπον ἀνθρώπων
  english_pob_reading: you do not look at the face of men
  chosen_spanish_reading: no miras la apariencia de los hombres
  alternative_spanish_readings:
  - no haces acepción de personas
  - no juzgas por las apariencias
  rationale: El texto griego alude a imparcialidad y a no dejarse impresionar por estatus o apariencia. La redacción principal conserva la imagen del rostro/apariencia; las alternativas explicitan el sentido idiomático sin borrar la metáfora.
  doctrine_reference: Translation philosophy §§3, 4, 5
- issue: μέλει σοι περὶ οὐδενός
  english_pob_reading: you do not care about anyone
  chosen_spanish_reading: no te importa nadie
  alternative_spanish_readings:
  - no te preocupas por nadie
  - no te importa de nadie
  rationale: La expresión griega es idiomática. La versión española mantiene la dureza retórica del hablante y evita añadir una glosa interpretativa que no está en el griego.
  doctrine_reference: Translation philosophy §§3, 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que corrigió el tiempo verbal a presente («they send») y simplificó la primera cláusula idiomática para no añadir interpretación. La versión española sigue ese ajuste y mantiene la metáfora de la segunda cláusula con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ según el estándar del proyecto.
  - Se conserva «herodianos» como nombre propio transliterado en minúscula, conforme al uso bíblico en español.
  - Se elige «Maestro» para Διδάσκαλε por ser el tratamiento más claro y digno en español.
  - Se evita «Cristo» porque no aparece en el texto base.
  - Se mantiene una referencia masculina genérica en «los hombres», con nota aclaratoria sobre el valor inclusivo del griego.
