translation:
  language: es
  text: Y aquellos esclavos salieron a los caminos y reunieron a todos los que encontraron[a], tanto malos como buenos; y la sala de bodas[b] quedó llena de comensales reclinados a la mesa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos los que hallaron».
    reason: lexical_alternative
  - marker: b
    text: Griego «la boda»; aquí el término probablemente se refiere al banquete de bodas o a su salón, ya que se describe como lleno de comensales.
    reason: lexical_alternative
  - marker: c
    text: Es decir, recostados según la costumbre de una comida formal.
    reason: cultural_note
lexical_decisions:
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: Se mantiene la fuerza social de δοῦλος, que en el contexto de la parábola designa subordinación real al rey. «Esclavos» conserva esa relación de dependencia mejor que «siervos», que en español suaviza el término.
- source_word: ὁδοὺς
  english_pob_choice: roads
  chosen_spanish: caminos
  alternatives_spanish:
  - rutas
  - calles
  - caminos públicos
  lexicon: BDAG
  rationale: ὁδός puede ser «camino» o «ruta»; en plural, aquí señala los lugares públicos por donde se transita y donde se puede hallar gente. «Caminos» suena natural en español y evita restringir indebidamente a «calles».
- source_word: συνήγαγον
  english_pob_choice: gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - juntaron
  - congregaron
  lexicon: BDAG
  rationale: El verbo expresa el acto de juntar en un solo grupo. «Reunieron» es la forma más directa y natural en español narrativo.
- source_word: πάντας ⸀οὓς εὗρον
  english_pob_choice: everyone they found
  chosen_spanish: a todos los que encontraron
  alternatives_spanish:
  - a todos los que hallaron
  - a todos cuantos encontraron
  lexicon: BDAG
  rationale: La construcción subraya amplitud inclusiva con relativo. «A todos los que encontraron» preserva el alcance total sin forzar una paráfrasis más explicativa.
- source_word: πονηρούς τε καὶ ἀγαθούς
  english_pob_choice: both evil and good
  chosen_spanish: tanto malos como buenos
  alternatives_spanish:
  - tanto perversos como buenos
  - tanto malos como justos
  lexicon: BDAG
  rationale: En español, «malos y buenos» comunica con naturalidad el contraste moral. Se evita «malvados» porque puede sonar más acusatorio de lo que el texto requiere, y se preserva la tensión sin resolverla teológicamente.
- source_word: γάμος
  english_pob_choice: wedding hall
  chosen_spanish: sala de bodas
  alternatives_spanish:
  - banquete de bodas
  - boda
  - salón de bodas
  lexicon: BDAG
  rationale: El griego puede referirse a la celebración o al espacio/escena del banquete. Dado que el versículo dice que fue «llenada» por los reclinados, «sala de bodas» comunica con claridad el lugar o ambiente del festejo, sin reducirlo solo al evento abstracto.
- source_word: ἐπλήσθη
  english_pob_choice: was filled
  chosen_spanish: quedó llena
  alternatives_spanish:
  - fue llenada
  - se llenó
  lexicon: BDAG
  rationale: El pasivo indica que algo llegó a estar lleno. «Quedó llena» expresa ese estado resultante con naturalidad en español.
- source_word: ἀνακειμένων
  english_pob_choice: with guests reclining at the table
  chosen_spanish: de comensales reclinados a la mesa
  alternatives_spanish:
  - de los que estaban reclinados
  - de invitados reclinados
  lexicon: BDAG
  rationale: ἀνάκειμαι describe la postura de recostarse/reclinarse para comer en un banquete. «Comensales reclinados a la mesa» conserva la imagen cultural sin explicar de más, y mantiene visible el sentido de la cena formal.
theological_decisions:
- issue: Alcance moral de los invitados reunidos
  english_pob_reading: both evil and good
  chosen_spanish_reading: tanto malos como buenos
  alternative_spanish_readings:
  - tanto malos como justos
  - tanto perversos como buenos
  rationale: Se conserva el contraste moral abierto del griego sin adelantar el juicio final de la parábola. «Malos» retiene la amplitud de πονηρούς y evita cerrar la tensión con una formulación más interpretativa.
  doctrine_reference: Preservar la tensión parabólica sin resolverla anticipadamente.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés de POB. La redacción española conserva la secuencia narrativa, la fuerza de δοῦλοι, el alcance inclusivo de πάντας οὓς εὗρον y la imagen cultural de ἀνακειμένων sin expandirla más allá de lo justificado. No hubo revisiones previas aplicadas en el pasaje base.
  spanish_consistency_notes:
  - Se mantiene «esclavos» para δοῦλοι según la preferencia terminológica POB.
  - Se evita «SEÑOR» u otras sustituciones de nombres divinos porque no aparecen en este versículo.
  - Se usa «sala de bodas» para reflejar la escena del banquete sin imponer una traducción demasiado abstracta de γάμος.
  - Se conserva el contraste moral abierto «malos/buenos» para no suavizar πονηρούς.
