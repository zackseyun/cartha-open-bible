translation:
  language: es
  text: Pero ellos no le prestaron atención y se fueron[a], uno a su propio campo y otro a su negocio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo desatendieron' o 'lo descuidaron', refiriéndose en el contexto al llamado del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμελήσαντες
  english_pob_choice: paid no attention
  chosen_spanish: no le prestaron atención
  alternatives_spanish:
  - lo desatendieron
  - lo desoyeron
  - lo descuidaron
  lexicon: BDAG
  rationale: El participio expresa desatención o falta de consideración ante el llamado. 'No le prestaron atención' comunica de forma natural y directa la idea de ignorar la invitación en el contexto, sin forzar un matiz más interpretativo que 'desoyeron' ni uno menos idiomático como 'descuidaron'.
- source_word: ἀπῆλθον
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - se marcharon
  - se alejaron
  - partieron
  lexicon: BDAG
  rationale: El verbo marca salida o alejamiento de la escena. 'Se fueron' es la equivalencia más natural en español contemporáneo y conserva el movimiento narrativo sin añadir solemnidad innecesaria.
- source_word: ὃς μὲν ... ὃς δὲ
  english_pob_choice: one ... another
  chosen_spanish: uno ... otro
  alternatives_spanish:
  - uno ... y otro
  - este ... aquel
  lexicon: BDAG
  rationale: La construcción distributiva divide al grupo en dos destinos distintos. 'Uno ... otro' reproduce bien el contraste μέν ... δέ en español y mantiene la sencillez del original.
- source_word: εἰς τὸν ἴδιον ἀγρόν
  english_pob_choice: to his own field
  chosen_spanish: a su propio campo
  alternatives_spanish:
  - a su propio campo de cultivo
  - a su propia parcela
  - a su campo
  lexicon: BDAG
  rationale: ἀγρός significa literalmente 'campo' o 'terreno cultivado'. 'Campo' es la correspondencia más directa en español; 'propio' conserva ἴδιον, subrayando la preocupación personal de cada uno frente al llamado del rey.
- source_word: ἐπὶ τὴν ἐμπορίαν αὐτοῦ
  english_pob_choice: to his business
  chosen_spanish: a su negocio
  alternatives_spanish:
  - a su comercio
  - a sus actividades comerciales
  - a sus negocios
  lexicon: BDAG
  rationale: ἐμπορία denota comercio, actividad comercial o negocio. 'Negocio' es la forma más natural y amplia en español moderno para reflejar una ocupación o gestión de asuntos propios, sin reducirlo indebidamente a mercancías ni hacerlo demasiado técnico.
theological_decisions:
- issue: Objeto implícito de ἀμελήσαντες
  english_pob_reading: The verse refers to the invitees ignoring the king's summons, rendered idiomatically as 'paid no attention.'
  chosen_spanish_reading: El versículo se refiere a que los invitados ignoraron el llamado del rey, expresado de forma idiomática como 'no le prestaron atención'.
  alternative_spanish_readings:
  - lo desatendieron
  - desatendieron la invitación
  - la ignoraron
  rationale: El griego omite el objeto, pero el contexto inmediato lo provee. La traducción mantiene esa referencia contextual sin explicitarla en exceso, preservando el sentido narrativo y la fuerza del rechazo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; esta propuesta mantiene la lectura auditada como equivalente natural en español, con el mismo sentido contextual del original griego y de la POB en inglés.
  spanish_consistency_notes:
  - Se mantiene 'negocio' para ἐμπορία, en coherencia con el valor de actividad comercial y con español actual natural.
  - Se conserva 'campo' para ἀγρός como equivalente léxico directo, sin ampliar a 'granja' o 'finca' porque el contexto no lo exige.
  - La nota al pie conserva la ambigüedad útil del verbo ἀμελέω, sin introducir un objeto explícito en el cuerpo del texto.
