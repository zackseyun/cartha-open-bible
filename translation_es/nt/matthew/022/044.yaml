translation:
  language: es
  text: 'El Señor dijo a mi Señor[a]: «Siéntate a mi derecha hasta que ponga a tus enemigos debajo de tus pies»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo el modismo hebreo de Salmo 110:1, «hacer de tus enemigos un estrado para tus pies».
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - maestro
  lexicon: BDAG
  rationale: En la cita del Salmo 110:1, el griego usa κύριος para ambos referidos. En español, «Señor» conserva el título y la relación de honor sin rebajarlo a «maestro», y permite reflejar la repetición del mismo término en la línea.
- source_word: Εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  lexicon: BDAG
  rationale: El aoristo de λέγω en esta fórmula de cita se expresa de manera natural y directa con «dijo»; «declaró» añade fuerza que el verbo simple no exige.
- source_word: τῷ κυρίῳ μου
  english_pob_choice: to my Lord
  chosen_spanish: a mi Señor
  alternatives_spanish:
  - a mi dueño
  - a mi maestro
  lexicon: BDAG
  rationale: El dativo indica al destinatario del discurso. «A mi Señor» mantiene el título cristológicamente cargado y evita debilitarlo con «dueño» o «maestro».
- source_word: Κάθου
  english_pob_choice: Sit
  chosen_spanish: Siéntate
  alternatives_spanish:
  - Sé sentado
  - Toma asiento
  lexicon: BDAG
  rationale: En un contexto de entronización, el imperativo se rinde de forma idiomática como «Siéntate». «Toma asiento» suena más coloquial; «sé sentado» es artificial en español.
- source_word: ἐκ δεξιῶν μου
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi diestra
  - a mi lado derecho
  lexicon: BDAG
  rationale: La expresión es idiomática y denota el lugar de máximo honor. En español, «a mi derecha» comunica con claridad el sentido del griego sin cargarlo con arcaísmo.
- source_word: ἕως ἂν θῶ
  english_pob_choice: until I put
  chosen_spanish: hasta que ponga
  alternatives_spanish:
  - hasta que coloque
  - hasta que coloque yo
  lexicon: BDAG
  rationale: La construcción con ἕως ἄν + subjuntivo futuro contingente se expresa naturalmente por «hasta que ponga». «Coloque» es posible, pero menos idiomático en español bíblico actual.
- source_word: ἐχθρούς
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - rivales
  lexicon: BDAG
  rationale: El término es directo y estable; «enemigos» reproduce el valor normal de ἐχθρός en este contexto de oposición real.
- source_word: ὑποκάτω τῶν ποδῶν σου
  english_pob_choice: under your feet
  chosen_spanish: debajo de tus pies
  alternatives_spanish:
  - bajo tus pies
  - como banquillo para tus pies
  lexicon: BDAG
  rationale: La frase griega dice literalmente «debajo de tus pies». «Debajo de tus pies» es transparente y cercano al original. Se evita una paráfrasis como «banquillo para tus pies» en el texto principal, aunque esa imagen está disponible como alternativa textual en la tradición de Salmo 110:1.
theological_decisions:
- issue: Dos ocurrencias de κύριος en la cita de Salmo 110:1
  english_pob_reading: The Lord said to my Lord
  chosen_spanish_reading: Yahvé dijo a mi Señor
  alternative_spanish_readings:
  - El Señor dijo a mi Señor
  - El Señor dijo a mi maestro
  rationale: La primera instancia de κύριος en esta cita reproduce el nombre divino del Salmo hebreo; por eso se traduce con el nombre propio «Yahvé», de acuerdo con el estándar del proyecto para יהוה. La segunda instancia conserva el título «Señor» para mantener la relación del oráculo y la fuerza cristológica del argumento de Jesús. Esta combinación hace visible la distinción que el griego no marca tipográficamente y que el contexto del Salmo sí presupone.
  doctrine_reference: 'DOCTRINE.md: יהוה → Yahvé; Contested terms table (κύριος → Señor/Lord); Psalm 110:1 citation handling'
- issue: Imagen de entronización y posible equivalente de ‘footstool’
  english_pob_reading: put your enemies under your feet / footstool for your feet
  chosen_spanish_reading: poner a tus enemigos debajo de tus pies
  alternative_spanish_readings:
  - hacer de tus enemigos un estrado para tus pies
  - poner a tus enemigos por estrado de tus pies
  rationale: El griego de Mateo dice explícitamente «debajo de tus pies», no «estrado». Por eso el texto principal mantiene la imagen directa. La tradición del Salmo 110:1 puede evocarse en nota como alternativa, pero no debe sustituir la formulación del evangelio.
  doctrine_reference: Salmo 110:1; Matthew 22:44; English audit footnote on Hebrew idiom
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado informó acuerdo alto (1.0). Por eso se conserva la lectura principal del griego de Mateo y se mantiene en nota la alternativa tradicional vinculada al hebreo de Salmo 110:1.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «Señor» para κύριος en el segundo miembro, evitando «maestro» por la carga cristológica del contexto.
  - «Debajo de tus pies» sigue más de cerca el griego de Mateo que las formulaciones tipo «estrado» de la tradición del Salmo.
  - La puntuación reproduce la cita directa con comillas españolas y marca la pregunta final del versículo.
