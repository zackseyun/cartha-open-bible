    rationale: La fuente inmediata es el griego de Mateo, que usa κύριος para ambos referentes. El English POB y sus decisiones teológicas documentan que aquí se mantiene la repetición del mismo título para preservar el argumento de Jesús y no importar al texto principal una distinción no explícita en el griego.
  - severity: medium
