translation:
  language: es
  text: Pero cuando los fariseos oyeron que había silenciado[a] a los saduceos, se reunieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «había amordazado a los saduceos». El verbo griego puede significar amordazar; aquí se usa en sentido figurado para dejarlos sin respuesta en la discusión.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición narrativa con leve contraste; «Pero» conserva bien el enlace adversativo natural en español.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los Fariseos
  lexicon: BDAG
  rationale: Nombre de grupo judío transliterado; en español se usa comúnmente en minúscula cuando funciona como sustantivo grupal.
- source_word: ἀκούσαντες
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyeron
  alternatives_spanish:
  - habiendo oído
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo expresa relación temporal; «cuando ... oyeron» es idiomático y conserva esa temporalidad sin forzar el participio español.
- source_word: ἐφίμωσεν
  english_pob_choice: had silenced
  chosen_spanish: había silenciado
  alternatives_spanish:
  - había amordazado
  - había puesto en silencio
  - había cerrado la boca a
  lexicon: BDAG
  rationale: La imagen literal de «amordazar» existe, pero el contexto polémico pide el sentido idiomático de dejar sin respuesta; «había silenciado» preserva la fuerza y la claridad.
- source_word: Σαδδουκαίους
  english_pob_choice: the Sadducees
  chosen_spanish: a los saduceos
  alternatives_spanish:
  - a los Saduceos
  lexicon: BDAG
  rationale: Nombre de grupo judío transliterado; el acusativo con referencia personal se expresa naturalmente con «a los».
- source_word: συνήχθησαν
  english_pob_choice: they gathered together
  chosen_spanish: se reunieron juntos
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: BDAG
  rationale: El verbo pasivo con valor intransitivo indica que se agruparon como cuerpo; «se reunieron juntos» comunica el acto colectivo sin añadir lugar ni propósito.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en el mismo lugar
  - para lo mismo
  lexicon: BDAG
  rationale: Expresión idiomática de reunión en conjunto; «juntos» reproduce la función adverbial de forma natural en español.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés coinciden en el valor temporal del participio, el matiz figurado de ἐφίμωσεν y el sentido idiomático de ἐπὶ τὸ αὐτό. No se registran revisiones que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantuvo «fariseos» y «saduceos» como transliteraciones estándar.
  - Se eligió una estructura narrativa natural en español para reflejar el participio aoristo sin perder el orden lógico del griego.
  - La nota textual conserva la tensión entre la imagen literal de «amordazar» y el sentido contextual de «silenciar».
