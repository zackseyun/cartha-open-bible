  to: 'Y él le dijo: «Amarás a Yahvé tu Dios con todo tu corazón y con toda tu alma y con toda tu mente[a]».'
  rationale: Se actualiza «Señor» a «Yahvé» para cumplir la terminología del proyecto en una cita que alude al nombre divino. Además, se preserva en nota la alternativa léxica documentada para διάνοια, ya que también funciona naturalmente en español y está respaldada por la auditoría inglesa. No es necesario añadir nota para «con»/«en», porque en español «con» resuelve la construcción idiomáticamente sin generar ambigüedad nueva.
