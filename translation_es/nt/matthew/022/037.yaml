  text: ὁ ⸀δὲ ἔφη αὐτῷ· Ἀγαπήσεις κύριον τὸν θεόν σου ἐν ὅλῃ ⸀τῇ καρδίᾳ σου καὶ ἐν ὅλῃ ⸁τῇ ψυχῇ σου καὶ ἐν ὅλῃ τῇ διανοίᾳ σου·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/037.yaml
  text: And he said to him[c][b][a], “You shall love the Lord your God with all your heart and with all your soul and with all your mind.”
  footnotes:
  - marker: a
    text: Or 'in all your heart ... in all your soul ... in all your mind.' The Greek preposition is ἐν ('in'), but English idiom commonly renders this construction as 'with.'
    reason: lexical_alternative
  - marker: b
    text: ψυχή can also mean 'life' or 'self' in some contexts; here 'soul' preserves the wording and sense of the command as a comprehensive call to love God.
    reason: lexical_alternative
  - marker: c
    text: διάνοια may also be rendered 'understanding.'
    reason: lexical_alternative
