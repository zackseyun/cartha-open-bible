translation:
  language: es
  text: 'Y él le dijo: «Amarás a Yahvé tu Dios con todo tu corazón y con toda tu alma y con toda tu mente[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entendimiento». El griego διάνοια se refiere a la facultad de pensar o comprender; «mente» es natural en español, pero «entendimiento» también es posible.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector suave que avanza el diálogo; en español, «Y» conserva la fluidez narrativa sin introducir contraste.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - le habló
  lexicon: BDAG
  rationale: φημί introduce discurso directo; «dijo» es la forma más natural y no añade el matiz de respuesta que no está explícito en el verbo.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Debes amar
  - Ama
  lexicon: BDAG
  rationale: El futuro griego tiene fuerza imperativa en esta cita bíblica. «Amarás» preserva ese tono de mandamiento y la cadencia escritural sin volverlo una paráfrasis.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Amo
  - al Maestro
  lexicon: BDAG
  rationale: κύριος se rinde como «Señor» según el criterio terminológico del proyecto; el objeto directo personal en español pide la forma «al Señor».
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: θεός se traduce de manera estándar como «Dios». La secuencia «el Señor tu Dios» es natural y fiel al giro griego.
- source_word: ἐν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», en esta construcción idiomática de cita deuteronómica expresa la esfera o totalidad de la devoción. En español, «con todo tu... » es la correspondencia natural y fiel al sentido.
- source_word: ὅλῃ
  english_pob_choice: all
  chosen_spanish: todo / toda
  alternatives_spanish:
  - entero / entera
  - la totalidad de
  lexicon: BDAG
  rationale: 'ὅλῃ comunica totalidad. En español se ajusta al género de cada sustantivo: «todo tu corazón», «toda tu alma», «toda tu mente».'
- source_word: καρδίᾳ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: BDAG
  rationale: «Corazón» es la equivalencia establecida y precisa para καρδία, manteniendo la referencia al centro de afectos y voluntad.
- source_word: ψυχῇ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: BDAG
  rationale: ψυχή puede significar «vida», «yo/ser» o «alma». En este tríplice mandamiento, «alma» conserva la forma tradicional y el paralelismo semántico sin borrar la amplitud del término.
- source_word: διανοίᾳ
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - comprensión
  lexicon: BDAG
  rationale: διάνοια apunta a la facultad de pensar o entender. «Mente» es natural en español y conserva la dimensión intelectual del mandamiento.
theological_decisions:
- issue: Mantener la fuerza mandatoria de la cita deuteronómica en labios de Jesús
  english_pob_reading: You shall love
  chosen_spanish_reading: Amarás
  alternative_spanish_readings:
  - Debes amar
  - Ama
  rationale: La forma futura imperativa en la cita bíblica transmite mejor el carácter de mandamiento del texto fuente que una perífrasis moderna más explicativa.
  doctrine_reference: 'Translation philosophy §§1, 3, 6; Contested terms: κύριος → Señor'
- issue: Conservar la tríada antropológica sin colapsarla
  english_pob_reading: heart ... soul ... mind
  chosen_spanish_reading: corazón ... alma ... mente
  alternative_spanish_readings:
  - corazón ... vida ... entendimiento
  - corazón ... ser ... comprensión
  rationale: La traducción mantiene las distinciones léxicas de καρδία, ψυχή y διάνοια en una forma española natural, sin reducir la lista a una sola idea general.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés auditado permaneció estable en la última revisión; no hubo cambios aplicados y el consenso de revisión fue alto. La redacción española sigue de cerca las decisiones léxicas aprobadas, adaptándolas a la sintaxis natural del español sin introducir notas innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio del proyecto y al contexto de la cita del Shemá.
  - 'Se usa una tríada coherente y paralela: «corazón», «alma», «mente».'
  - No se añaden notas al pie porque la validación exige que todo marcador aparezca en el texto, y aquí la redacción puede permanecer limpia sin perder el contenido auditado.
