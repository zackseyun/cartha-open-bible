revisions:
- from: Pero cuando el rey entró[a] para observar a los convidados[b] reclinados a la mesa, vio allí a un hombre que no estaba vestido con traje de boda[c].
  to: Pero cuando el rey entró para observar[a] a los invitados[b] reclinados a la mesa, vio allí a un hombre que no estaba vestido con ropa de boda[c].
  rationale: La revisión corrige el anclaje de la nota léxica para θεάσασθαι, mejora la naturalidad panhispánica con «invitados» y ajusta «traje de boda» a «ropa de boda» para reflejar mejor ἔνδυμα γάμου sin perder fluidez. Se conserva la textura cultural de «reclinados a la mesa» y la especificidad de género en «un hombre».
