translation:
  language: es
  text: Pero cuando el rey entró para observar[a] a los invitados[b] reclinados a la mesa, vio allí a un hombre que no estaba vestido con ropa de boda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para mirar».'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «los que están reclinados», reflejando la postura habitual de los invitados en un banquete formal.
    reason: cultural_note
  - marker: c
    text: 'O: «con vestidura de boda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  english_pob_choice: came in
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró en
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción del rey antes del verbo principal. En español, «entró» comunica de forma natural el movimiento hacia el interior del banquete sin perder el valor narrativo de avance.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca un giro narrativo con ligera tensión. «Pero» conserva bien ese movimiento en español y encaja con el cambio de escena de la parábola.
- source_word: βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el soberano
  - el monarca
  lexicon: BDAG
  rationale: En el contexto parabólico, «el rey» es la equivalencia directa, clara y plenamente natural en español.
- source_word: θεάσασθαι
  english_pob_choice: to look at
  chosen_spanish: para observar
  alternatives_spanish:
  - para mirar
  - para inspeccionar
  - para ver
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Para observar» conserva la intención de examinar visualmente a los presentes sin volver demasiado técnico el verbo.
- source_word: τοὺς ἀνακειμένους
  english_pob_choice: the guests reclining at the table
  chosen_spanish: a los convidados reclinados a la mesa
  alternatives_spanish:
  - a los que estaban reclinados a la mesa
  - a los comensales reclinados a la mesa
  - a los invitados reclinados a la mesa
  lexicon: BDAG
  rationale: ἀνάκειμαι en contexto de banquete se refiere a reclinarse para comer. «Convidados» y «reclinados a la mesa» conservan el ambiente festivo y la costumbre cultural sin perder claridad en español.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio allí
  - se fijó en
  lexicon: BDAG
  rationale: El aoristo de ὁράω se traduce de forma directa. En español, el sujeto ya está claro por el contexto, así que «vio» fluye naturalmente.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: Adverbio de lugar. «Allí» es una correspondencia natural y precisa en español.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: El sustantivo singular masculino designa a un individuo concreto en la escena. Se conserva el referente masculino, acorde con la política de precisión de género cuando el texto lo especifica.
- source_word: οὐκ ἐνδεδυμένον
  english_pob_choice: not dressed
  chosen_spanish: que no estaba vestido
  alternatives_spanish:
  - no vestido
  - que no llevaba
  lexicon: BDAG
  rationale: El participio perfecto describe el estado actual del hombre. «Que no estaba vestido» reproduce ese estado en español con naturalidad y sin añadir matices indebidos.
- source_word: ἔνδυμα γάμου
  english_pob_choice: wedding clothes
  chosen_spanish: traje de boda
  alternatives_spanish:
  - ropa de boda
  - vestidura de boda
  - vestido de boda
  lexicon: BDAG
  rationale: La frase griega puede referirse de manera colectiva a la vestimenta adecuada para la boda. «Traje de boda» suena idiomático en español y comunica la ropa requerida para la ocasión; se mantiene abierta la alternativa de «vestidura de boda» para el sentido más literal.
theological_decisions:
- issue: Postura cultural de los invitados reclinados a la mesa
  english_pob_reading: Retain the cultural detail of reclining while clarifying that these are banquet guests.
  chosen_spanish_reading: Conservar la imagen de los convidados reclinados a la mesa.
  alternative_spanish_readings:
  - Traducir simplemente como «invitados» sin mencionar la postura
  - Traducir de forma más literal como «los que estaban reclinados»
  rationale: La escena pertenece a un banquete antiguo; el español debe preservar esa textura cultural. «Convidados reclinados a la mesa» comunica el dato histórico y mantiene la fluidez.
  doctrine_reference: Translation philosophy §§5–6
- issue: Valor de ἄνθρωπον en la escena
  english_pob_reading: a man
  chosen_spanish_reading: a un hombre
  alternative_spanish_readings:
  - a una persona
  - a alguien
  rationale: El griego usa un sustantivo masculino singular para un individuo concreto. La traducción conserva esa especificidad, evitando neutralizar un dato que el texto sí marca.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y coincide sustancialmente con el trazado auditado en inglés. Se mantiene el desarrollo narrativo con δέ, el propósito de θεάσασθαι, la referencia cultural a los reclinados y la precisión masculina de ἄνθρωπον, sin introducir paráfrasis ajenas al pasaje.
  spanish_consistency_notes:
  - Se prefirió «convidados» por su adecuación al contexto de banquete y su buen encaje con «reclinados a la mesa».
  - Se usó «traje de boda» como equivalencia idiomática, dejando en nota la alternativa más literal «vestidura de boda».
  - Se mantuvo el sujeto masculino singular («a un hombre») porque el griego lo especifica; no se generalizó a una forma neutral.
