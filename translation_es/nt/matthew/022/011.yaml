review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: el rey entra, mira a los comensales reclinados y ve allí a un hombre sin la vestimenta adecuada. También preserva correctamente el matiz cultural de ἀνακειμένους. Sin embargo, la ubicación de la nota [a] no corresponde al contenido de esa nota, porque la alternativa «para mirar» pertenece a «para observar», no a «entró». Además, «convidados» es entendible pero menos natural en español general contemporáneo que «invitados», y «traje de boda» puede sonar demasiado específico o moderno frente a ἔνδυμα γάμου, que apunta más ampliamente a vestimenta nupcial.'
  spanish_quality_summary: El español es claro y digno, pero requiere un pequeño ajuste de naturalidad y de anclaje de notas. «Invitados» suena más ampliamente legible que «convidados» en español latinoamericano neutral. «Vestido con ropa de boda» suena algo llano; «vestido con vestidura de boda» sería demasiado rígido. «Vestido para una boda» sería interpretativo. La mejor solución equilibrada es conservar una formulación natural como «sin ropa de boda», con nota para la alternativa más literal singular.
  glossary_alignment: No hay términos del glosario teológico principal en disputa en este versículo. La decisión de mantener «un hombre» está alineada con el griego ἄνθρωπον en contexto individual masculino. La conservación de la postura de banquete («reclinados a la mesa») también sigue el razonamiento documentado del POB.
  issues:
  - severity: medium
    issue: 'La nota [a] está anclada a «entró», pero su contenido («O: “para mirar”») corresponde a «para observar».'
    rationale: Esto rompe la trazabilidad del aparato de notas y no refleja correctamente la decisión léxica documentada para θεάσασθαι.
  - severity: low
    issue: «Convidados» es menos natural y menos panhispánico que «invitados».
    rationale: Aunque es correcto, «invitados» comunica mejor en español neutral latinoamericano y mantiene el mismo sentido contextual de huéspedes de banquete.
  - severity: low
    issue: «Traje de boda» puede sonar más moderno y específico que ἔνδυμα γάμου.
    rationale: El griego habla de una prenda/vestimenta de boda; en español, «ropa de boda» o «vestidura de boda» reflejan mejor el campo semántico. Conviene usar una opción natural en texto y dejar la más literal en nota.
  revised_spanish_text: Pero cuando el rey entró para observar[a] a los invitados[b] reclinados a la mesa, vio allí a un hombre que no estaba vestido con ropa de boda[c].
