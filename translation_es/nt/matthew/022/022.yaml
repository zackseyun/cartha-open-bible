translation:
  language: es
  text: Y al oír esto[a], se maravillaron, y dejándolo, se fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al haber oído esto, se maravillaron, y dejándolo, se fueron».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: hearing this
  chosen_spanish: al oír esto
  alternatives_spanish:
  - habiendo oído esto
  - después de oír esto
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente antes del verbo principal. En español, la construcción «al oír esto» refleja bien esa anterioridad sin sonar forzada. «Esto» reproduce el objeto implícito del contexto inmediato, como en el inglés POB.
- source_word: ἐθαύμασαν
  english_pob_choice: they were amazed
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - quedaron asombrados
  lexicon: BDAG
  rationale: θαυμάζω expresa asombro o admiración. «Se maravillaron» conserva la fuerza verbal y sigue siendo natural en español bíblico contemporáneo. Evita reducir el matiz a una simple sorpresa.
- source_word: ἀφέντες αὐτὸν
  english_pob_choice: leaving him
  chosen_spanish: dejándolo
  alternatives_spanish:
  - habiéndolo dejado
  - dejándolo solo
  lexicon: BDAG
  rationale: El participio aoristo de ἀφίημι indica aquí apartarse de alguien o dejarlo. «Dejándolo» es directo y fiel. «Solo» añade una idea no explícita en el griego, por lo que se evita.
- source_word: ἀπῆλθαν
  english_pob_choice: they went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - se apartaron
  - se marcharon
  lexicon: BDAG
  rationale: ἀπέρχομαι significa irse o marcharse. «Se fueron» es natural, claro y preserva el movimiento narrativo. En este contexto, su sencillez comunica mejor que una forma más marcada.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - entonces ... y
  - y luego ...
  lexicon: BDAG
  rationale: La repetición de καί enlaza las acciones de manera coordinada y rápida. Mantener «y ... y» refleja el ritmo del original sin sobreinterpretar la secuencia.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y la auditoría inglesa revisada, que optó por una participial temporal breve («hearing this») en lugar de una cláusula más explícita. Se preserva esa relación temporal con «al oír esto», y se mantiene el paralelismo narrativo de dos participios seguidos por el verbo principal.
  spanish_consistency_notes:
  - 'Se conserva el orden narrativo simple del griego: oído → asombro → abandono → partida.'
  - «Se maravillaron» mantiene el valor de θαυμάζω sin forzar un giro más literario o arcaico.
  - No se introduce ninguna nota teológica, porque el versículo describe una reacción narrativa sin carga doctrinal explícita.
