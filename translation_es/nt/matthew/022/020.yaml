translation:
  language: es
  text: 'Y les dijo[a]: «¿De quién es esta imagen, y de quién esta inscripción?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «¿De quién son esta imagen y esta inscripción?». El genitivo interrogativo puede expresar pertenencia o asociación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: El presente histórico griego puede verterse naturalmente al pretérito en narración española. «Les dijo» conserva el sentido discursivo sin sonar forzado.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural de destinatario se expresa de forma natural en español con el pronombre átono «les» en este contexto de habla.
- source_word: Τίνος
  english_pob_choice: Whose
  chosen_spanish: ¿De quién es... ?
  alternatives_spanish:
  - ¿De quién...?
  lexicon: BDAG
  rationale: El genitivo interrogativo pregunta por posesión o pertenencia. En español, «¿De quién es...?» comunica mejor la relación de propiedad que una traducción literal palabra por palabra.
- source_word: εἰκών
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - likeness
  - semblanza
  lexicon: BDAG
  rationale: «Imagen» es la equivalencia directa y adecuada para εἰκών aquí, refiriéndose a la figura grabada en la moneda.
- source_word: αὕτη
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  lexicon: BDAG
  rationale: 'El demostrativo femenino singular se mantiene con el adjetivo demostrativo normal en español: «esta».'
- source_word: ἐπιγραφή
  english_pob_choice: inscription
  chosen_spanish: la inscripción
  alternatives_spanish:
  - el grabado
  - la leyenda
  lexicon: BDAG
  rationale: «Inscripción» reproduce con precisión el texto escrito sobre la moneda y conserva el paralelismo con «imagen».
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante estándar; «y» es la forma natural antes de vocal inicial en este caso, pero aquí no se requiere eufonía porque sigue artículo femenino.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español junto al segmento al que se aplica.
