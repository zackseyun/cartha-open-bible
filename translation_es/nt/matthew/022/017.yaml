translation:
  language: es
  text: 'Entonces, díganos[a] qué le parece: ¿es lícito pagar el impuesto de capitación a César, o no?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tributo», «impuesto» o «impuesto de censo». El término griego se refiere al impuesto romano de capitación.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰπὸν
  english_pob_choice: Tell
  chosen_spanish: díganos
  alternatives_spanish:
  - diga
  - cuéntenos
  lexicon: BDAG
  rationale: El imperativo aoristo de λέγω se dirige a Jesús con objeto indirecto plural. En español, «díganos» suena natural, respetuoso y conserva el valor imperativo de petición directa.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: Entonces
  alternatives_spanish:
  - así que
  - por tanto
  lexicon: BDAG
  rationale: Marca continuidad inferencial con la interacción previa. «Entonces» reproduce bien el matiz discursivo sin sonar demasiado lógico-formal.
- source_word: τί σοι δοκεῖ
  english_pob_choice: what do you think
  chosen_spanish: qué le parece
  alternatives_spanish:
  - qué piensa usted
  - cuál es su opinión
  lexicon: BDAG
  rationale: δοκέω aquí expresa juicio u opinión personal. «Qué le parece» es idiomático en español y preserva la pregunta por la valoración de Jesús.
- source_word: ἔξεστιν
  english_pob_choice: Is it lawful
  chosen_spanish: ¿es lícito
  alternatives_spanish:
  - ¿está permitido
  - ¿es permitido
  lexicon: BDAG
  rationale: La pregunta apunta a legitimidad legal/ética, no solo a posibilidad. «Lícito» conserva ese peso normativo en español.
- source_word: δοῦναι
  english_pob_choice: to pay
  chosen_spanish: pagar
  alternatives_spanish:
  - dar
  - entregar
  lexicon: BDAG
  rationale: Aunque el infinitivo es literalmente «dar», en el contexto del tributo el español natural y preciso es «pagar». La revisión inglesa también confirmó esta precisión contextual.
- source_word: κῆνσον
  english_pob_choice: the poll tax
  chosen_spanish: el impuesto de capitación
  alternatives_spanish:
  - el tributo personal
  - el impuesto por cabeza
  lexicon: BDAG
  rationale: κῆνσος designa el impuesto romano por cabeza asociado al censo. «Impuesto de capitación» comunica con precisión histórica y evita una generalización excesiva como «impuesto».
- source_word: Καίσαρι
  english_pob_choice: to Caesar
  chosen_spanish: a César
  alternatives_spanish:
  - al César
  - al emperador
  lexicon: BDAG
  rationale: Se translitera el título/nombre propio con la preposición española adecuada. «César» mantiene el marco romano del relato.
- source_word: ἢ οὔ
  english_pob_choice: or not
  chosen_spanish: o no
  alternatives_spanish:
  - o no?
  - o no
  lexicon: BDAG
  rationale: Equivale de manera directa y natural al cierre interrogativo disyuntivo griego.
theological_decisions:
- issue: Matiz jurídico de ἔξεστιν en una pregunta trampa política
  english_pob_reading: Rendered as 'Is it lawful'
  chosen_spanish_reading: ¿es lícito
  alternative_spanish_readings:
  - ¿está permitido
  - ¿es permitido
  rationale: La escena no pregunta por capacidad, sino por legitimidad ante la ley y la obligación religiosa/política. «Lícito» mantiene esa fuerza sin añadir un sistema legal específico que el texto no explicita.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense without importing doctrinal claims.'
translation_notes:
  revision_awareness: La base inglesa pasó de «give the poll tax» a «pay the poll tax» por mayor precisión y naturalidad para δοῦναι κῆνσον; la versión española adopta desde el inicio «pagar» para reflejar esa lectura confirmada por la revisión.
  spanish_consistency_notes:
  - He mantenido «César» como nombre/título histórico coherente con el original y con la política del proyecto.
  - He usado «impuesto de capitación» para conservar la especificidad del κῆνσος romano, evitando una generalización indebida.
  - No he traducido con «SEÑOR» ni he introducido terminología eclesiástica no presente en el versículo.
