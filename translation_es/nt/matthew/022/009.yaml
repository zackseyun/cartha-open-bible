translation:
  language: es
  text: Por tanto, vayan a las encrucijadas de los caminos[a], e inviten al banquete de bodas[b] a cuantos encuentren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los cruces de caminos» o «a las salidas de los caminos». El griego se refiere a lugares donde los caminos se bifurcan o se encuentran.
    reason: lexical_alternative
  - marker: b
    text: Griego «a las bodas», un modismo que significa la celebración o el banquete de bodas.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορεύεσθε
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - vayan ustedes
  - vayan andando
  lexicon: BDAG
  rationale: El imperativo plural de segunda persona se expresa naturalmente con «vayan». Conserva el tono directivo y evita una calca innecesaria.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica a partir de la instrucción anterior. «Por tanto» suena claro y formal en español bíblico contemporáneo.
- source_word: ἐπὶ τὰς διεξόδους τῶν ὁδῶν
  english_pob_choice: to the street intersections
  chosen_spanish: a las encrucijadas de los caminos
  alternatives_spanish:
  - a los cruces de los caminos
  - a las salidas de los caminos
  - a las intersecciones de las calles
  lexicon: BDAG
  rationale: διέξοδοι puede designar salidas, cruces o lugares donde los caminos se abren o se encuentran. «Encrucijadas de los caminos» conserva esa amplitud y funciona de modo natural en español, sin reducirlo solo a ámbito urbano.
- source_word: ὅσους ἐὰν εὕρητε
  english_pob_choice: as many as you find
  chosen_spanish: a cuantos encuentren
  alternatives_spanish:
  - a todos los que encuentren
  - a quienes encuentren
  - cuantos encuentren
  lexicon: BDAG
  rationale: La construcción expresa apertura indefinida y amplitud de alcance. «A cuantos encuentren» conserva tanto la idea cuantitativa como la indefinición de la invitación.
- source_word: καλέσατε
  english_pob_choice: invite
  chosen_spanish: inviten
  alternatives_spanish:
  - llamen
  - convoquen
  lexicon: BDAG
  rationale: En contexto de banquete de bodas, καλέω significa invitar. «Inviten» reproduce mejor la función social del verbo que «llamen» o «convoquen».
- source_word: εἰς τοὺς γάμους
  english_pob_choice: to the wedding feast
  chosen_spanish: al banquete de bodas
  alternatives_spanish:
  - a las bodas
  - a la fiesta de bodas
  - a la celebración de bodas
  lexicon: BDAG
  rationale: El plural γάμοι aquí alude a la celebración nupcial, no a varios matrimonios. «Banquete de bodas» explicita el sentido idiomático y mantiene el trasfondo festivo del pasaje.
translation_notes:
  revision_awareness: Se siguió de cerca el griego SBLGNT y el audit trail inglés. Se mantuvo la amplitud semántica de διεξόδους con una expresión española idiomática, y se conservó la fuerza indefinida de ὅσους ἐὰν εὕρητε con «a cuantos encuentren».
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque no aparece en el versículo.
  - Se mantuvo el registro bíblico contemporáneo con verbos y sintagmas naturales en español.
  - No se añadió una nota separada para γάμοι porque «banquete de bodas» ya explicita el valor idiomático sin sobrecargar el versículo.
