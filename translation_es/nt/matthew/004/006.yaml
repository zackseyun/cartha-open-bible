    reason: lexical_alternative
  revision_rationale: 'Se corrige la parte final de la cita para ajustarla al griego y al audit trail inglés: μήποτε προσκόψῃς ... τὸν πόδα σου exige una formulación más concreta que «tropieces», y πρὸς λίθον pide «contra una piedra». Se mantienen las decisiones correctas del borrador («Si», «el Hijo de Dios», «escrito está», «lánzate abajo», «te alzarán») y se reubican las notas en sus anclas correspondientes para cumplir la convención del proyecto.'
