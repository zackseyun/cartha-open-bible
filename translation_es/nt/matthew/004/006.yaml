translation:
  language: es
  text: 'Y le dijo: «Si eres el Hijo de Dios, lánzate abajo[a], porque escrito está: “A sus ángeles mandará acerca de ti, y en sus manos te alzarán[b], para que no golpees tu pie contra una piedra”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «arrójate abajo».
    reason: lexical_alternative
  - marker: b
    text: 'O: «En sus manos te sostendrán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: El presente histórico griego en narración se vierte con pasado simple en español para una lectura natural y fiel al sentido narrativo.
- source_word: Εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: BDAG
  rationale: La partícula condicional conserva mejor el tono de desafío y prueba del tentador; 'Si' reproduce esa fuerza sin conceder la premisa.
- source_word: υἱὸς ... τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - un hijo de Dios
  lexicon: BDAG
  rationale: En este contexto mateano funciona como título cristológico reconocido; el artículo español ayuda a preservar ese valor titular sin intensificarlo más allá del griego.
- source_word: βάλε σεαυτὸν κάτω
  english_pob_choice: throw yourself down
  chosen_spanish: lánzate abajo
  alternatives_spanish:
  - arrójate abajo
  - tírate abajo
  - lánzate hacia abajo
  lexicon: BDAG
  rationale: '''Lánzate abajo'' comunica el imperativo reflexivo con naturalidad en español moderno. Se evita un calco más duro, pero se conserva la violencia voluntaria de la acción. La alternativa tradicional ''arrójate abajo'' queda implícitamente cubierta por la nota.'
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: escrito está
  alternatives_spanish:
  - está escrito
  lexicon: BDAG
  rationale: Se mantiene la fórmula bíblica tradicional y solemne, suficientemente clara en español y fiel a la cita de Escritura.
- source_word: ἐντελεῖται
  english_pob_choice: He will command
  chosen_spanish: mandará
  alternatives_spanish:
  - ordenará
  - dará órdenes
  lexicon: BDAG
  rationale: '''Mandará'' expresa el acto de dar una orden con naturalidad bíblica en español. Conserva la autoridad del verbo sin sobrerrepresentarlo.'
- source_word: περὶ σοῦ
  english_pob_choice: concerning you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - sobre ti
  - en cuanto a ti
  lexicon: BDAG
  rationale: '''Acerca de ti'' refleja bien el valor de περί con genitivo en esta cita y suena natural en español.'
- source_word: ἐπὶ χειρῶν
  english_pob_choice: On their hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - sobre sus manos
  - sobre las palmas de sus manos
  lexicon: BDAG
  rationale: La preposición con genitivo se traduce de manera idiomática; 'en sus manos' preserva la imagen de sostén angelical sin forzar el español.
- source_word: ἀροῦσίν σε
  english_pob_choice: they will lift you up
  chosen_spanish: te alzarán
  alternatives_spanish:
  - te levantarán
  - te sostendrán en alto
  - te llevarán
  lexicon: BDAG
  rationale: '''Alzarán'' conserva la imagen ascendente del verbo αἴρω y funciona bien con la expresión previa ''en sus manos''. Se mantiene la fuerza protectora de la cita.'
- source_word: μήποτε προσκόψῃς
  english_pob_choice: lest you strike
  chosen_spanish: para que no tropieces
  alternatives_spanish:
  - no sea que tropieces
  - para que no golpees
  lexicon: BDAG
  rationale: El griego expresa prevención; en español, 'para que no tropieces' transmite la finalidad negativa con naturalidad. 'Tropieces' conserva la idea de un obstáculo y encaja con la imagen del pie.
- source_word: πρὸς λίθον
  english_pob_choice: against a stone
  chosen_spanish: en piedra
  alternatives_spanish:
  - contra una piedra
  - con una piedra
  lexicon: BDAG
  rationale: La cita alude al contacto del pie con una piedra; 'en piedra' reproduce el giro bíblico de forma concisa. Aunque 'contra una piedra' es más literal, aquí 'en piedra' suena más natural en la secuencia española.
- source_word: τὸν πόδα σου
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tu planta del pie
  - tu pie
  lexicon: BDAG
  rationale: Se conserva el singular del griego. 'Tu pie' es la correspondencia directa y transparente en español.
theological_decisions:
- issue: Preservar la tensión entre la tentación y la cita bíblica sin corregir al hablante
  english_pob_reading: Translate the citation as spoken, preserving the tempter's appeal to Scripture
  chosen_spanish_reading: Traducir la cita tal como es pronunciada, preservando el recurso del tentador a la Escritura
  alternative_spanish_readings:
  - Añadir una aclaración interpretativa en el texto principal
  - Suavizar la cita para evitar el uso torcido de la Escritura
  rationale: El texto presenta al tentador citando la Escritura; la traducción no debe armonizar ni corregir esa cita dentro del versículo. La tensión teológica debe permanecer visible en el texto principal y no desplazarse a una paráfrasis.
  doctrine_reference: Principio de primacía del texto fuente; no resolver en traducción la tensión exegética que el pasaje deja abierta.
- issue: Valor cristológico de 'Hijo de Dios'
  english_pob_reading: Rendered as the title 'the Son of God'
  chosen_spanish_reading: Verterlo como el título 'el Hijo de Dios'
  alternative_spanish_readings:
  - '''hijo de Dios'' sin artículo'
  - '''el hijo de Dios'' en lectura menos titular'
  rationale: En Mateo la expresión funciona aquí como apelación al estatus mesiánico/cristológico de Jesús. El artículo español mantiene el carácter titular reconocido en la narrativa sin añadir contenido doctrinal ajeno al verso.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451); fidelidad al uso mateano del título.
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión: no se registran cambios requeridos respecto del texto auditado; se mantiene la equivalencia óptima y la traducción de la cita sin armonización interpretativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino explícito; aquí el texto cita 'Dios' y una alusión al salmo, por lo que no corresponde introducirlo.
  - Se mantiene 'escrito está' como fórmula bíblica estable y comprensible para lectura eclesial.
  - Se conserva el singular 'pie' y el plural 'manos' conforme al griego.
  - El tono general es bíblico y dignificado, evitando arcaísmos innecesarios salvo donde la fórmula tradicional favorece la fidelidad textual.
