revisions:
- from: 'Y le dijo: «Si eres el Hijo de Dios, lánzate abajo, porque escrito está: “A sus ángeles mandará acerca de ti, y en sus manos te alzarán, para que no tropieces con tu pie en piedra”».[a][b]'
  to: 'Y le dijo: «Si eres el Hijo de Dios, lánzate abajo[a], porque escrito está: “A sus ángeles mandará acerca de ti, y en sus manos te alzarán[b], para que no golpees tu pie contra una piedra”».'
  rationale: 'Se corrige la parte final de la cita para ajustarla al griego y al audit trail inglés: μήποτε προσκόψῃς ... τὸν πόδα σου exige una formulación más concreta que «tropieces», y πρὸς λίθον pide «contra una piedra». Se mantienen las decisiones correctas del borrador («Si», «el Hijo de Dios», «escrito está», «lánzate abajo», «te alzarán») y se reubican las notas en sus anclas correspondientes para cumplir la convención del proyecto.'
