review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura básica del griego y las decisiones principales del POB en varios puntos: «Si», «el Hijo de Dios», «escrito está», y la cita escrituraria como cita del tentador. Sin embargo, hay dos desalineaciones relevantes con la evidencia fuente y con el rastro auditado en inglés: (1) μήποτε προσκόψῃς πρὸς λίθον τὸν πόδα σου se ha vertido como «para que no tropieces con tu pie en piedra», lo cual desplaza el sentido específico de «golpear/chocar tu pie contra una piedra» hacia un tropiezo más general; y (2) πρὸς λίθον se ha traducido «en piedra», una formulación poco natural y menos fiel que «contra una piedra».'
  spanish_quality_summary: 'El texto es generalmente legible y digno, pero la cola de la cita suena forzada en español bíblico actual: «para que no tropieces con tu pie en piedra» es poco idiomático. También conviene recolocar los marcadores de nota junto a las expresiones pertinentes, no al final del versículo, para cumplir la disciplina del proyecto y evitar ambigüedad sobre qué palabra anotan.'
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto en este versículo. «el Hijo de Dios» está bien. Las alternativas léxicas del inglés pueden preservarse en notas en español: para βάλε σεαυτὸν κάτω, «arrójate abajo»; para ἀροῦσίν σε, «te sostendrán» o mejor «te llevarán/sostendrán en alto», según el matiz. La fórmula «escrito está» es aceptable en español eclesial. El ajuste principal es hacer más fiel «para que no golpees tu pie contra una piedra».'
  issues:
  - severity: high
    issue: «para que no tropieces con tu pie en piedra» no refleja con precisión μήποτε προσκόψῃς πρὸς λίθον τὸν πόδα σου
    rationale: El griego aquí no habla simplemente de tropezar en sentido general, sino de que el pie choque/golpee contra una piedra. El POB inglés auditado eligió explícitamente «lest you strike your foot against a stone». La versión actual debilita y desdibuja esa imagen concreta.
  - severity: medium
    issue: «en piedra» para πρὸς λίθον es poco natural y menos fiel
    rationale: πρὸς con acusativo en este contexto corresponde mejor a «contra una piedra». «En piedra» no es una expresión española natural aquí y puede sonar arcaizante sin aportar fidelidad.
  - severity: medium
    issue: Los marcadores de notas están colocados al final del versículo en vez de anclarse a la frase correspondiente
    rationale: La instrucción del proyecto exige que el marcador exacto aparezca en spanish_text en la palabra o frase relevante. Al poner ambos al final, la referencia de cada nota queda ambigua.
  revised_spanish_text: 'Y le dijo: «Si eres el Hijo de Dios, lánzate abajo[a], porque escrito está: “A sus ángeles mandará acerca de ti, y en sus manos te alzarán[b], para que no golpees tu pie contra una piedra”».

    '
