base_translation:
  language: en
  yaml_path: translation/nt/matthew/004/006.yaml
  text: 'And he said to him[a], “If you are the Son of God, throw yourself down, for it is written: ‘He will command his angels concerning you,’ and ‘On their hands they will lift you up[b], lest you strike your foot against a stone.’”'
