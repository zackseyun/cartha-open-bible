  - severity: low
    issue: Puntuación excesiva con comas
    rationale: «Y ellos, inmediatamente, dejaron...» suena menos natural en español bíblico actual. Las comas no reflejan ninguna estructura exigida por el griego y entorpecen la lectura.
  revised_spanish_text: Y ellos dejaron inmediatamente[a] la barca y a su padre, y lo siguieron.
