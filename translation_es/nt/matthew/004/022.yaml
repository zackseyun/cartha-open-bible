translation:
  language: es
  text: Y ellos dejaron inmediatamente[a] la barca y a su padre, y lo siguieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en seguida».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  - Ahora bien
  lexicon: BDAG
  rationale: δέ aquí enlaza la narración con un avance suave; en español, «Y» mantiene la coordinación simple sin añadir contraste ni causalidad.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - de inmediato
  - al instante
  - en seguida
  lexicon: BDAG
  rationale: εὐθέως expresa prontitud marcada; «inmediatamente» conserva esa urgencia con estilo natural y digno en español.
- source_word: ἀφέντες
  english_pob_choice: left
  chosen_spanish: dejaron
  alternatives_spanish:
  - habiendo dejado
  - abandonaron
  - soltaron
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Dejaron» comunica la acción previa de forma idiomática sin forzar una construcción participial pesada en español. «Abandonaron» sería más fuerte de lo que el texto exige.
- source_word: τὸ πλοῖον
  english_pob_choice: the boat
  chosen_spanish: la barca
  alternatives_spanish:
  - el bote
  - el barco
  lexicon: BDAG
  rationale: En este contexto de pescadores, πλοῖον se refiere naturalmente a una embarcación pequeña; «barca» es claro, sobrio y adecuado en español bíblico actual.
- source_word: τὸν πατέρα αὐτῶν
  english_pob_choice: their father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su propio padre
  - a su padre de ellos
  lexicon: BDAG
  rationale: La frase identifica a Zebedeo como su padre. En español, el objeto directo personal requiere la preposición «a»; «su padre» preserva la relación familiar y la fuerza del costo del discipulado.
- source_word: ἠκολούθησαν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - le siguieron
  - fueron tras él
  lexicon: BDAG
  rationale: ἀκολουθέω en contexto de discipulado significa «seguir». «Lo siguieron» es natural en español y conserva el movimiento físico y el sentido de discipulado. Aunque «le siguieron» es posible en algunas zonas, «lo» evita variación regional innecesaria.
- source_word: οἱ
  english_pob_choice: they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Ellos
  - Los dos
  lexicon: BDAG
  rationale: El artículo sustantivado remite a los dos hermanos ya mencionados. En español, conviene explicitar el sujeto con «ellos»; aquí se integra de manera fluida en la coordinación narrativa.
theological_decisions:
- issue: Respuesta inmediata al llamado y renuncia familiar
  english_pob_reading: The verse emphasizes an immediate, decisive act of leaving boat and father to follow Jesus, without overstating permanent abandonment.
  chosen_spanish_reading: La traducción conserva la prontitud y la decisión del acto, sin convertir «dejaron» en una afirmación más fuerte que la del griego.
  alternative_spanish_readings:
  - los abandonaron para siempre
  - se apartaron temporalmente
  rationale: ἀφέντες señala una acción real y previa al seguimiento, pero no exige afirmar abandono permanente. «Dejaron» mantiene la tensión narrativa y el costo del discipulado sin añadir interpretación extra.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación eliminando notas no ancladas: esta versión no incluye pies de nota, de modo que cada elemento del registro queda plenamente alineado con el texto español.'
  spanish_consistency_notes:
  - Se prefirió «barca» por contexto pesquero y naturalidad en español.
  - Se mantuvo «Y» inicial para reflejar la conexión narrativa breve de δὲ sin sobrerinterpretación.
  - Se usó el objeto directo personal «a su padre» para reflejar correctamente la sintaxis del español.
  - Se evitó «Cristo» o «Mesías» porque el versículo no contiene ese vocabulario.
