lexical_decisions:
- source_word: Ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: Al oír
  alternatives_spanish:
  - cuando oyó
  - habiendo oído
  - al escuchar
  lexicon: BDAG
  rationale: Participio aoristo de ἀκούω con valor temporal respecto al verbo principal. 'Al oír' captura con elegancia la relación temporal del participio en español moderno y resulta más idiomático que 'habiendo oído', que sonaría torpe. 'Cuando oyó' también sería válido, pero la construcción 'al + infinitivo' refleja mejor la estructura participial del griego. El sujeto (Jesús) se sobrentiende del contexto narrativo.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: (absorbido en el flujo narrativo)
  alternatives_spanish:
  - pero
  - y
  - ahora bien
  - entonces
  lexicon: BDAG
  rationale: δέ funciona aquí como conector narrativo suave que marca una transición discursiva, sin contraste fuerte. En español, la construcción participial 'al oír' absorbe naturalmente el cambio de escena sin necesitar un conector explícito. Añadir 'pero' introduciría una adversatividad ausente en el original; 'ahora bien' añadiría una formalidad mayor de la que δέ conlleva. La omisión del conector explícito es la opción más idiomática e inocua para el español.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  lexicon: BDAG
  rationale: Transliteración española estándar del nombre propio Ἰωάννης. 'Juan' es la forma consolidada en el español bíblico y eclesiástico, plenamente comprensible sin necesidad de explicación adicional.
- source_word: παρεδόθη
  english_pob_choice: had been handed over
  chosen_spanish: había sido entregado
  alternatives_spanish:
  - había sido arrestado
  - había sido apresado
  - fue entregado
  lexicon: BDAG
  rationale: Pasivo aoristo de παραδίδωμι. 'Entregado' preserva la amplitud léxica del verbo griego, que no se limita a la detención técnica y puede evocar resonancias teológicas de ser 'entregado' (como en los anuncios pasionarios). El pluscuamperfecto 'había sido entregado' refleja la relación temporal respecto a 'al oír que', paralela al inglés 'had been handed over'. La alternativa contextualmente específica 'arrestado' se conserva en nota al pie.
- source_word: ἀνεχώρησεν
  english_pob_choice: he withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - partió
  - se fue
  - se apartó
  - se marchó
  - huyó
  lexicon: BDAG
  rationale: ἀναχωρέω en Mateo frecuentemente connota un retiro deliberado en respuesta a circunstancias externas. 'Se retiró' captura ese matiz mejor que el neutro 'partió' o el excesivamente llano 'se fue', sin exagerar el miedo que implicaría 'huyó'. 'Se apartó' también sería posible, pero 'se retiró' es la opción más precisa y digna para el registro de la narración.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  lexicon: BDAG
  rationale: εἰς con valor direccional. En español, 'a Galilea' es la construcción más natural e idiomática con verbos de movimiento. 'Hacia Galilea' podría enfatizar la trayectoria, pero resulta ligeramente más artificial en este contexto. La fuerza direccional de εἰς queda suficientemente representada en la preposición 'a'.
theological_decisions:
- issue: Traducción de παραδίδωμι en relación con Juan
  english_pob_reading: had been handed over
  chosen_spanish_reading: había sido entregado
  alternative_spanish_readings:
  - había sido arrestado
  rationale: El verbo griego παραδίδωμι es más amplio que un término técnico para la detención judicial. En Mateo, el mismo verbo aparece en contextos de resonancia teológica (entrega del Hijo del Hombre). Mantener 'entregado' en el texto principal preserva esa amplitud léxica sin importar más de lo que el contexto justifica. La alternativa específica 'arrestado', que es la referencia histórica inmediata (la detención de Juan por Herodes), se conserva en nota al pie, siguiendo el mismo criterio editorial del inglés POB. Esto es coherente con la filosofía de traducción §§1, 3, 5.
  doctrine_reference: Filosofía de traducción §§1, 3, 5
translation_notes:
  revision_awareness: 'La última revisión (modelo gpt-5.4, 2026-04-23) no introdujo cambios al texto inglés POB, y la verificación cruzada registra acuerdo pleno (1,0). El borrador español sigue las mismas conclusiones exegéticas: preserva la amplitud de παραδίδωμι con ''entregado'', opta por ''se retiró'' para ἀναχωρέω y traslada la alternativa ''arrestado'' a la nota al pie, tal como lo hace el inglés. No hay revisiones aplicadas previas que afecten la traducción española.'
  spanish_consistency_notes:
  - '''Juan'' para Ἰωάννης: transliteración española estándar, coherente con la práctica del proyecto de transliterar nombres propios.'
  - '''Galilea'' para Γαλιλαία: topónimo español consolidado; no requiere modificación.'
  - '''Entregado'' para παραδίδωμι: preserva la amplitud léxica del griego conforme a la filosofía POB; la alternativa ''arrestado'' va en nota, no en texto principal.'
  - No aparece ninguno de los términos teológicos centrales del proyecto (Yahvé, Mesías, esclavo, etc.) en este versículo; no se aplican sustituciones terminológicas de proyecto.
  - El δέ narrativo se absorbe en el flujo de la cláusula española sin conector explícito, práctica coherente con el tratamiento de partículas de transición suave en prosa narrativa española.
