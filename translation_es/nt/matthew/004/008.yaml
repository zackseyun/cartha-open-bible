translation:
  language: es
  text: De nuevo[a], el diablo lo lleva a un monte muy alto y le muestra todos los reinos del mundo y su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su esplendor».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  english_pob_choice: Again
  chosen_spanish: De nuevo
  alternatives_spanish:
  - Otra vez
  - Una vez más
  lexicon: BDAG
  rationale: Marca la repetición en la secuencia de la tentación. «De nuevo» es natural en español y conserva la continuidad narrativa.
- source_word: παραλαμβάνει
  english_pob_choice: takes
  chosen_spanish: lo lleva
  alternatives_spanish:
  - lo toma y lo lleva
  - lo conduce
  lexicon: BDAG
  rationale: El verbo narra un movimiento con el objeto personal; «lo lleva» expresa la acción de traslado de forma directa y natural sin añadir matices no explicitados.
- source_word: ὁ διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el demonio
  - el acusador
  lexicon: BDAG
  rationale: Aquí διάβολος funciona como designación reconocible de Satanás. «El diablo» es la equivalencia usual y clara en español.
- source_word: εἰς ὄρος ὑψηλὸν λίαν
  english_pob_choice: to a very high mountain
  chosen_spanish: a un monte muy alto
  alternatives_spanish:
  - a una montaña muy alta
  - sobre un monte altísimo
  lexicon: BDAG
  rationale: «ὄρος» puede ser «monte» o «montaña». Se eligió «monte» por resonancia bíblica y naturalidad; «muy alto» conserva el intensificador λίαν sin exageración interpretativa.
- source_word: δείκνυσιν
  english_pob_choice: shows
  chosen_spanish: le muestra
  alternatives_spanish:
  - le enseña
  - le enseña claramente
  lexicon: BDAG
  rationale: El verbo indica presentar algo a la vista. «Le muestra» es el equivalente directo y no añade explicaciones.
- source_word: πάσας τὰς βασιλείας
  english_pob_choice: all the kingdoms
  chosen_spanish: todos los reinos
  alternatives_spanish:
  - todos los dominios
  - todas las naciones
  lexicon: BDAG
  rationale: «βασιλείας» conserva el sentido político-regio; «reinos» lo refleja mejor que un término más general como «dominios».
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de la tierra
  - del orden del mundo
  lexicon: BDAG
  rationale: «κόσμος» aquí se refiere al mundo en su conjunto; «del mundo» es la opción más natural y suficientemente precisa en español.
- source_word: τὴν δόξαν αὐτῶν
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su magnificencia
  lexicon: BDAG
  rationale: «δόξα» puede abarcar gloria, esplendor o magnificencia. Se conserva «gloria» para mantener el vínculo léxico-teológico; el sentido de brillo o esplendor queda disponible en la nota.
theological_decisions:
- issue: Naturaleza de la escena al mostrar los reinos
  english_pob_reading: Translate the scene straightforwardly as narrated, without specifying whether the showing of all kingdoms is visionary, supernatural, or merely geographical.
  chosen_spanish_reading: Traducir la escena tal como se narra, sin precisar si la muestra fue visionaria, sobrenatural o solo geográfica.
  alternative_spanish_readings:
  - Entenderlo como una visión sobrenatural
  - Entenderlo como un recorrido visual literal desde un monte físico
  rationale: El griego afirma que el diablo lo llevó a un monte muy alto y le mostró los reinos; no explicita el mecanismo. La traducción debe preservar esa tensión sin resolverla.
  doctrine_reference: Preservar la tensión narrativa sin añadir explicación externa.
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés aprobado: no se introdujeron revisiones posteriores ni cambios de sentido; se mantuvo la estructura narrativa simple y la alternativa léxica para δόξα.'
  spanish_consistency_notes:
  - Se usa «diablo» de modo consistente con el valor titular de διάβολος en este contexto.
  - Se prefirió «monte» por registro bíblico natural en español, sin perder el valor de elevación extrema expresado por λίαν.
  - «Gloria» se mantiene como opción principal para δόξα, con nota de alternativa para reflejar la amplitud semántica reconocida en el inglés POB.
