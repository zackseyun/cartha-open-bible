  text: καὶ ἀπῆλθεν ἡ ἀκοὴ αὐτοῦ εἰς ὅλην τὴν Συρίαν· καὶ προσήνεγκαν αὐτῷ πάντας τοὺς κακῶς ἔχοντας ποικίλαις νόσοις καὶ βασάνοις ⸀συνεχομένους, δαιμονιζομένους καὶ σεληνιαζομένους καὶ παραλυτικούς, καὶ ἐθεράπευσεν αὐτούς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/004/024.yaml
  text: And the report about him went out into all Syria[a], and they brought to him all who were sick, afflicted with various diseases and torments, those oppressed by demons, those having seizures, and paralytics[c][b], and he healed them.
  footnotes:
  - marker: a
    text: Or 'the demon-possessed' or 'those demonized.'
    reason: lexical_alternative
  - marker: b
    text: Greek σεληνιαζομένους, traditionally 'epileptics'; more literally, people thought to be affected by the moon.
    reason: lexical_alternative
  - marker: c
    text: Or 'all who were sick, afflicted with various diseases and torments, those oppressed by demons, those having seizures, and paralytics'.
    reason: previous_rendering
