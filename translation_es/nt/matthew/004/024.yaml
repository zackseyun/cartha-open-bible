revisions:
- from: 'Y su fama se extendió por toda Siria, y le trajeron a todos los que estaban mal: los afligidos por diversas enfermedades y tormentos, los poseídos por demonios, los que sufrían convulsiones y los paralíticos, y los sanó.'
  to: Y la noticia acerca de él se extendió por toda Siria, y le trajeron a todos los que estaban enfermos, afligidos por diversas enfermedades y tormentos, los oprimidos por demonios[a], los que sufrían convulsiones[b] y los paralíticos, y los sanó.
  rationale: 'La revisión alinea el español con las decisiones léxicas y teológicas auditadas del POB: ἀκοή se acerca a ''noticia'' en vez de ''fama''; κακῶς ἔχοντας se expresa con el más natural y digno ''los que estaban enfermos''; δαιμονιζομένους se ajusta a ''los oprimidos por demonios'' para no imponer una categoría más estrecha que el griego; y se restauran notas para las alternativas significativas de δαιμονιζομένους y σεληνιαζομένους. El resultado sigue siendo natural en español y fiel al griego.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:04:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo: la noticia acerca de Jesús se difunde por Siria, le traen a los enfermos con varias afecciones, y él los sana. Sin embargo, hay dos desajustes relevantes con el expediente inglés y con la fuerza del griego: ἀκοή se vertió como ''fama'', que es posible pero se aleja de la decisión auditada ''report/news''; y δαιμονιζομένους se tradujo como ''poseídos por demonios'', que es más estrecho y más fuerte que la elección documentada ''those oppressed by demons'', aunque el inglés conservó alternativas en nota. Además, ''los que estaban mal'' para κακῶς ἔχοντας suena demasiado coloquial e impreciso en español bíblico.'
  spanish_quality_summary: El español es legible, pero 'los que estaban mal' resulta poco digno y algo vago para un registro bíblico moderno. También el uso de dos puntos después de 'estaban mal' no refleja la puntuación final del POB inglés y no es necesario en español. 'Su fama se extendió' fluye bien, pero 'la noticia acerca de él se extendió' preserva mejor el sentido semántico de ἀκοή y mantiene naturalidad. La lista mejora con formulación paralela y más clara.
  glossary_alignment: No hay términos de glosario principal en conflicto directo salvo la decisión teológica/lexical sobre δαιμονιζομένους. Dado el rastro auditado del POB, conviene alinear el español con 'oprímidos por demonios' o equivalente, preservando en nota la alternativa tradicional 'poseídos por demonios'/'endemoniados'. La ausencia de nota para σεληνιαζομένους también pierde una alternativa que el POB inglés consideró importante conservar.
  issues:
  - severity: medium
    issue: ἀκοή se tradujo como 'fama' en vez de una forma equivalente a 'noticia/reporte'.
    rationale: '''Fama'' no es imposible, pero el expediente inglés eligió deliberadamente ''report'' para evitar la noción más interpretativa o arcaizante de ''fame''. En español, ''la noticia acerca de él'' o ''su noticia'' preserva mejor lo que se oye sobre Jesús.'
  - severity: high
    issue: δαιμονιζομένους se tradujo como 'los poseídos por demonios'.
    rationale: Esto estrecha el término más de lo que exige el griego y se aparta de la decisión teológica auditada 'those oppressed by demons'. El español debe reflejar esa cautela léxica, con la alternativa tradicional en nota.
  - severity: medium
    issue: κακῶς ἔχοντας se tradujo como 'los que estaban mal'.
    rationale: Aunque comprensible, suena coloquial e impreciso. 'Los que estaban enfermos' es más natural, digno y fiel al sentido idiomático griego.
  - severity: medium
    issue: Faltan notas para alternativas léxicas preservadas por el POB inglés.
    rationale: El inglés mantiene nota para δαιμονιζομένους y para σεληνιαζομένους. En español conviene conservar esas alternativas, especialmente porque 'oprímidos por demonios' y 'los que sufrían convulsiones' pueden requerir aclaración tradicional/literal.
  revised_spanish_text: Y la noticia acerca de él se extendió por toda Siria, y le trajeron a todos los que estaban enfermos, afligidos por diversas enfermedades y tormentos, los oprimidos por demonios[a], los que sufrían convulsiones[b] y los paralíticos, y los sanó.
  revised_footnotes:
  - marker: a
    text: O 'los poseídos por demonios' o 'los endemoniados'.
    reason: lexical_alternative
  - marker: b
    text: Griego σεληνιαζομένους, tradicionalmente 'epilépticos'; más literalmente, personas que se pensaba que eran afectadas por la luna.
    reason: lexical_alternative
  revision_rationale: 'La revisión alinea el español con las decisiones léxicas y teológicas auditadas del POB: ἀκοή se acerca a ''noticia'' en vez de ''fama''; κακῶς ἔχοντας se expresa con el más natural y digno ''los que estaban enfermos''; δαιμονιζομένους se ajusta a ''los oprimidos por demonios'' para no imponer una categoría más estrecha que el griego; y se restauran notas para las alternativas significativas de δαιμονιζομένους y σεληνιαζομένους. El resultado sigue siendo natural en español y fiel al griego.'
