translation:
  language: es
  text: Y la noticia acerca de él se extendió por toda Siria, y le trajeron a todos los que estaban enfermos, afligidos por diversas enfermedades y tormentos, los oprimidos por demonios[a], los que sufrían convulsiones[b] y los paralíticos, y los sanó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los poseídos por demonios' o 'los endemoniados'.
    reason: lexical_alternative
  - marker: b
    text: Griego σεληνιαζομένους, tradicionalmente 'epilépticos'; más literalmente, personas que se pensaba que eran afectadas por la luna.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκοή
  english_pob_choice: report
  chosen_spanish: fama
  alternatives_spanish:
  - noticia
  - reporte
  lexicon: BDAG
  rationale: Aquí ἀκοή significa lo que se oye acerca de Jesús, es decir, su fama o noticia difundida. 'Fama' conserva la idea de circulación pública y funciona naturalmente en español; 'noticia' y 'reporte' quedan como alternativas posibles, pero 'reporte' suena más técnico y menos idiomático.
- source_word: ἀπῆλθεν
  english_pob_choice: went out
  chosen_spanish: se extendió
  alternatives_spanish:
  - salió
  - fue por todas partes
  lexicon: BDAG
  rationale: El griego expresa movimiento de difusión. 'Se extendió' comunica bien la propagación de la fama en español, aunque no reproduce de manera literal la imagen de salida. 'Salió' es más literal, pero en español suena menos natural con 'fama'.
- source_word: Συρίαν
  english_pob_choice: Syria
  chosen_spanish: Siria
  lexicon: BDAG
  rationale: Nombre geográfico estándar.
- source_word: προσήνεγκαν
  english_pob_choice: they brought
  chosen_spanish: le trajeron
  alternatives_spanish:
  - le presentaron
  - lo llevaron
  lexicon: BDAG
  rationale: En este contexto el verbo significa traer personas hacia Jesús. 'Le trajeron' es el español más natural y fiel al sentido relacional del pasaje.
- source_word: κακῶς ἔχοντας
  english_pob_choice: who were sick
  chosen_spanish: los que estaban mal
  alternatives_spanish:
  - los que estaban enfermos
  - los que se hallaban mal
  lexicon: BDAG
  rationale: La expresión idiomática griega indica estar enfermo o en mala condición. 'Los que estaban mal' conserva amplitud antes de especificar las dolencias, pero se aclara inmediatamente en la lista siguiente.
- source_word: ποικίλαις νόσοις
  english_pob_choice: various diseases
  chosen_spanish: diversas enfermedades
  alternatives_spanish:
  - muchas enfermedades
  - enfermedades de varios tipos
  lexicon: BDAG
  rationale: '''Diversas enfermedades'' reproduce la variedad del adjetivo ποικίλαις y el sentido médico de νόσοις sin sobrecargar el texto.'
- source_word: βασάνοις
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - penas
  - dolores
  - aflicciones
  lexicon: BDAG
  rationale: βάσανος puede referirse a sufrimiento intenso, tormento o dolor. 'Tormentos' mantiene la fuerza del término y la gravedad de la aflicción.
- source_word: συνεχομένους
  english_pob_choice: afflicted
  chosen_spanish: afligidos
  alternatives_spanish:
  - oprimidos
  - atormentados
  - sujetos
  lexicon: BDAG
  rationale: El participio expresa estar apremiados o estrechamente afectados por algo. 'Afligidos' comunica bien la presión o carga de las dolencias sin forzar una interpretación causal.
- source_word: δαιμονιζομένους
  english_pob_choice: those oppressed by demons
  chosen_spanish: los poseídos por demonios
  alternatives_spanish:
  - los oprimidos por demonios
  - los endemoniados
  lexicon: BDAG
  rationale: El participio denota personas bajo influencia demoníaca real. En español, 'poseídos por demonios' es una formulación clara y tradicional; 'oprimidos por demonios' preserva mejor la elección inglesa, pero puede sonar menos natural o más débil en este contexto.
- source_word: σεληνιαζομένους
  english_pob_choice: those having seizures
  chosen_spanish: los que sufrían convulsiones
  alternatives_spanish:
  - epilépticos
  - los afectados por la luna
  lexicon: BDAG
  rationale: El término está ligado etimológicamente a la luna, pero en contexto describe un cuadro convulsivo o epiléptico. 'Sufrían convulsiones' comunica el sentido probable sin imponer una etiología antigua, y evita un tecnicismo clínico más duro.
- source_word: παραλυτικούς
  english_pob_choice: paralytics
  chosen_spanish: los paralíticos
  alternatives_spanish:
  - los paralizados
  lexicon: BDAG
  rationale: El sustantivo/adjetivo sustantivado designa a personas con parálisis. 'Los paralíticos' es conciso, natural y fiel.
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: los sanó
  alternatives_spanish:
  - los curó
  - los sanó a todos
  lexicon: BDAG
  rationale: θεραπεύω en este contexto significa sanar. 'Los sanó' es la opción más natural en español y preserva el acto curativo atribuido a Jesús.
theological_decisions:
- issue: Cómo expresar δαιμονιζομένους sin diluir la realidad espiritual ni imponer un tecnicismo que el griego no exige
  english_pob_reading: those oppressed by demons
  chosen_spanish_reading: los poseídos por demonios
  alternative_spanish_readings:
  - los oprimidos por demonios
  - los endemoniados
  rationale: La tradición cristiana del proyecto afirma la realidad de la actividad demoníaca; por eso no se neutraliza el término. 'Poseídos por demonios' mantiene esa realidad de forma clara para el lector español, aunque 'oprimidos por demonios' queda como alternativa más cercana a la formulación inglesa.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Cómo traducir σεληνιαζομένους sin endorsar la etiología lunar antigua, pero manteniendo el sentido de una afección reconocible
  english_pob_reading: those having seizures
  chosen_spanish_reading: los que sufrían convulsiones
  alternative_spanish_readings:
  - epilépticos
  - los afectados por la luna
  rationale: El término griego está etimológicamente relacionado con la luna, pero el contexto apunta a personas con crisis convulsivas. 'Sufrían convulsiones' conserva el sentido visible para el lector moderno y evita presentar como explicación la antigua asociación lunar.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del audit trail inglés, que favorece una lista fluida sin dos puntos tras la primera categoría general. En español se mantuvo esa fluidez con una enumeración natural, aunque se ajustó la sintaxis para que 'los que estaban mal' introduzca de manera legible la serie de aflicciones.
  spanish_consistency_notes:
  - Se usó 'Siria' como nombre propio estándar.
  - Se evitó 'SEÑOR' porque este versículo no contiene el nombre divino ni una cita explícita del Tetragrámaton.
  - Se optó por un español bíblico moderno y publicable, evitando calcos como 'reporte acerca de él'.
  - Se mantuvo la distinción entre enfermedad general, opresión demoníaca, convulsiones y parálisis, sin fusionar categorías.
