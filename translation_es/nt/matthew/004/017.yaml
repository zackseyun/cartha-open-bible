translation:
  language: es
  text: 'Desde entonces Jesús comenzó a proclamar[c], diciendo: «Arrepiéntanse, porque el reino de los cielos[b] se ha acercado[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha llegado cerca» o «está cerca». El verbo perfecto griego subraya una cercanía que ya ha llegado y permanece vigente.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el reino de los cielos». Mateo usa esta expresión con frecuencia donde otros pasajes suelen decir «el reino de Dios».'
    reason: lexical_alternative
  - marker: c
    text: O «a proclamar y a decir».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀπὸ τότε
  english_pob_choice: From that time
  chosen_spanish: Desde entonces
  alternatives_spanish:
  - A partir de entonces
  - Desde aquel momento
  lexicon: BDAG
  rationale: Marca un giro narrativo claro. «Desde entonces» conserva el valor temporal de transición sin sonar forzado en español.
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: «Comenzó» es natural y formal en español, y mantiene el inicio de una acción narrativa sin añadir matiz extra.
- source_word: κηρύσσειν
  english_pob_choice: to proclaim
  chosen_spanish: a proclamar
  alternatives_spanish:
  - a predicar
  - a anunciar
  lexicon: BDAG
  rationale: «Proclamar» conserva el sentido público y declarativo de κηρύσσω. «Predicar» sería posible, pero en español tiende a sonar más eclesiástico y menos amplio.
- source_word: καὶ λέγειν
  english_pob_choice: and to say
  chosen_spanish: diciendo
  alternatives_spanish:
  - y a decir
  - y diciendo
  lexicon: BDAG
  rationale: La construcción griega coordina dos infinitivos; en español, un gerundio introductorio fluye mejor y preserva la relación entre la proclamación y el contenido de lo dicho.
- source_word: Μετανοεῖτε
  english_pob_choice: Repent
  chosen_spanish: Arrepiéntanse
  alternatives_spanish:
  - Arrepentíos
  - Cambien de mente
  - Vuélvanse
  lexicon: BDAG
  rationale: El imperativo exige un cambio moral y espiritual de rumbo. «Arrepiéntanse» es la forma idiomática y digna en español actual, sin diluir la fuerza exhortativa.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - ha llegado cerca
  - está cerca
  lexicon: BDAG
  rationale: El perfecto expresa una cercanía ya inaugurada y vigente. «Se ha acercado» conserva bien ese valor aspectual sin sonar artificial.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  lexicon: BDAG
  rationale: «Reino» es la equivalencia más estable y comprensible en español. «Reinado» o «dominio» pueden captar el matiz de soberanía, pero aquí «reino» mantiene la formulación bíblica reconocible.
- source_word: τῶν οὐρανῶν
  english_pob_choice: of heaven
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: BDAG
  rationale: Mateo usa la expresión plural como circunlocución reverente. «De los cielos» reproduce mejor la forma del griego que «del cielo» y mantiene la terminología característica de Mateo.
theological_decisions:
- issue: Forma de Mateo para βασιλεία τῶν οὐρανῶν
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reino del cielo
  - el reinado de los cielos
  rationale: Se preserva la expresión característica de Mateo sin sustituirla por una paráfrasis. «Los cielos» mantiene la circunlocución reverente y la textura del texto fuente.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Fuerza de Μετανοεῖτε
  english_pob_reading: Repent
  chosen_spanish_reading: Arrepiéntanse
  alternative_spanish_readings:
  - Cambien de mente
  - Vuélvanse
  rationale: El mandato incluye un vuelco moral y espiritual, no sólo un ajuste intelectual. «Arrepiéntanse» comunica esa exigencia con precisión y sin cargarla de jerga denominacional.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El audit trail inglés mantuvo la opción «to proclaim, saying» tras una revisión que ajustó la coordinación de infinitivos para mayor naturalidad sin perder relación semántica. En español se refleja esa relación con «comenzó a proclamar, diciendo», preservando tanto la proclamación pública como la introducción del discurso directo.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «reino» y no «reinado» porque el contexto de Mateo favorece la formulación tradicional y comprensible, sin perder el sentido de soberanía.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino ni una cita directa del tetragrámaton.
  - La puntuación y las comillas siguen normas tipográficas españolas y conservan el corte narrativo y la cita directa.
