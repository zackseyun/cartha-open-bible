base_translation:
  language: en
  yaml_path: translation/nt/matthew/004/017.yaml
  text: From that time Jesus began to proclaim[a], saying, “Repent[c][b], for the kingdom of heaven has drawn near.”
  footnotes:
  - marker: a
    text: Or “has come near” or “is near.” The Greek perfect verb emphasizes that the kingdom's nearness has arrived and remains in effect.
    reason: lexical_alternative
  - marker: b
    text: Greek “the kingdom of the heavens.” Matthew regularly uses this expression where other passages often say “the kingdom of God.”
    reason: lexical_alternative
  - marker: c
    text: Or 'to proclaim and to say'.
    reason: previous_rendering
