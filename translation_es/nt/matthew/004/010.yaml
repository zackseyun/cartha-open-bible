base_translation:
  language: en
  yaml_path: translation/nt/matthew/004/010.yaml
  text: 'Then Jesus says to him[a], “Go away, Satan! For it is written: ‘You shall worship the Lord your God[b], and serve only him.’”'
  footnotes:
  - marker: a
    text: Or “You shall bow down to the Lord your God.” The Greek verb can more literally denote prostration or bowing in reverence.
    reason: lexical_alternative
  - marker: b
    text: The verb translated “serve” can specifically refer to sacred or religious service offered to God.
    reason: lexical_alternative
