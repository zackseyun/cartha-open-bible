translation:
  language: es
  text: 'Entonces Jesús le dice: «¡Vete, Satanás! Porque está escrito: “A Yahvé[a] tu Dios adorarás[b], y solo a él servirás[c]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego dice Κύριον («Señor»), pero aquí cita Deuteronomio 6:13, donde el hebreo tiene el nombre divino יהוה (YHWH). Por eso el proyecto POB lo restituye como «Yahvé» en el texto principal.
    reason: source_note
  - marker: b
    text: 'O bien: «te postrarás ante»; el verbo griego προσκυνήσεις puede denotar literalmente la postración o reverencia corporal.'
    reason: lexical_alternative
  - marker: c
    text: El verbo griego λατρεύσεις puede referirse específicamente al servicio sagrado o cultual ofrecido a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel momento
  lexicon: BDAG
  rationale: Adverbio temporal que marca secuencia narrativa. «Entonces» es el equivalente español conciso y natural, exactamente paralelo al inglés 'Then'.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Presente histórico griego (3.ª persona singular de λέγω). El español narrativo usa igualmente el presente histórico para dar viveza al relato; «dice» preserva esa misma fuerza, frente al más neutro «dijo».
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Dativo de objeto indirecto con «dice». En español estándar el clítico «le» es la forma natural; no es necesario doblar con «a él» a menos que haya ambigüedad.
- source_word: Ὕπαγε
  english_pob_choice: Go away
  chosen_spanish: ¡Vete
  alternatives_spanish:
  - ¡Apártate
  - ¡Fuera
  lexicon: BDAG
  rationale: Imperativo de ὑπάγω ('ir', con fuerza de alejamiento). «¡Vete!» es el equivalente español moderno y expresivo del imperativo de alejamiento; «¡Apártate!» sería más solemne y puede usarse como alternativa; «¡Fuera!» es más elíptico. Se elige «¡Vete!» por claridad y registro apropiado.
- source_word: Σατανᾶ
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Adversario
  lexicon: BDAG
  rationale: Vocativo del nombre propio Σατανᾶς. «Satanás» es la transliteración estándar al español, exactamente paralela al inglés 'Satan'. La alternativa «Adversario» traicionaría la forma de nombre propio que el texto usa.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - así está escrito
  - escrito está
  lexicon: BDAG
  rationale: 'Perfecto pasivo (3.ª sg.) de γράφω: fórmula establecida de introducción a citas escriturales. «Está escrito» es el equivalente español consolidado; «escrito está» tiene sabor arcaico (Reina-Valera) y se evita salvo que sea necesario por coherencia de estilo del proyecto.'
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Κύριον es acusativo de κύριος, que en el NT sigue la convención de la LXX de sustituir el nombre divino יהוה (YHWH). La fuente hebrea subyacente (Dt 6:13) tiene יהוה. El criterio del proyecto POB es rendir «Yahvé» en el texto principal cuando κύριος funciona como sustituto del nombre divino, con nota explicativa. Se elige «Yahvé» para mantener la transparencia del nombre divino; la alternativa «el Señor» enmascararía la convención griega. Véase nota [a].
- source_word: θεόν σου
  english_pob_choice: your God
  chosen_spanish: tu Dios
  lexicon: BDAG
  rationale: Frase en aposición a «Yahvé»; acusativo con posesivo de 2.ª sg. «Tu Dios» es la traducción directa y no presenta ambigüedad en español.
- source_word: προσκυνήσεις
  english_pob_choice: you shall worship
  chosen_spanish: adorarás
  alternatives_spanish:
  - te postrarás ante
  - rendirás culto a
  lexicon: BDAG
  rationale: Futuro indicativo activo (2.ª sg.) de προσκυνέω. En este contexto de devoción exclusiva a Dios (cita de Dt 6:13), «adorarás» captura el sentido religioso pleno. «Te postrarás ante» es más literal (el verbo alude a la postración física) pero más estrecho semánticamente. Se preserva la distinción con λατρεύσεις rindiendo verbos distintos. Véase nota [b].
- source_word: αὐτῷ μόνῳ
  english_pob_choice: only him
  chosen_spanish: solo a él
  alternatives_spanish:
  - a él únicamente
  - a él solo
  lexicon: BDAG
  rationale: Dativo αὐτῷ con adjetivo μόνος en función adverbial enfatizando exclusividad. La revisión del inglés ajustó el orden a 'serve only him' para reflejar que μόνῳ modifica a αὐτῷ. En español «solo a él» logra el mismo énfasis de forma natural al anteponer «solo» al pronombre. «A él solo» también es válido pero «solo a él» resulta más fluido en español moderno.
- source_word: λατρεύσεις
  english_pob_choice: serve
  chosen_spanish: servirás
  alternatives_spanish:
  - rendirás servicio sagrado a
  - darás culto a
  lexicon: BDAG
  rationale: Futuro indicativo activo (2.ª sg.) de λατρεύω, que a menudo denota servicio cultual o religioso. «Servirás» preserva la distinción frente a «adorarás» (προσκυνήσεις) en la misma cláusula, evitando aplanar los dos verbos. El matiz cultual más específico se documenta en nota [c].
theological_decisions:
- issue: Κύριον como sustituto del nombre divino YHWH en la cita del AT
  english_pob_reading: the Lord your God
  chosen_spanish_reading: Yahvé tu Dios
  alternative_spanish_readings:
  - el Señor tu Dios
  rationale: Este versículo cita Deuteronomio 6:13, donde el hebreo tiene יהוה (YHWH). La LXX y el texto griego del NT usan κύριος como sustituto convencional del nombre divino. El criterio del proyecto POB es renderizar el nombre divino como «Yahvé» en el texto principal en lugar de enmascararlo con «Señor», incluso cuando la fuente inmediata es el griego κύριος, siempre que este funcione claramente como sustituto de YHWH. En este caso la función sustitutiva es inequívoca (cita directa de AT con el nombre divino en el hebreo subyacente). Se añade nota [a] para transparencia.
  doctrine_reference: 'Criterio terminológico del proyecto POB: יהוה / YHWH → «Yahvé» en el texto principal; si la fuente inmediata es griego κύριος citando el nombre divino, explicar la decisión.'
- issue: Distinción entre προσκυνήσεις (adorarás) y λατρεύσεις (servirás)
  english_pob_reading: You shall worship the Lord your God, and serve only him
  chosen_spanish_reading: A Yahvé tu Dios adorarás, y solo a él servirás
  alternative_spanish_readings:
  - A Yahvé tu Dios adorarás, y solo a él darás culto
  - A Yahvé tu Dios te postrarás, y solo a él servirás
  rationale: 'El griego emplea dos verbos distintos: προσκυνέω (reverencia/adoración) y λατρεύω (servicio cultual/devoto). Aplanarlos en un único término español traicionaría la fuerza teológica de la cita: Dios ha de recibir tanto la adoración como el servicio sagrado exclusivos. «Adorarás» y «servirás» preservan esa distinción de forma legible; las alternativas más literales se documentan en notas.'
  doctrine_reference: 'Decisión teológica inglesa POB: preservar la distinción entre los verbos para no aplanar la fuerza teológica de la cita (Filosofía de traducción §5).'
translation_notes:
  revision_awareness: 'La revisión al inglés (2026-04-23, gpt-5.4) ajustó el orden de «serve him only» a «serve only him» para reflejar con mayor precisión que el griego μόνῳ modifica a αὐτῷ, subrayando la exclusividad sobre el pronombre. En español, «solo a él servirás» logra el mismo efecto de forma completamente natural: «solo» precede al pronombre «a él», colocando el énfasis exactamente donde lo exige el griego. No se requiere un ajuste artificial equivalente en español porque el orden preferido en la lengua ya coincide con la precisión exegética buscada por la revisión inglesa.'
  spanish_consistency_notes:
  - Se preserva el presente histórico griego (λέγει → «dice») conforme al tratamiento narrativo del Evangelio de Mateo en el POB.
  - Se usa «Yahvé» en lugar de «el Señor» para κύριον, con nota explicativa [a], según el criterio terminológico del proyecto para el nombre divino.
  - Se distinguen «adorarás» (προσκυνήσεις) y «servirás» (λατρεύσεις) para conservar la diferenciación teológica documentada en la auditoría inglesa.
  - El clítico «le» rinde el dativo αὐτῷ con «dice» de forma natural en español; no se duplica con «a él» al no haber ambigüedad referencial.
  - El orden «solo a él servirás» refleja el énfasis griego de αὐτῷ μόνῳ y coincide con la corrección de orden introducida en la revisión inglesa.
