translation:
  language: es
  text: Entonces el diablo lo lleva a la ciudad santa y lo pone sobre el pináculo del templo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, Jerusalén.
    reason: cross_reference
  - marker: b
    text: 'O: ''el ala del templo''; el griego puede referirse a un borde saliente o al punto más alto del complejo del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Enseguida
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; 'Entonces' conserva el valor temporal sin añadir matices no presentes.
- source_word: παραλαμβάνει
  english_pob_choice: takes
  chosen_spanish: lo lleva
  alternatives_spanish:
  - lo toma consigo
  - lo toma
  lexicon: BDAG
  rationale: En contexto narrativo, el verbo expresa que el diablo lo conduce consigo a otro lugar. 'Lo lleva' comunica la acción con naturalidad en español y evita un calco duro de 'toma'.
- source_word: ὁ διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el demonio
  - el acusador
  lexicon: BDAG
  rationale: Aquí λειτουργa como designación personal de Satanás; 'diablo' es el equivalente directo y estable en español bíblico.
- source_word: εἰς τὴν ἁγίαν πόλιν
  english_pob_choice: into the holy city
  chosen_spanish: a la ciudad santa
  alternatives_spanish:
  - a la ciudad santa, es decir, Jerusalén
  - a Jerusalén
  lexicon: BDAG
  rationale: Con 'a' se conserva el movimiento hacia el destino; 'ciudad santa' retiene la designación honorífica del texto griego sin sustituirla en el cuerpo principal por el nombre propio.
- source_word: ἔστησεν
  english_pob_choice: sets
  chosen_spanish: lo pone
  alternatives_spanish:
  - lo colocó
  - lo situó
  lexicon: BDAG
  rationale: 'El aoristo causativo de ἵστημι aquí es transitivo: alguien coloca a otro en un punto. ''Lo pone'' es breve, natural y mantiene la acción de ubicación.'
- source_word: ἐπὶ τὸ πτερύγιον
  english_pob_choice: on the pinnacle
  chosen_spanish: sobre el pináculo
  alternatives_spanish:
  - sobre el ala
  - sobre el borde saliente
  - sobre la cornisa
  lexicon: BDAG
  rationale: '''Pináculo'' sigue la tradición de traducción y comunica bien el punto elevado o sobresaliente que probablemente se tiene en vista. En español preserva la fuerza visual del término sin volverlo técnico.'
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del recinto del templo
  - del templo sagrado
  lexicon: BDAG
  rationale: ἱερόν denota el complejo del templo en general, no el santuario interior; 'templo' es el equivalente más natural y suficiente en la frase.
theological_decisions:
- issue: Identificación de 'la ciudad santa'
  english_pob_reading: Retain 'the holy city' in the main text, with Jerusalem in a footnote.
  chosen_spanish_reading: Conservar 'la ciudad santa' en el texto principal y aclarar en nota que se trata de Jerusalén.
  alternative_spanish_readings:
  - Jerusalén
  - la ciudad santa, Jerusalén
  rationale: La designación honorífica forma parte del texto y merece mantenerse en la traducción principal; la identificación específica se deja para la nota para no reemplazar la expresión del original.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de πτερύγιον τοῦ ἱεροῦ
  english_pob_reading: Translate as 'the pinnacle of the temple,' with a note that it may mean the wing or highest point.
  chosen_spanish_reading: Traducir como 'el pináculo del templo', con nota sobre la posible referencia a un ala, saliente o punto más alto.
  alternative_spanish_readings:
  - el ala del templo
  - el punto más alto del templo
  - la cornisa del templo
  rationale: La referencia arquitectónica exacta no es segura; 'pináculo' mantiene el sentido tradicional y legible, mientras la nota preserva la ambigüedad documentada por el audit trail.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue el audit trail inglés más reciente, que corrigió la concordancia de 'sets' con 'takes'. En español se mantuvo la secuencia narrativa en presente con 'lleva' y 'pone', coherente con el valor histórico presente del griego.
  spanish_consistency_notes:
  - Se usó 'ciudad santa' para conservar la designación honorífica del texto y 'Jerusalén' quedó en nota explicativa.
  - '''Templo'' se empleó para ἱερόν, evitando especificar indebidamente el santuario interior.'
  - '''Pináculo'' se mantuvo por fidelidad y legibilidad, con nota alternativa para la ambigüedad arquitectónica.'
  - Se empleó 'diablo' como término estable para ὁ διάβολος, sin introducir un equivalente más interpretativo.
