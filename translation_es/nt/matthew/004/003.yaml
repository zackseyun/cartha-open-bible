translation:
  language: es
  text: 'Y acercándose el tentador, le dijo[a]: «Si eres el Hijo de Dios, di que estas piedras lleguen a ser panes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ya que eres el Hijo de Dios». El condicional griego puede funcionar como desafío más que como simple duda.'
    reason: alternative_reading
  - marker: b
    text: El griego usa el plural «panes». En español se conserva el plural para mantener la imagen concreta del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: came
  chosen_spanish: acercándose
  alternatives_spanish:
  - vino
  - se acercó
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera adverbial antes del verbo principal. En español, «acercándose» conserva la idea de aproximación previa al hablar y suena natural en la secuencia narrativa.
- source_word: ὁ πειράζων
  english_pob_choice: the tempter
  chosen_spanish: el tentador
  alternatives_spanish:
  - el que tentaba
  - el probador
  lexicon: BDAG
  rationale: El participio presente substantivado pide un sustantivo. «El tentador» es fiel, claro y mantiene el valor contextual de Satanás como agente de tentación, sin suavizar la fuerza lexical.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le habló diciendo
  lexicon: BDAG
  rationale: La combinación verbal con dativo se traduce de forma directa y natural en español con «le dijo».
- source_word: Εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ya que
  - Si de verdad
  lexicon: BDAG
  rationale: «Si» preserva la forma condicional griega y deja abierta la fuerza retórica de desafío, sin resolverla como duda simple ni como concesión explícita.
- source_word: υἱὸς ... τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - un hijo de Dios
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo antes de υἱός, el contexto mateano identifica a Jesús con el título. En español, «el Hijo de Dios» refleja mejor esa función titular que una lectura indefinida.
- source_word: εἰπὲ
  english_pob_choice: tell
  chosen_spanish: di
  alternatives_spanish:
  - diles
  - ordena
  lexicon: BDAG
  rationale: El imperativo de λέγω se vierte mejor aquí con «di», porque el contenido pedido en español queda expresado de modo natural en la construcción subordinada.
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Después del imperativo, ἵνα introduce el contenido/resultado de lo dicho. En español, «di que...» comunica ese valor con mayor naturalidad que una traducción demasiado literal.
- source_word: οἱ λίθοι οὗτοι
  english_pob_choice: these stones
  chosen_spanish: estas piedras
  alternatives_spanish:
  - estas rocas
  lexicon: BDAG
  rationale: λίθος se puede rendir por «piedra» en español cuando se habla de piedras sueltas del entorno. «Estas piedras» mantiene el demostrativo y la escena del desierto.
- source_word: ἄρτοι
  english_pob_choice: bread
  chosen_spanish: panes
  alternatives_spanish:
  - pan
  - hogazas
  lexicon: BDAG
  rationale: El plural ἄρτοι significa literalmente «loaves»/«breads». En español, el plural «panes» conserva la pluralidad y la imagen concreta mejor que un singular genérico.
- source_word: γένωνται
  english_pob_choice: become
  chosen_spanish: se conviertan
  alternatives_spanish:
  - lleguen a ser
  - se hagan
  lexicon: BDAG
  rationale: El subjuntivo medio de γίνομαι expresa llegada a ser. «Se conviertan» reproduce bien ese cambio de estado sin cargarlo con interpretación adicional.
theological_decisions:
- issue: Fuerza de la cláusula condicional Εἰ υἱὸς εἶ τοῦ θεοῦ
  english_pob_reading: Rendered as 'If you are the Son of God' without implying either uncertainty or concession.
  chosen_spanish_reading: «Si eres el Hijo de Dios» mantiene la forma condicional y la tensión retórica, sin decidir si es duda, desafío o concesión.
  alternative_spanish_readings:
  - «Ya que eres el Hijo de Dios»
  - «Si de verdad eres el Hijo de Dios»
  rationale: La lectura griega puede funcionar como desafío más que como duda simple. La versión española conserva esa ambigüedad importante para no cerrar el sentido teológico/narrativo más allá del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
- issue: Título cristológico υἱὸς τοῦ θεοῦ
  english_pob_reading: Rendered as 'the Son of God.'
  chosen_spanish_reading: «el Hijo de Dios» presenta a Jesús como título único, no como miembro de una clase genérica.
  alternative_spanish_readings:
  - «un hijo de Dios»
  rationale: En el contexto de Mateo y de la confesión cristológica ortodoxa, el sintagma funciona como título identificador. El español debe reflejar esa función titular con artículo definido.
  doctrine_reference: DOCTRINE.md Affirmations (Nicene Creed; Chalcedon)
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios; se conserva la solución anterior sin modificaciones sustantivas.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y «Hijo de Dios» como título cristológico definido.
  - Se tradujo ὁ πειράζων como «el tentador», siguiendo la fuerza lexical señalada en el audit trail.
  - Se preservó la ambigüedad de la condición con «Si» en el texto principal y se explicó la lectura alternativa en nota.
  - Se usó el plural «panes» para reflejar ἄρτοι, con nota explicativa para la forma gramatical griega.
  - Se evitó el uso de «SEÑOR» u otra sustitución no presente en este versículo.
