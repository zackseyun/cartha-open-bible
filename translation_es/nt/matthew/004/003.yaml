review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca las decisiones del POB inglés: «el tentador», «Si eres el Hijo de Dios» y «estas piedras» están bien resueltos. Sin embargo, «di que estas piedras se conviertan en panes» suena menos natural y menos preciso en español que una formulación con infinitivo o mandato directo a las piedras. Además, la nota b no preserva exactamente la lógica del POB inglés, que explica que el inglés usa «bread» aunque el griego es plural; en español, al usar «panes», no hace falta esa misma nota salvo que se reformule como aclaración de plural concreto.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «Y acercándose el tentador» resulta algo más pesada que «Entonces se acercó el tentador» o «Y el tentador se acercó». La secuencia «di que estas piedras se conviertan en panes» es comprensible, pero poco idiomática en español bíblico contemporáneo; «ordena que…» sería más natural, pero subiría demasiado la fuerza léxica frente a λέγω. La mejor reparación menor es conservar «di» y ajustar la subordinada a «que estas piedras lleguen a ser panes», que suena más natural que «se conviertan» tras «di que…».
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios», «Hijo de Dios» y «el tentador» están alineados. La decisión de mantener «panes» es defendible en español y puede incluso reflejar mejor el plural griego que el inglés.
  issues:
  - severity: medium
    issue: La construcción «di que estas piedras se conviertan en panes» suena forzada en español.
    rationale: Aunque es entendible, no es la formulación más natural para λέγω + ἵνα en este contexto. Conviene una leve reparación estilística que mantenga la fidelidad sin introducir el matiz más fuerte de «ordena».
  - severity: low
    issue: La nota b reproduce una necesidad del inglés que no aplica igual en español.
    rationale: Como el texto español ya dice «panes», la nota no debe justificar una desviación inexistente, sino explicar que el plural griego se conserva por su fuerza concreta.
  revised_spanish_text: 'Y acercándose el tentador, le dijo[a]: «Si eres el Hijo de Dios, di que estas piedras lleguen a ser panes[b]».'
  revised_footnotes:
  - marker: a
    text: 'O: «Ya que eres el Hijo de Dios». El condicional griego puede funcionar como desafío más que como simple duda.'
    reason: alternative_reading
  - marker: b
    text: El griego usa el plural «panes». En español se conserva el plural para mantener la imagen concreta del pasaje.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor de naturalidad en español: «lleguen a ser panes» expresa mejor el resultado pedido que «se conviertan en panes» después de «di que…», sin añadir la fuerza de «ordena». También se elimina el anclaje [b] de «Hijo de Dios» y se coloca donde realmente corresponde a la nota sobre «panes».'
