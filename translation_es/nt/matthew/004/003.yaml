revisions:
- from: 'Y acercándose el tentador, le dijo[a]: «Si eres el Hijo de Dios[b], di que estas piedras se conviertan en panes».'
  to: 'Y acercándose el tentador, le dijo[a]: «Si eres el Hijo de Dios, di que estas piedras lleguen a ser panes[b]».'
  rationale: 'Se hace una reparación menor de naturalidad en español: «lleguen a ser panes» expresa mejor el resultado pedido que «se conviertan en panes» después de «di que…», sin añadir la fuerza de «ordena». También se elimina el anclaje [b] de «Hijo de Dios» y se coloca donde realmente corresponde a la nota sobre «panes».'
