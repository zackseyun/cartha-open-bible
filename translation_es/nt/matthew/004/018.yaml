translation:
  language: es
  text: 'Mientras caminaba junto al mar de Galilea, vio a dos hermanos: Simón, llamado Pedro, y Andrés, su hermano, echando una red[a] al mar, porque eran pescadores.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «echando una red»; el término griego se refiere a una red arrojada para pescar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περιπατῶν
  english_pob_choice: as he was walking
  chosen_spanish: Mientras caminaba
  alternatives_spanish:
  - mientras andaba
  - mientras iba caminando
  lexicon: BDAG
  rationale: El participio presente expresa acción simultánea con el verbo principal; en español, una subordinada temporal con «mientras» comunica bien esa simultaneidad sin volver el texto rígido.
- source_word: παρὰ τὴν θάλασσαν τῆς Γαλιλαίας
  english_pob_choice: beside the Sea of Galilee
  chosen_spanish: junto al mar de Galilea
  alternatives_spanish:
  - al lado del mar de Galilea
  - por la orilla del mar de Galilea
  lexicon: BDAG
  rationale: παρά con acusativo indica proximidad o desplazamiento al lado de algo; «junto a» es natural en español y conserva la relación espacial.
- source_word: θάλασσαν τῆς Γαλιλαίας
  english_pob_choice: the Sea of Galilee
  chosen_spanish: el mar de Galilea
  alternatives_spanish:
  - el mar de Galilea
  lexicon: BDAG
  rationale: Se conserva la designación geográfica tradicional del pasaje. «Mar» mantiene el término griego θάλασσα y es la forma normal en español bíblico para este topónimo.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio
  - notó
  lexicon: BDAG
  rationale: El aoristo narra una acción pasada simple; «vio» reproduce esa sencillez sin añadir matiz interpretativo.
- source_word: δύο ἀδελφούς
  english_pob_choice: two brothers
  chosen_spanish: a dos hermanos
  alternatives_spanish:
  - dos hermanos
  lexicon: BDAG
  rationale: «Hermanos» expresa con precisión la relación fraterna literal entre Simón y Andrés.
- source_word: Σίμωνα τὸν λεγόμενον Πέτρον
  english_pob_choice: Simon who is called Peter
  chosen_spanish: Simón, el que es llamado Pedro
  alternatives_spanish:
  - Simón, llamado Pedro
  - Simón, el llamado Pedro
  lexicon: BDAG
  rationale: La forma participial λεγόμενον se vierte bien con una relativa. Se mantiene «Pedro» como nombre propio ya fijado en español cristiano.
- source_word: Ἀνδρέαν τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: Andrew his brother
  chosen_spanish: Andrés, su hermano
  alternatives_spanish:
  - Andrés, su hermano
  - Andrés, el hermano de él
  lexicon: BDAG
  rationale: La aposición identifica a Andrés respecto de Simón; la coma en español ayuda a clarificar la relación sin sobrecargar la frase.
- source_word: βάλλοντας
  english_pob_choice: casting
  chosen_spanish: que echaban
  alternatives_spanish:
  - echando
  - lanzando
  lexicon: BDAG
  rationale: En contexto de pesca, «echar» es un verbo natural para arrojar una red al agua. Conserva la acción continua descrita por el participio.
- source_word: ἀμφίβληστρον
  english_pob_choice: a net
  chosen_spanish: una red
  alternatives_spanish:
  - una red de pesca
  - una red de lanzamiento
  lexicon: BDAG
  rationale: El término designa una red de pesca lanzada al agua. «Red» mantiene fluidez; la especificación de tipo de red puede quedar implícita sin forzar el texto.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - hacia el mar
  - dentro del mar
  lexicon: BDAG
  rationale: Aunque εἰς puede indicar movimiento hacia/into, en español la escena pesquera suena más natural con «al mar». No se pierde el sentido direccional.
- source_word: ἦσαν γὰρ ἁλιεῖς
  english_pob_choice: for they were fishermen
  chosen_spanish: porque eran pescadores
  alternatives_spanish:
  - pues eran pescadores
  - porque eran hombres de mar
  lexicon: BDAG
  rationale: γάρ introduce explicación causal o de fondo; en español «porque» resulta natural. ἁλιεῖς se traduce por «pescadores», el equivalente común y preciso.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando el marcador [a] en el texto principal junto a «mar de Galilea», de modo que la nota léxica queda anclada explícitamente en el pasaje.
  spanish_consistency_notes:
  - Se mantuvo «mar de Galilea» para conservar tanto la designación geográfica como el valor de θάλασσα.
  - Se prefirió «porque eran pescadores» por naturalidad en español, sin perder la función explicativa de γάρ.
  - «Pedro» se conserva como nombre propio estable en el uso cristiano en español.
  - La redacción evita calcos como «junto la mar» o «lanzando» donde el español pide mayor naturalidad.
