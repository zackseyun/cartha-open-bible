translation:
  language: es
  text: Entonces Jesús fue llevado al desierto por el Espíritu, para ser tentado por el diablo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “para ser probado”; el verbo griego puede significar tanto “tentar” como “probar”, aunque aquí el contexto inmediato favorece “tentado”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Conecta la escena con el episodio anterior de manera temporal y narrativa. 'Entonces' conserva la secuencia natural en español y equivale bien al valor discursivo de Τότε.
- source_word: ἀνήχθη
  english_pob_choice: was led up
  chosen_spanish: fue llevado
  alternatives_spanish:
  - fue conducido
  - fue llevado arriba
  lexicon: BDAG
  rationale: El griego conserva un matiz de movimiento hacia arriba, pero en español 'fue llevado al desierto' comunica con claridad la acción pasiva sin sonar forzado. El matiz direccional queda suficientemente preservado por el contexto geográfico y narrativo.
- source_word: εἰς τὴν ἔρημον
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al lugar desierto
  - a la soledad
  lexicon: BDAG
  rationale: ἔρημος puede ser 'desierto' o 'desierto/soledad/lugar despoblado'. Aquí el contexto de Mateo apunta a un entorno deshabitado y apartado; 'desierto' es la opción más natural y fiel en español, sin precisar indebidamente el terreno.
- source_word: ὑπὸ τοῦ πνεύματος
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - por el Espíritu Santo
  - por un espíritu
  lexicon: BDAG
  rationale: La mayúscula en 'Espíritu' mantiene la referencia personal divina del contexto inmediato del bautismo. Se evita añadir 'Santo' porque el griego no lo explicita aquí, aunque el referente es el Espíritu de Dios.
- source_word: πειρασθῆναι
  english_pob_choice: to be tempted
  chosen_spanish: para ser tentado
  alternatives_spanish:
  - para ser probado
  - para ser puesto a prueba
  lexicon: BDAG
  rationale: πειράζω puede significar 'probar' o 'tentar'. Como el agente es 'el diablo', 'tentado' refleja mejor la fuerza narrativa inmediata, mientras que las alternativas preservan la tensión semántica que el inglés POB anotó.
- source_word: ὑπὸ τοῦ διαβόλου
  english_pob_choice: by the devil
  chosen_spanish: por el diablo
  alternatives_spanish:
  - por el acusador
  - por el calumniador
  lexicon: BDAG
  rationale: διάβολος nombra aquí al adversario personal reconocido del relato. 'Diablo' es la forma más clara, idiomática y teológicamente transparente en español.
theological_decisions:
- issue: Identificación de τοῦ πνεύματος
  english_pob_reading: the Spirit refers to the Holy Spirit
  chosen_spanish_reading: el Espíritu se refiere al Espíritu Santo
  alternative_spanish_readings:
  - un espíritu
  - el espíritu humano
  rationale: El contexto inmediato de Mateo 3, donde el Espíritu desciende sobre Jesús, determina que se trata del Espíritu de Dios. La traducción mantiene la ambigüedad gramatical relativa de no añadir 'Santo' en el texto principal, pero la lectura teológica queda clara por el contexto.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Valor de πειρασθῆναι
  english_pob_reading: to be tempted
  chosen_spanish_reading: para ser tentado
  alternative_spanish_readings:
  - para ser probado
  - para ser puesto a prueba
  rationale: Se conserva la fuerza de la tentación diabólica sin borrar la amplitud semántica del verbo. La nota recoge la alternativa 'ser probado' para no eliminar la tensión entre prueba y tentación.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto griego y el audit trail en inglés; no se detectaron cambios de revisión en el expediente más reciente. La versión española sigue esa lectura estable y conserva la nota léxica sobre πειρασθῆναι.
  spanish_consistency_notes:
  - Se usa 'Espíritu' con mayúscula por la referencia contextual al Espíritu de Dios.
  - Se prefiere 'desierto' por ser el equivalente natural de ἔρημος en este contexto narrativo.
  - Se mantiene 'diablo' en lugar de 'calumniador' o 'acusador' por claridad y porque el texto trata al personaje como entidad personal reconocida.
  - '''Entonces'' conserva la función temporal-discursiva de Τότε sin añadir interpretación.'
  - La nota de pie preserva la alternativa semántica 'probar' para respetar la tensión lexical documentada.
