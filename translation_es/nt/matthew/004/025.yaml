- from: Y grandes multitudes lo siguieron desde Galilea, la Decápolis, Jerusalén, Judea y de más allá del Jordán[a].
  to: Y grandes multitudes lo siguieron de Galilea, la Decápolis, Jerusalén, Judea y más allá del Jordán[a].
  rationale: Se sustituye «desde» por «de» y se elimina el segundo «de» antes de «más allá del Jordán» para que toda la enumeración dependa de una sola preposición de procedencia, en correspondencia más natural con el griego y con mejor fluidez en español. Se conserva la nota alternativa léxica ya bien formulada.
