translation:
  language: es
  text: Y grandes multitudes lo siguieron de Galilea, la Decápolis, Jerusalén, Judea y más allá del Jordán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «del otro lado del Jordán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - siguieron tras él
  - le siguieron
  lexicon: BDAG
  rationale: El aoristo de ἀκολουθέω en narración expresa seguir físicamente; «lo siguieron» conserva la naturalidad española y puede abarcar también el matiz de discipulado incipiente sin forzarlo.
- source_word: ὄχλοι πολλοὶ
  english_pob_choice: large crowds
  chosen_spanish: grandes multitudes
  alternatives_spanish:
  - muchas multitudes
  - muchedumbres grandes
  lexicon: BDAG
  rationale: La combinación sustantivo-adjetivo comunica gran número. «Grandes multitudes» es idiomático en español bíblico contemporáneo y evita el calco poco natural «muchas multitudes».
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: desde
  alternatives_spanish:
  - de
  - procedentes de
  lexicon: BDAG
  rationale: Aquí ἀπό marca origen o procedencia. «Desde» expresa bien la fuente geográfica de los grupos y mantiene el valor de procedencia del griego.
- source_word: Γαλιλαίας
  english_pob_choice: Galilee
  chosen_spanish: Galilea
  alternatives_spanish:
  - Galilea
  lexicon: BDAG
  rationale: Nombre propio geográfico estándar en español.
- source_word: Δεκαπόλεως
  english_pob_choice: the Decapolis
  chosen_spanish: la Decápolis
  alternatives_spanish:
  - Decápolis
  lexicon: BDAG
  rationale: Nombre propio regional conocido; el artículo es natural en español cuando funciona como designación geográfica.
- source_word: Ἱεροσολύμων
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: BDAG
  rationale: Aunque el griego está en plural, en español el topónimo se usa en singular y es la forma normal y más clara.
- source_word: Ἰουδαίας
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - Judea
  lexicon: BDAG
  rationale: Nombre regional estándar en español.
- source_word: πέραν τοῦ Ἰορδάνου
  english_pob_choice: beyond the Jordan
  chosen_spanish: de más allá del Jordán
  alternatives_spanish:
  - desde más allá del Jordán
  - del otro lado del Jordán
  lexicon: BDAG
  rationale: La construcción griega señala la región situada al otro lado del Jordán. «De más allá del Jordán» mantiene el sentido espacial y evita añadir indebidamente un segundo origen con otra preposición.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que eliminó el segundo «from» antes de «beyond the Jordan», por lo que el español también evita repetir una segunda preposición de procedencia y deja la frase como complemento geográfico final.
  spanish_consistency_notes:
  - Se usa «lo siguieron» para mantener concordancia con un objeto directo explícito en español, equivalente natural del pronombre griego αὐτῷ en el contexto narrativo.
  - Se conserva la serie geográfica completa con comas y la conjunción final «y» para reflejar la acumulación del original.
  - Se emplea «la Decápolis» como designación territorial usual en español, en paralelo con los otros topónimos regionales.
