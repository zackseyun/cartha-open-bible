translation:
  language: es
  text: 'Jesús le dijo[b]: «De nuevo está escrito: No pondrás a prueba[a] a Yahvé tu Dios.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «No probarás a Yahvé tu Dios». El verbo griego ἐκπειράζω puede traducirse «probar» o «poner a prueba»; aquí «poner a prueba» expresa mejor la idea de someter deliberadamente a prueba.
    reason: lexical_alternative
  - marker: b
    text: Esto cita Deuteronomio 6:16. El griego κύριον («Señor») refleja la forma de la Septuaginta, que sustituye el nombre divino; en español del proyecto se restituye «Yahvé».
    reason: cross_reference
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - declaró
  lexicon: BDAG
  rationale: φημί funciona aquí como introducción simple del discurso. «Dijo» es el equivalente más natural en español sin añadir fuerza retórica que el griego no tiene. Se descarta «respondió» porque, aunque es contextualmente plausible (es una réplica al tentador), añade un matiz de contrarrespuesta que el lexema φημί no posee.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le (clítico dativo integrado en el verbo)
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo αὐτῷ marca el objeto indirecto del acto de habla. En español, el clítico «le» antepuesto al verbo es la forma idiomática y natural; «a él» sería enfático y redundante junto al clítico ya presente.
- source_word: Πάλιν
  english_pob_choice: Again
  chosen_spanish: De nuevo
  alternatives_spanish:
  - También
  - Asimismo
  lexicon: BDAG
  rationale: πάλιν introduce una segunda cita escritural como contrarrespuesta a la cita del tentador. «De nuevo» preserva el valor adverbial de repetición/nueva instancia (πάλιν) sin confundirlo con «también» (καί / ὡσαύτως). El POB en inglés eligió «Again» por la misma razón retórica; la misma lógica aplica en español.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - está escrito de manera permanente
  - así consta escrito
  lexicon: BDAG
  rationale: 'La fórmula de citación escritural γέγραπται (perfecto pasivo de γράφω) tiene su equivalente consolidado en español: «está escrito». El perfecto implica autoridad permanente y vigente; «está escrito» lo expresa con plena idiomaticidad y es la fórmula uniforme en la tradición bíblica en español.'
- source_word: Οὐκ ἐκπειράσεις
  english_pob_choice: You shall not put ... to the test
  chosen_spanish: No pondrás a prueba
  alternatives_spanish:
  - No tentarás
  - No debes tentar
  - No pongas a prueba
  lexicon: BDAG
  rationale: El futuro indicativo ἐκπειράσεις funciona como prohibición en el estilo del Decálogo/legislación veterotestamentaria. ἐκπειράζω (compuesto de ἐκ- + πειράζω) denota someter deliberadamente a prueba. «No pondrás a prueba» replica tanto la forma futurista-prohibitiva como la fuerza del compuesto, y distingue la acción de poner a prueba de «tentar» (que en español moderno denota principalmente la inducción al mal, no la verificación deliberada).
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: BDAG
  rationale: 'κύριον sigue la sustitución LXX del Tetragrámaton hebreo יהוה en Deuteronomio 6:16. Conforme a la política del POB en español, el nombre divino subyacente se restituye como «Yahvé» en el texto principal, con nota explicativa [b]. El POB en inglés mantuvo «the Lord» según su propia doctrina (κύριος → Lord); la política del POB en español es distinta: usar «Yahvé» salvo que no haya nombre divino hebreo subyacente, y siempre con documentación.'
- source_word: τὸν θεόν σου
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - el Dios tuyo
  lexicon: BDAG
  rationale: θεόν con el pronombre posesivo σου se vierte idiomáticamente como «tu Dios». La expresión apositiva «Yahvé tu Dios» es completamente natural en español y refleja con exactitud la fórmula pactual del original deuteronómico (יהוה אֱלֹהֶיךָ).
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según convención estándar. El artículo griego no se representa en español ante nombres propios en contexto narrativo.
theological_decisions:
- issue: Rendering of κύριος (acc. κύριον) in a Scripture citation where the LXX substituted the Tetragrammaton
  english_pob_reading: the Lord your God
  chosen_spanish_reading: Yahvé tu Dios
  alternative_spanish_readings:
  - el Señor tu Dios
  rationale: 'El griego κύριον (acusativo) sigue la convención LXX de sustituir el Tetragrámaton יהוה con κύριος en la cita de Deuteronomio 6:16. El POB en inglés mantuvo «the Lord» conforme a su doctrina propia (κύριος → Lord), con una nota sobre el nombre divino hebreo subyacente. El POB en español, sin embargo, adopta el principio de transparencia respecto al nombre divino: cuando κύριος cita o alude al Tetragrámaton, el nombre «Yahvé» se restituye en el texto principal con una nota que explica la sustitución LXX. Esta decisión es coherente con la política del proyecto (יהוה / YHWH → «Yahvé» en lugar de enmascararlo con «SEÑOR» o «Señor»). El texto de Mateo cita explícitamente la Torah deuteronómica donde el nombre יהוה aparece en el original hebreo; restituir «Yahvé» honra tanto la transparencia exegética como la fidelidad al referente teológico.'
  doctrine_reference: 'Terminología del proyecto: יהוה / YHWH → «Yahvé» en el texto principal español; explicar la decisión cuando la fuente inmediata es el griego κύριος citando o aludiendo al nombre divino.'
translation_notes:
  revision_awareness: El registro inglés del POB para MAT.4.7 pasó su última revisión sin cambios (modelo gpt-5.4, marca de tiempo 2026-04-23) y alcanzó acuerdo total en la verificación cruzada (puntuación 1,0; 3 pasadas; 0 pasadas con problemas). El borrador español se basa en esta base inglesa estable y en el texto fuente SBLGNT. La divergencia principal respecto al POB en inglés es la restitución de «Yahvé» en lugar de «el Señor» para κύριον, decisión documentada en la nota [b] y en el registro de decisión teológica, de conformidad con la política de nombre divino del POB en español.
  spanish_consistency_notes:
  - «Yahvé» se usa sistemáticamente en el POB español cuando κύριος griego cita el Tetragrámaton hebreo subyacente; «Señor» queda reservado para usos de κύριος que no remiten al nombre divino יהוה.
  - «está escrito» es la fórmula uniforme para γέγραπται (perfecto pasivo de γράφω) en todo el POB español; no debe variarse sin razón léxica documentada.
  - «Jesús» transliterada uniformemente para Ἰησοῦς en todo el proyecto.
  - La forma prohibitiva de futuro «No pondrás a prueba» preserva el registro de cita del Decálogo; esta construcción debe aplicarse consistentemente cuando ἐκπειράζω aparece en citas veterotestamentarias con futuro prohibitivo.
  - «De nuevo» se prefiere sobre «también» para πάλιν cuando el adverbio introduce una segunda cita en contrarrespuesta retórica, para no confundir con la conjunción aditiva.
