  text: 'Jesus said to him[b][a], “Again it is written: ‘You shall not put the Lord your God to the test.’”'
  footnotes:
  - marker: a
    text: Or simply, “You shall not test the Lord your God.” The Greek verb ἐκπειράζω can be rendered “test” or “put to the test.”
    reason: lexical_alternative
  - marker: b
    text: This cites Deuteronomy 6:16. The Greek “the Lord” reflects the Septuagint’s rendering of the divine name.
    reason: cross_reference
