  to: 'Y les dice[a]: «Vengan tras mí, y los haré pescadores de hombres[b]».'
  rationale: Se reemplaza «en pos de mí» por «tras mí» para mantener la fidelidad a ὀπίσω μου con un español más natural y ampliamente legible, sin fusionar la invitación «vengan» con la idea de seguir detrás de Jesús.
