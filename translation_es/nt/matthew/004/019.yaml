review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca las decisiones del POB inglés: conserva el presente histórico en «les dice», distingue Δεῦτε de ὀπίσω μου, y mantiene «pescadores de hombres» con nota inclusiva. Sin embargo, «en pos de mí» suena marcadamente arcaizante/literario para el objetivo de español moderno y eclesial amplio; una formulación más natural y fiel es «vengan tras mí», que preserva los dos elementos griegos sin colapsarlos en «síganme».'
  spanish_quality_summary: El texto es claro y gramatical, pero «en pos de mí» resulta menos natural en español latinoamericano contemporáneo que «tras mí». El resto del verso fluye bien y mantiene un tono digno. Conviene además corregir la alternativa «siganme» en las decisiones léxicas internas a «síganme», aunque eso no afecta el texto visible.
  glossary_alignment: No hay términos del glosario principal en conflicto. La decisión «pescadores de hombres» concuerda con la filosofía documentada de conservar la forma masculina de ἀνθρώπων en el texto principal con aclaración en nota. «Les dice» también está alineado con la preservación del presente narrativo.
  issues:
  - severity: medium
    issue: «en pos de mí» es demasiado arcaizante para el estilo meta
    rationale: Aunque es fiel semánticamente a ὀπίσω μου, suena menos natural en español moderno y puede percibirse como calco elevado. «Tras mí» conserva la imagen direccional y la distinción respecto de Δεῦτε sin sacrificar legibilidad.
  - severity: low
    issue: La nota a conserva bien el presente histórico, pero la puntuación del anclaje podría simplificarse
    rationale: «Y les dice[a]:» es aceptable, pero el cambio principal requerido está en la frase de discipulado, no en la nota ni en el anclaje.
