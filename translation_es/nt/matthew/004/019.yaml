translation:
  language: es
  text: 'Y les dice[a]: «Vengan tras mí, y los haré pescadores de hombres[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les dijo». El griego usa un presente narrativo, que aquí se conserva con «dice».
    reason: alternative_reading
  - marker: b
    text: O «pescadores de personas»; la expresión griega usa ἀνθρώπων, literalmente «hombres», pero aquí se refiere a seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: SBLGNT; BDAG (narrative historical present)
  rationale: El presente narrativo del griego se conserva naturalmente en español con «dice», en lugar del pretérito, para reflejar el valor aspectual del original y el estilo narrativo del evangelio.
- source_word: Δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan aquí
  - Vengan conmigo
  - Vengan
  lexicon: BDAG
  rationale: Δεῦτε es una invitación/llamado imperativo básico de movimiento; «Vengan» preserva la fuerza de la llamada sin anticipar todavía el matiz relacional que aporta la frase siguiente.
- source_word: ὀπίσω μου
  english_pob_choice: after me
  chosen_spanish: en pos de mí
  alternatives_spanish:
  - tras mí
  - detrás de mí
  - siganme
  lexicon: BDAG
  rationale: La expresión griega significa literalmente «detrás/tras de mí» y funciona como metáfora de discipulado. «En pos de mí» mantiene la imagen direccional y evita reducirla a un simple «síganme», que fusionaría dos elementos griegos distintos.
- source_word: ποιήσω
  english_pob_choice: I will make
  chosen_spanish: los haré
  alternatives_spanish:
  - los convertiré en
  - los haré llegar a ser
  - los nombraré
  lexicon: BDAG
  rationale: El futuro activo expresa una acción prometida por Jesús sobre los destinatarios. «Los haré» reproduce con claridad esa acción transformadora sin añadir una paráfrasis más fuerte que el verbo griego.
- source_word: ἁλιεῖς
  english_pob_choice: fishers
  chosen_spanish: pescadores
  alternatives_spanish:
  - pescadores
  - pescadores de peces
  lexicon: BDAG
  rationale: «Pescadores» es el equivalente léxico natural en español y evita el calco extraño «pescadores» con matiz técnico innecesario. El sustantivo ya implica el oficio de pescar.
- source_word: ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de hombres
  alternatives_spanish:
  - de personas
  - de gente
  - de seres humanos
  lexicon: BDAG
  rationale: La forma griega masculina plural ἀνθρώπων se conserva en una expresión fuente-cercana con «hombres», como en la tradición léxica documentada por POB, mientras el sentido inclusivo se aclara en nota para no borrar la forma del original.
theological_decisions:
- issue: Expresión masculina «ἁλιεῖς ἀνθρώπων» y su alcance inclusivo
  english_pob_reading: fishers of men; the phrase refers to human beings generally
  chosen_spanish_reading: pescadores de hombres
  alternative_spanish_readings:
  - pescadores de personas
  - pescadores de gente
  rationale: Se mantiene la forma masculina del original en el cuerpo del texto para conservar la forma fuente y la decisión gender-accurate del POB inglés. La referencia genérica a la humanidad se explica en nota, evitando sustituir la expresión fuente por una forma neutral en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Presente narrativo en la voz introductoria de Jesús
  english_pob_reading: And he says to them
  chosen_spanish_reading: Y les dice
  alternative_spanish_readings:
  - Y les dijo
  rationale: El presente histórico del griego no se nivela al pasado en español. Mantener «dice» preserva el ritmo narrativo y el efecto inmediato de la escena.
  doctrine_reference: Narrative tense preservation in the Gospels; source-form sensitivity
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hay cambios requeridos tras el último pase; se mantiene la solución de presente narrativo y la expresión fuente-cercana para ἀνθρώπων con nota aclaratoria.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de ὀπίσω μου como locución direccional/metafórica, no como un equivalente idiomático que la absorba por completo.
  - «Pescadores» se usa como equivalente natural de ἁλιεῖς sin introducir un tecnicismo ajeno al español bíblico contemporáneo.
  - La nota de género no altera el texto principal; solo explicita el alcance inclusivo del masculino griego.
  - La puntuación con dos puntos y comillas angulares sigue la convención editorial española y distingue con claridad el discurso directo.
