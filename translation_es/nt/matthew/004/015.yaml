translation:
  language: es
  text: Tierra de Zabulón y tierra de Neftalí[a], el camino del mar, al otro lado del Jordán, Galilea de los gentiles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Galilea de las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: Γῆ
  english_pob_choice: Land
  chosen_spanish: Tierra
  alternatives_spanish:
  - tierra
  - Territorio
  lexicon: BDAG
  rationale: En este contexto geográfico de cita profética, γῆ designa una región/territorio. «Tierra» conserva la referencia territorial sin forzar una traducción más técnica como «territorio».
- source_word: Ζαβουλὼν
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  lexicon: BDAG
  rationale: Se usa la transliteración bíblica usual en español para el nombre tribal/lugar, en forma reconocible y directa.
- source_word: γῆ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  lexicon: BDAG
  rationale: Se repite el mismo valor geográfico que en la primera ocurrencia; se conserva el paralelismo del griego con la misma solución española.
- source_word: Νεφθαλίμ
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalím
  lexicon: BDAG
  rationale: Se adopta la forma bíblica usual en español, clara para lectores de habla hispana.
- source_word: ὁδὸν θαλάσσης
  english_pob_choice: the way of the sea
  chosen_spanish: camino del mar
  alternatives_spanish:
  - el camino del mar
  - la vía del mar
  - camino junto al mar
  lexicon: BDAG
  rationale: Se mantiene la expresión cercana al texto fuente y a la cita isaiana, conservando su formulación relativamente abierta. «Camino del mar» evita explicitar más de lo que el griego dice.
- source_word: πέραν τοῦ Ἰορδάνου
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: BDAG
  rationale: Esta frase idiomática se vierte de manera natural en español sin perder la orientación espacial del original.
- source_word: Γαλιλαία
  english_pob_choice: Galilee
  chosen_spanish: Galilea
  lexicon: BDAG
  rationale: Nombre propio geográfico estándar en español.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the Gentiles
  chosen_spanish: de los gentiles
  alternatives_spanish:
  - de las naciones
  lexicon: BDAG
  rationale: En el contexto mateano e isaiano, ἐθνῶν apunta naturalmente a pueblos no judíos. «Gentiles» comunica mejor esa carga etnorreligiosa; «naciones» queda como alternativa legítima.
theological_decisions:
- issue: Valor de τῶν ἐθνῶν en la cita de Isaías reaplicada por Mateo
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: Mateo presenta la región como asociada con población no judía; por eso «gentiles» preserva mejor la tensión histórica y teológica del pasaje. «Naciones» sigue siendo una posibilidad léxica, pero menos precisa aquí.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español junto al término al que remite la nota.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicable.
  - Se conservaron las repeticiones del paralelismo griego con soluciones españolas consistentes.
  - Se evitó sustituir «gentiles» por un término más genérico que diluyera la referencia étnico-religiosa del pasaje.
