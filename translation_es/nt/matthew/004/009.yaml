- from: 'Y le dijo: «Te daré todas estas cosas, si, postrándote, me adoras[a]».'
  to: 'Y le dijo: «Te daré todas estas cosas, si caes y me adoras[a]».'
  rationale: Se ajusta πεσὼν a una expresión más cercana al griego y al audit trail inglés («caes»), se mejora la fluidez del español eliminando la coma innecesaria, y se conserva «adoras» para προσκυνήσῃς por su fuerza teológica en este contexto. La nota se mantiene para preservar las alternativas semánticas documentadas.
