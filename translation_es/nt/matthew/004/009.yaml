review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: coordinación simple, pronombres no explicitados, oferta futura, totalidad de «todas estas cosas» y condición con gesto físico seguido de adoración. Sin embargo, «postrándote» para πεσὼν intensifica el participio más de lo que hace el griego, que literalmente expresa «cayendo» o «al caer», y además crea cierta redundancia con προσκυνήσῃς. También hay una coma innecesaria tras «si».'
  spanish_quality_summary: El español es generalmente claro y digno, pero la puntuación «si, postrándote,» suena forzada. «Si caes y me adoras[a]» o «si te inclinas y me adoras[a]» serían más fluidos; entre ellas, «caes y me adoras» preserva mejor la imaginería concreta del original y evita sobreinterpretar el participio. El resto del verso suena natural y eclesialmente legible.
  glossary_alignment: No hay conflictos con la terminología de proyecto. La decisión teológica de traducir προσκυνήσῃς como «adoras» concuerda con el POB inglés y con la carga cultual del contexto. La nota alternativa también es adecuada, aunque conviene ajustar la primera alternativa para corresponder mejor al texto revisado.
  issues:
  - severity: medium
    issue: «postrándote» sobretraduce πεσὼν
    rationale: πεσὼν significa literalmente «habiendo caído / cayendo / al caer». Aunque puede implicar postración en contexto, el POB inglés conservó «fall down» en el texto principal y dejó la intensificación semántica para la nota de προσκυνέω.
  - severity: low
    issue: Coma innecesaria después de «si»
    rationale: «si, postrándote, me adoras» resulta poco natural en español y entorpece la lectura. La condicional fluye mejor sin esa puntuación.
  - severity: low
    issue: La nota debe alinearse con el texto revisado
    rationale: 'Si el texto principal deja de usar «postrándote», conviene mantener las alternativas de προσκυνέω de forma clara y natural en español: «te inclinas ante mí» o «me rindes homenaje».'
  revised_spanish_text: 'Y le dijo: «Te daré todas estas cosas, si caes y me adoras[a]».

