translation:
  language: es
  text: 'Y le dijo: «Te daré todas estas cosas, si caes y me adoras[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te inclinas ante mí» o «me rindes homenaje». El verbo griego puede denotar postración u homenaje, pero aquí el contexto favorece «adoras».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: La conjunción simple conserva la coordinación narrativa sin añadir una matiz temporal que el griego no expresa explícitamente.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: he said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le dijo a él
  lexicon: BDAG
  rationale: El griego usa solo pronombres; «le dijo» reproduce la relación directa y suena natural en español sin introducir un nombre ausente del enunciado.
- source_word: Ταῦτά σοι πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - estas cosas todas
  lexicon: BDAG
  rationale: El demostrativo neutro plural con πᾶς conserva la idea de totalidad aplicada a lo señalado; «todas estas cosas» mantiene el alcance colectivo y es idiomático en español.
- source_word: δώσω
  english_pob_choice: I will give
  chosen_spanish: te daré
  alternatives_spanish:
  - os daré
  - voy a darte
  lexicon: BDAG
  rationale: El futuro expresa la oferta/promesa de forma directa; el dativo indirecto se naturaliza como «te» en español.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - con tal de que
  - en caso de que
  lexicon: BDAG
  rationale: La cláusula condicional se expresa con el equivalente más claro y sobrio en español.
- source_word: πεσὼν
  english_pob_choice: you fall down
  chosen_spanish: postrándote
  alternatives_spanish:
  - cayendo
  - habiéndote postrado
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal describe la acción corporal concomitante. «Postrándote» conserva el gesto físico requerido sin forzar en el texto principal una traducción demasiado interpretativa.
- source_word: προσκυνήσῃς
  english_pob_choice: worship
  chosen_spanish: adoras
  alternatives_spanish:
  - te postras ante mí
  - me rindes homenaje
  lexicon: BDAG
  rationale: En este contexto de tentación, el acto pedido tiene peso religioso y no solo cortesano; «adoras» transmite bien la carga teológica. Se preserva así la tensión semántica del verbo, aunque puede abarcar reverencia o postración en otros contextos.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - delante de mí
  lexicon: BDAG
  rationale: 'Con προσκυνέω, el dativo se expresa de forma natural en español como objeto directo/afín: «me adoras».'
theological_decisions:
- issue: Sentido de προσκυνέω en la demanda de Satanás
  english_pob_reading: worship me
  chosen_spanish_reading: me adoras
  alternative_spanish_readings:
  - te postras ante mí
  - me rindes homenaje
  rationale: El contexto inmediato de la tentación y la exclusividad debida a Dios en el pasaje siguiente favorecen una traducción con fuerza cultual. «Me adoras» preserva ese peso sin eliminar el rango semántico más amplio del verbo, que puede incluir postración u homenaje.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado sin cambios del registro inglés más reciente (latest_revision_pass: unchanged=true), y conserva la decisión central de traducir προσκυνέω con un término de fuerza cultual en este contexto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «le dijo» mantiene el pronombre indirecto del griego sin sobreespecificar al destinatario.
  - «todas estas cosas» reproduce el alcance total del demostrativo plural, evitando reducirlo a un simple «esto».
  - La nota al pie preserva la alternativa lexical importante para προσκυνέω, en línea con el audit trail inglés.
