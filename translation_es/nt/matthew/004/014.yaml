translation:
  language: es
  text: 'para que se cumpliera lo dicho por medio de Isaías el profeta, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce propósito o resultado. «Para que» es el equivalente natural en español y conserva la fuerza teleológica del enlace sin sonar artificial.
- source_word: πληρωθῇ
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumpliera
  alternatives_spanish:
  - fuera cumplido
  - pudiera cumplirse
  lexicon: BDAG
  rationale: En Mateo, el verbo de cumplimiento remite al motivo de cumplimiento de la Escritura. «Se cumpliera» mantiene el pasivo y el matiz de cumplimiento profético en español natural.
- source_word: τὸ ῥηθὲν
  english_pob_choice: what was spoken
  chosen_spanish: lo dicho
  alternatives_spanish:
  - lo que fue dicho
  - lo hablado
  lexicon: BDAG
  rationale: El participio sustantivado neutro funciona como «lo dicho». Es breve, idiomático y conserva el sentido de algo previamente pronunciado sin sobretraducir.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - a través de
  - por
  lexicon: BDAG
  rationale: Con un intermediario humano, διά expresa mediación. «Por medio de» comunica mejor la mediación profética que un simple «por», sin perder naturalidad.
- source_word: Ἠσαΐου
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: τοῦ προφήτου
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - como profeta
  lexicon: BDAG
  rationale: La aposición identifica a Isaías y preserva el énfasis de la fórmula de cumplimiento en la autoridad profética.
- source_word: λέγοντος
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'que dice:'
  - 'como diciendo:'
  lexicon: BDAG
  rationale: El participio presente introduce la cita que sigue. «Diciendo:» reproduce de forma concisa la función discursiva en español.
theological_decisions:
- issue: Fórmula mateana de cumplimiento
  english_pob_reading: Render πληρωθῇ as 'might be fulfilled' and preserve the explicit fulfillment motif without expanding its theological meaning.
  chosen_spanish_reading: Traducir con «se cumpliera» y mantener explícito el lenguaje de cumplimiento sin interpretarlo como «se hiciera realidad» o «sucediera».
  alternative_spanish_readings:
  - se realizara
  - ocurriera
  rationale: Mateo usa este lenguaje para enlazar la Escritura con el acontecimiento de Jesús. «Se cumpliera» conserva la relación intertextual y teológica sin añadir explicación ajena al texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El griego presenta una cláusula final/resultativa con ἵνα + subjuntivo y una fórmula típica de cumplimiento en Mateo. La traducción española sigue ese patrón con una estructura natural («para que... se cumpliera...»), mantiene la mediación de διά con «por medio de», y conserva la cita introductoria con valor discursivo de participio presente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque aquí no hay κύριος ni referencia directa al nombre divino.
  - Se mantuvo «profeta» como título explícito de Isaías, conforme a la fórmula mateana.
  - No se añadió nota al pie porque no hay variantes textuales ni ambigüedad léxica decisiva que requiera un ancla en el texto.
