translation:
  language: es
  text: Y avanzando de allí, vio a otros dos hermanos, Jacobo, el hijo de Zebedeo, y Juan, su hermano, en la barca con Zebedeo, su padre, remendando sus redes, y los llamó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προβὰς
  english_pob_choice: going on
  chosen_spanish: avanzando
  alternatives_spanish:
  - yendo
  - siguiendo adelante
  lexicon: BDAG
  rationale: El participio aoristo indica que Jesús siguió desplazándose desde el lugar anterior. «Avanzando» conserva el movimiento continuo de forma natural en español sin añadir interpretación.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: BDAG
  rationale: Adverbio de procedencia; «de allí» es breve, idiomático y fiel al enlace con el contexto previo.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - notó
  lexicon: BDAG
  rationale: Aoristo narrativo simple de ὁράω. «Vio» mantiene la lectura directa sin intensificar el verbo.
- source_word: ἄλλους δύο ἀδελφούς
  english_pob_choice: two other brothers
  chosen_spanish: otros dos hermanos
  alternatives_spanish:
  - dos hermanos más
  - otros dos hermanos más
  lexicon: BDAG
  rationale: «ἄλλους» señala que son adicionales a los ya mencionados. «Otros dos hermanos» preserva el número y la relación comparativa de manera natural en español.
- source_word: Ἰάκωβον
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: BDAG
  rationale: Se conserva la forma tradicional bíblica «Jacobo», que corresponde al nombre griego en este contexto y evita mezclar formas de tradición eclesiástica sin necesidad.
- source_word: τὸν τοῦ Ζεβεδαίου
  english_pob_choice: the son of Zebedee
  chosen_spanish: el hijo de Zebedeo
  alternatives_spanish:
  - de Zebedeo
  lexicon: BDAG
  rationale: El genitivo funciona como identificación por filiación. «El hijo de Zebedeo» expresa claramente el valor relacional del griego.
- source_word: Ἰωάννην τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: John his brother
  chosen_spanish: Juan, su hermano
  alternatives_spanish:
  - Juan su hermano
  - Juan, el hermano de él
  lexicon: BDAG
  rationale: La aposición identifica a Juan como hermano de Jacobo. En español, la coma ayuda a reproducir la estructura explicativa sin forzar una traducción literal torpe.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el barco
  lexicon: BDAG
  rationale: En este contexto pesquero, πλοῖον se refiere a una embarcación pequeña. «Barca» es más preciso y más natural que «barco».
- source_word: μετὰ Ζεβεδαίου τοῦ πατρὸς αὐτῶν
  english_pob_choice: with Zebedee their father
  chosen_spanish: con Zebedeo, su padre
  alternatives_spanish:
  - con su padre Zebedeo
  - junto con Zebedeo, su padre
  lexicon: BDAG
  rationale: μετά con genitivo indica compañía. La colocación elegida mantiene la relación de acompañamiento y el vínculo familiar de forma fluida.
- source_word: καταρτίζοντας
  english_pob_choice: mending
  chosen_spanish: arreglando
  alternatives_spanish:
  - remendando
  - reparando
  lexicon: BDAG
  rationale: En el contexto de pesca, καταρτίζω alude a poner las redes en buen estado. «Arreglando» es suficientemente amplio y natural; «remendando» sería más específico pero podría sonar demasiado técnico o restrictivo.
- source_word: τὰ δίκτυα αὐτῶν
  english_pob_choice: their nets
  chosen_spanish: sus redes
  alternatives_spanish:
  - las redes de ellos
  lexicon: BDAG
  rationale: El posesivo español expresa bien la relación de pertenencia. «Redes» comunica el objeto de pesca sin ambigüedad.
- source_word: ἐκάλεσεν αὐτούς
  english_pob_choice: he called them
  chosen_spanish: los llamó
  alternatives_spanish:
  - los convocó
  lexicon: BDAG
  rationale: «Llamó» preserva el verbo básico sin expandirlo a una invitación explícita que el verso no formula. En el contexto del discipulado, el llamado queda entendido por la narración.
theological_decisions:
- issue: Alcance del llamado en ἐκάλεσεν
  english_pob_reading: Retain the simple wording 'he called them' without expanding to 'called them to follow him.'
  chosen_spanish_reading: Mantener «los llamó» sin ampliar a «los llamó para que lo siguieran».
  alternative_spanish_readings:
  - los llamó para que lo siguieran
  - los convocó a seguirlo
  rationale: El contexto inmediato sugiere el discipulado, pero el verso en sí solo afirma el llamado. Mantener la forma simple respeta la primacía del texto original y evita añadir contenido inferido.
  doctrine_reference: 'Principio de traducción: no paraprasear más allá de lo que el texto fuente exige; dejar que el contexto cercano complete la implicación narrativa.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y el griego, con atención especial a la identificación genealógica, el contexto pesquero de πλοῖον y καταρτίζω, y la sencillez del llamado final. No se requirieron revisiones previas en el paquete fuente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «barca» en lugar de «barco» por el contexto de pesca.
  - Se mantiene una sintaxis narrativa fluida en español, evitando calcos como «mientras estaba» o expansiones interpretativas no presentes en el griego.
