    issue: Marcador de nota al pie anclado en la palabra equivocada
    rationale: La nota explica una alternativa para διηκόνουν («ministraban/servían»), pero el marcador [a] aparece en «dejó», que traduce ἀφίησιν. Esto desaline­a la evidencia léxica y puede confundir al lector.
  - severity: low
    issue: «Ministraban» puede sonar menos natural que «servían» para algunos lectores
    rationale: Aunque «ministraban» conserva bien el registro elevado y combina con la nota sobre el imperfecto, en español amplio «servían» es más inmediato. No obstante, no es un error; solo requiere buena anotación, que ya existe.
