translation:
  language: es
  text: Entonces el diablo lo dejó, y he aquí, ángeles se acercaron y le ministraban[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le servían». El verbo griego puede traducirse «servir» o «ministrar»; el imperfecto sugiere una acción continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata; «entonces» reproduce bien el valor temporal de τότε sin forzar un giro más interpretativo.
- source_word: ἀφίησιν
  english_pob_choice: left
  chosen_spanish: lo dejó
  alternatives_spanish:
  - se apartó de él
  - lo abandonó
  - lo dejó ir
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en pasado simple en español. En este contexto significa que el diablo se retira de Jesús; «lo dejó» conserva esa relación sin añadir matices ajenos.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; en español, «lo» es la forma natural y precisa.
- source_word: ὁ διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: En la escena de la tentación funciona como designación personal conocida de Satanás; «el diablo» preserva la claridad referencial y el registro bíblico común en español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - vean
  lexicon: BDAG
  rationale: Conserva la fuerza discursiva de atención súbita. «He aquí» es una equivalente natural y solemne en español para ἰδού.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto de cuidado divino tras la tentación indica seres celestiales, no simples mensajeros; «ángeles» es la equivalencia correcta.
- source_word: προσῆλθον
  english_pob_choice: came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  lexicon: BDAG
  rationale: El verbo expresa acercamiento/llegada; «se acercaron» conserva mejor la imagen de movimiento hacia Jesús que un simple «vinieron».
- source_word: διηκόνουν
  english_pob_choice: were ministering
  chosen_spanish: le ministraban
  alternatives_spanish:
  - le servían
  - le prestaban servicio
  lexicon: BDAG
  rationale: El imperfecto señala acción continua. «Le ministraban» mantiene el registro elevado y la idea de servicio continuo; «le servían» es posible pero menos específico para el matiz sostenido del verbo.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre dativo de destinatario; en español, «le» expresa de forma natural el destinatario del ministerio de los ángeles.
theological_decisions:
- issue: Valor de διάβολος en el relato de la tentación
  english_pob_reading: the devil
  chosen_spanish_reading: el diablo
  alternative_spanish_readings:
  - el calumniador
  - el acusador
  rationale: Aunque el sustantivo puede traducirse de forma más literal, aquí designa claramente a Satanás en la narración. «El diablo» mantiene la identificación personal sin introducir una traducción demasiado técnica o explicativa.
  doctrine_reference: Mateo 4:1-11; uso narrativo del título diabólico en la tentación
- issue: Matiz aspectual de διηκόνουν
  english_pob_reading: were ministering
  chosen_spanish_reading: le ministraban
  alternative_spanish_readings:
  - le servían
  - estaban ministrándole
  rationale: El imperfecto griego sugiere una acción en curso. «Le ministraban» comunica continuidad y respeta el registro reverente que la escena exige, sin perder la posibilidad de leer servicio práctico y asistencia angelical.
  doctrine_reference: Aspecto imperfectivo en griego koiné; cuidado angelical a Jesús
- issue: Retención de ἰδοὺ como marcador discursivo
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - mirad
  - observa
  rationale: No se omite el marcador porque aporta vivacidad y solemnidad narrativa. «He aquí» es la fórmula española más estable para conservar ese énfasis sin caer en arcaísmo excesivo.
  doctrine_reference: Función discursiva de ἰδού en narración bíblica
translation_notes:
  revision_awareness: Se revisó la correspondencia con la versión inglesa POB y no se detectaron cambios necesarios respecto del sentido básico. La principal decisión española fue conservar el marcador discursivo de ἰδοὺ y el matiz imperfectivo de διηκόνουν mediante una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo» porque el texto no usa Χριστός aquí; la referencia es narrativa a Jesús.
  - Se conservó el registro solemne sin recurrir a una calca rígida del inglés.
