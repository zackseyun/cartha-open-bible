translation:
  language: es
  text: Y recorría toda Galilea[a], enseñando en sus sinagogas y proclamando la buena noticia[b] del reino, y sanando toda enfermedad y toda dolencia entre el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por toda Galilea»; lit. «en toda Galilea».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el evangelio del reino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιῆγεν
  english_pob_choice: went throughout
  chosen_spanish: andaba por toda
  alternatives_spanish:
  - recorría toda
  - iba por toda
  lexicon: BDAG
  rationale: El imperfecto expresa una acción continua y itinerante. «Andaba por toda» comunica el movimiento distributivo por la región sin sonar forzado en español.
- source_word: ἐν ὅλῃ τῇ Γαλιλαίᾳ
  english_pob_choice: throughout all Galilee
  chosen_spanish: por toda Galilea
  alternatives_spanish:
  - en toda Galilea
  - a través de toda Galilea
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», con el verbo de desplazamiento el sentido es abarcador/distributivo. «Por toda Galilea» mantiene la amplitud regional de manera natural.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - instruyendo
  lexicon: BDAG
  rationale: El participio contemporáneo se representa bien con un gerundio español que conserva la simultaneidad con la acción principal.
- source_word: συναγωγαῖς αὐτῶν
  english_pob_choice: their synagogues
  chosen_spanish: sus sinagogas
  alternatives_spanish:
  - las sinagogas de ellos
  - las sinagogas
  lexicon: BDAG
  rationale: «Sinagogas» es el equivalente directo de συναγωγαῖς. El posesivo «sus» conserva αὐτῶν de forma idiomática y refleja la referencia a las comunidades locales.
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: κηρύσσω implica anuncio público y autoritativo. «Proclamando» mantiene ese matiz mejor que un verbo más eclesiástico o más débil.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the good news
  chosen_spanish: la buena noticia
  alternatives_spanish:
  - el evangelio
  lexicon: BDAG
  rationale: Se prefiere la traducción transparente del valor léxico de εὐαγγέλιον. «Evangelio» se conserva como alternativa posible, pero «buena noticia» evita depender de un tecnicismo tradicional.
- source_word: τῆς βασιλείας
  english_pob_choice: of the kingdom
  chosen_spanish: del reino
  alternatives_spanish:
  - acerca del reino
  - del reinado
  lexicon: BDAG
  rationale: 'El genitivo se vierte de forma directa y natural: la buena noticia caracterizada por el reino. «Del reino» conserva la relación con el griego sin añadir explicaciones.'
- source_word: θεραπεύων
  english_pob_choice: healing
  chosen_spanish: sanando
  alternatives_spanish:
  - curando
  - sanando y curando
  lexicon: BDAG
  rationale: En este contexto θεραπεύω denota sanidad efectiva. «Sanando» es el equivalente natural en español bíblico contemporáneo.
- source_word: πᾶσαν νόσον
  english_pob_choice: every disease
  chosen_spanish: toda enfermedad
  alternatives_spanish:
  - cada enfermedad
  - toda dolencia
  lexicon: BDAG
  rationale: νόσος puede referirse a enfermedad en sentido general. «Toda enfermedad» preserva la fuerza totalizadora del πᾶσαν.
- source_word: πᾶσαν μαλακίαν
  english_pob_choice: every sickness
  chosen_spanish: toda dolencia
  alternatives_spanish:
  - toda debilidad
  - toda enfermedad
  lexicon: BDAG
  rationale: μαλακία puede abarcar dolencia, debilidad o enfermedad. «Dolencia» mantiene la distinción con νόσος y refleja bien el término sin reducirlo innecesariamente.
- source_word: ἐν τῷ λαῷ
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - en el pueblo
  lexicon: BDAG
  rationale: La frase indica el ámbito donde ocurrían las sanidades. «Entre el pueblo» es idiomático y conserva λαός con su referencia colectiva.
theological_decisions:
- issue: Renderizar εὐαγγέλιον sin el tecnicismo tradicional
  english_pob_reading: the good news
  chosen_spanish_reading: la buena noticia
  alternative_spanish_readings:
  - el evangelio
  rationale: Se sigue la decisión auditada de traducir el sentido léxico de εὐαγγέλιον de forma transparente. No se altera el contenido doctrinal; solo se evita imponer un término tradicional donde el texto habla de anuncio gozoso y público.
  doctrine_reference: Translation philosophy §6
- issue: Preservar la doble universalidad de las curaciones
  english_pob_reading: every disease and every sickness
  chosen_spanish_reading: toda enfermedad y toda dolencia
  alternative_spanish_readings:
  - cada enfermedad y cada dolencia
  - toda enfermedad y toda debilidad
  rationale: Se mantiene la duplicación de πᾶσαν con dos sustantivos distintos para reflejar la amplitud enfática del griego. «Enfermedad» y «dolencia» evitan fusionar los dos términos y respetan la tensión lexical del pasaje.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El contexto auditado en inglés fue revisado y no muestra cambios textuales posteriores (latest_revision_pass: unchanged). La versión española sigue esa línea estable, con ajustes naturales al español para movimiento itinerante, anuncio público y el par lexical νόσος/μαλακία.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; aquí no aparece.
  - Se usa «reino» para βασιλεία, conforme al contexto y a la práctica del proyecto.
  - Se distingue «enfermedad»/«dolencia» para conservar el paralelismo semántico del griego.
  - Se evita «gospel»/«evangelio» como forma principal, pero se documenta la alternativa en nota.
  - La puntuación y la sintaxis buscan un registro bíblico moderno y readable en español latinoamericano.
