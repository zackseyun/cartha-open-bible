translation:
  language: es
  text: Y ellos inmediatamente dejaron las redes y le siguieron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  - Pero
  lexicon: BDAG
  rationale: δέ aquí funciona como un conector narrativo leve. En español, «Y» mantiene la coordinación simple y natural sin cargar el verso con contraste o consecuencia que el griego no exige.
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - enseguida
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: εὐθέως expresa prontitud inmediata. «Inmediatamente» conserva bien esa fuerza en un registro claro y digno para narrativa bíblica.
- source_word: ἀφέντες
  english_pob_choice: left
  chosen_spanish: dejaron
  alternatives_spanish:
  - soltaron
  - abandonaron
  - dejando
  lexicon: BDAG
  rationale: El participio aoristo de ἀφίημι marca una acción anterior a la principal. En español narrativo, «dejaron» comunica con naturalidad que primero soltaron/abandonaron las redes y luego siguieron a Jesús, sin la pesadez de una perífrasis literal.
- source_word: τὰ δίκτυα
  english_pob_choice: the nets
  chosen_spanish: las redes
  alternatives_spanish:
  - sus redes
  - las redes de pesca
  lexicon: BDAG
  rationale: δίκτυα designa redes de pesca en este contexto. «Las redes» respeta el artículo griego y suena natural en español; añadir «sus» o «de pesca» aclararía algo que el contexto ya hace evidente.
- source_word: ἠκολούθησαν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: lo siguieron
  alternatives_spanish:
  - le siguieron
  - anduvieron detrás de él
  lexicon: BDAG
  rationale: ἀκολουθέω con dativo puede denotar seguimiento físico y, en el contexto evangélico, discipulado. «Lo siguieron» conserva esa amplitud con un español natural; «le siguieron» también es posible, pero «lo siguieron» fluye mejor en el registro moderno.
theological_decisions:
- issue: Matiz de discipulado en ἠκολούθησαν αὐτῷ
  english_pob_reading: followed him
  chosen_spanish_reading: lo siguieron
  alternative_spanish_readings:
  - le siguieron
  - lo acompañaron
  rationale: La frase puede referirse al acto físico de seguir y, al mismo tiempo, al comienzo del discipulado. «Lo siguieron» mantiene esa tensión sin explicitar más de lo que el texto dice, en línea con la decisión auditada del POB en inglés.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y es coherente con el audit trail inglés: conector leve, prontitud inmediata, participio anterior convertido en pasado simple natural, y verbo de seguimiento que conserva el sentido narrativo-discipular sin sobreexplicación.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - Se usa «lo siguieron» para reflejar el seguimiento de Jesús sin introducir vocabulario eclesiástico posterior.
  - No se añadieron notas porque el verso no presenta variantes textuales ni ambigüedades que requieran desambiguación en español.
