translation:
  language: es
  text: El pueblo que estaba sentado en tinieblas vio una gran luz, y a los que estaban sentados en la región y sombra de muerte[a], una luz amaneció sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oscuridad profunda». Se conserva «sombra de muerte» porque el griego incluye explícitamente «muerte» y mantiene el eco bíblico tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαὸς
  english_pob_choice: people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las personas
  lexicon: BDAG
  rationale: «Pueblo» conserva el sentido colectivo del griego y mantiene mejor el eco bíblico que «gente», sin volver el texto excesivamente técnico ni etnicista.
- source_word: καθήμενος / καθημένοις
  english_pob_choice: sitting
  chosen_spanish: que estaba sentado / estaban sentados
  alternatives_spanish:
  - que habitaba
  - que moraba
  - sentado
  lexicon: BDAG
  rationale: Se conserva la imagen verbal de «sentarse», como en el audit trail inglés, para mantener la resonancia intertextual con Isaías y la fuerza metafórica del cuadro.
- source_word: σκοτίᾳ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - sombra
  - penumbra
  lexicon: BDAG
  rationale: «Tinieblas» es una equivalencia bíblica natural en español y preserva la carga metafórica sin especificar indebidamente si la oscuridad es moral, espiritual o circunstancial.
- source_word: φῶς εἶδεν μέγα
  english_pob_choice: saw a great light
  chosen_spanish: vio una gran luz
  alternatives_spanish:
  - ha visto una gran luz
  - vio luz grande
  lexicon: BDAG
  rationale: «Vio una gran luz» expresa con naturalidad el aoristo narrativo y conserva el carácter manifiesto e impactante del sintagma griego.
- source_word: χώρᾳ
  english_pob_choice: region
  chosen_spanish: región
  alternatives_spanish:
  - tierra
  - país
  - comarca
  lexicon: BDAG
  rationale: «Región» reproduce el valor geográfico sin sugerir un estado nacional moderno. Mantiene además el paralelo con el campo metafórico del versículo.
- source_word: σκιᾷ θανάτου
  english_pob_choice: shadow of death
  chosen_spanish: sombra de muerte
  alternatives_spanish:
  - sombra mortal
  - oscuridad de muerte
  - sombra de la muerte
  lexicon: BDAG
  rationale: Se conserva la expresión tradicional y el componente explícito de «muerte» del griego, evitando neutralizarla en «tinieblas profundas».
- source_word: ἀνέτειλεν
  english_pob_choice: dawned
  chosen_spanish: les amaneció
  alternatives_spanish:
  - les salió
  - resplandeció para ellos
  - les brotó
  lexicon: BDAG
  rationale: «Les amaneció» transmite mejor en español la imagen de una luz que irrumpe como el alba. Es más idiomático que un calco como «amaneció sobre ellos», y conserva el valor figurado del verbo.
- source_word: αὐτοῖς
  english_pob_choice: on those / to them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  - sobre ellos
  lexicon: BDAG
  rationale: El dativo se integra naturalmente con el verbo impersonalizado en español mediante «les», sin perder la referencia explícita a los destinatarios de la acción.
theological_decisions:
- issue: Alcance de la imagen de tinieblas y luz
  english_pob_reading: Retain the imagery without specifying whether the darkness is spiritual, moral, political, or existential.
  chosen_spanish_reading: Mantener la imagen sin precisar si las tinieblas son espirituales, morales, políticas o existenciales.
  alternative_spanish_readings:
  - Interpretar las tinieblas como pecado
  - Interpretar las tinieblas como ignorancia de los gentiles
  - Interpretar la luz como una revelación específicamente mesiánica
  rationale: El griego y la cita profética sostienen una imagen rica y abierta; la traducción española debe preservar esa tensión sin cerrar prematuramente su alcance teológico.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje fuente griego y el audit trail inglés, especialmente la decisión de conservar la imaginería intertextual de Isaías, la referencia explícita a θανάτου y el valor metafórico de ἀνέτειλεν. No hubo revisiones posteriores que alteraran el texto base.
  spanish_consistency_notes:
  - Se prefirió «tinieblas» para σκοτία por su registro bíblico natural en español.
  - Se mantuvo «región» para χώρᾳ, coherente con la opción inglesa y sin modernizar a un término político.
  - «Les amaneció» busca naturalidad española sin perder la imagen de un alba que se levanta para los destinatarios.
  - La nota al pie se ancla en «tinieblas» para ofrecer la alternativa semántica documentada sin duplicar marcadores.
