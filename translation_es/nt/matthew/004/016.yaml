review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego en su estructura paralela y en sus elecciones centrales: «el pueblo», «sentado», «tinieblas», «vio una gran luz», «región», «sombra de muerte» y la imagen de una luz que irrumpe. También preserva correctamente la indeterminación teológica de la metáfora. Sin embargo, la nota [a] está anclada a «tinieblas» en la primera cláusula mientras su contenido explica la alternativa a «sombra de muerte»/«deep darkness», lo que desaline­a la evidencia fuente y el audit trail inglés.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. No obstante, «en región y sombra de muerte» suena algo áspero sin artículo, y «les amaneció una luz» es idiomático pero menos directo que una formulación que mantenga con mayor claridad el sujeto «una luz» y la imagen de irrupción. La reparación principal necesaria es la colocación correcta de la nota y una leve mejora de naturalidad en la segunda cláusula.
  glossary_alignment: No hay conflictos con la terminología de proyecto. Este versículo no contiene los términos sensibles principales del glosario. Las decisiones «tinieblas», «sombra de muerte» y la preservación de la imaginería profética son coherentes con el rationale documentado.
  issues:
  - severity: high
    issue: La nota [a] está anclada al término equivocado.
    rationale: El audit trail inglés da la alternativa «deep darkness» en relación con la frase que en español corresponde a «sombra de muerte», no a «tinieblas». Mantener la nota en «tinieblas» confunde al lector y no representa fielmente la decisión léxica documentada.
  - severity: medium
    issue: Falta artículo en «en región y sombra de muerte».
    rationale: Aunque el griego no exige artículos españoles, en español bíblico natural «en la región y sombra de muerte» o «en región y en sombra de muerte» suena más completo y legible.
  - severity: low
    issue: «Les amaneció una luz» es aceptable, pero puede afinarse.
    rationale: La frase es idiomática, pero «una luz amaneció sobre ellos» preserva de manera más transparente la relación entre el sujeto «luz» y el verbo de amanecer, además de reflejar mejor la imagen del griego ἀνέτειλεν.
  revised_spanish_text: El pueblo que estaba sentado en tinieblas vio una gran luz, y a los que estaban sentados en la región y sombra de muerte[a], una luz amaneció sobre ellos.
  revised_footnotes:
  - marker: a
    text: O «oscuridad profunda». Se conserva «sombra de muerte» porque el griego incluye explícitamente «muerte» y mantiene el eco bíblico tradicional.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [a] para que corresponda a la decisión léxica correcta documentada en el audit trail inglés; además, se mejora levemente la naturalidad española con «la región» y se hace más transparente la imagen del griego en la segunda cláusula con «una luz amaneció sobre ellos».
