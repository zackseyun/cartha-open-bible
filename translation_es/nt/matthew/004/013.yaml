translation:
  language: es
  text: Y dejando Nazara[a], vino y se estableció en Cafarnaúm, junto al mar, en la región de Zabulón y Neftalí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Nazara»; la mayoría de las traducciones en español tienen «Nazaret».'
    reason: alternative_reading
lexical_decisions:
- source_word: καταλιπὼν
  english_pob_choice: leaving
  chosen_spanish: dejando
  alternatives_spanish:
  - habiendo dejado
  - tras dejar
  lexicon: BDAG
  rationale: Participio aoristo activo de καταλείπω (AAPNSM). Técnicamente el aoristo participial indica acción anterior al verbo principal, pero en español «dejando» es la forma más natural y fluida, paralela a la elección del inglés POB («leaving» sobre «having left»). La forma «habiendo dejado» preserva mejor la anterioridad aspectual, pero resulta pesada en prosa de lectura pública. Se prefiere «dejando» por naturalidad; la distinción aspectual queda documentada aquí.
- source_word: Ναζαρὰ
  english_pob_choice: Nazara
  chosen_spanish: Nazara
  alternatives_spanish:
  - Nazaret
  lexicon: BDAG
  rationale: El texto griego (SBLGNT) tiene Ναζαρά, no Ναζαρέτ. Siguiendo la filosofía del POB de transliterar desde el texto fuente, se mantiene «Nazara». La forma familiar «Nazaret» —usada en la gran mayoría de versiones en español (RVR60, NVI, NBV)— se preserva como alternativa en nota al pie.
- source_word: ἐλθὼν
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - habiendo venido
  - llegando
  lexicon: BDAG
  rationale: Participio aoristo de ἔρχομαι, coordinado con el verbo principal κατῴκησεν. Como el inglés POB, se opta por un verbo finito coordinado («vino y se estableció») para comunicar la secuencia de manera clara e idiomática en español, sin perder la fuerza narrativa del participio.
- source_word: κατῴκησεν
  english_pob_choice: settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - residió
  - se instaló
  - fijó su residencia
  lexicon: BDAG
  rationale: Aoristo indicativo activo de κατοικέω, con sentido de establecerse en un lugar. «Se estableció» captura la acción de fijar residencia mejor que el más estático «habitó» y es más natural que «residió». Corresponde al «settled» del inglés POB sobre «dwelt/lived/resided».
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Cafarnaúm
  alternatives_spanish:
  - Capernaúm
  lexicon: BDAG
  rationale: Transliteración estándar del nombre propio en español. «Cafarnaúm» es la forma preferida en la tradición bíblica de lengua española (RVR60, NVI, Biblia de Jerusalén), adaptando la /k/ inicial griega a la grafía española. Se evita «Capernaúm», que es calco demasiado cercano al inglés.
- source_word: τὴν παραθαλασσίαν
  english_pob_choice: by the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - a orillas del mar
  - junto a la orilla del mar
  - costera
  lexicon: BDAG
  rationale: El adjetivo παραθαλάσσιος («junto al mar / a orillas del mar») funciona de modo descriptivo con el artículo para Cafarnaúm. «Junto al mar» es conciso y natural en español moderno, preservando la referencia geográfica sin resultar arcaico. «A orillas del mar» sería también preciso, aunque más largo.
- source_word: ἐν ὁρίοις
  english_pob_choice: in the region of
  chosen_spanish: en la región de
  alternatives_spanish:
  - en los territorios de
  - dentro de los límites de
  - en los confines de
  lexicon: BDAG
  rationale: ὅριον (pl. ὅρια) designa límites, fronteras o territorios. Aquí se refiere al área geográfica asociada a las tribus de Zabulón y Neftalí. «En la región de» es idiomático y comunica claramente la referencia geográfica, como el inglés POB. «En los territorios de» es alternativa más literal; «en los confines de» tiene un matiz más arcaico.
- source_word: Ζαβουλών
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  lexicon: BDAG
  rationale: 'Transliteración estándar del nombre tribal/geográfico en español. «Zabulón» es la forma consolidada en la tradición bíblica española (RVR60, Vulgata: Zabulon). Se prefiere sobre «Zebulún», que es calco del inglés.'
- source_word: Νεφθαλίμ
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftali
  - Nephtalim
  lexicon: BDAG
  rationale: Transliteración estándar del nombre tribal en español. «Neftalí» es la forma establecida en las versiones bíblicas en español (RVR60, NVI, NBV), con acento esdrújulo sobre la última sílaba. Se descarta «Nephtalim», que reproduce demasiado fielmente la forma griega Νεφθαλίμ a expensas de la legibilidad en español.
translation_notes:
  revision_awareness: 'El texto inglés del POB (gpt-5.4, 2026-04-23) pasó su última revisión sin cambios (unchanged: true) y obtuvo alta concordancia en la revisión cruzada (agreement: 1.0, 2 pasadas, 0 con observaciones). El borrador español se elaboró directamente desde el griego (SBLGNT), usando el rastro de auditoría del inglés como contexto, no como texto base mecánico.'
  spanish_consistency_notes:
  - Se usa «Cafarnaúm» (no «Capernaúm») como transliteración estándar en la tradición bíblica española; se documenta la alternativa en las decisiones léxicas.
  - Los nombres tribales «Zabulón» y «Neftalí» siguen las transliteraciones consolidadas en las versiones bíblicas en español, evitando calcos del inglés.
  - No aparecen en este versículo términos del glosario POB (Yahvé, Mesías, espíritu, carne, justicia, gracia, etc.); los valores por defecto del proyecto no aplican aquí.
  - La estructura sintáctica del versículo (dos participios aoristo + verbo principal) se resuelve en español mediante dos verbos finitos coordinados («vino y se estableció»), siguiendo el mismo criterio del inglés POB, lo que produce una frase de lectura fluida y publicable.
