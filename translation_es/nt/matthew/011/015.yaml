lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que posee
  lexicon: BDAG
  rationale: La construcción con artículo y participio funciona de modo sustantivado y genérico. «El que tiene» conserva el singular representativo y suena natural en español bíblico sin perder la fuerza formal.
- source_word: ὦτα
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - orejas
  - un oído
  lexicon: BDAG
  rationale: El griego usa plural; en español «oídos» reproduce mejor el plural formal y el sentido idiomático de capacidad para percibir y atender al mensaje.
- source_word: ἀκουέτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo de tercera persona se vierte con «oiga» para mantener la concisión proverbial. «Escuche» sería posible, pero «oiga» conserva mejor el eco bíblico de la fórmula.
theological_decisions:
- issue: Expresión genérica masculina singular
  english_pob_reading: The one who has ears, let him hear.
  chosen_spanish_reading: El que tiene oídos, oiga.
  alternative_spanish_readings:
  - Quien tenga oídos, que oiga.
  - El que tiene oídos, que escuche.
  rationale: El griego presenta una construcción singular masculina genérica. Se mantiene en español con «el que» y el imperativo «oiga», preservando la forma representativa sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con la traducción inglesa auditada; no se registran revisiones aplicadas y la redacción española sigue de cerca la estructura breve y proverbial del griego.
  spanish_consistency_notes:
  - Se preservó el singular genérico masculino como en el griego y en la POB inglesa auditada.
  - Se eligió «oídos» en plural por corresponder al acusativo plural griego y al idiomatismo español.
  - Se mantuvo una formulación breve y formularia, apropiada para el cierre enfático del dicho.
