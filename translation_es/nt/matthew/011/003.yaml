translation:
  language: es
  text: 'y le dijo: «¿Eres tú el que ha de venir[a], o debemos esperar a otro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que viene» o «el que ha de venir». La expresión griega puede funcionar como un título mesiánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν αὐτῷ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: El aoristo εἶπεν se vierte naturalmente como «dijo»; la conjunción «y» se conserva para reflejar la continuación narrativa del contexto, como en el audit trail inglés.
- source_word: Σὺ εἶ
  english_pob_choice: Are you
  chosen_spanish: ¿Eres tú
  alternatives_spanish:
  - ¿Tú eres?
  - ¿Eres tú mismo?
  lexicon: BDAG
  rationale: El español expresa la pregunta directa con inversión verbal. «Tú» conserva el énfasis del pronombre explícito griego sin añadir una glosa excesiva.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: the one who is to come
  chosen_spanish: el que ha de venir
  alternatives_spanish:
  - el que viene
  - el que está por venir
  lexicon: BDAG
  rationale: La forma articular del participio funciona sustantivamente y puede tener fuerza titulística/mesiánica. «El que ha de venir» comunica esa expectativa en un español natural sin ocultar la tensión lexical entre un participio literal y un título reconocido.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: BDAG
  rationale: Conjunción disyuntiva ordinaria.
- source_word: ἕτερον
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a alguien más
  - a uno diferente
  lexicon: BDAG
  rationale: ἕτερον significa «otro/diferente». En esta construcción, «a otro» es la manera más natural y fiel de expresar la alternativa sin intensificar indebidamente el sentido.
- source_word: προσδοκῶμεν
  english_pob_choice: should we expect
  chosen_spanish: debemos esperar
  alternatives_spanish:
  - debemos aguardar
  - hemos de esperar
  lexicon: BDAG
  rationale: Aunque formalmente es indicativo presente, en la pregunta deliberativa se traduce de forma idiomática. «Debemos esperar» mantiene la idea de expectativa sin reducirla a un mero acto de aguardar.
theological_decisions:
- issue: Título mesiánico de ὁ ἐρχόμενος
  english_pob_reading: Render as the title 'the one who is to come'
  chosen_spanish_reading: el que ha de venir
  alternative_spanish_readings:
  - el Mesías
  - el que viene
  - el esperado
  rationale: 'El contexto refleja la pregunta de Juan sobre la identidad mesiánica de Jesús. Se preserva la ambigüedad controlada del griego: la frase puede leerse como participio descriptivo o como título esperado. «El que ha de venir» suena natural en español y mantiene esa carga sin fijar demasiado la identificación en el texto principal.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La revisión inglesa reciente prefirió «the one who is to come» por naturalidad formal, manteniendo el sentido mesiánico de ὁ ἐρχόμενος. La versión española refleja esa misma preferencia con una formulación idiomática equivalente: «el que ha de venir».'
  spanish_consistency_notes:
  - Se usa «venir» para ἐρχόμενος en armonía con la decisión inglesa revisada, evitando una paráfrasis teológica que cierre demasiado el sentido.
  - Se evita «Cristo» en el texto principal porque el griego no lo usa aquí; la connotación mesiánica queda preservada por la construcción participial y explicada en nota.
  - «Debemos esperar» reproduce la pregunta deliberativa de προσδοκῶμεν en un registro natural para español bíblico contemporáneo.
