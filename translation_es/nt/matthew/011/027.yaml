translation:
  language: es
  text: Todas las cosas me han sido entregadas por mi Padre, y nadie conoce[a] al Hijo sino el Padre, ni nadie conoce al Padre sino el Hijo, y a quien el Hijo quiera revelárselo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conoce verdaderamente»; el verbo griego puede expresar conocimiento relacional e íntimo, aunque aquí el texto no exige explicitar una intensificación como «plenamente».
    reason: lexical_alternative
  - marker: b
    text: O «aquel a quien el Hijo quiera revelarlo». El sentido es que el Hijo revela al Padre a quien él quiere.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  english_pob_choice: All things
  chosen_spanish: Todas las cosas
  alternatives_spanish:
  - Todo
  - Todo cuanto existe
  lexicon: BDAG
  rationale: El neutro plural amplio pide una expresión igualmente abarcadora. «Todas las cosas» conserva la amplitud total de lo entregado al Hijo sin especificar indebidamente el dominio.
- source_word: παρεδόθη
  english_pob_choice: have been handed over
  chosen_spanish: han sido entregadas
  alternatives_spanish:
  - han sido puestas en manos
  - han sido confiadas
  lexicon: BDAG
  rationale: El pasivo aoristo expresa una entrega recibida; «han sido entregadas» comunica bien ese acto de transmisión y su estado resultante en español natural.
- source_word: ὑπὸ τοῦ πατρός μου
  english_pob_choice: by my Father
  chosen_spanish: por mi Padre
  alternatives_spanish:
  - por mi Padre celestial
  - de parte de mi Padre
  lexicon: BDAG
  rationale: El artículo y el posesivo señalan una relación personal y divina. En español, «mi Padre» mantiene la referencia titulada sin necesidad de añadir «celestial».
- source_word: ἐπιγινώσκει
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - llega a conocer
  - conoce plenamente
  lexicon: BDAG
  rationale: La revisión inglesa decidió no explicitar «fully». En español, «conoce» conserva el alcance relacional del verbo sin añadir una intensificación que el texto final no exige. La ambigüedad de conocimiento profundo queda implícita en el contexto.
- source_word: τὸν υἱὸν / ὁ υἱός
  english_pob_choice: the Son
  chosen_spanish: el Hijo
  alternatives_spanish:
  - el Hijo de Dios
  - el hijo
  lexicon: BDAG
  rationale: Es un título cristológico recíproco con «el Padre». En español, la mayúscula no es obligatoria para captar el título, y «el Hijo» es claro y fiel.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En cláusulas exclusivas negativas, «sino» es la forma más natural y fiel en español.
- source_word: οὐδὲ τὸν πατέρα τις ἐπιγινώσκει
  english_pob_choice: nor does anyone know the Father
  chosen_spanish: ni al Padre conoce alguien
  alternatives_spanish:
  - ni nadie conoce al Padre
  - ni al Padre conoce nadie
  lexicon: BDAG
  rationale: Se conserva el paralelismo negativo del griego. El orden «ni al Padre conoce alguien» reproduce el énfasis sin sonar forzado; «al Padre» mantiene el objeto directo humano-divino en español.
- source_word: ᾧ ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι
  english_pob_choice: anyone to whom the Son chooses to reveal him
  chosen_spanish: y a aquel a quien el Hijo quiera revelarlo
  alternatives_spanish:
  - y a quien el Hijo quiera revelarlo
  - y a quien el Hijo desee revelarlo
  lexicon: BDAG
  rationale: «Quiera» comunica la volición del verbo βούλομαι con una forma natural en español; evita tanto un tecnicismo rígido como una reducción a simple deseo. «Revelarlo» mantiene el referente inmediato al Padre.
- source_word: ἀποκαλύψαι
  english_pob_choice: to reveal
  chosen_spanish: revelarlo
  alternatives_spanish:
  - dar a conocer
  - manifestarlo
  lexicon: BDAG
  rationale: «Revelar» es el equivalente estándar para ἀποκαλύπτω y conserva la dimensión de disclosure divina. El enclítico «-lo» aclara el objeto implícito, que en el contexto es el Padre.
theological_decisions:
- issue: Conocimiento exclusivo y relacional del Padre y del Hijo
  english_pob_reading: Rendered as 'knows' for both clauses, preserving reciprocal exclusivity without adding an intensifier.
  chosen_spanish_reading: «conoce» en ambas cláusulas, manteniendo la exclusividad recíproca sin añadir «plenamente».
  alternative_spanish_readings:
  - «conoce plenamente»
  - «llega a conocer»
  rationale: 'La revisión inglesa eliminó el intensificador. El español sigue esa decisión: el texto afirma una exclusividad de conocimiento entre Padre e Hijo; no hace falta sobretraducirla con un adverbio que el texto final no sostiene explícitamente.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Voluntad del Hijo en la revelación
  english_pob_reading: Rendered as 'chooses' to communicate real volition.
  chosen_spanish_reading: «quiera» para βούληται, preservando voluntad efectiva del Hijo.
  alternative_spanish_readings:
  - «quiera»
  - «elija»
  - «desee»
  rationale: La construcción subjuntiva transmite la iniciativa libre del Hijo en la revelación sin forzar un tecnicismo. Evita convertir βούλομαι en mero sentimiento y conserva la agencia soberana del Hijo.
  doctrine_reference: Affirmations; Translation philosophy §§3, 6
translation_notes:
  revision_awareness: La versión inglesa revisada retiró «fully» de ambas cláusulas de conocimiento porque el griego no añade ese intensificador de forma explícita. Esta propuesta española sigue esa revisión, conservando «conoce» sin adverbios añadidos y manteniendo el paralelismo sintáctico y teológico del verso.
  spanish_consistency_notes:
  - Se mantiene «Padre» e «Hijo» como títulos relacionales en todo el versículo.
  - Se conserva el objeto implícito de ἀποκαλύψαι como «lo», referido al Padre en el contexto inmediato.
  - «Sino» y «ni» reproducen la serie de exclusiones negativas del griego con naturalidad en español.
  - El registro es formal pero idiomático, sin calcos innecesarios.
