source:
  edition: SBLGNT
  text: Πάντα μοι παρεδόθη ὑπὸ τοῦ πατρός μου, καὶ οὐδεὶς ἐπιγινώσκει τὸν υἱὸν εἰ μὴ ὁ πατήρ, οὐδὲ τὸν πατέρα τις ἐπιγινώσκει εἰ μὴ ὁ υἱὸς καὶ ᾧ ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/027.yaml
  text: All things have been handed over to me by my Father[a], and no one knows the Son except the Father[b], nor does anyone know the Father except the Son and anyone to whom the Son chooses to reveal him.
  footnotes:
  - marker: a
    text: Or 'knows' or 'truly knows' for 'fully knows' in both clauses; the Greek verb can denote knowing fully or intimately.
    reason: lexical_alternative
  - marker: b
    text: Or 'whomever the Son wills to reveal him to.'
    reason: lexical_alternative
