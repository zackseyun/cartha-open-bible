revisions:
- from: Todas las cosas me han sido entregadas por mi Padre[a], y nadie conoce al Hijo sino el Padre[b], ni al Padre conoce alguien sino el Hijo, y aquel a quien el Hijo quiera revelarlo.
  to: Todas las cosas me han sido entregadas por mi Padre, y nadie conoce[a] al Hijo sino el Padre, ni nadie conoce al Padre sino el Hijo, y a quien el Hijo quiera revelárselo[b].
  rationale: Se corrigió el anclaje de la nota sobre «conoce», se simplificó el segundo miembro negativo para mayor naturalidad, y se reparó la cláusula final para que el español exprese con claridad e idiomaticidad el objeto revelado y el destinatario de la revelación, sin alterar el sentido del griego ni la auditoría inglesa.
