review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la entrega total al Hijo, el conocimiento exclusivo entre Padre e Hijo, y la revelación soberana del Padre por el Hijo. Sin embargo, presenta dos problemas de fidelidad formal: (1) la nota [a] está anclada a «Padre» pero trata sobre ἐπιγινώσκει («conoce»), por lo que el anclaje es incorrecto; y (2) la cláusula final omite el complemento preposicional explícito del sentido en español natural, de modo que «y aquel a quien el Hijo quiera revelarlo» queda elíptico y menos claro que el griego/inglés auditado. Conviene reparar ambos puntos.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «ni al Padre conoce alguien» suena algo rígido y menos natural que «ni nadie conoce al Padre» o «ni nadie conoce al Padre sino el Hijo». Además, la cláusula final necesita ajuste para sonar idiomática: «a quien el Hijo quiera revelárselo» sigue siendo torpe; lo natural es «a quien el Hijo quiera revelárselo» o mejor «a quien el Hijo quiera revelárselo» con reestructuración completa. La mejor solución es «y aquel a quien el Hijo quiera revelárselo» o, más fluido todavía, «y a quien el Hijo quiera revelárselo». También deben corregirse las notas para que coincidan con sus anclajes reales.'
  glossary_alignment: No hay conflictos con la terminología proyectual principal. «Padre», «Hijo», «revelar» y «quiera» son adecuados. «Todas las cosas» es fiel aunque un poco más pesado que «Todo»; sigue siendo aceptable. La decisión de usar «conoce» en vez de «conoce plenamente» concuerda con la revisión inglesa auditada.
  issues:
  - severity: medium
    issue: La nota [a] está colocada después de «mi Padre», pero su contenido trata del verbo «conoce».
    rationale: Los marcadores deben anclarse exactamente al término o frase pertinente. Aquí la nota crea confusión exegética y editorial porque parece comentar «Padre» en lugar de ἐπιγινώσκει.
  - severity: medium
    issue: La nota [b] repite esencialmente la redacción principal y no mejora la alternativa; además el anclaje más útil está en la cláusula final completa.
    rationale: La nota inglesa b preserva una alternativa de formulación para toda la cláusula ᾧ ἐὰν βούληται ὁ υἱὸς ἀποκαλύψαι. En español debe reflejar una alternativa real y estar anclada donde corresponda.
  - severity: medium
    issue: La cláusula final «y aquel a quien el Hijo quiera revelarlo» es menos natural y algo defectuosa en español.
    rationale: En español, con objeto indirecto expreso («a aquel a quien» / «a quien»), lo idiomático requiere duplicación pronominal o reestructuración. Sin ese ajuste, la lectura se siente incompleta o forzada.
  - severity: low
    issue: «ni al Padre conoce alguien» suena rígido.
    rationale: Aunque no es incorrecto, una formulación más natural preserva mejor la legibilidad eclesial amplia sin perder el paralelismo griego.
  revised_spanish_text: Todas las cosas me han sido entregadas por mi Padre, y nadie conoce[a] al Hijo sino el Padre, ni nadie conoce al Padre sino el Hijo, y a quien el Hijo quiera revelárselo[b].
  revised_footnotes:
  - marker: a
    text: O «conoce verdaderamente»; el verbo griego puede expresar conocimiento relacional e íntimo, aunque aquí el texto no exige explicitar una intensificación como «plenamente».
    reason: lexical_alternative
  - marker: b
    text: O «aquel a quien el Hijo quiera revelarlo». El sentido es que el Hijo revela al Padre a quien él quiere.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota sobre «conoce», se simplificó el segundo miembro negativo para mayor naturalidad, y se reparó la cláusula final para que el español exprese con claridad e idiomaticidad el objeto revelado y el destinatario de la revelación, sin alterar el sentido del griego ni la auditoría inglesa.
