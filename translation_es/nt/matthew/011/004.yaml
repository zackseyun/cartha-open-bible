  - severity: low
    issue: La nota literal omite «a ellos» / «les»
    rationale: La nota «Y Jesús les respondió y dijo» es aceptable, pero puede reflejar con un poco más de exactitud el αὐτοῖς si se mantiene explícito «les». No requiere mayor ajuste porque ya está presente.
