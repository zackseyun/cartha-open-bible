translation:
  language: es
  text: 'Y Jesús les respondió[a]: «Vayan e infórmenle a Juan lo que oyen y ven:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y Jesús respondió y les dijo»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo de ἀποκρίνομαι funciona idiomáticamente en narrativa como fórmula de respuesta. En español, «respondió» comunica de manera natural la función discursiva sin forzar una expansión más pesada.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: —
  alternatives_spanish:
  - dijo
  - y dijo
  lexicon: BDAG
  rationale: Con ἀποκριθεὶς, el verbo de decir queda absorbido por la introducción de la cita en español. La puntuación y las comillas mantienen la relación narrativa sin duplicación innecesaria.
- source_word: Πορευθέντες
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan de camino
  - Después de ir
  lexicon: BDAG
  rationale: 'El participio attendant con fuerza imperativa se traduce mejor como mandato directo en español: «Vayan». Esto conserva el valor de orden y la secuencia de acción.'
- source_word: ἀπαγγείλατε
  english_pob_choice: report
  chosen_spanish: anuncien
  alternatives_spanish:
  - informen
  - digan
  lexicon: BDAG
  rationale: ἀπαγγέλλω implica comunicar de vuelta, dar noticia o reportar. «Anuncien» es natural en español bíblico y transmite la idea de comunicar fielmente lo observado, sin reducirlo al mero «decir».
- source_word: Ἰωάννῃ
  english_pob_choice: to John
  chosen_spanish: a Juan
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con «a Juan». Se conserva el nombre propio en forma española estándar.
- source_word: ἃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - las cosas que
  - aquello que
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte de modo natural con «lo que» en español, que comunica el contenido indeterminado de lo percibido sin volverlo demasiado técnico.
- source_word: ἀκούετε
  english_pob_choice: you hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - están oyendo
  lexicon: BDAG
  rationale: El presente indicativo conserva la percepción actual; en la escena, la forma española en tercera plural dirigida a los mensajeros resulta idiomática. «Oyen» mantiene la conexión con lo que está ocurriendo ante ellos.
- source_word: βλέπετε
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - están viendo
  - observan
  lexicon: BDAG
  rationale: El paralelo con ἀκούετε pide una forma breve y natural. «Ven» preserva la percepción visual actual sin añadir matices ajenos.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: La conjunción coordinante simple se mantiene como «y». No se requiere valor adversativo ni inferencia temporal adicional.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: El nombre propio se traduce como forma española estándar; el artículo griego no se reproduce en el texto corriente.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo de interlocución se expresa de forma natural con el clítico indirecto «les» en español.
theological_decisions:
- issue: Fórmula narrativa ἀποκριθεὶς ... εἶπεν
  english_pob_reading: And Jesus answered them
  chosen_spanish_reading: Y Jesús les respondió
  alternative_spanish_readings:
  - Y Jesús les respondió y dijo
  - Y Jesús respondió a ellos
  rationale: No hay diferencia doctrinal; la decisión es estilística. En español, «respondió» ya incorpora la idea de contestar verbalmente, y el clítico «les» conserva el destinatario del discurso de manera natural.
  doctrine_reference: Narrative idiom and readability; no doctrinal implication
- issue: Mandato a los mensajeros con participio imperatival
  english_pob_reading: Go and report to John
  chosen_spanish_reading: Vayan y anuncien a Juan
  alternative_spanish_readings:
  - Vayan y reporten a Juan
  - Vayan y digan a Juan
  rationale: El griego presenta un movimiento seguido de comunicación. «Anuncien» preserva la fuerza de comunicar oficialmente lo visto y oído, sin rebajar el contenido ni introducir una tecnicidad extraña al español bíblico.
  doctrine_reference: Imperatival participle and discourse force
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en que la cláusula inicial es una fórmula narrativa idiomática y no requiere duplicar «dijo» en español. También se conserva el mandato doble con valor secuencial/imperativo y la relación perceptiva de «oír/ver» con verbos en presente, como en el original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar solo cuando corresponda; aquí no aparece el Tetragrámaton.
  - «Jesús» se mantiene como nombre propio establecido, sin artículo explícito.
  - Se prefirió un registro bíblico moderno y claro, evitando arcaísmos como «id» o «decid» que no aparecen en el español actual.
  - La puntuación con dos puntos al final de la cita reproduce la apertura del discurso sin añadir contenido no atestiguado.
