- from: 'Y Jesús les respondió[a]: «Vayan y anuncien a Juan lo que oyen y ven:»'
  to: 'Y Jesús les respondió[a]: «Vayan e infórmenle a Juan lo que oyen y ven:»'
  rationale: Se mantiene la compresión idiomática correcta de la fórmula narrativa griega, pero se ajusta ἀπαγγείλατε a «infórmenle» para preservar mejor el sentido de comunicar de vuelta a Juan lo oído y visto. También se usa «e» ante «infórmenle» por corrección fonética del español. La nota se conserva con formulación ligeramente más natural y exacta.
