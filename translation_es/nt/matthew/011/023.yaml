translation:
  language: es
  text: Y tú, Capernaúm, ¿serás exaltada hasta el cielo? Descenderás al Hades[a]. Porque si en Sodoma hubieran sucedido los hechos poderosos[b] que sucedieron en ti, habría permanecido hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el reino de los muertos'. Griego 'Hades', no 'Gehenna'.
    reason: lexical_alternative
  - marker: b
    text: O 'milagros'. Griego δυνάμεις, literalmente 'poderes' o 'hechos de poder'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Capernaum
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio en forma española común y audible. El acento gráfico en Capernaúm ayuda a la pronunciación en español y no altera el referente.
- source_word: μὴ ἕως οὐρανοῦ ὑψωθήσῃ;
  english_pob_choice: will you be exalted to heaven?
  chosen_spanish: ¿serás exaltada hasta el cielo?
  alternatives_spanish:
  - ¿serás levantada hasta el cielo?
  - no serás exaltada hasta el cielo
  lexicon: BDAG para ὑψόω; valor interrogativo retórico de μή con futuro pasivo
  rationale: En español, la pregunta retórica expresa mejor el sentido que una simple negación. 'Exaltada' conserva la idea de elevación de estatus o ensalzamiento; 'hasta el cielo' preserva la metáfora espacial del griego. Se usa femenino por la ciudad personificada.
- source_word: ἕως ᾅδου καταβήσῃ
  english_pob_choice: You will go down to Hades
  chosen_spanish: Hasta el Hades descenderás
  alternatives_spanish:
  - Descenderás al Hades
  - Hasta el reino de los muertos descenderás
  lexicon: BDAG para καταβαίνω; transliteración de ᾅδης
  rationale: Se conserva 'Hades' para mantener la distinción del término griego respecto de otros vocablos de juicio final. 'Descenderás' reproduce el movimiento de descenso y suena natural en español con inversión enfática.
- source_word: δυνάμεις
  english_pob_choice: mighty works
  chosen_spanish: obras poderosas
  alternatives_spanish:
  - milagros
  - obras de poder
  lexicon: BDAG
  rationale: '''Obras poderosas'' preserva el valor de hechos concretos con fuerza divina sin estrechar el término a una sola categoría moderna como ''milagros''. Mantiene la amplitud semántica del griego en el contexto sinóptico.'
- source_word: γενόμεναι ἐν σοί
  english_pob_choice: done in you
  chosen_spanish: que se realizaron en ti
  alternatives_spanish:
  - hechas en ti
  - realizadas en ti
  lexicon: BDAG
  rationale: '''Se realizaron en ti'' mantiene la pasiva/resultativa del participio y la localización en la ciudad. ''En ti'' se conserva porque la ciudad es el destinatario personificado.'
- source_word: ἐγενήθησαν
  english_pob_choice: had happened
  chosen_spanish: se hubieran realizado
  alternatives_spanish:
  - hubieran ocurrido
  - se hubieran hecho
  lexicon: BDAG
  rationale: En la prótasis contrafactual, el español requiere una forma equivalente al pluscuamperfecto de subjuntivo. Dado que el sujeto son las 'obras poderosas', 'se hubieran realizado' enlaza naturalmente con el verso y evita ambigüedad.
- source_word: ἔμεινεν ἂν μέχρι τῆς σήμερον
  english_pob_choice: it would have remained until today
  chosen_spanish: habría permanecido hasta hoy
  alternatives_spanish:
  - habría quedado hasta hoy
  - seguiría en pie hasta hoy
  lexicon: BDAG para μένω
  rationale: '''Habría permanecido'' reproduce con claridad la apódosis irreal y el valor durativo de μένω. ''Hasta hoy'' conserva el temporalismo de μέχρι τῆς σήμερον en español contemporáneo.'
theological_decisions:
- issue: Renderización de ᾅδης
  english_pob_reading: Hades; not Gehenna; alternative 'the realm of the dead' in footnote
  chosen_spanish_reading: Hades; no 'Gehenna'; con nota alternativa 'el reino de los muertos'
  alternative_spanish_readings:
  - el reino de los muertos
  - el sepulcro
  - el infierno
  rationale: Se mantiene 'Hades' en el texto principal para preservar la diferenciación léxica del griego y evitar importar de inmediato la carga doctrinal de 'infierno'. La nota ofrece una alternativa explicativa válida para lectores que prefieran una equivalencia semántica.
  doctrine_reference: Principio POB de primacía del texto original y preservación de tensiones teológicas y léxicas
translation_notes:
  revision_awareness: 'Se revisó la decisión previa y se mantuvo el enfoque auditado: pregunta retórica en μή + futuro pasivo, distinción de ᾅδης frente a Gehenna, y δυνάμεις como hechos de poder. La versión española adapta el orden para naturalidad sin perder las tensiones semánticas del original.'
  spanish_consistency_notes:
  - Se usa 'Capernaúm' con acento gráfico por norma ortográfica española.
  - '''Hades'' se conserva transliterado de manera consistente con el criterio POB de no reemplazarlo por ''infierno''.'
  - '''Obras poderosas'' mantiene el campo semántico de δύναμις sin sobretraducir a una sola noción doctrinal.'
  - La ciudad se trata en femenino por personificación, coherente con el griego y con el español.
