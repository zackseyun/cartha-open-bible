    text: O 'el reino de los muertos'. Griego 'Hades', no 'Gehenna'.
    reason: lexical_alternative
  - marker: b
    text: O 'milagros'. Griego δυνάμεις, literalmente 'poderes' o 'hechos de poder'.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre 'cielo' para ajustarse mejor al audit trail y evitar sobreexplicación. Se mejora la naturalidad con 'Descenderás al Hades'. Se sustituye 'obras poderosas' por 'hechos poderosos' y 'se realizaron' por 'sucedieron' para reflejar con más soltura γίνομαι/δυνάμεις en español, sin perder el matiz de hechos de poder. Se conserva la nota esencial sobre 'Hades' y la alternativa léxica para δυνάμεις.
