revisions:
- from: Y tú, Capernaúm, ¿serás exaltada hasta el cielo[a]? Hasta el Hades[b] descenderás. Porque si en Sodoma se hubieran realizado las obras poderosas[c] que se realizaron en ti, habría permanecido hasta hoy.
  to: Y tú, Capernaúm, ¿serás exaltada hasta el cielo? Descenderás al Hades[a]. Porque si en Sodoma hubieran sucedido los hechos poderosos[b] que sucedieron en ti, habría permanecido hasta hoy.
  rationale: Se elimina la nota innecesaria sobre 'cielo' para ajustarse mejor al audit trail y evitar sobreexplicación. Se mejora la naturalidad con 'Descenderás al Hades'. Se sustituye 'obras poderosas' por 'hechos poderosos' y 'se realizaron' por 'sucedieron' para reflejar con más soltura γίνομαι/δυνάμεις en español, sin perder el matiz de hechos de poder. Se conserva la nota esencial sobre 'Hades' y la alternativa léxica para δυνάμεις.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:06:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido global del griego: la pregunta retórica con μή, el descenso a ᾅδης, la condición contrafactual sobre Sodoma y el resultado irreal. Sin embargo, añade notas no necesarias y una de ellas ancla ''cielo'' sin corresponder a una alternativa preservada por el POB inglés. Además, ''Hasta el Hades descenderás'' es comprensible pero menos natural que ''descenderás al Hades'', y ''obras poderosas'' suena algo forzado en español bíblico actual frente a ''hechos poderosos'', que preserva mejor δυνάμεις sin reducirlo a ''milagros''.'
  spanish_quality_summary: El español es en general claro y digno, pero puede mejorar en naturalidad y fluidez. '¿Serás exaltada hasta el cielo?' funciona, aunque sin nota. 'Descenderás al Hades' lee más naturalmente. 'Hechos poderosos' es más idiomático que 'obras poderosas' en este contexto. La estructura condicional final está bien construida.
  glossary_alignment: Buen cumplimiento del proyecto en mantener 'Hades' y distinguirlo de Gehenna. No hay términos del glosario principal en conflicto. La transliteración 'Capernaúm' es aceptable en español. La nota sobre Hades sí está alineada con la decisión teológica auditada; las otras notas no son necesarias.
  issues:
  - severity: medium
    issue: Nota [a] innecesaria y algo desviada del enfoque del POB
    rationale: El POB inglés no conserva nota sobre 'to heaven'; la explicación de la pregunta retórica pertenece más a la decisión léxica que al texto publicado. Además, anclar la nota en 'cielo' sugiere una alternativa textual inexistente más que una aclaración relevante al lector.
  - severity: low
    issue: '''Hasta el Hades descenderás'' suena menos natural en español'
    rationale: Aunque fiel, el orden marcado con 'hasta' al inicio no mejora el sentido y resulta más rígido que 'descenderás al Hades', que expresa bien ἕως ᾅδου καταβήσῃ en español natural.
  - severity: low
    issue: '''obras poderosas'' es algo torpe para δυνάμεις'
    rationale: La decisión de no usar 'milagros' es buena, pero 'hechos poderosos' comunica mejor en español hechos de poder realizados por Jesús, sin sonar calcado.
  revised_spanish_text: Y tú, Capernaúm, ¿serás exaltada hasta el cielo? Descenderás al Hades[a]. Porque si en Sodoma hubieran sucedido los hechos poderosos[b] que sucedieron en ti, habría permanecido hasta hoy.
  revised_footnotes:
