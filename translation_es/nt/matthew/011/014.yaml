translation:
  language: es
  text: Y si ustedes quieren aceptar esto[b][a], él es Elías, el que ha de venir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "si ustedes quieren recibir esto".'
    reason: lexical_alternative
  - marker: b
    text: Es decir, Jesús identifica a Juan el Bautista como el Elías prometido que había de venir; compárese Malaquías 4:5 y Mateo 17:10–13.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Conecta la frase de manera simple y natural en español, preservando la unión discursiva del griego sin añadir matiz temporal o inferencial no explicitado.
- source_word: εἰ θέλετε δέξασθαι
  english_pob_choice: if you are willing to accept it
  chosen_spanish: si ustedes quieren aceptarlo
  alternatives_spanish:
  - si ustedes están dispuestos a recibirlo
  - si quieren recibirlo
  lexicon: BDAG
  rationale: θέλετε expresa disposición o voluntad; por eso 'quieren' comunica mejor la actitud requerida. 'Aceptarlo' mantiene la fuerza de δέξασθαι como recepción/aceptación de la afirmación de Jesús. 'Ustedes' hace explícito el plural del verbo y evita una referencia demasiado impersonal.
- source_word: αὐτός
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - este mismo
  lexicon: BDAG
  rationale: El pronombre remite a Juan el Bautista; en español, 'él' es la forma más natural y directa. No se requiere un énfasis adicional que el contexto no fuerce.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: BDAG
  rationale: Se conserva la forma española usual del nombre propio bíblico. 'Elías' es la equivalencia estable y más inteligible en español contemporáneo.
- source_word: ὁ μέλλων ἔρχεσθαι
  english_pob_choice: who is to come
  chosen_spanish: el que ha de venir
  alternatives_spanish:
  - el que viene
  - el que está por venir
  lexicon: BDAG
  rationale: La construcción articular con participio e infinitivo funciona sustantivamente como 'el que ha de venir'. Esta forma conserva la orientación futura y el eco profético mejor que una versión más inmediata como 'está por venir'.
theological_decisions:
- issue: Identificación de Juan el Bautista con Elías prometido
  english_pob_reading: Render the statement directly as 'he is Elijah who is to come' while preserving Jesus's qualifying clause 'if you are willing to accept it.'
  chosen_spanish_reading: 'Traducir la afirmación de manera directa: ''él es Elías, el que ha de venir'', conservando la cláusula condicional que limita la recepción de la identificación.'
  alternative_spanish_readings:
  - él cumple la función de Elías
  - él es como Elías
  rationale: El griego presenta una identificación directa (αὐτός ἐστιν Ἠλίας), pero la enmarca condicionalmente. La traducción debe mantener esa tensión sin suavizarla a mera semejanza ni resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se detectaron revisiones textuales relevantes que obliguen a cambiar la decisión de traducción. Se conserva la relación entre la condición de recepción y la identificación de Juan con Elías.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'Elías' en lugar de 'Elias' por ser la forma española establecida.
  - '''Ha de venir'' conserva el futuro profético del participio articular sin volverlo demasiado coloquial.'
  - La traducción evita 'Cristo' o 'Mesías' porque el versículo no los contiene.
