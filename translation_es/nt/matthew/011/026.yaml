- from: Sí[a], Padre, porque así agradó[b] delante de ti.
  to: Sí[a], Padre, porque esto fue agradable a tus ojos.
  rationale: Se revisa «porque así agradó delante de ti» a «porque esto fue agradable a tus ojos» para reflejar mejor la decisión auditada de οὕτως como referencia anafórica («esto») y para expresar de manera idiomática en español εὐδοκία ἐγένετο ἔμπροσθέν σου como aprobación/agrado divino. «A tus ojos» transmite con naturalidad el valor de «en tu vista / delante de ti» sin sonar calcado. Se conserva «beneplácito» solo como alternativa de nota, no en el texto principal, para no tecnificar innecesariamente el verso.
