  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión principal afecta μαλακοῖς/μαλακά: conviene apartarse del calco ''suave'' en el texto principal por naturalidad y claridad semántica en español, preservando la literalidad en nota. ''Casas de los reyes'' debe mantenerse en el texto principal, con ''palacios reales'' como alternativa en nota.'
