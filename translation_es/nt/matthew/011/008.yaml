  text: ἀλλὰ τί ἐξήλθατε ἰδεῖν; ἄνθρωπον ἐν ⸀μαλακοῖς ἠμφιεσμένον; ἰδοὺ οἱ τὰ μαλακὰ φοροῦντες ἐν τοῖς οἴκοις τῶν ⸀βασιλέων ⸀εἰσίν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/008.yaml
  text: But what did you go out to see? A man dressed in soft clothes? Look[b][a], those who wear soft clothes are in the houses of kings.
  footnotes:
  - marker: a
    text: Or 'clothed in soft garments' / 'wearing fine clothing.' The Greek literally refers to 'soft things/clothes,' with the sense of delicate or luxurious dress.
    reason: lexical_alternative
  - marker: b
    text: Or 'are in royal palaces.' The Greek reads more literally, 'are in the houses of kings.'
    reason: lexical_alternative
