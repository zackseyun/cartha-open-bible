translation:
  language: es
  text: Pero ¿qué salieron a ver? ¿A un hombre vestido con ropa fina[a]? Miren, los que llevan ropa fina están en las casas de los reyes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vestido con prendas suaves». El griego dice literalmente «con cosas/ropa suave», con el sentido de atuendo delicado o lujoso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «están en los palacios reales». El griego dice más literalmente: «están en las casas de los reyes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Conserva el valor adversativo y suena natural en español al continuar la contraposición retórica de Jesús.
- source_word: τί ἐξήλθατε ἰδεῖν
  english_pob_choice: what did you go out to see
  chosen_spanish: ¿qué salieron a ver?
  alternatives_spanish:
  - ¿qué fueron a ver?
  - ¿qué salieron ustedes a ver?
  lexicon: BDAG
  rationale: Mantiene la pregunta retórica y el sentido idiomático de 'salir a ver', con un orden natural en español.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: Conserva el referente singular masculino del griego y el contexto inmediato sin neutralizar innecesariamente el género.
- source_word: ἐν μαλακοῖς ἠμφιεσμένον
  english_pob_choice: dressed in soft clothes
  chosen_spanish: vestido con ropa suave
  alternatives_spanish:
  - vestido con prendas suaves
  - cubierto con ropa fina
  lexicon: BDAG
  rationale: '''Vestido'' refleja el participio pasivo de ''estar vestido'', y ''ropa suave'' preserva el valor literal de μαλακοῖς sin perder el posible matiz de elegancia o delicadeza que el contexto sugiere.'
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  lexicon: BDAG
  rationale: Expresa el llamado de atención en un español moderno y directo; el plural encaja con la fuerza exhortativa del griego.
- source_word: οἱ τὰ μαλακὰ φοροῦντες
  english_pob_choice: those who wear soft clothes
  chosen_spanish: los que llevan ropa suave
  alternatives_spanish:
  - los que visten ropa fina
  - los que usan prendas suaves
  lexicon: BDAG
  rationale: '''Llevan'' reproduce el sentido habitual de φοροῦντες, y la repetición de ''ropa suave'' mantiene la coherencia léxica con la frase anterior.'
- source_word: ἐν τοῖς οἴκοις τῶν βασιλέων εἰσίν
  english_pob_choice: are in the houses of kings
  chosen_spanish: están en las casas de los reyes
  alternatives_spanish:
  - están en los palacios de los reyes
  - están en casas reales
  lexicon: BDAG
  rationale: '''Casas de los reyes'' conserva de manera más cercana la estructura plural del griego; ''casas'' es una traducción transparente de οἴκοις y evita suavizar el texto con ''palacios'' sin necesidad.'
theological_decisions:
- issue: Mantenimiento del contraste retórico sobre el tipo de persona buscada en el desierto
  english_pob_reading: Jesus contrasts a man dressed in soft clothes with those who belong in royal houses.
  chosen_spanish_reading: Jesús contrasta a un hombre vestido con ropa suave con quienes pertenecen a las casas de los reyes.
  alternative_spanish_readings:
  - Jesús contrasta a un hombre vestido con ropa fina con quienes están en palacios reales.
  - Jesús contrasta a un hombre delicadamente vestido con los de la corte.
  rationale: No hay una carga doctrinal directa, pero sí una tensión lexical entre literalidad y connotación social. Se preserva el contraste sin domesticarlo, manteniendo la fuerza implícita de lujo o refinamiento.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de SBLGNT y el auditoría en inglés. No hubo revisiones aplicadas en la fuente inglesa; por eso la redacción española conserva la misma estructura retórica y las mismas dos notas léxicas sobre μαλακοῖς/μαλακὰ y οἴκοις τῶν βασιλέων.
  spanish_consistency_notes:
  - Se usó 'Miren' para ἰδοὺ para mantener el tono exhortativo y evitar arcaísmos.
  - Se mantuvo la duplicación semántica 'ropa suave' para μαλακοῖς / μαλακὰ a fin de reflejar la repetición del griego.
  - '''Casas de los reyes'' conserva el plural del original y queda como opción principal; ''palacios'' queda en nota como alternativa interpretativa.'
  - La puntuación en forma de preguntas ayuda a reproducir la secuencia retórica del griego.
