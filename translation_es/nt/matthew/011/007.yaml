translation:
  language: es
  text: 'Mientras ellos se iban, Jesús comenzó a hablar a las multitudes acerca de Juan: «¿Qué salieron a ver al desierto: una caña sacudida por el viento[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de una caña sacudida por el viento sugiere inestabilidad o vacilación; la pregunta de Jesús espera una respuesta negativa respecto de Juan.
    reason: cultural_note
lexical_decisions:
- source_word: Τούτων δὲ πορευομένων
  english_pob_choice: As these men were going away
  chosen_spanish: Mientras estos se iban
  alternatives_spanish:
  - Cuando estos se iban
  - Mientras ellos se alejaban
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción contemporánea; en español, «mientras» conserva bien la simultaneidad. No se explicita «hombres» porque el contexto inmediato ya identifica a los discípulos de Juan, y «estos» mantiene la referencia sin añadir material léxico innecesario.
- source_word: ἤρξατο ... λέγειν
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a decir
  - comenzó a decir
  lexicon: BDAG
  rationale: La construcción con ἄρχομαι + infinitivo se rinde naturalmente con «comenzó a». «Hablar» funciona mejor que «decir» en un discurso dirigido a la multitud, sin perder la fuerza del inicio de la intervención.
- source_word: τοῖς ὄχλοις
  english_pob_choice: to the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a la multitud
  - a las gentes
  lexicon: BDAG
  rationale: El plural del griego se refleja mejor con «las multitudes». «Multitud» en singular suaviza la pluralidad del original.
- source_word: περὶ Ἰωάννου
  english_pob_choice: about John
  chosen_spanish: acerca de Juan
  alternatives_spanish:
  - sobre Juan
  - con respecto a Juan
  lexicon: BDAG
  rationale: περί con genitivo expresa tema; «acerca de» es una equivalencia natural y precisa en español actual.
- source_word: Τί ἐξήλθατε εἰς τὴν ἔρημον θεάσασθαι;
  english_pob_choice: What did you go out into the wilderness to see?
  chosen_spanish: ¿Qué salieron a ver al desierto?
  alternatives_spanish:
  - ¿Qué fueron a ver al desierto?
  - ¿Qué salieron a contemplar al desierto?
  lexicon: BDAG
  rationale: τί pide «qué», no «por qué». θεάομαι puede significar ver/observar; «ver» es la opción más directa y fiel, y evita una paráfrasis excesiva. «Al desierto» comunica el destino y mantiene el valor geográfico de ἔρημος.
- source_word: κάλαμον
  english_pob_choice: a reed
  chosen_spanish: una caña
  alternatives_spanish:
  - un junco
  - una carriza
  lexicon: BDAG
  rationale: En español, «caña» transmite de forma clara la imagen de un tallo flexible semejante a una reed. «Junco» también sería posible, pero «caña» es más amplio y comprensible para lectores generales.
- source_word: ὑπὸ ἀνέμου σαλευόμενον
  english_pob_choice: shaken by the wind
  chosen_spanish: sacudida por el viento
  alternatives_spanish:
  - agitada por el viento
  - movida por el viento
  lexicon: BDAG
  rationale: El participio pasivo expresa una acción sufrida; «sacudida» preserva bien la idea de inestabilidad. El femenino concuerda con «caña».
theological_decisions:
- issue: Imagen retórica de la caña sacudida por el viento
  english_pob_reading: The image of a reed shaken by the wind suggests instability or vacillation; Jesus' question expects a negative answer about John.
  chosen_spanish_reading: La imagen de la caña sacudida por el viento sugiere inestabilidad o vacilación; la pregunta de Jesús espera una respuesta negativa respecto de Juan.
  alternative_spanish_readings:
  - La imagen apunta a alguien débil o cambiante.
  - Jesús da a entender que Juan no era una caña movida por cualquier soplo.
  rationale: 'La imagen es retórica y no solo descriptiva. Conviene explicarla en nota para conservar la fuerza implícita del rechazo: Juan no era alguien inconstante ni fácilmente arrastrado.'
  doctrine_reference: Principio POB de conservar el efecto retórico y el matiz contextual sin sobreexplicar en el texto principal.
translation_notes:
  revision_awareness: 'La última revisión en inglés simplificó «being shaken» a «shaken» y cambió «look at» por «see» por naturalidad. En español se optó desde el inicio por una forma natural y directa: «salieron a ver», y por un participio adjetival «sacudida» que conserva el valor pasivo del griego sin sonar forzado.'
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo del griego: circunstancia temporal, inicio del discurso, destinatarios y pregunta retórica.'
  - Se evita «Señor» o «Cristo» porque el texto nombra a Jesús directamente.
  - «Caña» se usa para la imagen vegetal breve y retórica; no se amplía a una explicación en el cuerpo del texto.
  - El marcador de nota [a] aparece exactamente en el punto de la imagen retórica y no se reutiliza.
