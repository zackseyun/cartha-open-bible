revisions:
- from: 'Mientras estos se iban, Jesús comenzó a hablar a las multitudes acerca de Juan: «¿Qué salieron a ver al desierto? ¿Una caña sacudida por el viento[a]?».'
  to: 'Mientras ellos se iban, Jesús comenzó a hablar a las multitudes acerca de Juan: «¿Qué salieron a ver al desierto: una caña sacudida por el viento[a]?».'
  rationale: Se ajusta el pronombre a una forma más natural en español ('ellos') sin perder la referencia contextual a los discípulos de Juan. También se reestructura la pregunta retórica en una sola unidad con dos puntos, que suena más idiomática y conserva mejor la fuerza del original. La nota cultural se mantiene sin cambios, correctamente anclada en la imagen de la caña.
