  text: τυφλοὶ ἀναβλέπουσιν καὶ χωλοὶ περιπατοῦσιν, λεπροὶ καθαρίζονται καὶ κωφοὶ ἀκούουσιν, ⸀καὶ νεκροὶ ἐγείρονται καὶ πτωχοὶ εὐαγγελίζονται·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/005.yaml
  text: The blind receive sight and the lame walk[a], lepers are cleansed and the deaf hear[b], and the dead are raised and the poor have good news proclaimed to them.
  footnotes:
  - marker: a
    text: 'Or, ''have the gospel preached to them.'' The Greek verb is passive: ''are brought good news.'''
    reason: lexical_alternative
  - marker: b
    text: This list echoes Isaiah 35:5–6 and 61:1, presenting signs associated with the Messiah’s work.
    reason: cross_reference
