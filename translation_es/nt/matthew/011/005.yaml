review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del griego: los ciegos reciben vista, los cojos andan, los leprosos son restaurados, los sordos oyen, los muertos son levantados y a los pobres se les anuncia la buena noticia. Sin embargo, necesita un ajuste menor para alinear mejor καθαρίζονται con su sentido de limpieza/purificación y para mejorar la nota sobre εὐαγγελίζονται.'
  spanish_quality_summary: El español es claro y natural en general. «Los ciegos reciben la vista», «los sordos oyen» y «a los pobres se les anuncia la buena noticia» funcionan bien. «Son limpiados» suena menos idiomático en este contexto bíblico que «son purificados», que además preserva mejor la dimensión ritual. La nota actual con «son objeto de la buena noticia» resulta poco natural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección «buena noticia» para εὐαγγελίζονται sigue la racionalidad documentada y evita tecnicismo eclesiástico en el texto principal. «Resucitados» para ἐγείρονται es apropiado en contexto. El principal ajuste recomendado es «purificados» para καθαρίζονται.
  issues:
  - severity: medium
    issue: «los leprosos son limpiados» es poco idiomático y algo débil para καθαρίζονται
    rationale: El verbo griego en este contexto de lepra incluye restauración cultual/ritual además de sanidad física. En español bíblico y natural, «son purificados» transmite mejor ese campo semántico que «son limpiados».
  - severity: low
    issue: La nota al pie dice «son objeto de la buena noticia»
    rationale: Aunque intenta explicar el pasivo de εὐαγγελίζονται, la frase es extraña en español y no expresa con claridad que los pobres son destinatarios del anuncio. Conviene reformularla como «reciben el anuncio de la buena noticia» o equivalente.
  revised_spanish_text: Los ciegos reciben la vista y los cojos andan, los leprosos son purificados y los sordos oyen, y los muertos son resucitados y a los pobres se les anuncia la buena noticia[a].
  revised_footnotes:
  - marker: a
    text: 'O: «se les predica el evangelio». El verbo griego está en pasivo: «reciben el anuncio de la buena noticia».'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor: «son purificados» mejora la fidelidad léxica y la naturalidad de καθαρίζονται; la nota se ajusta para explicar el pasivo de εὐαγγελίζονται en un español claro sin cambiar la decisión principal del texto.'
