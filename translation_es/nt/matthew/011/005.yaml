translation:
  language: es
  text: Los ciegos reciben la vista y los cojos andan, los leprosos son purificados y los sordos oyen, y los muertos son resucitados y a los pobres se les anuncia la buena noticia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se les predica el evangelio». El verbo griego está en pasivo: «reciben el anuncio de la buena noticia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τυφλοὶ
  english_pob_choice: the blind
  chosen_spanish: los ciegos
  alternatives_spanish:
  - personas ciegas
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refiere a personas ciegas como grupo. «Los ciegos» es breve, natural en español y conserva ese valor colectivo.
- source_word: ἀναβλέπουσιν
  english_pob_choice: receive sight
  chosen_spanish: reciben la vista
  alternatives_spanish:
  - ven de nuevo
  - vuelven a ver
  lexicon: BDAG
  rationale: En contexto de sanidad, el verbo expresa recobrar la visión. «Reciben la vista» comunica bien la acción pasiva/resultado sin sonar mecánico.
- source_word: χωλοὶ
  english_pob_choice: the lame
  chosen_spanish: los cojos
  alternatives_spanish:
  - los lisiados
  - personas cojas
  lexicon: BDAG
  rationale: Es el equivalente más directo del grupo descrito como incapaz de andar normalmente. Se evita un rodeo que diluya la concisión del catálogo.
- source_word: περιπατοῦσιν
  english_pob_choice: walk
  chosen_spanish: andan
  alternatives_spanish:
  - caminan
  lexicon: BDAG
  rationale: «Andan» reproduce con naturalidad el verbo de movimiento continuo y mantiene el ritmo breve de la lista.
- source_word: λεπροὶ
  english_pob_choice: lepers
  chosen_spanish: los leprosos
  alternatives_spanish:
  - personas con lepra
  - los leprosos
  lexicon: BDAG
  rationale: La forma tradicional y concisa es la más fiel al sustantivo adjetival en este contexto de milagros. En español conserva el referente bíblico habitual.
- source_word: καθαρίζονται
  english_pob_choice: are cleansed
  chosen_spanish: son limpiados
  alternatives_spanish:
  - son purificados
  - son sanados
  lexicon: BDAG
  rationale: Se preserva la idea de limpieza/restauración ritual y física. «Limpiados» refleja el campo semántico sin reducirlo solo a curación médica.
- source_word: κωφοὶ
  english_pob_choice: the deaf
  chosen_spanish: los sordos
  alternatives_spanish:
  - los mudos
  - personas sordas
  lexicon: BDAG
  rationale: Aquí el contexto con ἀκούουσιν fija el sentido como «sordos». Se evita «mudos» porque no corresponde al paralelo inmediato.
- source_word: ἀκούουσιν
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  lexicon: BDAG
  rationale: El presente simple en español reproduce la serie de acciones restauradas con la misma concisión del griego.
- source_word: νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  lexicon: BDAG
  rationale: «Los muertos» es el equivalente idiomático y solemne para el adjetivo sustantivado.
- source_word: ἐγείρονται
  english_pob_choice: are raised
  chosen_spanish: son resucitados
  alternatives_spanish:
  - son levantados
  - despiertan
  lexicon: BDAG
  rationale: En este contexto de milagro, el pasivo expresa acción divina sobre los muertos. «Resucitados» comunica mejor el sentido teológico que un simple «levantados».
- source_word: πτωχοὶ
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - personas pobres
  lexicon: BDAG
  rationale: La expresión es la forma natural y bíblicamente reconocible en español, preservando la resonancia isaiana.
- source_word: εὐαγγελίζονται
  english_pob_choice: have good news proclaimed to them
  chosen_spanish: se les anuncia la buena noticia
  alternatives_spanish:
  - se les predica el evangelio
  - reciben la buena noticia
  lexicon: BDAG
  rationale: 'Se conserva la voz pasiva en sentido de receptor: los pobres reciben el anuncio. «Buena noticia» mantiene el valor básico de εὐαγγέλιον sin imponer tecnicismo eclesial en el texto principal.'
theological_decisions:
- issue: Relación entre εὐαγγελίζονται y lenguaje de evangelio
  english_pob_reading: have good news proclaimed to them
  chosen_spanish_reading: se les anuncia la buena noticia
  alternative_spanish_readings:
  - se les predica el evangelio
  - son evangelizados
  rationale: 'La forma pasiva importa: los pobres son destinatarios del anuncio. «Se les anuncia la buena noticia» conserva ese valor y evita que el verbo suene a jerga eclesiástica moderna.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Lista de señales como eco mesiánico de Isaías sin añadir comentario interpretativo
  english_pob_reading: Retain the straightforward miracle statements without adding explicit fulfillment language
  chosen_spanish_reading: Mantener las afirmaciones milagrosas directas sin añadir una glosa explícita de cumplimiento
  alternative_spanish_readings:
  - Estas señales cumplen a Isaías
  - como cumplimiento de Isaías
  rationale: El griego presenta la serie de obras, no una explicación editorial. La traducción conserva la resonancia mesiánica sin convertir el versículo en comentario.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el último pase quedó sin cambios y con acuerdo alto en la revisión cruzada. Esta versión española sigue esa lectura estable sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «buena noticia» para εὐαγγελίζονται, en coherencia con el valor léxico del evangelio y con el pasivo del griego.
  - Se conserva la serie breve de cláusulas coordinadas para reflejar el catálogo de señales.
  - «Ciegos/cojos/leprosos/sordos/muertos/pobres» se usa como adjetivo sustantivado, siguiendo la concisión del original.
  - «Son limpiados» retiene la ambivalencia ritual y física de καθαρίζονται mejor que un simple «son sanados».
