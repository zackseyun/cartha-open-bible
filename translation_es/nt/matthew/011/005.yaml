revisions:
- from: Los ciegos reciben la vista y los cojos andan, los leprosos son limpiados y los sordos oyen, y los muertos son resucitados y a los pobres se les anuncia la buena noticia[a].
  to: Los ciegos reciben la vista y los cojos andan, los leprosos son purificados y los sordos oyen, y los muertos son resucitados y a los pobres se les anuncia la buena noticia[a].
  rationale: 'Se hace una reparación menor: «son purificados» mejora la fidelidad léxica y la naturalidad de καθαρίζονται; la nota se ajusta para explicar el pasivo de εὐαγγελίζονται en un español claro sin cambiar la decisión principal del texto.'
