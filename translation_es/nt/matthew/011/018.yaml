translation:
  language: es
  text: 'Porque Juan vino sin comer ni beber, y dicen: «Tiene un demonio[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Está endemoniado». El griego dice literalmente: «tiene un demonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  - llegó
  - apareció
  lexicon: BDAG
  rationale: En este contexto, ἦλθεν indica la llegada/aparición pública de Juan. «Vino» conserva el valor verbal de movimiento/arribo y suena natural en español bíblico sin añadir matices que no están en el griego.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación de la afirmación anterior. «Porque» expresa bien esa relación causal o explicativa en español natural.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰωάννης.
- source_word: μήτε ἐσθίων μήτε πίνων
  english_pob_choice: neither eating nor drinking
  chosen_spanish: ni comiendo ni bebiendo
  alternatives_spanish:
  - ni comiendo ni bebiendo
  - sin comer ni beber
  - sin comer ni beber en la forma ordinaria
  lexicon: BDAG
  rationale: La construcción participial con μήτε...μήτε describe el modo ascético de Juan. «Ni comiendo ni bebiendo» preserva la concisión del griego sin importar detalles ajenos como pan o vino, que no están en este versículo.
- source_word: καὶ λέγουσιν
  english_pob_choice: and they say
  chosen_spanish: y dicen
  alternatives_spanish:
  - y dicen
  - y la gente dice
  - y ellos dicen
  lexicon: BDAG
  rationale: El presente generaliza una acusación repetida. En español, «dicen» comunica bien ese valor indefinido; el sujeto implícito puede mantenerse como en el griego.
- source_word: Δαιμόνιον ἔχει
  english_pob_choice: He has a demon
  chosen_spanish: Tiene un demonio
  alternatives_spanish:
  - Tiene un demonio
  - Está endemoniado
  - Está poseído por un demonio
  lexicon: BDAG
  rationale: El griego es literalmente «tiene un demonio». «Tiene un demonio» respeta la formulación fuente y evita traducir de forma interpretativa una acusación que el texto simplemente reporta. En español, «endemoniado» o «poseído» sería más explicativo, pero menos cercano al griego.
theological_decisions:
- issue: Representación de la acusación contra Juan con δαιμόνιον
  english_pob_reading: He has a demon
  chosen_spanish_reading: Tiene un demonio
  alternative_spanish_readings:
  - Está endemoniado
  - Está poseído por un demonio
  rationale: La frase pertenece al discurso de los acusadores, no a una afirmación narrativa. Mantener la estructura literal conserva la tensión del texto y la distancia entre la acusación y la voz del evangelista.
  doctrine_reference: Principio de primacía del texto original y preservación de la tensión lexical sin suavizarla interpretativamente
translation_notes:
  revision_awareness: 'El inglés POB mantiene la expresión literal «He has a demon» y añade una nota con la alternativa interpretativa «He is demon-possessed». La versión española sigue la misma estrategia: conserva la literalidad en el texto principal y ofrece la alternativa interpretativa en nota.'
  spanish_consistency_notes:
  - Se mantiene «Juan» como nombre propio estándar.
  - Se conserva el presente general «dicen» para reflejar el valor gnómico/generalizador del griego.
  - Se evita introducir pan o vino, pues no aparecen en este versículo.
  - Se usa «demonio» y no «diablo», porque δαιμόνιον no corresponde a διάβολος.
