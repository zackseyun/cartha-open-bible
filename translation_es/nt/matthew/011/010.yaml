translation:
  language: es
  text: 'Este es aquel de quien está escrito: «He aquí[a], yo envío a mi mensajero delante de tu rostro, el cual preparará tu camino delante de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «delante de ti» para «delante de tu rostro». El griego conserva una expresión más concreta de la cita bíblica.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτός
  english_pob_choice: This is he
  chosen_spanish: Este es el que
  alternatives_spanish:
  - Este es él
  - Este es el hombre
  lexicon: BDAG
  rationale: El demostrativo introduce una identificación enfática. «Este es el que» conserva bien el valor identificador del griego sin sonar rígido en español. «Este es él» sería posible, pero menos natural en esta estructura.
- source_word: περὶ οὗ
  english_pob_choice: about whom
  chosen_spanish: acerca de él
  alternatives_spanish:
  - acerca de quien
  - de quien
  lexicon: BDAG
  rationale: La preposición περί con genitivo expresa referencia o asunto. «Acerca de él» es natural en español y mantiene la referencia a la persona identificada. «De quien» también es posible, pero puede sonar menos explícito en el encadenamiento de la cita.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: fue escrito
  alternatives_spanish:
  - está escrito
  - ha sido escrito
  lexicon: BDAG
  rationale: La fórmula cita la Escritura como texto ya consignado. «Fue escrito» comunica bien el hecho de una escritura previa; en español bíblico también sería posible «está escrito», pero aquí se preserva la referencia a la escritura como acto ya realizado y vigente en la cita.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: BDAG
  rationale: La interjección profética requiere una forma natural en español. «Mira» conserva el llamado de atención del griego. «He aquí» sería más tradicional, pero menos natural en español moderno.
- source_word: ἀποστέλλω
  english_pob_choice: I am sending
  chosen_spanish: yo envío
  alternatives_spanish:
  - estoy enviando
  - envío
  lexicon: BDAG
  rationale: El presente tiene fuerza citacional y anunciativa. «Yo envío» mantiene la vivacidad y la solemnidad del original sin añadir una perífrasis que en español resultaría menos directa.
- source_word: ἄγγελόν
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  lexicon: BDAG
  rationale: En este contexto el referente es humano, no celestial. «Mensajero» preserva el sentido contextual de ἄγγελος y evita introducir la lectura de un ser angélico.
- source_word: πρὸ προσώπου σου
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - delante de ti
  - ante tu presencia
  lexicon: BDAG
  rationale: 'El griego conserva una imagen concreta: literalmente, «ante tu rostro». «Delante de tu rostro» mantiene esa concreción y refleja el valor auditado por la POB inglesa. «Delante de ti» sería más idiomático, pero perdería la imagen explícita.'
- source_word: κατασκευάσει
  english_pob_choice: will prepare
  chosen_spanish: preparará
  alternatives_spanish:
  - hará preparar
  - dejará listo
  lexicon: BDAG
  rationale: El verbo expresa preparar o dejar listo. «Preparará» es la correspondencia directa y natural en español para la acción futura anunciada.
- source_word: τὴν ὁδόν σου
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu ruta
  lexicon: BDAG
  rationale: ὁδός puede significar camino, ruta o senda. «Tu camino» conserva la imaginería bíblica y es natural en español, al mismo tiempo que permite el matiz metafórico de la preparación de la trayectoria/obra del destinatario.
- source_word: ἔμπροσθέν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: BDAG
  rationale: La expresión indica posición anterior o al frente. «Delante de ti» es idiomática y mantiene la segunda preposición de la cita, que refuerza el paralelismo con «delante de tu rostro».
theological_decisions:
- issue: Conservar la doble expresión preposicional de la cita
  english_pob_reading: Retained both 'before your face' and 'before you' in the main text
  chosen_spanish_reading: Conservé «delante de tu rostro» y «delante de ti»
  alternative_spanish_readings:
  - Reducir ambas a «delante de ti»
  - suavizar a «antes de ti»
  rationale: 'El griego presenta dos frases preposicionales distintas: πρὸ προσώπου σου y ἔμπροσθέν σου. Mantener ambas en español preserva la textura formal y la intensificación retórica de la cita bíblica, en lugar de nivelarla.'
  doctrine_reference: Principios POB de equivalencia óptima y respeto por la forma del texto fuente
- issue: Referencia del mensajero a una persona humana
  english_pob_reading: messenger rather than angel
  chosen_spanish_reading: mensajero, no ángel
  alternative_spanish_readings:
  - ángel
  - mensajero/ángel
  rationale: El contexto identifica al precursor humano de Jesús. Traducir ἄγγελος como «mensajero» evita una lectura angelológica no apoyada por el contexto y coincide con la decisión auditada de la POB inglesa.
  doctrine_reference: BDAG; coherencia contextual del relato de Mateo
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la decisión auditada de la POB inglesa: conserva la cita formal, el doble paralelismo preposicional, y el valor contextual de ἄγγελος como «mensajero». Se adapta la interjección profética a un español moderno y reverente, y se mantiene la imaginería concreta del «rostro» con una nota que reconoce la alternativa más idiomática.'
  spanish_consistency_notes:
  - Se usa «mensajero» para ἄγγελος en sentido humano contextual.
  - Se usa «tu rostro» para reflejar la concreción del griego, no como equivalente obligatorio de «ti».
  - 'Se mantiene el tiempo futuro en la segunda mitad de la cita: «preparará».'
  - Se conserva una puntuación de cita solemne compatible con el registro bíblico español.
