translation:
  language: es
  text: Vengan[a] a mí, todos los que trabajan y están cargados, y yo les daré descanso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vengan aquí» o «vengan ahora». El imperativo griego es una invitación directa plural; en español «vengan» conserva ese tono inmediato y acogedor.
    reason: lexical_alternative
  - marker: b
    text: O «los refrescaré». El verbo puede significar dar descanso o refrescar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan aquí
  - Vengan ahora
  lexicon: BDAG
  rationale: 'El imperativo de invitación es plural en griego y en español suena natural como exhortación directa: "Vengan" conserva el tono inmediato y acogedor sin añadir contenido.'
- source_word: πρός με
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: BDAG
  rationale: Con un verbo de movimiento, la preposición expresa dirección hacia la persona. "A mí" es la forma más natural y fiel en español.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ustedes
  - todo el que
  lexicon: BDAG
  rationale: Mantiene el alcance inclusivo de la invitación sin restringirlo ni intensificarlo más de lo que hace el griego.
- source_word: οἱ κοπιῶντες
  english_pob_choice: who labor
  chosen_spanish: los que trabajan
  alternatives_spanish:
  - los que se fatigan
  - los que se afanan
  lexicon: BDAG
  rationale: El participio presenta a personas en actividad de esfuerzo. "Los que trabajan" comunica ese sentido de labor/toil de manera clara y digna en español, aunque no agota la posible idea de cansancio implícita.
- source_word: πεφορτισμένοι
  english_pob_choice: are burdened
  chosen_spanish: están cargados
  alternatives_spanish:
  - están agobiados
  - han sido cargados
  lexicon: BDAG
  rationale: El participio perfecto pasivo señala un estado presente resultante de haber sido cargados o agobiados. "Están cargados" conserva esa condición sin resolverla demasiado hacia una sola imagen interpretativa.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y yo mismo
  lexicon: BDAG
  rationale: Preserva el sujeto explícito y el leve énfasis del griego sin exagerarlo.
- source_word: ἀναπαύσω
  english_pob_choice: will give you rest
  chosen_spanish: les daré descanso
  alternatives_spanish:
  - los haré descansar
  - los refrescaré
  lexicon: BDAG
  rationale: El verbo puede significar causar descanso o refrescar. "Les daré descanso" es natural en español y mantiene el alcance amplio de la promesa, sin reducirla a un sentido únicamente emocional o físico.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ustedes
  lexicon: BDAG
  rationale: El complemento indirecto plural en español queda bien expresado por "les" en esta construcción con "dar descanso".
theological_decisions:
- issue: Alcance del descanso prometido en ἀναπαύσω
  english_pob_reading: Render broadly as 'I will give you rest' without specifying whether the rest is spiritual, eschatological, emotional, or physical.
  chosen_spanish_reading: Traducir ampliamente como "les daré descanso" sin precisar si se trata de descanso espiritual, escatológico, emocional o físico.
  alternative_spanish_readings:
  - les daré alivio
  - los haré descansar
  - les daré descanso a sus almas
  rationale: El versículo promete descanso de forma amplia; el español debe conservar esa amplitud y no cerrar el sentido con una interpretación doctrinal más específica que el texto inmediato no exige.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Revisión más reciente sin cambios necesarios; el borrador español se alinea con el texto griego y con la lectura inglesa auditada, manteniendo el alcance amplio de la invitación y de la promesa de descanso.
  spanish_consistency_notes:
  - Se mantiene un español neutral y digno, apto para lectura eclesial amplia.
  - '"Les daré descanso" preserva la ambigüedad amplia de ἀναπαύσω, como en el audit trail inglés.'
  - '"Cargados" conserva la imagen pasiva del participio perfecto sin forzar una paráfrasis más interpretativa.'
