    text: Or 'are heavy laden.' The Greek perfect passive participle conveys those who have been loaded down and remain in that condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will refresh you.' The verb can mean to cause someone to rest or to refresh them.
    reason: lexical_alternative
