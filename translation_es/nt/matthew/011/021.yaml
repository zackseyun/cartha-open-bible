  to: ¡Ay de ustedes[a], Corazín! ¡Ay de ustedes, Betsaida! Porque si en Tiro y en Sidón hubieran ocurrido las obras poderosas[b] que ocurrieron entre ustedes, ya se habrían arrepentido hace mucho en cilicio y ceniza.
  rationale: 'Se hizo un ajuste menor para mejorar la naturalidad y precisión del español sin cambiar el sentido: «hubieran ocurrido … que ocurrieron» refleja mejor ἐγένοντο … αἱ γενόμεναι con «obras poderosas»; «ya se habrían arrepentido hace mucho» suena más idiomático para πάλαι; y se eliminó una coma innecesaria antes de la frase final.'
