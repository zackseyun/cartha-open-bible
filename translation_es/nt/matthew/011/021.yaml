translation:
  language: es
  text: ¡Ay de ustedes[a], Corazín! ¡Ay de ustedes, Betsaida! Porque si en Tiro y en Sidón hubieran ocurrido las obras poderosas[b] que ocurrieron entre ustedes, ya se habrían arrepentido hace mucho en cilicio y ceniza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «¡Ay!»; el griego οὐαί expresa lamento profético y anuncio de juicio.
    reason: lexical_alternative
  - marker: b
    text: O «milagros»; el griego dice «obras poderosas» o «obras de poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes!
  lexicon: BDAG
  rationale: En español, «¡Ay de…!» conserva bien el tono profético de lamento y juicio de οὐαί. «¡Ay!» solo puede sonar más exclamativo y menos dirigido; por eso se integra la fórmula con el destinatario.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: ustedes
  alternatives_spanish:
  - a ti
  - a ustedes
  lexicon: BDAG
  rationale: El contexto tiene dos ciudades tratadas como colectivos; por eso el plural «ustedes» comunica mejor la dirección del reproche que un singular literal.
- source_word: Χοραζίν
  english_pob_choice: Chorazin
  chosen_spanish: Corazín
  alternatives_spanish:
  - Chorazín
  lexicon: transliteration
  rationale: Se conserva el nombre propio en transliteración española habitual. «Corazín» es la forma más reconocible y natural en español bíblico.
- source_word: Βηθσαϊδά
  english_pob_choice: Bethsaida
  chosen_spanish: Betsaida
  alternatives_spanish:
  - Bethsaida
  lexicon: transliteration
  rationale: Nombre propio transliterado según el uso español estándar, manteniendo la referencia geográfica sin adaptar el sentido.
- source_word: αἱ δυνάμεις
  english_pob_choice: the mighty works
  chosen_spanish: las obras poderosas
  alternatives_spanish:
  - los milagros
  - las obras de poder
  lexicon: BDAG
  rationale: «δυνάμεις» puede referirse a hechos poderosos o milagros. Se evita fijarlo solo como «milagros» para conservar la amplitud léxica documentada por el POB inglés; «obras poderosas» sigue de cerca la fuerza del griego.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  lexicon: BDAG
  rationale: Para ciudades y sus habitantes, «entre ustedes» expresa mejor eventos ocurridos en su medio que un «en ustedes» más literal pero menos natural.
- source_word: ἐγένοντο ... αἱ γενόμεναι
  english_pob_choice: had taken place ... done
  chosen_spanish: se hubieran hecho ... que se hicieron
  alternatives_spanish:
  - hubieran ocurrido ... que ocurrieron
  - se hubieran realizado ... que se realizaron
  lexicon: BDAG
  rationale: Se mantiene el contraste contrafactual con una repetición clara de la raíz verbal en español. «Hacer(se)» aquí puede funcionar para obras/actos realizados, sin perder la referencia a hechos poderosos.
- source_word: πάλαι
  english_pob_choice: long ago
  chosen_spanish: hace mucho
  alternatives_spanish:
  - desde hace mucho
  - ya hace mucho
  lexicon: BDAG
  rationale: «Hace mucho» comunica la anterioridad temporal de manera natural en español y evita una redundancia artificial.
- source_word: ἐν σάκκῳ καὶ σποδῷ
  english_pob_choice: in sackcloth and ashes
  chosen_spanish: en cilicio y ceniza
  alternatives_spanish:
  - con cilicio y ceniza
  - en saco y ceniza
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica tradicional, pero con «cilicio» para el término culturalmente más claro en español. La preposición «en» reproduce la fórmula establecida del texto.
- source_word: μετενόησαν
  english_pob_choice: would have repented
  chosen_spanish: se habrían arrepentido
  alternatives_spanish:
  - habrían cambiado de mente
  - se habrían vuelto
  lexicon: BDAG
  rationale: En este contexto de respuesta moral y espiritual, «arrepentirse» es la equivalencia española más fiel y natural para μετανοέω. Otras opciones atenúan o desplazan el sentido penitencial.
theological_decisions:
- issue: Valor de comparación entre Tiro/Sidón y las ciudades galileas
  english_pob_reading: A genuine statement of greater culpability for towns that witnessed Jesus' mighty works yet did not repent.
  chosen_spanish_reading: Una afirmación real de mayor culpabilidad para ciudades que vieron las obras poderosas de Jesús y no se arrepintieron.
  alternative_spanish_readings:
  - Una exageración meramente retórica sin comparación moral real
  - Una simple hipérbole sin implicación de juicio
  rationale: El español conserva la estructura contrafactual y el contraste moral del griego. No se suaviza el juicio ni se interpreta el pasaje como mera exageración retórica, porque el texto presenta una comparación con peso evaluativo.
  doctrine_reference: Preservar la tensión teológica y el tono de juicio del pasaje sin resolverlo artificialmente.
translation_notes:
  revision_awareness: La versión española sigue la revisión final del POB inglés al usar «se habrían arrepentido» en lugar de una paráfrasis cognitiva como «habrían cambiado de pensamiento». También conserva la distinción entre el valor amplio de δυνάμεις y la opción más restringida «milagros», dejando esa alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; no aplica en este versículo.
  - Se usa «arrepentirse» para μετενόησαν conforme al contexto de juicio y respuesta moral.
  - Los nombres propios se transliteran en formas españolas habituales.
  - La preposición «entre ustedes» preserva el sentido colectivo de la referencia a las ciudades.
  - La puntuación sigue la cadencia profética con exclamaciones dobles y una oración causal introducida por «Porque».
