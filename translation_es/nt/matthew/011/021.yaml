review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: doble «¡Ay de ustedes!», condicional contrafáctica, referencia a Tiro y Sidón, obras de poder, arrepentimiento y la imagen de cilicio/ceniza. Sin embargo, «se hubieran hecho las obras poderosas» suena menos natural y menos preciso que una formulación de ocurrencia/suceso para ἐγένοντο … αἱ γενόμεναι. Además, «hace mucho que se habrían arrepentido» es comprensible, pero «ya se habrían arrepentido hace mucho» suena más idiomático en español bíblico-natural y mantiene mejor el valor de πάλαι.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero necesita un pulido menor de naturalidad. «Obras poderosas» es defendible y está bien apoyado por la nota, aunque en español la secuencia verbal con «se hubieran hecho» resulta algo pesada. También conviene quitar la coma antes de «en cilicio y ceniza» para una lectura más fluida. El resto de nombres propios, tono profético y registro son adecuados.
  glossary_alignment: No hay conflicto con la terminología del proyecto. μετανοέω está bien como «arrepentirse». δυνάμεις se conserva con amplitud léxica mediante «obras poderosas» y una nota con «milagros». No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de «cilicio y ceniza» es aceptable en español e inteligible.
  issues:
  - severity: medium
    issue: Secuencia verbal poco natural en «si en Tiro y en Sidón se hubieran hecho las obras poderosas…»
    rationale: El griego usa γίνομαι para hechos que tuvieron lugar/ocurrieron. En español, con «obras poderosas», «hubieran ocurrido» o «hubieran tenido lugar» suena más natural que «se hubieran hecho», que puede sugerir un agente explícito y una construcción algo forzada.
  - severity: low
    issue: Orden temporal mejorable en «hace mucho que se habrían arrepentido»
    rationale: La frase se entiende, pero «ya se habrían arrepentido hace mucho» representa con más naturalidad el contrafáctico con πάλαι y evita una ligera rigidez.
  - severity: low
    issue: Coma innecesaria antes de «en cilicio y ceniza»
    rationale: La frase preposicional modifica directamente «se habrían arrepentido» y fluye mejor sin pausa.
  revised_spanish_text: ¡Ay de ustedes[a], Corazín! ¡Ay de ustedes, Betsaida! Porque si en Tiro y en Sidón hubieran ocurrido las obras poderosas[b] que ocurrieron entre ustedes, ya se habrían arrepentido hace mucho en cilicio y ceniza.
  revised_footnotes:
  - marker: a
    text: También puede traducirse «¡Ay!»; el griego οὐαί expresa lamento profético y anuncio de juicio.
    reason: lexical_alternative
  - marker: b
    text: O «milagros»; el griego dice «obras poderosas» o «obras de poder».
    reason: lexical_alternative
  revision_rationale: 'Se hizo un ajuste menor para mejorar la naturalidad y precisión del español sin cambiar el sentido: «hubieran ocurrido … que ocurrieron» refleja mejor ἐγένοντο … αἱ γενόμεναι con «obras poderosas»; «ya se habrían arrepentido hace mucho» suena más idiomático para πάλαι; y se eliminó una coma innecesaria antes de la frase final.'
