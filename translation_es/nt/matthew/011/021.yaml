base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/021.yaml
  text: Woe to you[a], Chorazin! Woe to you, Bethsaida! For if the mighty works done among you had taken place in Tyre and Sidon, they would have repented long ago in sackcloth and ashes.
