translation:
  language: es
  text: Pero les digo que le será más tolerable a la tierra de Sodoma en el día del juicio que a ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más soportable».
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Funciona aquí como transición adversativa fuerte que introduce el contraste solemne; «Pero» es la equivalencia natural y clara en español.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les afirmo
  - les digo a ustedes
  lexicon: BDAG
  rationale: La fórmula directa del discurso de Jesús se conserva de manera idiomática en español; el plural «les» refleja el dativo ὑμῖν.
- source_word: γῇ Σοδόμων
  english_pob_choice: the land of Sodom
  chosen_spanish: la tierra de Sodoma
  alternatives_spanish:
  - el territorio de Sodoma
  - la región de Sodoma
  lexicon: BDAG
  rationale: γῇ se expresa con «tierra» para mantener el sustantivo geográfico explícito; «de Sodoma» conserva el referente del lugar en español natural.
- source_word: ἀνεκτότερον
  english_pob_choice: more tolerable
  chosen_spanish: más tolerable
  alternatives_spanish:
  - más soportable
  - más llevadero
  lexicon: BDAG
  rationale: Comparativo de ἀνεκτός; «más tolerable» reproduce el valor comparativo y encaja bien en contexto judicial/escatológico.
- source_word: ἐν ἡμέρᾳ κρίσεως
  english_pob_choice: on the day of judgment
  chosen_spanish: en el día del juicio
  alternatives_spanish:
  - en el día del juicio final
  - en el día del juicio
  lexicon: BDAG
  rationale: Se mantiene la construcción temporal con «en» y se traduce κρίσις como «juicio», que comunica con fidelidad el sentido escatológico sin suavizarlo.
- source_word: ἢ σοί
  english_pob_choice: than for you
  chosen_spanish: que para ti
  alternatives_spanish:
  - que para ustedes
  - que para vos
  lexicon: BDAG
  rationale: El dativo comparativo se expresa naturalmente con «que para ti»; se conserva el singular para mantener la dirección profética personal y la tensión del original.
theological_decisions:
- issue: Singular σοί como dirección profética
  english_pob_reading: Retain singular 'you' as direct address to the city/personified locale in context rather than expanding to a plural audience.
  chosen_spanish_reading: Conservar el singular «ti» como dirección directa y personal, sin convertirlo en plural.
  alternative_spanish_readings:
  - para ustedes
  - para ustedes, habitantes de la ciudad
  rationale: El griego es singular y continúa la interpelación profética a la ciudad/personificación del lugar. Mantener «ti» preserva la fuerza retórica y evita resolver una tensión que el texto conserva.
  doctrine_reference: Preservar la forma del discurso y la referencia contextual sin harmonizarla de manera interpretativa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y concuerda con la auditoría inglesa: πλὴν como adversativo, γῇ Σοδόμων como «la tierra de Sodoma», ἀνεκτότερον como comparativo de tolerancia, y σοί en singular mantenido como «ti».'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; aquí no aparece ninguno de esos términos.
  - Se conserva el tono solemne y forense de κρίσις con «juicio», no con una paráfrasis más general.
  - El marcador de nota [a] está anclado en «tolerable» para reflejar la alternativa léxica documentada.
