translation:
  language: es
  text: 'El Hijo del Hombre vino comiendo y bebiendo, y dicen: «Miren, un glotón y un borracho, amigo de recaudadores de impuestos y pecadores». Y la sabiduría fue justificada[a] por sus obras[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue vindicada».'
    reason: lexical_alternative
  - marker: b
    text: 'Variante textual conocida: «hijos» en lugar de «obras»: «la sabiduría fue justificada por sus hijos».'
    reason: textual_variant
lexical_decisions:
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: The Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título fijo y su resonancia bíblica tradicional. En español, «el Hijo del Hombre» es la forma más natural y fiel para este autodesignativo, sin reducirlo a una paráfrasis más explicativa.
- source_word: ἐσθίων καὶ πίνων
  english_pob_choice: eating and drinking
  chosen_spanish: comiendo y bebiendo
  alternatives_spanish:
  - comiendo y tomando
  - comiendo y bebiendo
  lexicon: BDAG
  rationale: Los participios presentes describen una actividad habitual o característica, y el español lo expresa de manera directa y natural con gerundios coordinados. «Comiendo y bebiendo» mantiene el contraste con el estilo ascético de Juan sin añadir énfasis inexistente.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren
  - Mira
  - Vean
  lexicon: BDAG
  rationale: La interjección deíctica y acusatoria se vierte con una forma natural de plural exhortativo en español. «Miren» conserva el tono público de señalamiento.
- source_word: φάγος
  english_pob_choice: a glutton
  chosen_spanish: un glotón
  alternatives_spanish:
  - un comilón
  - un glotón
  lexicon: BDAG
  rationale: Es un insulto despectivo e idiomático; «un glotón» reproduce bien la carga peyorativa y es más sobrio que una glosa explicativa.
- source_word: οἰνοπότης
  english_pob_choice: a drunkard
  chosen_spanish: un borracho
  alternatives_spanish:
  - un bebedor de vino
  - un borracho
  lexicon: BDAG
  rationale: El término es una acusación de exceso, no una observación neutral sobre beber vino. «Un borracho» conserva el carácter injurioso y natural del insulto.
- source_word: τελωνῶν φίλος καὶ ἁμαρτωλῶν
  english_pob_choice: a friend of tax collectors and sinners
  chosen_spanish: amigo de recaudadores de impuestos y pecadores
  alternatives_spanish:
  - amigo de recaudadores de impuestos y pecadores
  - amigo de publicanos y pecadores
  lexicon: BDAG
  rationale: «Recaudadores de impuestos» comunica con claridad contemporánea el oficio socialmente despreciado; se evita «publicanos» porque en español puede resultar arcaizante o eclesiástico sin necesidad. «Pecadores» conserva el campo moral-religioso del término.
- source_word: ἐδικαιώθη
  english_pob_choice: was justified
  chosen_spanish: fue justificada
  alternatives_spanish:
  - fue justificada
  - fue vindicada
  - fue mostrada como justa
  lexicon: BDAG
  rationale: Se mantiene «justificada» para respetar la forma verbal y la conexión bíblica de δικαιόω. «Vindicada» sigue siendo una alternativa válida, pero «justificada» preserva mejor la correspondencia léxica principal.
- source_word: ἡ σοφία
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la sabiduría
  lexicon: BDAG
  rationale: Se conserva la personificación de la sabiduría sin identificarla de inmediato con una persona específica. «Sabiduría» es el sustantivo más transparente y fiel.
- source_word: ἀπὸ τῶν ἔργων αὐτῆς
  english_pob_choice: by her works
  chosen_spanish: por sus obras
  alternatives_spanish:
  - por sus obras
  - por sus hechos
  - por sus acciones
  lexicon: BDAG
  rationale: La preposición ἀπό con genitivo admite un valor causal/inferencial; en español «por» reproduce bien ese matiz. «Obras» refleja ἔργα y mantiene la lectura de SBLGNT, con la personificación femenina («sus»).
theological_decisions:
- issue: Sentido de «la sabiduría» en la cláusula final
  english_pob_reading: Retain the personified expression 'wisdom' without identifying it explicitly with Jesus, God's wisdom, or the divine plan.
  chosen_spanish_reading: Mantener «la sabiduría» como personificación, sin resolverla explícitamente en Jesús ni en un concepto teológico más estrecho.
  alternative_spanish_readings:
  - Jesús es la sabiduría de Dios aquí
  - la sabiduría se refiere al plan de Dios
  - la sabiduría personificada
  rationale: El texto conserva una personificación real y una tensión interpretativa que no debe cerrarse indebidamente. La traducción española debe dejar abierta la lectura, igual que el original y el POB inglés.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Forma del final textual del versículo
  english_pob_reading: Follow the SBLGNT reading 'works' in the main text.
  chosen_spanish_reading: Seguir la lectura principal «obras» en el texto, con la variante «hijos» preservada en nota.
  alternative_spanish_readings:
  - hijos
  - obras
  rationale: El texto base griego aquí lee ἔργων, por lo que el cuerpo principal debe reflejar «obras». Dado que «hijos» es una variante importante y conocida en la tradición, conviene documentarla para auditoría sin incorporarla al texto principal.
  doctrine_reference: Textual criticism / preserved variant awareness
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió el conector final de ‘Yet’ a ‘And’ para reflejar mejor el καί griego; por eso en español se usa «Y» y no una adversativa. También se mantuvo la lectura base de SBLGNT con ἔργων («obras») y se registró la variante tradicional «hijos» en nota.
  spanish_consistency_notes:
  - Se evita el uso de «SEÑOR» o «Cristo» porque este versículo no contiene ni exige esas sustituciones.
  - «Recaudadores de impuestos» se eligió por claridad moderna; «publicanos» queda como alternativa contextual en la decisión léxica.
  - Se conserva la personificación femenina con «la sabiduría» y «sus obras», coherente con el griego.
  - 'El orden y la puntuación siguen el contraste narrativo del original: acusación, lista de desprecio, y clausura sapiencial.'
