translation:
  language: es
  text: Y Juan, al oír en la prisión acerca de las obras del Mesías[a], mandó decir por medio de sus discípulos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: Marca transición narrativa; «Ahora» conserva el movimiento discursivo sin imponer una secuencia más fuerte de la que el griego exige.
- source_word: ἀκούσας
  english_pob_choice: when John heard
  chosen_spanish: cuando Juan oyó
  alternatives_spanish:
  - habiendo oído Juan
  - después de oír Juan
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma natural en español con una cláusula temporal, manteniendo la acción anterior en relación con el verbo principal.
- source_word: ἐν τῷ δεσμωτηρίῳ
  english_pob_choice: in prison
  chosen_spanish: en la prisión
  alternatives_spanish:
  - en el calabozo
  - en la cárcel
  lexicon: BDAG
  rationale: Se conserva el valor locativo literal del sustantivo griego; «prisión» es claro y digno en español moderno, sin perder la referencia a un lugar de encarcelamiento.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las obras poderosas
  - los hechos
  lexicon: BDAG
  rationale: «Obras» reproduce el vínculo léxico con ἔργα y permite abarcar la actividad pública de Jesús sin restringirla indebidamente a milagros solamente.
- source_word: τοῦ χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - del Ungido
  lexicon: BDAG
  rationale: Se traduce Χριστός como título, no como nombre, de acuerdo con la directriz del proyecto y con el sentido mesiánico del contexto.
- source_word: πέμψας
  english_pob_choice: he sent word
  chosen_spanish: envió
  alternatives_spanish:
  - mandó decir
  - envió un mensaje
  lexicon: BDAG
  rationale: El verbo apunta a un acto de despacho comunicativo por medio de intermediarios; en español, «envió» deja abierta la elipsis del contenido y mantiene la economía del griego, que se completa en el versículo siguiente.
- source_word: διὰ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: through his disciples
  chosen_spanish: por medio de sus discípulos
  alternatives_spanish:
  - a través de sus discípulos
  - por sus discípulos
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/intermediación; «por medio de» es la formulación española más transparente para ese valor instrumental.
theological_decisions:
- issue: Traducción de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  - Ungido
  rationale: El contexto habla de la actividad de Jesús como portador del cumplimiento mesiánico; traducir el título preserva el contenido hebraico del término y evita una lectura meramente nominalizada.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: Se siguió la lectura inglesa auditada, con concordancia alta y sin revisiones aplicadas; la única decisión sensible fue mantener el valor titular de Χριστός como «Mesías» en el texto principal, dejando «Cristo» como alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς cuando aparezca en el contexto inmediato, conforme al estándar del proyecto.
  - «Mesías» se usa para Χριστός como título; «Cristo» queda reservado como alternativa documentada cuando la tradición o el contexto lo requieran.
  - La estructura temporal con «cuando Juan oyó» reproduce fielmente el participio aoristo sin sobrecargar el español con un participio absoluto.
  - «Por medio de» conserva el matiz de intermediación de διά con genitivo mejor que un simple «por».
