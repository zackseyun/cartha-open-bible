translation:
  language: es
  text: 'En aquel tiempo, Jesús respondió y dijo[a]: «Te alabo, Padre, Señor del cielo y de la tierra, porque escondiste estas cosas de los sabios y entendidos[b], y las revelaste a los niños pequeños».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te doy gracias». El verbo griego puede expresar agradecimiento además de alabanza o reconocimiento abierto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «infantes». Aquí «niños pequeños» probablemente tiene un sentido metafórico para quienes son humildes o receptivos como niños.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῳ τῷ καιρῷ
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - En aquel momento
  lexicon: BDAG
  rationale: Expresa de manera natural la fórmula temporal narrativa y conserva el marco situacional sin sobre-especificar la inmediatez.
- source_word: ἀποκριθεὶς ... εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - dijo
  - respondió
  lexicon: BDAG
  rationale: Mantiene la fórmula narrativa semítica del griego con dos verbos, como hace la tradición POB en inglés, sin añadir una respuesta previa explícita que el contexto no exige.
- source_word: Ἐξομολογοῦμαί σοι
  english_pob_choice: I praise you
  chosen_spanish: Te alabo
  alternatives_spanish:
  - Te doy gracias
  - Te confieso
  lexicon: BDAG
  rationale: En este contexto doxológico, el verbo expresa alabanza y reconocimiento abierto; 'Te alabo' comunica mejor el tono que una confesión de pecado, y evita fijar solo el matiz de agradecimiento.
- source_word: πάτερ κύριε τοῦ οὐρανοῦ καὶ τῆς γῆς
  english_pob_choice: Father, Lord of heaven and earth
  chosen_spanish: Padre, Señor del cielo y de la tierra
  alternatives_spanish:
  - Padre, Dueño del cielo y de la tierra
  - Padre, Soberano del cielo y de la tierra
  lexicon: BDAG
  rationale: Conserva la cadena vocativa y el valor de κύριος como título de soberanía. 'Señor' es la opción española más fiel y reconocible en este registro.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: En español introduce con claridad la base causal de la alabanza, equivalente al uso explicativo-causal que el inglés POB señaló.
- source_word: ἔκρυψας
  english_pob_choice: you hid
  chosen_spanish: escondiste
  alternatives_spanish:
  - ocultaste
  - encubriste
  lexicon: BDAG
  rationale: Verbo simple y directo que conserva la acción divina de ocultar; 'escondiste' suena natural en español y no suaviza la fuerza del aoristo.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas realidades
  lexicon: BDAG
  rationale: Respeta el demostrativo plural y su referencia abierta a las verdades o realidades reveladas en el contexto.
- source_word: ἀπὸ σοφῶν καὶ συνετῶν
  english_pob_choice: from the wise and understanding
  chosen_spanish: de los sabios y entendidos
  alternatives_spanish:
  - de los sabios y discernidores
  - de los sabios y prudentes
  lexicon: BDAG
  rationale: Mantiene los sustantivos/adjetivos en plural y el contraste entre sabiduría y comprensión/discernimiento. 'Entendidos' es una forma natural de συνετοί en español bíblico contemporáneo.
- source_word: ἀπεκάλυψας
  english_pob_choice: revealed
  chosen_spanish: las revelaste
  alternatives_spanish:
  - las diste a conocer
  - las manifestaste
  lexicon: BDAG
  rationale: Preserva el acto de divina revelación sin diluirlo. El pronombre 'las' retoma naturalmente 'estas cosas' y evita una repetición pesada.
- source_word: νηπίοις
  english_pob_choice: little children
  chosen_spanish: a los niños pequeños
  alternatives_spanish:
  - a los pequeños
  - a los infantes
  lexicon: BDAG
  rationale: Conserva la imagen metafórica de receptividad humilde sin imponer una lectura estrictamente biológica. 'Niños pequeños' resulta claro y natural en español, a la vez que permite la resonancia figurada.
theological_decisions:
- issue: Atribución divina de esconder y revelar
  english_pob_reading: 'Retain the direct attribution to the Father: ''you hid ... and revealed'''
  chosen_spanish_reading: 'Mantener la atribución directa al Padre: ''escondiste ... y revelaste'''
  alternative_spanish_readings:
  - suavizar con 'dejaste ocultas estas cosas'
  - reformular como 'permitiste que permanecieran ocultas'
  rationale: El griego usa verbos activos directos; la traducción conserva esa agencia divina y no resuelve la tensión teológica por vía interpretativa. Así se respeta la fuerza del texto fuente.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no introducir explicación doctrinal ajena al versículo.
- issue: Sentido de νηπίοις
  english_pob_reading: Metaphorical sense expressed as 'little children'
  chosen_spanish_reading: Sentido metafórico expresado como 'a los niños pequeños'
  alternative_spanish_readings:
  - '''a los infantes'''
  - '''a los humildes'''
  rationale: El contraste contextual no es solo etario, sino de receptividad. 'Niños pequeños' mantiene la imagen sin reducirla a una categoría abstracta ni perder la posibilidad de una lectura metafórica.
  doctrine_reference: Equivalencia óptima; no parafrasear más allá de lo que el fuente permite.
translation_notes:
  revision_awareness: La versión española sigue de cerca la auditoría inglesa aprobada, sin cambios sustantivos respecto al sentido, la estructura narrativa ni las decisiones léxicas clave. Se mantiene la doble acción verbal ('respondió y dijo'), la alabanza dirigida al Padre, la agencia divina en esconder y revelar, y el valor metafórico de 'niños pequeños'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero en este versículo no aparece el tetragrámaton; 'Señor' traduce κύριος según el valor de título y la propia construcción vocativa.
  - '''Señor'' conserva el peso de soberanía de κύριος sin convertirlo en una sustitución del nombre divino.'
  - '''Entendidos'' refleja συνετοί en plural y evita colapsarlo en un mero ''inteligentes''.'
  - '''Niños pequeños'' conserva la imagen y permite la nota metafórica sin forzar ''infantes'' en el texto principal.'
