review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien μακάριος con «bienaventurado» y la estructura genérica «el que no». Sin embargo, «en mí» para ἐν ἐμοί suena poco natural en español en esta construcción y no comunica bien el valor relacional/ocasional (‘por mí’, ‘a causa de mí’). Además, la nota actual incluye «no se ofende de mí», giro poco idiomático. Dado el rastro de auditoría inglés, conviene mantener en el texto principal la idea de ofensa/escándalo, pero con una formulación española más natural.
  spanish_quality_summary: '«Y bienaventurado es el que no se escandaliza por mí[a].» es más claro y natural que «en mí». Conserva tono bíblico digno y legible. La nota debe usar alternativas idiomáticas: «no tropieza por mí» / «no se ofende por mí».'
  glossary_alignment: 'Alineado con la terminología del proyecto: «bienaventurado» refleja adecuadamente μακάριος. No hay términos de glosario mayor en juego aparte de mantener el peso semántico de σκανδαλίζω sin aplanarlo. La revisión respeta también la decisión inglesa auditada de poner en el texto principal una lectura tipo ‘offended’, mientras preserva la alternativa de ‘tropieza’ en nota.'
  issues:
  - severity: medium
    issue: «en mí» es una traducción demasiado literal de ἐν ἐμοί en español.
    rationale: Aunque formalmente posible, en esta construcción con «escandalizarse» resulta poco idiomática y puede sonar teológicamente ambigua o extraña. «Por mí» expresa mejor que Jesús es la ocasión del tropiezo/ofensa, en línea con la documentación inglesa.
  - severity: low
    issue: La nota usa «no se ofende de mí», giro poco natural.
    rationale: En español general y eclesial suena más natural «no se ofende por mí» o «a causa de mí».
  revised_spanish_text: Y bienaventurado es el que no se escandaliza por mí[a].
  revised_footnotes:
