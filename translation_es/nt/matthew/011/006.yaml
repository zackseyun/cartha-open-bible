    reason: lexical_alternative
  revision_rationale: Se ajusta «en mí» a «por mí» para reflejar de forma natural en español el valor de ἐν ἐμοί con σκανδαλίζω, y se corrige la nota para usar alternativas idiomáticas. Se conserva «bienaventurado» y «se escandaliza» porque mantienen el peso religioso y la tensión semántica entre ofensa y tropiezo documentada en el expediente.
