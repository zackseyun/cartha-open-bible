translation:
  language: es
  text: Y bienaventurado es el que no se escandaliza por mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no tropieza por mí» / «no se ofende por mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: blessed
  chosen_spanish: bienaventurado
  alternatives_spanish:
  - bendecido
  - feliz
  lexicon: BDAG
  rationale: «Bienaventurado» conserva el peso religioso y declarativo de μακάριος en una bienaventuranza. «Bendecido» es posible, pero suena menos formular; «feliz» reduce demasiado el alcance teológico.
- source_word: ὃς ἐὰν μὴ
  english_pob_choice: the one who is not
  chosen_spanish: el que no
  alternatives_spanish:
  - quien no
  - el que no sea
  lexicon: BDAG
  rationale: La construcción indefinida y genérica se expresa de forma natural en español con «el que no», manteniendo la fuerza representativa del singular sin sobreexplicar.
- source_word: σκανδαλισθῇ
  english_pob_choice: is not offended
  chosen_spanish: se escandaliza
  alternatives_spanish:
  - tropieza
  - se ofende
  - toma tropiezo
  lexicon: BDAG
  rationale: En español, «escandalizarse» puede conservar el campo semántico de tropiezo/ofensa que tiene σκανδαλίζω en este contexto. Se evita reducirlo solo a una reacción emocional, aunque la idea de ofensa sigue implícita.
- source_word: ἐν ἐμοί
  english_pob_choice: by me
  chosen_spanish: en mí
  alternatives_spanish:
  - por mí
  - a causa de mí
  - a mi respecto
  lexicon: BDAG
  rationale: La preposición griega se traduce de manera directa en español con «en mí», porque el verbo admite la relación personal que produce tropiezo/ofensa. Esta opción conserva mejor la forma del texto fuente.
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - También
  lexicon: BDAG
  rationale: La conjunción enlaza con el contexto inmediato; «Y» mantiene el flujo discursivo de manera simple y fiel.
theological_decisions:
- issue: Cómo preservar la tensión entre tropiezo y ofensa en σκανδαλισθῇ
  english_pob_reading: Retain the stumbling/offense sense without flattening it.
  chosen_spanish_reading: Mantener «se escandaliza» en el texto principal, con nota que explicite la posibilidad de «ofenderse» o «tropezar».
  alternative_spanish_readings:
  - no tropieza por mí
  - no se ofende de mí
  - no toma tropiezo por mí
  rationale: El dicho de Jesús no describe solo una molestia subjetiva; señala la posibilidad de rechazarlo o tropezar con él. «Se escandaliza» preserva esa tensión y permite explicitar alternativas legítimas sin perder el matiz fuente.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente favoreció «is not offended by me» por naturalidad, pero el audit trail anterior preserva el tropiezo metafórico de σκανδαλισθῇ. En español, «se escandaliza» permite sostener ambas posibilidades sin debilitar la imagen original.
  spanish_consistency_notes:
  - Usé «bienaventurado» para conservar el tono de bienaventuranza ya fijado en la POB en inglés.
  - Evité «Cristo» o terminología eclesiástica añadida; el texto sólo contiene la referencia personal de Jesús implícita en ἐμοί.
  - Mantuve una formulación breve y pública, apta para lectura litúrgica y estudio.
