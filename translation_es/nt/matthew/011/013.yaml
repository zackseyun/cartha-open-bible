translation:
  language: es
  text: Porque todos los profetas y la Ley profetizaron hasta Juan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta Juan» o «hasta la época de Juan». La expresión puede presentar a Juan como la culminación del testimonio profético o como el límite que marca su transición.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo el conjunto de
  - cada uno de
  lexicon: BDAG
  rationale: 'Con οἱ προφῆται, el valor es colectivo: el conjunto entero de los profetas. En español, ''todos'' transmite naturalmente esa totalidad sin sobrecargar el texto.'
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: En este contexto introduce la base explicativa de la declaración anterior. 'Porque' suena natural en español y conserva la fuerza causal/explicativa de γάρ.
- source_word: οἱ προφῆται
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas de Dios
  lexicon: BDAG
  rationale: La forma estándar y directa en español es 'los profetas'. No hace falta expandir el referente, pues el contexto bíblico ya lo define.
- source_word: ὁ νόμος
  english_pob_choice: the Law
  chosen_spanish: la Ley
  alternatives_spanish:
  - la ley
  lexicon: BDAG
  rationale: Aquí νόμος funciona como título escritural/canónico, en paralelo con 'los profetas'. 'La Ley' conserva esa referencia a la Torá o Ley mosaica, como en el audit trail inglés.
- source_word: ἕως Ἰωάννου
  english_pob_choice: until John
  chosen_spanish: hasta Juan
  alternatives_spanish:
  - hasta Juan el Bautista
  - hasta la época de Juan
  lexicon: BDAG
  rationale: '''Hasta Juan'' preserva la misma ambigüedad temporal que el griego y el inglés POB: puede señalar límite, culminación o transición sin resolverla de antemano.'
- source_word: ἐπροφήτευσαν
  english_pob_choice: prophesied
  chosen_spanish: profetizaron
  alternatives_spanish:
  - hablaron proféticamente
  - fueron proféticos
  lexicon: BDAG
  rationale: El aoristo de προφητεύω se traduce de manera directa y natural con 'profetizaron'. Mantiene la afirmación de que tanto los profetas como la Ley dieron testimonio profético.
theological_decisions:
- issue: Cómo traducir ὁ νόμος en el marco de 'los profetas y la Ley'
  english_pob_reading: the Law
  chosen_spanish_reading: la Ley
  alternative_spanish_readings:
  - la ley
  rationale: El par formula una referencia canónica a las Escrituras de Israel, no una mención genérica a la ley humana. La mayúscula ayuda a señalar ese valor sin añadir explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si ἕως Ἰωάννου debe resolverse como culminación o solo como límite temporal
  english_pob_reading: until John
  chosen_spanish_reading: hasta Juan
  alternative_spanish_readings:
  - hasta la época de Juan
  - hasta Juan el Bautista
  rationale: La frase griega deja abierta la relación exacta entre Juan y la era profética. 'Hasta Juan' conserva esa tensión y no fuerza una decisión doctrinal o cronológica que el texto no explicita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta un alto grado de acuerdo entre las revisiones y no muestra cambios sustanciales en el texto base. Se mantiene la misma tensión temporal señalada en el audit trail inglés para ἕως Ἰωάννου, sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se mantuvo 'Ley' con mayúscula para reflejar el uso canónico de ὁ νόμος en paralelo con 'los profetas'.
  - Se prefirió 'hasta Juan' por ser breve, natural y fiel a la ambigüedad del griego.
  - '''Profetizaron'' se usó como equivalente directo de ἐπροφήτευσαν, evitando paráfrasis.'
  - No se introdujo 'Cristo', 'SEÑOR' ni otros términos no presentes en el texto fuente.
