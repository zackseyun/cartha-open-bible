translation:
  language: es
  text: 'En verdad les digo: entre los nacidos de mujer[b], no ha surgido[a] uno mayor que Juan el Bautista; sin embargo, el menor[c] en el reino de los cielos es mayor que él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha sido levantado». El verbo griego puede significar «ha surgido» o «ha sido levantado»; aquí lo más probable es que se refiera a aparecer en la escena de la historia, no a resurrección.
    reason: lexical_alternative
  - marker: b
    text: «Entre los nacidos de mujer» es un semitismo que significa entre los seres humanos.
    reason: cultural_note
  - marker: c
    text: O «el más pequeño» / «el de menor rango». El griego usa literalmente una forma comparativa, pero aquí el sentido es el de menor rango o estatus en el reino de los cielos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - Amén
  - En verdad
  lexicon: BDAG
  rationale: En la fórmula solemne ἀμὴν λέγω ὑμῖν, «De cierto» comunica el tono enfático y bíblico sin sonar mecánico. «Amén» es más transliteración que traducción en español corriente; «En verdad» también sería válido, pero «De cierto» mantiene bien la fuerza discursiva.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: BDAG
  rationale: La estructura española natural requiere objeto indirecto explícito. «Les digo» conserva la fórmula directa y solemne sin recargar el verso. El plural es adecuado para ὑμῖν.
- source_word: οὐκ ἐγήγερται
  english_pob_choice: has arisen
  chosen_spanish: no se ha levantado
  alternatives_spanish:
  - no ha surgido
  - no ha aparecido
  lexicon: BDAG
  rationale: El perfecto griego expresa el estado resultante de haberse levantado o surgido. «No se ha levantado» preserva la imagen verbal y evita sugerir resurrección, como advierte el audit trail inglés. «No ha surgido» sería más abstracto; «no ha aparecido» puede perder la fuerza idiomática.
- source_word: ἐν γεννητοῖς γυναικῶν
  english_pob_choice: among those born of women
  chosen_spanish: entre los nacidos de mujer
  alternatives_spanish:
  - entre los nacidos de mujeres
  - entre los seres humanos
  lexicon: BDAG
  rationale: Se conserva el semitismo de manera transparente. «Nacidos de mujer» reproduce la expresión y su color bíblico; «seres humanos» explicaría el sentido, pero borraría la forma figurada que el texto mantiene.
- source_word: μείζων Ἰωάννου τοῦ βαπτιστοῦ
  english_pob_choice: no one greater than John the Baptist
  chosen_spanish: uno mayor que Juan el Bautista
  alternatives_spanish:
  - nadie mayor que Juan el Bautista
  - uno más grande que Juan el Bautista
  lexicon: BDAG
  rationale: En español, la construcción con sujeto implícito o indefinido («uno mayor que») expresa con naturalidad el comparativo del griego. «Nadie mayor que» también sería posible, pero «no se ha levantado uno mayor que» ya cubre la negación existencial. «Más grande» suena menos apto para rango o estatura moral en este contexto.
- source_word: τοῦ βαπτιστοῦ
  english_pob_choice: the Baptist
  chosen_spanish: el Bautista
  alternatives_spanish:
  - el Bautizador
  lexicon: BDAG
  rationale: «Bautista» es la designación estable y reconocible en español para ὁ βαπτιστής. «Bautizador» es más transparente léxicamente, pero menos idiomático como título propio.
- source_word: ὁ δὲ μικρότερος
  english_pob_choice: yet the least
  chosen_spanish: sin embargo, el menor
  alternatives_spanish:
  - pero el menor
  - sin embargo, el más pequeño
  lexicon: BDAG
  rationale: Aunque μικρότερος es comparativo, en español «el menor» comunica bien la idea de menor rango o estatus. Se evita «el más pequeño» por su posible referencia física. «Sin embargo» conserva el contraste fuerte del δέ.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  english_pob_choice: in the kingdom of heaven
  chosen_spanish: en el reino de los cielos
  alternatives_spanish:
  - en el reino del cielo
  - en el reino celestial
  lexicon: BDAG
  rationale: Se mantiene la expresión mateana tradicional y clara en español. «Reino de los cielos» refleja el uso del evangelio de Mateo sin necesidad de normalizarlo.
- source_word: μείζων αὐτοῦ ἐστιν
  english_pob_choice: is greater than he
  chosen_spanish: es mayor que él
  alternatives_spanish:
  - es más grande que él
  - es superior a él
  lexicon: BDAG
  rationale: «Mayor que él» reproduce el comparativo y mantiene el registro sobrio. «Superior a él» interpretaría demasiado la relación; «más grande» es posible pero menos preciso para rango o status.
theological_decisions:
- issue: Cómo preservar la paradoja de que el menor en el reino supera a Juan
  english_pob_reading: Render the statement straightforwardly without explaining how the least in the kingdom is greater than John.
  chosen_spanish_reading: Traducir la comparación de forma directa, sin explicar en el texto principal por qué el menor del reino es mayor que Juan.
  alternative_spanish_readings:
  - El menor del reino pertenece a la nueva era del pacto y por eso supera a Juan
  - La frase se refiere al estatus en la historia de la salvación más que a la santidad personal
  rationale: El versículo en sí presenta la tensión teológica, pero no la desarrolla. La traducción debe dejar intacta la paradoja para que el lector la reciba como el griego la presenta, sin resolverla en el texto principal.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
- issue: Sentido de 'entre los nacidos de mujer' como semitismo
  english_pob_reading: '"Among those born of women" is a Semitic expression meaning among human beings.'
  chosen_spanish_reading: Conservar «entre los nacidos de mujer» como expresión semítica transparente, sin reemplazarla por «entre los seres humanos» en el texto principal.
  alternative_spanish_readings:
  - entre los seres humanos
  - entre los mortales
  rationale: La expresión tiene valor retórico y bíblico; el lector puede captar su carácter idiomático sin que se la aplane a una paráfrasis interpretativa. Esto también mantiene la correspondencia con el audit trail inglés.
  doctrine_reference: POB lexical policy on preserving Semitic idiom when it is intelligible and textually significant.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés sin copiarlo mecánicamente: conserva la fórmula solemne de introducción, el semitismo de «nacidos de mujer», la comparación de estatus y la tensión teológica sin resolverla. No se registraron revisiones posteriores en el expediente; el pasaje pasó con acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se mantuvo «reino de los cielos» por ser la fórmula mateana estable en español.
  - Se eligió «Bautista» como título tradicional reconocible para ὁ βαπτιστής, coherente con el audit trail inglés y con el uso eclesial en español.
  - «Mayor que él» conserva el comparativo personal del griego y evita una paráfrasis interpretativa.
