translation:
  language: es
  text: Y cuando Jesús terminó de instruir[a] a sus doce discípulos, salió de allí para enseñar y predicar en sus ciudades[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dar órdenes a» sus doce discípulos.
    reason: lexical_alternative
  - marker: b
    text: La expresión «sus ciudades» es ambigua en griego; puede referirse a las ciudades de los discípulos o, de manera más general, a los pueblos de la gente de esa región.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y sucedió que, cuando
  - Y cuando
  lexicon: BDAG
  rationale: La fórmula narrativa semítica se conserva en español con una apertura idiomática que mantiene el valor de transición temporal. «Aconteció que» refleja mejor el matiz de fórmula narrativa que un simple «y cuando».
- source_word: ἐτέλεσεν
  english_pob_choice: had finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - completó
  lexicon: BDAG
  rationale: El aoristo marca culminación anterior a la acción principal. En español, el pretérito «terminó» comunica claramente la finalización previa sin forzar un pluscuamperfecto en una construcción ya introducida por «cuando».
- source_word: διατάσσων
  english_pob_choice: instructing
  chosen_spanish: de instruir[a]
  alternatives_spanish:
  - de mandar
  - de dar órdenes a
  - de dirigir
  lexicon: BDAG
  rationale: El participio expresa dar instrucciones/mandatos a los doce. «Instruir» conserva la idea de orientación autoritativa y encaja bien con el contexto de comisionamiento. Se añade nota para preservar la alternativa léxica «mandar».
- source_word: τοῖς δώδεκα μαθηταῖς αὐτοῦ
  english_pob_choice: his twelve disciples
  chosen_spanish: a sus doce discípulos
  alternatives_spanish:
  - a sus doce estudiantes
  - a los doce discípulos de él
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente natural y exacto en contexto evangélico. La frase se ajusta al orden natural del español con el complemento directo introducido por «a».
- source_word: μετέβη
  english_pob_choice: he went on
  chosen_spanish: salió de allí
  alternatives_spanish:
  - se fue de allí
  - partió de allí
  - pasó de allí
  lexicon: BDAG
  rationale: El verbo indica movimiento desde un lugar anterior. «Salió de allí» mantiene la referencia espacial explícita y es natural en español; aunque no reproduce literalmente «went on», comunica el cambio de lugar sin sobreinterpretar.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  lexicon: BDAG
  rationale: Adverbio locativo directo y claro en español. «De allí» conserva la referencia al lugar previo.
- source_word: τοῦ διδάσκειν καὶ κηρύσσειν
  english_pob_choice: to teach and preach
  chosen_spanish: para enseñar y predicar
  alternatives_spanish:
  - para enseñar y proclamar
  - con el fin de enseñar y predicar
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad. «Para enseñar y predicar» es el equivalente natural y distingue bien entre διδάσκειν y κηρύσσειν. Se prefiere «predicar» como el correlato usual de κηρύσσειν en contexto evangélico.
- source_word: κηρύσσειν
  english_pob_choice: preach
  chosen_spanish: predicar
  alternatives_spanish:
  - proclamar
  - anunciar
  lexicon: BDAG
  rationale: En contexto de Evangelios, «predicar» es la equivalencia más estable y comprensible para el anuncio público del mensaje.
- source_word: ἐν ταῖς πόλεσιν αὐτῶν
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades[b]
  alternatives_spanish:
  - en las ciudades de ellos
  - en sus pueblos
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del posesivo griego con «sus ciudades». «Ciudades» sigue de cerca πόλις, y la nota mantiene abierta la cuestión del referente, tal como en el texto fuente.
theological_decisions:
- issue: Referente ambiguo de αὐτῶν en «ἐν ταῖς πόλεσιν αὐτῶν»
  english_pob_reading: Retain the ambiguous 'their cities' without specifying whose cities are meant.
  chosen_spanish_reading: Mantener «sus ciudades» sin precisar de quiénes son.
  alternative_spanish_readings:
  - las ciudades de los discípulos
  - las ciudades de la región
  - los pueblos de esa zona
  rationale: El griego no identifica de manera explícita el antecedente del posesivo, y el versículo no exige resolver la referencia. La traducción conserva esa tensión textual en vez de armonizarla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual cuando el original no la resuelve.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no registran revisiones sustanciales; esta propuesta sigue esa lectura estable y conserva la ambigüedad documentada en αὐτῶν.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se usa «discípulos» como término técnico evangélico para μαθηταί.
  - Se conserva la relación de finalidad con «para enseñar y predicar» a fin de reflejar el infinitivo articular.
  - Se mantiene «sus ciudades» para reproducir la ambigüedad del posesivo griego sin resolverla.
