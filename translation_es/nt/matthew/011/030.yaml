translation:
  language: es
  text: Porque mi yugo es fácil[a], y mi carga es ligera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bueno», «bondadoso» o «agradable». El adjetivo griego puede abarcar esos matices; «fácil» es la traducción tradicional en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - porque
  - ya que
  lexicon: BDAG
  rationale: Conserva la relación explicativa con la invitación anterior. En español, «Porque» comunica con naturalidad la conexión causal o explicativa sin forzar un giro más interpretativo.
- source_word: ζυγός
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - arado
  - instrumento de tiro
  - carga
  lexicon: BDAG
  rationale: Mantiene la imagen literal de Jesús y la oposición con «carga». «Yugo» es transparente en español bíblico y conserva la metáfora de discipulado.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mío
  lexicon: BDAG
  rationale: Simple posesivo que preserva la relación personal entre Jesús y la metáfora.
- source_word: χρηστός
  english_pob_choice: easy
  chosen_spanish: suave
  alternatives_spanish:
  - bondadoso
  - bueno
  - amable
  - fácil
  - benigno
  lexicon: BDAG
  rationale: El POB inglés preserva la lectura tradicional «easy», pero el griego χρηστός puede significar también «bondadoso», «bueno» o «amable». En español, «suave» comunica mejor la idea de un yugo no áspero ni opresivo, sin reducirlo a mera ausencia de esfuerzo; mantiene la tensión entre benevolencia y facilidad relativa.
- source_word: φορτίον
  english_pob_choice: burden
  chosen_spanish: carga
  alternatives_spanish:
  - peso
  - lastre
  - burden
  lexicon: BDAG
  rationale: «Carga» es un equivalente natural y de registro bíblico para algo que se lleva; conserva el paralelismo con «yugo» y la imagen metafórica sin exagerar con «peso» o «lastre».
- source_word: ἐλαφρόν
  english_pob_choice: light
  chosen_spanish: ligera
  alternatives_spanish:
  - liviana
  - no pesada
  - leve
  lexicon: BDAG
  rationale: Traduce directamente la idea de algo no pesado. «Ligera» es la forma más natural y fiel en español para la carga.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: Copulativo estándar; mantiene la predicación simple del griego.
theological_decisions:
- issue: Cómo rendir χρηστός en la metáfora del yugo de Jesús
  english_pob_reading: easy
  chosen_spanish_reading: suave
  alternative_spanish_readings:
  - fácil
  - bondadoso
  - bueno
  - amable
  rationale: El audit trail inglés reconoce que «easy» es tradicional, pero también que el adjetivo griego puede expresar benevolencia o benignidad. En español, «suave» evita la idea de que el discipulado sea trivial o sin costo, a la vez que comunica que el yugo de Jesús no es áspero ni opresivo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés del POB pasó de «kind» a «easy» en la revisión más reciente para χρηστός, mientras que la nota mantiene abiertas las posibilidades semánticas del adjetivo. Esta propuesta española adopta «suave» como solución óptima-equivalente que refleja tanto la tradición de «easy» como la gama de benevolencia del griego.
  spanish_consistency_notes:
  - Se conserva el paralelismo entre «yugo» y «carga».
  - Se evita «SEÑOR» porque no hay Tetragrámaton o κύριος aquí.
  - «Suave» se usa aquí como calificación del yugo, no de la carga.
  - «Ligera» mantiene la oposición con «yugo» sin reinterpretar el sentido metafórico.
