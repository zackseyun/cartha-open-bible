  glossary_alignment: No hay conflictos con la terminología del proyecto en nombres divinos o títulos. La distinción metafórica entre «yugo» y «carga» está bien conservada. La única desalineación relevante es que la decisión léxica documentada para χρηστός en el POB inglés revisado es «easy», mientras que el español eligió «suave» basándose en una etapa previa del razonamiento y no en la decisión final auditada.
