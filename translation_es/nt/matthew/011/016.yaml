base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/016.yaml
  text: But to what shall I compare this generation? It is like children sitting in the marketplaces[a], calling out to the others[b],
  footnotes:
  - marker: a
    text: Or 'in the market squares.' The Greek ἀγοραῖς refers to public market areas where people gathered.
    reason: lexical_alternative
  - marker: b
    text: Or 'calling to the other children.' The Greek says 'to the others,' with the identity supplied by the context of the simile.
    reason: lexical_alternative
