revisions:
- from: ¿A qué compararé yo esta generación? Es semejante a niños sentados en las plazas[a], que llaman a los otros[b],
  to: ¿A qué compararé esta generación? Es como niños sentados en las plazas[a], que llaman a los otros[b],
  rationale: Se quita «yo» para evitar un énfasis no requerido por el griego y mejorar la naturalidad del español. Se cambia «Es semejante a» por «Es como» para reflejar de forma más directa y natural ὁμοία ἐστὶν, sin alterar el sentido. Las notas se mantienen porque preservan bien las alternativas léxicas documentadas.
