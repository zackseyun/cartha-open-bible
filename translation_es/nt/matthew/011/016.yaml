  - severity: low
    issue: «Es semejante a» suena más pesado que el griego
    rationale: ὁμοία ἐστὶν es una comparación sencilla. «Es como» comunica el mismo sentido con mayor naturalidad y cercanía al tono directo del original y del POB inglés.
