translation:
  language: es
  text: ¿A qué compararé esta generación? Es como niños sentados en las plazas[a], que llaman a los otros[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las plazas del mercado». El griego ἀγοραῖς se refiere a espacios públicos donde la gente se reunía y comerciaba.
    reason: lexical_alternative
  - marker: b
    text: O «a los otros niños». El griego dice «a los otros»; el contexto de la comparación aporta la identidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίνι
  english_pob_choice: to what
  chosen_spanish: ¿A qué... ?
  alternatives_spanish:
  - ¿Con qué... ?
  - ¿A qué cosa... ?
  lexicon: BDAG
  rationale: El dativo interrogativo pide el estándar de comparación. En español, «¿A qué...?» expresa con naturalidad ese valor sin perder la dirección comparativa del griego.
- source_word: ὁμοιώσω
  english_pob_choice: shall I compare
  chosen_spanish: compararé yo
  alternatives_spanish:
  - compararé
  - debo comparar
  lexicon: BDAG
  rationale: El futuro retórico del griego se vierte con un futuro simple en español; añadir «yo» mantiene el tono deliberativo y la primera persona del original.
- source_word: γενεὰν ταύτην
  english_pob_choice: this generation
  chosen_spanish: esta generación
  alternatives_spanish:
  - esta época
  - este pueblo de esta generación
  lexicon: BDAG
  rationale: «Generación» es la equivalencia estable para γενεά en dichos de Jesús y conserva la referencia al grupo contemporáneo y caracterizado por su respuesta.
- source_word: ὁμοία ἐστὶν
  english_pob_choice: It is like
  chosen_spanish: Es semejante a
  alternatives_spanish:
  - Se parece a
  - Es como
  lexicon: BDAG
  rationale: «Semejante a» mantiene la relación comparativa con un registro un poco más formal y precisa la estructura del predicado de semejanza.
- source_word: παιδίοις
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - muchachos
  - niños pequeños
  lexicon: BDAG
  rationale: El contexto de la escena infantil en la plaza permite «niños» como equivalente natural. No se necesita forzar un diminutivo adicional que el griego no exige aquí.
- source_word: καθημένοις
  english_pob_choice: sitting
  chosen_spanish: sentados
  alternatives_spanish:
  - estando sentados
  - sentándose
  lexicon: BDAG
  rationale: El participio describe postura en curso; «sentados» es la forma española más natural y conserva la escena estática.
- source_word: ἐν ταῖς ἀγοραῖς
  english_pob_choice: in the marketplaces
  chosen_spanish: en las plazas[a]
  alternatives_spanish:
  - en los mercados
  - en las plazas del mercado
  lexicon: BDAG
  rationale: ἀγορά designa el espacio público de reunión y comercio. En español, «plazas» comunica bien el lugar abierto y social; la nota explica que el referente incluye áreas de mercado público. Se evita reducirlo a un mercado estrictamente comercial.
- source_word: προσφωνοῦντα
  english_pob_choice: calling out
  chosen_spanish: que llaman
  alternatives_spanish:
  - que gritan
  - que llaman en voz alta
  lexicon: BDAG
  rationale: El participio indica que los niños se dirigen verbalmente a otros. «Que llaman» es suficientemente amplio y fiel; el contexto ya sugiere la voz pública y audible.
- source_word: τοῖς ἑτέροις
  english_pob_choice: to the others
  chosen_spanish: a los otros[b]
  alternatives_spanish:
  - a los demás
  - a los otros niños
  lexicon: BDAG
  rationale: «Los otros» conserva la indefinición del griego. La nota aclara que el contexto permite entender que son otros niños, pero el texto griego no lo especifica explícitamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que ajustó la sintaxis a «to what shall I compare this generation?», preservando el valor interrogativo/deliberativo del futuro retórico. La versión española sigue esa decisión con «¿A qué compararé yo esta generación?» y mantiene la escena comparativa sin añadir interpretación extra.
  spanish_consistency_notes:
  - Se mantiene «generación» para γενεά, coherente con el uso bíblico estándar y con el auditable sentido del inglés POB.
  - Se traduce ἀγοραῖς con un término de espacio público («plazas») y se documenta la alternativa comercial en nota para no estrechar indebidamente el referente.
  - Se conserva la indefinición de «los otros» para reflejar el griego, dejando la identificación contextual en la nota.
  - El orden y el tono son formales pero naturales en español; no se usa «Cristo», «Señor» ni otros términos no presentes en el verso.
