translation:
  language: es
  text: Entonces, uno de los doce[a], el llamado Judas Iscariote, fue a los sumos sacerdotes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «uno de los Doce».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: BDAG
  rationale: Marca temporal narrativa que introduce la siguiente acción; «Entonces» conserva la secuencia del relato con naturalidad en español.
- source_word: πορευθεὶς
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue y
  - se dirigió
  - habiendo ido
  lexicon: BDAG
  rationale: El participio aoristo de πορεύομαι funciona adverbialmente y la POB inglesa lo vierte con un verbo finito por fluidez; en español, «fue» transmite el movimiento sin forzar una construcción participial áspera.
- source_word: εἷς τῶν δώδεκα
  english_pob_choice: one of the twelve
  chosen_spanish: uno de los doce
  alternatives_spanish:
  - uno de los Doce
  lexicon: BDAG
  rationale: Expresión partitiva estándar. Se mantiene el sentido sin capitalizar el grupo, ya que el griego no lo marca; la alternativa mayúscula queda como posible designación grupal, pero no es obligatoria aquí.
- source_word: ὁ λεγόμενος
  english_pob_choice: the one called
  chosen_spanish: el que se llamaba
  alternatives_spanish:
  - llamado
  - el llamado
  lexicon: BDAG
  rationale: La construcción participial se conserva de manera natural en español con una relativa identificadora. «El que se llamaba» refleja el valor identificador del griego y evita una simplificación excesiva.
- source_word: Ἰούδας Ἰσκαριώτης
  english_pob_choice: Judas Iscariot
  chosen_spanish: Judas Iscariote
  alternatives_spanish:
  - Judas Iscariot
  lexicon: BDAG
  rationale: Nombre propio y epíteto transliterados en forma española habitual y bíblicamente reconocible; «Iscariote» es la adaptación española normal del epíteto.
- source_word: πρὸς τοὺς ἀρχιερεῖς
  english_pob_choice: to the chief priests
  chosen_spanish: a los principales sacerdotes
  alternatives_spanish:
  - a los jefes de los sacerdotes
  - a los sumos sacerdotes
  lexicon: BDAG
  rationale: πρός con acusativo expresa dirección hacia. ἀρχιερεῖς se rinde como «principales sacerdotes» para reflejar el rango/autoridad de los líderes sacerdotales en lenguaje claro y fiel; se evita «sumos sacerdotes» por su posible restricción a una sola figura en español eclesial común.
theological_decisions:
- issue: Designación colectiva de los Doce
  english_pob_reading: one of the twelve
  chosen_spanish_reading: uno de los doce
  alternative_spanish_readings:
  - uno de los Doce
  rationale: No hay carga doctrinal distinta; la decisión afecta solo el modo de presentar el grupo conocido de Jesús. Se preserva el referente sin imponer una capitalización interpretativa.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego y el audit trail inglés, sin introducir expansión interpretativa ni suavizar la identificación de Judas o el destinatario de su acción.
  spanish_consistency_notes:
  - Se usa «Judas Iscariote» como forma española estándar del epíteto.
  - «Principales sacerdotes» mantiene el plural y el rango jerárquico del griego ἀρχιερεῖς.
  - La puntuación conserva la apposición del original y la cadencia narrativa del verso.
