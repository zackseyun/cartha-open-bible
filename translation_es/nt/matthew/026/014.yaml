review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y los referentes del griego: Τότε = «Entonces», εἷς τῶν δώδεκα = «uno de los doce», Ἰούδας Ἰσκαριώτης = «Judas Iscariote», y πρὸς + acusativo = movimiento hacia los sacerdotes. La única desviación significativa está en ὁ λεγόμενος, que en este contexto identificador se preserva mejor como «el llamado» o «el que llaman», no «el que se llamaba», ya que el imperfecto español puede sugerir una designación pasada o meramente nominal no presente en el participio griego.'
  spanish_quality_summary: El español es claro y natural, pero «el que se llamaba Judas Iscariote» suena menos preciso y algo más pesado que una opción más directa. Además, «principales sacerdotes» es comprensible, pero «sumos sacerdotes» es la equivalencia bíblica más reconocible y puede mantenerse en plural sin implicar una sola figura; en este contexto mejora la inteligibilidad eclesial y la alineación con la terminología habitual de ἀρχιερεῖς.
  glossary_alignment: No hay términos del glosario mayor comprometidos aquí. La revisión propuesta mejora la consistencia con la decisión inglesa «the one called» y con la equivalencia estándar de ἀρχιερεῖς como «sumos sacerdotes» en contexto del liderazgo sacerdotal judío.
  issues:
  - severity: medium
    issue: «el que se llamaba» para ὁ λεγόμενος
    rationale: 'El participio presente pasivo/medio funciona como identificador actual: «el llamado» o «el que llaman». «Se llamaba» introduce un matiz imperfectivo/pasado que el griego no exige y debilita la fuerza appositiva preservada por la POB inglesa.'
  - severity: medium
    issue: «principales sacerdotes» para ἀρχιερεῖς
    rationale: Aunque semánticamente defendible, «sumos sacerdotes» es la equivalencia bíblica más establecida y reconocible en español para el plural ἀρχιερεῖς. Aquí no crea ambigüedad intolerable y se alinea mejor con el uso tradicional y académico.
  revised_spanish_text: Entonces, uno de los doce[a], el llamado Judas Iscariote, fue a los sumos sacerdotes,
  revised_footnotes:
  - marker: a
    text: O, «uno de los Doce».
    reason: lexical_alternative
