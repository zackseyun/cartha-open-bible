translation:
  language: es
  text: Y al volver, los encontró durmiendo, porque sus ojos estaban pesados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ojos estaban cargados de sueño».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: coming
  chosen_spanish: llegando
  alternatives_spanish:
  - habiendo venido
  - cuando llegó
  lexicon: BDAG
  rationale: El participio aoristo funciona adverbialmente antes del verbo principal. «Llegando» conserva el flujo participial en español sin añadir una subordinación más interpretativa que el griego no exige.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - una vez más
  lexicon: BDAG
  rationale: Marca repetición. «De nuevo» es natural en español y mantiene el valor adverbial simple del término.
- source_word: εὗρεν
  english_pob_choice: he found
  chosen_spanish: los encontró
  alternatives_spanish:
  - los halló
  - se los encontró
  lexicon: BDAG
  rationale: El verbo de hallazgo narrativo se vierte de forma directa. Se explicita el objeto por el contexto, como en el griego.
- source_word: καθεύδοντας
  english_pob_choice: sleeping
  chosen_spanish: durmiendo
  alternatives_spanish:
  - dormidos
  lexicon: BDAG
  rationale: Es un participio presente que describe un estado en curso. «Durmiendo» conserva mejor el matiz verbal que el adjetival «dormidos».
- source_word: ἦσαν γὰρ
  english_pob_choice: for ... were
  chosen_spanish: porque ... estaban
  alternatives_spanish:
  - pues ... estaban
  - porque ... eran
  lexicon: BDAG
  rationale: γάρ da explicación causal. En español, «porque» expresa con claridad esa relación; «estaban» traduce el estado resultante sin forzar un calco con «eran».
- source_word: οἱ ὀφθαλμοὶ
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de ellos
  lexicon: BDAG
  rationale: La construcción posesiva se naturaliza como «sus ojos», manteniendo el referente plural del texto griego.
- source_word: βεβαρημένοι
  english_pob_choice: were weighed down
  chosen_spanish: estaban cargados
  alternatives_spanish:
  - estaban pesados
  - estaban agobiados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante de pesadez. «Cargados» comunica esa idea en español con suficiente fidelidad y evita una locución demasiado literal o poco idiomática.
translation_notes:
  revision_awareness: 'El texto griego y el registro inglés concuerdan de forma alta; no se observan revisiones aplicadas en el audit trail reciente. La principal decisión abierta es cómo verter βεβαρημένοι: se eligió «estaban cargados» por su equilibrio entre fuerza semántica y naturalidad en español.'
  spanish_consistency_notes:
  - Se mantuvo «de nuevo» para πάλιν en un registro neutral y claro.
  - No se introdujo terminología eclesiástica ajena al pasaje; el foco narrativo queda en el estado físico de los discípulos.
  - La nota al pie conserva la alternativa léxica relevante para βεβαρημένοι, que en español admite tanto «cargados» como «pesados».
