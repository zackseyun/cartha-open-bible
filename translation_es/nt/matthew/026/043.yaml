revisions:
- from: Y llegando de nuevo[a], los encontró durmiendo, porque sus ojos estaban cargados.
  to: Y al volver, los encontró durmiendo, porque sus ojos estaban pesados[a].
  rationale: Se ajusta el inicio a un español más natural («Y al volver») manteniendo el valor adverbial de ἐλθών y la repetición implícita de πάλιν en el contexto inmediato. Se reemplaza «estaban cargados» por «estaban pesados», que encaja mejor con «ojos» y refleja con más fidelidad βεβαρημένοι. También se corrige el anclaje de la nota para que corresponda a la frase a la que realmente comenta. La alternativa de nota se reformula a «cargados de sueño», que sí es idiomática en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:27:06Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa del griego: «y, al venir otra vez, los encontró durmiendo». También conserva adecuadamente la explicación causal de γάρ. Sin embargo, «estaban cargados» para βεβαρημένοι no es la mejor equivalencia contextual para ojos; en español suena poco natural y puede sugerir ''cargados de algo'' más que ''pesados/somnolientos''.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «Y llegando de nuevo» resulta algo tosco al inicio de frase; «Y al volver[a],» fluye mejor en español bíblico-natural sin perder el valor adverbial de ἐλθών + πάλιν. Además, la nota actual está mal anclada: el marcador [a] aparece junto a «de nuevo», pero la nota trata de «sus ojos...», no de «de nuevo».'
  glossary_alignment: 'No hay términos del glosario principal en disputa en este versículo. La principal cuestión léxica es βεβαρημένοι, donde conviene una formulación española idiomática y fiel al campo semántico de pesadez: «estaban pesados[a]» o mejor aún «estaban muy pesados[a]».'
  issues:
  - severity: medium
    issue: «estaban cargados» para βεβαρημένοι
    rationale: Aunque intenta reflejar el pasivo/resultativo, en español aplicado a «ojos» no es idiomático y debilita el sentido de pesadez que explica el sueño.
  - severity: medium
    issue: Marcador de nota en ubicación incorrecta
    rationale: La nota [a] está anclada a «de nuevo», pero el contenido de la nota ofrece una alternativa para «sus ojos estaban pesados». Debe colocarse junto a la frase relevante.
  - severity: low
    issue: «Y llegando de nuevo» suena rígido
    rationale: Es comprensible, pero «Y al volver» o «Y al regresar otra vez» suena más natural en español sin apartarse del sentido fuente.
  revised_spanish_text: Y al volver, los encontró durmiendo, porque sus ojos estaban pesados[a].
  revised_footnotes:
  - marker: a
    text: O «sus ojos estaban cargados de sueño».
    reason: lexical_alternative
  revision_rationale: Se ajusta el inicio a un español más natural («Y al volver») manteniendo el valor adverbial de ἐλθών y la repetición implícita de πάλιν en el contexto inmediato. Se reemplaza «estaban cargados» por «estaban pesados», que encaja mejor con «ojos» y refleja con más fidelidad βεβαρημένοι. También se corrige el anclaje de la nota para que corresponda a la frase a la que realmente comenta. La alternativa de nota se reformula a «cargados de sueño», que sí es idiomática en español.
