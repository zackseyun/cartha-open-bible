translation:
  language: es
  text: Porque esto podía haberse vendido por una gran suma y darse a los pobres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mucho» o «por un alto precio». El griego usa un genitivo de precio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδύνατο
  english_pob_choice: could have been
  chosen_spanish: podía haberse
  alternatives_spanish:
  - habría podido ser
  - podía ser
  lexicon: BDAG
  rationale: El imperfecto de δύναμαι expresa posibilidad en pasado; en español, «podía haberse» mantiene la idea de posibilidad no realizada y funciona de manera natural con la pasiva infinitiva siguiente.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva el valor explicativo o causal de la partícula y enlaza con la queja previa sin sonar excesivamente arcaico.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este perfume
  - este ungüento
  lexicon: BDAG
  rationale: El demostrativo neutro remite al objeto ya mencionado; «esto» respeta la referencia sin añadir un sustantivo que el griego aquí no repite.
- source_word: πραθῆναι
  english_pob_choice: been sold
  chosen_spanish: haberse vendido
  alternatives_spanish:
  - ser vendido
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo de πιπράσκω se expresa de forma idiomática en español con la pasiva refleja/impersonal «haberse vendido».
- source_word: πολλοῦ
  english_pob_choice: for a great deal
  chosen_spanish: por mucho
  alternatives_spanish:
  - por una gran suma
  - por un alto precio
  lexicon: BDAG
  rationale: El genitivo de precio pide una expresión de valor monetario. «Por mucho» conserva la concisión del griego; la nota añade la posibilidad de precio alto o gran suma.
- source_word: δοθῆναι
  english_pob_choice: given
  chosen_spanish: darse
  alternatives_spanish:
  - ser dado
  - entregarse
  lexicon: BDAG
  rationale: El infinitivo pasivo de δίδωμι, coordinado con πραθῆναι, se vierte naturalmente con una construcción reflexiva impersonal en español.
- source_word: πτωχοῖς
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a personas pobres
  lexicon: BDAG
  rationale: El dativo plural sustantivado se traduce como destino/beneficiario con «a los pobres», forma breve y fiel al colectivo griego.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el sentido auditado en la POB inglesa y mantiene la misma decisión clave sobre el genitivo de precio en πολλοῦ; no se registran cambios de revisión relevantes.
  spanish_consistency_notes:
  - Se mantiene «pobres» como colectivo substantivado, en paralelo con el inglés auditado.
  - Se evita introducir el sustantivo «perfume» o «ungüento» para no ir más allá del demostrativo neutro τοῦτο.
  - La puntuación y el orden buscan una lectura natural en español sin perder la conexión explicativa de γάρ.
