source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος ἠκολούθει αὐτῷ ἀπὸ μακρόθεν ἕως τῆς αὐλῆς τοῦ ἀρχιερέως, καὶ εἰσελθὼν ἔσω ἐκάθητο μετὰ τῶν ὑπηρετῶν ἰδεῖν τὸ τέλος.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/058.yaml
  text: But Peter was following him from a distance[a], as far as the courtyard of the high priest. And after going inside[b], he sat with the officers to see the outcome.
  footnotes:
  - marker: a
    text: Or 'with the servants,' 'with the attendants,' or 'with the guards'; the Greek ὑπηρέται can denote subordinate officials or attendants, and the exact nuance depends on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to see the end.' The Greek τὸ τέλος can mean 'the end' more literally, but here likely refers to the outcome of what would happen to Jesus.
    reason: lexical_alternative
