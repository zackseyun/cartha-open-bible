revisions:
- from: Pero Pedro lo seguía desde lejos, hasta el patio[a] del sumo sacerdote. Y, después de entrar adentro, se sentó con los oficiales para ver el desenlace[b].
  to: Pero Pedro lo seguía desde lejos, hasta el patio del sumo sacerdote. Y, después de entrar, se sentó con los oficiales[a] para ver el desenlace[b].
  rationale: Se corrige una expresión poco natural («entrar adentro») y se reubica la nota léxica principal al término que realmente concentra la ambigüedad contextual en el expediente fuente, ὑπηρέται → «oficiales». Se conserva «patio», «sumo sacerdote» y «desenlace» por fidelidad y buena legibilidad en español.
