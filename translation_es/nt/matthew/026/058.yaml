translation:
  language: es
  text: Pero Pedro lo seguía desde lejos, hasta el patio del sumo sacerdote. Y, después de entrar, se sentó con los oficiales[a] para ver el desenlace[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con los servidores», «con los asistentes» o «con los guardias». El griego ὑπηρέται puede referirse a subordinados, ayudantes o agentes del entorno del sumo sacerdote; el matiz exacto depende del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «el fin». El griego τὸ τέλος puede significar más literalmente «el fin», pero aquí probablemente apunta al desenlace de lo que ocurriría con Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθει
  english_pob_choice: was following
  chosen_spanish: lo seguía
  alternatives_spanish:
  - lo estaba siguiendo
  - lo siguió
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso; en español, el imperfecto simple «seguía» comunica esa continuidad de manera natural y fiel.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - de lejos
  lexicon: BDAG
  rationale: «Desde lejos» es idiomático en español y conserva la idea espacial de distancia sin forzar un giro técnico.
- source_word: ἕως τῆς αὐλῆς
  english_pob_choice: as far as the courtyard
  chosen_spanish: hasta el patio
  alternatives_spanish:
  - hasta el atrio
  - hasta el recinto
  lexicon: BDAG
  rationale: αὐλή puede referirse al patio o recinto cercado; «patio» es claro y ampliamente comprensible en español. Mantiene el valor de límite introducido por ἕως.
- source_word: τοῦ ἀρχιερέως
  english_pob_choice: the high priest
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del jefe de los sacerdotes
  - del gran sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la forma natural y precisa en español para ἀρχιερεύς en el relato de la pasión.
- source_word: εἰσελθὼν ἔσω
  english_pob_choice: after going inside
  chosen_spanish: después de entrar adentro
  alternatives_spanish:
  - habiendo entrado
  - al entrar
  lexicon: BDAG
  rationale: La combinación de participio aoristo y adverbio indica una acción previa a la principal. «Después de entrar adentro» preserva la secuencia y el movimiento hacia el interior, aunque suene un poco enfático; se mantiene para no diluir ἔσω.
- source_word: ἐκάθητο
  english_pob_choice: he sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - estaba sentado
  - se halló sentado
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir estado continuo, aquí el contexto narrativo admite un perfecto simple en español que suena natural. Se evita «estaba sentado» para no sobredeterminar una continuidad que el giro español no necesita marcar explícitamente.
- source_word: μετὰ τῶν ὑπηρετῶν
  english_pob_choice: with the officers
  chosen_spanish: con los oficiales
  alternatives_spanish:
  - con los servidores
  - con los asistentes
  - con los guardias
  lexicon: BDAG
  rationale: ὑπηρέται puede designar subordinados/ayudantes del ámbito del sumo sacerdote. «Oficiales» conserva la función de autoridad subordinada sin reducirlos a sirvientes domésticos ni fijarlos como guardias armados.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - a ver
  - para observar
  lexicon: BDAG
  rationale: El infinitivo expresa propósito; «para ver» es la forma más directa y natural en español.
- source_word: τὸ τέλος
  english_pob_choice: the outcome
  chosen_spanish: el desenlace
  alternatives_spanish:
  - el fin
  - el resultado
  lexicon: BDAG
  rationale: τέλος puede significar «fin» o «resultado». En este contexto narrativo, «desenlace» comunica mejor la idea de cómo terminaría el proceso, sin perder la tensión de una culminación que aún está por revelarse.
theological_decisions:
- issue: Valor de αὐλή en el contexto del juicio sacerdotal
  english_pob_reading: courtyard
  chosen_spanish_reading: patio
  alternative_spanish_readings:
  - atrio
  - recinto
  rationale: No hay motivo textual para espiritualizar o domesticar el espacio. «Patio» comunica de forma clara el lugar físico de acceso y vigilancia en el entorno del sumo sacerdote.
  doctrine_reference: Mateo 26:58; léxico de αὐλή en contexto narrativo
- issue: Matiz de τέλος
  english_pob_reading: outcome
  chosen_spanish_reading: desenlace
  alternative_spanish_readings:
  - fin
  - resultado
  rationale: Evita reducir τέλος a una mera finalización temporal. Aquí el interés de Pedro es ver cómo termina el proceso contra Jesús, por lo que «desenlace» mantiene la tensión narrativa sin introducir una interpretación doctrinal ajena.
  doctrine_reference: Mateo 26:58; uso contextual de τέλος
translation_notes:
  revision_awareness: 'La redacción inglesa del POB pasó de «was sitting» a «sat» para reflejar mejor el aoristo y mejorar la naturalidad. En español se optó igualmente por un verbo puntual («se sentó»), manteniendo el orden narrativo: seguimiento continuo, entrada, asiento y propósito de observación.'
  spanish_consistency_notes:
  - Se mantuvo «sumo sacerdote» como término estable para ἀρχιερεύς.
  - Se usó «oficiales» para ὑπηρέται, coherente con la decisión inglesa de no limitarlo a «servants» y con el matiz funcional del contexto.
  - Se tradujo τέλος con un sustantivo de resultado narrativo («desenlace») para conservar la ambigüedad entre fin y resultado sin caer en una calca rígida.
