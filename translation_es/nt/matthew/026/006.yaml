translation:
  language: es
  text: Ahora bien, mientras Jesús estaba en Betania[a], en casa de Simón el leproso[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando Jesús estaba en Betania». El griego usa un genitivo absoluto que sitúa la escena temporalmente.'
    reason: lexical_alternative
  - marker: b
    text: «El leproso» reproduce el epíteto griego aplicado a Simón; por sí solo no especifica si padecía la afección en ese momento o si la había tenido antes.
    reason: cultural_note
lexical_decisions:
- source_word: Τοῦ δὲ Ἰησοῦ γενομένου
  english_pob_choice: while Jesus was
  chosen_spanish: cuando Jesús estaba
  alternatives_spanish:
  - mientras Jesús estaba
  - cuando Jesús se hallaba
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto con γίνομαι funciona aquí como marco circunstancial temporal. En español, «cuando Jesús estaba» comunica ese marco con naturalidad y sin introducir un calco duro como «llegando a ser».
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - y
  - pero
  lexicon: BDAG
  rationale: δέ marca un leve avance narrativo, no una oposición fuerte. «Ahora bien» conserva el matiz transicional en un español digno y fluido.
- source_word: ἐν Βηθανίᾳ
  english_pob_choice: in Bethany
  chosen_spanish: en Betania
  lexicon: BDAG
  rationale: Uso locativo directo del nombre propio de lugar.
- source_word: ἐν οἰκίᾳ
  english_pob_choice: in the house
  chosen_spanish: en casa
  alternatives_spanish:
  - en la casa
  - en el hogar
  lexicon: BDAG
  rationale: οἰκία puede significar casa o hogar. Aquí se trata del lugar físico; «en casa de Simón» suena natural en español y mantiene la referencia a la residencia sin sobretraducir.
- source_word: Σίμωνος
  english_pob_choice: of Simon
  chosen_spanish: de Simón
  lexicon: BDAG
  rationale: Genitivo de posesión que identifica de quién era la casa.
- source_word: τοῦ λεπροῦ
  english_pob_choice: the leper
  chosen_spanish: el leproso
  alternatives_spanish:
  - el hombre con una enfermedad de la piel
  - el que tenía lepra
  lexicon: BDAG
  rationale: Se conserva el epíteto identificador del griego. «El leproso» refleja la fuerza léxica de λεπρός y mantiene la tensión histórica sin precisar indebidamente el estado médico actual de Simón.
theological_decisions:
- issue: Posible inferencia sobre la condición de Simón a partir del epíteto «el leproso»
  english_pob_reading: Retain the narrative identifier 'Simon the leper' without inferring whether he currently had leprosy or had previously been healed.
  chosen_spanish_reading: Mantener «Simón el leproso» como identificador narrativo, sin inferir si tenía la afección en ese momento o si la había tenido antes.
  alternative_spanish_readings:
  - Simón, antes leproso
  - Simón, un hombre con una enfermedad de la piel
  rationale: El griego usa un epíteto de identificación y no aclara ni el momento ni el diagnóstico médico moderno. La traducción no debe añadir una interpretación que el texto no explicita.
  doctrine_reference: Primacía del texto original; preservar la tensión interpretativa en lugar de resolverla por tradición o precisión médica moderna.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador sigue de cerca el consenso alto del audit trail inglés y mantiene las decisiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Jesús» se usa consistentemente para Ἰησοῦς.
  - «el leproso» conserva el epíteto narrativo sin suavizarlo a una perífrasis interpretativa.
  - La puntuación reproduce una cláusula introductoria seguida de la localización y el identificador del anfitrión.
