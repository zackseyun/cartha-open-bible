translation:
  language: es
  text: 'Jesús le dijo[a]: «En verdad te digo que esta misma noche, antes de que cante un gallo[b], me negarás tres veces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta noche». El griego dice literalmente «en esta noche», con énfasis en «esta».
    reason: lexical_alternative
  - marker: b
    text: O «antes de que cante el gallo». El griego no exige artículo definido aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - afirmó
  - respondió
  lexicon: BDAG
  rationale: El verbo narrativo simple pide en español un pasado natural; «dijo» conserva el carácter directo y sobrio del relato sin sobrecargarlo.
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Verdaderamente
  - Ciertamente
  lexicon: BDAG
  rationale: En el uso sinóptico, la fórmula introduce una afirmación solemne de Jesús. «En verdad» transmite la fuerza sin dejar el hebraísmo sin traducir en el texto principal.
- source_word: λέγω σοι
  english_pob_choice: I tell you
  chosen_spanish: te digo
  alternatives_spanish:
  - te lo digo
  - te aseguro
  lexicon: BDAG
  rationale: En español, «te digo» es idiomático y conserva la dirección personal. «Te aseguro» sería más interpretativo.
- source_word: ἐν ταύτῃ τῇ νυκτί
  english_pob_choice: this very night
  chosen_spanish: esta misma noche
  alternatives_spanish:
  - esta noche
  - en esta noche
  - esta noche misma
  lexicon: BDAG
  rationale: La combinación del demostrativo con el sustantivo añade énfasis. «Esta misma noche» preserva esa fuerza mejor que «esta noche».
- source_word: πρὶν ἀλέκτορα φωνῆσαι
  english_pob_choice: before a rooster crows
  chosen_spanish: antes de que cante un gallo
  alternatives_spanish:
  - antes de que cante el gallo
  - antes de que el gallo cante
  lexicon: BDAG
  rationale: El infinitivo griego se vuelve naturalmente una subordinada en español. «Un gallo» refleja el artículo ausente en griego y evita imponer una referencia definida no requerida por el texto.
- source_word: τρὶς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - por tres veces
  - tres ocasiones
  lexicon: BDAG
  rationale: «Tres veces» es claro y fiel; conserva el adverbio de cantidad sin archaismos.
- source_word: ἀπαρνήσῃ
  english_pob_choice: you will deny
  chosen_spanish: me negarás
  alternatives_spanish:
  - me repudiarás
  - me desconocerás
  - me renegarás
  lexicon: BDAG
  rationale: «Negar» es la forma normal y precisa en este contexto de negación personal de Jesús. «Desconocer» o «renegar» introducirían matices menos directos.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: El pronombre objeto directo se mantiene breve y natural; no requiere expansión en español.
theological_decisions:
- issue: Fórmula solemne de Jesús Ἀμὴν λέγω σοι
  english_pob_reading: Truly I tell you
  chosen_spanish_reading: En verdad te digo
  alternative_spanish_readings:
  - Amén, te digo
  - En verdad, te aseguro
  - Amén, en verdad te digo
  rationale: Se conserva la autoridad solemne de la introducción de Jesús sin importar una fórmula litúrgica fija en el cuerpo del texto. La elección mantiene la lectura pública fluida y reverente.
  doctrine_reference: Translation philosophy §6 (lenguaje moderno, claro y reverente)
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete griego y armoniza con la revisión inglesa más reciente, que prefirió una forma natural para «this very night» sin perder el énfasis del demostrativo. También respeta la observación textual de que ἀλέκτορα no obliga a traducir con artículo definido en español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «dijo» para el verbo narrativo simple.
  - «En verdad» conserva la fórmula solemne sin recurrir a «Amén» en el texto principal.
  - «Esta misma noche» reproduce el énfasis demostrativo de ταύτῃ.
  - «Un gallo» evita una determinación no exigida por el griego.
  - «Me negarás tres veces» preserva el objeto directo y el orden natural del español.
