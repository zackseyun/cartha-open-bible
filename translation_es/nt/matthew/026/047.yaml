translation:
  language: es
  text: Y mientras aún hablaba, he aquí, Judas, uno de los doce, vino, y con él una gran multitud con espadas y garrotes[b], de los principales sacerdotes y ancianos del pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «enviada por los principales sacerdotes y ancianos del pueblo». El griego dice más literalmente «de los principales sacerdotes y ancianos del pueblo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «palos». El término griego literalmente se refiere a piezas de madera, aquí probablemente usadas como garrotes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι αὐτοῦ λαλοῦντος
  english_pob_choice: while he was still speaking
  chosen_spanish: mientras él aún hablaba
  alternatives_spanish:
  - mientras todavía hablaba
  - cuando aún estaba hablando
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción contemporánea. «Mientras» reproduce la simultaneidad; «aún» conserva el valor de ἔτι. Se evita una construcción demasiado literal que sonaría forzada en español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - mirad
  lexicon: BDAG
  rationale: La partícula conserva el golpe narrativo y la vividez del relato. «He aquí» es la forma española más estable para mantener ese efecto sin omitir el marcador discursivo.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: εἷς τῶν δώδεκα
  english_pob_choice: one of the twelve
  chosen_spanish: uno de los doce
  alternatives_spanish:
  - uno de los Doce
  lexicon: BDAG
  rationale: La frase partitiva se conserva de manera transparente. Se prefiere minúscula para no convertirla en un título no marcado por el griego.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino
  lexicon: BDAG
  rationale: En español narrativo, «vino» comunica el movimiento hacia la escena de forma natural. Se evita «llegó» porque desplaza el énfasis al arribo más que al venir narrativo del verbo griego.
- source_word: ὄχλος πολὺς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - un gran grupo
  lexicon: BDAG
  rationale: «Multitud» comunica bien el volumen del grupo y mantiene el matiz colectivo. Se elige «gran» para reflejar πολύς; «muchedumbre» es posible, pero suena más enfático y menos neutral.
- source_word: μετὰ μαχαιρῶν
  english_pob_choice: with swords
  chosen_spanish: con espadas
  alternatives_spanish:
  - con cuchillos
  - con dagas
  lexicon: BDAG
  rationale: Aunque μάχαιρα puede abarcar arma cortante de varios tipos, en este contexto de arresto la equivalencia habitual y suficientemente amplia en español es «espadas». Se mantiene la fuerza instrumental sin restringir indebidamente el término a cuchillos domésticos.
- source_word: καὶ ξύλων
  english_pob_choice: and clubs
  chosen_spanish: y garrotes
  alternatives_spanish:
  - y palos
  - y bastones
  lexicon: BDAG
  rationale: ξύλον literalmente es «madera» o «pieza de madera», pero aquí designa un objeto usado como arma. «Garrotes» expresa mejor el sentido instrumental y la intención violenta que «palos» o la literalidad de «madera».
- source_word: ἀπὸ τῶν ἀρχιερέων καὶ πρεσβυτέρων τοῦ λαοῦ
  english_pob_choice: from the chief priests and elders of the people
  chosen_spanish: de parte de los principales sacerdotes y de los ancianos del pueblo
  alternatives_spanish:
  - de los principales sacerdotes y de los ancianos del pueblo
  - enviados por los principales sacerdotes y de los ancianos del pueblo
  lexicon: BDAG
  rationale: ἀπό indica fuente u origen; en este contexto, también sugiere procedencia/comisión. «De parte de» conserva esa relación sin introducir explícitamente un verbo de envío que el griego no usa. «Principales sacerdotes» traduce ἀρχιερεῖς de forma clara y tradicionalmente reconocible, y «ancianos del pueblo» preserva la relación genitiva con λαός.
theological_decisions:
- issue: Grado de explicitación de la comisión por los líderes religiosos
  english_pob_reading: from the chief priests and elders of the people
  chosen_spanish_reading: de parte de los principales sacerdotes y de los ancianos del pueblo
  alternative_spanish_readings:
  - enviados por los principales sacerdotes y de los ancianos del pueblo
  - de los principales sacerdotes y de los ancianos del pueblo
  rationale: El griego usa ἀπό, que marca procedencia/origen, no un verbo explícito de envío. «De parte de» permite inferir autorización o procedencia sin añadir una afirmación más fuerte que la que el texto da de manera directa. Se conserva así la tensión entre origen textual y comisión contextual.
  doctrine_reference: 'Principio de transparencia textual: no importar al texto principal una afirmación que el griego no formula explícitamente.'
translation_notes:
  revision_awareness: Se siguió el último pase revisado, que quedó sin cambios, y se mantuvo el acuerdo alto del control cruzado. La principal decisión sensible fue conservar el valor de ἀπό sin convertirlo en «enviados por» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» no aplicables aquí; no se introdujeron términos doctrinales ajenos al versículo.
  - «He aquí» conserva el marcador discursivo de ἰδοὺ sin añadir contenido interpretativo.
  - «De parte de» intenta reflejar fuente/origen de ἀπό sin sobretraducción.
  - El registro es bíblico y sobrio, evitando arcaísmos innecesarios pero conservando solemnidad narrativa.
