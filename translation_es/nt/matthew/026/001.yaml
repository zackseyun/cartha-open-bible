translation:
  language: es
  text: 'Y cuando[a] Jesús hubo terminado todas estas palabras, les dijo a sus discípulos:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más literal: «Y sucedió que, cuando Jesús terminó todas estas palabras, les dijo a sus discípulos»'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Y aconteció cuando
  lexicon: BDAG
  rationale: La fórmula narrativa semítica se conserva con una introducción temporal natural en español. 'Y cuando' mantiene la función de enlace y el valor temporal sin introducir una frase más pesada como 'sucedió que', que en español moderno puede sonar más marcada de lo necesario.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - después de que
  lexicon: BDAG
  rationale: La conjunción introduce la cláusula temporal. 'Cuando' reproduce de manera directa la relación temporal sin precisar más de lo que el griego expresa.
- source_word: ἐτέλεσεν
  english_pob_choice: had finished
  chosen_spanish: hubo terminado
  alternatives_spanish:
  - había terminado
  - terminó
  lexicon: BDAG
  rationale: El aoristo en la cláusula temporal señala una acción completada antes del verbo principal. 'Hubo terminado' conserva ese valor anterior en un español elevado y compatible con el tono narrativo; 'había terminado' también sería posible, pero 'hubo terminado' suena más sobrio en este contexto.
- source_word: πάντας τοὺς λόγους τούτους
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todos estos dichos
  - todas estas cosas
  lexicon: BDAG
  rationale: λόγους significa literalmente 'palabras' o 'dichos'. Se eligió 'palabras' para preservar la correspondencia léxica y el cierre discursivo característico de Mateo. 'Dichos' es posible, pero menos directo; 'cosas' amplía demasiado el sentido.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les habló y dijo
  lexicon: BDAG
  rationale: El verbo de habla se traduce de manera directa. En español, la estructura 'les dijo' fluye con naturalidad y mantiene el contenido mínimo del griego sin añadir matices.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  lexicon: BDAG
  rationale: '''Discípulos'' es el equivalente normal de μαθηταί. El posesivo αὐτοῦ se refleja con ''sus'', que en español es la forma natural y suficiente para expresar la relación explícita del griego.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y coincide sustancialmente con la lectura inglesa auditada: fórmula narrativa semítica, cláusula temporal, perfecto anterior y referencia a los discípulos de Jesús. No se requieren notas textuales ni variantes interpretativas para este verso.'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para Ἰησοῦς de forma constante.
  - Se conserva 'discípulos' para μαθηταί, conforme al uso estándar del evangelio.
  - No se introduce puntuación o glosa que altere la relación temporal del griego.
