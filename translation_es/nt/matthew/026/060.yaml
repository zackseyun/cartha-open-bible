translation:
  language: es
  text: y no encontraron ninguno[a], aunque muchos falsos testigos se habían presentado. Pero más tarde se presentaron dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hallaron nada»; el griego deja implícito el objeto, referido al testimonio o a la acusación buscados.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ εὗρον
  english_pob_choice: they did not find any
  chosen_spanish: no hallaron nada[a]
  alternatives_spanish:
  - no hallaron ninguno
  - no encontraron nada
  lexicon: BDAG
  rationale: 'εὗρον lleva un objeto implícito en el contexto judicial: no encontraron testimonio útil contra Jesús. En español, «no hallaron nada» comunica de forma natural esa ausencia de resultado, y el adjetivo/pronombre «nada» permite conservar la implicación del objeto sin sobrecargar la frase.'
- source_word: πολλῶν προσελθόντων ψευδομαρτύρων
  english_pob_choice: though many false witnesses had come forward
  chosen_spanish: aunque muchos falsos testigos se habían presentado
  alternatives_spanish:
  - aunque se habían presentado muchos falsos testigos
  - a pesar de que muchos falsos testigos se presentaron
  lexicon: BDAG
  rationale: El genitivo absoluto tiene valor concesivo. «Se habían presentado» refleja bien la acción anterior respecto del verbo principal y suena natural en español. «Falsos testigos» conserva el matiz jurídico de ψευδομάρτυρες mejor que traducciones más generales como «mentirosos».
- source_word: ὕστερον δὲ
  english_pob_choice: But later
  chosen_spanish: Pero después
  alternatives_spanish:
  - Más tarde, sin embargo
  - Luego, pero
  lexicon: BDAG
  rationale: ὕστερον señala un momento posterior en el proceso, y δέ aporta una transición leve. «Pero después» reproduce esa transición de manera breve y fluida en español.
- source_word: προσελθόντες δύο
  english_pob_choice: two came forward
  chosen_spanish: se presentaron dos
  alternatives_spanish:
  - vinieron dos
  - dos se presentaron
  lexicon: BDAG
  rationale: En este contexto de audiencia judicial, προσέρχομαι funciona idiomáticamente como «presentarse». El orden español con verbo primero mantiene la naturalidad de la frase sin perder el dato de que finalmente aparecieron dos testigos.
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantiene la lectura concesiva del genitivo absoluto, el objeto implícito de εὗρον y el valor procesal de προσέρχομαι. No se detectaron revisiones aplicadas en el material fuente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otros equivalentes teológicos porque el versículo no contiene lenguaje divino.
  - «Falsos testigos» se mantiene de manera consistente con el registro jurídico del pasaje.
  - La alternativa en nota conserva la ambigüedad del objeto implícito sin añadir contenido ajeno al texto.
