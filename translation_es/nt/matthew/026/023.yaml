    text: O «me entregará».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: He answered
  chosen_spanish: Él respondió
  alternatives_spanish:
  - Él contestó
  - Respondió
  lexicon: BDAG
  rationale: La combinación participio + verbo finito funciona como una fórmula semítica normal que simplemente introduce la respuesta. En español, «respondió» comunica el mismo valor sin recargar la frase con «y dijo».
- source_word: ἐμβάψας
  english_pob_choice: dipped
  chosen_spanish: mojó
  alternatives_spanish:
  - sumergió
  - había mojado
  lexicon: BDAG
  rationale: El aoristo participial señala la acción ya realizada que identifica al traidor. «Mojó» es un equivalente natural y suficientemente concreto en español; evita sonar demasiado técnico o forzado.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  - conmigo mismo
  lexicon: BDAG
  rationale: «Conmigo» expresa de forma directa la compañía o coincidencia de acción indicada por μετά con genitivo.
- source_word: τὴν χεῖρα
  english_pob_choice: his hand
  chosen_spanish: la mano
  alternatives_spanish:
  - su mano
  - la propia mano
  lexicon: BDAG
  rationale: El griego usa el artículo donde el español puede omitir el posesivo; aquí «la mano» mantiene la referencia sin añadir una posesión que el texto griego no explicita en esta cláusula.
- source_word: ἐν τῷ τρυβλίῳ
  english_pob_choice: in the bowl
  chosen_spanish: en el tazón
  alternatives_spanish:
  - en el plato
  - en el recipiente
  lexicon: BDAG
  rationale: τρύβλιον designa un recipiente para comida, traducible como «tazón» o «plato». «Tazón» resulta claro en español moderno y conserva la imagen de un recipiente común compartido en la mesa.
- source_word: οὗτός
  english_pob_choice: this one
  chosen_spanish: ése
  alternatives_spanish:
  - este
  - él
  lexicon: BDAG
  rationale: El demostrativo es enfático. En español, «ése» conserva el contraste/deixis sin perder naturalidad en el habla directa; la fuerza subrayada del griego se mantiene mejor que con un simple «él».
- source_word: παραδώσει
  english_pob_choice: will betray
  chosen_spanish: me entregará
  alternatives_spanish:
  - me traicionará
  - me entregará en manos de otros
  lexicon: BDAG
  rationale: En este contexto narrativo, παραδίδωμι apunta al acto de entregar a Jesús a sus enemigos. «Me entregará» preserva el valor literal básico; la lectura de traición queda ya implicada por el contexto inmediato y puede entenderse también como «traicionará».
theological_decisions:
- issue: παραδίδωμι en el contexto de Judas
  english_pob_reading: will betray
  chosen_spanish_reading: me entregará
  alternative_spanish_readings:
  - me traicionará
  - me entregará
  rationale: El griego permite tanto el sentido general de «entregar» como el sentido contextual de «traicionar». En español, se opta por «me entregará» para conservar la fuerza lexical básica del verbo y dejar visible la tensión entre el término más literal y la carga narrativa de traición.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y el audit trail inglés, pero ajusta las decisiones léxicas al español natural. Se preserva la tensión entre la traducción literal de παραδίδωμι («entregar») y su fuerza contextual de traición, y se mantiene la posibilidad alternativa para τρυβλίον («plato»).
  spanish_consistency_notes:
  - Se evitó «Cristo» o lenguaje confesional no presente en el versículo.
  - Se prefirió una construcción breve y directa para reflejar la secuencia narrativa.
  - Los demostrativos y el verbo de entrega conservan la identificación enfática del traidor y la ambigüedad contextual del acto.
