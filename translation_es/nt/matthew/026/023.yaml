translation:
  language: es
  text: 'Él respondió[a]: «El que mojó conmigo la mano en el tazón[b]—ése me traicionará[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contestó» o «respondiendo, dijo».
    reason: lexical_alternative
  - marker: b
    text: O «en el plato».
    reason: lexical_alternative
