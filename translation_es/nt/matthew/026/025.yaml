translation:
  language: es
  text: 'Entonces Judas[a], el que lo traicionaba, respondió y dijo: «¿Acaso no soy yo, Rabí?». Él le dijo[b]: «Tú lo has dicho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿No soy yo, Rabí?». La pregunta griega usa una partícula que espera una respuesta negativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Tú lo has dicho». La respuesta de Jesús es una afirmación indirecta.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo funciona idiomáticamente con el verbo de habla siguiente. «Respondió» conserva la función narrativa de réplica sin sonar rígido; junto con «dijo» reproduce el giro semítico del original y la fluidez del registro bíblico.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ marca avance narrativo, no contraste fuerte. «Entonces» expresa el progreso de la escena con naturalidad en español.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  lexicon: Onomastics
  rationale: Nombre propio tradicionalmente transliterado en español; no requiere adaptación.
- source_word: ὁ παραδιδοὺς αὐτὸν
  english_pob_choice: the one betraying him
  chosen_spanish: el que lo estaba entregando
  alternatives_spanish:
  - su traidor
  - el que lo traicionaba
  lexicon: BDAG
  rationale: παραδίδωμι puede significar «entregar, poner en manos de, traicionar». En este contexto de pasión, la idea de traición está presente, pero la imagen literal de «entregar» también es teológicamente importante. «El que lo estaba entregando» conserva el valor aspectual del participio presente y la tensión entre entrega y traición sin reemplazarla por una sola palabra interpretativa.
- source_word: Μήτι ἐγώ εἰμι
  english_pob_choice: Surely it is not I
  chosen_spanish: ¿Acaso no soy yo?
  alternatives_spanish:
  - ¿No soy yo acaso?
  - ¿Soy yo, acaso?
  lexicon: BDAG
  rationale: μήτι introduce una pregunta que espera respuesta negativa. En español, la construcción negativa interrogativa transmite mejor esa expectativa que una afirmación indirecta. «¿Acaso no soy yo?» mantiene la fuerza de la partícula y la ambigüedad retórica del griego.
- source_word: ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabí
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título semítico como vocativo reconocido en español bíblico. «Rabí» comunica mejor el contexto histórico que «Maestro» y evita perder el matiz de trato judío del original.
- source_word: λέγει αὐτῷ
  english_pob_choice: He said to him
  chosen_spanish: Él le dijo
  alternatives_spanish:
  - Jesús le dijo
  - Le dijo
  lexicon: BDAG
  rationale: El sujeto queda implícito en el contexto. «Él le dijo» respeta la economía del griego y funciona bien en narrativa española.
- source_word: Σὺ εἶπας
  english_pob_choice: You have said so
  chosen_spanish: Tú lo has dicho
  alternatives_spanish:
  - Tú dijiste
  - Tú mismo lo has dicho
  lexicon: BDAG
  rationale: La respuesta es una afirmación indirecta que confirma sin repetir de forma plana «sí». «Tú lo has dicho» preserva esa tensión y es una fórmula natural en español, cercana al valor idiomático del griego.
theological_decisions:
- issue: Respuesta de Jesús a la pregunta de Judas
  english_pob_reading: An indirect affirmation of Judas's role as the betrayer
  chosen_spanish_reading: Una afirmación indirecta de que Judas se identifica con la acusación implícita
  alternative_spanish_readings:
  - Una mera evasión sin afirmación
  - Un sí directo
  rationale: El griego Σὺ εἶπας no resuelve la escena con un «sí» explícito ni la deja totalmente abierta. La traducción «Tú lo has dicho» conserva la confirmación indirecta y evita suavizar o sobre-explicar la respuesta de Jesús.
  doctrine_reference: Preservar la tensión textual y la forma indirecta de la afirmación.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y el auditorio inglés de POB. Se mantiene la progresión narrativa con δέ como «Entonces», el participio de χαρακ­terización con una relativa continua («el que lo estaba entregando»), la pregunta de μήτι como interrogación con expectativa negativa, y la respuesta Σὺ εἶπας como afirmación indirecta sin convertirla en un «sí» explícito. Se optó por «Rabí»/«Rabí» con nota para conservar el título semítico, y por «Tú lo has dicho» para reflejar la fórmula idiomática del cierre.
  spanish_consistency_notes:
  - Se usa «entregar» para παραδίδωμι, manteniendo la tensión entre traición y entrega que POB documenta.
  - Se conserva el vocativo «Rabí» sin traducirlo como «Maestro» para no perder el título semítico.
  - La respuesta final no se explicita como «sí», a fin de preservar la ambigüedad afirmativa del griego.
  - La puntuación usa comillas y signos interrogativos españoles de manera estándar.
