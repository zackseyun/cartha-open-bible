translation:
  language: es
  text: 'Él dijo: «Vayan a la ciudad, a cierto hombre[a], y díganle: “El Maestro dice: ‘Mi tiempo está cerca. Celebro[b] la Pascua contigo[c], con mis discípulos’”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a fulano». El griego nombra a una persona específica pero intencionalmente no identificada.
    reason: lexical_alternative
  - marker: b
    text: O «observo la Pascua» o «celebro la Pascua». El modismo griego es literalmente «hago la Pascua».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «contigo»; en contexto puede implicar «en tu casa» o «en tu lugar».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan de aquí
  - Vayan yendo
  lexicon: BDAG
  rationale: El imperativo plural pide movimiento inmediato; «Vayan» es natural en español y conserva el tono directo sin añadir matices no presentes en el griego.
- source_word: πρὸς τὸν δεῖνα
  english_pob_choice: to a certain man
  chosen_spanish: donde tal persona
  alternatives_spanish:
  - a cierto hombre
  - a una persona determinada
  lexicon: BDAG
  rationale: δεῖνα señala a una persona específica pero no nombrada. «Tal persona» mantiene la indeterminación intencional. Se evitó «cierto hombre» porque en español puede sonar más interpretativo sobre el sexo del destinatario que el griego no exige.
- source_word: Ὁ διδάσκαλος
  english_pob_choice: The Teacher
  chosen_spanish: El Maestro
  alternatives_spanish:
  - El Maestro y Señor
  - El Docente
  lexicon: BDAG
  rationale: διδάσκαλος aquí funciona como designación reconocible de Jesús. «Maestro» transmite la relación de enseñanza con naturalidad en español y evita la carga de κύριος que tendría «Señor».
- source_word: Ὁ καιρός μου ἐγγύς ἐστιν
  english_pob_choice: My time is near
  chosen_spanish: Mi tiempo está cerca
  alternatives_spanish:
  - Mi tiempo se acerca
  - Mi momento señalado está cerca
  lexicon: BDAG
  rationale: καιρός puede expresar un tiempo decisivo o señalado. «Mi tiempo está cerca» conserva esa amplitud sin resolver si se refiere solo al arresto, a la cena o al clímax de la misión.
- source_word: πρὸς σὲ
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - en tu casa
  lexicon: BDAG
  rationale: La expresión es idiomática y, en contexto de la cena pascual, apunta a la compañía/ubicación del anfitrión. Se eligió «con ustedes» para reflejar el sentido relacional y situacional sin añadir explícitamente «casa», que el griego no dice.
- source_word: ποιῶ τὸ πάσχα
  english_pob_choice: I am keeping the Passover
  chosen_spanish: Voy a celebrar la Pascua
  alternatives_spanish:
  - Estoy celebrando la Pascua
  - Voy a observar la Pascua
  - Voy a guardar la Pascua
  lexicon: BDAG
  rationale: ποιέω con πάσχα es un modismo para celebrar/observar la Pascua. «Voy a celebrar la Pascua» expresa bien el carácter festivo y evita el literalismo poco natural de «hacer la Pascua».
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Passover
  - la Pascua judía
  lexicon: BDAG
  rationale: La fiesta judía se nombra de forma estándar como «la Pascua» en español bíblico y común. El artículo definido se conserva.
- source_word: μετὰ τῶν μαθητῶν μου
  english_pob_choice: with my disciples
  chosen_spanish: con mis discípulos
  alternatives_spanish:
  - junto con mis discípulos
  - con mis alumnos
  lexicon: BDAG
  rationale: μαθηταί en el Evangelio es el término establecido para los seguidores de Jesús. «Discípulos» mantiene ese sentido técnico y eclesial sin sustituirlo por «alumnos».
theological_decisions:
- issue: Alcance de «mi tiempo»
  english_pob_reading: Rendered as 'My time is near' without specifying whether this refers narrowly to his death, the Passover meal, or the broader culmination of his mission.
  chosen_spanish_reading: «Mi tiempo está cerca» sin precisar si alude solo a la pasión, a la cena pascual o al cumplimiento amplio de su misión.
  alternative_spanish_readings:
  - Mi tiempo señalado está cerca
  - Mi hora está cerca
  rationale: El texto anuncia inminencia, pero no delimita el alcance. Mantener esa amplitud preserva la tensión teológica del pasaje en lugar de cerrarla prematuramente.
  doctrine_reference: Principio POB de preservar tensiones teológicas cuando el texto no las resuelve explícitamente.
translation_notes:
  revision_awareness: El inglés auditado fue revisado una vez para acercar πρὸς σέ a «with you» en vez de «at your house», porque el griego no menciona explícitamente una casa. La versión española sigue esa línea y evita añadir «casa» o «hogar», manteniendo la misma cautela semántica. También se conservó la amplitud de καιρός frente a opciones más interpretativas como «hora».
  spanish_consistency_notes:
  - Se mantuvo «Pascua» como término fijo para πάσχα, siguiendo el uso bíblico español más estable.
  - Se usó «discípulos» para μαθηταί para preservar la terminología cristológica estándar del Evangelio.
  - Se prefirió «Maestro» para διδάσκαλος porque en este contexto funciona como título de Jesús, no como oficio genérico.
  - La formulación de πρὸς σὲ se dejó relacional/situacional («con ustedes») para no introducir una localización no explicitada en el griego.
