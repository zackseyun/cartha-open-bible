    text: O «a fulano». El griego nombra a una persona específica pero intencionalmente no identificada.
    reason: lexical_alternative
  - marker: b
    text: O «observo la Pascua» o «celebro la Pascua». El modismo griego es literalmente «hago la Pascua».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «contigo»; en contexto puede implicar «en tu casa» o «en tu lugar».
    reason: lexical_alternative
  revision_rationale: La revisión corrige la dirección personal de πρὸς τὸν δεῖνα, restaura el singular de πρὸς σέ, reubica correctamente la nota sobre la persona no identificada y ajusta el verbo principal para reflejar mejor el presente griego sin perder naturalidad en español.
