source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ὑπάγετε εἰς τὴν πόλιν πρὸς τὸν δεῖνα καὶ εἴπατε αὐτῷ· Ὁ διδάσκαλος λέγει· Ὁ καιρός μου ἐγγύς ἐστιν· πρὸς σὲ ποιῶ τὸ πάσχα μετὰ τῶν μαθητῶν μου.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/018.yaml
  text: He said[a], “Go into the city to a certain man and tell him, ‘The Teacher says, “My time is near[c][b]. I am keeping the Passover with you with my disciples.”’”
  footnotes:
  - marker: a
    text: Or 'to so-and-so.' The Greek names an intentionally unspecified but particular person.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with you'; the sense in context is 'at your house' or 'at your place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I celebrate the Passover' or 'I observe the Passover.' The Greek idiom is literally 'I do/make the Passover.'
    reason: lexical_alternative
