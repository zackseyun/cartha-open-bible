review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura general del griego y mantiene adecuadamente «El Maestro», «Mi tiempo está cerca» y «con mis discípulos». Sin embargo, hay dos desajustes importantes con la evidencia fuente y con la auditoría inglesa: (1) πρὸς τὸν δεῖνα significa ir «a» una persona no identificada, no «donde tal persona», y (2) πρὸς σὲ es singular («contigo/a tu lugar»), no plural «con ustedes». Además, la nota [a] está mal anclada: el marcador aparece en «Él dijo» pero la nota trata de δεῖνα, no de εἶπεν.'
  spanish_quality_summary: El español es legible, pero «donde tal persona» suena poco natural e impreciso para una instrucción de ir a un individuo específico. «Con ustedes» introduce un cambio de número y enturbia el referente. También conviene evitar «Voy a celebrar» si se quiere reflejar mejor el presente griego y el registro de anuncio inmediato; «celebro/celebraré/celebró» depende del enfoque, pero «celebro» o «celebro la Pascua contigo» es más ceñido al original que el perifrástico futuro próximo.
  glossary_alignment: 'No hay conflicto con la glosa de «Maestro», «Pascua» o «discípulos». La revisión debe alinear mejor πρὸς τὸν δεῖνα como «a cierto hombre» o similar, y πρὸς σέ como singular. Las notas deben seguir la racionalidad POB: preservar la alternativa para δεῖνα y para el modismo ποιῶ τὸ πάσχα; no hace falta una nota separada para «Mi tiempo está cerca» a menos que aporte una ambigüedad real en español.'
  issues:
  - severity: high
    issue: «donde tal persona» no refleja bien πρὸς τὸν δεῖνα
    rationale: πρὸς + acusativo aquí indica dirección hacia una persona específica no nombrada. «Donde» desplaza el foco a lugar y «tal persona» suena forzado en español.
  - severity: high
    issue: «con ustedes» cambia el singular πρὸς σέ a plural
    rationale: El griego se dirige a un anfitrión singular. Cambiar a plural altera el sentido y se aparta de la auditoría inglesa revisada, que conservó «with you» precisamente por fidelidad léxica.
  - severity: medium
    issue: El marcador [a] está anclado al lugar equivocado
    rationale: La nota [a] explica δεῖνα, pero el ancla aparece en «Él dijo». Debe colocarse junto a la expresión correspondiente en el texto español.
  - severity: medium
    issue: «Voy a celebrar» añade matiz prospectivo no explícito
    rationale: ποιῶ está en presente. Aunque en contexto puede referirse a una acción inminente, «celebro» conserva mejor la forma y sigue siendo natural en español bíblico moderno.
  revised_spanish_text: 'Él dijo: «Vayan a la ciudad, a cierto hombre[a], y díganle: “El Maestro dice: ‘Mi tiempo está cerca. Celebro[b] la Pascua contigo[c], con mis discípulos’”».'
  revised_footnotes:
