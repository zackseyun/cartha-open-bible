revisions:
- from: 'Él dijo[a]: «Vayan a la ciudad, donde tal persona, y díganle: “El Maestro dice: ‘Mi tiempo está cerca[c]. Voy a celebrar[b] la Pascua con ustedes, con mis discípulos’”».'
  to: 'Él dijo: «Vayan a la ciudad, a cierto hombre[a], y díganle: “El Maestro dice: ‘Mi tiempo está cerca. Celebro[b] la Pascua contigo[c], con mis discípulos’”».'
  rationale: La revisión corrige la dirección personal de πρὸς τὸν δεῖνα, restaura el singular de πρὸς σέ, reubica correctamente la nota sobre la persona no identificada y ajusta el verbo principal para reflejar mejor el presente griego sin perder naturalidad en español.
