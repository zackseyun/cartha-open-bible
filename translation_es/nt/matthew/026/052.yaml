translation:
  language: es
  text: 'Entonces Jesús le dijo: «Devuelve tu espada a su lugar, porque todos los que toman espada[a] perecerán por la espada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toman la espada»; la expresión probablemente significa recurrir a la fuerza violenta, no solo agarrar un arma.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Entonces, en ese momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa inmediata de manera natural en español y conserva el valor temporal del adverbio.
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo es más natural el pretérito simple sin perder el sentido.
- source_word: Ἀπόστρεψον
  english_pob_choice: Put ... back
  chosen_spanish: Vuelve ... a su lugar
  alternatives_spanish:
  - Pon ... de nuevo
  - Devuelve ... a su lugar
  lexicon: BDAG
  rationale: El imperativo apunta a restituir la espada a su sitio. «Vuelve» comunica el giro de regresar/recolocar con buen español y sin endurecer el matiz idiomático.
- source_word: τὴν μάχαιράν σου
  english_pob_choice: your sword
  chosen_spanish: tu espada
  alternatives_spanish:
  - tu daga
  - tu arma
  lexicon: BDAG
  rationale: «Espada» es la equivalencia más clara y tradicional en la escena; mantiene el valor convencional de μάχαιρα sin forzar una precisión de arma menor que el contexto no exige.
- source_word: εἰς τὸν τόπον αὐτῆς
  english_pob_choice: back in its place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - en su lugar
  - a su sitio
  lexicon: BDAG
  rationale: La frase expresa restitución al sitio propio. En español, «a su lugar» conserva naturalidad y la idea de devolverla donde corresponde.
- source_word: πάντες γὰρ οἱ λαβόντες μάχαιραν
  english_pob_choice: for all who take up the sword
  chosen_spanish: porque todos los que toman espada
  alternatives_spanish:
  - porque todos los que toman la espada
  - porque todos los que toman la espada para usarla
  lexicon: BDAG
  rationale: Se mantiene el valor gnómico/generalizante. Omitir el artículo definido en español refleja mejor el matiz proverbial del griego y evita convertirlo en una referencia a un objeto específico.
- source_word: ἐν μαχαίρῃ
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - con la espada
  - a espada
  lexicon: BDAG
  rationale: La construcción instrumental/proverbial se expresa de forma natural con «por la espada» en español, conservando el paralelismo.
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - morirán
  lexicon: BDAG
  rationale: «Perecerán» preserva la gravedad proverbial del futuro de ἀπόλλυμι sin especificar más de lo que el griego dice.
theological_decisions:
- issue: Alcance del dicho sobre la espada
  english_pob_reading: Render as a general principle without narrowing it to an absolute prohibition of all force or to a prediction only about this moment.
  chosen_spanish_reading: 'Se traduce como principio general: «todos los que toman espada perecerán por la espada».'
  alternative_spanish_readings:
  - una prohibición absoluta de toda fuerza
  - una advertencia limitada solo a la situación inmediata de Pedro
  rationale: El griego usa una formulación general («todos los que...»). La traducción conserva ese alcance proverbial sin imponer una postura doctrinal más estrecha que el texto no formula explícitamente.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el presente borrador sigue la alineación de alta concordancia con el texto griego y con la solución auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio estándar.
  - Se usa «espada» para μάχαιρα por claridad y equivalencia funcional en este contexto narrativo.
  - Se conserva el paralelo proverbial con dos apariciones de «espada» en la misma línea.
  - La puntuación reproduce un estilo publicable y reverente en español contemporáneo.
