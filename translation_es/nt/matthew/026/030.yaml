translation:
  language: es
  text: Y después de cantar un himno[a], salieron al Monte de los Olivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de cantar alabanza». El verbo griego puede referirse de manera general a cantar alabanza, aunque «cantar un himno» encaja bien con el contexto inmediato de la cena y con el uso común.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμνήσαντες
  english_pob_choice: after singing a hymn
  chosen_spanish: después de cantar un himno
  alternatives_spanish:
  - habiendo cantado
  - después de cantar alabanzas
  lexicon: BDAG
  rationale: El participio aoristo de ὑμνέω expresa una acción previa de cantar alabanza/himno. En español, «después de cantar un himno» conserva el valor antecedente del participio y suena natural en un contexto litúrgico o de mesa.
- source_word: ἐξῆλθον
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se fueron
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι indica simplemente salida o partida. «Salieron» es la equivalencia más directa y idiomática en español.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  english_pob_choice: to the Mount of Olives
  chosen_spanish: al Monte de los Olivos
  alternatives_spanish:
  - al monte de las olivas
  - al Monte de Olivos
  lexicon: BDAG
  rationale: Se preserva el topónimo establecido. «Monte de los Olivos» transmite correctamente el nombre geográfico sin volverlo una descripción torpe en español.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple conserva la coordinación narrativa sin introducir una relación temporal más fuerte que la del griego.
translation_notes:
  revision_awareness: El texto griego y el expediente inglés muestran acuerdo alto y no requieren revisión sustantiva; se mantiene la equivalencia óptima sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se conserva «Monte de los Olivos» como topónimo tradicional y exacto.
  - Se usa «himno» en singular para reflejar el giro idiomático del inglés auditado y el uso natural en español, sin excluir la alternativa general de alabanza.
  - No se introduce vocabulario teológico ajeno al versículo.
