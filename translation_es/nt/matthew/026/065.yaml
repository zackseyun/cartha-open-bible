  rationale: 'Se corrigen las notas para que reflejen fielmente el rastro auditado: la alternativa léxica se aplica a la pregunta sobre los testigos, y la nota cultural se ancla al gesto de rasgar las vestiduras. Además, se cambia «Miren» por «Vean» para un registro más formal y mejor alineado con «See».'
