translation:
  language: es
  text: 'Entonces el sumo sacerdote rasgó sus vestiduras[b], diciendo: «¡Ha blasfemado! ¿Qué más necesidad tenemos de testigos?[a] Vean, ahora han oído la blasfemia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué otra necesidad tenemos de testigos?»'
    reason: lexical_alternative
  - marker: b
    text: El rasgarse las vestiduras era una señal pública de conmoción, dolor u horror.
    reason: cultural_note
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Conecta la acción con la secuencia narrativa inmediata. «Entonces» es natural, formal y conserva el valor temporal/discursivo de τότε sin añadir matiz interpretativo.
- source_word: ὁ ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el principal sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente normal y preciso en español para el cargo singular de ἀρχιερεύς en contexto judío.
- source_word: διέρρηξεν
  english_pob_choice: tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: BDAG
  rationale: El verbo expresa un acto de rasgar las vestiduras. «Rasgó» conserva mejor la fuerza ritual y pública del gesto que «rompió».
- source_word: τὰ ἱμάτια αὐτοῦ
  english_pob_choice: his garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus ropas
  - sus vestidos
  lexicon: BDAG
  rationale: «Vestiduras» preserva el registro formal y ceremonial de ἱμάτια. En español comunica mejor que «ropa» la gravedad del gesto del sumo sacerdote.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Mantiene la vinculación participial con la acción anterior sin sobrecargar la sintaxis española.
- source_word: Ἐβλασφήμησεν
  english_pob_choice: He has blasphemed
  chosen_spanish: ¡Ha blasfemado!
  alternatives_spanish:
  - ¡Ha blasfemado contra Dios!
  - ¡Ha proferido blasfemia!
  lexicon: BDAG
  rationale: El aoristo exclamativo se vierte con presente perfecto para reproducir la inmediatez acusatoria del habla judicial. «Blasfemado» conserva el término teológico/legal central.
- source_word: τί ἔτι χρείαν ἔχομεν μαρτύρων;
  english_pob_choice: What further need do we have of witnesses?
  chosen_spanish: ¿Qué más necesidad tenemos de testigos?
  alternatives_spanish:
  - ¿Qué otra necesidad tenemos de testigos?
  - ¿Para qué necesitamos aún testigos?
  lexicon: BDAG
  rationale: La construcción con χρείαν ἔχειν se expresa con una formulación idiomática española que conserva el tono formal e interrogativo. «Qué más necesidad» refleja bien el sentido de «further need».
- source_word: ἴδε
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Ve
  lexicon: BDAG
  rationale: Imperativo deíctico que llama la atención de los oyentes. En español, el plural «Miren» encaja con la situación forense y la dirección colectiva del discurso.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - en este momento
  lexicon: BDAG
  rationale: Conserva la inmediatez temporal señalada por el griego y la versión inglesa auditada.
- source_word: ἠκούσατε
  english_pob_choice: you have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - han escuchado
  - oyeron
  lexicon: BDAG
  rationale: Se refiere a los oyentes presentes como grupo. En español, «han oído» refleja el efecto inmediato y la responsabilidad del testimonio recién escuchado.
- source_word: τὴν βλασφημίαν
  english_pob_choice: the blasphemy
  chosen_spanish: la blasfemia
  alternatives_spanish:
  - esta blasfemia
  - la expresión blasfema
  lexicon: BDAG
  rationale: Se conserva el sustantivo definido para reproducir la acusación jurídica y religiosa del sumo sacerdote sin suavizarla.
theological_decisions:
- issue: La acusación de blasfemia debe mantenerse como juicio del sumo sacerdote, no como evaluación narrativa del evangelista
  english_pob_reading: Use 'blasphemed' / 'the blasphemy' in the main text as the high priest's charge, without implying the narrator endorses the accusation.
  chosen_spanish_reading: Usar «ha blasfemado» / «la blasfemia» en el texto principal como cargo del sumo sacerdote, sin sugerir que el narrador lo aprueba.
  alternative_spanish_readings:
  - «ha hablado irreverentemente»
  - «ha proferido una blasfemia»
  rationale: La escena es judicial y polémica. Mantener el lenguaje fuerte preserva la tensión histórica y teológica del pasaje, dejando que el contexto narrativo muestre que se trata de la acusación del sumo sacerdote.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: El gesto de rasgar las vestiduras requiere conservar su valor cultural
  english_pob_reading: The high priest's tearing of his garments was a public sign of shock, grief, or outrage.
  chosen_spanish_reading: El rasgarse las vestiduras se entiende como un signo público de conmoción, dolor u horror.
  alternative_spanish_readings:
  - un gesto público de sorpresa, duelo o indignación
  - una señal pública de escándalo y enojo
  rationale: Aunque el significado cultural no siempre debe ampliarse en el texto principal, es importante conservar la carga ceremonial y pública del gesto en la nota, porque explica por qué el verbo y el sustantivo no se deben banalizar.
  doctrine_reference: 'Translation philosophy #3; cultural context of Second Temple Jewish practice'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último pase revisado del texto inglés auditado: se mantuvo la formalidad de «What further need do we have of witnesses?» con «¿Qué más necesidad tenemos de testigos?», y se prefirió «Miren» como equivalente natural y colectivo de «See» en un contexto judicial. También se conservó el término fuerte «blasfemó/blasfemia» para reflejar la acusación del sumo sacerdote sin suavizarla.'
  spanish_consistency_notes:
  - Se usa «sumo sacerdote» de forma consistente para ὁ ἀρχιερεύς.
  - Se usa «blasfemó / blasfemia» para βλασφημέω / βλασφημία, manteniendo el registro jurídico-teológico.
  - «Vestiduras» conserva el tono formal de ἱμάτια y armoniza con el valor cultural del gesto.
  - La segunda persona plural implícita en ἠκούσατε se refleja con «han oído» para el grupo presente.
