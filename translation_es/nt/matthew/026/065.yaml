  text: τότε ὁ ἀρχιερεὺς διέρρηξεν τὰ ἱμάτια αὐτοῦ ⸀λέγων· Ἐβλασφήμησεν· τί ἔτι χρείαν ἔχομεν μαρτύρων; ἴδε νῦν ἠκούσατε τὴν ⸀βλασφημίαν·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/065.yaml
  text: Then the high priest tore his garments[a], saying, “He has blasphemed! What further need do we have of witnesses? See[b], now you have heard the blasphemy.”
