  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Cristo, esclavo, etc. «Escrituras» para γραφαί y «profetas» para προφητῶν están bien alineados con la evidencia y el razonamiento documentado.
