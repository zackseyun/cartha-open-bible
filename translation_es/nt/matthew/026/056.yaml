translation:
  language: es
  text: Pero todo esto ha sucedido para que se cumplieran las Escrituras de los profetas. Entonces todos los discípulos lo dejaron[a] y huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo abandonaron»; el participio ἀφέντες puede expresar en este contexto una deserción más fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δὲ ὅλον
  english_pob_choice: But all this
  chosen_spanish: Pero todo esto
  alternatives_spanish:
  - Ahora todo esto
  - Pero esta situación toda
  lexicon: BDAG
  rationale: La expresión apunta al conjunto del acontecimiento previo. «Pero todo esto» conserva el sentido global y el matiz adversativo leve de δέ sin volverlo pesado en español.
- source_word: γέγονεν
  english_pob_choice: has happened
  chosen_spanish: ha sucedido
  alternatives_spanish:
  - ha acontecido
  - ha ocurrido
  lexicon: BDAG
  rationale: El perfecto de γίνομαι presenta un hecho ya ocurrido con relevancia presente. «Ha sucedido» es natural en español y mantiene esa fuerza mejor que un pasado simple.
- source_word: ἵνα πληρωθῶσιν
  english_pob_choice: so that ... might be fulfilled
  chosen_spanish: para que se cumplieran
  alternatives_spanish:
  - a fin de que se cumplieran
  - para que fueran cumplidas
  lexicon: BDAG
  rationale: La construcción final con ἵνα y subjuntivo se expresa bien con «para que». «Se cumplieran» conserva el valor pasivo y el matiz de realización plena del verbo πληρόω.
- source_word: αἱ γραφαὶ
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - los escritos sagrados
  - las Sagradas Escrituras
  lexicon: BDAG
  rationale: Aquí γραφαί se refiere a las Escrituras en sentido canónico, no a escritos generales. «Las Escrituras» es la forma breve y fiel al uso bíblico.
- source_word: τῶν προφητῶν
  english_pob_choice: of the prophets
  chosen_spanish: de los profetas
  alternatives_spanish:
  - proferidas por los profetas
  - escritas por los profetas
  lexicon: BDAG
  rationale: El genitivo se deja conciso sin expandirlo. «De los profetas» preserva la referencia a la tradición profética sin introducir una precisión no explícita en el griego.
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - En ese momento
  lexicon: BDAG
  rationale: Marca la secuencia narrativa. «Entonces» es el equivalente natural y claro en español.
- source_word: οἱ μαθηταὶ πάντες
  english_pob_choice: all the disciples
  chosen_spanish: todos los discípulos
  alternatives_spanish:
  - los discípulos, todos ellos
  - todos sus discípulos
  lexicon: BDAG
  rationale: «Todos» conserva la totalidad enfática de πάντες. Se omite «sus» porque el griego no lo dice explícitamente, aunque el contexto lo sugiera.
- source_word: ἀφέντες αὐτὸν
  english_pob_choice: left him
  chosen_spanish: lo dejaron
  alternatives_spanish:
  - lo abandonaron
  - habiéndolo abandonado
  lexicon: BDAG
  rationale: El participio de ἀφίημι puede significar simplemente «dejar» o, con más fuerza, «abandonar». Se eligió «lo dejaron» en el texto principal por fluidez, manteniendo la posibilidad más fuerte en la nota.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron corriendo
  lexicon: BDAG
  rationale: «Huyeron» reproduce con precisión el sentido de φυγή/fleeing y conserva el tono narrativo sobrio de la escena.
theological_decisions:
- issue: Lenguaje de cumplimiento profético
  english_pob_reading: 'Retain explicit fulfillment wording: ''so that the Scriptures of the prophets might be fulfilled.'''
  chosen_spanish_reading: 'Mantener el lenguaje explícito de cumplimiento: «para que se cumplieran las Escrituras de los profetas».'
  alternative_spanish_readings:
  - para que se realizara lo escrito por los profetas
  - para que se cumpliera lo que dijeron los profetas
  rationale: Mateo subraya aquí el motivo de cumplimiento de la Escritura. La traducción conserva esa estructura y no la diluye en una paráfrasis más libre.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Ambigüedad de ἀφέντες en contexto de deserción
  english_pob_reading: Or 'having abandoned him'; the participle ἀφέντες can carry the stronger sense of desertion in context.
  chosen_spanish_reading: «lo dejaron» en el texto principal, con la posibilidad de «lo abandonaron» reconocida como alternativa contextual.
  alternative_spanish_readings:
  - lo abandonaron
  - lo dejaron, abandonándolo
  rationale: El contexto de la huida justifica una nota que preserve la tensión entre dejar y abandonar. Así no se pierde la fuerza potencial de deserción que el griego permite.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: Se ha revisado la redacción para conservar el valor narrativo y el motivo de cumplimiento profético, siguiendo de cerca el griego y el expediente auditado en inglés. No se requieren revisiones adicionales respecto del pasaje base revisado más reciente.
  spanish_consistency_notes:
  - Se usa «Mesías» solo cuando el texto lo exija; aquí no aparece.
  - Se mantiene «Escrituras» para γραφαί conforme al uso bíblico canónico.
  - Se evita introducir «Señor» o perífrasis teológicas no presentes en el versículo.
  - La nota al pie se ancla en el participio ἀφέντες mediante [a] en el texto español.
