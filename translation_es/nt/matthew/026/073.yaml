translation:
  language: es
  text: 'Al poco rato[a], los que estaban allí se acercaron y dijeron a Pedro: «Ciertamente tú también eres uno de ellos, porque tu acento[b] lo hace evidente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Poco después». La expresión griega indica un breve intervalo de tiempo.
    reason: lexical_alternative
  - marker: b
    text: O «tu habla» o «tu manera de hablar». La palabra griega λαλιά puede significar habla, modo de hablar o acento.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ μικρὸν
  english_pob_choice: After a little while
  chosen_spanish: Después de un poco
  alternatives_spanish:
  - Un poco después
  - Al cabo de un poco
  lexicon: BDAG
  rationale: La expresión indica un breve intervalo temporal. «Después de un poco» conserva la idea idiomática sin forzar un calco demasiado rígido.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ solo enlaza la narración; en español puede quedar implícito sin perder el avance del relato.
- source_word: προσελθόντες
  english_pob_choice: came up
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron hacia él
  lexicon: BDAG
  rationale: El participio aoristo expresa movimiento hacia Pedro. «Se acercaron» es natural en español y mantiene la acción previa al dicho.
- source_word: οἱ ἑστῶτες
  english_pob_choice: those standing there
  chosen_spanish: los que estaban allí
  alternatives_spanish:
  - los que estaban de pie allí
  - los presentes
  lexicon: BDAG
  rationale: La frase describe a las personas que se hallaban allí. «Los que estaban allí» conserva la referencia sin introducir una interpretación más fuerte como «presentes».
- source_word: εἶπον τῷ Πέτρῳ
  english_pob_choice: said to Peter
  chosen_spanish: dijeron a Pedro
  alternatives_spanish:
  - le dijeron a Pedro
  - hablaron a Pedro
  lexicon: BDAG
  rationale: Es la construcción normal de λέγω con dativo indirecto. «Dijeron a Pedro» es claro y formalmente cercano.
- source_word: Ἀληθῶς
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Verdaderamente
  - Sin duda
  lexicon: BDAG
  rationale: La partícula introduce una afirmación segura en tono de reconocimiento/acusación. «Ciertamente» transmite esa convicción en español actual.
- source_word: καὶ σὺ
  english_pob_choice: you also
  chosen_spanish: tú también
  alternatives_spanish:
  - también tú
  - hasta tú
  lexicon: BDAG
  rationale: La combinación enfatiza la inclusión de Pedro con el grupo. «Tú también» preserva el orden natural en español y la fuerza inclusiva.
- source_word: ἐξ αὐτῶν
  english_pob_choice: one of them
  chosen_spanish: eres uno de ellos
  alternatives_spanish:
  - eres de ellos
  - perteneces a ellos
  lexicon: BDAG
  rationale: La expresión comunica pertenencia/afiliación al grupo. «Uno de ellos» refleja el valor idiomático mejor que una traducción literal de la preposición.
- source_word: καὶ γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La construcción introduce la razón de la afirmación. En español, «porque» comunica con claridad el vínculo explicativo y el tono argumentativo.
- source_word: ἡ λαλιά σου
  english_pob_choice: your accent
  chosen_spanish: tu habla
  alternatives_spanish:
  - tu manera de hablar
  - tu acento
  lexicon: BDAG
  rationale: λαλιά puede referirse al habla, al modo de hablar o al acento. Se eligió «tu habla» para mantener la amplitud semántica sin restringir prematuramente el sentido a un acento técnico.
- source_word: δῆλόν σε ποιεῖ
  english_pob_choice: makes it evident
  chosen_spanish: te delata
  alternatives_spanish:
  - te hace evidente
  - hace evidente quién eres
  - te revela
  lexicon: BDAG
  rationale: La frase literalmente dice que su habla lo hace manifiesto/evidente. «Te delata» recoge el efecto comunicativo en el contexto de sospecha, sin perder la idea de exposición implícita.
theological_decisions:
- issue: La fuerza de identificación por el habla en una escena de negación de Jesús
  english_pob_reading: your accent makes it evident
  chosen_spanish_reading: tu habla te delata
  alternative_spanish_readings:
  - tu acento lo hace evidente
  - tu manera de hablar te delata
  rationale: El texto no formula una doctrina, pero sí muestra cómo el modo de hablar evidencia pertenencia. La traducción evita neutralizar la implicación social del momento.
  doctrine_reference: Ninguna; observación narrativa-contextual
- issue: Mantenimiento de la relación de pertenencia expresada por ἐξ αὐτῶν
  english_pob_reading: one of them
  chosen_spanish_reading: uno de ellos
  alternative_spanish_readings:
  - de ellos
  - perteneciente a ellos
  rationale: La acusación apunta a la asociación de Pedro con el grupo de Jesús. «Uno de ellos» conserva esa afiliación sin exagerarla.
  doctrine_reference: Ninguna; cuestión semántica narrativa
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y toma en cuenta la revisión inglesa más reciente, que eliminó el «even» añadido y dejó la idea en «your accent makes it evident». En español se optó por una formulación que preserve la simplicidad de la escena y la relación causal sin introducir intensificadores no requeridos por el griego.
  spanish_consistency_notes:
  - Se mantiene «Pedro» para Πέτρος y el tratamiento directo en segunda persona singular.
  - Se usa «Dios/Yahvé/Cristo» por defecto en otros contextos del proyecto, pero este versículo no los contiene.
  - Se conserva un registro narrativo claro y digno, evitando arcaísmos innecesarios.
  - La nota sobre λαλιά se ancla en el término «habla» para reflejar la alternativa semántica sin sobrecargar el texto principal.
