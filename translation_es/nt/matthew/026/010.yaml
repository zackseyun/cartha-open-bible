revisions:
- from: 'Pero Jesús, al saber esto, les dijo: «¿Por qué están molestando a la mujer? Porque ella ha hecho una obra bella para mí».'
  to: 'Pero Jesús, al saber esto, les dijo: «¿Por qué están molestando a la mujer? Porque ella ha hecho una hermosa obra para mí».'
  rationale: Se ajusta únicamente «obra bella» a «hermosa obra» para lograr un español más natural y ampliamente legible, manteniendo el matiz de elogio estético-moral de καλὸν documentado en el POB. No hacen falta notas adicionales porque no se introduce nueva ambigüedad y el inglés ya trató las alternativas como opcionales, no obligatorias.
