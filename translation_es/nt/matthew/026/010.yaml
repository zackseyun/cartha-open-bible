translation:
  language: es
  text: 'Pero Jesús, al saber esto, les dijo: «¿Por qué están molestando a la mujer? Porque ella ha hecho una hermosa obra para mí».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γνοὺς
  english_pob_choice: knowing this
  chosen_spanish: al saber esto
  alternatives_spanish:
  - sabiendo esto
  - conociendo esto
  lexicon: BDAG
  rationale: El participio aoristo expresa acción circunstancial previa a la declaración de Jesús. «Al saber esto» comunica la relación temporal y causal sin volver el español rígido ni añadir información ajena al contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro suave y contrastivo frente a la queja implícita. «Pero» mantiene el contraste y el tono correctivo del dicho de Jesús.
- source_word: Τί κόπους παρέχετε
  english_pob_choice: Why are you troubling
  chosen_spanish: ¿Por qué están molestando
  alternatives_spanish:
  - ¿Por qué molestan?
  - ¿Por qué están causando problemas?
  lexicon: BDAG
  rationale: La combinación de κόπους con παρέχω comunica la idea de causar molestias o dificultades. «Están molestando» preserva la fuerza reprochadora en un español natural; no se optó por un sustantivo más abstracto para no debilitar la reprensión.
- source_word: τῇ γυναικί
  english_pob_choice: the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - para la mujer
  - a esa mujer
  lexicon: BDAG
  rationale: El dativo con παρέχω puede reflejar al afectado por la acción. «A la mujer» es la correspondencia más directa y natural en español dentro del reproche.
- source_word: ἔργον καλὸν
  english_pob_choice: a beautiful work
  chosen_spanish: una obra bella
  alternatives_spanish:
  - una buena obra
  - un noble acto
  - una obra buena
  lexicon: BDAG
  rationale: καλός aquí no se limita a bondad moral; también conserva una valoración estética y digna. «Obra bella» mantiene esa amplitud semántica mejor que «buena obra», que en español puede sonar más genérica o moralizada.
- source_word: ἠργάσατο
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha realizado
  lexicon: BDAG
  rationale: El perfecto español refleja bien la acción completada con relevancia inmediata en el discurso. «Ha hecho» es idiomático con «obra» y conserva la simpleza del griego.
- source_word: εἰς ἐμέ
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - por mí
  - hacia mí
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir dirección, en este contexto la relación es de beneficio y orientación hacia Jesús. «Para mí» preserva naturalmente ese matiz, en línea con la revisión del POB en inglés.
theological_decisions:
- issue: Valoración de la acción de la mujer
  english_pob_reading: a beautiful work
  chosen_spanish_reading: una obra bella
  alternative_spanish_readings:
  - una buena obra
  - un noble acto
  rationale: La traducción conserva la valoración positiva sin añadir mérito sacramental ni reinterpretación doctrinal. «Bella» preserva el matiz elogioso-estético que el POB documenta en inglés.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir una formulación directa para κόπους παρέχετε y al entender εἰς ἐμέ como una relación natural de beneficio/orientación expresada en español por «para mí». También se retiene el valor elogioso de καλός con «bella», en lugar de reducirlo a «buena».
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y sobrio, sin recurrir a arcaísmos innecesarios.
  - «Mujer» traduce τῇ γυναικί sin añadir cercanía o desprecio no presentes en el texto.
  - «Obra bella» conserva la tensión entre valoración moral y estética.
  - No se introducen notas al pie porque no hay marcas ancladas en el texto ni ambigüedad adicional que deba resolverse aquí.
