translation:
  language: es
  text: y conspiraron[b] para prender a Jesús con engaño[a] y matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a escondidas». El término griego puede denotar engaño, astucia o proceder clandestino.
    reason: lexical_alternative
  - marker: b
    text: O «tramaron» / «tomaron consejo juntos».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεβουλεύσαντο
  english_pob_choice: they conspired
  chosen_spanish: conspiraron
  alternatives_spanish:
  - plottearon
  - tomaron consejo juntos
  - se confabularon
  lexicon: BDAG
  rationale: El verbo medio aquí expresa deliberación conjunta con intención hostil en el contexto. «Conspiraron» comunica con naturalidad tanto el acuerdo colectivo como la mala intención, mejor que una expresión neutral como «tomaron consejo juntos».
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - con el fin de
  - para que
  lexicon: BDAG
  rationale: La cláusula es final. En español, «para» expresa de manera natural el propósito de la acción sin añadir perífrasis innecesaria.
- source_word: κρατήσωσιν
  english_pob_choice: seize
  chosen_spanish: prender
  alternatives_spanish:
  - apresar
  - capturar
  - tomar
  lexicon: BDAG
  rationale: κρατέω tiene el sentido de tomar o agarrar con fuerza. En este contexto narrativo y judicial, «prender» comunica apropiadamente la idea de arrestar o sujetar a Jesús, sin volver más técnico el verbo de lo que exige el griego.
- source_word: δόλῳ
  english_pob_choice: by stealth
  chosen_spanish: por engaño
  alternatives_spanish:
  - a escondidas
  - con engaño
  - con astucia
  lexicon: BDAG
  rationale: δόλος puede denotar engaño, astucia o artimaña. La opción inglesa «by stealth» apunta a la manera oculta e insidiosa de la acción; en español, «por engaño» preserva esa dimensión de trampa o proceder desleal. Se evita reducirlo solo a «secretamente», porque el término griego carga un matiz más moral.
- source_word: ἀποκτείνωσιν
  english_pob_choice: kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - asesinarlo
  - quitarle la vida
  lexicon: BDAG
  rationale: El verbo significa simplemente «matar». «Matarlo» es directo y fiel; «asesinarlo» añade una calificación moral no exigida por el verbo, y «darle muerte» suena más formal de lo necesario.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  - a Jesús
  lexicon: BDAG
  rationale: El nombre propio se traduce como «Jesús»; el acusativo se refleja naturalmente con la preposición «a» en español.
theological_decisions:
- issue: Matiz de la deliberación hostil de los líderes
  english_pob_reading: Use 'conspired' rather than a neutral expression such as 'consulted together.'
  chosen_spanish_reading: Usar «conspiraron» en lugar de una expresión neutra como «consultaron juntos».
  alternative_spanish_readings:
  - consultaron juntos
  - tomaron consejo juntos
  - se confabularon
  rationale: El pasaje no describe mera consulta sino un plan conjunto para apoderarse de Jesús y matarlo. «Conspiraron» conserva el peso narrativo y la intención maliciosa del contexto, sin introducir una evaluación doctrinal ajena al texto.
  doctrine_reference: 'Principio de equivalencia óptima: mantener el sentido llano del texto fuente en español moderno y digno.'
- issue: Renderizar δόλῳ sin suavizar su carga moral
  english_pob_reading: by stealth / or 'by deceit'; the Greek term can denote deceit, trickery, or cunning.
  chosen_spanish_reading: «por engaño», manteniendo el matiz de trampa o procedimiento desleal.
  alternative_spanish_readings:
  - a escondidas
  - con engaño
  - con astucia
  rationale: «Por engaño» deja visible que la acción no es solo secreta sino tramposa. Así se conserva la tensión lexical del griego entre secretividad y engaño, que el contexto de la emboscada contra Jesús hace relevante.
  doctrine_reference: BDAG; principio de no aplanar términos con carga moral en el texto fuente.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la perífrasis «so that they might» para reflejar con mayor naturalidad la cláusula final; esta versión española también usa una construcción final breve («para prender... y matarlo») y conserva el doble objeto del plan hostil. Se mantuvo la carga negativa de δόλῳ con una traducción no meramente adverbial.
  spanish_consistency_notes:
  - Se usa «Jesús» de forma consistente para el nombre propio.
  - Se conserva «conspiraron» para reflejar la deliberación hostil, alineado con el POB inglés.
  - «Prender» se emplea aquí con sentido de arrestar o sujetar por la fuerza, acorde con el contexto narrativo.
  - Se evita «Cristo» porque el texto no usa el título aquí, sino el nombre propio.
  - No se usa «Señor» ni un sustituto reverencial para el nombre divino, porque no aparece en este versículo.
