translation:
  language: es
  text: 'Pedro estaba sentado fuera, en el patio, y se le acercó una criada[a], diciendo: «Tú también estabas con Jesús el Galileo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «una sirvienta» o «una esclava». El griego παιδίσκη puede denotar a una joven servidora, a veces con estatus de esclava.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: En español narrativo, el δέ introductorio suele expresarse mejor con una simple continuidad sin sobrecargar el matiz; el orden de la oración ya marca el avance del relato.
- source_word: ἐκάθητο ἔξω
  english_pob_choice: was sitting outside
  chosen_spanish: estaba sentado fuera
  alternatives_spanish:
  - se sentaba fuera
  - estaba sentado afuera
  lexicon: BDAG
  rationale: El imperfecto conserva una acción en desarrollo en el pasado; «estaba sentado» reproduce bien ese aspecto. «Fuera» mantiene la relación espacial con el interior del proceso judicial.
- source_word: αὐλή
  english_pob_choice: courtyard
  chosen_spanish: patio
  alternatives_spanish:
  - patio interior
  - atrio
  - corral
  lexicon: BDAG
  rationale: Aquí αὐλή designa el espacio abierto de la residencia; «patio» es natural en español y suficientemente preciso. «Atrio» puede sonar más eclesiástico o menos transparente en este contexto.
- source_word: προσῆλθεν αὐτῷ
  english_pob_choice: came up to him
  chosen_spanish: se le acercó
  alternatives_spanish:
  - se acercó a él
  - vino hacia él
  lexicon: BDAG
  rationale: La idea central es el acercamiento físico; la construcción pronominal en español fluye con naturalidad y conserva la dirección del movimiento.
- source_word: μία παιδίσκη
  english_pob_choice: one servant girl
  chosen_spanish: una criada
  alternatives_spanish:
  - una sirvienta
  - una muchacha sirviente
  - una esclava
  lexicon: BDAG
  rationale: παιδίσκη puede referir a una joven sirviente y, en algunos contextos, a una esclava. «Criada» comunica bien el oficio doméstico sin decidir de manera innecesaria el grado jurídico de servidumbre, que el contexto aquí no enfatiza como punto principal. Se mantiene el artículo indefinido para reflejar la introducción de una persona concreta.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presente se expresa de forma natural con «diciendo», preservando la fluidez narrativa sin convertirlo en una segunda acción principal.
- source_word: Καὶ σὺ
  english_pob_choice: You also
  chosen_spanish: Tú también
  alternatives_spanish:
  - Y tú
  - Tú igualmente
  lexicon: BDAG
  rationale: El καί enfático con σὺ introduce a Pedro como incluido en el mismo grupo de asociación con Jesús; «Tú también» conserva ese énfasis.
- source_word: ἦσθα μετὰ
  english_pob_choice: were with
  chosen_spanish: estabas con
  alternatives_spanish:
  - estabas junto a
  - formabas parte de
  lexicon: BDAG
  rationale: «Estabas con» reproduce la relación simple y directa sin ampliar el sentido más allá de la pertenencia o compañía implicada por μετά.
- source_word: Ἰησοῦ τοῦ Γαλιλαίου
  english_pob_choice: Jesus the Galilean
  chosen_spanish: Jesús el galileo
  alternatives_spanish:
  - Jesús de Galilea
  lexicon: BDAG
  rationale: El genitivo adjetival Γαλιλαίου funciona como epíteto identificador; en español, «el galileo» conserva esa función descriptiva y suena natural. No se opta por «de Galilea» porque el griego no expresa aquí simplemente procedencia geográfica sino una designación característica.
theological_decisions:
- issue: Identificación de Jesús por un epíteto regional
  english_pob_reading: Jesus the Galilean
  chosen_spanish_reading: Jesús el galileo
  alternative_spanish_readings:
  - Jesús de Galilea
  rationale: No hay una afirmación doctrinal adicional en el verso; el epíteto funciona como identificación hostil o coloquial del personaje. «El galileo» preserva el valor del título descriptivo sin convertirlo en una formulación más explicativa de lo que el griego da.
  doctrine_reference: Cristología narrativa; identificación histórica de Jesús
translation_notes:
  revision_awareness: Se mantiene la lectura estable del pasaje según el texto SBLGNT y el auditor inglés. La única decisión sensible es παιδίσκη, donde el español debe equilibrar naturalidad y fuerza lexical; también se conserva el imperfecto de ἐκάθητο y la identificación adjetival de Γαλιλαίου.
  spanish_consistency_notes:
  - Se usa «Jesús» sin sustitución litúrgica.
  - Se traduce el título geográfico como epíteto («el galileo») para seguir el valor del griego.
  - Se prefiere un español moderno y claro, con sintaxis narrativa simple.
  - La nota al pie se ancla en «criada» para transparentar la alternativa lexical de παιδίσκη.
