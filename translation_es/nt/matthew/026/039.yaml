translation:
  language: es
  text: 'Y yendo un poco más adelante[a], cayó sobre su rostro, orando y diciendo: «Padre mío, si es posible, pase de mí esta copa[b]; sin embargo, no como yo quiero, sino como tú quieres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cayó rostro en tierra».'
    reason: lexical_alternative
  - marker: b
    text: La «copa» es una imagen bíblica de la porción asignada, especialmente del sufrimiento; compárese Mateo 20:22 y 26:42.
    reason: cross_reference
lexical_decisions:
- source_word: προελθὼν μικρὸν
  english_pob_choice: going a little farther
  chosen_spanish: Yendo un poco más adelante
  alternatives_spanish:
  - Habiendo avanzado un poco más
  - Yendo un poco más lejos
  lexicon: BDAG
  rationale: La idea es de avanzar una corta distancia. «Yendo un poco más adelante» conserva el movimiento y suena natural en español, sin perder el matiz de progresión breve.
- source_word: ἔπεσεν ἐπὶ πρόσωπον αὐτοῦ
  english_pob_choice: he fell on his face
  chosen_spanish: se postró sobre su rostro
  alternatives_spanish:
  - cayó sobre su rostro
  - se postró rostro en tierra
  lexicon: BDAG
  rationale: La expresión griega es un modismo de postración. En español, «se postró sobre su rostro» comunica la solemnidad y la postura corporal sin sonar forzado, aunque la imagen literal también queda presente.
- source_word: προσευχόμενος καὶ λέγων
  english_pob_choice: praying and saying
  chosen_spanish: orando y diciendo
  alternatives_spanish:
  - mientras oraba y decía
  - orando y hablaba
  lexicon: BDAG
  rationale: Los participios presentan acciones simultáneas con el verbo principal. «Orando y diciendo» reproduce esa simultaneidad de forma directa y clara.
- source_word: Πάτερ μου
  english_pob_choice: My Father
  chosen_spanish: Padre mío
  alternatives_spanish:
  - Mi Padre
  - Padre mío amado
  lexicon: BDAG
  rationale: El vocativo con posesivo se expresa naturalmente como «Padre mío», preservando cercanía y reverencia sin añadir afecto no explicitado por el texto.
- source_word: εἰ δυνατόν ἐστιν
  english_pob_choice: if it is possible
  chosen_spanish: si es posible
  alternatives_spanish:
  - si fuera posible
  - si esto es posible
  lexicon: BDAG
  rationale: La condición se expresa de modo natural y fiel con «si es posible», sin introducir un sujeto implícito que el griego no señala.
- source_word: παρελθάτω ἀπ’ ἐμοῦ
  english_pob_choice: let this cup pass from me
  chosen_spanish: pase de mí
  alternatives_spanish:
  - se aparte de mí
  - se aleje de mí
  lexicon: BDAG
  rationale: El imperativo expresa una petición. «Pase de mí» conserva el sentido de alejamiento y funciona bien con el objeto siguiente en español.
- source_word: τὸ ποτήριον τοῦτο
  english_pob_choice: this cup
  chosen_spanish: esta copa
  alternatives_spanish:
  - este cáliz
  - esta copa de sufrimiento
  lexicon: BDAG
  rationale: Aunque «copa» es la opción más común en español bíblico, aquí «copa» preserva mejor el valor literal y metafórico del término, manteniendo la imagen de porción asignada que la POB en inglés retiene.
- source_word: πλὴν
  english_pob_choice: yet
  chosen_spanish: sin embargo
  alternatives_spanish:
  - pero
  - no obstante
  lexicon: BDAG
  rationale: Marca una fuerte contraposición respecto de la petición anterior. «Sin embargo» comunica bien ese giro concesivo en español contemporáneo.
- source_word: οὐχ ὡς ἐγὼ θέλω ἀλλ’ ὡς σύ
  english_pob_choice: not as I will, but as you will
  chosen_spanish: no como yo quiero, sino como tú
  alternatives_spanish:
  - no como yo quiero, sino como tú quieres
  - no como yo lo quiero, sino como tú
  lexicon: BDAG
  rationale: Se conserva la tensión entre la voluntad de Jesús y la del Padre. En español, el segundo verbo puede elidirse naturalmente; el contexto lo suple sin necesidad de repetirlo.
theological_decisions:
- issue: La imagen de «la copa»
  english_pob_reading: Retained the literal image 'this cup' in the main text
  chosen_spanish_reading: Mantener «esta copa» en el texto principal
  alternative_spanish_readings:
  - este sufrimiento
  - este destino
  rationale: El griego usa ποτήριον de manera literal pero metafórica. Mantener la imagen evita interpretar de antemano su contenido y preserva la resonancia bíblica de una porción asignada, especialmente de sufrimiento.
  doctrine_reference: Principio de primacía del texto fuente y conservación de la tensión teológica e intertextual.
- issue: La voluntad de Jesús frente a la voluntad del Padre
  english_pob_reading: Rendered θέλω as 'will' rather than 'want'
  chosen_spanish_reading: Traducir θέλω con «quiero» en un contraste de voluntad, no de simple preferencia
  alternative_spanish_readings:
  - quiero
  - deseo
  - prefiero
  rationale: En español, «quiero» puede expresar voluntad personal sin reducir el sentido a mera preferencia. Esto mantiene la gravedad del contraste y no debilita la sumisión expresada en la segunda cláusula.
  doctrine_reference: 'Cristología clásica: la voluntad humana real de Cristo en obediencia al Padre, sin colapsar las dos voluntades en una sola sensación psicológica.'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente con alta coincidencia entre evaluadores y sin cambios requeridos; por eso la redacción mantiene la decisión principal de conservar la imagen de la copa y la estructura de sumisión final.
  spanish_consistency_notes:
  - Se emplea «Padre mío» para el vocativo con posesivo, conforme al tono reverente y cercano del griego.
  - Se conserva «copa» en lugar de una paráfrasis interpretativa para no aplanar la metáfora bíblica.
  - La elipsis final («sino como tú») es aceptable en español y deja implícito «quieres» sin perder claridad.
  - La postración se expresa con un verbo natural en español litúrgico («se postró») manteniendo la vividez corporal del original.
