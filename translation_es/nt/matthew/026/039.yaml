  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: avance breve, postración, oración, petición sobre la copa y sumisión a la voluntad del Padre. Sin embargo, dos decisiones no preservan del todo la forma ni el matiz del original y del audit trail inglés: «se postró sobre su rostro» suena poco natural en español y además cambia el verbo vívido «cayó»/«se echó» del griego; y la nota [b] está anclada a «sin embargo» cuando su contenido explica «esta copa». También conviene explicitar el verbo final para conservar mejor el paralelismo de θέλω.'
  spanish_quality_summary: El español es en general claro y digno, pero «se postró sobre su rostro» resulta forzado e idiomáticamente extraño en español general. «Cayó sobre su rostro» es más fiel al modismo griego, aunque aún algo literal; una nota alternativa puede cubrir «rostro en tierra». Asimismo, «no como yo quiero, sino como tú quieres» suena más completo y natural que dejar el segundo verbo elidido, especialmente en una traducción de registro solemne.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Padre mío», «esta copa» y «quiero» son aceptables en contexto. Se preserva correctamente la imagen teológica de «la copa».
  issues:
  - severity: medium
    issue: «se postró sobre su rostro» es una formulación poco natural y no reproduce bien el verbo principal ἔπεσεν
    rationale: El griego dice literalmente «cayó sobre su rostro», un modismo de postración. «Se postró» interpreta la acción, pero «sobre su rostro» con ese verbo suena extraño en español. Conviene volver a una forma más directa y natural, p. ej. «cayó sobre su rostro», con nota alternativa «rostro en tierra».
  - severity: medium
    issue: La nota [b] está anclada al conector «sin embargo» en vez de a «esta copa»
    rationale: La nota explica la imagen bíblica de «la copa», por lo que el marcador debe aparecer junto a «copa» para mantener coherencia editorial y evitar confusión.
  - severity: low
    issue: La elipsis en «sino como tú» debilita el paralelismo solemne del original
    rationale: Aunque el verbo puede elidirse en español, el audit trail inglés decidió explicitar «you will» para claridad y peso teológico. «Sino como tú quieres» preserva mejor el contraste de voluntades.
