translation:
  language: es
  text: 'Entonces viene a los discípulos y les dice[a]: «Duerman ahora y descansen. Miren, la hora se ha acercado[b], y el Hijo del Hombre es entregado[c] en manos de pecadores».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Siguen durmiendo y descansando?». La formulación griega puede entenderse como una pregunta retórica; el texto principal conserva la ambigüedad y la posible ironía.'
    reason: alternative_reading
  - marker: b
    text: 'O: «la hora ha llegado» o «la hora está cerca».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «es traicionado» o «es entregado a otros». El griego tiene un sentido más amplio de ser entregado o puesto en poder de otros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Conecta la acción en secuencia narrativa de manera natural en español. «Entonces» conserva el valor temporal y el arranque del episodio sin volverlo demasiado interpretativo.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - va
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con un verbo natural en español. «Viene» mantiene la vividez narrativa y la dirección hacia los discípulos.
- source_word: πρὸς τοὺς μαθητάς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - hacia los discípulos
  - para con los discípulos
  lexicon: BDAG
  rationale: La preposición πρός con acusativo expresa movimiento hacia ellos; «a» es la forma idiomática más clara en español.
- source_word: λέγει αὐτοῖς
  english_pob_choice: says to them
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  - les habla
  lexicon: BDAG
  rationale: Se mantiene el presente histórico. «Les dice» es directo y natural, y conserva la inmediatez del relato.
- source_word: Καθεύδετε
  english_pob_choice: Sleep on
  chosen_spanish: Duerman
  alternatives_spanish:
  - Duerman ahora
  - ¿Siguen durmiendo?
  lexicon: BDAG
  rationale: La forma griega admite un matiz retórico o concesivo. En español, «Duerman ahora» deja abierta la ironía y la tensión contextual sin convertirla en pregunta explícita; se omite un equivalente demasiado marcado como «siguen» por falta de señal formal inequívoca en el texto principal.
- source_word: τὸ λοιπὸν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por lo demás
  - desde ahora
  lexicon: BDAG
  rationale: Como adverbio idiomático, aquí puede funcionar como transición temporal. «Ahora» es breve, claro y compatible con el tono de la frase.
- source_word: ἀναπαύεσθε
  english_pob_choice: take your rest
  chosen_spanish: descansen
  alternatives_spanish:
  - descansen ustedes
  - tomen su descanso
  lexicon: BDAG
  rationale: El verbo expresa reposo o descanso. En español, «descansen» conserva el paralelismo con «duerman» y evita una perífrasis pesada.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren bien
  lexicon: BDAG
  rationale: Marca atención solemne. «Miren» es la opción natural en español contemporáneo y conserva la exhortación a fijarse en lo que sigue.
- source_word: ἤγγικεν ἡ ὥρα
  english_pob_choice: the hour has drawn near
  chosen_spanish: la hora se ha acercado
  alternatives_spanish:
  - la hora ha llegado
  - la hora está cerca
  lexicon: BDAG
  rationale: El perfecto de ἐγγίζω enfatiza cercanía ya efectiva. «Se ha acercado» reproduce bien el valor resultativo sin forzar un equivalente más interpretativo como «ha llegado».
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del hombre
  lexicon: BDAG
  rationale: Es el título establecido de Jesús; se conserva la capitalización y la forma tradicional de referencia cristológica sin paraphrasearlo.
- source_word: παραδίδοται
  english_pob_choice: is being handed over
  chosen_spanish: está siendo entregado
  alternatives_spanish:
  - es entregado
  - está siendo puesto en manos
  lexicon: BDAG
  rationale: «Entregado» conserva el rango semántico amplio de παραδίδωμι y evita reducirlo solo a «traicionado». La perífrasis progresiva refleja el aspecto de un proceso en curso.
- source_word: εἰς χεῖρας
  english_pob_choice: into the hands
  chosen_spanish: en manos
  alternatives_spanish:
  - en las manos
  - a manos
  lexicon: BDAG
  rationale: La imagen idiomática se mantiene de forma natural en español. «En manos» conserva la concreción y el valor figurado de control o poder.
- source_word: ἁμαρτωλῶν
  english_pob_choice: of sinners
  chosen_spanish: de pecadores
  alternatives_spanish:
  - de gente pecadora
  - de hombres pecadores
  lexicon: BDAG
  rationale: El adjetivo sustantivado significa «pecadores». «De pecadores» es directo y no añade «hombres», que el griego no explicita.
theological_decisions:
- issue: Fuerza de Καθεύδετε ... καὶ ἀναπαύεσθε
  english_pob_reading: 'Rendered as an ironic/concessive statement: ''Sleep on now and take your rest.'''
  chosen_spanish_reading: 'Se vierte como una frase concesiva/irónica en forma de imperativo: «Duerman ahora y descansen».'
  alternative_spanish_readings:
  - «¿Siguen durmiendo y descansando?»
  - «Duerman y tomen su descanso»
  rationale: El griego permite una lectura que no es una simple orden piadosa, y el contexto inmediato la vuelve irónica o concesiva. La versión española conserva esa tensión sin resolverla en una pregunta explícita que el texto no marca de manera obligatoria.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y retórica del texto.'
- issue: Sentido de παραδίδοται en el contexto de la pasión
  english_pob_reading: is being handed over
  chosen_spanish_reading: está siendo entregado
  alternative_spanish_readings:
  - es entregado
  - está siendo traicionado
  rationale: «Entregado» reproduce el alcance más amplio del verbo y permite que la escena incluya tanto la acción humana como el marco pasional sin reducirla prematuramente a una sola causa.
  doctrine_reference: Afirmaciones + Translation philosophy §1, §3
- issue: Uso del título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Hijo del hombre
  rationale: Se preserva el título cristológico en su forma reconocible en español. Cambiarlo por una paráfrasis diluiría su valor intertextual y teológico.
  doctrine_reference: Cristología sinóptica; coherencia terminológica POB
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: el inglés pasó de «has come near» a «has drawn near» para ἤγγικεν, manteniendo la idea resultativa de cercanía. La versión española refleja ese valor con «se ha acercado», que conserva el matiz aspectual y la naturalidad en español.'
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título cristológico estable.
  - Se evita «SEÑOR» porque no aparece el divino nombre en este versículo.
  - Se traduce παραδίδωμι con «entregar» y no «traicionar» en el texto principal para no estrechar el sentido.
  - Se conserva un tono moderno, digno y apto para lectura pública.
  - La puntuación reproduce el contraste entre la frase a los discípulos y la solemne introducción de la pasión.
