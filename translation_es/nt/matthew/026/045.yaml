  text: τότε ἔρχεται πρὸς τοὺς ⸀μαθητὰς καὶ λέγει αὐτοῖς· Καθεύδετε ⸀τὸ λοιπὸν καὶ ἀναπαύεσθε· ἰδοὺ ἤγγικεν ἡ ὥρα καὶ ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται εἰς χεῖρας ἁμαρτωλῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/045.yaml
  text: Then he comes to the disciples and says to them[a], “Sleep on now and take your rest. Look, the hour has drawn near[c][b], and the Son of Man is being handed over into the hands of sinners.”
  footnotes:
  - marker: a
    text: Or, 'Are you still sleeping and taking your rest?' The Greek wording can be understood as a rhetorical question; the main text preserves the ambiguity and likely irony of the statement.
    reason: alternative_reading
  - marker: b
    text: Or, 'the hour has arrived' or 'the hour is at hand.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'is betrayed.' The Greek more broadly means 'is handed over' or 'is delivered over.'
    reason: lexical_alternative
