translation:
  language: es
  text: Pero después de que yo sea resucitado[a], iré delante de ustedes a Galilea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de que yo resucite». El griego usa más literalmente una forma pasiva: «después de que yo sea levantado» o «después de que yo sea resucitado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ
  english_pob_choice: But after
  chosen_spanish: Pero después de que
  alternatives_spanish:
  - Y después de que
  - Pero luego de que
  lexicon: BDAG
  rationale: μετά con el infinitivo articular expresa secuencia temporal; δέ aporta una leve conexión/contraste, que en español se comunica bien con «pero». «Después de que» mantiene la relación temporal sin calcar la sintaxis griega.
- source_word: τὸ ἐγερθῆναί με
  english_pob_choice: I am raised up
  chosen_spanish: yo sea levantado
  alternatives_spanish:
  - yo sea resucitado
  - yo haya sido levantado
  - yo me levante
  lexicon: BDAG
  rationale: El griego usa infinitivo aoristo pasivo con acusativo de sujeto, por lo que la pasividad debe conservarse. «Sea levantado» refleja esa forma pasiva y funciona en español bíblico; «resucitado» explicita el sentido de resurrección, pero «levantado» conserva mejor el valor verbal más literal del texto.
- source_word: προάξω
  english_pob_choice: I will go ahead of
  chosen_spanish: iré delante de
  alternatives_spanish:
  - iré antes que
  - iré al frente de
  - iré precediéndolos
  lexicon: BDAG
  rationale: προάγω aquí significa ir delante o delante de otros. «Iré delante de» es natural en español y conserva la idea de precedencia sin añadir un matiz de mando que el verbo no exige.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - a ustedes
  lexicon: BDAG
  rationale: El pronombre es plural; en español latinoamericano «ustedes» comunica con claridad la pluralidad y encaja con el registro culto y público.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - hasta Galilea
  - dentro de Galilea
  lexicon: BDAG
  rationale: εἰς suele indicar movimiento hacia un lugar; en español, «a Galilea» es la forma más natural y suficientemente fiel. «En Galilea» perdería la direccionalidad.
theological_decisions:
- issue: Pasiva de resurrección en ἐγερθῆναί
  english_pob_reading: after I am raised up
  chosen_spanish_reading: después de que yo sea levantado
  alternative_spanish_readings:
  - después de que yo resucite
  - después de que yo haya sido levantado
  rationale: La pasiva griega se conserva en español para no borrar la forma del original ni la implicación de acción recibida. «Sea levantado» mantiene la tensión entre literalidad y claridad; «resucite» suaviza la pasiva y convierte la forma en intransitiva.
  doctrine_reference: Pasaje de resurrección; fidelidad a la voz pasiva del texto griego
- issue: Direccionalidad de προάγω
  english_pob_reading: go ahead of you
  chosen_spanish_reading: iré delante de ustedes
  alternative_spanish_readings:
  - les iré delante
  - iré antes que ustedes
  - los precederé
  rationale: La POB inglesa evita sobreinterpretar liderazgo formal y conserva la idea espacial/temporal de ir delante. En español, «delante de ustedes» comunica esa precedencia sin añadir una connotación eclesiástica ajena al contexto.
  doctrine_reference: Relación de precedencia y seguimiento de los discípulos
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió «up» para hacer más natural la pasiva de resurrección («raised up»). La versión española refleja esa misma decisión manteniendo la pasiva con «sea levantado», sin convertirla en una forma intransitiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «ustedes» para un plural claro y contemporáneo en español latinoamericano.
  - No se emplea «Cristo» ni terminología que requiera decisión terminológica adicional en este versículo.
