  rationale: Se ajusta la expresión de ἐγερθῆναί para conservar el sentido de resurrección con una formulación española más clara y natural, evitando la ambigüedad de «levantado». Se mantiene la nota para preservar tanto la alternativa intransitiva como la observación sobre la pasiva griega.
