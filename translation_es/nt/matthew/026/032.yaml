review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia temporal, la pasiva de ἐγερθῆναί y la idea de precedencia de προάξω. Sin embargo, «sea levantado» en español puede sonar ambiguo o antinatural en contexto de resurrección, y el inglés auditado ya optó por «raised up». Conviene una forma española que preserve mejor el sentido de resurrección sin perder del todo la pasiva griega.
  spanish_quality_summary: La redacción es clara y digna, pero «después de que yo sea levantado» suena algo forzada en español e introduce posible ambigüedad (levantar físicamente, exaltar, etc.). «Después de que yo sea resucitado» es más natural y precisa en español bíblico moderno. También conviene mantener una nota que preserve la alternativa más literal/intransitiva.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. El verso no contiene términos del glosario principal como Yahvé, Mesías o esclavo. La decisión clave es ἐγερθῆναί: se recomienda «sea resucitado» para claridad semántica en español, con nota indicando la alternativa «resucite» y la pasiva griega.'
  issues:
  - severity: medium
    issue: «sea levantado» es ambiguo en español para un contexto de resurrección
    rationale: Aunque conserva la pasiva formal del griego, en español moderno puede sugerir simplemente ser alzado o exaltado, no necesariamente resurrección.
  - severity: low
    issue: La nota actual repite una formulación principal menos idiomática
    rationale: La nota debería ayudar al lector con la alternativa «resucite» y explicar que el griego usa una forma pasiva, mientras el texto principal puede escoger una expresión española más clara.
  revised_spanish_text: Pero después de que yo sea resucitado[a], iré delante de ustedes a Galilea.
  revised_footnotes:
