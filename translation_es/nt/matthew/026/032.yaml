    text: 'O: «después de que yo resucite». El griego usa más literalmente una forma pasiva: «después de que yo sea levantado» o «después de que yo sea resucitado».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión de ἐγερθῆναί para conservar el sentido de resurrección con una formulación española más clara y natural, evitando la ambigüedad de «levantado». Se mantiene la nota para preservar tanto la alternativa intransitiva como la observación sobre la pasiva griega.
