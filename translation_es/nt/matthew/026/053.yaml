translation:
  language: es
  text: ¿O piensas que no puedo apelar a mi Padre[a], y él pondrá a mi disposición[b] ahora mismo más de doce legiones[c] de ángeles?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamar a» o «pedir a mi Padre».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «pondrá junto a mí»; es decir, la pondrá a mi disposición para ayudarme.
    reason: lexical_alternative
  - marker: c
    text: Una legión romana era una gran unidad militar; la expresión enfatiza una fuerza celestial abrumadora.
    reason: cultural_note
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O acaso
  - ¿O es que
  lexicon: BDAG
  rationale: Introduce la alternativa retórica de Jesús; «¿O» conserva la fuerza de la pregunta sin añadir sentido que no está en el griego.
- source_word: δοκεῖς
  english_pob_choice: do you think
  chosen_spanish: piensas
  alternatives_spanish:
  - crees
  - te parece
  lexicon: BDAG
  rationale: En español, «piensas» reproduce bien la pregunta directa y retórica dirigida al interlocutor.
- source_word: οὐ δύναμαι
  english_pob_choice: I cannot
  chosen_spanish: no puedo
  alternatives_spanish:
  - no soy capaz de
  - no tengo poder para
  lexicon: BDAG
  rationale: «Poder» expresa la capacidad/posibilidad del verbo δύναμαι sin convertirlo en una cuestión de permiso.
- source_word: παρακαλέσαι
  english_pob_choice: appeal to
  chosen_spanish: apelar a
  alternatives_spanish:
  - llamar a
  - pedir a
  - suplicar a
  lexicon: BDAG
  rationale: La expresión griega aquí es una petición urgente o recurso al Padre; «apelar a» conserva bien el matiz de solicitud respetuosa y eficaz.
- source_word: τὸν πατέρα μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi padre
  lexicon: BDAG
  rationale: Se mantiene la referencia filial divina con mayúscula en español, coherente con el contexto cristológico y con la puntuación reverente habitual.
- source_word: παραστήσει μοι
  english_pob_choice: he will place at my disposal
  chosen_spanish: pondrá a mi disposición
  alternatives_spanish:
  - me proveerá
  - me presentará
  lexicon: BDAG
  rationale: παρίστημι aquí comunica hacer disponible para ayuda. «Pondrá a mi disposición» preserva esa idea sin sobreinterpretar el modo de la ayuda.
- source_word: ἄρτι
  english_pob_choice: at once
  chosen_spanish: ahora mismo
  alternatives_spanish:
  - de inmediato
  - en seguida
  lexicon: BDAG
  rationale: La partícula marca inmediatez; «ahora mismo» es natural en español y transmite el énfasis del momento.
- source_word: πλείω δώδεκα
  english_pob_choice: more than twelve
  chosen_spanish: más de doce
  alternatives_spanish:
  - más que doce
  - superiores a doce
  lexicon: BDAG
  rationale: La comparación numérica se vierte de forma directa y natural en español.
- source_word: λεγιῶνας
  english_pob_choice: legions
  chosen_spanish: legiones
  alternatives_spanish:
  - ejércitos
  - cuerpos militares
  lexicon: BDAG
  rationale: «Legiones» conserva el término militar romano ya reconocido en español y mantiene la imagen de una fuerza enorme.
- source_word: ἀγγέλων
  english_pob_choice: of angels
  chosen_spanish: de ángeles
  alternatives_spanish:
  - de mensajeros
  lexicon: BDAG
  rationale: El contexto celestial obliga a «ángeles»; «mensajeros» sería demasiado ambiguo en español.
theological_decisions:
- issue: Cómo reflejar la capacidad de Jesús para llamar ayuda divina sin suavizar la afirmación
  english_pob_reading: 'Rendered as ability: ''I cannot appeal to my Father'''
  chosen_spanish_reading: «no puedo apelar a mi Padre»
  alternative_spanish_readings:
  - «no soy capaz de apelar a mi Padre»
  - una versión que sugiera solo falta de voluntad
  rationale: El verbo δύναμαι se refiere a capacidad. La traducción mantiene que Jesús sí tiene la capacidad de invocar ayuda celestial, preservando la tensión teológica de que su arresto no ocurre por impotencia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Revisado contra el texto griego SBLGNT y el audit trail inglés: se mantuvo la pregunta retórica, la capacidad expresada por δύναμαι, la petición a «mi Padre», la disponibilidad implícita de παρίστημι, la inmediatez de ἄρτι y la imagen militar de las legiones. No se introdujeron cambios respecto del pasaje base auditado; la redacción española busca transparencia y lectura pública natural.'
  spanish_consistency_notes:
  - Se usó «Padre» con mayúscula para el referente divino, consistente con el contexto cristológico.
  - Se prefirió «ángeles» y no «mensajeros» por el contexto celestial.
  - «Legiones» se conserva como término cultural y militar específico.
  - La puntuación mantiene el tono interrogativo-retórico del original.
