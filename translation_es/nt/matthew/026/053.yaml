  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: pregunta retórica, capacidad de Jesús, petición al Padre, disponibilidad inmediata de ayuda y la imagen de una fuerza celestial inmensa. Sin embargo, hay un desajuste de anclaje de notas: la nota cultural sobre «legiones» está anclada en «ahora mismo», lo que no preserva fielmente la relación entre la nota y el término explicado.'
  spanish_quality_summary: 'El español es claro, natural y digno. «No puedo», «mi Padre» y «pondrá a mi disposición» funcionan bien. «Apelar a mi Padre» es comprensible, pero en español bíblico y eclesial suena algo jurídico; «pedirle ayuda a mi Padre» o «recurrir a mi Padre» serían más idiomáticos. Aun así, dado el rastro inglés y la nota léxica, el cambio necesario aquí es mínimo: corregir el anclaje de notas. También conviene mejorar la redacción de la nota b con concordancia más natural en español.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/esclavo, etc. «Padre» con mayúscula es aceptable en este contexto. «Ángeles» y «legiones» están bien. La decisión sobre capacidad frente a permiso o voluntad está bien preservada con «no puedo».
  issues:
  - severity: medium
    issue: La nota [c] está anclada a «ahora mismo» pero explica «legiones».
    rationale: La nota cultural trata de la legión romana, por lo que debe ir anclada en «legiones», no en el adverbio temporal. El requisito exige que cada marcador aparezca en la frase relevante.
  - severity: low
    issue: La nota b dice «lo pondrá disponible para ayudarme», formulación poco natural.
    rationale: En español suena mejor «la pondrá a mi disposición para ayudarme» o «la hará disponible para ayudarme», además de concordar con el referente implícito de la ayuda/fuerza angélica.
  revised_spanish_text: ¿O piensas que no puedo apelar a mi Padre[a], y él pondrá a mi disposición[b] ahora mismo más de doce legiones[c] de ángeles?
