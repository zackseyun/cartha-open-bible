revisions:
- from: 'diciendo[a]: «Profetiza para nosotros, Mesías: ¿quién es el que te golpeó?»'
  to: 'diciendo[a], «Profetízanos, Mesías: ¿quién es el que te golpeó?»'
  rationale: Se ajusta ἡμῖν a un español más fiel y natural mediante «Profetízanos», que conserva el sentido de «Prophesy to us» sin expansión innecesaria. También se normaliza la puntuación introductoria. Se mantiene «Mesías» con nota alternativa «Cristo» por coherencia con la política doctrinal y el uso titular de χριστέ.
