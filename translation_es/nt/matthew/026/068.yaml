translation:
  language: es
  text: 'diciendo[a], «Profetízanos, Mesías: ¿quién es el que te golpeó?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». El título griego Χριστός se traduce aquí como «Mesías» porque se usa de manera titular, no como forma fija de nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: El participio presente introduce el habla de los que se burlan; en español, «diciendo» comunica de forma natural esa introducción sin añadir una conjunción que no está exigida por el griego.
- source_word: Προφήτευσον
  english_pob_choice: Prophesy
  chosen_spanish: Profetiza
  alternatives_spanish:
  - ¡Profetiza!
  - Profetiza para nosotros
  lexicon: BDAG
  rationale: El imperativo aoristo de προφητεύω conserva mejor su fuerza con «Profetiza». En español, el imperativo sin artículo ni paráfrasis mantiene la ironía de la burla y la forma verbal del original.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo expresa el destinatario de la profecía pedida; «para nosotros» suena natural en español y conserva el sentido de solicitud dirigida a ellos.
- source_word: χριστέ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός aquí funciona como título vocativo, no como nombre fijo. Siguiendo la política del proyecto, se traduce como «Mesías» para conservar su valor titular y la carga burlona de la escena.
- source_word: τίς ἐστιν
  english_pob_choice: who is it
  chosen_spanish: ¿quién es el que es...?
  alternatives_spanish:
  - ¿quién es?
  - ¿quién es el que...?
  lexicon: BDAG
  rationale: La pregunta busca identificar a la persona; en español, «¿quién es el que…?» reproduce con claridad la función identificadora del giro griego y se adapta bien al contexto.
- source_word: ὁ παίσας
  english_pob_choice: that struck
  chosen_spanish: el que te golpeó
  alternatives_spanish:
  - el que te pegó
  - el que te hirió
  lexicon: BDAG
  rationale: El participio aoristo sustantivado de παίω señala al autor del golpe. «Golpeó» refleja el acto concreto con una tonalidad suficientemente amplia para la agresión implícita en la burla.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Pronombre de objeto directo de segunda persona singular referido a Jesús; «te» es la forma natural en español y mantiene la inmediatez del ataque.
theological_decisions:
- issue: Título Χριστός en vocativo
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El texto usa Χριστός como título dirigido a Jesús en tono de escarnio. En español, «Mesías» conserva el valor semántico del título y evita convertirlo en un nombre litúrgico fijo sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #2; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la historia de revisión: la modificación provisional que cambió «Messiah» a «Christ» fue revertida para respetar la política del proyecto y la lectura titulada de Χριστός en este contexto; el consenso final del expediente favorece «Messiah/Mesías».'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en la línea principal, coherente con el criterio del proyecto para títulos cristológicos.
  - Se traduce el participio inicial con «diciendo» para conservar la introducción narrativa sin sobrecargar el español.
  - «Golpeó» se eligió por su naturalidad y por mantener el hecho físico concreto del verbo παίω.
