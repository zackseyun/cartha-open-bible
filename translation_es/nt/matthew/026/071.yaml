translation:
  language: es
  text: 'Pero cuando salió al portal,[a] otra mujer lo vio y dijo a los que estaban allí: «Este hombre estaba con Jesús el Nazareno»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «al patio de entrada». El griego se refiere a una zona de acceso o entrada, no a una puerta simple.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντα
  english_pob_choice: when he had gone out
  chosen_spanish: cuando salió
  alternatives_spanish:
  - después de haber salido
  - al salir
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente, anterior a la acción principal. En español, «cuando salió» comunica con naturalidad esa relación sin añadir información innecesaria.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce avance narrativo con leve contraste; «Pero» conserva mejor ese giro que un simple «Y».
- source_word: πυλῶνα
  english_pob_choice: gateway
  chosen_spanish: portal
  alternatives_spanish:
  - entrada
  - portón
  - patio de entrada
  lexicon: BDAG
  rationale: πυλών designa la zona de paso/entrada. «Portal» es un equivalente español amplio y digno para esa área de acceso, sin reducirlo a una puerta simple.
- source_word: ἄλλη
  english_pob_choice: another woman
  chosen_spanish: otra mujer
  alternatives_spanish:
  - otra
  - otra sirvienta
  - otra criada
  lexicon: BDAG
  rationale: El adjetivo femenino funciona sustantivamente. Como el sustantivo no está explícito en el griego, «otra mujer» es una concreción sobria; otras opciones dependen más de paralelos que de este versículo aislado.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  - decía
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español el pasado simple mantiene la narración natural y sigue de cerca la revisión inglesa final.
- source_word: τοῖς ἐκεῖ
  english_pob_choice: to those there
  chosen_spanish: a los que estaban allí
  alternatives_spanish:
  - a los presentes
  - a los de allí
  lexicon: BDAG
  rationale: La frase alude a las personas presentes en ese lugar. «A los que estaban allí» expresa esa referencia de forma clara y sin sobreespecificar.
- source_word: Οὗτος
  english_pob_choice: This man
  chosen_spanish: Este
  alternatives_spanish:
  - Este hombre
  - Éste
  lexicon: BDAG
  rationale: El demostrativo se refiere a una persona masculina acusada. En español, «Este» dentro de la cita reproduce con suficiente fuerza la deixis despectiva o señaladora del original; «Este hombre» sería más explícito, pero añade una palabra no requerida por el griego.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  lexicon: BDAG
  rationale: La construcción con genitivo expresa asociación simple; «con» es la equivalencia directa y natural.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: τοῦ Ναζωραίου
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - de Nazaret
  - el de Nazaret
  lexicon: BDAG
  rationale: Ναζωραῖος es una designación substantiva/titular. «El Nazareno» preserva la forma del griego mejor que «de Nazaret», que suaviza la construcción hacia una frase preposicional distinta.
theological_decisions:
- issue: Cómo renderizar Ναζωραῖος aplicado a Jesús
  english_pob_reading: the Nazarene
  chosen_spanish_reading: el Nazareno
  alternative_spanish_readings:
  - de Nazaret
  rationale: Se conserva la designación del griego como apelativo/título, no como simple origen geográfico. Esto mantiene la precisión del texto y la tensión entre identificación y desdén implícito en la acusación.
  doctrine_reference: Principio de primacía del idioma original; traducción de títulos y designaciones con valor lexical propio.
translation_notes:
  revision_awareness: La revisión inglesa final cambió la narración de 'says' a 'said' por consistencia temporal, pero mantuvo 'gateway' y 'the Nazarene'. La versión española refleja esa decisión con pasado simple y conserva la designación titulativa de Ναζωραῖος.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como forma estable del nombre propio.
  - Se evitó traducir Ναζωραῖος por una paráfrasis geográfica que diluya el valor del término griego.
  - 'La puntuación de cita sigue uso español: dos puntos antes de la cita directa y comillas angulares.'
  - «Portal» funciona aquí como equivalente funcional de πυλών, con nota para la alternativa de sentido.
  - El demostrativo en la cita queda breve para reflejar el tono acusatorio del original.
