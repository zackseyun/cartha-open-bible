translation:
  language: es
  text: 'Pero Jesús seguía callado. Y el sumo sacerdote le dijo: «Te pongo bajo juramento[a] por el Dios vivo, para que nos digas si tú eres el Mesías[b], el Hijo de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Te conjuro por el Dios vivo». El griego usa una fórmula solemne de juramento/adjuración.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo». El título griego es Christos; aquí se traduce «Mesías» porque funciona como título y no como nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐσιώπα
  english_pob_choice: kept silent
  chosen_spanish: seguía callado
  alternatives_spanish:
  - estaba callado
  - guardaba silencio
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso; «seguía callado» conserva ese aspecto progresivo y suena natural en español, sin convertirlo en un silencio puntual.
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - alto sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente claro y eclesialmente comprensible en español para el cargo judío del contexto judicial.
- source_word: Ἐξορκίζω
  english_pob_choice: I put you under oath
  chosen_spanish: te pongo bajo juramento
  alternatives_spanish:
  - te conjuro
  - te obligo bajo juramento
  lexicon: BDAG
  rationale: La fuerza es solemne y forense, no exorcística. «Te pongo bajo juramento» comunica el valor jurídico del verbo de manera clara y evita un tecnicismo menos natural en español.
- source_word: κατὰ τοῦ θεοῦ τοῦ ζῶντος
  english_pob_choice: by the living God
  chosen_spanish: por el Dios vivo
  alternatives_spanish:
  - ante el Dios vivo
  - en nombre del Dios vivo
  lexicon: BDAG
  rationale: Con la fórmula de juramento, «por el Dios vivo» preserva la invocación solemne y es idiomático en español. Mantiene el referente divino sin suavizar la apelación.
- source_word: ἵνα ἡμῖν εἴπῃς
  english_pob_choice: tell us
  chosen_spanish: para que nos digas
  alternatives_spanish:
  - que nos digas
  - y nos digas
  lexicon: BDAG
  rationale: Aquí ἵνα con subjuntivo expresa el contenido exigido por la adjuración; «para que nos digas» refleja esa dependencia verbal en español.
- source_word: χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular y mesiánico del término. «Mesías» es la opción principal en español cuando Χριστός funciona como título, no como nombre fijo.
- source_word: υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  lexicon: BDAG
  rationale: La forma con artículo reproduce mejor la identificación titular y cristológica del original, manteniendo la solemnidad de la confesión interrogada.
- source_word: ὁ δὲ Ἰησοῦς
  english_pob_choice: But Jesus
  chosen_spanish: Pero Jesús
  alternatives_spanish:
  - Y Jesús
  - Ahora bien, Jesús
  lexicon: BDAG
  rationale: «Pero» conserva el leve contraste narrativo marcado por δέ y encaja con el flujo del relato en español.
theological_decisions:
- issue: Valor titular de Χριστός en la pregunta del sumo sacerdote
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El término funciona como título escatológico, no como nombre propio. «Mesías» preserva el trasfondo hebraico y evita aplanar el sentido en una forma litúrgica ya cristalizada.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; tratamiento de términos controvertidos para Χριστός'
- issue: Fuerza de Ἐξορκίζω σε κατὰ τοῦ θεοῦ τοῦ ζῶντος
  english_pob_reading: A solemn legal adjuration/oath formula
  chosen_spanish_reading: Una fórmula solemne de juramento/adjuración
  alternative_spanish_readings:
  - una simple orden
  - una exhortación solemne
  rationale: El contexto judicial exige reflejar la gravedad formal de la fórmula. «Te pongo bajo juramento» mantiene la presión procesal sin introducir un tecnicismo que opaque el sentido directo del pasaje.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; conservar el sentido llano del texto fuente'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios respecto del consenso alto del paquete inglés; la redacción española mantiene la misma lectura titulary-forense y conserva la tensión léxica entre juramento y adjuración.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el texto fuente dice θεοῦ y la fórmula corresponde a «Dios vivo», no al tetragrámaton.
  - Se usa «Mesías» para Χριστός por tratarse de un título interrogativo; se reserva «Cristo» solo como alternativa anotada.
  - Se eligió «sumo sacerdote» por ser la designación española estándar y precisa del cargo en contexto judío.
  - Se evitó «SEÑOR» o mayúsculas de sustitución para el nombre divino porque el griego no contiene κύριος aquí.
