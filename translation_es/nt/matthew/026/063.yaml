base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/063.yaml
  text: 'But Jesus kept silent[a]. And the high priest said to him, “I put you under oath by the living God: tell us if you are the Messiah[b], the Son of God.”'
  footnotes:
