    text: Or “Christ.” The Greek title is Christos, here rendered “Messiah” because it functions as a title rather than a name.
    reason: alternative_reading
  - marker: b
    text: Or “I adjure you by the living God.” The Greek is a solemn oath formula.
    reason: lexical_alternative
