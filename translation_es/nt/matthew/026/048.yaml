translation:
  language: es
  text: 'Pero el que lo traicionaba les había dado una señal[a], diciendo: «Aquel a quien yo bese, ese es; apresadlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seña». El griego también puede referirse a una señal convenida de identificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδιδοὺς
  english_pob_choice: betraying
  chosen_spanish: lo entregaba
  alternatives_spanish:
  - lo traicionaba
  - lo estaba entregando
  lexicon: BDAG
  rationale: El griego puede significar 'entregar' o 'traicionar'. En este contexto de la pasión, el audit trail inglés opta por 'betraying' por la fuerza moral del acto. En español, 'lo entregaba' conserva la ambigüedad lexical del verbo sin perder el contexto de traición, que queda claro por la escena; 'lo traicionaba' sería una explicación más interpretativa.
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - indicio
  lexicon: BDAG
  rationale: '''Señal'' es el equivalente natural en español para un gesto previamente convenido que identifica a Jesús. Mantiene la función pragmática del término sin sonar técnico; ''signo'' es posible pero menos idiomático en este contexto narrativo.'
- source_word: Ὃν ἂν φιλήσω
  english_pob_choice: The one I kiss
  chosen_spanish: Aquél a quien yo bese
  alternatives_spanish:
  - El que yo bese
  - Quien yo bese
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν y subjuntivo pide una formulación que preserve la referencia identificadora. 'Aquél a quien yo bese' reproduce bien el valor de selección y suena natural en español; 'el que yo bese' es más simple, pero menos marcado.
- source_word: φιλήσω
  english_pob_choice: kiss
  chosen_spanish: bese
  alternatives_spanish:
  - dé un beso a
  - salude con un beso
  lexicon: BDAG
  rationale: Aquí φιλέω designa el acto de besar como señal de identificación. 'Bese' es la traducción directa y suficientemente precisa; añadir 'salude con un beso' introduciría una especificación que el griego no requiere.
- source_word: αὐτός ἐστιν
  english_pob_choice: is he
  chosen_spanish: ése es
  alternatives_spanish:
  - es él
  - ése es el hombre
  lexicon: BDAG
  rationale: La frase griega tiene valor identificador y enfático. 'Ése es' reproduce la concisión y el señalamiento de la construcción mejor que una formulación más explicativa.
- source_word: κρατήσατε
  english_pob_choice: seize
  chosen_spanish: apresadlo
  alternatives_spanish:
  - detenedlo
  - prendedlo
  lexicon: BDAG
  rationale: El verbo expresa tomar por la fuerza en un contexto de arresto. 'Apresadlo' comunica la acción de capturarlo con un matiz más fuerte y narrativamente claro que 'detenedlo'; 'prendedlo' también sería posible, pero suena más técnico/jurídico.
theological_decisions:
- issue: Force moral de παραδιδοὺς respecto de Judas
  english_pob_reading: the one betraying him
  chosen_spanish_reading: el que lo entregaba
  alternative_spanish_readings:
  - el que lo traicionaba
  rationale: No se quiso borrar la tensión entre 'entregar' y 'traicionar'. El español mantiene el verbo básico del original, dejando que el contexto de la Pasión y la acción de Judas aporten el matiz de traición. Así se preserva la auditabilidad sin forzar una paráfrasis interpretativa.
  doctrine_reference: Principio de primacía del texto original y de no ocultar tensiones léxicas documentadas
- issue: Valor de σημεῖον como señal preacordada
  english_pob_reading: sign
  chosen_spanish_reading: señal
  alternative_spanish_readings:
  - signo
  rationale: '''Señal'' permite entender que no se trata solo de un gesto cualquiera, sino de un marcador convenido para identificar a Jesús. No se cambió a un término eclesiástico tradicional ni se añadió contenido doctrinal.'
  doctrine_reference: Principio de claridad narrativa sin sobreinterpretación
- issue: Construcción identificadora final
  english_pob_reading: The one I kiss is he
  chosen_spanish_reading: Aquél a quien yo bese, ése es
  alternative_spanish_readings:
  - El que yo bese, ése es
  - Quien yo bese, ése es
  rationale: La versión española conserva la doble deíxis e identificación del griego. 'Ése es' refleja el énfasis del original y evita una expansión innecesaria como 'ese es el hombre', que iría más allá del texto.
  doctrine_reference: Principio de equivalencia óptima y respeto por la forma retórica del original
translation_notes:
  revision_awareness: El contexto inglés fue de alta concordancia y sin revisiones aplicadas en la última pasada; por eso se mantuvo una solución española conservadora, con ajuste principal en la elección de un verbo menos interpretativo para παραδιδοὺς y un final más idiomático para la orden de arresto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general, aunque este versículo no contiene el nombre divino.
  - Se prefirió 'señal' para σημεῖον por consistencia con otros contextos narrativos de identificación.
  - Se evitó 'Cristo' y cualquier terminología eclesiástica no presente en el texto.
  - La puntuación mantiene el discurso directo y la alternancia narrativa de manera natural para lectura pública.
