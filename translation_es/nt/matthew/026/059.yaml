translation:
  language: es
  text: Y los principales sacerdotes y todo el concilio[a] buscaban falso testimonio[b] contra Jesús para darle muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo el Sanedrín'. El término griego se refiere al consejo gobernante judío.
    reason: cultural_note
  - marker: b
    text: O 'falso testigo'. El término griego puede referirse, en un contexto legal, tanto al testimonio falso como al testigo falso.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: En narrativa española, 'Ahora' funciona como transición discursiva suave y conserva el avance del relato sin cargar una oposición fuerte que el griego no exige aquí.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: '''Principales sacerdotes'' reproduce con claridad el plural y la función de liderazgo; evita una lectura extrañamente técnica de ''sumos sacerdotes'' para un plural que no implica varios sumos sacerdotes simultáneos.'
- source_word: συνέδριον ὅλον
  english_pob_choice: the whole council
  chosen_spanish: todo el concilio
  alternatives_spanish:
  - todo el Sanedrín
  - el concilio entero
  lexicon: BDAG
  rationale: '''Concilio'' traduce el cuerpo gobernante con transparencia para el lector hispanohablante, y ''todo'' refleja ὅλον. Se evita transliterar ''Sanedrín'' en el texto principal por claridad, aunque sigue siendo una alternativa válida.'
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - andaban buscando
  - estaban buscando
  - buscaban continuamente
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua; 'buscaban' es natural en español y conserva esa duratividad sin sonar rebuscado.
- source_word: ψευδομαρτυρίαν
  english_pob_choice: false testimony
  chosen_spanish: falso testimonio
  alternatives_spanish:
  - falso testimonio legal
  - falsa declaración
  - falso testigo
  lexicon: BDAG
  rationale: '''Falso testimonio'' es la equivalencia más transparente en el contexto judicial. ''Falso testigo'' desplaza el sentido hacia la persona, y el inglés POB ya prefería la forma de contenido, no de sujeto.'
- source_word: κατὰ τοῦ Ἰησοῦ
  english_pob_choice: against Jesus
  chosen_spanish: contra Jesús
  alternatives_spanish:
  - en contra de Jesús
  - contra de Jesús
  lexicon: BDAG
  rationale: La preposición 'contra' transmite la oposición dirigida a Jesús en un contexto judicial de forma idiomática y fiel.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para así
  alternatives_spanish:
  - con el fin de
  - a fin de
  lexicon: BDAG
  rationale: '''Para así'' expresa finalidad de manera natural en español y mantiene el valor purposivo sin sobrecargar la sintaxis.'
- source_word: θανατώσωσιν
  english_pob_choice: they might put him to death
  chosen_spanish: poder darle muerte
  alternatives_spanish:
  - matarlo
  - hacerlo morir
  - condenarlo a muerte
  lexicon: BDAG
  rationale: '''Darle muerte'' conserva el tono formal/judicial del verbo griego mejor que un simple ''matarlo''. La perífrasis con ''poder'' refleja el matiz de propósito con un español claro y digno.'
theological_decisions:
- issue: Matiz judicial y deliberativo del plan contra Jesús
  english_pob_reading: The verse is rendered to show an ongoing search for false testimony with the purpose of securing Jesus' death.
  chosen_spanish_reading: El versículo se vierte para mostrar una búsqueda continua de falso testimonio con el fin de lograr la muerte de Jesús.
  alternative_spanish_readings:
  - Buscaban un falso testimonio para matarlo.
  - Estaban buscando testimonio falso contra Jesús para condenarlo a muerte.
  rationale: La combinación del imperfecto ἐζήτουν y la cláusula de propósito ὅπως...θανατώσωσιν sugiere una maniobra deliberada y sostenida. 'Poder darle muerte' mantiene el matiz formal sin añadir explicaciones interpretativas excesivas.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el acuerdo alto del audit trail inglés y conserva sus decisiones principales: transición narrativa suave para δὲ, lectura judicial de συνέδριον ὅλον, aspecto progresivo del imperfecto ἐζήτουν y finalidad de ὅπως...θανατώσωσιν. No se detectaron revisiones aplicadas en el paquete de referencia.'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como forma fija para Ἰησοῦς.
  - '''Concilio'' se usa como traducción transparente de συνέδριον; ''Sanedrín'' queda en nota como alternativa culturalmente marcada.'
  - '''Falso testimonio'' preserva la fuerza legal del sustantivo ψευδομαρτυρίαν sin convertirlo en ''falso testigo''.'
  - Se prefirió 'darle muerte' para conservar el registro judicial del pasaje.
