translation:
  language: es
  text: 'Y tomando una copa[a] y dando gracias[c], se la dio a ellos, diciendo: «Beban de ella, todos ustedes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la copa». El griego tiene «una copa» sin artículo, aunque el contexto de la cena puede hacer que el referente sea definido.
    reason: lexical_alternative
  - marker: b
    text: 'O «todos». En el griego, πάντες se entiende más naturalmente como una apelación al grupo entero: «todos ustedes».'
    reason: lexical_alternative
  - marker: c
    text: O «Y tomando una copa, y después de dar gracias».
    reason: previous_rendering
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - tomó
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa una acción previa. «Tomando» conserva el flujo participial natural en español sin convertirlo en una nueva acción principal.
- source_word: ποτήριον
  english_pob_choice: a cup
  chosen_spanish: una copa
  alternatives_spanish:
  - la copa
  - un cáliz
  lexicon: BDAG
  rationale: El griego carece de artículo; «una copa» refleja mejor la forma anartrosa. Se evita «cáliz» por su carga litúrgica no exigida por el texto.
- source_word: εὐχαριστήσας
  english_pob_choice: after giving thanks
  chosen_spanish: dando gracias
  alternatives_spanish:
  - habiendo dado gracias
  - después de dar gracias
  lexicon: BDAG
  rationale: El sentido básico es agradecer. «Dando gracias» mantiene el valor léxico de εὐχαριστέω sin sacramentalizarlo ni introducir una formulación interpretativa adicional.
- source_word: ἔδωκεν
  english_pob_choice: he gave it
  chosen_spanish: se la dio
  alternatives_spanish:
  - la dio
  - se dio
  lexicon: BDAG
  rationale: En español, con un objeto femenino implícito («copa»), «se la dio» expresa con naturalidad el dativo de destinatario y el objeto directo implícito recuperable del contexto.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  - a los discípulos
  lexicon: BDAG
  rationale: Se mantiene la referencia abierta y directa del dativo plural. «A ellos» es claro y no añade precisión narrativa no presente en el verso.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio presente introductorio se conserva con «diciendo», preservando la construcción griega sin volverla una coordinación de verbos finitos.
- source_word: Πίετε
  english_pob_choice: Drink
  chosen_spanish: Beban
  alternatives_spanish:
  - Beban ustedes
  - Tomen
  lexicon: BDAG
  rationale: El imperativo plural se expresa de forma natural y reverente con «Beban»; se evita «tomen» porque el verbo es específicamente beber, no simplemente recibir.
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de eso
  - de ella misma
  lexicon: BDAG
  rationale: La preposición ἐξ indica procedencia. En español, con «copa» como antecedente femenino, «de ella» es idiomático y conserva la relación de fuente.
- source_word: πάντες
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - cada uno de ustedes
  lexicon: BDAG
  rationale: El plural al final del mandato dirige la orden al grupo completo. «Todos ustedes» evita la ambigüedad de «todos» y refleja mejor el valor inclusivo del apelativo.
theological_decisions:
- issue: Valor de εὐχαριστήσας en el relato de la Cena
  english_pob_reading: Rendered as 'giving thanks' without sacramentalized language.
  chosen_spanish_reading: «dando gracias» sin usar «bendijo» ni lenguaje sacramentalizado.
  alternative_spanish_readings:
  - habiendo dado gracias
  - bendiciendo
  rationale: El verbo significa agradecer. Se conserva esa fuerza léxica y se evita importar una formulación litúrgica posterior que el texto no exige por sí mismo.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Alcance de πάντες en la orden
  english_pob_reading: '''all of you'' indicates the command addresses the whole group.'
  chosen_spanish_reading: «todos ustedes» muestra que la orden se dirige a todo el grupo.
  alternative_spanish_readings:
  - todos
  - todos de ustedes
  rationale: La sintaxis más naturalmente apunta a los destinatarios del imperativo. La traducción evita entender «todos» como si modificara la cantidad de la copa o el contenido.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'El inglés POB fue revisado para mantener una sola secuencia participial más fluida y coherente con los dos aoristos participiales griegos (λαβὼν ... εὐχαριστήσας). La versión española sigue esa misma decisión al usar dos participios coordinados: «tomando ... y dando gracias».'
  spanish_consistency_notes:
  - Se conservó la distinción entre la acción previa de tomar la copa y la acción de dar gracias antes de entregarla.
  - Se evitó «cáliz» y «bendijo» para no introducir terminología litúrgica no requerida por el griego.
  - El objeto pronominal «se la dio» ayuda a mantener naturalidad en español sin perder la referencia a la copa.
  - Se mantuvo el plural directo en la orden final para que el destinatario colectivo quede explícito.
