translation:
  language: es
  text: Y desde entonces buscaba una oportunidad para entregarlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «traicionarlo». El verbo griego significa más literalmente «entregarlo» o «ponerlo en manos de otro».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἀπὸ τότε
  english_pob_choice: from then on
  chosen_spanish: y desde entonces
  alternatives_spanish:
  - y desde aquel momento
  - y desde aquel entonces
  lexicon: BDAG
  rationale: La construcción griega marca inicio temporal con continuación; «desde entonces» reproduce bien ese punto de arranque y su duración, mientras que el añadido de «y» conserva la unión narrativa del καί inicial.
- source_word: ἐζήτει
  english_pob_choice: was seeking
  chosen_spanish: buscaba
  alternatives_spanish:
  - andaba buscando
  - seguía buscando
  - estaba buscando
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada. «Buscaba» es natural en español y mantiene la duración sin endurecer el ritmo más de lo necesario.
- source_word: εὐκαιρίαν
  english_pob_choice: an opportunity
  chosen_spanish: una oportunidad
  alternatives_spanish:
  - una ocasión favorable
  - un momento propicio
  - una ocasión
  lexicon: BDAG
  rationale: εὐκαιρία indica una ocasión favorable o conveniente. «Una oportunidad» comunica la idea con claridad y deja implícito el matiz favorable del contexto.
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  - para que
  lexicon: BDAG
  rationale: Aquí ἵνα introduce finalidad. En español, «para» seguido de infinitivo expresa de manera natural y fiel esa relación de propósito.
- source_word: παραδῷ
  english_pob_choice: hand him over
  chosen_spanish: entregarlo
  alternatives_spanish:
  - ponerlo en manos de otros
  - traicionarlo
  - entregarlo en manos de otros
  lexicon: BDAG
  rationale: παραδίδωμι en sentido básico es «entregar/poner en manos de». «Entregarlo» preserva ese valor léxico sin introducir de inmediato la interpretación más específica de «traicionar», que se mantiene como alternativa semántica.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - lo mismo
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús por el contexto. «Lo» es la forma natural en español y mantiene la referencia sin sobrecargar la frase.
theological_decisions:
- issue: Valor de παραδίδωμι en el contexto de Judas
  english_pob_reading: hand him over, with 'betray him' as lexical alternative
  chosen_spanish_reading: entregarlo, con 'traicionarlo' como alternativa léxica
  alternative_spanish_readings:
  - traicionarlo
  - ponerlo en manos de otros
  rationale: El contexto narrativo de Judas hace evidente la traición, pero el verbo griego es más amplio que «traicionar». La base del texto mantiene el sentido literal de «entregar», y se preserva la lectura interpretativa como alternativa para no estrechar indebidamente el alcance léxico del original.
  doctrine_reference: Translation philosophy §1, §3
- issue: Imperfecto de acción continua
  english_pob_reading: was seeking
  chosen_spanish_reading: buscaba
  alternative_spanish_readings:
  - seguía buscando
  - estaba buscando
  rationale: El imperfecto griego señala una búsqueda sostenida. «Buscaba» lo expresa con sobriedad y naturalidad en español, sin perder el carácter durativo del verbo.
  doctrine_reference: Grammatical aspect / narrative aspect
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que prefirió «was seeking» frente a «was looking for» para reflejar con más formalidad el imperfecto ἐζήτει. En español se optó por «buscaba», que mantiene el matiz durativo sin sonar artificial.
  spanish_consistency_notes:
  - Se mantuvo «Y desde entonces» para reflejar el enlace narrativo inicial de καί + ἀπὸ τότε.
  - Se evitó «SEÑOR» u otras sustituciones porque el pasaje no contiene el nombre divino ni un título cristológico que requiera ajuste terminológico.
  - La nota al pie conserva la tensión léxica entre la traducción literal de παραδίδωμι y la lectura contextual de «traicionar».
