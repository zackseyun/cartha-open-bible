revisions:
- from: 'Ahora, en el primer día de los Panes sin levadura[a], los discípulos se acercaron a Jesús y le dijeron: «¿Dónde quieres que te preparemos para comer el Pascua?»'
  to: 'Ahora, el primer día de los Panes sin levadura[a], los discípulos se acercaron a Jesús, diciendo[b]: «¿Dónde quieres que te preparemos para que comas la Pascua?»'
  rationale: 'Se corrige la gramática y naturalidad del español sin apartarse del griego ni del rastro POB en inglés: ''el primer día'' expresa mejor el valor temporal; ''la Pascua'' corrige el género español; y se añade la nota cultural para preservar la decisión auditada de no armonizar la cronología. También se ajusta ''para que comas'' para dejar claro que Jesús es quien come, preservando la fuerza de σοι + φαγεῖν en un español más natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:22:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura básica del griego: marco temporal, acercamiento de los discípulos a Jesús y la pregunta sobre preparar la comida pascual. Sin embargo, hay dos desajustes importantes: (1) ''en el primer día'' no es la formulación española natural para el dativo temporal; debe ser ''el primer día'' o ''en el primer día'' solo en contextos muy marcados, y aquí suena no idiomático. (2) ''el Pascua'' es incorrecto en español; debe ser ''la Pascua'', con la nota opcional sobre ''la comida de Pascua''. Además, falta en español la nota cultural del inglés sobre no resolver por traducción la cronología de ''el primer día de los Panes sin levadura''.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero contiene giros poco naturales o incorrectos para español general eclesial: ''Ahora, en el primer día'' suena calcado, y ''el Pascua'' es gramaticalmente defectuoso. ''Se acercaron ... y le dijeron'' es perfectamente legible, aunque ''diciendo'' también habría preservado más de cerca el participio. ''Panes sin levadura'' es aceptable y claro.'
  glossary_alignment: 'La terminología principal está bien alineada: ''Jesús'', ''discípulos'', y la referencia festiva. No hay términos del glosario mayor en disputa aquí. La excepción necesaria es que πάσχα no debe forzarse con el artículo griego a ''el Pascua''; en español normativo y eclesial corresponde ''la Pascua''.'
  issues:
  - severity: high
    issue: Uso de 'el Pascua'
    rationale: 'Aunque el griego tiene artículo neutro, el sustantivo español es femenino: ''la Pascua''. Mantener ''el'' no preserva el significado; introduce un error gramatical en español.'
  - severity: medium
    issue: Calco temporal 'en el primer día'
    rationale: El dativo temporal griego se expresa naturalmente en español como 'el primer día de…'. 'En el primer día' aquí suena forzado y menos legible.
  - severity: medium
    issue: Falta la nota cultural equivalente a la nota inglesa b
    rationale: El rastro auditado en inglés preserva explícitamente la tensión cronológica y pide no resolverla por traducción. Esa información debe conservarse también en español mediante nota, especialmente porque el texto principal mantiene la formulación literal.
  revised_spanish_text: 'Ahora, el primer día de los Panes sin levadura[a], los discípulos se acercaron a Jesús, diciendo[b]: «¿Dónde quieres que te preparemos para que comas la Pascua?»'
  revised_footnotes:
  - marker: a
    text: O, más explícitamente, «la comida de Pascua».
    reason: lexical_alternative
  - marker: b
    text: «El primer día de los Panes sin levadura» refleja directamente la redacción griega; los debates sobre la cronología de la Pascua no deben resolverse solo por la traducción.
    reason: cultural_note
  revision_rationale: 'Se corrige la gramática y naturalidad del español sin apartarse del griego ni del rastro POB en inglés: ''el primer día'' expresa mejor el valor temporal; ''la Pascua'' corrige el género español; y se añade la nota cultural para preservar la decisión auditada de no armonizar la cronología. También se ajusta ''para que comas'' para dejar claro que Jesús es quien come, preservando la fuerza de σοι + φαγεῖν en un español más natural.'
