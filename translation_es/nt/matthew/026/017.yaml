    text: Or, more explicitly, “the Passover meal.”
    reason: lexical_alternative
  - marker: b
    text: “The first day of Unleavened Bread” reflects the Greek wording directly; discussions of Passover chronology should not be settled by translation alone.
    reason: cultural_note
