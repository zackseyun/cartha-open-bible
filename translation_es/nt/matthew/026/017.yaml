base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/017.yaml
  text: Now on the first day of Unleavened Bread[a], the disciples came to Jesus, saying[b], “Where do you want us to prepare for you to eat the Passover?”
  footnotes:
