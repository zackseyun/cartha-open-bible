translation:
  language: es
  text: 'Ahora, el primer día de los Panes sin levadura[a], los discípulos se acercaron a Jesús, diciendo[b]: «¿Dónde quieres que te preparemos para que comas la Pascua?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «la comida de Pascua».
    reason: lexical_alternative
  - marker: b
    text: «El primer día de los Panes sin levadura» refleja directamente la redacción griega; los debates sobre la cronología de la Pascua no deben resolverse solo por la traducción.
    reason: cultural_note
lexical_decisions:
- source_word: Τῇ δὲ πρώτῃ
  english_pob_choice: Now on the first day
  chosen_spanish: Ahora, en el primer día
  alternatives_spanish:
  - Y en el primer día
  - En el primer día
  lexicon: BDAG
  rationale: La construcción temporal en dativo se expresa de forma natural en español con 'en el primer día'. 'Ahora' conserva el matiz discursivo de δέ como transición suave, sin forzar una oposición fuerte.
- source_word: τῶν ἀζύμων
  english_pob_choice: of Unleavened Bread
  chosen_spanish: de los Panes sin levadura
  alternatives_spanish:
  - de la fiesta de los Panes sin levadura
  - de los Ázimos
  lexicon: BDAG
  rationale: El griego usa el sustantivo plural adjetival para la festividad. 'Panes sin levadura' mantiene el referente festivo y es más transparente para el lector español que un calco litúrgico opaco.
- source_word: προσῆλθον
  english_pob_choice: came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: El verbo puede significar 'acercarse' o 'venir a'. En este contexto con 'a Jesús', 'se acercaron' conserva el movimiento hacia él sin perder naturalidad.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo y el sustantivo identifican al grupo ya conocido por el contexto. 'Los discípulos' reproduce fielmente el griego sin añadir posesión explícita.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hasta Jesús
  lexicon: BDAG
  rationale: El dativo con προσέρχομαι señala a la persona a la que se acercan. 'A Jesús' es la equivalencia directa y natural en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: y le dijeron
  alternatives_spanish:
  - diciendo
  lexicon: BDAG
  rationale: El participio contemporáneo se puede expresar en español con una coordinación narrativa fluida. 'Y le dijeron' evita una construcción demasiado pesada y comunica bien la continuidad del habla.
- source_word: Ποῦ θέλεις
  english_pob_choice: Where do you want
  chosen_spanish: ¿Dónde quieres
  alternatives_spanish:
  - ¿Dónde deseas
  - ¿Dónde quieres tú
  lexicon: BDAG
  rationale: '''Querer'' traduce bien θέλω como deseo o intención. La forma interrogativa española natural no requiere marcar el sujeto explícitamente.'
- source_word: ἑτοιμάσωμέν σοι
  english_pob_choice: us to prepare for you
  chosen_spanish: que te preparemos
  alternatives_spanish:
  - que preparemos para ti
  - que nosotros te preparemos
  lexicon: BDAG
  rationale: El subjuntivo deliberativo en una pregunta indirecta se expresa de forma natural con 'que te preparemos'. Se conserva el sentido de preparación hecha en favor de Jesús sin sobrecargar la frase.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - a comer
  lexicon: BDAG
  rationale: El infinitivo de finalidad se traduce con una construcción final natural en español. 'Para comer' integra el propósito de la preparación.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: el Pascua
  alternatives_spanish:
  - la Pascua
  - la cena de Pascua
  lexicon: BDAG
  rationale: Se conserva el término festivo con el artículo neutro griego reflejado por el uso sustantivado. 'Pascua' puede sonar femenino en español común, pero aquí se mantiene el valor de nombre festivo directo; la sintaxis del pasaje sugiere la comida pascual sin necesidad de expandirla en el texto principal.
theological_decisions:
- issue: 'Cronología festiva: ''el primer día de los Panes sin levadura'' en relación con la Pascua'
  english_pob_reading: Retain the literal festal expression without harmonizing or expanding it.
  chosen_spanish_reading: Mantener la expresión festiva literal, sin armonizar ni resolver la cronología en la traducción.
  alternative_spanish_readings:
  - '''el día antes de la fiesta de los Panes sin levadura'''
  - '''el primer día de la Pascua'''
  rationale: El texto griego dice literalmente 'el primer día de los Panes sin levadura'. La traducción conserva esa redacción para no decidir por vía interpretativa una cuestión cronológica debatida.
  doctrine_reference: Preservar la tensión textual sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del auditor inglés, que no registró cambios sustantivos y confirmó un acuerdo alto. La versión española mantiene el mismo enfoque de equivalencia óptima: literalidad controlada en la expresión festiva, fluidez natural en la sintaxis, y preservación del posible valor de ''Pascua'' como comida pascual sin expandir innecesariamente el texto principal.'
  spanish_consistency_notes:
  - Se usa 'Panes sin levadura' para el grupo festivo, manteniendo consistencia terminológica con el referente judío.
  - Se conserva 'Jesús' y 'discípulos' como formas estables y naturales en español.
  - Se mantiene la tensión entre 'Pascua' como fiesta y como comida mediante nota, sin resolverla en el cuerpo del texto.
  - La puntuación y el registro buscan ser publicables en español bíblico moderno, sin arcaísmos innecesarios.
