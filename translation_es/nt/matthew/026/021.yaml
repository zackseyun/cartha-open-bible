review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: el genitivo absoluto ἐσθιόντων αὐτῶν se refleja adecuadamente, la fórmula λέγω ὑμῖν está bien representada, y εἷς ἐξ ὑμῶν se traduce con naturalidad. Sin embargo, la decisión principal sobre παραδώσει no sigue el rastro auditado del POB inglés, que en este contexto eligió ''will betray'' con nota léxica alternativa. En español, el texto principal debería reflejar esa misma decisión contextual con «me traicionará», y dejar «me entregará» como alternativa en nota.'
  spanish_quality_summary: El español es claro y legible, pero «De cierto les digo» suena más arcaizante/Reina-Valera de lo necesario para el estilo meta indicado. «De verdad les digo» o «En verdad les digo» sería más natural y digno. Además, la nota actual está mal formulada porque repite la lectura principal «me entregará» como si fuera alternativa, y «me pondrá en manos de otro» no corresponde tan de cerca al audit trail inglés como «me entregará» o «me entregará en manos de otros».
  glossary_alignment: 'No hay conflictos con la glosaría principal del proyecto. La cuestión relevante es la consistencia con la decisión teológica/léxica documentada para παραδώσει en contexto de pasión: el español debe preferir «traicionará» en el texto principal y conservar «entregará» como alternativa. «En verdad» también alinea mejor Ἀμὴν con un español moderno y digno.'
  issues:
  - severity: medium
    issue: El texto principal usa «me entregará» para παραδώσει en vez de reflejar la decisión contextual auditada de «will betray».
    rationale: El POB inglés documenta explícitamente que en este contexto narrativo la traición de Judas está en primer plano. En español, «me traicionará» comunica mejor ese valor contextual en el texto principal, dejando «me entregará» como alternativa más literal en nota.
  - severity: medium
    issue: «De cierto les digo» es demasiado arcaizante para el estilo meta solicitado.
    rationale: Aunque comprensible, suena marcadamente heredado de Reina-Valera. «En verdad les digo» conserva solemnidad y naturalidad en español latinoamericano contemporáneo.
  - severity: low
    issue: La nota al pie no está bien calibrada respecto del texto principal revisado y del audit trail inglés.
    rationale: Si el texto principal pasa a «me traicionará», la nota debe ofrecer las alternativas léxicas más literales del griego, no repetir la lectura principal ni introducir una paráfrasis menos directa.
  revised_spanish_text: 'Y mientras ellos comían, él dijo: «En verdad les digo que uno de ustedes me traicionará[a]».'
  revised_footnotes:
