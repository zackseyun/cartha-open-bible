translation:
  language: es
  text: 'Y mientras ellos comían, él dijo: «En verdad les digo que uno de ustedes me traicionará[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «me entregará» o «me entregará en manos de otros».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσθιόντων αὐτῶν
  english_pob_choice: while they were eating
  chosen_spanish: y mientras ellos comían
  alternatives_spanish:
  - y mientras estaban comiendo
  - mientras comían
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción simultánea; «mientras ellos comían» conserva esa contemporaneidad con español natural y sobrio.
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - Amén
  - Verdaderamente
  lexicon: BDAG
  rationale: En labios de Jesús, ἀμήν introduce una afirmación solemne y autorizada. «De cierto» comunica bien ese valor discursivo en español bíblico-readable, sin dejar la palabra sin interpretar.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo yo
  - les hablo
  lexicon: BDAG
  rationale: La fórmula es directa y enfática; «les digo» conserva la dirección a los oyentes y su tono solemne de habla autoritativa.
- source_word: εἷς ἐξ ὑμῶν
  english_pob_choice: one of you
  chosen_spanish: uno de ustedes
  alternatives_spanish:
  - uno entre ustedes
  - uno de vosotros
  lexicon: BDAG
  rationale: La expresión partititiva se traduce de manera clara y natural con «uno de ustedes», manteniendo el sentido de pertenencia al grupo.
- source_word: παραδώσει
  english_pob_choice: will betray
  chosen_spanish: me entregará
  alternatives_spanish:
  - me traicionará
  - me entregará traicionándome
  - me pondrá en manos de otros
  lexicon: BDAG
  rationale: El verbo puede significar «entregar/poner en manos de otro»; el contexto de la pasión permite la carga de deslealtad, pero en español «me entregará» preserva el valor básico del verbo sin perder la tensión narrativa. Se evita fijar solo «traicionará» para no estrechar el alcance léxico del griego.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; no requiere expansión.
theological_decisions:
- issue: Valor contextual de παραδώσει en la pasión
  english_pob_reading: will betray
  chosen_spanish_reading: me entregará
  alternative_spanish_readings:
  - me traicionará
  - me entregará traicionándome
  rationale: El contexto inmediato apunta a la acción de uno de los discípulos contra Jesús. En español, «entregar» mantiene el núcleo semántico del griego y deja abierta la tensión entre el acto de entregar a una autoridad y la infidelidad personal, sin borrar ninguna de las dos dimensiones.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene sin cambios la frase clave y la nota lexical sobre παραδώσει; la redacción española sigue esa estabilidad y conserva la alternativa principal con una nota que refleja el rango semántico del verbo sin mecanicismo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton ni una cita explícita del nombre divino en este versículo.
  - Se prefiere «De cierto» como equivalente solemne de Ἀμὴν en una fórmula de Jesús, coherente con una tradición española clara pero no arcaizante.
  - «Entregará» preserva el valor básico de παραδίδωμι y permite que el contexto narrativo aporte la implicación de traición.
