- from: 'Y mientras ellos comían[a], él dijo: «De cierto les digo que uno de ustedes me entregará».'
  to: 'Y mientras ellos comían, él dijo: «En verdad les digo que uno de ustedes me traicionará[a]».'
  rationale: Se ajusta παραδώσει a la decisión contextual documentada por el POB inglés («betray») y se preservan en nota las alternativas más literales («entregar»). También se actualiza Ἀμὴν a «En verdad» para un español moderno, digno y eclesialmente legible, evitando un arcaísmo innecesario.
