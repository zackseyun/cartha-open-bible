translation:
  language: es
  text: 'Pero cuando los discípulos lo vieron[a], se indignaron, diciendo: «¿Para qué este desperdicio?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al verlo»; la frase griega deja el objeto implícito y el contexto lo identifica.
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: when ... saw it
  chosen_spanish: cuando ... lo vieron
  alternatives_spanish:
  - al verlo
  - después de verlo
  lexicon: ὁράω
  rationale: El participio aoristo se vierte con valor temporal natural en español. Mantengo el objeto implícito del contexto en «lo vieron», como hace la traducción inglesa con «it», sin añadir explicaciones ajenas al texto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: δέ
  rationale: δέ introduce un giro narrativo leve y contrastivo; «Pero» reproduce bien el cambio hacia la reacción negativa de los discípulos.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  - los aprendices
  lexicon: μαθητής
  rationale: «Discípulos» es el equivalente normal y preciso en el relato evangélico. No añado posesivo porque el griego no lo expresa aquí.
- source_word: ἠγανάκτησαν
  english_pob_choice: were indignant
  chosen_spanish: se indignaron
  alternatives_spanish:
  - se enfurecieron
  - se molestaron
  lexicon: ἀγανακτέω
  rationale: El verbo expresa fuerte disgusto o indignación moral. «Se indignaron» conserva mejor ese matiz que una opción más débil como «se molestaron».
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: λέγω
  rationale: El participio presente se traduce de manera natural con «diciendo», manteniendo su conexión con la indignación anterior y presentando la cita directa.
- source_word: Εἰς τί
  english_pob_choice: Why
  chosen_spanish: ¿Para qué?
  alternatives_spanish:
  - ¿Por qué?
  - ¿Con qué propósito?
  lexicon: εἰς τί
  rationale: La pregunta idiomática apunta al propósito o finalidad de la acción, no solo a una causa. «¿Para qué?» conserva bien esa fuerza; «¿Por qué?» podría sonar más causal que final.
- source_word: ἡ ἀπώλεια αὕτη
  english_pob_choice: this waste
  chosen_spanish: este desperdicio
  alternatives_spanish:
  - esta pérdida
  - esta ruina
  - este derroche
  lexicon: ἀπώλεια
  rationale: En el contexto del perfume derramado, el término expresa algo considerado perdido o malgastado. «Desperdicio» comunica con claridad el juicio de los discípulos y evita la ambigüedad de «pérdida» o «ruina».
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden ampliamente; no se observaron revisiones textuales relevantes para este versículo, y la versión española sigue esa lectura estable.
  spanish_consistency_notes:
  - Conservo «discípulos» como término narrativo estándar y «se indignaron» para ἀγανακτέω, en línea con el tono moral fuerte del pasaje.
  - He elegido una pregunta de finalidad («¿Para qué?») porque reproduce mejor Εἰς τί dentro de esta queja sobre el supuesto gasto del perfume.
  - El objeto de «vieron» queda implícito en el texto español, igual que en el griego, con una nota para aclarar la alternativa literal.
