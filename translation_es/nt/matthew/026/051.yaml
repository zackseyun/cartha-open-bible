  text: καὶ ἰδοὺ εἷς τῶν μετὰ Ἰησοῦ ἐκτείνας τὴν χεῖρα ἀπέσπασεν τὴν μάχαιραν αὐτοῦ καὶ πατάξας τὸν δοῦλον τοῦ ἀρχιερέως ἀφεῖλεν αὐτοῦ τὸ ὠτίον.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/051.yaml
  text: And behold[a], one of those with Jesus stretched out his hand, drew his sword, and struck the high priest’s slave, and cut off his ear.
  footnotes:
