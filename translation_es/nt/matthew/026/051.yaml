translation:
  language: es
  text: Y he aquí[a], uno de los que estaban con Jesús extendió su mano, desenvainó su espada, golpeó al esclavo del sumo sacerdote, y le cortó la oreja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miren» o «vean» para ἰδοὺ.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: Conserva el efecto narrativo de sorpresa e inmediatez del marcador discursivo sin omitirlo. "He aquí" suena más natural y digno en español bíblico que una orden al lector como "miren".
- source_word: εἷς τῶν μετὰ Ἰησοῦ
  english_pob_choice: one of those with Jesus
  chosen_spanish: uno de los que estaban con Jesús
  alternatives_spanish:
  - uno de los que iban con Jesús
  - uno de los compañeros de Jesús
  lexicon: BDAG
  rationale: La construcción partitiva se expresa con naturalidad en español mediante una relativa; mantiene la ambigüedad de identidad del sujeto sin precisar más de lo que el griego dice.
- source_word: ἐκτείνας τὴν χεῖρα
  english_pob_choice: stretched out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - estiró su mano
  lexicon: BDAG
  rationale: El participio aoristo se vierte como acción concomitante previa al verbo principal. "Extendió su mano" es idiomático y fiel; "estiró" suena menos solemne y más corporal de lo requerido.
- source_word: ἀπέσπασεν τὴν μάχαιραν αὐτοῦ
  english_pob_choice: drew his sword
  chosen_spanish: desenvainó su espada
  alternatives_spanish:
  - sacó su espada
  - la sacó de la vaina
  lexicon: BDAG
  rationale: ἀποσπάω aquí indica la acción de sacar/arrancar el arma. En español, "desenvainó" comunica de manera precisa y natural la acción narrativa de sacar la espada. Se conserva el sentido de arma cortante sin forzar una especificación más técnica que el contexto no exige.
- source_word: μάχαιραν
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - arma blanca
  - cuchillo
  lexicon: BDAG
  rationale: Aunque el término puede designar un arma corta, en esta escena narrativa "espada" es la equivalencia española más estable y transparente. "Cuchillo" sería demasiado reducido; "arma blanca" demasiado genérico.
- source_word: πατάξας
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - atacó
  lexicon: BDAG
  rationale: El participio aoristo expresa un golpe violento con resultado lesivo. "Hirió" comunica mejor la idea de daño causado que un simple "golpeó", sin añadir detalles no presentes en el texto.
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: Se mantiene la fuerza social del término tal como la PO B inglesa la documenta. "Esclavo" refleja mejor la condición de dependencia vinculada a δοῦλος que los términos suavizados "siervo" o "sirviente".
- source_word: ἀρχιερέως
  english_pob_choice: high priest’s
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del principal sacerdote
  - del jefe de los sacerdotes
  lexicon: BDAG
  rationale: '"Sumo sacerdote" es la manera natural y fiel de nombrar ἀρχιερεύς en español bíblico contemporáneo, sin perder el cargo específico.'
- source_word: ἀφεῖλεν αὐτοῦ τὸ ὠτίον
  english_pob_choice: and cut off his ear
  chosen_spanish: y le cortó la oreja
  alternatives_spanish:
  - y le quitó la oreja
  - y le separó la oreja
  lexicon: BDAG
  rationale: El griego dice literalmente "quitó/tomó de él su oreja"; la equivalencia idiomática española más precisa para el resultado violento es "le cortó la oreja". Se conserva el segundo verbo coordinado para reflejar el fin de la acción con claridad.
- source_word: ὠτίον
  english_pob_choice: ear
  chosen_spanish: oreja
  alternatives_spanish:
  - oído
  - oreja externa
  lexicon: BDAG
  rationale: Aunque el diminutivo puede referir simplemente a "oreja/oído", en español "oreja" es la forma natural en este contexto corporal y narrativo. "Oído" sonaría menos concreto; "oreja externa" sobreinterpreta.
theological_decisions:
- issue: Traducción de δοῦλος en un relato de arresto y violencia
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: Se conserva la decisión POB de no suavizar δοῦλος cuando la relación de dependencia social es parte del cuadro narrativo. En este contexto, "esclavo" mantiene la tensión histórica y lexical del término sin eufemizarla.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos para δοῦλος; filosofía de traducción POB §1'
- issue: Valor aspectual de los participios aoristos en secuencia narrativa
  english_pob_reading: stretched out... drew... struck... and cut off
  chosen_spanish_reading: extendió... desenvainó... hirió... y le cortó
  alternative_spanish_readings:
  - extendiendo... desenvainó... golpeó... y le cortó
  - extendió... sacó... golpeó... y le cortó
  rationale: Los participios griegos se integran en español como acciones coordinadas en secuencia narrativa para conservar la vivacidad del relato. La última acción se expresa con un verbo finito coordinado, siguiendo la revisión inglesa que hizo explícito el cierre de la escena.
  doctrine_reference: Principios de equivalencia óptima y preservación de la progresión verbal en narrativa
- issue: Referencia al arma μάχαιρα
  english_pob_reading: sword
  chosen_spanish_reading: espada
  alternative_spanish_readings:
  - cuchillo grande
  - arma corta
  rationale: No se introduce una especificación más estrecha que el contexto no exige. "Espada" funciona como término narrativo estándar en español y evita sobreinterpretar la precisión del arma.
  doctrine_reference: Principio de evitar especificaciones no atestiguadas por el contexto
- issue: El marcador exclamativo ἰδοὺ
  english_pob_reading: behold
  chosen_spanish_reading: he aquí
  alternative_spanish_readings:
  - mira
  - mira, pues
  rationale: Se preserva el tono exhortativo/narrativo del marcador sin convertirlo en una orden demasiado coloquial. "He aquí" es una solución reverente y comprensible para lectores bíblicos en español.
  doctrine_reference: Convenciones de estilo bíblico en español moderno
translation_notes:
  revision_awareness: La revisión inglesa más reciente aclaró el cierre de la acción con un verbo coordinado explícito ('and cut off his ear') en lugar de una construcción participial. El español refleja esa misma decisión sintáctica con 'y le cortó la oreja', manteniendo la secuencia verbal completa y la finalización de la acción en un verbo finito.
  spanish_consistency_notes:
  - Se usa "Y he aquí" para conservar el valor discursivo de ἰδοὺ sin omitirlo.
  - '"Esclavo" se mantiene de forma consistente con la guía POB para δοῦλος cuando la subordinación social es relevante.'
  - '"Sumo sacerdote" sigue la terminología bíblica española estándar para ἀρχιερεύς.'
  - La imagen verbal se mantiene compacta y secuencial, evitando añadir sujetos implícitos o explicaciones no presentes en el griego.
