translation:
  language: es
  text: 'Mientras comían[a], Jesús tomó pan, y después de bendecirlo[b], lo partió y lo dio a los discípulos, y dijo: «Tomen, coman[c]; esto es mi cuerpo[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mientras ellos comían».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habiéndolo bendecido»; algunos entienden la acción como bendecir el pan o pronunciar una bendición sobre él, y otros como dar gracias por él.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Tomen y coman».'
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «esto es mi cuerpo»; algunos lo entienden como «esto significa» o «esto representa» mi cuerpo, pero la traducción conserva la formulación del texto fuente.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐσθιόντων δὲ αὐτῶν
  english_pob_choice: While they were eating
  chosen_spanish: Mientras ellos comían
  alternatives_spanish:
  - As they were eating
  - Y mientras ellos comían
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una acción en curso que en español se comunica con naturalidad mediante una cláusula temporal. «Mientras ellos comían» conserva el sentido progresivo y el valor temporal de δέ sin forzar un contraste adversativo.
- source_word: λαβὼν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - habiendo tomado
  - recibió
  lexicon: BDAG
  rationale: El participio aoristo se vierte de forma narrativa y natural con un verbo finito en español. «Tomó» preserva la secuencia de acciones sin volver el texto pesado o mecánico.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - un pan
  - un trozo de pan
  lexicon: BDAG
  rationale: «Pan» es el equivalente normal y suficientemente preciso en español para ἄρτος en este contexto de mesa. No se requiere añadir «un» ni especificar forma física, porque el griego tampoco obliga a ello.
- source_word: εὐλογήσας
  english_pob_choice: after blessing it
  chosen_spanish: después de bendecirlo
  alternatives_spanish:
  - habiendo bendecido
  - después de dar gracias por él
  lexicon: BDAG
  rationale: «Bendecir» preserva el valor de εὐλογέω en el texto, sin colapsarlo en εὐχαριστέω. El complemento pronominal «-lo» remite al pan y mantiene la continuidad sintáctica.
- source_word: ἔκλασεν
  english_pob_choice: he broke it
  chosen_spanish: lo partió
  alternatives_spanish:
  - lo quebró
  - lo rompió
  lexicon: BDAG
  rationale: En español, «partir el pan» es una formulación natural y fiel al acto descrito. «Lo partió» evita un calco rígido y comunica claramente el sentido del verbo griego.
- source_word: δοὺς τοῖς μαθηταῖς
  english_pob_choice: gave it to the disciples
  chosen_spanish: lo dio a los discípulos
  alternatives_spanish:
  - se lo dio a los discípulos
  - lo dio a sus discípulos
  lexicon: BDAG
  rationale: El participio se integra como verbo coordinado para una narración fluida. «Los discípulos» refleja el grupo identificado por el artículo griego sin añadir posesión no explicitada.
- source_word: Λάβετε φάγετε
  english_pob_choice: Take, eat
  chosen_spanish: Tomad, comed
  alternatives_spanish:
  - Tomad y comed
  - Recibid y comed
  lexicon: BDAG
  rationale: Los dos imperativos aoristos se mantienen como dos mandatos breves y directos. «Tomad, comed» conserva la fuerza secuencial y la cadencia del original sin suavizarla en exceso.
- source_word: τοῦτό ἐστιν
  english_pob_choice: this is
  chosen_spanish: esto es
  alternatives_spanish:
  - esto significa
  - esto representa
  lexicon: BDAG
  rationale: La cópula se traduce de manera literal para no introducir una interpretación sacramental en la redacción principal. «Esto es» conserva la formulación del griego y deja la tensión interpretativa documentada aparte.
- source_word: τὸ σῶμά μου
  english_pob_choice: my body
  chosen_spanish: mi cuerpo
  alternatives_spanish:
  - mi cuerpo físico
  - mi cuerpo mismo
  lexicon: BDAG
  rationale: σῶμα se rinde con el equivalente directo «cuerpo». El posesivo español funciona de manera natural en «mi cuerpo» y mantiene el sentido ordinario de la expresión.
theological_decisions:
- issue: 'Fórmula eucarística: sentido de «esto es mi cuerpo»'
  english_pob_reading: Render τοῦτό ἐστιν τὸ σῶμά μου as 'this is my body' without interpretive expansion.
  chosen_spanish_reading: «esto es mi cuerpo» sin ampliación interpretativa
  alternative_spanish_readings:
  - esto significa mi cuerpo
  - esto representa mi cuerpo
  rationale: El griego usa la cópula simple ἐστιν. La traducción conserva la literalidad para no fijar en el texto principal una lectura doctrinal específica sobre la frase de Jesús, manteniendo la tensión teológica documentada por el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo interrevisor fue alto y sólo señaló asuntos menores, por lo que esta redacción sigue de cerca el griego y el trazado auditado en inglés sin resolver la tensión interpretativa de la fórmula eucarística.
  spanish_consistency_notes:
  - Se mantiene «pan» para ἄρτος, «bendecir» para εὐλογέω y «discípulos» para μαθηταί de forma consistente con la terminología POB.
  - Se usa el imperativo plural de trato reverencial tradicional «Tomad, comed» por ser una fórmula bíblica estable y natural en español eclesial.
  - No se usa «SEÑOR» ni sustitutos doctrinales, porque no aparecen en este versículo y no hay razón textual para introducirlos.
