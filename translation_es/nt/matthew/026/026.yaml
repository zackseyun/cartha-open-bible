base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/026.yaml
  text: While they were eating[a], Jesus took bread, and after blessing it, he broke it and gave it to the disciples and said, “Take, eat[d][c][b]; this is my body.”
  footnotes:
