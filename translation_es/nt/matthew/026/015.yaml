translation:
  language: es
  text: 'Él dijo[a]: «¿Qué están dispuestos a darme, y yo se lo entregaré a ustedes?» Ellos le pesaron treinta piezas de plata.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo traicionaré». El verbo griego puede significar «entregar», «poner en manos de», o, en contexto, «traicionar».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί θέλετέ μοι δοῦναι
  english_pob_choice: What are you willing to give me
  chosen_spanish: ¿Qué estáis dispuestos a darme
  alternatives_spanish:
  - ¿Qué queréis darme
  - ¿Qué me daréis
  lexicon: BDAG
  rationale: θέλετε expresa voluntad o disposición, no solo deseo. «Estáis dispuestos a darme» conserva ese matiz volitivo en un español natural y evita reducir la frase a una mera intención o a un futuro simple.
- source_word: κἀγὼ ὑμῖν παραδώσω αὐτόν
  english_pob_choice: and I will hand him over to you
  chosen_spanish: y yo se lo entregaré a ustedes
  alternatives_spanish:
  - y yo se lo entregaré
  - y yo se lo entregaré a ustedes
  - y yo lo pondré en sus manos
  lexicon: BDAG
  rationale: 'παραδίδωμι tiene un rango amplio: entregar, poner en manos, entregar para ser juzgado, y en contexto también traicionar. «Se lo entregaré» conserva el sentido básico de transferencia sin adelantar la evaluación moral que el verbo por sí solo no exige.'
- source_word: οἱ δὲ
  english_pob_choice: And they
  chosen_spanish: Ellos
  alternatives_spanish:
  - Pero ellos
  - Y ellos
  lexicon: BDAG
  rationale: δέ es una partícula de enlace débil. En español, la continuación narrativa fluye bien con «Ellos» sin sobrecargar la relación lógica con una oposición explícita.
- source_word: ἔστησαν αὐτῷ
  english_pob_choice: they weighed out for him
  chosen_spanish: le pesaron
  alternatives_spanish:
  - le pagaron
  - le fijaron
  - le contaron
  lexicon: BDAG
  rationale: El verbo puede usarse en un contexto de fijar o entregar una cantidad, y con ἀργύρια la imagen concreta de «pesar» es la más cercana al giro de la escena. El complemento dativo se expresa naturalmente con «le» en español.
- source_word: τριάκοντα ἀργύρια
  english_pob_choice: thirty pieces of silver
  chosen_spanish: treinta piezas de plata
  alternatives_spanish:
  - treinta monedas de plata
  - treinta piezas de dinero
  - treinta de plata
  lexicon: BDAG
  rationale: ἀργύρια designa plata en piezas o dinero de plata; «piezas de plata» reproduce la forma tradicional y concreta sin introducir una denominación monetaria no dada por el texto griego. «Plata» mantiene el material y la carga narrativa de la expresión.
theological_decisions:
- issue: Valor de παραδώσω en la oferta de Judas
  english_pob_reading: hand him over
  chosen_spanish_reading: se lo entregaré
  alternative_spanish_readings:
  - se lo traicionaré
  - lo entregaré
  - lo pondré en sus manos
  rationale: Se preserva la amplitud semántica del verbo griego. «Entregar» comunica bien el acto de poner a Jesús en poder de otros, mientras que «traicionar» interpreta el acto moralmente; esa lectura es verdadera por el contexto, pero no debe imponerse como única traducción del verbo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente griego y el criterio auditado de la POB en inglés: mantiene la amplitud de παραδίδωμι, conserva la imagen comercial de ἔστησαν con «le pesaron», y usa una equivalencia española natural para la disposición volitiva de θέλετε. No se detectan revisiones posteriores que alteren esta decisión.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos cuando el texto subyacente lo exija; aquí no aparece el nombre divino.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - «Entregar» se mantiene como término técnico consistente para παραδίδωμι cuando el contexto no exige explicitar «traicionar».
  - La puntuación y el diálogo siguen el uso editorial moderno en español, con comillas angulares y nota al pie anclada en el verbo principal.
