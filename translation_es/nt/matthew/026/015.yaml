  rationale: Se corrige «estáis» a «están» para ajustarse al español neutral latinoamericano solicitado. Se repara la nota al pie para que la alternativa léxica sea idiomática y fiel al valor contextual de παραδίδωμι. El resto del texto preserva adecuadamente el sentido del original y las decisiones auditadas del POB.
