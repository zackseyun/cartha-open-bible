translation:
  language: es
  text: 'De nuevo[a], por segunda vez se fue y oró, diciendo: «Padre mío, si esto no puede pasar a menos que yo lo beba[b], hágase tu voluntad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la copa del sufrimiento mencionada en el versículo anterior; el griego aquí dice simplemente «esto» y «lo».
    reason: cross_reference
  - marker: b
    text: 'O: «si no es posible que esto pase a menos que yo lo beba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: BDAG
  rationale: Adverbio de repetición. «Otra vez» es natural en español y conserva la reiteración sin cargar el tono.
- source_word: ἐκ δευτέρου
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - por segunda ocasión
  lexicon: BDAG
  rationale: Expresa de forma idiomática la locución temporal «ἐκ δευτέρου» y evita reducir la doble marca de repetición presente junto con πάλιν.
- source_word: ἀπελθὼν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se apartó
  - habiéndose ido
  lexicon: BDAG
  rationale: El participio aoristo funciona narrativamente como acción previa; en español, «se fue» transmite con naturalidad el desplazamiento previo a la oración.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró en oración
  - hizo oración
  lexicon: BDAG
  rationale: Verbo estándar para la acción religiosa aquí; «oró» es claro y fiel.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Participio introductorio de discurso; «diciendo» preserva la estructura griega de manera natural.
- source_word: Πάτερ μου
  english_pob_choice: My Father
  chosen_spanish: Padre mío
  alternatives_spanish:
  - Mi Padre
  - Padre
  lexicon: BDAG
  rationale: Vocativo íntimo. «Padre mío» mantiene la cercanía filial del original y suena reverente en español.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - esto mismo
  lexicon: BDAG
  rationale: El demostrativo permanece sin añadir «cáliz» o «copa» al texto principal, respetando que el griego aquí dice solo «esto».
- source_word: παρελθεῖν
  english_pob_choice: to pass
  chosen_spanish: pasar
  alternatives_spanish:
  - pasar de largo
  - pasar adelante
  lexicon: BDAG
  rationale: «Pasar» es el equivalente directo y suficiente en este contexto de posible elusión o alejamiento del sufrimiento.
- source_word: ἐὰν μὴ αὐτὸ πίω
  english_pob_choice: unless I drink it
  chosen_spanish: a menos que yo lo beba
  alternatives_spanish:
  - si no lo bebo
  - salvo que yo lo beba
  lexicon: BDAG
  rationale: Conserva el condicional negativo y el verbo «beber» con el objeto implícito. «Lo» retoma de manera gramatical el referente contextual sin introducirlo en la línea principal.
- source_word: γενηθήτω
  english_pob_choice: be done
  chosen_spanish: hágase
  alternatives_spanish:
  - que se haga
  - sea hecho
  lexicon: BDAG
  rationale: Imperativo pasivo de petición. «Hágase» es la forma más natural y reverente en español para esta fórmula de sumisión a la voluntad divina.
- source_word: τὸ θέλημά σου
  english_pob_choice: your will
  chosen_spanish: tu voluntad
  alternatives_spanish:
  - tu deseo
  - tu querer
  lexicon: BDAG
  rationale: «Voluntad» expresa bien el sustantivo θέλημα en contexto teológico y coincide con el registro de oración.
theological_decisions:
- issue: Referente implícito de «esto/lo» (τοῦτο / αὐτό)
  english_pob_reading: Retain the more literal 'this' ... 'it' in the main text, with a footnote identifying the cup from the previous verse
  chosen_spanish_reading: Mantener «esto» ... «lo» en el texto principal, con nota que identifique la copa del sufrimiento por el contexto previo
  alternative_spanish_readings:
  - «esta copa» ... «la»
  - «esta copa» ... «esto»
  rationale: El versículo griego no repite ποτήριον; por fidelidad textual se conserva el demostrativo y el pronombre. La nota aclara el referente contextual sin reescribir el versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fórmula de sumisión a la voluntad divina
  english_pob_reading: your will be done
  chosen_spanish_reading: hágase tu voluntad
  alternative_spanish_readings:
  - que se haga tu voluntad
  - sea hecha tu voluntad
  rationale: «Hágase» reproduce bien el imperativo pasivo y mantiene resonancia interna con la oración modelo de Mateo 6:10, sin añadir interpretación.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: Coincide con la última pasada de revisión, sin cambios requeridos según el control más reciente y la verificación externa de alta concordancia.
  spanish_consistency_notes:
  - Se conserva «Yahvé» no aplicable aquí porque el versículo usa lenguaje de oración a Dios sin el tetragrama explícito.
  - Se mantiene la distinción entre el demostrativo literal («esto») y el referente contextual («la copa del sufrimiento») para no importar un sustantivo ausente del griego.
  - «Hágase» se eligió por su fuerza litúrgica y por corresponder al imperativo pasivo del griego en un contexto de oración.
