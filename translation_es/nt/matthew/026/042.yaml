  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Padre mío», «oró», «esto», «lo», y «hágase tu voluntad» están alineados con la evidencia fuente y la filosofía POB. No se introduce indebidamente «copa» en el texto principal, solo en nota, conforme a la decisión documentada.
