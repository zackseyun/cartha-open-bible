translation:
  language: es
  text: Porque siempre tienen a los pobres con ustedes[a], pero no siempre me tienen a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas pobres».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - de manera constante
  lexicon: BDAG
  rationale: πάντοτε expresa una continuidad temporal general; «siempre» es el equivalente natural y preciso en español, conservando la repetición enfática del griego.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la afirmación previa. «Porque» reproduce bien esa conexión causal/explicativa en español moderno sin sonar artificial.
- source_word: τοὺς πτωχοὺς
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - las personas pobres
  - los pobres y necesitados
  lexicon: BDAG
  rationale: El plural sustantivado designa a los pobres como grupo. «Los pobres» conserva la fuerza colectiva y evita una expansión no exigida por el texto.
- source_word: ἔχετε
  english_pob_choice: have
  chosen_spanish: tienen
  alternatives_spanish:
  - tienen consigo
  - poseen
  lexicon: BDAG
  rationale: ἔχω aquí expresa presencia/disponibilidad, no posesión. En español, «tener» comunica esa disponibilidad de forma natural; se adapta la persona a «con ustedes» según el destinatario explícito del contexto.
- source_word: μεθ’ ἑαυτῶν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - a su lado
  lexicon: BDAG
  rationale: La frase indica compañía o presencia junto a los discípulos. «Con ustedes» es idiomático y claro en español, y evita una literalidad extraña.
- source_word: ἐμὲ
  english_pob_choice: me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  lexicon: BDAG
  rationale: Pronombre objeto directo referido a Jesús. En español, «a mí» enfatiza adecuadamente la persona de Jesús y encaja con la oposición contrastiva de la cláusula.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - pero también
  - sin embargo
  lexicon: BDAG
  rationale: δέ marca contraste con la primera cláusula. «Pero» es la forma más directa y natural para mantener la oposición temporal entre los pobres y Jesús.
- source_word: οὐ πάντοτε
  english_pob_choice: do not always
  chosen_spanish: no me tienen siempre
  alternatives_spanish:
  - no me tienen continuamente
  - no siempre me tienen
  lexicon: BDAG
  rationale: La negación con πάντοτε expresa que la presencia de Jesús entre ellos no es permanente. «No me tienen siempre» preserva ese contraste temporal sin suavizarlo.
theological_decisions:
- issue: Contraste temporal entre los pobres y la presencia de Jesús
  english_pob_reading: The verse contrasts the ongoing presence of the poor with the temporary nature of Jesus' physical presence among the disciples.
  chosen_spanish_reading: El versículo contrasta la presencia continua de los pobres con la presencia temporal de Jesús entre los discípulos.
  alternative_spanish_readings:
  - El versículo podría entenderse como una disminución del valor de los pobres.
  - El versículo afirma que los pobres estarán siempre, pero Jesús no.
  rationale: 'El griego establece un contraste temporal, no una desvalorización moral de los pobres. La traducción debe mantener esa tensión: Jesús no niega la importancia de la misericordia, sino que señala la singularidad del momento de su presencia antes de la cruz.'
  doctrine_reference: Preservar la tensión teológica sin convertirla en una declaración ajena al pasaje; cf. enfoque POB sobre no importar lecturas doctrinales no expresadas por el texto.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés: γάρ se mantiene explicativo, πτωχοὺς se vierte como «los pobres», ἔχετε como «tienen» en sentido de presencia/disponibilidad, y οὐ πάντοτε conserva el contraste temporal con «no me tienen siempre». No se introdujeron cambios textuales respecto del pasaje base; la nota lexical preserva la alternativa colectiva explícita que el inglés documenta.'
  spanish_consistency_notes:
  - Se mantiene «los pobres» como grupo colectivo, en paralelo con la decisión inglesa.
  - Se conserva el contraste entre presencia continua y temporalidad sin añadir explicaciones devocionales.
  - La forma «con ustedes» evita calcos como «con vosotros» para una audiencia amplia de español latinoamericano.
  - El pronombre «a mí» refuerza el contraste con el sujeto implícito de la segunda cláusula sin alterar el sentido del griego.
