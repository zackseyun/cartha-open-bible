translation:
  language: es
  text: Porque cuando ella derramó este perfume sobre mi cuerpo, lo hizo para mi sepultura.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para prepararme para la sepultura'; el griego puede expresarse de forma más compacta, pero el verbo incluye la idea de preparar un cuerpo para la sepultura.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαλοῦσα
  english_pob_choice: in pouring / when she poured
  chosen_spanish: al derramar
  alternatives_spanish:
  - cuando derramó
  - derramando
  - al verter
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción concreta por la cual ella realizó lo dicho. En español, 'al derramar' conserva la relación participial y suena natural; 'derramar' expresa mejor el acto de aplicar el perfume que un calco como 'echar' o 'tirar'.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: BDAG
  rationale: Aquí γάρ introduce la explicación de Jesús sobre el acto de la mujer. 'Porque' comunica de forma clara la relación explicativa y encaja bien en español bíblico contemporáneo.
- source_word: μύρον
  english_pob_choice: perfume
  chosen_spanish: perfume
  alternatives_spanish:
  - ungüento
  - ungüento perfumado
  - aceite perfumado
  lexicon: BDAG
  rationale: μύρον puede referirse a un ungüento aromático usado para ungir. 'Perfume' mantiene la idea de una sustancia fragante y sigue la decisión inglesa, siendo inteligible para lectores modernos; 'ungüento' queda como alternativa más técnica.
- source_word: ἐπὶ τοῦ σώματός μου
  english_pob_choice: on my body
  chosen_spanish: sobre mi cuerpo
  alternatives_spanish:
  - sobre mi cuerpo físico
  - en mi cuerpo
  lexicon: BDAG
  rationale: La preposición ἐπί con genitivo expresa contacto o ubicación. 'Sobre mi cuerpo' refleja esa relación de manera natural en español y evita una formulación demasiado rígida.
- source_word: πρὸς τὸ ἐνταφιάσαι με
  english_pob_choice: to prepare me for burial
  chosen_spanish: para prepararme para la sepultura
  alternatives_spanish:
  - para mi sepultura
  - para enterrarme
  - para mi entierro
  lexicon: BDAG
  rationale: ἐνταφιάζω no es solo 'enterrar', sino preparar un cuerpo para la sepultura. 'Para prepararme para la sepultura' preserva esa nuance; 'sepultura' comunica bien el sentido funerario sin forzar una expresión más estrecha.
- source_word: ἐποίησεν
  english_pob_choice: she did it
  chosen_spanish: ella lo hizo
  alternatives_spanish:
  - ella hizo esto
  - ella realizó esto
  lexicon: BDAG
  rationale: ποιέω aquí resume la acción ya descrita. 'Ella lo hizo' es una forma natural y concisa en español que mantiene el enlace con el acto anterior sin añadir contenido extra.
- source_word: αὕτη
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - esta mujer
  - esta
  lexicon: BDAG
  rationale: Aunque αὕτη puede conservar un matiz demostrativo, el referente ya está claro en el contexto. 'Ella' evita una redundancia innecesaria en español y sigue la economía del inglés POB.
theological_decisions:
- issue: Sentido de ἐνταφιάζω en la interpretación de Jesús
  english_pob_reading: The woman's act is interpreted as preparation for Jesus' burial.
  chosen_spanish_reading: La acción de la mujer se entiende como preparación para la sepultura de Jesús.
  alternative_spanish_readings:
  - simplemente para la sepultura
  - para enterrarme
  rationale: El verbo griego apunta a la preparación del cuerpo para el entierro. Mantener 'prepararme para la sepultura' conserva la interpretación anticipatoria de Jesús sin suavizar el matiz funerario ni agregar una explicación doctrinal ajena al texto.
  doctrine_reference: Mateo 26:12; BDAG ἐνταφιάζω; Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió la mayúscula de 'when' y consolidó la lectura natural del participio como cláusula temporal. La presente redacción española sigue esa misma relación lógica, pero la expresa con una construcción participial natural ('al derramar') para conservar fluidez y fidelidad al griego.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo.
  - Se evitó 'Cristo' porque el texto no contiene Χριστός.
  - Se mantuvo 'perfume' en lugar de 'ungüento' por coherencia con la decisión léxica auditada y por inteligibilidad moderna.
  - '''Sepultura'' se eligió para preservar el valor de ἐνταφιάζω sin reducirlo a un simple ''entierro''.'
