    issue: '''En aquella hora'' suena poco natural en español contemporáneo'
    rationale: Aunque calca de cerca ἐν ἐκείνῃ τῇ ὥρᾳ, en español amplio y eclesial 'A esa hora' comunica mejor la misma inmediatez sin rigidez innecesaria.
  - severity: low
    issue: La nota [b] está bien, pero su razón debería reflejar que preserva una formulación alternativa previa
    rationale: La auditoría inglesa registra esta nota como conservación de una formulación previa; en español puede mantenerse el contenido, pero conviene conservar ese sentido documental en la razón.
  revised_spanish_text: 'A esa hora Jesús dijo a las multitudes: «¿Han salido con espadas y palos para arrestarme, como contra un ladrón[a]? Día tras día me sentaba en el templo enseñando[b], y no me prendieron».'
  revised_footnotes:
  - marker: a
    text: O “bandido” o “insurrecto”; el griego λῃστής puede denotar más que un simple ladrón, incluyendo un brigante violento o un rebelde en algunos contextos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Han salido con espadas y palos para arrestarme como contra un ladrón?»'
    reason: previous_rendering
  revision_rationale: 'Se ajusta solo lo necesario: ''A esa hora'' mejora la naturalidad sin perder la solemnidad ni la inmediatez del griego. Se conserva el resto porque ya representa fielmente el sentido fuente y las decisiones léxicas auditadas. También se normaliza la razón documental de la nota [b] para alinearla con la pista de auditoría inglesa.'
