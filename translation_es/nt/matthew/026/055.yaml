    changes_summary: Revised 'as if I were a robber' to the more literal 'as against a robber' to reflect ὡς ἐπὶ λῃστήν more closely, and simplified 'temple courts' to 'temple' since ἱερόν is simply 'temple' here. Kept the rest unchanged.
translation:
  language: es
  text: 'A esa hora Jesús dijo a las multitudes: «¿Han salido con espadas y palos para arrestarme, como contra un ladrón[a]? Día tras día me sentaba en el templo enseñando[b], y no me prendieron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “bandido” o “insurrecto”; el griego λῃστής puede denotar más que un simple ladrón, incluyendo un brigante violento o un rebelde en algunos contextos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Han salido con espadas y palos para arrestarme como contra un ladrón?»'
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  english_pob_choice: At that hour
  chosen_spanish: En aquella hora
  alternatives_spanish:
  - En ese momento
  - A esa hora
  lexicon: BDAG
  rationale: Mantiene el matiz temporal inmediato y la solemnidad del giro, sin volverlo artificial en español.
- source_word: τοῖς ὄχλοις
  english_pob_choice: to the crowds
  chosen_spanish: a las multitudes
  alternatives_spanish:
  - a la multitud
  - a las turbas
  lexicon: BDAG
  rationale: ὄχλοις es plural; 'multitudes' conserva el plural y el tono bíblico sin caer en un singular no marcado.
- source_word: Ὡς ἐπὶ λῃστὴν
  english_pob_choice: as against a robber
  chosen_spanish: como contra un ladrón
  alternatives_spanish:
  - como contra un bandido
  - como si yo fuera un ladrón
  lexicon: BDAG
  rationale: La construcción griega es idiomática y confrontativa; 'como contra un ladrón' conserva la fuerza comparativa y resulta natural en español. Se evita cerrar el sentido de λῃστής a un mero ratero; la nota preserva la amplitud léxica.
- source_word: ἐξήλθατε
  english_pob_choice: have you come out
  chosen_spanish: han salido
  alternatives_spanish:
  - salieron
  - han venido
  lexicon: BDAG
  rationale: En español, el punto de vista del hablante permite 'han salido' para la acción de acercarse desde fuera; en la pregunta retórica funciona con claridad y respeto del aspecto perfecto.
- source_word: μετὰ μαχαιρῶν καὶ ξύλων
  english_pob_choice: with swords and clubs
  chosen_spanish: con espadas y palos
  alternatives_spanish:
  - con espadas y garrotes
  - con cuchillos y palos
  lexicon: BDAG
  rationale: '''Espadas'' comunica μαχαιρῶν de manera clara y pública; ''palos'' conserva ξύλων sin sobrerinterpretar el tipo exacto de arma. Se evita introducir ''garrotes'' por ser más específico de lo que exige el texto.'
- source_word: συλλαβεῖν με
  english_pob_choice: to arrest me
  chosen_spanish: para arrestarme
  alternatives_spanish:
  - para prenderme
  - para tomarme preso
  lexicon: BDAG
  rationale: En este contexto hostil y oficial, 'arrestar' expresa bien la acción de detener a Jesús. Se reserva 'prender' para ἐκρατήσατέ με más abajo, conservando distinción verbal.
- source_word: καθ’ ἡμέραν
  english_pob_choice: Day after day
  chosen_spanish: Día tras día
  alternatives_spanish:
  - Todos los días
  - Diariamente
  lexicon: BDAG
  rationale: Reproduce la fuerza distributiva e insistente del griego con una fórmula idiomática natural en español.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo; en este contexto 'en el templo' es suficiente y fiel, como en la revisión inglesa más literal.
- source_word: ἐκαθεζόμην
  english_pob_choice: I was sitting
  chosen_spanish: me sentaba
  alternatives_spanish:
  - estaba sentado
  - me estaba sentando
  lexicon: BDAG
  rationale: El imperfecto expresa acción habitual o continua; 'me sentaba' preserva ese aspecto en español de forma natural.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - mientras enseñaba
  - y enseñando
  lexicon: BDAG
  rationale: El participio contemporáneo se vierte de forma adverbial con 'enseñando', sin sobrecargar la frase.
- source_word: οὐκ ἐκρατήσατέ με
  english_pob_choice: you did not seize me
  chosen_spanish: no me prendieron
  alternatives_spanish:
  - no me sujetaron
  - no me aprehendieron
  lexicon: BDAG
  rationale: κρατέω aquí expresa tomar o aprehender con fuerza; 'prender' comunica bien la acción de arrestar/someter y evita repetir 'arrestarme' inmediatamente anterior. Se mantiene la ironía del reproche.
theological_decisions:
- issue: Nuance of λῃστής in Jesus' rhetorical question
  english_pob_reading: robber
  chosen_spanish_reading: ladrón
  alternative_spanish_readings:
  - bandido
  - insurrecto
  rationale: '''Ladrón'' es comprensible y cercano, pero en la nota se conserva la amplitud de λῃστής, que puede abarcar bandido violento o rebelde. El texto principal no fuerza una lectura política específica que el verso no explicita.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que volvió más literal la comparación de ὡς ἐπὶ λῃστήν y simplificó ἱερόν a 'templo'. La versión española refleja esa dirección sin calcar el inglés de modo rígido, manteniendo naturalidad y la distinción entre συλλαβεῖν y ἐκρατήσατέ με.
  spanish_consistency_notes:
  - Se usa 'Jesús' y 'Dios' según los estándares del proyecto; no hay términos divinos adicionales en este versículo.
  - Se conservó la diferencia verbal entre 'arrestarme' (συλλαβεῖν) y 'prendieron' (ἐκρατήσατέ με) para no perder la ironía retórica.
  - Se optó por 'en el templo' en vez de una expansión explicativa, siguiendo la revisión inglesa más reciente y el valor general de ἱερόν.
