revisions:
- from: 'En aquella hora Jesús dijo a las multitudes: «¿Han salido con espadas y palos para arrestarme, como contra un ladrón[a]? Día tras día me sentaba en el templo enseñando[b], y no me prendieron».'
  to: 'A esa hora Jesús dijo a las multitudes: «¿Han salido con espadas y palos para arrestarme, como contra un ladrón[a]? Día tras día me sentaba en el templo enseñando[b], y no me prendieron».'
  rationale: 'Se ajusta solo lo necesario: ''A esa hora'' mejora la naturalidad sin perder la solemnidad ni la inmediatez del griego. Se conserva el resto porque ya representa fielmente el sentido fuente y las decisiones léxicas auditadas. También se normaliza la razón documental de la nota [b] para alinearla con la pista de auditoría inglesa.'
