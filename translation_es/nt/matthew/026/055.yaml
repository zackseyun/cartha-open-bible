id: MAT.26.55
reference: Matthew 26:55
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ἐν ἐκείνῃ τῇ ὥρᾳ εἶπεν ὁ Ἰησοῦς τοῖς ὄχλοις· Ὡς ἐπὶ λῃστὴν ἐξήλθατε μετὰ μαχαιρῶν καὶ ξύλων συλλαβεῖν με; καθ’ ⸀ἡμέραν ⸂ἐν τῷ ἱερῷ ἐκαθεζόμην διδάσκων⸃ καὶ οὐκ ἐκρατήσατέ με.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/055.yaml
  text: At that hour Jesus said to the crowds[a], “Have you come out with swords and clubs to arrest me, as against a robber? Day after day I was sitting in the temple teaching[b], and you did not seize me.”
  footnotes:
  - marker: a
    text: Or “bandit” or “insurrectionist”; the Greek λῃστής can denote more than a petty thief, including a violent brigand or rebel in some contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'Have you come out with swords and clubs to arrest me as against a robber?'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
