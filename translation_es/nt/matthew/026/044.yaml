translation:
  language: es
  text: Y dejándolos otra vez, se fue y oró por tercera vez, diciendo lo mismo[a] otra vez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la misma cosa». Griego: «la misma palabra/dicho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφεὶς
  english_pob_choice: leaving
  chosen_spanish: dejándolos
  alternatives_spanish:
  - al dejarlos
  - habiéndolos dejado
  lexicon: BDAG
  rationale: El participio aoristo expresa que Jesús se aparta de ellos antes de continuar la acción principal. «Dejándolos» conserva la secuencia narrativa sin sonar forzado en español.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Pronombre acusativo directo que remite a los discípulos; «los» es el equivalente natural y breve en español.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: El adverbio marca repetición. «Otra vez» es claro y natural en español, y aquí se conserva la repetición explícita del griego.
- source_word: ἀπελθὼν
  english_pob_choice: he went away
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - se apartó
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento de alejamiento. «Fue» funciona bien en narración, aunque «se fue» también sería posible; el contexto ya da la idea de alejarse de ellos.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró a Dios
  - hizo oración
  lexicon: BDAG
  rationale: Verbo de oración en pasado simple. «Oró» es una forma española digna y directa; no se añade «a Dios» porque el contexto ya deja claro el destinatario de la oración.
- source_word: ἐκ τρίτου
  english_pob_choice: a third time
  chosen_spanish: por tercera vez
  alternatives_spanish:
  - una tercera vez
  - a la tercera
  lexicon: BDAG
  rationale: La locución expresa ocasión repetida. «Por tercera vez» es la manera más idiomática en español para el valor adverbial de la expresión.
- source_word: τὸν αὐτὸν λόγον
  english_pob_choice: the same thing
  chosen_spanish: la misma cosa
  alternatives_spanish:
  - las mismas palabras
  - lo mismo
  lexicon: BDAG
  rationale: λόγον es singular y puede significar palabra, dicho, asunto o contenido dicho. «La misma cosa» mantiene la ambigüedad concreta del griego y evita forzar «palabras» cuando el texto singulariza λόγος.
- source_word: εἰπὼν
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - habiendo dicho
  lexicon: BDAG
  rationale: Participio aoristo que introduce el contenido de la oración. «Diciendo» conserva la relación sintáctica con la oración principal y suena natural en español.
- source_word: πάλιν (final)
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Se conserva la segunda ocurrencia de πάλιν porque el griego la repite enfáticamente al final; no se omite por estilo para no perder el énfasis narrativo.
theological_decisions:
- issue: Repetición exacta de la oración de Jesús
  english_pob_reading: The verse is rendered to preserve that Jesus prayed on a third occasion and repeated the same prayer content.
  chosen_spanish_reading: El versículo deja claro que Jesús oró por tercera vez y repitió el mismo contenido de oración.
  alternative_spanish_readings:
  - Una versión más fluida podría suprimir la segunda «otra vez».
  - También podría suavizarse a «diciendo lo mismo».
  rationale: El texto griego contiene dos ocurrencias de πάλιν, y la traducción española las conserva para reflejar la insistencia narrativa. No se introduce interpretación doctrinal adicional; solo se preserva el énfasis del relato.
  doctrine_reference: Principios POB de fidelidad formal-optativa y preservación de énfasis textual
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al texto mediante [a]. También se ajustó la nota para reflejar la alternativa de traducción de λόγον sin desbordar el sentido del singular griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí porque el versículo no contiene el nombre divino.
  - Se conserva «oró» en lugar de una formulación más eclesiástica como «hizo oración», por ser más natural y fiel al verbo griego.
  - Se respeta la repetición de «otra vez» para reflejar ambos πάλιν del texto fuente.
  - «La misma cosa» se usa como equivalente del singular λόγον, evitando pluralizar indebidamente el contenido.
