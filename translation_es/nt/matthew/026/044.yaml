revisions:
- from: Y dejándolos otra vez[a], fue y oró por tercera vez, diciendo la misma cosa otra vez.
  to: Y dejándolos otra vez, se fue y oró por tercera vez, diciendo lo mismo[a] otra vez.
  rationale: Se corrige el anclaje de la nota para que corresponda a τὸν αὐτὸν λόγον, se mejora la naturalidad de «la misma cosa» a «lo mismo» sin perder el singular/contenido del griego, y se fortalece el sentido de alejamiento de ἀπελθών con «se fue». Se mantienen ambas repeticiones de «otra vez» para reflejar las dos instancias de πάλιν.
