revisions:
- from: 'Pero Jesús le dijo[a]: «Amigo, haz lo que viniste a hacer». Entonces ellos se acercaron, echaron mano de Jesús y lo prendieron.'
  to: 'Pero Jesús le dijo[a]: «Amigo, haz lo que viniste a hacer». Entonces ellos se acercaron, pusieron las manos sobre Jesús y lo prendieron.'
  rationale: 'Se conserva la traducción principal y la nota alternativa porque representan fielmente la ambigüedad de ἐφ’ ὃ πάρει. Solo se ajusta la frase de arresto para un español más neutral y transparente: «pusieron las manos sobre Jesús» distingue mejor el gesto inicial de aprehensión de «lo prendieron», que sigue representando bien ἐκράτησαν αὐτόν.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:22:39Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue la auditoría inglesa: «Amigo» para Ἑταῖρε, la lectura principal imperatival para ἐφ’ ὃ πάρει, y la nota con la alternativa interrogativa. También mantiene la secuencia narrativa de προσελθόντες … ἐπέβαλον … ἐκράτησαν. Sin embargo, «echaron mano de Jesús» + «lo prendieron» suena algo redundante y ligeramente más marcado/idiomático de lo deseable para un español neutral moderno; conviene una formulación más transparente que preserve el modismo de ‘laid hands on’ y luego la captura física.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse para neutralidad panhispánica y fluidez moderna. «Haz lo que viniste a hacer» funciona bien. La mayor mejora es reemplazar «echaron mano de Jesús» por «pusieron las manos sobre Jesús», que suena más ampliamente comprensible y conserva la correspondencia con el inglés POB y el griego idiomático, dejando «lo prendieron» para la acción final de aprehensión.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo aparte de «Jesús», correctamente mantenido. Las decisiones léxicas principales concuerdan con la rationale documentada. La revisión propuesta no altera ninguna decisión teológica; solo afina la representación idiomática de ἐπέβαλον τὰς χεῖρας ἐπὶ.
  issues:
  - severity: medium
    issue: «Echaron mano de Jesús» es algo regional/idiomático y puede sonar menos neutral que la meta de español ampliamente eclesial.
    rationale: Aunque comunica bien la idea, el proyecto pide español neutral latinoamericano y legible ampliamente. «Pusieron las manos sobre Jesús» preserva mejor el modismo fuente sin depender de un giro más localizado.
  - severity: low
    issue: La combinación «echaron mano de Jesús y lo prendieron» produce leve redundancia estilística.
    rationale: Ambas expresiones comunican aprehensión; una formulación más literal para la primera acción ayuda a distinguir entre ‘ponerle las manos encima’ y ‘apresarlo’.
  revised_spanish_text: 'Pero Jesús le dijo[a]: «Amigo, haz lo que viniste a hacer». Entonces ellos se acercaron, pusieron las manos sobre Jesús y lo prendieron.'
  revised_footnotes:
  - marker: a
    text: 'O: «Amigo, ¿para qué has venido?». La expresión griega es breve y puede entenderse como una pregunta.'
    reason: alternative_reading
  revision_rationale: 'Se conserva la traducción principal y la nota alternativa porque representan fielmente la ambigüedad de ἐφ’ ὃ πάρει. Solo se ajusta la frase de arresto para un español más neutral y transparente: «pusieron las manos sobre Jesús» distingue mejor el gesto inicial de aprehensión de «lo prendieron», que sigue representando bien ἐκράτησαν αὐτόν.'
