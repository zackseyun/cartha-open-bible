translation:
  language: es
  text: 'Pero Jesús le dijo[a]: «Amigo, haz lo que viniste a hacer». Entonces ellos se acercaron, pusieron las manos sobre Jesús y lo prendieron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amigo, ¿para qué has venido?». La expresión griega es breve y puede entenderse como una pregunta.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἑταῖρε
  english_pob_choice: Friend
  chosen_spanish: Amigo
  alternatives_spanish:
  - Compañero
  - Camarada
  lexicon: BDAG
  rationale: El vocativo se dirige a Judas con una forma sobria y no afectuosa. «Amigo» es la equivalencia natural en español y conserva esa distancia contenida mejor que opciones más marcadas o arcaicas.
- source_word: ἐφ’ ὃ πάρει
  english_pob_choice: do what you came for
  chosen_spanish: haz lo que viniste a hacer
  alternatives_spanish:
  - ¿para qué has venido?
  - haz lo que has venido a hacer
  lexicon: BDAG
  rationale: La construcción griega es breve y algo ambigua. La redacción principal expresa en español la idea de permitir o poner en marcha la intención de Judas sin suavizar la tensión del contexto. Se conserva la alternativa interrogativa como posibilidad real del griego.
- source_word: προσελθόντες
  english_pob_choice: they came up
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron hacia él
  - se adelantaron
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento hacia Jesús por parte del grupo. «Se acercaron» es natural en español y mantiene la progresión narrativa.
- source_word: ἐπέβαλον τὰς χεῖρας ἐπὶ τὸν Ἰησοῦν
  english_pob_choice: laid hands on Jesus
  chosen_spanish: echaron mano de Jesús
  alternatives_spanish:
  - pusieron las manos sobre Jesús
  - le echaron mano
  lexicon: BDAG
  rationale: La expresión describe una acción física de aprehensión en un arresto. «Echaron mano de Jesús» reproduce bien el sentido idiomático y la fuerza concreta de la frase sin volverla más legal de lo que dice el griego.
- source_word: ἐκράτησαν αὐτόν
  english_pob_choice: seized him
  chosen_spanish: lo prendieron
  alternatives_spanish:
  - lo apresaron
  - lo sujetaron
  lexicon: BDAG
  rationale: κρατέω aquí implica agarrar con fuerza/capturar. «Lo prendieron» comunica bien la toma física en contexto narrativo y funciona de manera más idiomática que una traducción demasiado técnica o administrativa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: La partícula introduce un giro suave desde la respuesta de Jesús hacia la acción del grupo. «Pero» refleja adecuadamente la transición y el contraste narrativo.
theological_decisions:
- issue: Tensión interpretativa de la respuesta de Jesús a Judas
  english_pob_reading: 'Render Jesus''s words without softening their tension: ''Friend, do what you came for.'''
  chosen_spanish_reading: «Amigo, haz lo que viniste a hacer».
  alternative_spanish_readings:
  - «Amigo, ¿para qué has venido?»
  - «Amigo, ¿por qué has venido?»
  rationale: La frase griega es comprimida y admite más de una lectura. La versión principal preserva la tensión del pasaje sin forzar un tono excesivamente amable ni resolver la ambigüedad por adelantado. La nota conserva la lectura interrogativa como alternativa legítima.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra acuerdo alto y sin cambios recientes; por eso el borrador español sigue de cerca la decisión principal, manteniendo la ambigüedad del dicho de Jesús mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino ni una cita directa que lo requiera.
  - «Prendieron» se usa como equivalente narrativo de captura física, coherente con el valor de κρατέω en este contexto.
  - La puntuación mantiene el contraste narrativo entre la palabra de Jesús y la acción inmediata del grupo.
