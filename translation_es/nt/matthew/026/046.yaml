translation:
  language: es
  text: Levántense[a], vamos. Miren, ya se ha acercado el que me traiciona.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el que me entrega» o «el que me pone en manos de otros».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγείρεσθε
  english_pob_choice: Get up
  chosen_spanish: Levántense
  alternatives_spanish:
  - Pónganse de pie
  - Levántense ya
  - Despiértense
  lexicon: BDAG
  rationale: Imperativo presente de segunda persona plural. En español, «Levántense» comunica de manera natural la orden de incorporarse y mantiene la fuerza imperativa sin arcaísmo.
- source_word: ἄγωμεν
  english_pob_choice: let us go
  chosen_spanish: vámonos
  alternatives_spanish:
  - vamos
  - partamos
  - salgamos
  lexicon: BDAG
  rationale: Subjuntivo exhortativo de primera persona plural. «Vámonos» expresa de forma idiomática y breve la idea de moverse juntos, con un tono natural en español contemporáneo.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren esto
  - Vean
  - He aquí
  lexicon: BDAG
  rationale: Partícula deíctica que llama la atención sobre lo inmediato. «Miren» conserva la vividez del griego y suena más natural que un calco solemne como «He aquí».
- source_word: ἤγγικεν
  english_pob_choice: has come near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - está cerca
  - ha llegado
  - se ha aproximado
  lexicon: BDAG
  rationale: Perfecto de ἐγγίζω con matiz de aproximación completada y relevancia presente. «Se ha acercado» refleja bien ese valor sin convertirlo en una llegada plena.
- source_word: ὁ παραδιδούς
  english_pob_choice: the one betraying
  chosen_spanish: el que me entrega
  alternatives_spanish:
  - el que me traiciona
  - el que me ha entregado
  - el traidor
  lexicon: BDAG
  rationale: Aunque el audit trail inglés opta por «betraying» por el contexto narrativo, el griego subraya literalmente la acción de παραδίδωμι. En español, «el que me entrega» preserva mejor el verbo de base y evita imponer de entrada una interpretación más específica; el contexto de la pasión deja ver la traición implicada.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús. Se mantiene como «me» por claridad y economía.
theological_decisions:
- issue: παραδιδούς en el contexto de la pasión
  english_pob_reading: the one betraying me
  chosen_spanish_reading: el que me entrega
  alternative_spanish_readings:
  - el que me traiciona
  - el traidor
  - el que me entrega en manos de otros
  rationale: El inglés POB preserva la fuerza relacional de la traición, pero también anota el sentido más literal de «handing over / delivering up». En español, «el que me entrega» conserva la raíz verbal de παραδίδωμι y permite que el lector perciba el acto de poner a Jesús en manos ajenas; el contexto narrativo de Judas aporta la dimensión de traición sin necesidad de expresarla como traducción principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se observan revisiones aplicadas en el paquete de origen; la propuesta sigue el estado más reciente, con alta concordancia de revisión y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se usa «Mesías/Cristo» no aplicable en este versículo.
  - Se preserva la distinción entre una acción de entrega y la interpretación contextual de traición en la nota lexical.
  - El tono es moderno y digno, evitando arcaísmos innecesarios.
