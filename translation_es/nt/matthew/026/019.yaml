translation:
  language: es
  text: Y los discípulos hicieron como Jesús les había indicado[a], y prepararon la Pascua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la cena de Pascua'; πάσχα puede referirse a la celebración de Pascua en sentido más amplio, incluida la comida preparada para ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - realizaron
  lexicon: BDAG
  rationale: En este contexto narrativo, ποιέω expresa la acción concreta de obedecer una instrucción previa. 'Hicieron' es natural en español y conserva la fuerza de cumplimiento sin sobreinterpretar el verbo.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los seguidores
  - los aprendices
  lexicon: BDAG
  rationale: '''Discípulos'' es el equivalente estable en los Evangelios y mantiene la relación reconocible con Jesús sin novedad innecesaria.'
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - según
  lexicon: BDAG
  rationale: '''Como'' transmite conformidad con la instrucción de Jesús de manera clara y idiomática en español.'
- source_word: συνέταξεν
  english_pob_choice: had directed
  chosen_spanish: les había indicado
  alternatives_spanish:
  - les había mandado
  - les había ordenado
  - les había instruido
  lexicon: BDAG
  rationale: συντάσσω puede significar ordenar, dirigir o instruir. 'Había indicado' comunica una instrucción previa con tono adecuado al contexto y evita cargar el verbo con una dureza mayor de la que el pasaje exige. El pluscuamperfecto refleja la anterioridad respecto de la acción de los discípulos.
- source_word: ἡτοίμασαν
  english_pob_choice: prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - dejaron listo
  - dispusieron
  lexicon: BDAG
  rationale: ἑτοιμάζω se traduce de forma directa y natural por 'preparar'. 'Prepararon' conserva la acción completa y formalmente adecuada.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua
  - la celebración de Pascua
  - la cena de Pascua
  lexicon: BDAG
  rationale: '''Pascua'' preserva el alcance amplio de πάσχα, que puede referirse a la festividad y, por contexto, a la preparación relacionada con la comida. No se especifica ''cena'' en el texto griego, por lo que se mantiene la amplitud semántica.'
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: Convención onomástica estándar
  rationale: Nombre propio transliterado según la convención normal en español bíblico.
theological_decisions:
- issue: Alcance de τὸ πάσχα
  english_pob_reading: the Passover
  chosen_spanish_reading: la Pascua
  alternative_spanish_readings:
  - la cena de Pascua
  - la Pascua como celebración
  rationale: El griego no restringe el referente a 'cena' ni a 'cordero'. Mantener 'la Pascua' conserva la amplitud del término y evita añadir especificidad no presente en el texto. La nota explica la posibilidad contextual de la comida preparada para la celebración.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas; el último pase quedó sin cambios y con acuerdo alto. La redacción española sigue esa lectura estable, manteniendo la misma ambigüedad controlada de πάσχα mediante una nota lexical.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para Ἰησοῦς según la convención estable del proyecto.
  - Se usa 'discípulos' como término técnico estándar en los Evangelios.
  - '''Pascua'' conserva la amplitud del término griego y evita introducir ''cena'' en el cuerpo principal.'
