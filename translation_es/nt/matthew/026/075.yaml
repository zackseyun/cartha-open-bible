review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Pedro recuerda lo dicho por Jesús, la predicción sobre negarlo tres veces antes del canto del gallo, sale y llora intensamente. También preserva correctamente el nombre simple «Jesús» sin añadir título, y mantiene adecuadamente la nota sobre «un gallo / el gallo».'
  spanish_quality_summary: La redacción es en general clara, pero hay dos puntos mejorables. «la palabra que Jesús había dicho» suena poco natural en español; con «palabra», lo idiomático es «las palabras de Jesús» o «lo que Jesús había dicho». Además, «Y saliendo afuera» resulta forzado y poco natural; el griego ἐξελθὼν ἔξω se expresa mejor en español como «Y saliendo fuera» o más idiomáticamente «Y salió afuera / salió fuera». Para conservar la estructura participial sin dureza excesiva, «Y saliendo fuera» funciona bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» está bien. No hay términos teológicos sensibles que exijan ajuste. La elección «un gallo» con nota alternativa está alineada con el expediente inglés.
  issues:
  - severity: medium
    issue: «la palabra que Jesús había dicho» es poco idiomático en español
    rationale: Aunque cada elemento refleja el griego, en español «palabra» en singular con «había dicho» suena rígido. «las palabras de Jesús» preserva bien ῥῆμα/εἰρηκότος y mejora la legibilidad sin perder fidelidad.
  - severity: medium
    issue: «Y saliendo afuera» suena antinatural
    rationale: La combinación de gerundio + «afuera» calca demasiado la forma griega y resulta torpe en español. «Y saliendo fuera» conserva mejor el matiz de salida, o bien «Y salió afuera/fuera» si se prefiere máxima naturalidad.
  - severity: low
    issue: La decisión léxica alternativa «se recordó» es español incorrecto en este contexto
    rationale: No afecta el texto principal, pero en las decisiones léxicas conviene evitar alternativas no idiomáticas.
  - severity: low
    issue: La alternativa «trés veces» contiene tilde incorrecta
    rationale: Es un error ortográfico en el aparato de decisiones, aunque no en el texto bíblico.
