  to: 'Entonces Pedro se acordó de las palabras de Jesús que había dicho: «Antes de que cante un gallo[a], me negarás tres veces». Y saliendo fuera, lloró amargamente.'
  rationale: Se ajusta la frase inicial para un español más natural y fiel al sentido total de ῥήματος... εἰρηκότος, evitando la rigidez de «la palabra que Jesús había dicho». También se mejora «Y saliendo afuera» a «Y saliendo fuera», que conserva mejor la estructura del original sin sonar tan calcado. La nota sobre «un gallo / el gallo» se mantiene tal como está, pues refleja bien el expediente fuente.
