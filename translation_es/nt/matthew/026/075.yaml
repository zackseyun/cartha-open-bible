translation:
  language: es
  text: 'Entonces Pedro se acordó de las palabras de Jesús que había dicho: «Antes de que cante un gallo[a], me negarás tres veces». Y saliendo fuera, lloró amargamente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Antes de que cante el gallo». El griego no lleva artículo, pero en español puede sonar natural tanto con artículo definido como indefinido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθη
  english_pob_choice: remembered
  chosen_spanish: se acordó
  alternatives_spanish:
  - recordó
  - se recordó
  lexicon: BDAG
  rationale: El aoristo de μιμνῄσκομαι expresa que Pedro vino a recordar algo. En español, «se acordó» transmite bien ese recuerdo repentino y natural en el relato, sin añadir matices ajenos.
- source_word: ῥήματος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - dicho
  - expresión
  - mensaje
  lexicon: BDAG
  rationale: ῥῆμα puede referirse a una palabra o dicho pronunciado. «Palabra» es natural en español y conserva la referencia breve y concreta a lo que Jesús había dicho.
- source_word: εἰρηκότος
  english_pob_choice: had spoken
  chosen_spanish: había dicho
  alternatives_spanish:
  - había hablado
  - había expresado
  lexicon: BDAG
  rationale: El participio perfecto señala una palabra ya pronunciada con vigencia narrativa. «Había dicho» es la forma más directa y fiel en español; «había hablado» suena menos preciso con «palabra».
- source_word: Πρὶν ἀλέκτορα φωνῆσαι
  english_pob_choice: Before a rooster crows
  chosen_spanish: Antes de que cante un gallo
  alternatives_spanish:
  - Antes de que cante el gallo
  - Antes de que el gallo cante
  lexicon: BDAG
  rationale: El griego no trae artículo con ἀλέκτορα; por eso, en español se conserva la indefinición con «un gallo». «Cante» comunica naturalmente la acción de ἀλέκτωρ φωνῆσαι, sin forzar una construcción literal.
- source_word: τρὶς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - trés veces
  lexicon: BDAG
  rationale: La expresión numérica es directa y transparente en español.
- source_word: ἀπαρνήσῃ
  english_pob_choice: you will deny
  chosen_spanish: me negarás
  alternatives_spanish:
  - me repudiarás
  - me renegarás
  lexicon: BDAG
  rationale: ἀπαρνέομαι implica negar o repudiar. «Negarás» es la opción más clara y estándar en este contexto; se mantiene el objeto «me» porque el verbo gobierna directamente la negación de Jesús.
- source_word: ἐξελθὼν ἔξω
  english_pob_choice: went outside
  chosen_spanish: saliendo afuera
  alternatives_spanish:
  - salió afuera
  - habiendo salido afuera
  - salió
  lexicon: BDAG
  rationale: La duplicación verbal con adverbio refuerza la salida del lugar. «Saliendo afuera» conserva el movimiento y el énfasis del griego, aunque en español sea algo más marcado que una simple «salió».
- source_word: ἔκλαυσεν πικρῶς
  english_pob_choice: wept bitterly
  chosen_spanish: lloró amargamente
  alternatives_spanish:
  - lloró con amargura
  - lloró con profundo dolor
  - lloró amargamente
  lexicon: BDAG
  rationale: El conjunto verbal-adverbial expresa llanto intenso y doloroso. «Lloró amargamente» mantiene el sentido y suena natural en español; aquí el verbo «llorar» comunica adecuadamente la fuerza de ἔκλαυσεν.
theological_decisions:
- issue: Nombre de Jesús sin título añadido
  english_pob_reading: The Greek text simply has Ἰησοῦ. No christological title should be added where the source does not include one.
  chosen_spanish_reading: Jesús
  alternative_spanish_readings:
  - el Señor Jesús
  - Cristo Jesús
  rationale: Se conserva el nombre simple porque el griego solo dice Ἰησοῦ. Añadir un título introduciría una interpretación no presente en el texto fuente.
  doctrine_reference: Primacía del texto original y restraint cristológico en la traducción cuando el griego no añade título.
- issue: Artículo ausente con ἀλέκτορα
  english_pob_reading: Or “Before the rooster crows.” The Greek lacks the article, but English may use either indefinite or definite wording idiomatically.
  chosen_spanish_reading: «Antes de que cante un gallo»
  alternative_spanish_readings:
  - «Antes de que cante el gallo»
  - «Antes de que cante un gallo»
  rationale: El griego carece de artículo, así que en español es legítimo marcar la indefinición con «un gallo». Se evita convertirlo sin necesidad en una referencia definida.
  doctrine_reference: Respeto por los matices gramaticales del original cuando afectan la formulación narrativa.
translation_notes:
  revision_awareness: 'El versículo coincide con el audit trail inglés de alta concordancia; no hay revisiones aplicadas en el registro fuente. Se mantiene la estructura narrativa y las decisiones clave: recuerdo de Pedro, palabra de Jesús, indefinición de ἀλέκτωρ y el llanto amargo final.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» sin títulos añadidos, en continuidad con el griego y el criterio POB.
  - Se prefiere «me negarás» para ἀπαρνήσῃ, conservando la fuerza relacional de la negación dirigida a Jesús.
  - «Un gallo» respeta el valor anartro del griego; la nota ofrece la alternativa idiomática con artículo definido.
  - 'La secuencia verbal conserva el flujo narrativo: recuerdo, cita, salida, llanto.'
