translation:
  language: es
  text: 'Y viene a los discípulos y los encuentra durmiendo[a], y le dice a Pedro: «¿Entonces[b] no pudisteis velar[c] una hora conmigo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dormidos».
    reason: lexical_alternative
  - marker: b
    text: O «Así que».
    reason: lexical_alternative
  - marker: c
    text: O «mantenerse despiertos»; o «hacer vigilancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - se acerca
  lexicon: BDAG
  rationale: Conservo el presente histórico del griego con un verbo natural en español. «Viene» comunica el movimiento narrativo sin forzar un calco pesado.
- source_word: πρὸς τοὺς μαθητὰς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - hacia los discípulos
  - para con los discípulos
  lexicon: BDAG
  rationale: En este contexto πρός con movimiento se rinde naturalmente con «a» en español. «A los discípulos» mantiene la sencillez del relato.
- source_word: εὑρίσκει αὐτοὺς καθεύδοντας
  english_pob_choice: finds them sleeping
  chosen_spanish: los encuentra durmiendo
  alternatives_spanish:
  - los encuentra dormidos
  lexicon: BDAG
  rationale: El participio verbal καθεύδοντας pide una forma verbal en español. «Durmiendo» conserva la acción en curso; «dormidos» es posible, pero atenúa el matiz verbal.
- source_word: λέγει τῷ Πέτρῳ
  english_pob_choice: he says to Peter
  chosen_spanish: le dice a Pedro
  alternatives_spanish:
  - dice a Pedro
  - le dice a Petros
  lexicon: BDAG
  rationale: Mantengo el nombre habitual «Pedro» y el presente histórico «dice»/«le dice». La combinación es natural y fiel al griego narrativo.
- source_word: Οὕτως
  english_pob_choice: So
  chosen_spanish: ¿Así
  alternatives_spanish:
  - ¿De modo que
  - ¿Entonces
  lexicon: BDAG
  rationale: Aquí el valor de Οὕτως introduce reproche o asombro. En español, «¿Así...?» conserva ese tono interrogativo-reprobatorio sin añadir más contenido del necesario.
- source_word: οὐκ ἰσχύσατε
  english_pob_choice: were you not able
  chosen_spanish: no pudisteis
  alternatives_spanish:
  - no fuisteis capaces
  - ¿no podíais
  lexicon: BDAG
  rationale: ἰσχύω expresa capacidad o fuerza. «No pudisteis» refleja esa incapacidad y además preserva el plural griego que, aunque Jesús se dirige a Pedro, apunta al grupo.
- source_word: μίαν ὥραν
  english_pob_choice: for one hour
  chosen_spanish: una hora
  alternatives_spanish:
  - por una hora
  - durante una hora
  lexicon: BDAG
  rationale: El acusativo expresa duración. En español, la duración queda clara en este contexto sin necesidad de añadir una preposición obligatoria.
- source_word: γρηγορῆσαι
  english_pob_choice: to stay awake
  chosen_spanish: velar
  alternatives_spanish:
  - mantenerse despiertos
  - estar despiertos
  - hacer la guardia
  lexicon: BDAG
  rationale: En español bíblico claro, «velar» conserva el matiz de vigilancia y estar despierto. También deja abierta la nota alternativa de «keep watch» que el audit trail preserva.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  lexicon: BDAG
  rationale: «Conmigo» es la forma idiomática más directa para expresar acompañamiento personal.
theological_decisions:
- issue: 'Dirección del reproche y cambio de número: Jesús habla a Pedro, pero el verbo griego es plural'
  english_pob_reading: Retain singular addressee ('to Peter') and plural rebuke in English ('were you not able'), allowing the tension to stand.
  chosen_spanish_reading: Mantener el destinatario singular («a Pedro») y el verbo plural implícito en español («pudisteis»), dejando visible que Jesús se dirige a Pedro como representante del grupo.
  alternative_spanish_readings:
  - Suavizar el número y hablar solo de Pedro en singular
  - Explicitar que Pedro representa a los demás discípulos
  rationale: 'El texto griego no resuelve la tensión: Jesús se dirige a Pedro, pero usa segunda persona plural. La versión española conserva esa misma fricción para no perder el dato del original ni la carga retórica del reproche.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El último repaso del proyecto indicó que no había cambios necesarios; esta propuesta sigue de cerca el estado aprobado, conservando el presente histórico, el adverbio de reproche y la tensión de número entre el destinatario singular y el verbo plural.
  spanish_consistency_notes:
  - Se mantiene «Pedro» como forma española estándar para Πέτρος.
  - Se conserva «velar» para γρηγορέω, en armonía con la nota inglesa sobre la alternativa «keep watch».
  - La forma plural «pudisteis» preserva el alcance colectivo del griego aunque el discurso se dirija a Pedro.
  - Se usa puntuación interrogativa española completa y comillas angulares para el discurso directo.
