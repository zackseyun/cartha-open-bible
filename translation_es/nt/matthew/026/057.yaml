translation:
  language: es
  text: Los que habían apresado a Jesús lo llevaron a Caifás, el sumo sacerdote, donde los escribas y los ancianos ya se habían reunido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban reunidos». El verbo griego también puede entenderse aquí como un estado resultante o como «se habían congregado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ
  english_pob_choice: Now those who
  chosen_spanish: Ahora, los que
  alternatives_spanish:
  - Y los que
  - Pero los que
  lexicon: BDAG
  rationale: δέ introduce la continuación del relato con valor débil; «Ahora» mantiene la fluidez narrativa sin cargar de contraste. El artículo con participio se vierte naturalmente como «los que».
- source_word: κρατήσαντες
  english_pob_choice: had seized
  chosen_spanish: habían apresado
  alternatives_spanish:
  - habían sujetado
  - habían agarrado
  - habían arrestado
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal indica acción previa. «Apresado» comunica la captura o detención con suficiente fuerza y conserva mejor el matiz de aprehensión que una forma más débil como «tomado»; «arrestado» sería algo más jurídico de lo que exige el griego.
- source_word: ἀπήγαγον
  english_pob_choice: led him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo llevaron aparte
  - lo condujeron
  - lo sacaron
  lexicon: BDAG
  rationale: ἀπάγω expresa llevar o conducir a alguien desde un lugar. En español, «lo llevaron» es natural y fiel; el matiz de alejamiento ya está sugerido por el contexto inmediato.
- source_word: πρὸς Καϊάφαν
  english_pob_choice: to Caiaphas
  chosen_spanish: ante Caifás
  alternatives_spanish:
  - a Caifás
  - hacia Caifás
  - a la presencia de Caifás
  lexicon: BDAG
  rationale: πρός con acusativo puede señalar movimiento hacia una persona. En este contexto judicial, «ante Caifás» comunica adecuadamente el acercamiento a su autoridad sin añadir información ajena; se mantiene la referencia personal del griego.
- source_word: τὸν ἀρχιερέα
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  - el pontífice
  lexicon: BDAG
  rationale: ἀρχιερεύς es el título oficial de la función; «sumo sacerdote» es el equivalente establecido y claro en español bíblico. «Pontífice» sería menos transparente para lectores generales.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el lugar donde
  lexicon: BDAG
  rationale: El adverbio locativo relativo se traduce de forma directa con «donde», que resulta natural en español.
- source_word: οἱ γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los doctores de la ley
  - los expertos en la Ley
  lexicon: BDAG
  rationale: γραμματεῖς se mantiene como «escribas», el término tradicional y preciso en contextos judíos del Nuevo Testamento. Las alternativas explican más, pero no son necesarias aquí.
- source_word: οἱ πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes mayores
  - los mayores
  lexicon: BDAG
  rationale: πρεσβύτεροι en este contexto designa a los dirigentes judíos reconocidos; «ancianos» conserva la forma habitual y la referencia institucional.
- source_word: συνήχθησαν
  english_pob_choice: had gathered
  chosen_spanish: estaban reunidos
  alternatives_spanish:
  - se habían reunido
  - fueron reunidos
  lexicon: BDAG
  rationale: El aoristo pasivo puede leerse aquí con sentido intransitivo o resultativo, como señala el propio audit trail inglés. «Estaban reunidos» expresa el estado ya existente al llegar Jesús y evita forzar una pasiva poco natural en español.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] aparece ahora en el texto español junto a «sumo sacerdote», y la nota corresponde exactamente a esa alternativa léxica. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Caifás» para Καϊάφας.
  - Se usa «sumo sacerdote» como término bíblico estable para ἀρχιερεύς.
  - Se conserva un estilo narrativo sobrio y directo, adecuado para publicación.
  - No se introdujeron elementos interpretativos ajenos al griego, especialmente en πρὸς Καϊάφαν y συνήχθησαν.
