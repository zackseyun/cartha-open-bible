translation:
  language: es
  text: 'Y otra vez negó con juramento: «No conozco al hombre».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «lo negó» en vez de simplemente «negó»; el verbo griego va seguido del contenido de la negación.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza la acción con la anterior; en español, «Y» conserva la coordinación narrativa sin añadir matiz temporal que el griego no exige.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Expresa repetición directa y natural en español, manteniendo el sentido de reiteración de la negación de Pedro.
- source_word: ἠρνήσατο
  english_pob_choice: he denied it
  chosen_spanish: lo negó
  alternatives_spanish:
  - negó
  - lo repudió
  lexicon: BDAG
  rationale: El verbo significa negar o repudiar. Dado que el contenido de la negación sigue en la cláusula de cita, en español es natural suplir el objeto pronominal «lo» sin alterar el sentido; así se conserva la fuerza del verbo y la referencia al contenido negado.
- source_word: μετὰ ὅρκου
  english_pob_choice: with an oath
  chosen_spanish: con juramento
  alternatives_spanish:
  - bajo juramento
  - jurando
  lexicon: BDAG
  rationale: «Con juramento» refleja la idea de acompañamiento del griego y suena idiomático en español. «Bajo juramento» podría sugerir un marco legal formal que el contexto no exige.
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: En español, dos puntos introducen con naturalidad el contenido directo de la negación, manteniendo la relación proposicional sin forzar una subordinación mecánica.
- source_word: Οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: No conozco
  alternatives_spanish:
  - No sé
  - No conozco a
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «I do not know», en español «No conozco» comunica bien el rechazo personal implícito en el contexto. «No sé» sería más general y menos enfático sobre el reconocimiento de la persona.
- source_word: τὸν ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - al varón
  lexicon: BDAG
  rationale: El griego dice literalmente «el hombre», y en español la construcción con «conocer» requiere la preposición «a» ante objeto personal. Se mantiene la referencia despectiva/distanciada del discurso sin sustituirla por el nombre propio de Jesús.
theological_decisions:
- issue: Referencia de «el hombre» en la negación de Pedro
  english_pob_reading: Retain the literal expression 'the man' rather than replacing it with 'him' or 'Jesus.'
  chosen_spanish_reading: Mantener «al hombre» en vez de sustituirlo por «a él» o «a Jesús».
  alternative_spanish_readings:
  - a él
  - a Jesús
  rationale: El griego expresa distanciamiento mediante una referencia genérica y humana; conservarla en español preserva la fuerza retórica de la negación de Pedro y evita introducir interpretación en el texto principal.
  doctrine_reference: Translation philosophy §§1, 4, 5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con la lectura del POB en inglés: coordinación simple, repetición marcada por «otra vez», negación con juramento y cita directa del contenido. La principal adaptación al español es la construcción natural con «conocer» y el objeto personal introducido por «a».'
  spanish_consistency_notes:
  - Se usa «juramento» para μετὰ ὅρκου, no una formulación judicial más técnica.
  - Se evita «Cristo» o «Jesús» porque el texto griego no los menciona; se conserva la expresión distanciada «al hombre».
  - La nota al pie se mantiene para señalar la alternativa de traducir el verbo sin objeto explícito, reflejando la observación auditada del inglés POB.
