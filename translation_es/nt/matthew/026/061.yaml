  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Dios» y «templo» están bien. La principal divergencia es léxica: οἰκοδομῆσαι debe quedar como «construirlo» o equivalente no interpretativo, en línea con la justificación inglesa de evitar «rebuild it» en el texto principal.'
