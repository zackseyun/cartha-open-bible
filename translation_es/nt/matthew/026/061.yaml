translation:
  language: es
  text: 'Dijeron[a]: «Este hombre dijo[b]: “Yo puedo destruir el templo de Dios y construirlo en tres días”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de tres días». La expresión griega puede indicar la realización dentro de ese lapso.
    reason: lexical_alternative
  - marker: b
    text: Juan 2:19–21 identifica la afirmación de Jesús sobre el templo como referencia a su cuerpo.
    reason: cross_reference
lexical_decisions:
- source_word: εἶπαν
  english_pob_choice: They said
  chosen_spanish: Ellos dijeron
  alternatives_spanish:
  - Dijeron
  - Ellos dijeron
  lexicon: BDAG
  rationale: El aoristo introduce la acusación como un hecho puntual del relato; en español, «Ellos dijeron» conserva esa función narrativa de manera natural y formal.
- source_word: Οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Él
  lexicon: BDAG
  rationale: En contexto acusatorio y de señalamiento, οὗτος tiene fuerza deíctica despectiva. «Este hombre» preserva mejor esa distancia que un simple pronombre.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - afirmó
  - declaró
  lexicon: BDAG
  rationale: φημί aquí solo reporta el habla atribuida; «dijo» es la forma más directa y no añade matiz legal o enfático que el griego no exige.
- source_word: Δύναμαι
  english_pob_choice: I am able
  chosen_spanish: yo puedo
  alternatives_spanish:
  - soy capaz de
  - puedo
  lexicon: BDAG
  rationale: En español, «yo puedo» comunica capacidad de forma natural. Se mantiene la afirmación de posibilidad/aptitud sin sobrerreformar a una perífrasis más pesada.
- source_word: καταλῦσαι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - derribar
  - demoler
  lexicon: BDAG
  rationale: En un contexto de templo/edificio, καταλύω puede significar destruir o derribar. «Destruir» reproduce bien la fuerza hostil de la acusación y es idiomático en español.
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: ναός en esta escena se refiere al templo de Jerusalén. «Templo» es la equivalencia clara y natural; «santuario» sería más técnico y menos transparente para el lector general.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo posesivo/descriptivo sin suavizarlo. «De Dios» es la traducción directa y adecuada.
- source_word: διὰ τριῶν ἡμερῶν
  english_pob_choice: in three days
  chosen_spanish: en tres días
  alternatives_spanish:
  - dentro de tres días
  - durante tres días
  lexicon: BDAG
  rationale: Con διά + genitivo, la expresión puede señalar un lapso dentro del cual algo se completa. «En tres días» es la forma más natural en español y deja abierta la amplitud temporal documentada por la nota textual/lexical.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build it
  chosen_spanish: reconstruirlo
  alternatives_spanish:
  - edificarlo
  - volver a construirlo
  lexicon: BDAG
  rationale: Aunque el griego dice simplemente «construir», en el contexto del templo la idea implícita es levantarlo de nuevo tras derribarlo. «Reconstruirlo» comunica ese sentido contextual sin añadir una explicación ajena al dicho.
theological_decisions:
- issue: Referencia del «templo de Dios» en la acusación
  english_pob_reading: Translate the accusation at face value as referring to the physical temple, without importing John's later interpretive identification of Jesus' body into the main text.
  chosen_spanish_reading: Traducir la acusación como referencia al templo físico, sin incorporar en el cuerpo principal la interpretación joánica posterior sobre el cuerpo de Jesús.
  alternative_spanish_readings:
  - Hacer que la línea principal sugiera el cuerpo de Jesús
  - Neutralizar la referencia al templo como si fuera solo simbólica
  rationale: El contexto de Mateo presenta una acusación formal sobre palabras atribuidas a Jesús. La traducción debe reflejar lo que los testigos dicen que él dijo; la identificación tipológica con su cuerpo pertenece a la referencia cruzada, no al texto principal.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor de «reconstruirlo» frente a «construirlo»
  english_pob_reading: Because the object 'temple' carries over from the previous infinitive, English benefits from supplying 'it.' 'Build it' is closer to the Greek wording; 'rebuild it' is interpretive though contextually plausible.
  chosen_spanish_reading: Usar «reconstruirlo» solo como decisión contextual para preservar el sentido global del enunciado acusado, no como armonización doctrinal.
  alternative_spanish_readings:
  - construirlo
  - volver a construirlo
  rationale: En español, el contexto del templo destruido hace que la idea resultante sea reconstrucción. La elección no altera la acusación, sino que la expresa con una forma idiomática que evita ambigüedad sobre el verbo de construcción.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado y quedó sin cambios en el último pase; esta versión española sigue de cerca su decisión léxica principal, pero ajusta «build it» a «reconstruirlo» para que el resultado sea natural en español y conserve el sentido contextual de un templo que sería derribado y levantado de nuevo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se usa «templo» y no «santuario» para evitar restricción indebida del referente.
  - Se conserva la acusación en estilo directo entre comillas para reflejar la estructura narrativa del pasaje.
  - La nota [a] se aplica a la amplitud temporal de «en tres días» y no cambia el texto principal.
  - La nota [b] queda como referencia cruzada, no como armonización en el cuerpo principal.
