  text: Τότε λέγει αὐτοῖς ὁ Ἰησοῦς· Πάντες ὑμεῖς σκανδαλισθήσεσθε ἐν ἐμοὶ ἐν τῇ νυκτὶ ταύτῃ, γέγραπται γάρ· Πατάξω τὸν ποιμένα, καὶ ⸀διασκορπισθήσονται τὰ πρόβατα τῆς ποίμνης·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/031.yaml
  text: 'Then Jesus says to them[a], “You will all fall away because of me this night, for it is written: ‘I will strike the shepherd[c][b], and the sheep of the flock will be scattered.’”'
  footnotes:
  - marker: a
    text: Or “stumble,” “be caused to stumble,” or “take offense.” The Greek can cover a range from stumbling to falling away; here the context favors desertion of Jesus.
    reason: lexical_alternative
  - marker: b
    text: Or “tonight.”
    reason: lexical_alternative
  - marker: c
    text: Quotation from Zechariah 13:7.
    reason: cross_reference
