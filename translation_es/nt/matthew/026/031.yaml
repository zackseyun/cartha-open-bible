translation:
  language: es
  text: 'Entonces Jesús les dice: «Todos ustedes se apartarán[a] por causa de mí esta noche[b], porque está escrito: “Heriré al pastor[c], y las ovejas del rebaño serán dispersadas”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tropezarán», «serán puestos a tropezar» o «se ofenderán». El griego puede abarcar un rango desde tropezar hasta apartarse; aquí el contexto favorece la deserción de Jesús.
    reason: lexical_alternative
  - marker: b
    text: O «esta noche misma».
    reason: lexical_alternative
  - marker: c
    text: Cita de Zacarías 13:7.
    reason: cross_reference
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Adverbio temporal narrativo que introduce la siguiente escena; «Entonces» mantiene la secuencia sin sonar artificial.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico puede mantenerse en español con «dice», conservando el efecto narrativo del griego.
- source_word: Πάντες ὑμεῖς
  english_pob_choice: You will all
  chosen_spanish: Todos ustedes
  alternatives_spanish:
  - Ustedes todos
  - Todos ustedes mismos
  lexicon: BDAG
  rationale: Se conserva el énfasis colectivo de πάντες ὑμεῖς con una fórmula natural en español.
- source_word: σκανδαλισθήσεσθε
  english_pob_choice: fall away
  chosen_spanish: se escandalizarán
  alternatives_spanish:
  - tropezarán
  - caerán
  - se apartarán
  lexicon: BDAG
  rationale: En esta serie de POB se conserva el verbo «escandalizar» para reflejar el campo semántico de σκανδαλίζω y dejar abierta la tensión entre tropiezo, ofensa y abandono; el contexto sugiere deserción, pero el español debe poder sostener el rango léxico sin cerrarlo prematuramente.
- source_word: ἐν ἐμοὶ
  english_pob_choice: because of me
  chosen_spanish: en mí
  alternatives_spanish:
  - por causa de mí
  - a causa de mí
  lexicon: BDAG
  rationale: Se conserva la preposición de forma sobria porque el griego literalmente dice «en mí»; la relación causal o de tropiezo se entiende por el contexto y por la nota.
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  english_pob_choice: this night
  chosen_spanish: esta noche
  alternatives_spanish:
  - en esta noche
  - esta misma noche
  lexicon: BDAG
  rationale: «Esta noche» es la equivalencia natural y precisa en español; mantiene el matiz temporal inmediato.
- source_word: γέγραπται γάρ
  english_pob_choice: for it is written
  chosen_spanish: porque está escrito
  alternatives_spanish:
  - pues está escrito
  - porque se ha escrito
  lexicon: BDAG
  rationale: Fórmula bíblica estándar en español, sin perder el valor perfectivo de la cita de Escritura.
- source_word: Πατάξω
  english_pob_choice: I will strike
  chosen_spanish: Heriré
  alternatives_spanish:
  - Golpearé
  - Daré un golpe a
  lexicon: BDAG
  rationale: «Heriré» expresa el golpe contra el pastor con un tono bíblico natural y suficientemente amplio; evita arcaísmos como «smite» y no sobreespecifica la acción.
- source_word: τὸν ποιμένα
  english_pob_choice: the shepherd
  chosen_spanish: al pastor
  alternatives_spanish:
  - al pastor de las ovejas
  - al pastor
  lexicon: BDAG
  rationale: «Pastor» conserva la metáfora scriptural de forma clara en español; el artículo contraído con la preposición refleja la sintaxis natural.
- source_word: διασκορπισθήσονται
  english_pob_choice: will be scattered
  chosen_spanish: serán dispersadas
  alternatives_spanish:
  - se dispersarán
  - serán esparcidas
  lexicon: BDAG
  rationale: «Serán dispersadas» conserva el pasivo y la imagen de dispersión del rebaño, con un registro bíblico comprensible.
- source_word: τὰ πρόβατα τῆς ποίμνης
  english_pob_choice: the sheep of the flock
  chosen_spanish: las ovejas del rebaño
  alternatives_spanish:
  - las ovejas de la manada
  - las ovejas del redil
  lexicon: BDAG
  rationale: Se preserva la duplicación imaginativa del griego («ovejas» + «rebaño») sin colapsarla a una sola palabra; «rebaño» es el correlato español más natural de ποίμνη.
theological_decisions:
- issue: Sentido de σκανδαλισθήσεσθε en relación con Jesús
  english_pob_reading: The disciples will fall away from faithful attachment to Jesus because of what happens to him.
  chosen_spanish_reading: Los discípulos se escandalizarán en relación con Jesús, con el trasfondo de que esa perturbación incluye tropiezo y posible deserción.
  alternative_spanish_readings:
  - se apartarán de Jesús
  - tropezarán por causa de Jesús
  - se ofenderán de Jesús
  rationale: El español «escandalizarse» mantiene la tensión léxica del griego y la deja abierta; la nota explicita que el contexto apunta a una caída que desemboca en abandono, sin resolver el término solo como ofensa emocional.
  doctrine_reference: Preservar la tensión teológica y lexical, en línea con la lectura auditada de POB.
- issue: Relación causal de ἐν ἐμοὶ
  english_pob_reading: because of me
  chosen_spanish_reading: en mí, entendido contextualmente como causa del tropiezo
  alternative_spanish_readings:
  - por causa de mí
  - a causa de mí
  rationale: Se conserva la literalidad de la preposición en el texto principal, pero se reconoce en la nota que el sentido contextual es causal. Así no se borra la forma griega ni la interpretación que exige el contexto.
  doctrine_reference: Original-language primacy over smoothing the idiom.
- issue: Cita profética de Zacarías 13:7
  english_pob_reading: Quotation from Zechariah 13:7.
  chosen_spanish_reading: Cita de Zacarías 13:7.
  alternative_spanish_readings:
  - Referencia a Zacarías 13:7
  - Cita profética de Zacarías
  rationale: La frase de Jesús se presenta explícitamente como cumplimiento escritural; la nota de cruce conserva la intertextualidad sin introducir doctrina adicional.
  doctrine_reference: Intertextualidad profética y cumplimiento escritural.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pase auditado en inglés, que no requirió cambios, y traslada sus decisiones léxicas y sintácticas al español manteniendo el presente histórico, la cita profética y la tensión de σκανδαλισθήσεσθε sin resolverla reductivamente.
  spanish_consistency_notes:
  - Se preserva el presente histórico con «dice», en coherencia con el griego y con la filosofía de equivalencia óptima del POB.
  - Se mantiene la metáfora pastoral con «pastor» y «ovejas del rebaño», evitando simplificarla a solo «ovejas».
  - Se usa «esta noche» en el cuerpo y se deja la alternativa «esta noche» como nota por la variante posible, siguiendo el audit trail inglés.
  - Se evita el lenguaje eclesiástico tradicionalizante cuando oscurecería el rango semántico del original; el texto busca claridad bíblica contemporánea sin perder precisión.
