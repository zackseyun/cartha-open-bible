revisions:
- from: 'Entonces Jesús les dice[a]: «Todos ustedes se escandalizarán[b] en mí esta noche[c], porque está escrito: “Heriré al pastor, y las ovejas del rebaño serán dispersadas”».'
  to: 'Entonces Jesús les dice: «Todos ustedes se apartarán[a] por causa de mí esta noche[b], porque está escrito: “Heriré al pastor[c], y las ovejas del rebaño serán dispersadas”».'
  rationale: 'La revisión corrige la fidelidad semántica principal del verso: «se apartarán ... por causa de mí» transmite mejor el sentido contextual de σκανδαλισθήσεσθε ἐν ἐμοὶ que el calco «se escandalizarán en mí». También reubica y desduplica las notas, y añade la referencia cruzada a Zacarías 13:7 documentada en el POB inglés. Se mantiene el presente histórico «dice», la inmediatez temporal «esta noche», y la imagen bíblica de pastor/rebaño con español natural y digno.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:27:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego y conserva correctamente el presente histórico («dice»), el énfasis de Πάντες ὑμεῖς («Todos ustedes»), la fórmula escritural («porque está escrito») y la cita de Zacarías con la imagen completa de pastor/ovejas/rebaño. Sin embargo, falla en dos puntos importantes frente al sentido auditado: σκανδαλισθήσεσθε se tradujo como «se escandalizarán», que en español moderno tiende a leerse como ofensa emocional/moral y no comunica bien la deserción contextual; y ἐν ἐμοὶ se dejó como «en mí», una literalidad poco natural en español que oscurece el sentido causal/relacional claramente reconocido por el POB inglés («because of me»).'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «se escandalizarán en mí» suena poco natural y puede confundir al lector. Además, hay un problema formal: la nota [a] está anclada tras «dice» aunque corresponde a σκανδαλισθήσεσθε, y las notas [a] y [b] duplican el mismo contenido. Falta también la nota de referencia cruzada a Zacarías 13:7 que sí está documentada en el audit trail inglés. Una reparación menor deja el verso natural, fiel y bien anotado.'
  glossary_alignment: 'No hay conflictos con términos de proyecto como Yahvé/Mesías/etc. La principal desviación terminológica es lexical/contextual: el POB inglés escogió «fall away» para σκανδαλισθήσεσθε por el contexto de deserción; en español conviene reflejar eso con «apartarán» o similar en vez de «se escandalizarán». También debe ajustarse ἐν ἐμοὶ a «por causa de mí» para conservar el sentido idiomático sin calco innecesario.'
  issues:
  - severity: high
    issue: σκανδαλισθήσεσθε está traducido como «se escandalizarán».
    rationale: Aunque formalmente relacionado, en español actual esta opción suele sugerir ofensa o indignación, no la idea contextual de tropezar y abandonar a Jesús. El audit trail inglés decidió «fall away» precisamente para evitar esa reducción semántica.
  - severity: high
    issue: ἐν ἐμοὶ se tradujo literalmente «en mí».
    rationale: Aquí el giro griego es idiomático con sentido causal/relacional. «Se escandalizarán en mí» resulta poco idiomático y opaco; «por causa de mí» comunica con fidelidad el valor contextual reconocido por la auditoría inglesa.
  - severity: medium
    issue: La nota [a] está colocada en «dice» en lugar de anclarse al verbo problemático.
    rationale: La nota explica σκανδαλισθήσεσθε, no λέγει. El anclaje actual induce a error sobre qué palabra comenta.
  - severity: medium
    issue: Las notas [a] y [b] duplican el mismo contenido léxico.
    rationale: La instrucción exige marcadores únicos para notas distintas. Debe haber una sola nota léxica para el verbo, no dos copias.
  - severity: medium
    issue: Falta la nota de referencia cruzada a Zacarías 13:7 presente en el POB inglés.
    rationale: La auditoría inglesa conserva explícitamente esa intertextualidad; debe mantenerse también en español.
