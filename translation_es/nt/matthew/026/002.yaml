translation:
  language: es
  text: Ustedes saben que después de dos días llega la Pascua[a], y el Hijo del Hombre es entregado para ser crucificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «es traicionado». El verbo griego puede denotar traición, pero de manera más amplia significa «es entregado» o «es puesto en manos de».
    reason: alternative_reading
lexical_decisions:
- source_word: Οἴδατε
  english_pob_choice: You know
  chosen_spanish: Ustedes saben
  alternatives_spanish:
  - Saben
  - Ustedes conocen
  lexicon: οἶδα
  rationale: El perfecto con sentido presente de οἶδα se expresa naturalmente en español con un presente de conocimiento. 'Ustedes saben' conserva la fuerza directa del original y mantiene el plural explícito.
- source_word: μετὰ δύο ἡμέρας
  english_pob_choice: after two days
  chosen_spanish: después de dos días
  alternatives_spanish:
  - en dos días
  - luego de dos días
  lexicon: μετά + acusativo temporal
  rationale: La preposición con acusativo indica secuencia temporal; 'después de dos días' refleja mejor esa relación que una reformulación idiomática más libre.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua judía
  - la fiesta de la Pascua
  lexicon: πάσχα
  rationale: En español bíblico 'Pascua' es el equivalente natural de πάσχα. No se añade 'fiesta' porque no está explícito en el griego.
- source_word: γίνεται
  english_pob_choice: is coming
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - se acerca
  - acontece
  lexicon: γίνομαι
  rationale: Aquí γίνομαι expresa la llegada inminente de la Pascua. 'Llega' comunica bien esa cercanía en español sin perder el valor de evento inminente.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del Hombre
  lexicon: υἱὸς τοῦ ἀνθρώπου
  rationale: Se conserva el título tradicional y bíblico 'Hijo del Hombre', que es la forma más reconocible y fiel al uso de Jesús en los evangelios.
- source_word: παραδίδοται
  english_pob_choice: is being handed over
  chosen_spanish: es entregado
  alternatives_spanish:
  - es entregado en manos
  - es traicionado
  - es entregado/betrayado
  lexicon: παραδίδωμι
  rationale: '''Entregado'' reproduce el campo semántico amplio de παραδίδωμι sin reducirlo solo a ''traicionado''. En español mantiene la tensión entre la acción humana de traición y la entrega del Hijo del Hombre, como en el contexto de la pasión.'
- source_word: εἰς τὸ σταυρωθῆναι
  english_pob_choice: to be crucified
  chosen_spanish: para ser crucificado
  alternatives_spanish:
  - a ser crucificado
  - con el fin de ser crucificado
  lexicon: σταυρόω
  rationale: La construcción final expresa propósito o resultado; 'para ser crucificado' es una equivalencia natural y precisa en español.
theological_decisions:
- issue: Alcance de παραδίδοται en la predicción de la pasión
  english_pob_reading: is being handed over
  chosen_spanish_reading: es entregado
  alternative_spanish_readings:
  - es traicionado
  - es entregado/traicionado
  rationale: Se conserva la amplitud del verbo griego. 'Es entregado' no agota el acto en una sola relación humana de traición y deja abierta la dimensión de entrega dentro del plan narrativo y teológico del pasaje.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Referencia a la Pascua como evento inminente
  english_pob_reading: the Passover is coming
  chosen_spanish_reading: llega la Pascua
  alternative_spanish_readings:
  - se acerca la Pascua
  - viene la Pascua
  rationale: El griego no dice simplemente que existe la Pascua, sino que su llegada está próxima. 'Llega' comunica inminencia de manera clara y natural sin añadir información.
  doctrine_reference: Translation philosophy §2 (Prioritize source sense over calque)
translation_notes:
  revision_awareness: 'Se mantuvo la lectura revisada del inglés POB sin cambios sustanciales: se conserva la amplitud de παραδίδοται, se evita estrechar el sentido a ''traicionado'', y se traduce τὸ πάσχα con un término español natural y reconocible.'
  spanish_consistency_notes:
  - Se usa 'Pascua' para πάσχα en coherencia con el uso bíblico español y con la terminología del proyecto.
  - Se mantiene 'Hijo del Hombre' como título fijo, no una paráfrasis descriptiva.
  - '''Entregado'' preserva la amplitud semántica de παραδίδωμι y la tensión teológica documentada en el audit trail.'
  - La nota al pie marca la alternativa 'traicionado' solo como lectura posible, no como sustitución del texto principal.
