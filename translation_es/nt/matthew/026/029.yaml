translation:
  language: es
  text: 'Pero yo les digo: desde ahora no beberé de este fruto de la vid hasta aquel día cuando lo beba nuevo[a] con ustedes en el reino de mi Padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de nuevo»; el adjetivo griego puede indicar novedad de clase o calidad, y la frase quizá implique beberlo de una manera nueva en el reino venidero.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  english_pob_choice: But I tell you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Y yo les digo
  - Ahora yo les digo
  lexicon: BDAG
  rationale: δὲ aquí marca un giro discursivo suave o contrastivo; «Pero» conserva esa transición de manera natural en español. Se explicita el sujeto para dar énfasis y fluidez, sin añadir contenido.
- source_word: οὐ μὴ πίω
  english_pob_choice: I will certainly not drink
  chosen_spanish: no volveré a beber
  alternatives_spanish:
  - no beberé en absoluto
  - ciertamente no beberé
  lexicon: BDAG
  rationale: La construcción οὐ μὴ con subjuntivo expresa negación enfática de futuro. «No volveré a beber» comunica bien la fuerza prospectiva y la decisión firme en español moderno; «ciertamente» o «en absoluto» serían posibles, pero menos naturales aquí.
- source_word: ἀπ’ ἄρτι
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de ahora en adelante
  - desde este momento
  lexicon: BDAG
  rationale: La frase señala el punto de inicio temporal. «Desde ahora» es conciso, natural y fiel al valor de inicio presente-forward.
- source_word: ἐκ τούτου τοῦ γενήματος τῆς ἀμπέλου
  english_pob_choice: from this fruit of the vine
  chosen_spanish: de este fruto de la vid
  alternatives_spanish:
  - de este producto de la vid
  - de este fruto de la parra
  lexicon: BDAG
  rationale: Se preserva el idiomismo «fruto de la vid» porque el griego no dice simplemente «vino». «Vid» mantiene la imagen bíblica y evita reducir el término a una equivalencia interpretativa no explícita.
- source_word: ἕως τῆς ἡμέρας ἐκείνης
  english_pob_choice: until that day
  chosen_spanish: hasta aquel día
  alternatives_spanish:
  - hasta ese día
  - hasta el día aquel
  lexicon: BDAG
  rationale: El demostrativo subraya una fecha futura definida. «Aquel» conserva esa lejanía y solemnidad escatológica con un tono más natural en español que «ese».
- source_word: ὅταν αὐτὸ πίνω
  english_pob_choice: when I drink it
  chosen_spanish: cuando lo beba
  alternatives_spanish:
  - cuando lo beba yo
  - cuando lo esté bebiendo
  lexicon: BDAG
  rationale: El subjuntivo presente con ὅταν apunta a un evento futuro. En español, «cuando lo beba» comunica la eventualidad con claridad; se omite el pronombre sujeto por ser innecesario.
- source_word: καινὸν
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - anuevamente
  - de un modo nuevo
  - renovado
  lexicon: BDAG
  rationale: καινός puede implicar novedad de calidad o clase. «Nuevo» mantiene la ambigüedad fecunda del original sin cerrar el sentido a «de nuevo»; la nota conserva la posible lectura adverbial/qualitativa.
- source_word: μεθ’ ὑμῶν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto con ustedes
  - en compañía de ustedes
  lexicon: BDAG
  rationale: En español neutro latinoamericano, «ustedes» es la forma natural del plural de segunda persona. «Con ustedes» expresa acompañamiento simple y directo.
- source_word: ἐν τῇ βασιλείᾳ τοῦ πατρός μου
  english_pob_choice: in the kingdom of my Father
  chosen_spanish: en el reino de mi Padre
  alternatives_spanish:
  - en el reino de mi Padre celestial
  - en el reino de mi Padre
  lexicon: BDAG
  rationale: βασιλεία se rinde como «reino», y el genitivo «de mi Padre» se conserva sin invertir el orden. No se añade «celestial» porque no está en el texto.
theological_decisions:
- issue: Cómo preservar la idiomática «fruto de la vid» sin convertirla en una glosa interpretativa de «vino»
  english_pob_reading: Preserved the phrase 'fruit of the vine' in the main text
  chosen_spanish_reading: Se preserva «fruto de la vid» en el texto principal
  alternative_spanish_readings:
  - vino
  - el fruto de la vid
  rationale: El griego dice literalmente «fruto/producto de la vid». Mantener la expresión protege la primacía del texto fuente y evita introducir una equivalencia sacramental o descriptiva no explicitada. El lector puede entender el referente sin que la traducción lo cierre prematuramente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar la fuerza de καινὸν en el banquete del reino sin resolver su matiz por adelantado
  english_pob_reading: '''new'' in the main text, without specifying whether it means newly made, renewed participation, or new in quality'
  chosen_spanish_reading: «nuevo» en el texto principal, sin precisar si significa «de nuevo» o «de una manera nueva»
  alternative_spanish_readings:
  - anuevamente
  - de nuevo
  - de una manera nueva
  rationale: El adjetivo puede apuntar a novedad cualitativa o a una forma renovada de participación. Traducir simplemente «nuevo» conserva la tensión semántica y deja abierta la posibilidad que el propio contexto escatológico sugiere, sin sobreinterpretar.
  doctrine_reference: Translation philosophy §3
- issue: Cómo expresar la certeza enfática de la negación futura
  english_pob_reading: I will certainly not drink
  chosen_spanish_reading: no volveré a beber
  alternative_spanish_readings:
  - ciertamente no beberé
  - no beberé jamás
  rationale: La construcción οὐ μὴ con subjuntivo tiene fuerza enfática. «No volveré a beber» preserva el carácter firme y futuro de la negación en un español natural, sin recurrir a fórmulas demasiado absolutas o arcaizantes.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta propuesta mantiene ese acuerdo alto con el texto fuente y conserva la misma resolución semántica, ajustada al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero aquí no aparece el tetragrámaton ni κύριος como sustituto directo del nombre divino.
  - Se usa «reino» para βασιλεία, en coherencia con el léxico del proyecto y con el audit trail en inglés.
  - Se prefiere «ustedes» por registro neutral latinoamericano y para evitar ambigüedad de número/perspectiva.
  - Se conserva la metáfora bíblica «fruto de la vid» en lugar de neutralizarla como «vino».
