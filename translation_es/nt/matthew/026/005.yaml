translation:
  language: es
  text: 'Pero decían: «No durante la fiesta[a], para que no haya un alboroto[b] entre el pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «festival». La palabra griega ἑορτή puede traducirse como «fiesta» o «festival» en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «para que no haya un disturbio» o «para que no surja un tumulto entre el pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: estaban diciendo
  alternatives_spanish:
  - decían
  - estaban hablando
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso o repetida en la deliberación; «estaban diciendo» conserva mejor ese aspecto que un pretérito simple.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro suave desde el contexto anterior; «Pero» reproduce bien el matiz adversativo o de transición.
- source_word: Μὴ ἐν τῇ ἑορτῇ
  english_pob_choice: Not during the feast
  chosen_spanish: No durante la fiesta
  alternatives_spanish:
  - No en la fiesta
  - No durante el festival
  lexicon: BDAG
  rationale: La preposición ἐν con dativo es temporal; en español, «durante» expresa naturalmente el valor temporal. «Fiesta» mantiene la opción más breve e idiomática en este contexto pascual.
- source_word: ἑορτή
  english_pob_choice: feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - festival
  - solemnidad
  lexicon: BDAG
  rationale: ἑορτή admite «fiesta» o «festival»; «fiesta» es más natural en español bíblico actual y conserva la concisión del original.
- source_word: ἵνα μὴ θόρυβος γένηται
  english_pob_choice: lest there be an uproar
  chosen_spanish: para que no se produzca un alboroto
  alternatives_spanish:
  - para que no haya un alboroto
  - a fin de que no surja un disturbio
  - para que no estalle un motín
  lexicon: BDAG
  rationale: ἵνα μὴ introduce una finalidad de evitación; en español, «para que no se produzca» expresa bien esa intención. «Alboroto» traduce θόρυβος sin exagerarlo a «motín» o «revuelta».
- source_word: θόρυβος
  english_pob_choice: an uproar
  chosen_spanish: un alboroto
  alternatives_spanish:
  - un disturbio
  - una conmoción
  - un motín
  lexicon: BDAG
  rationale: θόρυβος denota tumulto o desorden público. «Alboroto» comunica la idea de agitación colectiva sin ir más lejos que el griego.
- source_word: γίνομαι
  english_pob_choice: there be
  chosen_spanish: se produzca
  alternatives_spanish:
  - haya
  - surja
  - ocurra
  lexicon: BDAG
  rationale: Con θόρυβος como sujeto, γίνομαι indica llegar a ocurrir o llegar a haber. «Se produzca» suena natural en español y mantiene la idea de eventualidad.
- source_word: λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  - la población
  lexicon: BDAG
  rationale: λαός aquí se refiere al conjunto del pueblo reunido; «el pueblo» conserva ese valor colectivo y resulta más fiel que «la gente» en este registro.
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego y con el audit trail inglés: se mantiene el valor imperfectivo de ἔλεγον, el matiz temporal de ἐν τῇ ἑορτῇ, la finalidad negativa de ἵνα μὴ y el campo semántico de θόρυβος como agitación pública.'
  spanish_consistency_notes:
  - Se usó «fiesta» para ἑορτή por consistencia con el contexto pascual y por ser la opción más natural en español bíblico actual.
  - Se prefirió «alboroto» para θόρυβος, dejando abierta la alternativa «disturbio» en nota como en el audit trail inglés.
  - «El pueblo» conserva el valor colectivo de λαός sin introducir una connotación distinta.
