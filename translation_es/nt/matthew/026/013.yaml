  glossary_alignment: No hay conflictos con la terminología del proyecto. «Evangelio» corresponde adecuadamente a εὐαγγέλιον según la revisión inglesa; no aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc.
