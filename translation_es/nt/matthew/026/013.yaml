translation:
  language: es
  text: En verdad les digo[a], dondequiera que se proclame este evangelio en todo el mundo, también se hablará de lo que hizo esta mujer en memoria de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amén les digo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se contará» o «se hablará de ello como memorial de ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Verdaderamente
  - Amén
  lexicon: BDAG
  rationale: La fórmula introduce una afirmación solemne de Jesús. En español, 'En verdad' comunica bien esa solemnidad con naturalidad y evita la transliteración 'Amén' como simple partícula introductoria.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les digo a ustedes
  lexicon: BDAG
  rationale: Es una fórmula directa de خطاب a los oyentes. 'Les digo' conserva la cercanía y la primera persona, y funciona de forma natural en español bíblico moderno.
- source_word: ὅπου ἐὰν
  english_pob_choice: wherever
  chosen_spanish: dondequiera que
  alternatives_spanish:
  - donde sea que
  - en cualquier lugar donde
  lexicon: BDAG
  rationale: La combinación expresa una localización indefinida. 'Dondequiera que' reproduce bien ese matiz general y fluye mejor que una traducción más literal y rígida.
- source_word: κηρυχθῇ
  english_pob_choice: is proclaimed
  chosen_spanish: se proclame
  alternatives_spanish:
  - se predique
  - sea anunciado
  lexicon: BDAG
  rationale: El verbo griego implica proclamación/heraldo. 'Se proclame' conserva ese tono público y evita cargar el verbo con un matiz eclesiástico más estrecho que 'predique'.
- source_word: τὸ εὐαγγέλιον τοῦτο
  english_pob_choice: this gospel
  chosen_spanish: este evangelio
  alternatives_spanish:
  - estas buenas nuevas
  lexicon: BDAG
  rationale: Aunque el sentido léxico básico es 'buena noticia', el audit trail inglés revisado opta por 'gospel' para mayor correspondencia formal. En español, 'evangelio' es el equivalente léxico normal y más fiel al registro del texto.
- source_word: ἐν ὅλῳ τῷ κόσμῳ
  english_pob_choice: in the whole world
  chosen_spanish: en todo el mundo
  alternatives_spanish:
  - por todo el mundo
  - en el mundo entero
  lexicon: BDAG
  rationale: La frase se refiere al alcance universal del anuncio. 'En todo el mundo' es claro, natural y conserva la universalidad sin añadir énfasis interpretativo.
- source_word: λαληθήσεται
  english_pob_choice: will also be spoken of
  chosen_spanish: también se hablará
  alternatives_spanish:
  - también se dirá
  - también se contará
  lexicon: BDAG
  rationale: El futuro pasivo de λαλέω aquí se refiere a que el hecho será mencionado. 'Se hablará de' expresa bien esa referencia continuada en español.
- source_word: ὃ ἐποίησεν αὕτη
  english_pob_choice: what this woman has done
  chosen_spanish: de lo que hizo esta mujer
  alternatives_spanish:
  - de lo que ha hecho esta mujer
  - de lo que esta mujer hizo
  lexicon: BDAG
  rationale: El relativo neutro apunta a la acción realizada. Añadir 'esta mujer' está justificado por el contexto inmediato y hace explícito el referente de αὕτη sin alterar el contenido.
- source_word: εἰς μνημόσυνον αὐτῆς
  english_pob_choice: in memory of her
  chosen_spanish: como memorial de ella
  alternatives_spanish:
  - en memoria de ella
  - como recuerdo de ella
  lexicon: BDAG
  rationale: μνημόσυνον tiene el sentido de memorial/rememoración con posible matiz conmemorativo. 'Como memorial de ella' preserva ese valor formal y deja abierta la posibilidad de una conmemoración pública.
theological_decisions:
- issue: Registro de εὐαγγέλιον
  english_pob_reading: gospel
  chosen_spanish_reading: evangelio
  alternative_spanish_readings:
  - buenas nuevas
  rationale: No se trata de una paráfrasis doctrinal, sino de un término ya lexicalizado en español bíblico. 'Evangelio' mantiene el registro formal elegido en la revisión inglesa y evita perder la referencia técnica del término.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance universal de la proclamación
  english_pob_reading: in the whole world
  chosen_spanish_reading: en todo el mundo
  alternative_spanish_readings:
  - por todo el mundo
  - en el mundo entero
  rationale: La frase expresa extensión universal, no una localización restringida. La formulación elegida conserva ese alcance sin introducir inferencias escatológicas adicionales.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre 'good news' y 'gospel', con la revisión final inclinándose por 'gospel' para mayor correspondencia formal. La versión española sigue esa revisión final con 'evangelio'. También se conserva la idea de un anuncio futuro y universal, y se mantiene la ambigüedad controlada de λαληθήσεται con una nota alternativa que permite 'se contará' o la formulación conmemorativa más explícita.
  spanish_consistency_notes:
  - Se usó 'evangelio' como equivalente natural de εὐαγγέλιον, en coherencia con la revisión inglesa final.
  - '''Memorial'' se mantuvo como ''memorial'' para preservar el matiz conmemorativo formal; la nota ofrece ''en memoria de ella'' y ''se hablará de ello'' como alternativas más idiomáticas.'
  - Se evitó 'predique' para κηρυχθῇ porque 'proclame' conserva mejor la idea de anuncio público sin restringir el término a un marco eclesial técnico.
