translation:
  language: es
  text: Porque esto es mi sangre del pacto[a], que es derramada por muchos[b] para el perdón de los pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «mi sangre del nuevo pacto».
    reason: textual_variant
  - marker: b
    text: O «en favor de muchos».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - este
  - esta cosa
  lexicon: BDAG
  rationale: El demostrativo griego es neutro y funciona de manera referencial sobre lo que Jesús presenta; en español, «esto» conserva esa referencia sin añadir «cáliz» o «copa», que no aparecen en la cláusula.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La fuerza explicativa de γάρ se expresa naturalmente con «porque» en español, manteniendo la conexión con la afirmación previa sin forzar un calco rígido.
- source_word: αἷμά
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: BDAG
  rationale: «Sangre» es la correspondencia directa y preserva el peso sacrificial y pactal del término; el contexto de derramamiento queda explícito en el participio siguiente.
- source_word: τῆς διαθήκης
  english_pob_choice: of the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del nuevo pacto
  lexicon: BDAG
  rationale: «Pacto» reproduce el valor jurídico-relacional de διαθήκη en un registro claro para el español bíblico actual. No se incorpora «nuevo» porque el texto base griego no lo contiene.
- source_word: περὶ πολλῶν
  english_pob_choice: for many
  chosen_spanish: por muchos
  alternatives_spanish:
  - para muchos
  - en favor de muchos
  lexicon: BDAG
  rationale: En este contexto sacrificial, περὶ con genitivo puede expresar beneficio o referencia en favor de otros. «Por muchos» es breve, natural y permite oír la ambigüedad de beneficio/representación sin resolverla más de lo que el griego exige.
- source_word: ἐκχυννόμενον
  english_pob_choice: which is poured out
  chosen_spanish: es derramada
  alternatives_spanish:
  - está siendo derramada
  - es vertida
  lexicon: BDAG
  rationale: El participio pasivo presente se expresa con una pasiva presente natural en español. «Derramada» conserva la imaginería sacrificial mejor que «vertida».
- source_word: εἰς ἄφεσιν ἁμαρτιῶν
  english_pob_choice: for the forgiveness of sins
  chosen_spanish: para perdón de pecados
  alternatives_spanish:
  - para el perdón de los pecados
  - para remisión de pecados
  lexicon: BDAG
  rationale: «Perdón» comunica claramente ἄφεσις al lector contemporáneo. Se evita «remisión» por ser menos transparente, y se mantiene la relación final de propósito/resultado con la sangre de Jesús.
theological_decisions:
- issue: Si debe importarse «nuevo» en «pacto»
  english_pob_reading: of the covenant
  chosen_spanish_reading: del pacto
  alternative_spanish_readings:
  - del nuevo pacto
  rationale: El texto griego proporcionado dice simplemente διαθήκης. Traducir «nuevo» en el texto principal importaría una tradición paralela o una variante no presente en el paquete fuente. Se preserva la tensión textual en una nota.
  doctrine_reference: Principio de primacía del original y preservación de variantes documentadas.
- issue: Alcance de περὶ πολλῶν
  english_pob_reading: for many
  chosen_spanish_reading: por muchos
  alternative_spanish_readings:
  - para todos
  - en favor de muchos
  rationale: El griego dice «muchos», no «todos». La traducción conserva el término sin expandirlo ni armonizarlo con debates teológicos sobre la extensión de la expiación.
  doctrine_reference: No resolver debates doctrinales donde el texto no lo hace explícitamente.
translation_notes:
  revision_awareness: El paquete fuente y el audit trail inglés muestran alta concordancia y sin revisiones aplicadas; la redacción española sigue el texto SBLGNT base sin importar «nuevo» al cuerpo principal, pero conserva la variante en nota y mantiene la ambigüedad benéfica de περὶ πολλῶν mediante «por muchos».
  spanish_consistency_notes:
  - Se mantiene «pacto» en lugar de «alianza» para mayor continuidad terminológica con el valor jurídico-covenantal de διαθήκη.
  - Se evita «SEÑOR» o cualquier sustitución reverencial ajena al verso, ya que no aparece κύριος aquí.
  - «Perdón» se usa de manera consistente para ἄφεσις en un registro accesible y bíblicamente claro.
  - La pasiva «es derramada» preserva el carácter sacrificial del verbo sin añadir agentes no expresados.
