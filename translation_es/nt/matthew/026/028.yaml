revisions:
- from: Porque esto es mi sangre del pacto[a], que por muchos[b] es derramada para perdón de pecados.
  to: Porque esto es mi sangre del pacto[a], que es derramada por muchos[b] para el perdón de los pecados.
  rationale: Se conserva plenamente el contenido del texto fuente y del rastro de auditoría en inglés, pero se ajusta la sintaxis para un español más natural y menos ambiguo. «Que es derramada por muchos» refleja mejor el participio relativo y evita la torpeza de «que por muchos es derramada». Se añade el artículo en «para el perdón de los pecados» por claridad idiomática, sin cambiar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:22:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego base en los puntos principales: «esto», «mi sangre», «del pacto», «muchos» y la nota textual sobre «nuevo». Sin embargo, la construcción «que por muchos es derramada» suena marcada e innecesariamente rígida en español. El participio ἐκχυννόμενον modifica «sangre» y se vierte mejor como cláusula relativa con «es derramada», pero el orden debe ajustarse para que «por muchos/para muchos» no parezca agente pasivo sino sentido benefactivo. Además, εἰς ἄφεσιν ἁμαρτιῶν queda más natural y completo en español con artículo: «para el perdón de los pecados».'
  spanish_quality_summary: La redacción actual es comprensible, pero «Porque esto es mi sangre del pacto, que por muchos es derramada» resulta poco idiomática y puede leerse torpemente. En español bíblico natural, «que es derramada por muchos/para muchos» evita esa aspereza; mejor aún, «que es derramada por muchos para el perdón de los pecados» mantiene cercanía formal, aunque «por muchos» sigue siendo algo ambiguo. «Del pacto» es aceptable y fiel; «de la alianza» sería posible, pero no necesaria. La nota b ya preserva la alternativa más explícita «en favor de muchos».
  glossary_alignment: 'La terminología clave está mayormente alineada con el proyecto: no se importa «nuevo» al texto principal; «sangre», «pacto» y «perdón» son adecuados. No hay conflicto con términos troncales del glosario. La principal mejora es de sintaxis y legibilidad, no de glosario.'
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en «que por muchos es derramada»
    rationale: En español, colocar «por muchos» antes del verbo pasivo suena forzado y puede sugerir un agente de la pasiva en vez de un valor benefactivo/representativo. Reordenar mejora la claridad sin alejarse del griego.
  - severity: low
    issue: «para perdón de pecados» suena algo elíptico
    rationale: Aunque entendible y tradicional, «para el perdón de los pecados» suena más natural y plenamente idiomático en español contemporáneo, manteniendo el mismo sentido.
  revised_spanish_text: Porque esto es mi sangre del pacto[a], que es derramada por muchos[b] para el perdón de los pecados.
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos leen «mi sangre del nuevo pacto».
    reason: textual_variant
  - marker: b
    text: O «en favor de muchos».
    reason: lexical_alternative
  revision_rationale: Se conserva plenamente el contenido del texto fuente y del rastro de auditoría en inglés, pero se ajusta la sintaxis para un español más natural y menos ambiguo. «Que es derramada por muchos» refleja mejor el participio relativo y evita la torpeza de «que por muchos es derramada». Se añade el artículo en «para el perdón de los pecados» por claridad idiomática, sin cambiar el sentido.
