translation:
  language: es
  text: 'Y estando muy afligidos, comenzaron a decirle uno por uno[a]: «¿Acaso soy yo, Señor[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno» / «uno tras otro».
    reason: lexical_alternative
  - marker: b
    text: 'La pregunta griega con μήτι espera una respuesta negativa: «¿Acaso no seré yo, Señor?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπούμενοι
  english_pob_choice: being deeply grieved
  chosen_spanish: estando muy afligidos
  alternatives_spanish:
  - estando profundamente entristecidos
  - estando muy tristes
  lexicon: BDAG
  rationale: El participio presente expresa su estado emocional continuo. «Afligidos» comunica bien el dolor interior sin sonar mecánico; en combinación con «muy» preserva la intensidad del griego.
- source_word: σφόδρα
  english_pob_choice: deeply
  chosen_spanish: muy
  alternatives_spanish:
  - profundamente
  - sumamente
  - en gran manera
  lexicon: BDAG
  rationale: El adverbio intensifica a λυπούμενοι. En español, «muy» junto con «afligidos» produce una frase natural y fiel, sin sobrecargar el registro.
- source_word: ἤρξαντο λέγειν
  english_pob_choice: began to say
  chosen_spanish: comenzaron a decir
  alternatives_spanish:
  - empezaron a decir
  - se pusieron a decir
  lexicon: BDAG
  rationale: La construcción ingrésiva se conserva con un verbo de comienzo más infinitivo. «Comenzaron a decir» es natural y mantiene el valor aspectual.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma normal en español con pronombre átono. El referente sigue claro por el contexto narrativo.
- source_word: εἷς ἕκαστος
  english_pob_choice: one by one
  chosen_spanish: cada uno
  alternatives_spanish:
  - uno por uno
  - uno tras otro
  lexicon: BDAG
  rationale: La expresión distributiva duplicada enfatiza la respuesta individual. «Cada uno» comunica esa distribución de manera natural en español; la idea de sucesión también queda implícita en el contexto.
- source_word: Μήτι
  english_pob_choice: Surely not
  chosen_spanish: ¿Acaso
  alternatives_spanish:
  - ¿No será que
  - ¿Será que no
  lexicon: BDAG
  rationale: Μήτι introduce una pregunta que espera respuesta negativa. En español, una formulación interrogativa como «¿Acaso…?» preserva el matiz retórico sin hacerlo pesado.
- source_word: ἐγώ εἰμι
  english_pob_choice: I
  chosen_spanish: soy yo
  alternatives_spanish:
  - soy yo mismo
  - yo soy
  lexicon: BDAG
  rationale: 'En español la cópula se expresa naturalmente: «soy yo». Esta forma conserva la autoidentificación implícita y evita una traducción rígida del griego.'
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - señor
  lexicon: BDAG
  rationale: Aunque el proyecto usa «Yahvé» para יהוה, aquí κύριε es el vocativo dirigido a Jesús, por lo que «Señor» conserva el valor de título y el peso narrativo-teológico. «Señor» es la opción natural en español bíblico para esta dirección.
theological_decisions:
- issue: Tratamiento de κύριε como vocativo dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - señor
  - Maestro
  rationale: En el contexto de la cena pascual, los discípulos se dirigen a Jesús. Traducir con «Señor» mantiene la reverencia y el uso cristológico del título, coherente con la lectura inglesa del POB y con el valor del vocativo griego.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Pregunta con expectativa negativa expresada por μήτι
  english_pob_reading: Surely not I, Lord?
  chosen_spanish_reading: ¿Acaso soy yo, Señor?
  alternative_spanish_readings:
  - ¿No seré yo, Señor?
  - ¿Será que soy yo, Señor?
  rationale: El griego no formula una afirmación directa, sino una pregunta que presupone respuesta negativa. «¿Acaso soy yo, Señor?» conserva esa cautela y la tensión emocional del momento sin añadir elementos no presentes en el texto.
  doctrine_reference: BDAG on μήτι; syntax of interrogative expectation
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final indica alta concordancia; por eso la redacción española sigue de cerca la lectura estable del POB inglés y del griego SBLGNT, sin necesidad de ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε, coherente con la terminología POB y con el vocativo dirigido a Jesús.
  - Se evita «SEÑOR» como máscara del nombre divino, porque aquí no aparece יהוה sino un vocativo cristológico.
  - La intensidad de λυπούμενοι σφόδρα se reproduce con «muy afligidos» para un español natural y fiel.
  - «Cada uno» refleja el distributivo εἷς ἕκαστος, mientras que el contexto narrativo sostiene la idea de sucesión individual.
