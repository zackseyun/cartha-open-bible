translation:
  language: es
  text: ¿Cómo, entonces, se cumplirían las Escrituras[a], que así tiene que suceder?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo entonces podrían cumplirse las Escrituras, que tiene que suceder así?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Cómo entonces?
  lexicon: BDAG
  rationale: Es la pregunta retórica natural en español para πῶς y conserva la fuerza interrogativa.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por lo tanto
  - así que
  lexicon: BDAG
  rationale: Mantiene la conexión inferencial con la afirmación anterior sin volver la frase artificiosamente formal.
- source_word: πληρωθῶσιν
  english_pob_choice: would be fulfilled
  chosen_spanish: se cumplirían
  alternatives_spanish:
  - podrían cumplirse
  - habrían de cumplirse
  lexicon: BDAG
  rationale: El subjuntivo pasivo en una pregunta retórica expresa una posibilidad contraria a los hechos; en español, el condicional transmite bien esa idea de cumplimiento hipotético.
- source_word: αἱ γραφαὶ
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - los escritos
  - las Sagradas Escrituras
  lexicon: BDAG
  rationale: γραφή en plural tiene aquí referencia bíblica establecida; en español, 'las Escrituras' es la forma clara y fiel, sin reducirlo a textos genéricos.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: si
  alternatives_spanish:
  - que
  - porque
  lexicon: BDAG
  rationale: 'Aunque ὅτι introduce el contenido, en español la relación queda más natural y precisa al introducir la cláusula con una condición retórica: ''si así tiene que suceder''. Esto preserva el sentido global sin forzar una subordinación incómoda.'
- source_word: οὕτως
  english_pob_choice: this way
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: BDAG
  rationale: '''Así'' es la forma más directa y natural para el referente adverbial al modo en que ocurren los hechos.'
- source_word: δεῖ
  english_pob_choice: it must
  chosen_spanish: tiene que
  alternatives_spanish:
  - debe
  - es necesario que
  lexicon: BDAG
  rationale: Expresa necesidad con naturalidad en español. 'Tiene que' conserva la fuerza de necesidad sin explicitar más de lo que el texto dice.
- source_word: γενέσθαι
  english_pob_choice: happen
  chosen_spanish: suceder
  alternatives_spanish:
  - ocurrir
  - tener lugar
  lexicon: BDAG
  rationale: Verbo natural para eventos que llegan a pasar; evita una traducción demasiado mecánica de γίνομαι.
theological_decisions:
- issue: Naturaleza de la necesidad expresada por δεῖ
  english_pob_reading: Render the necessity simply as 'it must' without explicitly adding 'according to God's plan' or similar explanatory language.
  chosen_spanish_reading: Renderizar la necesidad simplemente como 'tiene que' sin añadir 'según el plan de Dios' ni una explicación doctrinal explícita.
  alternative_spanish_readings:
  - es necesario que
  - debe suceder
  rationale: El griego no desarrolla aquí la fuente de la necesidad; la conexión con el cumplimiento de las Escrituras ya deja la tensión teológica en pie. La traducción evita resolverla con explicación adicional.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con el último pase revisado como sin cambios; no se detectaron revisiones aplicadas en el paquete auditado.
  spanish_consistency_notes:
  - Se conservó 'las Escrituras' como término bíblico establecido para γραφαὶ.
  - Se evitó 'Cristo' porque este versículo no contiene Χριστός ni terminología de título mesiánico.
  - Se optó por un condicional ('se cumplirían') para reflejar el valor hipotético de la pregunta retórica en griego.
