review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien πῶς οὖν, πληρωθῶσιν, αἱ γραφαί, οὕτως, δεῖ y γενέσθαι en conjunto, pero no preserva con precisión la función de ὅτι. El griego introduce el contenido de las Escrituras ('que así debe suceder'), no una condición con 'si'.
  spanish_quality_summary: El español es claro y natural, pero 'si así tiene que suceder' altera la sintaxis y la lógica del original. Una formulación con 'que' suena natural y mantiene mejor la relación entre cumplimiento de las Escrituras y la necesidad del acontecer.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'las Escrituras' es correcto; 'tiene que suceder' es aceptable para δεῖ γενέσθαι, aunque 'debe suceder' también sería válido. El problema principal es sintáctico-semántico con ὅτι, no terminológico.
  issues:
  - severity: high
    issue: ὅτι fue traducido como 'si'
    rationale: 'En el griego, ὅτι introduce el contenido de lo que dicen/implican las Escrituras: ''que así debe suceder''. Convertirlo en ''si'' crea una cláusula condicional no presente en el original y cambia la relación lógica de la frase.'
  - severity: medium
    issue: La nota alternativa repite la misma desviación con 'si'
    rationale: La nota debe preservar la alternativa inglesa 'that it must happen so', no introducir también una condición. En español puede expresarse con 'que'.
  revised_spanish_text: ¿Cómo, entonces, se cumplirían las Escrituras[a], que así tiene que suceder?
  revised_footnotes:
  - marker: a
    text: 'O: «¿Cómo entonces podrían cumplirse las Escrituras, que tiene que suceder así?»'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'si' por 'que' para reflejar fielmente ὅτι como cláusula de contenido, conforme al griego y al rastro de auditoría inglés. Se conserva la naturalidad del español y la fuerza retórica de la pregunta. La nota alternativa se ajusta del mismo modo.
