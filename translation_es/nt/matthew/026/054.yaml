  rationale: Se reemplaza 'si' por 'que' para reflejar fielmente ὅτι como cláusula de contenido, conforme al griego y al rastro de auditoría inglés. Se conserva la naturalidad del español y la fuerza retórica de la pregunta. La nota alternativa se ajusta del mismo modo.
