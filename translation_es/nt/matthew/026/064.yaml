translation:
  language: es
  text: 'Jesús le dijo: «Tú lo has dicho[a]. Pero yo les digo, desde ahora verán al Hijo del Hombre sentado a la derecha del Poder[b] y viniendo sobre las nubes del cielo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú has dicho eso». La respuesta griega es una afirmación idiomática.'
    reason: lexical_alternative
  - marker: b
    text: «El Poder» es una forma reverencial de referirse a Dios.
    reason: cultural_note
  - marker: c
    text: Alusión a Daniel 7:13 y Salmo 110:1.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: Jesus said to him
  chosen_spanish: Jesús le dijo
  alternatives_spanish:
  - Jesús le habló
  - Jesús respondió
  lexicon: SBLGNT; BDAG
  rationale: Se mantiene la referencia directa y el tono narrativo simple del griego. «Le dijo» es la equivalencia natural en español para λέγει αὐτῷ aquí, sin añadir matices no presentes.
- source_word: Σὺ εἶπας
  english_pob_choice: You have said so
  chosen_spanish: Tú lo has dicho
  alternatives_spanish:
  - Tú has dicho eso
  - Así lo has dicho
  lexicon: BDAG
  rationale: La respuesta griega es afirmativa pero idiomática; «Tú lo has dicho» conserva la afirmación sin reducirla a un «sí» desnudo ni volverla explicativa en exceso. En español también funciona como respuesta reconocible y sobria.
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Marca un giro adversativo fuerte hacia la declaración solemne que sigue. «Pero» es natural en español y preserva esa transición.
- source_word: ἀπ’ ἄρτι
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde este momento
  lexicon: BDAG
  rationale: Expresa el inicio de una nueva etapa de manera clara y fiel. «Desde ahora» evita sobrecargar el tiempo con una precisión que el griego no exige.
- source_word: ὄψεσθε
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán ustedes
  - van a ver
  lexicon: BDAG
  rationale: El futuro de ὁράω se traduce de forma directa. En español, el sujeto implícito del plural hace innecesario repetir «ustedes» salvo por énfasis.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y textualmente arraigado, necesario para mantener la resonancia con Daniel. «Hijo del Hombre» es el equivalente español más transparente y auditable.
- source_word: καθήμενον
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - sentado en trono
  - entronizado
  lexicon: BDAG
  rationale: Aunque «sentado» es la forma más inmediata del participio, en español puede sugerir estado posicional sin perder el eco de exaltación. Se evita «entronizado» porque añade una interpretación no explícita en el verbo.
- source_word: ἐκ δεξιῶν τῆς δυνάμεως
  english_pob_choice: at the right hand of Power
  chosen_spanish: a la derecha del Poder
  alternatives_spanish:
  - a la diestra del Poder
  - a la derecha de Dios
  lexicon: BDAG
  rationale: Se conserva la circunlocución reverencial «el Poder», tal como lo hace el POB en inglés, sin explicitar «Dios». «A la derecha de» transmite el idiomatismo de honor y autoridad en un español natural.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - que viene
  - que vendrá
  lexicon: BDAG
  rationale: El participio presente se conserva como acción en curso o característica en español. «Viniendo» mantiene más de cerca la forma verbal del griego y sugiere la simultaneidad con «sentado».
- source_word: ἐπὶ τῶν νεφελῶν τοῦ οὐρανοῦ
  english_pob_choice: on the clouds of heaven
  chosen_spanish: sobre las nubes del cielo
  alternatives_spanish:
  - en las nubes del cielo
  - con las nubes del cielo
  lexicon: BDAG
  rationale: «Sobre las nubes del cielo» refleja el movimiento preposicional del griego y preserva la alusión a Daniel 7:13. «Del cielo» traduce τοῦ οὐρανοῦ de manera sobria y familiar.
theological_decisions:
- issue: Fuerza de la respuesta de Jesús a Σὺ εἶπας
  english_pob_reading: 'An affirmative but not woodenly explicit response: ''You have said so.'''
  chosen_spanish_reading: 'Una afirmación idiomática pero no mecánica: «Tú lo has dicho».'
  alternative_spanish_readings:
  - «Sí»
  - «Así es»
  - «Tú has dicho eso»
  rationale: El griego afirma, pero no con una fórmula desnuda de asentimiento. La opción elegida conserva la aceptación de la declaración del sumo sacerdote sin borrar la forma concreta de la respuesta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referente de τῆς δυνάμεως
  english_pob_reading: A reverential circumlocution for God, retained as 'Power' rather than expanded to 'God'.
  chosen_spanish_reading: Una circunlocución reverencial preservada como «el Poder» y no expandida a «Dios».
  alternative_spanish_readings:
  - «Dios»
  - «el Poderoso»
  - «la Majestad»
  rationale: El griego permite entender un circunloquio reverencial, pero no obliga a explicitar el referente. Mantener «el Poder» respeta la reserva del texto y la decisión auditada del POB inglés.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de la visión del Hijo del Hombre
  english_pob_reading: The saying joins enthronement and eschatological vindication without forcing a single temporal scheme.
  chosen_spanish_reading: La frase une entronización y vindicación escatológica sin fijar un esquema temporal único.
  alternative_spanish_readings:
  - Solo un cumplimiento inmediato
  - Solo una referencia a la segunda venida
  rationale: Los participios coordinados conservan la tensión entre entronización presente y venida futura. La traducción debe dejar esa ambigüedad productiva intacta.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registraron cambios posteriores ni observaciones pendientes; la lectura auditada se mantiene en alto acuerdo.'
  spanish_consistency_notes:
  - Se conserva «Hijo del Hombre» por su carga intertextual y su equivalencia estable en español.
  - Se preserva «el Poder» como circunlocución reverencial, sin explicitar «Dios» en el texto principal.
  - Se usa futuro simple («verán») para reflejar ὄψεσθε con claridad y naturalidad.
  - La imagen «sobre las nubes del cielo» mantiene la alusión daniélica sin resolver el trasfondo escatológico.
