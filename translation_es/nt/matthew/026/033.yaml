translation:
  language: es
  text: 'Pero Pedro le respondió[a]: «Aunque todos se aparten por causa de ti, yo nunca me apartaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tropecen» o «sean hechos tropezar». El verbo griego puede denotar ser derribado, ofenderse o apartarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio aoristo introduce de forma idiomática una respuesta en discurso directo. En español, «respondió» comunica con naturalidad esa función narrativa sin añadir más de lo que el griego expresa.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca un leve contraste o avance respecto de la declaración anterior de Jesús; «Pero» reproduce bien ese matiz en español.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: Peter answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - le dijo
  - respondió a él
  lexicon: BDAG
  rationale: La combinación participio + verbo de habla funciona de manera idiomática como introducción de discurso. El dativo αὐτῷ se vierte naturalmente con «le».
- source_word: Εἰ πάντες
  english_pob_choice: Even if all
  chosen_spanish: Aunque todos
  alternatives_spanish:
  - Si todos
  - Aun si todos
  lexicon: BDAG
  rationale: Aunque εἰ es formalmente «si», aquí el contraste enfático de Pedro da una fuerza concesiva; «Aunque» expresa mejor esa relación en español sin perder el sentido condicional implícito.
- source_word: σκανδαλισθήσονται
  english_pob_choice: fall away
  chosen_spanish: tropiecen
  alternatives_spanish:
  - caigan
  - se aparten
  - se hagan tropezar
  lexicon: BDAG
  rationale: El verbo puede abarcar ser hecho tropezar, ofenderse o apartarse. En este contexto de discípulos bajo presión, el POB inglés opta por «fall away» para la fuerza relacional y de defección; en español, «tropiecen» mantiene la imagen básica y deja abierta esa tensión sin fijar una interpretación más técnica.
- source_word: ἐν σοί
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - por ti
  - a causa de ti
  - en ti
  lexicon: BDAG
  rationale: La construcción con ἐν y la idea de σκανδαλίζω aquí apunta a la ocasión o motivo del tropiezo. «Por causa de ti» es una forma clara y natural en español.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito es enfático por contraste con «todos». En español, el orden y la presencia de «yo» bastan para conservar ese énfasis.
- source_word: οὐδέποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - de ninguna manera
  lexicon: BDAG
  rationale: οὐδέποτε es una negación temporal enfática; «nunca» es el equivalente natural y preciso en español.
- source_word: σκανδαλισθήσομαι
  english_pob_choice: fall away
  chosen_spanish: tropezaré
  alternatives_spanish:
  - caeré
  - me apartaré
  - seré hecho tropezar
  lexicon: BDAG
  rationale: Se mantiene la misma familia semántica que en la primera ocurrencia del verbo. «Tropezaré» conserva la imagen verbal sin cerrar demasiado el sentido, preservando la tensión lexical que el POB inglés anotó.
theological_decisions:
- issue: Alcance de σκανδαλίζω en un contexto de discipulado y posible deserción
  english_pob_reading: fall away
  chosen_spanish_reading: tropezar / tropezar por causa de
  alternative_spanish_readings:
  - apartarse
  - ofenderse
  - caer
  rationale: El pasaje trata de la posibilidad de que los discípulos abandonen su lealtad bajo presión. En español, «tropezar» conserva la imagen básica y no resuelve de antemano si el énfasis es ofensivo, de caída o de defección; así se preserva la tensión teológica documentada por el POB inglés.
  doctrine_reference: Mantener la tensión teológica y lexical sin imponer una conclusión doctrinal; optimal equivalence
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el presente borrador sigue la lectura de máxima concordancia del paquete fuente y el resumen de revisión reciente marcado como inalterado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología predeterminada del proyecto cuando corresponda, pero este versículo no la contiene.
  - Se mantiene la distinción entre el verbo literal de tropiezo y su posible extensión a apartarse o desertar, en armonía con el audit trail inglés.
  - El discurso directo y la puntuación se adaptan al español con comillas latinas y colocación natural del pronombre enfatizado.
