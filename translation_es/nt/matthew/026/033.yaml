  source_alignment_summary: 'El borrador refleja bien la sintaxis y el contraste del griego: «Pero Pedro le respondió…» corresponde adecuadamente a ἀποκριθεὶς… εἶπεν αὐτῷ, y «Aunque todos… yo nunca…» conserva la fuerza concesiva y el contraste enfático de Εἰ πάντες … ἐγὼ οὐδέποτε. Sin embargo, la elección de «tropiecen / tropezaré» debilita el sentido que el POB inglés documentó para σκανδαλίζω en este contexto de defección discipular, donde se prefirió «fall away».'
  spanish_quality_summary: El español es natural y claro, con buen registro. No obstante, «tropezar» aquí suena más a tropiezo momentáneo que a apartarse o fallar en la lealtad a Jesús. «Por causa de ti» es correcto, aunque «por ti» también sería posible; no requiere cambio. La nota al pie necesita armonizarse con una traducción principal más fuerte y más alineada con la decisión del POB.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. El punto principal es la alineación lexical con σκανδαλίζω: dado que el rastro de auditoría en inglés escogió «fall away» por razones teológicas y contextuales, el español debería reflejar mejor esa fuerza con «se aparten / me apartaré» o equivalente, dejando «tropezar» como alternativa en nota.'
  issues:
  - severity: medium
    issue: σκανδαλισθήσονται / σκανδαλισθήσομαι se tradujo como «tropiecen / tropezaré» en el texto principal
    rationale: Aunque el verbo puede incluir la imagen de tropezar, en este contexto el expediente inglés justificó una lectura de defección o apartamiento de la lealtad a Jesús. «Tropezar» en español moderno tiende a sonar más débil y episódico, y por tanto no preserva bien la decisión semántica principal del POB.
