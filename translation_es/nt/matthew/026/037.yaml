revisions:
- from: Y tomando consigo a Pedro y a los dos hijos de Zebedeo[a], comenzó a entristecerse y a angustiarse profundamente.
  to: Y tomando consigo a Pedro y a los dos hijos de Zebedeo[a], comenzó a entristecerse y a sentirse profundamente angustiado.
  rationale: 'Se hace un ajuste menor de idiomaticidad y precisión semántica: se conserva plenamente el sentido del griego y la decisión teológica de mostrar la pena y la intensa angustia de Jesús, pero con una formulación más natural en español contemporáneo. También se afina la nota alternativa para reflejar mejor la pareja léxica documentada en la auditoría inglesa.'
