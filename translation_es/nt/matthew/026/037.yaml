translation:
  language: es
  text: Y tomando consigo a Pedro y a los dos hijos de Zebedeo[a], comenzó a entristecerse y a sentirse profundamente angustiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comenzó a estar afligido y turbado».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραλαβὼν
  english_pob_choice: taking ... with him
  chosen_spanish: tomando consigo
  alternatives_spanish:
  - tomando con él
  - llevando consigo
  - tomando consigo a
  lexicon: BDAG
  rationale: El participio aoristo expresa que Jesús lleva a estos discípulos consigo; «tomando consigo» conserva esa relación sin añadir interpretación. «Con él» sería natural, pero «consigo» refleja mejor el movimiento solidario del griego.
- source_word: τὸν Πέτρον
  english_pob_choice: Peter
  chosen_spanish: a Pedro
  alternatives_spanish:
  - a Pedro el apóstol
  - a Simón Pedro
  lexicon: BDAG
  rationale: El nombre propio se vierte de forma directa como «Pedro». No se amplía con identificaciones adicionales porque el griego solo dice Πέτρον.
- source_word: τοὺς δύο υἱοὺς Ζεβεδαίου
  english_pob_choice: the two sons of Zebedee
  chosen_spanish: a los dos hijos de Zebedeo
  alternatives_spanish:
  - a los dos hijos de Zebedeo, Santiago y Juan
  - a los dos hijos de Zebedeo
  lexicon: BDAG
  rationale: La frase se mantiene literal porque el texto no nombra aquí a los hijos. «Hijos de Zebedeo» preserva el dato genealógico del griego sin expansión interpretiva.
- source_word: ἤρξατο
  english_pob_choice: he began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se puso a
  lexicon: BDAG
  rationale: El verbo ingresa la acción de manera explícita; «comenzó» es el equivalente natural y solemne en español.
- source_word: λυπεῖσθαι
  english_pob_choice: to be sorrowful
  chosen_spanish: entristecerse
  alternatives_spanish:
  - ponerse triste
  - dolerse
  - afligirse
  lexicon: BDAG
  rationale: El verbo denota experimentar tristeza o pena. «Entristecerse» mantiene el sentido emocional real sin volverlo demasiado coloquial; evita traducirlo como mera «tristeza» sustantiva.
- source_word: ἀδημονεῖν
  english_pob_choice: deeply distressed
  chosen_spanish: angustiarse profundamente
  alternatives_spanish:
  - estar profundamente angustiado
  - turbarse profundamente
  - sentir gran angustia
  lexicon: BDAG
  rationale: El verbo expresa una aflicción intensa, con ansiedad o angustia interior. «Angustiarse profundamente» conserva la intensidad y la diferencia respecto de λυπεῖσθαι.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - y ... además ... y
  - tanto ... como
  lexicon: BDAG
  rationale: 'La coordinación doble conserva la acumulación del griego: Jesús toma a los discípulos y empieza a sentir dos estados emocionales relacionados pero distintos.'
theological_decisions:
- issue: La emoción humana real de Jesús
  english_pob_reading: Render both verbs straightforwardly as real human sorrow and distress
  chosen_spanish_reading: Traducir ambos verbos de forma directa como tristeza real y angustia real
  alternative_spanish_readings:
  - suavizar el lenguaje para evitar vulnerabilidad emocional
  - intensificarlo hasta «terror» o «desesperación»
  rationale: 'La traducción debe mostrar el sufrimiento emocional auténtico de Jesús sin rebajarlo ni exagerarlo. Así se preserva la tensión cristológica: verdadera humanidad y, a la vez, dignidad del relato.'
  doctrine_reference: Definición de Calcedonia (451 d. C.); principio de la POB de conservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto español donde corresponde. La redacción sigue de cerca el griego y el audit trail inglés, sin introducir nombres ni interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se prefirió «consigo» para reflejar el valor relacional de παραλαβών.
  - Se mantuvo «hijos de Zebedeo» en vez de expandir a Santiago y Juan para respetar el texto del versículo.
  - Se eligieron verbos finitos y naturales en español para λυπεῖσθαι y ἀδημονεῖν, conservando la distinción entre tristeza y angustia.
  - El registro es reverente pero moderno, adecuado para lectura pública.
