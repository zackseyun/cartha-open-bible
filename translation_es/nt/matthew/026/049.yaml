translation:
  language: es
  text: 'Y enseguida se acercó a Jesús y dijo: «¡Saludos[a], Rabí!», y lo besó[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Salve, Rabí!»
    reason: lexical_alternative
  - marker: b
    text: 'El verbo puede implicar un beso enfático o repetido: «lo besó intensamente» o «lo besó repetidamente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Expresa prontitud narrativa en un español natural y fluido, sin elevar el registro ni sonar arcaico.
- source_word: προσελθὼν
  english_pob_choice: he came up to
  chosen_spanish: se acercó
  alternatives_spanish:
  - se acercó a
  - vino hacia
  lexicon: BDAG
  rationale: El participio aoristo indica movimiento hacia Jesús; en español, «se acercó» transmite bien la proximidad física sin forzar una perífrasis pesada.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hacia Jesús
  lexicon: BDAG
  rationale: El dativo con προσέρχομαι se rinde de manera natural con «a Jesús», conservando la dirección del movimiento.
- source_word: Χαῖρε
  english_pob_choice: Greetings
  chosen_spanish: Paz
  alternatives_spanish:
  - ¡Salve!
  - Saludos
  lexicon: BDAG
  rationale: Como saludo convencional, χαῖρε puede verterse de varias formas. Se optó por «Paz» porque es una fórmula breve, natural y reverente en español bíblico, sin recurrir a un arcaísmo excesivo como «Salve».
- source_word: ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabí
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título semítico transliterado en forma reconocible para el lector hispano. «Maestro» explicita el sentido, pero pierde la marca de tratamiento directo preservada por el griego.
- source_word: κατεφίλησεν
  english_pob_choice: kissed
  chosen_spanish: lo besó
  alternatives_spanish:
  - lo besó intensamente
  - lo besó repetidamente
  - lo besó con insistencia
  lexicon: BDAG
  rationale: El verbo puede intensificar el beso, pero la forma principal mantiene la sencillez del relato. La posible fuerza enfática queda preservada en una nota para no sobreparafrasear el texto.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre acusativo directo referido a Jesús; en español, el clítico «lo» es la opción idiomática y clara.
theological_decisions:
- issue: Naturaleza del saludo Χαῖρε en boca de Judas
  english_pob_reading: Greetings
  chosen_spanish_reading: Paz
  alternative_spanish_readings:
  - Salve
  - Saludos
  rationale: El saludo es una fórmula social ordinaria, no una exaltación doctrinal. «Paz» mantiene la función de saludo y deja que la ironía narrativa del gesto traicionero surja del contexto.
  doctrine_reference: Translation philosophy §6 (lenguaje bíblico claro, no arcaizante)
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto griego y con la auditoría inglesa; no se requieren revisiones textuales. Se mantiene la tensión semántica de χαῖρε y de καταφιλέω mediante una traducción principal sobria y notas alternativas.
  spanish_consistency_notes:
  - Se conserva «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se usa «Rabí» como transliteración estable y reconocible, en línea con la conservación de títulos semíticos cuando el español los admite.
  - Se evita «SEÑOR» para este versículo porque no aparece κύριος ni una referencia al nombre divino.
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
