revisions:
- from: 'Entonces Jesús va con ellos a un lugar llamado Getsemaní[a], y dice a los discípulos: «Siéntense aquí mientras voy allá y oro».'
  to: 'Entonces Jesús viene con ellos a un lugar llamado Getsemaní[a], y dice a los discípulos: «Siéntense aquí mientras voy allá a orar».'
  rationale: Se ajusta ἔρχεται a «viene» para reflejar mejor el verbo griego; se mejora la naturalidad de «voy allá a orar» para expresar la secuencia/intención de ἀπελθὼν ... προσεύξωμαι; y se afina la nota alternativa para que Καθίσατε siga siendo «Siéntense».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:22:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: mantiene el presente histórico, traduce χωρίον como «lugar» y conserva el contraste locativo aquí/allá. También respeta la nota de alternativa para ἕως οὗ. Sin embargo, «va con ellos» es menos fiel que «viene/llega con ellos» para ἔρχεται, y «voy allá y oro» suena menos natural y menos coordinado con el valor secuencial de ἀπελθὼν ... προσεύξωμαι que una formulación como «voy allá a orar».'
  spanish_quality_summary: 'El español es claro y legible, pero tiene dos puntos mejorables: «Jesús va con ellos» resulta algo extraño en narración sin centro deíctico explícito, y «voy allá y oro» suena rígido en español bíblico natural. «Viene con ellos» y «voy allá a orar» mejoran la fluidez sin apartarse del original. La puntuación y el registro son adecuados.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo Ἰησοῦς -> «Jesús», correctamente aplicado. La decisión «lugar» en vez de «jardín/huerto» está bien alineada con la justificación lexical y teológica documentada. La transliteración «Getsemaní» es correcta.
  issues:
  - severity: medium
    issue: «va con ellos» para ἔρχεται
    rationale: El verbo griego es ἔρχεται («viene/llega»), presente histórico de ἔρχομαι. En español narrativo, «viene con ellos» o «llega con ellos» preserva mejor el verbo fuente; «va» cambia la orientación verbal sin necesidad.
  - severity: medium
    issue: «voy allá y oro» suena poco idiomático
    rationale: Aunque no es incorrecto, en español la coordinación simple con «oro» suena más dura que una construcción final/secuencial natural. Dado el participio ἀπελθὼν y el subjuntivo προσεύξωμαι, «voy allá a orar» comunica bien la secuencia/intención sin perder fidelidad.
  - severity: low
    issue: La nota alternativa usa «Sitúense»
    rationale: «Sitúense» puede sugerir colocarse en una posición más que sentarse. Para reflejar mejor Καθίσατε, conviene «Siéntense aquí hasta que yo vaya allá y ore».
  revised_spanish_text: 'Entonces Jesús viene con ellos a un lugar llamado Getsemaní[a], y dice a los discípulos: «Siéntense aquí mientras voy allá a orar».'
  revised_footnotes:
  - marker: a
    text: 'O: «Siéntense aquí hasta que yo vaya allá y ore». El griego puede traducirse de manera más literal con «hasta que», aunque «mientras» es más natural en español aquí.'
    reason: lexical_alternative
  revision_rationale: Se ajusta ἔρχεται a «viene» para reflejar mejor el verbo griego; se mejora la naturalidad de «voy allá a orar» para expresar la secuencia/intención de ἀπελθὼν ... προσεύξωμαι; y se afina la nota alternativa para que Καθίσατε siga siendo «Siéntense».
