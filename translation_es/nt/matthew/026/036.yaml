translation:
  language: es
  text: 'Entonces Jesús viene con ellos a un lugar llamado Getsemaní[a], y dice a los discípulos: «Siéntense aquí mientras voy allá a orar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Siéntense aquí hasta que yo vaya allá y ore». El griego puede traducirse de manera más literal con «hasta que», aunque «mientras» es más natural en español aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Conserva la conexión temporal narrativa y suena natural en español sin añadir matices no presentes en el griego.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: va
  alternatives_spanish:
  - viene
  - llega
  lexicon: BDAG
  rationale: El presente histórico se mantiene con un presente narrativo natural en español. Aquí 'va' funciona bien por el movimiento hacia el lugar, sin perder la vivacidad del original.
- source_word: μετ’ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: BDAG
  rationale: Equivale directamente a la compañía expresada por μετά con genitivo.
- source_word: χωρίον
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - paraje
  lexicon: BDAG
  rationale: '''Lugar'' reproduce el sentido amplio de χωρίον sin importar ''jardín'', que no está en Mateo 26:36.'
- source_word: λεγόμενον
  english_pob_choice: called
  chosen_spanish: llamado
  alternatives_spanish:
  - nombrado
  lexicon: BDAG
  rationale: Es la forma más natural en español para la fórmula de denominación.
- source_word: Γεθσημανί
  english_pob_choice: Gethsemane
  chosen_spanish: Getsemaní
  alternatives_spanish:
  - Gethsemaní
  lexicon: Transliteration
  rationale: Se translitera el nombre propio al español común y readable, manteniendo la referencia tradicional reconocible.
- source_word: τοῖς μαθηταῖς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - a sus discípulos
  lexicon: BDAG
  rationale: Mantiene el referente explícito del griego sin añadir posesión no expresada en la cláusula.
- source_word: Καθίσατε
  english_pob_choice: Sit
  chosen_spanish: Siéntense
  alternatives_spanish:
  - Siéntense aquí
  - Quédense sentados
  lexicon: BDAG
  rationale: El imperativo plural se expresa de manera natural y respetuosa en español con 'siéntense'.
- source_word: αὐτοῦ
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: αὐτοῦ tiene fuerza adverbial locativa; 'aquí' es la equivalencia idiomática más clara en la orden directa.
- source_word: ἕως οὗ
  english_pob_choice: while
  chosen_spanish: mientras
  alternatives_spanish:
  - hasta que
  lexicon: BDAG
  rationale: El inglés POB opta por 'while' por naturalidad; en español, 'mientras' cumple bien la misma función de permanencia durante la acción, sin perder la idea temporal de espera.
- source_word: ἀπελθὼν
  english_pob_choice: I go
  chosen_spanish: voy
  alternatives_spanish:
  - habiendo ido
  - me vaya
  lexicon: BDAG
  rationale: Se conserva el valor de movimiento en una forma fluida en primera persona, coherente con el discurso directo de Jesús.
- source_word: ἐκεῖ
  english_pob_choice: over there
  chosen_spanish: allá
  alternatives_spanish:
  - allí
  - ahí
  lexicon: BDAG
  rationale: '''Allá'' conserva el contraste deíctico con ''aquí'' y refleja la distancia relativa que marca el griego.'
- source_word: προσεύξωμαι
  english_pob_choice: pray
  chosen_spanish: oro
  alternatives_spanish:
  - ore
  - me ponga a orar
  lexicon: BDAG
  rationale: En primera persona de discurso directo, 'oro' es más natural y fiel que una perífrasis, y mantiene el sentido de προσεύχομαι.
theological_decisions:
- issue: Sentido de χωρίον en Mateo 26:36
  english_pob_reading: Rendered as 'place' rather than 'garden.'
  chosen_spanish_reading: '''lugar'' en vez de ''jardín'''
  alternative_spanish_readings:
  - jardín
  - huerto
  rationale: Mateo solo dice que Jesús llega a un 'lugar' llamado Getsemaní; 'jardín' o 'huerto' introducirían un dato de Juan 18:1 que no está en este versículo.
  doctrine_reference: Translation philosophy §1 (primacía del texto fuente sobre la tradición de traducción)
- issue: Valor temporal de ἕως οὗ en la orden de Jesús
  english_pob_reading: '''while'' is used for natural English, though ''until'' is more literal.'
  chosen_spanish_reading: '''mientras'' en la cláusula temporal'
  alternative_spanish_readings:
  - hasta que
  rationale: La forma española elegida expresa con naturalidad la permanencia de los discípulos durante la ida y la oración de Jesús, sin forzar una construcción menos idiomática.
  doctrine_reference: Translation philosophy §3 (equivalencia óptima con control de literalidad)
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego y el audit trail inglés: conserva el presente histórico, evita importar ''jardín'' desde Juan, y mantiene la tensión temporal de ἕως οὗ mediante una solución española natural (''mientras'') con nota alternativa literal.'
  spanish_consistency_notes:
  - Se mantiene 'Getsemaní' como transliteración estándar y no se traduce el topónimo.
  - Se conserva el presente narrativo ('va', 'dice') para reflejar el vigor del griego.
  - '''Lugar'' se usa consistentemente para χωρίον, evitando sobre-interpretación.'
  - La directriz a los discípulos se expresa con un imperativo plural natural en español ('Siéntense').
  - La oposición deíctica aquí/allá reproduce la contraposición αὐτοῦ/ἐκεῖ.
