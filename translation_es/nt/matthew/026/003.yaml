translation:
  language: es
  text: Entonces se reunieron[a] los principales sacerdotes y los ancianos del pueblo en el patio[b] del sumo sacerdote, llamado Caifás,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se congregaron». El verbo griego está en forma pasiva; también podría expresarse «fueron reunidos».
    reason: lexical_alternative
  - marker: b
    text: «Patio» también podría traducirse «patio del palacio», ya que el término griego puede referirse al patio de una residencia grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca de secuencia temporal discursiva; «Entonces» funciona de manera natural en español y conserva el avance narrativo sin añadir matiz innecesario.
- source_word: συνήχθησαν
  english_pob_choice: were gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se congregaron
  lexicon: BDAG
  rationale: El griego aoristo pasivo indica que el grupo llegó a estar reunido/convocado. En español, la pasiva perifrástica suena pesada; «se reunieron» conserva la idea de reunión resultante y es idiomática, aunque no reproduce de manera visible la pasividad formal.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes sacerdotales
  lexicon: BDAG
  rationale: «Chief priests» en contexto evangélico designa a las autoridades sacerdotales dirigentes, no a varios titulares del sumo sacerdocio. «Principales sacerdotes» evita confundir el plural con el oficio singular y mantiene la fuerza jerárquica.
- source_word: πρεσβύτεροι τοῦ λαοῦ
  english_pob_choice: the elders of the people
  chosen_spanish: los ancianos del pueblo
  alternatives_spanish:
  - los ancianos del pueblo
  - los dirigentes del pueblo
  lexicon: BDAG
  rationale: La construcción genitiva se refleja de forma directa. «Ancianos del pueblo» conserva la referencia a líderes reconocidos entre el pueblo y sigue de cerca el valor léxico de πρεσβύτεροι.
- source_word: εἰς τὴν αὐλὴν
  english_pob_choice: in the courtyard
  chosen_spanish: en el patio
  alternatives_spanish:
  - en el atrio
  - en el patio/atrio
  lexicon: BDAG
  rationale: αὐλή puede significar patio o patio interior; en español «patio» es claro y natural. «Atrio» sería más eclesiástico o menos inmediato para lectores generales. Se evita concretar más allá del dato griego.
- source_word: τοῦ ἀρχιερέως
  english_pob_choice: of the high priest
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del jefe de los sacerdotes
  - del sumo pontífice
  lexicon: BDAG
  rationale: En español bíblico, «sumo sacerdote» expresa bien la referencia al titular singular del cargo. Aunque el inglés usa «high priest», aquí la forma tradicional y transparente es precisa y comprensible.
- source_word: τοῦ λεγομένου Καϊάφα
  english_pob_choice: who was called Caiaphas
  chosen_spanish: llamado Caifás
  alternatives_spanish:
  - que se llamaba Caifás
  - conocido como Caifás
  lexicon: BDAG
  rationale: El participio presente pasivo se traduce de manera compacta y natural como «llamado». Se preserva la identificación nominal sin añadir explicaciones ajenas al texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y el audit trail inglés de la POB. Se adoptó una solución natural en español para el valor pasivo de συνήχθησαν, manteniendo el orden narrativo y la identificación de Caifás. No se detectaron revisiones textuales aplicadas en el material de apoyo.
  spanish_consistency_notes:
  - Se mantiene «sumo sacerdote» para τοῦ ἀρχιερέως, conforme al uso bíblico español estándar y al singular del contexto.
  - «Principales sacerdotes» evita la ambigüedad de «sumos sacerdotes» en plural, sin perder el sentido de autoridad dirigente.
  - «Patio» refleja αὐλή de forma amplia y no especulativa; la nota preserva la alternativa de «atrio/patio interior».
  - El nombre propio se hispaniza como «Caifás», conforme al uso asentado en español.
