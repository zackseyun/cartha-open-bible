translation:
  language: es
  text: Cuando llegó la tarde[a], se reclinó a la mesa con los doce discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen simplemente 'con los doce' en lugar de 'con los doce discípulos'.
    reason: textual_variant
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  english_pob_choice: When evening came
  chosen_spanish: Cuando llegó la tarde
  alternatives_spanish:
  - Cuando vino la noche
  - Cuando cayó la tarde
  lexicon: BDAG
  rationale: El genitivo absoluto marca un marco temporal. En español, 'Cuando llegó la tarde' conserva ese valor temporal de forma natural y digna, sin forzar una estructura demasiado literal como 'siendo llegada la tarde'.
- source_word: ἀνέκειτο
  english_pob_choice: he reclined at the table
  chosen_spanish: se reclinó
  alternatives_spanish:
  - estaba reclinado
  - se sentó a la mesa
  lexicon: BDAG
  rationale: El verbo describe la postura propia de una comida formal o de banquete. En español, 'se reclinó' comunica esa acción sin añadir una especificación de 'mesa' que no aparece en el griego, aunque el contexto la presupone.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  - junto con
  lexicon: BDAG
  rationale: Con genitivo, μετά significa 'con'. 'Con' es la equivalencia más directa y natural en español.
- source_word: τῶν δώδεκα μαθητῶν
  english_pob_choice: the twelve disciples
  chosen_spanish: los doce discípulos
  alternatives_spanish:
  - los doce
  - los doce aprendices
  lexicon: BDAG
  rationale: Se conserva μαθητῶν como 'discípulos', el equivalente normal y exacto en contexto evangélico. Se evita reducir la frase a 'los doce' porque el texto griego incluye explícitamente 'discípulos'.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés están en alta concordancia; no se aplicaron revisiones sustantivas. La decisión principal fue mantener en español la precisión temporal y la referencia explícita a 'discípulos' que el griego presenta.
  spanish_consistency_notes:
  - Se usa 'discípulos' para μαθηταί de manera consistente con el valor evangélico del término.
  - Se evita 'SEÑOR' o terminología litúrgica ajena al versículo porque no aparece ningún término divino en el texto.
  - La nota textual se ancla en la forma abreviada de algunos manuscritos, siguiendo el aparato inglés.
