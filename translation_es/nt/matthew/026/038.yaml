    text: Or “very sorrowful,” “deeply sorrowful,” or “overwhelmed with sorrow.”
    reason: lexical_alternative
  - marker: b
    text: Or “to the point of death.”
    reason: lexical_alternative
  - marker: c
    text: Or “stay awake with me.” The Greek can carry both the sense of remaining awake and of watchful vigilance.
    reason: alternative_reading
