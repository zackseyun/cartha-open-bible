translation:
  language: es
  text: 'Entonces les dice: «Mi alma está profundamente afligida[a], hasta la muerte[b]. Quédense aquí y velen conmigo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy triste», «profundamente triste» o «abrumada de tristeza».
    reason: lexical_alternative
  - marker: b
    text: O «al punto de la muerte».
    reason: lexical_alternative
  - marker: c
    text: O «permanezcan despiertos conmigo». El griego puede abarcar tanto la idea de no dormirse como la de vigilancia atenta.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: BDAG
  rationale: Conecta la escena de manera temporal y narrativa. «Entonces» es natural en español y conserva el avance secuencial del relato.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico. «Dice» mantiene ese valor vívido en español; «dijo» suavizaría el efecto narrativo.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa naturalmente con «les» en español y evita rigidez innecesaria.
- source_word: Περίλυπός
  english_pob_choice: deeply grieved
  chosen_spanish: profundamente angustiada
  alternatives_spanish:
  - muy triste
  - profundamente afligida
  - llena de dolor
  lexicon: BDAG
  rationale: περίλυπος expresa tristeza intensa o abatimiento extremo. «Profundamente angustiada» comunica bien la intensidad emocional en un español actual y solemne, sin reducirlo a simple tristeza.
- source_word: ἡ ψυχή μου
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - yo
  - mi ser interior
  lexicon: BDAG
  rationale: Se conserva ψυχή con «alma» para no diluir el sustantivo explícito del griego en una simple paráfrasis pronominal. Esto mantiene la fuerza antropológica y afectiva de la frase.
- source_word: ἕως θανάτου
  english_pob_choice: even to death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - al punto de la muerte
  - hasta el extremo de la muerte
  lexicon: BDAG
  rationale: La expresión señala extremidad. «Hasta la muerte» es la formulación más natural y fiel en español; la nota preserva la posibilidad de leerlo como «al punto de la muerte».
- source_word: μείνατε
  english_pob_choice: Remain
  chosen_spanish: Quédense
  alternatives_spanish:
  - Permanezcan
  - Queden
  lexicon: BDAG
  rationale: El imperativo pide que se queden en ese lugar. «Quédense» es claro y natural para lectores modernos; «Permanezcan» sería más solemne pero menos inmediato.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: Adverbio de lugar directo; «aquí» es la equivalencia más natural.
- source_word: γρηγορεῖτε
  english_pob_choice: keep watch
  chosen_spanish: velen
  alternatives_spanish:
  - permanezcan despiertos
  - estén vigilantes
  - mantengan la vigilia
  lexicon: BDAG
  rationale: γρηγορέω puede incluir tanto estar despierto como vigilar. «Velen» comunica vigilancia activa y reverente en español; la nota conserva la posibilidad de la lectura más literal «permanezcan despiertos».
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  lexicon: BDAG
  rationale: La preposición con genitivo indica compañía. «Conmigo» es la forma más directa y natural en español.
theological_decisions:
- issue: Cómo preservar la referencia a la ψυχή de Jesús sin diluirla en una simple paráfrasis
  english_pob_reading: My soul
  chosen_spanish_reading: Mi alma
  alternative_spanish_readings:
  - Yo estoy profundamente angustiado
  - Mi ser interior
  rationale: Se mantiene el sustantivo explícito para respetar el texto griego y la lectura de la POB inglesa. Esto deja visible la humanidad real y el sufrimiento interior de Jesús sin convertir la frase en una mera idiomática del castellano.
  doctrine_reference: 'Cristología calcedoniana; filosofía de traducción #1 y #3'
- issue: El alcance de γρηγορεῖτε en el huerto
  english_pob_reading: keep watch
  chosen_spanish_reading: velen
  alternative_spanish_readings:
  - permanezcan despiertos
  - estén vigilantes
  rationale: En contexto, el mandato incluye tanto no dormir como mantenerse alerta junto a Jesús. «Velen» preserva esa amplitud en español; la nota recoge la alternativa literal para no perder la tensión semántica.
  doctrine_reference: 'Filosofía de traducción #3'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje inglés de referencia; el borrador español sigue de cerca la lectura auditada y conserva las tensiones léxicas principales de περίλυπος, ἕως θανάτου y γρηγορεῖτε.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino por norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo exija.
  - Se prefirió «Mi alma» frente a una paráfrasis con «yo» para conservar la estructura del griego y la decisión inglesa auditada.
  - Se optó por un español sobrio y contemporáneo, evitando arcaísmos innecesarios como «estad» o «velad», salvo en notas como alternativa semántica.
