translation:
  language: es
  text: 'Pedro le dijo[a]: «Aunque tenga que morir contigo, ciertamente no te negaré». Igualmente, todos los discípulos dijeron lo mismo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jamás te negaré». El griego usa una negación muy fuerte (οὐ μή).'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le decía
  - dijo
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo resulta natural el pretérito. Se conserva el valor de habla dirigida a Jesús con el dativo indirecto 'le'.
- source_word: Κἂν
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - Y aunque
  - Si aun
  lexicon: BDAG
  rationale: '''Aunque'' expresa bien la concesión enfática sin volver la frase pesada. Mantiene la fuerza condicional concesiva del griego.'
- source_word: δέῃ
  english_pob_choice: I must
  chosen_spanish: tenga que
  alternatives_spanish:
  - deba
  - me sea necesario
  lexicon: BDAG
  rationale: El valor es de necesidad. 'Tenga que' comunica obligación de manera natural en español y conserva el matiz de imposición o necesidad.
- source_word: σὺν σοὶ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - junto contigo
  lexicon: BDAG
  rationale: '''Contigo'' es la forma natural y directa para acompañamiento en español, sin perder el sentido relacional del griego.'
- source_word: ἀποθανεῖν
  english_pob_choice: die
  chosen_spanish: morir
  alternatives_spanish:
  - morirme
  - fallecer
  lexicon: BDAG
  rationale: '''Morir'' es la equivalencia directa y sobria del infinitivo griego; aquí no requiere un eufemismo más suave.'
- source_word: οὐ μή
  english_pob_choice: will certainly not
  chosen_spanish: de ningún modo... no
  alternatives_spanish:
  - jamás... no
  - ciertamente no
  lexicon: BDAG
  rationale: La negación fuerte οὐ μή pide una equivalencia que preserve énfasis. 'De ningún modo' refuerza la negación sin volverla artificial; junto con 'no te negaré' mantiene la fuerza total de la declaración.
- source_word: ἀπαρνήσομαι
  english_pob_choice: deny
  chosen_spanish: negaré
  alternatives_spanish:
  - renegaré
  - te desconoceré
  lexicon: BDAG
  rationale: En este contexto de la negativa de Pedro a Jesús, 'negar' es el equivalente más claro y estable en español bíblico actual. 'Renegar' suena más fuerte y menos preciso; 'desconocer' no es tan directo.
- source_word: ὁμοίως
  english_pob_choice: the same / likewise
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Asimismo
  - Igualmente
  lexicon: BDAG
  rationale: '''De la misma manera'' refleja con claridad el adverbio y su paralelismo con la afirmación de Pedro. Es idiomático y conserva el registro formal del pasaje.'
- source_word: πάντες οἱ μαθηταὶ
  english_pob_choice: all the disciples
  chosen_spanish: todos los discípulos
  alternatives_spanish:
  - los discípulos todos
  - todos sus discípulos
  lexicon: BDAG
  rationale: '''Discípulos'' es la equivalencia estable de μαθηταί en los Evangelios. Se mantiene ''todos'' para el alcance total explícito del griego.'
- source_word: εἶπαν
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - hablaron
  - declararon
  lexicon: BDAG
  rationale: El aoristo de λέγω se rinde naturalmente con el pretérito 'dijeron' en español, sin agregar matices no presentes en el texto.
theological_decisions:
- issue: Fuerza de la negación de Pedro
  english_pob_reading: Rendered οὐ μή with emphatic future negation as 'I will certainly not deny you.'
  chosen_spanish_reading: Se conserva una negación enfática con 'de ningún modo... no te negaré'.
  alternative_spanish_readings:
  - jamás te negaré
  - ciertamente no te negaré
  rationale: La construcción griega expresa una negación intensificada. En español, 'de ningún modo' reproduce esa fuerza sin suavizarla ni convertirla en una paráfrasis doctrinal. Se preserva la tensión narrativa de la seguridad de Pedro, sin resolverla por anticipado.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: 'Se incorporó la revisión del audit trail que dio preferencia a ''likewise'' para ὁμοίως; por eso se traduce con una expresión explícita de paralelismo: ''De la misma manera''. También se preservó la negación enfática de οὐ μή con una solución española igualmente enfática.'
  spanish_consistency_notes:
  - Se usa 'discípulos' de manera consistente con la terminología evangélica habitual para μαθηταί.
  - Se evita 'Cristo' o terminología eclesiástica no presente en el versículo.
  - La negación fuerte se expresa sin recurrir a mayúsculas o a una formulación litúrgica.
  - El marcador [a] aparece exactamente donde corresponde en el texto y la nota explica una alternativa legítima sin alterar la lectura principal.
