    rationale: Aunque posible, puede leerse como evaluación moral. El contexto y la auditoría inglesa insisten en un veredicto legal; «Merece la muerte» comunica mejor ese fallo en español natural, con nota para las alternativas más literales/jurídicas.
  - severity: low
    issue: «Ellos respondieron» es menos natural que «Respondieron».
    rationale: El sujeto explícito no es necesario en español y suena algo pesado sin aportar claridad contextual.
