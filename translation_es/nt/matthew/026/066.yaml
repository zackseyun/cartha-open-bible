translation:
  language: es
  text: '«¿Qué les parece?» Respondieron: «Merece la muerte[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es culpable de muerte» o «Está sujeto a muerte». La expresión griega es un veredicto legal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ὑμῖν δοκεῖ
  english_pob_choice: What do you think?
  chosen_spanish: ¿Qué les parece?
  alternatives_spanish:
  - ¿Qué piensan?
  - ¿Qué opinan?
  - ¿Cuál es su juicio?
  lexicon: BDAG
  rationale: δοκέω con dativo expresa aquí una pregunta por opinión o juicio. «¿Qué les parece?» es natural en español y conserva el sentido interrogativo directo sin forzar una formulación demasiado literal.
- source_word: οἱ δὲ ἀποκριθέντες εἶπαν
  english_pob_choice: They answered
  chosen_spanish: Ellos respondieron
  alternatives_spanish:
  - Y respondieron
  - Pero respondieron
  - Respondieron
  lexicon: BDAG
  rationale: La construcción participial con εἶπαν se vierte con un verbo finito en español. Se explicita el sujeto para claridad narrativa; «respondieron» comunica bien la acción sin sobrecargar la conexión de δέ.
- source_word: ἔνοχος
  english_pob_choice: deserving
  chosen_spanish: digno
  alternatives_spanish:
  - culpable
  - responsable
  - sujeto a
  lexicon: BDAG
  rationale: ἔνοχος en este contexto judicial expresa que la persona queda bajo una sentencia de muerte. «Digno de muerte» comunica la valoración/veredicto de manera natural en español, aunque no agota el matiz legal de responsabilidad o sujeción.
- source_word: θανάτου
  english_pob_choice: of death
  chosen_spanish: de muerte
  alternatives_spanish:
  - a muerte
  - de la pena de muerte
  lexicon: BDAG
  rationale: El genitivo con ἔνοχος se conserva de forma breve en «de muerte», manteniendo el giro judicial compacto del griego. «A muerte» sería menos idiomático aquí; «de la pena de muerte» explica más de lo que el texto dice.
- source_word: ἐστίν
  english_pob_choice: He is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  lexicon: BDAG
  rationale: El copulativo se mantiene implícito en español con «es». No hace falta repetir el pronombre, que en español suele omitirse salvo énfasis.
theological_decisions:
- issue: Fuerza judicial del veredicto del consejo
  english_pob_reading: He is deserving of death
  chosen_spanish_reading: Es digno de muerte
  alternative_spanish_readings:
  - Es culpable de muerte
  - Está sujeto a muerte
  - Merece la pena de muerte
  rationale: El versículo recoge una condena judicial formulada por el consejo. «Es digno de muerte» preserva el carácter veredictivo sin añadir explicaciones doctrinales ni suavizar la dureza de ἔνοχος θανάτου. Se evita resolver la tensión entre culpabilidad legal y evaluación moral más amplia.
  doctrine_reference: Mantener la tensión textual; no importar conclusiones doctrinales no explicitadas por el versículo.
translation_notes:
  revision_awareness: 'El inglés POB ajustó la primera cláusula para hacerla más natural y mantuvo el valor judicial de ἔνοχος θανάτου. El español sigue esa misma línea: una pregunta idiomática, una respuesta directa y una fórmula veredictiva breve, sin introducir un término más técnico que opaque el alcance legal del griego.'
  spanish_consistency_notes:
  - Se usó «muerte» para θανάτου en coherencia con el valor genitivo judicial del texto.
  - Se prefirió «respondieron» como equivalente narrativo natural de ἀποκριθέντες εἶπαν.
  - No se introdujo «Cristo/Mesías» porque el versículo no lo contiene.
  - No se agregó «SEÑOR» ni otras sustituciones reverenciales, pues no hay aquí un término divino que requiera ese tratamiento.
