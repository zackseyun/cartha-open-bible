translation:
  language: es
  text: El Hijo del Hombre, en efecto, va tal como está escrito acerca de él; pero ¡ay de aquel hombre por quien el Hijo del Hombre es traicionado[a]! Más le habría valido no haber nacido aquel hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por quien el Hijo del Hombre es entregado». El verbo griego puede significar tanto «traicionar» como, más literalmente, «entregar» o «ser entregado»; aquí se eligió «es traicionado» porque está en vista la traición de Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὲν υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: The Son of Man indeed
  chosen_spanish: El Hijo del Hombre, en efecto
  alternatives_spanish:
  - El Hijo del Hombre
  - En efecto, el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva el título establecido «Hijo del Hombre» para υἱὸς τοῦ ἀνθρώπου. La partícula μὲν se refleja con «en efecto» para mantener el contraste retórico con δὲ sin volver la frase pesada o artificial en español.
- source_word: ὑπάγει
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - está yendo
  - se va
  - parte
  lexicon: BDAG
  rationale: «Va» preserva el presente verbal y el sentido de movimiento sin introducir de manera innecesaria una interpretación específica de partida o muerte.
- source_word: καθὼς γέγραπται περὶ αὐτοῦ
  english_pob_choice: just as it is written about him
  chosen_spanish: tal como está escrito acerca de él
  alternatives_spanish:
  - como está escrito acerca de él
  - tal como se ha escrito acerca de él
  lexicon: BDAG
  rationale: «Está escrito» reproduce la fórmula estable sin forzar un calco demasiado inglés; «acerca de él» transmite περὶ αὐτοῦ de manera natural y clara. «Tal como» conserva la relación de correspondencia de καθὼς.
- source_word: οὐαὶ δὲ
  english_pob_choice: but woe
  chosen_spanish: pero ¡ay
  alternatives_spanish:
  - y ¡ay
  - mas ¡ay
  - pero ay
  lexicon: BDAG
  rationale: «¡Ay!» conserva la fuerza profética y judicial de οὐαί. «Pero» representa δὲ como contraste con la primera cláusula.
- source_word: τῷ ἀνθρώπῳ ἐκείνῳ
  english_pob_choice: to that man
  chosen_spanish: de aquel hombre
  alternatives_spanish:
  - aquel hombre
  - para aquel hombre
  - de ese hombre
  lexicon: BDAG
  rationale: La expresión introduce la exclamación de lamento/jucio en español de forma idiomática. «Aquel» conserva la distancia enfática de ἐκείνῳ, y «hombre» mantiene la referencia masculina específica del contexto.
- source_word: δι’ οὗ
  english_pob_choice: through whom
  chosen_spanish: por quien
  alternatives_spanish:
  - a través de quien
  - mediante quien
  - por cuyo medio
  lexicon: BDAG
  rationale: Con un agente personal, «por quien» es la forma natural en español para expresar mediación/instrumentalidad y puede abarcar el matiz de agencia sin perder fluidez.
- source_word: παραδίδοται
  english_pob_choice: is betrayed
  chosen_spanish: es entregado
  alternatives_spanish:
  - es traicionado
  - es entregado / traicionado
  - es puesto en manos de
  lexicon: BDAG
  rationale: Se eligió «es entregado» para seguir de cerca el valor central de παραδίδωμι y evitar fijar de entrada solo el matiz de traición. El contexto de Judas queda claro por la sección, y el verbo puede abarcar tanto «entregar» como «traicionar»; esa tensión se preserva mejor en español con una traducción menos cerrada.
- source_word: καλὸν ἦν αὐτῷ
  english_pob_choice: It would have been better for him
  chosen_spanish: Más le habría valido
  alternatives_spanish:
  - Habría sido mejor para él
  - Le habría sido mejor
  - Le habría convenido más
  lexicon: BDAG
  rationale: Esta locución española reproduce de modo natural el valor contrafactual y evaluativo de καλὸν ἦν αὐτῷ. «Más» refleja el comparativo implícito de «better» sin añadir contenido ajeno al griego.
- source_word: εἰ οὐκ ἐγεννήθη
  english_pob_choice: if ... had not been born
  chosen_spanish: no haber nacido
  alternatives_spanish:
  - si no hubiera nacido
  - si no hubiese nacido
  - no haber sido engendrado
  lexicon: BDAG
  rationale: En español, la construcción infinitiva tras «le habría valido» expresa bien la condición contrafactual. «Nacido» traduce el pasivo de γεννάω de forma natural; «engendrado» sería más literal pero menos idiomático aquí.
- source_word: ὁ ἄνθρωπος ἐκεῖνος
  english_pob_choice: that man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - ese hombre
  - el hombre aquel
  - ese mismo hombre
  lexicon: BDAG
  rationale: Se conserva la distancia enfática del demostrativo ἐκεῖνος con «aquel», y la repetición final mantiene el tono solemne y tajante del dicho.
theological_decisions:
- issue: Relación entre el cumplimiento escrito y la responsabilidad humana
  english_pob_reading: The verse preserves both that the Son of Man goes according to what is written and that the betrayer remains under woe and personal accountability.
  chosen_spanish_reading: La redacción mantiene tanto el cumplimiento de lo escrito como la culpa personal del hombre por quien el Hijo del Hombre es entregado.
  alternative_spanish_readings:
  - Una lectura determinista que diluya la responsabilidad de Judas
  - Una lectura meramente humana que atenúe el cumplimiento de lo escrito
  rationale: La traducción no resuelve la tensión entre soberanía/cumplimiento y culpa humana. «Es entregado» preserva la ambigüedad lexical de παραδίδοται sin negar el trasfondo de traición del contexto, mientras «¡ay de aquel hombre!» conserva la nota de juicio.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica en vez de resolverla'
- issue: Fuerza del dicho final sobre no haber nacido
  english_pob_reading: The statement is rendered as a severe judgment saying without importing a specific doctrinal conclusion beyond the text.
  chosen_spanish_reading: La frase final se mantiene como una declaración de juicio severo, sin convertirla en una tesis doctrinal más amplia que el versículo no formula explícitamente.
  alternative_spanish_readings:
  - Una hipérbole retórica únicamente
  - Una prueba textual para una doctrina detallada de reprobación o aniquilación
  rationale: La formulación respeta la gravedad del juicio sin añadir conclusiones sistemáticas que el texto no desarrolla. El español «más le habría valido» reproduce la valoración sin exageración explicativa.
  doctrine_reference: 'Affirmations; Translation philosophy: no importar afirmaciones doctrinales que el texto no hace'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en el inglés POB para mantener la forma estándar «está escrito» (no una construcción más pesada como «ha sido escrito») y para reflejar mejor καλὸν ἦν con una expresión comparativa natural en español. También se decidió no fijar prematuramente παραδίδοται como «traicionado» en el cuerpo principal, para preservar la tensión semántica documentada entre «entregar» y «traicionar».
  spanish_consistency_notes:
  - Se usa «Hijo del Hombre» como título fijo, coherente con la política del proyecto.
  - Se mantiene «Dios/Yahvé» fuera del verso porque no aparece en el texto.
  - «Aquel hombre» conserva el valor enfático del demostrativo final.
  - La puntuación y el registro buscan ser publicables en español latinoamericano amplio sin sonar eclesiásticamente arcaicos.
