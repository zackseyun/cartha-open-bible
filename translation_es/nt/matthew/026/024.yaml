  text: ὁ μὲν υἱὸς τοῦ ἀνθρώπου ὑπάγει καθὼς γέγραπται περὶ αὐτοῦ, οὐαὶ δὲ τῷ ἀνθρώπῳ ἐκείνῳ δι’ οὗ ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται· καλὸν ἦν αὐτῷ εἰ οὐκ ἐγεννήθη ὁ ἄνθρωπος ἐκεῖνος.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/024.yaml
  text: The Son of Man indeed goes just as it is written about him[a], but woe to that man through whom the Son of Man is betrayed. It would have been better for him if that man had not been born.
  footnotes:
  - marker: a
    text: Or, 'through whom the Son of Man is handed over.' The Greek verb can mean either 'betray' or more literally 'hand over'; here 'betrayed' was chosen because Judas's treachery is in view.
    reason: lexical_alternative
