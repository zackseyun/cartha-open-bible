translation:
  language: es
  text: Una mujer se le acercó con un frasco de alabastro de perfume muy costoso[a], y lo derramó sobre su cabeza mientras él estaba reclinado a la mesa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un frasco de alabastro de ungüento muy costoso». El griego μύρον puede referirse a perfume, aceite perfumado o ungüento aromático, no solo al perfume líquido en sentido moderno.
    reason: lexical_alternative
  - marker: b
    text: 'Esto describe la postura habitual para comer en ese contexto cultural: reclinarse a la mesa.'
    reason: cultural_note
lexical_decisions:
- source_word: προσῆλθεν
  english_pob_choice: came to
  chosen_spanish: se le acercó
  alternatives_spanish:
  - vino a él
  - se acercó a él
  lexicon: BDAG
  rationale: El verbo expresa movimiento hacia Jesús. "Se le acercó" conserva ese acercamiento directo con español natural; "vino a él" también es posible, pero suena más marcado y menos inmediato.
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: Una mujer
  alternatives_spanish:
  - La mujer
  - Una señora
  lexicon: BDAG
  rationale: El griego presenta un sustantivo indefinido sin identificar a la persona. "Una mujer" mantiene esa indefinición sin añadir información.
- source_word: ἔχουσα
  english_pob_choice: holding
  chosen_spanish: con
  alternatives_spanish:
  - llevando
  - teniendo
  lexicon: BDAG
  rationale: En español, para esta construcción resultaba más natural expresar posesión acompañante con "con" y el complemento nominal. Así se evita un gerundio pesado sin perder la imagen de que la mujer llevaba el recipiente consigo.
- source_word: ἀλάβαστρον μύρου
  english_pob_choice: an alabaster jar of very costly perfume
  chosen_spanish: un frasco de alabastro lleno de perfume
  alternatives_spanish:
  - un vaso de alabastro con perfume
  - un frasco de alabastro con ungüento
  lexicon: BDAG
  rationale: ἀλάβαστρον puede referirse al recipiente de alabastro; en español "frasco" comunica bien el contenedor sin forzar una forma moderna precisa. μύρον puede ser perfume o ungüento aromático; aquí "perfume" sigue la decisión auditada en inglés y es comprensible para lectores actuales. Se evita precisar más de lo que el texto griego exige.
- source_word: βαρυτίμου
  english_pob_choice: very costly
  chosen_spanish: muy costoso
  alternatives_spanish:
  - de gran valor
  - muy caro
  lexicon: BDAG
  rationale: El adjetivo intensifica el valor del perfume. "Muy costoso" mantiene la fuerza económica del término sin perder el registro elevado.
- source_word: κατέχεεν
  english_pob_choice: poured
  chosen_spanish: lo derramó
  alternatives_spanish:
  - lo vertió
  - lo echó
  lexicon: BDAG
  rationale: El verbo indica verter o derramar sobre algo. "Lo derramó" transmite el gesto de manera natural en español y conserva la idea de acción sobre la cabeza.
- source_word: ἐπὶ τῆς κεφαλῆς αὐτοῦ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: BDAG
  rationale: La preposición con genitivo indica contacto o dirección hacia la superficie. "Sobre su cabeza" es la forma más clara y directa en español.
- source_word: ἀνακειμένου
  english_pob_choice: as he was reclining at the table
  chosen_spanish: mientras él estaba recostado a la mesa
  alternatives_spanish:
  - mientras estaba recostado
  - cuando estaba recostado a la mesa
  lexicon: BDAG
  rationale: El participio describe la postura habitual de comer. "Recostado a la mesa" comunica la costumbre cultural sin necesidad de una explicación añadida; "a la mesa" refleja el contexto de comida mejor que un simple "reclinado".
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en la auditoría inglesa y no registra revisiones aplicadas; la versión española sigue esa lectura estable sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito por el contexto pronominal, sin introducir el nombre porque el versículo solo dice «a él».
  - Se evitó «Cristo»/«Mesías» porque no aparecen en este versículo.
  - Se eligió «sobre» para ἐπί con genitivo por ser la opción más natural en español y fiel al contacto físico expresado por el griego.
