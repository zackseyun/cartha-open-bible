revisions:
- from: Una mujer se le acercó con un frasco[a] de alabastro[b] lleno de perfume muy costoso[c], y lo derramó sobre su cabeza mientras él estaba recostado a la mesa[d].
  to: Una mujer se le acercó con un frasco de alabastro de perfume muy costoso[a], y lo derramó sobre su cabeza mientras él estaba reclinado a la mesa[b].
  rationale: La revisión elimina la adición implícita de «lleno de», simplifica y alinea mejor las notas con el tratamiento léxico auditado en inglés, y mejora la naturalidad y precisión cultural del español con «reclinado a la mesa». El sentido fuente permanece intacto y el resultado queda más fiel y más limpio editorialmente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:26:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: una mujer se acerca a Jesús, trae un recipiente de alabastro con μύρον de gran valor y lo vierte sobre su cabeza mientras él está reclinado a la mesa. Sin embargo, añade un matiz no explícito en el texto fuente con «lleno de», y divide innecesariamente ἀλάβαστρον μύρου en dos notas donde el sintagma funciona mejor como una sola unidad léxica. También conviene pulir la nota cultural y la expresión española de la postura en la mesa.'
  spanish_quality_summary: El español es mayormente natural y legible, pero «recostado a la mesa» suena menos idiomático que «reclinado a la mesa» o «recostado a la mesa» según región; para un registro bíblico amplio, «reclinado a la mesa» encaja mejor con la costumbre antigua y evita resonancias modernas de simplemente apoyarse. «Con un frasco de alabastro de perfume muy costoso» o «que tenía un frasco...» es más fiel que «lleno de perfume». La puntuación y el tono general son adecuados.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión «perfume» para μύρον es aceptable y está bien respaldada por nota. «Frasco de alabastro» es compatible con la evidencia, aunque el inglés auditado trató la unidad como «alabaster jar of ... perfume» con alternativa «flask ... ointment»; en español conviene mantener una sola nota léxica principal para el conjunto y otra para la alternativa de μύρον, no sobreexplicar alabastro por separado.
  issues:
  - severity: medium
    issue: «lleno de perfume» añade un detalle no expresado explícitamente por ἀλάβαστρον μύρου
    rationale: El griego dice literalmente que ella tenía un recipiente de alabastro de perfume/ungüento muy costoso; «lleno de» infiere el estado del recipiente y va un paso más allá del texto.
  - severity: medium
    issue: La nota [d] contiene comillas innecesarias y redacción poco pulida
    rationale: La nota empieza con una comilla simple errónea y puede formularse de manera más natural y directa como nota cultural.
  - severity: low
    issue: «recostado a la mesa» es comprensible, pero «reclinado a la mesa» refleja mejor el trasfondo cultural en registro bíblico
    rationale: El participio ἀνακειμένου alude a la postura formal de comida; «reclinado» suele comunicar mejor esa costumbre antigua en español eclesial amplio.
  - severity: low
    issue: La segmentación de notas [a] y [b] sobre ἀλάβαστρον es algo redundante
    rationale: Ambas notas explican aspectos muy cercanos del mismo sustantivo; puede simplificarse para mayor claridad editorial.
  revised_spanish_text: Una mujer se le acercó con un frasco de alabastro de perfume muy costoso[a], y lo derramó sobre su cabeza mientras él estaba reclinado a la mesa[b].
  revised_footnotes:
  - marker: a
    text: O «un frasco de alabastro de ungüento muy costoso». El griego μύρον puede referirse a perfume, aceite perfumado o ungüento aromático, no solo al perfume líquido en sentido moderno.
    reason: lexical_alternative
  - marker: b
    text: 'Esto describe la postura habitual para comer en ese contexto cultural: reclinarse a la mesa.'
    reason: cultural_note
  revision_rationale: La revisión elimina la adición implícita de «lleno de», simplifica y alinea mejor las notas con el tratamiento léxico auditado en inglés, y mejora la naturalidad y precisión cultural del español con «reclinado a la mesa». El sentido fuente permanece intacto y el resultado queda más fiel y más limpio editorialmente.
