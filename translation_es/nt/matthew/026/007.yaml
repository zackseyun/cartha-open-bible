base_translation:
  language: en
  yaml_path: translation/nt/matthew/026/007.yaml
  text: a woman came to him holding an alabaster jar of very costly perfume[b][a], and she poured it on his head as he was reclining at the table.
  footnotes:
  - marker: a
    text: Or 'an alabaster flask of very costly ointment.' The Greek μύρον can refer to perfumed oil or ointment, not only modern liquid perfume.
    reason: lexical_alternative
  - marker: b
    text: That is, reclining in the customary posture for a meal.
    reason: cultural_note
