  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cuadrante» es una adaptación española plausible de κοδράντης, aunque «quadrans» también sería posible; la nota cultural compensa bien. No hay términos teológicos de glosario central implicados aquí.
