translation:
  language: es
  text: 'En verdad te digo: no saldrás de allí[a] hasta que hayas pagado el último cuadrante[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «de ahí» o «de ese lugar».'
    reason: lexical_alternative
  - marker: b
    text: El cuadrante era una pequeña moneda romana.
    reason: cultural_note
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De cierto
  alternatives_spanish:
  - En verdad
  - Amén
  lexicon: BDAG
  rationale: ἀμὴν funciona aquí como fórmula solemne de afirmación introductoria. «De cierto» conserva la fuerza de certeza y autoridad con una cadencia natural en español bíblico actual. «Amén» dejaría sin explicar la función discursiva; «en verdad» es posible, pero «de cierto» resulta más tradicional y transparente en este contexto.
- source_word: λέγω σοι
  english_pob_choice: I tell you
  chosen_spanish: te digo
  alternatives_spanish:
  - os digo
  - te aseguro
  lexicon: BDAG
  rationale: La expresión directa λέγω σοι se vierte naturalmente con «te digo», manteniendo el адресo personal y la autoridad inmediata del enunciado. «Te aseguro» añade matiz explicativo no explicitado por el griego.
- source_word: οὐ μὴ ἐξέλθῃς
  english_pob_choice: you will certainly not get out
  chosen_spanish: no saldrás
  alternatives_spanish:
  - no saldrás de ninguna manera
  - ciertamente no saldrás
  lexicon: BDAG
  rationale: La construcción enfática οὐ μή con subjuntivo aoristo expresa negación fuerte. En español, el futuro simple con negación comunica bien la seguridad de la prohibición/predicción en un registro natural. El énfasis se mantiene por el contexto y puede reforzarse con «de ningún modo» si fuera necesario, pero aquí no resulta imprescindible.
- source_word: ἐκεῖθεν
  english_pob_choice: out of there / from there
  chosen_spanish: de allí
  alternatives_spanish:
  - de ahí
  - de ese lugar
  lexicon: BDAG
  rationale: ἐκεῖθεν indica movimiento desde aquel lugar. «De allí» es la opción más natural y fiel en español para una salida desde un lugar determinado.
- source_word: ἕως ἂν ἀποδῷς
  english_pob_choice: until you have paid
  chosen_spanish: hasta que hayas pagado
  alternatives_spanish:
  - hasta que pagues
  - hasta que hayas saldado
  lexicon: BDAG
  rationale: La combinación ἕως ἄν con subjuntivo aoristo apunta a una acción futura que termina una अवस्था previa. «Hasta que hayas pagado» refleja mejor la completitud del pago que un presente simple, y preserva el valor aspectual del griego.
- source_word: τὸν ἔσχατον
  english_pob_choice: the last
  chosen_spanish: el último
  alternatives_spanish:
  - el postrero
  - el final
  lexicon: BDAG
  rationale: ἔσχατος aquí significa el último en orden o cantidad. «El último» es claro, idiomático y fiel; «postrero» sería más arcaico sin aportar precisión adicional.
- source_word: κοδράντην
  english_pob_choice: quadrans
  chosen_spanish: cuadrante
  alternatives_spanish:
  - quadrans
  - cuadrante romano
  lexicon: BDAG
  rationale: κοδράντης designa una pequeña moneda romana equivalente al quadrans. En español, «cuadrante» reproduce de forma inteligible el nombre de la moneda con una conexión transparente con el original latino. Se evita «farthing» u otras equivalencias culturales ajenas al texto.
theological_decisions:
- issue: Cómo reflejar el valor de la advertencia sin resolverla doctrinalmente
  english_pob_reading: The translation preserves the immediate image of confinement for debt without specifying a doctrinal interpretation.
  chosen_spanish_reading: La traducción conserva la imagen inmediata de una detención por deuda, sin especificar una interpretación doctrinal.
  alternative_spanish_readings:
  - La frase apunta explícitamente al juicio final
  - La frase describe solo una situación legal/prisionera
  rationale: 'El griego presenta una imagen concreta: no salir de allí hasta pagar la última cantidad. Mantener esa concreción evita introducir conclusiones sobre juicio, purgación o mera metáfora legal que el texto no formula explícitamente. Así se preserva la tensión interpretativa documentada en la auditoría inglesa.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Revisión auditada sin cambios sustanciales respecto del pase más reciente en la fuente inglesa; la presente propuesta traslada esa lectura al español con terminología transparente y sin resolver la tensión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto; aquí no aparece.
  - Se usa «cuadrante» para κοδράντης en consonancia con la transparencia lexical del original.
  - La negación enfática del griego se expresa con futuro negativo natural en español, conservando el sentido de certeza sin arcaísmo excesivo.
