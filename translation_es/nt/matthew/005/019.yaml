translation:
  language: es
  text: Por tanto[a], cualquiera que deje sin fuerza uno de los más pequeños de estos mandamientos y enseñe a otros[b] a hacer lo mismo será llamado el más pequeño en el reino de los cielos; pero cualquiera que los haga y los enseñe, este será llamado grande en el reino de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desate», «afloje» o «anule». El verbo griego literalmente significa «soltar» y aquí se refiere a debilitar o tratar un mandamiento como no vinculante.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «a las personas» o «a los seres humanos». Aquí «a otros» expresa de forma natural que se les enseña a hacer eso mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: λύσῃ
  english_pob_choice: relaxes
  chosen_spanish: afloje
  alternatives_spanish:
  - quiera anular
  - desate
  - deje sin fuerza
  lexicon: BDAG
  rationale: λύω conserva aquí la metáfora de soltar/aflojar, aplicada a mandamientos en sentido de debilitarlos o tratarlos como no vinculantes. «Afloje» mantiene esa imagen sin volverla excesivamente técnica o interpretativa.
- source_word: μίαν τῶν ἐντολῶν τούτων τῶν ἐλαχίστων
  english_pob_choice: one of the least of these commandments
  chosen_spanish: uno de estos mandamientos, aunque sea de los más pequeños
  alternatives_spanish:
  - uno de los más pequeños de estos mandamientos
  - uno de estos mandamientos mínimos
  lexicon: BDAG
  rationale: La construcción griega indica pertenencia a la categoría de «los más pequeños». En español, «uno de estos mandamientos, aunque sea de los más pequeños» conserva la relación genitiva y la idea de rango sin sonar forzado.
- source_word: διδάξῃ οὕτως τοὺς ἀνθρώπους
  english_pob_choice: teaches others to do so
  chosen_spanish: así enseñe a las personas
  alternatives_spanish:
  - enseñe a otros de este modo
  - enseñe a la gente así
  lexicon: BDAG
  rationale: οὕτως mira hacia atrás al acto de aflojar el mandamiento; «así» preserva esa referencia. ἀνθρώπους es genérico para seres humanos; «las personas» expresa ese valor inclusivo en español sin perder la fuerza general del griego.
- source_word: ἐλάχιστος κληθήσεται
  english_pob_choice: will be called least
  chosen_spanish: será llamado el más pequeño
  alternatives_spanish:
  - será llamado el menor
  - será llamado el más insignificante
  lexicon: BDAG
  rationale: κληθήσεται es pasivo futuro de καλέω, «será llamado». En español, «el más pequeño» refleja el comparativo superlativo relativo de ἐλάχιστος y mantiene el paralelismo con «grande» al final del versículo.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  english_pob_choice: in the kingdom of heaven
  chosen_spanish: en el reino de los cielos
  alternatives_spanish:
  - en el reino del cielo
  - en el reino de los cielos
  lexicon: BDAG
  rationale: Se conserva la expresión mateana estable «reino de los cielos», que comunica naturalmente el plural griego οὐρανῶν en español bíblico y sigue el uso recibido del evangelio sin necesidad de calco incómodo.
- source_word: ποιήσῃ καὶ διδάξῃ
  english_pob_choice: does them and teaches them
  chosen_spanish: los haga y los enseñe
  alternatives_spanish:
  - los practique y los enseñe
  - los cumpla y los enseñe
  lexicon: BDAG
  rationale: ποιέω puede ser amplio («hacer»). Dado que el objeto son los mandamientos, «los haga» es directo y formal; «los enseñe» mantiene la correspondencia con διδάσκω.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - éste
  - él
  lexicon: BDAG
  rationale: El demostrativo subraya contraste. En español, «este» conserva el énfasis sin añadir una perífrasis innecesaria.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - importante
  - excelso
  lexicon: BDAG
  rationale: μέγας se traduce de forma directa como «grande», manteniendo el contraste léxico con ἐλάχιστος.
theological_decisions:
- issue: Estatus de «más pequeño / grande» en el reino
  english_pob_reading: Render the statement as comparative status within the kingdom, without importing exclusion from the kingdom or a doctrine of merit.
  chosen_spanish_reading: Traducirlo como contraste de estatus dentro del reino, sin convertir «será llamado el más pequeño» en exclusión del reino ni en una doctrina explícita de mérito.
  alternative_spanish_readings:
  - entender «el más pequeño» como expulsión del reino
  - leer «grande» como rango técnico de recompensa celestial
  rationale: El griego afirma que será llamado «el más pequeño en el reino de los cielos», no que quede fuera de él. La versión española debe conservar esa tensión sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Valor genérico de ἀνθρώπους
  english_pob_reading: Use 'men' as a gender-accurate generic, with inclusivity noted in a footnote.
  chosen_spanish_reading: Usar «las personas» como genérico inclusivo que refleje el valor representativo de ἀνθρώπους en español.
  alternative_spanish_readings:
  - los hombres
  - otros
  rationale: Aunque el griego usa un plural masculino, el referente es genérico. En español, «las personas» comunica con claridad ese alcance universal sin introducir masculinidad marcada donde no es necesaria.
  doctrine_reference: Precisión de sentido por encima de un masculino genérico innecesario cuando el español dispone de una forma natural e inequívoca.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó la referencia de τοὺς ἀνθρώπους a un valor más natural e inclusivo en inglés. En español se optó por «las personas» para reflejar ese alcance genérico sin perder la correspondencia con el griego.
  spanish_consistency_notes:
  - Se mantuvo la fórmula mateana «reino de los cielos» por consistencia interna con el evangelio.
  - Se conservó el paralelismo «será llamado ...; pero ... será llamado ...» para reflejar la estructura del griego.
  - Se tradujo λύσῃ con una imagen verbal de aflojamiento para preservar la metáfora del texto fuente.
  - Se evitó traducir ἐλάχιστος como «el último» o «el menor» para mantener la correspondencia con el contraste de μέγας.
