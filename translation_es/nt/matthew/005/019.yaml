    text: O «desate», «afloje» o «anule». El verbo griego literalmente significa «soltar» y aquí se refiere a debilitar o tratar un mandamiento como no vinculante.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «a las personas» o «a los seres humanos». Aquí «a otros» expresa de forma natural que se les enseña a hacer eso mismo.
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cláusula para reflejar más fielmente la construcción griega («uno de los más pequeños de estos mandamientos») sin introducir el matiz concesivo «aunque sea». Se sustituye «afloje» por «deje sin fuerza» para mayor claridad y naturalidad en español, conservando la metáfora y las alternativas en nota. También se hace explícita la referencia de οὕτως con «a hacer lo mismo», y se adapta ἀνθρώπους a «a otros» en el texto principal porque en español comunica mejor la relación verbal sin pérdida de sentido genérico.
