  text: ὃς ἐὰν οὖν λύσῃ μίαν τῶν ἐντολῶν τούτων τῶν ἐλαχίστων καὶ διδάξῃ οὕτως τοὺς ἀνθρώπους, ἐλάχιστος κληθήσεται ἐν τῇ βασιλείᾳ τῶν οὐρανῶν· ὃς δ’ ἂν ποιήσῃ καὶ διδάξῃ, οὗτος μέγας κληθήσεται ἐν τῇ βασιλείᾳ τῶν οὐρανῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/019.yaml
  text: Therefore[a], whoever relaxes one of the least of these commandments and teaches others to do so will be called least in the kingdom of heaven; but whoever does them and teaches them[b], this one will be called great in the kingdom of heaven.
  footnotes:
  - marker: a
    text: Or 'sets aside' or 'breaks.' The Greek verb literally means 'loosens' and here refers to weakening or treating a commandment as nonbinding.
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here refers to people generally, not males only; the Greek uses a masculine plural with generic force.'
    reason: lexical_alternative
