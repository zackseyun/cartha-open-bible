translation:
  language: es
  text: 'Ustedes han oído que se dijo a los antiguos[a]: ‘No asesinarás[b]; y cualquiera que asesine quedará sujeto al juicio.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los de antaño».'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «No matarás», pero el verbo griego aquí más específicamente significa «asesinar» o «cometer homicidio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἠκούσατε
  english_pob_choice: You have heard
  chosen_spanish: Ustedes han oído
  alternatives_spanish:
  - Han oído
  lexicon: BDAG
  rationale: El aoristo en esta fórmula discursiva se vierte de forma natural en español como perfecto compuesto para expresar una enseñanza ya recibida por los oyentes, sin reducirla a un evento pasado puntual.
- source_word: ἐρρέθη
  english_pob_choice: it was said
  chosen_spanish: se dijo
  alternatives_spanish:
  - fue dicho
  - fue hablado
  lexicon: BDAG
  rationale: La pasiva impersonal conserva la fórmula recibida sin identificar explícitamente al sujeto agente, como en el griego.
- source_word: τοῖς ἀρχαίοις
  english_pob_choice: to the ancients
  chosen_spanish: a los antiguos
  alternatives_spanish:
  - a los de antaño
  - a los de tiempos antiguos
  lexicon: BDAG
  rationale: ἀρχαῖος se refiere aquí a personas de tiempos anteriores. ‘A los antiguos’ es breve, natural y conserva el sentido de destinatarios de una tradición recibida.
- source_word: Οὐ φονεύσεις
  english_pob_choice: You shall not murder
  chosen_spanish: No matarás
  alternatives_spanish:
  - No asesinarás
  - No cometerás homicidio
  lexicon: BDAG
  rationale: En español, ‘matar’ es la forma tradicional y clara de este mandamiento; aunque φονεύω es más específico y suele implicar homicidio/murder, ‘asesinar’ puede sonar demasiado técnico o estrecho. Se mantiene la fuerza prohibitiva sin forzar un tecnicismo poco natural en una cita bíblica muy conocida.
- source_word: ὃς δ’ ἂν φονεύσῃ
  english_pob_choice: whoever murders
  chosen_spanish: cualquiera que mate
  alternatives_spanish:
  - quienquiera que asesine
  - quien cometa homicidio
  lexicon: BDAG
  rationale: La cláusula relativa indefinida con ἄν + subjuntivo aoristo expresa una condición general. ‘Cualquiera que mate’ fluye bien en español y preserva la generalidad; se evita ‘asesine’ por su posible dureza estilística, aunque el campo semántico de φονεύω apunta al homicidio.
- source_word: ἔνοχος ἔσται τῇ κρίσει
  english_pob_choice: will be liable to judgment
  chosen_spanish: será culpable ante el juicio
  alternatives_spanish:
  - será responsable ante el juicio
  - quedará sujeto al juicio
  - será merecedor de juicio
  lexicon: BDAG
  rationale: ἔνοχος con dativo expresa estar sujeto a una consecuencia legal o ser responsable ante ella. ‘Culpable ante el juicio’ comunica bien la carga forense en español, aunque también deja abierta la idea de quedar sometido a la decisión judicial.
theological_decisions:
- issue: Alcance de φονεύω en la cita del sexto mandamiento
  english_pob_reading: murder
  chosen_spanish_reading: matar / homicidio implícito en el contexto
  alternative_spanish_readings:
  - asesinar
  - cometer homicidio
  rationale: El texto griego es más específico que el simple ‘matar’; sin embargo, en español bíblico ‘No matarás’ es la formulación idiomática y reconocible del mandamiento. Para no perder la precisión, la nota lexical explica que el griego apunta a homicidio/murder, evitando imponer una equivalencia demasiado técnica en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que unifica la cita en una sola unidad con punto y coma. En español se refleja del mismo modo, con una sola cita introducida por dos puntos y una pausa fuerte equivalente al alto punto griego. También se atendió a la decisión inglesa de mantener ‘murder’ frente a ‘kill’, aunque en español se optó por la forma tradicional ‘No matarás’ con nota explicativa para preservar inteligibilidad y fidelidad semántica.
  spanish_consistency_notes:
  - Se usa ‘a los antiguos’ como forma principal y se documenta la alternativa ‘a los de antaño’.
  - Se conserva el registro bíblico solemne en una frase breve y directa, evitando paráfrasis amplias.
  - El cierre ‘será culpable ante el juicio’ mantiene el marco judicial sin introducir instituciones específicas no explicitadas por κρίσις.
