revisions:
- from: 'Ustedes han oído que se dijo a los antiguos[a]: ‘No matarás[b]; y cualquiera que mate será culpable ante el juicio.’'
  to: 'Ustedes han oído que se dijo a los antiguos[a]: ‘No asesinarás[b]; y cualquiera que asesine quedará sujeto al juicio.’'
  rationale: Se revisa para alinear el español con la decisión fuente-central sobre φονεύω como “murder,” preservando esa especificidad en el texto principal con “asesinar.” Se mantiene en nota la formulación tradicional “No matarás” para reflejar el expediente inglés y la recepción bíblica común en español. También se ajusta la cláusula judicial a “quedará sujeto al juicio,” que refleja mejor ἔνοχος ἔσται τῇ κρίσει como responsabilidad legal.
  reviewer_model: gpt-5.4
