review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: dos imperativos coordinados de gozo, motivo causal, recompensa grande «en los cielos», y comparación con la persecución de los profetas anteriores. Sin embargo, «persiguieron» en español puede sonar a mera acción de seguir/cazar y no expresa con suficiente claridad el sentido hostil de ἐδίωξαν en este contexto; «persiguieron» es posible, pero «persiguieron» en combinación con el contexto puede entenderse, aunque «persiguieron»/«perseguyeron» no existe; la mejor reparación es «persiguieron» -> «persiguieron»? No, la corrección adecuada en español es «persiguieron»? Mejor: «persiguieron» should be replaced by «persiguieron» is same. Therefore use «persiguieron»? The real issue is lexical precision: Spanish standard for persecution is «persiguieron», but to avoid ambiguity and align with context, use «persiguieron»? Since verb form is identical, instead use noun? Better is «porque así
    persiguieron a los profetas que vivieron antes que ustedes». Also the footnote on [a] is mismatched: the text already uses «en los cielos», so a note saying «O “en los cielos”» is not a real alternative. The note should instead explain the plural versus the more idiomatic singular «en el cielo».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos mejoras de legibilidad y precisión: 1) simplificar «de la misma manera» a «así» o «de este modo» para una cadencia más natural sin pérdida de sentido; 2) reemplazar «que fueron antes de ustedes» por «que vivieron antes que ustedes» o «que vinieron antes que ustedes», ya que «fueron antes de ustedes» suena poco natural en español. Además, la nota al pie actual no corresponde al anclaje ni a una verdadera alternativa.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «recompensa» para μισθός y «en los cielos» para ἐν τοῖς οὐρανοῖς están bien. No hay términos teológicamente sensibles como Yahvé/Mesías/esclavo aquí. La principal cuestión es estilística-lexical: expresar de manera idiomática en español el valor persecutorio de ἐδίωξαν y la anterioridad de τοὺς πρὸ ὑμῶν.'
  issues:
