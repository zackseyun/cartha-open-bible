  revision_rationale: Se corrige la nota al pie para que ofrezca una alternativa real al plural griego conservado en el texto. También se mejora la naturalidad del español con «así» y «que vivieron antes que ustedes», manteniendo plenamente el sentido del griego y la decisión auditada de conservar «en los cielos».
