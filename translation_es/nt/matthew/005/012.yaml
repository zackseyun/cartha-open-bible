    rationale: «Así» o «de este modo» conserva οὕτως con mejor fluidez en español bíblico moderno.
  revised_spanish_text: Alégrense y regocíjense mucho, porque su recompensa es grande en los cielos[a]; porque así persiguieron a los profetas que vivieron antes que ustedes.
