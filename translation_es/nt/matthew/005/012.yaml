translation:
  language: es
  text: Alégrense y regocíjense mucho, porque su recompensa es grande en los cielos[a]; porque así persiguieron a los profetas que vivieron antes que ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el cielo». Mateo frecuentemente usa el plural «los cielos» donde en español normalmente se diría «el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρετε
  english_pob_choice: Rejoice
  chosen_spanish: Alégrense
  alternatives_spanish:
  - Regocíjense
  - Alégrense y gocen
  lexicon: BDAG
  rationale: Es un imperativo plural de alegría activa. «Alégrense» es natural en español bíblico actual y conserva el llamado directo a la alegría.
- source_word: ἀγαλλιᾶσθε
  english_pob_choice: be very glad
  chosen_spanish: regocíjense mucho
  alternatives_spanish:
  - exulten
  - alégrense mucho
  - llénense de gozo
  lexicon: BDAG
  rationale: El verbo intensifica χαίρετε. «Regocíjense mucho» preserva la intensificación con un español claro y culto, sin perder el matiz exuberante.
- source_word: μισθὸς
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - pago
  - galardón
  lexicon: BDAG
  rationale: En este contexto de retribución divina por la persecución, «recompensa» comunica bien la idea sin sonar mercantil. «Galardón» sería posible, pero es más marcado tradicionalmente.
- source_word: πολὺς
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - abundante
  - mucha
  lexicon: BDAG
  rationale: Adjetivo de magnitud que modifica «recompensa». «Grande» es la equivalencia más natural y fiel en español.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: BDAG
  rationale: Se conserva el plural del griego con «los cielos», siguiendo la observación auditada de Matthew sobre οὐρανοῖς. «En el cielo» sería idiomático, pero perdería esa forma plural documentada.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: BDAG
  rationale: 'Aquí señala modo/comparación: como a los profetas anteriores. «De la misma manera» vuelve explícita esa relación comparativa sin añadir interpretación.'
- source_word: ἐδίωξαν
  english_pob_choice: they persecuted
  chosen_spanish: persiguieron
  alternatives_spanish:
  - perseguían
  - hostigaron
  lexicon: BDAG
  rationale: En el contexto de oposición a los profetas, el sentido es hostil. «Persiguieron» mantiene la fuerza verbal; en español bíblico puede expresar persecución sin requerir la nominalización «persecución».
- source_word: προφήτας
  english_pob_choice: the prophets
  chosen_spanish: a los profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: Se conserva el referente profético de Israel sin variar el término estándar. El objeto directo en español lleva la preposición «a».
- source_word: τοὺς πρὸ ὑμῶν
  english_pob_choice: who were before you
  chosen_spanish: que fueron antes de ustedes
  alternatives_spanish:
  - que estuvieron antes de ustedes
  - anteriores a ustedes
  lexicon: BDAG
  rationale: La frase modifica a «los profetas» y expresa anterioridad histórica. «Que fueron antes de ustedes» es fiel y natural en español; mantiene el sentido de precedencia personal e histórica.
theological_decisions:
- issue: Plural de οὐρανοῖς y su valor en español
  english_pob_reading: The phrase refers to the heavenly sphere where the disciples' reward is kept by God, rendered idiomatically as 'in the heavens.'
  chosen_spanish_reading: La recompensa está situada «en los cielos», conservando el plural del griego sin obligar al lector a una explicación adicional.
  alternative_spanish_readings:
  - en el cielo
  - en los cielos
  rationale: No se resuelve una disputa doctrinal; se sigue la forma plural del texto fuente, como indicó la revisión inglesa. El plural puede sugerir la formulación semítica habitual de Mateo.
  doctrine_reference: Primacía del texto original y conservación de rasgos lingüísticos significativos; no se introduce una interpretación doctrinal adicional.
translation_notes:
  revision_awareness: La versión inglesa revisó «in heaven» a «in the heavens» para reflejar con más precisión el plural griego ἐν τοῖς οὐρανοῖς. La redacción española sigue esa decisión conservando «los cielos» y evitando singularizar el término.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el plural de segunda persona, en un español latinoamericano neutral y de lectura eclesial amplia.
  - Se evita «SEÑOR» o «cielo» singular para no perder la señal del plural griego en este versículo.
  - «Recompensa» traduce con naturalidad μισθός sin cargarlo con un matiz meramente comercial.
  - Se conserva el paralelismo entre la exhortación inicial y la cláusula causal final sin expandir el texto.
