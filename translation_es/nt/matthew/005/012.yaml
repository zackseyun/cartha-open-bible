revisions:
- from: Alégrense y regocíjense mucho[a], porque su recompensa es grande en los cielos; porque de la misma manera persiguieron a los profetas que fueron antes de ustedes.
  to: Alégrense y regocíjense mucho, porque su recompensa es grande en los cielos[a]; porque así persiguieron a los profetas que vivieron antes que ustedes.
  rationale: Se corrige la nota al pie para que ofrezca una alternativa real al plural griego conservado en el texto. También se mejora la naturalidad del español con «así» y «que vivieron antes que ustedes», manteniendo plenamente el sentido del griego y la decisión auditada de conservar «en los cielos».
  reviewer_model: gpt-5.4
