lexical_decisions:
- source_word: Ἠκούσατε
  english_pob_choice: You have heard
  chosen_spanish: Ustedes han oído
  alternatives_spanish:
  - Ustedes oyeron
  lexicon: ἀκούω
  rationale: El aoristo en la fórmula introductoria de Mateo se vierte de manera natural en español con pretérito perfecto compuesto para expresar una enseñanza recibida y vigente, no solo un hecho pasado puntual.
- source_word: ἐρρέθη
  english_pob_choice: it was said
  chosen_spanish: fue dicho
  alternatives_spanish:
  - se dijo
  - fue hablado
  lexicon: λέγω
  rationale: El pasivo impersonal se conserva con una construcción pasiva breve y natural en español, manteniendo el carácter formulaico de la cita sin introducir sujeto explícito.
- source_word: Ὀφθαλμὸν
  english_pob_choice: an eye
  chosen_spanish: ojo
  alternatives_spanish:
  - un ojo
  lexicon: ὀφθαλμός
  rationale: En el dicho legal proverbial, el español idiomático usa sustantivo sin artículo; ‘ojo’ preserva el paralelismo y la fuerza proverbial del texto griego.
- source_word: ἀντὶ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - en vez de
  lexicon: ἀντί
  rationale: En esta fórmula fija de equivalencia o retribución, ‘por’ comunica bien la correspondencia legal de reemplazo; es la opción más natural en español bíblico.
- source_word: ὀφθαλμοῦ
  english_pob_choice: an eye
  chosen_spanish: ojo
  alternatives_spanish:
  - un ojo
  lexicon: ὀφθαλμός
  rationale: Se repite la misma equivalencia para conservar el balance de la máxima taliónica y evitar una expansión interpretativa.
- source_word: ὀδόντα
  english_pob_choice: a tooth
  chosen_spanish: diente
  alternatives_spanish:
  - un diente
  lexicon: ὀδούς
  rationale: Como con ‘ojo’, el dicho proverbial en español fluye mejor sin artículo y mantiene la simetría formal del original.
- source_word: ὀδόντος
  english_pob_choice: a tooth
  chosen_spanish: diente
  alternatives_spanish:
  - un diente
  lexicon: ὀδούς
  rationale: La repetición en paralelo requiere la misma traducción para reflejar la equivalencia y la estructura balanceada del griego.
theological_decisions:
- issue: Cita de la ley del talión sin explicar ni suavizar su alcance
  english_pob_reading: An eye for an eye and a tooth for a tooth
  chosen_spanish_reading: Ojo por ojo y diente por diente
  alternative_spanish_readings:
  - Ojo en lugar de ojo y diente en lugar de diente
  rationale: Se conserva la forma tradicional reconocible en español porque reproduce con precisión la máxima legal citada por Jesús y mantiene la tensión interpretativa sin añadir aclaraciones que el versículo no da.
  doctrine_reference: Preservar la tensión teológica y jurídica del texto citado; equivalencia óptima
translation_notes:
  revision_awareness: 'El texto griego coincide plenamente con el auditable inglés POB: fórmula introductoria, pasivo impersonal de λέγω y paralelismo taliónico exacto; no se requirieron revisiones respecto al contexto auditado.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ no aplica aquí, porque el versículo no contiene el nombre divino.
  - Se mantuvo ‘por’ en la máxima legal para reflejar la equivalencia fija de ἀντί, mientras la nota conserva la alternativa más literal ‘en lugar de’.
  - Se evitó el artículo en ‘ojo’ y ‘diente’ para sonar natural en español y conservar el ritmo proverbial del original.
