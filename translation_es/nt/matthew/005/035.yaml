translation:
  language: es
  text: ni por la tierra, porque es el estrado de sus pies[a]; ni por Jerusalén[b], porque es la ciudad del gran Rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alusión a Isaías 66:1: «la tierra es el estrado de mis pies».'
    reason: cross_reference
  - marker: b
    text: 'O: «hacia Jerusalén». El griego usa εἰς Ἱεροσόλυμα, que puede funcionar de manera idiomática en el lenguaje de juramentos.'
    reason: lexical_alternative
  - marker: c
    text: Alusión a Salmo 48:2, donde Jerusalén es llamada «la ciudad del gran Rey».
    reason: cross_reference
lexical_decisions:
- source_word: μήτε
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - ni... ni
  lexicon: BDAG
  rationale: En la serie de prohibiciones, μήτε se reproduce naturalmente con 'ni', que mantiene la coordinación negativa y el tono breve del original.
- source_word: ἐν τῇ γῇ
  english_pob_choice: by the earth
  chosen_spanish: por la tierra
  alternatives_spanish:
  - por la tierra y no por el suelo
  - en la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: Aunque ἐν significa literalmente 'en', aquí funciona en un contexto de juramento y la equivalencia española más natural es 'por'. 'Tierra' conserva el referente cósmico/general de γῆ frente a 'tierra' como suelo o territorio.
- source_word: γῇ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  - suelo
  - planeta tierra
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, 'tierra' comunica bien el valor de γῆ como la tierra/mundo creado, sin limitarlo a una región específica.
- source_word: ὑποπόδιόν
  english_pob_choice: footstool
  chosen_spanish: estrado
  alternatives_spanish:
  - escabel
  - banquillo para los pies
  - banqueta
  lexicon: BDAG
  rationale: '''Estrado'' es una solución bíblica y digna para ὑποπόδιον; conserva la idea de apoyo bajo los pies y permite oír la alusión escritural sin sonar forzado.'
- source_word: τῶν ποδῶν αὐτοῦ
  english_pob_choice: of his feet
  chosen_spanish: de sus pies
  alternatives_spanish:
  - de los pies de él
  - para sus pies
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de manera natural en español con 'de sus pies'. El plural 'sus' refleja el posesivo del griego y evita una construcción pesada.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: toward/by Jerusalem
  chosen_spanish: por Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - contra Jerusalén
  - sobre Jerusalén
  lexicon: BDAG
  rationale: La preposición εἰς en este contexto de juramento no se vierte de forma mecánica. 'Por Jerusalén' refleja adecuadamente el valor idiomático de jurar por algo, como en el contexto paralelo del versículo anterior y la decisión auditada en inglés.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Hierosolyma
  lexicon: BDAG
  rationale: Se mantiene el nombre propio tradicional en español, plenamente inteligible y fiel al referente geográfico del texto.
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - urbe
  - población
  lexicon: BDAG
  rationale: '''Ciudad'' es la equivalencia directa y natural de πόλις en este contexto.'
- source_word: τοῦ μεγάλου βασιλέως
  english_pob_choice: of the great King
  chosen_spanish: del gran Rey
  alternatives_spanish:
  - del gran monarca
  - del Rey grande
  lexicon: BDAG
  rationale: '''Gran Rey'' conserva el registro bíblico y la probable alusión real-salvífica del Salmo 48:2. ''Rey'' es preferible a ''monarca'' por su cadencia scriptural.'
theological_decisions:
- issue: Alusión a textos del AT en 'el estrado de sus pies'
  english_pob_reading: 'An allusion to Isaiah 66:1: ''the earth is the footstool of my feet.'''
  chosen_spanish_reading: 'Se mantiene una formulación que deja visible la alusión a Isaías 66:1: ''el estrado de sus pies''.'
  alternative_spanish_readings:
  - el banquillo para sus pies
  - el escabel de sus pies
  rationale: '''Estrado'' conserva el lenguaje bíblico de entronización y la conexión intertextual sin suavizar la imagen. No se explicita el referente en el texto principal para no añadir contenido ausente del griego.'
  doctrine_reference: Intertextualidad bíblica y soberanía divina.
- issue: Alusión a Salmo 48:2 en 'la ciudad del gran Rey'
  english_pob_reading: An allusion to Psalm 48:2, where Jerusalem is called 'the city of the great King.'
  chosen_spanish_reading: Se mantiene 'la ciudad del gran Rey', que deja oír la alusión al Salmo 48:2.
  alternative_spanish_readings:
  - la ciudad del gran rey
  - la ciudad del Gran Rey
  rationale: La mayúscula en 'Rey' puede ayudar a captar el tono reverencial y la referencia bíblica, pero no se usa para resolver dogmáticamente la identidad; el texto permanece cercano al griego y al audit trail inglés.
  doctrine_reference: Referencia al lenguaje del Salmo y respeto por la soberanía divina.
- issue: Valor idiomático de εἰς Ἱεροσόλυμα en contexto de juramento
  english_pob_reading: Or 'toward Jerusalem' / revised to 'by Jerusalem' in English audit.
  chosen_spanish_reading: '''por Jerusalén'' como equivalente idiomático de jurar por algo.'
  alternative_spanish_readings:
  - hacia Jerusalén
  - en Jerusalén
  rationale: En español, 'por' expresa con naturalidad el juramento. 'Hacia' conservaría un matiz direccional que en este contexto suena artificial; 'en' no refleja el valor juratorio. La decisión sigue la revisión auditada del inglés, pero adapta la idiomaticidad al español.
  doctrine_reference: Precisión semántica y registro juratorio bíblico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y su revisión posterior: el inglés pasó de una redacción más literal (''toward Jerusalem'') a una formulación idiomática (''by Jerusalem''). En español se optó por mantener la idiomaticidad del juramento con ''por Jerusalén'', sin perder la nota que advierte que εἰς Ἱεροσόλυμα tiene un matiz direccional especial en griego. También se conservaron las alusiones intertextuales a Isaías 66:1 y Salmo 48:2, con un registro bíblico natural en español.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece explícitamente.
  - Se usó 'tierra' para γῆ y no 'suelo' o 'territorio' para preservar el alcance general de la imagen.
  - '''Estrado'' y ''gran Rey'' se escogieron por su resonancia bíblica en español, evitando una paráfrasis explicativa.'
  - Las notas conservan la tensión entre el valor literal de εἰς y su función idiomática en juramentos.
