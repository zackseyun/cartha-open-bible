translation:
  language: es
  text: Bienaventurados los pacificadores, porque ellos serán llamados hijos[a] de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos e hijas de Dios». El griego dice «hijos de Dios», usando lenguaje filial masculino plural con fuerza representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: En las bienaventuranzas, "bienaventurados" conserva el valor declarativo de favor y estado envidiable mejor que "felices", que suena más subjetivo en español.
- source_word: εἰρηνοποιοί
  english_pob_choice: peacemakers
  chosen_spanish: pacificadores
  alternatives_spanish:
  - los que hacen la paz
  - hacedores de paz
  lexicon: BDAG
  rationale: '"Pacificadores" reproduce el sentido agente del sustantivo compuesto y es natural en español; evita una paráfrasis innecesaria y mantiene la idea de quienes producen paz activamente.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la bienaventuranza. "Porque" expresa con claridad la relación causal en español moderno.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El griego es enfático, pero en esta estructura el español puede transmitirlo de forma natural con "ellos". "Ellos mismos" sería demasiado marcado.
- source_word: υἱοὶ θεοῦ
  english_pob_choice: sons of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos varones de Dios
  - hijos/hijos e hijas de Dios
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por "sons of God" para preservar el masculino plural del griego, en español "hijos de Dios" conserva esa filiación sin sonar artificial, y puede abarcar el valor representativo del original. Se evita "hijos e hijas" porque suaviza una tensión léxica presente en el griego.
- source_word: κληθήσονται
  english_pob_choice: will be called
  chosen_spanish: serán llamados
  alternatives_spanish:
  - serán nombrados
  - serán reconocidos como
  lexicon: BDAG
  rationale: El futuro pasivo de καλέω se vierte de manera directa con "serán llamados", conservando el sentido declarativo sin explicitar una interpretación adicional.
theological_decisions:
- issue: Lenguaje filial masculino en υἱοὶ θεοῦ
  english_pob_reading: sons of God
  chosen_spanish_reading: hijos de Dios
  alternative_spanish_readings:
  - hijos e hijas de Dios
  - hijos de Dios
  rationale: El griego usa una forma masculina plural con fuerza filial/representativa. En español, "hijos de Dios" preserva mejor el eco del original que una expansión inclusiva, y evita borrar la tensión documentada en la POB inglesa. El sentido inclusivo puede inferirse por el contexto, pero no se formula en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la auditoría inglesa: se mantiene el orden y la relación causal, y no se introducen glosas adicionales. La única decisión sensible es la traducción de υἱοὶ θεοῦ, donde el español opta por una forma idiomática fiel que conserva la filiación sin neutralizar el masculino plural griego.'
  spanish_consistency_notes:
  - Se mantiene "Bienaventurados" como término de bienaventuranza, coherente con el registro bíblico.
  - '"Pacificadores" preserva el valor agentivo del sustantivo griego sin recargar el verso.'
  - La nota al pie identifica la alternativa "hijos de Dios" y explicita la tensión de género representativo sin alterar el texto principal.
