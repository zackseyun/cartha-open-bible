review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: μακάριοι → «Bienaventurados», ὅτι → «porque», κληθήσονται → «serán llamados». También mantiene adecuadamente «hijos de Dios» para υἱοὶ θεοῦ, en línea con la rationale inglesa sobre lenguaje filial representativo. Sin embargo, la nota al pie está mal formulada: ofrece como alternativa exactamente la misma expresión que ya aparece en el texto principal, por lo que no preserva la función de la nota inglesa, que señalaba la alternativa inclusiva «children of God».'
  spanish_quality_summary: El español es claro y digno. «Bienaventurados» y «porque» son naturales en registro bíblico moderno. «Pacificadores» es comprensible y bastante establecido, aunque algunos lectores podrían preferir «los que procuran la paz»; no obstante, no requiere cambio. El único problema de calidad real está en la nota, que resulta redundante y confusa.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: θεοῦ → «Dios»; υἱοὶ θεοῦ se mantiene como «hijos de Dios» en el texto principal, respetando la decisión de no neutralizar indebidamente el masculino griego. No hay conflicto con términos clave del glosario. La reparación necesaria es ajustar la nota para reflejar la alternativa española correspondiente a «children of God»: «hijos[a] de Dios» en texto con nota que ofrezca «O ''hijos e hijas de Dios''» o equivalente. Dado que el texto principal ya usa «hijos de Dios», la nota debe explicar la inclusividad, no repetir el mismo sintagma.'
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de ofrecer una alternativa real.
    rationale: La nota dice «O 'hijos de Dios'», pero el texto principal ya tiene «hijos de Dios». Esto no reproduce la nota inglesa, cuya función es señalar la alternativa inclusiva «children of God» y explicar por qué el texto principal conserva «sons of God». Es una falla editorial y semántica menor pero clara.
  revised_spanish_text: Bienaventurados los pacificadores, porque ellos serán llamados hijos[a] de Dios.
  revised_footnotes:
  - marker: a
    text: O «hijos e hijas de Dios». El griego dice «hijos de Dios», usando lenguaje filial masculino plural con fuerza representativa.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel al griego y a la rationale de la POB inglesa. Solo se corrige la nota para que cumpla la misma función que en inglés: indicar una alternativa inclusiva en español sin borrar del texto principal la forma filial masculina representativa del original.'
