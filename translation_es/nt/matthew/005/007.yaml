translation:
  language: es
  text: Bienaventurados[a] los misericordiosos, porque se les mostrará misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dichosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: μακάριοι expresa la fórmula de bienaventuranza con peso teológico, no mera emoción. «Bienaventurados» conserva el tono bíblico y solemne de la forma sentenciosa, y comunica mejor la idea de favor divino que «felices».
- source_word: οἱ ἐλεήμονες
  english_pob_choice: the merciful
  chosen_spanish: los misericordiosos
  alternatives_spanish:
  - los compasivos
  - los que son misericordiosos
  lexicon: BDAG
  rationale: El artículo con el adjetivo funciona sustantivamente, por eso se mantiene una forma nominal breve. «Misericordiosos» preserva la repetición léxica con el verbo de la cláusula siguiente y es más fiel al campo semántico de ἐλεήμων que «compasivos».
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la base o razón de la bienaventuranza. «Porque» es la forma más natural en español para un valor causal, sin perder la relación explicativa.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre es enfático, subrayando correspondencia entre quienes muestran misericordia y quienes la reciben. En español, «ellos» mantiene la fuerza sin recargar el ritmo sentencioso.
- source_word: ἐλεηθήσονται
  english_pob_choice: will be shown mercy
  chosen_spanish: serán objeto de misericordia
  alternatives_spanish:
  - recibirán misericordia
  - serán mostrados misericordia
  lexicon: BDAG
  rationale: El futuro pasivo de ἐλεάω pide conservar la pasividad y no convertirla en una acción activa. «Serán objeto de misericordia» suena natural en español y mantiene abierto el agente, como en el texto griego; «recibirán misericordia» es válido pero hace más idiomático el resultado que la voz pasiva.
theological_decisions:
- issue: Agente de la misericordia prometida
  english_pob_reading: 'Render the promise without specifying the human or divine agent: ''they will be shown mercy.'''
  chosen_spanish_reading: 'Traducir la promesa sin nombrar al agente: «serán objeto de misericordia».'
  alternative_spanish_readings:
  - serán misericordiados por Dios
  - recibirán misericordia de Dios
  - recibirán misericordia
  rationale: La pasiva griega no nombra al agente. En el contexto de las bienaventuranzas la misericordia divina está fuertemente implicada, pero el versículo no la explicita. Se preserva esa tensión teológica dejando la frase en pasiva y sin añadir un agente que el texto no menciona.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación pasiva («will be shown mercy») para reflejar mejor ἐλεηθήσονται. En español se siguió ese mismo impulso, manteniendo la voz pasiva y evitando una relectura activa del sentido.
  spanish_consistency_notes:
  - Se conservó «Bienaventurados» para la fórmula de beatitud, coherente con el registro bíblico y el peso teológico del término.
  - «Misericordiosos» mantiene la conexión léxica con «misericordia» en la cláusula final.
  - La pasiva final se dejó abierta para no especificar un agente no expresado en el griego.
  - El pronombre enfático se reflejó de manera sobria con «ellos» para conservar el tono proverbial.
