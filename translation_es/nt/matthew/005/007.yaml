  glossary_alignment: No hay conflicto con los términos base del proyecto. «Bienaventurados» y «misericordiosos» están bien alineados con el razonamiento léxico documentado. La revisión propuesta mejora la representación de ἐλεηθήσονται sin apartarse del audit trail inglés.
