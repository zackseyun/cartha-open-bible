translation:
  language: es
  text: Viendo[a] las multitudes, subió al monte[c]; y cuando se sentó[b], sus discípulos se acercaron a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando vio las multitudes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «después de sentarse»; el griego usa una construcción de genitivo absoluto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «subió sobre el monte».'
    reason: previous_rendering
lexical_decisions:
- source_word: Ἰδὼν
  english_pob_choice: Seeing
  chosen_spanish: Viendo
  alternatives_spanish:
  - Cuando vio
  - Después de ver
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera circunstancial respecto del verbo principal. «Viendo» conserva esa relación verbal breve y natural en español sin sobrecargar la secuencia temporal.
- source_word: τοὺς ὄχλους
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las masas
  - la multitud
  lexicon: BDAG
  rationale: ὄχλους está en plural y alude a grupos reunidos de personas. «Las multitudes» mantiene el plural y suena dignamente natural en español bíblico.
- source_word: ἀνέβη εἰς τὸ ὄρος
  english_pob_choice: he went up the mountain
  chosen_spanish: subió al monte
  alternatives_spanish:
  - subió a la montaña
  - subió al monte
  lexicon: BDAG
  rationale: La construcción indica ascenso hacia un monte/cerro. «Subió al monte» conserva el movimiento ascendente y el artículo definido con un término bíblico claro en español.
- source_word: τὸ ὄρος
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  - el cerro
  lexicon: BDAG
  rationale: Aunque «montaña» es posible, «monte» refleja bien el registro bíblico y permite mantener la referencia genérica con el artículo definido presente en el griego.
- source_word: καὶ καθίσαντος αὐτοῦ
  english_pob_choice: and when he sat down
  chosen_spanish: y cuando se sentó
  alternatives_spanish:
  - y después de sentarse
  - y al sentarse
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa circunstancia temporal. «Y cuando se sentó» conserva el flujo narrativo sin convertir la frase en una explicación técnica.
- source_word: προσῆλθαν αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se llegaron a él
  lexicon: BDAG
  rationale: προσέρχομαι puede significar acercarse o venir a. En español, «se acercaron a él» comunica bien el movimiento hacia Jesús y mantiene la dirección relacional del verbo.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  - sus aprendices
  lexicon: BDAG
  rationale: μαθηταί aquí designa a los seguidores/alumnos de Jesús. «Sus discípulos» es la forma más clara y fiel en español y corresponde al uso estable del pasaje.
theological_decisions:
- issue: Relación entre la multitud y los discípulos en la escena
  english_pob_reading: The crowds are observed first; then Jesus goes up the mountain and his disciples come to him.
  chosen_spanish_reading: Primero ve a las multitudes; luego sube al monte, se sienta y se le acercan sus discípulos.
  alternative_spanish_readings:
  - Primero ve a la multitud; luego sube al monte y sus discípulos vienen a él.
  - Las multitudes son vistas y Jesús sube al monte.
  rationale: La frase mantiene el orden narrativo del griego sin añadir énfasis doctrinal ni litúrgico. No se fuerza una identificación topográfica concreta más allá de «el monte».
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor del participio y del genitivo absoluto en la narración
  english_pob_reading: Seeing..., and when he sat down...
  chosen_spanish_reading: Viendo..., y cuando se sentó...
  alternative_spanish_readings:
  - Cuando vio..., y después de sentarse...
  - Al ver..., y tras sentarse...
  rationale: Se preserva la secuencia narrativa de manera natural. El español puede expresar la relación temporal sin neutralizar la construcción verbal ni insinuar una postura ceremonial que el texto no explicita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto español mediante los marcadores [a], [b] y [c]. También se ajustó la frase principal para que los marcadores correspondan exactamente a las alternativas registradas y no queden notas sueltas sin ancla.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se eligió «monte» por el registro bíblico y por la presencia del artículo definido en el griego.
  - Se mantuvo el plural de ὄχλους como «multitudes».
  - Se tradujo el movimiento hacia Jesús con un verbo de acercamiento, sin perder la dirección del original.
