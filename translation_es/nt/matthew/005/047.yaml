translation:
  language: es
  text: Y si solo saludan a sus hermanos[a], ¿qué hacen de extraordinario[b]? ¿No hacen lo mismo también los gentiles[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», pero puede referirse de manera más amplia a los miembros del propio grupo.
    reason: lexical_alternative
  - marker: b
    text: O «¿qué más hacen?».
    reason: lexical_alternative
  - marker: c
    text: O «paganos».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσπάσησθε
  english_pob_choice: greet
  chosen_spanish: saludan
  alternatives_spanish:
  - saluden
  - salan
  - den un saludo
  lexicon: BDAG
  rationale: El verbo griego expresa dar un saludo o saludar; en español, «saludan» comunica con naturalidad la acción social sin añadir una idea de hospitalidad que el contexto no exige.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - hermanos del grupo
  lexicon: BDAG
  rationale: La forma griega es masculina plural. «Hermanos» conserva esa forma y sigue siendo idiomático en español; la posible amplitud del referente queda preservada en la nota.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  - nada más
  lexicon: BDAG
  rationale: «Solo» reproduce de manera natural la restricción de μόνον sobre el grupo al que se dirige la acción.
- source_word: τί περισσὸν ποιεῖτε
  english_pob_choice: what are you doing that is extraordinary
  chosen_spanish: ¿qué hacen de extraordinario?
  alternatives_spanish:
  - ¿qué más hacen?
  - ¿qué están haciendo de extraordinario?
  - ¿qué hacen que sea extraordinario?
  lexicon: BDAG
  rationale: περισσὸν expresa lo que excede lo ordinario o sobresale. La pregunta retórica en español se vuelve más natural como «¿qué hacen de extraordinario?», sin perder el contraste con lo común.
- source_word: ἐθνικοὶ
  english_pob_choice: Gentiles
  chosen_spanish: gentiles
  alternatives_spanish:
  - paganos
  - las naciones
  - no judíos
  lexicon: BDAG
  rationale: En este contexto judío, ἐθνικοὶ designa a los no judíos. «Gentiles» preserva el contraste étnico-covenantal sin intensificarlo con «paganos».
- source_word: τὸ αὐτὸ
  english_pob_choice: the same
  chosen_spanish: lo mismo
  alternatives_spanish:
  - la misma cosa
  - lo mismo que ellos
  - eso mismo
  lexicon: BDAG
  rationale: La construcción idiomática en español requiere «lo mismo» para expresar con naturalidad la equivalencia de acción indicada por τὸ αὐτό.
theological_decisions:
- issue: Alcance de ἀδελφοὺς en la enseñanza ética
  english_pob_reading: Rendered as 'brothers' in the main text, with a note allowing a broader referent within one's group.
  chosen_spanish_reading: Se mantiene «hermanos» en el texto principal, con nota que admite un referente más amplio dentro del propio grupo.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - miembros de su grupo
  rationale: La forma masculina plural del griego no se diluye en el texto principal; a la vez, la nota conserva la posibilidad semántica más amplia que el contexto puede sugerir.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de ἐθνικοὶ
  english_pob_reading: Rendered as 'Gentiles' rather than 'pagans.'
  chosen_spanish_reading: Se traduce «gentiles» y no «paganos».
  alternative_spanish_readings:
  - paganos
  - las naciones
  - no judíos
  rationale: El contraste del dicho es principalmente con quienes están fuera del pueblo del pacto. «Gentiles» preserva ese valor étnico-covenantal sin añadir una carga polémica mayor que la del griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del expediente inglés, que afinó la pregunta intermedia para reflejar con más naturalidad el giro «what are you doing that is extraordinary?» sin cambiar el contenido. También conserva la decisión estable de traducir ἐθνικοὶ como «gentiles» y de mantener la forma masculina plural de ἀδελφοὺς en el texto principal.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y público, con puntuación interrogativa española y sin calcos innecesarios.
  - «Gentiles» se usa de manera consistente para ἐθνικοὶ en contraste con el pueblo del pacto.
  - «Hermanos» se conserva en el cuerpo principal, mientras la nota recoge la posibilidad inclusiva documentada.
  - La pregunta retórica se formula en un español natural y fiel al énfasis de περισσὸν.
