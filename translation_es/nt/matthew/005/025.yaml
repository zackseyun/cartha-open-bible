translation:
  language: es
  text: Mantente bien dispuesto hacia tu acusador rápidamente[a], mientras estás con él en el camino, no sea que tu acusador te entregue al juez, y el juez al oficial, y seas arrojado a la cárcel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente en este contexto legal: «Ponte de acuerdo pronto con tu acusador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴσθι εὐνοῶν
  english_pob_choice: Be well-disposed
  chosen_spanish: Ponte de acuerdo
  alternatives_spanish:
  - Mantente bien dispuesto
  - Sé favorable
  - Llega a un arreglo
  lexicon: BDAG
  rationale: El griego combina un imperativo de ‘ser’ con un participio de disposición favorable. En español, la idea idiomática natural en este contexto jurídico es ‘ponte de acuerdo’, que conserva la urgencia y la orientación práctica del mandato. Se evita un calco rígido que sonaría poco natural.
- source_word: ἀντιδίκῳ / ἀντίδικος
  english_pob_choice: accuser
  chosen_spanish: acusador
  alternatives_spanish:
  - adversario
  - oponente en juicio
  - contrario
  lexicon: BDAG
  rationale: El contexto legal se refuerza por ‘juez’, ‘oficial’ y ‘cárcel’. ‘Acusador’ expresa mejor la función judicial que ‘adversario’, y evita una formulación demasiado amplia para ἀντίδικος.
- source_word: ταχὺ
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  - de inmediato
  lexicon: BDAG
  rationale: ‘Pronto’ mantiene la urgencia del adverbio en un español claro y natural. ‘Rápidamente’ sería correcto, pero menos idiomático con el verbo principal elegido.
- source_word: ἕως ὅτου εἶ μετ’ αὐτοῦ ἐν τῇ ὁδῷ
  english_pob_choice: while you are with him on the way
  chosen_spanish: mientras estás con él en el camino
  alternatives_spanish:
  - mientras vas con él por el camino
  - antes de llegar con él a juicio
  - mientras todavía vas con él
  lexicon: BDAG
  rationale: La frase conserva la imagen concreta de ir ‘en el camino’ sin explicitar en el texto principal un ‘tribunal’ que el griego no dice de forma directa. ‘Camino’ traduce ὁδός de manera natural y suficientemente concreta.
- source_word: μήποτέ
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - no vaya a ser que
  - si no
  lexicon: BDAG
  rationale: ‘No sea que’ transmite bien el matiz preventivo y advertidor de μήποτε en español bíblico contemporáneo, sin resultar arcaizante ni excesivamente coloquial.
- source_word: παραδῷ
  english_pob_choice: hand you over
  chosen_spanish: te entregue
  alternatives_spanish:
  - te entregue en manos de
  - te entregue
  - te remita
  lexicon: BDAG
  rationale: ‘Entregue’ mantiene el sentido de transferencia judicial de παραδίδωμι. En español, ‘te entregue’ suena más natural que un calco con ‘poner en manos de’.
- source_word: κριτῇ / κριτὴς
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - magistrado
  - juez de tribunal
  lexicon: BDAG
  rationale: ‘Juez’ es la equivalencia más clara y estándar para κριτής en este encadenamiento legal.
- source_word: ὑπηρέτῃ
  english_pob_choice: officer
  chosen_spanish: oficial
  alternatives_spanish:
  - agente
  - alguacil
  - bailío
  lexicon: BDAG
  rationale: En una secuencia judicial, ὑπηρέτης designa a un subordinado encargado de ejecutar órdenes. ‘Oficial’ preserva esa función con naturalidad en español general, sin introducir una equivalencia demasiado local.
- source_word: εἰς φυλακὴν
  english_pob_choice: into prison
  chosen_spanish: a la cárcel
  alternatives_spanish:
  - en prisión
  - a prisión
  - a la cárcel pública
  lexicon: BDAG
  rationale: ‘Cárcel’ es la forma más natural en español para φυλακή en este contexto. ‘Prisión’ sería correcto, pero algo más formal; aquí ‘a la cárcel’ conserva la imagen de destino y encierro.
- source_word: βληθήσῃ
  english_pob_choice: be thrown
  chosen_spanish: seas arrojado
  alternatives_spanish:
  - seas lanzado
  - seas echado
  - seas tirado
  lexicon: BDAG
  rationale: ‘Arrojado’ mantiene la fuerza vívida de βάλλω, más expresiva que ‘puesto’ o ‘enviado’. En pasiva, ‘seas arrojado’ suena natural y conserva el valor de acción impuesta.
theological_decisions:
- issue: 'Cómo rendir el mandato inicial: acuerdo legal o disposición favorable'
  english_pob_reading: Retain the lexical sense with 'Be well-disposed toward your accuser' in the main text.
  chosen_spanish_reading: Poner de acuerdo pronto con tu acusador en el texto principal, con la idea de conciliación/solución práctica implícita en el contexto.
  alternative_spanish_readings:
  - Sé bien dispuesto hacia tu acusador
  - Llega a un acuerdo con tu acusador
  rationale: 'El contexto es judicial, y en español la formulación idiomática más transparente para un lector moderno es la del acuerdo. Sin embargo, el texto principal evita expandirlo más allá de lo que el griego permite: no añade detalles ajenos, sino que preserva la urgencia de resolver el conflicto antes de que avance el proceso.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo manejar la cadena judicial sin introducir más de lo que el texto dice
  english_pob_reading: accuser -> judge -> officer -> prison
  chosen_spanish_reading: acusador -> juez -> oficial -> cárcel
  alternative_spanish_readings:
  - adversario -> juez -> alguacil -> prisión
  - contrario -> magistrado -> agente -> prisión
  rationale: La secuencia se mantiene como un encadenamiento jurídico concreto. Se evita ‘alguacil’ o ‘bailío’ porque aportan color local no universal; ‘oficial’ y ‘cárcel’ son suficientemente claros para una audiencia amplia.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje fuente griego SBLGNT y el audit trail inglés. La versión inglesa optó por un sentido lexical de εὐνοέω (‘be well-disposed’) con nota alternativa más idiomática (‘come to terms’). En español se reflejó la misma tensión mediante una formulación natural de acuerdo/conciliación en el texto principal y una nota que preserva la alternativa más idiomática en contexto legal. No hubo revisiones previas aplicadas al texto base, por lo que se siguió directamente el estado más reciente sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ cuando corresponda a יהוה, pero este versículo no lo contiene.
  - ‘Mesías/Cristo’ no aparece aquí.
  - Se mantuvo el registro bíblico contemporáneo sin arcaísmos innecesarios.
  - ‘Cárcel’ se prefirió por naturalidad, sin perder el valor jurídico de φυλακή.
  - La nota al pie marca la alternativa idiomática sin duplicar el sentido principal.
