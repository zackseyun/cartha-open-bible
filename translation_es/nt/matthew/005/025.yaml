    issue: La cláusula inicial traduce ἴσθι εὐνοῶν como ‘Ponte de acuerdo’ en el texto principal.
    rationale: La auditoría inglesa documenta que el texto principal debe preservar el sentido léxico de disposición favorable (‘Be well-disposed’), mientras ‘Come to terms’ queda como alternativa idiomática de nota. El borrador español reemplaza el sentido principal por una interpretación jurídica más desarrollada.
  - severity: medium
    issue: La nota al pie no corresponde a la función de alternativa preservada por la auditoría.
    rationale: La nota actual ofrece otra formulación idiomática cercana (‘Llega pronto a un acuerdo...’) en vez de reservar precisamente ese tipo de solución idiomática como alternativa frente a una traducción principal más léxica.
