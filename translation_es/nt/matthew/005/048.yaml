  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene el futuro exhortativo de Ἔσεσθε, la inferencia de οὖν, el énfasis explícito de ὑμεῖς, y el paralelismo de τέλειοι/τέλειός con ''perfectos/perfecto''. La nota léxica también preserva adecuadamente el rango semántico de τέλειος.'
