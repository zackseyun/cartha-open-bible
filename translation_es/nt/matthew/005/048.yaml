translation:
  language: es
  text: Ustedes, por tanto, serán perfectos[a], como su Padre celestial es perfecto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «completos», «enteros» o «maduros». El griego τέλειος puede denotar plenitud o madurez, además de perfección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔσεσθε
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - deberán ser
  - habrán de ser
  lexicon: BDAG
  rationale: La forma futura exhortativa se expresa naturalmente en español con futuro simple. "Serán" conserva el tono solemne y la fuerza imperativa implícita sin introducir una perífrasis más explicativa que el griego.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: '"Por tanto" reproduce la relación inferencial con el contexto inmediato y suena más natural y digno en español bíblico contemporáneo.'
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Vosotros
  - Ustedes mismos
  lexicon: BDAG
  rationale: El plural explícito se conserva al inicio de la cláusula para mantener el énfasis. "Ustedes" es neutro para el español latinoamericano y evita un tono regional.
- source_word: τέλειοι
  english_pob_choice: perfect
  chosen_spanish: perfectos
  alternatives_spanish:
  - completos
  - enteros
  - maduros
  lexicon: BDAG
  rationale: '"Perfectos" es la correspondencia más directa y mantiene la fuerza ética del mandato. Las alternativas reflejan el campo semántico de τέλειος, especialmente la idea de integridad o plenitud, pero en el texto principal se preserva el paralelismo con el Padre.'
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: '"Como" expresa la comparación de manera breve y clara, sin agregar intensidad no exigida por el griego.'
- source_word: πατὴρ ὑμῶν
  english_pob_choice: your Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - su Padre de ustedes
  - el Padre de ustedes
  lexicon: BDAG
  rationale: Se conserva la relación posesiva directa. "Su" es idiomático en español y evita redundancia.
- source_word: οὐράνιος
  english_pob_choice: heavenly
  chosen_spanish: celestial
  alternatives_spanish:
  - del cielo
  - que está en el cielo
  lexicon: BDAG
  rationale: '"Celestial" transmite el adjetivo atributivo con naturalidad en español y mantiene el registro reverente. Se evita una perífrasis más pesada como "que está en el cielo".'
- source_word: τέλειός
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - pleno
  - maduro
  lexicon: BDAG
  rationale: Se repite el mismo equivalente para preservar la correspondencia léxica entre discípulos y Padre. Esto conserva el paralelismo retórico del griego y la misma apertura semántica que el inglés POB señaló.
theological_decisions:
- issue: Sentido de τέλειος en la exhortación ética
  english_pob_reading: '''Perfect'' in the main text, with semantic range ''complete/whole/mature'' preserved in a footnote.'
  chosen_spanish_reading: '"Perfectos" en el texto principal, con nota sobre "completos", "enteros" o "maduros" como posibilidades semánticas.'
  alternative_spanish_readings:
  - completos
  - enteros
  - maduros
  rationale: El contexto de 5:43–47 apunta a una integridad moral y amorosa, no a una afirmación de igualdad metafísica con Dios. "Perfectos" conserva la fuerza directa del mandato; la nota evita que el lector reduzca la palabra a impecabilidad absoluta o la diluya demasiado.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El pasaje concuerda con la última revisión del expediente inglés: no se requieren cambios adicionales; la correspondencia léxica y el matiz teológico se mantienen de forma alta y estable.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo exige; aquí no aparece.
  - '"Perfectos" y "perfecto" preservan el paralelismo verbal y nominal del griego.'
  - '"Celestial" mantiene el matiz reverente de οὐράνιος sin añadir una explicación interpretativa en el texto principal.'
  - La puntuación y el orden de la cláusula reproducen el cierre solemne del versículo.
