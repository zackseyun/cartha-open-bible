  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión de traducir τέλειος como 'perfectos' en el texto principal y preservar alternativas en nota está alineada con el rastro auditado en inglés.
