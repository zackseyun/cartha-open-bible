revisions:
- from: 'Otra vez[a], oísteis que fue dicho a los antiguos: «No jurarás falsamente[b], sino que cumplirás tus juramentos al Señor».'
  to: 'De nuevo, habéis oído que fue dicho a los antiguos: «No jurarás falsamente[a], sino que cumplirás tus juramentos al Señor[b]».'
  rationale: Se corrige la colocación de la nota léxica para que corresponda a ἐπιορκήσεις, se ajusta la nota sobre κύριος al estándar español del proyecto respecto de Yahvé, y se mejora la naturalidad discursiva con 'De nuevo'. También se usa 'habéis oído' para reflejar mejor la fórmula repetida del audit trail inglés, sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:01:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega y la mayoría de las decisiones del audit trail inglés: Πάλιν = introducción de otra antítesis; ἐρρέθη = formulación impersonal; ἐπιορκήσεις = ''jurar falsamente''; ἀποδώσεις ... τοὺς ὅρκους σου = cumplir los juramentos. Sin embargo, hay desajustes importantes en las notas y en la alineación terminológica de κύριος/YHWH. La nota [a] está anclada en ''Otra vez'' pero su contenido corresponde a ἐπιορκέω, no a Πάλιν. Además, la nota [b] convierte la alternativa inglesa ''to the LORD'' en ''al Señor Yahvé'', que no preserva fielmente la lógica del audit trail ni el estándar del proyecto para el nombre divino.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, 'Otra vez' suena algo más coloquial y repetitivo que 'De nuevo' en este contexto discursivo. 'Oísteis' y 'a los antiguos' son comprensibles, aunque algo más castizos/tradicionales; no impiden la lectura eclesial. El problema principal de calidad es la colocación errónea de la nota [a], que confunde al lector.
  glossary_alignment: La traducción principal 'al Señor' para κυρίῳ puede tolerarse por seguimiento del griego y del audit trail inglés, pero el proyecto español pide explicar con cuidado la relación con Yahvé cuando hay trasfondo del nombre divino. La nota alternativa debe ser 'a Yahvé' o 'a YHWH' en lógica española del proyecto, no 'al Señor Yahvé'. El resto del léxico clave ('jurar falsamente', 'cumplirás', 'juramentos') está bien alineado.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'Otra vez' pero explica ἐπιορκέω ('No jurarás falsamente' / 'violar un juramento').
    rationale: Esto desaline­a el aparato crítico con el texto y transmite información equivocada sobre Πάλιν. Debe moverse la nota al segmento 'No jurarás falsamente'.
  - severity: medium
    issue: La nota [b] dice 'al Señor Yahvé'.
    rationale: La alternativa inglesa es 'to the LORD', aludiendo al nombre pactual divino. En el proyecto español, la forma no enmascarada correspondiente es 'a Yahvé', no una combinación híbrida 'Señor Yahvé'.
  - severity: low
    issue: '''Otra vez'' es menos natural que ''De nuevo'' para Πάλιν en esta serie discursiva.'
    rationale: '''De nuevo'' suena más idiomático y literario en español bíblico contemporáneo, sin cambiar el sentido.'
  revised_spanish_text: 'De nuevo, habéis oído que fue dicho a los antiguos: «No jurarás falsamente[a], sino que cumplirás tus juramentos al Señor[b]».'
  revised_footnotes:
  - marker: a
    text: O «No quebrantarás un juramento»; el verbo puede referirse a jurar falsamente o a violar un juramento.
    reason: lexical_alternative
  - marker: b
    text: O «a Yahvé», reflejando el trasfondo del nombre pactual divino en el Antiguo Testamento.
    reason: alternative_reading
  revision_rationale: Se corrige la colocación de la nota léxica para que corresponda a ἐπιορκήσεις, se ajusta la nota sobre κύριος al estándar español del proyecto respecto de Yahvé, y se mejora la naturalidad discursiva con 'De nuevo'. También se usa 'habéis oído' para reflejar mejor la fórmula repetida del audit trail inglés, sin alterar el sentido.
