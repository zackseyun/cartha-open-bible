translation:
  language: es
  text: 'De nuevo, habéis oído que fue dicho a los antiguos: «No jurarás falsamente[a], sino que cumplirás tus juramentos al Señor[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No quebrantarás un juramento»; el verbo puede referirse a jurar falsamente o a violar un juramento.
    reason: lexical_alternative
  - marker: b
    text: O «a Yahvé», reflejando el trasfondo del nombre pactual divino en el Antiguo Testamento.
    reason: alternative_reading
lexical_decisions:
- source_word: Πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: BDAG
  rationale: Introduces otra instancia de la serie de antítesis; «otra vez» conserva el avance discursivo de manera natural en español.
- source_word: ἠκούσατε
  english_pob_choice: you have heard
  chosen_spanish: oísteis
  alternatives_spanish:
  - habéis oído
  - oyeron
  lexicon: BDAG
  rationale: El aoristo en esta fórmula se puede verter de forma simple en español; «oísteis» mantiene la apelación directa al auditorio sin forzar un perfecto perifrástico.
- source_word: ἐρρέθη
  english_pob_choice: it was said
  chosen_spanish: fue dicho
  alternatives_spanish:
  - se dijo
  - fue hablado
  lexicon: BDAG
  rationale: Conserva la pasiva impersonal del griego sin especificar el agente, como en el audit trail inglés.
- source_word: τοῖς ἀρχαίοις
  english_pob_choice: to those of old
  chosen_spanish: a los antiguos
  alternatives_spanish:
  - a los de antaño
  - a los de tiempos antiguos
  lexicon: BDAG
  rationale: «Antiguos» comunica el referente histórico-generacional; es breve y natural en español, manteniendo la idea de generaciones previas.
- source_word: ἐπιορκήσεις
  english_pob_choice: swear falsely
  chosen_spanish: jurarás falsamente
  alternatives_spanish:
  - perjurarás
  - romperás un juramento
  lexicon: BDAG
  rationale: La forma verbal puede referir a jurar falsamente o violar un juramento. «Jurarás falsamente» preserva el alcance amplio de la expresión, como en la nota inglesa.
- source_word: ἀποδώσεις
  english_pob_choice: fulfill
  chosen_spanish: cumplirás
  alternatives_spanish:
  - pagarás
  - rendirás
  lexicon: BDAG
  rationale: Aquí ἀποδίδωμι expresa llevar a cabo lo debido en relación con juramentos; «cumplirás» comunica esa obligación realizada.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Yahvé
  - a Yahvé
  lexicon: BDAG
  rationale: En esta alusión bíblica, κύριος se traduce de forma reverente como «Señor», manteniendo la lectura doctrinal estándar en español para el término en este contexto citacional.
- source_word: τοὺς ὅρκους σου
  english_pob_choice: your oaths
  chosen_spanish: tus juramentos
  alternatives_spanish:
  - tus votos
  - tus juramentos hechos
  lexicon: BDAG
  rationale: ὅρκος se refiere específicamente a un juramento. «Juramentos» es claro en español y conserva el objeto directo de ἀποδώσεις.
theological_decisions:
- issue: Referencia de κύριος en una alusión a las Escrituras de Israel
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El texto griego usa κυρίῳ; en esta cita al trasfondo veterotestamentario, «Señor» mantiene la referencia reverente sin introducir una decisión sobre el Tetragrámaton que el griego no explicita aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → Yahvé'
- issue: Alcance de ἐπιορκέω
  english_pob_reading: swear falsely
  chosen_spanish_reading: jurar falsamente
  alternative_spanish_readings:
  - perjurar
  - violar un juramento
  rationale: La forma verbal puede abarcar jurar falsamente o quebrantar un juramento. «Jurar falsamente» preserva esa amplitud sin restringir indebidamente el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que todos los marcadores de nota aparezcan exactamente en el texto español y que no haya pies de nota sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος en el cuerpo principal, consistente con el audit trail inglés y legible en español.
  - Se eligió «jurar falsamente» para ἐπιορκέω porque conserva la amplitud semántica indicada por la nota inglesa.
  - Se usó «cumplirás» para ἀποδώσεις, reflejando el sentido de ejecutar lo prometido en juramentos.
  - No se empleó «Yahvé» en el texto principal porque el griego cita κύριος; la alternativa queda reservada a la nota.
  - Los marcadores [a] y [b] aparecen exactamente donde corresponden en el texto, sin notas huérfanas.
