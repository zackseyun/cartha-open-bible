translation:
  language: es
  text: 'Pero yo les digo[a]: no resistan a la persona mala. Más bien, si alguien te abofetea en la mejilla derecha[b], vuélvele también la otra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no resistan al mal»; alternativamente, «no resistan al maligno».'
    reason: theological_note
  - marker: b
    text: 'O: «vuélvele la otra también».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  english_pob_choice: But I say to you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Pero yo les digo a ustedes
  - Sin embargo, yo les digo
  lexicon: BDAG
  rationale: Conserva el contraste de δέ con «Pero» y la fórmula autoritativa de Jesús con un verbo de decir directo y natural en español.
- source_word: μὴ ἀντιστῆναι
  english_pob_choice: do not resist
  chosen_spanish: no resistan
  alternatives_spanish:
  - no se opongan
  - no hagan resistencia
  lexicon: BDAG
  rationale: ἀνθίστημι comunica la idea de oponerse o resistir. «No resistan» mantiene la fuerza verbal sin estrecharla solo a oposición legal o solo a represalia.
- source_word: τῷ πονηρῷ
  english_pob_choice: the evil person
  chosen_spanish: al hombre malo
  alternatives_spanish:
  - al mal
  - al maligno
  - a la persona mala
  lexicon: BDAG
  rationale: La forma griega es ambigua, pero el ejemplo inmediato apunta a un agente humano ofensivo. «Hombre malo» conserva el matiz personal-genericizado de la lectura principal sin decidir innecesariamente por «el maligno»; «al mal» sonaría demasiado abstracto en español para este contexto.
- source_word: ὅστις
  english_pob_choice: if anyone
  chosen_spanish: si alguien
  alternatives_spanish:
  - quienquiera que
  - si cualquiera
  lexicon: BDAG
  rationale: En esta construcción de sentido condicional, «si alguien» reproduce de manera idiomática la fuerza indefinida de ὅστις.
- source_word: ῥαπίζει
  english_pob_choice: slaps
  chosen_spanish: abofetea
  alternatives_spanish:
  - golpea
  - cachetea
  - da una bofetada
  lexicon: BDAG
  rationale: ῥαπίζω se refiere con frecuencia a un golpe dado con la mano, específicamente una bofetada. «Abofetea» preserva el tono de humillación del gesto mejor que un verbo genérico como «golpea».
- source_word: εἰς τὴν δεξιὰν σιαγόνα
  english_pob_choice: on the right cheek
  chosen_spanish: en la mejilla derecha
  alternatives_spanish:
  - sobre la mejilla derecha
  - en el lado derecho de la cara
  - en la mandíbula derecha
  lexicon: BDAG
  rationale: σιαγών puede significar mejilla o mandíbula; en el contexto de una bofetada, «mejilla» es el equivalente natural en español. «En» representa con claridad el valor local de εἰς.
- source_word: στρέψον αὐτῷ καὶ τὴν ἄλλην
  english_pob_choice: turn the other to him as well
  chosen_spanish: vuélvele también la otra
  alternatives_spanish:
  - dale también la otra
  - vuélvele la otra también
  - présentale también la otra
  lexicon: BDAG
  rationale: στρέφω significa «volver/girar». «Vuélvele también la otra» conserva la imagen física del original y suena natural en español; «la otra» se entiende por el contexto como «la otra mejilla».
theological_decisions:
- issue: Sentido de τῷ πονηρῷ
  english_pob_reading: 'personal-generic: ''the evil person'''
  chosen_spanish_reading: «al hombre malo»
  alternative_spanish_readings:
  - «al mal»
  - «al maligno»
  rationale: La redacción principal sigue la lectura personal-generic porque el ejemplo subsiguiente trata de una agresión de una persona concreta. Se evita resolver la ambigüedad hacia una lectura demonológica; a la vez, no se reduce el término a un concepto abstracto que debilitaría el enlace con la escena inmediata.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se incorporó el ajuste del audit trail inglés que hizo más natural el orden final de la cláusula de la segunda mitad; en español se optó por una solución idiomática equivalente («vuélvele también la otra») sin perder la imagen verbal del original. No se siguió la tradición de enmascarar el nombre divino porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος con función nominal.
  spanish_consistency_notes:
  - Se mantuvo un tono formal y directo acorde con las palabras de Jesús en discurso directo.
  - Se preservó la ambigüedad de τῷ πονηρῷ en una nota, sin forzar una interpretación demonológica.
  - «Mejilla» se eligió sobre «mandíbula» por claridad idiomática en el contexto de una bofetada.
  - Se usó «vuélvele» en lugar de una paráfrasis más explicativa para mantener cercanía con στρέψον.
