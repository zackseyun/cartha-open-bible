translation:
  language: es
  text: 'Pero yo les digo[a]: amen a sus enemigos y oren por los que los persiguen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oren en favor de los que los persiguen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  english_pob_choice: But I say to you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Pero yo les digo a ustedes
  - Mas yo les digo
  lexicon: BDAG
  rationale: Conserva el contraste enfático de δέ en las antítesis del Sermón del Monte. Se mantiene la primera persona enfática con «yo» y el dativo de destinatario se expresa de forma natural con «les». No se suaviza a una fórmula más interpretativa.
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - sigan amando
  - amen con amor
  lexicon: BDAG
  rationale: El imperativo de ἀγαπάω se vierte con el mandato directo «amen», que corresponde al valor básico elegido por el POB en inglés. «Sigan amando» sugeriría de manera más explícita continuidad aspectual que el griego no obliga a expresar aquí.
- source_word: τοὺς ἐχθροὺς ὑμῶν
  english_pob_choice: your enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus adversarios
  - los que son sus enemigos
  lexicon: BDAG
  rationale: «Enemigos» preserva la fuerza relacional de ἐχθρός sin atenuarla. Se usa «sus» en español por concordancia natural con «les digo» y porque el pronombre de objeto ya sitúa a los destinatarios.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - sigan orando
  lexicon: BDAG
  rationale: «Oren» es el equivalente natural y digno para προσεύχομαι en español bíblico moderno. Evita un calco de «pray» y conserva el imperativo sin agregar duración no marcada.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - a favor de
  lexicon: BDAG
  rationale: En este contexto, ὑπέρ con genitivo se traduce con «por», que en español comunica de manera idiomática la idea de oración dirigida hacia el bien de alguien. «En favor de» sería más explícito pero menos natural en el texto principal.
- source_word: τῶν διωκόντων ὑμᾶς
  english_pob_choice: those who persecute you
  chosen_spanish: los que los persiguen
  alternatives_spanish:
  - sus perseguidores
  - los que están persiguiéndolos
  lexicon: BDAG
  rationale: 'El participio presente sustantivado se expresa con una relativa natural en español: «los que los persiguen». Conserva el sentido verbal de acción hostil en curso mejor que un sustantivo como «perseguidores».'
theological_decisions:
- issue: Alcance del mandato hacia los enemigos
  english_pob_reading: Translate both imperatives straightforwardly without importing later interpretive expansions such as emotional affection, nonresistance in every circumstance, or prayer specifically for conversion.
  chosen_spanish_reading: Traducir ambos imperativos de manera directa, sin añadir que el amor sea principalmente emocional, ni que la oración sea exclusivamente para conversión, bendición u otra aplicación específica no expresada en el texto.
  alternative_spanish_readings:
  - Traducir «amen» como benevolencia activa
  - Explicitar «oren para que se conviertan»
  rationale: El versículo ordena amar a los enemigos y orar por los perseguidores, pero no define aquí todas sus implicaciones prácticas. La traducción conserva la fuerza ética y deja abierta la tensión interpretativa sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La versión revisada del POB en inglés no introdujo cambios; esta propuesta sigue ese texto estable y mantiene la equivalencia óptima sin añadir aclaraciones no presentes en el original.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural formal con «les/los/sus», coherente con un registro bíblico neutral.
  - Se prefiere «oren» frente a «recen» por amplitud ecuménica y por ser más habitual en español bíblico moderno.
  - No se introduce «Mesías», «Yahvé» ni otras terminologías no presentes en este versículo.
  - La nota [a] está anclada en «por» para reflejar la alternativa léxica de ὑπέρ.
