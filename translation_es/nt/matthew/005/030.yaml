source:
  edition: SBLGNT
  text: καὶ εἰ ἡ δεξιά σου χεὶρ σκανδαλίζει σε, ἔκκοψον αὐτὴν καὶ βάλε ἀπὸ σοῦ, συμφέρει γάρ σοι ἵνα ἀπόληται ἓν τῶν μελῶν σου καὶ μὴ ὅλον τὸ σῶμά σου ⸂εἰς γέενναν ἀπέλθῃ⸃.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/030.yaml
  text: And if your right hand causes you to stumble[a], cut it off and throw it away[c][b]. For it is better for you that one of your members should perish than that your whole body should go into Gehenna.
  footnotes:
  - marker: a
    text: Or 'hell.' Greek 'Gehenna,' a term drawn from the Valley of Hinnom and used for eschatological judgment.
    reason: alternative_reading
  - marker: b
    text: Or 'causes you to sin.' The Greek verb literally means 'causes to stumble.'
    reason: lexical_alternative
  - marker: c
    text: Or 'throw it away from you'.
    reason: previous_rendering
