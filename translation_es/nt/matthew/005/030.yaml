translation:
  language: es
  text: Y si tu mano derecha te hace tropezar[a], córtala y tírala lejos de ti[c]; porque te conviene que perezca uno de tus miembros, y no que todo tu cuerpo vaya a la Gehena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'te hace pecar'. El verbo griego significa literalmente 'hace tropezar'.
    reason: lexical_alternative
  - marker: c
    text: O 'tírala'.
    reason: previous_rendering
lexical_decisions:
- source_word: δεξιά ... χείρ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu mano del lado derecho
  - tu mano diestra
  lexicon: BDAG
  rationale: La combinación adjetivo-sustantivo se expresa de forma natural en español como 'mano derecha'. Conserva la especificidad corporal y la fuerza retórica del paralelismo sin introducir un matiz innecesariamente técnico.
- source_word: σκανδαλίζει
  english_pob_choice: causes you to stumble
  chosen_spanish: te hace tropezar
  alternatives_spanish:
  - te hace caer en pecado
  - te hace pecar
  - te escandaliza
  lexicon: BDAG
  rationale: '''Te hace tropezar'' preserva la metáfora física de tropiezo/caída que el verbo sugiere, sin reducirla de entrada a una paráfrasis moral. En español moderno es clara y mantiene la tensión interpretativa entre tropiezo y pecado.'
- source_word: ἔκκοψον
  english_pob_choice: cut it off
  chosen_spanish: córtala
  alternatives_spanish:
  - córtala por completo
  - sécala
  - se córtala
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decisiva. Para una mano, 'córtala' es directo, natural y suficientemente fuerte en español.
- source_word: βάλε ἀπὸ σοῦ
  english_pob_choice: throw it away
  chosen_spanish: tírala lejos de ti
  alternatives_spanish:
  - échatela lejos
  - arrójala de ti
  - tírala
  lexicon: BDAG
  rationale: La idea es de apartar y desechar lo cortado. 'Tírala lejos de ti' conserva el matiz de alejamiento explícito de ἀπό σοῦ y mantiene la fuerza gestual del mandato.
- source_word: συμφέρει γάρ σοι
  english_pob_choice: For it is better for you
  chosen_spanish: porque te conviene
  alternatives_spanish:
  - porque es mejor para ti
  - porque te resulta más provechoso
  - pues te conviene
  lexicon: BDAG
  rationale: '''Conviene'' reproduce bien el sentido de ventaja/comparación sin volverlo económico. En este contexto funciona de modo solemne y sobrio en español.'
- source_word: ἵνα ἀπόληται
  english_pob_choice: that ... should perish
  chosen_spanish: que perezca
  alternatives_spanish:
  - que se pierda
  - que sea destruido
  lexicon: BDAG
  rationale: '''Perezca'' conserva el peso de ἀπόλλυμι en una pérdida o destrucción grave, y encaja con el contraste escatológico del versículo.'
- source_word: ἓν τῶν μελῶν σου
  english_pob_choice: one of your members
  chosen_spanish: uno de tus miembros
  alternatives_spanish:
  - una de tus partes del cuerpo
  - uno de tus miembros corporales
  lexicon: BDAG
  rationale: '''Miembros'' mantiene el vínculo léxico con el griego μέλος y el contraste corporal del texto. Aunque suene más formal, es fiel y claro en este contexto.'
- source_word: ὅλον τὸ σῶμά σου
  english_pob_choice: your whole body
  chosen_spanish: todo tu cuerpo
  alternatives_spanish:
  - tu cuerpo entero
  - todo tu cuerpo
  lexicon: BDAG
  rationale: '''Todo tu cuerpo'' es la forma más natural en español y conserva la oposición totalizante con ''uno de tus miembros''.'
- source_word: εἰς γέενναν ἀπέλθῃ
  english_pob_choice: should go into Gehenna
  chosen_spanish: vaya a la Gehena
  alternatives_spanish:
  - vaya al infierno
  - entre en la Gehena
  lexicon: BDAG
  rationale: Se conserva 'Gehena' para no sustituir el término histórico-teológico del texto por 'infierno', que acumula asociaciones posteriores. 'Vaya a la Gehena' refleja el movimiento de εἰς ... ἀπέλθῃ con una preposición natural en español.
theological_decisions:
- issue: Renderización de γέεννα
  english_pob_reading: Gehenna, with footnote gloss 'hell' as a contextual alternative
  chosen_spanish_reading: Gehena
  alternative_spanish_readings:
  - infierno
  - lugar de castigo final
  rationale: Se conserva el término propio del griego para respetar la imagen judía del Valle de Hinom y su uso para juicio escatológico. 'Infierno' queda evitado en el texto principal porque puede desdibujar esa referencia histórica; puede sugerirse como nota alternativa para lectores acostumbrados a ese glosario.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza del verbo σκανδαλίζει
  english_pob_reading: causes you to stumble, with note 'or causes you to sin'
  chosen_spanish_reading: te hace tropezar
  alternative_spanish_readings:
  - te hace pecar
  - te hace caer
  rationale: La traducción conserva la metáfora corporal sin borrar la posibilidad de entender el tropiezo en sentido moral. Así se mantiene la tensión del original entre imagen concreta y aplicación ética.
  doctrine_reference: Lexical note on σκανδαλίζω
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión menor que simplificó 'throw it away from you' a 'throw it away' por naturalidad. En español se mantuvo explícito 'lejos de ti' porque el complemento corresponde con claridad al ἀπὸ σοῦ del griego y su omisión debilitaría el matiz de separación.
  spanish_consistency_notes:
  - Se mantiene 'Gehena' de forma consistente con el término griego γέεννα y con la línea POB de no sustituirlo por una glosa tradicional en el texto principal.
  - '''Te hace tropezar'' conserva el campo semántico de σκανδαλίζω y permite la nota alternativa ''te hace pecar''.'
  - Se usa 'miembros' para μέλος, en coherencia con el contraste corporal del versículo.
  - La frase 'lejos de ti' responde al complemento ἀπὸ σοῦ y evita perder el matiz de alejamiento personal.
