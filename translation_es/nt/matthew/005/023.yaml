translation:
  language: es
  text: Por tanto, si estás presentando tu ofrenda ante el altar, y allí recuerdas que tu hermano[a] tiene algo contra ti,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu hermano o hermana»; el griego dice «hermano», un término masculino singular que puede funcionar de modo representativo en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  english_pob_choice: Therefore, if
  chosen_spanish: Por tanto, si
  alternatives_spanish:
  - Así que, si
  - Entonces, si
  lexicon: BDAG
  rationale: ἐὰν introduce la condición con 'si', y οὖν añade consecuencia lógica. 'Por tanto, si' preserva ambos valores sin sonar forzado en español.
- source_word: προσφέρῃς
  english_pob_choice: you are offering
  chosen_spanish: estás ofreciendo
  alternatives_spanish:
  - ofreces
  - estás presentando
  lexicon: BDAG
  rationale: El presente subjuntivo en la condición describe una acción en curso; 'estás ofreciendo' comunica bien el matiz progresivo y el contexto sacrificial.
- source_word: τὸ δῶρόν σου
  english_pob_choice: your gift
  chosen_spanish: tu ofrenda
  alternatives_spanish:
  - tu regalo
  - tu don
  lexicon: BDAG
  rationale: Aunque δῶρον es literalmente 'don/regalo', en este contexto cultual se refiere a una ofrenda. 'Ofrenda' evita sonar genérico y refleja mejor el marco del altar.
- source_word: ἐπὶ τὸ θυσιαστήριον
  english_pob_choice: at the altar
  chosen_spanish: en el altar
  alternatives_spanish:
  - sobre el altar
  - ante el altar
  lexicon: BDAG
  rationale: Con ἐπί + acusativo, el inglés audit trail optó por 'at the altar' para naturalidad. En español, 'en el altar' conserva la idea locativa y resulta idiomático sin sugerir necesariamente contacto físico.
- source_word: κἀκεῖ
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - y ahí
  - y en ese lugar
  lexicon: BDAG
  rationale: 'La conjunción y el adverbio espacial se mantienen de forma directa: ''y allí'' reproduce bien el enlace entre la acción de ofrecer y el momento de recordar.'
- source_word: μνησθῇς
  english_pob_choice: remember
  chosen_spanish: recuerdas
  alternatives_spanish:
  - te acuerdas
  - vuelves a recordar
  lexicon: BDAG
  rationale: El verbo expresa el acto de recordar en ese momento. 'Recuerdas' es claro y natural en español; 'te acuerdas' sería igualmente posible, pero menos sobrio en este contexto.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que de
  - el hecho de que
  lexicon: BDAG
  rationale: Introduce el contenido de lo recordado; 'que' es la manera más directa y natural de introducir esa cláusula en español.
- source_word: ὁ ἀδελφός σου
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano o hermana
  - tu hermano/a
  lexicon: BDAG
  rationale: Se conserva el masculino singular del griego. 'Hermano' mantiene la forma explícita del texto fuente; la ampliación inclusiva queda para una nota, no para el cuerpo principal.
- source_word: ἔχει τι κατὰ σοῦ
  english_pob_choice: has something against you
  chosen_spanish: tiene algo contra ti
  alternatives_spanish:
  - tiene una queja contra ti
  - tiene algo en tu contra
  lexicon: BDAG
  rationale: La expresión griega es idiomática e indefinida. 'Tiene algo contra ti' reproduce la misma indefinición y la misma fuerza relacional sin especificar la ofensa.
theological_decisions:
- issue: ἀδελφός como término masculino singular y su alcance representativo
  english_pob_reading: your brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu hermano o hermana
  - otro creyente
  rationale: La política POB prioriza la precisión formal sobre la neutralización. El singular masculino se mantiene en el texto principal; el posible alcance representativo puede explicarse en nota sin alterar la forma de la frase.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El audit trail inglés revisó 'on the altar' a 'at the altar' por naturalidad. En español, 'en el altar' mantiene esa naturalidad sin perder la localización cultual. No se incorporan expansiones interpretativas adicionales.
  spanish_consistency_notes:
  - Se usó 'ofrenda' para δῶρον por el contexto sacrificial del versículo.
  - Se mantuvo 'hermano' en singular masculino para reflejar el griego y la política de precisión de género.
  - '''Tiene algo contra ti'' conserva la indefinición de τι, sin aclararla indebidamente.'
  - La puntuación sigue el estilo español con coma tras la prótasis inicial y antes de la cláusula final.
