review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional e inferencial del griego, mantiene el marco cultual de θυσιαστήριον y preserva correctamente ἔχει τι κατὰ σοῦ como una queja indefinida. Sin embargo, «en el altar» puede sugerir colocación física sobre el altar y no reproduce tan naturalmente en español el sentido de presentación cultual en progreso; «ante el altar» o «al llevar ... al altar» encaja mejor con el escenario. Además, el presente «recuerdas» después de «si estás ofreciendo» funciona, pero el subjuntivo «recuerdas» en esta estructura condicional suena menos natural que «te acuerdas» o una construcción paralela; aquí conviene mantener sobriedad con «recuerdas» pero ajustar el entorno para mejor fluidez.
  spanish_quality_summary: El español es claro y digno, pero «si estás ofreciendo tu ofrenda en el altar» resulta algo rígido y ligeramente ambiguo. «Si estás presentando tu ofrenda ante el altar» mejora la naturalidad y evita la imagen de estar ya encima del altar. El resto del verso es legible y fiel. La nota de género está bien formulada y anclada correctamente.
  glossary_alignment: No hay términos del glosario principal en disputa. «Ofrenda» para δῶρον en contexto cultual está bien justificado. «Hermano» preserva correctamente ἀδελφός conforme a la política de género preciso, con nota alternativa adecuada.
  issues:
  - severity: medium
    issue: «en el altar» suena espacialmente ambiguo
    rationale: Para ἐπὶ τὸ θυσιαστήριον en este contexto, el español «en el altar» puede sugerir colocación física sobre el altar. El escenario es de acercarse/presentar la ofrenda en el lugar del altar; «ante el altar» suena más natural y evita una imagen innecesariamente concreta.
  - severity: low
    issue: «estás ofreciendo» es aceptable pero «presentando» encaja mejor con el contexto cultual en español
    rationale: προσφέρῃς puede traducirse como ofrecer, pero en español bíblico-natural «presentar una ofrenda ante el altar» fluye mejor que «estar ofreciendo ... en el altar», especialmente junto con el ajuste locativo.
  revised_spanish_text: Por tanto, si estás presentando tu ofrenda ante el altar, y allí recuerdas que tu hermano[a] tiene algo contra ti,
  revised_footnotes:
  - marker: a
    text: O «tu hermano o hermana»; el griego dice «hermano», un término masculino singular que puede funcionar de modo representativo en el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la expresión cultual para un español más natural y más fiel al escenario del griego: «presentando ... ante el altar» evita la ambigüedad espacial de «en el altar» y conserva el sentido de llevar una ofrenda al lugar del sacrificio. Se mantiene «tu hermano» con la nota inclusiva, en línea con la política POB.'
