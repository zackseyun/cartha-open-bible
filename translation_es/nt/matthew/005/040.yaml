translation:
  language: es
  text: Y al que quiera demandarte para quitarte la túnica[a][b], déjale también el manto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevarte a juicio». El griego se refiere literalmente a ser juzgado en un marco legal.
    reason: lexical_alternative
  - marker: b
    text: «Túnica» se refiere a la prenda interior; «manto» se refiere a la prenda exterior.
    reason: cultural_note
lexical_decisions:
- source_word: τῷ θέλοντί
  english_pob_choice: to the one who wants
  chosen_spanish: al que quiera
  alternatives_spanish:
  - al que desea
  - al que quiere
  lexicon: BDAG
  rationale: El participio articular presenta a una persona genérica; en español, «al que quiera» conserva la voluntad expresa de θέλω con naturalidad y sin rigidez.
- source_word: σοι κριθῆναι
  english_pob_choice: to sue you
  chosen_spanish: demandarte
  alternatives_spanish:
  - llevarte a juicio
  - llevarte ante el tribunal
  lexicon: BDAG
  rationale: En este contexto κριθῆναι alude a una acción legal contra el oyente. «Demandarte» comunica bien la idea de una acción judicial; se evita una paráfrasis excesiva, pero se conserva el sentido forense.
- source_word: χιτῶνά
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - vestidura interior
  - camisa
  lexicon: BDAG
  rationale: χιτών es la prenda interior. «Túnica» permite distinguirla de ἱμάτιον y es comprensible en español bíblico contemporáneo.
- source_word: λαβεῖν
  english_pob_choice: take
  chosen_spanish: quitarte
  alternatives_spanish:
  - tomar
  - llevarse
  lexicon: BDAG
  rationale: Dentro de la construcción con χιτών, la acción es apropiarse de la prenda; «quitarte» refleja de forma natural que alguien pretende tomarla de ti en el litigio.
- source_word: ἄφες
  english_pob_choice: let him have
  chosen_spanish: déjale
  alternatives_spanish:
  - entrégaselo
  - permíteselo
  lexicon: BDAG
  rationale: El imperativo de ἀφίημι aquí transmite ceder o dejar en manos de otro. «Déjale» preserva la fuerza imperativa y suena idiomático en español.
- source_word: ἱμάτιον
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - capa
  - manto exterior
  lexicon: BDAG
  rationale: ἱμάτιον es la prenda exterior. «Manto» comunica bien la oposición con «túnica» y es natural para lectores de español, sin perder la distinción vestimentaria.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... also
  chosen_spanish: y ... también
  alternatives_spanish:
  - y ... además
  - e ... incluso
  lexicon: BDAG
  rationale: La segunda coordinación añade la prenda exterior y refuerza la generosidad de la respuesta. «También» conserva el valor aditivo claro y directo.
theological_decisions:
- issue: Fuerza ética del mandato de Jesús en un contexto legal
  english_pob_reading: Render as a direct imperative of radical non-retaliatory generosity without softening it into mere metaphor.
  chosen_spanish_reading: Mantenerlo como una orden directa de renuncia generosa, concreta y no retaliatoria, sin reducirla a una mera metáfora.
  alternative_spanish_readings:
  - Convertirlo en un principio general de renuncia a derechos
  - Suavizarlo como una exhortación figurada
  rationale: El imperativo ἄφες y la imagen concreta de las prendas muestran una instrucción real y vívida. La traducción conserva esa aspereza ética sin sistematizarla ni diluirla.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se requirieron revisiones posteriores; la lectura coincide sustancialmente con el audit trail inglés y con el griego SBLGNT. Se preserva la oposición χιτών/ἱμάτιον mediante «túnica/manto» y el matiz forense de κριθῆναι mediante «demandarte».
  spanish_consistency_notes:
  - Se mantiene «túnica» para χιτών y «manto» para ἱμάτιον, con el fin de conservar la distinción de prendas.
  - Se usa «demandarte» como equivalente idiomático de la acción legal, sin borrar la alternativa forense documentada en la nota.
  - La coordinación final «y ... también» reproduce el valor aditivo de καὶ ... καὶ sin exagerarlo.
