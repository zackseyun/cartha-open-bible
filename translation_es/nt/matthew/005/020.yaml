translation:
  language: es
  text: Porque les digo que, si su rectitud[a] no supera la de los escribas y fariseos, de ningún modo entrarán en el reino de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su justicia». El griego δικαιοσύνη puede denotar tanto «rectitud» como «justicia»; aquí «rectitud» encaja mejor con el contexto de Mateo 5.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω γὰρ ὑμῖν
  english_pob_choice: For I tell you
  chosen_spanish: Porque les digo
  alternatives_spanish:
  - Porque les digo a ustedes
  - Pues les digo
  lexicon: BDAG
  rationale: γὰρ aporta razón o explicación, y λέγω en presente mantiene la declaración directa. «Porque les digo» suena natural en español y conserva el enlace explicativo con el discurso anterior.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si ... no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: BDAG
  rationale: La condición negativa se expresa de manera clara en español con «si ... no». Aunque «a menos que» también funciona, la estructura condicional directa refleja bien la fuerza de ἐὰν μὴ.
- source_word: περισσεύσῃ
  english_pob_choice: exceeds
  chosen_spanish: supera
  alternatives_spanish:
  - sobrepasa
  - rebasa
  - abunda más que
  lexicon: BDAG
  rationale: Aquí περισσεύω expresa exceder en medida o grado respecto del grupo comparado. «Supera» comunica esa comparación con naturalidad en español sin suavizar la fuerza del verbo.
- source_word: ὑμῶν ἡ δικαιοσύνη
  english_pob_choice: your righteousness
  chosen_spanish: su justicia[a]
  alternatives_spanish:
  - su justicia
  - su rectitud
  - su recta conducta
  lexicon: BDAG
  rationale: δικαιοσύνη puede ser «justicia» o «rectitud». En este contexto, la POB inglesa preserva la tensión lexical con una nota; en español se mantiene «justicia» y se explicita la alternativa para no borrar el matiz semántico posible en Mateo 5.
- source_word: πλεῖον τῶν γραμματέων καὶ Φαρισαίων
  english_pob_choice: that of the scribes and Pharisees
  chosen_spanish: que la de los escribas y fariseos
  alternatives_spanish:
  - más que la de los escribas y fariseos
  - que la justicia de los escribas y fariseos
  lexicon: BDAG
  rationale: πλεῖον establece comparación. En español, «supera la de los escribas y fariseos» conserva la relación comparativa implícita entre la justicia de ustedes y la de ese grupo.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - letrados
  lexicon: BDAG
  rationale: «Escribas» es el término estándar y suficientemente transparente en español para γραμματεῖς en los Evangelios.
- source_word: Φαρισαίων
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Nombre propio del grupo religioso, transliterado según el uso tradicional en español.
- source_word: οὐ μὴ εἰσέλθητε
  english_pob_choice: you will certainly not enter
  chosen_spanish: de ningún modo entrarán
  alternatives_spanish:
  - ciertamente no entrarán
  - no entrarán en absoluto
  - de ningún modo ustedes entrarán
  lexicon: BDAG
  rationale: La combinación οὐ μή con subjuntivo expresa negación enfática. «De ningún modo entrarán» conserva esa fuerza en un español digno y moderno.
- source_word: βασιλείαν τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reino de los cielos
  lexicon: BDAG
  rationale: Mateo emplea esta expresión característica. En español eclesial es la fórmula establecida y fiel al sentido mateano.
theological_decisions:
- issue: Renderización de δικαιοσύνη en Mateo 5:20
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: La POB inglesa ya documenta la posibilidad de 'justice', pero mantiene 'righteousness' como opción principal. En español, 'justicia' conserva la amplitud semántica y el peso bíblico del término; la nota preserva la alternativa sin imponer una lectura exclusiva.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δικαιοσύνη default ''righteousness'''
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente indicada como sin cambios; no se introdujeron ajustes textuales respecto del audit trail inglés. La redacción española sigue la misma decisión léxica central de la POB: mantener la comparación entre la justicia de los discípulos y la de escribas y fariseos, y preservar la negación enfática de οὐ μή.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros pasajes; aquí no aparece.
  - «Reino de los cielos» se mantiene como fórmula mateana estable, no como paráfrasis.
  - La nota al pie se ancla solo en «justicia» para no duplicar la tensión léxica.
  - Se evita «SEÑOR» porque no hay aquí un uso del nombre divino.
  - El orden y el tono buscan ser publicables en español latinoamericano sin caer en calco rígido.
