  text: λέγω γὰρ ὑμῖν ὅτι ἐὰν μὴ περισσεύσῃ ⸂ὑμῶν ἡ δικαιοσύνη⸃ πλεῖον τῶν γραμματέων καὶ Φαρισαίων, οὐ μὴ εἰσέλθητε εἰς τὴν βασιλείαν τῶν οὐρανῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/020.yaml
  text: For I tell you that unless your righteousness exceeds that of the scribes and Pharisees[a], you will certainly not enter the kingdom of heaven.
  footnotes:
