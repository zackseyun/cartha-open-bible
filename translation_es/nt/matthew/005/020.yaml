review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: γὰρ como explicación inicial, ἐὰν μὴ como condición negativa, περισσεύσῃ como comparación de grado, y οὐ μὴ εἰσέλθητε como negación enfática. Sin embargo, no sigue adecuadamente la decisión léxica/theológica auditada para δικαιοσύνη, donde la POB inglesa adopta ''righteousness'' como lectura principal y deja ''justice'' como alternativa en nota.'
  spanish_quality_summary: El español es claro, natural y de registro digno. 'Porque les digo' y 'de ningún modo entrarán' funcionan bien. La frase comparativa también es fluida. El principal problema de calidad/terminología es 'justicia' como texto principal, que en español desplaza el sentido hacia justicia social/judicial más fácilmente que el contexto de Mateo 5 permite; 'rectitud' expresa mejor aquí la conducta recta/correcta sin sonar arcaico.
  glossary_alignment: Desalineado en el término disputado δικαιοσύνη. Según la documentación POB y DOCTRINE.md, la opción principal aquí debe corresponder a 'righteousness', no a 'justice'. En español, la mejor equivalencia contextual es 'rectitud', con 'justicia' preservada como alternativa en nota. Los demás términos clave ('escribas', 'fariseos', 'reino de los cielos') están bien alineados.
  issues:
  - severity: high
    issue: δικαιοσύνη está vertido como 'justicia' en el texto principal
    rationale: La auditoría inglesa establece 'righteousness' como lectura principal en Mateo 5:20 por el contexto de obediencia recta frente a escribas y fariseos. En español, 'justicia' no preserva bien esa decisión y puede inducir un matiz jurídico/social menos preciso.
  - severity: medium
    issue: La nota lexical invierte la prioridad semántica documentada
    rationale: 'La nota actual ofrece ''rectitud'' como alternativa a ''justicia'', pero la evidencia auditada pide lo contrario: el equivalente principal debe reflejar ''righteousness'', y la alternativa puede mencionar ''justicia'' por amplitud léxica.'
  revised_spanish_text: Porque les digo que, si su rectitud[a] no supera la de los escribas y fariseos, de ningún modo entrarán en el reino de los cielos.
  revised_footnotes:
  - marker: a
    text: O «su justicia». El griego δικαιοσύνη puede denotar tanto «rectitud» como «justicia»; aquí «rectitud» encaja mejor con el contexto de Mateo 5.
    reason: lexical_alternative
  revision_rationale: Se ajusta δικαιοσύνη a una equivalencia española que preserve la decisión principal de la POB inglesa ('righteousness') en este contexto mateano, manteniendo 'justicia' como alternativa léxica en nota. El resto del versículo puede permanecer esencialmente igual porque es fiel al griego y suena natural en español.
