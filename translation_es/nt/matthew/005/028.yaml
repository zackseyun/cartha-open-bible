  to: Pero yo les digo que todo el que mira a una mujer[a] para desearla[b] ya ha cometido adulterio con ella en su corazón.
  rationale: Se conserva el texto principal casi intacto porque refleja fielmente el griego y la filosofía de la POB. Se añade la nota sobre «mujer/esposa» para no perder una alternativa léxica documentada en la auditoría inglesa. Se retoca «ya cometió» a «ya ha cometido» por naturalidad y mejor correspondencia con el sentido de realización moral ya consumada en este dicho general.
