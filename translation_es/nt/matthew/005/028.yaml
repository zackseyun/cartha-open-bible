translation:
  language: es
  text: Pero yo les digo que todo el que mira a una mujer[a] para desearla[b] ya ha cometido adulterio con ella en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra griega γυνή puede significar «mujer» o «esposa», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el que mira a una mujer para codiciarla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  english_pob_choice: But I say to you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Pero yo les afirmo
  - Pero yo les digo a ustedes
  lexicon: BDAG
  rationale: Conserva el contraste enfático de δέ con «Pero» y la primera persona explícita con «yo». «Les digo» es natural en español y mantiene la fuerza directa de λέγω sin sobretraducir.
- source_word: πᾶς ὁ βλέπων
  english_pob_choice: everyone who looks
  chosen_spanish: todo el que mira
  alternatives_spanish:
  - quien mira
  - toda persona que mira
  lexicon: BDAG
  rationale: La construcción es genérica. «Todo el que» reproduce bien el alcance universal de πᾶς y suena natural en español bíblico contemporáneo.
- source_word: γυναῖκα
  english_pob_choice: a woman
  chosen_spanish: a una mujer
  alternatives_spanish:
  - a una esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa». Aquí el griego no marca explícitamente estado civil, así que se conserva el sentido más amplio, como en la POB inglesa.
- source_word: πρὸς τὸ ἐπιθυμῆσαι
  english_pob_choice: in order to desire
  chosen_spanish: para desearla
  alternatives_spanish:
  - con el propósito de desearla
  - con intención de desearla
  - para codiciarla
  lexicon: BDAG
  rationale: La preposición con el infinitivo expresa finalidad. «Para desearla» comunica esa dirección de propósito de manera fluida. Se evita introducir «codiciar» en el texto principal para no estrechar innecesariamente el valor léxico de ἐπιθυμέω; la nota recoge la alternativa tradicional.
- source_word: ἐπιθυμῆσαι αὐτὴν
  english_pob_choice: to desire her
  chosen_spanish: desearla
  alternatives_spanish:
  - codiciarla
  - desear a ella
  lexicon: BDAG
  rationale: «Desear» preserva la amplitud semántica de ἐπιθυμέω, mientras que el contexto de adulterio hace claro el matiz sexual impropio. El clítico «-la» mantiene la referencia directa a la mujer.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya en ese momento
  lexicon: BDAG
  rationale: «Ya» expresa con naturalidad que la acción se considera moralmente realizada antes del acto externo.
- source_word: ἐμοίχευσεν
  english_pob_choice: has already committed adultery with
  chosen_spanish: cometió adulterio con
  alternatives_spanish:
  - ha cometido adulterio con
  - adulteró con
  lexicon: BDAG
  rationale: En español, el pretérito simple puede comunicar una acción plenamente realizada; el adverbio «ya» refuerza ese sentido. «Cometió adulterio con» sigue la construcción idiomática española sin perder la transitividad del verbo griego.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su interior
  - en lo íntimo de su ser
  lexicon: BDAG
  rationale: «Corazón» conserva la antropología bíblica de καρδία como sede interior de pensamiento y deseo. Es la equivalencia más natural y reconocible en español.
theological_decisions:
- issue: Sentido de γυνή en un dicho sobre adulterio
  english_pob_reading: woman
  chosen_spanish_reading: mujer
  alternative_spanish_readings:
  - esposa
  rationale: La frase es general y el griego no especifica esposa. Mantener «mujer» evita restringir el dicho más allá de la evidencia textual, aunque el contexto moral presupone la gravedad sexual del acto.
  doctrine_reference: Translation philosophy §1, §3, §4
- issue: 'Valor de ἐπιθυμέω: deseo vs. codicia/lujuria'
  english_pob_reading: desire
  chosen_spanish_reading: desear
  alternative_spanish_readings:
  - codiciar
  - lujuriar
  rationale: «Desear» es más transparente al verbo griego que una traducción ya cargada como «codiciar» o «lujuriar». El contexto de adulterio aporta el matiz ético-sexual necesario sin forzarlo en la palabra principal.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa en la decisión de explicitar la finalidad de πρὸς τὸ ἐπιθυμῆσαι con una construcción de propósito, pero en español se optó por «para desearla» por fluidez y fidelidad semántica. También se conserva la opción léxica amplia «mujer» frente a «esposa», conforme al auditorial inglés.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Se conserva «corazón» para καρδία por coherencia antropológica bíblica en toda la obra.
  - No se introduce «Señor» ni otras sustituciones no pertinentes al versículo.
  - La nota al pie marca solo la alternativa léxica realmente documentada en el expediente inglés.
