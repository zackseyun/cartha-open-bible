  text: ἐγὼ δὲ λέγω ὑμῖν ὅτι πᾶς ὁ βλέπων γυναῖκα πρὸς τὸ ἐπιθυμῆσαι αὐτὴν ἤδη ἐμοίχευσεν αὐτὴν ἐν τῇ καρδίᾳ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/028.yaml
  text: But I say to you that everyone who looks at a woman in order to desire her has already committed adultery with her in his heart[a][b][c].
