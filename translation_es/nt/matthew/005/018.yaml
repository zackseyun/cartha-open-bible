translation:
  language: es
  text: Porque en verdad les digo[a], hasta que pasen el cielo y la tierra, ni una iota[b] ni un solo trazo[c] pasará de la ley, hasta que todo suceda[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «amén». En las palabras de Jesús, ἀμήν funciona como una afirmación solemne y autoritativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «jota»; la iota es la letra más pequeña del alfabeto griego.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «uno de los más pequeños trazos»; es decir, una marca escrita mínima que distingue letras.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «hasta que todo se cumpla» / «hasta que todo llegue a cumplirse».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - ciertamente
  - amén
  lexicon: BDAG
  rationale: En las palabras de Jesús, ἀμήν introduce una afirmación solemne y autorizada. «En verdad» conserva ese valor enfático en español sin dejar el préstamo sin traducir.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - en efecto
  lexicon: BDAG
  rationale: γάρ aporta explicación o fundamento. «Porque» reproduce bien esa relación causal/discursiva en un español natural.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - les digo a ustedes
  lexicon: BDAG
  rationale: La fórmula mantiene el tono directo y autoritativo de Jesús. «Les digo» es claro y fiel; el dativo plural queda explícito en el contexto.
- source_word: ἕως ἂν παρέλθῃ
  english_pob_choice: until ... pass away
  chosen_spanish: hasta que pasen
  alternatives_spanish:
  - hasta que desaparezcan
  - hasta que lleguen a su fin
  lexicon: BDAG
  rationale: Con cielo y tierra como sujetos, «pasen» conserva la imagen de παρέρχομαι en un español idiomático. Evita sobreespecificar el matiz de desaparición o terminación.
- source_word: ὁ οὐρανὸς καὶ ἡ γῆ
  english_pob_choice: heaven and earth
  chosen_spanish: el cielo y la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el firmamento y la tierra
  lexicon: BDAG
  rationale: En español bíblico actual, «cielo y tierra» comunica el alcance cósmico de la expresión y evita una calca innecesaria del plural inglés/latín.
- source_word: ἰῶτα ἓν
  english_pob_choice: one iota
  chosen_spanish: ni una iota
  alternatives_spanish:
  - ni una jota
  - ni la más pequeña letra
  lexicon: BDAG
  rationale: ἰῶτα alude a la letra mínima. «Iota» conserva la especificidad léxica mejor que una paráfrasis; en español es comprensible y mantiene la imagen textual.
- source_word: μία κεραία
  english_pob_choice: one stroke
  chosen_spanish: ni una sola trazo
  alternatives_spanish:
  - ni una sola rayita
  - ni un solo trazo
  lexicon: BDAG
  rationale: 'κεραία designa un pequeño trazo o marca de escritura. En español, «trazo» transmite el sentido sin recurrir a «tí­tle» o a un arcaísmo; el adjetivo «sola» refuerza la negación enfática. Nota: se ajusta a la concordancia idiomática esperable como «ni un solo trazo».'
- source_word: οὐ μὴ παρέλθῃ
  english_pob_choice: will ever pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - de ningún modo pasará
  - nunca pasará
  lexicon: BDAG
  rationale: La construcción οὐ μὴ con subjuntivo expresa negación enfática. En español, la negación ya queda intensificada por «ni una iota ni una sola trazo»; el futuro simple conserva la fuerza sin recargar el estilo.
- source_word: ἀπὸ τοῦ νόμου
  english_pob_choice: from the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - de la Ley
  - de la instrucción
  lexicon: BDAG
  rationale: «Ley» reproduce el término jurídico-escritural de νόμος. Se evita «la Ley» con mayúscula como decisión interpretativa no exigida por el griego; el contexto de Mateo 5:17–19 sugiere la Ley de Dios/Torá, pero el texto español mantiene la generalidad controlada del original.
- source_word: ἕως ἂν πάντα γένηται
  english_pob_choice: until all things happen
  chosen_spanish: hasta que todo suceda
  alternatives_spanish:
  - hasta que todo se cumpla
  - hasta que todo llegue a cumplirse
  - hasta que todo acontezca
  lexicon: BDAG
  rationale: γίνομαι aquí expresa llegar a suceder o llegar a realizarse. «Todo suceda» conserva amplitud semántica y deja abierta la tensión entre acontecimiento y cumplimiento que el inglés POB preserva.
theological_decisions:
- issue: Alcance de «la ley» (νόμος)
  english_pob_reading: the law refers to God's scriptural law, not merely legal principle in general
  chosen_spanish_reading: «la ley» refiere a la ley escritural de Dios, sin estrecharla más allá de lo que el contexto inmediato exige
  alternative_spanish_readings:
  - la Ley como la Torá/Pentateuco
  - la Escritura en sentido amplio
  rationale: En Mateo 5:17–19 Jesús habla de la Ley y los Profetas dentro de un marco de autoridad escritural. El español mantiene «la ley» para no añadir una glosa interpretativa en el cuerpo del texto, pero el sentido teológico se anota en la decisión.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Fuerza de «hasta que todo suceda» (πάντα γένηται)
  english_pob_reading: until all things happen
  chosen_spanish_reading: una formulación amplia que puede leerse como cumplimiento o acontecimiento pleno
  alternative_spanish_readings:
  - hasta que todo se cumpla
  - hasta que todo llegue a realizarse
  - hasta que todo acontezca
  rationale: El griego admite tanto la idea de ocurrencia como la de cumplimiento. Se conserva esa amplitud para no resolver prematuramente una tensión interpretativa real, y se ofrece una alternativa verbal en el aparato de notas.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Concordé el sujeto plural en «pasen», ajusté la negación para evitar una forma no idiomática en español, y conservé la tensión entre acontecimiento y cumplimiento en «todo suceda», en línea con la revisión de alta concordancia y sin cambios sustantivos respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se prefirió «en verdad» para ἀμήν, coherente con un registro bíblico moderno.
  - «Ley» se mantuvo en minúscula por fidelidad al griego y para evitar sobreglossar el referente.
  - Se preservó la fuerza enfática de οὐ μὴ mediante la construcción negativa del verso y el contexto.
  - Los marcadores de nota [a]-[d] corresponden exactamente a las opciones y alternativas preservadas en el texto.
