  to: Porque en verdad les digo[a], hasta que pasen el cielo y la tierra, ni una iota[b] ni un solo trazo[c] pasará de la ley, hasta que todo suceda[d].
  rationale: Se corrige el error gramatical principal («una sola trazo» → «un solo trazo») para reflejar fiel y naturalmente μία κεραία en español. Además, se ajusta la nota correspondiente para evitar la alternativa «tilde», que puede inducir una imagen demasiado específica en español moderno. No se requieren cambios doctrinales ni exegéticos adicionales.
