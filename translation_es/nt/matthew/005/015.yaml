translation:
  language: es
  text: Ni encienden una lámpara y la ponen debajo de una canasta[a], sino sobre el candelero[b], y alumbra a todos los que están en la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de un recipiente de medida»; tradicionalmente, «debajo de un almud». El griego μόδιος se refiere a una medida seca y, por extensión, al recipiente para medirla.
    reason: lexical_alternative
  - marker: b
    text: O «brilla para todos los que están en la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Nor do
  chosen_spanish: Ni
  alternatives_spanish:
  - Tampoco
  - Ni tampoco
  lexicon: BDAG
  rationale: La partícula introduce un nuevo ejemplo negativo enlazado con el dicho anterior; en español, «Ni» conserva bien esa continuidad adversativa/negativa sin recargar la frase.
- source_word: καίουσιν
  english_pob_choice: light
  chosen_spanish: encienden
  alternatives_spanish:
  - prenden
  - arman
  lexicon: BDAG
  rationale: Con λύχνον, el sentido es encender una lámpara; «encienden» es la equivalencia natural y conserva el acto intencional.
- source_word: λύχνον
  english_pob_choice: a lamp
  chosen_spanish: una lámpara
  alternatives_spanish:
  - una luz
  lexicon: BDAG
  rationale: λύχνος designa una lámpara concreta, no la luz en abstracto. «Lámpara» mantiene la imagen precisa.
- source_word: τιθέασιν
  english_pob_choice: put
  chosen_spanish: la ponen
  alternatives_spanish:
  - la colocan
  - la sitúan
  lexicon: BDAG
  rationale: El verbo es sencillo y directo; «la ponen» comunica con naturalidad la acción de colocarla en un lugar.
- source_word: ὑπὸ τὸν μόδιον
  english_pob_choice: under a basket
  chosen_spanish: debajo de un cajón[a]
  alternatives_spanish:
  - debajo de un recipiente de medida[a]
  - debajo de un almud[a]
  - debajo de un bushel[a]
  lexicon: BDAG
  rationale: μόδιος es una medida seca y, por extensión, el recipiente usado para medirla. «Cajón» es una solución funcional y comprensible en español para el contenedor, pero la nota conserva la alternativa más literal («recipiente de medida») y la equivalencia tradicional («almud»).
- source_word: ἀλλ’ ἐπὶ τὴν λυχνίαν
  english_pob_choice: but on a lampstand
  chosen_spanish: sino sobre el candelero[b]
  alternatives_spanish:
  - sino sobre el soporte de la lámpara[b]
  - sino sobre la lámpara
  lexicon: BDAG
  rationale: λυχνία es el soporte destinado a la lámpara; «candelero» es la palabra bíblica usual en español y comunica bien la función del objeto.
- source_word: λάμπει
  english_pob_choice: it gives light
  chosen_spanish: alumbra
  alternatives_spanish:
  - brilla
  - da luz
  lexicon: BDAG
  rationale: Aunque el verbo puede significar «brillar», aquí la función es iluminar a los demás; «alumbra» expresa bien el resultado en español.
- source_word: πᾶσιν τοῖς ἐν τῇ οἰκίᾳ
  english_pob_choice: to everyone in the house
  chosen_spanish: a todos los que están en la casa
  alternatives_spanish:
  - a todos en la casa
  - a toda la gente de la casa
  lexicon: BDAG
  rationale: La expresión apunta a todas las personas dentro del espacio de la casa; esta redacción preserva el valor distributivo de πᾶσιν y el sentido locativo de ἐν τῇ οἰκίᾳ.
theological_decisions:
- issue: Riesgo de domesticar el objeto de μόδιος con un término demasiado culturalmente específico o demasiado moderno
  english_pob_reading: under a basket
  chosen_spanish_reading: debajo de un cajón
  alternative_spanish_readings:
  - debajo de un recipiente de medida
  - debajo de un almud
  - debajo de un bushel
  rationale: El griego no nombra un recipiente doméstico genérico sino el contenedor asociado a una medida seca. La redacción principal privilegia legibilidad, mientras la nota preserva la tensión léxica y la alternativa más literal.
  doctrine_reference: Principios POB de primacía del original y equivalencia óptima
- issue: Objeto de la luz en paralelo con su función pública
  english_pob_reading: and it gives light to everyone in the house
  chosen_spanish_reading: y alumbra a todos los que están en la casa
  alternative_spanish_readings:
  - y brilla para todos los que están en la casa
  - y da luz a todos los que están en la casa
  rationale: El texto destaca el efecto benéfico de la lámpara sobre los presentes; «alumbra» conserva ese énfasis funcional sin borrar la posibilidad semántica de «brilla», preservada en la nota.
  doctrine_reference: Principios POB de equivalencia óptima y claridad moderna
translation_notes:
  revision_awareness: Se mantuvo el acuerdo alto del audit trail inglés con la misma estructura proverbial y sin cambios textuales sustantivos; las decisiones en español buscan reflejar el original griego y conservar la alternativa semántica señalada para μόδιος y λάμπει.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «candelero» para λυχνία por ser el término bíblico más transparente en español, sin introducir lenguaje eclesiástico ajeno al contexto.
  - Se mantuvo la imagen concreta de la lámpara y su soporte, evitando abstraer el dicho hacia una formulación puramente metafórica.
