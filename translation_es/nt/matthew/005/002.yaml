  source_alignment_summary: 'El borrador conserva bien el sentido básico del griego: la conjunción inicial, el modismo «abrir la boca», el pronombre no especificado «them/les» y el participio «diciendo». Sin embargo, en español «abriendo su boca» suena más calcado y menos natural que «abrió su boca», y además el rastro auditado en inglés terminó prefiriendo una forma finita natural. También conviene evitar anclar la nota al final de «diciendo», porque la alternativa afecta a toda la cláusula inicial.'
