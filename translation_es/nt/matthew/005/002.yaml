  - severity: low
    issue: La nota está anclada al final de «diciendo» en vez de al segmento que realmente comenta
    rationale: La nota alternativa trata la formulación completa de la apertura, no específicamente «diciendo». El marcador debe colocarse donde corresponde para claridad editorial.
