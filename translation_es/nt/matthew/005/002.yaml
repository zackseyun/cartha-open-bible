lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: La conjunción simple se conserva como enlace narrativo directo. 'Y' reproduce bien el valor coordinante sin añadir un matiz temporal más fuerte que el del griego.
- source_word: ἀνοίξας
  english_pob_choice: opening / having opened
  chosen_spanish: abriendo
  alternatives_spanish:
  - habiendo abierto
  - abrió
  lexicon: BDAG
  rationale: El participio aoristo se vierte con una construcción participial natural en español. 'Abriendo su boca' conserva el giro solemne y semítico sin reducirlo a un simple 'empezó a hablar'.
- source_word: τὸ στόμα αὐτοῦ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - la boca de él
  - su boca
  lexicon: BDAG
  rationale: Se mantiene el modismo de forma transparente. 'Su boca' es la opción idiomática y fiel; evita eliminar la imagen formal de introducción al discurso.
- source_word: ἐδίδασκεν
  english_pob_choice: he taught
  chosen_spanish: les enseñaba
  alternatives_spanish:
  - les enseñó
  - estaba enseñándoles
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o desarrollo. 'Les enseñaba' preserva mejor ese aspecto que un pasado puntual, aunque sigue siendo natural en español narrativo.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a la gente
  lexicon: BDAG
  rationale: El referente se mantiene abierto como en el griego. El dativo pronominal español 'les' conserva la referencia sin precisar indebidamente quiénes eran.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: BDAG
  rationale: El participio presente se traduce con una forma participial equivalente. 'Diciendo' mantiene la dependencia sintáctica con el verbo anterior y el tono formular.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] exactamente en el texto español donde corresponde, para que la nota quede anclada al segmento que ofrece la alternativa formal del participio griego.
  spanish_consistency_notes:
  - Se prefirió 'les enseñaba' para reflejar el imperfecto de ἐδίδασκεν.
  - Se mantuvo 'abriendo su boca' para conservar el giro semítico y la solemnidad narrativa.
  - No se introdujo 'Cristo', 'Señor' ni otras sustituciones teológicas no presentes en el verso.
