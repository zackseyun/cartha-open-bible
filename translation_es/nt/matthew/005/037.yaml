translation:
  language: es
  text: 'Pero sea su palabra[a]: ‘Sí, sí’, o ‘No, no’; cualquier cosa más allá de esto viene del maligno[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘lo que dicen’. El griego λόγος aquí se refiere a la palabra o declaración de una persona en su habla cotidiana.
    reason: lexical_alternative
  - marker: b
    text: O, ‘del mal’. El griego τοῦ πονηροῦ puede entenderse ya sea personalmente (‘el maligno’) o impersonalmente (‘mal’).
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστω
  english_pob_choice: let ... be
  chosen_spanish: sea
  alternatives_spanish:
  - debe ser
  - que sea
  lexicon: BDAG
  rationale: El imperativo tercera persona de εἰμί se expresa con naturalidad en español mediante 'sea', que conserva el tono exhortativo y proverbial sin endurecerlo con una perífrasis más pesada.
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: hablar
  alternatives_spanish:
  - palabra
  - palabras
  - discurso
  lexicon: BDAG
  rationale: En este contexto, λόγος apunta al modo de hablar de los discípulos. 'Hablar' comunica mejor la referencia a la conducta verbal continua que una sola 'palabra', y mantiene la brevedad proverbial del dicho.
- source_word: ναὶ ναί, οὒ οὔ
  english_pob_choice: Yes, yes / No, no
  chosen_spanish: ‘Sí, sí’ o ‘No, no’
  alternatives_spanish:
  - ‘Sí y sí’ o ‘No y no’
  - ‘Sí’ o ‘No’
  lexicon: BDAG
  rationale: Se conserva la duplicación para reflejar el énfasis y el ritmo del griego. En español, 'o' aclara la alternativa. Las comillas mantienen el carácter de fórmula citada.
- source_word: περισσὸν
  english_pob_choice: Anything beyond
  chosen_spanish: Lo que es más
  alternatives_spanish:
  - Todo lo demás
  - Cualquier cosa más
  lexicon: BDAG
  rationale: El sustantivo adjetival indica lo que excede la simple afirmación o negación requerida. 'Lo que es más' es idiomático en español y conserva la idea de excedente sin añadir contenido.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: procede de
  alternatives_spanish:
  - viene de
  - es de
  lexicon: BDAG
  rationale: La preposición marca origen. 'Procede de' expresa fuente con mayor naturalidad que un mero 'de' y mantiene la relación de procedencia.
- source_word: τοῦ πονηροῦ
  english_pob_choice: the evil one
  chosen_spanish: del maligno
  alternatives_spanish:
  - del mal
  - del malo
  - del Maligno
  lexicon: BDAG
  rationale: '''El maligno'' es la forma española tradicional para la referencia personal a Satanás y preserva la lectura preferida en el POB inglés. Se eligió la forma sustantivada ''del maligno'' para evitar una perífrasis más explícita que no está en el texto.'
theological_decisions:
- issue: 'Ambigüedad de τοῦ πονηροῦ: personal (''el maligno'') o impersonal (''mal/evil'')'
  english_pob_reading: the evil one
  chosen_spanish_reading: el maligno
  alternative_spanish_readings:
  - el mal
  - de mal
  rationale: Se mantiene la lectura personal probable en Mateo, donde ὁ πονηρός suele referirse a Satanás. La traducción conserva la tensión documentada y no la resuelve en sentido impersonal, aunque esa posibilidad queda abierta por la nota.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado sin cambios en la última pasada; se ha mantenido la misma decisión interpretativa básica y se han ajustado las opciones a un español natural y publicable, conservando la ambigüedad de τοῦ πονηροῦ mediante nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se conserva 'maligno' como término personal preferido para τοῦ πονηροῦ, en línea con la terminología POB en contextos mateanos.
  - La fórmula de cita en estilo directo se mantiene breve y rítmica para reflejar el paralelismo del griego.
