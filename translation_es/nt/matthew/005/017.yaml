translation:
  language: es
  text: No piensen que vine para abolir la Ley o los Profetas; no vine para abolir, sino para cumplir[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «Cumplir» también puede entenderse como «llevar a cumplimiento» o «dar plena expresión» a lo que estaba previsto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ νομίσητε
  english_pob_choice: Do not think
  chosen_spanish: No piensen
  alternatives_spanish:
  - No supongan
  - No imaginen
  lexicon: BDAG
  rationale: La forma con μή y aoristo subjuntivo funciona como prohibición. En español, «No piensen» expresa bien la advertencia directa sin sonar forzado y mantiene el valor idiomático de la exhortación.
- source_word: ἦλθον
  english_pob_choice: I came
  chosen_spanish: he venido
  alternatives_spanish:
  - vine
  - he llegado
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «I came», en español la fórmula «he venido» suena más natural en una declaración con relevancia presente y mantiene el paralelismo interno del dicho de Jesús. No se intenta suavizar el aoristo, sino traducirlo con una forma verbal idiomática en español.
- source_word: καταλῦσαι
  english_pob_choice: to abolish
  chosen_spanish: abolir
  alternatives_spanish:
  - anular
  - derribar
  - destruir
  lexicon: BDAG
  rationale: Aquí el sentido no es destruir físicamente, sino dejar sin vigor o poner fuera de efecto. «Abolir» preserva esa fuerza legal-pactual en un español claro y cercano al valor elegido por la POB inglesa.
- source_word: τὸν νόμον
  english_pob_choice: the Law
  chosen_spanish: la Ley
  alternatives_spanish:
  - la ley
  lexicon: BDAG
  rationale: Se conserva la mayúscula conceptual para indicar la Torá o la Ley mosaica como corpus escritural, no «ley» en sentido genérico. Esto sigue la decisión auditada del inglés POB y evita perder la referencia canónica.
- source_word: τοὺς προφήτας
  english_pob_choice: the Prophets
  chosen_spanish: los Profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: La mayúscula conceptual refleja la expresión canónica «la Ley o los Profetas», es decir, una designación de las Escrituras de Israel, no solo de profetas individuales.
- source_word: πληρῶσαι
  english_pob_choice: to fulfill
  chosen_spanish: cumplir
  alternatives_spanish:
  - llevar a cumplimiento
  - cumplir plenamente
  - dar pleno cumplimiento
  lexicon: BDAG
  rationale: «Cumplir» conserva el peso teológico e intertextual de πληρόω sin cerrar la tensión interpretativa. En español puede abarcar «llevar a cumplimiento» o «dar pleno cumplimiento», pero la forma breve es más natural y fiel en el cuerpo del texto.
theological_decisions:
- issue: Relación de Jesús con «la Ley o los Profetas» en πληρῶσαι
  english_pob_reading: retain 'fulfill' without narrowing it to a single theological explanation
  chosen_spanish_reading: mantener «cumplir» sin fijar una sola explicación teológica
  alternative_spanish_readings:
  - llevar a plenitud
  - dar pleno cumplimiento
  - confirmar/establecer
  rationale: El versículo admite varias lecturas doctrinales legítimas. Como la POB inglesa preserva la amplitud de 'fulfill', la traducción española debe hacer lo mismo y no resolver la tensión en el texto principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el pasaje fuente; el control de revisión más reciente indicó que no eran necesarios cambios, y la concordancia de auditoría fue alta.
  spanish_consistency_notes:
  - Se conservó la distinción canónica «la Ley / los Profetas» con mayúscula conceptual, coherente con el uso auditado en inglés.
  - Se evitó traducir «πληρῶσαι» con un término que cierre la discusión teológica; «cumplir» mantiene la amplitud semántica.
  - La forma verbal española «he venido» se usa por naturalidad y no pretende borrar el valor aspectual del aoristo griego.
  - La puntuación separa con punto y coma las dos cláusulas, reproduciendo la estructura antitética del griego.
