revisions:
- from: No piensen que he venido[a] para abolir la Ley o los Profetas; no he venido[a] para abolir, sino para cumplir[b].
  to: No piensen que vine para abolir la Ley o los Profetas; no vine para abolir, sino para cumplir[b].
  rationale: Se cambia «he venido» por «vine» para reflejar mejor ἦλθον y la decisión auditada de la POB inglesa. Se elimina la nota a porque, en español revisado, ya no hace falta una nota de alternativa verbal; la nota previa estaba mal formulada. Se conserva «cumplir» en el texto principal para no resolver la tensión teológica de πληρῶσαι, pero se mantiene una nota léxica que preserve el campo semántico documentado ('bring to completion' / 'bring to full expression').
