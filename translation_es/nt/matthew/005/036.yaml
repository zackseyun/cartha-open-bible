translation:
  language: es
  text: Ni jures por tu cabeza[a], porque no puedes hacer un solo cabello blanco o negro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no puedes hacer ni un solo cabello blanco o negro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτε
  english_pob_choice: Nor
  chosen_spanish: Ni
  alternatives_spanish:
  - Y no
  - Tampoco
  - Ni siquiera
  lexicon: BDAG
  rationale: La partícula continúa la serie negativa del contexto inmediato; en español, «Ni» reproduce bien la coordinación prohibitiva sin añadir ruido explicativo.
- source_word: ἐν τῇ κεφαλῇ σου
  english_pob_choice: by your head
  chosen_spanish: por tu cabeza
  alternatives_spanish:
  - sobre tu cabeza
  - con tu cabeza
  lexicon: BDAG
  rationale: La construcción idiomática de juramento se vierte con naturalidad como «jurar por»; «tu cabeza» conserva el objeto invocado en el juramento sin forzar un calco.
- source_word: ὀμόσῃς
  english_pob_choice: shall you swear
  chosen_spanish: jures
  alternatives_spanish:
  - hagas un juramento
  - juraras
  lexicon: BDAG
  rationale: El aoristo subjuntivo prohibitivo se expresa de forma directa y natural en español con «jures», manteniendo el tono de mandato negativo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la razón de la prohibición; «porque» es claro, actual y conserva la fuerza causal del griego.
- source_word: οὐ δύνασαι
  english_pob_choice: you are not able to
  chosen_spanish: no puedes
  alternatives_spanish:
  - no eres capaz de
  - no tienes poder para
  lexicon: BDAG
  rationale: «No puedes» mantiene la incapacidad expresada por δύνασαι y resulta más natural en español que una perífrasis más larga.
- source_word: μίαν τρίχα
  english_pob_choice: one hair
  chosen_spanish: ni un solo cabello
  alternatives_spanish:
  - un cabello
  - una sola hebra de cabello
  lexicon: BDAG
  rationale: El singular enfático se conserva con «ni un solo cabello», que comunica bien la mínima unidad y mantiene el énfasis del original.
- source_word: λευκὴν ... ἢ μέλαιναν
  english_pob_choice: white or black
  chosen_spanish: blanco o negro
  alternatives_spanish:
  - blanco o negro
  - blanca o negra
  lexicon: BDAG
  rationale: En español, al referirse a «cabello», el color puede concordar en masculino («blanco o negro») o en femenino con «cabello» implícito; aquí se eligió la forma más fluida y estándar con el sustantivo elíptico.
- source_word: ποιῆσαι
  english_pob_choice: make
  chosen_spanish: hacer
  alternatives_spanish:
  - volver
  - volverse
  - cambiar
  lexicon: BDAG
  rationale: «Hacer» refleja con sobriedad el verbo causativo ποιέω, sin intensificar ni debilitar la idea de cambiar el color del cabello.
theological_decisions:
- issue: Alcance de la prohibición de jurar
  english_pob_reading: Render the saying as a direct prohibition against swearing by one's head, without expanding it into an absolute doctrinal statement about all lawful oaths.
  chosen_spanish_reading: Presentar la frase como una prohibición directa de jurar por la propia cabeza, sin convertirla en una tesis doctrinal global sobre todo juramento.
  alternative_spanish_readings:
  - Prohibición absoluta de cualquier juramento
  - Condena solo de fórmulas de juramento engañosas o evasivas
  rationale: El versículo se limita a la forma concreta del juramento y a su fundamento en la incapacidad humana; la traducción debe preservar esa delimitación y dejar abierta la tensión interpretativa mayor.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La lectura coincide plenamente con el paquete fuente y con la revisión más reciente: no hubo cambios aplicados y el cotejo externo reportó alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «jurar por» para reflejar la construcción idiomática del juramento.
  - Se conservó el énfasis cuantitativo con «ni un solo cabello», equivalente funcional de «one hair» / «a single hair».
  - Se eligió «blanco o negro» por ser la oposición básica del texto y la forma más natural en español.
  - La nota alternativa evita perder la posibilidad de una lectura más literal de μίαν τρίχα.
