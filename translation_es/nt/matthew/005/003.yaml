translation:
  language: es
  text: Bienaventurados[a] los pobres en espíritu[b], porque el reino de los cielos[c] es de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bienaventurados» conserva el matiz de favor divino y estado envidiable; «felices» o «dichosos» serían alternativas posibles, pero menos precisas para este contexto.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «espiritualmente pobres» o «los que reconocen su necesidad espiritual»; el texto mantiene la expresión griega sin cerrarla.
    reason: alternative_reading
  - marker: c
    text: Mateo usa la expresión característica «reino de los cielos». En español se conserva el plural del griego («cielos») en lugar de nivelarlo a «cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  - Afortunados
  lexicon: BDAG
  rationale: En las bienaventuranzas, μακάριος expresa un estado de favor divino y condición envidiable. «Bienaventurados» conserva el tono bíblico y solemne en español sin reducirlo a mera emoción subjetiva.
- source_word: οἱ πτωχοὶ
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los pobres de espíritu
  - los mendigos
  lexicon: BDAG
  rationale: El griego usa un adjetivo sustantivado con artículo. «Los pobres» mantiene esa forma y su amplitud semántica; «mendigos» sería demasiado estrecho y «los necesitados» ya interpreta más de lo que el texto dice.
- source_word: τῷ πνεύματι
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - espiritualmente
  - en el espíritu
  - con respecto al espíritu
  lexicon: BDAG
  rationale: La construcción dativa se vierte de modo idiomático como «en espíritu», conservando la expresión compacta y abierta del griego. «Espiritualmente» explicita demasiado; «en el espíritu» podría sugerir el Espíritu Santo, cosa que el texto no afirma.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la razón de la bienaventuranza. «Porque» es la equivalencia más clara y natural en español moderno.
- source_word: αὐτῶν
  english_pob_choice: theirs
  chosen_spanish: de ellos
  alternatives_spanish:
  - les pertenece
  - es de ellos
  lexicon: BDAG
  rationale: El genitivo con ἐστιν expresa pertenencia o posesión. «De ellos» en español mantiene esa relación de manera natural y directa.
- source_word: ἡ βασιλεία
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reinado
  - la soberanía
  lexicon: BDAG
  rationale: «Reino» es el equivalente más establecido y comprensible en español para βασιλεία en este contexto mateano. Aunque el término puede incluir la idea de gobierno o realeza, «reino» preserva el campo semántico sin forzar una paráfrasis.
- source_word: τῶν οὐρανῶν
  english_pob_choice: of heaven
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos celestiales
  lexicon: BDAG
  rationale: 'Mateo usa su fórmula característica en plural. A diferencia del inglés auditado, el español puede conservar más directamente el plural: «de los cielos». Esto refleja mejor la forma griega sin perder inteligibilidad.'
theological_decisions:
- issue: Sentido de «pobres en espíritu»
  english_pob_reading: Retain the literal phrase 'poor in spirit' without interpretive expansion.
  chosen_spanish_reading: Mantener «pobres en espíritu» sin ampliarlo a «espiritualmente pobres» ni «humildes» en el texto principal.
  alternative_spanish_readings:
  - espiritualmente pobres
  - los que reconocen su necesidad espiritual
  - los humildes
  rationale: La expresión es teológicamente rica y algo abierta. El texto griego no aclara si se trata de humildad, necesidad espiritual o una cualidad más amplia; por eso conviene preservar la tensión en la formulación principal y dejar las explicaciones para una nota.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
- issue: Presente de posesión del reino
  english_pob_reading: 'Render ἐστιν as present: ''is theirs.'''
  chosen_spanish_reading: «Es de ellos» en presente, no futuro.
  alternative_spanish_readings:
  - será de ellos
  - les pertenecerá
  rationale: El griego usa presente; la bienaventuranza afirma posesión actual, no sólo recompensa futura. El español debe conservar ese valor aspectual y no desplazarlo al futuro.
  doctrine_reference: Greek verbal force / present possession in beatitude.
translation_notes:
  revision_awareness: Coincide con el último pase de revisión sin cambios sustantivos; la formulación mantiene la equivalencia óptima del original y conserva la tensión interpretativa documentada en la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «espíritu» en minúscula porque no hay referencia explícita al Espíritu Santo.
  - «Reino» se conserva como término bíblico estándar para βασιλεία, sin sustituirlo por «reinado» en el texto principal.
  - Se priorizó el plural «de los cielos» por fidelidad al griego y al patrón mateano, aunque la tradición española a veces nivela la expresión al singular.
