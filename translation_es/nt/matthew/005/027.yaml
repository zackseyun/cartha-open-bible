lexical_decisions:
- source_word: Ἠκούσατε
  english_pob_choice: You have heard
  chosen_spanish: Ustedes han oído
  alternatives_spanish:
  - Han oído
  - Ustedes oyeron
  lexicon: BDAG
  rationale: El aoristo en esta fórmula introductoria funciona de manera idiomática como una referencia a lo que los oyentes ya han recibido; el presente perfecto en español conserva mejor esa fuerza discursiva que un simple pretérito.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido de lo oído; ‘que’ es la equivalencia natural y directa en español.
- source_word: ἐρρέθη
  english_pob_choice: it was said
  chosen_spanish: fue dicho
  alternatives_spanish:
  - se dijo
  lexicon: BDAG
  rationale: El aoristo pasivo impersonal de λέγω se puede rendir con una construcción impersonal en pasiva. ‘Fue dicho’ conserva la forma y la referencia tradicional al enunciado recibido, aunque ‘se dijo’ sería más idiomático.
- source_word: Οὐ
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No se
  lexicon: BDAG
  rationale: La partícula negativa introduce la prohibición que sigue; en español se expresa naturalmente con ‘No’ al inicio del mandamiento.
- source_word: μοιχεύσεις
  english_pob_choice: You shall not commit adultery
  chosen_spanish: No cometerás adulterio
  alternatives_spanish:
  - No adulterarás
  - No cometerás adulterio contra tu cónyuge
  lexicon: BDAG
  rationale: El futuro griego tiene valor prohibitivo y alude al lenguaje del Decálogo. ‘No cometerás adulterio’ conserva tanto el mandato formal como el sentido preciso de μοιχεύω; ‘adulterarás’ resulta menos natural en español bíblico.
theological_decisions:
- issue: Forma de mandato y eco del Decálogo
  english_pob_reading: 'Render the prohibition in traditional command form: ''You shall not commit adultery.'''
  chosen_spanish_reading: ‘No cometerás adulterio.’
  alternative_spanish_readings:
  - ‘No cometas adulterio.’
  - ‘No adulterarás.’
  rationale: Jesús cita una prohibición con forma legal/mandamental. En español, el futuro negativo reproduce con claridad ese tono normativo y mantiene el eco de la formulación decálogal sin suavizarla a una mera exhortación.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego SBLGNT y con la línea auditada de la POB inglesa; no se observan revisiones aplicadas en el expediente reciente.
  spanish_consistency_notes:
  - Se preserva el tratamiento plural de segunda persona con ‘Ustedes’ por coherencia y claridad en español latinoamericano.
  - Se evita ‘SEÑOR’ porque aquí no aparece el nombre divino ni una cita del tetragrama; el versículo depende de la fórmula impersonal de dicción.
  - La puntuación con dos puntos antes de la cita reproduce la función introductoria de ὅτι ἐρρέθη.
  - Se mantiene el registro bíblico formal sin recurrir a arcaísmos innecesarios.
