translation:
  language: es
  text: 'Pero se dijo[a]: «Cualquiera que divorcie a su esposa, dele un certificado de divorcio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despida a su esposa ... una carta de divorcio». El verbo griego puede significar «despedir» o «enviar lejos», pero aquí, en un contexto legal matrimonial, se refiere al divorcio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐρρέθη
  english_pob_choice: it was said
  chosen_spanish: se dijo
  alternatives_spanish:
  - fue dicho
  - se declaró
  lexicon: BDAG
  rationale: La pasiva aorista de λέγω en esta fórmula introductoria mattaenaica se expresa de manera natural en español con «se dijo», conservando el tono de cita o formulación tradicional sin sobrecargarlo.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca transición y contraste con la unidad anterior; «Pero» reproduce mejor ese giro discursivo en el contexto de las antítesis.
- source_word: Ὃς ἂν
  english_pob_choice: Whoever
  chosen_spanish: Cualquiera que
  alternatives_spanish:
  - Quienquiera que
  - Todo el que
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν pide una generalización abierta; «Cualquiera que» comunica bien ese valor en español contemporáneo.
- source_word: ἀπολύσῃ
  english_pob_choice: divorces
  chosen_spanish: se divorcie
  alternatives_spanish:
  - repudie
  - despida
  lexicon: BDAG
  rationale: Aunque ἀπολύω puede significar «despedir» o «dejar ir», el contexto jurídico-matrimonial con ἀποστάσιον exige explicitar el sentido legal de divorcio. El reflexivo español mantiene la naturalidad del acto jurídico.
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: de su esposa
  alternatives_spanish:
  - de su mujer
  lexicon: BDAG
  rationale: γυνή puede ser «mujer» o «esposa», pero aquí el contexto de divorcio determina «esposa». «De su esposa» conserva el posesivo y la relación marital de forma clara y reverente.
- source_word: δότω
  english_pob_choice: let him give
  chosen_spanish: déle
  alternatives_spanish:
  - que le dé
  - debe darle
  lexicon: BDAG
  rationale: El imperativo aoristo de tercera persona se puede verter con una forma exhortativa imperativa en español. «Déle» conserva la fuerza mandativa y el registro formulístico de la cita legal.
- source_word: αὐτῇ
  english_pob_choice: her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - a la mujer
  lexicon: BDAG
  rationale: El dativo indirecto se integra naturalmente en español con el clítico dativo «le» tras «dar». Aunque la referencia es femenina, el pronombre átono corresponde al valor sintáctico del griego.
- source_word: ἀποστάσιον
  english_pob_choice: a certificate of divorce
  chosen_spanish: un certificado de divorcio
  alternatives_spanish:
  - un documento de divorcio
  - una carta de divorcio
  - un acta de divorcio
  lexicon: BDAG
  rationale: El sustantivo designa un documento escrito de divorcio. «Certificado de divorcio» transmite bien la fuerza documental y legal en español moderno.
theological_decisions:
- issue: La relación entre la formulación citada y la enseñanza de Jesús en el contexto inmediato
  english_pob_reading: Render the statement as a citation of a legal saying without importing approval or disapproval into this verse itself.
  chosen_spanish_reading: Presentar la frase como una cita normativa tradicional sin añadir una valoración sobre si aprueba o desaprueba el divorcio en este versículo.
  alternative_spanish_readings:
  - Hacerla sonar como una aprobación explícita del divorcio
  - Hacerla sonar solo como una observación descriptiva de costumbre
  rationale: El versículo abre una formulación citada que será tratada en el versículo siguiente. La traducción debe preservar ese marco legal-citacional y mantener la tensión doctrinal abierta, sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Coincide con el pasaje base y con la revisión más reciente sin cambios sustantivos; se mantuvo la lectura legal del verbo ἀπολύσῃ y la formulación documental de ἀποστάσιον, siguiendo el auditor inglés.
  spanish_consistency_notes:
  - Se prefirió «esposa» para γυναῖκα por el contexto matrimonial específico.
  - Se conservó «certificado de divorcio» para reflejar el carácter documental/legal de ἀποστάσιον.
  - Se usó «se dijo» para mantener el registro de cita introductoria sin volverla paráfrasis.
  - Se empleó el clítico dativo «le» para αὐτῇ por naturalidad sintáctica en español.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el nombre divino.
