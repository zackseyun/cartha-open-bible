    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el español natural del borrador, pero lo ajusta más estrechamente al griego y al rastro auditado del POB inglés: «don» refleja mejor δῶρον como término básico, mientras «altar» ya comunica el contexto cultual; «ofrece» corresponde mejor a πρόσφερε. También se corrige la relación entre el marcador [a] y su nota.'
