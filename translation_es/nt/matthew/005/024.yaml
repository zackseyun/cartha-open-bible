translation:
  language: es
  text: deja allí tu don[a] delante del altar, y ve; primero reconcíliate con tu hermano[b], y entonces ven y ofrece tu don.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda».
    reason: lexical_alternative
  - marker: b
    text: «Hermano» traduce el término masculino singular griego; en este contexto el principio de reconciliación puede aplicarse más ampliamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφες
  english_pob_choice: leave
  chosen_spanish: deja
  alternatives_spanish:
  - deja ahí
  - abandona
  lexicon: BDAG
  rationale: El imperativo aoristo de ἀφίημι aquí pide dejar algo en su lugar. «Deja» es natural en español y conserva la acción concreta sin introducir matices de perdón o permiso.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: 'Mantiene el énfasis espacial: la ofrenda queda en el sitio donde está.'
- source_word: δῶρόν
  english_pob_choice: gift
  chosen_spanish: ofrenda
  alternatives_spanish:
  - don
  - regalo
  lexicon: BDAG
  rationale: Aunque el término básico es «regalo/don», en el contexto del altar la idea es una ofrenda cultual. «Ofrenda» comunica mejor ese contexto en español sin perder la referencia a un don presentado a Dios.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - frente a
  lexicon: BDAG
  rationale: «Delante de» expresa con claridad la relación espacial con el altar en un español natural y reverente.
- source_word: θυσιαστηρίου
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar de sacrificio
  lexicon: BDAG
  rationale: Es el equivalente estándar y claro para θυσιαστήριον en contexto sacrificial.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: BDAG
  rationale: El imperativo de movimiento se expresa de forma breve y natural con «ve», en secuencia con el mandato siguiente.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: BDAG
  rationale: Preserva la prioridad que Jesús da a la reconciliación antes de completar la ofrenda.
- source_word: διαλλάγηθι
  english_pob_choice: be reconciled
  chosen_spanish: reconcíliate
  alternatives_spanish:
  - haz las paces
  - restáurate
  lexicon: BDAG
  rationale: El imperativo pasivo apunta a entrar en un estado de reconciliación. «Reconcíliate» conserva la fuerza relacional y ética sin parafrasear de más.
- source_word: τῷ ἀδελφῷ σου
  english_pob_choice: to your brother
  chosen_spanish: con tu hermano
  alternatives_spanish:
  - a tu hermano
  - con tu prójimo
  lexicon: BDAG
  rationale: El dativo puede expresarse en español como «con». Esta opción suena natural para reconciliación interpersonal y mantiene la lectura masculina singular del griego.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: y entonces
  alternatives_spanish:
  - entonces
  - después
  lexicon: BDAG
  rationale: Marca la secuencia temporal posterior a la reconciliación. Se conserva el orden lógico del mandato.
- source_word: ἐλθὼν
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - acércate
  - regresa
  lexicon: BDAG
  rationale: El participio subordinado se vierte naturalmente en español como un verbo finito en la secuencia imperativa.
- source_word: πρόσφερε
  english_pob_choice: offer
  chosen_spanish: presenta
  alternatives_spanish:
  - ofrece
  - lleva
  lexicon: BDAG
  rationale: «Presenta» comunica bien el acto cultual de llevar y ofrecer una ofrenda; evita repetir «ofrenda» con un verbo demasiado genérico.
theological_decisions:
- issue: Cómo renderizar ἀδελφός en una exhortación ética interpersonal
  english_pob_reading: brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu hermano o hermana
  - tu semejante
  - tu hermano en la fe
  rationale: Se conserva el masculino singular del griego, como hace el POB inglés, para respetar la forma fuente y su valor representativo. El principio puede abarcar más ampliamente, pero el texto griego no lo expande explícitamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tensión entre δῶρον como 'regalo' y el contexto sacrificial del altar
  english_pob_reading: gift
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - don
  - regalo
  rationale: En español, «ofrenda» comunica de manera más precisa el sentido cultual que ya está garantizado por «altar». No se borra la idea de don; se explicita su función ritual por el contexto inmediato.
  doctrine_reference: DOCTRINE.md §Source-based lexical equivalence
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto griego SBLGNT y la decisión POB inglesa de conservar la secuencia imperativa: dejar la ofrenda, ir, reconciliarse y luego volver a ofrecer. No introduce cambios respecto del último pase revisado y mantiene la equivalencia óptima con claridad idiomática en español.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece en este versículo.
  - Se mantiene «ofrenda» para reflejar el marco sacrificial del altar, aunque el sustantivo griego básico sea más amplio.
  - Se preserva el masculino singular de «hermano» por fidelidad al griego y al audit trail inglés.
  - La puntuación reproduce la progresión de mandatos y la pausa fuerte tras «ve» para distinguir las acciones consecutivas.
