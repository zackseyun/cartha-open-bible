- from: deja allí tu ofrenda[a] delante del altar, y ve; primero reconcíliate con tu hermano[b], y entonces ven y presenta tu ofrenda.
  to: deja allí tu don[a] delante del altar, y ve; primero reconcíliate con tu hermano[b], y entonces ven y ofrece tu don.
  rationale: 'La revisión mantiene el español natural del borrador, pero lo ajusta más estrechamente al griego y al rastro auditado del POB inglés: «don» refleja mejor δῶρον como término básico, mientras «altar» ya comunica el contexto cultual; «ofrece» corresponde mejor a πρόσφερε. También se corrige la relación entre el marcador [a] y su nota.'
  reviewer_model: gpt-5.4
