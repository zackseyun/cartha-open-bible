  to: Y quien te obligue a ir una milla[a][b], ve con él dos millas[c].
  rationale: La única reparación necesaria es hacer explícito «millas» en la segunda cláusula para un español más natural y alineado con la revisión ya aplicada en el POB inglés. La nota b conserva la información sobre la elipsis griega, y la nota c preserva la redacción más literal previa sin sobrecargar el texto principal.
