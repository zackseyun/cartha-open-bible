translation:
  language: es
  text: Y quien te obligue a ir una milla[a][b], ve con él dos millas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te compela a ir». El verbo puede aludir a ser obligado a prestar servicio por autoridad oficial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «una milla ... dos», con «millas» entendido en la segunda frase.
    reason: lexical_alternative
  - marker: c
    text: 'Redacción más literal: «ve con él dos [millas]».'
    reason: previous_rendering
lexical_decisions:
- source_word: ὅστις
  english_pob_choice: whoever
  chosen_spanish: quien
  alternatives_spanish:
  - cualquiera que
  - quienquiera que
  lexicon: BDAG
  rationale: ὅστις introduce un caso general e indefinido. «Quien» comunica bien esa fuerza en español natural y mantiene el valor representativo sin volverlo excesivamente analítico.
- source_word: ἀγγαρεύσει
  english_pob_choice: forces you to go
  chosen_spanish: te obligue a ir
  alternatives_spanish:
  - te compela a ir
  - te fuerce a ir
  - te requiera servicio
  lexicon: BDAG
  rationale: El verbo alude a imponer servicio por autoridad. «Obligue a ir» preserva la coerción y el componente de movimiento del contexto, con español claro y digno. «Te obligue» evita introducir un matiz más técnico que el texto no explicita.
- source_word: μίλιον ἕν
  english_pob_choice: one mile
  chosen_spanish: una milla
  alternatives_spanish:
  - un milla
  - una distancia de una milla
  lexicon: BDAG
  rationale: μίλιον designa una milla romana. «Una milla» es la equivalencia directa y conserva la medida concreta sin explicación añadida en el texto principal.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - ve adelante
  - camina
  lexicon: BDAG
  rationale: El imperativo expresa ir/proseguir. «Ve» es la forma más natural y directa en español para este mandato.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - acompañándolo
  lexicon: BDAG
  rationale: μετά con genitivo indica acompañamiento. «Con él» es la correspondencia más directa y sobria.
- source_word: δύο
  english_pob_choice: two miles / go with him two
  chosen_spanish: dos
  alternatives_spanish:
  - dos millas
  lexicon: BDAG
  rationale: El griego elide el sustantivo en la segunda frase. Mantener «dos» conserva esa elipsis y refleja la estructura del original; en español queda claro por el contexto de «una milla» anterior.
theological_decisions:
- issue: Referencia histórica a servicio forzado bajo autoridad
  english_pob_reading: Render the saying as a response to coercive demand without specifying Roman soldiers in the main text.
  chosen_spanish_reading: Presentar la frase como respuesta a una exigencia coercitiva, sin añadir en el texto principal soldados romanos ni otra identificación histórica no explícita.
  alternative_spanish_readings:
  - Explicitar «soldados romanos» en el texto principal
  - Traducir de forma genérica como «si alguien te pide que camines una milla»
  rationale: El verbo y la medida evocan servicio impuesto por autoridad, pero el griego no nombra al agente histórico. La redacción española conserva la presión coercitiva sin importar un referente más específico que el texto no menciona.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; no añadir al texto lo que la fuente no dice.'
translation_notes:
  revision_awareness: 'El texto griego usa una construcción elíptica en la segunda mitad: «dos», con «milla(s)» entendido por el contexto. La versión inglesa POB decidió explicitarlo como «two miles» por naturalidad, pero también documentó la alternativa literal. En español se optó por mantener la elipsis («dos») para reflejar de cerca la forma del griego y porque el antecedente «una milla» hace inteligible la frase.'
  spanish_consistency_notes:
  - Se usa «milla» para μίλιον, manteniendo la unidad romana de distancia.
  - Se usa «ve» para el imperativo ὕπαγε, no «anda» o «camina», por ser más directo.
  - Se mantiene «él» para αὐτοῦ, sin introducir una identificación histórica no explícita.
  - Se preserva la elipsis de δύο con nota, para no perder la tensión entre literalidad y claridad.
