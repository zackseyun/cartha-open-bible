translation:
  language: es
  text: Dichosos los que tienen hambre y sed de rectitud[a], porque ellos serán saciados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El término griego puede denotar rectitud, justicia o lo que es correcto delante de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Dichosos
  alternatives_spanish:
  - Bienaventurados
  - Felices
  lexicon: BDAG
  rationale: μακάριοι es el término de bienaventuranza. En español, «Dichosos» conserva el tono declarativo y laudatorio sin sonar tan eclesiástico como «Bienaventurados» ni tan psicológico como «Felices».
- source_word: οἱ πεινῶντες καὶ διψῶντες
  english_pob_choice: those who hunger and thirst
  chosen_spanish: los que tienen hambre y sed
  alternatives_spanish:
  - los que hambrean y sed tienen
  - los hambrientos y sedientos
  lexicon: BDAG
  rationale: Los participios presentes expresan una condición continua. «Los que tienen hambre y sed» mantiene el sentido verbal y suena natural en español; las formas nominales son más estáticas.
- source_word: τὴν δικαιοσύνην
  english_pob_choice: for righteousness
  chosen_spanish: de justicia
  alternatives_spanish:
  - de rectitud
  - de justicia y rectitud
  lexicon: BDAG
  rationale: El griego usa el acusativo con el verbo de desear/comerber; en español la construcción natural es «hambre y sed de». Se mantiene «justicia» como traducción principal de δικαιοσύνη, conforme al criterio del POB, y se evita una paráfrasis más interpretativa en el texto principal.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la causa de la bienaventuranza; «porque» expresa con claridad la relación explicativa.
- source_word: χορτασθήσονται
  english_pob_choice: will be filled
  chosen_spanish: serán saciados
  alternatives_spanish:
  - serán llenados
  - quedarán satisfechos
  lexicon: BDAG
  rationale: El futuro pasivo de χορτάζω evoca ser alimentado hasta la plenitud. «Serán saciados» preserva esa imagen con fuerza y es idiomático en español bíblico sin caer en una formulación menos precisa como «llenados».
theological_decisions:
- issue: Traducción de δικαιοσύνη
  english_pob_reading: righteousness, with footnoted alternative justice
  chosen_spanish_reading: justicia, con la alternativa «rectitud» preservada en nota
  alternative_spanish_readings:
  - rectitud
  - justicia social
  - lo justo delante de Dios
  rationale: 'El texto griego admite un campo semántico amplio: justicia, rectitud o lo que es correcto ante Dios. El POB inglés eligió «righteousness» en el texto principal y dejó «justice» en nota. En español, «justicia» es la mejor equivalencia principal y conserva el mismo campo teológico; se anota «rectitud» como alternativa lexical válida para no estrechar indebidamente el sentido.'
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative justice preserved in footnotes'
translation_notes:
  revision_awareness: 'Coincide con la última revisión del contexto inglés: no se documentan cambios aplicados en el pass más reciente, y el criterio principal sigue siendo mantener la bienaventuranza en forma declarativa, la imagen de hambre/sed continuas y el pasivo futuro de χορτάζω como saciedad.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
  - «Dichosos» funciona como equivalente estable de μακάριοι en las bienaventuranzas.
  - «Serán saciados» conserva la imagen de plenitud alimentaria mejor que una simple idea de «satisfacción».
  - La nota sobre δικαιοσύνη preserva la tensión semántica sin reemplazar la lectura principal del texto.
