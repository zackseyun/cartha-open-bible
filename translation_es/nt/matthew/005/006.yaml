  spanish_quality_summary: El español es claro, natural y digno. 'Dichosos' y 'serán saciados' son legibles y apropiados. No obstante, para alinearse con la racionalidad léxica documentada, conviene usar 'rectitud' en el texto principal y dejar 'justicia' como alternativa en nota. Esto mantiene la amplitud teológica sin desplazar el énfasis principal del audit trail.
