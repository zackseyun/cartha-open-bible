translation:
  language: es
  text: 'Han oído que se dijo[a]: «Amarás a tu prójimo y odiarás a tu enemigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La primera cláusula alude a Levítico 19:18; la segunda ('y odiarás a tu enemigo') no es una cita directa del Antiguo Testamento, sino parte de una enseñanza recibida que Jesús corrige.
    reason: cross_reference
lexical_decisions:
- source_word: Ἠκούσατε
  english_pob_choice: You have heard
  chosen_spanish: Han oído
  alternatives_spanish:
  - Oyeron
  - Ustedes han oído
  lexicon: BDAG
  rationale: El aoristo en esta fórmula introductoria se expresa de manera natural en español con perfecto compuesto para marcar la recepción previa de una enseñanza, manteniendo el tono discursivo de la serie de Jesús.
- source_word: ἐρρέθη
  english_pob_choice: it was said
  chosen_spanish: se dijo
  alternatives_spanish:
  - fue dicho
  - se habló
  lexicon: BDAG
  rationale: El pasivo impersonal de λέγω se vierte con la pasiva refleja española más natural, sin precisar un sujeto agente que el griego tampoco expresa.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Debes amar
  - Amarás tú
  lexicon: BDAG
  rationale: El futuro griego con valor injuntivo se reproduce con futuro simple español, que conserva el tono normativo de la cita.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - el que está cerca de ti
  lexicon: BDAG
  rationale: En este contexto ético y con la alusión a Levítico 19:18, 'prójimo' comunica mejor la categoría relacional que 'vecino', y evita reducir el sentido a proximidad física.
- source_word: μισήσεις
  english_pob_choice: hate
  chosen_spanish: odiarás
  alternatives_spanish:
  - aborrecerás
  - odiarás tú
  lexicon: BDAG
  rationale: Para mantener el paralelismo con 'amarás' y el contraste fuerte del dicho recibido, 'odiarás' es la equivalencia directa y clara en español.
- source_word: τὸν ἐχθρόν σου
  english_pob_choice: your enemy
  chosen_spanish: tu enemigo
  alternatives_spanish:
  - el que te es hostil
  - tu adversario
  lexicon: BDAG
  rationale: ἐχθρός corresponde de forma directa a 'enemigo'; es la forma más transparente y precisa en español para el contraste ético del versículo.
theological_decisions:
- issue: La segunda cláusula ('y odiarás a tu enemigo') no es una cita directa del Antiguo Testamento, aunque forma parte del dicho recibido
  english_pob_reading: Render as part of the saying Jesus attributes to what his hearers had heard, without implying it is a direct Old Testament quotation.
  chosen_spanish_reading: Presentarla como parte de lo que habían oído decir, sin insinuar que sea una cita bíblica directa.
  alternative_spanish_readings:
  - Marcar toda la línea como cita explícita de la Escritura
  - Separar la segunda cláusula como mera glosa interpretativa en el texto principal
  rationale: El griego introduce una sola afirmación reportada con 'Han oído que se dijo'. La traducción conserva esa forma y deja la tensión histórica intacta, sin resolverla en el texto principal.
  doctrine_reference: Preservar la tensión textual e histórica; primacía del original sobre la armonización traductora.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios sustanciales respecto del criterio auditado en el inglés POB; la versión española conserva la misma distinción entre la cita de fondo y la enseñanza recibida.'
  spanish_consistency_notes:
  - Se mantiene el patrón verbal injuntivo con futuro simple ('amarás', 'odiarás') para reflejar el valor exhortativo del griego.
  - Se eligió 'prójimo' por coherencia con el aludido Levítico 19:18 y por ser el término español más estable para este contexto.
  - La nota al pie marca la diferencia entre alusión textual y cita directa, como en el audit trail inglés.
