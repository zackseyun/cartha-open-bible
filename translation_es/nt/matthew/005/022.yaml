review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del griego y del audit trail inglés: mantiene el contraste enfático, conserva “hermano”, translitera “Raca” y “Gehenna”, y refleja la escalada judicial. Sin embargo, hay dos desajustes importantes: falta la nota cultural sobre “Raca” preservada en el POB inglés, y “ante la Gehenna de fuego” no corresponde bien a εἰς τὴν γέενναν τοῦ πυρός, que pide dirección/exposición a ese destino más que comparecencia ‘ante’ él.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor precisión forense y naturalidad. “Será culpable ante…” funciona, aunque “quedará expuesto al…” / “será reo de…” sería más cercano al matiz de ἔνοχος. Aun sin rehacer toda la línea, sí conviene corregir “ante la Gehenna” a “a la Gehenna”. También debe ordenarse la colocación de notas para que la nota de “Raca” se ancle en el texto y no se pierda información documentada.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: γέεννα -> “Gehenna”, ἀδελφός -> “hermano”, μωρέ -> “Necio”. No hay términos del glosario mayor en conflicto. La principal corrección es sintáctico-semántica en la preposición con Gehenna y la preservación de la nota cultural de “Raca”.'
  issues:
  - severity: high
    issue: La frase “ante la Gehenna de fuego” traduce de forma inadecuada εἰς τὴν γέενναν τοῦ πυρός.
    rationale: El griego usa εἰς, con sentido de dirección/resultado (“a”, “hacia”, “para”), no una comparecencia judicial “ante”. Mantener “ante” aquí rompe la progresión del original y suena semánticamente impropio en español.
  - severity: medium
    issue: Falta la nota cultural sobre “Raca” que el POB inglés preserva.
    rationale: El audit trail documenta la decisión de transliterar Ῥακά y explicarlo en nota. El borrador español translitera bien, pero omite la explicación, perdiendo información semántica importante para el lector.
  - severity: low
    issue: La nota de inclusividad sobre “hermano” presente en el POB inglés no se preserva.
    rationale: No es imprescindible para la fidelidad mínima del texto principal, pero sí forma parte del razonamiento lexical documentado. Sería deseable conservarla en español cuando se revisen notas editoriales de forma más amplia.
