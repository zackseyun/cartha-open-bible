translation:
  language: es
  text: 'Pero yo les digo que todo el que se enoja con su hermano[a] será culpable ante el juicio; y cualquiera que diga a su hermano: “Raca”[b], será culpable ante el consejo[c]; y cualquiera que diga: “Necio”, será culpable a la Gehenna[d] de fuego.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos añaden “sin causa” después de “se enoja con su hermano”. La lectura más antigua y mejor atestiguada omite esa frase.
    reason: textual_variant
  - marker: b
    text: “Raca” es un término arameo de desprecio, aproximadamente “cabeza hueca” o “bueno para nada”.
    reason: cultural_note
  - marker: c
    text: O “el Sanedrín”, el consejo gobernante judío.
    reason: alternative_reading
  - marker: d
    text: O “infierno de fuego”; “Gehenna” conserva el término específico usado por Jesús, tomado de la imagen del valle de Hinom asociada con el juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  english_pob_choice: But I say to you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Pero yo mismo les digo
  - Pero les digo
  lexicon: BDAG
  rationale: Conserva el contraste enfático de ἐγώ + δέ y el valor directo de λέγω con una formulación natural en español. El pronombre explícito “yo” preserva el énfasis sin volver la frase pesada.
- source_word: πᾶς ὁ ὀργιζόμενος
  english_pob_choice: everyone who is angry
  chosen_spanish: todo el que se enoja
  alternatives_spanish:
  - quienquiera que se enoje
  - todo el que está enojado
  lexicon: BDAG
  rationale: El participio presente sustantivado expresa una categoría general; “todo el que se enoja” comunica bien el valor gnómico y evita sobrecargar con una distinción aspectual artificial.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  english_pob_choice: with his brother
  chosen_spanish: con su hermano
  alternatives_spanish:
  - contra su hermano
  - a su hermano
  - con su hermano o hermana
  lexicon: BDAG
  rationale: En español, con verbos de enojo, el complemento relacional más natural es “con”. “Hermano” conserva el masculino singular del griego; la ampliación inclusiva se deja fuera del texto principal, como en el audit trail inglés.
- source_word: ἔνοχος ἔσται
  english_pob_choice: will be liable
  chosen_spanish: será culpable
  alternatives_spanish:
  - será responsable
  - será merecedor de
  lexicon: BDAG
  rationale: “Culpable” comunica con claridad la exposición a juicio y conserva el peso forense. Aunque “liable” es el matiz inglés principal, en español “será culpable” suena más natural y sigue el campo judicial del pasaje.
- source_word: τῇ κρίσει
  english_pob_choice: to the judgment
  chosen_spanish: ante el juicio
  alternatives_spanish:
  - al juicio
  - ante el tribunal
  - a juicio
  lexicon: BDAG
  rationale: La frase apunta a una instancia judicial; “ante el juicio” mantiene ese sentido formal y suena bien en español. No se especifica “tribunal” para no estrechar indebidamente el término.
- source_word: Ῥακά
  english_pob_choice: Raca
  chosen_spanish: Raca
  alternatives_spanish:
  - vacío
  - cabeza hueca
  - inútil
  lexicon: BDAG
  rationale: Se translitera el insulto arameo para conservar la textura del original, tal como hace el POB en inglés, y se explica en nota en vez de reemplazarlo por un equivalente interpretativo en el cuerpo del texto.
- source_word: τῷ συνεδρίῳ
  english_pob_choice: to the council
  chosen_spanish: ante el consejo
  alternatives_spanish:
  - ante el Sanedrín
  - al consejo
  lexicon: BDAG
  rationale: “Consejo” traduce συνέδριον de manera directa y legible. “Ante” mantiene el paralelismo judicial con “ante el juicio” y comunica comparecencia o rendición de cuentas; la opción “Sanedrín” queda como alternativa doctrinalmente válida en nota.
- source_word: Μωρέ
  english_pob_choice: Fool
  chosen_spanish: Necio
  alternatives_spanish:
  - ¡fool!
  - ¡insensato!
  - necio
  lexicon: BDAG
  rationale: “Necio” es un equivalente digno y fuerte para el vocativo insultante μωρέ, mejor que términos demasiado coloquiales. Mantiene el registro bíblico sin caer en arcaísmo excesivo.
- source_word: εἰς τὴν γέενναν τοῦ πυρός
  english_pob_choice: to the Gehenna of fire
  chosen_spanish: ante la Gehenna de fuego
  alternatives_spanish:
  - a la Gehenna de fuego
  - al infierno de fuego
  - a la Gehena de fuego
  lexicon: BDAG
  rationale: “Gehenna” conserva el término técnico y su trasfondo judío, como en el POB inglés. “De fuego” reproduce el genitivo y la imaginería del texto; “ante” mantiene el lenguaje de comparecencia/pena en continuidad con el versículo.
theological_decisions:
- issue: Rendering of γέεννα
  english_pob_reading: Gehenna
  chosen_spanish_reading: Gehenna
  alternative_spanish_readings:
  - infierno
  - Gehena
  rationale: Se conserva el término histórico y teológico específico, evitando colapsarlo en “infierno”, que en español arrastra asociaciones más amplias y posteriores. Así se mantiene el trasfondo judío del dicho de Jesús y su advertencia de juicio.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gendered term ἀδελφός
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - hermano o hermana
  - prójimo
  - fellow believer
  rationale: El griego usa un masculino singular, y el texto principal lo conserva. La fuerza representativa del dicho se entiende sin expandirlo en la línea principal; cualquier alcance más amplio puede quedar sugerido por la lectura del conjunto o por nota.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y el trazado de decisiones del POB inglés. Se conserva la progresión judicial del versículo, el insulto arameo transliterado y el término técnico Gehenna, sin incorporar la variante textual “sin causa” al texto principal.
  spanish_consistency_notes:
  - Se usó “hermano” en singular para reflejar el masculino singular del griego y la política de precisión de género del proyecto.
  - Se prefirió “ante el juicio / ante el consejo / ante la Gehenna” para mantener un paralelismo natural en español y el carácter forense de las tres cláusulas.
  - “Raca” y “Gehenna” se dejaron sin traducir en el cuerpo principal por ser términos culturalmente cargados y técnicamente específicos.
  - No se empleó “SEÑOR” ni términos eclesiales tradicionales ajenos al pasaje; el verso no contiene YHWH, Cristo/Mesías ni Espíritu.
