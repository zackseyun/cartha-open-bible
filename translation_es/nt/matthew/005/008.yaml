revisions:
- from: Bienaventurados los limpios de corazón[a], porque ellos verán a Dios[b].
  to: Bienaventurados los puros de corazón[a], porque ellos verán a Dios[b].
  rationale: Se cambia «limpios» por «puros» para seguir la decisión léxica principal del griego καθαροὶ y del audit trail inglés, además de mejorar la naturalidad y legibilidad en español bíblico contemporáneo. Se conserva «limpios de corazón» como alternativa válida en nota. El resto del verso puede mantenerse tal como está.
