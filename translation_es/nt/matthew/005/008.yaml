translation:
  language: es
  text: Bienaventurados los puros de corazón[a], porque ellos verán a Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpios de corazón».
    reason: lexical_alternative
  - marker: b
    text: La promesa de «ver a Dios» puede aludir al acceso directo a la presencia de Dios, incluida su consumación futura; la traducción conserva la formulación sin estrecharla.
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: En las bienaventuranzas, «bienaventurados» preserva el sentido de estado favorecido por Dios y mantiene el registro bíblico sin reducirlo a emoción pasajera.
- source_word: οἱ καθαροὶ
  english_pob_choice: pure
  chosen_spanish: los limpios
  alternatives_spanish:
  - los puros
  - los limpios de
  lexicon: BDAG
  rationale: La opción española «limpios» sigue la alternativa lexical documentada en el audit trail («clean») y conserva la posibilidad de un matiz de pureza interior, sin imponer un término más abstracto que podría sonar menos natural en español.
- source_word: τῇ καρδίᾳ
  english_pob_choice: in heart
  chosen_spanish: de corazón
  alternatives_spanish:
  - en corazón
  - en el corazón
  lexicon: BDAG
  rationale: El dativo griego expresa el ámbito o la esfera interna; en español, «de corazón» comunica de manera natural que la pureza caracteriza el interior de la persona, sin convertirlo solo en emoción.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la bienaventuranza. «Porque» es la equivalencia más clara y directa en español moderno.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre es enfático en griego; en español, «ellos» mantiene la referencia sin sobrecargar el verso. El énfasis queda implícito en la estructura de la promesa.
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: El objeto directo personal en español requiere la «a» personal. Se conserva la referencia directa a Dios sin expansión interpretativa.
- source_word: ὄψονται
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - verán a
  lexicon: BDAG
  rationale: El futuro de ὁράω se rinde con «verán», una forma natural y fiel. «Contemplarán» sería más interpretativo y menos directo.
theological_decisions:
- issue: Sentido de «ver a Dios»
  english_pob_reading: Retained as 'will see God' without interpretive expansion.
  chosen_spanish_reading: «verán a Dios» se mantiene sin ampliación interpretativa.
  alternative_spanish_readings:
  - verán la presencia de Dios
  - contemplarán a Dios en la consumación futura
  rationale: El griego es conciso y permite una profundidad teológica que no debe resolverse en la traducción. Mantener la formulación directa preserva la tensión entre acceso a la presencia de Dios y posible cumplimiento escatológico.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés del POB se mantiene sin cambios en la última revisión; el presente borrador español sigue esa lectura estable y conserva las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se mantuvo el registro bienaventuranzas con «Bienaventurados».
  - Se evitó «SEÑOR» para θεός porque el texto griego aquí dice explícitamente «Dios».
  - Se preservó la tensión teológica de «ver a Dios» sin paráfrasis devocional.
  - La puntuación y el orden siguen la cadencia natural del español bíblico contemporáneo.
