review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: bienaventuranza, pureza interior, razón introducida por «porque» y promesa futura de «ver a Dios». Sin embargo, la elección principal «los limpios de corazón» no sigue la decisión léxica principal del POB en inglés («pure») y en español suena menos natural y más susceptible de leerse como limpieza externa o idiomáticamente extraña en una bienaventuranza.'
  spanish_quality_summary: '«Bienaventurados ... porque ellos verán a Dios» es claro y legible, aunque «ellos» es opcional en español. El problema principal de calidad es «los limpios de corazón», que resulta menos idiomático que «los puros de corazón». La nota actual además invierte la prioridad léxica del POB: presenta «puros» como alternativa cuando debería ser la forma principal.'
  glossary_alignment: 'Alineación general correcta con los términos del proyecto: θεός -> «Dios»; no hay conflicto con Yahvé/Mesías/etc. La decisión para καθαροὶ debería ajustarse a la preferencia documentada por «pure/puro» como sentido moral e interior, manteniendo «limpios» solo como alternativa léxica en nota.'
  issues:
  - severity: medium
    issue: La traducción principal de καθαροὶ como «limpios» no preserva la decisión léxica principal del audit trail («pure»).
    rationale: El POB en inglés escogió «pure» por su fuerza moral e interior, dejando «clean» como alternativa. En español, «puros de corazón» expresa mejor ese sentido y además es la formulación más natural y reconocible.
  - severity: medium
    issue: La nota léxica [a] está invertida respecto de la prioridad textual.
    rationale: Si el texto principal dice «puros de corazón», la nota puede conservar «limpios de corazón» como alternativa. Tal como está, el borrador hace principal la alternativa y secundaria la elección preferida.
  - severity: low
    issue: El pronombre «ellos» es aceptable pero algo pesado en español.
    rationale: Puede conservarse para reflejar el énfasis de αὐτοὶ, pero no es estrictamente necesario. No requiere adjudicación especial.
  revised_spanish_text: Bienaventurados los puros de corazón[a], porque ellos verán a Dios[b].
  revised_footnotes:
  - marker: a
    text: O «limpios de corazón».
    reason: lexical_alternative
  - marker: b
    text: La promesa de «ver a Dios» puede aludir al acceso directo a la presencia de Dios, incluida su consumación futura; la traducción conserva la formulación sin estrecharla.
    reason: alternative_reading
  revision_rationale: Se cambia «limpios» por «puros» para seguir la decisión léxica principal del griego καθαροὶ y del audit trail inglés, además de mejorar la naturalidad y legibilidad en español bíblico contemporáneo. Se conserva «limpios de corazón» como alternativa válida en nota. El resto del verso puede mantenerse tal como está.
