revisions:
- from: Pero si tu ojo derecho te hace tropezar[a], sácalo y arrójalo lejos de ti[b]. Porque te conviene que perezca uno de tus miembros, y no que todo tu cuerpo sea arrojado a la Gehenna.
  to: Pero si tu ojo derecho te hace tropezar[a], arráncalo y arrójalo lejos de ti[b]. Porque te conviene que perezca uno de tus miembros, y no que todo tu cuerpo sea arrojado a Gehenna.
  rationale: Se ajusta ἔξελε de «sácalo» a «arráncalo» para reflejar la fuerza imperativa y la imaginería violenta explicitadas en la auditoría del POB inglés. Se elimina el artículo en «Gehenna» para mejorar la naturalidad del español sin perder precisión terminológica. Se mantiene el resto del versículo porque preserva fielmente el sentido del griego y la estrategia lexical del proyecto.
  reviewer_model: gpt-5.4
