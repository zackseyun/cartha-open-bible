review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés en casi todos los puntos: conserva «Pero», retiene «ojo derecho», mantiene la metáfora de σκανδαλίζει con «te hace tropezar» y preserva γέεννα como término distinto mediante «Gehenna». También reproduce adecuadamente la lógica comparativa entre perder un miembro y que el cuerpo entero sea arrojado a Gehenna. Sin embargo, hay un desajuste importante con la fuerza léxica documentada para ἔξελε: el griego y el POB inglés enfatizan una acción violenta («tear it out»), mientras que «sácalo» la debilita demasiado.'
  spanish_quality_summary: El español es claro y natural, con buen registro eclesial moderno. No obstante, «sácalo» suena demasiado suave para el contexto gráfico de autoprivación extrema. Además, «la Gehenna» resulta menos natural y menos asentado en español bíblico que «Gehenna» sin artículo en esta construcción. El resto fluye bien y las notas son útiles.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: se evita «infierno» en el texto principal y se conserva la metáfora de σκανδαλίζω. La nota alternativa para «te hace pecar» está bien. La principal excepción es ἔξελε, donde conviene usar «arráncalo» para reflejar mejor la decisión léxica auditada. También conviene ajustar «la Gehenna» a «Gehenna» por naturalidad y por mejor correspondencia con el uso transliterado.'
  issues:
  - severity: medium
    issue: «sácalo» debilita la fuerza de ἔξελε
    rationale: La auditoría inglesa documenta que ἔξελε es un imperativo enérgico y eligió «tear it out». En español, «arráncalo» refleja mejor la violencia retórica del original que «sácalo».
  - severity: low
    issue: «la Gehenna» suena menos natural que «Gehenna»
    rationale: 'Aunque no es incorrecto, el préstamo transliterado funciona mejor sin artículo aquí: «sea arrojado a Gehenna». Esto preserva el término técnico sin una formulación algo forzada en español.'
  - severity: low
    issue: La razón de la nota [a] podría alinearse mejor con el POB inglés
    rationale: La nota actual usa reason «alternative_reading», pero en la auditoría inglesa la alternativa para σκανδαλίζει se conserva como alternativa léxica. No afecta el texto, pero conviene uniformidad documental.
