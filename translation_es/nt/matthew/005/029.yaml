  text: εἰ δὲ ὁ ὀφθαλμός σου ὁ δεξιὸς σκανδαλίζει σε, ἔξελε αὐτὸν καὶ βάλε ἀπὸ σοῦ, συμφέρει γάρ σοι ἵνα ἀπόληται ἓν τῶν μελῶν σου καὶ μὴ ὅλον τὸ σῶμά σου βληθῇ εἰς γέενναν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/029.yaml
  text: But if your right eye causes you to stumble[a], tear it out and throw it away from you[b]. For it is better for you that one of your members should perish than that your whole body should be thrown into Gehenna.
  footnotes:
  - marker: a
    text: 'Or: ''causes you to sin.'''
    reason: lexical_alternative
  - marker: b
    text: Gehenna is the Greek form of a name associated with the Valley of Hinnom; traditionally rendered 'hell.'
    reason: alternative_reading
