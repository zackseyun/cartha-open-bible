translation:
  language: es
  text: Pero si tu ojo derecho te hace tropezar[a], arráncalo y arrójalo lejos de ti[b]. Porque te conviene que perezca uno de tus miembros, y no que todo tu cuerpo sea arrojado a Gehenna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te hace pecar».'
    reason: lexical_alternative
  - marker: b
    text: Gehenna es la forma griega de un nombre asociado con el Valle de Hinnom; tradicionalmente se traduce «infierno».
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: δὲ introduce una continuación con contraste leve; «Pero» reproduce bien ese matiz adversativo en español natural.
- source_word: σκανδαλίζει
  english_pob_choice: causes you to stumble
  chosen_spanish: te hace tropezar
  alternatives_spanish:
  - te hace pecar
  - te causa tropiezo
  - te escandaliza
  lexicon: BDAG
  rationale: Se conserva la imagen de tropiezo del verbo σκανδαλίζω sin reducirla de entrada a una explicación interpretativa como «pecar». «Te hace tropezar» es claro y mantiene la metáfora.
- source_word: ἔξελε
  english_pob_choice: tear it out
  chosen_spanish: sácalo
  alternatives_spanish:
  - arráncalo
  - quítatelo
  - extírpalo
  lexicon: BDAG
  rationale: El imperativo aoristo es enérgico. En español, «sácalo» mantiene la urgencia y es más idiomático que una opción excesivamente gráfica o arcaizante; el contexto de mutilación ya está dado por la secuencia verbal.
- source_word: βάλε ἀπὸ σοῦ
  english_pob_choice: throw it away from you
  chosen_spanish: arrójalo lejos de ti
  alternatives_spanish:
  - tíralo lejos de ti
  - échalo de ti
  - arrójalo de ti
  lexicon: BDAG
  rationale: βάλε exige un verbo fuerte de lanzamiento; ἀπὸ σοῦ añade separación. «Arrójalo lejos de ti» conserva ambas ideas con naturalidad en español.
- source_word: συμφέρει
  english_pob_choice: it is better for you
  chosen_spanish: te conviene
  alternatives_spanish:
  - es mejor para ti
  - te es más provechoso
  lexicon: BDAG
  rationale: συμφέρει expresa conveniencia/ventaja. «Te conviene» es idiomático y conserva la lógica comparativa sin volverla comercial o pesada.
- source_word: ἀπόληται
  english_pob_choice: should perish
  chosen_spanish: perezca
  alternatives_spanish:
  - muera
  - se pierda
  - sea destruido
  lexicon: BDAG
  rationale: El verbo mantiene gravedad sin especificar una tesis más fuerte de aniquilación. «Perezca» preserva ese alcance y funciona bien con el contraste corporal.
- source_word: μέλους
  english_pob_choice: member
  chosen_spanish: miembros
  alternatives_spanish:
  - parte
  - miembro
  - órgano
  lexicon: BDAG
  rationale: «Miembros» reproduce el lenguaje corporal de μέλος y armoniza con «todo tu cuerpo»; en español, el plural en la frase «uno de tus miembros» es natural aunque el griego use singular distributivo.
- source_word: βληθῇ
  english_pob_choice: should be thrown
  chosen_spanish: sea arrojado
  alternatives_spanish:
  - sea echado
  - sea lanzado
  - sea tirado
  lexicon: BDAG
  rationale: La pasiva de βάλλω se expresa de manera viva con «sea arrojado», que mantiene la fuerza de la imagen.
- source_word: γέενναν
  english_pob_choice: Gehenna
  chosen_spanish: la Gehenna
  alternatives_spanish:
  - el infierno
  - el Gehena
  lexicon: BDAG
  rationale: Se preserva el término técnico «Gehenna» en lugar de sustituirlo por «infierno», siguiendo la primacía del término original y evitando aplanar su trasfondo histórico y teológico.
- source_word: ὁ δεξιός
  english_pob_choice: right
  chosen_spanish: derecho
  alternatives_spanish:
  - diestro
  - de la derecha
  lexicon: BDAG
  rationale: «Derecho» es el equivalente directo y natural para ὁ δεξιός en este contexto.
- source_word: σῶμά
  english_pob_choice: whole body
  chosen_spanish: todo tu cuerpo
  alternatives_spanish:
  - todo tu cuerpo entero
  - todo tu organismo
  lexicon: BDAG
  rationale: «Cuerpo» es la equivalencia normal de σῶμα; «todo tu cuerpo» reproduce el contraste con «uno de tus miembros» sin exceder el alcance del original.
theological_decisions:
- issue: Rendering of γέεννα as a distinct term rather than theological generalization
  english_pob_reading: Gehenna rather than hell
  chosen_spanish_reading: la Gehenna
  alternative_spanish_readings:
  - el infierno
  rationale: Se conserva el término propio del texto griego para no mezclarlo automáticamente con categorías posteriores o más generales. Una nota permite al lector identificar el referente histórico de la palabra.
  doctrine_reference: Translation philosophy §1, §6
- issue: Metaphorical warning of σκανδαλίζω
  english_pob_reading: causes you to stumble
  chosen_spanish_reading: te hace tropezar
  alternative_spanish_readings:
  - te hace pecar
  rationale: La formulación principal mantiene la metáfora del tropiezo. La alternativa interpretativa queda implícitamente disponible, pero el texto no la impone como si fuera la única lectura.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pasaje auditado del inglés POB, sin cambios de sentido respecto del texto fuente griego. Se preserva la tensión metafórica de σκανδαλίζει y el término técnico γέεννα, con nota explicativa para la lectura tradicional.
  spanish_consistency_notes:
  - Se mantuvo «Gehenna» como término técnico, consistente con la política POB de no sustituir automáticamente el griego por «infierno».
  - «Te hace tropezar» conserva la metáfora de escándalo/tropiezo sin cerrar el sentido a una sola paráfrasis.
  - «Todo tu cuerpo» y «uno de tus miembros» reproducen el contraste corporal del griego con fluidez natural en español.
