translation:
  language: es
  text: Da al que te pide, y no te apartes[a] del que quiere pedir prestado de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te niegues al que quiere pedir prestado de ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτοῦντί
  english_pob_choice: the one who asks
  chosen_spanish: al que te pide
  alternatives_spanish:
  - al que te solicita
  - al que pide
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente para una persona caracterizada por pedir. «Te pide» conserva el sentido relacional directo del texto y suena natural en español sin perder el valor genérico.
- source_word: δός
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Da tú
  - Debes dar
  lexicon: BDAG
  rationale: El imperativo aoristo expresa una orden directa. «Da» mantiene la fuerza exhortativa sin añadir modalidad que el griego no explicita.
- source_word: θέλοντα
  english_pob_choice: the one who wants
  chosen_spanish: el que quiere
  alternatives_spanish:
  - el que desea
  - quien quiere
  lexicon: BDAG
  rationale: El participio con artículo es sustantivo. «Quiere» es la forma más natural y fiel para θέλω en este contexto; «desea» sería más interpretativo.
- source_word: ἀπὸ σοῦ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - desde ti
  - de parte de ti
  lexicon: BDAG
  rationale: La preposición expresa procedencia o fuente en relación con el préstamo. En español, «de ti» transmite con claridad la idea de origen sin forzar el giro.
- source_word: δανίσασθαι
  english_pob_choice: to borrow
  chosen_spanish: tomar prestado
  alternatives_spanish:
  - pedir prestado
  - tomar un préstamo
  lexicon: BDAG
  rationale: El infinitivo medio indica la acción de pedir o recibir en préstamo. «Tomar prestado» comunica bien el acto sin limitarlo a dinero, como hace el griego.
- source_word: μὴ ἀποστραφῇς
  english_pob_choice: do not turn away
  chosen_spanish: no te apartes
  alternatives_spanish:
  - no te vuelvas atrás
  - no lo rechaces
  lexicon: BDAG
  rationale: El verbo mantiene la imagen de apartarse/retirarse. «No te apartes» conserva mejor la metáfora que el más interpretativo «no lo rechaces», aunque esta última sea una posible implicación contextual.
theological_decisions:
- issue: Fuerza general del mandamiento en el Sermón del Monte
  english_pob_reading: Render as a direct imperative without softening or narrowing the command beyond the Greek wording.
  chosen_spanish_reading: Convertirlo en una orden directa y general, sin suavizarla ni restringirla explícitamente.
  alternative_spanish_readings:
  - Limitarlo a peticionarios considerados merecedores
  - Parafrasearlo como «no lo rechaces»
  rationale: El griego presenta dos mandatos sencillos y paralelos. La versión española debe mantener su fuerza ética general sin introducir condiciones que no están expresas en el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide altamente con el texto griego y con la auditoría inglesa: se mantuvo la estructura imperativa doble, la sustantivación de los participios y la posibilidad alternativa de entender el segundo miembro como «no te niegues / no rechaces». No se requirieron revisiones adicionales.'
  spanish_consistency_notes:
  - Se usó «Da» y «no te apartes» para conservar el tono directo del imperativo.
  - Se evitó «SEÑOR» o terminología ajena porque el verso no contiene lenguaje divino ni cristológico.
  - «Tomar prestado» evita restringir indebidamente el objeto a dinero, conforme al griego y a la nota inglesa.
