review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: dos mandatos directos, alcance general, y la imagen de no apartarse del que quiere pedir prestado. Sin embargo, el anclaje de la nota [a] está colocado tras «te pide», cuando la alternativa documentada corresponde a la segunda cláusula («no te apartes» / «no te niegues»).'
  spanish_quality_summary: El español es claro y digno. «Da al que te pide» suena natural. «No te apartes del que quiere tomar prestado de ti» es comprensible, pero «pedir prestado» suele ser más idiomático en español general que «tomar prestado» para una persona que busca un préstamo de otra. Además, conviene mover la nota al lugar semánticamente pertinente.
  glossary_alignment: 'No hay términos del glosario mayor implicados aquí. Las decisiones léxicas principales están bien encaminadas: αἰτοῦντί → «al que te pide», δός → «Da», θέλοντα → «el que quiere», ἀπὸ σοῦ → «de ti», μὴ ἀποστραφῇς → «no te apartes». Para δανίσασθαι, «pedir prestado» se alinea mejor con el uso español amplio sin restringir el objeto.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en la primera cláusula en lugar de la segunda.
    rationale: La nota ofrece la alternativa «no te niegues al que quiere tomar prestado de ti», que corresponde léxica y sintácticamente a μὴ ἀποστραφῇς, no a αἰτοῦντί σε.
  - severity: low
    issue: «Tomar prestado» es menos idiomático que «pedir prestado» en este contexto.
    rationale: Ambas expresiones son posibles, pero «pedir prestado de ti» suena más natural y reproduce mejor la idea de solicitar un préstamo a otra persona.
  - severity: low
    issue: La redacción de la nota puede limpiarse para ajustarse al formato habitual.
    rationale: La nota no necesita comillas internas envolventes adicionales; una formulación simple y clara mejora la consistencia editorial.
  revised_spanish_text: Da al que te pide, y no te apartes[a] del que quiere pedir prestado de ti.
