translation:
  language: es
  text: Bienaventurados los que se lamentan[a], porque serán consolados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que están de duelo». El griego es amplio y no especifica la causa del lamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: BDAG
  rationale: ‘Bienaventurados’ reproduce con naturalidad en español la forma de bienaventuranza y conserva su valor declarativo y evaluativo, sin reducirlo a un estado emocional subjetivo.
- source_word: οἱ πενθοῦντες
  english_pob_choice: those who mourn
  chosen_spanish: los que lloran
  alternatives_spanish:
  - los que se lamentan
  - los que están de duelo
  - los que se duelen
  lexicon: BDAG
  rationale: La participio sustantivado admite una expresión natural en español. ‘Lloran’ mantiene amplitud semántica para πενθέω en un registro bíblico claro, sin especificar indebidamente la causa del lamento; además evita un giro demasiado abstracto.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base causal de la bienaventuranza. ‘Porque’ es la forma más clara y directa en español contemporáneo.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre griego tiene énfasis, pero en español el énfasis queda suficientemente sugerido por la estructura de la frase. ‘Ellos mismos’ sonaría recargado sin aportar claridad adicional.
- source_word: παρακληθήσονται
  english_pob_choice: will be comforted
  chosen_spanish: serán consolados
  alternatives_spanish:
  - serán confortados
  - recibirán consuelo
  lexicon: BDAG
  rationale: El futuro pasivo de παρακαλέω aquí comunica recibir consuelo. ‘Serán consolados’ es idiomático en español y preserva el sentido pasivo sin perder dignidad ni claridad.
theological_decisions:
- issue: Alcance del llanto o duelo en la bienaventuranza
  english_pob_reading: Render broadly as 'those who mourn' without specifying whether the mourning is over personal loss, sin, oppression, or eschatological longing.
  chosen_spanish_reading: 'Traducir de manera amplia: ‘los que lloran’, sin precisar el motivo del llanto.'
  alternative_spanish_readings:
  - los que lloran por el pecado
  - los que están de duelo
  - los que se lamentan por la condición de Israel
  rationale: El griego no delimita el objeto del duelo. Mantener esa amplitud evita imponer una interpretación pastoral o doctrinal particular en el texto principal y conserva la tensión teológica documentada por la fuente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla anticipadamente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios sustantivos respecto al texto inglés POB; la decisión principal es mantener la amplitud semántica del participio y una causalidad explícita en ‘porque’.'
  spanish_consistency_notes:
  - Se mantiene el tono de bienaventuranza con ‘Bienaventurados’, coherente con la fórmula del pasaje.
  - ‘Consolados’ conserva el pasivo del original y evita sustituirlo por una formulación interpretativa más expansiva.
  - La nota al pie preserva la alternativa lexical documentada sin estrechar el alcance del griego.
