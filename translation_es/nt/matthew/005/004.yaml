review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del griego: μακάριοι = «Bienaventurados», οἱ πενθοῦντες = grupo sustantivado, ὅτι = causal, y παρακληθήσονται = futuro pasivo «serán consolados». Sin embargo, «lloran» estrecha ligeramente πενθοῦντες hacia el acto de llorar, mientras que el source y la nota inglesa preservan un campo más amplio de duelo/lamento.'
  spanish_quality_summary: El español es claro y digno, pero «los que lloran» suena algo más físico y puntual que «los que están de duelo» o «los que se lamentan». Para una bienaventuranza de alcance amplio, «los que se lamentan» suena natural y conserva mejor la amplitud semántica. El resto de la frase es fluido; «ellos» no es incorrecto, pero puede omitirse en español sin pérdida.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión principal es léxica: conviene alinear πενθέω con una opción española más amplia que «llorar», en coherencia con la nota auditada «those who grieve».'
  issues:
  - severity: medium
    issue: «los que lloran» estrecha el sentido de οἱ πενθοῦντες
    rationale: πενθέω abarca duelo, lamentación o aflicción, no solo el acto de llorar. La propia auditoría inglesa subraya que el término es amplio y no especifica la causa. «Lloran» puede sugerir una manifestación externa concreta y limitar innecesariamente el alcance.
  - severity: low
    issue: El pronombre «ellos» es innecesario en español
    rationale: Aunque αὐτοὶ tiene cierta fuerza en griego, en español la estructura de la bienaventuranza ya comunica suficiente énfasis. Omitir «ellos» mejora la naturalidad sin perder sentido.
  - severity: low
    issue: La nota al pie usa «llanto», que hereda la misma restricción semántica del texto principal
    rationale: Si se amplía el verbo principal, la nota también debe evitar reducir el sentido a llanto físico y hablar de lamento o duelo en general.
  revised_spanish_text: Bienaventurados los que se lamentan[a], porque serán consolados.
  revised_footnotes:
  - marker: a
    text: O «los que están de duelo». El griego es amplio y no especifica la causa del lamento.
    reason: lexical_alternative
