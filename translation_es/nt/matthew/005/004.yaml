revisions:
- from: Bienaventurados los que lloran[a], porque ellos serán consolados.
  to: Bienaventurados los que se lamentan[a], porque serán consolados.
  rationale: Se ajusta «los que lloran» a «los que se lamentan» para preservar mejor la amplitud semántica de πενθοῦντες, tal como la auditoría inglesa insiste en no limitar la causa ni la expresión del duelo. También se elimina «ellos» por naturalidad española, manteniendo intacto el sentido. La nota se actualiza para reflejar una alternativa igualmente amplia.
