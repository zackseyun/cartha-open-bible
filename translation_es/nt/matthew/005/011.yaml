translation:
  language: es
  text: Bienaventurados son ustedes cuando los insulten y los persigan, y digan falsamente contra ustedes toda clase de mal por causa de mí[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los vituperen» para «los insulten».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «digan toda clase de cosas malas contra ustedes».'
    reason: lexical_alternative
  - marker: c
    text: 'También: «por mi causa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοί ἐστε
  english_pob_choice: Blessed are you
  chosen_spanish: Bienaventurados son ustedes
  alternatives_spanish:
  - Ustedes son bienaventurados
  - Dichosos son ustedes
  lexicon: BDAG
  rationale: Conserva la fórmula de bienaventuranza y su peso teológico. En español, 'bienaventurados' es la equivalencia más estable y digna para μακάριος en este contexto; 'dichosos' suena más coloquial y puede debilitar el tono de beatitud.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: Introduce la contingencia general que acompaña a los subjuntivos. 'Cuando' es natural y fiel al patrón de la bienaventuranza; 'cada vez que' intensifica indebidamente la repetición.
- source_word: ὀνειδίσωσιν
  english_pob_choice: they insult you
  chosen_spanish: los insulten
  alternatives_spanish:
  - los afrenten
  - los vituperen
  - los reprochen
  lexicon: BDAG
  rationale: '''Insultar'' comunica el abuso verbal con claridad moderna. Dado el sujeto impersonal en español, ''los insulten'' es natural y mantiene la fuerza de ὀνειδίζω; ''reprochar'' resulta más débil y ''vituperar'' más arcaizante.'
- source_word: διώξωσιν
  english_pob_choice: persecute you
  chosen_spanish: los persigan
  alternatives_spanish:
  - los hostiguen
  - los acosen
  lexicon: BDAG
  rationale: El verbo expresa oposición hostil por fidelidad a Jesús. 'Perseguir' es la equivalencia más estable en español bíblico y conserva la carga religiosa del término.
- source_word: εἴπωσιν πᾶν ⸀πονηρὸν καθ’ ὑμῶν
  english_pob_choice: say every kind of evil against you
  chosen_spanish: digan contra ustedes toda clase de mal
  alternatives_spanish:
  - digan todo mal contra ustedes
  - digan contra ustedes toda clase de cosas malas
  lexicon: BDAG
  rationale: '''Toda clase de mal'' transmite el alcance idiomático de πᾶν πονηρόν sin sonar demasiado literal. ''Contra ustedes'' refleja bien κατά con genitivo, y la opción evita convertir la frase en una enumeración torpe de ''cosas malas''.'
- source_word: ψευδόμενοι
  english_pob_choice: falsely
  chosen_spanish: mintiendo
  alternatives_spanish:
  - falsamente
  - diciendo mentiras
  lexicon: BDAG
  rationale: El participio adverbial señala que las acusaciones son falsas. 'Mintiendo' conserva mejor la acción de engañar que el adverbio 'falsamente', y evita sonar demasiado abstracto; en español funciona naturalmente como modificador circunstancial.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - por mi causa
  - por mi bien
  - por mi nombre
  lexicon: BDAG
  rationale: Expresa de forma directa la causalidad personal centrada en Jesús. 'Por causa de mí' mantiene el sentido relacional sin introducir un giro más interpretativo como 'por mi nombre'.
theological_decisions:
- issue: Alcance de la oposición sufrida por los discípulos
  english_pob_reading: The verse speaks of false verbal abuse and persecution endured on account of Jesus, without narrowing the persecution to a specific legal, physical, or social form.
  chosen_spanish_reading: El versículo describe insulto, persecución y acusaciones falsas sufridas por causa de Jesús, sin restringir la oposición a una forma legal, física o social específica.
  alternative_spanish_readings:
  - Restringirlo a violencia física
  - Restringirlo solo a calumnia verbal
  rationale: Los tres verbos coordinados abarcan abuso verbal, hostilidad activa y acusación falsa. La traducción preserva esa amplitud sin resolverla en un solo tipo de persecución.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; se mantiene el sentido general y la amplitud semántica del original griego, con ajustes españoles para naturalidad y precisión.
  spanish_consistency_notes:
  - Se usa 'Bienaventurados' para la fórmula de beatitud, en continuidad con el valor teológico de μακάριος.
  - Se mantiene 'Jesús' implícito en la primera persona 'mí', sin añadir explícitamente el nombre porque el griego no lo añade aquí.
  - Se traduce ὀνειδίσωσιν y διώξωσιν con verbos activos en subjuntivo presente español, respetando la contingencia general de ὅταν.
  - La frase 'toda clase de mal' conserva la amplitud de πᾶν πονηρόν sin especificar un tipo único de mal.
  - '''Mintiendo'' queda unido a la cláusula de acusación para reflejar el participio adverbial ψευδόμενοι.'
