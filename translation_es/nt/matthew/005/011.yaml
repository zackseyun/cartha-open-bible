revisions:
- from: Bienaventurados son ustedes cuando los insulten y los persigan, y digan contra ustedes toda clase de mal, mintiendo, por causa de mí[a][b][c].
  to: Bienaventurados son ustedes cuando los insulten y los persigan, y digan falsamente contra ustedes toda clase de mal por causa de mí[a][b][c].
  rationale: Se ajusta «mintiendo» a «falsamente» para representar de manera más natural en español el participio adverbial ψευδόμενοι, dejando claro que la maledicencia es falsa. Se corrige la nota c eliminando «por mi bien», que no es una alternativa fiel al griego. Se mejora la nota b para una alternativa idiomática y clara.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:04:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura tripartita del griego: insulto, persecución y habla maliciosa falsa por causa de Jesús. Sin embargo, la colocación de «mintiendo» separada por comas suena algo torpe en español y no modifica con suficiente claridad el acto de «digan». Además, una nota alternativa propone «por mi bien», que no corresponde a ἕνεκεν ἐμοῦ.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, con buena legibilidad eclesial. Conviene ajustar la frase final para que el valor adverbial de ψευδόμενοι sea más natural en español: «y, mintiendo, digan…» o mejor «y digan falsamente…». También es preferible afinar la nota b para una alternativa más idiomática en español.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Bienaventurados», «persigan» y «por causa de mí» son adecuados. El único problema léxico-teológico relevante está en la nota c: «por mi bien» introduce un sentido incorrecto.'
  issues:
  - severity: medium
    issue: «mintiendo» está colocado de forma poco natural y algo ambigua
    rationale: ψευδόμενοι modifica el hablar mal contra los discípulos. En español, «digan falsamente contra ustedes…» expresa con más claridad que las acusaciones son falsas.
  - severity: medium
    issue: La nota c incluye «por mi bien»
    rationale: ἕνεκεν ἐμοῦ significa «por causa de mí / por mi causa / por mi causa personal», no «por mi bien», que sugiere beneficio para Jesús y altera el sentido.
  - severity: low
    issue: La nota b suena poco idiomática
    rationale: «digan todo mal contra ustedes» es comprensible pero menos natural que «digan toda clase de mal contra ustedes» o «digan toda clase de cosas malas contra ustedes».
  revised_spanish_text: Bienaventurados son ustedes cuando los insulten y los persigan, y digan falsamente contra ustedes toda clase de mal por causa de mí[a][b][c].
