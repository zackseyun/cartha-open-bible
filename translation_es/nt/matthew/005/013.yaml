  source_alignment_summary: 'El borrador español transmite fielmente el sentido general del griego y sigue bien la auditoría inglesa: ''la sal de la tierra'', la condición de la sal que pierde sabor, su inutilidad, y el desenlace de ser echada y pisoteada. Sin embargo, ''ser arrojada fuera'' suena algo forzado en español bíblico actual y puede mejorarse sin perder el valor espacial de ἔξω. Además, la nota a conserva la alternativa correcta, pero su puntuación interna no sigue la convención más natural del proyecto.'
  spanish_quality_summary: 'El español es claro y ampliamente legible, con buen registro eclesial moderno. La principal mejora es estilística y de naturalidad: ''ser echada fuera'' resulta más idiomático y bíblicamente reconocible que ''ser arrojada fuera'', mientras sigue siendo fiel al griego. El resto del versículo está bien construido. La nota b es útil y adecuada.'
  glossary_alignment: No hay términos del glosario principal en juego salvo la política de masculino representativo. 'Por los hombres' sigue correctamente la decisión documentada del POB para ὑπὸ τῶν ἀνθρώπων, con aclaración inclusiva en nota. No hay conflictos con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: '''ser arrojada fuera'' es menos natural que otras opciones españolas'
    rationale: Aunque fiel al sentido de βληθὲν ἔξω, la expresión suena algo rígida en español neutral. 'Ser echada fuera' conserva el matiz espacial y mejora la fluidez y legibilidad.
  - severity: low
    issue: Formato de la nota a con comillas y puntuación innecesariamente marcadas
    rationale: 'La nota "''O: “pierde su sabor”.''" puede normalizarse a ''O: "pierde su sabor".'' o equivalente de estilo proyecto. Es un detalle editorial menor, no de contenido.'
  revised_spanish_text: Ustedes son la sal de la tierra. Pero si la sal se vuelve insípida[a], ¿con qué será salada? Ya no sirve para nada, sino para ser echada fuera y pisoteada por los hombres[b].
