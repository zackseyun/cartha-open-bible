translation:
  language: es
  text: Ustedes son la sal de la tierra. Pero si la sal se vuelve insípida[a], ¿con qué será salada? Ya no sirve para nada, sino para ser echada fuera y pisoteada por los hombres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "pierde su sabor".'
    reason: alternative_reading
  - marker: b
    text: 'O: "por la gente"; el griego usa una forma masculina con sentido general humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Ustedes mismos
  - Vosotros
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego. En español, 'Ustedes' comunica naturalmente la segunda persona plural sin forzar una repetición enfática innecesaria. 'Vosotros' sería regional; 'ustedes mismos' añade énfasis que el contexto no exige.
- source_word: τὸ ἅλας τῆς γῆς
  english_pob_choice: the salt of the earth
  chosen_spanish: la sal de la tierra
  alternatives_spanish:
  - la sal del mundo
  - la sal del país
  lexicon: BDAG
  rationale: γῆ puede significar 'tierra', 'país' o 'mundo' según contexto. Aquí el giro metafórico es natural en español como 'la sal de la tierra', sin perder la amplitud de la imagen ni introducir una paráfrasis excesiva.
- source_word: μωρανθῇ
  english_pob_choice: becomes tasteless
  chosen_spanish: se vuelve insípida
  alternatives_spanish:
  - pierde su sabor
  - se vuelve sin sabor
  lexicon: BDAG
  rationale: Aunque el verbo emparenta con la idea de 'foolish', en relación con la sal describe que pierde su sabor. 'Insípida' conserva la fuerza del contraste y evita importar el sentido ajeno de 'tonta' o 'necia'.
- source_word: ἐν τίνι ἁλισθήσεται;
  english_pob_choice: with what will it be made salty?
  chosen_spanish: ¿con qué será salada?
  alternatives_spanish:
  - ¿con qué se le volverá a salar?
  - ¿cómo recuperará su salinidad?
  lexicon: BDAG
  rationale: La pasiva futura pregunta por el medio por el cual la sal podría ser 'salada' de nuevo. 'Será salada' sigue de cerca el griego y es idiomático en español; 'recuperará su salinidad' explicita la idea pero se aleja más de la forma del texto.
- source_word: εἰς οὐδὲν ἰσχύει ἔτι
  english_pob_choice: It is no longer good for anything
  chosen_spanish: Ya no sirve para nada
  alternatives_spanish:
  - Ya no es útil para nada
  - Ya no vale para nada
  lexicon: BDAG
  rationale: ἰσχύω aquí expresa eficacia o utilidad práctica. 'Sirve para nada' es una equivalencia natural en español que mantiene la idea de inutilidad sin endurecer el tono más de lo que el griego exige.
- source_word: εἰ μὴ ⸂βληθὲν ἔξω⸃
  english_pob_choice: except to be thrown out
  chosen_spanish: sino para ser arrojada fuera
  alternatives_spanish:
  - sino para ser echada fuera
  - sino para ser tirada fuera
  lexicon: BDAG
  rationale: El participio con ἔξω expresa literalmente ser puesto fuera. 'Arrojada fuera' conserva esa imagen espacial con buena naturalidad en español; 'echada fuera' también es viable, pero 'arrojada' responde mejor al matiz más enérgico del verbo.
- source_word: καταπατεῖσθαι
  english_pob_choice: trampled underfoot
  chosen_spanish: pisoteada
  alternatives_spanish:
  - pisada
  - aplastada bajo los pies
  lexicon: BDAG
  rationale: El verbo significa pisar o aplastar con los pies. 'Pisoteada' transmite la imagen con claridad y fluidez; 'bajo los pies' podría añadirse, pero el español ya lo sugiere implícitamente.
- source_word: ὑπὸ τῶν ἀνθρώπων
  english_pob_choice: by men
  chosen_spanish: por los hombres
  alternatives_spanish:
  - por la gente
  - por las personas
  - por la humanidad
  lexicon: BDAG
  rationale: El griego usa una forma masculina plural con sentido genérico humano. Se conserva la forma masculina en el texto principal para reflejar el dato gramatical del original, con la alternativa inclusiva explicada en nota.
theological_decisions:
- issue: Masculino genérico en ὑπὸ τῶν ἀνθρώπων
  english_pob_reading: by men
  chosen_spanish_reading: por los hombres
  alternative_spanish_readings:
  - por la gente
  - por las personas
  - por los seres humanos
  rationale: El sustantivo griego es masculino plural pero funciona de modo representativo para seres humanos en general. Se mantiene la forma masculina en el texto principal para no borrar la huella gramatical del original; la amplitud inclusiva se aclara en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto sigue el sentido y la estructura del griego SBLGNT y coincide con la línea editorial del POB inglés: ''becomes tasteless'' -> ''se vuelve insípida'', ''good for anything'' -> ''sirve para nada'', y ''thrown out'' -> ''arrojada fuera''. También se conserva la referencia genérica masculina de ἀνθρώπων con una nota aclaratoria, en paralelo al aparato inglés.'
  spanish_consistency_notes:
  - Se usa 'Ustedes' para la segunda persona plural, evitando regionalismos.
  - '''Sal de la tierra'' conserva la metáfora estable y transparente en español.'
  - '''Insípida'' mantiene la tensión semántica de μωρανθῇ sin introducir ''necia'' en el cuerpo del texto.'
  - '''Por los hombres'' preserva el dato gramatical del griego; la nota ofrece la lectura inclusiva.'
  - La puntuación separa las dos preguntas y la cláusula final con un estilo publicable y natural en español.
