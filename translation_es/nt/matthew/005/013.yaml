  rationale: Se ajusta una expresión para mayor naturalidad y mejor español bíblico contemporáneo ('echada fuera' en lugar de 'arrojada fuera') sin perder la fuerza de ἔξω. También se normaliza el formato de la nota a. No se requieren cambios de fondo en significado ni en decisiones teológicas/lexicales.
