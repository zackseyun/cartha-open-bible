translation:
  language: es
  text: Bienaventurados los que han sido perseguidos por causa de la rectitud[a], porque de ellos es el reino de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El griego puede abarcar tanto el sentido de rectitud moral como el de justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Feliz
  - Dichosos
  lexicon: BDAG
  rationale: Término típico de las bienaventuranzas. «Bienaventurados» conserva el tono declarativo y reverente mejor que «felices», que suena más subjetivo en español.
- source_word: οἱ δεδιωγμένοι
  english_pob_choice: those who have been persecuted
  chosen_spanish: los que han sido perseguidos
  alternatives_spanish:
  - los perseguidos
  - los que son perseguidos
  lexicon: BDAG
  rationale: El participio perfecto pasivo griego sugiere una acción sufrida con efecto vigente; «han sido perseguidos» refleja mejor ese matiz que un presente simple.
- source_word: ἕνεκεν
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por el bien de
  lexicon: BDAG
  rationale: «Por causa de» expresa con claridad la relación causal y suena natural en español bíblico sin perder precisión.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/righteousness en nota
  lexicon: BDAG
  rationale: 'Aquí se preserva la tensión reconocida por el POB inglés: δικαιοσύνη puede abarcar tanto justicia como rectitud. En español, «justicia» comunica mejor ese campo semántico amplio, aunque «rectitud» sigue siendo una alternativa válida.'
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la bienaventuranza; «porque» es la equivalencia más transparente y natural en español moderno.
- source_word: αὐτῶν
  english_pob_choice: theirs
  chosen_spanish: de ellos
  alternatives_spanish:
  - les pertenece
  - es de ellos
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de manera idiomática en español con «de ellos». Mantiene la concisión del griego y del POB inglés.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  english_pob_choice: the kingdom of heaven
  chosen_spanish: el reino de los cielos
  alternatives_spanish:
  - el reino del cielo
  - el reino de los cielos
  lexicon: BDAG
  rationale: Se conserva la fórmula mateana tradicional en español, que corresponde bien al uso del plural griego y es ampliamente reconocible en el texto bíblico.
theological_decisions:
- issue: 'δικαιοσύνη: justicia vs. rectitud'
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud en nota
  rationale: El POB inglés mantiene «righteousness» en el texto principal y a la vez documenta la alternativa «justice». En español, «justicia» retiene mejor la amplitud moral y covenantal del término en Mateo 5:10, sin cerrar la posibilidad de «rectitud» como matiz contextual.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη → righteousness; alternativa ‘justice’ preservada en notas'
- issue: Fórmula final del reinado divino
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reino de los cielos
  rationale: Mateo usa una expresión característica que el POB inglés mantiene como ‘kingdom of heaven’. En español, la fórmula tradicional «el reino de los cielos» es la equivalente más fiel e idiomática, sin necesidad de una nota explicativa adicional.
  doctrine_reference: Uso mateano característico; equivalencia idiomática de βασιλεία τῶν οὐρανῶν
- issue: Tono de bienaventuranza
  english_pob_reading: Blessed
  chosen_spanish_reading: Bienaventurados
  alternative_spanish_readings:
  - Dichosos
  - Felices
  rationale: «Bienaventurados» conserva el valor solemne y proclamativo del macarismo. Evita reducir la frase a un estado emocional y respeta el carácter de declaración de Jesús.
  doctrine_reference: Semántica de μακάριοι en las bienaventuranzas
translation_notes:
  revision_awareness: Coincide con la evaluación de alta concordancia del POB inglés y no requiere cambios respecto del sentido fuente. Se mantiene la tensión lexical de δικαιοσύνη en nota, siguiendo la decisión auditada del texto inglés.
  spanish_consistency_notes:
  - Se mantiene «Bienaventurados» para μακάριοι en coherencia con el registro bíblico del sermón del monte.
  - Se usa «reino de los cielos» como fórmula mateana estable, coherente con la tradición española y con el valor del griego.
  - La nota sobre δικαιοσύνη preserva la alternativa semántica documentada en el POB inglés sin sustituir el término principal del texto.
