revisions:
- from: Bienaventurados[a] los que han sido perseguidos por causa de justicia, porque de ellos es el reino de los cielos.
  to: Bienaventurados los que han sido perseguidos por causa de la rectitud[a], porque de ellos es el reino de los cielos.
  rationale: Se revisa únicamente δικαιοσύνης para ajustarse mejor al audit trail del POB y al contexto mateano. «Rectitud» en el texto principal preserva mejor el valor de ‘righteousness’, mientras que «justicia» queda en nota como alternativa significativa. También se corrige la nota para que no repita el término principal y para que explique con claridad el campo semántico del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:02:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general de μακάριοι… ὅτι… ἡ βασιλεία τῶν οὐρανῶν, y «Bienaventurados», «los que han sido perseguidos» y «el reino de los cielos» son opciones fieles y naturales. Sin embargo, el tratamiento de δικαιοσύνης no sigue bien la línea auditada del POB inglés: el texto principal inglés eligió ‘righteousness’ y reservó ‘justice’ para nota. En español, «justicia» en el texto principal desplaza el sentido hacia lo social/judicial y no preserva tan bien el matiz de rectitud/alineación con la voluntad de Dios presente aquí.'
  spanish_quality_summary: 'El español es claro y legible, con tono bíblico digno. No obstante, la nota actual está mal formulada: dice «O ‘justicia’» cuando el texto principal ya dice «justicia», de modo que no ofrece una alternativa real. Además, la nota debería reflejar la alternativa léxica de manera coherente con el texto revisado.'
  glossary_alignment: Alinea bien con los términos del proyecto en casi todo, pero falla en δικαιοσύνη. Según las pautas, δικαιοσύνη debe ir normalmente como «justicia» / «rectitud» según contexto, preservando la fuerza pactual/legal. Aquí, dado el audit trail inglés y el contexto de las bienaventuranzas, «rectitud» en el texto principal con nota «O ‘justicia’» preserva mejor la decisión documentada. No hay otros conflictos de glosario.
  issues:
  - severity: high
    issue: δικαιοσύνης se vierte como «justicia» en el texto principal
    rationale: El POB inglés usa ‘righteousness’ en el cuerpo y ‘justice’ como alternativa en nota. En Mateo 5:10, «rectitud» comunica mejor en español la idea de vivir conforme a la voluntad de Dios; «justicia» puede sonar más estrechamente social o forense.
  - severity: medium
    issue: La nota al pie repite el mismo término del texto principal
    rationale: La nota dice «O ‘justicia’», pero el texto principal ya tiene «justicia», lo cual la vuelve incoherente e inútil. La nota debe presentar una alternativa real y explicar el campo semántico.
  - severity: low
    issue: «de ellos es el reino» es aceptable pero algo menos idiomático que «de ellos pertenece» o «de ellos es»
    rationale: No requiere cambio; «de ellos es el reino de los cielos» suena suficientemente natural y cercano al griego. Se puede mantener.
  revised_spanish_text: Bienaventurados los que han sido perseguidos por causa de la rectitud[a], porque de ellos es el reino de los cielos.
  revised_footnotes:
  - marker: a
    text: O «justicia». El griego puede abarcar tanto el sentido de rectitud moral como el de justicia.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente δικαιοσύνης para ajustarse mejor al audit trail del POB y al contexto mateano. «Rectitud» en el texto principal preserva mejor el valor de ‘righteousness’, mientras que «justicia» queda en nota como alternativa significativa. También se corrige la nota para que no repita el término principal y para que explique con claridad el campo semántico del griego.
