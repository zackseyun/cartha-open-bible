translation:
  language: es
  text: Así[a] brille su luz delante de la gente, para que vean sus buenas obras y glorifiquen a su Padre que está en los cielos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Del mismo modo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que está en el cielo». El griego tiene el plural: «en los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: In the same way
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Del mismo modo
  lexicon: BDAG
  rationale: οὕτως remite al modo o manera del contexto inmediato; en español, «Así» mantiene la conexión discursiva sin sonar pesado. Conserva la relación con la imagen de la luz del versículo anterior.
- source_word: λαμψάτω
  english_pob_choice: let ... shine
  chosen_spanish: brille
  alternatives_spanish:
  - deje brillar
  - resplandezca
  lexicon: BDAG
  rationale: El imperativo aoristo de tercera singular se expresa con naturalidad en español mediante «brille», que conserva el mandato y la imagen de luz sin introducir un auxiliar innecesario.
- source_word: τὸ φῶς ὑμῶν
  english_pob_choice: your light
  chosen_spanish: vuestra luz
  alternatives_spanish:
  - la luz de ustedes
  - su luz
  lexicon: BDAG
  rationale: Se mantiene el singular «luz» como en el griego, con posesivo plural de segunda persona para corresponder al destinatario comunitario. «Vuestra» es claro y concordante con el plural implícito del grupo.
- source_word: ἔμπροσθεν τῶν ἀνθρώπων
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - delante de la gente
  - delante de las personas
  - ante los hombres
  lexicon: BDAG
  rationale: La preposición ἔμπροσθεν pide una colocación espacial o pública; «delante de» la reproduce de forma directa. «Los hombres» conserva la forma masculina plural del griego, con valor representativo de seres humanos, como en el audit trail inglés.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ὅπως introduce propósito; «para que» es la forma más natural en español y se ajusta al subjuntivo que sigue.
- source_word: ἴδωσιν
  english_pob_choice: they may see
  chosen_spanish: vean
  alternatives_spanish:
  - puedan ver
  - lleguen a ver
  lexicon: BDAG
  rationale: 'El subjuntivo presente en español expresa adecuadamente el propósito: «para que vean». Se evita añadir matices no requeridos por el griego.'
- source_word: τὰ καλὰ ἔργα
  english_pob_choice: your good works
  chosen_spanish: vuestras buenas obras
  alternatives_spanish:
  - vuestras buenas acciones
  - vuestras obras buenas
  lexicon: BDAG
  rationale: «Obras» preserva el sustantivo ἔργα y «buenas» traduce καλὰ de manera sobria y fiel. Se mantiene el posesivo plural para reflejar la referencia al discipulado colectivo.
- source_word: δοξάσωσιν
  english_pob_choice: glorify
  chosen_spanish: glorifiquen
  alternatives_spanish:
  - den gloria a
  - honren
  lexicon: BDAG
  rationale: «Glorifiquen» es el equivalente normal y teológicamente fuerte de δοξάζω en este contexto, especialmente en referencia al Padre celestial.
- source_word: τὸν πατέρα ὑμῶν
  english_pob_choice: your Father
  chosen_spanish: vuestro Padre
  alternatives_spanish:
  - su Padre
  - el Padre de ustedes
  lexicon: BDAG
  rationale: Se conserva la relación filial característica del evangelio de Mateo. El posesivo plural hace natural la lectura comunitaria del pasaje.
- source_word: τὸν ἐν τοῖς οὐρανοῖς
  english_pob_choice: who is in the heavens
  chosen_spanish: que está en los cielos
  alternatives_spanish:
  - que está en el cielo
  - que está en los cielos
  lexicon: BDAG
  rationale: Se mantiene el plural de οὐρανοῖς con «los cielos», siguiendo la preferencia del audit trail por no reducirlo al singular. «Que está en» expresa con fluidez el participio/atribución implícita en el griego.
theological_decisions:
- issue: Masculino genérico en ἀνθρώπων
  english_pob_reading: before men
  chosen_spanish_reading: delante de los hombres
  alternative_spanish_readings:
  - delante de la gente
  - delante de las personas
  rationale: Se conserva la forma masculina plural del original, como hace el texto inglés auditado, porque en este contexto tiene valor representativo para la humanidad en general. La nota permite aclarar al lector moderno que no se limita a varones.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Pluralidad de οὐρανοῖς
  english_pob_reading: who is in the heavens
  chosen_spanish_reading: que está en los cielos
  alternative_spanish_readings:
  - que está en el cielo
  - que está en los cielos
  rationale: El griego usa plural; por eso se conserva «los cielos» en vez de neutralizarlo al singular tradicional. Esto sigue la primacía del idioma fuente y mantiene visible la tensión documentada por el audit trail.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El texto inglés auditado no recibió revisiones sustanciales y fue confirmado con alto acuerdo; la versión española sigue la misma lectura de fondo, preservando la conexión discursiva de οὕτως, el mandato de luz, el sentido genérico de ἀνθρώπων y el plural de οὐρανοῖς.
  spanish_consistency_notes:
  - 'Se mantiene la secuencia verbal y de propósito del griego: mandato, finalidad y resultado.'
  - Se conserva el plural posesivo comunitario («vuestra/vuestro») para reflejar el destinatario colectivo.
  - Se evita «Señor» o «Cristo» porque no aparecen en el versículo ni en el contexto inmediato auditado.
  - «Cielos» se usa de forma consistente para reflejar οὐρανοῖς sin colapsar el plural griego.
