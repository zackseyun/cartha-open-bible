revisions:
- from: Así[a] brille vuestra luz delante de los hombres[b], para que vean vuestras buenas obras y glorifiquen a vuestro Padre que está en los cielos.
  to: Así[a] brille su luz delante de la gente, para que vean sus buenas obras y glorifiquen a su Padre que está en los cielos[b].
  rationale: Se ajusta el registro al español neutral latinoamericano mediante «su» en lugar de «vuestra/vuestro». Se reemplaza «los hombres» por «la gente» para expresar con naturalidad el sentido genérico de ἀνθρώπων en español actual sin pérdida de significado. Se añade la nota sobre la alternativa tradicional singular «en el cielo» para reflejar la decisión documentada del audit trail respecto de οὐρανοῖς.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:00:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido del griego: imperativo exhortativo («brille»), propósito («para que vean... y glorifiquen»), posesivos comunitarios y el plural «en los cielos». También preserva la elección teológica de mantener «los cielos».'
  spanish_quality_summary: El español es claro y digno, pero «vuestra/vuestras/vuestro» suena más peninsular que neutral latinoamericano. Además, si se conserva la nota sobre «los hombres», conviene mantener consistencia con una formulación más natural en el texto principal para lectura amplia de iglesia. «Ustedes/su» mejora neutralidad sin perder fidelidad.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Glorifiquen», «Padre» y «los cielos» están bien alineados. La principal mejora es estilística y de registro regional: cambiar la segunda persona plural peninsular a una forma más ampliamente legible en América Latina.'
  issues:
  - severity: medium
    issue: Uso de «vuestra/vuestras/vuestro»
    rationale: Aunque es correcto, no cumple tan bien el objetivo de español neutral latinoamericano / ampliamente legible en iglesia. «Su... de ustedes» o ajustes equivalentes suenan más naturales para la audiencia meta.
  - severity: medium
    issue: «los hombres» en el texto principal
    rationale: Es defendible por el audit trail inglés, pero en español contemporáneo eclesial latinoamericano suena más marcado y menos natural como genérico. Dado que el sentido genérico puede preservarse con «la gente» o «las personas», y el inglés retuvo «men» por una razón estilística propia del inglés, el español no necesita copiar ese efecto de forma tan rígida.
  - severity: low
    issue: Falta la nota sobre la alternativa singular «en el cielo»
    rationale: El inglés POB conserva una nota para la alternativa tradicional singular. En español sería útil reproducir esa alternativa, ya que «en los cielos» puede sonar menos habitual para algunos lectores.
  revised_spanish_text: Así[a] brille su luz delante de la gente, para que vean sus buenas obras y glorifiquen a su Padre que está en los cielos[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Del mismo modo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que está en el cielo». El griego tiene el plural: «en los cielos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el registro al español neutral latinoamericano mediante «su» en lugar de «vuestra/vuestro». Se reemplaza «los hombres» por «la gente» para expresar con naturalidad el sentido genérico de ἀνθρώπων en español actual sin pérdida de significado. Se añade la nota sobre la alternativa tradicional singular «en el cielo» para reflejar la decisión documentada del audit trail respecto de οὐρανοῖς.
