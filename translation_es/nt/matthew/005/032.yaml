translation:
  language: es
  text: Pero yo les digo que todo el que deja a su esposa, salvo por motivo de inmoralidad sexual[a], hace que ella cometa adulterio[b]; y el que se case con una mujer divorciada comete adulterio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Inmoralidad sexual» traduce el griego porneia, un término amplio para conducta sexual ilícita; algunas versiones dicen «fornicación» o «desenfreno sexual».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «hace que ella llegue a ser adúltera»; el infinitivo griego está en forma pasiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ δὲ λέγω ὑμῖν
  english_pob_choice: But I say to you
  chosen_spanish: Pero yo les digo
  alternatives_spanish:
  - Pero yo digo a ustedes
  - Y yo les digo
  lexicon: contextual correspondence to direct discourse
  rationale: Mantiene el contraste enfático del griego con una formulación natural en español. El pronombre explícito yo preserva el énfasis de ἐγώ, y les dice reproduce el destinatario plural sin calco innecesario.
- source_word: πᾶς ὁ ἀπολύων
  english_pob_choice: everyone who divorces
  chosen_spanish: todo el que se divorcia
  alternatives_spanish:
  - quien se divorcia
  - todo el que repudia
  lexicon: BDAG
  rationale: En contexto matrimonial, ἀπολύω funciona con sentido de divorciar/se divorciar. 'Todo el que' conserva el valor genérico del participio masculino singular sin forzar una traducción masculina exclusiva.
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa/ mujer
  lexicon: BDAG
  rationale: γυνή puede significar 'mujer' o 'esposa', pero el contexto de divorcio y el posesivo αὐτοῦ exigen el sentido marital. 'Esposa' evita ambigüedad en español contemporáneo.
- source_word: παρεκτὸς λόγου πορνείας
  english_pob_choice: except on the ground of sexual immorality
  chosen_spanish: salvo por motivo de inmoralidad sexual
  alternatives_spanish:
  - excepto por causa de inmoralidad sexual
  - salvo en caso de inmoralidad sexual
  - excepto por motivo de fornicación
  lexicon: BDAG
  rationale: παρεκτός introduce una excepción genuina; λόγου aquí equivale a 'motivo/caso/razón'. πορνεία abarca conducta sexual ilícita de modo más amplio que 'adulterio', por lo que 'inmoralidad sexual' preserva la amplitud del término.
- source_word: ποιεῖ αὐτὴν μοιχευθῆναι
  english_pob_choice: makes her commit adultery
  chosen_spanish: la hace cometer adulterio
  alternatives_spanish:
  - la hace convertirse en adúltera
  - la hace ser adulterada
  - la obliga a adulterar
  lexicon: BDAG
  rationale: ποιέω + infinitivo expresa causación. Aunque μοιχευθῆναι es pasivo en forma, el español idiomático más claro es 'hacer cometer adulterio'. Se preserva así la lectura principal del POB inglés sin borrar la tensión del pasivo griego, que se mantiene en la nota.
- source_word: καὶ ὃς ἐὰν ἀπολελυμένην γαμήσῃ
  english_pob_choice: and whoever marries a divorced woman
  chosen_spanish: y el que se case con una mujer divorciada
  alternatives_spanish:
  - y quien se case con una divorciada
  - y cualquiera que se case con una mujer divorciada
  lexicon: BDAG
  rationale: ὃς ἐὰν introduce una condición general indefinida; 'el que' es natural y conserva la fuerza proverbial. ἀπολελυμένην se rinde con 'divorciada' para mantener paralelismo con el verbo anterior y claridad legal.
- source_word: μοιχᾶται
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - está cometiendo adulterio
  - se hace adúltero
  lexicon: BDAG
  rationale: El presente medio/pasivo se expresa idiomáticamente en español con 'comete adulterio'. Esta forma comunica la acción establecida en el contexto sin recargar una distinción de voz que el español no reproduce de manera natural.
theological_decisions:
- issue: Alcance de la cláusula de excepción παρεκτὸς λόγου πορνείας
  english_pob_reading: 'Render as a genuine exception: ''except on the ground of sexual immorality.'''
  chosen_spanish_reading: 'Traducirla como una excepción genuina: ''salvo por motivo de inmoralidad sexual''.'
  alternative_spanish_readings:
  - salvo en caso de inmoralidad sexual
  - excepto por causa de inmoralidad sexual
  - salvo por motivo de fornicación
  rationale: El griego presenta una cláusula exceptiva real, y la traducción no debe ocultarla. A la vez, 'inmoralidad sexual' evita restringir πορνεία a un solo acto y preserva la amplitud del término para que permanezca abierta la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Fuerza de μοιχευθῆναι después de ποιεῖ
  english_pob_reading: Use idiomatic English 'makes her commit adultery' in the main text, while preserving the more literal passive-oriented alternative in a footnote.
  chosen_spanish_reading: Usar en el cuerpo del texto 'la hace cometer adulterio', con una nota que preserve la alternativa más literal del pasivo.
  alternative_spanish_readings:
  - la hace convertirse en adúltera
  - la hace ser adulterada
  - la hace cometer adulterio
  rationale: El infinitivo aoristo pasivo puede sugerir 'ser hecha adúltera' o 'llegar a ser adúltera', pero el español corriente expresa mejor la causación con 'hacer cometer adulterio'. Para la auditoría textual, la nota conserva la alternativa más literal sin imponerla en el texto principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La versión inglesa POB más reciente quedó sin cambios tras la última revisión; el presente borrador español sigue la misma decisión de fondo, conservando la cláusula exceptiva y la ambigüedad del infinitivo pasivo en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce γυνή como 'esposa'/'mujer' según contexto; aquí corresponde 'esposa' por el marco matrimonial.
  - '''Inmoralidad sexual'' preserva la amplitud de πορνεία sin reducirla a ''adulterio''.'
  - '''Divorciada'' y ''se divorcia'' mantienen paralelismo léxico en español para reflejar ἀπολύω / ἀπολελυμένην.'
