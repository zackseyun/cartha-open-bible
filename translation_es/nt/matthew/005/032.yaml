revisions:
- from: Pero yo les digo que todo el que se divorcia de su esposa[a], salvo por motivo de inmoralidad sexual, la hace cometer adulterio[b]; y el que se case con una mujer divorciada comete adulterio.
  to: Pero yo les digo que todo el que deja a su esposa, salvo por motivo de inmoralidad sexual[a], hace que ella cometa adulterio[b]; y el que se case con una mujer divorciada comete adulterio.
  rationale: 'Se corrige el problema principal de sentido evitando la forma reflexiva ambigua «se divorcia de su esposa» y usando «deja a su esposa», que reproduce mejor la dirección de ἀπολύων sin forzar un español jurídico poco natural. Además, se reubican las notas en los segmentos correctos: [a] sobre «inmoralidad sexual» para πορνεία y [b] sobre la cláusula causal que traduce μοιχευθῆναι. El resto del versículo puede mantenerse.'
  reviewer_model: gpt-5.4
