  text: ἐγὼ δὲ λέγω ὑμῖν ὅτι ⸂πᾶς ὁ ἀπολύων⸃ τὴν γυναῖκα αὐτοῦ παρεκτὸς λόγου πορνείας ποιεῖ αὐτὴν ⸀μοιχευθῆναι, καὶ ὃς ἐὰν ἀπολελυμένην γαμήσῃ μοιχᾶται.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/032.yaml
  text: But I say to you that everyone who divorces his wife[a], except on the ground of sexual immorality, makes her commit adultery[b]; and whoever marries a divorced woman commits adultery.
  footnotes:
  - marker: a
    text: Or, more literally, 'makes her become an adulteress' (the Greek infinitive is passive in form).
    reason: lexical_alternative
  - marker: b
    text: '''Sexual immorality'' translates Greek porneia, a broad term for illicit sexual conduct; some render it ''fornication'' or ''unchastity.'''
    reason: lexical_alternative
