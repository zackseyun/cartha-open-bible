review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: mantiene la cláusula de excepción como excepción genuina, usa lenguaje de divorcio para ἀπολύω, traduce γυνή como «esposa», y conserva la tensión de μοιχευθῆναι mediante una nota. Sin embargo, hay un desajuste importante: el texto español dice «todo el que se divorcia de su esposa», pero el griego ἀπολύων es transitivo y el POB inglés auditado lo entiende como «everyone who divorces his wife», no como «who gets divorced from his wife».'
  spanish_quality_summary: 'El español es claro y eclesialmente legible. La frase principal fluye bien. La reparación necesaria es cambiar «se divorcia de su esposa» por «se divorcia de su esposa» no es la mejor opción semántica; en español natural y fiel conviene «se divorcia de su esposa» -> «se divorcia de su esposa»? Mejor aún, para evitar la ambigüedad reflexiva, «divorcia a su esposa» sería poco idiomático en español general. La mejor solución natural y fiel es «se divorcia de su esposa»? No, porque eso puede expresar separación mutua o del propio estado civil. Más claro es «se divorcia de su esposa» en muchos contextos modernos, pero aquí el griego enfoca la acción del marido sobre la esposa. En español bíblico moderno, «repudia a su esposa» o «se divorcia de su esposa» compiten; dado el proyecto y el POB inglés, «todo el que se divorcia de su esposa» debe corregirse a una forma que preserve mejor la transitividad y el contexto jurídico. También hay un problema de anclaje de notas:
    la nota [a] está puesta sobre «esposa», pero su contenido corresponde a «la hace cometer adulterio»; y la nota [b] está puesta sobre «adulterio», pero su contenido corresponde a «inmoralidad sexual».'
  glossary_alignment: No hay conflicto con términos de proyecto como Yahvé/Mesías/etc. Sí hay que mantener la decisión auditada para πορνεία como «inmoralidad sexual» y para ἀπολύω con lenguaje de divorcio. La nota sobre πορνεία debe anclarse a «inmoralidad sexual», y la nota sobre μοιχευθῆναι debe anclarse a la frase causal correspondiente.
  issues:
  - severity: high
    issue: «se divorcia de su esposa» no refleja con suficiente precisión la transitividad de ἀπολύων
    rationale: El participio griego describe al que despide/divorcia a su esposa; no al que simplemente entra en estado de divorcio. El POB inglés fijó «everyone who divorces his wife». En español, la forma reflexiva introduce ambigüedad semántica.
  - severity: high
    issue: Las notas al pie están ancladas en lugares incorrectos
    rationale: La nota [a] explica μοιχευθῆναι / «la hace ... adúltera», pero está colocada en «esposa». La nota [b] explica πορνεία / «inmoralidad sexual», pero está colocada en «adulterio». Esto rompe la auditabilidad exigida.
  - severity: medium
    issue: La alternativa más fiel y natural para ἀπολύων requiere ajuste estilístico
    rationale: En español general, «divorcia a su esposa» suena forzado, mientras «repudia a su esposa» puede sonar más tradicional pero también más específico que el inglés auditado. Una solución equilibrada es «el que se divorcia de su esposa», pero dada la ambigüedad señalada, conviene explicitar mejor la acción en una formulación revisada.
  revised_spanish_text: Pero yo les digo que todo el que deja a su esposa, salvo por motivo de inmoralidad sexual[a], hace que ella cometa adulterio[b]; y el que se case con una mujer divorciada comete adulterio.
  revised_footnotes:
  - marker: a
    text: «Inmoralidad sexual» traduce el griego porneia, un término amplio para conducta sexual ilícita; algunas versiones dicen «fornicación» o «desenfreno sexual».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «hace que ella llegue a ser adúltera»; el infinitivo griego está en forma pasiva.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el problema principal de sentido evitando la forma reflexiva ambigua «se divorcia de su esposa» y usando «deja a su esposa», que reproduce mejor la dirección de ἀπολύων sin forzar un español jurídico poco natural. Además, se reubican las notas en los segmentos correctos: [a] sobre «inmoralidad sexual» para πορνεία y [b] sobre la cláusula causal que traduce μοιχευθῆναι. El resto del versículo puede mantenerse.'
