translation:
  language: es
  text: Porque si ustedes aman a los que los aman, ¿qué recompensa[a] tienen? ¿No hacen lo mismo incluso los recaudadores de impuestos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salario» o «paga». La palabra griega también puede significar «salario» o «recompensa»; aquí se refiere a la compensación en el contexto de la enseñanza de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si en efecto
  - Pues si
  lexicon: BDAG
  rationale: γάρ enlaza con el argumento previo, y ἐάν introduce una condición; en español, «Porque si» conserva la conexión lógica y el valor condicional de forma natural y digna.
- source_word: ἀγαπήσητε
  english_pob_choice: you love
  chosen_spanish: aman
  alternatives_spanish:
  - amen
  - quieran amar
  lexicon: BDAG
  rationale: 'El aoristo subjuntivo en condición general se expresa bien con presente: «aman». Mantiene el sentido idiomático sin forzar el aspecto verbal en español.'
- source_word: τοὺς ἀγαπῶντας ὑμᾶς
  english_pob_choice: those who love you
  chosen_spanish: a los que los aman
  alternatives_spanish:
  - a los que los quieren
  - a los que los aman
  lexicon: BDAG
  rationale: El participio funciona como sustantivo y designa a un grupo definido por su acción. «A los que los aman» conserva el vínculo léxico con ἀγαπάω y resulta natural en español.
- source_word: τίνα μισθὸν ἔχετε
  english_pob_choice: what reward do you have
  chosen_spanish: ¿qué recompensa tienen?
  alternatives_spanish:
  - ¿qué salario tienen?
  - ¿qué retribución tienen?
  lexicon: BDAG
  rationale: μισθός puede significar salario, paga, recompensa o retribución. En este contexto ético del Sermón del Monte, «recompensa» comunica mejor la idea de compensación esperada sin imponer una lectura técnica de mérito.
- source_word: οὐχὶ
  english_pob_choice: Do not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es verdad que
  lexicon: BDAG
  rationale: οὐχί introduce una pregunta retórica que espera asentimiento; en español, iniciar con «¿No…?» reproduce bien esa fuerza interrogativa.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - hasta
  lexicon: BDAG
  rationale: Aquí καί añade y enfatiza la comparación con los recaudadores de impuestos. «También» conserva la adición; el contraste retórico queda claro por el contexto y la estructura interrogativa.
- source_word: τελῶναι
  english_pob_choice: tax collectors
  chosen_spanish: los recaudadores de impuestos
  alternatives_spanish:
  - los publicanos
  - los cobradores de impuestos
  lexicon: BDAG
  rationale: El término designa a quienes recaudaban tributos, un grupo socialmente despreciado en el contexto evangélico. «Recaudadores de impuestos» es claro y neutral para el español moderno.
- source_word: τὸ αὐτὸ
  english_pob_choice: the same
  chosen_spanish: eso mismo
  alternatives_spanish:
  - lo mismo
  - la misma cosa
  lexicon: BDAG
  rationale: La expresión, después de «hacen», se vuelve idiomática en español como «eso mismo». Mantiene la referencia a la misma acción sin sonar rígida.
- source_word: ποιοῦσιν
  english_pob_choice: do
  chosen_spanish: hacen
  alternatives_spanish:
  - practican
  - realizan
  lexicon: BDAG
  rationale: ποιέω aquí significa efectuar la misma acción mencionada. «Hacen» es la equivalencia más natural en esta pregunta retórica.
theological_decisions:
- issue: Sentido de μισθός en el marco del Sermón del Monte
  english_pob_reading: reward
  chosen_spanish_reading: recompensa
  alternative_spanish_readings:
  - salario
  - retribución
  rationale: La pregunta contrapone el amor recíproco ordinario con una conducta que recibe evaluación divina en el contexto. «Recompensa» preserva ese valor moral y teológico sin reducirlo a una transacción mecánica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión más reciente: no se registran cambios aplicados en el pasaje fuente y la lectura inglesa aprobada coincide plenamente con el sentido griego del versículo.'
  spanish_consistency_notes:
  - Se mantiene «recaudadores de impuestos» para τελῶναι por claridad contemporánea; «publicanos» queda como alternativa histórica, pero no como texto principal.
  - Se prefirió «recompensa» para μισθός por coherencia con el contexto ético-teológico del pasaje.
  - Se conservó una estructura interrogativa directa y retórica en español para reflejar οὐχί.
  - No se usaron notas al pie porque no hay una variante textual o ambigüedad de traducción que requiera anclaje explícito en este versículo.
