translation:
  language: es
  text: Y todo lo que hagan[a], sea de palabra o de hecho, háganlo todo en el nombre del Señor Jesús[b], dando gracias a Dios el Padre por medio de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cualquier cosa que hagan»; también puede entenderse como «todo lo que ustedes hagan».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «en el nombre de» también puede implicar «bajo la autoridad de» o «como representantes de».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν ⸂ὅ τι⸃ ⸀ἐὰν ποιῆτε
  english_pob_choice: whatever you do
  chosen_spanish: todo lo que hagan
  alternatives_spanish:
  - cualquier cosa que hagan
  - todo cuanto hagan
  lexicon: BDAG
  rationale: La construcción griega expresa una totalidad indefinida y abierta. «Todo lo que hagan» comunica esa amplitud en español natural sin volverla más específica de lo que permite el texto.
- source_word: ἐν λόγῳ ἢ ἐν ἔργῳ
  english_pob_choice: in word or in deed
  chosen_spanish: de palabra o de hecho
  alternatives_spanish:
  - en palabra o en obra
  - en habla o en acción
  lexicon: BDAG
  rationale: El par griego contrasta lo verbal con lo práctico. «De palabra o de hecho» mantiene el paralelismo breve y suena idiomático en español; «obra» sería posible, pero «hecho» conserva mejor el contraste con la expresión verbal.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todas las cosas
  lexicon: BDAG
  rationale: El acusativo neutro plural resume de manera totalizadora lo anterior. En español, «todo» es la forma más compacta y natural para ese valor comprehensivo.
- source_word: ἐν ὀνόματι κυρίου Ἰησοῦ
  english_pob_choice: in the name of the Lord Jesus
  chosen_spanish: en el nombre del Señor Jesús
  alternatives_spanish:
  - bajo la autoridad del Señor Jesús
  - como representantes del Señor Jesús
  lexicon: BDAG
  rationale: Se conserva el idiomático «en el nombre de» para no reducir el alcance semántico a una sola paráfrasis. En español eclesial moderno, «Señor Jesús» es la forma más clara y fiel para κύριος Ἰησοῦς.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: En este contexto cristológico, κύριος funciona como título y no como simple designación social. «Señor» preserva el peso teológico y el uso bíblico establecido.
- source_word: εὐχαριστοῦντες
  english_pob_choice: giving thanks
  chosen_spanish: dando gracias
  alternatives_spanish:
  - agradeciendo
  lexicon: BDAG
  rationale: El participio presente expresa una acción concomitante y continua. «Dando gracias» es la equivalencia más natural en español y refleja ese matiz aspectual.
- source_word: τῷ ⸀θεῷ πατρὶ
  english_pob_choice: to God the Father
  chosen_spanish: a Dios el Padre
  alternatives_spanish:
  - a Dios, el Padre
  - al Dios y Padre
  lexicon: BDAG
  rationale: La apposición con πατρί se entiende con naturalidad en español como «el Padre». Se evita introducir una formulación más interpretativa que el griego no exige.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: El pronombre se refiere más naturalmente al Señor Jesús, el antecedente inmediato. «Por medio de él» conserva la mediación sin sobreespecificar ni perder claridad en español.
theological_decisions:
- issue: Valor de la expresión «en el nombre del Señor Jesús»
  english_pob_reading: Retain the idiom in the main text, allowing its range of authority, agency, and representation.
  chosen_spanish_reading: Mantener «en el nombre del Señor Jesús» en el texto principal.
  alternative_spanish_readings:
  - bajo la autoridad del Señor Jesús
  - como representantes del Señor Jesús
  rationale: La frase bíblica tiene un campo semántico amplio y no conviene resolverlo en una sola glosa. La forma idiomática preserva la tensión documentada por la POB en inglés y permite que el lector perciba la riqueza del giro.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Referencia de «por medio de él»
  english_pob_reading: The pronoun refers to the Lord Jesus as the mediator of thanksgiving to God the Father.
  chosen_spanish_reading: El pronombre se entiende como referencia al Señor Jesús, mediador de la acción de gracias al Padre.
  alternative_spanish_readings:
  - Referencia genérica al antecedente sin énfasis mediador explícito
  rationale: El antecedente inmediato es Jesús, y la sintaxis favorece esa lectura. La formulación española evita ampliar el texto, pero sí deja visible la mediación implícita en el pasaje y coherente con el patrón paulino.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y concuerda con el audit trail inglés: totalización amplia en πᾶν ὅ τι ἐὰν ποιῆτε, par verbal-práctico en ἐν λόγῳ ἢ ἐν ἔργῳ, conservación idiomática de ἐν ὀνόματι κυρίου Ἰησοῦ, y referencia mediadora de δι’ αὐτοῦ al Señor Jesús. No se detectan revisiones aplicadas en el registro fuente, y el texto se formula para ser publicable sin añadir paráfrasis innecesarias.'
  spanish_consistency_notes:
  - Se usa «Señor Jesús» de forma consistente para κύριος Ἰησοῦς.
  - Se mantiene «Dios el Padre»/«a Dios el Padre» como equivalente natural de τῷ θεῷ πατρὶ.
  - Se conserva el contraste breve «de palabra o de hecho» para reflejar el paralelismo griego.
  - No se reemplaza el idioma bíblico «en el nombre de» por una sola glosa interpretativa en el texto principal.
