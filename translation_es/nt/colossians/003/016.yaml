revisions:
- from: Que la palabra del Mesías habite en ustedes[a] ricamente, en toda sabiduría, enseñándose y amonestándose unos a otros con salmos, himnos y cánticos espirituales[b], cantando con gracia en sus corazones a Dios.
  to: Que la palabra del Mesías habite en ustedes[a] ricamente, en toda sabiduría, enseñando y amonestando unos a otros con salmos, himnos y cánticos espirituales[b], cantando con gracia en sus corazones a Dios.
  rationale: Se ajusta únicamente la construcción recíproca para evitar la duplicación de «se» + «unos a otros». «Enseñando y amonestando unos a otros» representa fielmente διδάσκοντες καὶ νουθετοῦντες ἑαυτοὺς y suena más natural en español, sin alterar ninguna decisión léxica o teológica principal.
