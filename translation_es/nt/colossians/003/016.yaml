    reason: alternative_reading
  - marker: b
    text: O «con gratitud». La expresión griega ἐν χάριτι puede denotar gracia, amabilidad o agradecimiento según el contexto.
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la construcción recíproca para evitar la duplicación de «se» + «unos a otros». «Enseñando y amonestando unos a otros» representa fielmente διδάσκοντες καὶ νουθετοῦντες ἑαυτοὺς y suena más natural en español, sin alterar ninguna decisión léxica o teológica principal.
