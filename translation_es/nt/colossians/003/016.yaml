translation:
  language: es
  text: Que la palabra del Mesías habite en ustedes[a] ricamente, en toda sabiduría, enseñando y amonestando unos a otros con salmos, himnos y cánticos espirituales[b], cantando con gracia en sus corazones a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre ustedes». El griego plural puede enfatizar que la palabra habita en la comunidad como conjunto, o en cada creyente individualmente.
    reason: alternative_reading
  - marker: b
    text: O «con gratitud». La expresión griega ἐν χάριτι puede denotar gracia, amabilidad o agradecimiento según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: BDAG
  rationale: «Palabra» conserva el rango semántico amplio de λόγος y encaja de manera natural en español para el contenido/expresión que debe habitar en la comunidad.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - acerca del Mesías
  lexicon: BDAG
  rationale: Se mantiene Χριστός como título mesiánico, no como simple nombre litúrgico. «Del Mesías» conserva el genitivo sin forzarlo hacia una relación única (origen, pertenencia o contenido).
- source_word: ἐνοικείτω
  english_pob_choice: let ... dwell
  chosen_spanish: habite
  alternatives_spanish:
  - more
  - resida
  - viva
  lexicon: BDAG
  rationale: El imperativo presente pide una acción continua. «Habite» conserva mejor la metáfora de permanencia activa que un equivalente más plano.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  - en vosotros
  lexicon: BDAG
  rationale: El pronombre plural permite un sentido corporativo y también personal. «En ustedes» mantiene la apertura del griego sin perder naturalidad en español.
- source_word: πλουσίως
  english_pob_choice: richly
  chosen_spanish: ricamente
  alternatives_spanish:
  - abundantemente
  lexicon: BDAG
  rationale: «Ricamente» reproduce el adverbio con buena transparencia y conserva la imagen de plenitud o abundancia.
- source_word: ἐν πάσῃ σοφίᾳ
  english_pob_choice: in all wisdom
  chosen_spanish: en toda sabiduría
  alternatives_spanish:
  - con toda sabiduría
  lexicon: BDAG
  rationale: La frase es sintácticamente flexible. «En toda sabiduría» sigue de cerca el griego y deja abierta su relación con el verbo principal y con lo que sigue.
- source_word: διδάσκοντες
  english_pob_choice: teaching
  chosen_spanish: enseñándose
  alternatives_spanish:
  - enseñando
  - instruyéndose
  lexicon: BDAG
  rationale: En contexto recíproco, el participio expresa acción mutua dentro de la comunidad. «Enseñándose» refleja ese valor relacional sin perder el sentido básico.
- source_word: νουθετοῦντες
  english_pob_choice: admonishing
  chosen_spanish: amonestándose
  alternatives_spanish:
  - advirtiéndose
  - exhortándose
  lexicon: BDAG
  rationale: «Amonestar» preserva el matiz correctivo de νουθετέω mejor que un término demasiado general.
- source_word: ἑαυτοὺς
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - a sí mismos
  - entre sí
  lexicon: BDAG
  rationale: Aunque formalmente reflexivo, aquí funciona de manera recíproca. «Unos a otros» es la equivalencia natural en español y preserva la mutua edificación.
- source_word: ψαλμοῖς, ὕμνοις, ᾠδαῖς πνευματικαῖς
  english_pob_choice: with psalms, hymns, and spiritual songs
  chosen_spanish: con salmos, himnos y cánticos espirituales
  alternatives_spanish:
  - con salmos, himnos y canciones espirituales
  lexicon: BDAG
  rationale: Se conservan los tres términos distintos y se une πνευματικαῖς con «cánticos», como en el griego. «Cánticos» es natural y suficientemente amplio para ᾠδαῖς.
- source_word: ἐν χάριτι
  english_pob_choice: with grace
  chosen_spanish: con gracia
  alternatives_spanish:
  - con gratitud
  - con agradecimiento
  - graciosamente
  lexicon: BDAG
  rationale: «Con gracia» mantiene la forma léxica y deja abierta la gama de sentidos. La ambigüedad entre gracia, gratitud y gracia expresiva no se borra en el texto principal.
- source_word: ᾄδοντες
  english_pob_choice: singing
  chosen_spanish: cantando
  alternatives_spanish:
  - entonando
  lexicon: BDAG
  rationale: Participio directo y natural en español.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - con sus corazones
  - en sus corazones
  lexicon: BDAG
  rationale: «En sus corazones» conserva la interioridad y la dirección afectiva del canto. Se adapta el posesivo a la segunda persona plural de español natural.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: BDAG
  rationale: El dativo expresa destinatario/dirección de la alabanza. «A Dios» es la equivalencia directa y natural en español.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se conserva el valor titular de Χριστός según la guía doctrinal del proyecto. En este contexto no se neutraliza con un nombre devocional tradicional si el título aporta sentido histórico y bíblico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Messiah (where title; Christ where name-like)'
- issue: Alcance de ἐν ὑμῖν
  english_pob_reading: in you
  chosen_spanish_reading: en ustedes
  alternative_spanish_readings:
  - entre ustedes
  - en vosotros
  rationale: El plural permite una lectura comunitaria sin excluir la apropiación personal. La redacción española conserva esa tensión en vez de resolverla unilateralmente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Sentido de ἐν χάριτι
  english_pob_reading: with grace
  chosen_spanish_reading: con gracia
  alternative_spanish_readings:
  - con gratitud
  - con agradecimiento
  rationale: La expresión es genuinamente ambigua entre gracia, gratitud y una actitud grata. La lectura principal mantiene la forma más transparente, mientras la alternativa queda preservada implícitamente en la decisión léxica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que cambió «Messiah» por «Christ» y luego fue corregida para restaurar «Messiah» según la política doctrinal del proyecto; también osciló entre «among you» e «in you» para ἐν ὑμῖν. Esta propuesta española sigue la decisión restaurada de «Mesías» y conserva la tensión entre lectura comunitaria e individual con una nota.
  spanish_consistency_notes:
  - Se mantiene «Mesías» de forma consistente con la política de términos controvertidos del proyecto.
  - Se usa «Dios» para θεός y «gracia» para χάρις, preservando la ambigüedad indicada por el audit trail.
  - Se emplea español neutral latinoamericano con «ustedes» para una lectura amplia y pública.
