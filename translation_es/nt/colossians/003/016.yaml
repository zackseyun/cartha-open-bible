source:
  edition: SBLGNT
  text: ὁ λόγος τοῦ Χριστοῦ ἐνοικείτω ἐν ὑμῖν πλουσίως ἐν πάσῃ σοφίᾳ· διδάσκοντες καὶ νουθετοῦντες ἑαυτοὺς ⸀ψαλμοῖς, ⸀ὕμνοις, ᾠδαῖς πνευματικαῖς ⸀ἐν χάριτι, ᾄδοντες ἐν ⸂ταῖς καρδίαις⸃ ὑμῶν τῷ ⸀θεῷ·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/016.yaml
  text: Let the word of Messiah dwell in you richly in all wisdom[a], teaching and admonishing one another with psalms, hymns, and spiritual songs[b], singing with grace in your hearts to God.
  footnotes:
  - marker: a
    text: Or "in you"; the Greek plural can emphasize the word dwelling within the community as a whole or within the believers individually.
    reason: alternative_reading
  - marker: b
    text: Or "with thankfulness." The Greek phrase ἐν χάριτι can denote grace, graciousness, or gratitude/thankfulness in context.
    reason: lexical_alternative
