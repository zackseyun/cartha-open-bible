    unchanged: false
    changes_summary: 'Changed ''the Messiah'' to ''Christ'' for closer lexical correspondence to Χριστός and more natural consistency in this epistolary context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Cuando se manifieste el Mesías[a], quien es su vida[b], entonces también ustedes serán revelados con él en gloria[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo» en lugar de «el Mesías». Χριστός puede verterse de ambas maneras; aquí se eligió «Mesías» para conservar el valor titular del término.
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «el Mesías, su vida». El griego presenta una apposición que identifica al Mesías con la vida de ustedes.'
    reason: lexical_alternative
  - marker: c
    text: O «aparecerán con él en gloria». El verbo griego es el mismo radical que aparece antes en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal futura con subjuntivo. «Cuando» es la forma más natural y fiel al valor prospectivo aquí.
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El artículo y el contexto favorecen el valor titular de Χριστός. En español, «Mesías» conserva ese título con la misma carga semántica que la POB inglesa buscó preservar.
- source_word: φανερωθῇ
  english_pob_choice: is revealed
  chosen_spanish: se manifieste
  alternatives_spanish:
  - sea revelado
  - aparezca
  lexicon: BDAG
  rationale: El pasivo aoristo subjuntivo de φανερόω pide una forma pasiva/reflexiva que conserve la idea de hacerse visible o evidente. «Se manifieste» mantiene ese matiz sin sonar forzado en español.
- source_word: ἡ ζωὴ ὑμῶν
  english_pob_choice: who is your life
  chosen_spanish: quien es su vida
  alternatives_spanish:
  - su vida
  lexicon: BDAG
  rationale: 'El griego es apposicional: «el Mesías, vuestra vida». En español, una relativa explicita esa identificación sin perder la tensión léxica; «su vida» solo sería más breve, pero menos claro respecto de la apposición.'
- source_word: τότε καὶ
  english_pob_choice: then ... also
  chosen_spanish: entonces también
  alternatives_spanish:
  - entonces ... también
  lexicon: BDAG
  rationale: «Entonces» traduce τότε y «también» conserva el énfasis inclusivo de καί.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis. «Ustedes» es natural en español latinoamericano y conserva la referencia plural.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: BDAG
  rationale: σύν denota asociación cercana. «Con él» es suficiente y natural; «junto con él» es posible pero más pesado.
- source_word: φανερωθήσεσθε
  english_pob_choice: will be revealed
  chosen_spanish: serán manifestados
  alternatives_spanish:
  - aparecerán
  - serán revelados
  lexicon: BDAG
  rationale: Conviene mantener la misma raíz semántica que en φανερωθῇ para conservar el paralelismo verbal. «Serán manifestados» comunica el pasivo futuro y la correspondencia con la manifestación del Mesías.
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - gloriosamente
  - en esplendor
  lexicon: BDAG
  rationale: La frase preposicional es breve y teológicamente densa. «En gloria» preserva la esfera o modo de la manifestación futura sin añadir explicación.
theological_decisions:
- issue: Título cristológico Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Siguiendo la pauta del proyecto, el título se traduce como «Mesías» cuando el contexto es titular y no un nombre fijo. Eso preserva el sentido original del término griego y evita una transliteración innecesaria.
  doctrine_reference: 'DOCTRINE.md: traducir títulos, transliterar nombres; tabla de términos controvertidos para Χριστός'
- issue: Identificación apposicional de Mesías con la vida de los creyentes
  english_pob_reading: who is your life
  chosen_spanish_reading: quien es su vida
  alternative_spanish_readings:
  - su vida
  rationale: El griego identifica al Mesías con la vida de los creyentes. La relativa en español hace explícita esa identificación sin suavizarla ni convertirla en una simple metáfora.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación editorial entre «Christ» y «Messiah», con restauración final de «Messiah» por coherencia doctrinal. La traducción española sigue esa última decisión y mantiene el título como «Mesías». También conserva el paralelismo verbal entre la manifestación presente/futura del Mesías y la de los creyentes.
  spanish_consistency_notes:
  - Se usa «Mesías» en el texto principal, de acuerdo con la política del proyecto para Χριστός como título.
  - Se mantiene el mismo campo léxico de φανερόω con «se manifieste» / «serán manifestados» para preservar el paralelismo.
  - «Ustedes» refleja el plural explícito de ὑμεῖς y funciona de manera natural en español latinoamericano.
  - «En gloria» se conserva sin ampliación interpretativa para respetar la concisión del original.
