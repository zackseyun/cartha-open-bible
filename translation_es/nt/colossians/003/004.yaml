  text: ὅταν ὁ Χριστὸς φανερωθῇ, ἡ ζωὴ ⸀ὑμῶν, τότε καὶ ὑμεῖς σὺν αὐτῷ φανερωθήσεσθε ἐν δόξῃ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/004.yaml
  text: When Messiah[a], who is your life, is revealed[c][b], then you also will be revealed with him in glory.
  footnotes:
  - marker: a
    text: Or 'Christ' instead of 'the Messiah.' The Greek title Χριστός can be rendered either way; here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the Messiah, your life.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will appear with him in glory.' The Greek verb is the same root used earlier in the verse.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
