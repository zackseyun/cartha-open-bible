revisions:
- from: soportándoos unos a otros y perdonándoos unos a otros[a], si alguno tiene queja contra otro; de la misma manera que el Señor también os perdonó[b], así también vosotros.
  to: sobrellevándose unos a otros y perdonándose mutuamente, si alguno tiene una queja[a] contra otro; así como el Señor también los perdonó[b], así también deben hacer ustedes.
  rationale: Se sustituyeron las formas peninsulares por español neutral. Se mejoró la fluidez con «sobrellevándose» y «perdonándose mutuamente», manteniendo el sentido recíproco de ἀλλήλων / ἑαυτοῖς. Se reubicó la nota [a] sobre «queja», donde realmente aplica la alternativa léxica. En la cláusula final se explicitó el verbo como en la revisión inglesa auditada, pero de manera moderada («deben hacer ustedes»), y la nota preserva la elipsis del griego y la alternativa más específica «deben perdonar».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del griego: dos participios exhortativos, la condición genérica sobre una queja, y la comparación con el perdón del Señor. Sin embargo, no preserva bien el estilo objetivo del proyecto en español neutral porque usa formas peninsulares enclíticas («soportándoos», «perdonándoos», «os perdonó», «vosotros»), mientras la meta declarada es español neutral latinoamericano / ampliamente eclesial. Además, la elipsis final puede mantenerse, pero en español suena demasiado truncada; dado que el inglés auditado ya hizo explícito «must do», conviene completar el sentido de forma natural sin sobreinterpretar.'
  spanish_quality_summary: La redacción es comprensible, pero suena marcadamente peninsular y algo mecánica por la repetición de «unos a otros» con enclíticos. Una formulación con «sobrellevándose» / «perdonándose mutuamente» mejora la naturalidad y mantiene la reciprocidad. También conviene ajustar la nota [a], que actualmente comenta la cláusula condicional pero está anclada en «unos a otros», lo cual desubica la alternativa. La nota [b] puede mantenerse, pero adaptada al texto revisado.
  glossary_alignment: «el Señor» alinea bien con κύριος. «perdonó» para ἐχαρίσατο y «queja» para μομφήν son opciones válidas. El principal desalineamiento es de registro dialectal, no de glosario teológico. No hay conflicto con los términos doctrinales por defecto del proyecto.
  issues:
  - severity: medium
    issue: Registro dialectal peninsular en lugar de español neutral
    rationale: «soportándoos», «perdonándoos», «os», «vosotros» no encajan con la meta de español neutral latinoamericano / ampliamente eclesial.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota ofrece una alternativa para «si alguno tiene queja contra otro», pero el marcador está puesto en «unos a otros», donde no corresponde.
  - severity: low
    issue: Cierre final demasiado elíptico en español
    rationale: «así también vosotros» reproduce la elipsis griega, pero en español queda abrupto. Completar con «deben hacer ustedes» o equivalente preserva el sentido exhortativo y sigue la revisión inglesa auditada.
  revised_spanish_text: sobrellevándose unos a otros y perdonándose mutuamente, si alguno tiene una queja[a] contra otro; así como el Señor también los perdonó[b], así también deben hacer ustedes.
  revised_footnotes:
