translation:
  language: es
  text: sobrellevándose unos a otros y perdonándose mutuamente, si alguno tiene una queja[a] contra otro; así como el Señor también los perdonó[b], así también deben hacer ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si alguno tiene un agravio contra otro».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego deja implícito el verbo final; algunas traducciones lo hacen explícito: «así también ustedes deben perdonar».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνεχόμενοι
  english_pob_choice: bearing with
  chosen_spanish: soportándoos
  alternatives_spanish:
  - aguantándoos
  - sobrellevándoos
  - tolerándoos
  lexicon: BDAG
  rationale: El participio presente describe una acción continua dentro de una exhortación comunitaria. «Soportándoos» comunica bien la idea relacional de paciencia mutua sin sonar tan áspero como «aguantándoos» y sin perder la fuerza práctica del verbo.
- source_word: ἀλλήλων
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - el uno al otro
  - entre sí
  lexicon: BDAG
  rationale: En español, «unos a otros» es la forma más natural y recíproca para este contexto comunitario, conservando la mutualidad del griego.
- source_word: χαριζόμενοι
  english_pob_choice: forgiving
  chosen_spanish: perdonándoos
  alternatives_spanish:
  - perdonando
  - mostrando gracia a
  - concediéndoos perdón
  lexicon: BDAG
  rationale: Aquí el verbo indica remisión de ofensa. «Perdonándoos» es la equivalencia idiomática más clara en español, aunque la relación léxica con χάρις/χαρίζομαι queda implícita en el contexto y en la nota sobre el tema del perdón.
- source_word: ἑαυτοῖς
  english_pob_choice: each other
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre vosotros
  - mutuamente
  lexicon: BDAG
  rationale: Aunque formalmente reflexivo, el sentido es recíproco. En español se evita una repetición forzada y se mantiene la relación mutua con la misma construcción de la primera cláusula.
- source_word: ἐάν τις πρός τινα ἔχῃ μομφήν
  english_pob_choice: if anyone has a complaint against anyone
  chosen_spanish: si alguno tiene queja contra otro
  alternatives_spanish:
  - si alguno tiene una reclamación contra otro
  - si alguno tiene una queja contra alguien
  - si alguno tiene agravio contra otro
  lexicon: BDAG
  rationale: La cláusula es genérica e indefinida. «Queja» es natural en español y suficientemente amplia para μομφή, sin volverla más jurídica de lo que el griego exige. «Contra otro» refleja la relación interpersonal del original.
- source_word: μομφήν
  english_pob_choice: complaint
  chosen_spanish: queja
  alternatives_spanish:
  - agravio
  - reproche
  - reclamación
  lexicon: BDAG
  rationale: «Queja» funciona bien en un contexto cotidiano y relacional. «Agravio» puede sonar más fuerte y formal; «reproche» desplaza el énfasis hacia la censura; «reclamación» suena demasiado jurídico.
- source_word: καθὼς καὶ
  english_pob_choice: just as ... also
  chosen_spanish: de la misma manera que ... también
  alternatives_spanish:
  - así como
  - tal como ... también
  lexicon: BDAG
  rationale: La correlación comparativa necesita claridad en español. «De la misma manera que ... también» conserva la relación entre el modelo del Señor y la conducta de los creyentes.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional, sin ocultar el término. En el contexto de Colosenses y del paralelismo ético, «el Señor» resulta natural y fiel al auditorio eclesial hispanohablante.
- source_word: ἐχαρίσατο
  english_pob_choice: forgave
  chosen_spanish: os perdonó
  alternatives_spanish:
  - os concedió perdón
  - os mostró gracia al perdonaros
  - os perdonó gratuitamente
  lexicon: BDAG
  rationale: El aoristo de χαρίζομαι expresa aquí perdón efectivo. «Os perdonó» es la forma más directa e idiomática en español; la dimensión de gracia queda en el verbo griego y en la relación semántica con χαριζόμενοι.
- source_word: οὕτως καὶ ὑμεῖς
  english_pob_choice: so also you
  chosen_spanish: así también vosotros
  alternatives_spanish:
  - vosotros también así
  - de igual modo vosotros
  lexicon: BDAG
  rationale: El griego deja el verbo implícito al final. En español conviene preservar esa elipsis parcial con «así también vosotros», que suena natural y mantiene el cierre exhortativo sin añadir un verbo que no está explícito en el texto.
theological_decisions:
- issue: Relación entre perdón humano y el perdón recibido del Señor
  english_pob_reading: Just as the Lord also forgave you, so also you must do.
  chosen_spanish_reading: De la misma manera que el Señor también os perdonó, así también vosotros.
  alternative_spanish_readings:
  - '... así también vosotros debéis perdonar.'
  - '... así también vosotros debéis hacerlo.'
  rationale: El griego final es elíptico; la traducción española conserva esa concisión en vez de resolverla con un verbo añadido. La nota explica que el sentido exhortativo se entiende del contexto, sin forzar más de lo que la forma griega expresa.
  doctrine_reference: Col. 3:13; relación entre gracia recibida y perdón mutuo cristiano
translation_notes:
  revision_awareness: He seguido el último ajuste del inglés auditado, que hace explícita la idea exhortativa final, pero en español opté por conservar la elipsis del griego con una formulación natural («así también vosotros») y una nota que aclara el sentido implícito. También mantuve la reciprocidad con una formulación uniforme en ambas cláusulas para evitar una traducción rígida o redundante.
  spanish_consistency_notes:
  - Se usó «el Señor» para κύριος, coherente con el uso cristológico del pasaje y con la práctica del proyecto cuando el contexto apunta a Cristo.
  - Se prefirió «perdonar» para χαρίζομαι/ἐχαρίσατο por claridad idiomática, sin perder de vista la raíz de gracia en las decisiones léxicas.
  - Se evitó «SEÑOR» como máscara tipográfica; se tradujo el título de manera transparente.
  - La segunda cláusula conserva la elipsis del original, pero la nota de pie de página asegura la inteligibilidad pastoral y auditabilidad textual.
  - «Queja» reproduce el tono interpersonal de μομφή mejor que opciones más técnicas o más intensas.
