translation:
  language: es
  text: Si[a], pues, ustedes fueron resucitados con el Mesías[b], busquen las cosas de arriba, donde el Mesías está, sentado a la derecha de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Puesto que, pues, ustedes han sido resucitados con el Mesías». El griego conserva una forma condicional («Si, entonces») que probablemente da por verdadera la condición en el contexto.'
    reason: alternative_reading
  - marker: b
    text: Griego «Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ οὖν
  english_pob_choice: If, then
  chosen_spanish: Si, pues
  alternatives_spanish:
  - Entonces, si
  - Puesto que, pues
  lexicon: BDAG
  rationale: Conserva la forma condicional e inferencial del griego sin convertirla en una afirmación puramente causal. 'Si, pues' suena natural en español y mantiene la tensión retórica del texto, que presupone la condición sin eliminarla.
- source_word: συνηγέρθητε
  english_pob_choice: you were raised
  chosen_spanish: fueron resucitados
  alternatives_spanish:
  - han sido resucitados
  - resucitaron juntamente
  lexicon: BDAG
  rationale: El aoristo pasivo indica una acción pasada realizada sobre los creyentes. 'Fueron resucitados' refleja bien la forma verbal y el sentido de unión con Cristo/Mesías expresado por el verbo compuesto.
- source_word: τῷ Χριστῷ
  english_pob_choice: with the Messiah
  chosen_spanish: con el Mesías
  alternatives_spanish:
  - con Cristo
  lexicon: BDAG
  rationale: Se sigue la pauta del proyecto para Χριστός como título. En español, 'Mesías' conserva el valor titular y evita tratar el término como un nombre fijo cuando el contexto paulino sigue activando su sentido de ungido.
- source_word: τὰ ἄνω
  english_pob_choice: the things above
  chosen_spanish: las cosas de arriba
  alternatives_spanish:
  - lo de arriba
  - las realidades de arriba
  - las cosas celestiales
  lexicon: BDAG
  rationale: El neutro plural sustantivado se vierte de forma amplia y natural. 'Las cosas de arriba' mantiene la pluralidad y la referencia espacial/escatológica sin interpretar más de lo que el griego dice.
- source_word: ζητεῖτε
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - sigan buscando
  - procuren
  lexicon: BDAG
  rationale: El imperativo presente pide una orientación continua. 'Busquen' es el equivalente directo y claro en español; en este contexto comunica bien la exhortación sin añadir matices no explicitados por el griego.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  lexicon: BDAG
  rationale: El adverbio relativo locativo se traduce con 'donde', que introduce de manera natural la cláusula relativa en español y conserva la localización del Mesías en el ámbito 'de arriba'.
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el mismo tratamiento titular para Χριστός dentro de la misma frase. Esto preserva la coherencia terminológica y la fuerza mesiánica del texto.
- source_word: ἐν δεξιᾷ τοῦ θεοῦ
  english_pob_choice: at the right hand of God
  chosen_spanish: a la derecha de Dios
  alternatives_spanish:
  - a la diestra de Dios
  - junto a la derecha de Dios
  lexicon: BDAG
  rationale: La expresión es una fórmula exaltatoria/real. 'A la derecha de Dios' es natural y fiel; se evita una construcción arcaica sin perder la imagen de autoridad y honor.
- source_word: καθήμενος
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - sentado en trono
  - entronizado
  lexicon: BDAG
  rationale: El participio presente describe la posición actual del Mesías. 'Sentado' es la equivalencia más directa en español; 'entronizado' explicita una implicación teológica real pero va más allá del término griego.
theological_decisions:
- issue: Cómo renderizar Χριστός en este contexto paulino
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La lectura del proyecto trata Χριστός como título cuando el contexto lo sostiene. Aquí el énfasis está en la identidad mesiánica del resucitado/exaltado, por lo que 'Mesías' comunica mejor el valor titular que una transliteración devocional fija.
  doctrine_reference: 'DOCTRINE.md: términos en disputa; Χριστός → Mesías cuando funciona como título.'
- issue: Mantener la fuerza condicional de Εἰ οὖν
  english_pob_reading: If, then
  chosen_spanish_reading: Si, pues
  alternative_spanish_readings:
  - Puesto que, pues
  - Ya que, entonces
  rationale: La cláusula griega conserva forma condicional aun cuando el argumento asume la realidad del hecho. Traducirla como 'Si, pues' preserva esa tensión textual y evita convertirla sin más en una causal explícita.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla innecesariamente.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del texto fuente y del criterio de traducción aprobado. Se mantiene la decisión de conservar la condición griega y el valor titular de Χριστός como Mesías.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός de forma consistente con la pauta del proyecto.
  - Se conserva la estructura condicional 'Si, pues' para no borrar la tensión del griego.
  - '''A la derecha de Dios'' se prefiere por naturalidad en español, sin perder la imagen regia de exaltación.'
