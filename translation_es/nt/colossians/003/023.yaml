translation:
  language: es
  text: Todo lo que hagan, trabajen[a] de corazón, como para el Señor y no para los hombres[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con toda su alma» o «de corazón»; literalmente, «desde el alma».
    reason: lexical_alternative
  - marker: b
    text: O «personas»; el griego «hombres» aquí es un término genérico para los seres humanos, en contraste con el Señor.
    reason: lexical_alternative
  - marker: c
    text: «Señor» también puede entenderse con el matiz de «Amo» en este contexto doméstico.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃ ἐὰν ποιῆτε
  english_pob_choice: Whatever you do
  chosen_spanish: Todo lo que hagan
  alternatives_spanish:
  - Cualquier cosa que hagan
  - Todo cuanto hagan
  lexicon: BDAG
  rationale: El relativo neutro con ἐάν expresa generalidad indefinida. En español, «Todo lo que hagan» comunica bien esa amplitud sin sonar forzado.
- source_word: ἐκ ψυχῆς
  english_pob_choice: from the soul
  chosen_spanish: de corazón
  alternatives_spanish:
  - desde el alma
  - con toda el alma
  - de alma
  lexicon: BDAG
  rationale: El sentido literal es «desde el alma», pero en español bíblico «de corazón» expresa de manera natural la sinceridad interior y la entrega completa que el giro griego comunica. Se conserva la fuerza interna sin una frase poco idiomática.
- source_word: ἐργάζεσθε
  english_pob_choice: work
  chosen_spanish: háganlo
  alternatives_spanish:
  - trabajen
  - obren
  lexicon: BDAG
  rationale: El verbo exhorta a una acción diligente en el contexto de las tareas de la vida diaria. «Háganlo» integra naturalmente el mandato con el relativo general previo; «trabajen» sería también posible, pero suena menos flexible respecto de «lo que hagan».
- source_word: ὡς τῷ κυρίῳ
  english_pob_choice: as for the Lord
  chosen_spanish: como para el Señor
  alternatives_spanish:
  - como para Yahvé
  - como para el Amo
  lexicon: BDAG
  rationale: Se mantiene «Señor» porque el contexto cristológico de Colosenses y el uso del término κύριος en el audit trail inglés apuntan al Señor exaltado. «Como para» expresa adecuadamente la orientación del trabajo.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: Se conserva la oposición formal del griego entre el Señor y los seres humanos. «Los hombres» reproduce el contraste tradicional sin perder el carácter genérico del término.
theological_decisions:
- issue: Rendering of κύριος in a household-instruction context
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Amo
  - Dueño
  rationale: Aunque el pasaje pertenece a instrucciones domésticas, el contexto más amplio de Colosenses favorece leer κύριος como título cristológico. Por eso se traduce «Señor»; las opciones «Amo» o «Dueño» captan un matiz de autoridad, pero no son la lectura principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y coincide con el audit trail inglés en las decisiones clave: generalidad de ὃ ἐὰν ποιῆτε, literalidad semántica de ἐκ ψυχῆς, y el contraste entre κύριος y ἀνθρώποις. No se detectaron revisiones aplicadas en el expediente inglés; por eso el español mantiene la misma lectura principal y solo adapta la expresión a un español natural.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al criterio doctrinal del proyecto.
  - Se evita «SEÑOR» como máscara tipográfica; se escribe el título con mayúscula inicial normal.
  - «de corazón» funciona aquí como equivalente natural de «from the soul» sin perder la tensión literal/documentable del griego.
  - «los hombres» conserva la oposición con el Señor y refleja el uso genérico de ἀνθρώποις.
