translation:
  language: es
  text: Maridos[a], amen a sus esposas, y no sean ásperos con ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se amarguen con ellas». El verbo griego puede denotar volverse amargo o resentido, pero aquí probablemente se refiere a un trato áspero o resentido hacia ellas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἄνδρες
  english_pob_choice: Husbands
  chosen_spanish: Maridos
  alternatives_spanish:
  - Hombres
  lexicon: BDAG
  rationale: En este contexto de deberes domésticos y con γυναῖκας como complemento directo, el sentido relacional es el de esposos. «Maridos» conserva ese valor matrimonial sin volverlo genérico.
- source_word: ἀγαπᾶτε
  english_pob_choice: love
  chosen_spanish: amen
  alternatives_spanish:
  - amen de corazón
  - tengan amor por
  lexicon: BDAG
  rationale: ἀγαπάω expresa aquí el mandato de amar; «amen» mantiene la fuerza imperativa y la conexión léxica con el campo de ἀγάπη sin añadir explicación.
- source_word: τὰς γυναῖκας
  english_pob_choice: your wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - las esposas
  - sus mujeres
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa», pero el contexto exige el sentido marital. En español, «esposas» comunica con naturalidad la relación sin necesidad de suplir «sus» como un calco explicativo excesivo.
- source_word: μὴ πικραίνεσθε
  english_pob_choice: do not be harsh
  chosen_spanish: no sean duros
  alternatives_spanish:
  - no se amarguen
  - no sean amargados
  - no las traten con dureza
  lexicon: BDAG
  rationale: πικραίνω tiene la idea básica de amargar, pero el contexto con πρός αὐτάς apunta a una actitud/trato áspero o resentido. «No sean duros» expresa bien esa fuerza relacional en español natural, sin borrar la tensión semántica que también puede sugerir «amargarse».
- source_word: πρὸς αὐτάς
  english_pob_choice: toward them
  chosen_spanish: con ellas
  alternatives_spanish:
  - hacia ellas
  - contra ellas
  lexicon: BDAG
  rationale: La preposición πρός con acusativo señala dirección o relación. En español, «con ellas» funciona de manera idiomática con «ser duros» y mantiene la referencia interpersonal, aunque «hacia ellas» conserva más literalmente la dirección.
theological_decisions:
- issue: Address to husbands and wives in a household code
  english_pob_reading: Retain the gender-specific and marital address as 'Husbands' and 'wives.'
  chosen_spanish_reading: Mantener el llamado específico a los maridos en relación con sus esposas.
  alternative_spanish_readings:
  - hombres / mujeres
  - personas casadas
  rationale: El griego es explícitamente masculino y matrimonial; no hay base para generalizarlo. La traducción española debe conservar esa dirección pastoral concreta.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; la lectura inglesa final permaneció sin cambios, con acuerdo alto en la verificación cruzada.
  spanish_consistency_notes:
  - Se conservó el tratamiento marital específico del griego, evitando un lenguaje genérico.
  - Se eligió un español natural («no sean duros con ellas») para reproducir el matiz relacional de πικραίνεσθε sin perder la posible alternativa semántica de «amargarse».
  - Se usó «esposas» para comunicar con claridad el valor contextual de γυναῖκας en el marco doméstico.
