  text: μὴ ψεύδεσθε εἰς ἀλλήλους· ἀπεκδυσάμενοι τὸν παλαιὸν ἄνθρωπον σὺν ταῖς πράξεσιν αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/009.yaml
  text: Do not lie to one another[a], since you have stripped off the old man with his practices[b],
  footnotes:
  - marker: a
    text: Or 'having stripped off' or 'because you have put off.' The Greek participle can be rendered more formally, but here it likely gives the reason for the command.
    reason: lexical_alternative
  - marker: b
    text: Or 'the old self.' Greek 'the old man' preserves Paul's contrast with the 'new man' in the next verse.
    reason: lexical_alternative
