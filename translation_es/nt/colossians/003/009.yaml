translation:
  language: es
  text: No se mientan unos a otros, ya que se han despojado[a] del hombre viejo con sus prácticas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiéndose despojado», «después de haberse despojado» o «puesto que se han despojado». El participio griego puede traducirse de manera más formal, pero aquí probablemente expresa la base del mandato.
    reason: lexical_alternative
  - marker: b
    text: O «el viejo yo». El griego «el hombre viejo» preserva el contraste de Pablo con el «hombre nuevo» en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ψεύδεσθε
  english_pob_choice: Do not lie
  chosen_spanish: No se mientan
  alternatives_spanish:
  - No digan mentiras
  - No se engañen
  lexicon: BDAG
  rationale: El imperativo negativo expresa una prohibición directa. «Mentir(se)» reproduce con naturalidad ψεύδομαι en este contexto, y la forma reflexiva plural conserva la reciprocidad de la exhortación.
- source_word: εἰς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre ustedes
  - los unos a los otros
  lexicon: BDAG
  rationale: La expresión recíproca se traduce de manera idiomática en español con «unos a otros», que preserva el valor mutuo sin sonar forzado.
- source_word: ἀπεκδυσάμενοι
  english_pob_choice: since you have stripped off
  chosen_spanish: habiéndose despojado
  alternatives_spanish:
  - ya que se han despojado
  - después de despojarse
  - puesto que se han quitado
  lexicon: BDAG
  rationale: El participio aoristo medio se entiende como base de la exhortación. «Habiéndose despojado» mantiene la relación participial sin añadir una conjunción causal que el griego no exige explícitamente.
- source_word: τὸν παλαιὸν ἄνθρωπον
  english_pob_choice: the old man
  chosen_spanish: el hombre viejo
  alternatives_spanish:
  - el viejo hombre
  - el viejo yo
  - la vieja humanidad
  lexicon: BDAG
  rationale: Se conserva la metáfora paulina y el contraste con el «hombre nuevo» del versículo siguiente. «El hombre viejo» mantiene el paralelismo y evita suavizar el término con una paráfrasis interpretativa.
- source_word: σὺν ταῖς πράξεσιν αὐτοῦ
  english_pob_choice: with his practices
  chosen_spanish: con sus prácticas
  alternatives_spanish:
  - con sus obras
  - con sus acciones
  - con sus costumbres
  lexicon: BDAG
  rationale: πρᾶξις apunta a conductas o prácticas habituales; «prácticas» comunica bien la idea de patrón de vida. El posesivo «sus» concuerda con la referencia masculina singular de «el hombre viejo» en español.
theological_decisions:
- issue: Valor de τὸν παλαιὸν ἄνθρωπον como contraste antropológico paulino
  english_pob_reading: the old man
  chosen_spanish_reading: el hombre viejo
  alternative_spanish_readings:
  - el viejo yo
  - la vieja humanidad
  rationale: Se conserva el lenguaje figurado de Pablo para mantener el contraste con el nuevo hombre del contexto inmediato. No se neutraliza en una formulación más interpretativa porque el enlace literario y teológico es parte del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Relación del participio ἀπεκδυσάμενοι con la prohibición
  english_pob_reading: since you have stripped off
  chosen_spanish_reading: habiéndose despojado
  alternative_spanish_readings:
  - ya que se han despojado
  - porque se han despojado
  - después de despojarse
  rationale: El griego puede leerse como fundamento de la prohibición. En español, el participio compuesto preserva esa relación sin forzar una causalidad explícita en el cuerpo del texto; la nota permite otras lecturas válidas.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El audit trail inglés fue revisado para mantener el contraste paulino «old man / new man» y la relación participial de ἀπεκδυσάμενοι. Se evitó traducir mecánicamente desde el inglés: la base fue el griego, con la nota sobre alternativas causales/temporales y con el posesivo «sus» alineado con la referencia masculina singular documentada en la revisión más reciente.'
  spanish_consistency_notes:
  - Se usa «hombre viejo» de manera consistente con el paralelismo inmediato del contexto.
  - Se mantiene «sus prácticas» para concordar con el antecedente masculino singular y conservar el sentido de conducta habitual.
  - La prohibición se expresa con una forma natural en español, sin perder el tono directo del imperativo griego.
  - Se optó por un español neutro latinoamericano, apto para lectura eclesial amplia.
