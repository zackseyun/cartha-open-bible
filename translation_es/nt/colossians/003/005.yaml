review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego y del POB en inglés: conserva la metáfora de ''miembros'', mantiene la lista de vicios y hace que ''que es idolatría'' se refiera a ''avaricia''. Sin embargo, dos elecciones requieren ajuste para mayor fidelidad y naturalidad: ''sobre la tierra'' suena espacialmente menos idiomático que ''en la tierra'' para ἐπὶ τῆς γῆς en este contexto, y ''mal deseo'' es poco natural en español; ''malos deseos'' o ''deseo malo'' comunicarían mejor ἐπιθυμίαν κακήν.'
  spanish_quality_summary: El texto es claro y ampliamente legible, pero 'hagan morir' resulta algo forzado donde 'den muerte a' o 'hagan morir' ambos son posibles; no exige cambio. Los puntos más notorios son la frase 'sobre la tierra', que suena rígida e innecesariamente literal, y 'mal deseo', que no es una colocación natural en español bíblico moderno. También conviene reflejar la nota alternativa del inglés para 'los miembros... en la tierra' con una nota española, ya que el POB inglés la conserva.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Inmoralidad sexual', 'impureza', 'pasión' e 'idolatría' están bien. 'Avaricia' es aceptable para πλεονεξίαν y la nota con 'codicia' preserva la alternativa. La decisión teológica sobre el relativo femenino singular está bien mantenida.
  issues:
  - severity: medium
    issue: '''sobre la tierra'' suena poco idiomático en español para este contexto'
    rationale: Aunque reproduce formalmente ἐπὶ τῆς γῆς, en español 'los miembros que están sobre la tierra' suena extraño y puede sugerir ubicación física de extremidades, no pertenencia a la esfera terrenal. 'En la tierra' conserva mejor la metáfora con español natural.
  - severity: medium
    issue: '''mal deseo'' es una combinación poco natural'
    rationale: Para ἐπιθυμίαν κακήν, el español corriente prefiere 'malos deseos' o 'deseo malo'. 'Mal deseo' suena torpe y disminuye la calidad estilística sin ganar precisión.
  - severity: low
    issue: Falta la nota alternativa sobre la expresión metafórica de 'los miembros... en la tierra'
    rationale: 'El POB inglés conserva una nota léxica importante: ''whatever in you is earthly''. Dado que la formulación principal es deliberadamente formal y metafórica, conviene preservar también en español esa alternativa explicativa.'
  revised_spanish_text: 'Por lo tanto[a], hagan morir los miembros que están en la tierra: inmoralidad sexual, impureza, pasión, malos deseos y avaricia[b], que es idolatría.'
  revised_footnotes:
  - marker: a
    text: O 'lo que en ustedes es terrenal'. El griego dice más literalmente 'los miembros que están en la tierra'.
    reason: lexical_alternative
  - marker: b
    text: O 'la codicia'.
    reason: lexical_alternative
  revision_rationale: Se ajustó 'sobre la tierra' a 'en la tierra' para un español más natural sin perder la metáfora espacial del griego; se cambió 'mal deseo' por 'malos deseos' para reflejar ἐπιθυμίαν κακήν de manera idiomática; y se añadió la nota alternativa presente en el POB inglés para preservar la opción explicativa de la metáfora.
