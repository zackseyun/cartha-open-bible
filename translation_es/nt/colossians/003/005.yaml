revisions:
- from: 'Por lo tanto, hagan morir los miembros que están sobre la tierra: inmoralidad sexual, impureza, pasión, mal deseo y avaricia[a], que es idolatría.'
  to: 'Por lo tanto[a], hagan morir los miembros que están en la tierra: inmoralidad sexual, impureza, pasión, malos deseos y avaricia[b], que es idolatría.'
  rationale: Se ajustó 'sobre la tierra' a 'en la tierra' para un español más natural sin perder la metáfora espacial del griego; se cambió 'mal deseo' por 'malos deseos' para reflejar ἐπιθυμίαν κακήν de manera idiomática; y se añadió la nota alternativa presente en el POB inglés para preservar la opción explicativa de la metáfora.
