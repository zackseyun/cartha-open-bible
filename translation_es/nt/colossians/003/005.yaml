translation:
  language: es
  text: 'Por lo tanto[a], hagan morir los miembros que están en la tierra: inmoralidad sexual, impureza, pasión, malos deseos y avaricia[b], que es idolatría.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo que en ustedes es terrenal'. El griego dice más literalmente 'los miembros que están en la tierra'.
    reason: lexical_alternative
  - marker: b
    text: O 'la codicia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Νεκρώσατε
  english_pob_choice: put to death
  chosen_spanish: hagan morir
  alternatives_spanish:
  - den muerte a
  - maten
  lexicon: BDAG
  rationale: El imperativo aoristo exige una acción decisiva. En español, 'hagan morir' comunica con claridad esa fuerza exhortativa y evita un calco demasiado rígido.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca conclusión lógica a partir del contexto previo; 'Por lo tanto' es natural y mantiene la relación inferencial.
- source_word: μέλη
  english_pob_choice: the members
  chosen_spanish: los miembros
  alternatives_spanish:
  - las partes de ustedes
  - sus miembros
  lexicon: BDAG
  rationale: Se conserva la metáfora corporal visible en el griego sin añadir explícitamente 'sus', que no aparece en el texto fuente.
- source_word: τὰ ἐπὶ τῆς γῆς
  english_pob_choice: that are on the earth
  chosen_spanish: que están sobre la tierra
  alternatives_spanish:
  - que son terrenales
  - las cosas terrenales
  lexicon: BDAG
  rationale: La traducción mantiene la imagen espacial del griego y evita resolverla prematuramente en un abstracto como 'naturaleza terrenal'.
- source_word: πορνείαν
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: Expresa el campo semántico amplio de πορνεία en un español claro y actual, sin restringirlo indebidamente.
- source_word: ἀκαθαρσίαν
  english_pob_choice: impurity
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - inmoralidad
  lexicon: BDAG
  rationale: '''Impureza'' es el equivalente natural y conserva el sentido moral amplio del término paulino.'
- source_word: πάθος
  english_pob_choice: passion
  chosen_spanish: pasión
  alternatives_spanish:
  - pasión desordenada
  - lujuria
  lexicon: BDAG
  rationale: El término denota pasión intensa y desordenada; 'pasión' es el equivalente más directo y permite que el contexto determine su matiz negativo.
- source_word: ἐπιθυμίαν κακήν
  english_pob_choice: evil desire
  chosen_spanish: mal deseo
  alternatives_spanish:
  - deseo malo
  - deseo perverso
  lexicon: BDAG
  rationale: '''Mal deseo'' reproduce de manera concisa la calificación moral explícita del adjetivo κακήν y suena natural en español.'
- source_word: πλεονεξίαν
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición desmedida
  lexicon: BDAG
  rationale: '''Avaricia'' comunica la idea de afán de tener más; se mantiene la severidad del vicio nombrado por Pablo. Se evita un término más débil o demasiado coloquial.'
- source_word: ἥτις ἐστὶν εἰδωλολατρία
  english_pob_choice: which is idolatry
  chosen_spanish: que es idolatría
  alternatives_spanish:
  - lo cual es idolatría
  - que equivale a idolatría
  lexicon: BDAG
  rationale: La cláusula relativa se conserva de forma directa. 'Que es idolatría' mantiene la identificación tajante sin suavizarla.
theological_decisions:
- issue: Referencia de 'que es idolatría'
  english_pob_reading: The clause refers specifically to 'greed' rather than to the entire vice list.
  chosen_spanish_reading: La cláusula se refiere específicamente a 'avaricia'.
  alternative_spanish_readings:
  - La cláusula resume toda la lista previa como idolatría.
  - '''Lo cual'' podría entenderse como referencia a todo el conjunto.'
  rationale: El relativo femenino singular concuerda más naturalmente con πλεονεξίαν, y la traducción mantiene esa referencia específica sin diluirla.
  doctrine_reference: Primacía del dato gramatical; preservar la tensión interpretativa donde el texto la deja.
- issue: Metáfora de 'los miembros que están sobre la tierra'
  english_pob_reading: Retain the bodily-member metaphor in the main text rather than replacing it with an abstract phrase like 'earthly nature.'
  chosen_spanish_reading: Se conserva la metáfora corporal de 'los miembros'.
  alternative_spanish_readings:
  - su naturaleza terrenal
  - lo terrenal en ustedes
  rationale: El griego dice literalmente 'miembros', y la lista que sigue especifica qué debe ser 'hecho morir'. Mantener la imagen evita introducir una abstracción no explícita.
  doctrine_reference: Fidelidad al texto fuente y resistencia a una paráfrasis interpretativa innecesaria.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del contexto inglés: se evita añadir un posesivo antes de ''miembros'' porque no está explícito en el griego. También se conserva la lectura que hace depender la cláusula relativa de ''avaricia'' y no de toda la lista anterior.'
  spanish_consistency_notes:
  - Se usa 'impureza' para ἀκαθαρσίαν y 'pasión' para πάθος, manteniendo términos transparentes y de uso eclesial amplio.
  - '''Avaricia'' se eligió por su claridad en español; se documenta ''codicia'' como alternativa válida en nota.'
  - Se mantiene 'que están sobre la tierra' para reproducir la metáfora espacial del original sin convertirla en 'naturaleza terrenal'.
  - La puntuación con dos puntos refleja la enumeración explicativa del griego.
