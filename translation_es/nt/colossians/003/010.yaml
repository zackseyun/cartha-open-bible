revisions:
- from: y habiendo vestido al nuevo[a], que está siendo renovado en conocimiento, conforme a la imagen del que lo creó.
  to: y se han vestido del nuevo ser[a], que está siendo renovado en conocimiento, conforme a la imagen del que lo creó.
  rationale: Se reemplaza «habiendo vestido al nuevo» por «se han vestido del nuevo ser» para expresar con naturalidad española el sentido medio/reflexivo de ἐνδυσάμενοι y mantener la metáfora de vestirse. «Nuevo ser» comunica la realidad antropológica renovada mejor que «al nuevo», sin imponer el masculino de «hombre» en el texto principal, mientras la nota conserva la alternativa significativa. El resto del versículo puede mantenerse.
