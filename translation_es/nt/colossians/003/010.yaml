translation:
  language: es
  text: y se han vestido del nuevo ser[a], que está siendo renovado en conocimiento, conforme a la imagen del que lo creó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el nuevo hombre». El griego usa un adjetivo sustantivado en contraste con el «viejo» del contexto; «nuevo ser» en el texto principal procura expresar esa nueva identidad sin fijar innecesariamente un referente masculino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδυσάμενοι
  english_pob_choice: have put on
  chosen_spanish: habiendo vestido
  alternatives_spanish:
  - y han vestido
  - y habéis vestido
  - y habiendo puesto
  lexicon: BDAG
  rationale: El participio aoristo medio se entiende en continuidad con el contexto inmediato de despojarse y vestirse. En español, «habiendo vestido» conserva la imagen de vestirse y el valor de acción completa, sin forzar una perífrasis demasiado pesada.
- source_word: τὸν νέον
  english_pob_choice: the new self
  chosen_spanish: al nuevo[a]
  alternatives_spanish:
  - al nuevo hombre
  - al nuevo ser
  - a la nueva persona
  lexicon: BDAG
  rationale: El adjetivo sustantivado νέον designa aquí la nueva realidad antropológica del creyente. Se evita «hombre» como forma primaria por su posible lectura masculina en español; «al nuevo» mantiene la sustantivación y deja abierto el matiz de identidad renovada.
- source_word: ἀνακαινούμενον
  english_pob_choice: which is being renewed
  chosen_spanish: que está siendo renovado
  alternatives_spanish:
  - que se renueva
  - renovado
  - que es renovado
  lexicon: BDAG
  rationale: El participio presente pasivo indica un proceso continuo. «Está siendo renovado» preserva con claridad tanto la pasividad como la acción en curso mejor que un adjetivo estático.
- source_word: εἰς ἐπίγνωσιν
  english_pob_choice: in knowledge
  chosen_spanish: en conocimiento
  alternatives_spanish:
  - para conocimiento
  - hacia conocimiento
  - en pleno conocimiento
  lexicon: BDAG
  rationale: La revisión del POB inglés optó por una preposición más natural en contexto. «En conocimiento» refleja el ámbito o esfera de la renovación y evita explicitar «pleno» sin base formal en el griego.
- source_word: κατ’ εἰκόνα
  english_pob_choice: according to the image
  chosen_spanish: conforme a la imagen
  alternatives_spanish:
  - según la imagen
  - de acuerdo con la imagen
  - a la imagen
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o conformidad. «Conforme a» es natural en español y conserva la idea de patrón o medida, con resonancia de la imagen de Dios en Génesis.
- source_word: τοῦ κτίσαντος αὐτόν
  english_pob_choice: of the one who created it
  chosen_spanish: del que lo creó
  alternatives_spanish:
  - de su Creador
  - del que lo ha creado
  - del que creó a ese nuevo ser
  lexicon: BDAG
  rationale: La frase participial identifica al Creador como el referente del modelo. «Del que lo creó» mantiene la relación gramatical y evita añadir precisión interpretativa innecesaria; «lo» retoma naturalmente el sustantivo implícito en español.
theological_decisions:
- issue: Lectura antropológica de τὸν νέον en contraste con el «viejo» del contexto
  english_pob_reading: the new self
  chosen_spanish_reading: el nuevo [ser/yo] implícito en «al nuevo»
  alternative_spanish_readings:
  - el nuevo hombre
  - la nueva persona
  - el nuevo yo
  rationale: El contexto contrasta la vieja y la nueva condición del creyente. En español, «al nuevo» evita un masculino que pueda sonar exclusivo y, al mismo tiempo, no diluye la antropología paulina. La ambigüedad queda abierta por fidelidad al griego y al manejo del POB inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Rango semántico de ἐπίγνωσις
  english_pob_reading: knowledge
  chosen_spanish_reading: conocimiento
  alternative_spanish_readings:
  - pleno conocimiento
  - conocimiento pleno
  - reconocimiento
  rationale: Aunque ἐπίγνωσις puede sugerir conocimiento pleno o más profundo, no conviene explicitarlo en el cuerpo del texto sin necesidad. «Conocimiento» conserva el sentido básico y permite que la posible intensificación permanezca como matiz, no como glosa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
- issue: Relación entre el nuevo estado y la imagen del Creador
  english_pob_reading: according to the image of the one who created it
  chosen_spanish_reading: conforme a la imagen del que lo creó
  alternative_spanish_readings:
  - según la imagen del que lo creó
  - a imagen del que lo creó
  - de acuerdo con la imagen del que lo creó
  rationale: La cláusula sugiere conformidad con el patrón del Creador, eco de la imagen divina. «Conforme a» evita una lectura meramente locativa y mantiene la tensión entre renovación presente y conformación al modelo original.
  doctrine_reference: Genesis 1:26-27; DOCTRINE.md §Translation philosophy
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del texto inglés que cambió la idea de «into knowledge» por «in knowledge»; por eso la preposición española se rinde como «en conocimiento» y no como una dirección o meta explícita. También se conservó el valor procesual de ἀνακαινούμενον y la lectura antropológica del «nuevo» en continuidad con el contraste contextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica directamente.
  - Se evita «Cristo» porque el versículo no contiene Χριστός.
  - Se preserva la metáfora del vestirse con un participio verbal en lugar de una simple descripción estática.
  - La nota de pie marca la ambigüedad de τὸν νέον sin imponer una solución masculina o neutralizante excesiva.
