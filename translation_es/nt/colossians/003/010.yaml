    issue: «habiendo vestido» no refleja idiomáticamente el valor medio de ἐνδυσάμενοι
    rationale: En español, «vestir» transitivo suele significar vestir a otro. Aquí el griego σημαίνει ‘vestirse de / ponerse’. La forma actual puede inducir a entender que se vistió a ‘el nuevo’, en vez de que los creyentes se vistieron de la nueva identidad.
  - severity: high
    issue: «al nuevo» es demasiado elíptico y poco natural
    rationale: Aunque el griego usa un adjetivo sustantivado, el español «al nuevo» sin sustantivo expreso suena abrupto y ambiguo. La nota no compensa del todo la falta de claridad en el cuerpo del texto.
  - severity: medium
    issue: La nota a conserva mal la alternativa heredada del POB inglés
    rationale: La nota inglesa preserva explícitamente la alternativa «the new man». En español conviene reflejar con más precisión «el nuevo hombre» como alternativa, y explicar por qué el texto principal evita fijar género.
  revised_spanish_text: y se han vestido del nuevo ser[a], que está siendo renovado en conocimiento, conforme a la imagen del que lo creó.
