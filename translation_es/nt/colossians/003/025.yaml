translation:
  language: es
  text: Porque el que hace el mal[a] recibirá por el mal que hizo, y no hay parcialidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que comete injusticia» o «el que obra mal».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «favoritismo»; literalmente, «recepción de rostro», es decir, juicio basado en la apariencia o el estatus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ γὰρ ἀδικῶν
  english_pob_choice: For the wrongdoer
  chosen_spanish: Porque el que hace el mal[a]
  alternatives_spanish:
  - Porque el malhechor
  - Porque el que comete injusticia
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva y general. «El que hace el mal» conserva ese valor genérico con un español natural; evita un término demasiado técnico o moralmente cargado que pudiera estrechar indebidamente el alcance.
- source_word: κομίσεται
  english_pob_choice: will be repaid
  chosen_spanish: recibirá lo que hizo
  alternatives_spanish:
  - será recompensado por lo que hizo
  - recibirá de vuelta lo que hizo
  lexicon: BDAG
  rationale: En este contexto κομίζω expresa recibir en retorno lo debido por la propia conducta. «Recibirá lo que hizo» mantiene la idea retributiva sin forzar una formulación excesivamente idiomática ni añadir un término interpretativo como «recompensado».
- source_word: ὃ ἠδίκησεν
  english_pob_choice: for what he has done wrong
  chosen_spanish: lo que hizo
  alternatives_spanish:
  - el mal que hizo
  - lo injusto que cometió
  lexicon: BDAG
  rationale: La relativa con ἀδικέω apunta a la acción injusta o mala realizada. El español «lo que hizo» es breve y natural, y queda matizado por el «el que hace el mal» anterior; se evita repetir de forma pesada una expresión de la misma raíz.
- source_word: οὐκ ἔστιν προσωπολημψία
  english_pob_choice: there is no partiality
  chosen_spanish: no hay parcialidad[b]
  alternatives_spanish:
  - no hay favoritismo
  - no hay acepción de personas
  lexicon: BDAG
  rationale: προσωπολημψία denota juzgar por apariencia, estatus o persona. «Parcialidad» es un equivalente claro y formal en español; «favoritismo» es una alternativa válida pero un poco más coloquial. Se evita «acepción de personas» por ser más tradicional pero menos transparente para lector moderno.
theological_decisions:
- issue: Principio general de retribución justa e imparcialidad
  english_pob_reading: The verse states a principle of impartial recompense without specifying the full mechanism or timing of judgment.
  chosen_spanish_reading: 'El versículo afirma un principio general: el que hace el mal recibirá conforme a su obra, y Dios no juzga con parcialidad, sin precisar aquí el momento ni el mecanismo completo del juicio.'
  alternative_spanish_readings:
  - Una referencia exclusivamente al juicio final
  - Una norma limitada a relaciones sociales concretas
  rationale: La formulación griega es amplia y sentencia un principio moral-teológico general. La traducción conserva esa amplitud sin restringirla a un solo escenario ni introducir detalles ausentes del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: El pasaje mantiene alto acuerdo con el audit trail inglés; no se requieren revisiones sustanciales. La redacción española sigue de cerca la fuerza genérica y retributiva del griego, preservando la imparcialidad como afirmación concluyente.
  spanish_consistency_notes:
  - Se usa «parcialidad» para προσωπολημψία por claridad y dignidad registral.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino.
  - La estructura «el que...» conserva el participio articular griego con fuerza genérica.
  - «Recibirá lo que hizo» mantiene la retribución sin añadir un sujeto explícito ni especificar el tiempo del juicio.
