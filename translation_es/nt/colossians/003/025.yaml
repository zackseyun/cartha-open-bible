- from: Porque el que hace el mal[a] recibirá lo que hizo, y no hay parcialidad[b].
  to: Porque el que hace el mal[a] recibirá por el mal que hizo, y no hay parcialidad[b].
  rationale: La revisión conserva el español natural del borrador pero restaura mejor el vínculo léxico del griego entre el mal cometido y la retribución recibida. «Recibirá por el mal que hizo» comunica con más claridad el valor retributivo de κομίσεται y el objeto implícito de ὃ ἠδίκησεν. Se mantienen «Porque» y «parcialidad» como opciones adecuadas y dignas, y se limpian las notas para que sean más fieles y legibles.
