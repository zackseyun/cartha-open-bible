translation:
  language: es
  text: Esposas[a], sométanse a sus esposos, como conviene[b] en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «mujeres»; en este contexto doméstico, el sentido es específico: «esposas». También puede expresarse «estén sujetas a sus esposos».'
    reason: lexical_alternative
  - marker: b
    text: O «como es apropiado en el Señor»; el verbo griego puede expresarse como «era apropiado» o «era conveniente», aunque en este contexto probablemente tiene un sentido general de presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναῖκες
  english_pob_choice: Wives
  chosen_spanish: Esposas
  alternatives_spanish:
  - Mujeres
  lexicon: BDAG
  rationale: En este contexto de instrucciones domésticas, el sustantivo se refiere específicamente a mujeres casadas. «Esposas» mantiene la relación matrimonial que el griego presupone, sin reducirlo a «mujeres» en general.
- source_word: ὑποτάσσεσθε
  english_pob_choice: submit yourselves
  chosen_spanish: sométanse
  alternatives_spanish:
  - sujétense
  - pónganse bajo la autoridad de
  lexicon: BDAG
  rationale: El imperativo medio/pasivo expresa una disposición voluntaria de ordenarse bajo otro. En español, «sométanse» conserva esa fuerza exhortativa y evita una pasividad demasiado pesada o una paráfrasis excesiva.
- source_word: ἀνδράσιν
  english_pob_choice: your husbands
  chosen_spanish: a sus esposos
  alternatives_spanish:
  - a sus maridos
  - a los hombres
  lexicon: BDAG
  rationale: En paralelo con γυναῖκες, ἀνήρ significa «esposo» en este contexto. «Sus esposos» refleja la relación implícita en el dativo plural y es natural en español bíblico contemporáneo.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la norma o medida de lo apropiado, no una causalidad directa. «Como» expresa mejor la relación sintáctica con ἀνῆκεν.
- source_word: ἀνῆκεν
  english_pob_choice: is fitting
  chosen_spanish: conviene
  alternatives_spanish:
  - es apropiado
  - era conveniente
  lexicon: BDAG
  rationale: Aunque la forma es imperfecta, en esta exhortación funciona con sentido general/presente. «Conviene» es breve, idiomático y transmite la idea de lo que resulta apropiado sin forzar el tiempo verbal.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - delante del Señor
  - en relación con el Señor
  lexicon: BDAG
  rationale: Se mantiene la expresión casi literal porque delimita y fundamenta la exhortación dentro de la esfera de pertenencia al Señor. «Señor» corresponde al equivalente español litúrgico habitual de κύριος en esta fórmula.
theological_decisions:
- issue: Alcance y fundamento de la exhortación
  english_pob_reading: The command is qualified by 'as is fitting in the Lord,' preserving that the instruction is framed and bounded by allegiance to the Lord rather than presented as an absolute, unqualified social norm.
  chosen_spanish_reading: El mandato queda cualificado por «como conviene en el Señor», manteniendo que la instrucción está enmarcada y limitada por la relación con el Señor, no como una norma social absoluta e independiente.
  alternative_spanish_readings:
  - como una simple costumbre cultural
  - como si «en el Señor» modificara solo a las esposas
  rationale: El griego une la frase de conveniencia con ἐν κυρίῳ; la traducción conserva esa delimitación teológica sin expandirla en comentario. Así se preserva la tensión del texto y su orientación cristológica.
  doctrine_reference: Mantener la tensión teológica del pasaje; κύριος se vierte como «Señor».
translation_notes:
  revision_awareness: 'Se siguió el auditable de la POB en inglés: γυναῖκες se entiende como «wives/esposas», ὑποτάσσεσθε como una exhortación reflexiva/volitiva, ἀνῆκεν con fuerza general de presente, y ἐν κυρίῳ se conserva como delimitación teológica del mandato. No se introdujeron soluciones interpretativas que el texto no exija.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y sobrio, apto para lectura eclesial.
  - «Señor» se usa de forma consistente para κύριος en la expresión fija «en el Señor».
  - No se reemplaza el matiz relacional de ἀνδράσιν por un genérico de «hombres»; el contexto matrimonial gobierna la elección.
