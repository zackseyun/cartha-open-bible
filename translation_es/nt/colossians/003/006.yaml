  verdict: revise
  source_alignment_summary: ‘El borrador español refleja bien el sentido básico del griego: causalidad en δι’ ἃ, presente verbal en ἔρχεται, juicio divino en ἡ ὀργὴ τοῦ θεοῦ, y conservación del modismo «los hijos de la desobediencia». Sin embargo, la nota al pie no preserva correctamente la alternativa del inglés POB, porque repite la lectura principal en vez de ofrecer la alternativa «children/children of disobedience».’
  spanish_quality_summary: El texto principal es natural, claro y digno en español. «Por causa de estas cosas viene la ira de Dios sobre los hijos de la desobediencia» es legible y fiel. El único ajuste necesario es en la nota al pie, para que no diga «O “hijos de la desobediencia”» cuando eso ya está en el texto principal; debe dar una alternativa real y una aclaración semántica adecuada en español.
  glossary_alignment: ‘Alineación buena con la terminología del proyecto: θεοῦ -> «Dios»; ὀργή -> «ira»; se conserva el modismo de υἱοὺς τῆς ἀπειθείας como «hijos de la desobediencia», en concordancia con la decisión inglesa de retener «sons». No hay conflicto con los glosarios principales del proyecto.’
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en lugar de presentar una alternativa real.
    rationale: ‘El inglés POB tiene: «Or ‘’children of disobedience,’’ that is, people characterized by disobedience». La nota española dice: «O “hijos de la desobediencia”...», pero esa ya es la redacción del texto principal. Esto rompe la función de la nota como alternativa lexical documentada.’
  revised_spanish_text: Por causa de estas cosas viene la ira de Dios sobre los hijos de la desobediencia[a].
  revised_footnotes:
