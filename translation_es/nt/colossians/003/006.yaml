translation:
  language: es
  text: Por causa de estas cosas viene la ira de Dios sobre los hijos de la desobediencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos de desobediencia», es decir, personas caracterizadas por la desobediencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ἃ
  english_pob_choice: Because of these things
  chosen_spanish: Por causa de estas cosas
  alternatives_spanish:
  - a causa de estas cosas
  - debido a estas cosas
  - por las cuales
  lexicon: BDAG
  rationale: διά con acusativo relativo expresa causa u ocasión. «Por causa de» conserva claramente la relación causal y suena natural en español, mientras que «estas cosas» mantiene la referencia plural retrospectiva a los vicios del versículo anterior.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  - viene sobre ellos
  lexicon: BDAG
  rationale: El presente de ἔρχομαι puede tener fuerza inminente o progresiva. «Viene» preserva esa vividez sin sobrecargar el texto con una perífrasis que podría sonar más interpretativa en español.
- source_word: ἡ ὀργὴ τοῦ θεοῦ
  english_pob_choice: the wrath of God
  chosen_spanish: la ira de Dios
  alternatives_spanish:
  - la furia de Dios
  - el enojo de Dios
  lexicon: BDAG
  rationale: ὀργή en Pablo tiene un sentido judicial-divino. «Ira» es el equivalente español más estable y fiel para mantener el peso teológico y forense de la expresión.
- source_word: ἐπὶ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - encima de
  lexicon: BDAG
  rationale: Con acusativo, ἐπί marca dirección o blanco del juicio. «Sobre» conserva la imagen de la ira que recae sin introducir una lectura más agresiva o explicativa que «contra».
- source_word: τοὺς υἱοὺς τῆς ἀπειθείας
  english_pob_choice: the sons of disobedience
  chosen_spanish: los hijos de la desobediencia
  alternatives_spanish:
  - los hijos de la incredulidad
  - los hijos de la rebeldía
  - los desobedientes
  lexicon: BDAG
  rationale: Se conserva el giro semítico masculino del original, como hace la POB inglesa con «sons». En español, «hijos de la desobediencia» mantiene la textura idiomática y permite que el sentido colectivo y caracterizador quede explícito en la nota.
theological_decisions:
- issue: Si traducir la expresión idiomática de pertenencia/identidad «sons of disobedience» de forma literal o interpretativa
  english_pob_reading: Retain 'sons of disobedience' in the main text, with a footnote explaining that it means people characterized by disobedience
  chosen_spanish_reading: Mantener «los hijos de la desobediencia» en el texto principal y aclarar en nota que se refiere a personas caracterizadas por la desobediencia
  alternative_spanish_readings:
  - los desobedientes
  - las personas caracterizadas por la desobediencia
  - los hijos de la desobediencia, es decir, los desobedientes
  rationale: El griego usa un giro idiomático semítico que identifica a las personas por su rasgo dominante. Traducirlo literalmente conserva la forma del original y la fuerza retórica; la nota evita que se lea como una afirmación genealógica literal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo con la revisión más reciente: la redacción inglesa se mantuvo sin cambios y no se registraron revisiones aplicadas. La versión española sigue ese mismo criterio de conservación de la decisión léxica principal y de la nota explicativa sobre el giro idiomático.'
  spanish_consistency_notes:
  - Se usó «ira de Dios» para ὀργὴ τοῦ θεοῦ, coherente con la terminología bíblica estándar y con el valor judicial del término.
  - Se evitó «SEÑOR» porque el texto griego tiene θεοῦ, no κύριος.
  - Se mantuvo el plural de referencia implícita en «estas cosas», en línea con el antecedente inmediato del contexto.
  - La nota conserva el matiz idiomático sin neutralizar el masculino plural del original.
