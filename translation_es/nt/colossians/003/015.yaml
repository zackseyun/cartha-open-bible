source:
  edition: SBLGNT
  text: καὶ ἡ εἰρήνη τοῦ ⸀Χριστοῦ βραβευέτω ἐν ταῖς καρδίαις ὑμῶν, εἰς ἣν καὶ ἐκλήθητε ἐν ἑνὶ σώματι· καὶ εὐχάριστοι γίνεσθε.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/015.yaml
  text: And let the peace of Messiah rule in your hearts[a], to which indeed you were called in one body[c][b]. And be thankful.
  footnotes:
  - marker: a
    text: Or 'the peace of Christ.' The Greek title Χριστός can be rendered 'Messiah' when its titular sense is in view.
    reason: lexical_alternative
  - marker: b
    text: The verb can also mean 'act as umpire' or 'decide,' emphasizing the peace of the Messiah as the governing arbiter in the community's inner life.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'into one body,' highlighting incorporation into a single corporate body.
    reason: lexical_alternative
