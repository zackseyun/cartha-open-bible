    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek Χριστοῦ and standard register/usage in this epistolary context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Y que la paz del Mesías[a] gobierne[b] en sus corazones, a la cual de hecho fueron llamados en un solo cuerpo[c]; y sean agradecidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Cristo». Χριστός puede verterse como «Mesías» cuando su sentido titular está en vista.
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede significar «actuar como árbitro» o «decidir», destacando a la paz del Mesías como la autoridad que dirime y rige la vida interior y comunitaria.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente «dentro de un solo cuerpo», destacando la incorporación a un único cuerpo corporativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - tranquilidad
  - armonía
  lexicon: BDAG
  rationale: «Paz» es el equivalente natural y bíblico en español para εἰρήνη en este contexto paulino, donde alude a la realidad relacional y comunitaria producida por Dios.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: de Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστοῦ con «Mesías», siguiendo la política del POB de traducir el título cuando su sentido mesiánico está en vista. Se evita «Cristo» como forma fija donde el contexto permite una traducción semántica.
- source_word: βραβευέτω
  english_pob_choice: let ... rule
  chosen_spanish: gobierne
  alternatives_spanish:
  - arbitre
  - sea árbitro
  - decida
  lexicon: BDAG
  rationale: El verbo sugiere actuar como árbitro o decidir, pero en español «gobierne» comunica con naturalidad la función directiva y normativa de la paz sin perder la fuerza exhortativa.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - en sus corazones y vidas
  - entre ustedes internamente
  lexicon: BDAG
  rationale: «Corazones» conserva la imagen bíblica del centro interior de la persona; el plural y el posesivo de segunda persona plural mantienen el matiz comunitario del griego.
- source_word: εἰς ἣν
  english_pob_choice: to which
  chosen_spanish: a la cual
  alternatives_spanish:
  - para la cual
  - hacia la cual
  lexicon: BDAG
  rationale: La relativa apunta de manera natural a la paz como esfera o meta del llamado; «a la cual» resulta claro y suficientemente literal en español.
- source_word: καὶ ἐκλήθητε
  english_pob_choice: indeed you were called
  chosen_spanish: también fueron llamados
  alternatives_spanish:
  - además fueron llamados
  - incluso fueron llamados
  lexicon: BDAG
  rationale: El καί enfatiza la inclusión de esta llamada; «también» reproduce esa coordinación enfática de forma natural en español.
- source_word: ἐν ἑνὶ σώματι
  english_pob_choice: in one body
  chosen_spanish: en un solo cuerpo
  alternatives_spanish:
  - en un cuerpo
  - hacia un solo cuerpo
  lexicon: BDAG
  rationale: «Un solo cuerpo» preserva la imagen paulina de unidad corporativa sin resolver la metáfora en una glosa explicativa, manteniendo la tensión teológica del texto.
- source_word: εὐχάριστοι
  english_pob_choice: thankful
  chosen_spanish: agradecidos
  alternatives_spanish:
  - dando gracias
  - reconocidos
  lexicon: BDAG
  rationale: «Agradecidos» es una forma natural y digna en español para la exhortación final; mantiene la idea de gratitud sin forzar un giro verbal.
- source_word: γίνεσθε
  english_pob_choice: be
  chosen_spanish: sean
  alternatives_spanish:
  - lleguen a ser
  - manténganse
  lexicon: BDAG
  rationale: En una exhortación plural, «sean» expresa de manera directa el mandato de estado/resultados que transmite el imperativo presente.
theological_decisions:
- issue: Χριστοῦ como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene la decisión del POB de traducir Χριστός como título y no como nombre litúrgico fijo cuando el contexto lo permite. En español, «Mesías» conserva el contenido semántico del título y evita ocultar la referencia al ungido de Dios.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve messianic force of Χριστός where context supports it.'
- issue: Sentido de βραβευέτω
  english_pob_reading: peace ... rule / arbitrate
  chosen_spanish_reading: gobierne
  alternative_spanish_readings:
  - arbitre
  - sea árbitro
  rationale: El griego admite la imagen de un árbitro o decisor. «Gobierne» no elimina esa fuerza y, en español, comunica bien la función reguladora de la paz en la vida interior y comunitaria.
  doctrine_reference: 'DOCTRINE.md: preserve lexical force without awkwardness.'
- issue: Alcance de «en un solo cuerpo»
  english_pob_reading: corporate ecclesial unity is implied but not expanded beyond the text
  chosen_spanish_reading: unidad corporativa implícita, sin glosa interpretativa en el texto principal
  alternative_spanish_readings:
  - explícitamente la iglesia
  - en un solo cuerpo que es la iglesia
  rationale: La metáfora del cuerpo se conserva sin convertir la traducción en comentario. Esto preserva la economía del texto y la tensión teológica presente en Pablo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El auditorio inglés muestra una oscilación editorial entre «Christ» y «Messiah», con restauración final de «Messiah» por fidelidad a la política doctrinal. La versión española sigue esa decisión final y traduce el título como «Mesías». También se mantiene la ambigüedad de ἐν ἑνὶ σώματι mediante «en un solo cuerpo», sin convertirla en una explicación eclesiológica explícita.
  spanish_consistency_notes:
  - Se evita el uso de «SEÑOR» para Χριστός; se respeta la política de traducir el título mesiánico cuando corresponde.
  - «Paz» y «agradecidos» son naturales en español y conservan el tono exhortativo de la frase.
  - La puntuación reproduce las dos cláusulas imperativas separadas por punto y coma, como en el griego y el audit trail inglés.
