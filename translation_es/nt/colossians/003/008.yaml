translation:
  language: es
  text: 'Pero ahora ustedes también deben desechar todo esto: ira, furor, malicia, calumnia[a] y lenguaje obsceno de su boca.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «blasfemia» o, más ampliamente, «lenguaje injurioso». El término griego puede referirse tanto a palabras contra Dios como a habla difamatoria contra personas; aquí el contexto favorece «calumnia».
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora, sin embargo
  - Pero ahora bien
  lexicon: BDAG
  rationale: Mantiene el contraste temporal y adversativo. «Pero ahora» es natural en español y conserva la transición fuerte del contexto.
- source_word: ἀπόθεσθε
  english_pob_choice: must put away
  chosen_spanish: deben dejar
  alternatives_spanish:
  - deben desechar
  - deben apartar
  - deben quitarse
  lexicon: BDAG
  rationale: El imperativo exhortativo exige una acción decisiva. «Dejar» funciona idiomáticamente en español para abandonar conductas o cosas, y conserva la idea de removerlas de la vida del creyente.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - ustedes igualmente
  - también ustedes
  lexicon: BDAG
  rationale: Preserva la inclusión enfática de los destinatarios. El orden español suena natural y mantiene el énfasis de la partícula conjunta.
- source_word: τὰ πάντα
  english_pob_choice: all these things
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  - todo ello
  lexicon: BDAG
  rationale: En este contexto introduce la lista de vicios que sigue. «Todo esto» evita una amplitud excesiva y sigue siendo claro en español.
- source_word: ὀργήν
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  - rabia
  lexicon: BDAG
  rationale: «Ira» es una correspondencia formal y reconocible en registros bíblicos; conserva la fuerza de una disposición interna de enojo.
- source_word: θυμόν
  english_pob_choice: wrath
  chosen_spanish: enojo
  alternatives_spanish:
  - furor
  - furia
  - ira ardiente
  lexicon: BDAG
  rationale: Para distinguir θυμός de ὀργή, se opta por una palabra que sugiera la arrebato o estallido de ira. «Enojo» conserva la diferencia sin cargar demasiado el texto con duplicación estilística.
- source_word: κακίαν
  english_pob_choice: malice
  chosen_spanish: malicia
  alternatives_spanish:
  - maldad
  - malevolencia
  - mala intención
  lexicon: BDAG
  rationale: En listas de vicios, κακία suele referirse a mala intención o disposición hostil. «Malicia» es la opción más precisa y natural en español.
- source_word: βλασφημίαν
  english_pob_choice: slander
  chosen_spanish: blasfemia
  alternatives_spanish:
  - calumnia
  - insulto
  - lenguaje ofensivo
  lexicon: BDAG
  rationale: 'Se conserva la tensión semántica documentada: el término puede aludir a discurso contra Dios o a habla injuriosa contra personas. Dado que el griego y el contexto inmediato no eliminan por completo la lectura religiosa, «blasfemia» mantiene esa amplitud; la lista de vicios sigue siendo compatible con un uso de habla injuriosa.'
- source_word: αἰσχρολογίαν
  english_pob_choice: filthy speech
  chosen_spanish: lenguaje obsceno
  alternatives_spanish:
  - palabrería obscena
  - habla indecente
  - lenguaje sucio
  lexicon: BDAG
  rationale: El término apunta a habla vergonzosa/obscena. «Lenguaje obsceno» es claro, digno y comunica el carácter moral del término sin sonar excesivamente coloquial.
- source_word: ἐκ τοῦ στόματος ὑμῶν
  english_pob_choice: from your mouth
  chosen_spanish: que salga de su boca
  alternatives_spanish:
  - de su boca
  - que salga de su boca
  - de sus labios
  lexicon: BDAG
  rationale: Se conserva la imagen corporal del habla. La formulación relativa fluye mejor en español y expresa que este tipo de lenguaje no debe proceder de ellos.
theological_decisions:
- issue: Sentido de βλασφημίαν en una lista ética interpersonal
  english_pob_reading: slander, with broader options preserved in a note
  chosen_spanish_reading: blasfemia, preserving the documented wider range
  alternative_spanish_readings:
  - calumnia
  - lenguaje injurioso
  - insulto
  rationale: El POB inglés privilegia «slander» por el contexto interpersonal, pero también documenta que el término puede significar «blasphemy» o, más ampliamente, «abusive speech». En español, «blasfemia» conserva esa amplitud histórica y lexical; el contexto de vicios del habla y la frase final sobre la boca mantienen abierta la posibilidad de habla injuriosa sin cerrar la lectura religiosa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se retuvo la distinción entre dos términos de ira y se evitó perder la amplitud semántica documentada para βλασφημία. También se corrigió el anclaje de la nota para que el marcador aparezca en el texto español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no la requiere.
  - Se prefirieron equivalentes bíblicos formales y comprensibles en español latinoamericano.
  - El marcador [a] está anclado directamente en «blasfemia» para que la nota sea auditable y válida.
