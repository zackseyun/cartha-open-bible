translation:
  language: es
  text: Pongan su mente en las cosas de arriba[a], no en las cosas de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Piensen en las cosas de arriba». El verbo griego incluye no solo pensar, sino también orientar la mente o la preocupación hacia algo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las cosas sobre la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἄνω
  english_pob_choice: the things above
  chosen_spanish: las cosas de arriba
  alternatives_spanish:
  - las cosas de arriba
  - las cosas que están arriba
  - lo de arriba
  lexicon: BDAG
  rationale: El griego usa el artículo neutro plural con ἄνω de manera sustantiva, por lo que conviene mantener un plural concreto. «Las cosas de arriba» conserva la oposición con «las de la tierra» y suena natural en español bíblico contemporáneo.
- source_word: φρονεῖτε
  english_pob_choice: Set your minds on
  chosen_spanish: Pongan la mente en
  alternatives_spanish:
  - Piensen en
  - Tengan la mente en
  - Orienten su mente hacia
  lexicon: BDAG
  rationale: φρονέω no indica solo pensar de forma intelectual, sino orientar la mente, la actitud y la preocupación. «Pongan la mente en» preserva ese impulso de orientación continua mejor que un simple «piensen».
- source_word: μὴ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - y no
  lexicon: BDAG
  rationale: La negación contrasta la orientación a una esfera con la exclusión de la otra. «No» es suficiente y fiel al valor de μή en esta construcción.
- source_word: τὰ ἐπὶ τῆς γῆς
  english_pob_choice: the things on the earth
  chosen_spanish: las de la tierra
  alternatives_spanish:
  - las cosas de la tierra
  - las cosas terrenales
  - las cosas sobre la tierra
  lexicon: BDAG
  rationale: El paralelo con τὰ ἄνω favorece un sustantivo implícito también en español. «Las de la tierra» mantiene el contraste breve y directo con «las cosas de arriba», sin perder el sentido de realidades terrenales.
- source_word: γῆς
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: BDAG
  rationale: En este contraste cósmico, γῆς se refiere a la tierra en oposición a lo de arriba, no a una región o territorio específico. «La tierra» conserva esa oposición espacial.
theological_decisions:
- issue: Alcance de φρονεῖτε como exhortación ética y mental
  english_pob_reading: An exhortation to orient one's mindset and values toward heavenly realities
  chosen_spanish_reading: Una exhortación a orientar la mente y la disposición hacia las realidades de arriba
  alternative_spanish_readings:
  - Una exhortación a pensar solo intelectualmente en el cielo
  - Una exhortación meramente devocional sin alcance ético
  rationale: La forma griega abarca más que el acto de pensar; incluye orientación interior, prioridades y preocupación. La traducción mantiene ese alcance sin hacerlo más específico de lo que el texto permite.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no hubo cambios necesarios; la presente redacción conserva el contraste sustantivo del griego y la amplitud semántica de φρονέω.'
  spanish_consistency_notes:
  - Se mantuvo «arriba» como equivalente de ἄνω para conservar la oposición con «la tierra».
  - Se evitó «SEÑOR» u otra terminología no pertinente; no hay vocabulario divino en este versículo.
  - Se prefirió una construcción verbal natural en español («Pongan la mente en») que refleja el imperativo presente y el matiz durativo de φρονεῖτε.
