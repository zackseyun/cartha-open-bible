translation:
  language: es
  text: Porque ustedes murieron, y su vida está oculta[a] con el Mesías[b] en Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'ha sido ocultada'. El perfecto griego puede enfatizar un estado presente que resulta de una acción ya completada.
    reason: lexical_alternative
  - marker: b
    text: O, 'con Cristo'. El título griego Χριστός puede traducirse 'Mesías' o 'Cristo'; aquí se traduce como título para preservar su sentido.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεθάνετε
  english_pob_choice: you died
  chosen_spanish: ustedes murieron
  alternatives_spanish:
  - ustedes han muerto
  - murieron
  lexicon: BDAG
  rationale: El aoristo indicativo en segunda persona plural expresa una muerte decisiva y pasada; en español, el pretérito simple comunica con naturalidad ese hecho ya consumado. Se evita una perífrasis perfecta que podría sonar más interpretativa que el griego.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Marca la razón o fundamento de la afirmación anterior. 'Porque' preserva bien la relación explicativa y suena natural al inicio de la oración.
- source_word: ζωὴ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida verdadera
  - existencia
  lexicon: BDAG
  rationale: El sustantivo básico ζωή se vierte de manera directa como 'vida'. El contexto aporta la dimensión espiritual sin necesidad de expandir el término en el texto principal.
- source_word: κέκρυπται
  english_pob_choice: is hidden
  chosen_spanish: está escondida
  alternatives_spanish:
  - está oculta
  - ha sido escondida
  lexicon: BDAG
  rationale: El perfecto pasivo comunica un estado presente resultante de una acción pasada. 'Está escondida' reproduce bien ese estado en español de forma natural; 'escondida' es más idiomática que una traducción demasiado literal del perfecto.
- source_word: σὺν τῷ Χριστῷ
  english_pob_choice: with the Messiah
  chosen_spanish: con el Mesías
  alternatives_spanish:
  - con Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título y el POB inglés lo trató como 'Messiah'; por coherencia terminológica y por fidelidad al título mesiánico, se mantiene 'Mesías'. 'Con' expresa la asociación/unión indicada por σύν.
- source_word: ἐν τῷ θεῷ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - en el Dios
  lexicon: BDAG
  rationale: ἐν conserva su sentido locativo o de esfera. 'En Dios' reproduce el giro griego sin añadir explicaciones, y mantiene la fuerza teológica de seguridad e inclusión.
theological_decisions:
- issue: Χριστός como título traducido frente a forma fijada 'Cristo'
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto, el texto habla del anointed one como título, no como nombre propio litúrgico fijo. Traducirlo como 'Mesías' sigue la línea documental del POB inglés y evita neutralizar el contenido del título.
  doctrine_reference: 'DOCTRINE.md: Contested terms / Translation philosophy #2'
- issue: El perfecto κέκρυπται y su valor de estado presente
  english_pob_reading: is hidden
  chosen_spanish_reading: está escondida
  alternative_spanish_readings:
  - ha sido escondida
  - está oculta
  rationale: La forma perfecta no sólo apunta a una acción pasada, sino al estado resultante que permanece. 'Está escondida' conserva ese estado presente sin forzar una perífrasis demasiado técnica.
  doctrine_reference: 'Grammar / aspect: perfect tense with present state'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando explícitamente los marcadores de nota en el texto principal: [a] en ''murieron'' y [b] en ''Mesías''. La redacción mantiene el valor del aoristo ἀπεθάνετε y del perfecto κέκρυπται, y conserva la decisión terminológica del POB para Χριστός como título.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de ἀπεθάνετε con pretérito simple para reflejar una acción pasada decisiva.
  - Se conserva 'Mesías' en coherencia con la política POB cuando Χριστός funciona como título.
  - '''Está escondida'' expresa en español el estado presente del perfecto pasivo κέκρυπται.'
  - '''En Dios'' respeta la preposición ἐν sin paráfrasis interpretativa.'
  - Se evitó 'SEÑOR' o cualquier ocultamiento del nombre divino, porque θεῷ aquí es directamente 'Dios'.
