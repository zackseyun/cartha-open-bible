translation:
  language: es
  text: Hijos, obedezcan a sus padres en todo, porque esto es agradable[a] en el Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aceptable en el Señor».
    reason: lexical_alternative
  - marker: b
    text: «En el Señor» puede entenderse como una descripción de lo que es agradable dentro de la relación con el Señor, y no simplemente «al Señor».
    reason: alternative_reading
lexical_decisions:
- source_word: Τὰ τέκνα
  english_pob_choice: Children
  chosen_spanish: Hijos
  alternatives_spanish:
  - Niños
  - Hijos e hijas
  - Criaturas
  lexicon: BDAG
  rationale: τέκνα es un vocativo plural que se dirige a los hijos dentro del código doméstico. En español, «hijos» comunica de forma natural a la descendencia en conjunto y funciona bien como vocativo. Aunque «hijos e hijas» explicita el valor inclusivo del plural, el sustantivo masculino plural ya puede abarcar ambos sexos en español bíblico; por eso se prefiere la forma breve y directa.
- source_word: ὑπακούετε
  english_pob_choice: obey
  chosen_spanish: obedezcan
  alternatives_spanish:
  - escuchen
  - hagan caso
  - se sometan
  lexicon: BDAG
  rationale: El imperativo de ὑπακούω expresa obediencia efectiva, no solo atención auditiva. «Obedezcan» conserva la fuerza normativa del mandamiento en un registro natural y digno para el español actual.
- source_word: τοῖς γονεῦσιν
  english_pob_choice: your parents
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus progenitores
  - a sus padres y madres
  - a sus padres
  lexicon: BDAG
  rationale: γονεῦσιν significa «padres» en sentido de ambos progenitores. En español, la frase con posesivo explícito («a sus padres») refleja la relación implícita del griego en un vocativo directo y suena idiomática. «Progenitores» sería demasiado técnico; «padres y madres» sobreespecifica lo que el plural griego ya comunica.
- source_word: κατὰ πάντα
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo asunto
  - siempre
  lexicon: BDAG
  rationale: La construcción κατά + acusativo expresa extensión o alcance. «En todo» reproduce con claridad la amplitud del mandato y evita el matiz temporal de «siempre».
- source_word: εὐάρεστόν ἐστιν
  english_pob_choice: is pleasing
  chosen_spanish: es agradable
  alternatives_spanish:
  - es agradable
  - es placentero
  - es bien agradable
  lexicon: BDAG
  rationale: εὐάρεστος puede traducirse como «agradable» o «aceptable». En español, «es agradable» mantiene la evaluación positiva sin volverse artificial. Se evita «bien agradable» por sonar redundante, y «aceptable» porque puede sugerir solo permisibilidad, no el matiz de complacencia del término.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor
  - para el Señor
  - delante del Señor
  lexicon: BDAG
  rationale: La expresión paulina ἐν κυρίῳ se conserva como «en el Señor» porque en español es una fórmula reconocible y transmite la relación/esfera en la que la obediencia es evaluada. Dado el contexto cristológico del pasaje, «Señor» es la traducción adecuada de κύριος.
theological_decisions:
- issue: Relación entre «en todo» y «en el Señor»
  english_pob_reading: Retain both phrases straightforwardly without adding qualifiers; the verse presents comprehensive filial obedience within the believer's relation to the Lord.
  chosen_spanish_reading: Mantener ambos miembros sin introducir una cláusula de excepción explícita ni redefinir «en el Señor».
  alternative_spanish_readings:
  - Obediencia solo en lo que esté de acuerdo con la voluntad del Señor
  - Porque esto agrada al Señor
  - Bajo la autoridad del Señor
  rationale: 'El griego une un mandato amplio («en todo») con una razón enmarcada por «en el Señor». No añade de manera explícita una excepción ni reexpresa la frase preposicional como causa. La traducción conserva esa tensión: la obediencia filial es general, y al mismo tiempo se sitúa dentro de la relación con el Señor. Las limitaciones éticas más amplias pertenecen a la interpretación canónica, no a una expansión del texto aquí.'
  doctrine_reference: Preservar la tensión teológica sin resolverla por paráfrasis; equivalencia óptima.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el análisis auditado del griego y del POB inglés. Se mantuvieron sin cambios las decisiones centrales: vocativo plural inclusivo, imperativo de obediencia, alcance total de la exhortación y la fórmula paulina «en el Señor».'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος conforme al valor cristológico de la expresión.
  - Se prefirió «hijos» como vocativo natural y breve, coherente con el plural inclusivo del griego.
  - «En todo» conserva el alcance del mandato sin introducir restricciones no expresadas en el texto.
  - La puntuación española reproduce el tono exhortativo y causal del original.
