translation:
  language: es
  text: Padres[a], no provoquen a sus hijos, para que no se desalienten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pierdan el ánimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες
  english_pob_choice: Fathers
  chosen_spanish: Padres
  alternatives_spanish:
  - Papas
  - Padres de familia
  lexicon: BDAG
  rationale: Aunque el griego es específicamente «padres» y no el término genérico «padres/madres» en español, «Padres» comunica de forma natural el vocativo plural masculino en un contexto de instrucciones domésticas. Se evita «progenitores» porque suaviza indebidamente la distinción de roles que el POB inglés preserva.
- source_word: μὴ ἐρεθίζετε
  english_pob_choice: do not provoke
  chosen_spanish: no provoquen
  alternatives_spanish:
  - no irriten
  - no exasperen
  - no provoquen a ira
  lexicon: BDAG
  rationale: «ἐρεθίζω» expresa una acción que incita o provoca negativamente. «No provoquen» reproduce bien la fuerza activa del mandato y es idiomático en español; «irriten» o «exasperen» introducen matices más específicos que no son necesarios aquí.
- source_word: τὰ τέκνα ὑμῶν
  english_pob_choice: your children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus hijos e hijas
  lexicon: BDAG
  rationale: «τέκνα» es el término inclusivo para descendencia/niños. En español, «hijos» comunica de manera natural el referente familiar amplio sin añadir una formulación innecesariamente explicativa.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - para evitar que
  lexicon: BDAG
  rationale: La cláusula con ἵνα expresa finalidad o resultado previsto. «Para que no» conserva esa fuerza final y suena natural en español contemporáneo.
- source_word: ἀθυμῶσιν
  english_pob_choice: may not become discouraged
  chosen_spanish: se desalienten
  alternatives_spanish:
  - pierdan el ánimo
  - pierdan el aliento
  - se desanimen
  lexicon: BDAG
  rationale: «ἀθυμέω» denota perder ánimo, desalentarse o perder el corazón. «Se desalienten» expresa bien el efecto interno sin sobretraducir hacia una emoción más intensa; mantiene también la posibilidad de «lose heart» que el POB inglés preserva en nota.
theological_decisions:
- issue: Alcance del vocativo πατέρες
  english_pob_reading: Addressed specifically to fathers
  chosen_spanish_reading: Dirigido específicamente a los padres varones
  alternative_spanish_readings:
  - Dirigido genéricamente a los padres y madres
  - Dirigido a los progenitores
  rationale: El griego dice literalmente «padres» y el POB inglés conserva esa especificidad. Mantener «Padres» evita neutralizar el destinatario y respeta la instrucción doméstica diferenciada del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4 (Gender-accurate over gender-neutral)
- issue: Valor resultativo de ἵνα μὴ ἀθυμῶσιν
  english_pob_reading: so that they may not become discouraged
  chosen_spanish_reading: para que no se desalienten
  alternative_spanish_readings:
  - para que no pierdan el ánimo
  - para que no pierdan el corazón
  rationale: La frase final expresa el propósito de evitar un efecto interno de abatimiento. «Se desalienten» comunica ese resultado sin forzar una imagen distinta ni borrar la conexión con la nota inglesa «lose heart».
  doctrine_reference: BDAG, ἀθυμέω
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y el audit trail inglés. No se documentan revisiones textuales ni cambios recientes que afecten esta unidad; por eso la redacción sigue de cerca la equivalencia óptima ya aprobada.
  spanish_consistency_notes:
  - Se mantiene el vocativo plural masculino «Padres» para conservar la especificidad del destinatario.
  - Se usa «no provoquen» como equivalente natural de ἐρεθίζετε, sin añadir un objeto emocional específico como «ira».
  - «Se desalienten» preserva el sentido de abatimiento interior y armoniza con la nota alternativa de «pierdan el ánimo».
