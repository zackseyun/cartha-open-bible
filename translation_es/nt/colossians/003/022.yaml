revisions:
- from: Esclavos[a], obedezcan en todo a sus amos según la carne[b], no con servicio solo para ser vistos[c], como quienes buscan agradar a la gente, sino con sinceridad de corazón, temiendo al Señor.
  to: Esclavos[a], obedezcan en todo a sus amos según la carne[b], no solo cuando los están mirando[c], como quienes buscan agradar a la gente, sino con sinceridad de corazón, temiendo al Señor.
  rationale: Se conserva la estructura y las decisiones léxicas centrales del borrador, pero se mejora la naturalidad y precisión de ὀφθαλμοδουλίαις con «no solo cuando los están mirando», que comunica con claridad el trabajo hecho únicamente bajo vigilancia. También se corrige la nota de δοῦλοι para evitar la alternativa «criados», que suaviza demasiado la realidad social del término.
  reviewer_model: gpt-5.4
