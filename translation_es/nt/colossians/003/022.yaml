translation:
  language: es
  text: Esclavos[a], obedezcan en todo a sus amos según la carne[b], no solo cuando los están mirando[c], como quienes buscan agradar a la gente, sino con sinceridad de corazón, temiendo al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavos» traduce δοῦλοι. También podría decirse «siervos» o «siervos esclavos», pero el término comúnmente designa a una persona esclavizada bajo autoridad de un amo.
    reason: lexical_alternative
  - marker: b
    text: «Según la carne» puede entenderse como «terrenales», subrayando que la autoridad de estos amos pertenece al ámbito de relaciones humanas y temporales.
    reason: lexical_alternative
  - marker: c
    text: La expresión griega alude a un servicio hecho solo cuando uno está siendo observado.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δοῦλοι
  english_pob_choice: Slaves
  chosen_spanish: Esclavos
  alternatives_spanish:
  - siervos
  - siervos esclavos
  lexicon: BDAG
  rationale: δοῦλος designa con fuerza a una persona en condición de esclavitud; como la POB inglesa optó por ‘Slaves’, ‘esclavos’ preserva la realidad social del término y evita suavizarlo indebidamente.
- source_word: ὑπακούετε
  english_pob_choice: obey
  chosen_spanish: obedezcan
  alternatives_spanish:
  - sean obedientes a
  - escuchen y hagan caso a
  lexicon: BDAG
  rationale: Es un imperativo de obediencia; ‘obedezcan’ comunica de manera natural la exigencia de conformidad a la autoridad.
- source_word: κατὰ πάντα
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo respecto
  lexicon: BDAG
  rationale: La expresión es distributiva e indica alcance total; ‘en todo’ es la forma española breve y clara que conserva ese alcance.
- source_word: τοῖς κατὰ σάρκα κυρίοις
  english_pob_choice: those who are your masters according to the flesh
  chosen_spanish: a sus amos según la carne
  alternatives_spanish:
  - a sus amos terrenales
  - a sus amos humanos
  lexicon: BDAG
  rationale: Se conserva la cualificación paulina κατὰ σάρκα con ‘según la carne’ para no borrar el matiz del original ni reemplazarlo por una paráfrasis interpretativa.
- source_word: σάρκα
  english_pob_choice: flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - lo terrenal
  - la condición humana
  lexicon: BDAG
  rationale: Aquí σάρξ mantiene su término paulino y su contraste con la relación con el Señor; ‘carne’ es la equivalencia más fiel, y la POB inglesa también preservó ‘flesh’.
- source_word: κυρίοις
  english_pob_choice: masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - patrones
  lexicon: BDAG
  rationale: En este contexto κύριος se refiere a dueños de esclavos, no al título divino; ‘amos’ evita confusión con ‘el Señor’ que aparece al final del versículo.
- source_word: μὴ ἐν ⸀ὀφθαλμοδουλίαις
  english_pob_choice: not with eye-service
  chosen_spanish: no con servicio solo para ser vistos
  alternatives_spanish:
  - no con servicio de ojos
  - no con servicio aparente
  lexicon: BDAG
  rationale: ὀφθαλμοδουλία es un término raro para un servicio hecho solo bajo observación; en español, una explicación breve comunica mejor el sentido que un calco opaco, sin perder la idea de trabajo fingido o vigilado.
- source_word: ὡς ἀνθρωπάρεσκοι
  english_pob_choice: as people-pleasers
  chosen_spanish: como quienes buscan agradar a la gente
  alternatives_spanish:
  - como agradadores de personas
  - como complacientes
  lexicon: BDAG
  rationale: 'El compuesto tiene fuerza despectiva: trabajar para agradar a humanos. La forma elegida conserva el sentido y evita una expresión poco natural en español.'
- source_word: ἀλλ’ ἐν ἁπλότητι καρδίας
  english_pob_choice: but with sincerity of heart
  chosen_spanish: sino con sinceridad de corazón
  alternatives_spanish:
  - sino con sencillez de corazón
  - sino con integridad de corazón
  lexicon: BDAG
  rationale: ἁπλότης aquí denota integridad/sencillez de intención, no simpleza intelectual; ‘sinceridad de corazón’ transmite bien la orientación ética del pasaje.
- source_word: φοβούμενοι
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - reverenciando
  - teniendo temor
  lexicon: BDAG
  rationale: El participio expresa la actitud que acompaña la obediencia; ‘temiendo’ conserva el lenguaje bíblico del temor de Dios sin suavizarlo excesivamente.
- source_word: τὸν ⸀κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  - al Señor Jesucristo
  lexicon: BDAG
  rationale: El referente final es el Señor divino, no los amos humanos. ‘Señor’ sigue la convención del proyecto para κύριος cuando apunta a Dios/ Cristo, manteniendo la distinción con ‘amos’.
theological_decisions:
- issue: Realidad de la esclavitud frente a lectura domesticada del texto
  english_pob_reading: Translate the social reality plainly (“slaves…masters”) without endorsing the institution; keep Paul’s contrast between human masters and the Lord explicit.
  chosen_spanish_reading: Traducir de forma directa la realidad social (“esclavos…amos”) sin convertirla en relación laboral moderna; mantener explícito el contraste entre amos humanos y el Señor.
  alternative_spanish_readings:
  - suavizar a ‘siervos…patrones’
  - modernizar a ‘empleados…jefes’
  rationale: El griego del código doméstico habla de esclavitud antigua. Mantener ‘esclavos’ y ‘amos’ conserva la tensión histórica y ética del pasaje, en línea con la primacía del idioma original.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; δοῦλος servant/slave context-dependent'
translation_notes:
  revision_awareness: 'Se siguió el texto griego SBLGNT y el audit trail inglés; no se registran revisiones posteriores que alteren la decisión de traducción. La versión española conserva las tensiones léxicas clave: δοῦλοι/esclavos, κατὰ σάρκα/según la carne, ὀφθαλμοδουλία con explicación contextual, y κύριος final como «el Señor».'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «amos» (κυρίοις humanos) y «el Señor» (κύριον divino).
  - Se evitó ‘SEÑOR’ en mayúsculas porque el texto aquí distingue al Señor final de los amos humanos y la convención del proyecto prefiere «Yahvé» para el nombre divino cuando corresponde.
  - Se conservó un registro digno y claro, apto para publicación, sin domesticar la referencia a esclavitud antigua.
  - La nota [a] ancla la decisión principal sobre δοῦλοι; [b] aclara la frase κατὰ σάρκα; [c] explica el modismo de ‘eye-service’.
