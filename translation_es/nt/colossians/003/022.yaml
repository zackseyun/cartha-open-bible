  text: οἱ δοῦλοι, ὑπακούετε κατὰ πάντα τοῖς κατὰ σάρκα κυρίοις, μὴ ἐν ⸀ὀφθαλμοδουλίαις, ὡς ἀνθρωπάρεσκοι, ἀλλ’ ἐν ἁπλότητι καρδίας, φοβούμενοι τὸν ⸀κύριον.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/022.yaml
  text: Slaves[3:22a], obey in everything those who are your masters according to the flesh, not with eye-service, as people-pleasers, but with sincerity of heart[3:22c][3:22b], fearing the Lord.
  footnotes:
  - marker: 3:22a
    text: “Slaves” (Greek δοῦλοι) can also be rendered “servants” or “bondservants,” but the term commonly denotes an enslaved person under a master’s authority.
    reason: lexical_alternative
  - marker: 3:22b
    text: “According to the flesh” may be rendered “earthly,” emphasizing that these masters’ authority is limited to this-worldly, human relations.
    reason: lexical_alternative
  - marker: 3:22c
    text: “Eye-service” refers to work done only when one is being watched.
    reason: cultural_note
