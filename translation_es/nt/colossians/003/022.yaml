review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca las decisiones de la POB inglesa: δοῦλοι = «Esclavos», ὑπακούετε = «obedezcan», κατὰ πάντα = «en todo», la distinción entre amos humanos y «el Señor», y el matiz de ἁπλότης καρδίας como sinceridad íntegra. También preserva adecuadamente el contraste teológico entre la autoridad humana limitada y el Señor. Sin embargo, la frase «no con servicio solo para ser vistos» introduce una formulación algo menos precisa y más torpe que el valor de ὀφθαλμοδουλίαις; conviene expresarla de modo más natural y directo en español como servicio hecho solo cuando los observan.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos detalles mejorables: 1) «servicio solo para ser vistos» suena algo forzado y puede sugerir finalidad de exhibirse, más que trabajo hecho únicamente bajo vigilancia; 2) en la nota a, «criados» no es una alternativa ideal para δοῦλοι, porque reduce demasiado la fuerza de esclavitud y no coincide con las alternativas auditadas en inglés. El resto del versículo es natural, legible y fiel.'
  glossary_alignment: 'La terminología del proyecto está bien observada en lo principal: «Esclavos» para δοῦλοι, «amos» para κυρίοις humanos, «Señor» para τὸν κύριον divino, y preservación de «según la carne» con nota alternativa. No hay conflicto con Yahvé/Mesías u otros términos por defecto. Conviene ajustar la nota léxica de δοῦλοι para usar alternativas más alineadas con la auditoría inglesa («siervos», «siervos por contrato»/«esclavos-siervos» sería posible, pero mejor mantener «siervos» y «siervos ligados» no es necesario); la mejor opción es «siervos» o «siervos esclavos» si se desea matiz, evitando «criados».'
  issues:
  - severity: medium
    issue: «no con servicio solo para ser vistos» no expresa con la mayor naturalidad ὀφθαλμοδουλίαις
    rationale: El griego describe servicio prestado solo bajo observación. La redacción actual suena algo torpe y puede interpretarse como actuar para llamar la atención. Una formulación como «no solo cuando los están mirando» comunica mejor el sentido en español.
  - severity: low
