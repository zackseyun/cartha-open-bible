translation:
  language: es
  text: donde no hay griego ni judío, circuncisión e incircuncisión, bárbaro, escita, esclavo, libre, sino que el Mesías es todo[a], y en todos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Mesías lo es todo y está en todos».'
    reason: alternative_reading
  - marker: b
    text: 'O: «en cada uno». La expresión griega es amplia y puede referirse personalmente a cada miembro de la comunidad renovada.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - en el cual
  lexicon: BDAG
  rationale: Expresa con naturalidad el ámbito o esfera a la que remite el contexto, manteniendo el valor locativo sin volverlo rígido.
- source_word: οὐκ ἔνι
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no está
  lexicon: BDAG
  rationale: La expresión idiomática comunica ausencia dentro de una esfera determinada; en español, 'no hay' es la formulación más natural y directa.
- source_word: Ἕλλην καὶ Ἰουδαῖος
  english_pob_choice: Greek and Jew
  chosen_spanish: griego ni judío
  alternatives_spanish:
  - griego y judío
  - heleno y judío
  lexicon: BDAG
  rationale: Se conserva el par étnico-cultural concreto del texto griego, sin generalizar a 'gentil'. La negación española fluye mejor con 'ni' tras 'no hay'.
- source_word: περιτομὴ καὶ ἀκροβυστία
  english_pob_choice: circumcision and uncircumcision
  chosen_spanish: circuncisión e incircuncisión
  alternatives_spanish:
  - los circuncisos y los incircuncisos
  - circuncisión y prepucio
  lexicon: BDAG
  rationale: Se mantienen los sustantivos abstractos que funcionan como marcadores de identidad social y religiosa. 'Incircuncisión' preserva el paralelismo formal del griego.
- source_word: βάρβαρος
  english_pob_choice: barbarian
  chosen_spanish: bárbaro
  alternatives_spanish:
  - extranjero
  - inculto
  lexicon: BDAG
  rationale: El término tradicional conserva la oposición cultural antigua y su fuerza retórica; alternativas más suaves diluyen esa carga.
- source_word: Σκύθης
  english_pob_choice: Scythian
  chosen_spanish: escita
  alternatives_spanish:
  - escita
  lexicon: BDAG
  rationale: Es un etnónimo específico que se translitera de forma estándar al español como 'escita'.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG
  rationale: Aquí el contraste con 'libre' hace patente el estatus social-legal; 'esclavo' preserva con mayor precisión la fuerza del término.
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - libre
  - hombre libre
  lexicon: BDAG
  rationale: Es el antónimo natural de 'esclavo' y mantiene la paridad del par social.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En español, tras una negación previa, 'sino que' expresa mejor el fuerte contraste con la realidad centrada en Cristo.
- source_word: τὰ πάντα
  english_pob_choice: is all
  chosen_spanish: es todo
  alternatives_spanish:
  - es todas las cosas
  - es el todo
  lexicon: BDAG
  rationale: Con Χριστός como sujeto, la frase expresa su suficiencia y centralidad total; 'es todo' reproduce esa compacta afirmación sin sobreespecificarla.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all
  chosen_spanish: en todos
  alternatives_spanish:
  - en todo
  - en todas las personas
  lexicon: BDAG
  rationale: La frase puede entenderse de modo personal en la comunidad renovada; 'en todos' preserva la amplitud y evita restringir prematuramente el alcance.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el audit trail inglés oscila entre 'Messiah' y 'Christ', en español la forma asentada y más reconocible en este contexto paulino es 'Cristo'. Se conserva el título cristológico sin imponer una paráfrasis.
theological_decisions:
- issue: Alcance de ἐν πᾶσιν
  english_pob_reading: in all
  chosen_spanish_reading: en todos
  alternative_spanish_readings:
  - en cada uno
  - en todas las personas
  - en todo
  rationale: El griego es breve y deliberadamente abierto. 'En todos' mantiene la ambigüedad entre una lectura personal y una lectura más amplia, sin resolverla de modo excesivo.
  doctrine_reference: Preservar la tensión interpretativa del original.
- issue: Relación entre las dos cláusulas finales
  english_pob_reading: Christ is all, and in all
  chosen_spanish_reading: Cristo es todo, y en todos
  alternative_spanish_readings:
  - Cristo lo es todo, y está en todos
  - Cristo es todas las cosas, y está en todos
  rationale: 'La coordinación conserva dos predicados relacionados pero distinguibles: la plenitud/suficiencia de Cristo y su presencia en todos. No se expande el texto más allá de lo que el griego dice.'
  doctrine_reference: Evitar resolver la compacta formulación griega en una explicación interpretativa excesiva.
translation_notes:
  revision_awareness: La tradición de revisión inglesa muestra oscilación entre 'Messiah' y 'Christ' para Χριστός, y entre lecturas más compactas o más explícitas de la cláusula final. Esta versión española evita seguir mecánicamente una sola fase del inglés y traduce directamente el griego, manteniendo la tensión interpretativa donde el texto la deja abierta.
  spanish_consistency_notes:
  - Se conserva 'Cristo' como forma cristológica estable en español, sin cambiarlo a 'Mesías' en este versículo para evitar una ruptura innecesaria con el uso eclesial idiomático del nombre-título.
  - '''Esclavo'' se mantiene por el contraste explícito con ''libre'' y por la fuerza social del término.'
  - La secuencia negativa usa 'no hay' + 'ni' para una fluidez natural en español sin perder el paralelo de los grupos excluidos.
