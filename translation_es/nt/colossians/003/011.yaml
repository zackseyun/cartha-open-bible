review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y la mayoría de los contrastes del griego: ὅπου → «donde», οὐκ ἔνι → «no hay», los pares «griego/judío», «circuncisión/incircuncisión», «bárbaro/escita», «esclavo/libre», y la coordinación final. Sin embargo, no sigue la decisión léxica/doctrinal documentada para Χριστός, que en este contexto debe verterse como «Mesías», no «Cristo». Además, la nota [a] no corresponde bien al valor de la nota inglesa principal, porque mezcla la alternativa completa con un comentario de coordinación, mientras que la nota inglesa preserva específicamente la alternativa «es todo y en todos / es todo y está en todos».'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «donde no hay … sino que …» fluye bien, y «esclavo, libre» conserva bien el contraste social. «Cristo es todo» suena idiomático, aunque «lo es todo» también sería posible; no es necesario cambiarlo. La principal mejora necesaria es terminológica y de alineación de notas, no de legibilidad general.
  glossary_alignment: 'Hay una desviación importante del glosario del proyecto: Χριστός debe traducirse normalmente como «Mesías» cuando funciona como título, y el audit trail inglés finalmente restauró «Messiah» por política doctrinal. El borrador usa «Cristo» y su justificación contradice ese criterio. «δοῦλος» → «esclavo» sí está bien alineado. No hay otras divergencias mayores de terminología base.'
  issues:
  - severity: high
    issue: Χριστός se tradujo como «Cristo» en vez de «Mesías».
    rationale: El paquete fuente y el audit trail documentan explícitamente que aquí Χριστός funciona como título y que debe mantenerse «Messiah». La política del proyecto para español indica normalmente «Mesías» en esos casos. «Cristo» incumple esa decisión documentada.
  - severity: medium
    issue: La nota [a] no preserva fielmente la lógica de las notas del POB inglés.
    rationale: La nota inglesa principal ofrece la alternativa completa «Christ is everything and in everyone», mientras que la española actual dice «Cristo es todo y está en todos» y añade una explicación sobre coordinación que corresponde más bien a otra nota inglesa. Conviene simplificar y alinear las alternativas sin mezclar funciones.
  - severity: low
    issue: La explicación léxica de Χριστός en el borrador español justifica una excepción no respaldada por el expediente.
    rationale: La rationale afirma preferencia contextual por «Cristo» en español paulino, pero el expediente ya resolvió esa cuestión en sentido contrario. Aunque esto no aparece en el texto final, indica desalineación con la guía doctrinal y conviene corregirla en la revisión editorial.
  revised_spanish_text: donde no hay griego ni judío, circuncisión e incircuncisión, bárbaro, escita, esclavo, libre, sino que el Mesías es todo[a], y en todos[b].
