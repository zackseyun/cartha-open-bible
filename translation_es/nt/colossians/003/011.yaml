- from: donde no hay griego ni judío, circuncisión e incircuncisión, bárbaro, escita, esclavo, libre, sino que Cristo es todo[a], y en todos[b].
  to: donde no hay griego ni judío, circuncisión e incircuncisión, bárbaro, escita, esclavo, libre, sino que el Mesías es todo[a], y en todos[b].
  rationale: Se cambió «Cristo» por «el Mesías» para seguir la decisión léxica y doctrinal documentada para Χριστός en este versículo. Se mantuvo «es todo» por fidelidad a τὰ πάντα y buena naturalidad en español. Se ajustaron las notas para alinearlas mejor con el audit trail inglés y preservar la alternativa interpretativa personal de ἐν πᾶσιν sin mezclar innecesariamente comentarios distintos.
