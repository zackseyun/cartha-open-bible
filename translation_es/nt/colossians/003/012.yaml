review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura exhortativa y la mayoría de las virtudes del griego: Ἐνδύσασθε ... ἐκλεκτοὶ τοῦ θεοῦ, ἅγιοι καὶ ἠγαπημένοι ... χρηστότητα, ταπεινοφροσύνην, πραΰτητα, μακροθυμίαν. Sin embargo, en español falta la construcción que complete naturalmente el mandato metafórico de ''vestirse'': ''Revístanse ... de ...''. El texto actual coloca ''de compasión'' solo antes del primer sustantivo, lo que deja una sintaxis algo trabada. También conviene alinear χρηστότητα con ''amabilidad'' o ''bondad amable'' más que ''bondad'' sola, porque el campo semántico apunta a kindness, no a goodness en general.'
  spanish_quality_summary: 'El registro es digno y comprensible, pero la frase principal necesita un ajuste menor para sonar natural en español bíblico moderno: ''Revístanse ... de compasión, amabilidad, humildad, mansedumbre y paciencia''. Así se conserva mejor la metáfora de vestirse y la lista fluye con claridad. Las notas b y c son útiles; la nota a debe ajustarse al nuevo anclaje textual.'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. ''Dios'', ''santos'' y ''amados'' están bien. ''Mansedumbre'' es una excepción razonable frente al inglés ''gentleness'' y está bien justificada para español eclesial. El punto principal es léxico-sintáctico en χρηστότητα: ''bondad'' es posible, pero menos preciso que ''amabilidad'' para el valor de kindness en esta lista.'
  issues:
  - severity: medium
    issue: La sintaxis de 'Revístanse[a] ... de compasión, bondad...' queda incompleta/forzada.
    rationale: En español, 'revístanse' normalmente pide un complemento con 'de' que abarque toda la serie o una reformulación como 'vístanse con'. Tal como está, parece que solo 'compasión' depende de 'de', mientras el resto queda en aposición extraña.
  - severity: medium
    issue: '''bondad'' para χρηστότητα es más amplio que el sentido contextual de kindness.'
    rationale: χρηστότης en listas paulinas suele señalar trato benigno/amable, no bondad moral en sentido amplio. 'Amabilidad' comunica mejor el matiz relacional en español contemporáneo.
  - severity: low
    issue: La nota a ya no corresponde exactamente al mejor anclaje tras la reparación sintáctica.
    rationale: Si el texto principal pasa a 'Revístanse de[a] ...', la nota debe explicar la alternativa sin crear ambigüedad innecesaria.
  revised_spanish_text: Revístanse, pues, como escogidos de Dios, santos y amados, de[a] compasión, amabilidad, humildad, mansedumbre[b] y paciencia[c].
  revised_footnotes:
  - marker: a
    text: O «Revístanse de tiernos afectos de compasión». El griego habla literalmente de «entrañas» o afectos internos de misericordia/compasión.
    reason: lexical_alternative
  - marker: b
    text: O «gentileza»; el término griego puede referirse a la mansedumbre, a una actitud de fuerza controlada.
    reason: lexical_alternative
  - marker: c
    text: O «longanimidad»; la idea es una paciencia perseverante hacia otros.
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación menor para que la metáfora de ἐνδύσασθε funcione naturalmente en español ('revístanse de ...') y para precisar χρηστότητα como 'amabilidad', más cercano a 'kindness' en esta lista de virtudes. Se conservaron 'escogidos de Dios', 'santos', 'amados', 'mansedumbre' y 'paciencia' por ser fieles y claros en español eclesial general.
