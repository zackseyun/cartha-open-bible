translation:
  language: es
  text: Revístanse, pues, como escogidos de Dios, santos y amados, de[a] compasión, amabilidad, humildad, mansedumbre[b] y paciencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Revístanse de tiernos afectos de compasión». El griego habla literalmente de «entrañas» o afectos internos de misericordia/compasión.
    reason: lexical_alternative
  - marker: b
    text: O «gentileza»; el término griego puede referirse a la mansedumbre, a una actitud de fuerza controlada.
    reason: lexical_alternative
  - marker: c
    text: O «longanimidad»; la idea es una paciencia perseverante hacia otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐνδύσασθε
  english_pob_choice: Put on
  chosen_spanish: Revístanse
  alternatives_spanish:
  - Pónganse
  - Vístanse
  lexicon: BDAG
  rationale: El verbo metafórico de vestirse se expresa con naturalidad en español como 'revístanse', preservando la imagen de adoptar virtudes como si fueran una prenda.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - por tanto
  lexicon: BDAG
  rationale: '''Pues'' conserva la inferencia discursiva y suena más natural en una exhortación en español que una fórmula más pesada como ''por tanto''.'
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: '''Como'' mantiene el valor comparativo/identitario: deben vivir de acuerdo con lo que ya son en identidad.'
- source_word: ἐκλεκτοὶ τοῦ θεοῦ
  english_pob_choice: God’s chosen ones
  chosen_spanish: escogidos de Dios
  alternatives_spanish:
  - los elegidos de Dios
  - los escogidos de Dios
  lexicon: BDAG
  rationale: '''Escogidos de Dios'' reproduce el sentido de elección divina sin cargar innecesariamente con una formulación más técnica o eclesiástica. Se evita ''los electos'' por sonoridad menos natural en español actual.'
- source_word: ἅγιοι
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - santos y apartados
  - sagrados
  lexicon: BDAG
  rationale: Aquí el adjetivo describe identidad del pueblo de Dios; 'santos' es la forma más estable y fiel en español, aunque conserva resonancias tradicionales. 'Sagrados' sería menos preciso.
- source_word: ἠγαπημένοι
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - bienamados
  - amados por Dios
  lexicon: BDAG
  rationale: '''Amados'' comunica bien el estado resultante del participio pasivo y evita una redundancia estilística con ''escogidos de Dios''.'
- source_word: σπλάγχνα οἰκτιρμοῦ
  english_pob_choice: compassion
  chosen_spanish: compasión
  alternatives_spanish:
  - tierno afecto de compasión
  - entrañas de misericordia
  lexicon: BDAG
  rationale: La revisión inglesa prefirió 'compassion' para reflejar más directamente el plural e idiomático griego. En español, 'compasión' conserva esa concreción sin introducir 'corazón' o 'entrañas' en el texto principal.
- source_word: χρηστότητα
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - benignidad
  - amabilidad
  lexicon: BDAG
  rationale: '''Bondad'' es una virtud amplia y bíblicamente reconocible en español; aunque ''amabilidad'' sería más coloquial, podría suavizar demasiado el matiz ético fuerte de la lista.'
- source_word: ταπεινοφροσύνην
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - bajeza de mente
  - modestia
  lexicon: BDAG
  rationale: '''Humildad'' es la equivalencia directa y natural para la virtud de mentalidad humilde.'
- source_word: πραΰτητα
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - gentileza
  - dulzura
  lexicon: BDAG
  rationale: Aunque el inglés POB usa 'gentleness' por claridad moderna, en español 'mansedumbre' comunica mejor la virtud paulina sin perder su fuerza ética; 'gentileza' puede sonar meramente social.
- source_word: μακροθυμίαν
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - forbearancia
  lexicon: BDAG
  rationale: '''Paciencia'' es la manera más natural en español para la perseverancia paciente hacia otros, y corresponde bien al uso de virtud en listas paulinas.'
theological_decisions:
- issue: Cómo reflejar ἐκλεκτοὶ τοῦ θεοῦ sin importar un sistema doctrinal específico sobre la elección
  english_pob_reading: God’s chosen ones
  chosen_spanish_reading: escogidos de Dios
  alternative_spanish_readings:
  - los elegidos de Dios
  - los electos de Dios
  rationale: La frase afirma identidad por iniciativa divina, pero no explica aquí el mecanismo teológico de la elección. 'Escogidos de Dios' conserva el dato bíblico con el menor sobrecargado doctrinal.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Cómo tratar πραΰτης en español sin perder la virtud ética pero evitando una palabra demasiado coloquial
  english_pob_reading: gentleness
  chosen_spanish_reading: mansedumbre
  alternative_spanish_readings:
  - gentileza
  - meekness
  rationale: La lista de virtudes paulina requiere una virtud reconocible y con peso moral. 'Mansedumbre' es más exacta en el registro bíblico español que 'gentileza', que puede sonar solo social.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó una expresión interpretativa por un término más directo para σπλάγχνα οἰκτιρμοῦ. En español se siguió esa misma preferencia, evitando añadir 'corazón' o 'entrañas' en el texto principal y dejando la alternativa explicada en nota.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεοῦ, sin introducir 'SEÑOR' ni otras máscaras.
  - Se prefirió un español moderno y digno, con imperativos reflexivos naturales ('Revístanse').
  - Las virtudes se expresan con vocabulario bíblico comprensible en español, preservando el orden y la serie del original.
  - '''Mansedumbre'' se usa por fidelidad semántica al contexto paulino, aunque la nota deja abierta ''gentileza'' como alternativa.'
