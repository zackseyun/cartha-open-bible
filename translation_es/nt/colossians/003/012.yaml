revisions:
- from: Revístanse[a], pues, como escogidos de Dios, santos y amados, de compasión, bondad, humildad, mansedumbre[b] y paciencia[c].
  to: Revístanse, pues, como escogidos de Dios, santos y amados, de[a] compasión, amabilidad, humildad, mansedumbre[b] y paciencia[c].
  rationale: Se hizo una reparación menor para que la metáfora de ἐνδύσασθε funcione naturalmente en español ('revístanse de ...') y para precisar χρηστότητα como 'amabilidad', más cercano a 'kindness' en esta lista de virtudes. Se conservaron 'escogidos de Dios', 'santos', 'amados', 'mansedumbre' y 'paciencia' por ser fieles y claros en español eclesial general.
