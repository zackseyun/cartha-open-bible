translation:
  language: es
  text: sabiendo que del Señor recibirán la recompensa de la herencia. Ustedes sirven[b] al Señor Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mesías» traduce aquí el título Χριστός; la alternativa tradicional sería «Cristo».
    reason: alternative_reading
  - marker: b
    text: 'El verbo griego está en indicativo presente: «sirven», no un imperativo directo como «sirvan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque saben
  - conociendo
  lexicon: BDAG
  rationale: El participio perfecto de οἶδα expresa un estado de conocimiento vigente. En español, «sabiendo» conserva el enlace participial y la función de base exhortativa sin añadir una causalidad más fuerte de la que exige el griego.
- source_word: ἀπὸ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Maestro
  - de parte del Señor
  lexicon: BDAG
  rationale: ἀπό con genitivo indica origen o procedencia. «Del Señor» comunica de modo natural que la recompensa proviene de esa fuente; «Señor» mantiene el valor cristológico del término κύριος.
- source_word: ἀπολήμψεσθε
  english_pob_choice: you will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - recibirán de vuelta
  lexicon: BDAG
  rationale: El futuro medio indica recepción futura. En español, «recibirán» es la forma más clara y sobria para conservar la idea de recibir una recompensa sin sobrerrepresentar el matiz de retribución.
- source_word: ἀνταπόδοσιν
  english_pob_choice: the reward
  chosen_spanish: la recompensa
  alternatives_spanish:
  - la retribución
  - el pago
  lexicon: BDAG
  rationale: El sustantivo puede significar recompensa o retribución. «La recompensa» comunica bien el valor positivo del contexto y evita un tono excesivamente técnico o duro.
- source_word: τῆς κληρονομίας
  english_pob_choice: of the inheritance
  chosen_spanish: de la herencia
  alternatives_spanish:
  - de la herencia recibida
  - que consiste en la herencia
  lexicon: BDAG
  rationale: Se conserva la estructura genitiva de manera directa. «Herencia» es la equivalencia natural de κληρονομία y mantiene la densidad paulina sin explicitar más de lo que el texto dice.
- source_word: τῷ κυρίῳ Χριστῷ
  english_pob_choice: the Lord Messiah
  chosen_spanish: al Señor Mesías
  alternatives_spanish:
  - al Señor Cristo
  - al Cristo Señor
  - al Señor Jesucristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» para Χριστός conforme al criterio del proyecto, porque aquí funciona como título. «Al Señor» conserva κύριος, y la preposición con dativo se expresa naturalmente en español con «al».
- source_word: δουλεύετε
  english_pob_choice: you are serving
  chosen_spanish: sirven
  alternatives_spanish:
  - están sirviendo
  - sirvan
  - son esclavos de
  lexicon: BDAG
  rationale: 'El presente indicativo se conserva como afirmación: «sirven». Aunque en contexto puede sonar exhortativo, el griego no usa imperativo. «Servir» respeta el valor verbal sin introducir una orden que el morfema no expresa.'
theological_decisions:
- issue: Título cristológico Χριστῷ
  english_pob_reading: Messiah rather than Christ in title-bearing context
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto presenta Χριστῷ como título. Siguiendo el criterio del proyecto, «Mesías» preserva la decisión terminológica auditable y evita imponer la forma tradicional «Cristo» donde el griego subraya el título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve contested terms where source-title force is active'
- issue: Valor de δουλεύετε
  english_pob_reading: indicative ('you are serving') rather than an imperative
  chosen_spanish_reading: presente indicativo ('sirven')
  alternative_spanish_readings:
  - imperativo ('sirvan')
  rationale: La forma griega es presente activo indicativo, segunda plural. En español conviene mantener ese hecho gramatical y no resolverlo como mandato, aunque la frase tenga fuerza exhortativa dentro del código doméstico.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'La historia de revisiones en inglés muestra una oscilación entre traducir δουλεύετε como indicativo o como imperativo, y entre «Messiah» y «Christ». Para el español se sigue la evidencia morfológica del griego y la política terminológica del proyecto: Χριστῷ se vierte «Mesías», y δουλεύετε se conserva como presente indicativo («sirven»).'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος y «Mesías» para Χριστός, conforme a los defaults del proyecto.
  - Se prefiere «recompensa» y «herencia» por su claridad y porque mantienen la relación compacta del genitivo griego.
  - 'La puntuación reproduce la unidad de dos cláusulas: la primera con participio de conocimiento y la segunda con una afirmación verbal sobre el servicio al Señor Mesías.'
