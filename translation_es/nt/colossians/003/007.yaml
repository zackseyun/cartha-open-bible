translation:
  language: es
  text: En estas cosas[a] ustedes también anduvieron antes, cuando vivían en ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En las cuales ustedes también anduvieron antes, cuando vivían en ellas». El pronombre relativo griego puede traducirse más literalmente como «en las cuales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν οἷς
  english_pob_choice: In these things
  chosen_spanish: En estas cosas
  alternatives_spanish:
  - En las cuales
  - En ellas
  lexicon: BDAG
  rationale: El relativo dativo plural retoma la lista inmediata de vicios del contexto. ‘En estas cosas’ conserva el referente explícito y el valor locativo/instrumental de ἐν, de manera natural en español.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you too
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes asimismo
  lexicon: BDAG
  rationale: καὶ con el pronombre enfático ὑμεῖς subraya que los colosenses participaron antes en ese mismo estilo de vida. ‘Ustedes también’ mantiene ese énfasis en español corriente.
- source_word: περιεπατήσατε
  english_pob_choice: walked
  chosen_spanish: anduvieron
  alternatives_spanish:
  - caminaron
  - se condujeron
  lexicon: BDAG
  rationale: Pablo usa περιπατέω metafóricamente para la conducta o manera de vivir. ‘Anduvieron’ preserva la metáfora sin sonar forzado; ‘se condujeron’ explicita el sentido pero atenúa la imagen.
- source_word: ποτε
  english_pob_choice: once
  chosen_spanish: alguna vez
  alternatives_spanish:
  - antes
  - una vez
  lexicon: BDAG
  rationale: ποτε señala un tiempo pasado e indefinido con sentido de ‘antiguamente’. ‘Alguna vez’ comunica ese pasado sin rigidez y encaja bien con el tono descriptivo del verso.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - mientras
  - en el tiempo en que
  lexicon: BDAG
  rationale: Conjunción temporal directa que une la conducta pasada con el estado de vida pasado.
- source_word: ἐζῆτε
  english_pob_choice: were living
  chosen_spanish: vivían
  alternatives_spanish:
  - estaban viviendo
  - llevaban esa vida
  lexicon: BDAG
  rationale: El imperfecto expresa una acción o estado continuo en el pasado. ‘Vivían’ es natural en español y conserva la duratividad; el contexto ya diferencia esta idea de ‘anduvieron’.
- source_word: ἐν τούτοις
  english_pob_choice: in them
  chosen_spanish: en ellas
  alternatives_spanish:
  - en estas cosas
  - entre ellas
  lexicon: BDAG
  rationale: τούτοις retoma las prácticas mencionadas. ‘En ellas’ evita la repetición de ‘estas cosas’ y mantiene la idea de inmersión en ese ámbito de vida; el femenino plural concuerda con ‘cosas’ en el antecedente implícito.
theological_decisions:
- issue: Distinción entre la conducta pasada y el estado/sphere de vida pasada
  english_pob_reading: The verse distinguishes former conduct ('walked') from former sphere/state of life ('were living in them').
  chosen_spanish_reading: El versículo distingue la conducta pasada (‘anduvieron’) del estado o esfera de vida pasada (‘vivían en ellas’).
  alternative_spanish_readings:
  - Tratar ambos verbos como sinónimos y traducirlos simplemente como ‘vivían’
  - Unificar ambos con ‘se comportaban’
  rationale: Conviene mantener la distinción entre περιπατέω y ζάω para respetar la estructura del griego y la descripción escalonada de Pablo sobre el pasado pecaminoso. ‘Anduvieron’ conserva la imagen ética; ‘vivían en ellas’ expresa la permanencia dentro de ese ámbito.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el borrador sigue la lectura de alta concordancia y conserva la distinción verbal destacada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como convención del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa ‘anduvieron’ para περιπατέω y ‘vivían’ para ζάω para no borrar la distinción lexical documentada.
  - El referente de ‘ellas’ se entiende por el contexto inmediato de los vicios listados en el versículo anterior.
