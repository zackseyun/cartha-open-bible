  rationale: Se añade «vístanse de» para reflejar explícitamente el verbo implícito heredado del v. 12, en línea con el English POB y con la metáfora del vestido del contexto inmediato. Se conserva «sobre todas estas cosas» por fidelidad a ἐπὶ πᾶσιν δὲ τούτοις y «vínculo de la perfección» para mantener la compacta ambigüedad de τῆς τελειότητος. En la nota, «plenitud» sustituye a «completitud» por mayor naturalidad en español sin perder el valor semántico de «completeness».
