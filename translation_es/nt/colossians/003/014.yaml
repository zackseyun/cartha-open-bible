translation:
  language: es
  text: Y sobre todas estas cosas, vístanse de amor[a], que es el vínculo de la perfección.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el vínculo de la plenitud» o «el vínculo de la madurez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ πᾶσιν δὲ τούτοις
  english_pob_choice: above all these
  chosen_spanish: y sobre todas estas cosas
  alternatives_spanish:
  - sobre todas estas
  - por encima de todas estas cosas
  - además de todas estas cosas
  lexicon: BDAG
  rationale: La frase con ἐπί + dativo expresa prioridad o superioridad respecto de las virtudes anteriores. «Sobre todas estas cosas» conserva la idea de primacía y suena natural en español; el añadido de «y» refleja la conexión discursiva de δέ.
- source_word: τὴν ἀγάπην
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la caridad
  - el amor fraternal
  lexicon: BDAG
  rationale: ἀγάπη se traduce de forma estándar por «amor». «Caridad» desplaza el sentido hacia una virtud tradicional más restringida y «amor fraternal» añade una especificación no exigida por el texto.
- source_word: '[implicit verb from context]'
  english_pob_choice: put on
  chosen_spanish: '[no se explicita en el texto español; se sobreentiende por el contexto de vestir]'
  alternatives_spanish:
  - vístanse de
  - revístanse de
  lexicon: BDAG
  rationale: El verbo imperativo está elidido en este versículo y depende de ἐνδύσασθε del v. 12 dentro de la metáfora del vestido. En español puede mantenerse la fluidez sin repetir el verbo, ya que el contexto inmediato lo suministra claramente.
- source_word: ὅ
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: BDAG
  rationale: El relativo neutro λειτουργa como enlace explicativo sobre el concepto de amor y la cláusula entera. «Que» es la solución más natural en español sin forzar el género del antecedente.
- source_word: σύνδεσμος
  english_pob_choice: bond
  chosen_spanish: vínculo
  alternatives_spanish:
  - lazo
  - nexo
  - unión
  lexicon: BDAG
  rationale: «Vínculo» expresa bien la idea de algo que une y mantiene cohesionadas las virtudes. Es idiomático en español y conserva la metáfora sin volverla anatómica como «ligamento».
- source_word: τῆς τελειότητος
  english_pob_choice: of perfection
  chosen_spanish: de la perfección
  alternatives_spanish:
  - de la plenitud
  - de la madurez
  - de la completitud
  lexicon: BDAG
  rationale: τελειότης puede referirse a perfección, completitud o madurez. Se conserva «perfección» porque refleja la formulación inglesa auditada y mantiene abierta la tensión semántica sin resolverla hacia «madurez».
theological_decisions:
- issue: Sentido de σύνδεσμος τῆς τελειότητος
  english_pob_reading: Love is presented as the unifying bond that brings the listed virtues into complete wholeness.
  chosen_spanish_reading: El amor es el vínculo que unifica las virtudes anteriores en una plenitud o perfección integral.
  alternative_spanish_readings:
  - El amor es el vínculo que pertenece a la perfección.
  - El amor es el vínculo que produce madurez/completitud.
  rationale: La genitiva admite varias relaciones cercanas. La redacción española mantiene la imagen compacta y deja abierta la relación exacta entre el vínculo y la perfección, sin sobreinterpretar el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'No se requieren cambios adicionales respecto al pasaje fuente y al audit trail inglés: la traducción conserva la primacía de ἐπί + dativo, la metáfora del vestir implícita y la ambigüedad controlada de τελειότης.'
  spanish_consistency_notes:
  - Se usa «amor» para ἀγάπη, conforme al uso estándar del proyecto.
  - Se conserva «perfección» para τελειότης, con nota de alternativas para mantener la tensión semántica.
  - No se introduce «Cristo» ni «Señor» porque no aparecen en este versículo.
  - La cláusula relativa se vierte con «que» para evitar un relativo marcado por género que el griego no exige.
