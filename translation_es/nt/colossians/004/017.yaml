translation:
  language: es
  text: 'Y díganle a Arquipo: «Ocúpate del ministerio que recibiste en el Señor[a], para que lo cumplas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «el ministerio que recibiste del Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ εἴπατε
  english_pob_choice: tell
  chosen_spanish: díganle
  alternatives_spanish:
  - díganle y
  - hablen a
  lexicon: BDAG
  rationale: El imperativo plural aoristo pide una orden directa dirigida a la comunidad. «Díganle» conserva el mandato y suena natural en español. Se evita una construcción más literal como «y digan» porque resulta menos idiomática en este contexto.
- source_word: Ἀρχίππῳ
  english_pob_choice: Archippus
  chosen_spanish: Arquipo
  alternatives_spanish:
  - Archipo
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio al español con la forma más asentada y legible, «Arquipo», manteniendo la referencia personal sin anglicismo.
- source_word: Βλέπε
  english_pob_choice: See to
  chosen_spanish: Presta atención a
  alternatives_spanish:
  - Cuida
  - Mira por
  - Atiende a
  lexicon: BDAG
  rationale: El imperativo presente expresa vigilancia continua o atención cuidadosa. «Presta atención a» comunica bien la idea de encargo atento sin el matiz algo arcaico de «mira» o «ten cuidado de».
- source_word: διακονίαν
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - tarea
  - diaconía
  lexicon: BDAG
  rationale: En este contexto de una responsabilidad recibida «en el Señor», «ministerio» refleja una labor encomendada en el ámbito cristiano. Se conserva la carga eclesial sin convertirla en un oficio más específico de lo que el texto permite.
- source_word: παρέλαβες
  english_pob_choice: received
  chosen_spanish: recibiste
  alternatives_spanish:
  - aceptaste
  - tomaste
  lexicon: BDAG
  rationale: El aoristo indica una acción recibida ya dada de antemano. «Recibiste» preserva la idea de encargo confiado, no autoasumido.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - del Señor
  - en unión con el Señor
  lexicon: BDAG
  rationale: Se mantiene la preposición con la misma apertura semántica del griego. «En el Señor» respeta la formulación y deja en pie la tensión entre esfera relacional y posible procedencia sin resolverla unilateralmente.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: La cláusula final expresa propósito. «Para que» es la forma natural en español y conserva la fuerza teleológica.
- source_word: πληροῖς
  english_pob_choice: fulfill
  chosen_spanish: lo cumplas
  alternatives_spanish:
  - lo completes
  - lo lleves a cabo plenamente
  lexicon: BDAG
  rationale: «Cumplir» comunica la idea de llevar una encomienda a su plena realización. Se evita «completar» por sonar más técnico y menos personal en este encargo pastoral.
theological_decisions:
- issue: Sentido de ἐν κυρίῳ
  english_pob_reading: Rendered as 'in the Lord' in the main text, while the note allows 'from the Lord' as an alternative reading.
  chosen_spanish_reading: «en el Señor» en el texto principal, con nota de «del Señor» como posibilidad interpretativa.
  alternative_spanish_readings:
  - del Señor
  - en unión con el Señor
  rationale: El griego usa ἐν, no ἀπό ni παρά. Por eso el texto principal conserva «en el Señor». La nota mantiene abierta la posibilidad de entender la relación como origen o procedencia implícita, sin borrar la ambigüedad documentada por el POB inglés.
  doctrine_reference: 'Translation philosophy: preservar tensiones teológicas/documentales; decisión léxica para κύριος → «Señor».'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se reportaron cambios necesarios y el nivel de acuerdo fue alto. La redacción española se elaboró directamente desde el griego, usando el audit trail inglés solo como apoyo para decisiones léxicas y para preservar la ambigüedad de ἐν κυρίῳ.'
  spanish_consistency_notes:
  - Se conserva el tono exhortativo directo del imperativo plural inicial.
  - «Señor» se usa consistentemente para κύριος según el criterio del proyecto.
  - «Ministerio» se mantiene para διακονία, evitando alternar con «servicio» en este versículo para no diluir la fuerza del encargo.
  - La nota de pie de página reproduce la alternativa documentada sin ampliar indebidamente el sentido del texto.
