revisions:
- from: 'Y díganle a Arquipo[a]: «Presta atención al ministerio que recibiste en el Señor, para que lo cumplas».'
  to: 'Y díganle a Arquipo: «Ocúpate del ministerio que recibiste en el Señor[a], para que lo cumplas».'
  rationale: Se corrige el lugar de la nota para que corresponda a ἐν κυρίῳ, que es donde está la alternativa documentada. También se ajusta «Presta atención al» a «Ocúpate del», una formulación más natural en español para el sentido exhortativo de βλέπε respecto a una responsabilidad ministerial. El resto del contenido permanece fiel al griego y al rastro de decisiones del POB inglés.
