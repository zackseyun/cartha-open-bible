translation:
  language: es
  text: 'Lo envié a ustedes precisamente para esto: que sepan cómo estamos[a], y que él anime sus corazones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «para que sepamos cómo están».'
    reason: textual_variant
lexical_decisions:
- source_word: ὃν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre acusativo masculino singular se refiere a Tíquico implícito por el contexto inmediato; en español, el objeto directo clítico 'lo' suena natural y conserva la referencia personal sin sobrecargar la frase.
- source_word: ἔπεμψα
  english_pob_choice: I sent
  chosen_spanish: envié
  alternatives_spanish:
  - he enviado
  lexicon: BDAG
  rationale: El aoristo se vierte como pasado simple; 'envié' es la forma más natural en español y transmite el acto puntual de envío.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - hacia ustedes
  lexicon: BDAG
  rationale: Con verbos de envío, la dirección hacia personas se expresa naturalmente con 'a'; se elige 'ustedes' por registro neutral latinoamericano y legibilidad eclesial amplia.
- source_word: εἰς αὐτὸ τοῦτο
  english_pob_choice: for this very purpose
  chosen_spanish: precisamente para esto
  alternatives_spanish:
  - para este mismo propósito
  - para esto mismo
  lexicon: BDAG
  rationale: La expresión idiomática intensifica la finalidad. 'Precisamente' comunica el énfasis de αὐτὸ τοῦτο sin sonar forzado en español, manteniendo el valor teleológico.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - que
  lexicon: BDAG
  rationale: Introduce una cláusula de propósito; 'para que' es la equivalencia funcional más clara y natural en español.
- source_word: γνῶτε
  english_pob_choice: you may know
  chosen_spanish: conozcan
  alternatives_spanish:
  - lleguen a saber
  - sepan
  lexicon: BDAG
  rationale: El subjuntivo de finalidad se expresa de modo natural con 'conozcan'. 'Saber' también es posible, pero 'conocer' aquí encaja bien con la información personal sobre la situación de Pablo y sus compañeros.
- source_word: τὰ περὶ ἡμῶν
  english_pob_choice: how we are
  chosen_spanish: cómo estamos
  alternatives_spanish:
  - lo que nos concierne
  - nuestra situación
  lexicon: BDAG
  rationale: La frase griega alude a la condición o noticias acerca de Pablo y sus compañeros; 'cómo estamos' conserva el sentido personal e idiomático que la POB documentó en inglés.
- source_word: παρακαλέσῃ
  english_pob_choice: he may encourage
  chosen_spanish: anime
  alternatives_spanish:
  - consuele
  - exhorte
  lexicon: BDAG
  rationale: παρακαλέω puede significar animar, consolar o exhortar. Aquí, por el contexto de ánimo a los destinatarios mediante un informe, 'anime' captura bien la fuerza de fortalecimiento y aliento.
- source_word: τὰς καρδίας ὑμῶν
  english_pob_choice: your hearts
  chosen_spanish: sus corazones
  alternatives_spanish:
  - sus corazones interiores
  - su corazón
  lexicon: BDAG
  rationale: Se mantiene el término antropológico bíblico 'corazones'. En español de España 'vuestros' sería posible, pero 'sus' con el referente contextual evita regionalismos y sigue siendo claro.
theological_decisions:
- issue: Variación textual en el contenido de conocimiento (nosotros / ustedes)
  english_pob_reading: Follow the SBLGNT reading 'that you may know how we are' (γνῶτε τὰ περὶ ἡμῶν). A note preserves the alternate manuscript tradition that reverses the perspective.
  chosen_spanish_reading: 'Seguir el texto griego principal: ''para que conozcan cómo estamos[a]''.'
  alternative_spanish_readings:
  - '''para que sepamos cómo están'''
  rationale: Se mantiene la lectura de SBLGNT y la POB inglesa, que documenta en nota la variante conocida. La nota en español preserva la transparencia textual sin incorporar la variante al texto principal.
  doctrine_reference: Textual criticism / variantes manuscritas del NT
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y conserva la variante textual registrada por la POB inglesa, sin cambios revisionales aplicados en el expediente de auditoría.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - '''Ustedes''/''sus'' mantiene coherencia con un registro neutral latinoamericano y con la dirección del envío en plural.'
  - Se conserva el lenguaje corporal-bíblico ('corazones') sin sustituirlo por paráfrasis psicológicas.
