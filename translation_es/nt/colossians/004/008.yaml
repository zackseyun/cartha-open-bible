  - severity: low
    issue: 'La frase «precisamente para esto: para que...» puede compactarse'
    rationale: 'No es infiel, pero «precisamente con este fin: que...» o «precisamente para esto: que...» evita una repetición algo pesada y mantiene mejor el flujo.'
