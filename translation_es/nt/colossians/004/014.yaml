review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: Lucas y Demas son quienes envían el saludo, y «el médico amado» modifica a Lucas. Sin embargo, «los saludan» introduce un objeto directo que suena menos natural en español epistolar para ἀσπάζεται en este contexto; «les envían saludos» o «los saluda» serían opciones más idiomáticas según la sintaxis elegida. Dado que el sujeto es compuesto pospuesto, conviene una formulación plural explícita y epistolar.'
  spanish_quality_summary: '«Lucas, el médico amado, y Demas los saludan» es comprensible, pero «médico amado» suena algo rígido y menos natural que «querido médico» o, mejor aún para conservar la estructura semántica, «el amado médico». Además, «los saludan» suena más como saludo presencial que como fórmula de carta. También falta la tilde en «Demas» según la práctica usual en español bíblico: «Demas» normalmente no lleva tilde, así que eso está bien; no requiere cambio. La mejor mejora es idiomática, no sustancial.'
  glossary_alignment: No hay términos del glosario mayor en juego. Los nombres propios «Lucas» y «Demas» están bien. «ἰατρός» como «médico» está bien alineado. Para ἀγαπητός, «amado» es semánticamente fiel, pero en español de lectura eclesial «amado médico» preserva mejor la dignidad y la naturalidad que «médico amado».
  issues:
  - severity: medium
    issue: La fórmula «los saludan» no es la opción más natural para un saludo epistolar.
    rationale: ἀσπάζεται en este tipo de cierre de carta suele expresarse mejor en español como «les envían saludos» o equivalente, porque se trata de un saludo transmitido, no necesariamente de una acción directa presencial.
  - severity: low
    issue: «el médico amado» suena algo forzado en español.
    rationale: Aunque es entendible y literal, el orden «amado médico» fluye mejor y sigue atribuyendo ἀγαπητός a Lucas junto con «médico».
  revised_spanish_text: Lucas, el amado médico, y Demas les envían saludos.
  revision_rationale: Se ajusta la fórmula verbal a un español epistolar más natural para ἀσπάζεται con sujeto compuesto pospuesto, y se mejora el orden del sintagma descriptivo de Lucas para mayor naturalidad sin perder el sentido de «the beloved physician».
