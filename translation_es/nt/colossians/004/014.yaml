translation:
  language: es
  text: Lucas, el amado médico, y Demas les envían saludos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀσπάζεται
  english_pob_choice: greet
  chosen_spanish: los saludan
  alternatives_spanish:
  - les envían saludos
  - los saludan
  lexicon: BDAG
  rationale: En una fórmula epistolar, ἀσπάζεται expresa una salutación enviada por los remitentes. En español, «los saludan» comunica de forma natural y directa la acción de saludar dirigida a los destinatarios plurales.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El pronombre es plural y se refiere a los receptores de la carta. En una frase verbal española con «saludan», el objeto directo plural queda naturalmente expresado como «los», manteniendo la referencia colectiva sin forzar una construcción más pesada.
- source_word: Λουκᾶς
  english_pob_choice: Luke
  chosen_spanish: Lucas
  alternatives_spanish:
  - Lucas
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma española usual del nombre propio, «Lucas», como equivalente natural y reconocible de Λουκᾶς.
- source_word: ἰατρὸς
  english_pob_choice: physician
  chosen_spanish: el médico
  alternatives_spanish:
  - el médico
  - el doctor
  lexicon: BDAG
  rationale: «Médico» reproduce con claridad el oficio de ἰατρός en español contemporáneo. «Doctor» sería posible, pero puede sonar menos preciso o más ambiguo en contexto moderno.
- source_word: ἀγαπητὸς
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - amado
  - querido
  - amado por Dios
  lexicon: BDAG
  rationale: El adjetivo expresa afecto y estima. «Amado» conserva esa fuerza en español y evita suavizarlo a un mero trato cordial como «querido».
- source_word: Δημᾶς
  english_pob_choice: Demas
  chosen_spanish: Demas
  alternatives_spanish:
  - Demas
  lexicon: Nombre propio transliterado
  rationale: Se mantiene la transliteración estándar del nombre propio Δημᾶς.
theological_decisions:
- issue: A quién modifica «el médico amado»
  english_pob_reading: The phrase 'the beloved physician' modifies Luke, not Demas.
  chosen_spanish_reading: «el médico amado» modifica a Lucas, no a Demas.
  alternative_spanish_readings:
  - «Lucas, el médico amado, y Demas»
  - «Lucas el médico, el amado, y Demas»
  rationale: 'La secuencia griega con artículo y adjetivo describe a Λουκᾶς mediante dos aposiciones: «el médico» y «el amado». La puntuación española deja claro que ambos rasgos pertenecen a Lucas.'
  doctrine_reference: Lectura sintáctica del griego y puntuación explicativa; no afecta una doctrina, sino la identificación del referente.
translation_notes:
  revision_awareness: El texto inglés auditado ya muestra alta concordancia y no registra revisiones aplicadas; esta versión española sigue esa lectura sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantuvo un estilo natural y eclesial en español sin perder la estructura epistolar breve del original.
  - Se evitó usar «Señor» u այլ vocabulario no presente en el versículo.
  - 'Los nombres propios se adaptan a la forma española usual: Lucas, Demas.'
