- from: Lucas, el médico amado, y Demas los saludan.
  to: Lucas, el amado médico, y Demas les envían saludos.
  rationale: Se ajusta la fórmula verbal a un español epistolar más natural para ἀσπάζεται con sujeto compuesto pospuesto, y se mejora el orden del sintagma descriptivo de Lucas para mayor naturalidad sin perder el sentido de «the beloved physician».
