translation:
  language: es
  text: Saluden a los hermanos en Laodicea[a], y a Ninfa y a la iglesia en su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos/lecturas apoyan «Ninfas» y «la iglesia en su casa»; otros apoyan «la casa de ellos/ellas».
    reason: textual_variant
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Dense saludos a
  - Saluden cordialmente a
  lexicon: BDAG
  rationale: El imperativo plural aoristo medio expresa una instrucción directa de enviar saludos. «Saluden» conserva la fuerza imperativa y suena natural en español bíblico moderno sin ampliar indebidamente el sentido.
- source_word: τοὺς ἐν Λαοδικείᾳ ἀδελφοὺς
  english_pob_choice: the brothers in Laodicea
  chosen_spanish: los hermanos en Laodicea
  alternatives_spanish:
  - los hermanos y hermanas en Laodicea
  - los creyentes en Laodicea
  lexicon: BDAG
  rationale: «ἀδελφοὺς» es masculino plural y puede incluir al conjunto de creyentes. Se conserva «hermanos» por fidelidad formal y porque el uso paulino puede ser inclusivo sin necesidad de neutralizar el término.
- source_word: Νύμφαν
  english_pob_choice: Nympha
  chosen_spanish: Ninfas
  alternatives_spanish:
  - Ninfa
  - Nymphas
  lexicon: BDAG
  rationale: El texto crítico leído aquí apunta a una forma femenina del nombre; en español, «Ninfas» refleja esa lectura de manera más directa que «Ninfa», que puede sonar demasiado a nombre común. Se mantiene la alternativa masculina documentada en nota textual.
- source_word: τὴν κατ’ οἶκον αὐτῆς ἐκκλησίαν
  english_pob_choice: the church in her house
  chosen_spanish: la iglesia que se reúne en su casa
  alternatives_spanish:
  - la iglesia en su casa
  - la congregación que se reúne en su casa
  lexicon: BDAG
  rationale: «κατ’ οἶκον» en este contexto idiomático señala una comunidad cristiana reunida en un hogar. «Que se reúne en su casa» comunica el sentido con claridad en español sin perder el matiz locativo ni forzar una calca extraña.
- source_word: ἐκκλησίαν
  english_pob_choice: church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En contexto paulino, ἐκκλησία designa la comunidad cristiana reunida. «Iglesia» es el equivalente natural y más reconocido en español, y aquí no requiere sustitución por «asamblea».
theological_decisions:
- issue: Identidad y género de Νύμφαν y el posesivo αὐτῆς
  english_pob_reading: Nympha ... the church in her house
  chosen_spanish_reading: Ninfas ... la iglesia que se reúne en su casa
  alternative_spanish_readings:
  - Nymphas ... la iglesia que se reúne en su casa
  - Ninfa ... la iglesia que se reúne en su casa
  - Ninfas ... la iglesia en su casa
  rationale: La lectura crítica griega dada incluye αὐτῆς («su/de ella»), por lo que la traducción principal debe reflejar una referencia femenina. Sin embargo, existen variantes manuscritas e interpretativas con nombre masculino y con otros posesivos; por eso se documenta la tensión textual en nota en vez de resolverla silenciosamente.
  doctrine_reference: Translation philosophy §3 (preserve genuine textual/interpretive ambiguity)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios, y el texto crítico SBLGNT aquí coincide con la lectura femenina singular con αὐτῆς; por eso la propuesta mantiene esa opción y documenta solo la variante textual relevante.
  spanish_consistency_notes:
  - Se usa «iglesia» para ἐκκλησία siguiendo el uso paulino y la terminología eclesial natural en español.
  - Se conserva «hermanos» para ἀδελφοὺς por fidelidad al plural masculino inclusivo sin neutralización innecesaria.
  - Se prefiere «Ninfas» como transliteración española de la lectura femenina, manteniendo la variante masculina en nota.
  - La nota textual no sobrecarga el verso, pero preserva la tensión de identidad y posesivo documentada por el aparato auditado.
