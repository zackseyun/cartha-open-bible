review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del griego y mantiene la variante textual en nota, pero no preserva fielmente la decisión principal del texto crítico respecto al nombre femenino. SBLGNT favorece «Νύμφαν ... αὐτῆς», es decir, «Ninfa ... su/de ella», mientras que el borrador usa «Ninfas», que en español se percibe naturalmente como forma masculina/plural y desalineada con la lectura principal documentada por el POB inglés.
  spanish_quality_summary: 'El español es claro y natural. «Saluden a los hermanos en Laodicea» funciona bien. «La iglesia que se reúne en su casa» es legible, aunque algo más interpretativa que «la iglesia en su casa»; aun así, sigue siendo aceptable. El problema principal es onomástico: «Ninfas» no comunica bien un nombre femenino en español y entra en tensión con el pronombre femenino del texto.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Iglesia», «hermanos» y el tono general son apropiados. La principal desviación está en la decisión léxica para Νύμφαν: debe reflejarse como «Ninfa» en el texto principal, dejando «Nymphas/Ninfas» para la nota de variante.'
  issues:
  - severity: high
    issue: El nombre principal «Ninfas» no refleja adecuadamente la lectura femenina del texto crítico.
    rationale: La evidencia fuente y el rastro de auditoría inglés adoptan «Nympha ... her house». En español, «Ninfa» es la forma natural para un nombre femenino; «Ninfas» sugiere otra cosa y debilita la correspondencia con αὐτῆς.
  - severity: medium
    issue: La nota textual mezcla transliteración inglesa con español y no expresa con máxima claridad las alternativas.
    rationale: Si el texto principal usa «Ninfa», la nota debe documentar de forma limpia la variante «Ninfas ... en su casa» y la alternativa plural «la casa de ellos/ellas», evitando ambigüedad innecesaria.
  - severity: low
    issue: «La iglesia que se reúne en su casa» añade un matiz interpretativo no explícito.
    rationale: El griego dice literalmente «la iglesia en su casa». La expansión es comprensible y aceptable, pero una forma más cercana al original preserva mejor la sobriedad del texto.
  revised_spanish_text: Saluden a los hermanos en Laodicea[a], y a Ninfa y a la iglesia en su casa.
  revised_footnotes:
