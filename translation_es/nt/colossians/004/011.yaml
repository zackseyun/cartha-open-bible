translation:
  language: es
  text: y Jesús, llamado Justo[a]. Estos son los únicos de la circuncisión que son colaboradores para el reino de Dios[c], y llegaron a ser un consuelo para mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamado Justus».
    reason: lexical_alternative
  - marker: b
    text: O «me fueron un consuelo» o «se convirtieron en un consuelo para mí».
    reason: lexical_alternative
  - marker: c
    text: O «estos son los únicos colaboradores para el reino de Dios que son de la circuncisión».
    reason: previous_rendering
lexical_decisions:
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Josué
  lexicon: BDAG
  rationale: En el contexto del NT es un nombre propio; en español, la forma estable y reconocible es «Jesús». «Josué» correspondería al equivalente hebreo, pero no es la convención del pasaje.
- source_word: ὁ λεγόμενος Ἰοῦστος
  english_pob_choice: who is called Justus
  chosen_spanish: el que es llamado Justo
  alternatives_spanish:
  - llamado Justo
  - el llamado Justo
  lexicon: BDAG
  rationale: «El que es llamado» reproduce de manera natural la identificación por apodo o cognomen, y conserva el matiz apposicional del griego. «Justo» es la forma española del nombre/epíteto Justus.
- source_word: οἱ ὄντες ἐκ περιτομῆς
  english_pob_choice: who are from the circumcision
  chosen_spanish: los que son de la circuncisión
  alternatives_spanish:
  - los que pertenecen a la circuncisión
  - los judíos
  lexicon: BDAG
  rationale: Se preserva la expresión literal «de la circuncisión» para no borrar el marcador identitario del texto. En español, «los que son de la circuncisión» mantiene la tensión lexical; «los judíos» sería interpretativo y se deja como alternativa.
- source_word: οὗτοι μόνοι
  english_pob_choice: These are the only
  chosen_spanish: estos solos
  alternatives_spanish:
  - estos son los únicos
  - estos únicamente
  lexicon: BDAG
  rationale: «Estos solos» conserva la exclusividad enfática del griego con una fórmula breve y natural en español. Mantiene la idea de restricción sin añadir elementos explicativos.
- source_word: συνεργοὶ
  english_pob_choice: fellow workers
  chosen_spanish: colaboradores
  alternatives_spanish:
  - cooperadores
  - compañeros de trabajo
  lexicon: BDAG
  rationale: «Colaboradores» es el equivalente español más transparente y digno para συνεργοί en un marco paulino. Evita el calco pesado y conserva el sentido de participación en la obra.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: for the kingdom of God
  chosen_spanish: para el reino de Dios
  alternatives_spanish:
  - en favor del reino de Dios
  - hacia el reino de Dios
  lexicon: BDAG
  rationale: Con συνεργοί, εἰς funciona de modo telico; «para» expresa bien la orientación de servicio. «Reino de Dios» conserva la frase bíblica estable.
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: los cuales
  alternatives_spanish:
  - quienes
  - que
  lexicon: BDAG
  rationale: «Los cuales» permite una relativa más formal y concordante con el referente plural, útil para sostener el hilo lógico del versículo. «Quienes» también sería posible, pero «los cuales» suena más adecuado aquí.
- source_word: ἐγενήθησάν μοι παρηγορία
  english_pob_choice: they became a comfort to me
  chosen_spanish: se hicieron para mí un consuelo
  alternatives_spanish:
  - me fueron un consuelo
  - se convirtieron en consuelo para mí
  - me resultaron un consuelo
  lexicon: BDAG
  rationale: Se mantiene el aoristo de γίνομαι con un verbo de cambio («se hicieron») y se conserva el sustantivo «consuelo» para παρηγορία. La construcción refleja el movimiento del griego sin perder naturalidad en español.
theological_decisions:
- issue: Alcance de «los de la circuncisión»
  english_pob_reading: A reference to Jewish believers/laborers rather than a broader theological party label.
  chosen_spanish_reading: Una referencia a creyentes de trasfondo judío, preservando la expresión literal sin reducirla a una etiqueta interpretativa.
  alternative_spanish_readings:
  - los de la circuncisión como simple marcador étnico
  - el partido de la circuncisión
  rationale: El griego identifica un grupo real con trasfondo de circuncisión; el contexto de colaboradores de Pablo favorece entenderlos como creyentes de origen judío. La traducción mantiene la literalidad para no cerrar la ambigüedad presente en la fuente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB: mantiene la exclusividad de οὗτοι μόνοι, conserva la identificación por nombre alterno en Ἰησοῦς ὁ λεγόμενος Ἰοῦστος, y refleja el aoristo ἐγενήθησάν con una formulación de cambio («se hicieron»). También respeta la prioridad lógica del griego: primero el grupo «de la circuncisión» y luego la exclusividad de los colaboradores.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Dios» para θεοῦ, en línea con los criterios del proyecto.
  - Se conserva «reino de Dios» como expresión bíblica estable, sin sustituirla por una paráfrasis.
  - «Consuelo» se eligió para παρηγορία por ser el término más directo y pastoralmente natural en español; se deja la alternativa de «encouragement/ánimo» implícita en la nota.
  - La puntuación mantiene la segmentación del griego con dos cláusulas principales, evitando una subordinación excesiva.
