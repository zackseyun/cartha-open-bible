lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad de manera natural en español y conserva la fuerza telica del griego.
- source_word: φανερώσω
  english_pob_choice: I may make ... clear
  chosen_spanish: lo dé a conocer claramente
  alternatives_spanish:
  - lo haga claro
  - lo revele
  - lo manifieste
  lexicon: BDAG
  rationale: En español, 'dar a conocer' comunica bien la idea de hacer patente o inteligible sin reducirla solo a 'revelar'; 'claramente' refleja el matiz de hacer comprensible en el contexto del hablar apostólico.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - esto
  - el misterio
  lexicon: BDAG
  rationale: El pronombre griego se mantiene como pronombre átono en español; el antecedente sigue siendo el misterio del versículo anterior, pero no se explicita en el texto principal.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - del modo que
  lexicon: BDAG
  rationale: '''Como'' expresa de modo directo la idea de manera o norma, fiel al valor de ὡς en esta cláusula.'
- source_word: δεῖ
  english_pob_choice: I ought
  chosen_spanish: debo
  alternatives_spanish:
  - tengo que
  - me es necesario
  lexicon: BDAG
  rationale: '''Debo'' conserva la obligación o necesidad moral sin intensificarla más de lo que exige el griego.'
- source_word: με
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - me
  lexicon: Greek grammar
  rationale: Aunque el griego usa acusativo por la construcción con infinitivo, el español requiere sujeto expreso o implícito en nominativo; aquí se expresa para mayor claridad y fluidez.
- source_word: λαλῆσαι
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - proclamar
  lexicon: BDAG
  rationale: '''Hablar'' es el equivalente más amplio y natural; ''proclamar'' introduciría un matiz más específico que el verbo griego no exige en esta cláusula.'
theological_decisions:
- issue: Alcance del objeto pronominal de 'it'
  english_pob_reading: The pronoun 'it' refers to the mystery mentioned in the previous verse.
  chosen_spanish_reading: El 'lo' remite al misterio mencionado en el versículo anterior, sin introducir el antecedente en el cuerpo del texto.
  alternative_spanish_readings:
  - para que yo lo dé a conocer claramente, el misterio...
  - para que yo haga claro el misterio
  rationale: Se conserva la referencia anafórica documentada por el audit trail, pero el texto principal mantiene el pronombre, respetando la forma griega y la economía del versículo.
  doctrine_reference: Colosenses 4:3-4; relación con el misterio de Cristo en el contexto inmediato
translation_notes:
  revision_awareness: El inglés POB mantiene una lectura de propósito ('so that') y una decisión lexical de inteligibilidad para φανερώσω ('make it clear'), con nota sobre el antecedente pronominal. La versión española conserva esa misma estructura de propósito, mantiene el pronombre anafórico y expresa la obligación con 'debo', que corresponde bien al valor de δεῖ sin sobredeterminarlo.
  spanish_consistency_notes:
  - Se usó 'para que' para ἵνα, en coherencia con un español natural y con el valor final del griego.
  - '''Dar a conocer claramente'' preserva la tensión entre revelar y hacer comprensible, sin reducir φανερόω a un solo matiz.'
  - '''Debo'' refleja la necesidad/obligación de δεῖ de manera sobria.'
  - Se mantuvo el pronombre objeto 'lo' para respetar la anáfora del texto griego y la decisión auditada en inglés.
