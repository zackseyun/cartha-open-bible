translation:
  language: es
  text: para que lo[a] dé a conocer con claridad, como debo[b] hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El pronombre «lo» se refiere al misterio mencionado en el versículo anterior. O: «revelarlo» o «darlo a conocer».'
