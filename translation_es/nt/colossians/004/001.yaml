translation:
  language: es
  text: Amos, proporcionen a sus esclavos lo que es justo y equitativo[a], sabiendo que ustedes también tienen un Señor en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «igualdad». El término griego traducido aquí como «equitativo» también puede significar «igualdad» o «equidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κύριοι
  english_pob_choice: Masters
  chosen_spanish: amos
  alternatives_spanish:
  - señores
  - amos y dueños
  lexicon: BDAG
  rationale: En este contexto doméstico, κύριοι se refiere a amos humanos en relación con esclavos. En español, «amos» comunica mejor esa relación social y de autoridad que «señores», que puede sonar más general o cortés; «amos y dueños» sería más interpretativo.
- source_word: τὸ δίκαιον
  english_pob_choice: what is right
  chosen_spanish: lo que es justo
  alternatives_spanish:
  - lo que es recto
  - lo que es justo y correcto
  lexicon: BDAG
  rationale: El adjetivo sustantivado δίκαιον expresa lo justo o recto. «Lo que es justo» preserva la fuerza ética y es natural en español, sin añadir matices que el griego no exige.
- source_word: τὴν ἰσότητα
  english_pob_choice: fair
  chosen_spanish: equitativo
  alternatives_spanish:
  - igualdad
  - equidad
  - justicia
  lexicon: BDAG
  rationale: ἰσότης puede significar igualdad, equidad o trato justo. Aquí el sentido apunta al trato imparcial y equilibrado hacia los esclavos. «Equitativo» mantiene el valor ético y funciona bien en coordinación con «justo». Se conserva la alternativa lexical importante en la nota.
- source_word: τοῖς δούλοις
  english_pob_choice: your slaves
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: BDAG
  rationale: Siguiendo la pauta del proyecto, δοῦλος se traduce por «esclavo» cuando la condición ligada a la institución esclavista es explícita. «Siervos» suavizaría indebidamente el término.
- source_word: παρέχεσθε
  english_pob_choice: provide
  chosen_spanish: proporcionen
  alternatives_spanish:
  - den
  - concedan
  - provean
  lexicon: BDAG
  rationale: El imperativo medio exhorta a suministrar o brindar este trato. «Proporcionen» es natural en español y conserva la idea de suministrar activamente lo debido.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque saben
  - pues saben
  lexicon: BDAG
  rationale: El participio expresa la base consciente de la exhortación. «Sabiendo» conserva la estructura participial sin sobrecargar la relación lógica.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: también ustedes
  alternatives_spanish:
  - ustedes también
  - hasta ustedes
  lexicon: BDAG
  rationale: La combinación enfatiza que los amos también están bajo autoridad. «También ustedes» reproduce bien ese énfasis en español.
- source_word: κύριον
  english_pob_choice: a Lord
  chosen_spanish: un Señor
  alternatives_spanish:
  - un Dueño
  - un Amo
  lexicon: BDAG
  rationale: Para κύριος, el proyecto suele mantener «Señor» cuando el referente es divino. Aquí esa lectura es teológicamente necesaria y además distingue al Señor celestial de los amos terrenales. «Amo» o «Dueño» desdibujarían el contraste.
- source_word: ἐν οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo arriba
  lexicon: BDAG
  rationale: La expresión idiomática se vierte naturalmente como «en el cielo». «Cielo» es claro y reverente en español, y conserva la ubicación celestial del Señor.
theological_decisions:
- issue: δοῦλοι en contexto de código doméstico
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  rationale: El contexto establece una relación de esclavitud, no solo de servicio. Mantener «esclavos» evita suavizar la realidad social que el texto presupone.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table for δοῦλος
- issue: ἰσότητα como trato debido
  english_pob_reading: fair / equality
  chosen_spanish_reading: equitativo
  alternative_spanish_readings:
  - igualdad
  - equidad
  - justicia
  rationale: El griego admite una gama que incluye igualdad y equidad. En el contexto, el mandato apunta a trato justo e imparcial; «equitativo» comunica eso con precisión, sin excluir la posibilidad de igualdad, que se conserva en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: κύριον referido a Dios/Señor celestial
  english_pob_reading: a Lord
  chosen_spanish_reading: un Señor
  alternative_spanish_readings:
  - un amo
  - un dueño
  rationale: Aunque κύριος puede significar «amo» en otros contextos, aquí el contraste con los amos terrenales y la referencia al cielo apuntan al Señor divino. «Señor» preserva esa carga teológica.
  doctrine_reference: DOCTRINE.md Christology and divine-title conventions
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios sustanciales; se mantuvo la solución central, ajustando la redacción española para que sea idiomática, transparente y fiel al contraste entre amos humanos y el Señor celestial.
  spanish_consistency_notes:
  - Se mantiene «esclavos» para δοῦλοι conforme a la pauta del proyecto y al sentido social explícito del pasaje.
  - Se usa «Señor» para κύριος en el referente celestial, en coherencia con la convención del proyecto para títulos divinos.
  - «Justo y equitativo» intenta reflejar la pareja τὸ δίκαιον καὶ τὴν ἰσότητα sin perder la posible alternativa semántica de «igualdad», documentada en la nota.
  - El orden y el tono buscan ser publicables en español contemporáneo, sin caer en una paráfrasis que borre los matices del griego.
