translation:
  language: es
  text: 'Aristarco, mi compañero de prisión, les saluda, y Marcos, el primo[a] de Bernabé (acerca de quien recibieron instrucciones: si llega a ustedes, denle la bienvenida[b]),'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobrino de Bernabé»; traducciones antiguas a veces entendieron así ἀνεψιός, pero en griego koiné el sentido más preciso es «primo».
    reason: lexical_alternative
  - marker: b
    text: O «recíbanlo». El verbo griego puede expresar recibir a alguien con hospitalidad; «denle la bienvenida» hace explícito ese matiz en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζεται
  english_pob_choice: greets
  chosen_spanish: les envía saludos
  alternatives_spanish:
  - les saluda
  - les manda saludos
  lexicon: BDAG
  rationale: El griego epistolar Ἀσπάζεται introduce el saludo final de manera directa. En español, «les envía saludos» comunica con naturalidad esa fórmula sin perder la acción verbal de salutación.
- source_word: συναιχμάλωτός
  english_pob_choice: fellow prisoner
  chosen_spanish: compañero de prisión
  alternatives_spanish:
  - compañero cautivo
  - compañero de cautiverio
  lexicon: BDAG
  rationale: La forma compuesta indica alguien apresado junto con otro. «Compañero de prisión» mantiene la relación y suena claro en español; no se añade «en Cristo» porque no está explícito en el texto.
- source_word: ἀνεψιός
  english_pob_choice: cousin
  chosen_spanish: primo
  alternatives_spanish:
  - sobrino
  - pariente
  lexicon: BDAG
  rationale: En el griego koiné, ἀνεψιός significa «cousin» de manera más precisa que la tradición antigua «nephew». «Primo» es el equivalente español natural y exacto.
- source_word: ἐλάβετε ἐντολάς
  english_pob_choice: you received instructions
  chosen_spanish: recibieron instrucciones
  alternatives_spanish:
  - recibieron órdenes
  - recibieron mandatos
  lexicon: BDAG
  rationale: ἐντολή puede ser «mandato», «orden» o «instrucción». Aquí, por el contexto de recepción y hospitalidad, «instrucciones» expresa bien la dirección dada sin endurecer innecesariamente el tono.
- source_word: ἐὰν ἔλθῃ πρὸς ὑμᾶς
  english_pob_choice: if he comes to you
  chosen_spanish: si va a ustedes
  alternatives_spanish:
  - si llega a ustedes
  - si viene a ustedes
  lexicon: BDAG
  rationale: La condición futura se entiende con naturalidad como «si va a ustedes». Esta opción mantiene el valor direccional de πρὸς ὑμᾶς y fluye bien en español contemporáneo.
- source_word: δέξασθε αὐτόν
  english_pob_choice: welcome him
  chosen_spanish: recíbanlo
  alternatives_spanish:
  - denle la bienvenida
  - acójanlo
  lexicon: BDAG
  rationale: δέχομαι en contexto de viaje y hospitalidad puede significar recibir o dar la bienvenida. «Recíbanlo» conserva la fuerza del verbo y deja implícita la hospitalidad que el contexto sugiere.
theological_decisions:
- issue: Naturaleza de la relación de Aristarco como συναιχμάλωτός μου
  english_pob_reading: Rendered literally as 'my fellow prisoner' without specifying whether the imprisonment is literal or metaphorical.
  chosen_spanish_reading: «mi compañero de prisión» sin precisar si la prisión es literal o figurada.
  alternative_spanish_readings:
  - mi compañero cautivo en el Señor
  - mi compañero de trabajo bajo aflicción
  rationale: El texto presenta la expresión de modo simple. La traducción conserva la tensión interpretativa sin resolverla, igual que el POB en inglés.
  doctrine_reference: 'Principio POB: preservar la tensión teológica e histórica cuando el texto no la resuelve explícitamente.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el auditable inglés; la redacción española sigue la decisión estable más reciente del POB inglés sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «primo» para ἀνεψιός conforme al valor léxico documentado, evitando el calco tradicional «sobrino» en el texto principal.
  - Se preserva el tono epistolar directo con una puntuación que refleja la incisión parentética del griego.
