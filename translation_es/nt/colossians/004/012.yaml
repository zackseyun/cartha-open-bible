translation:
  language: es
  text: 'Epafras[a], que es uno de ustedes, los saluda: esclavo de Mesías, siempre esforzándose por ustedes en sus oraciones, para que estén firmes, maduros y plenamente convencidos[b] en toda la voluntad de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Cristo'. Aquí Χριστός se traduce como 'Mesías' para conservar el sentido del título.
    reason: alternative_reading
  - marker: b
    text: O 'plenamente asegurados' o 'plenamente establecidos'. El griego puede denotar tanto plena convicción como un estado de firmeza asentada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζεται
  english_pob_choice: greets
  chosen_spanish: los saluda
  alternatives_spanish:
  - los saluda cordialmente
  - les envía saludos
  lexicon: BDAG
  rationale: En despedidas epistolares, ἀσπάζομαι expresa un saludo personal. 'Los saluda' es natural en español y conserva el tono directo del cierre sin añadir afecto no explícito.
- source_word: ὁ ἐξ ὑμῶν
  english_pob_choice: who is one of you
  chosen_spanish: que es de ustedes
  alternatives_spanish:
  - que es uno de ustedes
  - que es de entre ustedes
  lexicon: BDAG
  rationale: La expresión señala pertenencia al grupo colosense. 'Que es de ustedes' mantiene la idea de procedencia/pertenencia de forma idiomática; 'uno de ustedes' también sería posible, pero puede sonar menos preciso respecto al origen comunitario.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: La POB inglesa eligió 'slave' por la fuerza de pertenencia total del término. 'Esclavo' conserva esa carga léxica en español mejor que 'siervo', que suaviza indebidamente el sentido.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no solo como forma fija del nombre. 'Mesías' preserva su sentido titular en español, conforme a la preferencia del proyecto para traducir títulos cuando el contexto lo permite.
- source_word: πάντοτε ἀγωνιζόμενος
  english_pob_choice: always striving
  chosen_spanish: siempre esforzándose
  alternatives_spanish:
  - siempre luchando
  - siempre combatiendo
  - siempre empeñándose
  lexicon: BDAG
  rationale: ἀγωνίζομαι comunica esfuerzo intenso y sostenido. 'Esforzándose' mantiene la idea de dedicación constante en un español fluido; 'luchando' podría sugerir un conflicto más concreto de lo que el contexto exige.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - en favor de ustedes
  - a favor de ustedes
  lexicon: BDAG
  rationale: La preposición expresa intercesión en beneficio de otros. 'Por ustedes' es la forma más natural en español y conserva la orientación intercesora de la frase.
- source_word: ἐν ταῖς προσευχαῖς
  english_pob_choice: in his prayers
  chosen_spanish: en sus oraciones
  alternatives_spanish:
  - en la oración
  - en sus plegarias
  lexicon: BDAG
  rationale: El plural griego puede reflejar múltiples actos de oración. 'En sus oraciones' mantiene el plural y la referencia a las prácticas intercesoras sin forzar una posesión explícita que el griego no marca por pronombre.
- source_word: ἵνα σταθῆτε
  english_pob_choice: so that you may stand
  chosen_spanish: para que permanezcan
  alternatives_spanish:
  - para que se mantengan en pie
  - para que estén firmes
  - para que sean establecidos
  lexicon: BDAG
  rationale: σταθῆτε puede implicar 'ponerse en pie' o 'permanecer/ser establecidos'. 'Permanezcan' conserva la idea de estabilidad resultante sin introducir una metáfora demasiado marcada; por eso se acompaña con 'maduros' para expresar el estado deseado.
- source_word: τέλειοι
  english_pob_choice: mature
  chosen_spanish: maduros
  alternatives_spanish:
  - perfectos
  - completos
  lexicon: BDAG
  rationale: En uso paulino, τέλειος suele referirse a madurez o integridad más que a perfección sin pecado. 'Maduros' comunica bien ese valor en español contemporáneo.
- source_word: πεπληροφορημένοι
  english_pob_choice: fully assured
  chosen_spanish: plenamente asegurados
  alternatives_spanish:
  - plenamente convencidos
  - plenamente establecidos
  - completamente persuadidos
  lexicon: BDAG
  rationale: El participio perfecto pasivo puede denotar certeza firme o estado de plenitud/establecimiento. 'Plenamente asegurados' preserva la lectura de confianza asentada y deja abierta la tensión interpretativa entre convicción y establecimiento.
- source_word: ἐν παντὶ θελήματι τοῦ θεοῦ
  english_pob_choice: in all the will of God
  chosen_spanish: en toda la voluntad de Dios
  alternatives_spanish:
  - en cada voluntad de Dios
  - en todo lo que Dios quiere
  - en toda la voluntad divina
  lexicon: BDAG
  rationale: La frase conserva un marco amplio de conformidad o esfera. 'En toda la voluntad de Dios' sigue de cerca la estructura griega sin precisar indebidamente si el sentido es de contenido, esfera o conformidad.
theological_decisions:
- issue: Rendering of Χριστοῦ as a title in a confessional closing formula
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aunque la revisión inglesa final volvió a 'Messiah', el auditable antecedente muestra que el término fue tratado como título. En español, 'Mesías' preserva ese valor y evita convertirlo en mero nombre fijo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve lexical/theological force of Χριστός'
- issue: Force of δοῦλος in relation to Paul's coworker Epaphras
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: La autodesignación resalta pertenencia total y lealtad absoluta a Cristo/Mesías. 'Esclavo' mantiene la dureza del término y evita suavizarlo con 'siervo', que perdería la fuerza socioteológica del original.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; contested terms for δοῦλος'
- issue: Interpretation of πεπληροφορημένοι
  english_pob_reading: fully assured
  chosen_spanish_reading: plenamente asegurados
  alternative_spanish_readings:
  - plenamente convencidos
  - plenamente establecidos
  rationale: La tradición interpretativa oscila entre certeza interna y estado de establecimiento. 'Plenamente asegurados' conserva la ambigüedad útil sin cerrar la tensión, mientras que la nota permite la alternativa léxica.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical/theological tension rather than resolving it prematurely'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una corrección que intentó cambiar 'Messiah' a 'Christ' y luego restauró 'Messiah'. La traducción española sigue la decisión restaurada de conservar el título con valor semántico, usando 'Mesías' en lugar de una forma meramente cristianizada. También se atendió la nota de alternancia para πεπληροφορημένοι, manteniendo una redacción que no elimina la tensión léxica.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' como traducción del título Χριστός en coherencia con la política del proyecto.
  - Se usa 'esclavo' para δοῦλος conforme a la fuerza léxica documentada.
  - Se conserva el plural 'oraciones' para reflejar el griego ἐν ταῖς προσευχαῖς.
  - La construcción 'plenamente asegurados' pretende ser transparente y no cerrarse contra la alternativa 'plenamente convencidos/establecidos'.
  - La puntuación con dos puntos después de 'los saluda' reproduce el enlace epistolar sin añadir contenido no atestado.
