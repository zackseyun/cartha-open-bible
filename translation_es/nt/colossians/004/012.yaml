    reason: lexical_alternative
  revision_rationale: Se corrige el nombre propio a la forma española normal ('Epafras'), se mejora ὁ ἐξ ὑμῶν con la expresión más natural y fiel 'uno de ustedes', se restituye mejor la imagen de σταθῆτε con 'estén firmes', y se reemplaza 'plenamente asegurados' por 'plenamente convencidos' por mayor naturalidad en español, conservando las alternativas léxicas relevantes en nota. También se corrige el anglicismo en las notas.
