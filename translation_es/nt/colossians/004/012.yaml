revisions:
- from: 'Epapras[a], que es de ustedes, los saluda: esclavo de Mesías, siempre esforzándose por ustedes en sus oraciones[b], para que permanezcan maduros y plenamente asegurados en toda la voluntad de Dios.'
  to: 'Epafras[a], que es uno de ustedes, los saluda: esclavo de Mesías, siempre esforzándose por ustedes en sus oraciones, para que estén firmes, maduros y plenamente convencidos[b] en toda la voluntad de Dios.'
  rationale: Se corrige el nombre propio a la forma española normal ('Epafras'), se mejora ὁ ἐξ ὑμῶν con la expresión más natural y fiel 'uno de ustedes', se restituye mejor la imagen de σταθῆτε con 'estén firmes', y se reemplaza 'plenamente asegurados' por 'plenamente convencidos' por mayor naturalidad en español, conservando las alternativas léxicas relevantes en nota. También se corrige el anglicismo en las notas.
  reviewer_model: gpt-5.4
