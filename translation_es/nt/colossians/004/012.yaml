source:
  edition: SBLGNT
  text: ἀσπάζεται ὑμᾶς Ἐπαφρᾶς ὁ ἐξ ὑμῶν, δοῦλος ⸀Χριστοῦ, πάντοτε ἀγωνιζόμενος ὑπὲρ ὑμῶν ἐν ταῖς προσευχαῖς, ἵνα ⸀σταθῆτε τέλειοι καὶ ⸀πεπληροφορημένοι ἐν παντὶ θελήματι τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/012.yaml
  text: Epaphras[a], who is one of you, greets you—a slave of Messiah, always striving for you in his prayers[b], so that you may stand mature and fully assured in all the will of God.
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'fully convinced' or 'fully established.' The Greek can denote a state of full certainty or full settledness.
    reason: lexical_alternative
