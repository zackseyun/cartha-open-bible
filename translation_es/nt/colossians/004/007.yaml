  text: Τὰ κατ’ ἐμὲ πάντα γνωρίσει ὑμῖν Τυχικὸς ὁ ἀγαπητὸς ἀδελφὸς καὶ πιστὸς διάκονος καὶ σύνδουλος ἐν κυρίῳ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/007.yaml
  text: Tychicus[a], the beloved brother and faithful minister and fellow slave in the Lord[c][b], will make known to you everything about me.
  footnotes:
  - marker: a
    text: Or 'all the things concerning me' or 'all my circumstances.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faithful servant.' The Greek διάκονος can mean 'minister,' 'servant,' or in some contexts the church office 'deacon.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fellow servant' or 'fellow bondservant.' The Greek σύνδουλος is built on δοῦλος, which can denote bonded service.
    reason: lexical_alternative
