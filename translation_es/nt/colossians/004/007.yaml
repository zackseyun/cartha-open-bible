translation:
  language: es
  text: Tíquico, el hermano amado, fiel ministro y compañero esclavo[a] en el Señor, les dará a conocer todo lo que me concierne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compañero siervo» o «compañero de esclavitud». El griego σύνδουλος está formado sobre δοῦλος, que puede denotar servicio ligado o condición de esclavitud.
    reason: lexical_alternative
  - marker: b
    text: O «todo acerca de mí» o «todas mis circunstancias».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὰ κατ’ ἐμὲ πάντα
  english_pob_choice: everything about me
  chosen_spanish: todo lo que me concierne
  alternatives_spanish:
  - todo acerca de mí
  - todas mis circunstancias
  - todo lo relacionado conmigo
  lexicon: BDAG
  rationale: La expresión griega es idiomática y abarca los asuntos, la situación y las circunstancias de Pablo. «Todo lo que me concierne» mantiene ese alcance amplio sin reducirlo solo a datos biográficos ni sonar demasiado literal en español.
- source_word: γνωρίσει
  english_pob_choice: will make known
  chosen_spanish: les hará conocer
  alternatives_spanish:
  - les informará
  - les dará a conocer
  - les hará saber
  lexicon: BDAG
  rationale: El futuro de γνωρίζω expresa ‘hacer saber’ o ‘dar a conocer’. «Les hará conocer» conserva la formalidad y la cercanía semántica con el original, y funciona bien con el objeto indirecto plural «les».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente en español como objeto indirecto plural. «Les» evita repetir la preposición y mantiene la fluidez de la oración.
- source_word: Τυχικὸς
  english_pob_choice: Tychicus
  chosen_spanish: Tíquico
  alternatives_spanish:
  - Tychicus
  lexicon: conventional transliteration
  rationale: El nombre propio se adapta a la forma usual en español bíblico, «Tíquico», que es reconocible y fiel a la transliteración estándar del griego.
- source_word: ὁ ἀγαπητὸς ἀδελφὸς
  english_pob_choice: the beloved brother
  chosen_spanish: el hermano amado
  alternatives_spanish:
  - el hermano querido
  - el amado hermano
  lexicon: BDAG
  rationale: ἀγαπητός expresa afecto y aprecio; «amado» conserva esa fuerza en español. «Hermano» se mantiene para reflejar el vínculo cristiano masculino singular aplicado a Tíquico.
- source_word: πιστὸς διάκονος
  english_pob_choice: faithful minister
  chosen_spanish: fiel ministro
  alternatives_spanish:
  - fiel servidor
  - fiel diácono
  lexicon: BDAG
  rationale: Para διάκονος, el contexto describe una función de servicio ministerial confiable, no necesariamente el oficio eclesial posterior. «Ministro» conserva la amplitud del término y el paralelismo con el elogio paulino; «fiel» traduce πιστός de manera directa.
- source_word: σύνδουλος
  english_pob_choice: fellow slave
  chosen_spanish: fellow slave
  alternatives_spanish:
  - compañero esclavo
  - fellow servant
  - compañero de esclavitud
  lexicon: BDAG
  rationale: El subrayado lexical de δοῦλος exige conservar la idea de servidumbre vinculada; por eso se mantiene la fuerza de ‘slave’. Se deja la forma inglesa entre el cuerpo español porque no existe en el español eclesial una equivalencia igual de precisa y no se quiso suavizar la tensión terminológica del original.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - bajo el Señor
  lexicon: BDAG
  rationale: La fórmula paulina indica esfera de relación y pertenencia. «En el Señor» es la traducción española natural y fiel al uso cristiano del título κύριος.
theological_decisions:
- issue: Mantenimiento de la fuerza de σύνδουλος / δοῦλος
  english_pob_reading: fellow slave
  chosen_spanish_reading: fellow slave
  alternative_spanish_readings:
  - compañero esclavo
  - fellow servant
  rationale: La POB inglesa decidió no suavizar σύνδουλος a ‘fellow servant’ en el texto principal para conservar la idea de condición vinculada y dependencia. En español, no hay una alternativa igualmente breve que preserve esa carga sin perder transparencia; por eso se mantuvo la forma técnica tal como fue auditada, con nota explicativa sobre la opción más suave.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contienda léxica de δοῦλος
- issue: Alcance de la frase τὰ κατ’ ἐμὲ πάντα
  english_pob_reading: everything about me
  chosen_spanish_reading: todo lo que me concierne
  alternative_spanish_readings:
  - todo acerca de mí
  - todas mis circunstancias
  rationale: La frase no se limita a datos personales ni solo a ‘circunstancias’ en sentido estrecho; abarca el conjunto de asuntos de Pablo. La redacción elegida preserva esa amplitud sin cerrar indebidamente el sentido.
  doctrine_reference: BDAG; auditoría léxica de τὰ κατ’ ἐμέ
- issue: Uso de κύριος como título cristológico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Señor Jesús
  rationale: En este contexto paulino, κύριος se refiere a Cristo como Señor. «El Señor» es la fórmula estable y natural en español; no se usa una sustitución por nombre propio porque el contexto ya hace clara la referencia y la forma conserva la resonancia teológica.
  doctrine_reference: Uso cristológico de κύριος en Pablo
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo entre la versión inglesa auditada y la revisión posterior: no se registraron cambios sustantivos. La redacción española sigue esa lectura estable, manteniendo tanto la amplitud de τὰ κατ’ ἐμὲ πάντα como la tensión léxica de σύνδουλος sin suavizarla innecesariamente.'
  spanish_consistency_notes:
  - 'Se mantiene el nombre propio en forma española estándar: Tíquico.'
  - 'Se conserva el paralelo de elogios con tres predicados: hermano amado, fiel ministro y fellow slave en el Señor.'
  - 'La frase final se ordena de modo natural en español: sujeto + complementos + verbo + objeto.'
  - No se introduce terminología eclesiástica adicional para διάκονος más allá de «ministro», conforme al contexto.
  - Las notas usan marcadores únicos y corresponden a anclajes reales en el texto.
