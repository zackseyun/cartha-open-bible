revisions:
- from: Tíquico[a], el hermano amado, fiel ministro y fellow slave[b] en el Señor[c], les hará conocer todo lo que me concierne.
  to: Tíquico, el hermano amado, fiel ministro y compañero esclavo[a] en el Señor, les dará a conocer todo lo que me concierne[b].
  rationale: Se tradujo σύνδουλος al español como «compañero esclavo» para conservar la fuerza léxica de δοῦλος y ajustarse a la política terminológica del proyecto. Se eliminó la nota innecesaria sobre «en el Señor», se hispanizaron todas las alternativas de nota, y se movió la nota sobre τὰ κατ’ ἐμὲ πάντα al segmento correcto. También se mejoró la naturalidad con «les dará a conocer».
