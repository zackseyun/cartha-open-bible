translation:
  language: es
  text: Y cuando esta carta[a] haya sido leída entre ustedes, procuren que también sea leída en la iglesia de los laodicenses, y que ustedes también lean la que viene de Laodicea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, ‘la carta procedente de Laodicea’. El griego deja implícita la palabra ‘carta’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνωσθῇ / ἀναγνῶτε
  english_pob_choice: has been read / read
  chosen_spanish: haya sido leída / lean
  alternatives_spanish:
  - sea leída
  - se lea en voz alta
  lexicon: BDAG
  rationale: ἀναγινώσκω significa ‘leer’, con posible matiz de lectura pública en la comunidad. En español, ‘haya sido leída’ y ‘lean’ conservan la lectura como acto completado/mandado sin añadir ‘en voz alta’, que la fuente no exige explícitamente.
- source_word: παρ’ ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - por ustedes
  - en su presencia
  lexicon: BDAG
  rationale: La preposición expresa aquí un marco relacional/comunitario. ‘Entre ustedes’ refleja mejor la recepción comunitaria que una lectura meramente instrumental por parte de ellos.
- source_word: ἡ ἐπιστολή
  english_pob_choice: this letter
  chosen_spanish: esta carta
  alternatives_spanish:
  - la carta
  - esta epístola
  lexicon: BDAG
  rationale: El artículo hace referencia a la carta presente. ‘Carta’ es más natural en español contemporáneo y mantiene la deixis de ‘esta’.
- source_word: ποιήσατε
  english_pob_choice: see that
  chosen_spanish: procuren que
  alternatives_spanish:
  - asegúrense de que
  - vean que
  lexicon: BDAG
  rationale: El imperativo de ποιέω con ἵνα funciona idiomáticamente como exhortación a garantizar un resultado. ‘Procuren que’ conserva la fuerza directiva sin sonar mecánico.
- source_word: ἐν τῇ Λαοδικέων ἐκκλησίᾳ
  english_pob_choice: in the church of the Laodiceans
  chosen_spanish: en la iglesia de los laodicenses
  alternatives_spanish:
  - en la iglesia laodicense
  - en la asamblea de los laodicenses
  lexicon: BDAG
  rationale: 'En contexto paulino, ἐκκλησία se rinde naturalmente por ‘iglesia’. El genitivo Λαοδικέων se conserva como pertenencia o adscripción: ‘de los laodicenses’.'
- source_word: τὴν ἐκ Λαοδικείας
  english_pob_choice: the one from Laodicea
  chosen_spanish: la que viene de Laodicea
  alternatives_spanish:
  - la carta de Laodicea
  - la carta procedente de Laodicea
  lexicon: BDAG
  rationale: El griego omite el sustantivo ‘carta’ y deja la referencia implícita. En español, ‘la que viene de Laodicea’ preserva la elipsis, pero de manera más natural que ‘la de Laodicea’ sin perder claridad.
- source_word: ἐκ Λαοδικείας
  english_pob_choice: from Laodicea
  chosen_spanish: de Laodicea
  alternatives_spanish:
  - procedente de Laodicea
  - desde Laodicea
  lexicon: BDAG
  rationale: ἐκ significa ‘de / desde / procedente de’. Aquí se mantiene el sentido más directo ‘de Laodicea’, sin resolver la identidad histórica del documento.
theological_decisions:
- issue: Identidad de la carta ‘de Laodicea’
  english_pob_reading: Render neutrally as 'the one from Laodicea' without identifying it with a known canonical or non-canonical letter.
  chosen_spanish_reading: Traducir de forma neutral como ‘la que viene de Laodicea’, sin identificarla con ningún escrito conocido.
  alternative_spanish_readings:
  - la carta a los laodicenses
  - la carta desde Laodicea
  - la carta circular asociada con Laodicea
  rationale: El griego solo señala una relación con Laodicea y no especifica el documento. Mantener la ambigüedad evita imponer una reconstrucción histórica no garantizada por el texto.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; por eso se mantiene la estrategia de equivalencia óptima con una nota que preserva la elipsis del griego.
  spanish_consistency_notes:
  - Se usa ‘iglesia’ para ἐκκλησία, coherente con el uso paulino y con el audit trail en inglés.
  - Se evita ‘SEÑOR’ u otras sustituciones porque el versículo no contiene el nombre divino.
  - Se mantiene la ambigüedad de ‘la que viene de Laodicea’ para no cerrar la identidad del escrito.
  - ‘Carta’ se usa para ἐπιστολή, con nota para la elipsis implícita en ‘la que viene de Laodicea’.
