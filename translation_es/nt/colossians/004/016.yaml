    text: Or, more explicitly, 'the letter from Laodicea.' The Greek leaves 'letter' implied.
    reason: lexical_alternative
  - marker: b
    text: The identity of 'the one from Laodicea' is uncertain; it may refer to a letter currently in Laodicea, not necessarily one originally addressed there.
