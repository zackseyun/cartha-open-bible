review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: imperativo presente de perseverancia en la oración, participio modal de vigilancia, referencia anafórica a la oración, y frase final de modo/acompañamiento. Sin embargo, «con gratitud» debilita el valor léxico más específico de ἐν εὐχαριστίᾳ, que en contexto bíblico y en la huella del POB se acerca más a «con acción de gracias» o «dando gracias» que a una actitud general de gratitud.'
  spanish_quality_summary: El español es claro y natural. «Dedíquense a la oración» funciona bien, y «velando en ella» es legible en registro bíblico. No obstante, «con acción de gracias» suena más preciso y sigue siendo digno y comprensible para un público eclesial amplio.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preferencia por conservar matices léxicos relevantes. El borrador acierta en «la oración» y en evitar paráfrasis excesiva. Conviene alinear εὐχαριστία con «acción de gracias» en vez de la abstracción más amplia «gratitud».
  issues:
  - severity: medium
    issue: «con gratitud» para ἐν εὐχαριστίᾳ es demasiado amplio
    rationale: εὐχαριστία aquí no solo denota una disposición interna de gratitud, sino el acto/expresión de dar gracias que acompaña la oración. «Con acción de gracias» preserva mejor el matiz léxico y la tradición exegética del pasaje.
  - severity: low
    issue: La nota alternativa repite «con gratitud»
    rationale: Si se corrige la frase principal para reflejar mejor εὐχαριστία, la nota alternativa también debe ajustarse para mantener coherencia lexical con la evidencia fuente y la decisión principal.
  revised_spanish_text: Dedíquense a la oración[a], velando en ella con acción de gracias,
