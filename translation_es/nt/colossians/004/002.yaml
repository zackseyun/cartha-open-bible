lexical_decisions:
- source_word: Τῇ προσευχῇ / προσευχῇ
  english_pob_choice: prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - oración
  - la plegaria
  lexicon: BDAG
  rationale: El dativo con artículo en griego funciona de modo idiomático como referencia a la práctica de orar. En español, «la oración» comunica naturalmente esa actividad sin forzar un calco; el artículo ayuda a mantener el valor genérico/práctico que el inglés POB también entendió.
- source_word: προσκαρτερεῖτε
  english_pob_choice: Devote yourselves to
  chosen_spanish: Dedíquense a
  alternatives_spanish:
  - Continúen firmes en
  - Perséveren en
  - Dediquen su tiempo a
  lexicon: BDAG
  rationale: El imperativo presente pide perseverancia continua. «Dedíquense a» expresa compromiso sostenido y exhortativo en un español natural, conservando la fuerza aspectual del mandato mejor que una fórmula más pesada o demasiado literal.
- source_word: γρηγοροῦντες
  english_pob_choice: staying alert
  chosen_spanish: velando
  alternatives_spanish:
  - estando alerta
  - vigilando
  - manteniéndose atentos
  lexicon: BDAG
  rationale: El participio describe la manera de orar. «Velando» mantiene la idea de vigilancia atenta y encaja bien con el registro bíblico en español, sin reducirse a la idea de insomnio físico.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en la oración
  - en esto
  lexicon: BDAG
  rationale: El pronombre remite a «la oración». «En ella» conserva la anáfora griega y mantiene la referencia clara en español; evita repetir innecesariamente el sustantivo.
- source_word: ἐν εὐχαριστίᾳ
  english_pob_choice: with thanksgiving
  chosen_spanish: con gratitud
  alternatives_spanish:
  - en acción de gracias
  - dando gracias
  lexicon: BDAG
  rationale: La preposición expresa acompañamiento o modo. «Con gratitud» suena natural en español moderno y transmite el matiz de una actitud agradecida que acompaña la oración; «acción de gracias» sería posible, pero más nominal y menos fluido aquí.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia y no presentan revisiones sustantivas; la traducción española conserva la misma estructura exhortativa y el mismo valor aspectual/attitudinal de los participios, sin introducir cambios interpretativos no atestiguados.
  spanish_consistency_notes:
  - Se mantiene «oración» como práctica general, no como una oración específica.
  - «Velando» conserva la idea de vigilancia activa sin sugerir exclusivamente permanecer despierto.
  - «Con gratitud» sigue el valor adverbial/acompañante de ἐν εὐχαριστίᾳ y mantiene el tono de la exhortación.
