revisions:
- from: El saludo está en mi propia mano[a]—de Pablo. Acuérdense de mis cadenas[b]. La gracia sea con ustedes.
  to: El saludo es de mi puño y letra[a], Pablo. Acuérdense de mis cadenas[b]. La gracia sea con ustedes.
  rationale: Se revisa solo la primera cláusula para hacer idiomática en español la referencia al autógrafo de Pablo, preservando el sentido fuente y la función epistolar documentada en la POB inglesa. «De mi puño y letra» comunica con claridad «written personally by me/my own hand» sin expandir indebidamente el texto. Se mantiene «Pablo» como firma final de la cláusula, y no se alteran las demás decisiones lexicales, que ya son fieles y naturales.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:45Z'
