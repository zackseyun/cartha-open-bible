  glossary_alignment: No hay conflictos con los términos doctrinales principales del proyecto. «Gracia» está bien para χάρις; «cadenas» preserva la fuerza concreta de δεσμοί. La revisión propuesta mantiene la razón lexical documentada para ἀσπασμός y mejora la expresión de τῇ ἐμῇ χειρὶ Παύλου con un giro idiomático español equivalente.
