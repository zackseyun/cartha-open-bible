translation:
  language: es
  text: El saludo es de mi puño y letra[a], Pablo. Acuérdense de mis cadenas[b]. La gracia sea con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salutación». El griego se refiere al saludo final escrito personalmente por Pablo.
    reason: lexical_alternative
  - marker: b
    text: O «mi prisión» o «mis ligaduras». Literalmente, «mis cadenas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασμός
  english_pob_choice: greeting
  chosen_spanish: saludo
  alternatives_spanish:
  - salutación
  - greeting (anglicismo)
  lexicon: BDAG
  rationale: En un cierre epistolar, ἀσπασμός funciona como la fórmula final de despedida/saludo. «Saludo» comunica bien la función en español contemporáneo y evita la aspereza de un calco como «salutación».
- source_word: τῇ ἐμῇ χειρὶ Παύλου
  english_pob_choice: is in my own hand—Paul's
  chosen_spanish: está en mi propia mano—de Pablo
  alternatives_spanish:
  - está escrito de mi propia mano—Pablo
  - con mi propia mano, de Pablo
  lexicon: BDAG
  rationale: La frase griega apunta al cierre autógrafo escrito personalmente por Pablo. «En mi propia mano» preserva la idea de autoría manuscrita; el guion conserva la aposición abrupta de «Pablo» como firma.
- source_word: μνημονεύετέ
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Mantengan presente
  lexicon: BDAG
  rationale: El imperativo presente admite fuerza continua, pero en español una forma natural y exhortativa es «Acuérdense». Mantiene el sentido de recordar sin sonar mecánica.
- source_word: μου τῶν δεσμῶν
  english_pob_choice: my chains
  chosen_spanish: mis cadenas
  alternatives_spanish:
  - mi prisión
  - mis prisiones
  - mis vínculos
  lexicon: BDAG
  rationale: δεσμοί es literalmente «cadenas» o «ligaduras»; la traducción conserva la imagen concreta de la cautividad de Pablo, como hace la POB en inglés. «Mis cadenas» es directo y transparente.
- source_word: ἡ χάρις
  english_pob_choice: Grace
  chosen_spanish: La gracia
  alternatives_spanish:
  - Gracia
  - La gracia de Dios
  lexicon: BDAG
  rationale: 'Se trata de la bendición paulina convencional. En español, mantener el artículo respeta la forma nominal del griego y hace natural la bendición: «La gracia sea con ustedes».'
- source_word: μεθ’ ὑμῶν
  english_pob_choice: be with you
  chosen_spanish: sea con ustedes
  alternatives_spanish:
  - esté con ustedes
  - con ustedes
  lexicon: BDAG
  rationale: El griego es elíptico; en español la bendición necesita un verbo explícito. «Sea con ustedes» expresa de modo natural la fórmula benedictoria sin añadir contenido ajeno.
theological_decisions:
- issue: Bendición final paulina con verbo implícito
  english_pob_reading: Grace be with you
  chosen_spanish_reading: La gracia sea con ustedes
  alternative_spanish_readings:
  - Gracia con ustedes
  - La gracia esté con ustedes
  rationale: El griego no tiene verbo explícito, pero el español requiere una formulación benedictoria completa. «Sea» traduce de manera idiomática la bendición y conserva el tono litúrgico sin sobreinterpretar.
  doctrine_reference: Benedicción paulina; estilo epistolar cristiano primitivo
- issue: Referencia a la autógrafa de Pablo
  english_pob_reading: The greeting is in my own hand—Paul's
  chosen_spanish_reading: El saludo está en mi propia mano—de Pablo
  alternative_spanish_readings:
  - El saludo es de mi propia mano—Pablo
  - El saludo lo escribo yo mismo—Pablo
  rationale: La frase griega subraya que el cierre fue escrito personalmente por Pablo. La traducción mantiene esa afirmación sin convertirla en una paráfrasis explicativa que borre la estructura breve del original.
  doctrine_reference: Autoría apostólica; costumbre epistolar del autógrafo final
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la lectura auditada en inglés: saludo final autógrafo, recuerdo de las cadenas y bendición conclusiva. Se preserva la imagen concreta de δεσμοί y la elipsis benedictoria de χάρις μεθ’ ὑμῶν con una solución natural en español.'
  spanish_consistency_notes:
  - Se usa «gracia» para χάρις, conforme al uso paulino y al expediente auditado.
  - Se mantiene «cadenas» para δεσμοί para conservar la imagen concreta y no desdibujar la referencia a la cautividad.
  - «Ustedes» mantiene un registro neutral y amplio para un plural epistolar.
  - La puntuación con guion largo intenta reflejar la aposición abrupta del autógrafo final sin añadir palabras interpretativas.
