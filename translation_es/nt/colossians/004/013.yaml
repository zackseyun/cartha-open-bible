translation:
  language: es
  text: 'Porque doy testimonio en favor de él: que tiene gran esfuerzo por ustedes y por los que están en Laodicea y los que están en Hierápolis[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mucho trabajo», «gran labor» o «gran afán». La expresión griega puede denotar labor intensa y, por extensión en el contexto, una preocupación profunda o apremiante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρῶ
  english_pob_choice: I testify
  chosen_spanish: doy testimonio
  alternatives_spanish:
  - testifico
  - testifico en favor de él
  lexicon: BDAG
  rationale: μαρτυρῶ expresa una afirmación testimonial personal. 'Doy testimonio' suena natural en español y conserva la fuerza declarativa sin volverlo técnico o forzado.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Se mantiene el valor explicativo/conectivo de γάρ. 'Porque' enlaza bien con el contexto inmediato en español y conserva la relación causal o justificativa.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - de él
  - en favor de él
  lexicon: BDAG
  rationale: La dativo con μαρτυρῶ puede señalar la persona respecto de quien se da testimonio. 'Por él' refleja bien la revisión inglesa y conserva la idea de testimonio a su favor/sobre él sin introducir una paráfrasis más amplia.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce de manera directa el contenido del testimonio, como en el griego y en la versión inglesa auditada.
- source_word: ἔχει
  english_pob_choice: he has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  lexicon: BDAG
  rationale: El verbo simple ἔχει se rinde de forma directa con 'tiene', evitando una expansión innecesaria.
- source_word: πολὺν πόνον
  english_pob_choice: great labor
  chosen_spanish: gran labor
  alternatives_spanish:
  - mucho trabajo
  - gran esfuerzo
  - gran afán
  lexicon: BDAG
  rationale: πόνος puede denotar labor, fatiga o esfuerzo intenso. 'Gran labor' preserva la imagen de trabajo/exigencia fuerte que la POB inglesa prioriza, sin cerrarla exclusivamente a un matiz emocional.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - a favor de
  - por causa de
  lexicon: BDAG
  rationale: En este contexto ὑπέρ expresa beneficio o interés dirigido hacia otros. 'Por' es natural en español y mantiene la relación de preocupación o entrega en favor de los destinatarios.
- source_word: ὑμῶν
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - todos ustedes
  lexicon: BDAG
  rationale: Se explicita el plural en español latinoamericano con 'ustedes', preservando el destinatario plural del texto.
- source_word: τῶν ἐν Λαοδικείᾳ
  english_pob_choice: those in Laodicea
  chosen_spanish: los que están en Laodicea
  alternatives_spanish:
  - los de Laodicea
  - los creyentes en Laodicea
  lexicon: BDAG
  rationale: La construcción artículo + preposición se vuelve naturalmente relativa en español. 'Los que están en Laodicea' conserva el referente humano implícito y evita forzar una explicitación confesional no presente en el griego.
- source_word: τῶν ἐν Ἱεραπόλει
  english_pob_choice: those in Hierapolis
  chosen_spanish: los que están en Hierápolis
  alternatives_spanish:
  - los de Hierápolis
  - los creyentes en Hierápolis
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con la frase anterior y la transliteración del nombre propio en forma española habitual, Hierápolis.
theological_decisions:
- issue: Sentido de πόνος en relación con la obra de Epafras
  english_pob_reading: great labor
  chosen_spanish_reading: gran labor
  alternative_spanish_readings:
  - mucho trabajo
  - gran esfuerzo
  - gran afán
  - profunda angustia
  rationale: El contexto de Colosenses 4:12 habla del intenso esfuerzo de Epafras por los creyentes. Sin embargo, πόνος tiene una base semántica de labor/fatiga/trabajo arduo. 'Gran labor' conserva esa amplitud y no restringe el texto a un único matiz afectivo como 'angustia'.
  doctrine_reference: 'Principios de traducción POB: claridad, fidelidad lexical y conservación de tensiones semánticas'
- issue: Valor de μαρτυρῶ αὐτῷ en relación con el tono de la afirmación
  english_pob_reading: I testify for him
  chosen_spanish_reading: doy testimonio por él
  alternative_spanish_readings:
  - doy testimonio de él
  - testifico por él
  - testifico en favor de él
  rationale: La revisión inglesa ajustó 'about him' a 'for him' para reflejar mejor la dative con μαρτυρῶ. En español, 'por él' comunica bien ese testimonio en su favor o respecto de él, manteniendo la relación personal sin sobreexplicar.
  doctrine_reference: Notas de revisión auditada y principio de correspondencia sintáctica
translation_notes:
  revision_awareness: La versión española sigue la última revisión auditada del inglés al preferir una formulación que refleje μαρτυρῶ αὐτῷ como testimonio ‘por él’ y no simplemente ‘acerca de él’. También conserva la decisión léxica de traducir πόνος con una expresión de labor intensa, sin reducirla a una lectura emocional única.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa 'gran labor' para πόνος, en línea con la preferencia POB por preservar el valor concreto de esfuerzo/trabajo.
  - 'Los nombres propios se adaptan al español estándar: Laodicea y Hierápolis.'
  - Se emplea 'ustedes' para el plural de segunda persona en español latinoamericano.
  - La nota al pie conserva la tríada de alternativas documentadas en la POB inglesa, ajustada a equivalentes naturales en español.
