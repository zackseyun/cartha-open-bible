translation:
  language: es
  text: orando también por nosotros[a], para que Dios nos abra una puerta para la palabra, a fin de hablar acerca del misterio de Mesías[b], por causa del cual también estoy preso[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras oran también por nosotros»'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «el misterio del Mesías»; se vierte «Mesías» aquí porque Χριστός funciona como título.'
    reason: alternative_reading
  - marker: c
    text: 'O: «estoy en cadenas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσευχόμενοι
  english_pob_choice: while also praying
  chosen_spanish: orando
  alternatives_spanish:
  - mientras oran
  - mientras también oran
  lexicon: BDAG
  rationale: El participio presente conserva la continuidad de la exhortación. En español, «orando» enlaza naturalmente con el contexto previo sin recargar la frase.
- source_word: ἅμα καὶ
  english_pob_choice: while also
  chosen_spanish: al mismo tiempo también
  alternatives_spanish:
  - también
  - al mismo tiempo
  lexicon: BDAG
  rationale: La combinación expresa simultaneidad e inclusión. En el flujo español, «al mismo tiempo también» mantiene ambas ideas, aunque se integra en la frase de modo más fluido.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - por nosotros mismos
  - a favor de nosotros
  lexicon: BDAG
  rationale: Con lenguaje de oración, περί + genitivo se expresa con naturalidad como «por nosotros», evitando un calco de «acerca de».
- source_word: ἵνα ὁ θεὸς ἀνοίξῃ
  english_pob_choice: that God may open
  chosen_spanish: para que Dios nos abra
  alternatives_spanish:
  - a fin de que Dios nos abra
  - para que Dios abra
  lexicon: BDAG
  rationale: ἵνα introduce finalidad/petición. «Para que» comunica bien ese valor y mantiene el carácter de súplica.
- source_word: ἡμῖν θύραν τοῦ λόγου
  english_pob_choice: to us a door for the word
  chosen_spanish: una puerta para la palabra
  alternatives_spanish:
  - una puerta de la palabra
  - una oportunidad para la palabra
  lexicon: BDAG
  rationale: Se conserva la metáfora de la puerta y el valor de λόγος como «palabra» en sentido paulino de mensaje proclamado. «Para la palabra» evita desactivar la imagen con una paráfrasis explicativa.
- source_word: λαλῆσαι
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - proclamar
  - decir
  lexicon: BDAG
  rationale: El infinitivo de propósito se rinde con el sentido básico de λαλέω. «Hablar» es preciso y no añade una connotación técnica de predicación que el verbo por sí solo no exige.
- source_word: τὸ μυστήριον
  english_pob_choice: the mystery
  chosen_spanish: el misterio
  alternatives_spanish:
  - el secreto
  lexicon: BDAG
  rationale: En el uso paulino, μυστήριον es una realidad divina revelada; «misterio» mantiene la consistencia intertextual mejor que «secreto».
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: de Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Siguiendo la decisión doctrinal y el contexto titulario, Χριστός se vierte como «Mesías». En español, esto evita convertir el título en mero nombre propio y preserva la carga semántica.
- source_word: δι’ ὃ
  english_pob_choice: because of which
  chosen_spanish: por causa del cual
  alternatives_spanish:
  - por el cual
  - a causa del cual
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Por causa del cual» hace explícita la relación causal con el misterio mencionado sin perder la referencia relativa.
- source_word: δέδεμαι
  english_pob_choice: I am also bound
  chosen_spanish: estoy preso
  alternatives_spanish:
  - estoy atado
  - estoy en cadenas
  lexicon: BDAG
  rationale: El perfecto pasivo señala un estado presente resultante; en el contexto de prisión de Pablo, «estoy preso» comunica el resultado de forma natural y clara en español. Se evita «atado» por sonar menos idiomático aquí.
theological_decisions:
- issue: Traducción de Χριστοῦ como título
  english_pob_reading: the mystery of the Messiah
  chosen_spanish_reading: el misterio de Mesías
  alternative_spanish_readings:
  - el misterio de Cristo
  rationale: La lectura auditada trata Χριστός como título. En español, «Mesías» conserva el valor titulario y evita una domesticación eclesial automática a «Cristo» cuando el texto enfatiza identidad/función.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (where title; Cristo where name-like)'
- issue: Fuerza metafórica de θύραν τοῦ λόγου
  english_pob_reading: a door for the word
  chosen_spanish_reading: una puerta para la palabra
  alternative_spanish_readings:
  - una oportunidad para la palabra
  rationale: Se preserva la metáfora paulina de la puerta como acceso u oportunidad, sin sustituirla por una explicación interpretativa. Esto conserva la imagen y permite que el lector perciba el lenguaje figurado.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: El contexto de revisión en inglés mostró una oscilación entre «Messiah» y «Christ» para Χριστοῦ; se siguió la decisión restaurada que privilegia el título «Mesías». También se retuvo la metáfora de «puerta para la palabra» frente a una paráfrasis explicativa, y para δέδεμαι se eligió un equivalente español natural en el marco carcelario de Pablo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Mesías» para Χριστός en función titulario.
  - Se conserva el valor de participio continuo en «orando» sin convertirlo en una estructura finita pesada.
  - «Palabra» refleja λόγος en sentido paulino de mensaje proclamado, coherente con el resto del corpus.
  - La puntuación separa claramente la cláusula final causal con coma final, siguiendo el tono de una sola unidad oracional griega.
