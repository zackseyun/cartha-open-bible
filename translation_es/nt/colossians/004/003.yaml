  to: orando también por nosotros[a], para que Dios nos abra una puerta para la palabra, a fin de hablar acerca del misterio de Mesías[b], por causa del cual también estoy preso[c],
  rationale: Se suavizó «al mismo tiempo también» a «también» para conservar el sentido de ἅμα καὶ con español natural, y se corrigió «hablar el misterio» a «hablar acerca del misterio», que refleja λαλῆσαι sin caer en una construcción no idiomática. Las notas se ajustaron para concordar con la redacción revisada. No se requiere adjudicación adicional porque los cambios son estilísticos y de fidelidad idiomática, no doctrinales.
