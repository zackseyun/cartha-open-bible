review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: σὺν = «Junto con», Ὀνησίμῳ = «Onésimo», πιστῷ καὶ ἀγαπητῷ ἀδελφῷ = «el hermano fiel y amado», ὅς ἐστιν ἐξ ὑμῶν = «que es uno de ustedes», y γνωρίσουσιν τὰ ὧδε = comunicar los asuntos de allí. Sin embargo, las notas al pie están ancladas a palabras equivocadas: la alternativa «que es de entre ustedes» corresponde a ὅς ἐστιν ἐξ ὑμῶν, no al nombre Onésimo; y la alternativa sobre «Les informarán...» corresponde a la cláusula final, no a «ustedes».'
  spanish_quality_summary: 'El español es claro, natural y de registro eclesial apropiado. «Les harán saber todo lo de aquí» es comprensible y fiel, aunque «todo lo que sucede aquí» sería más interpretativo y menos ceñido al griego. La puntuación y fluidez son buenas. El problema principal es técnico-editorial: la colocación de los marcadores de notas no coincide con el contenido de las notas.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías/Cristo, esclavo, etc. «Hermano», «fiel», «amado» y «Onésimo» concuerdan con las decisiones auditadas.
  issues:
  - severity: medium
    issue: Marcador [a] anclado al nombre «Onésimo» aunque la nota explica la frase «que es uno de ustedes».
    rationale: La nota «O «que es de entre ustedes»» es una alternativa de ὅς ἐστιν ἐξ ὑμῶν, no del nombre propio. Debe anclarse en la cláusula correspondiente para preservar trazabilidad léxica.
  - severity: medium
    issue: Marcador [b] anclado a «ustedes» aunque la nota explica la cláusula final «Les harán saber todo lo de aquí».
    rationale: La nota «O «Les informarán de todo lo de aquí»» es alternativa para γνωρίσουσιν τὰ ὧδε / la cláusula final completa, no para el pronombre «ustedes». La ubicación actual induce a error.
  revised_spanish_text: Junto con Onésimo, el hermano fiel y amado, que es uno de ustedes[a]. Les harán saber todo lo de aquí[b].
  revised_footnotes:
  - marker: a
    text: O «que es de entre ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «Les informarán de todo lo de aquí».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto base porque es fiel y natural; solo se corrige la ubicación de los marcadores de notas para que correspondan exactamente a las expresiones a las que ofrecen alternativas léxicas.
