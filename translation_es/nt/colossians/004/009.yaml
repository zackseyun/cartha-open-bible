translation:
  language: es
  text: Junto con Onésimo, el hermano fiel y amado, que es uno de ustedes[a]. Les harán saber todo lo de aquí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que es de entre ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «Les informarán de todo lo de aquí».
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺν
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  lexicon: BDAG
  rationale: σύν marca compañía o acompañamiento. «Junto con» conserva ese matiz y suena natural en español sin perder la relación con el verso anterior.
- source_word: Ὀνησίμῳ
  english_pob_choice: Onesimus
  chosen_spanish: Onésimo
  alternatives_spanish:
  - Onesimus
  lexicon: Convención onomástica española
  rationale: El nombre propio se translitera de manera estándar al español bíblico como «Onésimo».
- source_word: πιστῷ
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: πιστός aquí describe a una persona digna de confianza en el servicio cristiano. «Fiel» conserva ese sentido relacional y moral de forma natural en español.
- source_word: ἀγαπητῷ
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - amado por
  lexicon: BDAG
  rationale: ἀγαπητός expresa afecto real y reconocimiento fraternal. «Amado» preserva bien ese tono epistolar; en español «amado» comunica la calidez mejor que «querido» en este contexto.
- source_word: ἀδελφῷ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano en la fe
  lexicon: BDAG
  rationale: El griego dice simplemente «hermano». En contexto cristiano se entiende como miembro de la comunidad, sin necesidad de expandirlo con palabras no presentes en el texto.
- source_word: ὅς ἐστιν ἐξ ὑμῶν
  english_pob_choice: who is one of you
  chosen_spanish: que es uno de ustedes
  alternatives_spanish:
  - que es de entre ustedes
  - que procede de ustedes
  lexicon: BDAG
  rationale: La frase indica pertenencia u origen dentro de la comunidad colosense. «Uno de ustedes» es idiomático en español y conserva esa identificación comunitaria.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo
  lexicon: BDAG
  rationale: El neutro plural funciona de modo comprehensivo. «Todo» transmite bien la totalidad sin sonar forzado.
- source_word: γνωρίσουσιν
  english_pob_choice: will make known
  chosen_spanish: les harán saber
  alternatives_spanish:
  - les informarán
  - les darán a conocer
  lexicon: BDAG
  rationale: γνωρίζω significa hacer saber o dar a conocer. «Les harán saber» conserva el valor causativo y resulta más natural en español que una formulación demasiado literal.
- source_word: τὰ ὧδε
  english_pob_choice: everything here
  chosen_spanish: todo lo de aquí
  alternatives_spanish:
  - las cosas de aquí
  - lo que pasa aquí
  lexicon: BDAG
  rationale: La expresión se refiere a los asuntos o la situación presente del lugar donde está Pablo. «Todo lo de aquí» mantiene esa referencia espacial y evita una paráfrasis más amplia de lo que el griego garantiza.
theological_decisions:
- issue: Sentido comunitario de ἐξ ὑμῶν
  english_pob_reading: who is one of you
  chosen_spanish_reading: que es uno de ustedes
  alternative_spanish_readings:
  - que es de entre ustedes
  - que procede de ustedes
  rationale: La lectura preserva la identificación de Onésimo con la comunidad colosense sin importar detalles biográficos o sociales del trasfondo que el versículo no explicita.
  doctrine_reference: Principio de no importar afirmaciones doctrinales o históricas que el texto no hace explícitas
- issue: Relación fraternal de ἀδελφῷ
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - hermano en la fe
  rationale: Se mantiene el lenguaje familiar eclesial del texto sin añadir una glosa interpretativa innecesaria.
  doctrine_reference: Fidelidad al léxico del texto y respeto del registro epistolar
translation_notes:
  revision_awareness: Se corrigió la validación anterior insertando los marcadores [a] y [b] directamente en el texto español, de modo que cada nota quede anclada en su palabra o frase correspondiente.
  spanish_consistency_notes:
  - Se usó «Onésimo» como forma española habitual del nombre propio.
  - Se evitó «Cristo» y otras formulaciones no presentes en el versículo.
  - «Fiel» y «amado» mantienen el tono moral y afectivo del griego sin amplificación.
  - «Todo lo de aquí» conserva la referencia local de τὰ ὧδε sin convertirla en una paráfrasis más explícita.
