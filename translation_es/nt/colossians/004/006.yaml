translation:
  language: es
  text: Que su habla[a] sea siempre con gracia[b], sazonada con sal[c], para que sepan cómo deben responder a cada uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabra». Aquí λόγος se entiende como el modo de hablar, no como un «mensaje» aislado.
    reason: lexical_alternative
  - marker: b
    text: O «graciosa». La frase «con gracia» puede denotar habla marcada por benignidad, amabilidad o favor.
    reason: lexical_alternative
  - marker: c
    text: 'La imagen de «sazonada con sal» es metafórica: habla apropiada, atractiva y sabia, no insípida ni corruptora.'
    reason: cultural_note
lexical_decisions:
- source_word: λόγος
  english_pob_choice: speech
  chosen_spanish: palabra
  alternatives_spanish:
  - habla
  - discurso
  - mensaje
  lexicon: BDAG
  rationale: En este contexto exhortativo, λόγος se refiere al modo de hablar de los creyentes. «Palabra» conserva la amplitud semántica y permite entender la conducta verbal sin limitarla a un término técnico; además, se conecta naturalmente con la instrucción sobre cómo responder a cada persona.
- source_word: ἐν χάριτι
  english_pob_choice: with grace
  chosen_spanish: con gracia
  alternatives_spanish:
  - en gracia
  - con amabilidad
  - de manera graciosa
  lexicon: BDAG
  rationale: La preposición ἐν con χάρις puede expresar cualidad o característica del habla. «Con gracia» mantiene la relación preposicional y deja abierta la idea de habla marcada por benignidad, favor o gracia, sin reducirla a una sola paráfrasis.
- source_word: ἅλατι ἠρτυμένος
  english_pob_choice: seasoned with salt
  chosen_spanish: sazonada con sal
  alternatives_spanish:
  - salada
  - condimentada con sal
  - aderezada con sal
  lexicon: BDAG
  rationale: 'La imagen es metafórica: habla que resulta apropiada, agradable y sabia, no insípida ni dañina. «Sazonada con sal» preserva la metáfora y sugiere el efecto de dar buen sabor, cercanía funcional al inglés POB sin sonar artificial en español.'
- source_word: εἰδέναι
  english_pob_choice: so that you may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - para que conozcan
  - de modo que sepan
  - a fin de saber
  lexicon: BDAG
  rationale: El infinitivo expresa propósito o resultado de la exhortación anterior. En español, «para que sepan» comunica con claridad la finalidad práctica del consejo y conserva la relación lógica del original.
- source_word: δεῖ
  english_pob_choice: ought to
  chosen_spanish: deben
  alternatives_spanish:
  - tienen que
  - han de
  - deberían
  lexicon: BDAG
  rationale: δεῖ expresa necesidad u obligación apropiada. «Deben» transmite bien esa obligatoriedad con un tono sobrio; «deberían» suavizaría demasiado y «tienen que» sería más coloquial.
- source_word: ἑνὶ ἑκάστῳ
  english_pob_choice: each person
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada persona
  - a cada cual
  - a cada individuo
  lexicon: BDAG
  rationale: La expresión distributiva subraya la respuesta diferenciada para cada interlocutor. «A cada uno» es natural en español y conserva la fuerza individualizadora del griego.
- source_word: ἀποκρίνεσθαι
  english_pob_choice: to answer
  chosen_spanish: responder
  alternatives_spanish:
  - contestar
  - replicar
  - dar respuesta
  lexicon: BDAG
  rationale: El verbo apunta a dar una respuesta en conversación. «Responder» es la equivalencia más natural y amplia en español; mantiene la idea de contestar adecuadamente sin restringir el matiz al diálogo formal.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo momento
  - constantemente
  lexicon: BDAG
  rationale: Adverbio temporal directo. «Siempre» es la correspondencia natural y conserva la totalidad de la exhortación.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y se contrastó con el audio-trail inglés POB. La versión inglesa ya decidió mantener ἐν χάριτι como «with grace» y la metáfora de la sal como «seasoned with salt»; la presente redacción española conserva esas decisiones con equivalentes idiomáticos naturales y no introduce cambios textuales ni doctrinales respecto del registro auditado.
  spanish_consistency_notes:
  - Se mantuvo un tono pastoral y directo, apropiado para una carta paulina.
  - Se evitó la traducción mecánica de λόγος como «palabra» sin contexto rígido; aquí se eligió por su naturalidad y amplitud en español.
  - «Con gracia» conserva la ambigüedad productiva del original entre benignidad del habla y resonancia con la gracia divina.
  - La metáfora de la sal se mantuvo explícita para no perder su valor retórico y ético.
