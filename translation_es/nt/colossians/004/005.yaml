translation:
  language: es
  text: Caminen en sabiduría con los de afuera[a], aprovechando[b] el tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que están fuera', es decir, personas fuera de la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'redimiendo el tiempo'; el sentido es 'aprovechando la oportunidad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν σοφίᾳ
  english_pob_choice: in wisdom
  chosen_spanish: en sabiduría
  alternatives_spanish:
  - con sabiduría
  - sabiamente
  lexicon: BDAG
  rationale: Mantiene el sustantivo σοφία y la idea de ámbito o manera de conducta. En español, 'en sabiduría' conserva mejor el paralelo con la formulación griega que el adverbio 'sabiamente'.
- source_word: περιπατεῖτε
  english_pob_choice: Walk
  chosen_spanish: Caminen
  alternatives_spanish:
  - Vivan
  - Conduzcan su vida
  lexicon: BDAG
  rationale: El verbo περιπατέω se usa metafóricamente para el modo de vida. 'Caminen' conserva esa metáfora de manera natural en español y sigue el tono exhortativo del imperativo plural.
- source_word: πρὸς τοὺς ἔξω
  english_pob_choice: toward outsiders
  chosen_spanish: hacia los de afuera
  alternatives_spanish:
  - hacia los externos
  - con respecto a los de afuera
  lexicon: BDAG
  rationale: '''Los de afuera'' refleja el grupo fuera de la comunidad creyente; ''hacia'' preserva la orientación de πρός. Se mantiene el matiz relacional y no solo locativo.'
- source_word: τὸν καιρόν
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la oportunidad
  - la ocasión
  lexicon: BDAG
  rationale: Aunque καιρός sugiere un tiempo oportuno, la expresión española natural con el participio es 'aprovechando el tiempo'. La nota marca la posibilidad de 'oportunidad' sin forzarla en el texto principal.
- source_word: ἐξαγοραζόμενοι
  english_pob_choice: making the most of
  chosen_spanish: aprovechando
  alternatives_spanish:
  - redimiendo
  - comprando de nuevo
  - sacando el máximo provecho de
  lexicon: BDAG
  rationale: El participio funciona idiomáticamente como 'aprovechar al máximo'. 'Aprovechando' transmite el sentido práctico en español sin introducir un marco soteriológico que el contexto no exige.
theological_decisions:
- issue: Posible sobrerlectura teológica de ἐξαγοραζόμενοι
  english_pob_reading: An exhortation to wise, opportunistic conduct in relation to non-believers
  chosen_spanish_reading: Una exhortación a vivir con sabiduría frente a los de afuera, aprovechando las oportunidades
  alternative_spanish_readings:
  - 'Una lectura más literal: ''redimiendo el tiempo'''
  - 'Una traducción comercial más fuerte: ''comprando el tiempo'''
  rationale: En este contexto, el verbo expresa el uso diligente y prudente del momento, no la redención salvífica. 'Aprovechando' evita importar un contenido doctrinal ajeno y conserva el valor exhortativo del pasaje.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; optimal equivalence'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español. También se ajustó la frase para que las notas correspondan exactamente con las alternativas léxicas del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' como sustantivo para reflejar σοφίᾳ.
  - '''Los de afuera'' conserva el referente comunitario de τοὺς ἔξω sin sobreexplicar en el texto principal.'
  - '''Aprovechando'' evita cargar ''redimiendo'' con connotaciones doctrinales no presentes en el contexto inmediato.'
  - El texto usa registro neutral y eclesialmente legible para español latinoamericano.
