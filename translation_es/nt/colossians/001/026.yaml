translation:
  language: es
  text: el misterio oculto desde los siglos y desde las generaciones, pero ahora revelado a sus santos[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «secreto». En Pablo, «misterio» suele significar un propósito divino que antes estaba oculto y ahora ha sido revelado.
    reason: lexical_alternative
  - marker: b
    text: O «a sus seres santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: «Misterio» conserva el sentido paulino de una realidad divina antes oculta y ahora dada a conocer. «Secreto» es posible, pero en español puede sonar más genérico o menos teológicamente preciso para este uso.
- source_word: ἀποκεκρυμμένον
  english_pob_choice: hidden
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - que había estado oculto
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante de una ocultación previa. «Oculto» es natural en español y preserva ese valor pasivo sin endurecer la frase.
- source_word: ἀπὸ τῶν αἰώνων
  english_pob_choice: from the ages
  chosen_spanish: desde los siglos
  alternatives_spanish:
  - desde las edades
  - desde tiempos pasados
  lexicon: BDAG
  rationale: «Ages» aquí apunta a épocas/edades, no a eternidad abstracta. «Desde los siglos» mantiene el paralelo con el griego y suena idiomático en español bíblico.
- source_word: καὶ ἀπὸ τῶν γενεῶν
  english_pob_choice: and from the generations
  chosen_spanish: y desde las generaciones
  alternatives_spanish:
  - y desde los linajes
  - y desde todas las generaciones
  lexicon: BDAG
  rationale: La repetición de «desde» conserva el paralelismo de ἀπό ... καὶ ἀπό. «Generaciones» refleja directamente γενεῶν y evita añadir énfasis no explícito.
- source_word: ἐφανερώθη
  english_pob_choice: revealed
  chosen_spanish: revelado
  alternatives_spanish:
  - manifestado
  - hecho manifiesto
  lexicon: BDAG
  rationale: El aoristo pasivo se expresa de manera natural con el participio «revelado» en una cláusula adjetival. Esto comunica la acción divina sin sobrecargar la sintaxis.
- source_word: τοῖς ἁγίοις αὐτοῦ
  english_pob_choice: to his saints
  chosen_spanish: a sus santos
  alternatives_spanish:
  - a sus santos y santas
  - a sus santos / a sus consagrados
  lexicon: BDAG
  rationale: En el uso paulino, ἅγιοι designa al pueblo de Dios apartado para él. «Santos» preserva el término eclesial ya establecido en español bíblico, sin reducirlo a una noción posterior de canonización.
theological_decisions:
- issue: Valor de μυστήριον en Pablo
  english_pob_reading: ‘mystery’ means a divine purpose once hidden and now disclosed, not merely a private secret.
  chosen_spanish_reading: «misterio» comunica una realidad divina antes oculta y ahora revelada, no solo un «secreto» privado.
  alternative_spanish_readings:
  - «secreto»
  - «misterio divino»
  rationale: La distinción evita trivializar el término paulino. En español, «misterio» es la opción más estable para conservar la carga teológica y la continuidad con el uso apostólico.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Sentido de τοῖς ἁγίοις αὐτοῦ
  english_pob_reading: ‘his saints’ refers to God's holy people, the community of believers, not a later canonized elite.
  chosen_spanish_reading: «a sus santos» se entiende como el pueblo de Dios, la comunidad de creyentes apartados para él.
  alternative_spanish_readings:
  - «a sus santos»
  - «a sus santos / a sus consagrados»
  - «a sus santos y fieles»
  rationale: Se mantiene la terminología bíblica tradicional sin imponer la noción posterior de canonización. La nota aclara el referente comunitario que el griego y la POB documentan.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: 'El texto español sigue el estado estable de la auditoría inglesa más reciente, que reporta alta concordancia y no registra revisiones aplicadas. Se han conservado las dos tensiones léxicas principales documentadas: μυστήριον y τοῖς ἁγίοις αὐτοῦ.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia paralela «desde ... y desde ...» para reflejar ἀπό ... καὶ ἀπό.
  - «Misterio» y «santos» conservan terminología paulina consistente con el registro POB en español.
  - Se evitó sustituir «santos» por «consagrados» en el texto principal para no perder la forma lexical eclesial más reconocible.
  - La puntuación con coma final reproduce la continuidad sintáctica del fragmento griego y del texto base en inglés.
