  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego y del rastro POB: «misterio», «oculto», el paralelismo «desde los siglos y desde las generaciones», el contraste «pero ahora», y la revelación «a sus santos». Sin embargo, la nota alternativa para τοῖς ἁγίοις αὐτοῦ no preserva bien la opción inglesa «his holy ones», porque «seres santos» suena extraño y puede sugerir seres celestiales en vez del pueblo santo de Dios.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español bíblico contemporáneo. «El misterio oculto desde los siglos y desde las generaciones, pero ahora revelado a sus santos» lee bien. La única falla notable de legibilidad está en la nota [b], cuya redacción no es idiomática ni eclesialmente natural.
  glossary_alignment: 'Alinea correctamente con las decisiones del proyecto: μυστήριον -> «misterio»; ἅγιοι -> «santos» en el texto principal, preservando la carga paulina. No hay conflictos con la terminología base del proyecto.'
  issues:
  - severity: medium
    issue: La nota [b] usa «a sus seres santos» para «to his holy ones».
    rationale: «Seres santos» no es una alternativa natural ni fiel en este contexto paulino; puede sonar ontológico o angélico. La alternativa documentada debe expresar «sus santos»/«sus consagrados»/«sus santos» con claridad comunitaria. «A sus santos» ya es el texto principal, por lo que la nota debe ofrecer una alternativa real como «a sus consagrados» o «a sus santos, es decir, sus santos/los suyos apartados para Dios». La opción más directa y fiel a la nota inglesa es «a sus consagrados» o «a sus santos» no sirve como alternativa.
  revised_spanish_text: el misterio oculto desde los siglos y desde las generaciones, pero ahora revelado a sus santos[a][b],
  revised_footnotes:
  - marker: a
    text: O «secreto». En Pablo, «misterio» suele significar un propósito divino que antes estaba oculto y ahora ha sido revelado.
    reason: lexical_alternative
  - marker: b
    text: O «a sus consagrados».
    reason: lexical_alternative
