    rationale: El contenido de la nota («O “pleno conocimiento”») no corresponde a Διὰ τοῦτο sino a «conocimiento». Esto rompe la trazabilidad léxica y puede confundir al lector.
  - severity: medium
    issue: «lo oímos» añade un objeto no expreso en el griego.
    rationale: ἀφ’ ἧς ἡμέρας ἠκούσαμεν significa «desde el día que oímos» o «desde el día en que supimos». Añadir «lo» sobreespecifica el referente.
  - severity: medium
    issue: «de orar por ustedes y de pedir» suena menos natural que una coordinación verbal paralela.
    rationale: El griego tiene dos participios coordinados. En español bíblico natural, «de orar por ustedes y pedir» o «orando ... y pidiendo» fluye mejor.
  - severity: low
    issue: «inteligencia espiritual» es posible, pero menos transparente que «entendimiento espiritual».
    rationale: Para συνέσις, «entendimiento» mantiene mejor el registro bíblico y la cercanía al POB inglés «understanding».
