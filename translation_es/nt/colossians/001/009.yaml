translation:
  language: es
  text: Por esta razón, nosotros también, desde el día en que oímos, no cesamos de orar por ustedes y pedir que sean llenos del conocimiento[a] de su voluntad, en toda sabiduría y entendimiento espiritual[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pleno conocimiento». El término griego puede llevar el sentido de un conocimiento más pleno o más profundo.
    reason: lexical_alternative
  - marker: b
    text: «Espiritual» puede significar espiritual en carácter o dado por el Espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Por lo tanto
  lexicon: BDAG
  rationale: διά con acusativo expresa aquí relación causal o inferencial; «Por esta razón» conserva el enlace con lo anterior y suena natural en español.
- source_word: καὶ ἡμεῖς
  english_pob_choice: we also
  chosen_spanish: nosotros también
  alternatives_spanish:
  - nosotros igualmente
  - también nosotros
  lexicon: BDAG
  rationale: καί añade a Pablo y sus compañeros a la respuesta descrita; «nosotros también» mantiene la inclusión enfática y el orden es natural en español.
- source_word: ἀφ’ ἧς ἡμέρας ἠκούσαμεν
  english_pob_choice: from the day we heard
  chosen_spanish: desde el día en que lo oímos
  alternatives_spanish:
  - desde el día que lo oímos
  - desde el día en que escuchamos
  lexicon: BDAG
  rationale: La frase marca el punto de inicio de la acción continua. «Desde el día en que lo oímos» conserva la temporalidad y evita un giro demasiado rígido.
- source_word: οὐ παυόμεθα
  english_pob_choice: have not ceased
  chosen_spanish: no cesamos
  alternatives_spanish:
  - no hemos cesado
  - no dejamos de
  lexicon: BDAG
  rationale: El presente medio con οὐ expresa continuidad hasta el presente. En español, «no cesamos» comunica esa continuidad sin sobrecargar la forma verbal.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - en favor de ustedes
  - a favor de ustedes
  lexicon: BDAG
  rationale: ὑπέρ en este contexto indica beneficio o representación en la oración. «Por ustedes» es la forma más natural en español para la intercesión.
- source_word: προσευχόμενοι καὶ αἰτούμενοι
  english_pob_choice: praying for you and asking
  chosen_spanish: orar por ustedes y de pedir
  alternatives_spanish:
  - orando por ustedes y pidiendo
  - hacer oración y pedir
  lexicon: BDAG
  rationale: 'Los dos participios no son redundantes: προσεύχομαι es oración general y αἰτέω añade petición concreta. En español, la coordinación con «de» mantiene el paralelismo y el matiz doble.'
- source_word: ἵνα πληρωθῆτε
  english_pob_choice: that you may be filled
  chosen_spanish: que sean llenos
  alternatives_spanish:
  - que sean llenados
  - que sean colmados
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo expresa el contenido de la petición. «Sean llenos» es claro y respeta el pasivo sin explicitar indebidamente el agente.
- source_word: τὴν ἐπίγνωσιν
  english_pob_choice: with the knowledge
  chosen_spanish: del conocimiento
  alternatives_spanish:
  - con el conocimiento
  - con pleno conocimiento
  lexicon: BDAG
  rationale: ἐπίγνωσις puede implicar conocimiento pleno o más profundo, pero el español «conocimiento» conserva el peso del término sin imponer una glosa interpretativa en el texto principal. La sintaxis con πληρόω se vuelve natural mediante «ser llenos del conocimiento».
- source_word: τοῦ θελήματος αὐτοῦ
  english_pob_choice: of his will
  chosen_spanish: de su voluntad
  alternatives_spanish:
  - de lo que él quiere
  - de su querer
  lexicon: BDAG
  rationale: La construcción genitiva es directa; «su voluntad» es literal e idiomática en español.
- source_word: ἐν πάσῃ σοφίᾳ καὶ συνέσει πνευματικῇ
  english_pob_choice: in all spiritual wisdom and understanding
  chosen_spanish: en toda sabiduría e inteligencia espiritual
  alternatives_spanish:
  - con toda sabiduría e inteligencia espiritual
  - en toda sabiduría y entendimiento espiritual
  lexicon: BDAG
  rationale: ἐν expresa esfera o modo acompañante. «En toda sabiduría e inteligencia espiritual» mantiene el orden y el paralelismo, y «inteligencia» comunica bien σύνεσις como capacidad de comprender relaciones.
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - discernimiento
  lexicon: BDAG
  rationale: Es la equivalencia normal para σοφία y conserva tanto la dimensión práctica como la teológica.
- source_word: συνέσει
  english_pob_choice: understanding
  chosen_spanish: inteligencia
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: BDAG
  rationale: σύνεσις alude a comprensión o capacidad de captar relaciones. «Inteligencia» suena natural en español junto a «sabiduría» y evita repetir «entendimiento» de manera menos idiomática.
- source_word: πνευματικῇ
  english_pob_choice: spiritual
  chosen_spanish: espiritual
  alternatives_spanish:
  - del Espíritu
  - dado por el Espíritu
  lexicon: BDAG
  rationale: El adjetivo puede significar lo que es espiritual en carácter o lo que proviene del Espíritu. «Espiritual» conserva esa apertura sin resolverla de antemano.
theological_decisions:
- issue: Alcance de ἐπίγνωσις en la petición de Pablo
  english_pob_reading: knowledge; 'full knowledge' retained only as a lexical alternative
  chosen_spanish_reading: conocimiento; 'pleno conocimiento' solo como alternativa léxica
  alternative_spanish_readings:
  - pleno conocimiento
  - conocimiento pleno
  rationale: El griego puede tener un matiz intensivo, pero el texto no obliga a fijarlo en la traducción principal. Mantener «conocimiento» preserva la ambigüedad productiva y evita sobredeterminar la oración de Pablo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia de πνευματικῇ
  english_pob_reading: '''spiritual'' may mean spiritual in character or given by the Spirit'
  chosen_spanish_reading: espiritual, sin explicitar en el texto principal si significa cualidad espiritual o procedencia del Espíritu
  alternative_spanish_readings:
  - dado por el Espíritu
  - del Espíritu
  rationale: La construcción griega es compacta y permite ambas lecturas. La traducción principal mantiene esa tensión; la nota puede señalar la posibilidad de una referencia al Espíritu Santo sin cerrarla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y conserva el paralelismo del original. Se mantuvo la ambigüedad de ἐπίγνωσις y de πνευματικῇ, tal como lo hace el audit trail inglés, sin resolverlas en exceso ni sustituirlas por fórmulas eclesiásticas tradicionales no requeridas por el griego.
  spanish_consistency_notes:
  - Se usó «ustedes» para el plural de segunda persona, en coherencia con un registro latinoamericano amplio.
  - Se prefirió «orar» y «pedir» para conservar el doble participio griego sin fusionarlo en una sola idea.
  - Se eligió «sabiduría e inteligencia espiritual» para mantener la relación entre σοφία y σύνεσις sin introducir vocabulario innecesariamente técnico.
