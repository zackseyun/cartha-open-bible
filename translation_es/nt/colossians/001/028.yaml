translation:
  language: es
  text: A él lo proclamamos[a], amonestando a toda persona y enseñando a toda persona con toda sabiduría[b], para que presentemos a toda persona madura[c] en Mesías[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo anunciamos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘en toda sabiduría’.
    reason: lexical_alternative
  - marker: c
    text: O ‘perfecta’ o ‘completa’.
    reason: lexical_alternative
  - marker: d
    text: 'Griego: ‘en Cristo’; aquí se traduce ‘en Mesías’ porque Χριστός funciona como título.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃν
  english_pob_choice: Him
  chosen_spanish: A él
  alternatives_spanish:
  - Él
  - A él mismo
  lexicon: BDAG
  rationale: El pronombre relativo acusativo apunta al referente inmediato anterior; en español, el objeto prepuesto con repetición enfática de 'a toda persona' suena natural y conserva la referencia personal sin volver rígida la sintaxis.
- source_word: καταγγέλλομεν
  english_pob_choice: we proclaim
  chosen_spanish: lo proclamamos
  alternatives_spanish:
  - lo anunciamos
  - lo predicamos
  lexicon: BDAG
  rationale: '''Proclamar'' conserva el sentido público y declarativo de καταγγέλλω sin reducirlo a predicación formal בלבד. Se mantiene el objeto implícito en el contexto: Cristo/Mesías.'
- source_word: νουθετοῦντες
  english_pob_choice: admonishing
  chosen_spanish: amonestando
  alternatives_spanish:
  - advirtiendo
  - corrigiendo
  lexicon: BDAG
  rationale: '''Amonestar'' conserva mejor la fuerza correctiva y exhortativa del participio que un término más débil o demasiado interpretativo. En español bíblico es comprensible y fiel.'
- source_word: πάντα ἄνθρωπον
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - cada persona
  - todo ser humano
  lexicon: BDAG
  rationale: Se traduce de forma inclusiva y genérica, manteniendo la repetición enfática del griego. 'Persona' evita una lectura masculina no requerida por ἄνθρωπος en este contexto.
- source_word: διδάσκοντες
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - instruyendo
  lexicon: BDAG
  rationale: '''Enseñar'' es el equivalente natural y preciso para διδάσκω; se coordina bien con ''amonestando'' para preservar la doble labor pastoral.'
- source_word: ἐν πάσῃ σοφίᾳ
  english_pob_choice: with all wisdom
  chosen_spanish: con toda sabiduría
  alternatives_spanish:
  - en toda sabiduría
  lexicon: BDAG
  rationale: La preposición puede expresar manera o esfera. 'Con toda sabiduría' es la formulación más natural en español y refleja la manera sabia de exhortar y enseñar, sin cerrar la ambigüedad del griego.
- source_word: ἵνα παραστήσωμεν
  english_pob_choice: so that we may present
  chosen_spanish: para presentar
  alternatives_spanish:
  - para que presentemos
  - a fin de presentar
  lexicon: BDAG
  rationale: La cláusula final se expresa con 'para' para conservar la finalidad de ἵνα de forma fluida. 'Presentar' mantiene el sentido de llevar delante o presentar para un propósito.
- source_word: τέλειον
  english_pob_choice: mature
  chosen_spanish: maduro
  alternatives_spanish:
  - perfecto
  - completo
  lexicon: BDAG
  rationale: En este contexto paulino el sentido es madurez/completitud espiritual, no impecabilidad absoluta. 'Maduro' comunica bien esa meta formativa y deja abierta la tensión entre madurez y plenitud.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός según la pauta del proyecto cuando funciona como título. 'En Mesías' es fiel al griego y mantiene la referencia mesiánica sin convertirla automáticamente en un nombre propio.
theological_decisions:
- issue: Rendering of Χριστῷ
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: La pauta doctrinal del proyecto favorece 'Mesías' cuando Χριστός funciona como título. Aquí la expresión señala unión y esfera de vida en el Mesías, por lo que 'en Mesías' preserva mejor el contenido titulado y cristológico.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando es título'
- issue: Rendering of τέλειον
  english_pob_reading: mature
  chosen_spanish_reading: maduro
  alternative_spanish_readings:
  - perfecto
  - completo
  rationale: El verso describe la meta del ministerio apostólico en la formación de creyentes. 'Maduro' evita una lectura de perfección sin pecado y conserva la tensión teológica entre crecimiento espiritual y plenitud en el Mesías.
  doctrine_reference: 'DOCTRINE.md: preservar tensión teológica; no resolverla con una traducción moralizante'
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del audit trail, que prefirió una palabra con matiz exhortativo para νουθετοῦντες. Se mantiene el paralelismo repetido de ‘toda persona’ y la finalidad de ἵνα, y se conserva la traducción titular de Χριστῷ como ‘Mesías’ conforme a la pauta doctrinal del proyecto.
  spanish_consistency_notes:
  - 'Se mantuvo una sola opción para πάντα ἄνθρωπον en las tres ocurrencias: ‘toda persona’.'
  - Se evitó ‘Cristo’ en el texto principal para respetar la distinción titulada documentada por el proyecto.
  - ‘Amonestando’ conserva la fuerza de corrección fraterna y no suaviza el participio griego.
  - ‘Maduro’ deja abierta la amplitud semántica de τέλειος sin perder inteligibilidad en español.
  - La puntuación conserva una sola oración fluida con finalidad explícita, acorde con el griego.
