revisions:
- from: A él lo proclamamos[a], amonestando a toda persona y enseñando a toda persona con toda sabiduría[b], para presentar a toda persona maduro[c] en Mesías[d].
  to: A él lo proclamamos[a], amonestando a toda persona y enseñando a toda persona con toda sabiduría[b], para que presentemos a toda persona madura[c] en Mesías[d].
  rationale: Se corrige una discordancia gramatical seria (‘persona … maduro’ → ‘persona madura’) y se ajusta la cláusula final a una formulación española más natural y más cercana al propósito expresado por ἵνα παραστήσωμεν (‘para que presentemos’). También se armoniza la nota léxica de τέλειον con la concordancia de la frase revisada.
