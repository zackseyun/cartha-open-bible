    text: O ‘lo anunciamos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘en toda sabiduría’.
    reason: lexical_alternative
  - marker: c
    text: O ‘perfecta’ o ‘completa’.
    reason: lexical_alternative
  - marker: d
    text: 'Griego: ‘en Cristo’; aquí se traduce ‘en Mesías’ porque Χριστός funciona como título.'
    reason: alternative_reading
  revision_rationale: Se corrige una discordancia gramatical seria (‘persona … maduro’ → ‘persona madura’) y se ajusta la cláusula final a una formulación española más natural y más cercana al propósito expresado por ἵνα παραστήσωμεν (‘para que presentemos’). También se armoniza la nota léxica de τέλειον con la concordancia de la frase revisada.
