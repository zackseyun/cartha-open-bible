review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: proclamación de la persona referida, doble acción de amonestar y enseñar, repetición enfática de πάντα ἄνθρωπον como ‘toda persona’, finalidad con ἵνα, y cierre ‘en Mesías’ conforme a la política del proyecto para Χριστός como título. Las notas léxicas también preservan las alternativas principales del rastro inglés.'
  spanish_quality_summary: 'La redacción es en general clara y natural, pero tiene un problema gramatical importante: ‘a toda persona maduro’ discorda en género; debe concordar con ‘persona’ o reformularse para evitar ambigüedad. Además, ‘para presentar’ debilita levemente el matiz subjuntivo de ἵνα παραστήσωμεν; ‘para que presentemos’ suena más pleno y natural en español bíblico contemporáneo.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: ‘Mesías’ por Χριστός, ‘amonestando’ por νουθετοῦντες, ‘toda persona’ por πάντα ἄνθρωπον, y ‘con toda sabiduría’ por ἐν πάσῃ σοφίᾳ. No hay conflicto con el glosario; la corrección necesaria es gramatical/estilística en ‘maduro’.'
  issues:
  - severity: high
    issue: Discordancia de género en ‘a toda persona maduro’.
    rationale: ‘Persona’ es sustantivo femenino en español; el predicativo/adjetivo debe concordar (‘madura’) o la frase debe reformularse. Tal como está, el texto resulta gramaticalmente deficiente y afecta la legibilidad.
  - severity: medium
    issue: ‘para presentar’ atenúa innecesariamente el valor final/subjuntivo de ἵνα παραστήσωμεν.
    rationale: Aunque no es una mala traducción, ‘para que presentemos’ expresa mejor la finalidad con sujeto explícito y suena más natural en esta cadena verbal española.
  - severity: low
    issue: La nota [c] con alternativas ‘perfecto’ o ‘completo’ debería concordar mejor con la forma principal si esta se formula en femenino.
    rationale: Si el texto dice ‘madura’, la nota puede mantenerse como lema lexical, pero en español se lee con mayor pulcritud si las alternativas se ajustan al contexto sintáctico del versículo.
  revised_spanish_text: A él lo proclamamos[a], amonestando a toda persona y enseñando a toda persona con toda sabiduría[b], para que presentemos a toda persona madura[c] en Mesías[d].
  revised_footnotes:
