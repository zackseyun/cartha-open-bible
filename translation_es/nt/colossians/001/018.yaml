translation:
  language: es
  text: Y él es la cabeza del cuerpo, la iglesia; él es el principio[a], el primogénito de entre los muertos, para que él mismo llegue a ser preeminente en todas las cosas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el origen» o «el gobernante» para «el principio» (ἀρχή).
    reason: lexical_alternative
  - marker: b
    text: O «teniendo el primer lugar en todo» para «preeminente en todas las cosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτός
  english_pob_choice: he / he himself
  chosen_spanish: él / él mismo
  alternatives_spanish:
  - él
  - él mismo
  lexicon: BDAG
  rationale: El pronombre griego es enfático. En español, la repetición de «él» al inicio y «él mismo» en la cláusula final conserva esa fuerza sin volverla artificial.
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - jefe
  - líder
  - fuente
  lexicon: BDAG
  rationale: «Cabeza» mantiene la metáfora corporal de manera directa y evita resolver prematuramente si la imagen enfatiza autoridad, origen o ambas cosas.
- source_word: σώματος
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: En español, «cuerpo» es el equivalente natural de la metáfora de «body» y conserva el paralelismo con «cabeza».
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: «Iglesia» es la equivalencia establecida en este contexto paulino y comunica correctamente al pueblo de Dios como el cuerpo de Cristo.
- source_word: ἀρχή
  english_pob_choice: beginning
  chosen_spanish: principio
  alternatives_spanish:
  - origen
  - gobernante
  - comienzo
  lexicon: BDAG
  rationale: «Principio» conserva la amplitud semántica de ἀρχή y permite mantener abierta la tensión entre inicio, origen y posible matiz de autoridad, como en el audit trail inglés.
- source_word: πρωτότοκος
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero en nacer
  - preeminente
  lexicon: BDAG
  rationale: «Primogénito» es el equivalente lexical más directo en español y preserva el valor bíblico-teológico del término sin sustituirlo por una explicación interpretativa.
- source_word: ἐκ τῶν νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: «De entre los muertos» expresa con naturalidad la idea de resurrección y evita una lectura demasiado literal que sonaría menos idiomática en español.
- source_word: ἵνα γένηται
  english_pob_choice: so that he himself might become
  chosen_spanish: para que él mismo llegue a ser
  alternatives_spanish:
  - para que sea
  - a fin de que llegue a ser
  lexicon: BDAG
  rationale: La construcción de finalidad con ἵνα se vierte de forma natural con «para que», y «llegue a ser» refleja el valor de γένηται mejor que un simple «sea».
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todo sentido
  lexicon: BDAG
  rationale: «En todas las cosas» conserva el alcance total del neutro plural y coincide con la formulación inglesa auditada.
- source_word: πρωτεύων
  english_pob_choice: preeminent
  chosen_spanish: preeminente
  alternatives_spanish:
  - con el primer lugar
  - superior
  lexicon: BDAG
  rationale: «Preeminente» comunica con precisión la idea de ocupar el primer lugar; evita tanto una paráfrasis extensa como una abstracción doctrinal no explicitada por el participio.
theological_decisions:
- issue: Sentido de κεφαλή en la metáfora Cristo-cuerpo
  english_pob_reading: Retain the metaphor as 'head' without specifying 'authority over' or 'source of.'
  chosen_spanish_reading: Mantener la metáfora como «cabeza» sin precisar si significa principalmente autoridad o fuente.
  alternative_spanish_readings:
  - líder del cuerpo
  - fuente del cuerpo
  - autoridad sobre el cuerpo
  rationale: La metáfora es teológicamente rica y debatida. Traducirla simplemente como «cabeza» preserva la imagen inspirada y evita resolver una tensión interpretativa que el griego no cierra explícitamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
- issue: Sentido de ἀρχή en relación con la resurrección
  english_pob_reading: beginning
  chosen_spanish_reading: «principio»
  alternative_spanish_readings:
  - origen
  - gobernante
  - comienzo
  rationale: En el contexto inmediato, «primogénito de entre los muertos» aclara que la palabra apunta al inicio de un orden nuevo ligado a la resurrección. «Principio» conserva esa amplitud sin imponer una sola interpretación.
  doctrine_reference: Primacía del original sobre una tradición fija; conservar la tensión donde subsiste la ambigüedad.
- issue: Fuerza de πρωτότοκος ἐκ τῶν νεκρῶν
  english_pob_reading: Retain 'firstborn from the dead' as resurrection-preeminence language
  chosen_spanish_reading: Retener «primogénito de entre los muertos» como lenguaje de primacía en la resurrección.
  alternative_spanish_readings:
  - el primero en resucitar de entre los muertos
  - el primogénito sobre los muertos
  rationale: La frase señala la primacía de Cristo en la resurrección, no una idea de criatura. Mantener «primogénito» preserva la resonancia bíblica y deja que la cláusula final explicite la preeminencia.
  doctrine_reference: Afirmaciones cristológicas históricas; preservar la forma léxica salvo necesidad contextual.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el veredicto de control cruzado fue de alta concordancia; por eso se mantiene la misma solución léxica y teológica, adaptada cuidadosamente al español.
  spanish_consistency_notes:
  - Se mantiene «cabeza» para κεφαλή, en línea con la decisión inglesa de preservar la metáfora sin interpretarla.
  - Se usa «primogénito de entre los muertos» para conservar la forma bíblica del término y su carga cristológica.
  - «Principio» traduce ἀρχή con una nota que deja abiertas las alternativas reconocidas por el POB en inglés.
  - La nota sobre «preeminente» ofrece la alternativa natural en español «teniendo el primer lugar en todo», equivalente a la nota inglesa.
