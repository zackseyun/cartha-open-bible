    changes_summary: 'Changed ''Messiah'' to ''Christ'' for consistency with ἐν Χριστῷ in this epistolary context; otherwise retained the wording. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'A los hermanos[a] santos y fieles[b] en el Mesías[c] en Colosas: gracia a ustedes y paz de parte de Dios nuestro Padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Hermanos" es la redacción griega; en contexto, probablemente Pablo se dirige a toda la comunidad, incluidas las mujeres.'
    reason: lexical_alternative
  - marker: b
    text: O "creyentes"; el griego πιστοῖς puede describir a quienes creen o a quienes son fieles.
    reason: lexical_alternative
  - marker: c
    text: 'Traducción tradicional: "en Cristo". El título griego Χριστός significa "Mesías".'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῖς ἐν Κολοσσαῖς
  english_pob_choice: to the ... at Colossae
  chosen_spanish: en Colosas
  alternatives_spanish:
  - en Colosas
  - a los de Colosas
  lexicon: BDAG
  rationale: La construcción con ἐν y el nombre de lugar identifica a los destinatarios por ubicación. En español, 'en Colosas' conserva el sentido locativo de manera natural y más concisa que una perífrasis con 'a los'.
- source_word: ἁγίοις
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - santos
  - consagrados
  lexicon: BDAG
  rationale: Aquí ἅγιος describe a los creyentes como apartados para Dios. 'Santos' es el equivalente español directo y natural; 'consagrados' explica el sentido, pero suaviza el carácter léxico del término.
- source_word: πιστοῖς
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - fieles
  - creyentes
  lexicon: BDAG
  rationale: πιστός puede significar 'fiel' o 'creyente'. 'Fieles' funciona bien en el saludo epistolar y mantiene la tensión lexical sin resolverla de más; 'creyentes' sigue siendo una alternativa posible.
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: El plural masculino griego se conserva como 'hermanos'. En español bíblico y eclesial es una forma inteligible y fiel; el contexto comunitario incluye a toda la iglesia sin necesidad de ampliar el texto base.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Cristo
  alternatives_spanish:
  - en Cristo
  - en el Mesías
  lexicon: BDAG
  rationale: Aunque el criterio general del proyecto favorece 'Mesías' para Χριστός como título, el registro epistolar cristiano en español hace de 'en Cristo' una forma asentada y claramente identificable. Aquí se conserva por coherencia de frase fija y porque no altera el referente cristológico.
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  english_pob_choice: grace to you and peace
  chosen_spanish: gracia y paz a ustedes
  alternatives_spanish:
  - gracia y paz a ustedes
  - gracia a ustedes y paz
  lexicon: BDAG
  rationale: La fórmula paulina de saludo se expresa con naturalidad como 'gracia y paz a ustedes'. 'A ustedes' refleja el dativo ὑμῖν sin forzar el orden del español.
- source_word: ἀπὸ θεοῦ πατρὸς ἡμῶν
  english_pob_choice: from God our Father
  chosen_spanish: de parte de Dios nuestro Padre
  alternatives_spanish:
  - de parte de Dios nuestro Padre
  - de Dios nuestro Padre
  lexicon: BDAG
  rationale: '''De parte de'' comunica con claridad el origen del saludo en español moderno. ''Dios nuestro Padre'' conserva la construcción appositiva del griego sin añadir elementos ajenos al texto.'
theological_decisions:
- issue: Título Χριστός en una fórmula cristiana establecida
  english_pob_reading: Messiah
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: Aunque el proyecto normalmente traduce Χριστός como 'Mesías' cuando funciona como título, en esta salutación la expresión fija 'en Cristo' está firmemente asentada en el uso bíblico español y eclesial. La elección mantiene inteligibilidad y continuidad litúrgica sin afectar el contenido doctrinal.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve established formulae when source-shaped Spanish idiom is already canonical'
- issue: Sentido de πιστοῖς
  english_pob_reading: faithful / believing
  chosen_spanish_reading: fieles
  alternative_spanish_readings:
  - creyentes
  rationale: El adjetivo admite tanto la idea de fe como la de fidelidad. 'Fieles' preserva esa amplitud y evita cerrar el sentido a una sola posibilidad.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension rather than over-resolving it'
- issue: Alcance comunitario de ἀδελφοῖς
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - comunidad
  rationale: Se mantiene la forma masculina plural del griego, que en Pablo suele abarcar a toda la congregación. No se amplía el texto principal para no borrar la forma source-shaped; la pluralidad comunitaria queda implícita en el contexto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El expediente inglés pasó por una corrección regresiva entre 'Messiah' y 'Christ'; la forma restaurada fue 'Messiah' según la política del proyecto. En español, sin embargo, se ha optado por 'Cristo' en la fórmula fija 'en Cristo' por idiomatismo y reconocimiento eclesial, dejando constancia de la tensión léxica en las decisiones teológicas.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o sustituciones de máscara divina, porque aquí no aparece κύριος sino θεοῦ πατρός.
  - '''Dios nuestro Padre'' sigue el valor apposicional del genitivo sin añadir ''y''.'
  - La nota de πιστοῖς se ancla en el texto con [a] para cumplir la trazabilidad de variantes.
  - Se mantuvo un registro natural de saludo epistolar en español, evitando calcos como 'gracia a vosotros'.
