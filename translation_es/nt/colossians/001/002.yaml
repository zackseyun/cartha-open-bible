base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/002.yaml
  text: 'To the holy and faithful brothers in Messiah at Colossae: grace to you and peace from God our Father[a][b][c].'
  footnotes:
  - marker: a
    text: Or 'believing'; the Greek πιστοῖς can describe those who believe or those who are faithful.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' is the Greek wording; in context Paul likely addresses the whole community, including women.'
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''in Christ.'' The Greek title Χριστός means ''Messiah.'''
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
