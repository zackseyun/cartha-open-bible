translation:
  language: es
  text: Él nos rescató de la autoridad de tinieblas y nos trasladó al reino del Hijo de su amor[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su amado Hijo» o «el Hijo a quien ama».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - liberó
  - libró
  lexicon: BDAG
  rationale: ῥύομαι expresa sacar o salvar de un peligro o poder hostil. «Rescató» comunica una intervención decisiva y natural en español, con el mismo tono de salvación activa que «rescued» en la POB inglesa.
- source_word: ἐξουσίας
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - dominio
  - poder
  - jurisdicción
  lexicon: BDAG
  rationale: ἐξουσία denota autoridad o poder gobernante. «Autoridad» es el equivalente más directo y conserva la idea de una esfera de gobierno, sin añadir interpretación innecesaria.
- source_word: σκότους
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  lexicon: BDAG
  rationale: Aunque σκότος puede traducirse literalmente como «oscuridad», en español bíblico «tinieblas» conserva mejor el matiz moral y espiritual implícito en el contexto paulino, y mantiene una resonancia natural y reverente.
- source_word: μετέστησεν
  english_pob_choice: transferred
  chosen_spanish: trasladó
  alternatives_spanish:
  - transfirió
  - pasó
  - movió
  lexicon: BDAG
  rationale: μεθίστημι describe mover de una esfera a otra. «Trasladó» expresa bien el paso de un reino a otro y suena más natural en español que un calco como «transfirió».
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  lexicon: BDAG
  rationale: βασιλεία puede significar reino o reinado. Aquí el marco de traslado a un ámbito gobernado favorece «reino», que comunica con claridad la imagen del texto.
- source_word: υἱοῦ
  english_pob_choice: Son
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo
  lexicon: BDAG
  rationale: υἱός significa literalmente «hijo». En español, capitalizar «Hijo» preserva el referente cristológico y evita perder la fuerza nominal del texto.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor
  lexicon: BDAG
  rationale: ἀγάπη se traduce de manera consistente como «amor». En este genitivo, el español puede conservar la relación posesiva con «de su amor» sin forzar una paráfrasis.
- source_word: τοῦ υἱοῦ τῆς ἀγάπης αὐτοῦ
  english_pob_choice: the Son of his love
  chosen_spanish: el Hijo de su amor
  alternatives_spanish:
  - su amado Hijo
  - el Hijo a quien ama
  lexicon: BDAG
  rationale: La POB inglesa preserva la estructura genitiva del griego. En español, «el Hijo de su amor» mantiene esa forma fuente-dependiente y sigue siendo entendible; las alternativas comunican el sentido de manera más idiomática, pero suavizan la textura del griego.
theological_decisions:
- issue: La relación entre οἱ/ὁ Cristo y la expresión «el Hijo de su amor»
  english_pob_reading: the Son of his love
  chosen_spanish_reading: el Hijo de su amor
  alternative_spanish_readings:
  - su amado Hijo
  - el Hijo a quien ama
  rationale: Se preserva la construcción genitiva para no borrar la tensión literaria del texto. La frase apunta al amor singular del Padre por el Hijo; por eso el texto principal sigue de cerca la forma griega, y las alternativas se reservan como interpretaciones idiomáticas.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el acuerdo alto del audit trail inglés, manteniendo la estructura retórica del griego y la decisión de conservar la construcción genitiva en la frase final. No se registraron revisiones aplicadas en la fuente inglesa reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando corresponde al Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «Hijo» con mayúscula por su referencia cristológica singular.
  - Se eligió «tinieblas» sobre «oscuridad» para mantener el registro bíblico y la carga moral implícita del contraste con el reino.
  - La puntuación reproduce la cadencia de una cláusula relativa coordinada, con coma final coherente con el griego y con el cierre del verso en la edición fuente.
