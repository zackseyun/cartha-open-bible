review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la auditoría inglesa: ἐρρύσατο = «rescató», ἐξουσίας = «autoridad», μετέστησεν = «trasladó», βασιλείαν = «reino», y conserva correctamente la construcción marcada «el Hijo de su amor» con nota alternativa, tal como hace la POB inglesa.'
  spanish_quality_summary: El español es claro y digno, pero «el cual» suena algo pesado aquí. Además, la auditoría inglesa usa una relativa simple («who»), y en español bíblico-natural esta cláusula funciona mejor como «Él nos rescató...» o «quien nos rescató...». También conviene evitar el artículo en «de tinieblas» si se busca una formulación más natural y más cercana al giro bíblico establecido. El resto del verso es plenamente legible.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, esclavo, etc. «Tinieblas» es aceptable para σκότους en este contexto. La preservación de «el Hijo de su amor» está alineada con la decisión léxica y teológica documentada en la POB inglesa.
  issues:
  - severity: medium
    issue: Inicio con «el cual»
    rationale: Aunque no es incorrecto, «el cual» resulta más rígido y menos natural en español de lectura continua. Dado que el verso suele presentarse de forma independiente en registros de traducción, «Él nos rescató...» mejora la fluidez sin perder el valor referencial del relativo griego ὃς.
  - severity: low
    issue: «de la autoridad de las tinieblas» puede sonar algo pesado
    rationale: La frase es fiel, pero «de la autoridad de tinieblas» suena más natural y mantiene bien el genitivo griego τοῦ σκότους. No es un error grave; es una mejora de estilo y concisión.
  revised_spanish_text: Él nos rescató de la autoridad de tinieblas y nos trasladó al reino del Hijo de su amor[a],
  revised_footnotes:
