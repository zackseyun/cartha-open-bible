revisions:
- from: el cual nos rescató de la autoridad de las tinieblas y nos trasladó al reino del Hijo de su amor[a],
  to: Él nos rescató de la autoridad de tinieblas y nos trasladó al reino del Hijo de su amor[a],
  rationale: Se mantiene toda la estructura semántica del original y de la POB inglesa, pero se mejora la naturalidad del español reemplazando «el cual» por «Él» y aligerando «de las tinieblas» a «de tinieblas». Se conserva deliberadamente «el Hijo de su amor» en el texto principal, con las alternativas idiomáticas en nota, porque esa es la decisión fuente-dependiente documentada.
