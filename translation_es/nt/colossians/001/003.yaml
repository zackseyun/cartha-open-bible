translation:
  language: es
  text: Siempre damos gracias a Dios, el Padre de nuestro Señor Jesús Mesías[a], cuando oramos por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «Jesucristo».
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐχαριστοῦμεν
  english_pob_choice: We always give thanks
  chosen_spanish: Siempre damos gracias
  alternatives_spanish:
  - Damos gracias siempre
  - Siempre agradecemos
  lexicon: BDAG
  rationale: εὐχαριστέω expresa la acción de dar gracias; en español, «dar gracias» conserva mejor el registro epistolar y litúrgico que «agradecer» como verbo directo. Se colocó «siempre» al inicio para reflejar πάντοτε y mantener el énfasis continuo.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: BDAG
  rationale: El dativo con εὐχαριστοῦμεν se naturaliza en español con «a Dios». «Dios» mantiene la referencia personal y evita un giro innecesariamente pesado.
- source_word: πατρὶ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Padre
  - el Padre de
  lexicon: BDAG
  rationale: 'πατήρ en aposición a θεῷ se traduce como «el Padre». En español la coma ayuda a conservar la aposición: «a Dios, el Padre».'
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Dueño
  - de nuestro Señor y Maestro
  lexicon: BDAG
  rationale: κύριος se traduce por el título reverente «Señor», conforme al uso bíblico y al valor doctrinal del término en este contexto.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» para Χριστός porque en este contexto funciona como título y el proyecto POB documenta esa decisión. «Jesús Cristo» sería menos idiomático en español; «Jesucristo» es más fijo y menos transparente para el valor titular.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - constantemente
  lexicon: BDAG
  rationale: πάντοτε se vierte de manera directa como «siempre», que es natural y exacto en español.
- source_word: περὶ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - acerca de ustedes
  - en favor de ustedes
  lexicon: BDAG
  rationale: Con lenguaje de oración, περί + genitivo puede expresar el referente intercesor. «Por ustedes» comunica mejor la idea de intercesión que «acerca de ustedes».
- source_word: προσευχόμενοι
  english_pob_choice: when we pray
  chosen_spanish: orando
  alternatives_spanish:
  - cuando oramos
  - mientras oramos
  lexicon: BDAG
  rationale: El participio presente se vierte como complemento circunstancial en español. «Orando» mantiene la relación con la acción principal sin forzar una subordinación temporal que el griego no exige explícitamente.
theological_decisions:
- issue: Renderizar Χριστός como título y no como nombre fijo
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: La política del proyecto favorece «Mesías» cuando Χριστός conserva fuerza titulár. Esto preserva el trasfondo mesiánico sin alterar la cristología ni la reverencia del pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Mesías where title; Cristo where name-like)'
- issue: Relación sintáctica entre θεῷ y πατρί
  english_pob_reading: God, the Father
  chosen_spanish_reading: Dios, el Padre
  alternative_spanish_readings:
  - el Dios y Padre
  - Dios el Padre
  rationale: El griego presenta dos dativos en aposición. La coma en español conserva la lectura appositiva y evita sugerir una coordinación que el texto no requiere.
  doctrine_reference: BDAG / sintaxis de aposición en Col 1:3
translation_notes:
  revision_awareness: 'La decisión inglesa más reciente volvió a «Messiah» y mantuvo el sentido participial de προσευχόμενοι como circunstancia de la acción principal. El borrador español sigue esa línea: conserva «Mesías» para Χριστός y usa un gerundio simple («orando») para reflejar la participación circunstancial sin sobredeterminar el tiempo.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος, conforme a los valores predeterminados del proyecto.
  - Se conserva «Mesías» como traducción titular de Χριστός, con nota alternativa para la forma tradicional «Jesucristo».
  - «Siempre» refleja πάντοτε sin añadir matices no presentes en el griego.
  - La estructura con comas busca reproducir la aposición de «Dios» y «el Padre» sin volverla artificiosamente coordinada.
