    issue: «operación» para ἐνέργειαν es poco natural en español bíblico
    rationale: Aunque es semánticamente posible, en español contemporáneo «operación» suele sonar técnica, médica o mecánica. El contexto pide una actividad eficaz divina; «obra» comunica mejor ese sentido y empata con el participio «que obra».},{
