translation:
  language: es
  text: Para esto también trabajo[a], esforzándome según su obra[c][b], que obra en mí en poder[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a este fin» o «para lo cual».
    reason: lexical_alternative
  - marker: b
    text: O «luchando» en lugar de «esforzándome».
    reason: lexical_alternative
  - marker: c
    text: El griego dice «su obra», sin nombrar explícitamente si el antecedente es Dios o el Mesías.
    reason: alternative_reading
  - marker: d
    text: O «que obra en mí poderosamente» o «que está obrando en mí con poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς ὃ
  english_pob_choice: For this
  chosen_spanish: Para esto
  alternatives_spanish:
  - para lo cual
  - con este fin
  lexicon: BDAG
  rationale: La frase retoma el propósito o alcance de lo anterior. «Para esto» mantiene la referencia retrospectiva de manera natural en español sin sobreespecificar más de lo que dice el griego.
- source_word: κοπιῶ
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - me fatigo
  - me esfuerzo
  lexicon: BDAG
  rationale: κοπιάω comunica trabajo arduo hasta el cansancio. «Trabajo» conserva la idea de labor sostenida; el participio que sigue ya intensifica la entrega con «esforzándome».},{
theological_decisions:
- issue: Referente de αὐτοῦ ('su')
  english_pob_reading: Retain the pronoun 'his' without specifying whether the antecedent is God or Messiah.
  chosen_spanish_reading: Mantener «su» sin identificar explícitamente si se refiere a Dios o al Mesías.
  alternative_spanish_readings:
  - la operación de Dios
  - la operación del Mesías
  rationale: El texto griego no nombra de forma explícita el antecedente. Conservar «su» preserva la tensión interpretativa y evita resolver en la traducción una identificación que el verso no hace por sí mismo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se prefirió una formulación que refleje de cerca el participio ἐνεργουμένην y la frase ἐν δυνάμει, manteniendo el referente pronominal sin resolver.'
  spanish_consistency_notes:
  - Se mantuvo «operación» para ἐνέργεια, siguiendo la preferencia de conservar el sustantivo verbal y evitar «energía», que en español moderno sugiere connotaciones científicas no presentes en el contexto.
  - Se usó «obra» / «trabaja» para ἐνεργουμένην con el fin de reflejar el paralelo verbal con ἐνέργεια sin perder naturalidad en español.
  - Se preservó la distinción entre el esfuerzo humano («trabajo», «esforzándome») y la acción divina («su operación», «con poder»).
