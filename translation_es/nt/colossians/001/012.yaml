translation:
  language: es
  text: dando gracias al Padre[a], que los ha hecho aptos para tener parte en la herencia de los santos en la luz[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «nos» en lugar de «los».
    reason: textual_variant
  - marker: b
    text: 'O: «la porción asignada a los santos en la luz»; el griego evoca la imagen de una herencia repartida por asignación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστοῦντες
  english_pob_choice: giving thanks
  chosen_spanish: dando gracias
  alternatives_spanish:
  - agradeciendo
  - dando acción de gracias
  lexicon: BDAG
  rationale: El participio presente plural expresa una acción continua o acompañante; «dando gracias» comunica bien ese valor aspectual en español y es natural en el registro bíblico contemporáneo.
- source_word: τῷ πατρὶ
  english_pob_choice: to the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al Padre Dios
  - a Dios Padre
  lexicon: BDAG
  rationale: El griego dice literalmente «al Padre». Se mantiene ese título relacional sin añadir «Dios», que no está expresado de forma explícita en esta cláusula.
- source_word: ἱκανώσαντι
  english_pob_choice: who has qualified
  chosen_spanish: que les ha hecho aptos
  alternatives_spanish:
  - que los ha capacitado
  - que los ha calificado
  lexicon: BDAG
  rationale: ἱκανόω implica hacer suficiente, apto o idóneo. «Ha hecho aptos» conserva esa fuerza de preparación efectiva para participar de la herencia. «Calificado» suena más administrativo; «capacitado» puede sugerir capacidad general más que idoneidad para la herencia.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - los
  - os
  lexicon: NA28/SBLGNT textual tradition
  rationale: El texto base lee ὑμᾶς, segunda persona plural. En español se vierte naturalmente con clítico de objeto indirecto/benefactivo en la construcción «ha hecho aptos para». La variante «nos» queda implícitamente señalada en la nota textual del inglés; aquí se conserva el destinatario plural del texto principal.
- source_word: εἰς τὴν μερίδα
  english_pob_choice: for a share
  chosen_spanish: para una parte
  alternatives_spanish:
  - para una porción
  - para una participación
  lexicon: BDAG
  rationale: μερίς significa parte, porción o participación. «Una parte» reproduce con sencillez el valor distributivo de εἰς τὴν μερίδα y evita un giro demasiado abstracto.
- source_word: τοῦ κλήρου
  english_pob_choice: of the inheritance
  chosen_spanish: de la herencia
  alternatives_spanish:
  - del lote
  - de la porción asignada
  lexicon: BDAG
  rationale: κλῆρος puede denotar suerte, lote o herencia. En este contexto, con santos y luz, «herencia» comunica el trasfondo bíblico de la porción prometida sin perder el matiz de asignación.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los consagrados
  - del pueblo santo
  lexicon: BDAG
  rationale: «Santos» es la correspondencia directa y ya arraigada para ἅγιοι en el uso paulino. Conserva el vínculo léxico con la tradición bíblica y evita una paráfrasis más larga.
- source_word: ἐν τῷ φωτί
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - en la claridad
  - en la luz de Dios
  lexicon: BDAG
  rationale: La preposición indica esfera o ámbito. «En la luz» mantiene la metáfora sin explicarla de más. No se añade «de Dios» porque el griego no lo expresa explícitamente aquí.
theological_decisions:
- issue: Variante textual del pronombre objeto
  english_pob_reading: you
  chosen_spanish_reading: les
  alternative_spanish_readings:
  - nos
  rationale: La base griega proporcionada lee ὑμᾶς («ustedes/les» en el contexto). El testimonio alternativo ἡμᾶς («nosotros») se conserva como variante textual en la nota, sin desplazar la lectura principal.
  doctrine_reference: Principio de transparencia textual y preservación de variantes
translation_notes:
  revision_awareness: Se siguió la revisión del inglés que prefirió «a share in the inheritance» frente a una formulación demasiado pesada. En español, esto se refleja con «una parte de la herencia», que conserva tanto la partición como la imagen hereditaria sin sobrecargar la sintaxis. También se mantuvo el valor de participio presente con una construcción natural en español.
  spanish_consistency_notes:
  - Se emplea «Padre» con mayúscula como título divino, de forma consistente con el registro bíblico.
  - Se evita sustituir «santos» por perífrasis más explicativas, para conservar el enlace léxico con ἅγιοι.
  - «En la luz» se mantiene literal y metafórico, sin convertirlo en una explicación doctrinal.
  - La puntuación refleja una sola cláusula participial continua, acorde con el griego.
