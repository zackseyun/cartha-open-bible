review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: participio inicial («dando gracias»), destinatario («al Padre»), participio aoristo relativo («que... ha hecho aptos»), y la meta de participación en la herencia de los santos en la luz. Sin embargo, la nota textual a dice «nosotros» en lugar de «ustedes», cuando la variante inglesa documentada es «us» frente a «you»; en español debe decir «nos» frente a «ustedes» o reformularse con el pronombre del texto principal. Además, «una parte de la herencia» es comprensible, pero «una parte en la herencia» o «una porción de la herencia» representa mejor la relación μερίδα ... κλήρου y la revisión inglesa auditada («a share in the inheritance»).'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos mejoras importantes: 1) la nota textual usa «nosotros», que no corresponde sintácticamente al lugar del pronombre objeto y suena imprecisa; 2) «ha hecho aptos para una parte de la herencia» suena algo rígido. «Los ha hecho aptos para tener parte en la herencia» es más natural y mantiene el sentido. También conviene quitar las comillas y la comilla inicial sobrante en la nota b para ajustarse a un formato limpio de notas.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Padre», «herencia», «santos» y «luz» están bien. La elección «ha hecho aptos» es defendible para ἱκανώσαντι. La principal corrección es de precisión gramatical y de fidelidad a la variante textual documentada.
  issues:
  - severity: medium
    issue: La nota textual a dice «nosotros» en lugar de «nos».
    rationale: La variante documentada es el pronombre objeto «us», no el sujeto «we». En español, «nosotros» altera la función sintáctica y no corresponde al lugar donde aparece el pronombre en el texto.
  - severity: medium
    issue: «una parte de la herencia» no refleja tan bien como podría la relación «a share in the inheritance».
    rationale: El inglés auditado fue revisado a «a share in the inheritance». En español, «tener parte en la herencia» o «una porción de la herencia» suena más natural y preserva mejor la idea de participación en una herencia asignada.
  - severity: low
    issue: La nota b tiene formato poco limpio.
    rationale: Empieza con una comilla simple innecesaria antes de «O:» y puede redactarse con puntuación más natural en español.
