translation:
  language: es
  text: Pablo[a], apóstol de Mesías Jesús por la voluntad de Dios, y Timoteo, nuestro hermano[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de Cristo Jesús». Aquí Χριστοῦ se vierte «Mesías» para conservar su fuerza titulativa.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «el hermano»; se vierte «nuestro hermano» para expresar de forma natural en español la designación fraterna cristiana en este saludo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: nombre propio
  rationale: Nombre propio estándar en español para Παῦλος; conserva la identificación personal sin añadir sentido.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - delegado
  lexicon: BDAG
  rationale: En el saludo paulino funciona como título ministerial, no como simple 'mensajero'; 'apóstol' preserva esa fuerza eclesial.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Jesucristo
  lexicon: BDAG
  rationale: Se conserva 'Mesías' porque el inglés POB documenta la decisión de traducir Χριστός como título y no como forma litúrgica fija. El orden 'Mesías Jesús' sigue el griego y mantiene el valor titular.
- source_word: διὰ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - mediante
  - a través de
  lexicon: BDAG
  rationale: Con genitivo expresa agencia o medio; 'por la voluntad de Dios' es natural en español y refleja la causalidad/mediación divina de su apostolado.
- source_word: θελήματος
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - propósito
  - deseo
  lexicon: BDAG
  rationale: Aquí θέλημα denota la determinación volitiva de Dios. 'Voluntad' es la equivalencia más directa y transparente.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Genitivo dependiente de 'voluntad'; se mantiene el referente divino sin ajustes interpretativos.
- source_word: Τιμόθεος
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timotheo
  lexicon: nombre propio
  rationale: Nombre propio estándar en español para Τιμόθεος.
- source_word: ὁ ἀδελφός
  english_pob_choice: our brother
  chosen_spanish: el hermano
  alternatives_spanish:
  - nuestro hermano
  - el hermano de la fe
  lexicon: BDAG
  rationale: El griego dice literalmente 'el hermano'. Como el inglés POB observó la forma literal y solo aclaró el sentido por naturalidad inglesa, en español se conserva la referencia directa sin añadir posesivo no explicitado por el griego.
theological_decisions:
- issue: Título Χριστός en un saludo epistolar
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se sigue la política doctrinal reflejada en el audit trail: Χριστός se traduce como título cuando su sentido titular sigue vivo. En este versículo, ''Mesías'' preserva mejor el valor semántico y evita la forma nombre-propio automática.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos; Χριστός como Mesías cuando el contexto lo permite'
- issue: Relación fraterna de ὁ ἀδελφός
  english_pob_reading: our brother
  chosen_spanish_reading: el hermano
  alternative_spanish_readings:
  - nuestro hermano
  rationale: El contexto epistolar permite entenderlo como referencia fraterna cristiana, pero el griego no expresa posesivo. En español se evita introducir 'nuestro' sin apoyo explícito, manteniendo la literalidad con naturalidad mínima.
  doctrine_reference: 'DOCTRINE.md: lectura clara y sobria; no añadir matices no presentes en el texto base'
translation_notes:
  revision_awareness: El inglés audit trail muestra una oscilación editorial entre 'Messiah Jesus' y 'Christ Jesus', con restauración final de 'Messiah Jesus' por política doctrinal. La versión española sigue esa decisión final y la explicita con una nota alternativa donde corresponde. Para ὁ ἀδελφός, el inglés añadió 'our' por naturalidad; en español se opta por no expandir el posesivo, manteniendo la forma más cercana al griego.
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός, conforme al criterio del proyecto, evitando 'Cristo' como forma de nombre propio salvo necesidad textual.
  - Se mantiene 'Dios' para θεοῦ y 'voluntad' para θέλημα en un giro natural y fiel.
  - El saludo se conserva como una sola línea epistolar, con puntuación española y comas de vocativo/aposición.
  - No se introduce mayúscula reverencial ni sustitución por 'SEÑOR'.
