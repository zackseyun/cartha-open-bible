  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, esclavo, etc. Las decisiones claves («reconciliar», «todas las cosas», «sangre», «cruz», «los cielos») están alineadas con el POB inglés y con la evidencia fuente. Debe añadirse explícitamente la nota sobre el plural «cielos».
