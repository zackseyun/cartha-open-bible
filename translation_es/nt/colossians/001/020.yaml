translation:
  language: es
  text: y por medio de él reconciliar[a] todas las cosas[b] consigo mismo, habiendo hecho la paz por medio de la sangre de su cruz —por medio de él— ya sean las cosas en la tierra o las cosas en los cielos[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por él» para ambas ocurrencias de «por medio de él».
    reason: lexical_alternative
  - marker: b
    text: «Todas las cosas» se mantiene amplio, en paralelo con «ya sean las cosas en la tierra o las cosas en los cielos»; el versículo no especifica aquí cómo se relaciona esta reconciliación con la salvación final.
    reason: alternative_reading
  - marker: c
    text: En griego, «en los cielos» está en plural.
    reason: lexical_alternative
  - marker: d
    text: Algunos manuscritos omiten la segunda ocurrencia de «por medio de él».
    reason: textual_variant
lexical_decisions:
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. En español, «por medio de él» conserva con claridad la función mediadora y suena más natural y digno que un calco rígido.
- source_word: ἀποκαταλλάξαι
  english_pob_choice: to reconcile
  chosen_spanish: reconciliar
  alternatives_spanish:
  - reconciliar completamente
  - restaurar la relación
  lexicon: BDAG
  rationale: El infinitivo expresa reconciliación/restablecimiento relacional. «Reconciliar» comunica el sentido básico sin sobreinterpretar el prefijo intensivo ἀπο-.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  lexicon: BDAG
  rationale: La expresión neutra plural abarca ampliamente la creación. «Todas las cosas» preserva esa amplitud y evita estrechar el alcance a personas solamente.
- source_word: εἰς αὐτόν
  english_pob_choice: to himself
  chosen_spanish: consigo mismo
  alternatives_spanish:
  - a sí mismo
  - para sí
  lexicon: BDAG
  rationale: El contexto continúa la referencia a Dios del versículo anterior; en español, «consigo mismo» expresa bien el valor reflexivo sin perder naturalidad.
- source_word: εἰρηνοποιήσας
  english_pob_choice: having made peace
  chosen_spanish: habiendo hecho la paz
  alternatives_spanish:
  - haciendo la paz
  - habiendo establecido la paz
  lexicon: BDAG
  rationale: El participio aoristo antecedente se vierte de forma natural con «habiendo hecho». «La paz» refleja el objeto concreto del verbo y mantiene el paralelismo con el original.
- source_word: διὰ τοῦ αἵματος
  english_pob_choice: through the blood
  chosen_spanish: por medio de la sangre
  alternatives_spanish:
  - por la sangre
  - mediante la sangre
  lexicon: BDAG
  rationale: Se mantiene «sangre» literalmente por su peso sacrificial y atonal. «Por medio de» expresa el instrumento con mayor naturalidad en español.
- source_word: τοῦ σταυροῦ αὐτοῦ
  english_pob_choice: of his cross
  chosen_spanish: de su cruz
  alternatives_spanish:
  - de la cruz de él
  - de la cruz suya
  lexicon: BDAG
  rationale: El genitivo posesivo es explícito. «Su cruz» conserva la referencia personal a la cruz de Jesús/Mesías sin convertirla en símbolo abstracto.
- source_word: ⸂[δι’ αὐτοῦ]⸃
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: NA28/SBLGNT textual tradition
  rationale: La repetición es retórica y probablemente original; se conserva con la misma expresión para mantener el énfasis resumptivo del griego.
- source_word: εἴτε ... εἴτε
  english_pob_choice: whether ... or
  chosen_spanish: ya sean ... o
  alternatives_spanish:
  - ya sea ... o
  - sea ... o
  lexicon: BDAG
  rationale: La correlación distributiva se adapta al español con «ya sean ... o», que preserva la enumeración exhaustiva y suena natural en un registro bíblico sobrio.
- source_word: τὰ ἐπὶ τῆς γῆς
  english_pob_choice: the things on the earth
  chosen_spanish: las cosas en la tierra
  alternatives_spanish:
  - las cosas sobre la tierra
  - lo que está en la tierra
  lexicon: BDAG
  rationale: «En la tierra» respeta el contraste cósmico con «en los cielos» y mantiene el paralelismo de la frase.
- source_word: τὰ ἐν τοῖς οὐρανοῖς
  english_pob_choice: the things in the heavens
  chosen_spanish: las cosas en los cielos
  alternatives_spanish:
  - las cosas en el cielo
  - las cosas celestiales
  lexicon: BDAG
  rationale: Se conserva el plural οὐρανοῖς con «los cielos», evitando nivelarlo a singular. Esto reproduce mejor la forma griega y el contraste cósmico.
theological_decisions:
- issue: Alcance de τὰ πάντα
  english_pob_reading: Rendered comprehensively as 'all things' without narrowing the referent or importing a doctrine of universal salvation.
  chosen_spanish_reading: «todas las cosas» se deja amplio, sin restringirlo a personas ni resolver si implica salvación universal.
  alternative_spanish_readings:
  - «todos»
  - «todo el universo reconciliado salvadoramente»
  rationale: El texto habla de reconciliación cósmica en el marco de la creación. La traducción debe preservar esa amplitud y, a la vez, no decidir una cuestión teológica que el versículo no explicita.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Referente de εἰς αὐτόν
  english_pob_reading: Understood as God reconciling all things to himself through the Son.
  chosen_spanish_reading: «consigo mismo» hace visible el sentido reflexivo bajo la referencia a Dios del contexto inmediato.
  alternative_spanish_readings:
  - «a él»
  - «para él»
  rationale: La sintaxis continúa el flujo del versículo anterior; el español reflexivo ayuda a evitar ambigüedad sin introducir un sujeto distinto al que exige el contexto.
  doctrine_reference: Affirmations; Translation philosophy optimal equivalence
- issue: Sangre y cruz en διὰ τοῦ αἵματος τοῦ σταυροῦ αὐτοῦ
  english_pob_reading: Retained as concrete sacrificial and crucifixion language.
  chosen_spanish_reading: Se mantienen «sangre» y «cruz» de forma concreta y sacrificial.
  alternative_spanish_readings:
  - «su muerte en la cruz»
  - «la muerte de su cruz»
  rationale: El griego dice literalmente «sangre» y «cruz». Conservar ambos términos preserva el peso sacrificial e histórico del pasaje sin suavizarlo con una paráfrasis.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota con su marcador correspondiente en el texto español y manteniendo una sola serie de notas claramente visibles junto a los términos relevantes.
  spanish_consistency_notes:
  - Se usa «por medio de él» para ambas ocurrencias de δι’ αὐτοῦ, manteniendo uniformidad y el matiz instrumental/mediador.
  - Se conserva «los cielos» en plural para reflejar οὐρανοῖς.
  - «Consigo mismo» refleja el sentido reflexivo de εἰς αὐτόν en el contexto.
  - No se suaviza «sangre» ni «cruz» con paráfrasis devocionales.
  - La frase correlative «ya sean ... o ...» reproduce el exhaustivo εἴτε ... εἴτε.
