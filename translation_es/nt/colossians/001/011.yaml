translation:
  language: es
  text: siendo fortalecidos con todo poder[a], conforme a la fuerza de su gloria, para toda perseverancia y paciencia con gozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según su glorioso poder». El griego dice más literalmente «conforme a la fuerza de su gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πάσῃ δυνάμει
  english_pob_choice: with all power
  chosen_spanish: con todo poder
  alternatives_spanish:
  - en todo poder
  - por todo poder
  lexicon: BDAG
  rationale: La preposición ἐν con dativo aquí tiene valor instrumental o de esfera. En español, «con todo poder» comunica de manera natural que el fortalecimiento ocurre en compañía de una plenitud de poder, sin perder la idea de abundancia total de δύναμις.
- source_word: δυναμούμενοι
  english_pob_choice: being strengthened
  chosen_spanish: siendo fortalecidos
  alternatives_spanish:
  - siendo empoderados
  - siendo hechos fuertes
  lexicon: BDAG
  rationale: 'El participio pasivo presente pide una acción continua y recibida: Dios es el agente implícito que fortalece. «Siendo fortalecidos» conserva el pasivo y suena idiomático en español bíblico contemporáneo.'
- source_word: κατὰ τὸ κράτος τῆς δόξης αὐτοῦ
  english_pob_choice: according to the might of his glory
  chosen_spanish: conforme a la fuerza de su gloria
  alternatives_spanish:
  - según el poder de su gloria
  - conforme al vigor de su gloria
  lexicon: BDAG
  rationale: κατά con acusativo expresa medida o norma. κράτος denota fuerza eficaz, vigor manifiesto o poder predominante; «fuerza» evita repetir «poder» después de δύναμις y conserva la acumulación léxica del griego. «De su gloria» mantiene la relación genitiva sin convertirla en paráfrasis adjetival.
- source_word: εἰς πᾶσαν ὑπομονὴν
  english_pob_choice: for all endurance
  chosen_spanish: para toda perseverancia
  alternatives_spanish:
  - para todo aguante
  - con miras a toda perseverancia
  lexicon: BDAG
  rationale: εἰς marca propósito o resultado. En español, «para toda perseverancia» expresa bien la finalidad y la totalidad de πᾶσαν. Se eligió «perseverancia» por su claridad bíblica y porque cubre la idea de resistencia sostenida bajo prueba.
- source_word: μακροθυμίαν
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - longanimidad paciente
  lexicon: BDAG
  rationale: μακροθυμία suele implicar paciencia o longanimidad, a menudo hacia personas. «Paciencia» es la opción más clara para lectores modernos en español, y permite mantener la distinción con ὑπομονή mediante el binomio «perseverancia y paciencia».
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - gozosamente
  lexicon: BDAG
  rationale: μετά con genitivo se traduce de forma directa como «con». «Gozo» preserva el sustantivo χαρά con un registro bíblico natural en español, sin diluirlo en una adverbialización.
theological_decisions:
- issue: Relación entre el poder de Dios y la gloria de Dios
  english_pob_reading: The text speaks of believers being strengthened in a manner corresponding to the might associated with God's glory, without expanding this into a doctrinal paraphrase.
  chosen_spanish_reading: El texto presenta el fortalecimiento de los creyentes conforme a la fuerza asociada con la gloria de Dios, sin ampliar el enunciado a una paráfrasis doctrinal.
  alternative_spanish_readings:
  - según su glorioso poder
  - de acuerdo con el poder glorioso de Dios
  rationale: 'Se mantiene la densidad del griego: no se sustituye la construcción nominal por una explicación teológica más amplia. «Fuerza de su gloria» conserva la tensión entre δόξα y κράτος, y evita absorber el sentido en una sola expresión adjetival.'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el control auditado en inglés; no se registran revisiones textuales o de sentido adicionales. Se conserva la estructura del griego y la distinción entre δύναμις y κράτος.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el verso a través del posesivo «su»; no se introduce «SEÑOR» ni una explicitación no presente en el texto.
  - Se distingue «poder» para δύναμις y «fuerza» para κράτος, siguiendo la acumulación de términos del original.
  - «Gozo» se usa como sustantivo bíblico estable para χαρά, coherente con el registro del proyecto.
