translation:
  language: es
  text: Pero ahora él los ha reconciliado[a] en su cuerpo de carne por medio de la muerte, para presentarlos santos, sin mancha[b] y sin reproche delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ustedes han sido reconciliados’. El verbo griego está en voz pasiva.
    reason: alternative_reading
  - marker: b
    text: ‘Sin mancha’ también puede traducirse ‘sin defecto’, preservando más explícitamente el matiz sacrificial del término griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora, sin embargo
  - Pero en este momento
  lexicon: BDAG
  rationale: Conserva el contraste adversativo y temporal del griego de forma natural en español, reflejando el giro desde el estado anterior al nuevo estado de reconciliación.
- source_word: ἀποκατηλλάγητε
  english_pob_choice: he has reconciled you
  chosen_spanish: los ha reconciliado
  alternatives_spanish:
  - ustedes han sido reconciliados
  - ustedes fueron reconciliados
  lexicon: BDAG
  rationale: El verbo es aoristo pasivo de segunda persona plural; en español se optó por una formulación activa y natural con sujeto implícito recuperable del contexto, manteniendo la iniciativa divina que el contexto inmediato atribuye a Dios.
- source_word: ἐν τῷ σώματι τῆς σαρκὸς αὐτοῦ
  english_pob_choice: in his body of flesh
  chosen_spanish: en su cuerpo de carne
  alternatives_spanish:
  - en el cuerpo de su carne
  - en su cuerpo físico
  lexicon: BDAG
  rationale: Se preserva la concreción corporal y el valor literal de σάρξ como ‘carne’, sin convertirlo en ‘naturaleza humana’ ni en un sentido moralizado. ‘Cuerpo de carne’ reproduce el peso extra del genitivo sin sonar tan rígido como una calca plena.
- source_word: σώματι
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: BDAG
  rationale: Es el equivalente estándar y claro en español; el contexto ya precisa la corporeidad mediante la frase siguiente.
- source_word: σαρκὸς
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - carne humana
  lexicon: BDAG
  rationale: Se mantiene el sentido literal/encarnado de σάρξ. No se adopta ‘naturaleza humana’, porque aquí la referencia es a la realidad corporal concreta de la encarnación y la muerte.
- source_word: διὰ τοῦ θανάτου
  english_pob_choice: through death
  chosen_spanish: por medio de la muerte
  alternatives_spanish:
  - a través de la muerte
  - mediante la muerte
  lexicon: BDAG
  rationale: ‘Por medio de’ comunica con claridad la función instrumental de διά con genitivo y conserva el tono solemne del pasaje.
- source_word: παραστῆσαι
  english_pob_choice: to present
  chosen_spanish: para presentarlos
  alternatives_spanish:
  - para ponerlos delante
  - para hacerlos comparecer
  lexicon: BDAG
  rationale: ‘Presentar’ funciona bien en el registro judicial/sacrificial del contexto y se integra naturalmente con la cadena de adjetivos que sigue.
- source_word: ἁγίους
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  lexicon: BDAG
  rationale: ‘Santos’ es la forma más estable y bíblicamente transparente en español para ἅγιος en este contexto de consagración y pureza moral.
- source_word: ἀμώμους
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin defecto
  - inmaculados
  lexicon: BDAG
  rationale: Aunque el inglés POB destacó el valor de ‘blameless’, en español ‘sin mancha’ preserva mejor la resonancia sacrificial de ἄμωμος y además mantiene una distinción útil con el siguiente término forense.
- source_word: ἀνεγκλήτους
  english_pob_choice: beyond reproach
  chosen_spanish: sin reproche
  alternatives_spanish:
  - irreprochables
  - sin acusación
  lexicon: BDAG
  rationale: Se conserva el matiz forense de no estar sujeto a una acusación válida. ‘Sin reproche’ es idiomático y, a la vez, cercano al campo semántico de ἀνέγκλητος.
- source_word: κατενώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: BDAG
  rationale: ‘Delante de él’ preserva la imagen relacional y evaluativa sin forzar la identificación del referente más allá de lo que el griego expresa.
theological_decisions:
- issue: Agencia implícita en ἀποκατηλλάγητε
  english_pob_reading: he has reconciled you
  chosen_spanish_reading: los ha reconciliado
  alternative_spanish_readings:
  - ustedes han sido reconciliados
  - ustedes fueron reconciliados
  rationale: El pasivo griego deja el agente implícito; el contexto inmediato lo atribuye a Dios. El español activo con objeto directo ofrece una lectura natural sin alterar la iniciativa divina del texto.
  doctrine_reference: Principio de primacía del original y claridad idiomática en la traducción
- issue: Sentido de σάρξ en la frase corporal
  english_pob_reading: 'Literal physical sense: ''flesh'''
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza humana
  - humanidad
  rationale: Aquí σάρξ no se espiritualiza ni se moraliza; señala la encarnación real y la muerte física. Traducirlo como ‘naturaleza humana’ debilitaría el énfasis corporal del pasaje.
  doctrine_reference: 'Entrada contestada de σάρξ: sentido literal/corporal según contexto'
- issue: Relación entre ἀμώμους y ἀνεγκλήτους
  english_pob_reading: blameless / beyond reproach
  chosen_spanish_reading: sin mancha / sin reproche
  alternative_spanish_readings:
  - sin defecto / irreprochables
  - sin mancha / irreprochables
  rationale: 'La combinación mantiene dos matices distintos: el primero sacrificial (sin mancha) y el segundo forense (sin reproche). No se fusionan en una sola idea para no perder la tensión lexical del griego.'
  doctrine_reference: Consistencia de términos clave y preservación de matices sacrificiales/forenses
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el único marcador de nota [a] aparezca exactamente en el texto principal y que todas las notas estén ancladas. Además, se mantuvo la distinción entre el matiz sacrificial de ἀμώμους y el matiz forense de ἀνεγκλήτους, en línea con el audit trail inglés y la revisión reciente que favorece una traducción más natural de la segunda expresión.
  spanish_consistency_notes:
  - Se usa ‘carne’ para σάρξ en sentido literal, evitando ‘naturaleza humana’ salvo donde el contexto lo exija.
  - Se reserva ‘santos’ para ἅγιοι como término bíblico estable en español.
  - Se distingue ‘sin mancha’ de ‘sin reproche’ para conservar dos campos semánticos diferentes.
  - Se mantiene un registro digno y publicable, evitando arcaísmos innecesarios.
