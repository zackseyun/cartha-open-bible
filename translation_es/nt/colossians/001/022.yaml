  text: νυνὶ δὲ ⸀ἀποκατηλλάγητε ἐν τῷ σώματι τῆς σαρκὸς αὐτοῦ διὰ τοῦ θανάτου— παραστῆσαι ὑμᾶς ἁγίους καὶ ἀμώμους καὶ ἀνεγκλήτους κατενώπιον αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/022.yaml
  text: But now he has reconciled you in his body of flesh through death[a], to present you holy and blameless and beyond reproach before him[b],
