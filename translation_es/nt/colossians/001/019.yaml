revisions:
- from: Porque en él [a][b][c] se agradó habitar toda la plenitud.
  to: Pues[a] en él toda la plenitud[c] tuvo a bien[b] habitar,
  rationale: Se revisa la cláusula principal para lograr una equivalencia fiel y español natural. «Tuvo a bien» expresa el valor de εὐδόκησεν sin añadir un sujeto explícito. Se conserva «toda la plenitud» sin expansión teológica no dicha en el texto. Se redistribuyen las notas a sus palabras pertinentes y se corrige la nota de la conjunción para que no repita el texto principal.
