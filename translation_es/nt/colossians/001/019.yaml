translation:
  language: es
  text: Pues[a] en él toda la plenitud[c] tuvo a bien[b] habitar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque». La conjunción puede traducirse con matiz explicativo o causal según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'El griego no expresa de forma explícita el sujeto del verbo. Muchas traducciones lo hacen explícito: «Dios tuvo a bien…» o «el Padre tuvo a bien…», pero el texto no lo dice directamente.'
    reason: alternative_reading
  - marker: c
    text: «Toda la plenitud» suele entenderse como la plenitud de Dios; compárese Colosenses 2:9.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: El griego introduce la base o fundamento de lo anterior. En español, «Porque» comunica con naturalidad esa fuerza explicativa/causal sin añadir contenido ajeno al texto.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en el Mesías
  - en Cristo
  lexicon: BDAG
  rationale: El pronombre remite al Hijo en el contexto inmediato. «En él» conserva la referencia pronominal del griego sin insertar el título explícito en el versículo.
- source_word: εὐδόκησεν
  english_pob_choice: was pleased
  chosen_spanish: se agradó
  alternatives_spanish:
  - le agradó
  - quiso
  - fue de su agrado
  lexicon: BDAG
  rationale: El aoristo de εὐδοκέω expresa beneplácito o agrado favorable. «Se agradó» mantiene el matiz verbal y evita suministrar un sujeto explícito en la línea principal.
- source_word: πᾶν τὸ πλήρωμα
  english_pob_choice: all the fullness
  chosen_spanish: toda la plenitud
  alternatives_spanish:
  - todo el pleno contenido
  - toda la plenitud de Dios
  - la plenitud entera
  lexicon: BDAG
  rationale: La construcción articular es totalizadora. «Toda la plenitud» preserva el alcance de πᾶν τὸ πλήρωμα sin expandirlo con «de Dios», que el griego no expresa aquí de manera explícita.
- source_word: κατοικῆσαι
  english_pob_choice: to dwell
  chosen_spanish: habitar
  alternatives_spanish:
  - morar
  - residir
  - hacer su morada
  lexicon: BDAG
  rationale: El infinitivo denota establecer morada o residir. «Habitar» es natural en español bíblico y conserva el tono elevado del verbo sin sobreexplicar.
theological_decisions:
- issue: Sujeto implícito de εὐδόκησεν
  english_pob_reading: Leave the subject implicit in English rather than supplying 'the Father' or 'God.'
  chosen_spanish_reading: 'Dejar implícito el sujeto en español: «se agradó»'
  alternative_spanish_readings:
  - Dios se agradó
  - El Padre se agradó
  rationale: El griego no menciona explícitamente el sujeto del verbo. La traducción principal mantiene esa misma ambigüedad sintáctica y no introduce un sujeto que el texto no dice de forma directa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referente de «la plenitud»
  english_pob_reading: Retain 'all the fullness' without expanding it to 'all the fullness of God.'
  chosen_spanish_reading: Conservar «toda la plenitud» sin expandirla a «toda la plenitud de Dios»
  alternative_spanish_readings:
  - toda la plenitud de Dios
  - toda su plenitud
  rationale: La teología del contexto y la referencia de Colosenses 2:9 apoyan una lectura elevada, pero este versículo no añade el genitivo. La redacción española conserva esa tensión sin incorporar palabras no presentes en el griego.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente sin cambios sustanciales; la versión final inglesa mantiene una alta concordancia con el análisis previo. La redacción española conserva esa estabilidad, sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantuvo «en él» para respetar el referente pronominal del griego y la decisión inglesa de no explicitar el título en el texto principal.
  - «Toda la plenitud» se dejó sin complemento posesivo para preservar la ambigüedad teológica documentada.
  - «Se agradó» reproduce el beneplácito verbal del aoristo sin forzar un sujeto inexistente en la superficie del griego.
  - La puntuación en español sigue la estructura causal de la frase y sitúa las notas al final del segmento con marcas únicas en orden.
