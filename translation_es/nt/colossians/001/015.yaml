translation:
  language: es
  text: Él es la imagen del Dios invisible, el primogénito de toda la creación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el primogénito de toda la creación». Aquí «primogénito» probablemente expresa rango y herencia, no que el Hijo sea parte de la creación; compárense los versículos siguientes.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅς
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - quien
  lexicon: BDAG
  rationale: El pronombre relativo griego retoma al Hijo del versículo anterior, pero en español la forma más natural y directa al inicio de esta afirmación cristológica es el pronombre personal «Él».
- source_word: εἰκὼν
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - semejanza
  - representación
  lexicon: BDAG
  rationale: «Imagen» conserva el valor representacional y revelador del término sin añadir una explicación metafísica que el texto no explicita.
- source_word: τοῦ θεοῦ τοῦ ἀοράτου
  english_pob_choice: of the invisible God
  chosen_spanish: del Dios invisible
  alternatives_spanish:
  - del Dios que no se ve
  - del Dios invisible
  lexicon: BDAG
  rationale: La construcción atributiva se vuelve naturalmente «del Dios invisible» en español, manteniendo el énfasis en que Dios no es visible.
- source_word: πρωτότοκος
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primogénito primero
  - el primero en nacer
  lexicon: BDAG
  rationale: «Primogénito» es el equivalente léxico normal en español y preserva tanto la forma como el trasfondo bíblico de primacía e herencia; no se sustituye por un término interpretativo como «supremo».
- source_word: πάσης κτίσεως
  english_pob_choice: of all creation
  chosen_spanish: de toda la creación
  alternatives_spanish:
  - sobre toda la creación
  - de toda criatura
  lexicon: BDAG
  rationale: La revisión inglesa más reciente decidió reflejar de manera más directa el genitivo griego con «of all creation». En español, «de toda la creación» mantiene esa relación sin imponer de entrada una paráfrasis de supremacía que el griego no dice de forma explícita.
theological_decisions:
- issue: Relación de «primogénito» con la creación
  english_pob_reading: the firstborn of all creation
  chosen_spanish_reading: el primogénito de toda la creación
  alternative_spanish_readings:
  - el primogénito sobre toda la creación
  - el preeminente de toda la creación
  rationale: 'El texto griego admite una lectura que no debe forzarse en el español: el genitivo puede expresarse de modo directo sin resolver aquí el debate. La frase mantiene la tensión documentada por el aparato inglés, dejando que el contexto inmediato (vv. 16–17) explique la relación del Hijo con la creación.'
  doctrine_reference: DOCTRINE.md; Credo Niceno-Constantinopolitano (381)
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió de «over all creation» a «of all creation» para reflejar más directamente πάσης κτίσεως. Esta versión española sigue esa última decisión y evita introducir una interpretación de supremacía en el cuerpo del texto, preservándola solo como posibilidad contextual en la nota.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ y no «Señor», porque el texto griego nombra explícitamente a θεός.
  - Se escogió «primogénito» para πρωτότοκος por su valor léxico y bíblico, evitando un sinónimo interpretativo.
  - Se mantuvo «creación» para κτίσις en vez de «criatura», porque el sintagma completo apunta al ámbito de lo creado, no a un individuo creado.
