  text: ⸀καθὼς ἐμάθετε ἀπὸ Ἐπαφρᾶ τοῦ ἀγαπητοῦ συνδούλου ἡμῶν, ὅς ἐστιν πιστὸς ὑπὲρ ⸀ἡμῶν διάκονος τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/007.yaml
  text: just as you learned from Epaphras[a], our beloved fellow slave, who is a faithful minister of the Messiah on our behalf[c][b],
  footnotes:
  - marker: a
    text: Or "our beloved fellow servant." The Greek term is σύνδουλος, literally one who is a slave together with another under the same master.
    reason: lexical_alternative
  - marker: b
    text: Or "for us" instead of "on our behalf."
    reason: alternative_reading
  - marker: c
    text: Greek "Christou"; translated "Messiah" here because the term functions as a title rather than a name-like form.
    reason: lexical_alternative
