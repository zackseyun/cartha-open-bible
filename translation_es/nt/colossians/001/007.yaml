    changes_summary: 'Removed ''it'' because it is not explicit in the Greek, and changed ''fellow slave'' to ''fellow servant'' for more natural formal English while still accurately reflecting σύνδουλος. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: tal como aprendieron de Epafras, nuestro amado compañero esclavo[a], quien es un fiel ministro del Mesías[c] por nosotros[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestro amado consiervo». El griego σύνδουλος significa literalmente alguien que es esclavo junto con otro bajo el mismo amo.
    reason: lexical_alternative
  - marker: b
    text: O «a favor de nosotros» o «en representación de nosotros». El griego ὑπέρ con genitivo puede indicar beneficio o representación.
    reason: alternative_reading
  - marker: c
    text: Griego «Christou»; se traduce «Mesías» aquí porque el término funciona como título y no como una forma fija de nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justamente como
  lexicon: BDAG
  rationale: La comparación o correspondencia con lo anterior se expresa de manera natural en español con 'tal como', sin perder la fuerza correlativa de καθὼς.
- source_word: ἐμάθετε
  english_pob_choice: you learned
  chosen_spanish: aprendiste
  alternatives_spanish:
  - aprendisteis
  - llegaste a aprender
  lexicon: BDAG
  rationale: El aoristo indica la recepción del mensaje; 'aprendiste' comunica el pasado con naturalidad en español dirigido a la comunidad.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - por medio de
  lexicon: BDAG
  rationale: En español, con verbos de aprendizaje, 'de' expresa bien la fuente de la enseñanza y suena más natural que un calco rígido.
- source_word: Ἐπαφρᾶ
  english_pob_choice: Epaphras
  chosen_spanish: Epapras
  alternatives_spanish:
  - Epaphras
  lexicon: Convención de transliteración propia del español bíblico
  rationale: Se translitera el nombre propio con forma estándar en español; 'Epapras' evita la terminación inglesa sin cambiar la identidad del personaje.
- source_word: ἀγαπητοῦ
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - amado de Dios
  lexicon: BDAG
  rationale: '''Amado'' conserva el valor afectivo y relacional del participio/adjetivo sin añadir una precisión no explícita en el texto.'
- source_word: συνδούλου
  english_pob_choice: fellow slave
  chosen_spanish: consiervo
  alternatives_spanish:
  - esclavo junto con nosotros
  - compañero esclavo
  lexicon: BDAG
  rationale: El griego lleva la idea de compartir la misma condición de dependencia; en español, 'consiervo' es el equivalente más natural para mantener la relación conjunta sin sonar torpe. 'Esclavo' se conserva en el trasfondo semántico, pero aquí la forma idiomática española comunica mejor el término compuesto.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  lexicon: Gramática española
  rationale: El posesivo es directo y natural en español con el sustantivo que modifica.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fiable
  - leal
  lexicon: BDAG
  rationale: '''Fiel'' es el término normal en contexto ministerial y mantiene tanto la confiabilidad como la lealtad implícitas.'
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: on our behalf
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en nuestro favor
  - a favor de nosotros
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede expresar representación o beneficio; 'por nosotros' es una forma breve y fiel en español. Se deja abierta la posible lectura representativa, sin exigir una paráfrasis más interpretativa.
- source_word: διάκονος
  english_pob_choice: minister
  chosen_spanish: ministro
  alternatives_spanish:
  - servidor
  - diácono
  lexicon: BDAG
  rationale: Aquí el término denota servicio en el ministerio del Mesías, no un cargo eclesiástico técnico; 'ministro' comunica servicio reconocido sin imponer una oficina específica.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se conserva 'Mesías' porque el término funciona aquí como título y no como nombre propio, siguiendo la política del proyecto y la distinción semántica del griego.
theological_decisions:
- issue: συνδούλος y la imagen de esclavitud compartida
  english_pob_reading: fellow slave
  chosen_spanish_reading: consiervo
  alternative_spanish_readings:
  - esclavo junto con nosotros
  - compañero esclavo
  - fellow servant
  rationale: La metáfora de pertenencia al mismo Señor/Master debe conservarse. En español, 'consiervo' permite mantener la relación de servicio compartido y evita una construcción pesada; no se suprime la tensión del término, sino que se comunica de forma idiomática.
  doctrine_reference: Contested terms table for δοῦλος; Translation philosophy §1
- issue: Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En 'διάκονος τοῦ Χριστοῦ' el término identifica al ungido en función titulativa. 'Mesías' preserva el contenido semántico del griego sin convertirlo en un nombre fijo.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
- issue: ὑπὲρ ἡμῶν
  english_pob_reading: on our behalf
  chosen_spanish_reading: por nosotros
  alternative_spanish_readings:
  - en nuestro favor
  - a favor de nosotros
  rationale: La preposición puede marcar beneficio o representación. 'Por nosotros' mantiene esa amplitud en español y evita sobreinterpretar la relación exacta más allá de lo que el texto exige.
  doctrine_reference: BDAG s.v. ὑπέρ; source context
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial inglés: se corrigió la omisión añadida de un objeto no explícito y se respetó la decisión doctrinal de mantener el matiz fuerte de δοῦλος, aunque en español se optó por una solución idiomática (''consiervo'') que preserva la relación compartida de servicio sin endurecer innecesariamente la lectura. También se siguió la decisión estable de traducir Χριστός como ''Mesías''.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la política del proyecto.
  - '''consiervo'' se usa aquí como equivalente idiomático de σύνδουλος para evitar una formulación artificial en español, sin borrar la relación de subordinación compartida.'
  - '''por nosotros'' deja abierta la relación de beneficio/representación indicada por ὑπέρ.'
  - La puntuación y el orden están ajustados a la sintaxis natural del español bíblico contemporáneo.
