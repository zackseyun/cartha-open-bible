review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: καθὼς = «tal como», ἐμάθετε ἀπὸ Ἐπαφρᾶ = «aprendiste de Epafras», πιστὸς διάκονος = «fiel ministro», y τοῦ Χριστοῦ = «del Mesías». Sin embargo, no preserva plenamente la decisión léxica documentada para σύνδουλος, donde el rastro POB exige mantener la fuerza de δοῦλος como «esclavo» y no suavizarla a «consiervo» sin señalización suficiente. Además, el borrador omite la nota correspondiente a Χριστοῦ → «Mesías», que sí forma parte del expediente inglés.'
  spanish_quality_summary: El español es legible, pero «aprendiste» dirigido a una comunidad suena discordante; en español bíblico general es más natural el plural «aprendieron» si se mantiene tratamiento de ustedes. «Consiervo» es comprensible pero algo tradicional y atenúa la fuerza semántica de esclavitud compartida. «Por nosotros» es aceptable, aunque conviene conservar la nota de alternativa representativa. La redacción revisada mejora fidelidad y claridad sin volverse rígida.
  glossary_alignment: '«Mesías» está correctamente alineado con la política del proyecto para Χριστός. El problema principal es σύνδουλος: dado el lineamiento del proyecto para δοῦλος, aquí debe preferirse una forma que mantenga «esclavo», p. ej. «compañero esclavo», con nota alternativa para «consiervo». También corresponde añadir nota para «Mesías» por la justificación titulativa ya documentada en el POB inglés.'
  issues:
  - severity: high
    issue: «consiervo» debilita la decisión léxica documentada para σύνδουλος
    rationale: El expediente inglés y la doctrina del proyecto restauraron explícitamente «fellow slave» frente a «fellow servant». «Consiervo» suena idiomático, pero suaviza la condición de esclavitud compartida que el proyecto quiere preservar.
  - severity: medium
    issue: Falta la nota sobre Χριστοῦ → «Mesías»
    rationale: El POB inglés incluye una nota léxica para explicar por qué se traduce el título como «Messiah». Esa justificación debe preservarse en español, especialmente por la política del proyecto sobre Χριστός.
  - severity: medium
    issue: «aprendiste» no concuerda bien con el destinatario plural de la carta
    rationale: Aunque el griego es 2ª plural, el borrador usa singular. En español neutro eclesial para una comunidad es más natural «aprendieron» o, si se tuteara, debería mantenerse consistencia contextual. Aquí «aprendieron» evita discordancia.
  - severity: low
    issue: La nota a dice «amado hermano de servicio», alternativa poco fiel
    rationale: Esa formulación introduce «hermano», ausente en el griego, y se aleja del campo semántico de σύνδουλος.
  - severity: low
    issue: La nota b ofrece «en nuestro lugar», que puede sonar demasiado sustitutiva
    rationale: ὑπὲρ ἡμῶν aquí apunta mejor a beneficio o representación; «en nuestro lugar» puede sugerir sustitución más fuerte que la requerida por el contexto.
  revised_spanish_text: tal como aprendieron de Epafras, nuestro amado compañero esclavo[a], quien es un fiel ministro del Mesías[c] por nosotros[b],
  revised_footnotes:
