    text: O «nuestro amado consiervo». El griego σύνδουλος significa literalmente alguien que es esclavo junto con otro bajo el mismo amo.
    reason: lexical_alternative
  - marker: b
    text: O «a favor de nosotros» o «en representación de nosotros». El griego ὑπέρ con genitivo puede indicar beneficio o representación.
    reason: alternative_reading
  - marker: c
    text: Griego «Christou»; se traduce «Mesías» aquí porque el término funciona como título y no como una forma fija de nombre.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para ajustarse mejor al expediente fuente y a la política léxica del proyecto: se restaura la fuerza de σύνδουλος con «compañero esclavo», se añade la nota sobre «Mesías», se corrige el número verbal al plural dirigido a la comunidad, y se afinan las notas para evitar alternativas menos fieles o más interpretativas de lo necesario.'
