translation:
  language: es
  text: Ahora me alegro en mis sufrimientos por causa de ustedes[a], y en mi carne completo lo que falta de las aflicciones del Mesías, por causa de su cuerpo, que es la iglesia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "completo lo que resta de las aflicciones del Mesías". Pablo no está implicando que la obra expiatoria del Mesías fuera deficiente; el versículo habla de la participación de Pablo en sufrimientos vinculados con el Mesías y con su cuerpo, la iglesia.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: "Cristo"; se traduce "Mesías" aquí porque Χριστός funciona como título.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: BDAG
  rationale: Como marcador temporal de discurso, 'Ahora' expresa el contraste con la situación presente de Pablo de manera natural en español y conserva la inmediatez del griego.
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_spanish: me gozo
  alternatives_spanish:
  - me regocijo
  - me alegro
  lexicon: BDAG
  rationale: '''Me gozo'' mantiene el verbo de alegría con un tono bíblico y digno, sin perder el valor verbal presente del griego; evita una paráfrasis excesivamente moderna.'
- source_word: ἐν τοῖς παθήμασιν
  english_pob_choice: in my sufferings
  chosen_spanish: en mis sufrimientos
  alternatives_spanish:
  - en mis padecimientos
  - en los sufrimientos
  lexicon: BDAG
  rationale: Aunque el griego no repite explícitamente el posesivo, el contexto inmediato hace claro que se trata de los sufrimientos de Pablo; por eso 'mis sufrimientos' es una inferencia sobria y transparente en español.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - por ustedes
  - en favor de ustedes
  lexicon: BDAG
  rationale: '''Por causa de ustedes'' conserva el valor benefactivo y causal de ὑπέρ en este contexto, y suena natural en español bíblico actual.'
- source_word: ἀνταναπληρῶ
  english_pob_choice: I am filling up
  chosen_spanish: estoy completando
  alternatives_spanish:
  - estoy llenando
  - estoy supliendo
  lexicon: BDAG
  rationale: El compuesto expresa la idea de llenar/completar lo que resta. 'Estoy completando' comunica esa acción en curso sin sugerir que la obra redentora del Mesías esté incompleta.
- source_word: τὰ ὑστερήματα
  english_pob_choice: what is lacking
  chosen_spanish: lo que falta
  alternatives_spanish:
  - lo que resta
  - las carencias
  lexicon: BDAG
  rationale: La expresión neutra plural se vierte de modo idiomático como 'lo que falta', preservando la idea de lo restante sin exagerar el matiz.
- source_word: τῶν θλίψεων
  english_pob_choice: the afflictions
  chosen_spanish: de las aflicciones
  alternatives_spanish:
  - de los padecimientos
  - de las tribulaciones
  lexicon: BDAG
  rationale: '''Aflicciones'' distingue θλῖψις de πάθημα, que el verso ya había expresado como ''sufrimientos''; así se conserva la diferencia léxica del griego.'
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' porque Χριστός funciona aquí como título, según la decisión auditada del POB en inglés y la terminología preferente del proyecto.
- source_word: ἐν τῇ σαρκί μου
  english_pob_choice: in my flesh
  chosen_spanish: en mi carne
  alternatives_spanish:
  - en mi cuerpo
  - en mi carne mortal
  lexicon: BDAG
  rationale: '''Carne'' refleja σάρξ de modo más directo que ''cuerpo'' y mantiene el contraste material/encarnado sin introducir la noción de ''naturaleza humana''.'
- source_word: ὑπὲρ τοῦ σώματος αὐτοῦ
  english_pob_choice: for the sake of his body
  chosen_spanish: por causa de su cuerpo
  alternatives_spanish:
  - en favor de su cuerpo
  - por su cuerpo
  lexicon: BDAG
  rationale: La preposición ὑπέρ conserva aquí el sentido de beneficio o causa. 'Por causa de' expresa esa relación de manera clara y fluida en español.
- source_word: σώματος
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: '''Cuerpo'' preserva la metáfora eclesiológica paulina, que el relativo inmediatamente identifica.'
- source_word: ὅ ἐστιν ἡ ἐκκλησία
  english_pob_choice: which is the church
  chosen_spanish: que es la iglesia
  alternatives_spanish:
  - la cual es la iglesia
  - es decir, la iglesia
  lexicon: BDAG
  rationale: '''Iglesia'' es la traducción estándar y natural de ἐκκλησία en este contexto paulino. Se evita ''asamblea'' porque aquí la identificación eclesial ya está establecida por el pasaje.'
theological_decisions:
- issue: Sentido de 'lo que falta de las aflicciones del Mesías'
  english_pob_reading: Paul speaks of his own participation in the ongoing sufferings associated with the Messiah's people and mission, not of any deficiency in the Messiah's atoning death.
  chosen_spanish_reading: Pablo habla de su participación en los sufrimientos ligados al Mesías y a su pueblo, no de una insuficiencia en la obra expiatoria del Mesías.
  alternative_spanish_readings:
  - Pablo completa una falta en la expiación del Mesías
  - Pablo se refiere solo a un cupo fijo de dolores mesiánicos finales
  rationale: La traducción mantiene la tensión literal de la frase sin suavizarla, pero el comentario doctrinal evita leer una deficiencia en la obra redentora del Mesías. 'Aflicciones' y la referencia a 'su cuerpo' apoyan una participación ministerial y eclesial en el sufrimiento.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Elección de 'Mesías' para Χριστοῦ
  english_pob_reading: Christ is rendered as Messiah because the term functions as a title.
  chosen_spanish_reading: Mesías se usa como título y no solo como nombre propio.
  alternative_spanish_readings:
  - Cristo
  - Cristo Jesús
  rationale: El proyecto pide 'Mesías' cuando Χριστός funciona titularmente. En este versículo eso preserva el trasfondo mesiánico judío sin perder inteligibilidad para la comunidad lectora en español.
  doctrine_reference: 'Contested terms: Χριστός'
translation_notes:
  revision_awareness: Se revisó el texto más reciente del POB en inglés y el control de revisión indica que no hubo cambios necesarios; el borrador español sigue la misma lectura auditada, preservando la tensión interpretativa del verso y la decisión titular de Χριστός como 'Mesías'.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός en coherencia con la terminología preferente del proyecto.
  - Se conservó el contraste léxico entre 'sufrimientos' (παθήματα) y 'aflicciones' (θλίψεις).
  - '''Carne'' se eligió para σάρξ en un sentido literal/encarnado, no moral.'
  - '''Iglesia'' traduce ἐκκλησία de forma eclesiológicamente estándar y comprensible.'
