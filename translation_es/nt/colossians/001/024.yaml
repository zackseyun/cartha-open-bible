  text: Νῦν χαίρω ἐν τοῖς παθήμασιν ὑπὲρ ὑμῶν, καὶ ἀνταναπληρῶ τὰ ὑστερήματα τῶν θλίψεων τοῦ Χριστοῦ ἐν τῇ σαρκί μου ὑπὲρ τοῦ σώματος αὐτοῦ, ὅ ἐστιν ἡ ἐκκλησία,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/024.yaml
  text: Now I rejoice in my sufferings for your sake[a], and in my flesh I am filling up what is lacking in the afflictions of the Messiah for the sake of his body, which is the church[b],
  footnotes:
  - marker: a
    text: Or 'I complete what remains of the afflictions of Christ.' Paul is not implying that the Messiah's atoning work was deficient; the verse speaks of Paul's participation in sufferings connected with the Messiah and his body, the church.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
