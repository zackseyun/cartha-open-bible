translation:
  language: es
  text: que ha llegado a ustedes[a], así como también en todo el mundo[b] está dando fruto y creciendo, así como también entre ustedes[c], desde el día en que oyeron y llegaron a conocer la gracia de Dios en la verdad[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que está presente con ustedes» o «que ha llegado entre ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «por todo el mundo».
    reason: lexical_alternative
  - marker: c
    text: O «en ustedes»; el griego puede referirse tanto a la comunidad corporativamente como a la obra del evangelio dentro de ellos.
    reason: lexical_alternative
  - marker: d
    text: O «verdaderamente» o «en la verdad».
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ παρόντος εἰς ὑμᾶς
  english_pob_choice: which has come to you
  chosen_spanish: que ha llegado a ustedes
  alternatives_spanish:
  - que está presente con ustedes
  - que ha llegado entre ustedes
  lexicon: BDAG
  rationale: El participio articular describe al evangelio del v. 5 y expresa llegada/presencia. En español, «ha llegado a ustedes» comunica el movimiento hacia los colosenses con naturalidad y sin perder la posibilidad de presencia resultante.
- source_word: καθὼς καὶ
  english_pob_choice: just as also
  chosen_spanish: así como también
  alternatives_spanish:
  - justamente como también
  - así como
  lexicon: BDAG
  rationale: La comparación repetida se conserva con una fórmula española sobria. «También» refleja el valor de καί y mantiene el paralelismo con la expansión mundial y la experiencia de los colosenses.
- source_word: ἐν παντὶ τῷ κόσμῳ
  english_pob_choice: in all the world
  chosen_spanish: en todo el mundo
  alternatives_spanish:
  - por todo el mundo
  - en el mundo entero
  lexicon: BDAG
  rationale: κόσμος aquí funciona como referencia amplia al mundo habitado. «En todo el mundo» es idiomático en español y preserva el alcance retórico universal sin convertirlo en una precisión geográfica.
- source_word: ἐστὶν καρποφορούμενον καὶ αὐξανόμενον
  english_pob_choice: it is bearing fruit and growing
  chosen_spanish: está dando fruto y creciendo
  alternatives_spanish:
  - está fructificando y creciendo
  - da fruto y crece
  lexicon: BDAG
  rationale: La construcción perifrástica y los participios presentes indican acción continua. «Está dando fruto y creciendo» conserva el proceso y evita un giro demasiado abstracto como «es fructífero e incrementa».
- source_word: καθὼς καὶ ἐν ὑμῖν
  english_pob_choice: just as also among you
  chosen_spanish: así como también entre ustedes
  alternatives_spanish:
  - así como también en ustedes
  - así como también con ustedes
  lexicon: BDAG
  rationale: ἐν ὑμῖν puede leerse literalmente «en ustedes», pero en contexto comunitario puede sonar interiorista. «Entre ustedes» refleja bien el ámbito corporativo de la iglesia y coincide con el sentido probable de la comparación.
- source_word: ἀφ’ ἧς ἡμέρας
  english_pob_choice: from the day
  chosen_spanish: desde el día en que
  alternatives_spanish:
  - desde el día
  - a partir del día en que
  lexicon: BDAG
  rationale: La expresión marca el inicio temporal del proceso. «Desde el día en que» fluye mejor en español y enlaza de forma natural con los verbos siguientes.
- source_word: ἠκούσατε
  english_pob_choice: you heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - oyeron por primera vez
  lexicon: BDAG
  rationale: El aoristo simplemente presenta el hecho de oír. «Oyeron» es directo y no añade el matiz de «por primera vez», que no está explícito.
- source_word: ἐπέγνωτε
  english_pob_choice: came to know
  chosen_spanish: llegaron a conocer
  alternatives_spanish:
  - conocieron plenamente
  - reconocieron
  lexicon: BDAG
  rationale: ἐπιγινώσκω puede implicar conocimiento pleno o reconocido. «Llegaron a conocer» comunica adquisición real y progresiva del conocimiento sin sobreinterpretar el matiz técnico.
- source_word: τὴν χάριν τοῦ θεοῦ
  english_pob_choice: the grace of God
  chosen_spanish: la gracia de Dios
  alternatives_spanish:
  - el favor de Dios
  - la gracia divina
  lexicon: BDAG
  rationale: Es una fórmula paulina central. «La gracia de Dios» mantiene el peso teológico y la forma genitiva del original, ampliamente reconocible en español cristiano.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - verdaderamente
  - en verdad
  lexicon: BDAG
  rationale: La frase admite tanto un valor modal («verdaderamente») como uno de esfera/contenido («en la verdad»). Se eligió «en la verdad» para preservar la ambigüedad del griego y el paralelismo con la formulación auditada en inglés.
theological_decisions:
- issue: Alcance de «todo el mundo»
  english_pob_reading: A broad rhetorical description of the gospel's spread in the inhabited world, not a strict claim that every individual or region had already been reached.
  chosen_spanish_reading: Una descripción retórica amplia de la expansión del evangelio en el mundo habitado, no una afirmación estricta de que cada individuo o región ya hubiera sido alcanzada.
  alternative_spanish_readings:
  - Una afirmación literal de cobertura de todo el planeta
  - Una hipérbole sin valor descriptivo real
  rationale: Se conserva el lenguaje universal del texto sin reducirlo ni exagerarlo interpretativamente. «En todo el mundo» permite leer la amplitud retórica propia de Pablo y evita una precisión moderna que el griego no exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Nuance of ἐν ἀληθείᾳ
  english_pob_reading: Rendered 'in truth' to preserve ambiguity between 'truly' and 'in the sphere/content of truth.'
  chosen_spanish_reading: Se traduce «en la verdad» para dejar abierta la ambigüedad entre 'verdaderamente' y 'en la esfera o contenido de la verdad'.
  alternative_spanish_readings:
  - verdaderamente
  - en verdad
  rationale: El griego permite más de una lectura cercana. La versión española conserva esa tensión en vez de resolverla interpretativamente en el texto principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del paquete fuente y el audit trail inglés. Se mantuvieron las decisiones ya validadas: llegada/presencia del evangelio, comparación repetida, alcance amplio de κόσμος, progresión verbal continua, y la ambigüedad de ἐν ἀληθείᾳ. No se introdujeron revisiones sustantivas respecto del estado más reciente.'
  spanish_consistency_notes:
  - Se usa «Jesús», «Dios» y «gracia» conforme a las normas del proyecto.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa que lo requiera.
  - «Entre ustedes» se eligió para ἐν ὑμῖν por claridad comunitaria en español, sin cerrar por completo la opción literal «en ustedes».
  - La puntuación mantiene la acumulación retórica del griego con una sola oración amplia y coordinada.
