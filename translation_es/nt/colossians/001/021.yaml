translation:
  language: es
  text: Y ustedes[a], que antes estaban alienados y eran hostiles en mente en obras malas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes estaban alienados y eran enemigos en la mente, en las obras malas». El griego es compacto y puede traducirse de manera más literal; la redacción principal procura expresar el sentido en español natural sin eliminar esa ambigüedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὑμᾶς
  english_pob_choice: And you,
  chosen_spanish: Y a ustedes
  alternatives_spanish:
  - Y ustedes
  - Y también a ustedes
  - Y a ustedes también
  lexicon: BDAG
  rationale: Conserva la conexión discursiva con el versículo anterior y mantiene el foco en los destinatarios. El dativo implícito se expresa naturalmente en español con 'a ustedes'.
- source_word: ποτε
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - antes
  - en otro tiempo
  - antiguamente
  lexicon: BDAG
  rationale: Marca el estado anterior de manera breve y natural en español, preservando el contraste con la reconciliación posterior sin añadir matices no exigidos por el griego.
- source_word: ὄντας
  english_pob_choice: who once were
  chosen_spanish: que una vez estaban
  alternatives_spanish:
  - siendo
  - que antes eran
  - mientras estaban
  lexicon: BDAG
  rationale: El participio se vierte como una relativa fluida en español para conservar la descripción de su estado pasado sin calco rígido.
- source_word: ἀπηλλοτριωμένους
  english_pob_choice: alienated
  chosen_spanish: alejados
  alternatives_spanish:
  - alienados
  - separados
  - extrañados
  lexicon: BDAG
  rationale: '''Alejados'' comunica la separación relacional de forma clara y natural en español; ''alienados'' es posible, pero puede sonar más técnico o menos transparente para lectores generales.'
- source_word: ἐχθροὺς τῇ διανοίᾳ
  english_pob_choice: hostile in mind
  chosen_spanish: eran hostiles en la mente
  alternatives_spanish:
  - eran enemigos en la mente
  - tenían hostilidad en la mente
  - eran enemigos en su mente
  lexicon: BDAG
  rationale: Se conserva la tensión entre un estado relacional de enemistad y la esfera mental. 'En la mente' sigue de cerca τῇ διανοίᾳ sin decidir indebidamente entre 'mente', 'entendimiento' o 'pensamiento'.
- source_word: ἐν τοῖς ἔργοις τοῖς πονηροῖς
  english_pob_choice: in evil deeds
  chosen_spanish: en las malas obras
  alternatives_spanish:
  - en obras malas
  - en obras perversas
  - en las obras malas
  lexicon: BDAG
  rationale: El griego es compacto y la relación exacta entre hostilidad interna y obras malas se mantiene sin explicitar causalidad. 'Obras' respeta el léxico paulino, y 'malas' preserva el sentido moral de πονηροῖς.
- source_word: ἔργοις
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - deeds
  lexicon: BDAG
  rationale: '''Obras'' refleja el sustantivo griego de manera directa y mantiene el registro bíblico sin necesidad de evitar un matiz teológico que aquí no domina el contexto.'
- source_word: πονηροῖς
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - perversas
  - malignas
  lexicon: BDAG
  rationale: '''Malas'' es la opción más natural y sobria en español moderno, manteniendo la carga moral sin intensificarla más allá del texto.'
theological_decisions:
- issue: Relación entre la hostilidad interior y las obras malas
  english_pob_reading: hostile in mind in evil deeds
  chosen_spanish_reading: eran hostiles en la mente, en las malas obras
  alternative_spanish_readings:
  - eran hostiles en la mente por sus malas obras
  - eran hostiles en la mente y en las malas obras
  rationale: La sintaxis española conserva la compactación del griego y evita convertir la frase en una explicación causal. Así se mantiene la tensión entre disposición interna y conducta externa sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica donde el texto no la resuelve explícitamente.'
- issue: Valor de διάνοια
  english_pob_reading: mind
  chosen_spanish_reading: mente
  alternative_spanish_readings:
  - entendimiento
  - pensamiento
  - intención
  rationale: '''Mente'' es el equivalente más claro y amplio en español contemporáneo para διάνοια en este contexto. ''Entendimiento'' estrecharía innecesariamente el alcance; ''pensamiento'' suena más puntual que el sustantivo griego.'
  doctrine_reference: BDAG, διάνοια; uso paulino en contextos de disposición interior.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del POB inglés que prefirió reflejar más directamente ἐν τοῖς ἔργοις τοῖς πονηροῖς con 'in evil deeds' en lugar de expandirlo a 'doing evil deeds'. La versión española sigue esa cautela, manteniendo la preposición y evitando introducir una acción verbal no explícita en el griego.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que requiera decisión al respecto.
  - Se eligió 'Mesías'/'Cristo' no aplica aquí; no hay términos cristológicos en el versículo.
  - '''Obras'' se conserva por consistencia con el léxico paulino del proyecto, evitando sustituirlo por un sinónimo más débil que pudiera ocultar el término griego.'
  - La puntuación con raya final preserva la frase abierta del texto fuente, que continúa en el versículo siguiente.
