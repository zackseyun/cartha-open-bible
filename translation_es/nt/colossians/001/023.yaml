    reason: lexical_alternative
  revision_rationale: 'Se corrigieron los marcadores de notas para que coincidan con los términos correspondientes en el texto y se eliminó la duplicación indebida de la nota sobre διάκονος. Además, se ajustó el español hacia un registro más neutral latinoamericano: «siguen ustedes» en lugar de «permanecéis» y «oyeron» en lugar de «oísteis». También se refinó «no apartados» a «sin ser movidos» para reflejar mejor el participio pasivo griego μετακινούμενοι y sonar más natural en español.'
