translation:
  language: es
  text: si en verdad siguen ustedes en la fe, cimentados y firmes, y sin ser movidos de la esperanza del evangelio que oyeron, el cual ha sido proclamado en toda la creación[a] bajo el cielo, del cual yo, Pablo, llegué a ser servidor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en toda criatura bajo el cielo»; κτίσις puede significar «creación» o, en algunos contextos, «criatura».
    reason: lexical_alternative
  - marker: b
    text: O «siervo»; διάκονος puede denotar un servidor o, según el contexto, un ministro.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si realmente
  - si ciertamente
  lexicon: BDAG
  rationale: Conserva la fuerza condicional con énfasis de γε sin volverla más fuerte de lo que el griego exige. «Si en verdad» suena natural en español y mantiene la cautela teológica del original.
- source_word: ἐπιμένετε
  english_pob_choice: you continue
  chosen_spanish: permanecéis
  alternatives_spanish:
  - continuáis
  - persistís
  lexicon: BDAG
  rationale: El verbo expresa una permanencia continua; «permanecéis» comunica bien la idea de seguir estando en un estado o esfera, que aquí es «la fe».
- source_word: τῇ πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fe cristiana
  - en la fidelidad
  lexicon: BDAG
  rationale: Se mantiene el valor habitual de πίστις como «fe». La forma con artículo puede referirse a la fe de los creyentes o al ámbito de la fe cristiana; «en la fe» preserva esa amplitud sin resolverla de antemano.
- source_word: τεθεμελιωμένοι
  english_pob_choice: grounded
  chosen_spanish: cimentados
  alternatives_spanish:
  - fundados
  - asentados sobre un fundamento
  lexicon: BDAG
  rationale: La metáfora de fundamento se conserva con un término natural en español. «Cimentados» refleja el resultado estable de la acción pasiva perfecta sin sonar excesivamente técnico.
- source_word: ἑδραῖοι
  english_pob_choice: steadfast
  chosen_spanish: firmes
  alternatives_spanish:
  - estables
  - constantes
  lexicon: BDAG
  rationale: «Firmes» mantiene la idea de estabilidad y se ajusta bien al paralelismo con la imagen de estar cimentados.
- source_word: μὴ μετακινούμενοι
  english_pob_choice: not moved away
  chosen_spanish: no apartados
  alternatives_spanish:
  - no movidos
  - no desplazados
  lexicon: BDAG
  rationale: El participio pasivo expresa no ser removidos de una posición previa. «No apartados» comunica claramente la separación respecto de la esperanza sin introducir una imagen demasiado mecánica.
- source_word: ἀπὸ τῆς ἐλπίδος τοῦ εὐαγγελίου
  english_pob_choice: from the hope of the gospel
  chosen_spanish: de la esperanza del evangelio
  alternatives_spanish:
  - de la esperanza que da el evangelio
  - de la esperanza del evangelio
  lexicon: BDAG
  rationale: Se conserva la relación genitiva de manera directa. En español, «esperanza del evangelio» es suficientemente fiel y deja abierta la relación semántica exacta que el griego permite.
- source_word: οὗ ἠκούσατε
  english_pob_choice: that you heard
  chosen_spanish: que oísteis
  alternatives_spanish:
  - que habéis oído
  - que escuchasteis
  lexicon: BDAG
  rationale: El aoristo se traduce como hecho pasado. «Oísteis» es breve, claro y preserva el vínculo relativo con «evangelio».
- source_word: τοῦ κηρυχθέντος
  english_pob_choice: which has been proclaimed
  chosen_spanish: ha sido proclamado
  alternatives_spanish:
  - fue proclamado
  - ha sido predicado
  lexicon: BDAG
  rationale: «Proclamado» conserva la fuerza pública/anunciadora de κηρύσσω sin cargar el texto con terminología eclesiástica; el perfecto español refleja bien el impacto perdurable de la proclamación.
- source_word: ἐν ⸀πάσῃ κτίσει τῇ ὑπὸ τὸν οὐρανόν
  english_pob_choice: in all creation under heaven
  chosen_spanish: en toda la creación bajo el cielo
  alternatives_spanish:
  - en toda criatura bajo el cielo
  - en la creación entera bajo el cielo
  lexicon: BDAG
  rationale: κτίσις admite «creación» o «criatura». La forma singular con πᾶς favorece una amplitud cósmica; «toda la creación» sigue de cerca el griego y preserva la posible hipérbole universal.
- source_word: οὗ ἐγενόμην ἐγὼ Παῦλος διάκονος
  english_pob_choice: of which I, Paul, became a servant
  chosen_spanish: del cual yo, Pablo, llegué a ser servidor
  alternatives_spanish:
  - del cual yo, Pablo, me hice siervo
  - del cual yo, Pablo, llegué a ser ministro
  lexicon: BDAG
  rationale: «Servidor» transmite διάκονος sin importar un matiz institucional posterior que «ministro» podría sugerir. «Llegué a ser» refleja bien ἐγενόμην como entrada a un estado o función.
theological_decisions:
- issue: Condición de perseverancia en εἴ γε
  english_pob_reading: Render as a real conditional ('if indeed you continue') without importing a full doctrinal conclusion about apostasy or guaranteed perseverance.
  chosen_spanish_reading: 'Se mantiene una condición real: «si en verdad permanecéis...», sin convertirla en una afirmación de seguridad absoluta ni en una advertencia más fuerte de lo que el texto dice.'
  alternative_spanish_readings:
  - puesto que permanecéis
  - ya que permanecéis
  - si es que permanecéis
  rationale: El griego conserva una condición con énfasis; traducirla así preserva la tensión textual y evita resolver debates doctrinales que el versículo por sí solo no decide.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Sentido de πίστις en τῇ πίστει
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Aquí πίστις no exige una traducción polémica o especializada. «Fe» es la opción estándar y conserva la amplitud posible del término sin forzar «fidelidad».
  doctrine_reference: 'Contested terms table: πίστις → faith'
- issue: Alcance de κτίσις
  english_pob_reading: creation / creature
  chosen_spanish_reading: creación
  alternative_spanish_readings:
  - criatura
  - lo creado
  rationale: El texto puede referirse a la creación entera o, en un sentido amplio, a toda criatura. «Creación» respeta el valor cósmico probable y mantiene visible la tensión lexical documentada.
  doctrine_reference: Lexical alternative preserved in English POB footnote a
- issue: διάκονος aplicado a Pablo
  english_pob_reading: servant / minister
  chosen_spanish_reading: servidor
  alternative_spanish_readings:
  - siervo
  - ministro
  rationale: «Servidor» preserva el valor funcional de διάκονος sin introducir connotaciones eclesiásticas posteriores. Así se conserva la alternativa documentada en el audit trail sin eclipsarla con terminología más técnica.
  doctrine_reference: Lexical alternative preserved in English POB footnote b
translation_notes:
  revision_awareness: 'La redacción toma en cuenta la revisión más reciente del POB inglés: se prefirió una construcción breve y natural para el participio principal («grounded» → «cimentados») y para la idea de no ser removidos («not moved away» → «no apartados»). En español, se optó por una formulación igualmente sobria y fluida, manteniendo el paralelismo de estabilidad y la condición de perseverancia sin intensificar el texto. También se conservó la alternativa lexical documentada para κτίσις y para διάκονος, reflejando el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - «Evangelio» se mantiene como traducción estable de εὐαγγέλιον.
  - Se preserva el tono formal y eclesialmente amplio sin recurrir a lenguaje litúrgico rígido.
  - La puntuación respeta la coordinación del griego con pausas naturales en español.
  - Los corchetes de notas se colocan solo donde hay alternativa lexical documentada en el texto.
