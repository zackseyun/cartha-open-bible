review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran parte el sentido del griego y del audit trail inglés: conserva bien la condición real de εἴ γε, la idea de perseverar en la fe, la metáfora de fundamento/estabilidad y la amplitud cósmica de κτίσις. Sin embargo, hay errores formales en las notas: la nota [a] está anclada en «la fe» pero explica κτίσις, y se duplicó innecesariamente la alternativa de διάκονος en [b]/[c]. Además, «permanecéis» y «oísteis» suenan peninsulares, menos acordes con el objetivo de español neutral latinoamericano. «No apartados» es entendible, pero «sin ser movidos» o «sin apartarse» reflejaría mejor el matiz pasivo de μετακινούμενοι; aquí una solución natural es «sin ser movidos».'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero requiere ajuste de registro regional y corrección de aparato crítico. Para un español neutral y ampliamente eclesial, conviene cambiar «permanecéis» por «continúan/continúan» según persona; dado el texto base dirigido a la comunidad, «continúan» no sirve, así que «continúan» sería cambio de persona. Mejor mantener segunda plural con «continúan» no corresponde; la opción más natural y neutral es «si en verdad continúan» solo si se adapta todo el versículo, pero eso alteraría el destinatario. Por fidelidad al original y lectura eclesial panhispánica, puede usarse «si en verdad continúan ustedes», aunque es algo más pesado. Alternativamente, «si en verdad siguen en la fe» suena natural y neutral. También «oyeron» es más neutral que «oísteis». «Servidor» es aceptable para διάκονος, aunque «siervo» sigue siendo la alternativa de nota. La puntuación y el flujo general son buenos.
  glossary_alignment: No hay conflicto con la terminología marco del proyecto. πίστις se mantiene como «fe»; διάκονος se rinde aceptablemente como «servidor» con nota alternativa «siervo/ministro»; κτίσις como «creación» con nota alternativa «criatura» sigue la documentación inglesa. El problema principal no es terminológico sino la mala colocación y duplicación de notas, que rompe la trazabilidad léxica.
  issues:
