    issue: Las notas al pie están mal ancladas y desordenadas.
    rationale: La nota [a] aparece en «la fe» pero su contenido trata κτίσις («creación/criatura»). La nota sobre διάκονος fue duplicada como [b] y [c], cuando el audit trail inglés solo preserva una alternativa léxica aquí. Esto incumple las reglas del proyecto sobre marcadores únicos y anclaje exacto en el texto.
  - severity: medium
    issue: Registro regional poco alineado con español neutral latinoamericano.
    rationale: «Permanecéis» y «oísteis» son formas naturales en España pero menos neutras para el objetivo LATAM/ampliamente eclesial. Conviene usar formulaciones neutrales como «siguen/continúan ustedes» y «oyeron».
  - severity: medium
    issue: «No apartados» debilita el matiz pasivo y suena algo forzado.
    rationale: μὴ μετακινούμενοι expresa no ser desplazados o movidos de una posición. «No apartados» es comprensible pero menos preciso y algo menos natural que «sin ser movidos» en este contexto.
