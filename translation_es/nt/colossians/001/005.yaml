translation:
  language: es
  text: a causa de la esperanza guardada para ustedes en los cielos[a], de la cual ya oyeron[b] en la palabra de verdad[c], el evangelio
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «en el cielo». El griego tiene el plural: «en los cielos».'
    reason: lexical_alternative
  - marker: b
    text: O «de la cual habían oído anteriormente» o «acerca de la cual oyeron antes».
    reason: lexical_alternative
  - marker: c
    text: «Palabra de verdad» también puede traducirse «mensaje de verdad»; «el evangelio» está en aposición, identificando esa palabra o mensaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὴν ἐλπίδα
  english_pob_choice: because of the hope
  chosen_spanish: a causa de la esperanza
  alternatives_spanish:
  - por la esperanza
  - debido a la esperanza
  - por causa de la esperanza
  lexicon: BDAG
  rationale: Con διά + acusativo, el sentido causal o de base es el más natural aquí. «A causa de» conserva esa relación sin sonar forzado en español y mantiene la conexión con el versículo anterior.
- source_word: ἀποκειμένην
  english_pob_choice: laid up
  chosen_spanish: guardada
  alternatives_spanish:
  - reservada
  - depositada
  - guardada en reserva
  lexicon: BDAG
  rationale: El participio expresa algo conservado o reservado. «Guardada» es natural en español y conserva la idea de custodia futura sin perder la metáfora de tesoro reservado.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - en favor de ustedes
  - para su beneficio
  lexicon: BDAG
  rationale: El dativo aquí tiene valor de beneficio o ventaja. «Para ustedes» comunica bien esa orientación y es idiomático en español latinoamericano.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  lexicon: BDAG
  rationale: El griego está en plural, y «los cielos» preserva esa forma. Aunque «el cielo» es más común en español devocional, aquí se mantiene la pluralidad del texto fuente.
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: BDAG
  rationale: El relativo concuerda con «esperanza». En español, «que» suena más natural y mantiene la referencia sin añadir énfasis innecesario.
- source_word: προηκούσατε
  english_pob_choice: you heard before
  chosen_spanish: antes oyeron
  alternatives_spanish:
  - oyeron antes
  - ya habían oído
  - oyeron previamente
  lexicon: BDAG
  rationale: El verbo compuesto señala audición anterior. «Antes oyeron» reproduce la prioridad temporal de manera directa y sobria; evita sobrecargar el texto con una expresión más larga.
- source_word: ἐν τῷ λόγῳ τῆς ἀληθείας
  english_pob_choice: in the word of truth
  chosen_spanish: en la palabra de verdad
  alternatives_spanish:
  - en el mensaje de verdad
  - en la palabra verdadera
  lexicon: BDAG
  rationale: «Λόγος» puede ser «palabra» o «mensaje». Dado que el texto siguiente aclara «el evangelio» en aposición, «palabra de verdad» conserva la forma del griego y resulta clara en español.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - las buenas noticias
  lexicon: BDAG
  rationale: 'El genitivo funciona en aposición: «la palabra de verdad, el evangelio». «Evangelio» es la equivalencia estándar y precisa en español cristiano.'
theological_decisions:
- issue: Referencia del relativo
  english_pob_reading: The relative clause refers to 'the hope,' not to the whole preceding idea in a vague way.
  chosen_spanish_reading: La oración relativa «que antes oyeron» se refiere directamente a «la esperanza».
  alternative_spanish_readings:
  - La relativa podría entenderse de manera más amplia como referida al mensaje del evangelio en conjunto.
  rationale: 'El griego usa un relativo femenino singular que concuerda de forma más directa con ἐλπίδα. Mantener esa relación preserva la sintaxis y el énfasis: ellos ya habían oído acerca de esa esperanza en el evangelio.'
  doctrine_reference: Preservar la sintaxis y la tensión textual sin homogeneizarla.
- issue: Plural de οὐρανοῖς
  english_pob_reading: Use 'the heavens' in the main text.
  chosen_spanish_reading: Mantener «los cielos» en el texto principal.
  alternative_spanish_readings:
  - Usar «el cielo» por mayor idiomaticidad.
  rationale: No es una diferencia doctrinal mayor, pero el plural del griego merece conservarse cuando el español lo permite sin dificultad. Así se evita aplanar la forma original.
  doctrine_reference: Primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del expediente inglés, que prefirió una formulación más directa para προηκούσατε («you heard before») y mantuvo 'the heavens' por fidelidad al plural griego. La versión española refleja ese ajuste con «antes oyeron» y conserva «los cielos».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - Se mantiene «evangelio» como término técnico estándar, en aposición a «palabra de verdad».
  - Se evita «SEÑOR» o equivalentes de máscara aquí, porque no aparece κύριος en este versículo.
  - El relativo y la temporalidad se han mantenido cercanos al griego para no borrar el enlace entre «esperanza» y la noticia ya recibida.
