  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: valor causal de διὰ τὴν ἐλπίδα, participio ἀποκειμένην como algo reservado/guardado, dativo ὑμῖν como beneficio, plural «los cielos», y aposición final «la palabra de verdad, el evangelio». También mantiene correctamente que la relativa ἣν se refiere a «esperanza». Sin embargo, «que antes oyeron» no es español natural y además no expresa con suficiente claridad que lo oído fue esa esperanza; conviene explicitarlo con «de la cual ya oyeron» o similar, en línea con la nota léxica inglesa.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «que antes oyeron» suena forzado en español contemporáneo. La colocación adverbial resulta poco idiomática, y el verbo «oír» sin complemento preposicional con «esperanza» puede sonar incompleto. Un ajuste menor mejora naturalidad y precisión sin alejarse del griego.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Evangelio», «palabra de verdad», «los cielos» y «esperanza» son adecuados. La revisión propuesta solo mejora la expresión de προηκούσατε en español.
  issues:
  - severity: medium
    issue: La frase «que antes oyeron» es poco natural en español y deja débilmente expresado el objeto semántico del verbo.
    rationale: Aunque reproduce el orden de prioridad temporal, en español con un antecedente abstracto como «esperanza» normalmente se requiere «oír de/acerca de» o una formulación equivalente. Esto preserva mejor la decisión teológica de que la relativa se refiere a «esperanza».
  - severity: low
    issue: Falta la nota que preserve la alternativa inglesa «que oyeron antes acerca de».
    rationale: El inglés auditado conservó dos matices alternativos para προηκούσατε (previamente/antes, y «about»). En español conviene añadir una nota que preserve la variante con «de la cual ya habían oído» o «acerca de la cual oyeron antes».
