translation:
  language: es
  text: habiendo oído acerca de su fe en Mesías Jesús y del amor que tienen hacia todos los santos[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su confianza en Mesías Jesús» o «su fidelidad en Mesías Jesús». El sustantivo griego pistis puede abarcar estos sentidos relacionados según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: having heard of
  chosen_spanish: habiendo oído de
  alternatives_spanish:
  - después de oír de
  - al oír de
  lexicon: BDAG
  rationale: El participio aoristo funciona como acción previa que introduce el motivo del agradecimiento implícito desde el versículo anterior. En español, «habiendo oído de» conserva esa relación participial y expresa de manera natural que Pablo recibió un informe acerca de la fe y el amor de los colosenses.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Se mantiene «fe» como equivalencia principal de πίστις. El contexto permite captar la confianza creyente en relación con Mesías Jesús, sin borrar la tensión semántica que también puede sugerir confianza o fidelidad.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  - en el Mesías Jesús
  lexicon: BDAG
  rationale: Se conserva la preposición «en» para mantener el valor relacional/local de ἐν. «Mesías» traduce Χριστός conforme a la pauta del proyecto para títulos cristológicos, y «Jesús» conserva el nombre propio.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: «Amor» es el equivalente natural y consistente para ἀγάπη en este contexto paulino. «Caridad» sonaría más eclesiástico y menos fiel al alcance léxico amplio del término.
- source_word: ἣν ἔχετε
  english_pob_choice: that you have
  chosen_spanish: que tienen
  alternatives_spanish:
  - que poseen
  - que ustedes tienen
  lexicon: BDAG
  rationale: La cláusula relativa se mantiene explícita para reflejar que el amor es una realidad presente de los destinatarios. «Tienen» da un español fluido y conserva la referencia directa del pronombre relativo.
- source_word: εἰς πάντας τοὺς ἁγίους
  english_pob_choice: for all the saints
  chosen_spanish: por todos los santos
  alternatives_spanish:
  - para todos los santos
  - hacia todos los santos
  - para todos los creyentes
  lexicon: BDAG
  rationale: Con ἀγάπη, εἰς puede expresar dirección de beneficio o alcance. «Por» funciona bien en español para el amor orientado a otros y preserva la amplitud de πάντας τοὺς ἁγίους sin sustituir «santos» por una paráfrasis más explicativa.
theological_decisions:
- issue: Χριστός como título traducido o forma tradicional fija
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se traduce Χριστός como título, no como nombre fijo, de acuerdo con la pauta doctrinal del proyecto. «Mesías Jesús» conserva el contenido titular y la distinción entre título y nombre propio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
- issue: Posible matiz de πίστις entre fe, confianza y fidelidad
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: La lectura principal permanece como «fe», porque es la opción base del proyecto y encaja en la relación de los colosenses con Mesías Jesús. Se preserva la tensión semántica con alternativas, sin imponer una reducción a solo «fidelidad».
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις'
translation_notes:
  revision_awareness: El borrador inglés más reciente fue revisado entre «Christ Jesus» y «Messiah Jesus»; la restauración de «Messiah» se alinea con la política doctrinal del proyecto para traducir Χριστός como título. El español sigue esa decisión y mantiene además la estructura del participio, la cláusula relativa y la orientación de εἰς hacia todos los santos.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός de manera coherente con la política del proyecto y con el valor titular del texto.
  - Se mantiene «fe» como traducción principal de πίστις, con nota de alternativas para no borrar la amplitud semántica.
  - Se conserva «santos» para ἁγίους, ya que el término funciona como designación paulina estable de los creyentes.
  - La puntuación y el orden buscan una lectura natural en español sin perder las relaciones sintácticas del griego.
