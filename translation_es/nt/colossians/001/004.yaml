    issue: «habiendo oído de» suena poco idiomático en español
    rationale: Aunque reproduce de cerca el inglés auditado, en español neutral moderno «oír de» es menos natural aquí que «oír acerca de» o «tener noticias de». Debe conservarse el participio, pero con una formulación más fluida.
  - severity: medium
    issue: «por todos los santos» es ambiguo para el complemento de amor
    rationale: Con «amor», la preposición «por» puede entenderse bien, pero también puede sonar causal o coloquial. El griego εἰς aquí expresa dirección/objeto del amor; «hacia todos los santos» lo comunica con más precisión en español.
