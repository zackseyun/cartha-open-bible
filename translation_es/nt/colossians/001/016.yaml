    reason: lexical_alternative
  revision_rationale: Se ajusta ἀρχαί a «gobernantes» para seguir la decisión auditada de evitar un término técnico tradicional equivalente a «principalities/principados». Se mejora la naturalidad española usando «todo ... lo visible y lo invisible» en lugar de una cadena dependiente de «cosas» con femeninos forzados. También se simplifica la coordinación de εἴτε ... εἴτε ... y se mantiene intacta la distinción teológica «en él / por medio de él / para él».
