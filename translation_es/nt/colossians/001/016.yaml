revisions:
- from: Porque en él fueron creadas todas las cosas[a], en los cielos[b] y sobre la tierra, las visibles y las invisibles, ya sean tronos, ya sean dominios[c], ya sean principados o ya sean autoridades; todas las cosas han sido creadas por medio de él y para él[d].
  to: Porque en él fue creado todo[a], en los cielos[b] y en la tierra, lo visible y lo invisible, sean tronos, dominios[c], gobernantes o autoridades; todo ha sido creado por medio de él y para él[d].
  rationale: Se ajusta ἀρχαί a «gobernantes» para seguir la decisión auditada de evitar un término técnico tradicional equivalente a «principalities/principados». Se mejora la naturalidad española usando «todo ... lo visible y lo invisible» en lugar de una cadena dependiente de «cosas» con femeninos forzados. También se simplifica la coordinación de εἴτε ... εἴτε ... y se mantiene intacta la distinción teológica «en él / por medio de él / para él».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:15:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura causal y la triple relación con el Hijo: «en él ... por medio de él ... para él». También preserva el plural «los cielos» y el contraste «visible/invisible». Sin embargo, hay dos desajustes importantes con la evidencia y el rastro de auditoría inglés: (1) «fueron creadas / han sido creadas» fuerza femenino por concordar implícitamente con «cosas», mientras que una formulación neutra como «fue creado / ha sido creado» con sujeto pospuesto «todo» o «todo lo creado» evita esa torsión y suena más natural; (2) «principados» no sigue la decisión léxica auditada para ἀρχαί, que prefirió un término moderno equivalente a «rulers», y en español «gobernantes» o similar comunica mejor sin importar jerga tradicional. Además, «las visibles y las invisibles» es menos natural que «lo visible y lo invisible».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta cierta rigidez: la repetición «ya sean ... ya sean ...» funciona, aunque la frase gana naturalidad con «sean ... o ... o ... o ...». La combinación «todas las cosas ... las visibles y las invisibles» suena algo pesada. «Sobre la tierra» es aceptable, pero «en la tierra» empareja mejor con uso español bíblico corriente; aun así, no es un error mayor. La principal mejora de legibilidad está en reemplazar «principados» y en simplificar el sujeto global a «todo».'
  glossary_alignment: 'No hay conflictos con terminología de proyecto como Yahvé/Mesías/etc. La distinción preposicional se conserva correctamente. El problema principal de alineación léxica es ἀρχαί: el borrador usa «principados», mientras que el POB inglés documentó una preferencia deliberada por un equivalente moderno («rulers»), por lo que en español conviene «gobernantes». «Dominios» para κυριότητες es defendible con nota alternativa «señoríos».'
  issues:
  - severity: medium
    issue: «principados» para ἀρχαί
    rationale: El rastro léxico inglés rechazó el equivalente tradicional «principalities» por menos accesible y prefirió «rulers». En español «principados» reintroduce precisamente ese tono técnico/tradicional que la auditoría quiso evitar.
  - severity: medium
    issue: Concordancia femenina forzada en «fueron creadas ... han sido creadas»
    rationale: Aunque puede justificarse por «cosas», el griego tiene neutro plural τὰ πάντα. En español bíblico natural, «todo fue creado ... todo ha sido creado» o «todas las cosas fueron creadas» es posible, pero el resto de la oración («las visibles y las invisibles») hace más pesada la construcción. Conviene una formulación más natural y compacta.
  - severity: low
    issue: «las visibles y las invisibles» suena menos idiomático
    rationale: «Lo visible y lo invisible» expresa mejor los adjetivos sustantivados en español y evita una dependencia implícita de «cosas».
  - severity: low
    issue: La secuencia «ya sean ... ya sean ... ya sean o ya sean ...» es algo cargada
    rationale: Una coordinación más simple con «sean ... o ... o ... o ...» mantiene la exhaustividad sin sonar repetitiva.
  revised_spanish_text: Porque en él fue creado todo[a], en los cielos[b] y en la tierra, lo visible y lo invisible, sean tronos, dominios[c], gobernantes o autoridades; todo ha sido creado por medio de él y para él[d].
  revised_footnotes:
