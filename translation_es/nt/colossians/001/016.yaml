translation:
  language: es
  text: Porque en él fue creado todo[a], en los cielos[b] y en la tierra, lo visible y lo invisible, sean tronos, dominios[c], gobernantes o autoridades; todo ha sido creado por medio de él y para él[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque en él todas las cosas fueron creadas».'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «en los cielos» (plural).
    reason: lexical_alternative
  - marker: c
    text: 'O: «señoríos»; los términos probablemente designan rangos de autoridad creados.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «y hacia él»; «para él» expresa la meta de la creación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón o fundamento de la afirmación anterior; «Porque» conserva la fuerza causal de ὅτι y suena natural en español.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por medio de él
  - en unión con él
  lexicon: BDAG
  rationale: Se conserva ἐν como «en» para no confundirlo con el valor instrumental que aparece después en δι’ αὐτοῦ; la distinción del griego queda visible en español.
- source_word: ἐκτίσθη
  english_pob_choice: were created
  chosen_spanish: fueron creadas
  alternatives_spanish:
  - fue creada
  - han sido creadas
  lexicon: BDAG
  rationale: El sujeto τὰ πάντα es plural; en español conviene concordar con plural. El aoristo pasivo se puede expresar naturalmente con pasado simple pasivo.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  lexicon: BDAG
  rationale: «Todas las cosas» comunica la amplitud total sin reducirla a un solo ámbito. Mantiene el alcance cósmico de πᾶς / πάντα.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: BDAG
  rationale: Se preserva el plural del griego con «los cielos». Es más fiel que singularizarlo como «el cielo» y es idiomático en español bíblico.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra y sobre ella
  lexicon: BDAG
  rationale: Con ἐπί + genitivo, «sobre la tierra» refleja bien la relación espacial y mantiene el paralelo con «en los cielos».
- source_word: τὰ ὁρατὰ καὶ τὰ ἀόρατα
  english_pob_choice: the visible and the invisible
  chosen_spanish: las visibles y las invisibles
  alternatives_spanish:
  - lo visible y lo invisible
  - las cosas visibles y las invisibles
  lexicon: BDAG
  rationale: Los adjetivos funcionan sustantivadamente; el femenino plural en español concuerda con «cosas» implícito y conserva la oposición categorial.
- source_word: θρόνοι
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - tronos celestiales
  lexicon: BDAG
  rationale: Se mantiene el término literal para no especificar más de lo que dice el texto. Puede aludir a rangos de autoridad dentro del orden creado.
- source_word: κυριότητες
  english_pob_choice: dominions
  chosen_spanish: dominios
  alternatives_spanish:
  - señoríos
  - lordazgos
  lexicon: BDAG
  rationale: «Dominios» es una opción clara y relativamente neutra para esta categoría de potestades; evita el sesgo de un término más eclesiástico o más interpretativo.
- source_word: ἀρχαὶ
  english_pob_choice: rulers
  chosen_spanish: principados
  alternatives_spanish:
  - gobernantes
  - ruleres
  lexicon: BDAG
  rationale: Se adopta un término tradicional para mantener el paralelo con la serie de potestades. Aunque «gobernantes» sería más transparente, «principados» preserva el matiz técnico de la lista.
- source_word: ἐξουσίαι
  english_pob_choice: authorities
  chosen_spanish: autoridades
  alternatives_spanish:
  - potestades
  - poderes
  lexicon: BDAG
  rationale: «Autoridades» es claro y mantiene la categoría de poder/jurisdicción. En contexto evita confundirlo con ἀρχαί y se entiende bien en español moderno.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - a través de él
  - mediante él
  lexicon: BDAG
  rationale: «Por medio de él» expresa con claridad el valor instrumental/mediador de διά con genitivo y suena natural en español bíblico contemporáneo.
- source_word: εἰς αὐτόν
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: BDAG
  rationale: «Para él» comunica la meta o finalidad de la creación y preserva la fuerza teleológica del griego mejor que una formulación meramente direccional.
- source_word: ἔκτισται
  english_pob_choice: have been created
  chosen_spanish: han sido creadas
  alternatives_spanish:
  - fueron creadas
  - están creadas
  lexicon: BDAG
  rationale: El perfecto pasivo señala una acción cumplida con resultado vigente; «han sido creadas» conserva mejor ese valor que un simple pasado.
theological_decisions:
- issue: Relación del Hijo con la creación en las tres frases preposicionales (ἐν αὐτῷ / δι’ αὐτοῦ / εἰς αὐτόν)
  english_pob_reading: Preserve the distinct wording 'in him ... through him ... for him' without collapsing the phrases into a single explanatory paraphrase.
  chosen_spanish_reading: Conservar «en él ... por medio de él ... para él» sin fusionar los tres matices en una sola paráfrasis.
  alternative_spanish_readings:
  - en unión con él ... por medio de él ... hacia él
  - en él ... por él ... para él
  rationale: El griego distingue esfera, mediación y finalidad. La traducción española debe mantener esa tensión y no resolverla con una sola explicación interpretativa.
  doctrine_reference: Principio de preservar la tensión teológica y la variación preposicional del original.
- issue: Naturaleza de «tronos ... dominios ... principados ... autoridades»
  english_pob_reading: Render them as created ranks or powers without specifying whether they are exclusively angelic, spiritual, or earthly.
  chosen_spanish_reading: Presentarlos como rangos o potestades creadas sin definir si son exclusivamente angelicales, espirituales o terrenales.
  alternative_spanish_readings:
  - órdenes angelicales
  - estructuras políticas humanas
  rationale: La lista es deliberadamente amplia; el texto nombra categorías de autoridad dentro del orden creado, pero no restringe su ontología aquí. La traducción no debe estrechar ese alcance.
  doctrine_reference: Evitar importar conclusiones doctrinales no explicitadas por el versículo.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se evita una división innecesaria por signos de puntuación fuertes y se conserva una sola oración con ritmo de enumeración y cierre teleológico. También se mantiene la distinción entre las tres frases preposicionales sin simplificarlas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en este proyecto, pero en este versículo no aparece.
  - Se preserva el plural «cielos» para reflejar οὐρανοῖς.
  - Se mantiene una serie de potestades en registro bíblico y comprensible para lectores eclesiales.
  - Se evita alternar entre «autoridades» y «potestades» dentro del mismo versículo para no desdibujar la lista griega.
