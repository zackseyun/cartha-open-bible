  revision_rationale: 'Se reemplaza «esclavo» por «servidor» para reflejar fielmente διάκονος sin importar el matiz de δοῦλος. Se cambia «administración de Dios» por «mayordomía de Dios» porque comunica mejor la idea de una responsabilidad encomendada por Dios a Pablo. Se añade la nota documentada para πληρῶσαι, preservando la tensión semántica reconocida por el expediente inglés. No se requiere adjudicación adicional: la corrección es clara, local y respaldada por el material fuente.'
