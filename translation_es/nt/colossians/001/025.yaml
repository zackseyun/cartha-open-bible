revisions:
- from: de la cual llegué a ser esclavo[a], según la administración de Dios[b] que me fue dada para ustedes, para cumplir la palabra de Dios.
  to: de la cual llegué a ser servidor, según la mayordomía de Dios que me fue dada para ustedes, para cumplir[a] la palabra de Dios,
  rationale: 'Se reemplaza «esclavo» por «servidor» para reflejar fielmente διάκονος sin importar el matiz de δοῦλος. Se cambia «administración de Dios» por «mayordomía de Dios» porque comunica mejor la idea de una responsabilidad encomendada por Dios a Pablo. Se añade la nota documentada para πληρῶσαι, preservando la tensión semántica reconocida por el expediente inglés. No se requiere adjudicación adicional: la corrección es clara, local y respaldada por el material fuente.'
