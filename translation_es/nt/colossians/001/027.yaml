source:
  edition: SBLGNT
  text: οἷς ἠθέλησεν ὁ θεὸς γνωρίσαι τί τὸ πλοῦτος τῆς δόξης τοῦ μυστηρίου τούτου ἐν τοῖς ἔθνεσιν, ⸀ὅ ἐστιν Χριστὸς ἐν ὑμῖν, ἡ ἐλπὶς τῆς δόξης·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/027.yaml
  text: To them God chose to make known what is the riches of the glory of this mystery among the Gentiles[a], which is Messiah in you[b], the hope of glory.
  footnotes:
  - marker: a
    text: Or 'among you.' The Greek phrase can refer either to Christ's presence among the Gentiles as a people or to Christ in believers.
    reason: alternative_reading
  - marker: b
    text: Or 'what is the riches'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
