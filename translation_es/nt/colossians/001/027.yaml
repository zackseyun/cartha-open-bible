review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro POB en casi todos los puntos clave: «A ellos», «Dios quiso dar a conocer», «misterio», «entre los gentiles», «el Mesías», «en ustedes» y «la esperanza de gloria» preservan adecuadamente el sentido y la ambigüedad relevante. La nota sobre ἐν ὑμῖν también conserva correctamente la alternativa «entre ustedes».'
  spanish_quality_summary: La frase principal es generalmente clara y natural, pero el segmento «qué es la riqueza de la gloria» suena poco idiomático y además reduce πλοῦτος a singular («riqueza») cuando el sustantivo griego normalmente se expresa mejor en español como plural contable o colectivo («riquezas»). Una pequeña reparación mejora la legibilidad sin apartarse del sentido comprimido del original.
  glossary_alignment: 'La terminología del proyecto está bien respetada: Χριστός → «Mesías», θεός → «Dios», μυστήριον → «misterio», ἔθνη → «gentiles». No hay conflictos con las políticas doctrinales. La única corrección recomendada es estilístico-lexical en πλοῦτος.'
  issues:
  - severity: medium
    issue: «qué es la riqueza de la gloria» suena forzado y reduce indebidamente «πλοῦτος» a singular
    rationale: Aunque el griego tiene una construcción comprimida, en español «riqueza» aquí suena menos natural y menos fiel al valor usual de πλοῦτος en este contexto paulino. «Cuáles son las riquezas de la gloria» comunica mejor el contenido sin perder el énfasis del original.
  - severity: low
    issue: La nota [b] queda innecesariamente débil si el texto principal ya usa una formulación muy cercana al griego pero poco natural
    rationale: Conviene ajustar la nota para explicar que otra posibilidad más literal sería «qué es la riqueza», en vez de dejarla como simple repetición poco informativa.
  revised_spanish_text: A ellos Dios quiso dar a conocer cuáles son las riquezas de la gloria de este misterio entre los gentiles[a], que es el Mesías en ustedes, la esperanza de gloria.
  revised_footnotes:
  - marker: a
    text: O «entre ustedes». La frase griega puede referirse ya sea al Mesías presente entre los gentiles como pueblo, ya sea al Mesías en los creyentes.
    reason: alternative_reading
  revision_rationale: Se revisa únicamente la construcción de τί τὸ πλοῦτος τῆς δόξης para un español más natural y fiel al valor semántico de πλοῦτος en contexto («riquezas»). Se elimina la nota [b] porque en español ya no hace falta sostener una formulación principal tan rígidamente calcada; se conserva solo la nota necesaria sobre la ambigüedad de ἐν ὑμῖν.
