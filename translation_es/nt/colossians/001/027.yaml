    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:42:22Z'
    unchanged: false
    changes_summary: 'Changed ''are'' to ''is'' to match the singular construction with ''what''; replaced ''the Messiah'' with ''Christ'' for direct lexical correspondence; changed the colon to a comma for smoother formal English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: A ellos Dios quiso dar a conocer cuáles son las riquezas de la gloria de este misterio entre los gentiles[a], que es el Mesías en ustedes, la esperanza de gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre ustedes». La frase griega puede referirse ya sea al Mesías presente entre los gentiles como pueblo, ya sea al Mesías en los creyentes.
    reason: alternative_reading
lexical_decisions:
- source_word: οἷς
  english_pob_choice: To them
  chosen_spanish: A ellos
  alternatives_spanish:
  - a quienes
  - entre quienes
  lexicon: BDAG
  rationale: El dativo relativo retoma a los destinatarios del versículo anterior y funciona como complemento indirecto de γνωρίσαι. «A ellos» conserva esa relación de destinatario en un español natural.
- source_word: ἠθέλησεν
  english_pob_choice: chose
  chosen_spanish: quiso
  alternatives_spanish:
  - decidió
  - tuvo a bien
  - eligió
  lexicon: BDAG
  rationale: θέλω puede expresar querer, desear o decidir soberanamente. «Quiso» comunica intención deliberada de Dios sin introducir una elección interpretativa más fuerte que el griego exige.
- source_word: γνωρίσαι
  english_pob_choice: to make known
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - hacer saber
  - revelar
  lexicon: BDAG
  rationale: «Dar a conocer» reproduce bien el sentido de γνωρίζω como hacer saber algo previamente no divulgado. «Revelar» sería posible, pero añade un matiz más técnico que no es necesario aquí.
- source_word: τί τὸ πλοῦτος τῆς δόξης
  english_pob_choice: what is the riches of the glory
  chosen_spanish: qué es la riqueza de la gloria
  alternatives_spanish:
  - cuáles son las riquezas de la gloria
  - cuán grandes son las riquezas gloriosas
  lexicon: BDAG
  rationale: El griego tiene una construcción comprimida y algo difícil. En español, «qué es la riqueza de la gloria» mantiene la estructura interrogativa y evita forzar el singular/plural de «riqueza/riquezas» más allá de lo que el sintagma permite.
- source_word: μυστηρίου
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: En el uso paulino, μυστήριον se refiere a un propósito divino antes oculto y ahora dado a conocer. «Misterio» conserva esa tradición semántica sin reducirlo a simple «secreto».
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_spanish: entre los gentiles
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos gentiles
  lexicon: BDAG
  rationale: En contexto paulino, ἔθνη suele contrastar con Israel y designa a los no judíos. «Gentiles» preserva ese contraste mejor que «naciones».
- source_word: ὅ ἐστιν
  english_pob_choice: which is
  chosen_spanish: que es
  alternatives_spanish:
  - el cual es
  - es decir
  lexicon: BDAG
  rationale: La cláusula explicativa identifica el misterio. «Que es» refleja con claridad la relación relativa y su función definitoria en español.
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la guía doctrinal del proyecto, Χριστός se rinde normalmente como «Mesías» cuando funciona como título. Aquí no actúa como nombre fijo, sino como identificación del contenido del misterio.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  lexicon: BDAG
  rationale: La frase admite una lectura corporativa («entre ustedes») o personal/plural («en ustedes»). Se conserva «en ustedes» para no resolver la tensión interpretativa y porque es la correspondencia más directa del griego.
- source_word: ἡ ἐλπὶς τῆς δόξης
  english_pob_choice: the hope of glory
  chosen_spanish: la esperanza de gloria
  alternatives_spanish:
  - la esperanza de la gloria
  - la esperanza para la gloria
  lexicon: BDAG
  rationale: La expresión genitiva compacta se expresa de forma natural en español como «la esperanza de gloria». Mantiene la densidad del original sin expandir innecesariamente la frase.
theological_decisions:
- issue: Renderizar Χριστός en este contexto
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El término funciona como título en la cláusula explicativa del misterio. Traducirlo como «Mesías» sigue la política doctrinal del proyecto y evita convertirlo en un nombre casi propio por mera tradición eclesial.
  doctrine_reference: 'DOCTRINE.md: Χριστός se traduce por defecto como ''Mesías'' cuando es título; ''Cristo'' solo en usos fijados o por exigencia idiomática'
- issue: Ambigüedad de ἐν ὑμῖν
  english_pob_reading: in you
  chosen_spanish_reading: en ustedes
  alternative_spanish_readings:
  - entre ustedes
  rationale: El griego permite una lectura individual/plural o corporativa/comunitaria. La traducción principal conserva la ambigüedad con «en ustedes» y no la resuelve en el texto principal, para preservar la tensión documentada por el POB en inglés.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones teológicas o semánticas cuando el texto original las permite'
translation_notes:
  revision_awareness: El audit trail en inglés muestra una oscilación entre 'Christ' y 'Messiah' para Χριστός, con corrección final a 'Messiah' por consistencia doctrinal. También registra la tensión de ἐν ὑμῖν ('in you' / 'among you') y una revisión estilística sobre la construcción de 'what is/are the riches'. La versión española mantiene esa ambigüedad sin sobreexplicarla y adopta 'Mesías' conforme a la política del proyecto.
  spanish_consistency_notes:
  - He mantenido «Dios» para θεός y «gentiles» para ἔθνεσιν, coherente con el registro del proyecto.
  - «Mesías» se usa como título, no como nombre propio fijo, en línea con la política doctrinal.
  - La puntuación y el orden sintáctico buscan legibilidad natural en español sin alejarse del paralelismo del griego.
  - Se evita «SEÑOR» porque este versículo no contiene κύριος ni una cita directa del nombre divino.
