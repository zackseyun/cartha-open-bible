translation:
  language: es
  text: y quien también nos dio a conocer su amor en el Espíritu[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su amor en espíritu», es decir, su amor espiritual.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ... δηλώσας
  english_pob_choice: who also made known
  chosen_spanish: quien también nos dio a conocer
  alternatives_spanish:
  - quien también informó
  - quien también reveló
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva y retoma a Epafras del versículo anterior. En español, una cláusula relativa con ‘quien’ reproduce bien esa función. ‘Dar a conocer’ mantiene el sentido de δηλόω como comunicar o hacer saber, sin cargarlo de más fuerza que la del original.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: La partícula añade la acción de Epafras respecto de lo dicho antes; ‘también’ refleja mejor el valor aditivo en español que un simple ‘y’ dentro de la cláusula relativa.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo funciona como complemento indirecto; en español pronominal ‘nos’ es natural y fiel, mientras que ‘a nosotros’ sería más enfático.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor cristiano
  lexicon: BDAG
  rationale: ἀγάπη se traduce por el término estándar ‘amor’, que conserva la amplitud semántica y evita añadir calificaciones no presentes en el texto.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  - espiritualmente
  lexicon: BDAG
  rationale: Se preserva la mayúscula para reflejar la lectura preferida en la POB inglesa, que entiende aquí probablemente una referencia al Espíritu Santo. El español permite mantener la misma tensión entre la lectura pneumatológica y la alternativa más general.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: the Holy Spirit is the most likely referent in 'your love in the Spirit'
  chosen_spanish_reading: el Espíritu Santo es el referente más probable en ‘vuestro amor en el Espíritu’
  alternative_spanish_readings:
  - vuestro amor en espíritu
  - vuestro amor espiritual
  rationale: La versión principal conserva la lectura preferida por la POB inglesa y no disuelve la ambigüedad. Al mismo tiempo, la nota admite la lectura alternativa de una cualidad o esfera espiritual del amor, preservando la tensión teológica documentada.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El inglés POB no requirió revisión reciente; el pasaje quedó marcado como de alta concordancia, sin cambios en la última pasada. La redacción española sigue la misma lectura principal y conserva la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene ‘Espíritu’ con mayúscula para concordar con la lectura principal de la POB inglesa.
  - Se usa ‘dar a conocer’ para δηλόω, evitando tanto ‘revelar’ como ‘informar’ por su mayor neutralidad.
  - ‘Vuestro’ sigue el registro eclesial general y coincide con el destinatario plural del pasaje.
