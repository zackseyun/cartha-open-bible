translation:
  language: es
  text: Y él es antes de todas las cosas[a], y en él todas las cosas[b] se mantienen unidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Antes de todas las cosas» también puede sugerir supremacía sobre todas las cosas, pero el griego expresa primariamente prioridad.
    reason: alternative_reading
  - marker: b
    text: O «coheren en él» o «consisten en él». Se prefiere «se mantienen unidas» por ser más clara y natural en español actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτός
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - él es el que
  lexicon: BDAG
  rationale: El pronombre es enfático en griego, pero en español normal la fuerza enfática puede quedar bien expresada con «él» sin añadir una expansión innecesaria.
- source_word: πρὸ πάντων
  english_pob_choice: before all things
  chosen_spanish: antes de todas las cosas
  alternatives_spanish:
  - antes que todas las cosas
  - por encima de todas las cosas
  lexicon: BDAG
  rationale: «Antes de» comunica con precisión la prioridad temporal que el griego expresa de manera primaria. «Por encima de» desplazaría el sentido hacia supremacía de rango y sería menos exacto como lectura principal.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  lexicon: BDAG
  rationale: La expresión es amplia y total; «todas las cosas» conserva la repetición del contexto y evita restringir el alcance.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por él
  - por medio de él
  lexicon: BDAG
  rationale: El griego permite matiz locativo o de esfera, y la redacción española debe conservar «en» sin reemplazarlo por una interpretación más explicativa.
- source_word: συνέστηκεν
  english_pob_choice: hold together
  chosen_spanish: permanecen unidas
  alternatives_spanish:
  - se mantienen cohesionadas
  - cohesionan
  lexicon: BDAG
  rationale: El perfecto griego indica un estado presente resultante; «permanecen unidas» comunica la idea de cohesión continua en español natural. «Consisten» sería tradicional pero opaco; «cohesionan» suena técnico y menos idiomático.
theological_decisions:
- issue: Relación del Hijo con la creación en πρὸ πάντων
  english_pob_reading: Temporal priority ('before all things') is expressed in the main text, with ontological implication left implicit rather than expanded.
  chosen_spanish_reading: La traducción expresa prioridad temporal («antes de todas las cosas») y deja implícita la implicación de supremacía sin ampliarla en paráfrasis.
  alternative_spanish_readings:
  - por encima de todas las cosas
  rationale: El griego indica primariamente prioridad; el contexto de Colosenses 1:15–20 sostiene una cristología elevada, pero la traducción debe preservar el valor directo del texto.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3
- issue: Fuerza de συνέστηκεν
  english_pob_reading: Cosmic cohesion/sustaining order ('all things hold together')
  chosen_spanish_reading: «Permancen unidas» comunica la cohesión sostenida de todo lo creado en él.
  alternative_spanish_readings:
  - consisten en él
  - cohesionan en él
  rationale: La cláusula presenta al Hijo como el sustentador de la cohesión del universo. La formulación española busca claridad moderna sin perder la carga teológica.
  doctrine_reference: Afirmaciones; filosofía de traducción §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] dentro del texto español, manteniendo la lectura principal de prioridad temporal y cohesión sostenida sin ampliar indebidamente el original.
  spanish_consistency_notes:
  - Se mantiene «él» para αὐτός en un registro natural y reverente.
  - Se conserva «todas las cosas» para τὰ πάντα, evitando estrechar el alcance.
  - No se reemplaza «en él» por una lectura instrumental, para respetar el griego.
  - La elección de «antes de» y «permanecen unidas» busca claridad pública sin perder la tensión teológica del pasaje.
