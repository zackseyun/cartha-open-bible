translation:
  language: es
  text: en quien tenemos redención[a], el perdón de los pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación» para ambos términos; Pablo probablemente usa «perdón de los pecados» para especificar en qué consiste aquí esta redención.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en el cual
  - en el que
  lexicon: BDAG
  rationale: El relativo es masculino singular dativo y remite al Hijo amado del versículo anterior; por eso, como en el inglés POB, conviene una referencia personal. «En quien» conserva mejor la unión relacional que una forma más impersonal como «en el cual».
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  lexicon: BDAG
  rationale: El presente indicativo expresa posesión real y actual del beneficio. «Tenemos» es la forma más natural en español y evita añadir una intensidad interpretativa que «poseemos» podría sugerir.
- source_word: ἀπολύτρωσιν
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Redención» es el equivalente español más establecido para ἀπολύτρωσις y conserva el peso teológico de una liberación obtenida con costo. «Liberación» o «rescate» son posibles, pero no reflejan tan bien el valor paulino del término.
- source_word: ἄφεσιν
  english_pob_choice: forgiveness
  chosen_spanish: perdón
  alternatives_spanish:
  - liberación
  - pardon
  lexicon: BDAG
  rationale: Aquí ἄφεσις funciona en aposición a ἀπολύτρωσις y especifica en qué consiste esa redención. «Perdón» es la equivalencia natural en español en este contexto moral; «liberación» sería más ambigua y «pardon» menos idiomática.
- source_word: τῶν ἁμαρτιῶν
  english_pob_choice: of sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de pecado
  - de las faltas
  lexicon: BDAG
  rationale: El genitivo plural nombra el objeto del perdón. «De los pecados» respeta tanto el plural como el uso normal del español, sin suavizar el alcance moral del término.
theological_decisions:
- issue: Relación entre «redención» y «perdón de los pecados»
  english_pob_reading: 'Render the second noun phrase appositionally: ''redemption, the forgiveness of sins.'''
  chosen_spanish_reading: 'Traducir la segunda frase como aposición: «redención, el perdón de los pecados».'
  alternative_spanish_readings:
  - «redención, es decir, el perdón de los pecados»
  - «redención mediante el perdón de los pecados»
  rationale: El griego pone τὴν ἄφεσιν τῶν ἁμαρτιῶν en aposición a τὴν ἀπολύτρωσιν. La traducción mantiene esa identificación sin explicar de más ni resolver la tensión teológica que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica y la estructura appositiva del texto.
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el texto griego SBLGNT y coincide con la evaluación de alta concordancia del registro inglés POB; no se requirieron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «redención» para ἀπολύτρωσις y «perdón» para ἄφεσις, conservando la distinción que el griego presenta aunque la segunda expresión aclare la primera.
  - «En quien» preserva la referencia personal al antecedente masculino singular, coherente con el contexto cristológico inmediato.
  - Se evita «Cristo» o «Señor» porque este versículo no los contiene; la referencia recae en el Hijo del versículo precedente.
