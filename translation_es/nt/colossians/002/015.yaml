translation:
  language: es
  text: Habiendo desarmado[a] a los gobernantes y a las autoridades, los exhibió públicamente[b][c], triunfando sobre ellos en ella[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo despojado» o «habiéndolos despojado». El verbo también puede pintar la idea de desvestir o quitar la fuerza a poderes hostiles.
    reason: lexical_alternative
  - marker: b
    text: O «los expuso abiertamente» o «los puso en vergüenza pública».
    reason: lexical_alternative
  - marker: c
    text: O «llevándolos en triunfo». El verbo evoca una procesión triunfal romana.
    reason: cultural_note
  - marker: d
    text: O «en él», posiblemente refiriéndose a Cristo; también puede entenderse como referencia a la cruz mencionada en el versículo anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκδυσάμενος
  english_pob_choice: having disarmed
  chosen_spanish: habiendo despojado[a]
  alternatives_spanish:
  - habiendo desarmado
  - habiendo despojado
  lexicon: BDAG
  rationale: El participio admite la idea de despojar o quitarse de encima, y en este contexto de poderes hostiles el POB inglés opta por la imagen de privarlos de su fuerza. En español, «despojado» conserva mejor la imagen verbal de desvestir/despojar que «desarmado», y permite mantener abierta la tensión entre quitarles poder y despojarlos de su investidura; la nota preserva la alternativa de sentido.
- source_word: ἀρχὰς
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los principados
  - los poderes
  lexicon: BDAG
  rationale: En Colosenses la expresión apunta probablemente a poderes personales o suprahumanos, pero «gobernantes» es una forma clara y amplia en español que evita tanto el tecnicismo eclesiástico «principados» como una abstracción excesiva. Mantiene el paralelo con «autoridades».
- source_word: ἐξουσίας
  english_pob_choice: the authorities
  chosen_spanish: las autoridades
  alternatives_spanish:
  - los poderes
  - las potestades
  lexicon: BDAG
  rationale: «Autoridades» reproduce bien la fuerza de ἐξουσίαι en un registro moderno y conserva el emparejamiento natural con ἀρχαί. «Potestades» sería más tradicional, pero menos transparente para un lector actual.
- source_word: ἐδειγμάτισεν
  english_pob_choice: he made a public spectacle of
  chosen_spanish: los exhibió públicamente[b][c]
  alternatives_spanish:
  - los expuso públicamente
  - los puso en vergüenza pública
  lexicon: BDAG
  rationale: El verbo expresa mostrar como ejemplo o exponer de manera pública. «Exhibió públicamente» comunica el acto visible sin añadir más carga emocional que «poner en vergüenza», y admite bien la doble matización de exposición abierta y desfile triunfal.
- source_word: ἐν παρρησίᾳ
  english_pob_choice: publicly
  chosen_spanish: públicamente
  alternatives_spanish:
  - abiertamente
  - con franqueza
  lexicon: BDAG
  rationale: Aquí παρρησία modifica la exposición de los poderes derrotados y el sentido natural en español es «públicamente». Aunque el término puede significar valentía/franqueza en otros contextos, en esta construcción la referencia al acto abierto es la más fiel.
- source_word: θριαμβεύσας
  english_pob_choice: triumphing over
  chosen_spanish: triunfando sobre ellos[d]
  alternatives_spanish:
  - llevándolos en triunfo
  - celebrando su triunfo sobre ellos
  lexicon: BDAG
  rationale: El verbo evoca la procesión triunfal romana. «Triunfando sobre ellos» conserva la imagen de victoria de forma natural en español; la nota conserva la alternativa histórica de «llevar en triunfo» para no perder la alusión cultural.
- source_word: ἐν αὐτῷ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en eso
  - en la cruz
  lexicon: BDAG
  rationale: La forma griega es ambigua; en el contexto inmediato puede referirse a Cristo o a la cruz de 2:14. El español «en él» respeta el dativo masculino singular de manera directa y deja abierta la identificación precisa, que se preserva en la nota.
theological_decisions:
- issue: Identidad de «los gobernantes y las autoridades»
  english_pob_reading: hostile cosmic/spiritual powers
  chosen_spanish_reading: poderes hostiles, probablemente espirituales o cósmicos
  alternative_spanish_readings:
  - autoridades humanas
  - gobernantes terrenales
  rationale: Colosenses suele usar esta pareja para poderes suprahumanos, aunque el lenguaje puede rozar también autoridades terrestres. La traducción mantiene términos suficientemente amplios para no cerrar indebidamente el alcance, y la formulación «gobernantes... autoridades» permite esa lectura sin imponerla.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Referente de ἐν αὐτῷ
  english_pob_reading: in it
  chosen_spanish_reading: en él
  alternative_spanish_readings:
  - en eso
  - en la cruz
  rationale: El griego no obliga a una sola identificación. Dado que el antecedente inmediato más discutido es la cruz del v. 14, la lectura principal en español conserva la ambigüedad sin resolverla dogmáticamente, mientras la nota preserva la alternativa contextualmente fuerte.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa que favorece la ambigüedad final con «it»/«en it» en lugar de resolverla como «in him». También conserva la línea interpretativa del POB de ver ἀπεκδυσάμενος como despojar o desarmar poderes hostiles, y de ἐδειγμάτισεν como exposición pública con matiz de escarnio o exhibición triunfal.
  spanish_consistency_notes:
  - Se mantuvo «autoridades» para ἐξουσίαι por coherencia con el par paulino y por claridad moderna.
  - Se evitó «principados y potestades» como terminología eclesiástica tradicional no requerida por el griego ni por el audit trail.
  - Se prefirió «públicamente» para παρρησίᾳ por ser el valor contextual primario aquí.
  - La preposición final quedó en forma breve y natural («en él») sin cerrar el referente.
  - Se preservó la tensión entre despojar, exponer y triunfar, en vez de reducir el versículo a una sola imagen.
