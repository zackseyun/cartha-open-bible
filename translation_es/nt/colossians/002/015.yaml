- from: Habiendo despojado[a] a los gobernantes y a las autoridades, los exhibió públicamente[b][c], triunfando sobre ellos[d] en él.
  to: Habiendo desarmado[a] a los gobernantes y a las autoridades, los exhibió públicamente[b][c], triunfando sobre ellos en ella[d].
  rationale: 'Se ajustó el texto principal para seguir la decisión léxica y la revisión aplicada del POB auditado: «desarmado» como sentido principal de ἀπεκδυσάμενος en este contexto de poderes hostiles, y una referencia final femenina contextual («en ella») que en español apunta naturalmente a la cruz implícita del v. 14. Se conservaron en notas las alternativas relevantes de despojar y de «en él».'
