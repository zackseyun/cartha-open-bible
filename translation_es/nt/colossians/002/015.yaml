review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del versículo y conserva las alternativas léxicas importantes, pero no sigue de forma consistente el expediente auditado del POB en dos puntos clave: invierte la preferencia principal de ἀπεκδυσάμενος al poner «despojado» en el texto y «desarmado» en nota, y mantiene «en él» aunque la revisión aplicada del POB inglés fijó como texto principal «in it» con nota alternativa. Además, la nota d usa «en eso», que suena impreciso en español bíblico y no representa bien la alternativa contextual «en la cruz».'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para ajustarse mejor al sentido principal documentado y a la naturalidad. «Habiendo desarmado» expresa con más claridad la idea contextual de privar de poder a los poderes hostiles. «En ella» resulta más natural que «en eso» para referirse a «la cruz» implícita del versículo anterior. El resto del verso suena bien en un registro moderno y digno.
  glossary_alignment: No hay conflictos con los términos de proyecto como Yahvé/Mesías/etc. Sí hay una desalineación con la decisión léxica documentada del POB para ἀπεκδυσάμενος («having disarmed») y con la revisión aplicada para ἐν αὐτῷ como lectura principal contextualizada hacia la cruz. «Gobernantes y autoridades» es aceptable, aunque «gobernantes» podría debatirse frente a «principados» o «poderes»; no exige adjudicación adicional.
  issues:
  - severity: high
    issue: La elección principal para ἀπεκδυσάμενος no sigue la decisión auditada del POB.
    rationale: El POB inglés eligió como texto principal «having disarmed» y dejó «having stripped off» como alternativa en nota. El español invierte esa relación con «Habiendo despojado» en el texto y «habiendo desarmado» en nota.
  - severity: high
    issue: La frase final «en él» contradice la revisión aplicada del expediente inglés.
    rationale: El historial de revisiones cambió expresamente el texto principal de «in him» a «in it» para reflejar mejor el contexto. El español mantiene «en él», por lo que no preserva la decisión auditada más reciente.
  - severity: medium
    issue: La nota d usa «en eso», formulación poco natural e imprecisa.
    rationale: Si la alternativa al texto principal es la referencia a la cruz, en español es mejor explicitar «en la cruz» o al menos «en ella», no «en eso».
  revised_spanish_text: Habiendo desarmado[a] a los gobernantes y a las autoridades, los exhibió públicamente[b][c], triunfando sobre ellos en ella[d].
