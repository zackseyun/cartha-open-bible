base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/015.yaml
  text: Having disarmed the rulers and the authorities[a], he made a public spectacle of them[d][c][b], triumphing over them in it.
  footnotes:
  - marker: a
    text: Or 'having stripped off the rulers and the authorities.' The verb can picture divesting or disarming hostile powers.
    reason: lexical_alternative
  - marker: b
    text: Or 'he exposed them openly' or 'he put them to open shame.'
    reason: lexical_alternative
  - marker: c
    text: Or 'leading them in triumph.' The verb evokes a Roman triumphal procession.
    reason: cultural_note
  - marker: d
    text: Or 'in it,' possibly referring to the cross mentioned in the previous verse.
    reason: alternative_reading
