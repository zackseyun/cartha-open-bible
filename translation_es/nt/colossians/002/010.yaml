review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: mantiene el enlace con el versículo anterior, la unión con Cristo en «en él», el valor resultativo del perfecto pasivo en πεπληρωμένοι, y conserva la metáfora de «cabeza». Sin embargo, «todo principado» se aparta del rastro léxico auditado, que entiende ἀρχή aquí con sentido más personal/de poder gobernante («ruler»), no como abstracción institucional o término tradicional fijo. Además, en español «han sido llenados» suena algo incompleto sin complemento; una formulación como «han recibido plenitud» o «han sido llenos» comunica mejor el sentido en español natural.'
  spanish_quality_summary: El texto es claro, pero «ustedes han sido llenados» resulta poco idiomático en español bíblico general porque normalmente pide un complemento («llenados de...»). También «quien» después de coma es posible, pero «él, que es...» fluye mejor en español. «Cabeza» está bien conservado. «Principado» es inteligible en contexto eclesial, pero suena más tradicional/abstracto que el sentido auditado y menos claro para lectores modernos.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. Se conserva «cabeza» para κεφαλή, lo cual coincide con la decisión auditada. El punto a corregir es ἀρχή: el audit trail favorece el sentido de gobernante/poder gobernante, no «principado» como término tradicional. La nota sobre «cabeza» debe mantenerse. La nota alternativa sobre plenitud puede conservarse, adaptada al nuevo texto.'
  issues:
  - severity: medium
    issue: «han sido llenados» suena poco natural en español sin complemento
    rationale: Aunque refleja literalmente πληρόω, en español «llenar» normalmente requiere especificar de qué se llena algo. El audit trail busca preservar la idea de plenitud, no una literalidad torpe. «Han recibido plenitud» mantiene el sentido resultativo y suena más idiomático.
  - severity: medium
    issue: «todo principado» no refleja tan bien la decisión léxica auditada para ἀρχή
    rationale: La documentación inglesa eligió «ruler» para resaltar el sentido de poder/gobernante. «Principado» preserva tradición, pero puede sonar abstracto o institucional. «Todo gobernante y autoridad» comunica mejor el sentido documentado y es más claro en español moderno.
  - severity: low
    issue: «quien» puede mejorarse a «que» en esta estructura
    rationale: Después de «él», la relativa explicativa «que es...» es más natural y fluida en español que «quien es...», sin pérdida de sentido.
  revised_spanish_text: y en él ustedes han recibido plenitud[a], él, que es la cabeza de todo gobernante y autoridad[b].
