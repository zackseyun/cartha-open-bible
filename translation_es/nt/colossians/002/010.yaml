revisions:
- from: y en él ustedes han sido llenados[a], quien es la cabeza de todo principado y autoridad[b].
  to: y en él ustedes han recibido plenitud[a], él, que es la cabeza de todo gobernante y autoridad[b].
  rationale: Se revisa para mejorar la naturalidad del español y alinearlo más estrechamente con las decisiones léxicas auditadas. «Han recibido plenitud» conserva el tema de plenitud de πεπληρωμένοι sin la torpeza de «han sido llenados» sin complemento. «Todo gobernante y autoridad» refleja mejor el sentido documentado de ἀρχή + ἐξουσία en este contexto. Se mantiene «cabeza» en el texto principal y su explicación en nota.
  reviewer_model: gpt-5.4
