translation:
  language: es
  text: y en él ustedes han recibido plenitud[a], él, que es la cabeza de todo gobernante y autoridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han sido hechos plenos».
    reason: lexical_alternative
  - marker: b
    text: «Cabeza» conserva la metáfora griega; el sentido aquí es que Cristo es supremo sobre todo gobernante y autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conector simple que mantiene la continuidad argumentativa sin sobretraducción.
- source_word: ἐστὲ
  english_pob_choice: you have been
  chosen_spanish: han sido
  alternatives_spanish:
  - son
  lexicon: BDAG
  rationale: En español, el perfecto compuesto pasivo expresa mejor un estado resultante de una acción completada, en línea con el participio perfecto griego.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - unidos a él
  - en unión con él
  lexicon: BDAG
  rationale: La preposición conserva la expresión compacta de incorporación/unión con Cristo sin expandirla en el texto principal.
- source_word: πεπληρωμένοι
  english_pob_choice: been filled
  chosen_spanish: han sido llenados
  alternatives_spanish:
  - han sido llenados de plenitud
  - han sido hechos plenos
  - han sido completados
  lexicon: BDAG
  rationale: ‘Llenados’ refleja de manera directa πληρόω y preserva la imagen de plenitud; el perfecto pasivo queda bien expresado con ‘han sido’. Evita suavizar el término hacia una mera idea abstracta de ‘completos’.
- source_word: ὅς
  english_pob_choice: who
  chosen_spanish: quien
  alternatives_spanish:
  - el cual
  lexicon: BDAG
  rationale: Pronombre relativo natural en español para referirse a Cristo sin perder la referencia personal.
- source_word: κεφαλὴ
  english_pob_choice: Head
  chosen_spanish: cabeza
  alternatives_spanish:
  - jefe
  - ruler
  lexicon: BDAG
  rationale: Se conserva la metáfora corporal original. ‘Jefe’ interpretaría demasiado el término; ‘cabeza’ mantiene el valor léxico y la imagen paulina.
- source_word: πάσης ἀρχῆς
  english_pob_choice: every ruler
  chosen_spanish: todo principado
  alternatives_spanish:
  - todo gobernante
  - toda autoridad gobernante
  - todo poder
  lexicon: BDAG
  rationale: Se elige ‘principado’ para conservar el grupo terminológico tradicional en español bíblico y su referencia a poderes/autoridades celestiales, en vez de concretarlo solo como una persona. ‘Todo’ transmite la comprehensividad de πάσης.
- source_word: καὶ ἐξουσίας
  english_pob_choice: and authority
  chosen_spanish: y autoridad
  alternatives_spanish:
  - y poder
  - y jurisdicción
  lexicon: BDAG
  rationale: ‘Autoridad’ es el equivalente más claro y estable en español para ἐξουσία en este contexto paulino de poderes. Mantiene el paralelismo con ἀρχή sin diluir la idea de autoridad delegada.
theological_decisions:
- issue: Plenitud de los creyentes en Cristo
  english_pob_reading: The verse states that believers have been made full in Christ, expressing their participation in the fullness found in him, without specifying a later doctrinal system about perfection or eradication of sin.
  chosen_spanish_reading: El texto afirma que los creyentes han sido llenados en Cristo, expresando participación en la plenitud que está en él, sin convertirlo en una tesis técnica sobre perfección moral o ausencia total de pecado.
  alternative_spanish_readings:
  - ustedes son completos en él
  - ustedes tienen plenitud en él
  - ustedes han sido perfeccionados en él
  rationale: ‘Han sido llenados’ conserva la imagen de plenitud y el sentido resultante del perfecto, pero no resuelve indebidamente la tensión teológica entre suficiencia presente y desarrollo cristiano posterior.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Relación de Cristo con los poderes
  english_pob_reading: Christ is presented as supreme over all rulers and authorities.
  chosen_spanish_reading: Cristo es presentado como la cabeza suprema sobre todo principado y autoridad.
  alternative_spanish_readings:
  - Cristo es el origen de todo principado y autoridad
  - Cristo gobierna sobre todo principado y autoridad
  rationale: Se conserva la metáfora de ‘cabeza’ en el texto principal, mientras el valor teológico de supremacía queda implícito por el contexto inmediato de poderes cósmicos y por la relación gramatical del relativo.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se incorporó la revisión auditada que prefirió un verbo más directo para πεπληρωμένοι: en español se optó por ‘han sido llenados’ para reflejar con naturalidad el perfecto pasivo y la imagen de plenitud, manteniendo la estructura y el tono del texto inglés revisado.'
  spanish_consistency_notes:
  - Se mantiene ‘cabeza’ como metáfora consistente con el POB en inglés, evitando sustituirla por ‘jefe’ o ‘gobernante’.
  - Se usa ‘principado’ para ἀρχή, en línea con la terminología bíblica española que preserva la dimensión de poderes/órdenes, y no se reduce el término a un gobernante individual.
  - No se introduce ‘Cristo’ en el texto principal porque el pronombre relativo ‘quien’ basta para referir naturalmente a Jesús/ Cristo según el antecedente inmediato.
  - El pasivo perfecto ‘han sido llenados’ conserva la temporalidad resultativa del griego sin volverlo una afirmación de perfección moral absoluta.
