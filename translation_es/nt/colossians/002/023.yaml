translation:
  language: es
  text: Estas ciertamente tienen una apariencia de sabiduría[a] en religión inventada por uno mismo[b] y humildad y trato severo del cuerpo, pero no tienen valor alguno contra la indulgencia de la carne[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tienen reputación de sabiduría».'
    reason: alternative_reading
  - marker: b
    text: 'O: «culto autoimpuesto»; tradicionalmente, «culto voluntario».'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final es difícil. O: «no en ningún honor, para la satisfacción de la carne»; o «de ningún valor contra la indulgencia de la carne».'
    reason: alternative_reading
  - marker: d
    text: «Carne» puede referirse aquí a deseos humanos caídos; compárese el uso contextual de Pablo en otros pasajes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅτινά
  english_pob_choice: These
  chosen_spanish: Estas
  alternatives_spanish:
  - las cuales
  - tales cosas
  lexicon: BDAG
  rationale: Retoma anafóricamente las reglas y prácticas de los versículos anteriores. «Estas» conserva la referencia cercana y suena natural en español.
- source_word: λόγον μὲν ἔχοντα σοφίας
  english_pob_choice: indeed have an appearance of wisdom
  chosen_spanish: ciertamente tienen una apariencia de sabiduría
  alternatives_spanish:
  - tienen reputación de sabiduría
  - tienen un parecer de sabiduría
  lexicon: BDAG
  rationale: El giro λόγον ἔχειν aquí comunica apariencia o reputación, no sabiduría real. «Apariencia de sabiduría» preserva la tensión del griego y el matiz concesivo de μέν.
- source_word: ἐθελοθρησκίᾳ
  english_pob_choice: self-made religion
  chosen_spanish: religión inventada por uno mismo
  alternatives_spanish:
  - culto autoimpuesto
  - adoración voluntaria
  lexicon: BDAG
  rationale: El término es raro y denota práctica religiosa surgida de la propia voluntad. «Religión inventada por uno mismo» comunica el carácter no mandado por Dios sin recurrir a un calco opaco. Se mantiene la fuerza negativa que el inglés POB expresa con «self-made religion».
- source_word: ταπεινοφροσύνῃ
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - autoabasamiento
  lexicon: BDAG
  rationale: La palabra normalmente significa humildad. En este contexto puede tener ironía ascética, pero el sustantivo simple deja que el contexto cargue esa posible crítica, como en el inglés POB.
- source_word: ἀφειδίᾳ σώματος
  english_pob_choice: harsh treatment of the body
  chosen_spanish: trato severo del cuerpo
  alternatives_spanish:
  - severidad con el cuerpo
  - trato sin indulgencia al cuerpo
  - neglecto del cuerpo
  lexicon: BDAG
  rationale: ἀφειδία implica falta de indulgencia o severidad. «Trato severo del cuerpo» es claro y digno en español, y conserva el sentido ascético sin sonar más interpretativo de lo necesario.
- source_word: οὐκ ἐν τιμῇ τινι
  english_pob_choice: are of no value
  chosen_spanish: no tienen valor alguno
  alternatives_spanish:
  - no están en ningún honor
  - no están en ningún valor/estima
  lexicon: BDAG
  rationale: Sigo la decisión del POB inglés de tomar τιμή aquí en el sentido de valor/beneficio dentro del argumento, no como honor literal. En español, «no tienen valor alguno» expresa esa conclusión de forma natural.
- source_word: πρὸς πλησμονὴν
  english_pob_choice: against the indulgence
  chosen_spanish: frente a la satisfacción
  alternatives_spanish:
  - contra la satisfacción
  - para la saciedad
  lexicon: BDAG
  rationale: La preposición πρὸς aquí expresa relación/resultado. «Frente a» mantiene el matiz de contraste funcional; «satisfacción» comunica πλησμονή como saciedad o plenitud buscada, sin convertir el final en una paráfrasis excesiva.
- source_word: τῆς σαρκός
  english_pob_choice: of the flesh
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la naturaleza humana caída
  - de la carne pecaminosa
  lexicon: BDAG
  rationale: Se conserva «carne» como traducción por defecto de σάρξ, manteniendo la tensión teológica que el POB inglés preserva. No se resuelve interpretativamente hacia «naturaleza humana» porque el texto y la tradición del proyecto invitan a mantener el término técnico.
theological_decisions:
- issue: 'Sentido de la cláusula final difícil: οὐκ ἐν τιμῇ τινι πρὸς πλησμονὴν τῆς σαρκός'
  english_pob_reading: The ascetic practices have no real value in restraining fleshly indulgence.
  chosen_spanish_reading: Las prácticas ascéticas no tienen valor real para frenar la satisfacción de la carne.
  alternative_spanish_readings:
  - No están en ningún honor, sino para la satisfacción de la carne.
  - No tienen honor alguno, aunque se orientan a la saciedad de la carne.
  rationale: 'La sintaxis griega es compacta y debatida. El español escogido sigue la línea del POB inglés: las prácticas externas parecen sabias, pero no sirven realmente contra los impulsos de la carne. Se preserva la dificultad del final sin clausurarla con una paráfrasis doctrinalmente más fuerte que el texto.'
  doctrine_reference: Translation philosophy §3; Contested terms table for σάρξ
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés, que eliminó el sujeto explícito repetido en la segunda cláusula para lograr una redacción más tersa. En español también se evita repetir el sujeto en la segunda parte: «pero no tienen valor alguno...» sigue el flujo del griego y del audit trail revisado.'
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ, en línea con el término técnico del proyecto.
  - Se evita «SEÑOR» o equivalentes porque el pasaje no involucra el nombre divino.
  - Se conserva una traducción sobria de ἐθελοθρησκίᾳ y se explicita en nota la alternativa tradicional de culto autoimpuesto.
  - La puntuación refleja el contraste entre la apariencia de sabiduría y la conclusión negativa final.
