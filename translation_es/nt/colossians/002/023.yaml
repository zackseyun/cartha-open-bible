revisions:
- from: Estas ciertamente tienen una apariencia de sabiduría[a] en religión inventada por uno mismo[b] y humildad y trato severo del cuerpo, pero no tienen valor alguno frente a la satisfacción de la carne[c][d].
  to: Estas ciertamente tienen una apariencia de sabiduría[a] en religión inventada por uno mismo[b] y humildad y trato severo del cuerpo, pero no tienen valor alguno contra la indulgencia de la carne[c][d].
  rationale: 'La revisión es menor pero necesaria para alinear mejor la cláusula final con el griego debatido y con la decisión auditada del POB inglés: «contra la indulgencia de la carne» comunica mejor tanto πρὸς como πλησμονή en este contexto. También se corrige la alternativa tradicional de la nota b para que sea inteligible en español.'
