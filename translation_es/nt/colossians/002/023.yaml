review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del griego y la línea del POB inglés: las prácticas ascéticas solo parecen sabias y no sirven contra la indulgencia de la carne. Sin embargo, dos elecciones debilitan la fidelidad fina: «frente a la satisfacción» no refleja tan bien el valor adversativo de πρὸς ni la elección inglesa «against the indulgence», y la nota b traduce mal «will-worship» como «voluntad religiosa».'
  spanish_quality_summary: 'El texto es claro y legible en español neutral, pero «religión inventada por uno mismo» suena algo largo y menos idiomático que opciones como «religión hecha por uno mismo» o «culto autoimpuesto». Aun así, es comprensible. La reparación principal conviene en la cláusula final: «contra la indulgencia de la carne» es más natural, más precisa y además alinea mejor con la nota alternativa ya dada.'
  glossary_alignment: Se mantiene correctamente «carne» para σάρξ, «humildad» para ταπεινοφροσύνῃ, y el sentido negativo de ἐθελοθρησκίᾳ. No hay conflicto con la terminología doctrinal del proyecto. La única desalineación relevante es que «satisfacción» suaviza demasiado πλησμονή frente a la decisión auditada «indulgence»; «indulgencia» preserva mejor la fuerza contextual.
  issues:
  - severity: medium
    issue: «frente a la satisfacción de la carne» no refleja adecuadamente la decisión auditada para πρὸς πλησμονὴν τῆς σαρκός
    rationale: El POB inglés escogió «against the indulgence of the flesh» por el contexto polémico contra prácticas ascéticas ineficaces. «Frente a la satisfacción» suena más débil y menos idiomático en español bíblico contemporáneo; «contra la indulgencia de la carne» comunica mejor la oposición y la idea de gratificación desordenada.
  - severity: low
    issue: La nota b usa «voluntad religiosa» para «will-worship»
    rationale: No es una formulación tradicional reconocible ni clara en español. Si se conserva la alternativa histórica, sería mejor «culto voluntario» o simplemente mantener «culto autoimpuesto» como alternativa principal.
  revised_spanish_text: Estas ciertamente tienen una apariencia de sabiduría[a] en religión inventada por uno mismo[b] y humildad y trato severo del cuerpo, pero no tienen valor alguno contra la indulgencia de la carne[c][d].
  revised_footnotes:
  - marker: a
    text: 'O: «tienen reputación de sabiduría».'
    reason: alternative_reading
  - marker: b
    text: 'O: «culto autoimpuesto»; tradicionalmente, «culto voluntario».'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final es difícil. O: «no en ningún honor, para la satisfacción de la carne»; o «de ningún valor contra la indulgencia de la carne».'
    reason: alternative_reading
  - marker: d
    text: «Carne» puede referirse aquí a deseos humanos caídos; compárese el uso contextual de Pablo en otros pasajes.
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor pero necesaria para alinear mejor la cláusula final con el griego debatido y con la decisión auditada del POB inglés: «contra la indulgencia de la carne» comunica mejor tanto πρὸς como πλησμονή en este contexto. También se corrige la alternativa tradicional de la nota b para que sea inteligible en español.'
