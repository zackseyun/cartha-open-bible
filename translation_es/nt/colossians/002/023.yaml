  text: ἅτινά ἐστιν λόγον μὲν ἔχοντα σοφίας ἐν ἐθελοθρησκίᾳ καὶ ταπεινοφροσύνῃ καὶ ἀφειδίᾳ σώματος, οὐκ ἐν τιμῇ τινι πρὸς πλησμονὴν τῆς σαρκός.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/023.yaml
  text: These indeed have an appearance of wisdom in self-made religion and humility and harsh treatment of the body[d][c][b][a], but are of no value against the indulgence of the flesh.
  footnotes:
  - marker: a
    text: 'Or: ''have a reputation for wisdom.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'self-imposed worship'; traditionally 'will-worship.'
    reason: lexical_alternative
  - marker: c
    text: 'The final clause is difficult. Or: ''not in any honor, for the satisfaction of the flesh,'' or ''of no honor against the indulgence of the flesh.'''
    reason: alternative_reading
  - marker: d
    text: '''Flesh'' may refer here to fallen human desires; compare Paul''s contextual use of the term elsewhere.'
    reason: lexical_alternative
