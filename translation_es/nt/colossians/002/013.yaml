translation:
  language: es
  text: Y a ustedes, estando muertos en sus transgresiones y la incircuncisión de su carne[a], les dio vida junto con él; habiéndonos perdonado todas nuestras transgresiones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Incircuncisión de su carne» apunta más directamente a su estado corporal de no estar circuncidados, aunque en el contexto también tiene resonancia espiritual.
    reason: theological_note
  - marker: b
    text: 'El griego pasa de «ustedes» a «nosotros» en la última cláusula: «habiéndonos perdonado todas nuestras transgresiones».'
    reason: source_note
lexical_decisions:
- source_word: νεκροὺς ὄντας
  english_pob_choice: being dead
  chosen_spanish: estando muertos
  alternatives_spanish:
  - que estaban muertos
  - muertos
  lexicon: BDAG
  rationale: El participio expresa un estado continuo y modifica a «ustedes»; en español, «estando muertos» conserva la construcción participial y el sentido de condición espiritual sin endurecer el ritmo de la frase.
- source_word: ἐν τοῖς παραπτώμασιν
  english_pob_choice: in your trespasses
  chosen_spanish: en sus transgresiones
  alternatives_spanish:
  - en sus tropiezos
  - por sus transgresiones
  - en sus pecados
  lexicon: BDAG
  rationale: παράπτωμα puede ser «trespass/transgression». «Transgresiones» preserva el valor de ofensa contra un límite moral o pactual, y «en» mantiene la imagen de una condición existente dentro de ese ámbito.
- source_word: τῇ ἀκροβυστίᾳ
  english_pob_choice: uncircumcision
  chosen_spanish: la incircuncisión
  alternatives_spanish:
  - la falta de circuncisión
  - el prepucio
  lexicon: BDAG
  rationale: En este contexto, el término designa el estado de no estar circuncidado. «Incircuncisión» es natural en español bíblico y conserva el contraste pactual con la circuncisión del contexto inmediato.
- source_word: τῆς σαρκὸς ὑμῶν
  english_pob_choice: of your flesh
  chosen_spanish: de su carne
  alternatives_spanish:
  - de su cuerpo
  - de su naturaleza humana
  - de su carne pecaminosa
  lexicon: BDAG
  rationale: Se conserva «carne» porque el texto apunta de manera más directa al estado corporal de incircuncisión, sin resolver de antemano la tensión teológica hacia «naturaleza pecaminosa». El posesivo plural se adapta al español del trato formal como «su» para «ustedes».
- source_word: συνεζωοποίησεν
  english_pob_choice: he made alive together
  chosen_spanish: les dio vida junto con él
  alternatives_spanish:
  - los vivificó juntamente con él
  - los hizo vivir junto con él
  lexicon: BDAG
  rationale: El compuesto subraya la vivificación compartida. «Les dio vida junto con él» comunica de manera clara y digna la unión con Cristo sin perder el sentido de acción divina vivificante.
- source_word: σὺν αὐτῷ
  english_pob_choice: together with him
  chosen_spanish: junto con él
  alternatives_spanish:
  - con él
  - en unión con él
  lexicon: BDAG
  rationale: «Junto con» reproduce bien la fuerza de σύν y conserva la idea de participación conjunta, con un español natural y sobrio.
- source_word: χαρισάμενος
  english_pob_choice: having forgiven
  chosen_spanish: habiéndonos perdonado
  alternatives_spanish:
  - perdonándonos
  - habiendo perdonado
  lexicon: BDAG
  rationale: El aoristo participial se expresa con una forma compuesta que marca anterioridad relativa a la acción principal. «Perdonado» se ajusta al valor de χαρίζομαι aquí como perdonar libremente/graciosamente.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - nosotros
  lexicon: BDAG
  rationale: Se preserva el cambio de persona del griego de «ustedes» a «nosotros» en el participio final, evitando armonizar el pronombre y manteniendo la observación textual del audit trail.
- source_word: πάντα τὰ παραπτώματα
  english_pob_choice: all our trespasses
  chosen_spanish: todas nuestras transgresiones
  alternatives_spanish:
  - todas las transgresiones
  - todos nuestros pecados
  lexicon: BDAG
  rationale: La repetición de la misma familia léxica ayuda a conservar la cohesión del versículo. «Todas» transmite el carácter total del perdón y «nuestras» refleja el cambio a primera persona plural del original.
theological_decisions:
- issue: Sentido de σάρξ en τῆς σαρκὸς ὑμῶν
  english_pob_reading: literal 'flesh' with possible theological resonance, not 'sinful nature' in the main text
  chosen_spanish_reading: «carne» en sentido literal principal, con posible resonancia teológica, no «naturaleza pecaminosa» en el texto principal
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - cuerpo
  rationale: El contexto inmediato habla de incircuncisión, por lo que la referencia más directa es corporal. Mantener «carne» conserva la tensión textual sin convertirla en una interpretación explícita que el griego no obliga a fijar.
  doctrine_reference: 'DOCTRINE.md: σάρξ debe rendirse por defecto como «carne» cuando es literal; reservar otras opciones para casos claramente metafóricos.'
- issue: Referente de αὐτῷ en σὺν αὐτῷ
  english_pob_reading: with Christ
  chosen_spanish_reading: con él, entendido por el contexto como Cristo
  alternative_spanish_readings:
  - con Cristo
  - con Dios
  rationale: El antecedente inmediato y el contexto de 2:12-13 apuntan a Cristo, pero el texto griego deja el pronombre. La traducción conserva el pronombre y deja al contexto la identificación.
  doctrine_reference: 'DOCTRINE.md: primacía del original; no sustituir un pronombre por un nombre propio si el griego no lo hace.'
- issue: Cambio de persona de ὑμᾶς a ἡμῖν
  english_pob_reading: you / us
  chosen_spanish_reading: ustedes / nos-
  alternative_spanish_readings:
  - ustedes / ustedes
  - vosotros / nosotros
  rationale: Se conserva el cambio deliberado de segunda a primera persona plural. Esto evita homogeneizar el versículo y respeta la observación del audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: preservar tensiones textuales y cambios de persona cuando son significativos.'
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail inglés más reciente, que ajusta la construcción participial («being dead») y conserva el cambio de persona de «you» a «us». La redacción española refleja esas decisiones sin armonizar ni suavizar la tensión de persona ni la referencia concreta de σάρξ.
  spanish_consistency_notes:
  - Se mantiene «transgresiones» para παράπτωμα en ambas ocurrencias.
  - Se conserva «carne» para σάρξ y «incircuncisión» para ἀκροβυστία.
  - La cláusula final mantiene el cambio a primera persona plural («nos» / «nuestras»).
  - El pronombre «él» se deja implícito en la frase verbal y se retoma con claridad en «junto con él».
