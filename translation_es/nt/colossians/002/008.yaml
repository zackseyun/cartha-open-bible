    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:42:23Z'
    unchanged: false
    changes_summary: 'Changed ''will take'' to ''takes'' for a more natural rendering of the warning construction, and changed ''the Messiah'' to ''Christ'' to reflect the Greek more directly and fit the verse''s register and usage. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Cuídense de que nadie los lleve cautivos[a] por medio de la filosofía y el engaño vacío, conforme a la tradición humana, conforme a los principios elementales del mundo[b], y no conforme al Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los arrebate como botín». El verbo griego sugiere llevarse a alguien como presa o botín de guerra.
    reason: lexical_alternative
  - marker: b
    text: O «los espíritus elementales del mundo». La frase griega puede referirse tanto a principios básicos como a poderes espirituales cósmicos.
    reason: alternative_reading
  - marker: c
    text: Griego «Cristo»; se traduce «Mesías» aquí porque el sentido titular es prominente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βλέπετε
  english_pob_choice: See to it
  chosen_spanish: Miren que
  alternatives_spanish:
  - Vigilen que
  - Estén atentos a que
  lexicon: BDAG
  rationale: El imperativo plural de advertencia pide una formulación natural en español que mantenga el tono exhortativo. «Miren que» conserva la vigilancia y la advertencia sin sonar mecánico.
- source_word: μή τις
  english_pob_choice: that no one
  chosen_spanish: nadie
  alternatives_spanish:
  - que nadie
  - para que nadie
  lexicon: BDAG
  rationale: La advertencia negativa se expresa de forma más idiomática en español con «nadie». Mantiene el valor de amenaza posible sin añadir una subordinación forzada.
- source_word: ἔσται ὁ συλαγωγῶν
  english_pob_choice: takes you captive
  chosen_spanish: los lleve cautivos
  alternatives_spanish:
  - los cautive
  - los arrebate como botín
  - los haga cautivos
  lexicon: BDAG
  rationale: συλαγωγέω conserva la imagen de llevarse como botín. «Llevar cautivos» transmite bien la metáfora de captura en español y evita una paraphrasis excesiva.
- source_word: διὰ τῆς φιλοσοφίας
  english_pob_choice: through philosophy
  chosen_spanish: por medio de la filosofía
  alternatives_spanish:
  - mediante la filosofía
  - a través de la filosofía
  lexicon: BDAG
  rationale: διά con genitivo indica medio o instrumento. «Por medio de» es claro y conserva el matiz instrumental.
- source_word: κενῆς ἀπάτης
  english_pob_choice: empty deceit
  chosen_spanish: el engaño vacío
  alternatives_spanish:
  - el engaño vano
  - el vacío engaño
  lexicon: BDAG
  rationale: «Vacío» reproduce κενός y «engaño» reproduce ἀπάτη. En español, el sustantivo con adjetivo suena más natural que «vacía decepción» o un giro demasiado literal.
- source_word: κατὰ τὴν παράδοσιν τῶν ἀνθρώπων
  english_pob_choice: according to human tradition
  chosen_spanish: conforme a la tradición humana
  alternatives_spanish:
  - según la tradición humana
  - de acuerdo con la tradición de los humanos
  lexicon: BDAG
  rationale: κατά expresa norma o medida. «Conforme a» mantiene ese valor normativo y «humana» preserva el sentido genérico de ἀνθρώπων sin sesgo masculino.
- source_word: ἀνθρώπων
  english_pob_choice: human
  chosen_spanish: humana
  alternatives_spanish:
  - de personas
  - de la gente
  lexicon: BDAG
  rationale: El plural genérico apunta a la humanidad en general. «Humana» mantiene la referencia colectiva sin introducir un giro menos formal.
- source_word: κατὰ τὰ στοιχεῖα τοῦ κόσμου
  english_pob_choice: according to the elemental principles of the world
  chosen_spanish: conforme a los elementos del mundo
  alternatives_spanish:
  - según los principios elementales del mundo
  - conforme a los espíritus elementales del mundo
  lexicon: BDAG
  rationale: Se preserva la ambigüedad de στοιχεῖα sin resolverla en el texto principal. «Elementos» es la opción más transparente y deja abierta la tensión entre principios básicos y potencias cósmicas.
- source_word: κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - del cosmos
  lexicon: BDAG
  rationale: κόσμος aquí señala el orden del mundo. «Del mundo» es la forma natural y suficiente en español.
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: La POB inglesa documenta la decisión de traducir el título con «Messiah» en este contexto; en español, el equivalente directo y titular es «Mesías». Mantiene el valor funcional del título y evita depender del uso litúrgico de «Cristo».
theological_decisions:
- issue: Sentido de στοιχεῖα τοῦ κόσμου
  english_pob_reading: elemental principles of the world
  chosen_spanish_reading: los elementos del mundo
  alternative_spanish_readings:
  - los principios elementales del mundo
  - los espíritus elementales del mundo
  rationale: La frase paulina es discutida. La traducción principal conserva una formulación amplia que no decide entre estructuras rudimentarias del orden mundano y poderes espirituales cósmicos. Así se preserva la tensión doctrinal documentada por la POB.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste reciente de la POB inglesa que prefirió un presente natural en la advertencia y restauró «Messiah» en la capa editorial auditada. Para el español, se optó por mantener el valor de advertencia con un presente exhortativo idiomático y por traducir Χριστός como «el Mesías», que es el equivalente titular más directo en español neutro.
  spanish_consistency_notes:
  - Se mantuvo el registro exhortativo y sobrio de la sección.
  - «Mesías» se usa de forma consistente para Χριστός cuando funciona como título, conforme al criterio POB.
  - Se conservó la ambigüedad de στοιχεῖα en el cuerpo principal y se aclaró en nota.
  - «Humana» evita lenguaje masculino genérico en una frase de alcance universal.
  - «Lleve cautivos» preserva la imagen de captura sin exagerar el matiz militar.
