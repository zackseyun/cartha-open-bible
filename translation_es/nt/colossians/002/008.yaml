source:
  edition: SBLGNT
  text: Βλέπετε μή τις ὑμᾶς ἔσται ὁ συλαγωγῶν διὰ τῆς φιλοσοφίας καὶ κενῆς ἀπάτης κατὰ τὴν παράδοσιν τῶν ἀνθρώπων, κατὰ τὰ στοιχεῖα τοῦ κόσμου καὶ οὐ κατὰ Χριστόν·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/008.yaml
  text: See to it that no one takes you captive through philosophy and empty deceit[a], according to human tradition, according to the elemental principles of the world[b], and not according to Messiah.
  footnotes:
  - marker: a
    text: Or "the elemental spirits of the world." The Greek phrase can refer either to basic/elemental principles or to cosmic spiritual powers.
    reason: alternative_reading
  - marker: b
    text: Greek "Christ"; rendered "Messiah" here because the title sense is prominent.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
