translation:
  language: es
  text: Todo esto[a] perece con el uso, conforme a los mandamientos y enseñanzas[b] de los hombres[c].
  philosophy: formal
  footnotes:
  - marker: a
    text: 'O: «lo cual todo perece con el uso». El griego puede expresarse de manera más compacta, subrayando que las cosas reguladas son temporales y consumibles.'
    reason: lexical_alternative
  - marker: b
    text: «Mandamientos y enseñanzas de los hombres» probablemente evoca Isaías 29:13, subrayando que estas prescripciones son de origen humano.
    reason: cross_reference
  - marker: c
    text: 'O: «de las personas». El griego dice «de los hombres/humanos», en contraste entre regulaciones humanas y los mandatos de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅ
  english_pob_choice: These
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Estas cosas
  - Todo lo cual
  lexicon: BDAG
  rationale: El pronombre neutro plural retoma los elementos prohibidos del versículo anterior. En español, «Todo esto» conserva la referencia anafórica y el sentido colectivo sin sonar forzado.
- source_word: ἐστιν πάντα
  english_pob_choice: all are
  chosen_spanish: Todo esto
  alternatives_spanish:
  - Todas estas cosas son
  - Todo ello es
  lexicon: BDAG
  rationale: La construcción griega presenta el sujeto neutro plural con valor colectivo. En español conviene integrarlo en una sola expresión natural antes del verbo para mantener claridad y fluidez.
- source_word: εἰς φθοράν
  english_pob_choice: perish
  chosen_spanish: perece
  alternatives_spanish:
  - está destinado a la destrucción
  - se corrompe
  - va a la ruina
  lexicon: BDAG
  rationale: φθορά puede implicar ruina, destrucción o corrupción. Aquí, junto con «con el uso», la idea es que tales cosas se consumen y desaparecen; «perece» reproduce bien esa caducidad sin sobreespecificar.
- source_word: τῇ ἀποχρήσει
  english_pob_choice: with use
  chosen_spanish: con el uso
  alternatives_spanish:
  - al usarse
  - por el uso
  - mediante el uso
  lexicon: BDAG
  rationale: 'La frase dativa indica circunstancia o medio: estas cosas se consumen en el mismo acto de uso. «Con el uso» refleja de manera breve y natural esa relación.'
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: Aquí marca la norma o base de las regulaciones. «Conforme a» conserva el valor normativo y suena digno en español bíblico contemporáneo.
- source_word: ἐντάλματα
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - ordenanzas
  lexicon: BDAG
  rationale: «Mandamientos» preserva el tono formal y regulativo que el contexto exige, sin desplazar el eco bíblico de una prescripción impuesta.
- source_word: διδασκαλίας
  english_pob_choice: teachings
  chosen_spanish: enseñanzas
  alternatives_spanish:
  - doctrinas
  - instrucciones
  lexicon: BDAG
  rationale: «Enseñanzas» es el equivalente más natural y amplio; evita cargar el término con un tecnicismo doctrinal que el griego aquí no exige.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - humanas
  lexicon: BDAG
  rationale: El genitivo indica origen humano en contraste con lo divino. Se conserva el plural masculino tradicional porque el griego usa ἀνθρώπων y el eco intertextual bíblico se beneficia de esa forma.
theological_decisions:
- issue: Relación entre las cosas reguladas y el juicio sobre las regulaciones humanas
  english_pob_reading: The verse explains that the prohibited items are perishable and that the regulations are humanly derived.
  chosen_spanish_reading: El versículo afirma que esas cosas perecen con el uso y, además, las ubica bajo mandamientos y enseñanzas de origen humano.
  alternative_spanish_readings:
  - El versículo desprecia directamente las regulaciones por ser humanas.
  - El versículo describe solo la caducidad de los objetos, sin implicar crítica a la fuente de las normas.
  rationale: 'El griego admite una relación algo compacta entre ambos miembros de la frase. La redacción española mantiene esa tensión: primero la caducidad de las cosas, luego el carácter humano de las prescripciones, sin resolver más de lo que el texto permite.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Posible eco intertextual de Isaías 29:13
  english_pob_reading: '''Commandments and teachings of men'' likely echoes Isaiah 29:13, underscoring that these regulations are human in origin.'
  chosen_spanish_reading: «Mandamientos y enseñanzas de los hombres» conserva un eco claro de fórmulas bíblicas parecidas y mantiene visible el contraste entre lo humano y lo divino.
  alternative_spanish_readings:
  - Eliminar el eco intertextual por una versión más libre.
  - Reforzar el eco con una cita explícita en el texto principal.
  rationale: El texto griego no cita explícitamente Isaías, pero sí resuena con ese lenguaje. La traducción principal no añade material explicativo; solo preserva el contraste que el griego ya comunica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Tomo en cuenta la revisión reciente del inglés POB: se prefirió una formulación más directa para εἰς φθοράν τῇ ἀποχρήσει. En español, «perece con el uso» sigue esa misma decisión de naturalidad y fidelidad, evitando una paráfrasis más explicativa.'
  spanish_consistency_notes:
  - Se usa «mandamientos» para ἐντάλματα y «enseñanzas» para διδασκαλίας, manteniendo la distinción del griego.
  - Se conserva «hombres» para τῶν ἀνθρώπων por coherencia con el contraste bíblico y por fidelidad al plural griego.
  - El orden «Todo esto perece con el uso» permite una lectura fluida sin perder el valor colectivo del neutro plural griego.
  - No se introduce «leyes», «ordenanzas» ni «doctrinas» para no desplazar el campo semántico documentado en la fuente.
