review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego y el rastro de auditoría inglés: ἐν ᾧ se traduce apropiadamente como «en quien», πάντες οἱ θησαυροὶ como «todos los tesoros», τῆς σοφίας καὶ γνώσεως como «de la sabiduría y del conocimiento», y ἀπόκρυφοι de manera neutral. Sin embargo, la nota alternativa para ἐν ᾧ debería preferir «en el cual» como equivalente más natural y directo de ''in which''; «en lo cual» suena menos idiomático aquí y desajusta levemente la alternativa documentada.'
  spanish_quality_summary: El texto principal es claro, digno y bien legible en español eclesial contemporáneo. No obstante, «escondidos» funciona, pero «ocultos» suena un poco más natural y preciso en registro bíblico para ἀπόκρυφοι. Además, la nota b puede simplificarse para reflejar mejor la alternativa inglesa primaria «stored up» sin duplicar innecesariamente matices.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles del glosario principal salvo la preservación adecuada de «conocimiento» para γνῶσις. La decisión de mantener una nota sobre la alternativa de antecedente es correcta, pero conviene ajustar la formulación española a «en el cual».
  issues:
  - severity: medium
    issue: La nota a usa «en lo cual» como alternativa principal.
    rationale: El inglés auditado ofrece 'in which' como alternativa. En español, para un antecedente como «el misterio de Dios», «en el cual» es la forma más natural y formalmente paralela; «en lo cual» suele sonar más difuso o no referirse tan limpiamente a un antecedente nominal específico.
  - severity: low
    issue: «Escondidos» es aceptable, pero «ocultos» encaja mejor con ἀπόκρυφοι en este registro.
    rationale: Ambas opciones son válidas, pero «ocultos» transmite de manera más directa el valor de 'hidden/concealed' y suena menos coloquial que «escondidos» en una traducción bíblica de tono digno.
  - severity: low
    issue: La nota b añade dos alternativas donde el inglés prioriza una sola.
    rationale: La nota inglesa da como alternativa principal 'stored up'. En español, «guardados» basta como equivalente principal; «reservados» puede mantenerse, pero conviene formular la nota con mayor concisión y cercanía al razonamiento auditado.
  revised_spanish_text: en quien están ocultos[a] todos los tesoros de la sabiduría y del conocimiento[b].
  revised_footnotes:
  - marker: a
    text: O «en el cual», si el antecedente se toma más ampliamente como el misterio de Dios y no como Cristo en persona.
    reason: alternative_reading
  - marker: b
    text: O «guardados»; el adjetivo griego puede sugerir algo oculto o mantenido en reserva.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad y precisión del español sin alterar el sentido auditado: «ocultos» refleja mejor ἀπόκρυφοι en registro bíblico, y la alternativa pronominal se corrige a «en el cual», que corresponde más claramente a ''in which''. La nota léxica se simplifica para alinearse mejor con la alternativa inglesa documentada.'
