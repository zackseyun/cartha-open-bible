translation:
  language: es
  text: en quien están ocultos[a] todos los tesoros de la sabiduría y del conocimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el cual», si el antecedente se toma más ampliamente como el misterio de Dios y no como Cristo en persona.
    reason: alternative_reading
  - marker: b
    text: O «guardados»; el adjetivo griego puede sugerir algo oculto o mantenido en reserva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - en el cual
  - en lo cual
  lexicon: BDAG
  rationale: El relativo en dativo singular se entiende de manera natural como referido al antecedente personal inmediato (Cristo en el contexto). Por eso, 'en quien' conserva la referencia personal y el valor locativo/instrumental de ἐν sin volver la frase artificial en español.
- source_word: πάντες οἱ θησαυροὶ
  english_pob_choice: all the treasures
  chosen_spanish: todos los tesoros
  alternatives_spanish:
  - cada tesoro
  - todos los tesoros
  lexicon: BDAG
  rationale: 'El artículo con el plural favorece una totalidad colectiva: no se trata de algunos tesoros, sino de ''todos los tesoros''. ''Todos los tesoros'' comunica bien la amplitud de la afirmación sin añadir matices ajenos al griego.'
- source_word: τῆς σοφίας καὶ γνώσεως
  english_pob_choice: of wisdom and knowledge
  chosen_spanish: de la sabiduría y del conocimiento
  alternatives_spanish:
  - de la sabiduría y la comprensión
  - de la sabiduría y del entendimiento
  lexicon: BDAG
  rationale: σοφία y γνῶσις son términos distintos pero emparentados; 'sabiduría y conocimiento' los conserva de forma directa y transparente, sin fundirlos en un solo concepto.
- source_word: ἀπόκρυφοι
  english_pob_choice: hidden
  chosen_spanish: escondidos
  alternatives_spanish:
  - ocultos
  - guardados
  lexicon: BDAG
  rationale: '''Escondidos'' expresa con claridad la idea básica de ἀπόκρυφοι como ''hidden/concealed''. En español suena natural y mantiene la posibilidad de una lectura de ocultamiento sin resolver si la imagen enfatiza inaccesibilidad, reserva o preservación.'
- source_word: εἰσιν ... ἀπόκρυφοι
  english_pob_choice: are hidden
  chosen_spanish: están escondidos
  alternatives_spanish:
  - son escondidos
  - están ocultos
  lexicon: Greek grammar / BDAG
  rationale: Con εἰσιν + adjetivo predicativo, el español fluye mejor con una construcción verbal como 'están escondidos'. Conserva el enunciado predicativo del griego y suena más natural que una forma más rígida.
theological_decisions:
- issue: 'Ambigüedad del antecedente de ἐν ᾧ: Cristo o el ''misterio de Dios'''
  english_pob_reading: '''in whom'' with a note allowing ''in which'' if the antecedent is taken more broadly as the mystery of God rather than Christ personally.'
  chosen_spanish_reading: '''en quien'' en el texto principal, manteniendo la lectura personal; no se fuerza en el texto principal la alternativa neutra.'
  alternative_spanish_readings:
  - '''en lo cual'''
  - '''en el cual'''
  rationale: 'El contexto inmediato de 2:2 favorece un antecedente personal, y la POB inglesa también prioriza esa lectura. Aun así, la posibilidad más amplia no se borra: queda preservada como alternativa en nota, sin imponer una decisión no requerida por el griego.'
  doctrine_reference: Lectura contextual del antecedente pronominal; preservación de la tensión interpretativa sin resolverla más allá del texto.
- issue: 'Sentido de ἀπόκρυφοι: oculto, reservado o almacenado'
  english_pob_reading: Rendered neutrally as 'hidden' without importing the idea that wisdom is either inaccessible to believers or merely stored up for them.
  chosen_spanish_reading: '''escondidos'' con nota alternativa para ''guardados'' o ''reservados'''
  alternative_spanish_readings:
  - '''guardados'''
  - '''reservados'''
  - '''ocultos'''
  rationale: 'La forma española mantiene la tensión del original: puede sugerir ocultamiento frente a reclamos de sabiduría secreta, pero no obliga a decidir si el énfasis es inaccesibilidad, custodia o provisión segura. Esa ambigüedad es parte del valor exegético del versículo.'
  doctrine_reference: 'Principio de la traducción POB: preservar la tensión teológica en vez de resolverla de antemano.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados y el control cruzado indicó alto acuerdo. La formulación española sigue la lectura preferida del audit trail y conserva la alternativa interpretativa principal en nota.'
  spanish_consistency_notes:
  - Se usa 'en quien' para mantener la referencia personal del antecedente, coherente con el tratamiento POB de ἐν ᾧ.
  - '''Sabiduría'' y ''conocimiento'' se conservan como par de términos distintos, sin fusionarlos en ''entendimiento''.'
  - '''Escondidos'' traduce ἀπόκρυφοι de manera transparente y natural; la nota preserva la alternativa semántica sin imponerla.'
  - No se introduce 'Cristo' en el verso porque el antecedente ya está implícito en el contexto inmediato; la nota cubre la alternativa más amplia.
  - Se evita 'SEÑOR' u otra sustitución no pertinente, ya que el pasaje no contiene el nombre divino.
