  spanish_quality_summary: El español es legible, pero «gustes» suena poco natural en este contexto ascético; «pruebes» o «degustes» serían más claros, y «pruebes» es el registro más natural y digno. También conviene evitar dos notas para justificar una misma repetición creada por la traducción; es mejor distinguir los verbos en el texto.
  glossary_alignment: 'No hay términos del glosario mayor en juego aquí, pero sí una decisión léxica del proyecto: mantener, cuando sea viable, la diferencia entre verbos griegos distintos. En español, «manipules» para ἅψῃ y «toques» para θίγῃς preserva esa diferencia de manera suficientemente natural. «Pruebes» refleja mejor γεύσῃ que «gustes» en español bíblico actual.'
