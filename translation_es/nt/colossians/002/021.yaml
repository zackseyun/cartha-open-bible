translation:
  language: es
  text: «No manipules[a], ni pruebes, ni toques,»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No toques». ἅψῃ también puede significar «tocar» o «tomar con la mano»; aquí se traduce «manipules» para distinguirlo del posterior θίγῃς, «toques».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No debes
  lexicon: μή + aoristo subjuntivo prohibitivo
  rationale: La construcción griega expresa una prohibición directa; en español, “No” introduce de forma natural la serie imperativa negativa sin añadir explicación.
- source_word: ἅψῃ
  english_pob_choice: handle
  chosen_spanish: toques
  alternatives_spanish:
  - manipules
  - agarres
  lexicon: 'BDAG: ἅπτω (medio)'
  rationale: Aunque el inglés POB eligió “handle” para distinguir este verbo del siguiente, en español una opción más natural y breve es “toques”, manteniendo la fuerza prohibitiva. Se conserva la tensión léxica con una nota, porque el verbo también puede entenderse como “tocar” o “tomar con la mano”.
- source_word: γεύσῃ
  english_pob_choice: taste
  chosen_spanish: gustes
  alternatives_spanish:
  - pruebes
  - gustes de
  lexicon: 'BDAG: γεύομαι'
  rationale: “Gustes” reproduce bien el valor literal de “taste” en español y preserva el paralelismo de la serie prohibitiva.
- source_word: θίγῃς
  english_pob_choice: touch
  chosen_spanish: toques
  alternatives_spanish:
  - tocaras
  - contactes
  lexicon: 'BDAG: θιγγάνω'
  rationale: θίγῃς significa “tocar” o “tocar siquiera/rozar”. En español, “toques” es el equivalente más directo y idiomático.
theological_decisions:
- issue: Serie ascética breve y abrupta
  english_pob_reading: Render as a bare quotation-like series of ascetic rules without adding interpretive qualifiers.
  chosen_spanish_reading: Conservar la brevedad abrupta de la serie prohibitiva, sin añadir complementos interpretativos.
  alternative_spanish_readings:
  - No toques esto, ni gustes de aquello, ni toques eso
  - No manipules, ni pruebes, ni toques
  rationale: El griego presenta solo la cadena de prohibiciones. La traducción española debe preservar esa concisión y no resolver el trasfondo polémico dentro del versículo mismo.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El borrador sigue el texto griego breve y directo de SBLGNT y toma como contexto auditado la decisión del inglés POB de distinguir ἅψῃ de θίγῃς mediante diferentes matices léxicos. En español, ambas formas pueden coincidir en “tocar”, por lo que se conserva la diferencia mediante notas y una redacción compacta.
  spanish_consistency_notes:
  - Se usa el tuteo impersonal (“No toques”) para reflejar la prohibición directa del original.
  - Se evita introducir objetos explícitos como «esto» o «eso», porque el griego no los expresa.
  - Se conserva la repetición final de «toques» porque el texto griego repite dos verbos distintos; la distinción queda en las notas, no en una expansión interpretativa del versículo.
