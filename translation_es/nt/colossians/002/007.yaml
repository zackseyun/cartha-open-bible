translation:
  language: es
  text: habiendo sido arraigados y siendo edificados en él, y siendo afirmados en la fe[a], tal como fueron enseñados, abundando con acción de gracias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en fe»; alternativamente, «en fidelidad». El término griego puede tener los sentidos de fe, confianza o fidelidad, aunque aquí «la fe» probablemente se refiere a la fe que les fue enseñada.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐρριζωμένοι
  english_pob_choice: having been rooted
  chosen_spanish: habiendo sido arraigados
  alternatives_spanish:
  - arraigados
  lexicon: BDAG
  rationale: El participio perfecto exige una forma que preserve acción completada con resultado presente. «Habiendo sido arraigados» mantiene esa fuerza y conserva la metáfora agrícola sin volverla explicación.
- source_word: ἐποικοδομούμενοι
  english_pob_choice: being built up
  chosen_spanish: siendo edificados
  alternatives_spanish:
  - edificados
  - siendo construidos
  lexicon: BDAG
  rationale: El presente participial indica acción en curso. «Siendo edificados» conserva el proceso y la imagen de construcción de manera natural en español.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en Cristo
  - en el Mesías
  lexicon: BDAG
  rationale: El griego usa pronombre, no el título. Por eso el texto español preserva «en él» y deja la identificación a partir del contexto inmediato.
- source_word: βεβαιούμενοι
  english_pob_choice: being established
  chosen_spanish: siendo afirmados
  alternatives_spanish:
  - siendo establecidos
  - siendo confirmados
  - siendo fortalecidos
  lexicon: BDAG
  rationale: «Afirmados» comunica la idea de ser hechos firmes o seguros sin sobrecargar con un matiz técnico de confirmación; en español suena claro junto con el paralelismo de los otros participios.
- source_word: τῇ πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fe cristiana
  - en la fidelidad
  - en la confianza
  lexicon: BDAG
  rationale: Se mantiene «la fe» para conservar el probable sentido objetivo del artículo y la referencia al contenido recibido en la enseñanza apostólica, sin sustituirlo por una paráfrasis doctrinal.
- source_word: καθὼς ἐδιδάχθητε
  english_pob_choice: just as you were taught
  chosen_spanish: tal como fueron enseñados
  alternatives_spanish:
  - así como fueron enseñados
  - como fueron enseñados
  lexicon: BDAG
  rationale: «Tal como» reproduce bien la fuerza comparativa de καθώς. Se evita añadir explícitamente «ustedes» para mantener el español fluido con el sujeto implícito del plural.
- source_word: περισσεύοντες
  english_pob_choice: overflowing
  chosen_spanish: abundando
  alternatives_spanish:
  - rebosando
  - sobrando
  lexicon: BDAG
  rationale: «Abundando» conserva el sentido de superabundancia del participio y es más sobrio que «rebosando», aunque ambas opciones son posibles.
- source_word: ἐν εὐχαριστίᾳ
  english_pob_choice: with thanksgiving
  chosen_spanish: en agradecimiento
  alternatives_spanish:
  - con gratitud
  - con acción de gracias
  lexicon: BDAG
  rationale: Se eligió «en agradecimiento» para reflejar la preposición ἐν y el sustantivo εὐχαριστία sin caer en una fórmula demasiado litúrgica; comunica bien la esfera en la que abunda la acción.
theological_decisions:
- issue: Sentido de τῇ πίστει
  english_pob_reading: the faith, understood as the Christian faith/message in which the Colossians are being established
  chosen_spanish_reading: la fe, entendida como la fe cristiana recibida y enseñada
  alternative_spanish_readings:
  - la fe como confianza personal
  - la fidelidad
  rationale: 'El artículo con πίστις y la frase «tal como fueron enseñados» favorecen una lectura objetiva: el ámbito o contenido de la enseñanza apostólica. Se conserva «la fe» para no perder la tensión entre creencia, lealtad y contenido doctrinal.'
  doctrine_reference: 'DOCTRINE.md: términos en disputa para πίστις; filosofía de traducción 3'
- issue: Relación de los tres participios con el creyente
  english_pob_reading: 'describes ongoing/resultative spiritual formation: rooted, built up, established'
  chosen_spanish_reading: 'describe una formación espiritual continua con resultado presente: arraigados, edificados y afirmados'
  alternative_spanish_readings:
  - tres acciones separadas
  - una mera metáfora decorativa
  rationale: La cadena participial debe leerse como un retrato coherente del estado y proceso de la comunidad, no como acciones desconectadas. La traducción mantiene esa progresión aspectual sin suavizarla.
  doctrine_reference: Gramática verbal griega del participio perfecto/presente en contexto paulino
translation_notes:
  revision_awareness: 'El borrador sigue el juicio de alta concordancia del último repaso: no se introdujeron cambios sustantivos respecto del análisis inglés, y se preservó la progresión aspectual de los participios, la referencia pronómica de ἐν αὐτῷ y la lectura más probable de τῇ πίστει.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo participial con gerundios y participios compuestos cuando conviene al aspecto griego.
  - Se evita reemplazar el pronombre por un nombre propio, respetando el texto fuente.
  - «La fe» se conserva como término técnico de la carta, sin imponer «fidelidad» como lectura principal.
  - El cierre con «en agradecimiento» busca ser natural en español sin perder el valor del sustantivo εὐχαριστία.
