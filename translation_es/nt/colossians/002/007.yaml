  to: habiendo sido arraigados y siendo edificados en él, y siendo afirmados en la fe[a], tal como fueron enseñados, abundando con acción de gracias.
  rationale: Se conserva la estructura y las decisiones léxicas principales del borrador, pero se corrige la frase final para reflejar mejor ἐν εὐχαριστίᾳ en español natural y en línea con la auditoría inglesa. También se simplifican las notas para conservar solo la alternativa significativa documentada para πίστις.
