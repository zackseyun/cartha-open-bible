review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la cadena participial griega y preserva las metáforas de arraigo, edificación y firmeza. También mantiene correctamente «en él» para ἐν αὐτῷ y «la fe» para τῇ πίστει, con nota adecuada sobre alternativas. Sin embargo, «en agradecimiento» para ἐν εὐχαριστίᾳ no refleja tan bien el uso paulino ni la decisión auditada en inglés; en español bíblico natural la mejor equivalencia es «con acción de gracias» o «con gratitud».
  spanish_quality_summary: El español es generalmente claro y digno, pero algo pesado por la repetición de «siendo». Aun así, eso no exige corrección mayor. El problema principal de naturalidad y fidelidad está en «abundando en agradecimiento», que suena menos idiomático y menos bíblico que «rebosando con acción de gracias» o «abundando con acción de gracias».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «En él» respeta el pronombre griego. «La fe» está bien alineado con la decisión sobre πίστις. La revisión propuesta ajusta εὐχαριστία a «acción de gracias», que encaja mejor con el uso paulino y con la auditoría inglesa.
  issues:
  - severity: medium
    issue: «en agradecimiento» para ἐν εὐχαριστίᾳ
    rationale: Aunque formalmente intenta reflejar ἐν, no suena tan natural en español bíblico y debilita el matiz de «thanksgiving»/«acción de gracias» documentado en la auditoría inglesa. «Con acción de gracias» preserva mejor el sentido y la dicción paulina.
  - severity: low
    issue: Nota a en «arraigados» no es necesaria según la auditoría inglesa
    rationale: El inglés solo conserva nota para πίστις. La nota sobre el perfecto griego no es errónea, pero añade explicación no exigida por una ambigüedad relevante en español. Puede omitirse para mantener economía editorial.
  revised_spanish_text: habiendo sido arraigados y siendo edificados en él, y siendo afirmados en la fe[a], tal como fueron enseñados, abundando con acción de gracias.
  revised_footnotes:
  - marker: a
    text: O «en fe»; alternativamente, «en fidelidad». El término griego puede tener los sentidos de fe, confianza o fidelidad, aunque aquí «la fe» probablemente se refiere a la fe que les fue enseñada.
    reason: alternative_reading
  revision_rationale: Se conserva la estructura y las decisiones léxicas principales del borrador, pero se corrige la frase final para reflejar mejor ἐν εὐχαριστίᾳ en español natural y en línea con la auditoría inglesa. También se simplifican las notas para conservar solo la alternativa significativa documentada para πίστις.
