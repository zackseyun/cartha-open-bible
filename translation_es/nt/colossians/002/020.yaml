translation:
  language: es
  text: Si habéis muerto con el Mesías de cara a los principios elementales del mundo[a], ¿por qué, como si vivierais en el mundo, os sometéis a decretos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritus elementales del mundo»; alternativamente, «elementos básicos del mundo».
    reason: alternative_reading
lexical_decisions:
- source_word: Εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: BDAG
  rationale: La partícula condicional se conserva como condición formal. En español, «Si» mantiene la estructura retórica sin convertirla prematuramente en una causal explícita.
- source_word: ἀπεθάνετε
  english_pob_choice: you died
  chosen_spanish: habéis muerto
  alternatives_spanish:
  - moristeis
  - habéis fallecido
  lexicon: BDAG
  rationale: El aoristo indica una acción decisiva pasada; «habéis muerto» comunica bien el hecho consumado con relevancia presente en español. Se evita una paráfrasis más explicativa.
- source_word: σὺν Χριστῷ
  english_pob_choice: with the Messiah
  chosen_spanish: con el Mesías
  alternatives_spanish:
  - con Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» conforme al criterio del proyecto para Χριστός como título. «Cristo» se evita aquí porque el contexto es titular y no exige la forma litúrgica fija.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: respecto a
  alternatives_spanish:
  - de
  - desde
  - separados de
  lexicon: BDAG
  rationale: El valor de separación de ἀπό se entiende en relación con los στοιχεῖα. «Respecto a» evita una lectura espacial torpe en español y sigue el sentido de desvinculación del ámbito señalado.
- source_word: τῶν στοιχείων τοῦ κόσμου
  english_pob_choice: the elemental principles of the world
  chosen_spanish: los principios elementales del mundo
  alternatives_spanish:
  - los elementos básicos del mundo
  - los espíritus elementales del mundo
  lexicon: BDAG
  rationale: «Principios elementales» mantiene la ambigüedad de στοιχεῖα entre elementos básicos, principios rudimentarios y posibles poderes cósmicos. «Elementales» conserva la fuerza adjetival sin resolver indebidamente la tensión.
- source_word: τί
  english_pob_choice: why
  chosen_spanish: ¿por qué
  alternatives_spanish:
  - ¿para qué motivo
  - ¿con qué razón
  lexicon: BDAG
  rationale: En esta pregunta retórica, τί pide «¿por qué?». Es la equivalencia idiomática natural en español.
- source_word: ὡς ζῶντες ἐν κόσμῳ
  english_pob_choice: as if living in the world
  chosen_spanish: como si vivierais en el mundo
  alternatives_spanish:
  - como si estuvierais viviendo en el mundo
  - como si siguierais en el mundo
  lexicon: BDAG
  rationale: La construcción con ὡς + participio expresa supuesto o apariencia. «Como si vivierais» preserva la comparativa y el tono retórico sin añadir contenido.
- source_word: δογματίζεσθε
  english_pob_choice: are you submitting yourselves to decrees
  chosen_spanish: os sometéis a decretos
  alternatives_spanish:
  - os sometéis a regulaciones
  - os dejáis imponer decretos
  - estáis sujetos a decretos
  lexicon: BDAG
  rationale: El verbo puede leerse con matiz pasivo o reflexivo. «Os sometéis» conserva la participación del sujeto y encaja con la pregunta retórica; «decretos» sigue el peso jurídico del término en este contexto.
theological_decisions:
- issue: Sentido de στοιχεῖα en Colosenses 2
  english_pob_reading: Rendered as 'elemental principles' in the main text, with alternatives 'elemental spirits' and 'basic elements' preserved in a footnote.
  chosen_spanish_reading: «principios elementales» en el texto principal, dejando abierta la posibilidad de otras lecturas
  alternative_spanish_readings:
  - «espíritus elementales»
  - «elementos básicos»
  rationale: El pasaje de Colosenses presenta una tensión real entre un sentido rudimentario/sistémico y posibles matices cósmico-espirituales. La redacción española conserva esa ambigüedad en vez de fijarla de modo prematuro.
  doctrine_reference: Preservar la tensión lexical y teológica de στοιχεῖα sin resolverla artificialmente.
translation_notes:
  revision_awareness: El borrador inglés revisado ajustó ἀπό de «away from» a «from» para una traducción más directa y natural. La versión española toma ese ajuste en cuenta con una construcción de separación relacional («respecto a») que evita calcos innecesarios y conserva la ambigüedad de στοιχεῖα sin perder claridad.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός, siguiendo la política del proyecto.
  - «Principios elementales» intenta reproducir la tensión semántica de στοιχεῖα sin optar por una sola interpretación.
  - La pregunta final se ha formulado como interrogativa directa en español para reflejar la fuerza retórica del griego.
  - «Os sometéis» conserva el posible matiz medio/reflexivo del verbo griego en un español natural y publicable.
