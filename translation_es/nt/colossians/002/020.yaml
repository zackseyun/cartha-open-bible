revisions:
- from: Si habéis muerto con el Mesías[a] respecto a los principios elementales del mundo, ¿por qué, como si vivierais en el mundo, os sometéis a decretos?
  to: Si habéis muerto con el Mesías de cara a los principios elementales del mundo[a], ¿por qué, como si vivierais en el mundo, os sometéis a decretos?
  rationale: Se revisa «respecto a» para expresar mejor el valor separativo de ἀπό en un español natural y teológicamente fiel, y se mueve la nota al sintagma «principios elementales del mundo», que es el verdadero término debatido. Se conserva «habéis muerto» por buena legibilidad general, aunque «moristeis» también sería defendible.
