review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura argumentativa y casi todas las decisiones léxicas del griego y del audit trail inglés: conserva la condición formal con «Si», mantiene «Mesías», traduce τί idiomáticamente como «¿por qué?», y expresa bien ὡς ζῶντες ἐν κόσμῳ y δογματίζεσθε. La principal desviación está en ἀπὸ, donde «respecto a» debilita el sentido de separación/liberación presente en el griego y documentado en el POB inglés.'
  spanish_quality_summary: El texto es claro y legible en español eclesial moderno. Sin embargo, «respecto a los principios elementales del mundo» suena más abstracto-relacional que separativo, y por eso no comunica con suficiente fuerza la muerte con el Mesías en relación de ruptura con los στοιχεῖα. Una formulación con «a/de» o «con respecto a/de entre» sería más fiel y natural. También conviene anclar la nota al sintagma discutido στοιχεῖα, no a «Mesías».
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: Χριστῷ -> «el Mesías» está bien; no hay conflicto con otras entradas del glosario. La decisión principal a corregir es ἀπὸ -> no «respecto a», sino una expresión española que preserve separación. La nota alternativa sobre στοιχεῖα debe ir anclada en «principios elementales del mundo[a]».'
  issues:
  - severity: medium
    issue: «respecto a» para ἀπὸ debilita el sentido de separación
    rationale: ἀπό marca separación o alejamiento. «Respecto a» expresa relación temática, no liberación/ruptura. En este contexto paulino importa que han muerto con el Mesías en relación de separación frente a los στοιχεῖα.
  - severity: medium
    issue: La nota al pie está anclada a «Mesías» en lugar de al sintagma discutido «principios elementales del mundo»
    rationale: La nota explica alternativas para στοιχεῖα, no para Χριστός. Debe colocarse donde el lector vea el término al que pertenecen las alternativas.
  - severity: low
    issue: «habéis muerto» es aceptable, pero «moristeis» encaja mejor con el aoristo simple y con el audit trail inglés
    rationale: No es un error grave, pero el inglés POB privilegia el pasado simple. En español bíblico moderno, «moristeis» puede sonar algo peninsular; por eso «habéis muerto» puede mantenerse si el resto queda fiel.
  revised_spanish_text: Si habéis muerto con el Mesías de cara a los principios elementales del mundo[a], ¿por qué, como si vivierais en el mundo, os sometéis a decretos?
  revised_footnotes:
  - marker: a
    text: O «espíritus elementales del mundo»; alternativamente, «elementos básicos del mundo».
    reason: alternative_reading
  revision_rationale: Se revisa «respecto a» para expresar mejor el valor separativo de ἀπό en un español natural y teológicamente fiel, y se mueve la nota al sintagma «principios elementales del mundo», que es el verdadero término debatido. Se conserva «habéis muerto» por buena legibilidad general, aunque «moristeis» también sería defendible.
