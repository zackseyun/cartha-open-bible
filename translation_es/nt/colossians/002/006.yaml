translation:
  language: es
  text: Por tanto[a], así como recibieron al Mesías Jesús el Señor, anden en él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así pues».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς οὖν
  english_pob_choice: Therefore / just as
  chosen_spanish: Por tanto, así como
  alternatives_spanish:
  - Entonces, así como
  - De manera que, así como
  lexicon: BDAG
  rationale: Ὡς introduce comparación y οὖν marca inferencia. En español, 'Por tanto' conserva la conexión lógica; 'así como' reproduce la comparación sin volverla pesada.
- source_word: παρελάβετε
  english_pob_choice: received
  chosen_spanish: recibieron
  alternatives_spanish:
  - aceptaron
  - recibieron y acogieron
  lexicon: BDAG
  rationale: El aoristo indica una recepción pasada ya cumplida. 'Recibieron' mantiene amplitud para la recepción de la persona y del mensaje, sin especificar más de lo que el griego dice.
- source_word: τὸν Χριστὸν Ἰησοῦν
  english_pob_choice: Messiah Jesus
  chosen_spanish: al Mesías Jesús
  alternatives_spanish:
  - a Cristo Jesús
  - al Cristo Jesús
  lexicon: BDAG
  rationale: 'Se conserva Χριστός como título (''Mesías'') según la política del proyecto. La estructura del griego favorece un sintagma titular en aposición: ''el Mesías Jesús''.'
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - Señor
  lexicon: BDAG
  rationale: κύριος funciona aquí como título cristológico. En español 'el Señor' es la forma natural y fiel, manteniendo el artículo como en el griego.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en unión con él
  - unidos a él
  lexicon: BDAG
  rationale: Se conserva la concisión paulina y su posible carga de unión/situación sin resolverla con una paráfrasis interpretativa.
- source_word: περιπατεῖτε
  english_pob_choice: walk
  chosen_spanish: anden
  alternatives_spanish:
  - caminen
  - vivan
  lexicon: BDAG
  rationale: El verbo metafórico de conducta se expresa naturalmente en español con 'anden', que conserva la imagen de caminar y el valor imperativo plural.
theological_decisions:
- issue: Renderizar Χριστός como título y no como nombre fijo
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: el Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  - Cristo
  rationale: La decisión mantiene la distinción entre título y nombre, conforme al principio del proyecto de traducir títulos. 'Mesías' preserva el valor semántico de Χριστός; 'Cristo' se evita aquí por ser una forma ya lexicalizada que atenúa el título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Conservar la tensión de ἐν αὐτῷ
  english_pob_reading: in him
  chosen_spanish_reading: en él
  alternative_spanish_readings:
  - en unión con él
  rationale: La frase puede implicar relación, esfera o unión espiritual, pero el griego es breve. Se preserva la ambigüedad teológica sin expandirla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en el sentido general: inferencia lógica, comparación, recepción previa de Cristo/Mesías Jesús y mandato de vivir/andar en él. El español sigue la decisión restaurada de traducir Χριστός como «Mesías», evitando la versión revertida a «Christ» en una revisión posterior. Se mantuvo la brevedad de ἐν αὐτῷ sin explicitarla como «en unión con él».'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός, en línea con la terminología del proyecto.
  - Se usa «el Señor» para κύριος como título cristológico natural en español.
  - «Anden» conserva el imperativo plural y la metáfora paulina de conducta.
  - La puntuación refleja una sola cláusula comparativa con mandato final, conforme al griego.
