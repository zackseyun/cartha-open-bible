translation:
  language: es
  text: y no aferrándose a la Cabeza[a], de quien todo el cuerpo, siendo sostenido y mantenido unido[b] mediante las coyunturas y ligamentos, crece con el crecimiento de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adhiriéndose a la Cabeza».
    reason: lexical_alternative
  - marker: b
    text: O «siendo nutrido y entretejido mediante las coyunturas y ligamentos».
    reason: lexical_alternative
  - marker: c
    text: Lit. «crece con el crecimiento de Dios»; el giro probablemente significa crecimiento que procede de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρατῶν
  english_pob_choice: holding fast
  chosen_spanish: aferrándose a
  alternatives_spanish:
  - manteniéndose firme a
  - sosteniéndose de
  - agarrándose a
  lexicon: BDAG
  rationale: El participio expresa adherencia firme y continua, no simple posesión ni contacto físico. «Aferrándose a» comunica bien la idea de apego steadfast a la Cabeza en español natural.
- source_word: κεφαλήν
  english_pob_choice: the Head
  chosen_spanish: la Cabeza
  alternatives_spanish:
  - la cabeza
  lexicon: BDAG
  rationale: Se conserva el valor metafórico de Cristo como fuente y autoridad del cuerpo. En español, la mayúscula en «Cabeza» ayuda a señalar el referente sin alterar el sentido léxico.
- source_word: πᾶν τὸ σῶμα
  english_pob_choice: the whole body
  chosen_spanish: todo el cuerpo
  alternatives_spanish:
  - el cuerpo entero
  - todo el organismo
  lexicon: BDAG
  rationale: La expresión griega es colectiva e idiomática; «todo el cuerpo» mantiene la imagen unitaria de la iglesia sin añadir matices extraños.
- source_word: ἁφῶν
  english_pob_choice: joints
  chosen_spanish: coyunturas
  alternatives_spanish:
  - articulaciones
  - juntas
  lexicon: BDAG
  rationale: En el campo anatómico-metafórico, «coyunturas» es un equivalente digno y comprensible en español bíblico para los puntos de conexión del cuerpo.
- source_word: συνδέσμων
  english_pob_choice: ligaments
  chosen_spanish: ligamentos
  alternatives_spanish:
  - bandas
  - sienes
  lexicon: BDAG
  rationale: «Ligamentos» es el correlato anatómico natural de ἁφαί en la metáfora corporal y conserva el vínculo de unión que el término implica.
- source_word: ἐπιχορηγούμενον
  english_pob_choice: being supplied
  chosen_spanish: alimentado
  alternatives_spanish:
  - suministrado
  - provisto
  - nutrido
  lexicon: BDAG
  rationale: El participio pasivo indica provisión o sostén para el cuerpo. «Alimentado» capta una parte importante de ese suministro en un español fluido, aunque deja abierta la amplitud del apoyo recibido.
- source_word: συμβιβαζόμενον
  english_pob_choice: held together
  chosen_spanish: unido
  alternatives_spanish:
  - mantenido unido
  - compactado
  - ligado
  lexicon: BDAG
  rationale: El verbo expresa cohesión, enlace y unidad estructural. «Unido» es breve y natural; junto con el contexto anatómico conserva la idea de ser mantenido en cohesión.
- source_word: αὔξει
  english_pob_choice: grows
  chosen_spanish: crece
  alternatives_spanish:
  - aumenta
  - se desarrolla
  lexicon: BDAG
  rationale: El verbo sigue la metáfora orgánica del cuerpo. «Crece» es la opción más natural en español y mantiene la imagen viva sin abstractizarla.
- source_word: τὴν αὔξησιν τοῦ θεοῦ
  english_pob_choice: with the growth of God
  chosen_spanish: con el crecimiento de Dios
  alternatives_spanish:
  - con el crecimiento que viene de Dios
  - con el crecimiento dado por Dios
  - con crecimiento de Dios
  lexicon: BDAG
  rationale: Se conserva el giro compacto del griego y la tensión del genitivo. La forma española sigue siendo literal y auditable; el contexto permite entender que el crecimiento procede de Dios, sin resolverlo de modo excesivamente explicativo en el texto principal.
theological_decisions:
- issue: Valor del genitivo en τὴν αὔξησιν τοῦ θεοῦ
  english_pob_reading: 'source genitive: the body grows with growth that comes from God; English moved from ''from God'' to ''of God'' in the latest revision'
  chosen_spanish_reading: 'genitivo abierto: «el crecimiento de Dios» puede oírse como crecimiento que proviene de Dios, sin afirmar que Dios sea quien crece'
  alternative_spanish_readings:
  - el crecimiento que viene de Dios
  - el crecimiento dado por Dios
  - el crecimiento de Dios
  rationale: El griego permite varias relaciones del genitivo, y el contexto favorece el origen divino del crecimiento. En español, «de Dios» conserva la forma compacta y la tensión textual, mientras que una explicitación mayor quedaría mejor reservada para una nota.
  doctrine_reference: Translation philosophy §3 (preserve theological tension where genuine ambiguity exists)
translation_notes:
  revision_awareness: La auditoría inglesa revisó la frase final de «growth from God» a «growth of God» para reflejar más de cerca el genitivo τοῦ θεοῦ sin perder naturalidad. La redacción española conserva esa cercanía formal con «crecimiento de Dios», mientras la nota c explicita la lectura de origen divino. También se preservó la oscilación lexical entre unión anatómica y nutrición/sostén mediante una traducción principal compacta con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Cabeza» con mayúscula para el referente cristológico, coherente con el tratamiento inglés auditado.
  - Se eligió un par anatómico claro («coyunturas y ligamentos») para reproducir la metáfora corporal sin sobreinterpretarla.
  - El final conserva la ambigüedad teológica del genitivo, evitando reemplazarla por una paráfrasis interpretativa en el texto principal.
  - La sintaxis española sigue de cerca la progresión participial del griego, pero con fluidez natural para lectura eclesial.
