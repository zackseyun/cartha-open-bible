    reason: lexical_alternative
  - marker: b
    text: O posiblemente 'en el Espíritu'; la frase también puede entenderse como presencia no corporal.
    reason: theological_note
  - marker: c
    text: O 'la constancia' de su fe en Mesías'; o posiblemente 'la firmeza de su fidelidad hacia Mesías'.
    reason: lexical_alternative
  revision_rationale: 'Se conservaron las decisiones principales correctas del borrador, pero se hicieron ajustes menores para alinearlo mejor con el griego y con el audit trail inglés: orden más natural en español, participio más idiomático, y notas revisadas para preservar la ambigüedad sin sobreinterpretar y para reflejar con más precisión las alternativas léxicas documentadas.'
