review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: ausencia corporal vs. presencia en espíritu, los participios simultáneos, y los sustantivos τάξιν/στερέωμα. También mantiene correctamente ''Mesías'' para Χριστόν. Sin embargo, las notas no siguen fielmente el rastro auditado en dos puntos: la nota sobre ''en espíritu'' introduce demasiado explícitamente ''por el Espíritu Santo'', y la nota de ''firmeza'' mezcla dos alternativas de términos griegos distintos en una sola nota, omitiendo además la alternativa simple de ''constancia''/''estabilidad'' como equivalente de στερέωμα de manera más limpia.'
  spanish_quality_summary: El texto principal es natural y legible. No obstante, 'gozándome' suena algo menos natural en español general contemporáneo que 'regocijándome' o 'alegrándome'. Además, la colocación 'en espíritu estoy con ustedes' es comprensible, pero 'estoy con ustedes en espíritu' fluye mejor. El resto del verso está bien en registro y claridad.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: σάρξ -> ''carne'' en sentido físico, πνεῦμα -> ''espíritu'' en minúscula, Χριστός -> ''Mesías'', πίστις -> ''fe''. La excepción necesaria es estilística: ajustar ''gozándome'' a ''regocijándome'' mejora la legibilidad sin apartarse del sentido.'
  issues:
  - severity: medium
    issue: La nota [b] sobre 'en espíritu' sobreinterpreta la alternativa.
    rationale: El audit trail inglés preserva la ambigüedad y presenta 'in the Spirit' solo como alternativa léxica, no como explicación afirmada 'por el Espíritu Santo'. En español, esa formulación inclina demasiado la interpretación doctrinal.
  - severity: medium
    issue: La nota [c] combina alternativas de dos unidades semánticas distintas.
    rationale: '''La estabilidad'' corresponde a στερέωμα, pero ''la firmeza de vuestra fidelidad hacia Mesías'' mezcla στερέωμα con la lectura alternativa de πίστις/εἰς Χριστόν. Conviene separar y formular la nota como alternativa completa clara, tal como hace el inglés.'
  - severity: low
    issue: '''Gozándome'' suena menos natural en español bíblico moderno general.'
    rationale: Aunque no es incorrecto, 'regocijándome' expresa mejor χαίρων en registro digno y ampliamente comprensible.
  - severity: low
    issue: El orden 'en espíritu estoy con ustedes' puede mejorarse.
    rationale: '''Estoy con ustedes en espíritu'' es más idiomático en español sin alterar el énfasis ni el sentido.'
  revised_spanish_text: Porque, aunque estoy ausente en la carne[a], sin embargo estoy con ustedes en espíritu[b], regocijándome y viendo su buen orden y la firmeza[c] de su fe en Mesías.
  revised_footnotes:
