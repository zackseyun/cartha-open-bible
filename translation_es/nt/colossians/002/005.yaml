    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek Χριστόν more naturally and consistently in this verse''s formal register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque, aunque estoy ausente en la carne[a], sin embargo estoy con ustedes en espíritu[b], regocijándome y viendo su buen orden y la firmeza[c] de su fe en Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'físicamente' o 'en el cuerpo'.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente 'en el Espíritu'; la frase también puede entenderse como presencia no corporal.
    reason: theological_note
  - marker: c
    text: O 'la constancia' de su fe en Mesías'; o posiblemente 'la firmeza de su fidelidad hacia Mesías'.
    reason: lexical_alternative
lexical_decisions:
- source_word: σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - físicamente
  - en el cuerpo
  lexicon: BDAG
  rationale: El contraste inmediato con 'en espíritu' pide conservar la oposición corporal/ no corporal. 'En la carne' reproduce con fidelidad el valor físico de σάρξ aquí, sin introducir el sentido ético de 'naturaleza pecaminosa'.
- source_word: πνεύματι
  english_pob_choice: in spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - espiritualmente
  - en el Espíritu
  lexicon: BDAG
  rationale: La dative contrasta con la ausencia 'en la carne' y, según el auditorio, puede referirse al propio modo de presencia de Pablo. Mantener 'en espíritu' deja abierta la tensión sin convertirla en una afirmación explícita sobre el Espíritu Santo.
- source_word: χαίρων
  english_pob_choice: rejoicing
  chosen_spanish: gozándome
  alternatives_spanish:
  - regocijándome
  - alegrándome
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante con 'estoy con ustedes'. 'Gozándome' conserva el valor de alegría intensa y funciona bien en español solemne.
- source_word: βλέπων
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - observando
  - contemplando
  lexicon: BDAG
  rationale: '''Viendo'' mantiene la secuencia participial sin sobreinterpretar si se trata de visión literal o percepción mental.'
- source_word: τάξιν
  english_pob_choice: good order
  chosen_spanish: buen orden
  alternatives_spanish:
  - orden
  - disciplina
  lexicon: BDAG
  rationale: '''Buen orden'' comunica ordenación correcta y aprobada, y evita un matiz militar o excesivamente rígido. Refleja la valoración positiva implícita en el contexto.'
- source_word: στερέωμα
  english_pob_choice: firmness
  chosen_spanish: firmeza
  alternatives_spanish:
  - estabilidad
  - solidez
  - steadfastness
  lexicon: BDAG
  rationale: στερέωμα denota firmeza/solidez. 'Firmeza' es natural en español y conserva la imagen de algo estable y seguro, especialmente en relación con la fe.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se conserva el término básico 'fe' como opción principal. La posibilidad de 'fidelidad' queda implícita como matiz potencial, pero no se eleva al texto principal.
- source_word: εἰς Χριστόν
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - hacia Mesías
  - en Cristo
  lexicon: BDAG
  rationale: 'Se traduce Χριστός como ''Mesías'' según el principio terminológico del proyecto cuando funciona como título. La construcción con εἰς en este contexto se entiende idiomáticamente como la orientación u objeto de la fe: ''fe en Mesías''.'
theological_decisions:
- issue: Sentido de 'en espíritu' frente a 'en la carne'
  english_pob_reading: Paul means he is not physically present but is present with them in his spirit.
  chosen_spanish_reading: Pablo está ausente físicamente, pero presente con ellos en su espíritu.
  alternative_spanish_readings:
  - presente por el Espíritu Santo
  - presente espiritualmente
  rationale: El antónimo inmediato favorece una oposición entre ausencia corporal y presencia no física personal. La traducción no capitaliza 'espíritu', preservando la ambigüedad sin afirmar más de lo que el texto exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no imponer una lectura pneumatológica específica.
- issue: Renderización de Χριστόν
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La política terminológica del proyecto favorece 'Mesías' cuando Χριστός funciona como título. Aquí la expresión 'fe en Mesías' conserva ese valor titular y evita el mero nombre eclesiástico.
  doctrine_reference: Χριστός → Mesías cuando el contexto es titular.
- issue: Posible matiz de πίστις en 'fe en Mesías'
  english_pob_reading: faith; with note that 'faithfulness toward Messiah' is possible
  chosen_spanish_reading: fe en Mesías
  alternative_spanish_readings:
  - fidelidad hacia Mesías
  - confianza en Mesías
  rationale: El sentido principal sigue siendo 'fe'. Como en el audit trail inglés, se deja constancia de la alternativa 'fidelidad' en nota para no borrar la tensión léxica.
  doctrine_reference: Mantener alternativas léxicas donde el griego admite más de una relación semántica.
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión en la que 'Christ' fue revertido a 'Messiah'; la versión española sigue esa restauración terminológica y mantiene la tensión de πίστις con una nota alternativa. También conserva la distinción entre ausencia 'en la carne' y presencia 'en espíritu' sin resolverla de manera doctrinal.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός en coherencia con la terminología del proyecto.
  - '''en la carne'' y ''en espíritu'' reproducen el contraste semántico del griego sin añadir interpretación.'
  - '''buen orden'' y ''firmeza'' son formulaciones naturales y transparentes en español contemporáneo.'
  - La nota sobre 'fidelidad' preserva la alternativa léxica documentada para πίστις sin desplazar 'fe' del texto principal.
