id: COL.2.5
reference: Colossians 2:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: εἰ γὰρ καὶ τῇ σαρκὶ ἄπειμι, ἀλλὰ τῷ πνεύματι σὺν ὑμῖν εἰμι, χαίρων καὶ βλέπων ὑμῶν τὴν τάξιν καὶ τὸ στερέωμα τῆς εἰς Χριστὸν πίστεως ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/005.yaml
  text: For even if I am absent in the flesh[a], yet I am with you in spirit[c][b], rejoicing and seeing your good order and the firmness of your faith in Messiah.
  footnotes:
  - marker: a
    text: Or 'the steadfastness' of your faith in Messiah.
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'the firmness of your faithfulness toward Messiah.'
    reason: alternative_reading
  - marker: c
    text: Greek 'in Christ'; translated 'in Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
