  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Deidad' preserva mejor θεότης que 'divinidad'. 'Habita' es buena elección para κατοικεῖ. 'Corporalmente' es aceptable y fiel para σωματικῶς. No se requieren notas obligatorias, aunque conviene conservar la alternativa léxica inglesa en una nota española.
