translation:
  language: es
  text: Pues en él toda la plenitud de la deidad habita corporalmente,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda la plenitud de la Deidad habita en él corporalmente»; también, «la plenitud total de la Deidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: En este contexto ὅτι introduce la base o razón de lo anterior; en español, 'Porque' expresa con naturalidad ese valor causal sin añadir énfasis ajeno al griego.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él mismo
  lexicon: BDAG
  rationale: La referencia es a Cristo/Mesías; 'en él' reproduce la relación locativa de forma directa y natural en español.
- source_word: κατοικεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - reside
  - mora
  lexicon: BDAG
  rationale: '''Habita'' conserva la idea de morada continua y estable mejor que un verbo más general o más arcaico, y evita sonar mecánico.'
- source_word: πᾶν τὸ πλήρωμα
  english_pob_choice: all the fullness
  chosen_spanish: toda la plenitud
  alternatives_spanish:
  - toda la totalidad
  - todo el llenado
  lexicon: BDAG
  rationale: El giro griego expresa totalidad; 'toda la plenitud' mantiene ese alcance sin forzar una repetición incómoda en español.
- source_word: τῆς θεότητος
  english_pob_choice: of deity
  chosen_spanish: de la deidad
  alternatives_spanish:
  - de la divinidad
  - del Dioshead
  lexicon: BDAG
  rationale: '''Deidad'' refleja bien θεότης, término fuerte para la condición de ser Dios. ''Divinidad'' podría sonar más general y menos preciso; se evita ''Dioshead'' por no ser español.'
- source_word: σωματικῶς
  english_pob_choice: bodily
  chosen_spanish: corporalmente
  alternatives_spanish:
  - bodily
  - en forma corporal
  lexicon: BDAG
  rationale: '''Corporalmente'' traduce el adverbio con claridad y conserva la afirmación de un modo corporal de presencia. ''En forma corporal'' sería interpretativo y más explicativo que el griego.'
theological_decisions:
- issue: Alcance cristológico de θεότης y σωματικῶς
  english_pob_reading: The verse affirms that the full reality of deity dwells in Christ bodily.
  chosen_spanish_reading: El versículo afirma que toda la plenitud de la deidad habita en Cristo corporalmente.
  alternative_spanish_readings:
  - El versículo habla solo de rasgos divinos en Cristo
  - El versículo se refiere únicamente a la presencia de Dios en Cristo
  rationale: θεότης es un término fuerte que apunta a la cualidad/realidad de ser Dios, y σωματικῶς indica que esa plenitud habita de modo corporal. La traducción debe conservar esa afirmación alta acerca de Cristo sin diluirla en una mera presencia o en atributos divinos vagos.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada en el texto. La redacción final integra las decisiones léxicas y teológicas sin necesidad de notas, porque la lectura base en español puede expresar con suficiente claridad el sentido del griego y del audit trail en una sola línea.
  spanish_consistency_notes:
  - Se preserva el tono digno y publicable propio de una traducción bíblica contemporánea.
  - Se evita 'SEÑOR' como sustituto del nombre divino, pero aquí el versículo no requiere una decisión sobre יהוה.
  - '''Deidad'' se usa de manera consistente con el valor fuerte de θεότης, evitando rebajarlo a una simple cualidad religiosa.'
  - '''Corporalmente'' mantiene el adverbio σωματικῶς sin expandirlo innecesariamente.'
