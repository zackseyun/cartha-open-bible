translation:
  language: es
  text: En él[a] también fueron circuncidados con una circuncisión no hecha por manos[b], en el despojo del cuerpo de carne[c][d], en la circuncisión del Mesías[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en quien».
    reason: lexical_alternative
  - marker: b
    text: O «con una circuncisión hecha sin manos».
    reason: lexical_alternative
  - marker: c
    text: O «en el despojar del cuerpo de carne».
    reason: lexical_alternative
  - marker: d
    text: «Carne» también podría entenderse más interpretativamente como «naturaleza pecaminosa», pero aquí se conserva el término griego con mayor literalidad.
    reason: lexical_alternative
  - marker: e
    text: O «por la circuncisión del Mesías» o «la circuncisión del Mesías». El griego puede referirse a la circuncisión efectuada por el Mesías, perteneciente al Mesías o asociada con él.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In him
  chosen_spanish: En él
  alternatives_spanish:
  - En quien
  lexicon: BDAG
  rationale: El relativo remite a Cristo en el contexto anterior. «En él» es natural en español y conserva la idea de unión con Cristo; «en quien» queda como alternativa más literal.
- source_word: περιετμήθητε
  english_pob_choice: you were circumcised
  chosen_spanish: fueron circuncidados
  alternatives_spanish:
  - recibieron la circuncisión
  lexicon: BDAG
  rationale: El aoristo pasivo expresa una acción completa sufrida por los creyentes. «Fueron circuncidados» conserva el término técnico y la fuerza verbal sin suavizarlo.
- source_word: περιτομῇ ἀχειροποιήτῳ
  english_pob_choice: with a circumcision not made by hands
  chosen_spanish: con una circuncisión no hecha por manos
  alternatives_spanish:
  - con una circuncisión hecha sin manos
  - con una circuncisión no realizada por manos humanas
  lexicon: BDAG
  rationale: La construcción instrumental/asociativa se expresa naturalmente con «con». «No hecha por manos» mantiene el contraste bíblico entre obra humana y acción divina; la opción «sin manos» se evita aquí por sonar menos transparente en español.
- source_word: ἀχειροποιήτῳ
  english_pob_choice: not made by hands
  chosen_spanish: no hecha por manos
  alternatives_spanish:
  - hecha sin manos
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica tradicional y clara. En español, «no hecha por manos» comunica bien el origen no humano de la acción.
- source_word: ἐν τῇ ἀπεκδύσει
  english_pob_choice: in the removal
  chosen_spanish: en el despojo
  alternatives_spanish:
  - en el quitar
  - en el desprendimiento
  - en el despojar
  lexicon: BDAG
  rationale: El sustantivo sugiere desnudamiento o quitamiento. «Despojo» mantiene la imagen de quitarse algo de encima y permite conservar el matiz metafórico sin explicar de más.
- source_word: τοῦ σώματος τῆς σαρκός
  english_pob_choice: of the body of flesh
  chosen_spanish: del cuerpo de carne
  alternatives_spanish:
  - del cuerpo de la carne
  - del cuerpo carnal
  lexicon: BDAG
  rationale: Se mantiene la estructura del griego sin resolver la tensión interpretativa. «Carne» conserva σάρξ de manera literal; «cuerpo de carne» es más fiel y menos interpretativo que «naturaleza pecaminosa».
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  lexicon: BDAG
  rationale: Se conserva el término literal «carne» para no introducir una paráfrasis doctrinal que el texto no exige. La alternativa más interpretativa se deja abierta pero no se adopta.
- source_word: ἐν τῇ περιτομῇ τοῦ Χριστοῦ
  english_pob_choice: in the circumcision of Messiah
  chosen_spanish: en la circuncisión de Mesías
  alternatives_spanish:
  - en la circuncisión del Mesías
  - con la circuncisión de Mesías
  - en la circuncisión de Cristo
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del genitivo sin decidir si es la circuncisión realizada por Mesías, perteneciente a Mesías o asociada con él. «Mesías» sigue la preferencia terminológica del POB para Χριστός como título.
theological_decisions:
- issue: Ambigüedad de «la circuncisión de Mesías»
  english_pob_reading: Or 'by the circumcision of the Messiah' or 'the Messiah's circumcision.' The Greek may refer to circumcision effected by the Messiah, belonging to the Messiah, or associated with him.
  chosen_spanish_reading: «en la circuncisión de Mesías» mantiene abierto el sentido del genitivo.
  alternative_spanish_readings:
  - por la circuncisión de Mesías
  - la circuncisión de Mesías
  - la circuncisión del Mesías
  rationale: El griego permite más de una relación semántica; conviene preservar esa tensión en vez de cerrarla con una sola lectura doctrinal. La forma elegida deja espacio para entenderla como circuncisión producida por Mesías, perteneciente a él o vinculada con él.
  doctrine_reference: Preservar la tensión lexical y teológica del genitivo Χριστοῦ/τοῦ Χριστοῦ; preferencia terminológica del POB para Χριστός como título.
- issue: Sentido de «cuerpo de carne»
  english_pob_reading: Kept as 'body of flesh' without expanding to 'sinful nature' or 'body of sins'
  chosen_spanish_reading: «del cuerpo de carne» conserva el lenguaje del texto sin expandirlo.
  alternative_spanish_readings:
  - del cuerpo de la carne
  - del cuerpo carnal
  - del cuerpo de naturaleza pecaminosa
  rationale: La frase es difícil y no debe resolverse demasiado pronto. Mantener «carne» evita importar una interpretación más específica que el griego de este versículo no obliga a adoptar.
  doctrine_reference: Primacía de la fuente original; preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión para volver de 'Christ' a 'Messiah' y conservar la política terminológica del proyecto; por eso la redacción española usa «Mesías» para Χριστός y mantiene la ambigüedad del genitivo final. También se tomó en cuenta que la lectura más literal de σάρξ se prefirió sobre una expansión doctrinal como 'sinful nature'.
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός en todo el versículo, de acuerdo con la política del proyecto.
  - Se mantuvo «carne» para σάρξ y no se sustituyó por una glosa teológica.
  - Se eligió una sintaxis española natural sin perder la correspondencia con las preposiciones repetidas del griego.
  - El marcador [b] no se incluyó porque la formulación española no usa exactamente la alternativa 'made without hands'; el contenido de la nota de alternancia quedó absorbido en la redacción principal y en la nota a.
