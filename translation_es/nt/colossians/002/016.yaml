revisions:
- from: Por tanto[a], que nadie los juzgue por lo que comen o beben[b], o con respecto a una fiesta, una luna nueva o sábados[c].
  to: Por tanto[a], que nadie los juzgue[b] en cuestiones de comida o de bebida[c], o con respecto a una fiesta, una luna nueva o sábados[d].
  rationale: Se ajusta «por lo que comen o beben» a «en cuestiones de comida o de bebida» para reflejar mejor βρῶσις/πόσις como categorías de observancia, en línea con el análisis léxico y la nota cultural. Se añade una nota para la alternativa de κρίνω («emitir juicio»), preservando el rastro de auditoría inglés. También se normaliza la nota inferencial de οὖν.
