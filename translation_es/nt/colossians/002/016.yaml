translation:
  language: es
  text: Por tanto[a], que nadie los juzgue[b] en cuestiones de comida o de bebida[c], o con respecto a una fiesta, una luna nueva o sábados[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así pues» o «por consiguiente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que nadie emita juicio contra ustedes».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, con respecto a regulaciones sobre comida y bebida.
    reason: cultural_note
  - marker: d
    text: 'La secuencia «fiesta, una luna nueva o sábados» evoca el calendario sagrado judío: anual, mensual y semanal.'
    reason: cross_reference
lexical_decisions:
- source_word: Μὴ οὖν
  english_pob_choice: Therefore, let no one
  chosen_spanish: Por tanto, que nadie
  alternatives_spanish:
  - Así que, que nadie
  - Por consiguiente, que nadie
  lexicon: BDAG
  rationale: Μὴ con el imperativo presente expresa prohibición, y οὖν añade inferencia lógica. «Por tanto» conserva esa relación argumentativa en español y «que nadie» reproduce naturalmente la prohibición impersonal.
- source_word: τις
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - nadie en absoluto
  lexicon: BDAG
  rationale: El sujeto indefinido en una prohibición se expresa de forma natural con «nadie» en español.
- source_word: ὑμᾶς κρινέτω
  english_pob_choice: let no one judge you
  chosen_spanish: los juzgue
  alternatives_spanish:
  - los condene
  - emita juicio sobre ustedes
  lexicon: BDAG
  rationale: κρίνω aquí tiene el sentido de juzgar en relación con prácticas de observancia. «Juzgue» mantiene la concisión del griego y deja abierta la matización de juicio o condena.
- source_word: ἐν βρώσει
  english_pob_choice: in food
  chosen_spanish: por lo que comen
  alternatives_spanish:
  - en comida
  - en materia de comida
  lexicon: BDAG
  rationale: βρῶσις puede referirse a comida o a comer. En esta lista de observancias, la referencia práctica a lo que se come comunica mejor el alcance del asunto en español sin perder el campo semántico alimentario.
- source_word: ἐν πόσει
  english_pob_choice: in drink
  chosen_spanish: o beben
  alternatives_spanish:
  - en bebida
  - en materia de bebida
  lexicon: BDAG
  rationale: πόσις puede significar bebida o el acto de beber. Por paralelismo con la frase anterior, «o beben» mantiene la naturalidad del español y el contraste dietético.
- source_word: ἐν μέρει ἑορτῆς
  english_pob_choice: with regard to a festival
  chosen_spanish: con respecto a una fiesta
  alternatives_spanish:
  - en cuanto a una fiesta
  - en materia de una fiesta
  lexicon: BDAG
  rationale: La expresión ἐν μέρει significa «con respecto a / en cuanto a», no «en parte». ἑορτή es una festividad religiosa; «fiesta» es una traducción clara y fiel en español.
- source_word: νουμηνίας
  english_pob_choice: a new moon
  chosen_spanish: una luna nueva
  alternatives_spanish:
  - la luna nueva
  - la celebración de luna nueva
  lexicon: BDAG
  rationale: El término designa la observancia de luna nueva del calendario judío. «Una luna nueva» conserva la referencia calendárica y el artículo indefinido del listado.
- source_word: σαββάτων
  english_pob_choice: Sabbaths
  chosen_spanish: sábados
  alternatives_spanish:
  - sábados de reposo
  - sábados/sábados de descanso
  lexicon: BDAG
  rationale: El plural genitivo remite a observancias sabáticas dentro de la triada calendario-sacral. «Sábados» preserva el plural y resulta inteligible; no se sustituye por una formulación interpretativa más explícita.
theological_decisions:
- issue: Naturaleza de las prácticas enumeradas
  english_pob_reading: The verse prohibits others from judging believers with respect to dietary and calendrical observances, without itself specifying whether these practices are intrinsically invalid or merely non-binding as grounds for judgment.
  chosen_spanish_reading: El versículo prohíbe que otros juzguen a los creyentes respecto de prácticas alimentarias y calendáricas, sin especificar por sí mismo si esas prácticas son intrínsecamente inválidas o simplemente no obligatorias como base para juzgar.
  alternative_spanish_readings:
  - El versículo abole absolutamente todas esas observancias.
  - El versículo se refiere solo a reglamentos ascéticos o humanos, no a observancias bíblicas.
  rationale: El griego enfoca el acto de juzgar «en» o «con respecto a» estas cuestiones. La traducción evita resolver en el propio texto una tensión teológica más amplia y conserva el alcance limitado de la prohibición.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto y las decisiones se mantienen en alto acuerdo con la auditoría inglesa.
  spanish_consistency_notes:
  - Se conservó el paralelismo de la lista en orden ascendente/calendárico.
  - Se evitó «Señor»/«Cristo» porque no aparecen en el versículo.
  - «Sábados» se mantuvo para reflejar el plural griego y la triada calendario-sacral.
  - La construcción «que nadie los juzgue» reproduce la prohibición impersonal de forma natural en español.
  - Se mantuvo el sentido relacional de las preposiciones griegas sin convertirlas en una paráfrasis doctrinal.
