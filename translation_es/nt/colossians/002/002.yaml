    changes_summary: 'Replaced ''into'' with ''unto'' for more natural formal English with repeated εἰς; removed ''namely, the Messiah'' because the Greek reads appositionally ''the mystery of God, Christ'' and does not explicitly include ''namely.'' [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: para que sus corazones sean alentados, habiendo sido unidos estrechamente[a] en amor y hasta alcanzar toda la riqueza de la plena seguridad del entendimiento, hasta el conocimiento del misterio de Dios, Mesías[d][c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo sido unidos en amor». El verbo puede significar ser reunidos o ligados de cerca; «unidos estrechamente» preserva la relación implícita.
    reason: lexical_alternative
  - marker: b
    text: O «pleno conocimiento» para ἐπίγνωσιν, ya que el término griego puede llevar un sentido intensificado.
    reason: lexical_alternative
  - marker: c
    text: 'El texto griego aquí es breve y algo difícil: «el misterio de Dios, Cristo/Mesías». Esta traducción entiende «Mesías» en aposición: el misterio de Dios es el Mesías.'
    reason: alternative_reading
  - marker: d
    text: Algunos manuscritos presentan una lectura más larga, como «el misterio de Dios, es decir, el Padre, y de Cristo». La traducción sigue la lectura breve del griego provisto.
    reason: textual_variant
lexical_decisions:
- source_word: παρακληθῶσιν
  english_pob_choice: may be encouraged
  chosen_spanish: sean alentados
  alternatives_spanish:
  - sean consolados
  - sean fortalecidos
  lexicon: BDAG
  rationale: En este contexto, la idea abarca ánimo, alivio y refuerzo interior; «alentados» transmite bien ese campo semántico sin reducirlo solo a consuelo emocional.
- source_word: καρδίαι
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - mente
  - ser interior
  lexicon: BDAG
  rationale: «Corazones» conserva la metáfora antropológica bíblica y evita interpretar el término como mera facultad intelectual.
- source_word: συμβιβασθέντες
  english_pob_choice: having been knit together
  chosen_spanish: unidos estrechamente
  alternatives_spanish:
  - unidos
  - ligados juntos
  - entretejidos
  lexicon: BDAG
  rationale: El verbo puede expresar ser reunidos o unidos de forma estrecha; en este contexto relacional, «unidos estrechamente» preserva la fuerza de la imagen sin forzar una metáfora textil que el español podría sonar artificial.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - por amor
  - en el amor
  lexicon: BDAG
  rationale: Sigue el valor normal de ἀγάπη como «amor» y mantiene la esfera o vínculo en que ocurre la unión.
- source_word: εἰς πᾶν πλοῦτος
  english_pob_choice: unto all the riches
  chosen_spanish: para toda la riqueza
  alternatives_spanish:
  - hacia toda la riqueza
  - hasta toda la riqueza
  lexicon: BDAG
  rationale: Se conserva el impulso final de εἰς con «para», que en español suena natural y expresa finalidad o resultado; «toda la riqueza» refleja idiomáticamente πᾶν πλοῦτος.
- source_word: πληροφορίας
  english_pob_choice: full assurance
  chosen_spanish: plena seguridad
  alternatives_spanish:
  - plena certeza
  - seguridad plena
  - plena convicción
  lexicon: BDAG
  rationale: «Plena seguridad» comunica la confianza establecida que expresa el término en Pablo y evita una repetición pesada con «conocimiento».
- source_word: συνέσεως
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  lexicon: BDAG
  rationale: «Entendimiento» es natural en español bíblico actual y conserva la idea de capacidad de comprender que el genitivo exige.
- source_word: ἐπίγνωσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - pleno conocimiento
  - reconocimiento
  lexicon: BDAG
  rationale: «Conocimiento» es la equivalencia más clara; la intensificación de ἐπίγνωσις queda implícita por el contexto y por «plena seguridad».
- source_word: μυστηρίου
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: «Misterio» es el término paulino estándar para un designio divino antes oculto y ahora revelado; «secreto» sería más plano y menos teológico.
- source_word: θεοῦ, Χριστοῦ
  english_pob_choice: of God, Messiah
  chosen_spanish: de Dios, Mesías
  alternatives_spanish:
  - de Dios, Cristo
  - de Dios, es decir, Mesías
  - del Mesías de Dios
  lexicon: NA28/SBLGNT textual tradition; BDAG
  rationale: 'El griego breve y appositivo se conserva con coma: «el misterio de Dios, Mesías». En español, «Mesías» mantiene el título cristológico y evita la forma nominalizada «Cristo» cuando el POB inglés ya documenta la preferencia por «Messiah» para Χριστός.'
theological_decisions:
- issue: Relación apposicional en τοῦ μυστηρίου τοῦ θεοῦ, Χριστοῦ
  english_pob_reading: The phrase identifies the mystery of God with Messiah.
  chosen_spanish_reading: La frase identifica el misterio de Dios con el Mesías.
  alternative_spanish_readings:
  - el misterio de Dios, Cristo
  - el misterio de Dios, es decir, el Mesías
  - el misterio de Dios y del Mesías
  rationale: El texto griego dado es conciso y permite una lectura appositiva. En español, «misterio de Dios, Mesías» conserva esa concisión y deja visible que el Mesías está en aposición al misterio, sin ampliar indebidamente la sintaxis.
  doctrine_reference: Translation philosophy §§1, 2, 3
translation_notes:
  revision_awareness: 'El contexto inglés del POB revisó esta línea varias veces: primero con «namely, the Messiah», luego con una formulación más concisa sin «namely», y finalmente restauró «Messiah» por política doctrinal. La redacción española sigue la lectura breve del texto griego proporcionado y conserva la aposición con «Mesías», reflejando tanto la brevedad del original como la preferencia terminológica del proyecto.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός, conforme al estándar del proyecto, en lugar de «Cristo».
  - Se mantiene «Dios» para θεοῦ y se conserva la estructura appositiva del griego con coma.
  - «Corazones» se usa de forma antropológica bíblica; no se reduce a «mente».
  - «Plena seguridad» y «conocimiento» mantienen la tensión entre confianza estable y conocimiento más profundo sin forzar una paráfrasis.
  - La puntuación intenta reflejar la compacta cadena de propósitos del griego con naturalidad en español.
