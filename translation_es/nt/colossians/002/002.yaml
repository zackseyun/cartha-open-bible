source:
  edition: SBLGNT
  text: ἵνα παρακληθῶσιν αἱ καρδίαι αὐτῶν, ⸀συμβιβασθέντες ἐν ἀγάπῃ καὶ εἰς ⸂πᾶν πλοῦτος⸃ τῆς πληροφορίας τῆς συνέσεως, εἰς ἐπίγνωσιν τοῦ μυστηρίου τοῦ ⸀θεοῦ, Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/002.yaml
  text: so that their hearts may be encouraged[a], having been knit together in love and unto all the riches of the full assurance of understanding, unto the knowledge of the mystery of God, Messiah[d][c][b],
  footnotes:
  - marker: a
    text: Or 'having been united in love.' The verb can denote being brought together or joined closely; 'knit together' preserves the relational metaphor.
    reason: lexical_alternative
  - marker: b
    text: Or 'full knowledge' for 'knowledge' (ἐπίγνωσιν), since the Greek term can carry an intensified sense.
    reason: lexical_alternative
  - marker: c
    text: 'The Greek text here is concise and somewhat difficult: ''the mystery of God, Christ.'' This translation understands ''Messiah'' in apposition: the mystery of God is the Messiah.'
    reason: alternative_reading
  - marker: d
    text: Some manuscripts have a longer reading, such as 'the mystery of God, even the Father, and of Christ.' The translation follows the shorter reading of the provided Greek text.
    reason: textual_variant
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
