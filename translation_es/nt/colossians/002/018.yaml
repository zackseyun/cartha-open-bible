  to: Que nadie los descalifique, deleitándose en humildad y en la adoración de los ángeles[a], explayándose sobre lo que ha visto[c][b], vanamente envanecido por la mente de su carne.
  rationale: Se corrige el anclaje de la nota sobre «adoración de los ángeles», que estaba indebidamente colocada en «nadie». También se mejora ἐμβατεύων con «explayándose sobre lo que ha visto», más natural en español y adecuado al contexto de insistir en experiencias visionarias, sin perder la nota sobre alternativas léxicas. El resto del versículo está bien alineado con el griego y con la auditoría POB.
