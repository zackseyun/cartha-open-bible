translation:
  language: es
  text: Que nadie los descalifique, deleitándose en humildad y en la adoración de los ángeles[a], explayándose sobre lo que ha visto[c][b], vanamente envanecido por la mente de su carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la religión de los ángeles» o «la adoración con ángeles». La frase griega puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos leen «no viendo» en lugar de «lo que ha visto», lo que daría un sentido como «explayándose sobre lo que no ha visto».
    reason: textual_variant
  - marker: c
    text: O «deteniéndose en lo que ha visto» o «adentrándose en lo que ha visto». El verbo griego es raro y difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβραβευέτω
  english_pob_choice: disqualify
  chosen_spanish: descalifique
  alternatives_spanish:
  - los prive del premio
  - los condene
  lexicon: BDAG
  rationale: El verbo sugiere actuar como árbitro en contra de alguien, excluyéndolo o quitándole el premio. «Descalifique» es natural en español y conserva la fuerza de exclusión sin volverlo demasiado interpretativo.
- source_word: θέλων
  english_pob_choice: delighting in
  chosen_spanish: deleitándose en
  alternatives_spanish:
  - insistiendo en
  - tomando placer en
  - queriendo
  lexicon: BDAG
  rationale: Aquí el participio expresa una inclinación elegida o complacencia en estas prácticas; «deleitándose en» conserva ese matiz mejor que un simple «queriendo».
- source_word: ταπεινοφροσύνῃ
  english_pob_choice: humility
  chosen_spanish: humildad
  alternatives_spanish:
  - autohumillación
  - bajeza
  lexicon: BDAG
  rationale: La palabra normalmente significa «humildad». Aunque el contexto puede implicar una humildad afectada o ascética, la traducción principal conserva el término lexical y deja que el contexto marque la ironía.
- source_word: θρησκείᾳ τῶν ἀγγέλων
  english_pob_choice: the worship of angels
  chosen_spanish: la adoración de los ángeles
  alternatives_spanish:
  - la religión de los ángeles
  - la adoración con ángeles
  lexicon: BDAG
  rationale: El genitivo es ambiguo. La lectura más directa y común en este contexto es adoración dirigida a los ángeles; el texto principal la mantiene y la nota preserva las alternativas sin resolver la ambigüedad.
- source_word: ἃ ἑόρακεν ἐμβατεύων
  english_pob_choice: dwelling on what he has seen
  chosen_spanish: deteniéndose en lo que ha visto
  alternatives_spanish:
  - adentrándose en lo que ha visto
  - meditando en lo que ha visto
  lexicon: BDAG
  rationale: ἐμβατεύω es raro y difícil. «Deteniéndose en» comunica en español la idea de insistir o fijarse en visiones, con un registro más formal y cercano al griego que una paráfrasis demasiado libre.
- source_word: εἰκῇ
  english_pob_choice: vainly
  chosen_spanish: vanamente
  alternatives_spanish:
  - sin motivo
  - sin propósito
  lexicon: BDAG
  rationale: El adverbio califica el engreimiento como vacío y sin base. «Vanamente» conserva esa doble idea de vaciedad e injustificación.
- source_word: φυσιούμενος
  english_pob_choice: puffed up
  chosen_spanish: envanecido
  alternatives_spanish:
  - hinchado
  - lleno de orgullo
  lexicon: BDAG
  rationale: La metáfora paulina de orgullo inflado se conserva con «envanecido», que suena natural y mantiene el sentido de arrogancia.
- source_word: νοὸς
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - manera de pensar
  lexicon: BDAG
  rationale: «Mente» es el equivalente más compacto y natural aquí en español.
- source_word: σαρκὸς
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - pecaminosidad
  lexicon: BDAG
  rationale: Se mantiene «carne» para no sustituir el término paulino por una glosa doctrinal. Así se conserva la tensión antropológica del texto.
theological_decisions:
- issue: Sentido de θρησκείᾳ τῶν ἀγγέλων
  english_pob_reading: 'objective genitive: worship directed toward angels'
  chosen_spanish_reading: 'genitivo objetivo: adoración dirigida a los ángeles'
  alternative_spanish_readings:
  - 'genitivo subjetivo: adoración ofrecida por ángeles'
  - 'lectura asociativa: adoración con ángeles'
  rationale: La frase es realmente ambigua. La redacción principal sigue la lectura más común y plausible en el contexto de advertencia contra prácticas religiosas falsas, pero la nota conserva las alternativas para no fingir certeza donde el griego no la da.
  doctrine_reference: 'Principio POB: preservar la tensión interpretativa cuando el texto fuente no la resuelve.'
- issue: Interpretación de σάρξ en τῆς σαρκὸς αὐτοῦ
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana
  rationale: Se evita importar una glosa doctrinal más sistematizada. «Carne» deja visible el término del texto y mantiene la tensión antropológica paulina.
  doctrine_reference: 'Tabla de términos disputados: σάρξ = carne (literal) / naturaleza pecaminosa (metafórica), según contexto; aquí se documenta la opción literal.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «dwelling on» por un registro más formal y una mejor correspondencia con ἐμβατεύων. En español se adoptó «deteniéndose en» para conservar ese matiz de insistencia/ocupación en visiones sin caer en un calco demasiado duro. Se mantuvo la distinción entre la lectura principal y las variantes documentadas en las notas.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ, conforme al criterio doctrinal del proyecto.
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo requiere.
  - Se evita «Cristo» porque no aparece en el versículo.
  - La puntuación y el orden intentan reflejar la estructura participial griega sin sacrificar la lectura natural del español.
  - Las notas conservan tanto la ambigüedad de θρησκεία como la variante textual de ἃ/ἃ μή en la tradición manuscrita sin resolverlas en el cuerpo principal.
