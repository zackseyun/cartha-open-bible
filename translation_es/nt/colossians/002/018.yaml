source:
  edition: SBLGNT
  text: μηδεὶς ὑμᾶς καταβραβευέτω θέλων ἐν ταπεινοφροσύνῃ καὶ θρησκείᾳ τῶν ἀγγέλων, ⸀ἃ ἑόρακεν ἐμβατεύων, εἰκῇ φυσιούμενος ὑπὸ τοῦ νοὸς τῆς σαρκὸς αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/018.yaml
  text: Let no one disqualify you[a], delighting in humility and the worship of angels, dwelling on what he has seen, vainly puffed up by the mind of his flesh[c][b],
  footnotes:
  - marker: a
    text: Or 'the religion of angels' or 'worship with angels.' The Greek phrase can be understood in more than one way.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts read 'not seeing' instead of 'what he has seen,' yielding a sense like 'going on about what he has not seen.'
    reason: textual_variant
  - marker: c
    text: Or 'dwelling on what he has seen' or 'entering into what he has seen.' The Greek verb is rare and difficult.
    reason: lexical_alternative
