  spanish_quality_summary: El español es mayormente claro y natural, con tono digno y eclesialmente legible. «Habiendo sido sepultados con él» y «en el bautismo» funcionan bien. «En el cual» es correcto, aunque algo formal; sigue siendo aceptable. Los principales problemas de calidad son el marcador editorial «[n]», impropio del texto publicado, y la elección «obra», que suena menos precisa y algo más estática que «acción» u «obrar eficaz».
  glossary_alignment: 'La terminología clave del proyecto está bien respetada: θεοῦ -> «Dios», πίστις -> «fe», βαπτισμός -> «bautismo». No hay conflicto con los defaults mayores. La nota sobre πίστις es aceptable. La única desalineación relevante con la decisión léxica auditada es ἐνέργεια, donde el English POB prefirió «working»; en español conviene reflejarlo como «acción» u «obrar», no «obra».'
