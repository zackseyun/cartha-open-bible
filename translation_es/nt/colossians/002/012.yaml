  to: habiendo sido sepultados con él en el bautismo[a], en el cual también fueron resucitados con él por medio de la fe en la acción de Dios[b], quien lo levantó de entre los muertos.
  rationale: La revisión hace dos ajustes puntuales. Primero, elimina «fuiste[n]», que es un artefacto editorial no publicable, y lo sustituye por «fueron resucitados», manteniendo la pasiva del griego en español natural y panhispánico. Segundo, cambia «obra» por «acción» para reflejar mejor ἐνέργεια como obrar eficaz de Dios. El resto del versículo y las notas pueden conservarse.
