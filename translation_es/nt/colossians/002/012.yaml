translation:
  language: es
  text: habiendo sido sepultados con él en el bautismo[a], en el cual también fueron resucitados con él por medio de la fe en la acción de Dios[b], quien lo levantó de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Posible también: «en quien», si se toma el relativo como referido a Mesías y no al bautismo.'
    reason: alternative_reading
  - marker: b
    text: También puede entenderse «por medio de la confianza»; el griego πίστις puede abarcar la idea de confianza, aunque aquí «fe» es la opción principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνταφέντες
  english_pob_choice: having been buried with
  chosen_spanish: habiendo sido sepultados con
  alternatives_spanish:
  - siendo sepultados con
  - habiendo sido enterrados con
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa una acción completa y concomitante. «Habiendo sido sepultados con» conserva el valor de ‘with/together with’ del prefijo συν- y mantiene el tono de unión con Mesías sin volver la frase demasiado explicativa.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - el Mesías
  - Cristo
  lexicon: BDAG
  rationale: El pronombre se refiere a Mesías en el contexto, pero el español fluye mejor con «él». La referencia queda asegurada por el contexto inmediato y por la coordinación con «resucitados con él».
- source_word: ἐν τῷ βαπτισμῷ
  english_pob_choice: in baptism
  chosen_spanish: en el bautismo
  alternatives_spanish:
  - por el bautismo
  - en la inmersión
  lexicon: BDAG
  rationale: «ἐν» con dativo aquí admite un matiz locativo/instrumental; «en el bautismo» preserva esa ambigüedad sin decidirla en exceso. «Bautismo» es el término normal en español y refleja el sustantivo griego βαπτισμός.
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_spanish: en el cual
  alternatives_spanish:
  - en quien
  - por el cual
  lexicon: BDAG
  rationale: La forma gramatical puede volver al antecedente inmediato «bautismo». Por eso se conserva «en el cual», sin resolver la tensión hacia «en quien»; el español permite mantener abierta la lectura documental del original.
- source_word: συνηγέρθητε
  english_pob_choice: you also were raised with him
  chosen_spanish: también fuiste[n] resucitados con él
  alternatives_spanish:
  - también fuisteis resucitados con él
  - también resucitasteis con él
  lexicon: BDAG
  rationale: 'El verbo compuesto con συν- pide expresar la unión: «con él». «Resucitados» conserva la pasiva aorística; la marca opcional [n] permite una forma inclusiva/neutral sin imponer una sola variante regional de segunda persona plural.'
- source_word: διὰ τῆς πίστεως
  english_pob_choice: through faith
  chosen_spanish: por medio de la fe
  alternatives_spanish:
  - por la fe
  - mediante la fe
  - por medio del creer
  lexicon: BDAG
  rationale: «Por medio de» hace explícita la función mediadora de διά con genitivo y mantiene «fe» como traducción principal de πίστις, según el criterio doctrinal del proyecto. No se reduce a «confianza» porque el contexto no exige esa restricción.
- source_word: τῆς ἐνεργείας
  english_pob_choice: the working
  chosen_spanish: la obra
  alternatives_spanish:
  - la acción
  - la operación
  - el obrar
  lexicon: BDAG
  rationale: Aunque ἐνέργεια puede ser «actividad» o «operación», «obra» suena natural en español y transmite un actuar eficaz de Dios. Se evita «poder» porque estrecha el matiz de actividad efectiva del término.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: El genitivo es simple y directo; «de Dios» conserva el referente explícito del texto. No hay aquí un caso que obligue a introducir el nombre divino del AT mediante una cita directa del tetragrámaton.
- source_word: τοῦ ἐγείραντος αὐτὸν
  english_pob_choice: who raised him
  chosen_spanish: quien lo levantó
  alternatives_spanish:
  - quien lo resucitó
  - el que lo levantó
  lexicon: BDAG
  rationale: El participio atributivo se vierte con relativa. «Lo levantó» preserva la imaginería verbal de ἐγείρω, mientras que «resucitó» explicita el sentido; el contexto de «de entre los muertos» ya aclara que se trata de resurrección.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos y vivientes
  lexicon: BDAG
  rationale: «De entre los muertos» es la fórmula española más precisa para el lenguaje de resurrección y conserva mejor la idea de salida desde el ámbito de los muertos.
theological_decisions:
- issue: Referente de ἐν ᾧ
  english_pob_reading: 'Refers to baptism: ''in which'''
  chosen_spanish_reading: Se deja «en el cual», tomando como antecedente inmediato el bautismo
  alternative_spanish_readings:
  - «en quien», tomando como antecedente implícito a Mesías
  - «por el cual», con lectura más instrumental
  rationale: La sintaxis griega favorece el antecedente inmediato βαπτισμῷ. Sin embargo, el contexto amplio de unión con Mesías sigue presente en los verbos compuestos con συν-. La traducción conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: Translation philosophy §3; preserve theological tension rather than resolve it
- issue: Lenguaje bautismal y unión con Mesías
  english_pob_reading: Retain the text's strong union-with-Messiah and baptismal wording without specifying a denominational sacramental theory
  chosen_spanish_reading: Se mantiene el vínculo fuerte entre bautismo, sepultura y resurrección con Mesías, sin fijar una teoría sacramental denominacional
  alternative_spanish_readings:
  - lectura fuertemente sacramental
  - lectura puramente simbólica
  rationale: El versículo conecta de modo intenso el bautismo con la participación en la muerte y resurrección, pero no desarrolla por sí mismo una doctrina sistemática sobre la eficacia sacramental. La redacción española conserva esa densidad sin añadir una conclusión ajena al texto.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el expediente auditado en inglés. La revisión más reciente no introdujo cambios y el control cruzado informó alta concordancia, por lo que no se requieren ajustes adicionales al sentido base.
  spanish_consistency_notes:
  - Se mantuvo «bautismo» como equivalente de βαπτισμός y no se sustituyó por un término eclesiástico más técnico.
  - Se conservó «fe» para πίστις, con nota de alternativa posible «confianza», en línea con el expediente inglés.
  - Se evitó «Cristo» en el texto principal para no introducir una forma fija donde el griego usa pronombre y el contexto ya identifica a Mesías.
  - Se eligió «de entre los muertos» para ἐκ νεκρῶν por ser la fórmula española más natural y fiel al valor de resurrección.
  - La marca [n] en «fuiste[n]» busca ofrecer una redacción publicable sin fijar innecesariamente una sola forma regional de segunda persona plural.
