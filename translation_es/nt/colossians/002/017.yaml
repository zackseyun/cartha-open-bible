translation:
  language: es
  text: Estas cosas son sombra[a] de lo que había de venir, pero el cuerpo es del Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «una sombra»; en español puede omitirse el artículo indefinido en esta construcción sin perder el sentido.
    reason: lexical_alternative
  - marker: b
    text: O, más formalmente, «el cuerpo es el del Mesías».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅ
  english_pob_choice: These
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Estas
  - Estas mismas cosas
  lexicon: BDAG
  rationale: El pronombre neutro plural retoma los elementos del contexto inmediato (comida, fiesta, luna nueva y sábado). En español, «Estas cosas» mantiene la referencia anafórica con naturalidad y evita una traducción demasiado rígida.
- source_word: σκιὰ
  english_pob_choice: a shadow
  chosen_spanish: sombra
  alternatives_spanish:
  - una sombra
  - sombras
  lexicon: BDAG
  rationale: La imagen de contraste con el cuerpo/reality pide conservar la metáfora de forma directa. En español, el artículo indefinido puede omitirse con fluidez sin perder el valor predicativo de la expresión.
- source_word: τῶν μελλόντων
  english_pob_choice: of the things to come
  chosen_spanish: de lo que había de venir
  alternatives_spanish:
  - de las cosas que habían de venir
  - de las cosas venideras
  lexicon: BDAG
  rationale: El participio sustantivado con artículo expresa orientación futura sin precisar más. «Lo que había de venir» conserva el futuro prospectivo y la amplitud semántica sin decidir demasiado pronto si se trata de consumación escatológica, cumplimiento mesiánico o ambos.
- source_word: σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - la sustancia
  - la realidad
  lexicon: BDAG
  rationale: A diferencia del inglés POB más interpretativo en una versión previa, aquí se conserva el valor más directo de σῶμα. «Cuerpo» refleja con mayor fidelidad la forma del contraste con «sombra», dejando la interpretación al lector y a la nota si es necesaria.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: belongs to the Messiah
  chosen_spanish: es de Mesías
  alternatives_spanish:
  - es del Mesías
  - pertenece al Mesías
  - es de Cristo
  lexicon: BDAG
  rationale: El genitivo admite una relación posesiva/relacional concisa. Se mantiene «Mesías» según la terminología base del proyecto para Χριστός como título. La forma «es de Mesías» conserva la elipsis del griego y la relación de pertenencia sin introducir un verbo explicativo adicional.
theological_decisions:
- issue: Contraste entre σκιά y σῶμα
  english_pob_reading: The verse contrasts a shadow with the substance/body that corresponds to it; English audit allowed both 'substance' and 'body' in prior stages.
  chosen_spanish_reading: Se conserva el contraste literal entre «sombra» y «cuerpo», sin convertir σῶμα en «sustancia» o «realidad».
  alternative_spanish_readings:
  - La sustancia es de Mesías
  - La realidad es de Mesías
  - el cuerpo pertenece al Mesías
  rationale: La forma más estable y fuente-pegada en español es mantener σῶμα como «cuerpo». Esto evita cerrar prematuramente la imagen con una paráfrasis conceptual y deja intacta la tensión metafórica del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Renderización de Χριστοῦ como título
  english_pob_reading: Messiah is used where Χριστός functions as a title.
  chosen_spanish_reading: «Mesías»
  alternative_spanish_readings:
  - Cristo
  rationale: El griego emplea Χριστός como título relacional. En español, «Mesías» preserva el valor titulado más directamente que «Cristo», conforme al criterio del proyecto.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (cuando funciona como título)'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «substance» a «body» para reflejar σῶμα con mayor literalidad, y mantuvo «Messiah» para Χριστός. La redacción española sigue esa revisión reciente al preferir «cuerpo» y no reemplazarlo por una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se conserva «Mesías» para Χριστός como título, no «Cristo», en coherencia con la política terminológica del proyecto.
  - La elección de «sombra» y «cuerpo» mantiene el paralelismo imaginativo del griego.
  - La formulación «es de Mesías» reproduce la brevedad posesiva del genitivo griego sin añadir explicaciones ajenas al texto.
