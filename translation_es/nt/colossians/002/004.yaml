translation:
  language: es
  text: Esto digo para que nadie[a] engañe a ustedes con argumentos persuasivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deluda» o «desvíe»; el verbo griego indica engaño por medio de razonamiento falaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: Esto
  alternatives_spanish:
  - Esto mismo
  - Esta cosa
  lexicon: BDAG
  rationale: El demostrativo neutro singular apunta de manera natural a lo que Pablo acaba de decir. «Esto» conserva esa referencia sin especificarla de más.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - estoy diciendo
  - hablo
  lexicon: BDAG
  rationale: El presente simple en español comunica de modo directo y natural la afirmación del hablante.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa finalidad de forma clara y idiomática en español, manteniendo el valor telic del griego.
- source_word: μηδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: Como sujeto indefinido negativo, «nadie» es la forma natural y precisa en español.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: Se conserva el plural mediante el objeto directo de segunda persona plural; en español contemporáneo, «los» es natural y conciso en este contexto epistolar.
- source_word: παραλογίζηται
  english_pob_choice: may delude
  chosen_spanish: engañe
  alternatives_spanish:
  - seduzca
  - deluda
  - desvíe
  lexicon: BDAG
  rationale: El verbo implica engañar mediante razonamiento falso o falaz. «Engañe» es el equivalente español más claro y de amplio alcance; «deluda» sería más cercano etimológicamente pero menos natural hoy.
- source_word: ἐν πιθανολογίᾳ
  english_pob_choice: with persuasive argument
  chosen_spanish: con razonamientos persuasivos
  alternatives_spanish:
  - con argumento plausible
  - con palabras plausibles
  - con discurso persuasivo
  lexicon: BDAG
  rationale: La preposición ἐν expresa medio o modo, y πιθανολογία tiene el sentido de discurso/argumentación persuasiva o plausible. «Razonamientos persuasivos» comunica el medio retórico sin afirmar que sean verdaderos.
theological_decisions:
- issue: Alcance del engaño en παραλογίζηται ἐν πιθανολογίᾳ
  english_pob_reading: A warning against being deceived by plausible or persuasive reasoning, without specifying a particular doctrinal system in the translation.
  chosen_spanish_reading: Una advertencia general contra el engaño por medio de razonamientos persuasivos, sin precisar aquí el sistema falso que luego el contexto pueda aclarar.
  alternative_spanish_readings:
  - Una advertencia contra una filosofía falsa específica
  - Una advertencia contra mera elocuencia
  rationale: El verso no nombra el contenido doctrinal del engaño; por eso conviene no estrechar el sentido. La traducción preserva la tensión del pasaje y deja que el contexto inmediato determine el tipo de error.
  doctrine_reference: 'Principio de fidelidad textual: no importar una polémica más específica que la expresada por el griego.'
translation_notes:
  revision_awareness: La redacción sigue el acuerdo general del POB inglés con el texto griego. La revisión inglesa reciente prefirió «delude» por mayor cercanía a παραλογίζηται; en español se optó por «engañe», que resulta más natural y cubre bien el matiz de engaño por argumentación plausible. Se mantuvo el complemento de medio con «razonamientos persuasivos», en línea con la nota inglesa sobre πιθανολογία.
  spanish_consistency_notes:
  - Se preserva el trato de segunda persona plural del pasaje.
  - No se introdujo lenguaje doctrinal más específico que el del griego.
  - «Persuasivos» mantiene el valor de πιθανολογία sin volverla automáticamente verdadera o válida.
  - La puntuación y el registro buscan ser bíblicos pero contemporáneos.
