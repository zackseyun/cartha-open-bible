translation:
  language: es
  text: Porque quiero que sepan qué gran lucha tengo por ustedes, por los de Laodicea, y por todos los que no han visto mi rostro[a] en la carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en persona' o 'corporalmente'. El griego dice literalmente 'en la carne', aquí referido a presencia física.
    reason: lexical_alternative
lexical_decisions:
- source_word: Θέλω γὰρ
  english_pob_choice: For I want
  chosen_spanish: Porque quiero
  alternatives_spanish:
  - Pues quiero
  - Porque deseo
  lexicon: BDAG
  rationale: γάρ se expresa naturalmente como 'porque' para enlazar con el argumento previo. θέλω, en este contexto epistolar, se rinde con 'quiero' por ser directo y fiel al tono inmediato, sin elevarlo innecesariamente a 'deseo'.
- source_word: ὑμᾶς εἰδέναι
  english_pob_choice: you to know
  chosen_spanish: que sepan
  alternatives_spanish:
  - que conozcan
  - que estén al tanto
  lexicon: BDAG
  rationale: La construcción con infinitivo tras θέλω funciona idiomáticamente como 'quiero que sepan'. En español, 'que sepan' preserva la claridad y la inmediatez del griego sin sobreexplicar.
- source_word: ἡλίκον ἀγῶνα
  english_pob_choice: how great a struggle
  chosen_spanish: qué gran lucha
  alternatives_spanish:
  - cuán grande una lucha
  - qué intensa contienda
  lexicon: BDAG
  rationale: ἡλίκον enfatiza magnitud, y ἀγῶνα aquí denota esfuerzo o lucha intensa, no un concurso literal. 'Lucha' comunica bien la fuerza retórica en español actual.
- source_word: ἔχω ὑπὲρ ὑμῶν
  english_pob_choice: I have for you
  chosen_spanish: tengo por ustedes
  alternatives_spanish:
  - tengo en favor de ustedes
  - tengo por causa de ustedes
  lexicon: BDAG
  rationale: La combinación ἔχω con ἀγῶνα se conserva con 'tengo' y la relación de ὑπέρ se expresa con 'por', que en español transmite el sentido de interés o beneficio a favor de los destinatarios.
- source_word: τῶν ἐν Λαοδικείᾳ
  english_pob_choice: those in Laodicea
  chosen_spanish: los de Laodicea
  alternatives_spanish:
  - los que están en Laodicea
  - los de laodicea
  lexicon: BDAG
  rationale: El artículo con complemento locativo funciona sustantivadamente. 'Los de Laodicea' es natural, breve y conserva el valor referencial del grupo.
- source_word: ὅσοι οὐχ ἑόρακαν
  english_pob_choice: all who have not seen
  chosen_spanish: todos los que no han visto
  alternatives_spanish:
  - todos los que no vieron
  - cuantos no han visto
  lexicon: BDAG
  rationale: ὅσοι tiene fuerza inclusiva; 'todos los que' la preserva bien en español. El perfecto griego se refleja con presente perfecto español para mantener la vigencia de la experiencia negada.
- source_word: τὸ πρόσωπόν μου
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  lexicon: BDAG
  rationale: Aunque el inglés POB conserva 'my face' por transparencia, en español 'rostro' es la forma más natural y digna para τὸ πρόσωπόν μου, sin perder el carácter literal de la expresión.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en persona
  - corpóreamente
  lexicon: BDAG
  rationale: Se conserva 'carne' para σάρξ conforme al criterio doctrinal del proyecto cuando el sentido es literal y físico, no moral. En este contexto alude a presencia corporal, no a una acepción ética.
theological_decisions:
- issue: Renderización de σάρξ en contexto no metafórico
  english_pob_reading: in the flesh
  chosen_spanish_reading: en la carne
  alternative_spanish_readings:
  - en persona
  - corporalmente
  rationale: El pasaje habla de presencia física real de Pablo. Mantener 'carne' conserva la transparencia léxica y evita sustituir el término por una paráfrasis interpretativa, aunque el sentido sea corporal.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ (*sarx*) → ''flesh'' (literal) / ''sinful nature'' (metaphorical)'
translation_notes:
  revision_awareness: La comparación con el audit trail inglés muestra acuerdo alto y sin revisiones aplicadas; esta versión española sigue la misma lectura semántica, con ajuste idiomático natural en español para ὑμᾶς εἰδέναι y τὸ πρόσωπόν μου.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Cristo sin incidencia en este versículo.
  - Se preserva 'carne' para σάρξ por coherencia terminológica del proyecto.
  - '''Los de Laodicea'' evita un calco excesivo y sigue el valor sustantivo del griego.'
