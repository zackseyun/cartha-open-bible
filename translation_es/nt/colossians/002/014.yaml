translation:
  language: es
  text: habiendo borrado el documento[a] de deuda contra nosotros en decretos[b], que nos era adverso, y lo ha quitado de en medio, clavándolo a la cruz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «certificado de deuda» o «registro escrito». El término griego puede referirse a una nota manuscrita de deuda o a una obligación legal por escrito.
    reason: lexical_alternative
  - marker: b
    text: O «en ordenanzas» o «consistente en decretos». La frase puede significar que el documento de deuda estaba articulado o constituido en decretos u ordenanzas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξαλείψας
  english_pob_choice: having wiped out
  chosen_spanish: habiendo borrado
  alternatives_spanish:
  - habiendo borrado por completo
  - habiendo eliminado
  - habiendo borrado de la memoria
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa o concomitante. «Borrado» conserva la imagen de quitar algo escrito, con español natural y digno. «Eliminado» pierde la metáfora gráfica; «borrado por completo» es posible pero más pesado.
- source_word: χειρόγραφον
  english_pob_choice: record of debt
  chosen_spanish: documento de deuda
  alternatives_spanish:
  - registro de deuda
  - certificado de deuda
  - escrito de deuda
  lexicon: BDAG
  rationale: «Documento de deuda» comunica el valor documental y la carga obligatoria del término sin concretarlo excesivamente como una pieza jurídica técnica. Mantiene la tensión entre escrito y obligación, aunque el inglés optó por «record of debt».
- source_word: καθ’ ἡμῶν
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - en contra de nosotros
  - opuesto a nosotros
  lexicon: BDAG
  rationale: La frase preposicional indica oposición. «Contra nosotros» es la forma más directa y natural en español.
- source_word: τοῖς δόγμασιν
  english_pob_choice: in decrees
  chosen_spanish: en decretos
  alternatives_spanish:
  - con decretos
  - en ordenanzas
  - consistente en decretos
  lexicon: BDAG
  rationale: La dative es sintácticamente difícil. «En decretos» sigue de cerca la revisión más reciente del inglés POB y evita imponer una relación posesiva o instrumental que el griego no exige. «Ordenanzas» podría sonar eclesiástico y estrechar innecesariamente el sentido.
- source_word: ὑπεναντίον
  english_pob_choice: opposed to us
  chosen_spanish: nos era adverso
  alternatives_spanish:
  - nos era opuesto
  - nos era contrario
  - estaba en nuestra contra
  lexicon: BDAG
  rationale: «Adverso» conserva el tono de oposición activa de ὑπεναντίον y suena más idiomático en español que un calco literal. Se mantiene la idea de hostilidad sin sobreinterpretar.
- source_word: ἦρκεν
  english_pob_choice: he has taken
  chosen_spanish: lo ha quitado
  alternatives_spanish:
  - lo ha tomado
  - lo ha removido
  - lo quitó
  lexicon: BDAG
  rationale: El perfecto sugiere una acción completa con resultado vigente. «Lo ha quitado» expresa bien la remoción del obstáculo y preserva el aspecto mejor que un simple pretérito.
- source_word: ἐκ τοῦ μέσου
  english_pob_choice: out of the way
  chosen_spanish: de en medio
  alternatives_spanish:
  - fuera del camino
  - del medio
  - de entre nosotros
  lexicon: BDAG
  rationale: Es un modismo de remoción desde el centro o de entre. «De en medio» es la expresión española natural que mejor comunica la desaparición del obstáculo.
- source_word: προσηλώσας
  english_pob_choice: having nailed
  chosen_spanish: clavándolo
  alternatives_spanish:
  - habiéndolo clavado
  - al clavar
  - clavándolo a él
  lexicon: BDAG
  rationale: El participio aoristo expresa medio o circunstancia concomitante. «Clavándolo» es fluido en español y conserva la relación verbal con la acción principal.
- source_word: τῷ σταυρῷ
  english_pob_choice: to the cross
  chosen_spanish: en la cruz
  alternatives_spanish:
  - a la cruz
  - sobre la cruz
  - al madero
  lexicon: BDAG
  rationale: «En la cruz» en español captura el acto de clavar sin forzar la dirección sintáctica. Se mantiene el término tradicional y claro «cruz» por ser el equivalente cristiano establecido.
theological_decisions:
- issue: Sentido de χειρόγραφον τοῖς δόγμασιν
  english_pob_reading: a record of debt expressed in decrees/ordinances that stood against us
  chosen_spanish_reading: un documento de deuda expresado en decretos que estaba contra nosotros
  alternative_spanish_readings:
  - la ley mosaica misma
  - un acta de acusación
  - un pagaré de nuestros pecados
  rationale: La expresión es metafórica y debatida. La redacción española conserva la imagen documental y de deuda sin reducirla a una sola lectura doctrinal. Se evita convertirlo sin más en «la ley» o en una acusación jurídica técnica, porque el griego no obliga a esa identificación.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sujeto de ἦρκεν
  english_pob_reading: he (God) has taken it out of the way
  chosen_spanish_reading: lo ha quitado de en medio
  alternative_spanish_readings:
  - lo quitó de en medio
  - ha sido quitado de en medio
  rationale: El español requiere sujeto o una construcción pasiva explícita. Como el contexto amplio apunta a Dios/ Cristo como agente, se mantiene una formulación activa implícita en la misma línea del inglés auditado, sin añadir un sujeto doctrinal innecesario.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió «with its decrees» por «in decrees» para reflejar más de cerca τοῖς δόγμασιν y evitar una posesión no explícita. La redacción española sigue esa preferencia con «en decretos».
  spanish_consistency_notes:
  - Se mantuvo «cruz» para σταυρός por ser el equivalente cristiano estándar y claro en español.
  - Se preservó la imagen documental/de deuda de χειρόγραφον sin colapsarla en una sola categoría jurídica.
  - Se optó por «adverso» para ὑπεναντίον, manteniendo el matiz de oposición activa.
  - La secuencia verbal intenta reflejar el participio aoristo inicial y el perfecto final con una fluidez natural en español.
