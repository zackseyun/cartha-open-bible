  - marker: b
    text: O «en ordenanzas» o «consistente en decretos». La frase puede significar que el documento de deuda estaba articulado o constituido en decretos u ordenanzas.
    reason: alternative_reading
  revision_rationale: Se corrige «en la cruz» a «a la cruz» para reflejar mejor προσηλώσας… τῷ σταυρῷ y mantener un español más natural con el verbo «clavar». Se ajusta la nota b para alinearla con la lectura auditada principal «en decretos» y conservar las alternativas sin introducir un matiz instrumental menos preciso.
