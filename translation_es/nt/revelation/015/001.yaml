translation:
  language: es
  text: 'Y vi otra señal en el cielo, grande y admirable: siete ángeles que tenían las últimas siete plagas[a], porque en ellas se consumó la ira de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las siete plagas finales».
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - portento
  lexicon: BDAG
  rationale: En Apocalipsis, σημείον puede referirse a un fenómeno visible con valor simbólico. «Señal» es natural en español y conserva mejor la idea de algo que apunta a un significado; «signo» es posible, pero puede sonar más técnico o abstracto. «Portento» reforzaría lo prodigioso, pero cargará demasiado el matiz ominoso.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en el ámbito celestial
  lexicon: BDAG
  rationale: Aunque la lectura apocalíptica puede implicar la esfera celestial, en español «en el cielo» comunica de forma directa y reverente el lugar de la visión. «En el cielo» evita una perífrasis más pesada y sigue permitiendo la referencia al ámbito divino.
- source_word: μέγα καὶ θαυμαστόν
  english_pob_choice: great and marvelous
  chosen_spanish: grande y admirable
  alternatives_spanish:
  - grande y maravilloso
  - grande y asombroso
  lexicon: BDAG
  rationale: «Admirable» mantiene la dignidad del par adjetival y evita que «maravilloso» suene demasiado coloquial o débil en algunos registros actuales. Conserva el tono de grandeza y asombro del original.
- source_word: ἀγγέλους ἑπτὰ
  english_pob_choice: seven angels
  chosen_spanish: siete ángeles
  lexicon: BDAG
  rationale: Correspondencia directa y transparente del grupo nominal.
- source_word: ἔχοντας
  english_pob_choice: having
  chosen_spanish: que tenían
  alternatives_spanish:
  - con
  - portando
  lexicon: BDAG
  rationale: 'En español, el participio inglés «having» se vuelve más natural como relativa: «que tenían». Conserva la relación formal sin sonar forzado. «Con» sería más fluido pero menos explícito; «portando» añade una idea demasiado concreta.'
- source_word: πληγὰς
  english_pob_choice: plagues
  chosen_spanish: plagas
  alternatives_spanish:
  - azotes
  - golpes
  - aflicciones
  lexicon: BDAG
  rationale: En contexto de juicio apocalíptico, «plagas» es la equivalencia más clara y estable. «Azotes» o «golpes» perderían la referencia bíblica; «aflicciones» suavizaría indebidamente el término.
- source_word: τὰς ἐσχάτας
  english_pob_choice: last
  chosen_spanish: las últimas
  alternatives_spanish:
  - las finales
  - las postreras
  lexicon: BDAG
  rationale: «Las últimas» reproduce con transparencia el valor secuencial de ἔσχατος. En español suena natural y conserva la idea de que no hay otras después de estas en la serie.
- source_word: ἐτελέσθη
  english_pob_choice: was finished
  chosen_spanish: se consumó
  alternatives_spanish:
  - fue terminado
  - quedó cumplido
  lexicon: BDAG
  rationale: La forma pasiva aorista de τελέω expresa consumación, culminación o llegada al término previsto. «Se consumó» preserva esa fuerza telicidad/culminación mejor que un simple «fue terminado», y en español bíblico es claro y solemne.
- source_word: ὁ θυμὸς τοῦ θεοῦ
  english_pob_choice: the wrath of God
  chosen_spanish: la ira de Dios
  alternatives_spanish:
  - el enojo de Dios
  - la furia de Dios
  lexicon: BDAG
  rationale: «Ira de Dios» es la forma más directa y bíblica en español para θυμός en un contexto de juicio. «Enojo» debilita el tono judicial; «furia» intensifica más de la cuenta.
theological_decisions:
- issue: Lenguaje de juicio divino en contexto apocalíptico
  english_pob_reading: the wrath of God
  chosen_spanish_reading: la ira de Dios
  alternative_spanish_readings:
  - el enojo de Dios
  - la furia de Dios
  rationale: El texto presenta el cierre de la serie de plagas como la consumación de la respuesta judicial de Dios. «Ira» preserva el peso teológico y judicial sin suavizar ni dramatizar de más el término.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Valor de ἐτελέσθη en relación con la ira de Dios
  english_pob_reading: was finished
  chosen_spanish_reading: se consumó
  alternative_spanish_readings:
  - fue terminada
  - quedó cumplida
  rationale: «Se consumó» conserva la idea de culminación prevista y evita reducir el verbo a un mero cierre temporal. También mantiene abierta la tensión interpretativa sin añadir explicaciones no presentes en el verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La base inglesa revisó ἐτελέσθη de «was completed» a «was finished» por mayor literalidad. En español se prefirió «se consumó» para conservar la idea de culminación telíca sin perder naturalidad y solemnidad. También se evitó traducir mecánicamente «having» como un gerundio, porque en español bíblico resulta más claro como relativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma para יהוה, pero este versículo no contiene el nombre divino explícito; por eso aquí aparece «Dios» según el griego θεοῦ.
  - «Cielo» traduce οὐρανός en sentido apocalíptico, sin forzar una distinción técnica entre cielo físico y esfera celestial en el texto principal.
  - «Ira» conserva la fuerza judicial de θυμός en el contexto de Apocalipsis.
