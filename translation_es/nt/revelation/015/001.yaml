    text: O «las siete plagas finales».
    reason: lexical_alternative
  revision_rationale: Se elimina una nota no respaldada por la evidencia fuente y se reordena la frase nominal para un español más natural y más ajustado a la relación entre πληγὰς y τὰς ἐσχάτας. Se conserva «grande y admirable» como opción válida, y «se consumó» por su buena correspondencia con ἐτελέσθη.
