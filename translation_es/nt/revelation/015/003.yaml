    text: Algunos manuscritos leen «Rey de las naciones» en lugar de «Rey de las edades».
    reason: textual_variant
  revision_rationale: Se elimina la nota falsa sobre «siervo/esclavo», porque no corresponde a una variante textual del griego fuente ni al rastro de auditoría inglés. Se conserva y reancla únicamente la nota legítima sobre la variante «naciones / edades». No se requieren cambios en el cuerpo del versículo.
