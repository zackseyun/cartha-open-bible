translation:
  language: es
  text: 'Y cantan el canto de Moisés, el esclavo de Dios, y el canto del Cordero, diciendo: «Grandes y maravillosas son tus obras, Señor Dios, el Todopoderoso; justos y verdaderos son tus caminos, Rey de las edades[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «Rey de las naciones» en lugar de «Rey de las edades».
    reason: textual_variant
lexical_decisions:
- source_word: ᾄδουσιν
  english_pob_choice: they sing
  chosen_spanish: cantan
  alternatives_spanish:
  - están cantando
  - entonan
  lexicon: BDAG
  rationale: El presente griego se expresa de manera natural en español con presente simple en escena visionaria. «Cantan» mantiene la acción en curso sin forzar una perífrasis.
- source_word: ᾠδὴν
  english_pob_choice: song
  chosen_spanish: canto
  alternatives_spanish:
  - canción
  - himno
  lexicon: BDAG
  rationale: «Canto» comunica bien una composición solemne y evita «himno», que añade un matiz litúrgico no exigido por el griego. «Canción» suena demasiado coloquial aquí.
- source_word: Μωϋσέως
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: BDAG
  rationale: Nombre propio estándar en español, sin necesidad de adaptación especial.
- source_word: δούλου
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: Se preserva la fuerza léxica de δοῦλος como relación de pertenencia y sometimiento. «Esclavo» refleja mejor la decisión POB en inglés que «siervo», que suaviza el término.
- source_word: ἀρνίου
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  lexicon: BDAG
  rationale: En Apocalipsis, ἀρνίον es un título cristológico establecido; «el Cordero» mantiene la imagen sacrificial y mesiánica.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dicen
  lexicon: BDAG
  rationale: Participio introductorio vertido de forma directa y idiomática en español.
- source_word: Μεγάλα
  english_pob_choice: Great
  chosen_spanish: Grandes
  alternatives_spanish:
  - Grandiosas
  - Grandes cosas
  lexicon: BDAG
  rationale: 'Con τὰ ἔργα σου, el adjetivo se traduce naturalmente con predicación: «Grandes ... son tus obras». Mantiene la sencillez del griego.'
- source_word: θαυμαστὰ
  english_pob_choice: marvelous
  chosen_spanish: maravillosas
  alternatives_spanish:
  - admirables
  - asombrosas
  lexicon: BDAG
  rationale: «Maravillosas» preserva el sentido de suscitar asombro y encaja con el registro doxológico. Es el equivalente más directo en español.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: «Obras» es el equivalente bíblico más natural para las acciones divinas; conserva el paralelismo del texto.
- source_word: κύριε, ὁ θεός, ὁ παντοκράτωρ
  english_pob_choice: Lord God, the Almighty
  chosen_spanish: Señor Dios, el Todopoderoso
  alternatives_spanish:
  - Señor Dios, el Omnipotente
  - Señor Dios Todopoderoso
  lexicon: BDAG
  rationale: 'Se conserva la aposición de los tres elementos: Señor, Dios y el título παντοκράτωρ. «Todopoderoso» es la equivalencia española más establecida y digna para este título.'
- source_word: παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: BDAG
  rationale: «Todopoderoso» corresponde al uso tradicional y semánticamente apropiado del título divino en Apocalipsis.
- source_word: δίκαιαι
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - justas
  lexicon: BDAG
  rationale: Aunque el adjetivo concuerda con «caminos» (femenino plural en español), «justos» comunica bien la rectitud moral y judicial de las vías de Dios. Se evita «rectos» por perder el matiz teológico de justicia.
- source_word: ἀληθιναὶ
  english_pob_choice: 'true'
  chosen_spanish: verdaderos
  alternatives_spanish:
  - fieles
  - auténticos
  lexicon: BDAG
  rationale: «Verdaderos» reproduce con claridad la oposición a lo falso y encaja con el paralelismo del versículo.
- source_word: ὁδοί
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - formas de actuar
  lexicon: BDAG
  rationale: En español, «caminos» es una metáfora bíblica natural para la manera de obrar y conducir de Dios.
- source_word: ὁ βασιλεὺς τῶν αἰώνων
  english_pob_choice: O King of the ages
  chosen_spanish: Rey de las edades
  alternatives_spanish:
  - Rey de los siglos
  - Rey eterno
  - Rey de las naciones
  lexicon: BDAG
  rationale: Se sigue el texto griego proporcionado, αἰώνων = «edades». «Rey de las edades» conserva el valor literal y el tono solemne. Se mantiene la variante textual relevante en nota.
theological_decisions:
- issue: Renderización de δοῦλος aplicada a Moisés
  english_pob_reading: slave of God
  chosen_spanish_reading: el esclavo de Dios
  alternative_spanish_readings:
  - el siervo de Dios
  - el servidor de Dios
  rationale: La decisión POB en inglés preserva la fuerza de δοῦλος; el español debe hacer lo mismo. «Esclavo» mantiene el sentido de pertenencia, comisión y dependencia sin suavizar la relación que el texto subraya.
  doctrine_reference: 'DOCTRINE.md: lexical force for δοῦλος; preserve bonded status when contextually warranted'
- issue: Título divino al final del versículo
  english_pob_reading: O King of the ages
  chosen_spanish_reading: Rey de las edades
  alternative_spanish_readings:
  - Rey de los siglos
  - Rey de la eternidad
  - Rey de las naciones
  rationale: Se sigue el texto base griego αἰώνων ('edades') y se preserva la variante conocida en nota. En español, «edades» es suficientemente literal y comprensible en un registro bíblico elevado.
  doctrine_reference: Original-language primacy; preserve textual variants in footnotes where warranted
translation_notes:
  revision_awareness: La versión inglesa más reciente pasó de «slave of God» a «servant of God» por fluidez, pero la corrección de regresión restauró «slave» conforme a la política doctrinal. En esta traducción se sigue la lectura auditada coherente con el griego y con la decisión doctrinal sobre δοῦλος. También se mantiene αἰώνων («edades») del texto SBLGNT, dejando la variante «naciones» en nota.
  spanish_consistency_notes:
  - Se emplea «Dios» para θεός y «Señor» para κύριος, sin ocultar el nombre divino porque en este versículo el griego usa κύριος y θεός.
  - «Todopoderoso» se usa como equivalente estable de παντοκράτωρ en un registro bíblico digno.
  - Se evita «Cristo» porque aquí ἀρνίον funciona como título cristológico ya establecido, y en español «el Cordero» es la forma más natural y fiel.
  - La concordancia de «justos y verdaderos» con «caminos» se adapta al género y número del español sin alterar el paralelismo griego.
