source:
  edition: SBLGNT
  text: Καὶ εἶδον ὡς θάλασσαν ὑαλίνην μεμιγμένην πυρί, καὶ τοὺς νικῶντας ἐκ τοῦ θηρίου καὶ ἐκ τῆς εἰκόνος αὐτοῦ καὶ ἐκ τοῦ ἀριθμοῦ τοῦ ὀνόματος αὐτοῦ ἑστῶτας ἐπὶ τὴν θάλασσαν τὴν ὑαλίνην, ἔχοντας κιθάρας τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/015/002.yaml
  text: And I saw what appeared to be a sea of glass mixed with fire[a], and those who had conquered the beast and its image and the number of its name, standing on the sea of glass[b], holding harps of God.
  footnotes:
  - marker: a
    text: Or 'those overcoming the beast and its image and the number of its name,' or more literally, 'those victorious from the beast ...' The Greek construction can emphasize either victory over the beast or emergence from its power.
    reason: alternative_reading
  - marker: b
    text: Or 'God's harps.' The genitive may indicate possession, source, or dedication.
    reason: lexical_alternative
