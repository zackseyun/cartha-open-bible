revisions:
- from: Y vi como un mar de vidrio mezclado con fuego[a], y a los que habían vencido a la bestia, a su imagen y al número de su nombre, de pie sobre el mar de vidrio[b], con arpas de Dios.
  to: Y vi lo que parecía ser un mar de vidrio mezclado con fuego, y a los que habían vencido a la bestia, a su imagen y al número de su nombre, de pie sobre el mar de vidrio, con arpas de Dios[b].
  rationale: Se ajusta ὡς a una expresión española más clara de apariencia visionaria ('lo que parecía ser'). Se elimina la nota [a] porque el borrador no la anclaba a una frase pertinente del texto y el contenido de esa nota inglesa trata una alternativa de lectura para la sección de los vencedores, no para 'mezclado con fuego'. Se reubica y corrige la nota [b] para que ancle correctamente en 'arpas de Dios' y exprese una alternativa real y la ambigüedad del genitivo.
