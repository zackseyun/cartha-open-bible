translation:
  language: es
  text: Y vi lo que parecía ser un mar de vidrio mezclado con fuego, y a los que habían vencido a la bestia, a su imagen y al número de su nombre, de pie sobre el mar de vidrio, con arpas de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «las arpas de Dios». El genitivo puede indicar posesión, origen o dedicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: what appeared to be
  chosen_spanish: como
  alternatives_spanish:
  - como si fuera
  - lo que parecía ser
  lexicon: BDAG
  rationale: En una visión apocalíptica, ὡς introduce semejanza/apariencia, no identidad plena. «Como» conserva esa comparación breve y natural en español sin cerrar la ambigüedad.
- source_word: θάλασσαν ὑαλίνην
  english_pob_choice: a sea of glass
  chosen_spanish: un mar de vidrio
  alternatives_spanish:
  - un mar de cristal
  - un mar vítreo
  lexicon: BDAG
  rationale: «Vidrio» comunica la imagen con claridad en español moderno y mantiene el sustantivo repetido en el verso. «Cristal» es posible, pero puede sonar más interpretativo; «vítreo» sería más literario y menos transparente.
- source_word: μεμιγμένην πυρί
  english_pob_choice: mixed with fire
  chosen_spanish: mezclado con fuego
  alternatives_spanish:
  - mezclado de fuego
  - mezclado con fuego ardiente
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe el estado visible del mar. «Mezclado con fuego» conserva la combinación extraña sin explicarla ni suavizarla. El masculino concuerda con «mar» en español.
- source_word: τοὺς νικῶντας
  english_pob_choice: those who had conquered
  chosen_spanish: a los que habían vencido
  alternatives_spanish:
  - a los vencedores
  - a los que vencían
  lexicon: BDAG
  rationale: νικῶντας nombra a los que han obtenido victoria. «Habían vencido» preserva el resultado de la acción y suena natural en español. «Vencedores» es más nominal, pero pierde el matiz verbal del participio.
- source_word: ἐκ τοῦ θηρίου καὶ ἐκ τῆς εἰκόνος αὐτοῦ καὶ ἐκ τοῦ ἀριθμοῦ τοῦ ὀνόματος αὐτοῦ
  english_pob_choice: the beast and its image and the number of its name
  chosen_spanish: a la bestia, a su imagen y al número de su nombre
  alternatives_spanish:
  - de la bestia, de su imagen y del número de su nombre
  - sobre la bestia, sobre su imagen y sobre el número de su nombre
  lexicon: BDAG
  rationale: La construcción con νικάω y ἐκ puede expresarse como victoria «sobre» o como salida/escape «de» la esfera de poder. En español, «vencer a» conserva la idea de triunfo sin introducir una preposición repetida que suene forzada; el triple complemento mantiene la estructura del texto.
- source_word: ἑστῶτας ἐπὶ τὴν θάλασσαν τὴν ὑαλίνην
  english_pob_choice: standing on the sea of glass
  chosen_spanish: de pie sobre el mar de vidrio
  alternatives_spanish:
  - de pie en el mar de vidrio
  - de pie sobre el mar vítreo
  lexicon: BDAG
  rationale: ἐπί con acusativo indica posición sobre. «De pie sobre» preserva la imagen sorprendente. «En» debilitaría la relación espacial visible en el griego.
- source_word: κιθάρας τοῦ θεοῦ
  english_pob_choice: harps of God
  chosen_spanish: arpas de Dios
  alternatives_spanish:
  - arpas de Dios
  - arpas divinas
  - las arpas de Dios
  lexicon: BDAG
  rationale: Se mantiene el genitivo literal porque puede expresar posesión, origen o dedicación. «Arpas de Dios» conserva la ambigüedad semántica y la solemnidad del original.
theological_decisions:
- issue: Relación de los vencedores con la bestia expresada por ἐκ tras νικῶντας
  english_pob_reading: They had conquered the beast and its image and the number of its name.
  chosen_spanish_reading: Habían vencido a la bestia, a su imagen y al número de su nombre.
  alternative_spanish_readings:
  - Habían vencido sobre la bestia, sobre su imagen y sobre el número de su nombre.
  - Habían salido de la bestia, de su imagen y del número de su nombre.
  rationale: El griego permite tanto una idea de victoria sobre como una de salida desde la esfera de influencia. Para no borrar esa tensión, la versión española usa «vencido a», que comunica victoria directa sin resolver de manera excesiva el matiz de ἐκ.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y léxica cuando el griego admite más de una lectura'
- issue: Genitivo en κιθάρας τοῦ θεοῦ
  english_pob_reading: harps of God
  chosen_spanish_reading: arpas de Dios
  alternative_spanish_readings:
  - arpas de Dios
  - arpas dadas por Dios
  - arpas divinas
  rationale: El genitivo puede ser posesivo, de origen o de dedicación. «Arpas de Dios» deja abierta esa relación, como en el audit trail inglés, sin forzar una explicación doctrinal.
  doctrine_reference: BDAG genitive usage; maintain lexical ambiguity where the source does not resolve it
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del texto inglés: conserva la escena visionaria con «como un mar de vidrio mezclado con fuego», traduce νικῶντας con un participio perfecto español («habían vencido») para reflejar estado/resultante, y mantiene el genitivo ambiguo en κιθάρας τοῦ θεοῦ como «arpas de Dios». También evita convertir ἐκ en un «sobre» repetido dentro del cuerpo principal, trasladando esa posibilidad a nota para no sobrecargar la sintaxis española.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma cuando aparezca el nombre divino, pero aquí el texto tiene θεοῦ y se traduce «Dios».
  - «Bestia» conserva el término apocalíptico estándar del libro.
  - «Mar de vidrio» se mantiene idéntico en ambas apariciones para conservar la repetición enfática del griego.
  - Se prefirió la concordancia masculina «mezclado» con «mar».
  - La puntuación reproduce la acumulación de complementos del griego sin fragmentar la visión.
