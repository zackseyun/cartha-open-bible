revisions:
- from: ¿Quién no te temerá[a], Señor, y glorificará tu nombre? Porque solo tú eres santo. Porque todas las naciones vendrán y se postrarán delante de ti, porque tus justos juicios[b] han sido manifestados.
  to: ¿Quién no te temerá[a], Señor, y glorificará tu nombre? Porque solo tú eres santo. Porque todas las naciones vendrán y te adorarán delante de ti, porque tus actos justos[b] han sido manifestados.
  rationale: 'Se revisa para ajustar el español a la decisión léxica auditada del POB: δικαιώματα debe quedar en el texto principal como un término amplio («actos justos»), no como la alternativa más estrecha «juicios». También se cambia «se postrarán» por «te adorarán» para reflejar mejor el valor cultual de προσκυνέω en este himno de Apocalipsis. Se conserva la nota retórica en [a] y se rehace [b] para que la alternativa «juicios» quede en nota, no en el texto base.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y acierta en «Señor», «solo tú eres santo» y «todas las naciones vendrán». Sin embargo, se aparta de una decisión léxica significativa del POB en τὰ δικαιώματά σου: el inglés auditado eligió «your righteous acts», con nota para «judgments/ordinances», mientras que el español principal puso «tus justos juicios», elevando una alternativa al texto base. Además, προσκυνήσουσιν en este contexto litúrgico se refleja mejor como adoración/ culto que como mera postración, aunque la nota no es estrictamente necesaria.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene ajustar dos puntos para mayor fidelidad y naturalidad bíblica: usar «te adorarán delante de ti» o equivalente para mantener el sentido cultual de προσκυνέω, y cambiar «tus justos juicios» por «tus actos justos» o «tus actos de justicia» para alinearse con la decisión documentada y evitar estrechar el sentido a veredictos judiciales. La puntuación y el tono son buenos.'
  glossary_alignment: No hay conflicto con los términos de proyecto principales. «Señor» para κύριε es correcto. «Santo» para ὅσιος está bien. La divergencia principal es doctrinal/lexical respecto de δικαιώματα, donde el texto español debería reflejar la preferencia del POB por un sentido amplio de actos justos, dejando «juicios», «decretos» o «decisiones» en nota.
  issues:
  - severity: high
    issue: τὰ δικαιώματά σου se tradujo en el texto principal como «tus justos juicios»
    rationale: La auditoría inglesa eligió explícitamente «your righteous acts» y relegó «judgments/ordinances» a alternativa. «Justos juicios» estrecha el campo semántico y altera una decisión léxica central documentada.
  - severity: medium
    issue: προσκυνήσουσιν se vertió como «se postrarán»
    rationale: Aunque προσκυνέω puede incluir postración, en Apocalipsis y en este contexto de adoración universal el valor principal es «adorar/rendir adoración». «Se postrarán» conserva el gesto, pero puede atenuar el sentido cultual que el POB inglés mantuvo con «worship».
  - severity: low
    issue: La nota [a] ofrece una alternativa válida pero no necesaria
    rationale: No es errónea, pero el pasaje ya se entiende bien sin nota. Puede conservarse si se desea preservar la explicación del matiz retórico fuerte.
