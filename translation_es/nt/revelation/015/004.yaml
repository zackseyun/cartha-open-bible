    reason: lexical_alternative
  revision_rationale: 'Se revisa para ajustar el español a la decisión léxica auditada del POB: δικαιώματα debe quedar en el texto principal como un término amplio («actos justos»), no como la alternativa más estrecha «juicios». También se cambia «se postrarán» por «te adorarán» para reflejar mejor el valor cultual de προσκυνέω en este himno de Apocalipsis. Se conserva la nota retórica en [a] y se rehace [b] para que la alternativa «juicios» quede en nota, no en el texto base.'
