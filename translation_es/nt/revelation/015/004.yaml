translation:
  language: es
  text: ¿Quién no te temerá[a], Señor, y glorificará tu nombre? Porque solo tú eres santo. Porque todas las naciones vendrán y te adorarán delante de ti, porque tus actos justos[b] han sido manifestados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «¿Quién no habrá de temerte?». La construcción griega expresa una pregunta retórica fuerte que presupone la respuesta: nadie.'
    reason: alternative_reading
  - marker: b
    text: O «tus justos juicios». El término griego δικαιώματα también puede referirse a veredictos judiciales u ordenanzas, pero aquí probablemente apunta a las obras o actos justos de Dios ahora manifestados públicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς οὐ μὴ φοβηθῇ
  english_pob_choice: Who will not fear
  chosen_spanish: ¿Quién no te temerá
  alternatives_spanish:
  - ¿Quién no temerá
  - ¿Quién no habrá de temerte
  lexicon: BDAG
  rationale: La construcción interrogativa con οὐ μή expresa una negación retórica fuerte, esperando la respuesta 'nadie'. En español, «¿Quién no te temerá?» conserva esa fuerza y el matiz futuro/gnómico sin volverlo una paráfrasis excesiva.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: El vocativo de κύριος se rinde naturalmente como «Señor» en español bíblico. Mantiene la dignidad del texto y evita un término menos adecuado en este contexto de adoración.
- source_word: δοξάσει τὸ ὄνομά σου
  english_pob_choice: glorify your name
  chosen_spanish: glorificará tu nombre
  alternatives_spanish:
  - dará gloria a tu nombre
  - honrará tu nombre
  lexicon: BDAG
  rationale: «Glorificar tu nombre» reproduce bien el giro bíblico de δοξάζω aplicado al nombre divino. En español suena natural y conserva la idea de reconocer y magnificar la revelación del carácter de Dios.
- source_word: μόνος ὅσιος
  english_pob_choice: you alone are holy
  chosen_spanish: solo tú eres santo
  alternatives_spanish:
  - solo tú eres santo y piadoso
  - solo tú eres fiel
  lexicon: BDAG
  rationale: ὅσιος en este contexto doxológico apunta a la santidad única de Dios. «Santo» es la equivalencia más clara y reverente en español, sin reducir el término a 'piadoso' o 'fiel'.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: BDAG
  rationale: «Naciones» conserva el alcance colectivo y escatológico de ἔθνη. También mantiene la resonancia bíblica del llamado universal a la adoración.
- source_word: ἥξουσιν
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  lexicon: BDAG
  rationale: El verbo ἥκω significa venir o llegar. «Vendrán» es la forma más natural en español y encaja con el tono profético del pasaje.
- source_word: προσκυνήσουσιν ἐνώπιόν σου
  english_pob_choice: worship before you
  chosen_spanish: se postrarán delante de ti
  alternatives_spanish:
  - te adorarán delante de ti
  - rendirán adoración delante de ti
  lexicon: BDAG
  rationale: En Apocalipsis, προσκυνέω puede implicar postración física y adoración. Dado que el complemento ἐνώπιόν σου subraya la posición 'delante de ti', «se postrarán delante de ti» preserva la imagen concreta sin perder la dimensión cultual.
- source_word: τὰ δικαιώματά σου
  english_pob_choice: your righteous acts
  chosen_spanish: tus justos juicios
  alternatives_spanish:
  - tus actos de justicia
  - tus decretos justos
  - tus justas decisiones
  lexicon: BDAG
  rationale: 'δικαίωμα tiene un campo semántico amplio: decretos, preceptos, decisiones judiciales y actos justos. En este contexto de juicio revelado, «justos juicios» expresa bien la dimensión judicial y la justicia manifestada de Dios, sin estrechar el término a ''ordenanzas''.'
- source_word: ἐφανερώθησαν
  english_pob_choice: have been revealed
  chosen_spanish: han sido manifestados
  alternatives_spanish:
  - han sido revelados
  - se han hecho manifiestos
  lexicon: BDAG
  rationale: El pasivo aoristo comunica que lo que antes estaba oculto ahora ha quedado visible. «Han sido manifestados» es natural en español bíblico y conserva el sentido de revelación pública.
theological_decisions:
- issue: Sentido de ὅσιος en una doxología dirigida a Dios
  english_pob_reading: holy
  chosen_spanish_reading: santo
  alternative_spanish_readings:
  - fiel
  - piadoso
  rationale: En este himno, la afirmación celebra la singular santidad de Dios. «Santo» evita rebajar el término a mera fidelidad o piedad y mantiene la carga cultual y moral del contexto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de τὰ δικαιώματα en el cierre del cántico
  english_pob_reading: your righteous acts
  chosen_spanish_reading: tus justos juicios
  alternative_spanish_readings:
  - tus actos de justicia
  - tus decretos justos
  rationale: La sección celebra que la justicia de Dios ha quedado a la vista de las naciones. «Justos juicios» preserva la tensión entre acto judicial y justicia manifestada, sin convertir δικαιώματα en un término meramente legalista ni en uno demasiado general.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y concuerda con la revisión inglesa establecida en la auditoría: mantiene la pregunta retórica, la doxología, la universalidad escatológica de las naciones y la ambigüedad semántica de δικαιώματα sin borrar la tensión lexical.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige directamente; aquí el vocativo κύριε se rinde como «Señor», conforme al contexto de adoración y al audit trail inglés.
  - Se mantiene «santo» para ὅσιος por coherencia con el uso doxológico y para evitar una traducción debilitada como «fiel» o «piadoso».
  - «Se postrarán delante de ti» conserva mejor la imaginería de προσκυνήσουσιν ἐνώπιόν σου que un simple «adorarán», aunque la adoración está implícita.
  - «Justos juicios» se eligió para reflejar el campo de δικαιώματα en un contexto de juicio revelado; se deja nota de alternativas por la amplitud semántica del término.
