translation:
  language: es
  text: Y después de estas cosas vi, y se abrió el templo[a] del tabernáculo del testimonio[b] en el cielo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario» para «templo» (ναός), enfatizando el lugar santo interior más que el complejo más amplio del templo.
    reason: lexical_alternative
  - marker: b
    text: «Tabernáculo del testimonio» evoca el lenguaje veterotestamentario del santuario, especialmente el tabernáculo del desierto asociado con el testimonio del pacto de Dios.
    reason: cross_reference
lexical_decisions:
- source_word: Καὶ μετὰ ταῦτα
  english_pob_choice: And after these things
  chosen_spanish: Y después de estas cosas
  alternatives_spanish:
  - Después de estas cosas
  - Y después de esto
  lexicon: BDAG
  rationale: μετὰ ταῦτα conserva la secuencia narrativa apocalíptica y el plural de ταῦτα; en español, «después de estas cosas» mantiene esa forma con naturalidad. Se retiene la coordinación inicial «Y» para reflejar la parataxis de Juan.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - yo vi
  lexicon: BDAG
  rationale: Es un aoristo de percepción visionaria; «vi» es la equivalencia directa y no desplaza el foco hacia la acción de mirar.
- source_word: ἠνοίγη
  english_pob_choice: was opened
  chosen_spanish: se abrió
  alternatives_spanish:
  - fue abierto
  - quedó abierto
  lexicon: BDAG
  rationale: El pasivo aoristo comunica que el templo llegó a abrirse. En español, «se abrió» es natural y mantiene el pasivo sin forzar una construcción más pesada.
- source_word: ναὸς
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: ναός puede referirse al santuario interno o al templo propiamente dicho. «Templo» conserva la forma más reconocible, mientras que el resto de la frase delimita su carácter cultual celestial.
- source_word: τῆς σκηνῆς
  english_pob_choice: of the tabernacle
  chosen_spanish: de la tienda
  alternatives_spanish:
  - del tabernáculo
  - de la carpa
  lexicon: BDAG
  rationale: σκηνή significa literalmente «tienda»; aunque «tabernáculo» es la opción bíblica tradicional, aquí «tienda» preserva el valor léxico directo de la palabra griega y mantiene la tensión intertextual con el culto del desierto.
- source_word: τοῦ μαρτυρίου
  english_pob_choice: of the testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - del testimonio divino
  - del testimonio de Dios
  lexicon: BDAG
  rationale: μαρτύριον en esta fórmula cultual evoca el «testimonio» asociado al arca y al santuario en el AT. «Testimonio» conserva ese enlace bíblico mejor que «testigo» o «testimonio» glosado de modo explicativo.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  lexicon: BDAG
  rationale: El griego ubica el templo en el ámbito celestial. «En el cielo» es la forma natural en español y evita la artificiosidad de «en el cielo» con artículo omitido por calco excesivo; aquí «el cielo» funciona como locativo del reino celestial.
theological_decisions:
- issue: Imagen cultual del santuario celestial
  english_pob_reading: Render the full stacked genitive phrase without collapsing it into a paraphrase such as 'heavenly sanctuary.'
  chosen_spanish_reading: 'Traducir la cadena cultual de manera íntegra: «el templo de la tienda del testimonio en el cielo».'
  alternative_spanish_readings:
  - el santuario celestial
  - el templo del tabernáculo del testimonio
  rationale: La acumulación de genitivos en griego evoca el tabernáculo mosaico y el templo celestial de Apocalipsis. En español conviene mantener esa densidad imagística sin resolverla en una sola glosa interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión coincide sustancialmente con el audit trail inglés y no requiere revisión adicional; se preservó la secuencia narrativa, la visión, y la imagen cultual celestial sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la coordinación característica del griego koiné.
  - Se prefirió «se abrió» por naturalidad y correspondencia con el pasivo aoristo.
  - «Tienda» se eligió como traducción léxica directa de σκηνή, con nota para la alternativa tradicional «tabernáculo».
  - «Del testimonio» conserva el eco bíblico cultual y evita una paráfrasis explicativa.
  - «En el cielo» expresa la localización celestial de forma clara y publicable en español.
