    text: O «templo»; el griego aquí usa específicamente ναός, que con frecuencia se refiere al santuario más que al complejo completo del templo.
    reason: lexical_alternative
  - marker: b
    text: O «lino puro y brillante».
    reason: lexical_alternative
  - marker: c
    text: O «cinturones de oro» o «bandas de oro».
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la redacción para mejorar fidelidad y naturalidad: «del santuario» se adelantó para una sintaxis española más fluida; «fajas de oro» sustituye «cinturones de oro» porque reproduce mejor la imagen de ζώνας χρυσᾶς alrededor del pecho; «ceñidos al pecho» evita una construcción torpe y mantiene la localización. También se invirtió la nota alternativa para que la opción principal refleje mejor la decisión léxica del POB.'
