translation:
  language: es
  text: Y salieron del santuario[a] los siete ángeles que tenían las siete plagas, vestidos de lino limpio y resplandeciente[b], y ceñidos al pecho con fajas de oro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo»; el griego aquí usa específicamente ναός, que con frecuencia se refiere al santuario más que al complejo completo del templo.
    reason: lexical_alternative
  - marker: b
    text: O «lino puro y brillante».
    reason: lexical_alternative
  - marker: c
    text: O «cinturones de oro» o «bandas de oro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - vinieron
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa salida o movimiento hacia afuera. «Salieron» es natural en español y conserva el valor direccional sin añadir matices ajenos.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En el contexto visionario de Apocalipsis se trata de seres celestiales, por lo que «ángeles» es la equivalencia directa y más clara.
- source_word: πληγὰς
  english_pob_choice: plagues
  chosen_spanish: plagas
  alternatives_spanish:
  - golpes
  - aflicciones
  lexicon: BDAG
  rationale: En Apocalipsis el término remite a juicios divinos. «Plagas» mantiene ese uso establecido y la fuerza de calamidad enviada por Dios.
- source_word: ναοῦ
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  lexicon: BDAG
  rationale: ναός nombra específicamente el recinto sagrado interior, no el complejo entero. «Santuario» preserva esa precisión mejor que «templo».
- source_word: ἐνδεδυμένοι
  english_pob_choice: clothed
  chosen_spanish: vestidos
  alternatives_spanish:
  - ataviados
  - clothed
  lexicon: BDAG
  rationale: 'El participio perfecto describe su estado: estaban revestidos con cierta ropa. «Vestidos» es una solución digna y natural en español.'
- source_word: λίνον
  english_pob_choice: linen
  chosen_spanish: lino
  alternatives_spanish:
  - lino fino
  - lino de lino
  lexicon: BDAG
  rationale: El sustantivo denota lino. En español, «lino» conserva el término material sin sobrecargarlo; los adjetivos siguientes expresan la cualidad descriptiva.
- source_word: καθαρὸν
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: BDAG
  rationale: «Limpio» refleja el sentido básico de καθαρός y en español puede sugerir también pureza ritual, que encaja con la escena.
- source_word: λαμπρὸν
  english_pob_choice: bright
  chosen_spanish: resplandeciente
  alternatives_spanish:
  - brillante
  - radiante
  lexicon: BDAG
  rationale: λαμπρός expresa brillo o esplendor. «Resplandeciente» comunica mejor la intensidad visual del apocalipsis que un simple «brillante».
- source_word: περιεζωσμένοι
  english_pob_choice: girded around
  chosen_spanish: ceñidos
  alternatives_spanish:
  - ceñidos alrededor
  - ceñidos con
  lexicon: BDAG
  rationale: El participio de περιζώννυμι indica ceñir o rodear con un cinturón. «Ceñidos» es la forma idiomática y fiel en español para este gesto.
- source_word: περὶ τὰ στήθη
  english_pob_choice: around their chests
  chosen_spanish: alrededor del pecho
  alternatives_spanish:
  - alrededor de los pechos
  - sobre el pecho
  lexicon: BDAG
  rationale: στῆθος se refiere al pecho. «Alrededor del pecho» preserva la localización sin forzar una imagen extraña en español.
- source_word: ζώνας χρυσᾶς
  english_pob_choice: golden sashes
  chosen_spanish: cinturones de oro
  alternatives_spanish:
  - fajas de oro
  - bandas de oro
  lexicon: BDAG
  rationale: 'ζώνη puede significar cinturón, faja o banda. Dado que el texto las sitúa alrededor del pecho, la expresión española puede sonar mejor con «cinturones de oro» como equivalencia literal y visual; la nota mantiene la alternativa de «fajas». '
theological_decisions:
- issue: Cómo traducir ναός en un contexto celestial
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - templo
  rationale: La escena presenta la salida de los ángeles desde el recinto sagrado interior de la presencia divina. «Santuario» evita diluir la precisión de ναός y mantiene la distinción con el complejo templario más amplio.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que ajustó la imagen desde una expresión más libre a «girded around their chests» para reflejar con mayor precisión περιεζωσμένοι περὶ τὰ στήθη. En español se optó por «ceñidos alrededor del pecho», conservando la precisión y la dignidad estilística.
  spanish_consistency_notes:
  - Se mantuvo «santuario» para ναός, en consonancia con el criterio POB de distinguir el recinto sagrado interior del templo en general.
  - «Limpio y resplandeciente» conserva la doble cualidad del griego (καθαρόν, λαμπρόν) sin añadir elementos no presentes.
  - «Ceñidos alrededor del pecho» refleja el lugar específico de la faja/cinturón en el texto griego y evita desplazarlo a la cintura.
  - «Cinturones de oro» mantiene la imagen material; la nota ofrece «fajas de oro» como alternativa española igualmente válida.
