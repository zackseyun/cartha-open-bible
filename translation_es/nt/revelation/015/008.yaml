translation:
  language: es
  text: Y el santuario[a] se llenó de humo procedente de la gloria de Dios y procedente de su poder, y nadie podía entrar en el santuario hasta que terminaran las siete plagas de los siete ángeles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo» para «santuario» (griego ναός), aunque el término suele referirse más específicamente a la morada santa interior que al complejo más amplio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὸς
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  lexicon: BDAG
  rationale: En este contexto apocalíptico, ναός apunta al recinto sagrado o morada divina, no necesariamente al complejo completo del templo. «Santuario» reproduce mejor esa especificidad que «templo» y sigue siendo natural en español.
- source_word: ἐγεμίσθη
  english_pob_choice: was filled
  chosen_spanish: fue llenado
  alternatives_spanish:
  - se llenó
  - quedó lleno
  lexicon: BDAG
  rationale: El aoristo pasivo pide una forma pasiva en español. «Fue llenado» conserva con claridad la voz pasiva y el tono solemne del texto.
- source_word: καπνοῦ
  english_pob_choice: with smoke
  chosen_spanish: de humo
  alternatives_spanish:
  - con humo
  - lleno de humo
  lexicon: BDAG
  rationale: El griego expresa el contenido con genitivo tras γεμίζω; en español puede naturalizarse con «de humo» sin perder el sentido de llenura.
- source_word: ἐκ τῆς δόξης τοῦ θεοῦ
  english_pob_choice: from the glory of God
  chosen_spanish: procedente de la gloria de Dios
  alternatives_spanish:
  - de la gloria de Dios
  - proveniente de la gloria de Dios
  lexicon: BDAG
  rationale: ἐκ marca origen. «Procedente de» comunica con precisión que el humo sale de la gloria manifiesta de Dios, sin sonar demasiado técnico.
- source_word: ἐκ τῆς δυνάμεως αὐτοῦ
  english_pob_choice: from his power
  chosen_spanish: y de su poder
  alternatives_spanish:
  - y procedente de su poder
  - y de su fuerza
  lexicon: BDAG
  rationale: δύναμις se traduce de forma directa como «poder». Se mantiene el paralelismo con la frase anterior y la referencia al poder divino.
- source_word: οὐδεὶς ἐδύνατο
  english_pob_choice: no one was able
  chosen_spanish: nadie podía
  alternatives_spanish:
  - nadie fue capaz de
  - nadie podía hacerlo
  lexicon: BDAG
  rationale: La combinación de sujeto negativo e imperfecto expresa incapacidad continua. «Nadie podía» es natural en español y conserva ese matiz.
- source_word: εἰσελθεῖν εἰς τὸν ναὸν
  english_pob_choice: to enter the sanctuary
  chosen_spanish: entrar en el santuario
  alternatives_spanish:
  - entrar al santuario
  - ingresar en el santuario
  lexicon: BDAG
  rationale: El infinitivo de entrada se vierte de forma directa y sobria. Se conserva «santuario» para la misma unidad terminológica del versículo.
- source_word: ἄχρι τελεσθῶσιν
  english_pob_choice: until ... were finished
  chosen_spanish: hasta que se cumplieran
  alternatives_spanish:
  - hasta que terminaran
  - hasta que fueran terminadas
  lexicon: BDAG
  rationale: τελέω en pasivo aquí indica la consumación de las plagas. «Se cumplieran» conserva el sentido de realización/completación y suena natural en español.
- source_word: πληγαὶ
  english_pob_choice: plagues
  chosen_spanish: plagas
  alternatives_spanish:
  - aflicciones
  - azotes
  lexicon: BDAG
  rationale: En Apocalipsis, el término designa juicios divinos. «Plagas» es la equivalencia establecida y más exacta en este contexto.
- source_word: τῶν ἑπτὰ ἀγγέλων
  english_pob_choice: of the seven angels
  chosen_spanish: de los siete ángeles
  alternatives_spanish:
  - pertenecientes a los siete ángeles
  lexicon: BDAG
  rationale: El genitivo se entiende naturalmente como pertenencia o asociación. «De los siete ángeles» mantiene la relación sin sobrecargar el texto.
theological_decisions:
- issue: ναός en un contexto de visión celestial
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - templo
  rationale: La escena describe la morada sagrada de Dios en clave de teofanía. «Santuario» evita sugerir el conjunto arquitectónico completo y preserva la especificidad del lugar santo, sin añadir interpretación doctrinal extra.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: No hubo cambios pendientes en la última revisión; el texto se ajusta al estado final de alto acuerdo del tramo en inglés y mantiene la misma distinción lexical para ναός.
  spanish_consistency_notes:
  - Se mantiene «santuario» para ambas apariciones de ναός dentro del versículo.
  - Se conserva «Dios» y «su poder» sin introducir mayúsculas devocionales no sustentadas por el griego.
  - «Plagas» y «siete ángeles» siguen la terminología ya establecida en el audit trail inglés.
  - La estructura de la cláusula final reproduce la dependencia temporal de ἄχρι + subjuntivo pasivo con una formulación natural en español.
