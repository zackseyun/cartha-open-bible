translation:
  language: es
  text: Vengo pronto[a]; mantén firme lo que tienes, para que nadie tome tu corona[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rápidamente». El adverbio griego puede enfatizar tanto la cercanía en el tiempo como la rapidez de la acción.
    reason: alternative_reading
  - marker: b
    text: El término griego se refiere a una corona o guirnalda de vencedor, no específicamente a una diadema real.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχομαι
  english_pob_choice: I am coming
  chosen_spanish: vengo
  alternatives_spanish:
  - estoy viniendo
  - estoy por venir
  lexicon: BDAG
  rationale: El presente de ἔρχομαι tiene fuerza de inminencia futura en este contexto. «Vengo» suena natural en español y conserva la cercanía/certeza de la llegada mejor que una forma más perifrástica.
- source_word: ταχύ
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  lexicon: BDAG
  rationale: La forma puede apuntar a cercanía temporal o a rapidez de acción. «Pronto» comunica mejor la inminencia en español, y la alternativa adverbial se preserva en nota para no cerrar la ambigüedad del griego.
- source_word: κράτει
  english_pob_choice: hold fast
  chosen_spanish: mantén firme
  alternatives_spanish:
  - retén
  - sujeta con firmeza
  lexicon: BDAG
  rationale: El imperativo de κρατέω pide perseverancia y retención firme. «Mantén firme» conserva el tono exhortativo sin sonar forzado en español, y refleja mejor la idea de aferrarse con constancia.
- source_word: ὃ ἔχεις
  english_pob_choice: what you have
  chosen_spanish: lo que tienes
  alternatives_spanish:
  - lo que posees
  lexicon: BDAG
  rationale: La construcción relativa con ἔχω se vierte de manera directa como «lo que tienes», dejando indefinido el referente, como en el griego.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad o resultado deseado. «Para que» es la opción natural y clara en español, y preserva bien la relación subordinante.
- source_word: μηδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: «Nadie» es la forma más natural y neutral en español para el sujeto indefinido negativo.
- source_word: λάβῃ
  english_pob_choice: may take
  chosen_spanish: tome
  alternatives_spanish:
  - arrebate
  - quite
  lexicon: BDAG
  rationale: El subjuntivo de aoristo en la cláusula de propósito expresa el resultado no deseado. «Tome» es la forma más sobria y fiel; «arrebate» intensificaría innecesariamente el verbo.
- source_word: στέφανόν
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - corona de vencedor
  lexicon: BDAG
  rationale: στέφανος alude a una corona de honor o victoria, no a una diadema real. «Corona» funciona bien en español; la especificación honorífica se mantiene en nota para conservar la precisión lexical.
theological_decisions:
- issue: El alcance de ταχύ en la venida de Cristo
  english_pob_reading: soon, with a footnote preserving quickly as an alternative
  chosen_spanish_reading: pronto, con nota que preserva «rápidamente» como alternativa
  alternative_spanish_readings:
  - rápidamente
  rationale: La frase puede subrayar cercanía temporal o rapidez/súbita ejecución. Se mantiene esa tensión en español con «pronto» en el texto principal y una nota para la otra posibilidad, evitando resolver el matiz de forma artificial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente: no se requieren cambios respecto del juicio de alta concordancia. La redacción española mantiene la tensión de ταχύ, preserva el valor exhortativo de κράτει y conserva la distinción lexical de στέφανος sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se mantiene «corona» como equivalente general de στέφανος, con aclaración en nota para evitar confundirla con diadema.
  - Se usa «vengo» en lugar de una forma más literal y pesada, porque el presente progresivo no es necesario en español para expresar inminencia.
  - «Mantén firme» conserva la fuerza imperativa de perseverancia mejor que un simple «guarda» o «conserva».
  - Se evita introducir el nombre propio «Cristo» o títulos adicionales, ya que el versículo no los contiene explícitamente.
