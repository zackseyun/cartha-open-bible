review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del POB inglés: conserva el paralelismo de τηρέω/τηρήσω, mantiene la ambigüedad de τὸν λόγον τῆς ὑπομονῆς μου mediante nota, y no resuelve indebidamente el debate sobre τηρήσω ἐκ. También refleja adecuadamente el alcance de οἰκουμένη y la expresión recurrente ''los que habitan sobre la tierra''.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero necesita pequeños ajustes para mayor naturalidad y fidelidad léxica en español eclesial amplio. 'Paciencia' en el texto principal debilita el matiz de ὑπομονή frente a 'perseverancia'; 'mundo habitado entero' suena algo forzado, y 'sobre la tierra' después de 'habitan' es menos natural que 'en la tierra' en español, sin pérdida relevante de sentido. Además, hay un error ortográfico en una alternativa léxica ('custodido').
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión clave es preferir 'perseverancia' para ὑπομονή en este contexto, ya que se alinea mejor con 'endurance' del POB inglés y con el uso apocalíptico/cristiano de resistencia fiel, mientras que 'paciencia' en español puede sonar más pasiva.
  issues:
  - severity: medium
    issue: '''mi palabra de paciencia'' para τὸν λόγον τῆς ὑπομονῆς μου'
    rationale: Aunque no es imposible, 'paciencia' en español tiende a sonar menos precisa que 'perseverancia' para ὑπομονή en un contexto de resistencia fiel. El POB inglés escogió 'endurance', y 'perseverancia' comunica mejor ese valor sin cerrar la ambigüedad del genitivo.
  - severity: low
    issue: '''el mundo habitado entero'' suena poco natural'
    rationale: La frase comunica el sentido de οἰκουμένη ὅλη, pero en español más natural y claro sería 'todo el mundo habitado'.
  - severity: low
    issue: '''los que habitan sobre la tierra'''
    rationale: Es cercano al griego, pero en español corriente y bíblico amplio 'los que habitan en la tierra' suena más natural. La resonancia de la fórmula de Apocalipsis se conserva igualmente.
  - severity: low
    issue: 'Error en alternativa léxica: ''has custodido'''
    rationale: Debe corregirse a 'has custodiado' si se conserva en documentación interna.
  revised_spanish_text: Porque has guardado mi palabra de perseverancia[a], yo también te guardaré de la hora de la prueba que está por venir sobre todo el mundo habitado[b], para poner a prueba a los que habitan en la tierra.
  revised_footnotes:
