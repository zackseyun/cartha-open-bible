revisions:
- from: Porque has guardado mi palabra de paciencia[a], yo también te guardaré de la hora de la prueba que está por venir sobre el mundo habitado entero[b], para probar a los que habitan sobre la tierra.
  to: Porque has guardado mi palabra de perseverancia[a], yo también te guardaré de la hora de la prueba que está por venir sobre todo el mundo habitado[b], para poner a prueba a los que habitan en la tierra.
  rationale: 'Se revisa principalmente para mejorar la fidelidad semántica y la naturalidad del español: ὑπομονή se vierte mejor como ''perseverancia'' que como ''paciencia'' en este contexto; ''todo el mundo habitado'' fluye mejor que ''el mundo habitado entero''; y ''poner a prueba'' refuerza el vínculo con ''prueba''. Se mantiene la tensión teológica de τηρήσω ἐκ y la ambigüedad del genitivo mediante notas.'
  reviewer_model: gpt-5.4
