    reason: lexical_alternative
  - marker: b
    text: 'O: «te preservaré durante la hora de la prueba» o «te guardaré fuera de la hora de la prueba». El griego dice «guardar... de» y no define por sí mismo cómo ocurre esa protección.'
    reason: alternative_reading
  revision_rationale: 'Se revisa principalmente para mejorar la fidelidad semántica y la naturalidad del español: ὑπομονή se vierte mejor como ''perseverancia'' que como ''paciencia'' en este contexto; ''todo el mundo habitado'' fluye mejor que ''el mundo habitado entero''; y ''poner a prueba'' refuerza el vínculo con ''prueba''. Se mantiene la tensión teológica de τηρήσω ἐκ y la ambigüedad del genitivo mediante notas.'
