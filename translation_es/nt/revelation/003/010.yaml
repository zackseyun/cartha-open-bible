translation:
  language: es
  text: Porque has guardado mi palabra de perseverancia[a], yo también te guardaré de la hora de la prueba que está por venir sobre todo el mundo habitado[b], para poner a prueba a los que habitan en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la palabra acerca de mi perseverancia» o «mi mensaje que llama a perseverar». La frase griega admite más de una comprensión estrechamente relacionada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te preservaré durante la hora de la prueba» o «te guardaré fuera de la hora de la prueba». El griego dice «guardar... de» y no define por sí mismo cómo ocurre esa protección.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐτήρησας
  english_pob_choice: have kept
  chosen_spanish: has guardado
  alternatives_spanish:
  - has observado
  - has custodido
  lexicon: BDAG
  rationale: τηρέω expresa guardar, observar o custodiar. «Has guardado» conserva el paralelo verbal con τηρήσω y funciona naturalmente en español después de «Porque» para una acción cumplida con relevancia presente.
- source_word: τὸν λόγον τῆς ὑπομονῆς μου
  english_pob_choice: my word of endurance
  chosen_spanish: mi palabra de paciencia
  alternatives_spanish:
  - mi palabra de perseverancia
  - la palabra acerca de mi paciencia
  - mi mensaje que llama a perseverar
  lexicon: BDAG
  rationale: 'El genitivo admite una ambigüedad cercana: palabra caracterizada por paciencia/perseverancia, palabra sobre la paciencia de Cristo, o palabra que llama a perseverar. «Mi palabra de paciencia» mantiene esa tensión sin resolverla demasiado; «paciencia» es una opción española natural y bíblica, aunque «perseverancia» también sería posible.'
- source_word: κἀγώ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - y yo
  - yo a mi vez
  lexicon: BDAG
  rationale: 'Expresa la reciprocidad enfática del griego: así como ellos guardaron, él también los guardará. «Yo también» suena claro y conserva el énfasis.'
- source_word: τηρήσω ἐκ
  english_pob_choice: will keep you from
  chosen_spanish: te guardaré de
  alternatives_spanish:
  - te guardaré fuera de
  - te preservaré durante
  lexicon: BDAG
  rationale: «Guardar de» reproduce de cerca τηρέω + ἐκ sin decidir la cuestión escatológica debatida. «De» es la preposición más directa en español; las alternativas en nota preservan otras lecturas posibles.
- source_word: ὥρας
  english_pob_choice: hour
  chosen_spanish: hora
  alternatives_spanish:
  - tiempo
  - periodo
  lexicon: BDAG
  rationale: Se conserva «hora» por fidelidad al término apocalíptico griego, aunque en español puede implicar un lapso más amplio que sesenta minutos.
- source_word: πειρασμοῦ
  english_pob_choice: testing
  chosen_spanish: prueba
  alternatives_spanish:
  - prueba de examen
  - tentación
  - tribulación
  lexicon: BDAG
  rationale: πειρασμός puede significar prueba, tentación o prueba/examen. Aquí «prueba» es amplio y menos engañoso que «tentación»; además armoniza con el infinitivo final de probar.
- source_word: τῆς μελλούσης ἔρχεσθαι
  english_pob_choice: that is about to come
  chosen_spanish: que está por venir
  alternatives_spanish:
  - que va a venir
  - que está a punto de venir
  lexicon: BDAG
  rationale: μέλλω + infinitivo suele indicar proximidad/futuridad. «Está por venir» preserva ese matiz de inminencia de forma natural en español.
- source_word: ἐπὶ τῆς οἰκουμένης ὅλης
  english_pob_choice: upon the whole inhabited world
  chosen_spanish: sobre el mundo habitado entero
  alternatives_spanish:
  - sobre la tierra habitada entera
  - sobre todo el mundo habitado
  lexicon: BDAG
  rationale: οἰκουμένη alude al mundo habitado, no meramente al planeta como objeto físico. «Mundo habitado» preserva ese matiz; «entero» refleja ὅλης.
- source_word: πειράσαι
  english_pob_choice: to test
  chosen_spanish: para probar
  alternatives_spanish:
  - para examinar
  - para tentar
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Probar» mantiene la conexión con πειρασμός y evita el sentido más estrecho de «tentar».
- source_word: τοὺς κατοικοῦντας ἐπὶ τῆς γῆς
  english_pob_choice: those who dwell on the earth
  chosen_spanish: a los que habitan sobre la tierra
  alternatives_spanish:
  - a los que moran en la tierra
  - a los habitantes de la tierra
  lexicon: BDAG
  rationale: La expresión recurrente de Apocalipsis conserva mejor su fuerza verbal con «los que habitan sobre la tierra». «Sobre la tierra» sigue de cerca ἐπὶ τῆς γῆς y mantiene la resonancia intertextual.
theological_decisions:
- issue: Sentido de τηρήσω ἐκ en contexto escatológico
  english_pob_reading: will keep you from
  chosen_spanish_reading: te guardaré de
  alternative_spanish_readings:
  - te preservaré durante
  - te guardaré fuera de
  rationale: La traducción sigue la equivalencia más directa de τηρέω + ἐκ sin decidir si la protección implica remoción previa, preservación durante la prueba o exención de su efecto. Se conserva así la tensión teológica presente en el griego.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Ambigüedad del genitivo en τὸν λόγον τῆς ὑπομονῆς μου
  english_pob_reading: my word of endurance
  chosen_spanish_reading: mi palabra de paciencia
  alternative_spanish_readings:
  - la palabra acerca de mi paciencia
  - mi palabra que llama a perseverar
  rationale: El genitivo permite varios sentidos muy cercanos. La lectura española mantiene la ambigüedad sin cerrarla prematuramente, respetando el alcance semántico del original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el análisis y la versión auditada en inglés; no se registran revisiones aplicadas en la fuente de trabajo más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se usó «mundo habitado» para οἰκουμένη y «tierra» para γῆ, preservando la distinción léxica del griego.
  - Se prefirió «guardar» para τηρέω a fin de mantener el vínculo verbal entre ἐτήρησας y τηρήσω.
  - Se eligió «prueba» para πειρασμός para no reducirlo a «tentación» en un contexto de alcance global.
