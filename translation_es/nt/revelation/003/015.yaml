translation:
  language: es
  text: 'Conozco tus obras: no eres ni frío ni ardiente[a]. ¡Ojalá fueras frío o ardiente!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¡Si tan solo fueras frío o ardiente!»
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδά
  english_pob_choice: I know
  chosen_spanish: Conozco
  alternatives_spanish:
  - Sé
  - Estoy al tanto de
  lexicon: οἶδα
  rationale: οἶδα expresa conocimiento pleno y evaluativo; en español, «conozco» suena natural en una reprensión dirigida y conserva el tono personal mejor que una calca más rígida.
- source_word: τὰ ἔργα
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus obras realizadas
  - lo que haces
  lexicon: ἔργον
  rationale: «Obras» conserva la continuidad léxica y el peso moral de ἔργα en Apocalipsis; «tus obras» mantiene el posesivo directo del original.
- source_word: ψυχρὸς
  english_pob_choice: cold
  chosen_spanish: frío
  alternatives_spanish:
  - fresco
  - helado
  lexicon: ψυχρός
  rationale: El contraste térmico debe mantenerse de modo literal. «Frío» es el equivalente natural en español y preserva la imagen sin interpretarla.
- source_word: ζεστός
  english_pob_choice: hot
  chosen_spanish: caliente
  alternatives_spanish:
  - caluroso
  - ardiente
  lexicon: ζεστός
  rationale: «Caliente» corresponde al contraste directo con «frío» y reproduce el paralelismo semántico del griego sin añadir matices interpretativos.
- source_word: ὄφελον
  english_pob_choice: I wish that
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - Quisiera que
  - Si tan solo
  lexicon: ὄφελον
  rationale: ὄφελον introduce un deseo contrario a la realidad presente. «¡Ojalá!» comunica esa fuerza desiderativa de forma idiomática y solemne en español.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  lexicon: ἤ
  rationale: La disyunción simple se expresa de manera directa con «o», que reproduce el contraste del original sin sobrecargar la frase.
theological_decisions:
- issue: Sentido de la metáfora de temperatura ('frío' y 'caliente')
  english_pob_reading: Retain the literal metaphor in the main text without interpreting it as spiritually hostile versus spiritually zealous.
  chosen_spanish_reading: Mantener la metáfora literal en el texto principal, sin decidir si «frío» y «caliente» codifican indiferencia, rechazo o fervor espiritual.
  alternative_spanish_readings:
  - '''frío'' = espiritualmente indiferente / no creyente; ''caliente'' = espiritualmente fervoroso'
  - '''frío'' = refrescante/beneficioso; ''caliente'' = terapéuticamente beneficioso'
  rationale: El verso presenta una oposición metafórica, pero no la explica. La traducción conserva la tensión teológica y evita imponer una clave interpretativa que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por eso se mantiene la decisión de conservar el contraste literal y la formulación desiderativa breve en el texto principal.
  spanish_consistency_notes:
  - Se mantiene el paralelismo «frío / caliente» para reflejar ψυχρός / ζεστός con consistencia léxica.
  - «Obras» traduce ἔργα de manera estable con el uso auditado de la POB en contextos evaluativos.
  - No se introduce lenguaje eclesiástico tradicional adicional ni se explica la metáfora en el cuerpo del texto.
