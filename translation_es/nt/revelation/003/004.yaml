translation:
  language: es
  text: Pero tienes unos pocos nombres en Sardis[a] que no han manchado sus vestiduras[b], y andarán conmigo de blanco[c], porque son dignos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'unas pocas personas'. El griego dice literalmente 'unos pocos nombres'.
    reason: lexical_alternative
  - marker: b
    text: O 'no han mancillado sus vestiduras'.
    reason: lexical_alternative
  - marker: c
    text: 'Es decir, probablemente ''vestiduras blancas''; el griego es conciso: ''de blanco''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Marca un contraste fuerte con la reprensión anterior; 'Pero' es el adversativo más natural y breve en español.
- source_word: ἔχεις
  english_pob_choice: you have
  chosen_spanish: tienes
  alternatives_spanish:
  - posees
  - hay en ti
  lexicon: BDAG
  rationale: Conserva el trato directo en segunda persona singular y suena natural en español contemporáneo.
- source_word: ὀλίγα ὀνόματα
  english_pob_choice: a few names
  chosen_spanish: unos pocos nombres
  alternatives_spanish:
  - unas pocas personas
  - unos pocos individuos
  lexicon: BDAG
  rationale: Se mantiene el giro literal 'nombres' para respetar la metonimia del griego y su posible énfasis en individuos reconocibles; 'unos pocos' refleja ὀλίγα sin sobreexplicar.
- source_word: ἐν Σάρδεσιν
  english_pob_choice: in Sardis
  chosen_spanish: en Sardis
  lexicon: BDAG
  rationale: Traslada la localización de manera directa y estándar.
- source_word: οὐκ ἐμόλυναν
  english_pob_choice: have not soiled
  chosen_spanish: no han manchado
  alternatives_spanish:
  - no han contaminado
  - no han defraudado
  lexicon: BDAG
  rationale: μολύνω puede expresar manchar/contaminar/defilar. 'Manchado' conserva la imagen de la vestidura y es idiomático en español; 'defilado' sería más ritual y se reserva como alternativa.
- source_word: τὰ ἱμάτια αὐτῶν
  english_pob_choice: their garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus vestiduras
  - sus ropas
  lexicon: BDAG
  rationale: '''Vestidos'' comunica bien la imagen sin sonar demasiado técnico; mantiene el campo semántico de ropa/vestidura propio del pasaje.'
- source_word: περιπατήσουσιν
  english_pob_choice: they will walk
  chosen_spanish: andarán
  alternatives_spanish:
  - caminarán
  - andarán andando
  lexicon: BDAG
  rationale: Preserva el verbo de movimiento literal que en Apocalipsis también tiene valor figurado de compañerismo y vida delante de Cristo.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  lexicon: BDAG
  rationale: Expresa acompañamiento personal de forma natural y directa.
- source_word: ἐν λευκοῖς
  english_pob_choice: in white
  chosen_spanish: en blanco
  alternatives_spanish:
  - vestidos de blanco
  - con vestidos blancos
  lexicon: BDAG
  rationale: Sigue de cerca la concisión griega; 'en blanco' preserva la brevedad simbólica, aunque la nota aclara la probable elipsis de 'vestidos'.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce de forma clara la razón de la promesa en español actual.
- source_word: ἄξιοί εἰσιν
  english_pob_choice: they are worthy
  chosen_spanish: son dignos
  alternatives_spanish:
  - son merecedores
  - son dignos de ello
  lexicon: BDAG
  rationale: '''Dignos'' reproduce con fidelidad ἄξιος sin añadir matices soteriológicos ajenos; en español suena solemne y exacto.'
theological_decisions:
- issue: 'Valor de ὀνόματα: literalidad frente a sentido personal'
  english_pob_reading: Retain 'a few names' in the main text
  chosen_spanish_reading: Mantener 'unos pocos nombres' en el texto principal
  alternative_spanish_readings:
  - unas pocas personas
  - unos pocos individuos
  rationale: El griego dice literalmente 'nombres', y la frase puede subrayar identidad individual y reconocimiento. En español, conservarlo evita suavizar una imagen deliberada del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Imagen de pureza en τα ἱμάτια / μολύνω
  english_pob_reading: '''have not soiled their garments'''
  chosen_spanish_reading: '''no han manchado sus vestidos'''
  alternative_spanish_readings:
  - no han defilado sus vestidos
  - no han contaminado sus vestidos
  rationale: '''Manchado'' conserva la metáfora visible de ropa ensuciada y es comprensible; no elimina la tensión simbólica de pureza/contaminación que el texto presenta.'
  doctrine_reference: Translation philosophy §6
- issue: 'Sentido de ἐν λευκοῖς: elipsis y simbolismo'
  english_pob_reading: 'likely ''in white garments''; the Greek is concise: ''in white'''
  chosen_spanish_reading: Traducir 'en blanco' y dejar la concisión visible
  alternative_spanish_readings:
  - vestidos de blanco
  - con vestiduras blancas
  rationale: La brevedad del griego merece preservarse; el color blanco en Apocalipsis conserva fuerza simbólica sin que sea necesario expandirlo en el cuerpo del texto.
  doctrine_reference: Translation philosophy §3, §5
- issue: 'ἄξιοί εἰσιν: dignidad y posible mérito'
  english_pob_reading: they are worthy
  chosen_spanish_reading: son dignos
  alternative_spanish_readings:
  - son merecedores
  - son aptos
  rationale: La traducción no debe diluir la afirmación de worthiness ni convertirla en una explicación doctrinal. 'Dignos' mantiene la afirmación textual, ligada al contexto inmediato de fidelidad.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios respecto al análisis inglés auditado; se mantiene la equivalencia óptima y la concisión de ἐν λευκοῖς.'
  spanish_consistency_notes:
  - Se mantiene 'Sardis' sin castellanizar el topónimo, por coherencia bíblica y auditabilidad.
  - '''Vestidos'' se usa de modo consistente con el campo semántico de ἱμάτια y con la nota que aclara la posible elipsis de ''blancos''.'
  - '''Dignos'' conserva la fuerza evaluativa de ἄξιος sin introducir lenguaje de mérito ajeno al contexto inmediato.'
