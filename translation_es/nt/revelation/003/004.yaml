revisions:
- from: Pero tienes unos pocos nombres en Sardis[a] que no han manchado sus vestidos[b], y andarán conmigo en blanco[c], porque son dignos.
  to: Pero tienes unos pocos nombres en Sardis[a] que no han manchado sus vestiduras[b], y andarán conmigo de blanco[c], porque son dignos.
  rationale: 'Se hicieron reparaciones menores para mejorar fidelidad estilística y español natural sin apartarse del griego ni de la auditoría inglesa: ''vestiduras'' eleva el registro y evita la ambigüedad de ''vestidos''; ''de blanco'' mantiene la elipsis de ἐν λευκοῖς pero suena idiomático en español; y la nota b corrige un término español incorrecto.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: conserva el contraste de ἀλλὰ, mantiene la literalidad de ὀλίγα ὀνόματα como ''unos pocos nombres'', refleja μολύνω con una imagen de mancha en la ropa, preserva el futuro de περιπατήσουσιν y traduce ἄξιοί εἰσιν como ''son dignos''. Sin embargo, hay pequeños problemas de naturalidad y exactitud léxica en español, especialmente en ''en blanco'' y en una nota con ''defilado''.'
  spanish_quality_summary: 'El texto principal es claro y digno, pero ''andarán conmigo en blanco'' suena algo extraño en español e induce más fácilmente la idea de color abstracto que la elipsis de vestiduras. ''De blanco'' conserva mejor la concisión y el sentido idiomático. Además, ''vestidos'' es comprensible, pero ''vestiduras'' armoniza mejor con el registro simbólico de Apocalipsis. La nota b contiene un español incorrecto: ''defilado'' debe ser ''contaminado'' o ''mancillado''; si se quiere reflejar el matiz ritual, ''mancillado'' funciona mejor.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión de mantener ''nombres'' está alineada con la auditoría inglesa. ''Dignos'' también está bien alineado. La mejora principal es estilística/lexical: preferir ''vestiduras'' por el registro y ''de blanco'' por idiomaticidad española, sin perder la concisión documentada para ἐν λευκοῖς.'
  issues:
  - severity: medium
    issue: La expresión 'en blanco' en el texto principal suena poco idiomática en español para personas que caminan con Cristo.
    rationale: Aunque calca de cerca el inglés 'in white' y la concisión griega, el español natural para vestimenta es 'de blanco'. Esto preserva elipsis y simbolismo sin sonar forzado ni ambiguo.
  - severity: medium
    issue: La nota b usa 'defilado', forma incorrecta/no idiomática en español.
    rationale: El equivalente español esperado para un matiz ritual sería 'mancillado' o 'contaminado', no 'defilado'. La nota actual perjudica la calidad del español.
  - severity: low
    issue: '''Vestidos'' es entendible, pero ''vestiduras'' encaja mejor con el tono elevado y simbólico de Apocalipsis.'
    rationale: ἱμάτια es amplio, y el POB inglés eligió 'garments' por su registro. 'Vestiduras' reproduce mejor ese nivel que 'vestidos', que en varios contextos hispanos se asocia más específicamente a vestidos femeninos.
  revised_spanish_text: Pero tienes unos pocos nombres en Sardis[a] que no han manchado sus vestiduras[b], y andarán conmigo de blanco[c], porque son dignos.
  revised_footnotes:
  - marker: a
    text: O 'unas pocas personas'. El griego dice literalmente 'unos pocos nombres'.
    reason: lexical_alternative
  - marker: b
    text: O 'no han mancillado sus vestiduras'.
    reason: lexical_alternative
  - marker: c
    text: 'Es decir, probablemente ''vestiduras blancas''; el griego es conciso: ''de blanco''.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar fidelidad estilística y español natural sin apartarse del griego ni de la auditoría inglesa: ''vestiduras'' eleva el registro y evita la ambigüedad de ''vestidos''; ''de blanco'' mantiene la elipsis de ἐν λευκοῖς pero suena idiomático en español; y la nota b corrige un término español incorrecto.'
