review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite con fidelidad el sentido del griego: exhortación singular representativa, contenido introducido por «lo que», referencia contextual al Espíritu Santo, y destinatario «a las iglesias». Sin embargo, la distribución de notas no sigue bien la evidencia auditada: la nota inglesa sobre la alternativa completa «Whoever has an ear, let him hear» debe anclarse a la primera frase, no solo a «oiga», y falta una nota para explicar que «el Espíritu» traduce literalmente «el espíritu» con referente entendido como el Espíritu Santo.'
  spanish_quality_summary: El español es claro, natural y digno. «El que tiene oído, oiga…» suena idiomático y bíblicamente legible. La única mejora necesaria es ajustar las notas para reflejar mejor las decisiones léxicas y evitar desalineación con el rastro de auditoría inglés.
  glossary_alignment: 'Alineado con la terminología del proyecto: πνεῦμα como «Espíritu» por contexto; ἐκκλησίαις como «iglesias»; no hay conflictos con Yahvé/Mesías u otros términos de glosario. La capitalización de «Espíritu» está bien, pero conviene documentar en nota la literalidad griega «el espíritu».'
  issues:
  - severity: medium
    issue: Falta una nota sobre «el Espíritu» frente a griego «el espíritu».
    rationale: El English POB conserva una nota léxica que aclara que el griego dice literalmente «the spirit» y que el referente se entiende como el Espíritu Santo. El español capitaliza correctamente por contexto, pero debería preservar esa aclaración auditada.
  - severity: low
    issue: La nota alternativa «O «quien tiene oído, oiga»» está anclada solo a «oiga».
    rationale: La alternativa afecta a toda la construcción «El que tiene oído, oiga», no solo al verbo final. Conviene mover el ancla al inicio de la frase para que la nota corresponda exactamente al segmento alternativo.
  revised_spanish_text: El que[a] tiene oído, oiga lo que el Espíritu[b] dice a las iglesias.
