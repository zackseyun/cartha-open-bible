translation:
  language: es
  text: El que[a] tiene oído, oiga lo que el Espíritu[b] dice a las iglesias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Quien tiene oído, oiga».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el espíritu»; aquí se entiende que el referente es el Espíritu Santo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - El que tenga
  - Quien tiene
  - Quien tenga
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva y expresa una invitación general y representativa. «El que tiene» conserva esa forma singular en español natural, sin volver la frase más abstracta de lo que exige el griego.
- source_word: οὖς
  english_pob_choice: an ear
  chosen_spanish: oído
  alternatives_spanish:
  - oídos
  - un oído
  lexicon: BDAG
  rationale: Aunque el griego usa singular, en español la expresión idiomática más natural y fiel es «tener oído». Mantiene la imagen de capacidad de oír sin sonar forzada.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  - oiga atentamente
  lexicon: BDAG
  rationale: El aoristo imperativo de tercera persona singular funciona como exhortación. «Oiga» conserva el mandato exhortativo en un español breve y digno; «escuche» sería posible, pero aquí «oiga» preserva mejor la formulación tradicional y el paralelo formal con el griego.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En esta fórmula recurrente de Apocalipsis, el referente es el Espíritu Santo. Se capitaliza en español para señalar ese referente teológico sin añadir contenido ajeno al contexto.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - habla
  lexicon: BDAG
  rationale: «Dice» reproduce de manera directa el presente de λέγω en una fórmula fija y natural en español.
- source_word: ταῖς ἐκκλησίαις
  english_pob_choice: to the churches
  chosen_spanish: a las iglesias
  alternatives_spanish:
  - a las congregaciones
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con «a». «Iglesias» es el equivalente habitual y apropiado en el contexto de Apocalipsis 2–3; «congregaciones» es posible, pero menos estable en este pasaje.
theological_decisions:
- issue: Forma exhortativa de tercera persona singular
  english_pob_reading: let him hear
  chosen_spanish_reading: oiga
  alternative_spanish_readings:
  - que oiga
  - oigan
  rationale: El griego conserva singular masculino con valor representativo. En español, «oiga» mantiene la fuerza imperativa sin neutralizar indebidamente la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Identificación de τὸ πνεῦμα
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el espíritu
  rationale: En la serie de exhortaciones a las iglesias, el referente es el Espíritu Santo. La mayúscula en español ayuda a comunicar esa identificación contextual sin alterar el texto base.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, punto 1
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje base; la redacción española sigue de cerca el texto griego y armoniza con la decisión auditada del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene el patrón exhortativo breve y formulaico propio de Apocalipsis 2–3.
  - Se usa «iglesias» de manera consistente con el contexto canónico de las cartas a las siete iglesias.
  - Se capitaliza «Espíritu» para reflejar el referente teológico documentado en la auditoría inglesa.
