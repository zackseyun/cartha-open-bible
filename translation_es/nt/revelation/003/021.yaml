base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/021.yaml
  text: The one who conquers—I will grant him to sit with me on my throne[b][a], just as I also conquered and sat down with my Father on his throne.
  footnotes:
  - marker: a
    text: Or 'The one who overcomes.' The Greek verb νικάω is repeated twice in this verse; 'conquers' was chosen to preserve the victory motif consistently.
    reason: lexical_alternative
  - marker: b
    text: 'The masculine singular (''him'') is representative: the promise is to every believer who conquers.'
    reason: lexical_alternative
