translation:
  language: es
  text: El que vence[a], le[b] concederé sentarse conmigo en mi trono, así como yo también vencí y me senté con mi Padre en su trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que conquista». El verbo griego νικάω aparece dos veces en este versículo; «vence» conserva de manera coherente el motivo de la victoria.'
    reason: lexical_alternative
  - marker: b
    text: 'El masculino singular («le») es representativo: la promesa se dirige a todo creyente que vence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νικῶν
  english_pob_choice: The one who conquers
  chosen_spanish: El que vence
  alternatives_spanish:
  - El que conquista
  - El vencedor
  - El que vence y prevalece
  lexicon: BDAG
  rationale: 'El participio presente sustantivado se expresa naturalmente con una relativa: «el que vence». Mantiene el motivo repetido de νικάω en el versículo sin introducir un giro más interpretativo como «vence y prevalece». «Conquista» es posible, pero en español suele sonar más bélico y menos fluido aquí.'
- source_word: δώσω
  english_pob_choice: I will grant
  chosen_spanish: le daré
  alternatives_spanish:
  - le concederé
  - le otorgaré
  - le daré como don
  lexicon: BDAG
  rationale: δώσω con infinitivo expresa la concesión de un privilegio. En español, «daré» conserva la forma simple y directa del texto, mientras que «concederé» o «otorgaré» explicitan el matiz de privilegio pero son más marcados. Se mantiene la naturalidad sin perder la idea de concesión.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a esa persona
  - le
  lexicon: BDAG
  rationale: El dativo singular masculino funciona de modo representativo. En español, el clítico dativo «le» preserva la referencia personal sin forzar una repetición pesada. El referente es masculino gramaticalmente en la forma del griego, con fuerza representativa para todo vencedor.
- source_word: καθίσαι
  english_pob_choice: to sit
  chosen_spanish: sentarse
  alternatives_spanish:
  - sentarse
  - tomar asiento
  - sentarse a
  lexicon: BDAG
  rationale: 'El infinitivo aoristo tras «dar» se vierte con un infinitivo pronominal natural en español: «sentarse». Conserva la acción de ocupar asiento sin sobrecargar el enunciado con una traducción más literal y menos idiomática.'
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo
  - junto a mí
  - en compañía mía
  lexicon: BDAG
  rationale: La preposición con genitivo indica asociación. «Conmigo» es la forma más natural y conserva la cercanía personal prometida.
- source_word: ἐν τῷ θρόνῳ μου
  english_pob_choice: on my throne
  chosen_spanish: en mi trono
  alternatives_spanish:
  - sobre mi trono
  - en mi trono
  lexicon: BDAG
  rationale: Aunque el inglés eligió «on my throne» por idiomática entronización, el griego usa ἐν. En español, «en mi trono» mantiene con más fidelidad la construcción preposicional del original y sigue siendo comprensible en lenguaje de realeza/entronización. Se evita imponer «sobre» sin necesidad textual.
- source_word: ὡς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - así como
  - tal como
  - como
  lexicon: BDAG
  rationale: La comparación entre la promesa al vencedor y la propia victoria y entronización de Jesús se expresa con «así como», que comunica con claridad el paralelismo comparativo.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - yo también
  - también yo
  - y yo también
  lexicon: BDAG
  rationale: κἀγώ compacta el pronombre y el aditivo καί. «Yo también» conserva ambos elementos en español con naturalidad.
- source_word: ἐνίκησα
  english_pob_choice: conquered
  chosen_spanish: vencí
  alternatives_spanish:
  - conquisté
  - vencí
  - triunfé
  lexicon: BDAG
  rationale: Se mantiene la raíz verbal de victoria con «vencí», para sostener la repetición temática con «el que vence». «Conquisté» es posible, pero en español puede sonar demasiado militar; «triunfé» desplaza un poco el tono de combate.
- source_word: ἐκάθισα
  english_pob_choice: sat down
  chosen_spanish: me senté
  alternatives_spanish:
  - me senté
  - tomé asiento
  - me senté junto
  lexicon: BDAG
  rationale: El aoristo indica una acción completada. «Me senté» reproduce el movimiento de entronización de manera natural en español; «tomé asiento» añade cierta formalidad no exigida por el texto.
- source_word: μετὰ τοῦ πατρός μου
  english_pob_choice: with my Father
  chosen_spanish: con mi Padre
  alternatives_spanish:
  - con mi Padre
  - junto a mi Padre
  - al lado de mi Padre
  lexicon: BDAG
  rationale: La relación asociativa con el Padre se expresa de manera directa. «Mi Padre» preserva la relación filial central del versículo.
- source_word: ἐν τῷ θρόνῳ αὐτοῦ
  english_pob_choice: on his throne
  chosen_spanish: en su trono
  alternatives_spanish:
  - sobre su trono
  - en su trono
  lexicon: BDAG
  rationale: Se conserva la misma construcción que en la primera cláusula para mantener paralelismo y fidelidad al griego. «En su trono» reproduce el texto sin imponer la idiomaticidad inglesa de «on».
theological_decisions:
- issue: Sujeto masculino singular representativo en la promesa al vencedor
  english_pob_reading: Retain masculine singular ('him') in the main text
  chosen_spanish_reading: Mantener «le» en el texto principal y explicar su valor representativo en nota
  alternative_spanish_readings:
  - lo
  - a esa persona
  - les
  rationale: El griego usa participio y pronombre masculinos singulares. En español, el clítico «le» preserva el referente personal sin forzar un género inclusivo que no está en la forma griega. La nota aclara que es representativo para todo el que vence, sin alterar el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Paralelismo entre el trono del vencedor y el trono del Hijo con el Padre
  english_pob_reading: Render the parallel straightforwardly without softening or expanding it
  chosen_spanish_reading: Conservar el paralelismo directo entre «mi trono» y «su trono»
  alternative_spanish_readings:
  - explicar simbólicamente la sesión
  - añadir una glosa doctrinal en el texto
  - suavizar la imagen de entronización
  rationale: El texto presenta una promesa real de participación con el vencedor y una comparación con la propia entronización de Jesús junto al Padre. La traducción debe dejar intacta esa fuerza comparativa y no introducir aclaraciones doctrinales dentro del versículo.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del inglés POB: no se registraron cambios aplicados y el control cruzado informó alto acuerdo. La redacción española sigue esa estabilidad y mantiene las decisiones léxicas clave de victoria, concesión y entronización sin añadir paráfrasis.'
  spanish_consistency_notes:
  - Se preserva la repetición de la raíz de victoria con «vence / vencí».
  - Se mantiene la correlación de tronos en ambas cláusulas para reflejar el paralelismo del griego.
  - Se optó por «en mi trono» y «en su trono» para respetar la sintaxis griega, aunque el inglés emplea «on» por idiomatismo.
  - El registro es moderno y reverente, sin recurrir a «SEÑOR» como máscara para el nombre divino, que aquí no aparece.
