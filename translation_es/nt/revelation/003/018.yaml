translation:
  language: es
  text: Te aconsejo que compres de mí oro refinado por fuego[a], para que te hagas rico, y vestiduras blancas[b], para que te vistas y no quede expuesta la vergüenza de tu desnudez; y colirio[c] para ungir tus ojos, para que veas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «purificado por fuego» o «probado por fuego».
    reason: lexical_alternative
  - marker: b
    text: O «ropa blanca» o, en algunos contextos, más específicamente, «ropas blancas».
    reason: lexical_alternative
  - marker: c
    text: Término medicinal para una preparación aplicada a los ojos.
    reason: cultural_note
lexical_decisions:
- source_word: συμβουλεύω
  english_pob_choice: I counsel
  chosen_spanish: te aconsejo
  alternatives_spanish:
  - te recomiendo
  - te doy consejo
  lexicon: BDAG
  rationale: συμβουλεύω expresa una exhortación con autoridad; «aconsejo» conserva ese peso sin sonar forzado en español.
- source_word: ἀγοράσαι
  english_pob_choice: to buy
  chosen_spanish: compres
  alternatives_spanish:
  - compres para ti
  - adquieras
  lexicon: BDAG
  rationale: 'El infinitivo aoristo tras συμβουλεύω se vierte naturalmente con subjuntivo exhortativo en español: «que compres».'
- source_word: παρ’ ἐμοῦ
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi parte
  - de mi mano
  lexicon: BDAG
  rationale: παρά con genitivo indica procedencia; «de mí» es directo y fiel.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro puro
  lexicon: BDAG
  rationale: «Oro» es el equivalente natural en español; no se añade precisión que el griego no exige aquí.
- source_word: πεπυρωμένον ἐκ πυρός
  english_pob_choice: refined by fire
  chosen_spanish: refinado por fuego
  alternatives_spanish:
  - purificado por fuego
  - probado por fuego
  lexicon: BDAG
  rationale: El participio perfecto pasivo con ἐκ πυρός transmite metal sometido a fuego; «refinado por fuego» conserva la imagen metalúrgica sin sobreexplicar.
- source_word: ἵνα πλουτήσῃς
  english_pob_choice: so that you may become rich
  chosen_spanish: para que te hagas rico
  alternatives_spanish:
  - para que seas rico
  - para que te enriquecas
  lexicon: BDAG
  rationale: La forma aorística subjuntiva sugiere entrar en ese estado; «te hagas rico» refleja bien ese matiz ingresivo.
- source_word: ἱμάτια λευκὰ
  english_pob_choice: white garments
  chosen_spanish: vestiduras blancas
  alternatives_spanish:
  - ropas blancas
  - ropa blanca
  - vestidos blancos
  lexicon: BDAG
  rationale: ἱμάτια es un término amplio para prendas; «vestiduras» mantiene un registro digno y acorde con el lenguaje apocalíptico.
- source_word: ἵνα περιβάλῃ
  english_pob_choice: so that you may clothe yourself
  chosen_spanish: para que te vistas
  alternatives_spanish:
  - para que te cubras
  - para que te pongas
  lexicon: BDAG
  rationale: El verbo medio se expresa con un reflexivo natural en español. «Te vistas» conserva la idea de apropiarse de las vestiduras.
- source_word: μὴ φανερωθῇ
  english_pob_choice: may not be exposed
  chosen_spanish: no se haga manifiesta
  alternatives_spanish:
  - no sea expuesta
  - no quede al descubierto
  lexicon: BDAG
  rationale: En el contexto de vergüenza y desnudez, «se haga manifiesta» reproduce el pasivo sin perder naturalidad. También mantiene abierta la tensión entre revelar y exponer.
- source_word: ἡ αἰσχύνη τῆς γυμνότητός σου
  english_pob_choice: the shame of your nakedness
  chosen_spanish: la vergüenza de tu desnudez
  alternatives_spanish:
  - el oprobio de tu desnudez
  lexicon: BDAG
  rationale: «Vergüenza» es el equivalente más directo de αἰσχύνη en este contexto moral-simbólico; «desnudez» traduce γυμνότης sin suavizar el impacto.
- source_word: κολλούριον
  english_pob_choice: eye salve
  chosen_spanish: colirio
  alternatives_spanish:
  - ungüento para los ojos
  - pomada para los ojos
  lexicon: BDAG
  rationale: κολλούριον es un término medicinal para preparación ocular; «colirio» es preciso en español y comunica su naturaleza terapéutica.
- source_word: ἐγχρῖσαι
  english_pob_choice: to anoint
  chosen_spanish: ungir
  alternatives_spanish:
  - aplicar
  - untar
  lexicon: BDAG
  rationale: El infinitivo aoristo significa aplicar frotando o ungir; «ungir» conserva la fuerza verbal y el eco corporal sin convertirlo en un rito.
- source_word: βλέπῃς
  english_pob_choice: so that you may see
  chosen_spanish: para que veas
  alternatives_spanish:
  - para que puedas ver
  - para que recuperes la vista
  lexicon: BDAG
  rationale: «Veas» es el equivalente más directo y no añade la idea de recuperación, ausente en el griego.
theological_decisions:
- issue: Commodities as simbología espiritual
  english_pob_reading: Retain the imagery literally in translation without explicating the spiritual referents in the main text.
  chosen_spanish_reading: Mantener la imaginería material sin explicitar en el texto principal sus referentes espirituales.
  alternative_spanish_readings:
  - oro como verdadera riqueza espiritual, vestiduras como justicia/pureza y colirio como percepción espiritual
  rationale: El griego presenta una exhortación metafórica sin glosa interpretativa; traducir literalmente preserva la tensión simbólica y evita introducir explicación doctrinal ajena al enunciado.
  doctrine_reference: Principio de primacía del idioma original y preservación de la tensión teológica.
- issue: Posible resonancia ritual de ἐγχρῖσαι
  english_pob_reading: Use 'anoint' lexically, without suggesting a formal sacramental act.
  chosen_spanish_reading: Usar «ungir» como equivalente léxico, sin sugerir un acto sacramental formal.
  alternative_spanish_readings:
  - aplicar
  - untar
  rationale: El verbo admite la idea de frotar/aplicar con aceite o salve; «ungir» es fiel y comprensible, y el contexto medicinal evita sobredimensionarlo litúrgicamente.
  doctrine_reference: No importar prácticas o doctrinas que el texto no afirma.
translation_notes:
  revision_awareness: El paquete de auditoría en inglés muestra alta concordancia y ningún cambio aplicado en la última revisión; esta versión española sigue de cerca esas decisiones léxicas y teológicas, ajustándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se conservó el tratamiento en segunda persona singular, coherente con el original.
  - Se mantuvo la imaginería de oro, vestiduras y colirio sin explicaciones interpretativas añadidas en el texto principal.
  - «Ungir» se emplea de manera léxica, no sacramental.
  - 'Se prefirió un registro digno y moderno: «vestiduras» en lugar de un calco más tosco.'
  - Las notas mantienen alternativas léxicas relevantes sin acumular glosas innecesarias.
