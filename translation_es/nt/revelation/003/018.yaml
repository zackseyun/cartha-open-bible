base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/018.yaml
  text: I counsel you to buy from me gold refined by fire so that you may become rich[a], and white garments so that you may clothe yourself and the shame of your nakedness may not be exposed[c][b], and eye salve to anoint your eyes so that you may see.
  footnotes:
  - marker: a
    text: Or 'purified by fire' or 'tested in fire.'
    reason: lexical_alternative
  - marker: b
    text: Or 'white clothes' or, more specifically in some contexts, 'white robes.'
    reason: lexical_alternative
  - marker: c
    text: The term rendered 'eye salve' refers to a medicinal preparation applied to the eyes.
    reason: cultural_note
