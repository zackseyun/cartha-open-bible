review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: conserva la secuencia de imperativos/exhortaciones metafóricas, mantiene ''de mí'', ''oro refinado por fuego'', ''vestiduras blancas'', la finalidad de enriquecerse, vestirse y ver, y no sobreexplica los símbolos. Sin embargo, hay pequeños desajustes frente al expediente inglés y a la naturalidad española: la nota [a] está anclada en ''oro'' cuando la alternativa corresponde a ''refinado por fuego''; la nota [b] ofrece como alternativa exactamente la misma expresión ya usada en el texto; y ''no se haga manifiesta'' es más pesado y menos ajustado al matiz contextual de ''expuesta''.'
  spanish_quality_summary: 'El español es generalmente claro y digno. ''Te aconsejo'' y ''para que te hagas rico'' funcionan bien. No obstante, conviene mejorar la fluidez y precisión en dos puntos: mover la nota [a] al sintagma correcto y sustituir ''no se haga manifiesta'' por ''no quede expuesta'', que suena más natural en español y refleja mejor el contexto de vergüenza/desnudez. También es preferible ajustar la nota [b] para que no repita la lectura principal.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El verso no contiene términos sensibles como Yahvé/Mesías/esclavo. 'Colirio' para κολλούριον y 'ungir' para ἐγχρῖσαι son defendibles y coherentes con la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'oro' en vez de en 'refinado por fuego'.
    rationale: Las alternativas 'purificado por fuego' y 'probado por fuego' corresponden al participio πεπυρωμένον ἐκ πυρός, no a χρυσίον por sí solo. El anclaje actual induce a pensar que la nota modifica 'oro'.
  - severity: medium
    issue: La nota [b] repite la misma expresión que el texto principal.
    rationale: Si el texto dice 'vestiduras blancas', la nota no debe ofrecer 'vestiduras blancas' como alternativa; debe conservar alternativas reales como 'ropa blanca' o 'ropas blancas', y opcionalmente 'túnicas blancas' o 'vestidos blancos' según contexto.
  - severity: low
    issue: '''No se haga manifiesta'' es menos natural que una opción como ''no quede expuesta''.'
    rationale: Aunque formalmente posible, suena más pesado en español actual y no expresa tan bien el matiz contextual de μὴ φανερωθῇ en relación con vergüenza y desnudez.
  revised_spanish_text: Te aconsejo que compres de mí oro refinado por fuego[a], para que te hagas rico, y vestiduras blancas[b], para que te vistas y no quede expuesta la vergüenza de tu desnudez; y colirio[c] para ungir tus ojos, para que veas.
