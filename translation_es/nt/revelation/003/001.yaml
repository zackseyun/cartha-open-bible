source:
  edition: SBLGNT
  text: Καὶ τῷ ἀγγέλῳ τῆς ἐν Σάρδεσιν ἐκκλησίας γράψον· Τάδε λέγει ὁ ἔχων τὰ ἑπτὰ πνεύματα τοῦ θεοῦ καὶ τοὺς ἑπτὰ ἀστέρας· Οἶδά σου τὰ ἔργα, ὅτι ὄνομα ἔχεις ὅτι ζῇς, καὶ νεκρὸς εἶ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/001.yaml
  text: 'And write to the angel of the church in Sardis: These things says the one who has the seven spirits of God and the seven stars: I know your works[a]; you have a name that you are alive[d][c][b], but you are dead.'
  footnotes:
  - marker: a
    text: Or 'messenger' for 'angel.' The Greek ἄγγελος can refer to either, though 'angel' fits Revelation's apocalyptic setting most naturally.
    reason: alternative_reading
  - marker: b
    text: 'Or more literally, ''These things says.'' Also possible: ''This is what ... says'' or ''Thus says.'''
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the seven spirits of God' is kept literal. It may refer symbolically to the fullness of the Holy Spirit, though some interpret it as seven heavenly spirits.
    reason: alternative_reading
  - marker: d
    text: More literally, 'you have a name that you live.' The expression means 'you have a reputation that you are alive.'
    reason: lexical_alternative
