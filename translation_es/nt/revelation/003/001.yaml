translation:
  language: es
  text: 'Y escribe al ángel[a] de la iglesia en Sardis: Así dice[b] el que tiene los siete espíritus de Dios[c] y las siete estrellas: Conozco tus obras; tienes nombre de estar vivo[d], pero estás muerto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero». El griego ἄγγελος puede referirse a un ángel o a un mensajero, aunque «ángel» encaja de manera más natural en el entorno apocalíptico de Apocalipsis.
    reason: alternative_reading
  - marker: b
    text: 'Más literalmente, «Estas cosas dice». También es posible: «Esto dice» o «Así dice».'
    reason: lexical_alternative
  - marker: c
    text: La frase «los siete espíritus de Dios» se conserva literal. Puede referirse simbólicamente a la plenitud del Espíritu Santo, aunque algunos la interpretan como siete espíritus celestiales.
    reason: alternative_reading
  - marker: d
    text: Más literalmente, «tienes un nombre de que vives». La expresión significa que tienes reputación de estar vivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλῳ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: Se mantiene el sentido principal de ἄγγελος como «ángel» en el marco apocalíptico de Apocalipsis. «Mensajero» sigue siendo posible, pero en esta fórmula de apertura no desplaza el valor más natural del término.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: Para una audiencia eclesial hispanohablante, «iglesia» comunica de modo claro y fiel la comunidad cristiana de Sardis; «asamblea» es más literal, pero menos idiomática en este contexto.
- source_word: Τάδε λέγει
  english_pob_choice: These things says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: BDAG
  rationale: La fórmula profética queda bien representada por «Así dice», que preserva el tono oracular sin el artificio de una traducción literal calcada. El valor deíctico plural de Τάδε no exige reproducirse mecánicamente en español.
- source_word: ὁ ἔχων
  english_pob_choice: the one who has
  chosen_spanish: el que tiene
  alternatives_spanish:
  - el que posee
  - el que sostiene
  lexicon: BDAG
  rationale: «El que tiene» conserva el participio sustantivado y su fuerza descriptiva de manera natural en español, siguiendo el valor del inglés auditado sin añadir interpretación.
- source_word: τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  english_pob_choice: the seven spirits of God
  chosen_spanish: los siete espíritus de Dios
  alternatives_spanish:
  - el Espíritu siete veces de Dios
  - el Espíritu de Dios en su plenitud
  lexicon: BDAG
  rationale: Se conserva la pluralidad literal de la expresión, porque el texto griego la presenta de forma explícita y la tradición POB documenta que no debe resolverse la tensión interpretativa dentro de la traducción principal.
- source_word: τοὺς ἑπτὰ ἀστέρας
  english_pob_choice: the seven stars
  chosen_spanish: las siete estrellas
  alternatives_spanish:
  - los siete astros
  lexicon: BDAG
  rationale: «Estrellas» es la equivalencia directa y más transparente para ἀστέρας; «astros» sería posible, pero menos preciso y menos concordante con el simbolismo ya establecido en Apocalipsis.
- source_word: Οἶδά
  english_pob_choice: I know
  chosen_spanish: Yo conozco
  alternatives_spanish:
  - Sé
  - Yo sé
  lexicon: BDAG
  rationale: «Yo conozco» expresa con claridad el valor perfectivo de οἶδα en este refrán epistolar y evita la ambigüedad de un simple «sé» en español. El pronombre explícito refuerza la solemnidad del juicio.
- source_word: τὰ ἔργα
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - lo que haces
  lexicon: BDAG
  rationale: «Obras» mantiene la consistencia léxica con la evaluación moral/apocalíptica del pasaje y refleja bien ἔργα. «Hechos» o una paráfrasis perderían esa resonancia técnica.
- source_word: ὄνομα ἔχεις
  english_pob_choice: you have a name
  chosen_spanish: tienes nombre
  alternatives_spanish:
  - tienes fama
  - tienes reputación
  lexicon: BDAG
  rationale: Se conserva la correspondencia más cercana con ὄνομα y con la revisión inglesa que prefirió «name» sobre «reputation». En español, la frase idiomática «tener nombre» comunica reconocimiento público sin forzar una explicación interpretativa en el cuerpo del texto.
- source_word: ζῇς
  english_pob_choice: you are alive
  chosen_spanish: de que vives
  alternatives_spanish:
  - que estás vivo
  - que tienes vida
  lexicon: BDAG
  rationale: La construcción «nombre de que vives» reproduce de forma natural el contenido indirecto de ὅτι ζῇς dentro de la expresión idiomática. «Estás vivo» sería más directo, pero rompería la fluidez de la frase hecha.
- source_word: νεκρὸς εἶ
  english_pob_choice: you are dead
  chosen_spanish: estás muerto
  alternatives_spanish:
  - eres muerto
  - estás muerto espiritualmente
  lexicon: BDAG
  rationale: «Estás muerto» conserva la contundencia del juicio final sin añadir el adverbio interpretativo «espiritualmente», que no está en el griego. La lectura metafórica queda clara por el contraste con «vives».
theological_decisions:
- issue: Significado de «los siete espíritus de Dios»
  english_pob_reading: Retain the literal phrase 'the seven spirits of God' in the main text without collapsing it into an interpretive paraphrase.
  chosen_spanish_reading: Conservar literalmente «los siete espíritus de Dios» en el texto principal.
  alternative_spanish_readings:
  - el Espíritu de Dios en su plenitud
  - los siete poderes/manifestaciones del Espíritu
  rationale: La frase griega es deliberadamente plural y teológicamente debatida. La traducción principal debe preservar esa tensión y no resolverla de antemano con una paráfrasis interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referente de «ángel»
  english_pob_reading: Translate ἀγγέλῳ as 'angel' in the main text.
  chosen_spanish_reading: Traducir ἀγγέλῳ como «ángel» en el texto principal.
  alternative_spanish_readings:
  - mensajero
  - representante de la iglesia
  rationale: El valor léxico básico y el contexto apocalíptico favorecen «ángel». Aunque el referente exacto sea debatido, la traducción no debe decidir la cuestión interpretativa en el texto principal.
  doctrine_reference: Translation philosophy §1 y §3.
- issue: Alcance de «tienes nombre de que vives»
  english_pob_reading: More literally, 'you have a name that you live.' The expression means 'you have a reputation that you are alive.'
  chosen_spanish_reading: Mantener la expresión idiomática «tienes nombre de que vives».
  alternative_spanish_readings:
  - tienes fama de estar vivo
  - tienes reputación de vivir
  rationale: La frase conserva la correspondencia cercana con el griego y deja visible la tensión entre literalidad e idiomatismo. En español, «tener nombre de» es comprensible y no borra el matiz retórico del original.
  doctrine_reference: Translation philosophy §1 y §2.
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió 'reputation' por 'name' para acercarse a ὄνομα y ajustó la puntuación de la segunda cláusula. La versión española refleja esa revisión al usar «tienes nombre» en lugar de una paráfrasis de reputación, y emplea punto y coma para separar con mayor naturalidad la evaluación del juicio final.
  spanish_consistency_notes:
  - Se mantuvo «ángel» en lugar de «mensajero» por consistencia con el patrón apocalíptico de Apocalipsis.
  - Se mantuvo «Iglesia»/«iglesia» como traducción estable de ἐκκλησία en este contexto.
  - Se preservó la literalidad de «los siete espíritus de Dios» para no resolver la tensión teológica.
  - Se evitó introducir «espiritualmente» en «estás muerto» para no añadir contenido no explicitado por el griego.
  - Se conservó «nombre» para ὄνομα, en línea con la revisión inglesa más reciente.
