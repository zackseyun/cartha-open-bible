source:
  edition: SBLGNT
  text: μνημόνευε οὖν πῶς εἴληφας καὶ ἤκουσας καὶ τήρει, καὶ μετανόησον· ἐὰν οὖν μὴ γρηγορήσῃς, ⸀ἥξω ὡς κλέπτης, καὶ οὐ μὴ ⸀γνῷς ποίαν ὥραν ἥξω ἐπὶ σέ·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/003.yaml
  text: Therefore remember how you have received and heard[a]; keep it, and repent. So if you do not stay awake, I will come like a thief[c][b], and you will certainly not know at what hour I will come upon you.
  footnotes:
  - marker: a
    text: Or 'remember what you have received and heard.' The Greek says 'how,' which may emphasize the manner of their reception, though some understand it as referring to the message itself.
    reason: alternative_reading
  - marker: b
    text: '''Stay awake'' may also be rendered ''be watchful'' or ''keep watch.'''
    reason: lexical_alternative
  - marker: c
    text: The warning 'I will come like a thief' echoes language used elsewhere for sudden, unexpected visitation; the verse itself does not specify whether the reference is to final judgment or a more immediate act of discipline.
    reason: cross_reference
