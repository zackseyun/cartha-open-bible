translation:
  language: es
  text: Por tanto, recuerda cómo has recibido y oído[a]; guárdalo, y arrepiéntete. Así que, si no te mantienes despierto[b], vendré como ladrón[c], y de ningún modo sabrás a qué hora vendré sobre ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recuerda lo que has recibido y oído». El griego dice «cómo», lo cual puede enfatizar la manera en que lo recibiste, aunque algunos lo entienden como referencia al mensaje mismo.
    reason: alternative_reading
  - marker: b
    text: «Te mantienes despierto» también puede verterse «estás alerta», «vigilas» o «velas».
    reason: lexical_alternative
  - marker: c
    text: La advertencia «vendré como ladrón» retoma un lenguaje usado en otros pasajes para una venida súbita e inesperada; el versículo no precisa si se trata del juicio final o de una acción disciplinaria más inmediata.
    reason: cross_reference
lexical_decisions:
- source_word: μνημόνευε
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - haz memoria de
  - acuérdate de
  lexicon: BDAG
  rationale: El imperativo presente pide una acción continua de recordar. «Recuerda» es natural en español y conserva la fuerza exhortativa sin volver la frase pesada.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Marca la inferencia a partir de la reprensión anterior. «Por tanto» preserva con claridad la conexión lógica al inicio del versículo.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué modo
  - en qué forma
  lexicon: BDAG
  rationale: La pregunta adverbial apunta al modo de recibir y oír, no solo al contenido. «Cómo» conserva esa ambigüedad sin explicarla en exceso.
- source_word: εἴληφας
  english_pob_choice: you have received
  chosen_spanish: has recibido
  alternatives_spanish:
  - recibiste
  - has aceptado
  lexicon: BDAG
  rationale: El perfecto expresa una recepción pasada con vigencia actual. «Has recibido» refleja mejor esa permanencia que un simple pretérito.
- source_word: ἤκουσας
  english_pob_choice: heard
  chosen_spanish: oído
  alternatives_spanish:
  - escuchado
  - oíste
  lexicon: BDAG
  rationale: El aoristo remite al acto previo de escuchar el mensaje. «Oído» funciona de manera natural en la construcción «has recibido y oído» y mantiene el paralelismo.
- source_word: τήρει
  english_pob_choice: keep it
  chosen_spanish: guárdalo
  alternatives_spanish:
  - obsérvalo
  - manténlo
  - guárdalo y obedece
  lexicon: BDAG
  rationale: τηρέω puede ser guardar, observar o preservar. «Guárdalo» conserva la idea de retener fielmente lo recibido, sin estrecharla solo a obediencia formal.
- source_word: μετανόησον
  english_pob_choice: repent
  chosen_spanish: arrepiéntete
  alternatives_spanish:
  - cambia de mente
  - vuélvete
  lexicon: BDAG
  rationale: En el uso neotestamentario, el imperativo llama a apartarse del pecado. «Arrepiéntete» es la equivalencia más directa y teológicamente transparente.
- source_word: γρηγορήσῃς
  english_pob_choice: stay awake
  chosen_spanish: velas
  alternatives_spanish:
  - estás despierto
  - estás alerta
  - velas y vigilas
  lexicon: BDAG
  rationale: El verbo evoca vigilia/alerta. «Velas» expresa bien la imagen en español y se ajusta al contraste con la venida «como ladrón».
- source_word: ἥξω ὡς κλέπτης
  english_pob_choice: I will come like a thief
  chosen_spanish: vendré como ladrón
  alternatives_spanish:
  - vendré como un ladrón
  - vendré cual ladrón
  lexicon: BDAG
  rationale: La comparación mantiene la idea de llegada súbita e inesperada. «Como ladrón» es idiomático y fiel al símil griego.
- source_word: οὐ μὴ γνῷς
  english_pob_choice: you will certainly not know
  chosen_spanish: de ningún modo sabrás
  alternatives_spanish:
  - ciertamente no sabrás
  - de ninguna manera sabrás
  lexicon: BDAG
  rationale: La combinación enfática οὐ μὴ requiere una negación fuerte. «De ningún modo sabrás» reproduce esa certeza sin sonar arcaico.
- source_word: ποίαν ὥραν
  english_pob_choice: at what hour
  chosen_spanish: a qué hora
  alternatives_spanish:
  - en qué hora
  - a qué momento
  lexicon: BDAG
  rationale: «Hora» preserva el término apocalíptico y la precisión temporal del griego. «A qué hora» es la forma natural en español.
- source_word: ἐπὶ σέ
  english_pob_choice: upon you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - a ti
  lexicon: BDAG
  rationale: ἐπί con acusativo puede expresar llegada hacia o contra alguien. «Sobre ti» conserva la solemnidad y deja abierta la tensión entre visita y juicio.
theological_decisions:
- issue: Alcance de «cómo has recibido y oído»
  english_pob_reading: Rendered as 'remember how you have received and heard' rather than specifying the content alone.
  chosen_spanish_reading: Se traduce «cómo has recibido y oído» y no solo «lo que has recibido y oído».
  alternative_spanish_readings:
  - recuerda lo que has recibido y oído
  - recuerda el mensaje que has recibido y oído
  rationale: El griego usa πῶς, que apunta primariamente al modo o manera. La traducción conserva esa tensión y no la reduce únicamente al contenido.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de la advertencia «vendré como ladrón»
  english_pob_reading: Left as a warning of unexpected coming without specifying whether it refers to final advent, temporal judgment, or disciplinary visitation.
  chosen_spanish_reading: Se mantiene la imagen sin precisar si alude al retorno final, a juicio temporal o a visita disciplinaria.
  alternative_spanish_readings:
  - vendré en mi segunda venida como ladrón
  - vendré para juzgarte de repente
  rationale: El versículo no determina por sí mismo el alcance de la venida. Conviene preservar la ambigüedad teológica documentada en el audit trail.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada del inglés POB: no hubo cambios pendientes y el dictamen de alta concordancia fue de acuerdo. La versión española sigue esa misma lectura base, preservando la ambigüedad de πῶς y del símil «como ladrón».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se eligió «velas» para γρηγορήσῃς por su cercanía al campo semántico de vigilia, manteniendo la nota de alternativa para lectores que prefieran «estar alerta».
  - «De ningún modo sabrás» reproduce la negación enfática de οὐ μὴ sin recurrir a un giro demasiado arcaico.
  - La puntuación separa con comas las exhortaciones breves para reflejar bien el ritmo imperativo del griego.
