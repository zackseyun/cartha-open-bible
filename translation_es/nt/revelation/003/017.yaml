translation:
  language: es
  text: 'porque dices: «Soy rico, me he enriquecido y[a] no tengo necesidad de nada», y no sabes que tú eres miserable y digno de lástima, y pobre, y ciego, y desnudo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no necesito nada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la base de la reprensión con valor causal, que en español se expresa naturalmente con «porque».
- source_word: λέγεις
  english_pob_choice: you say
  chosen_spanish: dices
  alternatives_spanish:
  - estás diciendo
  lexicon: BDAG
  rationale: El presente simple mantiene la acusación directa y suena natural en español sin perder la fuerza del verbo de habla.
- source_word: Πλούσιός εἰμι
  english_pob_choice: I am rich
  chosen_spanish: Soy rico
  alternatives_spanish:
  - Soy adinerado
  - Soy rico en bienes
  lexicon: BDAG
  rationale: Conserva el predicado simple de riqueza material; «rico» es la equivalencia directa y clara.
- source_word: πεπλούτηκα
  english_pob_choice: I have become wealthy
  chosen_spanish: me he hecho rico
  alternatives_spanish:
  - he prosperado
  - me he enriquecido
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante; «me he hecho rico» refleja tanto el proceso como la condición presente sin repetir mecánicamente la primera afirmación.
- source_word: οὐδὲν χρείαν ἔχω
  english_pob_choice: I have need of nothing
  chosen_spanish: no necesito nada
  alternatives_spanish:
  - no tengo necesidad de nada
  - nada necesito
  lexicon: BDAG
  rationale: En español, la idea idiomática se comunica mejor de forma directa; conserva el sentido de suficiencia absoluta. La alternativa literal «no tengo necesidad de nada» queda implícita como posibilidad de lectura.
- source_word: οὐκ οἶδας
  english_pob_choice: you do not know
  chosen_spanish: no sabes
  alternatives_spanish:
  - no te das cuenta
  lexicon: BDAG
  rationale: «Saber» mantiene el verbo cognitivo explícito; «no te das cuenta» sería más interpretativo.
- source_word: σὺ εἶ
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres tú
  lexicon: BDAG
  rationale: Se conserva el énfasis del pronombre griego con «tú», sin sobrecargar la sintaxis.
- source_word: ὁ ταλαίπωρος
  english_pob_choice: wretched
  chosen_spanish: el miserable
  alternatives_spanish:
  - el desdichado
  - el desventurado
  lexicon: BDAG
  rationale: El artículo en griego vuelve la acusación especialmente puntual. En español, «el miserable» conserva esa dureza y el artículo definido, mejor que suavizarlo a un adjetivo suelto.
- source_word: ἐλεεινός
  english_pob_choice: pitiable
  chosen_spanish: digno de lástima
  alternatives_spanish:
  - digno de compasión
  - lamentable
  lexicon: BDAG
  rationale: Distingue este término de ταλαίπωρος, manteniendo la idea de alguien que merece compasión o lástima.
- source_word: πτωχός
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - mendigo
  - indigente
  lexicon: BDAG
  rationale: Preserva la ironía del contraste con la falsa autopercepción de riqueza.
- source_word: τυφλός
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - sin vista
  lexicon: BDAG
  rationale: Equivalente directo y tradicional para la ceguera literal/metafórica del pasaje.
- source_word: γυμνός
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - sin ropa
  lexicon: BDAG
  rationale: Mantiene la imagen de vergüenza sin atenuarla; «desnudo» es la forma más directa y fiel.
theological_decisions:
- issue: Cómo reflejar la tensión entre autopercepción de riqueza y diagnóstico divino sin añadir interpretación ajena
  english_pob_reading: The verse keeps wealth, poverty, blindness, and nakedness literal in the main text without inserting 'spiritually.'
  chosen_spanish_reading: El texto mantiene riqueza, pobreza, ceguera y desnudez de forma literal, sin añadir «espiritualmente» ni otro calificativo interpretativo.
  alternative_spanish_readings:
  - eres espiritualmente pobre
  - eres pobre en lo espiritual
  rationale: La ironía y la acusación retórica nacen del contraste mismo; añadir una glosa interpretativa debilitaría la fuerza del pasaje y excedería el alcance del griego.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisó una formulación anterior que decía «the wretched one» para ajustarse mejor a los adjetivos predicativos del griego; en español se optó por «el miserable» porque el artículo definido sí puede conservar con naturalidad el carácter puntual de ὁ ταλαίπωρος sin forzar una construcción nominal extraña. También se distinguió ἐλεεινός como «digno de lástima» para evitar fusionar ambos adjetivos.
  spanish_consistency_notes:
  - Se mantuvo «rico»/«pobre» como contraste económico literal, siguiendo la POB inglesa.
  - Se usó «desnudo» y no una paráfrasis atenuada para conservar la imagen de vergüenza.
  - El énfasis de σὺ se resolvió con «tú» en el predicado («tú eres») sin duplicación innecesaria.
  - La nota de pie se ancló solo en la frase equivalente a οὐδὲν χρείαν ἔχω, donde el español admite la alternativa idiomática.
