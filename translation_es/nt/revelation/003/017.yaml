    issue: La nota al pie [a] está colocada en el lugar equivocado.
    rationale: 'El texto marca [a] sobre «miserable», pero la nota dice «O: “no necesito nada”», que corresponde a οὐδὲν χρείαν ἔχω. Esto rompe la trazabilidad y confunde al lector.'
  - severity: medium
    issue: «el miserable» no sigue bien la revisión auditada ni la sintaxis natural del español.
    rationale: Aunque el artículo griego aporta fuerza, en predicación española «tú eres miserable» o «eres un desdichado» suele reflejar mejor el sentido. La auditoría inglesa ya descartó «the wretched one» en el texto principal por naturalidad formal.
  - severity: low
    issue: «me he hecho rico» es fiel, pero menos idiomático en esta secuencia que «me he enriquecido».
    rationale: Ambas opciones preservan el perfecto resultativo, pero «me he enriquecido» evita la repetición de «rico» y suena más natural en español eclesial general.
  revised_spanish_text: 'porque dices: «Soy rico, me he enriquecido y[a] no tengo necesidad de nada», y no sabes que tú eres miserable y digno de lástima, y pobre, y ciego, y desnudo.'
