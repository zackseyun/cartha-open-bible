  rationale: Se reubicó la nota [a] al segmento correcto («no tengo necesidad de nada») para corresponder a la alternativa auditada. Se ajustó «me he hecho rico» a «me he enriquecido» por fluidez y fidelidad al perfecto resultativo. Se cambió «el miserable» por «miserable» para reflejar mejor el uso predicativo natural en español y seguir la revisión inglesa que evitó una reproducción demasiado literal del artículo griego en el texto principal.
