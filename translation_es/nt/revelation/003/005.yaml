revisions:
- from: El que vence[a] será vestido así con vestiduras blancas, y ciertamente no borraré su nombre del libro de la vida[c][b], y confesaré su nombre delante de mi Padre y delante de sus ángeles[d].
  to: El que vence[a] será revestido así de vestiduras blancas, y ciertamente no borraré su nombre del libro de la vida[b][c], y confesaré su nombre delante de mi Padre y delante de sus ángeles[d].
  rationale: Se corrige una nota léxica incorrecta que alteraba el sentido de νικῶν («sobrevive» → «sale vencedor») y se mejora la naturalidad de περιβαλεῖται con «será revestido…», que conserva mejor la imagen de investidura en español. También se ordenan las notas del «libro de la vida» de forma más natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y la línea del English POB: conserva «así», la negación enfática, «libro de la vida», y la doble fórmula «delante de». Sin embargo, hay dos desajustes relevantes con el audit trail: (1) la nota alternativa de ὁ νικῶν traduce mal «overcomes» como «sobrevive», cambiando el sentido de victoria por mera supervivencia; (2) «será vestido» suena poco natural en español bíblico actual para περιβαλεῖται, donde «será vestido con…» es comprensible pero menos idiomático que «será vestido de…» o, mejor, «será revestido de…».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «será vestido así con vestiduras blancas» resulta algo tosco. «Será revestido así de vestiduras blancas» mejora la fluidez y mantiene la imagen de investidura. El resto del versículo es legible y fiel. Las notas b, c y d están bien orientadas; la nota a necesita corrección urgente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «El que vence», «libro de la vida», «mi Padre» y «sus ángeles» están alineados con el griego y el POB. «Confesaré» es defendible y preserva el vínculo verbal documentado con Mateo 10:32. La principal corrección léxica necesaria es cambiar la alternativa «el que sobrevive» por «el que vence»/«el que supera»/«el que vence»; la mejor equivalencia documentada es «el que vence» en texto principal y «el que supera» no está auditada, por lo que «el que vence» / «el que triunfa» tampoco es ideal. La alternativa correcta según el audit trail es «el que vence» vs. «el que vence/supera»; en español la más cercana a «overcomes» es «el que vence». Para distinguir la nota del texto principal, «O: “el que vence”» no sirve; mejor «O: “el que sale vencedor”».'
  issues:
  - severity: high
    issue: 'La nota [a] dice «O: “el que sobrevive”».'
    rationale: Esto no corresponde al inglés auditado («The one who overcomes») ni al griego νικῶν, que expresa vencer/conquistar, no simplemente sobrevivir.
  - severity: medium
    issue: «será vestido así con vestiduras blancas» suena poco idiomático.
    rationale: Aunque es entendible, para περιβαλεῖται la formulación «será revestido de vestiduras blancas» es más natural y digna en español eclesial, sin perder fidelidad.
  - severity: low
    issue: El anclaje de notas [c][b] no sigue el orden del English POB.
    rationale: No es un error si los marcadores son únicos y están presentes en el texto, pero conviene mantener un orden más natural en español alrededor de «libro de la vida».
  revised_spanish_text: El que vence[a] será revestido así de vestiduras blancas, y ciertamente no borraré su nombre del libro de la vida[b][c], y confesaré su nombre delante de mi Padre y delante de sus ángeles[d].
  revised_footnotes:
