translation:
  language: es
  text: El que vence[a] será revestido así de vestiduras blancas, y ciertamente no borraré su nombre del libro de la vida[b][c], y confesaré su nombre delante de mi Padre y delante de sus ángeles[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que sale vencedor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nunca borraré su nombre del libro de la vida». El griego usa una negación enfática.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, un registro celestial de los que pertenecen a Dios y heredan la vida.
    reason: cultural_note
  - marker: d
    text: 'O: «reconoceré su nombre». Compárese Mateo 10:32.'
    reason: cross_reference
lexical_decisions:
- source_word: ὁ νικῶν
  english_pob_choice: The one who conquers
  chosen_spanish: El que vence
  alternatives_spanish:
  - El que conquista
  - El vencedor
  lexicon: BDAG
  rationale: El participio presente sustantivado pide una expresión nominal que conserve la idea de acción característica. «Vence» comunica bien la victoria en el contexto del Apocalipsis y es natural en español; «conquista» es posible, pero puede sonar menos idiomático aquí. «El vencedor» suena más estático y menos transparente respecto del verbo griego.
- source_word: περιβαλεῖται
  english_pob_choice: will be clothed
  chosen_spanish: será vestido
  alternatives_spanish:
  - será revestido
  - se vestirá
  lexicon: BDAG
  rationale: 'El valor resultativo/pasivo del futuro medio-pasivo se expresa con naturalidad en español como pasivo: «será vestido». «Será revestido» también es viable y algo más solemne, pero «vestido» mantiene claridad. «Se vestirá» introduce una forma reflexiva menos ajustada al matiz pasivo del texto.'
- source_word: ἐν ἱματίοις λευκοῖς
  english_pob_choice: in white garments
  chosen_spanish: con vestiduras blancas
  alternatives_spanish:
  - con ropas blancas
  - con vestidos blancos
  lexicon: BDAG
  rationale: ἱμάτια designa prendas/vestiduras; «vestiduras» es digno y suficientemente amplio. En español, «con» resulta más natural que un calco literal de «en» con esta imagen de investidura. «Blancas» conserva el valor simbólico de pureza/victoria.
- source_word: οὐ μὴ ἐξαλείψω
  english_pob_choice: I will certainly not erase
  chosen_spanish: ciertamente no borraré
  alternatives_spanish:
  - nunca borraré
  - de ningún modo borraré
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con futuro se refleja bien con «ciertamente no». «Borrar» es un equivalente claro y bíblicamente natural para el acto de eliminar un nombre de un registro; mantiene el sentido sin forzar «borrar del todo» o «borrar por completo».
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  - su propio nombre
  lexicon: BDAG
  rationale: Se conserva el referente masculino singular del griego. «Su nombre» es la forma más natural en español y mantiene la fuerza personal del registro.
- source_word: ἐκ τῆς βίβλου τῆς ζωῆς
  english_pob_choice: from the book of life
  chosen_spanish: del libro de la vida
  alternatives_spanish:
  - del rollo de la vida
  - del registro de la vida
  lexicon: BDAG
  rationale: «Libro de la vida» es la equivalencia bíblica estable y transparente para βίβλος en este contexto. «Libro» comunica bien la imagen de registro celestial; «rollo» o «registro» pueden ser válidos, pero cambiarían el eco tradicional del símbolo sin necesidad.
- source_word: ὁμολογήσω
  english_pob_choice: I will confess
  chosen_spanish: confesaré
  alternatives_spanish:
  - reconoceré
  - declararé
  lexicon: BDAG
  rationale: «Confesaré» conserva la fuerza pública y declarativa del verbo y su vínculo bíblico con el lenguaje de testimonio. «Reconoceré» es más débil; «declararé» expresa publicidad, pero no el mismo eco verbal.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» es idiomático, claro y adecuado para ambos miembros de la frase. «Ante» también sería posible, pero «delante de» mantiene la sencillez del original.
- source_word: τοῦ πατρός μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - el Padre mío
  - mi Padre celestial
  lexicon: BDAG
  rationale: La relación filial se expresa literalmente. «Mi Padre» es la forma natural y precisa, sin añadir el calificativo «celestial» que el texto no dice.
- source_word: τῶν ἀγγέλων αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - los ángeles de él
  - los ángeles que le pertenecen
  lexicon: BDAG
  rationale: Se conserva el pronombre posesivo en español para reproducir la referencia inmediata del griego. El referente probable es el Padre mencionado justo antes; «sus ángeles» mantiene esa ambigüedad/suavidad sin resolverla artificialmente.
theological_decisions:
- issue: La negación enfática sobre borrar el nombre del libro de la vida y su relación con perseverancia o apostasía
  english_pob_reading: Translate the statement straightforwardly as a promise of assurance without importing a doctrinal conclusion about whether true believers can or cannot finally fall away.
  chosen_spanish_reading: Traducir la promesa de manera directa y aseguradora, sin resolver en la traducción el debate doctrinal sobre si el creyente verdadero puede o no apartarse finalmente.
  alternative_spanish_readings:
  - Una formulación que sugiera de modo más fuerte la perseverancia final de los santos
  - Una formulación que suene más abiertamente como advertencia de pérdida posible
  rationale: El griego presenta una promesa solemne con negación enfática; la traducción debe conservar ese peso sin cerrar una cuestión doctrinal mayor que el versículo, por sí solo, no decide de forma inequívoca. El español «ciertamente no borraré» comunica la seguridad del enunciado y deja intacta la tensión teológica documentada.
  doctrine_reference: Preservar tensión teológica, no resolverla.
- issue: Construcción singular masculina para ὁ νικῶν y τὸ ὄνομα αὐτοῦ
  english_pob_reading: Use 'his name' in keeping with the masculine singular grammar and representative force.
  chosen_spanish_reading: Usar «su nombre» en la traducción principal, conservando el singular masculino del griego sin volverlo genérico.
  alternative_spanish_readings:
  - su nombre propio
  - el nombre de él
  - su nombre / su nombre (nota sobre el masculino singular)
  rationale: El español permite el posesivo singular sin perder la referencia masculina. Así se mantiene la correspondencia gramatical y se evita introducir un lenguaje inclusivo que el texto no exige, a la vez que la forma sigue siendo natural para lectura pública.
  doctrine_reference: Precisión gramatical y representativa.
translation_notes:
  revision_awareness: 'Se revisó la redacción final a partir del paquete fuente griego y del auditorio inglés: se mantuvo la negación enfática οὐ μή, se conservó el paralelismo entre nombre, libro de la vida y confesión delante del Padre y de sus ángeles, y no se introdujeron conclusiones doctrinales adicionales. La elección «será vestido con vestiduras blancas» sigue la lógica pasiva/resultativa del griego y preserva la imaginería apocalíptica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita que lo requiera.
  - Se mantuvo «ángeles» y no se armonizó el pronombre posesivo para dejar intacta la relación sintáctica inmediata del griego.
  - «Libro de la vida» se conserva como expresión bíblica estable, sin sustituirla por una paráfrasis administrativa.
  - «Confesaré» mantiene el eco bíblico de testimonio público, equivalente al inglés POB y fiel al verbo ὁμολογήσω.
