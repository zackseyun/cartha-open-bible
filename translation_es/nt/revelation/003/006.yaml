translation:
  language: es
  text: El que tiene oído[a], oiga lo que el Espíritu dice a las iglesias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La forma singular del griego es genérica: no restringe la exhortación a varones, sino a cualquiera que tenga oído.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que posee
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente como una expresión genérica singular. «El que tiene» conserva la fuerza proverbial y el singular representativo sin sonar arcaico en español. «Quien tiene» es posible, pero menos cercano al paralelismo habitual de esta fórmula en Apocalipsis; «el que posee» añade matiz innecesario.
- source_word: οὖς
  english_pob_choice: an ear
  chosen_spanish: oído
  alternatives_spanish:
  - un oído
  - oídos
  lexicon: BDAG
  rationale: Aunque el griego usa el singular, en español la fórmula idiomática más natural es «tener oído». Mantiene el singular conceptual y evita una literalidad extraña como «un oído», que en español puede sonar físico o incompleto. «Oídos» suaviza la imagen pero se aparta más de la forma fuente.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El aoristo imperativo singular se vierte con un imperativo exhortativo natural en español. «Oiga» preserva la fuerza directa y la brevedad del mandato. «Que oiga» es posible, pero más explicativo; «escuche» desplaza ligeramente el matiz hacia atención deliberada.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - qué
  - aquello que
  lexicon: BDAG
  rationale: En esta cláusula introduciendo contenido, «lo que» comunica de forma idiomática el objeto de la declaración. «Qué» también sería posible, pero «lo que» suena más natural en español bíblico contemporáneo y mantiene la referencia abierta del original.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: El contexto repetido de Apocalipsis 2–3 favorece la referencia al Espíritu Santo que habla a las iglesias. Se conserva la mayúscula por claridad referencial. «El espíritu» sería gramaticalmente posible, pero aquí perdería la identificación contextual más probable.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - habla
  lexicon: BDAG
  rationale: El presente indicativo se vierte con «dice», la forma más natural y formulaica en español para esta exhortación recurrente. «Está diciendo» suena menos idiomático; «habla» es posible, pero cambia el carácter de la fórmula.
- source_word: ταῖς ἐκκλησίαις
  english_pob_choice: to the churches
  chosen_spanish: a las iglesias
  alternatives_spanish:
  - a las congregaciones
  - a las asambleas
  lexicon: BDAG
  rationale: «Iglesias» es la equivalencia más estable y transparente para ἐκκλησίαις en el contexto de Apocalipsis. «Congregaciones» es posible, pero menos estándar; «asambleas» es más etimológico y menos claro para lectura eclesial contemporánea.
theological_decisions:
- issue: Referente de «el Espíritu»
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo implícito en el contexto
  alternative_spanish_readings:
  - un espíritu
  - el espíritu
  rationale: En la fórmula recurrente de Apocalipsis 2–3, el referente más probable es el Espíritu Santo que comunica el mensaje a las iglesias. La traducción conserva «el Espíritu» sin añadir «Santo» en el texto, porque el contexto ya lo identifica; la nota léxica explica la decisión sin sobretraducción.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Apocalipsis 2–3 como fórmula profética
- issue: Singular genérico en la exhortación
  english_pob_reading: let him hear
  chosen_spanish_reading: imperativo singular genérico («oiga» )
  alternative_spanish_readings:
  - que oigan
  - oigan
  rationale: El griego conserva singular masculino con valor representativo/generico. El español mantiene ese singular en «oiga», sin pluralizar ni neutralizar la estructura. Esto preserva la forma retórica del texto y su alcance universal.
  doctrine_reference: Principio de fidelidad formal al sujeto gramatical cuando tiene valor genérico
translation_notes:
  revision_awareness: El texto coincide con el sentido auditado de la versión inglesa POB y con el griego SBLGNT, sin necesidad de revisión adicional; se mantuvo la fórmula breve y repetitiva propia de Apocalipsis 2–3, con una nota para el singular genérico.
  spanish_consistency_notes:
  - Se usó «Espíritu» con mayúscula por coherencia contextual con la lectura pneumatológica del pasaje.
  - Se prefirió «iglesias» sobre «congregaciones» para conservar el registro bíblico y la correspondencia con el uso del libro de Apocalipsis.
  - La fórmula «El que tiene oído, oiga» mantiene el paralelismo tradicional del texto sin introducir elementos ausentes en el griego.
