translation:
  language: es
  text: A quienes amo[a], los reprendo y disciplino[c]. Por tanto, sé fervoroso[b] y arrepiéntete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a cuantos amo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sé celoso».'
    reason: lexical_alternative
  - marker: c
    text: La palabra aquí implica corrección formativa, no solo castigo.
    reason: cultural_note
lexical_decisions:
- source_word: ὅσους ἐὰν
  english_pob_choice: those whom
  chosen_spanish: A quienes
  alternatives_spanish:
  - a todos los que
  - a cuantos
  lexicon: BDAG
  rationale: La construcción griega expresa un relativo indefinido. En español, «A quienes» conserva el sentido de grupo indefinido y permite una frase natural y directa sin añadir precisión inexistente.
- source_word: φιλῶ
  english_pob_choice: I love
  chosen_spanish: amo
  alternatives_spanish:
  - quiero
  - tengo afecto por
  lexicon: BDAG
  rationale: «Amo» preserva la fuerza relacional de φιλέω en este contexto de corrección amorosa y mantiene el tono teológico de amor real, no solo afecto tenue.
- source_word: ἐλέγχω
  english_pob_choice: I rebuke
  chosen_spanish: reprendo
  alternatives_spanish:
  - reprocho
  - amonesto
  lexicon: BDAG
  rationale: «Reprendo» comunica corrección verbal con fuerza moral, equivalente al valor contextual de ἐλέγχω en una exhortación disciplinaria.
- source_word: παιδεύω
  english_pob_choice: discipline
  chosen_spanish: disciplino
  alternatives_spanish:
  - corrijo
  - educo
  - disciplino con corrección
  lexicon: BDAG
  rationale: «Disciplino» conserva la idea de formación correctiva y no reduce el verbo a castigo; mantiene la tensión entre corrección y formación que el texto exige.
- source_word: ζήλευε
  english_pob_choice: be zealous
  chosen_spanish: sé celoso
  alternatives_spanish:
  - sé ferviente
  - sé celoso/ardiente
  lexicon: BDAG
  rationale: «Sé celoso» traduce directamente el imperativo y preserva la intensidad de ζήλευε. En español puede sonar menos habitual, pero comunica mejor la fuerza exhortativa que «sé ferviente».
- source_word: μετανόησον
  english_pob_choice: repent
  chosen_spanish: arrepiéntete
  alternatives_spanish:
  - cambia de mente
  - vuélvete
  lexicon: BDAG
  rationale: En contexto moral-espiritual, «arrepiéntete» es la equivalencia más fiel y reconocible. Las alternativas explicitan aspectos del sentido, pero son más interpretativas.
theological_decisions:
- issue: El amor de Cristo como fundamento de reprensión y disciplina
  english_pob_reading: Rendered as 'love' without weakening it to mere affection
  chosen_spanish_reading: «amo» mantiene un amor pleno y activo, no mero afecto
  alternative_spanish_readings:
  - «tengo afecto por»
  - «quiero»
  rationale: La frase une amor y corrección sin suavizar la tensión. «Amo» preserva que la reprensión y la disciplina nacen de una relación real de amor, no de simple severidad.
  doctrine_reference: Preservar la tensión teológica del texto; prioridad del original sobre la tradición devocional.
- issue: Sentido de παιδεύω
  english_pob_reading: Rendered as 'discipline' rather than punitive-only language
  chosen_spanish_reading: «disciplino» conserva corrección formativa, no solo castigo
  alternative_spanish_readings:
  - «castigo»
  - «entreno»
  - «corrijo»
  rationale: El verbo incluye instrucción correctiva y formación. «Disciplino» evita una lectura meramente punitiva y también evita rebajar el término a simple enseñanza.
  doctrine_reference: Equivalencia óptima; no añadir ni quitar fuerza doctrinal al texto.
- issue: Intensidad de ζήλευε
  english_pob_reading: be zealous
  chosen_spanish_reading: «sé celoso» reproduce el llamado a ardor activo
  alternative_spanish_readings:
  - «sé ferviente»
  - «sé earnest/serio»
  rationale: La exhortación requiere una respuesta intensa. «Sé celoso» mantiene el empuje del imperativo aunque sea menos idiomático; por eso se conserva el matiz de ardor comprometido.
  doctrine_reference: No neutralizar la intensidad exhortativa del original.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del audit trail al omitir un equivalente explícito de ἐγώ en el cuerpo principal, porque en español sería innecesario y menos natural. También conserva la secuencia exhortativa del original: amor → reprensión/disciplina → llamado a celo y arrepentimiento.'
  spanish_consistency_notes:
  - Se usa «amo» para φιλέω conforme al contexto de amor correctivo y no se rebaja a mero afecto.
  - «Disciplino» mantiene el valor de παιδεύω como formación correctiva; la nota aclara que no se limita a castigo.
  - «Sé celoso» conserva la fuerza de ζήλευε; no se reemplaza por un término más suave.
  - «Arrepiéntete» refleja el uso moral de μετανοέω en un llamado a cambio real de conducta.
