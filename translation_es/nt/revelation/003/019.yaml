    rationale: 'La nota [b] dice «O: “reprendo”», pero aparece sobre «disciplino[b][c]». En el rastro inglés, la alternativa es para ζήλευε («be earnest»), no para ἐλέγχω ni παιδεύω. Debe trasladarse al mandato correspondiente.'
  - severity: low
