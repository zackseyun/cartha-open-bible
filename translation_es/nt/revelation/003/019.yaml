    rationale: En español actual, «celoso» suele sugerir celos posesivos o recelo, no ardor espiritual. El contexto exige intensidad/ardor/seriedad; «sé fervoroso» comunica mejor el sentido exhortativo sin perder fuerza.
  - severity: high
