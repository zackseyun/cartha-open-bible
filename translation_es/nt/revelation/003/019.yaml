revisions:
- from: A quienes amo[a], los reprendo y disciplino[b][c]. Por tanto, sé celoso y arrepiéntete.
  to: A quienes amo[a], los reprendo y disciplino[c]. Por tanto, sé fervoroso[b] y arrepiéntete.
  rationale: Se reemplaza «sé celoso» por «sé fervoroso» para comunicar con mayor claridad el sentido de ζήλευε en español contemporáneo, evitando la ambigüedad de «celoso». Se corrige además la ubicación y el contenido de la nota alternativa, de modo que corresponda al imperativo final y no a «disciplino». Se mantiene el resto del texto, que es fiel al original y natural en español.
