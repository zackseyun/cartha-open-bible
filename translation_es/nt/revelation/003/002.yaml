  text: γίνου γρηγορῶν, καὶ στήρισον τὰ λοιπὰ ἃ ⸂ἔμελλον ἀποθανεῖν⸃, οὐ γὰρ εὕρηκά σου ⸀τὰ ἔργα πεπληρωμένα ἐνώπιον τοῦ θεοῦ μου·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/002.yaml
  text: Be watchful[a], and strengthen what remains, which was about to die[c][b], for I have not found your works completed in the sight of my God.
  footnotes:
  - marker: a
    text: Or 'Be watchful.' The Greek expression is literally 'be/become watching,' an idiom for wakefulness or alertness.
    reason: lexical_alternative
  - marker: b
    text: Or 'which were about to die' or 'which was on the verge of dying.' The Greek can be rendered with either a collective singular or a plural in English.
    reason: lexical_alternative
  - marker: c
    text: Or 'your deeds ... fulfilled' or 'brought to fullness before my God.'
    reason: lexical_alternative
