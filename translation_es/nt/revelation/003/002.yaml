review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: exhortación a la vigilancia, fortalecimiento de lo restante, inminencia de muerte y evaluación divina de las obras. Sin embargo, hay un pequeño problema de fidelidad/estilo en «lo cual», que suena menos natural que «lo que» para retomar «lo que queda», y la nota b repite una alternativa idéntica al texto principal en vez de preservar mejor la posibilidad singular/plural documentada en el inglés.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «Mantente vigilante», «fortalece», «lo que queda» y «delante de mi Dios» funcionan bien. Aun así, «lo cual estaba a punto de morir» es algo rígido en español bíblico natural; «lo que estaba a punto de morir» enlaza mejor con el antecedente colectivo. También conviene ajustar la nota b para que ofrezca alternativas reales y más precisas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «obras» y el registro general están alineados. No intervienen aquí términos sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: «lo cual estaba a punto de morir» suena innecesariamente rígido en español
    rationale: Aunque no es incorrecto, el relativo neutro «lo cual» después de «lo que queda» resulta menos idiomático que «lo que», y puede entorpecer la fluidez sin aportar precisión adicional.
  - severity: low
    issue: La nota b no ofrece una alternativa útil distinta del texto y no refleja del todo la opción plural documentada
    rationale: Actualmente repite «lo que estaba a punto de morir», que es prácticamente la mejor forma para el texto, pero no preserva claramente la posibilidad plural («las cosas que estaban a punto de morir» / «las que estaban por morir») mencionada en la auditoría inglesa.
  revised_spanish_text: Mantente vigilante[a], y fortalece lo que queda, lo que estaba a punto de morir[b], porque no he hallado tus obras completas[c] delante de mi Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «Vela» o «Estate alerta». La expresión griega es literalmente «sé/llega a ser vigilante», un modismo de despertar y atención continua.'
    reason: alternative_reading
  - marker: b
    text: 'O: «las cosas que estaban a punto de morir» o «lo que estaba por morir». El griego permite entender el antecedente de manera colectiva singular o plural.'
    reason: alternative_reading
  - marker: c
    text: 'O: «cumplidas», «llevadas a plenitud» o «perfeccionadas delante de mi Dios».'
    reason: alternative_reading
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin cambiar el sentido: «lo cual» pasó a «lo que». También se afinó la nota b para reflejar mejor la alternativa colectiva singular/plural documentada en la auditoría inglesa.'
