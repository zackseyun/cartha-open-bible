translation:
  language: es
  text: Mantente vigilante[a], y fortalece lo que queda, lo que estaba a punto de morir[b], porque no he hallado tus obras completas[c] delante de mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vela» o «Estate alerta». La expresión griega es literalmente «sé/llega a ser vigilante», un modismo de despertar y atención continua.'
    reason: alternative_reading
  - marker: b
    text: 'O: «las cosas que estaban a punto de morir» o «lo que estaba por morir». El griego permite entender el antecedente de manera colectiva singular o plural.'
    reason: alternative_reading
  - marker: c
    text: 'O: «cumplidas», «llevadas a plenitud» o «perfeccionadas delante de mi Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: γίνου γρηγορῶν
  english_pob_choice: Be watchful
  chosen_spanish: Mantente vigilante
  alternatives_spanish:
  - Vela
  - Estate alerta
  - Despierta
  lexicon: BDAG
  rationale: La construcción perifrástica expresa una exhortación continua a la vigilancia. «Mantente vigilante» conserva el valor aspectual de permanecer despierto/alerta y suena natural en español sin perder la fuerza admonitora del griego.
- source_word: στήρισον
  english_pob_choice: strengthen
  chosen_spanish: fortalece
  alternatives_spanish:
  - confirma
  - afirma
  - sostén
  lexicon: BDAG
  rationale: σϑηρίζω aquí significa hacer firme o robusto. «Fortalece» es claro, verbal y acorde con el tono pastoral de la exhortación.
- source_word: τὰ λοιπὰ
  english_pob_choice: what remains
  chosen_spanish: lo que queda
  alternatives_spanish:
  - el resto
  - las cosas restantes
  lexicon: BDAG
  rationale: El neutro plural funciona de manera colectiva. «Lo que queda» mantiene esa referencia colectiva en español y evita una nominalización pesada.
- source_word: ἃ ἔμελλον ἀποθανεῖν
  english_pob_choice: which was about to die
  chosen_spanish: lo cual estaba a punto de morir
  alternatives_spanish:
  - lo que estaba a punto de morir
  - lo cual iban a morir
  - lo que estaba por morir
  lexicon: BDAG
  rationale: El griego permite entender el antecedente colectivo como singular en español. «Estaba a punto de morir» refleja la inminencia de μέλλω + infinitivo sin decidir más de lo que dice el texto sobre la forma exacta del referente.
- source_word: εὕρηκά
  english_pob_choice: I have not found
  chosen_spanish: no he hallado
  alternatives_spanish:
  - no he encontrado
  - no he descubierto
  lexicon: BDAG
  rationale: El perfecto expresa una evaluación presente basada en una búsqueda ya realizada. «No he hallado» es idiomático y conserva ese matiz de examen/veredicto.
- source_word: τὰ ἔργα
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tus hechos
  - tus acciones
  lexicon: BDAG
  rationale: «Obras» preserva la continuidad léxica con el lenguaje evaluativo del Apocalipsis y suena natural en español bíblico contemporáneo.
- source_word: πεπληρωμένα
  english_pob_choice: completed
  chosen_spanish: completas
  alternatives_spanish:
  - cumplidas
  - llevadas a plenitud
  - perfectas
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica un estado de plenitud/completitud. «Completas» comunica esa falta de integridad sin cargar de más el sentido teológico de «perfectas» o «cumplidas».
- source_word: ἐνώπιον τοῦ θεοῦ μου
  english_pob_choice: in the sight of my God
  chosen_spanish: delante de mi Dios
  alternatives_spanish:
  - ante mi Dios
  - en la presencia de mi Dios
  - a los ojos de mi Dios
  lexicon: BDAG
  rationale: ἐνώπιον señala estar delante/en presencia de alguien. «Delante de mi Dios» mantiene la imagen de evaluación divina y evita suavizarla.
theological_decisions:
- issue: Tono de la exhortación γίνου γρηγορῶν en un contexto de alarma espiritual
  english_pob_reading: Be watchful
  chosen_spanish_reading: Mantente vigilante
  alternative_spanish_readings:
  - Vela
  - Despierta
  rationale: El contexto inmediato (3:1–3) presupone una comunidad en peligro espiritual. «Mantente vigilante» conserva el imperativo de alerta sin añadir una lectura más interpretativa como «despierta», pero sigue siendo suficientemente urgente.
  doctrine_reference: Mantener la fuerza admonitoria sin exceder el alcance del griego
- issue: Estado de las obras con πεπληρωμένα
  english_pob_reading: completed
  chosen_spanish_reading: completas
  alternative_spanish_readings:
  - cumplidas
  - llevadas a plenitud
  - perfectas
  rationale: El texto afirma insuficiencia o falta de plenitud delante de Dios, pero no especifica si la carencia es moral, perseverante o cultual. «Completas» preserva esa tensión sin resolverla.
  doctrine_reference: Preservar la tensión teológica; no especificar más allá del texto
- issue: Relación entre τὰ ἔργα y el juicio divino
  english_pob_reading: in the sight of my God
  chosen_spanish_reading: delante de mi Dios
  alternative_spanish_readings:
  - ante mi Dios
  - en la presencia de mi Dios
  rationale: 'La frase conserva el matiz forense/evaluativo del griego: las obras son examinadas ante Dios. «Delante de mi Dios» mantiene ese juicio implícito sin convertirlo en una fórmula más devocional.'
  doctrine_reference: Lectura evaluativa de ἐνώπιον
translation_notes:
  revision_awareness: He seguido el último pase revisado del audit trail, que reemplazó una solución más idiomática por una más formal para γίνου γρηγορῶν. En español, la revisión se refleja con una equivalencia que conserva el mandato de vigilancia y su registro digno, sin traducir mecánicamente desde el inglés. También he mantenido el valor de completitud de πεπληρωμένα sin resolver la carencia teológica que el texto deja abierta.
  spanish_consistency_notes:
  - He mantenido «Dios» para θεός y «mi Dios» para τοῦ θεοῦ μου, conforme al estándar del proyecto.
  - He usado «obras» para τὰ ἔργα, coherente con el léxico de evaluación de Apocalipsis.
  - No he introducido «Cristo» ni «Señor» porque este versículo no los contiene.
  - La puntuación y el tratamiento de los corchetes siguen el formato de notas del proyecto.
