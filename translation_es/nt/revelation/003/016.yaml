revisions:
- from: Así[a], porque eres tibio y no eres ni caliente ni frío, estoy a punto de vomitarte de mi boca.
  to: Por eso[a], porque eres tibio, y ni caliente ni frío, estoy a punto de vomitarte de mi boca.
  rationale: Se ajusta οὕτως a «Por eso» para reflejar mejor el valor inferencial/consecutivo del original y del audit trail inglés. También se elimina la repetición innecesaria de «eres» para lograr un español más natural sin perder ningún matiz del griego. Se conserva «vomitarte» y la nota alternativa, en línea con la decisión léxica y teológica documentada.
