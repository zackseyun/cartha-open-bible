translation:
  language: es
  text: Por eso[a], porque eres tibio, y ni caliente ni frío, estoy a punto de vomitarte de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te escupa de mi boca». El verbo griego es más literalmente «vomitar», una imagen más fuerte que «escupir».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Por eso
  lexicon: BDAG
  rationale: Aquí introduce la consecuencia o conclusión de la reprensión previa. «Así» conserva el valor inferencial sin añadir una paráfrasis excesiva.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: En este contexto da la razón del juicio anunciado. «Porque» expresa con naturalidad la causalidad que el griego presenta.
- source_word: χλιαρός
  english_pob_choice: lukewarm
  chosen_spanish: tibio
  alternatives_spanish:
  - templado
  lexicon: BDAG
  rationale: «Tibio» es el equivalente natural y claro en español para la imagen térmica. «Templado» es posible, pero menos directo en este pasaje.
- source_word: οὔτε ζεστὸς οὔτε ψυχρός
  english_pob_choice: neither hot nor cold
  chosen_spanish: ni caliente ni frío
  alternatives_spanish:
  - ni tibio ni frío
  - ni ardiente ni frío
  lexicon: BDAG
  rationale: Mantiene el contraste binario del griego con vocabulario corriente en español. «Caliente» comunica mejor la idea de calor que una forma más técnica o menos idiomática.
- source_word: μέλλω
  english_pob_choice: I am about to
  chosen_spanish: estoy a punto de
  alternatives_spanish:
  - voy a
  - pienso
  lexicon: BDAG
  rationale: El verbo marca inminencia. «Estoy a punto de» conserva esa proximidad temporal mejor que un futuro simple o una formulación más vaga.
- source_word: ἐμέσαι
  english_pob_choice: vomit
  chosen_spanish: vomitarte
  alternatives_spanish:
  - expulsarte
  - escupirte
  lexicon: BDAG
  rationale: El verbo griego es fuerte y gráfico; «vomitarte» preserva esa fuerza sin suavizarla. Se mantiene la dirección acusativa del objeto con el clítico «-te».
- source_word: ἐκ τοῦ στόματός μου
  english_pob_choice: out of my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - fuera de mi boca
  - de mi boca afuera
  lexicon: BDAG
  rationale: «De mi boca» es la manera natural en español de expresar el punto de expulsión. Conserva la imagen corporal sin calcar innecesariamente la preposición inglesa.
theological_decisions:
- issue: Fuerza de la imagen de rechazo en ἐμέσαι
  english_pob_reading: Retain the graphic image 'vomit' rather than soften it.
  chosen_spanish_reading: Conservar la imagen gráfica fuerte con «vomitarte», sin suavizarla.
  alternative_spanish_readings:
  - escupirte
  - expulsarte
  rationale: La escena comunica rechazo severo y juicio, no mera molestia. Suavizarla debilitaría el impacto retórico y teológico del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Inminencia de μέλλω
  english_pob_reading: 'Render as imminent: ''I am about to.'''
  chosen_spanish_reading: Expresar inminencia con «estoy a punto de».
  alternative_spanish_readings:
  - voy a
  - te voy a vomitar
  rationale: El griego presenta una acción inminente. Esta opción conserva la urgencia de la advertencia mejor que un futuro más general.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje coincide con la lectura final auditada: no hubo revisiones aplicadas y el control cruzado indicó alta concordancia (agree 1.0). Se mantuvieron la inminencia de μέλλω y la fuerza gráfica de ἐμέσαι, sin suavizar la imagen.'
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» sin incidencia aquí; no aplica.
  - Se eligió «tibio» para χλιαρός por naturalidad en español, evitando tecnicismos.
  - «Caliente» se usó para conservar el contraste simple hot/cold del inglés auditado.
  - La nota al pie preserva la alternativa «escupa» porque existe como posible atenuación, pero se privilegia «vomitar» en el texto principal.
