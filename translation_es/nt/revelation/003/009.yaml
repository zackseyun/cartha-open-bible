  language: en
  yaml_path: translation/nt/revelation/003/009.yaml
  text: Look[a], I am giving some from the synagogue of Satan—those who call themselves Jews and are not, but are lying—look, I will make them come and bow down before your feet[b], and they will know that I have loved you.
  footnotes:
  - marker: a
    text: Or 'those of the synagogue of Satan.' The Greek literally says 'I am giving from the synagogue of Satan,' which likely means that some from that group will be made to come.
    reason: lexical_alternative
  - marker: b
    text: Or 'come and worship before your feet.' The Greek verb can mean 'bow down' or 'worship'; here 'bow down' is used to avoid implying that believers receive divine worship.
    reason: alternative_reading
