  glossary_alignment: No hay conflictos con la glosario base del proyecto. 'Satanás', 'judíos', 'se postren' y 'te he amado' están bien alineados con las decisiones léxicas y teológicas documentadas. La única excepción relevante es que la decisión inglesa auditada optó por explicitar la partitiva con 'some'; en español conviene hacer lo mismo en el texto principal para preservar mejor la intención documentada.
