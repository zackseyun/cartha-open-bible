translation:
  language: es
  text: Mira[a], yo te doy algunos de la sinagoga de Satanás—de los que dicen ser judíos y no lo son, sino que mienten—. Mira, yo haré que vengan y se postren[b] delante de tus pies, y conocerán que yo te he amado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo te doy de la sinagoga de Satanás». El griego dice literalmente «yo doy de la sinagoga de Satanás», lo cual probablemente significa que algunos de ese grupo serán hechos venir.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «adoren delante de tus pies». El verbo griego puede significar «postrarse» o «adorar»; aquí se usa «postrarse» para no sugerir adoración divina ofrecida a los creyentes.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - He aquí
  lexicon: BDAG
  rationale: Se conserva la interjección de llamado a la atención con un español natural y digno. 'Mira' comunica bien el valor discursivo de ἰδού sin el tono más arcaico de 'He aquí'.
- source_word: διδῶ
  english_pob_choice: I am giving
  chosen_spanish: yo doy
  alternatives_spanish:
  - yo estoy dando
  - yo entregaré
  lexicon: BDAG
  rationale: El presente griego se puede expresar de forma natural con presente simple en español. 'Yo doy' preserva la inmediatez y evita forzar una perífrasis menos idiomática.
- source_word: ἐκ τῆς συναγωγῆς τοῦ Σατανᾶ
  english_pob_choice: some from the synagogue of Satan
  chosen_spanish: de la sinagoga de Satanás
  alternatives_spanish:
  - algunos de la sinagoga de Satanás
  - de entre la sinagoga de Satanás
  lexicon: BDAG
  rationale: Se mantiene la construcción literal con ἐκ, dejando abierta la fuerza partitiva que el contexto sugiere. No se añade 'algunos' en el texto principal porque el griego no lo formula explícitamente como sustantivo.
- source_word: συναγωγῆς
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: '''Sinagoga'' es el equivalente preciso y contextual en este pasaje. ''Asamblea'' o ''congregación'' debilitarían la referencia histórica y religiosa del término.'
- source_word: τοῦ Σατανᾶ
  english_pob_choice: of Satan
  chosen_spanish: de Satanás
  alternatives_spanish:
  - perteneciente a Satanás
  lexicon: BDAG
  rationale: Se conserva el genitivo de relación de manera directa, sin suavizar la carga polémica del texto.
- source_word: τῶν λεγόντων ἑαυτοὺς Ἰουδαίους εἶναι
  english_pob_choice: those who call themselves Jews
  chosen_spanish: de los que dicen ser judíos
  alternatives_spanish:
  - de los que se llaman judíos
  - de los que afirman ser judíos
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo idiomático en español. 'Dicen ser' comunica adecuadamente la autodeclaración reflexiva sin introducir una formulación demasiado técnica.
- source_word: Ἰουδαίους
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: Aquí el término se entiende mejor como identidad religiosa/étnica judía, no meramente geográfica. 'Judíos' es la opción más clara y fiel al uso del pasaje.
- source_word: καὶ οὐκ εἰσὶν ἀλλὰ ψεύδονται
  english_pob_choice: and are not, but are lying
  chosen_spanish: y no lo son, sino que mienten
  alternatives_spanish:
  - y no lo son, sino que son falsos
  - y no son, sino que mienten
  lexicon: BDAG
  rationale: Se mantiene la oposición fuerte del griego. 'No lo son' evita repetir 'judíos' de forma torpe y conserva elipsis natural; 'mienten' expresa ψεύδονται con la fuerza personal del verbo.
- source_word: ποιήσω αὐτοὺς
  english_pob_choice: I will make them
  chosen_spanish: yo haré que
  alternatives_spanish:
  - yo los haré
  - yo los causaré a
  lexicon: BDAG
  rationale: El valor causativo de ποιέω se expresa con una estructura española natural. 'Haré que' deja claro que la acción es provocada por el sujeto divino.
- source_word: ἵνα ἥξουσιν καὶ προσκυνήσουσιν
  english_pob_choice: come and bow down
  chosen_spanish: vengan y se postren
  alternatives_spanish:
  - vengan y adoren
  - lleguen y se inclinen
  lexicon: BDAG
  rationale: Se preserva el movimiento y el gesto físico de sometimiento. 'Se postren' evita la ambigüedad de 'adoren', que en español podría sugerir culto divino indebido hacia la iglesia.
- source_word: προσκυνήσουσιν
  english_pob_choice: bow down
  chosen_spanish: se postren
  alternatives_spanish:
  - se inclinen
  - adoren
  lexicon: BDAG
  rationale: El verbo puede implicar adoración o postración. Por el complemento 'delante de tus pies', la lectura de homenaje/sumisión es la más adecuada, y 'postrarse' la expresa bien en español.
- source_word: ἐνώπιον τῶν ποδῶν σου
  english_pob_choice: before your feet
  chosen_spanish: delante de tus pies
  alternatives_spanish:
  - a tus pies
  - ante tus pies
  lexicon: BDAG
  rationale: '''Delante de tus pies'' sigue de cerca la imagen espacial del griego y suena natural en español. ''Ante tus pies'' también es posible, pero menos común.'
- source_word: γνῶσιν
  english_pob_choice: they will know
  chosen_spanish: conocerán
  alternatives_spanish:
  - sabrán
  - reconocerán
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la cláusula final de resultado se vierte con futuro español. 'Conocerán' mantiene la fuerza de γινώσκω y su valor de reconocimiento pleno.
- source_word: ἐγὼ ἠγάπησά σε
  english_pob_choice: I have loved you
  chosen_spanish: yo te he amado
  alternatives_spanish:
  - yo te amé
  - yo te amé y sigo amándote
  lexicon: BDAG
  rationale: El perfecto español 'he amado' conserva el valor de una acción pasada con vigencia presente. La forma con 'yo' mantiene el énfasis del pronombre enfático ἐγώ.
theological_decisions:
- issue: Identidad de 'los que dicen ser judíos y no lo son'
  english_pob_reading: The statement is rendered as a polemical claim about false covenant identity or unfaithfulness, without implying an ethnic denial of Jewishness beyond what the text itself states.
  chosen_spanish_reading: Se mantiene la acusación textual sin ampliar el sentido a una negación étnica de la identidad judía.
  alternative_spanish_readings:
  - Una redefinición espiritual estricta de 'judío'
  - Una negación étnica de la condición judía
  rationale: La traducción conserva la dureza del juicio del texto, pero evita añadir una interpretación antijudía que no está explicitada en el griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla por expansión interpretativa.
- issue: Sentido de προσκυνήσουσιν delante de los pies
  english_pob_reading: Rendered as 'bow down' rather than 'worship' to indicate homage/submission, not divine worship offered to the church.
  chosen_spanish_reading: Se traduce como 'se postren' para indicar homenaje o sumisión, no culto divino ofrecido a la iglesia.
  alternative_spanish_readings:
  - adoren
  - se inclinen en adoración
  rationale: En español, 'adorar' puede sugerir culto religioso directo y crear confusión doctrinal. 'Postrarse' mantiene la postura corporal y la idea de sometimiento reverente.
  doctrine_reference: Primacía del sentido del texto original; evitar confusión doctrinal por una sola palabra española.
translation_notes:
  revision_awareness: Se siguió el testimonio de SBLGNT y el auditorio inglés de POB, manteniendo la fuerza partitiva de ἐκ, la oposición de 'dicen/no son/mienten', y la lectura de προσκυνέω como postración de homenaje y no como adoración divina. No se detectaron revisiones aplicadas en el expediente más reciente.
  spanish_consistency_notes:
  - Se usó 'Satanás' de manera consistente con el término propio del texto.
  - Se prefirió 'judíos' frente a 'judeanos' por claridad contextual en Apocalipsis 3:9.
  - Se evitó 'SEÑOR' o sustitutos que oculten el nombre divino, aunque este versículo no contiene el tetragrámaton.
  - Se mantuvo un español contemporáneo pero reverente, evitando arcaísmos innecesarios como 'he aquí' en el cuerpo principal.
  - La puntuación reproduce la estructura enfática y parentética del griego con una pausa fuerte tras 'mienten' y una nueva introducción con 'Mira'.
