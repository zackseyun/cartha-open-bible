translation:
  language: es
  text: El que tiene oído[a], oiga lo que el Espíritu dice a las iglesias[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «oído» expresa de modo natural en español la imagen singular del griego, aunque pueda equivaler funcionalmente a «an ear» en inglés.
    reason: lexical_alternative
  - marker: b
    text: «iglesias» traduce el griego ἐκκλησίαις; «asambleas» también es posible, pero menos usual en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que posee
  lexicon: BDAG
  rationale: El participio articular griego funciona de manera sustantivada y proverbial. «El que tiene» conserva bien ese valor singular y general sin volver el español artificial.
- source_word: οὖς
  english_pob_choice: an ear
  chosen_spanish: oído
  alternatives_spanish:
  - un oído
  - oreja
  lexicon: BDAG
  rationale: En español, la fórmula fija suena más natural con «oído» que con una construcción demasiado literal. Mantiene la imagen de la capacidad de escuchar, aunque el griego use singular.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo aoristo de tercera persona singular se expresa con el subjuntivo exhortativo «oiga». Conserva la fuerza imperativa de la fórmula bíblica sin forzar «escuche», que en español puede sonar menos fiel al registro solemne.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - qué
  - aquello que
  lexicon: BDAG
  rationale: «Lo que» introduce de manera natural en español el contenido de la voz del Espíritu y evita una estructura demasiado literal con «qué».
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En este contexto apocalíptico y en la fórmula repetida de las cartas, el referente es el Espíritu Santo. La mayúscula ayuda a señalar ese referente sin añadir interpretación extra.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - habla
  lexicon: BDAG
  rationale: El presente de λέγω se expresa con el presente simple «dice», que es idiomático y suficiente en español para la fórmula de revelación.
- source_word: ταῖς ἐκκλησίαις
  english_pob_choice: to the churches
  chosen_spanish: a las iglesias
  alternatives_spanish:
  - a las congregaciones
  - a las asambleas
  lexicon: BDAG
  rationale: «Iglesias» es la equivalencia más transparente y natural en español para el destinatario colectivo de estas cartas. «Asambleas» es posible, pero en este contexto apocalíptico y epistolar sería menos reconocible.
theological_decisions:
- issue: Referencia de «el Espíritu»
  english_pob_reading: the Holy Spirit speaking to the churches
  chosen_spanish_reading: el Espíritu Santo hablando a las iglesias
  alternative_spanish_readings:
  - un espíritu humano
  - el espíritu de profecía en sentido no personal
  rationale: La fórmula recurrente de Apocalipsis 2–3 apunta al Espíritu Santo como el que habla a las iglesias por medio del mensaje profético. La traducción mantiene ese referente sin introducir terminología confesional ajena al texto.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Valor de la fórmula exhortativa
  english_pob_reading: let him hear
  chosen_spanish_reading: oiga
  alternative_spanish_readings:
  - que oiga
  - escuche
  rationale: Se conserva la exhortación directa y proverbial del texto, que llama no solo a oír auditivamente sino a atender con obediencia.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto concuerda estrechamente con el pasaje griego y con el registro formulístico del inglés POB. No se observaron revisiones aplicadas en el historial más reciente; por ello se preserva la estructura proverbial estándar sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por el referente al Espíritu Santo en la fórmula de Apocalipsis.
  - Se prefiere «iglesias» sobre «asambleas» por claridad de recepción, aunque se documenta la alternativa.
  - La exhortación «oiga» mantiene el valor imperativo y la resonancia bíblica de la fórmula repetida.
