translation:
  language: es
  text: ¡Mira![a] Estoy en la puerta y llamo. Si alguno oye mi voz y abre la puerta, entraré[b] y cenaré con él[c], y él conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí, he estado en la puerta y estoy llamando». El griego usa un perfecto con fuerza presente y un presente, destacando una postura y una acción en curso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entraré a él». La forma griega expresa una dirección personal y relacional, no solo la entrada a un lugar.'
    reason: lexical_alternative
  - marker: c
    text: La imagen de la comida expresa comunión íntima y mutua. Los intérpretes difieren en si alude específicamente a la Cena del Señor, a la conversión o a la comunión restaurada; el texto no lo decide de manera explícita.
    reason: cross_reference
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira!
  - ¡Mira aquí!
  - ¡He aquí!
  lexicon: BDAG
  rationale: Es una partícula de llamado de atención. «¡Mira!» transmite la inmediatez en español actual mejor que una fórmula más arcaica, y conserva el tono directo del original.
- source_word: ἕστηκα
  english_pob_choice: I stand
  chosen_spanish: estoy
  alternatives_spanish:
  - estoy
  - permanezco en pie
  - he estado
  lexicon: BDAG
  rationale: 'El perfecto griego tiene fuerza estativa presente: no describe una acción pasada aislada, sino una postura vigente. En español, «estoy» con complemento de lugar comunica naturalmente esa postura continua; el texto completo ya aporta la imagen de posición junto a la puerta.'
- source_word: ἐπὶ τὴν θύραν
  english_pob_choice: at the door
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta
  - junto a la puerta
  - a la puerta
  lexicon: BDAG
  rationale: Con θύρα, la idea es de ubicación relativa al acceso. «En la puerta» es idiomático en español y mantiene la escena sin literalidad torpe.
- source_word: κρούω
  english_pob_choice: knock
  chosen_spanish: llamo
  alternatives_spanish:
  - llamo
  - golpeo
  - estoy llamando
  lexicon: BDAG
  rationale: El verbo griego expresa golpear para pedir entrada. En español, «llamo» funciona de modo natural para una puerta y evita una dureza excesiva; como el verso ya dice que está en la puerta, la acción queda clara. «Estoy llamando» sería posible, pero menos sobrio.
- source_word: ἐάν τις
  english_pob_choice: If anyone
  chosen_spanish: Si alguno
  alternatives_spanish:
  - Si alguno
  - Si alguien
  - Quienquiera que
  lexicon: BDAG
  rationale: La forma indefinida es inclusiva. «Si alguno» conserva bien el matiz abierto y no introduce restricciones de género.
- source_word: ἀκούσῃ τῆς φωνῆς μου
  english_pob_choice: hears my voice
  chosen_spanish: oye mi voz
  alternatives_spanish:
  - oye mi voz
  - escucha mi voz
  - oye el sonido de mi voz
  lexicon: BDAG
  rationale: φωνή aquí es «voz». En español, «oye mi voz» reproduce de modo directo la relación entre oír y reconocer la voz del hablante. «Escucha» podría sonar más voluntario que el griego.
- source_word: ἀνοίξῃ τὴν θύραν
  english_pob_choice: opens the door
  chosen_spanish: abre la puerta
  alternatives_spanish:
  - abre la puerta
  - abra la puerta
  lexicon: BDAG
  rationale: Es la equivalencia directa y natural del aoristo subjuntivo en la condición. «Puerta» mantiene el sustantivo del original.
- source_word: καὶ εἰσελεύσομαι πρὸς αὐτόν
  english_pob_choice: I will come in to him
  chosen_spanish: entraré a él
  alternatives_spanish:
  - entraré a él
  - entraré donde él está
  - entraré con él
  lexicon: BDAG
  rationale: El griego no solo indica entrar, sino entrar «hacia» la persona, preservando un movimiento relacional. «Entraré a él» reproduce esa dirección personal mejor que «entraré en su casa»; aunque suena algo breve en español, conserva el énfasis del texto.
- source_word: δειπνήσω
  english_pob_choice: dine
  chosen_spanish: cenaré
  alternatives_spanish:
  - cenaré
  - tomaré la cena
  - compartiré la comida
  lexicon: BDAG
  rationale: δειπνέω se refiere al alimento principal, a menudo la comida de la noche. «Cenaré» es natural, digno y comunica la idea de comida compartida. Se evita «comeré» por ser demasiado genérico.
- source_word: μετ’ αὐτοῦ καὶ αὐτὸς μετ’ ἐμοῦ
  english_pob_choice: with him, and he with me
  chosen_spanish: con él, y él conmigo
  alternatives_spanish:
  - con él, y él conmigo
  - con él, y él también conmigo
  - con él, y él cenará conmigo
  lexicon: BDAG
  rationale: La segunda cláusula es elíptica pero enfática en reciprocidad. Mantenerla casi simétrica en español preserva esa mutua comunión sin completar de más lo que el griego deja abierto.
theological_decisions:
- issue: Imagen de la comida como comunión recíproca
  english_pob_reading: Rendered the imagery straightforwardly as personal table fellowship without specifying sacramental, ecclesial, or merely evangelistic meaning.
  chosen_spanish_reading: 'La imagen se traduce como comunión personal y recíproca: «cenaré con él, y él conmigo», sin precisar si alude a la Cena del Señor, a conversión o a comunión restaurada.'
  alternative_spanish_readings:
  - alusión sacramental a la Cena del Señor
  - metáfora de conversión/iniciación
  - metáfora de comunión restaurada
  rationale: El texto presenta una intimidad mutua real, pero no identifica explícitamente el marco teológico de la comida. La traducción conserva la tensión interpretativa en vez de resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se eliminó «then» para una redacción más natural sin cambiar el sentido. En español, por sintaxis, la condición ya fluye naturalmente sin un equivalente explícito de «entonces».'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se prefirió «cenaré» para δειπνήσω por su naturalidad y por conservar el sentido de comida principal/fellowship.
  - Se mantuvo la relación personal «con él, y él conmigo» para reflejar la reciprocidad enfática del griego.
  - Se evitó añadir explicaciones doctrinales al texto principal; las notas preservan la ambigüedad interpretativa documentada.
