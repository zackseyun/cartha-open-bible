  text: ἰδοὺ ἕστηκα ἐπὶ τὴν θύραν καὶ κρούω· ἐάν τις ἀκούσῃ τῆς φωνῆς μου καὶ ἀνοίξῃ τὴν θύραν, ⸀καὶ εἰσελεύσομαι πρὸς αὐτὸν καὶ δειπνήσω μετ’ αὐτοῦ καὶ αὐτὸς μετ’ ἐμοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/020.yaml
  text: Look[a], I stand at the door and knock. If anyone hears my voice and opens the door, I will come in to him and dine with him[c][b], and he with me.
  footnotes:
  - marker: a
    text: Or 'Behold, I have stood at the door and am knocking.' The Greek uses a perfect verb ('have stood') with present force and a present verb ('am knocking'), emphasizing an ongoing posture and action.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will enter to him.' The wording 'come in to him' preserves the personal, relational force of the Greek, not merely entry into a place.
    reason: lexical_alternative
  - marker: c
    text: The meal imagery expresses intimate mutual fellowship. Interpreters differ on whether it alludes specifically to the Lord's Supper, to conversion, or to restored communion; the text itself does not explicitly decide the question.
    reason: cross_reference
