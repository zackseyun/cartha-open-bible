translation:
  language: es
  text: 'Y escribe al ángel[b] de la iglesia en Filadelfia: Estas cosas dice el Santo, el Verdadero, el que tiene la llave de David[a], el que abre y nadie cerrará, y el que cierra y nadie abre:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘La llave de David’ probablemente alude a Isaías 22:22, imagen de autoridad real para abrir y cerrar.
    reason: cross_reference
  - marker: b
    text: O ‘mensajero’ para ἀγγέλῳ.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγέλῳ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: El término griego puede significar tanto un ser celestial como un mensajero humano. Siguiendo el audit trail en inglés, 'ángel' conserva la fórmula repetida de Apocalipsis sin forzar una interpretación no explícita en el texto.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: En la dirección a las siete comunidades, ἐκκλησία designa la comunidad cristiana reunida. 'Iglesia' es el equivalente natural y claro en español.
- source_word: Τάδε λέγει
  english_pob_choice: These things says
  chosen_spanish: Estas cosas dice
  alternatives_spanish:
  - Así dice
  - Esto dice
  lexicon: BDAG
  rationale: La construcción reproduce el tono profético y conserva el demostrativo plural de τάδε. 'Estas cosas dice' mantiene mejor la cadencia y el valor formal del griego que una reformulación más fluida.
- source_word: ὁ ἅγιος
  english_pob_choice: the Holy One
  chosen_spanish: el Santo
  alternatives_spanish:
  - el Santo Uno
  - el santo
  lexicon: BDAG
  rationale: El artículo con adjetivo funciona como título. 'El Santo' preserva la titulatura sin añadir explicaciones. En español evita la rigidez de 'el Santo Uno' y mantiene la referencia personal implícita.
- source_word: ὁ ἀληθινός
  english_pob_choice: the True One
  chosen_spanish: el Verdadero
  alternatives_spanish:
  - el verdadero
  - el Verdadero Uno
  - el verdadero y genuino
  lexicon: BDAG
  rationale: ἀληθινός en contexto joánico suele significar verdadero, real, genuino. 'El Verdadero' conserva el valor titular y la solemnidad del giro, sin reducirlo solo a 'veraz'.
- source_word: κλεῖν Δαυίδ
  english_pob_choice: the key of David
  chosen_spanish: la llave de David
  alternatives_spanish:
  - la clave de David
  - la llave de David
  lexicon: BDAG
  rationale: En español, 'llave' es la forma más natural para el objeto físico y simbólico; 'clave' puede sonar más abstracto y menos acorde al emblema de autoridad. Se conserva la imagen bíblica de soberanía davídica sin interpretarla en el cuerpo del texto.
- source_word: ἀνοίγων
  english_pob_choice: who opens
  chosen_spanish: el que abre
  alternatives_spanish:
  - quien abre
  - el que está abriendo
  lexicon: BDAG
  rationale: El participio presente funciona como descripción continua del sujeto. 'El que abre' es la equivalencia española más natural y conserva la serie de títulos/atributos.
- source_word: κλείσει
  english_pob_choice: will shut
  chosen_spanish: cerrará
  alternatives_spanish:
  - volverá a cerrar
  - va a cerrar
  lexicon: BDAG
  rationale: El futuro simple expresa adecuadamente la acción resultante y el valor de imposibilidad del complemento negativo. 'Cerrará' comunica el sentido con naturalidad en español.
- source_word: κλείων
  english_pob_choice: who shuts
  chosen_spanish: el que cierra
  alternatives_spanish:
  - quien cierra
  - el que está cerrando
  lexicon: BDAG
  rationale: Como con ἀνοίγων, el participio se vierte con una relativa natural en español. 'El que cierra' mantiene el paralelismo con 'el que abre'.
- source_word: ἀνοίγει
  english_pob_choice: opens
  chosen_spanish: abre
  alternatives_spanish:
  - abrirá
  - está abriendo
  lexicon: BDAG
  rationale: 'El presente se traduce con presente simple en español para reproducir la serie aspectual y el paralelismo antitético: abre/cierra y nadie puede oponerse.'
theological_decisions:
- issue: Títulos cristológicos ὁ ἅγιος, ὁ ἀληθινός
  english_pob_reading: 'Rendered as direct divine/messianic titles of the risen Jesus: ''the Holy One, the True One.'''
  chosen_spanish_reading: 'Se rinden como títulos directos del Jesús resucitado: ''el Santo, el Verdadero''.'
  alternative_spanish_readings:
  - '''el santo, el verdadero'' en minúsculas'
  - '''el Santo Uno, el Verdadero Uno'''
  rationale: El hablante inmediato es Cristo en la carta a Filadelfia, y las construcciones con artículo y adjetivo funcionan como títulos solemnes. Mantener la mayúscula inicial ayuda a reflejar su valor titular sin añadir contenido doctrinal extratextual.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Calcedonia (451)
- issue: Alusión en 'la llave de David'
  english_pob_reading: Preserved the Isaianic-Davidic royal authority allusion in the main text without expanding it interpretively.
  chosen_spanish_reading: 'Se conserva en el texto principal la imagen de autoridad davídica: ''la llave de David''.'
  alternative_spanish_readings:
  - '''la autoridad sobre la casa de David'''
  - '''el poder de abrir y cerrar de David'''
  rationale: La expresión probablemente alude a Isaías 22:22. La traducción debe preservar la imagen bíblica en lugar de sustituirla por una explicación interpretativa. La nota puede señalar la referencia sin borrar la tensión lexical entre llave literal y autoridad simbólica.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de alusiones bíblicas'
translation_notes:
  revision_awareness: El audit trail en inglés no muestra cambios aplicados en esta pasaje; se conserva la lectura óptima con el mismo perfil retórico y teológico, trasladando al español el valor titular de ὁ ἅγιος / ὁ ἀληθινός, la imagen davídica y la alternancia aspectual de abrir/cerrar sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino explícito.
  - Se eligió 'ángel' de manera consistente con la fórmula de las siete cartas, dejando 'mensajero' como alternativa en nota.
  - '''El Santo'' y ''el Verdadero'' mantienen mayúscula titular para reflejar el uso cristológico solemne del griego.'
  - Se prefirió 'llave' sobre 'clave' para conservar la imaginería concreta de autoridad.
  - Se mantuvo el paralelismo verbal 'abre/cierra' y el futuro 'cerrará' para reflejar la secuencia griega sin suavizarla.
