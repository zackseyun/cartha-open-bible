  language: en
  yaml_path: translation/nt/revelation/003/007.yaml
  text: 'And write to the angel of the church in Philadelphia: These things says the Holy One[a], the True One, the one who has the key of David, who opens and no one will shut[b], and who shuts and no one opens:'
