translation:
  language: es
  text: 'Y escribe al ángel[a] de la iglesia en Laodicea: Así dice el Amén, el testigo fiel y verdadero, el principio[b] de la creación de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero» de la iglesia en Laodicea.
    reason: lexical_alternative
  - marker: b
    text: O «el origen de la creación de Dios» o «el soberano sobre la creación de Dios». El término griego archē puede significar «principio/comienzo», «origen» o «gobernante».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγέλῳ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el marco de las siete iglesias, el término se conserva como designación estable del destinatario; en español, «ángel» mantiene la forma tradicional del encabezado sin cerrar la posibilidad de «mensajero», que sigue siendo interpretativamente viable.
- source_word: Τάδε
  english_pob_choice: These things
  chosen_spanish: Así
  alternatives_spanish:
  - Esto es lo que
  - Tal
  lexicon: BDAG
  rationale: «Así dice» reproduce de manera natural la fórmula profética del griego y evita una construcción demasiado pesada en español, sin perder la solemnidad del anuncio.
- source_word: ὁ Ἀμήν
  english_pob_choice: the Amen
  chosen_spanish: el Amén
  alternatives_spanish:
  - el Verdadero
  lexicon: BDAG
  rationale: Se conserva «Amén» como título cristológico distintivo y no como simple respuesta litúrgica, porque el texto lo usa con valor nominal y con resonancia de certeza y verdad.
- source_word: μάρτυς
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - mártir
  - testificante
  lexicon: BDAG
  rationale: «Testigo» es el equivalente natural en español para el sentido forense y revelatorio del término; «mártir» sería demasiado específico y «testificante» resultaría artificial.
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: «Fiel» conserva el valor de confiabilidad personal y de fidelidad pactal en un título cristológico, con un registro natural en español bíblico contemporáneo.
- source_word: ἀληθινός
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - genuino
  - real
  lexicon: BDAG
  rationale: «Verdadero» se acopla con «fiel» de forma idiomática y mantiene la idea joánica de lo plenamente conforme a la realidad, sin introducir una paráfrasis.
- source_word: ἀρχή
  english_pob_choice: beginning
  chosen_spanish: principio
  alternatives_spanish:
  - comienzo
  - origen
  - ruler
  lexicon: BDAG
  rationale: «Principio» es una traducción directa y digna que preserva la amplitud semántica de ἀρχή sin resolver en el texto principal si se trata de comienzo, origen o autoridad; en español también permite conservar la tensión teológica documentada.
- source_word: κτίσεως
  english_pob_choice: creation
  chosen_spanish: creación
  alternatives_spanish:
  - criación
  - creado orden
  lexicon: BDAG
  rationale: «Creación» es el equivalente estándar y preciso para κτίσις aquí, y funciona naturalmente con el genitivo que sigue.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - perteneciente a Dios
  lexicon: BDAG
  rationale: El genitivo se vierte de manera directa como «de Dios», que es claro, sobrio y fiel al vínculo sintáctico del griego.
theological_decisions:
- issue: Sentido de ἡ ἀρχὴ τῆς κτίσεως τοῦ θεοῦ en un título cristológico
  english_pob_reading: the beginning of the creation of God
  chosen_spanish_reading: el principio de la creación de Dios
  alternative_spanish_readings:
  - el origen de la creación de Dios
  - el soberano sobre la creación de Dios
  rationale: Se preserva en el texto principal la lectura más directa y menos interpretativa. Dado que ἀρχή admite varias posibilidades, la traducción no decide de forma explícita entre comienzo, origen o autoridad. Esto conserva la tensión lexical-teológica del pasaje y evita que el español cierre una discusión que el original deja abierta.
  doctrine_reference: Translation philosophy §3; Affirmations (Nicene Creed, Chalcedon)
translation_notes:
  revision_awareness: La traducción sigue el estado revisado más reciente del expediente, que indica que no se requieren cambios adicionales y que el acuerdo con la revisión fue alto. Se ha mantenido la línea de traducción óptima-equivalente, preservando la ambigüedad documentada de ἀρχή en el texto principal y explicándola en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce una máscara litúrgica equivalente a «SEÑOR».
  - «Amén» se conserva como título, no como mera exclamación litúrgica.
  - «Testigo fiel y verdadero» reproduce la coordinación del griego y su cadencia joánica.
  - La puntuación respeta el estilo de encabezamiento profético en español y separa claramente la cita introductoria del título cristológico.
