  rationale: La revisión corrige un punto de claridad y fidelidad en «del cielo de parte de mi Dios», que comunica mejor la doble relación expresada por ἐκ ... ἀπό, y añade la nota omitida sobre la negación enfática. El resto del borrador está sólidamente alineado con el griego y con las decisiones auditadas del POB.
