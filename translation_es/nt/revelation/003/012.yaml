translation:
  language: es
  text: El que vence[a]—a ese lo haré una columna en el templo de mi Dios, y nunca más saldrá de allí[b]. Y escribiré sobre él el nombre de mi Dios, y el nombre de la ciudad de mi Dios, la nueva Jerusalén, la cual desciende del cielo de parte de mi Dios, y mi propio nombre nuevo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que conquista». El verbo νικάω es un término recurrente en Apocalipsis para la victoria fiel.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ciertamente nunca saldrá más», una negación enfática en griego.
    reason: lexical_alternative
  - marker: c
    text: O «mi nuevo nombre». La redacción griega es enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νικῶν
  english_pob_choice: The one who conquers
  chosen_spanish: El que vence
  alternatives_spanish:
  - El que conquista
  - El que sale vencedor
  - El que sobrevive
  lexicon: BDAG
  rationale: El participio presente se usa sustantivamente; en Apocalipsis νικάω es un término recurrente para la victoria fiel. «El que vence» conserva esa forma representativa y es idiomático en español bíblico sin perder la fuerza del verbo.
- source_word: ποιήσω
  english_pob_choice: I will make
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo convertiré en
  - lo haré llegar a ser
  lexicon: BDAG
  rationale: Con el predicativo στῦλον, el sentido es de hacer/constituir. «Lo haré» permite que la imagen de transformación o designación quede implícita en español sin añadir una explicación que el griego no exige.
- source_word: στῦλον
  english_pob_choice: a pillar
  chosen_spanish: una columna
  alternatives_spanish:
  - un pilar
  - una columna de soporte
  lexicon: BDAG
  rationale: Se conserva la imagen arquitectónica literal. «Columna» es natural en español y comunica bien la idea de permanencia y honor; «pilar» también sería posible, pero «columna» suena más sobrio en este contexto.
- source_word: ἐν τῷ ναῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  lexicon: BDAG
  rationale: ναός señala el templo/santuario en sentido específico. «Templo» es la opción más clara y natural en español, y mantiene la relación posesiva «de mi Dios».
- source_word: ἔξω οὐ μὴ ἐξέλθῃ ἔτι
  english_pob_choice: he will never go out from it anymore
  chosen_spanish: nunca más saldrá de allí
  alternatives_spanish:
  - no saldrá jamás de allí
  - nunca volverá a salir de allí
  lexicon: BDAG
  rationale: La combinación οὐ μή con aoristo subjuntivo expresa negación enfática. «Nunca más» comunica bien la fuerza y la finalidad de la promesa; «de allí» explicita el referente implícito en el contexto.
- source_word: γράψω ἐπ’ αὐτὸν
  english_pob_choice: I will write on him
  chosen_spanish: escribiré sobre él
  alternatives_spanish:
  - inscribiré sobre él
  - escribiré encima de él
  lexicon: BDAG
  rationale: γράφω con ἐπί indica escribir/inscribir sobre una persona o cosa. «Sobre él» conserva la literalidad y evita precisar más de lo que el texto dice.
- source_word: τὸ ὄνομα τοῦ θεοῦ μου
  english_pob_choice: the name of my God
  chosen_spanish: el nombre de mi Dios
  alternatives_spanish:
  - el nombre de mi Dios y Señor
  - el nombre de mi Dios
  lexicon: BDAG
  rationale: «Nombre» mantiene el peso bíblico de identidad, pertenencia y representación. Se preserva «mi Dios» sin suavizar la repetición, porque el griego la repite de manera explícita y significativa.
- source_word: τὸ ὄνομα τῆς πόλεως τοῦ θεοῦ μου
  english_pob_choice: the name of the city of my God
  chosen_spanish: el nombre de la ciudad de mi Dios
  alternatives_spanish:
  - el nombre de la ciudad de mi Dios
  lexicon: BDAG
  rationale: La estructura paralela se conserva de forma literal para mantener el énfasis en los tres nombres. «La ciudad de mi Dios» reproduce con claridad la relación posesiva.
- source_word: τῆς καινῆς Ἰερουσαλήμ
  english_pob_choice: the new Jerusalem
  chosen_spanish: la nueva Jerusalén
  alternatives_spanish:
  - Nueva Jerusalén
  lexicon: BDAG
  rationale: El artículo y el adjetivo se vierten naturalmente como «la nueva Jerusalén». Se prefiere minúscula en «nueva» porque funciona como adjetivo, no como parte fija del nombre propio.
- source_word: ἡ καταβαίνουσα
  english_pob_choice: which comes down
  chosen_spanish: la cual desciende
  alternatives_spanish:
  - que desciende
  - la que baja
  lexicon: BDAG
  rationale: El participio atributivo se traduce de modo relativo. «La cual desciende» conserva el matiz descriptivo y suena más solemne que una forma más coloquial.
- source_word: ἐκ τοῦ οὐρανοῦ ἀπὸ τοῦ θεοῦ μου
  english_pob_choice: out of heaven from my God
  chosen_spanish: del cielo, de mi Dios
  alternatives_spanish:
  - desde el cielo, de mi Dios
  - del cielo y de mi Dios
  lexicon: BDAG
  rationale: 'Se mantienen ambas preposiciones en español con dos complementos: origen «del cielo» y fuente «de mi Dios». No se agrega «desde» porque «del» ya comunica adecuadamente el origen en español.'
- source_word: τὸ ὄνομά μου τὸ καινόν
  english_pob_choice: my own new name
  chosen_spanish: mi propio nombre nuevo
  alternatives_spanish:
  - mi nuevo nombre
  - mi propio nombre nuevo
  lexicon: BDAG
  rationale: La estructura enfática con artículo y posesivo se refleja con «mi propio». «Nombre nuevo» respeta el orden natural del español y conserva la ambigüedad reverente del texto sin definir el contenido del nombre.
theological_decisions:
- issue: Forma masculina singular del vencedor
  english_pob_reading: Use 'him' in the main text
  chosen_spanish_reading: Usar «él»/«lo» en singular masculino implícito
  alternative_spanish_readings:
  - quien vence
  - la persona que vence
  - ellos
  rationale: El griego usa formas masculinas singulares y un participio masculino sustantivado. En español se mantiene la referencia singular masculina sin neutralizarla, preservando la correspondencia gramatical y la forma representativa del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Repetición de «mi Dios» en la boca del Cristo exaltado
  english_pob_reading: Preserve 'my God' four times exactly
  chosen_spanish_reading: Preservar «mi Dios» en cada ocurrencia
  alternative_spanish_readings:
  - su Dios
  - mi Dios (repetido solo parcialmente)
  rationale: La repetición es explícita en el griego y forma parte de la tensión cristológica del texto. No debe suavizarse ni armonizarse en español; conservarla permite que el lector reciba la formulación del pasaje tal como está.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Nombre nuevo final
  english_pob_reading: my own new name
  chosen_spanish_reading: mi propio nombre nuevo
  alternative_spanish_readings:
  - mi nuevo nombre
  - el nombre nuevo que es mío
  rationale: La construcción enfatiza posesión y novedad sin revelar el contenido del nombre. «Mi propio nombre nuevo» conserva esa fuerza enfática y evita una interpretación especulativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del testimonio inglés: no se registraron cambios en la última pasada y el acuerdo de verificación fue alto. La redacción española sigue esa misma lectura, conservando la repetición de «mi Dios», la negación enfática y la clausura con el nombre nuevo sin añadir explicaciones doctrinales que el texto no exige.'
  spanish_consistency_notes:
  - Se mantiene la terminología pactual y reverente con «Dios» y «templo», sin sustituir «Yahvé» porque el griego cita θεός, no el tetragrámaton.
  - «Columna» se usa por naturalidad en español, aunque «pilar» también sería posible; se conserva la imagen arquitectónica literal.
  - Se evita la mayúscula innecesaria en «nueva Jerusalén», siguiendo el valor adjetival de καινῆς.
  - La puntuación con raya ayuda a reflejar el énfasis y la cadencia del original sin añadir contenido.
  - Los complementos «del cielo, de mi Dios» preservan ambas relaciones de origen/fuente presentes en ἐκ y ἀπό.
