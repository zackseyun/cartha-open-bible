  text: ὁ ἀδικῶν ἀδικησάτω ἔτι, καὶ ὁ ῥυπαρὸς ⸀ῥυπαρευθήτω ἔτι, καὶ ὁ δίκαιος δικαιοσύνην ποιησάτω ἔτι, καὶ ὁ ἅγιος ἁγιασθήτω ἔτι.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/022/011.yaml
  text: Let the one who does wrong still do wrong[a], and the filthy still be filthy, and the righteous still practice righteousness[c][b], and the holy still be made holy.
  footnotes:
  - marker: a
    text: Or 'the filthy still be filthy.' The Greek verb is passive ('be made filthy'), but some translations smooth it to an intransitive English expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the righteous still do justice.' The noun δικαιοσύνη can also be rendered 'justice,' though 'righteousness' is the default rendering here.
    reason: lexical_alternative
  - marker: c
    text: Or 'the holy still be sanctified.' The Greek verb means 'be made holy' or 'be sanctified.'
    reason: lexical_alternative
