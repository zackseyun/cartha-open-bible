translation:
  language: es
  text: El que hace mal, siga haciendo mal; y el inmundo[a], siga siendo inmundo; y el justo, siga practicando la justicia[b], y el santo, siga siendo santo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sea hecho inmundo» o «sea contaminado». El verbo griego es pasivo («ser hecho inmundo/contaminado»), aunque aquí se expresa en español con la forma más natural «siga siendo inmundo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «siga haciendo justicia». δικαιοσύνη también puede traducirse como «justicia» o «rectitud» según el contexto; aquí «la justicia» mantiene bien el paralelismo con «el justo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «sea santificado» o «sea hecho santo». El verbo griego es pasivo y puede expresar que alguien es hecho santo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἀδικῶν
  english_pob_choice: the one who does wrong
  chosen_spanish: el que hace mal
  alternatives_spanish:
  - el que obra injusticia
  - el malhechor
  - el injusto
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente y expresa una persona caracterizada por hacer daño o cometer injusticia. En español, 'el que hace mal' conserva el valor verbal de ἀδικέω y suena natural sin convertirlo en una etiqueta demasiado rígida.
- source_word: ἀδικησάτω
  english_pob_choice: let ... do wrong
  chosen_spanish: siga haciendo mal
  alternatives_spanish:
  - haga mal todavía
  - siga obrando injustamente
  - continúe en injusticia
  lexicon: BDAG
  rationale: El aoristo imperativo de tercera persona pide una forma exhortativa. En español, 'siga haciendo mal' reproduce la fuerza de continuidad de ἔτι y mantiene el aspecto verbal sin volverlo mera predicción.
- source_word: ὁ ῥυπαρός
  english_pob_choice: the filthy
  chosen_spanish: el inmundo
  alternatives_spanish:
  - el impuro
  - el contaminado
  - el sucio
  lexicon: BDAG
  rationale: El adjetivo sustantivado apunta a suciedad moral/ritual, no solo a suciedad física. 'Inmundo' preserva esa carga bíblica y el paralelismo fuerte del versículo, aunque en español es un término más marcado que 'sucio'.
- source_word: ῥυπαρευθήτω
  english_pob_choice: be filthy
  chosen_spanish: siga siendo inmundo
  alternatives_spanish:
  - sea inmundo
  - permanezca inmundo
  - siga en su inmundicia
  lexicon: BDAG
  rationale: El verbo es pasivo; el inglés POB suavizó el pasivo a 'be filthy' por estilo. En español, 'siga siendo inmundo' mantiene la continuidad de ἔτι y evita forzar una pasiva artificial, a la vez que conserva la idea de persistencia en el estado descrito.
- source_word: ὁ δίκαιος
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  lexicon: BDAG
  rationale: El adjetivo sustantivado se vierte de manera estándar como 'el justo'. En español es breve, bíblico y conserva el contraste moral del pasaje.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió 'righteousness', en español 'justicia' comunica mejor la dimensión ética y covenantal de δικαιοσύνη sin perder el paralelismo con 'el justo'. Aquí también evita una repetición demasiado abstracta.
- source_word: ποιησάτω
  english_pob_choice: practice
  chosen_spanish: siga practicando
  alternatives_spanish:
  - haga
  - practique
  - obre
  lexicon: BDAG
  rationale: Con δικαιοσύνην, 'practicar la justicia' es una equivalencia idiomática natural en español y conserva la idea de conducta concreta. El añadido de 'siga' refleja ἔτι y la continuidad del acto.
- source_word: ὁ ἅγιος
  english_pob_choice: the holy
  chosen_spanish: el santo
  alternatives_spanish:
  - el consagrado
  - el santo varón
  lexicon: BDAG
  rationale: El adjetivo sustantivado se traduce literalmente. 'El santo' mantiene la concisión y el paralelismo con las otras tres cláusulas.
- source_word: ἁγιασθήτω
  english_pob_choice: be made holy
  chosen_spanish: siga siendo santificado
  alternatives_spanish:
  - sea santificado
  - permanezca santificado
  - siga siendo hecho santo
  lexicon: BDAG
  rationale: El aoristo pasivo de ἁγιάζω conserva un matiz pasivo que el español puede expresar con 'santificado'. 'Siga siendo santificado' mantiene la voz pasiva y la continuidad implícita, sin imponer una solución doctrinal adicional.
theological_decisions:
- issue: Fuerza imperativa y tono judicial final
  english_pob_reading: Render the forms as imperatives ('Let ...') rather than indicatives.
  chosen_spanish_reading: Verterlos como exhortaciones/imperativos de tercera persona ('siga...') y no como meras afirmaciones predictivas.
  alternative_spanish_readings:
  - el que hace mal seguirá haciendo mal
  - el injusto será injusto todavía
  - que el que hace mal haga mal todavía
  rationale: Los verbos griegos son imperativos de tercera persona. En español, una forma con 'siga' conserva la fuerza exhortativa y el carácter solemne del cierre escatológico, sin convertir el texto en una simple predicción ni sugerir aprobación del mal.
  doctrine_reference: Preservar la tensión teológica del texto sin suavizarla.
- issue: Pasividad de ῥυπαρευθήτω y ἁγιασθήτω
  english_pob_reading: Preserve the passive voice in English ('be filthy,' 'be made holy').
  chosen_spanish_reading: Conservar la pasividad mediante 'siga siendo inmundo' y 'siga siendo santificado', evitando una paráfrasis activa.
  alternative_spanish_readings:
  - sea inmundo
  - sea santificado
  - permanezca inmundo
  - permanezca santificado
  rationale: La pasividad griega es relevante. En español, una construcción con 'ser + participio' preserva ese matiz sin sonar forzada. 'Siga siendo' añade continuidad por ἔτι y respeta la tensión textual sobre la agencia implícita.
  doctrine_reference: Preservar la tensión teológica del texto sin resolver la agencia implícita.
translation_notes:
  revision_awareness: 'La redacción toma en cuenta la revisión inglesa más reciente, que prefirió ''be filthy'' en lugar de ''be made filthy'' para ῥυπαρευθήτω, mientras mantuvo ''be made holy'' para ἁγιασθήτω. En español se decide no nivelar ambas cláusulas: se preserva la pasividad de las dos con formulaciones naturales (''siga siendo inmundo'', ''siga siendo santificado'') y se refuerza la continuidad expresada por ἔτι. También se respeta la estructura paralela de las cuatro cláusulas y el cierre solemne del versículo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se evita 'Cristo' porque no hay Χριστός en el pasaje.
  - '''Justicia'' se usa para δικαιοσύνη por coherencia bíblica y por la nota de alternativa lexical.'
  - '''Santificado'' conserva el valor pasivo de ἁγιασθήτω y encaja mejor que una forma puramente adjetival.'
  - La puntuación mantiene la parataxis repetitiva del griego con comas y punto y coma para la tercera cláusula.
