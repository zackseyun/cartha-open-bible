translation:
  language: es
  text: Y me mostró un río del agua de la vida, brillante como cristal[a], que fluía desde el trono de Dios y del Cordero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el cristal».
    reason: lexical_alternative
  - marker: b
    text: O «que procede del trono de Dios y del Cordero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδειξέν
  english_pob_choice: showed
  chosen_spanish: mostró
  alternatives_spanish:
  - reveló
  - enseñó
  lexicon: BDAG
  rationale: El aoristo de δείκνυμι expresa aquí la acción de hacer ver en la visión; «mostró» es natural en español y conserva el carácter narrativo sin añadir interpretación.
- source_word: μοι
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Dativo indirecto simple; «me» es la equivalencia más directa y fluida en español.
- source_word: ποταμὸν
  english_pob_choice: a river
  chosen_spanish: un río
  alternatives_spanish:
  - el río
  - un arroyo
  lexicon: BDAG
  rationale: ποταμός nombra un río; el artículo indefinido en español mantiene la indefinición natural del acusativo anartro y evita sobreespecificar.
- source_word: ὕδατος ζωῆς
  english_pob_choice: of the water of life
  chosen_spanish: de agua de vida
  alternatives_spanish:
  - de agua viva
  - de agua que da vida
  lexicon: BDAG
  rationale: Se conserva la cadena genitiva de modo formal. «Agua de vida» sigue de cerca la imagen sin convertirla en paráfrasis interpretativa.
- source_word: λαμπρὸν
  english_pob_choice: bright
  chosen_spanish: brillante
  alternatives_spanish:
  - resplandeciente
  - radiante
  - claro
  lexicon: BDAG
  rationale: λαμπρός denota brillo o resplandor; «brillante» comunica bien esa cualidad en español moderno y evita reducir la imagen a transparencia.
- source_word: ὡς κρύσταλλον
  english_pob_choice: as crystal
  chosen_spanish: como cristal
  alternatives_spanish:
  - como el cristal
  - cual cristal
  lexicon: BDAG
  rationale: ὡς introduce comparación; «como cristal» es idiomático y preserva la metáfora sin explicarla de más.
- source_word: ἐκπορευόμενον
  english_pob_choice: flowing out
  chosen_spanish: que fluía
  alternatives_spanish:
  - que salía
  - que procedía
  lexicon: BDAG
  rationale: El participio presente describe el movimiento continuo del río; «que fluía» transmite esa imagen con naturalidad en español. La preposición posterior completa la idea de origen.
- source_word: ἐκ τοῦ θρόνου
  english_pob_choice: from the throne
  chosen_spanish: desde el trono
  alternatives_spanish:
  - del trono
  - fuera del trono
  lexicon: BDAG
  rationale: ἐκ marca origen o procedencia. «Desde el trono» comunica con claridad el punto de procedencia en español.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: Genitivo posesivo/de relación directo; «de Dios» es la equivalencia estándar y fiel.
- source_word: τοῦ ἀρνίου
  english_pob_choice: of the Lamb
  chosen_spanish: y del Cordero
  alternatives_spanish:
  - y del Cordero de Dios
  lexicon: BDAG
  rationale: ἀρνίον en Apocalipsis funciona como título cristológico fijo; «Cordero» preserva la imagen apocalíptica y sacrificial establecida en español bíblico.
theological_decisions:
- issue: Trono singular compartido por Dios y el Cordero
  english_pob_reading: from the throne of God and of the Lamb
  chosen_spanish_reading: desde el trono de Dios y del Cordero
  alternative_spanish_readings:
  - desde los tronos de Dios y del Cordero
  - desde el trono perteneciente a Dios y al Cordero
  rationale: El griego presenta un solo trono con genitivos coordinados. La traducción conserva esa singularidad sin resolverla ni multiplicar el trono, manteniendo la fuerza teológica del texto.
  doctrine_reference: Apocalipsis 22:1; Credo Niceno-constantinopolitano (381); Definición de Calcedonia (451)
- issue: Relación entre el flujo del río y su origen
  english_pob_reading: flowing out from the throne
  chosen_spanish_reading: que fluía desde el trono
  alternative_spanish_readings:
  - que procedía del trono
  - que salía del trono
  rationale: El participio debe reflejar movimiento continuo y origen. «Que fluía desde» mantiene ambas cosas sin convertir la imagen en explicación doctrinal.
  doctrine_reference: Revelación 22:1; principio de conservar la tensión literaria del símbolo
translation_notes:
  revision_awareness: El borrador sigue de cerca la base griega y el audit trail en inglés. Se mantuvo la estructura de visión, el genitivo «de agua de vida», la comparación «como cristal» y la procedencia única desde el trono singular de Dios y del Cordero. No se detectaron revisiones posteriores que alteraran la decisión de traducción.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Cordero» para ἀρνίον, conservando el título cristológico apocalíptico.
  - Se mantiene «trono» en singular para respetar el griego.
  - «Desde» expresa procedencia de ἐκ con naturalidad en español.
  - El estilo busca ser culto y publicable, sin forzar un calco excesivo del inglés.
