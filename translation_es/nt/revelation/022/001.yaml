revisions:
- from: Y me mostró un río de agua de vida[a], brillante como cristal[b], que fluía desde el trono de Dios y del Cordero.
  to: Y me mostró un río del agua de la vida, brillante como cristal[a], que fluía desde el trono de Dios y del Cordero[b].
  rationale: 'La revisión corrige el sintagma nominal para un español más natural y fiel al genitivo encadenado griego, y reubica las notas para que correspondan a las alternativas léxicas realmente documentadas en el rastro inglés: la comparación con cristal y el participio ἐκπορευόμενον.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: «mostró», «un río», el sintagma del «trono de Dios y del Cordero» con trono singular compartido, y el participio de movimiento continuo. Sin embargo, «de agua de vida» suena poco idiomático en español y no preserva tan bien como podría la fuerza establecida de ὕδατος ζωῆς; además, la nota alternativa «de agua viva» no corresponde bien al inglés auditado, que preserva «water of life» frente a «living water».'
  spanish_quality_summary: El texto es claro y mayormente natural, pero «río de agua de vida» resulta algo forzado. «Río del agua de la vida» suena más bíblico y plenamente comprensible en español culto moderno. También conviene ajustar la nota para el participio a «que procede...» o «que salía...» según la alternativa inglesa documentada; la nota actual no está mal, pero la principal mejora necesaria es el sintagma nominal.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: «Dios», «Cordero» y la imaginería apocalíptica están bien preservados. La revisión propuesta mantiene la decisión de no paraprasear y mejora la fidelidad del genitivo encadenado sin introducir terminología ajena.'
  issues:
  - severity: medium
    issue: «de agua de vida» es poco idiomático y suena calcado
    rationale: Aunque intenta reflejar la cadena genitiva ὕδατος ζωῆς, en español la formulación más natural y fiel es «del agua de la vida» o «de agua de la vida». Esto conserva mejor la imagen bíblica sin sonar torpe.
  - severity: medium
    issue: La nota alternativa «de agua viva» desplaza el sentido hacia «living water»
    rationale: El rastro inglés explica explícitamente que «living water» es posible teológicamente, pero no es la mejor representación directa de esta construcción. En español, «agua viva» introduce esa misma desviación interpretativa.
  - severity: low
    issue: La distribución de notas en el español no sigue bien las alternativas documentadas
    rationale: La nota [a] en el inglés auditado pertenece a la comparación «like/as crystal», mientras que la [b] pertenece al participio «proceeding». En español conviene conservar alternativas equivalentes y anclarlas en los lugares correspondientes del texto revisado.
  revised_spanish_text: Y me mostró un río del agua de la vida, brillante como cristal[a], que fluía desde el trono de Dios y del Cordero[b].
  revised_footnotes:
  - marker: a
    text: O «como el cristal».
    reason: lexical_alternative
  - marker: b
    text: O «que procede del trono de Dios y del Cordero».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el sintagma nominal para un español más natural y fiel al genitivo encadenado griego, y reubica las notas para que correspondan a las alternativas léxicas realmente documentadas en el rastro inglés: la comparación con cristal y el participio ἐκπορευόμενον.'
