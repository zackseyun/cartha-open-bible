translation:
  language: es
  text: 'Y me dijo: «Estas palabras son confiables y verdaderas, y el Señor, el Dios de los espíritus de los profetas, envió a su ángel para mostrar a sus esclavos[b] lo que debe suceder pronto[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que debe suceder rápidamente». La frase griega puede enfatizar tanto la cercanía temporal («pronto») como la rapidez de la realización («rápidamente»).
    reason: alternative_reading
  - marker: b
    text: O «siervos» o «servidores» para «esclavos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτοι οἱ λόγοι πιστοὶ καὶ ἀληθινοί
  english_pob_choice: These words are trustworthy and true
  chosen_spanish: Estas palabras son confiables y verdaderas
  alternatives_spanish:
  - Estas palabras son fieles y verdaderas
  - Estas palabras son dignas de confianza y verdaderas
  lexicon: BDAG
  rationale: πιστοί en predicación de λόγοι expresa fiabilidad; en español, «confiables» comunica mejor esa cualidad que «fieles», que suena más natural para personas que para palabras. ἀληθινοί se vierte como «verdaderas» para mantener la pareja semántica sin sobrecargar el texto.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino en aposición con «Dios»; «Señor» preserva el valor bíblico-teológico usual en español y suena natural en este contexto.
- source_word: θεὸς τῶν πνευμάτων τῶν προφητῶν
  english_pob_choice: the God of the spirits of the prophets
  chosen_spanish: el Dios de los espíritus de los profetas
  alternatives_spanish:
  - el Dios que inspira a los profetas
  - el Dios de los espíritus proféticos
  lexicon: BDAG
  rationale: Se conserva la estructura genitiva con una traducción formal. «Espíritus» mantiene la literalidad de πνευμάτων sin resolver de antemano si se trata del principio espiritual de los profetas o de espíritus en relación con ellos.
- source_word: ἀπέστειλεν τὸν ἄγγελον αὐτοῦ
  english_pob_choice: sent his angel
  chosen_spanish: envió a su ángel
  alternatives_spanish:
  - envió a su mensajero
  lexicon: BDAG
  rationale: En Apocalipsis, ἄγγελος normalmente designa un ser celestial; «ángel» preserva ese valor apocalíptico mejor que «mensajero».
- source_word: δεῖξαι
  english_pob_choice: to show
  chosen_spanish: para mostrar
  alternatives_spanish:
  - para revelar
  - para hacer ver
  lexicon: BDAG
  rationale: «Mostrar» es el equivalente directo de δείκνυμι y encaja con el marco visionario sin introducir una interpretación adicional.
- source_word: τοῖς δούλοις αὐτοῦ
  english_pob_choice: his slaves
  chosen_spanish: a sus esclavos
  alternatives_spanish:
  - a sus siervos
  - a sus servidores
  lexicon: BDAG
  rationale: Se mantiene «esclavos» porque el proyecto POB reserva ese término para δοῦλος cuando la pertenencia vinculante a Dios es teológicamente relevante. «Siervos» suavizaría una fuerza lexical que el texto conserva.
- source_word: ἃ δεῖ γενέσθαι
  english_pob_choice: what must happen
  chosen_spanish: lo que debe suceder
  alternatives_spanish:
  - lo que tiene que ocurrir
  - las cosas que deben acontecer
  lexicon: BDAG
  rationale: La fórmula se naturaliza en español con «debe suceder», preservando la necesidad divina de δεῖ y el carácter eventivo de γενέσθαι.
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - en breve
  lexicon: BDAG
  rationale: «Pronto» expresa la cercanía temporal que el contexto de Apocalipsis enfatiza. Se evita «rápidamente» en el cuerpo por su posible lectura modal, aunque esa tensión queda reconocida en la nota.
theological_decisions:
- issue: Valor de ἐν τάχει en un dicho apocalíptico
  english_pob_reading: soon
  chosen_spanish_reading: pronto
  alternative_spanish_readings:
  - rápidamente
  - en breve
  rationale: La expresión puede señalar cercanía temporal o rapidez de ejecución. El contexto de Apocalipsis favorece la inminencia; por eso el texto principal dice «pronto», sin eliminar la ambigüedad semántica.
  doctrine_reference: Preservar la tensión interpretativa sobre la inminencia escatológica sin resolverla en exceso.
- issue: Traducción de δοῦλοι aplicado al pueblo de Dios
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: El español admite «esclavos» como equivalente fuerte de δοῦλος. Dado que el texto subraya pertenencia y obediencia a Dios, la elección conserva la fuerza del término en lugar de suavizarla con una opción tradicional.
  doctrine_reference: Política léxica del POB para δοῦλος; mantener el peso teológico de la pertenencia.
- issue: Título divino κύριος junto a θεός
  english_pob_reading: the Lord, the God of the spirits of the prophets
  chosen_spanish_reading: el Señor, el Dios de los espíritus de los profetas
  alternative_spanish_readings:
  - el Señor Dios de los espíritus de los profetas
  rationale: Se conserva la aposición y la separación retórica entre «Señor» y «Dios», reflejando la sintaxis griega y su solemnidad.
  doctrine_reference: Cristología y teología bíblica del título κύριος como designación divina.
translation_notes:
  revision_awareness: La base inglesa tuvo una oscilación editorial entre «slaves» y «servants» y luego se revirtió para restaurar «slaves» por fidelidad a δοῦλος. La versión española sigue la lectura restaurada y mantiene la misma tensión interpretativa sobre ἐν τάχει que el expediente inglés preserva en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo original lo exige; aquí el griego tiene κύριος y el contexto apocalíptico favorece «Señor».
  - «Espíritus» se conserva en plural para reflejar el genitivo plural griego sin resolver la relación exacta.
  - «Esclavos» se usa de forma consistente para δοῦλος conforme a la política del proyecto y al expediente inglés restaurado.
