  text: Καὶ ⸀εἶπέν μοι· Οὗτοι οἱ λόγοι πιστοὶ καὶ ἀληθινοί, καὶ ⸀ὁ κύριος, ὁ θεὸς τῶν πνευμάτων τῶν προφητῶν, ἀπέστειλεν τὸν ἄγγελον αὐτοῦ δεῖξαι τοῖς δούλοις αὐτοῦ ἃ δεῖ γενέσθαι ἐν τάχει·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/022/006.yaml
  text: And he said to me[a], “These words are trustworthy and true, and the Lord, the God of the spirits of the prophets[b], sent his angel to show his slaves what must happen soon.”
  footnotes:
  - marker: a
    text: Or “what must happen quickly.” The Greek phrase can emphasize either nearness in time (“soon”) or rapidity of occurrence (“quickly”).
    reason: alternative_reading
  - marker: b
    text: Or “servants” or “bondservants” for “slaves.”
    reason: lexical_alternative
