review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: preserva la negación futura de πᾶν κατάθεμα, mantiene el singular de «el trono», conserva «Dios y del Cordero», y retiene la tensión teológica de los pronombres singulares en la última cláusula. También acierta al traducir δοῦλοι como «esclavos», conforme a la política del proyecto. Sin embargo, el añadido inicial «Y» delante de «ya no habrá» no corresponde necesariamente al mejor español en continuidad discursiva, y la nota de alternativa para δοῦλοι usa «criados», que no es una alternativa adecuada en registro bíblico ni refleja bien el campo semántico documentado.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un ajuste menor para sonar más natural y preciso en español bíblico moderno. «Ya no habrá más maldición» funciona bien; «el trono de Dios y del Cordero estará en ella» también. «Sus esclavos lo adorarán» es fiel, aunque la nota explicativa debe pulirse. La principal mejora es eliminar «Y» al inicio para evitar una coordinación innecesariamente pesada, y reemplazar «criados» por «servidores» o mantener solo alternativas más aceptables.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: θεός → «Dios», ἀρνίον → «Cordero», δοῦλος → «esclavos». No aparece YHWH ni Mesías aquí. La elección de «adorarán» para λατρεύσουσιν es defendible y está respaldada por nota alternativa. El único desajuste léxico relevante es incluir «criados» como alternativa de δοῦλοι, lo cual no concuerda bien con la rationale inglesa ni con el estilo del proyecto.'
  issues:
  - severity: medium
    issue: Conjunción inicial «Y» innecesaria al comienzo del versículo
    rationale: El griego inicia con καὶ, pero en español no siempre conviene reproducir cada coordinación inicial. «Ya no habrá más maldición» suena más natural y no pierde contenido.
  - severity: medium
    issue: La alternativa «criados» para δοῦλοι es inadecuada
    rationale: «Criados» introduce un matiz doméstico y social más estrecho que no corresponde bien al valor léxico y teológico de δοῦλοι en este contexto. «Siervos» o «servidores» serían alternativas aceptables si se desea conservar nota.
  - severity: low
    issue: La razón de la nota b puede expresarse con mayor precisión en español
    rationale: «Su reino compartido» interpreta un poco más allá del wording griego. «Su gobierno compartido» o «su autoridad compartida» se ajusta mejor a la imagen del trono.
