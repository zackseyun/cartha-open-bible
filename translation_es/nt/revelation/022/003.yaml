translation:
  language: es
  text: Ya no habrá[a] más maldición. Y el trono de Dios y del Cordero estará en ella, y sus esclavos lo adorarán[b][c][d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosa maldita» o «algo maldito».
    reason: lexical_alternative
  - marker: b
    text: 'El griego tiene lenguaje singular: «el trono» de «Dios y del Cordero» ... «sus esclavos lo adorarán», preservando tanto la distinción entre Dios y el Cordero como su gobierno compartido.'
    reason: theological_note
  - marker: c
    text: O «siervos» o «servidores».
    reason: lexical_alternative
  - marker: d
    text: O «servirán» o «rendirán servicio sagrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν κατάθεμα
  english_pob_choice: any curse
  chosen_spanish: maldición
  alternatives_spanish:
  - cosa maldita
  - algo maldito
  - cualquier maldición
  lexicon: BDAG
  rationale: En este contexto apocalíptico, κατάθεμα apunta al estado o efecto de estar bajo maldición, en contraste con la nueva creación sin maldición. 'Maldición' comunica de forma natural esa idea en español y mantiene la conexión con la desaparición de la maldición; las alternativas más concretas quedan posibles, pero aquí sonarían menos fluidas.
- source_word: οὐκ ἔσται ἔτι
  english_pob_choice: there will no longer be
  chosen_spanish: ya no habrá
  alternatives_spanish:
  - no existirá más
  - no habrá ya
  - ya no existirá
  lexicon: BDAG
  rationale: La construcción futura existencial se vuelve con naturalidad a 'ya no habrá', que conserva el sentido de cesación definitiva y el matiz de ἔτι ('más / todavía').
- source_word: θρόνος
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento real
  - trono real
  lexicon: BDAG
  rationale: '''Trono'' es la equivalencia directa y conserva la imagen de autoridad soberana presente en el texto.'
- source_word: τοῦ θεοῦ καὶ τοῦ ἀρνίου
  english_pob_choice: of God and of the Lamb
  chosen_spanish: de Dios y del Cordero
  alternatives_spanish:
  - de Dios y del Cordero de Dios
  - de Dios y del Cordero sacrificial
  lexicon: BDAG
  rationale: '''Dios'' y ''Cordero'' conservan la coordinación explícita del griego. ''Cordero'' es el término establecido para ἀρνίον en Apocalipsis y mantiene la imagen sacrificial y mesiánica sin forzar una glosa.'
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en la ciudad
  - en la Nueva Jerusalén
  lexicon: BDAG
  rationale: El pronombre femenino singular se refiere a la ciudad antecedente; 'en ella' preserva ese antecedente sin añadir una explicitación que el griego no exige.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  - servidores
  lexicon: BDAG
  rationale: Se conserva 'esclavos' para mantener la fuerza léxica de δοῦλος y la pertenencia total al Señor. 'Siervos' suavizaría el término y perdería parte de su carga semántica y doctrinal.
- source_word: λατρεύσουσιν
  english_pob_choice: will worship
  chosen_spanish: adorarán
  alternatives_spanish:
  - servirán
  - prestarán culto
  - rendirán servicio sagrado
  lexicon: BDAG
  rationale: En este contexto de trono y presencia divina, λατρεύω tiene un sentido cultual. 'Adorarán' comunica de forma clara y natural la reverencia religiosa dirigida a Dios y al Cordero; 'servirán' o 'prestarán culto' serían posibles, pero menos idiomáticos aquí.
- source_word: αὐτοῦ ... αὐτῷ
  english_pob_choice: his ... him
  chosen_spanish: sus ... lo
  alternatives_spanish:
  - su ... le
  - sus ... les
  - su ... lo
  lexicon: Greek grammar / discourse context
  rationale: Aunque en español puede sonar extraño, se conserva la singularidad del referente implícito del posesivo y del objeto directo para no aplanar la tensión del griego entre 'Dios y del Cordero' y los pronombres singulares. El posesivo pluralizaría indebidamente el referente.
theological_decisions:
- issue: Tensión entre la distinción de 'Dios y del Cordero' y los pronombres singulares
  english_pob_reading: 'Retain the singulars: ''the throne ... his slaves will worship him'''
  chosen_spanish_reading: 'Mantener la referencia singular en los pronombres: ''sus esclavos lo adorarán'''
  alternative_spanish_readings:
  - '''sus esclavos los adorarán'''
  - '''sus esclavos les adorarán'''
  - parafrasear para evitar la tensión
  rationale: El griego combina dos genitivos coordinados con un solo trono y pronombres singulares. La traducción debe preservar esa tensión en vez de resolverla, porque forma parte del testimonio del texto sobre el gobierno compartido y la unidad de autoridad sin borrar la distinción entre Dios y el Cordero.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La auditoría inglesa muestra una oscilación editorial entre 'slaves' y 'servants', con restauración final de 'slaves' por política doctrinal. Por eso el español retiene 'esclavos' como equivalencia fuerte de δοῦλοι. También se evita resolver la singularidad de los pronombres griegos, manteniendo la tensión entre 'Dios y del Cordero' y 'lo/su'.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'Cordero' para ἀρνίον, en línea con la terminología POB.
  - '''Maldición'' comunica el campo semántico de κατάθεμα sin introducir una glosa interpretativa excesiva.'
  - '''Esclavos'' conserva la fuerza léxica de δοῦλος, conforme a la política POB documentada.'
  - Se mantiene 'en ella' para ἐν αὐτῇ, con antecedente femenino implícito, sin explicitar 'ciudad' para no añadir palabras no requeridas por el texto.
