translation:
  language: es
  text: La gracia del Señor Jesús sea con todos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «La gracia del Señor Jesús sea con todos los santos»; otros: «con todos ustedes».'
    reason: textual_variant
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don gracioso
  lexicon: BDAG
  rationale: En una bendición final del Nuevo Testamento, χάρις conserva su sentido teológico habitual; «gracia» es la equivalencia española más natural y fiel, sin suavizar el contenido.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: El POB en inglés traduce κύριος como 'Lord' en sentido cristológico; en español, «Señor» es el equivalente establecido y apropiado para ese título.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar al español, conforme al criterio del proyecto.
- source_word: μετὰ
  english_pob_choice: be with
  chosen_spanish: sea con
  alternatives_spanish:
  - esté con
  lexicon: BDAG
  rationale: El griego es elíptico; en español la bendición necesita un verbo copulativo implícito. «Sea con» reproduce la fuerza benedictoria de manera breve y natural.
- source_word: πάντων
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ustedes
  - todos los santos
  lexicon: BDAG
  rationale: El texto griego es amplio e indefinido. «Todos» preserva esa amplitud sin introducir explícitamente «ustedes» ni «los santos».
theological_decisions:
- issue: Alcance de πάντων en la bendición
  english_pob_reading: 'Leave the object implicit: ''with all'''
  chosen_spanish_reading: 'Dejar el objeto implícito: «con todos»'
  alternative_spanish_readings:
  - con todos ustedes
  - con todos los santos
  rationale: La lectura base del SBLGNT termina simplemente con πάντων. Mantener «todos» sin añadir un complemento explícito preserva la tensión textual y evita resolver la referencia por tradición eclesial o por armonización.
  doctrine_reference: Primacía del texto fuente; preservar variantes y ambigüedad donde el original no especifica el referente.
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego base y con la solución inglesa auditada; no se registran revisiones posteriores que alteren la forma o la decisión de traducir la benedición de manera breve y abierta.
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις y «Señor» para κύριος, en línea con el vocabulario cristológico del proyecto.
  - La nota textual se ancla en «todos» para reflejar la variante sobre el alcance del destinatario.
  - La formulación «sea con todos» conserva la elipsis benedictoria sin añadir contenido interpretativo.
