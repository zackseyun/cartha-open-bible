translation:
  language: es
  text: 'El que da testimonio de estas cosas dice[a]: «Sí, vengo pronto». Amén. Ven, Señor Jesús.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vengo rápidamente». El adverbio griego puede enfatizar tanto la cercanía en el tiempo como la rapidez de la llegada o la acción.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - está diciendo
  lexicon: BDAG
  rationale: El presente de λέγω funciona naturalmente como fórmula de introducción de habla; en español, «dice» comunica el mismo valor directo y sobrio sin elevar innecesariamente el registro.
- source_word: ὁ μαρτυρῶν
  english_pob_choice: the one who testifies
  chosen_spanish: el que da testimonio
  alternatives_spanish:
  - el que testifica
  - el testigo
  lexicon: BDAG
  rationale: El participio sustantivado conserva la referencia a una persona caracterizada por dar testimonio. «Da testimonio» mantiene el matiz legal/relacional de μαρτυρέω y suena más natural que un calco rígido.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - todo esto
  lexicon: BDAG
  rationale: El demostrativo plural apunta a las realidades recién reveladas. «Estas cosas» reproduce con claridad el plural del griego y evita reducirlo a un singular ambiguo.
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - Ciertamente
  - En efecto
  lexicon: BDAG
  rationale: Es una afirmación directa. «Sí» preserva la fuerza simple e inmediata de ναί sin añadir solemnidad interpretativa.
- source_word: ἔρχομαι
  english_pob_choice: I am coming
  chosen_spanish: vengo
  alternatives_spanish:
  - estoy viniendo
  - estoy por venir
  lexicon: BDAG
  rationale: El presente de ἔρχομαι tiene fuerza futura e inminente. En español, «vengo» puede expresar esa inminencia de manera breve y natural en contexto profético; se evita sobreexplicar con una perífrasis menos tersa.
- source_word: ταχύ
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - en breve
  lexicon: BDAG
  rationale: En este contexto escatológico, ταχύ conserva la tensión entre cercanía temporal y rapidez de llegada. «Pronto» expresa bien la inminencia en español; «rápidamente» quedaría como posibilidad semántica alternativa.
- source_word: Ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: BDAG
  rationale: Se mantiene la forma litúrgica tradicional y transparente del asentimiento final.
- source_word: ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vuelve
  - Llega
  lexicon: BDAG
  rationale: El imperativo directo al Señor Jesús pide una forma breve y natural en español. «Ven» conserva la urgencia y la sencillez del original.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Soberano
  lexicon: BDAG
  rationale: En la dirección a Jesús, κύριε funciona como título reverente ya establecido en el NT. «Señor» es la equivalencia natural y eclesialmente inteligible en español.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado de manera estándar.
theological_decisions:
- issue: Sentido de ταχύ en la promesa de la venida de Cristo
  english_pob_reading: soon, with a footnote preserving the alternative quickly
  chosen_spanish_reading: pronto, con nota que preserva la alternativa rápidamente
  alternative_spanish_readings:
  - rápidamente
  - en breve
  rationale: El adverbio puede expresar cercanía temporal o rapidez de ejecución. «Pronto» comunica mejor la expectativa escatológica en español, mientras la nota conserva la tensión semántica que el texto no resuelve.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden sustancialmente; no se registran revisiones aplicadas en el último pase, por lo que la versión española sigue de cerca la lectura establecida y conserva la ambigüedad de ταχύ mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando aparece el nombre divino explícito; aquí el pasaje no lo contiene, por lo que no aplica.
  - Se mantiene «Señor» para κύριε en la invocación a Jesús, conforme al uso neotestamentario y al patrón auditado en inglés.
  - La puntuación española adapta la cita directa a normas editoriales en español sin alterar el contenido del original.
