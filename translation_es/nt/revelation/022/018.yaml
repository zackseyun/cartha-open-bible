translation:
  language: es
  text: 'Doy testimonio[b] a todo el que oye las palabras de la profecía de este libro[a]: si alguien les añade, Dios le añadirá las plagas que están escritas en este libro[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rollo» para βιβλίον, reflejando la forma material antigua de la escritura.
    reason: lexical_alternative
  - marker: b
    text: O «doy fe de» o «testifico»; el verbo inicial es lenguaje de testimonio, no solo una advertencia genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μαρτυρῶ
  english_pob_choice: I testify
  chosen_spanish: Yo doy testimonio
  alternatives_spanish:
  - Yo testifico
  - Yo advierto
  lexicon: BDAG
  rationale: μαρτυρέω expresa lenguaje de testimonio. «Doy testimonio» conserva ese valor solemne y judicial sin convertirlo en una simple advertencia, aunque el contexto sí tiene fuerza de advertencia.
- source_word: παντὶ τῷ ἀκούοντι
  english_pob_choice: to everyone who hears
  chosen_spanish: a todo el que oye
  alternatives_spanish:
  - a todos los que oyen
  - a quien oye
  lexicon: BDAG
  rationale: 'La construcción dativa con participio se expresa naturalmente en español con un relativo: «a todo el que oye». Mantiene el sentido de receptividad auditiva del texto.'
- source_word: τοὺς λόγους
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - el mensaje
  lexicon: BDAG
  rationale: λόγοι aquí se refiere al contenido verbal de la profecía. «Palabras» es directo y fiel, y suena natural en español bíblico contemporáneo.
- source_word: τῆς προφητείας
  english_pob_choice: of the prophecy
  chosen_spanish: de la profecía
  alternatives_spanish:
  - del mensaje profético
  - de esta profecía
  lexicon: BDAG
  rationale: «Profecía» conserva la categoría apocalíptica y profética del libro sin diluirla en una formulación más interpretativa.
- source_word: τοῦ βιβλίου τούτου
  english_pob_choice: of this book
  chosen_spanish: de este libro
  alternatives_spanish:
  - de este rollo
  lexicon: BDAG
  rationale: βιβλίον puede aludir a un rollo antiguo, pero «libro» es la opción más natural y legible en español. La posible forma física alternativa queda en la nota.
- source_word: ἐάν τις ἐπιθῇ ἐπ’ αὐτά
  english_pob_choice: if anyone adds to them
  chosen_spanish: si alguien añade a ellas
  alternatives_spanish:
  - si alguien añade algo a ellas
  - si alguno les añade
  lexicon: BDAG
  rationale: ἐπιτίθημι con ἐπί + acusativo aquí significa añadir a. En español, «añade a ellas» mantiene la correspondencia con el antecedente «las palabras» y evita una paráfrasis excesiva.
- source_word: ἐπιθήσει ὁ θεὸς ἐπ’ αὐτὸν
  english_pob_choice: God will add to him
  chosen_spanish: Dios añadirá sobre él
  alternatives_spanish:
  - Dios le añadirá
  - Dios pondrá sobre él
  lexicon: BDAG
  rationale: 'Se conserva el paralelismo verbal de ἐπιτίθημι: quien «añade», Dios también «añadirá». «Sobre él» refleja el valor de ἐπί con acusativo, sin perder la simetría retórica del griego.'
- source_word: τὰς πληγὰς
  english_pob_choice: the plagues
  chosen_spanish: las plagas
  alternatives_spanish:
  - los azotes
  - las aflicciones
  lexicon: BDAG
  rationale: En Apocalipsis, πληγή suele referirse a plagas o juicios. «Plagas» preserva la resonancia interna del libro mejor que opciones más generales.
- source_word: τὰς γεγραμμένας
  english_pob_choice: that are written
  chosen_spanish: que están escritas
  alternatives_spanish:
  - que han sido escritas
  - escritas
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa el estado permanente de lo ya escrito. «Que están escritas» es idiomático y transmite esa vigencia textual.
- source_word: ἐν τῷ βιβλίῳ τούτῳ
  english_pob_choice: in this book
  chosen_spanish: en este libro
  alternatives_spanish:
  - en este rollo
  lexicon: BDAG
  rationale: Se mantiene la traducción consistente de βιβλίον como «libro» a lo largo del versículo por claridad y continuidad léxica.
theological_decisions:
- issue: 'Naturaleza del enunciado: testimonio vs. advertencia'
  english_pob_reading: Rendered the opening as 'I testify' rather than 'I warn,' allowing the warning force to arise from the content.
  chosen_spanish_reading: «Yo doy testimonio» en vez de «Yo advierto».
  alternative_spanish_readings:
  - Yo advierto a todo el que oye...
  - Yo doy testimonio y advierto a...
  rationale: El verbo griego es lenguaje de testimonio; no conviene reemplazarlo por una formulación más explícitamente interpretativa. La fuerza de advertencia queda clara por la cláusula condicional y el juicio consecuente.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción; no importar un matiz doctrinal o exhortativo que el verbo no expresa por sí mismo.
translation_notes:
  revision_awareness: Coincide con el estado revisado más reciente del expediente en inglés; no se registran cambios posteriores que afecten la decisión textual o léxica.
  spanish_consistency_notes:
  - Se mantiene «libro» para βιβλίον de manera uniforme dentro del versículo.
  - Se conserva la correspondencia verbal «añade / añadirá» para reproducir la simetría retórica del griego.
  - «Plagas» se usa en sentido apocalíptico consistente con el uso de Apocalipsis.
  - El estilo es formal y publicable, con español neutro y digno, sin arcaísmos innecesarios.
