revisions:
- from: 'Yo doy testimonio a todo el que oye las palabras de la profecía de este libro: si alguien añade a ellas[a][b], Dios añadirá sobre él las plagas que están escritas en este libro.'
  to: 'Doy testimonio[b] a todo el que oye las palabras de la profecía de este libro[a]: si alguien les añade, Dios le añadirá las plagas que están escritas en este libro[a].'
  rationale: Se corrige la colocación de las notas para que correspondan al término que explican, y se reparan dos giros poco idiomáticos («añade a ellas», «añadirá sobre él») con formulaciones naturales que preservan el sentido griego y el paralelismo retórico. También se suaviza el sujeto explícito inicial para un español más fluido sin pérdida semántica.
