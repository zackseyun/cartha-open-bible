review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mantiene el lenguaje de testimonio para Μαρτυρῶ, conserva «las palabras de la profecía de este libro», y preserva el paralelismo verbal entre «añade» y «añadirá». Sin embargo, dos formulaciones españolas no son plenamente fieles/idiomáticas: «añade a ellas» suena forzado para referirse a «las palabras», y «Dios añadirá sobre él» es poco natural en español aunque intente reflejar ἐπί; el sentido de ἐπιθήσει ἐπ’ αὐτόν se comunica mejor como «Dios le añadirá» o «Dios añadirá sobre él» solo si lo que sigue fuera más directo. La nota b además está mal anclada, porque comenta el verbo inicial pero se coloca junto a «ellas».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero hay problemas de fluidez y de colocación de notas. «Yo doy testimonio» es correcto, aunque «Doy testimonio» suena más natural sin perder énfasis. «Añade a ellas» y sobre todo «añadirá sobre él» son giros poco idiomáticos en español bíblico contemporáneo. También conviene reubicar las notas para que [b] aparezca en el verbo inicial y [a] en «libro».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεός = «Dios», βιβλίον = «libro» con alternativa «rollo», πληγαί = «plagas». No aparecen términos sensibles como Yahvé/Mesías. La decisión de mantener lenguaje de testimonio para Μαρτυρῶ sí concuerda con el rastro POB, pero la nota correspondiente debe anclarse al verbo inicial.'
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota [b]
    rationale: La nota [b] explica Μαρτυρῶ («I testify / I bear witness»), pero en el borrador está colocada después de «ellas», no junto al verbo inicial que comenta.
  - severity: medium
    issue: «añade a ellas» es español forzado
    rationale: Aunque formalmente posible, para un antecedente como «las palabras» resulta más natural y fiel en español «les añade» o «añade a ellas» solo en contextos muy enfáticos. Aquí «les añade» conserva el sentido sin paráfrasis.
  - severity: medium
    issue: «Dios añadirá sobre él» es poco idiomático
    rationale: Busca reflejar ἐπ’ αὐτόν de manera demasiado literal. En español claro y fiel, «Dios le añadirá las plagas» expresa bien el sentido y mantiene el paralelismo con «añade».
  - severity: low
    issue: «Yo doy testimonio» puede simplificarse a «Doy testimonio»
    rationale: El pronombre ἐγώ puede quedar implícito en español sin pérdida de sentido; omitir «Yo» mejora la naturalidad. No obstante, este punto es estilístico, no un error grave.
