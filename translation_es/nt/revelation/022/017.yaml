revisions:
- from: 'Y el Espíritu y la novia dicen: «Ven». Y el que oye diga: «Ven». Y el que tiene sed venga[b]; el que quiere, tome del agua de la vida gratuitamente[a].'
  to: 'Y el Espíritu y la esposa dicen: «Ven». Y el que oye diga: «Ven». Y el que tiene sed venga[b]; el que quiere[c], tome del agua de la vida gratuitamente[a].'
  rationale: Se revisa «la novia» a «la esposa» para una mejor adecuación contextual y estilística en Apocalipsis. Se conserva el resto de la estructura muy de cerca al griego y al POB inglés. Además, se añade la nota omitida para ὁ θέλων y se armoniza la nota interpretativa con la redacción principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: mantiene los dos primeros «Ven», el cambio posterior a exhortaciones en tercera persona, «el que tiene sed», «el que quiere», y «agua de la vida gratuitamente». Sin embargo, hay un desajuste importante con la decisión léxica auditada para ἡ νύμφη: el inglés POB usa «the bride», y en español «la novia» suena menos estable y menos eclesial en este contexto apocalíptico. «La esposa» preserva mejor la imagen simbólica tradicional sin expandirla. Además, falta en español la nota equivalente al inglés sobre la lectura alternativa previa relacionada con ὁ θέλων / el ámbito de la invitación, aunque el sentido principal queda bien representado.'
  spanish_quality_summary: El texto es claro y legible, con buen ritmo. «El Espíritu» está bien, y «el que tiene sed» / «tome del agua de la vida gratuitamente» suena natural. La principal mejora de calidad es reemplazar «la novia» por «la esposa», que en Apocalipsis resulta más idiomático y digno. También conviene ajustar la nota interpretativa para no introducir «al dispuesto» cuando el texto principal dice «el que quiere», y añadir la nota omitida del rastro inglés para conservar mejor la auditoría.
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: πνεῦμα -> «Espíritu», ὕδωρ ζωῆς -> «agua de la vida», δωρεάν -> «gratuitamente». No hay conflicto con Yahvé/Mesías/etc. El punto de terminología principal es νύμφη: aunque «novia» es posible, en este contexto simbólico y eclesial «esposa» alinea mejor con el registro bíblico y con la imagen de Apocalipsis sin sobreinterpretar.'
  issues:
  - severity: medium
    issue: «la novia» para ἡ νύμφη suena menos adecuado que «la esposa» en Apocalipsis 22:17
    rationale: Aunque νύμφη puede significar «novia», en la imaginería apocalíptica española «la esposa» es más natural, más digna y más reconocible eclesialmente, sin dejar de preservar el símbolo original.
  - severity: medium
    issue: Falta una nota equivalente a la nota inglesa c
    rationale: El rastro auditado en inglés preserva una alternativa/antecedente de traducción relacionada con ὁ θέλων. El español debería conservar esa transparencia documental, especialmente al usar «el que quiere», que puede beneficiarse de una aclaración alternativa como «o “el que desea”».
  - severity: low
    issue: La nota b dice «al dispuesto», pero el texto principal dice «el que quiere»
    rationale: No es un error grave de sentido, pero sí una pequeña incoherencia interna entre el texto y la glosa explicativa. Conviene armonizar la nota con el wording español revisado.
  revised_spanish_text: 'Y el Espíritu y la esposa dicen: «Ven». Y el que oye diga: «Ven». Y el que tiene sed venga[b]; el que quiere[c], tome del agua de la vida gratuitamente[a].'
  revised_footnotes:
