translation:
  language: es
  text: 'Y el Espíritu y la esposa dicen: «Ven». Y el que oye diga: «Ven». Y el que tiene sed venga[b]; el que quiere[c], tome del agua de la vida gratuitamente[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin costo» o «como regalo».
    reason: lexical_alternative
  - marker: b
    text: Las dos primeras llamadas, «Ven», suelen entenderse como un clamor por la venida del Señor; luego las cláusulas siguientes invitan al sediento y al que quiere venir y recibir vida.
    reason: alternative_reading
  - marker: c
    text: O «el que desea».
    reason: previous_rendering
lexical_decisions:
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En este contexto de Apocalipsis, πνεῦμα con artículo se entiende con naturalidad como el Espíritu Santo. En español se conserva la mayúscula para reflejar ese sentido referencial sin añadir una glosa interpretativa.
- source_word: ἡ νύμφη
  english_pob_choice: the bride
  chosen_spanish: la novia
  alternatives_spanish:
  - la esposa
  - la novia/novia simbólica
  lexicon: BDAG
  rationale: νύμφη puede traducirse como ‘novia’ o ‘esposa’ según contexto. Se mantiene el término imagístico más cercano y transparente; en este pasaje apocalíptico conserva la imagen simbólica sin resolverla en el texto principal.
- source_word: λέγουσιν
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  lexicon: BDAG
  rationale: El presente se expresa naturalmente con presente simple en español, manteniendo el tono de proclamación continua sin forzar una perífrasis.
- source_word: Ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - ¡Ven!
  lexicon: BDAG
  rationale: El imperativo directo se reproduce con una forma breve e idiomática. La puntuación ya transmite la fuerza exhortativa.
- source_word: ὁ ἀκούων
  english_pob_choice: the one who hears
  chosen_spanish: el que oye
  alternatives_spanish:
  - el que escucha
  - quien oye
  lexicon: BDAG
  rationale: El participio articular se vierte con una construcción genérica singular natural en español. ‘Oye’ preserva la forma compacta del griego.
- source_word: εἰπάτω
  english_pob_choice: let ... say
  chosen_spanish: diga
  alternatives_spanish:
  - que diga
  - diga, pues
  lexicon: BDAG
  rationale: El imperativo aoristo en tercera persona se expresa con un subjuntivo exhortativo natural en español, equivalente a ‘let ... say’.
- source_word: ὁ διψῶν
  english_pob_choice: the one who is thirsty
  chosen_spanish: el que tiene sed
  alternatives_spanish:
  - el sediento
  - quien tiene sed
  lexicon: BDAG
  rationale: ‘Tener sed’ comunica el participio con claridad idiomática y mantiene la imagen de necesidad/deseo sin sonar técnico.
- source_word: ἐρχέσθω
  english_pob_choice: let ... come
  chosen_spanish: venga
  alternatives_spanish:
  - que venga
  - venga, entonces
  lexicon: BDAG
  rationale: La forma exhortativa se adapta al español con un imperativo de tercera persona natural y fiel al valor hortatorio.
- source_word: ὁ θέλων
  english_pob_choice: the one who desires
  chosen_spanish: el que quiere
  alternatives_spanish:
  - el que desea
  - el que está dispuesto
  lexicon: BDAG
  rationale: θέλω puede expresar querer o desear. Se prefirió ‘quiere’ por su naturalidad en español y porque deja abierta la dirección del deseo sin añadir un objeto implícito.
- source_word: λαβέτω
  english_pob_choice: let ... take
  chosen_spanish: tome
  alternatives_spanish:
  - reciba
  - que tome
  lexicon: BDAG
  rationale: λαμβάνω aquí conserva el matiz de tomar/recibir con una invitación. ‘Tome’ mantiene la paridad verbal con el griego y la imagen de apropiarse del don ofrecido.
- source_word: ὕδωρ ζωῆς
  english_pob_choice: the water of life
  chosen_spanish: del agua de la vida
  alternatives_spanish:
  - agua de vida
  - el agua viva
  lexicon: BDAG
  rationale: 'Se conserva la construcción genitiva de forma directa: ‘agua de la vida’. No se opta por ‘agua viva’ porque cambiaría la sintaxis y podría alterar la relación con ζωή.'
- source_word: δωρεάν
  english_pob_choice: freely
  chosen_spanish: gratuitamente
  alternatives_spanish:
  - libremente
  - sin costo
  - como regalo
  lexicon: BDAG
  rationale: δωρεάν significa ‘sin costo’, ‘gratuitamente’ o ‘de balde’. ‘Gratuitamente’ preserva tanto la gratuidad como la claridad moderna en español.
theological_decisions:
- issue: Destinatario de los dos primeros «Ven»
  english_pob_reading: The repeated “Come” is left textually open, preserving the likely layered sense that the Spirit and the bride address the Lord, while the hearer joins that cry and the thirsty person is then invited to come for life.
  chosen_spanish_reading: Se mantiene abierto a quién se dirige el doble «Ven», preservando la posibilidad de que el Espíritu y la novia clamen al Señor, mientras el que oye se une al llamado y luego se invita al sediento a venir por la vida.
  alternative_spanish_readings:
  - Todos los «Ven» se dirigen explícitamente a Jesús.
  - Solo el último «venga» se dirige al sediento.
  rationale: El griego repite el imperativo primero y luego cambia a imperativos en tercera persona para el sediento y el que quiere. La traducción conserva esa tensión literaria y teológica sin resolverla con un objeto explícito que el texto no da.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Sentido simbólico de «la novia»
  english_pob_reading: Retain the symbolic term 'the bride' without interpretive expansion in the main text.
  chosen_spanish_reading: Se conserva el término simbólico «la novia» sin expandirlo en el texto principal.
  alternative_spanish_readings:
  - la iglesia
  - el pueblo de Dios
  - la nueva Jerusalén
  rationale: Apocalipsis usa imágenes superpuestas deliberadamente. Traducir el símbolo sin explicarlo mantiene la transparencia textual y evita introducir interpretación extra en el cuerpo del versículo.
  doctrine_reference: Primacía del texto original sobre la tradición interpretativa; preservar la tensión teológica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que prefirió 'desires' para θέλων; en español se optó por «el que quiere» como equivalente natural y compacto. También se respetó la tensión del doble «Ven» sin identificar explícitamente su destinatario, y se evitó resolver la imagen de «la novia».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene «Espíritu» con mayúscula por referencia al Espíritu Santo, y «novia» como imagen simbólica sin glosa.
  - Se traduce δωρεάν con «gratuitamente» para conservar la gratuidad, reservando «sin costo» como alternativa anotada.
  - Se evita «Cristo» porque el verso no contiene Χριστός y la tradición litúrgica no exige esa sustitución aquí.
  - Se conserva la secuencia verbal compacta del griego con exhortaciones breves y paralelas en español.
