translation:
  language: es
  text: 'Y me dice: «No selles[a] las palabras de la profecía de este libro[c], porque el tiempo está cerca[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «No selles» o «No mantengas en secreto»; la expresión evoca el lenguaje profético sobre una revelación cerrada o dejada abierta.
    reason: lexical_alternative
  - marker: b
    text: O «porque el momento señalado está cerca». El griego καιρός puede significar un tiempo decisivo o designado.
    reason: lexical_alternative
  - marker: c
    text: Compárese con Daniel 12:4, donde se manda sellar la profecía; aquí la orden es la contraria.
    reason: cross_reference
lexical_decisions:
- source_word: λέγει μοι
  english_pob_choice: he says to me
  chosen_spanish: me dice
  alternatives_spanish:
  - me dijo
  lexicon: BDAG
  rationale: 'El presente griego narrativo λέγει se conserva mejor en español con presente: «me dice». Mantiene la viveza del relato y refleja el valor aspectual del texto fuente.'
- source_word: Μὴ σφραγίσῃς
  english_pob_choice: Do not seal up
  chosen_spanish: No selles
  alternatives_spanish:
  - No selles el contenido
  - No guardes en secreto
  lexicon: BDAG
  rationale: σφραγίζω significa sellar, cerrar o dejar bajo resguardo. En este contexto profético, el sentido principal es no cerrar ni ocultar el mensaje; «No selles» es breve, fiel y natural en español.
- source_word: τοὺς λόγους
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las palabras dichas
  - el mensaje
  lexicon: BDAG
  rationale: 'λόγοις/λόγους aquí se mantiene en forma concreta como plural: «las palabras». Aunque «mensaje» sería posible, suaviza demasiado la forma plural del griego.'
- source_word: τῆς προφητείας
  english_pob_choice: of the prophecy
  chosen_spanish: de la profecía
  alternatives_spanish:
  - de esta profecía
  - del mensaje profético
  lexicon: BDAG
  rationale: El genitivo es directo y se traduce con precisión como «de la profecía». Es una formulación transparente y fiel al encadenamiento nominal del original.
- source_word: τοῦ βιβλίου τούτου
  english_pob_choice: of this book
  chosen_spanish: de este libro
  alternatives_spanish:
  - de este rollo
  - de este escrito
  lexicon: BDAG
  rationale: βιβλίον puede ser libro o rollo; en español, «libro» es la opción más natural y comprensible sin introducir una interpretación histórica innecesaria. «Este libro» conserva el deíctico del griego.
- source_word: ὁ καιρὸς
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento señalado
  - el tiempo señalado
  lexicon: BDAG
  rationale: καιρός puede expresar tiempo decisivo o señalado. «El tiempo» mantiene la traducción directa y deja abierta la fuerza escatológica del término, como en la nota inglesa.
- source_word: ἐγγύς ἐστιν
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - está a la mano
  lexicon: BDAG
  rationale: ἐγγύς significa cercano, próximo. «Está cerca» es la forma más clara y natural en español contemporáneo, sin perder la inminencia expresada por el griego.
theological_decisions:
- issue: Inminencia escatológica sin resolver el alcance de καιρός
  english_pob_reading: for the time is near
  chosen_spanish_reading: porque el tiempo está cerca
  alternative_spanish_readings:
  - porque el momento señalado está cerca
  - porque el tiempo señalado está cerca
  rationale: La frase conserva la afirmación de cercanía sin especificar más de lo que el texto dice. No se atenúa la inminencia ni se fuerza una cronología detallada; se mantiene la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión apocalíptica del texto sin reinterpretarla.
- issue: Contraste implícito con Daniel 12:4 sobre sellar la profecía
  english_pob_reading: Compare Daniel 12:4, where the prophecy is told to be sealed; here the command is the opposite.
  chosen_spanish_reading: La orden es la contraria a sellar la profecía.
  alternative_spanish_readings:
  - Contrasta con Daniel 12:4, donde la profecía debía ser sellada.
  - Aquí ocurre lo opuesto a Daniel 12:4.
  rationale: Aunque el contraste con Daniel 12:4 no está explícito en el versículo, es una tensión interpretativa documentada por la tradición auditada del POB. Conviene preservarla como nota de relación intertextual, no incorporarla al texto principal.
  doctrine_reference: Intertextualidad profética con Daniel 12:4.
translation_notes:
  revision_awareness: Se siguió el contexto auditado de la versión inglesa del POB, que conserva el presente narrativo, traduce σφραγίζω como «seal up» y nota la ambigüedad de καιρός. No se requirieron revisiones posteriores según el registro disponible.
  spanish_consistency_notes:
  - Se mantiene un registro formal y eclesial, pero con sintaxis española natural.
  - Se evita «SEÑOR» o sustituciones no presentes en el texto.
  - «Tiempo» conserva la ambigüedad escatológica de καιρός; la nota a[b] explicita la alternativa sin imponerla.
  - «No selles» preserva la fuerza verbal del imperativo negativo mejor que fórmulas más explicativas.
