  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: la prohibición elíptica Ὅρα μή se vierte idiomáticamente; σύνδουλος conserva la subordinación; se mantienen «tus hermanos los profetas», «los que guardan las palabras de este libro» y la orden final «Adora a Dios». Sin embargo, «Yo soy un esclavo como tú» no preserva del todo la relación comparativa de σύνδουλος («compañero/fellow slave»), y la nota a sobre «O: “me dice”» no funciona como alternativa real porque el texto ya dice «me dice».'
  spanish_quality_summary: El español es claro y legible, pero «un esclavo como tú» suena algo forzado y menos preciso que «un compañero de esclavitud» o mejor «un coesclavo tuyo». En registro bíblico natural, «soy coesclavo tuyo» comunica mejor el vínculo compartido bajo el mismo amo sin perder fuerza léxica. También conviene simplificar la puntuación en la serie coordinada.
  glossary_alignment: Se alinea bien con el glosario del proyecto en θεός -> «Dios» y en la preferencia por lenguaje de δοῦλος como «esclavo». No hay términos que exijan cambio doctrinal, pero para σύνδουλος la formulación española debe reflejar más explícitamente el matiz de «fellow slave» documentado por el POB.
  issues:
  - severity: medium
    issue: «un esclavo como tú» debilita el matiz de σύνδουλος
    rationale: σύνδουλος no significa simplemente que el ángel sea esclavo y Juan también, sino que ambos comparten la misma condición bajo un mismo amo. La decisión inglesa «fellow slave» pide una formulación española más relacional, como «coesclavo tuyo».
  - severity: low
