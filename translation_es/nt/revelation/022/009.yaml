revisions:
- from: 'Y me dice[a]: «No hagas eso[b]. Yo soy un esclavo[c] como tú, y como tus hermanos los profetas, y como los que guardan las palabras de este libro[d]. ¡Adora a Dios!»'
  to: 'Y me dice[a]: «No hagas eso[b]. Soy coesclavo tuyo[c], y de tus hermanos los profetas, y de los que guardan las palabras de este libro[d]. ¡Adora a Dios!»'
  rationale: La revisión es menor pero necesaria para ajustar mejor el matiz léxico central de σύνδουλος según la auditoría inglesa y la política del proyecto sobre δοῦλος. «Soy coesclavo tuyo» preserva mejor la idea de subordinación compartida bajo Dios que «Yo soy un esclavo como tú», a la vez que suena suficientemente natural en español bíblico moderno. También se corrigen y depuran las notas para que aporten información real y estén plenamente en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:38:44Z'
