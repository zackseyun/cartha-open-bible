  text: καὶ λέγει μοι· Ὅρα μή· σύνδουλός σού εἰμι καὶ τῶν ἀδελφῶν σου τῶν προφητῶν καὶ τῶν τηρούντων τοὺς λόγους τοῦ βιβλίου τούτου· τῷ θεῷ προσκύνησον.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/022/009.yaml
  text: And he says to me[a], “Do not do that! I am a fellow slave with you and with your brothers the prophets, and with those who keep the words of this book[c][b]. Worship God.”
  footnotes:
  - marker: a
    text: Or, 'I am a fellow servant with you.' The Greek term denotes shared slave-status under a master; here it emphasizes that the angel, like John, is under God and therefore not to be worshiped.
    reason: lexical_alternative
  - marker: b
    text: The prohibition is elliptical in Greek, literally 'See not' or 'Watch out, no'; the sense is 'Do not do that,' referring to John's attempted worship of the angel.
    reason: lexical_alternative
  - marker: c
    text: 'Compare Revelation 19:10, where the angel gives the same correction: ''Worship God.'''
    reason: cross_reference
