translation:
  language: es
  text: 'Y me dice[a]: «No hagas eso[b]. Soy coesclavo tuyo[c], y de tus hermanos los profetas, y de los que guardan las palabras de este libro[d]. ¡Adora a Dios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa presente histórico («dice»), que se conserva para mantener el tono narrativo vivo.
    reason: spanish_style_note
  - marker: b
    text: La prohibición griega es elíptica, literalmente algo como «Mira, no»; el sentido en contexto es «No hagas eso», refiriéndose al intento de adorar al ángel.
    reason: lexical_alternative
  - marker: c
    text: 'O: «soy un compañero de esclavitud contigo». El griego σύνδουλος señala condición compartida de esclavo bajo un mismo amo, no solo servicio en general.'
    reason: lexical_alternative
  - marker: d
    text: 'Compárese Apocalipsis 19:10, donde el ángel da la misma corrección: «¡Adora a Dios!»'
    reason: cross_reference
lexical_decisions:
- source_word: Ὅρα μή
  english_pob_choice: Do not do that!
  chosen_spanish: No hagas eso
  alternatives_spanish:
  - No lo hagas
  - Mira que no
  - Ten cuidado; no
  lexicon: BDAG
  rationale: La expresión griega es una prohibición abrupta y el contexto muestra que responde al intento de adorar al ángel. En español, «No hagas eso» comunica de manera natural la acción implícita sin endurecer el sentido ni volverlo mecánico.
- source_word: σύνδουλός
  english_pob_choice: fellow slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - consiesoervo
  - compañero de servicio
  lexicon: BDAG
  rationale: σύνδουλος expresa condición compartida de esclavo bajo un mismo amo. Dado el criterio del proyecto para δοῦλος cuando la subordinación es central, «esclavo» preserva mejor la fuerza lexical y teológica que «siervo».
- source_word: ἀδελφῶν σου
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus hermanos y hermanas
  - tus correligionarios
  - tus creyentes
  lexicon: BDAG
  rationale: El griego usa plural masculino y el sentido directo es «hermanos». Mantenerlo así respeta la forma del texto y evita ampliar el referente más allá de lo que el griego explicita.
- source_word: τῶν προφητῶν
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - que son profetas
  - profetas
  lexicon: BDAG
  rationale: La frase especifica o identifica a esos hermanos como profetas. «Los profetas» reproduce con naturalidad esa relación sin añadir glosa innecesaria.
- source_word: τηρούντων
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - observan
  - obedecen
  - mantienen
  lexicon: BDAG
  rationale: En Apocalipsis, con «las palabras», τηρέω puede implicar conservar fielmente y obedecer. «Guardan» conserva el vínculo con el lenguaje joánico y evita reducir el sentido solo a «obedecer».
- source_word: λόγους
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el mensaje
  - las declaraciones
  - los dichos
  lexicon: BDAG
  rationale: λόγοι aquí se refiere al contenido verbal de la profecía/libro. «Las palabras» es la correspondencia más directa y transparente para el lector español.
- source_word: βιβλίου τούτου
  english_pob_choice: this book
  chosen_spanish: este libro
  alternatives_spanish:
  - este rollo
  - este volumen
  lexicon: BDAG
  rationale: βιβλίον puede remitir a un rollo antiguo, pero el referente inmediato en español se entiende bien como «libro». Mantenerlo así favorece claridad sin perder el vínculo con el texto apocalíptico.
- source_word: τῷ θεῷ προσκύνησον
  english_pob_choice: Worship God
  chosen_spanish: ¡Adora a Dios!
  alternatives_spanish:
  - ¡Rinde culto a Dios!
  - ¡Postraos ante Dios!
  - ¡Adora a Dios solamente!
  lexicon: BDAG
  rationale: προσκυνέω en Apocalipsis designa adoración/homenaje reverente, y el contraste aquí es con la adoración indebida al ángel. «Adora a Dios» transmite bien la fuerza religiosa y la corrección del ángel en español actual.
theological_decisions:
- issue: Cómo traducir σύνδουλος sin suavizar la condición de subordinación
  english_pob_reading: Use 'fellow slave' rather than 'fellow servant.'
  chosen_spanish_reading: Usar «esclavo» para conservar la idea de condición compartida bajo un mismo Amo divino.
  alternative_spanish_readings:
  - siervo
  - co-siervo
  - compañero de servicio
  rationale: La escena depende de que el ángel rechaza cualquier honor recibido como si fuera digno de adoración. «Esclavo» deja visible la relación de dependencia y evita borrar la tensión lexical que el texto subraya.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table on δοῦλος
- issue: Cómo verter la prohibición elíptica Ὅρα μή
  english_pob_reading: Explicitly render the implied action as 'Do not do that!'
  chosen_spanish_reading: Expresar la acción implícita como «No hagas eso».
  alternative_spanish_readings:
  - 'No'
  - No lo hagas
  - Mira que no
  rationale: El griego es abrupto y el contexto aclara que la acción prohibida es adorar al ángel. En español, explicitarla de forma idiomática hace legible la reprensión sin añadir contenido doctrinal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
- issue: Mantener la distinción entre adoración indebida y adoración debida
  english_pob_reading: Worship God.
  chosen_spanish_reading: «¡Adora a Dios!» como orden final y contraste con la tentativa de venerar al mensajero.
  alternative_spanish_readings:
  - ¡Rinde culto a Dios!
  - ¡Postraos ante Dios!
  rationale: 'El punto teológico es exclusivo: el mensajero rechaza la adoración y la redirige a Dios. «Adora a Dios» es natural, directo y suficientemente fuerte para preservar esa exclusividad.'
  doctrine_reference: Apoc. 19:10; doctrina bíblica de la adoración debida solo a Dios
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés quedó sin cambios y con alta concordancia; este borrador español sigue ese estado sin introducir revisiones textuales independientes.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός según el estándar del proyecto.
  - Se eligió «esclavo» para σύνδουλος por coherencia con la terminología doctrinal del proyecto sobre δοῦλος cuando la subordinación es central.
  - «Guardar» para τηρέω preserva el vínculo joánico con el lenguaje de observar/fielmente retener las palabras.
  - Se evitó «SEÑOR» porque el texto no contiene κύριος; el mandato final se dirige explícitamente a Dios.
