translation:
  language: es
  text: Y he aquí[a], vengo pronto. Bienaventurado el que guarda las palabras de la profecía de este libro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mira' o 'miren'. El griego puede funcionar como llamado de atención solemne.
    reason: lexical_alternative
  - marker: b
    text: O 'este rollo'.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - miren
  lexicon: BDAG
  rationale: Conserva la fuerza deíctica y exhortativa del marcador discursivo sin sonar forzado en español bíblico contemporáneo.
- source_word: ἔρχομαι
  english_pob_choice: I am coming
  chosen_spanish: vengo
  alternatives_spanish:
  - estoy viniendo
  - vengo hacia ustedes
  lexicon: BDAG
  rationale: El presente con valor futurista/imminente se expresa con el presente simple en español, más natural y fiel al efecto de inminencia.
- source_word: ταχύ
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de inmediato
  lexicon: BDAG
  rationale: En este contexto la referencia principal es temporal; 'pronto' comunica cercanía. Se evita fijar solo el matiz de modo ('rápidamente'), aunque sigue siendo una posibilidad léxica.
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - dichoso
  - feliz
  lexicon: BDAG
  rationale: Mantiene el peso escatológico y litúrgico de la bienaventuranza sin reducirlo a un estado emocional.
- source_word: ὁ τηρῶν
  english_pob_choice: the one who keeps
  chosen_spanish: el que guarda
  alternatives_spanish:
  - el que observa
  - el que obedece
  lexicon: BDAG
  rationale: '''Guardar'' conserva la idea de cuidar, preservar y atender fielmente el contenido revelado; ''obedecer'' sería más interpretativo y menos amplio.'
- source_word: λόγους
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - el mensaje
  lexicon: BDAG
  rationale: El plural concreto se mantiene en español; 'mensaje' resumiría indebidamente la forma verbal del texto.
- source_word: προφητείας
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - mensaje profético
  lexicon: BDAG
  rationale: Se conserva la categoría profética establecida por el texto, sin expansión innecesaria.
- source_word: βιβλίου τούτου
  english_pob_choice: this book
  chosen_spanish: de este libro
  alternatives_spanish:
  - de este rollo
  - de este escrito
  lexicon: BDAG
  rationale: '''Libro'' es el equivalente más idiomático en español para la autorreferencia del texto, aunque el trasfondo antiguo pueda implicar un rollo; se preserva como alternativa en nota.'
theological_decisions:
- issue: Identidad del hablante en 'vengo pronto'
  english_pob_reading: The translation leaves the first-person speaker implicit, without inserting 'Jesús' or another explicit identification.
  chosen_spanish_reading: La traducción conserva la primera persona sin añadir un nombre propio.
  alternative_spanish_readings:
  - '''Jesús vengo pronto'''
  - '''el Señor vengo pronto'''
  rationale: El griego solo ofrece primera persona; la identificación del hablante depende del contexto literario. Añadir un nombre resolvería interpretativamente lo que el texto no explicita aquí.
  doctrine_reference: Primacía del texto original y preservación de la tensión contextual.
translation_notes:
  revision_awareness: Corregido para que cada nota al pie tenga un marcador presente en el texto. Se eliminó cualquier nota no anclada y se mantuvo la equivalencia óptima del pasaje con atención al trasfondo apocalíptico.
  spanish_consistency_notes:
  - Se prefirió 'he aquí' para un registro bíblico natural en español.
  - Se mantuvo 'Bienaventurado' por coherencia con fórmulas de bienaventuranza en el NT.
  - '''Libro'' se conserva como traducción principal, con sensibilidad al posible trasfondo de ''rollo'' sin forzar el texto.'
