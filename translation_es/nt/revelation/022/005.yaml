revisions:
- from: Y ya no habrá noche[a]; y no tendrán necesidad de luz de lámpara ni de luz del sol, porque el Señor Dios[b] alumbrará sobre ellos, y reinarán por los siglos de los siglos.
  to: Y ya no habrá noche[a]; y no tendrán necesidad de luz de lámpara ni de luz del sol, porque el Señor Dios brillará sobre ellos, y reinarán por los siglos de los siglos[b].
  rationale: Se corrige la ubicación de la nota [b] para que anote la frase que realmente explica, y se reemplaza ‘alumbrará sobre ellos’ por ‘brillará sobre ellos’ para mejorar la naturalidad del español manteniendo la imagen luminosa del griego. No se cambia ‘Señor Dios’ porque aquí procede de κύριος ὁ θεός en la fuente griega y no exige la forma ‘Yahvé’.
