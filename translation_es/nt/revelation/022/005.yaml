translation:
  language: es
  text: Y ya no habrá noche[a]; y no tendrán necesidad de luz de lámpara ni de luz del sol, porque el Señor Dios brillará sobre ellos, y reinarán por los siglos de los siglos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ‘luz de una lámpara y luz del sol’.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: ‘por los siglos de los siglos’, un modismo que expresa duración sin fin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νὺξ
  english_pob_choice: night
  chosen_spanish: noche
  alternatives_spanish:
  - la noche
  lexicon: BDAG
  rationale: El sustantivo básico νύξ significa ‘noche’. En español, ‘noche’ conserva el sentido directo y el tono sobrio del texto apocalíptico.
- source_word: οὐκ ἔσται ἔτι
  english_pob_choice: will be no more
  chosen_spanish: ya no habrá
  alternatives_spanish:
  - no habrá más
  - ya no existirá
  lexicon: BDAG
  rationale: La expresión indica cesación. ‘Ya no habrá’ es natural en español y mantiene la fuerza de desaparición sin exagerar el matiz ontológico.
- source_word: οὐκ ἔχουσιν χρείαν
  english_pob_choice: they will have no need
  chosen_spanish: no tendrán necesidad
  alternatives_spanish:
  - no necesitarán
  - no habrán de necesitar
  lexicon: BDAG
  rationale: Aunque el griego usa presente, el contexto visionario está dominado por futuros. En español, ‘no tendrán necesidad’ fluye con el resto de la cláusula y preserva el sentido.
- source_word: φωτὸς λύχνου
  english_pob_choice: lamplight
  chosen_spanish: luz de lámpara
  alternatives_spanish:
  - luz del candil
  - luz de una lámpara
  lexicon: BDAG
  rationale: La construcción genitiva significa ‘luz de lámpara’. Se conserva la imagen concreta y el contraste con la luz del sol.
- source_word: φῶς ἡλίου
  english_pob_choice: sunlight
  chosen_spanish: luz del sol
  alternatives_spanish:
  - luz solar
  lexicon: BDAG
  rationale: La frase designa la luz del sol. ‘Luz del sol’ es clara y mantiene el paralelismo con ‘luz de lámpara’.
- source_word: κύριος ὁ θεός
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - el Señor, Dios
  - el Señor, el Dios
  lexicon: BDAG
  rationale: Se conserva el valor de κύριος como ‘Señor’ según la decisión POB documentada. En español, ‘el Señor Dios’ refleja con naturalidad la coordinación nominal del griego.
- source_word: φωτίσει ἐπ’ αὐτούς
  english_pob_choice: will shine on them
  chosen_spanish: alumbrará sobre ellos
  alternatives_spanish:
  - brillará sobre ellos
  - dará luz sobre ellos
  lexicon: BDAG
  rationale: φωτίζω puede significar ‘dar luz’ o ‘iluminar’. ‘Alumbrará sobre ellos’ conserva la imagen direccional de ἐπί + acusativo y suena bíblico sin ser arcaizante.
- source_word: βασιλεύσουσιν
  english_pob_choice: will reign
  chosen_spanish: reinarán
  alternatives_spanish:
  - gobernarán
  - reinarán como reyes
  lexicon: BDAG
  rationale: El verbo significa ‘reinar’. ‘Reinarán’ es la equivalencia más directa y no añade especificaciones ajenas al verbo.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre jamás
  - por toda la eternidad
  lexicon: BDAG
  rationale: La fórmula enfática de duración se vierte con el giro idiomático español tradicional ‘por los siglos de los siglos’, que comunica continuidad interminable con plena naturalidad.
theological_decisions:
- issue: Cómo reflejar la visión futura con el presente griego en οὐκ ἔχουσιν χρείαν
  english_pob_reading: 'Render the clause futurally in English: ''they will have no need,'' harmonized with the surrounding future verbs.'
  chosen_spanish_reading: Usar ‘no tendrán necesidad’ en lugar de un presente estrictamente formal.
  alternative_spanish_readings:
  - no tienen necesidad
  - no necesitan
  rationale: El griego puede usar presente vívido en una escena profética. En español, el futuro mantiene la cohesión con ‘habrá’, ‘alumbrará’ y ‘reinarán’ sin perder el contenido semántico.
  doctrine_reference: Translation philosophy § optimal equivalence; preservar el sentido de la fuente en español moderno y legible
- issue: Cómo traducir κύριος en κύριος ὁ θεός
  english_pob_reading: Lord God
  chosen_spanish_reading: Señor Dios
  alternative_spanish_readings:
  - Santo Dios y Señor
  - el Señor, Dios
  rationale: La lectura POB establece ‘Lord’ para κύριος. En español, ‘Señor Dios’ preserva la terminología doctrinal habitual del proyecto sin sustituir el nombre divino por una forma de máscara no indicada aquí.
  doctrine_reference: 'Tabla de términos en conflicto: κύριος → Señor'
translation_notes:
  revision_awareness: El pasaje base presenta alta concordancia entre la revisión más reciente y el control cruzado; no se registraron cambios aplicados y el estado final fue ‘unchanged’. La propuesta española sigue esa estabilidad, manteniendo las decisiones léxicas principales del audit trail inglés sin introducir variantes interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para κύριος y ‘Dios’ para θεός, en coherencia con la terminología del proyecto.
  - 'Se conserva el paralelismo de las dos expresiones de luz: ‘luz de lámpara’ / ‘luz del sol’.'
  - La fórmula temporal final se traduce con el modismo español eclesialmente reconocible ‘por los siglos de los siglos’.
  - No se usó ‘Cristo’ ni otros términos no presentes en el versículo.
  - La puntuación separa las cláusulas principales con punto y coma para reflejar el encadenamiento del griego.
