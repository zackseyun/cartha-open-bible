review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: desaparición de la noche, falta de necesidad de fuentes de luz creadas, acción iluminadora de Dios y reinado eterno. Sin embargo, hay dos desajustes importantes con el expediente auditado: (1) la nota [b] está anclada a ‘Señor Dios’ pero su contenido explica la frase final ‘por los siglos de los siglos’; debe moverse al sintagma final. (2) ‘alumbrará sobre ellos’ es comprensible, pero suena menos natural en español actual que ‘brillará sobre ellos’ o ‘resplandecerá sobre ellos’, mientras que sigue captando bien φωτίσει ἐπ’ αὐτούς.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero la colocación de la nota [b] es errónea y confunde al lector. Además, ‘luz de lámpara’ funciona, aunque ‘luz de una lámpara’ en la nota literal queda mejor que en el texto principal. La frase ‘el Señor Dios’ es legible, pero según las directrices del proyecto conviene explicar que aquí κύριος no es el Tetragrámaton y por tanto no exige ‘Yahvé’.
  glossary_alignment: Buena alineación en ‘noche’, ‘no tendrán necesidad’, ‘luz del sol’, ‘reinarán’ y ‘por los siglos de los siglos’. ‘Señor Dios’ es aceptable aquí porque la fuente inmediata es griega κύριος ὁ θεός, no יהוה, así que no aplica automáticamente la preferencia por ‘Yahvé’. Se recomienda mejorar φωτίσει ἐπ’ αὐτούς a una forma más idiomática en español sin perder la imagen direccional.
  issues:
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado.
    rationale: El contenido de la nota explica εἰς τοὺς αἰῶνας τῶν αἰώνων (‘por los siglos de los siglos’), no ‘Señor Dios’. Esto rompe la correspondencia obligatoria entre marcador y frase anotada.
  - severity: medium
    issue: ‘Alumbrará sobre ellos’ suena algo forzado en español moderno.
    rationale: Aunque reproduce la imagen de ἐπί + acusativo, en español eclesial general ‘brillará sobre ellos’ o ‘resplandecerá sobre ellos’ es más natural y fiel al campo semántico de luz dirigida.
  - severity: low
    issue: La nota [a] es adecuada, pero el texto principal podría mantenerse sin nota o con una formulación más exacta del contraste.
    rationale: No es un error sustancial; la nota ya preserva bien la alternativa más literal del griego.
  revised_spanish_text: Y ya no habrá noche[a]; y no tendrán necesidad de luz de lámpara ni de luz del sol, porque el Señor Dios brillará sobre ellos, y reinarán por los siglos de los siglos[b].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: ‘luz de una lámpara y luz del sol’.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: ‘por los siglos de los siglos’, un modismo que expresa duración sin fin.'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota [b] para que anote la frase que realmente explica, y se reemplaza ‘alumbrará sobre ellos’ por ‘brillará sobre ellos’ para mejorar la naturalidad del español manteniendo la imagen luminosa del griego. No se cambia ‘Señor Dios’ porque aquí procede de κύριος ὁ θεός en la fuente griega y no exige la forma ‘Yahvé’.
