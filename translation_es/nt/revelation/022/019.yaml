translation:
  language: es
  text: y si alguno quita de las palabras del libro de esta profecía[a], Dios quitará su parte del árbol de la vida y de la ciudad santa, que están escritos en este libro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «libro de la vida» en vez de «árbol de la vida».
    reason: textual_variant
lexical_decisions:
- source_word: ἀφέλῃ
  english_pob_choice: takes away
  chosen_spanish: quita
  alternatives_spanish:
  - remueve
  - sustrae
  lexicon: BDAG
  rationale: El aoristo subjuntivo en la cláusula condicional exige una acción de quitar o retirar. «Quita» es natural en español y mantiene el paralelo verbal con el futuro «quitará» de la segunda mitad del versículo.
- source_word: λόγων
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  lexicon: BDAG
  rationale: Aquí λόγοι se refiere al contenido verbal del escrito profético. «Palabras» es la equivalencia más directa y solemne para advertir contra alterar el texto.
- source_word: βιβλίου
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - rollo
  lexicon: BDAG
  rationale: Aunque βιβλίον puede designar un rollo antiguo, «libro» es la forma más natural y transparente en español, y reproduce bien la expresión «el libro de esta profecía».
- source_word: προφητείας
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - mensaje profético
  lexicon: BDAG
  rationale: «Profecía» conserva el género literario y el tono de advertencia sin ampliar el sentido más allá del texto.
- source_word: ἀφελεῖ
  english_pob_choice: will take away
  chosen_spanish: quitará
  alternatives_spanish:
  - removerá
  - sustraerá
  lexicon: BDAG
  rationale: 'Se conserva el mismo verbo básico que en la primera mitad del versículo para reflejar la reciprocidad intencional: quien quita, recibirá que se le quite.'
- source_word: μέρος
  english_pob_choice: share
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - herencia
  lexicon: BDAG
  rationale: «Parte» comunica con claridad la idea de participación o porción asignada, y en español es más natural aquí que un giro más explicativo.
- source_word: ξύλου τῆς ζωῆς
  english_pob_choice: tree of life
  chosen_spanish: árbol de la vida
  alternatives_spanish:
  - madero de la vida
  lexicon: BDAG
  rationale: El contexto inmediato de Apocalipsis 22:2 y 14 confirma que ξύλον aquí designa el árbol apocalíptico de la vida; por eso se traduce literalmente como «árbol de la vida».
- source_word: πόλεως τῆς ἁγίας
  english_pob_choice: the holy city
  chosen_spanish: ciudad santa
  alternatives_spanish:
  - ciudad sagrada
  lexicon: BDAG
  rationale: La expresión fija se conserva de manera directa. «Ciudad santa» mantiene la designación apocalíptica y su carácter teológico.
- source_word: τῶν γεγραμμένων ἐν τῷ βιβλίῳ τούτῳ
  english_pob_choice: which are written in this book
  chosen_spanish: que están escritas en este libro
  alternatives_spanish:
  - que son escritas en este libro
  - las cuales están escritas en este libro
  lexicon: BDAG
  rationale: La construcción participial se entiende mejor en español como una relativa que retoma tanto «árbol» como «ciudad». Se usa femenino plural («escritas») para concordar con los dos referentes colectivos/sustantivos en conjunto, sin forzar la sintaxis española.
theological_decisions:
- issue: 'Variante textual en el objeto retirado: «árbol de la vida» frente a «libro de la vida»'
  english_pob_reading: tree of life
  chosen_spanish_reading: árbol de la vida
  alternative_spanish_readings:
  - libro de la vida
  rationale: El texto griego base dado por SBLGNT lee ξύλου τῆς ζωῆς («árbol de la vida»), y esa lectura encaja con el contexto inmediato de Apocalipsis 22. La variante tradicional «libro de la vida» se preserva solo como alternativa textual, no como texto principal.
  doctrine_reference: Primacía del texto original y preservación de variantes textuales significativas en nota.
translation_notes:
  revision_awareness: La versión en inglés del POB ya decidió mantener la lectura crítica «tree of life» y colocar la variante «book of life» en nota. La presente redacción española sigue esa decisión y conserva el mismo punto de tensión textual, sin armonizarlo con la tradición manuscrita mayoritaria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; aquí el griego usa θεός, por lo que corresponde «Dios».
  - Se conserva «profecía» y no se expande a «mensaje profético» en el texto principal para no debilitar el género señalado por el griego.
  - La concordancia de «escritas» sigue la práctica española natural para una relativa que engloba ambos referentes mencionados antes de la cláusula final.
