  - severity: low
    issue: Falta el artículo antes de «ciudad santa»
    rationale: El griego tiene artículo definido τῆς πόλεως τῆς ἁγίας. «de la ciudad santa» suena más natural y refleja mejor la definitud que «de ciudad santa» o una forma sin artículo; el borrador ya tiene «de la ciudad santa» en parte, pero conviene mantenerlo explícitamente en la revisión final junto con la corrección principal.
