translation:
  language: es
  text: ¡He aquí![a] vengo pronto, y mi recompensa está conmigo, para retribuir a cada uno según sea su obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rápidamente». El griego ταχύ puede enfatizar tanto la cercanía («pronto») como la rapidez o repentinidad («rápidamente»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Mira bien!
  lexicon: BDAG
  rationale: En español, una exhortación breve como ¡Mira! transmite el llamado solemne a prestar atención sin sonar demasiado arcaico. Conserva el tono apocalíptico del original y la función de 'Behold' en el texto inglés.
- source_word: ἔρχομαι
  english_pob_choice: I am coming
  chosen_spanish: Vengo
  alternatives_spanish:
  - Estoy viniendo
  - Vengo ya
  lexicon: BDAG
  rationale: El presente español simple expresa bien el valor futurista e inminente del griego. 'Vengo' suena más natural y digno que una perífrasis progresiva.
- source_word: ταχύ
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - enseguida
  lexicon: BDAG
  rationale: '''Pronto'' comunica mejor la cercanía/inminencia destacada por el contexto escatológico. Se evita restringir el adverbio solo a velocidad física.'
- source_word: ὁ μισθός μου
  english_pob_choice: my reward
  chosen_spanish: mi recompensa
  alternatives_spanish:
  - mi pago
  - mi salario
  - mi retribución
  lexicon: BDAG
  rationale: '''Recompensa'' preserva el sentido de retribución acorde con la obra, sin el matiz demasiado comercial de ''salario'' ni el tono más técnico de ''retribución''.'
- source_word: μετ’ ἐμοῦ
  english_pob_choice: is with me
  chosen_spanish: viene conmigo
  alternatives_spanish:
  - está conmigo
  - va conmigo
  lexicon: BDAG
  rationale: Aunque el griego presenta una cláusula nominal ('conmigo'), en español 'viene conmigo' integra naturalmente la idea de posesión/presencia asociada al retorno y evita una frase demasiado seca. Mantiene la relación espacial-personal del original.
- source_word: ἀποδοῦναι
  english_pob_choice: to repay
  chosen_spanish: para retribuir
  alternatives_spanish:
  - para pagar
  - para dar retribución a
  - para recompensar
  lexicon: BDAG
  rationale: '''Retribuir'' conserva el valor de devolver correspondientemente por las obras. Es más solemne que ''pagar'' y menos interpretativo que ''recompensar''.'
- source_word: ἑκάστῳ
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada persona
  - a todos
  lexicon: BDAG
  rationale: La distribución individual se expresa con claridad y naturalidad en español. Se mantiene el enfoque personal de responsabilidad individual.
- source_word: ὡς
  english_pob_choice: according to what
  chosen_spanish: según sea
  alternatives_spanish:
  - conforme a
  - de acuerdo con
  lexicon: BDAG
  rationale: '''Según sea'' permite conservar la relación de medida/estándar sin forzar una construcción literal poco natural. Refleja que el criterio es la condición de la obra de cada uno.'
- source_word: τὸ ἔργον ἐστὶν αὐτοῦ
  english_pob_choice: his work is
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - lo que ha hecho
  - sus hechos
  lexicon: BDAG
  rationale: '''Obra'' es un equivalente bíblico y digno para ἔργον, y funciona bien en contexto de evaluación/retribución. Se mantiene la referencia individual con ''su''.'
theological_decisions:
- issue: Recompensa y retribución según las obras
  english_pob_reading: reward ... to repay each one according to what his work is
  chosen_spanish_reading: mi recompensa ... para retribuir a cada uno según sea su obra
  alternative_spanish_readings:
  - mi recompensa ... para pagar a cada uno según sus obras
  - mi retribución ... para recompensar a cada uno según lo que haya hecho
  rationale: El verso afirma retribución individual conforme a la obra, sin explicitar aquí toda la doctrina de cómo se relaciona con la salvación final. La redacción española conserva esa tensión sin suavizarla ni resolverla teológicamente.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, preserve theological tension rather than resolve it
- issue: Tratamiento del singular masculino genérico en el destinatario
  english_pob_reading: each one ... his work
  chosen_spanish_reading: a cada uno ... su obra
  alternative_spanish_readings:
  - a cada persona ... su obra
  - a cada cual ... su obra
  rationale: El griego usa formas masculinas singulares con valor representativo. En español, 'a cada uno ... su obra' mantiene esa distribución individual sin introducir una reformulación plural o neutra ajena al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y coincide con la línea del audit trail inglés: llamada apocalíptica, presente con fuerza futura, adverbio de inminencia, recompensa/retribución, y criterio individual de las obras. Se ajustó la sintaxis para que el español suene natural sin perder la estructura semántica del original.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada solo cuando aparezca explícitamente el nombre divino; este versículo no lo contiene.
  - Se mantiene 'recompensa'/'retribuir' para conservar el campo semántico de μισθός/ἀποδοῦναι sin oscurecer la relación con las obras.
  - '''Obra'' se conserva en singular porque el griego dice τὸ ἔργον; no se pluraliza para no introducir una generalización no presente en el texto.'
