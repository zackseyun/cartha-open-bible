revisions:
- from: ¡Mira![a] Vengo pronto, y mi recompensa viene conmigo, para retribuir a cada uno según sea su obra.
  to: ¡He aquí![a] vengo pronto, y mi recompensa está conmigo, para retribuir a cada uno según sea su obra.
  rationale: Se ajusta Ἰδοὺ a un equivalente más solemne y bíblico ('¡He aquí!') y se corrige μετ’ ἐμοῦ a 'está conmigo', que refleja la cláusula nominal griega sin añadir movimiento. Se conserva 'pronto', 'recompensa', 'retribuir', 'a cada uno' y 'su obra' por su fidelidad al audit trail y buena legibilidad en español. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:37:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del versículo y preserva ''pronto'', ''recompensa'' y la retribución individual según la obra. Sin embargo, se aparta innecesariamente del griego en dos puntos importantes: Ἰδοὺ se refleja mejor con un llamado más solemne que ''¡Mira!'', y sobre todo μετ’ ἐμοῦ corresponde a ''está conmigo'' / ''conmigo'', no a ''viene conmigo'', que introduce un matiz verbal no presente en la cláusula nominal griega.'
  spanish_quality_summary: El español es claro y legible, pero '¡Mira!' suena algo coloquial para el registro apocalíptico, y 'mi recompensa viene conmigo' resulta menos natural y menos fiel que 'mi recompensa está conmigo'. Además, 'según sea su obra' es comprensible, pero algo rígido; 'según lo que sea su obra' sería demasiado pesado, así que conviene mantener una forma más directa que preserve el verbo explícito sin sonar forzada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Recompensa' y 'obra' alinean bien con μισθός y ἔργον. La revisión propuesta mejora la fidelidad sin afectar glosario doctrinal. Se mantiene el singular distributivo 'a cada uno ... su obra'.
  issues:
  - severity: medium
    issue: '''¡Mira!'' para Ἰδοὺ baja demasiado el registro solemne.'
    rationale: Aunque inteligible, '¡Mira!' suena más coloquial que el inglés auditado 'Behold' y que el tono apocalíptico del griego. '¡He aquí!' es más digno y ampliamente comprensible en contexto bíblico.
  - severity: high
    issue: '''mi recompensa viene conmigo'' añade un verbo de movimiento no presente en μετ’ ἐμοῦ.'
    rationale: 'El griego tiene una cláusula nominal con cópula implícita: ''mi recompensa [está] conmigo''. ''Viene conmigo'' altera la imagen y sobretraduce el original.'
  - severity: low
    issue: '''según sea su obra'' es algo rígido en español.'
    rationale: No es incorrecto, pero puede sonar menos natural. Una formulación como 'según lo que sea su obra' sería más literal pero pesada. Se puede conservar 'según sea su obra' si se corrige lo principal, o preferir una solución más natural que aún refleje ἐστὶν.
  revised_spanish_text: ¡He aquí![a] vengo pronto, y mi recompensa está conmigo, para retribuir a cada uno según sea su obra.
  revised_footnotes:
  - marker: a
    text: 'O: «rápidamente». El griego ταχύ puede enfatizar tanto la cercanía («pronto») como la rapidez o repentinidad («rápidamente»).'
    reason: lexical_alternative
  revision_rationale: Se ajusta Ἰδοὺ a un equivalente más solemne y bíblico ('¡He aquí!') y se corrige μετ’ ἐμοῦ a 'está conmigo', que refleja la cláusula nominal griega sin añadir movimiento. Se conserva 'pronto', 'recompensa', 'retribuir', 'a cada uno' y 'su obra' por su fidelidad al audit trail y buena legibilidad en español. No se requiere adjudicación adicional.
