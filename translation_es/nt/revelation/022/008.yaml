revisions:
- from: Y yo[a], Juan, soy el que oye y ve estas cosas. Y cuando oí y vi, me arrojé a sus pies para adorar delante del ángel que me mostraba estas cosas.
  to: Y yo, Juan, soy el que oye y ve estas cosas. Y cuando oí y vi, caí para adorar[a] delante de los pies del ángel que me mostraba estas cosas.
  rationale: 'Se corrige la línea principal para reflejar con mayor precisión el griego: «caí» representa mejor ἔπεσα que «me arrojé», y «delante de los pies del ángel» conserva la relación espacial explícita de ἔμπροσθεν τῶν ποδῶν τοῦ ἀγγέλου. También se mueve la nota al verbo «adorar», que es el elemento que la nota explica.'
  reviewer_model: gpt-5.4
