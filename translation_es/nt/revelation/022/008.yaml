base_translation:
  language: en
  yaml_path: translation/nt/revelation/022/008.yaml
  text: And I[a], John, am the one hearing and seeing these things. And when I heard and saw, I fell down to worship before the feet of the angel who was showing me these things.
  footnotes:
  - marker: a
    text: Or 'to bow down before' or 'to pay homage to.' The Greek verb can denote an act of prostration or reverence; here it is rendered 'worship' because of its regular force in Revelation and the rebuke that follows.
