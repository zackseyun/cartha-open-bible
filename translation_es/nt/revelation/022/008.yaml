translation:
  language: es
  text: Y yo, Juan, soy el que oye y ve estas cosas. Y cuando oí y vi, caí para adorar[a] delante de los pies del ángel que me mostraba estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «postrarme ante» o «rendir homenaje a». El verbo griego puede denotar un acto de postración o reverencia; aquí se traduce «adorar» por su fuerza habitual en Apocalipsis y por la reprensión que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Yo también
  lexicon: BDAG
  rationale: La combinación de καί + ἐγώ se conserva de forma natural con «Y yo», manteniendo la continuidad discursiva y el énfasis del sujeto sin recargar el español.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el apóstol
  lexicon: BDAG
  rationale: Nombre propio transliterado al equivalente usual en español bíblico, sin añadir identificación que el versículo no expresa.
- source_word: ὁ ἀκούων καὶ βλέπων
  english_pob_choice: am the one hearing and seeing
  chosen_spanish: soy el que oye y ve
  alternatives_spanish:
  - soy el que está oyendo y viendo
  - soy el que escucha y ve
  lexicon: BDAG
  rationale: Los participios presentes se vuelven una cláusula sustantiva natural en español. «Oye y ve» mantiene el valor aspectual presente y el carácter testimonial del hablante, sin forzar una perífrasis innecesaria.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas visiones
  lexicon: BDAG
  rationale: Se preserva el plural demostrativo repetido en el verso. «Estas cosas» es fiel y comprensible para referirse al contenido revelado.
- source_word: ἤκουσα καὶ ἔβλεψα
  english_pob_choice: I heard and saw
  chosen_spanish: oí y vi
  alternatives_spanish:
  - escuché y vi
  - oí y observé
  lexicon: BDAG
  rationale: Los aoristos se expresan en pretérito simple. «Oí» y «vi» conservan la secuencia y la concisión del griego.
- source_word: ἔπεσα
  english_pob_choice: I fell down
  chosen_spanish: me arrojé
  alternatives_spanish:
  - caí
  - caí de rodillas
  lexicon: BDAG
  rationale: El contexto de postración ante el ángel exige una expresión física fuerte. «Me arrojé» comunica la caída/prostración que precede al acto de adoración sin suavizar la intensidad del verbo.
- source_word: προσκυνῆσαι
  english_pob_choice: to worship
  chosen_spanish: para adorar
  alternatives_spanish:
  - para postrarme en adoración
  - para rendir homenaje
  lexicon: BDAG
  rationale: Se mantiene la fuerza cultual del verbo como en el inglés POB. En Apocalipsis el término suele tener valor de adoración, y el reproche posterior requiere no rebajarlo a un mero gesto de cortesía.
- source_word: ἔμπροσθεν τῶν ποδῶν
  english_pob_choice: before the feet
  chosen_spanish: delante de sus pies
  alternatives_spanish:
  - a los pies de
  - ante los pies de
  lexicon: BDAG
  rationale: «Delante de sus pies» conserva la preposición y el detalle corporal. En español, la construcción se integra con naturalidad junto al acto de postración.
- source_word: τοῦ ἀγγέλου
  english_pob_choice: of the angel
  chosen_spanish: del ángel
  alternatives_spanish:
  - del mensajero
  lexicon: BDAG
  rationale: En este contexto celestial la referencia es inequívocamente a un ángel, no a un simple mensajero.
- source_word: τοῦ δεικνύοντός μοι ταῦτα
  english_pob_choice: who was showing me these things
  chosen_spanish: que me mostraba estas cosas
  alternatives_spanish:
  - que me estaba mostrando estas cosas
  - que me había mostrado estas cosas
  lexicon: BDAG
  rationale: El participio presente se traduce con imperfecto relativo para conservar el aspecto progresivo de la acción del ángel en la visión.
theological_decisions:
- issue: Sentido de προσκυνέω dirigido al ángel
  english_pob_reading: Rendered as 'to worship' while leaving the narrative itself to show that this act is inappropriate toward the angel.
  chosen_spanish_reading: «para adorar» mantiene la fuerza de adoración, dejando que la reprensión posterior muestre que el acto es indebido.
  alternative_spanish_readings:
  - «para postrarme»
  - «para rendir homenaje»
  rationale: En Apocalipsis, προσκυνέω normalmente connota adoración, y el contexto inmediato requiere preservar esa tensión teológica. Suavizarlo anticipadamente podría ocultar la gravedad del error de Juan.
  doctrine_reference: Preservar la tensión teológica del relato sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa más reciente permanece sin cambios según el registro de revisión; no se documentan cambios aplicados. La presente propuesta sigue el mismo criterio de equivalencia óptima, manteniendo la tensión de προσκυνέω y el aspecto presente de los participios.
  spanish_consistency_notes:
  - Se usa «Y yo» para conservar la continuidad enfática del sujeto sin calco rígido.
  - «Soy el que oye y ve» mantiene el valor presente de los participios y su función descriptiva.
  - «Para adorar» conserva la lectura cultual de προσκυνέω, coherente con la nota textual y con el reproche narrativo posterior.
  - «Que me mostraba estas cosas» reproduce el participio presente con imperfecto relativo, consistente con el español bíblico contemporáneo.
