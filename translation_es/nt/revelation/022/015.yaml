translation:
  language: es
  text: Fuera quedan los perros[a], los hechiceros, los inmorales sexuales, los asesinos, los idólatras y todo el que ama y practica la falsedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Perros» es probablemente una imagen metafórica de exclusión e impureza moral; algunos intérpretes lo entienden de manera más específica.
    reason: cultural_note
  - marker: b
    text: 'O: «todo el que ama y practica una mentira».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔξω
  english_pob_choice: Outside are
  chosen_spanish: Fuera quedan
  alternatives_spanish:
  - Fuera están
  - Afuera quedan
  lexicon: BDAG
  rationale: El adverbio frontal expresa exclusión respecto de la ciudad descrita en el contexto. En español, «Fuera quedan» conserva el énfasis y suena más natural que calcar «afuera están».
- source_word: κύνες
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - perros
  - los canes
  lexicon: BDAG
  rationale: Se mantiene la imagen concreta de «perros», porque en este contexto funciona de modo metafórico para los excluidos y ritualmente impuros. «Canes» sería más literario pero menos transparente.
- source_word: φάρμακοι
  english_pob_choice: the sorcerers
  chosen_spanish: los hechiceros
  alternatives_spanish:
  - los sorceros
  - los que practican magia
  lexicon: BDAG
  rationale: El término remite a prácticas de magia/sortilegios, no a farmacéuticos. «Hechiceros» comunica bien el peso religioso y moral del vocablo en un registro comprensible para el lector español.
- source_word: πόρνοι
  english_pob_choice: the sexually immoral
  chosen_spanish: los sexualmente inmorales
  alternatives_spanish:
  - los inmorales sexuales
  - los fornicarios
  lexicon: BDAG
  rationale: Se preserva el alcance amplio del término griego sin restringirlo a una sola conducta. «Sexualmente inmorales» es claro en español moderno y refleja la categoría ética general.
- source_word: φονεῖς
  english_pob_choice: the murderers
  chosen_spanish: los asesinos
  alternatives_spanish:
  - los homicidas
  - los homicidias
  lexicon: BDAG
  rationale: Es la correspondencia natural en español para quienes cometen asesinato. «Asesinos» mantiene la fuerza moral y la brevedad de la lista.
- source_word: εἰδωλολάτραι
  english_pob_choice: the idolaters
  chosen_spanish: los idólatras
  alternatives_spanish:
  - los que adoran ídolos
  - los adoradores de ídolos
  lexicon: BDAG
  rationale: Se conserva el término compacto y ya asentado en español bíblico, sin perder precisión semántica.
- source_word: πᾶς φιλῶν καὶ ποιῶν ψεῦδος
  english_pob_choice: everyone who loves and practices falsehood
  chosen_spanish: todo el que ama y practica la mentira
  alternatives_spanish:
  - todo el que ama y practica la falsedad
  - todo el que ama y hace una mentira
  lexicon: BDAG
  rationale: La construcción participial se vierte naturalmente con «todo el que...». «Mentira» en singular puede abarcar el campo de ψεῦδος y suena más idiomática en español que «falsedad» en esta lista moral, sin perder la idea de conducta persistente.
theological_decisions:
- issue: Si κύνες debe dejarse literalmente o interpretarse en el texto principal como una categoría específica de impuros o inmorales.
  english_pob_reading: Retain the literal term 'dogs' in the main text.
  chosen_spanish_reading: Mantener literalmente «perros» en el texto principal.
  alternative_spanish_readings:
  - los impuros
  - los inmorales
  - los perros como metáfora de exclusión
  rationale: El griego usa la imagen concreta κύνες; traducirla literalmente preserva el valor retórico y deja abierta la identificación exacta, que sigue discutida. La nota puede explicar que es una metáfora de exclusión e impureza moral.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si ψεῦδος debe traducirse como un acto puntual de mentir o como una categoría moral más amplia.
  english_pob_reading: Render broadly as 'falsehood.'
  chosen_spanish_reading: Traducirlo como «mentira» en un sentido amplio y habitual.
  alternative_spanish_readings:
  - falsedad
  - una mentira
  - lo falso
  rationale: Aunque el sustantivo es singular, la construcción con participios sugiere una disposición y práctica continuas. «Mentira» puede abarcar tanto el acto de mentir como la adhesión a lo falso, y evita una abstracción menos idiomática para el español general.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido de fondo; el consenso de auditoría es alto y el texto inglés base se mantuvo estable. La versión española sigue de cerca esa lectura, conservando el orden de la lista, la literalidad de la imagen de «perros» y la amplitud ética de ψεῦδος.
  spanish_consistency_notes:
  - Se mantiene «idólatras» para εἰδωλολάτραι, en consonancia con la terminología bíblica estándar y el estilo de lista viciosa.
  - Se evita «SEÑOR» o terminología no pertinente, porque este verso no contiene el nombre divino.
  - «Hechiceros» se usa como equivalente funcional de φάρμακοι, no como «farmacéuticos» ni «médicos»; el contexto apocalíptico exige el sentido de magia/sortilegios.
  - La lista conserva paralelismo y concisión, con comas y conjunción final natural en español.
  - La nota de ψεῦδος preserva la alternativa «una mentira» porque el singular griego puede leerse así, aunque el texto principal opta por «la mentira» por fluidez y amplitud semántica.
