    text: Or 'to testify to you these things in the churches' or 'concerning the churches.' The Greek phrase ἐπὶ ταῖς ἐκκλησίαις allows more than one nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the root and the offspring of David.'
    reason: alternative_reading
