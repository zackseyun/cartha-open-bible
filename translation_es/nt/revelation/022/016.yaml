    text: O «para darles testimonio de estas cosas en las iglesias» o «para darles testimonio de estas cosas acerca de las iglesias». La frase griega ἐπὶ ταῖς ἐκκλησίαις permite más de un matiz.
    reason: lexical_alternative
  - marker: b
    text: O «la raíz y el vástago de David».
    reason: alternative_reading
  revision_rationale: Se ajustó la sintaxis de μαρτυρῆσαι ὑμῖν ταῦτα para que suene natural en español sin perder el sentido de testimonio dirigido a los destinatarios. Se cambió «la descendencia de David» por «el descendiente de David» para reflejar mejor la predicación singular sobre Jesús y alinearse con la decisión principal del POB inglés. Se corrigió la nota [b] para que ofrezca una alternativa real y útil.
