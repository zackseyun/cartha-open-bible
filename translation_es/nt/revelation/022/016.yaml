translation:
  language: es
  text: Yo, Jesús, he enviado a mi ángel para darles testimonio[a] de estas cosas para las iglesias. Yo soy la raíz y el descendiente de David[b], la estrella resplandeciente de la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para darles testimonio de estas cosas en las iglesias» o «para darles testimonio de estas cosas acerca de las iglesias». La frase griega ἐπὶ ταῖς ἐκκλησίαις permite más de un matiz.
    reason: lexical_alternative
  - marker: b
    text: O «la raíz y el vástago de David».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγὼ Ἰησοῦς
  english_pob_choice: I, Jesus,
  chosen_spanish: Yo, Jesús,
  alternatives_spanish:
  - Yo soy Jesús
  - Yo Jesús
  lexicon: BDAG
  rationale: El pronombre explícito con el nombre propio expresa autoidentificación enfática. En español, la aposición «Yo, Jesús,» conserva esa fuerza de manera natural; «Yo soy Jesús» añade un verbo que no está allí en ese punto, y «Yo Jesús» resulta poco idiomático.
- source_word: ἔπεμψα
  english_pob_choice: have sent
  chosen_spanish: he enviado
  alternatives_spanish:
  - envié
  lexicon: BDAG
  rationale: El aoristo se traduce bien con pretérito perfecto para expresar una acción ya realizada con relevancia presente en el discurso. «Envié» también es posible, pero «he enviado» suena más natural en esta declaración solemne.
- source_word: ἄγγελόν
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En Apocalipsis, ἄγγελος normalmente designa un ser angélico, salvo que el contexto indique claramente un mensajero humano. Aquí el contexto apocalíptico favorece «ángel».
- source_word: μαρτυρῆσαι
  english_pob_choice: to testify
  chosen_spanish: dar testimonio
  alternatives_spanish:
  - testificar
  - dar testimonio de
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Dar testimonio» conserva el matiz judicial/de testigo de μαρτυρέω y es natural en español; no se añade «de» porque el objeto ya sigue en la oración.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - para ustedes
  lexicon: BDAG
  rationale: El dativo se rinde naturalmente con «a ustedes» en español amplio latinoamericano. «Para ustedes» suena más interpretativo; «a vosotros» no es el registro preferido.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El demostrativo plural apunta al contenido global de la revelación; «estas cosas» preserva el plural. «Esto» aplanaría esa referencia.
- source_word: ἐπὶ ταῖς ἐκκλησίαις
  english_pob_choice: for the churches
  chosen_spanish: para las iglesias
  alternatives_spanish:
  - en las iglesias
  - con respecto a las iglesias
  - a las iglesias
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo es flexible. En este contexto puede indicar referencia/esfera y destino; «para las iglesias» comunica bien propósito y destinatario sin imponer la lectura local de «en las iglesias». Se conserva «iglesias» porque el término habitual en español bíblico para ἐκκλησία es este, sin necesidad de sustituirlo por «asambleas».
- source_word: ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy
  lexicon: BDAG
  rationale: 'La autoafirmación copulativa se conserva con el pronombre explícito para mantener el énfasis: «Yo soy».'
- source_word: ἡ ῥίζα
  english_pob_choice: the root
  chosen_spanish: la raíz
  alternatives_spanish:
  - el origen
  - el tronco
  lexicon: BDAG
  rationale: «Raíz» es la traducción directa y mantiene la imagen de origen/fuente que el término puede evocar en este título mesiánico.
- source_word: τὸ γένος Δαυίδ
  english_pob_choice: the descendant of David
  chosen_spanish: la descendencia de David
  alternatives_spanish:
  - el descendiente de David
  - el linaje de David
  - la estirpe de David
  lexicon: BDAG
  rationale: γένος puede referirse a linaje, descendencia o grupo de origen. En una predicación singular sobre Jesús, «la descendencia de David» o «el descendiente de David» serían opciones posibles; aquí se eligió «la descendencia de David» para conservar el sustantivo colectivo y dejar visible la tensión con «la raíz».
- source_word: ὁ ἀστὴρ ὁ λαμπρός, ὁ πρωϊνός
  english_pob_choice: the bright morning star
  chosen_spanish: la estrella resplandeciente de la mañana
  alternatives_spanish:
  - la brillante estrella de la mañana
  - la estrella brillante de la mañana
  lexicon: BDAG
  rationale: Los artículos y adjetivos griegos se comprimen de modo natural en español. «Resplandeciente» reproduce bien λαμπρός y conserva el tono poético; «de la mañana» traduce πρωϊνός de forma directa. Se evita introducir una formulación más litúrgica que el griego no exige.
theological_decisions:
- issue: Autorreferencia mesiánica y tensión entre origen y descendencia davídica
  english_pob_reading: Rendered ἡ ῥίζα καὶ τὸ γένος Δαυίδ as 'the root and the descendant of David' without resolving the theological paradox.
  chosen_spanish_reading: «Yo soy la raíz y la descendencia de David» mantiene la tensión entre ser origen de David y, a la vez, pertenecer a su línea.
  alternative_spanish_readings:
  - la raíz y el descendiente de David
  - la raíz y la estirpe de David
  rationale: La frase presenta a Jesús como anterior a David y, al mismo tiempo, como perteneciente a su descendencia. La traducción debe preservar esa paradoja sin explicarla ni suavizarla.
  doctrine_reference: Translation philosophy §3
- issue: Título cristológico «estrella de la mañana»
  english_pob_reading: '''the bright morning star'''
  chosen_spanish_reading: «la estrella resplandeciente de la mañana» se mantiene como título directo de Jesús.
  alternative_spanish_readings:
  - la estrella brillante de la mañana
  - el lucero de la mañana
  rationale: El texto griego se trata de una autodesignación poética y mesiánica. Se conserva el título sin sustituirlo por una expresión más interpretativa, aunque «lucero de la mañana» sería una opción tradicional en español.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que retiró «about» para reflejar más de cerca el objeto directo μετά el verbo «testify». Por eso el español dice «dar testimonio ... de estas cosas» sin añadir elementos explicativos ajenos al griego. También se respetó la observación de que ἐπὶ ταῖς ἐκκλησίαις admite más de un matiz, manteniéndolo en nota en vez de fijarlo de forma excesiva en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; en este versículo no aparece.
  - Se mantiene «Jesús» como forma fija del nombre propio.
  - Se traduce ἐκκλησία por «iglesias» según el uso bíblico común en español, sin introducir «asambleas» porque no hay necesidad contextual.
  - Se conserva el paralelismo poético del final del versículo sin forzar una expansión interpretativa.
  - El registro es reverente pero natural para lectura eclesial en español latinoamericano.
