source:
  edition: SBLGNT
  text: ἐν μέσῳ τῆς πλατείας αὐτῆς· καὶ τοῦ ποταμοῦ ἐντεῦθεν καὶ ἐκεῖθεν ξύλον ζωῆς ποιοῦν καρποὺς δώδεκα, κατὰ μῆνα ἕκαστον ⸀ἀποδιδοῦν τὸν καρπὸν αὐτοῦ, καὶ τὰ φύλλα τοῦ ξύλου εἰς θεραπείαν τῶν ἐθνῶν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/022/002.yaml
  text: in the middle of its street[a], and on this side and on that side of the river, was the tree of life, bearing twelve fruits, yielding its fruit each month[c][b]. And the leaves of the tree are for the healing of the nations.
  footnotes:
  - marker: a
    text: Or, 'on either side of the river.' The Greek literally says 'on this side and on that side.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'producing twelve fruits.' The phrase may mean twelve kinds of fruit or a full, abundant cycle of fruitfulness.
    reason: lexical_alternative
  - marker: c
    text: The imagery echoes the tree of life in Genesis 2:9 and Ezekiel 47:12.
    reason: cross_reference
