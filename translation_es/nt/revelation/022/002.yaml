translation:
  language: es
  text: en medio de su calle, y de este lado y del otro lado del río[a], estaba el árbol de la vida, que da doce frutos[b], dando su fruto cada mes[c]. Y las hojas del árbol son para la curación de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a ambos lados del río». El griego dice literalmente «de este lado y del otro lado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «produciendo doce frutos». La frase puede referirse a doce frutos o a un ciclo pleno y abundante de fructificación.'
    reason: lexical_alternative
  - marker: c
    text: La imagen remite a Génesis 2:9 y Ezequiel 47:12.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν μέσῳ
  english_pob_choice: in the middle of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el centro de
  - en medio de
  lexicon: BDAG
  rationale: Expresa con naturalidad la ubicación espacial sin perder el valor locativo del griego.
- source_word: πλατείας αὐτῆς
  english_pob_choice: its street
  chosen_spanish: su calle
  alternatives_spanish:
  - su calle amplia
  - su plaza
  lexicon: BDAG
  rationale: πλατεῖα puede significar calle ancha o plaza pública. «Calle» suena natural en español y conserva la referencia urbana; el posesivo «su» refleja αὐτῆς.
- source_word: ἐντεῦθεν καὶ ἐκεῖθεν
  english_pob_choice: on this side and on that side
  chosen_spanish: a un lado y al otro
  alternatives_spanish:
  - de este lado y de aquel lado
  - a este lado y al otro lado
  lexicon: BDAG
  rationale: Mantiene la distribución espacial sin volverla más interpretativa que el griego.
- source_word: ξύλον ζωῆς
  english_pob_choice: the tree of life
  chosen_spanish: el árbol de la vida
  alternatives_spanish:
  - un árbol de vida
  - madera de vida
  lexicon: BDAG
  rationale: El contexto intertextual de Génesis 2:9 y Apocalipsis favorece claramente «árbol de la vida»; en español es la forma establecida y fiel al símbolo.
- source_word: ποιοῦν καρποὺς δώδεκα
  english_pob_choice: bearing twelve fruits
  chosen_spanish: que da doce frutos
  alternatives_spanish:
  - que produce doce frutos
  - que lleva doce clases de fruto
  lexicon: BDAG
  rationale: «Dar frutos» comunica de modo idiomático la idea de producir/brotar fruto. Se evita añadir «clases» porque el griego no lo dice explícitamente.
- source_word: κατὰ μῆνα ἕκαστον
  english_pob_choice: each month
  chosen_spanish: cada mes
  alternatives_spanish:
  - mes por mes
  - todos los meses
  lexicon: BDAG
  rationale: Equivale de forma concisa a la distribución temporal mensual.
- source_word: ἀποδιδοῦν τὸν καρπὸν αὐτοῦ
  english_pob_choice: yielding its fruit
  chosen_spanish: dando su fruto
  alternatives_spanish:
  - produciendo su fruto
  - rindiendo su fruto
  lexicon: BDAG
  rationale: ἀποδίδωμι aquí tiene el sentido de dar/entregar el fruto. «Dar su fruto» es claro y mantiene la imagen agrícola.
- source_word: τὰ φύλλα
  english_pob_choice: the leaves
  chosen_spanish: las hojas
  alternatives_spanish:
  - el follaje
  - las frondas
  lexicon: BDAG
  rationale: Término botánico directo y transparente.
- source_word: εἰς θεραπείαν
  english_pob_choice: for the healing
  chosen_spanish: para la sanidad
  alternatives_spanish:
  - para la curación
  - para el remedio
  lexicon: BDAG
  rationale: θεραπεία puede referir a curación/restauración. «Sanidad» conserva la idea concreta de curación con un registro bíblico claro en español; se evita reducirlo a mero bienestar.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los pueblos
  - de los gentiles
  lexicon: BDAG
  rationale: En Apocalipsis ἔθνη suele abarcar a las naciones/peoples en sentido amplio. «Naciones» preserva el alcance escatológico sin introducir una oposición étnico-religiosa no explicitada aquí.
theological_decisions:
- issue: Tensión sintáctica y visual entre la calle, el río y el árbol de la vida
  english_pob_reading: Render the verse with a singular collective image without forcing a more explicit restructuring.
  chosen_spanish_reading: 'Mantener el singular «el árbol de la vida» y dejar la relación espacial comprimida: «en medio de su calle… a un lado y al otro del río»'
  alternative_spanish_readings:
  - 'poner en plural: «los árboles de la vida»'
  - 'reordenar de forma más explícita: «el árbol de la vida estaba en medio de la calle, a ambos lados del río»'
  rationale: El griego presenta una imagen apocalíptica condensada; conviene respetar la tensión sin resolverla artificialmente. El singular conserva el eco de Génesis y de la tradición joánica del árbol de la vida.
  doctrine_reference: Preservar la tensión interpretativa del texto sin sobreexplicar la topografía visionaria.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: se prefirió «doce frutos» sobre «doce clases de fruto» para ajustarse más de cerca al griego, y se conservó la imagen singular del árbol de la vida sin reestructurar la escena.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene «naciones» y no «gentiles», conforme al alcance escatológico del contexto.
  - Se evita «SEÑOR» como sustituto del nombre divino en este versículo, ya que no hay κύριος en el texto fuente.
  - «Sanidad» se eligió por claridad bíblica en español y por su cercanía funcional a θεραπεία en este contexto.
