translation:
  language: es
  text: y verán su rostro[a][b], y su nombre estará sobre sus frentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘contemplarán su rostro’.
    reason: lexical_alternative
  - marker: b
    text: Los posesivos singulares pueden referirse a Dios o reflejar el reinado compartido de Dios y del Cordero en el contexto inmediato.
    reason: theological_note
lexical_decisions:
- source_word: ὄψονται
  english_pob_choice: they will see
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - verán con sus ojos
  lexicon: BDAG
  rationale: El futuro medio de ὁράω expresa aquí una acción visual simple y directa. En español, "verán" comunica de manera natural el sentido básico sin añadir solemnidad innecesaria. "Contemplarán" sería posible, pero introduce un matiz más elevado que no exige el griego.
- source_word: πρόσωπον
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - presencia
  lexicon: BDAG
  rationale: El sentido primario es una referencia concreta al rostro. "Rostro" conserva dignidad y naturalidad en español bíblico moderno. "Presencia" sería demasiado interpretativo aquí, porque el objeto directo de "verán" favorece la imagen visual concreta.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre propio
  - identidad
  lexicon: BDAG
  rationale: '"Nombre" reproduce el sustantivo de forma directa. Aunque en uso bíblico puede implicar identidad o pertenencia, el texto no desarrolla esas implicaciones en la forma de la frase, por lo que conviene mantener el valor léxico simple.'
- source_word: ἐπὶ τῶν μετώπων αὐτῶν
  english_pob_choice: on their foreheads
  chosen_spanish: sobre sus frentes
  alternatives_spanish:
  - en sus frentes
  - encima de sus frentes
  lexicon: BDAG
  rationale: La preposición con genitivo expresa ubicación sobre algo. "Sobre sus frentes" suena natural y fiel al valor espacial del griego. "En sus frentes" también es posible, pero "sobre" reproduce mejor la imagen de inscripción o colocación.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Se mantiene la coordinación simple de ambos miembros de la oración.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - del Señor
  lexicon: BDAG
  rationale: El pronombre se conserva como posesivo sin resolver explícitamente el referente. En español, "su" preserva la misma ambigüedad funcional que el griego y evita cerrar la identificación más allá del contexto inmediato.
theological_decisions:
- issue: Referente de "su rostro" y "su nombre"
  english_pob_reading: Retain the pronoun 'his' without specifying the referent in the translation.
  chosen_spanish_reading: Conservar "su" sin identificar expresamente a quién se refiere.
  alternative_spanish_readings:
  - de Dios
  - del Cordero
  - de Dios y del Cordero en su reinado compartido
  rationale: El contexto cercano de Apocalipsis 22:3 vincula a Dios y al Cordero en una sola escena de reinado. La traducción no debe resolver la referencia más estrechamente que el griego; conservar el posesivo permite mantener la tensión teológica y literaria del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó confirmado como de alta concordancia y sin objeciones editoriales.'
  spanish_consistency_notes:
  - Se usó "rostro" para πρόσωπον, manteniendo la imagen concreta y evitando el desplazamiento semántico a "presencia".
  - Se conservó "su" para αὐτοῦ, siguiendo la decisión del POB en inglés de no explicitar el referente en el texto principal.
  - '"Sobre sus frentes" preserva la imagen espacial de ἐπί con genitivo y es consistente con el registro bíblico moderno en español.'
