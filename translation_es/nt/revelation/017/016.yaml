revisions:
- from: Y los diez cuernos que viste, y la bestia[a], estos odiarán a la prostituta, y la dejarán desolada y desnuda, y comerán las carnes[b] de ella, y la quemarán con fuego.
  to: Y los diez cuernos que viste, y la bestia, estos odiarán a la prostituta, y la dejarán desolada y desnuda[a], y comerán su carne[b], y la consumirán por completo con fuego.
  rationale: Se corrige el anclaje de la nota lexical para que recaiga sobre 'desnuda', que es el término comentado por el audit trail. Se cambia 'las carnes de ella' por 'su carne' para un español más natural que sigue preservando σάρξ como 'carne'. Se refuerza la intensidad de κατακαύσουσιν con 'la consumirán por completo con fuego', que expresa mejor el valor del compuesto sin perder claridad ni dignidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la imaginería del griego: conserva ''cuernos'', ''bestia'', el demostrativo enfático ''estos'', la prostituta, la desolación, la desnudez, el comer su carne y el quemarla con fuego. Sin embargo, hay dos desajustes principales con la evidencia fuente y el audit trail inglés: (1) la nota [a] está anclada erróneamente a ''bestia'' cuando corresponde a ''desnuda''; (2) ''las carnes de ella'' suena poco natural y no refleja bien el singular posesivo idiomático que mejor comunica τὰς σάρκας αὐτῆς en español bíblico claro. Además, ''la quemarán con fuego'' pierde algo de la fuerza intensiva de κατακαύσουσιν.'
  spanish_quality_summary: El texto es en general legible y digno, pero presenta una falla formal importante de notas y una formulación algo rígida en 'las carnes de ella'. En español natural y fiel, 'su carne' comunica mejor la imagen violenta sin sonar extraña. También conviene reforzar la intensidad de κατακαίω con 'la consumirán por completo con fuego' o similar, manteniendo naturalidad.
  glossary_alignment: 'La terminología clave está mayormente alineada con el proyecto y con el audit trail: ''bestia'' por θηρίον, ''prostituta'' por πόρνη, ''desnuda'' por γυμνήν y mantenimiento de la imaginería apocalíptica. No hay términos de glosario mayores en conflicto. La principal corrección es de anclaje de nota y de mejor español para σάρκας.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en 'la bestia' en lugar de 'desnuda'.
    rationale: La nota inglesa explica la alternativa lexical de γυμνήν ('naked' / 'stripped bare'), no θηρίον. El anclaje actual induce a error y rompe la correspondencia entre texto y nota.
  - severity: medium
    issue: '''Comerán las carnes de ella'' es poco idiomático en español.'
    rationale: Aunque intenta reflejar el plural griego, en español bíblico claro suena forzado. 'Comerán su carne' preserva mejor el sentido literal y la violencia de la imagen sin extrañeza innecesaria.
  - severity: medium
    issue: '''La quemarán con fuego'' atenúa la fuerza intensiva de κατακαύσουσιν.'
    rationale: El verbo compuesto sugiere consumir completamente por fuego. En español conviene reflejar esa intensidad con una formulación natural como 'la consumirán por completo con fuego'.
  revised_spanish_text: Y los diez cuernos que viste, y la bestia, estos odiarán a la prostituta, y la dejarán desolada y desnuda[a], y comerán su carne[b], y la consumirán por completo con fuego.
  revised_footnotes:
  - marker: a
    text: O "despojada por completo". El griego dice "desnuda", con el sentido de humillación pública y exposición.
    reason: lexical_alternative
  - marker: b
    text: '"Carne" es literal aquí; dentro de la imaginería apocalíptica de Apocalipsis, la expresión describe destrucción violenta total.'
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota lexical para que recaiga sobre 'desnuda', que es el término comentado por el audit trail. Se cambia 'las carnes de ella' por 'su carne' para un español más natural que sigue preservando σάρξ como 'carne'. Se refuerza la intensidad de κατακαύσουσιν con 'la consumirán por completo con fuego', que expresa mejor el valor del compuesto sin perder claridad ni dignidad.
