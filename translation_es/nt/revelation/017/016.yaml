translation:
  language: es
  text: Y los diez cuernos que viste, y la bestia, estos odiarán a la prostituta, y la dejarán desolada y desnuda[a], y comerán su carne[b], y la consumirán por completo con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "despojada por completo". El griego dice "desnuda", con el sentido de humillación pública y exposición.
    reason: lexical_alternative
  - marker: b
    text: '"Carne" es literal aquí; dentro de la imaginería apocalíptica de Apocalipsis, la expresión describe destrucción violenta total.'
    reason: cultural_note
lexical_decisions:
- source_word: κέρατα
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - astas
  - poderes
  lexicon: BDAG
  rationale: Se conserva la imagen apocalíptica literal de los cuernos, como en la versión inglesa auditada. En español, 'cuernos' comunica de forma natural el símbolo sin convertirlo en interpretación.
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - monstruo
  - animal
  lexicon: BDAG
  rationale: '''Bestia'' reproduce el valor apocalíptico del término griego y mantiene el tono ominoso del pasaje.'
- source_word: μισήσουσι
  english_pob_choice: will hate
  chosen_spanish: odiarán
  alternatives_spanish:
  - aborrecerán
  - detestarán
  lexicon: BDAG
  rationale: El futuro de μισέω se expresa con 'odiarán', el equivalente directo y claro en español.
- source_word: πόρνην
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - ramera/prostituta
  - ramera
  lexicon: BDAG
  rationale: '''Prostituta'' es el equivalente moderno más claro y menos arcaico. Se evita ''ramera'' por ser más tradicional pero menos transparente para el lector actual.'
- source_word: ἠρημωμένην ποιήσουσιν
  english_pob_choice: will make her desolate
  chosen_spanish: la dejarán desolada
  alternatives_spanish:
  - la volverán desolada
  - la devastarán
  lexicon: BDAG
  rationale: La construcción causativa se expresa de manera natural con 'dejarán desolada', preservando el resultado de 'hacerla quedar desolada' sin endurecer innecesariamente el español.
- source_word: γυμνήν
  english_pob_choice: naked
  chosen_spanish: desnuda
  alternatives_spanish:
  - nuda
  - despojada
  lexicon: BDAG
  rationale: '''Desnuda'' es el equivalente más natural de γυμνός en español. Mantiene la nota de exposición pública y humillación que señala la nota inglesa.'
- source_word: σάρκας
  english_pob_choice: flesh
  chosen_spanish: carnes
  alternatives_spanish:
  - carne
  - tejidos
  lexicon: BDAG
  rationale: Se conserva la fuerza literal de σάρξ. En plural, 'carnes' refleja mejor el plural griego τὰς σάρκας y evita aplanar la imagen violentamente corporal del texto.
- source_word: φάγονται
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - devorarán
  - se comerán
  lexicon: BDAG
  rationale: '''Comerán'' traduce de modo directo ἐσθίω y reproduce el horror de la imagen sin introducir una intensificación no exigida por el verbo.'
- source_word: κατακαύσουσιν ἐν πυρί
  english_pob_choice: will burn her up with fire
  chosen_spanish: la quemarán con fuego
  alternatives_spanish:
  - la quemarán totalmente con fuego
  - la consumirán con fuego
  lexicon: BDAG
  rationale: El verbo compuesto expresa quema intensa; en español, 'quemarán con fuego' transmite fielmente la acción y su instrumento sin recargar el texto. 'La quemarán up' no es idiomático en español, por lo que se opta por una formulación natural y fiel.
- source_word: οὗτοι
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - ellos
  - aquellos
  lexicon: BDAG
  rationale: '''Estos'' reproduce el valor demostrativo y resume de manera enfática al sujeto colectivo ''los diez cuernos... y la bestia'', como en el audit trail inglés.'
theological_decisions:
- issue: Referente colectivo y concordancia plural en 'los diez cuernos ... y la bestia'
  english_pob_reading: 'Translate the clause as a collective subject followed by an emphatic plural resumptive pronoun: ''the ten horns that you saw, and the beast—these will...'''
  chosen_spanish_reading: 'Traducir con sujeto colectivo y demostrativo plural enfático: ''los diez cuernos que viste, y la bestia, estos ...'''
  alternative_spanish_readings:
  - los diez cuernos que viste y la bestia harán ...
  - los diez cuernos que viste, junto con la bestia, harán ...
  rationale: El griego combina imágenes neutras/plurales con un pronombre masculino plural resumptivo y verbos plurales. El español conserva esa estructura para no diluir la fuerza del sujeto colectivo ni resolver prematuramente la relación entre cuernos y bestia.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Conservación del simbolismo apocalíptico de la prostituta
  english_pob_reading: Preserve the apocalyptic metaphor without softening or over-explaining it in the main text.
  chosen_spanish_reading: Mantener 'la prostituta' y la secuencia de humillación y destrucción sin explicarla en el cuerpo del texto.
  alternative_spanish_readings:
  - identificarla explícitamente como un sistema o ciudad
  - parafrasear la imagen para hacerla menos cruda
  rationale: El versículo presenta una imagen simbólica de juicio. La traducción debe conservar el lenguaje figurado del texto y no resolver su interpretación dentro del versículo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se siguió el pasaje fuente griego y el expediente auditado en inglés sin cambios sustantivos respecto de la lectura final revisada; la versión española conserva la imaginería, la concordancia plural enfática y las notas léxicas necesarias para auditar 'desnuda' y 'carnes'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Bestia'' y ''prostituta'' se conservan como términos apocalípticos literales, sin sustituciones eclesiásticas tradicionales.'
  - '''Carnes'' en plural se usa deliberadamente para reflejar τὰς σάρκας y la pluralidad del griego.'
  - La puntuación con comas y la aposición 'y la bestia, estos' busca reproducir el énfasis colectivo del original sin forzar una sintaxis ajena al español.
