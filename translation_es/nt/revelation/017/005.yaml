translation:
  language: es
  text: 'Y sobre su frente estaba escrito un nombre: Misterio[a], Babilonia la Grande, la madre de las prostitutas y de las abominaciones de la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un nombre fue escrito, un misterio: Babilonia la Grande, la madre de las prostitutas y de las abominaciones de la tierra», entendiendo «misterio» como introducción del sentido simbólico del nombre y no como parte de la inscripción.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ τὸ μέτωπον αὐτῆς
  english_pob_choice: on her forehead
  chosen_spanish: sobre su frente
  alternatives_spanish:
  - en su frente
  - sobre la frente de ella
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo expresa ubicación sobre una superficie. «Sobre su frente» conserva la imagen de una inscripción colocada en la frente y suena natural en español bíblico contemporáneo.
- source_word: ὄνομα γεγραμμένον
  english_pob_choice: a name was written
  chosen_spanish: había escrito un nombre
  alternatives_spanish:
  - un nombre fue escrito
  - un nombre estaba escrito
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo describe un estado resultante: el nombre ya se encontraba escrito. En español, «había escrito»/«estaba escrito» comunica mejor ese estado que una calca rígida. Se elige una formulación idiomática sin perder el hecho de la inscripción.'
- source_word: μυστήριον
  english_pob_choice: Mystery
  chosen_spanish: Misterio
  alternatives_spanish:
  - misterio
  - secreto
  lexicon: BDAG
  rationale: Se mantiene como parte de la inscripción, en mayúscula por su función titulativa. «Secreto» debilitaría el registro apocalíptico y haría perder la ambigüedad simbólica que el inglés POB preserva.
- source_word: Βαβυλὼν ἡ μεγάλη
  english_pob_choice: Babylon the Great
  chosen_spanish: Babilonia la Grande
  alternatives_spanish:
  - Babilonia, la Grande
  - Babilonia la grande
  lexicon: BDAG
  rationale: Se translitera el nombre propio como «Babilonia» y se conserva el título fijo «la Grande», que reproduce bien el valor appositivo del griego y la tradición apocalíptica del pasaje.
- source_word: ἡ μήτηρ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - madre
  lexicon: BDAG
  rationale: 'El artículo griego forma parte natural del título en español: «la madre». Mantiene el valor identificador y la cadencia nominal del original.'
- source_word: τῶν πορνῶν
  english_pob_choice: of prostitutes
  chosen_spanish: de las prostitutas
  alternatives_spanish:
  - de las rameras
  - de las meretrices
  lexicon: BDAG
  rationale: πόρνη designa a una prostituta; «prostitutas» es transparente y actual, y conserva la fuerza moral del término sin introducir arcaísmos innecesarios.
- source_word: τῶν βδελυγμάτων
  english_pob_choice: of the abominations
  chosen_spanish: de las abominaciones
  alternatives_spanish:
  - de las cosas abominables
  - de las cosas detestables
  lexicon: BDAG
  rationale: «Abominaciones» conserva el registro bíblico y el tono de repulsión moral/cultual del sustantivo griego, mejor que una paráfrasis más débil.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra habitable
  - del mundo
  lexicon: BDAG
  rationale: En Apocalipsis, γῆ suele abarcar la esfera terrenal en contraste con lo celestial. «De la tierra» es la opción más directa y fiel al valor genitivo del griego.
theological_decisions:
- issue: ¿Debe μυστήριον entenderse como parte de la inscripción o como una etiqueta narrativa que introduce el significado simbólico?
  english_pob_reading: 'It is included in the inscription: ''Mystery, Babylon the Great...'''
  chosen_spanish_reading: 'Se incluye en la inscripción: «Misterio, Babilonia la Grande...»'
  alternative_spanish_readings:
  - «Misterio» introduce el sentido simbólico del nombre que sigue, sin formar parte de la inscripción.
  - «Misterio» funciona como glosa narrativa, no como componente del nombre escrito.
  rationale: El griego permite ambas lecturas; la puntuación moderna es interpretativa. Se conserva la lectura más directa del texto como inscripción escrita, pero se deja constancia de la alternativa viable para no borrar la tensión exegética.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés indica acuerdo alto y sin revisiones aplicadas; se conserva la decisión principal de incluir μυστήριον en la inscripción, pero se mantiene la alternativa en nota, en paralelo con la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como nombre propio transliterado y «la Grande» como título fijo.
  - Se usa «la tierra» para γῆ, siguiendo el alcance apocalíptico y la elección inglesa.
  - Se conserva «prostitutas» y «abominaciones» por su valor léxico fuerte y su registro bíblico.
  - La nota usa una estructura alternativa explícita para reflejar la tensión textual sin resolverla unilateralmente.
