  source_alignment_summary: 'El borrador sigue bien la estructura y las decisiones principales del griego y del POB en inglés: mantiene «Misterio» como parte de la inscripción, conserva «Babilonia la Grande», y refleja adecuadamente «las prostitutas» y «las abominaciones de la tierra». También preserva correctamente la lectura alternativa en nota.'
  spanish_quality_summary: La principal falla está en «había escrito un nombre», que en español estándar implica sujeto tácito activo («alguien había escrito») y no reproduce bien el participio perfecto pasivo γεγραμμένον ni la decisión inglesa «a name was written». «Estaba escrito» o «había un nombre escrito» sería natural; «estaba escrito» encaja mejor con el registro y la sintaxis del versículo. El resto del texto es claro y de registro adecuado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Misterio», «Babilonia la Grande», «prostitutas», «abominaciones» y «tierra» están bien alineados con las decisiones léxicas documentadas.
  issues:
  - severity: high
    issue: «había escrito un nombre» no expresa correctamente la voz pasiva/resultativa de ὄνομα γεγραμμένον
    rationale: La frase española suena activa e incompleta, como si faltara el sujeto que escribió. El griego describe el nombre como ya escrito/inscrito. Debe revisarse a una formulación pasiva o estativa natural, p. ej. «había un nombre escrito» o «estaba escrito un nombre». Dado el POB inglés, «estaba escrito un nombre» preserva mejor el enfoque verbal.
  - severity: low
    issue: La decisión léxica asociada a ὄνομα γεγραμμένον justifica una forma que no coincide con el texto elegido
    rationale: La explicación menciona mejor «estaba escrito», pero el borrador usa «había escrito». Conviene armonizar texto y racionalidad documentada.
