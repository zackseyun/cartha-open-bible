translation:
  language: es
  text: 'Y el ángel me dijo: «¿Por qué te asombraste? Yo te diré el misterio de la mujer y de la bestia que la lleva[a], que tiene las siete cabezas y los diez cuernos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sostiene».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμασας
  english_pob_choice: did you marvel
  chosen_spanish: te asombraste
  alternatives_spanish:
  - te maravillaste
  - te admiraste
  lexicon: BDAG
  rationale: θαυμάζω expresa asombro o admiración; en español, «asombraste» conserva el tono enfático y apocalíptico sin sonar arcaico. «Maravillaste» podría sugerir un matiz demasiado positivo o casi de deleite.
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: En Apocalipsis, μυστήριον no es solo algo oculto, sino una realidad revelada. «Misterio» reproduce mejor ese sentido teológico que «secreto».
- source_word: γυναικὸς
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa», pero aquí la figura es simbólica y no se introduce relación conyugal alguna. «Mujer» es la opción más fiel y natural.
- source_word: θηρίου
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - criatura
  lexicon: BDAG
  rationale: θηρίον en Apocalipsis es un término técnico y cargado. «Bestia» preserva la continuidad intertextual y las connotaciones monstruosas del libro.
- source_word: βαστάζοντος
  english_pob_choice: carries
  chosen_spanish: la lleva
  alternatives_spanish:
  - la sostiene
  - la carga
  lexicon: BDAG
  rationale: βαστάζω puede significar llevar, cargar o sostener. «La lleva» comunica con naturalidad la imagen de la mujer montada sobre la bestia, sin perder el sentido básico del participio.
- source_word: ἔχοντος
  english_pob_choice: which has
  chosen_spanish: que tiene
  alternatives_spanish:
  - que posee
  lexicon: BDAG
  rationale: El participio descriptivo se vierte de forma natural con «que tiene». En español mantiene la conexión con la bestia sin volver la frase pesada.
- source_word: κεφαλάς
  english_pob_choice: heads
  chosen_spanish: cabezas
  alternatives_spanish:
  - cetros
  lexicon: BDAG
  rationale: La imagen corporal literal debe conservarse; «cabezas» refleja el símbolo sin interpretarlo prematuramente.
- source_word: κέρατα
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - astas
  lexicon: BDAG
  rationale: «Cuernos» es la equivalencia directa y mantiene el simbolismo apocalíptico tradicional del término.
- source_word: Διὰ τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué...?
  alternatives_spanish:
  - ¿Para qué...?
  lexicon: BDAG
  rationale: La pregunta idiomática se expresa de manera natural con «¿Por qué...?»; en este contexto comunica la reprensión suave o extrañeza del ángel.
- source_word: ἐρῶ σοι
  english_pob_choice: I will tell you
  chosen_spanish: Yo te diré
  alternatives_spanish:
  - te explicaré
  - te hablaré de
  lexicon: BDAG
  rationale: El futuro de λέγω introduce la explicación venidera. «Yo te diré» es directo y fiel; el pronombre explícito refuerza el contraste enfático del griego.
theological_decisions:
- issue: Relación sintáctica de la cláusula relativa final
  english_pob_reading: Attach the description to 'the beast' rather than to the woman or to the combined mystery.
  chosen_spanish_reading: La cláusula «que la lleva, la cual tiene las siete cabezas y los diez cuernos» se refiere a la bestia, no a la mujer.
  alternative_spanish_readings:
  - Atribuir la última relativa a la mujer por cercanía superficial
  - Dejar la referencia ambigüa en español
  rationale: Los participios genitivos masculinos/neutros concuerdan con θηρίου y no con γυναικός. Conviene reflejar esa claridad en español para no oscurecer la sintaxis del texto griego.
  doctrine_reference: Respeto a la sintaxis original y preservación de la identidad simbólica de la bestia en Apocalipsis.
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego y el audit trail inglés sin revisiones sustantivas; se conserva la decisión de hacer explícito que la descripción final pertenece a la bestia. No se introducen cambios textuales ni interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa «mujer», no «esposa», por consistencia con el valor simbólico del término en el contexto.
  - Se usa «bestia» de manera coherente con el vocabulario apocalíptico de Apocalipsis.
  - Se mantiene «misterio» como término técnico teológico, no como simple «secreto».
  - La nota al pie marca la alternativa lexical de βαστάζω sin debilitar la lectura principal.
