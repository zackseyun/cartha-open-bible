translation:
  language: es
  text: Y vi a la mujer ebria de la sangre de los santos y de la sangre de los mártires de Jesús[a]. Y, al verla, me maravillé grandemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los testigos de Jesús». El griego μάρτυρων puede significar «testigos» o, por desarrollo contextual, «mártires»; aquí la mención de su sangre hace especialmente adecuado el sentido de «mártires».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθύουσαν
  english_pob_choice: drunk with
  chosen_spanish: borracha de
  alternatives_spanish:
  - embriagada con
  - ebria de
  lexicon: BDAG
  rationale: El participio describe el estado figurado de la mujer; en español, «borracha de» conserva la imagen impactante y naturaliza la construcción mejor que una frase más técnica o menos idiomática.
- source_word: ἐκ τοῦ αἵματος
  english_pob_choice: with the blood of
  chosen_spanish: de la sangre de
  alternatives_spanish:
  - con la sangre de
  - a partir de la sangre de
  lexicon: BDAG
  rationale: Aunque ἐκ literalmente expresa origen («de / desde»), la metáfora de la embriaguez en español se comunica con una construcción de complemento introducido por «de». Mantiene la imagen sin forzar el idioma.
- source_word: τῶν ἁγίων
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los consagrados
  lexicon: BDAG
  rationale: ἅγιοι en Apocalipsis se refiere a los pertenecientes a Dios. «Los santos» es la forma breve, reconocible y fiel al uso bíblico, sin reemplazarla por una paráfrasis más explicativa.
- source_word: τῶν μαρτύρων Ἰησοῦ
  english_pob_choice: the martyrs of Jesus
  chosen_spanish: los mártires de Jesús
  alternatives_spanish:
  - los testigos de Jesús
  - los testigos/mártires de Jesús
  lexicon: BDAG
  rationale: Aunque μάρτυς puede significar «testigo», el contexto inmediato menciona su sangre, y el audit trail inglés corrigió la opción más amplia hacia «martyrs». En español, «mártires de Jesús» conserva ese matiz contextual y la relación compacta del genitivo.
- source_word: ἰδὼν αὐτὴν
  english_pob_choice: seeing her
  chosen_spanish: al verla
  alternatives_spanish:
  - viéndola
  - cuando la vi
  lexicon: BDAG
  rationale: El participio aoristo se expresa naturalmente con una construcción temporal en español. «Al verla» es breve, claro y más cercano al giro griego que una subordinada más elaborada.
- source_word: ἐθαύμασα
  english_pob_choice: I marveled
  chosen_spanish: me maravillé
  alternatives_spanish:
  - me asombré
  - quedé maravillado
  lexicon: BDAG
  rationale: θαυμάζω expresa asombro admirativo. «Me maravillé» conserva el tono elevado y la intensidad de la reacción sin introducir ambigüedad.
- source_word: θαῦμα μέγα
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - con gran asombro
  - muchísimo
  lexicon: BDAG
  rationale: El acusativo de cognado intensifica el verbo. En español, «grandemente» reproduce ese énfasis adverbial de forma solemne; «con gran asombro» sería más explicativo y menos directo.
theological_decisions:
- issue: μάρτυρες / μαρτύρων en contexto de persecución apocalíptica
  english_pob_reading: The English audit trail keeps the lexical note that μάρτυς can mean 'witness' or 'martyr,' but the revision pass moved the main text to 'martyrs' because the mention of their blood makes that sense especially fitting.
  chosen_spanish_reading: Se traduce «mártires de Jesús» en el texto principal, manteniendo el sentido contextual más preciso.
  alternative_spanish_readings:
  - testigos de Jesús
  - testigos/mártires de Jesús
  rationale: En español, «testigos» conserva el sentido léxico base, pero aquí la referencia a la sangre inclina claramente hacia el sentido de martirio. Por eso se adopta «mártires» en el texto principal, sin negar la amplitud semántica del término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
- issue: Relación entre la embriaguez figurada y la sangre derramada
  english_pob_reading: '''Drunk with the blood of the saints'' preserves the shocking metaphor while using normal English idiom.'
  chosen_spanish_reading: «borracha de la sangre» conserva la metáfora fuerte y su choque retórico.
  alternative_spanish_readings:
  - embriagada con la sangre
  - ebria de la sangre
  rationale: No conviene suavizar la imagen apocalíptica. La metáfora de embriaguez por sangre derramada es deliberadamente violenta; «borracha de» la comunica sin eufemismo y sin perder inteligibilidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «the witnesses of Jesus» a «the martyrs of Jesus» en la revisión más reciente, y también ajustó el final a una forma más cercana de ἰδὼν αὐτὴν. La presente redacción española sigue esa decisión revisada y mantiene el valor aspectual del participio con «al verla».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo exija.
  - Se usa «mártires» en coherencia con el ajuste revisado del audit trail inglés; la nota al pie preserva la alternativa léxica «testigos».
  - «Borracha de la sangre» conserva el tono apocalíptico sin reexplicarlo ni atenuarlo.
