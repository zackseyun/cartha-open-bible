review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura y el sentido del griego: introducción exhortativa, identificación simbólica de las siete cabezas con siete montes, ubicación de la mujer sobre ellos, y nueva identificación con siete reyes. También preserva correctamente la nota léxica sobre ὄρη. Sin embargo, «la mente que tiene sabiduría» suena poco idiomático en español bíblico-natural y no refleja tan bien el valor de νοῦς como facultad de entendimiento/discernimiento en este contexto interpretativo.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero «la mente que tiene sabiduría» resulta rígido e impropio en español natural. «La mente con sabiduría» sería algo más breve, pero sigue sonando extraño. Una formulación como «Aquí está el entendimiento que tiene sabiduría» conserva la literalidad suficiente de νοῦς y mejora la legibilidad en español eclesial amplio. El resto del versículo fluye bien.
  glossary_alignment: No hay conflicto con los términos de proyecto como Yahvé/Mesías/etc. «montes» para ὄρη está bien sustentado, con «colinas» en nota. «La mujer», «cabezas» y «reyes» preservan el simbolismo sin resolverlo interpretativamente.
  issues:
  - severity: medium
    issue: «la mente que tiene sabiduría» es poco idiomático para ὁ νοῦς ὁ ἔχων σοφίαν
    rationale: Aunque es muy literal, en español suena forzado y puede sugerir una referencia psicológica más que la idea de entendimiento/discernimiento requerida para interpretar la visión. «Entendimiento» comunica mejor el sentido contextual sin caer en paráfrasis excesiva.
  revised_spanish_text: 'Aquí está el entendimiento que tiene sabiduría: las siete cabezas son siete montes[a], sobre los cuales se sienta la mujer, y son siete reyes.'
