revisions:
- from: 'Aquí está la mente que tiene sabiduría: las siete cabezas son siete montes[a], sobre los cuales se sienta la mujer, y son siete reyes.'
  to: 'Aquí está el entendimiento que tiene sabiduría: las siete cabezas son siete montes[a], sobre los cuales se sienta la mujer, y son siete reyes.'
  rationale: Se ajusta únicamente νοῦς de «mente» a «entendimiento» para lograr un español más natural y contextualmente preciso en un pasaje de discernimiento interpretativo apocalíptico, manteniendo la estructura, el simbolismo y la nota léxica existentes.
