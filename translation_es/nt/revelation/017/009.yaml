translation:
  language: es
  text: 'Aquí está el entendimiento que tiene sabiduría: las siete cabezas son siete montes[a], sobre los cuales se sienta la mujer, y son siete reyes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete colinas». El griego puede referirse a montes o colinas; «montes» es la traducción más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὧδε
  english_pob_choice: Here is
  chosen_spanish: Aquí está
  alternatives_spanish:
  - Aquí
  - He aquí
  lexicon: BDAG
  rationale: La fórmula introductoria presenta una declaración explicativa; «Aquí está» conserva la fuerza demostrativa y suena natural en español sin perder el matiz de introducción interpretativa.
- source_word: ὁ νοῦς ὁ ἔχων σοφίαν
  english_pob_choice: the mind that has wisdom
  chosen_spanish: la mente que tiene sabiduría
  alternatives_spanish:
  - la mente con sabiduría
  - una mente con sabiduría
  - la mente que tiene discernimiento
  lexicon: BDAG
  rationale: «νοῦς» se rinde mejor con «mente» en español moderno, y «que tiene sabiduría» mantiene la construcción participial sin interpretar de más. «Sabiduría» conserva la cualidad requerida para entender la visión.
- source_word: αἱ ἑπτὰ κεφαλαὶ
  english_pob_choice: the seven heads
  chosen_spanish: las siete cabezas
  alternatives_spanish:
  - las siete cabezas simbólicas
  lexicon: BDAG
  rationale: Se conserva el término simbólico de forma directa, sin explicitar su referente histórico en el texto principal.
- source_word: ἑπτὰ ὄρη
  english_pob_choice: seven mountains
  chosen_spanish: siete montes
  alternatives_spanish:
  - siete montañas
  - siete colinas
  lexicon: BDAG
  rationale: El griego ὄρη designa propiamente montes/montañas; «montes» es directo, claro y evita resolver en la traducción si la alusión apunta a colinas específicas.
- source_word: ὅπου ἡ γυνὴ κάθηται ἐπ’ αὐτῶν
  english_pob_choice: on which the woman sits
  chosen_spanish: sobre los cuales se sienta la mujer
  alternatives_spanish:
  - en los cuales se sienta la mujer
  - donde se sienta la mujer
  lexicon: BDAG
  rationale: «Sobre los cuales» refleja mejor la relación espacial de ἐπί con genitivo. «Se sienta» reproduce el valor verbal del griego de manera natural en español. Se evita una redundancia como «donde... sobre ellos».
- source_word: καὶ βασιλεῖς ⸂ἑπτά εἰσιν⸃
  english_pob_choice: and they are seven kings
  chosen_spanish: y son siete reyes
  alternatives_spanish:
  - y ellos son siete reyes
  - y hay siete reyes
  lexicon: BDAG
  rationale: En español, el sujeto elíptico se entiende por el contexto previo; «y son siete reyes» mantiene la identificación apposicional sin sobrecargar la frase con un pronombre innecesario.
theological_decisions:
- issue: Identificación simbólica de los siete montes y los siete reyes
  english_pob_reading: Retain the symbolic correspondences in translation without resolving whether the mountains and kings refer specifically to Rome, emperors, kingdoms, or another apocalyptic schema.
  chosen_spanish_reading: Conservar las correspondencias simbólicas sin decidir en el texto si los montes y los reyes aluden específicamente a Roma, a emperadores, a reinos o a otro esquema apocalíptico.
  alternative_spanish_readings:
  - Interpretar «siete montes» como las siete colinas de Roma
  - Interpretar «siete reyes» como siete reinos o gobernantes concretos
  rationale: El versículo presenta una identificación simbólica, pero no obliga al traductor a cerrar el referente histórico. La redacción española preserva la tensión interpretativa documentada por el auditorio inglés.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió la revisión auditada que prefirió una relación más natural y exacta para ὅπου ... ἐπ’ αὐτῶν, evitando la redundancia de decir algo equivalente a «donde la mujer se sienta sobre ellos». La versión española conserva esa mejora con «sobre los cuales se sienta la mujer».
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Mesías según las normas del proyecto; este versículo no requiere esos términos.
  - Se usa «montes» en el texto principal y se preserva la alternativa «colinas» en nota, siguiendo la distinción léxica documentada en el inglés POB.
  - La frase final «y son siete reyes» conserva la identificación apposicional sin añadir interpretación histórica no explicitada por el texto.
