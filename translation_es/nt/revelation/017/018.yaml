translation:
  language: es
  text: Y la mujer que viste es la gran ciudad que tiene dominio sobre los reyes de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que tiene un reino sobre los reyes de la tierra». La expresión griega dice literalmente «teniendo reino», que también puede entenderse como posesión de realeza o gobierno real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: γυνή puede significar 'mujer' o 'esposa'. Aquí la figura es simbólica y visionaria, no un vínculo matrimonial; 'mujer' es el equivalente natural y menos interpretativo.
- source_word: ἣν εἶδες
  english_pob_choice: whom you saw
  chosen_spanish: que viste
  alternatives_spanish:
  - a quien viste
  - la que viste
  lexicon: BDAG
  rationale: El relativo identifica a la figura vista por Juan. En español, 'que viste' fluye con naturalidad y conserva la referencia directa sin sobrecargarla con un relativo más marcado.
- source_word: πόλις ἡ μεγάλη
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - la gran metrópolis
  lexicon: BDAG
  rationale: πόλις se rinde de forma directa como 'ciudad'. 'Gran ciudad' preserva el orden y el tono apocalíptico sin añadir matices no presentes en el griego.
- source_word: ἔχουσα βασιλείαν
  english_pob_choice: that has dominion
  chosen_spanish: la que tiene dominio
  alternatives_spanish:
  - la que tiene un reino
  - la que ejerce gobierno real
  - la que reina
  lexicon: BDAG
  rationale: La expresión griega, literalmente 'teniendo reino/kingship', apunta aquí a autoridad soberana ejercida. 'Tiene dominio' comunica bien esa fuerza sin convertirlo en un reino territorial específico.
- source_word: βασιλεία
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - reino
  - reinado
  - gobierno
  lexicon: BDAG
  rationale: En este contexto, βασιλεία no señala tanto un territorio como la autoridad real ejercida. 'Dominio' preserva ese énfasis en la soberanía efectiva.
- source_word: ἐπὶ τῶν βασιλέων
  english_pob_choice: over the kings
  chosen_spanish: sobre los reyes
  alternatives_spanish:
  - encima de los reyes
  - por encima de los reyes
  lexicon: BDAG
  rationale: La preposición expresa supremacía o autoridad sobre. 'Sobre los reyes' es la forma más natural en español para esa relación de gobierno.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del mundo
  - de la tierra habitada
  lexicon: BDAG
  rationale: En Apocalipsis, γῆ conserva a menudo el sentido amplio de 'tierra' frente a 'cielo'. 'De la tierra' mantiene esa amplitud sin restringirla a un territorio local.
theological_decisions:
- issue: Identificación simbólica entre la mujer y la ciudad
  english_pob_reading: 'Render the statement as a direct symbolic identification: ''the woman ... is the great city.'''
  chosen_spanish_reading: 'Mantener la identificación simbólica directa: ''la mujer ... es la gran ciudad''.'
  alternative_spanish_readings:
  - la mujer representa la gran ciudad
  - la mujer significa la gran ciudad
  rationale: El griego usa la simple cópula ἔστιν ('es'). Traducir con 'es' conserva la identificación simbólica tal como está formulada y evita suavizarla con una glosa interpretativa.
  doctrine_reference: Preservar la tensión simbólica sin resolverla mediante paráfrasis.
translation_notes:
  revision_awareness: El texto base y el criterio de traducción están en alto acuerdo con la versión inglesa auditada; no se detectaron revisiones previas relevantes ni cambios pendientes en el pasaje.
  spanish_consistency_notes:
  - Se mantuvo 'mujer' para γυνή por la figura visionaria simbólica.
  - Se conservó 'es' para ἔστιν, evitando paráfrasis como 'representa'.
  - '''Dominio'' se eligió para βασιλεία por el matiz de soberanía ejercida, no de reino territorial.'
  - '''De la tierra'' mantiene el alcance amplio y apocalíptico de γῆ.'
