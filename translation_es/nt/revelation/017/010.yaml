translation:
  language: es
  text: Cinco han caído[a], uno es, el otro todavía no ha venido; y cuando venga, debe permanecer por poco tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en contexto: "Cinco reyes han caído, un rey es, el otro rey todavía no ha venido".'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πέντε
  english_pob_choice: Five
  chosen_spanish: Cinco
  alternatives_spanish:
  - Los cinco
  - Los cinco reyes
  lexicon: BDAG
  rationale: El artículo griego con el numeral remite a los reyes mencionados antes, pero en español no hace falta reproducirlo con un artículo si eso suena menos natural. 'Cinco' conserva la referencia y la concisión apocalíptica.
- source_word: ἔπεσαν
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - han caído en derrota
  lexicon: BDAG
  rationale: El aoristo expresa una acción completa; en español, el pretérito perfecto compuesto comunica bien una caída ya consumada con relevancia presente, sin añadir interpretación histórica.
- source_word: ὁ εἷς ἔστιν
  english_pob_choice: one is
  chosen_spanish: uno es
  alternatives_spanish:
  - uno existe
  - uno permanece
  lexicon: BDAG
  rationale: La forma griega es elíptica. 'Uno es' preserva esa brevedad sin resolver el sentido como 'reina' o 'permanece'.
- source_word: ὁ ἄλλος
  english_pob_choice: the other
  chosen_spanish: el otro
  alternatives_spanish:
  - el restante
  - otro
  lexicon: BDAG
  rationale: '''El otro'' corresponde al contraste singular después de ''cinco'' y ''uno'', y suena natural en español.'
- source_word: οὔπω ἦλθεν
  english_pob_choice: has not yet come
  chosen_spanish: todavía no ha venido
  alternatives_spanish:
  - aún no ha venido
  - todavía no llegó
  lexicon: BDAG
  rationale: '''Ha venido'' es la equivalencia idiomática más natural para ἔρχομαι en este contexto. ''Todavía no'' conserva el matiz de espera implícita en οὔπω.'
- source_word: ὅταν ἔλθῃ
  english_pob_choice: when he comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - cuando llegue
  - cuando haya venido
  lexicon: BDAG
  rationale: ὅταν + subjuntivo aoristo pide una referencia futura condicional. En español, 'cuando venga' expresa de modo natural esa contingencia futura.
- source_word: ὀλίγον
  english_pob_choice: for a little while
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - por poco tiempo
  - por breve tiempo
  lexicon: BDAG
  rationale: '''Por un poco de tiempo'' comunica duración breve de forma clara y digna. Evita una lectura cuantitativa y conserva el valor adverbial de brevedad.'
- source_word: αὐτὸν δεῖ μεῖναι
  english_pob_choice: he must remain
  chosen_spanish: debe permanecer
  alternatives_spanish:
  - es necesario que permanezca
  - debe quedarse
  lexicon: BDAG
  rationale: La construcción impersonal δεῖ expresa necesidad. 'Debe permanecer' mantiene el sentido de obligación/necesidad y el registro formal de la visión apocalíptica.
theological_decisions:
- issue: Identificación de los reyes
  english_pob_reading: Retain the text's elliptical wording without identifying the kings or importing a historical scheme.
  chosen_spanish_reading: Mantener la formulación breve sin identificar a los reyes ni introducir un esquema histórico en el texto.
  alternative_spanish_readings:
  - Cinco reyes han caído, uno reina, el otro rey todavía no ha venido
  - Identificar en la traducción a emperadores romanos específicos
  rationale: El contexto inmediato habla de reyes, pero este versículo conserva una elipsis deliberada. La traducción debe respetar esa tensión apocalíptica y no resolver una cuestión interpretativa debatida dentro del texto principal.
  doctrine_reference: Preservar la tensión interpretativa sin sobreespecificar.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del texto base inglés, que ajustó 'for a little while' para reflejar con mayor precisión ὀλίγον ... μεῖναι. En español se optó por 'por un poco de tiempo' para conservar esa brevedad sin introducir énfasis excesivo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - '''Han caído'' mantiene la completitud del evento sin añadir sujetos ni aclaraciones extratextuales.'
  - '''Debe permanecer'' conserva el tono formal de necesidad de δεῖ y evita ''quedarse'', que sería más coloquial.'
