revisions:
- from: Y la mujer estaba vestida de púrpura y escarlata[a], y adornada con oro, piedras preciosas y perlas, teniendo en su mano una copa de oro llena de abominaciones y de las cosas inmundas de su inmoralidad sexual.
  to: Y la mujer estaba vestida de púrpura y escarlata, y adornada con oro, piedras preciosas y perlas, teniendo en su mano una copa de oro llena de abominaciones y de las cosas inmundas de su inmoralidad sexual[a].
  rationale: Se mantiene intacto el texto principal salvo el traslado de la nota al lugar correcto y la corrección de su contenido para reflejar la decisión léxica documentada sobre πορνεία en el inglés POB. No se requieren más cambios, porque el resto del español es fiel, natural y teológicamente adecuado.
