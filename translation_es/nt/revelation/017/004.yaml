translation:
  language: es
  text: Y la mujer estaba vestida de púrpura y escarlata, y adornada con oro, piedras preciosas y perlas, teniendo en su mano una copa de oro llena de abominaciones y de las cosas inmundas de su inmoralidad sexual[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prostitución» o «fornicación» para «inmoralidad sexual»; en Apocalipsis, el griego puede tener fuerza tanto literal como metafórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβεβλημένη
  english_pob_choice: was clothed
  chosen_spanish: estaba vestida
  alternatives_spanish:
  - estaba cubierta
  - estaba adornada
  lexicon: BDAG
  rationale: El participio perfecto con ἦν describe un estado resultante. «Estaba vestida» expresa bien ese estado en español natural y mantiene la idea de vestimenta sin sonar arcaico.
- source_word: πορφυροῦν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura real
  lexicon: BDAG
  rationale: El adjetivo griego funciona como color asociado a lujo y realeza. «Púrpura» es el equivalente más preciso y bíblicamente reconocible en español.
- source_word: κόκκινον
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - rojo
  - carmesí
  lexicon: BDAG
  rationale: «Escarlata» reproduce con precisión el matiz vívido del color y conserva el valor simbólico de la imagen apocalíptica mejor que un simple «rojo».
- source_word: κεχρυσωμένη
  english_pob_choice: adorned with gold
  chosen_spanish: adornada con oro
  alternatives_spanish:
  - recubierta de oro
  - dorada
  lexicon: BDAG
  rationale: El participio indica ornamentación u overlay de oro. «Adornada con oro» comunica el sentido de lujo decorativo sin imponer más materialidad de la que da el griego.
- source_word: χρυσίῳ
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - joyas de oro
  lexicon: BDAG
  rationale: El dativo de medio con κεχρυσωμένη queda bien reflejado con «oro», manteniendo abierta la forma exacta del ornamento, como en el griego.
- source_word: λίθῳ τιμίῳ
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - una piedra preciosa
  - gemas
  lexicon: BDAG
  rationale: Aunque la forma es singular, el listado exige un sentido genérico. «Piedras preciosas» es idiomático en español y preserva el valor de lujo del plural semántico.
- source_word: μαργαρίταις
  english_pob_choice: pearls
  chosen_spanish: perlas
  alternatives_spanish:
  - perlas ornamentales
  lexicon: BDAG
  rationale: El sentido léxico estándar es «perlas»; el plural se conserva para reflejar el inventario de adornos.
- source_word: ποτήριον χρυσοῦν
  english_pob_choice: a golden cup
  chosen_spanish: una copa de oro
  alternatives_spanish:
  - una copa dorada
  - un cáliz de oro
  lexicon: BDAG
  rationale: «Copa de oro» conserva el sustantivo y el adjetivo sin introducir lenguaje litúrgico ajeno. «Cáliz» sería más eclesial que el griego.
- source_word: γέμον
  english_pob_choice: full of
  chosen_spanish: llena
  alternatives_spanish:
  - llena de
  - rebosante
  lexicon: BDAG
  rationale: El participio presente modifica la copa. «Llena» es breve y natural en español, manteniendo la idea de contenido abundante.
- source_word: βδελυγμάτων
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas detestables
  - repugnancias
  lexicon: BDAG
  rationale: En uso bíblico y apocalíptico, «abominaciones» conserva la fuerza cultual y moral del término mejor que una paráfrasis más suave.
- source_word: τὰ ἀκάθαρτα
  english_pob_choice: the unclean things
  chosen_spanish: las cosas inmundas
  alternatives_spanish:
  - los inmundos
  - las impurezas
  lexicon: BDAG
  rationale: El neutro plural sustantivado pide una expresión plural en español. «Las cosas inmundas» refleja con fidelidad la idea de impureza ritual y moral sin forzar un término demasiado abstracto.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - prostitución
  - inmoralidad sexual
  lexicon: BDAG
  rationale: Se conserva el campo semántico amplio de πορνεία. «Inmoralidad sexual» permite abarcar tanto el sentido literal como el metafórico, como en el texto inglés de la POB.
theological_decisions:
- issue: Cómo rendir πορνείας en un contexto apocalíptico con carga literal y metafórica
  english_pob_reading: sexual immorality
  chosen_spanish_reading: inmoralidad sexual
  alternative_spanish_readings:
  - prostitución
  - fornicación
  rationale: En Apocalipsis la imagen puede aludir tanto a sexualidad ilícita literal como a infidelidad idólatra/metafórica. «Inmoralidad sexual» preserva esa amplitud y evita reducir el símbolo a solo prostitución comercial o a un término más arcaico.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica y lexical en vez de resolverla prematuramente.'
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado más reciente del audio inglés: se mantiene la serie de adornos y se refleja con más precisión τὰ ἀκάθαρτα como «las cosas inmundas», evitando una abstracción como «impurezas». También se conserva la amplitud semántica de πορνεία, no resuelta hacia un único matiz.'
  spanish_consistency_notes:
  - Se usa «púrpura» y «escarlata» como colores, no como materiales, porque el griego emplea adjetivos cromáticos asociados a vestidura lujosa.
  - Se evita «cáliz» para no introducir connotación litúrgica no presente en el griego.
  - «Inmoralidad sexual» fue preferida por su amplitud semántica y por coherencia con la decisión inglesa de mantener la tensión entre sentido literal y metafórico.
  - Se mantiene la cadencia coordinada del original con una sola oración extensa, propia del estilo apocalíptico.
