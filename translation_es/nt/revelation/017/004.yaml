review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego en la estructura principal: estado resultante de vestimenta, lujo ornamental, copa de oro, y contenido lleno de abominaciones y cosas inmundas asociadas con su πορνεία. Sin embargo, la nota al pie [a] es incorrecta: está anclada en «escarlata», pero ofrece «escarlata» como alternativa, cuando el inglés POB no nota una variante de color sino una alternativa para πορνεία/«inmoralidad sexual».'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. «Estaba vestida», «adornada con oro», «piedras preciosas y perlas» y «copa de oro» son buenas elecciones. «Las cosas inmundas de su inmoralidad sexual» es fiel, aunque algo pesada; sigue siendo aceptable. El problema principal es la nota al pie mal ubicada y mal formulada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Inmoralidad sexual» para πορνεία concuerda con la decisión inglesa y preserva la amplitud semántica. «Abominaciones» y «cosas inmundas» reflejan bien βδελυγμάτων y τὰ ἀκάθαρτα.
  issues:
  - severity: high
    issue: La nota al pie [a] no corresponde ni al texto fuente ni al rastro de auditoría inglés.
    rationale: El texto inglés POB pone la nota en «sexual immorality» para explicar alternativas de πορνεία («prostitution» / «fornication»). El borrador español la pone en «escarlata» y además ofrece «escarlata» como alternativa de «escarlata», lo cual es internamente erróneo y pierde la decisión léxica importante del versículo.
  - severity: low
    issue: La nota de color introduce una explicación innecesaria sobre intensificación visual.
    rationale: El griego sí distingue dos colores de lujo, pero no hay en la auditoría inglesa una nota que requiera explicarlo aquí; además la nota actual no aporta una alternativa real de traducción.
  revised_spanish_text: Y la mujer estaba vestida de púrpura y escarlata, y adornada con oro, piedras preciosas y perlas, teniendo en su mano una copa de oro llena de abominaciones y de las cosas inmundas de su inmoralidad sexual[a].
  revised_footnotes:
