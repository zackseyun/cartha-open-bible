    issue: «de entre los siete» interpreta demasiado ἐκ τῶν ἑπτά
    rationale: Aunque posible, «de entre» en español suele sugerir selección o membresía más concreta. El POB inglés preserva deliberadamente la amplitud de «from the seven». «De los siete» mantiene mejor la ambigüedad de origen, pertenencia o relación.
  - severity: low
    issue: Ligera rigidez estilística en la secuencia «es ... y es de entre los siete»
    rationale: La repetición de «es» es defendible por cercanía formal al griego, pero junto con «de entre» produce una frase más pesada. Al cambiar a «de los siete», la línea fluye mejor sin perder literalidad.
  - severity: low
    issue: Error de idioma en la justificación léxica auxiliar
    rationale: La palabra árabe «مخالف» aparece en la rationale de θηρίον. Debe corregirse a español («opuesto» o «contrario»), aunque esto no afecta el texto traducido.
  revised_spanish_text: Y la bestia que era y no es, es ella misma un octavo[a] y es de los siete[b], y va a la destrucción.
