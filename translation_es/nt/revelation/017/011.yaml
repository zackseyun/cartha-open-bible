revisions:
- from: Y la bestia que era y no es, es ella misma un octavo[a] y es de entre los siete[b], y va a la destrucción.
  to: Y la bestia que era y no es, es ella misma un octavo[a] y es de los siete[b], y va a la destrucción.
  rationale: Se ajusta «de entre los siete» a «de los siete» para reflejar con mayor fidelidad la ambigüedad de ἐκ τῶν ἑπτά y alinearse mejor con la decisión léxica y teológica documentada en el POB inglés. Se conservan la elipsis de «un octavo» y las notas explicativas.
