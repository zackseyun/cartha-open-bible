translation:
  language: es
  text: Y la bestia que era y no es, es ella misma un octavo[a] y es de los siete[b], y va a la destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un octavo rey»; el sustantivo «rey» está implícito por el contexto, pero no aparece en el griego.
    reason: alternative_reading
  - marker: b
    text: O «uno de los siete». El griego dice más literalmente «de los siete», lo que puede indicar origen, pertenencia o relación cercana.
    reason: lexical_alternative
lexical_decisions:
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - fiera
  lexicon: BDAG
  rationale: En Apocalipsis, θηρίον es un término apocalíptico cargado para un poder monstruoso y مخالف a Dios. «Bestia» conserva mejor esa fuerza simbólica que opciones más genéricas o más literales como «animal».
- source_word: ὃ ἦν καὶ οὐκ ἔστιν
  english_pob_choice: that was and is not
  chosen_spanish: que era y no es
  alternatives_spanish:
  - que existía y no existe
  - que era y ya no es
  lexicon: BDAG
  rationale: La forma breve «era y no es» conserva el paralelismo verbal del griego y la fórmula recurrente del capítulo, sin añadir una paráfrasis temporal más explícita de lo que el texto dice.
- source_word: αὐτὸς
  english_pob_choice: itself
  chosen_spanish: ella misma
  alternatives_spanish:
  - él mismo
  - ello mismo
  lexicon: BDAG
  rationale: El referente inmediato en español es «la bestia», sustantivo femenino. Se mantiene el énfasis de αὐτός con una forma natural en español, sin introducir un referente personal masculino que el griego no exige aquí.
- source_word: ὄγδοός
  english_pob_choice: an eighth
  chosen_spanish: un octavo
  alternatives_spanish:
  - el octavo
  - un octavo rey
  lexicon: BDAG
  rationale: El griego no explicita el sustantivo subentendido. «Un octavo» conserva la elipsis y deja abierta la categoría implícita del contexto, en vez de añadir «rey» al texto principal.
- source_word: ἐκ τῶν ἑπτά
  english_pob_choice: from the seven
  chosen_spanish: de entre los siete
  alternatives_spanish:
  - de los siete
  - uno de los siete
  lexicon: BDAG
  rationale: «De entre los siete» mantiene la idea de procedencia o relación derivada de ἐκ, sin cerrar la ambigüedad hacia la interpretación más específica «uno de los siete».
- source_word: εἰς ἀπώλειαν
  english_pob_choice: to destruction
  chosen_spanish: a la destrucción
  alternatives_spanish:
  - hacia la perdición
  - para ruina
  lexicon: BDAG
  rationale: «Destrucción» comunica con claridad la gravedad escatológica de ἀπώλεια en español moderno y conserva el sentido sin recurrir a un registro más arcaico o técnico.
- source_word: ὑπάγει
  english_pob_choice: it goes
  chosen_spanish: va
  alternatives_spanish:
  - va camino a
  - se va
  lexicon: BDAG
  rationale: El presente simple «va» reproduce la acción directa del verbo griego y sugiere movimiento hacia el destino señalado por la frase anterior.
theological_decisions:
- issue: Noun implied with ὄγδοός
  english_pob_reading: Leave the predicate as 'an eighth' without supplying 'king' in the main text.
  chosen_spanish_reading: Dejar «un octavo» sin añadir «rey» en el texto principal.
  alternative_spanish_readings:
  - un octavo rey
  rationale: El contexto inmediato habla de reyes, pero el griego aquí no dice βασιλεύς. Mantener la elipsis preserva la tersura y la ambigüedad simbólica del pasaje, dejando la inferencia al lector y a la nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Nuance of ἐκ τῶν ἑπτά
  english_pob_reading: Render as 'from the seven.'
  chosen_spanish_reading: Renderizar como «de entre los siete».
  alternative_spanish_readings:
  - uno de los siete
  - de los siete
  rationale: La expresión puede indicar origen, pertenencia o relación cercana. «De entre los siete» conserva esa tensión interpretativa sin resolverla prematuramente en una sola opción exegética.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alta concordancia y sin incidencias en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «bestia» para θηρίον por consistencia apocalíptica en Apocalipsis.
  - Se conserva el presente simple («era y no es», «va») para reflejar la formulación breve y directa del griego.
  - Se evita introducir «Cristo», «SEÑOR» o «rey» en el texto principal donde el griego no lo explicita.
  - La puntuación divide las tres cláusulas según la sintaxis del griego y la tradición editorial del pasaje.
