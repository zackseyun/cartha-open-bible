translation:
  language: es
  text: Y me llevó en el Espíritu a un lugar desierto. Y vi a una mujer sentada sobre una bestia escarlata[a], bestia llena de nombres blasfemos y que tenía siete cabezas y diez cuernos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en espíritu». La frase griega puede denotar un estado espiritual o ser llevado por el Espíritu; en Apocalipsis suele introducir una experiencia visionaria.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπήνεγκέν
  english_pob_choice: carried ... away
  chosen_spanish: me llevó
  alternatives_spanish:
  - me transportó
  - me arrebató
  lexicon: BDAG
  rationale: El aoristo de ἀποφέρω en este contexto visionario expresa traslado de un lugar a otro. En español, «me llevó» comunica el desplazamiento con naturalidad; «me transportó» es posible, pero menos sobrio; «me arrebató» añade intensidad no exigida por el texto.
- source_word: εἰς ἔρημον
  english_pob_choice: into a wilderness
  chosen_spanish: a un desierto
  alternatives_spanish:
  - a un desierto solitario
  - al desierto
  lexicon: BDAG
  rationale: ἔρημος puede ser desierto, despoblado o lugar desolado. Aquí el sustantivo sin artículo permite un valor indefinido; «a un desierto» conserva esa apertura sin fijar innecesariamente una imagen específica de «el desierto».
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  lexicon: BDAG
  rationale: En Apocalipsis la expresión marca una experiencia visionaria bajo la agencia del Espíritu. En español, la mayúscula en «Espíritu» refleja esa lectura teológica, mientras que «en espíritu» dejaría abierta una lectura más vaga; se mantiene la tensión reconocida por la nota inglesa.
- source_word: γυναῖκα
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: BDAG
  rationale: Es el objeto directo de «vi» y el equivalente normal y exacto en español.
- source_word: καθημένην ἐπὶ
  english_pob_choice: sitting on
  chosen_spanish: sentada sobre
  alternatives_spanish:
  - sentada en
  lexicon: BDAG
  rationale: El participio con ἐπί indica posición encima del animal. «Sentada sobre» preserva la imagen con fluidez natural; «sentada en» debilita la relación espacial.
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal salvaje
  - fiera
  lexicon: BDAG
  rationale: En la imaginería apocalíptica el término es técnico y cargado. «Bestia» reproduce el registro simbólico establecido en español bíblico sin reemplazarlo por una explicación.
- source_word: κόκκινον
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - roja
  - carmesí
  lexicon: BDAG
  rationale: Denota un rojo intenso; «escarlata» es la equivalencia más precisa y coincide con el color simbólico del pasaje.
- source_word: γέμοντα ὀνόματα βλασφημίας
  english_pob_choice: full of blasphemous names
  chosen_spanish: llena de nombres blasfemos
  alternatives_spanish:
  - llena de nombres de blasfemia
  - repleta de nombres blasfemos
  lexicon: BDAG
  rationale: El participio de πληρότητα expresa abundancia/lleno. En español, «llena de nombres blasfemos» conserva la función atributiva de βλασφημίας y su fuerza descriptiva sin volver la frase pesada.
- source_word: ἔχων
  english_pob_choice: having
  chosen_spanish: con
  alternatives_spanish:
  - teniendo
  lexicon: BDAG
  rationale: Aunque el griego usa un participio coordinado, en español la secuencia descriptiva fluye mejor con «con» para introducir otra característica del monstruo; se mantiene el sentido adjetival sin rigidizar la sintaxis.
- source_word: κεφαλὰς ἑπτὰ
  english_pob_choice: seven heads
  chosen_spanish: siete cabezas
  alternatives_spanish:
  - siete cráneos
  lexicon: BDAG
  rationale: Correspondencia directa y literal del sintagma nominal.
- source_word: κέρατα δέκα
  english_pob_choice: ten horns
  chosen_spanish: diez cuernos
  alternatives_spanish:
  - diez astas
  lexicon: BDAG
  rationale: Equivalencia directa y literal; «cuernos» es el término normal en español bíblico para esta imagen apocalíptica.
theological_decisions:
- issue: Interpretación de ἐν πνεύματι
  english_pob_reading: Rendered 'in the Spirit' to indicate prophetic transport under the Spirit's agency.
  chosen_spanish_reading: «en el Espíritu» para indicar traslado visionario bajo la acción del Espíritu.
  alternative_spanish_readings:
  - «en espíritu»
  rationale: La redacción mantiene la lectura teológica dominante en Apocalipsis sin cerrar innecesariamente la ambigüedad semántica del griego. La mayúscula señala la referencia personal al Espíritu Santo, mientras la nota conserva la alternativa menos determinada.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios sustantivos; se preservó el sentido visionario de ἐν πνεύματι y la imaginería apocalíptica de la bestia escarlata, manteniendo la misma resolución general de la revisión más reciente (sin cambios).
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto para el nombre divino, pero este versículo no lo contiene.
  - Se mantiene «Espíritu» con mayúscula en la lectura principal porque el contexto apocalíptico señala la agencia del Espíritu Santo.
  - 'Se eligieron términos de imaginería apocalíptica ya transparentes en español: «bestia», «escarlata», «cabezas», «cuernos».'
