translation:
  language: es
  text: Estos librarán guerra contra el Cordero[a], y el Cordero los vencerá, porque él es Señor de señores y Rey de reyes, y los que están con él son llamados, escogidos y fieles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego, literalmente: «librarán guerra con el Cordero»; en este contexto significa que librarán guerra contra él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Ellos
  - Estas personas
  lexicon: BDAG
  rationale: El demostrativo conserva la fuerza deíctica del griego y sigue de cerca la referencia inmediata a los aliados del dragón/la bestia en el contexto. 'Estos' es más directo y formal que 'ellos'.
- source_word: μετὰ τοῦ ἀρνίου
  english_pob_choice: against the Lamb
  chosen_spanish: contra el Cordero
  alternatives_spanish:
  - con el Cordero
  - en contra del Cordero
  lexicon: BDAG
  rationale: Con πολεμέω, μετά con genitivo funciona de manera adversativa en este contexto. 'Contra el Cordero' comunica la relación bélica que el contexto exige, sin ocultar la tensión léxica del griego.
- source_word: ἀρνίον
  english_pob_choice: Lamb
  chosen_spanish: Cordero
  alternatives_spanish:
  - Corderito
  lexicon: BDAG
  rationale: En Apocalipsis, ἀρνίον es el título cristológico estable. 'Cordero' mantiene el valor simbólico y litúrgico sin añadir una diminutiva innecesaria en español.
- source_word: πολεμήσουσιν
  english_pob_choice: will make war
  chosen_spanish: pelearán
  alternatives_spanish:
  - harán guerra
  - librarán guerra
  lexicon: BDAG
  rationale: El verbo griego tiene sentido militar amplio. 'Pelearán' es natural en español y comunica la acción hostil; la nota conserva la idea de una guerra contra el Cordero.
- source_word: νικήσει
  english_pob_choice: will conquer
  chosen_spanish: vencerá
  alternatives_spanish:
  - conquistará
  - triunfará sobre ellos
  lexicon: BDAG
  rationale: '''Vencerá'' preserva el motivo apocalíptico de victoria de νικάω y resulta idiomático en español. ''Conquistará'' podría sonar más militar que el contexto cristológico requiere.'
- source_word: κύριος κυρίων
  english_pob_choice: Lord of lords
  chosen_spanish: Señor de señores
  alternatives_spanish:
  - Señor de los señores
  lexicon: BDAG
  rationale: La fórmula superlativa tradicional se conserva en español como título. 'Señor' refleja κύριος y mantiene el rango titutlar del texto.
- source_word: βασιλεὺς βασιλέων
  english_pob_choice: King of kings
  chosen_spanish: Rey de reyes
  alternatives_spanish:
  - Rey de los reyes
  lexicon: BDAG
  rationale: La expresión fija se reproduce como título real supremo. 'Rey de reyes' es la forma más natural y fiel al paralelismo del griego.
- source_word: οἱ μετ’ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que están con él
  alternatives_spanish:
  - los que con él están
  - sus acompañantes
  lexicon: BDAG
  rationale: El artículo con la frase preposicional funciona sustantivamente. 'Los que están con él' es claro y evita una traducción demasiado literal que sonaría forzada en español.
- source_word: κλητοὶ
  english_pob_choice: called
  chosen_spanish: llamados
  alternatives_spanish:
  - convocados
  - invitados
  lexicon: BDAG
  rationale: '''Llamados'' corresponde de modo directo a κλητός y conserva su resonancia teológica sin decidir entre invitación externa o llamado eficaz.'
- source_word: ἐκλεκτοὶ
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  lexicon: BDAG
  rationale: '''Escogidos'' mantiene el paralelismo con ''llamados'' y evita un tecnicismo más abstracto. ''Elegidos'' sería válido, pero ''escogidos'' es más transparente en español.'
- source_word: πιστοί
  english_pob_choice: faithful
  chosen_spanish: fieles
  alternatives_spanish:
  - leales
  - creyentes
  lexicon: BDAG
  rationale: '''Fieles'' expresa la idea de lealtad y constancia que encaja con la tríada del versículo. ''Creyentes'' estrecharía indebidamente el campo semántico.'
theological_decisions:
- issue: Título cristológico del ἀρνίον en Apocalipsis
  english_pob_reading: Use 'the Lamb' and 'will conquer' to preserve Revelation's christological and thematic vocabulary.
  chosen_spanish_reading: Usar 'el Cordero' y 'vencerá' para conservar el título cristológico de Apocalipsis y su motivo de victoria.
  alternative_spanish_readings:
  - el cordero ... conquistará
  - el Cordero ... triunfará
  rationale: El versículo presenta a Jesús bajo el título apocalíptico ἀρνίον. Mantener 'el Cordero' conserva la coherencia intratextual del libro. 'Vencerá' recoge el valor temático de νικάω sin forzar un matiz demasiado militar o demasiado abstracto.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Tríada κλητοὶ καὶ ἐκλεκτοὶ καὶ πιστοί
  english_pob_reading: Translate as 'called and chosen and faithful' without resolving debates about the order of salvation or doctrinal systems.
  chosen_spanish_reading: Traducir 'llamados, escogidos y fieles' sin resolver debates sobre el orden de la salvación o sistemas doctrinales.
  alternative_spanish_readings:
  - llamados, elegidos y fieles
  - convocados, escogidos y leales
  rationale: La frase conserva la triple caracterización de quienes están con él y no introduce una armonización teológica externa. 'Escogidos' y 'fieles' preservan la tensión entre elección y perseverancia/lealtad.
  doctrine_reference: Affirmations paragraph 2; Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el grado de acuerdo con la auditoría fue alto. La redacción española sigue la lectura confirmada por la versión inglesa POB y mantiene sus decisiones léxicas clave, especialmente en el valor adversativo de μετά con genitivo y en el título cristológico ἀρνίον.
  spanish_consistency_notes:
  - Se mantiene 'Cordero' con mayúscula como título cristológico.
  - Se conserva la serie final con tres participios/adjetivos en forma simple y coordinada.
  - '''Señor de señores'' y ''Rey de reyes'' respetan el paralelismo del original.'
  - La nota a explica la tensión entre la forma literal griega y el sentido contextual bélico.
