  glossary_alignment: No hay términos del glosario principal en juego como Yahvé/Mesías. La decisión de mantener «inmoralidad sexual» concuerda con la racionalidad documentada del POB, y la nota sobre el valor simbólico está bien. «Con quien» también coincide con la preferencia auditada. El único desajuste relevante es la preposición para ἐκ.
