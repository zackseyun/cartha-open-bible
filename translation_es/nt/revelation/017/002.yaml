translation:
  language: es
  text: con quien los reyes de la tierra cometieron inmoralidad sexual[d][c][b][a], y los que habitan en la tierra se embriagaron por el vino de su inmoralidad sexual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con ella».
    reason: lexical_alternative
  - marker: b
    text: Aquí el lenguaje de «inmoralidad sexual» probablemente funciona de manera simbólica para una alianza corrupta, idólatra o infiel, aunque conserva la fuerza de la metáfora sexual.
    reason: cultural_note
  - marker: c
    text: O «los habitantes de la tierra».
    reason: lexical_alternative
  - marker: d
    text: O «de su prostitución».
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθ’ ἧς
  english_pob_choice: with whom
  chosen_spanish: con quien
  alternatives_spanish:
  - con ella
  lexicon: BDAG
  rationale: El relativo griego conserva la referencia a la mujer del versículo anterior. «Con quien» reproduce mejor la construcción relativa y evita suavizarla demasiado con una simple referencia anafórica.
- source_word: ἐπόρνευσαν
  english_pob_choice: committed sexual immorality
  chosen_spanish: cometieron inmoralidad sexual
  alternatives_spanish:
  - practicaron prostitución
  - fornicaron
  - cometieron adulterio
  lexicon: BDAG
  rationale: «πορνεύω» abarca inmoralidad sexual, pero en Apocalipsis también funciona con fuerza simbólica. «Inmoralidad sexual» preserva la imagen sexual sin resolver prematuramente la metáfora en una explicación interpretativa.
- source_word: οἱ βασιλεῖς τῆς γῆς
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del mundo
  - los reyes del país
  lexicon: BDAG
  rationale: «γῆ» en Apocalipsis suele tener sentido amplio y apocalíptico. «De la tierra» mantiene la frase fija y la resonancia joánica.
- source_word: ἐμεθύσθησαν
  english_pob_choice: became drunk
  chosen_spanish: se embriagaron
  alternatives_spanish:
  - fueron embriagados
  - se emborracharon
  lexicon: BDAG
  rationale: El pasivo aoristo puede expresarse naturalmente como un estado resultante. «Se embriagaron» conserva la idea de embriaguez y funciona bien en español bíblico contemporáneo.
- source_word: οἱ κατοικοῦντες τὴν γῆν
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan en la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los que viven en la tierra
  lexicon: BDAG
  rationale: Es una fórmula recurrente en Apocalipsis. «Los que habitan en la tierra» conserva el valor verbal y la consistencia intertextual mejor que una nominalización.
- source_word: ἐκ τοῦ οἴνου
  english_pob_choice: from the wine
  chosen_spanish: con el vino
  alternatives_spanish:
  - de parte del vino
  - a causa del vino
  lexicon: BDAG
  rationale: Aunque ἐκ marca origen o causa, en español «se embriagaron con el vino» es la forma más natural y clara, manteniendo la metáfora sin perder el sentido causal implícito.
- source_word: τῆς πορνείας αὐτῆς
  english_pob_choice: of her sexual immorality
  chosen_spanish: de su inmoralidad sexual
  alternatives_spanish:
  - de su prostitución
  - de su fornicación
  lexicon: BDAG
  rationale: Se mantiene la correspondencia con el verbo cognado y la misma franja semántica. «Inmoralidad sexual» conserva el registro amplio y la tensión simbólica del pasaje.
theological_decisions:
- issue: Si explicitar en el texto principal la lectura simbólica de πορνεία como idolatría o alianza infiel
  english_pob_reading: Retain the sexual-immorality imagery in the main text without interpretive paraphrase
  chosen_spanish_reading: Mantener la imaginería de inmoralidad sexual en el texto principal sin paráfrasis interpretativa
  alternative_spanish_readings:
  - cometieron adulterio espiritual
  - se unieron en alianza idólatra e infiel
  rationale: Apocalipsis usa deliberadamente lenguaje sexual para expresar corrupción covenantal y política. Mantener la metáfora conserva la tensión teológica y evita cerrar el sentido con una sola explicación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión actual coincide con la última pasada de revisión y con el resumen de verificación cruzada de alta concordancia; no se identificaron cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene «la tierra» para γῆ conforme al uso apocalíptico recurrente.
  - Se conserva «inmoralidad sexual» de forma consistente para πορνεία/πορνεύω.
  - Se eligió «se embriagaron» como equivalente natural del pasivo aoristo sin perder la imagen de resultado.
  - Los corchetes de notas siguen la secuencia pedida y cada marcador aparece anclado en el texto.
