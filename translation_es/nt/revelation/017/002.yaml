  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del griego: mantiene el relativo «con quien», conserva la metáfora sexual en πορνεύω/πορνεία, reproduce «los reyes de la tierra» y la fórmula apocalíptica «los que habitan en la tierra». Sin embargo, «con el vino» para ἐκ τοῦ οἴνου atenúa el matiz de fuente/causa que el POB inglés preserva con «from the wine»; en español conviene «por el vino» o «a causa del vino».'
