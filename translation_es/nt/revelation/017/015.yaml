- from: 'Y me dice[a]: «Las aguas que viste, donde se sienta la prostituta, son pueblos y multitudes y naciones y lenguas[b]».'
  to: 'Y me dice[a]: «Las aguas que viste, donde está sentada la prostituta, son pueblos y multitudes y naciones y lenguas[b]».'
  rationale: Se corrige la nota [b] para que esté completamente en español y se mejora la naturalidad de κάθηται con «está sentada», sin alterar el sentido ni la simbología del texto fuente.
