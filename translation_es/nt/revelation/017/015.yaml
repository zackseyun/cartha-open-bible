review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene el presente histórico de λέγει, conserva el plural simbólico «las aguas», traduce adecuadamente la relación locativa de οὗ, y reproduce la lista interpretativa «pueblos… naciones… lenguas». No añade interpretación teológica indebida. Sin embargo, hay dos detalles a reparar: «me dice» suena menos natural que «me dice a mí»/«me dice» pero puede aceptarse; el problema real es la nota [b], que deja «tongues» en inglés en vez de español, y además conviene usar una formulación más idiomática para κάθηται en este contexto visionario: «está sentada» suele sonar más natural que «se sienta» cuando describe una posición ya asumida.'
  spanish_quality_summary: El español es claro y digno, pero necesita una corrección menor. «Donde se sienta la prostituta» es comprensible, aunque en español bíblico-narrativo «donde está sentada la prostituta» suena más natural para una escena estática. La nota [b] no es apta para el lector hispano porque conserva el anglicismo «tongues». El resto del registro es bueno.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Prostituta», «pueblos», «multitudes», «naciones» y «lenguas» están alineados con las decisiones documentadas. La elección de «lenguas» en texto principal es válida; la alternativa en nota debe expresarse en español como «idiomas».
  issues:
  - severity: medium
    issue: La nota al pie [b] contiene el inglés «tongues».
    rationale: Las notas deben servir al lector en español. Aquí la alternativa inglesa no debe conservarse sin traducir; lo natural es «idiomas» o explicar directamente «grupos lingüísticos».
  - severity: low
    issue: «Se sienta» suena menos natural que «está sentada» para κάθηται en esta escena.
    rationale: Aunque «se sienta» puede reflejar formalmente el presente, en español normalmente describe el acto de sentarse, no tanto la postura ya mantenida. «Está sentada» preserva mejor la imagen locativa de la visión sin añadir entronización.
  revised_spanish_text: 'Y me dice[a]: «Las aguas que viste, donde está sentada la prostituta, son pueblos y multitudes y naciones y lenguas[b]».'
  revised_footnotes:
  - marker: a
    text: O «me dijo». Se conserva el presente histórico del griego para mantener la viveza narrativa.
    reason: alternative_reading
  - marker: b
    text: O «idiomas». Aquí el sentido es el de grupos lingüísticos.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que esté completamente en español y se mejora la naturalidad de κάθηται con «está sentada», sin alterar el sentido ni la simbología del texto fuente.
