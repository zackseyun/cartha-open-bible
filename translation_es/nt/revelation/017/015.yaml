translation:
  language: es
  text: 'Y me dice[a]: «Las aguas que viste, donde está sentada la prostituta, son pueblos y multitudes y naciones y lenguas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me dijo». Se conserva el presente histórico del griego para mantener la viveza narrativa.
    reason: alternative_reading
  - marker: b
    text: O «idiomas». Aquí el sentido es el de grupos lingüísticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει μοι
  english_pob_choice: he says to me
  chosen_spanish: me dice
  alternatives_spanish:
  - me dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego, que en Apocalipsis aporta viveza narrativa. En español, «me dice» reproduce mejor ese efecto que el pasado.
- source_word: ὕδατα
  english_pob_choice: waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: BDAG
  rationale: El plural griego se mantiene como plural en español. Además, el pasaje usa el símbolo de manera deliberada, y «las aguas» conserva esa imagen sin explicarla de más.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - sobre las cuales
  lexicon: BDAG
  rationale: El adverbio relativo indica lugar; «donde» es natural en español y conserva la relación espacial entre la prostituta y las aguas.
- source_word: πόρνη
  english_pob_choice: prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - ramera
  lexicon: BDAG
  rationale: «Prostituta» transmite con claridad el sentido moral y social del término sin recurrir a una forma arcaica o excesivamente dura.
- source_word: κάθηται
  english_pob_choice: sits
  chosen_spanish: se sienta
  alternatives_spanish:
  - está sentada
  - se sienta entronizada
  lexicon: BDAG
  rationale: El verbo griego está en presente y la imagen es simple; «se sienta» refleja bien la acción sin añadir la idea de entronización que no aparece explícita aquí.
- source_word: λαοὶ
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - peoples
  - gentes
  lexicon: BDAG
  rationale: Como plural, designa grupos humanos diferenciados. «Pueblos» funciona de manera natural en español y conserva el valor distributivo.
- source_word: ὄχλοι
  english_pob_choice: multitudes
  chosen_spanish: multitudes
  alternatives_spanish:
  - muchedumbres
  - grandes masas
  lexicon: BDAG
  rationale: Se adopta la revisión inglesa más formal y estándar. «Multitudes» es transparente en español y conserva el matiz de grandes agrupaciones humanas.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  - etnias
  lexicon: BDAG
  rationale: En esta lista de colectivos humanos, «naciones» es la equivalencia más natural y no introduce un contraste judío-gentil que el texto no señala.
- source_word: γλῶσσαι
  english_pob_choice: languages
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - tongues
  lexicon: BDAG
  rationale: «Lenguas» conserva la correspondencia más directa con el griego y permite la interpretación de grupos lingüísticos; en español bíblico sigue siendo claro y fiel.
theological_decisions:
- issue: Interpretación simbólica de las aguas
  english_pob_reading: The main text preserves the angel's explanation that the waters symbolize human populations without expanding the symbolism further.
  chosen_spanish_reading: El texto deja que la explicación angélica identifique las aguas con grupos humanos, sin ampliar el símbolo más allá de lo que el versículo dice.
  alternative_spanish_readings:
  - Las aguas podrían aludir a dominios políticos o masas bajo influencia imperial, pero eso iría más allá del versículo.
  - Las aguas son simplemente pueblos del mundo, sin tensión interpretativa.
  rationale: La traducción presenta la explicación del pasaje de forma directa y no resuelve la imagen apocalíptica con una lectura más amplia de lo que el texto ofrece.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el símbolo.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «crowds» por «multitudes» para ὄχλοι; por eso se optó por «multitudes» en español, manteniendo un registro formal y estándar. También se cuidó que los marcadores de nota [a] y [b] aparezcan exactamente en el texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto no aplicable aquí, pues el versículo no contiene el tetragrama.
  - «Pueblos», «multitudes», «naciones» y «lenguas» mantienen la serie de colectivos humanos sin fusionarlos ni explicarlos indebidamente.
  - Se prefirió «prostituta» por claridad moderna y fidelidad al término griego, evitando arcaísmos.
