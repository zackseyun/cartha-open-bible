revisions:
- from: La bestia que viste era[a], y no es; y está a punto de subir del abismo, y va hacia la destrucción. Y se maravillarán los que habitan sobre la tierra, cuyos nombres no han sido escritos en el libro de la vida desde la fundación del mundo, cuando vean la bestia[c][b], porque era y no es, y estará presente.
  to: La bestia que viste era, y no es; y está a punto de subir del abismo, y va hacia la destrucción. Y se maravillarán[a] los que habitan sobre la tierra, cuyo nombre no ha sido escrito en el libro de la vida desde la fundación del mundo, cuando vean la bestia[c][b], porque era y no es, y estará presente.
  rationale: 'Se revisa para alinear el español con una decisión lexical explícita del POB inglés: mantener el singular de «nombre» conforme a τὸ ὄνομα. También se corrige la ubicación y el contenido de la nota [a], que en el borrador estaba anclada erróneamente a «era» y además no reflejaba bien la alternativa inglesa para θαυμασθήσονται. El resto del versículo puede conservarse tal como está, porque refleja bien el griego y su racional teológico/lexical documentado.'
