translation:
  language: es
  text: La bestia que viste era, y no es; y está a punto de subir del abismo, y va hacia la destrucción. Y se maravillarán[a] los que habitan sobre la tierra, cuyo nombre no ha sido escrito en el libro de la vida desde la fundación del mundo, cuando vean la bestia[c][b], porque era y no es, y estará presente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se asombrarán».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el libro de la vida»; en español se usa la expresión idiomática «en el libro de la vida».
    reason: lexical_alternative
  - marker: c
    text: O, «que era y no es y estará presente». El griego puede leerse como causal («porque») o como contenido («que»).
    reason: alternative_reading
lexical_decisions:
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - fiera
  lexicon: BDAG
  rationale: «Bestia» conserva el valor apocalíptico y simbólico del término mejor que «animal». En español es la equivalencia más natural para este contexto y mantiene la fuerza monstruosa del referente.
- source_word: ἦν καὶ οὐκ ἔστιν
  english_pob_choice: was, and is not
  chosen_spanish: era, y no es
  alternatives_spanish:
  - fue, y no es
  - existía, y no existe
  lexicon: BDAG
  rationale: «Era, y no es» reproduce la brevedad y el contraste verbal del griego sin suavizar la paradoja temporal. «Existía» explica más de la cuenta y pierde la formulación sobria del texto.
- source_word: μέλλει ἀναβαίνειν
  english_pob_choice: is about to come up
  chosen_spanish: está a punto de subir
  alternatives_spanish:
  - va a subir
  - está por subir
  lexicon: BDAG
  rationale: «Está a punto de» expresa inminencia, y «subir» conserva el movimiento ascendente de ἀναβαίνειν de manera natural en español. «Ascender» sería más literal pero más pesado.
- source_word: ἄβυσσος
  english_pob_choice: abyss
  chosen_spanish: abismo
  alternatives_spanish:
  - abismo sin fondo
  - fosa abismal
  lexicon: BDAG
  rationale: «Abismo» es el equivalente directo y ya funciona como término apocalíptico en español. Evita la carga interpretativa de «pozo sin fondo».
- source_word: εἰς ἀπώλειαν ὑπάγει
  english_pob_choice: go to destruction
  chosen_spanish: va hacia la destrucción
  alternatives_spanish:
  - va a la destrucción
  - va a perdición
  - se encamina a la destrucción
  lexicon: BDAG
  rationale: La construcción expresa dirección o destino, no solo resultado. «Va hacia la destrucción» conserva ese matiz de movimiento y mantiene el tono sobrio del griego.
- source_word: θαυμασθήσονται
  english_pob_choice: will marvel
  chosen_spanish: se maravillarán
  alternatives_spanish:
  - se asombrarán
  - quedarán maravillados
  lexicon: BDAG
  rationale: El futuro pasivo admite una traducción idiomática reflexiva en español. «Se maravillarán» mantiene el sentido de sorpresa admirada que el contexto demanda.
- source_word: οἱ κατοικοῦντες ἐπὶ τῆς γῆς
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan sobre la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los que viven sobre la tierra
  lexicon: BDAG
  rationale: «Habitan sobre la tierra» reproduce la fórmula recurrente de Apocalipsis y conserva el matiz de residencia estable. «Viven» sería menos marcado.
- source_word: ὧν οὐ γέγραπται τὸ ὄνομα
  english_pob_choice: whose name has not been written
  chosen_spanish: cuyos nombres no han sido escritos
  alternatives_spanish:
  - cuyo nombre no ha sido escrito
  - de quienes no ha sido escrito el nombre
  lexicon: BDAG
  rationale: Aunque el griego usa singular («el nombre»), en español el plural concuerda de manera más natural con «cuyos». Se mantiene el sentido colectivo sin perder la referencia individual que el singular sugiere.
- source_word: ἐπὶ τὸ βιβλίον τῆς ζωῆς
  english_pob_choice: in the book of life
  chosen_spanish: en el libro de la vida
  alternatives_spanish:
  - sobre el libro de la vida
  lexicon: BDAG
  rationale: La preposición griega es literalmente «sobre», pero en español el giro idiomático para registros escritos es «en el libro». La nota conserva la tensión literal/idiomática documentada en el POB inglés.
- source_word: ἀπὸ καταβολῆς κόσμου
  english_pob_choice: from the foundation of the world
  chosen_spanish: desde la fundación del mundo
  alternatives_spanish:
  - desde que el mundo fue fundado
  - desde el principio del mundo
  lexicon: BDAG
  rationale: Es la equivalencia natural y tradicionalmente reconocible sin perder precisión temporal. «Fundación» conserva la imagen de establecimiento original del mundo.
- source_word: βλεπόντων
  english_pob_choice: when they see
  chosen_spanish: cuando vean
  alternatives_spanish:
  - al ver
  - viendo
  lexicon: BDAG
  rationale: El participio genitivo se vierte como circunstancia temporal natural en español. «Cuando vean» conecta con fluidez el acto de ver con el de maravillarse.
- source_word: ὅτι ἦν καὶ οὐκ ἔστιν καὶ παρέσται
  english_pob_choice: because it was and is not and will be present
  chosen_spanish: porque era y no es, y estará presente
  alternatives_spanish:
  - que era y no es y estará presente
  - porque fue y no es y vendrá
  lexicon: BDAG
  rationale: «Porque» sigue la lectura causal del POB inglés, y «estará presente» preserva el valor de futuro de πάρειμι sin reducirlo a «vendrá». El conjunto mantiene la repetición paradójica del texto.
theological_decisions:
- issue: Relación entre el libro de la vida y la cláusula temporal
  english_pob_reading: '''from the foundation of the world'' modifies ''has not been written'''
  chosen_spanish_reading: «desde la fundación del mundo» modifica «no han sido escritos»
  alternative_spanish_readings:
  - «desde la fundación del mundo» con otra frase vecina
  - «desde antes de la fundación del mundo»
  rationale: La sintaxis del griego sitúa la frase temporal junto a la acción de escribir, y la traducción la conserva sin desplazarla a otra idea. Así se preserva el peso teológico del texto sin resolver la tensión en favor de una sistematización externa.
  doctrine_reference: Preservar la tensión textual sin ampliarla.
- issue: Valor de παρέσται
  english_pob_reading: '''will be present'' rather than ''will come'' or ''will appear'''
  chosen_spanish_reading: «estará presente»
  alternative_spanish_readings:
  - «vendrá»
  - «aparecerá»
  - «se presentará»
  rationale: «Estará presente» sigue de cerca el futuro de πάρειμι y evita introducir una imagen más específica de llegada o aparición que el griego no exige. También conserva el eco de contraste con «no es».
  doctrine_reference: Primacía del léxico original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: 'Se mantuvo la revisión más reciente sin cambios sustantivos, en línea con el estado auditado: la solución inglesa final ya estaba establecida y no requería corrección. Se respetó también la observación de desacuerdo menor del control cruzado, especialmente en la naturalidad de la frase verbal final y en el encaje idiomático de la preposición con «libro de la vida».'
  spanish_consistency_notes:
  - Se usa «bestia» como término apocalíptico consistente con el POB inglés.
  - Se mantiene «abismo» y no «pozo sin fondo», para evitar una glosa interpretativa.
  - Se traduce el libro de la vida con el idiomatismo español «en el libro», pero se deja nota sobre el griego literal «sobre».
  - Se conserva el singular conceptual de «el nombre» en la nota, aunque el español fluido pide plural con «cuyos nombres».
  - Se opta por «estará presente» para παρέσται, manteniendo la paradoja verbal del pasaje sin sobreinterpretar el futuro.
