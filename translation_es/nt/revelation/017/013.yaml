translation:
  language: es
  text: Estos tienen un mismo parecer[a], y dan su poder y autoridad a la bestia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tienen un solo propósito». El modismo griego dice literalmente que «tienen una sola opinión» o «una sola mente», y puede expresar una resolución o propósito compartido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estos mismos
  - Estos hombres
  lexicon: BDAG
  rationale: El demostrativo vuelve sobre los diez reyes ya mencionados. «Estos» conserva la referencia deíctica sin añadir palabras innecesarias ni perder naturalidad en español.
- source_word: μίαν γνώμην ἔχουσιν
  english_pob_choice: are of one mind
  chosen_spanish: están de un solo parecer
  alternatives_spanish:
  - tienen una sola mente
  - tienen un mismo propósito
  - están de acuerdo
  lexicon: BDAG
  rationale: La expresión griega es idiomática y puede abarcar opinión, resolución o propósito. «De un solo parecer» mantiene la unidad de intención sin cerrar indebidamente el matiz.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  - capacidad
  lexicon: BDAG
  rationale: En este contexto político-apocalíptico, δύναμις se refiere a capacidad efectiva o poder real. «Poder» es la equivalencia más directa y clara en español.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - derecho a reinar
  - poder de mando
  - jurisdicción
  lexicon: BDAG
  rationale: ἐξουσία conserva la idea de prerrogativa o autoridad delegada, distinta de δύναμις. «Autoridad» mantiene esa distinción en español.
- source_word: τὴν δύναμιν καὶ ἐξουσίαν αὐτῶν
  english_pob_choice: their power and authority
  chosen_spanish: su poder y su autoridad
  alternatives_spanish:
  - el poder y la autoridad de ellos
  lexicon: BDAG
  rationale: Se conservan ambos sustantivos porque el griego distingue entre capacidad efectiva y prerrogativa de gobierno. El posesivo singular español es natural y no borra la doble idea.
- source_word: τῷ θηρίῳ
  english_pob_choice: to the beast
  chosen_spanish: a la bestia
  alternatives_spanish:
  - al monstruo
  lexicon: BDAG
  rationale: En Apocalipsis, θηρίον es el personaje simbólico establecido como «la bestia». Mantenerlo evita perder la referencia intertextual y apocalíptica.
- source_word: διδόασιν
  english_pob_choice: they give
  chosen_spanish: entregan
  alternatives_spanish:
  - dan
  - ceden
  - otorgan
  lexicon: BDAG
  rationale: «Entregan» expresa con más fuerza la cesión de poder y autoridad en un contexto de subordinación política. En español comunica bien la entrega voluntaria implicada por el verbo griego sin añadir interpretación excesiva.
theological_decisions:
- issue: Sentido de la expresión idiomática μίαν γνώμην ἔχουσιν
  english_pob_reading: These are of one mind
  chosen_spanish_reading: Estos están de un solo parecer
  alternative_spanish_readings:
  - Estos tienen un mismo propósito
  - Estos están de acuerdo
  rationale: La frase griega puede significar coincidencia de opinión, resolución común o finalidad compartida. «De un solo parecer» conserva el idioma figurado y deja abierta la amplitud semántica, sin resolverla de más.
  doctrine_reference: Translation philosophy §3
- issue: Diferencia entre δύναμις y ἐξουσία
  english_pob_reading: power and authority
  chosen_spanish_reading: poder y autoridad
  alternative_spanish_readings:
  - fuerza y autoridad
  - poder y derecho a reinar
  rationale: Conviene no fusionar los dos términos. Mantener ambos preserva el contraste entre capacidad efectiva y legitimidad o prerrogativa de gobierno que el texto presenta al entregar ambas al monstruo.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'Se revisó el texto griego SBLGNT y el audit trail inglés. No se requirieron cambios respecto de la lógica de la POB inglesa: se conservó el modismo de unidad de mente/propósito, y se mantuvo la distinción entre δύναμις y ἐξουσία. La redacción española busca naturalidad sin perder la tensión semántica.'
  spanish_consistency_notes:
  - Se prefirió «bestia» para θηρίον por coherencia con el lenguaje apocalíptico de Apocalipsis.
  - Se usó «poder» y «autoridad» como pareja terminológica estable para distinguir capacidad y prerrogativa.
  - Se optó por «de un solo parecer» en el cuerpo y se dejó la alternativa «un solo propósito» en nota para reflejar la amplitud del modismo griego.
