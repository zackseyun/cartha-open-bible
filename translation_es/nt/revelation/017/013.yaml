- from: Estos están de un solo parecer[a], y entregan su poder y su autoridad a la bestia.
  to: Estos tienen un mismo parecer[a], y dan su poder y autoridad a la bestia.
  rationale: Se ajusta διδόασιν a «dan» para seguir más de cerca el verbo griego y la decisión auditada en inglés, sin intensificar el matiz. Se cambia «están de un solo parecer» a «tienen un mismo parecer» por mayor naturalidad en español manteniendo la amplitud semántica del idiom. Se pule la nota para que explique el literal griego de forma más idiomática.
