translation:
  language: es
  text: Y los diez cuernos que viste son diez reyes[a], que todavía no han recibido un reino, pero reciben autoridad como reyes por una hora con la bestia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por un breve tiempo». La expresión «una hora» probablemente indica un período corto y limitado en la imaginería apocalíptica.
    reason: lexical_alternative
lexical_decisions:
- source_word: κέρατα
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - poderes
  lexicon: BDAG
  rationale: Se conserva la imagen apocalíptica literal de «cuernos», como en el audit trail inglés, para no interpretar de antemano el símbolo.
- source_word: βασιλεῖς
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - gobernantes
  lexicon: BDAG
  rationale: «Reyes» es la correspondencia léxica directa y mantiene la tensión entre el lenguaje literal y la referencia simbólica.
- source_word: βασιλείαν
  english_pob_choice: a kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - poder real
  lexicon: BDAG
  rationale: «Reino» expresa de manera idiomática en español la idea de un dominio o esfera real aún no recibida, distinguiéndola de la «autoridad» posterior.
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  lexicon: BDAG
  rationale: «Todavía no» reproduce con naturalidad la negación temporal de presente relevancia del griego.
- source_word: ἔλαβον
  english_pob_choice: have not yet received
  chosen_spanish: han recibido
  alternatives_spanish:
  - recibieron
  lexicon: BDAG
  rationale: En español, la perífrasis negativa con perfecto compuesto transmite bien la idea de que, hasta el momento de la visión, no han recibido un reino.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho a reinar
  lexicon: BDAG
  rationale: «Autoridad» conserva la distinción léxica frente a «reino» y evita absorber el matiz de poder delegado en una paráfrasis más amplia.
- source_word: ὡς βασιλεῖς
  english_pob_choice: as kings
  chosen_spanish: como reyes
  alternatives_spanish:
  - cual reyes
  lexicon: BDAG
  rationale: 'La construcción comparativa se vierte de forma directa y natural: reciben autoridad «como reyes».'
- source_word: μίαν ὥραν
  english_pob_choice: for one hour
  chosen_spanish: por una hora
  alternatives_spanish:
  - por un breve tiempo
  lexicon: BDAG
  rationale: Se conserva la expresión formal «una hora» en el cuerpo del texto, sin suavizarla a «breve tiempo»; la posible brevedad queda documentada en nota.
- source_word: λαμβάνουσιν
  english_pob_choice: they receive
  chosen_spanish: reciben
  alternatives_spanish:
  - están recibiendo
  - recibirán
  lexicon: BDAG
  rationale: 'El presente narrativo apocalíptico se refleja con el presente del español: «reciben».'
- source_word: μετὰ τοῦ θηρίου
  english_pob_choice: with the beast
  chosen_spanish: con la bestia
  alternatives_spanish:
  - junto con la bestia
  lexicon: BDAG
  rationale: «Con la bestia» reproduce de manera directa la asociación o alianza expresada por μετά con genitivo.
- source_word: θηρίου
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - la fiera
  lexicon: BDAG
  rationale: 'Se mantiene la terminología establecida de Apocalipsis: «la bestia».'
theological_decisions:
- issue: Si los diez reyes deben explicarse como monarcas literales o como gobernantes simbólicos en el texto principal
  english_pob_reading: Retain the literal lexical rendering 'ten kings' and allow the apocalyptic symbolism to stand without interpretive expansion.
  chosen_spanish_reading: Conservar «diez reyes» y dejar que la imaginería apocalíptica permanezca sin expansión interpretativa en el texto principal.
  alternative_spanish_readings:
  - diez gobernantes simbólicos
  - diez poderes políticos
  rationale: El griego dice explícitamente «diez reyes». El texto español preserva esa elección literal y no resuelve el símbolo en una paráfrasis explicativa, manteniendo la tensión del pasaje.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: 'Cómo traducir μίαν ὥραν: hora literal o período breve figurado'
  english_pob_reading: Render 'for one hour' in the main text and preserve the figurative possibility in a footnote.
  chosen_spanish_reading: Traducir «por una hora» en el texto principal y documentar en nota la posibilidad de un período breve.
  alternative_spanish_readings:
  - por un breve tiempo
  - por un corto lapso
  rationale: La forma del griego es «una hora»; por fidelidad se conserva en el texto, mientras que la nota deja abierta la lectura figurada de brevedad propia del lenguaje apocalíptico.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto base en inglés y el análisis léxico concuerdan de manera alta; no se registran revisiones aplicadas en la fuente, y la versión española conserva esa estabilidad sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantuvo «bestia» para θηρίον, en coherencia con la terminología del Apocalipsis.
  - Se prefirió «reino» frente a «reinado» para conservar la distinción entre βασιλείαν y ἐξουσίαν.
  - Se usó el presente «reciben» para reflejar el presente narrativo del griego.
  - La nota al pie se ancló en «una hora» para preservar la alternativa figurada sin alterar el cuerpo del verso.
