translation:
  language: es
  text: 'Entonces vino uno de los siete ángeles que tenían las siete copas, y habló conmigo, diciendo: «Ven, te mostraré el juicio[a] de la gran prostituta[b] que se sienta sobre muchas aguas»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la condenación» o «el castigo» de la gran prostituta.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «la gran ramera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: BDAG
  rationale: La partícula coordinante introduce progresión narrativa; «Entonces» conserva la secuencia sin sonar tan abrupto como un simple «Y».
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino aquí
  lexicon: BDAG
  rationale: El aoristo narrativo de ἔρχομαι se expresa de manera natural con «vino», manteniendo el movimiento de llegada al hablante.
- source_word: εἷς ἐκ τῶν ἑπτὰ ἀγγέλων
  english_pob_choice: one of the seven angels
  chosen_spanish: uno de los siete ángeles
  alternatives_spanish:
  - uno entre los siete ángeles
  - uno de entre los siete ángeles
  lexicon: BDAG
  rationale: La construcción partitiva se vierte con la expresión idiomática española «uno de los».
- source_word: τῶν ἐχόντων τὰς ἑπτὰ φιάλας
  english_pob_choice: who had the seven bowls
  chosen_spanish: que tenían las siete copas
  alternatives_spanish:
  - que sostenían las siete copas
  - que llevaban las siete copas
  lexicon: BDAG
  rationale: «Copas» mantiene el valor de φιάλαι en Apocalipsis y la cláusula relativa identifica a los ángeles; «tenían» reproduce bien la posesión/portación sin forzar una imagen más específica.
- source_word: ἐλάλησεν μετ’ ἐμοῦ
  english_pob_choice: spoke with me
  chosen_spanish: habló conmigo
  alternatives_spanish:
  - habló con él
  - me habló
  lexicon: BDAG
  rationale: La preposición μετά con genitivo se refleja de forma directa con «conmigo», preservando la relación conversacional que el inglés POB también mantuvo con «spoke with me».
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio de discurso se conserva con «diciendo», que reproduce la estructura griega sin añadir una coordinación innecesaria.
- source_word: Δεῦρο
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  - Acércate
  lexicon: BDAG
  rationale: Es una invitación breve e imperativa; «Ven» es la forma más natural y fiel en español.
- source_word: δείξω σοι
  english_pob_choice: I will show you
  chosen_spanish: te mostraré
  alternatives_spanish:
  - voy a mostrarte
  - te voy a mostrar
  lexicon: BDAG
  rationale: El futuro directo se conserva con «te mostraré», equivalente natural de «I will show you».
- source_word: τὸ κρίμα
  english_pob_choice: the judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la condena
  - el castigo
  lexicon: BDAG
  rationale: '«Juicio» conserva la amplitud semántica de κρίμα en un marco apocalíptico: puede abarcar veredicto y sentencia sin cerrarse prematuramente a una sola opción.'
- source_word: τῆς πόρνης τῆς μεγάλης
  english_pob_choice: of the great prostitute
  chosen_spanish: de la gran prostituta
  alternatives_spanish:
  - de la gran ramera
  - de la gran meretriz
  lexicon: BDAG
  rationale: «Prostituta» traduce de manera directa πόρνη con fuerza metafórica y lenguaje contemporáneo, evitando tanto arcaísmos como eufemismos.
- source_word: τῆς καθημένης ἐπὶ ⸀ὑδάτων πολλῶν
  english_pob_choice: who sits on many waters
  chosen_spanish: que se sienta sobre muchas aguas
  alternatives_spanish:
  - que está sentada sobre muchas aguas
  - que se sienta sobre aguas muchas
  lexicon: BDAG
  rationale: El participio de estado se vierte con una forma reflexiva/medio-estativa natural en español, y «sobre muchas aguas» conserva la imagen simbólica sin explicarla de antemano.
theological_decisions:
- issue: Metáfora de πόρνη aplicada a la figura de Babilonia
  english_pob_reading: great prostitute
  chosen_spanish_reading: gran prostituta
  alternative_spanish_readings:
  - gran ramera
  - gran meretriz
  rationale: La metáfora debe mantenerse con toda su fuerza profética y moral. «Prostituta» es suficientemente fuerte, comprensible y menos arcaica que «ramera», sin suavizar el carácter polémico del término.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance de κρίμα en el contexto apocalíptico
  english_pob_reading: judgment
  chosen_spanish_reading: juicio
  alternative_spanish_readings:
  - condena
  - castigo
  rationale: '«Juicio» conserva la amplitud del término griego: acto judicial, veredicto y resultado sentencial. Así se evita reducir prematuramente el sentido a solo «condena» o solo «castigo».'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y está alineada con el audit trail inglés de la POB; no se detectaron revisiones textuales o decisiones editoriales adicionales en el registro aplicado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «prostituta» para πόρνη, en coherencia con el valor léxico y con la decisión inglesa de «prostitute».
  - Se preservó la imagen apocalíptica de «muchas aguas» sin armonizarla con la explicación posterior del capítulo.
  - La puntuación española adapta la cita directa a las convenciones editoriales modernas sin alterar el contenido.
