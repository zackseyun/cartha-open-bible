  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: θεός -> «Dios», θηρίον -> «bestia». La principal observación léxica es γνώμη: en ambas instancias el sentido es «propósito/intención», y la segunda debe conservar explícitamente la unidad de propósito. Las notas actuales ya reconocen bien las alternativas.'
