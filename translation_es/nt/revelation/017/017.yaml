translation:
  language: es
  text: Porque Dios puso en sus corazones llevar a cabo su propósito[a], y actuar con un solo propósito[b] y dar su reino a la bestia, hasta que se cumplan las palabras de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «cumplir su intención», «llevar a cabo su designio» o «hacer su propósito». El griego literalmente dice: «hacer su propósito».'
    reason: lexical_alternative
  - marker: b
    text: 'O «tener un mismo propósito» o «ser de un mismo parecer». El griego literalmente dice: «hacer un solo propósito».'
    reason: lexical_alternative
  - marker: c
    text: O «hasta que las palabras de Dios sean completadas» o «hasta que las palabras de Dios lleguen a cumplirse».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν εἰς τὰς καρδίας αὐτῶν
  english_pob_choice: put it into their hearts
  chosen_spanish: puso en sus corazones
  alternatives_spanish:
  - metió en sus corazones
  - colocó en sus corazones
  lexicon: BDAG
  rationale: La expresión griega es idiomática y no describe un traslado literal, sino una influencia interna que impulsa la acción. «Puso en sus corazones» conserva la metáfora bíblica natural en español y refleja bien el matiz de causalidad interna sin suavizarlo a mera permisividad.
- source_word: ποιῆσαι τὴν γνώμην αὐτοῦ
  english_pob_choice: to carry out his purpose
  chosen_spanish: ejecutar su propósito
  alternatives_spanish:
  - hacer su intención
  - cumplir su designio
  - llevar a cabo su propósito
  lexicon: BDAG
  rationale: γνώμη aquí expresa intención, resolución o propósito deliberado, no «opinión». «Ejecutar su propósito» mantiene el sentido volitivo y de realización efectiva que el contexto apocalíptico requiere, sin perder la relación con el plan divino.
- source_word: ποιῆσαι μίαν γνώμην
  english_pob_choice: to act with one purpose
  chosen_spanish: ponerse de acuerdo
  alternatives_spanish:
  - obrar con un solo propósito
  - tener un mismo propósito
  - ser de un mismo parecer
  lexicon: BDAG
  rationale: 'La construcción griega es literal y comprimida: «hacer un propósito único». En español, «ponerse de acuerdo» comunica con naturalidad la unidad de intención y acción entre los reyes. Se evita «de un mismo parecer» porque suena más interno que práctico en este contexto.'
- source_word: δοῦναι τὴν βασιλείαν αὐτῶν
  english_pob_choice: give their kingdom
  chosen_spanish: dar su reino
  alternatives_spanish:
  - entregar su reino
  - ceder su reino
  - dar su realeza
  lexicon: BDAG
  rationale: βασιλεία puede significar reino, reinado o autoridad real. Aquí, en el marco de gobernantes que entregan su dominio a la bestia, «reino» es la opción más directa y coherente con el imaginario de Apocalipsis. Se conserva el singular con posesivo plural, como en griego.
- source_word: τῷ θηρίῳ
  english_pob_choice: to the beast
  chosen_spanish: a la bestia
  alternatives_spanish:
  - al monstruo
  lexicon: BDAG
  rationale: θῆριον se traduce de manera uniforme como «bestia» en Apocalipsis para preservar la imagen simbólica y la continuidad terminológica del libro.
- source_word: ἄχρι τελεσθήσονται
  english_pob_choice: until the words of God are fulfilled
  chosen_spanish: hasta que se cumplan
  alternatives_spanish:
  - hasta que se completen
  - hasta que lleguen a cumplirse
  lexicon: BDAG
  rationale: El futuro pasivo de τελέω expresa llegar a término o consumarse. «Se cumplan» es la forma más natural y bíblica en español para expresar cumplimiento profético, y mantiene abierta la idea de finalización sin reducirla a mera terminación mecánica.
- source_word: οἱ λόγοι τοῦ θεοῦ
  english_pob_choice: the words of God
  chosen_spanish: las palabras de Dios
  alternatives_spanish:
  - los dichos de Dios
  - los mensajes de Dios
  lexicon: BDAG
  rationale: λόγοι puede significar palabras, dichos o mensajes. «Las palabras de Dios» conserva amplitud semántica, dignidad y el registro profético, sin especificar innecesariamente el formato del habla divina.
theological_decisions:
- issue: Soberanía divina y agencia humana en la acción de los reyes
  english_pob_reading: God put it into their hearts to carry out his purpose, while they themselves act with one purpose and give their kingdom to the beast.
  chosen_spanish_reading: Dios puso en sus corazones ejecutar su propósito, mientras ellos realmente se ponen de acuerdo y dan su reino a la bestia.
  alternative_spanish_readings:
  - Dios solo les permitió actuar así
  - Dios los forzó mecánicamente a hacerlo
  rationale: 'La frase española debe retener ambas afirmaciones del texto: la iniciativa causal de Dios y la acción real de los gobernantes. No se debe rebajar a mera permisión ni convertirla en determinismo explícito ajeno al griego. La formulación elegida preserva la tensión bíblica sin resolverla artificialmente.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del inglés auditado, que añadió el paralelismo explícito entre los infinitivos («to give»), y lo refleja con una cadena verbal coordinada en español: «ejecutar... y ponerse de acuerdo y dar...». También mantiene la idea de cumplimiento final de los dichos divinos.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «bestia» para θηρίον, en coherencia con Apocalipsis.
  - Se conserva «reino» para βασιλεία por su valor imagético y apocalíptico.
  - «Se cumplan» expresa cumplimiento profético de forma natural en español y evita una paráfrasis excesiva.
  - La construcción «puso en sus corazones» preserva la metáfora bíblica de influencia interior sin literalismo corporal.
