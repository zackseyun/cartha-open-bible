translation:
  language: es
  text: Por esta razón están delante del trono de Dios, y le sirven día y noche en su templo, y el que está sentado sobre el trono extenderá su tienda sobre ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «habitará sobre ellos» o «los protegerá». El verbo griego está relacionado con la imagen de tienda o tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτό
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Por tanto
  lexicon: BDAG
  rationale: La expresión retoma la explicación anterior y en español la frase causal/inferencial más natural y explícita es «Por esta razón». Conserva la conexión lógica sin sonar mecánica.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en la presencia de
  lexicon: BDAG
  rationale: «Delante de» comunica de manera clara la cercanía espacial y presencial respecto del trono. «Ante» sería posible, pero algo más formal; «en la presencia de» es más pesado.
- source_word: λατρεύουσιν
  english_pob_choice: serve
  chosen_spanish: le sirven
  alternatives_spanish:
  - le rinden servicio sagrado
  - le dan culto
  lexicon: BDAG
  rationale: En este contexto cultual, «servir» preserva el sentido de λατρεύω sin reducirlo solo a una acción verbal de adoración. El complemento del templo mantiene la dimensión sagrada.
- source_word: ἡμέρας καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - continuamente
  lexicon: BDAG
  rationale: La locución idiomática se conserva literalmente porque es natural en español y mantiene la imagen de servicio incesante.
- source_word: ναῷ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: «Templo» es el término más transparente y natural en español. Aunque «santuario» es una posibilidad, aquí «templo» conserva mejor la claridad del texto y su marco de culto celestial.
- source_word: ὁ καθήμενος ἐπὶ τοῦ θρόνου
  english_pob_choice: the one seated on the throne
  chosen_spanish: el que está sentado sobre el trono
  alternatives_spanish:
  - el que se sienta en el trono
  - el sentado sobre el trono
  lexicon: BDAG
  rationale: La construcción participial se vierte con una perífrasis clara y titular en español. «El que está sentado sobre el trono» preserva la función identificadora sin perder naturalidad.
- source_word: σκηνώσει ἐπ’ αὐτούς
  english_pob_choice: will spread his tent over them
  chosen_spanish: extenderá su tienda sobre ellos
  alternatives_spanish:
  - habitará sobre ellos
  - los cubrirá con su tienda
  - los protegerá
  lexicon: BDAG
  rationale: «Extenderá su tienda» conserva la imagen de σκηνόω y el trasfondo de tabernáculo/toldo protector. «Protegerá» o «habitará» captan el sentido, pero diluyen la metáfora concreta; «tabernaculará» sería opaco en español.
theological_decisions:
- issue: Imagen de presencia protectora en σκηνώσει
  english_pob_reading: will spread his tent over them
  chosen_spanish_reading: extenderá su tienda sobre ellos
  alternative_spanish_readings:
  - habitará sobre ellos
  - los cubrirá con su tienda
  rationale: La frase preserva la metáfora de presencia divina acogedora y protectora sin convertirla en una explicación abstracta. «Su tienda» mantiene la resonancia de tabernáculo y el carácter simbólico del verbo griego.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión auditada en inglés y no presenta cambios relevantes respecto del sentido base. Se conserva la imagen tabernacular de σκηνώσει, que fue la decisión distintiva del POB inglés, adaptándola al español con naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y no se introduce una sustitución reverencial por «SEÑOR» porque el texto griego no lo exige aquí.
  - «Templo» se usa para ναός en coherencia con el marco cultual celestial del pasaje.
  - «Le sirven» preserva la fuerza cultual de λατρεύω sin reducirla a mera cortesía o actividad general.
  - La nota al pie conserva la alternativa semántica principal del verbo final y explica la imagen de tienda/tabernáculo.
