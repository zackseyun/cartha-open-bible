  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: «Por esta razón», «delante del trono de Dios», «le sirven día y noche en su templo» y «el que está sentado sobre el trono» corresponden fielmente a διὰ τοῦτό, ἐνώπιον, λατρεύουσιν… ἐν τῷ ναῷ αὐτοῦ y ὁ καθήμενος ἐπὶ τοῦ θρόνου. La imagen de σκηνώσει ἐπ’ αὐτούς está bien captada con «extenderá su tienda sobre ellos». El único problema relevante es que la nota al pie está mal anclada: el marcador [a] aparece tras «Dios», pero la nota explica σκηνώσει, no «Dios».'
  spanish_quality_summary: El español es claro, natural y digno. La puntuación con punto y coma es aceptable, aunque una coma coordina mejor la secuencia griega. La redacción principal no requiere cambio sustancial salvo mover el marcador de la nota al lugar correcto y ajustar la nota para no presentar como alternativa la misma lectura del texto principal.
  glossary_alignment: 'No hay conflicto con los términos del proyecto: «Dios», «templo» y la imaginería de «tienda/tabernáculo» están bien resueltas. «Le sirven» preserva adecuadamente λατρεύουσιν como servicio sagrado, en línea con el audit trail inglés.'
  issues:
