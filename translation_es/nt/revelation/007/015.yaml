    issue: Marcador de nota al pie colocado en «Dios» en vez de en la cláusula «extenderá su tienda sobre ellos».
    rationale: La nota trata la alternativa léxica de σκηνώσει ἐπ’ αὐτούς; dejarla anclada en «Dios» crea una asociación falsa y confunde al lector.
  - severity: low
    issue: La nota al pie ofrece primero como alternativa la misma frase que ya está en el texto principal.
    rationale: Una nota de alternativas no debe repetir como variante la lectura adoptada; conviene listar solo las opciones no escogidas y la explicación léxica.
  - severity: low
    issue: El punto y coma antes de «y el que está sentado…» puede suavizarse a coma.
    rationale: El griego coordina de forma continua con καὶ; en español una coma mantiene mejor el flujo sin afectar el sentido.
  revised_spanish_text: Por esta razón están delante del trono de Dios, y le sirven día y noche en su templo, y el que está sentado sobre el trono extenderá su tienda sobre ellos[a].
  revised_footnotes:
