    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:59:23Z'
    unchanged: false
    changes_summary: 'Changed ''slaves'' to ''servants'' for more natural formal English in this context while still accurately rendering δοῦλοι; otherwise retained the draft. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'diciendo[a]: «No hagan daño a la tierra, ni al mar, ni a los árboles, hasta que hayamos sellado a los esclavos de nuestro Dios en sus frentes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sirvientes” o “siervos”. La palabra griega es doulous, que puede denotar a quienes pertenecen a un amo; aquí «esclavos» preserva esa fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo así
  - y decía
  lexicon: BDAG
  rationale: Participio narrativo que introduce la orden; en español, «diciendo» conserva la función introductoria sin añadir información.
- source_word: ἀδικήσητε
  english_pob_choice: harm
  chosen_spanish: hagan daño
  alternatives_spanish:
  - perjudiquen
  - dañen
  - hagan mal
  lexicon: BDAG
  rationale: En este contexto apocalíptico el objeto son la tierra, el mar y los árboles; «hagan daño» transmite daño físico/eco-cósmico de forma natural en español, sin cargar el verbo con injusticia moral interpersonal.
- source_word: γῆν
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra firme
  - el suelo
  lexicon: BDAG
  rationale: La tríada «tierra, mar y árboles» en un cuadro de juicio cósmico favorece «la tierra» sobre «la tierra firme» o «la tierra» en sentido local.
- source_word: θάλασσαν
  english_pob_choice: sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  lexicon: BDAG
  rationale: Equivalente directo y natural en español.
- source_word: δένδρα
  english_pob_choice: trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - los árboles
  lexicon: BDAG
  rationale: Traducción directa y clara del plural griego.
- source_word: ἄχρι
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - antes de que
  lexicon: BDAG
  rationale: «Hasta que» expresa con naturalidad el límite temporal previo al cual no debe continuar la acción.
- source_word: σφραγίσωμεν
  english_pob_choice: have sealed
  chosen_spanish: hayamos sellado
  alternatives_spanish:
  - sellamos
  - hubiéramos sellado
  lexicon: BDAG
  rationale: El subjuntivo aoristo con ἄχρι se expresa bien en español con el perfecto de subjuntivo; conserva el valor de acción completada antes de reanudar el juicio.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: los esclavos
  alternatives_spanish:
  - los siervos
  - los servidores
  - los esclavos
  lexicon: BDAG
  rationale: Sigo la decisión documentada del POB de mantener la fuerza de δοῦλος cuando marca pertenencia y subordinación. «Esclavos» preserva esa tensión léxica mejor que «siervos».
- source_word: τοῦ θεοῦ ἡμῶν
  english_pob_choice: of our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - de nuestro Dios
  lexicon: BDAG
  rationale: Genitivo posesivo directo y natural en español.
- source_word: ἐπὶ τῶν μετώπων αὐτῶν
  english_pob_choice: on their foreheads
  chosen_spanish: en sus frentes
  alternatives_spanish:
  - sobre sus frentes
  - en sus frentes
  lexicon: BDAG
  rationale: «En sus frentes» es la forma más natural en español para indicar la ubicación del sello; conserva el sentido locativo de ἐπί con genitivo.
theological_decisions:
- issue: δόῦλοι / δοῦλος como término de pertenencia y sujeción
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  - criados
  rationale: En este versículo la marca y protección divina recaen sobre personas identificadas por pertenencia a Dios. La fuerza de δοῦλος no se debe suavizar sin una razón contextual; «esclavos» mantiene la tensión de propiedad/lealtad que el POB documenta.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Temporal relation of sealing to the prohibition on damage
  english_pob_reading: until we have sealed
  chosen_spanish_reading: hasta que hayamos sellado
  alternative_spanish_readings:
  - hasta sellar
  - antes de que sellamos
  rationale: 'El límite temporal es teológico y narrativo: el daño queda suspendido hasta que el sellado se complete. El perfecto de subjuntivo en español comunica mejor la acción previa y terminada.'
  doctrine_reference: Greek aspect and clause-relationship in Revelation 7:3
- issue: Scope of the prohibited harm in a cosmic-judgment scene
  english_pob_reading: Do not harm the earth or the sea or the trees
  chosen_spanish_reading: No hagan daño a la tierra, ni al mar, ni a los árboles
  alternative_spanish_readings:
  - No dañen la tierra, ni el mar, ni los árboles
  rationale: La escena es de juicio cósmico, no de daño moral interpersonal. «Hagan daño» conserva amplitud semántica y el ritmo enumerativo del original.
  doctrine_reference: Apocalyptic imagery and created-order judgment
translation_notes:
  revision_awareness: El contexto inglés muestra una oscilación editorial entre «servants» y «slaves», con restitución final de «slaves» por fidelidad al valor de δοῦλος. La versión española refleja esa decisión final y evita suavizar el término. También se mantuvo la relación temporal completa con «hasta que hayamos sellado», coherente con el aoristo subjuntivo griego y con la explicación auditada del POB.
  spanish_consistency_notes:
  - Se usa «Dios» y no una sustitución reverencial oculta, conforme al proyecto.
  - Se traduce δοῦλος como «esclavos» por consistencia con la política terminológica del POB.
  - Se mantiene «la tierra, el mar y los árboles» para respetar la tríada cósmica del texto.
  - «Frentes» se conserva como plural natural para μετώπων, sin reinterpretar el sello como metáfora distinta.
