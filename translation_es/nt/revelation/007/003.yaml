  text: λέγων· Μὴ ἀδικήσητε τὴν γῆν μήτε τὴν θάλασσαν μήτε τὰ δένδρα, ⸀ἄχρι σφραγίσωμεν τοὺς δούλους τοῦ θεοῦ ἡμῶν ἐπὶ τῶν μετώπων αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/007/003.yaml
  text: saying[a], “Do not harm the earth or the sea or the trees until we have sealed the slaves of our God on their foreheads.”
  footnotes:
  - marker: a
    text: Or “servants” or “bondservants.” The Greek word is doulous, which can denote those who belong to a master; here the translation “slaves” preserves that force.
