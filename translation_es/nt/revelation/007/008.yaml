translation:
  language: es
  text: de la tribu de Zabulón, doce mil; de la tribu de José, doce mil; de la tribu de Benjamín, doce mil, [a]que habían sido sellados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que fueron sellados». El participio griego final resume a los grupos enumerados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - procedentes de
  lexicon: BDAG
  rationale: En esta enumeración genealógica, ἐκ marca pertenencia u origen dentro de una tribu. En español, «de la tribu de» reproduce de forma natural y fiel la relación de procedencia sin sobrecargar el estilo.
- source_word: φυλῆς
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  - linaje
  lexicon: BDAG
  rationale: El contexto es israelita y genealógico, por lo que «tribu» conserva el valor histórico y bíblico de φυλή con claridad para el lector español.
- source_word: Ζαβουλών
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  lexicon: BDAG
  rationale: Se translitera el nombre tribal según uso bíblico común en español. «Zabulón» mantiene la identificación tradicional y es inteligible para lectura eclesial.
- source_word: δώδεκα χιλιάδες
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - doce millares
  lexicon: BDAG
  rationale: La cifra se conserva de manera directa y formal. «Doce mil» es la forma natural en español y preserva la estructura repetitiva del texto.
- source_word: Ἰωσήφ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: BDAG
  rationale: Se mantiene el nombre bíblico en su forma habitual en español. Aunque el texto griego dice Ἰωσήφ, «José» es la equivalencia establecida y plenamente reconocible.
- source_word: Βενιαμίν
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: BDAG
  rationale: Nombre tribal transliterado según la forma usual en español, con acento gráfico conforme a la ortografía española.
- source_word: ἐσφραγισμένοι
  english_pob_choice: having been sealed
  chosen_spanish: habiendo sido sellados
  alternatives_spanish:
  - sellados
  - los que fueron sellados
  lexicon: BDAG
  rationale: El participio perfecto pasivo se refleja con una construcción participial española que conserva el valor resultativo y la función resumidora del cierre del versículo. «Habiendo sido sellados» es más transparente que un simple adjetivo y evita perder el matiz verbal del griego.
theological_decisions:
- issue: Alcance del participio final ἐσφραγισμένοι
  english_pob_reading: 'Render as a concluding predicate-like participle applying to all three listed tribal groups: ''having been sealed.'''
  chosen_spanish_reading: 'Cerrar la enumeración con una cláusula participial que aplique a los tres grupos: «habiendo sido sellados».'
  alternative_spanish_readings:
  - sellados
  - los que fueron sellados
  rationale: El griego coloca el participio al final como resumen de toda la lista. La redacción española conserva ese efecto literario y no fuerza una explicación adicional sobre el acto del sello más allá de lo que el texto afirma.
  doctrine_reference: Preservar la tensión textual y el orden retórico del original; prioridad del griego sobre una simplificación interpretativa.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al reflejar con más claridad el participio perfecto pasivo ἐσφραγισμένοι mediante una construcción equivalente en español, manteniendo el cierre resumidor de la lista sin añadir interpretaciones sobre la naturaleza del sello.
  spanish_consistency_notes:
  - Se mantiene «tribu de» de manera uniforme en toda la enumeración para reproducir la fórmula repetida del original.
  - 'Los nombres propios se presentan en formas bíblicas estándar en español: Zabulón, José y Benjamín.'
  - Se conserva el orden del griego, con el participio final como remate de la serie.
  - El tono es formal y eclesial, pero sin arcaísmos innecesarios.
