review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue fielmente la estructura repetitiva del griego (ἐκ φυλῆς… δώδεκα χιλιάδες) y conserva bien los nombres tribales y la cifra. Sin embargo, la colocación del marcador de nota en «sellados[a]» no corresponde bien al alcance de la nota, que trata de una alternativa para toda la expresión participial final. Además, «habiendo sido sellados» es formalmente fiel, pero en español suena algo forzado al cierre de una enumeración; «que habían sido sellados» preserva mejor el valor resumidor y resultativo del participio perfecto pasivo sin perder claridad.
  spanish_quality_summary: El texto es claro y digno, pero la clausura «doce mil, habiendo sido sellados» resulta menos natural en español bíblico contemporáneo que una relativa resumidora. La revisión propuesta mejora fluidez y legibilidad sin apartarse del griego ni del razonamiento documentado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «tribu», «José», «Benjamín» y «sellados» están bien. La elección «Zabulón» es aceptable en español eclesial, aunque «Zabulón/Zebulón» varía por tradición; no requiere cambio. La principal cuestión es sintáctica, no glosarial.
  issues:
  - severity: medium
    issue: La construcción «habiendo sido sellados» suena poco natural al final de esta lista en español.
    rationale: Aunque refleja de cerca el participio perfecto pasivo griego, en español esta forma adverbial suele modificar una acción principal y aquí queda algo colgante tras la enumeración. Una relativa como «que habían sido sellados» expresa mejor el valor resumidor aplicado a los grupos listados.
  - severity: low
    issue: El marcador de nota [a] está anclado solo a «sellados» en vez de a toda la cláusula final.
    rationale: La nota ofrece una alternativa de traducción para el participio final como unidad («los que fueron sellados»), no meramente para la palabra aislada «sellados». Conviene anclarla al inicio de la cláusula alternativa.
  revised_spanish_text: de la tribu de Zabulón, doce mil; de la tribu de José, doce mil; de la tribu de Benjamín, doce mil, [a]que habían sido sellados.
  revised_footnotes:
  - marker: a
    text: O «los que fueron sellados». El participio griego final resume a los grupos enumerados.
    reason: lexical_alternative
