    text: O «los cuatro seres vivos».
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis de la serie gobernada por «alrededor de» para reflejar fielmente κύκλῳ con sus complementos coordinados. Se cambia «se postraron» por «cayeron» para conservar la secuencia verbal del griego y del POB inglés, y se vuelve más natural la expresión de ἐπὶ τὰ πρόσωπα αὐτῶν con «rostro en tierra». La nota se ajusta para ofrecer una alternativa española real frente al texto principal.
