translation:
  language: es
  text: Y todos los ángeles estaban de pie alrededor del trono, de los ancianos y de los cuatro seres vivientes[a], y cayeron delante del trono, rostro en tierra, y adoraron a Dios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cuatro seres vivos».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες οἱ ἄγγελοι
  english_pob_choice: all the angels
  chosen_spanish: todos los ángeles
  alternatives_spanish:
  - todos los seres angelicales
  lexicon: BDAG
  rationale: ἄγγελοι designa de manera directa a los ángeles; en español, «ángeles» es el equivalente natural y preciso. El cuantificador πάντες se expresa con «todos» sin necesidad de intensificar más.
- source_word: εἱστήκεισαν
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban parados
  - estaban en pie
  lexicon: BDAG
  rationale: La forma verbal transmite un estado de postura continua. «Estaban de pie» conserva esa idea de posición sostenida y suena natural en español bíblico moderno.
- source_word: κύκλῳ τοῦ θρόνου
  english_pob_choice: around the throne
  chosen_spanish: alrededor del trono
  alternatives_spanish:
  - en torno al trono
  - rodeando el trono
  lexicon: BDAG
  rationale: κύκλῳ indica ubicación espacial alrededor de algo. «Alrededor» es claro, idiomático y fiel al sentido topográfico del griego.
- source_word: τῶν πρεσβυτέρων
  english_pob_choice: the elders
  chosen_spanish: de los ancianos
  alternatives_spanish:
  - de los presbíteros
  lexicon: BDAG
  rationale: En Apocalipsis, πρεσβύτεροι se refiere al grupo celestial de «ancianos». «Presbíteros» sería más técnico y menos transparente para el lector común; «ancianos» mantiene la referencia reconocible.
- source_word: τῶν τεσσάρων ζῴων
  english_pob_choice: the four living creatures
  chosen_spanish: de los cuatro seres vivientes[a]
  alternatives_spanish:
  - de los cuatro seres vivos
  - de los cuatro criaturas vivientes
  lexicon: BDAG
  rationale: ζῷα en Apocalipsis no significa simples animales. «Seres vivientes» preserva la imagen apocalíptica sin reducirla. Se mantiene la alternativa textual reconocida en una nota porque el inglés POB la documenta y porque en español aparece una posible oscilación entre «seres vivientes» y «seres vivos».
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: se postraron
  alternatives_spanish:
  - cayeron
  - se arrojaron
  lexicon: BDAG
  rationale: Aunque el griego usa literalmente «cayeron», el contexto siguiente («sobre sus rostros») deja claro que se trata de una postración. «Se postraron» comunica el acto reverencial con más precisión en español sin perder el movimiento físico implícito.
- source_word: ἐνώπιον τοῦ θρόνου
  english_pob_choice: before the throne
  chosen_spanish: delante del trono
  alternatives_spanish:
  - ante el trono
  - en presencia del trono
  lexicon: BDAG
  rationale: ἐνώπιον expresa posición frontal. «Delante del trono» reproduce bien esa relación espacial y evita una lectura demasiado abstracta.
- source_word: ἐπὶ τὰ πρόσωπα αὐτῶν
  english_pob_choice: on their faces
  chosen_spanish: sobre sus rostros
  alternatives_spanish:
  - con el rostro en tierra
  - boca abajo
  lexicon: BDAG
  rationale: El modismo describe postración total. «Sobre sus rostros» sigue de cerca el griego y preserva el lenguaje corporal del texto.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - rindieron culto
  - se postraron en adoración
  lexicon: BDAG
  rationale: Dado que el objeto es Dios y que la postración ya fue descrita, προσκυνέω aquí expresa adoración reverente. «Adoraron» es una traducción natural y suficientemente fuerte en español.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: El dativo con προσκυνέω se vierte naturalmente como complemento con preposición en español. «A Dios» mantiene claridad y fidelidad sintáctica.
theological_decisions:
- issue: Traducción de ζῷα en el trono celestial
  english_pob_reading: living creatures
  chosen_spanish_reading: seres vivientes
  alternative_spanish_readings:
  - seres vivos
  - criaturas vivientes
  rationale: No conviene suavizar el término hacia «animales» ni convertirlo en una designación interpretativa. «Seres vivientes» conserva el carácter apocalíptico y la función de estos seres en la escena celestial.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de προσκυνέω aplicado a Dios
  english_pob_reading: worshiped God
  chosen_spanish_reading: adoraron a Dios
  alternative_spanish_readings:
  - se postraron delante de Dios
  - rindieron culto a Dios
  rationale: El gesto corporal ya queda explicitado por «se postraron sobre sus rostros», de modo que el verbo final debe expresar el acto de adoración. «Adoraron» preserva esa dimensión devocional sin duplicar innecesariamente la descripción física.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden en lo esencial: postura continua de los ángeles, ubicación alrededor del trono, identificación del grupo de los πρεσβύτεροι y de los ζῷα, y el doble movimiento de caída/prostración seguido de adoración a Dios. No se registran revisiones posteriores en el paquete proporcionado, y el paso más reciente indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene «ángeles» y no se introduce una perífrasis innecesaria.
  - «Ancianos» conserva la terminología apocalíptica establecida en español.
  - «Seres vivientes» evita confundir ζῷα con animales comunes.
  - «Se postraron» y «adoraron» distinguen correctamente la acción física y la reverencia religiosa.
  - Se usa «Dios» sin sustitución por «SEÑOR» porque el texto griego nombra explícitamente a θεός.
