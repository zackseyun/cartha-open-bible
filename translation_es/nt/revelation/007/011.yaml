revisions:
- from: Y todos los ángeles estaban de pie alrededor del trono, y de los ancianos y de los cuatro seres vivientes[a], y se postraron delante del trono sobre sus rostros y adoraron a Dios,
  to: Y todos los ángeles estaban de pie alrededor del trono, de los ancianos y de los cuatro seres vivientes[a], y cayeron delante del trono, rostro en tierra, y adoraron a Dios,
  rationale: Se corrige la sintaxis de la serie gobernada por «alrededor de» para reflejar fielmente κύκλῳ con sus complementos coordinados. Se cambia «se postraron» por «cayeron» para conservar la secuencia verbal del griego y del POB inglés, y se vuelve más natural la expresión de ἐπὶ τὰ πρόσωπα αὐτῶν con «rostro en tierra». La nota se ajusta para ofrecer una alternativa española real frente al texto principal.
