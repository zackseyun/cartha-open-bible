review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la mayor parte del sentido griego y del rastro POB en cuanto a «todos los ángeles», «estaban de pie», «alrededor del trono», «los ancianos», «los cuatro seres vivientes», y «adoraron a Dios». Sin embargo, introduce un problema sintáctico importante al repetir «de» después de «alrededor del trono», lo que en español sugiere una construcción incompleta y desfigura la relación de κύκλῳ con toda la serie «del trono y de los ancianos y de los cuatro seres vivientes». Además, «se postraron» para ἔπεσαν adelanta parte del sentido ya expresado después por «sobre sus rostros»; una forma más fiel al reparto semántico del griego es «cayeron ... rostro en tierra» o similar.
  spanish_quality_summary: La redacción es generalmente clara y digna, pero la frase «alrededor del trono, y de los ancianos y de los cuatro seres vivientes» suena defectuosa en español. También «sobre sus rostros» es comprensible pero menos natural que «rostro en tierra» o «sobre sus caras»; para registro bíblico amplio, «rostro en tierra» mantiene dignidad y claridad. La nota al pie está bien formada y útil.
  glossary_alignment: 'La terminología clave está alineada con el proyecto: «Dios» para θεῷ, «ángeles» para ἄγγελοι, «ancianos» para πρεσβυτέρων, y «seres vivientes» para ζῴων, con alternativa conservada en nota. No hay conflictos con Yahvé/Mesías/Cristo ni otros términos sensibles del glosario.'
  issues:
  - severity: high
    issue: Construcción sintáctica incorrecta con «alrededor del trono, y de los ancianos y de los cuatro seres vivientes»
    rationale: 'El griego presenta una sola relación espacial con tres genitivos coordinados. En español, la coma y la repetición de «de» tras «alrededor del trono» dejan una frase torpe y semánticamente inestable. Debe leerse como un solo grupo: «alrededor del trono, de los ancianos y de los cuatro seres vivientes» o mejor reestructurarse para sonar natural.'
  - severity: medium
    issue: «Se postraron» para ἔπεσαν reduce la distinción con la frase siguiente
    rationale: El original dice primero «cayeron» y luego explicita la postura «sobre sus rostros». Traducir ἔπεσαν como «se postraron» fusiona ambas ideas y hace menos nítido el paralelismo del texto fuente y del POB inglés.
  - severity: low
    issue: «Sobre sus rostros» es algo rígido en español contemporáneo
    rationale: Es formalmente cercano al griego, pero «rostro en tierra» comunica mejor la prostración completa con naturalidad eclesial amplia, sin paráfrasis excesiva.
  revised_spanish_text: Y todos los ángeles estaban de pie alrededor del trono, de los ancianos y de los cuatro seres vivientes[a], y cayeron delante del trono, rostro en tierra, y adoraron a Dios,
  revised_footnotes:
