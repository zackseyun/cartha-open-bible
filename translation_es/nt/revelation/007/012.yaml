translation:
  language: es
  text: 'diciendo: «¡Amén! La bendición, la gloria, la sabiduría, la acción de gracias, el honor, el poder y la fuerza sean a nuestro Dios por los siglos de los siglos[a]. Amén.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «por las edades de las edades».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - mientras decían
  lexicon: BDAG
  rationale: El participio presente introduce el contenido de la aclamación; «diciendo» conserva esa función introductoria de forma natural en español sin añadir información temporal no contenida en el griego.
- source_word: Ἀμήν / ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Verdaderamente
  lexicon: BDAG
  rationale: En un contexto litúrgico y doxológico, la transliteración «Amén» es la forma más fiel y reconocible en español; traducirlo como «Verdaderamente» desharía su función formal de aclamación y respuesta.
- source_word: ἡ εὐλογία
  english_pob_choice: the blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - bendición
  - la alabanza
  lexicon: BDAG
  rationale: «Bendición» conserva el sustantivo con artículo y la cadencia enumerativa del griego. «Alabanza» sería una explicación interpretativa más amplia que no exige el sustantivo griego.
- source_word: ἡ δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente normal en español para este término en contexto doxológico y preserva la serie de atributos ascritos a Dios.
- source_word: ἡ σοφία
  english_pob_choice: the wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: BDAG
  rationale: Correspondencia directa y estable para el sustantivo griego; mantiene el paralelismo de la enumeración.
- source_word: ἡ εὐχαριστία
  english_pob_choice: the thanksgiving
  chosen_spanish: la acción de gracias
  alternatives_spanish:
  - la gratitud
  - el agradecimiento
  lexicon: BDAG
  rationale: En español, «acción de gracias» comunica mejor el valor nominal y culto del término que un simple «gracias». Conserva el tono formal de la doxología y evita sonar como una expresión de cortesía cotidiana.
- source_word: ἡ τιμή
  english_pob_choice: the honor
  chosen_spanish: el honor
  alternatives_spanish:
  - honor
  - la honra
  lexicon: BDAG
  rationale: «Honor» preserva la idea de dignidad ascrita a Dios; «honra» es posible, pero «honor» encaja mejor con la serie de sustantivos abstractos y con el registro doxológico.
- source_word: ἡ δύναμις
  english_pob_choice: the power
  chosen_spanish: el poder
  alternatives_spanish:
  - poder
  - la potencia
  lexicon: BDAG
  rationale: «Poder» es la equivalencia más idiomática en español para δύναμις en este contexto y mantiene la distinción con ἰσχύς sin forzar una paráfrasis.
- source_word: ἡ ἰσχὺς
  english_pob_choice: the might
  chosen_spanish: la fuerza
  alternatives_spanish:
  - fuerza
  - el vigor
  lexicon: BDAG
  rationale: Se mantiene la diferencia semántica respecto de δύναμις mediante «fuerza», un término elevado y natural en español. «Might» en inglés se distingue de «power»; en español, «fuerza» ofrece una segunda resonancia válida sin caer en redundancia innecesaria.
- source_word: τῷ θεῷ ἡμῶν
  english_pob_choice: to our God
  chosen_spanish: para nuestro Dios
  alternatives_spanish:
  - a nuestro Dios
  - de nuestro Dios
  lexicon: BDAG
  rationale: La frase griega funciona como dativo de destinatario/ascripción dentro de una doxología elíptica. En español, «sea para nuestro Dios» expresa mejor esa atribución de la serie de elogios sin convertirla en posesión. «A nuestro Dios» también sería posible, pero «para» hace más natural el flujo de la oración completa.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por toda la eternidad
  - por los siglos eternos
  lexicon: BDAG
  rationale: La expresión tradicional española «por los siglos de los siglos» conserva con precisión el superlativo semítico/grecolatino de duración indefinida. Se prefirió esta forma a una paráfrasis más moderna porque refleja mejor la fórmula fija del texto.
theological_decisions:
- issue: Verbo implícito en la doxología
  english_pob_reading: be to our God
  chosen_spanish_reading: sean para nuestro Dios
  alternative_spanish_readings:
  - sean de nuestro Dios
  - pertenezcan a nuestro Dios
  rationale: El griego carece de verbo expreso después de la serie nominal. En español se necesita completar la cláusula; «sean para nuestro Dios» conserva el carácter de atribución litúrgica y evita convertir la frase en mera posesión. La pluralidad de los sustantivos del listado justifica el verbo plural «sean».
  doctrine_reference: Translation philosophy §1, §6
- issue: Distinción retórica entre δύναμις e ἰσχύς
  english_pob_reading: power ... might
  chosen_spanish_reading: poder ... fuerza
  alternative_spanish_readings:
  - poder ... poder
  - fuerza ... poder
  rationale: El pasaje acumula términos cercanos para intensificar la adoración. Mantener dos vocablos distintos en español preserva esa plenitud retórica y evita aplanar la doxología. «Poder ... fuerza» comunica bien la relación sin introducir una distinción doctrinal artificial.
  doctrine_reference: Translation philosophy §5
- issue: Tratamiento de ἀμήν inicial y final
  english_pob_reading: Amen ... Amen
  chosen_spanish_reading: ¡Amén! ... Amén.
  alternative_spanish_readings:
  - Amén ... Amén
  - ¡Así sea! ... Amén
  rationale: La repetición enmarca la aclamación; mantenerla como «Amén» preserva su función litúrgica reconocible y su valor de asentimiento solemne. No se traduce por «así sea» para no perder la forma estable del término en la adoración cristiana.
  doctrine_reference: Translation philosophy §4, §6
translation_notes:
  revision_awareness: El texto inglés del POB fue revisado recientemente y quedó sin cambios; la presente propuesta sigue esa lectura estable, conservando la estructura doxológica, la repetición de «Amén» y la distinción entre δύναμις e ἰσχύς.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se usa «SEÑOR», conforme al criterio del proyecto.
  - Se conservan dos términos distintos, «poder» y «fuerza», para reflejar la doblete griego.
  - La fórmula final «por los siglos de los siglos» sigue la equivalencia idiomática ya documentada en el audit trail inglés.
  - Se prefirió «acción de gracias» por ser más formal y nominal que «gracias», acorde con el tono doxológico.
