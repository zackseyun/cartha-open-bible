translation:
  language: es
  text: de la tribu de Aser[a], doce mil; de la tribu de Neftalí, doce mil; de la tribu de Manasés, doce mil;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente según el contexto: «de la tribu de Aser, doce mil fueron sellados» (y lo mismo para las tribus siguientes). El griego de este versículo no repite el verbo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - procedentes de
  lexicon: BDAG
  rationale: En esta enumeración genealógica, ἐκ marca procedencia/origen. En español, la solución natural y fiel es «de»; «desde» suena menos idiomático aquí y «procedentes de» añade peso innecesario.
- source_word: φυλῆς
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - tribu de Israel
  - clan
  lexicon: BDAG
  rationale: En este contexto israelita, φυλή designa una división tribal. «Tribu» conserva el valor genealógico y es la equivalencia española estándar y precisa.
- source_word: Ἀσὴρ
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: convención onomástica bíblica en español
  rationale: Para el nombre tribal, «Aser» es la forma habitual en español bíblico y conserva la identidad del nombre propio sin necesidad de transliteración inglesa.
- source_word: δώδεκα χιλιάδες
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - doce mil personas
  - doce millares
  lexicon: BDAG
  rationale: La secuencia numérica se traduce de forma directa y sobria. No se añade ningún verbo como «fueron sellados», porque en el griego de este versículo no aparece.
- source_word: Νεφθαλὶμ
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalim
  lexicon: convención onomástica bíblica en español
  rationale: «Neftalí» es la forma estándar en español y corresponde al nombre tribal con naturalidad y reconocimiento eclesial.
- source_word: Μανασσῆ
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: convención onomástica bíblica en español
  rationale: «Manasés» es la forma consagrada en español bíblico y comunica el nombre propio de manera clara y natural.
theological_decisions:
- issue: Si introducir el verbo implícito de sellamiento del contexto inmediato
  english_pob_reading: The English POB keeps the verse as a verbless list and only notes in a footnote that 'were sealed' is implied from the context.
  chosen_spanish_reading: Mantener la lista sin verbo explícito en el texto principal, dejando la elipsis visible.
  alternative_spanish_readings:
  - de la tribu de Aser, doce mil fueron sellados; de la tribu de Neftalí, doce mil; de la tribu de Manasés, doce mil
  rationale: El griego de este versículo presenta únicamente frases preposicionales con el número; por fidelidad al texto fuente, no se inserta un verbo que no está escrito. La nota permite explicar que el sellamiento pertenece al contexto mayor.
  doctrine_reference: Principio de primacía del texto original; evitar ampliar el contenido más allá de lo que el versículo expresa.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente y con la auditoría inglesa: se conserva la estructura elíptica de la lista y no se introducen palabras ausentes del griego.'
  spanish_consistency_notes:
  - Se mantiene «de la tribu de…» de forma uniforme para reflejar la repetición del griego.
  - 'Se usan formas onomásticas bíblicas españolas estándar: Aser, Neftalí y Manasés.'
  - La nota a conserva la tensión entre la lista breve del versículo y el verbo implícito del contexto inmediato sin resolverla por paráfrasis.
