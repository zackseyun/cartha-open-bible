translation:
  language: es
  text: 'Y claman a gran voz[a], diciendo: «La salvación pertenece a nuestro Dios, que está sentado sobre el trono, y al Cordero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «La salvación a nuestro Dios que está sentado sobre el trono, y al Cordero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κράζουσι
  english_pob_choice: they cry out
  chosen_spanish: clamaban
  alternatives_spanish:
  - gritaban
  - clamaban a gritos
  lexicon: BDAG
  rationale: El presente narrativo griego expresa una acción viva y audible. «Clamaban» conserva la fuerza de κράζω mejor que un simple «decían», y suena natural en español bíblico sin perder intensidad.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: a gran voz
  alternatives_spanish:
  - con voz fuerte
  - en voz alta
  lexicon: BDAG
  rationale: La construcción dativa funciona como modo o manera. «A gran voz» es una equivalencia tradicional y clara en español que preserva el efecto sonoro y solemne del original.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: El participio introduce el contenido del clamor. «Diciendo» reproduce esa función en español de forma directa y sobria.
- source_word: Ἡ σωτηρία
  english_pob_choice: Salvation belongs
  chosen_spanish: La salvación pertenece
  alternatives_spanish:
  - La salvación es
  - La salvación sea
  lexicon: BDAG
  rationale: El griego presenta una aclamación nominal con dativo de atribución. En español, «pertenece» expresa con naturalidad que la salvación se atribuye a Dios, sin añadir más de lo que el texto dice.
- source_word: τῷ θεῷ ἡμῶν
  english_pob_choice: to our God
  chosen_spanish: a nuestro Dios
  alternatives_spanish:
  - para nuestro Dios
  - de nuestro Dios
  lexicon: BDAG
  rationale: El dativo marca el destinatario o al que se atribuye la salvación. «A nuestro Dios» mantiene esa relación de atribución de manera idiomática en español.
- source_word: τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  english_pob_choice: who sits on the throne
  chosen_spanish: que está sentado sobre el trono
  alternatives_spanish:
  - que se sienta sobre el trono
  - el que está sentado sobre el trono
  lexicon: BDAG
  rationale: El participio funciona como frase descriptiva en aposición a «nuestro Dios». «Que está sentado» conserva el estado resultante y la escena entronizada sin sonar forzado en español.
- source_word: τῷ ἀρνίῳ
  english_pob_choice: to the Lamb
  chosen_spanish: al Cordero
  alternatives_spanish:
  - al Cordero de Dios
  lexicon: BDAG
  rationale: ἀρνίον es el título joánico establecido para Jesús en Apocalipsis. «Cordero» mantiene la imaginería sacrificial y mesiánica; no se añade «de Dios» porque el texto no lo requiere aquí.
theological_decisions:
- issue: Construcción de atribución de la salvación
  english_pob_reading: 'Render as a shared acclamation: ''Salvation belongs to our God ... and to the Lamb!'''
  chosen_spanish_reading: «La salvación pertenece a nuestro Dios ... y al Cordero»
  alternative_spanish_readings:
  - «La salvación es para nuestro Dios ... y para el Cordero»
  - «Salvación a nuestro Dios ... y al Cordero»
  rationale: La frase griega es una aclamación nominal con dativo que atribuye la salvación a Dios y al Cordero. «Pertenece» comunica esa atribución sin convertirla en una formulación más interpretativa de lo necesario; además, mantiene la fuerza litúrgica del pasaje y su alta cristología.
  doctrine_reference: Afirmaciones cristológicas; filosofía de traducción §§1, 3
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y coincide con la lectura auditada del POB en inglés. No se detectaron revisiones aplicadas en el expediente; la decisión principal es cómo expresar en español la aclamación nominal con dativo de atribución sin perder naturalidad ni la tensión lexical de ἡ σωτηρία τῷ θεῷ ἡμῶν.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando aparece el nombre divino, pero aquí el griego tiene θεῷ sin cita explícita del nombre; por tanto, corresponde «Dios».
  - Se mantiene «Cordero» como título fijo de Apocalipsis, conforme al uso joánico y al audit trail en inglés.
  - «A gran voz» preserva el matiz idiomático y solemne del dativo de modo; no se ha suavizado a un simple adverbio.
