- from: 'Y oí el número de los que habían sido sellados: ciento cuarenta y cuatro mil[a], sellados de toda tribu de los hijos de Israel.'
  to: 'Y oí el número de los que habían sido sellados: ciento cuarenta y cuatro mil,[a] sellados de cada tribu de los hijos de Israel.'
