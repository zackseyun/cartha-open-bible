translation:
  language: es
  text: 'Y oí el número de los que habían sido sellados: ciento cuarenta y cuatro mil,[a] sellados de cada tribu de los hijos de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Israel». El griego dice «los hijos de Israel», conservando la formulación masculina genealógica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  lexicon: BDAG
  rationale: El aoristo narrativo de ἀκούω se vierte naturalmente como una acción puntual pasada. «Oí» conserva la sobriedad del griego y evita introducir matices de atención deliberada que no están en el texto.
- source_word: τὸν ἀριθμὸν
  english_pob_choice: number
  chosen_spanish: el número
  alternatives_spanish:
  - la cuenta
  - la cantidad
  lexicon: BDAG
  rationale: «Número» es la equivalencia directa y más natural en español para ἀριθμός en este contexto de conteo total de un grupo.
- source_word: τῶν ἐσφραγισμένων
  english_pob_choice: those who had been sealed
  chosen_spanish: de los que habían sido sellados
  alternatives_spanish:
  - de los sellados
  - de los que fueron sellados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una acción ya cumplida con estado resultante; «habían sido sellados» preserva ese valor mejor que un simple participio adjetival en español.
- source_word: ἑκατὸν τεσσεράκοντα τέσσαρες χιλιάδες
  english_pob_choice: one hundred forty-four thousand
  chosen_spanish: ciento cuarenta y cuatro mil
  alternatives_spanish:
  - ciento cuarenta y cuatro mil personas
  lexicon: BDAG
  rationale: La cifra se traduce con el orden natural del español moderno. No se añade «personas» porque el texto no lo dice; el referente humano ya queda claro por el contexto.
- source_word: ἐσφραγισμένοι
  english_pob_choice: sealed
  chosen_spanish: sellados
  alternatives_spanish:
  - marcados con sello
  - sellado
  lexicon: BDAG
  rationale: La repetición del participio se conserva con el mismo núcleo léxico. «Sellados» es la forma idiomática y transparente en español para σφραγίζω en este pasaje apocalíptico.
- source_word: ἐκ πάσης φυλῆς
  english_pob_choice: from every tribe
  chosen_spanish: de toda tribu
  alternatives_spanish:
  - de cada tribu
  - de toda la tribu
  lexicon: BDAG
  rationale: ἐκ expresa procedencia; en español, «de» comunica bien el origen. «Toda tribu» conserva el distributivo sin añadir una formulación más explicativa de lo que permite el griego.
- source_word: υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los niños de Israel
  - el pueblo de Israel
  lexicon: BDAG
  rationale: Se mantiene el lenguaje genealógico y bíblico del griego con «hijos», que en español refleja bien υἱοί en una lista tribal. No se neutraliza a «pueblo» o «descendientes» porque eso borraría el matiz masculino explícito del texto fuente.
theological_decisions:
- issue: Valor del participio perfecto pasivo de «sellar»
  english_pob_reading: those who had been sealed / sealed
  chosen_spanish_reading: los que habían sido sellados / sellados
  alternative_spanish_readings:
  - los sellados
  - los que fueron sellados
  rationale: La redacción española conserva la idea de una acción pasada con resultado vigente, sin convertirla en un estado meramente nominal. Esto evita perder el peso teológico del sello como acto ya realizado sobre el grupo mencionado.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (source transparency) y §5 (aspect-sensitive rendering)
- issue: Sexo gramatical de «υἱῶν Ἰσραήλ»
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los niños de Israel
  - el pueblo de Israel
  rationale: El griego usa un sustantivo masculino explícito y en un contexto de linaje tribal. «Hijos de Israel» conserva esa forma sin imponer una neutralización que el texto no ofrece. La opción no define por sí sola un sistema escatológico; solo respeta el registro genealógico del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Mención de una cifra exacta en Apocalipsis
  english_pob_reading: one hundred forty-four thousand
  chosen_spanish_reading: ciento cuarenta y cuatro mil
  alternative_spanish_readings:
  - ciento cuarenta y cuatro mil personas
  rationale: No se amplifica ni se explica la cifra, porque el texto solo presenta el número como parte del contenido oído por Juan. La traducción mantiene la precisión cuantitativa sin añadir interpretación.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (minimal addition)
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra acuerdo alto y sin revisiones aplicadas; esta versión española sigue de cerca esas decisiones sin introducir cambios textuales o interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «sellados» de forma coherente para ambos participios de σφραγίζω.
  - Se conserva «hijos de Israel» para reflejar la expresión masculina del griego.
  - La puntuación con dos puntos reproduce bien la presentación del número dentro de la oración narrativa.
  - No se usa «Señor» ni otras sustituciones teológicas ajenas al texto, porque en este versículo no aparecen formas divinas equivalentes.
