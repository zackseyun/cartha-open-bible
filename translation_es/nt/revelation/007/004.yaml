review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría en los puntos principales: «Y oí», «el número», la cifra, la repetición de «sellados» y el lenguaje genealógico «los hijos de Israel». Sin embargo, la nota al pie no preserva correctamente la alternativa inglesa, porque ofrece como alternativa exactamente la misma expresión del texto principal en lugar de una alternativa real equivalente a «los hijos/descendientes de Israel» vs. «los hijos de Israel» en inglés. Además, «de toda tribu» es comprensible, pero «de cada tribu» suena más natural y expresa mejor el distributivo de ἐκ πάσης φυλῆς en español.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mejorar naturalidad y exactitud editorial. «De cada tribu» fluye mejor que «de toda tribu» en registro bíblico contemporáneo. La nota al pie actual es defectuosa y confusa, porque no presenta una alternativa distinta. El resto del verso es legible y fiel.
  glossary_alignment: 'Hay buena alineación con las decisiones del proyecto: no hay términos conflictivos de Yahvé/Mesías/etc. «Los hijos de Israel» respeta la decisión de conservar el masculino genealógico de υἱῶν. «Sellados» refleja correctamente σφραγίζω. El único problema de glosario/documentación es la nota léxica, que debe ofrecer una alternativa española real como «los descendientes de Israel» o «los hijos de Israel» según el texto principal escogido.'
  issues:
  - severity: medium
    issue: La nota al pie [a] no ofrece una alternativa real.
    rationale: El texto principal ya dice «los hijos de Israel», y la nota dice «O «los hijos de Israel»», lo cual no añade información y no corresponde al audit trail inglés, donde la alternativa es «the children of Israel». En español debe formularse una alternativa distinta y útil, por ejemplo «los descendientes de Israel».
  - severity: low
    issue: «de toda tribu» es menos natural que «de cada tribu».
    rationale: Aunque «de toda tribu» puede defenderse como calco distributivo, en español bíblico natural «de cada tribu» comunica mejor el valor distributivo de ἐκ πάσης φυλῆς sin pérdida de sentido.
  revised_spanish_text: 'Y oí el número de los que habían sido sellados: ciento cuarenta y cuatro mil,[a] sellados de cada tribu de los hijos de Israel.'
  revised_footnotes:
  - marker: a
    text: O «los descendientes de Israel». El griego dice «los hijos de Israel», conservando la formulación masculina genealógica.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que presente una alternativa española real y útil, en línea con la función de la nota inglesa, sin borrar la decisión principal de conservar «hijos». También se ajusta «de toda tribu» a «de cada tribu» por mayor naturalidad y mejor expresión del distributivo griego.
