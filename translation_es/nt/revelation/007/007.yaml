translation:
  language: es
  text: de la tribu de Simeón[a], doce mil; de la tribu de Leví, doce mil; de la tribu de Isacar, doce mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la tribu de Simeón ... de la tribu de Leví ... de la tribu de Isacar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de entre
  - salidos de
  lexicon: BDAG
  rationale: ἐκ marca origen o procedencia. En español, la repetición de «de la tribu de...» comunica con naturalidad esa procedencia sin añadir interpretación. «De entre» o «salidos de» sonarían más marcados y menos fluidos en una lista genealógica/apocalíptica.
- source_word: φυλῆς
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  - casa
  lexicon: BDAG
  rationale: En este contexto israelita, φυλή se refiere a una división tribal. «Tribu» es el equivalente preciso y transparente en español.
- source_word: Συμεὼν
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simeon
  lexicon: Convención onomástica bíblica
  rationale: Se conserva el nombre propio en su forma castellana estándar. «Simeón» es la forma más establecida y legible en español bíblico.
- source_word: δώδεκα χιλιάδες
  english_pob_choice: twelve thousand
  chosen_spanish: doce mil
  alternatives_spanish:
  - '12.000'
  - doce mil personas
  lexicon: BDAG
  rationale: El número se expresa con palabras, como en el texto inglés POB, para mantener el tono literario y el patrón repetitivo de la enumeración. No se añade «personas» porque el griego no lo explicita.
- source_word: Λευὶ
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio en forma castellana habitual. Se mantiene sin ampliación explicativa, ya que el versículo simplemente lo enumera entre las tribus.
- source_word: Ἰσσαχὰρ
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: Convención onomástica bíblica
  rationale: 'Se usa la forma española bíblica más corriente y natural en lectura pública: «Isacar».'
theological_decisions:
- issue: Cadencia repetida de la lista tribal
  english_pob_reading: Preserve the repeated formula 'from the tribe of ... , twelve thousand' for each tribe.
  chosen_spanish_reading: Conservar la fórmula repetida «de la tribu de ..., doce mil» para cada tribu.
  alternative_spanish_readings:
  - Condensar a «de las tribus de Simeón, Leví e Isacar, doce mil cada una»
  rationale: El griego repite la misma estructura en cada miembro de la lista. Mantener la repetición preserva el ritmo enumerativo apocalíptico y evita suavizar la forma del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Inclusión de Leví en la enumeración
  english_pob_reading: Translate Levi without explanatory expansion in the main text.
  chosen_spanish_reading: Traducir Leví sin explicación añadida en el texto principal.
  alternative_spanish_readings:
  - Añadir una nota interpretativa sobre la inclusión inusual de Leví
  rationale: El versículo únicamente enumera a Leví; introducir una explicación en el cuerpo principal excedería lo que el texto afirma explícitamente.
  doctrine_reference: 'Affirmations: no importar afirmaciones doctrinales que el texto no hace; Translation philosophy §1'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas. Se conservó la estructura repetitiva, la inclusión de Leví y la equivalencia preposicional sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «de la tribu de...» como equivalente natural de ἐκ + genitivo.
  - 'Se usaron formas castellanas bíblicas consistentes para los nombres propios: Simeón, Leví, Isacar.'
  - No se capitalizó «tribu» porque en español funciona como sustantivo común en esta construcción.
  - La nota al pie preserva la alternativa semántica de procedencia («de la tribu» / «de la tribu de» con matiz de origen).
