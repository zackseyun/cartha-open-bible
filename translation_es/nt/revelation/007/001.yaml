translation:
  language: es
  text: Después de esto vi cuatro ángeles de pie en los cuatro extremos de la tierra[a], que retenían los cuatro vientos de la tierra, para que no soplara viento sobre la tierra, ni sobre el mar, ni sobre ningún árbol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «los cuatro extremos de la tierra» representa un modismo cosmológico/apocalíptico que designa las extremidades de la tierra o las cuatro direcciones.
    reason: cultural_note
lexical_decisions:
- source_word: Μετὰ τοῦτο
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de estas cosas
  lexicon: SBLGNT; BDAG
  rationale: La expresión marca una secuencia temporal en visión apocalíptica. «Después de esto» es natural en español y conserva el orden narrativo; «Después de estas cosas» es más formal, pero menos idiomático.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  lexicon: SBLGNT; BDAG
  rationale: El aoristo de ὁράω expresa percepción visionaria. «Vi» comunica directamente la visión sin añadir un giro que el griego no exige.
- source_word: τέσσαρας ἀγγέλους
  english_pob_choice: four angels
  chosen_spanish: cuatro ángeles
  alternatives_spanish:
  - cuatro mensajeros
  lexicon: SBLGNT; BDAG
  rationale: ἄγγελος en este contexto designa seres celestiales; «ángeles» es la equivalencia normal y transparente.
- source_word: ἑστῶτας
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - en pie
  - estando de pie
  lexicon: SBLGNT; BDAG
  rationale: El participio perfecto de ἵστημι describe una postura mantenida. «De pie» es la forma más natural en español para conservar esa imagen sin sobreexplicarla.
- source_word: ἐπὶ τὰς τέσσαρας γωνίας τῆς γῆς
  english_pob_choice: at the four corners of the earth
  chosen_spanish: en las cuatro esquinas de la tierra
  alternatives_spanish:
  - en las cuatro extremidades de la tierra
  - en los cuatro extremos de la tierra
  lexicon: SBLGNT; BDAG
  rationale: Se preserva la expresión cosmológica/apocalíptica. «Esquinas» refleja bien la imagen literal; «tierra» sigue el alcance amplio de γῆ en este pasaje, sin restringirlo a «país» o «tierra» en sentido local.
- source_word: κρατοῦντας
  english_pob_choice: holding back
  chosen_spanish: retenían
  alternatives_spanish:
  - sujetaban
  - contenían
  - detenían
  lexicon: SBLGNT; BDAG
  rationale: κρατέω puede significar sostener con firmeza, sujetar o impedir. Aquí la función es impedir que los vientos soplen; «retenían» expresa bien esa contención sin añadir un matiz más fuerte que el contexto.
- source_word: τοὺς τέσσαρας ἀνέμους τῆς γῆς
  english_pob_choice: the four winds of the earth
  chosen_spanish: los cuatro vientos de la tierra
  alternatives_spanish:
  - los cuatro vientos de la tierra
  lexicon: SBLGNT; BDAG
  rationale: Es una expresión apocalíptica estable para los vientos procedentes de los cuatro puntos cardinales. «De la tierra» conserva la correspondencia con γῆ y el paralelismo del versículo.
- source_word: ἵνα μὴ πνέῃ ἄνεμος
  english_pob_choice: so that no wind might blow
  chosen_spanish: para que no soplara viento
  alternatives_spanish:
  - a fin de que no soplara viento
  - para que ningún viento soplara
  lexicon: SBLGNT; BDAG
  rationale: ἵνα + subjuntivo expresa propósito. El singular anartro ἄνεμος se vierte naturalmente como «viento» genérico; «soplara» reproduce el verbo πνέω con un español claro y digno.
- source_word: ἐπὶ τῆς γῆς μήτε ἐπὶ τῆς θαλάσσης μήτε ἐπὶ πᾶν δένδρον
  english_pob_choice: on the earth or on the sea or on any tree
  chosen_spanish: sobre la tierra, ni sobre el mar, ni sobre ningún árbol
  alternatives_spanish:
  - sobre la tierra, ni sobre el mar, ni sobre todo árbol
  - sobre la tierra, ni sobre el mar, ni sobre cualquier árbol
  lexicon: SBLGNT; BDAG
  rationale: La serie μήτε...μήτε se expresa de forma natural con «ni... ni...». «Sobre» corresponde bien a ἐπί en el sentido de extensión/impacto del viento. «Ningún árbol» comunica el valor distributivo de πᾶν δένδρον.
theological_decisions:
- issue: Alcance cósmico de γῆ
  english_pob_reading: Rendered γῆ as 'earth' throughout the verse.
  chosen_spanish_reading: Se traduce γῆ como «tierra» en todo el versículo.
  alternative_spanish_readings:
  - mundo
  - suelo
  - país
  rationale: 'En español, «tierra» conserva el alcance amplio y la imagen apocalíptica sin forzar un tecnicismo. En este contexto, el cuadro es cósmico: cuatro esquinas, cuatro vientos, mar y árbol; por eso no se estrecha a «país» ni se reemplaza por una glosa explicativa.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Idioma apocalíptico de «las cuatro esquinas de la tierra»
  english_pob_reading: Preserved the idiom literally.
  chosen_spanish_reading: 'Se preserva la imagen literal: «las cuatro esquinas de la tierra».'
  alternative_spanish_readings:
  - los cuatro extremos de la tierra
  - las cuatro extremidades de la tierra
  rationale: La frase es una convención visionaria y no una afirmación científica. Mantener la imagen ayuda a respetar el registro apocalíptico y la tensión poética del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor del participio ἑστῶτας y de κρατοῦντας
  english_pob_reading: standing ... holding back
  chosen_spanish_reading: «de pie» ... «retenían»
  alternative_spanish_readings:
  - en pie
  - sujetaban
  rationale: El texto presenta a los ángeles en postura estable mientras contienen los vientos. «De pie» y «retenían» preservan esa doble idea sin convertirla en una explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto griego y el informe auditado en inglés muestran acuerdo alto y no requieren revisiones sustantivas. La principal decisión en español fue conservar el lenguaje apocalíptico literal («cuatro esquinas», «cuatro vientos») y ajustar la sintaxis a un español natural sin suavizar el contenido.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para γῆ en todo el versículo, en coherencia con el alcance cósmico del pasaje.
  - Se evitó el tradicionalismo de «SEÑOR» o de glosas no presentes en el texto; aquí no intervienen nombres divinos.
  - «Retenían» conserva la fuerza de κρατέω sin sobretraducir como «bloqueaban», que sería más interpretativo.
  - La negación coordinada se resolvió con «ni... ni... ni...» para reflejar μήτε...μήτε... μήτε.
