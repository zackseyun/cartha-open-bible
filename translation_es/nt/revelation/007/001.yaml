  text: ⸀Μετὰ τοῦτο εἶδον τέσσαρας ἀγγέλους ἑστῶτας ἐπὶ τὰς τέσσαρας γωνίας τῆς γῆς, κρατοῦντας τοὺς τέσσαρας ἀνέμους τῆς γῆς, ἵνα μὴ πνέῃ ἄνεμος ἐπὶ τῆς γῆς μήτε ἐπὶ τῆς θαλάσσης μήτε ἐπὶ ⸀πᾶν δένδρον.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/007/001.yaml
  text: After this I saw four angels standing at the four corners of the earth[b][a], holding back the four winds of the earth so that no wind might blow on the earth or on the sea or on any tree.
  footnotes:
