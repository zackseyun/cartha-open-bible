review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en la secuencia visionaria, la multitud incontable, la doble repetición de «delante», y el título cristológico «el Cordero». Sin embargo, hay dos desajustes relevantes: «vestida» pone en singular un participio/acusativo plural referido a la multitud compuesta por personas, y «palmas» sin «ramas» puede sonar menos preciso que φοίνικες = ramas de palma. Además, la nota [a] no refleja bien la alternativa inglesa auditada, que trata la serie «nation/tribe/people/language», no εἶδον.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «una gran multitud ... vestida» resulta gramaticalmente menos natural al concordar con «multitud» singular en vez de con las personas representadas; «vestidos» suena mejor en este contexto bíblico. «De toda nación y tribu y pueblos y lenguas» conserva parte de la asimetría, pero mezcla singular/plural de forma algo áspera; aun así es defendible. «Con ramas de palma en sus manos» mejora precisión e imagen. La nota actual necesita corrección para no introducir una alternativa distinta de la auditada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Cordero» está bien para ἀρνίον. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión sobre la lista étnica debe seguir siendo explicada como una preservación formal; en español conviene mantener al menos el singular inicial «nación» y una nota que ofrezca la lectura más fluida en singular coordinado.
  issues:
  - severity: high
    issue: Concordancia en «vestida con túnicas blancas»
    rationale: El griego περιβεβλημένους ... λευκάς está en plural y describe a los integrantes de la multitud; en español, aunque «multitud» es singular colectivo, aquí «vestidos con túnicas blancas» preserva mejor el sentido referencial y evita una lectura demasiado gramaticalizada del colectivo.
  - severity: medium
    issue: «Palmas» es menos explícito que «ramas de palma»
    rationale: φοίνικες aquí significa ramas de palma, no simplemente «palmas» como objeto ambiguo o abreviatura menos transparente. La expresión explícita mejora fidelidad y claridad.
  - severity: medium
    issue: La nota [a] está anclada a «miré» pero su contenido no corresponde al audit trail inglés
    rationale: La nota inglesa documenta una alternativa más fluida para la serie «de toda nación, tribu, pueblo y lengua» y la preservación de la asimetría del griego. La nota española actual introduce en cambio «vi, y he aquí», que no es la nota auditada y además contradice la decisión principal sin necesidad.
  revised_spanish_text: Después de estas cosas miré, y he aquí una gran multitud, que nadie podía contar, de toda nación[a] y tribu y pueblos y lenguas, de pie delante del trono y delante del Cordero, vestidos con túnicas blancas, y con ramas de palma en sus manos.
  revised_footnotes:
  - marker: a
    text: 'O, con mayor fluidez: «de toda nación, tribu, pueblo y lengua». El texto principal conserva el cambio del griego desde el singular «nación» a los términos siguientes.'
    reason: lexical_alternative
  revision_rationale: Se corrigen una concordancia importante («vestidos»), una precisión léxica («ramas de palma»), y la nota para alinearla con la evidencia y la auditoría inglesa sobre la lista étnica. El resto del verso puede mantenerse.
