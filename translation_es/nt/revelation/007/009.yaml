translation:
  language: es
  text: Después de estas cosas miré, y he aquí una gran multitud, que nadie podía contar, de toda nación[a] y tribu y pueblos y lenguas, de pie delante del trono y delante del Cordero, vestidos con túnicas blancas, y con ramas de palma en sus manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con mayor fluidez: «de toda nación, tribu, pueblo y lengua». El texto principal conserva el cambio del griego desde el singular «nación» a los términos siguientes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego
  lexicon: BDAG
  rationale: Mantiene la secuencia visionaria y refleja con precisión el plural de ταῦτα sin suavizarlo en exceso.
- source_word: εἶδον, καὶ ἰδοὺ
  english_pob_choice: I looked, and behold
  chosen_spanish: miré, y he aquí
  alternatives_spanish:
  - vi, y he aquí
  - miré, y mira
  lexicon: BDAG
  rationale: ‘Miré’ conserva el matiz de visión/aparición del contexto apocalíptico, y ‘he aquí’ reproduce la función de atención de ἰδού sin paráfrasis innecesaria.
- source_word: ὄχλος πολύς
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud inmensa
  - una gran muchedumbre
  lexicon: BDAG
  rationale: ‘Multitud’ es el término más natural y solemne para el registro apocalíptico; ‘gran’ expresa claramente πολύς.
- source_word: ὃν ἀριθμῆσαι ⸀αὐτὸν οὐδεὶς ἐδύνατο
  english_pob_choice: that no one was able to count
  chosen_spanish: que nadie podía contar
  alternatives_spanish:
  - que nadie era capaz de contar
  - que nadie podía numerar
  lexicon: BDAG
  rationale: La formulación española mantiene la imposibilidad humana de contar sin endurecer la sintaxis; ‘podía’ refleja adecuadamente ἐδύνατο.
- source_word: ἐκ παντὸς ἔθνους καὶ φυλῶν καὶ λαῶν καὶ γλωσσῶν
  english_pob_choice: from every nation and tribes and peoples and languages
  chosen_spanish: de toda nación y tribu y pueblos y lenguas
  alternatives_spanish:
  - de toda nación, tribu, pueblo y lengua
  - de toda nación y tribus y pueblos y lenguas
  lexicon: BDAG
  rationale: Se conserva la serie distributiva y la asimetría del griego, con singular ‘nación’ seguido de plurales, evitando homogeneizarla en una frase más lisa pero menos exacta.
- source_word: ἑστῶτες
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - en pie
  lexicon: BDAG
  rationale: ‘De pie’ es una equivalencia natural y clara en español para el estado estático del participio, sin añadir movimiento.
- source_word: ἐνώπιον τοῦ θρόνου καὶ ἐνώπιον τοῦ ἀρνίου
  english_pob_choice: before the throne and before the Lamb
  chosen_spanish: delante del trono y delante del Cordero
  alternatives_spanish:
  - ante el trono y ante el Cordero
  - en presencia del trono y en presencia del Cordero
  lexicon: BDAG
  rationale: ‘Delante de’ conserva la repetición de ἐνώπιον y sugiere adecuadamente la escena solemne; ‘Cordero’ mantiene el título cristológico establecido por el contexto de Apocalipsis.
- source_word: περιβεβλημένους στολὰς λευκάς
  english_pob_choice: clothed in white robes
  chosen_spanish: vestida con túnicas blancas
  alternatives_spanish:
  - vestidos con ropas blancas
  - ataviada con túnicas blancas
  lexicon: BDAG
  rationale: ‘Vestida con túnicas blancas’ transmite el estado de estar cubiertos con vestiduras blancas de manera idiomática en español. Aunque el participio griego es plural, la imagen colectiva de la multitud permite este giro natural; la alternativa más literal sería ‘vestidos con túnicas blancas’.
- source_word: φοίνικες ἐν ταῖς χερσὶν αὐτῶν
  english_pob_choice: with palm branches in their hands
  chosen_spanish: y con palmas en sus manos
  alternatives_spanish:
  - y con ramas de palma en sus manos
  - y con hojas de palma en sus manos
  lexicon: BDAG
  rationale: ‘Palmas’ reproduce el sentido contextual de φοίνικες como ramas de palma y es una solución idiomática en español. La alternativa ‘ramas de palma’ explicita mejor la imagen vegetal.
theological_decisions:
- issue: ἀρνίον como título cristológico
  english_pob_reading: the Lamb
  chosen_spanish_reading: el Cordero
  alternative_spanish_readings:
  - el Cordero pequeño
  - el corderito
  rationale: En Apocalipsis, ἀρνίον funciona como título cristológico fijo; ‘el Cordero’ preserva el peso teológico y la reconocibilidad sin introducir un diminutivo extraño en español.
  doctrine_reference: Apocalipsis; cristología del Cordero
- issue: Conservación de la asimetría étnica de la lista
  english_pob_reading: from every nation and tribe and people and language
  chosen_spanish_reading: de toda nación y tribu y pueblos y lenguas
  alternative_spanish_readings:
  - de toda nación, tribu, pueblo y lengua
  - de todas las naciones, tribus, pueblos y lenguas
  rationale: La lista griega mantiene una tensión entre el singular de ἔθνους y los plurales siguientes. La redacción elegida preserva esa forma y evita borrar la distinción documental que el texto parece subrayar.
  doctrine_reference: Apocalipsis 7:9; nota de correspondencia lexical
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma como guía el audit trail inglés, especialmente la conservación de la secuencia visionaria, la lista étnica discontinua y el título cristológico «the Lamb». Se adoptó un español natural pero sin borrar la tensión distributiva de ἐκ παντὸς ἔθνους καὶ φυλῶν καὶ λαῶν καὶ γλωσσῶν. Se optó por «palmas» como equivalente idiomático de φοίνικες, con una nota que deja visible la alternativa más explícita.
  spanish_consistency_notes:
  - Se usa «Cordero» para ἀρνίον, conforme al título cristológico ya fijado en Apocalipsis.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el tetragrámaton.
  - Se mantiene «delante de» para ἐνώπιον con repetición paralela.
  - La sintaxis de la multitud se conserva en singular colectivo español, aunque el griego emplea un participio plural; la imagen sigue siendo colectiva y coherente en español.
