revisions:
- from: Después de estas cosas miré[a], y he aquí una gran multitud, que nadie podía contar, de toda nación y tribu y pueblos y lenguas, de pie delante del trono y delante del Cordero, vestida con túnicas blancas, y con palmas en sus manos.
  to: Después de estas cosas miré, y he aquí una gran multitud, que nadie podía contar, de toda nación[a] y tribu y pueblos y lenguas, de pie delante del trono y delante del Cordero, vestidos con túnicas blancas, y con ramas de palma en sus manos.
  rationale: Se corrigen una concordancia importante («vestidos»), una precisión léxica («ramas de palma»), y la nota para alinearla con la evidencia y la auditoría inglesa sobre la lista étnica. El resto del verso puede mantenerse.
  reviewer_model: gpt-5.4
