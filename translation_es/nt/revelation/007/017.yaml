  glossary_alignment: 'Alineado con la terminología del proyecto: «Dios», «el Cordero», y el mantenimiento de la imagen pastoral. No hay conflicto con los defaults globales. La decisión de no usar «Cristo» ni otras sustituciones es correcta. El uso de «pastoreará» corresponde bien al énfasis léxico de ποιμανεῖ.'
