translation:
  language: es
  text: porque el Cordero en medio del trono[a] los pastoreará, y los guiará[b] a manantiales del agua de la vida[c]; y Dios enjugará toda lágrima de sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el centro del trono».
    reason: lexical_alternative
  - marker: b
    text: O «los conducirá».
    reason: lexical_alternative
  - marker: c
    text: O «a manantiales de agua viva».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρνίον
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el pequeño cordero
  lexicon: BDAG
  rationale: En Apocalipsis funciona como título cristológico establecido. En español, «el Cordero» conserva la fuerza simbólica y sacrificial sin sonar infantil ni rebajado.
- source_word: ἀνὰ μέσον τοῦ θρόνου
  english_pob_choice: in the midst of the throne
  chosen_spanish: en medio del trono
  alternatives_spanish:
  - en el centro del trono
  - entre el trono
  lexicon: BDAG
  rationale: «En medio de» reproduce la imagen espacial del griego de manera natural en español y mantiene la proximidad al giro elegido por la POB en inglés.
- source_word: ποιμανεῖ
  english_pob_choice: will shepherd
  chosen_spanish: pastoreará
  alternatives_spanish:
  - tenderá
  - guiará como pastor
  - gobernará
  lexicon: BDAG
  rationale: El verbo español «pastorear» conserva el valor literal de ποιμαίνω y preserva el paralelismo deliberado entre el Cordero y la función pastoral, sin convertirlo en una mera idea de gobierno.
- source_word: ὁδηγήσει
  english_pob_choice: he will guide
  chosen_spanish: los guiará
  alternatives_spanish:
  - los conducirá
  - los llevará
  - los conducirá como guía
  lexicon: BDAG
  rationale: «Guiará» expresa bien ὁδηγέω y evita repetir exactamente el matiz de «pastoreará», aunque sigue siendo compatible con la imagen pastoral.
- source_word: ἐπὶ ζωῆς πηγὰς ὑδάτων
  english_pob_choice: to springs of the water of life
  chosen_spanish: a fuentes de agua de vida
  alternatives_spanish:
  - a fuentes de agua viva
  - a fuentes de agua de vida
  - a manantiales de agua de vida
  lexicon: BDAG
  rationale: «Fuentes» traduce πηγάς de forma natural; «agua de vida» refleja que ζωῆς califica al agua, no solo a las fuentes. Se evita una formulación demasiado literal pero poco idiomática en español.
- source_word: ἐξαλείψει
  english_pob_choice: will wipe away
  chosen_spanish: enjugará
  alternatives_spanish:
  - borrará
  - limpiará
  - quitará
  lexicon: BDAG
  rationale: En este contexto consolatorio, «enjugará» reproduce la imagen concreta de quitar las lágrimas del rostro mejor que «borrará», que suena más jurídico o abstracto.
- source_word: πᾶν δάκρυον
  english_pob_choice: every tear
  chosen_spanish: toda lágrima
  alternatives_spanish:
  - cada lágrima
  - todas las lágrimas
  lexicon: BDAG
  rationale: «Toda lágrima» transmite la totalidad del singular neutro πᾶν con naturalidad en español y conserva el énfasis individualizador del original.
- source_word: ἐκ τῶν ὀφθαλμῶν αὐτῶν
  english_pob_choice: from their eyes
  chosen_spanish: de sus ojos
  alternatives_spanish:
  - de sus ojos
  - fuera de sus ojos
  lexicon: BDAG
  rationale: «De sus ojos» es la equivalencia idiomática normal de ἐκ en esta expresión y mantiene la imagen sin forzar el español.
theological_decisions:
- issue: El Cordero como pastor
  english_pob_reading: Retained the literal 'the Lamb ... will shepherd them'
  chosen_spanish_reading: «el Cordero ... los pastoreará»
  alternative_spanish_readings:
  - «el Cordero ... los guiará»
  - «el Cordero ... los cuidará»
  - «el Cordero ... los conducirá»
  rationale: 'Se conserva la paradoja teológica del texto: el Cordero exaltado ejerce una función pastoral. Cambiarlo por un verbo más general suavizaría una tensión intencional del pasaje.'
  doctrine_reference: Affirmations; Cristología apocalíptica de Apocalipsis
- issue: Dios como sujeto explícito del último verbo
  english_pob_reading: Kept 'and God will wipe away every tear from their eyes' as a distinct clause with God as explicit subject
  chosen_spanish_reading: «y Dios enjugará toda lágrima de sus ojos»
  alternative_spanish_readings:
  - «y él enjugará toda lágrima de sus ojos»
  - «y el Cordero enjugará toda lágrima de sus ojos»
  rationale: El griego nombra explícitamente a ὁ θεός como sujeto. Mantenerlo evita fusionar indebidamente al sujeto con el Cordero y respeta la distinción de las cláusulas.
  doctrine_reference: Affirmations (Nicene Creed; Chalcedon)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; se mantuvo la lectura auditada de alta concordancia sin modificaciones sustantivas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí aparece θεός, por lo que corresponde «Dios».
  - Se mantiene «el Cordero» como título cristológico fijo, conforme al uso apocalíptico y a la pauta POB.
  - «Pastoreará» y «guiará» conservan la doble imagen pastoral sin homogeneizarla.
  - Se evita «SEÑOR» como sustituto de θεός o κύριος, porque el griego aquí dice explícitamente «Dios».
