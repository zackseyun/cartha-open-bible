translation:
  language: es
  text: 'Entonces uno de los ancianos respondió[a], diciéndome: «Estos, los que están vestidos con las túnicas blancas, ¿quiénes son y de dónde han venido?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿de dónde vinieron?»
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: BDAG
  rationale: Se usa como conector discursivo de avance en la escena visionaria. «Entonces» conserva la progresión narrativa con naturalidad en español.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «answered», en español «respondió» suena más natural en narrativa y conserva bien el valor de ἀποκρίνομαι sin forzar una pregunta previa explícita.
- source_word: εἷς ἐκ τῶν πρεσβυτέρων
  english_pob_choice: one of the elders
  chosen_spanish: uno de los ancianos
  alternatives_spanish:
  - uno de entre los ancianos
  - uno de los presbíteros
  lexicon: BDAG
  rationale: La construcción partitiva se traduce de forma idiomática y transparente. «Ancianos» es el equivalente natural y auditable de πρεσβύτεροι en este contexto apocalíptico.
- source_word: λέγων μοι
  english_pob_choice: saying to me
  chosen_spanish: diciéndome
  alternatives_spanish:
  - y me dijo
  - mientras me decía
  lexicon: BDAG
  rationale: Mantiene explícita la acción participial y el destinatario del habla, sin recargar el español.
- source_word: οἱ περιβεβλημένοι
  english_pob_choice: who are clothed
  chosen_spanish: los que están vestidos
  alternatives_spanish:
  - los que llevan
  - los que están revestidos
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante; en español, «los que están vestidos» comunica ese estado de manera natural. «Revestidos» sería posible, pero menos directo para la lectura pública.
- source_word: τὰς στολὰς τὰς λευκὰς
  english_pob_choice: the white robes
  chosen_spanish: las túnicas blancas
  alternatives_spanish:
  - las vestiduras blancas
  - los vestidos blancos
  lexicon: BDAG
  rationale: στολή denota una prenda larga/vestidura ceremonial; «túnica» es una opción clara y digna en español, y «blancas» conserva el modificador cromático sin alterar la imagen.
- source_word: τίνες εἰσὶν
  english_pob_choice: who are they
  chosen_spanish: ¿quiénes son?
  alternatives_spanish:
  - ¿quiénes son estos?
  - ¿quiénes son ellos?
  lexicon: BDAG
  rationale: El español permite omitir el pronombre explícito después de la frase demostrativa y mantiene la pregunta de identidad con naturalidad.
- source_word: πόθεν ἦλθον
  english_pob_choice: where have they come from
  chosen_spanish: ¿de dónde han venido?
  alternatives_spanish:
  - ¿de dónde vinieron?
  - ¿de dónde vienen?
  lexicon: BDAG
  rationale: «De dónde» reproduce el valor de πόθεν como origen o procedencia. El presente perfecto («han venido») conserva la relevancia presente de la llegada dentro de la visión, siguiendo la lógica del inglés POB.
theological_decisions:
- issue: Aspecto verbal de ἦλθον en la pregunta final
  english_pob_reading: where have they come from
  chosen_spanish_reading: ¿de dónde han venido?
  alternative_spanish_readings:
  - ¿de dónde vinieron?
  - ¿de dónde vienen?
  rationale: El aoristo griego es formalmente pasado, pero en español el presente perfecto comunica mejor una venida pasada con relevancia para el momento visionario. No implica una decisión doctrinal, sino de equivalencia estilística.
  doctrine_reference: 'Translation philosophy: optimal equivalence; tense-aspect rendering in Spanish narrative/apocalyptic discourse'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto base y con el audit trail inglés: el conector discursivo, la respuesta del anciano, la descripción de las vestiduras blancas y la pregunta sobre identidad y procedencia se conservan sin cambios de sentido. Se mantiene la decisión estilística sobre el aoristo final como presente perfecto en español.'
  spanish_consistency_notes:
  - Se mantiene «ancianos» para πρεσβύτεροι, en coherencia con el registro apocalíptico del libro.
  - Se usa «túnicas blancas» para στολὰς λευκὰς como equivalente natural y digno.
  - Se conserva la puntuación de diálogo con comillas angulares, adecuada para español bíblico moderno.
  - La nota al pie marca la alternativa de tiempo verbal, tal como el audit trail inglés reconoce una opción simple de pasado.
