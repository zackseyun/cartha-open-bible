translation:
  language: es
  text: No tendrán hambre nunca más, ni tendrán sed nunca más; el sol[a] no los herirá, ni ningún calor abrasador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sol ciertamente no los herirá». El griego usa una negación enfática (οὐδὲ μὴ πέσῃ).'
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινάσουσιν
  english_pob_choice: will hunger
  chosen_spanish: tendrán hambre
  alternatives_spanish:
  - hambrear
  - estarán hambrientos
  lexicon: BDAG
  rationale: El verbo griego futuro de πεινάω puede expresarse en español de forma natural con la construcción verbal 'tener hambre'. Conserva la promesa de cesación sin volverla más abstracta de lo que permite el texto.
- source_word: ἔτι
  english_pob_choice: no more / anymore
  chosen_spanish: nunca más
  alternatives_spanish:
  - ya no
  - más
  lexicon: BDAG
  rationale: En este contexto negativo y escatológico, ἔτι indica que la condición cesa desde este punto en adelante. 'Nunca más' comunica bien esa idea en español bíblico contemporáneo.
- source_word: οὐδὲ
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y no
  - ni tampoco
  lexicon: BDAG
  rationale: La coordinación negativa se expresa naturalmente con 'ni' en español, manteniendo el encadenamiento de negaciones del griego.
- source_word: διψήσουσιν
  english_pob_choice: will thirst
  chosen_spanish: tendrán sed
  alternatives_spanish:
  - sed tendrán
  - estarán sedientos
  lexicon: BDAG
  rationale: Como con πεινάσουσιν, el español natural favorece la construcción 'tener sed' para conservar paralelismo y claridad.
- source_word: οὐδὲ μὴ πέσῃ
  english_pob_choice: will not strike them
  chosen_spanish: no los herirá
  alternatives_spanish:
  - no caerá sobre ellos
  - no los golpeará
  lexicon: BDAG
  rationale: La construcción enfática οὐδὲ μή + subjuntivo aoristo comunica una negación muy fuerte. En español, 'no los herirá' traduce de modo idiomático el impacto dañino sobre ellos, sin perder la idea de agresión del sol. Se evita una traducción demasiado literal que sonaría extraña en español.
- source_word: ἐπ’ αὐτοὺς
  english_pob_choice: on them
  chosen_spanish: los
  alternatives_spanish:
  - sobre ellos
  - contra ellos
  lexicon: BDAG
  rationale: El complemento con ἐπί expresa impacto dirigido hacia las personas. En español, el objeto directo con 'herirá' ya incorpora esa relación; por eso no se fuerza una preposición adicional en el texto principal.
- source_word: ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: BDAG
  rationale: Correspondencia directa y natural.
- source_word: πᾶν καῦμα
  english_pob_choice: any scorching heat
  chosen_spanish: ningún calor abrasador
  alternatives_spanish:
  - ningún calor ardiente
  - todo calor abrasador
  lexicon: BDAG
  rationale: καῦμα designa un calor quemante o abrasador, especialmente el del sol. 'Ningún calor abrasador' mantiene el valor totalizante de πᾶν dentro de la negación y suena natural en español.
theological_decisions:
- issue: Promesa literal de alivio en el marco de Apocalipsis 7:16
  english_pob_reading: Retain the concrete imagery of hunger, thirst, sun, and scorching heat as covenant-restoration promise without over-spiritualizing.
  chosen_spanish_reading: Conservar la imagen concreta de hambre, sed, sol y calor abrasador como promesa de restauración y consuelo, sin convertirla en una alegoría puramente espiritual.
  alternative_spanish_readings:
  - Interpretar hambre y sed principalmente como deseos espirituales
  - Suavizar la referencia al sol y al calor como símbolos
  rationale: La sección funciona como consuelo escatológico y eco de Isaías 49:10. El español mantiene la imaginería física para no borrar el alcance literal de la promesa, aunque permita resonancias simbólicas.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa pasó de 'will never fall on them' a 'will not strike them' para reflejar mejor πέσῃ ἐπ’ αὐτούς. En español, 'no los herirá' sigue esa revisión y mantiene la idea de impacto dañino de forma idiomática, sin perder la negación enfática del griego.
  spanish_consistency_notes:
  - Se mantuvo 'nunca más' para ambos miembros negativos a fin de reflejar ἔτι con naturalidad y consistencia.
  - '''Ni'' conserva la cadena de negaciones de οὐδὲ.'
  - '''Calor abrasador'' sostiene el sentido de καῦμα como calor quemante, no solo temperatura alta.'
  - Se evitó 'SEÑOR' u otras convenciones no pertinentes; este versículo no contiene el nombre divino.
