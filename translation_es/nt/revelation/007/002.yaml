review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés en casi todo: ''otro ángel'', movimiento ascendente, ''sello del Dios viviente'', el clamor a los cuatro ángeles y el sentido contextual de ἀδικῆσαι como daño. También preserva correctamente en nota la alternativa más literal para ἀπὸ ἀνατολῆς ἡλίου. La principal desviación está en ''a quienes se les había dado dañar'', que en español suena incompleto y poco natural; el griego expresa una concesión/permiso delegado, y el inglés auditado prefirió no añadir ''power''. En español conviene explicitar la construcción con ''les fue permitido'' para conservar el sentido sin torpeza gramatical.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero contiene dos puntos mejorables: ''del oriente'' es aceptable, aunque ''del este'' o ''del oriente'' ambos funcionan; no requiere cambio. En cambio, ''a quienes se les había dado dañar'' resulta poco idiomático en español e interrumpe la fluidez. Además, la nota ''del nacimiento del sol'' no es la forma literal más natural en español; ''del salir del sol'' refleja mejor la imagen griega y suena más bíblico-natural.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεοῦ se traduce bien como ''Dios''; no aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. ''Dios viviente'' encaja bien. ''Dañar'' para ἀδικῆσαι es adecuado en este contexto apocalíptico.'
  issues:
  - severity: medium
    issue: Construcción española poco natural en 'a quienes se les había dado dañar'
    rationale: Aunque intenta reflejar de cerca el griego, en español esa secuencia suena elíptica e impropia. Una formulación como 'a quienes les fue permitido dañar' transmite la concesión delegada de ἐδόθη sin añadir un objeto inexistente como 'poder'.
  - severity: low
    issue: La nota 'del nacimiento del sol' no es la alternativa literal más natural en español
    rationale: Para ἀπὸ ἀνατολῆς ἡλίου, una nota como 'Literalmente, «del salir del sol»' preserva mejor la imaginería original y evita una expresión española menos idiomática.
  revised_spanish_text: Y vi a otro ángel que subía del oriente[a], que tenía el sello del Dios viviente, y clamó a gran voz a los cuatro ángeles a quienes les fue permitido dañar la tierra y el mar,
  revised_footnotes:
  - marker: a
    text: Literalmente, «del salir del sol».
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final para que el español exprese con naturalidad la idea de permiso/autoridad delegada de ἐδόθη sin añadir 'poder'. También se mejora la nota literal para reflejar de manera más idiomática la imagen griega de 'la salida del sol'.
