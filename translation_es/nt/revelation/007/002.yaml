revisions:
- from: Y vi a otro ángel que subía del oriente[a], que tenía el sello del Dios viviente, y clamó a gran voz a los cuatro ángeles a quienes se les había dado dañar la tierra y el mar,
  to: Y vi a otro ángel que subía del oriente[a], que tenía el sello del Dios viviente, y clamó a gran voz a los cuatro ángeles a quienes les fue permitido dañar la tierra y el mar,
  rationale: Se ajusta la cláusula final para que el español exprese con naturalidad la idea de permiso/autoridad delegada de ἐδόθη sin añadir 'poder'. También se mejora la nota literal para reflejar de manera más idiomática la imagen griega de 'la salida del sol'.
  reviewer_model: gpt-5.4
