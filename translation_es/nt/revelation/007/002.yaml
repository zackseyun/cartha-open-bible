translation:
  language: es
  text: Y vi a otro ángel que subía del oriente[a], que tenía el sello del Dios viviente, y clamó a gran voz a los cuatro ángeles a quienes les fue permitido dañar la tierra y el mar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «del salir del sol».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλον ἄγγελον
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - un ángel más
  - otro mensajero
  lexicon: BDAG
  rationale: ἄλλον indica un ángel נוסף/distinto, no simplemente un cambio de cualidad. 'Otro ángel' es el equivalente natural y fiel en español.
- source_word: ἀναβαίνοντα
  english_pob_choice: coming up
  chosen_spanish: que subía
  alternatives_spanish:
  - ascendiendo
  - que ascendía
  lexicon: BDAG
  rationale: El participio expresa movimiento ascendente en la visión. 'Que subía' conserva la imagen sin sonar forzado en español.
- source_word: ἀπὸ ἀνατολῆς ἡλίου
  english_pob_choice: from the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - del este
  - del nacimiento del sol
  - del salir del sol
  lexicon: BDAG
  rationale: En español bíblico y literario, 'oriente' comunica bien la dirección. La lectura más literal, 'del nacimiento del sol', se preserva en nota por la imagen textual.
- source_word: ἔχοντα σφραγῖδα
  english_pob_choice: having the seal
  chosen_spanish: que tenía el sello
  alternatives_spanish:
  - que llevaba el sello
  - que portaba el sello
  lexicon: BDAG
  rationale: '''Tener el sello'' refleja de manera simple y concreta la posesión del sello, sin añadir función que el griego no explicita aquí.'
- source_word: θεοῦ ζῶντος
  english_pob_choice: of the living God
  chosen_spanish: del Dios viviente
  alternatives_spanish:
  - del Dios vivo
  - de Dios que vive
  lexicon: BDAG
  rationale: '''Dios viviente'' es la expresión bíblica natural en español y preserva la carga teológica de ζώντος.'
- source_word: ἔκραξεν φωνῇ μεγάλῃ
  english_pob_choice: he cried out with a loud voice
  chosen_spanish: clamó a gran voz
  alternatives_spanish:
  - gritó con gran voz
  - exclamó con voz fuerte
  lexicon: BDAG
  rationale: '''Clamó a gran voz'' conserva el registro bíblico y la intensidad de κράζω + φωνῇ μεγάλῃ sin modernizarlo en exceso.'
- source_word: τοῖς τέσσαρσιν ἀγγέλοις
  english_pob_choice: to the four angels
  chosen_spanish: a los cuatro ángeles
  alternatives_spanish:
  - para los cuatro ángeles
  - ante los cuatro ángeles
  lexicon: BDAG
  rationale: 'El dativo se traduce naturalmente como destinatario del clamor: ''a los cuatro ángeles''.'
- source_word: οἷς ἐδόθη αὐτοῖς
  english_pob_choice: to whom it had been given
  chosen_spanish: a quienes se les había dado
  alternatives_spanish:
  - a quienes les había sido dado
  - a quienes se les había permitido
  lexicon: BDAG
  rationale: El pasivo impersonal conserva la delegación de autoridad o permiso sin explicitar más de lo que el texto dice. Se evita añadir 'poder' porque el griego no lo expresa directamente.
- source_word: ἀδικῆσαι
  english_pob_choice: to harm
  chosen_spanish: dañar
  alternatives_spanish:
  - hacer daño a
  - perjudicar
  - lastimar
  lexicon: BDAG
  rationale: En este contexto apocalíptico, ἀδικέω se refiere a causar daño a la creación. 'Dañar' es breve, claro y no moraliza indebidamente el verbo.
- source_word: τὴν γῆν καὶ τὴν θάλασσαν
  english_pob_choice: the earth and the sea
  chosen_spanish: la tierra y el mar
  alternatives_spanish:
  - la tierra y el océano
  - la tierra firme y el mar
  lexicon: BDAG
  rationale: En español, 'tierra' y 'mar' conservan la oposición cosmológica natural y son más idiomáticos que 'tierra' y 'océano'.
theological_decisions:
- issue: Alcance de ἐδόθη en la acción de los cuatro ángeles
  english_pob_reading: to whom it had been given to harm
  chosen_spanish_reading: a quienes se les había dado dañar
  alternative_spanish_readings:
  - a quienes se les había permitido dañar
  - a quienes se les había dado poder para dañar
  rationale: La construcción pasiva mantiene la idea de agencia delegada sin añadir 'poder' como si fuera un objeto explícito del verbo. 'Se les había dado' deja abierta la fuente divina de la autorización, conforme al griego.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza imagística de ἀπὸ ἀνατολῆς ἡλίου
  english_pob_reading: from the east
  chosen_spanish_reading: del oriente
  alternative_spanish_readings:
  - del nacimiento del sol
  - del salir del sol
  rationale: '''Del oriente'' comunica la dirección en español corriente y conserva el tono visionario. La opción más literal se conserva en nota para no perder la imagen de ''salida del sol''.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión auditada del inglés POB, especialmente al evitar añadir ''poder'' a ἐδόθη y al preservar la frase direccional con una traducción idiomática en el texto principal y una nota literal. También se mantiene la misma estructura sintáctica general: visión, participio de movimiento, posesión del sello, clamor y cláusula pasiva de autorización.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo exige explícitamente; aquí no aplica porque θεοῦ ζῶντος se traduce como 'Dios viviente'.
  - Se prefirió 'oriente' para la dirección, consistente con un registro bíblico digno y legible.
  - '''Dañar'' evita sobreinterpretar ἀδικῆσαι como injusticia moral abstracta; el contexto es de perjuicio a la creación.'
  - La puntuación reproduce una sola oración larga con comas, acorde con el griego y con el estilo de Apocalipsis.
