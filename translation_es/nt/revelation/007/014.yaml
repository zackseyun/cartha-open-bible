translation:
  language: es
  text: 'Y le dije: «Señor mío, tú lo sabes». Y él me dijo: «Estos son los que salen de la gran tribulación[a]. Lavaron sus vestiduras y las dejaron blancas en la sangre del Cordero[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la gran aflicción» o «de la gran angustia». El término griego puede denotar presión, aflicción o tribulación.
    reason: lexical_alternative
  - marker: b
    text: La frase «en la sangre del Cordero» se conserva deliberadamente. El griego podría entenderse de modo instrumental («por la sangre»), pero la redacción preserva la imagen paradójica de purificación propia de Apocalipsis.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριέ μου
  english_pob_choice: My lord
  chosen_spanish: Señor mío
  alternatives_spanish:
  - Mi Señor
  - Señor
  lexicon: BDAG
  rationale: El griego expresa una dirección respetuosa a un interlocutor celestial, no necesariamente al Mesías ni a Dios. En español, «Señor mío» conserva la cortesía elevada y la fuerza de κύριος sin fijar de antemano una identificación cristológica que el contexto no exige.
- source_word: σὺ οἶδας
  english_pob_choice: you know
  chosen_spanish: tú lo sabes
  alternatives_spanish:
  - tú sabes
  - tú mismo sabes
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis. «Tú lo sabes» mantiene la deferencia y la naturalidad del español sin sobrecargar el énfasis.
- source_word: οἱ ἐρχόμενοι
  english_pob_choice: the ones coming out
  chosen_spanish: los que vienen
  alternatives_spanish:
  - los que están viniendo
  - los que salen
  lexicon: BDAG
  rationale: El participio presente conserva una acción en curso o característica. «Los que vienen» reproduce mejor esa fuerza aspectual que un simple pasado o una paráfrasis explicativa.
- source_word: ἐκ τῆς θλίψεως τῆς μεγάλης
  english_pob_choice: out of the great tribulation
  chosen_spanish: de la gran tribulación
  alternatives_spanish:
  - de la gran aflicción
  - de la gran angustia
  lexicon: BDAG
  rationale: «Θλῖψις» admite tribulación, aflicción o angustia. Se conserva «tribulación» porque refleja el paralelismo con el audit trail inglés y mantiene la tensión escatológica sin resolverla interpretativamente. El giro español «de la…» funciona naturalmente con este valor de procedencia.
- source_word: στολὰς
  english_pob_choice: robes
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropas
  - túnicas
  lexicon: BDAG
  rationale: Στολή designa una prenda larga o una vestidura distinguida. «Vestiduras» es claro, solemne y suficientemente específico para la imaginería apocalíptica; evita tanto la generalidad de «ropas» como una concreción excesiva.
- source_word: ἔπλυναν
  english_pob_choice: washed
  chosen_spanish: han lavado
  alternatives_spanish:
  - lavaron
  lexicon: BDAG
  rationale: El aoristo narrativo puede expresarse en español con perfecto compuesto o pretérito simple. Aquí el perfecto compuesto mantiene vivacidad en la descripción y se adapta bien al flujo del texto.
- source_word: ἐλεύκαναν
  english_pob_choice: made them white
  chosen_spanish: las han emblanquecido
  alternatives_spanish:
  - las han hecho blancas
  - las blanquearon
  lexicon: BDAG
  rationale: El verbo significa hacer blanco. «Emblanquecer» conserva el valor causativo y la resonancia apocalíptica mejor que una formulación más plana. Se evita añadir un matiz interpretativo no contenido en el griego.
- source_word: ἐν τῷ αἵματι
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - por la sangre
  - con la sangre
  lexicon: BDAG
  rationale: Se conserva «en» para mantener la imagen paradójica del texto y seguir de cerca el griego. Aunque «por» podría sonar instrumentalmente más natural en español, atenuaría la fuerza visual de la construcción.
- source_word: τοῦ ἀρνίου
  english_pob_choice: of the Lamb
  chosen_spanish: del Cordero
  alternatives_spanish:
  - del cordero
  lexicon: BDAG
  rationale: En Apocalipsis, ἀρνίον funciona como título cristológico. «Cordero» con mayúscula respeta ese uso titular en español y mantiene la coherencia interna del libro.
theological_decisions:
- issue: Alcance de θλῖψις μεγάλη
  english_pob_reading: the great tribulation
  chosen_spanish_reading: la gran tribulación
  alternative_spanish_readings:
  - la gran aflicción
  - la gran angustia
  rationale: Se conserva el término tradicionalmente reconocido sin convertirlo en una interpretación doctrinal cerrada. Así se mantiene abierta la posibilidad de una referencia escatológica específica o de una descripción general del sufrimiento, conforme a la cautela del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Valor de κύριε μου en la escena
  english_pob_reading: My lord
  chosen_spanish_reading: Señor mío
  alternative_spanish_readings:
  - Mi Señor
  - Señor
  rationale: La forma española debe ser reverente pero no debe forzar una lectura que identifique automáticamente al interlocutor con Dios o con Cristo. «Señor mío» conserva la cortesía del diálogo celestial y el respeto por la referencia contextual.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord), with per-verse contextual variance documented'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el auditable del POB inglés y coincide con la revisión más reciente, que no requirió cambios. Se preservan las dos tensiones documentadas: el valor contextual de κύριε μου en una dirección respetuosa y la ambigüedad interpretativa de θλῖψις μεγάλη. No se introducen ajustes textuales adicionales respecto del pasaje fuente.'
  spanish_consistency_notes:
  - Se mantiene «Cordero» con mayúscula como título cristológico coherente con Apocalipsis.
  - Se evita «SEÑOR» como máscara reverencial automática; aquí la dirección a un interlocutor celestial se expresa como «Señor mío».
  - Se conserva la metáfora de «lavar» y «emblanquecer» sin explicitar el sentido simbólico más allá de lo que el griego permite.
  - La formulación «en la sangre» respeta la imagen del texto y la decisión auditada del inglés POB.
