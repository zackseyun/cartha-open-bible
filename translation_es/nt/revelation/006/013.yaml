translation:
  language: es
  text: y las estrellas del cielo cayeron a la tierra, como una higuera deja caer sus higos inmaduros[a] cuando es sacudida por un fuerte viento,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «higos verdes», «higos de invierno» o «higos tardíos»; el término griego se refiere a higos inmaduros que caen antes de madurar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀστέρες
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - astros
  - cuerpos celestes
  lexicon: BDAG
  rationale: La imagen lexical ordinaria es "estrellas". En español mantiene el mismo valor imagístico y apocalíptico sin interpretar su referente simbólico.
- source_word: τοῦ οὐρανοῦ
  english_pob_choice: of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo celestial
  - de los cielos
  lexicon: BDAG
  rationale: '"οὐρανός" puede significar "cielo" o "cielo/heaven". En español "del cielo" comunica el registro cósmico con naturalidad; "de los cielos" suena más solemne pero menos directo.'
- source_word: ἔπεσαν εἰς τὴν γῆν
  english_pob_choice: fell to the earth
  chosen_spanish: cayeron a la tierra
  alternatives_spanish:
  - cayeron sobre la tierra
  - cayeron a la tierra
  lexicon: BDAG
  rationale: '"Cayeron a la tierra" conserva el movimiento direccional de εἰς sin endurecer la frase. "Tierra" preserva el valor cósmico/terrenal de γῆ.'
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - igual que
  lexicon: BDAG
  rationale: Introduce la comparación en forma natural en español. "Como" mantiene la relación de símil sin añadir interpretación.
- source_word: συκῆ
  english_pob_choice: a fig tree
  chosen_spanish: una higuera
  alternatives_spanish:
  - un árbol de higos
  lexicon: BDAG
  rationale: El sustantivo estándar es "higuera"; es la forma más natural y precisa en español.
- source_word: βάλλει
  english_pob_choice: drops
  chosen_spanish: arroja
  alternatives_spanish:
  - deja caer
  - suelta
  - lanza
  lexicon: BDAG
  rationale: Aunque βάλλω literalmente es "arrojar/lanzar", aquí el sujeto es un árbol que deja caer frutos. "Arroja" conserva la fuerza verbal del griego mejor que un equivalente más débil, y en español sigue siendo idiomático en esta imagen poética.
- source_word: ὀλύνθους
  english_pob_choice: unripe figs
  chosen_spanish: higos verdes
  alternatives_spanish:
  - higos inmaduros
  - higos sin madurar
  - higos tempranos
  lexicon: BDAG
  rationale: El término alude a higos inmaduros desprendidos antes de madurar. "Higos verdes" es una alternativa natural y pública en español, aunque mantiene cierta amplitud semántica frente a "inmaduros"; por eso se preserva la nota de alternativa léxica.
- source_word: ὑπὸ ἀνέμου μεγάλου
  english_pob_choice: by a strong wind
  chosen_spanish: por un fuerte viento
  alternatives_spanish:
  - por un gran viento
  - por viento fuerte
  lexicon: BDAG
  rationale: '"Fuerte viento" comunica el impacto de μέγας con naturalidad en español moderno. "Gran viento" sería más literal pero menos idiomático.'
- source_word: σειομένη
  english_pob_choice: when shaken
  chosen_spanish: cuando es sacudida
  alternatives_spanish:
  - al ser sacudida
  - mientras es sacudida
  lexicon: BDAG
  rationale: El participio pasivo presente se vierte naturalmente con "cuando es sacudida", expresando la circunstancia de la caída de los frutos sin añadir contenido ajeno.
theological_decisions:
- issue: Las estrellas que caen en lenguaje apocalíptico
  english_pob_reading: Retain the literal lexical image 'stars of heaven fell to the earth' without interpretive qualification.
  chosen_spanish_reading: 'Mantener la imagen literal: "las estrellas del cielo cayeron a la tierra" sin aclarar en el texto si son astros literales, seres simbólicos o poderes celestes.'
  alternative_spanish_readings:
  - interpretar las estrellas como seres angélicos
  - explicitar que son símbolos de gobernantes o poderes
  rationale: El género apocalíptico permite una carga simbólica, pero el texto no resuelve aquí esa cuestión. La traducción debe preservar la tensión interpretativa y no decidirla en la línea principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de revisión es de alta concordancia y no hay ajustes pendientes.
  spanish_consistency_notes:
  - Se mantiene "cielo" para οὐρανός y "tierra" para γῆ, conservando el contraste cósmico del texto griego.
  - '"Arroja" preserva la energía de βάλλει sin sonar mecánico en español.'
  - La nota al pie acompaña la ambigüedad léxica de ὀλύνθους sin cargar el texto principal con explicaciones.
  - El final con coma refleja que el verso continúa en la sección siguiente, como en el original.
