revisions:
- from: y las estrellas del cielo cayeron a la tierra[a], como una higuera arroja sus higos verdes cuando es sacudida por un fuerte viento,
  to: y las estrellas del cielo cayeron a la tierra, como una higuera deja caer sus higos inmaduros[a] cuando es sacudida por un fuerte viento,
  rationale: Se revisa para reflejar con mayor precisión ὀλύνθους mediante «higos inmaduros» en el texto principal, conforme a la decisión léxica documentada en la auditoría inglesa, y para usar «deja caer» como giro más natural en español para la acción de una higuera sobre su fruto. Se elimina la nota en «tierra» porque la alternativa léxica documentada corresponde a los higos, no a γῆ. La nota se reancla correctamente en «higos inmaduros[a]».
