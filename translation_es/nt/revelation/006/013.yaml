    issue: «higos verdes» como texto principal para ὀλύνθους
    rationale: La auditoría inglesa eligió «unripe figs» como equivalente principal. «Verdes» es posible, pero en español puede enfatizar color o sonar más coloquial; «inmaduros» refleja más directamente la idea de fruto no maduro desprendido antes de tiempo.
  - severity: low
    issue: «arroja» para βάλλει con una higuera
    rationale: Aunque literalmente βάλλω puede ser «arrojar», en este contexto de fruto que cae de un árbol, «deja caer» o «suelta» resulta más natural en español sin perder fuerza semántica. «Arroja» suena algo forzado para el sujeto «higuera».
  revised_spanish_text: y las estrellas del cielo cayeron a la tierra, como una higuera deja caer sus higos inmaduros[a] cuando es sacudida por un fuerte viento,
  revised_footnotes:
