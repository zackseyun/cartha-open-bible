translation:
  language: es
  text: Y salió otro caballo rojo como fuego[a]; y al que estaba sentado sobre él se le dio quitar la paz de la tierra[b], para que se degollaran unos a otros[c], y se le dio una gran espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caballo rojo». El adjetivo griego πυρρός sugiere más propiamente un rojo de aspecto ígneo, de ahí «rojo como fuego».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra». El griego γῆ puede significar «tierra» o «país/territorio»; aquí el contexto apocalíptico favorece el alcance más amplio.
    reason: lexical_alternative
  - marker: c
    text: El verbo aquí es más fuerte que un simple «matar» y comunica derramamiento violento de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - otro más
  - uno distinto
  lexicon: BDAG
  rationale: ἄλλος marca continuidad secuencial y distinción respecto del caballo anterior; «otro» es el equivalente natural y fiel en español.
- source_word: ἵππος πυρρός
  english_pob_choice: horse, fiery red
  chosen_spanish: caballo rojo como fuego
  alternatives_spanish:
  - caballo rojo
  - caballo de color fuego
  lexicon: BDAG
  rationale: πυρρός describe un rojo de apariencia ígnea; «rojo como fuego» conserva la imagen viva y evita aplanar el matiz de color.
- source_word: τῷ καθημένῳ ἐπ’ αὐτὸν
  english_pob_choice: the one sitting on it
  chosen_spanish: al que estaba sentado sobre él
  alternatives_spanish:
  - al jinete
  - al que iba montado en él
  lexicon: BDAG
  rationale: La construcción participial se vierte de forma directa, sin sustituirla por una interpretación más libre como «jinete», aunque ese sentido está implícito.
- source_word: ἐδόθη αὐτῷ
  english_pob_choice: it was given to him
  chosen_spanish: se le dio
  alternatives_spanish:
  - le fue dado
  - se le concedió
  lexicon: BDAG
  rationale: El pasivo conserva el estilo de pasivo divino de Apocalipsis y evita especificar un agente no expresado en el texto.
- source_word: λαβεῖν τὴν εἰρήνην ἐκ τῆς γῆς
  english_pob_choice: to take peace from the earth
  chosen_spanish: tomar la paz de la tierra
  alternatives_spanish:
  - quitar la paz de la tierra
  - retirar la paz de la tierra
  lexicon: BDAG
  rationale: λαμβάνειν con εἰρήνην expresa quitar o tomar lejos; «tomar la paz de la tierra» sigue de cerca el griego y «tierra» mantiene el alcance amplio de γῆ en el contexto apocalíptico.
- source_word: ἵνα ἀλλήλους σφάξουσιν
  english_pob_choice: so that they would slaughter one another
  chosen_spanish: para que se mataran unos a otros
  alternatives_spanish:
  - para que se degollaran unos a otros
  - para que se sacrificaran unos a otros
  lexicon: BDAG
  rationale: σφάζω implica muerte violenta y derramamiento de sangre; en español, «se mataran unos a otros» comunica el resultado con naturalidad, y la nota preserva la fuerza de «slaughter».
- source_word: μάχαιρα μεγάλη
  english_pob_choice: a great sword
  chosen_spanish: una gran espada
  alternatives_spanish:
  - una espada grande
  - una espada terrible
  lexicon: BDAG
  rationale: μάχαιρα puede ser espada o cuchillo grande; en imaginería apocalíptica «espada» es la equivalencia más clara, y «gran» conserva μεγάλη sin sobreinterpretar.
theological_decisions:
- issue: Pasivos repetidos ἐδόθη
  english_pob_reading: Retain passive wording ('it was given to him') without naming God explicitly
  chosen_spanish_reading: Mantener la voz pasiva impersonal («se le dio») sin nombrar a Dios explícitamente
  alternative_spanish_readings:
  - Dios le dio
  - le fue concedido
  rationale: Apocalipsis usa con frecuencia el pasivo divino para insinuar la soberanía de Dios sin explicitar el agente. La forma impersonal en español preserva esa tensión teológica y el tono literario.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y coincide con el pasaje auditado en inglés; no se registran revisiones posteriores que alteren decisiones léxicas o teológicas.
  spanish_consistency_notes:
  - Se mantiene «tierra» para γῆ por coherencia con el contexto apocalíptico amplio del libro.
  - Se conserva el pasivo impersonal en ambas ocurrencias de ἐδόθη para respetar el pasivo divino.
  - «Espada» se usa para μάχαιρα por claridad en español bíblico, sin forzar una precisión léxica innecesaria.
