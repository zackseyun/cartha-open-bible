source:
  edition: SBLGNT
  text: καὶ ἐξῆλθεν ἄλλος ἵππος πυρρός, καὶ τῷ καθημένῳ ἐπ’ αὐτὸν ἐδόθη αὐτῷ λαβεῖν τὴν εἰρήνην ἐκ τῆς γῆς ⸀καὶ ἵνα ἀλλήλους ⸀σφάξουσιν, καὶ ἐδόθη αὐτῷ μάχαιρα μεγάλη.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/004.yaml
  text: And another horse came out[a], fiery red; and to the one sitting on it, it was given to take peace from the earth, so that they would slaughter one another[c][b], and a great sword was given to him.
  footnotes:
  - marker: a
    text: Or 'red horse.' The Greek adjective πυρρός more specifically suggests a fire-like red, hence 'fiery red.'
    reason: lexical_alternative
  - marker: b
    text: Or 'land' instead of 'earth'; the Greek γῆ can mean either, but here the broader sense fits Revelation's global-apocalyptic context.
    reason: lexical_alternative
  - marker: c
    text: The verb translated 'slaughter' is stronger than a generic word for 'kill' and conveys violent bloodshed.
    reason: lexical_alternative
  ai_draft:
