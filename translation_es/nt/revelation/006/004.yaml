revisions:
- from: Y salió otro caballo, [a]rojo como fuego; y al que estaba sentado sobre él se le dio tomar la paz de la tierra, para que se mataran unos a otros [c][b], y se le dio una gran espada.
  to: Y salió otro caballo rojo como fuego[a]; y al que estaba sentado sobre él se le dio quitar la paz de la tierra[b], para que se degollaran unos a otros[c], y se le dio una gran espada.
  rationale: Se corrige la colocación del marcador de nota para una lectura natural, se cambia «tomar» por «quitar» para expresar adecuadamente λαβεῖν...ἐκ en español, y se fortalece «se mataran» a «se degollaran» para reflejar mejor σφάζω y el razonamiento léxico documentado en el audit trail inglés.
