  text: καὶ ἔκραξαν φωνῇ μεγάλῃ λέγοντες· Ἕως πότε, ὁ δεσπότης ὁ ἅγιος καὶ ἀληθινός, οὐ κρίνεις καὶ ἐκδικεῖς τὸ αἷμα ἡμῶν ἐκ τῶν κατοικούντων ἐπὶ τῆς γῆς;
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/010.yaml
  text: And they cried out with a loud voice[a], saying, “How long, Master, holy and true[b], will you refrain from judging and avenging our blood on those who dwell on the earth?”
  footnotes:
  - marker: a
    text: Or “Sovereign Lord.” The Greek title here is despotes, emphasizing absolute authority; it is distinct from kyrios (“Lord”).
    reason: lexical_alternative
  - marker: b
    text: Or “against those who dwell on the earth.” The phrase can express the object of the avenging action; Revelation frequently uses “those who dwell on the earth” as a thematic designation.
    reason: alternative_reading
