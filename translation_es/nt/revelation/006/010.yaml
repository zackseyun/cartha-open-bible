revisions:
- from: 'Y clamaron con gran voz[a], diciendo: «¿Hasta cuándo, oh Dueño[santo y verdadero], no juzgas y vengas nuestra sangre[b] de los que habitan sobre la tierra?»'
  to: 'Y clamaron a gran voz[a], diciendo: «¿Hasta cuándo, oh Soberano, santo y verdadero, seguirás sin juzgar ni vengar nuestra sangre de[b] los que habitan sobre la tierra?»'
  rationale: Se revisa «Dueño» a «Soberano» para preservar mejor δεσπότης en un español reverente y natural, sin colapsarlo en «Señor». Se corrige la sintaxis de la pregunta para reflejar la demora implícita en οὐ κρίνεις καὶ ἐκδικεῖς («seguirás sin juzgar ni vengar»), se elimina el error de corchetes en el vocativo, se mejora la naturalidad de φωνῇ μεγάλῃ con «a gran voz», y se reubica la nota b en la frase final pertinente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: clamor intenso, súplica de demora («¿Hasta cuándo?»), atributos divinos («santo y verdadero») y petición de juicio/retribución por la sangre de los mártires. Sin embargo, no preserva con suficiente fidelidad dos puntos clave del expediente POB: (1) δεσπότης queda como «Dueño», que en español suena poco natural y puede rebajar el registro reverente; «Soberano» refleja mejor la autoridad absoluta sin confundirlo con κύριος. (2) οὐ κρίνεις καὶ ἐκδικεῖς en este contexto de lamento por demora está mejor expresado en español como «seguirás sin juzgar ni vengar» o equivalente, no simplemente «no juzgas y vengas», que suena más a presente descriptivo que a reclamo por tardanza. Además, la puntuación/anchoreo de «[santo y verdadero]» es incorrecta en español y no corresponde a un sistema válido de notas.'
  spanish_quality_summary: 'El texto es legible, pero tiene varios tropiezos de naturalidad y formato: «con gran voz» es comprensible pero menos idiomático que «a gran voz» o «con voz fuerte»; «oh Dueño[santo y verdadero]» presenta un error evidente de marcación; y «vengas nuestra sangre de...» no es la construcción más natural en español moderno. La revisión propuesta mantiene dignidad bíblica, claridad y mejor sintaxis española.'
  glossary_alignment: 'No hay conflicto con términos globales como Yahvé/Mesías. Sí hay un asunto terminológico local importante: δεσπότης debe mantenerse distinto de κύριος, pero «Dueño» no es la mejor solución española de registro eclesial; «Soberano» conserva mejor la distinción documentada por la auditoría inglesa. La fuerza de ἐκδικεῖς debe seguir siendo retributiva («vengar»), no suavizarse a «vindicar».'
  issues:
  - severity: high
    issue: Renderización de δεσπότης como «Dueño»
    rationale: Aunque intenta preservar la distinción frente a κύριος, «Dueño» aplicado a Dios suena poco natural y puede resultar chocante o rebajar el tono reverente. «Soberano» transmite mejor autoridad absoluta en español sin añadir «Señor».
  - severity: high
    issue: Expresión insuficiente de la demora en οὐ κρίνεις καὶ ἐκδικεῖς
    rationale: El expediente inglés ya documentó que la forma presente funciona como reclamo por acción demorada. «No juzgas y vengas» suena demasiado literal y poco idiomático; «seguirás sin juzgar ni vengar» o similar comunica mejor el sentido.
  - severity: medium
    issue: Error de formato en «oh Dueño[santo y verdadero]»
    rationale: 'La inserción entre corchetes no corresponde a ninguna nota válida ni a puntuación española aceptable. Debe integrarse como vocativo normal: «oh Soberano, santo y verdadero».'
  - severity: medium
    issue: «con gran voz» es menos natural en español actual
    rationale: No es incorrecto, pero «a gran voz» o «con voz fuerte» fluye mejor en español bíblico contemporáneo y conserva la imagen concreta.
  - severity: low
    issue: La nota b en inglés está asociada a la frase final, no a «nuestra sangre»
    rationale: El marcador debe anclarse donde corresponde semánticamente para evitar confusión del lector.
  revised_spanish_text: 'Y clamaron a gran voz[a], diciendo: «¿Hasta cuándo, oh Soberano, santo y verdadero, seguirás sin juzgar ni vengar nuestra sangre de[b] los que habitan sobre la tierra?»'
  revised_footnotes:
