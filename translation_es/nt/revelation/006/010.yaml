translation:
  language: es
  text: 'Y clamaron a gran voz[a], diciendo: «¿Hasta cuándo, oh Soberano, santo y verdadero, seguirás sin juzgar ni vengar nuestra sangre de[b] los que habitan sobre la tierra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con voz fuerte» o «en alta voz». La expresión griega es un modismo de manera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «contra los que habitan sobre la tierra». El griego puede expresar el objeto del acto de venganza; Apocalipsis usa esta frase como designación temática de los impíos.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔκραξαν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - exclamaron
  lexicon: BDAG
  rationale: ἔκραξαν expresa un clamor fuerte y urgente. «Clamaron» conserva la intensidad del verbo sin sonar artificial en español bíblico contemporáneo.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz
  alternatives_spanish:
  - en alta voz
  - con voz potente
  lexicon: BDAG
  rationale: La construcción dativa funciona como modo. «Con gran voz» preserva la imagen concreta y es una equivalencia natural y reverente en español.
- source_word: Ἕως πότε
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Cuándo?
  lexicon: BDAG
  rationale: Es la fórmula idiomática normal para una súplica por retraso de la acción divina. «¿Hasta cuándo?» mantiene tanto el tono de lamento como la brevedad del griego.
- source_word: δεσπότης
  english_pob_choice: Master
  chosen_spanish: Dueño
  alternatives_spanish:
  - Soberano Señor
  - Señor
  lexicon: BDAG
  rationale: δεσπότης enfatiza posesión y autoridad absoluta de manera más fuerte que κύριος. «Dueño» refleja ese peso léxico mejor que «Señor», aunque suena menos litúrgico; se mantiene la diferencia terminológica documentada por la POB inglesa. La forma se presenta en vocativo implícito dentro de la cita.
- source_word: ἅγιος
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: BDAG
  rationale: «Santo» es la correspondencia directa y usual para el atributo moral y cultual de Dios.
- source_word: ἀληθινός
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - fiel
  - auténtico
  lexicon: BDAG
  rationale: «Verdadero» conserva la idea de confiabilidad y genuinidad divina. En español suena más natural que una traducción más explicativa.
- source_word: οὐ κρίνεις καὶ ἐκδικεῖς
  english_pob_choice: will you refrain from judging and avenging
  chosen_spanish: no juzgas y vengas
  alternatives_spanish:
  - no dejas de juzgar y vengar
  - no juzgas ni vindicas
  lexicon: BDAG
  rationale: El griego usa presente interrogativo con fuerza de reclamo por demora. En español, la pregunta retórica se expresa de forma más natural con «no juzgas y vengas», manteniendo el contenido judicial-retributivo sin suavizarlo a «vindicar».
- source_word: τὸ αἷμα ἡμῶν
  english_pob_choice: our blood
  chosen_spanish: nuestra sangre
  alternatives_spanish:
  - nuestro sangre derramada
  - nuestra sangre derramada
  lexicon: BDAG
  rationale: Se conserva el idiomático «sangre» como metonimia de muerte violenta y martirio. «Nuestra sangre» es más fiel y bíblica que explicitar «sangre derramada».
- source_word: ἐκ τῶν κατοικούντων ἐπὶ τῆς γῆς
  english_pob_choice: on those who dwell on the earth
  chosen_spanish: de los que habitan sobre la tierra
  alternatives_spanish:
  - contra los que habitan sobre la tierra
  - de entre los que habitan sobre la tierra
  lexicon: BDAG
  rationale: La frase apocalíptica recurrente se conserva con la fórmula «los que habitan sobre la tierra». El genitivo con ἐκ permite en español una relación de procedencia o referente del juicio; aquí se deja abierta la ambigüedad que la POB inglesa anotó.
theological_decisions:
- issue: Título divino δεσπότης y su distinción de κύριος
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Soberano Señor
  - Señor
  rationale: El texto usa δεσπότης, no κύριος. Traducirlo como «Dueño» conserva la diferencia léxica y el énfasis en autoridad absoluta, conforme a la práctica de primacía del original. «Soberano Señor» introduce material ausente («Señor») y «Señor» borra la distinción.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve lexical distinctions; original-language primacy over tradition.'
- issue: Fuerza retributiva de la petición martirial
  english_pob_reading: judge and avenge our blood
  chosen_spanish_reading: no juzgas y vengas nuestra sangre
  alternative_spanish_readings:
  - no dejas de juzgar y vengar nuestra sangre
  - no juzgas ni vindicas nuestra sangre
  rationale: La petición es explícitamente de juicio y retribución por derramamiento de sangre. Se mantiene esa tensión teológica sin convertirla en una mera vindicación abstracta ni suavizar la venganza en un sentido moralmente distinto al del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; do not import softer doctrine than the text warrants.'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste de la POB inglesa al expresar el reclamo como una pregunta de demora: en español se reproduce con una interrogación retórica natural («no juzgas y vengas») en vez de una construcción más analítica. Se mantiene la distinción de δεσπότης frente a κύριος y la ambigüedad del sintagma final con ἐκ, tal como documenta el aparato auditado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general POB para יהוה, pero este versículo no contiene el Tetragrámaton.
  - Se conserva «Dueño» para δεσπότης por distinción léxica con «Señor».
  - «Santo y verdadero» se deja como epíteto divino unido por concordancia masculina singular implícita en el vocativo.
  - La frase apocalíptica «los que habitan sobre la tierra» se preserva para consistencia temática dentro de Apocalipsis.
