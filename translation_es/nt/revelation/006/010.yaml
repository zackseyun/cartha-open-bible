    text: 'O: «con voz fuerte» o «en alta voz». La expresión griega es un modismo de manera.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «contra los que habitan sobre la tierra». El griego puede expresar el objeto del acto de venganza; Apocalipsis usa esta frase como designación temática de los impíos.'
    reason: alternative_reading
  revision_rationale: Se revisa «Dueño» a «Soberano» para preservar mejor δεσπότης en un español reverente y natural, sin colapsarlo en «Señor». Se corrige la sintaxis de la pregunta para reflejar la demora implícita en οὐ κρίνεις καὶ ἐκδικεῖς («seguirás sin juzgar ni vengar»), se elimina el error de corchetes en el vocativo, se mejora la naturalidad de φωνῇ μεγάλῃ con «a gran voz», y se reubica la nota b en la frase final pertinente.
