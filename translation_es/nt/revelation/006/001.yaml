translation:
  language: es
  text: 'Y vi cuando el Cordero abrió uno de los siete sellos[a], y oí a uno de los cuatro seres vivientes decir con una voz como de trueno: «Ven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sal», si se entiende que el mandato va dirigido al jinete y no a Juan.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρνίον
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el corderito
  - el pequeño cordero
  lexicon: BDAG
  rationale: En Apocalipsis, ἀρνίον funciona como título cristológico. «Cordero» es la forma natural y reconocible en español para ese título; el diminutivo quedaría forzado y podría introducir una tonalidad no buscada por el texto.
- source_word: μίαν ἐκ τῶν ἑπτὰ σφραγίδων
  english_pob_choice: one of the seven seals
  chosen_spanish: uno de los siete sellos
  alternatives_spanish:
  - uno entre los siete sellos
  - uno de entre los siete sellos
  lexicon: BDAG
  rationale: Es una construcción partitiva idiomática. «Uno de los siete sellos» conserva con claridad que se abre un sello dentro del conjunto de siete, sin sobrecargar el español.
- source_word: ζῴων
  english_pob_choice: living creatures
  chosen_spanish: criaturas vivientes
  alternatives_spanish:
  - seres vivientes
  - seres vivientes del trono
  lexicon: BDAG
  rationale: En Apocalipsis, ζῷον no alude a animales ordinarios. «Criaturas vivientes» comunica bien la categoría visionaria y evita el malentendido zoológico.
- source_word: ὡς φωνῇ βροντῆς
  english_pob_choice: with a voice like thunder
  chosen_spanish: con una voz como de trueno
  alternatives_spanish:
  - con voz como de trueno
  - con una voz de trueno
  lexicon: BDAG
  rationale: La frase expresa una comparación sonora. «Como de trueno» mantiene el símil y suena natural en español; evita endurecer la imagen en una formulación demasiado literal.
- source_word: Ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Sal
  - Ve
  lexicon: BDAG
  rationale: El imperativo de ἔρχομαι se traduce de manera más directa por «Ven». En español preserva la apertura interpretativa del mandato sin decidir en el texto principal si está dirigido al jinete o a Juan.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al
  - mientras
  lexicon: BDAG
  rationale: 'Introduce el marco temporal de la visión: Juan ve cuando el Cordero abre el sello.'
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - yo vi
  - miré y vi
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa de forma directa con «vi», que es natural en español y no añade un verbo que el griego no exige.
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  lexicon: BDAG
  rationale: «Oí» reproduce el aoristo narrativo con sencillez y ritmo adecuado en la secuencia visionaria.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: que decía
  alternatives_spanish:
  - diciendo
  - hablando
  lexicon: BDAG
  rationale: En español, «que decía» fluye mejor con el sujeto precedido por «oí» y evita una gerundización pesada. Conserva el valor participial sin ampliar el contenido.
theological_decisions:
- issue: Alcance del mandato Ἔρχου
  english_pob_reading: Render the command as 'Come' without specifying the addressee in the main text.
  chosen_spanish_reading: «Ven» sin identificar en el texto principal al destinatario del mandato.
  alternative_spanish_readings:
  - «Sal» si se entiende dirigido al jinete
  - «Ve» si se interpreta como orden de salida
  rationale: El griego no especifica de manera explícita el destinatario. Mantener «Ven» conserva la ambigüedad textual y evita resolver en la traducción una tensión interpretativa que el original deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado más reciente del inglés POB: no hay cambios aplicados y el acuerdo de revisión es alto. La versión española mantiene la misma apertura interpretativa del mandato final y sigue el mismo análisis léxico de ἀρνίον, σφραγίδες, ζῷα y ἔρχου.'
  spanish_consistency_notes:
  - Se conserva «Cordero» como título cristológico coherente con el uso apocalíptico.
  - «Criaturas vivientes» mantiene la terminología estable para ζῷα en Apocalipsis.
  - Se evita «SEÑOR» o sustitutos similares, ya que el texto aquí no contiene el nombre divino.
  - La puntuación con dos puntos antes de la cita final ayuda a marcar el cambio de habla sin añadir contenido interpretativo.
