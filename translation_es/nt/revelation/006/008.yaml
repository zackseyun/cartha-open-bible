translation:
  language: es
  text: Y vi, y he aquí, un caballo pálido[a], y el nombre del que estaba sentado sobre él era Muerte, y el Hades lo seguía. Y se les dio autoridad sobre la cuarta parte de la tierra[b], para matar con espada y con hambruna y con pestilencia y por las bestias salvajes de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un caballo pálido verdoso». El griego χλωρός puede denotar un color verdoso o una palidez enfermiza; aquí se traduce de forma natural como «pálido».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con muerte». Aquí «pestilencia» refleja el sentido idiomático de θανάτῳ en un contexto de lista de juicios, especialmente en eco de Ezequiel 14.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵππος χλωρός
  english_pob_choice: a pale horse
  chosen_spanish: un caballo pálido
  alternatives_spanish:
  - un caballo pálido verdoso
  - un caballo amarillento
  - un caballo lívido
  lexicon: BDAG
  rationale: χλωρός puede denotar un color pálido, verdoso o enfermizo. En español, «pálido» comunica la impresión principal en el contexto apocalíptico con naturalidad. Se evita «verdoso» porque suena más descriptivo que idiomático aquí, aunque la nota conserva la alternativa lexical.
- source_word: ὁ καθήμενος ἐπάνω αὐτοῦ
  english_pob_choice: the one seated on it
  chosen_spanish: el que estaba sentado sobre él
  alternatives_spanish:
  - el que montaba sobre él
  - su jinete
  lexicon: BDAG
  rationale: La construcción participial se vierte de forma transparente. «Estaba sentado sobre él» conserva la imagen sin añadir «jinete», que sería más interpretativo que el griego.
- source_word: ὄνομα αὐτῷ ὁ Θάνατος
  english_pob_choice: the name of the one seated on it was Death
  chosen_spanish: el nombre del que estaba sentado sobre él era Muerte
  alternatives_spanish:
  - su nombre era Muerte
  - se llamaba Muerte
  lexicon: BDAG
  rationale: Se mantiene la fórmula nominal explícita del griego. «Muerte» se capitaliza para reflejar la personificación, como en la evidencia inglesa.
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: el Hades
  alternatives_spanish:
  - el Seol
  - la muerte y la tumba
  - el reino de los muertos
  lexicon: BDAG
  rationale: Se conserva el término transliterado «Hades» para no confundirlo con el juicio final ni con «infierno». El artículo español lo integra naturalmente como referente personificado/nominal.
- source_word: ἠκολούθει μετ’ αὐτοῦ
  english_pob_choice: was following with him
  chosen_spanish: lo seguía con él
  alternatives_spanish:
  - lo seguía detrás de él
  - iba tras él
  lexicon: BDAG
  rationale: «Seguir con él» preserva el matiz de acompañamiento del μετά con genitivo, y el pronombre directo «lo» se refiere al jinete implícito en español de manera fluida.
- source_word: ἐδόθη αὐτοῖς ἐξουσία
  english_pob_choice: authority was given to them
  chosen_spanish: se les dio autoridad
  alternatives_spanish:
  - les fue dada autoridad
  - se les concedió autoridad
  lexicon: BDAG
  rationale: Se mantiene la pasiva divina de la frase. «Autoridad» traduce ἐξουσία con su fuerza de derecho/jurisdicción delegada, más precisa que «poder».
- source_word: ἐπὶ τὸ τέταρτον τῆς γῆς
  english_pob_choice: over a fourth of the earth
  chosen_spanish: sobre la cuarta parte de la tierra
  alternatives_spanish:
  - sobre un cuarto de la tierra
  - sobre la cuarta parte del mundo
  lexicon: BDAG
  rationale: «Cuarta parte» reproduce con claridad τέταρτον. «Tierra» mantiene el alcance amplio/cósmico del pasaje, en línea con la lectura inglesa.
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill
  chosen_spanish: para matar
  alternatives_spanish:
  - para dar muerte
  - para matar a
  lexicon: BDAG
  rationale: El infinitivo se vuelve natural en español con «para matar», manteniendo la finalidad del pasaje sin sobretraducir.
- source_word: ἐν ῥομφαίᾳ
  english_pob_choice: with sword
  chosen_spanish: con espada
  alternatives_spanish:
  - por la espada
  - con un sable
  lexicon: BDAG
  rationale: ῥομφαία se traduce de manera directa y corriente como «espada». El singular sin artículo en español conserva el valor instrumental del griego.
- source_word: ἐν λιμῷ
  english_pob_choice: with famine
  chosen_spanish: con hambre
  alternatives_spanish:
  - con hambre extrema
  - con hambruna
  lexicon: BDAG
  rationale: Aunque λιμός puede significar «hambre» o «hambruna», aquí la serie de medios de muerte permite una lectura de escasez severa. Se elige «hambre» para mantener la cadencia breve y la amplitud semántica, sin perder el sentido de juicio.
- source_word: ἐν θανάτῳ
  english_pob_choice: with pestilence
  chosen_spanish: con pestilencia
  alternatives_spanish:
  - con muerte
  - con peste
  lexicon: BDAG, LXX usage
  rationale: Se sigue la lectura contextual de la lista de juicios, donde θανάτῳ puede funcionar idiomáticamente como «pestilencia» o «plaga». «Pestilencia» refleja bien el tono bíblico y evita la extrañeza de «matar con muerte».
- source_word: ὑπὸ τῶν θηρίων τῆς γῆς
  english_pob_choice: by the wild beasts of the earth
  chosen_spanish: por las bestias salvajes de la tierra
  alternatives_spanish:
  - por las fieras de la tierra
  - por los animales salvajes de la tierra
  lexicon: BDAG
  rationale: θηρία son bestias salvajes, no la bestia apocalíptica posterior. «Bestias salvajes» preserva esa distinción y es fiel al contexto de castigo/jucio.
theological_decisions:
- issue: Rendered nature of ᾅδης
  english_pob_reading: Hades as the realm of the dead, distinct from final hell
  chosen_spanish_reading: Hades como realidad distinta del infierno final
  alternative_spanish_readings:
  - el infierno
  - el sepulcro
  - el reino de los muertos
  rationale: La traducción conserva «Hades» para mantener la distinción conceptual que el texto hace entre Muerte y el ámbito que lo sigue. «Infierno» introduciría asociaciones doctrinales posteriores no garantizadas por el pasaje.
  doctrine_reference: Translation philosophy §1, §3
- issue: Idiomatic force of ἐν θανάτῳ in a judgment list
  english_pob_reading: pestilence, with literal 'death' preserved in a footnote
  chosen_spanish_reading: pestilencia
  alternative_spanish_readings:
  - muerte
  - plaga
  rationale: La elección sigue la lógica de la lista de juicios y su trasfondo veterotestamentario. «Pestilencia» comunica mejor el sentido idiomático y evita una formulación poco natural en español.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La evidencia inglesa pasó de «pale green horse» a «pale horse» en la revisión más reciente para una traducción más natural de χλωρός. La versión española sigue esa revisión y mantiene el resto del versículo con la misma distinción entre Muerte y Hades, así como la lectura idiomática de θανάτῳ como «pestilencia».
  spanish_consistency_notes:
  - Se usa «Yahvé» como default general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «Hades» transliterado para no mezclarlo con «infierno» o «sepulcro».
  - Se mantiene «Muerte» con mayúscula por la personificación del jinete.
  - «Bestias salvajes» distingue θηρία de la figura apocalíptica de la Bestia.
  - La puntuación reproduce la cadencia coordinada del griego sin recargar el español.
