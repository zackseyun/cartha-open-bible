revisions:
- from: 'Y cuando abrió el tercer sello[a], oí al tercer ser viviente que decía: «Ven». Y miré, y vi un caballo negro[b], y el que estaba sentado sobre él tenía una balanza en su mano.'
  to: 'Y cuando abrió el tercer sello[a], oí al tercer ser viviente que decía: «Ven». Y miré, y he aquí, un caballo negro[b], y el que estaba sentado sobre él tenía una balanza en su mano.'
  rationale: Se reemplazó «y vi» por «y he aquí» para reflejar explícitamente ἰδοὺ y mantener la viveza apocalíptica del original sin volver el español antinatural. También se corrigió la nota b para que presente una alternativa léxica real y coherente con el texto principal.
