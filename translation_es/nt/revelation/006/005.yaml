    text: 'También puede entenderse: «Ven aquí». La orden puede dirigirse a Juan o ser una convocatoria del caballo y su jinete.'
    reason: alternative_reading
  - marker: b
    text: 'O: «unas balanzas». La palabra griega puede denotar un instrumento de pesar; en este contexto probablemente se refiere a balanzas usadas para medir alimentos.'
    reason: lexical_alternative
