translation:
  language: es
  text: 'Y cuando abrió el tercer sello[a], oí al tercer ser viviente que decía: «Ven». Y miré, y he aquí, un caballo negro[b], y el que estaba sentado sobre él tenía una balanza en su mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Ven aquí». La orden puede dirigirse a Juan o ser una convocatoria del caballo y su jinete.'
    reason: alternative_reading
  - marker: b
    text: 'O: «unas balanzas». La palabra griega puede denotar un instrumento de pesar; en este contexto probablemente se refiere a balanzas usadas para medir alimentos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξε
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - descorrió
  - abrió de par en par
  lexicon: BDAG
  rationale: ἀνοίγω se rinde de forma natural como «abrió» en español; conserva la acción directa sobre el sello sin añadir matices no presentes.
- source_word: σφραγῖδα τὴν τρίτην
  english_pob_choice: the third seal
  chosen_spanish: el tercer sello
  alternatives_spanish:
  - la tercera señal sellada
  - el sello tercero
  lexicon: BDAG
  rationale: Mantiene la secuencia de los sellos con un sintagma claro y natural en español.
- source_word: ζῴου
  english_pob_choice: living creature
  chosen_spanish: ser viviente
  alternatives_spanish:
  - criatura viviente
  - ser vivo
  lexicon: BDAG
  rationale: En Apocalipsis, ζῷον designa a los seres celestiales del trono; «ser viviente» preserva la referencia técnica y evita la impresión de un animal ordinario.
- source_word: Ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  - Acércate
  lexicon: BDAG
  rationale: La orden breve e imperativa se expresa naturalmente como «Ven». En español, añadir «aquí» resolvería la ambigüedad del destinatario, que el griego deja abierta.
- source_word: εἶδον
  english_pob_choice: I looked
  chosen_spanish: miré
  alternatives_spanish:
  - vi
  - contemplé
  lexicon: BDAG
  rationale: «Miré» conserva el movimiento visionario y evita la repetición inmediata con «vi» al introducir ἰδού, sin forzar el sentido.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: y vi
  alternatives_spanish:
  - y he aquí
  - y he aquí que
  lexicon: BDAG
  rationale: En español, «y vi» permite integrar la fuerza deictica de ἰδού en una construcción natural; la función visual ya está reforzada por el contexto visionario. La nota preserva la alternativa equivalente si se desea un registro más marcado.
- source_word: ἵππος μέλας
  english_pob_choice: a black horse
  chosen_spanish: un caballo negro
  alternatives_spanish:
  - un caballo de color negro
  - un corcel negro
  lexicon: BDAG
  rationale: Adjetivo directo y fiel; mantiene el color simbólico sin embellecimiento interpretativo.
- source_word: ὁ καθήμενος ἐπ’ αὐτὸν
  english_pob_choice: the one sitting on it
  chosen_spanish: el que estaba sentado sobre él
  alternatives_spanish:
  - el que lo montaba
  - el jinete
  lexicon: BDAG
  rationale: Sigue de cerca el participio griego y evita el sustantivo «jinete», que sería una interpretación más específica de la escena.
- source_word: ζυγὸν
  english_pob_choice: a pair of scales
  chosen_spanish: una balanza
  alternatives_spanish:
  - unas balanzas
  - una pareja de balanzas
  - un yugo
  lexicon: BDAG
  rationale: ζυγός puede significar «balanza» o «balanzas» en el contexto de pesar/medir; en español, «una balanza» comunica con claridad el instrumento y deja abierta la lectura de medición que el contexto sugiere.
- source_word: ἐν τῇ χειρὶ αὐτοῦ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano de él
  lexicon: BDAG
  rationale: Equivalente directo y idiomático del complemento preposicional, sin añadir precisión innecesaria.
theological_decisions:
- issue: Destinatario de la orden Ἔρχου
  english_pob_reading: Rendered simply as 'Come' without specifying the addressee.
  chosen_spanish_reading: «Ven» sin especificar si se dirige a Juan o al caballo y su jinete.
  alternative_spanish_readings:
  - «Ven aquí» dirigido a Juan
  - «Ven» como convocatoria del caballo y su jinete
  rationale: El griego conserva la ambigüedad del destinatario. La traducción mantiene esa tensión en vez de resolverla interpretativamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del auditor inglés al reflejar más de cerca la frase participial griega en ὁ καθήμενος ἐπ’ αὐτὸν: «el que estaba sentado sobre él», en lugar de una forma más compacta como «jinete». También conserva la ambigüedad del imperativo Ἔρχου, tal como se documenta en el aparato inglés.'
  spanish_consistency_notes:
  - Se usó «ser viviente» para ζῷον, consistente con el valor técnico en Apocalipsis.
  - Se evitó «Cristo» y terminología eclesiástica no presente en el versículo.
  - «Balanza» se eligió por claridad contextual; la nota conserva la alternativa lexical marcada en el audit trail inglés.
  - El texto mantiene un registro formal pero natural para lectura pública en español.
