  text: Καὶ ὅτε ἤνοιξε τὴν σφραγῖδα τὴν τρίτην, ἤκουσα τοῦ τρίτου ζῴου λέγοντος· Ἔρχου. καὶ ⸀εἶδον, καὶ ἰδοὺ ἵππος μέλας, καὶ ὁ καθήμενος ἐπ’ αὐτὸν ἔχων ζυγὸν ἐν τῇ χειρὶ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/005.yaml
  text: And when he opened the third seal[a], I heard the third living creature saying, “Come.” And I looked, and behold, a black horse[b], and the one sitting on it had a pair of scales in his hand.
  footnotes:
  - marker: a
    text: Or, 'Come here.' The command may be understood either as addressed to John or as summoning the horse and its rider.
    reason: alternative_reading
  - marker: b
    text: Or, 'a balance.' The Greek word can denote weighing scales; in this context it likely refers to scales used for measuring out food.
    reason: lexical_alternative
