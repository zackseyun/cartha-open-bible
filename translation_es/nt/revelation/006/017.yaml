    reason: alternative_reading
  revision_rationale: 'Se revisa ''su ira'' a ''la ira de ambos'' para hacer explícito en español el plural de αὐτῶν sin caer en la torpeza de ''de ellos''. Esto preserva mejor la decisión exegética central del registro: la ira compartida del que está sentado en el trono y del Cordero. La nota se ajusta en consecuencia para señalar la alternativa interpretativa singular/ambigua.'
