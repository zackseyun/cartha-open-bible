review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal, el perfecto español para ἦλθεν, y el tono solemne del juicio. Sin embargo, no preserva de manera suficientemente visible la decisión fuente clave sobre αὐτῶν: el griego dice plural (''de ellos'' / ''their''), y el POB inglés decidió conservar esa tensión en el texto principal, no solo en nota. El uso de ''su ira'' neutraliza esa distinción en español.'
  spanish_quality_summary: 'El español es claro y natural. ''Porque ha llegado el gran día...'' y ''¿quién puede mantenerse en pie?'' son idiomáticos y dignos. La única debilidad importante es léxico-sintáctica y teológica: ''su ira'' suena fluido, pero borra el plural compartido entre el que está sentado en el trono y el Cordero. ''De la ira de ellos'' suena algo rígido; una solución más natural y fiel es ''de la ira de ambos''.'
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. 'Ira' corresponde bien a ὀργή. La revisión propuesta alinea mejor la decisión teológica documentada de conservar el plural de αὐτῶν en el texto principal.
  issues:
  - severity: high
    issue: El texto principal no conserva el plural explícito de αὐτῶν.
    rationale: El griego dice 'de ellos' y la auditoría inglesa insiste en preservar 'their wrath' en el cuerpo del texto. 'Su ira' en español es ambigua y puede leerse como singular, resolviendo la tensión que debía conservarse.
  - severity: low
    issue: La nota al pie presenta como alternativa lo que en realidad debería ser la lectura principal.
    rationale: Si el texto principal ya expresa el plural, la nota puede explicar la alternativa interpretativa singular, siguiendo más de cerca la lógica del POB inglés.
