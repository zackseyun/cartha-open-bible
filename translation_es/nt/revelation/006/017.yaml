translation:
  language: es
  text: porque ha llegado el gran día de la ira de ambos[a], y ¿quién puede mantenerse en pie?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su ira» en algunas traducciones interpretativas; el griego dice «de ellos», en referencia al que está sentado en el trono y al Cordero juntos.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la reacción descrita en el versículo anterior. «Porque» es la conjunción causal más natural y clara en español aquí.
- source_word: ἦλθεν
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - vino
  - ha venido
  lexicon: BDAG
  rationale: El aoristo se entiende como un hecho ya realizado con efecto presente. «Ha llegado» comunica bien esa culminación en español sin sonar forzado.
- source_word: ἡ ἡμέρα ἡ μεγάλη
  english_pob_choice: the great day
  chosen_spanish: el gran día
  alternatives_spanish:
  - el día grande
  - el día, el grande
  lexicon: BDAG
  rationale: La construcción atributiva se vierte de manera natural como «el gran día», conservando la solemnidad escatológica del original.
- source_word: τῆς ὀργῆς
  english_pob_choice: of ... wrath
  chosen_spanish: de su ira
  alternatives_spanish:
  - de la ira
  - de la cólera
  lexicon: BDAG
  rationale: «Ira» expresa mejor que «cólera» el sentido judicial y escatológico de ὀργή en este contexto. Mantengo el posesivo por la referencia plural del griego; en español, «de su ira» preserva esa relación sin explicar indebidamente el referente en el cuerpo del texto.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ellos/ellas
  lexicon: BDAG
  rationale: El griego es plural («de ellos»), pero español requiere una solución fluida. «Su» conserva la referencia posesiva sin resolver en el texto principal la tensión teológica del plural aplicado a quien está sentado en el trono y al Cordero.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién?
  alternatives_spanish:
  - ¿quién, pues?
  - ¿quién será capaz?
  lexicon: BDAG
  rationale: Interrogativo retórico directo; «¿quién?» es el equivalente natural y solemne en español.
- source_word: δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: En español, «puede» comunica capacidad de manera idiomática y breve. «Es capaz de» sería más explícito, pero menos elegante aquí.
- source_word: σταθῆναι
  english_pob_choice: to stand
  chosen_spanish: mantenerse en pie
  alternatives_spanish:
  - estar en pie
  - permanecer en pie
  - resistir
  lexicon: BDAG
  rationale: En este contexto de juicio, el infinitivo no es solo «estar de pie», sino permanecer firmes ante la ira divina. «Mantenerse en pie» conserva la imagen y el sentido implícito de resistencia sin sobreexplicar.
theological_decisions:
- issue: Plural possessivo en «la ira» referido al que está sentado en el trono y al Cordero
  english_pob_reading: Retain the plural expression 'their wrath'
  chosen_spanish_reading: Conservar la referencia posesiva sin armonizarla a singular en el texto principal
  alternative_spanish_readings:
  - «su ira» como forma fluida que deja abierta la referencia
  - «la ira de ellos» para hacer visible el plural
  rationale: El griego tiene αὐτῶν («de ellos»), y el POB inglés decidió no resolver la tensión teológica. En español, «su ira» mantiene la fluidez y la referencia plural queda disponible por el contexto inmediato; no se reemplaza por una forma singular doctrinalmente armonizada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el estado más reciente indica que no hubo cambios necesarios y el control cruzado reporta alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no aparece explícitamente.
  - Se mantiene «ira» para ὀργή por su fuerza judicial y escatológica.
  - «Mantenerse en pie» conserva la imagen apocalíptica sin añadir interpretación doctrinal ajena al versículo.
