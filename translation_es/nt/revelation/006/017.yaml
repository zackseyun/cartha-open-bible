- from: porque ha llegado el gran día de su ira[a], y ¿quién puede mantenerse en pie?
  to: porque ha llegado el gran día de la ira de ambos[a], y ¿quién puede mantenerse en pie?
  rationale: 'Se revisa ''su ira'' a ''la ira de ambos'' para hacer explícito en español el plural de αὐτῶν sin caer en la torpeza de ''de ellos''. Esto preserva mejor la decisión exegética central del registro: la ira compartida del que está sentado en el trono y del Cordero. La nota se ajusta en consecuencia para señalar la alternativa interpretativa singular/ambigua.'
  reviewer_model: gpt-5.4
