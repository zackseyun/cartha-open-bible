  text: Καὶ ὅτε ἤνοιξεν τὴν πέμπτην σφραγῖδα, εἶδον ὑποκάτω τοῦ θυσιαστηρίου τὰς ψυχὰς τῶν ἐσφαγμένων διὰ τὸν λόγον τοῦ θεοῦ καὶ διὰ τὴν ⸀μαρτυρίαν ἣν εἶχον.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/009.yaml
  text: And when he opened the fifth seal[b][a], I saw under the altar the souls of those who had been slaughtered because of the word of God and because of the testimony they had.
  footnotes:
  - marker: a
    text: Or 'had been slain.' The Greek verb can be rendered more traditionally this way, but 'slaughtered' better preserves its stronger, sacrificial force.
    reason: lexical_alternative
  - marker: b
    text: Or 'witness.' The Greek term may denote either testimony borne or witness given.
    reason: lexical_alternative
