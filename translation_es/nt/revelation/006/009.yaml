translation:
  language: es
  text: Y cuando abrió el quinto sello, vi debajo del altar las almas de los que habían sido inmolados[a] por la palabra de Dios y por el testimonio[b] que tenían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «degollados». El verbo griego también puede traducirse de forma más tradicional como «muertos» o «muertos violentamente», pero «inmolados» preserva mejor su fuerza sacrificial en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «testigo». El término griego puede denotar tanto el testimonio dado como el acto de dar testimonio; aquí «testimonio» funciona mejor en esta construcción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξεν
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - rompió
  - desplegó
  lexicon: ἀνοίγω
  rationale: «Abrió» es la equivalencia directa y natural para la apertura de los sellos en la secuencia apocalíptica. Mantiene el paralelismo recurrente del pasaje sin añadir fuerza interpretativa innecesaria.
- source_word: σφραγῖδα
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - precinto
  lexicon: σφραγίς
  rationale: «Sello» es el término español normal para σφραγίς y conserva la imaginería apocalíptica y judicial del texto.
- source_word: ὑποκάτω
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: ὑποκάτω
  rationale: «Debajo de» expresa de manera clara y idiomática la relación espacial del griego sin sonar forzado en español.
- source_word: θυσιαστηρίου
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: θυσιαστήριον
  rationale: «Altar» conserva el sentido cultual básico y deja abierta la referencia exacta, como hace el griego en la escena visionaria.
- source_word: ψυχὰς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: ψυχή
  rationale: «Almas» reproduce el valor tradicional y visionario de ψυχή aquí, donde se trata de los muertos vistos en la visión. «Vidas» o «personas» suavizarían o nivelarían la imagen.
- source_word: ἐσφαγμένων
  english_pob_choice: had been slaughtered
  chosen_spanish: habían sido degollados
  alternatives_spanish:
  - habían sido inmolados
  - habían sido matados
  lexicon: σφάζω
  rationale: σφάζω tiene un sentido fuerte de degollar/degüello y puede conservar resonancias sacrificiales. «Degollados» preserva esa fuerza más que «matados», y evita la pérdida del matiz violento y cultual.
- source_word: διὰ τὸν λόγον τοῦ θεοῦ
  english_pob_choice: because of the word of God
  chosen_spanish: por la palabra de Dios
  alternatives_spanish:
  - a causa de la palabra de Dios
  - por causa de la palabra de Dios
  lexicon: λόγος
  rationale: Aquí διὰ con acusativo expresa causa; en español, «por» comunica esa relación causal de forma natural. «Palabra de Dios» sigue el valor establecido de λόγος en este contexto.
- source_word: μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio dado
  - testimonio prestado
  - testigo
  lexicon: μαρτυρία
  rationale: «Testimonio» conserva el sentido jurídico-confesional de μαρτυρία y funciona bien con el relativo siguiente. «Testigo» desplazaría el foco a la persona, no a lo que se posee o mantiene.
- source_word: ἣν εἶχον
  english_pob_choice: they had
  chosen_spanish: que tenían
  alternatives_spanish:
  - que poseían
  - que mantenían
  lexicon: ἔχω
  rationale: «Que tenían» refleja el imperfecto de ἔχω de modo simple y no sobreinterpreta el alcance de la relación con el testimonio. Mantiene la continuidad narrativa y la ambigüedad útil del griego.
theological_decisions:
- issue: Fuerza sacrificial y violenta de ἐσφαγμένων
  english_pob_reading: Use 'had been slaughtered' rather than a softer term.
  chosen_spanish_reading: Usar «habían sido degollados» en vez de una forma más suave.
  alternative_spanish_readings:
  - habían sido inmolados
  - habían sido matados
  rationale: La escena del altar intensifica el carácter sacrificial del martirio. «Degollados» preserva mejor la fuerza de σφάζω y el vínculo con la imaginería cultual, evitando diluir el impacto del texto.
  doctrine_reference: Prioridad del texto original y su imaginería; conservar la tensión martirial-sacrificial.
- issue: Naturaleza de ψυχὰς en la visión
  english_pob_reading: Render ψυχὰς as 'souls' in the main text.
  chosen_spanish_reading: Renderizar ψυχὰς como «almas».
  alternative_spanish_readings:
  - vidas
  - personas
  rationale: En la visión, Juan ve a los muertos martirizados como «almas» bajo el altar. Esta elección preserva la especificidad visionaria sin convertirla en una afirmación antropológica más amplia de lo que el texto exige.
  doctrine_reference: Preservar la tensión teológica en la escena visionaria.
translation_notes:
  revision_awareness: El cotejo de revisión indica alto acuerdo con el texto fuente y la auditoría inglesa; no se documentaron revisiones aplicadas. Esta redacción sigue de cerca el griego y conserva las decisiones léxicas relevantes, especialmente la fuerza de σφάζω y el valor visionario de ψυχή y μαρτυρία.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «palabra de Dios» para λόγος τοῦ θεοῦ.
  - Se traduce el aoristo narrativo con pretérito perfecto simple («abrió», «vi»), y el pluscuamperfecto implícito/participial con «habían sido degollados».
  - Se conserva el orden natural del español sin perder los vínculos causales del griego («por la palabra... y por el testimonio...»).
  - Los marcadores de nota se colocan solo donde hay alternativa léxica real en el texto principal.
