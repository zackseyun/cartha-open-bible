review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: apertura del quinto sello, visión debajo del altar, las almas de los martirizados, y la doble causalidad por la palabra de Dios y por su testimonio. También preserva correctamente «almas» para ψυχὰς y mantiene la imaginería cultual de «altar». Sin embargo, hay dos desajustes menores pero significativos con el expediente auditado: (1) la nota [b] introduce erróneamente el inglés «witness» en vez de una alternativa española; (2) «degollados» es defendible para σφάζω, pero en español puede sonar demasiado específico al modo de ejecución. «Inmolados» o «habían sido inmolados» preserva mejor la resonancia sacrificial señalada por el POB, mientras la nota puede retener «degollados» como alternativa más gráfica.'
  spanish_quality_summary: 'El texto es claro, natural y digno en español eclesial contemporáneo. «Debajo del altar», «las almas», y «por la palabra de Dios» son idiomáticos. La principal mejora es estilístico-lexical: «habían sido inmolados» encaja mejor con el campo semántico de altar/sacrificio en español bíblico sin forzar un método concreto de muerte. Además, la nota [b] debe corregirse para legibilidad y coherencia monolingüe.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεοῦ = «Dios», ψυχὰς = «almas», μαρτυρίαν = «testimonio». No aparecen términos sensibles como Yahvé/Mesías/esclavo. La revisión propuesta mejora la alineación con la decisión teológico-lexical inglesa sobre la fuerza sacrificial de ἐσφαγμένων.'
  issues:
  - severity: medium
    issue: La nota al pie [b] contiene la alternativa inglesa «witness».
    rationale: Las notas deben estar en español y servir al lector hispanohablante. Mantener un término inglés aquí rompe la calidad editorial y no cumple la función de alternativa léxica española.
  - severity: medium
    issue: «Degollados» puede sobredeterminar ἐσφαγμένων como método concreto de muerte.
    rationale: Aunque σφάζω puede incluir la idea de degollar, el expediente inglés enfatiza sobre todo la fuerza de «slaughtered» y su matiz sacrificial. En español, «inmolados» conserva mejor esa resonancia junto a «altar», sin reducir el sentido a un solo modo de ejecución.
  revised_spanish_text: Y cuando abrió el quinto sello, vi debajo del altar las almas de los que habían sido inmolados[a] por la palabra de Dios y por el testimonio[b] que tenían.
