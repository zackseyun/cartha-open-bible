    reason: lexical_alternative
  - marker: b
    text: O «testigo». El término griego puede denotar tanto el testimonio dado como el acto de dar testimonio; aquí «testimonio» funciona mejor en esta construcción.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que use alternativas españolas y se ajusta ἐσφαγμένων a «inmolados», que en español bíblico comunica mejor la fuerza sacrificial destacada en el expediente inglés y armoniza con la imagen del altar. El resto del versículo puede mantenerse.
