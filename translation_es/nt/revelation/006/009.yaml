revisions:
- from: Y cuando abrió el quinto sello, vi debajo del altar las almas de los que habían sido degollados[a] por la palabra de Dios y por el testimonio[b] que tenían.
  to: Y cuando abrió el quinto sello, vi debajo del altar las almas de los que habían sido inmolados[a] por la palabra de Dios y por el testimonio[b] que tenían.
