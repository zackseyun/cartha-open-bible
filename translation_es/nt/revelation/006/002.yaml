review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del griego: visión introductoria, aparición del caballo blanco, el ocupante con arco, la concesión de una corona y la salida en conquista. Sin embargo, las notas están desalineadas con el rastro auditado en inglés: la nota [a] se ancla a «vi» pero en inglés la nota relevante documenta la alternativa «miré» para εἶδον, mientras que la nota sobre la identidad no especificada del jinete falta por completo. Además, «estaba sentado» es comprensible pero algo más estático/pasado que el participio presente; «estaba sentado» no es incorrecto, aunque «estaba sentado»/«sentado» sigue siendo aceptable. El cambio principal necesario es restaurar la nota teológica sobre la identidad no especificada del jinete y evitar usar la misma nota para otro asunto.'
  spanish_quality_summary: El español es claro, digno y legible. «Y he aquí» funciona bien en Apocalipsis. «Le fue dada una corona» es fiel pero algo menos natural que «se le dio una corona»; ambas son válidas. «Venciendo y para vencer» suena algo calcado pero todavía inteligible; puede mantenerse por cercanía al griego o suavizarse a «conquistando y para conquistar» si se quisiera enfatizar el matiz imperial, pero no es necesario. La principal mejora de calidad es corregir el sistema de notas y hacer que el texto y las notas correspondan exactamente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, etc. «Corona» para στέφανος concuerda con la política del POB, preservando en nota la alternativa de victoria. La no identificación del jinete también se alinea con la decisión teológica documentada.
  issues:
  - severity: high
    issue: Falta la nota sobre la identidad no especificada del jinete
    rationale: El English POB preserva explícitamente que el texto no identifica al jinete y que las interpretaciones varían. Esa decisión teológica/auditada no debe perderse en español.
  - severity: high
    issue: La nota [a] del borrador español no corresponde al anclaje ni a la función de las notas del audit trail
    rationale: En el texto inglés, una nota documenta στέφανος y otra la identidad del jinete; en español se sustituyó una de ellas por una nota sobre «vi / miré», alterando el registro de evidencia y dejando fuera una nota significativa.
  - severity: medium
    issue: Los marcadores de nota deben corresponder exactamente con las notas revisadas
    rationale: Si se conserva una nota lexical sobre «corona», el otro marcador debe anclarse donde corresponda a la nota de identidad, no a «vi».
  revised_spanish_text: Y vi, y he aquí un caballo blanco, y el que estaba sentado sobre él tenía un arco, y se le dio una corona[a], y salió venciendo[b] y para vencer.
  revised_footnotes:
  - marker: a
    text: O «una corona de victoria»; el griego στέφανος suele referirse a una corona o guirnalda asociada con la victoria más que a un diadema real.
    reason: lexical_alternative
  - marker: b
    text: La identidad del que iba sentado sobre el caballo no se indica en el texto. Las interpretaciones varían ampliamente.
    reason: alternative_reading
  revision_rationale: Se eliminó la nota sobre «vi/miré» porque no forma parte de las notas preservadas en el audit trail inglés para este versículo, y se restauró la nota importante sobre la identidad no especificada del jinete. También se reubicaron los marcadores para que coincidan exactamente con las notas revisadas. Se mantuvo el texto base con un ajuste menor a «se le dio una corona» por naturalidad en español, sin alterar el sentido.
