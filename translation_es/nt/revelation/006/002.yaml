translation:
  language: es
  text: Y vi, y he aquí un caballo blanco, y el que estaba sentado sobre él tenía un arco, y se le dio una corona[a], y salió venciendo[b] y para vencer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una corona de victoria»; el griego στέφανος suele referirse a una corona o guirnalda asociada con la victoria más que a un diadema real.
    reason: lexical_alternative
  - marker: b
    text: La identidad del que iba sentado sobre el caballo no se indica en el texto. Las interpretaciones varían ampliamente.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I looked
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - observé
  lexicon: BDAG
  rationale: En una escena visionaria, «vi» comunica de forma natural la percepción del vidente y conserva la secuencia narrativa breve del griego, sin forzar una paráfrasis.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: BDAG
  rationale: «Y he aquí» mantiene la fuerza de irrupción y atención propia de ἰδοὺ en un contexto apocalíptico, con un registro digno y comprensible en español.
- source_word: ἵππος λευκός
  english_pob_choice: a white horse
  chosen_spanish: un caballo blanco
  alternatives_spanish:
  - caballo blanco
  lexicon: BDAG
  rationale: Se conserva el sustantivo concreto y el adjetivo de color sin añadir identificación interpretativa. En español es natural el indefinido, como en el griego sin artículo.
- source_word: ὁ καθήμενος ἐπ’ αὐτὸν
  english_pob_choice: the one sitting on it
  chosen_spanish: el que estaba sentado sobre él
  alternatives_spanish:
  - el que se sentaba sobre él
  - su jinete
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo transparente y natural en español. Se evita «jinete» porque introduce una inferencia no explicitada en el texto, aunque sea posible por contexto.
- source_word: ἔχων τόξον
  english_pob_choice: had a bow
  chosen_spanish: tenía un arco
  alternatives_spanish:
  - llevaba un arco
  - tenía un arco en la mano
  lexicon: BDAG
  rationale: «Tenía un arco» traduce con sobriedad el participio presente y conserva la ambigüedad entre poseer y llevar sin añadir detalle no documentado.
- source_word: ἐδόθη αὐτῷ στέφανος
  english_pob_choice: a crown was given to him
  chosen_spanish: le fue dada una corona
  alternatives_spanish:
  - se le dio una corona
  - le fue dada una corona de victoria
  lexicon: BDAG
  rationale: Se mantiene la pasiva divina/impersonal y la imagen de concesión. «Corona» es el equivalente natural de στέφανος en español; se evita especificar «de victoria» en el texto principal para no resolver una tensión que el griego deja abierta.
- source_word: ἐξῆλθεν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: «Salió» es breve y fiel al movimiento expresado por ἐξῆλθεν, además de funcionar bien con el tono visionario del pasaje.
- source_word: νικῶν
  english_pob_choice: conquering
  chosen_spanish: venciendo
  alternatives_spanish:
  - conquistando
  - vencedor
  lexicon: BDAG
  rationale: «Venciendo» preserva el aspecto progresivo del participio presente y suena más natural en español que una forma demasiado militarizada, aunque el campo semántico de conquista permanece activo.
- source_word: ἵνα νικήσῃ
  english_pob_choice: to conquer
  chosen_spanish: para vencer
  alternatives_spanish:
  - para conquistar
  - a fin de vencer
  lexicon: BDAG
  rationale: Se conserva la finalidad expresada por ἵνα + subjuntivo. «Vencer» mantiene el enlace con νικῶν y evita sobreinterpretar la escena con un término demasiado técnico o bélico.
theological_decisions:
- issue: Identidad del jinete del caballo blanco
  english_pob_reading: The translation leaves the rider's identity unspecified.
  chosen_spanish_reading: La traducción deja sin identificar al que está sentado sobre el caballo.
  alternative_spanish_readings:
  - Se identifica implícitamente con Cristo.
  - Se presenta como un conquistador ambiguo o engañoso.
  rationale: El texto griego describe la visión y la acción, pero no nombra al personaje. Mantener la no identificación preserva la tensión interpretativa documentada por el POB en inglés y evita introducir una lectura doctrinal en la redacción.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió «to conquer» en la cláusula final por naturalidad; por eso se escogió «para vencer» en español, que conserva la finalidad de ἵνα νικήσῃ sin sonar forzado. También se respetó la nota inglesa sobre la posible lectura de στέφανος como corona de victoria, dejándola como alternativa y no como glosa incorporada al texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton ni κύριος en sentido de nombre divino.
  - Se evitó «Cristo» porque el texto no identifica al jinete y no requiere terminología mesiánica.
  - Se preservó «corona» para στέφανος, con alternativa anotada de «corona de victoria».
  - Se conservó la estructura en serie con polisíndeton para reflejar el ritmo del griego apocalíptico.
