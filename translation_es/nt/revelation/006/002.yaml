base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/002.yaml
  text: And I looked[a], and behold, a white horse, and the one sitting on it had a bow, and a crown was given to him[b], and he went out conquering and to conquer.
  footnotes:
  - marker: a
    text: Or 'a victor's crown was given to him'; Greek στέφανος often refers to a wreath or crown associated with victory rather than a royal diadem.
    reason: lexical_alternative
  - marker: b
    text: The rider's identity is not stated in the text. Interpretations vary widely.
    reason: alternative_reading
