revisions:
- from: Y vi[a], y he aquí un caballo blanco, y el que estaba sentado sobre él tenía un arco, y le fue dada una corona[b], y salió venciendo y para vencer.
  to: Y vi, y he aquí un caballo blanco, y el que estaba sentado sobre él tenía un arco, y se le dio una corona[a], y salió venciendo[b] y para vencer.
  rationale: Se eliminó la nota sobre «vi/miré» porque no forma parte de las notas preservadas en el audit trail inglés para este versículo, y se restauró la nota importante sobre la identidad no especificada del jinete. También se reubicaron los marcadores para que coincidan exactamente con las notas revisadas. Se mantuvo el texto base con un ajuste menor a «se le dio una corona» por naturalidad en español, sin alterar el sentido.
