    rationale: El expediente inglés incluye una nota sobre el valor laboral aproximado del denario y otra sobre χοῖνιξ como medida seca y ración diaria. La revisión española debe conservar esas decisiones documentadas, no solo la alternativa léxica de ἀδικήσῃς.
  - severity: low
