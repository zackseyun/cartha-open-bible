translation:
  language: es
  text: 'Y oí como una voz en medio de los cuatro seres vivientes,[a] que decía: «Un litro[b] de trigo por un denario,[c] y tres litros[b] de cebada por un denario; y no dañes[d] el aceite ni el vino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un denario era por lo general el salario de un día de un trabajador; los precios aquí describen una escasez severa.
    reason: cultural_note
  - marker: b
    text: Griego χοῖνιξ, una medida seca aproximadamente equivalente a un litro, a menudo entendida como la ración diaria de grano de una persona.
    reason: cultural_note
  - marker: c
    text: El denario era una moneda antigua; aquí el texto expresa el precio «por un denario».
    reason: cultural_note
  - marker: d
    text: O «perjudiques» o «hagas daño a».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς φωνὴν
  english_pob_choice: what seemed to be a voice
  chosen_spanish: como una voz
  alternatives_spanish:
  - como si fuera una voz
  - lo que parecía ser una voz
  lexicon: BDAG
  rationale: ὡς con φωνή expresa semejanza o apariencia, no identidad plena. «Como una voz» conserva esa cautela en español sin volver la frase artificial.
- source_word: ἐν μέσῳ τῶν τεσσάρων ζῴων
  english_pob_choice: in the midst of the four living creatures
  chosen_spanish: en medio de los cuatro seres vivientes
  alternatives_spanish:
  - en medio de los cuatro animales vivientes
  - entre los cuatro seres vivientes
  lexicon: BDAG
  rationale: ζῷα en el contexto del trono de Apocalipsis son «seres vivientes», no «animales». «En medio de» mantiene la imagen espacial solemne del griego.
- source_word: Χοῖνιξ σίτου
  english_pob_choice: A quart of wheat
  chosen_spanish: Un litro de trigo
  alternatives_spanish:
  - Un cuarto de trigo
  - Una medida de trigo
  lexicon: BDAG
  rationale: χοῖνιξ es una medida seca aproximada. En español, «litro» comunica de manera natural y cercana la equivalencia funcional que la POB inglesa expresó con «quart», sin forzar transliteración en el texto principal.
- source_word: δηναρίου
  english_pob_choice: for a denarius
  chosen_spanish: por un denario
  alternatives_spanish:
  - a un denario
  - costando un denario
  lexicon: BDAG
  rationale: El genitivo de precio se expresa naturalmente con «por». Se conserva «denario» como moneda histórica específica, siguiendo el criterio de mantener la textura cultural del texto.
- source_word: τρεῖς χοίνικες κριθῶν
  english_pob_choice: three quarts of barley
  chosen_spanish: tres litros de cebada
  alternatives_spanish:
  - tres medidas de cebada
  - tres cuartos de cebada
  lexicon: BDAG
  rationale: Se mantiene la correspondencia con la primera medida y el contraste de precios. «Cebada» conserva el contraste lexical con trigo; la medida se adapta a un equivalente moderno legible.
- source_word: τὸ ἔλαιον
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el óleo
  - el aceite de oliva
  lexicon: BDAG
  rationale: Aunque ἔλαιον suele referirse a aceite de oliva, «aceite» es la forma más natural en español. «Aceite de oliva» sería más específico de lo que el texto exige.
- source_word: τὸν οἶνον
  english_pob_choice: the wine
  chosen_spanish: el vino
  lexicon: BDAG
  rationale: οἶνος se traduce de forma estándar como «vino».
- source_word: μὴ ἀδικήσῃς
  english_pob_choice: do not harm
  chosen_spanish: no dañes
  alternatives_spanish:
  - no hagas daño a
  - no perjudiques
  - no dañes ni alteres
  lexicon: BDAG
  rationale: ἀδικέω puede significar hacer daño, perjudicar o tratar injustamente. En este contexto de provisiones bajo juicio, «no dañes» comunica bien la prohibición de afectar el aceite y el vino, y mantiene la amplitud del término. En la nota se conserva la alternativa «no dañes» frente a «no perjudiques» por su mayor naturalidad.
theological_decisions:
- issue: ζῷα en la visión del trono
  english_pob_reading: living creatures
  chosen_spanish_reading: seres vivientes
  alternative_spanish_readings:
  - bestias
  - animales
  rationale: «Seres vivientes» evita confundirlos con las bestias hostiles posteriores de Apocalipsis y respeta su función exaltada en la escena del trono.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tratamiento de la medida χοῖνιξ
  english_pob_reading: Use readable modern equivalent for χοῖνιξ while retaining denarius untranslated
  chosen_spanish_reading: Usar un equivalente moderno legible para la medida, manteniendo denario
  alternative_spanish_readings:
  - transliterar ambas unidades
  - convertir ambas a equivalentes modernos con moneda y volumen
  rationale: La equivalencia óptima busca legibilidad sin perder el color histórico. El denario se conserva por su peso cultural; la medida se adapta para que el lector entienda de inmediato la escasez.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El contexto inglés muestra una traducción ya revisada y en acuerdo alto, sin cambios aplicados en la última pasada. Esta versión española sigue ese mismo criterio óptimo: conserva el sentido, la imagen espacial y el contraste económico, pero adapta la medida a una equivalencia natural para lectores hispanos.'
  spanish_consistency_notes:
  - Se mantiene «denario» como moneda histórica, coherente con el texto base y con el comentario cultural de la POB inglesa.
  - «Seres vivientes» conserva el término ya establecido para ζῷα en Apocalipsis.
  - La prohibición final se formula con verbo directo en imperativo negativo, correspondiente al griego μὴ ἀδικήσῃς.
  - Se evita «Señor» o cualquier sustitución teológica no presente en el versículo.
  - La puntuación introduce comillas españolas y dos puntos para el discurso directo, según uso editorial moderno.
