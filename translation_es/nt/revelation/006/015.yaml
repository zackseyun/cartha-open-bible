translation:
  language: es
  text: Y los reyes de la tierra, y los grandes[a], y los comandantes, y los ricos, y los fuertes, y todo esclavo y libre[b], se escondieron en las cuevas y entre las peñas de los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los nobles' para 'los grandes'.
    reason: lexical_alternative
  - marker: b
    text: O 'todo esclavo y hombre libre'; el griego usa una pareja singular masculina con fuerza representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεῖς τῆς γῆς
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del mundo
  - los reyes de la tierra habitable
  lexicon: BDAG
  rationale: γῆ en este contexto de juicio cósmico se entiende mejor como 'tierra' en sentido amplio, no solo como territorio local. 'De la tierra' conserva el alcance universal que el POB ya documentó para 'earth'.
- source_word: μεγιστᾶνες
  english_pob_choice: the great men
  chosen_spanish: los grandes
  alternatives_spanish:
  - los nobles
  - los magnates
  - los grandes hombres
  lexicon: BDAG
  rationale: '''Los grandes'' conserva la categoría social de personas prominentes o de alto rango sin restringirla demasiado a la nobleza hereditaria. En español suena natural y mantiene la brevedad del griego.'
- source_word: χιλίαρχοι
  english_pob_choice: the commanders
  chosen_spanish: los comandantes
  alternatives_spanish:
  - los capitanes
  - los jefes militares
  - los militares al mando
  lexicon: BDAG
  rationale: El término designa mandos militares. 'Comandantes' comunica el rango sin caer en un tecnicismo como 'tribunos' o en una equivalencia demasiado estrecha como 'capitanes'.
- source_word: πλούσιοι
  english_pob_choice: the rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - los adinerados
  - los acaudalados
  lexicon: BDAG
  rationale: Como adjetivo sustantivado, 'los ricos' es la correspondencia más directa y natural en español.
- source_word: ἰσχυροὶ
  english_pob_choice: the strong
  chosen_spanish: los fuertes
  alternatives_spanish:
  - los poderosos
  - los robustos
  - los poderosos y fuertes
  lexicon: BDAG
  rationale: '''Fuertes'' sigue de cerca el valor léxico de ἰσχυροί. Aunque ''poderosos'' es posible, desplaza el matiz hacia poder social más que fuerza o vigor.'
- source_word: πᾶς δοῦλος καὶ ἐλεύθερος
  english_pob_choice: every slave and free person
  chosen_spanish: todo esclavo y libre
  alternatives_spanish:
  - todo esclavo y hombre libre
  - todo esclavo y persona libre
  - todos, esclavos y libres
  lexicon: BDAG
  rationale: δοῦλος se traduce 'esclavo' por la fuerza del contraste con ἐλεύθερος y conforme a la pauta del proyecto cuando el estado de dependencia es explícito. 'Libre' mantiene el paralelismo social del griego; en español el sustantivo elíptico es idiomático en este tipo de pareja fija.
- source_word: ἔκρυψαν ἑαυτοὺς
  english_pob_choice: hid themselves
  chosen_spanish: se escondieron
  alternatives_spanish:
  - se ocultaron
  - se escondieron a sí mismos
  lexicon: BDAG
  rationale: El reflexivo griego se rinde de forma natural con 'se escondieron'. 'Se ocultaron' también sería posible, pero 'esconderse' es más directo y usual.
- source_word: εἰς τὰ σπήλαια
  english_pob_choice: in the caves
  chosen_spanish: en las cuevas
  alternatives_spanish:
  - a las cuevas
  - dentro de las cuevas
  lexicon: BDAG
  rationale: Aunque εἰς suele indicar movimiento hacia el interior, después de 'se escondieron' el español prefiere expresar el lugar resultante con 'en'. Mantiene el sentido sin sonar forzado.
- source_word: εἰς τὰς πέτρας τῶν ὀρέων
  english_pob_choice: among the rocks of the mountains
  chosen_spanish: entre las peñas de los montes
  alternatives_spanish:
  - entre las rocas de los montes
  - en las rocas de los montes
  - entre las piedras de los montes
  lexicon: BDAG
  rationale: πέτραι se refiere aquí a peñas, rocas o riscos. 'Peñas' capta bien la idea de prominencias rocosas y permite un español más vívido que 'rocas' en este contexto. 'Montes' conserva el plural del griego y el registro bíblico natural.
theological_decisions:
- issue: Valor social de δοῦλος frente a ἐλεύθερος
  english_pob_reading: slave and free person
  chosen_spanish_reading: esclavo y libre
  alternative_spanish_readings:
  - esclavo y persona libre
  - esclavo y hombre libre
  - siervo y libre
  rationale: La contraposición griega es social y jurídica, no meramente funcional; por eso 'esclavo' preserva la fuerza del término. 'Libre' funciona en español como antónimo suficiente y no exige añadir un sustantivo explícito que el griego no da.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος → servant / slave (context-dependent); use ''slave'' where the bonded nature is salient.'
- issue: Alcance de γῆ en el juicio apocalíptico
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - la tierra habitable
  rationale: En Apocalipsis, la expresión apunta al ámbito global del juicio, no solo a un territorio local. 'La tierra' conserva ese alcance sin imponer una paráfrasis interpretativa.
  doctrine_reference: Revelation book-level usage of γῆ in cosmic judgment scenes; POB lexical rationale for 'earth'.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no hubo cambios requeridos en la traducción inglesa de referencia, y la concordancia general del control cruzado fue alta. La versión española sigue esa línea estable, manteniendo las decisiones léxicas documentadas y adaptándolas al español natural.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma de proyecto solo cuando el texto lo exigiera; este versículo no contiene el nombre divino.
  - '''Los grandes'' evita introducir una noción de nobleza hereditaria que el griego no obliga y conserva la categoría social amplia.'
  - '''Comandantes'' refleja bien χιλίαρχοι sin requerir un tecnicismo histórico que dificultaría la lectura pública.'
  - '''Peñas'' traduce con naturalidad πέτραι en un contexto montañoso y mantiene un tono bíblico sobrio.'
  - La pareja 'esclavo y libre' conserva el paralelismo social del griego y la tensión léxica documentada en el POB inglés.
