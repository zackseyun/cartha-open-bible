translation:
  language: es
  text: 'Y cuando abrió el segundo sello[a], oí al segundo ser viviente decir: «Ven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ve». Algunos entienden que la orden está dirigida al jinete más que como una convocatoria a acercarse.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y además
  lexicon: BDAG
  rationale: Conectivo narrativo simple; en español, 'Y' conserva la continuidad del relato sin añadir interpretación.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - después de que
  - al
  lexicon: BDAG
  rationale: Conjunción temporal natural y precisa para introducir el siguiente evento en la secuencia narrativa.
- source_word: ἤνοιξεν
  english_pob_choice: he opened
  chosen_spanish: abrió
  alternatives_spanish:
  - rompió
  - desató
  lexicon: BDAG
  rationale: ἀνοίγω significa 'abrir'; aunque un sello sugiere la acción de romperse en sentido conceptual, el verbo griego aquí es 'abrir', y el español debe seguir ese valor léxico.
- source_word: σφραγῖδα τὴν δευτέραν
  english_pob_choice: the second seal
  chosen_spanish: el segundo sello
  alternatives_spanish:
  - el sello segundo
  - el sello, el segundo
  lexicon: BDAG
  rationale: La construcción artículo-sustantivo-adjetivo se expresa de forma natural como 'el segundo sello', preservando el énfasis ordinal.
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  lexicon: BDAG
  rationale: Aoristo narrativo de ἀκούω; 'oí' es directo, sobrio y acorde con la voz testimonial del pasaje.
- source_word: τοῦ δευτέρου ζῴου
  english_pob_choice: the second living creature
  chosen_spanish: al segundo ser viviente
  alternatives_spanish:
  - a la segunda criatura viviente
  - al segundo animal
  lexicon: BDAG
  rationale: ζῷον en Apocalipsis designa a los seres vivientes del trono, no animales comunes. 'Ser viviente' evita asociaciones erróneas; la preposición 'al' fluye en español con el verbo 'oír' + infinitivo de habla.
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: decir
  alternatives_spanish:
  - que decía
  - hablando
  lexicon: BDAG
  rationale: El participio presente funciona como complemento de 'oí'; en español, 'oí ... decir' reproduce con naturalidad la fuerza participial sin añadir contenido.
- source_word: Ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ve
  - Ven aquí
  lexicon: BDAG
  rationale: El imperativo de ἔρχομαι se traduce de manera primaria como 'Ven'. En este contexto la identidad del destinatario es debatida, pero la forma léxica básica se mantiene en el texto principal.
theological_decisions:
- issue: Destino del imperativo Ἔρχου
  english_pob_reading: Come
  chosen_spanish_reading: Ven
  alternative_spanish_readings:
  - Ve
  rationale: Se conserva la traducción léxica primaria del imperativo sin resolver en el texto principal si la orden va dirigida al jinete o funciona como convocatoria a venir adelante. La ambigüedad contextual se mantiene por fidelidad al griego y al audit trail inglés.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla más allá del texto.
translation_notes:
  revision_awareness: El control cruzado informa alta concordancia y ninguna revisión necesaria; se mantiene la redacción directa de la edición inglesa auditada, con ajuste natural al español y preservación de la alternativa interpretativa en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo requiera; aquí no aparece.
  - Se mantiene 'ser viviente' para ζῷον, en coherencia con el uso técnico de Apocalipsis.
  - Se traduce Ἔρχου como 'Ven' en el texto principal y se anota 'Ve' como alternativa contextual, siguiendo la tensión documentada en el audit trail.
