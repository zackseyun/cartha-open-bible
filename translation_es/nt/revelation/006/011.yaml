  text: καὶ ἐδόθη αὐτοῖς ἑκάστῳ στολὴ λευκή, καὶ ἐρρέθη αὐτοῖς ἵνα ⸀ἀναπαύσονται ἔτι χρόνον ⸀μικρόν, ἕως ⸀πληρωθῶσιν καὶ οἱ σύνδουλοι αὐτῶν καὶ οἱ ἀδελφοὶ ⸀αὐτῶν οἱ μέλλοντες ⸀ἀποκτέννεσθαι ὡς καὶ αὐτοί.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/011.yaml
  text: And a white robe was given to each of them[a], and they were told that they should rest a little longer, until their fellow slaves and their brothers, who are about to be killed just as they were[c][b], should also be completed.
  footnotes:
  - marker: a
    text: Or 'until their fellow servants and their brothers also should be fulfilled' or 'until the full number of their fellow slaves and brothers should be complete.' The Greek says simply 'until ... should be made complete/fulfilled.'
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' may here refer to fellow believers more broadly, including women, but the Greek uses the masculine plural ἀδελφοί.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their fellow slaves and their brothers also should be made complete'.
    reason: previous_rendering
