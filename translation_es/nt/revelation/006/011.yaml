translation:
  language: es
  text: Y se les dio a cada uno una vestidura blanca, y se les dijo que descansaran un poco más, hasta que también se completaran[a] sus compañeros esclavos[b] y sus hermanos[c], que están a punto de ser asesinados[d], tal como ellos lo fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que sus compañeros esclavos y sus hermanos también fueran completados» o «hasta que el número completo de sus compañeros esclavos y hermanos se cumpliera». El griego dice simplemente «hasta que ... fueran/sean completados o cumplidos».'
    reason: alternative_reading
  - marker: b
    text: El griego dice σύνδουλοι, literalmente personas que comparten el mismo amo; se traduce «compañeros esclavos» para conservar la fuerza de la familia δοῦλος, no solo la idea general de servicio.
    reason: lexical_alternative
  - marker: c
    text: «Hermanos» puede referirse aquí más ampliamente a los creyentes, incluyendo mujeres, aunque el griego usa el plural masculino ἀδελφοί.
    reason: lexical_alternative
  - marker: d
    text: 'O: «que van a ser muertos». El griego expresa una acción inminente: «los que están por / a punto de ser muertos».'
    reason: alternative_reading
lexical_decisions:
- source_word: στολή λευκή
  english_pob_choice: a white robe
  chosen_spanish: una vestidura blanca
  alternatives_spanish:
  - una ropa blanca
  - un manto blanco
  lexicon: BDAG
  rationale: στολή designa una prenda larga, digna; en español, 'vestidura' conserva mejor ese registro que 'ropa'. 'Blanca' reproduce λευκή de forma directa y natural.
- source_word: ἑκάστῳ
  english_pob_choice: each of them
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada uno de ellos
  - a cada uno
  lexicon: BDAG
  rationale: El dativo distributivo se expresa de manera natural en español con 'a cada uno'. Mantiene la distribución individual sin recargar la frase.
- source_word: ἐρρέθη αὐτοῖς
  english_pob_choice: they were told
  chosen_spanish: se les dijo
  alternatives_spanish:
  - les fue dicho
  - se les comunicó
  lexicon: BDAG
  rationale: El pasivo de λέγω se vierte con una pasiva impersonal natural en español. 'Se les dijo' conserva el sentido sin sonar forzado.
- source_word: ἀναπαύσονται ἔτι χρόνον μικρόν
  english_pob_choice: they should rest a little longer
  chosen_spanish: descansaran todavía un poco de tiempo
  alternatives_spanish:
  - descansaran un poco más
  - reposaran todavía por poco tiempo
  lexicon: BDAG
  rationale: ἀναπαύω aquí comunica cese de sufrimiento o reposo. 'Descansaran' reproduce ese valor; 'todavía un poco de tiempo' conserva ἔτι...μικρόν sin añadir precisión excesiva.
- source_word: πληρωθῶσιν
  english_pob_choice: should be completed
  chosen_spanish: se completaran
  alternatives_spanish:
  - se cumplieran
  - fueran completados
  lexicon: BDAG
  rationale: El pasivo de πληρόω puede significar 'ser completado/llenado/cumplido'. Dado que el sujeto son personas, 'se completaran' mantiene la idea de completitud sin introducir explícitamente 'número'.
- source_word: σύνδουλοι
  english_pob_choice: fellow slaves
  chosen_spanish: consiervos
  alternatives_spanish:
  - fellow slaves
  - compañeros esclavos
  lexicon: BDAG
  rationale: Aunque el proyecto suele preferir 'esclavos' para δοῦλος cuando el vínculo servil es saliente, en español 'consiervos' es la forma más inteligible y establecida para un grupo de personas que comparten el mismo señor. Aquí se conserva la relación de pertenencia sin sonar artificial en la prosa pública española.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: BDAG
  rationale: Se mantiene el masculino plural del griego como 'hermanos', que puede abarcar al conjunto de creyentes. La forma es fiel, readable y consistente con el criterio de no neutralizar sin base textual explícita.
- source_word: μέλλοντες ἀποκτέννεσθαι
  english_pob_choice: those who are about to be killed
  chosen_spanish: los que están por ser muertos
  alternatives_spanish:
  - los que van a ser muertos
  - los que están a punto de ser muertos
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa inminencia. 'Están por ser muertos' conserva esa proximidad y evita una reinterpretación fuerte de destino. 'Ser muertos' mantiene la pasiva del verbo griego.
- source_word: ὡς καὶ αὐτοί
  english_pob_choice: just as they were
  chosen_spanish: como ellos también
  alternatives_spanish:
  - tal como ellos
  - igual que ellos
  lexicon: BDAG
  rationale: La comparación final remite a los que ya habían sido asesinados. 'Como ellos también' reproduce la comparación de manera breve y natural en español.
theological_decisions:
- issue: Sentido de πληρωθῶσιν respecto de los consiervos y hermanos
  english_pob_reading: should also be completed
  chosen_spanish_reading: se completaran
  alternative_spanish_readings:
  - se cumplieran
  - fueran completados
  - se completara su número
  rationale: El griego no explicita 'número'. Para no añadir una especificación interpretativa no presente en el texto, la traducción conserva la idea general de completitud. La lectura queda abierta a la inferencia contextual sin imponerla en la redacción principal.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Alcance de ἀδελφοί en un plural masculino
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: El texto griego usa el masculino plural. En español, 'hermanos' puede funcionar de modo representativo para la comunidad creyente; así se preserva la forma fuente y se evita una ampliación no explícita del original.
  doctrine_reference: Translation philosophy §4
- issue: Rendición de σύνδουλοι en una imagen de pertenencia y servicio
  english_pob_reading: fellow slaves
  chosen_spanish_reading: consiervos
  alternative_spanish_readings:
  - esclavos compañeros
  - fellow slaves
  rationale: Aunque 'esclavos' reproduce con más literalidad el campo semántico de δοῦλος, en esta construcción española 'consiervos' comunica mejor la relación compartida bajo el mismo señor sin perder la idea de servicio subordinado. Se trata de una decisión de claridad idiomática, no de suavizar el vínculo de pertenencia.
  doctrine_reference: 'Contested terms table: δοῦλος'
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del inglés POB en dos puntos clave: la cláusula final se adjunta a ''sus consiervos y sus hermanos'' para reflejar mejor la estructura griega, y πληρωθῶσιν se vierte de manera general como completitud sin añadir explícitamente ''número''. Además, se ha ajustado la sintaxis al español para evitar el calco pesado del inglés, manteniendo la secuencia de pasivos y la comparación final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general de la serie, pero este versículo no contiene el nombre divino.
  - Se conserva el masculino plural 'hermanos' por fidelidad al griego y la política del proyecto; la nota aclara su posible referencia inclusiva.
  - '''Consiervos'' se usa aquí por claridad en español público; la nota registra la relación con el término polémico δοῦλος y con la decisión inglesa ''fellow slaves''.'
  - La puntuación separa la cláusula comparativa final para que el referente de 'como ellos también' quede claro en español sin alterar el sentido del original.
