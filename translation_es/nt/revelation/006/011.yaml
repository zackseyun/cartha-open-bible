revisions:
- from: Y se les dio a cada uno una vestidura blanca[a], y se les dijo que descansaran todavía un poco de tiempo, hasta que también se completaran[b] sus consiervos[c] y sus hermanos[d], los que están por ser muertos[e], como ellos también.
  to: Y se les dio a cada uno una vestidura blanca, y se les dijo que descansaran un poco más, hasta que también se completaran[a] sus compañeros esclavos[b] y sus hermanos[c], que están a punto de ser asesinados[d], tal como ellos lo fueron.
  rationale: La revisión corrige la principal desalineación terminológica («consiervos» → «compañeros esclavos»), mejora la naturalidad del español («un poco más»), aclara la comparación final («tal como ellos lo fueron»), y reubica las notas para que correspondan al lugar correcto del texto. También conserva la decisión teológica documentada sobre πληρωθῶσιν sin añadir «número» al texto principal.
  reviewer_model: gpt-5.4
