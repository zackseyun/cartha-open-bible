review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura griega y conserva bien los elementos principales: la túnica blanca dada a cada uno, la orden de descansar un poco más, y la espera hasta que sus compañeros y hermanos también sean completados. Sin embargo, hay varios puntos donde no preserva del todo bien la fuerza léxica o la claridad sintáctica del original y del rastro POB: (1) σύνδουλοι se suaviza indebidamente como «consiervos» pese a la preferencia explícita del proyecto por «esclavos»; (2) «como ellos también» no expresa con claridad ὡς καὶ αὐτοί, que compara su futura muerte con la de los mártires ya muertos; (3) la colocación y anclaje de algunas notas no reflejan bien la lógica del inglés auditado.'
  spanish_quality_summary: 'El español es mayormente legible, pero varias expresiones suenan poco naturales o imprecisas: «todavía un poco de tiempo» es más pesado que «un poco más»; «están por ser muertos» es comprensible, pero menos idiomático que «están a punto de ser asesinados» o «van a ser muertos»; y el cierre «como ellos también» queda truncado y poco claro. Además, la nota [a] está anclada a «vestidura blanca», aunque trata de una lectura alternativa sobre la cláusula final, lo que crea confusión editorial.'
  glossary_alignment: 'Hay desalineación importante con la terminología del proyecto en δοῦλος: el inglés POB y la pauta del proyecto favorecen «fellow slaves», por lo que en español debe mantenerse «compañeros esclavos» o equivalente que preserve esclavitud; «consiervos» no basta aquí. «Hermanos» sí alinea bien con ἀδελφοί. «Vestidura blanca» es aceptable, aunque «túnica blanca» o «ropa blanca» también serían posibles; no requiere cambio. El tratamiento de πληρωθῶσιν como «se completaran» es adecuado y fiel a la decisión teológica documentada.'
  issues:
  - severity: high
    issue: «consiervos» suaviza σύνδουλοι contra la política terminológica del proyecto
    rationale: El proyecto indica que los términos de la familia δοῦλος deben traducirse normalmente con «esclavo» cuando esa fuerza léxica es saliente. Aquí el inglés auditado decidió «fellow slaves», así que «consiervos» no preserva bien la racionalidad documentada.
  - severity: high
    issue: La frase final «como ellos también» no comunica claramente «just as they were»
    rationale: ὡς καὶ αὐτοί compara a los futuros mártires con los ya asesinados. En español, «como ellos también» queda elíptico y ambiguo; «tal como ellos lo fueron» expresa el sentido de manera clara y fiel.
  - severity: medium
    issue: La nota [a] está mal anclada en el texto
    rationale: La nota [a] comenta una alternativa para la cláusula con πληρωθῶσιν, no para «una vestidura blanca». Debe moverse a la parte pertinente de la oración o eliminarse allí.
  - severity: medium
    issue: «todavía un poco de tiempo» suena pesado en español
    rationale: Aunque reproduce ἔτι χρόνον μικρόν, en español natural y digno funciona mejor «descansaran un poco más» o «todavía un poco más», sin pérdida de sentido.
  - severity: low
    issue: «están por ser muertos» es menos idiomático que otras opciones
    rationale: La idea de inminencia de μέλλοντες ἀποκτέννεσθαι se expresa de forma más clara con «están a punto de ser asesinados» o, si se quiere mantener la pasiva básica, «van a ser muertos».
  revised_spanish_text: Y se les dio a cada uno una vestidura blanca, y se les dijo que descansaran un poco más, hasta que también se completaran[a] sus compañeros esclavos[b] y sus hermanos[c], que están a punto de ser asesinados[d], tal como ellos lo fueron.
