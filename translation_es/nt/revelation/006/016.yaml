  spanish_quality_summary: 'La principal falla es de anclaje de notas: la nota [a] está colocada después de «nosotros», pero su contenido («O “de la presencia de”») corresponde a «del rostro de». La nota [b] sobre «ocúltennos» es innecesaria porque el inglés auditado no la conserva y no resuelve una ambigüedad nueva en español. Además, «peñas» es aceptable, pero «rocas» suena más claro y neutral para lectura amplia latinoamericana.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cordero», «ira», «rostro» y la referencia al entronizado están bien alineados. No aplica Yahvé/Mesías en este versículo.
  issues:
  - severity: medium
    issue: Nota [a] anclada en el lugar equivocado
    rationale: La nota lexical alternativa «de la presencia de» corresponde a ἀπὸ προσώπου / «del rostro de», no a «nosotros». Debe moverse al sintagma relevante en el texto.
  - severity: medium
    issue: Nota [b] innecesaria sobre «escóndannos»
    rationale: El expediente inglés solo conserva una nota para «from the face of / from the presence of». «Ocúltennos» no representa una alternativa exigida por la auditoría ni una ambigüedad nueva del español; añadirla sobrecarga el texto sin base suficiente.
  - severity: low
    issue: «Peñas» puede sonar más marcado regional o literario que «rocas»
    rationale: «Peñas» es defendible, pero «rocas» coincide mejor con el inglés auditado «rocks» y resulta más transparente para un español neutral latinoamericano sin perder fuerza.
