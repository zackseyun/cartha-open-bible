translation:
  language: es
  text: 'y dicen a los montes y a las rocas: «Caigan sobre nosotros y escóndannos del rostro[a] del que está sentado en el trono y de la ira del Cordero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la presencia del que está sentado en el trono».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - dijeron
  lexicon: BDAG
  rationale: El presente narrativo griego se conserva bien con el presente simple español «dicen», que mantiene la viveza apocalíptica sin forzar un progresivo.
- source_word: ὄρεσιν
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: BDAG
  rationale: ὄρος designa una elevación montañosa; «montes» es natural en español bíblico y conserva el registro solemne. «Montañas» también sería posible, pero «montes» encaja mejor con la formulación bíblica tradicional sin perder exactitud.
- source_word: πέτραις
  english_pob_choice: the rocks
  chosen_spanish: las peñas
  alternatives_spanish:
  - las rocas
  - los peñascos
  lexicon: BDAG
  rationale: πέτρα puede referir a peña, roca o masa rocosa. «Peñas» conserva la imagen de refugio en la roca y evita la repetición plana con «montes»; además es idiomático en español bíblico. «Rocas» queda como alternativa más literal pero menos expresiva.
- source_word: Πέσετε ἐφ’ ἡμᾶς
  english_pob_choice: Fall on us
  chosen_spanish: Caigan sobre nosotros
  alternatives_spanish:
  - Caigan encima de nosotros
  - Caigan sobre nosotros y aplástennos
  lexicon: BDAG
  rationale: El imperativo plural aoristo con ἐπί + acusativo pide una orden directa. «Caigan sobre nosotros» reproduce con naturalidad el valor de πίπτω + ἐπί. Se prefirió «caigan» por la concordancia con «montes y peñas» y por fluidez en español.
- source_word: κρύψατε ἡμᾶς
  english_pob_choice: hide us
  chosen_spanish: escóndannos
  alternatives_spanish:
  - ocúltennos
  - cóbrannos
  lexicon: BDAG
  rationale: «Escóndannos» es la forma más idiomática y directa para el imperativo plural. «Ocúltennos» es válida pero más formal; «cóbrannos» no expresa tan claramente el acto de esconder.
- source_word: ἀπὸ προσώπου
  english_pob_choice: from the face of
  chosen_spanish: del rostro de
  alternatives_spanish:
  - de la presencia de
  - de delante de
  lexicon: BDAG
  rationale: Se conserva la imagen literal de πρόσωπον como «rostro», tal como lo hace la tradición POB en inglés con «face». «Presencia» es una alternativa interpretativa; se reserva para nota porque atenúa la concreción imagística del original.
- source_word: τοῦ καθημένου ἐπὶ τοῦ θρόνου
  english_pob_choice: the One seated on the throne
  chosen_spanish: del que está sentado en el trono
  alternatives_spanish:
  - del que se sienta en el trono
  - del Entronizado
  lexicon: BDAG
  rationale: El participio sustantivado se vierte de manera natural con «el que está sentado en el trono», preservando la acción continua/estado entronizado. Se evita «el Entronizado» por ser más interpretativo y menos transparente.
- source_word: ὀργῆς
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  lexicon: BDAG
  rationale: Aunque «wrath» suele corresponder a «ira» o «ira intensa», en este contexto judicial y escatológico «ira» es la equivalencia española más clara y sobria. «Furor» o «cólera» añaden matices menos estables.
- source_word: τοῦ ἀρνίου
  english_pob_choice: the Lamb
  chosen_spanish: del Cordero
  lexicon: BDAG
  rationale: Se conserva el título cristológico establecido en Apocalipsis como «el Cordero». En español este nombre propio-teológico ya es transparente y fiel a la tradición del libro.
theological_decisions:
- issue: Mantener la distinción entre el que está sentado en el trono y el Cordero como objetos coordinados de temor y juicio
  english_pob_reading: Retain both 'the One seated on the throne' and 'the Lamb' as distinct yet coordinated objects of fear and judgment.
  chosen_spanish_reading: Conservar «el que está sentado en el trono» y «el Cordero» como dos referentes coordinados y distintos, ambos incluidos en el temor de los que hablan.
  alternative_spanish_readings:
  - Fundir la referencia en una sola mención de Dios
  - Suavizar «la ira del Cordero» para evitar la paradoja
  rationale: 'El griego presenta dos sintagmas con ἀπό: uno respecto del entronizado y otro respecto del Cordero. La traducción preserva la tensión teológica de Apocalipsis: el Cordero, asociado al sacrificio, también participa del juicio escatológico. No se resuelve esa paradoja por paráfrasis.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3; afirmaciones de ortodoxia nicena/calcidónica
- issue: Conservar el valor imagístico de πρόσωπον sin reducirlo automáticamente a una abstracción
  english_pob_reading: A viable interpretive alternative is 'from the presence of the One seated on the throne.'
  chosen_spanish_reading: Traducir literalmente «del rostro de» y dejar «de la presencia de» como alternativa de nota.
  alternative_spanish_readings:
  - de la presencia de
  - de delante de
  rationale: En español, «rostro» mantiene la concreción de la imagen y sigue de cerca el texto griego. La opción «presencia» es válida interpretativamente, pero atenúa la fuerza visual y no se adopta en el cuerpo principal.
  doctrine_reference: BDAG; notas auditadas de la POB en inglés
translation_notes:
  revision_awareness: Se mantuvo la lectura auditada sin cambios sustanciales respecto del registro inglés; no se detectaron revisiones aplicadas en el expediente fuente. La versión española sigue el mismo perfil de equivalencia óptima, conservando el presente narrativo, la imaginería de montes/peñas y la tensión teológica de «la ira del Cordero».
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí, pues el texto refiere al entronizado sin nombrar el tetragrámaton.
  - Se mantuvo «el Cordero» como título fijo de Apocalipsis, coherente con la terminología del proyecto.
  - Se prefirió «ira» a «cólera/furor» por claridad judicial y consistencia con el registro escatológico.
  - Se preservó la imagen de «rostro» como equivalente de πρόσωπον, con nota alternativa para «presencia».
