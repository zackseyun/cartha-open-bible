translation:
  language: es
  text: 'Y cuando abrió el cuarto sello[a], oí la voz del cuarto ser viviente que decía: «Ven».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Sal». El griego dice más literalmente «Ven», pero los intérpretes discrepan sobre si la orden se dirige a Juan o al jinete.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤνοιξεν
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - descerrajó
  - abrió de par en par
  lexicon: BDAG
  rationale: El aoristo de ἀνοίγω se rinde naturalmente con 'abrió'; es el equivalente español normal para la acción de abrir un sello en esta fórmula apocalíptica recurrente.
- source_word: σφραγῖδα
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - marca sellada
  - precinto
  lexicon: BDAG
  rationale: En Apocalipsis, σφραγίς se refiere a los sellos del rollo; 'sello' es el término preciso y transparente en español.
- source_word: τετάρτην / τετάρτου
  english_pob_choice: fourth
  chosen_spanish: cuarto
  alternatives_spanish:
  - cuarta
  lexicon: BDAG
  rationale: Ambas formas ordinales se traducen consistentemente con el ordinal español correspondiente. Se mantiene 'cuarto' por concordancia con 'sello' y 'ser viviente'.
- source_word: φωνὴν
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - una voz
  - el sonido
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo, en español 'la voz' resulta natural porque queda inmediatamente especificada por el genitivo 'del cuarto ser viviente'.
- source_word: ζῴου
  english_pob_choice: living creature
  chosen_spanish: ser viviente
  alternatives_spanish:
  - criatura viviente
  - ser vivo
  lexicon: BDAG
  rationale: '''Ser viviente'' conserva el valor técnico del término en Apocalipsis para los seres del trono y evita confundirlos con animales o con θηρίον (''bestia'').'
- source_word: λέγοντος
  english_pob_choice: saying
  chosen_spanish: que decía
  alternatives_spanish:
  - diciendo
  - que clamaba
  lexicon: BDAG
  rationale: En español, 'que decía' fluye mejor tras 'oí la voz...' y preserva el participio presente sin añadir matices no presentes en el griego.
- source_word: Ἔρχου
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven acá
  - Sal
  lexicon: BDAG
  rationale: El imperativo griego significa de manera directa 'ven'. Se conserva la forma breve para no resolver interpretativamente si el mandato se dirige a Juan o al jinete.
theological_decisions:
- issue: Destinatario del imperativo Ἔρχου
  english_pob_reading: Render simply as 'Come' without specifying the addressee.
  chosen_spanish_reading: Traducir simplemente «Ven» sin identificar al destinatario.
  alternative_spanish_readings:
  - «Sal» si se entiende dirigido al jinete
  - «Ven acá» si se entiende dirigido a Juan
  rationale: El griego solo ofrece el imperativo y no identifica de manera explícita al destinatario. Mantener «Ven» preserva la tensión narrativa y teológica documentada en el audit trail, sin resolverla de forma interpretativa.
  doctrine_reference: 'Translation philosophy §3: conservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios necesarios; se mantiene la resolución auditada del imperativo y la equivalencia establecida para los demás términos.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología apocalíptica de POB: ''sello'', ''voz'', ''ser viviente''.'
  - Se evita 'Cristo' u otra terminología no pertinente al versículo.
  - La mayúscula en «Ven» sigue el uso de cita directa en español.
  - La nota al pie conserva la ambigüedad del imperativo sin sobreinterpretarlo.
