    rationale: 'Aunque intenta reflejar los dos elementos léxicos, en español resulta torpe y semánticamente impreciso: «saco» suele entenderse como bolsa/saco, mientras que aquí se refiere a tela de saco áspera hecha de pelo, asociada al luto. Conviene una formulación más natural y fiel, idealmente con nota que preserve la alternativa documentada.'
  revised_spanish_text: Y vi cuando abrió el sexto sello, y hubo un gran terremoto, y el sol se volvió negro como tela áspera de pelo[a], y toda la luna se volvió como sangre.
