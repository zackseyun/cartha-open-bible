  text: Καὶ εἶδον ὅτε ἤνοιξεν τὴν σφραγῖδα τὴν ἕκτην, καὶ σεισμὸς μέγας ἐγένετο, καὶ ὁ ἥλιος ⸂ἐγένετο μέλας⸃ ὡς σάκκος τρίχινος, καὶ ἡ σελήνη ὅλη ἐγένετο ὡς αἷμα,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/012.yaml
  text: And I saw when he opened the sixth seal[a], and there was a great earthquake, and the sun became black like sackcloth made of hair, and the whole moon became like blood,
  footnotes:
