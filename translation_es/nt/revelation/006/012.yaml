translation:
  language: es
  text: Y vi cuando abrió el sexto sello, y hubo un gran terremoto, y el sol se volvió negro como tela áspera de pelo[a], y toda la luna se volvió como sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como saco de tela de pelo»; la expresión se refiere a una tela de saco áspera hecha de pelo, tradicionalmente asociada con el luto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  lexicon: BDAG
  rationale: En la visión apocalíptica, εἶδον introduce la percepción visionaria del vidente. «Vi» es natural en español y conserva el carácter testimonial.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  - mientras
  lexicon: BDAG
  rationale: Marca el momento en que ocurre la acción; «cuando» reproduce con claridad la relación temporal.
- source_word: ἤνοιξεν τὴν σφραγῖδα τὴν ἕκτην
  english_pob_choice: he opened the sixth seal
  chosen_spanish: abrió el sexto sello
  alternatives_spanish:
  - abrió el sello sexto
  lexicon: BDAG
  rationale: El orden natural del español coloca el ordinal antes del sustantivo. «Abrió» mantiene el valor básico de ἀνοίγω en el contexto de los sellos.
- source_word: σεισμὸς μέγας
  english_pob_choice: a great earthquake
  chosen_spanish: un gran terremoto
  alternatives_spanish:
  - un gran temblor
  - un gran sacudimiento
  lexicon: BDAG
  rationale: σεισμός en este contexto apocalíptico se refiere con naturalidad a un terremoto. «Gran» conserva la fuerza de μέγας.
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - sucedió
  - aconteció
  lexicon: BDAG
  rationale: Para la cláusula del terremoto, «hubo» expresa de manera idiomática la ocurrencia del evento y preserva la fuerza eventiva de γίνομαι.
- source_word: ὁ ἥλιος ἐγένετο μέλας
  english_pob_choice: the sun became black
  chosen_spanish: el sol se volvió negro
  alternatives_spanish:
  - el sol se puso negro
  - el sol se hizo negro
  lexicon: BDAG
  rationale: μέλας significa «negro», no solo «oscuro». «Se volvió negro» conserva el cambio de estado que expresa ἐγένετο.
- source_word: ὡς σάκκος τρίχινος
  english_pob_choice: like sackcloth made of hair
  chosen_spanish: como saco de pelo
  alternatives_spanish:
  - como tela de saco de pelo
  - como sayal de pelo
  lexicon: BDAG
  rationale: σάκκος es saco o saco de arpillera/saco áspero; τρίχινος indica material hecho de pelo. «Como saco de pelo» comunica la imaginería con naturalidad. La posible referencia a tela áspera de luto queda implícita sin sobrecargar la frase.
- source_word: ἡ σελήνη ὅλη
  english_pob_choice: the whole moon
  chosen_spanish: toda la luna
  alternatives_spanish:
  - la luna entera
  - la luna completa
  lexicon: BDAG
  rationale: ὅλη intensifica el sustantivo y se expresa bien con «toda»; en español bíblico, «luna» es más natural que «satélite» u otra paráfrasis.
- source_word: ἐγένετο ὡς αἷμα
  english_pob_choice: became like blood
  chosen_spanish: se volvió como sangre
  alternatives_spanish:
  - se hizo como sangre
  - pareció sangre
  lexicon: BDAG
  rationale: ὡς introduce comparación, no identidad literal. «Como sangre» preserva la similitud visionaria sin resolverla interpretativamente.
theological_decisions:
- issue: Naturaleza de los signos cósmicos
  english_pob_reading: Render the imagery straightforwardly as visionary/apocalyptic phenomena without interpreting whether the signs are literal astronomical events, symbolic portents, or both.
  chosen_spanish_reading: Presentar la imaginería de forma directa como fenómeno visionario/apocalíptico, sin decidir si se trata de eventos astronómicos literales, portentos simbólicos o ambos.
  alternative_spanish_readings:
  - Interpretarlos como catástrofe astronómica literal del fin de los tiempos
  - Entenderlos principalmente como símbolos de juicio divino y convulsión histórica
  rationale: El griego ofrece imágenes vívidas y comparaciones, pero no resuelve la interpretación global. La traducción conserva esa tensión al no explicitar una lectura más allá del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés al preferir una formulación natural para γίνομαι en la cláusula del terremoto («hubo»), manteniendo el tono formal y la imaginería apocalíptica sin añadir interpretación.
  spanish_consistency_notes:
  - Se usó «sello» para σφραγῖδα en coherencia con el contexto de Apocalipsis.
  - Se mantuvo «negro» para μέλας y «como sangre» para αἷμα, preservando la fuerza visual del texto.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay nombres divinos en este versículo.
  - La sintaxis española conserva la secuencia de eventos del griego con coordinación repetida por «y».
