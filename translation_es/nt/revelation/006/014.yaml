base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/014.yaml
  text: And the sky vanished like a scroll being rolled up[c][b][a], and every mountain and island was moved from its place.
  footnotes:
  - marker: a
    text: Or 'the heaven was parted' or 'the sky departed'; the Greek can denote separation or withdrawal.
    reason: lexical_alternative
  - marker: b
    text: Greek βιβλίον refers to a scroll, not a modern bound book.
    reason: cultural_note
  - marker: c
    text: Literally 'from their places.' English uses the singular distributively after 'every mountain and island.'
    reason: lexical_alternative
