translation:
  language: es
  text: Y el cielo[a] desapareció como un rollo[b] que se enrolla, y todo monte y toda isla fueron desplazados[c] de su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el cielo fue separado» o «el cielo se apartó»; el griego puede denotar separación o retirada.'
    reason: lexical_alternative
  - marker: b
    text: βιβλίον designa aquí un rollo, no un libro encuadernado moderno.
    reason: cultural_note
  - marker: c
    text: 'Literalmente: «de sus lugares». El español usa aquí el singular distributivo tras «todo monte y toda isla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  english_pob_choice: sky
  chosen_spanish: cielo
  alternatives_spanish:
  - firmamento
  - cielo visible
  lexicon: BDAG
  rationale: En este contexto apocalíptico-cósmico, οὐρανός se refiere al ámbito visible sobre la tierra. En español, «cielo» conserva esa imagen de manera natural y puede abarcar tanto el espacio visible como la bóveda celeste sin sugerir necesariamente el lugar de morada divina.
- source_word: ἀπεχωρίσθη
  english_pob_choice: was vanished
  chosen_spanish: desapareció
  alternatives_spanish:
  - se apartó
  - se separó
  - se retiró
  lexicon: BDAG
  rationale: El verbo admite la idea de separación o retirada. Dado el símil del rollo que se enrolla, «desapareció» comunica con claridad el efecto visual descrito en español y evita imponer mecánicamente una imagen de ‘partirse’ que aquí puede sonar menos idiomática.
- source_word: βιβλίον
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - libro
  - pergamino
  lexicon: BDAG
  rationale: βιβλίον en este marco antiguo designa un rollo, no un libro encuadernado. «Rollo» mantiene la precisión histórica y la imagen del texto griego.
- source_word: ἑλισσόμενον
  english_pob_choice: being rolled up
  chosen_spanish: que se enrolla
  alternatives_spanish:
  - que se va enrollando
  - enrollado
  lexicon: BDAG
  rationale: El participio expresa el acto de enrollarse. «Que se enrolla» reproduce bien el movimiento continuo del símil y resulta fluido en español.
- source_word: πᾶν ὄρος καὶ νῆσος
  english_pob_choice: every mountain and island
  chosen_spanish: todo monte y toda isla
  alternatives_spanish:
  - cada monte y cada isla
  - todo monte e isla
  lexicon: BDAG
  rationale: πᾶν tiene fuerza distributiva. «Todo monte y toda isla» conserva esa distribución de manera natural en español y evita una formulación más rígida.
- source_word: ἐκ τῶν τόπων αὐτῶν
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de sus lugares
  - desde su lugar
  lexicon: BDAG
  rationale: Aunque el griego usa plural distributivo («de sus lugares»), en español la concordancia natural con un sujeto distributivo permite «de su lugar» para cada elemento, preservando el sentido sin forzar la sintaxis.
- source_word: ἐκινήθησαν
  english_pob_choice: was moved
  chosen_spanish: fue movido
  alternatives_spanish:
  - fue desplazado
  - se movió
  lexicon: BDAG
  rationale: κινέω aquí indica ser movido de la ubicación original. En español, el pasivo singular distributivo suena más fluido con «todo monte y toda isla fue movido», manteniendo la idea de desplazamiento.
theological_decisions:
- issue: Naturaleza del cielo en la visión
  english_pob_reading: Render οὐρανός as 'sky' rather than 'heaven'
  chosen_spanish_reading: «cielo» como ámbito visible/cósmico, no como afirmación sobre la morada de Dios
  alternative_spanish_readings:
  - «cielo» entendido como morada celestial
  - «firmamento»
  rationale: La escena describe una conmoción cósmica visible. «Cielo» en español puede transmitir esa realidad sin introducir una carga doctrinal innecesaria sobre el lugar de Dios; el contexto apocalíptico orienta la lectura hacia el ámbito visible del mundo creado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tipo de acción del cielo
  english_pob_reading: Translate ἀπεχωρίσθη with a parting/splitting sense
  chosen_spanish_reading: «desapareció» como efecto visual de retirada/separación
  alternative_spanish_readings:
  - «se apartó»
  - «se separó»
  - «se partió»
  rationale: El griego puede expresar separación o retirada, y el símil del rollo enrollándose favorece una imagen de retirada del cielo de la vista. «Desapareció» comunica ese efecto de manera idiomática en español sin borrar la tensión apocalíptica del texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente griego y la auditoría inglesa más reciente, que prefirió «vanished» para ἀπεχωρίσθη. En español, se optó por «desapareció» por ser el equivalente más idiomático para reflejar esa retirada visual en un contexto apocalíptico, manteniendo la imagen del rollo que se enrolla y la fuerza distributiva de los sustantivos singulares.
  spanish_consistency_notes:
  - Se mantuvo «cielo» para οὐρανός en coherencia con el valor cosmológico visible del pasaje.
  - Se preservó «rollo» para βιβλίον por precisión histórica y continuidad con la imagen del símil.
  - Se respetó la concordancia distributiva en español con «todo monte y toda isla fue movido», aunque el griego usa plural en el verbo y en «sus lugares».
