translation:
  language: es
  text: Y tomé el rollo pequeño[a] de la mano del ángel, y me lo comí; y en mi boca era dulce como miel; y cuando lo comí, mi vientre se amargó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «librito». El término griego es un diminutivo y puede denotar un documento escrito pequeño; «rollo pequeño» refleja mejor la forma antigua probable, mientras que «librito» conserva bien la idea de pequeñez.
    reason: lexical_alternative
  - marker: b
    text: O «mi estómago se amargó». También puede traducirse «mi vientre se volvió amargo».
    reason: lexical_alternative
lexical_decisions:
- source_word: βιβλαρίδιον
  english_pob_choice: little scroll
  chosen_spanish: librito
  alternatives_spanish:
  - pequeño rollo
  - pequeño libro
  lexicon: BDAG
  rationale: El diminutivo griego puede señalar un escrito pequeño; en español, «librito» conserva bien la idea de diminutivo y evita forzar una forma material más explícita de la que el versículo da. «Rollo» sería más específico, pero aquí el español queda más natural sin perder la referencia a un documento escrito.
- source_word: ἐκ τῆς χειρὸς τοῦ ἀγγέλου
  english_pob_choice: from the hand of the angel
  chosen_spanish: de la mano del ángel
  alternatives_spanish:
  - de entre la mano del ángel
  - de la mano del mensajero
  lexicon: BDAG
  rationale: La preposición y la imagen se rinden de manera directa para conservar la escena vívida de recibir el objeto directamente del ángel. «Mensajero» es posible para ἄγγελος, pero aquí «ángel» es la opción transparente y establecida en el contexto apocalíptico.
- source_word: κατέφαγον
  english_pob_choice: ate
  chosen_spanish: me lo comí
  alternatives_spanish:
  - lo comí
  - lo devoré
  lexicon: BDAG
  rationale: El verbo compuesto puede intensificar la acción, pero en español «me lo comí» expresa el acto de manera natural y mantiene la fuerza simbólica sin exagerarla con «devoré». También conserva la participación personal del sujeto en la acción.
- source_word: ὡς μέλι γλυκύ
  english_pob_choice: sweet like honey
  chosen_spanish: dulce como miel
  alternatives_spanish:
  - tan dulce como miel
  - dulce como la miel
  lexicon: BDAG
  rationale: «Como miel» reproduce con claridad la comparación de ὡς y suena idiomático en español. Se evita adornar la imagen, porque el texto solo subraya la cualidad gustativa.
- source_word: ὅτε ἔφαγον αὐτό
  english_pob_choice: when I had eaten it
  chosen_spanish: y cuando lo comí
  alternatives_spanish:
  - y cuando lo hube comido
  - y al comerlo
  lexicon: BDAG
  rationale: El español prefiere una coordinación temporal sencilla para marcar la secuencia narrativa. El pluscuamperfecto no es necesario en español para reflejar el orden de la acción y podría sonar artificioso.
- source_word: ἐπικράνθη
  english_pob_choice: became bitter
  chosen_spanish: se amargó
  alternatives_spanish:
  - se volvió amargo
  - quedó amargo
  lexicon: BDAG
  rationale: 'El aoristo pasivo se expresa de forma natural en español con un inacusativo/reflexivo: «se amargó». Así se conserva la voz y el cambio de estado sin introducir una perífrasis más pesada. «Se volvió amargo» sería posible, pero menos conciso.'
- source_word: κοιλία
  english_pob_choice: stomach
  chosen_spanish: vientre
  alternatives_spanish:
  - estómago
  - barriga
  lexicon: BDAG
  rationale: «Vientre» mantiene el campo semántico corporal amplio de κοιλία y enlaza mejor con el simbolismo bíblico que «estómago», que en español puede sonar demasiado anatómico o estrecho. La ambigüedad corporal se preserva sin resolverla de más.
theological_decisions:
- issue: Imagen profética de comer el libro/rollo
  english_pob_reading: Render the imagery plainly without interpretive expansion.
  chosen_spanish_reading: Mantener la imagen sin explicarla ni espiritualizarla en la traducción.
  alternative_spanish_readings:
  - Expresar la escena como recepción gozosa de la profecía
  - Explicitar que la dulzura y la amargura representan efectos espirituales
  rationale: El versículo presenta un acto simbólico de modo deliberadamente concreto. La traducción debe preservar esa tensión entre dulzura y amargura sin imponer una explicación doctrinal que el texto inmediato todavía no desarrolla.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El audit trail en inglés revisó la frase final desde una pasiva más literal («was made bitter») a una forma más natural e intransitiva («became bitter»). En español se siguió esa revisión con «se amargó», que mantiene la idea de cambio de estado sin recargar la voz pasiva. También se tomó en cuenta que el inglés prefirió una equivalencia funcional para el diminutivo ("little scroll") y para la secuencia temporal del final, pero en español se optó por soluciones idiomáticas equivalentes: «librito» y «y cuando lo comí».'
  spanish_consistency_notes:
  - Se mantiene «ángel» para ἄγγελος, coherente con el contexto apocalíptico y el uso habitual del proyecto.
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton.
  - Se conserva el simbolismo corporal con «vientre» para no reducir κοιλία a un tecnicismo anatómico.
  - 'La puntuación reproduce dos grandes movimientos narrativos: recibir/comer el librito y luego la experiencia de dulzura y amargura.'
