base_translation:
  language: en
  yaml_path: translation/nt/revelation/010/010.yaml
  text: And I took the little scroll from the hand of the angel and ate it[a], and in my mouth it was sweet like honey; and when I had eaten it[b], my stomach became bitter.
  footnotes:
  - marker: a
    text: Or "little book." The Greek term is a diminutive and may denote a small written document; "little scroll" best fits the likely ancient form.
    reason: lexical_alternative
  - marker: b
    text: Or "my belly became bitter."
    reason: lexical_alternative
