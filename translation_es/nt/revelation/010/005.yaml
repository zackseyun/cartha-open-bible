translation:
  language: es
  text: Y el ángel[a], a quien vi de pie sobre el mar y sobre la tierra firme[b], levantó su mano derecha al cielo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero».
    reason: lexical_alternative
  - marker: b
    text: O «sobre la tierra».
    reason: lexical_alternative
  - marker: c
    text: O «hacia el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En Apocalipsis el referente es un ser celestial, no un simple enviado humano; por eso "ángel" conserva el valor contextual y el registro apocalíptico del término.
- source_word: ἑστῶτα
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - erguido
  lexicon: BDAG
  rationale: El participio describe la postura actual del ángel. En español, "de pie" comunica de forma natural esa postura sin perder el matiz de presencia y estabilidad.
- source_word: ἐπὶ τῆς θαλάσσης
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - sobre el mar
  - en el mar
  lexicon: BDAG
  rationale: '"Sobre el mar" refleja la preposición con genitivo y mantiene la imagen vívida de la escena. Se eligió "mar" porque es el equivalente idiomático normal del griego θάλασσα.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre la tierra firme
  - sobre la tierra/ el país
  lexicon: BDAG
  rationale: γῆ puede significar "tierra" o "tierra/terreno" según contexto. Aquí, en contraste con "mar", "tierra" conserva el paralelismo espacial sin forzar la noción más amplia de "mundo" o "planeta".
- source_word: ἦρεν
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - levantó en alto
  lexicon: BDAG
  rationale: αἴρω puede traducirse "levantar" o "alzar". "Levantó" es claro, solemne y natural en español para el gesto preparatorio de un juramento.
- source_word: τὴν χεῖρα αὐτοῦ τὴν δεξιὰν
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su mano derecha
  - su mano diestra
  - su brazo derecho
  lexicon: BDAG
  rationale: El griego especifica la mano y la califica como derecha. "Su mano derecha" conserva esa precisión y es la forma idiomática más transparente en español.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo
  - al cielo
  - hacia el cielo, es decir, al ámbito celestial
  lexicon: BDAG
  rationale: Aunque el inglés POB escogió "heaven" por el peso teológico del contexto, en español "cielo" puede comunicar tanto la dirección espacial como la referencia elevada sin introducir de forma automática la ambigüedad devocional de "cielo" como destino postmortem. El contexto inmediato de juramento permite "hacia el cielo" como orientación hacia arriba.
theological_decisions:
- issue: γῆ en contraste con θάλασσα
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - tierra firme
  - suelo
  - mundo
  rationale: La escena contrapone dos dominios, mar y tierra. "Tierra" preserva el contraste directo sin ampliar el sentido a una afirmación cosmológica más allá de la visión.
  doctrine_reference: Translation philosophy §1, §5
- issue: οὐρανός como objeto del gesto juramentado
  english_pob_reading: heaven
  chosen_spanish_reading: cielo
  alternative_spanish_readings:
  - cielo
  - cielo/ámbito celestial
  - firmamento
  rationale: El gesto apunta verticalmente y en el contexto apocalíptico anticipa la solemnidad del juramento. "Cielo" mantiene la dimensión elevada y reverente del texto sin reducirlo a "firmamento" ni volverlo una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; este borrador sigue de cerca la lectura aprobada, ajustando solo la formulación española para fluidez natural y transparencia léxica.
  spanish_consistency_notes:
  - Se mantiene "ángel" para ἄγγελος conforme al uso apocalíptico del término.
  - Se traduce γῆ como "tierra" en paralelo con "mar", evitando un calco innecesario de "mundo" o una abstracción excesiva.
  - Se opta por "cielo" en vez de "cielo/heaven" porque en español la escena ya conserva el registro reverente sin ambigüedad doctrinal adicional.
  - 'El orden sintáctico sigue el griego, pero con un flujo natural en español: sujeto, relativa, predicado verbal, complemento direccional.'
