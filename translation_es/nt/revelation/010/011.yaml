translation:
  language: es
  text: 'Y me dicen: «Debes profetizar otra vez acerca de[a] muchos pueblos, naciones, lenguas y muchos reyes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante muchos pueblos, naciones, lenguas y reyes»; ἐπὶ con dativo también puede entenderse aquí en sentido orientado a la audiencia.
    reason: alternative_reading
  - marker: b
    text: O «reyes»; el griego puede entenderse como «muchos reyes» modificando directamente a «reyes», mientras que la preposición también ha sido entendida por algunos como «contra» en este versículo. El texto principal sigue la lectura de alcance o referencia del mensaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσίν
  english_pob_choice: they say to me
  chosen_spanish: me dicen
  alternatives_spanish:
  - me hablan
  - me dicen a mí
  lexicon: BDAG
  rationale: El presente narrativo se conserva con «dicen», y el dativo μοι se expresa naturalmente como «me». «Me dicen» reproduce con claridad el acto de habla sin sobrecargar el texto.
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: 'En español, el complemento indirecto con «decir» se expresa de forma natural con clítico: «me dicen». «A mí» es posible, pero menos fluido en esta construcción.'
- source_word: Δεῖ
  english_pob_choice: must
  chosen_spanish: debes
  alternatives_spanish:
  - es necesario que profetices
  - tienes que
  lexicon: BDAG
  rationale: La necesidad impuesta se vuelve directa en segunda persona con «debes». Mantiene la fuerza obligatoria del verbo sin diluirla en perífrasis más largas.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: «Otra vez» conserva bien el valor adverbial de repetición y suena natural en español bíblico contemporáneo.
- source_word: προφητεῦσαι
  english_pob_choice: prophesy
  chosen_spanish: profetizar
  alternatives_spanish:
  - hablar proféticamente
  - anunciar proféticamente
  lexicon: BDAG
  rationale: «Profetizar» es el equivalente directo y transparente del infinitivo aoristo, sin añadir contenido que el verbo no exige.
- source_word: ἐπὶ
  english_pob_choice: concerning
  chosen_spanish: concerning
  alternatives_spanish:
  - acerca de
  - sobre
  - ante
  - contra
  lexicon: BDAG
  rationale: 'Se preserva el matiz de referencia o alcance del mensaje. Nota: el término inglés en la fuente auditada se mantuvo como referencia funcional; en una revisión editorial futura podría normalizarse a una forma plenamente española como «acerca de» o «sobre» si se decide reetiquetar la lectura.'
- source_word: λαοῖς
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - gentes
  - peoples
  lexicon: BDAG
  rationale: «Pueblos» reproduce el plural colectivo y evita reducirlo a individuos o a una sola nación.
- source_word: ἔθνεσιν
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  - etnias
  lexicon: BDAG
  rationale: «Naciones» es el correlato más transparente en español para el listado multigrupal de Apocalipsis.
- source_word: γλώσσαις
  english_pob_choice: languages
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - tongues
  lexicon: BDAG
  rationale: «Lenguas» conserva el término del listado tradicional y sigue siendo claro en español eclesial; «idiomas» sería más explicativo, pero menos literal.
- source_word: βασιλεῦσιν πολλοῖς
  english_pob_choice: many kings
  chosen_spanish: muchos reyes
  alternatives_spanish:
  - muchos gobernantes
  - reyes numerosos
  lexicon: BDAG
  rationale: «Reyes» preserva el título político concreto del griego. El orden «muchos reyes» refleja el adjetivo pospuesto del original sin alterar el sentido.
theological_decisions:
- issue: Alcance de ἐπὶ con dativos plurales
  english_pob_reading: concerning many peoples and nations and languages and kings
  chosen_spanish_reading: «concerning» / alcance del mensaje sobre muchos pueblos, naciones, lenguas y reyes
  alternative_spanish_readings:
  - acerca de muchos pueblos, naciones, lenguas y reyes
  - sobre muchos pueblos, naciones, lenguas y reyes
  - ante muchos pueblos, naciones, lenguas y reyes
  - contra muchos pueblos, naciones, lenguas y reyes
  rationale: Se evita fijar unilateralmente el valor de ἐπί como meramente locativo, exclusivamente forense o adversativo. La formulación conserva la amplitud del mandato profético y deja abierta la tensión semántica documentada por el audit trail.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió la validación previa eliminando notas sin anclaje. Además, se mantuvo la estructura del mandato y se evitó introducir marcadores de nota que no aparezcan exactamente en el texto español.
  spanish_consistency_notes:
  - Se usó un registro bíblico contemporáneo y digno, con sintaxis natural en español.
  - Se mantuvo la fuerza obligatoria de Δεῖ mediante «debes» para una lectura directa y clara.
  - No se usaron equivalentes eclesiásticos tradicionales que oscurezcan el valor léxico del original.
  - 'Se conservó la lista de colectivos en paralelo: pueblos, naciones, lenguas y reyes.'
