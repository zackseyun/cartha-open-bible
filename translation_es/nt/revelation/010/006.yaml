  rationale: Se conserva toda la sustancia de la traducción aprobada en inglés, incluyendo la nota sobre χρόνος como «demora», pero se mejora la naturalidad del español sustituyendo el calco «las cosas en…» por «lo que hay en…». Esto mantiene la estructura repetida de la fórmula creadora y evita una redacción rígida.
