translation:
  language: es
  text: y juró por el que vive por los siglos de los siglos[a], que creó el cielo y lo que hay en él, y la tierra y lo que hay en ella, y el mar y lo que hay en él, que ya no habrá demora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «tiempo ya no habrá». Aquí χρόνος se entiende en contexto como «demora»: el período de espera antes de la acción final de Dios ha terminado.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὤμοσεν
  english_pob_choice: swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - juró solemnemente
  lexicon: BDAG
  rationale: El aoristo de ὀμνύω expresa hacer un juramento. En español, «juró» es la forma más natural y directa para conservar la solemnidad apocalíptica sin añadir una perífrasis innecesaria.
- source_word: τῷ ζῶντι εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: by the one who lives forever and ever
  chosen_spanish: por el que vive por los siglos de los siglos
  alternatives_spanish:
  - por el que vive para siempre y por siempre
  - por el Viviente por los siglos de los siglos
  lexicon: BDAG
  rationale: El dativo con ὀμνύω indica la persona por quien se jura. «El que vive» conserva el participio sustantivado ζῶντι, y la expresión idiomática «por los siglos de los siglos» reproduce el valor de duración interminable de εἰς τοὺς αἰῶνας τῶν αἰώνων en un registro bíblico natural para el español.
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - formó
  lexicon: BDAG
  rationale: En un contexto cósmico y de fórmula de creación, κτίζω significa crear. «Creó» preserva ese sentido teológico y no debilita la referencia al Creador.
- source_word: τὸν οὐρανὸν
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo/los cielos
  - el cielo (o los cielos)
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «heaven», en español «el cielo» es la equivalencia más natural y abarca el ámbito cósmico requerido por la fórmula de creación. No se usa «cielos» porque el singular griego aquí funciona como esfera creada.
- source_word: τὰ ἐν αὐτῷ
  english_pob_choice: the things in it
  chosen_spanish: las cosas en él
  alternatives_spanish:
  - lo que hay en él
  - todo lo que hay en él
  lexicon: BDAG
  rationale: El neutro plural con la preposición se vierte literalmente como «las cosas en él» para conservar la estructura repetida del texto. «Lo que hay en él» sería más idiomático, pero menos transparente respecto al original.
- source_word: γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra/el mundo
  - el mundo
  lexicon: BDAG
  rationale: En la triada cósmica cielo-tierra-mar, γῆ designa la tierra como esfera creada. «La tierra» preserva bien esa referencia y suena natural en español.
- source_word: θάλασσαν
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar/los mares
  lexicon: BDAG
  rationale: θάλασσα se traduce con el singular «el mar» para mantener la fórmula de creación y la correspondencia con el singular griego.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - de que
  lexicon: BDAG
  rationale: Después de un verbo de juramento, ὅτι introduce el contenido del juramento. En español, «que» es la forma más natural para introducir la cláusula citada.
- source_word: χρόνος οὐκέτι ἔσται
  english_pob_choice: there will no longer be any delay
  chosen_spanish: ya no habrá demora
  alternatives_spanish:
  - el tiempo ya no será
  - ya no habrá más tiempo
  - ya no habrá retraso
  lexicon: BDAG
  rationale: Siguiendo la decisión auditable del POB en inglés, χρόνος se entiende en contexto como «demora» o «aplazamiento», no como el fin de la temporalidad creada. «Demora» comunica esa pausa de espera que concluye, y evita una lectura cosmológica indebida.
theological_decisions:
- issue: Sentido de χρόνος en el juramento
  english_pob_reading: χρόνος means 'delay' or 'waiting period,' not the end of time itself
  chosen_spanish_reading: χρόνος significa «demora» o «aplazamiento», no el cese del tiempo creado
  alternative_spanish_readings:
  - «el tiempo ya no será»
  - «ya no habrá más tiempo»
  rationale: El contexto inmediato (especialmente la continuidad hacia el v. 7, donde se anuncia el cumplimiento del misterio de Dios) favorece entender que terminó el período de espera. La traducción «demora» conserva la fuerza del anuncio sin introducir una doctrina sobre la desaparición del tiempo en sí.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios sustantivos y el cotejo externo muestra alta concordancia. La versión española sigue la decisión ya auditable del POB inglés para χρόνος, manteniendo la equivalencia óptima y la lectura contextual de «demora».'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la fórmula de juramento sin añadirlo, porque el griego nombra directamente al que vive por los siglos de los siglos.
  - Se conserva la estructura repetida de creación (cielo / cosas en él; tierra / cosas en ella; mar / cosas en él) para reflejar el ritmo del original.
  - El término «demora» se usa de modo consistente con la nota textual, evitando «tiempo» en el cuerpo principal para no oscurecer la lectura contextual del POB.
