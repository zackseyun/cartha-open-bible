  - severity: low
    issue: «yo estaba por escribir» suena menos natural que una alternativa más estándar
    rationale: La frase es inteligible, pero «estaba a punto de escribir» comunica mejor la inminencia de ἤμελλον γράφειν en español general y evita un giro regional o menos común.
