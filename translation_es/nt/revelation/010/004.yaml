translation:
  language: es
  text: 'Y cuando hablaron los siete truenos, yo estaba a punto de escribir; y oí una voz del cielo que decía: «Sella lo que hablaron los siete truenos, y no escribas esas cosas».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «no las escribas»; el pronombre plural se refiere a las cosas dichas por los siete truenos, expresado explícitamente en español como «esas cosas» para evitar ambigüedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησαν
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - dijeron
  - hablaron en voz alta
  lexicon: BDAG
  rationale: λαλέω suele significar ‘hablar’ o ‘decir’. En español, ‘hablaron’ conserva la acción verbal sin añadir matices interpretativos y funciona bien con la imagen apocalíptica de los truenos personificados.
- source_word: βρονταί
  english_pob_choice: thunders
  chosen_spanish: truenos
  alternatives_spanish:
  - tronidos
  - tronidos de trueno
  lexicon: BDAG
  rationale: βροντή es ‘trueno’. ‘Truenos’ reproduce la personificación del griego de manera natural en español y mantiene el registro apocalíptico.
- source_word: ἤμελλον γράφειν
  english_pob_choice: I was about to write
  chosen_spanish: yo estaba por escribir
  alternatives_spanish:
  - yo iba a escribir
  - estaba a punto de escribir
  lexicon: BDAG
  rationale: μέλλω con infinitivo expresa inminencia. ‘Estaba por escribir’ comunica esa inmediatez en español moderno y conserva la idea de que Juan estaba a punto de hacerlo cuando fue interrumpido.
- source_word: φωνὴν ἐκ τοῦ οὐρανοῦ
  english_pob_choice: a voice from heaven
  chosen_spanish: una voz del cielo
  alternatives_spanish:
  - una voz desde el cielo
  - una voz del cielo procedente
  lexicon: BDAG
  rationale: La expresión es idiomática; ‘del cielo’ es natural en español y preserva el origen celestial sin identificar explícitamente al hablante.
- source_word: Σφράγισον
  english_pob_choice: Seal up
  chosen_spanish: Sella
  alternatives_spanish:
  - Sella por completo
  - Pon bajo sello
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decisiva. ‘Sella’ es conciso y fiel; el contexto ya comunica la idea de reserva o ocultamiento, por lo que no es necesario expandirlo.
- source_word: ἃ ἐλάλησαν αἱ ἑπτὰ βρονταί
  english_pob_choice: what the seven thunders spoke
  chosen_spanish: lo que hablaron los siete truenos
  alternatives_spanish:
  - lo que dijeron los siete truenos
  - las cosas que hablaron los siete truenos
  lexicon: BDAG
  rationale: El relativo neutro plural ἃ apunta al contenido de su խոսa; en español, ‘lo que hablaron’ es natural y suficientemente cercano a la estructura griega.
- source_word: μὴ αὐτὰ γράψῃς
  english_pob_choice: do not write them
  chosen_spanish: no las escribas
  alternatives_spanish:
  - no lo escribas
  - no escribas eso
  lexicon: BDAG
  rationale: Aunque αὐτά es plural, el referente son las cosas dichas por los siete truenos. ‘No las escribas’ conserva mejor el plural gramatical que la opción inglesa de singular colectivo, y evita perder la referencia a contenidos múltiples.
theological_decisions:
- issue: Identidad de la voz del cielo
  english_pob_reading: a voice from heaven
  chosen_spanish_reading: una voz del cielo
  alternative_spanish_readings:
  - la voz de Dios desde el cielo
  - una voz celestial
  rationale: El texto solo dice que Juan oyó una voz procedente del cielo. Para no resolver una identificación que el pasaje no explicita, se mantiene la referencia abierta.
  doctrine_reference: Respeto a la restricción textual y a la tensión teológica no explicitada.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la clausula final para reflejar el plural griego αὐτά (‘them’). En español se conserva ese plural mediante ‘no las escribas’, de modo que no hace falta nota explicativa adicional.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa ‘truenos’ para βρονταί por coherencia con la imaginería apocalíptica y con el audit trail inglés.
  - La voz celestial queda indefinida, en línea con la cautela teológica del POB inglés.
  - Se conserva un registro formal y publicable sin arcaísmos innecesarios.
