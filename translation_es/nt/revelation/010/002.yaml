translation:
  language: es
  text: y teniendo en su mano un rollito[a] abierto. Y puso su pie derecho sobre el mar, y el izquierdo sobre la tierra firme[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «librito». El griego βιβλαρίδιον es un diminutivo que puede referirse a un pequeño rollo o cuadernillo/librito.
    reason: lexical_alternative
  - marker: b
    text: O «sobre la tierra». El griego γῆ puede significar «tierra», «suelo» o «tierra firme»; aquí se traduce «tierra firme» para conservar el contraste con «el mar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχων
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - teniendo en su mano
  - llevando
  lexicon: BDAG
  rationale: El participio presente se conserva como construcción verbal subordinada para mantener la relación sintáctica con el ángel del v. 1. «Teniendo» reproduce la acción concomitante sin volverla demasiado libre.
- source_word: χειρὶ
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - mano
  lexicon: BDAG
  rationale: Equivale directamente a χείρ y es natural en español. Se mantiene el posesivo para reflejar el genitivo αὐτοῦ.
- source_word: βιβλαρίδιον
  english_pob_choice: a little scroll
  chosen_spanish: librito
  alternatives_spanish:
  - rollito
  - pequeño rollo
  - librito/pequeño libro
  lexicon: BDAG
  rationale: El diminutivo griego sugiere un objeto pequeño. En español, «librito» conserva la idea de pequeñez, aunque no reproduce con exactitud la forma de rollo. Se evita «libro» como forma principal porque puede borrar la imagen del manuscrito enrollado; aun así, la nota deja abierta la alternativa léxica.
- source_word: ἠνεῳγμένον
  english_pob_choice: that had been opened
  chosen_spanish: abierto
  alternatives_spanish:
  - que había sido abierto
  - abierto y ya desdoblado
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante. En español, «abierto» comunica naturalmente ese estado sin sobrecargar la frase; el resultado duradero queda implícito en el contexto.
- source_word: ἔθηκεν
  english_pob_choice: placed
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso
  lexicon: BDAG
  rationale: «Puso» es un equivalente directo y natural para τίθημι en este gesto solemne. «Colocó» sería más formal, pero menos inmediato.
- source_word: πόδα
  english_pob_choice: foot
  chosen_spanish: pie
  alternatives_spanish:
  - pie
  lexicon: BDAG
  rationale: La equivalencia normal de πούς en este contexto es «pie». En español no hace falta repetir el sustantivo en la segunda mitad de la cláusula, porque el paralelismo lo suple.
- source_word: δεξιὸν
  english_pob_choice: right
  chosen_spanish: derecho
  alternatives_spanish:
  - derecho
  lexicon: BDAG
  rationale: Adjetivo ordinario y transparente para el pie derecho; conserva el contraste espacial y corporal del texto.
- source_word: ἐπὶ τῆς θαλάσσης
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - sobre el mar
  - encima del mar
  lexicon: BDAG
  rationale: «Mar» es la opción más natural en español para θάλασσα en esta escena. «Sobre» reproduce la relación espacial de ἐπί con genitivo y mantiene la imagen visionaria.
- source_word: εὐώνυμον
  english_pob_choice: left
  chosen_spanish: izquierdo
  alternatives_spanish:
  - izquierdo
  lexicon: BDAG
  rationale: El adjetivo se traduce como «izquierdo» en español. Se omite repetir «pie» porque el paralelismo del griego permite suplirlo sin pérdida de sentido.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre el suelo
  - sobre la tierra firme
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefiere «land» para el contraste con el mar, en español «tierra» es la forma más natural y puede conservar igualmente la antítesis inmediata con «mar». «Tierra» evita una expresión más técnica o perifrástica y sigue siendo fiel al campo semántico de γῆ.
theological_decisions:
- issue: γῆ en contraste con θάλασσα
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - tierra
  - tierra firme
  - suelo
  rationale: El contexto visionario presenta un contraste espacial directo entre mar y tierra. En español, «tierra» comunica ese contraste con naturalidad y sin añadir una lectura cosmológica más amplia de la necesaria.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y el audit trail inglés POB, pero adapta las elecciones léxicas a un español natural y publicable. Se mantiene la tensión del diminutivo βιβλαρίδιον sin ocultarla, y se conserva el contraste espacial entre mar y tierra/land.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda, aunque este versículo no la requiera.
  - Se evita «SEÑOR» como máscara divina porque no aplica aquí.
  - 'Se conservan construcciones sencillas y solemnes: participio inicial, coordinación con «y», y paralelismo corporal.'
  - No se introduce terminología eclesiástica ajena al texto; «librito» queda anotado como opción alternativa para respetar la ambigüedad del diminutivo griego.
