translation:
  language: es
  text: Y él clamó con voz fuerte[a], como ruge un león. Y cuando clamó, los siete truenos hablaron con sus propias voces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en voz alta». El griego conserva de manera muy concreta el sustantivo «voz», no solo una idea adverbial de volumen.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκραξεν
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: BDAG
  rationale: κράζω expresa un clamor o grito fuerte; en español, «clamó» mantiene la intensidad y el tono solemne del pasaje sin reducirlo a un simple hablar.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con una voz fuerte
  alternatives_spanish:
  - con voz fuerte
  - en voz alta
  lexicon: BDAG
  rationale: Se conserva el sustantivo φωνή como «voz» y el valor intensivo de μεγάλῃ como «fuerte». «Con una voz fuerte» sigue de cerca la imagen concreta sin volverla solo adverbial.
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: Introduce comparación simétrica. En español, «como» es la forma más natural y suficiente para la semejanza del símil.
- source_word: λέων
  english_pob_choice: a lion
  chosen_spanish: un león
  alternatives_spanish:
  - el león
  lexicon: BDAG
  rationale: Traducción directa del sustantivo; el artículo indefinido preserva la comparación imagística.
- source_word: μυκᾶται
  english_pob_choice: roars
  chosen_spanish: ruge
  alternatives_spanish:
  - brama
  - bala
  lexicon: BDAG
  rationale: Para un león, «ruge» es el equivalente idiomático natural en español y conserva la fuerza animal de la imagen.
- source_word: ἐλάλησαν
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - hablaban
  - dijeron
  - emitieron
  lexicon: BDAG
  rationale: λαλέω aquí se mantiene como acto de habla personificada. «Hablaron» reproduce la personificación de los truenos sin suavizarla.
- source_word: αἱ ἑπτὰ βρονταὶ
  english_pob_choice: the seven thunders
  chosen_spanish: los siete truenos
  alternatives_spanish:
  - las siete voces del trueno
  - los siete truenos
  lexicon: BDAG
  rationale: Se mantiene el referente visionario personificado. La forma plural masculina concuerda con el español de manera natural y conserva la imagen apocalíptica.
- source_word: τὰς ἑαυτῶν φωνάς
  english_pob_choice: with their own voices
  chosen_spanish: con sus propias voces
  alternatives_spanish:
  - con sus voces propias
  - sus propias voces
  lexicon: BDAG
  rationale: Se conserva el reflexivo intensivo ἑαυτῶν. «Con sus propias voces» refleja la literalidad del giro griego y mantiene la personificación audaz de los truenos.
theological_decisions:
- issue: Personificación de los siete truenos
  english_pob_reading: Retain the personified wording 'the seven thunders spoke with their own voices.'
  chosen_spanish_reading: Mantener que «los siete truenos hablaron con sus propias voces».
  alternative_spanish_readings:
  - los siete truenos sonaron
  - los siete truenos emitieron sonidos
  rationale: El griego presenta explícitamente a los truenos como sujetos de habla. En el género apocalíptico, esta personificación forma parte de la imagen inspirada y no debe rebajarse a mero ruido.
  doctrine_reference: POB translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó la frase a «spoke with their own voices» para sonar más natural sin perder el literalismo. En español se mantuvo esa misma tensión: una formulación natural («con sus propias voces») que sigue reflejando de cerca la expresión griega.'
  spanish_consistency_notes:
  - Se usa «clamó» para κράζω, coherente con un registro solemne y enfático.
  - Se evita «SEÑOR» u otras sustituciones no presentes; no hay nombre divino en el versículo.
  - Se conserva la personificación de los truenos sin explicarla o desmitificarla.
  - «Con una voz fuerte» mantiene la imagen concreta de φωνή y no la reduce a un adverbio.
