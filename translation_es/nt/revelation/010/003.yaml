  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: ἔκραξεν = «clamó», ὥσπερ λέων μυκᾶται = «como ruge un león», y mantiene correctamente la personificación de αἱ ἑπτὰ βρονταὶ ... ἐλάλησαν. También conserva el énfasis de τὰς ἑαυτῶν φωνάς con «sus propias voces». La única reparación necesaria es estilística y de naturalidad en español en φωνῇ μεγάλῃ.'
