  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: θεοῦ = «Dios», δοῦλος = «esclavos» correctamente conservado, y μυστήριον = «misterio». Se debe preservar la alternativa «siervos» en nota, conforme al audit trail inglés y la guía de términos controvertidos.'
