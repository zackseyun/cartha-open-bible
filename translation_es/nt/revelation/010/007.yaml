source:
  edition: SBLGNT
  text: ἀλλ’ ἐν ταῖς ἡμέραις τῆς φωνῆς τοῦ ἑβδόμου ἀγγέλου, ὅταν μέλλῃ σαλπίζειν, καὶ ἐτελέσθη τὸ μυστήριον τοῦ θεοῦ, ὡς εὐηγγέλισεν τοὺς ⸂ἑαυτοῦ δούλους⸃ τοὺς προφήτας.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/010/007.yaml
  text: but in the days of the voice of the seventh angel[a], when he is about to sound the trumpet, then the mystery of God is fulfilled, just as he proclaimed the good news to his own slaves, the prophets.
  footnotes:
  - marker: a
    text: Or 'his own servants.' The Greek word can mean 'servants' or 'slaves'; here it emphasizes belonging to God.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
