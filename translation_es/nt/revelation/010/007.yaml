    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:05Z'
    unchanged: false
    changes_summary: 'Changed ''was fulfilled'' to ''is fulfilled'' to better reflect the context of the future-oriented temporal clause, and changed ''slaves'' to ''servants'' for more natural formal English in this context. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: pero en los días de la voz del séptimo ángel, cuando está a punto de tocar la trompeta, entonces se cumple el misterio de Dios, así como anunció las buenas noticias a sus propios esclavos[a], los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus propios siervos». El término griego puede significar «siervos» o «esclavos»; aquí enfatiza que pertenecen a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: BDAG
  rationale: La conjunción adversativa pide en español una transición breve y natural; «pero» conserva el contraste inmediato con la demora anterior sin añadir matiz no sustentado.
- source_word: ἐν ταῖς ἡμέραις
  english_pob_choice: in the days
  chosen_spanish: en los días
  alternatives_spanish:
  - durante los días
  lexicon: BDAG
  rationale: La expresión temporal apocalíptica se mantiene de forma directa y formal; «en los días» reproduce bien el registro del griego sin forzar el español.
- source_word: τῆς φωνῆς τοῦ ἑβδόμου ἀγγέλου
  english_pob_choice: of the voice of the seventh angel
  chosen_spanish: de la voz del séptimo ángel
  alternatives_spanish:
  - del sonido del séptimo ángel
  - de la voz del séptimo mensajero
  lexicon: BDAG
  rationale: φωνή puede ser «voz» o «sonido»; se conserva «voz» para respetar la forma griega y la posible relación con la proclamación del ángel, sin interpretarla prematuramente como mero acto de tocar.
- source_word: ὅταν μέλλῃ σαλπίζειν
  english_pob_choice: when he is about to sound the trumpet
  chosen_spanish: cuando está a punto de tocar la trompeta
  alternatives_spanish:
  - cuando está por tocar la trompeta
  - cuando va a tocar la trompeta
  lexicon: BDAG
  rationale: μέλλῃ + infinitivo expresa inminencia; en español, «está a punto de» lo comunica con naturalidad. σαλπίζω aquí requiere explicitar «la trompeta» para una lectura clara y fiel.
- source_word: καὶ ἐτελέσθη
  english_pob_choice: then ... is fulfilled
  chosen_spanish: entonces se habrá cumplido
  alternatives_spanish:
  - entonces se cumple
  - entonces fue cumplido
  lexicon: BDAG
  rationale: El aoristo pasivo de τελέω puede expresar cumplimiento/realización. Dado el marco temporal futuro de la cláusula anterior, el futuro perfecto en español («se habrá cumplido») comunica bien el estado resultante al momento indicado, sin reducir el sentido a mero término o finalización.
- source_word: τὸ μυστήριον τοῦ θεοῦ
  english_pob_choice: the mystery of God
  chosen_spanish: el misterio de Dios
  alternatives_spanish:
  - el secreto de Dios
  - el propósito secreto de Dios
  lexicon: BDAG
  rationale: «Misterio» es el término bíblico estable para μυστήριον y preserva la carga teológica de una realidad divina antes oculta y ahora llevada a término/revelada.
- source_word: ὡς εὐηγγέλισεν
  english_pob_choice: just as he proclaimed the good news
  chosen_spanish: así como lo anunció
  alternatives_spanish:
  - así como proclamó las buenas noticias
  - así como les anunció el evangelio
  lexicon: BDAG
  rationale: εὐαγγελίζω es «anunciar buenas noticias». En español, «anunció» mantiene el verbo y evita una construcción pesada; el objeto implícito se recupera por el contexto del «misterio de Dios» y la acción previa de proclamación.
- source_word: τοὺς ἑαυτοῦ δούλους
  english_pob_choice: his own slaves
  chosen_spanish: a sus propios esclavos
  alternatives_spanish:
  - a sus propios siervos
  - a sus propios siervos esclavos
  lexicon: BDAG
  rationale: Se conserva «esclavos» para reflejar el peso léxico de δοῦλος, coherente con la guía POB sobre términos controvertidos. El posesivo intensificado por ἑαυτοῦ se expresa con «propios».
- source_word: τοὺς προφήτας
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas de Dios
  lexicon: BDAG
  rationale: El acusativo en aposición identifica cuáles son esos esclavos; «los profetas» debe mantenerse sin expansión innecesaria.
theological_decisions:
- issue: Valor de δοῦλος aplicado a los profetas de Dios
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La referencia a «sus propios» subraya pertenencia y dependencia real de Dios. «Esclavos» preserva esa relación vinculante y la tensión terminológica que el POB documenta, sin suavizarla con un término más tradicional pero menos preciso.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1 and §5'
- issue: Sentido de ἐτελέσθη con τὸ μυστήριον τοῦ θεοῦ
  english_pob_reading: is fulfilled
  chosen_spanish_reading: se habrá cumplido
  alternative_spanish_readings:
  - se cumple
  - ha sido cumplido
  - se ha realizado
  rationale: En el contexto inmediato, el evento está ligado al momento anunciado por el séptimo ángel. El futuro perfecto en español expresa adecuadamente que, para ese punto temporal, el misterio ya habrá alcanzado su cumplimiento/realización, sin perder la idea salvífico-escatológica de «misterio».
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La base inglesa más reciente volvió a «slaves» tras una corrección regresiva que había suavizado δοῦλος a «servants». También se ajustó «was fulfilled» a «is fulfilled» por la relación temporal con la cláusula futura. La versión española mantiene la fuerza léxica de δοῦλος y resuelve la relación temporal con un futuro perfecto natural en español.
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplica aquí; no hay tetragrámaton en el versículo.
  - «Misterio» se conserva de forma consistente para μυστήριον, sin convertirlo en «secreto» para no perder el término bíblico técnico.
  - «Esclavos» se usa de manera deliberada y uniforme para δοῦλος en esta unidad, conforme a la guía POB.
  - La cláusula temporal se formula con naturalidad española sin introducir una teología del tiempo ajena al griego.
