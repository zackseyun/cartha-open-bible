translation:
  language: es
  text: 'Entonces fui al ángel, diciéndole que me diera el librito[a]. Y él me dice[b]: «Toma y cómelo, y amargará tu vientre[c], pero en tu boca será dulce como la miel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pequeño libro». El término griego βιβλαρίδιον es diminutivo y puede designar un rollo pequeño o un librito.
    reason: lexical_alternative
  - marker: b
    text: O «me dijo». El griego usa un presente histórico («me dice») para dar viveza al relato.
    reason: lexical_alternative
  - marker: c
    text: O «estómago». Griego κοιλία, en este contexto de comer y digerir, puede referirse al vientre o al órgano digestivo interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθα
  english_pob_choice: I went
  chosen_spanish: fui
  alternatives_spanish:
  - me fui
  - fui hacia
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι expresa aquí el movimiento de Juan hacia el ángel. «Fui» suena natural en español y conserva la dirección indicada por πρὸς τὸν ἄγγελον sin añadir matices innecesarios.
- source_word: λέγων αὐτῷ δοῦναί μοι
  english_pob_choice: telling him to give me
  chosen_spanish: diciéndole que me diera
  alternatives_spanish:
  - 'diciéndole: «Dame»'
  - pidiéndole que me diera
  lexicon: BDAG
  rationale: La combinación de participio con infinitivo expresa el contenido del habla acompañante. «Diciéndole que me diera» reproduce bien esa relación en español, sin sobreinterpretar como petición cortés ni volver la frase excesivamente literal.
- source_word: βιβλαρίδιον
  english_pob_choice: little scroll
  chosen_spanish: librito
  alternatives_spanish:
  - pequeño rollo
  - pequeño libro
  lexicon: BDAG
  rationale: El diminutivo griego puede señalar un rollo pequeño o un librito. Dado que en español «librito» transmite de manera natural el diminutivo y mantiene la apertura semántica del término, se usa aquí; las alternativas se preservan por la ambigüedad material del objeto.
- source_word: λέγει μοι
  english_pob_choice: he says to me
  chosen_spanish: él me dice
  alternatives_spanish:
  - él me dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego para mantener la viveza narrativa. «Él me dice» reproduce esa inmediatez sin perder claridad en español.
- source_word: Λάβε
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  lexicon: BDAG
  rationale: El imperativo aoristo de λαμβάνω se expresa con «Toma», que es directo y natural. No se añade «lo» porque el pronombre aparece ya en la línea siguiente.
- source_word: κατάφαγε αὐτό
  english_pob_choice: eat it
  chosen_spanish: cómelo
  alternatives_spanish:
  - trúfalo
  - devóralo
  lexicon: BDAG
  rationale: El compuesto intensivo κατεσθίω requiere una traducción verbal que conserve la acción de comer el objeto. En español, «cómelo» mantiene la sencillez de la orden y la metáfora sin exagerar como «devóralo»; se evita una forma poco natural o demasiado interpretativa.
- source_word: πικρανεῖ σου τὴν κοιλίαν
  english_pob_choice: it will make your stomach bitter
  chosen_spanish: amargará tu vientre
  alternatives_spanish:
  - te amargará el vientre
  - amargará tu estómago
  lexicon: BDAG
  rationale: πικραίνω se traduce con el verbo de sabor/afecto «amargar», que preserva la imagen de amargura. κοιλία puede ser «vientre» o «estómago»; aquí «vientre» conserva mejor el eco bíblico y la concreción corporal del griego, sin perder inteligibilidad.
- source_word: γλυκὺ ὡς μέλι
  english_pob_choice: sweet like honey
  chosen_spanish: dulce como la miel
  alternatives_spanish:
  - dulce como miel
  lexicon: BDAG
  rationale: La comparación se mantiene literalmente con una construcción idiomática natural en español. «Dulce como la miel» preserva el símil sin alterar su fuerza.
theological_decisions:
- issue: Acto simbólico de comer el rollo
  english_pob_reading: Retained the concrete command 'Take and eat it' without interpreting its symbolism in the translation.
  chosen_spanish_reading: Se conserva la orden concreta «Toma y cómelo» sin añadir una explicación del simbolismo en el texto principal.
  alternative_spanish_readings:
  - «Recibe y come» con glosa interpretativa sobre internalizar el mensaje
  - traducciones que expliquen abiertamente la acción como asimilación profética
  rationale: El pasaje presenta una acción profética simbólica, pero la traducción no debe insertar una explicación que el texto no formula explícitamente. Mantener la imagen permite que la tensión teológica permanezca visible para el lector.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado revisado del POB inglés, que eliminó el «up» de «eat it up» para acercarse más al griego sin perder naturalidad. Aquí se refleja esa misma cautela: se conserva la fuerza del imperativo y del simbolismo, evitando añadir explicaciones o intensificadores no necesarios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa pertinente.
  - Se usa «librito» para reflejar el diminutivo de βιβλαρίδιον y para evitar fijar prematuramente la forma física del objeto.
  - «Vientre» se escogió para respetar el campo semántico corporal del griego y la posible resonancia bíblica; la nota permite la alternativa «estómago».
  - El presente histórico «me dice» conserva el efecto narrativo del griego y coincide con la decisión inglesa auditada.
