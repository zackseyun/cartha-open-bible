    text: O «estómago». Griego κοιλία, en este contexto de comer y digerir, puede referirse al vientre o al órgano digestivo interior.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre βιβλαρίδιον para que recaiga en «librito», se añade la nota faltante sobre el presente histórico de λέγει μοι en línea con el aparato inglés, y se mejora levemente la fluidez narrativa cambiando «Así» por «Entonces». No se requieren cambios doctrinales ni semánticos mayores.
