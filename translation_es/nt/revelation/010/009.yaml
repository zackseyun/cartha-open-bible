revisions:
- from: 'Así fui al ángel[a], diciéndole que me diera el librito. Y él me dice: «Toma y cómelo, y amargará tu vientre[b], pero en tu boca será dulce como la miel».'
  to: 'Entonces fui al ángel, diciéndole que me diera el librito[a]. Y él me dice[b]: «Toma y cómelo, y amargará tu vientre[c], pero en tu boca será dulce como la miel».'
  rationale: Se corrige el anclaje de la nota sobre βιβλαρίδιον para que recaiga en «librito», se añade la nota faltante sobre el presente histórico de λέγει μοι en línea con el aparato inglés, y se mejora levemente la fluidez narrativa cambiando «Así» por «Entonces». No se requieren cambios doctrinales ni semánticos mayores.
