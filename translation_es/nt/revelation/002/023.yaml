translation:
  language: es
  text: Y mataré a sus hijos con muerte[a]; y todas las iglesias sabrán que yo soy el que escudriña la mente y el corazón[b], y daré a cada uno de ustedes según sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con pestilencia'; el griego dice literalmente 'con muerte', un modismo que puede intensificar el juicio o evocar lenguaje veterotestamentario de juicio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'riñones y corazones', un modismo bíblico para la persona interior, incluidas las motivaciones, los pensamientos y los deseos.
    reason: cultural_note
lexical_decisions:
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  - hijos espirituales
  lexicon: BDAG
  rationale: El griego τέκνα suele referirse a hijos o descendencia. En español, 'hijos' es natural y puede abarcar tanto sentido literal como figurado, manteniendo la ambigüedad del contexto sin añadir una interpretación explícita.
- source_word: ἀποκτενῶ
  english_pob_choice: I will kill
  chosen_spanish: mataré
  alternatives_spanish:
  - daré muerte
  - haré morir
  - pondré a muerte
  lexicon: BDAG
  rationale: El verbo expresa matar de forma directa. 'Mataré' es la equivalencia más clara y transparente en español, sin suavizar la fuerza judicial del enunciado.
- source_word: ἐν θανάτῳ
  english_pob_choice: with death
  chosen_spanish: con muerte
  alternatives_spanish:
  - por muerte
  - con pestilencia
  - mediante muerte
  lexicon: BDAG
  rationale: La frase es idiomática y difícil. 'Con muerte' conserva la literalidad y la tensión del griego, dejando abierta la posible resonancia con lenguaje bíblico de juicio sin resolverla en la traducción principal.
- source_word: γνώσονται
  english_pob_choice: will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: BDAG
  rationale: En este contexto, 'sabrán' comunica de manera natural el reconocimiento resultante que expresa el futuro de γινώσκω.
- source_word: ἐκκλησίαι
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - asambleas
  - congregaciones
  lexicon: BDAG
  rationale: En Apocalipsis, el término se refiere a las comunidades cristianas destinatarias. 'Iglesias' es el equivalente más reconocido y adecuado en español.
- source_word: ὁ ἐραυνῶν
  english_pob_choice: the one who searches
  chosen_spanish: el que escudriña
  alternatives_spanish:
  - el que busca
  - el que examina
  - el que sondea
  lexicon: BDAG
  rationale: '''Escudriña'' mantiene el matiz intenso de examinar a fondo y encaja bien con el tono judicial del pasaje. Además, en español bíblico conserva la idea de penetrar lo oculto.'
- source_word: νεφροὺς
  english_pob_choice: minds
  chosen_spanish: riñones
  alternatives_spanish:
  - entrañas
  - lo profundo del ser
  - interior
  lexicon: BDAG
  rationale: El griego dice literalmente 'riñones', un hebraísmo/idioma antropológico para el interior oculto. A diferencia de la opción inglesa 'minds', en español conviene preservar el término corporal para no borrar la tensión lexical; el lector puede captar la nota idiomática en el texto y la nota al pie.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - corazón
  - interior
  lexicon: BDAG
  rationale: '''Corazones'' reproduce el plural griego y mantiene el paralelismo con ''riñones''. En español bíblico, ''corazón'' comunica el centro de la voluntad, pensamientos y afectos.'
- source_word: δώσω
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - recompensaré
  - pagaré
  - daré retribución
  lexicon: BDAG
  rationale: El verbo básico es 'dar', y en este contexto judicial connota retribución. 'Daré' conserva la forma del griego y deja que el contexto aporte el sentido de recompensa o juicio.
- source_word: ἑκάστῳ
  english_pob_choice: to each of you
  chosen_spanish: a cada uno de ustedes
  alternatives_spanish:
  - a cada uno
  - a cada uno de vosotros
  lexicon: BDAG
  rationale: La construcción distributiva con el dativo plural se expresa naturalmente en español con 'a cada uno de ustedes', que mantiene la referencia al grupo destinatario.
- source_word: κατὰ τὰ ἔργα ὑμῶν
  english_pob_choice: according to your works
  chosen_spanish: según sus obras
  alternatives_spanish:
  - según sus hechos
  - de acuerdo con sus obras
  - según lo que han hecho
  lexicon: BDAG
  rationale: '''Obras'' preserva la fórmula bíblica y la correspondencia lexical con ἔργα. En español, ''según sus obras'' suena natural y mantiene el peso retributivo del pasaje.'
theological_decisions:
- issue: Identidad del que habla como el que escudriña el interior
  english_pob_reading: Retain the first-person self-identification ('I am the one who searches minds and hearts') as a claim of divine-like judicial knowledge by the risen Jesus.
  chosen_spanish_reading: Mantener la autoidentificación en primera persona ('yo soy el que escudriña corazones y riñones') como una afirmación de conocimiento judicial propio del Cristo resucitado.
  alternative_spanish_readings:
  - suavizar la frase para que signifique solo observación general
  - reinterpretarla como mera omnisciencia abstracta
  rationale: El griego presenta una afirmación fuerte de autoidentidad y juicio. La traducción debe conservar ese peso teológico sin diluirlo ni resolver la tensión.
  doctrine_reference: Credo Niceno (381 d.C.); principio de preservar tensiones teológicas en la traducción.
- issue: Sentido de 'sus hijos'
  english_pob_reading: Leave the phrase open to literal or figurative sense in the main text.
  chosen_spanish_reading: Dejar abierta en el texto principal la posibilidad de sentido literal o figurado.
  alternative_spanish_readings:
  - identificar explícitamente a los hijos como descendencia biológica
  - identificarlos explícitamente como seguidores o discípulos
  rationale: El contexto puede sugerir seguidores asociados con Jezabel, pero el griego no obliga a una glosa interpretativa. La traducción española mantiene la ambigüedad heredada del texto fuente.
  doctrine_reference: Principio de preservar la tensión interpretativa sin cerrarla.
translation_notes:
  revision_awareness: Esta versión sigue la revisión más reciente del inglés POB, que mantuvo la estructura del versículo y solo ajustó el orden de 'hearts and minds' a una forma más natural. En español, la decisión equivalente fue conservar el paralelismo bíblico con 'corazones y riñones' y la forma judicial del enunciado, sin añadir paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se conserva 'obras' para ἔργα, en coherencia con la fórmula bíblica de retribución.
  - Se usa 'iglesias' para ἐκκλησίαι, como término eclesial estándar en Apocalipsis.
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - La nota sobre 'riñones' evita sustituir la imagen corporal por una abstracción como 'mente', para no borrar la tensión lexical del original.
