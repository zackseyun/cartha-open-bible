  spanish_quality_summary: La redacción es mayormente clara y digna, pero 'corazones y riñones' en el texto principal suena demasiado opaco y poco natural para el español eclesial general. A diferencia de una nota explicativa, esa literalidad corporal entorpece la inteligibilidad inmediata y no sigue bien la filosofía del POB inglés, que explicitó el sentido idiomático en el texto y dejó lo literal en nota. Conviene usar una expresión idiomática comprensible en español y conservar lo literal en la nota.
