translation:
  language: es
  text: El que tiene oído, oiga lo que el Espíritu dice a las iglesias.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: The one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que posee
  lexicon: BDAG
  rationale: El participio con artículo funciona de modo sustantivo. «El que tiene» conserva el valor proverbial y singular sin sonar forzado en español.
- source_word: οὖς
  english_pob_choice: an ear
  chosen_spanish: oído
  alternatives_spanish:
  - un oído
  - oreja
  lexicon: BDAG
  rationale: Aunque el griego usa singular, en español la fórmula resulta más natural con «oído». Mantiene la idea de capacidad para oír y responder sin introducir una imagen extraña.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo aoristo de tercera singular pide una exhortación directa. «Oiga» preserva la fuerza exhortativa y la resonancia de la fórmula del Apocalipsis.
- source_word: τί
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - qué
  - aquello que
  lexicon: BDAG
  rationale: «Lo que» expresa con naturalidad el contenido de lo dicho. Es suficientemente preciso para el valor introductorio de τί.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En esta fórmula recurrente de Apocalipsis 2–3, πνεῦμα se refiere al Espíritu Santo que habla a las iglesias. La mayúscula en español ayuda a señalar ese referente.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - habla
  lexicon: BDAG
  rationale: El presente indicativo comunica habla actual o caracterizada. «Dice» es la equivalencia natural y directa en español.
- source_word: ταῖς ἐκκλησίαις
  english_pob_choice: to the churches
  chosen_spanish: a las iglesias
  alternatives_spanish:
  - a las congregaciones
  lexicon: BDAG
  rationale: En el contexto de Apocalipsis 2–3, ἐκκλησίαι denota las comunidades cristianas destinatarias. «Iglesias» es la equivalencia estable y contextualmente adecuada.
theological_decisions:
- issue: Identidad de «el Espíritu»
  english_pob_reading: the Holy Spirit speaking to the churches
  chosen_spanish_reading: el Espíritu Santo que habla a las iglesias
  alternative_spanish_readings:
  - un espíritu humano
  - el espíritu/mensaje de Jesús
  rationale: La frase repetida en Apocalipsis 2–3 presenta al Espíritu como el sujeto divino que habla. La traducción conserva «el Espíritu» sin explicarlo en el cuerpo del texto, pero la decisión lexical presupone el referente al Espíritu Santo.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El texto coincide con la lectura griega SBLGNT y con la traducción inglesa auditada; no se documentan revisiones textuales ni cambios de sentido relevantes.
  spanish_consistency_notes:
  - Se mantiene «el Espíritu» con mayúscula para señalar el referente pneumatológico del pasaje.
  - Se usa «iglesias» para ἐκκλησίαις, en línea con el uso de Apocalipsis 2–3.
  - La fórmula exhortativa conserva tono solemne y público, sin arcaísmo excesivo.
