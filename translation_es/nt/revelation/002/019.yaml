translation:
  language: es
  text: Conozco tus obras, tu amor y fe[a] y servicio y perseverancia, y tus últimas obras superan a las primeras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad». La palabra griega πίστις puede significar tanto fe como fidelidad según el contexto; en esta lista de virtudes se mantiene «fe» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδά
  english_pob_choice: I know
  chosen_spanish: Conozco
  alternatives_spanish:
  - Sé
  - He conocido
  lexicon: BDAG
  rationale: οἶδα tiene fuerza de conocimiento actual y seguro. En español, «conozco» comunica bien ese valor estativo sin sonar forzado; «sé» sería también posible, pero «conozco tus obras» resulta más natural en este marco evaluativo.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - obras realizadas
  lexicon: BDAG
  rationale: ἔργα refiere a acciones concretas. «Obras» preserva la repetición del término y funciona con el tono valorativo del pasaje; es el equivalente más estable para esta unidad.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor cristiano
  - caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce de forma natural y directa como «amor». «Caridad» sería más tradicional pero menos precisa aquí y podría restringir indebidamente el sentido.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La opción base en POB es «faith». En español, «fe» es la correspondencia más directa y natural. Se conserva la tensión con «fidelidad» en nota, porque el contexto de virtudes permite ambas lecturas.
- source_word: διακονίαν
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - atención
  lexicon: BDAG
  rationale: διακονία designa servicio práctico o ministerial. «Servicio» comunica el sentido sin introducir de manera automática una función eclesiástica técnica que el griego no exige aquí.
- source_word: ὑπομονήν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - paciencia
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: ὑπομονή en Apocalipsis suele implicar aguante firme bajo presión. «Perseverancia» expresa bien esa constancia sostenida y es idiomática en español; «paciencia» puede sonar demasiado pasiva.
- source_word: τὰ ἔργα σου τὰ ἔσχατα
  english_pob_choice: your latter works
  chosen_spanish: tus últimas obras
  alternatives_spanish:
  - tus obras posteriores
  - tus obras últimas
  - tus obras recientes
  lexicon: BDAG
  rationale: ἔσχατα aquí es temporal/comparativo, no necesariamente escatológico. «Últimas» conserva la relación con «primeras» y mantiene el contraste del griego, sin forzar una connotación finalista.
- source_word: πλείονα τῶν πρώτων
  english_pob_choice: exceed the first
  chosen_spanish: son más que las primeras
  alternatives_spanish:
  - superan a las primeras
  - exceden a las primeras
  - son mayores que las primeras
  lexicon: BDAG
  rationale: πλείονα expresa comparación de cantidad o grado. «Son más que las primeras» es fiel y claro en español, y refleja el contraste con τῶν πρώτων sin añadir matices ajenos.
theological_decisions:
- issue: Sentido de πίστις en la lista de virtudes
  english_pob_reading: faith, with a footnoted alternative 'faithfulness'
  chosen_spanish_reading: fe, con alternativa «fidelidad» en nota
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: El contexto admite tanto confianza en Dios/Mesías como fidelidad o lealtad mostrada en la conducta. Se mantiene «fe» en el texto principal por continuidad lexical y porque es la opción más reconocible; la nota preserva la alternativa semántica sin borrar la tensión.
  doctrine_reference: 'DOCTRINE.md: πίστις como término disputado; conservar alternativas en nota cuando el contexto permita más de una lectura'
- issue: Valor de ὑπομονή en Apocalipsis
  english_pob_reading: endurance
  chosen_spanish_reading: perseverancia
  alternative_spanish_readings:
  - endurecimiento
  - paciencia
  - constancia
  rationale: En Apocalipsis, ὑπομονή suele implicar aguante fiel frente a presión o prueba. «Perseverancia» comunica esa firmeza sostenida mejor que «paciencia», que en español puede sonar solamente a trato calmado o tolerante.
  doctrine_reference: Uso contextual de ὑπομονή en la literatura apocalíptica y exhortativa
- issue: Relación entre τὰ ἔσχατα y τὰ πρώτα
  english_pob_reading: latter works ... the first
  chosen_spanish_reading: tus últimas obras ... las primeras
  alternative_spanish_readings:
  - tus obras posteriores ... las primeras
  - tus obras recientes ... las primeras
  rationale: 'La comparación es temporal y evaluativa: las obras posteriores superan a las primeras. «Últimas» preserva la correspondencia formal con «primeras» y evita una paráfrasis demasiado libre.'
  doctrine_reference: Lectura comparativa del sintagma τὰ ἔσχατα πλείονα τῶν πρώτων
translation_notes:
  revision_awareness: 'El contexto inglés de POB fue revisado para que la última cláusula sonara más natural: de una formulación tipo ''last works are more than the first'' a ''latter works exceed the first''. En español se refleja esa misma mejora con una construcción clara y formal: ''tus últimas obras son más que las primeras'', sin perder el contraste comparativo del griego.'
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y evaluativo propio de Apocalipsis 2–3.
  - Se prefirió «obras» sobre opciones más interpretativas como «hechos» para conservar la repetición del término griego.
  - Se evitó «SEÑOR» o sustituciones litúrgicas no presentes en el versículo.
  - Se conservó la enumeración sin añadir conectores explicativos que alteren el paralelismo del original.
