review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego y conserva la lista de virtudes, además de mantener en nota la alternativa de πίστις = «fidelidad». Sin embargo, presenta dos problemas de fidelidad/claridad: la nota [a] sobre «obras» es innecesaria y defectuosa porque ofrece como alternativa la misma palabra del texto, y la cláusula final «son más que las primeras» suena poco idiomática y expresa con menos precisión el comparativo πλείονα τῶν πρώτων que una forma como «superan a».'
  spanish_quality_summary: 'El español es mayormente claro y digno. «Conozco tus obras, tu amor y fe y servicio y perseverancia» es legible, aunque la coordinación es algo desnuda; no obstante, es aceptable por cercanía al original. La mejora principal es estilística y semántica en la cláusula final: «tus últimas obras superan a las primeras» suena más natural y preciso. También conviene eliminar la nota [a], que no aporta y crea confusión editorial.'
  glossary_alignment: 'La terminología clave está alineada: ἀγάπη = «amor», πίστις = «fe» con nota «fidelidad», διακονία = «servicio», ὑπομονή = «perseverancia». No hay conflictos con los defaults del proyecto. «Últimas» es posible para ἔσχατα, pero «posteriores» sería algo más nítido; aun así, el problema principal está en «son más que», no en «últimas».'
  issues:
  - severity: medium
    issue: La nota [a] sobre «obras» es impropia e innecesaria.
    rationale: La nota dice «O «obras»», repitiendo exactamente el término del texto principal en vez de ofrecer una alternativa real. Además, el inglés POB solo nota πίστις, no ἔργα. Mantener esta nota debilita la calidad editorial y no preserva ninguna ambigüedad significativa del original.
  - severity: medium
    issue: La cláusula final «tus últimas obras son más que las primeras» es poco idiomática en español.
    rationale: Aunque intenta reflejar πλείονα, en español «son más que» suena torpe y menos preciso. El sentido comparativo es que las obras posteriores exceden o superan a las primeras; «superan a las primeras» transmite mejor el valor del griego y también el ajuste ya documentado en el audit trail inglés («exceed the first»).
  revised_spanish_text: Conozco tus obras, tu amor y fe[a] y servicio y perseverancia, y tus últimas obras superan a las primeras.
  revised_footnotes:
  - marker: a
    text: O «fidelidad». La palabra griega πίστις puede significar tanto fe como fidelidad según el contexto; en esta lista de virtudes se mantiene «fe» en el texto principal.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre «obras», se conserva la nota importante sobre πίστις/«fidelidad», y se mejora la cláusula final para expresar de manera más natural y fiel el comparativo griego πλείονα τῶν πρώτων.
