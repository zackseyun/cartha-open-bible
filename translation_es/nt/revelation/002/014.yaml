  rationale: Se corrige el anclaje de la nota para que corresponda a «los hijos de Israel», se mejora la naturalidad de κρατοῦντας con «se aferran a», y se hace explícito el sentido de εἰδωλόθυτα como «alimentos sacrificados a los ídolos». No se requiere adjudicación adicional porque son ajustes menores y claros.
