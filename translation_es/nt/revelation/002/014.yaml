review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en la estructura principal: «tengo ... contra ti», «la enseñanza de Balaam», «enseñaba a Balac», «delante de los hijos de Israel» y la doble finalidad infinitiva. Sin embargo, hay dos desajustes de fidelidad/claridad: (1) el marcador [a] está anclado a «tropiezo», pero la nota trata de «los hijos de Israel»; (2) «cosas sacrificadas a los ídolos» pierde la idea explícita de comida/alimento presente en εἰδωλόθυτα y preservada en el inglés POB.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «retienen la enseñanza» suena menos natural en este contexto de adhesión doctrinal que «se aferran a» o «mantienen». Además, «cometer inmoralidad sexual» es comprensible, pero «cometer inmoralidad sexual» junto con «cosas sacrificadas» deja el conjunto un poco rígido. Una revisión menor mejora naturalidad y precisión sin apartarse del original.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Los nombres propios «Balaam / Balac» son aceptables en español. «Enseñanza» para διδαχή y «los hijos de Israel» para τῶν υἱῶν Ἰσραήλ concuerdan con la filosofía POB. La mejora clave es explicitar «alimentos sacrificados a los ídolos» para reflejar εἰδωλόθυτα.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al término equivocado.
    rationale: La nota explica alternativas para τῶν υἱῶν Ἰσραήλ, pero el marcador aparece en «tropiezo[a]». Esto rompe la correspondencia exigida entre texto y nota.
  - severity: medium
    issue: «cosas sacrificadas a los ídolos» es demasiado inespecífico para εἰδωλόθυτα.
    rationale: El término griego se refiere a comida/alimentos ofrecidos a ídolos. El inglés POB preserva explícitamente «food sacrificed to idols». En español conviene reflejar esa dimensión cultual-comestible.
  - severity: low
    issue: «retienen la enseñanza» suena menos idiomático que una formulación de adhesión.
    rationale: κρατοῦντας aquí expresa aferrarse o mantenerse adheridos a una enseñanza. «Se aferran a la enseñanza» resulta más natural en español contemporáneo e igual de fiel.
  revised_spanish_text: 'Pero tengo unas pocas cosas contra ti: que allí tienes a unos que se aferran a la enseñanza de Balaam, que enseñaba a Balac a poner un tropiezo delante de los hijos de Israel[a], a comer alimentos sacrificados a los ídolos y a cometer inmoralidad sexual.'
  revised_footnotes:
