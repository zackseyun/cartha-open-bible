revisions:
- from: 'Pero tengo unas pocas cosas contra ti: que allí tienes a unos que retienen la enseñanza de Balaam, que enseñaba a Balac a poner un tropiezo[a] delante de los hijos de Israel, a comer cosas sacrificadas a los ídolos y a cometer inmoralidad sexual.'
