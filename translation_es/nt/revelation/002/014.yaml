translation:
  language: es
  text: 'Pero tengo unas pocas cosas contra ti: que allí tienes a unos que se aferran a la enseñanza de Balaam, que enseñaba a Balac a poner un tropiezo delante de los hijos de Israel[a], a comer alimentos sacrificados a los ídolos y a cometer inmoralidad sexual.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El griego dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀλίγα
  english_pob_choice: a few things
  chosen_spanish: unas pocas cosas
  alternatives_spanish:
  - pocas cosas
  - unas cuantas cosas
  lexicon: BDAG
  rationale: El neutro plural con ἔχω κατὰ σοῦ exige explicitar el objeto implícito. «Unas pocas cosas contra ti» es natural en español y conserva el matiz de cantidad pequeña sin añadir contenido.
- source_word: κρατοῦντας
  english_pob_choice: hold to
  chosen_spanish: retienen
  alternatives_spanish:
  - se aferran a
  - mantienen
  lexicon: BDAG
  rationale: Aquí el participio expresa adhesión persistente a una enseñanza, no una sujeción física. «Retener» reproduce bien la idea de mantener y aferrarse a una doctrina o enseñanza.
- source_word: διδαχὴν
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  lexicon: BDAG
  rationale: «Enseñanza» es más natural y menos eclesiástico que «doctrina», y sigue de cerca el sentido de contenido enseñado. Se evita cargar el término con un registro técnico no necesario.
- source_word: Βαλαάμ / Βαλὰκ
  english_pob_choice: Balaam / Balak
  chosen_spanish: Balaam / Balac
  alternatives_spanish:
  - Balaam / Balak
  lexicon: Nombres propios bíblicos en uso español
  rationale: «Balac» es la forma española tradicional y ampliamente reconocible del nombre Βαλάκ. Se mantiene «Balaam» porque coincide con la forma española usual y no requiere adaptación adicional.
- source_word: ἐδίδασκεν τῷ Βαλὰκ
  english_pob_choice: taught Balak
  chosen_spanish: enseñaba a Balac
  alternatives_spanish:
  - enseñó a Balac
  lexicon: BDAG
  rationale: El imperfecto griego sugiere acción característica o en desarrollo en el recuerdo narrativo. «Enseñaba» preserva mejor ese aspecto que un simple pretérito perfecto; además, la estructura con «a» refleja el dativo personal.
- source_word: βαλεῖν σκάνδαλον
  english_pob_choice: to put a stumbling block
  chosen_spanish: a poner un tropiezo
  alternatives_spanish:
  - a poner un obstáculo
  - a hacer caer
  lexicon: BDAG
  rationale: Se conserva la metáfora de obstáculo moral con un giro natural en español. «Tropiezo» refleja bien σκάνδαλον sin desactivar la imagen de caída o caída en pecado.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» encaja con la metáfora espacial de σκάνδαλον y resulta claro en español contemporáneo. Es más idiomático que una calca rígida y conserva la relación espacial.
- source_word: τῶν υἱῶν Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: BDAG
  rationale: Se conserva la expresión masculina explícita del griego. «Los hijos de Israel» es fiel, reconocible y mantiene la fuerza del término sin neutralizarlo.
- source_word: φαγεῖν εἰδωλόθυτα
  english_pob_choice: to eat food sacrificed to idols
  chosen_spanish: a comer cosas sacrificadas a los ídolos
  alternatives_spanish:
  - a comer alimento sacrificado a los ídolos
  - a comer carne ofrecida a los ídolos
  lexicon: BDAG
  rationale: εἰδωλόθυτα designa lo sacrificado a los ídolos; en español, «cosas sacrificadas a los ídolos» mantiene la referencia cultual sin precisar indebidamente si se trata de comida, carne o un tipo concreto de ofrenda. Se preserva así la amplitud del término griego.
- source_word: πορνεῦσαι
  english_pob_choice: to commit sexual immorality
  chosen_spanish: a cometer inmoralidad sexual
  alternatives_spanish:
  - a practicar inmoralidad sexual
  - a fornicar
  lexicon: BDAG
  rationale: «Inmoralidad sexual» es una forma clara y contemporánea para πορνεύω, que abarca conducta sexual ilícita en general. Se evita restringir el término a una práctica específica que el griego no delimita aquí.
theological_decisions:
- issue: Si traducir τῶν υἱῶν Ἰσραήλ con una expresión neutral o mantener la forma masculina explícita
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos / las hijas de Israel
  rationale: El griego usa explícitamente «hijos» y la línea editorial POB prefiere conservar ese dato cuando no hay razón contextual para neutralizarlo. «Los israelitas» sería más genérico, pero perdería la marca masculina del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cómo representar σκάνδαλον sin eliminar la metáfora
  english_pob_reading: stumbling block
  chosen_spanish_reading: tropiezo
  alternative_spanish_readings:
  - obstáculo
  - ocasión de pecado
  rationale: «Tropiezo» conserva la imagen de caída o desvío inducido por la acción de Balaam y Balac. Otras opciones interpretan más de lo necesario o diluyen la fuerza metafórica del término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Si πορνεῦσαι debe especificarse como inmoralidad sexual o como fornicación
  english_pob_reading: to commit sexual immorality
  chosen_spanish_reading: a cometer inmoralidad sexual
  alternative_spanish_readings:
  - a fornicar
  - a practicar inmoralidad sexual
  rationale: El término griego es amplio y no se limita a una sola forma de pecado sexual. «Inmoralidad sexual» conserva el alcance general y evita una restricción indebida o un arcaísmo menos transparente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que prefirió «taught» sobre «was teaching» para reflejar de manera más natural el imperfecto griego en este contexto. En español se reflejó esa decisión con «enseñaba», que conserva el valor aspectual sin sonar forzado. También se mantuvo la estructura breve de acusación («Pero tengo unas pocas cosas contra ti») y la serie de infinitivos coordinados del original.
  spanish_consistency_notes:
  - Se conserva el tratamiento directo singular de la comunidad («ti»).
  - Se mantiene el registro bíblico sobrio, evitando términos excesivamente técnicos cuando el español común basta.
  - «Hijos de Israel» se usa de forma consistente con la forma masculina explícita del griego y con la filosofía POB de precisión de género cuando es textual.
  - «Tropiezo» se eligió como metáfora estable y comprensible para σκάνδαλον, coherente con el audit trail inglés.
  - No se introdujo «Cristo» ni «Señor» porque este versículo no contiene esos términos.
