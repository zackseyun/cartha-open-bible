translation:
  language: es
  text: Así como yo también he recibido de mi Padre[a], le daré la estrella de la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la estrella del alba». La expresión puede aludir a imaginería real mesiánica y también anticipar Apocalipsis 22:16, donde Jesús se identifica como «la brillante estrella de la mañana».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justo como
  lexicon: BDAG
  rationale: ὡς introduce comparación de correspondencia. «Tal como» comunica bien esa relación en español natural sin volverla mecánica.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - yo asimismo
  - también yo
  lexicon: BDAG
  rationale: La crasis enfatiza la adición y la correspondencia. «Yo también» conserva esa fuerza de manera idiomática.
- source_word: εἴληφα
  english_pob_choice: have received
  chosen_spanish: he recibido
  alternatives_spanish:
  - recibí
  - he tomado
  lexicon: BDAG
  rationale: El perfecto griego indica recepción completada con resultado vigente. El pretérito perfecto compuesto español lo refleja mejor que un pasado simple.
- source_word: παρὰ τοῦ πατρός μου
  english_pob_choice: from my Father
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de parte de mi Padre
  - de junto a mi Padre
  lexicon: BDAG
  rationale: παρά con genitivo expresa procedencia/origen. «De mi Padre» es la forma más natural en español y mantiene la relación filial explícita.
- source_word: δώσω αὐτῷ
  english_pob_choice: I will give him
  chosen_spanish: le daré
  alternatives_spanish:
  - se lo daré
  - daré a él
  lexicon: BDAG
  rationale: El futuro y el dativo se expresan de forma directa con «le daré», que suena natural y conserva el destinatario sin carga explicativa añadida.
- source_word: τὸν ἀστέρα τὸν πρωϊνόν
  english_pob_choice: the morning star
  chosen_spanish: la estrella de la mañana
  alternatives_spanish:
  - la estrella matutina
  - la estrella del alba
  lexicon: BDAG
  rationale: La construcción artículo-adjetivo se vierte de modo idiomático como «la estrella de la mañana». «Del alba» o «matutina» son posibles, pero menos transparentes para lectura pública.
theological_decisions:
- issue: Significado de «la estrella de la mañana»
  english_pob_reading: Retain the expression as 'the morning star' without explicating it in the main text.
  chosen_spanish_reading: Conservar «la estrella de la mañana» sin explicarla en el cuerpo del texto.
  alternative_spanish_readings:
  - el astro del alba
  - una imagen del Mesías victorioso
  - una referencia directa a Cristo
  rationale: El símbolo tiene resonancias reales, pero el versículo no lo define de forma explícita. Mantener la imagen preserva la tensión teológica y deja abierta la posible alusión mesiánica y la conexión intratextual con Apocalipsis 22:16.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Relación cristológica en «de mi Padre»
  english_pob_reading: Translate directly as 'from my Father' without adding explanatory wording about authority or eternal relation.
  chosen_spanish_reading: Traducir directamente «de mi Padre» sin añadir glosa sobre autoridad delegada o relación eterna.
  alternative_spanish_readings:
  - por autoridad de mi Padre
  - de parte de mi Padre en sentido de comisión
  rationale: El texto afirma procedencia y filiación; no conviene sobreinterpretar en la línea de traducción. La formulación española mantiene la tensión entre recepción, origen y relación filial.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requerían cambios respecto del paso de revisión indicado como sin cambios. La redacción conserva la comparación del griego, el perfecto de recepción y la imagen metafórica sin resolverla en exceso.'
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por referencia divina directa.
  - Se conserva «yo también» para reflejar la fuerza aditiva de κἀγώ.
  - «Estrella de la mañana» sigue la terminología pública más clara y coherente con el audit trail inglés.
  - No se introduce «Cristo» en el texto principal, en coherencia con el hebreo/greco fuente y la decisión auditada de preservar la imagen.
  - El tratamiento de tiempos verbales busca reflejar el perfecto griego sin volver el español rígido.
