revisions:
- from: 'Pero tengo esto contra ti: toleras a la mujer Jezabel[a][b], que se llama a sí misma profetisa y enseña y desvía a mis esclavos[c] a cometer inmoralidad sexual y a comer comida sacrificada a los ídolos.'
