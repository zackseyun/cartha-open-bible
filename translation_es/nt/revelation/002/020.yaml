review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la acusación, la tolerancia culpable, la autoafirmación como profetisa, la enseñanza y el extravío, y los dos infinitivos finales. También preserva correctamente «la mujer Jezabel» frente a la variante «tu esposa Jezabel», y mantiene «mis esclavos» conforme a la decisión léxica/doctrinal auditada para δοῦλος.'
  spanish_quality_summary: El texto es mayormente natural y digno, pero requiere un ajuste pequeño de precisión semántica y de anclaje de notas. «Desvía» es posible para πλανᾷ, pero aquí pierde el componente de engaño activo que el inglés auditado privilegia con «deceives» y que en español se expresa mejor con «engaña» o, secundariamente, «extravía». Además, la nota c está anclada a «mis esclavos», cuando en realidad corresponde al verbo πλανᾷ; el marcador debe moverse al verbo pertinente. También suena más idiomático «alimentos sacrificados a los ídolos» que «comida sacrificada a los ídolos».
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Jezabel», «profetisa», «mis esclavos». No hay términos del glosario principal en conflicto. La única corrección recomendada es ajustar πλανᾷ a «engaña» y reservar «extravía»/«lleva por mal camino» como alternativas en nota.'
  issues:
  - severity: medium
    issue: La traducción de πλανᾷ como «desvía» no refleja tan claramente el componente de engaño activo.
    rationale: El expediente inglés escogió «deceives» como lectura principal y dejó «leads astray» como alternativa. En español, «engaña» comunica mejor la fuerza básica, mientras que «extravía» o «lleva por mal camino» pueden conservarse como alternativas.
  - severity: medium
    issue: El marcador de la nota c está colocado en «mis esclavos» en vez de en el verbo correspondiente.
    rationale: La nota c documenta una alternativa para πλανᾷ, no para δοῦλος. Debe anclarse al verbo traducido para mantener trazabilidad y claridad editorial.
  - severity: low
    issue: «Comida sacrificada a los ídolos» es comprensible, pero «alimentos sacrificados a los ídolos» suena más natural y preciso en registro bíblico moderno.
    rationale: εἰδωλόθυτα se refiere a alimentos asociados con sacrificios idolátricos; «alimentos» evita una formulación algo pesada y mejora la fluidez sin cambiar el sentido.
  revised_spanish_text: 'Pero tengo esto contra ti: toleras a la mujer Jezabel[a][b], que se llama a sí misma profetisa y enseña y engaña[c] a mis esclavos a cometer inmoralidad sexual y a comer alimentos sacrificados a los ídolos.'
