  rationale: Se hace una reparación menor para alinear mejor el español con la decisión léxica auditada para πλανᾷ («engaña» como principal, con alternativas de extravío en nota), corregir el anclaje de la nota c al término correcto y mejorar la naturalidad de «alimentos sacrificados a los ídolos». No hay disputa doctrinal ni textual nueva.
