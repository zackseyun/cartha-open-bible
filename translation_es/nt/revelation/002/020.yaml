id: REV.2.20
reference: Revelation 2:20
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ἀλλὰ ἔχω κατὰ σοῦ ὅτι ἀφεῖς τὴν ⸀γυναῖκα Ἰεζάβελ, ἡ ⸀λέγουσα ἑαυτὴν προφῆτιν, καὶ διδάσκει καὶ πλανᾷ τοὺς ἐμοὺς δούλους πορνεῦσαι καὶ φαγεῖν εἰδωλόθυτα.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/020.yaml
  text: 'But I have this against you: you tolerate the woman Jezebel[c][b][a], who calls herself a prophetess and teaches and deceives my slaves to commit sexual immorality and to eat food sacrificed to idols.'
  footnotes:
  - marker: a
    text: Some manuscripts read 'your wife Jezebel' instead of 'the woman Jezebel.'
    reason: textual_variant
  - marker: b
    text: Or 'who claims to be a prophetess.'
    reason: lexical_alternative
  - marker: c
    text: Or 'deceives' may be rendered 'leads astray.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 9f183fb679e2e1e3104cb1751c5dce5907e8f56f95d305f52d8b98dbe8cd01ed
    timestamp: '2026-04-19T00:45:01Z'
    output_hash: fbe773276bc61ff0976930ead3bc36208bcbb8cd89beb6c1e41aad09b2a1b5df
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:59:32Z'
    unchanged: false
    changes_summary: 'Changed ''slaves'' to ''servants'' for more natural formal register while still accurately rendering δούλους; otherwise retained the draft. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pero tengo esto contra ti: toleras a la mujer Jezabel[a][b], que se llama a sí misma profetisa y enseña y engaña[c] a mis esclavos a cometer inmoralidad sexual y a comer alimentos sacrificados a los ídolos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «tu esposa Jezabel» en lugar de «la mujer Jezabel».
    reason: textual_variant
  - marker: b
    text: O «que afirma ser profetisa».
    reason: lexical_alternative
  - marker: c
    text: O «extravía» o «lleva por mal camino».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: Conjunción adversativa que introduce un contraste fuerte con la evaluación previa; «Pero» es natural en español y conserva el quiebre retórico.
- source_word: ἔχω κατὰ σοῦ
  english_pob_choice: I have this against you
  chosen_spanish: tengo esto contra ti
  alternatives_spanish:
  - tengo algo contra ti
  - mantengo esta acusación contra ti
  lexicon: BDAG
  rationale: El giro expresa una recriminación concreta. «Tengo esto contra ti» conserva el idiomatismo y la fuerza acusatoria sin añadir explicación.
- source_word: ἀφεῖς
  english_pob_choice: you tolerate
  chosen_spanish: toleras
  alternatives_spanish:
  - permites
  - dejas pasar
  - toleras
  lexicon: BDAG
  rationale: Aquí el verbo comunica una permisividad culpable. «Toleras» reproduce bien esa idea en español y coincide con la lectura auditada del inglés POB.
- source_word: τὴν γυναῖκα Ἰεζάβελ
  english_pob_choice: the woman Jezebel
  chosen_spanish: la mujer Jezabel
  alternatives_spanish:
  - esa mujer Jezabel
  - tu esposa Jezabel
  lexicon: BDAG
  rationale: Se mantiene la forma griega básica sin resolver la variante textual ni convertir el sintagma en una identificación distinta. «La mujer Jezabel» preserva la ambigüedad documentada.
- source_word: Ἰεζάβελ
  english_pob_choice: Jezebel
  chosen_spanish: Jezabel
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: ἡ λέγουσα ἑαυτὴν προφῆτιν
  english_pob_choice: who calls herself a prophetess
  chosen_spanish: que se llama a sí misma profetisa
  alternatives_spanish:
  - que afirma ser profetisa
  - que dice ser profetisa
  lexicon: BDAG
  rationale: La construcción participial indica autoidentificación. «Se llama a sí misma» conserva el matiz de autoatribución; «profetisa» refleja el femenino explícito del griego.
- source_word: διδάσκει
  english_pob_choice: teaches
  chosen_spanish: enseña
  alternatives_spanish:
  - está enseñando
  lexicon: BDAG
  rationale: Presente simple adecuado para actividad habitual o caracterizadora en español.
- source_word: πλανᾷ
  english_pob_choice: deceives
  chosen_spanish: desvía
  alternatives_spanish:
  - engaña
  - extravía
  - desvía
  lexicon: BDAG
  rationale: El verbo puede expresar hacer apartarse del camino recto. «Desvía» mantiene la fuerza de «leads astray» sin perder naturalidad; el español permite aquí una alternativa más concreta que «engaña».
- source_word: τοὺς ἐμοὺς δούλους
  english_pob_choice: my slaves
  chosen_spanish: mis esclavos
  alternatives_spanish:
  - mis siervos
  - mis servidores
  - mis esclavos
  lexicon: BDAG
  rationale: Se preserva la fuerza de δοῦλος con «esclavos», conforme a la política doctrinal auditada y al énfasis de pertenencia marcado por «mis».
- source_word: πορνεῦσαι
  english_pob_choice: to commit sexual immorality
  chosen_spanish: a cometer inmoralidad sexual
  alternatives_spanish:
  - a practicar inmoralidad sexual
  - a fornicar
  lexicon: BDAG
  rationale: Expresa el sentido de conducta sexual ilícita en español moderno sin restringirlo indebidamente a un solo acto o registro arcaico.
- source_word: φαγεῖν εἰδωλόθυτα
  english_pob_choice: to eat food sacrificed to idols
  chosen_spanish: a comer comida sacrificada a los ídolos
  alternatives_spanish:
  - a comer cosas sacrificadas a los ídolos
  - a comer carne ofrecida a los ídolos
  lexicon: BDAG
  rationale: Reproduce de manera transparente el referente de los alimentos vinculados al sacrificio idolátrico. «Comida sacrificada a los ídolos» es fiel y comprensible.
theological_decisions:
- issue: Identidad de Jezabel
  english_pob_reading: Retain 'Jezebel' as the name/title used in the text without specifying whether it is her literal personal name or a symbolic allusion to the OT Jezebel.
  chosen_spanish_reading: Conservar «Jezabel» sin decidir si es nombre literal o alusión simbólica.
  alternative_spanish_readings:
  - una mujer llamada Jezabel
  - una figura simbólica que evoca a la Jezabel del AT
  rationale: El texto no resuelve la cuestión. La traducción debe mantener la tensión interpretativa y no imponer una conclusión ausente en la fuente.
  doctrine_reference: Preservar la tensión teológica/textual sin resolverla
- issue: Rendering of δοῦλος
  english_pob_reading: my slaves
  chosen_spanish_reading: mis esclavos
  alternative_spanish_readings:
  - mis siervos
  - mis servidores
  rationale: La pertenencia a Cristo está marcada por el posesivo y el sustantivo más fuerte mantiene la fuerza semántica del término griego, conforme al criterio doctrinal auditado.
  doctrine_reference: 'DOCTRINE.md: δοῦλος = esclavo cuando la pertenencia ligada es saliente'
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación editorial entre «slaves» y «servants», con restitución posterior de «slaves» por coherencia doctrinal. La versión española sigue esa decisión final y mantiene «esclavos». También conserva la ambigüedad textual de «the woman Jezebel» frente a la variante «your wife Jezebel», sin resolverla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa «Yezabel/Jezabel» solo como nombre propio transliterado; no se sustituye por una equivalencia tradicional diferente.
  - «Esclavos» se reserva aquí para δοῦλοι por la relación de pertenencia expresada por «mis».
  - «Inmoralidad sexual» evita el arcaísmo y el estrechamiento semántico de «fornicación».
  - Las notas [a]-[c] están ancladas explícitamente en el texto para cumplir la trazabilidad editorial.
