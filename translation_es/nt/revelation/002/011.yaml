revisions:
- from: El que tiene oído, oiga lo que el Espíritu dice a las iglesias.[a] El que vence[b] no será en ninguna manera perjudicado por la segunda muerte.
  to: El que tiene oído, oiga lo que el Espíritu dice a las iglesias. El que vence[a] de ningún modo sufrirá daño[b] por la segunda muerte.
  rationale: 'Se reubican los marcadores para que correspondan a las mismas unidades léxicas del rastro inglés: [a] en «vence» para ὁ νικῶν y [b] en la cláusula de ἀδικηθῇ ἐκ τοῦ θανάτου τοῦ δευτέρου. También se suaviza la españolidad de la negación enfática con «de ningún modo sufrirá daño», que preserva el sentido de οὐ μὴ ἀδικηθῇ de forma más natural y clara. Se mantienen «Espíritu», «iglesias» y «segunda muerte» conforme al proyecto y a la evidencia fuente.'
