translation:
  language: es
  text: El que tiene oído, oiga lo que el Espíritu dice a las iglesias. El que vence[a] de ningún modo sufrirá daño[b] por la segunda muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que supera».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no será dañado por la segunda muerte»; más literalmente, «no será perjudicado por la segunda muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων οὖς
  english_pob_choice: The one who has an ear
  chosen_spanish: El que tiene oído
  alternatives_spanish:
  - Quien tiene oído
  - El que tiene un oído
  lexicon: BDAG
  rationale: Conservo la construcción representativa singular del participio articular con una formulación natural en español. «Oído» en singular mantiene la fórmula apocalíptica sin forzar una pluralización que el griego no tiene.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - debe oír
  lexicon: BDAG
  rationale: El aoristo imperativo en tercera singular pide una exhortación directa. «Oiga» reproduce mejor el mandato breve y solemne que una paráfrasis más explicativa.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En esta fórmula recurrente de Apocalipsis, el referente es el Espíritu Santo. La mayúscula en español señala ese referente personal sin alterar el sentido léxico de πνεῦμα.
- source_word: ταῖς ἐκκλησίαις
  english_pob_choice: to the churches
  chosen_spanish: a las iglesias
  alternatives_spanish:
  - a las congregaciones
  - a las asambleas
  lexicon: BDAG
  rationale: «Iglesias» es el equivalente más claro y natural en este contexto de Apocalipsis 2–3. «Asambleas» sería más literal, pero menos idiomático para el destinatario eclesial del pasaje.
- source_word: ὁ νικῶν
  english_pob_choice: The one who conquers
  chosen_spanish: El que vence
  alternatives_spanish:
  - El que conquista
  - El que sobrevive
  lexicon: BDAG
  rationale: «Vence» conserva el valor de vencedor/triunfador del participio presente con una expresión muy estable en español bíblico. Mantiene la fuerza aspectual de alguien caracterizado por vencer.
- source_word: οὐ μὴ ἀδικηθῇ
  english_pob_choice: will certainly not be harmed
  chosen_spanish: no será en ninguna manera perjudicado
  alternatives_spanish:
  - no será dañado en absoluto
  - de ninguna manera sufrirá daño
  lexicon: BDAG
  rationale: El pasivo de ἀδικέω puede expresar daño o perjuicio, no solo una injusticia forense. «Perjudicado» comunica bien la idea de sufrir un efecto adverso y preserva la amplitud semántica sin reducirla a «herido».
- source_word: ἐκ τοῦ θανάτου τοῦ δευτέρου
  english_pob_choice: by the second death
  chosen_spanish: por la segunda muerte
  alternatives_spanish:
  - de la segunda muerte
  - a causa de la segunda muerte
  lexicon: BDAG
  rationale: La relación ἐκ con pasivo aquí puede entenderse como procedencia o esfera causal. En español, «por la segunda muerte» conserva una relación agente/causal idiomática y evita una literalidad extraña.
- source_word: τοῦ θανάτου τοῦ δευτέρου
  english_pob_choice: the second death
  chosen_spanish: la segunda muerte
  alternatives_spanish:
  - muerte segunda
  lexicon: BDAG
  rationale: Mantengo la expresión apocalíptica establecida sin glosarla. Su carga teológica dentro de Apocalipsis debe permanecer abierta y no ser sustituida por una explicación doctrinal más amplia.
theological_decisions:
- issue: Referente de «el Espíritu»
  english_pob_reading: the Holy Spirit speaking to the churches
  chosen_spanish_reading: el Espíritu Santo hablando a las iglesias
  alternative_spanish_readings:
  - el espíritu profético hablando a las iglesias
  rationale: La fórmula en Apocalipsis presenta al Espíritu como hablante. Capitalizar «Espíritu» en español refleja ese referente divino sin añadir explicaciones ajenas al texto.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Construcción representativa singular
  english_pob_reading: retain singular masculine in 'let him hear' while using representative 'the one who' constructions
  chosen_spanish_reading: conservar el singular representativo en «oiga» y «el que»
  alternative_spanish_readings:
  - 'neutralizar con plural: «los que tienen oído, oigan»'
  rationale: El griego usa formas singulares con valor representativo. La versión española preserva esa estructura para no borrar el matiz retórico del llamado apocalíptico.
  doctrine_reference: Translation philosophy §4
- issue: Sentido de «la segunda muerte»
  english_pob_reading: preserve the expression without interpretive expansion
  chosen_spanish_reading: preservar la expresión sin expansión interpretativa
  alternative_spanish_readings:
  - identificarla explícitamente con condenación final
  - parafrasearla como castigo eterno
  rationale: La expresión tiene peso teológico propio en Apocalipsis y debe mantenerse abierta para su interpretación canónica posterior. No conviene reemplazarla por una glosa doctrinal en el versículo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide con el último pase de revisión sin cambios requeridos; la redacción española sigue el mismo perfil de equivalencia óptima y conserva las dos alternativas léxicas documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Uso «Espíritu» con mayúscula para el referente divino, coherente con el uso del POB en este contexto.
  - Conservo «iglesias» en plural, como destinatarios concretos de Apocalipsis 2–3.
  - Mantengo «segunda muerte» como expresión técnica apocalíptica no glosada en el texto principal.
  - La negación enfática se expresa con «no será en ninguna manera» para reflejar οὐ μή sin arcaísmo excesivo.
