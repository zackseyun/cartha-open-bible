review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mantiene las dos fórmulas con participio articular («El que…»), identifica correctamente «el Espíritu» y conserva «la segunda muerte» sin glosa doctrinal. Sin embargo, los marcadores de notas están invertidos respecto del contenido auditado: la nota sobre «El que vence / overcomes» debe anclarse en «vence», no en «iglesias», y la nota sobre «no será… perjudicado por la segunda muerte» debe anclarse en la segunda cláusula, no en «vence».'
  spanish_quality_summary: El español es claro y digno. No obstante, «no será en ninguna manera perjudicado» suena algo pesado y menos natural en español actual. «De ningún modo sufrirá daño» o «de ningún modo será dañado» comunica mejor la negación enfática y el sentido de ἀδικηθῇ. Además, las notas actuales contienen comillas y formulación poco pulidas para español bíblico editorial.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Espíritu» y «iglesias» están bien; no aparecen términos sensibles como Yahvé o Mesías. «El que vence» es aceptable para ὁ νικῶν, con la alternativa «El que supera»/«El que vence» no necesaria. La mejora principal es de anclaje de notas y naturalidad léxica en la cláusula final.'
  issues:
  - severity: high
    issue: Marcadores de notas al pie mal anclados
    rationale: La nota [a] contiene la alternativa para ὁ νικῶν («El que vence» / «The one who overcomes»), pero está colocada después de «iglesias». La nota [b] explica la cláusula «no será… perjudicado por la segunda muerte», pero está colocada en «vence». Esto desajusta el rastro de auditoría y puede confundir al lector.
  - severity: medium
    issue: «no será en ninguna manera perjudicado» es poco natural
    rationale: Aunque semánticamente defendible, la expresión suena rígida y poco idiomática en español moderno. El énfasis de οὐ μὴ puede expresarse mejor con «de ningún modo», y ἀδικηθῇ en este contexto se oye más natural como «sufrirá daño» o «será dañado».
  - severity: low
    issue: Redacción de notas mejorable
    rationale: La formulación actual con comillas internas y «O:» resulta torpe. Conviene una redacción editorial más limpia y alineada con el inglés auditado.
  revised_spanish_text: El que tiene oído, oiga lo que el Espíritu dice a las iglesias. El que vence[a] de ningún modo sufrirá daño[b] por la segunda muerte.
