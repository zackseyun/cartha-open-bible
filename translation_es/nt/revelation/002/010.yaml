  text: ⸀μηδὲν φοβοῦ ἃ μέλλεις ⸀πάσχειν. ⸀ἰδοὺ μέλλει ⸀βάλλειν ὁ διάβολος ἐξ ὑμῶν εἰς φυλακὴν ἵνα πειρασθῆτε, καὶ ⸀ἕξετε θλῖψιν ἡμερῶν δέκα. γίνου πιστὸς ἄχρι θανάτου, καὶ δώσω σοι τὸν στέφανον τῆς ζωῆς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/010.yaml
  text: Do not fear what you are about to suffer[a]. Look, the devil is about to throw some of you into prison so that you may be tested, and you will have tribulation for ten days. Be faithful until death[c][b], and I will give you the crown of life.
  footnotes:
  - marker: a
    text: Or 'so that you may be tempted' or 'so that you may be tried'; the Greek verb can denote testing, trial, or temptation depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Until death'' can also mean ''even to the point of death,'' implying faithfulness even if martyrdom is required.'
    reason: alternative_reading
  - marker: c
    text: The Greek word for 'crown' (stephanos) refers to a victor's wreath or award, not a royal diadem.
    reason: cultural_note
