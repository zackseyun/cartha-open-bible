translation:
  language: es
  text: No temas lo que vas a padecer. Mira, el diablo está a punto de arrojar a algunos de ustedes a la cárcel, para que sean probados[a], y tendrán tribulación por diez días. Sé fiel hasta la muerte[b], y yo te daré la corona[c] de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que sean tentados» o «para que sean puestos a prueba»; el verbo griego puede denotar prueba, ensayo o tentación según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Hasta la muerte» también puede entenderse como «hasta el punto de la muerte», lo que implica fidelidad aun si se requiere el martirio.
    reason: alternative_reading
  - marker: c
    text: La palabra griega para «corona» (stephanos) se refiere a una guirnalda o premio de vencedor, no a una diadema real.
    reason: cultural_note
lexical_decisions:
- source_word: μηδὲν φοβοῦ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas nada
  lexicon: BDAG
  rationale: El imperativo negativo con μηδέν pide prohibición de temor. «No temas» es natural, digno y directo en español, sin perder fuerza exhortativa.
- source_word: ἃ μέλλεις πάσχειν
  english_pob_choice: what you are about to suffer
  chosen_spanish: lo que vas a padecer
  alternatives_spanish:
  - lo que estás a punto de sufrir
  - lo que vas a sufrir
  lexicon: BDAG
  rationale: μέλλω + infinitivo marca inminencia, y πάσχω es «sufrir/padecer». «Vas a padecer» conserva el tono sobrio y el matiz de sufrimiento anticipado.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: BDAG
  rationale: La partícula llama la atención sobre lo que sigue. «Mira» mantiene esa función discursiva en un español moderno y claro.
- source_word: μέλλει βάλλειν
  english_pob_choice: is about to throw
  chosen_spanish: está a punto de arrojar
  alternatives_spanish:
  - va a arrojar
  - está por arrojar
  lexicon: BDAG
  rationale: Se conserva la inminencia de μέλλω y el sentido literal de βάλλω. «Arrojar» funciona mejor que «echar» o «tirar» en este registro y con el objeto «a la cárcel».
- source_word: ὁ διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: Aquí διάβολος designa al adversario personal. «El diablo» es la forma estable y precisa en español para ese referente.
- source_word: ἐξ ὑμῶν
  english_pob_choice: some of you
  chosen_spanish: a algunos de ustedes
  alternatives_spanish:
  - a algunos de vosotros
  - a algunos de entre ustedes
  lexicon: BDAG
  rationale: La construcción indica un subconjunto tomado del grupo. En español, «a algunos de ustedes» transmite bien la selección desde el colectivo sin sonar forzado.
- source_word: εἰς φυλακὴν
  english_pob_choice: into prison
  chosen_spanish: a la cárcel
  alternatives_spanish:
  - a prisión
  - en prisión
  lexicon: BDAG
  rationale: φυλακή refiere custodia o encierro penal. «A la cárcel» es claro y natural en español actual; «a prisión» sería más formal.
- source_word: ἵνα πειρασθῆτε
  english_pob_choice: so that you may be tested
  chosen_spanish: para que sean probados
  alternatives_spanish:
  - para que sean tentados
  - para que sean puestos a prueba
  lexicon: BDAG
  rationale: πειράζω puede significar probar, tentar o ensayar. En este contexto de persecución, «probados» comunica bien la idea de examen/refinamiento y deja abierta la tensión lexical documentada.
- source_word: ἕξετε θλῖψιν
  english_pob_choice: you will have tribulation
  chosen_spanish: tendrán tribulación
  alternatives_spanish:
  - tendrán aflicción
  - sufrirán tribulación
  lexicon: BDAG
  rationale: θλῖψις en Apocalipsis conserva una carga fuerte de opresión y aflicción. «Tribulación» preserva ese peso teológico y el eco bíblico del término.
- source_word: ἡμερῶν δέκα
  english_pob_choice: for ten days
  chosen_spanish: por diez días
  alternatives_spanish:
  - durante diez días
  - por espacio de diez días
  lexicon: BDAG
  rationale: El genitivo de duración se expresa naturalmente en español con «por». La fórmula es breve y fiel al alcance temporal.
- source_word: γίνου πιστὸς
  english_pob_choice: Be faithful
  chosen_spanish: Sé fiel
  alternatives_spanish:
  - Mantente fiel
  - Permanece fiel
  lexicon: BDAG
  rationale: El imperativo de γίνομαι con adjetivo predicativo puede implicar entrar y mantenerse en un estado. «Sé fiel» es la forma más idiomática y concisa en español.
- source_word: ἄχρι θανάτου
  english_pob_choice: until death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - hasta el punto de la muerte
  lexicon: BDAG
  rationale: La expresión indica fidelidad sostenida hasta el límite de la muerte. «Hasta la muerte» es directo y abarca la posibilidad de martirio sin estrecharla excesivamente.
- source_word: δώσω σοι
  english_pob_choice: I will give you
  chosen_spanish: yo te daré
  alternatives_spanish:
  - te daré
  - yo te concederé
  lexicon: BDAG
  rationale: δίδωμι en futuro se vierte con el verbo simple «dar». El pronombre explícito refuerza la promesa personal de Cristo sin añadir sentido.
- source_word: τὸν στέφανον τῆς ζωῆς
  english_pob_choice: the crown of life
  chosen_spanish: la corona de la vida
  alternatives_spanish:
  - la corona victoriosa de la vida
  - la corona-recompensa de la vida
  lexicon: BDAG
  rationale: στέφανος es la corona/laurel de victoria, no una diadema real. «Corona de la vida» mantiene la tradición y la claridad; el matiz de premio victorioso queda preservado en la nota.
theological_decisions:
- issue: Sentido de πειρασθῆτε en el contexto de persecución y la acción del diablo
  english_pob_reading: tested
  chosen_spanish_reading: sean probados
  alternative_spanish_readings:
  - sean tentados
  - sean puestos a prueba
  rationale: La escena describe encarcelamiento y aflicción que ponen a prueba la fidelidad. «Sean probados» evita reducir el verbo a tentación moral, pero mantiene la tensión reconocida por la POB entre prueba, ensayo y tentación.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Alcance de ἄχρι θανάτου
  english_pob_reading: until death
  chosen_spanish_reading: hasta la muerte
  alternative_spanish_readings:
  - hasta morir
  - hasta el punto de la muerte
  rationale: La frase puede referirse a perseverar hasta el final, incluso hasta el martirio si fuera necesario. «Hasta la muerte» conserva la amplitud del griego y deja abierta la lectura fuerte documentada por la POB.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Valor de στέφανος
  english_pob_reading: crown ... not a royal diadem
  chosen_spanish_reading: corona
  alternative_spanish_readings:
  - guirnalda
  - corona victoriosa
  rationale: En español, «corona» comunica la metáfora premiatoria de στέφανος; el uso no debe leerse como diadema real. La nota preserva explícitamente el trasfondo de victoria/galardón.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador sigue la lectura y el juicio de revisión más recientes del paquete auditado: no se requieren cambios respecto del texto inglés POB y sus notas, salvo su traslado controlado al español con equivalencia natural y sin perder las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene «diablo» para διάβολος como término personal y estable.
  - Se usa «tribulación» para θλῖψις, coherente con el uso teológico de Apocalipsis.
  - «Corona» conserva el valor de στέφανος; la diferencia con una diadema se explica en nota.
  - Se prefirió «ustedes» como registro neutral latinoamericano para ὑμῶν.
  - La inminencia de μέλλω se conserva con «está a punto de» / «vas a».
