  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Mi nombre» preserva bien el idiom bíblico. «Perseverancia» es aceptable para ὑπομονή, aunque «resistencia» o «constancia» también caben; no requiere cambio obligatorio. No hay términos teológicos del glosario principal en disputa aquí.
