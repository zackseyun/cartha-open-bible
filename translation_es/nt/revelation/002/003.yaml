translation:
  language: es
  text: Y tienes perseverancia, y has soportado por causa de mi nombre, y no te has cansado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «no te has fatigado»; la cláusula también puede entenderse en relación con labor o trabajo: «no te has fatigado del trabajo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπομονὴν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - resistencia
  - constancia
  - paciencia perseverante
  lexicon: BDAG
  rationale: ὑπομονή denota aguante firme bajo prueba. En español, «perseverancia» comunica bien la idea de mantenerse firme, con un matiz de constancia activa que encaja con el elogio del pasaje sin volverlo más interpretativo de lo que permite el griego.
- source_word: ἔχεις
  english_pob_choice: you have
  chosen_spanish: tienes
  alternatives_spanish:
  - posees
  lexicon: BDAG
  rationale: El presente simple conserva la afirmación directa de que la comunidad actualmente cuenta con esa cualidad; «tienes» suena natural y fiel al griego.
- source_word: ἐβάστασας
  english_pob_choice: you have borne up
  chosen_spanish: has soportado
  alternatives_spanish:
  - has llevado
  - has aguantado
  - has resistido
  lexicon: BDAG
  rationale: βαστάζω puede significar llevar, soportar o aguantar. Aquí, en contexto de elogio y con la frase siguiente, la idea es haber soportado una carga o presión. «Has soportado» preserva esa carga de resistencia sin repetir exactamente el campo léxico de ὑπομονή.
- source_word: διὰ τὸ ὄνομά μου
  english_pob_choice: for my name
  chosen_spanish: por causa de mi nombre
  alternatives_spanish:
  - por mi nombre
  - a causa de mi nombre
  - por amor a mi nombre
  lexicon: BDAG
  rationale: διά con acusativo expresa razón o causa. «Por causa de mi nombre» hace explícita esa relación causal y conserva el giro bíblico de sufrir o soportar en lealtad al nombre de Jesús.
- source_word: οὐ κεκοπίακες
  english_pob_choice: you have not grown weary
  chosen_spanish: no te has cansado
  alternatives_spanish:
  - no te has fatigado
  - no te has agotado
  - no has desfallecido
  lexicon: BDAG
  rationale: κοπιάω puede significar cansarse o fatigarse. En esta cláusula negativa, la idea es no haber llegado al agotamiento. «No te has cansado» es natural en español y mantiene el estado resultante del perfecto.
theological_decisions:
- issue: Relación entre endurance, soportar y fatigarse
  english_pob_reading: The verse commends sustained endurance and bearing hardship for Jesus' name, without specifying a particular form of persecution or labor beyond the text.
  chosen_spanish_reading: El versículo alaba una perseverancia sostenida y el haber soportado dificultades por el nombre de Jesús, sin precisar una clase particular de persecución o de labor.
  alternative_spanish_readings:
  - El versículo podría entenderse como referencia a trabajo ministerial y no solo a aflicción.
  - También podría traducirse de manera más fuerte como 'no te has fatigado por el trabajo'.
  rationale: La traducción debe conservar la tensión entre resistir una carga y no agotarse, sin resolverla artificialmente hacia persecución específica o hacia mera labor ministerial. El griego permite ambas resonancias, pero el elogio general favorece mantenerlas abiertas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el trazado auditado del POB inglés, especialmente la distinción entre ὑπομονή («endurance») y βαστάζω («have borne up»), y la decisión revisada de evitar duplicar innecesariamente el sujeto verbal en la segunda cláusula. También se mantuvo la apertura semántica de διὰ τὸ ὄνομά μου y del perfecto negativo final, sin convertirlos en una explicación más específica de la que el griego ofrece.
  spanish_consistency_notes:
  - Se usó «Dios»/«Jesús» solo cuando el texto lo exigiera; aquí la referencia implícita del nombre es cristológica, por lo que se mantuvo «mi nombre».
  - Se evitó «siervo» o «paciencia» para ὑπομονή, porque el contexto pide resistencia bajo carga más que mansedumbre o espera pasiva.
  - Se prefirió «has soportado» en vez de una paráfrasis con dos verbos, para conservar la economía del aoristo griego.
  - La puntuación con comas refleja la acumulación paratáctica del original.
