translation:
  language: es
  text: 'Pero esto tienes: aborreces las obras de los nicolaítas[a], que yo también aborrezco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hechos' en lugar de 'obras'. El término griego se refiere a acciones o prácticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca contraste con la aprobación anterior; 'Pero' es la adversativa más natural y clara en español.
- source_word: τοῦτο ἔχεις
  english_pob_choice: this you have
  chosen_spanish: esto tienes
  alternatives_spanish:
  - tienes esto
  - esto lo tienes
  lexicon: BDAG
  rationale: Conserva el frente enfático de τοῦτο y refleja de forma directa el giro griego sin añadir interpretación.
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: que
  alternatives_spanish:
  - —
  - el hecho de que
  lexicon: BDAG
  rationale: En español, 'que' introduce naturalmente el contenido de 'esto tienes' y suena más fluido que un simple signo de puntuación.
- source_word: μισεῖς
  english_pob_choice: you hate
  chosen_spanish: aborreces
  alternatives_spanish:
  - odias
  - detestas
  lexicon: BDAG
  rationale: '''Aborrecer'' mantiene la fuerza de μισέω sin sonar tan brusco como ''odiar'' en español bíblico; preserva la intensidad de la repetición con μισῶ.'
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  - las prácticas
  lexicon: BDAG
  rationale: '''Obras'' reproduce con transparencia ἔργα y conserva el objeto lexical del rechazo; ''prácticas'' sería más interpretativo.'
- source_word: τῶν Νικολαϊτῶν
  english_pob_choice: of the Nicolaitans
  chosen_spanish: de los nicolaítas
  alternatives_spanish:
  - de los nicolaitas
  - de los Nikolaítas
  lexicon: BDAG
  rationale: Se translitera el nombre de grupo con ortografía española corriente, manteniendo la referencia histórica sin explicarla de más.
- source_word: ἃ
  english_pob_choice: which
  chosen_spanish: las cuales
  alternatives_spanish:
  - que
  - las que
  lexicon: BDAG
  rationale: El relativo neutro plural remite a 'las obras'; 'las cuales' evita ambigüedad y conserva un tono formal.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  lexicon: BDAG
  rationale: '''Yo también'' expresa con naturalidad la asociación del hablante con la evaluación anterior, sin perder el énfasis de κἀγώ.'
- source_word: μισῶ
  english_pob_choice: hate
  chosen_spanish: aborrezco
  alternatives_spanish:
  - odio
  - detesto
  lexicon: BDAG
  rationale: Se mantiene la misma familia semántica que en μισεῖς y se evita suavizar el verbo; 'aborrezco' suena bíblico y coherente con el anterior 'aborreces'.
theological_decisions:
- issue: Objeto del rechazo
  english_pob_reading: The text condemns the works of the Nicolaitans, not explicitly the Nicolaitans themselves.
  chosen_spanish_reading: El texto rechaza las obras de los nicolaítas, no dice explícitamente que se rechace a las personas mismas.
  alternative_spanish_readings:
  - Podría leerse de manera más amplia como rechazo de los nicolaítas en conjunto.
  - Una traducción menos precisa podría sugerir odio hacia las personas.
  rationale: La estructura griega pone como objeto directo τὰ ἔργα; la traducción debe dejar claro que el foco son las obras o prácticas, no ampliar innecesariamente el alcance.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza compartida entre el hablante y la iglesia
  english_pob_reading: Render κἀγὼ μισῶ as 'which I also hate.'
  chosen_spanish_reading: '''las cuales yo también aborrezco'' preserva la identificación directa del hablante con la postura de la iglesia.'
  alternative_spanish_readings:
  - '''las cuales yo también odio'''
  - '''las que yo también detesto'''
  rationale: Conviene mantener la repetición del verbo y la solidaridad de juicio sin atenuar la fuerza del enunciado; el texto presenta a Jesús compartiendo la misma evaluación negativa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se evita un auxiliar innecesario equivalente a ''do'' y se mantiene una estructura breve y directa (''esto tienes''). También se conserva la distinción entre el objeto del rechazo (''las obras'') y el sujeto que comparte ese rechazo (''yo también aborrezco'').'
  spanish_consistency_notes:
  - Se usa 'aborrecer/aborrezco' de forma consistente para μισεῖς / μισῶ, preservando la repetición verbal del griego.
  - Se translitera el grupo como 'nicolaítas', en minúscula por tratarse de un nombre de secta o grupo.
  - La puntuación con dos puntos se sustituye por la subordinación con 'que', más natural en español y fiel al contenido introducido por ὅτι.
  - La nota a pie de página se ancla solo en 'obras', porque la alternativa léxica afecta ese sintagma específico.
