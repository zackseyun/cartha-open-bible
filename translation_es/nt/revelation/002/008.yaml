revisions:
- from: 'Y al ángel[a] de la iglesia en Esmirna escribe: «Así dice el Primero y el Último, el que llegó a estar muerto y volvió a vivir[b]».'
  to: 'Y al ángel[a] de la iglesia en Esmirna escribe: «Así dice el Primero y el Último, el que llegó a morir y volvió a vivir[b]».'
  rationale: 'Se ajusta la cláusula de muerte para mejorar la naturalidad del español manteniendo el sentido eventivo de ἐγένετο dentro de lo posible («llegó a morir»). También se corrige la nota alternativa para alinearla con la opción inglesa auditada («was dead and came to life») en un español más idiomático: «estuvo muerto y cobró vida».'
