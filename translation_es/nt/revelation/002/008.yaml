    reason: alternative_reading
  - marker: b
    text: O «que estuvo muerto y cobró vida».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la cláusula de muerte para mejorar la naturalidad del español manteniendo el sentido eventivo de ἐγένετο dentro de lo posible («llegó a morir»). También se corrige la nota alternativa para alinearla con la opción inglesa auditada («was dead and came to life») en un español más idiomático: «estuvo muerto y cobró vida».'
