translation:
  language: es
  text: 'Y al ángel[a] de la iglesia en Esmirna escribe: «Así dice el Primero y el Último, el que llegó a morir y volvió a vivir[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero» de la iglesia en Esmirna.
    reason: alternative_reading
  - marker: b
    text: O «que estuvo muerto y cobró vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλῳ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: Se mantiene ‘ángel’ como la opción principal, porque el contexto apocalíptico de Apocalipsis favorece el sentido de ser celestial. Se conserva la alternativa ‘mensajero’ en nota por la posibilidad léxica documentada.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: ‘Iglesia’ expresa de modo natural la comunidad cristiana destinataria. ‘Asamblea’ es posible léxicamente, pero en este contexto subrepresentaría el sentido eclesial establecido.
- source_word: Τάδε
  english_pob_choice: These things
  chosen_spanish: Así
  alternatives_spanish:
  - Esto es lo que
  - Estas cosas
  lexicon: BDAG
  rationale: ‘Así dice’ reproduce bien la fórmula profética sin sonar forzado en español. ‘Estas cosas’ sería demasiado literal y poco natural en la fórmula.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  lexicon: BDAG
  rationale: ‘Dice’ refleja el presente del griego y mantiene la fórmula solemne de presentación del mensaje.
- source_word: ὁ πρῶτος καὶ ὁ ἔσχατος
  english_pob_choice: the First and the Last
  chosen_spanish: el Primero y el Último
  alternatives_spanish:
  - el primero y el último
  lexicon: BDAG
  rationale: Se conserva como título cristológico con mayúsculas iniciales, siguiendo el valor titular del griego y su eco veterotestamentario.
- source_word: ἐγένετο νεκρὸς
  english_pob_choice: became dead
  chosen_spanish: llegó a estar muerto
  alternatives_spanish:
  - se hizo muerto
  - estuvo muerto
  lexicon: BDAG
  rationale: 'Se evita una simple forma estática (‘estuvo muerto’) para reflejar el matiz eventivo de γίνομαι: entró en la condición de muerte.'
- source_word: ἔζησεν
  english_pob_choice: lived again
  chosen_spanish: volvió a vivir
  alternatives_spanish:
  - vivió de nuevo
  - vivió otra vez
  lexicon: BDAG
  rationale: ‘Volvió a vivir’ comunica de modo claro y natural la resurrección implícita en el contraste con ‘llegó a estar muerto’. Se preserva la fuerza de ‘lived again’ sin añadir explicación doctrinal.
theological_decisions:
- issue: Título cristológico y lenguaje de resurrección
  english_pob_reading: Retained 'the First and the Last' as a title and rendered the following clause in a way that clearly refers to Jesus' death and resurrection without importing extra doctrinal explanation.
  chosen_spanish_reading: Se mantiene ‘el Primero y el Último’ como título cristológico y se expresa la secuencia muerte-resurrección con ‘llegó a estar muerto y volvió a vivir’.
  alternative_spanish_readings:
  - el primero y el último
  - el que estaba muerto y vivió de nuevo
  rationale: La redacción preserva la identificación solemne de Jesús y hace explícito el movimiento de muerte a vida sin sobreexplicar el texto. La mayúscula en ‘Primero’ y ‘Último’ señala su valor titular.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el aparato auditado en inglés de POB. Se corrigió la anclación de notas para que cada marcador aparezca exactamente en el texto español. No se introducen notas sin ancla ni se amplía el contenido más allá de la cláusula fuente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene ‘ángel’ por el sesgo apocalíptico del contexto; la alternativa ‘mensajero’ queda documentada en nota.
  - Se conserva ‘iglesia’ porque en Apocalipsis el término designa la comunidad cristiana destinataria.
  - La expresión ‘llegó a estar muerto’ intenta respetar el matiz verbal de γίνομαι sin caer en un calco ininteligible.
  - ‘Volvió a vivir’ comunica la resurrección de manera natural en español y corresponde al valor contextual de ἔζησεν.
