revisions:
- from: Conozco tus obras[a], tu labor y tu perseverancia, y sé que no puedes tolerar a los malos; y probaste a los que dicen ser apóstoles, y no lo son[b], y los hallaste falsos.
  to: Conozco tus obras, tu labor y tu perseverancia, y que no puedes tolerar[a] a la gente malvada. Pusiste a prueba a los que dicen ser apóstoles[b] y no lo son, y los hallaste falsos.
  rationale: La revisión corrige la nota para alinearla con las alternativas preservadas por la POB inglesa, elimina la duplicación innecesaria de «sé», mejora la naturalidad de «probaste» a «pusiste a prueba» y hace más fluida la puntuación, sin apartarse del sentido del griego ni de las decisiones léxicas auditadas.
