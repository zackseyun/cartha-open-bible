review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: conocimiento de las obras, labor, perseverancia, incapacidad de tolerar a personas malas, prueba de los autoproclamados apóstoles y hallazgo de su falsedad. Sin embargo, hay pequeños desajustes frente al rastro auditado: el texto español duplica innecesariamente el verbo de conocimiento con «y sé que», cuando el griego coordina con un solo «sé/conozco» inicial; y la nota [a] no preserva el tipo de alternativa documentada por la POB inglesa, que trata la expresión «no puedes tolerar» / «no puedes soportar», no «tus obras».'
  spanish_quality_summary: El español es mayormente natural y eclesialmente legible. «Perseverancia» funciona bien para ὑπομονή. «A los malos» es comprensible, pero «a la gente malvada» o «a personas malvadas» sonaría más natural y evita una sustantivación algo seca; aun así, no es un error. «Probaste» es aceptable, pero «pusiste a prueba» comunica mejor el matiz de examen. También conviene suavizar la puntuación con menos punto y coma interno.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Apóstoles» preserva correctamente ἀποστόλους. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión «tolerar» para οὐ δύνῃ βαστάσαι está alineada con la POB inglesa, y «falsos» respeta bien ψευδεῖς.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «obras» pero la POB inglesa conserva una alternativa para «no puedes tolerar / no puedes soportar».
    rationale: La nota actual introduce una observación no respaldada por el expediente inglés y además poco útil, porque «tus obras» ya está explícito en griego por el posesivo σου.
  - severity: low
    issue: «y sé que» añade un segundo verbo de conocimiento no presente explícitamente en el griego.
    rationale: No cambia gravemente el sentido, pero una redacción más ceñida sería «Conozco... y que no puedes...» o simplemente mantener una sola cadena coordinada.
  - severity: low
    issue: «Probaste» es fiel pero menos idiomático que «pusiste a prueba» en este contexto de discernimiento.
    rationale: πειράζω aquí describe examinar pretensiones; «poner a prueba» suena más claro en español moderno eclesial.
  revised_spanish_text: Conozco tus obras, tu labor y tu perseverancia, y que no puedes tolerar[a] a la gente malvada. Pusiste a prueba a los que dicen ser apóstoles[b] y no lo son, y los hallaste falsos.
  revised_footnotes:
