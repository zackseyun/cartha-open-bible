translation:
  language: es
  text: Conozco tus obras, tu labor y tu perseverancia, y que no puedes tolerar[a] a la gente malvada. Pusiste a prueba a los que dicen ser apóstoles[b] y no lo son, y los hallaste falsos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «no puedes soportar a la gente malvada». El griego es más literal: «no puedes soportar», con el sentido aquí de no tolerarla.'
    reason: lexical_alternative
  - marker: b
    text: O «los que se llaman apóstoles» o «los que afirman ser apóstoles».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδα
  english_pob_choice: I know
  chosen_spanish: Conozco
  alternatives_spanish:
  - Sé
  lexicon: BDAG
  rationale: Οἶδα expresa conocimiento presente y evaluativo. «Conozco» mantiene esa cercanía personal y suena natural en español. «Sé» también es posible, pero «conozco» preserva mejor la relación directa con las obras del destinatario.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: «Obras» es la equivalencia más natural y transparente en español para ἔργα en este contexto. Mantiene el alcance amplio de acciones/actividad sin restringir el sentido.
- source_word: κόπον
  english_pob_choice: labor
  chosen_spanish: labor
  alternatives_spanish:
  - fatiga
  - trabajo arduo
  lexicon: BDAG
  rationale: κόπος connota esfuerzo penoso o trabajo agotador. «Labor» conserva el peso del término sin volverse coloquial, y corresponde bien al valor que la POB inglesa documenta.
- source_word: ὑπομονήν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - paciencia
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: Aquí ὑπομονή habla de firmeza sostenida bajo presión. «Perseverancia» comunica esa permanencia activa con buen registro en español. «Paciencia» sería demasiado pasiva; «resistencia» puede sonar más física que moral.
- source_word: οὐ δύνῃ βαστάσαι
  english_pob_choice: you cannot tolerate
  chosen_spanish: no puedes tolerar
  alternatives_spanish:
  - no puedes soportar
  - no eres capaz de sobrellevar
  - no puedes llevar
  lexicon: BDAG
  rationale: La idea literal de «cargar/soportar» se vuelve idiomáticamente «tolerar» en este contexto de discernimiento moral. La decisión sigue la lectura auditada de la POB inglesa, sin perder la fuerza de rechazo.
- source_word: κακούς
  english_pob_choice: evil people
  chosen_spanish: a los malos
  alternatives_spanish:
  - a los malvados
  - a gente malvada
  lexicon: BDAG
  rationale: El adjetivo masculino plural funciona sustantivado para personas. «A los malos» es breve, natural y fiel al referente humano. «Malvados» es posible, pero más intensivo; «gente malvada» explicita más de lo que el griego exige.
- source_word: ἐπείρασας
  english_pob_choice: tested
  chosen_spanish: probaste
  alternatives_spanish:
  - examinaste
  - pusiste a prueba
  lexicon: BDAG
  rationale: πειράζω aquí implica someter a examen la pretensión de autoridad. «Probaste» reproduce de modo directo la idea de poner a prueba y mantiene una correspondencia verbal clara con el original.
- source_word: λέγοντας ἑαυτοὺς ἀποστόλους
  english_pob_choice: those who call themselves apostles
  chosen_spanish: a los que dicen ser apóstoles
  alternatives_spanish:
  - a los que se llaman apóstoles
  - a los que afirman ser apóstoles
  lexicon: BDAG
  rationale: La construcción participial refleja autoafirmación de identidad. «Dicen ser apóstoles» conserva la formulación simple y oral del griego, y evita introducir una glosa demasiado explicativa. «Apóstoles» mantiene el título eclesial por la fuerza contextual documentada.
- source_word: ἀποστόλους
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En este contexto de evaluación doctrinal, el término funciona como título eclesial. «Apóstoles» preserva esa fuerza técnica; «mensajeros» diluiría la carga de autoridad que el pasaje pone en juego.
- source_word: ψευδεῖς
  english_pob_choice: 'false'
  chosen_spanish: falsos
  alternatives_spanish:
  - mentirosos
  - falsas
  lexicon: BDAG
  rationale: Como predicativo del hallazgo, ψευδεῖς describe su carácter como no genuino/verdadero. «Falsos» es el equivalente más natural en español y evita endurecer el sentido a «mentirosos», que sería una acusación más específica que el adjetivo inmediato.
theological_decisions:
- issue: Tratamiento de la frase sobre tolerar a personas malas
  english_pob_reading: you cannot tolerate evil people
  chosen_spanish_reading: no puedes tolerar a los malos
  alternative_spanish_readings:
  - no puedes soportar a los malos
  - no eres capaz de tolerar a los malos
  rationale: La POB inglesa ya entiende el infinitivo como «no tolerar» en sentido ético-comunitario, no meramente físico. El español conserva esa lectura y evita una paraphrase más amplia que debilitaría la tensión moral del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Título eclesial para ἀπόστολοι
  english_pob_reading: apostles
  chosen_spanish_reading: apóstoles
  alternative_spanish_readings:
  - mensajeros
  rationale: La carta presupone discernimiento de autoridad dentro de la iglesia. Traducir el título como «apóstoles» mantiene la referencia institucional/ministerial que el griego y la POB inglesa dejan ver; «mensajeros» sería demasiado general y suavizaría el conflicto.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y la auditoría inglesa de la POB, conservando las decisiones ya validadas: οἶδα = conocimiento presente; κόπος = labor; ὑπομονή = endurance/perseverance; βαστάσαι = tolerar/soportar en sentido idiomático; ἀπόστολοι = título eclesial; ψευδεῖς = falsos. No se introdujeron cambios doctrinales ni reinterpretaciones no sustentadas.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, con léxico transparente para lectores eclesiales de español latinoamericano.
  - «Conozco» y «no puedes tolerar» conservan la segunda persona singular del original y el tono evaluativo directo.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque no aparecen en el versículo.
  - La nota a deja explícito que el posesivo es contextual, para no sobrecargar el español con un añadido innecesario.
  - La nota b preserva la ambigüedad entre autoidentificación y pretensión, conforme a la auditoría inglesa.
