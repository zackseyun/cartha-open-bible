base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/024.yaml
  text: 'But to the rest of you in Thyatira I say: all who do not hold this teaching[a], who have not known the deep things of Satan, as they call them—I am not laying any other burden on you.'
  footnotes:
