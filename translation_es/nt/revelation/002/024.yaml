translation:
  language: es
  text: 'Pero a ustedes, los demás en Tiatira, les digo: todos los que no sostienen esta enseñanza, los que no han conocido las profundidades[a] de Satanás, como las llaman, no les impongo ninguna otra carga.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «las profundidades de Satanás». La expresión griega puede aludir irónicamente a una pretensión de conocimiento espiritual «profundo», que Juan rechaza.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς λοιποῖς
  english_pob_choice: the rest of you
  chosen_spanish: los demás
  alternatives_spanish:
  - los otros
  - el resto de ustedes
  lexicon: BDAG
  rationale: λοιποί señala al grupo restante distinguido de los que siguen la falsa enseñanza; en español, «los demás» preserva esa contraposición de modo natural.
- source_word: ἐν Θυατείροις
  english_pob_choice: in Thyatira
  chosen_spanish: en Tiatira
  alternatives_spanish:
  - en Thyatira
  lexicon: convención geográfica
  rationale: Se conserva el nombre propio de la ciudad en transliteración habitual al español bíblico, con la forma «Tiatira» ampliamente inteligible.
- source_word: ἔχουσιν τὴν διδαχὴν ταύτην
  english_pob_choice: hold this teaching
  chosen_spanish: tienen esta enseñanza
  alternatives_spanish:
  - mantienen esta enseñanza
  - sostienen esta enseñanza
  lexicon: BDAG
  rationale: ἔχω con διδαχή expresa posesión/adopción de una doctrina. En español, «tener esta enseñanza» comunica la idea sin forzar una metáfora menos natural; se mantiene la relación semántica de adherirse a ella.
- source_word: οἵτινες οὐκ ἔγνωσαν
  english_pob_choice: who have not known
  chosen_spanish: los que no han conocido
  alternatives_spanish:
  - quienes no conocieron
  - los que no llegaron a conocer
  lexicon: BDAG
  rationale: El aoristo se vierte de forma resultativa en español para indicar una falta de conocimiento ya establecida, como en la traducción inglesa de la POB.
- source_word: τὰ βαθέα τοῦ Σατανᾶ
  english_pob_choice: the deep things of Satan
  chosen_spanish: las profundidades de Satanás
  alternatives_spanish:
  - las cosas profundas de Satanás
  - los profundos misterios de Satanás
  lexicon: BDAG
  rationale: βαθέα puede referirse literalmente a «profundidades» o «cosas profundas». Se elige «las profundidades de Satanás» por su transparencia y por conservar la posible ironía o eslogan espiritual sin aclararlo de más.
- source_word: ὡς λέγουσιν
  english_pob_choice: as they call them
  chosen_spanish: como ellas dicen
  alternatives_spanish:
  - como dicen
  - como las llaman
  lexicon: BDAG
  rationale: El griego usa un plural con un neutro plural implícito; en español, la referencia natural recae en «las profundidades», por eso se traduce «como ellas dicen», manteniendo el ajuste de género y la ambigüedad retórica.
- source_word: οὐ βάλλω ἐφ’ ὑμᾶς ἄλλο βάρος
  english_pob_choice: I am not laying any other burden on you
  chosen_spanish: no les impongo ninguna otra carga
  alternatives_spanish:
  - no les pongo ninguna otra carga
  - no echaré sobre ustedes ninguna otra carga
  lexicon: BDAG
  rationale: βάλλω con ἐπί + acusativo funciona idiomáticamente como «poner/poner sobre/ imponer». «Imponer una carga» transmite bien la idea de obligación adicional y conserva βάρος como «carga» en español actual.
theological_decisions:
- issue: Sentido de τὰ βαθέα τοῦ Σατανᾶ
  english_pob_reading: Render the phrase straightforwardly as an ironic or reported designation without resolving whether John is quoting the false teachers' self-description or a sarcastic counter-label.
  chosen_spanish_reading: Traducir la expresión de manera directa como «las profundidades de Satanás», sin decidir en la redacción si se trata de un eslogan de los falsos maestros o de una ironía de Juan.
  alternative_spanish_readings:
  - las cosas profundas de Satanás
  - los misterios profundos de Satanás
  rationale: El griego permite una frase polémica comprimida. La traducción conserva la tensión interpretativa en lugar de explicarla, para no resolver un problema que el texto no resuelve explícitamente.
  doctrine_reference: Preservar la ambigüedad retórica y teológica del texto.
- issue: Alcance de ἄλλο βάρος
  english_pob_reading: I am not laying any other burden on you.
  chosen_spanish_reading: no les impongo ninguna otra carga
  alternative_spanish_readings:
  - no les pongo ninguna otra carga
  - no les cargaré con nada más
  rationale: La frase mantiene el matiz de obligación o exigencia adicional, sin convertirla en una imagen más fuerte de la que exige el griego.
  doctrine_reference: Fidelidad semántica a la metáfora de la carga.
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y no requiere revisiones previas adicionales; se conservó la ambigüedad de «las profundidades de Satanás» y se adaptó el verbo ἔχω con una formulación natural en español.
  spanish_consistency_notes:
  - Se usó «Tiatira» como forma española estable del topónimo.
  - Se mantuvo «Satanás» sin atenuación interpretativa.
  - Se eligió «carga» para βάρος, coherente con el valor de obligación adicional del contexto.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el versículo.
