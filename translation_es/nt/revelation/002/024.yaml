revisions:
- from: 'Pero a ustedes, los demás en Tiatira, les digo: a todos los que no tienen esta enseñanza[a], a los que no han conocido las profundidades de Satanás, como ellas dicen, no les impongo ninguna otra carga.'
  to: 'Pero a ustedes, los demás en Tiatira, les digo: todos los que no sostienen esta enseñanza, los que no han conocido las profundidades[a] de Satanás, como las llaman, no les impongo ninguna otra carga.'
  rationale: Se corrige un error de sentido y de español natural en ὡς λέγουσιν, reemplazando «como ellas dicen» por «como las llaman», que además refleja la decisión auditada en inglés. También se mejora «no tienen esta enseñanza» a «no sostienen esta enseñanza» para expresar mejor la adhesión doctrinal implícita en el griego. Se reubica el anclaje de la nota al sintagma relevante para mayor claridad.
  reviewer_model: gpt-5.4
