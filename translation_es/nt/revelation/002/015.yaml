revisions:
- from: Así también tú tienes a quienes se aferran a la enseñanza de los nicolaítas, igualmente[a].
  to: Así también tienes tú a quienes siguen la enseñanza de los Nicolaitas, igualmente[a].
  rationale: Se ajusta κρατοῦντας a ‘siguen’ para evitar una intensificación innecesaria de ‘se aferran’, se mejora levemente la naturalidad del orden español, y se normaliza la grafía del nombre grupal como ‘Nicolaitas’. Se conserva ‘igualmente’ al final para mantener la ambigüedad funcional de ὁμοίως y la conexión con el versículo previo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:50:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: οὕτως + καὶ σὺ conserva la comparación con la reprensión previa; ἔχεις se mantiene como ‘tienes’; διδαχὴν Νικολαϊτῶν como ‘la enseñanza de los nicolaítas’ es fiel; y ὁμοίως queda adecuadamente representado con nota. Sin embargo, ‘se aferran a’ intensifica innecesariamente κρατοῦντας frente al audit trail inglés (‘hold to’) y puede sonar más interpretativo que el participio griego exige aquí.'
  spanish_quality_summary: 'El español es claro y legible, pero ‘Así también tú tienes’ suena algo rígido. Un orden más natural como ‘Así también tienes tú...’ o ‘Así también tú tienes...’ ambos sirven, pero el problema principal es léxico: ‘se mantienen en’/‘se adhieren a’ o ‘siguen’ sería menos cargado que ‘se aferran a’. También conviene capitalizar el etnónimo según uso bíblico español: ‘Nicolaitas’.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. ‘Enseñanza’ para διδαχή está bien. ‘Nicolaitas’ es una transliteración española más normal que ‘nicolaítas’. No hay términos teológicos sensibles adicionales.
  issues:
  - severity: medium
    issue: ‘se aferran a’ para κρατοῦντας añade fuerza interpretativa
    rationale: κρατέω aquí se refiere a mantener o sostener una enseñanza. ‘Aferrarse’ sugiere una intensidad emocional o combativa mayor que la documentada en el audit trail inglés, que prefirió ‘hold to’ y evitó ‘hold fast to’ por ser más fuerte.
  - severity: low
    issue: Orden algo rígido en ‘Así también tú tienes’
    rationale: Es comprensible, pero en español bíblico natural suena más fluido ‘Así también tienes tú...’ o simplemente ‘Así también tienes...’, sin perder el énfasis de καὶ σὺ.
  - severity: low
    issue: Forma ‘nicolaítas’ menos natural que ‘Nicolaitas’
    rationale: La grafía con mayúscula inicial como nombre de grupo y sin tilde es la forma más reconocible y limpia en español eclesial general.
  revised_spanish_text: Así también tienes tú a quienes siguen la enseñanza de los Nicolaitas, igualmente[a].
  revised_footnotes:
  - marker: a
    text: O ‘de la misma manera’ o ‘similarmente’. El griego puede resaltar que sostienen esta enseñanza de un modo comparable al de los mencionados en el versículo anterior.
    reason: lexical_alternative
  revision_rationale: Se ajusta κρατοῦντας a ‘siguen’ para evitar una intensificación innecesaria de ‘se aferran’, se mejora levemente la naturalidad del orden español, y se normaliza la grafía del nombre grupal como ‘Nicolaitas’. Se conserva ‘igualmente’ al final para mantener la ambigüedad funcional de ὁμοίως y la conexión con el versículo previo.
