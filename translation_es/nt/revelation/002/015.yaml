translation:
  language: es
  text: Así también tienes tú a quienes siguen la enseñanza de los Nicolaitas, igualmente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de la misma manera’ o ‘similarmente’. El griego puede resaltar que sostienen esta enseñanza de un modo comparable al de los mencionados en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: BDAG
  rationale: Conserva el valor comparativo/inferencial del griego sin sonar forzado en español; conecta naturalmente con la reprensión anterior.
- source_word: ἔχεις
  english_pob_choice: you have
  chosen_spanish: tienes
  alternatives_spanish:
  - posees
  - hay entre ti
  lexicon: BDAG
  rationale: Mantiene la relación directa con la iglesia como sujeto que ‘tiene’ personas dentro de ella, en un español natural.
- source_word: καὶ σὺ
  english_pob_choice: you also
  chosen_spanish: tú también
  alternatives_spanish:
  - también tú
  - incluso tú
  lexicon: BDAG
  rationale: Reproduce el énfasis comparativo del griego; ‘tú también’ es idiomático y claro en español.
- source_word: κρατοῦντας
  english_pob_choice: those who hold to
  chosen_spanish: a quienes se aferran a
  alternatives_spanish:
  - a quienes mantienen
  - a quienes se adhieren a
  lexicon: BDAG
  rationale: ‘κρατέω’ expresa sostenerse firmemente de algo; ‘se aferran a’ refleja mejor la fuerza de adhesión que un simple ‘mantener’.
- source_word: διδαχὴν
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la doctrina
  - la instrucción
  lexicon: BDAG
  rationale: ‘Enseñanza’ es el equivalente más natural y menos eclesiástico; preserva el contenido de lo enseñado sin cargarlo doctrinalmente más de lo necesario.
- source_word: Νικολαϊτῶν
  english_pob_choice: of the Nicolaitans
  chosen_spanish: de los nicolaítas
  alternatives_spanish:
  - de los Nikolaítas
  lexicon: BDAG
  rationale: Se translitera el nombre grupal con la forma ya reconocible en español; se mantiene el valor de nombre propio colectivo.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: igualmente
  alternatives_spanish:
  - del mismo modo
  - asimismo
  lexicon: BDAG
  rationale: '‘Igualmente’ reproduce con precisión el adverbio y conserva la ambigüedad funcional: puede modificar el modo de adherirse o la comparación con el versículo anterior.'
theological_decisions:
- issue: Relación de ὁμοίως con el resto de la cláusula
  english_pob_reading: ‘likewise’ / ‘in the same way’ as modifying the clause while preserving comparison with v.14
  chosen_spanish_reading: ‘igualmente’ al final de la cláusula, dejando abierta su relación con ‘se aferran’ y con la comparación con el verso previo
  alternative_spanish_readings:
  - ‘de la misma manera’
  - ‘también’
  rationale: El griego permite que ὁμοίως abarque el modo de sostener la enseñanza o la comparación general con la reprensión anterior. ‘Igualmente’ conserva esa tensión sin resolverla de forma excesiva.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión interpretativa en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de ‘in the same way’ a ‘likewise’ para reflejar más directamente ὁμοίως; la versión española sigue esa revisión con ‘igualmente’, manteniendo brevedad y la posible ambigüedad del adverbio.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera; aquí no aparece.
  - ‘Enseñanza’ se mantiene como término estándar para διδαχή.
  - La puntuación española coloca la nota al final de la cláusula para reflejar el alcance probable de ὁμοίως sin sobreinterpretarlo.
