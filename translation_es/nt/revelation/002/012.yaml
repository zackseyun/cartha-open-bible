translation:
  language: es
  text: 'Y al ángel[a] de la iglesia en Pérgamo escribe: Así dice el que tiene la espada de dos filos afilada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mensajero' para 'ángel'. Los intérpretes difieren sobre si el referente es un ser celestial o un representante humano de la iglesia.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγέλῳ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: Conservo 'ángel' en el texto principal porque el uso de Apocalipsis en la fórmula dirigida a las iglesias mantiene la ambigüedad entre un ser celestial y un representante humano. 'Mensajero' sigue siendo una alternativa válida, pero en español la forma tradicional y más natural aquí es 'ángel'.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En el contexto cristiano de Apocalipsis, ἐκκλησία se refiere a la comunidad reunida de creyentes. 'Iglesia' es la equivalencia natural y clara en español; 'asamblea' es posible, pero menos idiomática en esta salutación.
- source_word: γράψον
  english_pob_choice: write
  chosen_spanish: escribe
  alternatives_spanish:
  - escribe esto
  lexicon: BDAG
  rationale: 'El imperativo aoristo se traduce directamente como una orden simple: ''escribe''. El objeto queda implícito y se entiende por la cita que sigue.'
- source_word: Τάδε λέγει
  english_pob_choice: These things says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Estas cosas dice
  lexicon: BDAG
  rationale: Aunque la POB inglesa conserva la formulación marcada 'These things says' para reflejar la solemnidad del griego, en español 'Así dice' comunica mejor la fórmula profética o real sin perder su tono formal. 'Esto dice' o 'Estas cosas dice' suenan menos naturales en español.
- source_word: ὁ ἔχων
  english_pob_choice: the one who has
  chosen_spanish: el que tiene
  alternatives_spanish:
  - el que posee
  - el que sostiene
  lexicon: BDAG
  rationale: El participio articular se vierte de manera natural como 'el que tiene', manteniendo el carácter descriptivo-titular de la frase.
- source_word: ῥομφαίαν
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - espada grande
  - espada ancha
  lexicon: BDAG
  rationale: ῥομφαία designa una espada, a menudo de gran tamaño o contundencia. 'Espada' es suficiente en español, y el matiz vívido queda reforzado por los modificadores siguientes.
- source_word: δίστομον
  english_pob_choice: two-edged
  chosen_spanish: de dos filos
  alternatives_spanish:
  - de doble filo
  - doble filo
  lexicon: BDAG
  rationale: El griego significa literalmente 'de dos bocas' y, por uso idiomático, 'de dos filos'. En español, 'de dos filos' es una equivalencia formal y transparente, mientras que 'de doble filo' sería más idiomática pero menos cercana a la estructura del griego.
- source_word: ὀξεῖαν
  english_pob_choice: sharp
  chosen_spanish: aguda
  alternatives_spanish:
  - afilada
  - cortante
  lexicon: BDAG
  rationale: ὀξύς describe la espada como aguda o afilada. 'Aguda' mantiene la concisión del griego y encaja bien con la imagen de una espada penetrante.
theological_decisions:
- issue: Identidad del ángel de la iglesia
  english_pob_reading: Retain 'angel' in the main text without specifying whether the referent is heavenly or human.
  chosen_spanish_reading: Conservar 'ángel' sin precisar si se trata de un ser celestial o de un representante humano.
  alternative_spanish_readings:
  - mensajero humano
  - líder de la iglesia
  - representante celestial
  rationale: El término ἄγγελος permite más de una lectura y el versículo no la resuelve. Mantener 'ángel' preserva la tensión interpretativa en vez de imponer una explicación eclesiológica concreta.
  doctrine_reference: Preservar la ambigüedad del texto base.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del auditable inglés POB al conservar la fórmula solemne de apertura, el singular descriptivo 'el que tiene' y el modificador explícito de la espada como 'de dos filos' / 'aguda'. Se evita calcar mecánicamente 'These things says' porque en español la fórmula natural y solemne es 'Así dice'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; este versículo no contiene el tetragrámaton.
  - Se conserva 'ángel' para mantener la ambigüedad interpretativa documentada en el audit trail.
  - Se prefiere 'iglesia' a 'asamblea' por naturalidad en el contexto apocalíptico cristiano.
  - '''De dos filos'' mantiene el valor formal del griego y evita el giro más libre ''de doble filo''.'
