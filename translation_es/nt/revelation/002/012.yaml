  glossary_alignment: 'Alineación buena con la terminología del proyecto: ''ángel'', ''iglesia'', ''espada''. No hay conflictos con términos doctrinales mayores. Se mantiene correctamente ''ángel'' en el texto principal con alternativa ''mensajero'' en nota.'
