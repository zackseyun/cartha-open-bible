review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro de auditoría en los puntos principales: mantiene «cama» como lectura literal de κλίνη con nota para «cama de enfermedad», conserva «gran aflicción» para θλῖψιν μεγάλην con nota para «tribulación», y traduce μετανοήσωσιν como «se arrepientan». Sin embargo, «a los que adulteran con ella» suena poco natural en español bíblico actual, y «de sus obras» es ambiguo en español porque puede referirse a las obras de los adúlteros en vez de las de ella. El griego αὐτῆς al final se refiere a «ella», por lo que conviene explicitarlo.'
  spanish_quality_summary: La redacción es mayormente clara, pero necesita un ajuste de naturalidad y precisión referencial. «¡Mira!» funciona, aunque sin signos también sería aceptable; el mayor problema es «adulteran con ella», que resulta menos idiomático que «cometen adulterio con ella». Además, «de sus obras» deja una ambigüedad innecesaria; «de las obras de ella» o «de sus obras[a ella]» debe aclararse. El resto del verso lee bien en español amplio y digno.
  glossary_alignment: No hay conflicto con la terminología proyectual central. La decisión sobre μετανοέω como «arrepentirse» está bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La preferencia por «obras» para ἔργα es coherente con la auditoría inglesa, pero en español debe hacerse explícito que son las obras de ella.
  issues:
  - severity: medium
    issue: «a los que adulteran con ella» es poco idiomático
    rationale: Aunque refleja el verbo μοιχεύω, en español natural y eclesial amplio suena mejor «a los que cometen adulterio con ella», que preserva el sentido lexical sin dureza extraña.
  - severity: medium
    issue: «de sus obras» es ambiguo
    rationale: 'El pronombre posesivo puede entenderse como referido a «los que cometen adulterio», pero el griego αὐτῆς apunta a «ella». Debe aclararse: «de las obras de ella».'
  revised_spanish_text: ¡Mira![a] Yo la arrojo sobre una cama, y a los que cometen adulterio con ella, a gran aflicción[b], a menos que se arrepientan de las obras de ella.
  revised_footnotes:
