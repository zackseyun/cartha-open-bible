translation:
  language: es
  text: ¡Mira![a] Yo la arrojo sobre una cama, y a los que cometen adulterio con ella, a gran aflicción[b], a menos que se arrepientan de las obras de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre una cama de enfermedad». El griego dice literalmente «sobre una cama»; en contexto, muchos entienden una cama de sufrimiento o de enfermedad como juicio.
    reason: lexical_alternative
  - marker: b
    text: O «a gran tribulación». Aquí la frase se refiere a sufrimiento o angustia severos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Miren!
  - ¡He aquí!
  lexicon: BDAG
  rationale: La interjección griega exige llamar la atención del lector. «¡Mira!» conserva ese valor inmediato en español actual; «¡He aquí!» es más tradicional, pero más marcado y menos natural para este contexto.
- source_word: βάλλω
  english_pob_choice: I am throwing
  chosen_spanish: yo la arrojo
  alternatives_spanish:
  - la echo
  - la lanzo
  lexicon: BDAG
  rationale: El presente griego expresa inmediatez profética/judicial. «Arrojo» comunica acción contundente sin sonar tan mecánico como un progresivo literal en español. Se añadió el pronombre explícito «yo» para reflejar el énfasis verbal.
- source_word: αὐτὴν εἰς κλίνην
  english_pob_choice: her onto a bed
  chosen_spanish: sobre una cama
  alternatives_spanish:
  - en una cama
  - sobre un lecho
  - sobre una cama de enfermedad
  lexicon: BDAG
  rationale: κλίνη significa literalmente «cama/lecho». «Sobre una cama» mantiene la literalidad sin importar en el texto la interpretación de «sickbed». La posible lectura de cama de sufrimiento queda implícita por el contexto de juicio y se preserva en nota.
- source_word: τοὺς μοιχεύοντας μετ’ αὐτῆς
  english_pob_choice: those who commit adultery with her
  chosen_spanish: a los que adulteran con ella
  alternatives_spanish:
  - a los que cometen adulterio con ella
  - a sus adúlteros
  lexicon: BDAG
  rationale: μoιχεύω tiene sentido directo de adulterar. «Adulteran con ella» conserva el verbo y su fuerza concreta; evita suavizarlo a una paráfrasis más general. El participio presente se mantiene como acción en curso o caracterizadora.
- source_word: εἰς θλῖψιν μεγάλην
  english_pob_choice: into great affliction
  chosen_spanish: en gran aflicción
  alternatives_spanish:
  - en gran tribulación
  - en gran angustia
  lexicon: BDAG
  rationale: θλῖψις puede ser «aflicción», «angustia» o «tribulación». «Gran aflicción» comunica sufrimiento severo en español común y evita cargar el verso con la asociación técnica de «tribulación», aunque esa alternativa sigue siendo válida.
- source_word: ἐὰν μὴ μετανοήσωσιν
  english_pob_choice: unless they repent
  chosen_spanish: a menos que se arrepientan
  alternatives_spanish:
  - si no se arrepienten
  lexicon: BDAG
  rationale: La construcción condicional se vuelve naturalmente «a menos que». «Arrepentirse» es el equivalente más directo del valor contextual de μετανοέω aquí.
- source_word: ἐκ τῶν ἔργων αὐτῆς
  english_pob_choice: of her works
  chosen_spanish: de sus obras
  alternatives_spanish:
  - de sus hechos
  - de lo que ella hace
  lexicon: BDAG
  rationale: Después de μετανοέω, ἐκ marca apartarse de algo. «Arrepentirse de sus obras» preserva la relación con ἔργα y suena idiomático en español. Se prefirió «obras» para mantener continuidad léxica con el término griego.
theological_decisions:
- issue: Naturaleza de κλίνη en un contexto de juicio
  english_pob_reading: Keep the literal 'bed' in the main text
  chosen_spanish_reading: Mantener «cama» en el texto principal
  alternative_spanish_readings:
  - cama de enfermedad
  - lecho de sufrimiento
  rationale: El griego dice literalmente κλίνη, no «cama de enfermedad». En un contexto de juicio, puede entenderse como una cama de sufrimiento o humillación, pero la traducción principal no debe introducir esa interpretación como si fuera explícita. La nota conserva la alternativa interpretativa.
  doctrine_reference: Translation philosophy 1, 3
- issue: Sentido de μοιχεύω en Apocalipsis
  english_pob_reading: Translate with the lexical sense 'commit adultery' and leave broader application implicit
  chosen_spanish_reading: Traducir con el sentido lexical «adulterar» y dejar implícita la aplicación más amplia
  alternative_spanish_readings:
  - cometer inmoralidad sexual con ella
  - ser infiel con ella
  rationale: μοιχεύω denota adulterio de manera concreta. Aunque Apocalipsis puede usar esta imagen con fuerza simbólica, no conviene diluir el término en una paráfrasis más amplia. «Adulteran con ella» conserva la tensión entre sentido literal e implicación figurada.
  doctrine_reference: Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del audit trail inglés y del griego SBLGNT. No se introdujeron cambios respecto del sentido base: se mantuvo la literalidad de κλίνη como «cama», la fuerza concreta de μοιχεύω como «adulterar», y la opción contextualmente amplia de θλῖψις como «aflicción».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo para el nombre divino cuando aparezca; este verso no lo contiene.
  - Se eligió «arrepientan» para μετανοέω según el valor contextual de giro moral, no como mera «cambio de mente».
  - «Obras» mantiene la continuidad léxica con ἔργα.
  - «Aflicción» evita imponer en el texto principal la carga técnica de «tribulación».
  - Se conserva el estilo sobrio y público de la serie, sin arcaísmos innecesarios.
