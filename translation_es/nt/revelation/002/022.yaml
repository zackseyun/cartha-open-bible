    reason: lexical_alternative
  - marker: b
    text: O «a gran tribulación». Aquí la frase se refiere a sufrimiento o angustia severos.
    reason: lexical_alternative
  revision_rationale: Se ajustó «adulteran» a «cometen adulterio» por mayor naturalidad en español sin perder el sentido directo de μοιχεύω. Se aclaró el referente de αὐτῆς final con «de las obras de ella» para evitar ambigüedad. También se prefirió «a gran aflicción» para reflejar mejor el movimiento de εἰς en coordinación con «la arrojo sobre una cama».
