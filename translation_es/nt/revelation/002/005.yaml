translation:
  language: es
  text: Recuerda, pues, de dónde has caído[a]; arrepiéntete y haz las obras que hacías al principio. Pero si no, vengo a ti, y removeré tu candelabro de su lugar[b], a menos que te arrepientas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de qué altura has caído». El griego dice literalmente «de dónde has caído»; algunos entienden allí una metáfora implícita de altura.
    reason: lexical_alternative
  - marker: b
    text: El «candelabro» es la imagen usada para una iglesia en Apocalipsis 1:20.
    reason: cross_reference
lexical_decisions:
- source_word: μνημόνευε
  english_pob_choice: remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Sigue recordando
  - Ten presente
  lexicon: BDAG
  rationale: El imperativo presente pide una acción continua de memoria. «Recuerda» es natural en español y conserva el mandato sin volverse pesado.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: pues
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca la inferencia a partir de la reprensión anterior. «Pues» mantiene la conexión lógica con fluidez en español bíblico moderno.
- source_word: πόθεν
  english_pob_choice: from where
  chosen_spanish: de dónde
  alternatives_spanish:
  - desde dónde
  - de qué altura
  lexicon: BDAG
  rationale: La adverbial griega significa literalmente «de dónde / desde dónde». «De dónde» conserva la forma transparente sin introducir «altura» en el texto principal.
- source_word: πέπτωκας
  english_pob_choice: you have fallen
  chosen_spanish: has caído
  alternatives_spanish:
  - te has caído
  - has caído lejos
  lexicon: BDAG
  rationale: El perfecto expresa una caída ya ocurrida con resultado presente. «Has caído» retiene la metáfora sin añadir explícitamente «apartado» o «apostatado».
- source_word: μετανόησον
  english_pob_choice: repent
  chosen_spanish: arrepiéntete
  alternatives_spanish:
  - cambia de mente
  - vuélvete
  lexicon: BDAG
  rationale: En contexto moral-espiritual, el uso normal y fiel en español es «arrepiéntete». «Cambia de mente» sería demasiado explicativo y menos idiomático.
- source_word: τὰ πρῶτα ἔργα
  english_pob_choice: the works you did at first
  chosen_spanish: las obras primeras
  alternatives_spanish:
  - las primeras obras
  - las obras que hiciste al principio
  lexicon: BDAG
  rationale: La frase apunta a las obras propias del estado inicial. «Obras primeras» sigue de cerca el griego y es comprensible en español eclesial; «primeras obras» también sería posible, pero esta forma suena más sobria.
- source_word: ποίησον
  english_pob_choice: do
  chosen_spanish: practica
  alternatives_spanish:
  - haz
  - realiza
  lexicon: BDAG
  rationale: El verbo ποιέω aquí exige que esas obras se vuelvan a ejecutar. «Practica» comunica repetición/observancia habitual mejor que un simple «haz» aislado.
- source_word: εἰ δὲ μή
  english_pob_choice: But if not
  chosen_spanish: Pero si no
  alternatives_spanish:
  - de lo contrario
  - si no
  lexicon: BDAG
  rationale: Introduce la advertencia condicional con abrupta seriedad. «Pero si no» conserva bien esa fuerza en español.
- source_word: ἔρχομαί σοι
  english_pob_choice: I am coming to you
  chosen_spanish: vengo a ti
  alternatives_spanish:
  - estoy viniendo a ti
  - iré a ti
  lexicon: BDAG
  rationale: El presente puede funcionar con valor futuro e inminente. «Vengo a ti» preserva esa viveza sin sobreexplicar la dirección o el matiz de juicio.
- source_word: κινήσω
  english_pob_choice: I will remove
  chosen_spanish: removeré
  alternatives_spanish:
  - moveré
  - quitaré
  lexicon: BDAG
  rationale: Aunque el verbo literalmente significa «mover», en este contexto de juicio con ἐκ τοῦ τόπου αὐτῆς el efecto es la retirada del candelabro de su sitio. «Removeré» conserva la relación con el movimiento sin perder la fuerza de desplazamiento.
- source_word: τὴν λυχνίαν σου
  english_pob_choice: your lampstand
  chosen_spanish: tu candelabro
  alternatives_spanish:
  - tu lámpara
  - tu lamparero
  lexicon: BDAG
  rationale: λυχνία designa el soporte de la lámpara, no la lámpara misma. «Candelabro» es el equivalente más natural en español y conserva la imagen simbólica de Apocalipsis 1:20.
- source_word: ἐκ τοῦ τόπου αὐτῆς
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - fuera de su lugar
  lexicon: BDAG
  rationale: Reproduce de manera directa la idea de desplazamiento fuera de la ubicación propia. «De su lugar» es claro y sobrio.
- source_word: ἐὰν μὴ μετανοήσῃς
  english_pob_choice: unless you repent
  chosen_spanish: si no te arrepientes
  alternatives_spanish:
  - a menos que te arrepientas
  - si no arrepentís
  lexicon: BDAG
  rationale: La cláusula condicional negativa se expresa con naturalidad por «si no te arrepientes». Conserva la advertencia sin alterar el sentido.
theological_decisions:
- issue: Sentido del candelabro y el juicio anunciado
  english_pob_reading: Retain the symbolic image of removing the church's lampstand without explicating it as loss of salvation or merely loss of witness.
  chosen_spanish_reading: Mantener la imagen simbólica de remover el candelabro de su lugar sin explicarlo como pérdida de salvación ni reducirlo solo a pérdida de testimonio.
  alternative_spanish_readings:
  - pérdida del testimonio corporativo
  - juicio sobre la existencia o estatus de la iglesia
  - pérdida de salvación
  rationale: En Apocalipsis 1:20, los candelabros representan iglesias. El texto aquí anuncia juicio real, pero no define por sí mismo una conclusión sistemática sobre salvación individual. La traducción conserva la tensión interpretativa en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica del pasaje.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés; no se detectaron revisiones pendientes ni cambios recientes que afecten la redacción. Se mantuvo la misma decisión principal de traducir λυχνία como «candelabro» y de preservar la metáfora de caída sin explicitar «apartado» o «apostatado».
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un κύριος alusivo.
  - Se prefirió «candelabro» para λυχνία por coherencia con la nota de Apocalipsis 1:20 y con el valor simbólico del término.
  - Se evitó «SEÑOR» y otras sustituciones litúrgicas no presentes en el griego.
  - «Arrepiéntete» se mantiene para μετανοέω por consistencia con el enfoque moral-espiritual del contexto.
