  text: μνημόνευε οὖν πόθεν ⸀πέπτωκας, καὶ μετανόησον καὶ τὰ πρῶτα ἔργα ποίησον· εἰ δὲ μή, ἔρχομαί ⸀σοι, καὶ κινήσω τὴν λυχνίαν σου ἐκ τοῦ τόπου αὐτῆς, ἐὰν μὴ μετανοήσῃς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/005.yaml
  text: Therefore remember from where you have fallen[a], and repent, and do the works you did at first. But if not, I am coming to you, and I will remove your lampstand from its place[b], unless you repent.
  footnotes:
  - marker: a
    text: Or 'from what height you have fallen.' The Greek literally says 'from where you have fallen'; some take it as an implied metaphor of height.
    reason: lexical_alternative
  - marker: b
    text: The 'lampstand' is the image used for a church in Revelation 1:20.
    reason: cross_reference
