revisions:
- from: Recuerda, pues, de dónde has caído[a]; arrepiéntete y practica las obras primeras. Pero si no, vengo a ti, y removeré tu candelabro de su lugar[b], si no te arrepientes.
  to: Recuerda, pues, de dónde has caído[a]; arrepiéntete y haz las obras que hacías al principio. Pero si no, vengo a ti, y removeré tu candelabro de su lugar[b], a menos que te arrepientas.
  rationale: Se ajusta la frase central para reflejar con más fidelidad y naturalidad τὰ πρῶτα ἔργα ποίησον, evitando el calco «obras primeras» y el matiz añadido de «practica». También se cambia la cláusula final a «a menos que te arrepientas» para reproducir mejor la fuerza idiomática de ἐὰν μὴ μετανοήσῃς y mejorar la fluidez del período.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: recuerdo de la caída, llamado al arrepentimiento, retorno a las obras iniciales y advertencia sobre la remoción del candelabro. También conserva la alternativa de πόθεν y la nota simbólica sobre λυχνία. Sin embargo, dos elecciones españolas se alejan del mejor reflejo del expediente POB: «practica las obras primeras» no transmite tan bien como el inglés/ griego la idea concreta de volver a hacer las obras de antes, y «si no te arrepientes» al final pierde la concisión y fuerza idiomática de ἐὰν μὴ μετανοήσῃς / “unless you repent”, mejor como «a menos que te arrepientas».'
  spanish_quality_summary: El texto es claro y legible, pero «las obras primeras» suena algo forzado en español actual, y combinado con «practica» produce una frase menos natural que «haz las obras que hacías al principio» o similar. «Removeré» es entendible, pero «quitaré» sería más natural; aun así, «removeré» puede tolerarse por cercanía al expediente. La revisión propuesta mejora naturalidad sin perder dignidad ni precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Arrepiéntete» está bien para μετανοέω. «Candelabro» preserva λυχνία adecuadamente y mantiene la imaginería de Apocalipsis 1:20. No intervienen Yahvé/Mesías/esclavo u otros términos sensibles del glosario.
  issues:
  - severity: medium
    issue: «practica las obras primeras» es una formulación poco natural y semánticamente imprecisa
    rationale: τὰ πρῶτα ἔργα ποίησον apunta a volver a hacer las obras de la etapa inicial. «Practica» añade matiz habitual no requerido, y «obras primeras» suena calco. El expediente inglés prefería explícitamente «the works you did at first». En español conviene reflejar esa fuerza temporal de modo natural.
  - severity: medium
    issue: La cláusula final «si no te arrepientes» debilita la equivalencia idiomática de «unless you repent»
    rationale: Aunque no es incorrecta, la repetición de «si no» tras «Pero si no» hace el período más pesado y menos preciso. «A menos que te arrepientas» reproduce mejor el valor de ἐὰν μὴ y evita posible torpeza estilística.
  - severity: low
    issue: «Removeré» es menos natural que «quitaré» o «removeré ... de su lugar» en registro bíblico general
    rationale: La forma actual no es errónea y mantiene el vínculo con κινήσω, pero en español común suena más técnica. No exige rechazo; puede mantenerse si se desea mayor cercanía al expediente inglés.
  revised_spanish_text: Recuerda, pues, de dónde has caído[a]; arrepiéntete y haz las obras que hacías al principio. Pero si no, vengo a ti, y removeré tu candelabro de su lugar[b], a menos que te arrepientas.
  revised_footnotes:
  - marker: a
    text: O «de qué altura has caído». El griego dice literalmente «de dónde has caído»; algunos entienden allí una metáfora implícita de altura.
    reason: lexical_alternative
  - marker: b
    text: El «candelabro» es la imagen usada para una iglesia en Apocalipsis 1:20.
    reason: cross_reference
  revision_rationale: Se ajusta la frase central para reflejar con más fidelidad y naturalidad τὰ πρῶτα ἔργα ποίησον, evitando el calco «obras primeras» y el matiz añadido de «practica». También se cambia la cláusula final a «a menos que te arrepientas» para reproducir mejor la fuerza idiomática de ἐὰν μὴ μετανοήσῃς y mejorar la fluidez del período.
