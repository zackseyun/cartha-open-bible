    changes_summary: Revised the opening to reflect the Greek construction more naturally in English by rendering καὶ ὁ νικῶν ... as 'And to the one who conquers and keeps...' rather than repeating 'who.' Also removed 'him' since 'give authority' already implies the indirect object and reads more smoothly in formal English.
translation:
  language: es
  text: Y al que vence y guarda mis obras hasta el fin, le daré autoridad sobre las naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ νικῶν
  english_pob_choice: the one who conquers
  chosen_spanish: el que vence
  alternatives_spanish:
  - el que conquista
  - el vencedor
  - el que sobrevive
  lexicon: BDAG
  rationale: El participio sustantivado pide una expresión personal y caracterizada por la acción continua. 'Vence' conserva la imagen de conflicto y victoria, y en español resulta natural en Apocalipsis. 'Conquista' es posible, pero puede sonar más territorial o militar de lo que exige el contexto inmediato.
- source_word: ὁ τηρῶν
  english_pob_choice: who keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  - conserva
  lexicon: BDAG
  rationale: τηρέω abarca guardar, observar y preservar con fidelidad. 'Guarda' mantiene esa idea de custodia y observancia sin restringirla solo a obediencia formal.
- source_word: ἄχρι τέλους
  english_pob_choice: until the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: BDAG
  rationale: La expresión temporal pide perseverancia hasta la meta. 'Hasta el fin' es idiomática, solemne y fiel al sentido durativo del griego.
- source_word: τὰ ἔργα μου
  english_pob_choice: my works
  chosen_spanish: mis obras
  alternatives_spanish:
  - mis obras
  - mis hechos
  - lo que hago
  lexicon: BDAG
  rationale: Se conserva el sintagma literal 'mis obras' para no cerrar la ambigüedad del genitivo. En español, 'obras' mantiene el eco bíblico y permite tanto obras de Jesús como obras conformes a él, sin precisar más de lo que el griego dice.
- source_word: δώσω αὐτῷ
  english_pob_choice: I will give him
  chosen_spanish: le daré
  alternatives_spanish:
  - le concederé
  - le otorgaré
  lexicon: BDAG
  rationale: El futuro de δίδωμι se rinde naturalmente con 'daré'. 'Le' expresa el objeto indirecto de manera fluida en español y evita sobrecargar la frase.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  - jurisdicción
  lexicon: BDAG
  rationale: '''Autoridad'' es la opción más precisa para ἐξουσία en relación con gobierno o dominio delegado. ''Poder'' sería más amplio y menos específico.'
- source_word: ἐπὶ τῶν ἐθνῶν
  english_pob_choice: over the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - sobre los pueblos
  - sobre las naciones gentiles
  lexicon: BDAG
  rationale: En Apocalipsis, ἔθνη normalmente remite a las naciones del mundo. 'Sobre' conserva el valor de gobierno o supremacía de ἐπί con genitivo.
theological_decisions:
- issue: Genitivo de relación en 'mis obras'
  english_pob_reading: Preserve the literal phrase 'my works'
  chosen_spanish_reading: Conservar 'mis obras' sin explicitar si son obras de Jesús, obras requeridas por él o obras conformes a él
  alternative_spanish_readings:
  - mis obras, es decir, las que yo hago
  - mis obras, o las que él requiere
  - mis obras, mis mandamientos
  rationale: El texto griego no especifica la relación del genitivo. Mantener la ambigüedad evita imponer una interpretación doctrinal no explicitada en el verso y preserva la tensión lexical documentada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Sujeto singular masculino representativo
  english_pob_reading: Retain singular masculine 'him' in the main text
  chosen_spanish_reading: No marcar género en el objeto indirecto; usar 'le daré' con sujeto substantivado 'el que vence'
  alternative_spanish_readings:
  - le daré autoridad
  - le daré a esa persona autoridad
  - les daré autoridad
  rationale: El griego usa participios y pronombre masculinos singulares de forma representativa. En español, 'el que vence' conserva el valor gramatical del singular sin introducir un 'él' explícito innecesario, y 'le daré' mantiene la naturalidad sintáctica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de 'hasta el fin'
  english_pob_reading: until the end
  chosen_spanish_reading: hasta el fin como perseverancia temporal
  alternative_spanish_readings:
  - hasta el final
  - hasta la consumación
  rationale: La frase es temporal y exhortativa. 'Hasta el fin' es breve, tradicional y claro en español sin convertir la expresión en una abstracción más técnica de lo que permite el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó la apertura a 'And to the one who conquers and keeps...' y eliminó el 'him' explícito por fluidez, sin cambiar el contenido semántico. La versión española sigue esa línea de naturalidad al usar 'Y al que vence y guarda...' y 'le daré', conservando al mismo tiempo la literalidad de 'mis obras' y 'autoridad sobre las naciones'.
  spanish_consistency_notes:
  - Se mantiene 'autoridad' para ἐξουσία en coherencia con el léxico POB.
  - Se evita 'Cristo' o 'Mesías' porque el verso no contiene Χριστός/Μεσσίας.
  - Se usa 'naciones' y no 'gentiles' porque el contexto apocalíptico favorece el sentido político-universal de ἔθνη.
  - Se conserva la ambigüedad de 'mis obras' como en el audit trail inglés.
  - No se introducen notas al pie porque no hay marcadores anclados en el texto español.
