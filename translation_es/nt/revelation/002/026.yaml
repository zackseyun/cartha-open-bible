  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Autoridad» para ἐξουσίαν y «naciones» para ἐθνῶν están bien elegidos. «Mis obras» preserva correctamente la decisión léxica y teológica documentada. «El que vence» es una buena equivalencia de ὁ νικῶν en contexto apocalíptico.
