  source_alignment_summary: 'El borrador español refleja fielmente la sintaxis y el sentido del griego: καὶ ὁ νικῶν καὶ ὁ τηρῶν se vierte bien como «Y al que vence y guarda»; ἄχρι τέλους como «hasta el fin»; τὰ ἔργα μου como «mis obras» sin estrechar indebidamente el genitivo; y ἐξουσίαν ἐπὶ τῶν ἐθνῶν como «autoridad sobre las naciones». También respeta la revisión inglesa que prefirió «And to the one who...» frente a una coordinación más pesada.'
