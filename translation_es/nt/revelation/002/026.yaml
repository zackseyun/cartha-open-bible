base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/026.yaml
  text: And to the one who conquers and keeps my works until the end[a], I will give authority over the nations[c][b],
  footnotes:
  - marker: a
    text: Or 'the one who overcomes.'
    reason: lexical_alternative
  - marker: b
    text: '''My works'' could mean works that belong to or accord with Jesus—his deeds, purposes, or the works he requires; the Greek does not make the relation more specific.'
    reason: lexical_alternative
  - marker: c
    text: The Greek has singular masculine forms ('the one who ... I will give him'), used here in a representative sense.
    reason: cultural_note
