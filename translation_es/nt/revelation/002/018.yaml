    issue: La nota [a] está anclada a «Dios» en vez de a «ángel».
    rationale: La nota explica la alternativa léxica de ἀγγέλῳ («mensajero»), por lo que el marcador debe aparecer junto a «ángel» en el texto español. Tal como está, induce a error editorial y rompe la correspondencia entre nota y fuente.
