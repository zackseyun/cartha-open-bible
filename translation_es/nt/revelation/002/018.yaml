  text: Καὶ τῷ ἀγγέλῳ ⸀τῆς ἐν Θυατείροις ἐκκλησίας γράψον· Τάδε λέγει ὁ υἱὸς τοῦ θεοῦ, ὁ ἔχων τοὺς ὀφθαλμοὺς αὐτοῦ ὡς φλόγα πυρός, καὶ οἱ πόδες αὐτοῦ ὅμοιοι χαλκολιβάνῳ·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/018.yaml
  text: 'And to the angel of the church in Thyatira write: These things says the Son of God[a], the one who has his eyes like a flame of fire[b], and his feet like burnished bronze:'
  footnotes:
