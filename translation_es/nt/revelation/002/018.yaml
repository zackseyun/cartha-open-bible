translation:
  language: es
  text: 'Y al ángel[a] de la iglesia en Tiatira escribe: «Esto dice el Hijo de Dios, el que tiene sus ojos como llama de fuego[b], y sus pies semejantes a bronce bruñido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero» para ἀγγέλῳ.
    reason: alternative_reading
  - marker: b
    text: El término griego traducido «bronce bruñido» es raro y puede referirse, de manera más general, a un metal o aleación refinados y resplandecientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλῳ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: Conservo la lectura apocalíptica habitual de la fórmula de las cartas a las siete iglesias. Aunque «mensajero» es posible, «ángel» mantiene mejor la consistencia intertextual y el sentido tradicional del género, sin cerrar del todo la ambigüedad interpretativa.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: «Iglesia» es la equivalencia natural en español para esta comunidad cristiana. «Asamblea» sería más etimológica, pero menos idiomática en este contexto eclesial.
- source_word: Τάδε λέγει
  english_pob_choice: These things says
  chosen_spanish: Esto dice
  alternatives_spanish:
  - Así dice
  - Estas cosas dice
  lexicon: BDAG
  rationale: La fórmula profética griega se vierte de manera sobria y reconocible con «Esto dice». Mantiene el tono formal sin sonar artificial en español.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico explícito y pleno. En español, «Hijo de Dios» es la forma directa y más fiel, sin atenuar la referencia divina.
- source_word: ὁ ἔχων τοὺς ὀφθαλμοὺς αὐτοῦ ὡς φλόγα πυρός
  english_pob_choice: the one who has his eyes like a flame of fire
  chosen_spanish: el que tiene sus ojos como llama de fuego
  alternatives_spanish:
  - el que tiene los ojos como llama de fuego
  - el que tiene sus ojos como una llama de fuego
  lexicon: BDAG
  rationale: Conservo la comparación imagética casi al pie de la letra. «Llama de fuego» reproduce bien la fuerza de φλόγα πυρός; el posesivo «sus» sigue el griego y mantiene la referencia al sujeto descrito.
- source_word: οἱ πόδες αὐτοῦ ὅμοιοι χαλκολιβάνῳ
  english_pob_choice: his feet like burnished bronze
  chosen_spanish: sus pies semejantes a bronce bruñido
  alternatives_spanish:
  - sus pies como bronce bruñido
  - sus pies semejantes a metal bruñido
  lexicon: BDAG
  rationale: «Brunoido» conserva el valor de metal refinado y reluciente del término raro χαλκολίβανον. Elegí «semejantes a» para reflejar con más exactitud el predicado ὅμοιοι, sin perder fluidez en español.
theological_decisions:
- issue: 'Referencia cristológica explícita: "Hijo de Dios"'
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - el Hijo de Dios
  rationale: Se mantiene el título cristológico pleno y no se suaviza a una designación funcional. La formulación española conserva la afirmación de identidad que el texto griego presenta de forma directa.
  doctrine_reference: Credo de Nicea (381); Concilio de Calcedonia (451)
- issue: Ambigüedad de ἀγγέλῳ en la dirección a Tiatira
  english_pob_reading: angel
  chosen_spanish_reading: ángel
  alternative_spanish_readings:
  - mensajero
  rationale: Se preserva la lectura más probable dentro del patrón apocalíptico de las cartas, pero sin eliminar la alternativa interpretativa. La nota mantiene la transparencia del texto y evita resolver dogmáticamente la ambigüedad.
  doctrine_reference: 'Principio POB: preservar tensiones léxicas y teológicas documentadas'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y coincide sustancialmente con el tramo final del audit trail inglés. No hay revisiones aplicadas en el registro fuente; por ello, la traducción conserva la formulación establecida y solo ajusta la sintaxis al español natural.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el nombre divino.
  - Se mantiene «ángel» para ἀγγέλῳ, con nota alternativa «mensajero» para preservar la tensión léxica.
  - «Hijo de Dios» se traduce de forma directa y plenamente cristológica, siguiendo el valor del título en el contexto apocalíptico.
  - «Bronce bruñido» intenta reproducir la imagen metálica rara de χαλκολίβανον sin sobrerresolver su referente exacto.
  - La puntuación con dos puntos y comillas angulares se adapta a la sintaxis española de apertura de discurso directo.
