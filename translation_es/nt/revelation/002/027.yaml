translation:
  language: es
  text: y él los pastoreará con una vara de hierro[a], como las vasijas de barro[b] son hechas pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «regirá con una vara de hierro». El verbo significa literalmente «pastorear», pero en esta alusión al Salmo 2 también lleva el sentido de autoridad real.'
    reason: alternative_reading
  - marker: b
    text: Alusión al Salmo 2:9, donde las naciones son quebradas como vasijas de barro.
    reason: cross_reference
lexical_decisions:
- source_word: ποιμανεῖ
  english_pob_choice: will shepherd
  chosen_spanish: pastoreará
  alternatives_spanish:
  - regirá
  - gobernará como pastor
  lexicon: BDAG
  rationale: ποιμαίνω significa literalmente 'pastorear'; por eso 'pastoreará' conserva la imagen original. En este eco de Salmo 2 también hay sentido de autoridad real, pero en español 'regirá' o 'gobernará' aplanarían la tensión entre cuidado pastoral y dominio.
- source_word: ἐν ῥάβδῳ σιδηρᾷ
  english_pob_choice: with an iron rod
  chosen_spanish: con una vara de hierro
  alternatives_spanish:
  - con un cetro de hierro
  - con una vara férrea
  lexicon: BDAG
  rationale: ῥάβδος puede ser vara, bastón o cetro; 'vara de hierro' refleja de manera natural el paralelo de Salmo 2 y mantiene el matiz de instrumento de autoridad y coerción. 'Cetro' enfatizaría solo la realeza, mientras que 'vara férrea' suena menos directo en español.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: La comparación continúa con fluidez en español con 'así como', que conserva el valor comparativo sin introducir una interpretación adicional.
- source_word: τὰ σκεύη τὰ κεραμικὰ
  english_pob_choice: clay vessels
  chosen_spanish: los vasos de barro
  alternatives_spanish:
  - vasijas de barro
  - utensilios de barro
  lexicon: BDAG
  rationale: σκεῦος es un término general para recipiente o vaso; κεραμικός especifica material cerámico. 'Vasos de barro' es una forma clara y bíblicamente reconocible en español, y conserva la fragilidad de la imagen mejor que opciones más técnicas.
- source_word: συντρίβεται
  english_pob_choice: are shattered
  chosen_spanish: son quebrados
  alternatives_spanish:
  - son hechos pedazos
  - son triturados
  - son despedazados
  lexicon: BDAG
  rationale: συντρίβω expresa ruptura violenta. 'Son quebrados' es una equivalencia natural y suficientemente fuerte en español; 'son hechos pedazos' explicita el resultado, pero 'son quebrados' preserva la sobriedad del texto y la alusión poética.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y además
  - también
  lexicon: BDAG
  rationale: Conector simple que vincula esta cláusula con la promesa anterior; 'y' es la opción más directa y fiel.
theological_decisions:
- issue: Tensión entre pastoreo e իշխանía/autoridad real en ποιμανεῖ dentro de la alusión a Salmo 2
  english_pob_reading: Preserve the shepherding metaphor in the main text while allowing the coercive royal sense to remain implicit in context.
  chosen_spanish_reading: Mantener 'pastoreará' en el texto principal y dejar que el contexto de la vara de hierro y la alusión al Salmo 2 comuniquen la autoridad real.
  alternative_spanish_readings:
  - Traducir 'regirá' para hacer explícito el dominio
  - Traducir 'gobernará' para enfatizar la realeza
  rationale: El griego usa ποιμαίνω, no un verbo genérico para gobernar. En español, 'pastoreará' conserva la imagen base y la tensión teológica entre cuidado pastoral y gobierno severo; las otras opciones resuelven demasiado pronto esa ambivalencia.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Alusión a Salmo 2:9 en la imagen de la vara de hierro y los vasos de barro
  english_pob_reading: An allusion to Psalm 2:9, where the nations are broken like pottery.
  chosen_spanish_reading: Conservar la imagen sin explicitar la cita en el cuerpo, pero anotarla como alusión en nota.
  alternative_spanish_readings:
  - Incorporar una referencia explícita a Salmo 2 en el texto
  - Omitir toda nota y dejar la alusión implícita
  rationale: El texto griego evoca claramente Salmo 2; una nota ayuda a la lectura sin sobrecargar la línea principal. La alusión amplía el sentido de juicio mesiánico sin alterar la traducción del versículo.
  doctrine_reference: Translation philosophy §4 (Preserve intertextual echoes with auditability)
translation_notes:
  revision_awareness: 'Coincide con el pasaje inglés auditado y su última revisión: no hubo cambios necesarios; se preserva la tensión entre pastoreo y dominio real, y la comparación con vasos de barro refleja la alusión a Salmo 2:9.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque aquí no aparece el nombre divino explícito.
  - Se evitó 'Cristo' en favor de la imagen verbal del texto; la lectura mesiánica queda implícita por el contexto apocalíptico y la alusión a Salmo 2.
  - '''Vara de hierro'' sigue el registro bíblico natural en español y conserva el paralelismo con el inglés auditado.'
  - '''Vasos de barro'' comunica con claridad la fragilidad del objeto comparado y es idiomático en español de iglesia sin perder fidelidad al griego.'
