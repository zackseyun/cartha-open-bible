    rationale: σκεύη τὰ κεραμικὰ apunta a recipientes de alfarería; en español bíblico y general 'vasijas de barro' comunica mejor la imagen de pottery/clay vessels y la alusión a Salmo 2:9.
  - severity: medium
    issue: '''son quebrados'' debilita la fuerza de συντρίβεται y suena algo rígido.'
    rationale: El verbo griego expresa ruptura violenta. En español, 'son hechas pedazos' o 'son destrozadas' suena más natural y fuerte, preservando mejor la imagen judicial del texto.
  - severity: low
