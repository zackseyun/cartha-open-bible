    rationale: '''Como'' basta para ὡς y mejora la fluidez sin pérdida de sentido.'
  - severity: low
    issue: La redacción de la nota [a] está innecesariamente cargada de comillas de escape.
    rationale: Conviene normalizar la puntuación para mejor legibilidad editorial en español.
