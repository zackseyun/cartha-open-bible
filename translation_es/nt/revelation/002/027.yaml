  glossary_alignment: Alineado con la terminología del proyecto en los elementos relevantes. 'Pastoreará' respeta la decisión de no aplanar ποιμανεῖ a mero gobierno; la nota alternativa con 'regirá' es adecuada. No hay conflicto con los glosarios mayores del proyecto.
