revisions:
- from: Por tanto, arrepiéntete[a]. Pero si no, vengo a ti pronto[b], y pelearé contra ellos con la espada de mi boca.
  to: Por tanto, arrepiéntete. Pero si no, vengo a ti pronto, y haré guerra contra ellos[a] con la espada de mi boca[b].
  rationale: Se corrige un error importante de anclaje de nota, trasladando la nota léxica al sintagma «contra ellos», que es donde realmente existe la alternativa relevante en el griego. También se fortalece πολεμήσω con «haré guerra contra ellos» para reflejar mejor la severidad marcial y judicial documentada en el English POB, manteniendo un español claro y digno. La imagen apocalíptica de «la espada de mi boca» se conserva sin paráfrasis.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:02Z'
