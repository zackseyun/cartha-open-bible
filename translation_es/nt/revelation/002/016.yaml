translation:
  language: es
  text: Por tanto, arrepiéntete. Pero si no, vengo a ti pronto, y haré guerra contra ellos[a] con la espada de mi boca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «con ellos»; aquí, después de «haré guerra», el sentido es adversativo: «contra ellos».'
    reason: lexical_alternative
  - marker: b
    text: La «espada de mi boca» es una imagen apocalíptica del juicio pronunciado por la palabra de Cristo.
    reason: cross_reference
lexical_decisions:
- source_word: μετανόησον
  english_pob_choice: repent
  chosen_spanish: arrepiéntete
  alternatives_spanish:
  - cambia de mente
  - vuélvete
  lexicon: BDAG
  rationale: El imperativo aoristo exige una llamada decisiva. «Arrepiéntete» conserva la fuerza moral y exhortativa mejor que una opción más débil como «cambia de mente».
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Marca consecuencia lógica de la reprensión anterior. «Por tanto» mantiene el tono inferencial y solemne.
- source_word: εἰ δὲ μή
  english_pob_choice: but if not
  chosen_spanish: pero si no
  alternatives_spanish:
  - de lo contrario
  - si no
  lexicon: BDAG
  rationale: La fórmula condicional incluye contraste fuerte; «pero si no» refleja bien δέ y μή sin suavizar la advertencia.
- source_word: ἔρχομαί σοι
  english_pob_choice: I am coming to you
  chosen_spanish: vengo a ti
  alternatives_spanish:
  - estoy viniendo a ti
  - vendré a ti
  lexicon: BDAG
  rationale: El presente con valor inminente puede expresarse naturalmente en español con presente; «vengo a ti» conserva la proximidad y la solemnidad de la amenaza.
- source_word: ταχύ
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - enseguida
  lexicon: BDAG
  rationale: Aquí el matiz principal es la inminencia. «Pronto» transmite cercanía temporal de forma natural en español.
- source_word: πολεμήσω
  english_pob_choice: I will make war against
  chosen_spanish: pelearé contra
  alternatives_spanish:
  - haré guerra contra
  - combatiré contra
  lexicon: BDAG
  rationale: Aunque el verbo puede intensificar el sentido bélico, en español «pelearé contra» preserva la hostilidad sin sonar excesivamente idiomático o artificial. Mantiene la tensión militar del texto.
- source_word: μετ’ αὐτῶν
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - con ellos
  lexicon: BDAG
  rationale: El contexto de πολεμήσω hace adversativo el μετά con genitivo. «Contra ellos» evita la ambigüedad de «con ellos» y refleja el sentido hostil del original.
- source_word: ἐν τῇ ῥομφαίᾳ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por medio de la espada
  - mediante la espada
  lexicon: BDAG
  rationale: El valor instrumental se expresa con naturalidad en español mediante «con». Mantiene la imagen apocalíptica sin interpretarla de más.
- source_word: ῥομφαίᾳ
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - sable
  - espada grande
  lexicon: BDAG
  rationale: ῥομφαία designa un arma cortante de gran tamaño, pero «espada» es la equivalencia estable y suficientemente fiel en español para esta imagen apocalíptica.
- source_word: τοῦ στόματός μου
  english_pob_choice: of my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - salida de mi boca
  - desde mi boca
  lexicon: BDAG
  rationale: La imagen joánica se conserva literalmente. En español, «boca» es el término natural y transparente para στόμα, manteniendo la metáfora judicial sin desdibujarla.
theological_decisions:
- issue: 'Destino de la advertencia: iglesia y falsos maestros'
  english_pob_reading: The warning distinguishes Christ's coming 'to you' from his making war 'against them.'
  chosen_spanish_reading: La advertencia distingue entre venir «a ti» y pelear «contra ellos», conservando el destinatario corporativo y el juicio dirigido específicamente a los culpables.
  alternative_spanish_readings:
  - vengo contra ti
  - pelearé contra ustedes todos
  rationale: El griego mantiene dos referencias distintas. La traducción española conserva la tensión entre el destinatario de la carta y los objetos directos del juicio sin resolverla por adelantado.
  doctrine_reference: Preservar la tensión teológica del texto sin homogeneizarla.
- issue: Imagen de la espada de la boca
  english_pob_reading: The 'sword of my mouth' is retained as metaphorical-apocalyptic imagery rather than paraphrased as merely 'my word'.
  chosen_spanish_reading: Se conserva «la espada de mi boca» como imagen apocalíptica, no reducida a una paráfrasis como «mi palabra».
  alternative_spanish_readings:
  - mi palabra
  - el poder de mi palabra
  rationale: El texto presenta una metáfora vívida ya establecida en Apocalipsis. Mantenerla en español preserva su peso literario y teológico.
  doctrine_reference: Primacía del texto original y fidelidad a la imaginería apocalíptica.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje inglés de base; la presente propuesta sigue de cerca el texto griego y el audit trail inglés, manteniendo las tensiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος en ese sentido.
  - Se usa «espada» para ῥομφαία por continuidad con el lenguaje apocalíptico y por ser la forma natural en español.
  - Se conserva el valor adversativo de μετ’ αὐτῶν con «contra ellos», evitando la lectura comitiva literal.
  - «Pronto» traduce el matiz de inminencia de ταχύ de manera más natural en español que «rápidamente» en este contexto.
