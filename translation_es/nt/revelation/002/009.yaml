translation:
  language: es
  text: Conozco tu aflicción y tu pobreza—pero eres rico—y la difamación[a] de los que dicen que son judíos y no lo son, sino que son una sinagoga de Satanás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Difamación» vierte el sentido hostil de βλασφημία en este contexto. La alternativa «blasfemia» se reservó para evitar en español la idea exclusiva de ofensa directa contra Dios.
    reason: lexical_alternative
  - marker: b
    text: «Sinagoga» se conserva literalmente. También puede entenderse como «asamblea» o «reunión», pero aquí se mantiene el término por su carga histórica y polémica.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψιν
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - angustia
  - opresión
  lexicon: BDAG
  rationale: θλῖψις expresa presión, sufrimiento o aflicción. «Aflicción» es natural en español moderno y conserva el sentido de padecimiento sin cargar el término con un matiz escatológico técnico que «tribulación» podría sugerir.
- source_word: πτωχείαν
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - miseria
  - indigencia
  lexicon: BDAG
  rationale: πτωχεία significa pobreza de manera directa. «Pobreza» es la traducción más clara e idiomática en español y no exagera el grado del término.
- source_word: πλούσιος
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - acaudalado
  - próspero
  lexicon: BDAG
  rationale: El adjetivo se usa en contraste con la pobreza material. «Rico» mantiene el contraste fuerte y no explicita en la traducción principal si la riqueza es material o valorativa.
- source_word: βλασφημίαν
  english_pob_choice: slander
  chosen_spanish: difamación
  alternatives_spanish:
  - blasfemia
  - injuria
  - maledicencia
  lexicon: BDAG
  rationale: Aquí βλασφημία se refiere a habla hostil dirigida contra creyentes. «Difamación» transmite mejor en español la idea de discurso perjudicial contra personas; «blasfemia» podría sonar a ofensa directa contra Dios y desviar el sentido.
- source_word: ἐκ τῶν λεγόντων
  english_pob_choice: from those who say
  chosen_spanish: de los que dicen
  alternatives_spanish:
  - de quienes afirman
  - procedente de los que dicen
  lexicon: BDAG
  rationale: La preposición ἐκ marca procedencia/origen del discurso hostil y el participio λειτουργa sustantivamente. «De los que dicen» refleja con naturalidad la relación sintáctica sin añadir explicación.
- source_word: Ἰουδαίους εἶναι ἑαυτούς
  english_pob_choice: that they are Jews
  chosen_spanish: que son judíos
  alternatives_spanish:
  - que ellos mismos son judíos
  - que se tienen por judíos
  lexicon: BDAG
  rationale: La construcción significa «decir de sí mismos que son judíos». En español, «que son judíos» es la forma más directa y natural; el matiz reflexivo queda implícito.
- source_word: συναγωγὴ
  english_pob_choice: synagogue
  chosen_spanish: sinagoga
  alternatives_spanish:
  - asamblea
  - reunión
  lexicon: BDAG
  rationale: Aunque συναγωγή puede significar «asamblea», aquí conserva su valor histórico y polémico. «Sinagoga» retiene la especificidad del término y la fuerza de la expresión bíblica.
- source_word: τοῦ Σατανᾶ
  english_pob_choice: of Satan
  chosen_spanish: de Satanás
  alternatives_spanish:
  - perteneciente a Satanás
  lexicon: BDAG
  rationale: El genitivo se vierte con naturalidad como «de Satanás». Mantiene el tono directo del griego sin suavizar la expresión.
theological_decisions:
- issue: Cómo traducir la expresión polémica acerca de los que «dicen que son judíos y no lo son»
  english_pob_reading: Retain 'Jews' literally and preserve the contrast as stated, without expanding it into an ethnic denial or paraphrasing it as merely 'not true Jews.'
  chosen_spanish_reading: Mantener «judíos» de manera literal y conservar el contraste tal como está, sin convertirlo en una negación étnica ni añadir calificativos como «verdaderos».
  alternative_spanish_readings:
  - los que afirman ser el pueblo de Dios y no lo son
  - los que dicen ser verdaderos judíos y no lo son
  rationale: Ἰουδαίους está explícito y debe traducirse directamente como «judíos». La tensión retórica pertenece al texto y no debe resolverse en la traducción mediante explicaciones que atenúen o amplifiquen el sentido.
  doctrine_reference: Preservar la tensión teológica sin resolverla; primacía del original sobre la tradición interpretativa.
- issue: Si conviene explicitar que «rico» se refiere a una riqueza espiritual
  english_pob_reading: Leave 'but you are rich' unqualified in the main text.
  chosen_spanish_reading: Dejar «pero eres rico» sin calificación en el texto principal.
  alternative_spanish_readings:
  - pero eres espiritualmente rico
  rationale: El contraste con la pobreza sugiere una riqueza no meramente material, pero el griego no la explicita. Añadir «espiritualmente» resolvería una implicación del texto en vez de traducirla.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se tomó en cuenta el último pase de revisión del inglés POB, especialmente el ajuste de «slander from those» a «slander of those», reflejado en español con la estructura «la difamación de los que dicen». No se introdujeron explicaciones adicionales que no estén sustentadas por el griego o por el audit trail.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto solo cuando corresponde al nombre divino; aquí no aparece.
  - Se mantuvo «judíos» como traducción directa de Ἰουδαίους, siguiendo el criterio documentado de no paraphrasear el contraste.
  - Se conservó la imagen polémica de «sinagoga de Satanás» sin suavizarla, conforme al texto fuente y al POB en inglés.
  - «Aflicción» y «pobreza» mantienen un registro moderno y digno, apto para lectura eclesial.
  - La puntuación con rayas reproduce el contraste enfático del original y del audit trail inglés.
