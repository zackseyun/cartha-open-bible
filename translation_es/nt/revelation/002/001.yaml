translation:
  language: es
  text: 'Al ángel[a] de la iglesia en Éfeso escribe: «Estas cosas dice el que sostiene las siete estrellas en su mano derecha, el que anda en medio de los siete candelabros de oro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero» de la iglesia en Éfeso.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγέλῳ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: El griego admite tanto un ser celestial como un mensajero humano. En la fórmula repetida de Apocalipsis, «al ángel de la iglesia» conserva mejor el tono apocalíptico y la lectura más natural en español bíblico. «Mensajero» queda como alternativa válida porque la identidad del referente sigue siendo debatida.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En este contexto cristiano establecido, «iglesia» comunica de manera natural y fiel ἐκκλησία. «Asamblea» es posible, pero suena menos idiomática en español y no refleja tan bien el referente ya consolidado.
- source_word: γράψον
  english_pob_choice: write
  chosen_spanish: escribe
  alternatives_spanish:
  - escribe tú
  lexicon: BDAG
  rationale: Es un imperativo aoristo directo; «escribe» reproduce con claridad la orden dada a Juan sin necesidad de ampliación.
- source_word: Τάδε λέγει
  english_pob_choice: These things says
  chosen_spanish: Estas cosas dice
  alternatives_spanish:
  - Así dice
  - Esto es lo que dice
  lexicon: BDAG
  rationale: La expresión conserva la cadencia solemne y la cercanía formal del griego. «Así dice» es una alternativa más tradicional, pero «Estas cosas dice» mantiene mejor la estructura observada por la POB inglesa.
- source_word: κρατῶν
  english_pob_choice: holds
  chosen_spanish: sostiene
  alternatives_spanish:
  - tiene firmemente
  - retiene
  lexicon: BDAG
  rationale: κρατέω aquí expresa posesión firme y control. «Sostiene» comunica esa firmeza en español sin sonar pesado; evita también que la imagen se reduzca a una mera tenencia pasiva.
- source_word: δεξιᾷ
  english_pob_choice: right hand
  chosen_spanish: mano derecha
  alternatives_spanish:
  - diestra
  lexicon: BDAG
  rationale: «Mano derecha» es la forma clara y natural en español, y preserva la imagen concreta asociada con autoridad y protección.
- source_word: περιπατῶν
  english_pob_choice: walks among
  chosen_spanish: anda en medio de
  alternatives_spanish:
  - camina entre
  - anda entre
  lexicon: BDAG
  rationale: Con ἐν μέσῳ, el sentido es moverse en medio de las lámparas/candelabros. «Anda en medio de» conserva la imagen verbal de movimiento y funciona bien en español bíblico.
- source_word: ἐν μέσῳ
  english_pob_choice: among
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  lexicon: BDAG
  rationale: «En medio de» conserva con precisión la expresión espacial del griego y permite vincularla con el verbo «anda» sin perder la imagen.
- source_word: λυχνιῶν
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - lampadarios
  - soportes de lámpara
  lexicon: BDAG
  rationale: λυχνία designa el soporte de la lámpara, no la lámpara misma. «Candelabros» es la equivalencia más natural en español para mantener la imagen del Apocalipsis y la coherencia con el cuadro ya conocido de la visión.
- source_word: χρυσῶν
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - áureos
  lexicon: BDAG
  rationale: Aunque «dorados» es posible como adjetivo, «de oro» expresa de manera directa la cualidad material del griego y suena más sobrio en español bíblico.
theological_decisions:
- issue: Referente de «el ángel de la iglesia»
  english_pob_reading: Retain 'angel' in the main text; preserve 'messenger' in a footnote
  chosen_spanish_reading: Mantener «ángel» en el texto principal y anotar «mensajero» como alternativa
  alternative_spanish_readings:
  - resolverlo como «mensajero»
  - eliminar la ambigüedad
  rationale: El término ἄγγελος permite ambas posibilidades, y el género apocalíptico favorece la lectura de «ángel». Como el referente sigue siendo discutido, conviene preservar la tensión interpretativa en lugar de resolverla dogmáticamente.
  doctrine_reference: Preservar la tensión teológica donde el texto no la resuelve explícitamente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y coincide sustancialmente con la POB inglesa revisada, sin introducir cambios de sentido. Se mantiene la ambigüedad de ἀγγέλῳ mediante nota, y se conserva la imaginería apocalíptica de las siete estrellas y los siete candelabros.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió «iglesia» por coherencia con el uso establecido para ἐκκλησία en el contexto cristiano.
  - Se tradujo λυχνία como «candelabros» para evitar confundir el soporte con la lámpara.
  - La puntuación y comillas siguen el uso estándar del español latinoamericano.
