revisions:
- from: El que tiene oído[a], oiga lo que el Espíritu dice a las iglesias. Al que vence le daré del maná escondido, y le daré una piedra blanca[b], y un nombre nuevo escrito sobre la piedra[c], que nadie conoce sino el que lo recibe.
  to: El que tiene oído, oiga lo que el Espíritu dice a las iglesias. Al que vence le daré del maná escondido, y le daré una piedra blanca[a], y un nombre nuevo escrito sobre la piedra[b], que nadie conoce sino quien la recibe.
  rationale: Se elimina la nota [a] errónea porque no corresponde al griego ni al español y confunde al lector. Se reordenan las notas para mantener solo las que sí están justificadas por el audit trail. Además, se ajusta «el que lo recibe» a «quien la recibe» para mejorar la claridad referencial en español sin alterar el sentido fuente. El resto del texto se conserva porque es fiel, idiomático y alineado con las decisiones léxicas del POB.
