review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la exhortación inicial, la promesa al vencedor, el maná escondido, la piedra blanca y el nombre nuevo conocido solo por quien lo recibe. También mantiene adecuadamente «el Espíritu» y «a las iglesias». Sin embargo, hay dos problemas de fidelidad menor pero reales: la nota [a] está mal anclada y además ofrece una alternativa incorrecta para «El que tiene oído»; y «que nadie conoce sino el que lo recibe» introduce en español una referencia pronominal menos clara que puede sugerir que se recibe el nombre, cuando el inglés auditado explicitó «it» para el complejo piedra/nombre. Conviene mejorar la claridad con «quien la recibe» o reestructurar la frase.'
  spanish_quality_summary: El texto es legible, natural y de tono bíblico digno. «El que tiene oído, oiga» y «Al que vence» funcionan bien. «Maná escondido» y «piedra blanca» son idiomáticos. La principal mejora de calidad es evitar la ambigüedad de «lo recibe» y corregir la nota [a], que hoy confunde al lector. También es mejor mantener la nota [c] como alternativa de orden sintáctico, no como lectura alternativa de sentido.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Espíritu», «iglesias», «vence», «maná», y «piedra blanca» están bien resueltos. No hay conflictos con Yahvé/Mesías/etc. La decisión de usar «piedra blanca» y reservar el trasfondo cultural para nota sigue correctamente la pauta del POB. La única desalineación fuerte es la nota [a], que no corresponde al término griego ὁ ἔχων οὖς sino que accidentalmente repite la idea de τῷ νικῶντι.'
  issues:
