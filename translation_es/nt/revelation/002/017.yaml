translation:
  language: es
  text: El que tiene oído, oiga lo que el Espíritu dice a las iglesias. Al que vence le daré del maná escondido, y le daré una piedra blanca[a], y un nombre nuevo escrito sobre la piedra[b], que nadie conoce sino quien la recibe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «piedra blanca» puede evocar una piedra usada para votar, una ficha de absolución o una piedra de admisión; el texto no precisa cuál de esos trasfondos está en vista.
    reason: cultural_note
  - marker: b
    text: 'O: «y sobre la piedra un nombre nuevo escrito».'
    reason: previous_rendering
lexical_decisions:
- source_word: ὁ ἔχων οὖς
  english_pob_choice: The one who has an ear
  chosen_spanish: El que tiene oído
  alternatives_spanish:
  - Quien tiene oído
  - El que tiene oídos
  lexicon: BDAG
  rationale: La expresión es una fórmula exhortativa fija y singular en griego. En español, «el que tiene oído» conserva bien el carácter idiomático y la forma singular representativa, sin forzar una pluralización innecesaria.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - debe oír
  lexicon: BDAG
  rationale: El aoristo imperativo se expresa naturalmente con el imperativo español «oiga». Mantiene el llamado directo y la fuerza exhortativa del original.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  lexicon: BDAG
  rationale: En esta fórmula de Apocalipsis el griego dice simplemente «el Espíritu». Se conserva esa forma breve, sin explicitar «Santo» porque el texto no lo dice aquí.
- source_word: ταῖς ἐκκλησίαις
  english_pob_choice: to the churches
  chosen_spanish: a las iglesias
  alternatives_spanish:
  - a las congregaciones
  - a las asambleas
  lexicon: BDAG
  rationale: «ἐκκλησίαις» en este marco epistolar se traduce de manera natural y eclesial como «iglesias». Es el equivalente más claro y reconocible en español.
- source_word: τῷ νικῶντι
  english_pob_choice: To the one who conquers
  chosen_spanish: Al que vence
  alternatives_spanish:
  - Al que conquista
  - Al que sale vencedor
  lexicon: BDAG
  rationale: «νικάω» en Apocalipsis expresa victoria perseverante. «Vence» es breve, idiomático y fiel al sentido de triunfo/overcoming, sin perder la tensión del verbo.
- source_word: τοῦ μάννα τοῦ κεκρυμμένου
  english_pob_choice: some of the hidden manna
  chosen_spanish: del maná escondido
  alternatives_spanish:
  - del maná oculto
  - de parte del maná escondido
  lexicon: BDAG
  rationale: El genitivo tras «dar» permite entender una porción de ese alimento. En español, «del maná escondido» conserva la imagen sin sobreexplicar la cantidad, y «escondido» refleja bien el participio perfecto de «κρύπτω».
- source_word: ψῆφον λευκήν
  english_pob_choice: a white stone
  chosen_spanish: una piedra blanca
  alternatives_spanish:
  - un guijarro blanco
  - una ficha blanca
  lexicon: BDAG
  rationale: «ψῆφος» puede ser una piedra pequeña usada con varios fines. «Piedra blanca» es la traducción más directa y sobria; otras opciones especifican demasiado un trasfondo que el texto no determina.
- source_word: ἐπὶ τὴν ψῆφον
  english_pob_choice: on the stone
  chosen_spanish: sobre la piedra
  alternatives_spanish:
  - en la piedra
  - encima de la piedra
  lexicon: BDAG
  rationale: La preposición con acusativo expresa ubicación de la inscripción. «Sobre la piedra» suena natural en español y conserva la imagen de algo escrito en su superficie.
- source_word: ὄνομα καινὸν
  english_pob_choice: a new name
  chosen_spanish: un nombre nuevo
  alternatives_spanish:
  - un nombre nuevo en calidad
  - un nombre fresco
  lexicon: BDAG
  rationale: «καινός» indica novedad cualitativa. «Nombre nuevo» es una traducción clara y tradicionalmente comprensible, adecuada para la resonancia de identidad transformada.
- source_word: γεγραμμένον
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - inscrito
  - grabado
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo indica un estado resultante: ya está escrito. «Escrito» es la forma más directa; «inscrito» sería posible, pero añade un matiz menos neutro.'
- source_word: ὃ οὐδεὶς οἶδεν εἰ μὴ ὁ λαμβάνων
  english_pob_choice: which no one knows except the one who receives it
  chosen_spanish: que nadie conoce sino el que lo recibe
  alternatives_spanish:
  - que nadie sabe sino el que lo recibe
  - que nadie conoce excepto el que lo recibe
  lexicon: BDAG
  rationale: El relativo se refiere al nombre escrito sobre la piedra; en español conviene explicitar «lo» para evitar ambigüedad. «Conoce» reproduce bien οἶδεν, y «sino» mantiene la exclusividad del enunciado.
theological_decisions:
- issue: Forma singular genérica en la exhortación
  english_pob_reading: 'Retain masculine singular in English: ''let him hear'' and ''I will give him'' while understanding the referent generically.'
  chosen_spanish_reading: 'Mantener el singular genérico: «El que tiene oído… oiga» y «le daré».'
  alternative_spanish_readings:
  - Quien tenga oído, oiga
  - El que tenga oído, que oiga
  rationale: El griego usa participios y verbos en singular masculino con valor representativo. El español puede reflejarlo sin neutralizar la forma, conservando la cadencia exhortativa del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de ψῆφος λευκή
  english_pob_reading: Render minimally as 'a white stone' without deciding among proposed symbolic backgrounds.
  chosen_spanish_reading: Renderizar de forma mínima como «una piedra blanca» sin decidir si alude a ficha de voto, token de absolución o piedra de admisión.
  alternative_spanish_readings:
  - una ficha blanca
  - una piedra de absolución
  - una piedra de admisión
  rationale: El texto no identifica el trasfondo cultural. La traducción principal conserva la ambigüedad del símbolo y evita cerrar prematuramente su función.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Relación entre la piedra y el nombre escrito
  english_pob_reading: Or 'and on the stone a new name written'.
  chosen_spanish_reading: «y un nombre nuevo escrito sobre la piedra»
  alternative_spanish_readings:
  - «y sobre la piedra un nombre nuevo escrito»
  - «y un nombre nuevo escrito en ella»
  rationale: El griego liga el nombre directamente con la piedra mediante ἐπί. La redacción española más natural es «sobre la piedra», que conserva la relación espacial sin volver enigmática la sintaxis.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste de revisión que en inglés aclaró la relación sintáctica de ἐπὶ τὴν ψῆφον ὄνομα καινὸν γεγραμμένον, evitando una secuencia rígidamente calcada. En español se optó por una construcción natural («un nombre nuevo escrito sobre la piedra») que mantiene el vínculo con la piedra y el nombre sin perder la ambigüedad interpretativa del símbolo.
  spanish_consistency_notes:
  - Se usó «Espíritu» sin añadir «Santo» porque el griego no lo explicita en esta fórmula.
  - Se eligió «iglesias» para ἐκκλησίαις por coherencia con el registro eclesial de Apocalipsis.
  - Se prefirió «vence» sobre «conquista» por mayor naturalidad en español, manteniendo el valor de victoria de νικάω.
  - Se conservó «maná escondido» para reflejar la imagen bíblica sin interpretar el grado de ocultamiento.
  - Se evitó especificar el trasfondo de la «piedra blanca» en el texto principal, reservando la explicación para nota.
  - Se empleó «nombre nuevo» como expresión de identidad renovada, sin añadir paráfrasis teológica.
