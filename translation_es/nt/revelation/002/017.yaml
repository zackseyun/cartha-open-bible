    rationale: El relativo ὃ modifica «nombre», pero el acto de recibir recae sobre la piedra/nombre prometidos. «Lo recibe» puede hacer pensar que se recibe el nombre mismo. «Quien la recibe» vincula más naturalmente la recepción con la piedra, preservando mejor la lógica del versículo en español.
  - severity: low
