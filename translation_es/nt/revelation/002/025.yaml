review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una calificación adversativa/limitativa (πλὴν), la exhortación a conservar firmemente lo que ya poseen (ὃ ἔχετε κρατήσατε), y el límite temporal abierto «hasta que yo venga» (ἄχρι οὗ ἂν ἥξω), sin resolver la naturaleza de la venida. Sin embargo, «retengan» en español tiende a sugerir ‘mantener retenido’ más que ‘aferrarse/firmemente conservar’, y puede sonar menos natural en una exhortación eclesial que una opción como «mantengan firmemente».'
  spanish_quality_summary: El español es claro y digno, pero «No obstante» al inicio suena algo pesado en este contexto breve, y «retengan» no es la opción más natural para una exhortación pastoral. «Pero[a], mantengan firmemente lo que tienen hasta que yo venga» fluye mejor en español amplio y conserva el tono. También conviene ajustar la nota para que la formulación alternativa sea idiomática y sin comillas innecesarias.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión teológica de dejar «yo venga» sin especificar la clase de venida está bien preservada. La revisión propuesta mejora la correspondencia semántica de κρατήσατε con una expresión española más natural y fuerte.
  issues:
  - severity: medium
    issue: «retengan» no comunica de manera óptima el matiz exhortativo de κρατήσατε
    rationale: κρατήσατε aquí exhorta a aferrarse o mantenerse firmes en lo recibido. «Retener» en español puede sugerir detener, impedir salida, o conservar algo retenido, y no siempre transmite bien la idea de fidelidad perseverante.
  - severity: low
    issue: «No obstante» es correcto pero algo rígido para πλὴν en este contexto
    rationale: πλὴν puede expresar contraste o limitación. En español bíblico natural, «Pero» o «Solo» suelen sonar más directos aquí. Dado que la nota ya preserva «Solo» como alternativa, «Pero» en el texto principal queda más fluido.
  - severity: low
    issue: La nota al pie puede mejorarse en estilo editorial
    rationale: 'La formulación actual incluye comillas y puntuación algo forzadas. Una nota más limpia y consistente sería: «O: “Solo mantengan firmemente lo que tienen hasta que yo venga”».'
  revised_spanish_text: Pero[a], mantengan firmemente lo que tienen hasta que yo venga.
