revisions:
- from: No obstante[a], retengan lo que tienen hasta que yo venga.
  to: Pero[a], mantengan firmemente lo que tienen hasta que yo venga.
  rationale: Se propone una reparación menor para mejorar la naturalidad y precisión semántica en español. «Mantengan firmemente» representa mejor la fuerza de κρατήσατε que «retengan», y «Pero» funciona con mayor fluidez que «No obstante» para πλὴν, mientras la nota preserva la alternativa limitativa «Solo». No se altera la decisión teológica de mantener indeterminada la naturaleza de la venida de Jesús.
