lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: No obstante
  alternatives_spanish:
  - Pero
  - Sin embargo
  - Solo
  lexicon: BDAG
  rationale: πλὴν introduce aquí una limitación o transición adversativa. «No obstante» conserva ese matiz de concesión/contraste con un registro natural y digno en español, sin convertirlo en un simple conector neutro.
- source_word: ὃ ἔχετε
  english_pob_choice: what you have
  chosen_spanish: lo que tienen
  alternatives_spanish:
  - lo que poseen
  - aquello que tienen
  lexicon: BDAG
  rationale: El relativo neutro con ἔχετε funciona de manera general y colectiva. «Lo que tienen» es claro, idiomático y suficientemente fiel; evita una literalidad rígida como «aquello que tienen».
- source_word: κρατήσατε
  english_pob_choice: hold fast
  chosen_spanish: retengan
  alternatives_spanish:
  - mantengan firme
  - sostengan firmemente
  - afírmenlo
  lexicon: BDAG
  rationale: El imperativo aoristo de κρατέω exige una exhortación a conservar con firmeza. En español, «retengan» comunica la idea de no soltar ni abandonar; la fuerza de «hold fast» se mantiene en el contexto exhortativo.
- source_word: ἄχρι οὗ ἂν
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: La construcción marca un límite temporal futuro. «Hasta que» expresa de forma natural esa frontera sin añadir especificaciones que el griego no da.
- source_word: ἥξω
  english_pob_choice: I come
  chosen_spanish: yo venga
  alternatives_spanish:
  - yo llegue
  - yo venga a ustedes
  lexicon: BDAG
  rationale: ἥκω enfatiza la llegada o venida. En español, «venga» preserva la resonancia de la venida del hablante y evita interpretar el modo o el alcance de esa venida.
theological_decisions:
- issue: Naturaleza de la venida de Jesús
  english_pob_reading: Rendered simply as 'until I come' without specifying the mode or timing of the coming.
  chosen_spanish_reading: «hasta que yo venga» sin precisar si se trata de una venida final, judicial o de visita.
  alternative_spanish_readings:
  - hasta que yo venga en juicio
  - hasta mi venida final
  rationale: El griego no determina la clase de venida. La traducción española conserva esa indeterminación y evita resolver interpretivamente una tensión que el texto deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al texto griego SBLGNT y el audit trail inglés; no hubo cambios textuales que incorporaran una interpretación añadida. Se preservó la ambigüedad de πλὴν y de la venida de Jesús.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el griego aquí presenta la voz de Jesús sin el título χριστός.
  - Se mantuvo un registro sobrio y eclesial, con sintaxis natural en español actual.
