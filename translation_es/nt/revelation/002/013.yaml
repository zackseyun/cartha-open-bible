  rationale: 'Se hicieron ajustes menores para mejorar fidelidad contextual y naturalidad del español: se quitó la nota innecesaria sobre el orden de palabras; se cambió ''retienes'' por ''mantienes firme'' para reflejar mejor κρατεῖς; se reemplazó ''fue muerto'' por ''fue matado'' por claridad idiomática; y se simplificó la apertura a ''Sé''. La nota sobre μάρτυς se conserva porque sí refleja una alternativa léxica relevante preservada por el POB inglés.'
