translation:
  language: es
  text: 'Sé dónde vives: donde está el trono de Satanás. Sin embargo, mantienes firme mi nombre, y no negaste la fe en mí, incluso en los días de Antipas, mi testigo, mi fiel[a], que fue matado entre ustedes, donde Satanás vive.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi mártir'. El griego puede significar 'testigo', y en un contexto de sufrimiento o muerte también puede llevar el sentido de 'mártir'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἶδα
  english_pob_choice: I know
  chosen_spanish: Yo sé
  alternatives_spanish:
  - Yo conozco
  - Sé
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento seguro y directo; en español 'sé' es natural y fiel. Se añade 'Yo' solo por énfasis estilístico y fluidez en la apertura.
- source_word: κατοικεῖς
  english_pob_choice: you live
  chosen_spanish: vives
  alternatives_spanish:
  - habitas
  - moras
  lexicon: BDAG
  rationale: κατοικέω significa residir o vivir en un lugar. 'Vives' es la opción más natural en español moderno sin perder el sentido de residencia.
- source_word: ὅπου ὁ θρόνος τοῦ Σατανᾶ
  english_pob_choice: where Satan’s throne is
  chosen_spanish: donde está el trono de Satanás
  alternatives_spanish:
  - donde el trono de Satanás está
  - donde está el trono de Satan
  lexicon: BDAG
  rationale: Se conserva la imagen apocalíptica y la posesión explícita. 'Satanás' reproduce el nombre propio del texto griego; 'trono' mantiene la metáfora política y cultual.
- source_word: κρατεῖς
  english_pob_choice: you hold fast
  chosen_spanish: retienes
  alternatives_spanish:
  - sostienes firmemente
  - mantienes firmemente
  lexicon: BDAG
  rationale: κρατέω aquí expresa adherencia firme. En español, 'retienes' puede sonar menos enfático que 'hold fast', pero evita una perífrasis demasiado interpretativa y sigue siendo fiel si se lee junto con el contexto.
- source_word: τὸ ὄνομά μου
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi nombre y autoridad
  - mi nombre y reputación
  lexicon: BDAG
  rationale: Se conserva 'nombre' sin expandirlo, porque el texto dice literalmente 'mi nombre' y la carga de lealtad/confesión queda en el contexto.
- source_word: οὐκ ἠρνήσω
  english_pob_choice: you did not deny
  chosen_spanish: no negaste
  alternatives_spanish:
  - no renunciaste
  - no rechazaste
  lexicon: BDAG
  rationale: ἀρνέομαι se traduce de forma directa con 'negar'. 'No negaste' es claro y mantiene el contraste con la fidelidad a Jesús.
- source_word: τὴν πίστιν μου
  english_pob_choice: faith in me
  chosen_spanish: la fe en mí
  alternatives_spanish:
  - mi fe
  - mi fidelidad
  lexicon: BDAG
  rationale: El audit trail inglés revisó la frase hacia 'faith in me' por precisión y naturalidad. En español, 'la fe en mí' conserva esa lectura relacional sin resolver innecesariamente la ambigüedad del genitivo.
- source_word: ἐν ταῖς ἡμέραις Ἀντιπᾶς
  english_pob_choice: in the days of Antipas
  chosen_spanish: aun en los días de Antipas
  alternatives_spanish:
  - en los días de Antipas
  - en tiempos de Antipas
  lexicon: BDAG
  rationale: La expresión temporal se mantiene de forma literal. 'Aun' refleja con naturalidad el valor concesivo de la cláusula en el flujo de la oración.
- source_word: ὁ μάρτυς μου
  english_pob_choice: my witness
  chosen_spanish: mi testigo
  alternatives_spanish:
  - mi mártir
  lexicon: BDAG
  rationale: μάρτυς significa primariamente 'testigo'. 'Testigo' conserva el sentido básico y evita introducir como principal una lectura técnica posterior; la alternativa 'mártir' sigue siendo relevante por el contexto de muerte.
- source_word: ὁ πιστός μου
  english_pob_choice: my faithful one
  chosen_spanish: mi fiel
  alternatives_spanish:
  - mi fiel testigo
  - mi siervo fiel
  lexicon: BDAG
  rationale: πιστός significa 'fiel' o 'fidedigno'. La forma breve 'mi fiel' preserva el paralelismo apposicional con 'mi testigo' y evita añadir un sustantivo no presente en el griego.
- source_word: ἀπεκτάνθη
  english_pob_choice: was killed
  chosen_spanish: fue muerto
  alternatives_spanish:
  - fue matado
  - fue asesinado
  lexicon: BDAG
  rationale: El pasivo aoristo de ἀποκτείνω se rinde con una pasiva directa. 'Fue muerto' es fiel y sobrio; 'asesinado' añade una valoración que el verbo por sí solo no exige.
- source_word: παρ’ ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - por ustedes
  lexicon: BDAG
  rationale: παρά con dativo puede indicar presencia junto a otros. 'Entre ustedes' comunica la ubicación sin sugerir erróneamente autoría colectiva de la muerte.
- source_word: ὅπου ὁ Σατανᾶς κατοικεῖ
  english_pob_choice: where Satan lives
  chosen_spanish: donde Satanás vive
  alternatives_spanish:
  - donde Satanás habita
  lexicon: BDAG
  rationale: Se repite 'vive' para conservar la reiteración del verbo κατοικέω del inicio del versículo. La repetición es intencional y ayuda a la cohesión del texto.
theological_decisions:
- issue: Ambigüedad de τὴν πίστιν μου
  english_pob_reading: faith in me
  chosen_spanish_reading: la fe en mí
  alternative_spanish_readings:
  - mi fe
  - mi fidelidad
  rationale: La frase griega es compacta y admite más de una relación del genitivo. El español 'la fe en mí' sigue la revisión final del POB inglés y preserva el énfasis relacional sin cerrar del todo otras lecturas posibles.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; Contested terms table for πίστις'
- issue: Sentido de μάρτυς en contexto de muerte
  english_pob_reading: my witness
  chosen_spanish_reading: mi testigo
  alternative_spanish_readings:
  - mi mártir
  rationale: Se mantiene el sentido base 'testigo' en el texto principal, porque el pasaje ya informa que Antipas fue muerto. La alternativa 'mártir' queda disponible como matiz contextual, sin desplazar la lectura primaria.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1, #6'
translation_notes:
  revision_awareness: El texto inglés de auditoría fue revisado desde 'my faith' a 'faith in me'. La versión española sigue esa revisión con 'la fe en mí', manteniendo la ambigüedad controlada del genitivo griego y la naturalidad del español. También se preservó la repetición de 'vive' para κατοικεῖς / κατοικεῖ.
  spanish_consistency_notes:
  - Se usa 'Satanás' de manera uniforme para Σατανᾶς, conforme al nombre propio del texto griego.
  - Se traduce πίστις de forma relacional en el texto principal ('la fe en mí') para concordar con la decisión inglesa final.
  - Se mantiene el paralelismo 'mi testigo, mi fiel' para reflejar la estructura appositiva del griego.
  - Se evita 'Señor' o equivalentes litúrgicos no presentes en el versículo.
  - Se conserva el tratamiento de segunda persona plural en 'ustedes' para παρ’ ὑμῖν, acorde con el destinatario colectivo.
