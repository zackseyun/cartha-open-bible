review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego y del audit trail inglés: conserva la imagen del trono de Satanás, la perseverancia en el nombre de Jesús, la referencia a Antipas y el sentido de παρ’ ὑμῖν como presencia ''entre ustedes''. Sin embargo, dos decisiones del español principal no son óptimas para la fidelidad estilística y legibilidad: ''retienes'' debilita el matiz de κρατεῖς (''mantenerse firme/asirse con firmeza''), y ''fue muerto'' suena poco natural en español moderno y roza el calco. Además, la nota [a] no refleja una ambigüedad significativa del griego, sino solo un orden alterno de palabras en español.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero necesita pequeños ajustes para sonar natural en español eclesial contemporáneo. 'Yo sé' puede simplificarse a 'Sé' sin pérdida. 'Mantienes firme' comunica mejor la idea de lealtad perseverante que 'retienes'. 'Fue muerto' debe cambiarse a 'fue matado' o mejor 'fue asesinado'; pero como ἀποκτείνω no exige el matiz jurídico/moral de 'asesinado', conviene 'fue matado'. También es preferible 'incluso en los días de Antipas' frente a 'aun en los días' por fluidez. 'Mi fiel' es aceptable, aunque algo elíptico; preserva la aposición griega adecuadamente.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto: ''Satanás'', ''fe'', ''testigo'' y ''vive'' son adecuados. La decisión ''la fe en mí'' sigue la revisión inglesa final, aunque reduce la ambigüedad que el registro léxico inglés originalmente preservaba; dado que el audit trail aplicado ya la resolvió así, es aceptable. La nota [b] está bien alineada con μάρτυς = ''testigo'' / posible ''mártir''. La nota [a], en cambio, no preserva una alternativa léxica o exegética relevante y conviene eliminarla.'
  issues:
  - severity: medium
    issue: '''retienes'' para κρατεῖς'
    rationale: En español, 'retener' sugiere más 'no soltar' o 'guardar' que firme adhesión perseverante. 'Mantienes firme' o 'te aferras a' representa mejor 'hold fast' y el valor de κρατέω en este contexto.
  - severity: medium
    issue: '''fue muerto'' suena antinatural'
    rationale: Aunque formalmente posible, en español contemporáneo resulta torpe y calca el pasivo de manera poco idiomática. 'Fue matado' es más natural y sigue siendo semánticamente sobrio; evita la sobreinterpretación de 'asesinado'.
  - severity: low
    issue: La nota [a] no aporta una alternativa significativa
    rationale: La supuesta alternativa solo invierte el orden de palabras en español y no refleja una ambigüedad textual o semántica del griego. Debe eliminarse para no recargar el texto con una nota innecesaria.
  revised_spanish_text: 'Sé dónde vives: donde está el trono de Satanás. Sin embargo, mantienes firme mi nombre, y no negaste la fe en mí, incluso en los días de Antipas, mi testigo, mi fiel[a], que fue matado entre ustedes, donde Satanás vive.'
  revised_footnotes:
  - marker: a
    text: O 'mi mártir'. El griego puede significar 'testigo', y en un contexto de sufrimiento o muerte también puede llevar el sentido de 'mártir'.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad contextual y naturalidad del español: se quitó la nota innecesaria sobre el orden de palabras; se cambió ''retienes'' por ''mantienes firme'' para reflejar mejor κρατεῖς; se reemplazó ''fue muerto'' por ''fue matado'' por claridad idiomática; y se simplificó la apertura a ''Sé''. La nota sobre μάρτυς se conserva porque sí refleja una alternativa léxica relevante preservada por el POB inglés.'
