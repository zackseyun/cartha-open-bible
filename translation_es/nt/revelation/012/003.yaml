translation:
  language: es
  text: Y apareció otra señal en el cielo, y he aquí un gran dragón rojo[a], que tenía siete cabezas y diez cuernos, y sobre sus cabezas siete diademas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rojo como fuego». El griego πυρρός denota un color rojo de aspecto ígneo o como de fuego.
    reason: lexical_alternative
  - marker: b
    text: O «coronas». Más específicamente, el griego dice «diademas», una banda real para la cabeza distinta de una corona de vencedor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue visto
  lexicon: BDAG
  rationale: En narrativa visionaria, el aoristo pasivo de ὁράω funciona de manera idiomática como ‘aparecer’. ‘Apareció’ conserva esa naturalidad sin perder el matiz de visión revelada.
- source_word: ἄλλο σημεῖον
  english_pob_choice: another sign
  chosen_spanish: otra señal
  alternatives_spanish:
  - otro signo
  - otro portento
  lexicon: BDAG
  rationale: En Apocalipsis, σημεῖον suele referirse a una señal visionaria y simbólica. ‘Señal’ es clara en español y mantiene el carácter apocalíptico sin forzar una explicación interpretativa.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en el firmamento
  lexicon: BDAG
  rationale: Aquí se mantiene la correspondencia con el contexto visionario de Apocalipsis. En español, ‘cielo’ comunica con naturalidad el ámbito celestial sin necesidad de ampliar más el texto.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: ‘He aquí’ conserva el tono solemne y deíctico del marcador discursivo griego, mejor que una forma más coloquial.
- source_word: δράκων
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - monstruo-serpiente
  lexicon: BDAG
  rationale: ‘Dragón’ es la equivalencia directa y establecida para δράκων, sin añadir interpretación al símbolo.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  lexicon: BDAG
  rationale: En español, ‘gran’ antepuesto a un sustantivo transmite bien la idea de magnitud y fuerza ominosa del original, con buena fluidez estilística.
- source_word: πυρρός
  english_pob_choice: red
  chosen_spanish: rojo
  alternatives_spanish:
  - rojizo
  - rojo fuego
  lexicon: BDAG
  rationale: El término denota un rojo de aspecto ígneo; ‘rojo’ es la forma más directa y natural en español. La nota textual conserva la posibilidad semántica de un rojo llamativo o flameante.
- source_word: ἔχων
  english_pob_choice: having
  chosen_spanish: que tenía
  alternatives_spanish:
  - teniendo
  - con
  lexicon: BDAG
  rationale: El participio presente se vierte aquí con una relativa natural en español para mantener el flujo descriptivo sin sonar forzado.
- source_word: κεφαλὰς ἑπτὰ
  english_pob_choice: seven heads
  chosen_spanish: siete cabezas
  alternatives_spanish:
  - siete testas
  lexicon: BDAG
  rationale: Traducción literal y directa del sintagma nominal.
- source_word: κέρατα δέκα
  english_pob_choice: ten horns
  chosen_spanish: diez cuernos
  alternatives_spanish:
  - diez astas
  lexicon: BDAG
  rationale: Traducción literal y directa del sintagma nominal.
- source_word: ἐπὶ τὰς κεφαλὰς αὐτοῦ
  english_pob_choice: on his heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - encima de sus cabezas
  - en sus cabezas
  lexicon: BDAG
  rationale: ‘Sobre’ reproduce con naturalidad la relación espacial de ἐπί con acusativo. ‘Sus’ respeta el género gramatical masculino del dragón y la fuerza personal del referente.
- source_word: διαδήματα
  english_pob_choice: diadems
  chosen_spanish: diademas
  alternatives_spanish:
  - coronas
  lexicon: BDAG
  rationale: ‘Diademas’ conserva la distinción léxica frente a στέφανος; ‘coronas’ es posible, pero borra una diferencia importante del original.
theological_decisions:
- issue: 'Color del dragón: πυρρός'
  english_pob_reading: red
  chosen_spanish_reading: rojo
  alternative_spanish_readings:
  - rojizo
  - rojo fuego
  rationale: Se preserva el valor descriptivo del griego sin intensificar más allá de lo que el término exige. En el contexto apocalíptico, el color sigue siendo ominoso, pero la traducción no necesita explicitar ‘fuego’ en el texto principal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Pronombre posesivo para αὐτοῦ
  english_pob_reading: his heads
  chosen_spanish_reading: sus cabezas
  alternative_spanish_readings:
  - sus propias cabezas
  - sus cabezas de él
  rationale: Se mantiene la referencia personal del dragón mediante el posesivo masculino ‘sus’, sin forzar una explicitación doctrinal adicional en el versículo.
  doctrine_reference: Translation philosophy §4
- issue: Valor de διαδήματα
  english_pob_reading: diadems
  chosen_spanish_reading: diademas
  alternative_spanish_readings:
  - coronas
  rationale: ‘Diademas’ conserva el contraste léxico con otras formas de corona en Apocalipsis y evita aplanar el detalle simbólico del texto.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'La versión española sigue el texto griego SBLGNT y armoniza con el audit trail inglés: se mantiene la secuencia visionaria, se traduce ἰδοὺ con una fórmula solemne equivalente, se conserva la distinción entre διάδημα y στέφανος, y se evita exagerar el matiz cromático de πυρρός en el texto principal, dejando la alternativa en nota.'
  spanish_consistency_notes:
  - Se usa ‘señal’ para σημεῖον en sentido apocalíptico simbólico.
  - Se usa ‘cielo’ para οὐρανός dentro del marco visionario de Apocalipsis.
  - Se prefiere ‘diademas’ por la distinción léxica de διάδημα.
  - Se conserva el registro solemne con ‘he aquí’ para ἰδοὺ.
  - El posesivo ‘sus’ mantiene la referencia gramatical masculina del dragón.
