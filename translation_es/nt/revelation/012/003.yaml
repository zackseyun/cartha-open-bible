    rationale: Si el marcador se coloca en ‘rojo’, la nota debe presentar la alternativa de forma coherente, por ejemplo ‘O «rojo como fuego»’, en vez de repetir ‘dragón rojo’, que ya aparece en el texto principal.
  revised_spanish_text: Y apareció otra señal en el cielo, y he aquí un gran dragón rojo[a], que tenía siete cabezas y diez cuernos, y sobre sus cabezas siete diademas[b].
