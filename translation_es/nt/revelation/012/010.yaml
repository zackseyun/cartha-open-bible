revisions:
- from: 'Y oí una gran voz en el cielo que decía[a]: «Ahora han llegado la salvación, el poder, el reino de nuestro Dios y la autoridad de su Mesías, porque ha sido arrojado[b] el acusador de nuestros hermanos, el que los acusa delante de nuestro Dios día y noche».'
  to: 'Y oí una voz fuerte en el cielo que decía: «Ahora han llegado la salvación, el poder, el reino de nuestro Dios y la autoridad de su Mesías, porque ha sido arrojado el acusador de nuestros hermanos[a], el que los acusa delante de nuestro Dios día y noche».'
  rationale: Se corrige «gran voz» a «voz fuerte» para reflejar el sentido de intensidad sonora de φωνὴν μεγάλην en español natural. Se elimina la nota [a] por ser una alternativa poco defendible en esta construcción. Se reubica la nota cultural al sintagma «nuestros hermanos», que es el elemento que la nota explica. No se requieren cambios doctrinales ni de fondo adicionales.
  reviewer_model: gpt-5.4
