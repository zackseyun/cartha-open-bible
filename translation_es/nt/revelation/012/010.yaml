    text: «Nuestros hermanos» puede referirse de manera colectiva a los creyentes, incluyendo mujeres además de hombres.
    reason: cultural_note
  revision_rationale: Se corrige «gran voz» a «voz fuerte» para reflejar el sentido de intensidad sonora de φωνὴν μεγάλην en español natural. Se elimina la nota [a] por ser una alternativa poco defendible en esta construcción. Se reubica la nota cultural al sintagma «nuestros hermanos», que es el elemento que la nota explica. No se requieren cambios doctrinales ni de fondo adicionales.
