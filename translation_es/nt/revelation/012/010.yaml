review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido global del griego: oye una voz en el cielo, proclama la llegada presente de la salvación/poder/reino/autoridad, y da la razón en la expulsión del acusador que acusaba continuamente delante de Dios. También mantiene correctamente «Mesías» para Χριστός y distingue «poder» de «autoridad». Sin embargo, «una gran voz» no sigue bien la decisión léxica documentada para φωνὴν μεγάλην, que aquí expresa volumen/intensidad, no grandeza cualitativa.'
  spanish_quality_summary: El texto es claro y legible, con buen registro bíblico contemporáneo. La sintaxis general funciona. No obstante, «gran voz» suena menos natural y menos preciso en español actual que «voz fuerte» o «voz potente», y la nota [a] introduce una alternativa poco necesaria y además inexacta frente al valor normal de λέγουσαν en esta construcción. La nota [b] está bien en contenido, pero está anclada en «ha sido arrojado», cuando debería anclarse en «nuestros hermanos» para seguir la disciplina de notas.
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: «Dios», «Mesías», «salvación», «poder», «reino», «autoridad», «acusador» están bien. No hay términos doctrinales fuera de política. La principal desviación es lexical/estilística en φωνὴν μεγάλην → «gran voz» en vez de una forma española que exprese sonoridad.'
  issues:
  - severity: medium
    issue: «una gran voz» para φωνὴν μεγάλην
    rationale: 'La evidencia y la decisión inglesa establecen que μέγας con φωνή aquí denota volumen: «loud voice». En español neutro y natural, «gran voz» tiende a sugerir nobleza o calidad, no simplemente que se oyó fuerte.'
  - severity: medium
    issue: La nota [a] propone «cuando decía»
    rationale: 'λέγουσαν depende de «oí ... voz» y se entiende naturalmente como contenido/proceso de la voz: «que decía» o «diciendo». «Cuando decía» cambia la relación sintáctica y no representa bien la alternativa relevante.'
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: La nota explica «nuestros hermanos», pero el marcador aparece en «ha sido arrojado». Según la disciplina del proyecto, el marcador debe aparecer en la palabra o frase pertinente.
  revised_spanish_text: 'Y oí una voz fuerte en el cielo que decía: «Ahora han llegado la salvación, el poder, el reino de nuestro Dios y la autoridad de su Mesías, porque ha sido arrojado el acusador de nuestros hermanos[a], el que los acusa delante de nuestro Dios día y noche».'
  revised_footnotes:
