source:
  edition: SBLGNT
  text: Καὶ ἤκουσα φωνὴν μεγάλην ἐν τῷ οὐρανῷ λέγουσαν· Ἄρτι ἐγένετο ἡ σωτηρία καὶ ἡ δύναμις καὶ ἡ βασιλεία τοῦ θεοῦ ἡμῶν καὶ ἡ ἐξουσία τοῦ χριστοῦ αὐτοῦ, ὅτι ἐβλήθη ὁ ⸀κατήγωρ τῶν ἀδελφῶν ἡμῶν, ὁ κατηγορῶν ⸀αὐτοὺς ἐνώπιον τοῦ θεοῦ ἡμῶν ἡμέρας καὶ νυκτός.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/012/010.yaml
  text: And I heard a loud voice in heaven saying[a], “Now have come the salvation and the power and the kingdom of our God, and the authority of his Messiah, because the accuser of our brothers has been thrown down[b], the one who accuses them before our God day and night.”
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title is Χριστός (Christos), here rendered 'Messiah' because it functions as a title meaning God's Anointed One.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' may refer to fellow believers collectively, including women as well as men.'
    reason: cultural_note
