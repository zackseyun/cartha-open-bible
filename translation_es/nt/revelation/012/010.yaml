translation:
  language: es
  text: 'Y oí una voz fuerte en el cielo que decía: «Ahora han llegado la salvación, el poder, el reino de nuestro Dios y la autoridad de su Mesías, porque ha sido arrojado el acusador de nuestros hermanos[a], el que los acusa delante de nuestro Dios día y noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nuestros hermanos» puede referirse de manera colectiva a los creyentes, incluyendo mujeres además de hombres.
    reason: cultural_note
lexical_decisions:
- source_word: φωνὴν μεγάλην
  english_pob_choice: a loud voice
  chosen_spanish: una gran voz
  alternatives_spanish:
  - una voz fuerte
  - una voz poderosa
  lexicon: BDAG
  rationale: μέγας con φωνή puede expresar intensidad sonora; en español, «gran voz» conserva la fuerza retórica del anuncio sin sonar tan mecánico como «voz fuerte».
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en el ámbito celestial
  lexicon: BDAG
  rationale: Aquí οὐρανός designa el cielo/ámbito celestial; «cielo» es la forma natural y fiel en español bíblico contemporáneo.
- source_word: Ἄρτι
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Ya
  lexicon: BDAG
  rationale: Marca el momento decisivo de la proclamación; «Ahora» reproduce bien la inmediatez del término.
- source_word: ἐγένετο
  english_pob_choice: have come
  chosen_spanish: han llegado
  alternatives_spanish:
  - han venido
  - han sobrevenido
  - han llegado a ser
  lexicon: BDAG
  rationale: El verbo introduce una realidad resultante y climática. En español, con sujeto compuesto, el plural «han llegado» suena natural y conserva el sentido de entrada efectiva en vigor.
- source_word: ἡ σωτηρία
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - la salvación y liberación
  lexicon: BDAG
  rationale: «Salvación» es el equivalente directo y mantiene el registro teológico del texto.
- source_word: ἡ δύναμις
  english_pob_choice: the power
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la potencia
  lexicon: BDAG
  rationale: En esta secuencia, δύναμις refiere a la eficacia victoriosa de Dios; «poder» es el término más claro y estándar en español.
- source_word: ἡ βασιλεία τοῦ θεοῦ ἡμῶν
  english_pob_choice: the kingdom of our God
  chosen_spanish: el reino de nuestro Dios
  alternatives_spanish:
  - el reinado de nuestro Dios
  - la realeza de nuestro Dios
  lexicon: BDAG
  rationale: βασιλεία puede ser reino o reinado. En este contexto apocalíptico, «reino» es natural y preserva la proclamación de soberanía divina.
- source_word: ἡ ἐξουσία
  english_pob_choice: the authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el derecho de gobernar
  - el dominio
  lexicon: BDAG
  rationale: ἐξουσία destaca autoridad legítima o delegada, diferenciándose de δύναμις; «autoridad» mantiene esa distinción en español.
- source_word: τοῦ χριστοῦ αὐτοῦ
  english_pob_choice: of his Messiah
  chosen_spanish: de su Mesías
  alternatives_spanish:
  - de su Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como nombre propio. «Mesías» preserva el valor titular y el trasfondo hebraico de ungido/rey designado por Dios.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la proclamación celestial; «porque» es directo y natural.
- source_word: ἐβλήθη
  english_pob_choice: has been thrown down
  chosen_spanish: ha sido arrojado
  alternatives_spanish:
  - ha sido echado abajo
  - ha sido expulsado
  lexicon: BDAG
  rationale: El pasivo expresa expulsión violenta. «Arrojado» mantiene la imagen de caída forzada; «abajo» queda implícito por el contexto de derrota celestial.
- source_word: κατήγωρ
  english_pob_choice: the accuser
  chosen_spanish: el acusador
  alternatives_spanish:
  - el fiscal
  - el denunciante
  lexicon: BDAG
  rationale: El sustantivo raro tiene sentido judicial; «acusador» es el equivalente más claro y tradicionalmente comprensible en el contexto apocalíptico.
- source_word: τῶν ἀδελφῶν ἡμῶν
  english_pob_choice: of our brothers
  chosen_spanish: de nuestros hermanos
  alternatives_spanish:
  - de nuestros hermanos y hermanas
  - de nuestros hermanos en la fe
  lexicon: BDAG
  rationale: ἀδελφῶν es masculino plural gramatical y puede ser representativo del pueblo de Dios. Se conserva «hermanos» en el texto principal; la posible inclusión de mujeres puede aclararse por nota.
- source_word: ὁ κατηγορῶν αὐτοὺς
  english_pob_choice: the one who accuses them
  chosen_spanish: el que los acusa
  alternatives_spanish:
  - el que los va acusando
  - el acusador que los acusa
  lexicon: BDAG
  rationale: El participio presente indica acción continua/habitual. «El que los acusa» reproduce bien la idea de acusación persistente sin recargar la frase.
- source_word: ἐνώπιον τοῦ θεοῦ ἡμῶν
  english_pob_choice: before our God
  chosen_spanish: delante de nuestro Dios
  alternatives_spanish:
  - ante nuestro Dios
  - en presencia de nuestro Dios
  lexicon: BDAG
  rationale: El contexto judicial favorece una formulación espacial/forense. «Delante de nuestro Dios» es claro y conserva el matiz de comparecencia.
- source_word: ἡμέρας καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - todo el tiempo
  lexicon: BDAG
  rationale: Es un modismo temporal de continuidad; «día y noche» mantiene el ritmo proverbial y la totalidad de la acción.
theological_decisions:
- issue: Rendering of Χριστός as a title
  english_pob_reading: his Messiah
  chosen_spanish_reading: su Mesías
  alternative_spanish_readings:
  - su Cristo
  rationale: 'En este verso, Χριστός aparece con función titular: el ungido de Dios. «Mesías» conserva el sentido de título mesiánico y evita que el término se opaque como nombre eclesial fijo.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2; contested terms for Χριστός'
- issue: Gender scope of ἀδελφῶν
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermandad
  rationale: El griego usa un plural masculino que puede ser genérico dentro de la comunidad creyente. Se mantiene «hermanos» en el texto principal para seguir la forma del original; una nota puede aclarar que el término puede incluir a mujeres.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
- issue: Distinction between δύναμις and ἐξουσία
  english_pob_reading: power ... authority
  chosen_spanish_reading: poder ... autoridad
  alternative_spanish_readings:
  - fuerza ... autoridad
  - poder ... derecho de gobernar
  rationale: Conviene preservar la diferencia entre poder efectivo y autoridad legítima. «Poder» y «autoridad» en español mantienen esa tensión semántica sin fusionar ambos conceptos.
  doctrine_reference: 'DOCTRINE.md: lexical distinction guidance'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado revisado de la POB inglesa: conserva la estructura de proclamación celestial, traduce Χριστός como «Mesías» conforme a la decisión doctrinal restaurada en la revisión, y mantiene la distinción entre «poder» y «autoridad». También preserva la imagen judicial de «acusador» y la continuidad de «día y noche».'
  spanish_consistency_notes:
  - Se prefirió «cielo» para οὐρανός en lugar de «cielo» con artículo o perífrasis más literal, por naturalidad y fidelidad contextual.
  - Se evitó traducir Χριστός como «Cristo» en el texto principal para no borrar el valor titular documentado por la POB.
  - 'La secuencia de artículos y sustantivos se mantuvo con paralelismo español natural: «la salvación, el poder, el reino ... y la autoridad».'
  - Se usó «delante de nuestro Dios» para reflejar el marco forense de ἐνώπιον sin introducir un tecnicismo innecesario.
