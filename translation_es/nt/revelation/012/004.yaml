source:
  edition: SBLGNT
  text: καὶ ἡ οὐρὰ αὐτοῦ σύρει τὸ τρίτον τῶν ἀστέρων τοῦ οὐρανοῦ, καὶ ἔβαλεν αὐτοὺς εἰς τὴν γῆν. καὶ ὁ δράκων ἕστηκεν ἐνώπιον τῆς γυναικὸς τῆς μελλούσης τεκεῖν, ἵνα ὅταν τέκῃ τὸ τέκνον αὐτῆς καταφάγῃ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/012/004.yaml
  text: And his tail sweeps away a third of the stars of heaven and throws them to the earth[a]. And the dragon stood before the woman who was about to give birth, so that when she gave birth[c][b], he might devour her child.
  footnotes:
  - marker: a
    text: Or 'drags'; the Greek verb can denote pulling or dragging, though here the image may suggest a sweeping motion with the tail.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'stars of heaven' is kept as written; many interpreters understand the stars symbolically, possibly as angels, but the Greek text itself does not state that explicitly.
    reason: alternative_reading
  - marker: c
    text: Or 'has taken his stand before'; the Greek perfect verb emphasizes the dragon's fixed stance.
    reason: lexical_alternative
