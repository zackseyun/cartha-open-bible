review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la escena y conserva elementos clave del griego: «dragón», «estrellas del cielo», «la tierra», «dar a luz» y «devorar». También preserva correctamente la finalidad de ἵνα ὅταν τέκῃ. Sin embargo, hay dos problemas de fidelidad: (1) τὸ τέκνον αὐτῆς es más neutral que «su hijo»; «su niño» o «su criatura» preserva mejor el valor de τέκνον sin sobreespecificar sexo. (2) La nota [a] no presenta una verdadera alternativa, porque repite «arrastra» y no refleja bien la opción documentada de barrido. Además, el inglés auditado ahora usa presente también en ἔβαλεν por vividez discursiva; el español ya hace eso con «arroja», lo cual es aceptable.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. No obstante, «se había puesto delante de» suena algo pesado y menos natural que «se había plantado delante de» o «estaba delante de»; aun así, puede mantenerse si se busca reflejar el perfecto resultativo. El cambio más necesario para calidad y precisión es evitar «su hijo» por sobreespecificación. También conviene mejorar la redacción de la nota [a].
  glossary_alignment: 'La terminología principal está alineada con el proyecto: «dragón», «tierra», «dar a luz», «devorar». No hay términos de la lista global especialmente conflictivos en este versículo. La decisión de mantener «estrellas del cielo» en vez de interpretarlo como ángeles está correctamente alineada con la filosofía POB. El único desajuste léxico notable es τέκνον > «hijo», que se aparta de la neutralidad de «child».'
  issues:
  - severity: medium
    issue: «a su hijo» sobreespecifica τὸ τέκνον αὐτῆς
    rationale: τέκνον significa «niño/hijo/descendencia» de manera amplia. Aquí el inglés POB eligió «her child» precisamente para no estrechar el sentido. En español, «a su niño» preserva mejor esa neutralidad sin perder naturalidad.
  - severity: low
    issue: La nota [a] está mal formulada y no ofrece una alternativa real
    rationale: Dice «También puede entenderse como “arrastra” o “lleva arrastrando”», pero «arrastra» ya es la lectura principal. Debe reflejar mejor la alternativa «barre» o «se lleva por delante» para corresponder al razonamiento auditado sobre σύρει.
  - severity: low
    issue: Falta en las notas españolas la observación sobre «estrellas del cielo» como lenguaje no interpretado
    rationale: El inglés POB conserva una nota sobre no forzar la identificación con ángeles. No es estrictamente indispensable, pero sí valiosa para mantener el mismo rastro de decisiones cuando hay simbolismo potencial.
  revised_spanish_text: Y su cola arrastra[a] la tercera parte de las estrellas del cielo[b] y las arroja a la tierra. Y el dragón se había puesto[c] delante de la mujer que estaba por dar a luz, para que, cuando diera a luz, devorara a su niño.
  revised_footnotes:
