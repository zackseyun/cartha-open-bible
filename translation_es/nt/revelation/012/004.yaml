revisions:
- from: Y su cola arrastra[a] la tercera parte de las estrellas del cielo y las arroja a la tierra. Y el dragón se había puesto[b] delante de la mujer que estaba por dar a luz, para que, cuando diera a luz, devorara a su hijo.
  to: Y su cola arrastra[a] la tercera parte de las estrellas del cielo[b] y las arroja a la tierra. Y el dragón se había puesto[c] delante de la mujer que estaba por dar a luz, para que, cuando diera a luz, devorara a su niño.
  rationale: Se ajusta «su hijo» a «su niño» para reflejar mejor la neutralidad de τέκνον y el inglés POB «her child». Se corrige la nota [a] para que presente una alternativa real y coherente con σύρει. Se añade la nota sobre «estrellas del cielo» para preservar el rastro auditado de no interpretar el símbolo en el texto principal. Se mantiene «se había puesto» porque, aunque algo pesado, conserva aceptablemente el matiz resultativo de ἕστηκεν.
  reviewer_model: gpt-5.4
