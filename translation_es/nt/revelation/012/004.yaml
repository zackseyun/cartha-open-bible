    text: La frase «estrellas del cielo» se conserva tal como está; muchos intérpretes entienden las estrellas simbólicamente, quizá como ángeles, pero el texto griego no lo dice explícitamente.
    reason: alternative_reading
  - marker: c
    text: O «había tomado su puesto». El perfecto griego subraya que el dragón ya estaba fijo en esa posición de amenaza.
    reason: lexical_alternative
  revision_rationale: Se ajusta «su hijo» a «su niño» para reflejar mejor la neutralidad de τέκνον y el inglés POB «her child». Se corrige la nota [a] para que presente una alternativa real y coherente con σύρει. Se añade la nota sobre «estrellas del cielo» para preservar el rastro auditado de no interpretar el símbolo en el texto principal. Se mantiene «se había puesto» porque, aunque algo pesado, conserva aceptablemente el matiz resultativo de ἕστηκεν.
