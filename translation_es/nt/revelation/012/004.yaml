translation:
  language: es
  text: Y su cola arrastra[a] la tercera parte de las estrellas del cielo[b] y las arroja a la tierra. Y el dragón se había puesto[c] delante de la mujer que estaba por dar a luz, para que, cuando diera a luz, devorara a su niño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «barre»; el verbo griego puede denotar tirar o arrastrar, aunque aquí la imagen puede sugerir un movimiento de barrido con la cola.
    reason: lexical_alternative
  - marker: b
    text: La frase «estrellas del cielo» se conserva tal como está; muchos intérpretes entienden las estrellas simbólicamente, quizá como ángeles, pero el texto griego no lo dice explícitamente.
    reason: alternative_reading
  - marker: c
    text: O «había tomado su puesto». El perfecto griego subraya que el dragón ya estaba fijo en esa posición de amenaza.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύρει
  english_pob_choice: sweeps away
  chosen_spanish: arrastra
  alternatives_spanish:
  - barre
  - se lleva arrastrando
  - sweeps away
  lexicon: BDAG
  rationale: El verbo griego puede expresar tirar, arrastrar o llevar por fuerza. En español, «arrastra» conserva la fuerza del movimiento de la cola sin volver la imagen demasiado interpretativa. «Barre» podría sugerir un movimiento más horizontal y menos directo; «se lleva arrastrando» resulta más pesado.
- source_word: τὸ τρίτον τῶν ἀστέρων τοῦ οὐρανοῦ
  english_pob_choice: a third of the stars of heaven
  chosen_spanish: la tercera parte de las estrellas del cielo
  alternatives_spanish:
  - un tercio de las estrellas del cielo
  - la tercera parte de los astros del cielo
  lexicon: BDAG
  rationale: «La tercera parte» reproduce con naturalidad τὸ τρίτον y mantiene el valor cuantitativo. «Estrellas del cielo» sigue de cerca el griego y conserva la imagen apocalíptica sin interpretarla como «ángeles». «Astros» sería posible, pero cambia el tono y la referencia más concreta a «estrellas».
- source_word: ἔβαλεν
  english_pob_choice: threw
  chosen_spanish: arroja
  alternatives_spanish:
  - arrojó
  - echó
  - lanza
  lexicon: BDAG
  rationale: Aunque el aoristo griego mira al acto como completo, en la narración apocalíptica el español puede sostener el presente histórico para preservar la vivacidad del pasaje, como hace el inglés POB al retener la fuerza discursiva. «Arroja» mantiene el impacto; «arrojó» sería más lineal, pero menos vivo en este contexto.
- source_word: γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: BDAG
  rationale: En la escena cósmica de Apocalipsis, γῆ apunta a la tierra en contraste con el cielo. «La tierra» es la opción directa y más fiel.
- source_word: δράκων
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - dragón
  - serpiente monstruosa
  lexicon: BDAG
  rationale: «Dragón» es la equivalencia estándar y mantiene la coherencia intertextual dentro de Apocalipsis. La alternativa explicativa debilitaría la figura simbólica del texto.
- source_word: ἕστηκεν
  english_pob_choice: stood / has taken his stand
  chosen_spanish: se había puesto
  alternatives_spanish:
  - estaba de pie
  - había tomado su puesto
  - se había plantado
  lexicon: BDAG
  rationale: El perfecto griego expresa una postura ya asumida y relativamente fija. «Se había puesto» delante de» comunica bien el resultado de la acción con un matiz de posición estable. «Se había plantado» sería más idiomático, pero algo más enfático y coloquial.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» expresa la ubicación espacial y la amenaza inmediata. «En presencia de» sería demasiado formal y menos visual en esta escena.
- source_word: τῆς μελλούσης τεκεῖν
  english_pob_choice: who was about to give birth
  chosen_spanish: de la mujer que estaba por dar a luz
  alternatives_spanish:
  - de la mujer que iba a dar a luz
  - de la mujer próxima a dar a luz
  lexicon: BDAG
  rationale: El participio con μέλλω indica inminencia. «Estaba por dar a luz» reproduce ese sentido de manera natural y directa.
- source_word: ἵνα ὅταν τέκῃ
  english_pob_choice: so that when she gave birth
  chosen_spanish: para que, cuando diera a luz
  alternatives_spanish:
  - de modo que, cuando diera a luz
  - para que, cuando alumbrara
  lexicon: BDAG
  rationale: La construcción final con contingencia futura se expresa bien con «para que, cuando diera a luz». Se conserva tanto el propósito como la temporalidad subordinada.
- source_word: τὸ τέκνον αὐτῆς
  english_pob_choice: her child
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su hijo
  - a su niño
  - a su criatura
  lexicon: BDAG
  rationale: «Hijo» funciona naturalmente en español y encaja con el contexto narrativo sin añadir precisión innecesaria sobre la edad. Aunque τέκνον es más amplio que «hijo», aquí la referencia relacional y narrativa permite esta elección; «niño» o «criatura» sonarían menos solemnes.
- source_word: καταφάγῃ
  english_pob_choice: devour
  chosen_spanish: devorara
  alternatives_spanish:
  - se lo tragara
  - lo devorase
  - consumiera
  lexicon: BDAG
  rationale: «Devorara» reproduce la violencia y la imagen depredadora del verbo griego. Es la opción más fiel y natural en español bíblico contemporáneo.
theological_decisions:
- issue: Representación de las estrellas del cielo sin interpretación añadida
  english_pob_reading: Translate literally without interpreting the stars as angels in the main text.
  chosen_spanish_reading: Conservar «las estrellas del cielo» sin convertirlas en «ángeles» ni explicar el símbolo en el cuerpo del texto.
  alternative_spanish_readings:
  - las estrellas celestiales
  - los ángeles del cielo
  rationale: El griego dice literalmente «estrellas del cielo». Aunque algunos intérpretes ven una referencia simbólica a seres angélicos, el texto no lo afirma explícitamente; por eso la traducción mantiene la imagen abierta.
  doctrine_reference: POB Translation Philosophy §1, §3
- issue: Valor aspectual del perfecto ἕστηκεν
  english_pob_reading: The perfect verb emphasizes the dragon's fixed stance.
  chosen_spanish_reading: 'Usar una forma que sugiera una posición ya asumida y estable: «se había puesto delante de».'
  alternative_spanish_readings:
  - estaba de pie delante de
  - se plantó delante de
  - había tomado su puesto delante de
  rationale: El perfecto griego no es solo una acción pasada, sino un estado resultante. La redacción española intenta conservar esa fijación postural y el matiz de amenaza inmediata sin sonar forzada.
  doctrine_reference: POB Translation Philosophy §1, §5
- issue: Relación entre el propósito y la temporalidad futura en ἵνα ὅταν τέκῃ
  english_pob_reading: so that when she gave birth
  chosen_spanish_reading: «para que, cuando diera a luz» conserva el propósito hostil del dragón y la eventualidad del nacimiento.
  alternative_spanish_readings:
  - de modo que, cuando diera a luz
  - a fin de que, cuando diera a luz
  rationale: La frase griega une finalidad y tiempo contingente. El español debe mantener ambos elementos para no suavizar la intención del dragón ni convertir la cláusula en una simple secuencia temporal.
  doctrine_reference: POB Translation Philosophy §1, §5
translation_notes:
  revision_awareness: 'El inglés POB revisó la primera cláusula para mantener la coherencia de tiempo verbal: el texto actual conserva la vivacidad narrativa en español con presente histórico («arrastra», «arroja») y refleja el matiz perfectivo del segundo movimiento con la postura estable del dragón («se había puesto»). También evita interpretar «las estrellas del cielo» como «ángeles», siguiendo la decisión inglesa de no importar esa lectura al texto principal.'
  spanish_consistency_notes:
  - Se usa «la tierra» para γῆ en sentido cósmico, coherente con Apocalipsis.
  - Se mantiene «dragón» para δράκων por consistencia interna del libro.
  - Se emplea «dar a luz» como equivalente natural de τίκτω en este contexto.
  - Se conserva el orden de las dos acciones principales para reflejar el paralelismo del griego.
  - Se evita «SEÑOR» o términos equivalentes porque este versículo no contiene el nombre divino ni κύριος.
