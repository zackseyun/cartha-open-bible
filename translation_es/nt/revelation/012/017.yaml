translation:
  language: es
  text: Y el dragón se enfureció contra la mujer, y se fue a hacer guerra contra el resto de su descendencia, los que guardan los mandamientos de Dios y tienen el testimonio de Jesús[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el testimonio acerca de Jesús»; también, «el testimonio de Jesús mismo». El genitivo griego puede entenderse de más de una manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὠργίσθη
  english_pob_choice: became enraged
  chosen_spanish: se enfureció
  alternatives_spanish:
  - se enojó
  - se airó
  lexicon: BDAG
  rationale: El aoristo pasivo/deponente de ὀργίζομαι expresa un volverse airado; en español, 'se enfureció' comunica mejor la intensidad hostil del contexto apocalíptico que un simple 'se enojó', sin salir del campo semántico.
- source_word: δράκων
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - serpiente monstruosa
  lexicon: BDAG
  rationale: '''Dragón'' es el equivalente natural y establecido para δράκων en Apocalipsis, conservando la imaginería simbólica del pasaje.'
- source_word: γυναικί
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - esa mujer
  lexicon: BDAG
  rationale: La forma con artículo señala a la mujer ya presentada en el contexto; 'la mujer' es la traducción directa y natural en español.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se alejó
  lexicon: BDAG
  rationale: ἀπέρχομαι se traduce de manera natural como 'irse'; 'se fue' preserva el movimiento narrativo sin añadir matices no explicitados.
- source_word: ποιῆσαι πόλεμον
  english_pob_choice: to make war
  chosen_spanish: a hacer guerra
  alternatives_spanish:
  - para hacer guerra
  - a librar guerra
  lexicon: BDAG
  rationale: La construcción infinitiva se vierte de modo cercano al griego con 'a hacer guerra'; en español suena natural y mantiene la literalidad del motivo bélico.
- source_word: μετὰ τῶν λοιπῶν
  english_pob_choice: with the rest
  chosen_spanish: contra el resto
  alternatives_spanish:
  - con el resto
  - contra los demás
  lexicon: BDAG
  rationale: Aunque μετά con genitivo es literalmente 'con', en este contexto la idea es adversarial por la expresión 'hacer guerra'. En español, 'contra' hace explícito el valor implícito sin perder el sentido del pasaje.
- source_word: τοῦ σπέρματος αὐτῆς
  english_pob_choice: of her offspring
  chosen_spanish: de su descendencia
  alternatives_spanish:
  - de su simiente
  - de su progenie
  lexicon: BDAG
  rationale: σπέρμα puede significar semilla, descendencia u offspring. 'Descendencia' es claro y natural en español, preservando el vínculo familiar/lineal sin caer en un calco como 'semilla'.
- source_word: τηρούντων
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - observan
  - cumplen
  lexicon: BDAG
  rationale: τηρέω en contexto de mandamientos se entiende bien como 'guardar'; 'guardan' es una traducción estable y fiel, con tono bíblico sobrio.
- source_word: ἐντολὰς
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: BDAG
  rationale: '''Mandamientos'' conserva el peso bíblico de ἐντολαί y corresponde al uso tradicional sin necesidad de suavizarlo.'
- source_word: ἐχόντων
  english_pob_choice: hold to
  chosen_spanish: mantienen
  alternatives_spanish:
  - tienen
  - se aferran a
  lexicon: BDAG
  rationale: Aunque ἔχω significa literalmente 'tener', aquí apunta a adherirse firmemente al testimonio. 'Mantienen' comunica esa persistencia sin sonar demasiado interpretativo como 'se aferran a'.
- source_word: μαρτυρίαν Ἰησοῦ
  english_pob_choice: the testimony of Jesus
  chosen_spanish: el testimonio de Jesús
  alternatives_spanish:
  - el testimonio acerca de Jesús
  - el testimonio de Jesús mismo
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del genitivo en español con 'de Jesús', que puede leerse como testimonio acerca de Jesús o como testimonio que Jesús da. Esto respeta la tensión lexical y teológica documentada por el POB en inglés.
theological_decisions:
- issue: Genitivo en τὴν μαρτυρίαν Ἰησοῦ
  english_pob_reading: the testimony of Jesus
  chosen_spanish_reading: el testimonio de Jesús
  alternative_spanish_readings:
  - el testimonio acerca de Jesús
  - el testimonio de Jesús mismo
  rationale: El genitivo puede entenderse de manera objetiva o subjetiva. La redacción principal en español conserva la forma ambigua 'de Jesús' y la nota ofrece las opciones principales, sin resolver artificialmente la tensión interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se mantuvo sin cambios el sentido general del texto fuente y la decisión auditada del POB inglés respecto al genitivo de «μαρτυρίαν Ἰησοῦ». No se detectaron revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός, conforme al criterio proyectual.
  - Se evitó «Cristo» porque el texto fuente usa Ἰησοῦς, y el contexto requiere el nombre propio Jesús.
  - Se eligió «descendencia» para σπέρμα por claridad natural en español, sin perder el valor genealógico.
  - Se mantuvo una formulación que preserva la ambigüedad de «el testimonio de Jesús» mediante nota, siguiendo el POB inglés.
