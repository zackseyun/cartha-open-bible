revisions:
- from: Y el dragón se enfureció contra la mujer[a], y se fue a hacer guerra contra el resto de su descendencia, los que guardan los mandamientos de Dios y mantienen el testimonio de Jesús.
  to: Y el dragón se enfureció contra la mujer, y se fue a hacer guerra contra el resto de su descendencia, los que guardan los mandamientos de Dios y tienen el testimonio de Jesús[a].
  rationale: Se corrige la ubicación de la nota para que corresponda al sintagma realmente ambiguo en el griego, y se sustituye 'mantienen' por 'tienen' para una equivalencia más directa y un español bíblico más natural sin perder la tensión interpretativa preservada en la nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:37:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: la ira del dragón contra la mujer, su partida para hacer guerra, el referente de ''los demás/el resto de su descendencia'', y la caracterización de ellos como quienes guardan los mandamientos de Dios y tienen/retienen el testimonio de Jesús. También preserva correctamente la ambigüedad del genitivo en μαρτυρίαν Ἰησοῦ mediante nota.'
  spanish_quality_summary: 'El español es claro y ampliamente legible. Sin embargo, hay dos ajustes menores que mejorarían fidelidad y naturalidad: 1) la nota [a] está anclada en ''la mujer'', pero corresponde a ''el testimonio de Jesús''; 2) ''mantienen el testimonio de Jesús'' suena menos natural en español bíblico que ''tienen el testimonio de Jesús'', y además ἔχω se acerca más a ''tener'', mientras la ambigüedad interpretativa ya queda resguardada en la nota.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: δράκων > ''dragón'', θεοῦ > ''Dios'', Ἰησοῦ > ''Jesús''. No aparece vocabulario sujeto a defaults especiales como Yahvé, Mesías, esclavo, etc. ''Descendencia'' para σπέρμα y ''mandamientos'' para ἐντολάς están bien. ''Contra el resto'' es una explicitación aceptable del valor adversativo implícito en el contexto de guerra.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada en 'la mujer' en vez de en 'el testimonio de Jesús'.
    rationale: La nota documenta la ambigüedad del genitivo en μαρτυρίαν Ἰησοῦ, por lo que debe anclarse exactamente en esa frase para cumplir la disciplina de notas y evitar confusión exegética.
  - severity: low
    issue: '''Mantienen el testimonio de Jesús'' es menos idiomático y algo más interpretativo que ''tienen el testimonio de Jesús''.'
    rationale: El griego ἐχόντων literalmente significa 'teniendo'. Aunque el inglés usó 'hold to' para claridad idiomática, en español 'tienen el testimonio de Jesús' suena natural, conserva mejor la forma fuente y mantiene la ambigüedad teológica ya explicada en la nota.
  revised_spanish_text: Y el dragón se enfureció contra la mujer, y se fue a hacer guerra contra el resto de su descendencia, los que guardan los mandamientos de Dios y tienen el testimonio de Jesús[a].
  revised_footnotes:
  - marker: a
    text: 'O: «el testimonio acerca de Jesús»; también, «el testimonio de Jesús mismo». El genitivo griego puede entenderse de más de una manera.'
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación de la nota para que corresponda al sintagma realmente ambiguo en el griego, y se sustituye 'mantienen' por 'tienen' para una equivalencia más directa y un español bíblico más natural sin perder la tensión interpretativa preservada en la nota.
