review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: «huyó», «un lugar preparado por Dios», la finalidad con «para que», y la duración «mil doscientos sesenta días». También preserva correctamente el plural activo indefinido de τρέφωσιν con «sustenten». Sin embargo, la nota existente no corresponde al punto significativo preservado por el inglés POB: la ambigüedad del sujeto de «τρέφωσιν».'
  spanish_quality_summary: 'El español principal es claro y digno. «Huyó al desierto» y «un lugar preparado por Dios» son naturales. «La sustenten» es aceptable y fiel, aunque algo elevado; funciona bien en registro bíblico. El problema principal es técnico-editorial: se reutiliza el marcador [a] dos veces para dos asuntos distintos, y la segunda ancla en «la[a]» no coincide con la única nota incluida.'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεοῦ se traduce correctamente como «Dios». No aparecen términos de glosario sensibles como Yahvé/Mesías. La elección «desierto» para ἔρημον es defendible en español, aunque el inglés prefirió «wilderness»; no exige cambio textual si se conserva una nota adecuada sobre la alternativa y/o amplitud semántica. La decisión clave de mantener el sujeto indefinido plural debe documentarse en nota, conforme al rastro de auditoría inglés.'
  issues:
  - severity: high
    issue: Marcadores de nota mal gestionados
    rationale: El texto usa [a] en «desierto[a]» y de nuevo en «la[a]», pero solo existe una nota. Las instrucciones requieren marcadores únicos y que cada nota tenga su ancla exacta en el texto.
  - severity: medium
    issue: Falta la nota sobre el plural activo indefinido de τρέφωσιν
    rationale: El inglés POB preserva y documenta expresamente la ambigüedad del sujeto («they may nourish her» / alternativa pasiva). El español también la preserva con «la sustenten», pero la nota correspondiente falta.
  - severity: low
    issue: La nota actual sobre «desierto» está rotulada como alternativa pero no aporta una alternativa textual real del verso
    rationale: 'La nota mezcla explicación semántica con una glosa poco útil («O: en el desierto»), ya que el texto ya dice «al desierto». Sería mejor reformularla como nota léxica aclaratoria o sustituirla por la nota más importante sobre τρέφωσιν.'
  revised_spanish_text: Y la mujer huyó al desierto[a], donde tiene un lugar preparado por Dios, para que allí la sustenten[b] durante mil doscientos sesenta días.
  revised_footnotes:
  - marker: a
    text: O «al lugar desolado». El griego ἔρημος puede referirse a un desierto o, más ampliamente, a una región solitaria y desolada.
    reason: lexical_alternative
  - marker: b
    text: O «para que allí sea sustentada durante mil doscientos sesenta días». El griego tiene un verbo activo en tercera persona plural con sujeto no especificado; literalmente, «para que allí la sustenten».
    reason: alternative_reading
  revision_rationale: Se corrigen los marcadores de nota para que sean únicos y correspondan exactamente al texto. Se mantiene el texto base, que es en general fiel y natural, pero se añade la nota indispensable sobre el sujeto no especificado de τρέφωσιν, siguiendo el rastro de auditoría inglés. También se ajusta la nota sobre «desierto» para que sea una aclaración léxica útil y precisa.
