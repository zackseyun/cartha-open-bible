translation:
  language: es
  text: Y la mujer huyó al desierto[a], donde tiene un lugar preparado por Dios, para que allí la sustenten[b] durante mil doscientos sesenta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al lugar desolado». El griego ἔρημος puede referirse a un desierto o, más ampliamente, a una región solitaria y desolada.
    reason: lexical_alternative
  - marker: b
    text: O «para que allí sea sustentada durante mil doscientos sesenta días». El griego tiene un verbo activo en tercera persona plural con sujeto no especificado; literalmente, «para que allí la sustenten».
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fue huyendo
  - escapó
  lexicon: BDAG
  rationale: ἔφυγεν expresa una salida urgente o una huida. En español, «huyó» comunica con naturalidad esa acción sin añadir matices ajenos.
- source_word: εἰς τὴν ἔρημον
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al desierto yermo
  - a la región desértica
  lexicon: BDAG
  rationale: ἔρημος puede abarcar un lugar desolado o desierto. Aquí «desierto» es breve y natural en español; el contexto bíblico sostiene la idea de un lugar apartado y desolado.
- source_word: τόπον
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - una ubicación
  - un sitio
  lexicon: BDAG
  rationale: τόπος significa de manera directa «lugar». Se conserva el sentido indefinido del texto griego.
- source_word: ἡτοιμασμένον ἀπὸ τοῦ θεοῦ
  english_pob_choice: prepared by God
  chosen_spanish: preparado por Dios
  alternatives_spanish:
  - hecho listo por Dios
  - dispuesto por Dios
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica un lugar ya preparado. Con ἀπό + agente personal, «por Dios» es la equivalencia natural en español.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce propósito. «Para que» transmite bien esa finalidad en español sin volver la frase artificial.
- source_word: τρέφωσιν αὐτὴν
  english_pob_choice: they may nourish her
  chosen_spanish: la sustenten
  alternatives_spanish:
  - la alimenten
  - la nutran
  lexicon: BDAG
  rationale: τρέφω puede significar alimentar o sostener con cuidado continuo. «Sustenten» preserva la idea de provisión sostenida y permite mantener el sujeto indefinido plural del griego sin forzar una pasiva española.
- source_word: ἡμέρας χιλίας διακοσίας ἑξήκοντα
  english_pob_choice: for one thousand two hundred sixty days
  chosen_spanish: durante mil doscientos sesenta días
  alternatives_spanish:
  - por mil doscientos sesenta días
  - durante 1.260 días
  lexicon: BDAG
  rationale: El acusativo de duración se expresa naturalmente con «durante». Se opta por escribir el número con palabras para un estilo bíblico fluido y solemne.
theological_decisions:
- issue: Sujeto no especificado de τρέφωσιν
  english_pob_reading: 'Retain the indefinite active sense: ''they may nourish her.'''
  chosen_spanish_reading: 'Mantener el plural activo indefinido: «la sustenten»'
  alternative_spanish_readings:
  - «sea sustentada»
  - «Dios la sustente»
  rationale: El griego usa un verbo activo en tercera persona plural sin sujeto expreso. Convertirlo a pasiva o nombrar a Dios resolvería indebidamente la ambigüedad. «La sustenten» conserva la indeterminación textual y la tensión interpretativa.
  doctrine_reference: Preservar la ambigüedad textual sin introducir un agente no expresado.
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail inglés que eliminó un «there» redundante y mantuvo el valor activo e indefinido de τρέφωσιν. En español se reflejó esa decisión sin convertir la cláusula en pasiva ni asignar un sujeto explícito.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, conforme al criterio POB.
  - Se eligió un verbo de provisión continua («sustenten») para τρέφωσιν, conservando el sentido de cuidado sostenido.
  - Se evitó «Cristo» o terminología litúrgica ajena, ya que no aparecen en el versículo.
  - La nota al pie a cubre la amplitud semántica de ἔρημος en español, donde «desierto» puede sonar más específico que el griego.
