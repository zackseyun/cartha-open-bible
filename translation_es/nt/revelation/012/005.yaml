base_translation:
  language: en
  yaml_path: translation/nt/revelation/012/005.yaml
  text: And she gave birth to a son[a], a male child, who is to shepherd all the nations with an iron rod; and her child was snatched up to God and to his throne.
  footnotes:
  - marker: a
    text: Or 'who will rule all the nations with an iron rod.' The Greek verb literally means 'shepherd,' but in this context it echoes Psalm 2 and carries royal authority.
