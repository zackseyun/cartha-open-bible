translation:
  language: es
  text: Y dio a luz un hijo[a], varón, que ha de pastorear a todas las naciones con vara de hierro; y su niño fue arrebatado a Dios y a su trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que ha de gobernar a todas las naciones con vara de hierro». El verbo griego literalmente significa «pastorear», pero en este contexto alude al Salmo 2 y conlleva autoridad real.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτεκεν
  english_pob_choice: gave birth
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: BDAG
  rationale: Expresa de manera natural y digna la acción concreta del parto, conservando la imagen física del texto griego sin volverla abstracta.
- source_word: υἱόν, ἄρσεν
  english_pob_choice: a son, a male child
  chosen_spanish: un hijo, varón
  alternatives_spanish:
  - un hijo varón
  - un hijo, un varón
  lexicon: BDAG
  rationale: El griego une υἱόν con ἄρσεν para intensificar la referencia. 'Hijo, varón' mantiene esa duplicación sin suavizarla ni convertirla en una sola idea.
- source_word: μέλλει ποιμαίνειν
  english_pob_choice: is to shepherd
  chosen_spanish: ha de pastorear
  alternatives_spanish:
  - pastoreará
  - está para pastorear
  lexicon: BDAG
  rationale: '''Ha de'' preserva la orientación futura/destinada de μέλλει sin forzar un simple futuro. ''Pastorear'' mantiene el verbo metafórico del original y su resonancia real.'
- source_word: ποιμαίνειν
  english_pob_choice: shepherd
  chosen_spanish: pastorear
  alternatives_spanish:
  - apacentar
  - gobernar
  lexicon: BDAG
  rationale: El verbo significa literalmente 'pastorear'; se conserva la metáfora en el texto principal en lugar de reemplazarla por una glosa interpretativa como 'gobernar'.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todas las naciones de la tierra
  - a todos los pueblos
  lexicon: BDAG
  rationale: '''Naciones'' refleja mejor el alcance amplio y el eco de Salmo 2 que ''gentiles'' o ''pueblos'', y el dativo con ''a'' fluye de forma natural en español.'
- source_word: ἐν ῥάβδῳ σιδηρᾷ
  english_pob_choice: with an iron rod
  chosen_spanish: con vara de hierro
  alternatives_spanish:
  - con cetro de hierro
  - con una vara de hierro
  lexicon: BDAG
  rationale: '''Vara de hierro'' reproduce con fidelidad la imagen de la expresión bíblica y conserva el carácter regio de la alusión sin añadir interpretación.'
- source_word: ἡρπάσθη
  english_pob_choice: was snatched up
  chosen_spanish: fue arrebatado
  alternatives_spanish:
  - fue llevado
  - fue arrancado
  lexicon: BDAG
  rationale: El pasivo de ἁρπάζω implica traslado repentino y con fuerza. 'Arrebatado' transmite bien esa brusquedad en español bíblico natural.
- source_word: τὸ τέκνον αὐτῆς
  english_pob_choice: her child
  chosen_spanish: su hijo
  alternatives_spanish:
  - su criatura
  - su niño
  lexicon: BDAG
  rationale: '''Hijo'' armoniza con la referencia previa y mantiene la relación filial. En español, ''su hijo'' es más natural que repetir ''el niño'' y no pierde el valor general de τέκνον.'
- source_word: πρὸς τὸν θεὸν καὶ πρὸς τὸν θρόνον αὐτοῦ
  english_pob_choice: to God and to his throne
  chosen_spanish: hasta Dios y hasta su trono
  alternatives_spanish:
  - a Dios y a su trono
  - hacia Dios y hacia su trono
  lexicon: BDAG
  rationale: '''Hasta'' comunica el movimiento dirigido a un destino final con mayor naturalidad que un simple ''a'', y conserva la repetición de πρὸς sin volver la frase rígida.'
theological_decisions:
- issue: Alusión mesiánica a Salmo 2 en ποιμαίνειν ... ἐν ῥάβδῳ σιδηρᾷ
  english_pob_reading: Preserve the shepherding metaphor in the main text while allowing the royal sense to be noted in a footnote.
  chosen_spanish_reading: Conservar 'pastorear' en el texto principal, dejando implícito el sentido regio de la imagen.
  alternative_spanish_readings:
  - gobernar a todas las naciones con vara de hierro
  - regir a todas las naciones con vara de hierro
  rationale: El verbo griego es 'pastorear', aunque la alusión a Salmo 2 comunica autoridad real. Mantener la metáfora evita borrar la tensión lexical y respeta la evidencia fuente; el sentido de gobierno queda sugerido por el contexto sin sustituir el verbo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza de μέλλει
  english_pob_reading: Render as 'is to shepherd' rather than a simple future.
  chosen_spanish_reading: '''Ha de pastorear'''
  alternative_spanish_readings:
  - '''pastoreará'''
  - '''está destinado a pastorear'''
  rationale: '''Ha de'' conserva la orientación futura o destinada sin reducirla a un futuro liso ni introducir una formulación demasiado explicativa. Es una solución natural y fiel al matiz del griego.'
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del expediente inglés: μέλλει + infinitivo se resolvió con una formulación más natural que conserva el sentido futuro/destinado. También se mantiene la decisión de preservar el verbo metafórico ''shepherd''/''pastorear'' en el texto principal y explicar la lectura regia en nota.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, conforme al estándar del proyecto.
  - Se mantiene 'vara de hierro' para ῥάβδῳ σιδηρᾷ, evitando sustituciones por 'cetro' en el texto principal.
  - '''Hasta'' se usa para reproducir el movimiento de πρὸς sin perder naturalidad en español.'
  - La nota al pie marca la alternativa interpretativa 'gobernar' y preserva la tensión entre metáfora pastoral y autoridad real.
