translation:
  language: es
  text: Y ellos vencieron[a] por la sangre del Cordero y por la palabra de su testimonio, y no amaron su vida[b] hasta la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo vencieron'.
    reason: lexical_alternative
  - marker: b
    text: O 'su alma'; el griego psychē puede significar 'vida', 'yo' o 'alma'. Aquí el sentido es su vida frente a la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνίκησαν
  english_pob_choice: conquered
  chosen_spanish: vencieron
  alternatives_spanish:
  - conquistaron
  - triunfaron sobre
  lexicon: BDAG
  rationale: El verbo griego indica vencer en combate o en conflicto. En español, 'vencieron' comunica de forma natural la victoria sin introducir una connotación demasiado militar de dominio territorial que 'conquistaron' podría sugerir. Mantiene la imagen de conflicto propia de Apocalipsis.
- source_word: διὰ τὸ αἷμα
  english_pob_choice: by the blood
  chosen_spanish: por la sangre
  alternatives_spanish:
  - a causa de la sangre
  - mediante la sangre
  lexicon: BDAG
  rationale: διά con acusativo puede expresar medio o causa. 'Por la sangre' preserva la fuerza instrumental en español y evita explicar más de lo que el versículo dice. 'Mediante' sería posible, pero menos directo en el ritmo del texto.
- source_word: τοῦ ἀρνίου
  english_pob_choice: the Lamb
  chosen_spanish: del Cordero
  alternatives_spanish:
  - del Corderito
  lexicon: BDAG
  rationale: En Apocalipsis, ἀρνίον es título cristológico fijo. 'Cordero' conserva la imagen sacrificial y apocalíptica sin suavizarla. 'Corderito' sería demasiado diminutivo y no corresponde al uso litúrgico ni al valor del título.
- source_word: λόγον τῆς μαρτυρίας αὐτῶν
  english_pob_choice: the word of their testimony
  chosen_spanish: la palabra de su testimonio
  alternatives_spanish:
  - el mensaje de su testimonio
  - su testimonio
  lexicon: BDAG
  rationale: Se conserva tanto λόγος como μαρτυρία. 'Palabra' mantiene la relación con el término griego y 'testimonio' preserva el matiz de declaración de testigo. 'Mensaje' explicita demasiado; 'su testimonio' pierde la correspondencia con λόγος.
- source_word: μαρτυρίας
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - declaración
  lexicon: BDAG
  rationale: '''Testimonio'' es el equivalente natural en español para el matiz jurídico y confesional de μαρτυρία, y armoniza con ''la palabra de su testimonio''.'
- source_word: οὐκ ἠγάπησαν
  english_pob_choice: did not love
  chosen_spanish: no amaron
  alternatives_spanish:
  - no estimaron
  - no quisieron conservar
  lexicon: BDAG
  rationale: Se mantiene el verbo de amor para no diluir la elección léxica del griego. 'No amaron' es fiel y solemne; alternativas como 'no estimaron' explicitan interpretativamente el valor dado a la vida.
- source_word: τὴν ψυχὴν αὐτῶν
  english_pob_choice: their life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su propia vida
  lexicon: BDAG
  rationale: ψυχή puede significar vida, alma o yo. En el contexto de martirio, 'vida' expresa con claridad la entrega de la existencia terrenal. El singular griego se refleja naturalmente en singular colectivo español ('su vida').
- source_word: ἄχρι θανάτου
  english_pob_choice: even unto death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - incluso hasta la muerte
  lexicon: BDAG
  rationale: '''Hasta la muerte'' reproduce el límite de fidelidad del griego de modo natural en español. ''Incluso hasta la muerte'' añade énfasis redundante; ''hasta morir'' es más coloquial y menos solemne.'
theological_decisions:
- issue: La victoria por la sangre del Cordero
  english_pob_reading: Rendered instrumentally as the means by which they conquered, without expanding into a doctrinal explanation beyond the text.
  chosen_spanish_reading: 'Se traduce instrumentalmente: ''por la sangre del Cordero'', sin ampliar la frase con explicaciones doctrinales ajenas al versículo.'
  alternative_spanish_readings:
  - a causa de la sangre del Cordero
  - mediante la sangre del Cordero
  rationale: La sintaxis griega admite medio o causa. En español, 'por' conserva la relación instrumental y es suficientemente sobrio para no convertir el texto en una paráfrasis teológica.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Sentido de ψυχή en contexto martirial
  english_pob_reading: Translated as 'life' rather than 'soul.'
  chosen_spanish_reading: Se traduce como 'vida' y no como 'alma'.
  alternative_spanish_readings:
  - su alma
  - su ser
  rationale: El contexto inmediato habla de morir; por eso 'vida' comunica mejor la entrega de la existencia terrenal y evita imponer una oposición cuerpo/alma que el versículo no exige.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la auditoría inglesa y no requiere revisiones sustantivas. Se mantuvo el valor instrumental de 'por', el título cristológico 'Cordero' y el sentido de ψυχή como 'vida' en contexto de martirio.
  spanish_consistency_notes:
  - Se prefiere 'vencieron' para ἐνίκησαν por ser natural en español y acorde con el lenguaje de conflicto de Apocalipsis.
  - '''Cordero'' se mantiene como título fijo cristológico, no como simple animal sacrificial.'
  - '''Testimonio'' conserva el matiz de declaración de testigo y evita reducir la frase a ''mensaje''.'
  - '''Hasta la muerte'' expresa de forma solemne el límite de la fidelidad, en consonancia con el registro apocalíptico.'
