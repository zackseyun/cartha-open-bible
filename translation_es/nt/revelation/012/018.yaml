lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y también
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza este miembro con el anterior; en español bíblico natural, ‘Y’ comunica la coordinación sin añadir matiz no presente en el griego.
- source_word: ἐστάθη
  english_pob_choice: he stood
  chosen_spanish: se puso
  alternatives_spanish:
  - estuvo de pie
  - quedó de pie
  - se detuvo
  lexicon: BDAG
  rationale: El griego usa una forma intransitiva de ἵστημι que expresa el hecho de quedar/ponerse en pie. En español, ‘se puso’ reproduce bien la acción de colocarse de pie y evita forzar un sujeto explícito que el texto griego no expresa de manera visible en esta forma verbal.
- source_word: ἐπὶ τὴν ἄμμον
  english_pob_choice: on the sand
  chosen_spanish: sobre la arena
  alternatives_spanish:
  - sobre la arena
  - en la arena
  - sobre la orilla
  lexicon: BDAG
  rationale: ἄμμος significa literalmente ‘arena’ o ‘arena fina’; ‘arena’ conserva mejor el valor léxico que ‘orilla’. Con ἐπί + acusativo, ‘sobre’ transmite la ubicación resultante de manera natural en español.
- source_word: τῆς θαλάσσης
  english_pob_choice: of the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - del mar
  - junto al mar
  lexicon: BDAG
  rationale: El genitivo especifica la arena como perteneciente al mar; ‘del mar’ mantiene esa relación genitiva sin suavizarla a una expresión más interpretativa como ‘junto al mar’.
theological_decisions:
- issue: Forma verbal y sujeto implícito/variante textual
  english_pob_reading: Main text follows the third-person reading, yielding 'And he stood on the sand of the sea.' A note preserves the first-person variant.
  chosen_spanish_reading: 'Main text: ''Y se puso sobre la arena del mar.'' Footnote preserves the first-person variant.'
  alternative_spanish_readings:
  - Y él se puso sobre la arena del mar.
  - Y yo me puse sobre la arena del mar.
  rationale: El testimonio griego impreso leído aquí es de tercera persona; el contexto inmediato favorece referirlo al dragón, pero existe una variante conocida en primera persona. En español conviene no resolver la tensión en el cuerpo del texto; por eso se mantiene una nota textual que registra la lectura alternativa sin desplazar el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; textual alternatives worth preserving should be footnoted.'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente griego de SBLGNT y con el audit trail inglés; se preserva la variante textual en nota, sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando corresponda al nombre divino; aquí no aparece.
  - Se evita ‘SEÑOR’ porque no hay κύριος en el texto.
  - ‘Arena’ se prefirió a ‘orilla’ para reflejar ἄμμος con mayor precisión léxica.
  - La nota textual conserva la primera persona como variante sin incorporarla al texto principal.
