  to: Y cuando el dragón vio que había sido arrojado a la tierra, persiguió[a] a la mujer que había dado a luz al hijo varón[b].
  rationale: Se revisa «al varón» a «al hijo varón» para conservar el énfasis de τὸν ἄρσενα con español natural, en línea con la justificación del inglés POB. También se corrige la nota de ἐδίωξεν para reflejar una alternativa semántica real y se precisa la nota sobre «el varón».
