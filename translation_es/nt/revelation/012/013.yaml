translation:
  language: es
  text: Y cuando el dragón vio que había sido arrojado a la tierra, persiguió[a] a la mujer que había dado a luz al hijo varón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persecutó a la mujer». El verbo griego puede significar tanto «perseguir» como «perseguir con hostilidad»; aquí probablemente incluye ambas ideas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «el varón». El español añade «hijo» para expresar el sentido de manera natural; compárese el lenguaje del contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: δράκων
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - serpiente
  lexicon: BDAG
  rationale: El término apocalíptico debe conservar la imagen de «dragón», como en el audit trail en inglés; «serpiente» suavizaría la figura y borraría la elección léxica documentada.
- source_word: ἐβλήθη
  english_pob_choice: had been thrown down
  chosen_spanish: había sido arrojado
  alternatives_spanish:
  - había sido echado
  - fue arrojado
  - había sido lanzado
  lexicon: BDAG
  rationale: El pasivo aoristo de βάλλω expresa expulsión violenta. «Había sido arrojado» mantiene el sentido pasivo y el aspecto de un hecho previo al ver del dragón, sin forzar una formulación demasiado literal o arcaica.
- source_word: εἰς τὴν γῆν
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - sobre la tierra
  - a la tierra/ al mundo
  lexicon: BDAG
  rationale: En el contexto cósmico de Apocalipsis, γῆ se refiere naturalmente a la tierra; en español «a la tierra» es la forma idiomática y conserva el contraste con el cielo.
- source_word: ἐδίωξεν
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - perseguía
  - acosó
  lexicon: BDAG
  rationale: διώκω puede significar «perseguir» o «perseguir con hostilidad/perseguir». «Persiguió» conserva el movimiento concreto y también permite el sentido hostil señalado en el inglés POB.
- source_word: γυναῖκα
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: La referencia simbólica debe permanecer abierta; «mujer» es la equivalencia directa y no interpreta su identidad en el texto principal.
- source_word: ἥτις
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: BDAG
  rationale: La relativa en español fluye naturalmente con «que» y conserva la función descriptiva sin añadir énfasis interpretativo.
- source_word: ἔτεκεν
  english_pob_choice: had given birth to
  chosen_spanish: había dado a luz a
  alternatives_spanish:
  - parió a
  - engendró
  lexicon: BDAG
  rationale: τίκτω significa «dar a luz / parir». «Había dado a luz a» es natural y respeta la relación temporal previa al verbo principal, como en el inglés auditado.
- source_word: τὸν ἄρσενα
  english_pob_choice: the male child
  chosen_spanish: al varón
  alternatives_spanish:
  - al hijo varón
  - al niño varón
  - al macho
  lexicon: BDAG
  rationale: El griego usa el sustantivo/adjetivo ἄρσην, literalmente «macho / varón». Dado que el inglés POB conserva la tensión de un sustantivo marcado por la maledad sin resolverla del todo, en español «al varón» preserva mejor esa fuerza que explicitar «niño» o «hijo». La preposición contraída «al» responde al acusativo con artículo.
theological_decisions:
- issue: Identidad simbólica de la mujer y del hijo
  english_pob_reading: Retain the literal-symbolic imagery 'the woman' and 'the male child' without interpretive expansion.
  chosen_spanish_reading: Mantener «la mujer» y «al varón» sin ampliar su identidad simbólica en el texto principal.
  alternative_spanish_readings:
  - la mujer como María
  - la mujer como Israel
  - la mujer como el pueblo de Dios/la iglesia
  rationale: El versículo pertenece al lenguaje apocalíptico simbólico y admite varias lecturas ortodoxas. La traducción no debe resolver esa cuestión interpretativa, sino dejarla abierta como hace el audit trail inglés.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios aplicados y el cruce de control indicó alto grado de acuerdo.'
  spanish_consistency_notes:
  - Se emplea «dragón» para δράκων, manteniendo la imagen apocalíptica documentada.
  - Se usa «tierra» para γῆ en coherencia con el contraste cósmico del pasaje.
  - «Persiguió» conserva la ambigüedad útil entre persecución concreta y hostilidad persecutoria.
  - Se evitó resolver la identidad simbólica de la mujer y del varón en el cuerpo principal.
  - La puntuación y el orden responden a español moderno, sin calco excesivo del inglés.
