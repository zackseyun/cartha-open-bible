translation:
  language: es
  text: Por tanto, regocíjense, oh cielos, y ustedes que habitan en ellos. ¡Ay de la tierra[a] y del mar, porque el diablo ha descendido a ustedes con gran furia[b], sabiendo que tiene[c] poco tiempo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el territorio y el mar'. El griego γῆ puede significar 'tierra' o 'territorio'; aquí se prefiere 'tierra' porque el contexto es de alcance cósmico.
    reason: lexical_alternative
  - marker: b
    text: O 'teniendo gran ira'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'tiene poco tiempo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Entonces
  lexicon: BDAG
  rationale: Expresa la inferencia lógica del contexto anterior con un giro natural en español y conserva la relación causal/consecutiva sin añadir contenido.
- source_word: εὐφραίνεσθε
  english_pob_choice: rejoice
  chosen_spanish: regocíjense
  alternatives_spanish:
  - alégrense
  - regocíjense y alégrense
  lexicon: BDAG
  rationale: Mantiene el imperativo plural y el tono elevado del llamado a gozo; 'regocijarse' comunica mejor la respuesta celebrativa que un mero 'alegrarse'.
- source_word: οἱ οὐρανοὶ
  english_pob_choice: O heavens
  chosen_spanish: oh cielos
  alternatives_spanish:
  - cielos
  - oh, cielos
  lexicon: BDAG
  rationale: El nominativo funciona como vocativo. 'Oh cielos' conserva la apostrofe y el registro solemne de Apocalipsis.
- source_word: οἱ ἐν αὐτοῖς σκηνοῦντες
  english_pob_choice: you who dwell in them
  chosen_spanish: ustedes que habitan en ellos
  alternatives_spanish:
  - los que habitan en ellos
  - ustedes que moran en ellos
  lexicon: BDAG
  rationale: '''σκηνοῦντες'' apunta aquí a residencia real en los cielos. ''Habitan'' es natural y fiel; ''ustedes'' conserva la segunda persona plural del llamado directo.'
- source_word: οὐαὶ
  english_pob_choice: Woe to
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - Ay de
  - ¡Ay de los
  lexicon: BDAG
  rationale: La fórmula profética de juicio se expresa con '¡Ay de', que reproduce el tono de amenaza y lamento del griego.
- source_word: τὴν γῆν καὶ τὴν θάλασσαν
  english_pob_choice: the earth and the sea
  chosen_spanish: la tierra y el mar
  alternatives_spanish:
  - la tierra y el océano
  - la tierra y el mar
  lexicon: BDAG
  rationale: Se sigue la decisión contextual de traducir γῆ como 'tierra' en un marco cósmico amplio, mientras θάλασσα se mantiene como 'mar'.
- source_word: κατέβη
  english_pob_choice: has come down
  chosen_spanish: ha descendido
  alternatives_spanish:
  - ha bajado
  - descendió
  lexicon: BDAG
  rationale: '''Ha descendido'' reproduce con dignidad el movimiento de arriba abajo y mantiene el matiz de llegada ya realizada con consecuencias presentes.'
- source_word: ὁ διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el diablo
  - Satanás
  lexicon: BDAG
  rationale: '''Diablo'' es el equivalente estándar y claro para el título personal en este contexto apocalíptico.'
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - contra ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: La preposición con acusativo expresa movimiento hacia el destinatario; en español 'a ustedes' preserva ese sentido sin forzar una lectura hostil que el griego no explicita por sí misma.
- source_word: ἔχων θυμὸν μέγαν
  english_pob_choice: with great fury
  chosen_spanish: con gran furia
  alternatives_spanish:
  - con gran ira
  - teniendo gran furia
  lexicon: BDAG
  rationale: '''θυμός'' expresa impulso intenso de ira/furia. ''Gran furia'' conserva la fuerza emocional y la vivacidad de la redacción inglesa auditada.'
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabe
  - ya que sabe
  lexicon: BDAG
  rationale: Participio circunstancial de conocimiento concomitante; 'sabiendo' resulta natural y mantiene la relación explicativa con la oración principal.
- source_word: ὀλίγον καιρὸν ἔχει
  english_pob_choice: he has only a little time
  chosen_spanish: le queda poco tiempo
  alternatives_spanish:
  - tiene poco tiempo
  - le queda un tiempo corto
  lexicon: BDAG
  rationale: '''καιρός'' aquí es un período limitado, no el concepto abstracto de tiempo. ''Le queda poco tiempo'' comunica la brevedad restante de manera idiomática y fiel al sentido.'
theological_decisions:
- issue: Alcance de 'los cielos' y sus habitantes
  english_pob_reading: Apostrophe to heaven and those dwelling in it.
  chosen_spanish_reading: Apostrofe directa a los cielos y a los que habitan en ellos.
  alternative_spanish_readings:
  - 'Lectura impersonal: ''los cielos y los que habitan en ellos'''
  - 'Lectura menos directa: ''cielos, y quienes habitan en ellos'''
  rationale: El griego usa nominativo con función vocativa; el español debe preservar el llamado directo para no diluir la escena retórica.
  doctrine_reference: Mantener la forma literaria apocalíptica sin suavizarla.
- issue: Sentido de 'la tierra y el mar' en el ay
  english_pob_reading: Earth rather than land, because the context is cosmic in scope.
  chosen_spanish_reading: '''La tierra y el mar'' como ámbito global, no como territorio local.'
  alternative_spanish_readings:
  - '''La tierra y el mar'' con posible matiz de ''tierra'' como territorio'
  - '''La tierra y el mar'' sin especificación del alcance'
  rationale: 'Se conserva la decisión contextual de la POB inglesa: γῆ se entiende en clave cósmica, por eso ''tierra'' comunica mejor la amplitud universal del juicio.'
  doctrine_reference: Evitar reducir el alcance del juicio a una zona geográfica.
- issue: Referente de 'a ustedes' en el descenso del diablo
  english_pob_reading: The address shifts from the heavenly rejoicers to the earth and sea.
  chosen_spanish_reading: '''A ustedes'' se refiere a la esfera terrenal representada por la tierra y el mar.'
  alternative_spanish_readings:
  - '''A ustedes'' continúa hablando a los cielos'
  - '''A ustedes'' es un vocativo general'
  rationale: La secuencia inmediata opone el júbilo celestial al ay sobre la tierra y el mar; por eso el destinatario más natural del descenso es la esfera terrenal, sin añadir explicación extra-textual.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y la auditoría inglesa sin depender mecánicamente de ella. Se conserva la estructura retórica del llamado a los cielos, el ay profético sobre la tierra y el mar, y la explicación final del breve período restante del diablo. No se detectaron revisiones posteriores que requirieran cambios.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando no aplica en este versículo; aquí no aparece el tetragrámaton.
  - Se mantuvo 'diablo' como equivalente claro de διάβολος, no 'Satanás', porque el griego usa el término común y la auditoría inglesa también lo fija así.
  - '''Gran furia'' se escogió por coherencia con el registro de Apocalipsis y con la nota alternativa ''gran ira''.'
  - '''Tierra'' se conservó como opción preferida por el alcance cósmico del contexto, en paralelo a la decisión inglesa para γῆ.'
  - Se preservó la segunda persona plural en 'ustedes' para reflejar el destinatario plural del griego.
