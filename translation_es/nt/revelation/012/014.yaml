    rationale: 'La coma corta innecesariamente una secuencia estrechamente unida en el original: ''into the wilderness to her place''. En español fluye mejor ''al desierto, a su lugar'' sin pausa fuerte, o mejor ''al desierto, a su lugar'' con menos segmentación; la formulación revisada conserva claridad con una sola coma o sin ella.'
