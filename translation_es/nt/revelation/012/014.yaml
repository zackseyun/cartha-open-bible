source:
  edition: SBLGNT
  text: καὶ ἐδόθησαν τῇ γυναικὶ ⸀αἱ δύο πτέρυγες τοῦ ἀετοῦ τοῦ μεγάλου, ἵνα πέτηται εἰς τὴν ἔρημον εἰς τὸν τόπον αὐτῆς, ⸂ὅπου τρέφεται⸃ ἐκεῖ καιρὸν καὶ καιροὺς καὶ ἥμισυ καιροῦ ἀπὸ προσώπου τοῦ ὄφεως.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/012/014.yaml
  text: And the woman was given the two wings of the great eagle[a], so that she might fly into the wilderness to her place, where she is nourished for a time and times and half a time[b], away from the presence of the serpent.
  footnotes:
  - marker: a
    text: Or, less commonly, 'the great vulture.' The Greek word can refer more broadly to a large bird of prey, though 'eagle' is the standard rendering here.
    reason: lexical_alternative
  - marker: b
    text: The expression 'a time and times and half a time' echoes Danielic apocalyptic language; many understand it as three and a half years, while others take it more broadly as a symbolically limited period.
    reason: cross_reference
  ai_draft:
    model_id: gpt-5.4
