translation:
  language: es
  text: Y se le dieron a la mujer las dos alas del gran águila[a], para que vuele al desierto, a su lugar, donde es alimentada por un tiempo y tiempos y medio tiempo[b], lejos de la presencia de la serpiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con menor frecuencia, «el gran buitre». La palabra griega puede referirse en sentido más amplio a una gran ave de rapiña, aunque «águila» es la traducción estándar aquí.
    reason: lexical_alternative
  - marker: b
    text: La expresión «un tiempo y tiempos y medio tiempo» evoca el lenguaje apocalíptico de Daniel; muchos la entienden como tres años y medio, mientras que otros la toman de manera más amplia como un período simbólicamente limitado.
    reason: cross_reference
lexical_decisions:
- source_word: ἐδόθησαν
  english_pob_choice: was given
  chosen_spanish: se le dieron
  alternatives_spanish:
  - le fueron dadas
  - fueron dadas
  lexicon: BDAG
  rationale: 'El griego usa pasivo plural, concordando con «las dos alas», pero en español suena más natural y fluido un dativo de interés con pasiva refleja: «se le dieron». Conserva el sentido de recepción sin forzar una construcción pesada.'
- source_word: τῇ γυναικί
  english_pob_choice: the woman
  chosen_spanish: a la mujer
  alternatives_spanish:
  - a la mujer
  lexicon: BDAG
  rationale: El dativo marca la destinataria de la acción; en español corresponde bien con «a la mujer». No hace falta explicitar más, porque el referente ya es claro en el contexto inmediato.
- source_word: αἱ δύο πτέρυγες
  english_pob_choice: the two wings
  chosen_spanish: las dos alas
  alternatives_spanish:
  - las dos plumas
  - las dos alas
  lexicon: BDAG
  rationale: πτέρυγες significa literalmente «alas». «Alas» es la equivalencia directa y natural en español.
- source_word: τοῦ ἀετοῦ τοῦ μεγάλου
  english_pob_choice: of the great eagle
  chosen_spanish: del gran águila
  alternatives_spanish:
  - del gran buitre
  - del gran ave de rapiña
  lexicon: BDAG
  rationale: Se mantiene «águila» como la opción estándar y mejor establecida. Aunque ἀετός puede abarcar un ave rapaz más amplia, la tradición bíblica y el contexto simbólico favorecen esta forma en la traducción principal.
- source_word: ἵνα πέτηται
  english_pob_choice: so that she might fly
  chosen_spanish: para que volara
  alternatives_spanish:
  - para que vuele
  - a fin de que volara
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. «Para que volara» transmite esa finalidad en español con un registro natural y sin añadir interpretación.
- source_word: εἰς τὴν ἔρημον
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al desierto
  - al yermo
  lexicon: BDAG
  rationale: ἔρημος puede significar «desierto» o «desierto/soledad/wilderness». Aquí «al desierto» funciona bien en español y conserva la idea de un lugar inhóspito; no se pierde el matiz bíblico de retiro y refugio, dado el contexto.
- source_word: εἰς τὸν τόπον αὐτῆς
  english_pob_choice: to her place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - a su lugar
  - a su propio lugar
  lexicon: BDAG
  rationale: El griego dice simplemente «a su lugar». Se evita importar de 12:6 la idea de un lugar «preparado». «A su lugar» respeta la sobriedad del original.
- source_word: ὅπου τρέφεται
  english_pob_choice: where she is nourished
  chosen_spanish: donde es sustentada
  alternatives_spanish:
  - donde es alimentada
  - donde es nutrida
  lexicon: BDAG
  rationale: τρέφω en pasivo indica cuidado continuo, provisión y mantenimiento. «Sustentada» comunica bien esa provisión sostenida en un registro digno; «alimentada» sería más literal pero algo limitado, y «nutrida» puede sonar demasiado estrecho o técnico.
- source_word: καιρὸν καὶ καιροὺς καὶ ἥμισυ καιροῦ
  english_pob_choice: a time and times and half a time
  chosen_spanish: un tiempo y tiempos y medio tiempo
  alternatives_spanish:
  - un tiempo, tiempos y medio tiempo
  - un tiempo y tiempos y medio tiempo
  lexicon: BDAG
  rationale: Se preserva el modismo apocalíptico sin interpretarlo cronológicamente en el texto principal. «Medio tiempo» refleja con fidelidad ἥμισυ καιροῦ y mantiene la resonancia con Daniel.
- source_word: ἀπὸ προσώπου τοῦ ὄφεως
  english_pob_choice: away from the presence of the serpent
  chosen_spanish: lejos de la presencia de la serpiente
  alternatives_spanish:
  - lejos del rostro de la serpiente
  - alejada de la serpiente
  lexicon: BDAG
  rationale: πρόσωπον puede significar «rostro» o «presencia». «Presencia» conserva el sentido concreto sin sonar extraño en español. «Serpiente» preserva la carga simbólica ya establecida en el capítulo.
theological_decisions:
- issue: Cómo tratar el período apocalíptico «καιρὸν καὶ καιροὺς καὶ ἥμισυ καιροῦ»
  english_pob_reading: Preserve the idiom untranslated as 'a time and times and half a time'
  chosen_spanish_reading: Preservar el modismo como «un tiempo y tiempos y medio tiempo»
  alternative_spanish_readings:
  - tres años y medio
  - un período simbólicamente limitado
  rationale: El texto griego emplea lenguaje apocalíptico ya cargado de resonancias con Daniel. Traducirlo a un valor cronológico explícito resolvería una cuestión interpretativa que el original deja abierta. La versión española conserva esa tensión.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Si debe explicitarse la imagen del águila como alusión interpretativa
  english_pob_reading: Retain 'the great eagle' without explanatory expansion
  chosen_spanish_reading: Mantener «el gran águila» sin expansión explicativa
  alternative_spanish_readings:
  - el gran águila, eco de la liberación divina
  - el gran águila, imagen de protección
  rationale: El verso no identifica de manera explícita el símbolo; añadir la interpretación en el texto principal iría más allá de lo que dice el griego. La traducción conserva la alusión sin incorporarla como explicación.
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del texto inglés que eliminó el redundante 'there' después de 'where she is nourished'; en español se evitó igualmente cualquier duplicación equivalente y se mantuvo una sintaxis natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde corresponde al Tetragrámaton en este proyecto; este versículo no lo contiene.
  - Se mantuvo «serpiente» y no «víbora» o «snake» para conservar la resonancia simbólica del capítulo.
  - Se eligió «sustentada» para evitar reducir τρέφεται a mera alimentación física.
  - Se prefirió la pasiva refleja «se le dieron» por naturalidad y por conservar el receptor explícito.
  - La puntuación y el orden de la frase buscan una lectura pública fluida sin perder la estructura del griego.
