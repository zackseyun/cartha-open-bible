revisions:
- from: Y el serpiente arrojó agua como un río desde su boca, detrás de la mujer[a], para hacer que fuera arrastrada por el río[b].
  to: Y la serpiente arrojó agua como un río de su boca tras la mujer[a], para hacer que fuera arrastrada por el río[b].
  rationale: Se corrige «el serpiente» a «la serpiente» por gramática y legibilidad naturales en español. Se cambia «detrás de la mujer» por «tras la mujer» para reflejar mejor la ambigüedad de ὀπίσω y alinearse con la decisión del POB inglés. Se sustituye «desde su boca» por «de su boca» para representar más directamente ἐκ. También se reescribe la nota sobre ποταμοφόρητον para evitar una glosa literal engañosa y explicar con mayor precisión el sentido de ser llevada/arrastrada por el río.
