base_translation:
  language: en
  yaml_path: translation/nt/revelation/012/015.yaml
  text: And the serpent hurled water like a river out of his mouth after the woman[b][a], so that he might cause her to be swept away by the river.
  footnotes:
  - marker: a
    text: Or 'behind the woman.' The Greek can be read spatially or as pursuit; here it is rendered 'after the woman' to fit the attack imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'that he might make her river-carried.' The expression means to cause her to be swept away by the torrent.
    reason: lexical_alternative
