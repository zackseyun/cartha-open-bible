translation:
  language: es
  text: Y la serpiente arrojó agua como un río de su boca tras la mujer[a], para hacer que fuera arrastrada por el río[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «detrás de la mujer». El griego puede leerse en sentido espacial o como persecución; aquí se vierte «tras la mujer» para conservar ambas posibilidades dentro de la imagen de ataque.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para hacerla llevada por el río». La expresión rara significa causar que sea arrastrada por la corriente del río.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλεν
  english_pob_choice: hurled
  chosen_spanish: arrojó
  alternatives_spanish:
  - lanzó
  - tiró
  - echó
  lexicon: BDAG
  rationale: βάλλω expresa una acción violenta de echar/lanzar. En español, «arrojó» conserva la fuerza hostil del verbo en este cuadro apocalíptico sin volverse demasiado técnico o arcaizante.
- source_word: ὁ ὄφις
  english_pob_choice: the serpent
  chosen_spanish: el serpiente
  alternatives_spanish:
  - la serpiente
  - la culebra
  lexicon: BDAG
  rationale: El referente simbólico de Apocalipsis se mantiene mejor con «serpiente». Se conserva el artículo masculino en concordancia con el género gramatical del referente simbólico masculino del contexto, aunque en español común la forma léxica esperable sería «la serpiente».
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: out of his mouth
  chosen_spanish: desde su boca
  alternatives_spanish:
  - de su boca
  - fuera de su boca
  lexicon: BDAG
  rationale: «Desde su boca» transmite bien el origen del agua y su proyección hacia afuera con un español natural y vívido.
- source_word: ὀπίσω τῆς γυναικός
  english_pob_choice: after the woman
  chosen_spanish: detrás de la mujer
  alternatives_spanish:
  - tras la mujer
  - después de la mujer
  lexicon: BDAG
  rationale: La frase griega admite valor espacial o de persecución. En español, «detrás de la mujer» preserva la imagen espacial y deja abierta la idea de persecución implícita en el contexto, sin imponer una interpretación dinámica en el cuerpo del texto.
- source_word: ὕδωρ ὡς ποταμόν
  english_pob_choice: water like a river
  chosen_spanish: agua como un río
  alternatives_spanish:
  - agua como torrente
  - agua como una corriente
  lexicon: BDAG
  rationale: Se conserva la comparación explícita con ὡς. «Río» reproduce el sustantivo del original y evita sustituirlo por una lectura interpretativa como «torrente» o «inundación».
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: La conjunción final de propósito se expresa de manera natural en español con «para que», manteniendo el valor teleológico del griego.
- source_word: ποταμοφόρητον ποιήσῃ
  english_pob_choice: cause her to be swept away by the river
  chosen_spanish: fuera arrastrada por el río
  alternatives_spanish:
  - fuera llevada por el río
  - fuera arrastrada por la corriente
  - fuera llevada por la corriente
  lexicon: BDAG
  rationale: El adjetivo raro ποταμοφόρητος comunica la idea de ser llevado por un río. En español, «fuera arrastrada por el río» conserva la violencia del movimiento y la imagen fluvial sin añadir la interpretación de muerte o ahogamiento.
theological_decisions:
- issue: Tratamiento del lenguaje simbólico del ataque del serpiente
  english_pob_reading: Retain the imagery literally as 'water like a river' and 'cause her to be swept away by the river' without decoding the symbol in translation.
  chosen_spanish_reading: Conservar la imaginería del agua y del río sin identificarla en el texto como ejércitos, mentiras o persecución concreta.
  alternative_spanish_readings:
  - Interpretar el agua como persecución, ejércitos o inundación simbólica en el texto principal.
  - Reemplazar «río» por «inundación» para explicitar el sentido.
  rationale: El pasaje es apocalíptico y simbólico, pero la traducción debe preservar la imagen fuente para no imponer una interpretación única. La explicación queda para notas o comentario, no para el cuerpo del versículo.
  doctrine_reference: Poética apocalíptica y principio de equivalencia óptima del POB
- issue: Ambigüedad de ὀπίσω τῆς γυναικός
  english_pob_reading: after the woman
  chosen_spanish_reading: detrás de la mujer
  alternative_spanish_readings:
  - tras la mujer
  - después de la mujer
  rationale: La frase puede leerse espacialmente o como persecución. «Detrás de la mujer» conserva esa ambigüedad sin forzar el matiz procesional de «después» ni la explicación interpretativa en el texto principal.
  doctrine_reference: Decisión léxica contextual basada en el griego de Apocalipsis 12:15
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que afinó la cláusula final para reflejar con más precisión ποταμοφόρητον ποιήσῃ, evitando una paráfrasis interpretativa excesiva. Por eso el español mantiene la imagen de ser arrastrada por el río y no introduce «ahogada» ni «inundación» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «río» en vez de «inundación» para respetar la imaginería del original.
  - Se eligió un verbo de violencia («arrojó») para βάλλω, coherente con el tono del pasaje.
  - Se conservó la ambigüedad de ὀπίσω con una nota breve, ya que el griego permite lectura espacial o de persecución.
  - Se evitó «Cristo» u otra terminología confesional ajena al verso; no aplica aquí.
  - La redacción busca ser publicable en español latinoamericano, con tono bíblico moderno y digno.
