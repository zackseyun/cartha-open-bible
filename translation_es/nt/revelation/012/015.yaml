review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en general la imagen apocalíptica del griego: el serpiente arroja agua como un río desde su boca con el propósito de que la mujer sea llevada por el río. Sin embargo, hay varios desajustes importantes con respecto al texto fuente y al rastro de auditoría inglés: (1) «el serpiente» es gramaticalmente anómalo en español y no está justificado por el griego, que no exige masculinizar el sustantivo español; (2) el texto principal usa «detrás de la mujer», mientras que el POB inglés decidió «after the woman» por su matiz de persecución/ataque; en español «tras la mujer» preserva mejor esa doble posibilidad que «detrás de»; (3) el cuerpo del texto dice «desde su boca», pero «de su boca» o «fuera de su boca» refleja mejor ἐκ; (4) la nota b actual explica mal el literal, porque «portadora de río» no corresponde bien a ποταμοφόρητον.'
  spanish_quality_summary: 'La frase es mayormente comprensible, pero contiene un problema claro de naturalidad y corrección con «el serpiente». Además, «detrás de la mujer» suena más rígidamente espacial de lo que conviene al contexto. El resto del verso puede pulirse para sonar más natural y fiel: «de su boca» es más idiomático aquí, y «hacer que fuera arrastrada» puede simplificarse levemente manteniendo el sentido causativo.'
  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. «Serpiente» coincide con ὄφις y con la preferencia simbólica del POB. «Río» preserva ποταμός correctamente. No aparecen términos como Yahvé/Mesías/esclavo que activen defaults mayores. La principal cuestión léxica es usar la forma española normal «la serpiente» y una nota/alternativa que refleje la ambigüedad de ὀπίσω sin sesgarla indebidamente hacia un valor puramente espacial.
  issues:
  - severity: high
    issue: Uso de «el serpiente» en el texto principal
    rationale: En español estándar y eclesial se dice «la serpiente». El griego usa artículo masculino porque ὄφις es masculino, pero eso no obliga a violar la gramática natural del español. Mantener «el serpiente» perjudica la legibilidad y no aporta fidelidad real.
  - severity: medium
    issue: «detrás de la mujer» carga demasiado el sentido espacial de ὀπίσω
    rationale: El expediente inglés optó por «after the woman» por el contexto de persecución/ataque, preservando a la vez una nota con «behind». En español, «tras la mujer» conserva mejor la ambigüedad entre seguimiento y ubicación espacial que «detrás de la mujer».
  - severity: medium
    issue: «desde su boca» es menos exacto que «de su boca» para ἐκ
    rationale: ἐκ marca procedencia/salida. «Desde» puede funcionar, pero «de su boca» es la opción más directa, idiomática y cercana al original en este contexto.
  - severity: medium
    issue: La nota b explica de forma inadecuada el literal de ποταμοφόρητον
    rationale: «Portadora de río» no representa bien la formación y el sentido del adjetivo griego. Conviene explicar algo como «llevada por el río» o «arrastrada por el río/corriente», que refleja mejor la idea de ser transportada por una corriente.
  revised_spanish_text: Y la serpiente arrojó agua como un río de su boca tras la mujer[a], para hacer que fuera arrastrada por el río[b].
  revised_footnotes:
  - marker: a
    text: O «detrás de la mujer». El griego puede leerse en sentido espacial o como persecución; aquí se vierte «tras la mujer» para conservar ambas posibilidades dentro de la imagen de ataque.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para hacerla llevada por el río». La expresión rara significa causar que sea arrastrada por la corriente del río.
    reason: lexical_alternative
  revision_rationale: Se corrige «el serpiente» a «la serpiente» por gramática y legibilidad naturales en español. Se cambia «detrás de la mujer» por «tras la mujer» para reflejar mejor la ambigüedad de ὀπίσω y alinearse con la decisión del POB inglés. Se sustituye «desde su boca» por «de su boca» para representar más directamente ἐκ. También se reescribe la nota sobre ποταμοφόρητον para evitar una glosa literal engañosa y explicar con mayor precisión el sentido de ser llevada/arrastrada por el río.
