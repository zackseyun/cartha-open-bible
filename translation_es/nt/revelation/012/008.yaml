    rationale: El expediente inglés dejó «he did not prevail» como alternativa en nota y prefirió «he was not strong enough» para conservar más explícitamente la fuerza léxica de ἰσχύω en contexto de combate. En español, «no fue lo bastante fuerte» o equivalente refleja mejor esa prioridad, dejando «no pudo prevalecer»/«no prevaleció» como variante.
  revised_spanish_text: Pero no fue lo bastante fuerte[a], ni se halló ya lugar para ellos en el cielo.
