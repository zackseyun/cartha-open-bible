translation:
  language: es
  text: Pero no fue lo bastante fuerte[a], ni se halló ya lugar para ellos en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no prevaleció». El verbo griego puede significar ser fuerte, poder o prevalecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  lexicon: BDAG
  rationale: En este contexto narrativo y de contraste tras la lucha, καί funciona con valor adversativo; «Pero» refleja mejor el giro discursivo que un simple enlace aditivo.
- source_word: οὐκ ἴσχυσεν
  english_pob_choice: he was not strong enough
  chosen_spanish: no pudo prevalecer
  alternatives_spanish:
  - no fue lo bastante fuerte
  - no fue capaz
  - no prevaleció
  lexicon: BDAG
  rationale: ἰσχύω puede significar ser fuerte, tener poder, poder o prevalecer. En español, «no pudo prevalecer» conserva la idea de derrota en combate y encaja bien con el contexto inmediato, sin perder la fuerza del verbo.
- source_word: οὐδὲ
  english_pob_choice: and
  chosen_spanish: ni
  alternatives_spanish:
  - y no
  - ni tampoco
  lexicon: BDAG
  rationale: Después de una cláusula negativa, «ni» expresa de forma natural la coordinación negativa y mantiene la relación con la primera proposición.
- source_word: τόπος
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - puesto
  - sitio
  lexicon: BDAG
  rationale: τόπος aquí designa ubicación o espacio disponible; «lugar» es la opción más directa y natural en español.
- source_word: εὑρέθη
  english_pob_choice: there was found
  chosen_spanish: se halló
  alternatives_spanish:
  - fue hallado
  - se encontró
  lexicon: BDAG
  rationale: La pasiva aorista de εὑρίσκω se refleja bien con una pasiva refleja en español. «Se halló» conserva el resultado de que ya no quedó lugar disponible, y evita una construcción demasiado pesada.
- source_word: αὐτῶν
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - de ellos
  - para éstos
  lexicon: BDAG
  rationale: 'El genitivo plural se entiende idiomáticamente como destinativo en esta construcción: no quedó lugar disponible para el dragón y sus ángeles.'
- source_word: ἔτι
  english_pob_choice: no longer
  chosen_spanish: ya
  alternatives_spanish:
  - todavía
  - aún
  lexicon: BDAG
  rationale: Con negación, ἔτι adquiere sentido de discontinuidad temporal; «ya» comunica que ese lugar dejó de existir para ellos. En combinación con la negación implícita de la cláusula, produce «ya no».
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en el ámbito celestial
  lexicon: BDAG
  rationale: En Apocalipsis, οὐρανός remite al ámbito celestial. «Cielo» es la opción más natural y transparente en español; se evita «el cielo» como simple firmamento porque aquí el referente es el ámbito divino.
theological_decisions:
- issue: Referente del sujeto singular y del pronombre plural
  english_pob_reading: The singular verb refers back to the dragon; the plural pronoun refers to the dragon and his angels collectively.
  chosen_spanish_reading: 'Mantener un sujeto singular implícito en la primera cláusula y un referente plural en la segunda: «no pudo prevalecer… para ellos».'
  alternative_spanish_readings:
  - «no pudieron prevalecer… para ellos»
  - «no pudo prevalecer… para él»
  rationale: El griego conserva un verbo singular con referente singular del v. 7, y luego un pronombre plural para el conjunto. La redacción española respeta esa tensión gramatical sin aplanarla a un plural general.
  doctrine_reference: Apocalipsis 12:7–8; BDAG, ἰσχύω
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que pasó de una paráfrasis más suelta («there was no longer any place») a una formulación más cercana a εὑρέθη («was found»). Por eso el español usa una pasiva refleja breve («se halló») y conserva la estructura negativa coordinada del griego.
  spanish_consistency_notes:
  - Se mantiene «cielo» para οὐρανός en sentido celestial, sin ocultar el referente al ámbito divino.
  - Se preserva la singularidad implícita del sujeto de la primera cláusula, siguiendo el flujo del contexto inmediato.
  - «Prevalecer» equilibra la fuerza de ἰσχύω con una formulación natural en español bíblico contemporáneo.
