review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: una gran señal aparece en el cielo y se describe a la mujer con el sol, la luna bajo sus pies y una corona de doce estrellas. Sin embargo, la nota al pie está anclada en «vestida»/περιβεβλημένη, mientras que la auditoría inglesa preserva la nota léxica en στέφανος. Además, «vestida del sol» es menos natural y menos fiel al matiz de «clothed with the sun» que «vestida con el sol» o «envuelta en el sol».'
  spanish_quality_summary: El texto es legible y digno, pero «vestida del sol» suena forzado en español general. «Vestida con el sol» conserva mejor la imagen y fluye con más naturalidad. También conviene alinear la nota con «corona», porque el matiz distintivo de στέφανος frente a diadema es una decisión léxica importante ya documentada por POB.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Señal», «cielo», «mujer» y «corona» son adecuados. La principal desalineación está en la gestión de στέφανος: la nota española actual comenta περιβεβλημένη en lugar de preservar la nota léxica documentada sobre στέφανος.'
  issues:
  - severity: medium
    issue: La nota al pie está colocada en «vestida» en vez de «corona».
    rationale: La auditoría inglesa documenta una nota léxica sobre στέφανος, no sobre περιβεβλημένη. Desplazar la nota altera qué decisión léxica se preserva para el lector.
  - severity: medium
    issue: «Vestida del sol» es poco natural y menos clara en español.
    rationale: Aunque intenta reflejar la cercanía del griego, en español amplio suena forzado. «Vestida con el sol» o «envuelta en el sol» comunica mejor la imagen sin perder fidelidad.
  - severity: low
    issue: Se pierde la distinción explícita entre στέφανος y una diadema real en la nota actual.
    rationale: La nota española actual explica el participio περιβεβλημένη, pero no conserva la aclaración importante de que στέφανος no es una diadema real.
  revised_spanish_text: 'Y apareció en el cielo una gran señal: una mujer vestida con el sol, y la luna debajo de sus pies, y sobre su cabeza una corona[a] de doce estrellas,'
  revised_footnotes:
