translation:
  language: es
  text: 'Y apareció en el cielo una gran señal: una mujer vestida con el sol, y la luna debajo de sus pies, y sobre su cabeza una corona[a] de doce estrellas,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una guirnalda» o «una corona de vencedor»; la palabra griega es στέφανος, distinta de una diadema real.
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - portento
  lexicon: BDAG
  rationale: En Apocalipsis, σημεῖον suele introducir una imagen visionaria simbólica. «Señal» mantiene ese valor apocalíptico en español sin convertirlo en una interpretación específica.
- source_word: μέγα
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - gran
  - magnífica
  lexicon: BDAG
  rationale: «Grande» reproduce de forma natural la amplitud e importancia del término sin añadir matices ajenos al texto.
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue vista
  - se hizo visible
  lexicon: BDAG
  rationale: El pasivo griego se expresa idiomáticamente en español como «apareció», conservando la idea de manifestación visible en una visión.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en el firmamento
  lexicon: BDAG
  rationale: Dado el contexto visionario de Apocalipsis, «cielo» es una opción natural en español y mantiene la ambigüedad reverente de οὐρανός sin forzar «firmamento».
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: El texto presenta una figura simbólica femenina, no una esposa; «mujer» es la equivalencia directa y más neutral.
- source_word: περιβεβλημένη τὸν ἥλιον
  english_pob_choice: clothed with the sun
  chosen_spanish: vestida del sol
  alternatives_spanish:
  - vestida con el sol
  - envuelta en el sol
  lexicon: BDAG
  rationale: «Vestida» expresa el participio perfecto de περιβάλλω con naturalidad en español; «del sol» conserva la relación inmediata con el sustantivo sin recargar la frase.
- source_word: ἡ σελήνη ὑποκάτω τῶν ποδῶν αὐτῆς
  english_pob_choice: the moon under her feet
  chosen_spanish: la luna debajo de sus pies
  alternatives_spanish:
  - la luna bajo sus pies
  - la luna bajo sus plantas
  lexicon: BDAG
  rationale: «Debajo de sus pies» reproduce con claridad la imagen espacial de ὑποκάτω y suena natural en español moderno.
- source_word: στέφανος
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - corona de vencedor
  lexicon: BDAG
  rationale: «Corona» es la traducción principal más transparente en español; mantiene abierta la tensión entre corona real y corona de vencedor sin resolverla aquí.
- source_word: ἀστέρων δώδεκα
  english_pob_choice: of twelve stars
  chosen_spanish: de doce estrellas
  alternatives_spanish:
  - con doce estrellas
  - formada por doce estrellas
  lexicon: BDAG
  rationale: La construcción posesiva se traslada de forma directa como «de doce estrellas», conservando la imagen sin añadir explicación interpretativa.
theological_decisions:
- issue: Identidad simbólica de la mujer
  english_pob_reading: No identification supplied in the translation; the text is rendered descriptively as a visionary sign.
  chosen_spanish_reading: No se identifica a la mujer en la traducción; se presenta descriptivamente como una señal visionaria.
  alternative_spanish_readings:
  - Israel
  - María
  - el pueblo de Dios
  - la iglesia
  rationale: El versículo ofrece imaginería simbólica, pero no identifica explícitamente a la mujer. Se preserva la tensión teológica sin imponer una lectura confesional que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de manera interpretativa.
- issue: στέφανος y su posible sentido de corona de vencedor
  english_pob_reading: Or 'a wreath' or 'a victor's crown'; the Greek word is στέφανος, distinct from a royal diadem.
  chosen_spanish_reading: «Corona» en el texto principal, con la posibilidad de «guirnalda» o «corona de vencedor» reservada en nota.
  alternative_spanish_readings:
  - guirnalda
  - corona de vencedor
  - diadema real
  rationale: En español, «corona» comunica con claridad la imagen principal. La nota preserva la tensión léxica entre un adorno victorioso y una corona regia, evitando equiparar στέφανος con διαδήμα sin base textual.
  doctrine_reference: Diferenciar στέφανος de διάδημα conforme al valor léxico del griego.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente griego y el criterio auditado de la POB inglesa: mantiene el valor visionario de σημεῖον, la no identificación de la mujer y la diferencia entre στέφανος y una corona real. La principal adaptación al español es usar construcciones naturales («apareció», «en el cielo», «vestida del sol») sin perder la literalidad controlada del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «corona» como equivalente general de στέφανος y se deja la precisión léxica en nota.
  - Se conserva el registro bíblico moderno y solemne, evitando arcaísmos innecesarios.
  - La frase «vestida del sol» respeta la metáfora sin reescribirla como paráfrasis interpretativa.
