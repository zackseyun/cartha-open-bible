    text: O «estalló la guerra» o «surgió guerra en el cielo».
    reason: lexical_alternative
  - marker: b
    text: 'O, más formalmente: «Miguel y sus ángeles, para combatir contra el dragón», con el griego usando un infinitivo articular para expresar la acción o propósito.'
    reason: lexical_alternative
  - marker: c
    text: 'O de forma más natural en español: «el dragón y sus ángeles combatieron».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para preservar mejor la evidencia griega y la auditoría inglesa: se añade la nota sobre el infinitivo articular, se refleja la alternativa estructural de la segunda cláusula, y se mantiene la coma final en continuidad con el v. 8. El español revisado sigue siendo natural y eclesialmente legible, pero ahora documenta con más fidelidad las decisiones léxicas del POB.'
