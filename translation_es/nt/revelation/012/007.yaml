  text: Καὶ ἐγένετο πόλεμος ἐν τῷ οὐρανῷ, ὁ Μιχαὴλ καὶ οἱ ἄγγελοι αὐτοῦ ⸀τοῦ πολεμῆσαι μετὰ τοῦ δράκοντος. καὶ ὁ δράκων ἐπολέμησεν καὶ οἱ ἄγγελοι αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/012/007.yaml
  text: 'And war broke out in heaven: Michael and his angels fought against the dragon[a]. And the dragon and his angels fought back[c][b],'
