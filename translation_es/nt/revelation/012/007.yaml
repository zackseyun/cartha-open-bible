translation:
  language: es
  text: 'Y hubo guerra[a] en el cielo: Miguel y sus ángeles combatieron[b] contra el dragón. Y el dragón combatió[c], y sus ángeles,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estalló la guerra» o «surgió guerra en el cielo».
    reason: lexical_alternative
  - marker: b
    text: 'O, más formalmente: «Miguel y sus ángeles, para combatir contra el dragón», con el griego usando un infinitivo articular para expresar la acción o propósito.'
    reason: lexical_alternative
  - marker: c
    text: 'O de forma más natural en español: «el dragón y sus ángeles combatieron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο πόλεμος
  english_pob_choice: war broke out
  chosen_spanish: hubo guerra
  alternatives_spanish:
  - estalló la guerra
  - se desató una guerra
  - hubo una guerra
  lexicon: BDAG
  rationale: El griego con γίνομαι + sustantivo expresa el surgimiento del hecho. En español, «hubo guerra» mantiene ese valor de acontecimiento sin volver la frase pesada o demasiado interpretativa; «estalló la guerra» sería más idiomático pero agrega una imagen de irrupción que no está explícita en el texto.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en el cielo mismo
  lexicon: BDAG
  rationale: Aquí οὐρανός refiere al ámbito celestial. «En el cielo» es la forma natural en español y preserva el sentido del reino celestial sin introducir una aclaración innecesaria.
- source_word: Μιχαὴλ
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Micael
  lexicon: convención onomástica estándar
  rationale: El nombre propio se adapta a la forma recibida en español bíblico, «Miguel», que es clara y reconocible para la lectura eclesial en español.
- source_word: ἄγγελοι αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - los ángeles de él
  lexicon: BDAG
  rationale: El posesivo español reproduce de modo directo la relación de pertenencia/asociación entre Miguel y los ángeles que están con él.
- source_word: τοῦ πολεμῆσαι μετὰ τοῦ δράκοντος
  english_pob_choice: fought against the dragon
  chosen_spanish: combatieron contra el dragón
  alternatives_spanish:
  - lucharon contra el dragón
  - pelearon contra el dragón
  - para combatir contra el dragón
  lexicon: BDAG
  rationale: La construcción articular infinitiva expresa propósito o resultado vinculado con la aparición de Miguel y sus ángeles. En español, la acción se vierte de forma natural con un verbo finito dentro de la narración. «Combatieron contra» conserva la hostilidad y la relación adversativa mejor que un simple «con».
- source_word: δράκοντος / δράκων
  english_pob_choice: the dragon
  chosen_spanish: el dragón
  alternatives_spanish:
  - el monstruo
  - el dragón monstruoso
  lexicon: BDAG
  rationale: «Dragón» corresponde al término apocalíptico y mantiene la imaginería del pasaje sin suavizarla.
- source_word: ἐπολέμησεν
  english_pob_choice: fought back
  chosen_spanish: combatieron
  alternatives_spanish:
  - pelearon
  - lucharon
  - hicieron guerra
  lexicon: BDAG
  rationale: El segundo miembro del versículo retoma el combate del dragón y sus ángeles. En español, la repetición de «combatieron» conserva el paralelismo y el avance recíproco del conflicto. Se evita una expansión explicativa que el griego no exige.
- source_word: καὶ οἱ ἄγγελοι αὐτοῦ
  english_pob_choice: and his angels
  chosen_spanish: y sus ángeles
  alternatives_spanish:
  - y los ángeles de él
  lexicon: BDAG
  rationale: La segunda mitad repite la estructura posesiva para mantener el paralelismo entre Miguel y el dragón, cada uno con sus ángeles.
theological_decisions:
- issue: Identidad y estatus de Miguel
  english_pob_reading: Render simply as the personal name 'Michael' without interpretive expansion.
  chosen_spanish_reading: Se traduce solo como el nombre propio «Miguel», sin identificarlo como arcángel ni cargarlo con una interpretación cristológica.
  alternative_spanish_readings:
  - Miguel, el arcángel
  - Miguel como figura cristológica
  rationale: El versículo nombra a Miguel, pero no especifica aquí su rango ni lo identifica con Cristo. La traducción conserva esa tensión teológica y evita introducir una explicación doctrinal que el texto no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Valor narrativo del conflicto
  english_pob_reading: And war broke out in heaven ... And the dragon and his angels fought back.
  chosen_spanish_reading: Y hubo guerra en el cielo ... Y el dragón y sus ángeles combatieron.
  alternative_spanish_readings:
  - Y estalló la guerra en el cielo ...
  - Y el dragón y sus ángeles se defendieron.
  rationale: Se mantiene el carácter de conflicto abierto y recíproco del relato sin convertir la escena en una descripción meramente alegórica o atenuada. «Combatieron» preserva la simultaneidad del choque entre ambos bandos.
  doctrine_reference: Lectura narrativa del conflicto celestial en Apocalipsis 12
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de POB con equivalencia óptima. Para el español se ajustó el orden y la verbalización para evitar una construcción artificial del infinitivo griego, manteniendo el paralelismo entre Miguel y el dragón. No se añadió nota separada para el infinitivo articular porque la solución española ya integra su sentido en el verbo finito; la tensión sobre el estatus de Miguel quedó preservada sin expansión interpretativa.
  spanish_consistency_notes:
  - Se prefirió «en el cielo» para οὐρανός en sentido celestial, conforme al uso estándar y al criterio POB.
  - Se mantuvo «dragón» en ambas mitades del versículo para preservar el paralelismo y la imaginería apocalíptica.
  - Se eligió «combatieron» para reproducir el campo semántico de πολεμέω sin endurecerlo en un giro demasiado técnico o militarista.
  - Se evitó «SEÑOR», «Cristo» u otras terminologías no presentes en el pasaje.
  - Los marcadores de nota se aplican solo donde hay alternativas reales de traducción.
