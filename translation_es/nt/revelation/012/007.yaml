review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del versículo y mantiene correctamente «Miguel», «sus ángeles» y «el dragón». Sin embargo, no preserva por completo la evidencia y la auditoría inglesa en dos puntos: (1) omite la nota sobre el infinitivo articular τοῦ πολεμῆσαι, que el POB inglés documenta explícitamente; y (2) el segundo miembro reordena el griego («Y el dragón y sus ángeles combatieron») en vez de conservar mejor la secuencia «el dragón combatió, y sus ángeles», al menos mediante una nota. Además, la nota [a] actual no incluye la alternativa más cercana al inglés auditado («hubo guerra» / «se produjo guerra»), sino solo opciones más dinámicas.'
  spanish_quality_summary: 'El español es claro y legible, de registro moderno y digno. «Combatieron contra» suena natural, aunque «lucharon contra» también sería posible. El problema principal no es de estilo sino de completitud editorial: faltan una nota léxica relevante y una mejor correspondencia entre los marcadores de nota y las alternativas documentadas. También conviene evitar cerrar la oración con punto cuando el griego y el inglés mantienen coma por continuidad al v. 8.'
  glossary_alignment: No hay conflicto con la terminología de proyecto. No aparece Yahvé, Mesías, δοῦλος, etc. «Miguel», «ángeles», «dragón» y «cielo» están bien alineados. La decisión de no expandir teológicamente a Miguel también está correctamente preservada.
  issues:
  - severity: medium
    issue: Falta la nota correspondiente al infinitivo articular τοῦ πολεμῆσαι
    rationale: El POB inglés conserva una nota importante sobre la construcción griega «más formalmente, Michael and his angels to fight against the dragon». El borrador español no preserva esa decisión auditada, y debería reflejarla con una nota española natural.
  - severity: medium
    issue: La segunda cláusula pierde una alternativa estructural importante del griego
    rationale: El texto español dice «Y el dragón y sus ángeles combatieron», pero el inglés auditado añadió nota para la lectura más literal «the dragon fought, and his angels». Esa alternativa debe conservarse también en español, y la puntuación debería dejar abierta la continuidad al siguiente versículo.
  - severity: low
    issue: La nota [a] no refleja bien la alternativa inglesa principal
    rationale: La auditoría inglesa ofrece «there was war» y «war arose in heaven». La nota española actual propone solo opciones más dinámicas («estalló», «se desató»), que no corresponden tan de cerca al abanico documentado.
  revised_spanish_text: 'Y hubo guerra[a] en el cielo: Miguel y sus ángeles combatieron[b] contra el dragón. Y el dragón combatió[c], y sus ángeles,'
  revised_footnotes:
