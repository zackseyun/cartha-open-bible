translation:
  language: es
  text: Y fue arrojado el gran dragón—la serpiente antigua, el que es llamado Diablo y Satanás, el que engaña[a] a todo el mundo. Fue arrojado a la tierra[b], y sus ángeles fueron arrojados con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que extravía a todo el mundo»; también puede entenderse «al mundo entero» o «a toda la tierra habitada».'
    reason: lexical_alternative
  - marker: b
    text: La imagen de la «serpiente antigua» evoca Génesis 3.
    reason: cross_reference
lexical_decisions:
- source_word: ἐβλήθη / ἐβλήθησαν
  english_pob_choice: was thrown down / were thrown down
  chosen_spanish: fue arrojado / fueron arrojados
  alternatives_spanish:
  - fue echado / fueron echados
  - fue lanzado / fueron lanzados
  lexicon: βάλλω
  rationale: El verbo pasivo expresa expulsión violenta hacia abajo. En español, «arrojado» conserva esa fuerza y mantiene la repetición verbal del verso mejor que opciones más suaves.
- source_word: δράκων ὁ μέγας
  english_pob_choice: the great dragon
  chosen_spanish: el gran dragón
  alternatives_spanish:
  - el dragón grande
  - el gran monstruo-dragón
  lexicon: δράκων
  rationale: «Dragón» reproduce el imaginario apocalíptico. «Gran» sigue bien el adjetivo sin introducir matices extra.
- source_word: ὁ ὄφις ὁ ἀρχαῖος
  english_pob_choice: the ancient serpent
  chosen_spanish: la serpiente antigua
  alternatives_spanish:
  - la serpiente vieja
  - la serpiente primordial
  lexicon: ὄφις / ἀρχαῖος
  rationale: «Serpiente» es el equivalente natural y bíblico de ὄφις; «antigua» conserva la idea de antigüedad/origen sin sobreinterpretar. Se mantiene la alusión a Génesis 3 implícita en la expresión.
- source_word: ὁ καλούμενος
  english_pob_choice: the one called
  chosen_spanish: el que es llamado
  alternatives_spanish:
  - el llamado
  - el que llaman
  lexicon: καλέω
  rationale: La perífrasis «el que es llamado» refleja el participio con claridad en apposición a los títulos anteriores.
- source_word: Διάβολος
  english_pob_choice: the Devil
  chosen_spanish: Diablo
  alternatives_spanish:
  - el Diablo
  - calumniador
  lexicon: Διάβολος
  rationale: En español, «Diablo» funciona como nombre/título reconocido y evita una traducción semántica demasiado explicativa. Se conserva la forma nominal tradicional y comprensible.
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: Σατανᾶς
  rationale: Se translitera el nombre/título como forma estable en español, conforme al tratamiento de nombres propios en el texto fuente.
- source_word: ὁ πλανῶν
  english_pob_choice: who deceives
  chosen_spanish: el que engaña
  alternatives_spanish:
  - el que extravía
  - el que desvía
  lexicon: πλανάω
  rationale: «Engaña» es la opción más natural y directa en español para la función activa de πλανάω en este contexto cósmico. «Extraviar/desviar» conservarían más literalmente la idea de hacer errar, pero suenan menos fluidas.
- source_word: τὴν οἰκουμένην ὅλην
  english_pob_choice: the whole world
  chosen_spanish: a todo el mundo
  alternatives_spanish:
  - al mundo entero
  - a toda la tierra habitada
  lexicon: οἰκουμένη
  rationale: La frase griega tiene alcance universal; «todo el mundo» comunica bien ese alcance en español. Aunque οἰκουμένη puede ser «tierra habitada», esa precisión no es necesaria en el texto principal.
- source_word: εἰς τὴν γῆν
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra
  - al suelo
  lexicon: γῆ
  rationale: «Tierra» reproduce con naturalidad el contraste entre el ámbito celestial y el terrenal. En español bíblico puede sonar más fluido que «a la tierra» en una construcción pasiva, pero se mantiene la literalidad básica del movimiento.
- source_word: οἱ ἄγγελοι αὐτοῦ
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus mensajeros
  lexicon: ἄγγελος
  rationale: En contexto apocalíptico, se trata de seres celestiales asociados al dragón; «ángeles» es el equivalente correcto y evita diluir la referencia.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: μετά
  rationale: «Con él» es la forma más natural y directa en español para la compañía o acompañamiento indicado por la preposición.
theological_decisions:
- issue: Identificación del dragón mediante títulos en apposición
  english_pob_reading: the one called the Devil and Satan
  chosen_spanish_reading: el que es llamado Diablo y Satanás
  alternative_spanish_readings:
  - llamado Diablo y Satanás
  - el Diablo y Satanás
  rationale: Se preserva la cadena de apposiciones del griego sin suavizarla ni fundir los títulos en una sola explicación. Esto mantiene la identificación literaria y teológica del personaje con los nombres tradicionales del mal personal en Apocalipsis.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; translate titles clearly; do not erase appositional structure.'
- issue: Alcance universal de οἰκουμένη
  english_pob_reading: the whole world
  chosen_spanish_reading: a todo el mundo
  alternative_spanish_readings:
  - al mundo entero
  - a toda la tierra habitada
  rationale: La expresión se mantiene de alcance universal, acorde con el contexto apocalíptico. «Todo el mundo» es idiomático y no restringe indebidamente el alcance del engaño.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition; keep universal scope where the Greek does.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el cierre de la revisión más reciente: no se registraron cambios, y el cotejo final informó acuerdo alto (1.0). La redacción española sigue ese estado estable sin introducir variantes textuales nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este verso no la contiene.
  - Se usa «Diablo» como título nominal asentado en español y «Satanás» como transliteración estable.
  - Se conserva la repetición de «fue arrojado» para reflejar la insistencia verbal del griego.
  - «Todo el mundo» se entiende en sentido universal, no como mera región geográfica.
