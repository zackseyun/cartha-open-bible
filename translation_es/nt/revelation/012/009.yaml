review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés en casi todos los puntos clave: repite correctamente «fue arrojado», conserva la cadena de aposiciones («el gran dragón», «la serpiente antigua», «Diablo y Satanás»), mantiene el alcance universal de «todo el mundo», y refleja bien la expulsión a la tierra con sus ángeles. Sin embargo, la nota [a] no corresponde al sentido del original ni al alternativo documentado en inglés: reemplaza indebidamente «serpiente antigua» por «la serpiente que engaña a todo el mundo», cuando la alternativa preservada debía referirse a ὁ πλανῶν («que extravía / engaña a todo el mundo»), no a ὁ ὄφις ὁ ἀρχαῖος.'
  spanish_quality_summary: El español es claro, natural y de tono bíblico moderno. «Fue arrojado» funciona bien para βάλλω en pasiva; «la serpiente antigua» suena digno y comprensible; «con él» y «sus ángeles» son idiomáticos. Hay una ligera mejora de naturalidad posible en «llamado el Diablo y Satanás», pero la redacción actual no es incorrecta. El problema principal es de nota y no de legibilidad del texto principal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: no aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. «Diablo», «Satanás», «ángeles», «tierra» y «mundo» están bien alineados con el análisis léxico documentado. La alusión a Génesis 3 en [b] también está bien preservada.'
  issues:
  - severity: medium
    issue: La nota [a] no refleja la alternativa léxica documentada para ὁ πλανῶν.
    rationale: El inglés conserva como alternativa «who leads the whole inhabited world astray», pero la nota española propone «la serpiente que engaña a todo el mundo», que desplaza el foco desde el participio «el que engaña / extravía» hacia la frase nominal «la serpiente antigua». Esto altera qué elemento del griego está siendo anotado.
  - severity: low
    issue: El anclaje de [a] en «serpiente antigua» puede inducir a pensar que la nota comenta esa expresión, no «el que engaña».
    rationale: Aunque en el inglés la marca [a] aparece tras «ancient serpent», su contenido explica una alternativa para la cláusula siguiente. En español conviene reubicar el marcador al segmento «el que engaña» para evitar ambigüedad creada por el español.
  revised_spanish_text: Y fue arrojado el gran dragón—la serpiente antigua, el que es llamado Diablo y Satanás, el que engaña[a] a todo el mundo. Fue arrojado a la tierra[b], y sus ángeles fueron arrojados con él.
  revised_footnotes:
