    text: 'O: «el que extravía a todo el mundo»; también puede entenderse «al mundo entero» o «a toda la tierra habitada».'
    reason: lexical_alternative
  - marker: b
    text: La imagen de la «serpiente antigua» evoca Génesis 3.
    reason: cross_reference
  revision_rationale: 'Se requiere una reparación menor: corregir la nota [a] para que corresponda al participio ὁ πλανῶν y reubicar su anclaje al verbo «engaña». El texto principal puede mantenerse sustancialmente igual.'
