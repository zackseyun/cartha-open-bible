    rationale: El griego usa presente indicativo y la auditoría inglesa optó deliberadamente por un presente vívido. 'Clamaba' desplaza la escena a un imperfecto narrativo y pierde inmediatez.
  - severity: medium
    issue: Notas b y c ancladas en lugares incorrectos
    rationale: La nota b explica una alternativa para 'con dolores de parto', pero está colocada tras 'clamaba'. La nota c explica una alternativa para 'siendo atormentada', pero está colocada tras 'dar a luz'.
  - severity: low
