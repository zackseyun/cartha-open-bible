translation:
  language: es
  text: Y estaba encinta[a], y clama, con dolores de parto[b] y siendo atormentada[c] para dar a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘embarazada’; literalmente, ‘teniendo en el vientre’.
    reason: lexical_alternative
  - marker: b
    text: O ‘estaba de parto’ para ‘con dolores de parto’.
    reason: lexical_alternative
  - marker: c
    text: O ‘en agonía’ para ‘siendo atormentada’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν γαστρὶ ἔχουσα
  english_pob_choice: she was pregnant
  chosen_spanish: estaba encinta
  alternatives_spanish:
  - estaba embarazada
  - estaba con child
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente significa ‘teniendo en el vientre’. En español, ‘estaba encinta’ reproduce bien el sentido de embarazo con un registro digno y bíblico, sin sonar arcaico en exceso. ‘Estaba embarazada’ también sería natural, pero ‘encinta’ conserva mejor el tono tradicional y lector de la visión.
- source_word: κράζει
  english_pob_choice: she cries out
  chosen_spanish: clamaba
  alternatives_spanish:
  - gritaba
  - clama
  lexicon: BDAG
  rationale: El presente griego expresa viveza e inmediatez en la escena visionaria. ‘Clamaba’ comunica un grito intenso y continuo sin reducirlo a un simple ‘gritaba’, que en español puede sonar más coloquial o menos solemne. Mantiene la fuerza de la acción.
- source_word: ὠδίνουσα
  english_pob_choice: suffering birth pains
  chosen_spanish: con dolores de parto
  alternatives_spanish:
  - en trabajo de parto
  - sufriendo dolores de parto
  lexicon: BDAG
  rationale: El participio denota el sufrimiento propio del parto. ‘Con dolores de parto’ es una forma clara y natural en español que conserva explícitamente la imagen del dolor. ‘En trabajo de parto’ es posible, pero deja menos visible el matiz de dolor que el griego enfatiza.
- source_word: βασανιζομένη
  english_pob_choice: being tormented
  chosen_spanish: siendo atormentada
  alternatives_spanish:
  - en agonía
  - siendo afligida
  lexicon: BDAG
  rationale: El pasivo comunica una aflicción intensa, casi de tormento. ‘Siendo atormentada’ preserva con fuerza esa intensidad, como en la opción inglesa, y evita suavizar el término en el contexto del nacimiento. ‘En agonía’ sería viable, pero no refleja tan directamente el valor fuerte del verbo.
- source_word: τεκεῖν
  english_pob_choice: to give birth
  chosen_spanish: dar a luz
  alternatives_spanish:
  - parir
  - dar nacimiento
  lexicon: BDAG
  rationale: El infinitivo indica el propósito o resultado del sufrimiento. ‘Dar a luz’ es la equivalencia más natural y reverente en español contemporáneo para el acto del parto. ‘Parir’ es más directo, pero menos adecuado para el registro publicado de este versículo.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - y ... además
  - así como ... y
  lexicon: BDAG
  rationale: Se conserva la repetición de la conjunción para reflejar el ritmo acumulativo del griego y no suavizar la secuencia descriptiva de la visión.
theological_decisions:
- issue: Intensidad del sufrimiento de la mujer en la visión
  english_pob_reading: Render βασανιζομένη strongly as 'being tormented' while leaving the identity of the woman uninterpreted.
  chosen_spanish_reading: Mantener ‘siendo atormentada’ con fuerza, sin identificar de antemano a la mujer ni resolver su sentido simbólico.
  alternative_spanish_readings:
  - en agonía
  - muy afligida
  - sufriendo intensamente
  rationale: El verso describe el dolor con gran viveza, pero no explica aquí quién es la mujer ni qué significa tipológicamente. La traducción debe conservar esa tensión interpretativa y no rebajar la intensidad del verbo griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; se mantiene la solución óptima ya validada, con ajuste de español natural y conservación de la intensidad semántica del griego.
  spanish_consistency_notes:
  - Se usó ‘encinta’ para mantener un registro bíblico digno; ‘embarazada’ queda como alternativa válida en nota.
  - Se conservó la repetición de ‘y’ para reflejar la estructura acumulativa del texto griego.
  - No se interpretó simbólicamente a la mujer, en línea con el audit trail inglés, para no resolver una tensión teológica que el verso no resuelve.
