review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite fielmente el sentido básico del griego: la descripción de los ojos, los muchos diademas sobre la cabeza, y el nombre escrito conocido solo por él mismo. También conserva bien la decisión auditada de introducir comparación implícita con «como». Sin embargo, la nota al pie no corresponde al anclaje textual: el marcador [a] está puesto tras «fuego», pero la nota habla de «muchos diademas», lo que crea una incoherencia formal y editorial.'
  spanish_quality_summary: El español es claro, natural y digno. «Sus ojos eran como una llama de fuego» y «tenía un nombre escrito que nadie conoce excepto él mismo» son legibles y fieles. «Muchos diademas» es aceptable aunque algo técnico; encaja con la decisión del POB de privilegiar precisión lexical. El principal problema es de colocación de nota, no de redacción principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Diademas» respeta bien διάδηματα según la auditoría inglesa revisada. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección «excepto él mismo» preserva la exclusividad enfática del griego.
  issues:
  - severity: medium
    issue: El marcador de nota [a] está anclado a «fuego», pero la nota trata sobre «diademas».
    rationale: Las instrucciones exigen que cada nota tenga su marcador exacto en el lugar pertinente del texto. Tal como está, la nota produce una asociación falsa con «llama de fuego» en vez de con «diademas».
  - severity: low
    issue: La formulación de la nota con «O «muchos diademas»» no funciona como alternativa real al texto principal, porque repite exactamente la misma expresión.
    rationale: Si el texto principal conserva «diademas», la nota no debe presentarlo como alternativa. Conviene reformularla para explicar el matiz lexical del término griego, por ejemplo identificándolo como corona real.
  revised_spanish_text: Sus ojos eran como una llama de fuego, y sobre su cabeza había muchos diademas[a], y tenía un nombre escrito que nadie conoce excepto él mismo.
  revised_footnotes:
  - marker: a
    text: El término griego se refiere específicamente a coronas reales.
    reason: lexical_explanation
  revision_rationale: Se reubica la nota al término relevante («diademas») y se corrige su redacción para que explique el matiz lexical en vez de ofrecer una falsa alternativa idéntica al texto principal. No se requieren cambios sustanciales en la traducción.
