translation:
  language: es
  text: Sus ojos eran como una llama de fuego, y sobre su cabeza había muchos diademas[a], y tenía un nombre escrito que nadie conoce excepto él mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término griego se refiere específicamente a coronas reales.
    reason: lexical_explanation
lexical_decisions:
- source_word: οἱ ... ὀφθαλμοὶ αὐτοῦ
  english_pob_choice: His eyes
  chosen_spanish: Sus ojos
  alternatives_spanish:
  - los ojos de él
  lexicon: BDAG
  rationale: El posesivo español natural preserva la imagen vívida sin forzar una construcción más literal y pesada. 'Sus ojos' corresponde bien al genitivo posesivo del griego.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - y
  - pero
  - ahora
  lexicon: BDAG
  rationale: Como partícula de transición suave, no requiere equivalente explícito en español para mantener la fluidez descriptiva.
- source_word: φλὸξ πυρός
  english_pob_choice: a flame of fire
  chosen_spanish: como una llama de fuego
  alternatives_spanish:
  - una llama de fuego
  - como una llama ígnea
  lexicon: BDAG
  rationale: El griego presenta una descripción nominal que en contexto funciona con valor comparativo implícito; 'como una llama de fuego' refleja mejor esa comparación natural en español. Mantiene la intensidad imagística sin exagerar el matiz.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: BDAG
  rationale: '''Sobre'' expresa con claridad la relación espacial de ἐπί con acusativo y suena natural en español bíblico contemporáneo.'
- source_word: διαδήματα πολλά
  english_pob_choice: many diadems
  chosen_spanish: muchos diademas
  alternatives_spanish:
  - muchas coronas
  - muchas diademas
  lexicon: BDAG
  rationale: Se conserva 'diademas' para reflejar el término específico διάδημα, que denota corona real. Se evita sustituirlo por 'coronas' en el texto principal para no perder la precisión lexical; el plural masculino sigue la forma esperable en español por concordancia con el sustantivo tomado como préstamo técnico.
- source_word: ἔχων
  english_pob_choice: he had
  chosen_spanish: tenía
  alternatives_spanish:
  - teniendo
  - llevaba
  lexicon: BDAG
  rationale: El participio presente se vierte con un imperfecto descriptivo en español para mantener la secuencia narrativa y la caracterización continua del jinete.
- source_word: ὄνομα γεγραμμένον
  english_pob_choice: a name written
  chosen_spanish: un nombre escrito
  alternatives_spanish:
  - un nombre inscrito
  - un nombre grabado
  lexicon: BDAG
  rationale: '''Escrito'' reproduce el participio perfecto pasivo con sentido resultativo de manera directa y clara. ''Inscrito'' sería posible, pero introduce un matiz más técnico que el griego no exige.'
- source_word: ὃ οὐδεὶς οἶδεν
  english_pob_choice: that no one knows
  chosen_spanish: que nadie conoce
  alternatives_spanish:
  - que nadie sabe
  - que nadie ha conocido
  lexicon: BDAG
  rationale: El presente perfecto de οἶδα se vierte con presente de conocimiento en español. 'Conoce' conserva el valor actual y continuo del saber sin sobrecargar la frase.
- source_word: εἰ μὴ αὐτός
  english_pob_choice: except himself
  chosen_spanish: excepto él mismo
  alternatives_spanish:
  - sino él mismo
  - excepto él
  lexicon: BDAG
  rationale: La expresión mantiene la exclusividad enfática del griego. 'Él mismo' preserva el énfasis sin ambigüedad y suena natural en español.
theological_decisions:
- issue: Alcance del nombre secreto
  english_pob_reading: The clause refers to the rider himself uniquely knowing the written name.
  chosen_spanish_reading: La cláusula indica que solo él mismo conoce el nombre escrito.
  alternative_spanish_readings:
  - La frase subraya sobre todo el carácter incomprensible del nombre.
  - El énfasis recae en el misterio del título más que en el auto-conocimiento del jinete.
  rationale: 'El griego afirma explícitamente la exclusión: nadie lo conoce excepto él mismo. La traducción conserva esa tensión sin ampliarla ni resolverla doctrinalmente, manteniendo el carácter de misterio y majestad del personaje tal como lo presenta el texto.'
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del inglés POB: se conserva el matiz comparativo de φλὸξ πυρός con ''como una llama de fuego'' y se mantiene la precisión de διαδήματα mediante ''diademas'', evitando el más general ''coronas''. También se respeta la clausula de conocimiento exclusivo sin interpretarla más allá de lo que el griego dice.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque el versículo no lo nombra explícitamente; el referente queda abierto en el texto.
  - '''Diademas'' se mantiene en el cuerpo del texto por precisión lexical, con nota aclaratoria para lectores que esperan ''coronas''.'
  - '''Conoce'' refleja mejor οἶδα en español que ''sabe'' en esta descripción de conocimiento personal/exclusivo.'
