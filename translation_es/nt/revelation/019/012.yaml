revisions:
- from: Sus ojos eran como una llama de fuego[a], y sobre su cabeza había muchos diademas, y tenía un nombre escrito que nadie conoce excepto él mismo.
  to: Sus ojos eran como una llama de fuego, y sobre su cabeza había muchos diademas[a], y tenía un nombre escrito que nadie conoce excepto él mismo.
  rationale: Se reubica la nota al término relevante («diademas») y se corrige su redacción para que explique el matiz lexical en vez de ofrecer una falsa alternativa idéntica al texto principal. No se requieren cambios sustanciales en la traducción.
