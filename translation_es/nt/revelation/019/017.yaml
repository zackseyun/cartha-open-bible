translation:
  language: es
  text: 'Y vi a un solo ángel de pie en el sol, y clamó a gran voz, diciendo a todas las aves que vuelan en medio del cielo[a]: «Vengan, reúna[n]se para la gran cena de Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en medio del aire’ o ‘en la mitad del cielo’. El término griego μεσουράνημα es una expresión apocalíptica distintiva usada en Apocalipsis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕνα ἄγγελον
  english_pob_choice: one angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un solo ángel
  - un ángel, uno
  lexicon: BDAG
  rationale: El inglés POB conserva el numeral explícito con ‘one angel’. En español, ‘un ángel’ comunica de manera natural tanto la indefinición como la especificidad de la visión, sin perder el valor del numeral griego en este contexto narrativo.
- source_word: ἑστῶτα ἐν τῷ ἡλίῳ
  english_pob_choice: standing in the sun
  chosen_spanish: de pie en el sol
  alternatives_spanish:
  - de pie en el sol
  - parado en el sol
  - de pie delante del sol
  lexicon: BDAG
  rationale: Se mantiene la imagen literal y apocalíptica de ἐν con ἥλιος, como hace el POB inglés. ‘De pie en el sol’ preserva la tensión de la escena sin suavizarla interpretativamente.
- source_word: ἔκραξεν φωνῇ μεγάλῃ
  english_pob_choice: cried out with a loud voice
  chosen_spanish: gritó con gran voz
  alternatives_spanish:
  - clamó con gran voz
  - gritó con voz fuerte
  lexicon: BDAG
  rationale: ‘Gritó’ transmite la fuerza de κράζω de manera natural en español. ‘Con gran voz’ conserva la forma semítica/apocalíptica de la expresión mejor que una paráfrasis como ‘en voz alta’.
- source_word: πᾶσι τοῖς ὀρνέοις
  english_pob_choice: to all the birds
  chosen_spanish: a todas las aves
  alternatives_spanish:
  - a todas las aves
  - a todos los pájaros
  lexicon: BDAG
  rationale: ὄρνεον es ‘ave/pájaro’ de modo general; ‘aves’ suena más sobrio y amplio en español bíblico. No se añade ‘de rapiña’ porque esa implicación depende del contexto inmediato, no del sustantivo.
- source_word: τοῖς πετομένοις ἐν μεσουρανήματι
  english_pob_choice: flying in midheaven
  chosen_spanish: que vuelan en medio del cielo
  alternatives_spanish:
  - que vuelan en el mediodía del cielo
  - que vuelan en el cenit
  - que vuelan en el aire
  lexicon: BDAG
  rationale: El POB inglés explicita el término técnico apocalíptico μεσουράνημα con ‘midheaven’. En español, ‘medio del cielo’ conserva la elevación e imagen de término técnico sin introducir un arcaísmo poco transparente. Se evita ‘en el aire’ por perder el valor apocalíptico particular del vocablo.
- source_word: Δεῦτε
  english_pob_choice: Come
  chosen_spanish: Venid
  alternatives_spanish:
  - Ven
  - Vengan
  lexicon: BDAG
  rationale: Es una invitación/summons directa en plural. ‘Venid’ reproduce el plural imperativo del llamado y mantiene un tono bíblico sobrio, adecuado para la voz dirigida a las aves.
- source_word: συνάχθητε
  english_pob_choice: gather
  chosen_spanish: congregaos
  alternatives_spanish:
  - reuníos
  - juntaos
  - sed congregados
  lexicon: BDAG
  rationale: La forma pasiva/deponente imperativa se vierte con un reflexivo natural en español. ‘Congregaos’ conserva el sentido de reunión convocada, sin resolverla con una forma más interpretativa que borre la imagen del llamado.
- source_word: εἰς τὸ δεῖπνον τὸ μέγα τοῦ θεοῦ
  english_pob_choice: for the great supper of God
  chosen_spanish: para la gran cena de Dios
  alternatives_spanish:
  - para la gran cena de Dios
  - para el gran banquete de Dios
  - para la gran comida de Dios
  lexicon: BDAG
  rationale: δεῖπνον es la comida principal de la tarde/noche; ‘cena’ mantiene ese valor y el eco con el contraste escatológico del contexto. ‘De Dios’ conserva el genitivo explícito, sin sustituirlo por una formulación más libre.
theological_decisions:
- issue: Imagen apocalíptica de un ángel ‘en el sol’
  english_pob_reading: standing in the sun
  chosen_spanish_reading: de pie en el sol
  alternative_spanish_readings:
  - de pie delante del sol
  - de pie sobre el sol
  rationale: Se preserva la literalidad chocante de la imagen, porque el POB inglés la retiene deliberadamente. La traducción no atenúa la tensión apocalíptica ni la convierte en una explicación espacial más segura.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Sentido de μεσουράνημα como término apocalíptico
  english_pob_reading: midheaven
  chosen_spanish_reading: medio del cielo
  alternative_spanish_readings:
  - midheaven
  - cenit
  - aire
  rationale: El inglés POB mantiene el valor distintivo del término. En español se opta por una expresión comprensible que conserve la altura/centralidad del cielo y su carácter visionario, sin perder el trasfondo técnico.
  doctrine_reference: 'Translation philosophy: preserve distinctive apocalyptic diction and avoid flattening imagery.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el auditable English POB, sin cambios respecto a la última pasada reportada (‘No changes needed’). Se ajusta al español natural manteniendo la literalidad de las imágenes apocalípticas y la estructura imperativa del verso.
  spanish_consistency_notes:
  - Se emplea ‘Dios’ para θεοῦ, conforme al estándar del proyecto.
  - Se usa ‘aves’ en vez de ‘pájaros’ para un registro bíblico más sobrio en español.
  - Se conserva ‘gran voz’ para reflejar la fórmula intensiva de φωνῇ μεγάλῃ.
  - No se introduce ‘SEÑOR’ ni otros sustitutos no presentes en el griego.
  - La puntuación y las comillas se adaptan a la norma española.
