translation:
  language: es
  text: 'Y tiene un nombre escrito sobre su manto y sobre su muslo: Rey de reyes y Señor de señores[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un nombre escrito». El griego dice literalmente «un nombre escrito».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  - lleva
  lexicon: BDAG
  rationale: El presente indicativo se conserva con un presente natural en español. 'Tiene' comunica la visión en tiempo vivo sin añadir matices interpretativos como 'lleva'.
- source_word: ἐπὶ τὸ ἱμάτιον
  english_pob_choice: on his robe
  chosen_spanish: sobre su manto
  alternatives_spanish:
  - sobre su ropa
  - sobre su vestidura
  lexicon: BDAG
  rationale: ἱμάτιον designa una prenda o manto; 'manto' es un equivalente natural y digno en español, sin perder el sentido de vestidura exterior. Se conserva el valor locativo de ἐπὶ con 'sobre'.
- source_word: ἐπὶ τὸν μηρὸν αὐτοῦ
  english_pob_choice: on his thigh
  chosen_spanish: sobre su muslo
  alternatives_spanish:
  - sobre su pierna
  lexicon: BDAG
  rationale: μηρός significa literalmente 'muslo'. Se mantiene la referencia corporal directa, ya que el texto griego presenta dos ubicaciones y no aclara cómo se dispone la inscripción.
- source_word: ὄνομα γεγραμμένον
  english_pob_choice: a name written
  chosen_spanish: un nombre escrito
  alternatives_spanish:
  - un nombre inscrito
  - un nombre grabado
  lexicon: BDAG
  rationale: 'La estructura griega favorece un sustantivo con participio: ''un nombre escrito''. ''Escrito'' conserva la lectura más literal y no añade la especificidad de ''inscrito'' o ''grabado''.'
- source_word: Βασιλεὺς βασιλέων
  english_pob_choice: King of kings
  chosen_spanish: Rey de reyes
  alternatives_spanish:
  - Soberano de reyes
  - Monarca de monarcas
  lexicon: BDAG
  rationale: La construcción superlativa se reproduce de forma idiomática y tradicionalmente comprensible en español. 'Rey de reyes' preserva la fuerza titulativa del griego.
- source_word: κύριος κυρίων
  english_pob_choice: Lord of lords
  chosen_spanish: Señor de señores
  alternatives_spanish:
  - Dueño de dueños
  - Maestro de maestros
  lexicon: BDAG
  rationale: '''Señor'' es la equivalencia estable para κύριος en este tipo de título cristológico. ''Señor de señores'' mantiene el paralelismo con ''Rey de reyes'' y la resonancia teológica del griego.'
theological_decisions:
- issue: Cómo traducir el título final sin suavizar su fuerza soberana
  english_pob_reading: Retain the literal royal titles 'King of kings and Lord of lords' as the written name/title.
  chosen_spanish_reading: Conservar los títulos reales literales 'Rey de reyes y Señor de señores' como el nombre/título escrito.
  alternative_spanish_readings:
  - Soberano de soberanos y Señor supremo
  - Rey supremo y Señor supremo
  rationale: El griego presenta el título escrito como formulación explícita y elevada. La traducción literal conserva la densidad real y cristológica sin convertirla en paráfrasis.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
- issue: Cómo tratar las dos ubicaciones de la inscripción
  english_pob_reading: Translate both locations directly without harmonizing or explaining how the inscription is positioned.
  chosen_spanish_reading: Traducir ambas ubicaciones directamente, sin armonizarlas ni explicar cómo se coloca la inscripción.
  alternative_spanish_readings:
  - sobre su manto, es decir, en la parte que cubre su muslo
  - sobre su manto y en la zona del muslo
  rationale: El griego da dos frases con ἐπὶ y no resuelve el modo exacto de la inscripción. Conviene conservar esa tensión imagética en español.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el pasaje griego y coincide con la lectura inglesa auditada en los puntos principales. No se aplicaron revisiones posteriores; se conservó la estructura doble de localización y el título régio final sin explicaciones añadidas.
  spanish_consistency_notes:
  - Se usó 'Y' inicial para reflejar el flujo narrativo continuo del verso en español.
  - Se eligió 'manto' para ἱμάτιον por ser natural en un contexto regio/apocalíptico, sin perder el sentido de vestidura.
  - Se mantuvo 'Señor' para κύριος en el título fijo 'Señor de señores', coherente con el uso cristológico establecido en el proyecto.
  - Se preservó 'sobre su muslo' de manera literal para no resolver una ambigüedad espacial que el griego deja abierta.
