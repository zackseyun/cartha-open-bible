translation:
  language: es
  text: Y vi el cielo abierto[a], y he aquí un caballo blanco, y el que está sentado sobre él es llamado Fiel y Verdadero, y en rectitud[b] juzga y hace la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estando abierto».
    reason: lexical_alternative
  - marker: b
    text: O «en justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνεῳγμένον
  english_pob_choice: opened
  chosen_spanish: abierto
  alternatives_spanish:
  - abriendo
  - que había sido abierto
  - abierto y permanece abierto
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo expresa un estado resultante: el cielo aparece en condición de abierto. «Abierto» es natural en español y conserva ese valor sin recargar la frase.'
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira,
  - he aquí,
  - ¡mira!
  lexicon: BDAG
  rationale: «He aquí» mantiene el impacto visual y la fuerza discursiva apocalíptica de ἰδού mejor que una opción más plana.
- source_word: ἵππος λευκός
  english_pob_choice: a white horse
  chosen_spanish: un caballo blanco
  alternatives_spanish:
  - caballo blanco
  - un corcel blanco
  lexicon: BDAG
  rationale: La frase nominal se traduce de forma directa. El artículo indefinido es natural en español y corresponde bien al griego en este contexto.
- source_word: ὁ καθήμενος ἐπ’ αὐτὸν
  english_pob_choice: the one sitting on it
  chosen_spanish: el que está sentado sobre él
  alternatives_spanish:
  - el jinete que va sobre él
  - el que se sienta sobre él
  - el montado sobre él
  lexicon: BDAG
  rationale: Se conserva la construcción participial con una formulación clara en español. «El que está sentado sobre él» sigue de cerca el griego sin introducir «jinete», que sería más interpretativo.
- source_word: πιστὸς καλούμενος καὶ ἀληθινός
  english_pob_choice: is called Faithful and True
  chosen_spanish: es llamado Fiel y Verdadero
  alternatives_spanish:
  - es llamado fiel y verdadero
  - se llama Fiel y Verdadero
  lexicon: BDAG
  rationale: «Fiel y Verdadero» funciona naturalmente como títulos en español, reflejando el valor titular que el POB inglés documenta para estas palabras. Se mantiene la pasiva «es llamado» para respetar καλούμενος.
- source_word: πιστός
  english_pob_choice: Faithful
  chosen_spanish: Fiel
  alternatives_spanish:
  - fiel
  - fiable
  - confiable
  lexicon: BDAG
  rationale: En contexto cristológico/titular, «Fiel» conserva la fuerza de πιστός y la resonancia de lealtad pactual que el inglés POB expresa con mayúscula.
- source_word: ἀληθινός
  english_pob_choice: 'True'
  chosen_spanish: Verdadero
  alternatives_spanish:
  - verdadero
  - genuino
  - real
  lexicon: BDAG
  rationale: «Verdadero» es el equivalente más natural para el título-pareja con «Fiel» y preserva el uso joánico de ἀληθινός.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  - en justicia y rectitud
  lexicon: BDAG
  rationale: 'Aquí se mantiene la alternativa semántica documentada por el audit trail: δικαιοσύνη puede leerse como «righteousness» o «justice». En español, «en justicia» conserva mejor la tensión entre rectitud y justicia judicial en el acto de juzgar y guerrear.'
- source_word: κρίνει
  english_pob_choice: he judges
  chosen_spanish: juzga
  alternatives_spanish:
  - hace juicio
  - dicta juicio
  - juzga con rectitud
  lexicon: BDAG
  rationale: El presente activo se vierte con el verbo simple «juzga», sin añadir un adverbio que ya queda cubierto por la frase preposicional previa.
- source_word: πολεμεῖ
  english_pob_choice: wages war
  chosen_spanish: hace la guerra
  alternatives_spanish:
  - guerrea
  - combate
  - hace guerra
  lexicon: BDAG
  rationale: «Hace la guerra» refleja de modo bastante directo el valor de πολεμέω y conserva un tono bíblico claro en español. No se suaviza a «combate» para no perder fuerza militar.
theological_decisions:
- issue: Título cristológico del jinete
  english_pob_reading: Render πιστός and ἀληθινός as the titles 'Faithful and True' for the rider on the white horse.
  chosen_spanish_reading: Traducir πιστός y ἀληθινός como los títulos «Fiel y Verdadero».
  alternative_spanish_readings:
  - «fiel y verdadero» sin mayúsculas
  - «Leal y Verdadero»
  rationale: En el contexto inmediato de Apocalipsis, estas expresiones funcionan como designaciones del personaje entronizado, no solo como adjetivos ocasionales. Las mayúsculas en «Fiel y Verdadero» señalan el uso titular sin añadir contenido ajeno al griego.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Sentido de δικαιοσύνη
  english_pob_reading: Use 'righteousness' in the main text; 'justice' preserved as a footnoted alternative.
  chosen_spanish_reading: Usar «justicia» en el texto principal, con nota que preserve la alternativa de «rectitud/justicia» según el matiz.
  alternative_spanish_readings:
  - «rectitud»
  - «justicia y rectitud»
  - «justicia» sin nota
  rationale: El POB inglés deja abierta la tensión semántica entre righteousness y justice. En español, «en justicia» comunica bien tanto la dimensión moral como la judicial del acto de juzgar y guerrear, y la nota mantiene visible la alternativa documentada.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el pasaje muestra alto acuerdo entre revisiones; por eso se mantiene una formulación cercana al audit trail inglés sin introducir ajustes estilísticos no motivados por la fuente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se mantiene «Fiel y Verdadero» con mayúsculas por su función titular en contexto cristológico.
  - «He aquí» y la sintaxis participial siguen de cerca el griego sin caer en calco rígido.
  - «Hace la guerra» preserva la fuerza de πολεμεῖ mejor que opciones más suaves.
