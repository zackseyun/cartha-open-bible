revisions:
- from: Y vi el cielo abierto[a], y he aquí un caballo blanco, y el que está sentado sobre él es llamado Fiel y Verdadero, y en justicia[b] juzga y hace la guerra.
  to: Y vi el cielo abierto[a], y he aquí un caballo blanco, y el que está sentado sobre él es llamado Fiel y Verdadero, y en rectitud[b] juzga y hace la guerra.
  rationale: Se corrige «ἐν δικαιοσύνῃ» para alinearlo con la decisión principal documentada por el POB inglés («in righteousness»), usando «en rectitud» en el texto y dejando «en justicia» como alternativa en nota. Se simplifica la nota b para que corresponda exactamente al nuevo texto principal y evite contradicción interna. El resto del verso puede mantenerse tal como está, pues es fiel al griego y natural en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:37:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del griego y preserva los elementos principales: cielo abierto, visión enfática, caballo blanco, el jinete llamado «Fiel y Verdadero», y su juzgar y guerrear. Sin embargo, se aparta del rastro auditado del POB en un punto importante: ἐν δικαιοσύνῃ fue fijado en el inglés como sentido principal equivalente a «in righteousness», con «justice» solo como alternativa en nota. El español invierte esa decisión al poner «en justicia» en el texto principal. Además, la nota b también es inadecuada porque presenta «en justicia» como alternativa cuando ya está en el texto, y omite una formulación principal más alineada como «en rectitud».'
  spanish_quality_summary: El español es claro y legible en registro bíblico moderno. «He aquí», «el que está sentado sobre él» y «es llamado Fiel y Verdadero» son naturales y dignos. «Hace la guerra» es aceptable e idiomático. La principal mejora necesaria es terminológica y de coherencia de notas, no de fluidez general.
  glossary_alignment: Buen alineamiento general con las decisiones del proyecto, salvo δικαιοσύνη. Según las pautas, δικαιοσύνη debe rendirse normalmente como «justicia» o «rectitud» según contexto, preservando su fuerza legal/pactual; pero aquí el audit trail inglés decidió mantener el valor principal de «righteousness» y dejar «justice» como alternativa en nota. En español, «rectitud» representa mejor esa decisión que «justicia» en el texto principal. Los títulos «Fiel y Verdadero» están bien preservados.
  issues:
  - severity: high
    issue: La frase ἐν δικαιοσύνῃ se tradujo como «en justicia» en el texto principal.
    rationale: El audit trail inglés estableció «in righteousness» como lectura principal y «justice» como alternativa en nota. El español debe reflejar esa decisión documental; «en rectitud» es la mejor opción breve y natural para conservar esa prioridad semántica.
  - severity: medium
    issue: La nota [b] es internamente incoherente.
    rationale: Dice «también puede entenderse ‘en justicia’» aunque el texto principal ya dice «en justicia». La nota debe señalar la alternativa real al texto principal, no repetirlo como posibilidad.
  - severity: low
    issue: La nota [a] podría sonar algo menos natural con «estando abierto».
    rationale: No es incorrecta, pero «o ‘abierto’ puede implicar ‘que estaba abierto’ / ‘que había sido abierto’» sería más transparente. Aun así, no es un problema serio y puede mantenerse una nota breve.
  revised_spanish_text: Y vi el cielo abierto[a], y he aquí un caballo blanco, y el que está sentado sobre él es llamado Fiel y Verdadero, y en rectitud[b] juzga y hace la guerra.
  revised_footnotes:
  - marker: a
    text: O «estando abierto».
    reason: lexical_alternative
  - marker: b
    text: O «en justicia».
    reason: lexical_alternative
  revision_rationale: Se corrige «ἐν δικαιοσύνῃ» para alinearlo con la decisión principal documentada por el POB inglés («in righteousness»), usando «en rectitud» en el texto y dejando «en justicia» como alternativa en nota. Se simplifica la nota b para que corresponda exactamente al nuevo texto principal y evite contradicción interna. El resto del verso puede mantenerse tal como está, pues es fiel al griego y natural en español.
