translation:
  language: es
  text: para que coman la carne de reyes[a], la carne de comandantes, la carne de los poderosos, la carne de caballos y de los que están sentados sobre ellos, y la carne de todos, tanto libres como esclavos, tanto pequeños como grandes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus jinetes»; lit. «los que están sentados sobre ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce propósito; en español, «para que» conserva de forma natural el valor final sin endurecer la sintaxis.
- source_word: φάγητε
  english_pob_choice: you may eat
  chosen_spanish: coman
  alternatives_spanish:
  - puedan comer
  - comáis
  lexicon: BDAG
  rationale: El subjuntivo en dependencia de ἵνα se expresa de manera idiomática con «coman», manteniendo el sentido de finalidad de la cláusula.
- source_word: σάρκας
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - carne
  - los cuerpos
  lexicon: BDAG
  rationale: Se conserva «carne» para σάρξ en sentido literal y violento de juicio, como en la decisión inglesa; no se suaviza a «cuerpos» porque perdería la fuerza léxica.
- source_word: βασιλέων
  english_pob_choice: of kings
  chosen_spanish: de reyes
  alternatives_spanish:
  - de monarcas
  - de soberanos
  lexicon: BDAG
  rationale: βασιλεύς designa reyes de manera directa; «reyes» es la correspondencia natural y precisa en español.
- source_word: χιλιάρχων
  english_pob_choice: of commanders
  chosen_spanish: de comandantes
  alternatives_spanish:
  - de capitanes
  - de jefes militares
  - de milenarios
  lexicon: BDAG
  rationale: χιλίαρχος nombra un oficial militar; «comandantes» comunica bien el rango sin recurrir a un término arcaico u oscuro.
- source_word: ἰσχυρῶν
  english_pob_choice: of the mighty
  chosen_spanish: de los poderosos
  alternatives_spanish:
  - de los fuertes
  - de los valientes
  lexicon: BDAG
  rationale: El adjetivo sustantivado funciona como grupo social o guerrero; «los poderosos» transmite la fuerza/estatus con naturalidad en español.
- source_word: ἵππων
  english_pob_choice: of horses
  chosen_spanish: de caballos
  alternatives_spanish:
  - de los caballos
  lexicon: BDAG
  rationale: Se traduce literalmente, preservando la imaginería bélica del texto.
- source_word: τῶν καθημένων ἐπ’ αὐτῶν
  english_pob_choice: of those who sit on them
  chosen_spanish: de los que se sientan sobre ellos
  alternatives_spanish:
  - de los que cabalgan en ellos
  - de sus jinetes
  - de los que van montados en ellos
  lexicon: BDAG
  rationale: Se mantiene el participio con una solución transparente y cercana al griego; «jinetes» sería más compacto, pero reduce la explicitud de la imagen literal.
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todos ellos
  - de todo ser humano
  lexicon: BDAG
  rationale: El genitivo totalizador se rinde con «de todos», preservando la amplitud colectiva del catálogo.
- source_word: ἐλευθέρων τε καὶ δούλων
  english_pob_choice: both free and slave
  chosen_spanish: tanto libres como esclavos
  alternatives_spanish:
  - libres y esclavos
  - tanto libres como siervos
  lexicon: BDAG
  rationale: Se conserva el contraste social explícito. «Esclavos» mantiene la fuerza de δοῦλος y evita suavizar el término a «siervos», siguiendo la decisión doctrinal del POB en este contexto.
- source_word: μικρῶν καὶ μεγάλων
  english_pob_choice: small and great
  chosen_spanish: pequeños y grandes
  alternatives_spanish:
  - los pequeños y los grandes
  - de poca y de mucha importancia
  lexicon: BDAG
  rationale: La fórmula merística se traduce de modo natural y reconocible en español, conservando el rango totalizante.
theological_decisions:
- issue: Traducción de δοῦλος en la pareja social «libres y esclavos»
  english_pob_reading: slave
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  - bondados
  rationale: Aquí el contraste con ἐλευθέρων es social y jurídico; «esclavos» refleja mejor la dependencia de estado que el griego expresa. «Siervos» suavizaría indebidamente la tensión lexical y doctrinal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
- issue: Mantenimiento de σάρξ como «carne» en un contexto de juicio
  english_pob_reading: the flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - los cuerpos
  - las carnes
  rationale: El pasaje presenta un banquete de juicio con repetición enfática de σάρξ; «carne» preserva esa crudeza y evita una interpretación eufemística.
  doctrine_reference: DOCTRINE.md Lexical force of σάρξ
translation_notes:
  revision_awareness: El contexto inglés auditado muestra alta concordancia y ningún cambio reciente aplicado; la redacción española sigue de cerca esa solución, conservando la repetición de «la carne de...» y la alternativa interpretativa para τῶν καθημένων ἐπ’ αὐτῶν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «esclavos» para δοῦλος por el contraste explícito con «libres».
  - Se conserva la repetición retórica de «la carne de...», en paralelo con la estructura griega y la decisión inglesa.
