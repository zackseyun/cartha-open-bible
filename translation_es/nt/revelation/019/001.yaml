revisions:
- from: 'Después de estas cosas, oí como la voz fuerte de una gran multitud en el cielo[a], que decía: «¡Aleluya! La salvación, la gloria y el poder pertenecen a nuestro Dios»,'
  to: 'Después de estas cosas, oí lo que parecía ser la potente voz de una gran multitud en el cielo[a], que decía: «¡Aleluya! La salvación, la gloria y el poder pertenecen a nuestro Dios»,'
  rationale: Se ajusta el texto para reflejar mejor el matiz perceptivo de ὡς, mejorar la naturalidad del español en la frase auditiva y alinear la nota con la política terminológica del proyecto respecto de Yahvé. Se conserva «Aleluya» en el texto principal y la ascripción «pertenecen a nuestro Dios», ambas fieles y naturales. Aunque «que decía» podría defenderse por concordancia con el colectivo «multitud», se mantiene por fluidez inmediata; si se quisiera máxima correspondencia formal con el plural griego, «que decían» también sería válido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia básica del griego y la doxología final, pero hay varios desajustes menores frente a la evidencia fuente y la auditoría inglesa: ὡς aquí conviene explicitar apariencia/percepción mejor que un simple «como»; φωνὴν μεγάλην suena más natural como «gran estruendo/voz potente» que «voz fuerte»; y el participio plural λεγόντων no concuerda idealmente con «multitud» singular en «que decía».'
  spanish_quality_summary: 'El español es comprensible, pero «oí como la voz fuerte» suena poco natural y algo calcado. «En el cielo» es aceptable, aunque «en el cielo» ya está bien establecido; la principal mejora es lograr una frase más idiomática: «oí lo que parecía ser la potente voz de una gran multitud… que decía[n]». La nota al pie también debe alinearse con la política de no enmascarar el nombre divino con «SEÑOR».'
  glossary_alignment: Buena alineación general con «Dios» y «Aleluya». Sin embargo, la nota al pie «¡Alaben al SEÑOR!» contradice la preferencia del proyecto por «Yahvé» cuando se explicita el nombre divino; debe ajustarse a «¡Alaben a Yahvé!» o similar. No hay otros conflictos terminológicos mayores.
  issues:
  - severity: medium
    issue: «como la voz fuerte» refleja torpemente ὡς φωνὴν μεγάλην
    rationale: El griego señala percepción/apariencia. En español, «oí como la voz…» resulta poco idiomático; «oí lo que parecía ser la potente voz…» o «oí algo como la potente voz…» comunica mejor el matiz.
  - severity: medium
    issue: «que decía» con «multitud» no refleja bien λεγόντων plural
    rationale: Aunque «multitud» puede atraer singular semántico, el participio griego es plural y la escena enfatiza a muchos hablando. «que decían» o «diciendo» evita la tensión.
  - severity: low
    issue: «voz fuerte» es comprensible, pero menos natural que «potente voz» o «fuerte voz/voz potente»
    rationale: Μεγάλη φωνή en contexto apocalíptico normalmente apunta a gran volumen/intensidad; «voz fuerte» no es incorrecto, pero suena menos digno y fluido.
  - severity: medium
    issue: La nota al pie usa «SEÑOR» como convención de enmascaramiento
    rationale: La política del proyecto pide «Yahvé» en vez de «SEÑOR» cuando se explicita el nombre divino. La glosa debe alinearse con ello.
  revised_spanish_text: 'Después de estas cosas, oí lo que parecía ser la potente voz de una gran multitud en el cielo[a], que decía: «¡Aleluya! La salvación, la gloria y el poder pertenecen a nuestro Dios»,'
  revised_footnotes:
  - marker: a
    text: O «¡Alaben a Yah!» o «¡Alaben a Yahvé!».
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar mejor el matiz perceptivo de ὡς, mejorar la naturalidad del español en la frase auditiva y alinear la nota con la política terminológica del proyecto respecto de Yahvé. Se conserva «Aleluya» en el texto principal y la ascripción «pertenecen a nuestro Dios», ambas fieles y naturales. Aunque «que decía» podría defenderse por concordancia con el colectivo «multitud», se mantiene por fluidez inmediata; si se quisiera máxima correspondencia formal con el plural griego, «que decían» también sería válido.
