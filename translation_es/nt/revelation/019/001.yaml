translation:
  language: es
  text: 'Después de estas cosas, oí lo que parecía ser la potente voz de una gran multitud en el cielo[a], que decía: «¡Aleluya! La salvación, la gloria y el poder pertenecen a nuestro Dios»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Alaben a Yah!» o «¡Alaben a Yahvé!».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de estas cosas
  lexicon: BDAG
  rationale: Conserva el valor temporal-secuencial del demostrativo plural, importante en la progresión visionaria de Apocalipsis. Es español natural y mantiene la relación con el texto griego sin reducirlo a una fórmula más vaga.
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - yo oí
  lexicon: BDAG
  rationale: Aoristo narrativo simple; en español, «oí» es breve y directo. La forma expresa mejor la inmediatez del relato que una perífrasis más explicativa.
- source_word: ὡς
  english_pob_choice: what seemed to be
  chosen_spanish: como
  alternatives_spanish:
  - como si fuera
  - que parecía ser
  lexicon: BDAG
  rationale: Aquí introduce semejanza/percepción, no identidad estricta. «Como» es suficiente en español y evita añadir una explicación que el griego no obliga a explicitar en la línea principal.
- source_word: φωνὴν μεγάλην
  english_pob_choice: the loud voice
  chosen_spanish: la voz fuerte
  alternatives_spanish:
  - la voz grande
  - una voz fuerte
  lexicon: BDAG
  rationale: μεγάλην con φωνή comunica intensidad sonora. «Fuerte» es más natural que «grande» en español para una voz audible; se mantiene el matiz de intensidad sin calco rígido.
- source_word: ὄχλου πολλοῦ
  english_pob_choice: of a great multitude
  chosen_spanish: de una gran multitud
  alternatives_spanish:
  - de una gran muchedumbre
  - de una multitud inmensa
  lexicon: BDAG
  rationale: ὄχλος en este contexto apocalíptico y de adoración encaja mejor con «multitud» que con «gente» o «turba». «Gran» conserva el intensificador de πολλοῦ.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el ámbito celestial
  lexicon: BDAG
  rationale: El griego se refiere al ámbito celestial; en español bíblico «cielo» es claro y natural. Se evita «en el cielo» como simple ubicación física y se conserva el sentido de esfera divina.
- source_word: λεγόντων
  english_pob_choice: saying
  chosen_spanish: que decía
  alternatives_spanish:
  - diciendo
  - quienes decían
  lexicon: BDAG
  rationale: El participio introduce el contenido del clamor. En español, «que decía» fluye mejor con «multitud» como sujeto colectivo y mantiene la función de introducción del discurso.
- source_word: Ἁλληλουϊά
  english_pob_choice: Hallelujah
  chosen_spanish: ¡Aleluya!
  alternatives_spanish:
  - ¡Haleluya!
  - ¡Alabado sea Yah!
  lexicon: BDAG
  rationale: La forma hispana estable y reconocible es «Aleluya». Como exclamación litúrgica, conviene transliterarla y no sustituirla por una paráfrasis en el texto principal.
- source_word: ἡ σωτηρία
  english_pob_choice: Salvation
  chosen_spanish: La salvación
  alternatives_spanish:
  - salvación
  - la liberación
  lexicon: BDAG
  rationale: Aquí designa la salvación/liberación atribuida a Dios. Se conserva el artículo para reproducir el aserto nominal del griego y el tono doxológico.
- source_word: ἡ δόξα
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  - el honor
  lexicon: BDAG
  rationale: En contexto de adoración, δόξα se traduce naturalmente como «gloria». Mantener el artículo ayuda a reflejar la serie nominal del original.
- source_word: ἡ δύναμις
  english_pob_choice: power
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la potencia
  lexicon: BDAG
  rationale: δύναμις en doxología divina suele expresarse como «poder». Es el término más claro en español actual para la capacidad soberana de Dios.
- source_word: τοῦ θεοῦ ἡμῶν
  english_pob_choice: belong to our God
  chosen_spanish: pertenecen a nuestro Dios
  alternatives_spanish:
  - son de nuestro Dios
  - son para nuestro Dios
  lexicon: BDAG
  rationale: La construcción griega es una ascripción posesiva del conjunto nominal anterior. «Pertenecen a nuestro Dios» expresa esa relación de pertenencia/asignación de manera natural y fiel.
theological_decisions:
- issue: Tratamiento de Ἁλληλουϊά como exclamación litúrgica
  english_pob_reading: Hallelujah; footnote glosses it as “Praise Yah” or “Praise the LORD.”
  chosen_spanish_reading: ¡Aleluya!
  alternative_spanish_readings:
  - ¡Alabado sea Yah!
  - ¡Alaben a Yahvé!
  rationale: La palabra funciona como grito de alabanza heredado del hebreo dentro del griego apocalíptico. En el cuerpo del texto, transliterarla preserva su carácter litúrgico y evita introducir una paráfrasis interpretativa. La nota puede ofrecer el sentido.
  doctrine_reference: Transliterate liturgical borrowings; preserve semantic gloss in footnotes when helpful.
- issue: Genitivo final de ascripción en “τοῦ θεοῦ ἡμῶν”
  english_pob_reading: belong to our God
  chosen_spanish_reading: pertenecen a nuestro Dios
  alternative_spanish_readings:
  - son de nuestro Dios
  - corresponden a nuestro Dios
  rationale: El griego atribuye la salvación, la gloria y el poder a Dios. En español, «pertenecen a» transmite la idea de posesión/ascripción sin convertir el verso en una afirmación ontológica distinta.
  doctrine_reference: Preserve genitive of possession/ascription without over-explicating beyond the source.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, donde ὡς se entiende como aproximación perceptiva, Ἁλληλουϊά se translitera con nota semántica, y la serie nominal final se vierte como ascripción a Dios. No se detectaron revisiones posteriores que alteraran esas decisiones.
  spanish_consistency_notes:
  - Se mantuvo «Aleluya» como transliteración litúrgica estándar, coherente con una traducción bíblica legible y con el tratamiento del inglés POB.
  - Se eligió «cielo» para οὐρανῷ en sentido celestial, evitando ambigüedad física y conservando el registro bíblico natural en español.
  - Se preservó la serie nominal con artículos («la salvación, la gloria y el poder») para reflejar la estructura enfática del griego.
  - El sujeto colectivo «la gran multitud» permite traducir «λεγόντων» de forma idiomática con «que decía», sin perder la voz coral del pasaje.
