review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido del griego: Juan vio a la bestia, a los reyes de la tierra y a sus ejércitos reunidos con el propósito de hacer guerra contra el que está sentado sobre el caballo y contra su ejército. También preserva bien la decisión teológica de mantener la descripción participial en vez de introducir un título cristológico. Sin embargo, omite dos notas del rastro inglés que sí son significativas: la alternativa léxica para συνηγμένα y la aclaración de que μετά aquí, aunque literalmente es «con», en contexto significa «contra».'
  spanish_quality_summary: El español es claro, natural y digno. «La bestia», «los reyes de la tierra», «sus ejércitos», y «contra su ejército» son buenas elecciones. La frase «hacer guerra» es comprensible, pero en español bíblico y general «hacer la guerra» suena más idiomático sin perder cercanía al original. El resto del versículo lee bien.
  glossary_alignment: El borrador respeta la terminología del proyecto en este versículo. No hay conflicto con Yahvé/Mesías/Espíritu ni con otros términos de glosario. «Bestia» para θηρίον, «ejércitos» para στρατεύματα y la conservación de la descripción «el que está sentado...» están bien alineadas con las decisiones auditadas.
  issues:
  - severity: medium
    issue: Faltan las notas equivalentes a las notas inglesas sobre «reunidos» y sobre el valor adversativo de μετά.
    rationale: El encargo pide preservar alternativas significativas cuando el POB inglés las mantuvo. Aquí se documentan tanto la opción léxica «assembled» como la aclaración de que literalmente es «con», pero en contexto significa «contra».
  - severity: low
    issue: «Hacer guerra» es menos idiomático en español que «hacer la guerra».
    rationale: Ambas expresiones son entendibles, pero «hacer la guerra» suena más natural y estable en español sin apartarse del sentido de ποιῆσαι τὸν πόλεμον.
  revised_spanish_text: Y vi a la bestia, a los reyes de la tierra y a sus ejércitos reunidos[a] para hacer la guerra contra[b] el que está sentado sobre el caballo y contra[b] su ejército.
  revised_footnotes:
  - marker: a
    text: O «congregados».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «con»; en este contexto, el sentido es hostil: «contra».'
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido del borrador porque es fiel al griego y a las decisiones teológicas auditadas, pero se añade la documentación de alternativas que el POB inglés preservó. También se ajusta «hacer guerra» a «hacer la guerra» por mayor naturalidad idiomática en español.
