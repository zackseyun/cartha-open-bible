translation:
  language: es
  text: Y vi a la bestia, a los reyes de la tierra y a sus ejércitos reunidos[a] para hacer la guerra contra[b] el que está sentado sobre el caballo y contra[b] su ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «congregados».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «con»; en este contexto, el sentido es hostil: «contra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θηρίον
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el animal
  - la fiera
  lexicon: BDAG
  rationale: En Apocalipsis, θηρίον es un término apocalíptico cargado; «bestia» conserva ese valor simbólico y ominoso mejor que opciones más genéricas.
- source_word: βασιλεῖς τῆς γῆς
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes de la tierra firme
  - los reyes del mundo
  lexicon: BDAG
  rationale: «Tierra» reproduce bien γῆ en el marco apocalíptico de oposición global; evita reducir indebidamente el alcance a un territorio local.
- source_word: στρατεύματα
  english_pob_choice: armies
  chosen_spanish: ejércitos
  alternatives_spanish:
  - tropas
  - fuerzas
  lexicon: BDAG
  rationale: El contexto bélico de πόλεμος favorece «ejércitos» como equivalente natural y fuerte en español.
- source_word: συνηγμένα
  english_pob_choice: gathered
  chosen_spanish: reunidos
  alternatives_spanish:
  - juntados
  - convocados
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo expresa un estado resultante: estaban ya reunidos. «Reunidos» comunica bien ese estado sin perder naturalidad en español.'
- source_word: ποιῆσαι τὸν πόλεμον
  english_pob_choice: to make war
  chosen_spanish: hacer guerra
  alternatives_spanish:
  - librar guerra
  - hacer la guerra
  lexicon: BDAG
  rationale: La construcción idiomática griega se mantiene con un giro igualmente idiomático en español. «Hacer guerra» preserva la fuerza verbal y la continuidad con el griego.
- source_word: μετὰ τοῦ καθημένου ἐπὶ τοῦ ἵππου
  english_pob_choice: against the one seated on the horse
  chosen_spanish: contra el que está sentado sobre el caballo
  alternatives_spanish:
  - contra el que cabalga sobre el caballo
  - contra el sentado sobre el caballo
  lexicon: BDAG
  rationale: Aunque μετά con genitivo suele ser «con», en este contexto bélico el sentido es hostil. «El que está sentado sobre el caballo» conserva el participio descriptivo sin convertirlo en un título explícito.
- source_word: τοῦ καθημένου
  english_pob_choice: the one seated
  chosen_spanish: el que está sentado
  alternatives_spanish:
  - el sentado
  - el que cabalga
  lexicon: BDAG
  rationale: Se mantiene la expresión descriptiva del griego. «Está sentado» es más natural y claro que un calco rígido, sin imponer «jinete» o «cabalgante».
- source_word: ἐπὶ τοῦ ἵππου
  english_pob_choice: on the horse
  chosen_spanish: sobre el caballo
  alternatives_spanish:
  - en el caballo
  - a caballo
  lexicon: BDAG
  rationale: «Sobre el caballo» reproduce el valor locativo de ἐπί y suena natural en español.
- source_word: μετὰ τοῦ στρατεύματος αὐτοῦ
  english_pob_choice: against his army
  chosen_spanish: contra su ejército
  alternatives_spanish:
  - contra sus ejércitos
  - con su ejército
  lexicon: BDAG
  rationale: El segundo μετά también es adversativo por el contexto de guerra. El singular colectivo «ejército» refleja bien στρατεύματος.
theological_decisions:
- issue: Identidad del que está sentado sobre el caballo
  english_pob_reading: Kept as a descriptive expression rather than explicitly substituting a christological title in the translation.
  chosen_spanish_reading: 'Se mantuvo como expresión descriptiva: «el que está sentado sobre el caballo», sin sustituirla por un título cristológico explícito.'
  alternative_spanish_readings:
  - Cristo
  - Mesías
  - el Mesías
  rationale: El griego de este versículo no usa un título, aunque el contexto inmediato lo identifique. Conservar la frase descriptiva respeta la forma del texto y deja intacta la identificación teológica del pasaje.
  doctrine_reference: Primacía del texto fuente; preservar la tensión teológica sin resolverla por anticipación.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: el inglés auditado no introduce cambios pendientes y el cruce de control muestra alto acuerdo. La versión española sigue de cerca el sentido y las decisiones léxicas documentadas, especialmente en el valor adversativo de μετά y en la conservación de la frase descriptiva para el jinete.'
  spanish_consistency_notes:
  - Se usa «bestia» para θηρίον, en continuidad con el uso apocalíptico documentado.
  - Se usa «tierra» para γῆ por el alcance global del conflicto.
  - Se mantiene la secuencia verbal «hacer guerra» para ποιῆσαι τὸν πόλεμον.
  - Se traduce μετά con valor hostil como «contra» en ambos segmentos.
  - Se conserva la construcción descriptiva «el que está sentado sobre el caballo» sin añadir «Cristo» o «Mesías».
