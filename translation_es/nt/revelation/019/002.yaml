review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en casi todo: «verdaderos y justos» para ἀληθιναὶ καὶ δίκαιαι, «juicios» para κρίσεις, «juzgó» para ἔκρινεν, «la gran prostituta» para πόρνην τὴν μεγάλην, «la tierra» para γῆν, «inmoralidad sexual» para πορνείᾳ y «la sangre de sus esclavos» para τὸ αἷμα τῶν δούλων αὐτοῦ. También conserva correctamente la decisión doctrinal de POB sobre δοῦλος → «esclavos». La principal desviación está en ἥτις ἔφθειρεν: el imperfecto «corrompía» sugiere acción progresiva/habitual más marcada que el inglés auditado y el sentido resumido del pasaje; «corrompió» comunica mejor el acto característico ya juzgado. Además, «vengó la sangre... de su mano» es comprensible, pero en español suena menos natural que una formulación que explicite la justicia/ vindicación desde su mano.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero requiere un ajuste menor para sonar más natural en español bíblico contemporáneo sin perder literalidad. «Corrompía la tierra» y «vengó la sangre... de su mano» producen una combinación algo áspera. Una revisión a «corrompió» y «vindició/hizo justicia por la sangre... de su mano» mejora naturalidad y precisión. Dado que el proyecto valora la fuerza léxica de ἐξεδίκησεν, conviene evitar una frase española que suene extraña o que parezca que Dios “vengó la sangre” como objeto directo sin aclarar el sentido judicial.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: no aparece YHWH; «esclavos» respeta la política para δοῦλος; «prostituta» y «inmoralidad sexual» reflejan las decisiones auditadas. La revisión propuesta mantiene todas esas decisiones y solo mejora dos verbos para adecuación al griego y al español.'
  issues:
  - severity: medium
    issue: «corrompía» para ἔφθειρεν
    rationale: 'Aunque el imperfecto griego puede admitir matiz durativo, en este contexto de alabanza por un juicio ya ejecutado, «corrompió» encaja mejor con la secuencia de acciones completadas («juzgó... e hizo justicia»), además de seguir más de cerca el English POB auditado: «who corrupted the earth».'
  - severity: medium
    issue: «vengó la sangre de sus esclavos de su mano» suena poco natural en español
    rationale: La construcción es demasiado calcada. ἐξεδίκησεν expresa vindicación/justicia retributiva a causa de la sangre derramada; en español conviene explicitar ese valor con «hizo justicia por» o «vindicó», manteniendo «de su mano» como idiomatismo bíblico de agencia.
  revised_spanish_text: porque sus juicios son verdaderos y justos; porque juzgó a la gran prostituta que corrompió la tierra con su inmoralidad sexual, y vindicó la sangre de sus esclavos de su mano[a].
  revised_footnotes:
  - marker: a
    text: O «la sangre de sus siervos». El griego usa δοῦλος, que puede significar «siervo» o «esclavo»; aquí se usa «esclavos» para preservar el sentido más fuerte de pertenencia a un amo.
    reason: alternative_reading
  revision_rationale: Se ajusta «corrompía» a «corrompió» para reflejar mejor la acción presentada como ya juzgada en el contexto. Se cambia «vengó la sangre» por «vindicó la sangre» para expresar de manera más natural y precisa el valor judicial de ἐξεδίκησεν en español, conservando el idiomatismo «de su mano». Se mantiene la nota sobre «esclavos/siervos», pero se recoloca su anclaje en la frase relevante para evitar que parezca ligada a «inmoralidad sexual».
