id: REV.19.2
reference: Revelation 19:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ὅτι ἀληθιναὶ καὶ δίκαιαι αἱ κρίσεις αὐτοῦ· ὅτι ἔκρινεν τὴν πόρνην τὴν μεγάλην ἥτις ⸀ἔφθειρεν τὴν γῆν ἐν τῇ πορνείᾳ αὐτῆς, καὶ ἐξεδίκησεν τὸ αἷμα τῶν δούλων αὐτοῦ ἐκ χειρὸς αὐτῆς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/019/002.yaml
  text: because his judgments are true and just; because he judged the great prostitute who corrupted the earth with her sexual immorality[a], and he avenged the blood of his slaves from her hand.
  footnotes:
  - marker: a
    text: Or 'the blood of his servants.' The Greek word is doulos, which can mean either 'servant' or 'slave'; 'slave' is used here to preserve the stronger sense of belonging to a master.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 569dd57acecb200d9ffe29de00a952feb79a57f542f0f9b0529435a3c29f7dc7
    timestamp: '2026-04-19T00:53:14Z'
    output_hash: 6524ab3ac2aecc7b8735447d4b330b33b312612908afe4b058d938adca1dbaf2
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:08Z'
    unchanged: false
    changes_summary: 'Changed ''has judged''/''has avenged'' to simple past for more natural narrative style; changed ''slaves'' to ''servants'' for better register in this context. Kept the rest as accurate and complete. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: porque sus juicios son verdaderos y justos; porque juzgó a la gran prostituta que corrompió la tierra con su inmoralidad sexual, y vindicó la sangre de sus esclavos de su mano[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la sangre de sus siervos». El griego usa δοῦλος, que puede significar «siervo» o «esclavo»; aquí se usa «esclavos» para preservar el sentido más fuerte de pertenencia a un amo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀληθιναὶ
  english_pob_choice: 'true'
  chosen_spanish: verdaderos
  alternatives_spanish:
  - auténticos
  - genuinos
  lexicon: BDAG
  rationale: En la combinación con «juicios», «verdaderos» expresa que las decisiones de Dios corresponden a la realidad y no son falsas. «Verdaderos y justos» reproduce bien la pareja adjetival griega sin forzar un giro más abstracto.
- source_word: δίκαιαι
  english_pob_choice: just
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - righteous
  lexicon: BDAG
  rationale: Con κρίσεις, «justos» conserva el sentido judicial y moral de δίκαιος. «Rectos» sería posible, pero en español suena menos natural en este contexto paralelo.
- source_word: κρίσεις
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decisiones judiciales
  lexicon: BDAG
  rationale: «Juicios» es la equivalencia más directa y natural para plural judicial en español, manteniendo tanto el matiz forense como el de acto divino de juzgar.
- source_word: ἔκρινεν
  english_pob_choice: he judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - ha juzgado
  - condenó
  lexicon: BDAG
  rationale: El aoristo se vierte en pasado simple para una narración fluida en español. «Juzgó» preserva κρίνω sin cerrar el sentido a mera condena.
- source_word: πόρνην τὴν μεγάλην
  english_pob_choice: the great prostitute
  chosen_spanish: la gran prostituta
  alternatives_spanish:
  - la gran ramera
  - la gran meretriz
  lexicon: BDAG
  rationale: «Prostituta» es preciso y moderno; evita arcaísmos o durezas innecesarias, sin perder la fuerza metafórica del término.
- source_word: ἔφθειρεν
  english_pob_choice: corrupted
  chosen_spanish: corrompía
  alternatives_spanish:
  - destruía
  - arruinaba
  - depravaba
  lexicon: BDAG
  rationale: Aquí φθείρω se entiende en un sentido moral y espiritual, no solo de destrucción física. «Corrompía» preserva ese doble alcance y se ajusta a la imagen apocalíptica.
- source_word: γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el país
  lexicon: BDAG
  rationale: «La tierra» es la opción más natural y amplia en español para el ámbito cósmico de Apocalipsis. «El mundo» sería posible, pero menos literal aquí.
- source_word: πορνείᾳ
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - impureza sexual
  - prostitución
  lexicon: BDAG
  rationale: «Inmoralidad sexual» es una equivalencia clara y ampliamente inteligible para πορνεία. Mantiene el sentido ético-sexual sin introducir un tecnicismo eclesiástico.
- source_word: ἐξεδίκησεν
  english_pob_choice: has avenged
  chosen_spanish: vengó
  alternatives_spanish:
  - hizo justicia a
  - tomó venganza de
  - reivindicó
  lexicon: BDAG
  rationale: El verbo expresa represalia/justicia retributiva en favor de otros. «Vengó» es conciso y directo; el pasado simple armoniza con el resto del versículo en español.
- source_word: τὸ αἷμα τῶν δούλων αὐτοῦ
  english_pob_choice: the blood of his slaves
  chosen_spanish: la sangre de sus esclavos
  alternatives_spanish:
  - la sangre de sus siervos
  - la sangre de sus siervos-esclavos
  lexicon: BDAG
  rationale: Se conserva «esclavos» para seguir la decisión POB de mantener la fuerza de δοῦλος y no suavizarla a «siervos». En este contexto apocalíptico, la pertenencia total a Dios es parte del matiz teológico.
- source_word: ἐκ χειρὸς αὐτῆς
  english_pob_choice: from her hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de parte de ella
  - de su poder
  lexicon: BDAG
  rationale: 'La expresión idiomática se mantiene literalmente: «de su mano». En español suena natural y conserva la imagen de agencia o culpabilidad de la mujer.'
theological_decisions:
- issue: δοῦλοι de Dios en un contexto de martirio y pertenencia
  english_pob_reading: his slaves
  chosen_spanish_reading: sus esclavos
  alternative_spanish_readings:
  - sus siervos
  - sus servidores
  rationale: La lectura POB documentada privilegia «esclavos» para preservar el fuerte sentido de pertenencia a un amo. En este pasaje, donde se habla de la sangre de los mártires, la relación de absoluta pertenencia a Dios es teológicamente significativa y no debe suavizarse.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1; contested term δοῦλος'
- issue: πορνεία como inmoralidad sexual con carga metafórica
  english_pob_reading: sexual immorality
  chosen_spanish_reading: inmoralidad sexual
  alternative_spanish_readings:
  - fornicación
  - prostitución
  - infidelidad sexual
  rationale: La redacción española conserva el valor léxico básico y deja espacio para la interpretación simbólica de Apocalipsis, donde la inmoralidad sexual también funciona como imagen de infidelidad idólatra. No se reduce el término a un solo aspecto figurado en el texto principal.
  doctrine_reference: Apocalipsis 17–19; BDAG πορνεία
- issue: Juicios divinos como verdaderos y justos
  english_pob_reading: his judgments are true and just
  chosen_spanish_reading: sus juicios son verdaderos y justos
  alternative_spanish_readings:
  - sus juicios son verdaderos y rectos
  - sus sentencias son verdaderas y justas
  rationale: 'La pareja adjetival mantiene el énfasis del original: los juicios divinos no solo son correctos, sino conformes a la realidad y moralmente rectos. No se sustituye por una formulación más interpretativa que borre la simetría griega.'
  doctrine_reference: Salmo 19:9; Romanos 2:2
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que temporalmente cambió «slaves» por «servants», pero la corrección posterior restauró «slaves» conforme a la política del proyecto. También se ajustó el tiempo verbal al pasado simple para una lectura narrativa más natural. La versión española sigue la lectura restaurada y mantiene la fuerza de δοῦλος sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino, por lo que no aplica.
  - Se usa «la tierra» para γῆ en coherencia con el alcance cósmico de Apocalipsis.
  - «Verdaderos y justos» preserva la estructura adjetival geminada del griego.
  - La imagen idiomática «de su mano» conserva la agencia culpable sin ampliar el sentido más allá de lo necesario.
