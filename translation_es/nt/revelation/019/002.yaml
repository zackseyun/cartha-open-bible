  to: porque sus juicios son verdaderos y justos; porque juzgó a la gran prostituta que corrompió la tierra con su inmoralidad sexual, y vindicó la sangre de sus esclavos de su mano[a].
  rationale: Se ajusta «corrompía» a «corrompió» para reflejar mejor la acción presentada como ya juzgada en el contexto. Se cambia «vengó la sangre» por «vindicó la sangre» para expresar de manera más natural y precisa el valor judicial de ἐξεδίκησεν en español, conservando el idiomatismo «de su mano». Se mantiene la nota sobre «esclavos/siervos», pero se recoloca su anclaje en la frase relevante para evitar que parezca ligada a «inmoralidad sexual».
