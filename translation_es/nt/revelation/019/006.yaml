base_translation:
  language: en
  yaml_path: translation/nt/revelation/019/006.yaml
  text: And I heard what seemed to be the voice of a great multitude[a], and like the voice of many waters, and like the voice of mighty thunders, saying, “Hallelujah! For the Lord God, the Almighty[b], reigns.”
  footnotes:
  - marker: a
    text: Some manuscripts read “the Lord our God, the Almighty,” while the printed Greek text here reads more literally, “the Lord, the God, the Almighty.”
    reason: textual_variant
  - marker: b
    text: Or “reigns,” “has reigned,” or “has become king”; the Greek verb may be understood as celebrating the decisive manifestation of God's reign.
    reason: lexical_alternative
