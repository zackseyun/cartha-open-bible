translation:
  language: es
  text: 'Y oí como la voz de una gran multitud[a], y como la voz de muchas aguas, y como la voz de fuertes truenos, que decían: «¡Aleluya! Porque reina el Señor Dios, el Todopoderoso[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «el Señor nuestro Dios, el Todopoderoso», mientras que el texto griego impreso aquí dice más literalmente: «el Señor, el Dios, el Todopoderoso».'
    reason: textual_variant
  - marker: b
    text: 'O: «ha reinado» o «ha comenzado a reinar»; el verbo griego también puede entenderse como una proclamación de la manifestación decisiva del reinado de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - oyó
  lexicon: BDAG
  rationale: El aoristo narrativo de ἀκούω se expresa de forma natural y directa con «oí». Mantiene el avance de la visión sin añadir matices no presentes en el griego.
- source_word: ὡς
  english_pob_choice: what seemed to be / like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  - que parecía ser
  lexicon: BDAG
  rationale: En los tres miembros comparativos, «como» conserva la repetición de ὡς y la fuerza visionaria de la comparación sin sobreexplicar.
- source_word: φωνὴν
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: BDAG
  rationale: Aquí la palabra introduce un contenido que habla («que decían»), por lo que «voz» conserva mejor el vínculo entre sonido y proclamación.
- source_word: ὄχλου πολλοῦ
  english_pob_choice: a great multitude
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud grande
  - una vasta multitud
  lexicon: BDAG
  rationale: «Gran multitud» es la correspondencia más natural y elevada en español, y mantiene el carácter apocalíptico del grupo reunido.
- source_word: ὑδάτων πολλῶν
  english_pob_choice: many waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - grandes aguas
  - aguas caudalosas
  lexicon: BDAG
  rationale: Se conserva la imagen bíblica tradicional de «muchas aguas», que en español suena natural y preserva la resonancia intertextual.
- source_word: βροντῶν ἰσχυρῶν
  english_pob_choice: mighty thunders
  chosen_spanish: fuertes truenos
  alternatives_spanish:
  - truenos poderosos
  - truenos recios
  lexicon: BDAG
  rationale: «Fuertes» reproduce bien ἰσχυρῶν en un español claro y digno; evita una formulación demasiado explicativa o afectada.
- source_word: λεγόντων
  english_pob_choice: saying
  chosen_spanish: que decían
  alternatives_spanish:
  - diciendo
  - clamando
  lexicon: BDAG
  rationale: El participio introduce el contenido de la proclamación. «Que decían» fluye bien en español y enlaza de modo natural con la cita directa.
- source_word: Ἁλληλουϊά
  english_pob_choice: Hallelujah
  chosen_spanish: ¡Aleluya!
  alternatives_spanish:
  - ¡Hallelujah!
  - ¡Alabad a Yah!
  lexicon: BDAG
  rationale: 'La exclamación se translitera según el uso litúrgico hispano más extendido: «Aleluya». Se mantiene como aclamación fija sin traducirla perifrásticamente.'
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la aclamación; «Porque» es natural en español y conserva el vínculo causal.
- source_word: ἐβασίλευσεν
  english_pob_choice: reigns
  chosen_spanish: ha reinado
  alternatives_spanish:
  - reina
  - ha comenzado a reinar
  lexicon: BDAG
  rationale: El aoristo de βασιλεύω admite una fuerza de proclamación de realeza consumada o manifestada. «Ha reinado» preserva esa tensión temporal sin forzar un presente simple que en español podría sonar menos marcado; además, evita añadir el matiz inceptivo como interpretación obligatoria.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Amo
  lexicon: BDAG
  rationale: Se mantiene el tratamiento habitual de κύριος en contexto divino como «el Señor», conforme al uso bíblico y al estilo eclesial en español.
- source_word: ὁ θεός
  english_pob_choice: the Lord God / our God (textual note)
  chosen_spanish: el Dios
  alternatives_spanish:
  - nuestro Dios
  - Dios
  lexicon: BDAG
  rationale: El texto griego impreso lee ὁ θεός, literalmente «el Dios». En español, tras «el Señor», la secuencia «el Dios» preserva la redundancia solemne del original y su tensión textual, en vez de sustituirla por una forma posesiva no atestiguada en este testimonio base.
- source_word: ὁ παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: BDAG
  rationale: «Todopoderoso» es el equivalente tradicional y claro de παντοκράτωρ en español, suficientemente solemne y ampliamente inteligible para lectores eclesiales.
theological_decisions:
- issue: Cómo reflejar ἐβασίλευσεν sin resolver indebidamente su matiz temporal/escatológico
  english_pob_reading: reigns / has begun to reign / has reigned
  chosen_spanish_reading: ha reinado
  alternative_spanish_readings:
  - reina
  - ha comenzado a reinar
  rationale: La escena celebra la manifestación decisiva del reinado de Dios. «Ha reinado» conserva el peso proclamativo del aoristo y evita imponer de manera exclusiva un presente atemporal o un matiz inceptivo más fuerte de lo que el texto base exige.
  doctrine_reference: Preservar la tensión salvífico-histórica del texto sin diluir la soberanía divina eterna.
- issue: Tratamiento de ὁ θεός en una fórmula doxológica con posible variación textual
  english_pob_reading: the Lord God, the Almighty
  chosen_spanish_reading: el Señor, el Dios, el Todopoderoso
  alternative_spanish_readings:
  - el Señor Dios, el Todopoderoso
  - el Señor nuestro Dios, el Todopoderoso
  rationale: El SBLGNT aquí presenta «el Señor, el Dios, el Todopoderoso». La traducción debe respetar la secuencia nominal y su solemnidad, y la nota textual puede advertir la forma alterna conocida en la tradición manuscrita sin introducirla en el texto principal.
  doctrine_reference: Primacía del texto fuente y transparencia textual; mantener variantes significativas en nota.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que retiró «our» por no estar en el griego y que prefirió una traducción menos inceptiva de ἐβασίλευσεν. La versión española conserva la transparencia textual de ὁ θεός como «el Dios» y opta por «ha reinado» para mantener el valor proclamativo del aoristo sin sobreinterpretarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el tetragrámaton; κύριος se traduce según su uso divino habitual como «el Señor».
  - «Aleluya» se conserva como aclamación fija, sin glosa explicativa en el texto principal.
  - Se evita normalizar la secuencia solemnemente redundante «el Señor, el Dios, el Todopoderoso», porque forma parte del perfil textual del testimonio base.
