revisions:
- from: Y estaba vestido con un manto empapado en sangre[a], y su nombre es llamado el Verbo de Dios.
  to: Y está vestido con un manto empapado en sangre[a], y su nombre es la Palabra de Dios.
  rationale: Se ajusta el tiempo verbal a un presente estativo más fiel al griego en contexto, y se sustituye «el Verbo de Dios» por «la Palabra de Dios» para alinearse mejor con el English POB, la legibilidad del español contemporáneo y la función titulativa de λόγος en este versículo. También se suaviza la cláusula nominal final a una formulación más idiomática en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:37:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general bien el griego: περιβεβλημένος como estado resultante, ἱμάτιον como prenda exterior elevada, βεβαμμένον αἵματι con la nota alternativa adecuada, κέκληται como designación vigente, y ὁ Λόγος τοῦ Θεοῦ como título cristológico. Sin embargo, dos elecciones debilitan la fidelidad final: «estaba vestido» introduce un pasado imperfecto que no corresponde al valor presente/estativo del participio perfecto en este contexto visionario, y «el Verbo de Dios» se aparta innecesariamente del English POB y de la legibilidad española más natural para λόγος como título aquí.'
  spanish_quality_summary: El español es en general claro y digno, pero «estaba vestido» suena narrativamente desplazado frente al presente descriptivo más natural «está vestido». «Es llamado» es comprensible, aunque en español bíblico moderno «se llama» o «su nombre es» sería más idiomático; aun así, «es llamado» puede mantenerse por cercanía formal. «La Palabra de Dios» es más transparente y eclesialmente legible que «el Verbo de Dios» en este versículo.
  glossary_alignment: No hay conflicto con Yahvé/Mesías/etc. Para λόγος, el proyecto no impone un equivalente fijo, pero el English POB documenta 'the Word of God'; en español, «la Palabra de Dios» preserva mejor ese valor titulativo que «el Verbo de Dios» sin recurrir a una formulación más técnica y menos accesible.
  issues:
  - severity: medium
    issue: «estaba vestido con» para περιβεβλημένος
    rationale: El griego describe el estado actual del jinete en la visión; «estaba vestido» introduce un matiz imperfectivo/pasado que no está exigido por el texto. «Está vestido con» o «va vestido con» preserva mejor el estado presente.
  - severity: medium
    issue: «el Verbo de Dios» para ὁ Λόγος τοῦ Θεοῦ
    rationale: Aunque teológicamente posible y tradicional en algunos contextos joánicos, aquí el English POB auditó «the Word of God». En español general, «la Palabra de Dios» comunica mejor el título sin tecnicismo innecesario ni cambio de registro conceptual.
  - severity: low
    issue: «es llamado» es algo rígido en español
    rationale: No es incorrecto, pero suena menos natural que «se llama» o «su nombre es». Puede conservarse por formalidad, aunque una leve mejora estilística ayudaría.
  revised_spanish_text: Y está vestido con un manto empapado en sangre[a], y su nombre es la Palabra de Dios.
  revised_footnotes:
  - marker: a
    text: O «manchado de sangre». El verbo griego significa más literalmente «sumergido» o «teñido».
    reason: lexical_alternative
  revision_rationale: Se ajusta el tiempo verbal a un presente estativo más fiel al griego en contexto, y se sustituye «el Verbo de Dios» por «la Palabra de Dios» para alinearse mejor con el English POB, la legibilidad del español contemporáneo y la función titulativa de λόγος en este versículo. También se suaviza la cláusula nominal final a una formulación más idiomática en español.
