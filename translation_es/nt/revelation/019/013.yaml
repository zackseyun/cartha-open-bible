translation:
  language: es
  text: Y está vestido con un manto empapado en sangre[a], y su nombre es la Palabra de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manchado de sangre». El verbo griego significa más literalmente «sumergido» o «teñido».
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβεβλημένος
  english_pob_choice: is clothed in
  chosen_spanish: estaba vestido con
  alternatives_spanish:
  - vestido
  - cubierto con
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante y permanente; en español, «estaba vestido con» comunica bien ese estado sin sonar forzado. Mantiene el valor aspectual mejor que un simple presente estático.
- source_word: ἱμάτιον
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - ropa
  - vestidura
  - túnica
  lexicon: BDAG
  rationale: ἱμάτιον es una prenda exterior general. «Manto» conserva el registro elevado y la imagen visual de la escena, sin precisar indebidamente el tipo exacto de prenda.
- source_word: βεβαμμένον αἵματι
  english_pob_choice: dipped in blood
  chosen_spanish: empapado en sangre
  alternatives_spanish:
  - sumergido en sangre
  - teñido con sangre
  - manchado de sangre
  lexicon: BDAG
  rationale: 'El verbo βάπτω significa literalmente sumergir o mojar. «Empapado en sangre» conserva la intensidad visual y el resultado de la acción, aunque en español suena más natural que «sumergido en sangre». Se mantiene la tensión entre la imagen literal de inmersión y la posibilidad interpretativa de «manchado». '
- source_word: κέκληται
  english_pob_choice: is called
  chosen_spanish: es llamado
  alternatives_spanish:
  - ha sido llamado
  - lleva por nombre
  lexicon: BDAG
  rationale: El perfecto pasivo de καλέω expresa un nombre/título vigente. «Es llamado» conserva la identificación nominal y funciona bien en español bíblico sin perder el valor resultante del perfecto.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: BDAG
  rationale: Es la manera idiomática normal de expresar el posesivo griego. Mantiene la claridad y la fluidez en español.
- source_word: ὁ Λόγος τοῦ Θεοῦ
  english_pob_choice: the Word of God
  chosen_spanish: el Verbo de Dios
  alternatives_spanish:
  - la Palabra de Dios
  - la Palabra de Yahvé
  lexicon: BDAG
  rationale: Aquí λόγος funciona como título cristológico personal. «Verbo» conserva el peso técnico y tradicional del título en un registro teológico elevado; «Palabra» sería más transparente para el lector moderno, pero puede perder parte de la resonancia titulativa y filosófico-teológica del griego.
theological_decisions:
- issue: Título cristológico λόγος
  english_pob_reading: the Word of God
  chosen_spanish_reading: el Verbo de Dios
  alternative_spanish_readings:
  - la Palabra de Dios
  - el Mensaje de Dios
  rationale: En el contexto apocalíptico, ὁ Λόγος τοῦ Θεοῦ no describe solo un contenido verbal, sino un título personal del jinete. «Verbo de Dios» preserva esa función titulativa y sugiere la continuidad con el uso joánico de λόγος, sin reducirlo a «mensaje».
  doctrine_reference: Affirmations; Translation philosophy §2
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente griego y el audit trail inglés: mantiene la imagen de una prenda teñida/sumergida en sangre, conserva el perfecto pasivo de los verbos principales y traduce el título cristológico λόγος como un nombre propio-teológico. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se usó «Verbo» en lugar de «Palabra» por la función titulativa de λόγος y para mantener coherencia con una terminología cristológica elevada en este pasaje.
  - Se prefirió «manto» sobre «ropa» o «vestidura» por su naturalidad y dignidad en español litúrgico-bíblico.
  - La nota a pie conserva la alternativa interpretativa documentada por el audit trail inglés y señala la relación entre la metáfora de «empapado» y el sentido más literal de βάπτω.
