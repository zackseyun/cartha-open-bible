  to: Y los demás fueron muertos con la espada del que estaba sentado sobre el caballo[a], la espada que salió de su boca[b], y todas las aves se saciaron con sus carnes.
  rationale: Se corrige una nota léxicamente incorrecta («degollados»), se ajusta «salía» a «salió» para reflejar mejor el participio aoristo griego y se suaviza la puntuación para seguir la coordinación del original. Se conserva el resto de la redacción porque mantiene bien la imagen y la literalidad del pasaje.
