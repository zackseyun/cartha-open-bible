translation:
  language: es
  text: Y los demás fueron muertos con la espada del que estaba sentado sobre el caballo[a], la espada que salió de su boca[b], y todas las aves se saciaron con sus carnes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron muertos»; también, de forma más tradicional, «fueron muertos» o «fueron muertos a espada».
    reason: lexical_alternative
  - marker: b
    text: La «espada» que salió de su boca es una imagen apocalíptica; compárese con Ap 19:15.
    reason: cross_reference
lexical_decisions:
- source_word: οἱ λοιποὶ
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los restantes
  lexicon: BDAG
  rationale: Conserva el valor colectivo de οἱ λοιποὶ sin añadir matices innecesarios. «Los demás» es natural en español y corresponde bien al conjunto que queda tras el juicio descrito antes.
- source_word: ἀπεκτάνθησαν
  english_pob_choice: were killed
  chosen_spanish: fueron muertos
  alternatives_spanish:
  - fueron asesinados
  - fueron matados
  lexicon: BDAG
  rationale: Mantiene la pasiva y el tono sobrio del pasaje. «Fueron muertos» es idiomático en registro bíblico y refleja de modo directo el hecho pasivo de ἀποκτείνω.
- source_word: ἐν τῇ ῥομφαίᾳ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: BDAG
  rationale: La preposición ἐν con instrumento se puede verter naturalmente como «con» en español. «Espada» preserva la imagen concreta de ῥομφαία sin diluirla.
- source_word: τοῦ καθημένου ἐπὶ τοῦ ἵππου
  english_pob_choice: of the one seated on the horse
  chosen_spanish: del que estaba sentado sobre el caballo
  alternatives_spanish:
  - del que se sienta sobre el caballo
  - del jinete sobre el caballo
  lexicon: BDAG
  rationale: La construcción participial se vuelve en una forma fluida y fiel en español. Se conserva la imagen del personaje entronizado/sentado sobre el caballo, sin explicitar «jinete» para no añadir un elemento no dicho en el griego.
- source_word: τῇ ἐξελθούσῃ ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: the sword that came out of his mouth
  chosen_spanish: la espada que salía de su boca
  alternatives_spanish:
  - la espada que salió de su boca
  - la espada que procedía de su boca
  lexicon: BDAG
  rationale: Se mantiene la imaginería apocalíptica concreta. El imperfecto/participio atributivo se vierte de forma natural como «salía», sin resolver el símbolo en el texto principal. «Boca» corresponde literalmente a στόμα.
- source_word: πάντα τὰ ὄρνεα
  english_pob_choice: all the birds
  chosen_spanish: todas las aves
  alternatives_spanish:
  - todas las aves de rapiña
  - todos los pájaros
  lexicon: BDAG
  rationale: «Aves» es más amplio y solemne que «pájaros», y no añade el rasgo de carroñeras que el griego no explicita. Puede entenderse el trasfondo sin sobretraducirlo.
- source_word: ἐχορτάσθησαν
  english_pob_choice: were filled
  chosen_spanish: se saciaron
  alternatives_spanish:
  - quedaron llenas
  - fueron llenadas
  lexicon: BDAG
  rationale: El pasivo de χορτάζω admite la idea de quedar plenamente satisfechas. En español, «se saciaron» suena natural y comunica la plenitud del acto en este contexto de juicio, sin volverlo más crudo de lo que el griego exige.
- source_word: ἐκ τῶν σαρκῶν αὐτῶν
  english_pob_choice: from their flesh
  chosen_spanish: con sus carnes
  alternatives_spanish:
  - de sus carnes
  - de su carne
  lexicon: BDAG
  rationale: σάρξ aquí es literal y física; «carnes» conserva el matiz corpóreo y resultaría más vívido en español que «carne» en singular. Aunque ἐκ puede ser «de/from», en este contexto la idea resultante en español se expresa de forma natural con «con» para la saciedad de las aves.
theological_decisions:
- issue: La espada que sale de la boca del personaje entronizado
  english_pob_reading: Retain the concrete apocalyptic image 'the sword ... that came out of his mouth' without interpreting it in the main text as a metaphor for his word.
  chosen_spanish_reading: 'Mantener la imagen concreta: «la espada que salía de su boca», sin explicarla en el texto principal como «su palabra» o «su juicio».'
  alternative_spanish_readings:
  - la espada, es decir, su palabra
  - la espada, o sea, su juicio
  rationale: El pasaje presenta una imagen simbólica ya reconocible dentro de Apocalipsis. La traducción debe conservar la tensión y no resolverla interpretativamente en la línea principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión menor que precisó la instrumentación ('with the sword'), simplificó la expresión de procedencia ('out of his mouth') y ajustó la clausula final a 'filled with their flesh'. La versión española sigue ese estado más reciente, procurando mantener la misma estabilidad semántica y la imaginería apocalíptica sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se emplea «espada» para ῥομφαία, siguiendo el valor léxico reconocido en el contexto apocalíptico.
  - Se usa «carne/carnes» para σάρξ en sentido literal, no metafórico.
  - Se evita «SEÑOR» y otras sustituciones no presentes en este versículo.
  - La voz pasiva se conserva donde el griego la marca, con una formulación natural en español.
  - El registro es bíblico y sobrio, sin arcaismos innecesarios.
