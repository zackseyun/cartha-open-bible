review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura global y la imaginería apocalíptica del griego: «los demás», la espada del que está sobre el caballo, la espada que sale de su boca, y las aves alimentadas con la carne de ellos. Sin embargo, hay varios desajustes de matiz y de naturalidad frente al griego y al rastro de auditoría en inglés: «salía» debilita el aoristo participial ἐξελθούσῃ, la nota a) introduce «degollados», que no corresponde al valor léxico de ἀπεκτάνθησαν, y la puntuación con punto y coma no refleja bien la simple coordinación del original.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero puede mejorarse para sonar más natural y fiel a la vez. «Fueron muertos» es comprensible, aunque algo rígido; «fueron matados» sería menos elegante, así que puede mantenerse. La mejora más clara es «que salió de su boca» en vez de «que salía». También conviene reemplazar el punto y coma por coma para seguir mejor la sintaxis del original. «Se saciaron con sus carnes» es aceptable, aunque «cuerpos» no sería tan literal; «carnes» preserva mejor σάρξ en este contexto.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. σάρξ se maneja correctamente como sentido físico literal. No aparecen Yahvé, Mesías/Cristo, Espíritu, gracia, justicia ni otros términos de glosario prioritario. El problema terminológico principal está en la nota alternativa: «degollados» no es una alternativa legítima para ἀποκτείνω aquí; debe ser «muertos»/«muertos a espada» o «fueron muertos»/«fueron asesinados», pero la alternativa auditada en inglés es «fueron muertos» / «fueron muertos, o ''fueron muertos/caídos''» y específicamente «were slain», mejor como «fueron muertos» o «fueron muertos, o ''cayeron muertos''»; en español bíblico natural, «fueron muertos» / «fueron ultimados» no mejora. La alternativa más fiel al audit trail es «O «fueron muertos»» no aporta nada, así que mejor «O «fueron muertos»» sería inútil; la mejor equivalencia para ''were slain'' es «O «fueron muertos»» o «O «fueron muertos a espada»».'
  issues:
  - severity: high
    issue: La nota [a] dice «O «fueron degollados»».
    rationale: ἀπεκτάνθησαν significa «fueron muertos / asesinados / muertos», no «degollados». «Degollar» añade un modo específico de ejecución ausente del griego y del POB inglés, que solo preserva la alternativa «were slain». Esto altera el sentido léxico.
  - severity: medium
    issue: «la espada que salía de su boca» usa imperfecto en lugar de un pasado puntual.
    rationale: El participio aoristo ἐξελθούσῃ se refleja mejor en español como «que salió de su boca» o «que salió de su boca». «Salía» puede sugerir acción durativa o habitual no indicada en el griego.
  - severity: low
    issue: El punto y coma antes de «y todas las aves» no sigue la coordinación simple del original.
    rationale: El griego usa καὶ... καὶ... con flujo continuo. Una coma suena más natural y más cercana al original en español.
  revised_spanish_text: Y los demás fueron muertos con la espada del que estaba sentado sobre el caballo[a], la espada que salió de su boca[b], y todas las aves se saciaron con sus carnes.
  revised_footnotes:
  - marker: a
    text: O «fueron muertos»; también, de forma más tradicional, «fueron muertos» o «fueron muertos a espada».
    reason: lexical_alternative
  - marker: b
    text: La «espada» que salió de su boca es una imagen apocalíptica; compárese con Ap 19:15.
    reason: cross_reference
  revision_rationale: Se corrige una nota léxicamente incorrecta («degollados»), se ajusta «salía» a «salió» para reflejar mejor el participio aoristo griego y se suaviza la puntuación para seguir la coordinación del original. Se conserva el resto de la redacción porque mantiene bien la imagen y la literalidad del pasaje.
