translation:
  language: es
  text: 'Y los veinticuatro ancianos y los cuatro seres vivientes se postraron y adoraron a Dios, el que está sentado sobre el trono, diciendo: «¡Amén! ¡Aleluya!»[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «¡Alaben a Yahvé!»; lit. «¡Alaben a Yah!», una aclamación litúrgica hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεσαν
  english_pob_choice: fell down
  chosen_spanish: cayeron
  alternatives_spanish:
  - se postraron
  - se arrojaron
  lexicon: BDAG
  rationale: El griego aoristo de πίπτω expresa aquí una caída/prostración reverente en contexto de adoración. En español, ‘cayeron’ conserva el movimiento básico sin sobrerreformular; el contexto de adoración ya hace patente el gesto de reverencia.
- source_word: πρεσβύτεροι οἱ εἴκοσι τέσσαρες
  english_pob_choice: the twenty-four elders
  chosen_spanish: los veinticuatro ancianos
  alternatives_spanish:
  - los veinticuatro presbíteros
  lexicon: BDAG
  rationale: πρεσβύτεροι en Apocalipsis se entiende naturalmente como ‘ancianos’. ‘Presbíteros’ sería más técnico y menos transparente para el lector; ‘ancianos’ preserva el uso apocalíptico habitual.
- source_word: τὰ τέσσαρα ζῷα
  english_pob_choice: the four living creatures
  chosen_spanish: los cuatro seres vivientes
  alternatives_spanish:
  - las cuatro criaturas vivientes
  - los cuatro seres vivos
  lexicon: BDAG
  rationale: ζῷα aquí no son animales comunes, sino seres del trono. ‘Seres vivientes’ mantiene la distinción reverente y es la forma española más establecida para este referente en Apocalipsis.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron ante
  - rindieron homenaje a
  lexicon: BDAG
  rationale: Con el objeto explícito ‘Dios’, el verbo denota adoración y no mera reverencia civil. ‘Adoraron’ comunica de manera natural la acción cúltica en español.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - a Dios
  lexicon: BDAG
  rationale: El dativo griego se refleja naturalmente con la preposición ‘a’ en español tras ‘adorar’. Mantiene claridad sintáctica y el sentido directo del objeto.
- source_word: τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  english_pob_choice: the one seated on the throne
  chosen_spanish: el que está sentado sobre el trono
  alternatives_spanish:
  - el que se sienta en el trono
  - el sentado sobre el trono
  lexicon: BDAG
  rationale: La frase participial funciona sustantivamente y es fórmula recurrente del libro. ‘El que está sentado sobre el trono’ es natural, reconoce la fórmula apocalíptica y conserva el aspecto estativo del participio.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio presente enlaza el acto de adoración con la aclamación que sigue. ‘Diciendo’ conserva esa continuidad sin añadir un nuevo verbo narrativo.
- source_word: Ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: BDAG
  rationale: Como aclamación litúrgica, se conserva por transliteración tradicional en español. ‘Amén’ es la forma reconocible y fiel al uso eclesial y bíblico.
- source_word: Ἁλληλουϊά
  english_pob_choice: Hallelujah
  chosen_spanish: Aleluya
  alternatives_spanish:
  - Hallelujah
  - ¡Alabad a Yah!
  lexicon: BDAG
  rationale: La aclamación hebrea ya está naturalizada en español como ‘Aleluya’. Mantiene la fuerza litúrgica y evita una traducción más interpretativa dentro del texto principal.
theological_decisions:
- issue: Tratamiento de Ἁλληλουϊά como aclamación litúrgica hebrea dentro del griego
  english_pob_reading: Hallelujah
  chosen_spanish_reading: Aleluya
  alternative_spanish_readings:
  - Hallelujah
  - ¡Alabad a Yah!
  - ¡Alabad al SEÑOR!
  rationale: El término funciona aquí como exclamación fija de alabanza, no como una proposición ordinaria. En español, ‘Aleluya’ preserva la forma litúrgica ya asentada; la idea subyacente de ‘Alabad a Yah’ queda reconocida en la nota, sin sobrecargar el cuerpo del texto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; YHWH default ''Yahvé'' en el texto principal, con excepciones cuando la expresión es una aclamación fija'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la palabra correspondiente.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como término por defecto solo cuando corresponde al nombre divino; aquí no aparece en el cuerpo porque la forma griega Ἁλληλουϊά es una aclamación fija.
  - Se evitó ‘Señor’ en el texto principal para no ocultar el sentido del hebreo incorporado en la exclamación.
  - Se conservaron los términos apocalípticos estables ‘ancianos’ y ‘seres vivientes’ para armonía terminológica dentro de Apocalipsis.
