revisions:
- from: 'Y cayeron los veinticuatro ancianos y los cuatro seres vivientes, y adoraron a Dios[a], el que está sentado sobre el trono, diciendo: «¡Amén! ¡Aleluya!»'
  to: 'Y los veinticuatro ancianos y los cuatro seres vivientes se postraron y adoraron a Dios, el que está sentado sobre el trono, diciendo: «¡Amén! ¡Aleluya!»[a]'
  rationale: Se ajusta ἔπεσαν a «se postraron» para reflejar mejor el gesto de reverencia cultual en español natural. Se mueve la nota al pie para anclarla en «Aleluya», que es donde pertenece la alternativa léxica. La nota se normaliza al español y se alinea con la política del proyecto usando «Yahvé» en la alternativa explicativa, mientras conserva la opción más literal «Yah».
  reviewer_model: gpt-5.4
