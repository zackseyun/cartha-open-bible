translation:
  language: es
  text: 'Y me dice: «Escribe: Bienaventurados los que han sido invitados[a] a la cena de bodas[b] del Cordero». Y me dice: «Estas son las palabras verdaderas[c] de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamados». El participio puede expresar tanto invitación como llamado; el contexto del banquete favorece «invitados».
    reason: lexical_alternative
  - marker: b
    text: O «banquete de bodas». «Cena de bodas» sigue más de cerca el sentido de δεῖπνον, mientras que «banquete de bodas» resalta la dimensión festiva.
    reason: alternative_reading
  - marker: c
    text: O «confiables» o «fidedignas»; la frase afirma que este mensaje realmente viene de Dios y merece plena confianza.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γράψον
  english_pob_choice: Write
  chosen_spanish: Escribe
  alternatives_spanish:
  - Escribe esto
  lexicon: BDAG
  rationale: El imperativo aoristo singular pide una orden directa y breve; «Escribe» reproduce esa inmediatez en español sin añadir contenido.
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: En un dicho bienaventurante del Apocalipsis, «Bienaventurados» conserva el tono solemne y bíblico mejor que opciones más subjetivas como «felices».
- source_word: οἱ εἰς τὸ δεῖπνον ... κεκλημένοι
  english_pob_choice: those who have been invited to ... supper
  chosen_spanish: los que han sido invitados
  alternatives_spanish:
  - los que han sido llamados
  - los invitados
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo expresa un estado resultante: personas que ya están en condición de haber recibido invitación. «Han sido invitados» comunica bien ese valor sin imponer la lectura más técnica de «llamados».'
- source_word: δεῖπνον
  english_pob_choice: supper
  chosen_spanish: banquete
  alternatives_spanish:
  - cena
  - comida
  - supper
  lexicon: BDAG
  rationale: En español, «banquete» funciona mejor en este contexto escatológico y festivo que «cena», que podría sonar demasiado cotidiano o restringido a una hora del día.
- source_word: γάμου
  english_pob_choice: wedding
  chosen_spanish: de bodas
  alternatives_spanish:
  - nupcial
  - de matrimonio
  lexicon: BDAG
  rationale: Aunque γάμος puede ser «matrimonio», en esta construcción con δεῖπνον la idea es la fiesta de bodas. «De bodas» expresa naturalmente la imagen celebrativa en español.
- source_word: τοῦ ἀρνίου
  english_pob_choice: of the Lamb
  chosen_spanish: del Cordero
  alternatives_spanish:
  - del Cordero de Dios
  lexicon: BDAG
  rationale: «Cordero» mantiene el título cristológico ya fijado en Apocalipsis. No se añade «de Dios» porque el texto griego solo dice «del Cordero».
- source_word: Οὗτοι οἱ λόγοι
  english_pob_choice: These are the words
  chosen_spanish: Estas son las palabras
  alternatives_spanish:
  - Estas palabras son
  lexicon: BDAG
  rationale: La estructura demostrativa se vuelve naturalmente una oración copulativa en español; «Estas son las palabras» mantiene el orden idiomático.
- source_word: ἀληθινοὶ
  english_pob_choice: 'true'
  chosen_spanish: verdaderas
  alternatives_spanish:
  - verdaderas y fieles
  - auténticas
  lexicon: BDAG
  rationale: «Verdaderas» reproduce el valor directo de ἀληθινός y conserva la afirmación de veracidad/reliabilidad sin sobrecargar el sentido.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedentes de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: El genitivo se traduce de manera directa y sobria como «de Dios»; el contexto ya comunica que estas palabras proceden de él.
theological_decisions:
- issue: 'κεκλημένοι: ¿«invitados» o «llamados»?'
  english_pob_reading: invited
  chosen_spanish_reading: invitados
  alternative_spanish_readings:
  - llamados
  rationale: En la imagen de un banquete, «invitados» expresa de forma más clara la fuerza idiomática del participio. Se preserva la alternativa «llamados» porque el verbo griego permite esa lectura y algunos lectores pueden oír allí un eco de llamado eficaz; sin embargo, el contexto inmediato favorece la invitación al banquete.
  doctrine_reference: Translation philosophy §3, §6
- issue: 'δεῖπνον τοῦ γάμου: ¿«banquete de bodas» o «cena/matrimonio»?'
  english_pob_reading: wedding supper
  chosen_spanish_reading: banquete de bodas
  alternative_spanish_readings:
  - cena de bodas
  - banquete nupcial
  - matrimonio
  rationale: «Banquete de bodas» suena natural en español y conserva el carácter festivo y ceremonial de la escena. «Cena» puede sonar demasiado restringido a la hora del día, y «matrimonio» no expresa tan bien la comida festiva que el texto presenta.
  doctrine_reference: Translation philosophy §1, §6
- issue: 'ἀληθινοὶ τοῦ θεοῦ: veracidad y procedencia'
  english_pob_reading: true words of God
  chosen_spanish_reading: las palabras verdaderas de Dios
  alternative_spanish_readings:
  - palabras fieles de Dios
  - palabras auténticas de Dios
  rationale: «Verdaderas» mantiene tanto la idea de verdad como la de confiabilidad. La frase no solo afirma contenido veraz, sino que subraya que estas palabras realmente provienen de Dios y pueden recibirse con plena confianza.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail en inglés. No se requiere revisión adicional según el último pase, que quedó sin cambios y con alta concordancia.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Cordero» para ἀρνίον, en coherencia con la terminología estándar del proyecto.
  - Se evita «SEÑOR» porque aquí no aparece κύριος ni una cita del nombre divino.
  - Se prefirió «banquete de bodas» sobre un calco más literal para conservar naturalidad sin perder la imagen escatológica.
  - Se mantiene la distinción entre la invitación al banquete y la afirmación de veracidad de las palabras de Dios.
