  text: Καὶ λέγει μοι· Γράψον· Μακάριοι οἱ εἰς τὸ δεῖπνον τοῦ γάμου τοῦ ἀρνίου κεκλημένοι. καὶ λέγει μοι· Οὗτοι οἱ λόγοι ἀληθινοὶ τοῦ θεοῦ εἰσιν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/019/009.yaml
  text: 'And he says to me[a], “Write: Blessed are those who have been invited to the wedding supper of the Lamb.” And he says to me[c][b], “These are the true words of God.”'
