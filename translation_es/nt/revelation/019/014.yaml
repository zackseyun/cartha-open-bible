review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: «los ejércitos ... lo seguían ... sobre caballos blancos, vestidos de lino fino, blanco y limpio». También preserva correctamente la ambigüedad sobre la identidad de los ejércitos y mantiene la nota alternativa de «del cielo». Sin embargo, «que están en el cielo» cambia el aspecto verbal-no marcado del sintagma nominal griego por una relativa en presente («están»), mientras que «en el cielo» reproduce de forma más directa y natural la construcción locativa. Además, «sobre caballos blancos» es comprensible, pero «en caballos blancos»/«montados en caballos blancos» suena más idiomático en español bíblico moderno; aquí conviene una solución natural sin añadir demasiado.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse para mayor naturalidad y cercanía al griego. «Los ejércitos en el cielo» suena más directo y menos analítico que «los ejércitos que están en el cielo». También es preferible evitar «sobre caballos blancos» en favor de una formulación más idiomática. El resto —«vestidos de lino fino, blanco y limpio»— funciona bien y conserva el paralelismo adjetival.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ejércitos», «cielo», «lino fino», «blanco y limpio» están bien alineados con las decisiones léxicas auditadas. La revisión propuesta solo ajusta naturalidad y precisión estructural.
  issues:
  - severity: medium
    issue: «que están en el cielo» explicita con una relativa verbal lo que el griego expresa nominalmente como localización.
    rationale: τὰ ἐν τῷ οὐρανῷ es literalmente «los [que están] en el cielo»/«los en el cielo»; en español, «los ejércitos en el cielo» transmite la localización de manera más directa y más cercana al POB inglés «the armies in heaven», sin introducir el presente «están».
  - severity: low
    issue: «sobre caballos blancos» es menos idiomático en español actual para jinetes o fuerzas montadas.
    rationale: Aunque no es incorrecto, «sobre» suena algo rígido. «En caballos blancos» es una opción breve y natural en registro bíblico, y preserva bien ἐφ’ ἵπποις λευκοῖς sin expansión interpretativa.
  revised_spanish_text: Y los ejércitos[a] en el cielo lo seguían en caballos blancos, vestidos de lino fino, blanco y limpio.
  revised_footnotes:
  - marker: a
    text: O «los ejércitos del cielo». La frase griega es literalmente «los ejércitos, los que están en el cielo».
    reason: lexical_alternative
  revision_rationale: La revisión hace el sintagma locativo más directo y más fiel a la estructura griega y al audit trail inglés («in heaven»), y mejora la naturalidad de la frase montada en español sin alterar el sentido. No introduce cambios teológicos ni terminológicos sustanciales.
