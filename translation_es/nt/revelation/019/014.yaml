translation:
  language: es
  text: Y los ejércitos[a] en el cielo lo seguían en caballos blancos, vestidos de lino fino, blanco y limpio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ejércitos del cielo». La frase griega es literalmente «los ejércitos, los que están en el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατεύματα
  english_pob_choice: armies
  chosen_spanish: ejércitos
  alternatives_spanish:
  - huestes
  - tropas
  lexicon: BDAG
  rationale: El plural στρατεύματα designa fuerzas militares organizadas. En español, «ejércitos» comunica con claridad ese matiz colectivo y bélico sin sonar arcaico; «huestes» sería posible pero más tradicional, y «tropas» suena menos solemne en este contexto apocalíptico.
- source_word: τὰ ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: que están en el cielo
  alternatives_spanish:
  - del cielo
  - en el cielo
  lexicon: BDAG
  rationale: La frase es locativa y caracteriza a los ejércitos por su ubicación. «Que están en el cielo» conserva la relación explícita de ubicación y ayuda a mantener la ambigüedad identitaria del texto; «del cielo» podría sonar más posesivo o interpretativo.
- source_word: ἠκολούθει αὐτῷ
  english_pob_choice: were following him
  chosen_spanish: lo seguían
  alternatives_spanish:
  - lo estaban siguiendo
  - seguían detrás de él
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso dentro de la visión. En español, «lo seguían» transmite bien esa continuidad sin recargar la frase; «lo estaban siguiendo» es más analítico, y «seguían detrás de él» añade una idea no explicitada.
- source_word: ἐφ’ ἵπποις λευκοῖς
  english_pob_choice: on white horses
  chosen_spanish: sobre caballos blancos
  alternatives_spanish:
  - en caballos blancos
  - montados en caballos blancos
  lexicon: BDAG
  rationale: La preposición con dativo indica que van montados. «Sobre caballos blancos» es natural y fiel; «montados en caballos blancos» explicita la idea pero añade material interpretativo, y «en caballos blancos» suena menos idiomático en español.
- source_word: ἐνδεδυμένοι
  english_pob_choice: clothed
  chosen_spanish: vestidos
  alternatives_spanish:
  - ataviados
  - cubiertos
  lexicon: BDAG
  rationale: El participio describe el estado de estar revestidos. «Vestidos» es claro, digno y suficientemente literal; «ataviados» es más literario, y «cubiertos» no reproduce bien la idea de indumentaria.
- source_word: βύσσινον
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino de fino
  - lino de calidad
  lexicon: BDAG
  rationale: βύσσινον refiere a lino costoso o fino. «Lino fino» comunica el material y su calidad con naturalidad en español y coincide con el valor simbólico del texto.
- source_word: λευκὸν καθαρόν
  english_pob_choice: white and clean
  chosen_spanish: blanco y limpio
  alternatives_spanish:
  - blanco y puro
  - brillante y limpio
  lexicon: BDAG
  rationale: Los dos adjetivos modifican el lino. «Blanco y limpio» preserva la imagen visual y la connotación de pureza sin intensificar καθαρόν a «puro», lo cual podría ir más allá del énfasis inmediato del griego.
theological_decisions:
- issue: Identidad de los ejércitos celestiales
  english_pob_reading: Render descriptively as 'the armies in heaven' without specifying whether they are angels, saints, or both.
  chosen_spanish_reading: Traducir descriptivamente como «los ejércitos que están en el cielo», sin precisar si son ángeles, santos glorificados o ambos.
  alternative_spanish_readings:
  - los ejércitos del cielo
  - las huestes celestiales, es decir, ángeles
  - las huestes celestiales, es decir, santos glorificados
  rationale: El griego identifica su ubicación y apariencia, pero no define explícitamente su identidad en este versículo. La traducción conserva esa reserva textual y evita importar una conclusión interpretativa no exigida por el pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla indebidamente.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene la forma progresiva del imperfecto, la ambigüedad controlada sobre la identidad de los ejércitos y la descripción visual del lino sin intensificar «clean» a «puro». No hay revisiones aplicadas en el expediente inglés, por lo que no se introducen cambios adicionales.'
  spanish_consistency_notes:
  - Se conserva «cielo» para τῷ οὐρανῷ, en línea con el registro apocalíptico del pasaje.
  - «Lino fino» y «blanco y limpio» mantienen la serie adjetival del original sin sustituirla por terminología litúrgica tradicional.
  - La nota al pie se ancla en «ejércitos» para reflejar la alternativa lexical documentada en el audit trail inglés.
