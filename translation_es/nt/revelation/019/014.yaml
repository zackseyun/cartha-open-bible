- from: Y los ejércitos[a] que están en el cielo lo seguían sobre caballos blancos, vestidos de lino fino, blanco y limpio.
  to: Y los ejércitos[a] en el cielo lo seguían en caballos blancos, vestidos de lino fino, blanco y limpio.
  rationale: La revisión hace el sintagma locativo más directo y más fiel a la estructura griega y al audit trail inglés («in heaven»), y mejora la naturalidad de la frase montada en español sin alterar el sentido. No introduce cambios teológicos ni terminológicos sustanciales.
