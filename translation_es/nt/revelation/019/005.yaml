id: REV.19.5
reference: Revelation 19:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: Καὶ φωνὴ ἀπὸ τοῦ θρόνου ἐξῆλθεν λέγουσα· Αἰνεῖτε ⸂τῷ θεῷ⸃ ἡμῶν, πάντες οἱ δοῦλοι αὐτοῦ, ⸀καὶ οἱ φοβούμενοι αὐτόν, οἱ μικροὶ καὶ οἱ μεγάλοι.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/019/005.yaml
  text: And a voice came from the throne[a], saying, “Praise our God, all his slaves, and those who fear him[b], the small and the great.”
  footnotes:
  - marker: a
    text: Or “all his servants” or “all his bondservants.” The Greek word is δοῦλοι, which can denote servants or slaves depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “those who revere him.” The expression “fear him” is a biblical idiom for reverent awe and allegiance toward God.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 259fd5914dc58b1fe78ca701d657e05cb13ed786fd22ee64c2829e0dfa4ea8aa
    timestamp: '2026-04-19T00:56:05Z'
    output_hash: 3dfb567f32c4628f68106da258e0b224550dee66e226c505762772d444836c52
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:38Z'
    unchanged: false
    changes_summary: 'Changed ''slaves'' to ''servants'' for more natural formal English in this context while still accurately rendering δοῦλοι. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Y una voz salió del trono[a], diciendo: «Alaben a nuestro Dios, todos sus esclavos, y los que le temen[b], los pequeños y los grandes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “desde el trono”. La preposición griega expresa origen; “del trono” conserva esa relación en español, mientras que “desde el trono” la explicita de forma más interpretativa.
    reason: lexical_alternative
  - marker: b
    text: O “los que le reverencian”. La expresión “temer a Dios” es un modismo bíblico de temor reverente y lealtad, no solo de emoción o miedo.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  lexicon: BDAG
  rationale: φωνή normalmente puede ser 'voz' o 'sonido'; aquí, al ir seguida de un participio de decir, 'voz' es la opción natural y más clara en español.
- source_word: ἀπὸ τοῦ θρόνου
  english_pob_choice: from the throne
  chosen_spanish: del trono
  alternatives_spanish:
  - desde el trono
  lexicon: BDAG
  rationale: La preposición indica origen. 'Del trono' conserva la imagen de procedencia en un español fluido y conciso.
- source_word: ἐξῆλθεν
  english_pob_choice: came
  chosen_spanish: salió
  alternatives_spanish:
  - salió de allí
  - vino
  lexicon: BDAG
  rationale: ἐξέρχομαι significa literalmente 'salir'; en este contexto, 'salió' comunica el movimiento desde el trono sin perder la fuerza del verbo griego.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que decía
  lexicon: BDAG
  rationale: El participio presente introduce el contenido de la voz; 'diciendo' es la equivalencia directa y idiomática en español.
- source_word: Αἰνεῖτε
  english_pob_choice: Praise
  chosen_spanish: Alaben
  alternatives_spanish:
  - Den alabanza a
  - Sigan alabando
  lexicon: BDAG
  rationale: El imperativo plural pide una acción dirigida al grupo. 'Alaben' conserva el valor exhortativo y es natural en español bíblico contemporáneo.
- source_word: τῷ θεῷ ἡμῶν
  english_pob_choice: our God
  chosen_spanish: a nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: BDAG
  rationale: En español, con 'alabar' suele expresarse el destinatario con 'a'. Aunque el griego usa dativo sin preposición, 'a nuestro Dios' mantiene la relación de objeto de alabanza con claridad idiomática.
- source_word: πάντες οἱ δοῦλοι αὐτοῦ
  english_pob_choice: all his slaves
  chosen_spanish: todos sus esclavos
  alternatives_spanish:
  - todos sus siervos
  - todos sus siervos esclavos
  lexicon: BDAG
  rationale: δοῦλος denota pertenencia vinculante; el proyecto prefiere 'esclavos' cuando esa condición es teológicamente significativa. En este llamado celestial, 'esclavos' preserva con más fuerza la idea de total pertenencia y lealtad a Dios.
- source_word: οἱ φοβούμενοι αὐτόν
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que lo reverencian
  - los reverentes
  lexicon: BDAG
  rationale: La expresión conserva el idioma bíblico del temor reverente hacia Dios. 'Le temen' mantiene esa tensión sin suavizarla a una mera reverencia explicativa.
- source_word: οἱ μικροὶ καὶ οἱ μεγάλοι
  english_pob_choice: the small and the great
  chosen_spanish: los pequeños y los grandes
  alternatives_spanish:
  - los pequeños y los poderosos
  - los pequeños y los altos
  lexicon: BDAG
  rationale: Los adjetivos sustantivados señalan personas de estatus bajo y alto. 'Los pequeños y los grandes' sigue de cerca la forma griega y comunica el alcance social total del llamado.
theological_decisions:
- issue: Renderizar δοῦλοι en un contexto de adoración
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: Se conserva el matiz de pertenencia y sujeción total a Dios que el expediente inglés consideró doctrinalmente relevante. 'Esclavos' mantiene la fuerza lexical del término y evita diluirla en un vocablo más suave.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para δοῦλος; filosofía de traducción §1'
- issue: Sentido de φοβούμενοι αὐτόν
  english_pob_reading: those who fear him
  chosen_spanish_reading: los que le temen
  alternative_spanish_readings:
  - los que lo reverencian
  rationale: Se preserva el temor reverente como idiomática bíblica. La opción 'reverencian' se deja fuera del texto principal porque reduce el campo semántico y atenúa la tensión devocional del pasaje.
  doctrine_reference: 'DOCTRINE.md: filosofía de traducción §3, §6'
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que osciló entre 'slaves' y 'servants' y luego restauró 'slaves'. La decisión española sigue la lectura más reciente y doctrinalmente consistente con δοῦλοι. También se mantuvo el idioma bíblico de 'temer' frente a una paráfrasis más suave.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma por defecto cuando corresponda, pero en este versículo el texto griego dice θεῷ y la referencia inmediata es a Dios, así que 'Dios' es la elección correcta.
  - Se evitó 'SEÑOR' como sustituto por el nombre divino porque aquí no aparece κύριος ni una cita directa del Tetragrámaton.
  - 'Se mantuvo el orden de grupos del griego: esclavos, los que le temen, los pequeños y los grandes.'
  - La puntuación con comillas angulares sigue el uso editorial estándar en español y facilita la lectura pública.
