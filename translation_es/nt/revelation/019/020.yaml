  text: καὶ ἐπιάσθη τὸ θηρίον καὶ ⸂μετ’ αὐτοῦ ὁ⸃ ψευδοπροφήτης ὁ ποιήσας τὰ σημεῖα ἐνώπιον αὐτοῦ, ἐν οἷς ἐπλάνησεν τοὺς λαβόντας τὸ χάραγμα τοῦ θηρίου καὶ τοὺς προσκυνοῦντας τῇ εἰκόνι αὐτοῦ· ζῶντες ἐβλήθησαν οἱ δύο εἰς τὴν λίμνην τοῦ πυρὸς ⸂τῆς καιομένης⸃ ἐν θείῳ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/019/020.yaml
  text: And the beast was captured[a], and with it the false prophet who had performed the signs in its presence, by which he deceived those who had received the mark of the beast and those who worshiped its image[b]. The two of them were thrown alive into the lake of fire that burns with sulfur.
  footnotes:
  - marker: a
    text: Or 'with him' / 'before him'; the Greek uses pronouns referring back to 'the beast' (a grammatically neuter noun).
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''brimstone'' for ''sulfur.'''
    reason: lexical_alternative
