revisions:
- from: Y el bestia[a] fue capturado, y con él el falso profeta que había realizado las señales en su presencia, con las cuales engañó a los que habían recibido la marca de la bestia y a los que adoraban su imagen[b]. Los dos fueron arrojados vivos al lago de fuego que arde con azufre.
  to: Y la bestia fue capturada, y con ella[a] el falso profeta que había realizado las señales en su presencia, por medio de las cuales engañó a los que habían recibido la marca de la bestia y a los que adoraban su imagen. Los dos fueron arrojados vivos al lago de fuego que arde con azufre[b].
  rationale: Se corrige el error gramatical «el bestia» a «la bestia» y se ajusta el pronombre a «con ella» para que el español sea natural y coherente, sin perder la nota sobre el neutro griego. También se mejora levemente «con las cuales» a «por medio de las cuales» para reflejar con más claridad la fuerza instrumental de ἐν οἷς. El resto del versículo se mantiene porque representa fielmente el griego y las decisiones léxicas del POB.
  reviewer_model: gpt-5.4
