translation:
  language: es
  text: Y la bestia fue capturada, y con ella[a] el falso profeta que había realizado las señales en su presencia, por medio de las cuales engañó a los que habían recibido la marca de la bestia y a los que adoraban su imagen. Los dos fueron arrojados vivos al lago de fuego que arde con azufre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con él»; el griego usa pronombres que remiten a «θηρίον», un sustantivo gramaticalmente neutro.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, algunas versiones inglesas usan «brimstone» para «azufre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιάσθη
  english_pob_choice: was captured
  chosen_spanish: fue capturado
  alternatives_spanish:
  - fue apresado
  - fue tomado
  lexicon: BDAG
  rationale: El aoristo pasivo de πιάζω expresa ser apresado o capturado. En español, «fue capturado» es natural, preciso y conserva la pasividad del evento sin añadir matices no presentes en el griego.
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - bestia salvaje
  - monstruo
  lexicon: BDAG
  rationale: En Apocalipsis, θηρίον es el término técnico apocalíptico. «Bestia» mantiene la imagen establecida en español y corresponde al valor léxico básico sin suavizarlo.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with it
  chosen_spanish: con él
  alternatives_spanish:
  - con ello
  - junto con él
  lexicon: BDAG
  rationale: Aunque el antecedente griego es neutro, en español «bestia» es femenino. Para no forzar un «ello» poco natural y mantener la referencia viva en el flujo narrativo, se usa «con él», siguiendo la práctica del POB inglés de señalar la referencia pronominal sin rigidizar el género en la superficie del texto.
- source_word: ψευδοπροφήτης
  english_pob_choice: false prophet
  chosen_spanish: falso profeta
  alternatives_spanish:
  - profeta falso
  lexicon: BDAG
  rationale: Compuesto transparente; «falso profeta» es directo, idiomático y reproduce la etiqueta del personaje sin expansión interpretativa.
- source_word: ὁ ποιήσας τὰ σημεῖα
  english_pob_choice: who had performed the signs
  chosen_spanish: que había realizado las señales
  alternatives_spanish:
  - que había hecho las señales
  - que había obrado las señales
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; «había realizado» comunica anterioridad. «Señales» preserva el valor de σημεῖα como actos-signo, más que simples prodigios.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - milagros
  lexicon: BDAG
  rationale: «Señales» es la forma más natural y fiel al campo semántico de σημεῖον en Juan y Apocalipsis. Conserva el sentido de acto con valor de testimonio, sin reducirlo a «milagros».
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: in its presence
  chosen_spanish: en su presencia
  alternatives_spanish:
  - delante de él
  - ante él
  lexicon: BDAG
  rationale: La expresión adverbial se vierte de manera idiomática como «en su presencia». Es claro en español y reproduce la relación espacial/relacional del original.
- source_word: ἐν οἷς
  english_pob_choice: by which
  chosen_spanish: con las cuales
  alternatives_spanish:
  - por las cuales
  - mediante las cuales
  lexicon: BDAG
  rationale: 'El relativo tiene fuerza instrumental: las señales fueron el medio del engaño. «Con las cuales» conserva esa instrumentalidad en español sin sonar excesivamente técnico; además concuerda con «señales» en femenino plural.'
- source_word: ἐπλάνησεν
  english_pob_choice: he deceived
  chosen_spanish: engañó
  alternatives_spanish:
  - extraviò
  - desvió
  lexicon: BDAG
  rationale: πλανάω puede ser «engañar» o «desviar/errar». Aquí el foco es el efecto fraudulento de las señales sobre los destinatarios, y «engañó» es la opción más natural y directa en español.
- source_word: τοὺς λαβόντας
  english_pob_choice: those who had received
  chosen_spanish: a los que habían recibido
  alternatives_spanish:
  - a los que recibieron
  - a los que tomaron
  lexicon: BDAG
  rationale: El participio aoristo se traduce con pluscuamperfecto para marcar anterioridad respecto del engaño y del juicio. «Recibir» es el valor esperado de λαμβάνω en este contexto de la marca.
- source_word: χάραγμα
  english_pob_choice: mark
  chosen_spanish: marca
  alternatives_spanish:
  - señal
  - estampado
  lexicon: BDAG
  rationale: «Marca» es el equivalente normal y ya establecido en la tradición de traducción de Apocalipsis para χάραγμα. Mantiene la referencia identificadora sin introducir tecnicismos.
- source_word: προσκυνοῦντας
  english_pob_choice: worshiped
  chosen_spanish: adoraban
  alternatives_spanish:
  - postraban ante
  - rendían culto a
  lexicon: BDAG
  rationale: En Apocalipsis, προσκυνέω suele implicar acto cultual, no solo inclinación física. «Adoraban» reproduce esa fuerza religiosa en español de modo natural y claro.
- source_word: εἰκών
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - representación
  - ídolo
  lexicon: BDAG
  rationale: «Imagen» es el equivalente directo de εἰκών y preserva la intertextualidad apocalíptica. «Ídolo» añadiría una interpretación más explícita de la que el término por sí solo exige.
- source_word: ζῶντες
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - con vida
  - estando vivos
  lexicon: BDAG
  rationale: El participio adverbial indica el estado en que fueron arrojados. «Vivos» es idiomático en español y conserva la fuerza dramática del original.
- source_word: ἐβλήθησαν
  english_pob_choice: were thrown
  chosen_spanish: fueron arrojados
  alternatives_spanish:
  - fueron lanzados
  - fueron echados
  lexicon: BDAG
  rationale: El pasivo de βάλλω expresa arrojar con fuerza. «Fueron arrojados» mantiene la violencia del acto y resulta más natural que un calco más rígido.
- source_word: λίμνην τοῦ πυρός
  english_pob_choice: the lake of fire
  chosen_spanish: el lago de fuego
  alternatives_spanish:
  - la laguna de fuego
  - el estanque de fuego
  lexicon: BDAG
  rationale: «Lago de fuego» es la correspondencia estándar y conserva la imagen apocalíptica establecida. «Lago» reproduce λίμνη sin desplazar el símbolo a otra figura.
- source_word: τῆς καιομένης
  english_pob_choice: that burns
  chosen_spanish: que arde
  alternatives_spanish:
  - que está ardiendo
  - ardiente
  lexicon: BDAG
  rationale: El participio presente describe una acción continua; «que arde» es natural en español y mantiene la idea durativa sin sobrecargar la frase.
- source_word: ἐν θείῳ
  english_pob_choice: with sulfur
  chosen_spanish: con azufre
  alternatives_spanish:
  - con azufre ardiente
  - con brimstone
  lexicon: BDAG
  rationale: θεῖον significa azufre. «Azufre» es preciso y contemporáneo; se evita «brimstone» por ser anglicismo/tradicionalismo ajeno al español actual.
theological_decisions:
- issue: Referencia pronominal de la bestia
  english_pob_reading: Use 'it/its' for the beast because θηρίον is neuter in Greek
  chosen_spanish_reading: 'Usar una referencia natural en español sin masculinizar el símbolo más allá de la personificación del contexto: «con él / su presencia / su imagen»'
  alternative_spanish_readings:
  - con ello
  - con ella
  rationale: El griego usa un sustantivo neutro, pero el español obliga a elegir género. Dado que «bestia» es femenino, una referencia estrictamente neutra («ello») sonaría poco natural y opaca; por eso se mantiene la fluidez con formas acordadas al contexto narrativo, sin cambiar el referente ni intensificar la personificación.
  doctrine_reference: Translation philosophy §1, §3
- issue: Imaginería del juicio final
  english_pob_reading: Translate literally as 'the lake of fire that burns with sulfur'
  chosen_spanish_reading: Traducir literalmente como «el lago de fuego que arde con azufre»
  alternative_spanish_readings:
  - el infierno
  - el fuego del castigo eterno
  rationale: El versículo presenta una imagen apocalíptica concreta. Conviene conservarla sin sustituirla por una formulación doctrinal posterior o más interpretativa que el texto no explicita aquí.
  doctrine_reference: Translation philosophy §1, §3
- issue: Función de προσκυνέω
  english_pob_reading: worshiped
  chosen_spanish_reading: adoraban
  alternative_spanish_readings:
  - se postraban ante
  - rindieron culto a
  rationale: En este contexto, el verbo implica homenaje cultual a la imagen de la bestia. «Adoraban» comunica ese sentido religioso con claridad y sin reducirlo a un gesto físico.
  doctrine_reference: BDAG; uso apocalíptico de προσκυνέω
translation_notes:
  revision_awareness: Se revisó el texto auditado en inglés y el griego SBLGNT con su morfología. No se detectaron revisiones sustanciales aplicadas en la última pasada; por eso la redacción española sigue de cerca la decisión establecida en el POB inglés, con ajuste natural al género gramatical español en la referencia a la bestia.
  spanish_consistency_notes:
  - Se mantiene «bestia», «falso profeta», «señales», «marca», «imagen», «lago de fuego» y «azufre» para consistencia con la terminología apocalíptica del proyecto.
  - 'Se conserva la secuencia narrativa del original: captura, asociación con el falso profeta, engaño mediante señales, condena de ambos al lago de fuego.'
  - La referencia pronominal a la bestia se adaptó al español sin alterar el referente ni introducir una lectura doctrinal adicional.
