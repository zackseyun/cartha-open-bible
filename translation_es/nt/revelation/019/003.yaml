  source_alignment_summary: 'El borrador refleja bien el griego: δεύτερον = «por segunda vez», εἴρηκαν = «dijeron», Ἁλληλουϊά = «¡Aleluya!», ἀναβαίνει = «sube», y la duración de εἰς τοὺς αἰῶνας τῶν αἰώνων se conserva con una fórmula idiomática fuerte. El único desajuste relevante es la ubicación de la nota [a]: en el inglés POB la nota explica la frase temporal final, pero en español quedó anclada a «dijeron», donde no corresponde al referente griego ni ayuda al lector.'
