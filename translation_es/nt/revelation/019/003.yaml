  glossary_alignment: No hay conflicto con la terminología del proyecto. «Aleluya» es apropiado para Ἁλληλουϊά. La fórmula «por los siglos de los siglos» preserva bien el valor idiomático y apocalíptico. «Su humo» es aceptable en contexto para αὐτῆς, aunque pierde la feminidad explícita que el contexto ya aporta.
