translation:
  language: es
  text: 'Y por segunda vez dijeron: «¡Aleluya!». Y su humo sube por los siglos de los siglos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «a los siglos de los siglos», un idiomatismo que expresa duración sin fin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεύτερον
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - una segunda vez
  lexicon: BDAG
  rationale: El acusativo adverbial expresa repetición. «Por segunda vez» conserva ese valor secuencial y suena natural en español bíblico actual.
- source_word: εἴρηκαν
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - han dicho
  - clamaron
  lexicon: BDAG
  rationale: El perfecto de λέγω funciona narrativamente como un decir puntual. «Dijeron» comunica el acto de habla sin añadir intensidad no explicitada por el verbo.
- source_word: Ἁλληλουϊά
  english_pob_choice: Hallelujah
  chosen_spanish: ¡Aleluya!
  alternatives_spanish:
  - ¡Hallelujah!
  - ¡Alabad a Yah!
  lexicon: BDAG
  rationale: Se mantiene la exclamación litúrgica en una forma reconocible para lectores hispanos. «Aleluya» es el transliterado estándar en español y preserva el carácter de aclamación.
- source_word: ὁ καπνὸς αὐτῆς
  english_pob_choice: her smoke
  chosen_spanish: su humo
  alternatives_spanish:
  - el humo de ella
  - su humo, el de ella
  lexicon: BDAG
  rationale: El genitivo femenino remite a Babilonia como ciudad/personificación. En español, «su humo» conserva la referencia posesiva; la feminidad queda suficientemente implicada por el contexto sin forzar una construcción pesada.
- source_word: ἀναβαίνει
  english_pob_choice: goes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - va subiendo
  lexicon: BDAG
  rationale: El presente de aspecto progresivo se expresa de modo idiomático con «sube», que preserva la imagen vertical sin elevar el registro de forma innecesaria.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - a los siglos de los siglos
  lexicon: BDAG
  rationale: La locución griega es un idiomatismo de duración interminable. «Por los siglos de los siglos» es la equivalencia española tradicional y fiel, y evita una paráfrasis que diluya la fórmula apocalíptica.
theological_decisions:
- issue: Duración indefinida en la doxología/jucio expresada por εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_reading: forever and ever
  chosen_spanish_reading: por los siglos de los siglos
  alternative_spanish_readings:
  - para siempre y para siempre
  - hasta los siglos de los siglos
  rationale: La frase griega comunica duración sin término en un contexto de juicio final. Se conserva la fuerza idiomática y doxológica de la fórmula en español, sin suavizarla ni explicarla dentro del texto principal.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego SBLGNT y con el audit trail en inglés: se preserva la repetición («por segunda vez»), el exclamativo litúrgico («Aleluya») y la fórmula idiomática de duración interminable («por los siglos de los siglos»). No se introducen variantes textuales ni cambios de sentido.'
  spanish_consistency_notes:
  - Se mantiene «Aleluya» como exclamación litúrgica reconocible en español.
  - Se evita «SEÑOR» o sustitución equivalente porque no aparece el nombre divino en este versículo.
  - «Su humo» conserva la referencia femenina implícita en αὐτῆς sin sobrecargar el español.
  - La nota al pie ancla la única decisión idiomática relevante sobre la duración de la fórmula final.
