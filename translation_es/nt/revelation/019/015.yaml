  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios» traduce θεοῦ correctamente; no aparecen Yahvé/Mesías/siervo-esclavo ni otros términos sensibles del glosario. La decisión de conservar «pastoreará» para ποιμανεῖ está alineada con la racionalidad léxica y teológica documentada.
