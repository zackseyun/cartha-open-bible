translation:
  language: es
  text: Y de su boca sale una espada aguda, para que con ella hiera a las naciones; y él mismo las pastoreará[a] con una vara de hierro[b]; y él mismo pisa el lagar del vino del furor de la ira de Dios el Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «él las regirá con una vara de hierro». El verbo griego significa literalmente «pastoreará», y la imagen conserva el eco del Salmo 2.
    reason: alternative_reading
  - marker: b
    text: La expresión tradicional en español suele ser «con vara de hierro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορεύεται
  english_pob_choice: comes
  chosen_spanish: sale
  alternatives_spanish:
  - viene
  - procede
  lexicon: BDAG
  rationale: ἐκπορεύεται expresa que algo sale o procede desde un origen. En español, «sale» conserva la imagen vívida y natural de algo que emerge de la boca sin sobrecargar el verbo.
- source_word: ῥομφαία ὀξεῖα
  english_pob_choice: a sharp sword
  chosen_spanish: una espada aguda
  alternatives_spanish:
  - una espada afilada
  - una espada cortante
  lexicon: BDAG
  rationale: ῥομφαία designa una espada de gran tamaño; «espada» es el equivalente más claro y reconocible. «Aguda» reproduce ὀξεῖα con dignidad literaria y mantiene la fuerza del arma sin precisar más de lo que el griego dice.
- source_word: ἵνα ἐν αὐτῇ πατάξῃ
  english_pob_choice: so that with it he may strike
  chosen_spanish: para que con ella hiera
  alternatives_spanish:
  - para que con ella golpee
  - para que con ella hiera de golpe
  lexicon: BDAG
  rationale: La construcción ἵνα + subjuntivo expresa propósito. «Con ella» traduce el valor instrumental de ἐν αὐτῇ. Para πατάξῃ, «hiera» conserva el sentido de golpear en contexto de juicio sin introducir una especificación adicional como «derribe».
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: BDAG
  rationale: En Apocalipsis, ἔθνη normalmente se refiere a las naciones como colectividad. «Las naciones» es la forma más consistente con el uso apocalíptico y con el inglés POB.
- source_word: ποιμανεῖ
  english_pob_choice: will shepherd
  chosen_spanish: las pastoreará
  alternatives_spanish:
  - las regirá
  - las gobernará
  lexicon: BDAG
  rationale: ποιμανεῖ significa literalmente «pastoreará». En español, «pastoreará» preserva la metáfora pastoral del texto y deja visible la tensión entre cuidado y dominio real; en una nota se conserva la alternativa de sentido de gobierno.
- source_word: ἐν ῥάβδῳ σιδηρᾷ
  english_pob_choice: with an iron rod
  chosen_spanish: con una vara de hierro
  alternatives_spanish:
  - con un cetro de hierro
  - con una vara férrea
  lexicon: BDAG
  rationale: ῥάβδος puede ser vara o bastón, y en el marco de dominio regio una «vara de hierro» es una forma natural y reconocible en español. «Con una vara de hierro» mantiene la imagen sin forzarla hacia «cetro», que ya interpreta más abiertamente el símbolo.
- source_word: πατεῖ
  english_pob_choice: treads
  chosen_spanish: pisa
  alternatives_spanish:
  - huella
  - tritura
  lexicon: BDAG
  rationale: πατέω en la imagen del lagar significa pisar, apretar con los pies. «Pisa» es el verbo más directo y transparente en español para esta escena.
- source_word: τὴν ληνὸν
  english_pob_choice: the winepress
  chosen_spanish: el lagar
  alternatives_spanish:
  - el lagar de vino
  - la prensa
  lexicon: BDAG
  rationale: ληνός corresponde a un lagar o prensa de uvas. «Lagar» es un término natural en español bíblico y comunica bien la escena de juicio sin necesidad de explicación adicional.
- source_word: τοῦ οἴνου τοῦ θυμοῦ τῆς ὀργῆς
  english_pob_choice: of the wine of the fury of the wrath
  chosen_spanish: del vino del furor de la ira
  alternatives_spanish:
  - del vino de la furia de la ira
  - del vino de la ira ardiente
  lexicon: BDAG
  rationale: Se conservan los genitivos apilados y su intensidad retórica. «Furor» y «ira» permiten reflejar los dos términos griegos distintos θυμός y ὀργή sin aplanarlos en una sola palabra.
- source_word: τοῦ θεοῦ τοῦ παντοκράτορος
  english_pob_choice: of God the Almighty
  chosen_spanish: de Dios el Todopoderoso
  alternatives_spanish:
  - del Dios Todopoderoso
  - de Dios, el Todopoderoso
  lexicon: BDAG
  rationale: παντοκράτωρ se traduce de forma estable como «Todopoderoso». «Dios el Todopoderoso» conserva el título divino sin alterar el orden y mantiene la solemnidad del cierre.
theological_decisions:
- issue: ποιμανεῖ en un contexto de juicio y alusión al Salmo 2
  english_pob_reading: will shepherd them with an iron rod
  chosen_spanish_reading: las pastoreará con una vara de hierro
  alternative_spanish_readings:
  - las regirá con una vara de hierro
  - las gobernará con una vara de hierro
  rationale: Se preserva la metáfora pastoral del verbo griego en lugar de sustituirla por un término puramente político. Así queda visible la tensión bíblica entre pastoreo y dominio judicial, tal como el inglés POB la mantuvo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: La expresión compuesta θυμοῦ τῆς ὀργῆς
  english_pob_reading: the wine of the fury of the wrath
  chosen_spanish_reading: del vino del furor de la ira
  alternative_spanish_readings:
  - del vino de la furia de la ira
  - del vino de la ira ardiente
  rationale: El griego acumula dos términos próximos para intensificar el juicio divino. La traducción conserva ambos, «furor» e «ira», para no suavizar ni reducir esa carga retórica y teológica.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El inglés POB fue revisado para quitar «down» después de «strike» porque πατάξῃ significa «strike/smite» y no añade explícitamente la idea de derribar. En español se evitó igualmente cualquier ampliación como «derribar» o «golpear hasta hacer caer». También se mantuvo la doble intensidad de θυμοῦ τῆς ὀργῆς, sin reducirla a una sola noción de ira.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar solo cuando el texto lo requiere; aquí el griego tiene θεοῦ, por eso corresponde «Dios».
  - Se conserva «Todopoderoso» para παντοκράτωρ, en línea con el POB inglés.
  - Se prefirió «las pastoreará» para ποιμανεῖ, manteniendo la metáfora pastoral documentada.
  - Se tradujo ἔθνη como «las naciones», no «los gentiles», por consistencia con Apocalipsis.
  - Se eligió «lagar» para ληνός por ser natural en español bíblico y fiel a la imagen del juicio.
