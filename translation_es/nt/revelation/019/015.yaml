base_translation:
  language: en
  yaml_path: translation/nt/revelation/019/015.yaml
  text: And from his mouth comes a sharp sword[a], so that with it he may strike the nations, and he himself will shepherd them with an iron rod[b]; and he himself treads the winepress of the wine of the fury of the wrath of God the Almighty.
  footnotes:
  - marker: a
    text: Or, 'he will rule them with an iron rod.' The Greek verb literally means 'shepherd,' echoing Psalm 2 while retaining the pastoral metaphor.
    reason: alternative_reading
  - marker: b
    text: Traditional English often has 'with a rod of iron.'
    reason: lexical_alternative
