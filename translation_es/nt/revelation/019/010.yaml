  to: 'Y caí delante de sus pies para adorarle. Y me dice: «¡Mira que no! Soy esclavo como tú[a] y como tus hermanos[b], los que tienen el testimonio de Jesús[c]. ¡Adora a Dios!, porque el testimonio de Jesús[d] es el espíritu de la profecía».'
  rationale: 'Se corrige la estructura de notas para cumplir el requisito de marcadores únicos y se restaura mejor el audit trail inglés: una nota lexical para σύνδουλος, una nota para «hermanos y hermanas», y dos notas separadas para la ambigüedad de «el testimonio de Jesús» en ambos lugares. En el texto principal, «Soy esclavo como tú» suena más natural que «un esclavo junto contigo» y conserva la preferencia del proyecto por «esclavo» mientras expresa la relación compartida. También se ajusta «Pero me dice» a «Y me dice» para seguir más de cerca el griego narrativo.'
