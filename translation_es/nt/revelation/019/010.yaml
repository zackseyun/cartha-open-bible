translation:
  language: es
  text: 'Y caí delante de sus pies para adorarle. Y me dice: «¡Mira que no! Soy esclavo como tú[a] y como tus hermanos[b], los que tienen el testimonio de Jesús[c]. ¡Adora a Dios!, porque el testimonio de Jesús[d] es el espíritu de la profecía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «consiervo tuyo» o «compañero de esclavitud contigo». El griego σύνδουλος expresa condición compartida de esclavitud o servicio bajo un mismo amo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tus hermanos y hermanas», con «hermanos» usado representativamente para los demás creyentes.'
    reason: lexical_alternative
  - marker: c
    text: La expresión «el testimonio de Jesús» puede significar «el testimonio acerca de Jesús» o «el testimonio que procede de Jesús».
    reason: alternative_reading
  - marker: d
    text: 'O: «el testimonio acerca de Jesús» o «el testimonio de Jesús mismo / de parte de Jesús». La misma ambigüedad del griego aparece también en la cláusula anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἔπεσα ἔμπροσθεν τῶν ποδῶν αὐτοῦ
  english_pob_choice: I fell before his feet
  chosen_spanish: caí delante de sus pies
  alternatives_spanish:
  - caí a sus pies
  - caí ante sus pies
  lexicon: BDAG
  rationale: Mantiene la postura física y el sentido de ἔμπροσθεν como ‘delante/ante’, con español natural y solemne.
- source_word: προσκυνῆσαι αὐτῷ / προσκύνησον
  english_pob_choice: to worship him / Worship God
  chosen_spanish: adorarle / ¡Adora a Dios!
  alternatives_spanish:
  - postrarme ante él / ¡Postraos ante Dios!
  - rendirle adoración / ¡Rinde adoración a Dios!
  lexicon: BDAG
  rationale: Aquí el contraste teológico exige una palabra de culto. ‘Adorar’ conserva mejor la fuerza religiosa de προσκυνέω que ‘inclinarse’ o ‘postrarse’ en este contexto.
- source_word: Ὅρα μή
  english_pob_choice: See that you do not!
  chosen_spanish: ¡Mira que no!
  alternatives_spanish:
  - ¡No lo hagas!
  - ¡Cuidado, no!
  lexicon: BDAG
  rationale: Expresa la prohibición abrupta del griego con un imperativo breve y vivo, sin suavizarla demasiado.
- source_word: σύνδουλός
  english_pob_choice: fellow slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - consiervo
  - siervo
  lexicon: BDAG
  rationale: La POB documenta la fuerza de δοῦλος como ‘slave’; en español ‘esclavo’ conserva esa relación de subordinación compartida. Se añade ‘junto contigo’ para expresar σύν- (‘con’).
- source_word: ἀδελφῶν σου
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus hermanos y hermanas
  - tus creyentes
  lexicon: BDAG
  rationale: La forma griega es masculina plural; se mantiene ‘hermanos’ como equivalente directo y auditado.
- source_word: τῶν ἐχόντων τὴν μαρτυρίαν Ἰησοῦ
  english_pob_choice: who hold the testimony of Jesus
  chosen_spanish: que tienen el testimonio de Jesús
  alternatives_spanish:
  - que poseen el testimonio de Jesús
  - que mantienen el testimonio de Jesús
  lexicon: BDAG
  rationale: ‘Tienen’ reproduce con sencillez ἔχω sin añadir matiz interpretativo. La construcción permanece deliberadamente literal para conservar la ambigüedad del genitivo.
- source_word: μαρτυρία Ἰησοῦ
  english_pob_choice: the testimony of Jesus
  chosen_spanish: el testimonio de Jesús
  alternatives_spanish:
  - el testimonio acerca de Jesús
  - el testimonio de parte de Jesús
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del genitivo griego, ya que puede ser testimonio acerca de Jesús o testimonio que procede de Jesús. La forma ‘de Jesús’ preserva esa tensión sin resolverla.
- source_word: τῷ θεῷ προσκύνησον
  english_pob_choice: Worship God
  chosen_spanish: ¡Adora a Dios!
  alternatives_spanish:
  - ¡Postra tu adoración a Dios!
  - ¡Rinde culto a Dios!
  lexicon: BDAG
  rationale: Dios es el objeto exclusivo del acto de culto. ‘Adora’ mantiene la oposición directa con la tentativa de adoración al mensajero.
- source_word: πνεῦμα τῆς προφητείας
  english_pob_choice: the spirit of prophecy
  chosen_spanish: el espíritu de la profecía
  alternatives_spanish:
  - el Espíritu de la profecía
  - la esencia de la profecía
  lexicon: BDAG
  rationale: ‘Espíritu’ conserva el peso teológico de πνεῦμα y evita neutralizarlo como ‘esencia’. La minúscula se ajusta al sintagma, sin forzar una referencia al Espíritu Santo si el contexto no la impone.
theological_decisions:
- issue: Sentido de σύνδουλος y la autoridad del mensajero celestial
  english_pob_reading: fellow slave
  chosen_spanish_reading: esclavo junto contigo
  alternative_spanish_readings:
  - consiervo junto contigo
  - siervo junto contigo
  rationale: La escena rechaza explícitamente el culto al ángel y lo sitúa, como a Juan y a los demás creyentes, bajo la autoridad de Dios. ‘Esclavo’ conserva la subordinación marcada por δοῦλος y evita suavizar la relación en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1; contested terms for δοῦλος'
- issue: Ambigüedad del genitivo en ‘el testimonio de Jesús’
  english_pob_reading: retain the ambiguous rendering in the main text
  chosen_spanish_reading: el testimonio de Jesús
  alternative_spanish_readings:
  - el testimonio acerca de Jesús
  - el testimonio de Jesús mismo / de parte de Jesús
  rationale: El griego permite lectura objetiva o subjetiva. Se conserva la ambigüedad para no cerrar una tensión que el texto no resuelve; esto afecta tanto a los hermanos como a la cláusula final sobre la profecía.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Relación entre μαρτυρία Ἰησοῦ y τὸ πνεῦμα τῆς προφητείας
  english_pob_reading: the testimony of Jesus is the spirit of prophecy
  chosen_spanish_reading: el testimonio de Jesús es el espíritu de la profecía
  alternative_spanish_readings:
  - el testimonio acerca de Jesús es el espíritu de la profecía
  - el testimonio de Jesús es la esencia de la profecía
  rationale: Se mantiene la equivalencia verbal del enunciado sin reducir πνεῦμα a ‘esencia’. El texto deja abierta la relación exacta entre el testimonio de Jesús y la profecía, en continuidad con la ambigüedad anterior.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: El pasaje muestra alto grado de acuerdo entre revisiones; no se registraron cambios en la última pasada. La redacción española sigue la lectura auditada del texto griego y conserva las ambigüedades documentadas en el aparato inglés, especialmente en μαρτυρία Ἰησοῦ.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantiene ‘Jesús’ como nombre propio invariable.
  - ‘Espíritu’ se reserva para πνεῦμα; en este pasaje va en minúscula por tratarse del sintagma descriptivo ‘espíritu de la profecía’.
  - Se conserva ‘esclavo’ para δοῦλος según la preferencia terminológica documentada de la POB.
  - Las notas al pie distinguen entre alternativas léxicas y ambigüedad genitiva sin fusionarlas.
