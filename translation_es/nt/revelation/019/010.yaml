review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: caída ante los pies, prohibición abrupta, redirección de la adoración a Dios, y conservación de la ambigüedad de «el testimonio de Jesús». También mantiene correctamente «espíritu de la profecía». Sin embargo, no refleja con precisión el audit trail inglés en dos puntos importantes: σύνδουλος se volvió «un esclavo» en vez de «co-esclavo/consiervo/esclavo como tú», y las notas al pie están mal ancladas y parcialmente mal distribuidas frente a las razones documentadas.'
  spanish_quality_summary: El español es en general claro y digno, pero hay detalles mejorables de naturalidad y de control editorial. «Yo soy un esclavo junto contigo» suena algo forzado; «soy esclavo como tú» o «soy coesclavo tuyo» expresa mejor la relación compartida. Además, el marcador [a] se usa dos veces para dos notas distintas, lo cual viola el requisito de unicidad, y falta una nota para la alternativa lexical de «hermanos y hermanas» preservada en el POB inglés.
  glossary_alignment: Se alinea bien con «Dios», «Jesús», «espíritu» y con la preferencia proyectual por «esclavo» para δοῦλος. No obstante, para σύνδουλος debe mantenerse más claramente la idea de compañerismo en esclavitud compartida, no solo «un esclavo». La ambigüedad de μαρτυρία Ἰησοῦ debe seguirse conservando en ambos lugares, con notas bien ubicadas.
  issues:
  - severity: high
    issue: Reutilización incorrecta del marcador [a] para dos notas distintas
    rationale: Las instrucciones exigen marcadores únicos por nota y que cada marcador corresponda exactamente a una sola nota y a un anclaje en el texto. Aquí [a] aparece tras «adorarle» y tras «esclavo», pero la lista de notas no puede sostener dos significados distintos con el mismo marcador.
  - severity: high
    issue: La nota lexical sobre σύνδουλος no está correctamente representada ni anclada
    rationale: El audit trail inglés preserva la alternativa «fellow servant». El borrador no ofrece una nota específica y limpia para «esclavo / consiervo», y la formulación principal «un esclavo junto contigo» debilita la fuerza relacional de σύνδουλος.
  - severity: medium
    issue: Falta la alternativa representativa para ἀδελφῶν σου
    rationale: El POB inglés incluye nota para «your brothers and sisters». En español conviene preservarla como «tus hermanos y hermanas», ya que es una alternativa documentada del audit trail.
  - severity: medium
    issue: 'La nota [b] es imprecisa al presentar «O: los que tienen»'
    rationale: La diferencia documentada en inglés es principalmente «hold/have», no una alternativa sustancial a la cláusula relativa completa. En español, la nota importante aquí es la ambigüedad de «el testimonio de Jesús», no «los que tienen».
  - severity: low
    issue: «Pero me dice» puede ajustarse a «Y me dice»
    rationale: καὶ λέγει μοι es simple continuidad narrativa. «Pero» no distorsiona gravemente, pero introduce un contraste discursivo no explícito en la conjunción griega.
