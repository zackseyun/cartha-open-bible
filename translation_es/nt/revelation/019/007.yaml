revisions:
- from: Alegrémonos y exultemos, y demos gloria[a] a él, porque ha llegado el matrimonio del Cordero, y su esposa[b] se ha preparado.
  to: Alegrémonos y exultemos, y démosle gloria[a], porque ha llegado el matrimonio del Cordero, y su novia[b] se ha preparado.
  rationale: Se revisa para mejorar la fidelidad al audit trail del POB y la naturalidad del español. «Démosle gloria» expresa idiomáticamente la exhortación unificada del griego. «Su novia» refleja mejor la elección principal «his bride» en el contexto de la boda del Cordero, mientras que «su esposa» queda preservado como alternativa léxica documentada. También se corrigen los anclajes y el contenido de las notas para que correspondan exactamente a las variantes relevantes.
