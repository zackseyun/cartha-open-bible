    text: O, «daremos gloria». El griego tiene forma futura, aunque aquí probablemente funciona con fuerza exhortativa en paralelo con «alegrémonos» y «exultemos».
    reason: alternative_reading
  - marker: b
    text: O, «su esposa». El griego γυνή puede significar «mujer», «esposa» o, en contexto matrimonial, «novia».
    reason: lexical_alternative
