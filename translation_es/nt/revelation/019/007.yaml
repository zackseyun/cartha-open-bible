review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura exhortativa del griego, mantiene «Cordero», «gloria» y el perfecto compuesto para ἦλθεν. Sin embargo, no preserva del todo la decisión auditada del POB sobre γυνὴ αὐτοῦ como «bride» en contexto nupcial; «su esposa» desplaza el matiz hacia estado matrimonial más que hacia imagen de novia/esposa en vísperas de la unión. Además, la nota de δώσομεν está anclada en «gloria» en vez de en la frase verbal, y «demos gloria a él» suena poco natural en español frente a «démosle gloria».
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere pulido idiomático. «Demos gloria a él» es gramaticalmente comprensible pero poco natural; «démosle gloria» o «demos gloria a él» con nota no es la mejor opción en lectura pública. «Su esposa» es legible, pero «su novia» sería demasiado coloquial; «su esposa» tampoco sigue bien la racionalidad del inglés. «Su novia» no es ideal, por lo que conviene «su novia[a]» solo si se busca máxima cercanía a bride, pero en registro bíblico neutral la mejor solución es «su novia[a]» o «su prometida[a]»; no obstante, por fidelidad al audit trail y claridad eclesial, «su novia[a]» funciona aquí mejor que «su esposa».
  glossary_alignment: 'No hay conflictos con los términos del glosario principal. «Cordero» y «gloria» están bien. La principal desviación es contextual-teológica/lexical: γυνή en este contexto fue documentado por el POB como «bride», por lo que el español debe reflejar ese matiz principal y dejar «esposa» como alternativa en nota, no al revés.'
  issues:
  - severity: medium
    issue: «su esposa» no refleja la elección principal auditada para γυνὴ αὐτοῦ
    rationale: El POB inglés escogió «his bride» por el contexto nupcial y reservó «wife» como alternativa. En español, «su esposa» invierte esa prioridad semántica y reduce la fuerza de la imagen de preparación para la boda.
  - severity: medium
    issue: «demos gloria a él» es poco natural en español
    rationale: Aunque semánticamente correcto, la formulación idiomática en español culto y bíblico es «démosle gloria». Esto preserva la exhortación sin sonar calcado.
  - severity: low
    issue: La nota sobre δώσομεν está mal anclada y formula una alternativa redundante
    rationale: La nota aparece en «gloria[a]» aunque la variación textual/semántica afecta la frase verbal completa. Además, «O, “le demos gloria”» no contrasta realmente con el texto propuesto si se revisa a «démosle gloria»; la alternativa relevante es «daremos gloria».
  - severity: low
    issue: La nota léxica de γυνή usa explicación algo confusa
    rationale: «esposa/novia» no comunica con precisión la alternativa. Conviene explicar sencillamente que γυνή puede significar «mujer», «esposa» o, en contexto de boda, «novia».
  revised_spanish_text: Alegrémonos y exultemos, y démosle gloria[a], porque ha llegado el matrimonio del Cordero, y su novia[b] se ha preparado.
  revised_footnotes:
