translation:
  language: es
  text: Alegrémonos y exultemos, y démosle gloria[a], porque ha llegado el matrimonio del Cordero, y su novia[b] se ha preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «daremos gloria». El griego tiene forma futura, aunque aquí probablemente funciona con fuerza exhortativa en paralelo con «alegrémonos» y «exultemos».
    reason: alternative_reading
  - marker: b
    text: O, «su esposa». El griego γυνή puede significar «mujer», «esposa» o, en contexto matrimonial, «novia».
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρωμεν
  english_pob_choice: Let us rejoice
  chosen_spanish: Alegrémonos
  alternatives_spanish:
  - Gocémonos
  - Regocijémonos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de primera persona plural se expresa naturalmente en español con un imperativo exhortativo inclusivo. «Alegrémonos» conserva el tono de invitación comunitaria sin perder el matiz de gozo.
- source_word: ἀγαλλιῶμεν
  english_pob_choice: exult
  chosen_spanish: exultemos
  alternatives_spanish:
  - alegremos intensamente
  - regocijémonos grandemente
  lexicon: BDAG
  rationale: Se mantiene la diferencia expresiva respecto de χαίρωμεν mediante un segundo verbo igualmente exhortativo. «Exultemos» es culto pero comprensible y preserva la intensidad jubilosa del griego.
- source_word: δώσομεν τὴν δόξαν αὐτῷ
  english_pob_choice: let us give glory to him
  chosen_spanish: demos gloria a él
  alternatives_spanish:
  - le demos gloria
  - glorifiquémoslo
  - daremos gloria a él
  lexicon: BDAG
  rationale: Aunque la forma griega es futura, aquí funciona exhortativamente junto con los dos verbos previos. «Demos gloria a él» conserva la fuerza inclusiva y la secuencia litúrgica; se evita una futura predictiva que debilitaría el paralelismo.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente natural y teológicamente cargado para δόξα en un contexto doxológico; «honor» atenúa el peso cultual y bíblico del término.
- source_word: ἦλθεν
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - llegó
  lexicon: BDAG
  rationale: El aoristo se vierte con perfecto compuesto para expresar un hecho ya cumplido con relevancia presente. «Ha llegado» resulta idiomático en español y mantiene la idea de llegada consumada.
- source_word: ὁ γάμος
  english_pob_choice: the marriage
  chosen_spanish: el matrimonio
  alternatives_spanish:
  - la boda
  - las bodas
  - la celebración nupcial
  lexicon: BDAG
  rationale: «Matrimonio» comunica mejor la unión nupcial en sentido de alianza y no introduce explícitamente la idea de banquete, que aparece después en el contexto inmediato. En español suena más sobrio y exacto que «boda» para este pasaje.
- source_word: τοῦ ἀρνίου
  english_pob_choice: the Lamb
  chosen_spanish: del Cordero
  alternatives_spanish:
  - del Cordero de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico ya establecido en el contexto apocalíptico. «Cordero» es transparente en español y no requiere transliteración.
- source_word: γυνὴ αὐτοῦ
  english_pob_choice: his bride
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su novia
  - su esposa, la novia
  lexicon: BDAG
  rationale: El griego γυνή admite «mujer», «esposa» o, en contexto nupcial, «novia/novia-esposa». Aquí «esposa» mantiene la ambigüedad real entre esposa y prometida nupcial, y en español evita una interpretación demasiado restringida. Se deja la alternativa contextual de «novia» en nota.
- source_word: ἡτοίμασεν ἑαυτήν
  english_pob_choice: has made herself ready
  chosen_spanish: se ha preparado
  alternatives_spanish:
  - se ha dispuesto
  - se preparó
  lexicon: BDAG
  rationale: La construcción reflexiva se expresa con naturalidad en español mediante «se ha preparado». Mantiene la idea de preparación activa y completa sin añadir detalles no presentes en el griego.
theological_decisions:
- issue: Cómo traducir γυνὴ αὐτοῦ en la imagen matrimonial del Cordero
  english_pob_reading: his bride
  chosen_spanish_reading: su esposa
  alternative_spanish_readings:
  - su mujer
  - su novia
  rationale: El POB inglés preserva la tensión léxica de γυνή, admitiendo «wife» como alternativa. En español, «esposa» conserva la relación matrimonial sin forzar el matiz de «novia» ni el de simple «mujer». Dado que el contexto es escatológico y nupcial, la lectura mantiene la imagen de unión consumada sin eliminar la preparación previa.
  doctrine_reference: Translation philosophy §§2, 3, 6
- issue: Valor exhortativo de δώσομεν junto con χαίρωμεν y ἀγαλλιῶμεν
  english_pob_reading: let us give glory to him
  chosen_spanish_reading: demos gloria a él
  alternative_spanish_readings:
  - le demos gloria
  - daremos gloria a él
  rationale: La secuencia verbal funciona como una llamada litúrgica de alabanza. En español, la forma exhortativa plural preserva mejor el paralelismo que una traducción predictiva. No se introduce ninguna doctrina nueva; se documenta la decisión gramatical por su impacto en el tono de adoración.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés de POB. No se registraron revisiones previas aplicadas en la fuente inglesa, y el acuerdo de revisión fue alto/sin cambios. Se mantiene la tensión de γυνή mediante una nota alternativa y se conserva el valor exhortativo de la secuencia verbal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se traduce ἀρνίον como «Cordero» siguiendo la convención joánica/apocalíptica.
  - Se evita «SEÑOR» como sustituto no presente en el griego.
  - Se conserva un registro digno y publicable, con verbos exhortativos en primera persona plural para el tono litúrgico del pasaje.
