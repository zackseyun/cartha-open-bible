translation:
  language: es
  text: Y se le concedió vestirse de lino fino, resplandeciente y limpio, pues el lino fino son las obras justas[a] de los santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «actos justos». El término griego puede significar en otros contextos «requisitos justos», pero aquí se refiere más naturalmente a las obras justas de los santos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  english_pob_choice: it was given
  chosen_spanish: se le concedió
  alternatives_spanish:
  - le fue dado
  - se le dio
  lexicon: BDAG
  rationale: El pasivo impersonal de δίδωμι se conserva mejor en español con una construcción pasiva/reflexiva impersonal. «Se le concedió» mantiene la pasividad divina implícita sin nombrar un agente que el griego no explicita.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: se le
  alternatives_spanish:
  - a ella
  - para ella
  lexicon: BDAG
  rationale: El dativo femenino singular se integra naturalmente en español como complemento indirecto. «Se le» evita redundancia y mantiene claridad referencial en el contexto de la esposa/novia.
- source_word: ἵνα περιβάληται
  english_pob_choice: to clothe herself
  chosen_spanish: vestirse
  alternatives_spanish:
  - para que se vista
  - para revestirse
  lexicon: BDAG
  rationale: El valor de propósito de ἵνα y el matiz medio de περιβάλλω se reflejan de forma natural con «vestirse»; en español conserva la idea reflexiva sin sonar forzado. «Revestirse» es posible, pero menos natural aquí.
- source_word: βύσσινον
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino de calidad fina
  lexicon: BDAG
  rationale: «Lino fino» es la equivalencia directa y transparente de βύσσινος, y conserva el valor textil/lujoso del término en ambos usos del versículo.
- source_word: λαμπρὸν
  english_pob_choice: bright
  chosen_spanish: resplandeciente
  alternatives_spanish:
  - brillante
  - radiante
  lexicon: BDAG
  rationale: λαμπρός admite «brillante», «radiante» o «resplandeciente». «Resplandeciente» comunica mejor la imagen visual del vestido sin perder naturalidad en español.
- source_word: καθαρόν
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: BDAG
  rationale: «Limpio» sigue el sentido básico de καθαρός para una prenda y evita cargar de antemano un matiz exclusivamente moral que el versículo luego explicita simbólicamente.
- source_word: τὸ γὰρ βύσσινον
  english_pob_choice: for the fine linen
  chosen_spanish: porque el lino fino
  alternatives_spanish:
  - pues el lino fino
  - ya que el lino fino
  lexicon: BDAG
  rationale: γάρ funciona aquí de manera explicativa. «Porque» comunica con naturalidad la relación causal/explanatoria en español y permite preservar la repetición enfática de «lino fino».
- source_word: δικαιώματα
  english_pob_choice: righteous deeds
  chosen_spanish: las obras justas
  alternatives_spanish:
  - los actos justos
  - las acciones justas
  - las justas obras
  lexicon: BDAG
  rationale: En este contexto simbólico, el plural δικαιώματα señala actos/obras caracterizados por justicia. «Obras justas» refleja bien el plural y la función explicativa; «actos justos» también sería viable, pero menos idiomático en el registro bíblico español.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los creyentes santos
  - de los consagrados
  lexicon: BDAG
  rationale: ἅγιοι es la designación neotestamentaria habitual del pueblo de Dios. «Santos» es la forma más establecida y fiel en español eclesial, sin diluir el referente colectivo.
theological_decisions:
- issue: Sentido de δικαιώματα en relación con el vestido de la novia
  english_pob_reading: The garment symbolizes the righteous deeds of the saints.
  chosen_spanish_reading: El vestido simboliza las obras justas de los santos.
  alternative_spanish_readings:
  - El vestido simboliza los actos justos de los santos.
  - El vestido simboliza las justicias/obras de justicia de los santos.
  rationale: 'El texto griego identifica directamente el lino fino con τὰ δικαιώματα τῶν ἁγίων. En este contexto, el plural apunta más naturalmente a obras/actos justos que a normas o decretos. La traducción conserva esa tensión simbólica: el vestido es dado, y a la vez se relaciona con la conducta justa de los santos.'
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
- issue: Pasivo implícito en ἐδόθη
  english_pob_reading: 'The passive is left implicit: ''it was given to her.'''
  chosen_spanish_reading: 'El pasivo queda implícito: «se le concedió».'
  alternative_spanish_readings:
  - «le fue dado»
  - «Dios le dio»
  rationale: Revelación usa con frecuencia el pasivo divino. En español, «se le concedió» mantiene esa reserva del sujeto agente y suena natural en un registro bíblico digno, sin convertir la inferencia teológica en afirmación explícita del texto.
  doctrine_reference: Original-language primacy; preservar lo que el fuente dice sin añadir más
translation_notes:
  revision_awareness: 'El pasaje coincide en lo esencial con el control reciente: se mantiene el pasivo impersonal, el valor medio/reflexivo de περιβάλλω, y la lectura de δικαιώματα como obras/actos justos. Se ajustó la formulación española para mayor naturalidad sin perder la tensión fuente: el vestido es concedido y, a la vez, simboliza la justicia práctica de los santos.'
  spanish_consistency_notes:
  - Se conservó «lino fino» de manera uniforme para βύσσινον en ambas ocurrencias.
  - Se prefirió «santos» para ἅγιοι por consistencia con el uso bíblico eclesial del término.
  - No se introdujo «Cristo» ni «Señor» porque este versículo no los contiene.
  - La nota al pie se ancló solo en la primera ocurrencia de «lino fino», donde aparece la carga lexical principal.
