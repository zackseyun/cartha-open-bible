translation:
  language: es
  text: porque derramaron la sangre de santos y profetas[a], y tú les has dado sangre para beber[b]; son dignos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vertieron la sangre de santos y profetas». El verbo griego es literalmente «derramaron/vertieron», lo cual también hace eco del derramamiento de las copas de juicio en el contexto cercano.'
    reason: lexical_alternative
  - marker: b
    text: «Son dignos» significa que merecen este juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la causa de la declaración anterior con una conjunción causal natural en español. "Porque" mantiene el valor explicativo directo del griego y del inglés POB sin volverlo más interpretativo.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  lexicon: BDAG
  rationale: Se conserva el término literal en ambas ocurrencias, porque el verso enfatiza la retribución mediante la repetición de "sangre".
- source_word: ἁγίων
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - santos de Dios
  - santas personas
  lexicon: BDAG
  rationale: En español, "santos" comunica de forma natural el sentido bíblico de los creyentes apartados para Dios, sin trasladar la idea a una categoría eclesiástica posterior.
- source_word: προφητῶν
  english_pob_choice: prophets
  chosen_spanish: profetas
  lexicon: BDAG
  rationale: Equivalente directo y transparente del término griego, unido a "santos" para identificar a las víctimas.
- source_word: ἐξέχεαν
  english_pob_choice: poured out
  chosen_spanish: derramaron
  alternatives_spanish:
  - vertieron
  - pudieron derramar
  lexicon: BDAG
  rationale: Aunque literalmente la raíz significa "verter/derramar", en español "derramar la sangre" es la expresión natural y conserva la imagen verbal. En una nota se preserva la alternativa más literal frente a la posible lectura idiomática de "matar".
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente con el pronombre indirecto "les" en español, sin perder el referente a los perpetradores.
- source_word: δέδωκας
  english_pob_choice: you have given
  chosen_spanish: les has dado
  alternatives_spanish:
  - les diste
  lexicon: BDAG
  rationale: El perfecto griego se refleja con el presente perfecto español para conservar la acción completada con relevancia actual, como en el audit trail inglés.
- source_word: πιεῖν
  english_pob_choice: to drink
  chosen_spanish: para beber
  alternatives_spanish:
  - a beber
  lexicon: BDAG
  rationale: El infinitivo complementa naturalmente en español con "para beber", manteniendo el valor resultativo y la dureza de la imagen.
- source_word: ἄξιοί εἰσιν
  english_pob_choice: they are worthy
  chosen_spanish: dignos son
  alternatives_spanish:
  - lo merecen
  - son dignos de ello
  lexicon: BDAG
  rationale: Se preserva el juicio formal y solemne del griego, evitando añadir explícitamente el objeto implícito. "Dignos son" mantiene la gravedad judicial y refleja el valor de "worthy" como merecedores del castigo.
theological_decisions:
- issue: Lenguaje retributivo del juicio
  english_pob_reading: Retain the direct statement 'you have given them blood to drink; they are worthy' without softening.
  chosen_spanish_reading: Mantener "les has dado sangre para beber; dignos son" sin suavizar la retribución.
  alternative_spanish_readings:
  - les has pagado con sangre para beber; lo merecen
  - les diste sangre a beber; merecen esto
  rationale: El texto griego presenta un juicio proporcional y severo. La redacción española conserva esa franqueza sin convertirla en una paráfrasis moralizante o explicativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de "santos"
  english_pob_reading: Translate ἁγίων as 'saints' in the broad biblical sense of God's holy people.
  chosen_spanish_reading: Traducir ἁγίων como "santos" en el sentido bíblico amplio de pueblo apartado para Dios.
  alternative_spanish_readings:
  - santos de Dios
  - los fieles
  rationale: '"Santos" es el equivalente bíblico natural en español y evita introducir categorías eclesiásticas ajenas al contexto de Apocalipsis.'
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios respecto del borrador previo; esta propuesta mantiene la misma lectura base del audit trail inglés y ajusta solo la expresión natural en español.
  spanish_consistency_notes:
  - Se conserva el paralelismo de dos miembros con repetición de "sangre" para mantener la fuerza retórica del verso.
  - '"Santos" se usa en sentido bíblico general, no como título institucional posterior.'
  - '"Dignos son" mantiene el tono judicial y no añade el objeto implícito en griego.'
