review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del griego: causalidad (''porque''), repetición de ''sangre'', referencia a santos y profetas, juicio retributivo y declaración final de merecimiento. Sin embargo, no preserva del todo la decisión léxica auditada para ἐξέχεαν, ya que el texto principal usa ''derramaron'', mientras la nota presenta erróneamente la misma forma como alternativa. Además, la nota a debe reflejar correctamente la alternativa ''derramaron/vertieron'' frente a la opción idiomática ''derramaron la sangre''/''mataron''; y la formulación final ''dignos son'' suena algo rígida en español actual.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'dignos son' resulta marcadamente calcado y menos natural que 'son dignos' sin pérdida de solemnidad. 'Santos' es aceptable y eclesialmente legible. 'Les has dado sangre para beber' es comprensible, aunque 'sangre para que la beban' sería más idiomático; no es necesario cambiarlo si se busca cercanía formal. La principal reparación necesaria está en la nota a y en el orden más natural de la cláusula final.
  glossary_alignment: 'La terminología clave está bien alineada: αἷμα = ''sangre'', ἁγίων = ''santos'', προφητῶν = ''profetas''. No hay conflicto con los defaults del proyecto. La decisión para ἄξιοί εἰσιν debe conservar el matiz de ''merecimiento'' sin añadir objeto explícito; ''son dignos'' lo hace mejor en español. Para ἐξέχεαν, conviene mantener ''derramaron'' en el texto y corregir la nota para explicar la alternativa idiomática ''derramaron la sangre''/''mataron'' o la literalidad de ''vertieron''.'
  issues:
  - severity: medium
    issue: La nota [a] repite el mismo verbo del texto principal como si fuera alternativa.
    rationale: El inglés auditado contrasta 'poured out' con la alternativa idiomática 'shed'. En español, la nota debe reflejar una alternativa real; tal como está, no aporta información y confunde la justificación léxica.
  - severity: low
    issue: '''Dignos son'' suena innecesariamente invertido y calcado.'
    rationale: Aunque gramatical, en español bíblico moderno neutral 'son dignos' preserva mejor la solemnidad sin rigidez artificial ni pérdida de fidelidad.
  - severity: low
    issue: 'La decisión léxica de ἐξέχεαν menciona una alternativa incorrecta: ''pudieron derramar''.'
    rationale: Esa alternativa no corresponde al griego ni al audit trail; sugiere posibilidad en lugar de acción realizada.
  revised_spanish_text: porque derramaron la sangre de santos y profetas[a], y tú les has dado sangre para beber[b]; son dignos.
  revised_footnotes:
  - marker: a
    text: 'O: «vertieron la sangre de santos y profetas». El verbo griego es literalmente «derramaron/vertieron», lo cual también hace eco del derramamiento de las copas de juicio en el contexto cercano.'
    reason: lexical_alternative
  - marker: b
    text: «Son dignos» significa que merecen este juicio.
    reason: lexical_alternative
