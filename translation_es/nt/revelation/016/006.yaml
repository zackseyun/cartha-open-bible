  to: porque derramaron la sangre de santos y profetas[a], y tú les has dado sangre para beber[b]; son dignos.
  rationale: Se corrige la nota [a] para que preserve una alternativa real y la justificación auditada sobre la imagen de 'derramar/verter' vinculada a las copas. También se cambia 'dignos son' por 'son dignos' para mejorar la naturalidad del español sin alterar el tono judicial ni añadir contenido. No se requiere una revisión doctrinal compleja.
