translation:
  language: es
  text: 'Y oí al ángel de las aguas[c] que decía: «Justo eres tú,[a] el que es y el que era, el Santo,[b] porque has juzgado estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen un título más amplio, como «el que es y el que era y el que ha de venir», probablemente armonizado con fórmulas semejantes en Apocalipsis. El texto impreso aquí dice «el que es y el que era, el Santo».
    reason: textual_variant
  - marker: b
    text: O «el Justo».
    reason: lexical_alternative
  - marker: c
    text: O «el ángel sobre las aguas».
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ ἀγγέλου τῶν ὑδάτων
  english_pob_choice: the angel of the waters
  chosen_spanish: el ángel[a] de las aguas
  alternatives_spanish:
  - el ángel sobre las aguas
  - el ángel encargado de las aguas
  lexicon: BDAG
  rationale: Conservo la construcción genitiva de forma transparente como 'de las aguas', que es natural en español y deja abierta la relación exacta del ángel con las aguas, tal como hace la versión inglesa POB.
- source_word: Δίκαιος
  english_pob_choice: Righteous
  chosen_spanish: Justo
  alternatives_spanish:
  - Recto
  - Righteous
  lexicon: BDAG
  rationale: En español, 'Justo' comunica bien la rectitud moral y judicial de Dios en un contexto de proclamación litúrgica. 'Recto' suena posible pero menos idiomático aquí. Mantiene la tensión entre justicia jurídica y rectitud moral sin estrechar el sentido.
- source_word: ὁ ὢν καὶ ὁ ἦν
  english_pob_choice: the one who is and who was
  chosen_spanish: el que es y que era
  alternatives_spanish:
  - el que es y el que era
  - el que existe y que existía
  lexicon: BDAG
  rationale: Sigo de cerca la fórmula reverencial de Apocalipsis sin harmonizarla con la expresión más completa de otros pasajes. 'El que es y que era' preserva el valor formular y suena natural en español.
- source_word: ὁ ὅσιος
  english_pob_choice: the Holy One
  chosen_spanish: el Santo[b]
  alternatives_spanish:
  - el Santo
  - el Devoto
  - el Piadoso
  lexicon: BDAG
  rationale: El griego ὅσιος puede expresar santidad/devoción/carácter piadoso; en este contexto doxológico, 'el Santo' es la forma española más clara y reverente. Mantengo en nota la alternativa textual/interpretativa que la POB inglesa preserva.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: '''Porque'' reproduce la fuerza causal del griego con claridad contemporánea.'
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos juicios
  - estas acciones
  lexicon: BDAG
  rationale: Conservo la referencia demostrativa literal sin explicitar 'juicios', ya que el griego no repite ese sustantivo.
- source_word: ἔκρινας
  english_pob_choice: you have judged
  chosen_spanish: has juzgado
  alternatives_spanish:
  - juzgaste
  lexicon: BDAG
  rationale: El aoristo puede traducirse como pasado simple o perfecto. Opto por el perfecto 'has juzgado' para expresar un acto concluido con relevancia inmediata en la alabanza celestial, siguiendo la decisión inglesa auditada.
theological_decisions:
- issue: Lectura breve de ὁ ὅσιος frente a la fórmula ampliada de algunos manuscritos
  english_pob_reading: the one who is and who was, the Holy One
  chosen_spanish_reading: el que es y que era, el Santo
  alternative_spanish_readings:
  - el que es y que era y que ha de venir, el Santo
  - el que es y que era, el Santo [con otra puntuación interpretativa]
  rationale: Sigo el texto griego impreso SBLGNT y no armonizo con la fórmula más extensa de otros lugares de Apocalipsis. La nota en el aparato inglés se preserva como alternativa textual, sin importar esa expansión al texto principal.
  doctrine_reference: Principio POB de primacía del original y preservación de variantes textuales sin resolverlas artificialmente
- issue: Calificación moral/judicial de Dios en Δίκαιος
  english_pob_reading: Righteous are you
  chosen_spanish_reading: Justo eres tú
  alternative_spanish_readings:
  - Recto eres tú
  - Justo eres tú
  rationale: La declaración en contexto de juicio pide un término que abarque rectitud moral y justicia judicial. 'Justo' es el equivalente más equilibrado y reconocible en español, sin reducir el matiz a mera legalidad.
  doctrine_reference: Apocalipsis 16:5; doctrina bíblica de la justicia de Dios en juicio
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios adicionales; por eso la redacción sigue de cerca el texto griego SBLGNT y la solución auditada en inglés, sin armonizar ni expandir la fórmula divina.
  spanish_consistency_notes:
  - Mantengo 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni un κύριος que requiera decisión al respecto.
  - Uso 'Justo' para δίκαιος y 'el Santo' para ὁ ὅσιος, evitando mezclar ambos conceptos.
  - La secuencia verbal 'es / era' refleja la fórmula del griego y la distinción entre presente y pasado en la designación divina.
  - '''Estas cosas'' conserva la ambigüedad deliberada del demostrativo griego, sin especificar ''juicios'' en el cuerpo del texto.'
