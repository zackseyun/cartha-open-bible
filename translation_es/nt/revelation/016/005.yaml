    reason: textual_variant
  - marker: b
    text: O «el Justo».
    reason: lexical_alternative
  - marker: c
    text: O «el ángel sobre las aguas».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota textual para que corresponda a la variante real del griego, se añade la alternativa léxica omitida para «ángel de las aguas», se arregla la gramática de la nota y se mejora ligeramente la naturalidad de la fórmula divina con «el que es y el que era». Aunque la nota [b] no es ideal respecto al aparato inglés, se mantiene como reparación mínima aceptable de una alternativa léxica ya presente en el expediente español; no requiere adjudicación superior.
