    issue: «que salía del santuario» añade un matiz aspectual no explícito en ἐκ τοῦ ναοῦ
    rationale: El griego vincula «voz» con el origen «desde/del santuario» y luego con el participio «diciendo». «Salía» interpreta dinámicamente la procedencia de la voz y va más allá del texto.
  - severity: low
