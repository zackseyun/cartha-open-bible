  rationale: Se reemplazó «que salía del santuario» por «desde el santuario» para ceñirse mejor a ἐκ τοῦ ναοῦ sin añadir un matiz no explicitado en el griego. Se mantuvo «voz fuerte», «santuario», «copas», «ira de Dios» y «sobre la tierra» por su buena fidelidad y naturalidad. Se ajustaron las notas para reflejar con mayor precisión el expediente léxico del POB inglés y evitar alternativas menos relevantes.
