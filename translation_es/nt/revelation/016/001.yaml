translation:
  language: es
  text: 'Y oí una voz fuerte desde el santuario[a], diciendo a los siete ángeles: «Vayan y derramen las siete copas[b] de la ira de Dios sobre la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo» para ναός, aunque aquí «santuario» suele ser más preciso, porque ναός a menudo se refiere más específicamente al lugar santo que al complejo del templo en general.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente algunas versiones dicen «viales», pero el griego φιάλη se refiere a un recipiente como una copa o tazón; «copas» comunica mejor esa imagen en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλης φωνῆς
  english_pob_choice: a loud voice
  chosen_spanish: una voz fuerte
  alternatives_spanish:
  - una gran voz
  - una voz potente
  lexicon: BDAG
  rationale: En español, «voz fuerte» comunica de manera natural la idea de loudness/volume que el griego expresa con μέγας + φωνή. «Gran voz» sería posible pero suena menos idiomático; «potente» es también natural, aunque cambia un poco el matiz acústico.
- source_word: τοῦ ναοῦ
  english_pob_choice: sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - del templo
  lexicon: BDAG
  rationale: Se conserva la distinción de ναός como el lugar sagrado específico, no simplemente el complejo templario más amplio. «Santuario» es la opción española más fiel y clara para este contexto celestial.
- source_word: λεγούσης
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que decía
  - hablando
  lexicon: BDAG
  rationale: El participio presente se vierte naturalmente en español con una construcción participial que modifica a «voz». «Diciendo» mantiene la vivacidad del texto y evita una paráfrasis más pesada.
- source_word: Ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan de allí
  - Salgan
  lexicon: BDAG
  rationale: Como imperativo dirigido a los ángeles, «vayan» es una orden directa y natural en español. Conserva el valor de mandato sin añadir matices innecesarios.
- source_word: ἐκχέετε
  english_pob_choice: pour out
  chosen_spanish: derramen
  alternatives_spanish:
  - viertan
  - vacien
  lexicon: BDAG
  rationale: En un contexto de juicio, «derramar» reproduce bien la imagen de vaciar completamente el contenido de las copas. Aunque «verter» es posible, «derramar» suena más natural y conserva la fuerza imagética.
- source_word: φιάλας
  english_pob_choice: bowls
  chosen_spanish: copas
  alternatives_spanish:
  - vasos
  - cálices
  lexicon: BDAG
  rationale: Aunque en inglés POB opta por «bowls» frente a «vials», en español el recipiente más natural para φιάλη en este pasaje apocalíptico es «copa», que mantiene la imagen de un recipiente ancho y poco profundo sin recurrir a un término técnico poco idiomático. «Viales» sería inadecuado; «vasos» es demasiado general.
- source_word: θυμοῦ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  lexicon: BDAG
  rationale: «Ira» es el término español más directo y solemne para θυμός en este contexto de juicio divino. Conserva el peso teológico de la expresión sin exagerar hacia «furor» ni suavizarla a un mero enojo.
- source_word: εἰς τὴν γῆν
  english_pob_choice: onto the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - contra la tierra
  - sobre el mundo
  lexicon: BDAG
  rationale: Con el verbo de derramar, «sobre la tierra» comunica con claridad la dirección del acto y su alcance universal. «Tierra» refleja mejor el referente cósmico del pasaje que una traducción localista como «país» o «territorio».
theological_decisions:
- issue: Renderizado de ναός en la escena celestial
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - templo
  rationale: «Santuario» preserva la especificidad de ναός como espacio sagrado interior o celestial, evitando diluir la imagen en el complejo más amplio sugerido por «templo». No introduce una doctrina nueva; simplemente conserva una distinción espacial del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: La expresión θυμοῦ τοῦ θεοῦ
  english_pob_reading: the wrath of God
  chosen_spanish_reading: la ira de Dios
  alternative_spanish_readings:
  - la cólera de Dios
  - el furor de Dios
  rationale: «Ira» mantiene el sentido de juicio divino solemne y no rebaja la fuerza del término. Se evita «cólera» por sonar más coloquial y «furor» por intensificar de forma menos estable la carga semántica.
  doctrine_reference: Affirmations; Translation philosophy §6
translation_notes:
  revision_awareness: Coincide con el pasaje griego SBLGNT y con el audit trail en inglés; no se registran revisiones posteriores que alteren la formulación. Se mantiene la distinción léxica de ναός y φιάλη, adaptando el recipiente a una equivalencia española natural y transparente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí el texto dice «Dios», por lo que no aplica.
  - Se mantiene «ira» para θυμός en este contexto de juicio apocalíptico.
  - Se traduce φιάλη como «copas» por naturalidad en español, aunque el inglés POB prefirió «bowls» frente a «vials».
  - Se conserva un registro reverente y claro, sin arcaísmos innecesarios.
