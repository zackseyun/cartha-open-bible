revisions:
- from: Y el quinto derramó su copa sobre el trono de la bestia[a]; y su reino quedó oscurecido, y se mordían las lenguas por el dolor[b].
  to: Y el quinto derramó su copa sobre el trono de la bestia[a], y su reino quedó oscurecido, y se mordían las lenguas por el dolor[b].
  rationale: Se conserva el texto principal casi intacto porque refleja bien el griego y lee con naturalidad en español. Se corrige la nota [b] para alinearla con la alternativa léxica auditada en el POB inglés («was plunged into darkness») y se ajusta la puntuación para mayor fluidez en español.
  reviewer_model: gpt-5.4
