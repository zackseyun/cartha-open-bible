translation:
  language: es
  text: Y el quinto derramó su copa sobre el trono de la bestia[a], y su reino quedó oscurecido, y se mordían las lenguas por el dolor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su reino». El griego usa un sustantivo neutro para «bestia»; el español, en cambio, obliga a una forma posesiva que puede sonar más personal.
    reason: lexical_alternative
  - marker: b
    text: O «quedó sumido en tinieblas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πέμπτος
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - el quinto ángel
  lexicon: BDAG
  rationale: El griego presenta solo el ordinal con artículo; en español se conserva igual de forma explícita y sobria. No se añade «ángel» en el texto principal porque no está expresado aquí, aunque el contexto lo sugiera.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - echó
  lexicon: BDAG
  rationale: «Derramó» comunica con naturalidad la acción ritual de la copa y mantiene la correspondencia con la fórmula repetida del capítulo sin volverlo mecánico.
- source_word: φιάλην
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - vasija
  - cuenco
  lexicon: BDAG
  rationale: En Apocalipsis, φιάλη se entiende mejor en español como «copa» para este contexto cultual/judicial. «Vasija» o «cuenco» serían posibles, pero menos idiomáticos en una lectura bíblica amplia.
- source_word: ἐπὶ τὸν θρόνον τοῦ θηρίου
  english_pob_choice: on the throne of the beast
  chosen_spanish: sobre el trono de la bestia
  alternatives_spanish:
  - en el trono de la bestia
  - sobre el trono del monstruo
  lexicon: BDAG
  rationale: «Sobre» reproduce bien ἐπί con acusativo. «Bestia» conserva la terminología apocalíptica establecida para θηρίον y evita suavizar la imagen.
- source_word: ἡ βασιλεία αὐτοῦ
  english_pob_choice: its kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su soberanía
  - su dominio
  lexicon: BDAG
  rationale: En español, «reino» es la equivalencia directa y natural de βασιλεία en este pasaje, refiriéndose al ámbito de dominio de la bestia. El posesivo «su» mantiene la referencia al sujeto inmediato sin forzar el matiz neutro/pronominal del griego.
- source_word: ἐσκοτωμένη
  english_pob_choice: darkened
  chosen_spanish: quedó oscurecido
  alternatives_spanish:
  - fue oscurecido
  - quedó en tinieblas
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante; «quedó oscurecido» preserva esa condición sin añadir una imagen más fuerte que la del texto. Se evita una paráfrasis más expansiva como «quedó envuelto en tinieblas».
- source_word: ἐμασῶντο
  english_pob_choice: were gnawing
  chosen_spanish: se mordían
  alternatives_spanish:
  - estaban mordiéndose
  - roían
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua. En español, «se mordían» transmite el gesto repetido y doloroso con suficiente literalidad y naturalidad; «roían» sería más duro pero menos directo para las lenguas.
- source_word: τὰς γλώσσας αὐτῶν
  english_pob_choice: their tongues
  chosen_spanish: las lenguas
  alternatives_spanish:
  - sus lenguas
  - sus lenguas con dolor
  lexicon: BDAG
  rationale: Se mantiene la imagen corporal literal. El posesivo ya está contenido en el verbo y el contexto; en español se expresa de forma natural en la cláusula completa.
- source_word: ἐκ τοῦ πόνου
  english_pob_choice: because of the pain
  chosen_spanish: por el dolor
  alternatives_spanish:
  - a causa del dolor
  - debido al dolor
  lexicon: BDAG
  rationale: ἐκ aquí indica causa o origen. «Por el dolor» es la forma más breve y fluida en español; conserva la relación causal sin sobreexplicar.
theological_decisions:
- issue: Referente pronominal de la bestia
  english_pob_reading: its kingdom
  chosen_spanish_reading: su reino
  alternative_spanish_readings:
  - su reino
  - el reino de ella
  rationale: El griego usa θηρίου, neutro, y el inglés POB opta por «its» para no imponer una personificación. En español, el posesivo «su» evita la necesidad de marcar género y mantiene la referencia al dominio de la bestia sin añadir interpretación.
  doctrine_reference: Translation philosophy §1, §5
- issue: Intensidad de la oscuridad
  english_pob_reading: became darkened
  chosen_spanish_reading: quedó oscurecido
  alternative_spanish_readings:
  - fue oscurecido
  - quedó en tinieblas
  rationale: La forma elegida preserva el resultado del juicio sin aumentar la imagen más allá del participio griego. «Quedó oscurecido» mantiene el estado resultante y la sobriedad del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Coincide con el último pase de revisión disponible, que indica ausencia de cambios y alta concordancia; no se detectaron revisiones posteriores que obligaran a ajustar el texto.
  spanish_consistency_notes:
  - Se conserva «bestia» para θηρίον, conforme al uso apocalíptico establecido.
  - Se usa «copa» para φιάλη en lugar de «vaso» o «vial», por claridad bíblica y consistencia con el ciclo de las copas.
  - Se mantiene «reino» para βασιλεία y no «reinado», porque el contexto enfatiza el dominio/ámbito de la bestia.
  - Se traduce el imperfecto con una forma progresiva/iterativa («se mordían») para reflejar la duración de la acción.
  - Se evita introducir «ángel» en el texto principal porque el griego no lo expresa explícitamente en este versículo.
