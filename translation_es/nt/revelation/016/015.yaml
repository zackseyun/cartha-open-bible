    rationale: Ἰδοὺ en discurso apocalíptico introduce una advertencia solemne. En español eclesial legible, «¡He aquí!» preserva mejor esa fuerza que «¡Mira!», que además puede sonar como imperativo conversacional.
  - severity: high
    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: El contenido de la nota [a] («el que vela» / «el que está vigilante») corresponde a γρηγορῶν, no a Ἰδοὺ. Debe anclarse en «vela[a]» o expresión equivalente dentro del sintagma pertinente.
