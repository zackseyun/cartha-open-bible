translation:
  language: es
  text: ¡He aquí! Vengo como ladrón. Bienaventurado el que vela[a] y guarda sus vestiduras[b], para que no ande desnudo y vean su vergüenza—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que está vigilante» / «el que hace guardia».
    reason: lexical_alternative
  - marker: b
    text: O «su indecencia»; el término griego puede denotar exposición vergonzosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Miren!
  lexicon: BDAG
  rationale: La interjección llama la atención del oyente con tono solemne. En español, «¡Mira!» conserva esa fuerza de advertencia inmediata sin sonar demasiado arcaico.
- source_word: ἔρχομαι
  english_pob_choice: I am coming
  chosen_spanish: Vengo
  alternatives_spanish:
  - Estoy viniendo
  - Estoy por venir
  lexicon: BDAG
  rationale: El presente en griego expresa inminencia y viveza. «Vengo» mantiene esa fuerza directa y natural en español, sin sobrecargar con perífrasis.
- source_word: ὡς κλέπτης
  english_pob_choice: like a thief
  chosen_spanish: como ladrón
  alternatives_spanish:
  - como un ladrón
  - como si fuera un ladrón
  lexicon: BDAG
  rationale: La comparación debe sonar idiomática en español y conservar la imagen de llegada inesperada. «Como ladrón» reproduce con sobriedad la comparación del griego.
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Bendito
  lexicon: BDAG
  rationale: En una bienaventuranza, «Bienaventurado» conserva mejor el peso bíblico y teológico que «dichoso», sin reducirlo a una emoción psicológica.
- source_word: ὁ γρηγορῶν
  english_pob_choice: the one who stays awake
  chosen_spanish: el que vela
  alternatives_spanish:
  - el que está despierto
  - el que está vigilante
  lexicon: BDAG
  rationale: El participio puede significar estar despierto o vigilar. «El que vela» conserva ambas ideas de alerta y vigilancia, y encaja bien en español bíblico actual.
- source_word: τηρῶν
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - conserva
  - custodia
  lexicon: BDAG
  rationale: Con «sus vestiduras», τηρέω comunica el acto de preservar/proteger. «Guarda» es preciso y natural; también mantiene la posibilidad de sentido simbólico sin explicitarlo.
- source_word: τὰ ἱμάτια αὐτοῦ
  english_pob_choice: his garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus ropas
  - sus vestidos
  - sus prendas
  lexicon: BDAG
  rationale: «Vestiduras» conserva el registro elevado y la resonancia simbólica que el texto puede tener en Apocalipsis, mejor que formas más coloquiales.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... may not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: La construcción final/purposiva se expresa de forma natural y fiel con «para que no».
- source_word: γυμνὸς περιπατῇ
  english_pob_choice: he may not walk about naked
  chosen_spanish: ande desnudo
  alternatives_spanish:
  - camine desnudo
  - ande en desnudez
  lexicon: BDAG
  rationale: «Ande desnudo» conserva la imagen concreta de caminar sin ropa, con español natural y sin añadir matices ajenos.
- source_word: βλέπωσιν
  english_pob_choice: they see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - contemplen
  lexicon: BDAG
  rationale: El griego deja el sujeto en plural indefinido. «Vean» preserva esa indefinición y evita especificar indebidamente quiénes son.
- source_word: τὴν ἀσχημοσύνην αὐτοῦ
  english_pob_choice: his shame
  chosen_spanish: su vergüenza
  alternatives_spanish:
  - su indecencia
  - su deshonra
  lexicon: BDAG
  rationale: «ἀσχημοσύνη» puede abarcar vergüenza, indecencia o exposición vergonzosa. «Vergüenza» comunica bien la carga de deshonra pública sin estrechar demasiado el sentido.
theological_decisions:
- issue: Imagen de vestiduras, desnudez y vergüenza en contexto apocalíptico
  english_pob_reading: Retain the concrete imagery ('garments,' 'naked,' 'shame') without allegorical expansion in the main text.
  chosen_spanish_reading: Mantener la imaginería concreta («vestiduras», «desnudo», «vergüenza») sin convertirla en alegoría explicativa dentro del texto principal.
  alternative_spanish_readings:
  - Interpretar «vestiduras» como obras de justicia o preparación moral
  - Explicitar «desnudez» como vergüenza escatológica
  rationale: El griego presenta imágenes concretas y el texto apocalíptico admite resonancia simbólica, pero no obliga a resolverla en la traducción. La versión española conserva la tensión interpretativa.
  doctrine_reference: Translation philosophy §3
- issue: Referencia masculina singular genérica
  english_pob_reading: Use singular masculine pronouns ('his') with 'the one who'
  chosen_spanish_reading: Usar singular masculino con «el que» y «sus»
  alternative_spanish_readings:
  - 'Reformular en plural: «los que... sus vestiduras»'
  - Usar formas inclusivas con «quien» y «sus»
  rationale: La construcción griega es singular masculina y tiene fuerza representativa. Mantener «el que» respeta la forma gramatical sin neutralizarla indebidamente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el pass más reciente: no se requirieron cambios tras la revisión; el control cruzado indicó acuerdo alto (1.0).'
  spanish_consistency_notes:
  - Se mantiene «Bienaventurado» para la fórmula de beatitud, coherente con el registro bíblico y con la decisión inglesa.
  - «Vengo» conserva el presente profético/inminente del griego mejor que una forma futura simple.
  - «Vestiduras» preserva el registro elevado de ἱμάτια y su posible carga simbólica en Apocalipsis.
  - «Vergüenza» traduce ἀσχημοσύνη de modo amplio, dejando abierta la posibilidad de indecencia o deshonra sin perder la imagen concreta.
  - La puntuación con raya final reproduce el corte del texto fuente.
