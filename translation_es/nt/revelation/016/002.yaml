revisions:
- from: Y fue el primero y derramó su copa sobre la tierra[a]; y se produjo una llaga[b] mala y perniciosa sobre los hombres que tenían la marca de la bestia y que adoraban su imagen.
  to: Y fue el primero y derramó su copa sobre la tierra[a]; y se produjo una llaga[b] dañina y grave sobre las personas que tenían la marca de la bestia y que adoraban su imagen.
  rationale: 'La revisión conserva la estructura del borrador pero corrige dos puntos para alinearse mejor con el griego y con el audit trail inglés: «las personas» refleja con mayor fidelidad el sentido inclusivo de ἀνθρώπους, y «dañina y grave» expresa de manera más natural en español la intensificación de κακὸν καὶ πονηρόν sin moralizar la llaga.'
