review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa y el sentido global del griego: «el primero» para ὁ πρῶτος, «derramó su copa», «sobre la tierra», y la restricción del juicio a quienes tienen la marca de la bestia y adoran su imagen. Sin embargo, dos decisiones no preservan del todo el audit trail del POB: (1) ἐπὶ τοὺς ἀνθρώπους se vierte mejor como «sobre las personas» o «sobre la gente» que «sobre los hombres», porque el inglés auditado explicitó el valor inclusivo de ἄνθρωποι; (2) la dupla κακὸν καὶ πονηρόν en español queda menos natural con «mala y perniciosa» y se aleja del matiz auditado de severidad/daño más que de maldad moral.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «llaga mala y perniciosa» suena algo rígido y poco idiomático en lectura continua. «Se produjo» es correcto, aunque «le salió» sería demasiado libre; por tanto puede mantenerse. La principal mejora de legibilidad y fidelidad es evitar «los hombres» como genérico y optar por una forma inclusiva natural de registro bíblico.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Bestia», «marca», «adoraban» y «copa» son adecuados. La revisión propuesta ajusta ἄνθρωποι a «personas» para alinearse con la decisión POB de evitar un masculino genérico restrictivo y mejora la representación de los dos adjetivos de ἕλκος sin introducir moralización.
  issues:
  - severity: medium
    issue: «sobre los hombres» para ἐπὶ τοὺς ἀνθρώπους
    rationale: El griego ἄνθρωποι aquí significa seres humanos/personas, no varones. El English POB audit trail justificó «people» precisamente para preservar ese alcance general. En español actual y eclesial amplio, «las personas» o «la gente» evita una lectura masculina restrictiva.
  - severity: medium
    issue: «llaga mala y perniciosa» suena poco natural y no refleja del todo el matiz auditado
    rationale: 'La decisión inglesa distingue dos adjetivos fuertes sin sugerir maldad moral en la llaga: «harmful and grievous». «Mala y perniciosa» conserva duplicación, pero «mala» es débil y «perniciosa» suena abstracta. Una formulación como «llaga dañina y grave» comunica mejor severidad e injuria en español natural.'
  revised_spanish_text: Y fue el primero y derramó su copa sobre la tierra[a]; y se produjo una llaga[b] dañina y grave sobre las personas que tenían la marca de la bestia y que adoraban su imagen.
  revised_footnotes:
  - marker: a
    text: O «sobre la tierra». El griego usa εἰς con dirección hacia la tierra como blanco del derramamiento.
    reason: lexical_alternative
  - marker: b
    text: O «una llaga mala y perniciosa». El griego usa dos adjetivos fuertes, κακόν y πονηρόν, para intensificar la gravedad de la plaga.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva la estructura del borrador pero corrige dos puntos para alinearse mejor con el griego y con el audit trail inglés: «las personas» refleja con mayor fidelidad el sentido inclusivo de ἀνθρώπους, y «dañina y grave» expresa de manera más natural en español la intensificación de κακὸν καὶ πονηρόν sin moralizar la llaga.'
