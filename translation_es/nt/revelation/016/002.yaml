translation:
  language: es
  text: Y fue el primero y derramó su copa sobre la tierra[a]; y se produjo una llaga[b] dañina y grave sobre las personas que tenían la marca de la bestia y que adoraban su imagen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la tierra». El griego usa εἰς con dirección hacia la tierra como blanco del derramamiento.
    reason: lexical_alternative
  - marker: b
    text: O «una llaga mala y perniciosa». El griego usa dos adjetivos fuertes, κακόν y πονηρόν, para intensificar la gravedad de la plaga.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El aoristo narrativo de ἀπέρχομαι expresa avance en la secuencia; en español, «fue» conserva ese movimiento de manera natural y sobria sin añadir énfasis ajeno al texto.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer ángel
  - el primero de los siete
  lexicon: BDAG
  rationale: El artículo con el adjetivo funciona sustantivamente y remite al primero de los siete ángeles por el contexto. «El primero» mantiene la forma del griego sin introducir un sustantivo que el verso no expresa.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - echó
  lexicon: BDAG
  rationale: ἐκχέω se traduce bien por «derramó» en un registro bíblico natural. En español comunica el acto de vaciar la copa sin sonar mecánico.
- source_word: φιάλην
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - vasija
  - tazón
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «bowl», en español apocalíptico «copa» es la equivalencia más transparente y tradicional para φιάλη en este contexto de juicio; además evita la ambigüedad de una copa para beber, que en español ya está integrada en el simbolismo de Apocalipsis.
- source_word: εἰς τὴν γῆν
  english_pob_choice: onto the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - a la tierra
  - sobre el suelo
  lexicon: BDAG
  rationale: εἰς con γῆ indica dirección hacia el objetivo del derramamiento. «Sobre la tierra» preserva el sentido global y funciona de modo idiomático en español apocalíptico.
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: se produjo
  alternatives_spanish:
  - vino
  - apareció
  - hubo
  lexicon: BDAG
  rationale: Aquí γίνομαι introduce el resultado del juicio. «Se produjo» expresa la aparición del mal sin implicar causalidad adicional y conserva el valor de acontecimiento resultante.
- source_word: ἕλκος
  english_pob_choice: sore
  chosen_spanish: llaga
  alternatives_spanish:
  - sore
  - úlcera
  - forúnculo
  lexicon: BDAG
  rationale: ἕλκος designa una lesión ulcerosa o supurante. «Llaga» es comprensible, bíblica y suficientemente amplia en español; evita la precisión clínica de «úlcera» y la especificidad de «forúnculo».
- source_word: κακὸν
  english_pob_choice: harmful
  chosen_spanish: mala
  alternatives_spanish:
  - dañina
  - nociva
  - perjudicial
  lexicon: BDAG
  rationale: El adjetivo califica la llaga por su carácter dañino. «Mala» reproduce la fuerza básica y permite mantener el paralelismo con el siguiente adjetivo sin sobreinterpretarlo.
- source_word: πονηρὸν
  english_pob_choice: grievous
  chosen_spanish: perniciosa
  alternatives_spanish:
  - maligna
  - grave
  - dañina
  lexicon: BDAG
  rationale: πονηρός aquí intensifica la gravedad de la llaga. «Perniciosa» comunica el efecto funesto e injurioso sin convertir el adjetivo en una afirmación moral sobre una herida.
- source_word: ἐπὶ τοὺς ἀνθρώπους
  english_pob_choice: upon the people
  chosen_spanish: sobre los hombres
  alternatives_spanish:
  - sobre la gente
  - sobre las personas
  lexicon: BDAG
  rationale: ἀνθρώπους designa seres humanos concretos; «hombres» conserva la referencia directa al grupo destinatario del juicio, mientras «gente» sería más coloquial. El plural masculino genérico es aceptable aquí por el registro apocalíptico y la cercanía al griego.
- source_word: τοὺς ἔχοντας
  english_pob_choice: who had
  chosen_spanish: que tenían
  alternatives_spanish:
  - que poseían
  - que llevaban
  lexicon: BDAG
  rationale: El participio presente se vierte con una relativa natural en español. «Tenían» expresa posesión continua o estable de la marca en el tiempo del juicio.
- source_word: τὸ χάραγμα τοῦ θηρίου
  english_pob_choice: the mark of the beast
  chosen_spanish: la marca de la bestia
  alternatives_spanish:
  - la señal de la bestia
  - el sello de la bestia
  lexicon: BDAG
  rationale: «Marca» es la equivalencia transparente y estable de χάραγμα; «bestia» mantiene el uso técnico de θηρίον en Apocalipsis.
- source_word: τοὺς προσκυνοῦντας
  english_pob_choice: who worshiped
  chosen_spanish: que adoraban
  alternatives_spanish:
  - que daban culto
  - que se postraban ante
  lexicon: BDAG
  rationale: En Apocalipsis, προσκυνέω tiene fuerza de adoración idolátrica. «Adoraban» expresa mejor esa dimensión religiosa que un simple gesto físico.
- source_word: τῇ εἰκόνι αὐτοῦ
  english_pob_choice: its image
  chosen_spanish: su imagen
  alternatives_spanish:
  - la imagen de ella
  - la imagen de él
  lexicon: BDAG
  rationale: El antecedente griego de θηρίον es neutro, pero en español «su imagen» evita un ajuste forzado del género y suena natural. El referente sigue siendo la imagen de la bestia.
theological_decisions:
- issue: Intensificación de la llaga mediante dos adjetivos negativos
  english_pob_reading: Rendered as 'a harmful and grievous sore'
  chosen_spanish_reading: «una llaga mala y perniciosa»
  alternative_spanish_readings:
  - una llaga dañina y grave
  - una llaga mala y grave
  - una úlcera mala y perniciosa
  rationale: El griego acumula dos calificativos fuertes, κακόν y πονηρόν, para intensificar el juicio. La traducción conserva la duplicación y evita resolverla en un solo término o moralizar la llaga. «Mala y perniciosa» mantiene la severidad sin perder la tensión lexical.
  doctrine_reference: Translation philosophy §6; Preserve theological tension rather than resolve it
- issue: Alcance del juicio sobre los destinatarios
  english_pob_reading: '''the people who had the mark of the beast and who worshiped its image'''
  chosen_spanish_reading: «sobre los hombres que tenían la marca de la bestia y que adoraban su imagen»
  alternative_spanish_readings:
  - sobre las personas que tenían...
  - sobre la gente que tenía...
  rationale: El texto limita explícitamente la plaga a quienes están identificados con la bestia por la marca y la adoración. Se conserva esa delimitación sin ampliar ni suavizar el destinatario del juicio.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego y el audit trail inglés sin depender mecánicamente de la forma inglesa. Se conservaron la secuencia narrativa, el valor aspectual de los verbos y la intensificación de los dos adjetivos negativos. La decisión principal fue renderizar φιάλην como «copa» por adecuación del registro apocalíptico en español, aunque el inglés POB usó «bowl»; esta elección se hizo por equivalencia funcional y claridad para lectores hispanos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Bestia» se usa como término técnico coherente con Apocalipsis para θηρίον.
  - «Adoraban» preserva la fuerza cultual de προσκυνέω en lugar de un simple gesto de reverencia.
  - «Llaga» evita estrechar ἕλκος a una lesión demasiado específica y conserva el tono bíblico del pasaje.
