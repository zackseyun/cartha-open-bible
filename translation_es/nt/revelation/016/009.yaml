translation:
  language: es
  text: Y la gente fue abrasada[a] por el gran calor, y blasfemó el nombre de Dios, que tiene autoridad sobre estas plagas, y no se arrepintió para darle gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quemada por gran calor'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκαυματίσθησαν
  english_pob_choice: were scorched
  chosen_spanish: fueron quemados
  alternatives_spanish:
  - fueron escaldados
  - fueron abrasados
  lexicon: BDAG
  rationale: El aoristo pasivo de καυματίζω expresa haber sido alcanzados por el ardor del calor. En español, 'fueron quemados' comunica bien la acción pasiva de ser dañados por el fuego o calor, y mantiene la fuerza del juicio sin añadir más de lo que el texto dice.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: the people
  chosen_spanish: los hombres
  alternatives_spanish:
  - la gente
  - las personas
  lexicon: BDAG
  rationale: Aunque el plural masculino puede ser genérico, en español 'los hombres' puede sonar masculino específico. Aquí se conserva la forma más cercana al griego, pero se reconoce la tensión inclusiva; 'la gente' o 'las personas' suavizarían el problema, aunque no reflejan tan directamente la forma del texto griego.
- source_word: καῦμα μέγα
  english_pob_choice: great heat
  chosen_spanish: gran calor
  alternatives_spanish:
  - gran calor intenso
  - ardor grande
  lexicon: BDAG
  rationale: La expresión describe la intensidad del calor que causa la quemadura. 'Gran calor' es natural en español y refleja μέγα como magnitud/intensidad. Se evita una paráfrasis más libre para no perder el enlace con el juicio por calor.
- source_word: ἐβλασφήμησαν
  english_pob_choice: blasphemed
  chosen_spanish: blasfemaron
  alternatives_spanish:
  - insultaron
  - injuriaron
  lexicon: BDAG
  rationale: En relación con el nombre de Dios, βλασφημέω exige el verbo técnico 'blasfemar', que preserva el peso religioso y teológico del acto verbal impío.
- source_word: τὸ ὄνομα τοῦ θεοῦ
  english_pob_choice: the name of God
  chosen_spanish: el nombre de Dios
  alternatives_spanish:
  - el nombre de Dios Padre
  - el nombre divino
  lexicon: BDAG
  rationale: Se mantiene el idioma bíblico 'el nombre de Dios', que en español conserva el valor de honor, revelación e identidad sin explicitar en exceso.
- source_word: τοῦ ἔχοντος τὴν ἐξουσίαν ἐπὶ τὰς πληγὰς ταύτας
  english_pob_choice: who has authority over these plagues
  chosen_spanish: que tiene autoridad sobre estas plagas
  alternatives_spanish:
  - que posee poder sobre estas plagas
  - que ejerce autoridad sobre estas plagas
  lexicon: BDAG
  rationale: 'El participio presente pide presente: ''tiene''. ἐξουσία se traduce mejor por ''autoridad'' que por ''poder'', porque el texto subraya dominio legítimo y no solo capacidad. ''Sobre estas plagas'' refleja bien ἐπί con acusativo en sentido gobernante.'
- source_word: πληγὰς
  english_pob_choice: plagues
  chosen_spanish: plagas
  alternatives_spanish:
  - golpes
  - aflicciones
  lexicon: BDAG
  rationale: En Apocalipsis, πληγή designa juicios devastadores de Dios; 'plagas' conserva la resonancia bíblica e intertextual con Éxodo y el contexto apocalíptico.
- source_word: οὐ μετενόησαν
  english_pob_choice: did not repent
  chosen_spanish: no se arrepintieron
  alternatives_spanish:
  - no cambiaron de mente
  - no se volvieron
  lexicon: BDAG
  rationale: En contexto de juicio, μετανοέω expresa arrepentimiento moral y espiritual, no solo reconsideración mental. 'No se arrepintieron' es el equivalente español más claro y fiel.
- source_word: δοῦναι αὐτῷ δόξαν
  english_pob_choice: to give him glory
  chosen_spanish: para darle gloria
  alternatives_spanish:
  - a fin de darle gloria
  - para glorificarlo
  lexicon: BDAG
  rationale: El infinitivo final expresa el propósito esperado del arrepentimiento. 'Darle gloria' conserva el giro bíblico concreto y evita perder la relación entre arrepentimiento y honra debida a Dios.
theological_decisions:
- issue: Referencia inclusiva de οἱ ἄνθρωποι en plural masculino
  english_pob_reading: the people
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la gente
  - las personas
  rationale: La lectura inglesa POB optó por un plural inclusivo para no restringirlo a varones. En español, sin embargo, 'los hombres' sigue siendo una forma posible pero ambigua; se documenta la tensión para que el lector entienda que el griego apunta a la humanidad en general, no solo a varones.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Soberanía divina en 'quien tiene autoridad sobre estas plagas'
  english_pob_reading: who has authority over these plagues
  chosen_spanish_reading: que tiene autoridad sobre estas plagas
  alternative_spanish_readings:
  - que posee poder sobre estas plagas
  - que ejerce autoridad sobre estas plagas
  rationale: La frase atribuye de forma directa autoridad a Dios sobre las plagas. La traducción conserva esa afirmación sin suavizarla ni convertirla en una mera asociación temática.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 y 3
translation_notes:
  revision_awareness: La POB inglesa revisó 'intense heat' a 'great heat' para reflejar más directamente καῦμα μέγα. La versión española sigue esa misma decisión semántica con 'gran calor', manteniendo el tono natural y el vínculo con el juicio por calor.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, sin máscara litúrgica, conforme al criterio del proyecto.
  - Se mantiene 'plagas' para πληγαί por su resonancia apocalíptica e intertextual.
  - '''Arrepintieron'' se conserva como traducción moral-espiritual de μετανοέω en contexto de juicio.'
  - La puntuación y el estilo buscan ser publicables y bíblicamente dignos, sin arcaísmos innecesarios.
