revisions:
- from: Y los hombres fueron quemados[a] con gran calor, y blasfemaron el nombre de Dios, que tiene autoridad sobre estas plagas, y no se arrepintieron para darle gloria.
  to: Y la gente fue abrasada[a] por el gran calor, y blasfemó el nombre de Dios, que tiene autoridad sobre estas plagas, y no se arrepintió para darle gloria.
  rationale: Se cambia 'los hombres' por 'la gente' para preservar la referencia inclusiva de οἱ ἄνθρωποι conforme al original y a la auditoría inglesa. Se sustituye 'fueron quemados con gran calor' por 'fue abrasada por el gran calor' para una expresión más natural y precisa en español. También se ajusta la concordancia verbal al singular colectivo de 'la gente' y se mantiene el resto del contenido teológico y léxico esencial. No requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:36Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite la estructura general del versículo y mantiene bien elementos clave como ''blasfemaron el nombre de Dios'', ''tiene autoridad sobre estas plagas'' y ''no se arrepintieron ... darle gloria''. Sin embargo, falla en un punto importante del sentido de οἱ ἄνθρωποι: el griego se refiere a la gente/la humanidad en general, no específicamente a varones. ''Los hombres'' contradice la decisión auditada del POB en inglés y crea una restricción de referencia que el original no exige. Además, ''fueron quemados'' es comprensible, pero ''fueron abrasadas'' no aplica por concordancia y ''quemados'' suena algo más fuerte o más final que ''fueron abrasados/ardidos por el calor''; una formulación más natural y cercana al contexto de καυματίζω + καῦμα μέγα en español es ''la gente fue abrasada por el gran calor''.'
  spanish_quality_summary: La redacción es mayormente clara y eclesialmente legible, pero 'los hombres' suena excluyente o ambiguo en español actual, y 'fueron quemados con gran calor' resulta algo tieso. 'La gente fue abrasada por el gran calor' o 'las personas fueron abrasadas por el gran calor' fluye mejor en español natural sin perder dignidad ni fuerza. El resto del versículo es sólido y bien puntuado.
  glossary_alignment: 'Alineación general buena con el glosario del proyecto: θεοῦ -> ''Dios'', πληγὰς -> ''plagas'', μετανοέω -> ''arrepentirse'', δόξαν -> ''gloria''. El principal desajuste es terminológico/hermenéutico en οἱ ἄνθρωποι, donde debe mantenerse una referencia inclusiva como ''la gente'' o ''las personas'', en línea con la decisión inglesa auditada. No hay otros conflictos relevantes con los términos base del proyecto.'
  issues:
  - severity: high
    issue: '''los hombres'' restringe indebidamente οἱ ἄνθρωποι'
    rationale: El original y la auditoría inglesa indican referencia humana general, no masculina específica. En español actual, 'los hombres' puede entenderse como varones y por tanto altera el alcance del juicio.
  - severity: medium
    issue: '''fueron quemados con gran calor'' suena poco natural y algo más fuerte que el griego contextual'
    rationale: καυματίζω en este contexto apunta a ser abrasados/ardidos por el calor. 'Quemados' es posible, pero 'abrasados por el gran calor' refleja mejor la causa y suena más idiomático en español bíblico moderno.
  - severity: low
    issue: La nota [a] queda menos necesaria si el texto principal usa 'gran calor'
    rationale: La nota inglesa preserva una alternativa léxica para 'great heat'. En español, si el texto principal ya dice 'gran calor', la nota debe ofrecer una alternativa real distinta, no repetir casi lo mismo inútilmente.
  revised_spanish_text: Y la gente fue abrasada[a] por el gran calor, y blasfemó el nombre de Dios, que tiene autoridad sobre estas plagas, y no se arrepintió para darle gloria.
  revised_footnotes:
  - marker: a
    text: O 'quemada por gran calor'.
    reason: lexical_alternative
  revision_rationale: Se cambia 'los hombres' por 'la gente' para preservar la referencia inclusiva de οἱ ἄνθρωποι conforme al original y a la auditoría inglesa. Se sustituye 'fueron quemados con gran calor' por 'fue abrasada por el gran calor' para una expresión más natural y precisa en español. También se ajusta la concordancia verbal al singular colectivo de 'la gente' y se mantiene el resto del contenido teológico y léxico esencial. No requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
