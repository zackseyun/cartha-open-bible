translation:
  language: es
  text: Y el segundo derramó su copa en el mar, y se convirtió en sangre, como la de un muerto[a], y todo ser viviente en el mar murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «como sangre de un cadáver»; el griego dice literalmente: «sangre como de un muerto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δεύτερος
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el segundo ángel
  lexicon: BDAG
  rationale: El griego usa un adjetivo sustantivado con artículo, que remite al segundo ángel del contexto inmediato sin nombrarlo explícitamente. En español, «el segundo» conserva esa elipsis y evita añadir «ángel» sin base textual directa.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - vacío
  lexicon: BDAG
  rationale: En español, «derramó» expresa de forma natural la imagen de vaciar el contenido de una copa/copa de juicio, equivalente al valor de ἐκχέω en este contexto apocalíptico.
- source_word: φιάλην
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - cuenco
  - vasija
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «bowl», en español «copa» es el término más establecido para φιάλη en Apocalipsis y comunica mejor el objeto de juicio sin caer en «frasco» o «vial», que serían engañosos.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - en el mar
  - al mar
  lexicon: BDAG
  rationale: El valor básico de εἰς es direccional. En español, «sobre el mar» mantiene la idea de vaciar el contenido en la extensión marina y suena natural en la escena visual del juicio; «al mar» también sería posible, pero menos pictórico aquí.
- source_word: ἐγένετο αἷμα
  english_pob_choice: it became blood
  chosen_spanish: se convirtió en sangre
  alternatives_spanish:
  - se hizo sangre
  - pasó a ser sangre
  lexicon: BDAG
  rationale: «Se convirtió en sangre» transmite el cambio de estado con claridad y respeta el verbo γίνομαι + predicado nominal sin debilitar la contundencia del juicio.
- source_word: ὡς νεκροῦ
  english_pob_choice: like that of a dead man
  chosen_spanish: como la de un muerto
  alternatives_spanish:
  - como la sangre de un cadáver
  - como sangre de un muerto
  lexicon: BDAG
  rationale: La comparación griega no solo apunta al color, sino a la condición asociada con un cuerpo muerto. «Como la de un muerto» conserva la brevedad del original y deja abierta la tensión interpretativa que el inglés POB también preserva.
- source_word: πᾶσα ψυχὴ ζωῆς
  english_pob_choice: every living creature
  chosen_spanish: toda criatura viviente
  alternatives_spanish:
  - todo ser viviente
  - cada ser vivo
  lexicon: BDAG
  rationale: ψυχή con el genitivo ζωῆς funciona como expresión semítica para un ser vivo. «Criatura viviente» evita el falso sentido antropológico de «alma» en español moderno y mantiene el registro amplio adecuado al contexto marino.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - pereció
  lexicon: BDAG
  rationale: «Murió» reproduce con sencillez el verbo ἀποθνῄσκω. «Pereció» añadiría una matización interpretativa no exigida por el griego.
- source_word: τὰ ἐν τῇ θαλάσσῃ
  english_pob_choice: in the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - lo que estaba en el mar
  - las cosas del mar
  lexicon: BDAG
  rationale: El neutro plural con la frase preposicional retoma a las criaturas marinas mencionadas. En español, se integra naturalmente en «criatura viviente en el mar» para evitar una construcción rígida y mantener el referente claro.
theological_decisions:
- issue: Intensidad de la plaga en visión apocalíptica
  english_pob_reading: Render the sea as becoming real blood in the vision without softening the judgment language.
  chosen_spanish_reading: Presentar el mar como convertido en sangre, sin suavizar el lenguaje de juicio.
  alternative_spanish_readings:
  - hacer que solo pareciera sangre
  - 'traducir de forma fenomenológica: ''parecía sangre'''
  rationale: El griego dice que «se convirtió en sangre» y luego añade una comparación. La traducción debe conservar la fuerza del juicio sin reducirla a mera apariencia visual.
  doctrine_reference: 'Principio POB: preservar la tensión teológica del texto en lugar de resolverla por adelantado.'
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo con la revisión inglesa reciente: no hubo cambios sustantivos en el sentido, y la decisión principal es de ajuste idiomático al español, especialmente en φιάλην y ὡς νεκροῦ. Se preservó la fuerza de juicio y la elipsis del sujeto sustantivado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «copa» para φιάλη en coherencia con el uso apocalíptico del término en español y con el valor funcional del recipiente de juicio.
  - Se evitó «alma» para ψυχή por el riesgo de falsear el sentido de «ser vivo» en un contexto marino.
  - La nota al pie conserva la alternativa lexical que el inglés POB documenta para ὡς νεκροῦ.
