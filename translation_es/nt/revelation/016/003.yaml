revisions:
- from: Y el segundo derramó su copa sobre el mar[a]; y se convirtió en sangre, como la de un muerto, y toda criatura viviente en el mar murió.
  to: Y el segundo derramó su copa en el mar, y se convirtió en sangre, como la de un muerto[a], y todo ser viviente en el mar murió.
  rationale: Se corrige la preposición para reflejar mejor εἰς («en el mar»), se mueve la nota al lugar de la comparación «como la de un muerto», y se suaviza «criatura viviente» a «ser viviente» para una lectura más natural en español sin apartarse del sentido fuente.
