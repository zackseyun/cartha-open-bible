review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y del POB inglés en la mayoría de los puntos: conserva «el segundo», vierte ἐξέχεεν como «derramó», mantiene que el mar realmente «se convirtió en sangre» en la visión, y traduce πᾶσα ψυχὴ ζωῆς de manera idiomática. Sin embargo, «sobre el mar» no refleja con suficiente precisión εἰς τὴν θάλασσαν, cuyo sentido direccional es mejor con «en el mar» o «al mar»; además, la nota al pie está anclada al mar, pero la alternativa léxica documentada corresponde a la frase «como la de un muerto».'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor fidelidad y mejor colocación de la nota. «Toda criatura viviente» es comprensible, aunque «todo ser viviente» suena algo más natural en español general para contexto marino. La puntuación con punto y coma es aceptable, pero no necesaria; puede simplificarse con coma para una lectura más fluida.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Copa» para φιάλη es defendible en Apocalipsis en español. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión principal a corregir es preposicional: εἰς debe conservarse mejor con «en/al mar» en vez de «sobre el mar».'
  issues:
  - severity: medium
    issue: «sobre el mar» para εἰς τὴν θάλασσαν
    rationale: El griego expresa movimiento hacia dentro/dirección al mar, no simplemente por encima de su superficie. «En el mar» o «al mar» preserva mejor la imagen de verter el contenido en el mar.
  - severity: medium
    issue: La nota [a] está anclada a «mar» en vez de a la comparación sanguínea
    rationale: La nota explica ὡς νεκροῦ («como la de un muerto» / «como sangre de un cadáver»), por lo que debe marcarse junto a esa frase para corresponder al lugar relevante del texto.
  - severity: low
    issue: «criatura viviente» es menos natural que «ser viviente» en este contexto
    rationale: Ambas opciones son fieles, pero «todo ser viviente en el mar» suena más idiomático y amplio para referirse a la vida marina sin pérdida de sentido.
  revised_spanish_text: Y el segundo derramó su copa en el mar, y se convirtió en sangre, como la de un muerto[a], y todo ser viviente en el mar murió.
  revised_footnotes:
  - marker: a
    text: 'O «como sangre de un cadáver»; el griego dice literalmente: «sangre como de un muerto».'
    reason: lexical_alternative
  revision_rationale: Se corrige la preposición para reflejar mejor εἰς («en el mar»), se mueve la nota al lugar de la comparación «como la de un muerto», y se suaviza «criatura viviente» a «ser viviente» para una lectura más natural en español sin apartarse del sentido fuente.
