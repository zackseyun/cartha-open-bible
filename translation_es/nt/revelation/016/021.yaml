translation:
  language: es
  text: Y cayó del cielo sobre los seres humanos un gran granizo[a], como de un talento; y los seres humanos blasfemaron contra Dios a causa de la plaga del granizo[b], porque su plaga es sumamente grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pesando aproximadamente un talento»; el griego expresa comparación, no una medición exacta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque su plaga es muy grande».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάλαζα μεγάλη
  english_pob_choice: great hail
  chosen_spanish: granizo grande
  alternatives_spanish:
  - granizo enorme
  - granizo muy grande
  - grandes granizos
  lexicon: BDAG
  rationale: χάλαζα es un sustantivo colectivo singular, por lo que conviene conservarlo como “granizo” en singular. El adjetivo μεγάλη pide una intensificación natural en español. “Granizo grande” mantiene la fuerza del griego sin convertirlo innecesariamente en plural ni añadir una paráfrasis.
- source_word: ὡς ταλαντιαία
  english_pob_choice: about a talent in weight
  chosen_spanish: como de un talento de peso
  alternatives_spanish:
  - como pesando un talento
  - de un peso aproximado de un talento
  - como de peso de un talento cada uno
  lexicon: BDAG
  rationale: El griego expresa comparación, no una medida exacta. “Como de un talento de peso” conserva el ὡς comparativo y hace explícita la idea de peso, sin precisar más de lo que el texto permite.
- source_word: καταβαίνει
  english_pob_choice: comes down
  chosen_spanish: cae
  alternatives_spanish:
  - desciende
  - va cayendo
  - viene cayendo
  lexicon: BDAG
  rationale: En español, para granizo, “cae” es el equivalente más natural y directo. Mantiene la imagen del descenso desde arriba y evita una construcción artificial.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo de arriba
  - desde el cielo
  - del cielo/desde el cielo
  lexicon: BDAG
  rationale: Aunque οὐρανός puede tener sentido teológico de “cielo” como ámbito celestial, aquí la imagen del granizo que cae favorece “del cielo” en español. Es fiel al movimiento espacial del texto y no obliga a una formulación más interpretativa que el contexto inmediato no exige.
- source_word: ἐπὶ τοὺς ἀνθρώπους
  english_pob_choice: upon the people
  chosen_spanish: sobre los seres humanos
  alternatives_spanish:
  - sobre la gente
  - sobre las personas
  - sobre la humanidad
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico y no masculino específico. “Seres humanos” preserva la referencia universal y suena más formal que “la gente”, sin perder claridad.
- source_word: ἐβλασφήμησαν
  english_pob_choice: blasphemed
  chosen_spanish: blasfemaron
  alternatives_spanish:
  - hablaron mal de
  - maldijeron
  - injuriaron
  lexicon: BDAG
  rationale: “Blasfemaron” es el equivalente directo y conserva la gravedad teológica del verbo cuando el objeto es Dios. “Maldijeron” o “hablaron mal de” debilitarían o desplazarían el sentido.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - a Dios
  lexicon: BDAG
  rationale: Objeto directo del verbo; “Dios” es la traducción estándar y suficiente.
- source_word: ἐκ τῆς πληγῆς τῆς χαλάζης
  english_pob_choice: because of the plague of the hail
  chosen_spanish: a causa de la plaga del granizo
  alternatives_spanish:
  - por la plaga del granizo
  - debido a la plaga del granizo
  - a causa del golpe del granizo
  lexicon: BDAG
  rationale: ἐκ tiene aquí valor causal. “Plaga” conserva el campo semántico de juicio/aflicción de πληγή en Apocalipsis, mejor que “golpe”, que sería demasiado físico y menos coherente con el contexto de juicio.
- source_word: ὅτι μεγάλη ἐστὶν ἡ πληγὴ αὐτῆς σφόδρα
  english_pob_choice: because its plague is exceedingly severe
  chosen_spanish: porque su plaga es sumamente grande
  alternatives_spanish:
  - porque su plaga es muy grande
  - pues su plaga es extremadamente grave
  - porque su aflicción es sumamente grande
  lexicon: BDAG
  rationale: La cláusula explica la reacción anterior. “Sumamente grande” reproduce bien la intensificación de μεγάλη ... σφόδρα sin forzar una redundancia pesada en español. Se mantiene “plaga” por consistencia con πληγή y con el contexto apocalíptico.
theological_decisions:
- issue: Sentido de οὐρανός en un contexto de juicio apocalíptico
  english_pob_reading: from heaven
  chosen_spanish_reading: del cielo
  alternative_spanish_readings:
  - del cielo/desde el cielo
  - del ámbito celestial
  rationale: El contexto permite un valor literal-espacial claro. En español, “del cielo” comunica la procedencia superior del granizo sin introducir una formulación más teológica de lo necesario. La imagen sigue siendo compatible con el marco apocalíptico de juicio.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia genérica de ἄνθρωποι
  english_pob_reading: the people
  chosen_spanish_reading: los seres humanos
  alternative_spanish_readings:
  - la gente
  - las personas
  - la humanidad
  rationale: El griego es genérico. “Los seres humanos” evita una lectura masculina por defecto y mantiene la universalidad de la escena de juicio.
  doctrine_reference: Translation philosophy §4
- issue: Naturaleza de πληγή en Apocalipsis
  english_pob_reading: plague
  chosen_spanish_reading: plaga
  alternative_spanish_readings:
  - azote
  - golpe
  - aflicción
  rationale: En Apocalipsis, πληγή suele referirse a un azote/juicio infligido, no solo a un impacto físico. “Plaga” preserva mejor esa carga teológica y la coherencia intratextual.
  doctrine_reference: Revelation 15–16 judgment imagery; translation philosophy §2
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que refinó la preposición a un registro más formal. En español se optó por “sobre los seres humanos” y “a causa de” para conservar ese tono sin perder naturalidad. También se mantuvo la opción de traducir οὐρανός como “cielo” en vez de una glosa teológica más explícita, dado el valor espacial inmediato de la escena.
  spanish_consistency_notes:
  - Se conserva “plaga” para πληγή, en coherencia con el lenguaje de juicios en Apocalipsis.
  - Se traduce χάλαζα como singular colectivo “granizo”, no como plural “granizos”, para respetar la gramática del griego.
  - No se usa “SEÑOR” ni sustitución reverencial; θεός se traduce directamente como “Dios”.
  - Las dos notas al pie reflejan las alternativas del audit trail inglés sin añadir interpretaciones ajenas al texto.
