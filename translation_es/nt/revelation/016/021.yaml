base_translation:
  language: en
  yaml_path: translation/nt/revelation/016/021.yaml
  text: And great hail[a], about a talent in weight, comes down from heaven upon the people; and the people blasphemed God because of the plague of the hail[b], because its plague is exceedingly severe.
  footnotes:
