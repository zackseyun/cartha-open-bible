  rationale: Se corrigió la sintaxis inicial para lograr un español natural y claramente legible, preservando el contenido del griego. También se simplificó la expresión de peso a 'como de un talento', que mantiene el matiz comparativo de ὡς ταλαντιαία y deja la explicación más precisa a la nota, tal como hace el rastro auditado en inglés. Se conservaron 'blasfemaron', 'Dios' y 'plaga' por fidelidad léxica y coherencia teológica.
