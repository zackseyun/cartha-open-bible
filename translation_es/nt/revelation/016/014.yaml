translation:
  language: es
  text: Porque son espíritus de demonios, que hacen señales, y van a los reyes de todo el mundo[a], para reunirlos para la batalla del gran día de Dios, el Todopoderoso—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de todo el mundo habitado» o «de toda la tierra habitada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεύματα δαιμονίων
  english_pob_choice: spirits of demons
  chosen_spanish: espíritus de demonios
  alternatives_spanish:
  - espíritus demoníacos
  - espíritus procedentes de demonios
  lexicon: BDAG
  rationale: Conservo la relación genitiva de forma cercana al griego, como hizo la revisión inglesa al preferir 'spirits of demons' por mayor correspondencia léxica. 'Espíritus de demonios' mantiene la tensión entre pertenencia, procedencia y caracterización sin resolverla artificialmente.
- source_word: ποιοῦντα σημεῖα
  english_pob_choice: performing signs
  chosen_spanish: que hacen señales
  alternatives_spanish:
  - que realizan señales
  - que hacen milagros
  lexicon: BDAG
  rationale: ποιέω con σημεῖα se expresa de manera natural en español como 'hacer señales'. Evito 'milagros' porque el texto no define aquí la naturaleza de esas señales; conserva mejor la ambigüedad apocalíptica.
- source_word: ἃ ἐκπορεύεται
  english_pob_choice: which go out
  chosen_spanish: los cuales salen
  alternatives_spanish:
  - que salen
  - que proceden
  lexicon: BDAG
  rationale: Aunque el griego presenta un singular morfológico con referente plural, en español debe concordar con 'espíritus'. 'Salen' refleja el movimiento hacia fuera sin introducir una interpretación adicional.
- source_word: ἐπὶ τοὺς βασιλεῖς
  english_pob_choice: to the kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - contra los reyes
  - sobre los reyes
  lexicon: BDAG
  rationale: Sigo la lectura contextual de movimiento hacia los reyes para reunirlos. 'A' reproduce el destino del movimiento, evitando anticipar un matiz hostil no explicitado por la preposición en este punto.
- source_word: τῆς οἰκουμένης ὅλης
  english_pob_choice: of the whole world
  chosen_spanish: de todo el mundo
  alternatives_spanish:
  - del mundo entero
  - de toda la tierra habitada
  lexicon: BDAG
  rationale: '''Todo el mundo'' comunica con naturalidad la amplitud global y conserva el valor político-universal de οἰκουμένη sin sonar técnico. ''Tierra habitada'' sería más literal pero menos idiomático.'
- source_word: συναγαγεῖν
  english_pob_choice: to gather
  chosen_spanish: para reunirlos
  alternatives_spanish:
  - para juntarlos
  - para congregarlos
  lexicon: BDAG
  rationale: '''Reunirlos'' expresa el infinitivo de propósito con claridad y sin carga eclesial innecesaria. Mantiene el sentido de convocatoria colectiva del pasaje.'
- source_word: εἰς τὸν πόλεμον
  english_pob_choice: for the battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - hacia la batalla
  lexicon: BDAG
  rationale: La finalidad de la reunión queda bien expresada con 'para'. 'Batalla' conserva la singularidad del conflicto apocalíptico mejor que 'guerra', que es más amplio.
- source_word: τῆς ἡμέρας τῆς μεγάλης
  english_pob_choice: of the great day
  chosen_spanish: del gran día
  alternatives_spanish:
  - del día grande
  - del día, el grande
  lexicon: BDAG
  rationale: '''Gran día'' sigue de cerca la construcción y suena natural en español. Mantiene el tono solemne sin forzar un orden nominal extraño.'
- source_word: τοῦ θεοῦ τοῦ παντοκράτορος
  english_pob_choice: of God the Almighty
  chosen_spanish: de Dios, el Todopoderoso
  alternatives_spanish:
  - de Dios el Todopoderoso
  - de Dios el Omnipotente
  lexicon: BDAG
  rationale: '''Todopoderoso'' es la forma bíblica y reconocible en español para παντοκράτωρ. La coma ayuda a marcar el título sin convertirlo en una aposición confusa.'
theological_decisions:
- issue: Naturaleza de las señales producidas por los espíritus
  english_pob_reading: The text presents the signs as real deceptive signs performed by demonic spirits, without specifying their mechanism.
  chosen_spanish_reading: El texto presenta señales reales y engañosas hechas por espíritus de demonios, sin precisar el mecanismo.
  alternative_spanish_readings:
  - Se trata solo de trucos aparentes
  - Las señales son milagros auténticos en el mismo sentido que los de Dios
  rationale: '''Señales'' conserva la ambigüedad del σημεῖα griego y evita resolver si son prodigios falsos, actos sobrenaturales reales o ambas cosas. La traducción no debe eliminar esa tensión apocalíptica.'
  doctrine_reference: Preservar la tensión teológica sin simplificarla.
- issue: Alcance de οἰκουμένη
  english_pob_reading: of the whole inhabited world
  chosen_spanish_reading: de todo el mundo
  alternative_spanish_readings:
  - de toda la tierra habitada
  - del mundo habitado entero
  rationale: '''Mundo'' refleja bien el horizonte universal-político de Apocalipsis y evita una formulación demasiado técnica. No necesito explicar más en el cuerpo del texto, pero sí conservar que no se trata meramente del planeta físico.'
  doctrine_reference: Usar el valor contextual de οἰκουμένη en Apocalipsis.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente que ajustó 'demonic spirits' a 'spirits of demons' por mayor cercanía a πνεύματα δαιμονίων. En español, por esa misma razón, preferí 'espíritus de demonios' en la nota alternativa y mantuve esa relación léxica en el texto principal. También preservé la idea de 'the whole world' como horizonte global, con οἰκουμένη reflejado de forma idiomática en 'todo el mundo'.
  spanish_consistency_notes:
  - He usado 'espíritus' en minúscula porque no se trata del Espíritu Santo ni de un uso personificado del término.
  - '''Todopoderoso'' se mantiene como título divino estándar y coherente con el tratamiento de παντοκράτωρ.'
  - He evitado 'SEÑOR' para θεός y la referencia divina explícita, siguiendo el valor directo de 'Dios' en el original.
  - '''Batalla'' conserva el conflicto singular y apocalíptico; no lo amplié a ''guerra''.'
