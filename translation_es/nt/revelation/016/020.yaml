translation:
  language: es
  text: Y toda isla huyó[a], y montañas no fueron halladas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desapareció». El verbo griego significa literalmente «huyó», conservando la personificación vívida del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todas
  lexicon: BDAG
  rationale: 'Con νῆσος en singular, el valor distributivo de πᾶσα se expresa naturalmente en español con «toda» en singular: «toda isla». Conserva la idea de cada isla considerada por separado, sin forzar un plural colectivo.'
- source_word: νῆσος
  english_pob_choice: island
  chosen_spanish: isla
  alternatives_spanish:
  - islote
  lexicon: BDAG
  rationale: El sustantivo denota «isla» de manera directa. «Islote» sería innecesariamente restrictivo y no está exigido por el griego.
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - se fue
  - desapareció
  - escapó
  lexicon: BDAG
  rationale: El verbo φεύγω significa literalmente «huir» o «escapar». «Huyó» mantiene la personificación vívida del texto apocalíptico, como en la decisión inglesa «fled», sin reducirla a una mera desaparición interpretativa.
- source_word: ὄρη
  english_pob_choice: mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - montañas
  - las montañas
  lexicon: BDAG
  rationale: Ὄρη puede traducirse por «montes» o «montañas». Elegí «los montes» porque suena natural en español bíblico y conserva el plural concreto sin añadir contenido interpretativo. El artículo ayuda a la fluidez narrativa en esta cláusula.
- source_word: οὐχ εὑρέθησαν
  english_pob_choice: were not found
  chosen_spanish: no fueron hallados
  alternatives_spanish:
  - no se encontraron
  - no fueron encontrados
  lexicon: BDAG
  rationale: El pasivo de εὑρίσκω se expresa bien con «fueron hallados». El negativo mantiene la forma sobria del griego y refleja el cambio editorial inglés reciente hacia «mountains were not found», sin añadir una reformulación más interpretativa.
theological_decisions:
- issue: 'Imaginería apocalíptica: desaparición literal o figurativa del paisaje cósmico'
  english_pob_reading: Retain the concrete imagery in translation without interpretive softening
  chosen_spanish_reading: Mantener la imaginería concreta sin suavizarla interpretativamente
  alternative_spanish_readings:
  - desaparecieron
  - se desvanecieron
  - ya no se encontraban
  rationale: El griego presenta una descripción viva y concreta; la traducción debe preservar esa fuerza y dejar la cuestión de su literalidad o simbolismo a la interpretación, no resolverla en la redacción española.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés, que prefirió «mountains were not found» sobre una formulación con «no mountains were found», para reflejar con mayor cercanía el griego οὐχ εὑρέθησαν sin añadir un «no» extra antes del sustantivo. En español, «los montes no fueron hallados» preserva esa misma relación sintáctica y el tono sobrio del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie española cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene el lenguaje apocalíptico concreto sin convertirlo en paráfrasis explicativa.
  - «Huyó» se usa por su correspondencia léxica con φεύγω y por su valor personificador, no como una expansión estilística.
