translation:
  language: es
  text: Y el cuarto derramó su copa sobre el sol[a], y se le concedió abrasar a los seres humanos con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y se le concedió abrasar a los seres humanos en fuego». El pronombre probablemente se refiere al sol.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τέταρτος
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - el cuarto ángel
  lexicon: BDAG
  rationale: El artículo con el adjetivo funciona sustantivamente en griego. En español, «el cuarto» conserva esa concisión y deja implícito el mensajero del ciclo, sin añadir «ángel» que el texto aquí no expresa.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - vacío
  lexicon: BDAG
  rationale: En el contexto de las copas de juicio, «derramó» reproduce bien ἐκχέω y suena natural en español bíblico contemporáneo.
- source_word: φιάλην
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - bowl
  - vasija
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «bowl», en español «copa» comunica mejor φιάλη en este pasaje apocalíptico y mantiene la resonancia cultual/judicial de las copas de la serie.
- source_word: ἐπὶ τὸν ἥλιον
  english_pob_choice: on the sun
  chosen_spanish: sobre el sol
  alternatives_spanish:
  - contra el sol
  - en el sol
  lexicon: BDAG
  rationale: «Sobre el sol» es la correspondencia más natural de ἐπί con acusativo aquí y preserva la imagen de la acción dirigida al sol como objeto del derramamiento.
- source_word: ἐδόθη αὐτῷ
  english_pob_choice: it was given to it
  chosen_spanish: se le concedió
  alternatives_spanish:
  - le fue dado
  - se le permitió
  lexicon: BDAG
  rationale: El pasivo divino de ἐδόθη se puede expresar en español con «se le concedió», que conserva la idea de autorización sin explicitar al dador. Además, evita forzar el referente neutro del pronombre griego en una construcción impersonal fluida.
- source_word: καυματίσαι
  english_pob_choice: to scorch
  chosen_spanish: quemar
  alternatives_spanish:
  - abrasar
  - achicharrar
  lexicon: BDAG
  rationale: Aunque «scorch» es más literal, en español «quemar» transmite de forma sobria y clara el efecto de calor intenso. «Abrasar» sería una alternativa posible, pero «quemar» es más directa y ampliamente inteligible.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the people
  chosen_spanish: a los seres humanos
  alternatives_spanish:
  - a la gente
  - a los hombres
  lexicon: BDAG
  rationale: El griego es genérico y no masculino exclusivo. «Seres humanos» evita restringir el referente y mantiene la amplitud colectiva del juicio.
- source_word: ἐν πυρί
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en fuego
  - por fuego
  lexicon: BDAG
  rationale: «Con fuego» expresa en español la idea instrumental o de medio que el inglés POB también refleja, sin forzar una construcción menos natural como «en fuego».
theological_decisions:
- issue: Pasivo divino en ἐδόθη
  english_pob_reading: Retain the passive 'it was given' without naming God explicitly.
  chosen_spanish_reading: Conservar la pasiva impersonal «se le concedió» sin nombrar a Dios.
  alternative_spanish_readings:
  - Dios le concedió
  - se le permitió
  rationale: Apocalipsis usa con frecuencia pasivos que sugieren la acción soberana de Dios sin mencionarlo directamente. «Se le concedió» preserva esa reserva y evita introducir un sujeto explícito no expresado en la cláusula.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referente de αὐτῷ
  english_pob_reading: The dative pronoun refers to the sun.
  chosen_spanish_reading: 'Mantener un referente impersonal: «se le concedió» remite naturalmente al sol mencionado antes.'
  alternative_spanish_readings:
  - se le concedió al cuarto ángel
  - se le concedió a él
  rationale: El antecedente más cercano es «el sol». La formulación española evita decidir prematuramente entre un referente neutro o personal y sigue la sintaxis griega sin añadir «ángel».
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance genérico de ἀνθρώπους
  english_pob_reading: Use 'the people' rather than 'men.'
  chosen_spanish_reading: Usar «seres humanos» en vez de un término masculino genérico.
  alternative_spanish_readings:
  - la gente
  - los hombres
  rationale: En este contexto de juicio, el griego abarca a la humanidad en general. «Seres humanos» comunica ese alcance sin introducir ambigüedad de género.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje presenta una pequeña tensión de referencia en αὐτῷ: el griego permite entender que el pronombre retoma al sol, aunque algunas traducciones lo vuelven más personal. La redacción española conserva la estructura impersonal y la referencia natural al sol, siguiendo el audit trail y sin añadir elementos ajenos al texto.'
  spanish_consistency_notes:
  - Se mantiene «copa» para φιάλη, en línea con el uso español más natural en Apocalipsis.
  - Se evita «SEÑOR» o equivalentes de máscara porque aquí no aparece el nombre divino.
  - «Se le concedió» conserva el pasivo divino sin explicitar un sujeto.
  - «Seres humanos» mantiene el valor genérico de ἀνθρώπους sin sesgo masculino.
  - La nota al pie preserva la alternativa más literal con «en fuego» y aclara el referente probable del pronombre.
