translation:
  language: es
  text: Y el tercero derramó su copa en los ríos y en las fuentes de agua[a], y se convirtió en sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y se convirtió en sangre», con el verbo singular que resume colectivamente las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρίτος
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer ángel
  - el tercer ser
  lexicon: BDAG
  rationale: El griego conserva solo el ordinal con artículo, sin añadir un sustantivo explícito. En español, «el tercero» preserva la elipsis de forma natural; añadir «ángel» introduciría una palabra que el texto no expresa aquí.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - vacío
  lexicon: BDAG
  rationale: ἐκχέω significa derramar / verter. «Derramó» es una equivalencia natural y solemne en español para esta secuencia de juicios, y mantiene la imagen de vaciar el contenido de la copa.
- source_word: φιάλην
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - cuenco
  - vasija
  lexicon: BDAG
  rationale: φιάλη designa un recipiente ancho, más cercano a una copa ritual o de libación que a una botella pequeña. «Copa» comunica mejor el tipo de recipiente en español bíblico y evita la imprecisión de «vial».
- source_word: εἰς τοὺς ποταμούς
  english_pob_choice: into the rivers
  chosen_spanish: sobre los ríos
  alternatives_spanish:
  - en los ríos
  - hacia los ríos
  lexicon: BDAG
  rationale: Aunque εἰς con acusativo suele indicar movimiento «a/into», en español el derramamiento de una copa sobre cuerpos de agua se expresa con naturalidad como «sobre». Aquí se prioriza la escena del juicio derramado sobre el ámbito de los ríos, sin perder el valor direccional del griego.
- source_word: τὰς πηγὰς τῶν ὑδάτων
  english_pob_choice: the springs of water
  chosen_spanish: las fuentes de las aguas
  alternatives_spanish:
  - los manantiales de agua
  - las fuentes de agua
  lexicon: BDAG
  rationale: πηγή puede traducirse como fuente, manantial o surgente. «Fuentes de las aguas» conserva el paralelismo con el griego y el estilo bíblico, a la vez que sigue siendo comprensible en español. Se mantiene el plural y el genitivo para no reducir el alcance a un solo manantial.
- source_word: ἐγένετο αἷμα
  english_pob_choice: it became blood
  chosen_spanish: se convirtió en sangre
  alternatives_spanish:
  - llegó a ser sangre
  - se hizo sangre
  lexicon: BDAG
  rationale: El griego usa verbo singular con un predicado nominal, lo que permite un resultado impersonal/totalizante. «Se convirtió en sangre» preserva bien la transformación expresada por γίνομαι sin forzar un sujeto plural en español ni suavizar el cambio real del juicio.
theological_decisions:
- issue: Sujeto implícito de ἐγένετο αἷμα
  english_pob_reading: it became blood
  chosen_spanish_reading: se convirtió en sangre
  alternative_spanish_readings:
  - se volvió sangre
  - las aguas se convirtieron en sangre
  rationale: La revisión inglesa optó por mantener el verbo singular para reflejar la forma griega. En español, «se convirtió en sangre» respeta esa construcción sin introducir un sujeto explícito que el texto no da, y conserva la idea de transformación completa de los ríos y las fuentes.
  doctrine_reference: Gramática y semántica del predicado resultativo; Traducción filosófica §1, §5
translation_notes:
  revision_awareness: La base inglesa fue revisada de un plural explícito («they became blood») a un singular más cercano al griego («it became blood»). La versión española sigue esa revisión y evita reinterpretar el sujeto; además, adapta εἰς con un español natural («sobre») para el contexto de un derramamiento sobre ríos y fuentes.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la coordinación narrativa del griego.
  - «Copa» se usa de manera consistente con φιάλη en este pasaje apocalíptico.
  - «Fuentes de las aguas» conserva el registro bíblico y el paralelismo con los dos sustantivos plurales del griego.
  - No se introduce «ángel» en el texto principal porque el griego de este versículo solo dice «el tercero».
