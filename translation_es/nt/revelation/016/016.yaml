translation:
  language: es
  text: Y él los reunió[a] al lugar que en hebreo[b] se llama Armagedón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los reunió». El verbo está en singular y puede sugerir un agente único implícito; sin embargo, el contexto inmediato presenta a los espíritus inmundos como quienes salen a reunir a los reyes (vv. 13–14).'
    reason: alternative_reading
  - marker: b
    text: 'O: «en la lengua hebrea». En Apocalipsis, «en hebreo» puede reflejar la forma semítica del nombre más que una distinción estricta entre hebreo y arameo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  english_pob_choice: he gathered / they gathered
  chosen_spanish: los reunió
  alternatives_spanish:
  - los juntó
  - reunió a ellos
  lexicon: BDAG
  rationale: El verbo griego está en singular, pero el contexto inmediato de Apocalipsis 16:13–14 presenta a los espíritus inmundos como los agentes que salen para reunir a los reyes. En español, «los reunió» conserva la acción de reunir sin forzar un sujeto explícito y deja abierta la tensión entre la forma singular del griego y el sentido contextual plural.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los reyes
  lexicon: BDAG
  rationale: El pronombre acusativo plural apunta a los reunidos, es decir, los reyes y sus fuerzas en el contexto. «Los» es la forma más natural y compacta en español bíblico.
- source_word: τόπον
  english_pob_choice: the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - al sitio
  lexicon: BDAG
  rationale: «Lugar» es la equivalencia natural y formal de τόπος aquí. La contracción «al» mantiene la fluidez del español.
- source_word: καλούμενον
  english_pob_choice: is called
  chosen_spanish: se llama
  alternatives_spanish:
  - llamado
  - es llamado
  lexicon: BDAG
  rationale: 'La pasiva participial griega se vierte con una relativa natural en español: «se llama». Conserva el valor denominativo sin hacer la frase pesada.'
- source_word: Ἑβραϊστὶ
  english_pob_choice: in Hebrew
  chosen_spanish: en hebreo
  alternatives_spanish:
  - en la lengua hebrea
  - en hebreo/arameo
  lexicon: BDAG
  rationale: En Apocalipsis, Ἑβραϊστί suele señalar la forma semítica del nombre, no una distinción técnica estricta entre hebreo y arameo. «En hebreo» es la traducción directa y transparente; la amplitud semítica se anota en nota.
- source_word: Ἁρμαγεδών
  english_pob_choice: Armageddon
  chosen_spanish: Armagedón
  alternatives_spanish:
  - Har-Magedón
  lexicon: BDAG
  rationale: Es un nombre propio y se translitera de manera convencional al español como «Armagedón». Se prefiere la forma reconocible para lectura pública, sin introducir una segmentación etimológica no presente en el texto base.
theological_decisions:
- issue: Agente de la reunión
  english_pob_reading: he gathered them
  chosen_spanish_reading: los reunió
  alternative_spanish_readings:
  - él los reunió
  - ellos los reunieron
  rationale: 'El griego presenta un verbo singular, pero la escena previa destaca a los espíritus inmundos que salen a reunir a los reyes. «Los reunió» preserva la ambigüedad: no explicita un sujeto que el texto no desarrolla aquí y mantiene la tensión entre el singular formal y el efecto contextual plural.'
  doctrine_reference: Preservar la tensión textual sin resolverla dogmáticamente.
- issue: Extensión de Ἑβραϊστί
  english_pob_reading: in Hebrew / Hebrew-Aramaic note
  chosen_spanish_reading: en hebreo
  alternative_spanish_readings:
  - en hebreo/arameo
  - en la lengua hebrea
  rationale: El uso de Ἑβραϊστί en Apocalipsis puede abarcar la forma semítica del nombre y no exige una distinción rígida entre hebreo y arameo. «En hebreo» mantiene la forma tradicional y fiel al original, mientras la nota aclara la posible amplitud lingüística.
  doctrine_reference: Nota lexical, no afirmación doctrinal.
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del POB en inglés, que prefirió reflejar el singular griego de συνήγαγεν. En español se optó por una solución neutra («los reunió») que conserva la fluidez y permite anotar, sin ocultarla, la tensión entre la forma singular y el referente contextual plural.
  spanish_consistency_notes:
  - Se usa «Armagedón» como transliteración estándar y no «Har-Magedón», para mantener la reconocibilidad en español público.
  - Se conserva «en hebreo» como traducción principal y se explicita en nota la posible amplitud semítica del término.
  - No se introduce «Cristo», «SEÑOR» ni otras terminologías no presentes en el versículo.
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin perder la estructura breve del griego.
