base_translation:
  language: en
  yaml_path: translation/nt/revelation/016/016.yaml
  text: And he gathered them to the place that in Hebrew is called Armageddon[a][b].
  footnotes:
  - marker: a
    text: 'Greek: ''he/it gathered them.'' The singular verb may point to a single implied agent, while the main text reflects the plural sense suggested by the preceding unclean spirits who go out to gather the kings (vv. 13–14).'
    reason: alternative_reading
  - marker: b
    text: Or 'in the Hebrew/Aramaic language.' In Revelation, 'in Hebrew' reflects the Semitic name-form rather than requiring a strict distinction between Hebrew and Aramaic.
    reason: lexical_alternative
