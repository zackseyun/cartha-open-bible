  text: Καὶ ὁ ἕβδομος ἐξέχεεν τὴν φιάλην αὐτοῦ ἐπὶ τὸν ἀέρα— καὶ ἐξῆλθεν φωνὴ μεγάλη ⸀ἐκ τοῦ ⸀ναοῦ ἀπὸ τοῦ θρόνου λέγουσα· Γέγονεν—
base_translation:
  language: en
  yaml_path: translation/nt/revelation/016/017.yaml
  text: And the seventh poured out his bowl into the air[a], and a loud voice came out from the sanctuary, from the throne, saying[b], “It has come to pass.”
  footnotes:
  - marker: a
    text: Or, “from the temple.” The Greek word ναός refers specifically to the sanctuary rather than the broader temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or, “It is done.”
    reason: alternative_reading
