translation:
  language: es
  text: 'Y el séptimo derramó su copa al aire[a], y una voz fuerte salió del santuario, desde el trono, diciendo: «Se ha cumplido»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el aire». El griego usa ἐπί con acusativo después de un verbo de derramar; «al aire» expresa de forma más natural en español la dirección del original.
    reason: lexical_alternative
  - marker: b
    text: O «Está hecho». El griego Γέγονεν expresa consumación o resultado cumplido.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἕβδομος
  english_pob_choice: the seventh
  chosen_spanish: el séptimo
  alternatives_spanish:
  - el séptimo ángel
  lexicon: BDAG
  rationale: El griego presenta solo el ordinal con artículo; en contexto se refiere al séptimo de la serie de copas, pero el sustantivo implícito no está expresado. Por eso se conserva la elipsis en español en vez de suplir «ángel» sin base textual inmediata.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vació
  - echó
  lexicon: BDAG
  rationale: «Derramó» es el equivalente natural para ἐκχέω en contexto de juicio y mantiene la imagen de vertimiento ritual/judicial que recorre la sección.
- source_word: φιάλην
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - cuenco
  - vasija
  lexicon: BDAG
  rationale: En español, «copa» comunica bien el recipiente de la serie de juicios y evita un tecnicismo innecesario. Aunque «bowl» en inglés moderno apunta a un cuenco, aquí la serie apocalíptica admite «copa» como término bíblico tradicional y claro.
- source_word: ἐπὶ τὸν ἀέρα
  english_pob_choice: into the air
  chosen_spanish: sobre el aire
  alternatives_spanish:
  - en el aire
  - al aire
  lexicon: BDAG
  rationale: Se conserva con cierta literalidad la dirección de ἐπί con acusativo tras un verbo de derramar. «Sobre el aire» suena más cercano al griego; «al aire» sería más idiomático pero menos transparente al movimiento hacia el objeto.
- source_word: ἐξῆλθεν φωνὴ μεγάλη
  english_pob_choice: a loud voice came out
  chosen_spanish: salió ... una gran voz
  alternatives_spanish:
  - salió una voz fuerte
  - se oyó una voz fuerte
  lexicon: BDAG
  rationale: «Salió» conserva el valor de ἐξῆλθεν y «gran voz» sigue de cerca φωνὴ μεγάλη. Se mantiene la construcción con voz como sujeto, tal como en el griego.
- source_word: ἐκ τοῦ ναοῦ
  english_pob_choice: from the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - del templo
  lexicon: BDAG
  rationale: ναός designa el santuario propiamente dicho, no el complejo templario amplio; «santuario» preserva mejor esa especificidad en la imaginería celestial de Apocalipsis.
- source_word: ἀπὸ τοῦ θρόνου
  english_pob_choice: from the throne
  chosen_spanish: desde el trono
  alternatives_spanish:
  - del trono
  lexicon: BDAG
  rationale: «Desde el trono» refleja la procedencia espacial indicada por ἀπό y evita fusionar los dos complementos preposicionales del griego en una sola idea.
- source_word: λέγουσα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que decía
  lexicon: BDAG
  rationale: El participio femenino concuerda con φωνή y se vierte naturalmente como «diciendo» en español, manteniendo el enlace con la voz que habla.
- source_word: Γέγονεν
  english_pob_choice: It has come to pass
  chosen_spanish: Ha llegado a suceder
  alternatives_spanish:
  - Se ha cumplido
  - Ya está hecho
  lexicon: BDAG
  rationale: Se busca reflejar el perfecto de γίνομαι como estado/resultación completada, siguiendo la revisión inglesa que optó por una formulación más formal que «It is done» sin perder el sentido de culminación. En español, «Ha llegado a suceder» preserva la idea de acontecimiento consumado con un tono solemne.
theological_decisions:
- issue: ναός en la escena celestial
  english_pob_reading: sanctuary
  chosen_spanish_reading: santuario
  alternative_spanish_readings:
  - templo
  rationale: La elección es principalmente léxica, pero afecta la visualización teológica de la escena. «Santuario» conserva la distinción frente a un sentido más amplio de «templo» y evita introducir un espacio no especificado por el griego.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Γέγονεν como anuncio de consumación
  english_pob_reading: It has come to pass
  chosen_spanish_reading: Ha llegado a suceder
  alternative_spanish_readings:
  - Se ha cumplido
  - Ya está hecho
  rationale: La frase proclama la consumación del séptimo juicio. Se preserva la fuerza de resultado completo sin resolverla hacia una sola fórmula tradicional. La alternativa breve y familiar queda implícitamente respetada, pero el español elegido intenta mantener la solemnidad y la transparencia aspectual del perfecto griego.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del texto inglés: la cláusula final pasó de una formulación más literal («It has happened») a una más solemne y natural («It has come to pass»). El español adopta una equivalencia igualmente solemne («Ha llegado a suceder») para reflejar el perfecto resultativo de Γέγονεν sin reducirlo a una fórmula demasiado fija.'
  spanish_consistency_notes:
  - Se mantiene «santuario» para ναός, conforme a la distinción léxica con ἱερόν.
  - Se evita suplir «ángel» en «el séptimo», siguiendo la elipsis del griego y la decisión auditada en inglés.
  - Se conserva la duplicación de procedencia («del santuario, desde el trono») para no colapsar dos complementos distintos.
  - No se usa «SEÑOR» ni terminología eclesiástica tradicional no atestiguada por el texto de este versículo.
