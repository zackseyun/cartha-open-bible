translation:
  language: es
  text: Y blasfemaron[a] al Dios del cielo a causa de sus dolores y de sus llagas[b], y no se arrepintieron de sus obras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablaron mal de» o «injuriaron» al Dios del cielo.
    reason: lexical_alternative
  - marker: b
    text: O «úlceras».
    reason: lexical_alternative
  - marker: c
    text: Lit. «no se arrepintieron de/desde sus obras»; la idea es que no se apartaron de lo que hacían.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβλασφήμησαν
  english_pob_choice: blasphemed
  chosen_spanish: blasfemaron
  alternatives_spanish:
  - maldijeron
  - hablaron mal de
  lexicon: BDAG
  rationale: βλασφημέω conserva una fuerza específicamente irreverente y dirigida contra Dios. «Blasfemaron» mantiene ese peso religioso mejor que un español más general como «hablaron mal de».
- source_word: τὸν θεὸν τοῦ οὐρανοῦ
  english_pob_choice: the God of heaven
  chosen_spanish: al Dios del cielo
  alternatives_spanish:
  - al Dios celestial
  - al Dios en el cielo
  lexicon: BDAG
  rationale: La construcción española natural requiere la preposición «a» con el objeto directo animado. «Del cielo» preserva el título bíblico y su tono solemne sin desplazar el sentido hacia «celestial» como adjetivo interpretativo.
- source_word: ἐκ τῶν πόνων αὐτῶν
  english_pob_choice: because of their pains
  chosen_spanish: a causa de sus dolores
  alternatives_spanish:
  - por sus dolores
  - debido a sus dolores
  lexicon: BDAG
  rationale: Aquí ἐκ es causal. «A causa de» reproduce bien esa relación y conserva el matiz de que su blasfemia surge como reacción a sus sufrimientos. «Dolores» comunica πόνοι como dolor intenso/tormento.
- source_word: ἑλκῶν
  english_pob_choice: sores
  chosen_spanish: llagas
  alternatives_spanish:
  - úlceras
  - heridas
  lexicon: BDAG
  rationale: ἕλκος puede ser llaga, úlcera o herida. «Llagas» es claro en español bíblico contemporáneo y sigue siendo suficientemente amplio para el contexto de plaga, sin medicalizar en exceso.
- source_word: μετενόησαν
  english_pob_choice: did not repent
  chosen_spanish: no se arrepintieron
  alternatives_spanish:
  - no cambiaron de mente
  - no se volvieron atrás
  lexicon: BDAG
  rationale: En Apocalipsis, μετανοέω conserva el sentido moral-religioso de arrepentirse. «No se arrepintieron» preserva esa fuerza mejor que una paráfrasis cognitiva.
- source_word: ἐκ τῶν ἔργων αὐτῶν
  english_pob_choice: of their deeds
  chosen_spanish: de sus obras
  alternatives_spanish:
  - de sus hechos
  - de lo que habían hecho
  lexicon: BDAG
  rationale: Después de «arrepentirse», el español idiomático usa «de». «Obras» refleja literalmente ἔργα y mantiene la resonancia bíblica de acciones/obras, sin perder claridad.
theological_decisions:
- issue: Valor de ἐκ en las dos primeras frases y con μετενόησαν
  english_pob_reading: The people blaspheme God because of their pains and sores, and they do not repent of their deeds.
  chosen_spanish_reading: Blasfeman a Dios a causa de sus dolores y llagas, y no se arrepienten de sus obras.
  alternative_spanish_readings:
  - blasfeman desde sus dolores y llagas
  - no se arrepienten desde sus obras
  rationale: La repetición de ἐκ no exige una misma solución en español. En los dos primeros casos el valor causal es claro, mientras que con μετανοέω la preposición marca separación/abandono del objeto del arrepentimiento. La formulación escogida preserva ambos matices sin forzar un literalismo uniforme.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Tratamiento del título divino τὸν θεὸν τοῦ οὐρανοῦ
  english_pob_reading: the God of heaven
  chosen_spanish_reading: el Dios del cielo
  alternative_spanish_readings:
  - el Dios celestial
  - el Dios que está en el cielo
  rationale: El griego presenta un título reverente y apocalíptico; «el Dios del cielo» lo conserva con naturalidad en español. No se sustituye por «Señor» ni se oculta el nombre divino, porque aquí el texto habla de Dios de manera explícita.
  doctrine_reference: 'Project terminology: יהוה / YHWH -> Yahvé; θεός -> Dios'
- issue: Intensidad de ἕλκος en contexto de plaga
  english_pob_reading: their sores
  chosen_spanish_reading: sus llagas
  alternative_spanish_readings:
  - sus úlceras
  - sus heridas
  rationale: En el contexto de las copas de juicio, «llagas» comunica bien la lesión visible y dolorosa sin estrechar el sentido a una categoría médica técnica. Mantiene la ambigüedad útil del término griego y su impacto narrativo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene el texto auditado con alta concordancia. Esta propuesta sigue la misma lectura causal de ἐκ en los dos primeros miembros y la idea de apartarse de las obras en el último.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por un equivalente eclesiástico menos directo.
  - «Arrepentirse» conserva la fuerza moral-religiosa de μετανοέω en Apocalipsis.
  - «Obras» sigue la resonancia bíblica de ἔργα y evita una paráfrasis demasiado libre.
  - «Llagas» fue preferido por claridad y tono bíblico contemporáneo, aunque el español admite «úlceras».
