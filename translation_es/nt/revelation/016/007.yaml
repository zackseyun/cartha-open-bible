translation:
  language: es
  text: 'Y oí al altar que decía[a]: «Sí, Señor Dios, el Todopoderoso, verdaderos y justos son tus juicios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «oí desde el altar». El griego también puede señalar la fuente de lo oído, aunque la redacción más natural presenta al altar mismo como si hablara.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  lexicon: BDAG
  rationale: El aoristo de ἀκούω expresa un hecho puntual; en español, «oí» reproduce de manera breve y natural la acción percibida, sin introducir la intención de «escuchar».
- source_word: τοῦ θυσιαστηρίου λέγοντος
  english_pob_choice: the altar saying
  chosen_spanish: al altar diciendo
  alternatives_spanish:
  - del altar diciendo
  - oyendo que el altar decía
  lexicon: BDAG
  rationale: El griego permite entender el altar como fuente gramatical de lo oído, y la POB inglesa conserva la personificación del altar que habla. En español, «al altar diciendo» mantiene esa imagen apocalíptica, aunque la nota deja abierta la alternativa de fuente («del altar»).
- source_word: Ναί
  english_pob_choice: 'Yes'
  chosen_spanish: Sí
  alternatives_spanish:
  - En efecto
  - Ciertamente
  lexicon: BDAG
  rationale: Ναί es una afirmación directa; «Sí» es la equivalencia moderna más clara y conserva la fuerza responsiva.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En vocativo dirigido a Dios, «Señor» es el equivalente natural y reverente en español, y preserva el valor titular de κύριος.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡oh, Dios!
  lexicon: BDAG
  rationale: El sustantivo en aposición al vocativo anterior se traduce de forma directa como «Dios», manteniendo la acumulación de títulos sin añadir una interjección que el griego no exige.
- source_word: ὁ παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: BDAG
  rationale: παντοκράτωρ se refiere a la soberanía y poder universal de Dios. «El Todopoderoso» es la forma española tradicional y clara, equivalente al inglés POB «the Almighty».
- source_word: ἀληθιναὶ
  english_pob_choice: 'true'
  chosen_spanish: verdaderas
  alternatives_spanish:
  - verdadaderas
  - auténticas
  lexicon: BDAG
  rationale: El adjetivo predicado modifica a «juicios»; «verdaderas» conserva la relación con la realidad y la confiabilidad de las decisiones divinas.
- source_word: δίκαιαι
  english_pob_choice: just
  chosen_spanish: justas
  alternatives_spanish:
  - rectas
  - rigurosamente justas
  lexicon: BDAG
  rationale: Con κρίσεις, «justas» preserva el registro judicial y teológico del término, igual que el inglés POB «just».
- source_word: αἱ κρίσεις σου
  english_pob_choice: your judgments
  chosen_spanish: tus juicios
  alternatives_spanish:
  - tus sentencias
  - tus decisiones judiciales
  lexicon: BDAG
  rationale: κρίσεις apunta a actos o veredictos de juicio. «Juicios» es la forma concisa y natural en español, y mantiene el peso judicial del contexto.
theological_decisions:
- issue: Personificación del altar como hablante
  english_pob_reading: 'Render the altar itself as speaking: ''I heard the altar saying'''
  chosen_spanish_reading: 'Conservar el altar como hablante: «oí al altar diciendo»'
  alternative_spanish_readings:
  - «oí del altar decir»
  - «oí una voz desde el altar diciendo»
  rationale: El griego presenta al altar como sujeto gramatical del participio de habla. La versión española mantiene esa imagen sin insertar «voz», que el texto no expresa aquí, y la nota preserva la alternativa de fuente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Acumulación de títulos divinos en vocativo
  english_pob_reading: '''Lord God, the Almighty'''
  chosen_spanish_reading: «Señor Dios, el Todopoderoso»
  alternative_spanish_readings:
  - «Señor, Dios, el Todopoderoso»
  - «Señor Dios Todopoderoso»
  rationale: 'El griego tiene tres elementos en aposición o dirección: κύριε, ὁ θεός, ὁ παντοκράτωρ. La forma elegida conserva los tres títulos y mantiene una cadencia natural en español.'
  doctrine_reference: 'Contested terms table: κύριος → Señor'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el análisis auditado de la POB inglesa. No introduce revisiones textuales; conserva la personificación del altar y la triple dirección divina, y mantiene la relación semántica de ἀληθιναὶ καὶ δίκαιαι αἱ κρίσεις σου con una formulación española natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto griego o hebreo lo justifique; aquí no aparece.
  - Se mantiene «Dios» para θεός y «Señor» para κύριε en vocativo reverente.
  - «Todopoderoso» reproduce el valor de παντοκράτωρ sin sustituirlo por una glosa interpretativa.
  - «Juicios» conserva el registro judicial de κρίσεις en un contexto de retribución divina.
  - La puntuación española usa comillas angulares para el discurso directo, de acuerdo con el estilo editorial en español.
