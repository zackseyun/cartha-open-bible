translation:
  language: es
  text: Y la gran ciudad fue dividida en tres partes, y las ciudades de las naciones cayeron; y Babilonia la grande[a] fue recordada delante de Dios, para darle la copa del vino del furor de su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «vino a la memoria delante de Dios». La expresión es un modismo bíblico para indicar que quedó bajo la atención de Dios para juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: was split
  chosen_spanish: fue dividida
  alternatives_spanish:
  - llegó a ser dividida
  - se partió
  lexicon: BDAG
  rationale: 'El griego con ἐγένετο ... εἰς τρία μέρη expresa un resultado: la ciudad llegó a estar en tres partes. En español, «fue dividida» comunica ese resultado con naturalidad y conserva la idea de ruptura sin añadir explicación interpretativa.'
- source_word: ἡ πόλις ἡ μεγάλη
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - la gran metrópoli
  lexicon: BDAG
  rationale: Se conserva el sustantivo simple «ciudad» con el adjetivo atributivo. «Gran ciudad» es la forma más natural y fiel al título apocalíptico sin expandirlo.
- source_word: εἰς τρία μέρη
  english_pob_choice: into three parts
  chosen_spanish: en tres partes
  alternatives_spanish:
  - en tres porciones
  - dividida en tres partes
  lexicon: BDAG
  rationale: Aunque el inglés POB explicita «into», en español el resultado de división se expresa de modo natural con «en tres partes». Dado el verbo pasivo «fue dividida», la idea de resultado queda clara sin forzar una preposición menos idiomática.
- source_word: αἱ πόλεις τῶν ἐθνῶν
  english_pob_choice: the cities of the nations
  chosen_spanish: las ciudades de las naciones
  alternatives_spanish:
  - las ciudades de los pueblos
  - las ciudades de los gentiles
  lexicon: BDAG
  rationale: «Naciones» mantiene el sentido amplio y global de ἔθνη en el contexto de juicio escatológico. «Gentiles» sería más restringido y podría sonar étnico-religioso en español de manera innecesaria.
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - cayeron derribadas
  - se derrumbaron
  lexicon: BDAG
  rationale: «Cayeron» reproduce el verbo básico de πίπτω y conserva la imaginería apocalíptica. «Se derrumbaron» explicita ruina estructural, pero va más allá del alcance mínimo del griego.
- source_word: Βαβυλὼν ἡ μεγάλη
  english_pob_choice: Babylon the great
  chosen_spanish: Babilonia la grande
  alternatives_spanish:
  - la grande Babilonia
  - la gran Babilonia
  lexicon: BDAG
  rationale: Se respeta el orden titulado del griego y del POB inglés. «La grande» preserva el apelativo fijo de Apocalipsis sin sustituirlo por una formulación más interpretativa.
- source_word: ἐμνήσθη ἐνώπιον τοῦ θεοῦ
  english_pob_choice: was remembered before God
  chosen_spanish: fue recordada delante de Dios
  alternatives_spanish:
  - fue traída a la memoria delante de Dios
  - vino a la memoria delante de Dios
  lexicon: BDAG
  rationale: «Fue recordada delante de Dios» mantiene el idiomatismo judicial sin resolverlo en paráfrasis. «Delante de Dios» conserva el valor de ἐνώπιον y sugiere su condición de quedar bajo la vista/atención divina.
- source_word: δοῦναι αὐτῇ
  english_pob_choice: to give her
  chosen_spanish: para darle
  alternatives_spanish:
  - para dar a ella
  - a fin de darle
  lexicon: BDAG
  rationale: El infinitivo de propósito se naturaliza en español como «para darle». Se mantiene el dativo femenino con pronombre átono para fluidez, sin perder la relación de finalidad.
- source_word: τὸ ποτήριον
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el cáliz
  - la taza
  lexicon: BDAG
  rationale: «Copa» es la equivalencia bíblica más transparente para la metáfora de juicio. «Cáliz» sería más litúrgico y menos neutral en este contexto apocalíptico.
- source_word: τοῦ οἴνου
  english_pob_choice: of the wine
  chosen_spanish: del vino
  alternatives_spanish:
  - de vino
  - del mosto
  lexicon: BDAG
  rationale: Se conserva la cadena nominal de modo directo. «Del vino» mantiene la imagen sin suavizar la metáfora ni introducir términos no atestiguados.
- source_word: τοῦ θυμοῦ
  english_pob_choice: of the fury
  chosen_spanish: del furor
  alternatives_spanish:
  - de la furia
  - de la ira vehemente
  lexicon: BDAG
  rationale: «Furor» permite distinguir θυμός del término siguiente ὀργή y conserva el matiz de explosión intensa. En español bíblico, «furia» también sería posible, pero «furor» ayuda a mantener una diferenciación léxica clara.
- source_word: τῆς ὀργῆς αὐτοῦ
  english_pob_choice: of his wrath
  chosen_spanish: de su ira
  alternatives_spanish:
  - de su furor
  - de su cólera
  lexicon: BDAG
  rationale: «Ira» es la forma más natural y reconocible para ὀργή en este marco de juicio divino. Se mantiene la distinción con θυμός mediante «furor de su ira», reproduciendo la intensificación del griego.
theological_decisions:
- issue: El idiomatismo judicial ἐμνήσθη ἐνώπιον τοῦ θεοῦ
  english_pob_reading: was remembered before God
  chosen_spanish_reading: fue recordada delante de Dios
  alternative_spanish_readings:
  - fue traída a la memoria delante de Dios
  - quedó bajo el recuerdo de Dios
  rationale: La expresión no significa solo memoria mental, sino que Babilonia entra en el ámbito de la acción judicial de Dios. «Fue recordada delante de Dios» conserva la tensión bíblica sin explicitar en exceso el juicio, dejando que el contexto lo haga. La alternativa más explicativa se evita para no borrar el idiomatismo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla prematuramente.'
- issue: La duplicación de términos de juicio θυμός y ὀργή
  english_pob_reading: the wine of the fury of his wrath
  chosen_spanish_reading: el vino del furor de su ira
  alternative_spanish_readings:
  - el vino de la furia de su ira
  - el vino de su ira ardiente
  rationale: El griego acumula dos sustantivos relacionados pero no idénticos; por eso la traducción conserva ambos. «Furor» + «ira» permite mantener la intensificación retórica del original sin colapsar todo en una sola palabra.
  doctrine_reference: 'Translation philosophy §5: consistencia de términos clave, o excepción documentada.'
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios sustantivos; el acuerdo de revisión fue alto y el texto quedó sin modificaciones. Por ello, la versión española sigue de cerca el audit trail inglés y conserva sus decisiones clave de juicio e intensificación léxica.
  spanish_consistency_notes:
  - Se mantiene «Babilonia la grande» como título fijo apocalíptico para conservar coherencia interna.
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo requiera; este versículo no lo contiene, por lo que no aparece aquí.
  - Se preserva la distinción entre «furor» y «ira» para reflejar θυμός y ὀργή sin neutralizarlos.
