revisions:
- from: Y hubo relámpagos, voces[a] y truenos; y hubo un gran terremoto, como no lo había habido desde que hubo personas sobre la tierra[b] —tan grande fue aquel terremoto.
  to: Y hubo relámpagos, sonidos[a] y truenos, y hubo un gran terremoto, como no lo había habido desde que existen seres humanos en la tierra[b]—tan grande fue aquel terremoto.
  rationale: Se ajusta φωναί a «sonidos» para seguir la decisión léxica auditada y evitar una personalización no exigida por el contexto. Se mejora la cláusula temporal para que suene natural en español y mantenga el sentido inclusivo de ἄνθρωποι junto con el matiz de ἐγένοντο, conservado en la nota. También se pule la puntuación para una lectura más natural y digna.
