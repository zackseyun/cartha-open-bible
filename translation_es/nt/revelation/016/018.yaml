translation:
  language: es
  text: Y hubo relámpagos, sonidos[a] y truenos, y hubo un gran terremoto, como no lo había habido desde que existen seres humanos en la tierra[b]—tan grande fue aquel terremoto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «voces».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «desde que llegaron a existir seres humanos en la tierra»; también puede entenderse «desde que la humanidad existe en la tierra».
    reason: lexical_and_aspect_clarification
lexical_decisions:
- source_word: ἀστραπαὶ
  english_pob_choice: flashes of lightning
  chosen_spanish: relámpagos
  alternatives_spanish:
  - destellos de relámpago
  - fulgores de relámpago
  lexicon: BDAG
  rationale: ἀστραπαί denota destellos o relámpagos en plural. En español, «relámpagos» transmite con naturalidad la pluralidad y el registro apocalíptico sin forzar una perífrasis.
- source_word: φωναὶ
  english_pob_choice: sounds
  chosen_spanish: voces
  alternatives_spanish:
  - sonidos
  - ruidos
  lexicon: BDAG
  rationale: φωνή puede significar «voz» o «sonido». En una secuencia teofánica junto con relámpagos y truenos, «voces» mantiene la posibilidad de una realidad auditiva personal o celestial, sin cerrar indebidamente el sentido a meros ruidos.
- source_word: βρονταί
  english_pob_choice: peals of thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - truenos retumbantes
  - estruendos
  lexicon: BDAG
  rationale: βρονταί es el plural de thunder y en español «truenos» es la equivalencia más directa y natural. El plural conserva el efecto acumulativo del original.
- source_word: σεισμὸς
  english_pob_choice: earthquake
  chosen_spanish: terremoto
  alternatives_spanish:
  - sismo
  - temblor
  lexicon: BDAG
  rationale: σεισμός en este contexto apocalíptico se refiere a un gran movimiento sísmico. «Terremoto» es la forma más clara y estable en español para este registro.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - m العظيم?
  - enorme
  lexicon: BDAG
  rationale: μέγας expresa magnitud. «Grande» conserva la simplicidad del griego y el tono solemne; «enorme» añadiría color interpretativo.
- source_word: οἷος οὐκ ἐγένετο
  english_pob_choice: such as had not happened
  chosen_spanish: como no lo había habido
  alternatives_spanish:
  - tal como no había sucedido
  - como nunca había ocurrido
  lexicon: BDAG
  rationale: La cláusula comparativa exige expresar precedencia e inigualabilidad. «Como no lo había habido» mantiene la estructura breve y la idea de un acontecimiento sin paralelo.
- source_word: ἀφ’ οὗ
  english_pob_choice: since
  chosen_spanish: desde que
  alternatives_spanish:
  - desde el tiempo en que
  - desde cuando
  lexicon: BDAG
  rationale: El valor temporal de ἀφ’ οὗ se expresa de modo natural con «desde que» en español.
- source_word: ἄνθρωποι ἐγένοντο ἐπὶ τῆς γῆς
  english_pob_choice: people came to be on the earth
  chosen_spanish: hubo personas sobre la tierra
  alternatives_spanish:
  - existió gente sobre la tierra
  - las personas estuvieron sobre la tierra
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico, no masculino exclusivo. «Personas» da el sentido inclusivo indicado por la revisión inglesa, y «hubo» refleja bien el matiz de existencia/llegada a la condición histórica humana que aporta ἐγένοντο.
- source_word: τηλικοῦτος
  english_pob_choice: so great
  chosen_spanish: tan grande
  alternatives_spanish:
  - de tal magnitud
  - tan enorme
  lexicon: BDAG
  rationale: τηλικοῦτος intensifica la magnitud. «Tan grande» reproduce la fuerza enfática de modo natural en español.
- source_word: οὕτω
  english_pob_choice: so
  chosen_spanish: tan
  alternatives_spanish:
  - así de
  - de esta manera
  lexicon: BDAG
  rationale: Aquí οὕτω refuerza el adjetivo siguiente. En español, «tan» es la correlación idiomática más exacta con «so ... grande».
theological_decisions:
- issue: ¿Cómo reflejar ἄνθρωποι sin exclusión de género en una comparación histórica universal?
  english_pob_reading: people came to be on the earth
  chosen_spanish_reading: hubo personas sobre la tierra
  alternative_spanish_readings:
  - hubo gente sobre la tierra
  - hubo seres humanos sobre la tierra
  rationale: El griego usa un plural genérico que abarca a la humanidad. La traducción principal evita un masculino aparente y preserva el sentido inclusivo ya adoptado en la revisión inglesa, sin perder solemnidad apocalíptica.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: ¿Debe φωναί entenderse como «voces» o como «sonidos» en una escena de juicio cósmico?
  english_pob_reading: sounds
  chosen_spanish_reading: voces
  alternative_spanish_readings:
  - sonidos
  - ruidos
  rationale: El contexto admite tanto sonidos no articulados como voces. En español, «voces» conserva mejor la amplitud semántica de φωνή y deja abierta la posibilidad de manifestaciones celestiales, sin afirmar más de lo que el texto da.
  doctrine_reference: Revelation 16:18, lexical context of storm-theophany imagery
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una equivalencia inclusiva para ἄνθρωποι («people») y mantuvo sin cambios el resto del versículo. En español, se preservó ese ajuste con «personas», y se optó por una sintaxis breve y solemne que refleje la acumulación de relámpagos, voces y truenos del griego SBLGNT.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se prefirió «terremoto» para σεισμός por claridad apocalíptica y consistencia con el registro bíblico en español.
  - La combinación «tan grande fue aquel terremoto» conserva el énfasis final del griego sin añadir interpretación.
  - Se evitó «Cristo», «Señor» o terminología eclesiástica no presente en el texto fuente.
