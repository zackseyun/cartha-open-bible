translation:
  language: es
  text: Y el sexto derramó su copa sobre el gran río Éufrates, y su agua se secó, para que fuera preparado el camino de los reyes del nacimiento del sol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más simplemente, «del oriente». Literalmente, «del nacimiento del sol».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἕκτος
  english_pob_choice: the sixth
  chosen_spanish: el sexto
  alternatives_spanish:
  - el sexto ángel
  lexicon: BDAG
  rationale: El griego solo trae el ordinal con artículo; por eso se conserva «el sexto» sin añadir «ángel», que sería una explicitación no presente en el texto inmediato.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - echó
  lexicon: BDAG
  rationale: «Derramó» comunica bien el acto de vaciar una copa y mantiene la imaginería de juicio de Apocalipsis. Es más natural en español que un calco como «vertió» en este contexto ritual-apocalíptico.
- source_word: φιάλην
  english_pob_choice: bowl
  chosen_spanish: copa
  alternatives_spanish:
  - tazón
  - vasija
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «bowl», en español «copa» es la forma más estable y clara para φιάλη en las copas de juicio de Apocalipsis, sin sugerir una botella pequeña como «vial».
- source_word: ἐπὶ τὸν ποταμὸν τὸν μέγαν τὸν Εὐφράτην
  english_pob_choice: on the great river Euphrates
  chosen_spanish: sobre el gran río, el Eufrates
  alternatives_spanish:
  - sobre el gran río Eufrates
  - sobre el gran río Éufrates
  lexicon: BDAG
  rationale: Se preserva la apposición del griego («el gran río, el Eufrates») y la preposición ἐπί con «sobre». Se usa la forma común «Eufrates» como nombre propio reconocible en español bíblico contemporáneo.
- source_word: ἐξηράνθη
  english_pob_choice: was dried up
  chosen_spanish: se secó
  alternatives_spanish:
  - fue secada
  - se secó por completo
  lexicon: BDAG
  rationale: La pasiva aorística se expresa de manera natural en español con «se secó», que transmite el resultado consumado sin una pasiva perifrástica pesada.
- source_word: τὸ ὕδωρ αὐτοῦ
  english_pob_choice: its water
  chosen_spanish: su agua
  alternatives_spanish:
  - el agua de él
  - el agua de este
  lexicon: BDAG
  rationale: El pronombre se refiere al río; en español «su agua» es la forma idiomática y clara de mantener ese referente.
- source_word: ἵνα ἑτοιμασθῇ
  english_pob_choice: so that ... might be prepared
  chosen_spanish: para que fuera preparado
  alternatives_spanish:
  - a fin de que fuera preparado
  - para que se preparara
  lexicon: BDAG
  rationale: Se conserva la fuerza final o de propósito de ἵνα con una estructura natural en español. «Fuera preparado» mantiene el matiz pasivo del subjuntivo aoristo.
- source_word: ἡ ὁδὸς
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - la senda
  lexicon: BDAG
  rationale: «Camino» funciona bien en español para ὁδός y permite tanto el sentido literal como el figurado sin sobreespecificar.
- source_word: τῶν βασιλέων
  english_pob_choice: of the kings
  chosen_spanish: de los reyes
  alternatives_spanish:
  - para los reyes
  lexicon: BDAG
  rationale: 'Se conserva el genitivo como relación posesiva o descriptiva: el camino pertenece o está asociado a «los reyes».'
- source_word: τῶν ἀπὸ ἀνατολῆς ἡλίου
  english_pob_choice: from the rising of the sun
  chosen_spanish: que vienen del nacimiento del sol
  alternatives_spanish:
  - que vienen del oriente
  - que vienen de donde sale el sol
  lexicon: BDAG
  rationale: La opción principal preserva la imagen literal del griego y la decisión del inglés POB de no reducirla a «del este». «Nacimiento del sol» reproduce mejor el giro idiomático ἀνατολῆς ἡλίου, aunque suene más solemne que la simplificación geográfica.
theological_decisions:
- issue: Si añadir o no «ángel» al sujeto de «el sexto»
  english_pob_reading: Kept the text as 'the sixth' without adding 'angel.'
  chosen_spanish_reading: Se mantiene «el sexto» sin añadir «ángel».
  alternative_spanish_readings:
  - el sexto ángel
  rationale: El contexto inmediato ya identifica a los portadores de las copas, pero este versículo no repite el sustantivo. La traducción preserva esa elipsis para no introducir una precisión ausente en el griego.
  doctrine_reference: Primacía del texto original y respeto por la elipsis contextual
- issue: Cómo tratar la imagen del secamiento del Éufrates y la llegada de los reyes
  english_pob_reading: Rendered the imagery straightforwardly without interpretive expansion.
  chosen_spanish_reading: Se traduce la imagen de manera directa, sin explicarla ni identificarla simbólicamente en el texto principal.
  alternative_spanish_readings:
  - paráfrasis que expliquen invasión o reunión escatológica
  rationale: El versículo presenta una imagen apocalíptica, pero no explica aquí su alcance completo. Conviene preservar la tensión teológica en lugar de resolverla con una interpretación en la línea principal.
  doctrine_reference: Principio de no resolver en la traducción principal lo que el pasaje deja abierto
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta revisiones aplicadas y el pase más reciente indica que el texto quedó sin cambios; esta propuesta sigue ese estado estable, con ajustes solo de equivalencia natural al español y sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, pero en este versículo no hay mención al Tetragrámaton.
  - Se usa «copa» para φιάλη en coherencia con el ciclo de las copas de juicio en Apocalipsis.
  - «Eufrates» se conserva como forma castellana reconocible y consistente con el nombre propio bíblico.
  - La imagen de «nacimiento del sol» se mantiene como equivalente formal de la metáfora griega, con nota para la alternativa más simple «oriente».
