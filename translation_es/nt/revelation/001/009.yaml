translation:
  language: es
  text: Yo, Juan, hermano de ustedes y copartícipe en la tribulación y el reino y la perseverancia en Jesús, me hallaba en la isla llamada Patmos por causa de la palabra de Dios y del testimonio de Jesús[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el testimonio acerca de Jesús». El genitivo griego puede significar tanto el testimonio dado por Jesús como el testimonio acerca de Jesús; el texto principal conserva la ambigüedad.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Yohanan
  lexicon: BDAG
  rationale: El nombre propio griego se vierte al equivalente español usual y transparente, manteniendo identificación inmediata del autor.
- source_word: ἀδελφὸς ὑμῶν
  english_pob_choice: your brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - hermano de ustedes
  - su hermano en la fe
  lexicon: BDAG
  rationale: La relación fraterna se expresa con naturalidad en español. 'Su hermano' conserva la solidaridad personal sin añadir una glosa eclesiástica no exigida por el texto.
- source_word: συγκοινωνός
  english_pob_choice: fellow participant
  chosen_spanish: copartícipe
  alternatives_spanish:
  - compañero participante
  - partícipe junto con ustedes
  lexicon: BDAG
  rationale: '''Copartícipe'' comunica participación compartida de manera concisa y formal. Evita el posible matiz comercial de ''socio'' y preserva la idea de compartir realidades comunes.'
- source_word: ἐν τῇ θλίψει καὶ βασιλείᾳ καὶ ὑπομονῇ
  english_pob_choice: in the tribulation and kingdom and endurance
  chosen_spanish: en la tribulación, el reino y la perseverancia
  alternatives_spanish:
  - en la tribulación, el reino y la paciencia perseverante
  - en el sufrimiento, el reino y la perseverancia
  lexicon: BDAG
  rationale: Se mantiene la serie coordinada con un solo artículo inicial implícito en español, siguiendo el sentido de participación en un ámbito compartido. 'Tribulación' conserva la fuerza apocalíptica; 'reino' refleja βασιλεία; 'perseverancia' expresa ὑπομονή con un término natural y eclesialmente claro.
- source_word: ἐν Ἰησοῦ
  english_pob_choice: in Jesus
  chosen_spanish: en Jesús
  alternatives_spanish:
  - unido a Jesús
  - en unión con Jesús
  lexicon: BDAG
  rationale: La frase breve se conserva casi literalmente porque el griego es compacto y teológicamente cargado. 'En Jesús' mantiene la relación esférica o relacional sin expandirla interpretativamente.
- source_word: ἐγενόμην ἐν τῇ νήσῳ
  english_pob_choice: was on the island
  chosen_spanish: me hallé en la isla
  alternatives_spanish:
  - estuve en la isla
  - me encontré en la isla
  lexicon: BDAG
  rationale: El verbo γίνομαι admite un sentido locativo idiomático. 'Me hallé' evita suponer demasiado sobre el modo de llegada y suena natural en español bíblico contemporáneo.
- source_word: τῇ καλουμένῃ Πάτμῳ
  english_pob_choice: called Patmos
  chosen_spanish: llamada Patmos
  alternatives_spanish:
  - nombrada Patmos
  lexicon: BDAG
  rationale: Participio pasivo naturalizado en español como adjetivo explicativo. 'Llamada Patmos' es breve, idiomático y fiel al apodo geográfico.
- source_word: διὰ τὸν λόγον τοῦ θεοῦ
  english_pob_choice: because of the word of God
  chosen_spanish: por causa de la palabra de Dios
  alternatives_spanish:
  - a causa de la palabra de Dios
  - por la palabra de Dios
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o razón. 'Por causa de' suena natural y conserva la ambigüedad razonable entre motivo, consecuencia y posible persecución relacionada con la palabra.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - el dicho de Dios
  lexicon: BDAG
  rationale: '''Palabra de Dios'' es el equivalente directo y más estable para λόγος en este contexto, sin desplazar el peso revelacional del término.'
- source_word: τὴν μαρτυρίαν Ἰησοῦ
  english_pob_choice: the testimony of Jesus
  chosen_spanish: el testimonio de Jesús
  alternatives_spanish:
  - el testimonio acerca de Jesús
  - el testimonio de parte de Jesús
  lexicon: BDAG
  rationale: 'Se conserva la ambigüedad genitiva en español, como en el texto base: puede ser testimonio de Jesús o acerca de Jesús. La forma ''de Jesús'' mantiene la tensión sin resolverla de antemano.'
theological_decisions:
- issue: Ambigüedad del genitivo en 'μαρτυρίαν Ἰησοῦ'
  english_pob_reading: the testimony of Jesus
  chosen_spanish_reading: el testimonio de Jesús
  alternative_spanish_readings:
  - el testimonio acerca de Jesús
  - el testimonio de parte de Jesús
  rationale: El griego permite lectura subjetiva u objetiva. La redacción española conserva esa tensión en el texto principal, sin imponer una resolución doctrinal o exegética. La ambigüedad es importante para lectura apocalíptica y debe quedar visible.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Relación de comunión expresada por ἐν Ἰησοῦ
  english_pob_reading: in Jesus
  chosen_spanish_reading: en Jesús
  alternative_spanish_readings:
  - unido a Jesús
  - en unión con Jesús
  rationale: La expresión es breve y densa. Mantenerla compacta evita convertir una frase relacional en una paráfrasis doctrinal más explícita de lo que exige el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el tramo frente al audit trail inglés y no se detectaron cambios de revisión aplicados en el origen. La redacción española intenta mantener la misma filosofía de equivalencia óptima y la misma ambigüedad significativa en 'el testimonio de Jesús'.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en todo el proyecto, pero aquí el texto solo contiene θεοῦ; por eso se traduce «Dios».
  - Se prefirió «Jesús» para Ἰησοῦς, en coherencia con el estándar del proyecto.
  - «Tribulación» se conserva para θλῖψις por su fuerza apocalíptica y por consistencia interna.
  - «Perseverancia» se emplea para ὑπομονή; aunque «paciencia» es posible, aquí debilitaría la fuerza de resistencia activa.
  - No se introdujo «Mesías» porque el versículo usa el nombre personal Ἰησοῦς, no el título Χριστός.
