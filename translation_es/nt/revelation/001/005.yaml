    rationale: El English POB preserva en nota la alternativa 'Jesus Christ'. En español, al usar 'Jesús Mesías', conviene mantener la alternativa 'Jesucristo' en una nota léxica para reflejar la misma transparencia editorial.
  revised_spanish_text: y de Jesús Mesías[b], el testigo fiel, el primogénito de los muertos y el soberano de los reyes de la tierra. Al que nos ama y nos liberó de nuestros pecados por medio de su sangre[a]—
