translation:
  language: es
  text: y de Jesús Mesías[b], el testigo fiel, el primogénito de los muertos y el soberano de los reyes de la tierra. Al que nos ama y nos liberó de nuestros pecados por medio de su sangre[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen 'nos lavó de nuestros pecados en su sangre' en lugar de 'nos liberó de nuestros pecados por medio de su sangre'.
    reason: textual_variant
  - marker: b
    text: O 'Jesucristo'. El título griego es 'Mesías'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús Mesías
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título mesiánico, no como apellido. En español, 'Mesías' conserva el valor titular y evita depender de una transliteración tradicional cuando el contexto permite traducir el título.
- source_word: μάρτυς ὁ πιστός
  english_pob_choice: the faithful witness
  chosen_spanish: el testigo fiel
  alternatives_spanish:
  - el testigo leal
  - el testigo verdadero
  lexicon: BDAG
  rationale: '''Testigo'' reproduce el sentido de μάρτυς como uno que da testimonio; ''fiel'' conserva la idea de πιστός como confiable y constante. ''Mártir'' se evita porque aquí el énfasis no es la muerte por el testimonio.'
- source_word: πρωτότοκος τῶν νεκρῶν
  english_pob_choice: the firstborn of the dead
  chosen_spanish: el primogénito de los muertos
  alternatives_spanish:
  - el primogénito entre los muertos
  - el primero entre los muertos
  lexicon: BDAG
  rationale: '''Primogénito'' conserva la imagen bíblica de preeminencia y origen. ''De los muertos'' sigue de cerca τῶν νεκρῶν y mantiene la relación con el ámbito de la muerte sin suavizarla.'
- source_word: ἄρχων τῶν βασιλέων τῆς γῆς
  english_pob_choice: the ruler of the kings of the earth
  chosen_spanish: el soberano de los reyes de la tierra
  alternatives_spanish:
  - el gobernante de los reyes de la tierra
  - el gobernante de los reyes de la tierra
  lexicon: BDAG
  rationale: '''Soberano'' comunica autoridad suprema y encaja bien con el genitivo plural ''de los reyes de la tierra''. Se evita ''príncipe'' por posible ambigüedad de rango inferior en español.'
- source_word: ἀγαπῶντι ἡμᾶς
  english_pob_choice: him who loves us
  chosen_spanish: al que nos ama
  alternatives_spanish:
  - al que nos está amando
  - al que nos ama continuamente
  lexicon: BDAG
  rationale: El participio presente expresa acción en curso; 'ama' comunica naturalmente ese valor en español sin forzar una perífrasis poco idiomática.
- source_word: λύσαντι ἡμᾶς ἐκ τῶν ἁμαρτιῶν ἡμῶν
  english_pob_choice: freed us from our sins
  chosen_spanish: nos liberó de nuestros pecados
  alternatives_spanish:
  - nos rescató de nuestros pecados
  - nos soltó de nuestros pecados
  lexicon: BDAG
  rationale: λύω aquí expresa liberar/soltar. 'Liberó' conserva la idea de emancipación y funciona bien con el complemento 'de nuestros pecados'. No se traduce como 'lavó' porque el texto base sigue el participio λύσαντι, no la variante textual λούσαντι.
- source_word: ἐν τῷ αἵματι αὐτοῦ
  english_pob_choice: by his blood
  chosen_spanish: por medio de su sangre
  alternatives_spanish:
  - con su sangre
  - mediante su sangre
  lexicon: BDAG
  rationale: ἐν se entiende instrumentalmente en este contexto. 'Por medio de' hace explícito el valor de medio en español y preserva el lenguaje sacrificial sin volverlo mecánico.
theological_decisions:
- issue: Titulación de Χριστός como Mesías
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesucristo Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús Cristo
  rationale: La línea editorial del POB trata Χριστός como título traducible. En español, 'Mesías' preserva ese valor y evita convertirlo en un nombre fijo no analizado. Se mantiene unido a 'Jesucristo' para reflejar el nombre personal más el título.
  doctrine_reference: Translation philosophy §2
- issue: Variante textual después de 'nos ama'
  english_pob_reading: λύσαντι ... 'freed us'
  chosen_spanish_reading: nos liberó de nuestros pecados
  alternative_spanish_readings:
  - nos lavó de nuestros pecados
  - nos lavó y liberó de nuestros pecados
  rationale: El texto base griego leído aquí es λύσαντι ('liberó/soltó'), no λούσαντι ('lavó'). La traducción principal sigue el testimonio base y deja fuera la variante en el texto corrido para no mezclar dos lecturas distintas.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se corrigió la omisión previa del marcador de nota: el texto español ahora incluye [a] exactamente en la frase correspondiente, de modo que la nota textual queda anclada y validable. La redacción también mantiene la lectura base λύσαντι y no importa la variante λούσαντι al texto principal.'
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός conforme a la política POB de traducir el título cuando el contexto lo permite.
  - Se mantiene 'testigo fiel' para μάρτυς ὁ πιστός, evitando 'mártir'.
  - '''Primogénito de los muertos'' sigue de cerca τῶν νεκρῶν y conserva la expresión apocalíptica.'
  - '''Soberano'' comunica mejor ἄρχων que ''príncipe'' en este contexto de autoridad sobre reyes.'
  - '''Por medio de su sangre'' explicita el valor instrumental de ἐν sin perder el tono sacrificial.'
  - La nota [a] está anclada en el texto y corresponde únicamente a la variante textual documentada.
