  rationale: 'Se corrige únicamente la cristología titular inicial: ''Jesucristo Mesías'' se reemplaza por ''Jesús Mesías'' para reflejar fielmente Ἰησοῦ Χριστοῦ y la decisión auditada de traducir Χριστός como título. Se añade la nota léxica para conservar la alternativa tradicional ''Jesucristo'', en paralelo con el English POB. El resto del texto y la nota textual se mantienen porque alinean bien con la fuente y con el estilo del proyecto.'
