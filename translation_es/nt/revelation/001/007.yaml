revisions:
- from: ¡Mira[a], viene con las nubes, y todo ojo lo verá, incluso los que lo traspasaron; y todas las tribus de la tierra se lamentarán por él. Sí, amén.
  to: ¡Mira!, viene con las nubes, y todo ojo lo verá, incluso los que lo traspasaron, y todas las tribus de la tierra[a] se lamentarán por él. Sí, amén.
  rationale: 'Se conserva casi todo el texto del borrador, pero se reubica la nota al lugar donde el audit trail inglés preserva una alternativa exegéticamente relevante: τῆς γῆς. También se suaviza la puntuación para un español más natural. No se requiere adjudicación adicional, porque la corrección es menor y está claramente respaldada por la documentación inglesa y el griego.'
