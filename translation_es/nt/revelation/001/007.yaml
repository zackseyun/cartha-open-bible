review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego y sigue de cerca las decisiones del POB inglés: venida con las nubes, visibilidad universal, referencia a los que lo traspasaron, lamento de todas las tribus y doble afirmación final. Sin embargo, omite en las notas la alternativa importante de γῆ como «tierra/país» documentada en el audit trail inglés, y el anclaje de la nota actual en «Mira» prioriza una alternativa menos significativa para esta unidad.'
  spanish_quality_summary: El español es claro y legible. «viene», «todo ojo lo verá» y «Sí, amén» funcionan bien. «¡Mira!» es comprensible, pero en registro bíblico proclamativo «He aquí» o simplemente «Miren» compiten; aun así, no es un error grave. La puntuación con punto y coma antes de «y todas las tribus...» es menos natural que una coma en este flujo coordinado. Conviene además trasladar la nota al sintagma «de la tierra» para preservar la tensión exegética principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías ni otros términos sensibles del glosario. «Traspasaron» preserva bien la conexión intertextual; «tribus» para φυλαί y «amén» son adecuados.
  issues:
  - severity: medium
    issue: Falta la nota sobre «de la tierra» / «del país»
    rationale: El POB inglés conserva explícitamente la alternativa «land» por el eco de Zacarías 12:10-12. El borrador español la menciona en decisiones internas, pero no la preserva en una nota del texto, con lo que se pierde una parte documentada del audit trail.
  - severity: low
    issue: La nota actual sobre «Mira» no corresponde a la alternativa más significativa del pasaje
    rationale: La variación «Look/Behold» es estilística y ya está resuelta de forma aceptable en español. La tensión semántica de γῆ sí afecta la interpretación y debe tener prioridad en la nota visible al lector.
  - severity: low
    issue: Puntuación mejorable antes de «y todas las tribus...»
    rationale: El punto y coma no es necesario y suena algo rígido en español moderno; una coma mantiene mejor la cadencia del original y la legibilidad.
  revised_spanish_text: ¡Mira!, viene con las nubes, y todo ojo lo verá, incluso los que lo traspasaron, y todas las tribus de la tierra[a] se lamentarán por él. Sí, amén.
  revised_footnotes:
  - marker: a
    text: O «del país». La frase puede evocar Zacarías 12:10-12, donde «país» o «tierra» puede ser contextualmente posible.
    reason: alternative_reading
  revision_rationale: 'Se conserva casi todo el texto del borrador, pero se reubica la nota al lugar donde el audit trail inglés preserva una alternativa exegéticamente relevante: τῆς γῆς. También se suaviza la puntuación para un español más natural. No se requiere adjudicación adicional, porque la corrección es menor y está claramente respaldada por la documentación inglesa y el griego.'
