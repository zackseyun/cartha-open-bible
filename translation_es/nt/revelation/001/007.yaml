translation:
  language: es
  text: ¡Mira!, viene con las nubes, y todo ojo lo verá, incluso los que lo traspasaron, y todas las tribus de la tierra[a] se lamentarán por él. Sí, amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del país». La frase puede evocar Zacarías 12:10-12, donde «país» o «tierra» puede ser contextualmente posible.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: ¡Mira[a]!
  alternatives_spanish:
  - ¡Mira!
  - ¡Miren!
  - ¡He aquí!
  lexicon: BDAG
  rationale: Sigue la función de llamada de atención inmediata del griego. «Mira» conserva la vivacidad de «Look» y resulta más natural en español actual que «He aquí» o «He aquí» en tono más arcaico.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está llegando
  - viene llegando
  lexicon: BDAG
  rationale: El presente griego tiene valor futuro/vívido. En español, «viene» transmite ese movimiento inminente con mayor naturalidad que un perífrasis demasiado pesada.
- source_word: μετὰ τῶν νεφελῶν
  english_pob_choice: with the clouds
  chosen_spanish: con las nubes
  alternatives_spanish:
  - entre las nubes
  - sobre las nubes
  - acompañado de las nubes
  lexicon: BDAG
  rationale: Mantiene la imaginería literal y el eco daniélico sin forzar una paráfrasis. «Con las nubes» reproduce la estructura básica del texto fuente.
- source_word: ὄψεται αὐτὸν πᾶς ὀφθαλμὸς
  english_pob_choice: every eye will see him
  chosen_spanish: todo ojo lo verá
  alternatives_spanish:
  - cada ojo lo verá
  - todos lo verán
  - toda persona lo verá
  lexicon: BDAG
  rationale: Conserva la concreción distributiva de «every eye» mediante «todo ojo», en lugar de abstraerla a «todos». «Lo verá» mantiene la referencia directa a Cristo.
- source_word: οἵτινες αὐτὸν ἐξεκέντησαν
  english_pob_choice: even those who pierced him
  chosen_spanish: incluso los que lo traspasaron
  alternatives_spanish:
  - aun los que lo hirieron con lanza
  - los que lo atravesaron
  - los que lo perforaron
  lexicon: BDAG
  rationale: «Traspasaron» preserva el vínculo intertextual con Zacarías 12:10 y Juan 19:37 mejor que una expansión interpretativa. «Inlcuso» refleja el matiz de inclusión del relativo.
- source_word: κόψονται ἐπ’ αὐτὸν
  english_pob_choice: will mourn over him
  chosen_spanish: se lamentarán por él
  alternatives_spanish:
  - harán duelo por él
  - llorarán por él
  - se dolerán de él
  lexicon: BDAG
  rationale: El verbo puede expresar duelo/lamento. «Se lamentarán» conserva la amplitud semántica sin reducirlo a una sola manifestación externa. «Por él» expresa adecuadamente la relación de causa/objeto del duelo en español.
- source_word: πᾶσαι αἱ φυλαὶ τῆς γῆς
  english_pob_choice: all the tribes of the earth
  chosen_spanish: todas las tribus de la tierra
  alternatives_spanish:
  - todas las tribus del país
  - todos los pueblos de la tierra
  - todas las tribus del mundo
  lexicon: BDAG
  rationale: '«Tribus» reproduce φυλαί con mayor precisión que «pueblos». «Tierra» mantiene la opción principal de alcance universal del audit trail en inglés, sin borrar la posible lectura contextual de «tierra/país». '
- source_word: ναί, ἀμήν
  english_pob_choice: Yes, amen
  chosen_spanish: Sí, amén
  alternatives_spanish:
  - Sí, amén.
  - Así es, amén
  - Ciertamente, amén
  lexicon: BDAG
  rationale: Conserva la doble afirmación enfática y la forma litúrgica de «amén» sin sustituirla por una glosa.
theological_decisions:
- issue: Alcance de πᾶσαι αἱ φυλαὶ τῆς γῆς
  english_pob_reading: Rendered as 'all the tribes of the earth' in the main text, while preserving 'land' as an acknowledged alternative in the audit trail.
  chosen_spanish_reading: todas las tribus de la tierra
  alternative_spanish_readings:
  - todas las tribus del país
  rationale: El contexto inmediato habla de una venida visible universalmente («todo ojo lo verá»), por lo que «tierra» comunica bien el alcance amplio. Sin embargo, el eco de Zacarías 12:10-12 deja abierta la posibilidad contextual de «tierra/país»; no se borra esa tensión, solo se deja documentada.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Valor de Ἰδοὺ en tono exhortativo
  english_pob_reading: Look
  chosen_spanish_reading: ¡Mira!
  alternative_spanish_readings:
  - ¡He aquí!
  - ¡Miren!
  rationale: No se trata de una simple introducción decorativa, sino de una llamada a prestar atención al anuncio profético. «¡Mira!» reproduce mejor ese impulso que una fórmula más estática.
  doctrine_reference: BDAG / discourse function in apocalyptic proclamation
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa y quedó sin cambios tras la última pasada; el español sigue esa lectura estable y conserva la nota de alternativa sobre τῆς γῆς sin resolverla de manera reductiva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita con κύριος que requiera decisión adicional.
  - Se conserva «tribus» para φυλαί y no se reemplaza por «pueblos», porque el término concreto está apoyado por el griego y por el audit trail en inglés.
  - Se usa «amén» sin traducir para preservar la fórmula litúrgica reconocible en español.
  - 'La puntuación sigue el orden y la fuerza retórica del griego: llamada, venida, visión universal, identificación de los que lo traspasaron, lamento universal y aclamación final.'
