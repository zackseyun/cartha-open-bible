translation:
  language: es
  text: Bienaventurado[a] el que lee en voz alta, y los que oyen las palabras de esta profecía y guardan lo que está escrito en ella[b], porque el tiempo está cerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que lee»; el griego probablemente alude al lector público en la asamblea, de ahí «lee en voz alta».
    reason: lexical_alternative
  - marker: b
    text: O «el tiempo señalado está cerca».
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: BDAG
  rationale: «Bienaventurado» conserva el tono de bienaventuranza y favor espiritual/covenantal que el contexto apocalíptico requiere; «feliz» sonaría demasiado psicológico y «dichoso» es posible pero menos natural en este registro.
- source_word: ὁ ἀναγινώσκων
  english_pob_choice: the one who reads aloud
  chosen_spanish: el que lee en voz alta
  alternatives_spanish:
  - el que lee
  - el lector
  lexicon: BDAG
  rationale: La forma singular sugiere al lector público de la asamblea; «en voz alta» explicita ese contexto oral sin sobreparafrasear. «El lector» sería válido, pero pierde la idea verbal del acto de lectura.
- source_word: οἱ ἀκούοντες
  english_pob_choice: those who hear
  chosen_spanish: los que oyen
  alternatives_spanish:
  - los que escuchan
  lexicon: BDAG
  rationale: «Oyen» preserva el sentido bíblico de recibir palabras proclamadas. «Escuchan» puede sonar más intencional, pero aquí el paralelo con la lectura pública favorece «oyen».
- source_word: τοὺς λόγους τῆς προφητείας
  english_pob_choice: the words of this prophecy
  chosen_spanish: las palabras de esta profecía
  alternatives_spanish:
  - las palabras de la profecía
  - el mensaje de esta profecía
  lexicon: BDAG
  rationale: «Palabras» mantiene λόγους con fuerza concreta y verbal; «esta» refleja la referencia al libro mismo. «Mensaje» diluye el sustantivo plural del original.
- source_word: τηροῦντες
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - observan
  - cumplen
  - guardan y obedecen
  lexicon: BDAG
  rationale: «Guardar» en español conserva la idea de mantener fielmente y obedecer lo escrito, sin reducirse a mera custodia. «Cumplen» sería más restrictivo y «observan» menos personal.
- source_word: τὰ ἐν αὐτῇ γεγραμμένα
  english_pob_choice: what is written in it
  chosen_spanish: lo que está escrito en ella
  alternatives_spanish:
  - las cosas escritas en ella
  - lo escrito en ella
  lexicon: BDAG
  rationale: La construcción neutra plural se vierte de manera idiomática en español con «lo que está escrito en ella», manteniendo naturalidad y el referente a la profecía/libro.
- source_word: ὁ γὰρ καιρὸς
  english_pob_choice: for the time
  chosen_spanish: porque el tiempo
  alternatives_spanish:
  - porque el tiempo señalado
  - porque el momento
  lexicon: BDAG
  rationale: «Porque el tiempo» conserva la sobriedad del texto y deja abierta la fuerza de καιρός sin imponer «señalado»; el contexto decide si el matiz es decisivo o simplemente cercano.
- source_word: ἐγγύς
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - está a la mano
  lexicon: BDAG
  rationale: «Está cerca» es claro y moderno, y preserva la inminencia temporal sin cargar el verso con una formulación más arcaica.
theological_decisions:
- issue: Lectura pública implícita por el singular y el plural
  english_pob_reading: Render ἀναγινώσκων as 'the one who reads aloud' to reflect likely congregational reading.
  chosen_spanish_reading: Traducir «el que lee en voz alta» para reflejar la probable lectura pública en la asamblea.
  alternative_spanish_readings:
  - «el que lee» sin explicitar la voz
  - «el lector»
  rationale: El contraste entre un lector singular y oyentes plurales sugiere una lectura proclamada. Explicitar «en voz alta» aclara el escenario histórico sin agregar doctrina.
  doctrine_reference: Translation philosophy §1, §6
- issue: La cercanía de καιρός ἐγγύς
  english_pob_reading: Translate straightforwardly as 'the time is near' without resolving debates about prophetic imminence or fulfillment chronology.
  chosen_spanish_reading: Traducir «porque el tiempo está cerca» sin fijar un esquema escatológico más preciso.
  alternative_spanish_readings:
  - «porque el tiempo señalado está cerca»
  - «porque el momento está cerca»
  rationale: El texto afirma cercanía, pero no define cómo se relaciona con cronologías proféticas. La traducción debe conservar esa tensión, no resolverla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia; no hubo revisiones aplicadas en la última pasada. La versión española sigue esa lectura estable y conserva las dos tensiones señaladas: la probable lectura pública y el matiz de καιρός/ἐγγύς sin especificarlo más allá de «el tiempo está cerca».'
  spanish_consistency_notes:
  - Se mantuvo «Bienaventurado» como término de bienaventuranza, coherente con el tono bíblico del pasaje.
  - Se usó «guardar» para τηρέω, que en español puede implicar fidelidad obediente, no solo custodia material.
  - «Esta profecía» y «en ella» preservan el referente interno al libro/profecía sin convertirlo en una generalidad.
  - El registro es sobrio y apto para lectura eclesial, evitando arcaísmos innecesarios.
