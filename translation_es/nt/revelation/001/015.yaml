translation:
  language: es
  text: y sus pies eran semejantes a bronce bruñido[a], como refinado en un horno, y su voz era como el sonido de muchas aguas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El raro término griego traducido «bronce bruñido» puede referirse a una aleación metálica muy refinada o resplandeciente; otras posibilidades incluyen «latón fino» o «bronce pulido».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «la voz de muchas aguas».
    reason: lexical_alternative
lexical_decisions:
- source_word: πόδες
  english_pob_choice: feet
  chosen_spanish: pies
  alternatives_spanish:
  - piernas
  - extremidades inferiores
  lexicon: BDAG
  rationale: πούς designa normalmente 'pie'; en español 'pies' conserva la equivalencia léxica directa y la imagen visionaria de la figura exaltada. 'Piernas' ampliaría indebidamente el referente.
- source_word: ὅμοιοι
  english_pob_choice: were like
  chosen_spanish: eran semejantes a
  alternatives_spanish:
  - eran como
  - se parecían a
  lexicon: BDAG
  rationale: ὅμοιος expresa semejanza. 'Eran semejantes a' mantiene el valor comparativo con un registro natural en español y evita convertir la comparación en una identidad.
- source_word: χαλκολιβάνῳ
  english_pob_choice: burnished bronze
  chosen_spanish: bronce bruñido
  alternatives_spanish:
  - bronce pulido
  - latón bruñido
  - bronce resplandeciente
  lexicon: BDAG
  rationale: χαλκολίβανον es un término raro y de referencia metalúrgica incierta, probablemente un metal o aleación brillante. 'Bronce bruñido' comunica la brillantez, el pulido y la dureza del material sin sobreespecificar la composición. 'Latón' sería menos seguro en un contexto bíblico y 'resplandeciente' diluiría la imagen material.
- source_word: ὡς ἐν καμίνῳ ⸀πεπυρωμένης
  english_pob_choice: as if refined in a furnace
  chosen_spanish: como refinado en un horno
  alternatives_spanish:
  - como si hubiera sido refinido en un horno
  - como encendido en un horno
  - como refinado en un horno de fundición
  lexicon: BDAG
  rationale: κάμινος es un horno, especialmente de fundición o refinación, y πεπυρωμένης comunica haber sido calentado/ardido por fuego. 'Como refinado en un horno' preserva la metáfora metalúrgica y sugiere el brillo resultante sin añadir elementos no explicitados. 'Como si' queda implícito en la comparación introducida por ὡς y no necesita duplicarse en español.
- source_word: φωνὴ
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - acento
  lexicon: BDAG
  rationale: En la primera ocurrencia, φωνή se refiere a la voz personal del personaje, por lo que 'voz' es la equivalencia directa y mantiene la referencia antropomórfica.
- source_word: ὡς φωνὴ ὑδάτων πολλῶν
  english_pob_choice: like the sound of many waters
  chosen_spanish: como la voz de muchas aguas
  alternatives_spanish:
  - como el sonido de muchas aguas
  - como el estruendo de muchas aguas
  - como la voz de muchas aguas
  lexicon: BDAG
  rationale: 'La repetición de φωνή permite una traducción formal y auditable: ''como la voz de muchas aguas''. Aunque el inglés POB opta por ''sound'' en la segunda ocurrencia para naturalidad, el español puede conservar la reiteración sin forzarla, y así preservar la ambigüedad entre ''voz'' y ''sonido'' documentada en la tradición textual y en el audit trail.'
theological_decisions:
- issue: Imagen del metal brillante y refinado
  english_pob_reading: burnished bronze, as if refined in a furnace
  chosen_spanish_reading: bronce bruñido, como refinado en un horno
  alternative_spanish_readings:
  - bronce pulido, como refinado en un horno
  - bronce bruñido, como fundido en un horno
  - latón bruñido, como refinado en un horno
  rationale: No se trata de una afirmación doctrinal sino de una imagen cristológica de majestad y pureza. Mantener el término material con el calificativo de brillo conserva la tensión semántica del raro χαλκολίβανον sin resolverla artificialmente hacia una aleación específica. La mención del horno preserva el trasfondo de refinación/fundición.
  doctrine_reference: Translation philosophy §3, preservar la tensión lexical; §6, claridad moderna sin sobreinterpretar
- issue: Repetición de φωνή en la comparación final
  english_pob_reading: his voice was like the sound of many waters
  chosen_spanish_reading: su voz era como la voz de muchas aguas
  alternative_spanish_readings:
  - su voz era como el sonido de muchas aguas
  - su voz era como el estruendo de muchas aguas
  rationale: El POB inglés registra una nota de alternativa más literal ('voice of many waters'). En español, mantener 'voz' en ambos miembros conserva el paralelo griego y no elimina la ambigüedad productiva entre voz y sonido. 'Estruendo' interpretaría demasiado la imagen y estrecharía su amplitud apocalíptica.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica; §6, legibilidad reverente
translation_notes:
  revision_awareness: 'Revisión según el último pase: no hubo cambios en el texto fuente ni en la decisión inglesa; el borrador español se alinea con el texto griego SBLGNT y con el audit trail inglés, manteniendo la imagen metalúrgica y la repetición de φωνή con una solución española publicable y transparente.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó 'Cristo' porque el versículo no contiene Χριστός; el referente es la figura visionaria del contexto inmediato.
  - Se conservó un registro solemne y bíblico sin arcaísmos innecesarios.
  - La nota de pie b preserva la alternativa formal explícita en el audit trail inglés, adaptada a la sintaxis española.
  - No se añadió puntuación interpretativa más allá de la comparación explícita del griego.
