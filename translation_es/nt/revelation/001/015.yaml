- from: y sus pies eran semejantes a bronce bruñido[a], como refinado en un horno, y su voz era como la voz de muchas aguas[b].
  to: y sus pies eran semejantes a bronce bruñido[a], como refinado en un horno, y su voz era como el sonido de muchas aguas[b].
  rationale: La revisión corrige la alineación con el audit trail inglés sin perder naturalidad en español. Se mantiene «bronce bruñido» como la mejor opción principal para χαλκολίβανον, pero la nota a ahora explica correctamente la rareza y alternativas del término. Se cambia la comparación final a «el sonido de muchas aguas» para reflejar la decisión principal documentada para la segunda φωνή, dejando «la voz de muchas aguas» como alternativa literal en la nota b. Esto mejora la fidelidad al expediente de traducción y elimina la confusión de notas invertidas o redundantes.
