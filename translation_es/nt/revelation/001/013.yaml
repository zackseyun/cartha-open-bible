    text: O, «uno semejante al Hijo del Hombre». La redacción griega evoca Daniel 7:13 y aquí se aplica al Jesús exaltado.
    reason: alternative_reading
  revision_rationale: 'Se conserva la estructura y la decisión teológica principal del borrador, pero se corrige la descripción de la vestimenta para representar con más fidelidad y naturalidad πρὸς τοῖς μαστοῖς ζώνην χρυσᾶν: «a la altura del pecho» precisa la ubicación, y «banda de oro» expresa mejor la imagen de una faja/sash alta sobre el torso que «cinturón». No se requiere adjudicación adicional.'
