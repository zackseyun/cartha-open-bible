review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega general: ubicación entre los λυχνίαι, figura «semejante a un hijo de hombre», vestidura hasta los pies y banda dorada en la parte alta del torso. También preserva correctamente en nota la alternativa cristológica tradicional. Sin embargo, dos elecciones no representan de la mejor manera las decisiones auditadas: «por el pecho» suena impreciso para πρὸς τοῖς μαστοῖς, y «cinturón de oro» debilita el matiz de ζώνην χρυσᾶν como faja/banda/sash alta sobre el pecho.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «uno semejante a un hijo de hombre» resulta algo poco idiomático; «uno semejante a un hijo humano» sería más natural, aunque el borrador actual sigue siendo entendible. La reparación más necesaria es estilístico-semántica en la indumentaria: «ceñido a la altura del pecho con una banda de oro» suena más natural y más fiel que «ceñido por el pecho con un cinturón de oro».'
  glossary_alignment: 'No hay conflictos con la terminología mayor del proyecto. «Candelabros» funciona para λυχνιῶν en este contexto visionario. La decisión de no titularizar «hijo de hombre» en el texto principal sí sigue la rationale inglesa, con la alternativa «el Hijo del Hombre» en nota. El punto a ajustar es léxico-contextual: para ζώνη aquí conviene «banda» o «faja», no «cinturón».'
  issues:
  - severity: medium
    issue: «por el pecho» traduce débilmente πρὸς τοῖς μαστοῖς
    rationale: La frase griega ubica la banda en la parte alta del torso; «por el pecho» suena poco preciso y menos natural que «a la altura del pecho» o «sobre el pecho».
  - severity: medium
    issue: «cinturón de oro» no refleja bien ζώνην χρυσᾶν en esta escena
    rationale: En combinación con la colocación alta en el torso, la imagen es la de una banda/faja/ceñidor, no la de un cinturón común en la cintura. «Banda de oro» preserva mejor el registro y el sentido.
  - severity: low
    issue: «uno semejante a un hijo de hombre» suena algo forzado en español
    rationale: Aunque refleja la anartrosis del griego, la expresión es menos idiomática. No obstante, puede mantenerse si se desea conservar muy de cerca la formulación auditada; por eso no se marca como cambio imprescindible.
  revised_spanish_text: y en medio de los candelabros[a], uno semejante a un hijo de hombre, vestido con una túnica que llegaba hasta los pies y ceñido a la altura del pecho con una banda de oro.
  revised_footnotes:
