translation:
  language: es
  text: y en medio de los candelabros[a], uno semejante a un hijo de hombre, vestido con una túnica que llegaba hasta los pies y ceñido a la altura del pecho con una banda de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «uno semejante al Hijo del Hombre». La redacción griega evoca Daniel 7:13 y aquí se aplica al Jesús exaltado.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν μέσῳ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en el medio de
  - en medio de
  lexicon: BDAG
  rationale: La construcción expresa ubicación espacial intermedia; «en medio de» es natural en español y conserva el sentido visionario del griego sin volverlo rígido.
- source_word: λυχνιῶν
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - lampadarios
  - soportes para lámparas
  lexicon: BDAG
  rationale: En español bíblico, «candelabros» comunica bien la imagen de los soportes de luz. «Lámparas» sería inexacto porque el sustantivo griego designa el soporte, no la llama o la lámpara misma.
- source_word: ὅμοιον υἱὸν ἀνθρώπου
  english_pob_choice: one like a son of man
  chosen_spanish: uno semejante a un hijo de hombre
  alternatives_spanish:
  - uno semejante al Hijo del Hombre
  - uno como un hijo de hombre
  lexicon: BDAG
  rationale: El griego carece de artículo antes de υἱὸν; por eso se conserva la forma anarthra con «un hijo de hombre». «Semejante» refleja ὅμοιον mejor que una identificación más cerrada en el texto principal.
- source_word: ἐνδεδυμένον
  english_pob_choice: clothed in
  chosen_spanish: vestido con
  alternatives_spanish:
  - clothed in
  - ataviado con
  lexicon: BDAG
  rationale: 'Participio de estado resultante: la figura aparece ya vestida. «Vestido con» es claro y digno en español.'
- source_word: ποδήρη
  english_pob_choice: a robe reaching to the feet
  chosen_spanish: una túnica que llegaba hasta los pies
  alternatives_spanish:
  - una túnica larga
  - un manto que llegaba hasta los pies
  lexicon: BDAG
  rationale: El adjetivo indica algo que llega a los pies. «Túnica» mantiene un registro bíblico comprensible; la ampliación explica la medida sin añadir más de lo que el griego dice.
- source_word: περιεζωσμένον
  english_pob_choice: girded
  chosen_spanish: ceñido
  alternatives_spanish:
  - ceñido
  - ajustado
  lexicon: BDAG
  rationale: «Ceñido» conserva el campo semántico de cinturón/ceñidor y el tono elevado de la escena.
- source_word: πρὸς τοῖς μαστοῖς
  english_pob_choice: across the chest
  chosen_spanish: por el pecho
  alternatives_spanish:
  - a la altura del pecho
  - sobre el pecho
  lexicon: BDAG
  rationale: La preposición y el dativo sitúan el cinturón en la parte superior del torso. «Por el pecho» es una solución sobria y natural en español; evita una literalidad anatómica innecesariamente abrupta.
- source_word: ζώνην χρυσᾶν
  english_pob_choice: with a golden sash
  chosen_spanish: con un cinturón de oro
  alternatives_spanish:
  - con una banda de oro
  - con un cinturón dorado
  lexicon: BDAG
  rationale: ζώνη puede ser cinturón o faja/ceñidor. «Cinturón» es la opción más transparente para lectores actuales; «de oro» refleja χρυσᾶν sin forzar el adjetivo «dorado».
theological_decisions:
- issue: Lectura cristológica de ὅμοιον υἱὸν ἀνθρώπου
  english_pob_reading: Render the phrase as 'one like a son of man' in the main text while preserving the traditional titular reading in a footnote.
  chosen_spanish_reading: Mantener «uno semejante a un hijo de hombre» en el texto principal y preservar en nota la lectura tradicional «el Hijo del Hombre».
  alternative_spanish_readings:
  - uno semejante al Hijo del Hombre
  - el Hijo del Hombre
  rationale: La sintaxis griega es anarthra, y el texto principal debe reflejarla sin sobrerprecisar el título. A la vez, el contexto apocalíptico y la alusión a Daniel 7 justifican conservar en nota la identificación cristológica tradicional con Jesús exaltado.
  doctrine_reference: Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado más reciente del POB inglés, sin cambios revisionales reportados, y conserva su decisión central sobre la frase cristológica anártrica, trasladándola al español con una nota equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero aquí no aparece el nombre divino explícito.
  - Se eligió «candelabros» para λυχνιῶν por consistencia con la imaginería del Apocalipsis y para evitar la confusión con la luz misma.
  - «Cinturón de oro» equilibra naturalidad y fidelidad; no se sustituye por «faja» porque en español puede sonar menos transparente para lectores generales.
