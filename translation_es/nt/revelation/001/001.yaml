    changes_summary: 'Removed the added introductory words ''This is''; changed ''Jesus Messiah'' to the more standard ''Jesus Christ''; changed ''slaves'' to ''servants'' for natural formal register; rendered ἐσήμανεν as ''made it known'' rather than ''signified'' for clearer English while preserving meaning. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy), slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: La revelación de Jesús Mesías[a], que Dios le dio para mostrar a sus esclavos lo que debe suceder pronto[b], y la comunicó por señales[c] al enviarla por medio de su ángel a su esclavo Juan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la revelación proveniente de Jesús Mesías» o «la revelación acerca de Jesús Mesías». El genitivo griego puede entenderse de más de una manera.
    reason: alternative_reading
  - marker: b
    text: O «rápidamente». La expresión puede significar tanto que estas cosas ocurrirán pronto como que ocurrirán con rapidez una vez que comiencen.
    reason: lexical_alternative
  - marker: c
    text: O «la dio a conocer». El verbo también puede traducirse «la hizo saber»; «la comunicó por señales» conserva el matiz de comunicación por señales, acorde con el carácter simbólico del libro.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκάλυψις
  english_pob_choice: revelation
  chosen_spanish: revelación
  alternatives_spanish:
  - desvelamiento
  - disclosure
  lexicon: BDAG
  rationale: «Revelación» es el equivalente natural en español y conserva el carácter de apertura de lo oculto sin forzar el sentido.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - el Mesías Jesús
  lexicon: BDAG
  rationale: Se conserva Χριστός como «Mesías» según la guía del proyecto para el título, manteniendo también la relación genitiva sin resolverla excesivamente.
- source_word: τοῖς δούλοις αὐτοῦ
  english_pob_choice: his slaves
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: BDAG
  rationale: Se mantiene la fuerza de δοῦλος con «esclavos», como en el audit trail inglés, para preservar la relación de pertenencia y dependencia.
- source_word: ἃ δεῖ γενέσθαι
  english_pob_choice: what must happen
  chosen_spanish: lo que debe suceder
  alternatives_spanish:
  - lo que tiene que ocurrir
  - las cosas que deben suceder
  lexicon: BDAG
  rationale: La formulación española recoge el valor impersonal de δεῖ y el carácter idiomático del relativo neutro plural sin sobrecargar la frase.
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - en breve
  lexicon: BDAG
  rationale: «Pronto» expresa bien la cercanía temporal. Se deja abierta la posible idea de rapidez de ejecución que el inglés nota en su nota alternativa.
- source_word: ἐσήμανεν
  english_pob_choice: signified it
  chosen_spanish: la dio a conocer
  alternatives_spanish:
  - la significó
  - la señaló
  lexicon: BDAG
  rationale: En español, «dio a conocer» comunica el valor de hacer saber algo, y evita un calco opaco. La dimensión de comunicación indirecta y simbólica sigue indicada en la nota.
- source_word: ἀποστείλας διὰ τοῦ ἀγγέλου αὐτοῦ
  english_pob_choice: by sending it through his angel
  chosen_spanish: enviándola por medio de su ángel
  alternatives_spanish:
  - mandándola por medio de su ángel
  - por medio de su ángel, al enviarla
  lexicon: BDAG
  rationale: El participio aoristo se vierte de manera instrumental y natural en español; «por medio de» expresa el διά con genitivo como intermediación.
- source_word: τῷ δούλῳ αὐτοῦ Ἰωάννῃ
  english_pob_choice: to his slave John
  chosen_spanish: a su esclavo Juan
  alternatives_spanish:
  - a su siervo Juan
  - a Juan, su esclavo
  lexicon: BDAG
  rationale: Se conserva la misma decisión léxica para δοῦλος y el dativo de destinatario con una construcción española natural.
theological_decisions:
- issue: Genitivo en Ἀποκάλυψις Ἰησοῦ Χριστοῦ
  english_pob_reading: The revelation of Jesus Messiah
  chosen_spanish_reading: La revelación de Jesús Mesías
  alternative_spanish_readings:
  - La revelación de parte de Jesús Mesías
  - La revelación acerca de Jesús Mesías
  rationale: El genitivo griego admite varias relaciones; mantener «de» preserva la tensión sin resolverla en exceso, en línea con el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Uso de δοῦλος para los destinatarios y para Juan
  english_pob_reading: his slaves / his slave John
  chosen_spanish_reading: sus esclavos / su esclavo Juan
  alternative_spanish_readings:
  - sus siervos / su siervo Juan
  - sus servidores / su servidor Juan
  rationale: Se mantiene la fuerza relacional y de pertenencia del término, coherente con la política del proyecto y con la decisión inglesa documentada.
  doctrine_reference: Contested terms table for δοῦλος; Translation philosophy §1.
- issue: Valor de ἐσήμανεν en el contexto apocalíptico
  english_pob_reading: made it known / signified it
  chosen_spanish_reading: la dio a conocer
  alternative_spanish_readings:
  - la significó
  - la hizo conocer
  rationale: «Dio a conocer» es idiomático en español y preserva el acto de comunicar; el matiz de mediación simbólica queda compatible con la nota léxica.
  doctrine_reference: 'Translation philosophy §2: Preserve lexical nuance without obscuring readability.'
translation_notes:
  revision_awareness: El texto inglés más reciente había normalizado Χριστός como «Christ» y δοῦλος como «servants», pero el expediente de revisión posterior restauró «Messiah» y «slaves» conforme a la política doctrinal. La versión española sigue esa restauración y evita una suavización tradicionalista; además, opta por una formulación natural para ἐσήμανεν sin perder el matiz apocalíptico.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός por consistencia con la guía del proyecto y con el estado corregido del audit trail.
  - Se mantiene «esclavos/esclavo» para δοῦλος en ambos casos.
  - «La dio a conocer» evita calco de «signified» pero conserva la función comunicativa del verbo.
  - La puntuación sigue el flujo del griego y del registro editorial del POB, con una sola oración coordinada.
  - La nota [a] preserva la ambigüedad del genitivo; [b] preserva la ambigüedad de ἐν τάχει; [c] preserva la alternativa léxica de ἐσήμανεν.
