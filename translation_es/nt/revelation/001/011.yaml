translation:
  language: es
  text: 'diciendo: «Lo que ves, escribe en un libro[a] y envíalo a las siete iglesias: a Éfeso y a Esmirna y a Pérgamo[b] y a Tiatira y a Sardis y a Filadelfia y a Laodicea».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un rollo»; βιβλίον puede referirse a un rollo o a un libro/documento escrito.
    reason: lexical_alternative
  - marker: b
    text: «Pérgamo» es la transliteración moderna estándar; algunas versiones antiguas usan «Pergamos».
    reason: alternative_reading
lexical_decisions:
- source_word: λεγούσης
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo con una voz
  - la cual decía
  lexicon: BDAG
  rationale: El participio presente femenino genitivo continúa la descripción de la voz del contexto previo. «Diciendo» conserva esa relación verbal introductoria sin añadir contenido que el griego aquí no explicita.
- source_word: Ὃ βλέπεις
  english_pob_choice: What you see
  chosen_spanish: Lo que ves
  alternatives_spanish:
  - Lo que estás viendo
  - Aquello que ves
  lexicon: BDAG
  rationale: El relativo neutro con el presente se expresa con naturalidad en español como «Lo que ves». Mantiene el alcance general de la visión sin volverlo más pesado con una paráfrasis.
- source_word: γράψον
  english_pob_choice: write
  chosen_spanish: escribe
  alternatives_spanish:
  - anota
  - registra
  lexicon: BDAG
  rationale: El imperativo aoristo pide una orden directa; «escribe» es la equivalencia más inmediata y natural.
- source_word: εἰς βιβλίον
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en un rollo
  - en un documento
  lexicon: BDAG
  rationale: «Βιβλίον» puede referirse a libro, rollo o documento escrito. En el texto principal, «libro» funciona bien en español actual; la alternativa histórica «rollo» queda preservada en nota.
- source_word: πέμψον
  english_pob_choice: send it
  chosen_spanish: envíalo
  alternatives_spanish:
  - envía eso
  - mándalo
  lexicon: BDAG
  rationale: El imperativo aoristo de πέμπω requiere un objeto implícito; en español se recupera naturalmente como «envíalo», refiriéndose a lo que acaba de ordenarse escribir.
- source_word: ταῖς ἑπτὰ ἐκκλησίαις
  english_pob_choice: to the seven churches
  chosen_spanish: a las siete iglesias
  alternatives_spanish:
  - a las siete asambleas
  lexicon: BDAG
  rationale: «Ἐκκλησίαις» designa congregaciones cristianas concretas. «Iglesias» comunica con claridad el referente eclesial en español sin perder la concreción histórica.
- source_word: εἰς Ἔφεσον ... εἰς Λαοδίκειαν
  english_pob_choice: to Ephesus and to Smyrna and to Pergamum and to Thyatira and to Sardis and to Philadelphia and to Laodicea
  chosen_spanish: a Éfeso, y a Esmirna, y a Pérgamo, y a Tiatira, y a Sardis, y a Filadelfia, y a Laodicea
  alternatives_spanish:
  - para Éfeso ... Laodicea
  lexicon: BDAG
  rationale: La repetición de εἰς antes de cada ciudad se reproduce con «a» repetido para conservar el valor distributivo y la cadencia del griego. «Pérgamo» sigue la transliteración moderna estándar.
theological_decisions:
- issue: Naturaleza de ἐκκλησίαις en Apocalipsis 1:11
  english_pob_reading: churches
  chosen_spanish_reading: iglesias
  alternative_spanish_readings:
  - asambleas
  rationale: El término apunta a congregaciones cristianas concretas dirigidas por el mensaje de Jesús a través de Juan. «Iglesias» transmite ese referente eclesial de forma natural en español y evita una abstracción innecesaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El contexto auditado en inglés no registra revisiones sustantivas; la frase final coincide plenamente en sentido con el texto griego y con la decisión inglesa de preservar la repetición distributiva de las ciudades.
  spanish_consistency_notes:
  - Se mantiene «Dios» y «Jesús» según los valores base del proyecto, aunque no aparecen en este versículo.
  - Se usa «iglesias» por ser el equivalente eclesial natural de ἐκκλησίαις en este contexto apocalíptico.
  - La repetición de «a» antes de cada ciudad conserva el énfasis distributivo del original.
