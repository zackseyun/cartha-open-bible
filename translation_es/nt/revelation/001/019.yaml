translation:
  language: es
  text: Por tanto, escribe lo que has visto[a], lo que es y lo que está a punto de suceder después de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que sucederá después de estas cosas». El verbo puede funcionar en algunos contextos casi como un futuro simple, aunque a menudo conserva la idea de lo que está por ocurrir.'
    reason: alternative_reading
lexical_decisions:
- source_word: γράψον
  english_pob_choice: write
  chosen_spanish: escribe
  alternatives_spanish:
  - anota
  - escribe por extenso
  lexicon: BDAG
  rationale: El imperativo aoristo de segunda persona singular pide una orden directa; «escribe» conserva la fuerza simple y natural del mandato sin añadir matiz interpretativo.
- source_word: οὖν
  english_pob_choice: therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG
  rationale: Conserva la relación inferencial o consecutiva con la visión anterior. «Por lo tanto» es claro en español y mantiene mejor el valor conectivo que una opción más suelta.
- source_word: ἃ εἶδες
  english_pob_choice: what you have seen
  chosen_spanish: lo que has visto
  alternatives_spanish:
  - las cosas que viste
  - lo que viste
  lexicon: BDAG
  rationale: El relativo neutro plural se vuelve más idiomático en español como «lo que». El pretérito compuesto reproduce bien el valor de experiencia ya vista y sigue la elección inglesa de no reducirlo a un simple pasado aislado.
- source_word: ἃ εἰσὶν
  english_pob_choice: what is
  chosen_spanish: lo que es
  alternatives_spanish:
  - las cosas que son
  - lo que existe ahora
  lexicon: BDAG
  rationale: El griego neutro plural con verbo plural se expresa de manera colectiva y natural como «lo que es», preservando la referencia a realidades presentes sin volver la frase pesada.
- source_word: μέλλει γίνεσθαι
  english_pob_choice: is about to happen
  chosen_spanish: está a punto de suceder
  alternatives_spanish:
  - va a suceder
  - sucederá
  lexicon: BDAG
  rationale: μέλλω con infinitivo suele indicar inminencia. «Está a punto de suceder» conserva esa tensión de cercanía mejor que un futuro simple, sin resolver más de lo que el texto dice.
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de esto
  - luego de estas cosas
  lexicon: BDAG
  rationale: La expresión temporal refleja con fidelidad el plural demostrativo y la fórmula repetida en Apocalipsis. Se mantiene la literalidad suficiente para el patrón literario del libro.
theological_decisions:
- issue: Fuerza temporal de μέλλω en contexto apocalíptico
  english_pob_reading: 'Render with imminence: ''is about to happen'''
  chosen_spanish_reading: «está a punto de suceder»
  alternative_spanish_readings:
  - «sucederá»
  - «va a suceder»
  rationale: La lectura española preserva la inminencia sin convertirla en un futuro indiferenciado. Así se mantiene la tensión escatológica del texto y se evita resolver debates doctrinales no explicitados por la frase.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'Se sigue de cerca la decisión auditada en inglés: mantener la inferencia de οὖν, conservar el valor colectivo de los neutros relativos y traducir μέλλει γίνεσθαι con inminencia, no como futuro liso. No se reportan revisiones aplicadas en el expediente inglés.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; este versículo no contiene términos divinos explícitos.
  - Se mantiene un registro sobrio y público, sin arcaísmos innecesarios.
  - La nota de pie refleja la alternativa temporal ya documentada en el audit trail inglés.
