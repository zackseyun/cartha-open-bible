revisions:
- from: Su cabeza y su cabello eran blancos[a], como lana blanca, como nieve; y sus ojos eran como una llama de fuego[b].
  to: Su cabeza y cabello eran blancos[a], como lana blanca, como nieve, y sus ojos eran como una llama de fuego[b].
