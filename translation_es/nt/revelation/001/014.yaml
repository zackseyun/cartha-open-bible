translation:
  language: es
  text: Su cabeza y cabello eran blancos[a], como lana blanca, como nieve, y sus ojos eran como una llama de fuego[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «y su cabeza y su cabello eran blancos como lana blanca, como nieve».'
    reason: alternative_reading
  - marker: b
    text: La imagen evoca Daniel 7:9 y subraya el carácter visionario de la descripción.
    reason: cross_reference
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: y
  alternatives_spanish:
  - ahora
  - entonces
  lexicon: BDAG
  rationale: En español, la partícula funciona mejor como simple continuidad narrativa dentro de la visión; 'y' evita forzar un matiz temporal que el griego aquí no exige.
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - cabeza
  - parte superior de la cabeza
  lexicon: BDAG
  rationale: Término anatómico directo, adecuado para la descripción visionaria y natural en español.
- source_word: τρίχες
  english_pob_choice: hair
  chosen_spanish: cabello
  alternatives_spanish:
  - cabello
  - cabellos
  - pelo
  lexicon: BDAG
  rationale: En español, 'cabello' expresa de manera más natural el conjunto del pelo de la cabeza; evita el plural literal 'cabellos' salvo cuando el contexto lo requiera.
- source_word: λευκαὶ
  english_pob_choice: white
  chosen_spanish: blancos
  alternatives_spanish:
  - blancos
  - resplandecientes
  - brillantes
  lexicon: BDAG
  rationale: Conserva el color básico y la repetición enfática de la blancura sin añadir interpretación.
- source_word: ὡς ἔριον λευκόν
  english_pob_choice: like white wool
  chosen_spanish: como lana blanca
  alternatives_spanish:
  - como lana blanca
  - como lana, blanca
  lexicon: BDAG
  rationale: '''Lana blanca'' reproduce de forma natural la comparación y mantiene unido el adjetivo al sustantivo, como en el griego.'
- source_word: ὡς χιών
  english_pob_choice: like snow
  chosen_spanish: como nieve
  alternatives_spanish:
  - como nieve
  - como la nieve
  lexicon: BDAG
  rationale: '''Nieve'' es la equivalencia idiomática natural en español y preserva la segunda comparación acumulativa.'
- source_word: ὀφθαλμοί
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - ojos
  lexicon: BDAG
  rationale: Término anatómico estándar; no requiere expansión.
- source_word: ὡς φλὸξ πυρός
  english_pob_choice: like a flame of fire
  chosen_spanish: como una llama de fuego
  alternatives_spanish:
  - como una llama de fuego
  - como llama de fuego
  - como una llama ígnea
  lexicon: BDAG
  rationale: Conserva la imagen apocalíptica con una construcción española natural. 'Llama de fuego' refleja el genitivo sin suavizar la fuerza visual de la expresión.
theological_decisions:
- issue: Imagen visionaria del Hijo del Hombre exaltado
  english_pob_reading: Retain the imagery literally in translation without interpreting its symbolism in the main text.
  chosen_spanish_reading: Conservar la imaginería literalmente en el texto principal, sin explicar su simbolismo allí.
  alternative_spanish_readings:
  - Introducir una explicación sobre pureza, eternidad o juicio en el texto principal
  - Parafrasear la imagen para hacerla más explícitamente doctrinal
  rationale: El versículo presenta comparaciones visionarias, no una glosa doctrinal. Mantenerlas abiertas preserva la tensión teológica y deja espacio para la interpretación canónica sin imponerla en la traducción.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente del contexto inglés no introdujo cambios; el borrador español sigue la lectura aprobada y conserva la imaginería sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa 'cabello' para la coletividad natural de τρίχες en español, en línea con la opción inglesa 'hair'.
  - 'Se preserva la secuencia acumulativa de blancura: ''blancos, como lana blanca, como nieve''.'
  - Se mantiene 'llama de fuego' para reflejar la fuerza apocalíptica del genitivo griego sin volverla paráfrasis.
