review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el contenido griego: cabeza/cabello blancos como lana blanca, como nieve, y ojos como llama de fuego. También conserva correctamente el carácter visionario sin interpretación añadida. Sin embargo, añade el posesivo repetido ''su cabello'', que no es necesario en español y hace la frase un poco más pesada que el griego y que la alternativa documentada; además, el punto y coma divide innecesariamente una serie descriptiva que en el original va con simple continuación.'
  spanish_quality_summary: El español es claro y digno, pero puede sonar más natural y cercano al ritmo del original con 'Su cabeza y cabello eran blancos[a]...' y con coma antes de la última cláusula en lugar de punto y coma. La nota [a] debe pulirse para español natural y con formulación consistente.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los términos clave están bien: ''cabeza'', ''cabello'', ''blancos'', ''lana blanca'', ''nieve'', ''ojos'', ''llama de fuego''. Se mantiene la imaginería literal conforme a la decisión teológica auditada.'
  issues:
  - severity: medium
    issue: Repetición innecesaria del posesivo en 'Su cabeza y su cabello'
    rationale: El griego tiene un solo posesivo αὐτοῦ que modifica la expresión coordinada; en español, repetir 'su' no es incorrecto, pero resulta más pesado y menos elegante que 'Su cabeza y cabello'.
  - severity: low
    issue: Puntuación con punto y coma antes de 'y sus ojos'
    rationale: El original encadena la descripción con comas y coordinación simple. En español, una coma mantiene mejor el flujo visionario y evita una pausa demasiado fuerte.
  - severity: low
    issue: Redacción de la nota [a] poco natural
    rationale: 'La formulación actual con comillas y prefijo ''O:'' es entendible, pero puede expresarse de forma más limpia: ''O bien: ...''.'
  revised_spanish_text: Su cabeza y cabello eran blancos[a], como lana blanca, como nieve, y sus ojos eran como una llama de fuego[b].
  revised_footnotes:
  - marker: a
    text: 'O bien: «y su cabeza y su cabello eran blancos como lana blanca, como nieve».'
    reason: alternative_reading
  - marker: b
    text: La imagen evoca Daniel 7:9 y subraya el carácter visionario de la descripción.
    reason: cross_reference
