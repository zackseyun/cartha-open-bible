translation:
  language: es
  text: 'Juan, a las siete iglesias que están en Asia: Gracia a ustedes y paz de parte del que es[a] y que era y que viene, y de parte de los siete espíritus que están delante de su trono[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «del que es y que era y que ha de venir».
    reason: lexical_alternative
  - marker: b
    text: «Los siete espíritus» puede referirse simbólicamente a la plenitud del Espíritu Santo, o a siete espíritus celestiales; el texto griego dice literalmente «siete espíritus».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johan
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio de forma natural y reconocible en español bíblico. 'Juan' es el equivalente estándar de Ἰωάννης.
- source_word: ταῖς ἑπτὰ ἐκκλησίαις
  english_pob_choice: to the seven churches
  chosen_spanish: a las siete iglesias
  alternatives_spanish:
  - a las siete asambleas
  lexicon: BDAG
  rationale: ἐκκλησία puede significar 'asamblea' o 'iglesia'; en el contexto epistolar cristiano de Apocalipsis, 'iglesias' comunica mejor el destinatario eclesial sin perder el sentido de reunión local.
- source_word: ἐν τῇ Ἀσίᾳ
  english_pob_choice: in Asia
  chosen_spanish: que están en Asia
  alternatives_spanish:
  - en Asia
  - en la provincia de Asia
  lexicon: BDAG
  rationale: Se conserva la referencia geográfica del texto griego. 'Que están en Asia' suena natural en español y evita una calca demasiado rígida; la lectura provincial queda implícita en el contexto histórico.
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  english_pob_choice: Grace to you and peace
  chosen_spanish: Gracia a ustedes y paz
  alternatives_spanish:
  - Gracia y paz a ustedes
  - Gracia para ustedes y paz
  lexicon: BDAG
  rationale: Se mantiene la fórmula epistolar de bendición. 'A ustedes' expresa claramente el dativo ὑμῖν en un español fluido y reverente.
- source_word: ἀπὸ ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος
  english_pob_choice: from him who is and who was and who is coming
  chosen_spanish: de parte del que es y que era y que viene
  alternatives_spanish:
  - de parte del que es, y que era, y que viene
  - de parte del que es y que era y que está por venir
  lexicon: BDAG
  rationale: Se preserva el título divino sin suavizar su fuerza. 'Que viene' conserva el participio presente ὁ ἐρχόμενος mejor que una fórmula más tradicional y futura; 'de parte del' comunica bien ἀπό en un saludo epistolar.
- source_word: τῶν ἑπτὰ πνευμάτων
  english_pob_choice: the seven spirits
  chosen_spanish: los siete espíritus
  alternatives_spanish:
  - el Espíritu de siete aspectos
  - los siete vientos
  lexicon: BDAG
  rationale: Se conserva el plural literal del griego, como en la POB inglesa, para no resolver interpretivamente una frase debatida. 'Espíritus' mantiene la tensión teológica y textual.
- source_word: ἃ ἐνώπιον τοῦ θρόνου αὐτοῦ
  english_pob_choice: who are before his throne
  chosen_spanish: que están delante de su trono
  alternatives_spanish:
  - que están ante su trono
  - que están frente a su trono
  lexicon: BDAG
  rationale: El relativo neutro plural se traduce de modo natural en español con 'que están'. 'Delante de' refleja bien la preposición de ubicación y su tono reverente.
theological_decisions:
- issue: Identidad del que es, que era y que viene
  english_pob_reading: A divine title for God, expressed personally as 'him who is, and who was, and who is coming.'
  chosen_spanish_reading: Un título divino de Dios, expresado como 'del que es y que era y que viene'.
  alternative_spanish_readings:
  - del que es y que era y que está por venir
  - del que es, el que era y el que viene
  rationale: Se mantiene el carácter titular y solemne del griego, sin convertirlo en una mera descripción temporal. La elección 'que viene' conserva la fuerza del participio presente y la continuidad con la POB inglesa.
  doctrine_reference: Afirmaciones; filosofía de traducción §1, §3
- issue: Identidad de los siete espíritus
  english_pob_reading: Retain the literal phrase 'the seven spirits' in the main text.
  chosen_spanish_reading: Retener la frase literal 'los siete espíritus' en el texto principal.
  alternative_spanish_readings:
  - una referencia simbólica a la plenitud del Espíritu Santo
  - siete espíritus angelicales delante del trono de Dios
  rationale: La expresión es debatida y el griego dice literalmente 'siete espíritus'. Se conserva la tensión teológica en el texto principal y se deja constancia de lecturas alternativas en nota.
  doctrine_reference: Filosofía de traducción §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que simplificó la puntuación interna de las cláusulas relativas y mantuvo sin cambios las decisiones léxicas principales. Se refleja esa fluidez en español sin introducir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se conserva 'Juan' como nombre propio estándar, coherente con la transliteración bíblica habitual en español.
  - Se usa 'iglesias' en vez de 'asambleas' siguiendo el valor eclesial contextual de ἐκκλησία.
  - '''Gracia ... y paz'' mantiene la fórmula epistolar tradicional y auditable.'
  - '''De parte del'' traduce adecuadamente ἀπό en contexto de procedencia/origen en un saludo.'
  - Se preserva 'los siete espíritus' para no eliminar la ambigüedad textual y teológica.
  - La puntuación usa dos puntos tras 'Asia' para reflejar el saludo epistolar y comas ligeras para la cadencia del griego.
