translation:
  language: es
  text: 'En cuanto al misterio de las siete estrellas que viste en mi mano derecha, y los siete candelabros de oro: las siete estrellas son los ángeles[a] de las siete iglesias, y los siete candelabros son las siete iglesias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajeros de las siete iglesias». El griego puede referirse tanto a ángeles como a mensajeros humanos.
    reason: alternative_reading
lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  - sentido simbólico
  lexicon: BDAG
  rationale: Se conserva el término apocalíptico y teológico básico. 'Misterio' mantiene la resonancia bíblica del griego sin reducirlo a una mera explicación simbólica.
- source_word: ἀστέρων / ἀστέρες
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - astros
  lexicon: BDAG
  rationale: Es la correspondencia directa y natural en español para el símbolo visual de la visión.
- source_word: οὓς εἶδες
  english_pob_choice: that you saw
  chosen_spanish: que viste
  alternatives_spanish:
  - las cuales viste
  lexicon: BDAG
  rationale: '''Que viste'' suena natural en español y conserva la cláusula relativa que modifica a ''estrellas''.'
- source_word: ἐπὶ τῆς δεξιᾶς μου
  english_pob_choice: in my right hand
  chosen_spanish: en mi mano derecha
  alternatives_spanish:
  - a mi diestra
  - en mi diestra
  lexicon: BDAG
  rationale: La imagen visionaria en español se comunica con claridad como 'en mi mano derecha'; evita una construcción menos natural sin perder la referencia espacial.
- source_word: λυχνίας
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - lampadarios
  - soportes para lámparas
  lexicon: BDAG
  rationale: '''λυχνία'' designa el soporte/candelabro, no la lámpara. ''Candelabros'' comunica la imagen de forma clara y readable en español eclesial.'
- source_word: χρυσᾶς
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro puro
  lexicon: BDAG
  rationale: '''De oro'' expresa bien el adjetivo sin añadir matiz material no explicitado por el texto.'
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: Se mantiene la lectura principal del audit trail. El término griego admite 'mensajeros', pero el contexto de Apocalipsis permite conservar 'ángeles' en el texto principal y reservar la alternativa para nota.
- source_word: ἐκκλησιῶν / ἐκκλησίαι
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - asambleas
  - congregaciones
  lexicon: BDAG
  rationale: '''Iglesias'' es la forma habitual y contextual para las comunidades destinatarias en Apocalipsis, y resulta idiomática en español eclesial.'
- source_word: τὸ μυστήριον ... καὶ ...
  english_pob_choice: 'As for the mystery of ... and ...:'
  chosen_spanish: 'En cuanto al misterio de ... y ...:'
  alternatives_spanish:
  - 'El misterio de ... y ... es este:'
  lexicon: BDAG
  rationale: '''En cuanto a...'' reproduce bien la función discursiva de introducir la explicación del símbolo, sin agregar contenido ajeno al griego.'
theological_decisions:
- issue: Referente de ἄγγελοι τῶν ἑπτὰ ἐκκλησιῶν
  english_pob_reading: angels of the seven churches
  chosen_spanish_reading: ángeles de las siete iglesias
  alternative_spanish_readings:
  - mensajeros de las siete iglesias
  rationale: Se conserva la lectura principal del audit trail porque el texto griego no especifica si se trata de seres celestiales o mensajeros humanos. Mantener 'ángeles' en el texto principal preserva la tensión interpretativa; la alternativa queda disponible en nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés. No se introdujeron revisiones previas; se mantiene la ambigüedad de ἄγγελοι con nota alternativa, y se evita traducir mecánicamente desde el inglés cuando el español exige una formulación más natural.
  spanish_consistency_notes:
  - Se usa 'misterio' para μυστήριον, coherente con el valor apocalíptico del término.
  - Se mantiene 'ángeles' en el cuerpo del texto y 'mensajeros' en nota para no borrar la ambigüedad léxica.
  - '''Candelabros'' traduce λυχνίαι como soporte de luz, no como ''lámparas''.'
  - Se usa 'iglesias' para ἐκκλησίαι en coherencia con el contexto destinatario de Apocalipsis.
