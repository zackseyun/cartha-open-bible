    text: O «mensajeros de las siete iglesias». El griego puede referirse tanto a ángeles como a mensajeros humanos.
    reason: alternative_reading
  revision_rationale: Se elimina el segundo «de» para reflejar mejor la coordinación griega y la formulación del POB inglés. También se mueve la nota al término «ángeles», que es donde pertenece la alternativa léxica «mensajeros»; en el borrador estaba anclada erróneamente a «mano derecha».
