revisions:
- from: 'En cuanto al misterio de las siete estrellas que viste en mi mano derecha[a], y de los siete candelabros de oro: las siete estrellas son los ángeles de las siete iglesias, y los siete candelabros son las siete iglesias.'
  to: 'En cuanto al misterio de las siete estrellas que viste en mi mano derecha, y los siete candelabros de oro: las siete estrellas son los ángeles[a] de las siete iglesias, y los siete candelabros son las siete iglesias.'
  rationale: Se elimina el segundo «de» para reflejar mejor la coordinación griega y la formulación del POB inglés. También se mueve la nota al término «ángeles», que es donde pertenece la alternativa léxica «mensajeros»; en el borrador estaba anclada erróneamente a «mano derecha».
