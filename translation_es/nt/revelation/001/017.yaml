revisions:
- from: 'Y cuando lo vi[a], caí a sus pies como muerto. Y puso su diestra sobre mí, diciendo: «No temas[b]. Yo soy el Primero y el Último»'
  to: 'Y cuando lo vi[a], caí a sus pies como muerto. Y puso su mano derecha sobre mí, diciendo: «No temas[b]. Yo soy el Primero y el Último»,'
  rationale: Se ajusta «diestra» a «mano derecha» para lograr un español más natural y ampliamente legible sin perder el sentido literal ni el simbolismo del griego. También se repone la coma final para reflejar la continuidad sintáctica del original y del texto auditado en inglés. Las notas existentes se conservan porque representan fielmente las alternativas documentadas.
