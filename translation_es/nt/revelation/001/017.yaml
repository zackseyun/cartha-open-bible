translation:
  language: es
  text: 'Y cuando lo vi[a], caí a sus pies como muerto. Y puso su mano derecha sobre mí, diciendo: «No temas[b]. Yo soy el Primero y el Último»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «como si estuviera muerto».
    reason: alternative_reading
  - marker: b
    text: O, «No tengas miedo».
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ ὅτε
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Cuando
  - Y al ver
  lexicon: BDAG
  rationale: Conserva el enlace narrativo de καί y el valor temporal de ὅτε. «Y cuando» mantiene el flujo inmediato del relato en un español natural y fiel.
- source_word: εἶδον αὐτόν
  english_pob_choice: I saw him
  chosen_spanish: lo vi
  alternatives_spanish:
  - lo miré
  - lo contemplé
  lexicon: BDAG
  rationale: ὁράω en aoristo expresa percepción simple. En español, «lo vi» es la equivalencia más directa y natural; el pronombre átono evita repetir el objeto con pesadez.
- source_word: ἔπεσα πρὸς τοὺς πόδας αὐτοῦ
  english_pob_choice: I fell at his feet
  chosen_spanish: caí a sus pies
  alternatives_spanish:
  - caí ante sus pies
  - caí postrado a sus pies
  lexicon: BDAG
  rationale: La construcción griega indica derrumbe postrado delante de alguien. «Caí a sus pies» es idiomático en español y conserva la postura de reverencia y sobrecogimiento.
- source_word: ὡς νεκρός
  english_pob_choice: like a dead man
  chosen_spanish: como muerto
  alternatives_spanish:
  - como si estuviera muerto
  - como un muerto
  lexicon: BDAG
  rationale: El ὡς introduce comparación, no afirmación literal. «Como muerto» preserva la similitud con sobriedad; en nota se mantiene la alternativa interpretativa que el POB inglés documenta.
- source_word: ἔθηκεν τὴν δεξιὰν αὐτοῦ ἐπ’ ἐμέ
  english_pob_choice: he placed his right hand on me
  chosen_spanish: puso su diestra sobre mí
  alternatives_spanish:
  - puso su mano derecha sobre mí
  - apoyó su diestra sobre mí
  lexicon: BDAG
  rationale: τίθημι aquí es «poner/colocar». «Diestra» es un equivalente bíblico claro para la mano derecha y conserva el valor simbólico sin perder inteligibilidad; «sobre mí» refleja ἐπ’ ἐμέ.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - mientras decía
  lexicon: BDAG
  rationale: El participio contemporáneo se traslada con «diciendo», que reproduce bien la relación de simultaneidad con la acción principal.
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas ni te asustes
  lexicon: BDAG
  rationale: φοβέομαι puede expresarse como «temer» o «tener miedo». «No temas» es solemne, breve y adecuado al habla revelatoria del pasaje.
- source_word: ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo estoy
  lexicon: BDAG
  rationale: Se conserva la fuerza enfática del pronombre explícito. «Yo soy» sigue de cerca el griego y funciona naturalmente en español antes de un título.
- source_word: ὁ πρῶτος καὶ ὁ ἔσχατος
  english_pob_choice: the First and the Last
  chosen_spanish: el Primero y el Último
  alternatives_spanish:
  - el primero y el último
  - el Primero y el Último
  lexicon: BDAG
  rationale: En griego son títulos con artículo. Se capitalizan en español para marcar su fuerza titulary, siguiendo la lectura auditada del POB inglés y manteniendo la resonancia solemne del pasaje.
theological_decisions:
- issue: 'ὡς νεκρός: similitudo y no muerte literal'
  english_pob_reading: like a dead man
  chosen_spanish_reading: como muerto
  alternative_spanish_readings:
  - como si estuviera muerto
  - como un muerto
  rationale: El ὡς señala comparación. La traducción española no debe convertirla en afirmación literal; «como muerto» conserva la tensión textual y la vividez de la reacción de Juan.
  doctrine_reference: Gramática griega de ὡς; traducción por similitud
- issue: ὁ πρῶτος καὶ ὁ ἔσχατος como título
  english_pob_reading: the First and the Last
  chosen_spanish_reading: el Primero y el Último
  alternative_spanish_readings:
  - el primero y el último
  rationale: La frase funciona como designación titulary de autodefinición. La capitalización en español refleja ese uso sin añadir explicación doctrinal ajena al versículo; conserva también la eco-terminología de Isaías que el contexto sugiere.
  doctrine_reference: Cristología bíblica; eco veterotestamentario de Isaías 44:6; 48:12
- issue: ἐγώ εἰμι como autodeclaración solemne
  english_pob_reading: I am
  chosen_spanish_reading: Yo soy
  alternative_spanish_readings:
  - Soy yo
  rationale: «Yo soy» preserva la estructura enfática del griego y encaja con la fórmula de presentación solemne seguida de un título. No se fuerza una glosa adicional más allá de lo que el texto afirma.
  doctrine_reference: Retórica y sintaxis del griego koiné
translation_notes:
  revision_awareness: 'El texto coincide con la auditoría inglesa POB de alto acuerdo y no requiere revisión sustantiva. Se conservan las decisiones clave: ὡς νεκρός como comparación, ἐγώ εἰμι como autodeclaración, y ὁ πρῶτος καὶ ὁ ἔσχατος como título. La única adaptación al español es la naturalización idiomática de «I fell at his feet» como «caí a sus pies» y de «Do not fear» como «No temas».'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se mantiene «diestra» para τὴν δεξιὰν por su claridad bíblica y tono digno.
  - Se capitalizan los títulos «Primero» y «Último» para reflejar su función titular, en paralelo con la auditoría inglesa.
