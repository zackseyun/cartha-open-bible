translation:
  language: es
  text: Y me volví para ver la voz que hablaba conmigo[a], y al volverme vi siete candeleros de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que me hablaba». El griego dice literalmente «que hablaba conmigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέστρεψα
  english_pob_choice: I turned
  chosen_spanish: me volví
  alternatives_spanish:
  - giré
  - me di vuelta
  lexicon: BDAG
  rationale: El aoristo de ἐπιστρέφω aquí describe un giro físico. «Me volví» expresa con naturalidad ese movimiento y mantiene la sencillez del griego sin añadir la expansión de «me di vuelta».
- source_word: βλέπειν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - mirar
  - ver para
  lexicon: BDAG
  rationale: El infinitivo complementario expresa la intención de percibir el origen de la voz. En español, «para ver» sería fiel y natural; dentro de la frase completa, «me volví para ver» comunica bien la finalidad sin forzar un calco.
- source_word: φωνὴν
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  lexicon: BDAG
  rationale: En este contexto la relative clause muestra que la voz hablaba; por eso «voz» es el sentido correcto y más preciso que «sonido».
- source_word: ἥτις
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: BDAG
  rationale: La relativa cualitativa se expresa de forma natural en español con «que». «La cual» es posible, pero resulta más pesado en una línea narrativa breve.
- source_word: ἐλάλει μετ’ ἐμοῦ
  english_pob_choice: was speaking with me
  chosen_spanish: hablaba conmigo
  alternatives_spanish:
  - hablaba con migo
  - hablaba a mí
  lexicon: BDAG
  rationale: El imperfecto pide una acción en curso, por eso «hablaba». La preposición μετά con genitivo puede expresar asociación; «conmigo» preserva ese matiz. «Hablaba a mí» introduciría una orientación distinta, aunque en algunas lenguas sería una opción interpretativa.
- source_word: ἐπιστρέψας
  english_pob_choice: when I turned
  chosen_spanish: al volverme
  alternatives_spanish:
  - cuando me volví
  - habiéndome vuelto
  lexicon: BDAG
  rationale: El participio aoristo antecede a vi y marca la secuencia temporal. «Al volverme» es fluido en español y conserva esa anterioridad sin sobreexplicar.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  lexicon: BDAG
  rationale: El aoristo de ὁράω se rinde de manera directa con «vi». No hace falta ampliar con «miré y vi».
- source_word: ἑπτὰ
  english_pob_choice: seven
  chosen_spanish: siete
  lexicon: BDAG
  rationale: Número cardinal directo sin ambigüedad.
- source_word: λυχνίας
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - lámparas
  - soportes para lámparas
  lexicon: BDAG
  rationale: λυχνία designa un soporte para lámpara, no la lámpara misma. En español, «candelabros» comunica la función y la forma del objeto de manera comprensible y digna; «lámparas» confundiría el símbolo con el objeto que porta la luz.
- source_word: χρυσᾶς
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro puro
  lexicon: BDAG
  rationale: El adjetivo puede expresarse como cualidad o material. «De oro» mantiene el valor material de χρυσᾶς y suena natural en español; «dorados» podría sugerir solo color o recubrimiento.
theological_decisions:
- issue: 'Objeto simbólico en Apocalipsis: λυχνίας'
  english_pob_reading: lampstands
  chosen_spanish_reading: candelabros
  alternative_spanish_readings:
  - lámparas
  rationale: Conviene mantener el objeto concreto e identificable, porque Apocalipsis 1:20 lo interpreta simbólicamente. «Candelabros» conserva la materialidad del símbolo y evita confundirlo con la fuente de luz misma.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del audit trail en inglés, que no registra revisiones posteriores; la traducción española mantiene las mismas decisiones básicas: movimiento físico de Juan, voz como sujeto de habla, secuencia temporal con participio aoristo, y siete lámparas/lampstands como objeto simbólico preciso.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o fórmulas de sustitución porque no aparece el nombre divino en este versículo.
  - «Hablaba conmigo» conserva el matiz relacional de μετά con genitivo; la nota registra la alternativa más idiomática en algunos contextos, «me hablaba».
  - «Candelabros» se usa aquí como equivalente funcional de λυχνία; si en secciones adyacentes se mantiene una terminología técnica distinta, convendrá armonizarla con la nota interpretativa de Apocalipsis 1:20.
