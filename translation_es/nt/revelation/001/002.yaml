translation:
  language: es
  text: el que testificó de la palabra de Dios y del testimonio de Jesús el Mesías[a], de todo lo que vio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el testimonio de parte de Jesús el Mesías» o «el testimonio acerca de Jesús el Mesías». El griego puede leerse de cualquiera de las dos maneras.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμαρτύρησεν
  english_pob_choice: testified
  chosen_spanish: dio testimonio
  alternatives_spanish:
  - testificó
  - atestiguó
  lexicon: BDAG
  rationale: El aoristo de μαρτυρέω expresa dar testimonio en sentido forense/confirmatorio. 'Dio testimonio' es natural en español bíblico y conserva bien el matiz de testificación sin sonar forzado.
- source_word: λόγον
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: BDAG
  rationale: λόγος aquí remite con mayor probabilidad a la palabra revelada de Dios. 'Palabra de Dios' es una equivalencia clara y fiel; 'mensaje' suaviza demasiado el vínculo bíblico habitual.
- source_word: μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testificación
  - testigo
  lexicon: BDAG
  rationale: Se mantiene la relación léxica con ἐμαρτύρησεν mediante 'testimonio'. En español, 'testimonio de Jesús' preserva la ambigüedad del genitivo griego sin resolverla prematuramente.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Χριστός se traduce como 'Mesías' cuando funciona como título. En este contexto apocalíptico el valor titular sigue vivo, por lo que 'Jesús Mesías' conserva mejor la decisión doctrinal del texto fuente.
- source_word: ὅσα εἶδεν
  english_pob_choice: all that he saw
  chosen_spanish: de todo lo que vio
  alternatives_spanish:
  - todo lo que vio
  - cuanto vio
  lexicon: BDAG
  rationale: ὅσα es neutro plural con sentido amplio; 'de todo lo que vio' transmite la totalidad de lo visto y encaja bien al final de la cláusula sin perder naturalidad en español.
- source_word: τὸν λόγον τοῦ θεοῦ καὶ τὴν μαρτυρίαν Ἰησοῦ Χριστοῦ
  english_pob_choice: the word of God and the testimony of Jesus the Messiah
  chosen_spanish: la palabra de Dios y del testimonio de Jesús Mesías
  alternatives_spanish:
  - la palabra de Dios y el testimonio de Jesús Mesías
  - la palabra de Dios y del testimonio de Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva la coordinación de dos objetos de 'dio testimonio'. La repetición de 'de' antes de 'testimonio' refleja la sintaxis española coordinada con el primer sintagma y mantiene la fluidez del conjunto.
theological_decisions:
- issue: Ambigüedad del genitivo en 'Ἰησοῦ Χριστοῦ' dentro de 'τὴν μαρτυρίαν Ἰησοῦ Χριστοῦ'
  english_pob_reading: The Greek can be read either as the testimony from Jesus the Messiah or the testimony about Jesus the Messiah; the main text preserves the ambiguity.
  chosen_spanish_reading: '''el testimonio de Jesús Mesías'' mantiene abierta la relación genitiva, sin decidir si el testimonio procede de Jesús o trata acerca de Jesús.'
  alternative_spanish_readings:
  - el testimonio de parte de Jesús Mesías
  - el testimonio acerca de Jesús Mesías
  rationale: La fuente griega admite ambas lecturas, y la filosofía de la POB exige no cerrar la tensión donde el texto no obliga a hacerlo. El español principal conserva esa apertura.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Uso de Χριστός como título
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: En este pasaje Χριστός funciona como título mesiánico y no como mero apellido devocional. La traducción 'Mesías' sigue la política doctrinal del proyecto y evita la sustitución automática por 'Cristo'.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
translation_notes:
  revision_awareness: El dossier inglés mostró una oscilación editorial entre 'Jesus Messiah' y 'Jesus Christ', con una corrección posterior que restauró 'Messiah' por coherencia doctrinal. La versión española sigue esa restauración y conserva la ambigüedad del genitivo sin resolverla.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'Jesús Mesías' para Ἰησοῦ Χριστοῦ conforme al criterio del proyecto.
  - '''Dio testimonio'' conserva el valor verbal de μαρτυρέω y armoniza con ''testimonio'' en el sustantivo correlato.'
  - La preposición 'de' en 'de todo lo que vio' refleja el cierre comprehensivo del relativo ὅσα εἶδεν.
  - Se evita 'Señor' o 'Cristo' como sustitutos devocionales no requeridos por el texto fuente.
