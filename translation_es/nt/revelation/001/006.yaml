translation:
  language: es
  text: y nos hizo un reino[a], sacerdotes para su Dios y Padre; a él sea la gloria y el dominio por los siglos de los siglos[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos tardíos leen «reyes y sacerdotes» en lugar de «un reino, sacerdotes». El texto principal sigue la lectura griega proporcionada.
    reason: textual_variant
  - marker: b
    text: 'O más literalmente: «por los siglos de los siglos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - nos hizo
  - ha hecho
  lexicon: BDAG
  rationale: El aoristo activo se rinde mejor con un pasado simple en español. «Hizo» conserva el valor aspectual sin forzar un perfecto compuesto que sugeriría un resultado continuado no exigido por el griego.
- source_word: βασιλείαν
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - reino
  - realeza
  lexicon: BDAG
  rationale: El sustantivo apunta a una entidad o dominio real, no a «reyes». «Un reino» reproduce la lectura textual y la imagen corporativa del pueblo redimido como un reino.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes
  - sacerdocio
  lexicon: BDAG
  rationale: El plural designa personas en función sacerdotal. «Sacerdotes» es el equivalente más directo y mantiene el paralelismo con el texto fuente.
- source_word: τῷ θεῷ καὶ πατρὶ αὐτοῦ
  english_pob_choice: to his God and Father
  chosen_spanish: para su Dios y Padre
  alternatives_spanish:
  - a su Dios y Padre
  - para su Dios y Padre
  lexicon: BDAG
  rationale: El dativo expresa relación/orientación; en español «para» comunica bien la dedicación cultual y relacional de la frase. Se conserva «su Dios y Padre» para reflejar que el posesivo gobierna ambos sustantivos.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: 'La dative doxológica se expresa naturalmente en español con «a él» en una fórmula de alabanza: «a él sea...». Mantiene el sentido de atribución sin añadir un verbo explícito.'
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  lexicon: BDAG
  rationale: Término doxológico estándar y plenamente natural en español.
- source_word: κράτος
  english_pob_choice: dominion
  chosen_spanish: el dominio
  alternatives_spanish:
  - dominio
  - poder
  lexicon: BDAG
  rationale: En contexto doxológico κράτος expresa poder soberano/gobierno efectivo. «Dominio» captura mejor la idea de autoridad reinante que el más genérico «poder».
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre y siempre
  lexicon: BDAG
  rationale: En español eclesial esta fórmula reproduce con naturalidad la duración interminable del idiomático griego. Conserva el registro litúrgico sin perder claridad.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se mantiene la forma litúrgica tradicional y universal en español.
theological_decisions:
- issue: Referente de «su Dios y Padre»
  english_pob_reading: The phrase refers to Jesus Messiah, so believers are made a kingdom and priests to the God and Father of Jesus.
  chosen_spanish_reading: La frase se entiende referida a Jesús; por eso los creyentes son constituidos un reino y sacerdotes para el Dios y Padre de Jesús.
  alternative_spanish_readings:
  - '...para Dios, su Padre'
  - '...para su Dios y Padre'
  rationale: El antecedente más cercano en el contexto es Jesús Mesías. La traducción conserva la relación distintiva entre Jesús y Dios sin suavizarla ni fundir las personas en una sola referencia.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy §1, §3'
- issue: Naturaleza de la comunidad redimida
  english_pob_reading: The main text keeps 'a kingdom, priests' rather than interpreting it as 'kings and priests.'
  chosen_spanish_reading: El texto principal mantiene «un reino, sacerdotes» y no lo interpreta como «reyes y sacerdotes».
  alternative_spanish_readings:
  - reyes y sacerdotes
  - un reino de sacerdotes
  rationale: El griego proporcionado dice βασιλείαν, ἱερεῖς. La traducción debe reflejar esa lectura, incluso si hay ecos de Éxodo 19:6; así se preserva la identidad corporativa del pueblo redimido sin introducir una variante textual no atestiguada aquí.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue la lectura griega SBLGNT provista y coincide con la revisión más reciente: no se requieren cambios adicionales. Se conserva la estructura doxológica y la referencia relacional «su Dios y Padre» sin neutralizar el referente cristológico.'
  spanish_consistency_notes:
  - Se usa «reino» para βασιλείαν, evitando la variante interpretativa «reyes».
  - Se usa «sacerdotes» para ἱερεῖς, en coherencia con el valor léxico directo del plural.
  - Se mantiene «Amén» como fórmula litúrgica estable.
  - La fórmula temporal «por los siglos de los siglos» conserva el tono bíblico y el sentido de duración infinita.
  - 'La doxología en español sigue la misma articulación que el griego: atribución a Dios seguida de alabanza eterna.'
