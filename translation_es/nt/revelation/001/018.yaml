translation:
  language: es
  text: y el Viviente—quedé muerto[a], y mira, estoy vivo para los siglos de los siglos[b]—y tengo las llaves de la muerte y del Hades[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «llegué a estar muerto»; el griego dice «llegué a ser muerto», subrayando la transición hacia la muerte.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «para los siglos de los siglos», un modismo que expresa duración interminable.'
    reason: lexical_alternative
  - marker: c
    text: «Hades» se refiere al ámbito de los muertos, no específicamente al castigo final.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ζῶν
  english_pob_choice: the Living One
  chosen_spanish: el Viviente
  alternatives_spanish:
  - el que vive
  - el viviente
  lexicon: BDAG
  rationale: El participio articular funciona como título; «el Viviente» conserva ese valor nominal y la fuerza reverente del griego mejor que una cláusula relativa.
- source_word: ἐγενόμην νεκρός
  english_pob_choice: I became dead
  chosen_spanish: llegué a estar muerto
  alternatives_spanish:
  - me hice muerto
  - estuve muerto
  lexicon: BDAG
  rationale: γίνομαι con predicado adjetival expresa transición a un estado; en español, «llegué a estar muerto» comunica ese paso sin sonar forzado ni perder la idea de cambio.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira, pues
  lexicon: BDAG
  rationale: Se preserva la fuerza deíctica e imperativa breve del griego. «Mira» resulta más natural en español contemporáneo que «he aquí», sin debilitar la interpelación solemne.
- source_word: ζῶν εἰμι
  english_pob_choice: I am alive
  chosen_spanish: vivo soy
  alternatives_spanish:
  - estoy vivo
  - soy vivo
  lexicon: BDAG
  rationale: La combinación participio + εἰμί expresa estado presente; «vivo soy» mantiene el contraste con «llegué a estar muerto» y el tono elevado del texto apocalíptico.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: para los siglos de los siglos
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre y para siempre
  lexicon: BDAG
  rationale: Se conserva más de cerca la idiomática griega, como hizo el POB inglés al notar la expresión literal. «Para los siglos de los siglos» mantiene el matiz de duración enfática y es plenamente inteligible en español.
- source_word: κλεῖς
  english_pob_choice: keys
  chosen_spanish: llaves
  alternatives_spanish:
  - las llaves
  - claves
  lexicon: BDAG
  rationale: Equivalente directo del sustantivo; la imagen de autoridad o control se conserva sin necesidad de explicitarla en el texto principal.
- source_word: τοῦ θανάτου
  english_pob_choice: of death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de Muerte
  lexicon: BDAG
  rationale: Se mantiene el referente genérico del sustantivo griego sin personificarlo en el texto principal, como en el audit trail inglés.
- source_word: τοῦ ᾅδου
  english_pob_choice: of Hades
  chosen_spanish: del Hades
  alternatives_spanish:
  - del sepulcro
  - del reino de los muertos
  - del infierno
  lexicon: BDAG
  rationale: Se conserva el término transliterado «Hades» para no confundirlo con el sepulcro físico ni con el castigo final. Sigue la precisión conceptual defendida en el POB inglés.
theological_decisions:
- issue: Cómo traducir ᾅδης sin borrar su distinción de θάνατος
  english_pob_reading: Hades refers to the realm of the dead, not specifically to final punishment.
  chosen_spanish_reading: Hades refiere al ámbito de los muertos, no específicamente al castigo final.
  alternative_spanish_readings:
  - sepulcro
  - infierno
  - reino de los muertos
  rationale: La distinción entre «la muerte» y «el Hades» debe permanecer visible. «Hades» en el texto principal evita fusionar ambas realidades y respeta la tensión teológica del original.
  doctrine_reference: Apocalipsis 1:18; precisión léxica original-language primacy
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto fuente y con el audit trail inglés. Se mantuvo la distinción entre el valor titulado de ὁ ζῶν, la transición verbal de ἐγενόμην νεκρός, la deixis de ἰδοὺ, la fórmula enfática de eternidad y la diferenciación conceptual entre θάνατος y ᾅδης. No se requirieron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usó «Hades» como término técnico coherente con el enfoque del POB y con la precisión teológica del contexto.
  - Se prefirió «el Viviente» para mantener el carácter titular de ὁ ζῶν, en paralelo con la decisión inglesa.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en este versículo.
  - La puntuación con rayas reproduce el encadenamiento y la pausa retórica del griego apocalíptico.
