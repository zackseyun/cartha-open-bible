translation:
  language: es
  text: Y tenía siete estrellas en su mano derecha, y de su boca salía una espada aguda de dos filos[a], y su aspecto era como el sol que resplandece en su fuerza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una espada aguda de doble filo».
    reason: lexical_alternative
  - marker: b
    text: O «resplandeciendo en su pleno vigor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχων
  english_pob_choice: he had
  chosen_spanish: tenía
  alternatives_spanish:
  - tenía
  - teniendo
  lexicon: BDAG
  rationale: El participio descriptivo se vierte con un imperfecto narrativo en español para conservar la escena visionaria continua sin sonar forzado. 'Tenía' es natural y mantiene la relación de posesión/tenencia.
- source_word: ἐν τῇ δεξιᾷ χειρὶ αὐτοῦ
  english_pob_choice: in his right hand
  chosen_spanish: en su mano derecha
  alternatives_spanish:
  - en su mano derecha
  - en su diestra
  lexicon: BDAG
  rationale: '''Mano'' conserva χειρ explícito y ''derecha'' refleja δεξιᾷ. ''Diestra'' es posible, pero ''mano derecha'' es más transparente y actual para una traducción auditable.'
- source_word: ἀστέρας ἑπτά
  english_pob_choice: seven stars
  chosen_spanish: siete estrellas
  alternatives_spanish:
  - siete estrellas
  lexicon: BDAG
  rationale: Orden natural del español, sin cambio de sentido.
- source_word: ῥομφαία
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - espada grande
  - broadsword
  lexicon: BDAG
  rationale: ῥομφαία designa una espada grande; en español, 'espada' comunica el símbolo sin sobre-especificar el tipo de arma. El adjetivo posterior conserva el matiz visual.
- source_word: δίστομος
  english_pob_choice: two-edged
  chosen_spanish: de dos filos
  alternatives_spanish:
  - de doble filo
  - de dos filos
  lexicon: BDAG
  rationale: '''De dos filos'' es la expresión idiomática más estable y fiel en español para el sentido de ''two-edged''. Mantiene el carácter figurado sin perder claridad.'
- source_word: ὀξεῖα
  english_pob_choice: sharp
  chosen_spanish: aguda
  alternatives_spanish:
  - aguda
  - afilada
  - punzante
  lexicon: BDAG
  rationale: El adjetivo refuerza la cualidad cortante/penetrante de la espada. 'Aguda' es natural en español bíblico contemporáneo y evita redundancia excesiva con 'de dos filos'.
- source_word: ἐκπορευομένη
  english_pob_choice: came
  chosen_spanish: salía
  alternatives_spanish:
  - salía
  - procedía
  - emanaba
  lexicon: BDAG
  rationale: 'El participio presente expresa una acción en curso: la espada está saliendo de la boca. ''Salía'' reproduce la imagen de manera directa y visual sin interpretar el símbolo.'
- source_word: ἡ ὄψις αὐτοῦ
  english_pob_choice: his appearance
  chosen_spanish: su aspecto
  alternatives_spanish:
  - su aspecto
  - su apariencia
  - su semblante
  lexicon: BDAG
  rationale: ὄψις apunta al aspecto visible. 'Aspecto' es más preciso que 'rostro' o 'semblante' y no estrecha indebidamente la imagen.
- source_word: ὡς ὁ ἥλιος φαίνει
  english_pob_choice: like the sun shining
  chosen_spanish: como el sol que resplandece
  alternatives_spanish:
  - como el sol que brilla
  - como el sol que resplandece
  - como el sol que alumbra
  lexicon: BDAG
  rationale: La comparación se expresa con una relativa natural en español. 'Resplandece' conserva el valor de brillo intenso del presente φαίνει sin volver la frase mecánica.
- source_word: ἐν τῇ δυνάμει αὐτοῦ
  english_pob_choice: in its strength
  chosen_spanish: en su fuerza
  alternatives_spanish:
  - en su fuerza
  - en su poder
  - en su pleno vigor
  lexicon: BDAG
  rationale: δύναμις aquí describe la intensidad del sol. 'Fuerza' permite mantener la concreción de la imagen; 'poder' sería posible pero más abstracto en español.
theological_decisions:
- issue: Espada que sale de la boca del personaje visionario
  english_pob_reading: Retain the visionary metaphor without interpretive expansion.
  chosen_spanish_reading: Conservar la metáfora visionaria sin explicarla en el texto principal.
  alternative_spanish_readings:
  - explicitarla como la palabra de juicio de Cristo
  - parafrasearla como un arma simbólica de su autoridad
  rationale: El griego presenta la imagen apocalíptica sin glosa. La traducción debe preservar esa tensión simbólica y no resolverla en el cuerpo del versículo.
  doctrine_reference: Principio de transparencia textual y preservación de la tensión apocalíptica.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el audit trail en inglés. No hubo revisiones aplicadas en la versión inglesa más reciente; la concordancia general fue alta, con observación menor sobre decisiones léxicas. En español, se mantuvo la metáfora sin expansión interpretativa y se eligieron equivalentes naturales para 'two-edged', 'sharp' y 'in its strength'.
  spanish_consistency_notes:
  - Se preservó 'espada' y no se sustituyó por un término eclesiástico tradicional, porque el contexto es una imagen apocalíptica concreta.
  - Se evitó 'SEÑOR' u otras sustituciones para el nombre divino porque este versículo no contiene el tetragrámaton ni κύριος en sentido directo.
  - '''Aspecto'' se usó para ὄψις para no reducir el sentido a ''rostro''.'
  - La puntuación sigue el ritmo coordinado del griego con comas y 'y' final para mantener la estructura visionaria.
