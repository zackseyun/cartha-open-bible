    text: Or, less likely, 'on the day of the Lord.' The Greek here is κυριακῇ ἡμέρᾳ ('the Lord’s day'), not the more usual expression for the eschatological 'day of the Lord.'
    reason: alternative_reading
  - marker: b
    text: Or 'in spirit.' The phrase may denote being under the Holy Spirit’s prophetic influence; the text does not explicitly say 'in a trance.'
    reason: lexical_alternative
