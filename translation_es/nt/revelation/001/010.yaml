translation:
  language: es
  text: Llegué a estar en el Espíritu en el día del Señor[a], y oí detrás de mí una voz fuerte como de trompeta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probable, «en el día del Señor» entendido como «el día del Señor» escatológico. El griego aquí es κυριακῇ ἡμέρᾳ, es decir, «el día perteneciente al Señor», no la expresión más habitual para el escatológico «día del Señor».
    reason: alternative_reading
  - marker: b
    text: O, «en espíritu». La frase puede indicar estar bajo la influencia profética del Espíritu Santo; el texto no dice explícitamente «en un trance».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενόμην
  english_pob_choice: I came to be
  chosen_spanish: Llegué a estar
  alternatives_spanish:
  - Estuve
  - Me hallé
  - Llegué a ser
  lexicon: BDAG
  rationale: El aoristo de γίνομαι aquí expresa entrada en un estado o condición. «Llegué a estar» conserva ese matiz ingresivo en español mejor que un simple «estuve», sin introducir la idea de trance que el verbo no exige.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  - en el espíritu
  lexicon: BDAG
  rationale: La mayúscula en «Espíritu» refleja la referencia probable al Espíritu Santo en el marco visionario de Apocalipsis. Se mantiene la frase preposicional literal sin expandirla a una glosa interpretativa como «en un trance».
- source_word: ἐν τῇ κυριακῇ ἡμέρᾳ
  english_pob_choice: on the Lord’s day
  chosen_spanish: en el día del Señor
  alternatives_spanish:
  - en el día de Yahvé
  - en el día del Señorío
  lexicon: BDAG
  rationale: κυριακός significa «perteneciente al Señor»; en español, la forma natural y eclesialmente inteligible es «el día del Señor». No se traduce como «el día de Yahvé» porque el griego no usa aquí el nombre divino explícito ni la construcción escatológica usual de «el día del Señor» como evento final.
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - percibí
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí reporta una percepción auditiva; «oí» es directo, natural y fiel al valor básico del verbo.
- source_word: ὀπίσω μου
  english_pob_choice: behind me
  chosen_spanish: detrás de mí
  alternatives_spanish:
  - a mis espaldas
  - tras de mí
  lexicon: BDAG
  rationale: La referencia es espacial, no temporal; «detrás de mí» comunica con claridad la ubicación de la voz.
- source_word: φωνὴν μεγάλην
  english_pob_choice: a loud voice
  chosen_spanish: una voz fuerte
  alternatives_spanish:
  - una gran voz
  - una voz sonora
  lexicon: BDAG
  rationale: En español, «voz fuerte» transmite el sentido idiomático de μεγάλην con φωνή como intensidad sonora. «Gran voz» sería más calcado y menos natural; «fuerte» preserva el énfasis auditivo.
- source_word: ὡς σάλπιγγος
  english_pob_choice: like a trumpet
  chosen_spanish: como de trompeta
  alternatives_spanish:
  - como trompeta
  - como una trompeta
  lexicon: BDAG
  rationale: La comparación describe la cualidad de la voz. «Como de trompeta» es una fórmula natural en español que conserva el valor comparativo sin añadir la idea de un toque o estallido no expresado de manera explícita en el sustantivo griego.
theological_decisions:
- issue: Cómo rendir ἐν πνεύματι sin imponer una experiencia extática específica
  english_pob_reading: in the Spirit
  chosen_spanish_reading: en el Espíritu
  alternative_spanish_readings:
  - en espíritu
  - en un trance
  rationale: La frase probablemente señala inspiración profética del Espíritu Santo, pero el griego no dice explícitamente «en un trance». Mantener «en el Espíritu» preserva la tensión interpretativa y evita sobreespecificar la experiencia de Juan.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
- issue: Si κυριακῇ ἡμέρᾳ debe entenderse como el día semanal del Señor o como el día escatológico del Señor
  english_pob_reading: the Lord’s day
  chosen_spanish_reading: el día del Señor
  alternative_spanish_readings:
  - el día de Yahvé
  - el día del juicio del Señor
  rationale: La forma griega κυριακῇ ἡμέρᾳ favorece «el día del Señor» como traducción lexical. La traducción no decide aquí si se trata del día semanal cristiano o del día escatológico, sino que conserva la ambigüedad dentro de los límites del texto.
  doctrine_reference: 'Translation philosophy §1: Primacía del idioma original sobre la tradición traductora.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores en el expediente; el pasaje muestra alta concordancia entre el control cruzado y el texto base, con solo observaciones menores de interpretación. Se preservó la tensión entre la lectura visionaria de ἐν πνεύματι y la posible ambigüedad de κυριακῇ ἡμέρᾳ sin resolverlas de forma excesiva.
  spanish_consistency_notes:
  - Se usó «Yahvé» en la política general, pero en este verso la fuente griega no contiene el nombre divino; por eso se traduce la expresión fija como «el día del Señor».
  - Se mantuvo «Espíritu» con mayúscula por coherencia con el uso visionario joánico y el contexto apocalíptico.
  - «Voz fuerte» se eligió para reproducir el énfasis de φωνὴν μεγάλην con español natural, evitando un calco rígido como «gran voz».
