  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: ''Espíritu'' para πνεῦμα es apropiado aquí, sin expandir a ''trance''. No hay conflicto con Yahvé, Mesías, etc. El punto de glosario relevante es que la decisión inglesa documenta ''the Lord’s day'', no ''day of the Lord''; por eso en español debe evitarse una forma que borre esa diferencia.'
