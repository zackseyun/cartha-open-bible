translation:
  language: es
  text: «Yo soy el Alfa y la Omega», dice el Señor Dios[a], «el que es y el que era y el que viene, el Todopoderoso».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que es y el que era y el que ha de venir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo mismo soy
  lexicon: BDAG
  rationale: La forma enfática se conserva de manera natural en español con el pronombre expreso 'Yo soy'. En este tipo de autoidentificación solemne, la estructura transmite adecuadamente la fuerza del griego sin volverse pesada.
- source_word: τὸ Ἄλφα καὶ τὸ Ὦ
  english_pob_choice: the Alpha and the Omega
  chosen_spanish: el Alfa y la Omega
  alternatives_spanish:
  - la A y la O
  lexicon: BDAG
  rationale: Se mantienen los nombres de las letras griegas, como en el audit trail inglés, para preservar el valor simbólico apocalíptico y la forma tradicional reconocible.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  lexicon: BDAG
  rationale: El presente narrativo queda bien expresado con 'dice' en español, con registro sobrio y directo. 'Declara' sería más interpretativo.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino; 'Señor' es el equivalente natural y reverente en español, coherente con el valor teológico del pasaje.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Traducción directa del título apposicional 'ὁ θεός' como 'Dios', manteniendo la construcción 'Señor Dios' como en el texto fuente y en el audit trail inglés.
- source_word: ὁ ὢν καὶ ὁ ἦν καὶ ὁ ἐρχόμενος
  english_pob_choice: the one who is and who was and who is coming
  chosen_spanish: el que es y el que era y el que viene
  alternatives_spanish:
  - el que es y el que era y el que ha de venir
  lexicon: BDAG
  rationale: Se conserva la secuencia articular con participio/forma verbal mediante 'el que...', que suena natural en español y refleja la formulación triádica. Se prefirió 'viene' para reproducir el participio presente ἐρχόμενος; 'ha de venir' es una alternativa legítima y tradicional, pero desplaza el matiz aspectual presente.
- source_word: ὁ παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el que todo lo gobierna
  lexicon: BDAG
  rationale: '''Todopoderoso'' es el equivalente bíblico más idiomático en español para παντοκράτωρ y preserva la soberanía divina sin literalismo forzado.'
theological_decisions:
- issue: La fórmula divina 'el que es y el que era y el que viene' frente a la variante tradicional 'el que es y el que era y el que ha de venir'
  english_pob_reading: the one who is and who was and who is coming
  chosen_spanish_reading: el que es y el que era y el que viene
  alternative_spanish_readings:
  - el que es y el que era y el que ha de venir
  rationale: El griego usa ὁ ἐρχόμενος, un participio presente. 'El que viene' preserva mejor ese aspecto verbal y la tensión escatológica activa del texto. Se deja constancia de la forma tradicional como alternativa válida, no como corrección.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios adicionales respecto al sentido base del texto fuente ni al audit trail inglés. La decisión clave se mantiene en ἐρχόμενος, donde se preserva el presente verbal con ''viene'' y se documenta la alternativa tradicional.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero aquí el griego tiene κύριος como título en la cláusula 'dice el Señor Dios', por lo que corresponde 'Señor Dios' en español.
  - '''Alfa'' y ''Omega'' se mantienen como nombres de letras griegas, no como equivalentes españoles.'
  - '''Todopoderoso'' conserva el valor reverente y estable de παντοκράτωρ en español bíblico.'
  - La puntuación con comillas inglesas tipográficas sigue el estilo de cita directa de la tradición editorial del proyecto, manteniendo claridad en una sola oración larga.
