  - severity: medium
    issue: Falta en español la nota sobre la fórmula cuádruple «tribu, lengua, pueblo y nación»
    rationale: El inglés POB conserva una nota explicativa sobre el alcance mundial enfatizado por la fórmula de cuatro miembros. Dado que no crea ambigüedad en español pero sí preserva una decisión auditada significativa, conviene mantenerla.
  - severity: low
