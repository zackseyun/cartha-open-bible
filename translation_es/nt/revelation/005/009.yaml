review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: canto nuevo, dignidad del Cordero para tomar el rollo y abrir sus sellos, causa basada en haber sido sacrificado y en haber comprado para Dios personas de alcance mundial. También preserva adecuadamente el objeto implícito de ἠγόρασας mediante «personas». Sin embargo, la colocación de las notas [a] y [b] está invertida respecto de los términos a los que corresponden: [a] aparece en «cántico nuevo» pero su nota trata τῷ θεῷ; [b] aparece en «para Dios» pero su nota trata ἐν τῷ αἵματί σου. Además, la nota c está formulada como si fuera alternativa o glosa, cuando la traducción principal ya usa «fuiste inmolado»; conviene convertirla en nota explicativa sobre el matiz de σφάζω y usar otra nota para la fórmula cuádruple, siguiendo mejor la auditoría inglesa.'
  spanish_quality_summary: El español es claro, digno y bastante natural para un registro eclesial amplio. «Cántico», «rollo», «sellos», «inmolado» y «compraste» son opciones sólidas. La frase «con tu sangre compraste para Dios personas…» es legible. La principal necesidad de reparación es de coherencia editorial y anclaje de notas; además, es preferible conservar en nota la observación sobre la fórmula «de toda tribu, lengua, pueblo y nación», ya que el inglés POB la preserva.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: θεῷ = «Dios», αἷμα = «sangre», βιβλίον = «rollo». No hay conflicto con términos de alto perfil como Yahvé, Mesías o esclavo. La elección «inmolado» para ἐσφάγης es defendible en español por su matiz sacrificial. «Compraste» respeta la decisión léxica de ἠγόρασας mejor que «redimiste».'
  issues:
