translation:
  language: es
  text: 'Y cantan un cántico nuevo, diciendo: «Tú eres digno de tomar el rollo y de abrir sus sellos, porque fuiste inmolado[a] y con tu sangre[b] compraste para Dios[c] personas de toda tribu, lengua, pueblo y nación[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego σφάζω conserva un matiz sacrificial y violento; «inmolado» procura preservarlo en español.
    reason: lexical_note
  - marker: b
    text: O «por tu sangre». El medio instrumental puede expresarse en español con «con» o «por»; aquí se opta por «con» por naturalidad idiomática.
    reason: lexical_alternative
  - marker: c
    text: O «a Dios». El dativo griego τῷ θεῷ puede reflejarse en español de ambas maneras; aquí se opta por «para Dios» para expresar con claridad destino y pertenencia.
    reason: lexical_alternative
  - marker: d
    text: 'Lit. «de toda tribu, lengua, pueblo y nación»: una fórmula de cuatro miembros que enfatiza el alcance mundial de los comprados.'
    reason: cultural_note
lexical_decisions:
- source_word: ᾄδουσιν
  english_pob_choice: they sing
  chosen_spanish: cantan
  alternatives_spanish:
  - están cantando
  - entonan
  lexicon: BDAG
  rationale: El presente narrativo se mantiene con un verbo simple y natural en español. «Cantan» conserva el aspecto vívido sin añadir contenido no explícito.
- source_word: ᾠδὴν καινὴν
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - una canción nueva
  - un nuevo canto
  lexicon: BDAG
  rationale: «Cántico» es más digno y bíblico en español que «canción», y «nuevo» preserva el motivo bíblico sin paráfrasis.
- source_word: Ἄξιος εἶ
  english_pob_choice: You are worthy
  chosen_spanish: Tú eres digno
  alternatives_spanish:
  - Digno eres tú
  - Eres digno
  lexicon: BDAG
  rationale: «Eres digno» expresa bien la aclamación; la forma con «tú» ayuda a conservar la segunda persona enfática del griego.
- source_word: τὸ βιβλίον
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el libro
  - el pergamino
  lexicon: BDAG
  rationale: En Apocalipsis se trata de un documento enrollado y sellado; «rollo» refleja mejor el objeto antiguo que «libro».
- source_word: ἀνοῖξαι τὰς σφραγῖδας αὐτοῦ
  english_pob_choice: to open its seals
  chosen_spanish: abrir sus sellos
  alternatives_spanish:
  - romper sus sellos
  - abrir los sellos de él
  lexicon: BDAG
  rationale: Se conserva la formulación breve del griego. «Abrir sus sellos» sigue de cerca la expresión original sin explicar más de lo que dice.
- source_word: ἐσφάγης
  english_pob_choice: you were slain
  chosen_spanish: fuiste inmolado
  alternatives_spanish:
  - fuiste sacrificado
  - fuiste degollado
  lexicon: BDAG
  rationale: «Inmolado» preserva el matiz sacrificial y violento de σφάζω mejor que «muerto» o «asesinado», y en español puede funcionar con solemnidad bíblica.
- source_word: ἠγόρασας
  english_pob_choice: you purchased
  chosen_spanish: compraste
  alternatives_spanish:
  - adquiriste
  - redimiste
  lexicon: BDAG
  rationale: El verbo tiene sentido comercial básico; «compraste» es fiel y natural. «Redimiste» sería más interpretativo.
- source_word: τῷ θεῷ
  english_pob_choice: for God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: El dativo se vierte bien con «para Dios», indicando destino/pertenencia de los comprados. La alternativa «a Dios» queda como posible lectura más literal del dativo.
- source_word: ἐν τῷ αἵματί σου
  english_pob_choice: by your blood
  chosen_spanish: con tu sangre
  alternatives_spanish:
  - por tu sangre
  - en tu sangre
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «by your blood», en español «con tu sangre» expresa naturalmente el medio del rescate y evita una construcción menos idiomática. Se preserva la materialidad de «sangre» sin diluirla en «muerte».
- source_word: ἐκ πάσης φυλῆς καὶ γλώσσης καὶ λαοῦ καὶ ἔθνους
  english_pob_choice: from every tribe and language and people and nation
  chosen_spanish: de toda tribu, lengua, pueblo y nación
  alternatives_spanish:
  - de cada tribu y lengua y pueblo y nación
  - procedentes de toda tribu, lengua, pueblo y nación
  lexicon: BDAG
  rationale: «De toda» reproduce el valor distributivo de ἐκ πάσης. «Lengua» es la correspondencia natural de γλῶσσα en esta fórmula, y «pueblo» conserva el colectivo singular de λαός.
theological_decisions:
- issue: 'Dativo τῷ θεῷ: destino de los comprados'
  english_pob_reading: for God
  chosen_spanish_reading: para Dios
  alternative_spanish_readings:
  - a Dios
  rationale: La frase expresa que los redimidos pasan a pertenecer a Dios. «Para Dios» mantiene esa orientación sin convertir el dativo en una relación distinta de la que el contexto sugiere.
  doctrine_reference: Translation philosophy §§1, 6
- issue: 'ἐν τῷ αἵματί σου: medio del rescate por la sangre'
  english_pob_reading: by your blood
  chosen_spanish_reading: con tu sangre
  alternative_spanish_readings:
  - por tu sangre
  rationale: La traducción conserva el lenguaje concreto de la sangre como medio del rescate. No se sustituye por una paráfrasis doctrinal como «por tu muerte», porque el texto resalta explícitamente la sangre.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Objeto implícito de ἠγόρασας
  english_pob_reading: you purchased for God people from every tribe...
  chosen_spanish_reading: compraste para Dios personas de toda tribu...
  alternative_spanish_readings:
  - compraste para Dios gente de toda tribu...
  - compraste para Dios de toda tribu...
  rationale: El griego no repite explícitamente el objeto directo, pero el contexto lo exige. «Personas» hace inteligible la frase en español sin introducir una lectura más estrecha que la del contexto universal del verso.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Conforme al audit trail inglés, se mantuvo la imagen del cántico nuevo, el objeto antiguo como «rollo», el valor comercial de «compraste» y el lenguaje sacrificial de «sangre». La única adaptación principal respecto del inglés es «con tu sangre» en lugar de «by your blood», por requerimiento idiomático del español, sin alterar el sentido instrumental. No se detectaron revisiones pendientes en la fuente inglesa.
  spanish_consistency_notes:
  - Se usó «rollo» para τὸ βιβλίον, siguiendo la decisión inglesa de no decir «libro».
  - Se prefirió «cántico» en lugar de «canción» para un registro bíblico más digno.
  - Se mantuvo el paralelo de la fórmula cuádruple con «tribu, lengua, pueblo y nación».
  - «Inmolado» se eligió por su capacidad de conservar el matiz sacrificial de σφάζω en un español eclesial comprensible.
