    text: O «una lira» para «un arpa».
    reason: lexical_alternative
  - marker: b
    text: O «las oraciones de los consagrados».
    reason: lexical_alternative
  revision_rationale: Se corrige el error gramatical «una arpa» > «un arpa». Se ajusta «copas de oro» a «cuencos de oro» para reflejar mejor φιάλας y alinearse con «golden bowls». También se repara la nota [a], que en el borrador estaba anclada a «rollo» pero explicaba una alternativa de κιθάραν; el anclaje correcto debe ir con «arpa». La nota [b] se rehace para preservar la alternativa auditada «holy ones» de forma natural en español.
