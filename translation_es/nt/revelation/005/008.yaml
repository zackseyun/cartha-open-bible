translation:
  language: es
  text: Y cuando tomó el rollo[a], los cuatro seres vivientes y los veinticuatro ancianos se postraron delante del Cordero, cada uno con un arpa y cuencos de oro llenos de incienso, que son las oraciones de los santos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una lira» para «un arpa».
    reason: lexical_alternative
  - marker: b
    text: O «las oraciones de los consagrados».
    reason: lexical_alternative
lexical_decisions:
- source_word: βιβλίον
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - libro
  - pergamino
  lexicon: BDAG
  rationale: En Apocalipsis, βιβλίον designa un documento enrollado, no un libro en formato moderno. «Rollo» reproduce mejor esa imagen antigua en español y mantiene la coherencia con la opción inglesa «scroll».
- source_word: ζῷα
  english_pob_choice: living creatures
  chosen_spanish: seres vivientes
  alternatives_spanish:
  - criaturas vivientes
  - seres vivos
  lexicon: BDAG
  rationale: El contexto del trono muestra seres celestiales exaltados, no animales ordinarios. «Seres vivientes» conserva el sentido de la escena y es una fórmula natural y reconocible en español bíblico.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  lexicon: BDAG
  rationale: El término designa a los veinticuatro ancianos celestiales. «Ancianos» es la equivalencia más directa y evita introducir terminología eclesiástica posterior que no está en el griego.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» transmite de manera concisa la proximidad espacial y reverencial del acto de adoración. En español suena más natural que una repetición pesada de «en presencia de».
- source_word: ἀρνίου
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el Corderito
  lexicon: BDAG
  rationale: Es el título cristológico establecido en Apocalipsis. «Cordero» mantiene su valor simbólico y sacrificial sin perder la referencia a Jesús.
- source_word: ἔχοντες ἕκαστος
  english_pob_choice: each holding
  chosen_spanish: cada uno con
  alternatives_spanish:
  - cada uno sosteniendo
  - teniendo cada uno
  lexicon: BDAG
  rationale: La construcción participial distributiva se expresa de forma natural en español como «cada uno con», que conserva la idea de reparto individual sin sonar forzado.
- source_word: κιθάραν
  english_pob_choice: a harp
  chosen_spanish: una arpa
  alternatives_spanish:
  - una lira
  - un arpa
  lexicon: BDAG
  rationale: La palabra griega puede referirse a un instrumento de cuerda tipo lira/arpa. Dado el antecedente auditado «a harp», se mantiene «arpa» como forma comprensible y tradicional en español, con posibilidad de otra equivalencia instrumentaI en nota.
- source_word: φιάλας χρυσᾶς
  english_pob_choice: golden bowls
  chosen_spanish: copas de oro
  alternatives_spanish:
  - copas doradas
  - cuencos de oro
  lexicon: BDAG
  rationale: φιάλη denota un recipiente poco profundo; en español «copa» comunica bien la forma del objeto y sugiere una vasija ceremonial. «De oro» conserva el matiz material de χρυσᾶς.
- source_word: γεμούσας θυμιαμάτων
  english_pob_choice: full of incense
  chosen_spanish: llenas de incienso
  alternatives_spanish:
  - llenas de perfumes
  - colmadas de incienso
  lexicon: BDAG
  rationale: 'El participio y el sustantivo se traducen con una formulación idiomática clara: «llenas de incienso». «Incienso» mantiene la referencia cultual y no diluye el símbolo.'
- source_word: αἵ εἰσιν αἱ προσευχαὶ τῶν ἁγίων
  english_pob_choice: which are the prayers of the saints
  chosen_spanish: que son las oraciones de los santos
  alternatives_spanish:
  - que son las oraciones de los santos de Dios
  - que representan las oraciones de los santos
  - que son las oraciones de los santos de Dios
  lexicon: BDAG
  rationale: Se conserva la cláusula equativa directa del griego («son»), evitando suavizar la identificación simbólica entre el incienso y las oraciones. «Santos» mantiene la terminología bíblica para el pueblo consagrado a Dios.
theological_decisions:
- issue: Identificación simbólica del incienso con las oraciones
  english_pob_reading: Render the clause directly as 'which are the prayers of the saints' without weakening the identification.
  chosen_spanish_reading: «que son las oraciones de los santos»
  alternative_spanish_readings:
  - «que representan las oraciones de los santos»
  - «que simbolizan las oraciones de los santos»
  rationale: El griego usa una cláusula copulativa simple (αἵ εἰσιν). Mantener «son» preserva la identificación simbólica sin reinterpretarla como mera semejanza o representación aproximada.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Rendering of ἅγιοι
  english_pob_reading: saints
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - santos de Dios
  - personas santas
  - los santos
  rationale: En este contexto litúrgico y apocalíptico, «santos» es la equivalencia más idiomática en español y conserva el uso teológico del término para el pueblo de Dios, sin cargarlo con la noción posterior de canonización.
  doctrine_reference: 'Translation philosophy #5'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el consenso del audit trail inglés y la lectura griega: βιβλίον como objeto enrollado, ζῷα como seres celestiales, κιθάρα como instrumento de cuerda, φιάλη como recipiente ritual y la cláusula final como identidad simbólica directa. No se aplicaron revisiones recientes, y el pasaje quedó estable en la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio para reflejar la coordinación narrativa del versículo.
  - «Cordero» se conserva como título cristológico fijo en Apocalipsis.
  - «Santos» se usa en sentido bíblico de los consagrados a Dios, no en sentido de canonización posterior.
  - La decisión de «copas de oro» busca naturalidad en español sin perder la referencia a φιάλας χρυσᾶς; puede leerse como vasijas rituales poco profundas.
