revisions:
- from: Y vi[a], en medio del trono y de los cuatro seres vivientes, y en medio de los ancianos, un Cordero que estaba de pie como inmolado, con siete cuernos y siete ojos[b], que son los siete Espíritus de Dios, enviados por toda la tierra.
  to: Y vi, en medio del trono y de los cuatro seres vivientes, y en medio de los ancianos, un Cordero que estaba de pie como inmolado[a], con siete cuernos y siete ojos[b], que son los siete Espíritus de Dios, enviados a toda la tierra.
  rationale: Se corrige la ubicación y el contenido de la nota [a] para que explique correctamente ὡς ἐσφαγμένον, y se ajusta «enviados por toda la tierra» a «enviados a toda la tierra» para reflejar mejor εἰς πᾶσαν τὴν γῆν y el audit trail inglés. El resto del versículo puede mantenerse.
  reviewer_model: gpt-5.4
