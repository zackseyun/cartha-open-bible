  text: Καὶ εἶδον ἐν μέσῳ τοῦ θρόνου καὶ τῶν τεσσάρων ζῴων καὶ ἐν μέσῳ τῶν πρεσβυτέρων ἀρνίον ⸀ἑστηκὸς ὡς ἐσφαγμένον, ⸀ἔχων κέρατα ἑπτὰ καὶ ὀφθαλμοὺς ἑπτά, ⸀οἵ εἰσιν τὰ ἑπτὰ πνεύματα τοῦ θεοῦ, ⸀ἀπεσταλμένοι εἰς πᾶσαν τὴν γῆν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/005/006.yaml
  text: And I saw[a], in the midst of the throne and of the four living creatures, and in the midst of the elders, a Lamb standing as though it had been slain, having seven horns and seven eyes[b], which are the seven Spirits of God sent out into all the earth.
  footnotes:
  - marker: a
    text: Or, more literally, 'as slain' or 'as if slaughtered.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the seven Spirits of God' is retained as written; some understand it as a symbolic way of speaking of the Holy Spirit in sevenfold fullness.
    reason: alternative_reading
