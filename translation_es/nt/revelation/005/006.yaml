translation:
  language: es
  text: Y vi, en medio del trono y de los cuatro seres vivientes, y en medio de los ancianos, un Cordero que estaba de pie como inmolado[a], con siete cuernos y siete ojos[b], que son los siete Espíritus de Dios, enviados a toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «como degollado» o «como si hubiera sido sacrificado».
    reason: lexical_alternative
  - marker: b
    text: Se conserva la expresión «los siete Espíritus de Dios» tal como está escrita; algunos la entienden como una manera simbólica de hablar del Espíritu Santo en plenitud septiforme.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν μέσῳ τοῦ θρόνου καὶ τῶν τεσσάρων ζῴων καὶ ἐν μέσῳ τῶν πρεσβυτέρων
  english_pob_choice: in the midst of the throne and of the four living creatures, and in the midst of the elders
  chosen_spanish: en medio del trono y de los cuatro seres vivientes, y en medio de los ancianos
  alternatives_spanish:
  - en el centro del trono y de los cuatro seres vivientes, y en medio de los ancianos
  - entre el trono y los cuatro seres vivientes, y entre los ancianos
  lexicon: BDAG
  rationale: Conservo la repetición de ἐν μέσῳ con 'en medio' para no suavizar la colocación espacial del escenario visionario. 'Seres vivientes' reproduce ζῴων en su sentido técnico apocalíptico, y 'ancianos' mantiene el grupo celestial designado por πρεσβυτέρων.
- source_word: ἀρνίον
  english_pob_choice: Lamb
  chosen_spanish: Cordero
  alternatives_spanish:
  - Corderito
  - Cordero pequeño
  lexicon: BDAG
  rationale: '''Cordero'' es la forma natural y reverente en español para el símbolo sacrificial y mesiánico. El diminutivo del griego no se traslada con ''corderito'' porque en español sonaría afectado y debilitaría la dignidad del título.'
- source_word: ἑστηκὸς
  english_pob_choice: standing
  chosen_spanish: que estaba de pie
  alternatives_spanish:
  - de pie
  - estando de pie
  lexicon: BDAG
  rationale: El participio perfecto presenta al Cordero en un estado visible de permanencia; 'que estaba de pie' lo expresa con naturalidad narrativa y conserva la imagen de presencia activa.
- source_word: ὡς ἐσφαγμένον
  english_pob_choice: as though it had been slain
  chosen_spanish: como inmolado
  alternatives_spanish:
  - como si hubiera sido sacrificado
  - como degollado
  lexicon: BDAG
  rationale: '''Inmolado'' conserva el matiz sacrificial de σφάζω mejor que ''matado'', y en español litúrgico sigue siendo claro. Para no exagerar la comparación, la fórmula breve ''como inmolado'' mantiene la tensión entre apariencia de muerte y vida presente.'
- source_word: ἔχων κέρατα ἑπτὰ
  english_pob_choice: having seven horns
  chosen_spanish: con siete cuernos
  alternatives_spanish:
  - teniendo siete cuernos
  - que tenía siete cuernos
  lexicon: BDAG
  rationale: Prefiero una construcción preposicional natural en español. 'Cuernos' se conserva literalmente porque el símbolo apocalíptico no debe ser explicado dentro de la traducción.
- source_word: ὀφθαλμοὺς ἑπτά
  english_pob_choice: seven eyes
  chosen_spanish: siete ojos
  alternatives_spanish:
  - siete miradas
  lexicon: BDAG
  rationale: La literalidad es necesaria aquí para mantener la secuencia simbólica del texto y su relación con la cláusula explicativa siguiente.
- source_word: οἵ εἰσιν
  english_pob_choice: which are
  chosen_spanish: que son
  alternatives_spanish:
  - los cuales son
  - estos son
  lexicon: BDAG
  rationale: '''Que son'' es el enlace más natural en español para la cláusula explicativa y mantiene la referencia inmediata a los siete ojos.'
- source_word: τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  english_pob_choice: the seven Spirits of God
  chosen_spanish: los siete Espíritus de Dios
  alternatives_spanish:
  - los siete espíritus de Dios
  - el Espíritu de Dios en plenitud septiforme
  lexicon: BDAG
  rationale: Conservo la expresión exacta del griego y del audit trail inglés, incluyendo la mayúscula en 'Espíritus' para señalar que el texto presenta una designación teológicamente cargada, no una simple pluralidad de espíritus. No la reduzco a una paráfrasis doctrinal.
- source_word: ἀπεσταλμένοι εἰς πᾶσαν τὴν γῆν
  english_pob_choice: sent out into all the earth
  chosen_spanish: enviados por toda la tierra
  alternatives_spanish:
  - enviados a toda la tierra
  - enviados por toda la tierra
  lexicon: BDAG
  rationale: '''Enviados'' reproduce el pasivo de ἀποστέλλω y ''por toda la tierra'' da en español la amplitud distributiva del original. Evito ''a través de'' porque perdería el matiz de difusión universal.'
theological_decisions:
- issue: Referente de la cláusula 'que son los siete Espíritus de Dios'
  english_pob_reading: The relative clause is taken to identify the Lamb's seven eyes with 'the seven Spirits of God.'
  chosen_spanish_reading: La cláusula identifica los siete ojos con los siete Espíritus de Dios.
  alternative_spanish_readings:
  - La cláusula podría entenderse de manera más laxa como referida a los cuernos y los ojos en conjunto.
  - La cláusula podría dejarse sin precisar el antecedente, pero eso oscurecería la relación gramatical inmediata.
  rationale: La sintaxis más cercana y coherente en español, como en el griego, es vincular la cláusula explicativa con 'siete ojos'. Conservo la identificación sin expandirla interpretativamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla por paráfrasis.
- issue: Expresión 'los siete Espíritus de Dios'
  english_pob_reading: Retain the phrase as written; some understand it as a symbolic way of speaking of the Holy Spirit in sevenfold fullness.
  chosen_spanish_reading: Mantengo la frase tal como está, sin convertirla en 'el Espíritu Santo en plenitud septiforme'.
  alternative_spanish_readings:
  - el Espíritu Santo en plenitud septiforme
  - el Espíritu de Dios en siete pliegues
  rationale: El texto griego dice literalmente 'los siete Espíritus de Dios', y la traducción debe conservar esa forma debatida. Así se respeta el lenguaje apocalíptico sin negar posibles lecturas trinitarias o simbólicas.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; esta propuesta sigue el último pase con acuerdo alto y sin cambios, manteniendo la misma decisión filosófica y las mismas tensiones exegéticas documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero aquí no aparece el nombre divino.
  - '''Mesías'' no aparece en este versículo; se conserva ''Cordero'' por requerimiento del símbolo apocalíptico.'
  - '''Espíritus'' va con mayúscula para reflejar la decisión inglesa y la carga teológica del sintagma.'
  - La puntuación conserva la cadencia del original y separa la cláusula explicativa final sin sobreinterpretarla.
