    text: O, más literalmente, «como degollado» o «como si hubiera sido sacrificado».
    reason: lexical_alternative
  - marker: b
    text: Se conserva la expresión «los siete Espíritus de Dios» tal como está escrita; algunos la entienden como una manera simbólica de hablar del Espíritu Santo en plenitud septiforme.
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación y el contenido de la nota [a] para que explique correctamente ὡς ἐσφαγμένον, y se ajusta «enviados por toda la tierra» a «enviados a toda la tierra» para reflejar mejor εἰς πᾶσαν τὴν γῆν y el audit trail inglés. El resto del versículo puede mantenerse.
