translation:
  language: es
  text: Y nadie en el cielo, ni en la tierra, ni debajo de la tierra, podía abrir el rollo[a] ni mirarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el libro'. La palabra griega puede designar un documento escrito en general, pero en este contexto 'rollo' encaja mejor con la imagen antigua.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - no uno
  lexicon: BDAG
  rationale: Pronombre negativo natural y solemne en español; mantiene la universalidad de la negación sin sonar artificial.
- source_word: ἐδύνατο
  english_pob_choice: was able
  chosen_spanish: podía
  alternatives_spanish:
  - era capaz de
  - pudo
  lexicon: BDAG
  rationale: El imperfecto expresa la incapacidad en el marco narrativo. 'Podía' reproduce bien el valor modal continuo y fluye con naturalidad en español.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo
  - en el cielo mismo
  lexicon: BDAG
  rationale: En español bíblico actual, 'el cielo' comunica con claridad el ámbito celestial; la forma con artículo es natural y conserva el singular del griego.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: BDAG
  rationale: Aunque ἐπί con genitivo puede sugerir 'sobre', en español 'en la tierra' es más idiomático y mantiene el contraste cósmico con 'en el cielo'.
- source_word: ὑποκάτω τῆς γῆς
  english_pob_choice: under the earth
  chosen_spanish: debajo de la tierra
  alternatives_spanish:
  - bajo la tierra
  - debajo de la tierra
  lexicon: BDAG
  rationale: '''Debajo de la tierra'' conserva la tríada espacial sin forzar un tecnicismo; suena natural y refleja el alcance cosmológico del texto.'
- source_word: ἀνοῖξαι
  english_pob_choice: to open
  chosen_spanish: abrir
  alternatives_spanish:
  - abrir
  - desplegar
  lexicon: BDAG
  rationale: Infinitivo simple y directo; no se necesita expansión interpretativa.
- source_word: τὸ βιβλίον
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el rollo
  - el libro
  lexicon: BDAG
  rationale: En este contexto visionario, βιβλίον se refiere mejor a un rollo antiguo. 'Rollo' evita el anacronismo de 'libro' y sigue la decisión del POB inglés.
- source_word: οὔτε βλέπειν αὐτό
  english_pob_choice: or to look at it
  chosen_spanish: ni mirarlo
  alternatives_spanish:
  - ni verlo
  - ni mirarlo
  lexicon: BDAG
  rationale: '''Mirarlo'' expresa mejor el acto de dirigir la vista hacia el objeto con intención o examen, algo más ajustado al contexto que un mero ''verlo''. La coordinación negativa con ''ni'' reproduce bien οὔτε.'
theological_decisions:
- issue: Alcance cósmico de los incapaces de abrir el rollo
  english_pob_reading: 'Retain the three-tier spatial language literally: ''in heaven or on the earth or under the earth.'''
  chosen_spanish_reading: 'Conservar la triple localización: ''en el cielo, ni en la tierra, ni debajo de la tierra''.'
  alternative_spanish_readings:
  - en todas partes
  - en todo el universo
  rationale: La escena apocalíptica enfatiza incapacidad universal mediante una tríada espacial tradicional. Mantenerla evita aplanar la imagen en una paráfrasis abstracta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'even' porque no está expresado en el griego; por eso el español evita añadir un matiz equivalente y conserva solo la negación coordinada de οὔτε. También se mantuvo la tríada espacial literal y la preferencia por 'scroll/rollo' como decisión lexical ya auditada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en otros contextos cuando corresponde; aquí no aparece el nombre divino explícito.
  - '''Cielo/tierra/debajo de la tierra'' conserva la estructura cósmica del pasaje sin paráfrasis interpretativa.'
  - La coordinación negativa 'ni... ni... ni...' refleja bien la serie de negaciones del griego.
  - '''Rollo'' mantiene coherencia con la opción inglesa ''scroll'' y evita el anacronismo de ''libro''.'
