    issue: La coordinación española inicia con 'Y nadie en el cielo, ni en la tierra, ni debajo de la tierra' en lugar de repetir 'o' como en el inglés auditado.
    rationale: No es un problema de fidelidad; en español la serie negativa con 'nadie... ni... ni...' es plenamente natural y expresa correctamente el alcance universal de la negación.
