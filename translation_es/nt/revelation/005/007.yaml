    issue: «del que estaba sentado» debilita el valor del participio presente τοῦ καθημένου
    rationale: El griego presenta al entronizado como «el que está sentado / el sentado», no como un trasfondo narrativo pasado. En español, «está sentado» conserva mejor el estado presente de la escena visionaria y armoniza con la decisión inglesa «the one seated».
