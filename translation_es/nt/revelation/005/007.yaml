translation:
  language: es
  text: Y vino y lo tomó de la mano derecha del que está sentado en el trono.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι narra el movimiento del Cordero hacia el entronizado. En español, «vino» reproduce de forma natural el avance narrativo; «llegó» puede sonar más a arribo que al movimiento en curso, y «se acercó» añade una interpretación espacial no explícita en el verbo.
- source_word: εἴληφεν
  english_pob_choice: took it
  chosen_spanish: lo tomó
  alternatives_spanish:
  - ha tomado
  - lo recibió
  lexicon: BDAG
  rationale: El perfecto de λαμβάνω puede vertirse aquí con un pasado simple natural en español dentro de una secuencia narrativa. «Lo tomó» conserva la acción directa y permite suplir el objeto implícito por el contexto inmediato; «lo recibió» debilita el matiz de acción directa.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  lexicon: BDAG
  rationale: La preposición señala origen o fuente. En español, «de» es la forma más idiomática para expresar que el Cordero tomó el rollo desde la mano derecha del entronizado; «desde» suena menos natural con este complemento.
- source_word: τῆς δεξιᾶς
  english_pob_choice: the right hand
  chosen_spanish: la mano derecha
  alternatives_spanish:
  - el lado derecho
  lexicon: BDAG
  rationale: En esta construcción, δεξιά se refiere a la mano derecha, no solo al lado derecho. «La mano derecha» preserva la imagen concreta y la carga simbólica de autoridad; «el lado derecho» atenúa esa concreción.
- source_word: τοῦ καθημένου
  english_pob_choice: the one seated
  chosen_spanish: del que estaba sentado
  alternatives_spanish:
  - del que se sienta
  - del sentado
  lexicon: BDAG
  rationale: El participio presente de κάθημαι funciona sustantivamente. «Del que estaba sentado» expresa en español la referencia personal y el estado continuo de la figura en el trono, con tono natural y reverente. «Del que se sienta» sonaría menos idiomático en este contexto.
- source_word: ἐπὶ τοῦ θρόνου
  english_pob_choice: on the throne
  chosen_spanish: en el trono
  alternatives_spanish:
  - sobre el trono
  lexicon: BDAG
  rationale: La preposición ἐπί con este sustantivo indica ubicación en el trono. «En el trono» es claro y natural en español; «sobre el trono» es posible pero menos idiomático en una formulación narrativa breve.
theological_decisions:
- issue: Objeto implícito de εἴληφεν
  english_pob_reading: Supplied 'it' in English, referring to the scroll from the immediate context.
  chosen_spanish_reading: Se suplió «lo» para referir el rollo del contexto inmediato.
  alternative_spanish_readings:
  - Y vino y tomó de la mano derecha...
  - Y vino y lo recibió de la mano derecha...
  rationale: El griego omite el objeto porque queda claro por el contexto previo; el español requiere pronombre expreso para la claridad. «Lo» mantiene la referencia al rollo sin añadir contenido nuevo. No se explicita «el rollo» para no introducir de nuevo una referencia que el contexto ya sostiene.
  doctrine_reference: Translation philosophy §1, §6
- issue: Identidad del entronizado
  english_pob_reading: the one seated on the throne
  chosen_spanish_reading: del que estaba sentado en el trono
  alternative_spanish_readings:
  - del que se sienta en el trono
  - del que está sentado en el trono
  rationale: Se conserva la distinción entre el Cordero y el entronizado sin añadir explicación doctrinal. «Estaba sentado» refleja bien el participio sustantivado y su estado en la visión; evita la rigidez de una traducción demasiado literal y mantiene la dignidad del pasaje.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo y no presentan notas textuales ni revisiones pendientes; por eso el borrador español sigue de cerca la solución inglesa, ajustando solo la idiomaticidad necesaria para el español.
  spanish_consistency_notes:
  - Se mantiene «mano derecha» para δεξιά, en coherencia con el valor concreto del término en este pasaje.
  - Se usa «trono» de forma uniforme para θρόνος.
  - Se conserva el sujeto implícito de la visión con «el que estaba sentado», sin sustituirlo por fórmulas litúrgicas tradicionales.
  - No se introducen notas al pie porque no hay variantes textuales ni alternativas exegéticas que requieran marcación en este versículo.
