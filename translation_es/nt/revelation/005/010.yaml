translation:
  language: es
  text: y los hiciste un reino[a] y sacerdotes para nuestro Dios, y reinarán en la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «reyes y sacerdotes» en lugar de «un reino y sacerdotes».
    reason: textual_variant
  - marker: b
    text: Algunos manuscritos leen «reinan en la tierra» en lugar de «reinarán en la tierra».
    reason: textual_variant
lexical_decisions:
- source_word: ἐποίησας
  english_pob_choice: you made
  chosen_spanish: los hiciste
  alternatives_spanish:
  - los hiciste llegar a ser
  - los hiciste
  lexicon: BDAG
  rationale: El aoristo ἐποίησας expresa una acción completa; en español, «hiciste» conserva la fuerza directa y natural. Evité una perífrasis más explicativa porque el texto no exige matizar el proceso.
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los
  lexicon: BDAG
  rationale: El pronombre acusativo plural se representa con el objeto directo «los», que es más natural en español y mantiene la referencia a los redimidos del contexto inmediato.
- source_word: τῷ θεῷ ἡμῶν
  english_pob_choice: to our God
  chosen_spanish: para nuestro Dios
  alternatives_spanish:
  - a nuestro Dios
  - para nuestro Dios
  lexicon: BDAG
  rationale: El dativo puede expresar finalidad/dedicación. «Para nuestro Dios» comunica bien la idea de constitución y consagración sin sonar forzado en español. «A nuestro Dios» queda como alternativa cercana al griego.
- source_word: βασιλείαν
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - un reino
  - reyes
  lexicon: BDAG
  rationale: Aunque el inglés POB traduce «a kingdom», en español «un reino» mantiene el singular colectivo del sustantivo griego. Se preserva así la lectura principal del texto adoptado, frente a la variante «kings».
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes
  lexicon: BDAG
  rationale: «Sacerdotes» es el equivalente directo y estándar de ἱερεῖς. Mantiene la alusión a Éxodo 19:6 y Apocalipsis 1:6 sin introducir matices ajenos.
- source_word: βασιλεύουσιν
  english_pob_choice: they reign
  chosen_spanish: reinan
  alternatives_spanish:
  - reinarán
  - reinan
  lexicon: BDAG
  rationale: Sigo el texto griego provisto, que presenta un presente/futuro morfológico y, según el historial inglés, se decidió finalmente por el presente en la revisión. En español, «reinan» conserva esa lectura sin forzar una futura interpretación.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: BDAG
  rationale: «Sobre la tierra» traduce con naturalidad ἐπὶ + genitivo y respeta el matiz espacial/dominativo posible del griego sin intensificarlo demasiado. «En la tierra» es posible, pero menos cercano a la preposición.
theological_decisions:
- issue: 'βασιλείαν: reino frente a reyes'
  english_pob_reading: a kingdom
  chosen_spanish_reading: un reino
  alternative_spanish_readings:
  - reyes
  rationale: El texto griego adoptado lee βασιλείαν, no βασιλεῖς. Por eso la traducción principal debe reflejar «un reino». Se conserva la variante tradicional «reyes» solo como referencia textual, no como lectura principal.
  doctrine_reference: 'Revelation 5:10 textual basis; translation philosophy #1 and #3'
- issue: Tiempo verbal de βασιλεύουσιν
  english_pob_reading: they reign
  chosen_spanish_reading: reinan
  alternative_spanish_readings:
  - reinarán
  rationale: El contexto de revisión inglesa muestra que la comunidad textual terminó prefiriendo el presente para reflejar la lectura griega provista. En español, «reinan» mantiene esa decisión y evita introducir una futura escatológica no exigida por este testimonio textual.
  doctrine_reference: Revelation 5:10 textual basis; revision awareness
translation_notes:
  revision_awareness: 'El historial inglés muestra una revisión importante sobre βασιλεύουσιν: la traducción pasó de «will reign» a «reign» para ajustarse al presente del texto griego provisto. La versión española sigue esa decisión y evita reintroducir el futuro. También se conserva la variante textual de βασιλείαν frente a la tradición «kings».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «nuestro Dios» para el dativo relacional.
  - Se usa «sacerdotes» por ser el equivalente directo y eclesialmente transparente de ἱερεῖς.
  - Se evita «Cristo» porque no aparece en este versículo ni en el aparato provisto.
  - La coordinación española conserva la estructura breve del griego sin añadir sujetos o auxiliares innecesarios.
