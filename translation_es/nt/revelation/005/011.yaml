translation:
  language: es
  text: Y miré[a], y oí la voz de muchos ángeles alrededor del trono y de los seres vivientes y de los ancianos, y su número era miríadas de miríadas y miles de miles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vi» al comienzo del versículo.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «miríadas de miríadas y miles de miles», un modismo para una multitud inmensa; también puede leerse, de manera más literal, «diez mil de diez mil y miles de miles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I looked
  chosen_spanish: miré
  alternatives_spanish:
  - vi
  lexicon: BDAG
  rationale: En este contexto visionario, "miré" conserva el movimiento narrativo de dirigir la atención antes de oír lo que sigue. "Vi" también es posible, pero "miré" refleja mejor la secuencia con "oí" sin perder el sentido de visión.
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  lexicon: BDAG
  rationale: Es el equivalente natural y directo de ἤκουσα en español narrativo. Mantiene la relación inmediata con la voz que se escucha en la escena.
- source_word: φωνὴν
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - una voz
  - el sonido
  lexicon: BDAG
  rationale: Aunque el griego no tiene artículo, en español suena natural con artículo definido porque la frase genitiva identifica de qué voz se trata. "El sonido" sería menos personal y menos fiel al contexto.
- source_word: ἀγγέλων πολλῶν
  english_pob_choice: of many angels
  chosen_spanish: de muchos ángeles
  alternatives_spanish:
  - de una gran multitud de ángeles
  lexicon: BDAG
  rationale: Traducción directa y sobria del genitivo plural. "Muchos ángeles" preserva el peso de la multitud sin añadir matices no exigidos por el texto.
- source_word: κύκλῳ
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - rodeando
  - en círculo alrededor de
  lexicon: BDAG
  rationale: '"Alrededor de" es la forma más natural en español para indicar la posición espacial en torno al trono y a los otros seres.'
- source_word: ζῴων
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - los seres vivos
  lexicon: BDAG
  rationale: Se mantiene la designación apocalíptica distintiva sin reducirla a "animales". "Seres vivientes" comunica bien la categoría visionaria de Apocalipsis y evita una lectura demasiado ordinaria.
- source_word: πρεσβυτέρων
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  lexicon: BDAG
  rationale: '"Ancianos" es la opción española estable y natural para los πρεσβύτεροι de la escena del trono. "Presbíteros" sería más técnico pero menos transparente para la lectura general.'
- source_word: ἦν ὁ ἀριθμὸς αὐτῶν
  english_pob_choice: their number was
  chosen_spanish: su número era
  alternatives_spanish:
  - el número de ellos era
  lexicon: BDAG
  rationale: Conserva la afirmación explícita sobre la cantidad y su formulación sencilla en español. "Su número era" es la equivalencia más natural y fiel.
- source_word: μυριάδες μυριάδων
  english_pob_choice: myriads of myriads
  chosen_spanish: miríadas de miríadas
  alternatives_spanish:
  - diez mil veces diez mil
  - decenas de miles por decenas de miles
  lexicon: BDAG
  rationale: '"Miríadas" reproduce el valor tradicional del término griego y mantiene el tono elevado del pasaje. Se conserva la repetición idiomática sin interpretarla como un número exacto.'
- source_word: χιλιάδες χιλιάδων
  english_pob_choice: thousands of thousands
  chosen_spanish: miles de miles
  alternatives_spanish:
  - millares de millares
  - miles y miles
  lexicon: BDAG
  rationale: Mantiene la segunda expresión paralela y su fuerza acumulativa. "Miles de miles" es claro, dignificado y suficientemente literal para la construcción repetida del griego.
theological_decisions:
- issue: Naturaleza de los ζῷα en la escena celestial
  english_pob_reading: the living creatures
  chosen_spanish_reading: los seres vivientes
  alternative_spanish_readings:
  - las criaturas vivientes
  - los seres vivos
  rationale: La traducción conserva la identidad apocalíptica específica de estos seres en Apocalipsis, sin rebajarlos a animales comunes ni convertirlos en una categoría abstracta. Es una decisión lexical con implicación interpretativa mínima, pero importante para la consistencia del libro.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la progresión visionaria de “miré / oí”, conserva la designación apocalíptica de ζῷα como “seres vivientes”, y reproduce la expresión numérica idiomática con un equivalente español igualmente solemne. No hay cambios de revisión pendientes en el pass más reciente.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se conserva “ancianos” para πρεσβύτεροι, conforme al uso estable en la escena del trono.
  - Se evita “criaturas” o “animales” para ζῷα para no desdibujar su identidad específica en Apocalipsis.
  - La puntuación en español separa con punto y coma la clausula media para reflejar bien la estructura acumulativa del griego.
