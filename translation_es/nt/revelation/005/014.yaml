translation:
  language: es
  text: 'Y los cuatro seres vivientes[a] decían: «¡Amén!». Y los ancianos se postraron y adoraron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos añaden un objeto explícito, como «al que vive por los siglos de los siglos» o «a él», después de «adoraron». El texto principal sigue la lectura más corta de SBLGNT, que deja el objeto implícito por el contexto.
    reason: textual_variant
lexical_decisions:
- source_word: ζῷα
  english_pob_choice: living creatures
  chosen_spanish: seres vivientes
  alternatives_spanish:
  - criaturas vivientes
  - seres vivos
  lexicon: BDAG
  rationale: En Apocalipsis, ζῷον no se refiere a animales comunes, sino a los seres celestiales del trono. «Seres vivientes» mantiene esa referencia y suena natural en español, sin reducirlos a «criaturas» en sentido genérico.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. En español, «decían» conserva bien ese valor aspectual de manera más fluida que una perífrasis más pesada.
- source_word: Ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - En verdad
  lexicon: BDAG
  rationale: Como aclamación litúrgica, conviene preservar la forma tradicional transliterada. «Amén» es reconocible y conserva el valor de fórmula de adoración.
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - viejos
  lexicon: BDAG
  rationale: En el contexto de Apocalipsis se trata de un grupo/título celestial, no solo de edad. «Ancianos» comunica esa función en español y evita un tecnicismo eclesiástico no requerido por el griego.
- source_word: ἔπεσαν
  english_pob_choice: fell down
  chosen_spanish: se postraron
  alternatives_spanish:
  - cayeron
  - se inclinaron
  lexicon: BDAG
  rationale: El verbo describe una caída/prostración física en contexto de adoración. «Se postraron» transmite mejor el gesto reverente que un simple «cayeron».
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - rindieron adoración
  - se inclinaron en adoración
  lexicon: BDAG
  rationale: En este marco del trono celestial, προσκυνέω denota acto de adoración, no solo reverencia corporal. «Adoraron» conserva la fuerza religiosa del término.
theological_decisions:
- issue: Objeto de la adoración omitido en el texto griego de SBLGNT
  english_pob_reading: Retain the Greek's absolute 'worshiped' without supplying an explicit object.
  chosen_spanish_reading: Mantener «adoraron» sin añadir un objeto explícito.
  alternative_spanish_readings:
  - adoraron al que vive por los siglos de los siglos
  - lo adoraron
  - adoraron a Dios
  rationale: El texto griego termina con προσεκύνησαν sin objeto expreso. El español puede conservar esa apertura sin importar una aclaración de otras tradiciones textuales o del contexto amplio. Así se preserva la tensión textual documentada.
  doctrine_reference: Primacía del texto original; evitar resolver una tensión textual no resuelta por SBLGNT.
translation_notes:
  revision_awareness: La traducción sigue la lectura corta de SBLGNT y mantiene el imperfecto de ἔλεγον con un español natural. Se preserva la omisión del objeto de προσεκύνησαν, tal como en el texto griego base y en el audit trail en inglés.
  spanish_consistency_notes:
  - «Amén» se conserva como aclamación litúrgica estándar.
  - «Seres vivientes» sigue el uso apocalíptico establecido para ζῷα y evita la lectura de animales literales.
  - «Ancianos» se usa como título/grupo celestial en el contexto de Apocalipsis.
  - «Se postraron y adoraron» mantiene la distinción entre el gesto físico y el acto religioso.
