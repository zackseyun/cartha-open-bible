revisions:
- from: Y vi en la mano derecha del que estaba sentado en el trono un rollo[a] escrito por dentro y por fuera[b], sellado con siete sellos.
  to: Y vi en la mano derecha del que está sentado en el trono un rollo[a] escrito por dentro y por el reverso[b], sellado con siete sellos.
  rationale: Se ajusta ὄπισθεν a 'por el reverso' para preservar la imagen física específica documentada por el POB inglés ('on the back') en vez del más general 'por fuera'. También se cambia 'del que estaba sentado' a 'del que está sentado' para reflejar mejor el valor descriptivo del participio griego en un español natural y digno.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: vio un objeto en la mano derecha del entronizado, identificado descriptivamente, y lo presenta como un rollo sellado con siete sellos. Sin embargo, en ἔσωθεν καὶ ὄπισθεν el POB inglés documenta de manera deliberada ''within and on the back'', y el español ''por dentro y por fuera'' desplaza el sentido físico específico de ὄπισθεν (''en el reverso / en la parte de atrás'') hacia un ''afuera'' más general. Además, ''del que estaba sentado'' introduce un matiz imperfectivo pasado más fuerte que el participio descriptivo; ''del que está sentado'' o ''del que estaba sentado'' son ambos posibles, pero el primero preserva mejor la descripción más atemporal del griego en español bíblico natural.'
  spanish_quality_summary: El español es claro y legible. 'Rollo', 'sellado con siete sellos' y 'en la mano derecha' funcionan bien. No obstante, 'por dentro y por fuera' es menos preciso que 'por dentro y por el reverso', y una leve mejora de estilo sería 'del que está sentado en el trono', que suena natural, digno y más cercano al valor descriptivo del participio.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Rollo' alinea bien con βιβλίον en este contexto. No aparecen términos del glosario mayor como Yahvé/Mesías. La principal cuestión léxica es mantener la decisión auditada de ὄπισθεν como 'en el reverso / en la parte de atrás', no simplemente 'por fuera'.
  issues:
  - severity: medium
    issue: '''por dentro y por fuera'' suaviza la especificidad de ὄπισθεν'
    rationale: El griego y el POB inglés favorecen la imagen material de un rollo escrito 'por dentro y en el reverso'. 'Por fuera' es entendible, pero es más general y no preserva tan fielmente la decisión léxica documentada.
  - severity: low
    issue: '''del que estaba sentado'' puede sonar más narrativamente pasado que descriptivo'
    rationale: El participio τοῦ καθημένου describe al entronizado. En español bíblico natural, 'del que está sentado en el trono' comunica mejor la función descriptiva sin sobrecargar el tiempo verbal.
  - severity: low
    issue: La nota b del borrador no refleja con precisión la dirección del texto principal revisado
    rationale: Si se corrige el texto a 'por dentro y por el reverso', la nota debe conservar la alternativa 'por fuera' como opción más general, no como equivalente principal.
  revised_spanish_text: Y vi en la mano derecha del que está sentado en el trono un rollo[a] escrito por dentro y por el reverso[b], sellado con siete sellos.
  revised_footnotes:
  - marker: a
    text: O «libro». El griego βιβλίον en este contexto probablemente se refiere a un rollo y no a un libro con páginas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «escrito por dentro y en la parte de atrás». Algunas traducciones vierten la segunda expresión de manera más general como «por fuera».
    reason: lexical_alternative
  revision_rationale: Se ajusta ὄπισθεν a 'por el reverso' para preservar la imagen física específica documentada por el POB inglés ('on the back') en vez del más general 'por fuera'. También se cambia 'del que estaba sentado' a 'del que está sentado' para reflejar mejor el valor descriptivo del participio griego en un español natural y digno.
