translation:
  language: es
  text: Y vi en la mano derecha del que está sentado en el trono un rollo[a] escrito por dentro y por el reverso[b], sellado con siete sellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libro». El griego βιβλίον en este contexto probablemente se refiere a un rollo y no a un libro con páginas.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «escrito por dentro y en la parte de atrás». Algunas traducciones vierten la segunda expresión de manera más general como «por fuera».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - y vi
  - miré
  lexicon: BDAG
  rationale: El aoristo narrativo de ὁράω se expresa de forma natural en pasado simple. ‘Vi’ conserva la inmediatez narrativa sin añadir matices no presentes en el griego.
- source_word: ἐπὶ τὴν δεξιὰν
  english_pob_choice: in the right hand
  chosen_spanish: en la mano derecha
  alternatives_spanish:
  - en su mano derecha
  - sobre la mano derecha
  lexicon: BDAG
  rationale: Aunque ἐπί con acusativo puede sugerir ‘sobre/upon’, en este giro con ‘mano derecha’ la idea es localización/posesión en la mano. ‘En la mano derecha’ es la forma natural y fiel en español.
- source_word: τοῦ καθημένου ἐπὶ τοῦ θρόνου
  english_pob_choice: of the one seated on the throne
  chosen_spanish: del que estaba sentado en el trono
  alternatives_spanish:
  - del que se sienta en el trono
  - del que estaba sentado sobre el trono
  lexicon: BDAG
  rationale: El participio sustantivado se vierte con relativa descriptiva. ‘Estaba sentado’ preserva el valor descriptivo del participio y funciona con naturalidad reverente en español.
- source_word: βιβλίον
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - libro
  lexicon: BDAG
  rationale: En este contexto βιβλίον designa más probablemente un rollo que un libro codex. ‘Rollo’ refleja mejor la realidad material y mantiene la decisión léxica base del POB inglés.
- source_word: γεγραμμένον
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - inscrito
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo expresa un estado resultante: el objeto está en condición de escrito. ‘Escrito’ es conciso y natural.'
- source_word: ἔσωθεν καὶ ὄπισθεν
  english_pob_choice: within and on the back
  chosen_spanish: por dentro y por fuera
  alternatives_spanish:
  - dentro y por detrás
  - en el interior y en el reverso
  lexicon: BDAG
  rationale: La pareja adverbial apunta a ambas caras del rollo. ‘Por dentro y por fuera’ conserva la imagen física sin forzar una interpretación más técnica que el español común puede entender.
- source_word: κατεσφραγισμένον
  english_pob_choice: sealed
  chosen_spanish: sellado
  alternatives_spanish:
  - completamente sellado
  lexicon: BDAG
  rationale: El perfecto pasivo indica un estado ya establecido. ‘Sellado’ comunica ese estado de manera directa; el prefijo intensivo no requiere explicitación.
- source_word: σφραγῖσιν ἑπτά
  english_pob_choice: with seven seals
  chosen_spanish: con siete sellos
  alternatives_spanish:
  - por siete sellos
  lexicon: BDAG
  rationale: La dativa instrumental se expresa naturalmente con ‘con’. Esta fórmula mantiene la equivalencia semántica y la fluidez del español.
theological_decisions:
- issue: Identificación del entronizado
  english_pob_reading: the one seated on the throne
  chosen_spanish_reading: el que estaba sentado en el trono
  alternative_spanish_readings:
  - el que se sienta en el trono
  - aquel que estaba sentado en el trono
  rationale: Se conserva la descripción del texto sin introducir una identificación más específica. Esto mantiene la tensión literaria y teológica del pasaje tal como la presenta el griego y el POB inglés.
  doctrine_reference: Preservar tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'El POB inglés mantuvo ‘scroll’ y añadió una nota léxica; también preservó literalmente la imagen de ‘written within and on the back’ con nota alternativa. Esta versión española sigue la misma línea: ‘rollo’ y ‘por dentro y por fuera’, sin suavizar la imagen ni resolver la tensión del objeto material.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiere; aquí no aparece.
  - Se evitó ‘SEÑOR’ como sustituto porque el pasaje no contiene el nombre divino ni κύριος.
  - ‘Rollo’ mantiene la decisión léxica de βιβλίον frente a ‘libro’.
  - ‘Sellado’ conserva el estado resultante del participio perfecto pasivo.
  - La descripción del entronizado permanece deliberadamente general.
