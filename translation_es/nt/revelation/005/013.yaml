translation:
  language: es
  text: 'Y oí a toda criatura que está en el cielo y en la tierra y debajo de la tierra y en el mar[a], y todo lo que hay en ellos, diciendo: «Al que está sentado en el trono y al Cordero, la bendición y la honra y la gloria y el dominio por los siglos de los siglos»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda cosa creada».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a los siglos de los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν κτίσμα
  english_pob_choice: every creature
  chosen_spanish: toda criatura
  alternatives_spanish:
  - toda cosa creada
  - toda creación
  lexicon: BDAG
  rationale: κτίσμα puede referirse a una criatura o a una cosa creada. En el contexto de alabanza universal, donde los sujetos oyen y dicen, «toda criatura» conserva mejor el rasgo personal/vocal que «toda creación», sin perder el alcance distributivo de πᾶν.
- source_word: ὃ ἐν τῷ οὐρανῷ ... καὶ τὰ ἐν αὐτοῖς πάντα
  english_pob_choice: in heaven and on the earth and under the earth and on the sea, and all that is in them
  chosen_spanish: que está en el cielo y en la tierra y debajo de la tierra y en el mar, y a todas las cosas que están en ellos
  alternatives_spanish:
  - que está en el cielo ... y todo lo que hay en ellos
  - en el cielo ... y todo lo que está en ellos
  lexicon: BDAG
  rationale: La serie expresa una totalidad cósmica por merismo. «Cielo» traduce οὐρανός en este marco apocalíptico, y «a todas las cosas que están en ellos» mantiene la amplitud inclusiva de τὰ ἐν αὐτοῖς πάντα sin convertirla en una paráfrasis más libre.
- source_word: ἤκουσα λέγοντας
  english_pob_choice: I heard ... saying
  chosen_spanish: oí ... diciendo
  alternatives_spanish:
  - oí que decían
  - oí a ... decir
  lexicon: BDAG
  rationale: En español, «oí ... diciendo» sigue siendo natural en este tipo de escena auditiva y preserva la construcción participial sin añadir demasiado. La idea colectiva de los hablantes queda clara por el contexto.
- source_word: Τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  english_pob_choice: To the one seated on the throne
  chosen_spanish: Al que está sentado en el trono
  alternatives_spanish:
  - Al que se sienta en el trono
  - Al que está sentado sobre el trono
  lexicon: BDAG
  rationale: El participio articular se vierte con una relativa sustantivada natural en español. «Está sentado» conserva el sentido actual del participio y es una fórmula reverente y clara.
- source_word: τῷ ἀρνίῳ
  english_pob_choice: the Lamb
  chosen_spanish: al Cordero
  alternatives_spanish:
  - al Corderito
  - al Cordero de Dios
  lexicon: BDAG
  rationale: ἀρνίον es el título cristológico ya establecido en Apocalipsis; «Cordero» preserva la intertextualidad sacrificial y evita suavizar el término.
- source_word: ἡ εὐλογία
  english_pob_choice: blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - la alabanza
  - la bendición divina
  lexicon: BDAG
  rationale: En una doxología, εὐλογία se entiende mejor como bendición atribuida. «Bendición» es la equivalencia más directa y litúrgicamente sobria.
- source_word: ἡ τιμή
  english_pob_choice: honor
  chosen_spanish: la honra
  alternatives_spanish:
  - el honor
  - la estimación
  lexicon: BDAG
  rationale: «Honra» funciona bien en español bíblico y mantiene la solemnidad de τιμή. Aquí se prefiere esta forma por su fluidez en la serie «bendición, honra, gloria, dominio».
- source_word: ἡ δόξα
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - el resplandor
  lexicon: BDAG
  rationale: «Gloria» es la traducción estándar y más transparente para δόξα en contextos de adoración.
- source_word: τὸ κράτος
  english_pob_choice: dominion
  chosen_spanish: el dominio
  alternatives_spanish:
  - el poder
  - la soberanía
  lexicon: BDAG
  rationale: κράτος señala poder ejercido o autoridad efectiva. «Dominio» preserva bien el matiz regio/doxológico que la POB inglesa captó con «dominion».
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y por siempre
  - por los siglos eternos
  lexicon: BDAG
  rationale: La locución española tradicional expresa con naturalidad la duración ilimitada del idiomático «to the ages of ages» y es plenamente comprensible en registro eclesial.
theological_decisions:
- issue: Doxología conjunta dirigida al que está sentado en el trono y al Cordero
  english_pob_reading: 'Single doxological acclamation addressed jointly: ''To the one seated on the throne and to the Lamb be ...'''
  chosen_spanish_reading: Una sola aclamación de alabanza dirigida conjuntamente al que está sentado en el trono y al Cordero.
  alternative_spanish_readings:
  - Repetir la fórmula verbal para cada destinatario
  - Interpretar el texto como dos alabanzas separadas
  rationale: El griego presenta una única ascripción de bendición, honra, gloria y dominio a ambos destinatarios. La traducción conserva esa unidad litúrgica y cristológica sin desdoblarla artificialmente.
  doctrine_reference: Credo Niceno (381); cristología alta de Apocalipsis
- issue: Alcance de κτίσμα en la escena cósmica
  english_pob_reading: Use 'every creature' rather than 'all creation'
  chosen_spanish_reading: Usar «toda criatura» en lugar de «toda la creación».
  alternative_spanish_readings:
  - toda la creación
  - toda cosa creada
  rationale: El contexto no describe una abstracción impersonal, sino voces que dicen en adoración. «Toda criatura» conserva mejor la idea de seres capaces de alabar, al mismo tiempo que mantiene el alcance universal del texto.
  doctrine_reference: Apocalipsis 5:13; lectura semántica de κτίσμα
translation_notes:
  revision_awareness: 'Coincide con el testimonio base y con el último pase de revisión: no se registran cambios aplicados en el audit trail inglés; la solución española mantiene la misma lectura textual y las mismas decisiones léxicas principales, adaptándolas a un registro natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «Cordero» como término cristológico fijo coherente con Apocalipsis y con el registro del texto.
  - 'Se conserva la serie doxológica con sustantivos paralelos: bendición, honra, gloria y dominio.'
  - «Cielo» se usa para οὐρανός en el marco cósmico de Apocalipsis, no como una simplificación devocional.
  - La puntuación reproduce una única frase de alabanza con cita directa al final, en estilo publicable y sobrio.
