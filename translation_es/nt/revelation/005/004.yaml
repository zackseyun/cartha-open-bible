base_translation:
  language: en
  yaml_path: translation/nt/revelation/005/004.yaml
  text: And I was weeping greatly because no one was found worthy to open the scroll or to look at it[a][b].
  footnotes:
  - marker: a
    text: Or "the book." The Greek word βιβλίον can mean either, but in this setting "scroll" best fits the ancient form and the imagery of opening it.
    reason: lexical_alternative
  - marker: b
    text: Or "to look at it." The phrase may mean simply seeing it, but in context likely refers to looking into its contents.
    reason: lexical_alternative
