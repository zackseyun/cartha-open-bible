translation:
  language: es
  text: Y yo estaba llorando mucho porque nadie fue hallado digno de abrir el rollo[a] ni de mirarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el libro». La palabra griega βιβλίον puede significar ambas cosas, pero en este pasaje «rollo» encaja mejor con la forma antigua y con la imagen de abrirlo.
    reason: lexical_alternative
  - marker: b
    text: O «verlo». La frase puede significar simplemente verlo, pero en el contexto probablemente se refiere a mirar su contenido.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἐγώ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Entonces yo
  lexicon: BDAG
  rationale: La conjunción enlaza la escena y el pronombre explícito conserva el énfasis de ἐγώ sin sobrecargarlo; en español, «Y yo» suena natural y mantiene la primera persona del relato.
- source_word: ἔκλαιον
  english_pob_choice: was weeping
  chosen_spanish: estaba llorando
  alternatives_spanish:
  - lloraba
  - estaba llorando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua en el pasado. «Estaba llorando» reproduce bien esa duratividad con español natural y sin perder la intensidad narrativa.
- source_word: πολὺ
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - intensamente
  lexicon: BDAG
  rationale: El acusativo adverbial intensifica el llanto. «Mucho» es idiomático en español y conserva la fuerza sin añadir matices emocionales no explicitados.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - no se encontró a nadie
  - ninguna persona
  lexicon: BDAG
  rationale: La forma negativa indefinida se expresa de manera directa con «nadie». En la pasiva impersonal española, «no se encontró a nadie» mantiene la ausencia total de una persona apta.
- source_word: ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - merecedor
  - apto
  lexicon: BDAG
  rationale: En este contexto la palabra conserva peso moral y de idoneidad ante Dios. «Digno» es el equivalente más natural y solemne en español para preservar esa gravedad.
- source_word: εὑρέθη
  english_pob_choice: was found
  chosen_spanish: se encontró
  alternatives_spanish:
  - fue hallado
  - se halló
  lexicon: BDAG
  rationale: La voz pasiva aorista se vierte con una construcción impersonal natural en español. «Se encontró» comunica el resultado sin añadir agencia explícita.
- source_word: ἀνοῖξαι
  english_pob_choice: to open
  chosen_spanish: abrir
  alternatives_spanish:
  - desatar
  - abrirlo
  lexicon: BDAG
  rationale: El infinitivo es directo y no requiere expansión. «Abrir» conserva la acción básica requerida por la dignidad mencionada.
- source_word: τὸ βιβλίον
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el libro
  - el pergamino
  lexicon: BDAG
  rationale: En el contexto apocalíptico, βιβλίον designa un objeto enrollado; «rollo» comunica mejor la forma antigua y mantiene la imaginería de apertura. «Libro» queda como alternativa posible, pero menos precisa aquí.
- source_word: οὔτε βλέπειν αὐτό
  english_pob_choice: or to look at it
  chosen_spanish: ni de mirarlo
  alternatives_spanish:
  - ni de verlo
  - ni de examinarlo
  lexicon: BDAG
  rationale: El infinitivo con οὔτε se expresa con una coordinación negativa natural en español. «Mirarlo» conserva la referencia visual simple sin sobreinterpretar «examinar su contenido».
theological_decisions:
- issue: Matiz de ἄξιος en la escena celestial
  english_pob_reading: Render as 'worthy' with moral and covenantal weight intact
  chosen_spanish_reading: Renderizar como «digno» con peso moral y de idoneidad ante Dios
  alternative_spanish_readings:
  - merecedor
  - apto
  rationale: La escena no trata solo de capacidad técnica, sino de idoneidad moral y espiritual para actuar sobre el contenido del rollo. «Digno» preserva mejor esa carga teológica que opciones más funcionales.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de βλέπειν αὐτό en el contexto
  english_pob_reading: Or 'to look at it'
  chosen_spanish_reading: «ni de mirarlo» sin expandir a «examinarlo» en el texto principal
  alternative_spanish_readings:
  - ni de verlo
  - ni de examinarlo
  rationale: El griego puede entenderse como una mirada simple al objeto o, por contexto, una mirada relacionada con su contenido. En el texto principal conviene no añadir una precisión interpretativa mayor de la que el griego exige.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB en inglés que prefirió «to look at it» frente a «to look into it». En español se reflejó esa mayor cercanía léxica con «mirarlo», evitando una expansión interpretativa en el texto principal y conservando la alternativa contextual en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se prefirió «digno» y no «merecedor» para conservar la solemnidad teológica de ἄξιος.
  - Se eligió «rollo» en lugar de «libro» para reflejar el objeto apocalíptico antiguo de βιβλίον.
  - La coordinación negativa «ni de mirarlo» sigue el paralelismo de οὔτε sin calcar de forma rígida la sintaxis griega.
