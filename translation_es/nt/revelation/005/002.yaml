translation:
  language: es
  text: 'Y vi a un ángel poderoso que proclamaba con voz fuerte: «¿Quién es digno de abrir el rollo[a] y romper sus sellos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libro». La palabra griega βιβλίον puede referirse en general a un documento escrito, pero aquí «rollo» encaja mejor con un objeto sellado con varios sellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελον ἰσχυρόν
  english_pob_choice: a mighty angel
  chosen_spanish: un ángel poderoso
  alternatives_spanish:
  - un ángel fuerte
  - un ángel de gran poder
  lexicon: BDAG
  rationale: ἰσχυρός expresa fuerza o poder. En español, «poderoso» comunica mejor esa fuerza en un ser celestial y suena natural en este contexto apocalíptico.
- source_word: κηρύσσοντα
  english_pob_choice: proclaiming
  chosen_spanish: que proclamaba
  alternatives_spanish:
  - que anunciaba
  - que predicaba
  lexicon: BDAG
  rationale: κηρύσσω denota anunciar públicamente o proclamar como heraldo. «Proclamaba» conserva el tono solemne y público mejor que «predicaba».
- source_word: ἐν φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - con voz alta
  - en voz fuerte
  lexicon: BDAG
  rationale: La expresión griega es una fórmula idiomática de habla audible e intensa. «Con voz fuerte» es natural en español y mantiene el énfasis sin sonar rígido.
- source_word: Τίς ἄξιος
  english_pob_choice: Who is worthy
  chosen_spanish: ¿Quién es digno?
  alternatives_spanish:
  - ¿Quién es merecedor?
  - ¿Quién es apto?
  lexicon: BDAG
  rationale: ἄξιος aquí expresa aptitud o dignidad para una tarea solemne. «Digno» es la forma más fiel y teológicamente resonante en español.
- source_word: τὸ βιβλίον
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el libro
  - el documento
  lexicon: BDAG
  rationale: Aunque βιβλίον puede significar «libro», en Apocalipsis 5 el objeto sellado con varios sellos se entiende mejor como un rollo. «Rollo» preserva la forma histórica implícita en la escena.
- source_word: λῦσαι τὰς σφραγῖδας αὐτοῦ
  english_pob_choice: and break its seals
  chosen_spanish: y desatar sus sellos
  alternatives_spanish:
  - y romper sus sellos
  - y abrir sus sellos
  lexicon: BDAG
  rationale: λύω literalmente significa desatar, soltar o liberar. En relación con sellos, el sentido idiomático apunta a retirar o romper lo que impide abrir el rollo. Se mantiene «desatar» para conservar la relación con el verbo griego, dejando visible la tensión con la idea de romper o quitar los sellos.
theological_decisions:
- issue: Naturaleza del objeto βιβλίον en la visión
  english_pob_reading: scroll
  chosen_spanish_reading: rollo
  alternative_spanish_readings:
  - libro
  - documento
  rationale: 'La decisión sigue el contexto visual y material de la escena: un objeto escrito con múltiples sellos. «Rollo» evita anacronismos y refleja mejor la imagen apocalíptica que «libro» en español.'
  doctrine_reference: Translation philosophy §1 (primacía del lenguaje original y del contexto histórico)
- issue: Valor semántico de λύω con σφραγίδες
  english_pob_reading: break its seals
  chosen_spanish_reading: desatar sus sellos
  alternative_spanish_readings:
  - romper sus sellos
  - quitar sus sellos
  - abrir sus sellos
  rationale: El inglés POB opta por «break its seals» para expresar el resultado contextual de λύω. En español, «desatar» conserva el vínculo léxico con λύω, aunque la escena implique la retirada o ruptura de los sellos. Se preserva así la tensión entre el verbo literal y el efecto contextual.
  doctrine_reference: BDAG, λύω; criterio de equivalencia óptima en contexto apocalíptico
translation_notes:
  revision_awareness: 'El pasaje fue revisado en el audit trail inglés y quedó sin cambios, con alto grado de acuerdo entre revisores. La versión española refleja esa estabilidad: conserva la elección contextual de βιβλίον como «rollo» y mantiene la tensión léxica de λύω con «desatar», en lugar de suavizarla con una paráfrasis.'
  spanish_consistency_notes:
  - Se usa «Y vi» para mantener la secuencia narrativa del griego καὶ εἶδον.
  - «Ángel poderoso» reproduce la fuerza de ἰσχυρός sin calco torpe.
  - «Proclamaba» conserva el matiz público y solemne de κηρύσσοντα.
  - «Digno» sigue la formulación estable de ἄξιος en este contexto.
  - «Rollo» se prefiere por coherencia con la nota lexical histórica del inglés POB.
  - «Desatar sus sellos» mantiene visible la relación con λύω, aun cuando el inglés explicite el sentido como «break its seals».
