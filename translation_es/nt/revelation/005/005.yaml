  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/esclavo/etc. Los títulos mesiánicos se conservan correctamente. «Ha vencido» es aceptable para νικάω, con nota alternativa «ha conquistado». «Rollo» para βιβλίον está bien. «De la tribu de Judá» es una excepción documentada y apropiada frente a un más literal «de/desde la tribu».
