translation:
  language: es
  text: 'Y uno de los ancianos me dice: «No llores. He aquí, el León de la tribu de Judá[a], la Raíz de David, ha vencido[b], para abrir[c] el rollo y sus siete sellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad, más literal según el griego ἐκ, es: «el León desde la tribu de Judá» o «el León procedente de la tribu de Judá»; la forma más tradicional es «el León de la tribu de Judá».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha conquistado». En Apocalipsis, νικάω es un verbo clave de victoria y conquista.'
    reason: lexical_alternative
  - marker: c
    text: El infinitivo griego ἀνοῖξαι también puede traducirse más literalmente como «abrir».
    reason: lexical_alternative
lexical_decisions:
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: BDAG
  rationale: En Apocalipsis, el grupo celestial designado por πρεσβύτεροι se entiende mejor como un cargo/figura reconocible. 'Ancianos' conserva la referencia al grupo sin introducir una terminología eclesiástica más específica que el contexto no exige.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dice a mí
  - me dice
  lexicon: BDAG
  rationale: El presente narrativo se mantiene bien con 'dice', conservando la vivacidad del griego sin forzar un pasado narrativo.
- source_word: Μὴ κλαῖε
  english_pob_choice: Do not weep
  chosen_spanish: No llores
  alternatives_spanish:
  - No llores más
  - Deja de llorar
  lexicon: BDAG
  rationale: κλαίω expresa llanto/sollozo; 'No llores' es natural en español y preserva el tono pastoral y urgente del mandato.
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  lexicon: BDAG
  rationale: Como marcador discursivo de atención, 'Mira' comunica la deíxis del griego en español moderno sin sonar arcaico.
- source_word: ἐνίκησεν
  english_pob_choice: has conquered
  chosen_spanish: ha vencido
  alternatives_spanish:
  - ha conquistado
  - ha vencido/ha sobrepuesto
  lexicon: BDAG
  rationale: νικάω en Apocalipsis enfatiza la victoria efectiva. 'Ha vencido' es idiomático en español y mantiene el campo semántico de triunfo, con menos dureza que 'ha conquistado'.
- source_word: ὁ λέων ὁ ἐκ τῆς φυλῆς Ἰούδα
  english_pob_choice: the Lion from the tribe of Judah
  chosen_spanish: el León de la tribu de Judá
  alternatives_spanish:
  - el León de la tribu de Judá
  - el León procedente de la tribu de Judá
  lexicon: BDAG
  rationale: Aunque ἐκ puede sugerir procedencia, en esta construcción nominal tradicional y bíblica la relación más natural en español es 'de la tribu de Judá'. Esto preserva la frase mesiánica reconocible sin perder fidelidad al identificador bíblico.
- source_word: ἡ ῥίζα Δαυίδ
  english_pob_choice: the Root of David
  chosen_spanish: la Raíz de David
  alternatives_spanish:
  - la raíz de David
  lexicon: BDAG
  rationale: Se conserva el título mesiánico con mayúscula en 'Raíz' para reflejar su función titulativa en el contexto apocalíptico, coherente con la decisión inglesa de tratarlo como designación cristológica.
- source_word: ἀνοῖξαι
  english_pob_choice: to open
  chosen_spanish: para abrir
  alternatives_spanish:
  - a fin de abrir
  - para que abra
  lexicon: BDAG
  rationale: El infinitivo aoristo se vierte como infinitivo final natural en español. 'Para abrir' conserva la relación de resultado/propósito sin añadir una explicación explícita más allá del griego.
- source_word: τὸ βιβλίον
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el libro
  - el pergamino
  lexicon: BDAG
  rationale: En el entorno apocalíptico, βιβλίον designa un rollo, no un libro en formato codex. 'Rollo' evita anacronismo y refleja mejor el objeto sellado.
- source_word: σφραγῖδας
  english_pob_choice: seals
  chosen_spanish: sellos
  alternatives_spanish:
  - sellos de cera
  - selladuras
  lexicon: BDAG
  rationale: '''Sellos'' es el equivalente directo y claro para σφραγίς en este contexto de cierre de un rollo.'
- source_word: αὐτοῦ
  english_pob_choice: its
  chosen_spanish: sus
  alternatives_spanish:
  - de él
  - del rollo
  lexicon: BDAG
  rationale: El pronombre se refiere al rollo; en español, 'sus siete sellos' es la posesión más natural y transparente.
theological_decisions:
- issue: Títulos mesiánicos aplicados a Jesús
  english_pob_reading: 'Retain both titles as explicit messianic designations: ''the Lion from the tribe of Judah, the Root of David.'''
  chosen_spanish_reading: 'Mantener ambos títulos como designaciones mesiánicas explícitas: ''el León de la tribu de Judá, la Raíz de David''.'
  alternative_spanish_readings:
  - parafrasear los títulos
  - explicar los títulos en el cuerpo del versículo
  rationale: El verso acumula identificadores reales y mesiánicos tomados de las Escrituras de Israel. Conservarlos sin expansión interpretativa mantiene la fuerza cristológica del texto.
  doctrine_reference: Affirmations; Translation philosophy §§1-2, 6
- issue: Relación entre ἐνίκησεν y ἀνοῖξαι
  english_pob_reading: 'Express the infinitive as result/qualification: ''has conquered, to open.'''
  chosen_spanish_reading: 'Expresar el infinitivo como finalidad/resultado: ''ha vencido, para abrir''.'
  alternative_spanish_readings:
  - ha vencido, para que abra
  - ha vencido y puede abrir
  rationale: El griego vincula la victoria con la apertura del rollo. 'Para abrir' comunica esa relación en español sin añadir la noción de capacidad o derecho que no aparece explícitamente en esta cláusula.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa más reciente conservó la formalidad de 'Behold' y redujo la expansión interpretativa del infinitivo a 'to open'. Esta versión española responde con un equivalente natural y digno ('Mira') y mantiene el valor infinitivo con 'para abrir', evitando una paráfrasis excesiva pero preservando la relación de resultado entre la victoria y la apertura del rollo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Mesías/Cristo'' no aparece en el versículo; se conservan solo los títulos apocalípticos presentes en el griego.'
  - '''Ancianos'' se usa para πρεσβύτεροι como término de grupo en el contexto celestial.'
  - '''Rollo'' traduce βιβλίον en el contexto de un documento sellado, evitando ''libro'' por anacronismo.'
