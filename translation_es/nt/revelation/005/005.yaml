base_translation:
  language: en
  yaml_path: translation/nt/revelation/005/005.yaml
  text: And one of the elders says to me[a], “Do not weep. Behold, the Lion from the tribe of Judah, the Root of David, has conquered[c][b], to open the scroll and its seven seals.”
  footnotes:
  - marker: a
    text: Or, more traditionally, “the Lion of the tribe of Judah.”
    reason: lexical_alternative
  - marker: b
    text: Or “has overcome.” The Greek verb is a key Revelation term for victorious conquest.
    reason: lexical_alternative
  - marker: c
    text: The phrase “so that he can open” renders a Greek infinitive that may also be translated more literally as “to open.”
    reason: lexical_alternative
