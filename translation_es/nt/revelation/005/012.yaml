translation:
  language: es
  text: 'diciendo con voz potente: «Digno es el Cordero[a], el que fue inmolado, de recibir el poder, la riqueza[b], la sabiduría, la fuerza[c], el honor, la gloria y la bendición»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que fue sacrificado». El griego también puede traducirse más gráficamente como «el que fue degollado», pero «inmolado» conserva mejor el tono solemne del culto.
    reason: lexical_alternative
  - marker: b
    text: O «las riquezas».
    reason: lexical_alternative
  - marker: c
    text: O «el vigor» o «la potencia» para distinguir ἰσχύς de «poder» (δύναμις).
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - mientras decían
  lexicon: BDAG
  rationale: El participio se conserva como forma verbal dependiente del contexto anterior; «diciendo» mantiene la relación participial sin forzar una perífrasis más explicativa.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - con voz alta
  - en voz alta
  lexicon: BDAG
  rationale: «Con voz fuerte» comunica el valor concreto de la expresión y suena natural en español, preservando la imagen de una proclamación audible y solemne.
- source_word: Ἄξιόν ἐστιν
  english_pob_choice: Worthy is
  chosen_spanish: Digno es
  alternatives_spanish:
  - Es digno
  - Digno es de
  lexicon: BDAG
  rationale: La inversión es posible en español para conservar el énfasis doxológico del griego. «Digno es» reproduce mejor la elevación litúrgica que una formulación más plana.
- source_word: τὸ ἀρνίον
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el Cordero de Dios
  - el corderito
  lexicon: BDAG
  rationale: En Apocalipsis, ἀρνίον es un título cristológico fijo; «el Cordero» mantiene la identificación titular sin añadir explícitamente una fórmula no presente en el verso.
- source_word: τὸ ἐσφαγμένον
  english_pob_choice: who was slain
  chosen_spanish: el que fue inmolado
  alternatives_spanish:
  - el que fue sacrificado
  - el que fue degollado
  lexicon: BDAG
  rationale: «Inmolado» conserva el matiz sacrificial del participio pasivo perfecto de σφάζω y su dignidad cultual. «Degollado» sería más gráfico, pero más áspero para este contexto de adoración.
- source_word: λαβεῖν
  english_pob_choice: to receive
  chosen_spanish: de recibir
  alternatives_spanish:
  - para recibir
  - a recibir
  lexicon: BDAG
  rationale: El infinitivo de finalidad/aptitud se vierte de manera natural con «de recibir» tras «digno es», manteniendo la estructura de mérito y concesión.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: el poder
  alternatives_spanish:
  - la potestad
  - la fuerza
  lexicon: BDAG
  rationale: «Poder» es el equivalente más directo y estable de δύναμις en este listado. Se conserva como primer término de la serie.
- source_word: πλοῦτον
  english_pob_choice: wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - las riquezas
  - la abundancia
  lexicon: BDAG
  rationale: «Riqueza» reproduce bien la idea de abundancia de recursos/valor. Se eligió singular para reflejar el sustantivo griego y su fuerza conceptual.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - el saber
  lexicon: BDAG
  rationale: Equivalencia directa y sobria; no requiere expansión interpretativa.
- source_word: ἰσχὺν
  english_pob_choice: might
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el vigor
  - la potencia
  lexicon: BDAG
  rationale: Se opta por «fuerza» para mantener una distinción comprensible frente a «poder» (δύναμις), conservando la variedad retórica del listado griego.
- source_word: τιμὴν
  english_pob_choice: honor
  chosen_spanish: el honor
  alternatives_spanish:
  - la honra
  lexicon: BDAG
  rationale: «Honor» es claro y solemne; en español bíblico actual evita ambigüedad con otras nociones de estima social.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  lexicon: BDAG
  rationale: Término bíblico estándar y plenamente transparente en español; conserva el valor doxológico.
- source_word: εὐλογίαν
  english_pob_choice: blessing
  chosen_spanish: la bendición
  alternatives_spanish:
  - la alabanza
  - la bendición recibida
  lexicon: BDAG
  rationale: La acepción principal aquí es la ascripción de bendición; «bendición» mantiene el paralelismo con los demás sustantivos del himno.
theological_decisions:
- issue: Título cristológico del Cordero
  english_pob_reading: the Lamb
  chosen_spanish_reading: el Cordero
  alternative_spanish_readings:
  - el cordero
  rationale: En Apocalipsis, ἀρνίον funciona como título cristológico. Se capitaliza para reflejar su uso titular y no como un simple animal, sin añadir contenido externo al texto.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Lenguaje sacrificial del participio perfecto pasivo
  english_pob_reading: who was slain
  chosen_spanish_reading: el que fue inmolado
  alternative_spanish_readings:
  - el que fue sacrificado
  - el que fue degollado
  rationale: El verso vincula la dignidad del Cordero con su muerte sacrificial. «Inmolado» mantiene ese enlace teológico y el tono de adoración; «degollado» sería más gráfico, pero menos adecuado para este himno.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Distinción entre δύναμις e ἰσχύς
  english_pob_reading: power ... might
  chosen_spanish_reading: el poder ... la fuerza
  alternative_spanish_readings:
  - el poder ... el vigor
  - la potestad ... la fuerza
  rationale: Se preserva la repetición diferenciada del griego sin homogeneizar ambos términos. «Poder» y «fuerza» ofrecen una distinción clara para el lector español, como hace la POB inglesa entre power y might.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el tramo auditado en inglés: se mantiene la estructura doxológica, la distinción entre δύναμις e ἰσχύς y el valor sacrificial de ἐσφαγμένον. La principal adaptación es idiomática en español, con inversión retórica en «Digno es» y selección de «inmolado» para la dignidad cultual del contexto.'
  spanish_consistency_notes:
  - Se capitaliza «Cordero» por su función titular cristológica en Apocalipsis.
  - Se conserva una lista coordinada de siete sustantivos con artículos definidos para claridad y ritmo.
  - Se usa «bendición» y no «alabanza», porque el término griego apunta primariamente a ascripción de bendición.
  - Se mantiene la diferencia semántica entre «poder» y «fuerza» para reflejar la variedad léxica del original.
