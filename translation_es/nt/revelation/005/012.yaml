    text: O «el que fue sacrificado». El griego también puede traducirse más gráficamente como «el que fue degollado», pero «inmolado» conserva mejor el tono solemne del culto.
    reason: lexical_alternative
  - marker: b
    text: O «las riquezas».
    reason: lexical_alternative
  - marker: c
    text: O «el vigor» o «la potencia» para distinguir ἰσχύς de «poder» (δύναμις).
    reason: lexical_alternative
  revision_rationale: 'Se hacen correcciones menores para mejorar la naturalidad del español y la coherencia de las notas sin alterar el contenido: «con voz potente» expresa mejor φωνῇ μεγάλῃ en registro solemne; se corrige la nota [c] para que ofrezca alternativas reales; y se aligera la puntuación de la enumeración manteniendo intacta la lista séptuple y su tono doxológico.'
