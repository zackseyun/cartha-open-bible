review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue de cerca la auditoría inglesa: mantiene el participio inicial, la dignidad doxológica de «Digno es», el título «el Cordero», la lista séptuple y la distinción entre δύναμις y ἰσχύς. Sin embargo, hay pequeños puntos de fidelidad y naturalidad que conviene ajustar: «con voz fuerte» suena menos idiomático que «con voz potente» o «en alta voz», y la nota [c] introduce erróneamente como alternativa el mismo término ya usado en el texto.'
  spanish_quality_summary: El español es claro y reverente, pero algo rígido por la repetición de comas antes de cada «y», y presenta una leve inconsistencia editorial en la nota [c]. «El que fue inmolado» es defendible y digno, aunque en esta construcción relativa conviene anclar también la alternativa inglesa «fue degollado»/«fue sacrificado» con más precisión. La mejora propuesta conserva el tono litúrgico y suena más natural en español eclesial amplio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Cordero» capitalizado concuerda con el uso titular cristológico. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La distinción «poder ... fuerza» está bien alineada con la rationale inglesa de δύναμις / ἰσχύς, pero la nota correspondiente debe corregirse para no repetir «fuerza» como alternativa al mismo término ya elegido.
  issues:
  - severity: medium
    issue: «con voz fuerte» es poco idiomático en este contexto doxológico
    rationale: φωνῇ μεγάλῃ significa literalmente «con gran voz», pero en español bíblico-natural «con voz potente» o «en alta voz» suena más propio que «con voz fuerte», que puede sugerir timbre más que volumen.
  - severity: low
    issue: La nota [c] es internamente inconsistente
    rationale: Dice «O “la fuerza” o “el vigor”» cuando el texto principal ya usa «la fuerza». Una nota de alternativa no debe ofrecer como alternativa la lectura adoptada.
  - severity: low
    issue: Puntuación algo calcada en la serie
    rationale: Las comas antes de cada «y» no son incorrectas en una lista solemne, pero cargan innecesariamente el español. Puede aligerarse sin perder el ritmo enumerativo.
  revised_spanish_text: 'diciendo con voz potente: «Digno es el Cordero[a], el que fue inmolado, de recibir el poder, la riqueza[b], la sabiduría, la fuerza[c], el honor, la gloria y la bendición»'
  revised_footnotes:
