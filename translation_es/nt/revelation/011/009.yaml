translation:
  language: es
  text: Y algunos de entre los pueblos y tribus y lenguas y naciones miran su cadáver[a] por tres días y medio, y no permiten que sus cadáveres sean puestos en una tumba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego primero dice «su cadáver» (singular) y luego «sus cadáveres» (plural). El singular puede presentar a los dos testigos como un solo testimonio corporativo antes de volver a los cuerpos individuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπουσιν
  english_pob_choice: look at
  chosen_spanish: miran
  alternatives_spanish:
  - observan
  - ven
  lexicon: BDAG
  rationale: «Miran» comunica la acción visual directa en un español natural y mantiene el aspecto presente y vívido del griego. «Observan» sería algo más formal; «ven» es menos activo y puede perder la intención de atención visual.
- source_word: ἐκ τῶν λαῶν καὶ φυλῶν καὶ γλωσσῶν καὶ ἐθνῶν
  english_pob_choice: some from the peoples and tribes and languages and nations
  chosen_spanish: de entre los pueblos y tribus y lenguas y naciones
  alternatives_spanish:
  - algunos de los pueblos y tribus y lenguas y naciones
  - gente de entre los pueblos y tribus y lenguas y naciones
  lexicon: BDAG
  rationale: La preposición ἐκ expresa procedencia partitiva; en español, «de entre» conserva mejor la idea de un subconjunto tomado de esos grupos. Mantengo la enumeración plural y formulaica de Apocalipsis.
- source_word: λαῶν
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - gentes
  - naciones
  lexicon: BDAG
  rationale: «Pueblos» preserva el valor colectivo plural y la cadencia de la lista. «Gentes» es posible, pero menos preciso en este contexto apocalíptico.
- source_word: φυλῶν
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - clanes
  lexicon: BDAG
  rationale: «Tribus» es el equivalente directo y el más natural en listas etnográficas bíblicas.
- source_word: γλωσσῶν
  english_pob_choice: languages
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - tongues
  lexicon: BDAG
  rationale: «Lenguas» mantiene la correspondencia bíblica tradicional y el paralelismo de la serie. «Idiomas» sería más explicativo pero menos literal.
- source_word: ἐθνῶν
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: BDAG
  rationale: «Naciones» es la opción más estable en la secuencia fija de Apocalipsis y evita restringir el sentido a «gentiles».
- source_word: τὸ πτῶμα αὐτῶν
  english_pob_choice: their dead body
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su cuerpo muerto
  - su cuerpo sin vida
  lexicon: BDAG
  rationale: El singular griego se conserva con «su cadáver», que refleja un solo referente colectivo y suena natural en español. Aunque el inglés POB alternó entre singular y plural para hacer visible la tensión, aquí el singular español comunica mejor esa primera cláusula sin perder el dato textual.
- source_word: ἡμέρας τρεῖς καὶ ἥμισυ
  english_pob_choice: for three and a half days
  chosen_spanish: por tres días y medio
  alternatives_spanish:
  - durante tres días y medio
  - por tres días y medio
  lexicon: BDAG
  rationale: «Por tres días y medio» expresa bien la duración en español y mantiene el valor temporal apocalíptico sin artificio.
- source_word: τὰ πτώματα αὐτῶν
  english_pob_choice: their bodies
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus cuerpos
  - sus cuerpos muertos
  lexicon: BDAG
  rationale: El plural del segundo miembro se conserva con «sus cadáveres», haciendo visible el cambio singular/plural del griego. «Cadáveres» mantiene además la muerte explícita que el contexto exige.
- source_word: οὐκ ἀφίουσιν
  english_pob_choice: they do not allow
  chosen_spanish: no permiten
  alternatives_spanish:
  - no dejan
  - no consienten
  lexicon: BDAG
  rationale: Aquí ἀφίημι significa permitir, no soltar ni abandonar. «No permiten» es claro y preciso en español.
- source_word: τεθῆναι εἰς μνῆμα
  english_pob_choice: to be laid in a tomb
  chosen_spanish: que sean puestos en un sepulcro
  alternatives_spanish:
  - que sean colocados en una tumba
  - que sean sepultados
  lexicon: BDAG
  rationale: «Ser puestos en un sepulcro» conserva el sentido de colocación en un lugar de entierro y evita el calco excesivo. «Sepulcro» es una opción digna y bíblicamente reconocible para μνῆμα.
theological_decisions:
- issue: Tensión singular/plural en la referencia a los dos testigos
  english_pob_reading: Preserve the singular in the first clause and the plural in the second
  chosen_spanish_reading: Conservar el singular en «su cadáver» y el plural en «sus cadáveres»
  alternative_spanish_readings:
  - Nivelar ambos miembros al plural para mayor fluidez
  - Usar plural en ambas cláusulas por claridad
  rationale: El griego presenta de forma intencional la oscilación entre un referente corporativo singular y una referencia plural posterior. Mantener esa variación en español respeta el dato textual y evita borrar una tensión significativa del pasaje.
  doctrine_reference: 'Translation philosophy §3: preserve meaningful textual/theological tension rather than smoothing it away.'
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó el primer miembro para reflejar mejor el plural posterior, pero el texto griego base sigue mostrando la oscilación singular/plural. En español se decidió mantener esa tensión visible con un singular en la primera cláusula y plural en la segunda, siguiendo la prioridad del source packet.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable en este versículo.
  - Se preserva la secuencia apocalíptica fija «pueblos, tribus, lenguas y naciones» con orden equivalente al griego.
  - Se usa «sepulcro» para μνῆμα como término bíblico claro y publicable en español.
  - Se evita harmonizar el número gramatical para no borrar el contraste entre τὸ πτῶμα y τὰ πτώματα.
