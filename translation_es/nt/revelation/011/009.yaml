  to: Y algunos de entre los pueblos y tribus y lenguas y naciones miran su cadáver[a] por tres días y medio, y no permiten que sus cadáveres sean puestos en una tumba.
  rationale: Se conserva fielmente el singular/plural del griego, pero se corrige el sistema de notas para que la explicación textual esté anclada en la expresión pertinente y no en el verbo. También se simplifican notas redundantes y se cambia 'sepulcro' por 'tumba' para un español más natural y ampliamente legible, sin pérdida de sentido.
