translation:
  language: es
  text: Pero el atrio exterior del templo[a], déjalo fuera y no lo midas, porque ha sido entregado a las naciones[b], y ellas pisotearán la ciudad santa durante cuarenta y dos meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el atrio exterior del santuario'. El griego ναός puede referirse más específicamente al santuario y no a todo el complejo del templo.
    reason: lexical_alternative
  - marker: b
    text: O 'a los gentiles'. El griego ἔθνεσιν puede significar 'naciones' o 'gentiles', según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐλή
  english_pob_choice: court
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - atrio del templo
  lexicon: BDAG
  rationale: En contexto del templo, αὐλή designa el área abierta asociada al santuario. En español, 'atrio' comunica mejor esa zona cultual que 'patio', y evita la ambigüedad doméstica de 'patio'. Se conserva la referencia espacial del recinto exterior sin forzar una lectura arquitectónica más precisa de la que el texto da.
- source_word: ἔξωθεν τοῦ ναοῦ
  english_pob_choice: outside the temple
  chosen_spanish: que está fuera del templo
  alternatives_spanish:
  - fuera del templo
  - que está fuera del santuario
  lexicon: BDAG
  rationale: La frase se traduce con una relativa natural en español para modificar 'atrio'. 'Templo' mantiene la lectura fluida, mientras que 'santuario' queda como alternativa porque ναός puede ser más específico y esa tensión debe conservarse.
- source_word: ἔκβαλε ἔξωθεν
  english_pob_choice: leave out
  chosen_spanish: deja fuera
  alternatives_spanish:
  - échalo fuera
  - exclúyelo
  lexicon: BDAG
  rationale: La expresión implica excluir del acto de medir, no una expulsión violenta. 'Deja fuera' reproduce bien la idea imperativa y resulta natural en español contemporáneo.
- source_word: μὴ αὐτὴν μετρήσῃς
  english_pob_choice: do not measure it
  chosen_spanish: no lo midas
  alternatives_spanish:
  - no la midas
  - no lo midas
  lexicon: BDAG
  rationale: El referente inmediato en español puede concordar con 'atrio' o con el conjunto implícito; se eligió el neutro 'lo' para mantener una referencia flexible y no resolver prematuramente una ambigüedad de concordancia que el español puede tolerar en lectura directa.
- source_word: ἐδόθη
  english_pob_choice: it has been given
  chosen_spanish: ha sido entregado
  alternatives_spanish:
  - ha sido dado
  - fue entregado
  lexicon: BDAG
  rationale: '''Entregado'' comunica la idea de ser puesto bajo dominio o disposición de otros con más fuerza contextual que un simple ''dado''. Conserva la pasiva sin explicitar un agente.'
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los gentiles
  - a las naciones
  lexicon: BDAG
  rationale: Se mantiene 'naciones' como traducción principal porque en este registro profético-apocalíptico preserva el sentido colectivo y político del término. 'Gentiles' se deja como alternativa por la tensión léxica presente en el griego.
- source_word: πόλιν τὴν ἁγίαν
  english_pob_choice: the holy city
  chosen_spanish: la ciudad santa
  alternatives_spanish:
  - la ciudad sagrada
  - la ciudad santa
  lexicon: BDAG
  rationale: Es la forma más natural y estable en español para la expresión bíblica, y conserva la identificación reverente de la ciudad sin añadir precisión interpretativa.
- source_word: πατήσουσιν
  english_pob_choice: they will trample
  chosen_spanish: será pisoteada
  alternatives_spanish:
  - será hollada
  - será pisoteada
  lexicon: BDAG
  rationale: El verbo expresa humillación y profanación hostil. En español pasivo resulta más idiomático aquí decir 'será pisoteada', manteniendo la violencia simbólica del término.
- source_word: μῆνας τεσσεράκοντα δύο
  english_pob_choice: for forty-two months
  chosen_spanish: durante cuarenta y dos meses
  alternatives_spanish:
  - por cuarenta y dos meses
  - durante cuarenta y dos meses
  lexicon: BDAG
  rationale: '''Durante'' expresa duración de manera natural en español y evita sonar demasiado literal o forzado.'
theological_decisions:
- issue: Especificidad de ναός en la imagen del templo
  english_pob_reading: Render ναός as 'temple' in the main text, while preserving 'sanctuary' as an alternative.
  chosen_spanish_reading: Usar 'templo' en el cuerpo principal, conservando 'santuario' como alternativa implícita en la documentación lexical.
  alternative_spanish_readings:
  - santuario
  rationale: En español, 'templo' es más transparente para el lector general, pero el griego puede apuntar al espacio sagrado más interno. La tensión interpretativa se mantiene en la nota lexical sin saturar el versículo.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Sentido de τοῖς ἔθνεσιν
  english_pob_reading: Use 'the nations' in the main text, with 'the Gentiles' preserved in a footnote.
  chosen_spanish_reading: Usar 'a las naciones' en el texto principal, preservando 'a los gentiles' como lectura alternativa.
  alternative_spanish_readings:
  - a los gentiles
  rationale: '''Naciones'' conserva mejor el alcance profético amplio del término y evita restringirlo innecesariamente a una categoría étnico-religiosa. La alternativa se deja abierta porque el griego admite ambas posibilidades.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La redacción sigue de cerca el testimonio griego SBLGNT y coincide sustancialmente con el análisis y las decisiones auditadas de la POB en inglés. No se detectaron revisiones aplicadas en la pasada más reciente; por eso se preserva la misma tensión léxica principal entre ναός/templo-santuario y ἔθνεσιν/naciones-gentiles.
  spanish_consistency_notes:
  - Se mantiene 'naciones' en el texto principal para ἔθνεσιν, con nota alternativa para 'gentiles'.
  - Se usa 'atrio' para αὐλή por ser el término cultual más natural en español, y se evita 'patio' por menor precisión reverente.
  - '''Templo'' se conserva en el cuerpo principal por legibilidad, pero la nota reconoce la posible mayor especificidad de ναός.'
  - La pasiva 'ha sido entregado' preserva la falta de agente explícito del griego.
  - '''Será pisoteada'' mantiene la violencia simbólica de πατήσουσιν sin atenuarla.'
