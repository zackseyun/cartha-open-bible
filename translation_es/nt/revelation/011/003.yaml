    text: Or more literally, 'And I will give to my two witnesses.' The Greek leaves unstated what is given; the sense is likely authority or commission to prophesy.
    reason: lexical_alternative
  - marker: b
    text: Sackcloth was associated with mourning, repentance, and prophetic lament.
    reason: cultural_note
