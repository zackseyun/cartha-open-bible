translation:
  language: es
  text: Y daré[a] a mis dos testigos, y profetizarán durante mil doscientos sesenta días, vestidos de cilicio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y daré a mis dos testigos». El griego deja sin expresar qué es lo que se da; el sentido probablemente es la comisión o capacidad para profetizar.'
    reason: lexical_alternative
  - marker: b
    text: El cilicio se asociaba con duelo, arrepentimiento y lamento profético.
    reason: cultural_note
lexical_decisions:
- source_word: δώσω
  english_pob_choice: I will give / grant
  chosen_spanish: daré
  alternatives_spanish:
  - concederé
  - otorgaré
  lexicon: BDAG
  rationale: El griego dice literalmente «daré», y el inglés POB revisado conservó ese valor básico sin añadir un objeto explícito. En español, «daré» mantiene la brevedad y deja también implícito qué se da, como en el original.
- source_word: τοῖς δυσὶν μάρτυσίν μου
  english_pob_choice: to my two witnesses
  chosen_spanish: a mis dos testigos
  alternatives_spanish:
  - a los dos testigos míos
  - a mis dos testigos
  lexicon: BDAG
  rationale: «Testigos» conserva el valor legal-testimonial de μάρτυς y encaja en el contexto apocalíptico. Se mantiene el posesivo en primera persona plural de la misma forma natural en español.
- source_word: προφητεύσουσιν
  english_pob_choice: they will prophesy
  chosen_spanish: profetizarán
  alternatives_spanish:
  - hablarán proféticamente
  lexicon: BDAG
  rationale: «Profetizarán» es el equivalente directo y más natural de προφητεύω en español bíblico contemporáneo.
- source_word: ἡμέρας χιλίας διακοσίας ἑξήκοντα
  english_pob_choice: for one thousand two hundred sixty days
  chosen_spanish: durante mil doscientos sesenta días
  alternatives_spanish:
  - por mil doscientos sesenta días
  - a lo largo de mil doscientos sesenta días
  lexicon: BDAG
  rationale: La duración expresada por el acusativo se vuelve de forma idiomática «durante». Se conserva el número completo sin simplificarlo.
- source_word: περιβεβλημένοι
  english_pob_choice: clothed
  chosen_spanish: vestidos
  alternatives_spanish:
  - cubiertos
  - llevando puesto
  lexicon: BDAG
  rationale: «Vestidos» comunica el estado resultante de la participio perfecto, y en español suena natural sin perder la imaginería formal.
- source_word: σάκκους
  english_pob_choice: in sackcloth
  chosen_spanish: de cilicio
  alternatives_spanish:
  - en cilicio
  - con cilicio
  lexicon: BDAG
  rationale: «Cilicio» es el término bíblico claro en español para la prenda de duelo/penitencia. Se evita una paráfrasis interpretativa en el texto principal y se mantiene la imagen profética.
theological_decisions:
- issue: Implied object of δώσω
  english_pob_reading: The revised English POB leaves the verb as 'I will give/grant' without adding 'authority' in the main text.
  chosen_spanish_reading: La versión principal conserva «daré» sin explicitar el objeto implícito.
  alternative_spanish_readings:
  - concederé autoridad a mis dos testigos
  - les daré autoridad para profetizar
  rationale: El griego omite el objeto de δώσω, y la revisión inglesa descartó añadir «authority» en el texto principal. Por eso el español conserva la misma tensión sintáctica y no interpreta de más.
  doctrine_reference: Translation philosophy §1, §6
- issue: Symbolic force of sackcloth
  english_pob_reading: The English POB retains the image 'clothed in sackcloth' and footnotes its mourning/repentance association.
  chosen_spanish_reading: La imagen se conserva como «vestidos de cilicio» y la nota explica su asociación cultural.
  alternative_spanish_readings:
  - vestidos de ropa de duelo
  - con vestiduras de lamento
  rationale: El texto no explica el símbolo; solo lo presenta. Mantener la imagen respeta la tensión profética y deja la interpretación contextual para la nota.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que retiró «authority» del texto principal por no estar explícita en el griego. Por eso el español también conserva el verbo simple «daré» y no añade un complemento interpretativo. También se preservó la imagen de «sackcloth» como «cilicio», con nota cultural, en lugar de reemplazarla por una explicación en el cuerpo del texto.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal del versículo: «daré» / «profetizarán».'
  - Se usó «testigos» para μάρτυς por su valor testimonial-legal, coherente con el resto del proyecto.
  - «Cilicio» funciona como equivalente bíblico estable en español y preserva la imaginería apocalíptica.
  - La puntuación sigue el orden natural del español y conserva la cadencia de una sola oración.
