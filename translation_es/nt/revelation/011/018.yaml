translation:
  language: es
  text: Y las naciones se enojaron, y vino tu ira, y el tiempo de que los muertos sean juzgados, y de dar la recompensa a tus siervos[a] —los profetas, los santos y los que temen tu nombre, los pequeños y los grandes—, y de destruir a los que destruyen la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esclavos' para 'tus siervos'; el griego doulos puede denotar siervo o esclavo, según el contexto.
    reason: alternative_reading
  - marker: b
    text: O 'los que arruinan/corrompen la tierra'; el griego gē también puede significar 'país' o 'territorio' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  - pueblos
  lexicon: BDAG
  rationale: En Apocalipsis, ἔθνη suele referirse a las naciones en conjunto. 'Naciones' mantiene ese valor colectivo y evita restringirlo indebidamente a 'gentiles' en contraste con judíos.
- source_word: ὠργίσθησαν
  english_pob_choice: became angry
  chosen_spanish: se enfurecieron
  alternatives_spanish:
  - se enojaron
  - se irritaron
  lexicon: BDAG
  rationale: El aoristo de ὀργίζομαι expresa que llegaron a un estado de ira. 'Se enfurecieron' conserva la fuerza verbal sin volverlo más técnico que el contexto apocalíptico.
- source_word: ὀργή
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  lexicon: BDAG
  rationale: Para la ira divina, el español natural y bíblico es 'ira'; comunica el matiz judicial y escatológico. 'Furor' sería más intenso, pero menos estable como equivalente general.
- source_word: καιρός
  english_pob_choice: time
  chosen_spanish: tiempo
  alternatives_spanish:
  - momento señalado
  - ocasión
  lexicon: BDAG
  rationale: Aquí καιρός es el momento decisivo fijado por Dios. 'Tiempo' es fiel y natural; el matiz de oportunidad/apunte queda dado por el contexto.
- source_word: νεκρῶν
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los fallecidos
  lexicon: BDAG
  rationale: La forma sustantivada es idiomáticamente 'los muertos'. 'Fallecidos' suena más eufemístico y menos directo.
- source_word: κριθῆναι
  english_pob_choice: to be judged
  chosen_spanish: para ser juzgados
  alternatives_spanish:
  - para recibir juicio
  - para ser llevados a juicio
  lexicon: BDAG
  rationale: El infinitivo pasivo judicial se expresa de modo directo con 'ser juzgados', que mantiene la relación con el juicio escatológico.
- source_word: μισθός
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - galardón
  - paga
  lexicon: BDAG
  rationale: '''Recompensa'' comunica retribución sin sugerir un salario literal; en español conserva bien el valor de μισθός en este contexto de juicio y vindicación.'
- source_word: δοῦλοις
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: Siguiendo la pauta POB de no suavizar δοῦλος cuando el valor léxico importa, 'esclavos' preserva la fuerza de pertenencia y subordinación. En este versículo, la lista de grupos de Dios puede leerse honoríficamente, pero el término griego conserva su crudeza semántica.
- source_word: προφήταις
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - profetas
  lexicon: BDAG
  rationale: La forma con artículo sugiere un grupo reconocible; 'los profetas' lo reproduce de manera natural.
- source_word: ἁγίοις
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los santos de Dios
  lexicon: BDAG
  rationale: '''Los santos'' es el equivalente tradicional y preciso para ἅγιοι en este contexto eclesial/apocalíptico.'
- source_word: φοβουμένοις τὸ ὄνομά σου
  english_pob_choice: those who fear your name
  chosen_spanish: los que temen tu nombre
  alternatives_spanish:
  - los que reverencian tu nombre
  lexicon: BDAG
  rationale: La expresión bíblica conserva el verbo 'temer' como idiomática de reverencia. 'Reverencian' aclara, pero debilita la intertextualidad del giro.
- source_word: μικροὺς καὶ τοὺς μεγάλους
  english_pob_choice: the small and the great
  chosen_spanish: los pequeños y los grandes
  alternatives_spanish:
  - los pequeños y los grandes por igual
  - los menores y los mayores
  lexicon: BDAG
  rationale: La pareja abarcan todos los niveles de estatus; 'los pequeños y los grandes' preserva la estructura paralela y la amplitud inclusiva.
- source_word: διαφθεῖραι
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - corromper
  lexicon: BDAG
  rationale: Aquí el infinitivo expresa retribución judicial. 'Destruir' es la opción más directa y coherente con el paralelismo del verso.
- source_word: τοὺς διαφθείροντας τὴν γῆν
  english_pob_choice: those who destroy the earth
  chosen_spanish: a los que destruyen la tierra
  alternatives_spanish:
  - a los que arruinan la tierra
  - a los que corrompen la tierra
  lexicon: BDAG
  rationale: Se conserva el juego de repetición verbal entre 'destruir' y 'destruyen'. 'Tierra' traduce γῆ con su posible sentido de mundo habitable; el contexto apocalíptico permite esa amplitud.
- source_word: γῆν
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra/land
  lexicon: BDAG
  rationale: Aunque γῆ puede significar 'land', en este marco cósmico y escatológico 'la tierra' funciona mejor en español y retiene la amplitud universal.
theological_decisions:
- issue: Término δοῦλος aplicado a los destinatarios de la recompensa
  english_pob_reading: servants, with a footnote noting 'slaves' as an alternative
  chosen_spanish_reading: esclavos, sin atenuación
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La guía del proyecto pide preservar la fuerza léxica de δοῦλος cuando sea pertinente. Aquí se opta por 'esclavos' para no diluir la carga semántica del término, aunque el contexto presenta a estos grupos como pertenencia fiel a Dios. La decisión mantiene la tensión entre dignidad del llamado y lenguaje de posesión.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy #1 y #5'
- issue: Sentido de γῆ en el clausulado final
  english_pob_reading: earth, with a note that gē can also mean land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra / la región
  - la tierra (o la tierra/país en otros contextos)
  rationale: En Apocalipsis el horizonte es cósmico y universal. 'La tierra' reproduce ese alcance; se deja constancia de que γῆ también puede ser 'tierra/país' en otros contextos, pero aquí no es la opción principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1 y #5'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el recorrido de revisión más reciente: no se requieren cambios mayores. Se adopta una opción española más explícita para δοῦλος (''esclavos'') para mantener la fuerza léxica que el audit trail preserva como alternativa viable.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Los muertos'' y ''ser juzgados'' siguen la sintaxis griega de manera transparente.'
  - Se conserva la repetición verbal 'destruir/destruyen' para reflejar el paralelismo retórico del original.
  - La puntuación con guiones largos ayuda a reflejar la acumulación enumerativa del griego sin añadir interpretación.
