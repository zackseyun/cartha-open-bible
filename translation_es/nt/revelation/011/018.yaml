base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/018.yaml
  text: And the nations became angry[a], and your wrath came, and the time for the dead to be judged, and to give the reward to your servants—the prophets, the saints, and those who fear your name[b], the small and the great—and to destroy those who destroy the earth.
  footnotes:
  - marker: a
    text: Or 'slaves' for 'your servants'; Greek doulos can denote a servant or a slave, depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'those who ruin/corrupt the earth'; Greek gē can also mean 'land.'
    reason: lexical_alternative
