revisions:
- from: Y las naciones se enfurecieron, y vino tu ira, y el tiempo de los muertos para ser juzgados, y para dar la recompensa a tus esclavos[a]—los profetas, los santos y los que temen tu nombre[b], pequeños y grandes—y para destruir a los que destruyen la tierra[c].
  to: Y las naciones se enojaron, y vino tu ira, y el tiempo de que los muertos sean juzgados, y de dar la recompensa a tus siervos[a] —los profetas, los santos y los que temen tu nombre, los pequeños y los grandes—, y de destruir a los que destruyen la tierra[b].
  rationale: La revisión corrige la principal divergencia con el audit trail al poner 'siervos' en el texto principal para δοῦλοις y dejar 'esclavos' como alternativa en nota. También suaviza ὠργίσθησαν a 'se enojaron', restituye la estructura inclusiva 'los pequeños y los grandes', y simplifica las notas para que reflejen mejor las alternativas realmente relevantes y documentadas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: la ira de las naciones, la venida de la ira divina, el tiempo de juzgar a los muertos, de dar la recompensa y de destruir a los destructores de la tierra. Sin embargo, se aparta del rastro auditado del POB en un punto significativo: δοῦλοις se vertió como ''esclavos'' en el texto principal, mientras que la decisión inglesa documentada para este versículo es ''servants'' por razón contextual, preservando ''slaves'' solo como alternativa. También conviene ajustar ''se enfurecieron'' a algo más cercano a ''became angry'' para no intensificar innecesariamente, y explicitar mejor ''los pequeños y los grandes'' con artículos, conforme al griego y al audit trail.'
  spanish_quality_summary: 'El español es claro y legible, pero presenta algunos detalles mejorables: ''se enfurecieron'' suena más fuerte que el original auditado; ''pequeños y grandes'' sin artículos después de la aposición queda un poco comprimido; y las notas b/c no siguen de cerca las alternativas preservadas por el POB inglés. Una revisión menor produce un español más natural, más preciso y más alineado con la documentación del proyecto.'
  glossary_alignment: 'Buena alineación en general: ἔθνη -> ''naciones'', ὀργή -> ''ira'', ἁγίοις -> ''los santos'', γῆ -> ''la tierra''. La desviación principal es δοῦλοις, donde el proyecto para este versículo prefiere ''siervos'' o ''servidores/siervos'' contextualmente sobre ''esclavos'' en el texto principal, con la alternativa indicada en nota. También la nota sobre γῆ debe conservar la alternativa ''tierra/país'' o ''tierra/land'' con más claridad, y no introducir una nota en b que el inglés no preservó como nota principal salvo si aporta claridad real; aquí no es necesaria.'
  issues:
  - severity: high
    issue: δοῦλοις traducido como 'esclavos' en el texto principal
    rationale: El audit trail inglés documenta explícitamente 'servants' en este contexto por tratarse de una designación honorífica del pueblo de Dios, dejando 'slaves' como alternativa en nota. El borrador invierte esa decisión sin una necesidad contextual fuerte.
  - severity: medium
    issue: '''se enfurecieron'' intensifica ὠργίσθησαν más allá de ''became angry'''
    rationale: El griego puede admitir intensidad, pero la decisión auditada eligió una formulación más sobria para preservar el contraste con 'tu ira'. 'Se enojaron' o 'se airaron' se acerca más.
  - severity: medium
    issue: Falta de artículos en 'pequeños y grandes'
    rationale: El griego tiene ambos artículos y el POB inglés conserva la estructura 'the small and the great'. En español, 'los pequeños y los grandes' suena más completo y fiel.
  - severity: low
    issue: La nota b introduce una alternativa no preservada como nota en el POB inglés
    rationale: '''Los que reverencian tu nombre'' es posible, pero el POB prefirió mantener ''temen tu nombre'' sin esa nota. No es un error grave, pero no hace falta para esta revisión y añade ruido.'
  - severity: low
    issue: La nota c puede formular mejor la alternativa lexical de γῆ
    rationale: Conviene reflejar que γῆ también puede significar 'tierra' en sentido de 'país/territorio', mientras que el texto principal mantiene el alcance cósmico de 'la tierra'.
  revised_spanish_text: Y las naciones se enojaron, y vino tu ira, y el tiempo de que los muertos sean juzgados, y de dar la recompensa a tus siervos[a] —los profetas, los santos y los que temen tu nombre, los pequeños y los grandes—, y de destruir a los que destruyen la tierra[b].
  revised_footnotes:
  - marker: a
    text: O 'esclavos' para 'tus siervos'; el griego doulos puede denotar siervo o esclavo, según el contexto.
    reason: alternative_reading
  - marker: b
    text: O 'los que arruinan/corrompen la tierra'; el griego gē también puede significar 'país' o 'territorio' según el contexto.
    reason: lexical_alternative
  revision_rationale: La revisión corrige la principal divergencia con el audit trail al poner 'siervos' en el texto principal para δοῦλοις y dejar 'esclavos' como alternativa en nota. También suaviza ὠργίσθησαν a 'se enojaron', restituye la estructura inclusiva 'los pequeños y los grandes', y simplifica las notas para que reflejen mejor las alternativas realmente relevantes y documentadas.
