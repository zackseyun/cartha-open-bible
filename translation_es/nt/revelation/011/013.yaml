translation:
  language: es
  text: Y en aquella hora hubo un gran terremoto, y cayó la décima parte de la ciudad, y siete mil personas[a] murieron en el terremoto, y los demás quedaron aterrados y dieron gloria al Dios del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, ''nombres de personas, siete mil'': un giro idiomático que significa que siete mil personas fueron contadas entre los muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  english_pob_choice: in that hour
  chosen_spanish: en aquella hora
  alternatives_spanish:
  - en ese momento
  - en aquel tiempo
  lexicon: BDAG
  rationale: Conserva el marcador temporal vívido y apocalíptico del griego sin volverlo demasiado explicativo. 'Aquella' reproduce bien la distancia referencial de ἐκείνῃ.
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - aconteció
  - se produjo
  lexicon: BDAG
  rationale: En español, con σεισμός como sujeto, 'hubo' suena natural y mantiene el carácter eventivo sin una construcción demasiado pesada.
- source_word: σεισμὸς μέγας
  english_pob_choice: a great earthquake
  chosen_spanish: un gran terremoto
  alternatives_spanish:
  - un fuerte terremoto
  - un terremoto grande
  lexicon: BDAG
  rationale: '''Terremoto'' expresa con naturalidad σεισμός en este contexto; ''gran'' conserva directamente μέγας y resulta idiomático en español.'
- source_word: τὸ δέκατον τῆς πόλεως
  english_pob_choice: a tenth of the city
  chosen_spanish: la décima parte de la ciudad
  alternatives_spanish:
  - la décima parte de la ciudad
  - la décima porción de la ciudad
  lexicon: BDAG
  rationale: La expresión partitiva se vuelve de modo natural en español como 'la décima parte'. Mantiene la precisión numérica del griego.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se derrumbó
  - colapsó
  lexicon: BDAG
  rationale: '''Cayó'' es el equivalente directo y deja abierta la forma exacta de la destrucción, como en el griego.'
- source_word: ἀπεκτάνθησαν
  english_pob_choice: were killed
  chosen_spanish: murieron
  alternatives_spanish:
  - fueron muertos
  - fueron asesinados
  lexicon: BDAG
  rationale: Aunque el pasivo indica que murieron a causa de la catástrofe, en español 'murieron' comunica con claridad el resultado sin sonar artificial. Se conserva el valor pasivo en el contexto inmediato y no se añade agente.
- source_word: ὀνόματα ἀνθρώπων
  english_pob_choice: people
  chosen_spanish: personas
  alternatives_spanish:
  - nombres de personas
  - personas contadas
  lexicon: BDAG
  rationale: El griego literalmente dice 'nombres de hombres/personas', un giro idiomático de conteo. El texto principal lo vierte de manera natural como 'personas'.
- source_word: χιλιάδες ἑπτά
  english_pob_choice: seven thousand
  chosen_spanish: siete mil
  alternatives_spanish:
  - siete millares
  lexicon: BDAG
  rationale: Equivale directamente al cardinal del griego y es la forma normal en español.
- source_word: οἱ λοιποὶ
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los sobrevivientes
  lexicon: BDAG
  rationale: '''Los demás'' mantiene el valor grupal sin añadir la inferencia de que todos sobrevivieron, inferencia que el griego no explicita.'
- source_word: ἔμφοβοι ἐγένοντο
  english_pob_choice: became terrified
  chosen_spanish: se llenaron de temor
  alternatives_spanish:
  - quedaron aterrados
  - fueron llenos de miedo
  lexicon: BDAG
  rationale: La combinación expresa una reacción intensa de miedo. 'Se llenaron de temor' conserva la fuerza sin forzar un adjetivo demasiado interpretativo.
- source_word: ἔδωκαν δόξαν
  english_pob_choice: gave glory
  chosen_spanish: dieron gloria
  alternatives_spanish:
  - glorificaron
  - dieron honra
  lexicon: BDAG
  rationale: '''Dieron gloria'' reproduce el idiomatismo bíblico con transparencia y sin perder la relación verbal con el griego.'
- source_word: τῷ θεῷ τοῦ οὐρανοῦ
  english_pob_choice: to the God of heaven
  chosen_spanish: al Dios del cielo
  alternatives_spanish:
  - al Dios del cielo
  - al Dios celestial
  lexicon: BDAG
  rationale: '''Del cielo'' conserva el genitivo de procedencia/título y sigue el uso bíblico establecido sin volverlo abstracto. ''Celestial'' suaviza demasiado la fórmula.'
theological_decisions:
- issue: Si la reacción de 'los demás' debe entenderse como arrepentimiento genuino o como simple temor reverente
  english_pob_reading: The text is rendered neutrally as 'became terrified and gave glory to the God of heaven' without specifying whether this was genuine repentance.
  chosen_spanish_reading: 'El texto se vierte de forma neutral: ''se llenaron de temor y dieron gloria al Dios del cielo'', sin especificar si hubo arrepentimiento verdadero o solo reconocimiento temeroso.'
  alternative_spanish_readings:
  - se arrepintieron de verdad
  - solo reconocieron el poder de Dios con temor
  rationale: El griego no usa aquí vocabulario explícito de arrepentimiento ni describe con precisión la calidad espiritual de la respuesta. La redacción española preserva esa tensión y evita resolverla por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con la última revisión auditada, que no introdujo cambios adicionales y mantiene alta concordancia con el control cruzado.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y no se introduce 'SEÑOR' ni 'Cristo' porque el versículo no lo requiere.
  - '''Yahvé'' no aplica aquí; la expresión es ''el Dios del cielo''.'
  - Se conserva la literalidad suficiente para reflejar el idiomatismo de 'nombres de personas' mediante nota, mientras el texto principal permanece natural.
  - La reacción de los demás queda intencionalmente abierta, como en el audit trail inglés, sin añadir arrepentimiento explícito.
