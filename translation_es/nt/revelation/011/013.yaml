base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/013.yaml
  text: And in that hour there was a great earthquake[a], and a tenth of the city fell, and seven thousand people were killed in the earthquake, and the rest became terrified and gave glory to the God of heaven.
  footnotes:
