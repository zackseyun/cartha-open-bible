translation:
  language: es
  text: Estos tienen la autoridad para cerrar el firmamento[a], para que no caiga lluvia durante los días de su profecía, y tienen autoridad sobre las aguas para convertirlas en sangre y para herir la tierra con toda plaga, tantas veces como quieran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerrar el cielo». El griego οὐρανός puede significar «cielo» o «firmamento/cielo visible»; aquí se elige «firmamento» porque el contexto trata de la lluvia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  lexicon: BDAG
  rationale: «Autoridad» comunica mejor la idea de facultad o derecho concedido que simple capacidad, y conserva el matiz de comisión delegada en el contexto profético-apocalíptico.
- source_word: κλεῖσαι τὸν οὐρανόν
  english_pob_choice: shut the sky
  chosen_spanish: cerrar el cielo
  alternatives_spanish:
  - cerrar el cielo
  lexicon: BDAG
  rationale: Sigo la decisión del POB en inglés de evitar una traducción que oculte el referente meteorológico. En español, «cerrar el cielo» es natural y mantiene la imagen; el contexto de la lluvia hace claro que se trata del cielo visible, no de una abstracción litúrgica.
- source_word: ὑετὸς βρέχῃ
  english_pob_choice: so that no rain may fall
  chosen_spanish: para que no caiga lluvia
  alternatives_spanish:
  - para que no llueva
  - para que no descienda lluvia
  lexicon: BDAG
  rationale: «Caiga lluvia» expresa de modo claro y digno el efecto de βρέχω con ὑετός. Evita el calco mecánico y conserva la referencia concreta a la ausencia de precipitación.
- source_word: τὰς ἡμέρας τῆς προφητείας αὐτῶν
  english_pob_choice: during the days of their prophecy
  chosen_spanish: durante los días de su profecía
  alternatives_spanish:
  - en los días de su profecía
  - durante los días de su profetizar
  lexicon: BDAG
  rationale: Mantengo la construcción temporal idiomática. «Su profecía» traduce el genitivo sin introducir una paráfrasis excesiva, y conserva el lenguaje auditado del POB inglés.
- source_word: ἐπὶ τῶν ὑδάτων
  english_pob_choice: over the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - sobre el agua
  - acerca de las aguas
  lexicon: BDAG
  rationale: El plural «aguas» refleja el griego y encaja con la referencia a múltiples aguas convertidas en sangre. «Sobre» conserva la esfera de autoridad que marca ἐπί con genitivo.
- source_word: στρέφειν αὐτὰ εἰς αἷμα
  english_pob_choice: to turn them into blood
  chosen_spanish: convertirlas en sangre
  alternatives_spanish:
  - transformarlas en sangre
  - volverlas sangre
  lexicon: BDAG
  rationale: «Convertirlas en sangre» es natural en español y reproduce la idea de cambio de estado sin suavizarla. «Las» se refiere a las aguas, manteniendo el nexo gramatical con el plural femenino.
- source_word: πατάξαι τὴν γῆν
  english_pob_choice: to strike the earth
  chosen_spanish: herir la tierra
  alternatives_spanish:
  - golpear la tierra
  - herir la tierra
  lexicon: BDAG
  rationale: «Herir» conserva mejor la fuerza de πατάσσω en este contexto de juicio que un simple «golpear», y evita una formulación demasiado física o coloquial.
- source_word: ἐν πάσῃ πληγῇ
  english_pob_choice: with every plague
  chosen_spanish: con toda plaga
  alternatives_spanish:
  - con cada plaga
  - con toda clase de plaga
  lexicon: BDAG
  rationale: «Con toda plaga» sigue de cerca el griego sin expandir el sentido. Conserva la generalidad distributiva de πάσῃ y el valor instrumental de ἐν.
- source_word: ὁσάκις ἐὰν θελήσωσιν
  english_pob_choice: as often as they wish
  chosen_spanish: tantas veces como quieran
  alternatives_spanish:
  - cada vez que quieran
  - cuantas veces quieran
  lexicon: BDAG
  rationale: Esta expresión reproduce bien la repetición contingente de la construcción griega y suena natural en español contemporáneo.
- source_word: οὗτοι
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estos dos
  lexicon: BDAG
  rationale: «Estos» basta para el demostrativo; el número dual no se añade porque el griego aquí no repite explícitamente «dos», aunque el contexto inmediato lo indique.
theological_decisions:
- issue: Referencia al poder de cerrar el cielo y la relación con el lenguaje de juicio profético
  english_pob_reading: Retain the miraculous actions in direct, non-reductive language without explaining or demythologizing them.
  chosen_spanish_reading: Conservar las acciones milagrosas en lenguaje directo, sin explicarlas ni desmitificarlas.
  alternative_spanish_readings:
  - Interpretar simbólicamente las acciones en la traducción
  - Suavizar el lenguaje para evitar una lectura literal
  rationale: El texto presenta estas acciones como parte de la autoridad concedida a los testigos. La traducción debe preservar la tensión apocalíptica y profética del pasaje sin resolver si el lenguaje es literal, simbólico o ambos.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «with every kind of plague» a «with every plague» para ajustarse más de cerca a ἐν πάσῃ πληγῇ. La redacción española adopta esa precisión con «con toda plaga», sin expansión adicional. También se mantiene la decisión auditable de traducir οὐρανός de forma meteorológicamente contextualizada, aquí como «cielo».
  spanish_consistency_notes:
  - Se mantiene «autoridad» para ἐξουσία en coherencia con el POB inglés y con el matiz de facultad concedida.
  - Se preserva «profecía» para τῆς προφητείας, evitando sustituirlo por una perífrasis que pierda la referencia temporal.
  - Se usa «aguas» en plural, como en el griego, y se evita singularizarlo.
  - Se conserva el tono apocalíptico sin introducir glosas interpretativas en el texto principal.
  - La nota de pie de página se ancla solo en «cielo», donde existe la alternativa léxica documentada.
