  yaml_path: translation/nt/revelation/011/006.yaml
  text: These have the authority to shut the sky so that no rain may fall during the days of their prophecy[a], and they have authority over the waters to turn them into blood and to strike the earth with every plague as often as they wish.
  footnotes:
