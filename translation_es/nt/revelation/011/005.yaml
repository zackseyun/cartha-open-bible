translation:
  language: es
  text: Y si alguien quiere hacerles daño[a], fuego sale de su boca y devora a sus enemigos; y si alguien quisiera hacerles daño, de esta manera debe morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sale de sus bocas». El griego dice literalmente «de su boca», con sustantivo singular y poseedor plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικῆσαι
  english_pob_choice: to harm
  chosen_spanish: hacerles daño
  alternatives_spanish:
  - perjudicarlos
  - dañarlos
  - hacerles mal
  lexicon: BDAG
  rationale: En este contexto apocalíptico, el verbo expresa una acción hostil contra los dos testigos. «Hacerles daño» comunica con naturalidad el sentido de agresión sin cargar el texto con un matiz técnico de «injusticia» que el contexto inmediato no pide.
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: BDAG
  rationale: El sustantivo es directo y no requiere interpretación. «Fuego» conserva la imagen vívida y literal del griego en el texto principal.
- source_word: ἐκπορεύεται ἐκ τοῦ στόματος αὐτῶν
  english_pob_choice: comes out of their mouth
  chosen_spanish: sale de su boca
  alternatives_spanish:
  - sale de sus bocas
  - procede de su boca
  - sale de la boca de ellos
  lexicon: BDAG
  rationale: La imagen se mantiene de modo natural en español. El griego usa un sustantivo singular con poseedor plural; la opción «su boca» sigue de cerca esa forma y preserva la tensión documentada entre singular y plural, sin imponer una normalización a «sus bocas» en el texto principal.
- source_word: κατεσθίει
  english_pob_choice: devours
  chosen_spanish: devora
  alternatives_spanish:
  - consume
  - se traga
  - devasta
  lexicon: BDAG
  rationale: «Devora» reproduce la fuerza del verbo compuesto griego y su tono destructivo, sin suavizar la escena.
- source_word: ἐχθροὺς
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - contrarios
  - foes
  lexicon: BDAG
  rationale: «Enemigos» es el equivalente más claro y directo para quienes se oponen a los testigos.
- source_word: θελήσῃ
  english_pob_choice: should want
  chosen_spanish: quiere
  alternatives_spanish:
  - quisiera
  - quisiese
  - quiera
  lexicon: BDAG
  rationale: En la segunda cláusula condicional, el griego usa aoristo subjuntivo con sentido contingente. En español, repetir «quiere» mantiene la paralelía con la primera condición y suena más natural que forzar una perífrasis menos idiomática; la fuerza condicional queda expresada por «si alguien» y por el resultado subsecuente.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de ese modo
  - de esta forma
  lexicon: BDAG
  rationale: «De esta manera» apunta con claridad a la modalidad de juicio descrita en el versículo y conserva el valor anafórico del adverbio griego.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - tiene que
  - es necesario que
  - debe necesariamente
  lexicon: BDAG
  rationale: «Debe» expresa necesidad/inevitabilidad de modo conciso y suficientemente fuerte en español, sin añadir un sujeto impersonal que el griego no explicita.
- source_word: ἀποκτανθῆναι
  english_pob_choice: be killed
  chosen_spanish: ser muerto
  alternatives_spanish:
  - ser ejecutado
  - ser matado
  - ser puesto a muerte
  lexicon: BDAG
  rationale: El infinitivo pasivo pide una forma pasiva en español. «Ser muerto» conserva la voz pasiva y la dureza del original; aunque menos idiomático que «ser matado», evita introducir una paráfrasis más interpretativa como «ser ejecutado».
theological_decisions:
- issue: Naturaleza del fuego que sale de la boca de los testigos
  english_pob_reading: 'Preserve the imagery as stated: fire comes out of their mouth.'
  chosen_spanish_reading: 'Preservar la imagen tal como está: «fuego sale de su boca».'
  alternative_spanish_readings:
  - Interpretar la imagen como juicio simbólico que procede de su palabra
  - Suavizar la imagen hacia un lenguaje más abiertamente figurado
  rationale: Apocalipsis usa lenguaje altamente imagético, pero la traducción no debe resolver la figura dentro del texto principal. Mantener la imagen preserva la tensión entre literalidad e interpretación simbólica para el lector y el comentario.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'La redacción sigue el último pase revisado del inglés POB: se mantuvo la imagen de fuego saliendo de la boca y se respetó la actualización más natural de la preposición implícita con «sale de». En español, se ha conservado además la tensión documentada entre el singular griego «boca» y el poseedor plural, reflejada en una nota alternativa.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» como término por defecto para el nombre divino, aunque este versículo no lo contiene.
  - Se mantiene «fuego» y «devora» para conservar el registro vívido del texto apocalíptico.
  - Se usa «hacerles daño» para ἀδικῆσαι por su claridad contextual y su equivalencia natural con el inglés auditado.
  - Se mantiene una sola cláusula condicional paralela en ambas mitades para reflejar la estructura del griego.
