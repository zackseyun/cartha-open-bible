revisions:
- from: Y si alguien quiere hacerles daño[a], fuego sale de su boca y devora a sus enemigos; y si alguien quiere hacerles daño, de esta manera debe ser muerto.
  to: Y si alguien quiere hacerles daño[a], fuego sale de su boca y devora a sus enemigos; y si alguien quisiera hacerles daño, de esta manera debe morir.
  rationale: Se ajusta la segunda cláusula a «quisiera» para reflejar mejor el subjuntivo griego θελήσῃ y se reemplaza «debe ser muerto» por «debe morir» para lograr un español más natural y digno, manteniendo el sentido de necesidad del original y del POB inglés. La nota sobre «su boca» se conserva sin cambios.
