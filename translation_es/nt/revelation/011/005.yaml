  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del POB inglés: preserva la imagen apocalíptica del fuego, mantiene «hacerles daño» para ἀδικῆσαι, y conserva la nota sobre el singular «boca». Sin embargo, en la segunda cláusula pierde parte del matiz contingente de θελήσῃ al repetir «quiere», y «ser muerto» suena poco natural en español actual.'
  spanish_quality_summary: 'El texto es mayormente claro y fiel, pero necesita un ajuste menor para mayor naturalidad y precisión gramatical: «si alguien quiere...» en la segunda cláusula conviene como «si alguien quisiera...» para reflejar mejor el subjuntivo griego, y «debe ser muerto» conviene reemplazarlo por «debe morir» para evitar una pasiva torpe y poco idiomática sin perder la fuerza de necesidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave («hacerles daño», «fuego», «enemigos») están bien alineadas. La nota léxica sobre «su boca / sus bocas» también está bien aplicada y anclada correctamente.
  issues:
  - severity: medium
    issue: La segunda ocurrencia de θελήσῃ se traduce como «quiere».
    rationale: El griego cambia de presente indicativo (θέλει) a aoristo subjuntivo (θελήσῃ). Aunque el sentido básico se entiende, «si alguien quisiera hacerles daño» refleja mejor la contingencia marcada en la segunda cláusula y mejora la correspondencia con el audit trail inglés («should want»).
  - severity: medium
    issue: «Debe ser muerto» es gramaticalmente posible pero poco natural en español contemporáneo.
    rationale: Para un español eclesial moderno y legible, «debe morir» transmite mejor δεῖ ... ἀποκτανθῆναι en esta construcción sin introducir interpretación doctrinal ni un tono acartonado. «Ser muerto» suena forzado y reduce la calidad estilística.
  revised_spanish_text: Y si alguien quiere hacerles daño[a], fuego sale de su boca y devora a sus enemigos; y si alguien quisiera hacerles daño, de esta manera debe morir.
  revised_footnotes:
  - marker: a
    text: O «sale de sus bocas». El griego dice literalmente «de su boca», con sustantivo singular y poseedor plural.
    reason: lexical_alternative
