  to: 'Y el séptimo ángel tocó la trompeta[a], y hubo fuertes voces en el cielo, diciendo: «El reino del mundo ha venido a ser de nuestro Señor y de su Mesías[b], y él reinará por los siglos de los siglos[c]»'
  rationale: 'Se hicieron ajustes menores de fidelidad y naturalidad: «tocó la trompeta» mejora la expresión de ἐσάλπισεν en español sin añadir posesión innecesaria; «fuertes voces» refleja mejor φωναὶ μεγάλαι y la decisión auditada «loud voices»; la nota c se precisó para distinguir mejor el modismo griego de la formulación española del texto principal. El resto del versículo está bien alineado con el griego y con las decisiones léxicas y teológicas del POB.'
