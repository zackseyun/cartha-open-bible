source:
  edition: SBLGNT
  text: Καὶ ὁ ἕβδομος ἄγγελος ἐσάλπισεν· καὶ ἐγένοντο φωναὶ μεγάλαι ἐν τῷ οὐρανῷ ⸀λέγοντες· Ἐγένετο ἡ βασιλεία τοῦ κόσμου τοῦ κυρίου ἡμῶν καὶ τοῦ χριστοῦ αὐτοῦ, καὶ βασιλεύσει εἰς τοὺς αἰῶνας τῶν αἰώνων.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/015.yaml
  text: And the seventh angel sounded his trumpet[a], and there were loud voices in heaven, saying, “The kingdom of the world has become that of our Lord and of his Messiah[c][b], and he will reign forever and ever.”
  footnotes:
  - marker: a
    text: Some manuscripts read 'the kingdoms of the world have become' or 'the kingdom of this world has become.' The SBLGNT text reads singular, 'the kingdom of the world has become.'
    reason: textual_variant
  - marker: b
    text: Or 'his Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its titular sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek says literally, 'to the ages of the ages,' an idiom meaning unending duration.
    reason: lexical_alternative
