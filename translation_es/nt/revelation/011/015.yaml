translation:
  language: es
  text: 'Y el séptimo ángel tocó la trompeta[a], y hubo fuertes voces en el cielo, diciendo: «El reino del mundo ha venido a ser de nuestro Señor y de su Mesías[b], y él reinará por los siglos de los siglos[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen «los reinos del mundo han venido a ser» o «el reino de este mundo ha venido a ser». El texto SBLGNT lee en singular: «el reino del mundo ha venido a ser».'
    reason: textual_variant
  - marker: b
    text: O «su Cristo». El título griego Χριστός se rinde aquí como «Mesías» para conservar su sentido titular.
    reason: lexical_alternative
  - marker: c
    text: La expresión griega dice literalmente «a los siglos de los siglos», un modismo que significa duración sin fin.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  english_pob_choice: sounded his trumpet
  chosen_spanish: tocó su trompeta
  alternatives_spanish:
  - sonó su trompeta
  - hizo sonar la trompeta
  lexicon: BDAG
  rationale: El verbo σαλπίζω significa hacer sonar una trompeta. En español, «tocó su trompeta» es natural, preciso y conserva el instrumento implícito sin añadir contenido ajeno.
- source_word: φωναὶ μεγάλαι
  english_pob_choice: loud voices
  chosen_spanish: grandes voces
  alternatives_spanish:
  - voces fuertes
  - fuertes voces
  lexicon: BDAG
  rationale: φωνή puede significar voz, sonido o clamor. Con λέγοντες en seguida, se trata de voces articuladas; «grandes» reproduce bien μεγάλαι en un registro bíblico natural, aunque «fuertes» sería una alternativa posible.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo celestial
  lexicon: BDAG
  rationale: En Apocalipsis, οὐρανός aquí designa la esfera celestial. «En el cielo» es el equivalente español idiomático y claro.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que decían
  - y decían
  lexicon: BDAG
  rationale: El participio se vierte con naturalidad como «diciendo». Aunque la concordancia gramatical con «voces» es llamativa, no hace falta forzar la sintaxis en español.
- source_word: Ἐγένετο ἡ βασιλεία τοῦ κόσμου
  english_pob_choice: The kingdom of the world has become
  chosen_spanish: El reino del mundo ha venido a ser
  alternatives_spanish:
  - El reino del mundo ha llegado a ser
  - El reino del mundo se ha convertido
  lexicon: BDAG
  rationale: βασιλεία es singular en el texto griego, por lo que se mantiene «reino». El aoristo ἐγένετο se expresa mejor en español con un perfecto de resultado, y «ha venido a ser» conserva el matiz de paso a un nuevo estado sin introducir una interpretación más fuerte de la necesaria.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de este mundo
  - de la tierra
  lexicon: BDAG
  rationale: El genitivo es simplemente «del mundo». No debe importarse la variante textual «de este mundo» al texto principal.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: of our Lord
  chosen_spanish: de nuestro Señor
  alternatives_spanish:
  - de nuestro Dueño
  - perteneciente a nuestro Señor
  lexicon: BDAG
  rationale: κύριος se traduce aquí por el término cristiano estándar «Señor». En este contexto, la frase posesiva suena natural en español como «de nuestro Señor» y conserva la relación de pertenencia.
- source_word: τοῦ χριστοῦ αὐτοῦ
  english_pob_choice: of his Messiah
  chosen_spanish: de su Mesías
  alternatives_spanish:
  - de su Cristo
  - de su Ungido
  lexicon: BDAG
  rationale: Χριστός funciona como título, no como nombre propio; por eso se rinde «Mesías», que preserva mejor el sentido titular en español. «Cristo» queda como alternativa si se quisiera reflejar una forma tradicional, pero aquí «Mesías» es más auditable y transparente.
- source_word: βασιλεύσει
  english_pob_choice: he will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - gobernará
  - será rey
  lexicon: BDAG
  rationale: El verbo futuro singular se expresa de forma directa con «reinará». Mantiene la fuerza real del verbo sin añadir sujetos explícitos que el griego deja implícitos.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por toda la eternidad
  - para siempre y para siempre
  lexicon: BDAG
  rationale: La locución griega es un idiomatismo de duración sin fin. «Por los siglos de los siglos» es la equivalencia española tradicional y plenamente transparente; conserva el paralelismo enfático del original mejor que una paráfrasis más libre.
theological_decisions:
- issue: Renderización de Χριστός como título
  english_pob_reading: his Messiah
  chosen_spanish_reading: su Mesías
  alternative_spanish_readings:
  - su Cristo
  rationale: El texto usa Χριστός en función titular. «Mesías» preserva ese valor y evita que el término se perciba como un nombre ya fosilizado. La relación posesiva («su Mesías») sigue el griego sin resolver innecesariamente la tensión entre título y referencia personal.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Sujeto implícito de βασιλεύσει
  english_pob_reading: he will reign
  chosen_spanish_reading: reinará
  alternative_spanish_readings:
  - reinarán
  - reinará el Señor y su Mesías
  rationale: El verbo griego está en singular; por eso la traducción mantiene el singular sin explicitar un antecedente más determinado que el texto. Así se preserva la compacta proclamación apocalíptica y la posible tensión referencial del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el informe auditado en inglés. No se introdujeron cambios de sentido respecto del consenso del material fuente; se preservó la singularidad de βασιλεία y el valor titulado de Χριστός, y se mantuvo la tensión sobre el sujeto de βασιλεύσει sin explicitarlo más allá de lo que el griego permite.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - Se mantiene «Mesías» para Χριστός en función titular, conforme al criterio del proyecto.
  - «Señor» traduce κύριος de manera natural en esta doxología apocalíptica.
  - La elección «por los siglos de los siglos» sigue la tradición española más transparente para el idiomatismo griego de duración infinita.
