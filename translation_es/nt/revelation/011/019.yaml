revisions:
- from: Y fue abierto el templo[a] de Dios en el cielo, y fue vista el arca de su pacto[b] en su templo; y hubo relámpagos, voces[c], truenos, un terremoto y gran granizo.
  to: Y se abrió el templo[a] de Dios en el cielo, y se vio el arca de su pacto[b] en su templo; y hubo relámpagos, voces[c], truenos, un terremoto y fuerte granizo.
  rationale: Se corrige la concordancia y naturalidad de las dos pasivas principales con «se abrió» y «se vio», que siguen siendo fieles al griego y mucho más idiomáticas en español. Se ajusta además la cláusula final a «fuerte granizo» para evitar la expresión poco natural «gran granizo», sin alterar el sentido general de χάλαζα μεγάλη como fenómeno severo de juicio. Se conservan las decisiones léxicas clave y las notas del rastro auditado.
