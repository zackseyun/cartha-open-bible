translation:
  language: es
  text: Y se abrió el templo[a] de Dios en el cielo, y se vio el arca de su pacto[b] en su templo; y hubo relámpagos, voces[c], truenos, un terremoto y fuerte granizo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario» para ναός, destacando el recinto santo interior más que el complejo del templo.
    reason: lexical_alternative
  - marker: b
    text: O «el arca del pacto»; el griego dice literalmente «su pacto».
    reason: lexical_alternative
  - marker: c
    text: O «sonidos» o «estruendos» para φωναί; Apocalipsis usa a menudo esta expresión teofánica en escenas de majestad y juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὸς
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: En Apocalipsis, ναός designa el recinto sagrado celestial donde Dios habita. "Templo" es la opción más natural y clara en español; "santuario" resalta más el sentido de recinto interior, pero es una alternativa legítima que se reserva como nota.
- source_word: ὁ ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo, que está allí
  - en el cielo
  lexicon: BDAG
  rationale: 'La construcción funciona adjetivamente con ναός: no se trata de un templo terrenal sino del celestial. "En el cielo" suena natural en español y conserva el valor locativo sin recargar la frase.'
- source_word: ἠνοίγη
  english_pob_choice: was opened
  chosen_spanish: fue abierto
  alternatives_spanish:
  - se abrió
  lexicon: BDAG
  rationale: El aoristo pasivo se conserva con pasiva en español para mantener el carácter eventivo y no introducir un agente explícito.
- source_word: ὤφθη
  english_pob_choice: was seen
  chosen_spanish: fue vista
  alternatives_spanish:
  - se vio
  - apareció
  lexicon: BDAG
  rationale: '"Fue vista" sigue de cerca el pasivo griego y evita decidir más de lo que el texto dice sobre si el arca apareció activamente o simplemente quedó visible.'
- source_word: κιβωτὸς τῆς διαθήκης αὐτοῦ
  english_pob_choice: the ark of his covenant
  chosen_spanish: el arca de su pacto
  alternatives_spanish:
  - el arca del pacto de él
  - el arca de su alianza
  lexicon: BDAG
  rationale: Se mantiene el posesivo de αὐτοῦ con "su". "Pacto" es una traducción válida de διαθήκη y en español eclesial suele ser más directa que "alianza"; además evita la carga más técnica de "testamento".
- source_word: ἐν τῷ ναῷ αὐτοῦ
  english_pob_choice: in his temple
  chosen_spanish: en su templo
  alternatives_spanish:
  - en su santuario
  lexicon: BDAG
  rationale: Se conserva la repetición de ναός con el mismo término para no borrar la correspondencia interna del versículo. El posesivo "su" refleja αὐτοῦ.
- source_word: ἐγένοντο
  english_pob_choice: there were
  chosen_spanish: hubo
  alternatives_spanish:
  - se produjeron
  - acontecieron
  lexicon: BDAG
  rationale: '"Hubo" es una equivalencia idiomática en español para la aparición de fenómenos acompañantes. Funciona bien con la serie apocalíptica que sigue.'
- source_word: ἀστραπαὶ
  english_pob_choice: flashes of lightning
  chosen_spanish: relámpagos
  alternatives_spanish:
  - destellos de relámpago
  - fulgores de relámpago
  lexicon: BDAG
  rationale: '"Relámpagos" comunica de manera natural el plural de ἀστραπαί en español y conserva el registro apocalíptico sin sonar forzado.'
- source_word: φωναὶ
  english_pob_choice: voices
  chosen_spanish: voces
  alternatives_spanish:
  - sonidos
  - estruendos
  lexicon: BDAG
  rationale: Se mantiene el valor literal de "voces", porque Apocalipsis usa con frecuencia esta secuencia teofánica. La alternativa "sonidos" suavizaría la imagen pero perdería la recurrencia léxica.
- source_word: βρονταὶ
  english_pob_choice: peals of thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - estruendos
  - ráfagas de trueno
  lexicon: BDAG
  rationale: '"Truenos" preserva el plural griego y es el equivalente directo y natural en español. "Estruendos" sería posible, pero menos específico.'
- source_word: σεισμὸς
  english_pob_choice: an earthquake
  chosen_spanish: un terremoto
  alternatives_spanish:
  - un sismo
  - un temblor
  lexicon: BDAG
  rationale: '"Terremoto" es la forma más clara y establecida en español para σεισμός en contextos apocalípticos de juicio.'
- source_word: χάλαζα μεγάλη
  english_pob_choice: great hail
  chosen_spanish: gran granizo
  alternatives_spanish:
  - granizada grande
  - granizo grande
  lexicon: BDAG
  rationale: '"Gran granizo" conserva la intensificación del griego y suena más natural que repetir "grande granizo". Se mantiene el registro elevado sin ampliar el sentido a "tormenta de granizo".'
theological_decisions:
- issue: Naturaleza del ναός celestial
  english_pob_reading: Temple of God in heaven; sanctuary preserved as a lexical alternative in the footnote.
  chosen_spanish_reading: Templo de Dios en el cielo, con "santuario" como alternativa léxica.
  alternative_spanish_readings:
  - santuario de Dios en el cielo
  rationale: '"Templo" es la forma más transparente y natural en español; no fuerza una arquitectura celestial específica, pero mantiene la imagen sagrada del texto. La alternativa "santuario" se conserva porque refleja con más precisión el matiz de ναός como espacio santo interior.'
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
- issue: Sentido de φωναὶ en la secuencia teofánica
  english_pob_reading: Voices retained in the main text; sounds/rumblings preserved as alternatives.
  chosen_spanish_reading: Voces en el texto principal; sonidos/estruendos como alternativas.
  alternative_spanish_readings:
  - sonidos
  - estruendos
  - rumblings
  rationale: En Apocalipsis la fórmula "relámpagos, voces y truenos" es recurrente. Mantener "voces" preserva la intertextualidad y no resuelve la ambigüedad a favor de una explicación meteorológica o acústica.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
- issue: Relación de la arca con el pacto
  english_pob_reading: The ark of his covenant; the Greek explicitly says 'his covenant.'
  chosen_spanish_reading: El arca de su pacto.
  alternative_spanish_readings:
  - el arca del pacto
  - el arca de su alianza
  rationale: El posesivo "su" debe conservarse porque está explícito en el griego y subraya que el pacto pertenece a Dios. "Pacto" transmite διαθήκη con fidelidad y evita borrar esa relación posesiva.
  doctrine_reference: Translation philosophy §3 (no borrar tensiones o precisiones documentadas)
- issue: Preservación del pasivo divino implícito
  english_pob_reading: The temple was opened; the ark was seen.
  chosen_spanish_reading: Fue abierto... fue vista...
  alternative_spanish_readings:
  - se abrió... se vio...
  rationale: La pasiva mantiene el acontecimiento como acto recibido, sin añadir un sujeto explícito. Esto respeta el carácter reverente y apocalíptico del enunciado.
  doctrine_reference: Translation philosophy §2 (fidelidad al enunciado fuente con claridad idiomática)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y el cierre revisado de la auditoría inglesa, sin cambios aplicados en la revisión más reciente. Se conservan las decisiones léxicas documentadas para ναός, φωναί y κιβωτός/διαθήκη, y se mantienen las alternativas señaladas en notas para no borrar matices ni tensiones interpretativas.
  spanish_consistency_notes:
  - Se usa "templo" de manera consistente para ναός y se deja "santuario" solo como alternativa anotada.
  - Se conserva el posesivo "su" para αὐτοῦ tanto con "pacto" como con "templo".
  - Se mantiene la secuencia apocalíptica "relámpagos, voces, truenos" por consistencia literaria.
  - '"Gran granizo" reproduce el énfasis de χάλαζα μεγάλη sin añadir elementos inexistentes.'
