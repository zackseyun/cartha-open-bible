review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y los elementos del griego: apertura del templo de Dios en el cielo, visibilidad del arca de su pacto dentro de su templo, y la secuencia teofánica de relámpagos, voces, truenos, terremoto y granizo. Conserva acertadamente ναός como «templo», φωναί como «voces», y αὐτοῦ como «su». Sin embargo, «fue vista el arca» es gramaticalmente incorrecto en español; además, la pasiva literal «fue abierto» suena menos natural que una formulación más idiomática sin pérdida de sentido. También conviene ajustar «gran granizo», que aunque cercano al inglés auditado, no es la expresión más natural en español bíblico claro.'
  spanish_quality_summary: 'La redacción general es legible y digna, pero tiene dos tropiezos importantes de calidad: concordancia errónea en «fue vista el arca» y formulaciones algo rígidas en «fue abierto» y «gran granizo». Una versión revisada puede mantener la fidelidad y a la vez sonar más natural en español amplio de iglesia: «se abrió… se vio… granizada fuerte» o mejor «gran granizo»/«granizo grande» según criterio. Entre esas opciones, «gran granizo» sigue siendo algo forzado; «granizada fuerte» añade matiz de tormenta no explícito. La solución más equilibrada es mantener «gran granizo», pero el principal problema a corregir obligatoriamente es la concordancia con «el arca».'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: «Dios», «templo», «voces», y preserva «su pacto». No hay conflicto con Yahvé/Mesías u otras entradas globales. «Pacto» es defendible aquí, aunque «alianza» también sería posible; no requiere cambio dado el rastro auditado. Las notas están bien ancladas y en orden.'
  issues:
  - severity: high
    issue: Concordancia gramatical incorrecta en «fue vista el arca»
    rationale: '«Arca» es sustantivo femenino en español aunque lleve artículo masculino por comenzar con /a/ tónica; por tanto el participio debe concordar en femenino: «fue vista el arca». Sin embargo, esa secuencia sigue sonando torpe; la solución natural y fiel es «se vio el arca». Esto preserva bien el sentido de ὤφθη sin forzar una pasiva antinatural.'
  - severity: medium
    issue: «Fue abierto» es demasiado rígido para español natural
    rationale: Aunque refleja el pasivo griego, en español bíblico actual «se abrió» comunica el mismo acontecimiento con mayor naturalidad y dignidad, sin introducir un agente explícito.
  - severity: medium
    issue: «Gran granizo» es poco idiomático
    rationale: Es un calco cercano de «great hail», pero en español suena extraño. Conviene una formulación más natural que no añada demasiado contenido. «granizo grande» también suena deficiente; «fuerte granizada» introduce posible cambio aspectual. Se puede optar por «gran granizo» solo si se tolera cierta rigidez, pero es preferible una mejora moderada.
  revised_spanish_text: Y se abrió el templo[a] de Dios en el cielo, y se vio el arca de su pacto[b] en su templo; y hubo relámpagos, voces[c], truenos, un terremoto y fuerte granizo.
  revised_footnotes:
