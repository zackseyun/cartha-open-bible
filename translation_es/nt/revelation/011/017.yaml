translation:
  language: es
  text: 'diciendo: «Te damos gracias, Señor Dios Todopoderoso, el que es y el que era[a], porque has tomado tu gran poder y has comenzado a reinar[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que es y el que fue». Algunos manuscritos y traducciones en otros lugares de Apocalipsis añaden «y el que ha de venir», pero el texto griego aquí omite esa frase.
    reason: textual_variant
  - marker: b
    text: O «has reinado» o «te has hecho rey». El verbo griego puede enfatizar el comienzo o el ejercicio del gobierno real; aquí probablemente destaca la manifestación pública del reinado de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  lexicon: BDAG
  rationale: El participio presente introduce el contenido del cántico o declaración precedente; en español, «diciendo» mantiene la continuidad narrativa y el valor participial sin añadir un verbo finito innecesario.
- source_word: Εὐχαριστοῦμέν
  english_pob_choice: We give thanks
  chosen_spanish: Te damos gracias
  alternatives_spanish:
  - Te agradecemos
  - Damos gracias
  lexicon: BDAG
  rationale: «Dar gracias» conserva el tono litúrgico y doxológico del verbo εὐχαριστέω. Se usa la segunda persona por el dativo σοι y el plural conserva la voz comunitaria.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En el vocativo dirigido a Dios, «Señor» es la equivalencia natural y reverente en español, y conserva el valor titular de κύριος.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: La aposición con κύριε produce en español «Señor Dios». «Dios» respeta el título divino sin necesidad de artículo adicional que cargue el español más de lo que carga el griego.
- source_word: ὁ παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - el Todopoderoso
  - Omnipotente
  lexicon: BDAG
  rationale: En Apocalipsis, παντοκράτωρ funciona como título divino. «Todopoderoso» comunica bien ese valor en español y suena natural en la fórmula «Señor Dios Todopoderoso».
- source_word: ὁ ὢν καὶ ὁ ἦν
  english_pob_choice: who is and who was
  chosen_spanish: el que es y el que era
  alternatives_spanish:
  - el que es y el que fue
  - el que existe y el que existía
  lexicon: BDAG
  rationale: La fórmula se mantiene como designación relativa de Dios. «El que es y el que era» preserva el contraste verbal y evita armonizar con la fórmula ampliada de otros pasajes de Apocalipsis, ya que aquí el griego omite «el que ha de venir».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: 'El valor causal encaja con la acción de gracias: dan gracias porque Dios ha actuado. «Porque» es claro y directo en español contemporáneo.'
- source_word: εἴληφας
  english_pob_choice: you have taken
  chosen_spanish: has tomado
  alternatives_spanish:
  - has recibido
  - has asumido
  lexicon: BDAG
  rationale: El perfecto de λαμβάνω expresa una acción completada con relevancia presente. «Has tomado» conserva esa fuerza sin forzar un matiz interpretativo adicional.
- source_word: τὴν δύναμίν σου τὴν μεγάλην
  english_pob_choice: your great power
  chosen_spanish: tu gran poder
  alternatives_spanish:
  - tu gran fuerza
  - tu poder grande
  lexicon: BDAG
  rationale: δύναμις se traduce de forma natural como «poder». El adjetivo atributivo se vierte con «gran» para un español idiomático y reverente, sin perder la intensidad del griego.
- source_word: ἐβασίλευσας
  english_pob_choice: have begun to reign
  chosen_spanish: has comenzado a reinar
  alternatives_spanish:
  - has reinado
  - te has hecho rey
  lexicon: BDAG
  rationale: El aoristo de βασιλεύω puede expresar la entrada o manifestación del ejercicio real. «Has comenzado a reinar» conserva la lectura ingresiva que el audit trail inglés privilegia, sin negar la soberanía eterna de Dios.
theological_decisions:
- issue: Forma breve de la designación divina en Apocalipsis
  english_pob_reading: who is and who was
  chosen_spanish_reading: el que es y el que era
  alternative_spanish_readings:
  - el que es y el que era y el que ha de venir
  - el que existe y el que era
  rationale: El griego aquí contiene solo ὁ ὢν καὶ ὁ ἦν. La traducción conserva la forma breve y no armoniza con la fórmula ampliada de otros lugares del libro. Se preserva así la tensión textual y la primacía del original.
  doctrine_reference: No armonizar artificialmente; respeto a la evidencia textual y a la variación formulística dentro de Apocalipsis.
- issue: Matiz de ἐβασίλευσας respecto del reinado de Dios
  english_pob_reading: have begun to reign
  chosen_spanish_reading: has comenzado a reinar
  alternative_spanish_readings:
  - has reinado
  - te has hecho rey
  rationale: El contexto celebra la manifestación decisiva del gobierno real de Dios. «Has comenzado a reinar» comunica el matiz ingresivo sin sugerir erróneamente que Dios no reinaba en absoluto antes de este momento.
  doctrine_reference: Mantener la ortodoxia histórica sobre la soberanía divina sin introducir una conclusión doctrinal que el verso no afirma explícitamente.
translation_notes:
  revision_awareness: La versión española sigue el texto griego de SBLGNT y toma como guía el audit trail inglés, incluyendo la decisión de mantener la fórmula divina breve y de reflejar el matiz ingresivo de ἐβασίλευσας con una traducción natural en español. Se corrigió la anclaje de notas para que cada marcador aparezca exactamente en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en aposición con «Señor» para reflejar κύριε, ὁ θεός.
  - Se prefirió «Todopoderoso» como equivalente natural de παντοκράτωρ en un contexto de alabanza celestial.
  - Se conservó la distinción verbal entre «es» y «era» para representar ὁ ὢν καὶ ὁ ἦν sin armonización.
  - «Ha comenzado a reinar» refleja el valor ingresivo del aoristo sin negar el reinado eterno de Dios.
  - La puntuación usa comillas latinas y dos puntos para introducir el discurso directo de manera natural en español.
