    text: O «en una nube». El griego tiene «en la nube», lo cual también puede evocar escenas bíblicas de presencia divina y vindicación.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a «en la nube», se ajustó la alternativa de la nota a la lectura contrastiva correcta («en una nube»), y se cambió «los vieron» por «los observaron» para reflejar mejor el matiz de θεωρέω documentado por el POB. No se requiere adjudicación adicional, porque son ajustes claros y localizados.
