    issue: La nota al pie [a] está anclada en «decía[a]» en lugar de en «la nube[a]».
    rationale: La nota explica la alternativa de ἐν τῇ νεφέλῃ («en una nube» / «en la nube»), no el participio λεγούσης. Debe aparecer exactamente en la frase relevante.
  - severity: medium
    issue: «los vieron» no refleja suficientemente el matiz de ἐθεώρησαν.
    rationale: El expediente inglés documenta «watched» por la fuerza observacional de θεωρέω. En español, «los observaron» preserva mejor ese matiz que «los vieron».
  - severity: low
    issue: 'La nota al pie ofrece como alternativa exactamente la misma lectura del texto principal: «O “en la nube”».'
    rationale: Si el texto principal dice «en la nube», la alternativa debe ser la opción contrastiva «en una nube», según el expediente inglés.
  revised_spanish_text: 'Y oyeron una voz fuerte desde el cielo que les decía: «Suban acá», y subieron al cielo en la nube[a], y sus enemigos los observaron.'
  revised_footnotes:
