translation:
  language: es
  text: 'Y oyeron una voz fuerte desde el cielo que les decía: «Suban acá», y subieron al cielo en la nube[a], y sus enemigos los observaron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una nube». El griego tiene «en la nube», lo cual también puede evocar escenas bíblicas de presencia divina y vindicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσαν
  english_pob_choice: they heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí marca el hecho de percibir la voz celestial; en español, «oyeron» expresa mejor ese evento puntual que «escucharon», que puede sugerir atención deliberada.
- source_word: φωνῆς μεγάλης
  english_pob_choice: a loud voice
  chosen_spanish: una voz fuerte
  alternatives_spanish:
  - una voz grande
  - una voz potente
  lexicon: BDAG
  rationale: El inglés POB opta por el valor idiomático de volumen/solemnidad. En español, «voz fuerte» conserva la fuerza auditiva de μεγάλης sin la extrañeza de «voz grande».
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde el cielo de arriba
  - desde el firmamento
  lexicon: BDAG
  rationale: En un contexto visionario y de habla divina, οὐρανός se traduce naturalmente como «cielo» en español bíblico-legible; «desde el cielo» mantiene claridad y evita una fórmula innecesariamente técnica.
- source_word: λεγούσης αὐτοῖς
  english_pob_choice: saying to them
  chosen_spanish: que les decía
  alternatives_spanish:
  - diciéndoles
  - que hablaba con ellos
  lexicon: BDAG
  rationale: El participio concuerda con «voz» y en español se integra bien como oración relativa. «Que les decía» conserva explícitamente el destinatario αὐτοῖς sin sobrecargar la sintaxis.
- source_word: Ἀνάβατε ὧδε
  english_pob_choice: Come up here
  chosen_spanish: Suban acá
  alternatives_spanish:
  - Suban aquí
  - Vengan arriba
  lexicon: BDAG
  rationale: El imperativo plural exige una orden directa. «Suban acá» es natural en español y conserva la deixis de ὧδε con un tono de llamada urgente.
- source_word: ἀνέβησαν εἰς τὸν οὐρανὸν
  english_pob_choice: they went up into heaven
  chosen_spanish: subieron al cielo
  alternatives_spanish:
  - subieron al cielo de Dios
  - ascendieron al cielo
  lexicon: BDAG
  rationale: «Subieron al cielo» reproduce el movimiento ascendente de εἰς τὸν οὐρανόν de forma sobria y clara. Evita «ascendieron», que suena más técnico o eclesial que el griego.
- source_word: ἐν τῇ νεφέλῃ
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - con la nube
  - dentro de la nube
  lexicon: BDAG
  rationale: Se conserva el artículo definido, como en el inglés POB, para no borrar la posible resonancia de la nube bíblica de presencia/vindicación. «En la nube» es la traducción más directa y auditable.
- source_word: ἐθεώρησαν
  english_pob_choice: watched
  chosen_spanish: los vieron
  alternatives_spanish:
  - los observaron
  - los contemplaron
  lexicon: BDAG
  rationale: θεωρέω puede implicar observación atenta. En español, «los vieron» comunica el hecho sin añadir matices demasiado interpretativos; el contexto de los enemigos asegura que no es una mera percepción casual.
- source_word: οἱ ἐχθροὶ αὐτῶν
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de ellos
  lexicon: BDAG
  rationale: El posesivo español comunica con naturalidad la relación hostil. Se mantiene la referencia explícita a los adversarios de los testigos.
theological_decisions:
- issue: Posible alusión bíblica en «la nube»
  english_pob_reading: Retain 'the cloud' in the main text
  chosen_spanish_reading: Mantener «la nube» en el texto principal
  alternative_spanish_readings:
  - en una nube
  rationale: El artículo definido puede sugerir la nube reconocible de la presencia divina y de vindicación en la Escritura. Se conserva esa tensión al traducir literalmente «la nube» y no diluirla con un indefinido.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la frase preposicional a «into heaven» para reflejar con mayor precisión εἰς τὸν οὐρανόν. La presente versión española sigue esa decisión con «subieron al cielo»; además, recupera la lectura con artículo en «la nube» y la ancla correctamente con la nota [a].
  spanish_consistency_notes:
  - Se preservó el contraste entre «cielo» y «la nube» sin neutralizar la posible alusión teológica.
  - Se evitó traducir ἐθεώρησαν con un verbo excesivamente técnico; «los vieron» es suficientemente fiel y natural en español.
  - El marcador [a] aparece exactamente en el punto correspondiente del texto, sin notas huérfanas.
