translation:
  language: es
  text: Y sus cadáveres yacen en la calle de la gran ciudad, que espiritualmente[a] se llama Sodoma y Egipto[c][b], donde también fue crucificado su Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «figuradamente llamada Sodoma y Egipto».
    reason: lexical_alternative
  - marker: b
    text: El griego singular «cadáver» probablemente trata a los dos testigos como una unidad; aquí se vierte en plural por claridad y concordancia en español.
    reason: alternative_reading
  - marker: c
    text: La frase «donde también fue crucificado su Señor» apunta a Jerusalén, aunque el texto conserva el título simbólico «la gran ciudad».
    reason: cross_reference
lexical_decisions:
- source_word: πτῶμα
  english_pob_choice: dead bodies
  chosen_spanish: cadáveres
  alternatives_spanish:
  - cuerpos muertos
  - muertos
  lexicon: BDAG
  rationale: πτῶμα designa un cuerpo caído o cadáver. En español, «cadáveres» conserva la fuerza concreta y sobria del término. Aunque el griego singular puede tratar al par como una unidad, el contexto y la revisión auditada del inglés POB favorecen un plural en español para concordar con «sus» y con el verbo «yacen».
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  lexicon: BDAG
  rationale: Es un genitivo posesivo plural que refiere a los dos testigos. «Sus» es la forma natural y directa en español.
- source_word: ἐπὶ τῆς πλατείας
  english_pob_choice: in the street
  chosen_spanish: en la calle
  alternatives_spanish:
  - sobre la calle
  - en la plaza pública
  lexicon: BDAG
  rationale: πλατεῖα puede significar calle ancha o plaza. «En la calle» comunica con naturalidad la imagen urbana y evita sobredeterminación interpretativa.
- source_word: τῆς πόλεως τῆς μεγάλης
  english_pob_choice: of the great city
  chosen_spanish: de la gran ciudad
  alternatives_spanish:
  - de la ciudad grande
  lexicon: BDAG
  rationale: Se preserva la designación apocalíptica «la gran ciudad». «Gran» reproduce mejor el valor idiomático y literario que «grande» en este contexto.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  lexicon: BDAG
  rationale: La relativa explicativa funciona naturalmente con «que» en español y mantiene el tono sobrio del original.
- source_word: καλεῖται
  english_pob_choice: is called
  chosen_spanish: se llama
  alternatives_spanish:
  - es llamada
  - es nombrada
  lexicon: BDAG
  rationale: El pasivo de nombramiento se expresa de modo natural con «se llama» en español, sin perder el sentido de designación.
- source_word: πνευματικῶς
  english_pob_choice: spiritually
  chosen_spanish: espiritualmente
  alternatives_spanish:
  - figuradamente
  - en sentido espiritual
  lexicon: BDAG
  rationale: El adverbio se traduce de forma directa para no aplanar el matiz espiritual/simbólico. Se conserva así la tensión auditada entre sentido espiritual y lectura figurada.
- source_word: Σόδομα καὶ Αἴγυπτος
  english_pob_choice: Sodom and Egypt
  chosen_spanish: Sodoma y Egipto
  lexicon: BDAG
  rationale: Nombres propios transliterados conforme al criterio del proyecto. Conservan la carga simbólica sin explicitarla en el texto principal.
- source_word: ὅπου καὶ
  english_pob_choice: where also
  chosen_spanish: donde también
  alternatives_spanish:
  - donde incluso
  - donde asimismo
  lexicon: BDAG
  rationale: «Donde también» reproduce la localización y el valor aditivo de καί de forma idiomática.
- source_word: ὁ κύριος αὐτῶν
  english_pob_choice: their Lord
  chosen_spanish: su Señor
  alternatives_spanish:
  - su Maestro
  - su Dueño
  lexicon: BDAG
  rationale: «Señor» conserva el valor teológicamente cargado de κύριος y mantiene la referencia a los dos testigos. En español, el posesivo singular «su» es natural con un referente plural coordinado.
- source_word: ἐσταυρώθη
  english_pob_choice: was crucified
  chosen_spanish: fue crucificado
  alternatives_spanish:
  - estuvo crucificado
  lexicon: BDAG
  rationale: El aoristo pasivo se rinde con el pasado histórico estándar «fue crucificado», fiel y claro en español.
theological_decisions:
- issue: Singular griego πτῶμα frente al referente plural de los dos testigos
  english_pob_reading: The singular 'dead body' likely treats the two witnesses as a unit; some translations render 'dead bodies' for smoother English.
  chosen_spanish_reading: 'Usar plural en español: «cadáveres».'
  alternative_spanish_readings:
  - cadáver
  - cuerpo muerto
  rationale: Aunque el griego usa singular, la revisión auditada del POB en inglés ya reconoce la opción plural por fluidez y acuerdo gramatical. En español, el plural comunica mejor el referente explícito de dos testigos sin borrar la unidad retórica del pasaje.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Sentido de πνευματικῶς
  english_pob_reading: Translate as 'spiritually' in the main text; 'figuratively' preserved as alternative.
  chosen_spanish_reading: «espiritualmente» en el texto principal, con nota alternativa figurativa.
  alternative_spanish_readings:
  - figuradamente
  - en sentido figurado
  rationale: El adverbio es literalmente espiritual, pero el propio audit trail reconoce el valor figurado. Mantener «espiritualmente» preserva la ambigüedad productiva y evita resolverla prematuramente.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve theological tension rather than resolve it)
- issue: Identificación de «la gran ciudad»
  english_pob_reading: Leave the identification implicit rather than naming Jerusalem in the translation.
  chosen_spanish_reading: Conservar «la gran ciudad» sin añadir «Jerusalén».
  alternative_spanish_readings:
  - Jerusalén
  - la ciudad santa
  rationale: La cláusula sobre la crucifixión apunta fuertemente a Jerusalén, pero el texto conserva la expresión simbólica. La traducción debe mantener esa tensión apocalíptica sin sustituirla por una glosa interpretativa.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se mantuvo el sentido básico, se preservó el adverbio πνευματικῶς como «espiritualmente», y se adoptó en español el plural de concordancia para los dos testigos, coherente con la corrección revisada del inglés y con la claridad natural del español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero no aparece en este versículo.
  - «Señor» se usa para κύριος por su carga teológica; no se sustituye por «dueño» o «amo».
  - Se conserva el nombre propio «Sodoma y Egipto» sin glosa doctrinal en el texto principal.
  - La puntuación y las mayúsculas siguen el uso estándar del español bíblico contemporáneo.
