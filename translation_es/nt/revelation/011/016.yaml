review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: los veinticuatro ancianos están sentados delante de Dios en sus tronos, luego caen y adoran a Dios. Las decisiones para «ancianos», «delante de Dios», «estaban sentados», «en sus tronos» y «adoraron a Dios» son fieles al texto fuente y al rastro inglés.'
  spanish_quality_summary: El español es claro y natural en general, pero «se postraron sobre sus rostros» suena poco idiomático en español bíblico y moderno. El griego ἔπεσαν ἐπὶ τὰ πρόσωπα αὐτῶν expresa literalmente «cayeron sobre sus rostros» y es un modismo de postración. En español, la mejor solución fiel y legible es «cayeron sobre sus rostros» o «cayeron rostro en tierra»; entre ellas, la primera preserva más de cerca la imaginería fuente y el audit trail inglés.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» y «adoraron» están bien alineados. «Ancianos» para πρεσβύτεροι también concuerda con el uso establecido en Apocalipsis.
  issues:
  - severity: medium
    issue: «Se postraron sobre sus rostros» no es la mejor formulación española para ἔπεσαν ἐπὶ τὰ πρόσωπα αὐτῶν.
    rationale: La construcción actual mezcla el verbo interpretativo «postrarse» con una localización corporal poco natural en español. El griego y el POB inglés conservan el modismo de caída/prostración; «cayeron sobre sus rostros» mantiene mejor la forma y la imagen sin sonar forzado.
  revised_spanish_text: Y los veinticuatro ancianos, que estaban sentados delante de Dios en sus tronos, cayeron sobre sus rostros y adoraron a Dios,
  revision_rationale: Se ajusta una sola frase para que el español sea más idiomático y a la vez más cercano al griego y al audit trail inglés. «Cayeron sobre sus rostros» conserva el modismo de postración sin la torpeza de «se postraron sobre sus rostros». No se requieren notas.
