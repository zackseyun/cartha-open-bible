translation:
  language: es
  text: Y los veinticuatro ancianos, que estaban sentados delante de Dios en sus tronos, cayeron sobre sus rostros y adoraron a Dios,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - viejos
  lexicon: BDAG
  rationale: En Apocalipsis, el término designa a los miembros de la corte celestial, una figura establecida en español bíblico como «ancianos». «Presbíteros» sería demasiado eclesiástico/técnico y «viejos» suena impropio del contexto visionario.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» comunica con naturalidad la relación espacial y ceremonial sin endurecer la frase. Conserva la posición formal ante Dios del contexto de trono.
- source_word: καθήμενοι
  english_pob_choice: were seated
  chosen_spanish: estaban sentados
  alternatives_spanish:
  - sentados
  - estaban sentados
  lexicon: BDAG
  rationale: El participio expresa un estado continuo. «Estaban sentados» mantiene ese valor estativo y suena natural en español narrativo.
- source_word: ἐπὶ τοὺς θρόνους αὐτῶν
  english_pob_choice: on their thrones
  chosen_spanish: en sus tronos
  alternatives_spanish:
  - sobre sus tronos
  - en los tronos de ellos
  lexicon: BDAG
  rationale: En español, «en sus tronos» es idiomático y conserva la imagen de posición/entronización. «Sobre» sería posible, pero menos natural aquí.
- source_word: ἔπεσαν ἐπὶ τὰ πρόσωπα αὐτῶν
  english_pob_choice: fell on their faces
  chosen_spanish: se postraron sobre sus rostros
  alternatives_spanish:
  - cayeron sobre sus rostros
  - se arrodillaron
  lexicon: BDAG
  rationale: La expresión griega es un modismo de postración. «Se postraron sobre sus rostros» preserva la vivacidad corporal y la fuerza reverente del gesto. Se evita «cayeron» por sonar menos intencional y «arrodillaron» por no reflejar el texto.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - dieron adoración
  - se inclinaron en adoración
  lexicon: BDAG
  rationale: Como el objeto es Dios y la escena es de trono celestial, el sentido religioso es primario. «Adoraron» comunica claramente el acto de culto sin rebajarla a mera reverencia física.
- source_word: θεῷ / θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - a Dios
  lexicon: BDAG
  rationale: «Dios» es la equivalencia estándar de θεός. En la construcción final, el dativo se vierte naturalmente como «a Dios» dentro del verbo de adoración.
- source_word: οἱ εἴκοσι τέσσαρες
  english_pob_choice: the twenty-four
  chosen_spanish: los veinticuatro
  alternatives_spanish:
  - los veinte y cuatro
  lexicon: BDAG
  rationale: Se conserva el número compuesto en forma moderna y legible. «Veinticuatro» es la forma normativa en español actual.
theological_decisions:
- issue: Sentido de προσκυνέω en escena celestial
  english_pob_reading: Rendered as 'worshiped' rather than a weaker term such as 'bowed down.'
  chosen_spanish_reading: Traducido como «adoraron» y no como «se inclinaron» o «se postraron» solamente.
  alternative_spanish_readings:
  - se inclinaron
  - se postraron ante Dios
  rationale: El objeto explícito es Dios y la acción ocurre en un contexto de adoración en el trono celestial. «Adoraron» preserva el sentido cultual principal, aunque la postración física ya quedó expresada en la cláusula anterior.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego y coincide con la lectura auditada del inglés POB: ancianos, delante de Dios, sentados en sus tronos, se postraron sobre sus rostros y adoraron a Dios. No se documentaron revisiones posteriores ni notas textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» de manera consistente para θεός en ambos miembros de la oración.
  - Se evitó «SEÑOR» o sustitutos litúrgicos no presentes en el griego.
  - 'La doble expresión corporal y cultual se conservó: primero la postración, luego la adoración.'
  - El orden sintáctico busca ser natural en español sin perder la secuencia narrativa del griego.
