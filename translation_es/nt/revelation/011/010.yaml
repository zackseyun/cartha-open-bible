base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/010.yaml
  text: And those who dwell on the earth rejoice over them and celebrate[a], and they will send gifts to one another[b], because these two prophets tormented those who dwell on the earth.
  footnotes:
  - marker: a
    text: Or 'the inhabitants of the earth.' Revelation frequently uses this expression for the world in rebellion against God.
    reason: lexical_alternative
  - marker: b
    text: Or 'make merry.' The Greek verb emphasizes festive celebration.
    reason: lexical_alternative
