translation:
  language: es
  text: Y los que habitan sobre la tierra se alegran por causa de ellos y celebran[a]; y se enviarán regalos unos a otros, porque estos dos profetas atormentaron a los que habitan sobre la tierra.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacen fiesta». El verbo griego enfatiza una celebración gozosa y festiva.
    reason: lexical_alternative
  - marker: b
    text: O «los habitantes de la tierra». En Apocalipsis, esta expresión suele referirse al mundo humano en rebelión contra Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ κατοικοῦντες ἐπὶ τῆς γῆς
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan sobre la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los que viven sobre la tierra
  lexicon: BDAG
  rationale: Conserva el participio verbal y la frase recurrente de Apocalipsis sin convertirla prematuramente en un sustantivo fijo. 'Habitan sobre la tierra' suena natural en español y mantiene la fuerza de una expresión cargada en el libro.
- source_word: χαίρουσιν
  english_pob_choice: rejoice
  chosen_spanish: se alegran
  alternatives_spanish:
  - se regocijan
  - se gozan
  lexicon: BDAG
  rationale: '''Se alegran'' expresa bien la alegría directa del verbo en un español claro. Se distingue de εὐφραίνονται para evitar repetir la misma idea con exactamente la misma forma.'
- source_word: ἐπ’ αὐτοῖς
  english_pob_choice: over them
  chosen_spanish: por ellos
  alternatives_spanish:
  - sobre ellos
  - a causa de ellos
  lexicon: BDAG
  rationale: En español, 'alegrarse por ellos' comunica de manera natural que el gozo tiene relación con lo que les ocurrió. 'Sobre ellos' sería más literal, pero menos idiomático.
- source_word: εὐφραίνονται
  english_pob_choice: celebrate
  chosen_spanish: se regocijan
  alternatives_spanish:
  - celebran
  - hacen fiesta
  lexicon: BDAG
  rationale: El verbo tiene un matiz festivo distinto de χαίρουσιν. 'Se regocijan' preserva el tono celebrativo sin volverlo coloquial ni demasiado libre. Se deja abierta la posibilidad de celebración festiva, como indica la nota inglesa.
- source_word: δῶρα
  english_pob_choice: gifts
  chosen_spanish: regalos
  alternatives_spanish:
  - presentes
  - obsequios
  lexicon: BDAG
  rationale: '''Regalos'' es la opción más natural en español para un intercambio festivo. Mantiene el sentido de presentes dados en un contexto de celebración.'
- source_word: πέμψουσιν ἀλλήλοις
  english_pob_choice: they will send to one another
  chosen_spanish: se enviarán ... unos a otros
  alternatives_spanish:
  - se mandarán ... unos a otros
  - intercambiarán ...
  lexicon: BDAG
  rationale: Conserva el futuro del verbo y la reciprocidad de ἀλλήλοις. 'Se enviarán' sigue la forma del original sin perder naturalidad en español.
- source_word: οὗτοι οἱ δύο προφῆται
  english_pob_choice: these two prophets
  chosen_spanish: estos dos profetas
  alternatives_spanish:
  - estos, los dos profetas
  lexicon: BDAG
  rationale: Es la correspondencia directa y natural del demostrativo más el sustantivo, sin añadir matices ajenos al griego.
- source_word: ἐβασάνισαν
  english_pob_choice: tormented
  chosen_spanish: atormentaron
  alternatives_spanish:
  - afligieron
  - causaron tormento a
  lexicon: BDAG
  rationale: '''Atormentaron'' preserva la intensidad del verbo βασανίζω, que no debe suavizarse. En español mantiene el peso de la acción sobre los habitantes de la tierra.'
- source_word: τοὺς κατοικοῦντας ἐπὶ τῆς γῆς
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan sobre la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los que viven sobre la tierra
  lexicon: BDAG
  rationale: Se mantiene la misma traducción que en la primera cláusula por consistencia léxica y porque el griego repite la expresión de manera idéntica.
theological_decisions:
- issue: La expresión fija de Apocalipsis para el mundo terrenal en rebelión
  english_pob_reading: those who dwell on the earth
  chosen_spanish_reading: los que habitan sobre la tierra
  alternative_spanish_readings:
  - los habitantes de la tierra
  rationale: La frase en Apocalipsis suele tener peso teológico, no solo geográfico. La redacción elegida conserva la construcción verbal repetida y evita convertirla en una etiqueta interpretativa cerrada en el texto principal.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: La intensidad del efecto de los dos testigos sobre el mundo
  english_pob_reading: tormented
  chosen_spanish_reading: atormentaron
  alternative_spanish_readings:
  - afligieron
  - causaron angustia a
  rationale: El griego expresa una acción fuerte y hostil. 'Atormentaron' evita suavizar el verbo y respeta la fuerza del testimonio y del juicio implicados en el pasaje.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción; preservar la fuerza del texto sin parafrasear
translation_notes:
  revision_awareness: Se revisó la redacción inglesa final y el informe de acuerdo cruzado; no hubo cambios pendientes en la fuente inglesa, y la traducción española mantiene de forma consistente la frase recurrente de Apocalipsis y la intensidad de βασανίζω.
  spanish_consistency_notes:
  - Se mantuvo la misma traducción de οἱ κατοικοῦντες ἐπὶ τῆς γῆς en ambos usos del versículo.
  - Se distinguieron χαίρουσιν y εὐφραίνονται con dos verbos españoles relacionados pero no idénticos.
  - Se preservó el futuro de πέμψουσιν y la reciprocidad de ἀλλήλοις.
  - Se mantuvo 'atormentaron' para βασανίζω sin atenuación semántica.
