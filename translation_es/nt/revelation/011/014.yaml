revisions:
- from: La segunda ay[a] ha pasado; he aquí, la tercera ay[a] viene rápidamente.
  to: El segundo ay ha pasado; he aquí, el tercer ay viene rápidamente[a].
  rationale: Se corrige la forma española de la serie apocalíptica de οὐαί a «el segundo ay / el tercer ay», que es más natural y legible que «la segunda ay». Se mueve la nota [a] al adverbio «rápidamente», que es donde corresponde por referirse a ταχύ. Se conserva «he aquí» por el tono profético y «rápidamente» para respetar la decisión inglesa de no resolver del todo la tensión entre rapidez y cercanía temporal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés en la secuencia básica: «la segunda ... ha pasado; he aquí ... la tercera ... viene ...». Conserva adecuadamente ἰδού con «he aquí» y ἔρχεται con «viene». También mantiene correctamente la nota sobre ταχύ. Sin embargo, el sustantivo/interjección οὐαί está mal plasmado en la forma escrita «ay[a]», que introduce una nota en la palabra equivocada y produce una lectura ortográfica y sintácticamente defectuosa. La nota debe anclarse en el adverbio final, no en «ay».'
  spanish_quality_summary: 'La redacción es mayormente clara y solemne, apta para un registro bíblico moderno. El problema principal es de legibilidad y forma: «La segunda ay[a] ... la tercera ay[a]» no es español natural en esta presentación y además asocia la nota alternativa a la palabra incorrecta. La frase mejora mucho como «¡Ay!, la segunda...»? No, en este contexto numerado de Apocalipsis funciona mejor como sustantivo fijo: «el segundo ay ... el tercer ay». Esa forma es más idiomática y evita la concordancia forzada femenina del borrador. También conviene simplificar «rápidamente» a «pronto» o mantener la ambigüedad con nota; pero dado el audit trail, una solución española más natural es «pronto[a]», con la nota preservando «rápidamente» como alternativa. Sin embargo, para no apartarse del razonamiento inglés, «rápidamente[a]» también es defendible. El cambio imprescindible es el tratamiento de «ay» y la ubicación de la nota.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). La decisión para οὐαί debe alinearse mejor con el valor apocalíptico documentado: en español conviene «ay» como sustantivo fijo en la serie de los tres ayes, preferiblemente «el segundo ay / el tercer ay», no «la segunda ay».'
  issues:
  - severity: high
    issue: La nota [a] está anclada en «ay» en vez de en el equivalente de ταχύ.
    rationale: La nota explica una alternativa para ταχύ («pronto»), no para οὐαί. Tal como está, el lector entiende erróneamente que la nota comenta «ay».
  - severity: high
    issue: «La segunda ay / la tercera ay» es una formulación española deficiente.
    rationale: 'Aunque «ay» puede conservarse por fidelidad intertextual, en español bíblico natural dentro de la serie numerada se usa mejor como sustantivo invariable masculino de cita/apelativo fijo: «el segundo ay», «el tercer ay». El propio razonamiento del borrador además contiene un error de concordancia al decir «aya».'
  - severity: medium
    issue: El razonamiento léxico dice que «segunda» y «tercera» concuerdan con «aya».
    rationale: «Aya» es otra palabra española y no corresponde aquí; esto revela una explicación defectuosa que debe corregirse aunque el texto final sea breve.
  revised_spanish_text: El segundo ay ha pasado; he aquí, el tercer ay viene rápidamente[a].
  revised_footnotes:
  - marker: a
    text: O «pronto». El griego ταχύ puede enfatizar tanto la cercanía temporal como la rapidez.
    reason: alternative_reading
  revision_rationale: Se corrige la forma española de la serie apocalíptica de οὐαί a «el segundo ay / el tercer ay», que es más natural y legible que «la segunda ay». Se mueve la nota [a] al adverbio «rápidamente», que es donde corresponde por referirse a ταχύ. Se conserva «he aquí» por el tono profético y «rápidamente» para respetar la decisión inglesa de no resolver del todo la tensión entre rapidez y cercanía temporal.
