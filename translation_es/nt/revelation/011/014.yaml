translation:
  language: es
  text: El segundo ay ha pasado; he aquí, el tercer ay viene rápidamente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pronto». El griego ταχύ puede enfatizar tanto la cercanía temporal como la rapidez.
    reason: alternative_reading
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: woe
  chosen_spanish: ay
  alternatives_spanish:
  - dolor
  - desgracia
  - juicio
  lexicon: BDAG
  rationale: El griego οὐαί funciona como exclamación profética de lamento y amenaza. En español, «ay» conserva ese tono interjectivo y apocalíptico mejor que una explicación como «desgracia» o «juicio», que suavizarían o interpretarían el término. Mantiene además la correspondencia con la estructura repetida de las «tres ayes» en Apocalipsis.
- source_word: δευτέρα
  english_pob_choice: second
  chosen_spanish: segunda
  alternatives_spanish:
  - segundo
  lexicon: BDAG
  rationale: El ordinal concuerda con «aya» y reproduce de manera directa el valor del griego, sin añadir matiz interpretativo.
- source_word: ἀπῆλθεν
  english_pob_choice: has passed
  chosen_spanish: ha pasado
  alternatives_spanish:
  - se fue
  - ya pasó
  - ha desaparecido
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι señala una acción concluida. En español, «ha pasado» comunica naturalmente que la segunda ay terminó, como en el texto inglés auditado, sin sugerir que simplemente «se fue» en sentido espacial.
- source_word: ἰδού
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  - mira
  lexicon: BDAG
  rationale: ἰδού introduce atención solemne y urgente. «He aquí» preserva el registro profético y solemne en español, más fiel al valor discursivo que formas más coloquiales.
- source_word: τρίτη
  english_pob_choice: third
  chosen_spanish: tercera
  alternatives_spanish:
  - tercero
  lexicon: BDAG
  rationale: El ordinal se mantiene de forma directa y natural, concordando con «aya».
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  lexicon: BDAG
  rationale: El presente griego expresa inmediatez y vivacidad. En español, «viene» reproduce esa fuerza de manera natural y breve; «está viniendo» sería más pesado, y «está por venir» introduciría una perífrasis no exigida por el griego.
- source_word: ταχύ
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - de prisa
  - velozmente
  lexicon: BDAG
  rationale: ταχύ puede señalar rapidez o cercanía temporal. «Rápidamente» conserva la ambigüedad entre prontitud y rapidez sin resolverla, igual que la decisión inglesa de mantener la tensión escatológica. «Pronto» inclinaría demasiado el sentido hacia la cercanía temporal.
theological_decisions:
- issue: Valor de ταχύ en contexto escatológico
  english_pob_reading: quickly, with a footnote allowing soon
  chosen_spanish_reading: rápidamente
  alternative_spanish_readings:
  - pronto
  rationale: La traducción evita decidir entre cercanía temporal y rapidez de cumplimiento. «Rápidamente» deja abierta la tensión presente en el griego y en el audit trail inglés; «pronto» sería posible, pero tiende a fijar el sentido en inminencia cronológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene la estructura breve, la triple repetición de «ay», la exclamación solemne de ἰδού y la ambigüedad de ταχύ sin resolverla.'
  spanish_consistency_notes:
  - Se usó «ay» para οὐαί por coherencia con el lenguaje apocalíptico de Apocalipsis.
  - «He aquí» preserva el tono profético y la marca discursiva de ἰδού.
  - «Rápidamente» mantiene abierta la tensión entre rapidez e inminencia temporal, en línea con el inglés auditado.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el nombre divino en este versículo.
