translation:
  language: es
  text: 'Y se me dio una caña semejante a una vara, diciendo: «Levántate y mide el templo[a] de Dios, el altar y a los que adoran en él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario de Dios»; el griego ναός puede referirse más específicamente al recinto interior del templo y no necesariamente a todo el complejo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη μοι
  english_pob_choice: I was given
  chosen_spanish: se me dio
  alternatives_spanish:
  - recibí
  - me fue dada
  lexicon: BDAG
  rationale: El pasivo de δίδωμι con dativo personal se conserva mejor en español con una construcción impersonal/pasiva refleja que mantenga el foco en el objeto entregado, no en un dador explícito.
- source_word: κάλαμος
  english_pob_choice: reed
  chosen_spanish: caña
  alternatives_spanish:
  - caña de junco
  - reed
  lexicon: BDAG
  rationale: En español, 'caña' comunica el material vegetal de forma natural y fiel a κάλαμος. Evita cargar de antemano la imagen interpretativa de 'vara de medir' que el texto aún no explicita.
- source_word: ὅμοιος ῥάβδῳ
  english_pob_choice: like a rod
  chosen_spanish: semejante a una vara
  alternatives_spanish:
  - como una vara
  - parecida a una vara
  lexicon: BDAG
  rationale: ὅμοιος con dativo expresa comparación; 'semejante a' refleja bien esa relación. 'Vara' preserva la idea de firmeza/autoridad de ῥάβδος sin imponer un tecnicismo moderno.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: BDAG
  rationale: El participio presente se reproduce con gerundio para mantener la ligazón sintáctica y la ambigüedad del hablante implícito sin identificarlo de manera interpretativa.
- source_word: Ἔγειρε
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levántate y ponte de pie
  - Despierta
  lexicon: BDAG
  rationale: En español, 'Levántate' comunica el imperativo de ἐγείρω de forma natural y digna. 'Arise' sería más literal pero menos idiomático.
- source_word: μέτρησον
  english_pob_choice: measure
  chosen_spanish: mide
  alternatives_spanish:
  - toma la medida de
  - mide con exactitud
  lexicon: BDAG
  rationale: Imperativo directo de μετρέω; 'mide' es la forma más simple y fiel para la acción visionaria.
- source_word: ναὸν τοῦ θεοῦ
  english_pob_choice: the temple of God
  chosen_spanish: el templo de Dios
  alternatives_spanish:
  - el santuario de Dios
  lexicon: BDAG
  rationale: ναός puede referirse más específicamente al santuario interior, pero 'templo' es la traducción más natural y comprensible en español. Se mantiene la ambigüedad espacial/teológica del original sin resolverla en el texto principal.
- source_word: θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar del incienso
  - el altar del sacrificio
  lexicon: BDAG
  rationale: El término se traduce de manera estándar como 'altar'. El contexto no obliga a precisar qué altar se trata en el cuerpo principal.
- source_word: τοὺς προσκυνοῦντας
  english_pob_choice: those who worship
  chosen_spanish: a los que adoran
  alternatives_spanish:
  - a los que rinden culto
  - a los adoradores
  lexicon: BDAG
  rationale: El participio sustantivado se vierte con una relativa sustantivada que suena natural en español. 'Adorar' conserva el sentido de προσκυνέω sin introducir un registro excesivamente técnico.
- source_word: ἐν αὐτῷ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  - allí
  lexicon: BDAG
  rationale: El antecedente más probable es ναός ('templo'), que en español es masculino; 'en él' respeta esa referencia espacial y evita ambigüedad innecesaria.
theological_decisions:
- issue: Alcance de ναός en contexto apocalíptico
  english_pob_reading: the temple of God / sanctuary of God
  chosen_spanish_reading: el templo de Dios
  alternative_spanish_readings:
  - el santuario de Dios
  rationale: El versículo no determina si la visión se refiere a un templo terrenal, celestial o simbólico. Se conserva 'templo' para no cerrar esa tensión interpretativa, dejando la nota léxica para la alternativa 'santuario'.
  doctrine_reference: Preservar la tensión interpretativa en vez de resolverla en la traducción.
- issue: Identidad del hablante implícito en λέγων
  english_pob_reading: saying
  chosen_spanish_reading: diciendo
  alternative_spanish_readings:
  - y me dijo
  - un ángel diciendo
  - una voz diciendo
  rationale: El participio no identifica explícitamente al hablante. Mantener 'diciendo' evita añadir un sujeto interpretativo y conserva la ambigüedad del griego.
  doctrine_reference: Primacía del texto original; no suplir detalles que el griego deja implícitos.
translation_notes:
  revision_awareness: 'La redacción española sigue el ajuste más reciente del audit trail inglés: se evita una fórmula del tipo ''y me dijeron'' o ''y me fue dicho'' porque el griego λέγων funciona como participio vinculado a la acción previa, no como una cláusula verbal independiente que identifique de forma explícita al hablante.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, conforme al estándar del proyecto.
  - Se mantiene 'adoran' para προσκυνέω en este contexto, evitando 'rinden culto' por sonar más técnico de lo necesario.
  - '''Templo'' conserva la ambigüedad de ναός; la nota a pie de página preserva la alternativa ''santuario'' documentada en el audit trail inglés.'
  - Se evita 'Cristo' o terminología eclesiástica tradicional no presente en el verso.
  - La puntuación y el orden mantienen una cadencia apocalíptica natural en español, sin sobretraducir el participio λέγων con una cláusula explicativa añadida.
