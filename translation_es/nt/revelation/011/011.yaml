translation:
  language: es
  text: Y después de los tres días y medio[a], un soplo de vida de Dios entró en ellos, y se pusieron de pie, y un gran temor cayó sobre los que los observaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu de vida de Dios»; posiblemente «el Espíritu de vida de Dios». El griego πνεῦμα puede significar soplo, espíritu o Espíritu.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ τὰς τρεῖς ἡμέρας καὶ ἥμισυ
  english_pob_choice: after the three and a half days
  chosen_spanish: después de los tres días y medio
  alternatives_spanish:
  - después de tres días y medio
  - después de los tres días y medio
  lexicon: BDAG
  rationale: μετά con acusativo indica sucesión temporal; en español, «después de» expresa con naturalidad esa relación. Mantengo el artículo definido («los tres días y medio») para reflejar la formulación específica del griego apocalíptico, sin volverlo forzado.
- source_word: πνεῦμα ζωῆς
  english_pob_choice: a breath of life
  chosen_spanish: un espíritu de vida
  alternatives_spanish:
  - un soplo de vida
  - el espíritu de vida
  - el Espíritu de vida
  lexicon: BDAG
  rationale: El griego πνεῦμα admite «aliento/soplo», «espíritu» y «Espíritu». En este contexto, el audit trail inglés privilegia «breath» por la escena de restauración vital, pero en español «un soplo de vida» puede sonar más poético y menos directo; por eso se elige «un espíritu de vida» para conservar la ambigüedad lexical y la posibilidad de una lectura personal o impersonal, sin identificar de manera expresa al Espíritu Santo.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - desde Dios
  lexicon: BDAG
  rationale: ἐκ señala origen o procedencia. «De parte de Dios» expresa claramente la fuente divina en español y evita la aspereza de un calco como «desde Dios».
- source_word: εἰσῆλθεν ἐν αὐτοῖς
  english_pob_choice: entered into them
  chosen_spanish: entró en ellos
  alternatives_spanish:
  - entró dentro de ellos
  - entró en su interior
  lexicon: BDAG
  rationale: εἰσέρχομαι significa «entrar». El complemento ἐν αὐτοῖς queda bien representado por «en ellos» en español, que mantiene la idea de ingreso interno sin añadir palabras innecesarias.
- source_word: ἔστησαν ἐπὶ τοὺς πόδας αὐτῶν
  english_pob_choice: they stood on their feet
  chosen_spanish: se pusieron de pie sobre sus pies
  alternatives_spanish:
  - se levantaron sobre sus pies
  - se irguieron sobre sus pies
  lexicon: BDAG
  rationale: 'La forma verbal aquí tiene sentido intransitivo: la idea es que recobraron la postura de pie. «Se pusieron de pie» es idiomático; agrego «sobre sus pies» para conservar el eco literal de ἐπὶ τοὺς πόδας αὐτῶν y el matiz de reanimación/restauración.'
- source_word: φόβος μέγας
  english_pob_choice: great fear
  chosen_spanish: un gran temor
  alternatives_spanish:
  - gran temor
  - gran miedo
  - un gran miedo
  lexicon: BDAG
  rationale: φόβος puede ser «temor», «miedo» o incluso «reverencia» según contexto. Aquí el efecto sobre los observadores es de impacto intenso; «un gran temor» preserva la fuerza del sustantivo sin imponer una lectura más extrema como «terror».
- source_word: ἐπέπεσεν ἐπὶ
  english_pob_choice: fell on
  chosen_spanish: cayó sobre
  alternatives_spanish:
  - vino sobre
  - se abatió sobre
  lexicon: BDAG
  rationale: ἐπιπίπτω con ἐπί expresa algo que cae o se abate sobre alguien. «Cayó sobre» es directo, natural y conserva la imagen de irrupción súbita.
- source_word: τοὺς θεωροῦντας αὐτούς
  english_pob_choice: those watching them
  chosen_spanish: los que los estaban viendo
  alternatives_spanish:
  - los que los observaban
  - los que los contemplaban
  lexicon: BDAG
  rationale: θεωρέω implica ver con atención, observar. «Los que los estaban viendo» conserva el aspecto participial continuo y resulta fluido en español contemporáneo; «observaban» sería una alternativa válida, pero menos explícita respecto del acto de mirar en curso.
theological_decisions:
- issue: Cómo traducir πνεῦμα ζωῆς sin resolver si se trata de un soplo/aliento impersonal o del Espíritu de vida
  english_pob_reading: a breath of life from God, with a footnote preserving alternatives such as spirit/Spirit
  chosen_spanish_reading: un espíritu de vida de parte de Dios, con nota que preserve las alternativas «soplo» y «Espíritu»
  alternative_spanish_readings:
  - un soplo de vida de parte de Dios
  - el Espíritu de vida de parte de Dios
  rationale: El griego no identifica de manera explícita al referente como el Espíritu Santo, pero sí lo presenta como procedente de Dios. Para no borrar esa tensión, la línea principal usa una expresión ambigua en español y la nota mantiene las otras posibilidades. Así se conserva tanto la apertura lexical de πνεῦμα como la resonancia intertextual de restauración vital.
  doctrine_reference: Preservar la tensión lexical y teológica; no especificar más allá del texto.
translation_notes:
  revision_awareness: Coincide con el último pase del audit trail en que no se requieren cambios sustanciales; la presente redacción mantiene la decisión principal de no resolver πνεῦμα ζωῆς como una identificación explícita del Espíritu Santo, pero adapta la formulación al español con una ambigüedad lexical equivalente y publicación-readable.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma del proyecto, pero este versículo usa θεοῦ y no requiere decisión sobre el nombre divino.
  - Se conserva la distinción entre una lectura impersonal («soplo») y una personal («Espíritu») en la nota, sin forzar la traducción principal.
  - «Gran temor» se traduce como «un gran temor» para conservar artículo y naturalidad en español, sin perder la fuerza del sustantivo.
  - 'La secuencia verbal respeta la progresión del griego: entrada de vida, levantarse, caída del temor sobre los observadores.'
