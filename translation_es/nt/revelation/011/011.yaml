review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue en general la estructura del griego, pero no mantiene la decisión principal del POB inglés en πνεῦμα ζωῆς. El audit trail inglés eligió explícitamente «a breath of life from God» para preservar la imagen de restauración vital sin identificar de forma más específica al referente; el español principal cambió eso a «un espíritu de vida», desplazando el sentido principal. También hay formulaciones menos naturales que el griego no exige, especialmente «sobre sus pies» y «los que los estaban viendo».
  spanish_quality_summary: 'El texto es comprensible, pero contiene giros poco naturales o redundantes para español bíblico claro: «se pusieron de pie sobre sus pies» suena forzado, y «los que los estaban viendo» es pesado. «De parte de Dios» no es incorrecto, pero «de Dios» o «procedente de Dios» representa mejor ἐκ en este contexto narrativo. Conviene ajustar para mayor naturalidad sin perder precisión.'
  glossary_alignment: 'No hay conflicto con términos de alto nivel como Yahvé/Mesías. El principal desajuste terminológico está en πνεῦμα: el proyecto pide atender el contexto y no aplanar breath/spirit/Spirit; aquí el inglés documentó «breath» como lectura principal con nota de alternativas, y el español debe reflejarlo. También «de Dios» alinea mejor con ἐκ τοῦ θεοῦ que «de parte de Dios».'
  issues:
  - severity: high
    issue: La línea principal traduce πνεῦμα ζωῆς como «un espíritu de vida» en lugar de la lectura principal auditada «un soplo/aliento de vida».
    rationale: El POB inglés documenta y justifica que la escena favorece «breath of life» por la resonancia de restauración/ resurrección, dejando «spirit/Spirit» como alternativas en nota. Cambiar la línea principal a «espíritu» altera la decisión semántica y teológica preservada por el audit trail.
  - severity: medium
    issue: «Se pusieron de pie sobre sus pies» es una combinación redundante y poco idiomática.
    rationale: El griego significa que se pusieron en pie; en español natural basta «se pusieron de pie». Añadir «sobre sus pies» suena calco innecesario y reduce la legibilidad.
  - severity: medium
    issue: «Los que los estaban viendo» es torpe para τοὺς θεωροῦντας αὐτούς.
    rationale: θεωρέω aquí se expresa mejor con «los que los observaban» o «los que los miraban», que conservan el sentido de observación continua sin perífrasis pesada.
  - severity: low
    issue: «De parte de Dios» suaviza el sentido de origen de ἐκ τοῦ θεοῦ.
    rationale: Aunque posible, «de Dios» representa con mayor sencillez y precisión la procedencia/origen indicada por ἐκ en este contexto.
  revised_spanish_text: Y después de los tres días y medio[a], un soplo de vida de Dios entró en ellos, y se pusieron de pie, y un gran temor cayó sobre los que los observaban.
  revised_footnotes:
