revisions:
- from: Y después de los tres días y medio[a], un espíritu de vida de parte de Dios entró en ellos, y se pusieron de pie sobre sus pies, y un gran temor cayó sobre los que los estaban viendo.
  to: Y después de los tres días y medio[a], un soplo de vida de Dios entró en ellos, y se pusieron de pie, y un gran temor cayó sobre los que los observaban.
  rationale: La revisión restituye la decisión principal documentada por el POB para πνεῦμα ζωῆς («soplo de vida») y deja «espíritu/Espíritu» en nota, preservando así la tensión léxica y teológica del griego. También mejora la naturalidad del español eliminando el calco «sobre sus pies», simplificando ἐκ τοῦ θεοῦ a «de Dios», y reemplazando la perífrasis pesada «los estaban viendo» por «los observaban».
  reviewer_model: gpt-5.4
