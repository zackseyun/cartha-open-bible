revisions:
- from: A causa de estos tres azotes, murió la tercera parte de los seres humanos, por el fuego, el humo y el azufre[a][b] que salían de sus bocas.
  to: Por estas tres plagas murió la tercera parte de los seres humanos, por el fuego, el humo y el azufre[a][b] que salía de sus bocas.
  rationale: Se reemplaza «azotes» por «plagas» para mantener la terminología apocalíptica estándar y la coherencia con el audit trail. Se cambia «A causa de» por «Por» para reflejar mejor la fuerza instrumental del griego. Se ajusta «que salían» a «que salía» para corresponder a la concordancia formal del participio singular con «azufre», sin perder claridad en español. También se simplifica la nota tradicional de θεῖον para evitar añadir «ardiente», que no está explícito en el texto fuente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: una tercera parte de la humanidad muere por medio de tres plagas asociadas con fuego, humo y azufre que salen de las bocas de las criaturas. Sin embargo, hay dos desajustes relevantes con el griego y con la línea léxica del POB: πληγῶν se tradujo como «azotes» en lugar de «plagas», y el participio singular τοῦ ἐκπορευομένου quedó como plural «que salían», lo que en español parece modificar los tres elementos por igual, mientras que el griego gramaticalmente modifica solo «azufre», aunque semánticamente la escena remite al conjunto que sale de sus bocas. También conviene preferir «Por» frente a «A causa de» para reflejar mejor el valor instrumental de ἀπό en este contexto.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. «La tercera parte de los seres humanos» es comprensible, aunque «la tercera parte de la humanidad» también sería más fluido; no obstante, puede mantenerse para reflejar mejor la nota inclusiva. La frase se beneficia de una simplificación: «Por estas tres plagas murió...» suena más directa y fiel al énfasis del original. «Azufre» es correcto y natural; la nota sobre «brimstone» está bien como alternativa tradicional.'
  glossary_alignment: 'Hay una desviación importante de la terminología del proyecto y del audit trail: πληγαί en Apocalipsis debe mantenerse como «plagas», no «azotes», salvo razón contextual fuerte, que aquí no está justificada. El resto de las decisiones principales se alinean bien: ἄνθρωποι como «seres humanos», θεῖον como «azufre», y el tono general del juicio apocalíptico se preserva adecuadamente.'
  issues:
  - severity: medium
    issue: «azotes» para πληγῶν
    rationale: En Apocalipsis, πληγαί se ha documentado en el POB como «plagas» en contextos de juicio divino. «Azotes» cambia el campo semántico hacia golpes o latigazos y debilita la continuidad terminológica del libro.
  - severity: medium
    issue: «A causa de» para ἀπὸ
    rationale: Aunque no es imposible, aquí ἀπό tiene valor instrumental/causal cercano a «por medio de». «Por» refleja mejor la agencia de las tres plagas y coincide con la formulación del English POB.
  - severity: medium
    issue: «que salían» para τοῦ ἐκπορευομένου
    rationale: El participio griego está en singular genitivo y concuerda formalmente con «azufre», no con una serie plural. En español, «que salían» introduce una pluralización no presente en la forma griega. Una redacción más fiel y natural es «que salía de sus bocas», o bien reestructurar la frase para evitar ambigüedad.
  revised_spanish_text: Por estas tres plagas murió la tercera parte de los seres humanos, por el fuego, el humo y el azufre[a][b] que salía de sus bocas.
  revised_footnotes:
  - marker: a
    text: O «la tercera parte de la humanidad». El griego se refiere a los seres humanos en general, no a varones específicamente.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente «brimstone».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «azotes» por «plagas» para mantener la terminología apocalíptica estándar y la coherencia con el audit trail. Se cambia «A causa de» por «Por» para reflejar mejor la fuerza instrumental del griego. Se ajusta «que salían» a «que salía» para corresponder a la concordancia formal del participio singular con «azufre», sin perder claridad en español. También se simplifica la nota tradicional de θεῖον para evitar añadir «ardiente», que no está explícito en el texto fuente.
