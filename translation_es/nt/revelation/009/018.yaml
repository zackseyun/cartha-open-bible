translation:
  language: es
  text: Por estas tres plagas murió la tercera parte de los seres humanos, por el fuego, el humo y el azufre[a][b] que salía de sus bocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tercera parte de la humanidad». El griego se refiere a los seres humanos en general, no a varones específicamente.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente «brimstone».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  english_pob_choice: By
  chosen_spanish: A causa de
  alternatives_spanish:
  - Por
  - Mediante
  lexicon: BDAG
  rationale: 'En este contexto ἀπὸ introduce causa o medio: los azotes son el agente por el cual ocurre la muerte. «A causa de» expresa bien esa relación causal en español sin forzar una lectura espacial.'
- source_word: τῶν τριῶν πληγῶν τούτων
  english_pob_choice: these three plagues
  chosen_spanish: estos tres azotes
  alternatives_spanish:
  - estas tres plagas
  - estos tres golpes
  lexicon: BDAG
  rationale: πληγαί en Apocalipsis suele referirse a golpes/juicios divinos. «Azotes» conserva la fuerza de castigo y evita suavizar el término. Se mantiene «estos» para reflejar τούτων y la referencia inmediata.
- source_word: ἀπεκτάνθησαν
  english_pob_choice: was killed
  chosen_spanish: murió
  alternatives_spanish:
  - fue muerto
  - fueron muertos
  lexicon: BDAG
  rationale: El pasivo griego indica que murieron como resultado de la acción de juicio. En español, con un sujeto partitivo como «la tercera parte», «murió» resulta natural y conserva el sentido pasivo sin volverlo rígido.
- source_word: τὸ τρίτον τῶν ἀνθρώπων
  english_pob_choice: a third of mankind
  chosen_spanish: la tercera parte de los seres humanos
  alternatives_spanish:
  - la tercera parte de la humanidad
  - un tercio de los hombres
  lexicon: BDAG
  rationale: ἄνθρωποι aquí significa seres humanos en general, no varones específicamente. «Seres humanos» hace explícita esa amplitud y evita la ambigüedad de «hombres».
- source_word: ἐκ τοῦ πυρὸς καὶ τοῦ καπνοῦ καὶ τοῦ θείου
  english_pob_choice: by the fire and the smoke and the sulfur
  chosen_spanish: por el fuego, el humo y el azufre
  alternatives_spanish:
  - a causa del fuego, del humo y del azufre
  - por el fuego, el humo y el azufre
  lexicon: BDAG
  rationale: 'ἐκ marca procedencia o fuente: la muerte viene desde esos elementos. «Por» transmite el medio/instrumento en español de manera fluida. Se conserva «azufre» para θεῖον, evitando el arcaísmo «azufre/brimstone» en sentido tradicional inglés.'
- source_word: τοῦ ἐκπορευομένου
  english_pob_choice: coming out
  chosen_spanish: que salían
  alternatives_spanish:
  - que salía
  - procedente
  lexicon: BDAG
  rationale: El participio presente expresa una salida continua. En español, «que salían» comunica bien la acción en curso y mantiene la imagen vívida.
- source_word: ἐκ τῶν στομάτων αὐτῶν
  english_pob_choice: of their mouths
  chosen_spanish: de sus bocas
  alternatives_spanish:
  - de sus labios
  - desde sus bocas
  lexicon: BDAG
  rationale: Unido a «salían», el español idiomático pide «de sus bocas». Se mantiene el plural referencial a las criaturas del juicio.
theological_decisions:
- issue: Lectura inclusiva de ἀνθρώπων en un contexto de juicio apocalíptico
  english_pob_reading: mankind
  chosen_spanish_reading: seres humanos
  alternative_spanish_readings:
  - humanidad
  - personas
  rationale: La referencia es colectiva y no masculina. «Seres humanos» preserva el alcance general del término y el tono solemne del pasaje, sin introducir una lectura sexista.
  doctrine_reference: Precisión semántica y referencia colectiva del lenguaje humano
- issue: Interpretación de θεῖον
  english_pob_reading: sulfur
  chosen_spanish_reading: azufre
  alternative_spanish_readings:
  - brimstone
  - azufre ardiente
  rationale: θεῖον en español contemporáneo se entiende mejor como «azufre». Se evita «brimstone» por no ser natural en español; no se añade «ardiente» porque el texto ya incluye fuego y humo como parte de la imagen.
  doctrine_reference: Fidelidad léxica al simbolismo apocalíptico
translation_notes:
  revision_awareness: 'Se evaluó el paralelo con la traducción inglesa POB, y no se requirieron revisiones posteriores: la solución española mantiene la causalidad de ἀπὸ/ἐκ, la colectividad de τὸ τρίτον τῶν ἀνθρώπων y la imaginería de fuego, humo y azufre con fluidez natural en español.'
  spanish_consistency_notes:
  - Se usó «azotes» para πληγαί conforme a su fuerza de juicio en Apocalipsis.
  - Se mantuvo «azufre» como equivalente contemporáneo de θεῖον.
  - Se prefirió «seres humanos» para explicitar el valor inclusivo de ἀνθρώπων.
  - La puntuación con coma y secuencia final conserva el ritmo apocalíptico del original.
