translation:
  language: es
  text: Y abrió la abertura del abismo[a], y subió humo de la abertura como el humo de un gran horno, y el sol y el aire fueron oscurecidos por el humo de la abertura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el pozo del abismo»; tradicionalmente, «el pozo sin fondo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤνοιξεν
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - descorrió
  - abrió de par en par
  lexicon: BDAG
  rationale: ἀνοίγω se traduce de manera directa como 'abrir'. 'Abrió' conserva la acción simple sin añadir un matiz técnico que el griego no exige.
- source_word: φρέαρ
  english_pob_choice: shaft
  chosen_spanish: pozo
  alternatives_spanish:
  - pozo vertical
  - conducto
  - hueco
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió 'shaft' para conservar la imagen de una abertura vertical, en español 'pozo' comunica con naturalidad una abertura profunda y conserva el contraste con 'abismo'. En este contexto apocalíptico, 'pozo del abismo' sigue siendo la formulación más clara y recibe apoyo de la nota sobre la lectura alternativa.
- source_word: ἀβύσσου
  english_pob_choice: of the abyss
  chosen_spanish: del abismo
  alternatives_spanish:
  - del fondo sin fondo
  - del abismo profundo
  - del pozo sin fondo
  lexicon: BDAG
  rationale: ἀβύσσου se rinde directamente como 'abismo' para evitar la paráfrasis interpretativa 'pozo sin fondo'. Mantiene la distinción entre el pozo/abertura y el abismo mismo.
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - se elevó
  lexicon: BDAG
  rationale: El verbo de ascenso se expresa con naturalidad en español con 'subió', que preserva el movimiento hacia arriba de manera transparente.
- source_word: καπνὸς
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - humo espeso
  lexicon: BDAG
  rationale: '''Humo'' es el equivalente directo y sostenido del sustantivo griego; se repite para mantener consistencia imagética.'
- source_word: ὡς καπνὸς καμίνου μεγάλης
  english_pob_choice: like the smoke of a great furnace
  chosen_spanish: como el humo de un gran horno
  alternatives_spanish:
  - como el humo de una gran hornaza
  - como humo de un gran horno
  lexicon: BDAG
  rationale: κάμινος se traduce mejor como 'horno' que como 'furnace' en español bíblico actual. 'Gran' reproduce μεγάλης de manera directa y natural.
- source_word: ἐσκοτώθη
  english_pob_choice: were darkened
  chosen_spanish: fueron oscurecidos
  alternatives_spanish:
  - quedaron oscurecidos
  - se oscurecieron
  - fueron entenebrecidos
  lexicon: BDAG
  rationale: El pasivo de σκοτόομαι se expresa con 'fueron oscurecidos', que mantiene el sentido resultativo y la pasividad sin recurrir a una forma menos transparente como 'entenebrecidos'.
- source_word: ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: BDAG
  rationale: Equivalente léxico directo y natural.
- source_word: ὁ ἀὴρ
  english_pob_choice: the air
  chosen_spanish: el aire
  alternatives_spanish:
  - la atmósfera
  - el cielo
  lexicon: BDAG
  rationale: ἀήρ se refiere al aire/atmósfera; 'aire' es el equivalente más directo y evita desplazar la imagen hacia 'cielo'.
- source_word: ἐκ τοῦ καπνοῦ τοῦ φρέατος
  english_pob_choice: by the smoke from the shaft
  chosen_spanish: por el humo del pozo
  alternatives_spanish:
  - a causa del humo del pozo
  - debido al humo del pozo
  lexicon: BDAG
  rationale: La relación causal de ἐκ se comunica de forma natural en español con 'por'. Así se conserva el sentido de causa/instrumento sin forzar una construcción demasiado literal.
theological_decisions:
- issue: Terminología del lugar apocalíptico sin cargarla con la frase tradicional interpretativa
  english_pob_reading: The POB distinguishes 'shaft' from 'abyss' to avoid collapsing the opening into the abyss itself and avoids the tradition-laden 'bottomless pit.'
  chosen_spanish_reading: '''pozo del abismo'' mantiene la distinción entre la abertura y el abismo, sin imponer la expresión tradicional ''pozo sin fondo''.'
  alternative_spanish_readings:
  - pozo sin fondo
  - pozo del fondo sin fondo
  - abismo sin fondo
  rationale: El griego presenta dos sustantivos distintos, φρέαρ y ἄβυσσος. En español, 'pozo del abismo' conserva esa doble referencia y sigue siendo suficientemente literal y comprensible en registro bíblico.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue el estado revisado del POB en inglés sin cambios posteriores: mantiene la distinción lexical entre φρέαρ y ἄβυσσος, conserva la imagen del humo que asciende y refleja el pasivo de ἐσκοτώθη con una construcción española natural.'
  spanish_consistency_notes:
  - Se mantuvo 'abismo' para ἄβυσσος, conforme al principio del proyecto de evitar la máscara tradicional 'Señor' y otras paráfrasis interpretativas cuando no están exigidas.
  - '''Humo'' se repite de manera consistente para καπνός en ambas apariciones.'
  - '''Aire'' se preserva como equivalente directo de ἀήρ, evitando sustituirlo por ''cielo''.'
  - La nota al pie recoge la alternativa de lectura necesaria para auditar la relación entre 'pozo' y 'abismo'.
