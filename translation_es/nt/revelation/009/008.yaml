review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: dos descripciones comparativas unidas por καὶ, con el sentido de ''tenían'' y ''eran''. También mantiene correctamente la imaginería apocalíptica sin interpretarla. Sin embargo, la segunda comparación no preserva con suficiente claridad la elipsis explicada en la auditoría inglesa: ὡς λεόντων se refiere a los dientes, y en español ''eran como de leones'' suena incompleto y menos natural que una forma explícita.'
  spanish_quality_summary: El español es mayormente comprensible, pero 'cabellos como cabellos de mujeres' resulta algo pesado por la repetición, y 'sus dientes eran como de leones' suena poco idiomático en español general. Una revisión menor mejora naturalidad y precisión sin apartarse del griego ni de la filosofía POB.
  glossary_alignment: No hay términos del glosario mayor afectados. La elección de 'cabello/cabellos' frente a 'pelo' es aceptable en registro digno. Conviene usar una formulación más natural para la primera comparación y explicitar 'dientes' en la segunda, en línea con la decisión léxica inglesa documentada.
  issues:
  - severity: medium
    issue: La frase 'sus dientes eran como de leones' es poco natural y deja implícito en exceso el sustantivo comparado.
    rationale: La auditoría inglesa documenta que el sustantivo 'teeth' debe suplirse para claridad. En español, 'como de leones' suena truncado; 'como dientes de leones' preserva mejor el sentido fuente.
  - severity: low
    issue: La repetición 'cabellos como cabellos de mujeres' es torpe en español.
    rationale: Aunque refleja el griego de manera formal, el propio aparato inglés prefiere una forma idiomática ('women’s hair'). En español, 'cabello de mujer' o 'cabellera de mujer' comunica la comparación con mejor fluidez sin pérdida semántica.
  revised_spanish_text: Y tenían cabello como cabello de mujer[a], y sus dientes eran como dientes de leones.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más formal: «como el cabello de mujeres».'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad y la precisión: ''cabello como cabello de mujer'' mantiene la comparación idiomáticamente en español, y ''como dientes de leones'' explicita el sustantivo implícito en la segunda imagen, conforme a la decisión léxica documentada en la auditoría inglesa. No hay cambio teológico ni interpretativo.'
