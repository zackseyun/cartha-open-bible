translation:
  language: es
  text: Y tenían cabello como cabello de mujer[a], y sus dientes eran como dientes de leones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «como el cabello de mujeres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶχον
  english_pob_choice: they had
  chosen_spanish: tenían
  alternatives_spanish:
  - estaban teniendo
  lexicon: BDAG
  rationale: El imperfecto descriptivo se vierte naturalmente con imperfecto en español para mantener el rasgo de descripción visionaria sin volverlo demasiado estático.
- source_word: τρίχας
  english_pob_choice: hair
  chosen_spanish: cabellos
  alternatives_spanish:
  - pelo
  - hairs
  lexicon: BDAG
  rationale: En español, ‘cabellos’ comunica mejor la referencia a pelo humano/visible en un registro digno y evita la rareza de un plural literal como ‘pelos’ o ‘cabellos’ repetidos sin necesidad.
- source_word: ὡς τρίχας γυναικῶν
  english_pob_choice: like women’s hair
  chosen_spanish: como cabellos de mujeres
  alternatives_spanish:
  - como el cabello de mujeres
  - como cabello de mujer
  lexicon: BDAG
  rationale: ὡς expresa comparación; ‘como cabellos de mujeres’ conserva la similitud sin interpretarla. Se evita una paráfrasis que cierre la imagen apocalíptica.
- source_word: οἱ ὀδόντες αὐτῶν
  english_pob_choice: their teeth
  chosen_spanish: sus dientes
  alternatives_spanish:
  - los dientes de ellos
  lexicon: BDAG
  rationale: El posesivo español reproduce con naturalidad el sintagma posesivo griego y mantiene el tono descriptivo.
- source_word: ὡς λεόντων
  english_pob_choice: like lions’ teeth
  chosen_spanish: como de leones
  alternatives_spanish:
  - como dientes de leones
  - como los dientes de leones
  lexicon: BDAG
  rationale: Como la comparación modifica ‘dientes’, el español puede omitir el sustantivo repetido y decir ‘como de leones’, una forma natural que conserva la relación comparativa sin añadir interpretación.
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - estaban
  lexicon: BDAG
  rationale: El imperfecto de εἰμί se traduce de modo directo con ‘eran’ en español para reflejar el estado descriptivo de la visión.
theological_decisions:
- issue: Conservación de las similes apocalípticas sin explicación simbólica
  english_pob_reading: Retain the similes straightforwardly without interpreting them symbolically in translation.
  chosen_spanish_reading: Conservar las comparaciones literalmente descriptivas, sin aclararlas ni simbolizarlas en la traducción.
  alternative_spanish_readings:
  - Reformular para explicar el simbolismo de los cabellos y los dientes
  - Suavizar la imagen para hacerla menos abrupta
  rationale: El griego presenta comparaciones visionarias directas (‘como cabellos de mujeres’, ‘como de leones’) sin interpretación. La versión española mantiene esa tensión teológica y literaria en vez de resolverla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Sin revisiones aplicadas; se conserva la lectura concordante con el control de alta coincidencia y sin cambios respecto al consenso del texto fuente.
  spanish_consistency_notes:
  - Se mantiene el uso de ‘cabellos’ para τρίχας por registro y naturalidad en español.
  - Se conserva ‘como’ para ὡς a fin de expresar comparación, no identidad.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otra terminología teológica no presente en el versículo.
  - La nota a pie preserva la alternativa formal reflejada en el audit trail inglés.
