translation:
  language: es
  text: Y del humo salieron langostas sobre la tierra, y se les dio autoridad[a], así como los escorpiones de la tierra tienen autoridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «poder». El griego ἐξουσία puede significar autoridad, derecho o poder; aquí se prefirió «autoridad» para reflejar mejor la concesión o permiso delegado en la construcción pasiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ καπνοῦ
  english_pob_choice: out of the smoke
  chosen_spanish: del humo
  alternatives_spanish:
  - desde el humo
  - de entre el humo
  lexicon: BDAG
  rationale: El griego expresa procedencia y salida desde el humo. En español, «del humo» conserva la relación de origen de manera natural sin forzar una perífrasis pesada.
- source_word: ἐξῆλθον
  english_pob_choice: came
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron de
  - vinieron
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι indica salida. «Salieron» reproduce ese movimiento con fluidez en español y evita redundancia con «del humo».
- source_word: ἀκρίδες
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - saltamontes
  - langostas devastadoras
  lexicon: BDAG
  rationale: «Langostas» es el equivalente bíblico y apocalíptico normal para ἀκρίς. «Saltamontes» sería menos preciso en este contexto.
- source_word: εἰς τὴν γῆν
  english_pob_choice: onto the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - a la tierra
  - hacia la tierra
  - sobre la tierra
  lexicon: BDAG
  rationale: εἰς expresa dirección/entrada hacia un ámbito. «Sobre la tierra» conserva el sentido direccional y suena natural en español; «la tierra» aquí mantiene el alcance amplio de γῆ.
- source_word: ἐδόθη αὐταῖς ἐξουσία
  english_pob_choice: authority was given to them
  chosen_spanish: se les dio autoridad
  alternatives_spanish:
  - les fue dada autoridad
  - se les dio poder
  lexicon: BDAG
  rationale: La pasiva divina se conserva con «se les dio». «Autoridad» refleja mejor ἐξουσία que «poder» en este contexto de capacidad/delegación permitida.
- source_word: ὡς ἔχουσιν ἐξουσίαν
  english_pob_choice: as the scorpions of the earth have authority
  chosen_spanish: así como los escorpiones de la tierra tienen autoridad
  alternatives_spanish:
  - como los escorpiones de la tierra tienen autoridad
  - tal como los escorpiones de la tierra tienen autoridad
  lexicon: BDAG
  rationale: La comparación ὡς se expresa con «así como» para mantener claridad y paralelismo. Repetir «autoridad» preserva la repetición formal de ἐξουσία en el griego.
- source_word: οἱ σκορπίοι τῆς γῆς
  english_pob_choice: the scorpions of the earth
  chosen_spanish: los escorpiones de la tierra
  alternatives_spanish:
  - los escorpiones terrestres
  - los escorpiones sobre la tierra
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva de manera directa. «De la tierra» reproduce el vínculo léxico sin añadir interpretación.
theological_decisions:
- issue: Sentido de ἐξουσία como capacidad delegada, no mera fuerza bruta
  english_pob_reading: Render ἐξουσία as 'authority' and retain the divine passive 'was given' without identifying the giver explicitly.
  chosen_spanish_reading: Traducir ἐξουσία como «autoridad» y mantener la pasiva impersonal «se les dio» sin explicitar al dador.
  alternative_spanish_readings:
  - se les dio poder
  - les fue dada autoridad
  rationale: El versículo sugiere permiso o comisión otorgada, no autonomía absoluta. «Autoridad» preserva mejor esa tensión que «poder», y la pasiva conserva el tono apocalíptico y la reserva teológica del texto.
  doctrine_reference: Apocalipsis 9:3; principios de pasiva divina y delegación en lenguaje apocalíptico
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión inglesa, especialmente en la cláusula comparativa: se tradujo de forma directa y natural «as the scorpions of the earth have authority» como «así como los escorpiones de la tierra tienen autoridad», manteniendo la repetición de ἐξουσία y la simetría del griego.'
  spanish_consistency_notes:
  - Se usa «autoridad» para ἐξουσία de manera coherente con el criterio POB documentado, evitando sustituirla por «poder» salvo en la nota alternativa.
  - Se mantiene el registro apocalíptico con léxico claro y moderno, sin recurrir a fórmulas eclesiásticas no justificadas por el griego.
  - «Langostas» se conserva como término técnico bíblico; no se suaviza a una designación zoológica menos precisa.
  - La puntuación conserva una pausa principal antes de la segunda cláusula, acorde con la coordinación del griego.
