translation:
  language: es
  text: Y tenían corazas como corazas de hierro, y el sonido de sus alas era como el sonido de muchos carros con caballos[a] corriendo hacia la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «como el sonido de carros de muchos caballos que corren hacia la batalla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θώρακας
  english_pob_choice: breastplates
  chosen_spanish: corazas
  alternatives_spanish:
  - armaduras de pecho
  - petos
  lexicon: BDAG
  rationale: θώραξ designa una pieza de armadura para el torso/pecho. En español, «corazas» comunica ese elemento con naturalidad y mantiene el paralelo del verso sin volverlo más genérico que «armaduras».
- source_word: ὡς θώρακας σιδηροῦς
  english_pob_choice: like iron breastplates
  chosen_spanish: como corazas de hierro
  alternatives_spanish:
  - como armaduras de hierro
  - como petos de hierro
  lexicon: BDAG
  rationale: ὡς introduce comparación; «como» conserva la similitud explícita. «De hierro» refleja σιδηροῦς de manera directa y fluida en español.
- source_word: φωνὴ
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: BDAG
  rationale: Aquí φωνή no es voz humana, sino el efecto audible de las alas y de los carros; «sonido» es la equivalencia más natural y precisa.
- source_word: πτερύγων
  english_pob_choice: wings
  chosen_spanish: alas
  alternatives_spanish:
  - plumas
  - extremidades aladas
  lexicon: BDAG
  rationale: πτέρυξ significa «ala»; el genitivo con φωνή da «el sonido de sus alas» sin necesidad de ampliar el sentido.
- source_word: ἁρμάτων
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros tirados por caballos
  lexicon: BDAG
  rationale: ἅρμα es «carro» o «carro de guerra». En español, «carros» mantiene la imagen base y permite dejar explícita la relación con los caballos en la frase siguiente.
- source_word: ἵππων πολλῶν
  english_pob_choice: many
  chosen_spanish: de muchos caballos
  alternatives_spanish:
  - de numerosos caballos
  - de muchos caballos
  lexicon: BDAG
  rationale: El griego une «carros» y «caballos» en relación genitiva. «De muchos caballos» conserva ambos sustantivos y evita una condensación interpretativa excesiva.
- source_word: τρεχόντων
  english_pob_choice: rushing
  chosen_spanish: que corren
  alternatives_spanish:
  - que se precipitan
  - que avanzan corriendo
  lexicon: BDAG
  rationale: τρέχω significa literalmente «correr». «Que corren» conserva el movimiento rápido sin añadir una interpretación militar que no esté en el verbo mismo.
- source_word: εἰς πόλεμον
  english_pob_choice: into battle
  chosen_spanish: hacia la batalla
  alternatives_spanish:
  - a la guerra
  - para la batalla
  - hacia la guerra
  lexicon: BDAG
  rationale: πόλεμος puede ser «guerra» o «batalla». «Hacia la batalla» suena natural en español y preserva la dirección del movimiento marcada por εἰς.
theological_decisions:
- issue: Naturaleza visionaria de la imagen
  english_pob_reading: Render the description straightforwardly as visionary simile without interpreting the locusts as literal machines, demons, or symbolic armies in the translation itself.
  chosen_spanish_reading: Traducir la imagen como símil visionario, sin resolver en el texto si se trata de máquinas literales, demonios o un ejército simbólico.
  alternative_spanish_readings:
  - Lectura literal militar
  - Lectura simbólica/apocalíptica con referente determinado
  rationale: El verso está tejido con comparaciones explícitas introducidas por ὡς. La traducción debe conservar la imaginería y no cerrar una tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: El contexto inglés revisó una formulación más compacta hacia una que preserva explícitamente tanto «carros» como «caballos». La versión española sigue esa preferencia al mantener ambos elementos visibles en la frase «muchos carros con caballos».
  spanish_consistency_notes:
  - Se usó «corazas» para θώραξ, en armonía con el término técnico de armadura de torso.
  - Se mantuvo «sonido» para φωνή, no «voz», porque el referente es acústico y no personal.
  - Se conservó «batalla» como opción idiomática para πόλεμος en este contexto imagético.
  - No se tradujo el pasaje con lenguaje eclesiástico tradicionalizante; se priorizó la transparencia semántica del símil.
