review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: conserva ''tienen sobre ellos'', ''rey'', ''el ángel del abismo'', y mantiene ambos nombres como nombres propios. También preserva la repetición estilística en la segunda mitad con ''nombre''/''tiene''. Sin embargo, hay un desajuste importante con la decisión léxica auditada para Ἀβαδδών y Ἀπολλύων: el English POB translitera como ''Abaddon'' y ''Apollyon'', mientras que el borrador adapta ambos a ''Abadón'' y ''Apolión'' sin que exista una excepción documentada. Además, en español ''tiene el nombre de'' suaviza la literalidad de ὄνομα ἔχει frente a una opción más fiel como ''tiene el nombre''.'
  spanish_quality_summary: El español es claro y eclesialmente legible. 'Tienen sobre ellos como rey al ángel del abismo' suena natural. Las notas son comprensibles. No obstante, para alinearse mejor con el proyecto y con la filosofía de transliterar nombres propios, conviene conservar 'Abaddon' y 'Apollyon' en el texto principal y ajustar las notas en consecuencia. También es preferible evitar 'tiene el nombre de' si se desea conservar la repetición del original con mayor precisión.
  glossary_alignment: No hay términos del glosario maestro en conflicto directo salvo la política de transliterar nombres propios conforme al audit trail. 'Abismo' está bien alineado con ἀβύσσου. No hay problemas con Yahvé/Mesías/Espíritu/etc. en este versículo.
  issues:
  - severity: medium
    issue: Los nombres propios Ἀβαδδών y Ἀπολλύων fueron adaptados a 'Abadón' y 'Apolión' en vez de conservar la transliteración auditada 'Abaddon' y 'Apollyon'.
    rationale: La documentación inglesa especifica transliterar ambos nombres en el texto principal. El español no debe introducir una adaptación no documentada si el proyecto ya fijó la forma principal.
  - severity: low
    issue: La frase 'tiene el nombre de Apolión' añade 'de' y se aleja un poco de la repetición de ὄνομα ἔχει.
    rationale: El audit trail valora conservar la repetición formal 'he has the name'. En español 'tiene el nombre Apollyon' o 'tiene por nombre Apollyon' reflejan mejor esa decisión.
  - severity: low
    issue: La nota sobre Abaddon dice 'asociado con destrucción' sin artículo.
    rationale: En español suena más natural 'asociado con la destrucción'.
  revised_spanish_text: Tienen sobre ellos como rey al ángel del abismo[a]. Su nombre en hebreo es Abaddon[b], y en griego tiene el nombre Apollyon[c].
