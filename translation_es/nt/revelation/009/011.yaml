translation:
  language: es
  text: Tienen sobre ellos como rey al ángel del abismo[a]. Su nombre en hebreo es Abaddon[b], y en griego tiene el nombre Apollyon[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pozo sin fondo' para 'el abismo'.
    reason: alternative_reading
  - marker: b
    text: '''Abaddon'' es un nombre hebreo asociado con la destrucción.'
    reason: lexical_alternative
  - marker: c
    text: '''Apollyon'' es un nombre griego que significa ''Destructor''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχουσιν ἐπ’ αὐτῶν
  english_pob_choice: They have over them
  chosen_spanish: Tienen sobre ellos
  alternatives_spanish:
  - Tienen sobre ellos como gobernante
  - Sobre ellos está
  lexicon: BDAG
  rationale: El griego usa el verbo 'tener' con ἐπί + genitivo. 'Tienen sobre ellos' conserva esa construcción de manera natural en español sin perder la relación de dominio.
- source_word: βασιλέα
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - gobernante
  - monarca
  lexicon: BDAG
  rationale: βασιλεύς denota 'rey'. 'Rey' preserva la imagen concreta y real del texto mejor que una paráfrasis más general.
- source_word: τὸν ἄγγελον τῆς ἀβύσσου
  english_pob_choice: the angel of the abyss
  chosen_spanish: el ángel del abismo
  alternatives_spanish:
  - el mensajero del abismo
  - el ángel del pozo sin fondo
  lexicon: BDAG
  rationale: '''Ángel'' es el valor normal de ἄγγελος en Apocalipsis. ''Abismo'' es la correspondencia más directa de ἄβυσσος y evita una expresión más interpretativa como ''pozo sin fondo''.'
- source_word: ὄνομα αὐτῷ
  english_pob_choice: His name
  chosen_spanish: Su nombre
  alternatives_spanish:
  - El nombre que tiene
  - Se llama
  lexicon: BDAG
  rationale: La expresión idiomática griega se vierte de forma natural como posesión en español. 'Su nombre' mantiene concisión y claridad.
- source_word: Ἑβραϊστὶ
  english_pob_choice: in Hebrew
  chosen_spanish: en hebreo
  alternatives_spanish:
  - en la lengua hebrea
  lexicon: BDAG
  rationale: El adverbio significa 'en hebreo' / 'en la lengua hebrea'. 'En hebreo' es idiomático y suficientemente preciso.
- source_word: Ἀβαδδών
  english_pob_choice: Abaddon
  chosen_spanish: Abadón
  alternatives_spanish:
  - Abadón, Destrucción
  lexicon: BDAG; HALOT
  rationale: Se translitera el nombre propio al español con adaptación gráfica habitual. No se traduce en el texto principal porque funciona como nombre propio, pero su sentido se conserva en nota.
- source_word: καὶ ἐν τῇ Ἑλληνικῇ
  english_pob_choice: and in Greek
  chosen_spanish: y en griego
  alternatives_spanish:
  - y en la lengua griega
  lexicon: BDAG
  rationale: La frase contrasta la forma hebrea con la griega del nombre; 'en griego' es breve y natural.
- source_word: ὄνομα ἔχει
  english_pob_choice: he has the name
  chosen_spanish: tiene el nombre
  alternatives_spanish:
  - es llamado
  - se llama
  lexicon: BDAG
  rationale: Se conserva en español la repetición léxica del griego ('nombre' + 'tener'), que tiene valor estilístico en el versículo.
- source_word: Ἀπολλύων
  english_pob_choice: Apollyon
  chosen_spanish: Apolión
  alternatives_spanish:
  - Apolión, Destruidor
  lexicon: BDAG
  rationale: Es un nombre propio y se translitera. La transparencia semántica de 'Destroyer' se mantiene en nota, no en el texto principal.
theological_decisions:
- issue: Cómo tratar los nombres Ἀβαδδών y Ἀπολλύων
  english_pob_reading: 'Transliterate both names in the main text as proper names: ''Abaddon'' and ''Apollyon.'''
  chosen_spanish_reading: 'Transliterar ambos nombres como nombres propios: ''Abadón'' y ''Apolión''.'
  alternative_spanish_readings:
  - Traducirlos como 'Destrucción' / 'Destructor'
  rationale: La lectura del POB distingue nombres propios de títulos. En español se conserva esa distinción transliterando en el texto principal y explicando su sentido léxico en nota.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names.'''
- issue: Cómo renderizar ἀβύσσου
  english_pob_reading: abyss
  chosen_spanish_reading: abismo
  alternative_spanish_readings:
  - pozo sin fondo
  - abismo sin fondo
  rationale: '''Abismo'' es la correspondencia más directa y evita importar una tradición interpretativa no explícita en el griego. La alternativa tradicional se preserva en nota para lectores que la reconozcan.'
  doctrine_reference: 'DOCTRINE.md: Prioridad de la fuente original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto al texto fuente y a la lectura inglesa auditada. Se mantiene la decisión de transliterar los nombres propios y de traducir ἀβύσσου como ''abismo''.'
  spanish_consistency_notes:
  - Se mantiene 'abismo' para ἀβύσσου, evitando la máscara tradicional 'abismo/pozo sin fondo' en el texto principal.
  - 'Se transliteran los nombres propios con adaptación al español: ''Abadón'' y ''Apolión''.'
  - '''Rey'' conserva la imaginería real del griego βασιλέα.'
  - La repetición de 'nombre' / 'tiene el nombre' refleja el estilo del versículo sin sonar forzada en español.
