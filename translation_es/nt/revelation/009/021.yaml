translation:
  language: es
  text: Y no se arrepintieron de sus homicidios, ni de sus hechicerías[a], ni de su inmoralidad sexual, ni de sus robos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «artes mágicas», «hechicerías»; el término griego también puede asociarse con pociones o envenenamientos.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετενόησαν
  english_pob_choice: did not repent
  chosen_spanish: no se arrepintieron
  alternatives_spanish:
  - no cambiaron de mente
  - no se volvieron atrás
  lexicon: BDAG
  rationale: En este contexto moral, μετανοέω expresa arrepentimiento real y vuelta del mal, no solo un cambio intelectual. «No se arrepintieron» es la forma natural y fiel en español.
- source_word: ἐκ
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - a partir de
  lexicon: BDAG
  rationale: La construcción con arrepentirse en español se expresa idiomáticamente con «arrepentirse de». Mantiene la idea de apartarse de esos pecados sin forzar una calca.
- source_word: φόνων
  english_pob_choice: murders
  chosen_spanish: homicidios
  alternatives_spanish:
  - asesinatos
  - muertes
  lexicon: BDAG
  rationale: φόνος puede referirse a homicidio o asesinato. «Homicidios» conserva la fuerza criminal y moral del término con un registro sobrio y público; evita restringirlo demasiado a una sola modalidad legal.
- source_word: φαρμάκων
  english_pob_choice: sorceries
  chosen_spanish: hechicerías
  alternatives_spanish:
  - sorcierías
  - artes mágicas
  - poisonings
  lexicon: BDAG
  rationale: En Apocalipsis, φάρμακα/φαρμακεία suele asociarse con prácticas mágicas u ocultistas, aunque el campo semántico puede incluir pociones o envenenamientos. «Hechicerías» conserva esa amplitud religiosa/ocultista en español y evita reducirlo a medicamentos modernos.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: πορνεία abarca conductas sexuales ilícitas en sentido amplio. «Inmoralidad sexual» transmite esa amplitud en español actual sin volverlo arcaico ni demasiado estrecho.
- source_word: κλεμμάτων
  english_pob_choice: thefts
  chosen_spanish: robos
  alternatives_spanish:
  - hurtos
  - actos de robo
  lexicon: BDAG
  rationale: En una lista de vicios, κλέμματα designa actos de robar. «Robos» es claro, plural y natural en español contemporáneo.
- source_word: οὔτε ... οὔτε ... οὔτε
  english_pob_choice: or ... or ... or
  chosen_spanish: ni ... ni ... ni
  alternatives_spanish:
  - o ... o ... o
  - ni tampoco ... ni tampoco ... ni tampoco
  lexicon: LSJ
  rationale: Después de la negación inicial, el español natural mantiene la serie con «ni ... ni ... ni», que reproduce la acumulación negativa del griego sin perder fluidez.
theological_decisions:
- issue: Alcance de φαρμάκων en una lista de vicios apocalíptica
  english_pob_reading: sorceries
  chosen_spanish_reading: hechicerías
  alternative_spanish_readings:
  - artes mágicas
  - envenenamientos
  - pociones mágicas
  rationale: El contexto inmediato enumera pecados y rebelión moral; por eso el sentido primario es de prácticas mágicas u ocultistas. «Hechicerías» preserva esa lectura y, al mismo tiempo, no excluye el trasfondo léxico más amplio de pociones o venenos.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tono moral de φόνων en la lista
  english_pob_reading: murders
  chosen_spanish_reading: homicidios
  alternative_spanish_readings:
  - asesinatos
  - muertes
  rationale: La lista presenta actos culpables concretos. «Homicidios» mantiene el peso moral y jurídico sin sobreespecificar la modalidad del crimen más de lo que exige el griego.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego y el audit trail inglés, con ajustes de idiomaticidad propios del español: «arrepintieron de» para μετενόησαν + ἐκ, y una serie negativa con «ni ... ni ... ni» en lugar de una calca de «or ... or ... or». La decisión sobre φαρμάκων conserva la ambigüedad registrada por el POB inglés mediante nota.'
  spanish_consistency_notes:
  - Se mantiene «hechicerías» para φαρμάκων por coherencia con el uso apocalíptico del término y con la nota léxica.
  - Se usa «homicidios» en vez de «asesinatos» para evitar un estrechamiento excesivo y sostener un registro sobrio.
  - La serie negativa con «ni ... ni ... ni» es consistente con español bíblico moderno y conserva la acumulación del original.
