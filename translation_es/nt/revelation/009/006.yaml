    changes_summary: Changed 'men' to 'people' for a more accurate rendering of οἱ ἄνθρωποι in contemporary formal English; retained the rest as accurate and natural.
translation:
  language: es
  text: Y en aquellos días la gente buscará la muerte, pero de ningún modo la encontrará[a]; desearán morir, pero la muerte huye de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las personas» o «los seres humanos»; el griego ἄνθρωποι suele usarse de manera genérica para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: Es una expresión temporal fija; «en aquellos días» conserva bien el valor deíctico y es natural en español bíblico actual.
- source_word: ζητήσουσιν
  english_pob_choice: will seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - irán tras
  - tratarán de encontrar
  lexicon: BDAG
  rationale: ζητέω puede ser «buscar» o «buscar con empeño». «Buscarán» es claro y mantiene la intención y gravedad del verbo sin volverlo interpretativo.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  - los seres humanos
  lexicon: BDAG
  rationale: El griego usa el plural masculino ἄνθρωποι con valor genérico. Se conserva la forma masculina representativa como decisión de precisión formal, sin perder el sentido inclusivo del contexto apocalíptico.
- source_word: τὸν θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - morir
  - el morir
  lexicon: BDAG
  rationale: «La muerte» reproduce el sustantivo directo y deja abierta la personificación que aparece explícitamente al final del versículo.
- source_word: οὐ μὴ εὑρήσουσιν αὐτόν
  english_pob_choice: will certainly not find it
  chosen_spanish: ciertamente no la encontrarán
  alternatives_spanish:
  - de ningún modo la encontrarán
  - nunca la encontrarán
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con futuro pide una negación fuerte. «Ciertamente no la encontrarán» transmite bien la fuerza sin sonar arcaico. «La» refiere a «la muerte».
- source_word: ἐπιθυμήσουσιν
  english_pob_choice: will long
  chosen_spanish: desearán
  alternatives_spanish:
  - anhelarán
  - tendrán deseo de
  lexicon: BDAG
  rationale: En este contexto apocalíptico, «desearán» comunica deseo intenso y directo; «anhelarán» sería viable, pero «desearán» resulta más sobrio y claro.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - morirse
  lexicon: BDAG
  rationale: El infinitivo aoristo se vierte naturalmente con el infinitivo español «morir».
- source_word: φεύγει
  english_pob_choice: flees
  chosen_spanish: huye
  alternatives_spanish:
  - se escapa
  - se aleja
  lexicon: BDAG
  rationale: El presente hace vívida la imagen personificada de la muerte como agente activo. «Huye» preserva esa personificación mejor que una formulación más explicativa.
- source_word: ὁ θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - la Muerte
  lexicon: BDAG
  rationale: El artículo y la posición del sustantivo muestran personificación; el español puede mantenerla con «la muerte» sin mayúscula, que resultaría más interpretativa de lo que exige el texto.
- source_word: ἀπ’ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - alejándose de ellos
  lexicon: BDAG
  rationale: Es una traducción directa y natural de ἀπό con genitivo. Con «huye» ya queda implícita la dirección de alejamiento.
theological_decisions:
- issue: Personificación de la muerte como agente que huye
  english_pob_reading: 'Retain the personification directly in the main text: ''death flees from them.'''
  chosen_spanish_reading: 'Mantener la personificación directamente: «la muerte huye de ellos».'
  alternative_spanish_readings:
  - «no podrán morir»
  - «la muerte se les escapa»
  rationale: El griego presenta a la muerte como sujeto activo de φεύγει. La traducción española preserva esa imagen apocalíptica sin resolverla en una paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than flatten imagery.'
- issue: Sentido genérico de ἄνθρωποι con plural masculino
  english_pob_reading: Translate as 'people' in the main text.
  chosen_spanish_reading: Traducir como «los hombres» para conservar el plural masculino genérico del original.
  alternative_spanish_readings:
  - «las personas»
  - «la gente»
  - «los seres humanos»
  rationale: El griego usa un masculino plural con valor genérico. En español, «los hombres» conserva esa forma y su fuerza representativa; el contexto deja claro que se trata de humanidad en general.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral, with contextual generic force preserved.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y toma en cuenta el audit trail inglés: se conserva la negación enfática de οὐ μή, la personificación de la muerte en φεύγει, y el valor genérico masculino de ἄνθρωποι. También se refleja la revisión inglesa que prefirió un equivalente contemporáneo para οἱ ἄνθρωποι, pero en español se mantiene «los hombres» por fidelidad a la forma masculina del original y por su uso genérico estable en el registro bíblico.'
  spanish_consistency_notes:
  - Usar «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Mantener «la muerte» en minúscula para conservar la personificación sin introducir una interpretación adicional.
  - La nota [a] debe anclarse en «los hombres» y no en «muerte».
  - Evitar «Cristo/Mesías» porque no aparece en el texto.
  - Conservar el orden coordinado del griego con una puntuación española fluida, sin añadir explicaciones al cuerpo del versículo.
