source:
  edition: SBLGNT
  text: καὶ ἐν ταῖς ἡμέραις ἐκείναις ζητήσουσιν οἱ ἄνθρωποι τὸν θάνατον καὶ οὐ μὴ εὑρήσουσιν αὐτόν, καὶ ἐπιθυμήσουσιν ἀποθανεῖν καὶ ⸀φεύγει ⸂ὁ θάνατος ἀπ’ αὐτῶν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/009/006.yaml
  text: And in those days people will seek death and will certainly not find it[a], and they will long to die, but death flees from them.
  footnotes:
