  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La personificación de «la muerte» está bien preservada. El problema principal es de alineación con la decisión léxica auditada para ἄνθρωποι: en este contexto debe preferirse «la gente» o «las personas» antes que «los hombres».'
