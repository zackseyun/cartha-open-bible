translation:
  language: es
  text: Y se les dio que no los mataran, sino que fueran atormentados por cinco meses; y su tormento es como el tormento de un escorpión cuando hiere[a] a un hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente en este contexto, «cuando pica a un hombre».
    reason: lexical_alternative
  - marker: b
    text: O «cuando hiere a una persona»; el griego «un hombre» puede funcionar aquí de manera genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  english_pob_choice: it was given
  chosen_spanish: se les dio
  alternatives_spanish:
  - les fue dado
  - se les concedió
  lexicon: BDAG
  rationale: El pasivo conserva el valor de concesión/permisión sin explicitar al dador. 'Se les dio' mantiene la forma impersonal y el matiz apocalíptico de pasivo divino.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: se les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo receptor se expresa naturalmente en español con 'se les', preservando la relación indirecta con el verbo pasivo.
- source_word: ἵνα μὴ ἀποκτείνωσιν αὐτούς
  english_pob_choice: that they should not kill them
  chosen_spanish: que no mataran a ellos
  alternatives_spanish:
  - que no los mataran
  - para que no los mataran
  lexicon: BDAG
  rationale: Conserva la finalidad/prohibición de ἵνα + subjuntivo. Se evita 'los' para no perder la referencia explícita del grupo castigado; 'a ellos' mantiene la claridad referencial aunque suene más enfático.
- source_word: ἀλλ’ ἵνα βασανισθήσονται
  english_pob_choice: but that they should be tormented
  chosen_spanish: sino que fueran atormentados
  alternatives_spanish:
  - sino que serían atormentados
  - sino para ser atormentados
  lexicon: BDAG
  rationale: '''Basanízō'' se rinde con ''atormentar'' para conservar la repetición léxica con ''tormento'' y no introducir una especificación excesiva como ''torturar''. El subjuntivo imperfecto mantiene la correlación con la cláusula de finalidad.'
- source_word: μῆνας πέντε
  english_pob_choice: for five months
  chosen_spanish: por cinco meses
  alternatives_spanish:
  - durante cinco meses
  - por espacio de cinco meses
  lexicon: BDAG
  rationale: La acusativa de duración se expresa de forma natural con 'por' en español, manteniendo la medida temporal breve y directa.
- source_word: ὁ βασανισμὸς αὐτῶν
  english_pob_choice: their torment
  chosen_spanish: su tormento
  alternatives_spanish:
  - el tormento de ellos
  - el tormento que padecen
  lexicon: BDAG
  rationale: '''Su tormento'' conserva la posesión/relación del genitivo y permite una redacción fluida. ''Tormento'' mantiene el parentesco léxico con el verbo ''atormentar''.'
- source_word: ὡς βασανισμὸς σκορπίου
  english_pob_choice: like the torment of a scorpion
  chosen_spanish: como el tormento de un escorpión
  alternatives_spanish:
  - como el tormento producido por un escorpión
  - como el dolor de un escorpión
  lexicon: BDAG
  rationale: Se preserva la comparación y la repetición del sustantivo. 'De un escorpión' reproduce la construcción genitiva con naturalidad en español.
- source_word: ὅταν παίσῃ
  english_pob_choice: when it strikes
  chosen_spanish: cuando hiere
  alternatives_spanish:
  - cuando pica
  - cuando golpea
  lexicon: BDAG
  rationale: Aunque παίω significa 'golpear/herir', en el contexto de un escorpión el verbo español más idiomático es 'herir', que comunica el daño sin forzar la imagen. Se evita estrechar el sentido a 'pica' como decisión principal, aunque sea una alternativa contextual válida.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: Se conserva el masculino singular genérico del griego. La nota permite explicitar el valor inclusivo sin perder la forma del texto fuente.
theological_decisions:
- issue: Pasivo divino y permiso soberano
  english_pob_reading: Retain the passive 'it was given to them' without explicitly naming God as the giver.
  chosen_spanish_reading: Conservar 'se les dio' sin nombrar explícitamente a Dios como dador.
  alternative_spanish_readings:
  - Dios les dio
  - les fue concedido
  rationale: El español impersonal preserva el pasivo divino y deja abierta la tensión apocalíptica entre soberanía divina y acción mediada. Nombrar a Dios introduciría una explicitación no presente en la forma verbal.
  doctrine_reference: Translation philosophy §3
- issue: Valor genérico de ἄνθρωπον
  english_pob_reading: Translate as 'a man' in the main text.
  chosen_spanish_reading: Traducir como 'un hombre' en el texto principal.
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El griego usa un masculino singular con fuerza representativa. Se conserva en el cuerpo principal, y la nota permite captar la genericidad para lectores modernos.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa disponible, que prefirió 'should be tormented' sobre 'would be tormented' para alinear la finalidad con la primera cláusula. En español se reflejó esa coherencia con 'que no mataran' / 'sino que fueran atormentados'. También se mantuvo la repetición léxica de βασανισμός con 'atormentados/tormento' y se preservó el pasivo divino mediante la construcción impersonal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se mantiene 'tormento/atormentar' para βασαν- por consistencia interna y por la comparación con el escorpión.
  - El masculino genérico 'un hombre' se anota para evitar una lectura exclusivamente sexista sin alterar la forma fuente.
  - La construcción 'se les dio' conserva el pasivo teológico y evita una explicitación interpretativa del agente.
