revisions:
- from: La primera calamidad[a] ha pasado. ¡Miren![b] Todavía vienen dos calamidades después de estas cosas.
  to: El primer ay[a] ha pasado. ¡He aquí![b], todavía vienen dos ayes después de estas cosas.
  rationale: Se reemplaza «calamidad» por «ay/ayes» para preservar la fórmula apocalíptica de οὐαί y la secuencia teológica-literaria del pasaje. Se ajusta ἰδού a «¡He aquí!» para mantener un registro profético digno y más cercano a la decisión inglesa auditada. Se corrigen las notas para que correspondan exactamente al texto revisado y reflejen las alternativas documentadas.
