translation:
  language: es
  text: El primer ay[a] ha pasado. ¡He aquí![b], todavía vienen dos ayes después de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el un ay»; el griego literalmente dice «el un ay», pero en contexto significa el primero de una serie.
    reason: lexical_alternative
  - marker: b
    text: O «aún vienen dos ayes después de esto».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: woe
  chosen_spanish: calamidad
  alternatives_spanish:
  - ay
  - ¡ay!
  - desgracia
  lexicon: BDAG
  rationale: En español, "calamidad" preserva el peso de anuncio de juicio y desastre que tiene οὐαί en Apocalipsis, sin sonar tan exclamativo como "ay", que en este contexto podría debilitar el valor apocalíptico. También evita reducirlo a un simple evento neutral.
- source_word: ἡ μία
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - la una
  - la única
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente "la una", el contexto de la serie de tres calamidades hace que la fuerza sea ordinal. "La primera" expresa con naturalidad en español la distinción de la primera de una secuencia.
- source_word: ἀπῆλθεν
  english_pob_choice: has passed
  chosen_spanish: ha pasado
  alternatives_spanish:
  - se fue
  - ha partido
  - ha terminado
  lexicon: BDAG
  rationale: El aoristo indica que esa calamidad ya quedó completada. "Ha pasado" es idiomático en español para una situación o etapa que concluyó, y mantiene bien la transición narrativa.
- source_word: ἰδού
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren aquí!
  - ¡He aquí!
  - ¡Vean!
  lexicon: BDAG
  rationale: '"ἰδού" funciona como marcador discursivo para llamar la atención. "¡Miren!" comunica esa urgencia de forma natural y digna en español contemporáneo, sin perder el énfasis profético.'
- source_word: ἔρχεται
  english_pob_choice: are still coming
  chosen_spanish: vienen
  alternatives_spanish:
  - están viniendo
  - todavía vienen
  - están por venir
  lexicon: BDAG
  rationale: El griego presenta la llegada inminente de dos calamidades. En español, "vienen" es una forma natural y suficientemente vívida; el adverbio "todavía" en el texto conserva la idea de que aún permanecen por delante.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía más
  lexicon: BDAG
  rationale: '"ἔτι" expresa continuidad o permanencia en el tiempo. "Todavía" transmite bien que esas dos calamidades siguen pendientes, y se integra de manera fluida con "vienen".'
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de esto
  - luego de estas cosas
  - más adelante
  lexicon: BDAG
  rationale: La frase conserva el plural demostrativo y el patrón temporal recurrente del griego. "Después de estas cosas" es transparente y cercano al original sin volverse innecesariamente literal en una forma extraña para el español.
theological_decisions:
- issue: Serie apocalíptica de las tres calamidades/ayes
  english_pob_reading: The verse marks the completion of the first announced woe and the imminent arrival of two additional woes.
  chosen_spanish_reading: El versículo marca la conclusión de la primera calamidad anunciada y la llegada inminente de dos calamidades más.
  alternative_spanish_readings:
  - El versículo marca la conclusión del primer ay y la llegada inminente de dos ayes más.
  - El versículo señala que pasó la primera desgracia y que vienen dos más.
  rationale: Mantener la secuencia numérica y el tono solemne del texto es importante para no diluir la estructura del juicio en la visión. "Calamidad" conserva el peso apocalíptico en español sin sacrificar claridad, y no borra la progresión de la serie.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El texto griego breve y el audit trail inglés muestran acuerdo alto y no requieren ajustes textuales adicionales; la principal decisión en español es cómo rendir οὐαί y ἡ μία sin perder la secuencia apocalíptica. Se optó por una equivalencia óptima: natural en español, pero aún transparente al original.'
  spanish_consistency_notes:
  - Se mantiene "calamidad" como equivalente principal de οὐαί para conservar la fuerza judicial/apocalíptica en este contexto.
  - '"La primera" expresa la fuerza ordinal de ἡ μία dentro de la serie de tres anuncios ya establecidos en el capítulo.'
  - '"Después de estas cosas" preserva el giro temporal recurrente y la pluralidad del demostrativo griego.'
  - Se usa el imperativo plural "¡Miren!" para reflejar el valor de ἰδού como llamado profético de atención.
