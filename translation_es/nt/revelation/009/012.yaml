review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: la primera desgracia/ay ya pasó, y siguen dos más. Sin embargo, la elección de «calamidad» para οὐαί no preserva tan fielmente como debería la fórmula apocalíptica repetida que el expediente inglés documenta explícitamente como «woe». También «¡Miren!» es comprensible para ἰδού, pero «¡He aquí!» o «Miren» encaja mejor con el registro profético-apocalíptico sin pluralizar innecesariamente al oyente.'
  spanish_quality_summary: El español es claro y natural, pero «calamidad» diluye el tono formular y la resonancia bíblica de οὐαί en Apocalipsis. «Después de estas cosas» suena aceptablemente formal y transparente. Conviene ajustar el texto y las notas para que el registro sea más bíblico y más alineado con la filosofía del proyecto.
  glossary_alignment: 'No hay conflicto con los términos globales principales del proyecto, pero sí con la decisión lexical auditada para οὐαί: debe preservarse preferentemente como «ay», no sustituirse por una paráfrasis como «calamidad». La decisión inglesa insiste en mantener la fórmula de juicio apocalíptico; en español «ay» cumple mejor esa función.'
  issues:
  - severity: high
    issue: οὐαί se tradujo como «calamidad» en lugar de «ay»
    rationale: El expediente inglés y la evidencia griega priorizan conservar la fórmula apocalíptica/judicial «woe». «Calamidad» interpreta el resultado, pero pierde la fuerza de pronunciamiento y la repetición estructural de los tres ayes en Apocalipsis.
  - severity: medium
    issue: La nota a) quedó desalineada con el texto principal
    rationale: El texto principal usa «calamidad», pero la nota alternativa habla de «el primer ay» y además explica literalmente «la una calamidad», mezcla que no sigue bien el griego ni la elección principal.
  - severity: medium
    issue: «¡Miren!» para ἰδού puede sonar demasiado coloquial y no refleja el registro profético con tanta precisión
    rationale: Aunque es posible, el contexto de Apocalipsis favorece una opción más elevada y reconocible en español bíblico, como «¡He aquí!», que además corresponde bien a la alternativa inglesa «Behold».
  - severity: low
    issue: La nota b) repite esencialmente el texto principal en vez de preservar mejor la alternativa inglesa
    rationale: La alternativa auditada es más bien «aún/yet dos ayes vienen después de esto», no una mera repetición del texto principal con «calamidades».
  revised_spanish_text: El primer ay[a] ha pasado. ¡He aquí![b], todavía vienen dos ayes después de estas cosas.
  revised_footnotes:
  - marker: a
    text: O «el un ay»; el griego literalmente dice «el un ay», pero en contexto significa el primero de una serie.
    reason: lexical_alternative
  - marker: b
    text: O «aún vienen dos ayes después de esto».
    reason: lexical_alternative
