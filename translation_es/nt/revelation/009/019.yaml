    rationale: 'Aunque no es obligatorio calcar la ubicación exacta, sí debe preservarse la información relevante: una nota sobre la posibilidad de relacionar «como serpientes» con la cláusula previa, y otra sobre la expresión instrumental/literal de la cláusula final.'
