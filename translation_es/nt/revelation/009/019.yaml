    rationale: 'Esto no corresponde ni al lugar del anclaje ni a la evidencia inglesa. La nota inglesa a ofrece la alternativa para la frase sobre las colas: «Or ''like serpents.''» En español, la nota debe ir en la frase pertinente y no ofrecer la misma palabra del texto.'
  - severity: high
    issue: La nota [b] repite «O «serpientes»» después de «serpientes[b]».
    rationale: 'Una nota no debe ofrecer como alternativa exactamente la misma lectura que ya está en el texto. Además, la segunda nota inglesa documenta la alternativa para la cláusula final: «Or ''they injure by them''; the Greek literally says ''and in them they do harm.''»'
  - severity: medium
