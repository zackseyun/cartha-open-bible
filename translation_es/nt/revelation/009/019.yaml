translation:
  language: es
  text: Porque el poder de los caballos está en sus bocas y en sus colas[a]; pues sus colas son semejantes a serpientes, con cabezas, y con ellas hacen daño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como serpientes».
    reason: lexical_alternative
  - marker: b
    text: O «las hieren por medio de ellas»; el griego dice literalmente «y en ellas hacen daño».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσία
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - autoridad
  lexicon: BDAG
  rationale: En este contexto apocalíptico, ἐξουσία expresa la capacidad efectiva de causar daño, no una autoridad delegada. «Poder» conserva mejor ese valor en español.
- source_word: στόματι
  english_pob_choice: mouths
  chosen_spanish: bocas
  alternatives_spanish:
  - boca
  lexicon: BDAG
  rationale: El griego usa singular distributivo con posesivo plural, pero en español resulta natural y claro el plural «bocas» para concordar con «caballos» y «sus».
- source_word: οὐραῖς
  english_pob_choice: tails
  chosen_spanish: colas
  alternatives_spanish:
  - rabo
  - cola
  lexicon: BDAG
  rationale: «Colas» es el equivalente más estándar y transparente para οὐρά en este pasaje, y mantiene la imaginería del texto.
- source_word: ὄφεσιν
  english_pob_choice: serpents
  chosen_spanish: serpientes
  alternatives_spanish:
  - serpientes
  - víboras
  lexicon: BDAG
  rationale: El término griego puede ser «serpiente» o «víbora»; «serpientes» conserva el tono formal y coincide con la revisión inglesa final, sin perder la imagen reptiliana.
- source_word: ἔχουσαι κεφαλάς
  english_pob_choice: having heads
  chosen_spanish: con cabezas
  alternatives_spanish:
  - que tienen cabezas
  - teniendo cabezas
  lexicon: BDAG
  rationale: La construcción participial se vierte de forma natural con «con cabezas», que preserva la secuencia descriptiva del griego sin sonar forzado.
- source_word: ἀδικοῦσιν
  english_pob_choice: they do harm
  chosen_spanish: hacen daño
  alternatives_spanish:
  - hieren
  - dañan
  - hacen mal
  lexicon: BDAG
  rationale: Aquí ἀδικέω describe causar perjuicio, no una injusticia abstracta. «Hacen daño» es idiomático en español y refleja bien el sentido contextual.
- source_word: ἐν αὐταῖς
  english_pob_choice: with them
  chosen_spanish: con ellas
  alternatives_spanish:
  - por ellas
  - mediante ellas
  - en ellas
  lexicon: BDAG
  rationale: El ἐν instrumental se expresa mejor como «con ellas», indicando el medio por el cual causan daño; «en ellas» sería demasiado literal y poco claro en español.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque / pues
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: BDAG
  rationale: Los dos γάρ son explicativos. Se combina «Porque» al inicio y «pues» en la segunda cláusula para mantener la conexión discursiva con fluidez natural en español.
theological_decisions:
- issue: Tratamiento de la imaginería apocalíptica de caballos, colas y cabezas
  english_pob_reading: Render the imagery straightforwardly without allegorical interpretation
  chosen_spanish_reading: Presentar la imagen de forma directa, sin convertirla en alegoría interpretativa
  alternative_spanish_readings:
  - Interpretar las colas como símbolos de falsa enseñanza o de agencia demoníaca
  - Suavizar la imagen para hacerla menos extraña
  rationale: El versículo describe una visión; la traducción debe preservar la imagen tal como está, sin añadir una interpretación que el griego no explicita.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «snakes» a «serpents» para un registro más formal; la versión española adopta «serpientes» para conservar ese nivel de registro y la cercanía imagética al griego. También se preserva la lectura instrumental de ἐν αὐταῖς con una frase natural en español.
  spanish_consistency_notes:
  - Se mantiene «poder» para ἐξουσία, coherente con la elección inglesa.
  - Se evita traducir ἀδικέω como «injusticia»; aquí el contexto exige daño/perjuicio físico.
  - No se introduce terminología eclesiástica tradicional ajena al pasaje; la imaginería queda intacta.
  - Las notas al pie distinguen alternativas léxicas reales sin duplicar marcadores.
