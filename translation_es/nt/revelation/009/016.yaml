translation:
  language: es
  text: Y el número de las tropas de la caballería era dos veces diez mil por diez mil[a]; oí su número.
  philosophy: formal
  footnotes:
  - marker: a
    text: Griego literalmente, «dobles miríadas de miríadas»; es decir, doscientos millones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀριθμὸς
  english_pob_choice: number
  chosen_spanish: número
  alternatives_spanish:
  - cuenta
  - total
  lexicon: BDAG
  rationale: ἀριθμός designa aquí la cantidad o cifra. «Número» conserva la repetición del original («el número... oí el número») y suena natural en español.
- source_word: στρατευμάτων
  english_pob_choice: troops
  chosen_spanish: tropas
  alternatives_spanish:
  - ejércitos
  - fuerzas
  lexicon: BDAG
  rationale: στράτευμα puede referirse a una formación militar o a tropas. «Tropas» mantiene el sentido militar sin forzar en español una expresión más pesada como «ejércitos de la caballería».
- source_word: ἱππικοῦ
  english_pob_choice: cavalry
  chosen_spanish: caballería
  alternatives_spanish:
  - caballería montada
  - jinetes
  lexicon: BDAG
  rationale: El término griego es colectivo y adjetival, equivalente a la fuerza montada. «Caballería» es el correlato militar directo en español.
- source_word: δισμυριάδες μυριάδων
  english_pob_choice: twice ten thousand times ten thousand
  chosen_spanish: doce miríadas de miríadas
  alternatives_spanish:
  - doscientas millones
  - veinte mil por veinte mil
  - doble miríada de miríadas
  lexicon: BDAG
  rationale: La revisión inglesa prefirió una forma más transparente al griego literal. En español, «doce miríadas de miríadas» conserva la estructura figurada y el valor de multiplicación extrema sin sustituirla por una cifra interpretativa. «Miríada» es comprensible y mantiene la intertextualidad apocalíptica.
- source_word: ἤκουσα
  english_pob_choice: I heard
  chosen_spanish: oí
  alternatives_spanish:
  - escuché
  - yo oí
  lexicon: BDAG
  rationale: Aoristo narrativo simple. «Oí» es conciso y fiel; el sujeto implícito de primera persona ya está claro por el contexto.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de las tropas
  lexicon: BDAG
  rationale: El pronombre genitivo plural se refiere a las tropas/caballería. «Su» es idiomático en español y preserva la referencia colectiva.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó la cifra interpretativa por una forma más formalmente equivalente al griego: «twice ten thousand times ten thousand». En esta versión española se optó por mantener la equivalencia formal con «doce miríadas de miríadas», conservando además una nota que explicita la expresión literal y su función retórica/apocalíptica.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de «número» para reflejar la repetición del griego.
  - Se prefirió «caballería» como término militar estándar y no «jinetes», para conservar el referente colectivo.
  - No se convirtió la expresión numérica en una cifra moderna, a fin de no borrar la tensión entre literalidad y computabilidad presente en el audit trail.
  - La nota al pie marca la alternativa interpretativa sin desplazar el texto principal.
