    rationale: La footnote no preserva la alternativa literal correcta del griego ni la explicación del audit trail inglés; en su forma actual desinforma al lector.
  - severity: medium
    issue: La formulación española para el número debe reflejar la revisión inglesa formalmente equivalente
    rationale: El audit trail cambió de 'two hundred million' a 'twice ten thousand times ten thousand' para transparentar la forma griega. El español debe hacer algo equivalente, no una cifra distinta ni una falsa literalidad.
  revised_spanish_text: Y el número de las tropas de la caballería era dos veces diez mil por diez mil[a]; oí su número.
