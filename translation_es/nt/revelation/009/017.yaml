  text: καὶ οὕτως εἶδον τοὺς ἵππους ἐν τῇ ὁράσει καὶ τοὺς καθημένους ἐπ’ αὐτῶν, ἔχοντας θώρακας πυρίνους καὶ ὑακινθίνους καὶ θειώδεις· καὶ αἱ κεφαλαὶ τῶν ἵππων ὡς κεφαλαὶ λεόντων, καὶ ἐκ τῶν στομάτων αὐτῶν ἐκπορεύεται πῦρ καὶ καπνὸς καὶ θεῖον.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/009/017.yaml
  text: And thus I saw the horses in the vision and those sitting on them[a], having breastplates fiery and hyacinth-colored and sulfurous; and the heads of the horses were like lions’ heads[b], and out of their mouths come fire and smoke and sulfur.
  footnotes:
