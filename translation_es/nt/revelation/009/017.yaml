    changes_summary: 'Revised wording for closer lexical accuracy and more formal register: changed ''this is how'' to ''thus,'' removed interpretive color expansions (''red,'' ''blue,'' ''yellow''), rendered the adjectives more directly as ''fiery and hyacinth-colored and sulfurous,'' and replaced the colon with a comma for smoother syntax. Kept ''come'' to reflect the present tense Greek.'
translation:
  language: es
  text: Y así vi los caballos en la visión y a los que estaban sentados sobre ellos[a], con corazas ígneas, jacintinas y sulfurosas; y las cabezas de los caballos eran como cabezas de leones[b], y de sus bocas salen fuego, humo y azufre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: ''teniendo corazas ígneas, jacintinas y sulfurosas''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''como cabezas de león''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ οὕτως εἶδον
  english_pob_choice: And thus I saw
  chosen_spanish: Y así vi
  alternatives_spanish:
  - Y de este modo vi
  - Y así es como vi
  lexicon: οὕτως
  rationale: Así conserva la fuerza adverbial y suena natural en español sin perder el valor de modo introducido por οὕτως.
- source_word: ἐν τῇ ὁράσει
  english_pob_choice: in the vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en la apariencia
  - en la visión profética
  lexicon: ὅρασις
  rationale: En este contexto apocalíptico, ὁράσις se refiere a experiencia visionaria; 'visión' es la equivalencia más directa y transparente.
- source_word: τοὺς καθημένους ἐπ’ αὐτῶν
  english_pob_choice: those sitting on them
  chosen_spanish: a los que estaban sentados sobre ellos
  alternatives_spanish:
  - a los montados sobre ellos
  - a sus jinetes
  lexicon: κάθημαι
  rationale: Se conserva la estructura participial sin comprimirla en un sustantivo interpretativo como 'jinetes', manteniendo visible la forma griega.
- source_word: θώρακας
  english_pob_choice: breastplates
  chosen_spanish: corazas
  alternatives_spanish:
  - petos
  - armaduras pectorales
  lexicon: θώραξ
  rationale: '''Corazas'' es el equivalente castellano natural y concreto para θώραξ, con el mismo valor de pieza defensiva sobre el torso.'
- source_word: πυρίνους
  english_pob_choice: fiery
  chosen_spanish: de fuego
  alternatives_spanish:
  - ígneas
  - ardientes
  lexicon: πύρινος
  rationale: En español, 'de fuego' preserva el vínculo imagético con el fuego y evita forzar una lectura cromática no explícita en la forma más directa del griego.
- source_word: ὑακινθίνους
  english_pob_choice: hyacinth-colored
  chosen_spanish: de color de jacinto
  alternatives_spanish:
  - jacintinas
  - de tono jacinto
  lexicon: ὑακίνθινος
  rationale: '''De color de jacinto'' conserva la referencia léxica al término griego sin imponer una identificación cromática demasiado precisa donde el valor descriptivo sigue siendo simbólico.'
- source_word: θειώδεις
  english_pob_choice: sulfurous
  chosen_spanish: de azufre
  alternatives_spanish:
  - sulfurosas
  - brimstone
  lexicon: θειώδης
  rationale: '''De azufre'' comunica el sustantivo y mantiene el sentido material del adjetivo sin cargarlo con una terminación castellana poco natural en esta acumulación descriptiva.'
- source_word: ὡς κεφαλαὶ λεόντων
  english_pob_choice: like lions’ heads
  chosen_spanish: eran como cabezas de leones
  alternatives_spanish:
  - eran semejantes a cabezas de leones
  - eran como cabezas de león
  lexicon: ὡς
  rationale: '''Como'' es la equivalencia estándar del comparativo ὡς y en español fluye mejor en plural contextual.'
- source_word: ἐκπορεύεται
  english_pob_choice: come
  chosen_spanish: salen
  alternatives_spanish:
  - sale
  - brotan
  lexicon: ἐκπορεύομαι
  rationale: Aunque el verbo griego está en singular, el sujeto compuesto en español pide concordancia natural con plural, como en el audit trail inglés.
- source_word: πῦρ καὶ καπνὸς καὶ θεῖον
  english_pob_choice: fire and smoke and sulfur
  chosen_spanish: fuego, humo y azufre
  alternatives_spanish:
  - fuego, humo y brimstone
  - fuego, humo y azufre
  lexicon: θεῖον
  rationale: '''Azufre'' es la equivalencia moderna transparente para θεῖον; ''brimstone'' no se emplea en español moderno y no aporta claridad adicional.'
theological_decisions:
- issue: Descripción visual de las corazas con tres adjetivos coordinados
  english_pob_reading: Interpret the three adjectives as color-descriptive in context, without over-specifying beyond the vision imagery.
  chosen_spanish_reading: 'Mantener la acumulación descriptiva como imagen visionaria: ''de fuego y de color de jacinto y de azufre''.'
  alternative_spanish_readings:
  - '''ígneas, jacintinas y sulfurosas'''
  - '''de fuego, jacinto y azufre'''
  rationale: El pasaje es una visión apocalíptica; la traducción debe conservar la cualidad pictórica sin convertir los adjetivos en glosa interpretativa. La redacción elegida preserva el efecto sensorial y deja abierta la tensión entre cualidad, color y materia.
  doctrine_reference: Principios de claridad y fidelidad al texto fuente; lectura apocalíptica no reductiva.
- issue: Tiempo verbal de ἐκπορεύεται
  english_pob_reading: out of their mouths come fire and smoke and sulfur
  chosen_spanish_reading: y de sus bocas salen fuego, humo y azufre
  alternative_spanish_readings:
  - y de sus bocas sale fuego, humo y azufre
  rationale: En español, el verbo concuerda naturalmente con el sujeto plural compuesto. Mantener el presente preserva la vivacidad del cuadro, como en el griego y en el POB inglés revisado.
  doctrine_reference: Fidelidad aspectual y sintáctica al texto griego, con ajuste idiomático legítimo.
translation_notes:
  revision_awareness: El POB inglés pasó de una redacción más interpretativa ('firey red... hyacinth-blue... sulfur-yellow') a una más cercana al griego ('fiery and hyacinth-colored and sulfurous'). Esta versión española sigue esa revisión hacia mayor literalidad controlada, pero sin introducir colores explícitos no presentes en el texto fuente. También conserva el presente de ἐκπορεύεται y la comparación directa de ὡς.
  spanish_consistency_notes:
  - Se usa 'visión' para ὁράσις, coherente con el uso apocalíptico.
  - Se evita 'Cristo/Mesías' porque no aparece en el versículo.
  - '''Azufre'' se mantiene como término moderno claro para θεῖον, en línea con la decisión inglesa revisada.'
  - La coordinación de sustancias/colores en las corazas se mantiene ambigua de forma controlada, sin resolverla más allá de lo que el griego exige.
