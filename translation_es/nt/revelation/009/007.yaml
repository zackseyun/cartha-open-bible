translation:
  language: es
  text: Y la apariencia de las langostas era como caballos preparados para la batalla, y sobre sus cabezas había lo que parecía ser coronas[a] semejantes al oro, y sus rostros eran como rostros de humanos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «coronas de victoria»; el griego στέφανοι puede referirse a coronas o guirnaldas asociadas con honor o conquista.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «rostros de humanos»; la expresión es genérica, no específicamente masculina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοιώματα
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - formas
  - apariencias
  - semejanza
  lexicon: BDAG
  rationale: ὁμοίωμα puede expresar forma, apariencia o semejanza. En este contexto visionario introduce una descripción de impresión visual, no una afirmación de identidad literal; «apariencia» comunica bien ese matiz en español.
- source_word: ἀκρίδων
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - saltamontes
  lexicon: BDAG
  rationale: ἀκρίς designa normalmente langosta; el contexto apocalíptico no cambia el sentido básico. «Langostas» es el equivalente natural y bíblicamente claro en español.
- source_word: ὅμοια ἵπποις ἡτοιμασμένοις εἰς πόλεμον
  english_pob_choice: like horses prepared for battle
  chosen_spanish: como caballos preparados para la batalla
  alternatives_spanish:
  - similares a caballos preparados para la guerra
  - como caballos listos para la batalla
  lexicon: BDAG
  rationale: ὅμοια marca comparación, y ἡτοιμασμένοις describe un estado de preparación. «Preparados para la batalla» conserva el tono militar y suena natural en español.
- source_word: πόλεμον
  english_pob_choice: battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  lexicon: BDAG
  rationale: Aunque πόλεμος puede significar «guerra», en esta frase el sentido inmediato es el de combate. «Batalla» mantiene la imagen bélica sin volverla más amplia de lo necesario.
- source_word: ἐπὶ τὰς κεφαλὰς αὐτῶν
  english_pob_choice: on their heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - en sus cabezas
  lexicon: BDAG
  rationale: La preposición con acusativo expresa ubicación espacial simple. «Sobre sus cabezas» reproduce de manera clara y natural la imagen.
- source_word: ὡς στέφανοι
  english_pob_choice: what seemed to be crowns
  chosen_spanish: lo que parecía ser coronas
  alternatives_spanish:
  - como coronas
  - lo que aparentaba ser coronas
  lexicon: BDAG
  rationale: ὡς introduce comparación repetida en el versículo. «Lo que parecía ser» ayuda a conservar el carácter visionario y evita afirmar una literalidad que el griego no exige.
- source_word: στέφανοι
  english_pob_choice: crowns
  chosen_spanish: coronas
  alternatives_spanish:
  - guirnaldas
  - coronas de victoria
  lexicon: BDAG
  rationale: στέφανος puede significar corona o corona/laurel de honor o victoria. «Coronas» es el término general más claro; la posibilidad de victoria queda reservada para la nota.
- source_word: ὅμοιοι χρυσῷ
  english_pob_choice: like gold
  chosen_spanish: como de oro
  alternatives_spanish:
  - parecidas al oro
  - doradas
  lexicon: BDAG
  rationale: El dativo χρυσῷ tras ὅμοιοι expresa semejanza, no composición. «Como de oro» preserva mejor la comparación que un adjetivo como «doradas».
- source_word: πρόσωπα
  english_pob_choice: faces
  chosen_spanish: rostros
  alternatives_spanish:
  - caras
  lexicon: BDAG
  rationale: En este contexto πρόσωπον se refiere al aspecto visible del rostro. «Rostros» es natural y digno en español bíblico.
- source_word: ἀνθρώπων
  english_pob_choice: human
  chosen_spanish: de humanos
  alternatives_spanish:
  - de hombres
  - humanos
  lexicon: BDAG
  rationale: ἄνθρωπος aquí es genérico, no masculino específico. «De humanos» conserva el valor inclusivo del griego y evita restringir el referente.
theological_decisions:
- issue: Lenguaje de similitud en la visión apocalíptica
  english_pob_reading: Preserve repeated comparison markers rather than literalize the imagery
  chosen_spanish_reading: Conservar los marcadores de comparación sin volver literal la imaginería
  alternative_spanish_readings:
  - traducir más literalmente sin notas de apariencia
  - simplificar el lenguaje figurado
  rationale: El versículo repite ὅμοια/ὡς para describir semejanza visual. La traducción mantiene ese carácter fenomenológico («como», «parecía») para no resolver ni endurecer la visión más allá de lo que el texto permite.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que optó por un singular colectivo («appearance was») para reflejar el sentido global del griego. En español se ha mantenido un singular equivalente («la apariencia era» / «había lo que parecía ser») sin perder la acumulación de comparaciones del original.
  spanish_consistency_notes:
  - Se mantiene «langostas» para ἀκρίδες y no se sustituye por un término más genérico.
  - Se conserva la serie comparativa con «como/parecía», coherente con el tratamiento POB de la imaginería visionaria.
  - «Coronas» se usa como término general, con nota sobre la alternativa de coronas de victoria.
  - «De humanos» preserva el valor genérico de ἀνθρώπων y evita un masculino no necesario.
  - Se emplea «la batalla» para πόλεμον, siguiendo una equivalencia española natural y consistente con el registro bélico del pasaje.
