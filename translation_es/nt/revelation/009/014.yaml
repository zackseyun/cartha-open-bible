translation:
  language: es
  text: 'diciendo al sexto ángel, el que tenía la trompeta: «Libera a los cuatro ángeles que están atados[a] junto al gran río Eufrates».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que han sido atados» o «atados»; el participio perfecto griego subraya su estado actual de restricción como resultado de una atadura anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que decía
  - hablando
  lexicon: BDAG
  rationale: El participio presente se conserva como acción en curso con «diciendo», manteniendo la conexión narrativa con la voz del altar en el versículo anterior sin volverlo una oración explicativa más pesada.
- source_word: τῷ ἕκτῳ ἀγγέλῳ
  english_pob_choice: to the sixth angel
  chosen_spanish: al sexto ángel
  alternatives_spanish:
  - al ángel sexto
  - al ángel, el sexto
  lexicon: BDAG
  rationale: Se mantiene el dativo indirecto y el orden natural del español. «Sexto» conserva la función ordinal sin añadir matices interpretativos.
- source_word: ὁ ἔχων τὴν σάλπιγγα
  english_pob_choice: the one who had the trumpet
  chosen_spanish: el que tenía la trompeta
  alternatives_spanish:
  - el que llevaba la trompeta
  - el que sostenía la trompeta
  lexicon: BDAG
  rationale: El participio articular identifica al ángel referido. «Tenía» reproduce de manera natural la posesión o tenencia de la trompeta en el contexto narrativo, y conserva la fuerza identificadora mejor que una simple relativa.
- source_word: Λῦσον
  english_pob_choice: Release
  chosen_spanish: Suelta
  alternatives_spanish:
  - Libera
  - Desata
  lexicon: BDAG
  rationale: El imperativo de λύω puede expresarse como desatar/liberar. «Suelta» conserva el valor de remover la restricción con un español claro y directo, sin perder la imagen de atadura del contexto.
- source_word: τοὺς τέσσαρας ἀγγέλους
  english_pob_choice: the four angels
  chosen_spanish: a los cuatro ángeles
  alternatives_spanish:
  - los cuatro ángeles
  lexicon: BDAG
  rationale: El objeto directo/mandato en español se expresa naturalmente con «a». Se conserva el numeral y no se añade ninguna calificación teológica que el texto no explicita.
- source_word: τοὺς δεδεμένους
  english_pob_choice: who are bound
  chosen_spanish: que están atados
  alternatives_spanish:
  - que han sido atados
  - atados
  lexicon: BDAG
  rationale: El participio perfecto pasivo señala un estado vigente resultante de una atadura previa. «Están atados» comunica ese estado presente de forma natural en español, sin resolver la tensión del participio hacia una formulación más interpretativa.
- source_word: ἐπὶ τῷ ποταμῷ
  english_pob_choice: at the river
  chosen_spanish: junto al río
  alternatives_spanish:
  - en el río
  - por el río
  lexicon: BDAG
  rationale: Con dativo, ἐπί aquí es locativo. «Junto al» es una opción natural en español para indicar ubicación cercana o asociada al río, evitando la ambigüedad de una relación puramente superficial de «sobre».
- source_word: τῷ μεγάλῳ Εὐφράτῃ
  english_pob_choice: the great river Euphrates
  chosen_spanish: el gran río Éufrates
  alternatives_spanish:
  - el gran Éufrates
  - el gran río, el Éufrates
  lexicon: BDAG
  rationale: Se conserva la expresión estable del nombre propio con su epíteto. «Gran río Éufrates» refleja la apposición griega y mantiene la dignidad del referente geográfico.
theological_decisions:
- issue: Identidad y estatus moral de los cuatro ángeles
  english_pob_reading: Render simply as 'the four angels' without specifying whether they are holy or fallen.
  chosen_spanish_reading: Traducir simplemente «los cuatro ángeles», sin calificarlos como caídos, santos u otra cosa.
  alternative_spanish_readings:
  - los cuatro ángeles caídos
  - los cuatro ángeles designados para juicio
  rationale: El versículo solo los presenta como ángeles atados junto al Éufrates. Traducirlos con una etiqueta teológica resolvería indebidamente una tensión que el texto mantiene abierta; por eso se conserva la neutralidad del original.
  doctrine_reference: Preservar la tensión teológica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: El texto base inglés no requirió revisiones posteriores; la versión española sigue el mismo estado textual estable y conserva la decisión de no especificar más allá de lo que el griego dice sobre los cuatro ángeles.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Se mantuvo «ángeles» sin añadir adjetivos doctrinales.
  - «Éufrates» conserva la forma usual en español, con el artículo y epíteto acordes al griego.
  - Se prefirió un español actual y digno, evitando arcaísmos innecesarios como «desata» si no aportan claridad adicional.
