translation:
  language: es
  text: Y el quinto ángel tocó la trompeta[a], y vi una estrella que había caído del cielo a la tierra[c][b], y se le dio la llave del pozo vertical del abismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una estrella caída del cielo a la tierra». El participio griego puede verterse de modo más compacto, pero probablemente indica que la caída ya había ocurrido cuando Juan la vio.'
    reason: lexical_alternative
  - marker: b
    text: 'La «estrella» puede simbolizar un ser personal, ya que el texto continúa: «se le dio» la llave.'
    reason: alternative_reading
  - marker: c
    text: 'Tradicional: «la llave del pozo del abismo» o «del pozo del abismo sin fondo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  english_pob_choice: sounded the trumpet
  chosen_spanish: tocó la trompeta
  alternatives_spanish:
  - sonó la trompeta
  - hizo sonar la trompeta
  lexicon: BDAG
  rationale: σαλπίζω significa sonar o tocar una trompeta. En español, «tocó la trompeta» es natural y conserva la imagen explícita del instrumento, con el mismo valor verbal de acción sonora.
- source_word: ἀστέρα
  english_pob_choice: star
  chosen_spanish: estrella
  alternatives_spanish:
  - ser celestial
  - ser angelical
  lexicon: BDAG
  rationale: ἀστήρ denota literalmente una «estrella». En el texto apocalíptico puede tener referencia simbólica o personal, pero la forma más fiel en el cuerpo principal es conservar la imagen sin interpretarla.
- source_word: πεπτωκότα
  english_pob_choice: that had fallen
  chosen_spanish: que había caído
  alternatives_spanish:
  - caída
  - caído
  lexicon: BDAG
  rationale: El participio perfecto expresa una caída ya cumplida con estado resultante antes de la visión de Juan. «Que había caído» comunica mejor esa anterioridad que un simple «caído».
- source_word: ἐκ τοῦ οὐρανοῦ ... εἰς τὴν γῆν
  english_pob_choice: from heaven to the earth
  chosen_spanish: del cielo a la tierra
  alternatives_spanish:
  - del cielo sobre la tierra
  - desde el cielo hasta la tierra
  lexicon: BDAG
  rationale: En Apocalipsis, οὐρανός se traduce mejor como «cielo» en español corriente y eclesiástico, sin perder la oposición cósmica con «la tierra». La construcción conserva el movimiento descendente del griego.
- source_word: ἐδόθη αὐτῷ
  english_pob_choice: was given to him
  chosen_spanish: se le dio
  alternatives_spanish:
  - le fue dada
  - le dieron
  lexicon: BDAG
  rationale: La pasiva impersonal del griego se refleja con «se le dio», que preserva la reserva sobre el agente y mantiene la posibilidad de una acción permisiva o soberana implícita.
- source_word: κλεὶς
  english_pob_choice: the key
  chosen_spanish: la llave
  alternatives_spanish:
  - la llave
  - la clave
  lexicon: BDAG
  rationale: ἡ κλείς es «la llave» en español. Aunque «clave» existe, aquí el objeto concreto de acceso o cierre se expresa mejor con «llave».
- source_word: φρέατος
  english_pob_choice: shaft
  chosen_spanish: pozo
  alternatives_spanish:
  - sima
  - abertura
  - pozo/sháft
  lexicon: BDAG
  rationale: φρέαρ puede significar pozo, foso o abertura vertical. En español, «pozo» es la opción más directa y transparente; mantiene la imagen de un acceso abierto hacia el abismo sin introducir un tecnicismo innecesario.
- source_word: τῆς ἀβύσσου
  english_pob_choice: of the abyss
  chosen_spanish: del abismo
  alternatives_spanish:
  - del abismo
  - del fondo sin fin
  lexicon: BDAG
  rationale: ἄβυσσος se traduce con el término apocalíptico estándar «abismo», que preserva el sentido sin recurrir a una paráfrasis tradicional más interpretativa.
theological_decisions:
- issue: Identidad de la «estrella»
  english_pob_reading: Retain 'star' in the main text without interpretive identification
  chosen_spanish_reading: Conservar «estrella» en el texto principal sin identificar al personaje
  alternative_spanish_readings:
  - ángel
  - ser angélico
  - Satanás
  rationale: El versículo presenta la figura bajo la imagen de una estrella y luego usa referencia personal («se le dio»), pero no la identifica de forma explícita. La traducción debe preservar esa tensión sin importar una interpretación no expresada en el texto.
  doctrine_reference: Translation philosophy §3
- issue: Pasivo sin agente explícito
  english_pob_reading: Keep the passive without naming God as giver
  chosen_spanish_reading: Mantener la pasiva impersonal «se le dio» sin nombrar a Dios
  alternative_spanish_readings:
  - Dios le dio la llave
  - le fue dada por Dios la llave
  rationale: El griego usa una pasiva que deja el agente sin mencionar. En Apocalipsis esto puede implicar soberanía divina, pero la traducción debe conservar la reserva del texto y no explicitar lo que el griego calla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el aparato auditado en inglés. Se conserva la imagen de la estrella, la anterioridad del participio perfecto, la pasiva impersonal y el léxico apocalíptico clave («abismo»). No se introdujeron cambios respecto del consenso alto del registro auditado.
  spanish_consistency_notes:
  - Se prefirió «cielo» a «cielo/firmamento» por la terminología apocalíptica y la oposición clásica con «tierra».
  - Se optó por «pozo» para φρέαρ, aunque el inglés auditado eligió «shaft», porque en español la palabra comunica con claridad la abertura vertical sin sonar técnica.
  - Se mantuvo «llave» y no «clave», para conservar el objeto concreto del acceso al abismo.
  - Se conservó la pasiva impersonal «se le dio» para respetar la ambigüedad del agente y no resolver teológicamente el sujeto de la acción.
