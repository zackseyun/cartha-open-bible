translation:
  language: es
  text: Y se les dijo que no dañaran la hierba de la tierra[a], ni ninguna cosa verde, ni ningún árbol, sino solamente a las personas que no tienen el sello de Dios sobre sus frentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «nada verde».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρρέθη αὐταῖς
  english_pob_choice: they were told
  chosen_spanish: se les dijo
  alternatives_spanish:
  - se les ordenó
  - les fue dicho
  lexicon: BDAG
  rationale: El pasivo impersonal conserva que la instrucción se da sin explicitar el sujeto. «Se les dijo» suena natural en español y no añade el matiz más fuerte de una orden explícita, aunque el contexto lo implica.
- source_word: ἵνα μὴ ἀδικήσουσιν
  english_pob_choice: not to harm
  chosen_spanish: que no dañaran
  alternatives_spanish:
  - que no hirieran
  - que no perjudicaran
  lexicon: BDAG
  rationale: ἀδικέω aquí tiene sentido de causar daño dentro de un juicio apocalíptico. «Dañaran» reproduce bien el efecto verbal y mantiene el alcance físico del contexto.
- source_word: τὸν χόρτον τῆς γῆς
  english_pob_choice: the grass of the earth
  chosen_spanish: la hierba de la tierra
  alternatives_spanish:
  - el pasto de la tierra
  - la vegetación de la tierra
  lexicon: BDAG
  rationale: χόρτος puede referirse a hierba o vegetación baja. «Hierba» es la opción más directa y natural en español, conservando la relación genitiva y la amplitud visual de la escena.
- source_word: πᾶν χλωρὸν
  english_pob_choice: any green thing
  chosen_spanish: nada verde
  alternatives_spanish:
  - cualquier cosa verde
  - ninguna cosa verde
  lexicon: BDAG
  rationale: El adjetivo sustantivado χλωρόν es más amplio que «planta» y literalmente significa «algo verde». «Nada verde» mantiene esa amplitud sin forzar una interpretación botánica estrecha.
- source_word: πᾶν δένδρον
  english_pob_choice: any tree
  chosen_spanish: ningún árbol
  alternatives_spanish:
  - ningún árbol frutal
  - cualquier árbol
  lexicon: BDAG
  rationale: δένδρον se traduce de manera directa por «árbol». La coordinación con los términos anteriores exige mantener la misma serie vegetal.
- source_word: εἰ μὴ
  english_pob_choice: but only
  chosen_spanish: sino solamente
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: La expresión introduce la única excepción permitida. «Sino solamente» expresa bien esa exclusión/limitación en español y conserva el contraste del griego.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the people
  chosen_spanish: las personas
  alternatives_spanish:
  - los seres humanos
  - la gente
  lexicon: BDAG
  rationale: ἄνθρωποι aquí designa seres humanos en general, no varones solamente. «Las personas» es inclusivo, claro y natural en español.
- source_word: οἵτινες οὐκ ἔχουσι
  english_pob_choice: who do not have
  chosen_spanish: que no tienen
  alternatives_spanish:
  - que no poseen
  - los cuales no tienen
  lexicon: BDAG
  rationale: El relativo cualitativo se conserva con «que». «Tienen» es el equivalente más natural de ἔχω en este contexto de posesión/marcado.
- source_word: τὴν σφραγῖδα τοῦ θεοῦ
  english_pob_choice: the seal of God
  chosen_spanish: el sello de Dios
  alternatives_spanish:
  - el sello de Dios sobre ellos
  - la marca de Dios
  lexicon: BDAG
  rationale: σφραγίς es «sello», un marcador apocalíptico de pertenencia y protección. Mantener «sello» preserva la terminología bíblica y la conexión con el texto griego.
- source_word: ἐπὶ τῶν μετώπων
  english_pob_choice: on their foreheads
  chosen_spanish: sobre sus frentes
  alternatives_spanish:
  - en sus frentes
  - sobre la frente de ellos
  lexicon: BDAG
  rationale: μέτωπον es «frente». «Sobre sus frentes» conserva la imagen de ubicación del sello y es idiomático en español.
theological_decisions:
- issue: Alcance de ἀνθρώπους
  english_pob_reading: generic human beings ('the people') rather than males only
  chosen_spanish_reading: referencia genérica a seres humanos ('las personas')
  alternative_spanish_readings:
  - los hombres
  - los varones
  rationale: El contraste del versículo es entre vegetación y seres humanos marcados o no marcados por Dios. Nada en el griego restringe el referente a varones; por eso se eligió una formulación genérica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza del pasivo impersonal
  english_pob_reading: authoritative instruction without specifying the speaker
  chosen_spanish_reading: instrucción impersonal sin sujeto explícito
  alternative_spanish_readings:
  - se les ordenó
  - Dios les dijo
  rationale: El pasivo ἐρρέθη deja al hablante implícito. La traducción no debe introducir explícitamente a Dios como sujeto si el griego no lo hace, aunque el contexto apocalíptico lo sugiera.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Sentido de πᾶν χλωρόν
  english_pob_reading: any green thing
  chosen_spanish_reading: nada verde
  alternative_spanish_readings:
  - cualquier cosa verde
  - cualquier vegetal verde
  rationale: El término griego es más amplio que «planta» y no obliga a una categoría botánica precisa. «Nada verde» conserva esa amplitud y evita estrechar indebidamente el referente.
  doctrine_reference: DOCTRINE.md §Lexical precision
translation_notes:
  revision_awareness: La redacción sigue la última revisión auditada del inglés POB, que corrigió la equivalencia de πᾶν χλωρόν desde «any green plant» a «any green thing» por ser más amplia y precisa. En español se reflejó esa amplitud con «nada verde», evitando limitarlo a vegetación específica.
  spanish_consistency_notes:
  - Se mantuvo «sello de Dios» para conservar la terminología apocalíptica del sello como marca de pertenencia/protección.
  - Se prefirió «personas»/«las personas» para evitar lectura masculina restrictiva de ἀνθρώπους.
  - «Se les dijo» respeta el pasivo impersonal del griego y evita añadir un sujeto no expresado.
  - 'La serie vegetal se mantuvo paralela: hierba / nada verde / ningún árbol, siguiendo la progresión del texto fuente.'
