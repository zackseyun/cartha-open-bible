translation:
  language: es
  text: Y tienen colas semejantes a escorpiones, y aguijones; y en sus colas está su poder para hacer daño a las personas[a] por cinco meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seres humanos». El griego ἀνθρώπους puede funcionar aquí como término genérico para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρὰς
  english_pob_choice: tails
  chosen_spanish: colas
  alternatives_spanish:
  - rabos
  - colas
  lexicon: BDAG
  rationale: El término griego nombra una parte corporal literal de la imagen apocalíptica. «Colas» conserva el plural y funciona de manera natural en español; «rabos» es posible pero menos neutro y menos adecuado en registro bíblico.
- source_word: ὁμοίας σκορπίοις
  english_pob_choice: like scorpions
  chosen_spanish: semejantes a escorpiones
  alternatives_spanish:
  - como escorpiones
  - parecidas a las de los escorpiones
  lexicon: BDAG
  rationale: La construcción con ὅμοιος + dativo expresa semejanza. «Semejantes a escorpiones» mantiene la comparación sin forzar especificaciones adicionales sobre si la similitud recae en el animal entero o en sus colas.
- source_word: κέντρα
  english_pob_choice: stingers
  chosen_spanish: aguijones
  alternatives_spanish:
  - púas
  - picaduras
  lexicon: BDAG
  rationale: κέντρον puede referirse a un aguijón o punta aguda. En este contexto de escorpiones, «aguijones» es el equivalente más natural y concreto en español.
- source_word: ἐξουσία
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - autoridad
  - facultad
  lexicon: BDAG
  rationale: Aquí ἐξουσία se refiere a la capacidad efectiva de causar daño, no a autoridad jurídica. «Poder» transmite bien esa capacidad operativa en español y sigue la elección inglesa de «power».
- source_word: ἀδικῆσαι
  english_pob_choice: to harm
  chosen_spanish: hacer daño
  alternatives_spanish:
  - dañar
  - perjudicar
  - hacer mal
  lexicon: BDAG
  rationale: En este contexto de juicio y plaga, el verbo expresa infligir daño. «Hacer daño» comunica con claridad el resultado concreto sin cargar el verbo con la abstracción moral de «hacer injusticia».
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: las personas
  alternatives_spanish:
  - la gente
  - los hombres
  - los seres humanos
  lexicon: BDAG
  rationale: Aunque el griego usa plural masculino con valor genérico, el inglés POB revisado decidió «people» por el sentido inclusivo y natural. En español, «las personas» expresa con igual naturalidad el referente genérico sin perder el alcance humano universal.
- source_word: μῆνας πέντε
  english_pob_choice: for five months
  chosen_spanish: por cinco meses
  alternatives_spanish:
  - durante cinco meses
  - por un lapso de cinco meses
  lexicon: BDAG
  rationale: El acusativo de duración se vierte naturalmente con «por» en español. La frase conserva el límite temporal exacto del texto fuente.
theological_decisions:
- issue: Sentido de ἐξουσία en la imaginería apocalíptica
  english_pob_reading: Rendered as 'power' rather than 'authority'
  chosen_spanish_reading: «poder» en lugar de «autoridad»
  alternative_spanish_readings:
  - autoridad
  - facultad
  rationale: La escena describe la capacidad de las criaturas para infligir sufrimiento mediante sus colas. «Poder» conserva esa fuerza operativa sin negar que la acción esté permitida dentro de la visión, y evita sugerir una autoridad de tipo administrativo o legal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor genérico de τοὺς ἀνθρώπους
  english_pob_reading: Rendered as 'people' rather than 'men' in the latest revision
  chosen_spanish_reading: «las personas»
  alternative_spanish_readings:
  - los hombres
  - la gente
  - los seres humanos
  rationale: El griego es masculino plural con fuerza genérica. En español, «las personas» transmite el sentido inclusivo y general sin sonar rígido ni restringir innecesariamente el referente a varones.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente de 'men' a 'people' para reflejar mejor el sentido genérico de τοὺς ἀνθρώπους. La traducción española sigue esa lectura inclusiva con «las personas», manteniendo el resto de la frase en correspondencia directa con la imaginería griega y con la decisión inglesa de 'power' y 'stingers'.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usó «poder» para ἐξουσία según el contexto de capacidad efectiva de dañar.
  - «Aguijones» traduce κέντρα con naturalidad en la imagen de escorpiones.
  - La nota al pie se ancla en «personas» para preservar la alternativa semántica del griego genérico.
