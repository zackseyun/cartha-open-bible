translation:
  language: es
  text: Y el resto de la humanidad[a], los que no murieron por estas plagas, no se arrepintieron[b] de las obras de sus manos, para dejar de adorar a los demonios y a los ídolos de oro, de plata, de bronce, de piedra y de madera[c], que no pueden ver ni oír ni caminar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el resto de la gente». El término griego es genérico para seres humanos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no se arrepintieron de las obras de sus manos», un modismo que aquí alude especialmente a lo que habían hecho y venerado.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para que no adoraran». La cláusula griega puede expresar propósito o resultado.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ λοιποὶ τῶν ἀνθρώπων
  english_pob_choice: the rest of humanity
  chosen_spanish: el resto de la humanidad
  alternatives_spanish:
  - el resto de la humanidad
  - el resto de los hombres
  - el resto de la gente
  lexicon: BDAG
  rationale: λοιποί expresa ‘el resto’ o ‘los demás’, y ἀνθρώπων es un genérico de seres humanos. ‘La humanidad’ conserva el sentido colectivo sin volver masculino el referente.
- source_word: ἀπεκτάνθησαν
  english_pob_choice: were not killed
  chosen_spanish: no murieron
  alternatives_spanish:
  - no fueron muertos
  - no fueron asesinados
  - no perecieron
  lexicon: BDAG
  rationale: El pasivo aoristo de ἀποκτείνω significa ‘matar’. En español, ‘no murieron’ comunica con naturalidad el resultado sin añadir matiz interpretativo; ‘fueron muertos’ suena demasiado literal y duro para el español actual.
- source_word: ταῖς πληγαῖς ταύταις
  english_pob_choice: these plagues
  chosen_spanish: estas plagas
  alternatives_spanish:
  - estos azotes
  - estas heridas
  - estos golpes
  lexicon: BDAG
  rationale: En Apocalipsis, πληγαί son juicios/plagas. ‘Plagas’ preserva el uso apocalíptico y la fuerza punitiva del término.
- source_word: οὐδὲ μετενόησαν
  english_pob_choice: did not repent
  chosen_spanish: no se arrepintieron
  alternatives_spanish:
  - no se convirtieron
  - no cambiaron de mente
  - no hicieron penitencia
  lexicon: BDAG
  rationale: Aquí μετάνοια implica arrepentimiento y vuelta de conducta, no solo un cambio cognitivo. ‘No se arrepintieron’ es la forma más fiel y comprensible.
- source_word: ἐκ τῶν ἔργων τῶν χειρῶν αὐτῶν
  english_pob_choice: of the works of their hands
  chosen_spanish: de las obras de sus manos
  alternatives_spanish:
  - de lo que habían hecho con sus manos
  - de las cosas hechas por sus manos
  - de sus hechuras
  lexicon: BDAG
  rationale: La expresión es un modismo bíblico que alude especialmente a lo fabricado y venerado. ‘Obras de sus manos’ conserva la imagen concreta sin explicitar más de lo que el texto dice.
- source_word: ἵνα μὴ προσκυνήσουσιν
  english_pob_choice: so as not to worship
  chosen_spanish: para no adorar
  alternatives_spanish:
  - a fin de no adorar
  - para que no adoraran
  - de modo que no adoraran
  lexicon: BDAG
  rationale: 'La cláusula expresa propósito o resultado: el arrepentimiento habría debido llevar a dejar de rendir culto. ‘Para no adorar’ comunica esa finalidad en español natural.'
- source_word: τὰ δαιμόνια
  english_pob_choice: demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los espíritus malignos
  - los seres demoníacos
  lexicon: BDAG
  rationale: δαιμόνια en el NT nombra seres espirituales hostiles. ‘Demonios’ es la equivalencia directa y transparente.
- source_word: τὰ εἴδωλα
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes
  - las estatuas
  - las figuras
  lexicon: BDAG
  rationale: εἴδωλα se refiere a objetos de culto idolátrico. ‘Ídolos’ mantiene la carga religiosa y polémica del término.
- source_word: τὰ χρυσᾶ καὶ τὰ ἀργυρᾶ καὶ τὰ χαλκᾶ καὶ τὰ λίθινα καὶ τὰ ξύλινα
  english_pob_choice: gold and silver and bronze and stone and wood
  chosen_spanish: de oro, de plata, de bronce, de piedra y de madera
  alternatives_spanish:
  - dorados y plateados y de bronce y de piedra y de madera
  - hechos de oro, plata, bronce, piedra y madera
  lexicon: BDAG
  rationale: Los adjetivos griegos describen la materia de los ídolos. El español fluido exige una lista preposicional después de ‘ídolos’, preservando el inventario material.
- source_word: ἃ οὔτε βλέπειν δύνανται οὔτε ἀκούειν οὔτε περιπατεῖν
  english_pob_choice: which can neither see nor hear nor walk
  chosen_spanish: que no pueden ver ni oír ni caminar
  alternatives_spanish:
  - que no pueden ver ni oír ni andar
  - que no son capaces de ver ni oír ni caminar
  lexicon: BDAG
  rationale: La triada resalta la impotencia de los ídolos. ‘Caminar’ traduce literalmente περιπατεῖν; ‘andar’ sería posible, pero ‘caminar’ conserva mejor la serie de verbos concretos.
theological_decisions:
- issue: Sentido colectivo de ἀνθρώπων
  english_pob_reading: the rest of humanity
  chosen_spanish_reading: el resto de la humanidad
  alternative_spanish_readings:
  - el resto de los hombres
  - el resto de la gente
  rationale: El griego usa un genérico humano, no masculino específico. ‘Humanidad’ evita un sesgo de género y mantiene el contraste entre los que murieron y los que quedaron.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre arrepentimiento y abandono de la idolatría
  english_pob_reading: did not repent ... so as to stop worshiping demons and idols
  chosen_spanish_reading: no se arrepintieron ... para no adorar a los demonios y a los ídolos
  alternative_spanish_readings:
  - no se arrepintieron ... de modo que dejaran de adorar
  - no se arrepintieron ... a fin de no seguir adorando
  rationale: 'La estructura expresa propósito/resultado: el arrepentimiento habría implicado dejar la adoración idolátrica. La traducción conserva esa relación sin imponer una teoría más específica del arrepentimiento.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma como guía el expediente inglés auditado. Se evitó añadir ‘aún’ o ‘ni siquiera’, porque el griego no lo exige. También se preservó la tensión propósito/resultado en ἵνα μή con una formulación natural en español.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió ‘humanidad’ por el valor genérico de ἀνθρώπων.
  - Se mantuvo ‘ídolos’ y no ‘imágenes’, porque el contexto es cultual e idólatra.
  - Se tradujo la lista material con preposiciones para sonar natural en español sin perder la acumulación del original.
  - ‘Caminar’ conserva la literalidad de περιπατεῖν y la ironía del texto sobre objetos inertes.
