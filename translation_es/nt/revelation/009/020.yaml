review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB en la mayor parte del versículo: «el resto de la humanidad», «estas plagas», «no se arrepintieron de las obras de sus manos», la referencia a demonios e ídolos, y la cláusula final sobre no ver, oír ni caminar. Sin embargo, la cláusula ἵνα μὴ προσκυνήσουσιν queda menos fiel en español con «para no adorar», porque el inglés auditado ya ajustó el sentido a «so as to stop worshiping», es decir, dejar de seguir adorando, no simplemente una finalidad abstracta. Además, la nota a refleja mal la alternativa inglesa, repitiendo la misma lectura principal en vez de reflejar «mankind / gente humana» u otra opción real.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero requiere un ajuste menor para mayor naturalidad y precisión semántica: «para dejar de adorar» o «para dejar de rendir culto» comunica mejor la relación entre arrepentimiento y cese de la idolatría. También conviene corregir la nota a para que no repita exactamente el texto principal. Fuera de eso, la redacción es natural y digna.'
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: ἀνθρώπων como «humanidad», μετενόησαν como «se arrepintieron», δαιμόνια como «demonios», εἴδωλα como «ídolos», y la lista de materiales en español natural. No hay conflicto con los defaults mayores del glosario. El único desajuste relevante es que la decisión documentada para ἵνα μὴ προσκυνήσουσιν pide reflejar cese de adoración más claramente.'
  issues:
  - severity: medium
    issue: La cláusula «para no adorar» no refleja suficientemente el matiz de cese implícito en la decisión auditada del POB.
    rationale: El historial inglés revisó «so as not to worship» a «so as to stop worshiping». En contexto, el arrepentimiento implica abandonar una práctica idolátrica ya en curso. «Para dejar de adorar» preserva mejor esa lógica sin sobreinterpretar.
  - severity: low
    issue: La nota al pie [a] no presenta una alternativa real y repite la lectura principal.
    rationale: El texto principal ya dice «el resto de la humanidad». La nota debería ofrecer una alternativa documentada, como «el resto de la gente» o «el resto del género humano», no duplicar el lema principal.
  revised_spanish_text: Y el resto de la humanidad[a], los que no murieron por estas plagas, no se arrepintieron[b] de las obras de sus manos, para dejar de adorar a los demonios y a los ídolos de oro, de plata, de bronce, de piedra y de madera[c], que no pueden ver ni oír ni caminar.
  revised_footnotes:
