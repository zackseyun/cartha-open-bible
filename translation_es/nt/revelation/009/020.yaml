    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no se arrepintieron de las obras de sus manos», un modismo que aquí alude especialmente a lo que habían hecho y venerado.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para que no adoraran». La cláusula griega puede expresar propósito o resultado.'
    reason: alternative_reading
  revision_rationale: 'Se hizo una reparación menor para alinear la cláusula final con la decisión auditada del POB: el arrepentimiento se presenta como dejar de practicar la idolatría, no solo como una finalidad abstracta. También se corrigió la nota [a] para que ofrezca una alternativa auténtica en español.'
