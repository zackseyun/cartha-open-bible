translation:
  language: es
  text: Y fueron soltados[a] los cuatro ángeles que habían sido preparados para la hora y el día y el mes y el año, a fin de que mataran a la tercera parte de la humanidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desatados». El griego puede evocar tanto la idea de ser puestos en libertad como la de ser desatados; aquí se conserva una formulación española natural que refleja la pasividad del verbo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de los seres humanos». El griego se refiere a seres humanos en general, no específicamente a varones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλύθησαν
  english_pob_choice: were released
  chosen_spanish: fueron soltados
  alternatives_spanish:
  - fueron liberados
  - fueron desatados
  lexicon: BDAG
  rationale: El aoristo pasivo de λύω pide un pasivo en español. «Fueron soltados» comunica con naturalidad que seres previamente retenidos quedaron libres para actuar, y conserva mejor la fuerza del contexto que una formulación demasiado interpretativa. «Desatados» sería más literal, pero en español puede sonar más figurado; «liberados» es posible, pero aquí atenúa la imagen concreta.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En el contexto apocalíptico de Apocalipsis, el referente es sobrenatural, no humano. «Ángeles» es la equivalencia directa y clara en español.
- source_word: ἡτοιμασμένοι
  english_pob_choice: who had been prepared
  chosen_spanish: que habían sido preparados
  alternatives_spanish:
  - habiendo sido preparados
  - que estaban preparados
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica una preparación ya completada con resultado vigente. «Que habían sido preparados» conserva ese valor de anterioridad y estado resultante en español natural.
- source_word: εἰς τὴν ὥραν καὶ ἡμέραν καὶ μῆνα καὶ ἐνιαυτόν
  english_pob_choice: for the hour and day and month and year
  chosen_spanish: para la hora y el día y el mes y el año
  alternatives_spanish:
  - para esta hora y día y mes y año
  - para la hora, el día, el mes y el año señalado
  lexicon: BDAG
  rationale: Se mantiene la secuencia acumulativa del griego para preservar su precisión temporal y no resolver de antemano si se trata de un momento puntual o de un conjunto de marcas temporales. «Para» expresa adecuadamente εἰς en este contexto de destino o finalidad temporal.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: La cláusula introduce propósito. En español, «para matar» es más fluido y directo que una subordinada más pesada, sin perder la fuerza final.
- source_word: ἀποκτείνωσιν
  english_pob_choice: they might kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - asesinar
  lexicon: BDAG
  rationale: El verbo expresa dar muerte. «Matar» es la equivalencia contemporánea más clara y fiel; evita un registro arcaizante como «mataran»/«matasen» y no añade matices que el texto no exige.
- source_word: τὸ τρίτον τῶν ἀνθρώπων
  english_pob_choice: a third of humanity
  chosen_spanish: la tercera parte de la humanidad
  alternatives_spanish:
  - un tercio de la humanidad
  - la tercera parte de los seres humanos
  - la tercera parte de la humanidad
  lexicon: BDAG
  rationale: «Τὸ τρίτον» es una expresión partitiva; «la tercera parte» reproduce bien el valor fraccional. «Humanidad» traduce ἀνθρώπων como colectivo genérico de seres humanos, evitando una lectura masculina exclusiva y conservando la amplitud del referente.
theological_decisions:
- issue: Alcance de la frase temporal «la hora y el día y el mes y el año»
  english_pob_reading: A specific divinely appointed time is in view, expressed with cumulative temporal precision.
  chosen_spanish_reading: Se mantiene la idea de un tiempo fijado con precisión, sin decidir en la traducción si describe un momento exacto o una duración simbólicamente compuesta.
  alternative_spanish_readings:
  - una hora, día, mes y año determinados de antemano
  - un período formado por año, mes, día y hora
  rationale: El griego encadena las marcas temporales bajo una sola estructura, lo que sugiere una cita precisa dentro del plan soberano de Dios. La traducción conserva la secuencia sin forzar una interpretación cronológica adicional.
  doctrine_reference: Preservar la tensión apocalíptica sin resolverla artificialmente.
- issue: Traducción de τῶν ἀνθρώπων
  english_pob_reading: humanity
  chosen_spanish_reading: humanidad
  alternative_spanish_readings:
  - mankind
  - personas
  - los hombres
  rationale: ἀνθρώπων es genérico y no masculino exclusivo. «Humanidad» mantiene el sentido colectivo y evita introducir un sesgo de género que el griego no impone.
  doctrine_reference: Exactitud semántica y sensibilidad de género conforme al referente original.
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del audit trail en inglés y no introduce revisiones divergentes. Se conserva la secuencia temporal del griego, la pasividad de λύω y el referente genérico de ἀνθρώπων, con ajustes mínimos para español natural.
  spanish_consistency_notes:
  - Se usa «humanidad» para ἀνθρώπων conforme al principio de exactitud de género y al tratamiento ya documentado en el inglés POB.
  - Se evita «Señor» o equivalentes en este versículo porque no aparece el léxico divino del pasaje.
  - Se mantiene un registro sobrio y apocalíptico, sin ampliar el texto con explicaciones no presentes en el griego.
