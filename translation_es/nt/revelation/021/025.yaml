translation:
  language: es
  text: Y sus puertas nunca se cerrarán de día[a], porque no habrá noche allí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: ''sus puertas ciertamente nunca se cerrarán de día''. El griego usa una negación enfática.'
    reason: lexical_alternative
  - marker: b
    text: La razón dada es que 'no habrá noche allí'.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Además
  lexicon: BDAG
  rationale: Conecta la oración con la descripción anterior de la ciudad; en español, 'Y' mantiene la continuidad narrativa sin añadir matiz innecesario.
- source_word: οἱ πυλῶνες αὐτῆς
  english_pob_choice: its gates
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus portones
  - sus puertas de acceso
  lexicon: BDAG
  rationale: πυλῶνες en contexto de ciudad designa las puertas o accesos de la ciudad. 'Puertas' es natural en español y conserva la imagen urbana sin forzar una glosa técnica.
- source_word: οὐ μὴ κλεισθῶσιν
  english_pob_choice: will never be shut
  chosen_spanish: nunca serán cerradas
  alternatives_spanish:
  - no serán cerradas en absoluto
  - de ningún modo serán cerradas
  lexicon: BDAG
  rationale: La construcción οὐ μή expresa negación enfática. 'Nunca serán cerradas' reproduce la fuerza negativa de forma idiomática en español, sin suavizarla.
- source_word: ἡμέρας
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en el día
  lexicon: BDAG
  rationale: El genitivo temporal funciona adverbialmente. 'De día' es breve, natural y preserva el contraste con 'noche'.
- source_word: νὺξ γὰρ οὐκ ἔσται ἐκεῖ
  english_pob_choice: for there will be no night there
  chosen_spanish: porque no habrá noche allí
  alternatives_spanish:
  - pues allí no habrá noche
  - porque noche no habrá allí
  lexicon: BDAG
  rationale: γάρ introduce la razón de la puerta siempre abierta. 'Porque no habrá noche allí' conserva la relación causal y el sentido existencial de ἔσται.
theological_decisions:
- issue: Personificación gramatical de la ciudad
  english_pob_reading: Use 'its gates' rather than 'her gates.'
  chosen_spanish_reading: Use 'sus puertas' rather than 'sus puertas de ella' o una forma marcadamente personificada.
  alternative_spanish_readings:
  - sus puertas
  - sus puertas de ella
  rationale: El griego usa un pronombre femenino por concordancia con la ciudad, pero el español no necesita marcar el género personificado. 'Sus puertas' es natural y no introduce un énfasis no requerido por el verso.
  doctrine_reference: Translation philosophy §6 (lectura moderna y clara) y §5 (excepción solo cuando el contexto lo exige)
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que reemplazó el segundo guion por 'for' para reflejar γάρ explícitamente. En español se optó por 'porque' para mantener la relación causal de manera natural y lecturable, conservando el cierre parentético con puntuación fuerte.
  spanish_consistency_notes:
  - Se mantuvo 'puertas' para πυλῶνες conforme al uso contextual de ciudad.
  - Se preservó la negación enfática de οὐ μή con 'nunca'.
  - 'Se tradujo ἡμέρας con un adverbio temporal breve y corriente: ''de día''.'
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; el verso no contiene vocabulario divino explícito.
  - Se conservó el paralelismo entre la apertura diurna y la ausencia de noche.
