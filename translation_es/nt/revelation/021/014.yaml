translation:
  language: es
  text: Y el muro de la ciudad tenía doce fundamentos[a], y sobre ellos estaban los doce nombres de los doce apóstoles del Cordero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doce piedras de fundamento». El griego θεμελίους puede referirse a fundamentos o a piedras fundamentales en un contexto arquitectónico.
    reason: lexical_alternative
lexical_decisions:
- source_word: τεῖχος
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - muralla
  - pared
  lexicon: BDAG
  rationale: En un contexto de ciudad, τεῖχος puede referirse a un muro defensivo. 'Muro' conserva la imagen arquitectónica y suena natural en español; 'muralla' es posible, pero 'muro' mantiene mejor la brevedad del griego sin agregar matiz excesivo.
- source_word: πόλεως
  english_pob_choice: of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - ciudad
  - urbano
  lexicon: BDAG
  rationale: 'El genitivo expresa relación/posesión: el muro pertenece a la ciudad. ''De la ciudad'' es directo y fiel.'
- source_word: ἔχων
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - teniendo
  - poseía
  lexicon: BDAG
  rationale: Aunque el griego usa participio presente, en español narrativo descriptivo de visión es más natural un verbo finito. 'Tenía' conserva la función descriptiva sin forzar una construcción participial.
- source_word: θεμελίους δώδεκα
  english_pob_choice: twelve foundations
  chosen_spanish: doce fundamentos
  alternatives_spanish:
  - doce piedras fundamentales
  - doce cimientos
  lexicon: BDAG
  rationale: θεμέλιος puede significar 'fundamento' o 'piedra de fundamento'. En español, 'fundamentos' preserva la ambigüedad arquitectónica sin decidir en exceso por 'piedras' o 'cimientos'. La nota mantiene abierta la alternativa textual/lexical documentada por la POB inglesa.
- source_word: ἐπ’ αὐτῶν
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre estas bases
  lexicon: BDAG
  rationale: ἐπί con genitivo indica posición sobre. 'Sobre ellos' es natural y mantiene la referencia a los fundamentos.
- source_word: ὀνόματα
  english_pob_choice: names
  chosen_spanish: nombres
  alternatives_spanish:
  - inscripciones con los nombres
  lexicon: BDAG
  rationale: El texto dice 'nombres' y no 'inscripciones'; por tanto, se conserva la forma simple sin añadir detalle no expresado.
- source_word: ἀποστόλων
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: BDAG
  rationale: '''Apóstoles'' mantiene el sentido técnico neotestamentario y es la opción fiel y reconocible en español.'
- source_word: τοῦ ἀρνίου
  english_pob_choice: of the Lamb
  chosen_spanish: del Cordero
  alternatives_spanish:
  - del Cordero de Dios
  - del cordero
  lexicon: BDAG
  rationale: ἀρνίον en Apocalipsis funciona como título cristológico. 'Cordero' preserva el título y su resonancia teológica; se capitaliza por tratarse de un título, no de un animal genérico.
theological_decisions:
- issue: Título cristológico ἀρνίου
  english_pob_reading: the Lamb
  chosen_spanish_reading: el Cordero
  alternative_spanish_readings:
  - el cordero
  rationale: En Apocalipsis, ἀρνίον designa a Jesús exaltado. En español, la capitalización en 'Cordero' ayuda a señalar el valor titular, siguiendo la lectura cristológica de la POB inglesa sin alterar el contenido del griego.
  doctrine_reference: Apocalipsis 5–7; 21:22–23; Translation philosophy §2
translation_notes:
  revision_awareness: 'Se revisó la equivalencia óptima frente al griego: se mantuvo la ambigüedad de θεμελίους con una nota, se evitó añadir ''inscripciones'', y se conservó la lectura cristológica de ἀρνίου como título del Cordero.'
  spanish_consistency_notes:
  - Se usa 'Cordero' con mayúscula para el título cristológico, coherente con la lectura de la POB inglesa.
  - Se prefirió 'muro' sobre 'muralla' por naturalidad y brevedad, sin perder la imagen defensiva.
  - '''Fundamentos'' se eligió para conservar la ambigüedad arquitectónica documentada en el audit trail inglés.'
