revisions:
- from: Y las naciones andarán[a] a la luz de ella, y los reyes de la tierra traerán su gloria dentro de ella[c][b].
  to: Y las naciones andarán[a] a su luz[c], y los reyes de la tierra traerán su gloria[b] a ella.
  rationale: Se sustituyó «a la luz de ella» por «a su luz» para un español más natural manteniendo la referencia a la ciudad. Se cambió «dentro de ella» por «a ella», que sigue expresando el movimiento hacia la ciudad de forma más idiomática. Además, se reubicaron las notas para que cada una quede anclada en el elemento pertinente del texto.
