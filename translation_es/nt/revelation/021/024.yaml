translation:
  language: es
  text: Y las naciones andarán[a] a su luz[c], y los reyes de la tierra traerán su gloria[b] a ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a través de su luz».
    reason: lexical_alternative
  - marker: b
    text: O «su esplendor» o «su honor».
    reason: lexical_alternative
  - marker: c
    text: El pronombre griego es femenino porque se refiere a la ciudad, que en griego es femenina.
    reason: source_note
lexical_decisions:
- source_word: περιπατήσουσιν
  english_pob_choice: will walk
  chosen_spanish: andarán
  alternatives_spanish:
  - caminarán
  - vivirán
  - se conducirán
  lexicon: BDAG
  rationale: El griego conserva la imagen concreta de andar/caminar. «Andarán» mantiene esa imagen en español sin volverla demasiado explicativa, y en este contexto visionario encaja con el movimiento de las naciones junto a la luz de la ciudad.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: En el marco escatológico de Apocalipsis, el sentido colectivo de pueblos/naciones es el más natural. «Las naciones» preserva también el trasfondo profético del AT que la POB inglesa busca conservar.
- source_word: διὰ τοῦ φωτὸς αὐτῆς
  english_pob_choice: by its light
  chosen_spanish: a la luz de ella
  alternatives_spanish:
  - por su luz
  - a través de su luz
  - en su luz
  lexicon: BDAG
  rationale: διά con genitivo puede expresar medio o esfera. La POB inglesa opta por «by», pero en español «a la luz de ella» comunica con naturalidad que la luz de la ciudad es el ámbito/medio de su andar. Se evita «por su luz» porque puede sonar más causal que espacial en este contexto, y «a través de» sería más pesado.
- source_word: οἱ βασιλεῖς τῆς γῆς
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del mundo
  - los reyes del país
  lexicon: BDAG
  rationale: «La tierra» reproduce el valor apocalíptico habitual de γῆ en Apocalipsis y conserva la correspondencia intertextual con otras ocurrencias del libro. «Del mundo» sería más interpretativo.
- source_word: φέρουσιν
  english_pob_choice: will bring
  chosen_spanish: traerán
  alternatives_spanish:
  - llevan
  - presentarán
  - están trayendo
  lexicon: BDAG
  rationale: El futuro español refleja bien el futuro griego del contexto narrativo. «Traerán» es idiomático y mantiene la idea de movimiento hacia la ciudad.
- source_word: τὴν δόξαν αὐτῶν
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su honor
  lexicon: BDAG
  rationale: «Gloria» conserva la resonancia bíblica de δόξα y la intertextualidad con Isaías y la imaginería de la nueva Jerusalén. En español, el posesivo puede leerse naturalmente como «su» referido a «los reyes»; el sentido distributivo está implícito en el plural del sujeto.
- source_word: εἰς αὐτήν
  english_pob_choice: into it
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en ella
  - a ella
  - dentro de la ciudad
  lexicon: BDAG
  rationale: El pronombre femenino se traduce con «ella» porque en español la referencia inmediata a la ciudad puede mantenerse sin forzar un «it» impersonal. «Dentro de ella» conserva el valor direccional de εἰς y evita una lectura meramente estática.
theological_decisions:
- issue: Pronombre femenino de la ciudad y posible personificación nupcial
  english_pob_reading: Render αὐτῆς / αὐτήν as 'its' / 'it,' referring to the city.
  chosen_spanish_reading: Traducir con «ella» para la ciudad, manteniendo la referencia femenina sin imponer aquí una personificación adicional.
  alternative_spanish_readings:
  - «ello»/«eso» para neutralizar
  - «ella» con énfasis nupcial
  rationale: En español, «la ciudad» ya es femenina, así que «ella» es la forma natural. Sin embargo, el verso inmediato es espacial y cívico; por eso la redacción no añade un matiz nupcial fuerte que el griego de esta cláusula no exige por sí mismo. Se preserva la tensión literaria de Apocalipsis 21 sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión literaria entre ciudad-persona y ciudad-espacio; optimal equivalence.
translation_notes:
  revision_awareness: La POB inglesa revisó «and the kings of the earth bring» a «will bring» para reflejar mejor el futuro griego; en español se reflejó directamente con «traerán». También se mantuvo la decisión de conservar la imaginería concreta de andar y de traducir δόξα con «gloria», no con un equivalente más interpretativo.
  spanish_consistency_notes:
  - Se mantiene «las naciones» y «los reyes de la tierra» para coherencia con la terminología apocalíptica del libro.
  - Se evita reemplazar «gloria» por «esplendor» en el texto principal para conservar la resonancia bíblica de δόξα.
  - La referencia femenina de la ciudad se resuelve naturalmente con el español, sin sobreexplicar la personificación.
