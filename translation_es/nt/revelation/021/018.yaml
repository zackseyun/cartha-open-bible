translation:
  language: es
  text: Y el material[a] de su muro era jaspe, y la ciudad era oro puro, como vidrio puro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la construcción de su muro era jaspe». El griego ἐνδώμησις puede referirse al material o a la construcción/estructura de lo edificado; aquí se eligió «material» porque el verso destaca la sustancia del muro.
    reason: lexical_alternative
  - marker: b
    text: O «como vidrio transparente». La comparación subraya la claridad resplandeciente de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδώμησις
  english_pob_choice: material
  chosen_spanish: material
  alternatives_spanish:
  - construcción
  - edificación
  - estructura
  lexicon: BDAG
  rationale: El término puede referirse a aquello con que algo está construido o a su construcción. Dado que el contexto describe la sustancia del muro, «material» comunica bien la idea sin convertirla en el acto de construir.
- source_word: τεῖχος
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - muralla
  - pared
  lexicon: BDAG
  rationale: En español, «muro» es natural y preciso para una gran pared de ciudad. «Muralla» también sería posible, pero «muro» mantiene el sentido básico sin añadir una connotación demasiado técnica.
- source_word: ἴασπις
  english_pob_choice: jasper
  chosen_spanish: jaspe
  alternatives_spanish:
  - jaspide
  lexicon: BDAG
  rationale: Se conserva el nombre tradicional de la piedra preciosa en forma transliterada al español. Mantiene el valor del término fuente sin intentar identificar la gema con exactitud moderna.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro puro
  - material de oro
  lexicon: BDAG
  rationale: El sustantivo designa oro como materia. «Oro» es la forma natural en español y conserva el foco descriptivo del pasaje.
- source_word: καθαρὸν
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - refinado
  lexicon: BDAG
  rationale: Con «oro», καθαρόν expresa pureza o refinamiento de la materia, no limpieza ritual. «Puro» refleja mejor esa fuerza semántica.
- source_word: ὅμοιον
  english_pob_choice: like
  chosen_spanish: semejante a
  alternatives_spanish:
  - como
  - parecido a
  lexicon: BDAG
  rationale: La comparación del griego admite una formulación natural en español con «semejante a». Evita una repetición excesiva de «como» y conserva el matiz comparativo.
- source_word: ὑάλῳ καθαρῷ
  english_pob_choice: pure glass
  chosen_spanish: vidrio puro
  alternatives_spanish:
  - vidrio transparente
  - vidrio claro
  lexicon: BDAG
  rationale: Se sigue de cerca la revisión inglesa que volvió a «pure glass» para reflejar καθαρῷ con consistencia. En español, «vidrio puro» mantiene la relación formal con «oro puro», aunque deja implícita la idea de transparencia del símil.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura revisada del POB inglés, que mantuvo «pure glass» en lugar de «clear glass» para reflejar más literalmente καθαρῷ y la simetría con «pure gold». En español se conservó ese paralelismo con «oro puro» / «vidrio puro».
  spanish_consistency_notes:
  - Se prefirió «muro» en vez de «muralla» para una correspondencia directa y natural con τεῖχος, sin perder el sentido urbano-fortificado.
  - Se mantuvo la transliteración de la piedra preciosa como «jaspe», coherente con la práctica habitual para ἴασπις.
  - La comparación final se formuló con «semejante a» para expresar el valor comparativo de ὅμοιον de manera clara en español.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, y no hay terminología teológica disputada en este versículo.
  - La nota b preserva la ambigüedad entre pureza y transparencia que el audit trail inglés dejó abierta al revisar la expresión final.
