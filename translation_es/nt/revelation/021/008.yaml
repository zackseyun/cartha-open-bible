translation:
  language: es
  text: Pero para los cobardes y los incrédulos[a] y los detestables y los homicidas y los sexualmente inmorales y los hechiceros y los idólatras y todos los mentirosos, su parte será en el lago que arde con fuego y azufre[b], que es la segunda muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «infieles» para «incrédulos».
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente, «piedra de azufre»; literalmente, «azufre».
    reason: lexical_alternative
lexical_decisions:
- source_word: δειλοῖς
  english_pob_choice: cowardly
  chosen_spanish: cobardes
  alternatives_spanish:
  - temerosos
  - tímidos
  lexicon: BDAG
  rationale: δειλός expresa cobardía o temor vergonzante, no simple miedo. En español, 'cobardes' transmite mejor esa fuerza moral negativa en una lista de vicios.
- source_word: ἀπίστοις
  english_pob_choice: unbelieving
  chosen_spanish: incrédulos
  alternatives_spanish:
  - sin fe
  - infieles
  lexicon: BDAG
  rationale: ἄπιστος puede significar 'incrédulo' o 'infiel'. En este contexto de juicio, 'incrédulos' comunica con claridad a quienes no creen; 'infieles' se preserva como posible matiz de alianza/covenio en la nota.
- source_word: ἐβδελυγμένοις
  english_pob_choice: detestable
  chosen_spanish: detestables
  alternatives_spanish:
  - abominables
  - los que practican abominaciones
  lexicon: BDAG
  rationale: El participio perfecto de βδελύσσομαι describe a quienes quedan caracterizados por lo repugnante/impuro. 'Detestables' es natural en español y conserva el juicio moral fuerte sin arcaísmo.
- source_word: φονεῦσι
  english_pob_choice: murderers
  chosen_spanish: homicidas
  alternatives_spanish:
  - asesinos
  lexicon: BDAG
  rationale: φονεύς denota al que mata con culpa penal, 'murderer'. 'Homicidas' es preciso y mantiene el registro sobrio de la lista.
- source_word: πόρνοις
  english_pob_choice: sexually immoral
  chosen_spanish: inmorales sexuales
  alternatives_spanish:
  - sexualmente inmorales
  - fornicarios
  lexicon: BDAG
  rationale: πόρνος abarca inmoralidad sexual en sentido amplio. 'Inmorales sexuales' sigue la amplitud del término griego y evita estrecharlo a una sola conducta.
- source_word: φαρμάκοις
  english_pob_choice: sorcerers
  chosen_spanish: hechiceros
  alternatives_spanish:
  - hechiceros mágicos
  - practicantes de artes mágicas
  lexicon: BDAG
  rationale: En Apocalipsis, φάρμακος/φαρμακός alude a practicantes de magia o artes ocultas. 'Hechiceros' es la equivalencia breve y reconocible en español.
- source_word: εἰδωλολάτραις
  english_pob_choice: idolaters
  chosen_spanish: idólatras
  alternatives_spanish:
  - adoradores de ídolos
  lexicon: BDAG
  rationale: El término designa a quienes rinden culto a ídolos. 'Idólatras' es exacto, conciso y plenamente natural en español.
- source_word: πᾶσι τοῖς ψευδέσιν
  english_pob_choice: all liars
  chosen_spanish: todos los mentirosos
  alternatives_spanish:
  - todos los falsos
  - todos los engañosos
  lexicon: BDAG
  rationale: ψευδής sustantivado puede equivaler a 'mentiroso' o 'falso'. En esta lista viciosa, 'mentirosos' es la opción idiomática más clara; una nota puede recordar el matiz de 'falso' si se necesita.
- source_word: τὸ μέρος αὐτῶν
  english_pob_choice: their portion will be
  chosen_spanish: su parte será
  alternatives_spanish:
  - su porción será
  - su lote será
  lexicon: BDAG
  rationale: μέρος significa la parte o porción asignada, es decir, el destino que les corresponde. 'Su parte será' conserva la idea de asignación sin añadir interpretación.
- source_word: ἐν τῇ λίμνῃ τῇ καιομένῃ πυρὶ καὶ θείῳ
  english_pob_choice: in the lake burning with fire and sulfur
  chosen_spanish: en el lago que arde con fuego y azufre
  alternatives_spanish:
  - en el lago que arde con fuego y azufre
  - en el lago ardiente de fuego y azufre
  lexicon: BDAG
  rationale: καιομένῃ describe al lago como 'ardiendo'; 'que arde' mantiene la imagen verbal y resulta natural. θείῳ nombra azufre, no una mera expresión tradicional; por eso se usa 'azufre'.
- source_word: ὅ ἐστιν ὁ θάνατος ὁ δεύτερος
  english_pob_choice: which is the second death
  chosen_spanish: que es la segunda muerte
  alternatives_spanish:
  - lo cual es la segunda muerte
  - que es la muerte segunda
  lexicon: BDAG
  rationale: La relativa identifica el lago como la 'segunda muerte'. 'La segunda muerte' es la forma más clara y directa en español; se conserva el valor explicativo de ὅ ἐστιν.
theological_decisions:
- issue: ἄπιστος en una lista de juicio
  english_pob_reading: unbelieving
  chosen_spanish_reading: incrédulos
  alternative_spanish_readings:
  - infieles
  - sin fe
  rationale: En este contexto escatológico, ἄπιστος se refiere primariamente a quienes no creen. 'Incrédulos' mantiene esa lectura principal sin borrar el posible trasfondo de infidelidad de pacto, que queda disponible como alternativa semántica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; contested terms should retain their range where relevant.'
- issue: Rendering of θείῳ
  english_pob_reading: sulfur
  chosen_spanish_reading: azufre
  alternative_spanish_readings:
  - brimstone
  - fuego y azufre (tradicional)
  rationale: El griego θείῳ significa azufre. Se prefiere la traducción directa para primar la fuente original, preservando a la vez la resonancia tradicional del juicio final.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; readable modern Spanish, not archaic masking.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa que compacta la lista de vicios con formas sustantivas breves y sin artículos. Se evita añadir explicaciones interpretativas, y se conserva la estructura enumerativa, la cláusula de destino y la identificación final como «la segunda muerte».
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando no aparece aquí el nombre divino explícito; no aplica en este versículo.
  - Se mantiene un registro formal y sobrio, paralelo a la lista griega.
  - «Inmorales sexuales» y «todos los mentirosos» buscan reproducir la amplitud categorial sin estrecharla.
  - «Azufre» se usa por fidelidad léxica al griego θείῳ, con nota para la tradición de «brimstone».
