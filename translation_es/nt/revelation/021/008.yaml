revisions:
- from: Pero para los cobardes y los incrédulos y los detestables y los homicidas y los inmorales sexuales y los hechiceros y los idólatras y todos los mentirosos[a], su parte será en el lago que arde con fuego y azufre[b], que es la segunda muerte.
  to: Pero para los cobardes y los incrédulos[a] y los detestables y los homicidas y los sexualmente inmorales y los hechiceros y los idólatras y todos los mentirosos, su parte será en el lago que arde con fuego y azufre[b], que es la segunda muerte.
  rationale: Se corrigió una expresión poco natural ('los inmorales sexuales') por 'los sexualmente inmorales', que preserva mejor la amplitud semántica de πόρνοις en español digno y claro. También se rehízo la nota sobre θείῳ para eliminar el anglicismo 'brimstone' y dar una alternativa comprensible en español. Además, se reubicó la nota [a] sobre 'incrédulos' junto al término pertinente, ya que en el borrador estaba anclada indebidamente a 'mentirosos'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: mantiene la lista de vicios, la idea de destino asignado (''su parte será''), la imagen del lago que arde con fuego y azufre, y la identificación final como ''la segunda muerte''. Sin embargo, hay dos puntos que requieren ajuste para mayor fidelidad e idiomaticidad: (1) ''los inmorales sexuales'' suena poco natural en español e invierte el patrón adjetival; una formulación más fiel al valor categorial de πόρνοις y más legible es ''los sexualmente inmorales''; (2) la nota [b] introduce el anglicismo ''brimstone'' en vez de dar la alternativa tradicional española, que debería ser ''piedra de azufre'' o explicarse como tradición inglesa, pero en un proyecto español conviene no conservar un término inglés como alternativa léxica principal.'
  spanish_quality_summary: El texto es claro y de registro adecuado, pero presenta una aspereza importante en 'los inmorales sexuales', que no es español natural de lectura bíblica amplia. 'Detestables', 'homicidas', 'hechiceros', 'idólatras' y 'todos los mentirosos' son legibles, aunque 'abominables' sería una alternativa más tradicional; no es necesaria para aprobar. La sintaxis global funciona bien. La nota sobre azufre debe rehacerse para español.
  glossary_alignment: 'No hay conflictos con los términos del glosario base. La decisión ''incrédulos'' con nota a ''infieles'' está bien alineada con la documentación inglesa sobre ἀπίστοις. ''Azufre'' coincide correctamente con θείῳ. La principal desviación no es teológica sino estilístico-lexical: ''inmorales sexuales'' no cumple bien con la expectativa de español natural y digno.'
  issues:
  - severity: medium
    issue: '''los inmorales sexuales'' es poco idiomático en español'
    rationale: Aunque intenta conservar la amplitud de πόρνοις, la secuencia nominal-adjetival suena forzada. 'Los sexualmente inmorales' o 'los que practican inmoralidad sexual' comunica mejor el sentido sin estrecharlo indebidamente.
  - severity: medium
    issue: La nota [b] usa el término inglés 'brimstone'
    rationale: En una edición española, una nota léxica no debe depender de un término inglés no traducido. Si se conserva una nota, debe remitir a la tradición española ('piedra de azufre') o explicar brevemente que en traducciones tradicionales inglesas aparece 'brimstone'.
  revised_spanish_text: Pero para los cobardes y los incrédulos[a] y los detestables y los homicidas y los sexualmente inmorales y los hechiceros y los idólatras y todos los mentirosos, su parte será en el lago que arde con fuego y azufre[b], que es la segunda muerte.
  revised_footnotes:
  - marker: a
    text: O «infieles» para «incrédulos».
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente, «piedra de azufre»; literalmente, «azufre».
    reason: lexical_alternative
