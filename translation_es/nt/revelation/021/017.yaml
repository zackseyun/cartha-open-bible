translation:
  language: es
  text: Y midió su muro[a], 144 codos según medida humana, que es también medida de un ángel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según medida de un hombre, que es también medida de un ángel». El griego puede subrayar o bien que el ángel usó una unidad humana de medida, o bien que la medida humana y la angélica corresponden aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμέτρησεν
  english_pob_choice: measured
  chosen_spanish: midió
  alternatives_spanish:
  - mide
  - tomó la medida de
  lexicon: BDAG
  rationale: El aoristo de μετρέω expresa el acto de medir; «midió» es natural en español y conserva la acción puntual.
- source_word: τεῖχος
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - muralla
  lexicon: BDAG
  rationale: En el contexto de la ciudad santa, «muro» comunica bien una defensa urbana sin sobrecargar con «muralla»; mantiene la referencia al límite protector descrito en el pasaje.
- source_word: αὐτῆς
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  - su propio
  lexicon: BDAG
  rationale: El posesivo español «su» reproduce el referente de la ciudad sin personificarla innecesariamente.
- source_word: ἑκατὸν τεσσεράκοντα τεσσάρων πηχῶν
  english_pob_choice: 144 cubits
  chosen_spanish: 144 codos
  alternatives_spanish:
  - ciento cuarenta y cuatro codos
  lexicon: BDAG
  rationale: «Codos» preserva la unidad antigua, y los números con dígitos siguen el uso del POB inglés para claridad lectora.
- source_word: μέτρον
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - medición
  - patrón de medida
  lexicon: BDAG
  rationale: «Medida» comunica la idea de standard o unidad de medición de forma breve y precisa.
- source_word: ἀνθρώπου
  english_pob_choice: human
  chosen_spanish: humana
  alternatives_spanish:
  - de hombre
  - de una persona
  lexicon: BDAG
  rationale: «Humana» conserva el valor genérico de ἄνθρωπος y evita restringirlo a un varón.
- source_word: ὅ ἐστιν ἀγγέλου
  english_pob_choice: which is also an angel’s measure
  chosen_spanish: que es también medida de ángel
  alternatives_spanish:
  - que es también de ángel
  - es decir, medida de ángel
  lexicon: BDAG
  rationale: La cláusula griega es compacta y deja una equivalencia explicativa abierta; «medida de ángel» reproduce esa tensión sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: Relación entre «medida humana» y «medida de ángel»
  english_pob_reading: The measurement is expressed in a human unit of measure, and this is simultaneously the measure used by the angel.
  chosen_spanish_reading: La frase puede entenderse como una medida expresada en unidad humana y, a la vez, como medida de ángel.
  alternative_spanish_readings:
  - La medida es humana, es decir, la del ángel
  - El ángel midió con una unidad humana
  rationale: El griego permite una lectura explicativa sin resolver del todo si la equivalencia recae en la unidad, en el medidor o en ambos. La versión española conserva esa amplitud interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: 'Se corrigió la omisión previa del marcador de nota: ahora [a] aparece en el texto principal junto al término anotado. Se mantiene la puntuación natural en español y la equivalencia explicativa del final.'
  spanish_consistency_notes:
  - «codos» conserva la unidad antigua sin convertirla.
  - «humana» preserva el valor genérico de ἄνθρωπος.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes en este versículo.
  - La nota al pie queda anclada exactamente donde aparece la ambigüedad interpretativa.
