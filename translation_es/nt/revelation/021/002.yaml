review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: Juan ve la ciudad santa, la nueva Jerusalén, descendiendo del cielo de parte de Dios, preparada como una novia para su esposo. Sin embargo, la secuencia preposicional ἐκ τοῦ οὐρανοῦ ἀπὸ τοῦ θεοῦ no está bien resuelta en español con «del cielo de Dios», porque puede sugerir posesión y difumina la doble procedencia/origen. Además, las notas al pie no preservan correctamente las alternativas del rastro inglés y una de ellas introduce un español poco natural («desde Dios»).'
  spanish_quality_summary: 'El español es generalmente claro y digno. «La nueva Jerusalén» y «preparada como una novia adornada para su esposo» son naturales y fieles. No obstante, «que descendía del cielo de Dios» suena torpe y ambiguo en español. También conviene simplificar la sintaxis quitando «que» para que el participio griego se refleje de forma más fluida: «descendiendo del cielo, de Dios».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «santa», «Jerusalén» y «novia/esposo» son aceptables en contexto. La principal corrección es sintáctica y semántica en la relación entre «del cielo» y «de Dios», no de glosario.
  issues:
  - severity: high
    issue: «del cielo de Dios» representa mal la doble construcción de origen
    rationale: El griego distingue ἐκ τοῦ οὐρανοῦ («fuera/del cielo») y ἀπὸ τοῦ θεοῦ («de parte de Dios / de Dios»). «Del cielo de Dios» fusiona ambas y puede leerse como un solo complemento posesivo.
  - severity: medium
    issue: Las notas al pie no corresponden bien a las alternativas del POB inglés
    rationale: La nota a debería reflejar la alternativa de ubicación/agrupación («descendiendo del cielo de Dios» no es una buena alternativa en español), y la nota b del borrador introduce «desde Dios», que no es español bíblico natural ni una buena equivalencia de ἀπό aquí.
  - severity: low
    issue: «que descendía» es aceptable pero menos directo que una construcción participial en español
    rationale: El griego usa un participio presente ligado a lo visto. En español, «descendiendo» o «que descendía» pueden funcionar, pero «descendiendo del cielo, de Dios» refleja mejor el flujo de la frase sin recargarla.
  revised_spanish_text: Y vi la ciudad santa, la nueva Jerusalén[a], descendiendo del cielo, de Dios,[b] preparada como una novia adornada para su esposo.
  revised_footnotes:
  - marker: a
    text: También puede puntuarse o entenderse como «la santa ciudad, nueva Jerusalén»; en español se mantiene «la nueva Jerusalén» como descripción normal, no necesariamente como título fijo.
    reason: alternative_reading
  - marker: b
    text: 'O: «preparada como una novia adornada para su esposo». El griego también permite tomar esta frase como alternativa de agrupación en relación con la cláusula anterior. Además, «del cielo, de Dios» conserva las dos expresiones de origen del griego: «del cielo» y «de Dios».'
    reason: lexical_alternative
