  to: Y vi la ciudad santa, la nueva Jerusalén[a], descendiendo del cielo, de Dios,[b] preparada como una novia adornada para su esposo.
  rationale: Se corrige la relación entre «del cielo» y «de Dios» para preservar la doble procedencia del texto griego sin producir un español ambiguo. También se reemplazan las notas por otras que sí ayudan al lector y no introducen formulaciones poco naturales. El resto del versículo es fiel y de buena calidad.
