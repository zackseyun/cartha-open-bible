translation:
  language: es
  text: Y vi la ciudad santa, la nueva Jerusalén[a], descendiendo del cielo, de Dios,[b] preparada como una novia adornada para su esposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede puntuarse o entenderse como «la santa ciudad, nueva Jerusalén»; en español se mantiene «la nueva Jerusalén» como descripción normal, no necesariamente como título fijo.
    reason: alternative_reading
  - marker: b
    text: 'O: «preparada como una novia adornada para su esposo». El griego también permite tomar esta frase como alternativa de agrupación en relación con la cláusula anterior. Además, «del cielo, de Dios» conserva las dos expresiones de origen del griego: «del cielo» y «de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - pueblo
  - urbe
  lexicon: BDAG
  rationale: πόλις nombra de manera directa una ciudad; «ciudad» conserva la imagen concreta y es el equivalente natural en español.
- source_word: ἁγίαν
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  lexicon: BDAG
  rationale: ἅγιος en contexto bíblico se vierte normalmente como «santo/santa». Aquí «ciudad santa» es natural en español y mantiene el peso teológico de la expresión.
- source_word: Ἰερουσαλὴμ καινὴν
  english_pob_choice: new Jerusalem
  chosen_spanish: la nueva Jerusalén
  alternatives_spanish:
  - la Nueva Jerusalén
  lexicon: BDAG
  rationale: Ἰερουσαλήμ se translitera como «Jerusalén» y καινός se traduce como «nueva». En español corriente, el adjetivo en minúscula preserva el sentido descriptivo sin fijar innecesariamente un título tipográfico.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - yo vi
  lexicon: BDAG
  rationale: El aoristo de ὁράω se expresa con el pasado simple «vi»; el sujeto «yo» queda implícito y no es necesario en español.
- source_word: καταβαίνουσαν
  english_pob_choice: coming down
  chosen_spanish: que descendía
  alternatives_spanish:
  - bajando
  - que bajaba
  lexicon: BDAG
  rationale: «Descendía» comunica el movimiento de καταβαίνω con dignidad y claridad. En español evita la posible banalidad de «bajaba» y mantiene el registro elevado de la visión.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: out of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - fuera del cielo
  lexicon: BDAG
  rationale: En español, «del cielo» transmite con naturalidad la procedencia indicada por ἐκ. La dirección de origen sigue siendo clara en el contexto de «descendía».
- source_word: ἀπὸ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - desde Dios
  lexicon: BDAG
  rationale: ἀπό señala origen; «de Dios» es la formulación más directa y sobria en español, sin añadir matices no presentes en el griego.
- source_word: ἡτοιμασμένην
  english_pob_choice: prepared
  chosen_spanish: preparada
  alternatives_spanish:
  - lista
  - dispuesta
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo de ἑτοιμάζω indica un estado ya logrado: la ciudad está «preparada». «Preparada» es fiel y claro.'
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: En una comparación, ὡς se rinde de forma natural con «como», que conserva la fuerza del símil sin sobreinterpretarlo.
- source_word: νύμφην
  english_pob_choice: a bride
  chosen_spanish: una novia
  alternatives_spanish:
  - una esposa
  - la novia
  lexicon: BDAG
  rationale: En español, «novia» comunica bien la imagen nupcial y evita imponer un título técnico que el texto no exige. Aunque «esposa» es posible en ciertos contextos, aquí el cuadro es de preparación matrimonial.
- source_word: κεκοσμημένην
  english_pob_choice: adorned
  chosen_spanish: adornada
  alternatives_spanish:
  - hermoseada
  - ataviada
  lexicon: BDAG
  rationale: κοσμέω aquí alude a adornar u ornamentar. «Adornada» preserva la imagen de belleza nupcial sin sonar arcaica.
- source_word: τῷ ἀνδρὶ αὐτῆς
  english_pob_choice: for her husband
  chosen_spanish: para su esposo
  alternatives_spanish:
  - para su marido
  - para su hombre
  lexicon: BDAG
  rationale: ἀνήρ puede significar «varón» o «esposo» según el contexto. En una escena de boda, «esposo» es la opción más natural en español y mantiene la relación matrimonial del símil.
theological_decisions:
- issue: Si tratar «Jerusalén nueva» como título fijo o como descripción atributiva
  english_pob_reading: Rendered as 'new Jerusalem' in running text
  chosen_spanish_reading: la nueva Jerusalén
  alternative_spanish_readings:
  - la Nueva Jerusalén
  rationale: El griego presenta un adjetivo atributivo unido a un nombre propio. En español, dejar «nueva» en minúscula conserva el valor descriptivo y evita convertir la frase en un título tipográfico no requerido por el texto.
  doctrine_reference: Conservar la forma del dato textual sin imponer una titulatura no explicitada.
- issue: Si convertir el símil nupcial en una identificación explícita de la iglesia en el texto principal
  english_pob_reading: Kept the simile 'prepared like a bride adorned for her husband' without interpretive expansion
  chosen_spanish_reading: preparada como una novia adornada para su esposo
  alternative_spanish_readings:
  - preparada como la novia del Cordero
  - preparada como esposa adornada
  rationale: El versículo usa un símil. Traducirlo como símil respeta la comparación sin adelantar la identificación simbólica que el libro desarrolla en otros pasajes.
  doctrine_reference: Preservar la tensión teológica y no incorporar interpretación que el versículo no formula explícitamente.
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y coincide sustancialmente con el trazado inglés auditado. No se introdujeron expansiones interpretativas; se mantuvieron el símil nupcial y la doble procedencia («del cielo / de Dios») en forma natural para el español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton; por eso aparece «Dios».
  - Se emplea «santa» para ἁγίαν según el uso bíblico normal en español, manteniendo la solemnidad del pasaje.
  - «Novia» y «esposo» se eligieron para sostener el cuadro matrimonial sin cargarlo con terminología eclesiológica adicional.
