revisions:
- from: 'Y oí una gran voz desde el trono, que decía[a]: «¡Mira! La morada de Dios está con la humanidad, y él morará con ellos, y ellos serán sus pueblos[d][c][b], y Dios mismo estará con ellos».'
  to: 'Y oí una voz fuerte desde el trono que decía[a]: «¡Mira! La morada de Dios está con la humanidad, y él morará con ellos, y ellos serán sus pueblos[d][c][b], y Dios mismo estará con ellos»'
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión del español sin alterar las decisiones exegéticas del borrador: «gran voz» se cambió por «voz fuerte», se eliminó la coma antes de «que decía», y se ajustó la nota sobre σκηνώσει para usar alternativas literales más idiomáticas en español.'
