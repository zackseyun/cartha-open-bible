    rationale: Aunque formalmente posible, para φωνῆς μεγάλης el español idiomático y solemne prefiere «una voz fuerte» o «una voz potente». El inglés auditado escogió el sentido de volumen/intensidad, no tamaño.
  - severity: low
    issue: Coma innecesaria antes de «que decía»
    rationale: «Y oí una voz fuerte desde el trono que decía» fluye mejor en español sin esa pausa gráfica; no afecta el sentido, pero mejora la legibilidad.
  - severity: medium
    issue: 'La nota c contiene una alternativa poco idiomática: «habitará en tienda»'
    rationale: Para explicar σκηνώσει conviene usar expresiones naturales como «tabernaculará» (si se quiere máxima literalidad, aunque rara) o mejor «pondrá su tienda» / «levantará su tienda». «Habitará en tienda» no suena español natural.
