id: REV.21.3
reference: Revelation 21:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: καὶ ἤκουσα φωνῆς μεγάλης ἐκ τοῦ ⸀θρόνου λεγούσης· Ἰδοὺ ἡ σκηνὴ τοῦ θεοῦ μετὰ τῶν ἀνθρώπων, καὶ σκηνώσει μετ’ αὐτῶν, καὶ αὐτοὶ ⸀λαοὶ αὐτοῦ ἔσονται, καὶ αὐτὸς ὁ θεὸς ⸂μετ’ αὐτῶν ἔσται⸃,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/021/003.yaml
  text: And I heard a loud voice from the throne saying[a], “Behold, the dwelling place of God is with humanity, and he will dwell with them, and they will be his peoples[d][c][b], and God himself will be with them.”
  footnotes:
  - marker: a
    text: Or “the tabernacle of God” or “God’s tent.” The Greek uses σκηνή, evoking tabernacle imagery.
    reason: lexical_alternative
  - marker: b
    text: The Greek says “with men,” meaning human beings generally.
    reason: lexical_alternative
  - marker: c
    text: The verb is related to “dwelling place/tabernacle”; more literally, “he will tabernacle” or “pitch his tent” with them.
    reason: lexical_alternative
  - marker: d
    text: Greek “peoples” (plural), not the traditional singular “people.”
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: d9511e8523240aae2f8a95ce2af3ce0da93dcedd540283485da586f813ae5232
    timestamp: '2026-04-18T23:36:28Z'
    output_hash: 365d83067e48326eaae277f6c173adbf62e31a28a588e7071fd6407cf88840f7
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:16Z'
    unchanged: false
    changes_summary: Changed 'men' to 'humanity' to better represent τῶν ἀνθρώπων in natural contemporary English while preserving the collective sense. Retained 'peoples' for λαοὶ, which reflects the plural in the Greek.
translation:
  language: es
  text: 'Y oí una voz fuerte desde el trono que decía[a]: «¡Mira! La morada de Dios está con la humanidad, y él morará con ellos, y ellos serán sus pueblos[d][c][b], y Dios mismo estará con ellos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tabernáculo de Dios» o «la tienda de Dios». El griego usa σκηνή, con resonancia de tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «con los hombres», es decir, con los seres humanos en general.
    reason: lexical_alternative
  - marker: c
    text: El verbo está emparentado con «morada/tabernáculo»; más literalmente, «tabernaculará» o «levantará su tienda» con ellos.
    reason: lexical_alternative
  - marker: d
    text: El griego usa «pueblos» en plural, no el singular tradicional «pueblo».
    reason: alternative_reading
lexical_decisions:
- source_word: φωνῆς μεγάλης
  english_pob_choice: a loud voice
  chosen_spanish: una gran voz
  alternatives_spanish:
  - una voz fuerte
  - una voz poderosa
  lexicon: BDAG
  rationale: μέγας con φωνή expresa intensidad o solemnidad del sonido; en español, «gran voz» conserva el tono elevado y apocalíptico sin sonar rígido.
- source_word: ἐκ τοῦ θρόνου
  english_pob_choice: from the throne
  chosen_spanish: desde el trono
  alternatives_spanish:
  - del trono
  - de parte del trono
  lexicon: BDAG
  rationale: ἐκ señala origen; «desde» comunica mejor el punto de procedencia en español y mantiene la imagen del trono como fuente de la proclamación.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Miren!
  lexicon: BDAG
  rationale: En español actual, «¡Mira!» transmite el llamado a atender con más naturalidad que un calco como «He aquí», sin perder el carácter enfático del imperativo deíctico.
- source_word: ἡ σκηνὴ τοῦ θεοῦ
  english_pob_choice: the dwelling place of God
  chosen_spanish: la morada de Dios
  alternatives_spanish:
  - el tabernáculo de Dios
  - la tienda de Dios
  lexicon: BDAG
  rationale: σκηνή evoca tienda/tabernáculo, pero en este contexto apunta a la presencia habitacional de Dios entre los seres humanos; «morada» comunica esa función en español natural, dejando abiertas las resonancias cultuales.
- source_word: μετὰ τῶν ἀνθρώπων
  english_pob_choice: with humanity
  chosen_spanish: con la humanidad
  alternatives_spanish:
  - con los hombres
  - con las personas
  lexicon: BDAG
  rationale: ἀνθρώπων es genérico y colectivo; «la humanidad» preserva el alcance universal sin introducir una lectura masculina exclusiva.
- source_word: σκηνώσει
  english_pob_choice: he will dwell
  chosen_spanish: morará
  alternatives_spanish:
  - habitará
  - acampará
  - levantará su tienda
  lexicon: BDAG
  rationale: σκηνόω mantiene el eco de la morada/tabernáculo, pero «morará» es un verbo digno y comprensible que expresa permanencia; la nota conserva la imagen más literal de «levantar su tienda».
- source_word: λαοὶ αὐτοῦ
  english_pob_choice: his peoples
  chosen_spanish: sus pueblos
  alternatives_spanish:
  - su pueblo
  - sus personas
  lexicon: BDAG
  rationale: λαοί está en plural; «sus pueblos» conserva esa pluralidad que el singular tradicional borraría, y suena natural en español cuando se refiere a comunidades redimidas.
- source_word: αὐτὸς ὁ θεός
  english_pob_choice: God himself
  chosen_spanish: Dios mismo
  alternatives_spanish:
  - él mismo, Dios
  - el mismo Dios
  lexicon: BDAG
  rationale: El griego subraya con αὐτός la presencia directa de Dios; «Dios mismo» reproduce la fuerza enfática de manera clara en español.
- source_word: μετ’ αὐτῶν ἔσται
  english_pob_choice: will be with them
  chosen_spanish: estará con ellos
  alternatives_spanish:
  - será con ellos
  - permanecerá con ellos
  lexicon: BDAG
  rationale: La construcción futura simple se vierte naturalmente como «estará con ellos», que conserva la promesa de presencia sin sobrecargarla.
theological_decisions:
- issue: Plural λαοὶ frente al singular tradicional en español
  english_pob_reading: they will be his peoples
  chosen_spanish_reading: ellos serán sus pueblos
  alternative_spanish_readings:
  - ellos serán su pueblo
  - serán su gente
  rationale: El texto griego tiene λαοί en plural. En español, «sus pueblos» preserva esa pluralidad y evita suavizar un rasgo textual significativo que puede reflejar la reunión escatológica de muchas naciones bajo Dios.
  doctrine_reference: Principio de primacía del original; conservar tensiones textuales en vez de resolverlas por tradición.
- issue: Imagen de σκηνή/σκηνόω
  english_pob_reading: the dwelling place of God ... he will dwell with them
  chosen_spanish_reading: la morada de Dios ... morará con ellos
  alternative_spanish_readings:
  - el tabernáculo de Dios ... tabernaculará con ellos
  - la tienda de Dios ... levantará su tienda con ellos
  rationale: La traducción principal privilegia claridad y dignidad, pero la imagen de tienda/tabernáculo permanece implícita y se explicita en la nota. Así no se pierde la resonancia veterotestamentaria del texto.
  doctrine_reference: Equivalencia óptima; preservar la carga simbólica sin volver opaca la lectura pública.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y toma como guía el auditable inglés POB: mantengo la pluralidad de λαοὶ, conservo el énfasis de αὐτός en «Dios mismo», y traduzco σκηνή/σκηνόω con una base semántica de morada, dejando la imaginería de tabernáculo explicada en nota. También adapto Ἰδοὺ con un mandato de atención natural en español.'
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para θεός.
  - Se evita «SEÑOR» como sustituto de YHWH porque este versículo no contiene el tetragrámaton.
  - «Humanidad» comunica el valor genérico de τῶν ἀνθρώπων sin cargarlo de género.
  - «Morada» y «morará» conservan el registro solemne sin arcaísmo excesivo.
  - La puntuación de las comillas y el orden de las notas siguen un formato publicable para lectura eclesial.
