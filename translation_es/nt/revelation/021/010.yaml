translation:
  language: es
  text: Y me transportó en el Espíritu[a] a un monte grande y alto, y me mostró la ciudad santa, Jerusalén, que descendía del cielo, de parte de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en espíritu». La frase griega puede señalar un estado visionario; en Apocalipsis introduce con frecuencia una visión profética.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήνεγκέν
  english_pob_choice: carried ... away
  chosen_spanish: me llevó
  alternatives_spanish:
  - me arrebató
  - me transportó
  lexicon: BDAG
  rationale: El verbo expresa traslado desde una ubicación a otra en un contexto visionario. En español, «me llevó» comunica ese movimiento de forma natural y fiel sin sobrecargar el texto.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  - en el espíritu
  lexicon: BDAG
  rationale: Se conserva la fórmula de visión de Apocalipsis sin resolverla de manera excesiva. La mayúscula en «Espíritu» mantiene abierta la posibilidad teológica señalada por el POB inglés, sin convertirla en paráfrasis.
- source_word: ἐπὶ ὄρος μέγα καὶ ὑψηλόν
  english_pob_choice: onto a great and high mountain
  chosen_spanish: a un monte grande y alto
  alternatives_spanish:
  - sobre un monte grande y alto
  - hasta un monte grande y alto
  lexicon: BDAG
  rationale: El griego indica movimiento hacia/encima de un monte. «A un monte grande y alto» conserva el desplazamiento con una construcción natural en español y mantiene ambos adjetivos distintivos.
- source_word: ἔδειξέν μοι
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me enseñó
  - me enseñó a ver
  lexicon: BDAG
  rationale: δείκνυμι se traduce de manera directa como «mostrar». «Me mostró» es claro y no añade matices que el verbo no exige.
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: BDAG
  rationale: πόλις designa aquí la ciudad escatológica; «ciudad» es el equivalente normal y más transparente en español.
- source_word: ἁγίαν
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - sagrada
  lexicon: BDAG
  rationale: En el registro bíblico en español, «santa» es el equivalente más natural de ἅγιος y preserva el valor religioso del término.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: BDAG
  rationale: Nombre propio transliterado según el uso estándar en español bíblico.
- source_word: καταβαίνουσαν
  english_pob_choice: coming down
  chosen_spanish: que descendía
  alternatives_spanish:
  - que bajaba
  - descendiendo
  lexicon: BDAG
  rationale: El participio presente describe la ciudad en acción de descender. «Que descendía» mantiene la imagen en español con un tono sobrio y preciso.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: out of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - fuera del cielo
  lexicon: BDAG
  rationale: Aunque «ἐκ» puede enfatizar origen y salida, en español «del cielo» comunica bien la procedencia sin forzar una redundancia. Se evita expandir innecesariamente.
- source_word: ἀπὸ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - desde Dios
  lexicon: BDAG
  rationale: La preposición marca fuente/origen. En español, «de Dios» preserva la relación de procedencia de manera exacta y elegante.
theological_decisions:
- issue: Sentido de ἐν πνεύματι en la fórmula visionaria
  english_pob_reading: Reference to the Holy Spirit's agency in prophetic vision, while preserving the phrase and its tension
  chosen_spanish_reading: Referente al Espíritu Santo en la experiencia visionaria, sin cerrar la expresión a una sola explicación
  alternative_spanish_readings:
  - en un estado espiritual
  - en espíritu
  rationale: La traducción conserva la ambigüedad auditable del griego y del POB inglés. «En el Espíritu» permite leer tanto la agencia del Espíritu Santo como la fórmula profética sin imponer una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la revisión final del POB inglés; no se registran cambios aplicados en el tramo auditado y la solución española sigue de cerca la lectura aprobada.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula para reflejar la lectura teológica posible del POB inglés.
  - Se usa «cielo» para οὐρανός y no «cielos», porque el griego está en singular y el contexto es de procedencia.
  - Se conserva «Jerusalén» como nombre propio y «santa» como equivalente estable de ἅγιος.
  - Se evita «SEÑOR» porque no aparece κύριος en el texto base.
