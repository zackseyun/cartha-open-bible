- from: Y me llevó en el Espíritu[a] a un monte grande y alto, y me mostró la ciudad santa, Jerusalén, que descendía del cielo, de Dios.
  to: Y me transportó en el Espíritu[a] a un monte grande y alto, y me mostró la ciudad santa, Jerusalén, que descendía del cielo, de parte de Dios.
  rationale: Se propone una revisión menor para reflejar mejor el matiz de transporte visionario de ἀπήνεγκέν y para aclarar en español la doble procedencia expresada por ἐκ τοῦ οὐρανοῦ y ἀπὸ τοῦ θεοῦ. «Me transportó» y «del cielo, de parte de Dios» preservan mejor el sentido fuente sin añadir contenido exegético indebido.
