review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: transporte visionario, monte grande y alto, la ciudad santa Jerusalén y su descenso desde el cielo de parte de Dios. Sin embargo, «me llevó» atenúa el matiz de ἀπήνεγκέν («me llevó/transportó aparte»), y la cláusula «que descendía del cielo, de Dios» suena ambigua en español y debilita la distinción entre ἐκ τοῦ οὐρανοῦ y ἀπὸ τοῦ θεοῦ.'
  spanish_quality_summary: El texto es legible y digno, pero necesita una reparación menor para sonar más natural y preciso en español bíblico moderno. «La ciudad santa, Jerusalén» funciona bien, pero «que descendía del cielo, de Dios» resulta torpe; «que descendía del cielo, de parte de Dios» o «que bajaba del cielo, de Dios» resuelve mejor la relación de procedencia. También conviene intensificar ligeramente el verbo de traslado visionario.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Espíritu» con mayúscula y nota alternativa está bien justificado. «Jerusalén», «ciudad santa» y «Dios» están alineados. La mejora propuesta no afecta glosario central, sino precisión semántica y naturalidad sintáctica.
  issues:
  - severity: medium
    issue: «me llevó» debilita el matiz de ἀπήνεγκέν en contexto visionario
    rationale: El griego describe un traslado desde una posición a otra, con un matiz de llevar aparte o transportar. «Me transportó» preserva mejor ese movimiento visionario sin sobreactuar como «me arrebató».
  - severity: medium
    issue: «que descendía del cielo, de Dios» es sintácticamente torpe y potencialmente ambiguo
    rationale: En español, la yuxtaposición de dos complementos con «de» puede hacer que «de Dios» parezca aposición de «cielo» o suene poco idiomático. El griego distingue origen espacial (ἐκ τοῦ οὐρανοῦ) y fuente personal (ἀπὸ τοῦ θεοῦ); «del cielo, de parte de Dios» conserva esa distinción con claridad natural.
  revised_spanish_text: Y me transportó en el Espíritu[a] a un monte grande y alto, y me mostró la ciudad santa, Jerusalén, que descendía del cielo, de parte de Dios.
  revised_footnotes:
  - marker: a
    text: O «en espíritu». La frase griega puede señalar un estado visionario; en Apocalipsis introduce con frecuencia una visión profética.
    reason: lexical_alternative
  revision_rationale: Se propone una revisión menor para reflejar mejor el matiz de transporte visionario de ἀπήνεγκέν y para aclarar en español la doble procedencia expresada por ἐκ τοῦ οὐρανοῦ y ἀπὸ τοῦ θεοῦ. «Me transportó» y «del cielo, de parte de Dios» preservan mejor el sentido fuente sin añadir contenido exegético indebido.
