translation:
  language: es
  text: El que vence heredará estas cosas[a], y yo seré su Dios[b], y él será mi hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El que conquista». El verbo griego νικάω es un término recurrente en Apocalipsis para la perseverancia fiel que sale vencedor.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «él será mi hijo». El masculino singular probablemente tiene fuerza representativa aquí, pero la traducción conserva el lenguaje filial del texto fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νικῶν
  english_pob_choice: The one who overcomes
  chosen_spanish: El que vence
  alternatives_spanish:
  - El que sobrevive
  - El que conquista
  - El vencedor
  lexicon: BDAG
  rationale: El participio articular funciona como sustantivo y describe a la persona caracterizada por vencer. «El que vence» conserva esa fuerza habitual y recurrente en Apocalipsis, mientras que «el vencedor» suena más abstracto y «conquista» desplaza el matiz hacia dominación militar.
- source_word: κληρονομήσει
  english_pob_choice: will inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - recibirá en herencia
  - poseerá
  lexicon: BDAG
  rationale: «Heredará» es la correspondencia directa y natural en español, y preserva el trasfondo familiar y de promesa del verbo griego, que encaja con el lenguaje filial que sigue.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - todo esto
  - estas
  lexicon: BDAG
  rationale: El demostrativo plural se refleja de manera más transparente con «estas cosas». Mantiene el plural del griego sin forzar una simplificación interpretativa.
- source_word: ἔσομαι αὐτῷ θεὸς
  english_pob_choice: I will be his God
  chosen_spanish: yo seré su Dios
  alternatives_spanish:
  - seré Dios para él
  - yo seré Dios para él
  lexicon: BDAG
  rationale: La fórmula relacional/covenantal se expresa de forma idiomática en español con «yo seré su Dios», manteniendo la reciprocidad del dativo sin volverla pesada.
- source_word: αὐτὸς ἔσται μοι υἱός
  english_pob_choice: he will be my son
  chosen_spanish: él será mi hijo
  alternatives_spanish:
  - él será un hijo para mí
  - él será mi hijo varón
  lexicon: BDAG
  rationale: Se conserva el parentesco filial del original con «hijo». Aunque el griego usa el masculino singular υἱός, en español «hijo» comunica de manera natural la misma filiación y la relación de adopción/herencia.
theological_decisions:
- issue: Lenguaje filial masculino en una promesa de alcance general
  english_pob_reading: Retain 'son' in the main text
  chosen_spanish_reading: Mantener «hijo» en el texto principal
  alternative_spanish_readings:
  - hijo o hija
  - persona
  - niño
  rationale: El griego usa υἱός en masculino singular, y el texto bíblico preserva esa formulación filial. En español, «hijo» conserva la imagen de filiación y herencia sin neutralizar el lenguaje del fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Fórmula de pacto en primera persona divina
  english_pob_reading: Render relationally as 'I will be his God, and he will be my son'
  chosen_spanish_reading: Traducir relacionalmente como «yo seré su Dios, y él será mi hijo»
  alternative_spanish_readings:
  - seré Dios para él, y él será un hijo para mí
  rationale: La construcción preserva la relación de pertenencia y pacto entre Dios y el vencedor. No se introduce explicación doctrinal adicional en el versículo mismo; se deja que la fórmula bíblica hable por sí sola.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, point 3
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no fueron necesarios cambios y que el acuerdo con la revisión fue alto; por eso esta propuesta mantiene la misma línea traductológica, conservando tanto la terminología de victoria como la fórmula de pacto y la filiación masculina del original.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «hijo» para υἱός, manteniendo la filiación masculina del texto fuente.
  - Se evita «Cristo» y cualquier lenguaje no presente en el versículo.
  - 'La puntuación sigue el orden coordinado del griego: victoria, herencia, pacto, filiación.'
