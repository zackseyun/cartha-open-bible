translation:
  language: es
  text: Al oriente[a], tres puertas; y al norte, tres puertas; y al sur, tres puertas; y al occidente, tres puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «desde el oriente ... desde el norte ... desde el sur ... desde el occidente»; aquí la frase se vierte de modo idiomático para indicar el lado en que están las puertas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ ἀνατολῆς
  english_pob_choice: On the east
  chosen_spanish: Al oriente
  alternatives_spanish:
  - Desde el oriente
  - En el lado oriente
  lexicon: BDAG
  rationale: El griego ἀπὸ aquí señala la ubicación por lado/dirección, no movimiento de procedencia. «Al oriente» mantiene la orientación espacial de modo natural en español y conserva la simetría del listado.
- source_word: πυλῶνες
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portales
  - puertas monumentales
  lexicon: BDAG
  rationale: En este contexto arquitectónico de la ciudad, πυλών puede referirse a una entrada o portal. «Puertas» es el equivalente más claro y sobrio en español; «portales» sería posible, pero menos directo y menos transparente para la lectura pública.
- source_word: τρεῖς
  english_pob_choice: three
  chosen_spanish: tres
  lexicon: BDAG
  rationale: Numeral cardinal simple; se conserva la repetición para reproducir el patrón medido y simétrico del griego.
- source_word: ἀπὸ βορρᾶ
  english_pob_choice: on the north
  chosen_spanish: al norte
  alternatives_spanish:
  - desde el norte
  - en el lado norte
  lexicon: BDAG
  rationale: Como en la primera cláusula, la preposición indica ubicación por lado. «Al norte» suena natural y mantiene el paralelismo de la enumeración.
- source_word: ἀπὸ νότου
  english_pob_choice: on the south
  chosen_spanish: al sur
  alternatives_spanish:
  - desde el sur
  - en el lado sur
  lexicon: BDAG
  rationale: Se traduce de manera consistente con las demás direcciones cardinales para preservar la estructura repetitiva del verso.
- source_word: ἀπὸ δυσμῶν
  english_pob_choice: on the west
  chosen_spanish: al occidente
  alternatives_spanish:
  - al oeste
  - desde el occidente
  - en el lado occidente
  lexicon: BDAG
  rationale: «Occidente» es una forma digna y clara en español bíblico; conserva el valor cardinal de δυσμῶν y evita sugerir procedencia o movimiento. Se prefiere sobre «oeste» por el tono más reverente, sin perder inteligibilidad.
- source_word: καὶ ... καὶ ... καὶ ...
  english_pob_choice: and ... and ... and ...
  chosen_spanish: y ... y ... y ...
  alternatives_spanish:
  - con reducción de repeticiones
  lexicon: BDAG
  rationale: Se conserva la repetición para mantener la cadencia enumerativa y la simetría intencional del texto griego.
theological_decisions:
- issue: Descripción espacial de las puertas de la ciudad nueva
  english_pob_reading: 'Una lista arquitectónica directa: tres puertas en cada uno de los cuatro lados.'
  chosen_spanish_reading: 'Una lista arquitectónica directa: tres puertas en cada uno de los cuatro lados.'
  alternative_spanish_readings:
  - Posible resonancia simbólica con la disposición tribal de Israel o con la visión de Ezequiel
  rationale: El versículo en sí enumera las puertas por dirección cardinal. La traducción no debe cargar el texto con simbolismos no explicitados aquí, aunque tales asociaciones puedan existir a nivel canónico. Se preserva así la tensión interpretativa sin resolverla en la línea principal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El contexto auditado en inglés mantiene una traducción optimal-equivalence con una nota que explica la literalidad de ἀπὸ. No hubo revisiones posteriores ni cambios de sentido, así que el borrador español sigue esa decisión: se conserva la enumeración paralela y se expresa la ubicación por lados cardinales en español natural.'
  spanish_consistency_notes:
  - Se mantiene «al oriente / al norte / al sur / al occidente» como serie paralela estable.
  - «Puertas» reproduce el valor contextual de πυλῶνες sin introducir tecnicismos innecesarios.
  - No se suaviza la repetición de «tres» ni de la conjunción «y», para conservar el patrón del griego.
  - Se usa «occidente» de forma consistente con un registro bíblico sobrio y ampliamente comprensible.
