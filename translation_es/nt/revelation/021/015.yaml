- from: Y el que hablaba conmigo tenía una caña de medir de oro[a], para medir la ciudad, sus puertas y su muro.
  to: Y el que hablaba conmigo tenía una vara de medir de oro[a], para medir la ciudad, sus puertas y su muro.
  rationale: Se ajusta el instrumento de medición a una expresión más natural en español («vara de medir») que conserva la función comunicada por μέτρον κάλαμον χρυσοῦν y sigue la lógica del English POB. La nota conserva la alternativa más literal «caña», evitando a la vez el anglicismo «reed». No se requieren cambios adicionales.
