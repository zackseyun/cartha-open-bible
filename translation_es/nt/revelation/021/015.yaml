translation:
  language: es
  text: Y el que hablaba conmigo tenía una vara de medir de oro[a], para medir la ciudad, sus puertas y su muro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una caña de medir de oro». El griego usa κάλαμος, literalmente «caña», para un instrumento de medir.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαλῶν μετ’ ἐμοῦ
  english_pob_choice: the one speaking with me
  chosen_spanish: el que hablaba conmigo
  alternatives_spanish:
  - el que estaba hablando conmigo
  - el que me hablaba
  lexicon: BDAG
  rationale: El participio presente sustantivado conserva una referencia descriptiva y continua; en español, «el que hablaba conmigo» comunica bien esa forma sin añadir «ángel», que no está en el verso.
- source_word: εἶχεν
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - llevaba
  - tenía consigo
  lexicon: BDAG
  rationale: El imperfecto de ἔχω se vierte de manera directa con «tenía». En este contexto puede implicar que lo portaba, pero «tenía» evita sobreespecificar lo que el griego no dice explícitamente.
- source_word: μέτρον κάλαμον χρυσοῦν
  english_pob_choice: a golden measuring rod
  chosen_spanish: una caña de medir de oro[a]
  alternatives_spanish:
  - una vara de medir de oro
  - una caña de medir dorada
  - un bastón de medir de oro
  lexicon: BDAG
  rationale: Se conserva κάλαμος con «caña» para reflejar el valor literal de «reed», y se explicita su función con «de medir». «De oro» reproduce χρυσοῦν de manera más directa que «dorada», manteniendo el matiz material del texto. La nota a pie de página preserva la alternativa léxica 'reed'/'rod'.
- source_word: ἵνα μετρήσῃ
  english_pob_choice: so that he might measure
  chosen_spanish: para medir
  alternatives_spanish:
  - para que midiera
  - a fin de medir
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. En español, «para medir» transmite con naturalidad ese propósito sin cargar la frase con una subordinación más pesada.
- source_word: πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: BDAG
  rationale: Se mantiene el sentido simple y literal de πόλις. En el contexto se refiere a la Nueva Jerusalén, pero el sustantivo mismo es «ciudad».
- source_word: πυλῶνας
  english_pob_choice: gates
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus portones
  - sus entradas
  lexicon: BDAG
  rationale: «Puertas» es la equivalencia más natural en español para πυλών en este contexto arquitectónico. «Sus» mantiene la relación posesiva del griego.
- source_word: τεῖχος
  english_pob_choice: wall
  chosen_spanish: su muro
  alternatives_spanish:
  - su muralla
  - su pared
  lexicon: BDAG
  rationale: «Muro» traduce con sobriedad τεῖχος sin interpretar más de la cuenta. «Muralla» es posible, pero «muro» sigue de cerca el término griego y la descripción del versículo.
theological_decisions:
- issue: Identificación del que habla con Juan
  english_pob_reading: Retain the text's wording as 'the one speaking with me' without adding 'angel.'
  chosen_spanish_reading: Conservar «el que hablaba conmigo» sin añadir «ángel».
  alternative_spanish_readings:
  - el ángel que hablaba conmigo
  rationale: El contexto amplio identifica al mensajero, pero este verso usa solo una descripción participial. La traducción no debe importar una identificación explícita que el griego del verso no da.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y coincide con el criterio del audit trail inglés: no se añade «ángel», se mantiene el valor funcional del instrumento de medir y se conserva la finalidad de ἵνα μετρήσῃ con una construcción natural en español. No se registran revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Y» al inicio por estilo bíblico narrativo.
  - Se evita «SEÑOR» o terminología ajena porque el verso no contiene el tetragrámaton ni κύριος.
  - «Muro» se mantiene coherente con el valor de τεῖχος y con el estilo sobrio del pasaje.
  - La nota a pie de página se ancla en «caña de medir» para preservar la alternativa léxica documentada.
