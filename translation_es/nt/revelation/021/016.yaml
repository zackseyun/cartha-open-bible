  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «cuadrada», «caña de medir» y «estadios» concuerdan con el expediente léxico inglés. Se mantiene correctamente la unidad antigua en el texto principal y la explicación interpretativa de «cubo perfecto» fuera del texto principal.
