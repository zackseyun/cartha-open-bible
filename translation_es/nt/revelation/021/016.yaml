translation:
  language: es
  text: 'Y la ciudad yace cuadrada, y su longitud es igual a su anchura. Y la midió con la caña de medir[c]: doce mil estadios[a][b]. Su longitud, anchura y altura son iguales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un estadio era una antigua unidad de distancia; doce mil estadios equivalen aproximadamente a 2.220 kilómetros o 1.380 millas, según la longitud exacta que se suponga para el estadio.
    reason: cultural_note
  - marker: b
    text: 'O, de manera más interpretativa: «la ciudad es un cubo perfecto». El griego dice directamente que su longitud, anchura y altura son iguales.'
    reason: alternative_reading
  - marker: c
    text: O «con la caña». El término griego puede significar «caña», pero aquí se refiere a un instrumento de medir.
    reason: lexical_alternative
lexical_decisions:
- source_word: τετράγωνος
  english_pob_choice: foursquare
  chosen_spanish: cuadrada
  alternatives_spanish:
  - de cuatro lados
  - cuadrangular
  lexicon: BDAG
  rationale: El griego describe la forma de la ciudad como cuadrada. En español, «cuadrada» comunica con naturalidad el sentido geométrico sin añadir una imagen interpretativa mayor que el texto.
- source_word: κεῖται
  english_pob_choice: lies
  chosen_spanish: yace
  alternatives_spanish:
  - está situada
  - se halla
  lexicon: BDAG
  rationale: κέῖμαι expresa estar tendida/situada. «Yace» conserva bien la idea de una disposición fija y permite un tono sobrio y bíblico sin perder claridad.
- source_word: τὸ μῆκος αὐτῆς ὅσον τὸ πλάτος
  english_pob_choice: its length is as great as its width
  chosen_spanish: su longitud es igual a su anchura
  alternatives_spanish:
  - su longitud es tan grande como su anchura
  - su longitud es igual a su ancho
  lexicon: BDAG
  rationale: ὅσον marca igualdad de extensión. «Igual a» expresa la equivalencia de manera directa y precisa; «anchura» conserva el registro técnico y evita la posible ambigüedad de «ancho» como adjetivo.
- source_word: τῷ καλάμῳ
  english_pob_choice: with the measuring rod
  chosen_spanish: con la caña de medir
  alternatives_spanish:
  - con la vara de medir
  - con la caña
  lexicon: BDAG
  rationale: El término puede significar «caña/reed», pero aquí funciona como instrumento de medición. «Caña de medir» mantiene la imagen del original y a la vez deja claro su uso instrumental, sin perder el enlace léxico con el griego.
- source_word: ἐπὶ σταδίους δώδεκα χιλιάδων
  english_pob_choice: twelve thousand stadia
  chosen_spanish: doce mil estadios
  alternatives_spanish:
  - doce mil furlongs
  - doce mil estadios de longitud
  lexicon: BDAG
  rationale: Se conserva la unidad antigua en lugar de convertirla a medidas modernas. «Estadios» es transparente en español y refleja la decisión del POB inglés de mantener el valor histórico del texto.
- source_word: στάδιος
  english_pob_choice: stadia
  chosen_spanish: estadios
  alternatives_spanish:
  - furlongs
  lexicon: BDAG
  rationale: «Estadios» es la transliteración natural y ampliamente reconocible del plural de la unidad antigua; evita el anglicismo culturalmente distante y sigue de cerca el referente griego.
- source_word: τὸ μῆκος καὶ τὸ πλάτος καὶ τὸ ὕψος αὐτῆς ἴσα ἐστίν
  english_pob_choice: Its length and width and height are equal
  chosen_spanish: Su longitud, anchura y altura son iguales
  alternatives_spanish:
  - Su longitud, anchura y altura son la misma
  - Su longitud, amplitud y altura son iguales
  lexicon: BDAG
  rationale: El griego afirma la igualdad de las tres dimensiones. «Son iguales» reproduce la fuerza del predicado plural y «anchura» mantiene la correspondencia semántica con el verso anterior.
theological_decisions:
- issue: Si traducir la forma de la ciudad como una conclusión geométrica explícita
  english_pob_reading: The city is presented as having equal length, width, and height rather than simply being called a cube
  chosen_spanish_reading: La traducción mantiene la descripción textual de igualdad de dimensiones y no introduce «cubo» en el cuerpo principal.
  alternative_spanish_readings:
  - La ciudad es un cubo perfecto
  - La ciudad tiene forma de cubo
  rationale: El griego no usa el término «cubo», sino que declara la igualdad de longitud, anchura y altura. La formulación elegida preserva esa tensión y evita convertir una inferencia en afirmación directa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si modernizar o conservar la unidad antigua de distancia
  english_pob_reading: Retain 'twelve thousand stadia' in the main text
  chosen_spanish_reading: Se conserva «doce mil estadios» en el texto principal.
  alternative_spanish_readings:
  - aproximadamente 2.220 kilómetros
  - aproximadamente 1.380 millas
  rationale: La unidad forma parte del dato textual; convertirla en equivalencias modernas depende de supuestos históricos y desplaza el foco del original. Por eso se mantiene la medida antigua en el texto principal, como en el POB inglés.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincide con la última revisión del POB inglés (gpt-5.4, 2026-04-23T10:00:19Z): sin cambios requeridos; el criterio de conservación de unidades antiguas y de la igualdad dimensional se mantiene íntegro.'
  spanish_consistency_notes:
  - Se usó «Y» al inicio de cada cláusula para reflejar la parataxis del griego y la cadencia del POB inglés.
  - Se prefirió «anchura» para mantener consistencia interna con la relación dimensional; se evitó alternar con «ancho».
  - Se conservó «estadios» como tecnicismo transparente y se explicó en nota, siguiendo la decisión del texto inglés.
  - La nota sobre «cubo perfecto» se dejó como alternativa interpretativa, no como paráfrasis principal.
  - No se sustituyó la referencia a la medida por una equivalencia moderna en el texto principal, en línea con la prioridad del source text.
