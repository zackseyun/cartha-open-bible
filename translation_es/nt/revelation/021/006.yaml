translation:
  language: es
  text: 'Y me dijo: «Hecho está[a]. Yo soy el Alfa y la Omega, el principio y el fin[b]. Al que tiene sed, yo le daré de la fuente del agua de la vida gratuitamente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «han llegado a ser» o «estas cosas han llegado a ser». El verbo griego es plural; la formulación «Hecho está» expresa de manera idiomática la consumación.
    reason: alternative_reading
  - marker: b
    text: O «sin costo» o «como un don».
    reason: lexical_alternative
lexical_decisions:
- source_word: Γέγοναν
  english_pob_choice: It is done
  chosen_spanish: Hecho está
  alternatives_spanish:
  - Está hecho
  - Se ha cumplido
  - Han llegado a ser
  lexicon: BDAG
  rationale: El griego es perfecto plural de γίνομαι, pero en este contexto apocalíptico la fórmula breve e idiomática comunica consumación. «Hecho está» conserva el valor de cumplimiento consumado sin forzar en español un plural poco natural. Se mantiene la tensión entre la forma plural y la fórmula tradicional, como lo reconoce el audit trail inglés.
- source_word: τὸ Ἄλφα καὶ τὸ Ὦ
  english_pob_choice: the Alpha and the Omega
  chosen_spanish: el Alfa y la Omega
  alternatives_spanish:
  - la A y la Z
  - el Alfa y el Omega
  lexicon: BDAG
  rationale: Se conservan los nombres de las letras griegas como título simbólico establecido en Apocalipsis. En español, «Alfa» y «Omega» funcionan de modo natural y preservan la intertextualidad del original.
- source_word: ἡ ἀρχὴ καὶ τὸ τέλος
  english_pob_choice: the beginning and the end
  chosen_spanish: el principio y el fin
  alternatives_spanish:
  - el comienzo y el final
  - el origen y la meta
  lexicon: BDAG
  rationale: «Principio y fin» es la pareja más natural y fiel en español para ἀρχή / τέλος en esta fórmula. Mantiene tanto el sentido temporal como el de totalidad consumada, sin sobreinterpretar como «origen y meta».
- source_word: τῷ διψῶντι
  english_pob_choice: to the one who is thirsty
  chosen_spanish: al que tiene sed
  alternatives_spanish:
  - al sediento
  - a quien tenga sed
  - al que está sediento
  lexicon: BDAG
  rationale: El participio funciona sustantivamente para una persona caracterizada por la sed. «Al que tiene sed» es natural en español y preserva el singular personal mejor que un plural o una abstracción.
- source_word: ἐκ τῆς πηγῆς
  english_pob_choice: from the spring
  chosen_spanish: de la fuente
  alternatives_spanish:
  - de la fuente manantial
  - del manantial
  - de la primavera
  lexicon: BDAG
  rationale: πηγή puede ser «fuente» o «manantial». Se eligió «fuente» porque en español bíblico y común comunica bien el origen del agua viva y evita una rigidez innecesaria.
- source_word: τοῦ ὕδατος τῆς ζωῆς
  english_pob_choice: of the water of life
  chosen_spanish: del agua de la vida
  alternatives_spanish:
  - del agua vivificante
  - del agua de vida
  lexicon: BDAG
  rationale: Se conserva la estructura genitiva y la imagen bíblica establecida. «Agua de la vida» reproduce fielmente la construcción sin convertirla en paráfrasis.
- source_word: δωρεάν
  english_pob_choice: freely
  chosen_spanish: gratuitamente
  alternatives_spanish:
  - sin costo
  - como un don
  - libremente
  lexicon: BDAG
  rationale: El adverbio expresa que el don se da sin precio. «Gratuitamente» comunica con precisión esa gratuidad y deja abierta la nota de «sin costo» o «como un don».
theological_decisions:
- issue: La fórmula divina Γέγοναν en un contexto de consumación escatológica
  english_pob_reading: It is done
  chosen_spanish_reading: Hecho está
  alternative_spanish_readings:
  - Está cumplido
  - Todo está hecho
  - Han llegado a su cumplimiento
  rationale: La declaración marca la consumación de lo anunciado. «Hecho está» conserva la resonancia de finalización solemne que el inglés POB decidió priorizar, sin ocultar que el griego es plural y podría aludir a múltiples realidades llegadas a cumplimiento.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Retención del título Alfa/Omega como auto-designación divina
  english_pob_reading: the Alpha and the Omega
  chosen_spanish_reading: el Alfa y la Omega
  alternative_spanish_readings:
  - la A y la Z
  - el principio y el fin
  rationale: Se mantiene el título en forma griega porque es parte del simbolismo canónico de Apocalipsis. La apposición «el principio y el fin» explica el sentido sin reemplazar la imagen recibida.
  doctrine_reference: Affirmations; Translation philosophy §2, §6
- issue: El adverbio δωρεάν y la gratuidad del don
  english_pob_reading: freely
  chosen_spanish_reading: gratuitamente
  alternative_spanish_readings:
  - sin costo
  - como un don
  rationale: El don del agua de la vida se presenta como gracia, no como compra o mérito. «Gratuitamente» preserva la idea de don no cobrado y evita suavizar el matiz económico del término.
  doctrine_reference: Grace; gift-language in Revelation 21:6
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente que prefirió «It is done» sobre «They have come to pass» para reflejar mejor el uso idiomático en contexto, aunque se reconoció la pluralidad del griego. La versión española sigue esa línea: opta por una fórmula consumativa natural («Hecho está») y conserva una nota de alternativa para no borrar la tensión morfológica. También conserva la retención de Alfa/Omega y la equivalencia de δωρεάν como gratuidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se usa «Alfa y la Omega» en lugar de una adaptación gráfica para respetar el simbolismo apocalíptico.
  - «Fuente» se eligió sobre «manantial» por naturalidad y porque no altera la imagen.
  - «Gratuitamente» conserva el valor de δωρεάν sin introducir lenguaje devocional añadido.
  - Las comillas y la puntuación siguen la convención tipográfica española.
