    issue: La nota [a] contradice el texto principal
    rationale: El texto principal usa «Hecho está», pero la nota dice «O, tradicionalmente, “Hecho está”», presentándolo erróneamente como alternativa en vez de como la lectura principal.
  - severity: medium
    issue: La nota [a] no preserva bien la lógica del audit trail inglés
    rationale: El análisis inglés documenta que el verbo griego es plural y que una alternativa más literal sería «han llegado a ser» / «estas cosas han llegado a suceder». La nota española debería explicar que «Está hecho» o «Hecho está» es la formulación principal/tradicional, mientras que el plural griego ofrece otra posibilidad.
  - severity: low
