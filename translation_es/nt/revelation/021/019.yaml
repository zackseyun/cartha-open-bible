  text: ⸀οἱ θεμέλιοι τοῦ τείχους τῆς πόλεως παντὶ λίθῳ τιμίῳ κεκοσμημένοι· ὁ θεμέλιος ὁ πρῶτος ἴασπις, ὁ δεύτερος σάπφιρος, ὁ τρίτος χαλκηδών, ὁ τέταρτος σμάραγδος,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/021/019.yaml
  text: 'The foundations of the wall of the city were adorned with every kind of precious stone: the first foundation was jasper[a], the second sapphire, the third chalcedony, the fourth emerald[b],'
  footnotes:
  - marker: a
    text: Or, 'with every precious stone.' The Greek phrase may be taken distributively, hence 'every kind of precious stone.'
    reason: lexical_alternative
  - marker: b
    text: Chalcedony is a traditional rendering of the Greek term; the exact identification of some ancient gemstones is uncertain.
    reason: cultural_note
