translation:
  language: es
  text: 'Los cimientos del muro de la ciudad estaban adornados con toda clase de piedra preciosa[a]: el primer cimiento era jaspe, el segundo zafiro, el tercero calcedonia[b], el cuarto esmeralda,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con toda piedra preciosa». El griego puede entenderse de manera distributiva; de ahí «toda clase de piedra preciosa».'
    reason: lexical_alternative
  - marker: b
    text: Calcedonia es una transliteración tradicional del término griego; la identificación exacta de algunas gemas antiguas no es segura.
    reason: cultural_note
lexical_decisions:
- source_word: θεμέλιοι
  english_pob_choice: foundations
  chosen_spanish: cimientos
  alternatives_spanish:
  - fundamentos
  - cimientos de base
  lexicon: BDAG
  rationale: En este contexto arquitectónico, θεμέλιοι se refiere a los elementos de base de la muralla. 'Cimientos' suena natural en español y conserva la imagen estructural mejor que un calco más abstracto como 'fundamentos'.
- source_word: τεῖχος
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - muralla
  - pared
  lexicon: BDAG
  rationale: '''Muro'' mantiene el sentido de una gran pared defensiva o delimitadora y funciona bien con el registro solemne del pasaje. ''Muralla'' también es posible, pero ''muro'' evita una especificación excesiva que el griego no exige.'
- source_word: πόλεως
  english_pob_choice: city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la urbe
  lexicon: BDAG
  rationale: La referencia es a la ciudad escatológica; 'ciudad' es la equivalencia directa y más clara en español.
- source_word: παντὶ λίθῳ τιμίῳ
  english_pob_choice: with every kind of precious stone
  chosen_spanish: con toda clase de piedras preciosas
  alternatives_spanish:
  - con toda piedra preciosa
  - con cada clase de piedra preciosa
  lexicon: BDAG
  rationale: La frase dativa tiene fuerza distributiva. 'Toda clase de piedras preciosas' conserva esa distribución en español sin perder naturalidad. 'Toda piedra preciosa' sería más literal, pero menos transparente para el sentido colectivo/distributivo que el audit trail inglés preserva.
- source_word: κεκοσμημένοι
  english_pob_choice: were adorned
  chosen_spanish: estaban adornados
  alternatives_spanish:
  - habían sido adornados
  - eran adornados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante. 'Estaban adornados' comunica bien ese estado de belleza ya establecido, con un tono elevado y fluido.
- source_word: ὁ θεμέλιος ὁ πρῶτος
  english_pob_choice: the first foundation
  chosen_spanish: el primer cimiento
  alternatives_spanish:
  - la primera base
  - la primera piedra de cimiento
  lexicon: BDAG
  rationale: El singular introducido por cada piedra preciosa permite traducir de modo secuencial. 'Cimiento' mantiene la relación con el plural inicial y evita añadir 'piedra' donde el griego no la dice explícitamente.
- source_word: ἴασπις
  english_pob_choice: jasper
  chosen_spanish: jaspe
  alternatives_spanish:
  - jasper
  lexicon: BDAG
  rationale: '''Jaspe'' es la forma española estándar del nombre de la gema y corresponde al equivalente tradicional del término griego.'
- source_word: σάπφιρος
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - sáfiro
  lexicon: BDAG
  rationale: '''Zafiro'' es la forma usual y clara en español para el nombre de la gema.'
- source_word: χαλκηδών
  english_pob_choice: chalcedony
  chosen_spanish: calcedonia
  alternatives_spanish:
  - calcedón
  - calcedonia
  lexicon: BDAG
  rationale: Se conserva la transliteración tradicional al español porque la identificación exacta de la gema antigua es incierta. 'Calcedonia' es la forma más reconocible y se ajusta al cautela expresada en el audit trail inglés.
- source_word: σμάραγδος
  english_pob_choice: emerald
  chosen_spanish: esmeralda
  alternatives_spanish:
  - gema verde
  lexicon: BDAG
  rationale: '''Esmeralda'' es la equivalencia española establecida y más probable para el término griego.'
theological_decisions:
- issue: Descripción apocalíptica de piedras preciosas sin interpretación simbólica explícita
  english_pob_reading: Translate the gemstone names straightforwardly without symbolic interpretation in the main text.
  chosen_spanish_reading: Traducir los nombres de las gemas de manera directa, sin cargar el texto con una lectura simbólica no indicada por el versículo.
  alternative_spanish_readings:
  - Interpretar las piedras como símbolos de las tribus, los apóstoles o la gloria sacerdotal
  - Explicitar una lectura tipológica en el cuerpo del texto
  rationale: El griego enumera adornos de la ciudad y no ofrece una glosa interpretativa. La traducción debe preservar esa tensión apocalíptica en lugar de resolverla con una explicación doctrinal no presente en el texto.
  doctrine_reference: Principio de fidelidad al género apocalíptico y a la restricción semántica del texto fuente.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés; no se observan revisiones aplicadas ni desacuerdos de traducción en la fuente de referencia más reciente.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' no aplicable en este versículo; no hay necesidad de términos teológicos adicionales.
  - Se prefirió un orden natural del español, pero se conservó la secuencia enumerativa del griego y del audit trail inglés.
  - Los nombres de las gemas se dieron en formas españolas habituales, salvo 'calcedonia', conservada por cautela histórica y terminológica.
