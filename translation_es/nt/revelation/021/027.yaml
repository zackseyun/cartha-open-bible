source:
  edition: SBLGNT
  text: καὶ οὐ μὴ εἰσέλθῃ εἰς αὐτὴν πᾶν κοινὸν καὶ ⸀ποιῶν βδέλυγμα καὶ ψεῦδος, εἰ μὴ οἱ γεγραμμένοι ἐν τῷ βιβλίῳ τῆς ζωῆς τοῦ ἀρνίου.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/021/027.yaml
  text: And nothing unclean will ever enter it[a], nor anyone who does what is detestable or false[b], but only those written in the Lamb’s book of life.
  footnotes:
  - marker: a
    text: Or 'nothing profane' or 'nothing defiled' for 'nothing unclean' (πᾶν κοινόν).
    reason: lexical_alternative
  - marker: b
    text: Literally, 'doing abomination and falsehood.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
