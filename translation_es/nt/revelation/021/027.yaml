revisions:
- from: Y no entrará en ella nada inmundo[a], ni quien haga abominación y mentira[b], sino solo los que están escritos en el libro de la vida del Cordero.
  to: Y no entrará en ella nada inmundo[a], ni nadie que haga lo que es abominable o falso[b], sino solo los que están escritos en el libro de la vida del Cordero.
  rationale: La revisión alinea el español con la decisión final del POB inglés sobre la segunda cláusula, mejora la naturalidad del participio sustantivado en español y conserva la literalidad relevante en nota. 'Nada inmundo' y 'los que están escritos en el libro de la vida del Cordero' pueden mantenerse tal como están.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del griego: exclusión enfática de entrada, doble referencia a ''nada'' impuro y a personas caracterizadas por prácticas reprobables, y la excepción exclusiva de los inscritos en el libro de la vida del Cordero. Sin embargo, no sigue adecuadamente el audit trail inglés revisado en un punto significativo: ''abominación y mentira'' suena acumulativo, mientras que el POB inglés final optó por reflejar en lenguaje natural categorías separadas (''detestable or false''). Además, ''ni quien haga...'' es menos idiomático aquí que ''ni nadie que haga...''.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos asperezas de estilo: ''ni quien haga'' resulta algo truncado, y ''haga abominación y mentira'' suena poco natural en español e incluso ambiguo. Una formulación como ''ni nadie que haga lo que es abominable o falso'' conserva la fuerza semántica y mejora notablemente la legibilidad. El resto del versículo fluye bien.'
  glossary_alignment: 'No hay conflictos con la terminología de proyecto: ''Cordero'', ''libro de la vida'' e ''inmundo'' son adecuados. La decisión problemática no es de glosario base sino de cómo representar ποιῶν βδέλυγμα καὶ ψεῦδος de acuerdo con la resolución del POB inglés y con español natural. También conviene mantener la nota literal sobre ''abominación y falsedad/mentira''.'
  issues:
  - severity: medium
    issue: La coordinación 'abominación y mentira' en el texto principal no sigue la revisión aplicada del POB inglés.
    rationale: El audit trail inglés cambió 'and false' a 'or false' para expresar en lenguaje natural categorías separadas de exclusión. Aunque el griego tiene καὶ, el proyecto ya documentó que la mejor representación idiomática en el texto principal no es estrictamente copulativa.
  - severity: medium
    issue: '''ni quien haga'' es menos natural que ''ni nadie que haga'' en este contexto.'
    rationale: El participio sustantivado personal requiere en español una formulación más fluida y clara. 'Ni nadie que haga...' evita la dureza sintáctica y preserva el contraste con 'nada inmundo'.
  - severity: low
    issue: '''haga abominación y mentira'' suena poco idiomático en español contemporáneo.'
    rationale: Aunque intenta ser cercano a la literalidad, la frase puede sonar extraña o poco transparente. 'Haga lo que es abominable o falso' comunica mejor el sentido sin paraprasear en exceso, mientras la nota conserva la literalidad.
  revised_spanish_text: Y no entrará en ella nada inmundo[a], ni nadie que haga lo que es abominable o falso[b], sino solo los que están escritos en el libro de la vida del Cordero.
  revised_footnotes:
  - marker: a
    text: O 'nada profano' o 'nada contaminado' para πᾶν κοινόν.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'haciendo abominación y falsedad'.
    reason: lexical_alternative
  revision_rationale: La revisión alinea el español con la decisión final del POB inglés sobre la segunda cláusula, mejora la naturalidad del participio sustantivado en español y conserva la literalidad relevante en nota. 'Nada inmundo' y 'los que están escritos en el libro de la vida del Cordero' pueden mantenerse tal como están.
