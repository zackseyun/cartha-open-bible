    changes_summary: Changed 'and false' to 'or false' to better reflect the coordination of 'abomination and falsehood' as separate categories in natural English while preserving the sense of the Greek.
translation:
  language: es
  text: Y no entrará en ella nada inmundo[a], ni nadie que haga lo que es abominable o falso[b], sino solo los que están escritos en el libro de la vida del Cordero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'nada profano' o 'nada contaminado' para πᾶν κοινόν.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'haciendo abominación y falsedad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ εἰσέλθῃ
  english_pob_choice: will ever enter
  chosen_spanish: no entrará
  alternatives_spanish:
  - nunca entrará
  - no llegará a entrar
  lexicon: BDAG
  rationale: La construcción οὐ μή con subjuntivo aoristo expresa exclusión enfática. En español, el futuro simple con negación comunica bien esa imposibilidad en un registro natural. No añadí un adverbio intensificador en el texto principal porque la negación ya es fuerte, pero la nota puede recoger la alternativa 'nunca'.
- source_word: αὐτὴν
  english_pob_choice: it
  chosen_spanish: ella
  alternatives_spanish:
  - la ciudad
  - esa ciudad
  lexicon: BDAG
  rationale: El referente es la ciudad, la Nueva Jerusalén. En español, el pronombre retoma mejor el antecedente con concordancia femenina. No se explicita 'ciudad' para no sobrecargar el verso.
- source_word: πᾶν κοινὸν
  english_pob_choice: nothing unclean
  chosen_spanish: nada inmundo
  alternatives_spanish:
  - nada común
  - nada profano
  - nada contaminado
  lexicon: BDAG
  rationale: πᾶν κοινόν funciona de modo comprehensivo como 'nada'. En contexto de pureza, 'inmundo' expresa bien la idea ritual/moral sin el calco 'común', que en español sería opaco.
- source_word: ποιῶν βδέλυγμα
  english_pob_choice: who does what is detestable
  chosen_spanish: quien haga abominación
  alternatives_spanish:
  - quien practica abominación
  - quien hace lo detestable
  lexicon: BDAG
  rationale: 'El participio sustantivado se vierte de manera personal: ''quien haga''. βδέλυγμα tiene peso cultual-moral; ''abominación'' conserva esa fuerza, aunque suene más solemne que una paráfrasis como ''lo detestable''.'
- source_word: καὶ ψεῦδος
  english_pob_choice: or false
  chosen_spanish: y mentira
  alternatives_spanish:
  - o falsedad
  - y falsedad
  - o mentira
  lexicon: BDAG
  rationale: El sustantivo ψεῦδος puede ser 'mentira' o 'falsedad'. Opté por 'mentira' por claridad natural en español y porque, unido al participio, expresa una conducta falsa. Aunque el audit trail inglés revisado favorece la coordinación disyuntiva 'or false', en español la conjunción 'y' entre dos acusativos mantiene la coordinación del sintagma sin perder el valor global de la expresión.
- source_word: εἰ μὴ
  english_pob_choice: but only
  chosen_spanish: sino solo
  alternatives_spanish:
  - excepto
  - salvo
  - pero solo
  lexicon: BDAG
  rationale: '''Sino solo'' reproduce con naturalidad la excepción exclusiva. ''Solo'' refuerza el contraste sin sonar arcaico.'
- source_word: οἱ γεγραμμένοι
  english_pob_choice: those written
  chosen_spanish: los que están escritos
  alternatives_spanish:
  - los escritos
  - los inscritos
  - aquellos que están escritos
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo indica un estado resultante: ya están escritos. ''Los que están escritos'' comunica bien esa condición continua sin añadir ''nombres'', que el griego aquí no expresa de forma explícita.'
- source_word: ἐν τῷ βιβλίῳ τῆς ζωῆς
  english_pob_choice: in the book of life
  chosen_spanish: en el libro de la vida
  alternatives_spanish:
  - en el libro de vida
  - en el libro de la vida eterna
  - en el rollo de la vida
  lexicon: BDAG
  rationale: '''Libro de la vida'' es la expresión estable y fiel para βιβλίον τῆς ζωῆς. Mantiene la imagen apocalíptica sin introducir ''rollo'', que sería posible pero menos natural aquí.'
- source_word: τοῦ ἀρνίου
  english_pob_choice: the Lamb’s
  chosen_spanish: del Cordero
  alternatives_spanish:
  - del Cordero de Dios
  - del Cordero
  lexicon: BDAG
  rationale: ἀρνίον se traduce por 'Cordero', el título cristológico joánico habitual. El genitivo posesivo se conserva con 'del Cordero', sin añadir 'de Dios' porque el texto no lo dice.
theological_decisions:
- issue: Alcance de la exclusión final
  english_pob_reading: The verse excludes both anything unclean and any person characterized by detestable and false practices, with entry limited to those written in the Lamb’s book of life.
  chosen_spanish_reading: El versículo excluye tanto toda impureza como a la persona caracterizada por abominación y mentira, y limita la entrada a los que están escritos en el libro de la vida del Cordero.
  alternative_spanish_readings:
  - El versículo excluye solo impuridades rituales, sin referencia personal.
  - El versículo enumera una sola categoría moral, no dos.
  rationale: El griego combina un neutro colectivo ('nada inmundo') con un participio sustantivado personal ('quien haga...'). La traducción debe conservar ambas dimensiones, sin fusionarlas ni resolver la tensión entre pureza y conducta.
  doctrine_reference: Mantener la distinción gramatical y teológica del texto apocalíptico.
- issue: Relación entre 'abominación' y 'mentira'
  english_pob_reading: Literalmente, 'doing abomination and falsehood.'
  chosen_spanish_reading: '''abominación y mentira'' como dos rasgos coordinados de lo excluido.'
  alternative_spanish_readings:
  - '''abominación o mentira'''
  - '''lo detestable y lo falso'''
  rationale: La nota inglesa subraya la literalidad de los dos objetos coordinados. En español, 'y' conserva la coordinación directa del original; no se reduce a un solo rasgo ni se suaviza con términos demasiado abstractos. La posible disyunción semántica se deja implícita en la estructura nominal.
  doctrine_reference: Respetar la coordinación del original sin forzar una explicación interpretativa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'and false' a 'or false' para reflejar mejor la coordinación de βδέλυγμα y ψεῦδος. En esta propuesta española se optó por una formulación más natural ('abominación y mentira') dentro del sintagma participial, preservando el enlace coordinado del griego y evitando una disyunción que en español sonarían forzada o redundante en esta posición.
  spanish_consistency_notes:
  - Se mantiene 'Cordero' para ἀρνίον, coherente con el uso joánico y con la terminología POB.
  - Se evita 'SEÑOR' y cualquier sustitución tradicional no presente en el texto.
  - '''Libro de la vida'' se conserva como fórmula estable y transparente.'
  - No se añade 'nombres' porque el griego no lo explicita en este versículo.
  - '''Inmundo'' se usa para κοινός en contexto de pureza; no se traduce mecánicamente como ''común''.'
