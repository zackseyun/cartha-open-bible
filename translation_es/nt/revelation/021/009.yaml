translation:
  language: es
  text: 'Entonces vino uno de los siete ángeles que tenían las siete copas, llenas[a] de las siete últimas plagas, y habló conmigo, diciendo: «Ven, te mostraré la novia, la esposa del Cordero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘llenas de las siete plagas finales’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: El aoristo narrativo de ἔρχομαι se expresa naturalmente en español como ‘vino’; mantiene el avance de la escena sin forzar una traducción mecánica.
- source_word: εἷς ἐκ τῶν ἑπτὰ ἀγγέλων
  english_pob_choice: one of the seven angels
  chosen_spanish: uno de los siete ángeles
  alternatives_spanish:
  - uno entre los siete ángeles
  lexicon: BDAG
  rationale: La construcción partitiva se vierte de forma idiomática en español con ‘uno de’. Conserva el sentido distributivo sin alterar el referente.
- source_word: τῶν ἐχόντων τὰς ἑπτὰ φιάλας
  english_pob_choice: who had the seven bowls
  chosen_spanish: que tenían las siete copas
  alternatives_spanish:
  - que llevaban las siete copas
  - que poseían las siete copas
  lexicon: BDAG
  rationale: Se conserva la idea de posesión o tenencia. ‘Tenían’ reproduce bien el participio identificador; ‘copas’ sigue la decisión léxica del inglés POB para φιάλη.
- source_word: φιάλας
  english_pob_choice: bowls
  chosen_spanish: copas
  alternatives_spanish:
  - cuencos
  - bowls
  lexicon: BDAG
  rationale: En el marco de Apocalipsis, φιάλη designa un recipiente ancho poco profundo; ‘copas’ es una opción natural en español para ese objeto ritual/judicial, aunque el inglés POB prefirió ‘bowls’ para evitar ‘vials’.
- source_word: τῶν γεμόντων τῶν ἑπτὰ πληγῶν τῶν ἐσχάτων
  english_pob_choice: full of the seven last plagues
  chosen_spanish: llenas de las siete últimas plagas
  alternatives_spanish:
  - llenas de las siete plagas finales
  - repletas de las siete últimas plagas
  lexicon: BDAG
  rationale: γέμω expresa estar lleno; en español el adjetivo concuerda con ‘copas’. ‘Últimas’ conserva el valor escatológico/secuencial de ἐσχάτων sin perder naturalidad.
- source_word: ἐλάλησεν μετ’ ἐμοῦ
  english_pob_choice: spoke with me
  chosen_spanish: habló conmigo
  alternatives_spanish:
  - habló conmigo y me dijo
  - me habló
  lexicon: BDAG
  rationale: Se preserva la relación literal de μετά con genitivo como ‘conmigo’, siguiendo la decisión auditada del inglés POB de no aplanarlo automáticamente a ‘me habló’.
- source_word: Δεῦρο
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Acércate
  - Ven aquí
  lexicon: BDAG
  rationale: Imperativo breve e invitacional; ‘Ven’ comunica con claridad la llamada sin añadir elementos no presentes.
- source_word: δείξω σοι
  english_pob_choice: I will show you
  chosen_spanish: te mostraré
  alternatives_spanish:
  - te enseñaré
  - voy a mostrarte
  lexicon: BDAG
  rationale: El futuro directo se expresa de modo natural en español con ‘te mostraré’; conserva la promesa de revelación.
- source_word: τὴν νύμφην
  english_pob_choice: the bride
  chosen_spanish: la novia
  alternatives_spanish:
  - la esposa joven
  - la prometida
  lexicon: BDAG
  rationale: ‘Novia’ mantiene la imagen nupcial directa y es comprensible en español, aunque en el contexto apocalíptico no debe entenderse en sentido secular moderno sino simbólico.
- source_word: τὴν γυναῖκα τοῦ ἀρνίου
  english_pob_choice: the wife of the Lamb
  chosen_spanish: la esposa del Cordero
  alternatives_spanish:
  - la mujer del Cordero
  - la esposa del Cordero
  lexicon: BDAG
  rationale: γυνή en apposición a νύμφη aquí expresa la relación matrimonial consumada; ‘esposa’ recoge mejor esa fuerza que ‘mujer’ en español, y preserva el enlace simbólico con el Cordero.
- source_word: ἀρνίου
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el Cordero
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional ya fijado en Apocalipsis, sin transliteración.
theological_decisions:
- issue: Relación entre νύμφην y γυναῖκα
  english_pob_reading: 'Render both terms explicitly: ''the bride, the wife of the Lamb'''
  chosen_spanish_reading: ‘la novia, la esposa del Cordero’
  alternative_spanish_readings:
  - ‘la novia, la mujer del Cordero’
  - ‘la novia-esposa del Cordero’
  rationale: El griego conserva dos sustantivos en aposición; el español mantiene ambos para no borrar la tensión imagética. ‘Novia’ y ‘esposa’ dejan visible la transición nupcial sin colapsar los términos.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de ἐσχάτων en las plagas
  english_pob_reading: the seven last plagues
  chosen_spanish_reading: las siete últimas plagas
  alternative_spanish_readings:
  - las siete plagas finales
  - las últimas siete plagas
  rationale: ‘Últimas’ mantiene tanto el sentido temporal como escatológico, sin introducir una interpretación doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §1
- issue: Tratamiento de ἀρνίον como título cristológico
  english_pob_reading: the Lamb
  chosen_spanish_reading: el Cordero
  alternative_spanish_readings:
  - el Cordero
  - el Cordero de Dios
  rationale: El contexto de Apocalipsis ya establece ἀρνίον como título de Jesús; ‘el Cordero’ transmite el valor titular sin añadir glosa innecesaria.
  doctrine_reference: Translation philosophy §2; Affirmations (Nicene/Chalcedonian bounds)
translation_notes:
  revision_awareness: El paquete auditado en inglés fue revisado y quedó sin cambios tras la última pasada; el consenso de revisión es alto (agreement_score 1.0). La versión española sigue de cerca esas decisiones auditadas, ajustando únicamente el registro natural del español y la elección contextual de φιάλη como ‘copas’.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca; aquí no interviene.
  - ‘Cordero’ se conserva como título cristológico fijo, coherente con el proyecto.
  - ‘Conmigo’ reproduce la decisión auditada de μετ’ ἐμοῦ, y la nota aclara la alternativa literal.
  - La pareja ‘novia, esposa’ preserva la aposición griega y evita borrar la tensión nuptial.
  - ‘Últimas’ responde al valor de ἐσχάτων sin reemplazarlo por una paráfrasis interpretativa.
