translation:
  language: es
  text: Y la ciudad no tiene necesidad del sol ni de la luna para darle luz[a], pues la gloria de Dios la iluminó, y su lámpara es el Cordero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para brillar sobre ella’. El griego dice literalmente ‘para brillar sobre/para ella’.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλις
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - urbe
  - la ciudad
  lexicon: BDAG
  rationale: ‘πόλις’ se refiere de forma natural a ‘ciudad’; en este contexto de la Nueva Jerusalén, ‘ciudad’ comunica con claridad y sin añadir interpretación.
- source_word: οὐ χρείαν ἔχει
  english_pob_choice: has no need
  chosen_spanish: no tiene necesidad
  alternatives_spanish:
  - no necesita
  - no tiene necesidad de
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de manera natural en español como ‘no tiene necesidad’; conserva el sentido de carencia sin forzar una construcción literal.
- source_word: τοῦ ἡλίου οὐδὲ τῆς σελήνης
  english_pob_choice: of the sun or of the moon
  chosen_spanish: del sol ni de la luna
  alternatives_spanish:
  - del sol o de la luna
  - del sol y de la luna
  lexicon: BDAG
  rationale: Se mantiene la pareja de genitivos en una estructura fluida en español. ‘Ni’ reproduce bien la coordinación negativa del griego con el sentido de exclusión conjunta.
- source_word: ἵνα φαίνωσιν αὐτῇ
  english_pob_choice: to shine on it
  chosen_spanish: para alumbrarla
  alternatives_spanish:
  - para brillar sobre ella
  - para darle luz
  lexicon: BDAG
  rationale: El griego puede expresarse como ‘brillar sobre’ o ‘dar luz a’. ‘Alumbrarla’ conserva el sentido concreto de iluminación y suena natural en español. La nota preserva la alternativa literal.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - resplandor
  lexicon: BDAG
  rationale: ‘Gloria’ es la equivalencia teológica establecida y adecuada en un contexto apocalíptico, manteniendo la densidad bíblica del término.
- source_word: ἐφώτισεν
  english_pob_choice: gave it light
  chosen_spanish: la iluminó
  alternatives_spanish:
  - le dio luz
  - la alumbró
  lexicon: BDAG
  rationale: El verbo expresa iluminación efectiva. ‘La iluminó’ es directo, sobrio y evita duplicar innecesariamente la imagen ya expresada por ‘alumbrarla’.
- source_word: λύχνος
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara de aceite
  - antorcha
  lexicon: BDAG
  rationale: ‘λύχνος’ designa una lámpara; ‘lámpara’ es la correspondencia más clara y precisa en español, manteniendo la imagen sin amplificación.
- source_word: ἀρνίον
  english_pob_choice: Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el Corderito
  - el Cordero de Dios
  lexicon: BDAG
  rationale: En Apocalipsis, ‘ἀρνίον’ es un título cristológico fijo. ‘El Cordero’ conserva la referencia titular reconocible en español sin añadir material no presente en el texto.
theological_decisions:
- issue: Relación metafórica entre la lámpara y el Cordero
  english_pob_reading: Retain the metaphor directly rather than smoothing it to 'the Lamb is its light.'
  chosen_spanish_reading: 'Conservar la metáfora: ‘su lámpara es el Cordero’'
  alternative_spanish_readings:
  - el Cordero es su luz
  - el Cordero la alumbra
  rationale: El griego usa ‘λύχνος’ (‘lámpara’), no un término genérico para ‘luz’. Mantener ‘lámpara’ preserva la imagen y la tensión entre la gloria de Dios como fuente de iluminación y el Cordero como lámpara de la ciudad.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Imaginería de iluminación divina
  english_pob_reading: Translate without importing speculative eschatological explanation.
  chosen_spanish_reading: Traducir sin añadir explicación escatológica o doctrinal no explicitada por el texto.
  alternative_spanish_readings:
  - explicar que Dios sustituye toda luz creada
  - añadir una paráfrasis sobre la ausencia de noche
  rationale: El versículo afirma la suficiencia de la gloria de Dios y el papel del Cordero, sin expandir el significado más allá de lo dicho. La versión española mantiene ese alcance.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios sustantivos. Se preserva la imagen de ‘lámpara’ y se opta por una formulación española natural para la finalidad de φωίνωσιν αὐτῇ.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ y ‘el Cordero’ con mayúscula por claridad teológica y coherencia con el uso cristológico en Apocalipsis.
  - ‘Alumbrar’/‘iluminar’ diferencia bien la función de ἵνα φαίνωσιν αὐτῇ de ἐφώτισεν, evitando redundancia excesiva en español.
  - ‘Lámpara’ mantiene el contraste con ‘sol’ y ‘luna’ sin sustituir la imagen por ‘luz’, que sería menos precisa.
