revisions:
- from: Y la ciudad no tiene necesidad del sol ni de la luna para alumbrarla[a], pues la gloria de Dios la iluminó, y su lámpara es el Cordero.
  to: Y la ciudad no tiene necesidad del sol ni de la luna para darle luz[a], pues la gloria de Dios la iluminó, y su lámpara es el Cordero.
  rationale: Se cambia ‘para alumbrarla’ por ‘para darle luz’ para reflejar mejor la alternativa auditada para ἵνα φαίνωσιν αὐτῇ, mantener la distinción con ἐφώτισεν (‘la iluminó’) y mejorar la naturalidad del español. Se conserva intacta la metáfora teológica ‘su lámpara es el Cordero’.
