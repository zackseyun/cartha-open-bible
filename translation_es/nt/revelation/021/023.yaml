    issue: ‘para alumbrarla’ reduce la distinción con ‘la iluminó’
    rationale: El griego usa primero φαίνωσιν (‘brillar’, con alternativa ‘darle luz’) y luego ἐφώτισεν (‘iluminó / dio luz’). En español, ‘alumbrarla’ y ‘la iluminó’ quedan demasiado cercanos y atenúan la diferencia léxica que el POB inglés procuró conservar.
  - severity: low
    issue: La nota alternativa ya favorece una opción mejor para el texto principal
    rationale: La nota dice ‘O “para darle luz”’, que en este caso resulta más idiomático y más alineado con la decisión auditada; conviene promover esa formulación al texto principal y dejar la literalidad ‘brillar sobre/para ella’ en la nota.
  revised_spanish_text: Y la ciudad no tiene necesidad del sol ni de la luna para darle luz[a], pues la gloria de Dios la iluminó, y su lámpara es el Cordero.
  revised_footnotes:
  - marker: a
    text: O ‘para brillar sobre ella’. El griego dice literalmente ‘para brillar sobre/para ella’.
    reason: lexical_alternative
  revision_rationale: Se cambia ‘para alumbrarla’ por ‘para darle luz’ para reflejar mejor la alternativa auditada para ἵνα φαίνωσιν αὐτῇ, mantener la distinción con ἐφώτισεν (‘la iluminó’) y mejorar la naturalidad del español. Se conserva intacta la metáfora teológica ‘su lámpara es el Cordero’.
