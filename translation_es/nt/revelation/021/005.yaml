review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene al hablante entronizado, la declaración de renovación universal y la razón para escribir. Sin embargo, dos elecciones no siguen del todo bien la evidencia auditada: 1) ὁ καθήμενος es mejor como presente descriptivo en español (''el que está sentado'' / ''el que está sentado en el trono'') que como imperfecto narrativo ''estaba sentado'', ya que el participio presente identifica al hablante por su estado entronizado actual; 2) la nota [b] está mal formulada porque presenta una alternativa idéntica (''O “nuevas”''). Además, el anclaje de [b] sobre ''nuevas'' no aporta una alternativa útil en español; la alternativa relevante del inglés POB era más bien ''todas las cosas'' / ''todo''.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Mira' funciona, aunque 'He aquí' sería más elevado; no es necesario forzar cambio. 'Estoy haciendo nuevas todas las cosas' suena natural y fiel. 'Fieles y verdaderas' es bíblicamente idiomático en español y preserva bien πιστοὶ καὶ ἀληθινοί. Los principales problemas son de precisión aspectual en 'estaba sentado' y de calidad editorial en las notas.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. 'Fieles y verdaderas' es una excepción legítima respecto al inglés 'trustworthy and true', porque en español 'palabras fieles' es idiomático y fue además preservado como alternativa en la auditoría inglesa.
  issues:
  - severity: medium
    issue: '''el que estaba sentado en el trono'' debilita el valor descriptivo presente de ὁ καθήμενος'
    rationale: El participio presente identifica al hablante como 'el que está sentado en el trono'. El imperfecto español encuadra más la escena narrativa pasada que la designación entronizada actual, y se aparta de la decisión auditada del POB inglés.
  - severity: medium
    issue: La nota [b] es defectuosa y no aporta la alternativa correcta
    rationale: Dice 'O “nuevas”', repitiendo la misma palabra; además la alternativa auditada en inglés se relaciona con 'all things/everything', no con reemplazar 'new' por una glosa interpretativa como 'renovadas'.
  - severity: low
    issue: Exceso de notas menores no necesarias
    rationale: Las notas [a] y [c] documentan alternativas posibles, pero la más importante que conviene conservar del inglés es la alternativa de alcance 'todas las cosas' / 'todo' y, si se desea, la de 'fieles' / 'confiables'. Reducir y enfocar notas mejora claridad editorial.
  revised_spanish_text: 'Y el que está sentado en el trono dijo: «Mira, estoy haciendo nuevas todas las cosas»[a]. Y dijo: «Escribe, porque estas palabras son fieles[b] y verdaderas».'
