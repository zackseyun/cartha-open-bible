translation:
  language: es
  text: 'Y el que está sentado en el trono dijo: «Mira, estoy haciendo nuevas todas las cosas»[a]. Y dijo: «Escribe, porque estas palabras son fieles[b] y verdaderas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “estoy haciendo nuevo todo”. El griego puede expresarse como “todas las cosas” o “todo”; aquí se eligió “todas las cosas” para conservar el alcance amplio y formal de la expresión.
    reason: lexical_alternative
  - marker: b
    text: O “confiables”. Se eligió “fieles” porque en español bíblico y eclesial suena natural al describir palabras, y conserva el sentido de πιστοί.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καθήμενος ἐπὶ τῷ θρόνῳ
  english_pob_choice: the one seated on the throne
  chosen_spanish: el que estaba sentado en el trono
  alternatives_spanish:
  - el que se sienta en el trono
  - el que está sentado en el trono
  lexicon: BDAG
  rationale: Conserva la imagen de entronización y el matiz descriptivo del participio presente sin sonar forzado en español. "Estaba sentado" transmite la escena como estado continuo, equivalente natural al valor durativo del griego en este contexto.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: BDAG
  rationale: En español, "He aquí" puede sonar más arcaico; "Mira" conserva la función de llamada de atención inmediata y solemne, con lectura pública clara.
- source_word: καινὰ
  english_pob_choice: new
  chosen_spanish: nuevas
  alternatives_spanish:
  - nuevos
  - renovadas
  lexicon: BDAG
  rationale: Se traduce con el adjetivo concordado con "cosas". "Nuevas" mantiene la amplitud de la renovación sin decidir entre simple reemplazo o transformación cualitativa.
- source_word: ποιῶ
  english_pob_choice: I am making
  chosen_spanish: estoy haciendo
  alternatives_spanish:
  - hago
  - estoy creando
  lexicon: BDAG
  rationale: El presente progresivo expresa bien la acción divina en curso que el inglés POB también marcó progresivamente. "Hacer" es más fiel a ποιέω que "crear", que sugeriría explícitamente κτίζω.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo ello
  lexicon: BDAG
  rationale: '"Todas las cosas" preserva el alcance formal y global del neutro plural, sin reducirlo a un mero "todo" abstracto.'
- source_word: Γράψον
  english_pob_choice: Write
  chosen_spanish: Escribe
  alternatives_spanish:
  - Anota
  - Escríbelo
  lexicon: BDAG
  rationale: Imperativo directo y breve, sin añadir objeto inexistente en el griego. "Escribe" es la forma natural y contundente en español.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: 'Explicita la relación causal: se manda escribir esto porque las palabras son confiables y verdaderas. En español, "porque" comunica mejor esa conexión que una subordinación más ambigua.'
- source_word: οὗτοι οἱ λόγοι
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas declaraciones
  - estos dichos
  lexicon: BDAG
  rationale: '"Palabras" es la opción más directa y natural para λόγοι en este contexto revelatorio. Conserva el alcance del mensaje sin introducir un matiz demasiado técnico o arcaico.'
- source_word: πιστοὶ
  english_pob_choice: trustworthy
  chosen_spanish: fieles
  alternatives_spanish:
  - confiables
  - fiables
  lexicon: BDAG
  rationale: Aunque el inglés optó por "trustworthy" por idiomatismo, en español "fieles" refleja bien la idea de palabras en las que se puede confiar y mantiene resonancia bíblica sin perder precisión.
- source_word: ἀληθινοί
  english_pob_choice: 'true'
  chosen_spanish: verdaderas
  alternatives_spanish:
  - auténticas
  - reales
  lexicon: BDAG
  rationale: '"Verdaderas" reproduce el paralelismo con πιστοί y la afirmación estándar de fiabilidad y verdad. En español evita un uso demasiado filosófico de "auténticas".'
theological_decisions:
- issue: Alcance de la renovación escatológica en καινὰ ποιῶ πάντα
  english_pob_reading: I am making all things new
  chosen_spanish_reading: estoy haciendo nuevas todas las cosas
  alternative_spanish_readings:
  - hago nuevas todas las cosas
  - estoy renovando todo
  rationale: Se conserva la tensión del griego entre renovación transformadora y amplitud universal sin resolverla. "Haciendo nuevas" mantiene el aspecto progresivo y la totalidad de πάντα, sin forzar un sentido de recreación absoluta.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Identificación del hablante entronizado
  english_pob_reading: the one seated on the throne
  chosen_spanish_reading: el que estaba sentado en el trono
  alternative_spanish_readings:
  - el que se sienta en el trono
  - el sentado en el trono
  rationale: La frase conserva la imaginería de soberanía divina mediante el trono, sin añadir especificaciones doctrinales ajenas al versículo. La formulación española permanece descriptiva y reverente.
  doctrine_reference: Affirmations; Translation philosophy §1 Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed, and the cross-check summary shows high agreement (0.95) with an agree verdict. The Spanish draft therefore follows the established English POB decisions without introducing new interpretive moves.
  spanish_consistency_notes:
  - Se mantuvo Yahvé/Jesús/Dios terminology defaults where not applicable; this verse contains no divine-name masking issue.
  - '"Fieles y verdaderas" preserves the paired adjectival structure of πιστοί καὶ ἀληθινοί without collapsing it into a single quality.'
  - The selected Spanish rendering keeps the direct speech structure and the two divine utterances distinct, matching the source punctuation and discourse flow.
