revisions:
- from: 'Y el que estaba sentado en el trono dijo[a]: «Mira, estoy haciendo nuevas[b] todas las cosas». Y dijo: «Escribe[c], porque estas palabras son fieles y verdaderas»[d].'
  to: 'Y el que está sentado en el trono dijo: «Mira, estoy haciendo nuevas todas las cosas»[a]. Y dijo: «Escribe, porque estas palabras son fieles[b] y verdaderas».'
  rationale: Se ajusta ὁ καθήμενος a un presente descriptivo más fiel ('está sentado'), se corrige la nota defectuosa sobre καινά/πάντα preservando la alternativa relevante del inglés POB ('todas las cosas' / 'todo'), y se simplifican las notas para dejar solo las lexicalmente significativas. El resto del verso se mantiene porque es fiel, natural y teológicamente adecuado en español.
