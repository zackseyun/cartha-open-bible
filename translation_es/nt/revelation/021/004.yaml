translation:
  language: es
  text: Y enjugará toda lágrima de sus ojos[a], y la muerte no existirá más; ni duelo ni llanto ni dolor habrá más[b][c]. Las primeras cosas pasaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «todas las lágrimas». El singular griego es distributivo: «toda lágrima».'
    reason: lexical_alternative
  - marker: b
    text: O «grito» o «clamor» para «llanto». El griego puede denotar un grito o un clamor fuerte.
    reason: lexical_alternative
  - marker: c
    text: O «las cosas anteriores pasaron».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαλείψει
  english_pob_choice: will wipe away
  chosen_spanish: enjugará
  alternatives_spanish:
  - borrará
  - quitará
  lexicon: BDAG
  rationale: En este contexto con «toda lágrima», «enjugará» comunica de modo natural y cercano la acción personal de quitar las lágrimas. «Borrar» suena más abstracto o textual, y «quitará» pierde la imagen concreta del acto.
- source_word: πᾶν δάκρυον
  english_pob_choice: every tear
  chosen_spanish: toda lágrima
  alternatives_spanish:
  - cada lágrima
  - todas las lágrimas
  lexicon: BDAG
  rationale: El singular distributivo de πᾶν δάκρυον se conserva bien con «toda lágrima», que expresa cada lágrima individual sin volverlo innecesariamente pesado. «Todas las lágrimas» es posible, pero atenúa un poco la fuerza distributiva.
- source_word: ἐκ τῶν ὀφθαλμῶν αὐτῶν
  english_pob_choice: from their eyes
  chosen_spanish: de sus ojos
  alternatives_spanish:
  - de entre sus ojos
  - fuera de sus ojos
  lexicon: BDAG
  rationale: «De sus ojos» es la forma natural en español y mantiene el sentido de remoción desde los ojos de los redimidos. Otras opciones resultan más literales pero menos idiomáticas.
- source_word: ὁ θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Se traduce con el sustantivo común «la muerte». El artículo griego puede personificarla, pero en español la abstracción se expresa naturalmente así sin perder la fuerza total de su abolición.
- source_word: οὐκ ἔσται ἔτι
  english_pob_choice: will be no more
  chosen_spanish: no existirá más
  alternatives_spanish:
  - ya no será
  - no habrá más
  lexicon: BDAG
  rationale: «No existirá más» comunica bien la cesación completa y solemne de la realidad mencionada. «No habrá más» también es viable, pero aquí «existirá» refuerza la desaparición total de la muerte.
- source_word: πένθος
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - dolor
  lexicon: BDAG
  rationale: «Duelo» funciona bien en español para el lamento por pérdida y se ajusta al contexto de la serie con muerte, clamor y dolor. «Luto» puede sonar más a vestimenta o estado social; «dolor» se reserva más adelante en la lista.
- source_word: κραυγή
  english_pob_choice: crying
  chosen_spanish: clamor
  alternatives_spanish:
  - grito
  - llanto
  lexicon: BDAG
  rationale: BDAG permite el sentido de grito o alarido; el audit trail inglés notó la posible acepción de «outcry». «Clamor» preserva esa amplitud y evita reducirla solo a llanto, que ya queda sugerido por el contexto de duelo.
- source_word: πόνος
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - sufrimiento
  - pena
  lexicon: BDAG
  rationale: En esta lista escatológica, «dolor» es la correspondencia más directa y clara. Aunque πόνος puede abarcar trabajo o angustia, aquí el campo semántico de aflicción queda bien representado por «dolor».
- source_word: τὰ πρῶτα
  english_pob_choice: the former things
  chosen_spanish: las cosas primeras
  alternatives_spanish:
  - las cosas anteriores
  - las cosas primeras
  lexicon: BDAG
  rationale: Se opta por «las cosas primeras» para seguir de cerca el neutro plural y mantener la referencia al orden anterior de la realidad. «Las cosas anteriores» es posible, pero menos cercano al paralelismo del griego.
- source_word: ἀπῆλθαν
  english_pob_choice: have passed away
  chosen_spanish: pasaron
  alternatives_spanish:
  - han pasado
  - se fueron
  lexicon: BDAG
  rationale: El aoristo expresa un hecho consumado. «Pasaron» es breve y solemne en español; aunque el inglés usa presente perfecto, el español puede conservar la completitud sin forzar el tiempo compuesto.
theological_decisions:
- issue: Sujeto implícito de «enjugará / wipe away»
  english_pob_reading: Render simply as 'he will wipe away' without inserting 'God' into the text.
  chosen_spanish_reading: «Y enjugará...» sin añadir explícitamente «Dios» en la línea.
  alternative_spanish_readings:
  - Y Dios enjugará...
  rationale: El sujeto está implícito por el contexto inmediato, no repetido en este versículo. Mantenerlo implícito respeta la cohesión del griego y evita introducir un sustantivo que el versículo no expresa de manera directa.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §5 (coherencia con el contexto inmediato).
- issue: Alcance absoluto de la cesación de muerte, duelo, clamor y dolor
  english_pob_reading: '''death will be no more'' and ''nor ... will be any more.'''
  chosen_spanish_reading: «la muerte no existirá más» y «ni ... existirá más»
  alternative_spanish_readings:
  - la muerte ya no será
  - ya no habrá muerte
  rationale: La formulación conserva la afirmación categórica de que estas realidades quedan abolidas en la nueva creación. «No existirá más» mantiene el tono definitivo sin suavizar la declaración.
  doctrine_reference: Affirmations; Translation philosophy §3 (preservar la tensión/afirmación teológica sin rebajarla).
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; el borrador sigue el texto griego SBLGNT y coincide sustancialmente con el consenso del audit trail inglés, manteniendo las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «duelo / clamor / dolor» para reflejar la serie de términos del griego sin colapsarlos en un solo campo semántico.
  - «Existirá más» y «pasaron» se eligieron por naturalidad en español sin perder la fuerza de cesación completa del original.
