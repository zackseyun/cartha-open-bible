review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: la remoción total de las lágrimas, la cesación definitiva de la muerte y de las aflicciones, y el paso del orden anterior. Sin embargo, hay ajustes necesarios para alinearse mejor con el audit trail inglés y con un español más natural: κραυγή se documentó en inglés como ''crying'' con alternativa ''outcry'', por lo que «clamor» no es imposible pero desplaza el matiz hacia protesta o vocerío más que hacia llanto; además, «las cosas primeras» suena calcado frente a «las primeras cosas» o «las cosas anteriores».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta cierta rigidez: «ni duelo ni clamor ni dolor existirá más» suena menos natural en español que «ya no habrá». También «Las cosas primeras pasaron» resulta poco idiomático. «Enjugará toda lágrima de sus ojos» es excelente y preserva la imagen personal del original.'
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. La revisión propuesta mantiene «enjugará», «toda lágrima», «la muerte», y mejora la naturalidad con «ya no habrá» y «las primeras cosas». También ajusta la nota de κραυγή para evitar dejar 'outcry' en inglés dentro de la nota española.
  issues:
  - severity: medium
    issue: «clamor» para κραυγή
    rationale: El audit trail inglés eligió 'crying' y solo preservó 'outcry' como alternativa. En español, «clamor» suele sugerir protesta, vocerío o clamor público más que el acto de llorar. «Llanto» preserva mejor el contexto consolatorio; una nota puede conservar «grito» o «clamor» como alternativas.
  - severity: medium
    issue: «Las cosas primeras pasaron» suena poco idiomático
    rationale: Aunque se acerca formalmente al griego τὰ πρῶτα, en español bíblico natural suena mejor «las primeras cosas pasaron» o «las cosas anteriores pasaron». Esto preserva el sentido del orden anterior sin calco torpe.
  - severity: low
    issue: «existirá más» repetido en la lista
    rationale: No es incorrecto, pero en español «ya no habrá» suena más natural para la serie nominal «ni duelo ni llanto ni dolor», mientras conserva la cesación absoluta documentada por el POB.
  - severity: low
    issue: Nota b contiene 'outcry' en inglés
    rationale: La nota debe estar plenamente en español. Puede explicarse como «clamor» o «grito fuerte» sin dejar un anglicismo innecesario.
