base_translation:
  language: en
  yaml_path: translation/nt/revelation/021/004.yaml
  text: And he will wipe away every tear from their eyes[a], and death will be no more; neither mourning nor crying nor pain will be any more[c][b]. The former things have passed away.
  footnotes:
  - marker: a
    text: 'Or ''all tears.'' The Greek singular is distributive: ''every tear.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'outcry' for 'crying.' The Greek can denote a cry or loud outcry.
    reason: lexical_alternative
  - marker: c
    text: Or 'the first things have passed away.'
    reason: lexical_alternative
