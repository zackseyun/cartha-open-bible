revisions:
- from: Y enjugará toda lágrima de sus ojos[a], y la muerte no existirá más; ni duelo ni clamor ni dolor existirá más[c][b]. Las cosas primeras pasaron.
  to: Y enjugará toda lágrima de sus ojos[a], y la muerte no existirá más; ni duelo ni llanto ni dolor habrá más[b][c]. Las primeras cosas pasaron.
  rationale: 'La revisión mantiene el contenido del borrador pero corrige dos puntos principales: (1) cambia «clamor» por «llanto» para seguir mejor la decisión documentada del POB inglés (''crying'') en este contexto de consuelo, preservando en nota las alternativas más fuertes; (2) reemplaza «Las cosas primeras pasaron» por «Las primeras cosas pasaron», que transmite τὰ πρῶτα con mejor español. También se suaviza la serie con «habrá más», más idiomático en español para sustantivos coordinados, sin perder la fuerza de cesación absoluta.'
