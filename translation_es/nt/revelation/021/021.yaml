translation:
  language: es
  text: Y las doce puertas eran doce perlas; cada una de las puertas era de una sola perla. Y la calle de la ciudad era oro puro[a], como vidrio transparente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la calle ancha de la ciudad» o «la plaza de la ciudad» para πλατεῖα.
    reason: alternative_reading
lexical_decisions:
- source_word: πυλῶνες
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - puertas de acceso
  lexicon: BDAG
  rationale: En el cuadro de la Nueva Jerusalén, πυλών se refiere a aperturas/entradas arquitectónicas. En español, «puertas» comunica con naturalidad la imagen sin añadir tecnicismo innecesario. «Portones» sería posible, pero suena más pesado y menos neutro.
- source_word: μαργαρῖται / μαργαρίτου
  english_pob_choice: pearls / pearl
  chosen_spanish: perlas / perla
  alternatives_spanish:
  - nácares / nácar
  lexicon: BDAG
  rationale: 'μαργαρίτης significa de manera directa «perla». Mantener el plural y luego el singular preserva la correspondencia del pasaje: doce puertas, doce perlas; cada puerta, de una sola perla.'
- source_word: ἀνὰ εἷς ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada una
  alternatives_spanish:
  - una cada una
  - cada puerta
  lexicon: BDAG
  rationale: La fuerza distributiva del griego pide una expresión natural en español que conserve la distribución uno por uno. «Cada una» refleja bien esa relación sin forzar la sintaxis.
- source_word: ἐξ ἑνὸς μαργαρίτου
  english_pob_choice: was from a single pearl
  chosen_spanish: era de una sola perla
  alternatives_spanish:
  - era a partir de una sola perla
  - provenía de una sola perla
  lexicon: BDAG
  rationale: ἐκ/ἐξ expresa fuente o material. «Era de una sola perla» es fiel y idiomático en español, y conserva el énfasis de ἑνός mediante «una sola».
- source_word: πλατεῖα
  english_pob_choice: street
  chosen_spanish: calle[a]
  alternatives_spanish:
  - calle ancha[a]
  - plaza[a]
  - plaza principal[a]
  lexicon: BDAG
  rationale: πλατεῖα puede significar «calle ancha», «calle principal» o «plaza». En este contexto, «calle» ofrece una lectura clara y natural; el matiz espacial alternativo se conserva en la nota. «Plaza» sería más interpretativo y podría desplazar la imagen vial.
- source_word: χρυσίον καθαρὸν
  english_pob_choice: pure gold
  chosen_spanish: oro puro
  alternatives_spanish:
  - oro refinado
  - oro limpio
  lexicon: BDAG
  rationale: χρυσίον es «oro» y καθαρός indica pureza. «Oro puro» es la equivalencia más directa y natural en español.
- source_word: ὡς ὕαλος διαυγής
  english_pob_choice: like transparent glass
  chosen_spanish: como vidrio transparente
  alternatives_spanish:
  - como cristal transparente
  - como vidrio claro
  - como vidrio translúcido
  lexicon: BDAG
  rationale: ὕαλος es «vidrio» y διαυγής comunica transparencia/claridad. «Vidrio transparente» preserva con precisión la imagen apocalíptica; «cristal» puede sugerir material distinto o una estilización menos controlada.
theological_decisions:
- issue: Naturaleza de πλατεῖα en la imagen de la ciudad
  english_pob_reading: Rendered as a singular 'street' of the city, preserving the visionary description without over-specifying urban layout.
  chosen_spanish_reading: Traducida como «calle de la ciudad», conservando la imagen visionaria sin imponer una reconstrucción urbana moderna.
  alternative_spanish_readings:
  - calle ancha de la ciudad
  - plaza de la ciudad
  - plaza principal de la ciudad
  rationale: La decisión es principalmente léxica e imagética. El pasaje describe el esplendor de la Nueva Jerusalén; conviene mantener la ambigüedad controlada del griego, sin convertirla en una plaza necesariamente ni en una calle moderna específica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al evitar añadir una paráfrasis como «hecha de» para ἐξ ἑνός, y conserva la relación uno-a-uno entre puertas y perlas. También se mantiene la opción léxica sobria para πλατεῖα, dejando constancia de las alternativas semánticas en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB solo cuando aparezca el nombre divino; aquí no aplica.
  - Se usó «perla» de manera consistente para μαργαρίτης, con singular/plural reflejando la estructura del griego.
  - Se eligió «calle» como equivalente principal de πλατεῖα, con nota para las alternativas espaciales.
  - La puntuación y el orden retórico siguen de cerca el griego para preservar el paralelismo de las dos cláusulas.
