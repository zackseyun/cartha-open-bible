- from: Y vi un cielo nuevo y una tierra nueva[a], porque el primer cielo y la primera tierra habían pasado[b], y el mar ya no existe.
  to: Y vi un cielo nuevo y una tierra nueva[a], porque el primer cielo y la primera tierra habían desaparecido, y el mar[b] ya no existe.
