  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Cielo… tierra», «mar» y «nuevo/nueva» están bien alineados con las decisiones léxicas del POB. La única mejora léxica recomendada es fortalecer ἀπῆλθαν con «habían desaparecido», que expresa mejor la desaparición del orden previo sin sobreinterpretar.
  issues:
