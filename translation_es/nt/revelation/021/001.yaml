translation:
  language: es
  text: Y vi un cielo nuevo y una tierra nueva[a], porque el primer cielo y la primera tierra habían desaparecido, y el mar[b] ya no existe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cielo anterior y la tierra anterior». El griego dice «el primer cielo y la primera tierra», lo que puede señalar el orden previo en contraste con el nuevo.
    reason: lexical_alternative
  - marker: b
    text: «El mar» puede entenderse literalmente, aunque en Apocalipsis también puede evocar caos, peligro o separación.
    reason: cultural_note
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - y vi
  - y contemplé
  lexicon: BDAG
  rationale: El aoristo narrativo de ὁράω se expresa con naturalidad en español con un pasado simple. «Vi» es directo y fiel, sin añadir matices innecesarios.
- source_word: οὐρανὸν ... γῆν
  english_pob_choice: heaven ... earth
  chosen_spanish: cielo ... tierra
  alternatives_spanish:
  - cielos ... tierra
  - firmamento ... tierra
  - cielo ... suelo
  lexicon: BDAG
  rationale: En este contexto apocalíptico, el par apunta al orden creado en su totalidad. «Cielo y tierra» es la pareja bíblica natural en español y conserva la amplitud cósmica del griego sin volverla técnica o arcaizante.
- source_word: καινὸν ... καινήν
  english_pob_choice: new ... new
  chosen_spanish: nuevo ... nueva
  alternatives_spanish:
  - renovado ... renovada
  - nuevo ... renovada
  lexicon: BDAG
  rationale: καινός comunica novedad cualitativa. «Nuevo» mantiene la tensión entre creación nueva y posible renovación, sin resolverla de antemano.
- source_word: ὁ γὰρ πρῶτος οὐρανὸς καὶ ἡ πρώτη γῆ
  english_pob_choice: for the first heaven and the first earth
  chosen_spanish: porque el primer cielo y la primera tierra
  alternatives_spanish:
  - porque el cielo primero y la tierra primera
  - porque el cielo anterior y la tierra anterior
  lexicon: BDAG
  rationale: «Primer» reproduce con transparencia πρῶτος y conserva el contraste con el orden nuevo. En nota se mantiene la posibilidad de entenderlo como «anterior/former».
- source_word: ἀπῆλθαν
  english_pob_choice: had passed away
  chosen_spanish: habían pasado
  alternatives_spanish:
  - habían desaparecido
  - se habían ido
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja bien la relación temporal con la visión. «Habían pasado» preserva el sentido de desaparición del orden previo sin sobreinterpretarlo.
- source_word: ἡ θάλασσα
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - la mar
  lexicon: BDAG
  rationale: θάλασσα se traduce de manera directa por «mar». Se conserva el término concreto y su posible carga simbólica queda para la nota, no para el cuerpo del texto.
- source_word: οὐκ ἔστιν ἔτι
  english_pob_choice: is no more
  chosen_spanish: ya no existe
  alternatives_spanish:
  - ya no es
  - ya no está
  lexicon: BDAG
  rationale: La expresión idiomática pide una solución natural en español. «Ya no existe» comunica la desaparición presente del mar con claridad literaria, manteniendo la sobriedad del original.
theological_decisions:
- issue: Naturaleza del nuevo cielo y la nueva tierra
  english_pob_reading: Rendered 'new' without specifying whether the new creation is a replacement of the old creation or its transformation.
  chosen_spanish_reading: Se traduce «nuevo/nueva» sin decidir si se trata de reemplazo completo o de renovación de la creación anterior.
  alternative_spanish_readings:
  - cielo renovado y tierra renovada
  - cielo nuevo y tierra nueva como sustitución total
  rationale: El adjetivo καινός deja abierta la cuestión metafísica. La traducción española debe preservar esa tensión, no cerrarla con una interpretación doctrinal implícita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Significado de «el mar ya no existe»
  english_pob_reading: Kept as 'the sea is no more' without making its symbolic significance explicit in the main text.
  chosen_spanish_reading: Se mantiene «el mar» de forma literal y la negación se expresa sin desarrollar su simbolismo en el texto principal.
  alternative_spanish_readings:
  - el mar ha desaparecido por completo
  - ya no hay mar como símbolo de caos
  rationale: En Apocalipsis el mar puede connotar caos, peligro o separación, pero el versículo no exige incorporar esa lectura en la traducción principal. La ambigüedad interpretativa se conserva para nota.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy; preserve theological tension.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el pasaje quedó en alto acuerdo con la auditoría inglesa; este borrador sigue esa línea sin introducir ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - «Cielo y tierra» se mantiene como par cosmológico natural en español, no como «firmamento» o «suelo», para no reducir el alcance del griego.
  - Se conserva «mar» literalmente y se deja el posible simbolismo para la nota, en paralelo con la decisión inglesa.
  - No se añade artículo o intensificador no presente en el griego más allá de la naturalidad del español.
  - La puntuación imita el ritmo de una sola oración narrativa con dos cláusulas explicativas y una cláusula final negativa.
