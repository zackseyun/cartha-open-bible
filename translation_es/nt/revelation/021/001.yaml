base_translation:
  language: en
  yaml_path: translation/nt/revelation/021/001.yaml
  text: And I saw a new heaven and a new earth[a], for the first heaven and the first earth had passed away[b], and the sea is no more.
  footnotes:
  - marker: a
    text: Or 'the former heaven and the former earth.' The Greek says 'the first heaven and the first earth,' which may denote the earlier order in contrast to the new one.
    reason: lexical_alternative
  - marker: b
    text: '''The sea'' may be read literally, though in Revelation it can also carry associations of chaos, danger, or separation.'
    reason: cultural_note
