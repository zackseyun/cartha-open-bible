translation:
  language: es
  text: Y no vi templo[a] en ella[b], porque el Señor Dios, el Todopoderoso, y el Cordero son su[b] templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario». El griego ναός puede referirse más específicamente al santuario interior del templo.
    reason: lexical_alternative
  - marker: b
    text: Los pronombres griegos son femeninos porque se refieren a la ciudad; en español puede conservarse esa referencia con «ella» y «su» sin resultar extraña.
    reason: cultural_note
lexical_decisions:
- source_word: ναὸν / ναός
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: 'ναός designa aquí el templo en sentido específico, no simplemente un edificio religioso. «Templo» preserva el contraste central del verso: la ciudad no necesita un templo separado porque Dios y el Cordero son su templo.'
- source_word: οὐκ εἶδον
  english_pob_choice: I saw no
  chosen_spanish: no vi
  alternatives_spanish:
  - no vi ningún
  - no contemplé
  lexicon: BDAG
  rationale: La negación con el aoristo de ὁράω se expresa de forma natural y breve con «no vi», manteniendo la fuerza de ausencia absoluta sin sobrecargar la frase.
- source_word: ἐν αὐτῇ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en la ciudad
  lexicon: BDAG
  rationale: El referente es la ciudad, gramaticalmente femenino en griego. En español, «ella» conserva esa referencia sin sonar artificial y evita perder el vínculo anafórico del original.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  lexicon: BDAG
  rationale: «Señor» es el equivalente directo y reverente de κύριος, y funciona bien dentro de la designación divina compuesta del verso.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: '«Dios» es la traducción estándar y exacta de θεός. Conserva la estructura appositiva: «el Señor Dios».'
- source_word: παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el que todo lo gobierna
  lexicon: BDAG
  rationale: «Todopoderoso» comunica bien el sentido de παντοκράτωρ en Apocalipsis, con la idea de poder soberano total. Es más natural en español bíblico actual que una perífrasis.
- source_word: τὸ ἀρνίον
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  lexicon: BDAG
  rationale: «El Cordero» es la forma estable y bíblicamente reconocible para ἀρνίον en Apocalipsis, y preserva la imagen sacrificial y cristológica.
theological_decisions:
- issue: Cómo reflejar que «el Señor Dios, el Todopoderoso, y el Cordero» comparten la función de templo
  english_pob_reading: Both the Lord God, the Almighty, and the Lamb together are the temple of the city.
  chosen_spanish_reading: Tanto el Señor Dios, el Todopoderoso, como el Cordero son su templo.
  alternative_spanish_readings:
  - el Señor Dios, el Todopoderoso, es su templo, y el Cordero también
  - el Señor Dios, el Todopoderoso, y el Cordero son el templo de ella
  rationale: El griego presenta una estructura que incluye a ambos en la predicación sobre el templo. El plural «son» conserva la coordinación y evita restringir el predicado solo a Dios o añadir una explicación no presente en el texto. También mantiene la alta cristología del pasaje sin diluir la tensión del original.
  doctrine_reference: Apocalipsis 21:22; confesión cristológica nicena/chalcedonense en cuanto a la plena dignidad del Cordero, sin imponer formulación posterior al texto
- issue: Tratamiento de la referencia femenina de la ciudad
  english_pob_reading: The Greek pronouns are feminine because they refer to the city; contemporary English uses 'it/its' rather than 'her'.
  chosen_spanish_reading: Conservar el femenino anafórico en «ella» y «su»
  alternative_spanish_readings:
  - neutralizar con «la ciudad»
  - usar «ello»
  rationale: A diferencia del inglés, el español permite mantener la concordancia femenina sin extrañeza. «En ella» conserva la referencia al antecedente y refleja mejor la gramática griega.
  doctrine_reference: No doctrinal; decisión gramatical y estilística
translation_notes:
  revision_awareness: Seguí el audit trail inglés al conservar la lectura coordinada donde «el Señor Dios, el Todopoderoso, y el Cordero» forman el sujeto de la predicación sobre el templo. Frente al inglés, opté por mantener el femenino de la ciudad en español («ella») porque aquí es natural y transparenta mejor el griego. También preservé «templo» frente a «santuario» por ser la equivalencia más directa de ναός en este contexto.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, «Dios» para θεός, «Todopoderoso» para παντοκράτωρ y «Cordero» para τὸ ἀρνίον, en línea con los criterios del proyecto.
  - Se evitó «SEÑOR» como máscara tipográfica y se mantuvo el nombre/título en forma legible para español.
  - La coordinación verbal «son» refleja la revisión inglesa que incluyó al Cordero en el predicado templario.
  - La nota sobre «ella» no es necesaria para comprensión, pero sí para auditoría del referente femenino griego.
