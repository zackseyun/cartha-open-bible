translation:
  language: es
  text: teniendo la gloria de Dios; su resplandor[a] era como una piedra preciosísima, como una piedra de jaspe[b], clara como cristal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su luz» o «su brillo» para «su resplandor» (griego φωστήρ).
    reason: lexical_alternative
  - marker: b
    text: O «centelleante como cristal» para «clara como cristal».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχουσαν
  english_pob_choice: having
  chosen_spanish: que tenía
  alternatives_spanish:
  - que poseía
  - teniendo
  lexicon: BDAG
  rationale: El participio femenino singular se refiere a la ciudad del contexto inmediato. En español, «que tenía» conserva la relación participial sin volverla innecesariamente pesada, y evita sugerir mera compañía en lugar de posesión o carácter descriptivo.
- source_word: τὴν δόξαν τοῦ θεοῦ
  english_pob_choice: the glory of God
  chosen_spanish: la gloria de Dios
  alternatives_spanish:
  - el esplendor de Dios
  - la radiancia de Dios
  lexicon: BDAG
  rationale: «Gloria» mantiene el peso teológico de δόξα y es la equivalencia más fiel y estable en español bíblico. «Esplendor» o «radiancia» reducen el término a lo visual y debilitan el trasfondo de manifestación divina.
- source_word: ὁ φωστὴρ αὐτῆς
  english_pob_choice: its radiance
  chosen_spanish: su resplandor
  alternatives_spanish:
  - su luz
  - su brillo
  - su luminar
  lexicon: BDAG
  rationale: φωστήρ puede referirse a un astro o a una cualidad luminosa. Aquí, por el contexto descriptivo de la ciudad, «resplandor» comunica bien el efecto visible en español moderno sin caer en un término más técnico o más extraño como «luminar».
- source_word: ὅμοιος
  english_pob_choice: was like
  chosen_spanish: era semejante a
  alternatives_spanish:
  - era como
  - se parecía a
  lexicon: BDAG
  rationale: El griego expresa comparación en una cláusula sin verbo explícito; en español conviene suplirlo. «Era semejante a» mantiene el valor comparativo con un registro sobrio y bíblico, sin perder naturalidad.
- source_word: λίθῳ τιμιωτάτῳ
  english_pob_choice: a most precious stone
  chosen_spanish: una piedra preciosísima
  alternatives_spanish:
  - una piedra muy preciosa
  - una piedra de gran valor
  lexicon: BDAG
  rationale: Se conserva τόσο la imagen de «piedra» como el superlativo de τιμιωτάτῳ. «Preciosísima» refleja la intensificación mejor que una simple «muy preciosa» y suena natural en español culto.
- source_word: ὡς λίθῳ ἰάσπιδι
  english_pob_choice: like a jasper stone
  chosen_spanish: como una piedra de jaspe
  alternatives_spanish:
  - como jaspe
  - como una piedra jaspe
  lexicon: BDAG
  rationale: Se mantiene repetida la idea de «piedra» para no borrar la forma del símil griego. «Piedra de jaspe» es claro en español y preserva el paralelismo con la frase anterior.
- source_word: κρυσταλλίζοντι
  english_pob_choice: clear as crystal
  chosen_spanish: clara como cristal
  alternatives_spanish:
  - transparente como cristal
  - brillante como cristal
  - cristalina
  lexicon: BDAG
  rationale: El participio describe una cualidad cristalina o transparente del jaspe. «Clara como cristal» es idiomático y conserva la imagen sin volverla demasiado interpretativa.
theological_decisions:
- issue: δόξα τοῦ θεοῦ en una visión apocalíptica
  english_pob_reading: the glory of God
  chosen_spanish_reading: la gloria de Dios
  alternative_spanish_readings:
  - el esplendor de Dios
  - la majestad de Dios
  rationale: No se trata solo de un efecto visual, sino de la presencia manifiesta de Dios en su ciudad. «Gloria» conserva el peso bíblico-teológico del término y evita reducirlo a mero brillo.
  doctrine_reference: Teología bíblica de la gloria divina; presencia y manifestación de Dios en contexto apocalíptico.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no requieren cambios sustanciales; la decisión principal consiste en conservar la fuerza teológica de δόξα y el valor comparativo de φωστήρ/κρυσταλλίζοντι en un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y «gloria» para δόξα, conforme a la terminología POB.
  - Se mantiene «piedra» en ambos miembros del símil para respetar la repetición del griego.
  - «Clara como cristal» conserva el sentido descriptivo sin sobrerinterpretar la idea de transparencia o brillo.
