    issue: «crisoprasa» para χρυσόπρασος
    rationale: El nombre de gema más natural y reconocido en español es «crisopraso». «Crisoprasa» no es la forma preferida en este contexto y puede sentirse anómala.
  - severity: medium
    issue: Marcador [a] colocado en «quinto» en vez de «sardio»
    rationale: La nota explica una alternativa léxica para σάρδιον («cornalina»), no para el ordinal πέμπτος. Debe anclarse a la gema correcta.
  - severity: medium
    issue: Marcador [b] colocado en «décimo» en vez de «jacinto»
    rationale: La nota trata de ὑάκινθος y aclara que se refiere a una gema, no a la flor. Debe marcar «jacinto», no «décimo».
  - severity: low
