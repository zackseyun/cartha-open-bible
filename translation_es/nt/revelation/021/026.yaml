  - severity: medium
    issue: «a ella» como texto principal es menos preciso para εἰς en un contexto de entrada a la ciudad.
    rationale: εἰς normalmente expresa movimiento hacia el interior. En español, «a ella» puede entenderse como dirección general, pero no marca tan claramente la entrada. Una redacción como «a la ciudad» mantiene naturalidad, y la nota puede preservar «en ella» o la personificación femenina.
