translation:
  language: es
  text: y traerán la gloria y el honor de las naciones a la ciudad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a ella», preservando la personificación femenina de la ciudad en el griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴσουσιν
  english_pob_choice: they will bring
  chosen_spanish: traerán
  alternatives_spanish:
  - llevarán
  - portarán
  lexicon: BDAG
  rationale: El futuro de φέρω expresa movimiento de algo hacia el interior; «traerán» comunica con naturalidad en español la idea de introducir algo en la ciudad, sin perder la fuerza concreta del verbo.
- source_word: τὴν δόξαν
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  lexicon: BDAG
  rationale: «Gloria» conserva el valor bíblico y teológico de δόξα y evita reducirlo a una mera belleza visual. «Esplendor» es posible, pero estrecha el sentido hacia lo estético.
- source_word: τὴν τιμὴν
  english_pob_choice: the honor
  chosen_spanish: el honor
  alternatives_spanish:
  - el valor
  - la honra
  lexicon: BDAG
  rationale: En este paralelismo con δόξα, «honor» reproduce bien τιμή como estima, dignidad o tributo. «Valor» resulta demasiado abstracto y «honra» es viable, pero menos estable en el registro bíblico contemporáneo.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  lexicon: BDAG
  rationale: «Naciones» refleja el sentido amplio de ἔθνη en Apocalipsis y evita introducir de modo innecesario la oposición técnica «judíos/gentiles», que no es la focalización principal aquí.
- source_word: εἰς αὐτήν
  english_pob_choice: into it
  chosen_spanish: a ella[a]
  alternatives_spanish:
  - en ella
  - a ella
  lexicon: BDAG
  rationale: El antecedente es la ciudad, gramaticalmente femenina en griego; por eso en español puede conservarse la personificación con «a ella». La referencia espacial de entrada queda natural en español con la preposición «a».
theological_decisions:
- issue: Referente y personificación de αὐτήν
  english_pob_reading: 'The pronoun refers to the New Jerusalem/city and is rendered with English neuter idiom: ''into it,'' with a footnote preserving ''into her.'''
  chosen_spanish_reading: 'El pronombre se refiere a la Nueva Jerusalén/la ciudad y se expresa con la personificación femenina natural del español: «a ella».'
  alternative_spanish_readings:
  - a ella
  - en ella
  rationale: El griego usa pronombre femenino porque la ciudad es gramaticalmente femenina y además está personificada en el contexto. En español, «a ella» preserva mejor esa personificación que un neutro inexistente, sin perder la idea de movimiento hacia dentro.
  doctrine_reference: Principios POB sobre legibilidad moderna y preservación de tensiones significativas del original.
- issue: Sentido amplio de «la gloria y el honor de las naciones»
  english_pob_reading: The phrase is left broad and untranslated beyond the lexical sense, without specifying whether it means tribute, cultural splendor, wealth, or redeemed distinctiveness.
  chosen_spanish_reading: La frase se deja amplia, sin concretarla como riqueza, tributo o esplendor cultural.
  alternative_spanish_readings:
  - la riqueza de las naciones
  - el tributo de las naciones
  - el esplendor cultural de las naciones
  rationale: El griego admite más de una matización posible y el contexto no obliga a escoger una sola. Mantener la amplitud evita añadir una interpretación teológica no requerida por el texto.
  doctrine_reference: 'POB: no imponer una lectura confesional cuando el texto permite varias posibilidades legítimas.'
translation_notes:
  revision_awareness: El último pase de revisión indicó alta concordancia y no requirió cambios; este borrador mantiene esa lectura sin introducir ajustes sustanciales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «naciones» para ἔθνη, coherente con el uso amplio de Apocalipsis.
  - Se evita «Cristo» porque no aparece en el versículo.
  - La puntuación y el orden siguen el paralelismo del griego y la redacción inglesa auditada, con español natural.
  - La nota [a] se ancla en el pronombre final para preservar la alternativa femenina documentada.
