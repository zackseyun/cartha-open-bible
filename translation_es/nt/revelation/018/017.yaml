translation:
  language: es
  text: porque en una hora fue arruinada[a] tan gran riqueza. Y todo capitán de nave, y todo el que navega a cualquier lugar, y los marineros, y cuantos trabajan en el mar, se quedaron de pie a lo lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue devastada» o «quedó desolada». El verbo griego expresa ruina y desolación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la explicación causal o de contenido del lamento; en español, «porque» expresa con naturalidad esa relación sin perder el enlace con el contexto inmediato.
- source_word: μιᾷ ὥρᾳ
  english_pob_choice: in one hour
  chosen_spanish: en una hora
  alternatives_spanish:
  - en una sola hora
  - dentro de una hora
  lexicon: BDAG
  rationale: La construcción temporal se conserva de manera directa. «En una hora» comunica la rapidez súbita del juicio sin añadir precisión interpretativa.
- source_word: ἠρημώθη
  english_pob_choice: has been laid waste
  chosen_spanish: fue arruinada
  alternatives_spanish:
  - fue devastada
  - quedó desolada
  lexicon: BDAG
  rationale: El verbo expresa ruina/desolación. En español, «fue arruinada» mantiene el sentido de destrucción total y fluye mejor que un calco más rígido.
- source_word: ὁ τοσοῦτος πλοῦτος
  english_pob_choice: such great wealth
  chosen_spanish: tan gran riqueza
  alternatives_spanish:
  - tan enorme riqueza
  - tal riqueza
  lexicon: BDAG
  rationale: «τοσοῦτος» intensifica el sustantivo. «Tan gran riqueza» conserva la fuerza enfática y el tono de lamentación sin sonar artificial.
- source_word: πᾶς κυβερνήτης
  english_pob_choice: every shipmaster
  chosen_spanish: todo capitán de nave
  alternatives_spanish:
  - todo piloto
  - todo capitán
  lexicon: BDAG
  rationale: El término griego designa al que gobierna o dirige la nave. «Capitán de nave» mantiene la referencia marítima y el matiz de mando; evita reducirlo a un simple «piloto».
- source_word: πᾶς ὁ ἐπὶ τόπον πλέων
  english_pob_choice: everyone sailing anywhere
  chosen_spanish: todo el que navega a algún lugar
  alternatives_spanish:
  - todo el que navega a cualquier lugar
  - todo el que navega hacia un puerto
  lexicon: BDAG
  rationale: La expresión es idiomática y amplia. «A algún lugar» conserva la apertura del griego y evita restringir el sentido a una sola clase de viajero marítimo.
- source_word: ναῦται
  english_pob_choice: sailors
  chosen_spanish: los marineros
  alternatives_spanish:
  - los navegantes
  - los hombres de mar
  lexicon: BDAG
  rationale: «Marineros» es el equivalente natural y claro en español moderno para la tripulación marítima.
- source_word: ὅσοι τὴν θάλασσαν ἐργάζονται
  english_pob_choice: as many as work the sea
  chosen_spanish: cuantos trabajan en el mar
  alternatives_spanish:
  - todos los que trabajan del mar
  - todos los que hacen su labor en el mar
  lexicon: BDAG
  rationale: La frase abarca a quienes dependen del mar para su labor o sustento. «Trabajan en el mar» preserva la imagen y la amplitud sin forzar una paráfrasis económica explícita.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: far off
  chosen_spanish: lejos
  alternatives_spanish:
  - desde lejos
  - a distancia
  lexicon: BDAG
  rationale: La idea principal es la separación visible y el temor del grupo que observa. «Lejos» es idiomático en español; en el texto se integra con «se quedaron» para claridad.
- source_word: ἔστησαν
  english_pob_choice: stood
  chosen_spanish: se quedaron
  alternatives_spanish:
  - estuvieron de pie
  - se detuvieron
  lexicon: BDAG
  rationale: Aunque el verbo base es «estar de pie», en español «se quedaron lejos» comunica con naturalidad la postura resultante y el sentido narrativo de permanecer a distancia.
theological_decisions:
- issue: Grupo marítimo expresado por πᾶς ὁ ἐπὶ τόπον πλέων
  english_pob_reading: everyone sailing anywhere
  chosen_spanish_reading: todo el que navega a algún lugar
  alternative_spanish_readings:
  - todo el que navega a cualquier lugar
  - todo el que navega hacia un puerto
  rationale: Se mantiene la amplitud de la expresión griega sin convertirla en una categoría más estrecha como «puerto» o «pasajeros». Esto preserva el efecto retórico de cobertura total de la actividad marítima afectada.
  doctrine_reference: Translation philosophy items 1, 3, and 5
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó la frase correspondiente a πᾶς ὁ ἐπὶ τόπον πλέων de «everyone sailing to a place» a «everyone sailing anywhere» para reflejar mejor el carácter idiomático y general de la expresión griega. La redacción española sigue esa misma decisión de amplitud, sin restringirla a una sola ruta o destino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó «SEÑOR» y «Cristo» porque no aparecen en el texto fuente.
  - «Mar» se conserva literalmente para τὴν θάλασσαν; no se añadió una especificación económica explícita.
  - 'La puntuación refleja dos miembros coordinados: la ruina de la riqueza y la retirada temerosa de los grupos marítimos.'
