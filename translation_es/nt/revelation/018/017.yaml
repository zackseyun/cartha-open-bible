revisions:
- from: porque en una hora fue arruinada[a] tan gran riqueza. Y todo capitán de nave, y todo el que navega a algún lugar, y los marineros, y cuantos trabajan en el mar, se quedaron lejos.
  to: porque en una hora fue arruinada[a] tan gran riqueza. Y todo capitán de nave, y todo el que navega a cualquier lugar, y los marineros, y cuantos trabajan en el mar, se quedaron de pie a lo lejos.
  rationale: Se ajusta 'a algún lugar' a 'a cualquier lugar' para reflejar mejor la amplitud de la expresión griega y la revisión del POB inglés. También se cambia 'se quedaron lejos' por 'se quedaron de pie a lo lejos' para conservar tanto la distancia de ἀπὸ μακρόθεν como la acción verbal de ἔστησαν sin perder naturalidad en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:21:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego y mantiene la lista diferenciada de grupos marítimos. Sin embargo, dos puntos no preservan con suficiente precisión el sentido auditado: (1) πᾶς ὁ ἐπὶ τόπον πλέων fue revisado en el POB inglés hacia un sentido más amplio (''everyone sailing anywhere''), pero el español ''a algún lugar'' suena más indefinido que abarcador; ''a cualquier lugar'' refleja mejor la amplitud. (2) ἀπὸ μακρόθεν ἔστησαν significa literalmente ''se pararon/estuvieron de pie a lo lejos''; ''se quedaron lejos'' suaviza demasiado la imagen espacial y pierde el matiz verbal de ἔστησαν.'
  spanish_quality_summary: El español es claro y legible, con registro digno. 'Tan gran riqueza' es comprensible, aunque algo tieso; no requiere cambio forzoso. La frase final mejora mucho si se dice 'se quedaron a lo lejos' o 'estaban de pie a lo lejos'; la segunda es más fiel al griego, pero la primera también conserva mejor la distancia que 'lejos'. Para máxima fidelidad y buena lectura, conviene usar 'se quedaron de pie a lo lejos'.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto en este versículo. Las decisiones léxicas marítimas son en general adecuadas. La nota al pie sobre ἠρημώθη está bien anclada y útil. La principal corrección glosarial/contextual es alinear ἐπὶ τόπον πλέων con la revisión inglesa: ''a cualquier lugar'' en vez de ''a algún lugar''.'
  issues:
  - severity: medium
    issue: '''a algún lugar'' debilita la amplitud de πᾶς ὁ ἐπὶ τόπον πλέων'
    rationale: El expediente inglés revisado optó por 'everyone sailing anywhere' para reflejar mejor la expresión idiomática amplia. En español, 'a algún lugar' puede sonar como un destino indeterminado cualquiera, no como una categoría abarcadora de navegación general.
  - severity: medium
    issue: '''se quedaron lejos'' no representa bien ἀπὸ μακρόθεν ἔστησαν'
    rationale: El griego combina distancia ('desde/a lo lejos') con la acción de ponerse o estar de pie. 'Se quedaron lejos' es natural, pero reduce la viveza visual y omite el matiz de 'stood far off' preservado en el POB inglés.
  revised_spanish_text: porque en una hora fue arruinada[a] tan gran riqueza. Y todo capitán de nave, y todo el que navega a cualquier lugar, y los marineros, y cuantos trabajan en el mar, se quedaron de pie a lo lejos.
  revised_footnotes:
  - marker: a
    text: O «fue devastada» o «quedó desolada». El verbo griego expresa ruina y desolación.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'a algún lugar' a 'a cualquier lugar' para reflejar mejor la amplitud de la expresión griega y la revisión del POB inglés. También se cambia 'se quedaron lejos' por 'se quedaron de pie a lo lejos' para conservar tanto la distancia de ἀπὸ μακρόθεν como la acción verbal de ἔστησαν sin perder naturalidad en español.
