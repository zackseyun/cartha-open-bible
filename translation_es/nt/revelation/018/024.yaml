translation:
  language: es
  text: Y en ella[c] fue hallada la sangre de profetas y santos[a], y de todos los que han sido masacrados[b] sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santos» o «el pueblo santo de Dios» para «santos».
    reason: lexical_alternative
  - marker: b
    text: O «todos los que fueron muertos sobre la tierra». El verbo griego es más fuerte que un término genérico para matar y puede significar «masacrados».
    reason: lexical_alternative
  - marker: c
    text: «Ella» se refiere a Babilonia, presentada como mujer en la visión circundante.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν αὐτῇ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - en eso
  - en ella misma
  lexicon: BDAG
  rationale: En español, "ella" conserva el referente femenino personificado de Babilonia sin introducir una expresión antinatural. "En eso" perdería la imaginería femenina; "en ella misma" añade énfasis no presente en el griego.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  - muerte
  lexicon: BDAG
  rationale: '"Sangre" es la equivalencia literal y mantiene la fuerza forense de culpa por derramamiento de sangre. No conviene explicitar "derramada" porque el sustantivo ya carga el sentido en contexto.'
- source_word: προφητῶν
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - vaticinadores
  - videntes
  lexicon: BDAG
  rationale: '"Profetas" es el equivalente directo y natural en español bíblico. Otras opciones no reflejan bien el término técnico del texto.'
- source_word: ἁγίων
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - santas personas
  - los consagrados
  - los santos de Dios
  lexicon: BDAG
  rationale: '"Santos" mantiene la lectura tradicional y la concisión. En Apocalipsis, ἅγιοι designa a los pertenecientes a Dios; el plural español lo comunica sin necesidad de amplificación.'
- source_word: εὑρέθη
  english_pob_choice: was found
  chosen_spanish: fue hallada
  alternatives_spanish:
  - se halló
  - fue descubierta
  lexicon: BDAG
  rationale: El pasivo aoristo se vierte naturalmente como "fue hallada", conservando el matiz de descubrimiento/constatación judicial. "Se halló" es posible, pero menos marcado en estilo formal.
- source_word: πάντων τῶν ἐσφαγμένων
  english_pob_choice: all who have been slaughtered
  chosen_spanish: todos los que han sido degollados
  alternatives_spanish:
  - todos los que han sido sacrificados
  - todos los que fueron muertos
  lexicon: BDAG
  rationale: '"Degollados" intenta conservar la fuerza de σφάζω, que es más cruda que un simple "matar". En español bíblico puede sonar más duro que "sacrificados" y evita suavizar el verbo. Se prefiere el perfecto compuesto para reflejar acción concluida con efecto vigente.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra de
  lexicon: BDAG
  rationale: '"Sobre la tierra" reproduce la amplitud apocalíptica del giro griego y suena idiomático en español. "En la tierra" también es posible, pero "sobre" conserva mejor el matiz distributivo del juicio extendido.'
theological_decisions:
- issue: Alcance de la culpa atribuida a Babilonia
  english_pob_reading: The verse attributes to Babylon responsibility for the blood of prophets, saints, and indeed all who have been slaughtered on the earth, expressed in sweeping apocalyptic/judicial language.
  chosen_spanish_reading: El versículo atribuye a Babilonia la sangre de profetas y santos, y también la de todos los que han sido degollados sobre la tierra, en lenguaje judicial y apocalíptico de amplio alcance.
  alternative_spanish_readings:
  - El versículo se refiere sólo a los mártires representativos dentro del marco simbólico.
  - El versículo usa hipérbole para resumir toda la sangre inocente derramada.
  rationale: La traducción no debe estrechar el alcance que el griego expresa. Conviene conservar la amplitud de la acusación sin resolver si su extensión es simbólica, representativa o universal dentro de la visión.
  doctrine_reference: Conservar la tensión teológica sin reducir el alcance del texto.
translation_notes:
  revision_awareness: 'Coincide con el último repaso disponible: no se registraron cambios en la revisión más reciente y el cotejo crítico indica alto acuerdo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se usó «santos» en vez de una ampliación interpretativa para conservar la correspondencia con ἁγίων y la terminología POB.
  - Se optó por «degollados» para no debilitar la fuerza de σφάζω; en nota se preserva la alternativa más literal/tradicional de «muertos».
  - Se mantuvo el referente femenino con «ella» para reflejar la personificación de Babilonia en el contexto inmediato.
