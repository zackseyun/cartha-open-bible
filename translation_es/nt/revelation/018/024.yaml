revisions:
- from: Y en ella fue hallada la sangre de profetas y santos[a][c][b], y de todos los que han sido degollados sobre la tierra.
  to: Y en ella[c] fue hallada la sangre de profetas y santos[a], y de todos los que han sido masacrados[b] sobre la tierra.
  rationale: Se revisa principalmente «degollados» a «masacrados» para preservar la fuerza de σφάζω sin imponer un método específico de muerte no exigido por el griego. También se reubica la nota de «ella» junto al pronombre, donde ancla mejor el referente de Babilonia, y se simplifica la nota de «santos» para español más natural.
