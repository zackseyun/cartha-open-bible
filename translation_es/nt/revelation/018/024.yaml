    reason: lexical_alternative
  - marker: c
    text: «Ella» se refiere a Babilonia, presentada como mujer en la visión circundante.
    reason: cross_reference
  revision_rationale: Se revisa principalmente «degollados» a «masacrados» para preservar la fuerza de σφάζω sin imponer un método específico de muerte no exigido por el griego. También se reubica la nota de «ella» junto al pronombre, donde ancla mejor el referente de Babilonia, y se simplifica la nota de «santos» para español más natural.
