review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: conserva el referente femenino de ἐν αὐτῇ, el sentido literal de αἷμα, la estructura coordinada, y el alcance amplio de πάντων τῶν ἐσφαγμένων ἐπὶ τῆς γῆς. Sin embargo, «degollados» estrecha innecesariamente σφάζω a un modo específico de matanza, mientras que el inglés auditado prefirió «slaughtered» como término fuerte pero no tan específico.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y fidelidad léxica. «Fue hallada» funciona bien. «Santos» es idiomático y adecuado. El principal ajuste necesario es cambiar «degollados» por «masacrados», que mantiene la fuerza violenta sin limitarse a cortar el cuello. También conviene ajustar la nota alternativa para reflejar mejor «slain/slaughtered».
  glossary_alignment: 'Sin conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Santos» concuerda con la decisión POB para ἅγιοι. La nota sobre Babilonia como mujer está bien. La única desalineación relevante es léxica: σφάζω no debe fijarse como «degollar» en el texto principal.'
  issues:
  - severity: medium
    issue: «degollados» para ἐσφαγμένων
    rationale: σφάζω es más fuerte que «matar», pero «degollar» especifica un mecanismo particular que el griego no exige. «Masacrados» o «asesinados violentamente» preserva mejor la fuerza sin sobreespecificar.
  - severity: low
    issue: Nota b con «muertos» como alternativa principal
    rationale: La nota puede reflejar mejor la alternativa inglesa «fueron muertos»/«fueron asesinados» y explicar que «masacrados» intenta conservar la fuerza de σφάζω. No es grave, pero conviene afinarla.
  - severity: low
    issue: Orden de marcadores en «santos[a][c][b]»
    rationale: No es incorrecto, pero resulta más natural agrupar primero la nota léxica inmediata de «santos», y luego las notas contextuales restantes. Aun así, mantener los tres marcadores es aceptable si coinciden con las notas.
  revised_spanish_text: Y en ella[c] fue hallada la sangre de profetas y santos[a], y de todos los que han sido masacrados[b] sobre la tierra.
  revised_footnotes:
