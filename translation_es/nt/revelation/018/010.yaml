source:
  edition: SBLGNT
  text: ἀπὸ μακρόθεν ἑστηκότες διὰ τὸν φόβον τοῦ βασανισμοῦ αὐτῆς λέγοντες· Οὐαὶ οὐαί, ἡ πόλις ἡ μεγάλη, Βαβυλὼν ἡ πόλις ἡ ἰσχυρά, ὅτι μιᾷ ὥρᾳ ἦλθεν ἡ κρίσις σου.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/010.yaml
  text: standing far off because of the fear of her torment[a], saying, ‘Woe, woe, the great city, Babylon[b], the strong city! For in one hour your judgment has come.’
  footnotes:
