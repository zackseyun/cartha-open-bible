translation:
  language: es
  text: 'de pie a lo lejos, por el temor de su tormento[a], diciendo: «¡Ay, ay! La gran ciudad, Babilonia, la ciudad fuerte[b], porque en una hora ha venido tu juicio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por miedo a su tormento». La expresión griega puede entenderse con un giro más idiomático de temor anticipado.
    reason: lexical_alternative
  - marker: b
    text: O «la ciudad poderosa». El adjetivo griego puede denotar fuerza, poder o grandeza de poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: standing far off
  chosen_spanish: estando lejos
  alternatives_spanish:
  - a lo lejos
  - desde lejos
  - estando a distancia
  lexicon: BDAG
  rationale: La frase expresa distancia espacial. «Estando lejos» conserva la imagen sin sonar forzado en español y funciona bien con el participio siguiente de habla.
- source_word: ἑστηκότες
  english_pob_choice: standing
  chosen_spanish: estando
  alternatives_spanish:
  - de pie
  - permaneciendo
  - habiéndose detenido
  lexicon: BDAG
  rationale: El participio describe su postura/estado al hablar. En español, unido a la frase anterior, «estando» mantiene la construcción participial sin añadir tiempo narrativo extra.
- source_word: διὰ τὸν φόβον
  english_pob_choice: because of the fear
  chosen_spanish: por el temor
  alternatives_spanish:
  - a causa del temor
  - debido al temor
  - por miedo
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Por el temor» preserva el sustantivo φόβος y su relación causal de manera natural en español.
- source_word: τοῦ βασανισμοῦ αὐτῆς
  english_pob_choice: of her torment
  chosen_spanish: de su tormento
  alternatives_spanish:
  - de su tortura
  - de su agonía
  - de su tormento y sufrimiento
  lexicon: BDAG
  rationale: βασανισμός en Apocalipsis designa tormento severo. «Tormento» es el equivalente más directo y respeta la intensidad sin especificar el medio.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decían
  lexicon: BDAG
  rationale: Participio introductor de discurso directo; «diciendo» es la forma más natural y fiel en español.
- source_word: Οὐαὶ οὐαί
  english_pob_choice: Woe, woe
  chosen_spanish: ¡Ay, ay!
  alternatives_spanish:
  - ¡Ay de ella, ay!
  - ¡Ay, ay de ella!
  - ¡Ay, ay! [como exclamación profética]
  lexicon: BDAG
  rationale: οὐαί puede expresar lamento y anuncio de desastre. En español, la exclamación «¡Ay, ay!» comunica lamento profético de manera más idiomática; se conserva la fuerza apocalíptica en nota.
- source_word: ἡ πόλις ἡ μεγάλη
  english_pob_choice: the great city
  chosen_spanish: La gran ciudad
  alternatives_spanish:
  - La ciudad grande
  - La ciudad, la grande
  lexicon: BDAG
  rationale: La secuencia artículo + adjetivo se vuelve naturalmente atributiva en español. «Gran» es más idiomático que «grande» antepuesto y mantiene el énfasis.
- source_word: Βαβυλὼν
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babylonia
  lexicon: BDAG
  rationale: Nombre propio transliterado al uso español estándar. «Babilonia» es la forma reconocible y fiel al referente bíblico.
- source_word: ἡ πόλις ἡ ἰσχυρά
  english_pob_choice: the strong city
  chosen_spanish: la ciudad fuerte
  alternatives_spanish:
  - la ciudad poderosa
  - la ciudad vigorosa
  - la ciudad robusta
  lexicon: BDAG
  rationale: ἰσχυρός denota fuerza o poder. «Fuerte» refleja el valor léxico con claridad y sin sobreinterpretar como «poderosa».
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - for
  lexicon: BDAG
  rationale: Introduce la razón del clamor. «Porque» expresa causalidad de forma clara y mantiene la relación lógica del verso.
- source_word: μιᾷ ὥρᾳ
  english_pob_choice: in one hour
  chosen_spanish: en una hora
  alternatives_spanish:
  - en una sola hora
  - dentro de una hora
  lexicon: BDAG
  rationale: Dativo de tiempo. «En una hora» es la equivalencia más directa y resalta la repentina rapidez del juicio.
- source_word: ἦλθεν
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - vino
  - ha llegado ya
  lexicon: BDAG
  rationale: El aoristo comunica llegada consumada. «Ha venido» preserva esa culminación en un español bíblico claro; evita reducir la frase a un simple pasado narrativo.
- source_word: ἡ κρίσις σου
  english_pob_choice: your judgment
  chosen_spanish: tu juicio
  alternatives_spanish:
  - tu sentencia
  - tu condena
  - tu juicio/tu sentencia
  lexicon: BDAG
  rationale: κρίσις aquí es juicio judicial sobre Babilonia. «Juicio» mantiene el alcance bíblico y jurídico sin limitarlo a condena.
theological_decisions:
- issue: Exclamación οὐαί
  english_pob_reading: Woe, woe
  chosen_spanish_reading: ¡Ay, ay!
  alternative_spanish_readings:
  - ¡Ay de ella, ay!
  - ¡Ay, ay de ti!
  rationale: El griego expresa una lamentación profética de desastre. En español, «¡Ay, ay!» comunica el lamento y la carga apocalíptica sin introducir palabras no presentes en el texto.
  doctrine_reference: Apocalipsis 18:10; registro profético-apocalíptico
- issue: Valor aspectual de ἦλθεν
  english_pob_reading: has come
  chosen_spanish_reading: ha venido
  alternative_spanish_readings:
  - ha llegado
  - vino
  rationale: Se conserva la idea de acontecimiento consumado con relevancia presente. «Ha venido» suena natural en español y mantiene el tono de anuncio definitivo.
  doctrine_reference: Apocalipsis 18:10; equivalencia verbal en discurso directo
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] dentro del texto español. La redacción mantiene el valor apocalíptico de οὐαί y la fuerza semántica de ἰσχυρός sin suavizarlos excesivamente.
  spanish_consistency_notes:
  - Se usó «Babilonia» como nombre propio estándar en español.
  - Se preservó el sustantivo «juicio» para κρίσις, coherente con el registro judicial del verso.
  - La exclamación «¡Ay, ay!» evita una traducción demasiado interpretativa y conserva el lamento profético.
