  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto para ὁ θεός. La distinción entre «pecados» y «injusticias» preserva la diferenciación documentada entre ἁμαρτίαι y ἀδικήματα, aunque «injusticias» se inclina algo más a actos de injusticia que el inglés más amplio «wrongdoings»; aun así, entra dentro de lo permitido por la justificación léxica dada.
