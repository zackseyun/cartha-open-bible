translation:
  language: es
  text: porque sus pecados se han amontonado hasta el cielo[a], y Dios ha recordado[b] sus injusticias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «se han unido hasta el cielo». El verbo griego significa literalmente «unir/pegar»; aquí expresa pecados amontonados en una gran masa.'
    reason: lexical_alternative
  - marker: b
    text: '«Ha recordado» conserva la expresión del griego; en este contexto tiene fuerza judicial: Dios no ha pasado por alto sus injusticias.'
    reason: theological_note
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la causa o razón del anuncio anterior con una conexión natural en español. 'Porque' conserva el valor causal sin volver la frase artificial.
- source_word: ἐκολλήθησαν
  english_pob_choice: have piled up
  chosen_spanish: se han amontonado
  alternatives_spanish:
  - se han pegado
  - se han unido
  - se han acumulado
  lexicon: BDAG
  rationale: El verbo griego significa literalmente 'pegar/juntar'. En este contexto con 'hasta el cielo' expresa una acumulación masiva; 'se han amontonado' comunica la imagen sin perder el carácter metafórico. 'Se han acumulado' también sería posible, pero es menos visual.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - pecados
  - faltas
  lexicon: BDAG
  rationale: Término estándar para ἁμαρτία. 'Pecados' es claro, natural y fiel al registro bíblico.
- source_word: ἄχρι τοῦ οὐρανοῦ
  english_pob_choice: up to heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - hasta el cielo
  - hasta los cielos
  - hasta el firmamento
  lexicon: BDAG
  rationale: '''Hasta el cielo'' reproduce bien la imagen vertical del griego. ''Cielo'' es preferible a ''cielos'' aquí por naturalidad y por el registro apocalíptico.'
- source_word: ἐμνημόνευσεν
  english_pob_choice: has remembered
  chosen_spanish: ha recordado
  alternatives_spanish:
  - ha recordado
  - se ha acordado
  lexicon: BDAG
  rationale: '''Recordar'' mantiene el verbo de memoria sin explicitar de forma interpretativa el juicio. En español ''ha recordado'' puede sonar menos antropomórfico que ''se ha acordado'' y conserva la fuerza judicial implícita que la POB inglesa preserva.'
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Traducción directa y estándar.
- source_word: ἀδικήματα
  english_pob_choice: wrongdoings
  chosen_spanish: injusticias
  alternatives_spanish:
  - injusticias
  - maldades
  - actos de injusticia
  lexicon: BDAG
  rationale: Ἀδίκημα puede ser 'acto injusto' o 'injusticia'. En contraste con 'pecados' en la primera cláusula, 'injusticias' preserva la distinción léxica que la POB inglesa documenta y mantiene el tono jurídico del pasaje.
theological_decisions:
- issue: Distinguir ἁμαρτίαι y ἀδικήματα en la misma cláusula
  english_pob_reading: 'Render with two different terms: ''sins'' and ''wrongdoings'''
  chosen_spanish_reading: Usar 'pecados' e 'injusticias' para reflejar dos términos relacionados pero no idénticos
  alternative_spanish_readings:
  - Usar 'pecados' para ambos términos
  - Usar 'iniquidades' para ambos términos
  rationale: El griego emplea dos vocablos distintos, y la POB inglesa preserva esa distinción. En español, 'pecados' e 'injusticias' mantienen la diferencia sin forzar una oposición doctrinal más fuerte de la que el versículo declara.
  doctrine_reference: 'Translation philosophy #5 (Consistency of key terms, or documented exception)'
- issue: Fuerza de la memoria divina
  english_pob_reading: Translate ἐμνημόνευσεν as 'has remembered' without expanding to explicit judgment language
  chosen_spanish_reading: Traducir 'ha recordado' sin añadir 'ha juzgado' o 'ha castigado'
  alternative_spanish_readings:
  - ha llamado a cuentas
  - ha traído a juicio
  rationale: En la Biblia, el recuerdo divino suele implicar acción judicial, pero el verbo griego sigue siendo 'recordar'. La traducción conserva esa tensión teológica en vez de resolverla por paráfrasis.
  doctrine_reference: 'Translation philosophy #3 (Preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: La redacción sigue de cerca el último ajuste del POB inglés, que cambió 'as high as heaven' por 'to heaven' para ajustarse mejor a ἄχρι τοῦ οὐρανοῦ. Por eso se eligió 'hasta el cielo' y no una forma comparativa como 'tan alto como el cielo'.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en otros contextos, pero aquí el griego dice ὁ θεός, así que corresponde 'Dios'.
  - Se preserva la distinción entre 'pecados' y 'injusticias' para reflejar ἁμαρτίαι / ἀδικήματα.
  - El tono es apocalíptico y judicial, pero sin añadir verbos interpretativos que no están en el griego.
