translation:
  language: es
  text: 'Y clamó con voz poderosa, diciendo: «¡Ha caído, ha caído Babilonia la grande! Se ha convertido en morada de demonios y en cárcel[a] de todo espíritu inmundo, y en cárcel de toda ave inmunda[b], y en cárcel de toda bestia inmunda y aborrecida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guarida». El término griego traducido «cárcel» también puede denotar un lugar habitado o frecuentado.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos omiten «y en cárcel de toda bestia inmunda y aborrecida».
    reason: textual_variant
lexical_decisions:
- source_word: ἔκραξεν
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  lexicon: BDAG
  rationale: El aoristo de κράζω expresa un grito fuerte y audible. «Clamó» conserva esa fuerza solemne sin sonar demasiado coloquial, y funciona bien en español bíblico contemporáneo.
- source_word: ἐν ἰσχυρᾷ φωνῇ
  english_pob_choice: with a mighty voice
  chosen_spanish: con una voz poderosa
  alternatives_spanish:
  - con una voz fuerte
  - con voz potente
  lexicon: BDAG
  rationale: La frase expresa modo o instrumento. «Voz poderosa» mantiene el valor de ἰσχυρᾷ con un matiz más enfático que «fuerte», y suena natural en español.
- source_word: Ἔπεσεν, ἔπεσεν
  english_pob_choice: Fallen, fallen
  chosen_spanish: ¡Caída, caída está!
  alternatives_spanish:
  - ¡Ha caído, ha caído!
  - ¡Cayó, cayó!
  lexicon: BDAG
  rationale: El grito profético reproduce una proclamación de juicio. En español, «Caída, caída está» conserva la cadencia oracular y la idea del estado resultante, sin volverlo prosaico.
- source_word: Βαβυλὼν ἡ μεγάλη
  english_pob_choice: Babylon the great
  chosen_spanish: Babilonia la grande
  alternatives_spanish:
  - la gran Babilonia
  - Babilonia, la grande
  lexicon: BDAG
  rationale: La estructura apposicional se conserva mejor con «Babilonia la grande», que refleja el título fijo de Apocalipsis sin alterar el orden más de lo necesario.
- source_word: ἐγένετο
  english_pob_choice: has become
  chosen_spanish: Se ha convertido
  alternatives_spanish:
  - llegó a ser
  - se volvió
  lexicon: BDAG
  rationale: El perfecto griego señala un estado resultante. «Se ha convertido» comunica bien ese resultado visible en la escena de juicio.
- source_word: κατοικητήριον
  english_pob_choice: dwelling place
  chosen_spanish: morada
  alternatives_spanish:
  - lugar de habitación
  - habitáculo
  lexicon: BDAG
  rationale: «Morada» es un equivalente natural y digno en español para un lugar habitado. Evita la dureza de un calco como «lugar de habitación».
- source_word: δαιμονίων
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  lexicon: BDAG
  rationale: El término designa demonios de manera directa. «Demonios» preserva la correspondencia lexical y el registro bíblico.
- source_word: φυλακὴ
  english_pob_choice: prison
  chosen_spanish: cárcel
  alternatives_spanish:
  - prisión
  - guarida
  lexicon: BDAG
  rationale: La POB inglesa eligió «prison» para visibilizar el valor lexical de φυλακή como lugar de confinamiento. En español, «cárcel» comunica esa idea con claridad y naturalidad, y evita el tono más abstracto de «prisión».
- source_word: παντὸς πνεύματος ἀκαθάρτου
  english_pob_choice: every unclean spirit
  chosen_spanish: todo espíritu impuro
  alternatives_spanish:
  - todo espíritu inmundo
  - todo espíritu no limpio
  lexicon: BDAG
  rationale: «Impuro» preserva la categoría bíblica de contaminación ritual y moral. En español moderno es claro; «inmundo» es más tradicional pero menos transparente para lectores amplios.
- source_word: παντὸς ὀρνέου ἀκαθάρτου
  english_pob_choice: every unclean bird
  chosen_spanish: todo ave impura
  alternatives_spanish:
  - todo pájaro impuro
  - todo ave inmunda
  lexicon: BDAG
  rationale: Ὄρνεον es un ave; «ave» es más amplio y culto que «pájaro», y encaja mejor con el tono del pasaje. «Impura» mantiene la misma categoría de contaminación que el griego.
- source_word: παντὸς θηρίου ἀκαθάρτου καὶ μεμισημένου
  english_pob_choice: every unclean and hated beast
  chosen_spanish: toda bestia impura y aborrecida
  alternatives_spanish:
  - todo animal impuro y odiado
  - toda bestia impura y detestable
  lexicon: BDAG
  rationale: θηρίον aquí funciona como sustantivo común, no como el título apocalíptico «la Bestia». «Bestia» conserva el impacto del término; «aborrecida» refleja bien el participio perfecto pasivo μεμισημένου como estado resultante de haber sido odiada.
theological_decisions:
- issue: Si θηρίου debe entenderse como el título apocalíptico «la Bestia» o como un sustantivo común
  english_pob_reading: common noun 'beast'
  chosen_spanish_reading: sustantivo común «bestia»
  alternative_spanish_readings:
  - la Bestia
  rationale: La construcción con παντός y la serie paralela con «espíritu» y «ave» favorecen una lectura genérica de animales/seres impuros. Capitalizarlo como «la Bestia» introduciría una identificación teológica no exigida por la sintaxis.
  doctrine_reference: Preservar la tensión del texto; no importar una identificación doctrinal no explicitada por el griego.
- issue: Cómo reflejar φυλακή en una escena apocalíptica de juicio
  english_pob_reading: prison
  chosen_spanish_reading: cárcel
  alternative_spanish_readings:
  - prisión
  - guarida
  rationale: El valor central de φυλακή aquí es el de un lugar de confinamiento o retención. «Cárcel» mantiene visible ese sentido y suena natural en español, sin desplazarse a la imagen tradicional pero menos exacta de «guarida».
  doctrine_reference: Equivalencia óptima con primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios sustanciales. Se mantuvo la decisión POB de conservar el valor lexical de φυλακή como lugar de confinamiento, pero en español se optó por «cárcel» en lugar de «prisión» por claridad y naturalidad, sin perder el matiz de encierro. También se preservó la tensión entre la lectura genérica de θηρίον y el posible eco apocalíptico, evitando capitalizar «Bestia».
  spanish_consistency_notes:
  - Se mantiene «Babilonia la grande» para coherencia con el título fijo del Apocalipsis.
  - Se usa «impuro» de forma consistente para ἀκάθαρτος.
  - Se conserva «demonios» para δαιμονίων y no «espíritus malignos», siguiendo la decisión léxica directa.
  - La cita conserva el paralelismo y la repetición intensiva del original.
  - La nota textual se aplica solo a la última cláusula, conforme al testimonio de manuscritos indicado en la fuente inglesa.
