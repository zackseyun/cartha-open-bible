- from: 'Y clamó con una voz poderosa[a], diciendo: «¡Caída, caída está Babilonia la grande! Se ha convertido en morada de demonios, en cárcel de todo espíritu impuro, en cárcel de todo ave impura[b], y en cárcel de toda bestia impura y aborrecida».'
