translation:
  language: es
  text: 'diciendo: «¡Ay, ay[a], la gran ciudad, vestida de lino fino, púrpura y escarlata, y adornada con oro, piedras preciosas y perlas»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ay, ay!», con sentido de lamento y, en este contexto, de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - mientras decían
  lexicon: BDAG
  rationale: El participio presente introduce la exclamación anterior y mantiene la conexión discursiva sin añadir un sujeto explícito innecesario. En español, «diciendo» conserva esa relación de continuidad.
- source_word: Οὐαὶ οὐαί
  english_pob_choice: Woe, woe
  chosen_spanish: ¡Ay, ay!
  alternatives_spanish:
  - ¡Ay de ella, ay de ella!
  - ¡Ay, ay!
  lexicon: BDAG
  rationale: «Οὐαί» admite el valor de lamento exclamativo. En español, «¡Ay, ay!» preserva mejor la fuerza lamentativa sin sonar forzado; la nota explica la alternativa de juicio implícita que la POB inglesa marca con «Woe».
- source_word: ἡ πόλις ἡ μεγάλη
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - la ciudad, la grande
  lexicon: BDAG
  rationale: La construcción griega con artículo repetido expresa énfasis; en español, «la gran ciudad» es la forma natural y fiel que conserva el valor atributivo.
- source_word: περιβεβλημένη
  english_pob_choice: clothed in
  chosen_spanish: vestida de
  alternatives_spanish:
  - clothed in
  - cubierta de
  lexicon: BDAG
  rationale: El participio perfecto describe el estado de la ciudad como revestida con lujos. «Vestida de» reproduce la imagen con naturalidad en español y mantiene el matiz figurado.
- source_word: βύσσινον
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino fino
  - lino delicado
  lexicon: BDAG
  rationale: El término no es lino común, sino textil costoso y refinado. «Lino fino» comunica bien el valor de lujo sin perder precisión.
- source_word: πορφυροῦν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura
  lexicon: BDAG
  rationale: El adjetivo refiere al color asociado con riqueza y realeza. «Púrpura» es el término más fiel y solemne en español bíblico.
- source_word: κόκκινον
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - rojo escarlata
  - escarlata
  lexicon: BDAG
  rationale: «Escarlata» preserva el tono vívido y la resonancia apocalíptica del término griego, mejor que un simple «rojo».
- source_word: κεχρυσωμένη
  english_pob_choice: adorned with
  chosen_spanish: adornada con
  alternatives_spanish:
  - adornada con
  - dorada con
  lexicon: BDAG
  rationale: El participio pasivo puede sugerir recubrimiento u ornamentación con oro. Dado que el listado siguiente enumera materiales de adorno, «adornada con» capta mejor el sentido global que un mero «dorada con».
- source_word: χρυσίῳ
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro
  - de oro
  lexicon: BDAG
  rationale: El dativo de material se expresa con naturalidad como «oro» dentro de la lista de adornos.
- source_word: λίθῳ τιμίῳ
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedra preciosa
  - piedras preciosas
  lexicon: BDAG
  rationale: Aunque el griego es singular, funciona de manera colectiva en la enumeración. En español, el plural «piedras preciosas» resulta más natural y comunica mejor la acumulación de riqueza, en línea con la revisión inglesa posterior.
- source_word: μαργαρίτῃ
  english_pob_choice: pearls
  chosen_spanish: perlas
  alternatives_spanish:
  - perla
  - perlas
  lexicon: BDAG
  rationale: De nuevo, el singular griego tiene sentido colectivo dentro de la lista. El plural español «perlas» refleja con naturalidad la abundancia ornamental y sigue la decisión revisada en inglés.
theological_decisions:
- issue: Valor de οὐαί como lamento y juicio
  english_pob_reading: Render οὐαί as 'Woe' to preserve both lament and judgment
  chosen_spanish_reading: Traducir οὐαί como «¡Ay, ay!» conservando el tono de lamento, con el matiz de juicio reflejado en el contexto apocalíptico
  alternative_spanish_readings:
  - ¡Ay de ella, ay de ella!
  - ¡Ay, ay!
  rationale: En este contexto, la exclamación no es mera tristeza; forma parte del oráculo de caída contra Babilonia. En español, «¡Ay, ay!» mantiene el lamento vivo, mientras la nota permite recordar el valor profético de juicio que la POB inglesa subraya con «Woe».
  doctrine_reference: Translation philosophy §1, §3
- issue: Singulares griegos en la lista de adornos
  english_pob_reading: Singular 'precious stone' and 'pearl' treated as collective in revised English
  chosen_spanish_reading: 'Plural colectivo natural: «piedras preciosas» y «perlas»'
  alternative_spanish_readings:
  - piedra preciosa y perla
  - piedras preciosas y perlas
  rationale: El griego usa singulares dentro de una enumeración de materiales; en español, el plural expresa mejor la acumulación lujosa sin alterar el contenido. Esto también evita una literalidad innecesaria que sonaría menos natural.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una revisión importante en la lista final: los singulares «precious stone» y «pearl» se ajustaron en inglés a plurales («stones» y «pearls») por el sentido colectivo de la enumeración. La versión española adopta desde el inicio ese mismo valor colectivo con «piedras preciosas y perlas», evitando una literalidad que sonaría menos natural. No hay otros cambios textuales relevantes en la línea auditada.'
  spanish_consistency_notes:
  - Conservo «púrpura» y «escarlata» como términos bíblicos estables de lujo y realeza.
  - Uso «lino fino» para βύσσινον por la precisión del tejido costoso.
  - Mantengo «adornada con» para κεχρυσωμένη porque la imagen es ornamental, no solo cromática.
  - El orden de los materiales sigue de cerca el griego y la POB inglesa.
  - La puntuación con comillas angulares y signos de apertura exclamativa sigue la norma tipográfica española.
