  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: participio introductorio («diciendo»), doble lamento («Οὐαὶ οὐαί»), identificación de «la gran ciudad», vestidura lujosa y ornamentación con materiales preciosos. Sin embargo, el cierre con signo de exclamación final altera la puntuación discursiva del original, que sigue como parte de la cita del v. 15–17 y aquí termina en coma. Además, la nota del marcador [a] no corresponde con precisión al uso del ancla en «diciendo[a]», porque la alternativa «¡Ay, ay!» se refiere a οὐαί, no a «diciendo».'
  spanish_quality_summary: El español es claro, natural y digno. «Vestida de lino fino, púrpura y escarlata» y «adornada con oro, piedras preciosas y perlas» suenan bien en español eclesial contemporáneo. La principal reparación necesaria es reubicar la nota al lugar correcto y ajustar la puntuación final para no convertir la línea en una exclamación independiente ajena a la sintaxis del contexto.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto en este versículo. Las decisiones léxicas principales son adecuadas: «gran ciudad», «lino fino», «púrpura», «escarlata», «adornada con». La elección «¡Ay, ay!» es defendible en español, pero como la POB inglesa privilegia «Woe, woe» por su fuerza profético-judicial, conviene que la nota alternativa quede anclada en la interjección misma, no en «diciendo».'
  issues:
  - severity: medium
    issue: Marcador de nota mal anclado
    rationale: La nota [a] explica una alternativa para «Οὐαὶ οὐαί» («¡Ay, ay!» / matiz de lamento y juicio), pero en el borrador está colocada sobre «diciendo[a]», que corresponde a λέγοντες. Esto desajusta la evidencia léxica y la disciplina de notas del proyecto.
  - severity: low
