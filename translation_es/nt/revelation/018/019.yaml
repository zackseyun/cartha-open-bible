review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del griego: gesto de duelo, clamor, llanto y lamento, referencia a la gran ciudad, enriquecimiento de los que tenían barcos en el mar, y su destrucción súbita. Sin embargo, hay dos desajustes importantes con el texto fuente y con el rastro POB: (1) la nota [a] está mal anclada y además explica “¡Ay, ay!” pero está puesta sobre “gritaron”; (2) ἐκ τῆς τιμιότητος αὐτῆς se ha vuelto “a causa de su riqueza”, que cambia el matiz de origen/procedencia (“de / a partir de”) por uno causal más interpretativo. También conviene mejorar πενθοῦντες con “haciendo duelo” o “de duelo” en vez de “lamentando”, para conservar mejor la distinción respecto de κλαίοντες.'
  spanish_quality_summary: El español es claro y legible, con registro digno y natural. “Echaron polvo sobre sus cabezas” y “se enriquecieron” funcionan bien. No obstante, la puntuación y el anclaje de notas necesitan corrección, y “a causa de su riqueza” suena más explicativo que fiel. “Lamentando” es comprensible, pero “haciendo duelo” refleja mejor el campo semántico de πενθοῦντες y evita redundancia con el clamor de lamento.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La elección “¡Ay, ay!” para Οὐαὶ οὐαί es defendible en español bíblico moderno, aunque el POB inglés prefirió “Woe, woe” por el tono profético; mantener “¡Ay, ay!” es aceptable si la nota alternativa está bien colocada. Las demás decisiones léxicas son generalmente consistentes, salvo que ἐκ debe conservarse como procedencia/origen: “de su riqueza” mejor que “a causa de su riqueza”.'
  issues:
