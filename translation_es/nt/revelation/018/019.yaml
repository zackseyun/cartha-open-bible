translation:
  language: es
  text: 'Y echaron polvo sobre sus cabezas y gritaron, llorando y haciendo duelo, diciendo: “¡Ay, ay[a], la gran ciudad, en la cual se enriquecieron todos los que tenían barcos en el mar de su riqueza[b], porque en una sola hora fue devastada!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “¡Ay, ay!” puede expresarse también como “¡Ay de...!” o “¡Alas!”. La interjección griega expresa lamento; se conserva “¡Ay, ay!” para mantener el tono profético de juicio y duelo.
    reason: lexical_alternative
  - marker: b
    text: O “de su lujo costoso” o “de su esplendor” para “de su riqueza”. El término griego puede denotar riqueza, costosidad o magnificencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλον χοῦν ἐπὶ τὰς κεφαλὰς αὐτῶν
  english_pob_choice: they threw dust on their heads
  chosen_spanish: echaron polvo sobre sus cabezas
  alternatives_spanish:
  - tiraron polvo sobre sus cabezas
  - pusieron polvo sobre sus cabezas
  lexicon: BDAG
  rationale: Conserva la imagen concreta del gesto de luto y usa un español natural y digno. "Echaron" mantiene la acción física sin sonar mecánico.
- source_word: ἔκραξαν
  english_pob_choice: cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - dieron un grito
  lexicon: BDAG
  rationale: El contexto es un clamor audible de lamento; "gritaron" comunica con claridad la intensidad sin suavizarla.
- source_word: κλαίοντες
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - llorando amargamente
  - sollozando
  lexicon: BDAG
  rationale: El participio expresa llanto visible y audible; "llorando" es el equivalente más directo y transparente en español.
- source_word: πενθοῦντες
  english_pob_choice: mourning
  chosen_spanish: lamentando
  alternatives_spanish:
  - guardando duelo
  - duelando
  lexicon: BDAG
  rationale: Se distingue del llanto con un matiz más amplio de duelo y queja; "lamentando" conserva ese campo semántico sin forzar un tecnicismo.
- source_word: Οὐαὶ οὐαί
  english_pob_choice: Woe, woe
  chosen_spanish: ¡Ay, ay!
  alternatives_spanish:
  - ¡Ay, ay de ti!
  - ¡Ay, ay! ¡Desgracia!
  lexicon: BDAG
  rationale: La interjección griega admite lamento y juicio; en español "¡Ay, ay!" preserva el tono de duelo/apocalíptico sin introducir un término que suene más interpretativo que el original.
- source_word: ἡ πόλις ἡ μεγάλη
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - la ciudad, la grande
  lexicon: BDAG
  rationale: Equivale de forma idiomática a la frase nominal articular griega y mantiene el título apocalíptico de la ciudad.
- source_word: ἐν ᾗ
  english_pob_choice: in which
  chosen_spanish: en la cual
  alternatives_spanish:
  - en la que
  - dentro de la cual
  lexicon: BDAG
  rationale: Refleja con precisión la preposición ἐν y evita sobreinterpretar el matiz instrumental; en español resulta natural y formal.
- source_word: ἐπλούτησαν
  english_pob_choice: became rich
  chosen_spanish: se enriquecieron
  alternatives_spanish:
  - llegaron a ser ricos
  - obtuvieron riquezas
  lexicon: BDAG
  rationale: Transmite la idea de ganancia económica resultante del comercio con la ciudad y encaja bien con el lamento mercantil del contexto.
- source_word: οἱ ἔχοντες τὰ πλοῖα ἐν τῇ θαλάσσῃ
  english_pob_choice: all who had ships on the sea
  chosen_spanish: todos los que tenían barcos en el mar
  alternatives_spanish:
  - todos los que poseían barcos en el mar
  - todos los que tenían navíos en el mar
  lexicon: BDAG
  rationale: Sigue de cerca la frase participial sin añadir "propiedad" donde el griego solo dice "tener"; "barcos" es más natural para lectores modernos, mientras "navíos" sería más elevado.
- source_word: ἐκ τῆς τιμιότητος αὐτῆς
  english_pob_choice: from her wealth
  chosen_spanish: a causa de su riqueza
  alternatives_spanish:
  - de su riqueza
  - por su riqueza
  - a causa de su esplendor
  lexicon: BDAG
  rationale: τιμιότης puede abarcar valor, riqueza o esplendor. Dado que el enunciado explica el enriquecimiento de los navegantes, "riqueza" es el núcleo semántico; la construcción causal en español hace explícita la relación económica sin perder la ambigüedad de fondo.
- source_word: ὅτι μιᾷ ὥρᾳ
  english_pob_choice: because in one hour
  chosen_spanish: porque en una sola hora
  alternatives_spanish:
  - pues en una hora
  - ya que en una sola hora
  lexicon: BDAG
  rationale: Conserva la rapidez súbita enfatizada por el texto y su función causal en el lamento.
- source_word: ἠρημώθη
  english_pob_choice: she has been laid waste
  chosen_spanish: fue devastada
  alternatives_spanish:
  - fue desolada
  - quedó devastada
  - ha sido devastada
  lexicon: BDAG
  rationale: El pasivo apunta a devastación/desolación. "Fue devastada" es claro y solemnemente directo en español; evita sobrecargar el verbo con perífrasis innecesarias.
theological_decisions:
- issue: Valor de la interjección apocalíptica Οὐαὶ οὐαί
  english_pob_reading: Woe, woe
  chosen_spanish_reading: ¡Ay, ay!
  alternative_spanish_readings:
  - ¡Ay, ay de ti!
  - ¡Desgracia, desgracia!
  rationale: En el contexto de Apocalipsis, la exclamación combina lamento y juicio. En español, "¡Ay, ay!" preserva esa tensión sin fijarla demasiado en una sola lectura interpretativa; el tono profético queda sostenido por el contexto inmediato.
  doctrine_reference: 'Principio de traducción: preservar la tensión semántica del original sin diluir el registro profético-apocalíptico.'
- issue: Relación entre ἐν ᾗ y el enriquecimiento de los navegantes
  english_pob_reading: in which all who had ships on the sea became rich from her wealth
  chosen_spanish_reading: en la cual se enriquecieron todos los que tenían barcos en el mar a causa de su riqueza
  alternative_spanish_readings:
  - por medio de la cual se enriquecieron...
  - en la cual ... de su riqueza
  rationale: El griego usa ἐν ᾗ, no una preposición instrumental explícita. Mantener "en la cual" respeta la forma, mientras "a causa de su riqueza" comunica en español la relación económica implícita en el lamento sin borrar el matiz relacional de la preposición.
  doctrine_reference: Principio de exactitud formal con claridad semántica; no desplazar innecesariamente el foco hacia una interpretación más estrecha que la del texto.
- issue: Sentido de τιμιότης en un contexto comercial
  english_pob_reading: from her wealth
  chosen_spanish_reading: a causa de su riqueza
  alternative_spanish_readings:
  - de su esplendor
  - de su lujo costoso
  - de su riqueza
  rationale: τιμιότης tiene un campo que incluye valor, costosidad, magnificencia o riqueza. En este contexto marítimo-comercial, la referencia al beneficio económico es central; por eso se privilegia "riqueza" y se deja constancia de otras posibilidades semánticas.
  doctrine_reference: Principio de mantener una opción lexical transparente con nota de las alternativas legítimas del término griego.
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y el audit trail en inglés. Se mantuvo la decisión revisada de reflejar ἐν ᾗ con una expresión locativa natural en vez de una paráfrasis instrumental más fuerte. También se preservó la tensión semántica de οὐαί como lamento/jucio y el rango de τιμιότης con una opción económica primaria, dejando constancia de alternativas en notas.
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene "barcos" por naturalidad moderna, con nota que preserva la literalidad de τὰ πλοῖα.
  - '"Riqueza" se usa como núcleo semántico de τιμιότης; la nota conserva las alternativas de esplendor/luxury para no borrar la ambigüedad léxica.'
  - La puntuación reproduce un clamor en discurso directo, con exclamación española y cierre de cita coherentes con el registro apocalíptico.
