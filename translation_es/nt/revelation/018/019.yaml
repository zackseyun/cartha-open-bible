  to: 'Y echaron polvo sobre sus cabezas y gritaron, llorando y haciendo duelo, diciendo: “¡Ay, ay[a], la gran ciudad, en la cual se enriquecieron todos los que tenían barcos en el mar de su riqueza[b], porque en una sola hora fue devastada!”'
