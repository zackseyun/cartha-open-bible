translation:
  language: es
  text: Y el fruto que tu alma deseaba[a] se fue de ti, y todos los lujos y esplendores han desaparecido de ti, y ya no se hallarán jamás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el fruto del deseo de tu alma».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ya no los hallarán jamás», con un sujeto indefinido en griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὀπώρα
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta madura
  - cosecha de frutos
  lexicon: BDAG
  rationale: ὀπώρα designa fruto, especialmente fruto maduro o de estación. «Fruto» conserva el campo semántico y funciona de manera natural en español dentro de la lamentación comercial.
- source_word: σου τῆς ἐπιθυμίας τῆς ψυχῆς
  english_pob_choice: of your soul’s desire
  chosen_spanish: de tu deseo del alma
  alternatives_spanish:
  - de lo que ansiaba tu alma
  - por lo que deseaba tu alma
  lexicon: BDAG
  rationale: La cadena genitiva se vierte de modo natural sin perder la fuerza de ἐπιθυμία ni de ψυχή. «Del alma» retiene el énfasis interior que el POB inglés preserva con «soul».
- source_word: ἀπῆλθεν ἀπὸ σοῦ
  english_pob_choice: has gone away from you
  chosen_spanish: se fue de ti
  alternatives_spanish:
  - ha ido lejos de ti
  - se apartó de ti
  lexicon: BDAG
  rationale: El aoristo se expresa con un perfecto narrativo natural en español. «Se fue de ti» reproduce el movimiento de ἀπέρχομαι con ἀπό sin sonar arcaico.
- source_word: πάντα τὰ λιπαρὰ
  english_pob_choice: all the rich things
  chosen_spanish: todas las cosas ricas
  alternatives_spanish:
  - todas las cosas lujosas
  - todas las cosas suntuosas
  lexicon: BDAG
  rationale: λιπαρός puede denotar riqueza, lujo o suntuosidad. «Ricas» comunica opulencia material en español; se añade «cosas» para evitar una estructura demasiado nominalizada.
- source_word: τὰ λαμπρὰ
  english_pob_choice: splendid things
  chosen_spanish: espléndidas
  alternatives_spanish:
  - brillantes
  - magníficas
  lexicon: BDAG
  rationale: λαμπρός aquí describe esplendor y brillo con matiz de lujo ostentoso. En español, «espléndidas» comunica bien ese valor sin introducir una imagen física de luz innecesaria.
- source_word: ἀπώλετο ἀπὸ σοῦ
  english_pob_choice: have perished from you
  chosen_spanish: perecieron de ti
  alternatives_spanish:
  - se perdieron de ti
  - desaparecieron de ti
  lexicon: BDAG
  rationale: ἀπόλλυμι en uso intransitivo puede significar perecer o perderse. «Perecieron» conserva la pérdida irreversible y el tono elevado del lamento.
- source_word: οὐκέτι οὐ μὴ
  english_pob_choice: never again
  chosen_spanish: ya no ... jamás
  alternatives_spanish:
  - nunca más
  - ya nunca
  lexicon: BDAG
  rationale: 'La combinación intensifica la negación. Se opta por una formulación española que preserve el énfasis doble sin sonar forzada: «ya no ... jamás».'
- source_word: αὐτὰ εὑρήσουσιν
  english_pob_choice: they will be found again
  chosen_spanish: se hallarán
  alternatives_spanish:
  - serán halladas
  - las encontrarán
  lexicon: BDAG
  rationale: El futuro plural griego carece de sujeto explícito y admite sentido impersonal. «Se hallarán» conserva esa ambigüedad mejor que introducir un sujeto concreto; el contexto permite entender la imposibilidad de recuperarlas.
theological_decisions:
- issue: Sujeto implícito de εὑρήσουσιν
  english_pob_reading: Rendered impersonally as 'they will be found again'
  chosen_spanish_reading: Impersonal reflejado en «se hallarán»
  alternative_spanish_readings:
  - «ellos no las encontrarán otra vez»
  - «no se volverán a encontrar»
  rationale: No hay una carga doctrinal especial; es una decisión de alcance sintáctico. El griego puede leerse con sentido indefinido o impersonal, y el español impersonal preserva mejor la ambigüedad y la finalización absoluta de la pérdida.
  doctrine_reference: 'Principio POB: preservar ambigüedad donde el original la mantiene'
translation_notes:
  revision_awareness: Se tomó como base el último estado revisado del contexto inglés, que ajustó la cadena genitiva a «the fruit of your soul’s desire» para reflejar mejor el griego. El español sigue esa decisión y mantiene la negación enfática final con una solución idiomática equivalente.
  spanish_consistency_notes:
  - Se mantiene «fruto» para ὀπώρα, en línea con el POB inglés y el valor léxico principal.
  - Se conserva «alma» para ψυχή, evitando reducirlo a un simple «deseo» sin sujeto interior.
  - «Se hallarán» respeta la ambigüedad del futuro plural griego sin introducir un sujeto explícito en el texto principal.
  - El par «ricas y espléndidas» refleja la doble serie adjetival de λιπαρά / λαμπρά sin sobreinterpretarla.
