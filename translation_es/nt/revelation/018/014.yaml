revisions:
- from: Y el fruto de tu deseo del alma[a] se fue de ti, y todas las cosas ricas y espléndidas perecieron de ti, y ya no se hallarán jamás[b].
  to: Y el fruto que tu alma deseaba[a] se fue de ti, y todos los lujos y esplendores han desaparecido de ti, y ya no se hallarán jamás[b].
  rationale: 'La revisión corrige tres puntos de español poco naturales sin apartarse del griego ni del POB inglés: se reemplaza el calco «de tu deseo del alma» por una formulación idiomática que conserva «alma»; se explicita λιπαρά/λαμπρά como «lujos y esplendores» para evitar la ambigüedad de «cosas ricas»; y se cambia «perecieron de ti» por «han desaparecido de ti», que mantiene la pérdida irreversible con mejor español. Se conservan las alternativas en notas y el cierre impersonal «se hallarán».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en la estructura general: ὀπώρα como «fruto», ἀπῆλθεν ἀπὸ σοῦ como pérdida/alejamiento, λιπαρὰ/λαμπρὰ como bienes lujosos y espléndidos, y la clausura con sentido impersonal para αὐτὰ εὑρήσουσιν. Sin embargo, «de tu deseo del alma» no refleja bien la cadena genitiva griega ni su naturalidad en español; suena calcado y opaco. Además, «perecieron de ti» y «cosas ricas» son poco idiomáticos en este contexto comercial de lujo.'
  spanish_quality_summary: La legibilidad necesita ajuste menor pero importante. «Deseo del alma», «cosas ricas» y «perecieron de ti» suenan forzados o semánticamente equívocos en español eclesial general. Una revisión a «el fruto que tu alma deseaba», «todos los lujos y esplendores» y «han desaparecido de ti» preserva mejor el sentido, el tono de lamento y la claridad natural.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones clave son estilístico-lexicales: mantener «alma» por ψυχή, evitar aplanar ἐπιθυμία, y conservar el valor impersonal/indefinido de εὑρήσουσιν. La revisión propuesta sigue la filosofía POB y mejora el español sin introducir paráfrasis excesiva.'
  issues:
  - severity: medium
    issue: «de tu deseo del alma» es un calco poco natural
    rationale: La cadena genitiva σου τῆς ἐπιθυμίας τῆς ψυχῆς se puede reflejar mejor en español como «que tu alma deseaba» o «del deseo de tu alma». La forma actual suena antinatural y dificulta la comprensión.
  - severity: medium
    issue: «cosas ricas» resulta equívoco en español
    rationale: En español, «ricas» suele oírse como sabrosas o coloquiales. Aquí λιπαρά apunta a lujos, riquezas o suntuosidad material. Conviene una formulación más clara para el contexto de lujo comercial.
  - severity: medium
    issue: «perecieron de ti» no es idiomático
    rationale: Aunque intenta conservar ἀπώλετο ἀπὸ σοῦ, en español suena extraño. «Han desaparecido de ti» o «se han perdido para ti» comunica mejor la pérdida irreversible sin traicionar el sentido.
  revised_spanish_text: Y el fruto que tu alma deseaba[a] se fue de ti, y todos los lujos y esplendores han desaparecido de ti, y ya no se hallarán jamás[b].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «el fruto del deseo de tu alma».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ya no los hallarán jamás», con un sujeto indefinido en griego.'
    reason: alternative_reading
  revision_rationale: 'La revisión corrige tres puntos de español poco naturales sin apartarse del griego ni del POB inglés: se reemplaza el calco «de tu deseo del alma» por una formulación idiomática que conserva «alma»; se explicita λιπαρά/λαμπρά como «lujos y esplendores» para evitar la ambigüedad de «cosas ricas»; y se cambia «perecieron de ti» por «han desaparecido de ti», que mantiene la pérdida irreversible con mejor español. Se conservan las alternativas en notas y el cierre impersonal «se hallarán».'
