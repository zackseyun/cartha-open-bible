translation:
  language: es
  text: Páguenle como ella misma ha pagado, y repáguenle el doble[a] conforme a sus obras; en la copa que ella mezcló[b], mézclenle una doble porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «duplíquenle las cosas dobles»; la expresión griega es breve, enérgica y condensada, y puede enfatizar una retribución intensificada.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la copa que ella preparó al mezclarla; la imagen probablemente evoca una bebida preparada para juicio.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπόδοτε
  english_pob_choice: Pay her back
  chosen_spanish: Páguenle
  alternatives_spanish:
  - Repáguenle
  - Devuélvanle
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción de retribución. En español, «pagarle» expresa con naturalidad la idea de retribuir o saldar una deuda/agravio, conservando el matiz judicial del pasaje mejor que un simple «darle» o «devolverle».
- source_word: ὡς καὶ αὐτὴ ἀπέδωκεν
  english_pob_choice: as she herself has paid back
  chosen_spanish: como ella misma ha pagado
  alternatives_spanish:
  - como ella misma ha repagado
  - tal como ella también retribuyó
  lexicon: BDAG
  rationale: «Ella misma» refleja el énfasis de αὐτή. El perfecto compuesto «ha pagado» comunica una acción completada con relevancia presente y mantiene la relación de correspondencia con la conducta previa de Babilonia.
- source_word: διπλώσατε τὰ διπλᾶ
  english_pob_choice: repay her double
  chosen_spanish: repáguenle el doble
  alternatives_spanish:
  - duplíquenle lo doble
  - devuélvanle el doble
  lexicon: BDAG
  rationale: El griego es enfático y algo comprimido. «El doble» conserva el valor de retribución intensificada sin forzar una construcción poco natural en español. «Repáguenle» mantiene el sentido retributivo de ἀποδίδωμι y enlaza con el primer imperativo.
- source_word: κατὰ τὰ ἔργα αὐτῆς
  english_pob_choice: according to her works
  chosen_spanish: conforme a sus obras
  alternatives_spanish:
  - según sus obras
  - de acuerdo con sus obras
  lexicon: BDAG
  rationale: «Obras» preserva el léxico de ἔργα y el tono judicial-medido del texto. «Conforme a» es una equivalencia clara y bíblica para indicar medida/proporción sin perder precisión.
- source_word: ποτηρίῳ
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  - vaso
  lexicon: BDAG
  rationale: «Copa» es la equivalencia natural en español para ποτήριον y conserva la imagen profética del recipiente asociado al juicio. «Cáliz» sonaría más litúrgico y desplazaría el registro del pasaje.
- source_word: ἐκέρασεν
  english_pob_choice: she mixed
  chosen_spanish: ella mezcló
  alternatives_spanish:
  - ella preparó mezclando
  - ella sirvió mezclado
  lexicon: BDAG
  rationale: El verbo significa mezclar o preparar por mezcla. «Mezcló» conserva la imagen concreta de la preparación del contenido de la copa, sin suavizar el carácter simbólico del juicio.
- source_word: κεράσατε αὐτῇ διπλοῦν
  english_pob_choice: mix a double portion for her
  chosen_spanish: mézclenle un doble doble
  alternatives_spanish:
  - mézclenle una doble porción
  - prepárenle el doble
  lexicon: BDAG
  rationale: Se preserva la fuerza retórica del griego con una formulación que intenta reflejar la repetición intensiva. La duplicación mantiene la idea de intensificación retributiva, aunque suene marcada; la alternativa más natural «una doble porción» atenúa el eco del original.
theological_decisions:
- issue: Naturaleza de la retribución doble
  english_pob_reading: Render as symbolic/judicial recompense without softening the severity or importing a literal legal formula.
  chosen_spanish_reading: Presentar la duplicación como retribución judicial y simbólica, sin reducirla a una simple generalidad ni fijarla como cálculo matemático estrictamente literal.
  alternative_spanish_readings:
  - Interpretarla como una pena cuantitativa literal
  - Suavizarla como una afirmación general de justicia
  rationale: En lenguaje apocalíptico, la imagen del doble funciona como intensificación de juicio y correspondencia moral. La traducción conserva la severidad y la imagen sin resolver el grado exacto de literalidad.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego y con el audit trail inglés. No se aplicaron revisiones recientes al contenido; se conservó la estructura imperativa, la intensificación del doble y la imagen de la copa mezclada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió «obras» para ἔργα por su valor léxico y judicial, en lugar de «hechos», para preservar la correspondencia con el texto fuente.
  - Se prefirió «copa» sobre «cáliz» por registro y fidelidad imagética.
  - Se evitó «Cristo» y otras formulaciones no pertinentes al verso.
  - La duplicación final se dejó marcada para reflejar la fuerza retórica del griego, aun a costa de una expresión poco usual en español.
