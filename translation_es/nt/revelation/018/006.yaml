revisions:
- from: Páguenle[a] como ella misma ha pagado, y repáguenle el doble conforme a sus obras; en la copa que ella mezcló[b], mézclenle un doble doble.
  to: Páguenle como ella misma ha pagado, y repáguenle el doble[a] conforme a sus obras; en la copa que ella mezcló[b], mézclenle una doble porción.
  rationale: Se corrige la ubicación de la nota léxica para que corresponda al segmento griego pertinente (διπλώσατε τὰ διπλᾶ) y se reemplaza «un doble doble» por «una doble porción», que preserva el sentido del original y la decisión del POB inglés de priorizar una formulación idiomática en el texto principal. Se mantiene la severidad judicial y la imagen de la copa de juicio sin introducir paráfrasis innecesaria.
