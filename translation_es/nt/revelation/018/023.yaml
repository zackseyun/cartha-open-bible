  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. «Hechicería» para φαρμακεία está bien justificado. «Los grandes de la tierra» concuerda con la decisión inglesa, con nota alternativa «los magnates de la tierra».
  issues:
