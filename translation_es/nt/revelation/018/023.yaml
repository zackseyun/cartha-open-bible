    rationale: Esto rompe la correspondencia obligatoria entre marcador y palabra/frase relevante. La nota debe anclarse en «hechicería».
  - severity: medium
    issue: «Nunca ... otra vez» es comprensible pero menos idiomático que «nunca más» en español.
    rationale: El griego ἔτι con οὐ μή expresa cese definitivo; «nunca más» comunica mejor la finalidad en español natural.
  - severity: low
    issue: «Fueron extraviadas» suena algo rígido en español actual.
    rationale: Aunque semánticamente posible para ἐπλανήθησαν, «fueron engañadas» es más natural y sigue permitiendo el sentido de seducción/decepción.
