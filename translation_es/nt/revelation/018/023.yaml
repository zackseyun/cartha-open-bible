revisions:
- from: Y la luz de una lámpara nunca brillará en ti otra vez[a], y la voz de novio y novia nunca se oirá en ti otra vez; porque tus comerciantes eran los grandes de la tierra[b], porque por tu hechicería todas las naciones fueron extraviadas.
  to: Y la luz de una lámpara nunca más brillará en ti, y la voz de novio y novia nunca más se oirá en ti; porque tus comerciantes eran los grandes de la tierra[a], porque por tu hechicería[b] todas las naciones fueron engañadas.
  rationale: Se reubica correctamente la nota sobre φαρμακεία al término «hechicería» y la nota sobre μεγιστᾶνες a «los grandes de la tierra». Además, se mejora la naturalidad española con «nunca más» para reflejar la negación enfática e irreversible, y se ajusta «fueron extraviadas» a «fueron engañadas» para una lectura más idiomática sin apartarse del sentido del griego ni del audit trail inglés.
  reviewer_model: gpt-5.4
