  text: καὶ φῶς λύχνου οὐ μὴ φάνῃ ἐν σοὶ ἔτι, καὶ φωνὴ νυμφίου καὶ νύμφης οὐ μὴ ἀκουσθῇ ἐν σοὶ ἔτι· ὅτι οἱ ἔμποροί σου ἦσαν οἱ μεγιστᾶνες τῆς γῆς, ὅτι ἐν τῇ φαρμακείᾳ σου ἐπλανήθησαν πάντα τὰ ἔθνη,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/023.yaml
  text: And the light of a lamp will never shine in you again[a], and the voice of bridegroom and bride will never be heard in you again; for your merchants were the great ones of the earth[b], because by your sorcery all the nations were led astray.
  footnotes:
