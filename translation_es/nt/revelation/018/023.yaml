translation:
  language: es
  text: Y la luz de una lámpara nunca más brillará en ti, y la voz de novio y novia nunca más se oirá en ti; porque tus comerciantes eran los grandes de la tierra[a], porque por tu hechicería[b] todas las naciones fueron engañadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los magnates de la tierra». El término griego designa personas de gran prominencia o poder.
    reason: lexical_alternative
  - marker: b
    text: O «por tus artes mágicas» o «por tu brujería». El griego φαρμακεία puede referirse a hechicería, magia o engaño mágico.
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς λύχνου
  english_pob_choice: the light of a lamp
  chosen_spanish: la luz de una lámpara
  alternatives_spanish:
  - la luz de un candil
  - la luz de un farol
  lexicon: BDAG
  rationale: La construcción genitiva se expresa naturalmente en español como 'la luz de una lámpara'. 'Lámpara' conserva el sentido bíblico de λύχνος sin forzar un término más técnico o más regional.
- source_word: οὐ μὴ φάνῃ
  english_pob_choice: will never shine
  chosen_spanish: nunca brillará
  alternatives_spanish:
  - no brillará jamás
  - nunca volverá a brillar
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo exige una negación fuerte e irreversible. 'Nunca brillará' comunica bien el valor absoluto; se añade 'otra vez' por ἔτι, como en el audit trail inglés.
- source_word: ἐν σοὶ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  lexicon: BDAG
  rationale: Se mantiene la segunda persona directa de la ciudad personificada. 'En ti' es la forma más fiel y natural en español.
- source_word: ἔτι
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: BDAG
  rationale: ἔτι añade la idea de continuidad cesada o repetición interrumpida. 'Otra vez' reproduce el valor del 'again' inglés y la clausula negativa resulta idiomática en español.
- source_word: φωνὴ νυμφίου καὶ νύμφης
  english_pob_choice: the voice of bridegroom and bride
  chosen_spanish: la voz de novio y novia
  alternatives_spanish:
  - el sonido de novio y novia
  - la voz del esposo y la esposa
  lexicon: BDAG
  rationale: '''Voz'' conserva φωνή; en español ''novio y novia'' comunica la pareja nupcial de modo claro y contemporáneo. Se evita ''esposo y esposa'' para no desplazar el matiz de boda presente en el griego.'
- source_word: οὐ μὴ ἀκουσθῇ
  english_pob_choice: will never be heard
  chosen_spanish: nunca se oirá
  alternatives_spanish:
  - nunca será oída
  - no se volverá a oír
  lexicon: BDAG
  rationale: El pasivo impersonal en español se expresa con 'se oirá'. La negación enfática se conserva con 'nunca'.
- source_word: οἱ ἔμποροί σου
  english_pob_choice: your merchants
  chosen_spanish: tus comerciantes
  alternatives_spanish:
  - tus mercaderes
  - tus negociantes
  lexicon: BDAG
  rationale: '''Comerciantes'' es claro y natural en español moderno; mantiene el campo semántico de ἔμπορος en el contexto comercial de Apocalipsis 18.'
- source_word: οἱ μεγιστᾶνες τῆς γῆς
  english_pob_choice: the great ones of the earth
  chosen_spanish: los grandes de la tierra
  alternatives_spanish:
  - los magnates de la tierra
  - los poderosos de la tierra
  lexicon: BDAG
  rationale: '''Los grandes de la tierra'' sigue de cerca el sentido amplio del título griego sin estrecharlo a una sola clase social. Conserva la ambigüedad de prominencia/poder señalada en el audit trail inglés.'
- source_word: ἐν τῇ φαρμακείᾳ σου
  english_pob_choice: by your sorcery
  chosen_spanish: por tu hechicería
  alternatives_spanish:
  - por tu magia
  - por tus artes mágicas
  lexicon: BDAG
  rationale: φαρμακεία en este contexto apocalíptico apunta a prácticas de magia/sorciería con engaño. 'Hechicería' comunica esa carga religiosa y moral en español sin reducir el término a una acepción moderna limitada.
- source_word: ἐπλανήθησαν
  english_pob_choice: were led astray
  chosen_spanish: fueron extraviadas
  alternatives_spanish:
  - fueron engañadas
  - se desviaron
  lexicon: BDAG
  rationale: El pasivo de πλανάω puede ser 'ser extraviado/engañado'. 'Fueron extraviadas' conserva la pasividad y el matiz de desvío, y funciona bien con 'las naciones'.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentiles
  lexicon: BDAG
  rationale: '''Naciones'' es la equivalencia más natural y teológicamente sobria para ἔθνη en Apocalipsis, preservando el alcance universal del juicio y la corrupción.'
theological_decisions:
- issue: Valor de la negación enfática οὐ μή en la profecía de juicio
  english_pob_reading: will never ... again
  chosen_spanish_reading: nunca ... otra vez
  alternative_spanish_readings:
  - ya no ...
  - nunca más ...
  rationale: La forma griega expresa una prohibición/negación absoluta e irreversible. En español, 'nunca ... otra vez' transmite la fuerza de cierre definitivo y evita suavizar la sentencia.
  doctrine_reference: Translation philosophy §6
- issue: Sentido de φαρμακεία en un oráculo contra Babilonia
  english_pob_reading: sorcery
  chosen_spanish_reading: hechicería
  alternative_spanish_readings:
  - sorciería
  - artes mágicas
  rationale: El contexto no es farmacológico sino de seducción y engaño espiritual. 'Hechicería' conserva la dimensión religiosa condenada por el texto y el carácter de corrupción de las naciones.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, pero adapta la sintaxis al español para evitar calcos duros. Se decidió mantener la fuerza absoluta de οὐ μή con 'nunca' y 'otra vez', y se optó por 'hechicería' como equivalente contextual de φαρμακεία, preservando la ambigüedad moral-religiosa señalada por el POB en inglés. No se requirieron revisiones adicionales frente al pasaje auditado.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando corresponda; aquí no aparece el tetragrámaton.
  - Se mantiene 'naciones' para ἔθνη, en línea con el uso apocalíptico.
  - Se conserva la distinción entre 'novio/novia' y 'esposo/esposa' para no borrar el matiz nupcial literal.
  - La negación enfática se expresa con estructura natural en español, sin perder el valor irreversible del original.
