review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: los comerciantes vinculados con los bienes listados, enriquecidos por Babilonia, se mantienen a distancia por temor a su tormento, llorando y haciendo duelo. También preserva la nota alternativa de τούτων. Sin embargo, «se pondrán lejos» suena menos natural y algo impreciso para ἀπὸ μακρόθεν στήσονται, que en este contexto expresa que se mantendrán/pararán a distancia. Además, «lamentándose» para πενθοῦντες es aceptable, pero «haciendo duelo» o «de duelo» conserva mejor la distinción con «llorando» y el matiz de mourning.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste de fluidez y precisión idiomática. «Se pondrán lejos» no suena natural en español bíblico contemporáneo; «se quedarán a distancia» o «se pararán a lo lejos» funciona mejor. El resto del verso es legible. La nota al pie está bien formulada y no necesita cambio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mercaderes» es una opción válida para ἔμποροι, «tormento» alinea bien con βασανισμός, y la referencia femenina «de ella» preserva a Babilonia como fuente. La decisión principal a corregir es estilístico-semántica en la expresión de distancia/posición.
  issues:
  - severity: medium
    issue: «se pondrán lejos» no representa de forma idiomática y precisa ἀπὸ μακρόθεν στήσονται
    rationale: El griego combina distancia espacial con la idea de estar/pararse a cierta distancia. En español, «ponerse lejos» suena forzado; «se quedarán a distancia» o «se pararán a lo lejos» comunica mejor la escena.
  - severity: low
    issue: «lamentándose» debilita ligeramente el matiz específico de πενθοῦντες
    rationale: Aunque es aceptable, πενθέω apunta más a duelo o lamento fúnebre que a una simple lamentación verbal. Una formulación como «haciendo duelo» mantiene mejor la distinción frente a «llorando».
  revised_spanish_text: Los mercaderes[a] de estas cosas, que se hicieron ricos de ella, se quedarán a distancia, por el temor de su tormento, llorando y haciendo duelo,
  revised_footnotes:
  - marker: a
    text: O «de estas mercancías» o «de estas mercaderías»; la frase remite a los artículos de lujo enumerados en el contexto cercano.
    reason: lexical_alternative
