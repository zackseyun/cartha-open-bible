revisions:
- from: Los mercaderes[a] de estas cosas, que se hicieron ricos de ella, se pondrán lejos, por el temor de su tormento, llorando y lamentándose,
  to: Los mercaderes[a] de estas cosas, que se hicieron ricos de ella, se quedarán a distancia, por el temor de su tormento, llorando y haciendo duelo,
  rationale: Se ajusta «se pondrán lejos» a «se quedarán a distancia» para representar con más naturalidad e idiomaticidad ἀπὸ μακρόθεν στήσονται. También se cambia «lamentándose» por «haciendo duelo» para reflejar mejor el matiz de πενθοῦντες y conservar su distinción respecto de «llorando».
