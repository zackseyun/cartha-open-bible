translation:
  language: es
  text: Los mercaderes[a] de estas cosas, que se hicieron ricos de ella, se quedarán a distancia, por el temor de su tormento, llorando y haciendo duelo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de estas mercancías» o «de estas mercaderías»; la frase remite a los artículos de lujo enumerados en el contexto cercano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμποροι
  english_pob_choice: merchants
  chosen_spanish: mercaderes
  alternatives_spanish:
  - comerciantes
  - traficantes
  lexicon: BDAG
  rationale: ἔμποροι designa a quienes realizan comercio. «Mercaderes» conserva el sentido económico y suena natural en español bíblico sin volverse técnico como «comerciantes» ni peyorativo como «traficantes».
- source_word: τούτων
  english_pob_choice: of these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de estos bienes
  - de estas mercaderías
  lexicon: BDAG
  rationale: El demostrativo apunta hacia los artículos de lujo del contexto inmediato. «De estas cosas» mantiene la referencia anafórica sin precisar más de lo que el griego dice.
- source_word: πλουτήσαντες
  english_pob_choice: who became rich
  chosen_spanish: que se hicieron ricos
  alternatives_spanish:
  - que crecieron en riqueza
  - que fueron enriquecidos
  lexicon: BDAG
  rationale: El participio aoristo expresa su enriquecimiento previo por medio de Babilonia. «Se hicieron ricos» es idiomático y conserva la idea de adquisición de riqueza; evita una pasiva que podría borrar el matiz activo.
- source_word: ἀπ’ αὐτῆς
  english_pob_choice: from her
  chosen_spanish: de ella
  alternatives_spanish:
  - por ella
  - a partir de ella
  lexicon: BDAG
  rationale: ἀπό marca procedencia. En español, «de ella» transmite claramente que Babilonia fue la fuente de su riqueza.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: far off
  chosen_spanish: lejos
  alternatives_spanish:
  - a distancia
  - desde lejos
  lexicon: BDAG
  rationale: La locución expresa distancia espacial mantenida. «Lejos» es breve y natural en español, y en este contexto comunica la acción de quedarse apartados por miedo.
- source_word: στήσονται
  english_pob_choice: will stand
  chosen_spanish: se pondrán
  alternatives_spanish:
  - se quedarán de pie
  - permanecerán de pie
  lexicon: BDAG
  rationale: El futuro medio de ἵστημι aquí indica que adoptarán una posición de estar o quedarse parados. «Se pondrán» reproduce bien ese matiz de colocarse en un lugar, y combinado con «lejos» evita redundancia pesada.
- source_word: διὰ τὸν φόβον
  english_pob_choice: because of the fear
  chosen_spanish: por el temor
  alternatives_spanish:
  - a causa del temor
  - debido al miedo
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Por el temor» es una formulación natural y fiel; «temor» mantiene el registro bíblico y evita trivializarlo como simple susto.
- source_word: βασανισμοῦ
  english_pob_choice: torment
  chosen_spanish: tormento
  alternatives_spanish:
  - tortura
  - castigo
  lexicon: BDAG
  rationale: En Apocalipsis, βασανισμός remite al sufrimiento severo asociado al juicio. «Tormento» conserva la fuerza del término sin estrecharlo a «tortura», que en español moderno puede sonar demasiado técnico o físico.
- source_word: κλαίοντες
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - llorando en voz alta
  - sollozando
  lexicon: BDAG
  rationale: El participio describe llanto audible o visible. «Llorando» es directo y natural en español; la pareja con «lamentándose» mantiene el paralelismo con el griego.
- source_word: πενθοῦντες
  english_pob_choice: mourning
  chosen_spanish: lamentándose
  alternatives_spanish:
  - muriendo de pena
  - guardando luto
  lexicon: BDAG
  rationale: πενθέω expresa duelo o lamento por pérdida. «Lamentándose» conserva la distinción respecto de «llorando» y evita reducirlo a un mero sentimiento interior.
theological_decisions:
- issue: Naturaleza del βασανισμός en lenguaje de juicio apocalíptico
  english_pob_reading: Rendered as 'torment' without softening to a merely emotional or economic distress.
  chosen_spanish_reading: Se traduce como «tormento» sin suavizarlo a una simple angustia emocional o pérdida económica.
  alternative_spanish_readings:
  - castigo
  - aflicción
  rationale: El contexto inmediato es el juicio de Babilonia, y el término en Apocalipsis conserva un peso de sufrimiento severo. «Tormento» preserva esa gravedad sin añadir una explicación doctrinal más allá del texto.
  doctrine_reference: Conservar la tensión teológica del pasaje; no convertir el texto en una formulación doctrinal cerrada sobre el castigo final.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el expediente auditado en inglés; no se requieren revisiones respecto del pasaje base, y se preserva la referencia retrospectiva del demostrativo sin sobreespecificarla.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «mercaderes» para conservar el registro comercial del pasaje y su resonancia apocalíptica.
  - Se distinguieron «llorando» y «lamentándose» para reflejar los dos participios griegos sin fusionarlos en un solo verbo.
  - «Tormento» se conservó para βασανισμός por coherencia con el uso apocalíptico del término.
