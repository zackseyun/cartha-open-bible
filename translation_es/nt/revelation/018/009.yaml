    changes_summary: 'Moved "with her" to modify both coordinated verbs more naturally and in closer alignment with the Greek: "who committed sexual immorality and lived in luxury with her" became "who committed sexual immorality and lived in luxury with her" with the first "with her" omitted as implied by the shared relation.'
translation:
  language: es
  text: Y los reyes de la tierra, que cometieron inmoralidad sexual[a] y vivieron en lujo con ella, llorarán y se lamentarán por ella cuando vean el humo de su quema,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «cometieron inmoralidad sexual» probablemente participa en la metáfora recurrente de Apocalipsis para una alianza corrupta e idolátrica, aunque conserva la imaginería sexual del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: κλαύσουσιν
  english_pob_choice: will weep
  chosen_spanish: llorarán
  alternatives_spanish:
  - sollozarán
  - llorarán amargamente
  lexicon: BDAG
  rationale: κλαίω expresa llanto audible o lamento. «Llorarán» transmite de manera natural y sobria la emoción del verbo sin recargar el texto.
- source_word: κόψονται
  english_pob_choice: will mourn
  chosen_spanish: harán duelo
  alternatives_spanish:
  - se lamentarán
  - se golpearán el pecho
  lexicon: BDAG
  rationale: En este giro, κόπτω comunica duelo ritual o lamentación, no una acción literal de corte. «Harán duelo» preserva el sentido de lamento demostrativo en español actual.
- source_word: οἱ βασιλεῖς τῆς γῆς
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del mundo
  - los gobernantes de la tierra
  lexicon: BDAG
  rationale: La expresión apocalíptica estándar se traduce de forma directa. «Tierra» conserva el alcance global del original mejor que una paráfrasis localizante.
- source_word: μετ’ αὐτῆς
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - en asociación con ella
  - junto con ella
  lexicon: BDAG
  rationale: La preposición μετά con genitivo indica asociación. «Con ella» es la equivalencia natural y mantiene la relación compartida con la figura femenina del contexto.
- source_word: πορνεύσαντες
  english_pob_choice: committed sexual immorality
  chosen_spanish: cometieron inmoralidad sexual
  alternatives_spanish:
  - cometieron fornicación
  - se prostituyeron
  lexicon: BDAG
  rationale: El verbo puede ser literal y metafórico en Apocalipsis. «Inmoralidad sexual» conserva el lenguaje sexualizado del texto sin borrar su posible fuerza simbólica de alianza corrupta.
- source_word: στρηνιάσαντες
  english_pob_choice: lived in luxury
  chosen_spanish: vivieron en lujos
  alternatives_spanish:
  - vivieron en lujo
  - se entregaron al lujo
  lexicon: BDAG
  rationale: El verbo denota vida de lujo autoindulgente y desenfrenada. «Vivieron en lujos» comunica el derroche y la sensualidad del término en un español claro y digno.
- source_word: ὅταν βλέπωσιν
  english_pob_choice: when they see
  chosen_spanish: cuando vean
  alternatives_spanish:
  - cuando vean que
  - cada vez que vean
  lexicon: BDAG
  rationale: Ὅταν con subjuntivo presenta una acción futura contingente. «Cuando vean» es la correspondencia natural en español bíblico contemporáneo.
- source_word: τὸν καπνὸν
  english_pob_choice: the smoke
  chosen_spanish: el humo
  alternatives_spanish:
  - la humareda
  lexicon: BDAG
  rationale: La equivalencia léxica directa es la más fiel. «Humo» conserva la imagen visual de destrucción sin añadir matices no presentes en el griego.
- source_word: τῆς πυρώσεως αὐτῆς
  english_pob_choice: of her burning
  chosen_spanish: de su incendio
  alternatives_spanish:
  - de su arder
  - de su quemazón
  - de su incendio por fuego
  lexicon: BDAG
  rationale: πύρωσις denota el proceso o resultado de arder. «Incendio» expresa de manera natural la destrucción por fuego y evita una formulación demasiado técnica o extraña en español.
theological_decisions:
- issue: Imágenes de inmoralidad sexual en Babilonia
  english_pob_reading: Retain the sexual-immorality language in the main text while allowing its metaphorical force in context.
  chosen_spanish_reading: Mantener la expresión sexual explícita en el texto principal, dejando que el contexto apocalíptico conserve su fuerza metafórica.
  alternative_spanish_readings:
  - traducir de manera abstracta como 'cometieron infidelidad'
  - usar solo 'actuaron inmoralmente'
  rationale: Apocalipsis usa consistentemente la imaginería de prostitución e inmoralidad sexual para señalar alianzas idolátricas y corruptas. Traducirla de forma directa evita desactivar esa tensión teológica.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de κόψονται
  english_pob_reading: Translate the mourning sense rather than a hyper-literal bodily action.
  chosen_spanish_reading: Traducir el sentido de duelo/lamento, no una acción corporal literal.
  alternative_spanish_readings:
  - '''se golpearán el pecho'''
  - '''se cortarán'''
  rationale: El griego describe lamentación demostrativa. En español, «harán duelo» comunica el sentido sin inducir a una lectura de autolesión.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al unir «with her» con la acción compartida de los reyes, sin repetirlo innecesariamente en español. También preserva la coordinación verbal del griego y la distinción entre llanto y duelo.
  spanish_consistency_notes:
  - Se usa «tierra» en la expresión fija «reyes de la tierra», siguiendo el valor apocalíptico global del griego.
  - Se mantiene «inmoralidad sexual» para conservar la metáfora sexualizada y no suavizarla a una formulación abstracta.
  - «Harán duelo» se emplea como equivalente idiomático de κόψονται, evitando una imagen literal de autodaño.
  - «Incendio» se eligió para πύρωσις por su claridad natural en español, sin borrar la idea de quema destructiva.
