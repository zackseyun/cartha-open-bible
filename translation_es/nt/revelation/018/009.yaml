review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: sujetos, acciones de llorar y lamentar, la asociación con Babilonia, y la visión del humo de su quema. Sin embargo, omite en el texto principal una nota que preserve la posible fuerza metafórica de πορνεύσαντες, pese a que el rastro auditado en inglés la conserva, y «vivieron en lujos» suena menos natural que una formulación singular o verbal. «De su incendio» es aceptable, pero «de su quema» se acerca mejor a πύρωσις como proceso de arder sin introducir un matiz de evento accidental.'
  spanish_quality_summary: 'El español es claro y comprensible, pero tiene dos puntos mejorables de naturalidad y dignidad: «vivieron en lujos» suena algo forzado en español general, y «harán duelo» es entendible pero menos idiomático que «se lamentarán» junto a «llorarán». La frase fluye mejor con «vivieron en lujo con ella» y «llorarán y se lamentarán por ella».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión «inmoralidad sexual» preserva bien la carga sexual de πορνεύσαντες. Conviene además conservar en nota la explicación de que en Apocalipsis esta expresión probablemente participa en la metáfora de alianza corrupta e idolátrica, como en el POB inglés. No se requieren ajustes de nombres divinos o títulos cristológicos en este versículo.
  issues:
  - severity: medium
    issue: Falta la nota que preserve la dimensión metafórica de «cometieron inmoralidad sexual».
    rationale: El POB inglés incluyó una nota explícita sobre la posible fuerza metafórica de la imagen sexual en Apocalipsis. Omitirla pierde una decisión auditada relevante y reduce transparencia interpretativa.
  - severity: medium
    issue: «Vivieron en lujos» suena poco natural en español bíblico general.
    rationale: Aunque comprensible, la expresión en plural resulta menos idiomática que «vivieron en lujo» o «se entregaron al lujo». La mejora es estilística pero importante para legibilidad amplia.
  - severity: low
    issue: «Harán duelo» es correcto pero menos idiomático que «se lamentarán».
    rationale: Para κόψονται el sentido es lamentación demostrativa. «Se lamentarán» suena más natural en coordinación con «llorarán», sin perder el matiz de duelo.
  - severity: low
    issue: «De su incendio» puede desplazar levemente πύρωσις hacia el evento de incendio más que al acto de arder/quema.
    rationale: «De su quema» se ajusta mejor al griego «de su burning» auditado en inglés y mantiene la imagen de destrucción por fuego sin especificar más de la cuenta.
  revised_spanish_text: Y los reyes de la tierra, que cometieron inmoralidad sexual[a] y vivieron en lujo con ella, llorarán y se lamentarán por ella cuando vean el humo de su quema,
  revised_footnotes:
  - marker: a
    text: La expresión «cometieron inmoralidad sexual» probablemente participa en la metáfora recurrente de Apocalipsis para una alianza corrupta e idolátrica, aunque conserva la imaginería sexual del griego.
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para un español más natural y digno («vivieron en lujo», «se lamentarán»), se acerca «πύρωσις» a «su quema», y se restaura la nota auditada sobre la posible fuerza metafórica de la inmoralidad sexual en Apocalipsis. No hace falta adjudicación adicional porque los cambios son menores y bien sustentados por el rastro fuente.
