revisions:
- from: Y los reyes de la tierra, que cometieron inmoralidad sexual y vivieron en lujos con ella, llorarán y harán duelo por ella, cuando vean el humo de su incendio.
  to: Y los reyes de la tierra, que cometieron inmoralidad sexual[a] y vivieron en lujo con ella, llorarán y se lamentarán por ella cuando vean el humo de su quema,
  rationale: Se ajusta la redacción para un español más natural y digno («vivieron en lujo», «se lamentarán»), se acerca «πύρωσις» a «su quema», y se restaura la nota auditada sobre la posible fuerza metafórica de la inmoralidad sexual en Apocalipsis. No hace falta adjudicación adicional porque los cambios son menores y bien sustentados por el rastro fuente.
