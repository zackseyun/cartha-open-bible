translation:
  language: es
  text: Después de estas cosas vi a otro ángel que descendía del cielo[a], teniendo gran autoridad, y la tierra fue iluminada por su gloria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que venía bajando del cielo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la tierra fue iluminada de su gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de estas cosas
  lexicon: BDAG
  rationale: La expresión temporal-secuencial del griego se conserva con el plural demostrativo, manteniendo el avance de la visión de manera formal y natural en español.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  - observé
  lexicon: BDAG
  rationale: El aoristo introduce una nueva escena visionaria; en español, 'vi' reproduce la sencillez del verbo sin añadir matices no explícitos.
- source_word: ἄλλον ἄγγελον
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - un ángel distinto
  - otro mensajero
  lexicon: BDAG
  rationale: '''Otro'' conserva la idea de uno más del mismo tipo dentro de la secuencia visionaria, y ''ángel'' refleja el término griego sin sustituirlo por un equivalente interpretativo.'
- source_word: καταβαίνοντα ἐκ τοῦ οὐρανοῦ
  english_pob_choice: coming down out of heaven
  chosen_spanish: que descendía del cielo
  alternatives_spanish:
  - que venía bajando del cielo
  - que bajaba desde el cielo
  lexicon: BDAG
  rationale: El participio presente se vierte de modo contemporáneo con la visión; 'descendía' es natural y solemne. 'Del cielo' sigue el uso bíblico usual para οὐρανός, y evita una literalidad torpe.
- source_word: ἔχοντα ἐξουσίαν μεγάλην
  english_pob_choice: having great authority
  chosen_spanish: teniendo gran autoridad
  alternatives_spanish:
  - con gran autoridad
  - poseyendo gran autoridad
  - teniendo gran poder
  lexicon: BDAG
  rationale: ἐξουσία es más precisamente 'autoridad' que mero 'poder'; 'teniendo' conserva el participio y no diluye la comisión delegada del ángel.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: BDAG
  rationale: Aquí γῆ se mantiene amplio y cósmico; 'la tierra' es el equivalente natural en español y conserva la imagen de iluminación total.
- source_word: ἐφωτίσθη
  english_pob_choice: was illuminated
  chosen_spanish: fue iluminada
  alternatives_spanish:
  - quedó iluminada
  - se iluminó
  lexicon: BDAG
  rationale: El pasivo aoristo de φωτίζω se preserva con 'fue iluminada', que mantiene la acción recibida sin convertirla en una formulación más libre.
- source_word: ἐκ τῆς δόξης αὐτοῦ
  english_pob_choice: by his glory
  chosen_spanish: por su gloria
  alternatives_spanish:
  - desde su gloria
  - a causa de su gloria
  - de su gloria
  lexicon: BDAG
  rationale: Aunque ἐκ puede expresar origen o fuente, en esta construcción la idea es causal/instrumental; 'por su gloria' comunica bien que la gloria es el medio o la fuente de la iluminación. Se evita borrar la tensión fuente/medio que el griego permite.
theological_decisions:
- issue: Naturaleza del ángel resplandeciente y su autoridad
  english_pob_reading: The verse describes a created angel endowed with great authority and glory from God, without implying deity for the angel.
  chosen_spanish_reading: El versículo describe a un ángel creado, dotado de gran autoridad y de gloria en relación con la escena, sin implicar deidad para el ángel.
  alternative_spanish_readings:
  - El ángel podría entenderse con un resplandor exaltado por su gloria.
  - La gloria del ángel podría leerse de forma más intensificada.
  rationale: El texto atribuye autoridad y gloria al ángel, pero no lo identifica como divino. La redacción española conserva esa afirmación sin suavizarla ni expandirla doctrinalmente, manteniendo la tensión teológica del pasaje.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios; se mantiene la lectura estable y de alta concordancia con el griego. No hay revisiones aplicadas en el expediente, así que el borrador español sigue directamente esa base auditada.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en otros contextos cuando corresponde al Tetragrámaton; aquí no aparece el nombre divino.
  - '''Ángel'' se conserva sin reinterpretarlo como mensajero humano, en coherencia con el griego.'
  - '''Gloria'' mantiene el valor bíblico de δόξα sin convertirlo en mera fama o esplendor mundano.'
  - '''Tierra'' se eligió para γῆ por la amplitud cósmica del contexto apocalíptico.'
