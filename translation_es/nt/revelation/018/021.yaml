translation:
  language: es
  text: 'Y un ángel poderoso levantó una piedra como una gran piedra de molino y la arrojó al mar, diciendo: «Así será arrojada Babilonia, la gran ciudad, con violencia[a], y nunca más será hallada»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Con violencia» traduce el valor adverbial de ὁρμήματι; también puede entenderse como «con ímpetu», «con fuerza» o «violentamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦρεν
  english_pob_choice: lifted up
  chosen_spanish: levantó
  alternatives_spanish:
  - alzó
  - levantó en alto
  lexicon: BDAG
  rationale: El aoristo de αἴρω expresa aquí el acto de tomar o alzar la piedra para la acción simbólica. «Levantó» es natural en español y conserva el movimiento deliberado sin añadir matices innecesarios.
- source_word: εἷς ἄγγελος ἰσχυρὸς
  english_pob_choice: one mighty angel
  chosen_spanish: un ángel poderoso
  alternatives_spanish:
  - un ángel fuerte
  - un ángel potente
  lexicon: BDAG
  rationale: εἷς se refleja con el artículo indefinido «un», y ἰσχυρός puede ser «fuerte» o «poderoso». «Poderoso» funciona bien en registro apocalíptico y mantiene la fuerza del término.
- source_word: λίθον ὡς μύλινον μέγαν
  english_pob_choice: a stone like a great millstone
  chosen_spanish: una piedra como una gran piedra de molino
  alternatives_spanish:
  - una piedra como una enorme piedra de molino
  - una piedra semejante a una gran piedra de molino
  lexicon: BDAG
  rationale: La comparación con ὡς se conserva explícitamente con «como». «Piedra de molino» comunica el referente cultural de μύλινος sin perder la imagen de gran peso.
- source_word: ἔβαλεν εἰς τὴν θάλασσαν
  english_pob_choice: threw it into the sea
  chosen_spanish: la arrojó al mar
  alternatives_spanish:
  - la lanzó al mar
  - la echó al mar
  lexicon: BDAG
  rationale: βάλλω aquí es lanzar/arrojAR con fuerza. «Arrojó» reproduce mejor la energía del gesto que un verbo más neutro, y «mar» es un equivalente natural de θάλασσα en español bíblico.
- source_word: ὁρμήματι
  english_pob_choice: with violence
  chosen_spanish: con violencia
  alternatives_spanish:
  - con ímpetu
  - con fuerza
  - de un golpe
  lexicon: BDAG
  rationale: El dativo instrumental/adverbial de ὅρμημα transmite un movimiento súbito y arrollador. «Con violencia» expresa bien tanto la rapidez como la contundencia del juicio, siguiendo la decisión inglesa de mantener la fuerza del término.
- source_word: βληθήσεται
  english_pob_choice: be thrown down
  chosen_spanish: será arrojada
  alternatives_spanish:
  - será echada
  - caerá
  lexicon: BDAG
  rationale: El pasivo futuro de βάλλω retoma el gesto simbólico anterior. En español, «será arrojada» preserva la imagen de derribo violento sin explicitar «abajo» más de lo que el griego exige; el contexto ya comunica la caída.
- source_word: Βαβυλὼν ἡ μεγάλη πόλις
  english_pob_choice: Babylon the great city
  chosen_spanish: Babilonia, la gran ciudad
  alternatives_spanish:
  - Babilonia la gran ciudad
  - Babilonia, la ciudad grande
  lexicon: BDAG
  rationale: Se mantiene el título apocalíptico como apposición. «La gran ciudad» conserva el epíteto fijo y evita resolver si el referente es literal, simbólico o ambos.
- source_word: οὐ μὴ εὑρεθῇ ἔτι
  english_pob_choice: it will never be found again
  chosen_spanish: nunca más será hallada
  alternatives_spanish:
  - ya no será hallada
  - no se hallará jamás
  lexicon: BDAG
  rationale: La combinación οὐ μή con subjuntivo expresa negación enfática. «Nunca más será hallada» transmite bien la certeza y la permanencia de la desaparición, incluyendo el valor de ἔτι.
theological_decisions:
- issue: Naturaleza de Babilonia y del juicio anunciado
  english_pob_reading: Rendered the judgment as forceful and final without specifying whether 'Babylon' is literal, symbolic, or both.
  chosen_spanish_reading: Se traduce el juicio como súbito, violento y definitivo, sin decidir si «Babilonia» es una ciudad literal, un símbolo o ambos.
  alternative_spanish_readings:
  - Babilonia como ciudad literal
  - Babilonia como sistema simbólico opuesto a Dios
  - Babilonia como símbolo apocalíptico compuesto
  rationale: El versículo presenta un acto simbólico y una sentencia de ruina total, pero no obliga a una sola identificación escatológica. La traducción conserva esa tensión sin resolverla por adelantado.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y no requirió cambios sustantivos; por eso la redacción española sigue de cerca la solución auditada y mantiene la imaginería y la negación enfática del original.
  spanish_consistency_notes:
  - Se usa «Babilonia» para Βαβυλών y «Yahvé» no aplica en este versículo.
  - Se mantiene «mar» para θάλασσα y «piedra de molino» para μύλινον, evitando formas más arcaicas.
  - Se conservó la tensión apocalíptica sobre el referente de Babilonia sin glosa doctrinal en el texto principal.
