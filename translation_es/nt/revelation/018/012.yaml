  rationale: Se corrige el anclaje de la nota al pie para que corresponda a θύϊνον, se adopta 'madera de cidro' para alinearse con 'citron wood' del audit trail manteniendo la alternativa tradicional en nota, se explicitan πορφύρας y κοκκίνου como telas comerciales ('tela púrpura', 'tela escarlata'), se mejora la naturalidad con 'cargamento' y se alisa la sintaxis final. También se amplía σκεῦος a 'objeto', que en español suena menos restrictivo que 'recipiente' para ambos usos repetidos.
