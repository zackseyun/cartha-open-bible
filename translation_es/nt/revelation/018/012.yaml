translation:
  language: es
  text: cargamento de oro y plata y piedras preciosas y perlas y lino fino y tela púrpura y seda y tela escarlata, y toda clase de madera de cidro[a] y toda clase de objeto de marfil y toda clase de objeto hecho de madera muy preciosa, y de bronce y de hierro y de mármol,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madera de tuya», una traducción tradicional para una madera aromática y costosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: γόμον
  english_pob_choice: cargo
  chosen_spanish: carga
  alternatives_spanish:
  - cargamento
  - mercancía
  lexicon: BDAG
  rationale: γόμος denota la carga o flete de una nave. En una lista comercial como esta, «carga» conserva el sentido colectivo y la idea de mercancía transportada sin introducir una interpretación extra.
- source_word: λίθου τιμίου
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedra preciosa
  - gemas
  lexicon: BDAG
  rationale: Aunque el griego está en singular genitivo, la serie funciona como inventario de materiales. El plural español «piedras preciosas» comunica naturalmente la lista de bienes de lujo y conserva el valor colectivo que refleja la revisión inglesa.
- source_word: μαργαριτῶν
  english_pob_choice: pearls
  chosen_spanish: perlas
  alternatives_spanish:
  - perlas finas
  lexicon: BDAG
  rationale: Sentido léxico estándar; se mantiene el plural porque el griego también es plural.
- source_word: βυσσίνου
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino de lino fino
  - tela de lino fino
  lexicon: BDAG
  rationale: βύσσινος se refiere a lino fino de alta calidad. «Lino fino» es claro, sobrio y apto para un inventario de mercancías de lujo.
- source_word: πορφύρας
  english_pob_choice: purple cloth
  chosen_spanish: púrpura
  alternatives_spanish:
  - tela púrpura
  - paño púrpura
  lexicon: BDAG
  rationale: El término puede referirse al tinte, la tela o prendas púrpuras. En español, «púrpura» funciona de manera natural como bien comercial y evita forzar una especificación que el griego no exige explícitamente.
- source_word: σιρικοῦ
  english_pob_choice: silk
  chosen_spanish: seda
  alternatives_spanish:
  - tela de seda
  - tejido de seda
  lexicon: BDAG
  rationale: σιρικός designa seda o bienes de seda. «Seda» es la equivalencia española normal y conserva el carácter lujoso de la lista.
- source_word: κοκκίνου
  english_pob_choice: scarlet cloth
  chosen_spanish: escarlata
  alternatives_spanish:
  - tela escarlata
  - tela de escarlata
  lexicon: BDAG
  rationale: κόκκινος expresa el color escarlata aplicado aquí a un bien textil. En español, «escarlata» puede funcionar sustantivamente en una lista de mercancías; se evita añadir «tela» porque el original no lo repite de forma explícita.
- source_word: πᾶν ξύλον θύϊνον
  english_pob_choice: every kind of citron wood
  chosen_spanish: toda clase de madera de tuya
  alternatives_spanish:
  - toda clase de madera de thyine
  - toda clase de madera aromática
  lexicon: BDAG
  rationale: θύϊνος designa una madera costosa y aromática, tradicionalmente identificada con la tuya/thuya. «Madera de tuya» preserva la referencia concreta y deja constancia de la identificación tradicional; la alternativa inglesa «thyine wood» queda reflejada en la opción alternativa española.
- source_word: πᾶν σκεῦος ἐλεφάντινον
  english_pob_choice: every kind of ivory vessel
  chosen_spanish: todo tipo de recipiente de marfil
  alternatives_spanish:
  - toda clase de objeto de marfil
  - todo tipo de vasija de marfil
  lexicon: BDAG
  rationale: σκεῦος es un término amplio para recipiente, utensilio u objeto. «Recipiente» mantiene una forma natural en español y preserva la amplitud semántica sin estrechar indebidamente el referente.
- source_word: πᾶν σκεῦος ἐκ ξύλου τιμιωτάτου
  english_pob_choice: every kind of vessel made from very precious wood
  chosen_spanish: todo tipo de recipiente hecho de madera muy preciosa
  alternatives_spanish:
  - todo tipo de objeto hecho de madera muy valiosa
  - todo tipo de vasija hecha de madera muy preciosa
  lexicon: BDAG
  rationale: τιμιωτάτου es el superlativo de τίμιος; por eso se traduce con «muy preciosa» para reflejar el énfasis de valor elevado. La construcción «hecho de» reproduce con naturalidad ἐκ.
- source_word: χαλκοῦ
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: BDAG
  rationale: χαλκός puede significar cobre o bronce; en inventarios de bienes de lujo y uso bíblico común, «bronce» resulta más idiomático y probable.
- source_word: σιδήρου
  english_pob_choice: iron
  chosen_spanish: hierro
  lexicon: BDAG
  rationale: Equivalencia léxica estándar.
- source_word: μαρμάρου
  english_pob_choice: marble
  chosen_spanish: mármol
  lexicon: BDAG
  rationale: Equivalencia léxica estándar para el material pétreo.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente mantuvo la estructura general del inventario, ajustando dos expresiones para naturalidad y concordancia colectiva: «precious stones» en plural y «very precious wood» para el superlativo. La versión española refleja esa misma lectura colectiva con «piedras preciosas» y conserva el superlativo con «madera muy preciosa».'
  spanish_consistency_notes:
  - Se mantiene el estilo de inventario comercial con repeticiones de «y» para respetar la enumeración del griego.
  - Se evita traducir ύλον/ξύλον de forma genérica como «madera» cuando el contexto exige un bien comercial específico; por eso se expresa «madera de tuya» y «madera muy preciosa».
  - Se conserva «púrpura» y «escarlata» como bienes de lujo, sin imponer «tela» en el texto principal para no sobreespecificar más allá del griego.
  - Se usa «recipiente» para σκεῦος como término amplio y legible en español.
  - Se conserva el orden acumulativo de materiales y objetos para reflejar el impacto retórico de la lista.
