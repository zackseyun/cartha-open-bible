review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la lista de mercancías de lujo de γόμον y conserva la mayoría de los materiales correctamente: oro, plata, piedras preciosas, perlas, lino fino, seda, bronce, hierro y mármol. Sin embargo, en español se pierde algo de la explicitud comercial de πορφύρας y κοκκίνου al dejarlos solo como colores/sustantivos (''púrpura'', ''escarlata'') donde el contexto pide telas o tejidos; además, la nota al pie está anclada en ''escarlata'' pero en realidad corresponde a θύϊνον, no a κοκκίνου. También conviene mejorar ''madera de tuya'', que suena poco natural y botánicamente inestable, y hacer más fluida la coordinación final para evitar la impresión de que bronce, hierro y mármol modifican ''madera''.'
  spanish_quality_summary: 'El texto es legible, pero presenta varios giros poco naturales para un español bíblico claro: ''madera de tuya'' suena extraño; la nota al pie está mal colocada; y la secuencia ''recipiente hecho de madera muy preciosa y de bronce y de hierro y de mármol'' puede leerse torpemente. ''Cargamento'' suena más idiomático que ''carga'' en una lista mercantil de Apocalipsis. ''Tela púrpura'' y ''tela escarlata'' comunican mejor el referente comercial sin sobreinterpretar.'
  glossary_alignment: 'No hay términos teológicos de alto riesgo aquí. Las decisiones léxicas principales son compatibles con el proyecto. La principal desviación es de precisión/comercialidad: πορφύρας y κοκκίνου deben reflejarse como bienes textiles, y la alternativa tradicional de θύϊνον debe ir en nota sobre la madera correspondiente.'
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en 'escarlata' pero explica θύϊνον.
    rationale: Esto desinforma al lector porque vincula la nota lexical a κοκκίνου en vez de πᾶν ξύλον θύϊνον. El marcador debe moverse a la frase sobre la madera.
  - severity: medium
    issue: '''madera de tuya'' es poco natural y potencialmente confusa en español general.'
    rationale: Aunque intenta reflejar la identificación tradicional, no es una formulación ampliamente clara. 'Madera de cidro' funciona mejor con el audit trail inglés ('citron wood'), conservando la alternativa tradicional en nota.
  - severity: medium
    issue: '''púrpura'' y ''escarlata'' sin ''tela'' pierden la fuerza de mercancía textil en esta lista.'
    rationale: En un inventario comercial, el español entiende mejor 'tela púrpura' y 'tela escarlata'; así se preserva la intención que el POB inglés hizo explícita.
  - severity: low
    issue: '''carga'' es menos idiomático que ''cargamento'' para γόμον en este contexto.'
    rationale: Ambas son posibles, pero 'cargamento' suena más natural para una lista de bienes transportados por comerciantes y naves.
  - severity: low
    issue: La coordinación final con repetidos 'de' puede sonar enredada.
    rationale: Separar mejor los últimos elementos evita que 'bronce, hierro y mármol' parezcan depender sintácticamente de 'madera'.
  revised_spanish_text: cargamento de oro y plata y piedras preciosas y perlas y lino fino y tela púrpura y seda y tela escarlata, y toda clase de madera de cidro[a] y toda clase de objeto de marfil y toda clase de objeto hecho de madera muy preciosa, y de bronce y de hierro y de mármol,
  revised_footnotes:
