source:
  edition: SBLGNT
  text: καὶ φωνὴ κιθαρῳδῶν καὶ μουσικῶν καὶ αὐλητῶν καὶ σαλπιστῶν οὐ μὴ ἀκουσθῇ ἐν σοὶ ἔτι, καὶ πᾶς τεχνίτης πάσης τέχνης οὐ μὴ εὑρεθῇ ἐν σοὶ ἔτι, καὶ φωνὴ μύλου οὐ μὴ ἀκουσθῇ ἐν σοὶ ἔτι,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/022.yaml
  text: And the sound of harpists and musicians and flute players and trumpeters will never be heard in you again[a], and no craftsman of any craft will ever be found in you again, and the sound of a mill will never be heard in you again[b],
  footnotes:
  - marker: a
    text: Or 'pipers' for 'flute players'; the Greek refers to players of the αὐλός, an ancient wind instrument not identical to the modern flute.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound of a millstone'; the Greek can refer to the mill apparatus more specifically, but 'mill' captures the broader image of grinding activity.
    reason: lexical_alternative
