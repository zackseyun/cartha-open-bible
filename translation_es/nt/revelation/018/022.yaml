revisions:
- from: Y el sonido de arpistas, músicos, flautistas[a] y trompetistas nunca más se oirá en ti; y ningún artesano de ningún oficio nunca más se hallará en ti; y el sonido de un molino[b] nunca más se oirá en ti.
  to: Y el sonido de arpistas, músicos, flautistas[a] y trompetistas nunca más se oirá en ti; y ya no se hallará en ti ningún artesano de ningún oficio; y el sonido de un molino[b] nunca más se oirá en ti.
  rationale: Se ajusta la cláusula central para un español más natural sin perder la fuerza de ausencia total. También se mejora la nota de αὐλητῶν para evitar una alternativa oscura en español neutro, y se simplifica la nota de μύλου para mantener una alternativa clara y fiel al expediente inglés.
