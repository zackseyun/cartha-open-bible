translation:
  language: es
  text: Y el sonido de arpistas, músicos, flautistas[a] y trompetistas nunca más se oirá en ti; y ya no se hallará en ti ningún artesano de ningún oficio; y el sonido de un molino[b] nunca más se oirá en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tocadores de flauta»; el griego se refiere a quienes tocan el αὐλός, un antiguo instrumento de viento no idéntico a la flauta moderna.
    reason: lexical_alternative
  - marker: b
    text: O «el sonido de una piedra de molino»; el griego puede referirse más específicamente al aparato de moler, pero «molino» conserva la imagen amplia de la actividad de molienda.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνὴ
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  - el ruido
  lexicon: BDAG
  rationale: Aquí φωνή designa sonido audible, no habla. «El sonido» conserva bien la repetición del versículo y sirve tanto para los músicos como para el molino.
- source_word: κιθαρῳδῶν
  english_pob_choice: harpists
  chosen_spanish: arpistas
  alternatives_spanish:
  - tañedores de cítara
  - citaredos
  lexicon: BDAG
  rationale: El griego apunta a intérpretes de instrumento de cuerdas. «Arpistas» es natural en español y comunica la clase de músicos sin tecnicismo innecesario.
- source_word: μουσικῶν
  english_pob_choice: musicians
  chosen_spanish: músicos
  alternatives_spanish:
  - cantores
  - intérpretes musicales
  lexicon: BDAG
  rationale: El término funciona aquí como categoría amplia de personas vinculadas con la música. «Músicos» es el equivalente más directo y natural.
- source_word: αὐλητῶν
  english_pob_choice: flute players
  chosen_spanish: flautistas
  alternatives_spanish:
  - piteros
  - tocadores de flauta
  lexicon: BDAG
  rationale: El αὐλητής toca el αὐλός, instrumento de viento antiguo. «Flautistas» es claro para el lector español; se mantiene la cautela histórica en la nota.
- source_word: σαλπιστῶν
  english_pob_choice: trumpeters
  chosen_spanish: trompetistas
  alternatives_spanish:
  - tocadores de trompeta
  - trompeteros
  lexicon: BDAG
  rationale: «Trompetistas» es idiomático y conciso para quienes tocan trompeta.
- source_word: οὐ μὴ ἀκουσθῇ
  english_pob_choice: will never be heard
  chosen_spanish: nunca más se oirá
  alternatives_spanish:
  - no se oirá jamás
  - nunca se escuchará
  lexicon: BDAG
  rationale: La combinación οὐ μή con aoristo subjuntivo expresa negación enfática y definitiva. «Nunca más» transmite bien la finalización irreversible en español.
- source_word: ἐν σοὶ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - dentro de ti
  - en medio de ti
  lexicon: BDAG
  rationale: Se conserva la segunda persona directa y la personificación de Babilonia como ciudad dirigida en modo profético.
- source_word: ἔτι
  english_pob_choice: again
  chosen_spanish: nunca más
  alternatives_spanish:
  - ya no
  - otra vez
  lexicon: BDAG
  rationale: En esta fórmula de juicio, ἔτι expresa que la acción cesa por completo. «Nunca más» capta mejor la irreversibilidad que un simple «otra vez».
- source_word: πᾶς τεχνίτης πάσης τέχνης
  english_pob_choice: no craftsman of any craft
  chosen_spanish: ningún artesano de ningún oficio
  alternatives_spanish:
  - ningún obrero de ningún trabajo
  - ningún artesano de toda clase
  lexicon: BDAG
  rationale: La repetición griega enfatiza totalidad. «Artesano de ningún oficio» conserva esa amplitud sin perder naturalidad en español.
- source_word: εὑρεθῇ
  english_pob_choice: will ever be found
  chosen_spanish: se hallará
  alternatives_spanish:
  - se encontrará
  - será hallado
  lexicon: BDAG
  rationale: Con la negación enfática del contexto, «nunca más se hallará» expresa ausencia total. «Hallar» es un verbo claro y menos burocrático que «encontrar» en esta fórmula profética.
- source_word: μύλου
  english_pob_choice: of a mill
  chosen_spanish: de un molino
  alternatives_spanish:
  - de una muela
  - de un molino de piedra
  lexicon: BDAG
  rationale: El genitivo describe el sonido asociado con la actividad de moler. «Molino» preserva la imagen amplia del trabajo cotidiano, como en el texto inglés auditado.
theological_decisions:
- issue: Finalidad del juicio sobre Babilonia
  english_pob_reading: A threefold declaration that the ordinary sounds of celebration, skilled labor, and daily provision will cease completely in the judged city.
  chosen_spanish_reading: Una declaración triple de que los sonidos ordinarios de celebración, trabajo especializado y provisión diaria cesarán por completo en la ciudad juzgada.
  alternative_spanish_readings:
  - Detalles decorativos sin fuerza simbólica
  - Una imagen puramente literaria sin alcance judicial
  rationale: La repetición de οὐ μή ... ἔτι comunica una desolación total e irreversible. La traducción mantiene la imaginería concreta sin suavizarla ni alegorizarla en exceso.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no muestran revisiones sustantivas. La versión española sigue la misma estructura ternaria y conserva el énfasis absoluto de οὐ μή ... ἔτι.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este versículo no lo contiene.
  - Se usa «Mesías» como preferencia general cuando corresponda; aquí no aparece ningún título cristológico.
  - Se conserva el paralelismo de tres miembros y la negación enfática con «nunca más» para reflejar la fuerza del griego.
  - Se traduce φωνή como «sonido» para abarcar tanto instrumentos musicales como el molino, evitando «voz» por ser menos natural en este contexto.
