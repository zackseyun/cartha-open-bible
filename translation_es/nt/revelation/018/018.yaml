revisions:
- from: 'Y gritaron al ver el humo de su incendio[a], diciendo: «¿Qué ciudad es semejante a la gran ciudad?».'
  to: 'Y gritaron al ver el humo de su quema, diciendo: «¿Qué ciudad[a] es semejante a la gran ciudad?»'
  rationale: Se reemplaza «incendio» por «quema» para reflejar mejor πύρωσις como el proceso o estado de arder. Se traslada la nota al pie a la pregunta elíptica, en línea con la auditoría inglesa, y se elimina el punto final sobrante tras la cita.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:52:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: ἔκραξαν = «gritaron», βλέποντες = «al ver», καπνὸν = «humo», y la pregunta elíptica se aclara correctamente con «qué ciudad». También conserva el presente «es» y la personificación de la ciudad mediante «su». Sin embargo, «de su incendio» desplaza el matiz de πυρώσεως desde el proceso/estado de arder hacia el evento «incendio», y la nota al pie actual introduce alternativas menos útiles que la alternativa auditada en inglés sobre la elipsis de la pregunta.'
  spanish_quality_summary: 'El español es claro y natural. La estructura fluye bien y el registro es apropiado. La mejora necesaria es léxica: «el humo de su quema» o «el humo de que ella arde» se acerca más al valor de πύρωσις que «su incendio». Además, la puntuación española no requiere punto después de la comilla de cierre cuando toda la oración ya queda cerrada por el signo de interrogación; conviene quitarlo.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La personificación femenina está bien preservada. La revisión propuesta mantiene la fidelidad léxica a πυρώσις y conserva la aclaración elíptica con una nota más alineada con la auditoría inglesa.
  issues:
  - severity: medium
    issue: «su incendio» para τῆς πυρώσεως αὐτῆς
    rationale: πύρωσις denota el arder o la quemazón/la quema, más que necesariamente un «incendio» como evento. «Incendio» es comprensible, pero añade un matiz de suceso que no es tan preciso como el valor léxico documentado en la auditoría inglesa.
  - severity: medium
    issue: La nota al pie no preserva la alternativa principal auditada sobre la elipsis de la pregunta
    rationale: La POB inglesa conserva una nota sobre «What was like the great city?». En español, la nota más útil y mejor alineada explica que el griego es elíptico y que «ciudad» se hace explícito. La nota actual sobre «quemadura/combustión» no recoge esa decisión auditada clave.
  - severity: low
    issue: Punto final después de la comilla de cierre
    rationale: En español, si la cita termina con signo de interrogación que cierra también el enunciado citado, no hace falta añadir un punto después de la comilla final en este contexto.
  revised_spanish_text: 'Y gritaron al ver el humo de su quema, diciendo: «¿Qué ciudad[a] es semejante a la gran ciudad?»'
  revised_footnotes:
  - marker: a
    text: 'O: «¿Qué era semejante a la gran ciudad?». El griego es elíptico; «ciudad» se hace explícito en español para aclarar la comparación.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «incendio» por «quema» para reflejar mejor πύρωσις como el proceso o estado de arder. Se traslada la nota al pie a la pregunta elíptica, en línea con la auditoría inglesa, y se elimina el punto final sobrante tras la cita.
