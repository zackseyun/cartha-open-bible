translation:
  language: es
  text: 'Y gritaron al ver el humo de su quema, diciendo: «¿Qué ciudad[a] es semejante a la gran ciudad?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué era semejante a la gran ciudad?». El griego es elíptico; «ciudad» se hace explícito en español para aclarar la comparación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκραξαν
  english_pob_choice: they cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - exclamaron
  lexicon: BDAG
  rationale: El aoristo de κράζω expresa un grito fuerte. «Gritaron» comunica bien esa intensidad en español sin sonar forzado.
- source_word: βλέποντες
  english_pob_choice: as they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vieron
  - viendo
  lexicon: BDAG
  rationale: El participio contemporáneo se expresa de forma natural con «al ver», conservando la simultaneidad con el verbo principal.
- source_word: τὸν καπνὸν
  english_pob_choice: the smoke
  chosen_spanish: el humo
  alternatives_spanish:
  - el humo espeso
  - la humareda
  lexicon: BDAG
  rationale: καπνός se traduce de manera directa por «humo».
- source_word: τῆς πυρώσεως
  english_pob_choice: burning
  chosen_spanish: de su incendio
  alternatives_spanish:
  - de su quema
  - de su ardor
  - de la combustión
  lexicon: BDAG
  rationale: πύρωσις se refiere al proceso o estado de arder. «Incendio» transmite con fuerza el evento de destrucción por fuego en español, aunque otras opciones son posibles. Se conserva la relación posesiva con la ciudad/personificación.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  lexicon: BDAG
  rationale: El referente es la ciudad personificada. En español, el posesivo «su» mantiene la referencia femenina sin recargar el estilo.
- source_word: Τίς ὁμοία τῇ πόλει τῇ μεγάλῃ;
  english_pob_choice: What city is like the great city?
  chosen_spanish: ¿Qué ciudad es semejante a la gran ciudad?
  alternatives_spanish:
  - ¿Qué ciudad es como la gran ciudad?
  - ¿Cuál ciudad es semejante a la gran ciudad?
  lexicon: BDAG
  rationale: El griego es elíptico y la POB inglesa suple «city». En español, «¿Qué ciudad es semejante a la gran ciudad?» mantiene la pregunta retórica, el sustantivo explícito y la comparación directa sin añadir elementos ajenos al texto.
- source_word: τῇ πόλει τῇ μεγάλῃ
  english_pob_choice: the great city
  chosen_spanish: la gran ciudad
  alternatives_spanish:
  - la ciudad grande
  - esa gran ciudad
  lexicon: BDAG
  rationale: La construcción articular con adjetivo identifica a la ciudad bien conocida en el contexto. «La gran ciudad» es natural y fiel.
theological_decisions:
- issue: Personificación de la ciudad/Babilonia
  english_pob_reading: Retain feminine reference ('her') for the city
  chosen_spanish_reading: Mantener la referencia posesiva femenina implícita en «su»
  alternative_spanish_readings:
  - Usar «de ella»
  - neutralizar con «su» sin referencia personificada
  rationale: Apocalipsis personifica Babilonia/la ciudad como figura femenina. En español, «su» preserva la posesión sin perder la personificación ni sonar artificial.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the source text''s plain sense and literary force.'
- issue: Expresión elíptica de la comparación
  english_pob_reading: The Greek is elliptical; 'city' is supplied in English to make the comparison explicit.
  chosen_spanish_reading: Conservar el sustantivo explícito «ciudad» en la pregunta.
  alternative_spanish_readings:
  - ¿Qué es semejante a la gran ciudad?
  - ¿Quién es semejante a la gran ciudad?
  rationale: El griego permite suplir el sustantivo, pero el texto ya lo ofrece con claridad en la frase final. Mantener «ciudad» evita ambigüedad y sigue de cerca el valor retórico del original.
  doctrine_reference: 'Translation philosophy: source-language primacy with auditable clarity.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó la comparación al presente («is like»). En español, el presente copulativo «es semejante» refleja esa relación directa y actual sin introducir pasado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - «Gran ciudad» se traduce de forma estable para mantener la referencia contextual de Apocalipsis.
  - La personificación femenina queda preservada en el posesivo «su» asociado a la ciudad.
