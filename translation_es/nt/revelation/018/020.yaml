translation:
  language: es
  text: «Alégrate por ella[a], oh cielo, y ustedes santos, apóstoles y profetas, porque Dios ha pronunciado juicio a favor de ustedes contra ella.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: «porque Dios la ha juzgado por causa de ustedes», o «porque Dios ha vengado su causa contra ella». El griego es condensado: literalmente, «Dios juzgó el juicio de ustedes desde ella».'
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐφραίνου
  english_pob_choice: Rejoice
  chosen_spanish: Regocíjate
  alternatives_spanish:
  - Alégrate
  - Alegraos
  lexicon: BDAG
  rationale: El imperativo exhortativo pide un verbo de alegría directa. 'Regocíjate' conserva el tono solemne y el valor exhortativo sin perder naturalidad en español.
- source_word: ἐπ’ αὐτῇ
  english_pob_choice: over her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - por causa de ella
  - acerca de ella
  lexicon: BDAG
  rationale: Con verbos de regocijo, la preposición expresa el motivo u objeto de la alegría. 'Sobre ella' mantiene la imagen y la relación con la caída de Babilonia.
- source_word: οὐρανέ
  english_pob_choice: O heaven
  chosen_spanish: oh cielo
  alternatives_spanish:
  - cielo
  - oh, cielo
  lexicon: BDAG
  rationale: El vocativo se conserva con una invocación directa. 'Oh cielo' refleja el llamado personificado y mantiene el tono elevado.
- source_word: οἱ ἅγιοι
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - santos de Dios
  - los santos
  lexicon: BDAG
  rationale: '''Santos'' es el equivalente natural y conciso para ἅγιοι en este contexto apocalíptico, donde designa al pueblo de Dios.'
- source_word: οἱ ἀπόστολοι
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: Se conserva el sentido técnico eclesial de 'apóstoles', que encaja con la lista junto a profetas.
- source_word: οἱ προφῆται
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - los profetas
  lexicon: BDAG
  rationale: Rendición estándar y fiel del sustantivo plural.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la exhortación y en español 'porque' resulta claro y directo.
- source_word: ἔκρινεν
  english_pob_choice: has pronounced judgment
  chosen_spanish: ha pronunciado juicio
  alternatives_spanish:
  - ha juzgado
  - ha dictado sentencia
  lexicon: BDAG
  rationale: El aoristo se presenta como acción completa con relevancia actual. 'Ha pronunciado juicio' refleja el acto judicial sin obligar a una lectura más específica de venganza.
- source_word: τὸ κρίμα ὑμῶν
  english_pob_choice: for you
  chosen_spanish: a favor de ustedes
  alternatives_spanish:
  - su juicio
  - el juicio para ustedes
  - su causa
  lexicon: BDAG
  rationale: La construcción griega es comprimida y puede evocar juicio/vindicación a favor de los destinatarios. 'A favor de ustedes' explicita la orientación favorable que el contexto sugiere, sin borrar el lenguaje judicial.
- source_word: ἐξ αὐτῆς
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - desde ella
  - de ella
  lexicon: BDAG
  rationale: '''Contra ella'' transmite la dirección adversativa del juicio en español y resuelve con naturalidad la preposición griega dentro del contexto de la caída de Babilonia.'
theological_decisions:
- issue: Cómo rendir la idea de vindicación/judicio en favor del pueblo de Dios sin añadir una noción más fuerte que el griego explícito
  english_pob_reading: Because God has pronounced judgment for you against her.
  chosen_spanish_reading: Porque Dios ha pronunciado juicio a favor de ustedes contra ella.
  alternative_spanish_readings:
  - Porque Dios los ha vengado en ella.
  - Porque Dios ha juzgado a su favor contra ella.
  - Porque Dios ha ejecutado su causa contra ella.
  rationale: El griego usa lenguaje de juicio (κρίνω / κρίμα) y permanece comprimido. La traducción principal conserva ese campo semántico y hace explícita la orientación favorable para los santos sin introducir 'venganza' como lectura obligatoria en el texto principal.
  doctrine_reference: Principios POB de primacía del original y de preservar la tensión lexical cuando el griego es abreviado o densamente judicial.
translation_notes:
  revision_awareness: 'La redacción inglesa pasó de una traducción más literal y forzada (''has judged your judgment from her'') a una formulación más natural y exegéticamente clara (''has pronounced judgment for you against her''). La versión española sigue esa revisión: conserva el núcleo judicial de κρίμα/ἔκρινεν, pero evita una literalidad opaca y explicita la orientación favorable del juicio en el contexto de la caída de Babilonia.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός.
  - Se mantiene 'santos', 'apóstoles' y 'profetas' como lista eclesial directa.
  - '''Juicio'' se usa para κρίμα; no se sustituye por ''venganza'' en el texto principal para no resolver interpretivamente el matiz.'
  - La invocación 'oh cielo' preserva el vocativo personificado de οὐρανέ.
  - El pronombre plural de trato se expresa con 'ustedes' para claridad y naturalidad en español neutro.
