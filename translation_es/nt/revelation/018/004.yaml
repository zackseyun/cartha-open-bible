source:
  edition: SBLGNT
  text: Καὶ ἤκουσα ἄλλην φωνὴν ἐκ τοῦ οὐρανοῦ λέγουσαν· ⸀Ἐξέλθατε, ⸂ὁ λαός μου, ἐξ αὐτῆς⸃, ἵνα μὴ συγκοινωνήσητε ταῖς ἁμαρτίαις αὐτῆς, καὶ ἐκ τῶν πληγῶν αὐτῆς ἵνα μὴ λάβητε·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/004.yaml
  text: And I heard another voice from heaven saying[a], “Come out of her, my people, so that you may not share in her sins[b], and so that you may not receive any of her plagues.”
  footnotes:
  - marker: a
    text: Or 'Go out of her, my people.' The imperative Ἐξέλθατε can be rendered either way; 'Come out' is chosen as the more natural English summons from a heavenly voice.
    reason: lexical_alternative
  - marker: b
    text: Babylon is referred to with feminine language ('her'), preserving the book's personification of the city/system as a woman.
    reason: cultural_note
