translation:
  language: es
  text: 'Y oí otra voz desde el cielo que decía: «Salgan de ella[a], pueblo mío, para que no participen en sus pecados[b], ni reciban ninguna de sus plagas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Salgan de ella, pueblo mío». El imperativo Ἐξέλθατε puede expresarse de forma directa como salida o como abandono; aquí se eligió «Salgan» por ser más natural en español, con el complemento «de ella» manteniendo el referente femenino.
    reason: lexical_alternative
  - marker: b
    text: Se mantiene el lenguaje femenino de Babilonia («ella» / «sus») para conservar la personificación del texto apocalíptico.
    reason: cultural_note
lexical_decisions:
- source_word: ἄλλην φωνὴν
  english_pob_choice: another voice
  chosen_spanish: otra voz
  alternatives_spanish:
  - una voz diferente
  lexicon: BDAG
  rationale: ἄλλην con φωνή indica una voz adicional, distinta de la anterior. «Otra voz» es natural en español y conserva la distinción sin sobreinterpretar.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde el cielo
  lexicon: BDAG
  rationale: En Apocalipsis οὐρανός aquí designa el ámbito celestial. «Desde el cielo» mantiene el origen de la voz y su matiz de procedencia más que de simple ubicación.
- source_word: Ἐξέλθατε
  english_pob_choice: Come out
  chosen_spanish: Salgan
  alternatives_spanish:
  - Salgan de ahí
  - Salgan de ella
  - Salid
  lexicon: BDAG
  rationale: El imperativo plural aoristo de ἐξέρχομαι es una orden directa de abandonar. En español, «Salgan de ella» expresa mejor el mandato y evita la posible rareza de un «vengan fuera» literal.
- source_word: ὁ λαός μου
  english_pob_choice: my people
  chosen_spanish: pueblo mío
  alternatives_spanish:
  - mi pueblo
  - oh, pueblo mío
  lexicon: BDAG
  rationale: La estructura vocativa se conserva con «pueblo mío», que suena natural y solemne en español. «Mi pueblo» también es posible, pero aquí la inversión ayuda a reflejar el llamado directo.
- source_word: ἐξ αὐτῆς
  english_pob_choice: out of her
  chosen_spanish: de ella
  alternatives_spanish:
  - fuera de ella
  - de su interior
  lexicon: BDAG
  rationale: El pronombre femenino retiene la personificación de Babilonia. «De ella» en español transmite la salida sin forzar una expresión más pesada; el sentido de «fuera de» queda implícito por el verbo «salgan».
- source_word: ἵνα μὴ συγκοινωνήσητε
  english_pob_choice: so that you may not share in
  chosen_spanish: para que no participen en
  alternatives_spanish:
  - para que no tengan parte en
  - para que no compartan en
  lexicon: BDAG
  rationale: συγκοινωνέω implica participación o comunión en algo. «Participen en» preserva la fuerza de complicidad moral y evita una traducción demasiado abstracta.
- source_word: ταῖς ἁμαρτίαις αὐτῆς
  english_pob_choice: her sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus delitos
  - sus maldades
  lexicon: BDAG
  rationale: «Pecados» es el equivalente directo y conserva el peso moral-teológico del plural. El posesivo «sus» mantiene la referencia a Babilonia.
- source_word: ἐκ τῶν πληγῶν αὐτῆς
  english_pob_choice: from her plagues
  chosen_spanish: de sus plagas
  alternatives_spanish:
  - de sus azotes
  - de sus golpes
  lexicon: BDAG
  rationale: En Apocalipsis πληγή se usa para juicios/plagas divinas. «Plagas» es la equivalencia más adecuada y conserva la resonancia bíblica.
- source_word: ἵνα μὴ λάβητε
  english_pob_choice: so that you may not receive
  chosen_spanish: ni reciban
  alternatives_spanish:
  - para que no reciban
  - ni obtengan
  lexicon: BDAG
  rationale: λήβητε expresa recibir o experimentar algo. En una coordinación negativa con la cláusula anterior, «ni reciban» fluye con naturalidad y mantiene el paralelismo del aviso.
theological_decisions:
- issue: Referente femenino de αὐτῆς
  english_pob_reading: Retain feminine personal language ('her') for Babylon rather than neutralizing to 'it.'
  chosen_spanish_reading: Mantener la personificación femenina («ella», «sus») en vez de neutralizarla a un neutro impersonal.
  alternative_spanish_readings:
  - neutralizar a «eso» o «la ciudad»
  - usar solo un referente impersonal
  rationale: Apocalipsis personifica Babilonia como mujer, y el pronombre femenino forma parte de la imagen literaria. Mantener «ella» y «sus» preserva esa coherencia sin añadir explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación de los dos propósitos negativos
  english_pob_reading: Render both as purpose/result clauses with 'so that you may not ... and so that you may not ...'
  chosen_spanish_reading: Mantener dos cláusulas finales/propósito negativas coordinadas con «para que no ... ni ...».
  alternative_spanish_readings:
  - usar «no sea que»
  - unirlas en una sola advertencia
  rationale: El griego repite ἵνα μὴ para enfatizar dos consecuencias que deben evitarse. En español, «para que no ... ni ...» conserva la estructura coordinada y el tono de advertencia.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «any of» antes de «her plagues» para reflejar con más naturalidad ἐκ τῶν πληγῶν αὐτῆς. En español se reflejó con «ninguna de sus plagas», que expresa bien la idea partitiva y la negación de recibir siquiera una porción de ese juicio.
  spanish_consistency_notes:
  - Se mantuvo «cielo» para οὐρανός en sentido celestial, no meteorológico.
  - Se preservó la personificación femenina de Babilonia mediante «ella» y «sus».
  - Se tradujo συγκοινωνέω con «participen en» por su fuerza de complicidad/participación moral.
  - Se usó «plagas» para πληγῶν por su peso intertextual en Apocalipsis.
  - La doble negación en español («para que no ... ni ...») reproduce las dos cláusulas ἵνα μή sin alargar innecesariamente la frase.
