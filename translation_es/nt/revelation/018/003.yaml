translation:
  language: es
  text: Porque todas las naciones han caído por el vino del furor[a] de su inmoralidad sexual, y los reyes de la tierra cometieron inmoralidad sexual con ella[b], y los mercaderes de la tierra se enriquecieron por el poder de su lujo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pasión» o «ira». θυμός puede expresar fuerte pasión o furor; en este contexto de juicio, «furor» conserva mejor la intensidad.'
    reason: lexical_alternative
  - marker: b
    text: El lenguaje de «inmoralidad sexual» aquí probablemente funciona de manera metafórica para una alianza corrupta, idolátrica y explotadora, pero la traducción conserva la imaginería sexual del griego.
    reason: alternative_reading
  - marker: c
    text: 'O: «lujo entregado al exceso» o «lujo autocomplaciente». στρῆνος denota lujo decadente, no simple comodidad material.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduces la razón del juicio anunciado; «Porque» conserva la fuerza causal de ὅτι con español natural y sobrio.
- source_word: ἐκ τοῦ οἴνου
  english_pob_choice: from the wine
  chosen_spanish: por el vino
  alternatives_spanish:
  - del vino
  - a causa del vino
  lexicon: BDAG
  rationale: ἐκ marca origen o causa; «por» expresa bien la causa en español y mantiene la imagen metafórica del vino como fuente del efecto.
- source_word: θυμοῦ
  english_pob_choice: wrath
  chosen_spanish: furor
  alternatives_spanish:
  - ira
  - pasión
  lexicon: BDAG
  rationale: θυμός puede ser ira o pasión intensa. «Furor» conserva la intensidad y el tono de juicio de Apocalipsis sin suavizar la imagen.
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - prostitución
  lexicon: BDAG
  rationale: Se mantiene el campo semántico sexual de πορνεία con una expresión comprensible en español moderno, sin reducirla solo a prostitución física.
- source_word: πέπτωκαν
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - han bebido
  - han sucumbido
  lexicon: BDAG
  rationale: La revisión auditada corrigió la lectura para reflejar πέπτωκαν. «Han caído» sigue de cerca el verbo y permite que la causalidad de ἐκ se entienda en el contexto.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las naciones gentiles
  lexicon: BDAG
  rationale: ἔθνη aquí designa a las naciones en conjunto; «naciones» es la forma más natural y evita estrechar el sentido a «gentiles».
- source_word: μετ’ αὐτῆς ἐπόρνευσαν
  english_pob_choice: committed sexual immorality with her
  chosen_spanish: se prostituyeron con ella
  alternatives_spanish:
  - cometieron inmoralidad sexual con ella
  - fornicaron con ella
  lexicon: BDAG
  rationale: El verbo πορνεύω se conserva con una forma verbal afín en español para mantener la transparencia léxica con πορνεία; «se prostituyeron» suena fuerte y refleja la alianza ilícita e infiel del pasaje.
- source_word: ἔμποροι
  english_pob_choice: merchants
  chosen_spanish: mercaderes
  alternatives_spanish:
  - comerciantes
  - traders
  lexicon: BDAG
  rationale: «Mercaderes» es idiomático y bíblico en español, y encaja con el contexto comercial de Apocalipsis 18.
- source_word: ἐκ τῆς δυνάμεως
  english_pob_choice: from the power of
  chosen_spanish: por el poder de
  alternatives_spanish:
  - a causa del poder de
  - de la fuerza de
  lexicon: BDAG
  rationale: δύναμις conserva su sentido de capacidad/poder; «por el poder de» comunica el medio o fuerza productiva de la cual surgió su enriquecimiento.
- source_word: στρήνους
  english_pob_choice: luxury
  chosen_spanish: lujo
  alternatives_spanish:
  - derroche
  - lujuria
  - desenfreno
  lexicon: BDAG
  rationale: στρῆνος denota lujo excesivo y autoindulgente. «Lujo» es claro en español, y el matiz de exceso queda disponible en la nota.
- source_word: ἐπλούτησαν
  english_pob_choice: grew rich
  chosen_spanish: se enriquecieron
  alternatives_spanish:
  - se hicieron ricos
  - obtuvieron riqueza
  lexicon: BDAG
  rationale: «Se enriquecieron» expresa bien el resultado del aoristo y mantiene el sentido económico del texto.
theological_decisions:
- issue: Cómo traducir πορνεία/πορνεύω en Apocalipsis 18:3 sin borrar la metáfora
  english_pob_reading: Retain the sexual-immorality language in the main text
  chosen_spanish_reading: Mantener el lenguaje de inmoralidad sexual / prostitución en el texto principal
  alternative_spanish_readings:
  - idolatría
  - adulterio espiritual
  rationale: Apocalipsis usa deliberadamente una metáfora sexual para describir alianza corrupta, idolátrica y explotadora. Traducirla de manera literal conserva la tensión teológica en vez de resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cómo reflejar la secuencia causal del verso con πέπτωκαν y ἐκ
  english_pob_reading: have fallen because of the wine
  chosen_spanish_reading: han caído por el vino
  alternative_spanish_readings:
  - han caído a causa del vino
  - han caído por causa del vino
  rationale: La forma española «han caído por» comunica de modo natural la relación causal que la preposición ἐκ establece, y evita forzar un giro menos idiomático.
  doctrine_reference: Audit trail revision on REV.18.3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se abandonó la lectura «han bebido de» y se adoptó la corrección a πέπτωκαν («han caído»), preservando el valor causal de ἐκ. También se mantuvo la decisión de conservar el campo semántico sexual de πορνεία/πορνεύω y el matiz de exceso de στρῆνος, sin convertirlos en categorías interpretativas más abstractas.'
  spanish_consistency_notes:
  - Se mantiene «naciones» para ἔθνη, no «gentiles», por el alcance colectivo del pasaje.
  - Se evita «SEÑOR» u otras sustituciones de nombre divino porque el versículo no contiene el Tetragrámaton.
  - «Mercaderes» se usa de forma consistente para ἔμποροι en contextos comerciales apocalípticos.
  - La frase «se prostituyeron con ella» preserva la cohesión léxica con «inmoralidad sexual» en la primera cola del verso.
