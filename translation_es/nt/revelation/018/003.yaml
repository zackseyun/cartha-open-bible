  to: Porque todas las naciones han caído por el vino del furor[a] de su inmoralidad sexual, y los reyes de la tierra cometieron inmoralidad sexual con ella[b], y los mercaderes de la tierra se enriquecieron por el poder de su lujo[c].
  rationale: Se revisa principalmente «se prostituyeron con ella» a «cometieron inmoralidad sexual con ella» para reflejar con mayor fidelidad ἐπόρνευσαν y la decisión documentada del POB de preservar el lenguaje sexual sin reducirlo a prostitución. También se elimina la nota redundante sobre «han caído» y se añade la nota metafórica correspondiente al lenguaje de inmoralidad sexual, en línea con la auditoría inglesa.
