review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: los mercaderes/mercaderes de la tierra lamentan a Babilonia porque ya nadie compra su cargamento. Conserva la personificación femenina con «ella» y distingue los dos verbos de lamento. Sin embargo, los marcadores de notas al pie están invertidos respecto de su contenido: [a] aparece anclado en «ella» pero explica γόμον («cargamento/mercancía»), mientras [b] aparece anclado en «cargamento» pero explica τῆς γῆς («de la tierra/de la tierra»).'
  spanish_quality_summary: El español es claro y digno. «Mercaderes» es aceptable y «cargamento» es una buena elección para γόμον. «Lloran y hacen duelo» es fiel, aunque algo menos idiomático que «lloran y se lamentan» o «lloran y guardan luto»; no exige cambio. «Sobre ella» suena un poco rígido en español, pero sigue siendo comprensible y preserva la relación con ἐπ’ αὐτήν sin despersonalizar la imagen.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La preservación de «ella» para Babilonia concuerda con la decisión teológica documentada.
  issues:
  - severity: high
    issue: Los marcadores de notas al pie [a] y [b] están colocados en frases equivocadas.
    rationale: La nota [a] explica «cargamento/mercancía» (γόμον), por lo que debe anclarse en «cargamento». La nota [b] explica «de la tierra/de la tierra» (τῆς γῆς), por lo que debe anclarse en «de la tierra». Tal como está, el lector recibe información léxica asociada al segmento incorrecto.
  - severity: low
    issue: La formulación de la nota [b] en español repite «de la tierra» como alternativa sin aportar contraste real.
    rationale: Aunque proviene del rastro inglés, en español el contraste explícito útil sería más bien entre alcance más literal y sentido mundial. No obstante, puede dejarse tal como está si solo se corrige el anclaje, porque el contenido principal de la nota sigue siendo entendible.
  revised_spanish_text: Y los mercaderes de la tierra[b] lloran y hacen duelo sobre ella, porque ya nadie compra su cargamento[a].
  revised_footnotes:
  - marker: a
    text: O «mercancía». El término griego puede denotar la carga de una nave o bienes comerciales; aquí «cargamento» resalta el contexto del comercio.
    reason: lexical_alternative
  - marker: b
    text: O «de la tierra». En Apocalipsis, «la tierra» suele tener un sentido más amplio, de alcance mundial.
    reason: lexical_alternative
  revision_rationale: Se corrigen únicamente los anclajes de las notas al pie para que correspondan a las palabras que explican en el texto fuente y en la auditoría inglesa. No se requiere cambio léxico principal en la traducción.
