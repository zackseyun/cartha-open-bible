translation:
  language: es
  text: Y los mercaderes de la tierra[b] lloran y hacen duelo sobre ella, porque ya nadie compra su cargamento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mercancía». El término griego puede denotar la carga de una nave o bienes comerciales; aquí «cargamento» resalta el contexto del comercio.
    reason: lexical_alternative
  - marker: b
    text: O «de la tierra». En Apocalipsis, «la tierra» suele tener un sentido más amplio, de alcance mundial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔμποροι
  english_pob_choice: merchants
  chosen_spanish: mercaderes
  alternatives_spanish:
  - comerciantes
  - mercaderes
  lexicon: BDAG
  rationale: «Mercaderes» expresa con naturalidad el sentido comercial de ἔμποροι y mantiene el matiz de quienes trafican en bienes. En español bíblico evita la posible vaguedad de «comerciantes» sin perder fidelidad.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del mundo
  lexicon: BDAG
  rationale: La fuente griega dice literalmente «de la tierra». En Apocalipsis la expresión puede tener alcance mundial, pero el español puede conservar la forma literal y dejar esa amplitud implícita.
- source_word: κλαίουσιν καὶ πενθοῦσιν
  english_pob_choice: weep and mourn
  chosen_spanish: lloran y hacen duelo
  alternatives_spanish:
  - lloran y se lamentan
  - lloran y hacen duelo
  lexicon: BDAG
  rationale: 'Se mantienen dos verbos distintos para reflejar la intensificación retórica: κλαίω = llorar; πενθέω = guardar luto / hacer duelo. «Hacen duelo» comunica mejor el matiz funerario de πενθέω que un simple «se lamentan».'
- source_word: ἐπ’ αὐτήν
  english_pob_choice: over her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - por ella
  - sobre ella
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo en contexto de lamento expresa duelo dirigido hacia alguien. «Sobre ella» conserva la imagen y la personificación femenina de Babilonia.
- source_word: γόμον
  english_pob_choice: cargo
  chosen_spanish: cargamento
  alternatives_spanish:
  - cargamento
  - carga
  lexicon: BDAG
  rationale: γόμος puede designar una carga de nave o mercancía transportada. «Cargamento» conserva el sentido comercial y marítimo del contexto inmediato mejor que el más general «mercancía».
- source_word: οὐδεὶς ἀγοράζει οὐκέτι
  english_pob_choice: no one buys anymore
  chosen_spanish: ya nadie compra
  alternatives_spanish:
  - ya nadie compra
  - nadie compra ya
  lexicon: BDAG
  rationale: Se conserva la idea de cese total de οὐκέτι con una construcción natural en español. «Ya nadie compra» transmite la finalización de la actividad sin forzar el orden griego.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - su
  - de ellos
  lexicon: BDAG
  rationale: El pronombre posesivo singular «su» concuerda con «cargamento» y reproduce el posesivo de los mercaderes en español natural.
theological_decisions:
- issue: Personificación de Babilonia
  english_pob_reading: The feminine pronoun is preserved as 'her,' maintaining the personified city imagery without interpreting beyond the text.
  chosen_spanish_reading: Se conserva «ella» para mantener la personificación femenina de Babilonia.
  alternative_spanish_readings:
  - ello
  - la ciudad
  rationale: Apocalipsis presenta Babilonia como figura femenina/personificada. Traducir con «ella» preserva la imaginería literaria y evita desdibujar la referencia del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El contexto inglés de la POB mantiene «merchants», «cargo», «over her» y una nota alternativa para γόμος, con «of the earth» como alternativa contextual. No se reportan revisiones posteriores; se conserva la misma lectura de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene la personificación femenina con «ella».
  - Se evita reemplazar «mercaderes» por lenguaje eclesiástico tradicional que no está sustentado por el griego.
  - Se distingue «lloran» de «hacen duelo» para no aplanar los dos verbos griegos.
  - El uso de «cargamento» sigue la decisión léxica de γόμος en un marco comercial y marítimo.
