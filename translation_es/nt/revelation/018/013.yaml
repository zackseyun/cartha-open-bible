translation:
  language: es
  text: y canela, y especia[a], y incienso, y perfume, y olíbano, y vino, y aceite de oliva, y flor de harina, y trigo, y ganado, y ovejas, y caballos, y carrozas, y esclavos[b], es decir, almas humanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amomo', una especia aromática costosa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'cuerpos'; es decir, seres humanos vendidos como esclavos.
    reason: lexical_alternative
lexical_decisions:
- source_word: κιννάμωμον
  english_pob_choice: cinnamon
  chosen_spanish: canela
  alternatives_spanish:
  - canelo
  - cinamomo
  lexicon: BDAG
  rationale: El término designa una especia aromática de comercio. 'Canela' es el equivalente natural y reconocible en español, aunque el griego pueda abarcar una mercancía aromática importada relacionada con la canela.
- source_word: ἄμωμον
  english_pob_choice: spice
  chosen_spanish: especia
  alternatives_spanish:
  - amomo
  - cardamomo
  - especia aromática
  lexicon: BDAG
  rationale: La palabra alude a una especia aromática costosa. 'Especia' comunica el valor comercial sin forzar una identificación técnica oscura; la opción más específica queda implícita en el listado de lujos.
- source_word: θυμιάματα
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - sahumerios
  - aromas para quemar
  lexicon: BDAG
  rationale: En esta lista comercial se trata de mercancía aromática, no del acto ritual. 'Incienso' es la traducción natural y precisa en español.
- source_word: μύρον
  english_pob_choice: perfume
  chosen_spanish: perfume
  alternatives_spanish:
  - ungüento
  - aceite perfumado
  lexicon: BDAG
  rationale: Designa un producto aromático costoso. 'Perfume' funciona bien en español moderno y conserva el sentido de mercancía lujosa.
- source_word: λίβανον
  english_pob_choice: frankincense
  chosen_spanish: olíbano
  alternatives_spanish:
  - incienso de olíbano
  - incienso
  lexicon: BDAG
  rationale: El griego nombra específicamente el olíbano, distinto del incienso general anterior. En español, 'olíbano' preserva esa distinción lexical con mayor exactitud que repetir 'incienso'.
- source_word: ἔλαιον
  english_pob_choice: olive oil
  chosen_spanish: aceite de oliva
  alternatives_spanish:
  - aceite
  - aceite vegetal
  lexicon: BDAG
  rationale: En este contexto el referente es aceite de oliva. Explicitarlo evita ambigüedad y corresponde al contexto de mercancías.
- source_word: σεμίδαλιν
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: BDAG
  rationale: El término refiere harina de alta calidad. 'Flor de harina' es una expresión bíblica y comprensible en español que conserva la idea de refinamiento del producto.
- source_word: σῖτον
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  - cereal
  lexicon: BDAG
  rationale: Aquí el término señala el cereal básico en una lista de comercio. 'Trigo' es la equivalencia natural en español y coincide con la lectura específica adoptada en el texto fuente en inglés.
- source_word: κτήνη
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - bestias de carga
  - ganado vacuno
  lexicon: BDAG
  rationale: El término puede denotar animales domésticos o de trabajo. 'Ganado' preserva la amplitud del griego y encaja mejor con la lista comercial que un término más restrictivo.
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaños
  lexicon: BDAG
  rationale: El sustantivo significa directamente ovejas. 'Ovejas' es la forma más clara y literal en español.
- source_word: ῥεδῶν
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carrozas
  - carruajes
  lexicon: BDAG
  rationale: El término designa vehículos de cuatro ruedas. 'Carros' mantiene la imagen de vehículo, evita la connotación bélica de 'carros de guerra' y funciona bien en español; la referencia de lujo se preserva por el contexto comercial.
- source_word: σωμάτων
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - cuerpos
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'cuerpos', el contexto comercial apunta a personas traficadas como esclavos. Se elige 'esclavos' para reflejar la referencia contextual documentada por la POB inglesa, manteniendo el impacto ético del pasaje.
- source_word: ψυχὰς ἀνθρώπων
  english_pob_choice: human souls
  chosen_spanish: almas humanas
  alternatives_spanish:
  - vidas humanas
  - personas
  lexicon: BDAG
  rationale: La frase intensifica la deshumanización al contrastar con 'esclavos'. 'Almas humanas' conserva el valor léxico de ψυχή y la fuerza del complemento genitivo, sin reducirlo a un mero sinónimo de 'personas'.
theological_decisions:
- issue: Relación entre σωμάτων y ψυχὰς ἀνθρώπων
  english_pob_reading: slaves, that is, human souls
  chosen_spanish_reading: esclavos, es decir, almas humanas
  alternative_spanish_readings:
  - cuerpos y almas humanas
  - cuerpos, es decir, seres humanos vendidos como esclavos
  rationale: El texto denuncia el comercio deshumanizante de personas. 'Esclavos, es decir, almas humanas' hace explícita la interpretación contextual y conserva el choque retórico entre la mercancía física y la dignidad interior/persona humana, sin ocultar la literalidad del griego 'cuerpos'.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó ῥεδῶν de 'carriages' a 'chariots' y revisó la clausula final de 'bodies—and human souls' a 'slaves, that is, human souls'. La redacción española sigue esa revisión al usar 'carros' para el vehículo de cuatro ruedas y 'esclavos, es decir, almas humanas' para reflejar el sentido contextual sin perder la literalidad subyacente de σωμάτων.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'almas humanas' para ψυχὰς ἀνθρώπων, coherente con la decisión de la POB inglesa de preservar la intensidad del contraste con 'esclavos'.
  - Se evita 'SEÑOR' o formas de enmascaramiento porque no hay cita directa del nombre divino en el verso.
  - '''Carros'' se adopta por naturalidad española y porque la referencia es a vehículos de cuatro ruedas en un contexto de lujo/comercio, no a carros de guerra.'
