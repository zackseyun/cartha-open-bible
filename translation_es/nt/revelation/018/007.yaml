revisions:
- from: 'Tanto como se glorificó a sí misma y vivió en lujo[a], denle tanto tormento y duelo. Porque en su corazón dice: “Me siento como reina, y no soy viuda[b], y duelo no veré jamás”.'
  to: 'Cuanto se glorificó a sí misma y vivió en lujo[a], denle tanto tormento y duelo. Porque en su corazón dice: “Estoy sentada como reina, y no soy viuda, y no veré jamás duelo[b]”.'
  rationale: Se corrige la ambigüedad de ‘Me siento como reina’ usando ‘Estoy sentada como reina’, que conserva la imagen de entronización del griego. También se mejora la naturalidad de la correlación proporcional con ‘Cuanto... tanto...’ y se mueve la nota [b] a la cláusula que realmente explica, la negación enfática final.
