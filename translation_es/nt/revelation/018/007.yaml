review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro POB en casi todos los elementos: mantiene la proporcionalidad ὅσα...τοσοῦτον, la reflexividad de ἐδόξασεν αὑτὴν, el juicio de βασανισμός como ‘tormento’, la repetición de πένθος, la personificación femenina y la negación enfática final. La principal desalineación está en Κάθημαι βασίλισσα: ‘Me siento como reina’ en español moderno tiende a leerse como ‘me percibo/considero como reina’, no como postura entronizada; eso debilita la imagen de seguridad regia presente en el griego.'
  spanish_quality_summary: El español es generalmente claro y digno. Sin embargo, ‘Me siento como reina’ introduce una ambigüedad fuerte por el doble valor de ‘sentirse’ en español. Además, ‘Tanto como ... tanto’ suena aceptable pero algo menos natural que ‘Cuanto ... tanto’; y ‘duelo no veré jamás’ resulta comprensible, aunque un leve reajuste mejora la fluidez sin perder el énfasis.
  glossary_alignment: No hay conflictos con la terminología del proyecto. ‘Tormento’, ‘viuda’ y la personificación femenina están bien. No aplica terminología especial como Yahvé/Mesías. La nota [b] debe anclarse a la cláusula completa de negación enfática, no solo a ‘viuda’, porque explica οὐ μὴ ἴδω.
  issues:
  - severity: medium
    issue: ‘Me siento como reina’ para Κάθημαι βασίλισσα
    rationale: En español, ‘me siento’ normalmente expresa percepción o estado emocional, no el acto/postura de estar sentada o entronizada. El griego evoca la imagen de reinar sentada con seguridad; conviene ‘Estoy sentada como reina’ o similar.
  - severity: low
    issue: Anclaje de la nota [b] en ‘viuda’
    rationale: La nota explica la negación enfática de ‘no veré jamás’, no la expresión ‘no soy viuda’. Debe colocarse junto a la cláusula final correspondiente.
  - severity: low
    issue: Correlación inicial algo rígida
    rationale: ‘Tanto como se glorificó... y vivió en lujo, denle tanto...’ es entendible, pero ‘Cuanto... tanto...’ suena más natural y conserva mejor la estructura proporcional.
  revised_spanish_text: 'Cuanto se glorificó a sí misma y vivió en lujo[a], denle tanto tormento y duelo. Porque en su corazón dice: “Estoy sentada como reina, y no soy viuda, y no veré jamás duelo[b]”.'
  revised_footnotes:
  - marker: a
    text: O ‘vivió sensualmente’ o ‘vivió en autoindulgencia’. El verbo griego puede denotar una vida lujosa, desenfrenada o complaciente.
    reason: lexical_alternative
  - marker: b
    text: La expresión “no veré jamás duelo” reproduce la negación enfática del griego, que expresa seguridad absoluta de que el duelo nunca le sobrevendrá.
    reason: lexical_alternative
  revision_rationale: Se corrige la ambigüedad de ‘Me siento como reina’ usando ‘Estoy sentada como reina’, que conserva la imagen de entronización del griego. También se mejora la naturalidad de la correlación proporcional con ‘Cuanto... tanto...’ y se mueve la nota [b] a la cláusula que realmente explica, la negación enfática final.
