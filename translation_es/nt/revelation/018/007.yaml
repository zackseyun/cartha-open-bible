translation:
  language: es
  text: 'Cuanto se glorificó a sí misma y vivió en lujo[a], denle tanto tormento y duelo. Porque en su corazón dice: “Estoy sentada como reina, y no soy viuda, y no veré jamás duelo[b]”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘vivió sensualmente’ o ‘vivió en autoindulgencia’. El verbo griego puede denotar una vida lujosa, desenfrenada o complaciente.
    reason: lexical_alternative
  - marker: b
    text: La expresión “no veré jamás duelo” reproduce la negación enfática del griego, que expresa seguridad absoluta de que el duelo nunca le sobrevendrá.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσα ... τοσοῦτον
  english_pob_choice: As much as ... that much
  chosen_spanish: Tanto como ... tanto
  alternatives_spanish:
  - En la medida en que ... en esa misma medida
  - Así como ... así tanto
  lexicon: BDAG
  rationale: Conserva la estructura correlativa de proporcionalidad entre el pecado y el castigo, sin volverla rígidamente literal en español.
- source_word: ἐδόξασεν αὑτὴν
  english_pob_choice: she glorified herself
  chosen_spanish: se glorificó a sí misma
  alternatives_spanish:
  - se hizo gloriosa
  - se honró a sí misma
  lexicon: BDAG
  rationale: Mantiene el vínculo verbal con gloria/exaltación y refleja explícitamente el matiz reflexivo de autoexaltación.
- source_word: ἐστρηνίασεν
  english_pob_choice: lived in luxury
  chosen_spanish: vivió en lujo
  alternatives_spanish:
  - vivió sensualmente
  - vivió en autoindulgencia
  - se entregó al lujo
  lexicon: BDAG
  rationale: La expresión comunica bien la vida fastuosa y complaciente del contexto de Apocalipsis 18 sin reducir el término a una connotación sexual que el verbo no exige aquí.
- source_word: δότε αὐτῇ
  english_pob_choice: give her
  chosen_spanish: denle
  alternatives_spanish:
  - entréguenle
  - devuélvanle
  lexicon: BDAG
  rationale: 'El imperativo plural conserva el tono judicial y distributivo del griego: retribuir a ella lo correspondiente.'
- source_word: βασανισμὸν
  english_pob_choice: torment
  chosen_spanish: tormento
  alternatives_spanish:
  - tortura
  - dolor
  lexicon: BDAG
  rationale: ‘Tormento’ mantiene la severidad del juicio sin especificar un mecanismo que el texto no define.
- source_word: πένθος
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - llanto
  lexicon: BDAG
  rationale: ‘Duelo’ funciona naturalmente en español para el lamento por pérdida y preserva la repetición del motivo en el versículo.
- source_word: ἐν τῇ καρδίᾳ αὐτῆς λέγει
  english_pob_choice: she says in her heart
  chosen_spanish: en su corazón dice
  alternatives_spanish:
  - se dice a sí misma
  - dice dentro de sí
  lexicon: BDAG
  rationale: Conserva el modismo bíblico de interioridad y autoafirmación orgullosa.
- source_word: Κάθημαι βασίλισσα
  english_pob_choice: I sit as a queen
  chosen_spanish: Me siento como reina
  alternatives_spanish:
  - Estoy sentada como reina
  - Me siento reina
  lexicon: BDAG
  rationale: ‘Me siento como reina’ preserva la imagen de postura segura y entronizada con español natural; ‘reina’ evita añadir un artículo o formalidad no presentes en el griego.
- source_word: χήρα οὐκ εἰμί
  english_pob_choice: I am not a widow
  chosen_spanish: no soy viuda
  alternatives_spanish:
  - no soy una viuda
  - no estoy viuda
  lexicon: BDAG
  rationale: La frase es directa y mantiene la imagen de invulnerabilidad a la pérdida y al abandono.
- source_word: οὐ μὴ ἴδω
  english_pob_choice: I will certainly never see
  chosen_spanish: no veré jamás
  alternatives_spanish:
  - ciertamente no veré
  - nunca veré
  lexicon: BDAG
  rationale: En español, ‘no veré jamás’ transmite con naturalidad la negación enfática absoluta del οὐ μή griego; el sentido de certeza queda en el valor total de la construcción.
theological_decisions:
- issue: Personificación de Babilonia como mujer/reina/viuda
  english_pob_reading: Retain the feminine singular personification throughout ('she,' 'queen,' 'widow').
  chosen_spanish_reading: Mantener la personificación femenina singular (“se glorificó…”, “reina”, “viuda”).
  alternative_spanish_readings:
  - Reducirla a una ciudad impersonal
  - Neutralizar el género gramatical
  rationale: El griego presenta a Babilonia como figura femenina coherente; conservarlo preserva la retórica profética de autoexaltación y juicio.
  doctrine_reference: Translation philosophy §1, §5
- issue: Lenguaje de juicio en βασανισμός
  english_pob_reading: Use 'torment' in the main text.
  chosen_spanish_reading: Usar ‘tormento’ en el texto principal.
  alternative_spanish_readings:
  - tortura
  - dolor
  rationale: ‘Tormento’ comunica la severidad judicial sin sobreespecificar el medio del castigo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto sigue de cerca el acuerdo alto del audit trail inglés y no introduce revisiones nuevas; conserva la correlación proporcional, la personificación femenina y la negación enfática del final del versículo.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como convención del proyecto solo cuando corresponde; este versículo no contiene el Tetragrámaton.
  - Se prefirió ‘tormento’ para βασανισμός y ‘duelo’ para πένθος, manteniendo un registro bíblico claro y contemporáneo.
  - ‘Reina’ y ‘viuda’ se mantuvieron en femenino singular para reflejar la personificación de Babilonia.
