id: REV.18.8
reference: Revelation 18:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: διὰ τοῦτο ἐν μιᾷ ἡμέρᾳ ἥξουσιν αἱ πληγαὶ αὐτῆς, θάνατος καὶ πένθος καὶ λιμός, καὶ ἐν πυρὶ κατακαυθήσεται· ὅτι ἰσχυρὸς κύριος ὁ θεὸς ὁ κρίνας αὐτήν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/008.yaml
  text: 'For this reason[a], in one day her plagues will come: death and mourning and famine, and she will be burned up with fire[c][b]; for mighty is the Lord God who judged her.'
  footnotes:
  - marker: a
    text: Or 'pestilence' for 'death,' if the term is understood as a plague category rather than death in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty' instead of 'strong.'
    reason: lexical_alternative
  - marker: c
    text: Or 'who has judged her'; the Greek participle can be rendered with an English perfect to emphasize the completed judicial act.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: d200094d9384645f44e3bbfa6b3aef7f9195b1c47039ab101e7cbc9a9076d4ea
    timestamp: '2026-04-18T23:37:39Z'
    output_hash: fe7d243097617dba521ef7311fa143fa23969e2b22c25d5ef39725bf93c9b677
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:05Z'
    unchanged: false
    changes_summary: Changed 'because strong is' to 'for mighty is' for more natural formal English and a better rendering of ἰσχυρός, while preserving the verse's meaning and structure.
translation:
  language: es
  text: 'Por esta razón, en un solo día vendrán sus plagas: muerte[a], duelo y hambruna; y será consumida por fuego[b]; porque poderoso[c] es el Señor Dios que la juzgó[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pestilencia' para 'muerte', si el término se entiende como categoría de plaga más que como muerte en general.
    reason: lexical_alternative
  - marker: b
    text: O 'será quemada con fuego'; el verbo intensivo griego puede expresar destrucción completa.
    reason: lexical_alternative
  - marker: c
    text: O 'fuerte' en lugar de 'poderoso'.
    reason: lexical_alternative
  - marker: d
    text: O 'que la ha juzgado'; el participio griego puede verterse con un perfecto para subrayar el acto judicial cumplido.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esto
  alternatives_spanish:
  - Por esta razón
  - Por lo tanto
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la relación causal-consecuencial sin perder el enlace explícito del griego.
- source_word: ἐν μιᾷ ἡμέρᾳ
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - dentro de un solo día
  lexicon: BDAG
  rationale: Mantiene la compresión temporal y el énfasis judicial del pasaje con una formulación clara y digna.
- source_word: ἥξουσιν
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - llegarán
  - sobrevendrán
  lexicon: BDAG
  rationale: Para las plagas como sujeto, 'vendrán' conserva la idea de irrupción futura sin sonar artificial en español.
- source_word: αἱ πληγαὶ αὐτῆς
  english_pob_choice: her plagues
  chosen_spanish: sus plagas
  alternatives_spanish:
  - las plagas sobre ella
  - sus aflicciones
  lexicon: BDAG
  rationale: '''Plagas'' refleja el valor de juicio divino en Apocalipsis; ''sus'' conserva la referencia posesiva directa del griego.'
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - pestilencia
  lexicon: BDAG
  rationale: Se conserva el sentido directo del sustantivo. Aunque 'pestilencia' es una alternativa posible en contextos de plaga, el griego aquí enumera juicios, no solo una enfermedad.
- source_word: πένθος
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - luto
  - lamento
  lexicon: BDAG
  rationale: '''Duelo'' comunica bien la lamentación pública y la tristeza asociada al juicio; evita un calco demasiado literal pero mantiene el registro solemne.'
- source_word: λιμός
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez
  lexicon: BDAG
  rationale: '''Hambre'' es la opción natural en español, aunque ''famine'' sería más técnica; aquí preserva el impacto del castigo sin perder inteligibilidad.'
- source_word: ἐν πυρὶ κατακαυθήσεται
  english_pob_choice: she will be burned up with fire
  chosen_spanish: será quemada con fuego
  alternatives_spanish:
  - será consumida por el fuego
  - será totalmente abrasada con fuego
  lexicon: BDAG
  rationale: Se mantiene la imagen de destrucción por fuego. No se añade 'por completo' en el texto principal para no sobreexplicitar el intensivo del verbo, pero el sentido de ruina queda claro.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce con claridad la razón del juicio en español moderno y se ajusta al enlace causal del griego.
- source_word: ἰσχυρὸς
  english_pob_choice: strong / mighty
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - mighty
  lexicon: BDAG
  rationale: '''Fuerte'' es un equivalente directo y sobrio de ἰσχυρός. En español puede sonar menos tradicional que ''poderoso'', pero preserva la fuerza lexical sin sustituirla por una formulación más interpretativa.'
- source_word: κύριος ὁ θεός
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - el Señor, Dios
  - el Señor, el Dios
  lexicon: BDAG
  rationale: Se sigue el valor titular de κύριος para Dios con 'Señor'. Aunque el proyecto usa 'Yahvé' para יהוה, aquí el griego dice κύριος y la collocación fija 'Señor Dios' comunica la relación titular del texto base.
- source_word: ὁ κρίνας αὐτήν
  english_pob_choice: who judged her
  chosen_spanish: que la juzgó
  alternatives_spanish:
  - que la ha juzgado
  - que la condenó
  lexicon: BDAG
  rationale: El aoristo participial se refleja con el pretérito simple para un acto judicial definido. 'Juzgó' evita añadir una conclusión más específica que el verbo griego no exige.
theological_decisions:
- issue: Renderización de κύριος aplicado a Dios en un contexto de juicio
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - el Señor, Dios
  - el Dueño Dios
  rationale: Se conserva el título reverencial y transparente para κύριος sin introducir 'Yahvé', porque el texto griego cita κύριος y el énfasis aquí recae en el señorío judicial de Dios. 'Señor Dios' es la forma española más natural y fiel al sintagma.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Relación entre el aoristo participial final y la certeza del juicio
  english_pob_reading: who judged her
  chosen_spanish_reading: que la juzgó
  alternative_spanish_readings:
  - que la ha juzgado
  - que la condena
  rationale: Se mantiene la acción judicial como acto ya definido sin forzar un aspecto perfecto ni una lectura procesual. Esto preserva la tensión del griego entre acto consumado y fuerza explicativa en la cláusula causal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado, que prefirió ''mighty'' por naturalidad formal y por el valor de ἰσχυρός. En español se eligió ''fuerte'' como equivalente directo y sobrio, manteniendo el juicio como acto ya realizado con ''juzgó'' y sin añadir material interpretativo extra. También se preservó la estructura causal y la secuencia de tres juicios: muerte, duelo y hambre.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος según el patrón del proyecto para el griego, sin sustituirlo por 'Yahvé'.
  - '''Plagas'' se conserva como término apocalíptico de juicio, acorde con el uso de Apocalipsis.'
  - Se evita 'Cristo' porque no aparece en el texto ni en el contexto inmediato.
  - La cláusula final conserva el orden causal del griego para facilitar la lectura pública y la auditoría textual.
