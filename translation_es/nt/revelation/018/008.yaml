revisions:
- from: 'Por esto, en un solo día vendrán sus plagas: muerte, duelo y hambre; y será quemada[a] con fuego[b]; porque fuerte[c] es el Señor Dios que la juzgó[d].'
  to: 'Por esta razón, en un solo día vendrán sus plagas: muerte[a], duelo y hambruna; y será consumida por fuego[b]; porque poderoso[c] es el Señor Dios que la juzgó[d].'
  rationale: 'Se ajusta el texto para reflejar mejor dos decisiones léxicas clave del griego y del rastro POB: ''hambruna'' por λιμός y ''será consumida por fuego'' por ἐν πυρὶ κατακαυθήσεται. También se corrigen los anclajes de notas para que correspondan exactamente a las palabras comentadas, y se reemplaza el anglicismo de la nota [c] por una alternativa española. ''Poderoso es el Señor Dios'' mejora la naturalidad y el registro sin apartarse del sentido de ἰσχυρός.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:42:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: causalidad inicial, compresión temporal, lista de juicios, destrucción por fuego y fundamento en la fuerza judicial de Dios. Sin embargo, atenúa dos decisiones léxicas importantes del rastro POB: λιμός se rebajó de ''hambre/hambruna'' a ''hambre'' en vez de la idea más específica de ''hambruna'', y ἐν πυρὶ κατακαυθήσεται quedó como ''será quemada con fuego'', sin reflejar bien la fuerza intensiva de κατακαίω. También hay anclajes de notas mal colocados: [a] está puesto sobre ''quemada'' aunque la nota trata de ''muerte'', y [b] sobre ''fuego'' aunque la nota explica toda la expresión verbal.'
  spanish_quality_summary: El español es claro y digno, pero hay ajustes de naturalidad y precisión. 'Por esto' funciona, aunque 'Por esta razón' suena algo más formal. 'Duelo' es entendible, pero 'lamento' o 'duelo' ambos son posibles; no exige cambio. 'Fuerte es el Señor Dios' suena algo rígido en español bíblico moderno; 'poderoso es el Señor Dios' comunica mejor ἰσχυρός en registro eclesial sin pérdida. Además, una nota contiene el anglicismo 'mighty', impropio en una edición española.
  glossary_alignment: 'No hay conflicto serio con la terminología del proyecto en θεός/Dios o κύριος aplicado a Dios. ''Señor Dios'' es defendible porque el texto fuente es κύριος ὁ θεός, no יהוה. La principal desalineación está en la decisión léxica: el inglés auditado elevó el matiz de κατακαίω (''burned up''), y el español debería reflejarlo con ''consumida por fuego'' o equivalente. También conviene reemplazar la alternativa inglesa ''mighty'' por español (''poderoso'').'
  issues:
  - severity: medium
    issue: λιμός traducido como 'hambre'
    rationale: λιμός en listas de juicio apocalíptico se expresa mejor como 'hambruna' o 'hambre extrema/escasez'; 'hambre' puede sonar demasiado general y menos específico que el griego y el POB inglés ('famine').
  - severity: medium
    issue: κατακαυθήσεται atenuado en 'será quemada con fuego'
    rationale: El verbo intensivo κατακαίω expresa consumición destructiva. 'Será quemada' no transmite suficientemente el matiz de ser consumida o abrasada por completo.
  - severity: high
    issue: Marcadores de notas [a] y [b] mal anclados
    rationale: La nota [a] comenta 'muerte/pestilencia', pero está colocada en 'quemada'. La nota [b] comenta la destrucción por fuego, por lo que debe anclarse en la frase verbal correspondiente, no solo en 'fuego'.
  - severity: low
    issue: Nota [c] usa el inglés 'mighty'
    rationale: Las notas deben estar enteramente en español y no introducir una alternativa inglesa innecesaria.
  revised_spanish_text: 'Por esta razón, en un solo día vendrán sus plagas: muerte[a], duelo y hambruna; y será consumida por fuego[b]; porque poderoso[c] es el Señor Dios que la juzgó[d].'
  revised_footnotes:
