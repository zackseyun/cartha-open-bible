    reason: lexical_alternative
  - marker: d
    text: O 'que la ha juzgado'; el participio griego puede verterse con un perfecto para subrayar el acto judicial cumplido.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar mejor dos decisiones léxicas clave del griego y del rastro POB: ''hambruna'' por λιμός y ''será consumida por fuego'' por ἐν πυρὶ κατακαυθήσεται. También se corrigen los anclajes de notas para que correspondan exactamente a las palabras comentadas, y se reemplaza el anglicismo de la nota [c] por una alternativa española. ''Poderoso es el Señor Dios'' mejora la naturalidad y el registro sin apartarse del sentido de ἰσχυρός.'
