revisions:
- from: Y vi un gran trono blanco y al que estaba sentado en él[a], de cuya presencia huyeron la tierra y el cielo, y no se halló lugar para ellos.
  to: Y vi un gran trono blanco y a uno sentado sobre él[a], de cuya presencia huyeron la tierra y el cielo, y no se halló lugar para ellos.
  rationale: Se ajusta la frase del entronizado a un español más natural y fiel al carácter descriptivo e indefinido del griego, sin identificar a la figura. También se prefiere 'sobre él' por mejor idiomaticidad con 'trono'. Se conserva la nota léxica sobre 'rostro' como alternativa más literal a πρόσωπον.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego general: Juan ve un gran trono blanco y al entronizado; ante su presencia huyen la tierra y el cielo; no se halla lugar para ellos. También preserva correctamente la reserva teológica sobre la identidad del que está sentado. Sin embargo, ''al que estaba sentado en él'' introduce una ''a'' personal poco natural tras ''vi'' y suena menos fiel a la estructura descriptiva del griego que ''al que estaba sentado sobre él'' o mejor ''al que estaba sentado en el trono''. Dado que el griego usa ἐπ’ αὐτοῦ, conviene evitar ''en él'' por posible aspereza estilística con ''trono''.'
  spanish_quality_summary: 'La redacción es clara y digna. ''Un gran trono blanco'', ''de cuya presencia huyeron la tierra y el cielo'' y ''no se halló lugar para ellos'' funcionan bien en español bíblico moderno. La principal mejora es la naturalidad e idiomaticidad de la frase participial: ''y a uno sentado sobre él'' suena más natural y mantiene la indefinición reverente. También conviene ajustar la nota al español más limpio con comillas tipográficas consistentes, aunque el contenido de la nota es adecuado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/Cristo ni otros términos sensibles del glosario. 'Presencia' para πρόσωπον sigue la justificación auditada; la alternativa literal 'rostro' se conserva apropiadamente en nota.
  issues:
  - severity: medium
    issue: '''al que estaba sentado en él'' suena poco natural tras ''vi'''
    rationale: En español, tras 'vi', la construcción relativa con 'al que' es posible pero aquí resulta más pesada y menos elegante que una expresión nominal indefinida como 'a uno sentado sobre él'. Además, 'en él' con 'trono' no es la opción más idiomática.
  - severity: low
    issue: La preposición 'en' con 'trono' es menos idiomática que 'sobre'
    rationale: El griego ἐπί admite bien la imagen de estar sentado 'sobre' el trono. En español, 'sentado sobre él' encaja mejor con la imaginería del trono que 'sentado en él', aunque el sentido no cambia sustancialmente.
  revised_spanish_text: Y vi un gran trono blanco y a uno sentado sobre él[a], de cuya presencia huyeron la tierra y el cielo, y no se halló lugar para ellos.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, 'de cuyo rostro huyeron la tierra y el cielo'.
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase del entronizado a un español más natural y fiel al carácter descriptivo e indefinido del griego, sin identificar a la figura. También se prefiere 'sobre él' por mejor idiomaticidad con 'trono'. Se conserva la nota léxica sobre 'rostro' como alternativa más literal a πρόσωπον.
