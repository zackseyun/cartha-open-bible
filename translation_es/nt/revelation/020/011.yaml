translation:
  language: es
  text: Y vi un gran trono blanco y a uno sentado sobre él[a], de cuya presencia huyeron la tierra y el cielo, y no se halló lugar para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'de cuyo rostro huyeron la tierra y el cielo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: θρόνον μέγαν λευκὸν
  english_pob_choice: a great white throne
  chosen_spanish: un gran trono blanco
  alternatives_spanish:
  - un trono grande y blanco
  - un trono blanco, grande
  lexicon: BDAG
  rationale: Conserva la secuencia atributiva natural del griego sin volverla pesada. 'Gran' comunica mejor la idea de magnitud y majestad que 'grande' en este contexto apocalíptico.
- source_word: τὸν καθήμενον ἐπ’ αὐτοῦ
  english_pob_choice: the one seated on it
  chosen_spanish: al que estaba sentado en él
  alternatives_spanish:
  - al que estaba sentado sobre él
  - al que se hallaba sentado en él
  lexicon: BDAG
  rationale: '''Estaba sentado'' mantiene la imagen de entronización con un español reverente y fluido. No se identifica explícitamente a la figura, siguiendo la reserva del texto y del POB inglés.'
- source_word: ἀπὸ τοῦ προσώπου
  english_pob_choice: from whose presence
  chosen_spanish: de cuya presencia
  alternatives_spanish:
  - de cuyo rostro
  - de su presencia
  lexicon: BDAG
  rationale: '''Presencia'' expresa el valor idiomático de πρόσωπον en esta construcción. ''Rostro'' sería más literal, pero en español sonaría más corporal que relacional aquí.'
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron huyendo
  lexicon: BDAG
  rationale: El verbo español refleja el movimiento de retirada intensa y personal. 'Huyeron' conserva bien la fuerza narrativa de φεύγω sin añadir matices inexistentes.
- source_word: ἡ γῆ καὶ ὁ οὐρανός
  english_pob_choice: the earth and heaven
  chosen_spanish: la tierra y el cielo
  alternatives_spanish:
  - la tierra y el cielo de arriba
  - la tierra y los cielos
  lexicon: BDAG
  rationale: En español, 'cielo' es la forma más natural para οὐρανός en este registro apocalíptico. 'Cielo' evita el calco 'heaven' y comunica adecuadamente el par cosmológico.
- source_word: τόπος οὐχ εὑρέθη αὐτοῖς
  english_pob_choice: no place was found for them
  chosen_spanish: no se halló lugar para ellos
  alternatives_spanish:
  - no fue hallado lugar para ellos
  - no se encontró lugar para ellos
  lexicon: BDAG
  rationale: La pasiva impersonal 'no se halló' conserva el tono solemne y la construcción pasiva del griego. 'Lugar' reproduce el valor espacial de τόπος sin interpretarlo.
theological_decisions:
- issue: Identidad del entronizado
  english_pob_reading: Left implicit as 'the one seated on it' rather than identifying him explicitly as God or Messiah.
  chosen_spanish_reading: Se deja implícito como 'al que estaba sentado en él', sin nombrarlo explícitamente.
  alternative_spanish_readings:
  - Dios sentado en el trono
  - el Mesías sentado en el trono
  - el juez entronizado
  rationale: El verso no nombra al personaje entronizado. Mantener la descripción evita resolver una identificación teológica que el pasaje no formula directamente y preserva la tensión documentada por el POB inglés.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreidentificar al entronizado.
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa que suprimió el segundo artículo antes de 'heaven' para mayor naturalidad, pero en español se optó por el par cosmológico idiomático 'la tierra y el cielo'. También se preservó la reserva del texto sobre la identidad del entronizado y la pasiva solemne de la clausura.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto cuando corresponda, pero aquí el texto no contiene el nombre divino.
  - Se evita 'Cristo' porque el versículo no identifica al entronizado.
  - '''Cielo'' se usa para οὐρανός en sentido cósmico/apocalíptico, no como sustituto devocional.'
  - La nota al pie conserva la alternativa literal 'rostro' para reflejar la tensión léxica de πρόσωπον.
