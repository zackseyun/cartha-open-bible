    issue: El marcador de la nota al pie está colocado después de «él» en vez de junto a «Hades».
    rationale: La nota trata la alternativa léxica para ᾅδης, no para el pronombre «él» ni para «mar». Debe anclarse exactamente en el término comentado para mantener claridad editorial y correspondencia semántica.
  revised_spanish_text: Y el mar entregó a los muertos que estaban en él, y la Muerte y el Hades[a] entregaron a los muertos que estaban en ellos, y cada uno fue juzgado conforme a sus obras.
