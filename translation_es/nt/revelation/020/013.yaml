translation:
  language: es
  text: Y el mar entregó a los muertos que estaban en él, y la Muerte y el Hades[a] entregaron a los muertos que estaban en ellos, y cada uno fue juzgado conforme a sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el reino de los muertos» para Hades. El término griego es ᾅδης, distinto de vocablos que suelen traducirse «infierno».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν / ἔδωκαν
  english_pob_choice: gave up
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - entregó
  - entregó de vuelta
  lexicon: BDAG
  rationale: En este contexto de liberación de los muertos para juicio, 'entregó' comunica mejor la acción de ceder o soltar que un simple 'dio'. 'Entregó de vuelta' sería más explicativo de lo necesario.
- source_word: θάλασσα
  english_pob_choice: sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - la mar
  lexicon: BDAG
  rationale: '''θάλασσα'' se refiere de manera natural al mar; en español bíblico contemporáneo ''el mar'' es claro y fiel. Se conserva el artículo definido por el valor del griego.'
- source_word: νεκρούς
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los muertos
  - los que estaban muertos
  lexicon: BDAG
  rationale: Como sustantivo adjetival, νεκρούς se traduce de forma idiomática como 'los muertos'. 'Los que estaban muertos' añade expansión innecesaria.
- source_word: ἐν αὐτῇ
  english_pob_choice: who were in it
  chosen_spanish: que estaban en él
  alternatives_spanish:
  - en él
  - que estaban en él
  lexicon: BDAG
  rationale: El griego identifica a los muertos como los que se hallaban en el mar; el relativo 'que estaban en él' preserva esa precisión en español y suena natural.
- source_word: θάνατος
  english_pob_choice: Death
  chosen_spanish: la Muerte
  alternatives_spanish:
  - la muerte
  - Muerte
  lexicon: BDAG
  rationale: Aquí θάνατος está personificado junto con Hades. La mayúscula en 'Muerte' ayuda a señalar la personificación; el artículo femenino español se usa porque 'muerte' es sustantivo femenino.
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: el Hades
  alternatives_spanish:
  - el Hades
  - el reino de los muertos
  lexicon: BDAG
  rationale: Se conserva 'Hades' como transliteración para mantener la distinción léxica frente a otros términos de castigo final. 'El reino de los muertos' explicita sentido, pero borra la identidad del término griego.
- source_word: ἐν αὐτοῖς
  english_pob_choice: who were in them
  chosen_spanish: que estaban en ellos
  alternatives_spanish:
  - en ellos
  - que estaban en ellos
  lexicon: BDAG
  rationale: El plural retoma a la Muerte y al Hades; el relativo evita una frase demasiado seca en español y mantiene la referencia identificadora.
- source_word: ἐκρίθησαν
  english_pob_choice: was judged
  chosen_spanish: fue juzgado
  alternatives_spanish:
  - fueron juzgados
  - fue juzgado
  lexicon: BDAG
  rationale: 'Aunque el verbo es plural, el distributivo ''cada uno'' permite un singular genérico en español: ''fue juzgado''. Esto conserva el sentido individual sin forzar la sintaxis.'
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno
  - cada cual
  lexicon: BDAG
  rationale: '''Cada uno'' expresa con claridad el valor distributivo de ἕκαστος y funciona bien junto al verbo singular en español.'
- source_word: κατὰ τὰ ἔργα αὐτῶν
  english_pob_choice: according to their deeds
  chosen_spanish: conforme a sus obras
  alternatives_spanish:
  - según sus obras
  - conforme a sus obras
  - según sus hechos
  lexicon: BDAG
  rationale: '''ἔργα'' puede ser ''obras'' o ''hechos''; se elige ''obras'' porque conserva el eco bíblico del plural de acciones valoradas en juicio. ''Conforme a'' refleja bien κατά en este uso evaluativo.'
theological_decisions:
- issue: Renderización de ᾅδης en contexto de juicio escatológico
  english_pob_reading: Hades
  chosen_spanish_reading: el Hades
  alternative_spanish_readings:
  - el reino de los muertos
  - el infierno
  rationale: Se mantiene 'Hades' para preservar la distinción entre ᾅδης y otras realidades escatológicas del pasaje, evitando fusionarlo con 'infierno', que en español suele sugerir la condena final y no solo el ámbito de los muertos.
  doctrine_reference: 'Principio de primacía del original: distinguir vocablos distintos del texto griego y no resolver tensiones conceptuales por traducción tradicional.'
- issue: Personificación de θάνατος
  english_pob_reading: Death
  chosen_spanish_reading: la Muerte
  alternative_spanish_readings:
  - la muerte
  - Muerte
  rationale: La capitalización en español ayuda a reflejar la personificación apocalíptica sin añadir una interpretación doctrinal extra. El artículo femenino se ajusta al género natural del sustantivo español.
  doctrine_reference: 'Principio de lectura literaria del lenguaje apocalíptico: respetar la personificación visible en el griego.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la última forma auditada en inglés ('gave up' -> 'entregó'; 'deeds' -> 'obras') y conserva la decisión de mantener Hades como transliteración distintiva. Se ajustó el español para sonar natural y publicable, sin perder el paralelismo del griego ni la personificación de Muerte y Hades.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma de proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo 'Hades' por consistencia con la decisión léxica documentada en el POB inglés.
  - '''Obras'' preserva el plural evaluativo de ἔργα y evita una paráfrasis más abstracta.'
  - La puntuación reproduce la coordinación triple del griego y la clausula distributiva final.
