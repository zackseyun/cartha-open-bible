translation:
  language: es
  text: y él saldrá a engañar[a] a las naciones en los cuatro rincones de la tierra[b]—Gog y Magog[c]—y a reunirlas para la guerra[d], cuyo número es como la arena del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «extraviar» o «llevar por mal camino».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en los cuatro extremos de la tierra».'
    reason: lexical_alternative
  - marker: c
    text: «Gog y Magog» alude a Ezequiel 38–39 y puede funcionar como rótulo tipológico para las naciones reunidas en la rebelión final.
    reason: cross_reference
  - marker: d
    text: 'O: «para la batalla». El griego dice literalmente «para la guerra/el combate».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελεύσεται
  english_pob_choice: he will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá afuera
  - irá
  lexicon: BDAG
  rationale: El futuro medio de ἐξέρχομαι expresa salida o marcha desde un lugar; «saldrá» es natural en español y conserva la imagen de movimiento sin añadir matices no exigidos por el contexto inmediato.
- source_word: πλανῆσαι
  english_pob_choice: to deceive
  chosen_spanish: a engañar
  alternatives_spanish:
  - a extraviar
  - a llevar por mal camino
  lexicon: BDAG
  rationale: «Engañar» es el equivalente más directo y idiomático para πλανάω en este contexto apocalíptico. Mantiene la fuerza de seducción/fraude sin suavizar el verbo.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: BDAG
  rationale: En Apocalipsis, ἔθνη suele referirse a colectivos humanos y no a la categoría étnico-religiosa «gentiles». «Las naciones» reproduce bien el valor corporativo del término.
- source_word: τὰ ἐν ταῖς τέσσαρσι γωνίαις τῆς γῆς
  english_pob_choice: at the four corners of the earth
  chosen_spanish: en los cuatro confines de la tierra
  alternatives_spanish:
  - en los cuatro rincones de la tierra
  - en los cuatro extremos de la tierra
  lexicon: BDAG
  rationale: La expresión es un modismo para las extremidades del mundo habitado. «Confines» suena más natural y digno en español que un calco literal con «esquinas», sin perder el sentido geográfico-estructural.
- source_word: τὸν Γὼγ καὶ Μαγώγ
  english_pob_choice: Gog and Magog
  chosen_spanish: Gog y Magog
  alternatives_spanish:
  - Gog y Magog
  - Gog, y Magog
  lexicon: BDAG
  rationale: Se transliteran los nombres propios, manteniendo la alusión bíblica e intertextual. No se resuelve en la traducción si son etiquetas simbólicas, tipológicas o etnogeográficas; se preserva la tensión documental del pasaje.
- source_word: συναγαγεῖν
  english_pob_choice: to gather
  chosen_spanish: a reunirlas
  alternatives_spanish:
  - a congregarlas
  - a juntarlas
  lexicon: BDAG
  rationale: El infinitivo de propósito se vierte con «a reunirlas», que expresa de forma clara y natural la acción de convocar/agrup ar a los mencionados colectivos para el conflicto final.
- source_word: εἰς τὸν πόλεμον
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para el combate
  - para la batalla
  lexicon: BDAG
  rationale: πόλεμος puede abarcar «guerra» o «batalla». «Guerra» es suficientemente amplio y evita imponer una lectura más restringida que la del griego.
- source_word: ὧν ὁ ἀριθμὸς αὐτῶν
  english_pob_choice: whose number
  chosen_spanish: cuyo número
  alternatives_spanish:
  - el número de los cuales
  - su número
  lexicon: BDAG
  rationale: «Cuyo número» reproduce de manera fluida la relación genitiva del relativo y se adapta bien al español sin perder la referencia a los reunidos.
- source_word: ὡς ἡ ἄμμος τῆς θαλάσσης
  english_pob_choice: is like the sand of the sea
  chosen_spanish: es como la arena del mar
  alternatives_spanish:
  - es como la arena de la mar
  - es como la arena de la playa
  lexicon: BDAG
  rationale: La comparación bíblica de incontabilidad se mantiene con una formulación estándar y clara en español. «Arena del mar» conserva la imagen tradicional sin forzar un giro explicativo.
theological_decisions:
- issue: Sujeto implícito de «saldrá»
  english_pob_reading: The subject is Satan, carried over from the previous verse.
  chosen_spanish_reading: El sujeto implícito sigue siendo Satanás, retomado del contexto inmediato de 20:7.
  alternative_spanish_readings:
  - El sujeto podría quedar implícito sin explicitarlo
  - Podría traducirse de forma impersonal
  rationale: No se introduce un sujeto nuevo; la continuidad narrativa del versículo anterior basta para identificarlo. La traducción española conserva esa elipsis sin sobreexplicarla.
  doctrine_reference: Contexto inmediato de Apocalipsis 20:7–8
- issue: Fuerza de «Gog y Magog»
  english_pob_reading: Appositional identification of the deceived nations, preserving the Ezekiel allusion without specifying whether the names are symbolic, typological, or strictly ethnogeographic.
  chosen_spanish_reading: Se conservan como nombres transliterados que identifican a las naciones engañadas, sin decidir en la traducción si el referente es simbólico, tipológico o histórico-geográfico.
  alternative_spanish_readings:
  - Nombres simbólicos de los enemigos finales
  - Identificación directa con Gog de Ezequiel
  rationale: La versión española mantiene la alusión a Ezequiel 38–39 y no resuelve la discusión interpretativa donde el texto no obliga a hacerlo.
  doctrine_reference: Apocalipsis 20:8; Ezequiel 38–39
- issue: Valor de πόλεμος
  english_pob_reading: Or 'for the battle.' The Greek has 'for the war/battle.'
  chosen_spanish_reading: «Guerra» se mantiene como equivalente amplio de πόλεμος.
  alternative_spanish_readings:
  - batalla
  - combate
  rationale: El término griego admite un campo semántico más amplio que una sola escaramuza; «guerra» deja abierta la escala exacta del conflicto, en línea con el audit trail inglés.
  doctrine_reference: BDAG; Apocalipsis 20:8
translation_notes:
  revision_awareness: Se reflejó la revisión inglesa que añadió la coordinación explícita antes de «to gather»; en español se conserva con «y a reunirlas», manteniendo el flujo y la relación de propósito sin perder la coordinación griega.
  spanish_consistency_notes:
  - Se usa «naciones» para ἔθνη conforme al patrón de Apocalipsis en la POB.
  - Se transliteran «Gog» y «Magog» sin traducirlos.
  - Se evita «SEÑOR» porque no aparece el Tetragrámata en este versículo.
  - Se mantiene «guerra» para πόλεμος como término más amplio que «batalla».
