translation:
  language: es
  text: Y vi a los muertos, a los grandes y a los pequeños, de pie delante del trono, y se abrieron libros[b]. Y se abrió otro libro, que es el libro de la vida. Y los muertos fueron juzgados por lo que estaba escrito en los libros, conforme a sus obras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conforme a sus hechos».
    reason: lexical_alternative
  - marker: b
    text: «Libros» también puede traducirse «rollos», reflejando el soporte material antiguo.
    reason: cultural_note
lexical_decisions:
- source_word: νεκρούς / νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los fallecidos
  - los difuntos
  lexicon: BDAG
  rationale: El adjetivo sustantivado νεκρούς / νεκροὶ se refiere colectivamente a personas muertas. En español, «los muertos» es natural, solemne y conserva la concisión del original y de la decisión inglesa.
- source_word: τοὺς μεγάλους καὶ τοὺς μικρούς
  english_pob_choice: the great and the small
  chosen_spanish: los grandes y los pequeños
  alternatives_spanish:
  - los grandes y los pequeños en número
  - los importantes y los insignificantes
  lexicon: BDAG
  rationale: La expresión funciona como un merismo de toda clase o rango. «Los grandes y los pequeños» sigue de cerca el griego y mantiene la amplitud social sin interpretar más de lo que dice el texto.
- source_word: ἑστῶτας
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - en pie
  - estando de pie
  lexicon: BDAG
  rationale: El participio expresa estado/postura. «De pie» es idiomático en español y preserva la imagen de presencia ante el trono.
- source_word: ἐνώπιον τοῦ θρόνου
  english_pob_choice: before the throne
  chosen_spanish: delante del trono
  alternatives_spanish:
  - ante el trono
  - en presencia del trono
  lexicon: BDAG
  rationale: «Delante del trono» reproduce bien el valor espacial de ἐνώπιον y evita introducir un matiz interpretativo adicional como «tribunal» o «estrado».
- source_word: βιβλία
  english_pob_choice: books
  chosen_spanish: libros
  alternatives_spanish:
  - rollos
  - registros
  lexicon: BDAG
  rationale: Aunque el término puede corresponder a rollos antiguos, la equivalencia directa en español es «libros». Se conserva así la decisión inglesa y no se reemplaza por una especificación cultural no exigida por el término mismo.
- source_word: ἠνοίχθησαν / ἠνοίχθη
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertos
  - quedaron abiertos
  lexicon: BDAG
  rationale: El pasivo aoristo de ἀνοίγω se expresa de forma natural con pasiva refleja en español. «Se abrieron» es claro y sirve tanto para plural como para singular.
- source_word: ἄλλο βιβλίον
  english_pob_choice: another book
  chosen_spanish: otro libro
  alternatives_spanish:
  - un libro נוסף
  - un libro más
  lexicon: BDAG
  rationale: ἄλλο introduce un libro adicional distinto de los anteriores. «Otro libro» es la equivalencia natural en español.
- source_word: ὅ ἐστιν τῆς ζωῆς
  english_pob_choice: which is the book of life
  chosen_spanish: que es el libro de la vida
  alternatives_spanish:
  - que es de la vida
  - es decir, el libro de la vida
  lexicon: BDAG
  rationale: El griego omite el sustantivo repetido, pero en español debe suplirse para claridad. «Libro de la vida» es la formulación bíblica natural y fiel al sentido.
- source_word: ἐκρίθησαν
  english_pob_choice: were judged
  chosen_spanish: fueron juzgados
  alternatives_spanish:
  - fueron sentenciados
  - fueron evaluados
  lexicon: BDAG
  rationale: κρίνω aquí tiene sentido judicial. «Fueron juzgados» mantiene la formalidad y no adelanta el resultado del juicio.
- source_word: ἐκ τῶν γεγραμμένων ἐν τοῖς βιβλίοις
  english_pob_choice: from what had been written in the books
  chosen_spanish: por lo que estaba escrito en los libros
  alternatives_spanish:
  - a partir de lo que estaba escrito en los libros
  - según lo que estaba escrito en los libros
  lexicon: BDAG
  rationale: La frase indica la base del juicio. «Por lo que estaba escrito» comunica la relación causal/criterial de manera natural en español y conserva el sentido de registro previo y completo.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  english_pob_choice: according to their works
  chosen_spanish: conforme a sus obras
  alternatives_spanish:
  - según sus obras
  - de acuerdo con sus obras
  lexicon: BDAG
  rationale: «Obras» conserva el término bíblico amplio y la conexión intertextual con el juicio según las obras. «Conforme a» expresa la medida o norma del juicio sin atenuarlo ni explicarlo en exceso.
theological_decisions:
- issue: Juicio conforme a las obras
  english_pob_reading: Render κατὰ τὰ ἔργα αὐτῶν as 'according to their works' without softening or explaining it away.
  chosen_spanish_reading: conforme a sus obras
  alternative_spanish_readings:
  - según sus obras
  - de acuerdo con sus obras
  rationale: La cláusula afirma explícitamente un juicio en relación con las obras. La traducción debe preservar esa afirmación sin armonizarla de antemano con síntesis doctrinales externas al versículo.
  doctrine_reference: Preservar la tensión teológica del pasaje.
translation_notes:
  revision_awareness: 'Coincide con la línea de revisión más reciente: no se introdujeron cambios de sentido respecto del contexto auditado en inglés. Se mantuvieron la lectura judicial de κρίνω y el carácter abierto de βιβλία sin resolver la tensión teológica del juicio según las obras.'
  spanish_consistency_notes:
  - Se mantiene «libro de la vida» como fórmula establecida y transparente, sin sustituirla por una paráfrasis.
  - «Los muertos» conserva el sustantivo plural colectivo del original y el registro solemne.
  - Se evitó «SEÑOR» o equivalentes de ocultamiento, ya que aquí no aparece el Tetragrámaton ni κύριος con función equivalente.
  - Se usó «obras» y no «hechos» para conservar la terminología bíblica y la resonancia intertextual.
  - La puntuación reproduce la segmentación de las cláusulas del griego con frases cortas y directas.
