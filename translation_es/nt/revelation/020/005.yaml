translation:
  language: es
  text: El resto de los muertos no volvieron a vivir hasta que se terminaron los mil años[a]. Esta es la primera resurrección.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no vivieron hasta que se terminaron los mil años».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ λοιποὶ
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los restantes
  lexicon: BDAG
  rationale: λοιποί señala a los que quedan en contraste con otro grupo ya mencionado. «Los demás» conserva esa oposición de manera natural en español y evita una expresión demasiado pesada.
- source_word: τῶν νεκρῶν
  english_pob_choice: of the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de los difuntos
  lexicon: BDAG
  rationale: νεκρῶν funciona sustantivamente para personas muertas. «De entre los muertos» mantiene el sentido colectivo y suena más fluido en español dentro de la frase completa.
- source_word: οὐκ ἔζησαν
  english_pob_choice: did not come to life
  chosen_spanish: no volvieron a vivir
  alternatives_spanish:
  - no vivieron
  - no llegaron a vivir
  lexicon: BDAG
  rationale: En este contexto de resurrección, ζάω tiene fuerza ingresiva. «Volvieron a vivir» comunica el ingreso a la vida sin sobreexplicar ni suavizar el contraste escatológico.
- source_word: ἄχρι τελεσθῇ
  english_pob_choice: until ... were finished
  chosen_spanish: hasta que se terminaron
  alternatives_spanish:
  - hasta que se completaron
  - hasta que llegaron a su fin
  lexicon: BDAG
  rationale: ἄχρι marca un límite temporal, y τελεσθῇ expresa culminación/completamiento. «Se terminaron» preserva el valor completivo de forma natural en español.
- source_word: τὰ χίλια ἔτη
  english_pob_choice: the thousand years
  chosen_spanish: los mil años
  alternatives_spanish:
  - el período de mil años
  - los milenios
  lexicon: BDAG
  rationale: La expresión griega se refiere al período específico ya en contexto. «Los mil años» es la correspondencia directa y mantiene el referente sin introducir una paráfrasis interpretativa.
- source_word: αὕτη
  english_pob_choice: This
  chosen_spanish: Esta
  alternatives_spanish:
  - Esto
  - Esta misma
  lexicon: BDAG
  rationale: El demostrativo apunta a la realidad recién descrita. «Esta» conserva la deixis simple y directa del griego.
- source_word: ἡ ἀνάστασις ἡ πρώτη
  english_pob_choice: is the first resurrection
  chosen_spanish: es la primera resurrección
  alternatives_spanish:
  - es la resurrección primera
  - es la resurrección inicial
  lexicon: BDAG
  rationale: ἀνάστασις es el término normal para resurrección. La construcción atributiva con πρώτη se vierte con orden natural en español sin perder la relación entre el sustantivo y el adjetivo.
theological_decisions:
- issue: Alcance de «Esta es la primera resurrección»
  english_pob_reading: The translation leaves the demonstrative broad, referring to the resurrection reality just described in context, without specifying a millennial scheme beyond the text itself.
  chosen_spanish_reading: La traducción deja amplio el demostrativo, refiriéndolo a la realidad de resurrección que acaba de describirse, sin fijar un esquema milenial que el versículo no explicita.
  alternative_spanish_readings:
  - Se refiere solo a los mártires del v. 4
  - Se refiere a toda la comunidad de los justos muertos
  - Se entiende como una resurrección espiritual más que corporal
  rationale: El griego simplemente afirma «Esta es la primera resurrección». La versión española debe preservar esa formulación y no resolver una disputa interpretativa que el texto mismo deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Fuerza de οὐκ ἔζησαν en este contexto
  english_pob_reading: Rendered as bodily-revival language ('come to life') in keeping with the immediate resurrection context, while not expanding beyond the text.
  chosen_spanish_reading: Se vierte con lenguaje de reanimación/vuelta a la vida («volvieron a vivir») en consonancia con el contexto inmediato de resurrección, sin ampliar más allá del texto.
  alternative_spanish_readings:
  - no vivieron
  - se hicieron vivos de nuevo
  - revivieron
  rationale: En Apocalipsis 20 el verbo aparece ligado al contraste entre muerte y resurrección. «Volvieron a vivir» comunica ese valor contextual con claridad y sin imponer una formulación doctrinal adicional.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción; preservar la tensión teológica.
translation_notes:
  revision_awareness: Revisado a la luz del paquete fuente y del audit trail inglés; no se requieren cambios adicionales respecto de la decisión léxica y teológica principal, y se preserva la ambigüedad interpretativa del versículo.
  spanish_consistency_notes:
  - Se usó «resurrección» para ἀνάστασις por ser el término establecido en español bíblico y por coincidir con el contexto inmediato.
  - Se evitó «SEÑOR» u otra terminología de ocultamiento porque el versículo no contiene el nombre divino ni requiere sustitución contextual.
  - Se mantuvo un español directo y sobrio, con puntuación estándar y sin añadir explicaciones interpretativas al cuerpo del versículo.
