translation:
  language: es
  text: Y vi a un ángel que descendía del cielo[a], que tenía la llave del abismo y una gran cadena en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pozo sin fondo'. El griego dice 'el abismo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conserva la conexión paratáctica del relato visionario de Apocalipsis sin añadir una relación temporal más interpretativa que el griego no exige.
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  lexicon: BDAG
  rationale: El aoristo narrativo de ὁράω en una visión se expresa naturalmente con 'vi'; mantiene la inmediatez del testimonio sin expandir el verbo.
- source_word: ἄγγελον
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: BDAG
  rationale: En este contexto apocalíptico el referente es claramente celestial, por lo que 'ángel' es la equivalencia correcta y más transparente.
- source_word: καταβαίνοντα
  english_pob_choice: coming down
  chosen_spanish: que descendía
  alternatives_spanish:
  - bajando
  - que bajaba
  lexicon: BDAG
  rationale: '''Descendía'' preserva el movimiento desde arriba y suena natural en español bíblico contemporáneo sin perder el participio descriptivo.'
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  lexicon: BDAG
  rationale: '''Cielo'' es la forma idiomática española para οὐρανός en este contexto; evita la impresión de un simple ''firmamento'' y conserva el sentido teológico.'
- source_word: ἔχοντα
  english_pob_choice: holding
  chosen_spanish: con
  alternatives_spanish:
  - teniendo
  - sujetando
  lexicon: BDAG
  rationale: 'En español, la construcción participial se naturaliza mejor con una frase de compañía/instrumento: ''con la llave... y una gran cadena''. Esto preserva la imagen de posesión o disposición sin sonar forzado.'
- source_word: τὴν κλεῖν
  english_pob_choice: the key
  chosen_spanish: la llave
  alternatives_spanish:
  - la llave única
  - la clave
  lexicon: BDAG
  rationale: κλείς significa 'llave'; 'llave' es el equivalente español directo y claro. 'Clave' alteraría el objeto literal de la imagen.
- source_word: τῆς ἀβύσσου
  english_pob_choice: to the abyss
  chosen_spanish: del abismo
  alternatives_spanish:
  - del abismo sin fondo
  - del pozo sin fondo
  lexicon: BDAG
  rationale: '''Abismo'' reproduce con fidelidad ἄβυσσος y evita sobreespecificar el símbolo con añadidos que no están en el griego.'
- source_word: ἅλυσιν μεγάλην
  english_pob_choice: a great chain
  chosen_spanish: una gran cadena
  alternatives_spanish:
  - una cadena enorme
  - una cadena grande
  lexicon: BDAG
  rationale: '''Gran'' conserva el tono elevado y apocalíptico de μεγάλην, a la vez que suena más idiomático que una descripción puramente dimensional.'
- source_word: ἐπὶ τὴν χεῖρα αὐτοῦ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - sobre su mano
  - en la mano
  lexicon: BDAG
  rationale: Aunque ἐπί con acusativo es literalmente 'sobre', el sentido idiomático aquí es de localización/tenencia. 'En su mano' comunica la imagen con naturalidad en español.
theological_decisions:
- issue: ἄβυσσος como término apocalíptico
  english_pob_reading: abyss
  chosen_spanish_reading: abismo
  alternative_spanish_readings:
  - pozo sin fondo
  - abismo sin fondo
  rationale: Se mantiene el término semánticamente más cercano al griego. 'Abismo' conserva la tensión apocalíptica sin introducir la expansión interpretativa de 'pozo sin fondo'.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
- issue: Imagen espacial de ἐκ τοῦ οὐρανοῦ
  english_pob_reading: from heaven
  chosen_spanish_reading: del cielo
  alternative_spanish_readings:
  - desde el cielo
  rationale: En contextos apocalípticos, 'cielo' comunica adecuadamente la procedencia celestial del mensajero sin reducir οὐρανός a espacio físico.
  doctrine_reference: Uso contextual de οὐρανός en literatura apocalíptica
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin revisiones sustantivas; la versión española sigue la misma decisión léxica central (abyss = abismo) y conserva la sintaxis paratáctica. La única adaptación importante es la naturalización española de ἔχοντα en una construcción con 'con', para evitar un calco poco idiomático.
  spanish_consistency_notes:
  - Se usó 'Y' para reproducir la cadena narrativa del griego y la opción inglesa 'And'.
  - Se eligió 'abismo' de forma consistente con la nota inglesa sobre ἄβυσσος, evitando 'pozo sin fondo' en el texto principal.
  - '''Gran cadena'' sigue la elevación de ''a great chain'' sin cambiar el contenido.'
  - '''En su mano'' refleja el valor idiomático de ἐπὶ τὴν χεῖρα αὐτοῦ y es coherente con el español bíblico natural.'
