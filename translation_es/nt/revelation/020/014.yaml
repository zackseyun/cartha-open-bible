translation:
  language: es
  text: Y la Muerte y el Hades[a] fueron arrojados al lago de fuego. Esta es la segunda muerte, el lago de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tumba». El término griego es «Hades», distinto aquí del «lago de fuego»; por eso «infierno» también es usado por algunas traducciones, pero puede ser engañoso en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: θάνατος
  english_pob_choice: Death
  chosen_spanish: la Muerte
  alternatives_spanish:
  - la muerte
  lexicon: BDAG
  rationale: En la primera cláusula el sustantivo aparece personificado junto con Hades como entidad arrojada al lago de fuego; en español la mayúscula ayuda a conservar esa personificación sin añadir explicación interpretativa. En la expresión «la segunda muerte» se mantiene minúscula por tratarse del nombre de un estado/jucio, no de un personaje.
- source_word: ᾅδης
  english_pob_choice: Hades
  chosen_spanish: el Hades
  alternatives_spanish:
  - el sepulcro
  - el infierno
  - la tumba
  lexicon: BDAG
  rationale: Se translitera como «Hades» para preservar el término griego distinto del lago de fuego. «Infierno» fusionaría dos realidades separadas en el verso, y «sepulcro/tumba» aplanaría el matiz escatológico del texto.
- source_word: ἐβλήθησαν
  english_pob_choice: were thrown
  chosen_spanish: fueron arrojados
  alternatives_spanish:
  - fueron echados
  - fueron lanzados
  lexicon: BDAG
  rationale: El pasivo aoristo de βάλλω expresa ser arrojados con fuerza; «fueron arrojados» comunica bien esa acción en español moderno y conserva el tono apocalíptico.
- source_word: λίμνη τοῦ πυρός
  english_pob_choice: lake of fire
  chosen_spanish: lago de fuego
  alternatives_spanish:
  - lago ígneo
  - lago ardiente
  lexicon: BDAG
  rationale: Se mantiene la imagen apocalíptica transparente y ya establecida por el griego. «Lago de fuego» es la forma más directa y fiel, sin suavizar la fuerza de la expresión.
- source_word: οὗτος
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Este es
  lexicon: BDAG
  rationale: El demostrativo introduce una identificación equativa; «Esta es» sigue de cerca la estructura del griego y se ajusta al referente femenino implícito de «la segunda muerte».
- source_word: θάνατος ὁ δεύτερος
  english_pob_choice: the second death
  chosen_spanish: la segunda muerte
  alternatives_spanish:
  - la muerte segunda
  - la muerte del segundo orden
  lexicon: BDAG
  rationale: Se conserva la expresión técnica apocalíptica como nombre de juicio final. «La segunda muerte» es natural en español y mantiene el valor terminológico del griego.
- source_word: ἡ λίμνη τοῦ πυρός
  english_pob_choice: the lake of fire
  chosen_spanish: el lago de fuego
  alternatives_spanish:
  - el lago ígneo
  lexicon: BDAG
  rationale: La repetición final se traduce de manera idéntica para reflejar la repetición griega y mantener la claridad referencial.
theological_decisions:
- issue: Distinción entre ᾅδης y el lago de fuego
  english_pob_reading: Hades is kept distinct from the lake of fire; 'hell' is considered misleading here.
  chosen_spanish_reading: Hades se mantiene distinto del lago de fuego; «infierno» se evita porque confundiría dos realidades diferentes.
  alternative_spanish_readings:
  - el infierno
  - el sepulcro
  rationale: El verso no identifica Hades con el lago de fuego, sino que los presenta como entidades separadas arrojadas al mismo destino. Por eso la transliteración preserva la tensión conceptual del texto y evita una harmonización doctrinal prematura.
  doctrine_reference: Apocalipsis 20:14; principio de primacía del texto fuente y preservación de distinciones apocalípticas.
- issue: Personificación de «la Muerte»
  english_pob_reading: Capitalized 'Death' in the first clause, lowercase in 'the second death'.
  chosen_spanish_reading: Mayúscula en «la Muerte» cuando aparece como entidad personificada; minúscula en «la segunda muerte» como designación de juicio.
  alternative_spanish_readings:
  - minúscula en ambos casos
  - mayúscula en ambos casos
  rationale: La primera mención funciona como entidad casi personal junto a Hades; la segunda nombra una realidad escatológica. La diferencia gráfica ayuda al lector español a percibir el contraste sin introducir interpretación extra.
  doctrine_reference: Retórica apocalíptica de Apocalipsis 20:14; equivalencia óptima con distinción semántica.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que sustituyó dos puntos por coma en la identificación apposicional final. En español se refleja con una coma: «Esta es la segunda muerte, el lago de fuego».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se usa «Hades» transliterado en lugar de una equivalencia interpretativa para preservar la distinción con el lago de fuego.
  - Se conserva la repetición de «el lago de fuego» en ambas cláusulas finales para reflejar la repetición griega.
  - La capitalización de «Muerte» solo afecta a la personificación inicial; «muerte» permanece en minúscula en la expresión técnica «la segunda muerte».
