- from: Y vi tronos[a], y se sentaron sobre ellos, y se les dio juicio, y las almas de los que habían sido decapitados por causa del testimonio de Jesús y por causa de la palabra de Dios, y de los que no adoraron a la bestia ni a su imagen y no recibieron la marca en su frente y en su mano; y cobraron vida y reinaron con el Mesías por mil años[b].
  to: Y vi tronos[a], y se sentaron sobre ellos, y se les dio juicio, y vi las almas de los que habían sido decapitados por causa del testimonio de Jesús y por causa de la palabra de Dios, y las[b] de los que no adoraron a la bestia ni a su imagen y no recibieron la marca en su frente y en su mano; y cobraron vida y reinaron con el Mesías durante mil años[c].
  rationale: La revisión corrige la coordinación defectuosa en español repitiendo implícitamente «almas» con «y las de los que…», lo que preserva mejor la sintaxis y el sentido del griego sin identificar sujetos de forma interpretativa. También se añade «vi» antes de «las almas» para evitar tropiezo sintáctico en español tras la cadena previa, y se usa «durante mil años» por mayor naturalidad. Las notas se ajustan para que sus marcadores coincidan con el texto revisado y para documentar la elipsis necesaria en español.
