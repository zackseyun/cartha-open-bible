translation:
  language: es
  text: Y vi tronos[a], y se sentaron sobre ellos, y se les dio juicio, y vi las almas de los que habían sido decapitados por causa del testimonio de Jesús y por causa de la palabra de Dios, y las[b] de los que no adoraron a la bestia ni a su imagen y no recibieron la marca en su frente y en su mano; y cobraron vida y reinaron con el Mesías durante mil años[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por causa de su testimonio acerca de Jesús». La frase griega «el testimonio de Jesús» puede significar testimonio dado por Jesús o testimonio acerca de Jesús.'
    reason: alternative_reading
  - marker: b
    text: 'El segundo grupo coordinado se entiende con «almas» del miembro anterior: «y las almas de los que no adoraron…».'
    reason: clarity_of_coordination
  - marker: c
    text: 'O: «con Cristo». El título griego Χριστός se traduce aquí «Mesías» porque funciona como título.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θρόνους
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - sillas de trono
  - tronos reales
  lexicon: BDAG
  rationale: «Tronos» es la equivalencia directa y conserva el registro apocalíptico sin añadir matices no presentes en el griego.
- source_word: ἐκάθισαν ἐπ’ αὐτούς
  english_pob_choice: they sat on them
  chosen_spanish: se sentaron sobre ellos
  alternatives_spanish:
  - se sentaron en ellos
  - fueron sentados sobre ellos
  lexicon: BDAG
  rationale: La pasiva no está en el griego; el plural activo queda bien en español como «se sentaron sobre ellos», manteniendo la ambigüedad del sujeto.
- source_word: κρίμα ἐδόθη αὐτοῖς
  english_pob_choice: judgment was given to them
  chosen_spanish: se les dio juicio
  alternatives_spanish:
  - se les dio el juicio
  - se les concedió autoridad para juzgar
  lexicon: BDAG
  rationale: «Juicio» conserva la literalidad de κρίμα y deja abierta la tensión entre veredicto y autoridad judicial, como hace el audit trail inglés.
- source_word: ψυχὰς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: BDAG
  rationale: En el registro visionario de Apocalipsis, «almas» preserva la imagen sin aplanarla a «vidas» o «personas».
- source_word: πεπελεκισμένων
  english_pob_choice: had been beheaded
  chosen_spanish: habían sido decapitados
  alternatives_spanish:
  - habían sido ejecutados por decapitación
  - habían sido degollados
  lexicon: BDAG
  rationale: «Decapitados» expresa con precisión la ejecución por cabeza cortada y es idiomático en español.
- source_word: διὰ τὴν μαρτυρίαν Ἰησοῦ
  english_pob_choice: because of the testimony of Jesus
  chosen_spanish: por causa del testimonio de Jesús
  alternatives_spanish:
  - por causa de su testimonio acerca de Jesús
  - por el testimonio de Jesús
  lexicon: BDAG
  rationale: «Por causa de» traduce bien διά con acusativo como causal y conserva la ambigüedad genitiva de Ἰησοῦ sin resolverla.
- source_word: διὰ τὸν λόγον τοῦ θεοῦ
  english_pob_choice: because of the word of God
  chosen_spanish: por causa de la palabra de Dios
  alternatives_spanish:
  - por la palabra de Dios
  lexicon: BDAG
  rationale: La misma construcción causal pide «por causa de»; «palabra de Dios» es la equivalencia natural y transparente de λόγος τοῦ θεοῦ.
- source_word: οἵτινες
  english_pob_choice: those who
  chosen_spanish: de los que
  alternatives_spanish:
  - los cuales
  - quienes
  lexicon: BDAG
  rationale: En español, la relativa partitiva «de los que» fluye mejor tras la enumeración anterior y mantiene el grupo identificante.
- source_word: προσεκύνησαν
  english_pob_choice: had not worshiped
  chosen_spanish: no adoraron
  alternatives_spanish:
  - no habían adorado
  - no se postraron ante
  lexicon: BDAG
  rationale: «Adorar» expresa el acto religioso fuerte; el español permite omitir el pluscuamperfecto sin perder la relación temporal dentro de la visión.
- source_word: θηρίον
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el monstruo
  lexicon: BDAG
  rationale: «La bestia» es el término apocalíptico establecido y corresponde directamente al griego.
- source_word: εἰκόνα
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - ídolo
  - semejanza
  lexicon: BDAG
  rationale: «Imagen» es la traducción directa y conserva la resonancia de Apocalipsis sin introducir interpretación adicional.
- source_word: χάραγμα
  english_pob_choice: the mark
  chosen_spanish: la marca
  alternatives_spanish:
  - la señal
  - el sello
  lexicon: BDAG
  rationale: «Marca» es la equivalencia más clara y estándar en el contexto de Apocalipsis.
- source_word: ἐπὶ τὸ μέτωπον ... καὶ ἐπὶ τὴν χεῖρα αὐτῶν
  english_pob_choice: on their forehead and on their hand
  chosen_spanish: en su frente y en su mano
  alternatives_spanish:
  - sobre su frente y sobre su mano
  - en sus frentes y en sus manos
  lexicon: BDAG
  rationale: 'El singular distributivo del griego se conserva con singular en español: «su frente y su mano».'
- source_word: ἔζησαν
  english_pob_choice: they came to life
  chosen_spanish: cobraron vida
  alternatives_spanish:
  - vivieron
  - volvieron a vivir
  lexicon: BDAG
  rationale: «Cobraron vida» comunica el sentido ingresivo/eventivo de ἔζησαν sin sobreespecificar la interpretación escatológica.
- source_word: ἐβασίλευσαν
  english_pob_choice: reigned
  chosen_spanish: reinaron
  alternatives_spanish:
  - gobernaron como reyes
  lexicon: BDAG
  rationale: «Reinaron» es conciso, natural y mantiene el sentido real del verbo.
- source_word: μετὰ τοῦ χριστοῦ
  english_pob_choice: with the Messiah
  chosen_spanish: con el Mesías
  alternatives_spanish:
  - con Cristo
  lexicon: BDAG
  rationale: Siguiendo el criterio del audit trail, Χριστός funciona como título aquí; en español, «Mesías» preserva mejor ese valor titular.
- source_word: χίλια ἔτη
  english_pob_choice: for a thousand years
  chosen_spanish: por mil años
  alternatives_spanish:
  - durante mil años
  - por un milenio
  lexicon: BDAG
  rationale: «Por mil años» es una equivalencia temporal natural en español y refleja el lapso indicado por el griego.
theological_decisions:
- issue: Sujeto implícito de ἐκάθισαν y destinatarios de κρίμα
  english_pob_reading: Kept the subject indefinite as 'they' and 'to them' without identifying them as saints, martyrs, apostles, or heavenly beings.
  chosen_spanish_reading: Se mantuvo el sujeto indefinido con «se sentaron» y «se les dio juicio», sin identificar a los sujetos.
  alternative_spanish_readings:
  - ellos se sentaron sobre ellos
  - los mártires se sentaron sobre ellos
  - se les dio autoridad para juzgar
  rationale: El griego no identifica explícitamente al sujeto; la redacción española preserva esa indeterminación en vez de imponer una lectura interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
- issue: Ambigüedad de «el testimonio de Jesús»
  english_pob_reading: Rendered 'because of the testimony of Jesus' in the main text and preserved 'their testimony about Jesus' as a footnote alternative.
  chosen_spanish_reading: Se mantuvo «el testimonio de Jesús» como forma principal, dejando abierta la doble posibilidad semántica.
  alternative_spanish_readings:
  - su testimonio acerca de Jesús
  - el testimonio dado por Jesús
  rationale: La ambigüedad del genitivo griego es real; la versión principal conserva la forma más literal y la nota documenta la alternativa sin cerrar el sentido.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
- issue: Renderización de Χριστός
  english_pob_reading: Messiah because it functions as a title.
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός funciona como título; «Mesías» lo comunica mejor en español y sigue el criterio del proyecto.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías cuando es título; Cristo cuando funciona como nombre fijado.'
- issue: Sentido de ἔζησαν
  english_pob_reading: they came to life
  chosen_spanish_reading: cobraron vida
  alternative_spanish_readings:
  - vivieron
  - volvieron a vivir
  rationale: La frase española expresa el cambio de estado de forma ingrésiva sin forzar una lectura doctrinal adicional sobre la naturaleza exacta de la vida recuperada.
  doctrine_reference: No introducir especificaciones doctrinales que el texto no explicite.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: se conservaron la ambigüedad de «el testimonio de Jesús», el sujeto indefinido de la escena y la elección titular de Χριστός como «Mesías». La redacción española se ajustó para sonar natural y publicable en español sin perder la literalidad controlada del original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no corresponde.
  - Se mantiene «Mesías» para Χριστός en línea con el criterio auditado.
  - Se usa «marca» para χάραγμα, «bestia» para θηρίον y «imagen» para εἰκών, de forma consistente con Apocalipsis.
  - 'Se conserva el singular distributivo: «su frente y su mano».'
