    issue: La expresión «sobre la anchura de la tierra» suena poco idiomática en español.
    rationale: Aunque es cercana al griego, en español resulta rígida y puede distraer. El inglés auditado ya explica que πλάτος apunta a una vasta extensión; una formulación como «por la vasta extensión de la tierra» preserva el sentido sin introducir una imagen ajena como «llanura».
  - severity: low
