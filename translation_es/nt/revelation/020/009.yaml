translation:
  language: es
  text: Y subieron por la vasta extensión de la tierra[a] y rodearon el campamento de los santos y la ciudad amada[c][b]. Y descendió fuego desde el cielo y los consumió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la anchura de la tierra». La expresión griega dice literalmente «sobre la anchura de la tierra» y se refiere a una extensión vasta.
    reason: lexical_alternative
  - marker: b
    text: O «circundaron».
    reason: lexical_alternative
  - marker: c
    text: El texto no identifica explícitamente «la ciudad amada»; con frecuencia se entiende como Jerusalén o, en sentido más amplio, como la ciudad de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέβησαν
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - vinieron
  - ascendieron
  lexicon: BDAG
  rationale: ἀναβαίνω expresa movimiento hacia arriba o avance. «Subieron» es natural en español y conserva el movimiento ascendente sin añadir interpretación.
- source_word: ἐπὶ τὸ πλάτος τῆς γῆς
  english_pob_choice: over the breadth of the earth
  chosen_spanish: sobre la anchura de la tierra
  alternatives_spanish:
  - sobre la amplitud de la tierra
  - a través de la anchura de la tierra
  lexicon: BDAG
  rationale: πλάτος significa «anchura» o «amplitud». «Anchura de la tierra» sigue de cerca la imagen griega y evita introducir «llanura» o «llano», que no están en el texto.
- source_word: ἐκύκλευσαν
  english_pob_choice: surrounded
  chosen_spanish: rodearon
  alternatives_spanish:
  - circundaron
  lexicon: BDAG
  rationale: El verbo indica encerrar en círculo o rodear. «Rodearon» es claro y idiomático en español; «circundaron» también sería posible, pero resulta más marcado.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - encampamiento
  lexicon: BDAG
  rationale: παρεμβολή designa un campamento, a menudo militar. «Campamento» preserva la imagen sin sobreespecificarla.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos de Dios
  - de los santos/los consagrados
  lexicon: BDAG
  rationale: «Santos» mantiene la correspondencia habitual del NT para ἅγιοι y conserva la continuidad intertextual del libro.
- source_word: τὴν πόλιν τὴν ἠγαπημένην
  english_pob_choice: the beloved city
  chosen_spanish: la ciudad amada
  alternatives_spanish:
  - la ciudad amada por Dios
  - la ciudad querida
  lexicon: BDAG
  rationale: 'ἠγαπημένην es un participio perfecto pasivo: «amada». «La ciudad amada» conserva la ambigüedad deliberada sobre el agente del amor, sin resolverlo en el cuerpo del texto.'
- source_word: κατέβη πῦρ ἐκ τοῦ οὐρανοῦ
  english_pob_choice: fire came down from heaven
  chosen_spanish: descendió fuego desde el cielo
  alternatives_spanish:
  - bajó fuego del cielo
  - cayó fuego del cielo
  lexicon: BDAG
  rationale: El español «descendió fuego desde el cielo» reproduce la imagen sin sonar forzado. «Cielo» es el equivalente natural de οὐρανός en este contexto narrativo.
- source_word: κατέφαγεν αὐτούς
  english_pob_choice: consumed them
  chosen_spanish: los consumió
  alternatives_spanish:
  - los devoró
  - los destruyó
  lexicon: BDAG
  rationale: Con fuego como sujeto, «consumió» comunica la destrucción total de manera natural en español, manteniendo la fuerza del verbo griego.
theological_decisions:
- issue: Referente de «la ciudad amada»
  english_pob_reading: The text does not explicitly identify 'the beloved city'; interpreters commonly understand it as Jerusalem or, more broadly, the city of God.
  chosen_spanish_reading: Se mantiene «la ciudad amada» sin identificarla en el texto principal.
  alternative_spanish_readings:
  - Jerusalén
  - la ciudad de Dios
  rationale: El griego no nombra la ciudad aquí. Nombrarla en la traducción cerraría una tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preservar la tensión textual e interpretativa sin resolverla de forma editorial.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail en cuanto a πλάτος: se evita añadir una imagen de «llanura» y se conserva el valor léxico de «anchura». También se mantiene la decisión de no identificar explícitamente la ciudad amada en el texto principal, en continuidad con el análisis inglés revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se prefirió «santos» para ἅγιοι por continuidad del NT y del libro.
  - «Cielo» se usa para οὐρανός en este contexto narrativo, no «cielo» en sentido meteorológico.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden a este versículo.
  - La puntuación y el orden siguen el flujo narrativo del griego sin añadir conectores explicativos.
