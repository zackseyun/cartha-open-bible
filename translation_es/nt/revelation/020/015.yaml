    issue: No se conserva la nota inglesa sobre la alternativa representativa «esa persona fue arrojada».
    rationale: La omisión no distorsiona el sentido del texto griego en español, porque el sujeto implícito evita la tensión de género que sí existe en inglés. Por ello no requiere corrección.
