translation:
  language: es
  text: Y si alguien no fue hallado escrito en el libro[a] de la vida, fue arrojado al lago de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «rollo». La palabra griega puede referirse a un libro o a un rollo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις
  english_pob_choice: if anyone
  chosen_spanish: y si alguien
  alternatives_spanish:
  - y si cualquiera
  - y si algún hombre
  lexicon: BDAG
  rationale: La expresión introduce una condición general e indefinida. «Alguien» comunica bien ese valor abierto en español natural sin volverlo demasiado genérico ni forzar una lectura específica.
- source_word: οὐχ εὑρέθη
  english_pob_choice: was not found
  chosen_spanish: no fue hallado
  alternatives_spanish:
  - no fue encontrado
  - no se halló
  lexicon: BDAG
  rationale: El aoristo pasivo de εὑρίσκω se expresa de manera directa con «fue hallado»/«fue encontrado». «No fue hallado» mantiene la formulación judicial y solemne del pasaje.
- source_word: ἐν τῇ βίβλῳ τῆς ζωῆς
  english_pob_choice: in the book of life
  chosen_spanish: en el libro[a] de la vida
  alternatives_spanish:
  - en el rollo de la vida
  - en el libro de la vida
  lexicon: BDAG
  rationale: «Βίβλος» puede significar libro o rollo. En español, «libro de la vida» es la forma más clara y reconocible en este contexto apocalíptico; se conserva la posibilidad alternativa mediante la nota sobre «libro»/«rollo».
- source_word: γεγραμμένος
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - inscrito
  - registrado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de γράφω se traduce con «escrito» porque es la opción más directa y natural al ir con «hallado». «Inscrito» o «registrado» son posibles, pero menos transparentes aquí.
- source_word: ἐβλήθη
  english_pob_choice: was thrown
  chosen_spanish: fue arrojado
  alternatives_spanish:
  - fue lanzado
  - fue echado
  lexicon: BDAG
  rationale: El aoristo pasivo de βάλλω comunica una acción de echar/arrojar con fuerza. «Fue arrojado» preserva esa fuerza en español moderno; «fue echado» es posible pero menos solemne, y «fue lanzado» suena menos natural en este contexto.
- source_word: εἰς τὴν λίμνην τοῦ πυρός
  english_pob_choice: into the lake of fire
  chosen_spanish: al lago de fuego
  alternatives_spanish:
  - en el lago de fuego
  - a la laguna de fuego
  lexicon: BDAG
  rationale: La imagen apocalíptica se mantiene de forma literal y transparente. En español, «al lago de fuego» fluye naturalmente con el verbo de movimiento y conserva la imaginería del texto.
theological_decisions:
- issue: Forma representativa singular masculina
  english_pob_reading: he was thrown
  chosen_spanish_reading: fue arrojado
  alternative_spanish_readings:
  - fue arrojada
  - fue arrojadx
  rationale: El griego usa un participio y verbo en singular masculino para un referente indefinido. En español, donde el sujeto está implícito, se preserva la referencia singular sin introducir una neutralización artificial; la frase impersonal no añade una lectura doctrinal nueva.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Imagen del juicio final
  english_pob_reading: lake of fire
  chosen_spanish_reading: lago de fuego
  alternative_spanish_readings:
  - laguna de fuego
  - fuego eterno
  rationale: El texto preserva la imagen apocalíptica sin explicarla ni doctrinalizarla. «Lago de fuego» mantiene la metáfora tal como aparece en la fuente y evita expandir su significado más allá del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 3
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no se requerían cambios; esta versión mantiene el sentido del texto griego y la decisión inglesa auditada, adaptadas a un español natural y fiel.
  spanish_consistency_notes:
  - Se mantiene «Dios», «Jesús», «Yahvé» y otras terminologías estándar del proyecto cuando corresponda; en este versículo no aparecen.
  - 'Se evita la paráfrasis teológica: la imagen de juicio final queda intacta.'
  - La nota se ancla solo en «libro» porque allí surge la alternativa léxica libro/rollo; no se añade otra nota al participio, ya que en español la forma impersonal no requiere marcar el género representativo explícitamente.
