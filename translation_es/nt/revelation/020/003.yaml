  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Abismo» refleja bien ἄβυσσος. No hay nombres divinos ni títulos mesiánicos aquí. «Engañar» para πλανάω y «los mil años» preservan bien las decisiones léxicas y teológicas documentadas.
