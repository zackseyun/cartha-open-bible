translation:
  language: es
  text: Y lo arrojó al abismo[a], y lo cerró y lo selló encima de él, para que ya no engañara a las naciones[b], hasta que se cumplieran los mil años; después de estas cosas debe ser soltado[c] por poco tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abismo sin fondo» para ἄβυσσος.
    reason: lexical_alternative
  - marker: b
    text: O «para que ya no extraviara a las naciones»; πλανάω puede expresar también la idea de desviar o hacer perder el rumbo.
    reason: lexical_alternative
  - marker: c
    text: O «ser liberado» o «ser desatado» para λυθῆναι.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλεν
  english_pob_choice: threw
  chosen_spanish: lo arrojó
  alternatives_spanish:
  - lo lanzó
  - lo echó
  lexicon: BDAG
  rationale: El aoristo de βάλλω con objeto directo y destino expresa un acto brusco de colocación. «Arrojó» conserva la fuerza violenta y es natural en español; evita la rigidez de un calco como «tiró» y mantiene mejor el matiz que «lanzó».
- source_word: ἄβυσσον
  english_pob_choice: abyss
  chosen_spanish: abismo
  alternatives_spanish:
  - abismo sin fondo
  - pozo sin fondo
  lexicon: BDAG
  rationale: En Apocalipsis, ἄβυσσος funciona como término apocalíptico de lugar. «Abismo» reproduce ese valor técnico de manera directa. No se añade «sin fondo» porque eso ya interpreta y amplía el término griego.
- source_word: ἔκλεισεν
  english_pob_choice: shut
  chosen_spanish: lo cerró
  alternatives_spanish:
  - lo encerró
  - lo selló
  lexicon: BDAG
  rationale: κλείω significa cerrar o clausurar. «Lo cerró» es claro y se coordina bien con el verbo siguiente «lo selló». «Encerró» sería más interpretativo y no está exigido por el griego.
- source_word: ἐσφράγισεν ἐπάνω αὐτοῦ
  english_pob_choice: sealed it over him
  chosen_spanish: lo selló sobre él
  alternatives_spanish:
  - lo selló encima de él
  - lo selló sobre él
  lexicon: BDAG
  rationale: σφραγίζω es «sellar». La expresión ἐπάνω αὐτοῦ indica la cobertura o clausura por encima de él; en español, «lo selló sobre él» conserva esa relación espacial sin forzar un objeto explícito adicional.
- source_word: ἵνα μὴ πλανήσῃ ἔτι τὰ ἔθνη
  english_pob_choice: so that he might no longer deceive the nations
  chosen_spanish: para que ya no engañara a las naciones
  alternatives_spanish:
  - para que ya no extraviara a las naciones
  - para que no siguiera engañando a las naciones
  lexicon: BDAG
  rationale: πλανάω puede ser «engañar» o «desviar». «Engañara» es breve, idiomático y fiel. «Ya no» refleja el valor de ἔτι como cesación continua; «extraviara» sería posible pero menos natural aquí.
- source_word: ἄχρι τελεσθῇ τὰ χίλια ἔτη
  english_pob_choice: until the thousand years were finished
  chosen_spanish: hasta que se cumplieran los mil años
  alternatives_spanish:
  - hasta que terminaran los mil años
  - hasta que se completaran los mil años
  lexicon: BDAG
  rationale: τελεσθῇ expresa alcanzar término o consumación. «Se cumplieran» es idiomático en español y preserva la idea de llegar al fin de un período, sin resolver la discusión escatológica sobre si los mil años son literales o simbólicos.
- source_word: μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de eso
  - luego de esto
  lexicon: BDAG
  rationale: La frase de transición temporal se traduce de manera cercana al griego para mantener el estilo discursivo de Apocalipsis. «Después de estas cosas» es formal y transparente.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - es necesario
  - tiene que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad. «Debe» preserva esa fuerza sin especificar si se trata de decreto divino, secuencia profética o necesidad narrativa.
- source_word: λυθῆναι αὐτὸν
  english_pob_choice: he must be released
  chosen_spanish: ser soltado
  alternatives_spanish:
  - ser liberado
  - ser desatado
  lexicon: BDAG
  rationale: λύω en pasivo aquí significa ser soltado o liberado de una restricción. «Ser soltado» retiene mejor el eco concreto de la liberación desde ataduras; «ser liberado» es más general pero menos cercano al verbo.
- source_word: μικρὸν χρόνον
  english_pob_choice: for a short time
  chosen_spanish: por un poco de tiempo
  alternatives_spanish:
  - por un corto tiempo
  - por breve tiempo
  lexicon: BDAG
  rationale: La acusativa de duración admite «por un poco de tiempo» como equivalencia natural y fiel. Mantiene el carácter limitado del período sin sobreactuar la brevedad.
theological_decisions:
- issue: Naturaleza de los mil años
  english_pob_reading: Render τὰ χίλια ἔτη straightforwardly as 'the thousand years' without interpretive qualification.
  chosen_spanish_reading: Traducir «los mil años» sin añadir calificativos interpretativos.
  alternative_spanish_readings:
  - el milenio
  - los mil años literales
  - un período simbólico
  rationale: La frase griega se rinde de manera directa para no resolver el debate milenario en la traducción. «Los mil años» preserva la tensión interpretativa del pasaje.
  doctrine_reference: Preservar la tensión teológica sin imponer una escatología determinada.
- issue: Fuerza de δεῖ en contexto apocalíptico
  english_pob_reading: Translate as 'must' to reflect necessity without specifying the mechanism of that necessity.
  chosen_spanish_reading: Traducir con «debe» para expresar necesidad sin explicar su origen.
  alternative_spanish_readings:
  - es necesario que sea soltado
  - tiene que ser soltado
  rationale: El griego afirma necesidad, pero no la desglosa. «Debe» conserva la obligación/inevitabilidad sin introducir una lectura doctrinal adicional.
  doctrine_reference: No importar al texto afirmaciones que no formula explícitamente.
- issue: Valor de πλανάω en relación con las naciones
  english_pob_reading: deceive the nations
  chosen_spanish_reading: «engañara a las naciones»
  alternative_spanish_readings:
  - «desviara a las naciones»
  - «extraviara a las naciones»
  rationale: Apocalipsis usa πλανάω para el engaño seductor o desviador. «Engañar» es la opción más directa y clara; se evita estrechar el término a un matiz doctrinal no explicitado en la frase.
  doctrine_reference: Respetar el campo semántico sin reducirlo indebidamente.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés de enfoque optimal-equivalence; no se detectan revisiones posteriores que alteren las decisiones léxicas o teológicas de base. Se conserva la misma estructura semántica, incluyendo la secuencia de clausura, la finalidad negativa, el límite temporal de los mil años y la necesidad de una liberación posterior breve.
  spanish_consistency_notes:
  - Se usa «abismo» para ἄβυσσος de forma consistente con el valor apocalíptico del término.
  - Se mantiene «mil años» y no «milenio» para no interpretar el pasaje.
  - Se elige «engañar» para πλανάω, con nota de alternativa «extraviar», porque el español admite ambas pero la primera es más directa.
  - Se usa «debe» para δεῖ y no una formulación más explicativa, preservando la necesidad sin doctrinalizarla.
  - Se evita «SEÑOR» u այլ sustituciones teológicas irrelevantes; no hay términos divinos en este versículo.
  - La puntuación y la sintaxis buscan una lectura pública fluida en español neutral latinoamericano.
