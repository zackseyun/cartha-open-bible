translation:
  language: es
  text: Y el diablo, el que los estaba engañando, fue arrojado al lago de fuego y azufre[a], donde también están la bestia y el falso profeta; y serán atormentados día y noche[b] por los siglos de los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «el lago de fuego y azufre»; tradicionalmente, «el lago de fuego y azufre ardiente».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «por los siglos de los siglos», un modismo que expresa duración sin fin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el calumniador
  lexicon: BDAG
  rationale: En Apocalipsis funciona como designación personal ya fijada para Satanás, no como mero descriptor genérico. «Diablo» es el equivalente español estándar y conserva esa referencia personal.
- source_word: ὁ πλανῶν αὐτοὺς
  english_pob_choice: who was deceiving them
  chosen_spanish: el que los estaba engañando
  alternatives_spanish:
  - el que los engaña
  - el que los estaba extraviando
  lexicon: BDAG
  rationale: El participio presente con artículo caracteriza al diablo por su acción continua. «Estaba engañando» conserva el valor durativo; «engañando» es más directo en español que «extraviando», aunque este último también sería posible.
- source_word: ἐβλήθη
  english_pob_choice: was thrown
  chosen_spanish: fue arrojado
  alternatives_spanish:
  - fue lanzado
  - fue echado
  lexicon: BDAG
  rationale: El pasivo de βάλλω en contextos de juicio expresa consignación violenta. «Fue arrojado» comunica bien esa fuerza en español actual sin perder naturalidad.
- source_word: λίμνην τοῦ πυρὸς καὶ θείου
  english_pob_choice: the lake of fire and sulfur
  chosen_spanish: el lago de fuego y azufre
  alternatives_spanish:
  - el lago de fuego y azufre
  - el lago de fuego y azufre/azufre ardiente
  - el lago de fuego y azufre (brimstone)
  lexicon: BDAG
  rationale: θείο significa azufre. Se mantiene «azufre» para evitar el arcaísmo de «azufre ardiente/brimstone» y conservar la imagen con claridad para lectores actuales.
- source_word: ὅπου καὶ τὸ θηρίον καὶ ὁ ψευδοπροφήτης
  english_pob_choice: where also the beast and the false prophet are
  chosen_spanish: donde también están la bestia y el falso profeta
  alternatives_spanish:
  - donde también la bestia y el falso profeta están
  - donde también se encuentran la bestia y el falso profeta
  lexicon: BDAG
  rationale: El griego omite el verbo; en español conviene suplirlo. «Están» reproduce la presencia continuada implicada por el contexto inmediato sin añadir matices innecesarios.
- source_word: θηρίον
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - la fiera
  lexicon: BDAG
  rationale: Es el título apocalíptico ya establecido en Apocalipsis. «Bestia» es la forma usual y más reconocible en español bíblico contemporáneo.
- source_word: ψευδοπροφήτης
  english_pob_choice: the false prophet
  chosen_spanish: el falso profeta
  alternatives_spanish:
  - el profeta falso
  lexicon: BDAG
  rationale: Equivalente directo del título apocalíptico. Se conserva el orden natural en español y la forma ya establecida por el uso bíblico.
- source_word: βασανισθήσονται
  english_pob_choice: they will be tormented
  chosen_spanish: serán atormentados
  alternatives_spanish:
  - serán torturados
  lexicon: BDAG
  rationale: βασανίζω en contexto de juicio expresa tormento severo. «Atormentados» es idiomático y no sobredetermina el modo del sufrimiento.
- source_word: ἡμέρας καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  lexicon: BDAG
  rationale: Es un modismo fijo de continuidad incesante. «Día y noche» conserva la concisión del original y su fuerza temporal.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y por siempre
  - por las edades de las edades
  lexicon: BDAG
  rationale: Esta es la equivalencia idiomática española tradicional y clara para la expresión enfática griega de duración sin fin. Se prefiere esta forma por fidelidad semántica y recepción eclesial amplia.
theological_decisions:
- issue: Duración expresada por εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_reading: forever and ever
  chosen_spanish_reading: por los siglos de los siglos
  alternative_spanish_readings:
  - para siempre
  - por las edades de las edades
  rationale: La frase conserva la intensidad del idiomatismo griego sin suavizarla ni resolver debates doctrinales más amplios. Mantiene la tensión teológica del texto sobre la duración del castigo final.
  doctrine_reference: Preservar la tensión teológica; equivalencia óptima.
- issue: Verbo implícito en ὅπου καὶ τὸ θηρίον καὶ ὁ ψευδοπροφήτης
  english_pob_reading: where also the beast and the false prophet are
  chosen_spanish_reading: donde también están la bestia y el falso profeta
  alternative_spanish_readings:
  - donde también estaban la bestia y el falso profeta
  - donde también se encuentran la bestia y el falso profeta
  rationale: El griego carece de verbo expreso. «Están» completa la oración de modo natural y sigue el contexto inmediato, donde ya han sido arrojados allí y permanecen allí.
  doctrine_reference: Primacía del original; completar la elipsis sin añadir doctrina.
translation_notes:
  revision_awareness: Se revisó el texto de referencia y el informe auditado en inglés; no se detectaron revisiones aplicadas en el último pase y el juicio de concordancia fue de alto acuerdo, por lo que la redacción española sigue de cerca la decisión óptima ya validada.
  spanish_consistency_notes:
  - Se mantuvo «diablo» para διάβολος por su valor de designación personal en Apocalipsis.
  - Se prefirió «azufre» frente a «azufre ardiente» o «azufre/brimstone» por claridad moderna y fidelidad lexical.
  - Se usó «por los siglos de los siglos» como equivalente idiomático español de la expresión griega enfática.
  - Se conservó «bestia» como término apocalíptico técnico y «falso profeta» como título fijo.
  - La elipsis de ὅπου se completó con «están» para respetar la continuidad narrativa sin forzar el tiempo verbal.
