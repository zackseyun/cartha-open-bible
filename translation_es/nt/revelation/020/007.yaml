translation:
  language: es
  text: Y cuando se hayan cumplido los mil años, Satanás será liberado de su prisión,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuandoquiera que
  - al cumplirse
  lexicon: BDAG
  rationale: Introduce una cláusula temporal futura; «cuando» comunica de forma natural la referencia temporal sin añadir matices interpretativos.
- source_word: τελεσθῇ
  english_pob_choice: are completed
  chosen_spanish: se hayan cumplido
  alternatives_spanish:
  - se hayan terminado
  - hayan llegado a su fin
  lexicon: BDAG
  rationale: El pasivo de τελέω indica que un período definido llega a su cumplimiento. «Se hayan cumplido» conserva ese sentido resultativo y suena natural en español.
- source_word: τὰ χίλια ἔτη
  english_pob_choice: the thousand years
  chosen_spanish: los mil años
  alternatives_spanish:
  - el período de mil años
  - mil años
  lexicon: BDAG
  rationale: El artículo griego apunta a un período ya conocido en el contexto. «Los mil años» reproduce la referencia definida sin decidir si es literal o simbólica.
- source_word: λυθήσεται
  english_pob_choice: will be released
  chosen_spanish: será soltado
  alternatives_spanish:
  - será liberado
  - será dejado libre
  lexicon: BDAG
  rationale: El verbo λύω puede expresarse como «soltar» en este contexto de restricción y liberación. «Será soltado» conserva mejor la imagen de quedar desatado que «liberado», que en español puede sonar más interpretativo.
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satán
  lexicon: BDAG
  rationale: Se mantiene la transliteración usual del nombre/título en español bíblico. «Satanás» es la forma más reconocible y coherente con el registro bíblico.
- source_word: ἐκ τῆς φυλακῆς αὐτοῦ
  english_pob_choice: from his prison
  chosen_spanish: de su prisión
  alternatives_spanish:
  - de su cárcel
  - de su lugar de encierro
  lexicon: BDAG
  rationale: φυλακή en este contexto denota un lugar de confinamiento. «Prisión» expresa con claridad el sentido y preserva el genitivo posesivo αὐτοῦ.
theological_decisions:
- issue: Naturaleza de los mil años
  english_pob_reading: Render the phrase straightforwardly as 'the thousand years' without interpreting it symbolically or literally beyond the text itself.
  chosen_spanish_reading: Traducir «los mil años» sin precisar en la traducción si se trata de un período literal o simbólico.
  alternative_spanish_readings:
  - un reinado literal de mil años
  - un largo período simbólico
  rationale: El versículo nombra un período definido, pero no resuelve por sí mismo la cuestión milenial. La traducción conserva la tensión doctrinal sin cerrarla.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: La versión española sigue de cerca el valor temporal y aspectual del griego, y adopta las decisiones léxicas auditadas en la POB inglesa sin introducir interpretación escatológica adicional.
  spanish_consistency_notes:
  - Se usa «Satanás» como transliteración estable del nombre/título.
  - Se evita «SEÑOR» o cualquier sustitución no motivada porque no hay aquí el tetragrámaton ni κύριος aplicado al nombre divino.
  - «Los mil años» conserva la ambigüedad deliberada del texto respecto de la cronología y el carácter del período.
