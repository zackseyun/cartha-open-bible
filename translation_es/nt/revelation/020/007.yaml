revisions:
- from: Y cuando se hayan cumplido los mil años, Satanás será soltado de su prisión,
  to: Y cuando se hayan cumplido los mil años, Satanás será liberado de su prisión,
  rationale: Se ajusta «será soltado» a «será liberado» para reflejar de manera más natural e idiomática el futuro pasivo λυθήσεται en contexto de encarcelamiento, en línea con la lógica documentada en el English POB (“will be released”). No se requieren notas.
  reviewer_model: gpt-5.4
