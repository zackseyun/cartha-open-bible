review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia temporal y el sentido básico del griego: ὅταν + subjuntivo se refleja correctamente con «cuando», τελεσθῇ con «se hayan cumplido», τὰ χίλια ἔτη con «los mil años», y ἐκ τῆς φυλακῆς αὐτοῦ con «de su prisión». La principal desviación está en λυθήσεται: «será soltado» es entendible, pero en español bíblico actual suena menos natural y menos preciso que «será liberado» o «será soltado/puesto en libertad» para un contexto de prisión. Dado que el inglés auditado eligió “will be released” precisamente para evitar connotaciones inadecuadas de “loosed”, conviene ajustar el español en la misma dirección.'
  spanish_quality_summary: El texto es claro y legible, pero «será soltado de su prisión» suena algo mecánico y poco idiomático en español general. «Será liberado de su prisión» es más natural y mantiene bien el pasivo futuro. El resto del versículo está bien formulado, con registro moderno y digno.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Satanás» concuerda con el uso esperado. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La revisión propuesta mejora la alineación con la decisión léxica inglesa sobre λυθήσεται sin introducir cambio teológico.
  issues:
  - severity: medium
    issue: «será soltado» para λυθήσεται suena poco idiomático en contexto carcelario
    rationale: Aunque λύω puede asociarse con ‘soltar’, aquí el contexto explícito es φυλακή (‘prisión’). El inglés POB optó por “will be released” para evitar un matiz demasiado literal o arcaizante. En español, «será liberado» comunica mejor la salida de confinamiento sin connotación positiva necesaria.
  revised_spanish_text: Y cuando se hayan cumplido los mil años, Satanás será liberado de su prisión,
  revision_rationale: Se ajusta «será soltado» a «será liberado» para reflejar de manera más natural e idiomática el futuro pasivo λυθήσεται en contexto de encarcelamiento, en línea con la lógica documentada en el English POB (“will be released”). No se requieren notas.
