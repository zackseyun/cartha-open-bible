id: REV.20.6
reference: Revelation 20:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: μακάριος καὶ ἅγιος ὁ ἔχων μέρος ἐν τῇ ἀναστάσει τῇ πρώτῃ· ἐπὶ τούτων ὁ δεύτερος θάνατος οὐκ ἔχει ἐξουσίαν, ἀλλ’ ἔσονται ἱερεῖς τοῦ θεοῦ καὶ τοῦ χριστοῦ, καὶ βασιλεύσουσιν μετ’ αὐτοῦ ⸀χίλια ἔτη.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/020/006.yaml
  text: Blessed and holy is the one who has a share in the first resurrection. Over these the second death has no authority[a], but they will be priests of God and of Messiah, and they will reign with him for a thousand years.
  footnotes:
  - marker: a
    text: Or 'of God and of Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its titular sense.
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 204b7d35dc252c963dc7403f19ac6e25c2d2d7744f69f6bae0e11aab98b6e470
    timestamp: '2026-04-18T23:37:34Z'
    output_hash: aff3d4608e55804f15d331c97bce3caba6ee0a5a035e1bfc913da7d668ade5df
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:00:13Z'
    unchanged: false
    changes_summary: 'Changed ''the Messiah'' to ''Christ'' for closer correspondence to χριστοῦ and better consistency with the verse''s formal register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Bienaventurado y santo es el que tiene parte en la primera resurrección. Sobre estos la segunda muerte no tiene autoridad[a], sino que serán sacerdotes de Dios y del Mesías, y reinarán con él por mil años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “no tiene poder”. El griego ἐξουσίαν puede expresar autoridad, jurisdicción o poder, pero aquí se prefiere “autoridad” por su valor de dominio legítimo.'
    reason: alternative_reading
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Bendito
  - Dichoso
  lexicon: BDAG
  rationale: “Bienaventurado” reproduce el valor de beatitud bíblica con dignidad litúrgica en español y comunica mejor que “dichoso” una condición favorecida por Dios; “bendito” sería posible pero aquí suena más naturalmente predicativo sobre la persona.
- source_word: ἅγιος
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: BDAG
  rationale: “Santo” es la correspondencia directa y conserva el matiz de pertenencia/consecración, no solo moralidad. “Consagrado” explicaría el sentido, pero empobrecería el paralelismo con “bienaventurado.”
- source_word: ὁ ἔχων μέρος
  english_pob_choice: the one who has a share
  chosen_spanish: el que tiene parte
  alternatives_spanish:
  - el que participa
  - quien tiene una parte
  lexicon: BDAG
  rationale: La construcción sustantivada se vierte de modo natural en español con “el que tiene parte”, que conserva la idea de participación real en la resurrección sin añadir explicaciones.
- source_word: ἐν τῇ ἀναστάσει τῇ πρώτῃ
  english_pob_choice: in the first resurrection
  chosen_spanish: en la primera resurrección
  alternatives_spanish:
  - en la resurrección primera
  lexicon: BDAG
  rationale: Se mantiene la relación preposicional y el orden natural del español. “Primera resurrección” conserva la fórmula apocalíptica sin resolver su alcance interpretativo.
- source_word: ὁ δεύτερος θάνατος
  english_pob_choice: the second death
  chosen_spanish: la segunda muerte
  alternatives_spanish:
  - la muerte segunda
  lexicon: BDAG
  rationale: “La segunda muerte” es la forma más clara y fiel en español, y preserva el término técnico apocalíptico sin suavizarlo.
- source_word: οὐκ ἔχει ἐξουσίαν
  english_pob_choice: has no authority
  chosen_spanish: no tiene autoridad
  alternatives_spanish:
  - no tiene poder
  - no tiene jurisdicción
  lexicon: BDAG
  rationale: “Autoridad” sigue de cerca ἐξουσία y evita reducir el sentido a mera fuerza. “Jurisdicción” sería más técnico, pero menos natural para lectura pública.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - presbíteros
  - ministros sacerdotales
  lexicon: BDAG
  rationale: “Sacerdotes” corresponde directamente al sustantivo y mantiene la imagen cultual y real. No se sustituye por términos eclesiásticos más tardíos que no están en el texto.
- source_word: τοῦ θεοῦ καὶ τοῦ χριστοῦ
  english_pob_choice: of God and of the Messiah
  chosen_spanish: de Dios y del Mesías
  alternatives_spanish:
  - de Dios y de Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός con “Mesías”, siguiendo la política POB. En español, “Mesías” comunica mejor el título sin convertirlo en nombre propio fijo.
- source_word: βασιλεύσουσιν
  english_pob_choice: they will reign
  chosen_spanish: reinarán
  alternatives_spanish:
  - gobernarán
  - ejercerán el reinado
  lexicon: BDAG
  rationale: “Reinarán” es la forma más natural y exacta para βασιλεύω, preservando la idea de ejercicio de realeza compartida con él.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: BDAG
  rationale: “Con él” es la opción más directa y sobria; “junto con él” añade énfasis innecesario.
- source_word: χίλια ἔτη
  english_pob_choice: for a thousand years
  chosen_spanish: por mil años
  alternatives_spanish:
  - durante mil años
  - mil años
  lexicon: BDAG
  rationale: “Por mil años” expresa duración en español de modo idiomático y conserva la extensión temporal sin introducir una lectura doctrinal sobre el milenio.
theological_decisions:
- issue: Χριστός como título, no solo nombre propio
  english_pob_reading: of God and of the Messiah
  chosen_spanish_reading: de Dios y del Mesías
  alternative_spanish_readings:
  - de Dios y de Cristo
  rationale: Se mantiene la lectura titular de Χριστός conforme al criterio POB. En este contexto apocalíptico, “Mesías” preserva la categoría cristológica sin ocultar la fuerza semítica del título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: La frase temporal del reino milenario
  english_pob_reading: they will reign with him for a thousand years
  chosen_spanish_reading: reinarán con él por mil años
  alternative_spanish_readings:
  - reinarán con él durante mil años
  - reinarán con él mil años
  rationale: La traducción conserva la afirmación explícita del texto sin resolver debates escatológicos. Se deja intacta la tensión interpretativa sobre el milenio.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se tomó como base el texto griego SBLGNT y el expediente auditado en inglés. Se respetó la decisión revisada y restaurada de traducir Χριστός como título con “Mesías”, no como “Cristo”, y se mantuvo la sintaxis y el contenido teológico sin añadir interpretación doctrinal.
  spanish_consistency_notes:
  - Se usa “Mesías” de manera consistente para Χριστός cuando funciona como título.
  - Se evita “SEÑOR” para κύριος porque este versículo no lo requiere; el nombre divino no aparece explícitamente aquí.
  - “La segunda muerte” y “primera resurrección” se mantienen como fórmulas apocalípticas técnicas.
  - El registro es reverente y apto para lectura eclesial, sin calcos innecesarios.
