review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el griego: mantiene la doble predicación «bienaventurado y santo», la fuerza participativa de «tiene parte», la fórmula técnica «la primera resurrección / la segunda muerte», el matiz de autoridad de ἐξουσίαν, el sacerdocio «de Dios y del Mesías», y la duración explícita «por mil años». No añade ni omite contenido relevante.'
  spanish_quality_summary: El español es claro, natural y digno para lectura eclesial amplia. «Bienaventurado» encaja bien con el registro apocalíptico; la sintaxis fluye con normalidad; «Sobre estos» suena algo literal pero sigue siendo comprensible y aceptable en este contexto. La nota al pie está bien anclada y explica adecuadamente la alternativa.
  glossary_alignment: 'Está alineado con la terminología POB: θεοῦ → «Dios», χριστοῦ → «Mesías» en sentido titular, ἱερεῖς → «sacerdotes», ἐξουσίαν → «autoridad». No hay conflicto con los lineamientos doctrinales ni léxicos documentados.'
