translation:
  language: es
  text: Y se apoderó del dragón, la serpiente antigua[a], que es el diablo y Satanás, y lo ató por mil años,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la serpiente antigua» o «aquella serpiente de antaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκράτησεν
  english_pob_choice: seized
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - apresó
  - se apoderó de
  lexicon: BDAG κρατέω
  rationale: En español, «tomó» comunica aquí la acción decisiva de sujetar o aprehender al dragón sin introducir un matiz demasiado técnico. «Agarró» suena más coloquial; «apresó» y «se apoderó de» pueden sugerir matices legales o reflexivos que no están explícitos en el griego.
- source_word: δράκοντα
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - monstruo
  - serpiente
  lexicon: BDAG δράκων
  rationale: «Dragón» conserva la imagen apocalíptica y la continuidad interna de Apocalipsis. «Serpiente» pertenece al sintagma explicativo posterior, no a este sustantivo principal.
- source_word: ὁ ὄφις ὁ ἀρχαῖος
  english_pob_choice: that ancient serpent / the ancient serpent
  chosen_spanish: la serpiente antigua
  alternatives_spanish:
  - la serpiente de antaño
  - esa serpiente antigua
  - la serpiente de tiempos antiguos
  lexicon: BDAG ὄφις; ἀρχαῖος
  rationale: El griego presenta una identificación appositiva del dragón. «La serpiente antigua» reproduce de forma natural esa identificación en español. Se evita añadir demostrativos como «esa» o «aquella» porque el texto griego aquí funciona más como explicación identificadora que como distancia narrativa obligatoria.
- source_word: Διάβολος
  english_pob_choice: the Devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - Diablo
  lexicon: BDAG διάβολος
  rationale: 'En español, el título se expresa con artículo y minúscula como nombre común-titular: «el diablo». Esto preserva el valor de título personal que tiene en contexto.'
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satan
  lexicon: BDAG Σατανᾶς
  rationale: «Satanás» es la transliteración asentada en español y mantiene la fuerza del nombre/título sin sustituirlo por una traducción interpretativa.
- source_word: ἔδησεν
  english_pob_choice: bound
  chosen_spanish: ató
  alternatives_spanish:
  - ligó
  - encadenó
  - sujeto
  lexicon: BDAG δέω
  rationale: «Ató» expresa con naturalidad la imagen concreta de ligadura y retiene la fuerza del verbo sin expandirlo a una imagen no presente. «Encadenó» sería demasiado específico; «sujeto» debilita la imagen.
- source_word: χίλια ἔτη
  english_pob_choice: for a thousand years
  chosen_spanish: por mil años
  alternatives_spanish:
  - durante mil años
  - por un milenio
  lexicon: BDAG χίλιοι; ἔτος
  rationale: «Por mil años» reproduce la duración sin resolver la discusión sobre literalidad o simbolismo. «Durante» funciona, pero «por» conserva mejor la correspondencia simple con la duración del acto de atar.
theological_decisions:
- issue: Identificación múltiple del dragón
  english_pob_reading: 'Retain the full chain of identifications: ''the dragon—that ancient serpent, who is the Devil and Satan.'''
  chosen_spanish_reading: 'Conservar la cadena completa: «el dragón, la serpiente antigua, que es el diablo y Satanás».'
  alternative_spanish_readings:
  - el dragón, la antigua serpiente, que es el Diablo y Satanás
  - el dragón, aquella serpiente antigua, que es el diablo y Satanás
  rationale: La traducción mantiene todas las identificaciones explícitas del texto sin reducirlas a un solo título. No se intenta armonizar ni explicar más allá de lo que el versículo afirma.
  doctrine_reference: Translation philosophy §1 and §5; preservación de la identificación explícita del texto.
- issue: Naturaleza de los mil años
  english_pob_reading: Render χίλια ἔτη straightforwardly as 'a thousand years' without interpreting whether the period is literal, symbolic, or otherwise.
  chosen_spanish_reading: Traducir «mil años» de manera directa, sin resolver si el período es literal o simbólico.
  alternative_spanish_readings:
  - un milenio
  - mil años literalmente
  rationale: El español debe conservar la tensión teológica del pasaje en lugar de cerrarla mediante una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §3; preservación de tensión teológica.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo del control cruzado fue alto; por eso este borrador sigue de cerca el análisis auditado, manteniendo la identificación triple del dragón y la duración directa de «mil años».
  spanish_consistency_notes:
  - Se mantiene «Satanás» con tilde y forma asentada en español.
  - Se usa «el diablo» en minúscula como título común-titular, coherente con el español bíblico moderno.
  - «Por mil años» preserva la duración sin resolver el debate escatológico.
  - La nota textual/lexical se ancla solo en «serpiente antigua», donde existe una alternativa española real documentable.
