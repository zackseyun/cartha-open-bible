translation:
  language: es
  text: él también beberá del vino de la ira de Dios, mezclado sin diluir[a] en la copa de su enojo, y será atormentado con fuego y azufre[b] delante de los ángeles santos y delante del Cordero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «mezclado sin diluir en la copa de su enojo». El griego combina la idea de vino preparado/mezclado con la de vino no diluido, subrayando el juicio en su plena intensidad.
    reason: lexical_alternative
  - marker: b
    text: 'Forma más tradicional en español: «con fuego y azufre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he also
  chosen_spanish: él también
  alternatives_spanish:
  - él mismo también
  - ese también
  lexicon: BDAG
  rationale: El pronombre es enfático y retoma al individuo del versículo anterior. «Él también» conserva la fuerza aditiva y la referencia personal sin sonar forzado en español.
- source_word: πίεται
  english_pob_choice: will drink
  chosen_spanish: beberá
  alternatives_spanish:
  - beberá de
  - tomará
  lexicon: BDAG
  rationale: El futuro de πίνω se expresa de manera natural con «beberá». El complemento con «de» mantiene la imagen de tomar del contenido de la copa.
- source_word: ἐκ τοῦ οἴνου
  english_pob_choice: from the wine
  chosen_spanish: del vino
  alternatives_spanish:
  - de ese vino
  - desde el vino
  lexicon: BDAG
  rationale: ἐκ se refleja bien con «de/del», preservando la idea de beber a partir de una fuente.
- source_word: θυμοῦ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  lexicon: BDAG
  rationale: En Apocalipsis, θυμός en contextos de juicio denota la ira intensa de Dios. «Ira» es la equivalencia más natural y teológicamente fuerte en español.
- source_word: τοῦ κεκερασμένου ἀκράτου
  english_pob_choice: mixed undiluted
  chosen_spanish: mezclado sin diluir
  alternatives_spanish:
  - mezclado y sin diluir
  - mezclado, pero no diluido
  - preparado sin diluir
  lexicon: BDAG
  rationale: 'La combinación verbal conserva la tensión léxica del griego: algo «mezclado» y, a la vez, «sin diluir». «Mezclado sin diluir» comunica el idiomatismo sin suavizar la fuerza del juicio.'
- source_word: ἐν τῷ ποτηρίῳ
  english_pob_choice: in the cup
  chosen_spanish: en la copa
  alternatives_spanish:
  - en el cáliz
  - dentro de la copa
  lexicon: BDAG
  rationale: «Copa» es el equivalente más directo y menos litúrgicamente cargado que «cáliz», manteniendo la metáfora bíblica de la copa del juicio.
- source_word: τῆς ὀργῆς αὐτοῦ
  english_pob_choice: of his anger
  chosen_spanish: de su enojo
  alternatives_spanish:
  - de su ira
  - de su furor
  lexicon: BDAG
  rationale: Se preserva la distinción que la POB inglesa hizo entre θυμός e ὀργή. Aquí ὀργή se vierte como «enojo» para no colapsar ambos términos en una sola palabra, aunque la alternativa «ira» sigue siendo posible.
- source_word: βασανισθήσεται
  english_pob_choice: will be tormented
  chosen_spanish: será atormentado
  alternatives_spanish:
  - será torturado
  - estará en tormento
  lexicon: BDAG
  rationale: El pasivo futuro expresa sufrimiento punitivo severo. «Será atormentado» es claro y estándar en este contexto apocalíptico.
- source_word: ἐν πυρὶ καὶ θείῳ
  english_pob_choice: with fire and sulfur
  chosen_spanish: con fuego y azufre
  alternatives_spanish:
  - en fuego y azufre
  - con fuego y azufre y azufre
  - con fuego y azufre/azufre ardiente
  lexicon: BDAG
  rationale: Θεῖον significa azufre. «Azufre» evita el arcaísmo de «azufre/brimstone» y conserva la imagen de juicio.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» reproduce bien el valor de estar en la presencia o a la vista de quienes siguen.
- source_word: ἀγγέλων ἁγίων
  english_pob_choice: the holy angels
  chosen_spanish: los santos ángeles
  alternatives_spanish:
  - los ángeles santos
  - los ángeles celestiales santos
  lexicon: BDAG
  rationale: El griego sin artículo es suficientemente definido por el contexto. «Santos ángeles» conserva la ordenación adjetival natural del español y la referencia al host celestial.
- source_word: τοῦ ἀρνίου
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  lexicon: BDAG
  rationale: En Apocalipsis, ἀρνίον es un título cristológico para Jesús. «El Cordero» es la traducción normal y fiel del título, con mayúscula reverencial.
theological_decisions:
- issue: Distinguir θυμός y ὀργή en el mismo versículo
  english_pob_reading: Render θυμός as 'wrath' and ὀργή as 'anger'
  chosen_spanish_reading: Renderizar θυμός como «ira» y ὀργή como «enojo»
  alternative_spanish_readings:
  - Renderizar ambos como «ira»
  - Renderizar θυμός como «furor» y ὀργή como «ira»
  rationale: El griego usa dos términos relacionados pero distintos para el juicio divino. Mantener una diferencia entre «ira» y «enojo» evita aplanar el paralelismo y conserva el énfasis retórico del texto fuente.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Fuerza de τοῦ κεκερασμένου ἀκράτου
  english_pob_reading: Express the idiom as 'mixed undiluted'
  chosen_spanish_reading: Expresar el giro como «mezclado sin diluir»
  alternative_spanish_readings:
  - «mezclado, sin diluir»
  - «mezclado y sin diluir»
  rationale: El griego combina la idea de vino preparado/mezclado con la de vino no aguado. En español, «mezclado sin diluir» comunica esa tensión sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del audit trail inglés, que ajustó la frase de la idea de «poured full strength» a «mixed undiluted» para reflejar con mayor precisión τοῦ κεκερασμένου ἀκράτου. La versión española adopta esa misma tensión léxica con «mezclado sin diluir», manteniendo también la distinción entre θυμός e ὀργή.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda al nombre divino, pero aquí el texto griego tiene θεοῦ, por lo que se traduce «Dios».
  - Se traduce ἀρνίον como «el Cordero» en línea con el uso cristológico estable de Apocalipsis.
  - Se conserva la metáfora de la copa del juicio sin sustituirla por un lenguaje explicativo adicional.
  - «Azufre» se prefiere a «brimstone» por claridad contemporánea en español; si la tradición litúrgica local prefiere «azufre ardiente», podría anotarse, pero no se introduce en el texto principal.
