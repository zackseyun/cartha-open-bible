    issue: La nota [a] está anclada a «santuario» pero explica «la mies... se ha secado».
    rationale: Esto desinforma al lector y rompe la correspondencia obligatoria entre marcador y palabra/frase explicada.
  - severity: medium
    issue: Hay dos notas distintas para la misma cuestión léxica de ἐξηράνθη.
    rationale: La duplicación es innecesaria y editorialmente torpe; conviene conservar una sola nota en el lugar pertinente.
  - severity: low
    issue: «Demasiado madura» es comprensible, pero algo más interpretativa que «muy madura» o «sobremadura».
    rationale: No exige adjudicación mayor porque el expediente inglés ya justifica «overripe»; la redacción actual sigue siendo fiel.
