translation:
  language: es
  text: 'Y otro ángel salió del santuario, clamando a gran voz al que estaba sentado sobre la nube: «Envía tu hoz y siega, porque ha llegado la hora de segar, porque la mies de la tierra está demasiado madura[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «porque la mies de la tierra se ha secado / agostado». La expresión griega usa la imagen del secarse del grano para indicar que está listo para segarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - un ángel más
  - otro mensajero
  lexicon: BDAG
  rationale: ἄλλος indica un miembro נוסף del mismo tipo; ἄγγελος en Apocalipsis normalmente designa un ser angelical. «Otro ángel» conserva esa referencia directa y natural en español.
- source_word: τοῦ ναοῦ
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - santuario del templo
  lexicon: BDAG
  rationale: ναός suele señalar el recinto sagrado o santuario más que el complejo completo. En el marco celestial de Apocalipsis, «santuario» preserva mejor esa especificidad que «templo».
- source_word: κράζων ἐν φωνῇ μεγάλῃ
  english_pob_choice: crying out with a loud voice
  chosen_spanish: clamando a gran voz
  alternatives_spanish:
  - gritando a gran voz
  - proclamando con voz fuerte
  lexicon: BDAG
  rationale: «Clamando» conserva la fuerza del verbo κράζω sin sonar excesivamente coloquial; «a gran voz» reproduce el giro idiomático de intensidad vocal.
- source_word: τῷ καθημένῳ ἐπὶ τῆς νεφέλης
  english_pob_choice: to the one seated on the cloud
  chosen_spanish: al que estaba sentado sobre la nube
  alternatives_spanish:
  - al que se sentaba sobre la nube
  - al que está sentado sobre la nube
  lexicon: BDAG
  rationale: La forma participial con artículo funciona sustantivamente. «Al que estaba sentado» es una solución natural en español y mantiene el carácter descriptivo sin añadir un título explícito.
- source_word: Πέμψον
  english_pob_choice: Send
  chosen_spanish: Envía
  alternatives_spanish:
  - Manda
  - Despacha
  lexicon: BDAG
  rationale: πέμπω se traduce literalmente por «enviar». En este contexto, el mandato a la hoz en español se expresa de forma natural con el imperativo «Envía».
- source_word: τὸ δρέπανόν σου
  english_pob_choice: your sickle
  chosen_spanish: tu hoz
  alternatives_spanish:
  - tu guadaña
  - tu herramienta de siega
  lexicon: BDAG
  rationale: δρέπανον es la herramienta de cosecha; «hoz» es el equivalente claro y sobrio en español, preferible a opciones más interpretativas.
- source_word: θέρισον
  english_pob_choice: reap
  chosen_spanish: siega
  alternatives_spanish:
  - cosecha
  - recoge
  lexicon: BDAG
  rationale: θερίζω como imperativo verbal se puede expresar por «segar», que mantiene la imagen agrícola y el paralelismo con «hoz» mejor que un sustantivo como «cosecha».
- source_word: ἦλθεν ἡ ὥρα θερίσαι
  english_pob_choice: the hour to reap has come
  chosen_spanish: ha llegado la hora de segar
  alternatives_spanish:
  - ha venido la hora de segar
  - llegó la hora de segar
  lexicon: BDAG
  rationale: La construcción griega coloca el énfasis en «la hora». «Ha llegado la hora de segar» conserva ese orden lógico y suena natural en español.
- source_word: ἐξηράνθη
  english_pob_choice: is overripe
  chosen_spanish: está demasiado madura
  alternatives_spanish:
  - está seca
  - está pasada
  - está sobre madura
  lexicon: BDAG
  rationale: El verbo significa literalmente «se ha secado / se ha agostado», pero en contexto de cosecha indica madurez extrema para la siega. «Está demasiado madura» comunica esa idea en español sin perder la imagen agrícola. Se conserva la tensión entre literalidad y sentido contextual.
- source_word: ὁ θερισμὸς τῆς γῆς
  english_pob_choice: the harvest of the earth
  chosen_spanish: la mies de la tierra
  alternatives_spanish:
  - la cosecha de la tierra
  - la siega de la tierra
  lexicon: BDAG
  rationale: θερισμός puede designar la mies lista para recogerse. «Mies» es idiomático y sobrio en español bíblico, y mantiene el campo agrícola sin forzar una paráfrasis.
theological_decisions:
- issue: Identidad del que está sentado sobre la nube
  english_pob_reading: Render the phrase neutrally as 'the one seated on the cloud' without importing an explicit christological identification into the translation.
  chosen_spanish_reading: Traducir neutralmente como «al que estaba sentado sobre la nube», sin introducir una identificación cristológica explícita en el texto.
  alternative_spanish_readings:
  - al Hijo del Hombre sentado sobre la nube
  - al Mesías sentado sobre la nube
  rationale: El griego de este versículo es descriptivo y no titula a la figura. Aunque el contexto amplio apunta a la figura de 14:14, la traducción no debe resolver la identificación por adelantado.
  doctrine_reference: Preservar la tensión teológica del contexto sin añadir interpretaciones no expresadas en este versículo.
translation_notes:
  revision_awareness: Esta versión ajusta la nota léxica para reflejar la revisión más reciente del inglés POB, que prefirió una lectura más fuerte de ἐξηράνθη. En español se mantiene la idea de madurez extrema con «demasiado madura» y se conserva la alternativa más literal en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de la serie, pero este versículo no contiene el nombre divino.
  - Se usa «santuario» para ναός en coherencia con la decisión POB en Apocalipsis para el espacio celestial.
  - Se evita «Cristo» o «Hijo del Hombre» en el texto principal, preservando la neutralidad descriptiva del griego.
  - «Hoz» y «segar» conservan el campo agrícola y el paralelismo verbal del pasaje.
