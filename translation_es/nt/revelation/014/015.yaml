  text: καὶ ἄλλος ἄγγελος ἐξῆλθεν ἐκ τοῦ ναοῦ κράζων ἐν φωνῇ μεγάλῃ τῷ καθημένῳ ἐπὶ τῆς νεφέλης· Πέμψον τὸ δρέπανόν σου καὶ θέρισον, ὅτι ἦλθεν ἡ ὥρα θερίσαι, ὅτι ἐξηράνθη ὁ θερισμὸς τῆς γῆς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/015.yaml
  text: And another angel came out from the sanctuary[a], crying out with a loud voice to the one seated on the cloud, “Send your sickle and reap, because the hour to reap has come, because the harvest of the earth is overripe.”
  footnotes:
  - marker: a
    text: Or more literally, 'because the harvest of the earth has dried up.' The Greek expression uses the image of drying grain to indicate readiness for reaping.
    reason: lexical_alternative
