translation:
  language: es
  text: Y cantan como un cántico nuevo delante del trono y delante de los cuatro seres vivientes y de los ancianos[a]. Y nadie podía aprender el cántico, sino los ciento cuarenta y cuatro mil[b], los que habían sido comprados de entre los habitantes de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como si fuera un cántico nuevo' / 'según parecía, un cántico nuevo'. El griego usa lenguaje de apariencia, común en las visiones de Apocalipsis.
    reason: lexical_alternative
  - marker: b
    text: O 'redimidos de la tierra'. El verbo griego significa literalmente 'comprados' o 'adquiridos'.
    reason: alternative_reading
lexical_decisions:
- source_word: ᾄδουσιν
  english_pob_choice: they are singing
  chosen_spanish: cantan
  alternatives_spanish:
  - están cantando
  - cantan
  lexicon: BDAG
  rationale: El presente griego en narración visionaria puede expresarse en español con presente simple sin perder viveza. 'Cantan' es natural y suficientemente dinámico; no es necesario forzar un progresivo.
- source_word: ὡς
  english_pob_choice: what seemed to be
  chosen_spanish: como
  alternatives_spanish:
  - como si fuera
  - según parecía
  lexicon: BDAG
  rationale: Se conserva la fuerza de apariencia/comparación propia de la visión con 'como'. La frase completa 'como un cántico nuevo' deja abierta la misma tensión que el inglés POB en una forma más natural para el español.
- source_word: ᾠδὴν καινὴν
  english_pob_choice: a new song
  chosen_spanish: un cántico nuevo
  alternatives_spanish:
  - una canción nueva
  - un himno nuevo
  lexicon: BDAG
  rationale: '''Cántico'' es más digno y bíblico en español que ''canción'', y mantiene el matiz de composición cantada. ''Nuevo'' preserva καινός sin explicarlo ni suavizarlo.'
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: '''Delante de'' reproduce bien la relación espacial/cortesana de la escena celestial y es idiomático en español. ''Ante'' también sería posible, pero ''delante de'' suena más claro en esta construcción repetida.'
- source_word: τῶν τεσσάρων ζῴων
  english_pob_choice: the four living creatures
  chosen_spanish: los cuatro seres vivientes
  alternatives_spanish:
  - las cuatro criaturas vivientes
  - los cuatro seres vivos
  lexicon: BDAG
  rationale: En Apocalipsis ζῷα designa a los seres celestiales del trono. 'Seres vivientes' es la equivalencia española más establecida y evita 'animales', que sería erróneo aquí.
- source_word: τῶν πρεσβυτέρων
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los presbíteros
  lexicon: BDAG
  rationale: '''Ancianos'' refleja el grupo celestial designado por πρεσβύτεροι sin imponer un término técnico eclesiástico más estrecho. En español litúrgico bíblico es claro y reconocible.'
- source_word: οὐδεὶς ἐδύνατο
  english_pob_choice: no one was able
  chosen_spanish: nadie podía
  alternatives_spanish:
  - nadie fue capaz de
  - nadie podía lograr
  lexicon: BDAG
  rationale: El imperfecto de capacidad se expresa naturalmente con 'podía'. Mantiene el sentido de imposibilidad sin sobrecargar el español.
- source_word: μαθεῖν
  english_pob_choice: to learn
  chosen_spanish: aprender
  alternatives_spanish:
  - llegar a aprender
  - entender
  lexicon: BDAG
  rationale: '''Aprender'' es la correspondencia directa y suficiente de μανθάνω. ''Entender'' sería demasiado interpretativo.'
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - a menos que
  lexicon: BDAG
  rationale: Tras una negación, 'sino' es la forma más natural en español para introducir la excepción. Conserva el valor exceptivo sin pesadez.
- source_word: αἱ ἑκατὸν τεσσεράκοντα τέσσαρες χιλιάδες
  english_pob_choice: the one hundred forty-four thousand
  chosen_spanish: los ciento cuarenta y cuatro mil
  alternatives_spanish:
  - los 144.000
  - las ciento cuarenta y cuatro mil
  lexicon: BDAG
  rationale: Se traduce en palabras para dignidad y fluidez. Aunque el griego usa femenino por el sustantivo implícito, el referente es un grupo masculino plural en español por concordancia con 'los'.
- source_word: οἱ ἠγορασμένοι
  english_pob_choice: those who had been purchased
  chosen_spanish: los que habían sido comprados
  alternatives_spanish:
  - los que habían sido adquiridos
  - los redimidos
  lexicon: BDAG
  rationale: '''Comprados'' conserva la metáfora comercial de ἀγοράζω sin convertir de entrada el verbo en un término teológico más cargado. Se respeta así la elección del POB inglés.'
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - desde la tierra
  lexicon: BDAG
  rationale: '''Tierra'' es el equivalente español de γῆ en este contexto apocalíptico. Se evita ''mundo'' porque desplaza el matiz espacial del texto.'
theological_decisions:
- issue: Valor de ὡς en la descripción visionaria
  english_pob_reading: 'appearance language: ''what seemed to be a new song'''
  chosen_spanish_reading: comparación/apariencia mantenida con 'como un cántico nuevo'
  alternative_spanish_readings:
  - '''como si fuera un cántico nuevo'''
  - '''según parecía, un cántico nuevo'''
  rationale: El griego permite un matiz de apariencia propio de la visión. El español puede conservar esa tensión con 'como' sin decidir de más si el canto es ontológicamente nuevo o solo percibido como tal.
  doctrine_reference: Preservar la tensión interpretativa del texto apocalíptico sin resolverla prematuramente.
- issue: Traducción de ἠγορασμένοι
  english_pob_reading: '''purchased'' rather than ''redeemed'''
  chosen_spanish_reading: '''comprados'' en el cuerpo del texto'
  alternative_spanish_readings:
  - '''redimidos'''
  - '''rescatados'''
  rationale: El verbo griego es comercial antes que técnico-soteriológico. 'Comprados' mantiene la imagen original; 'redimidos' queda disponible como alternativa teológica, pero no se impone en la línea principal.
  doctrine_reference: Primacía del léxico original; evitar importar una formulación doctrinal no obligada por el verbo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el control de decisiones del POB en inglés. No se incorporaron revisiones posteriores porque el registro auditado indica que no hubo cambios en la última pasada (unchanged: true).'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita 'Cristo' porque no aparece Χριστός en el versículo.
  - '''Seres vivientes'' conserva la terminología apocalíptica estándar para ζῷα.'
  - '''Comprados'' conserva la metáfora mercantil y deja explícita en nota la alternativa ''redimidos''.'
  - Se usó 'tierra' para γῆ, coherente con el contexto cósmico-apocalíptico.
