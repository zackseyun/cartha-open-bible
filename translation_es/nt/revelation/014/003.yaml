base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/003.yaml
  text: And they are singing what seemed to be a new song before the throne and before the four living creatures and the elders[a]. And no one was able to learn the song except the one hundred forty-four thousand[b], those who had been purchased from the earth.
  footnotes:
  - marker: a
    text: Or 'as a new song' / 'like a new song.' The Greek uses appearance-language common in Revelation's visions.
    reason: lexical_alternative
  - marker: b
    text: Or 'redeemed from the earth.' The Greek verb is literally 'purchased' or 'bought.'
    reason: alternative_reading
