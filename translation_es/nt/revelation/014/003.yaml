revisions:
- from: Y cantan como un cántico nuevo delante del trono y delante de los cuatro seres vivientes y de los ancianos[a]. Y nadie podía aprender el cántico, sino los ciento cuarenta y cuatro mil[b], los que habían sido comprados de la tierra.
  to: Y cantan como un cántico nuevo delante del trono y delante de los cuatro seres vivientes y de los ancianos[a]. Y nadie podía aprender el cántico, sino los ciento cuarenta y cuatro mil[b], los que habían sido comprados de entre los habitantes de la tierra.
  rationale: Se mantiene el texto en general, pero se corrige la cola final a un español idiomático que exprese mejor la extracción desde el ámbito terrenal humano ('de entre los habitantes de la tierra') y se arregla la nota [a] para que ofrezca alternativas reales al matiz de ὡς en vez de repetir el texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:42:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés en casi todos los puntos principales: presente narrativo con ''cantan'', ἐνώπιον con ''delante de'', ζῷα con ''seres vivientes'', πρεσβύτεροι con ''ancianos'', μανθάνω con ''aprender'', y ἀγοράζω con ''comprados'', conservando además la nota alternativa ''redimidos''. Sin embargo, ''comprados de la tierra'' no es español natural para ἀπὸ τῆς γῆς en este contexto; debe ser ''comprados de entre la tierra/los habitantes de la tierra'' o, más sencillamente siguiendo el inglés POB, ''comprados de la tierra'' requiere ajuste idiomático. La mejor reparación mínima es ''comprados de entre la tierra'' no suena bien; por fidelidad y naturalidad, ''comprados de la tierra'' debe cambiarse a ''comprados de entre los habitantes de la tierra'' solo si se explicita el referente, pero eso añade palabras no presentes. Más conservador y claro en español es ''comprados de la tierra'' -> ''comprados de entre
    la tierra'' no funciona. Por eso conviene reformular toda la cola como ''los que habían sido comprados de la tierra'' a ''los que habían sido comprados de entre los habitantes de la tierra'' aunque es algo interpretativo. También hay una leve tensión entre el texto principal ''como un cántico nuevo'' y la nota a, que repite esa misma opción como alternativa; la nota debería ofrecer verdaderas alternativas, especialmente ''como si fuera'' o ''según parecía''.'
  spanish_quality_summary: 'El español es generalmente claro, digno y eclesialmente legible. ''Cántico'', ''seres vivientes'' y ''ancianos'' están bien escogidos. La construcción exceptiva con ''sino'' es natural. Los problemas de calidad son puntuales: 1) la nota [a] no funciona bien porque una de sus ''alternativas'' repite exactamente el texto principal; 2) ''comprados de la tierra'' suena forzado en español bíblico moderno. Una pequeña revisión resuelve ambos puntos.'
  glossary_alignment: No hay conflicto con los términos base del proyecto. No aparecen Yahvé, Mesías, Cristo, δοῦλος, μετάνοια, σάρξ, δικαιοσύνη ni χάρις. La decisión clave ἀγοράζω -> 'comprados' sí está alineada con la política del POB y la nota conserva la alternativa teológica 'redimidos'.
  issues:
  - severity: medium
    issue: La frase 'comprados de la tierra' es poco natural en español para ἀπὸ τῆς γῆς.
    rationale: Aunque refleja literalmente 'from the earth', en español 'comprar algo de la tierra' sugiere origen material más que extracción de un ámbito humano. Hace falta una formulación idiomática que preserve que fueron sacados del ámbito terrenal/humano.
  - severity: low
    issue: La nota [a] repite el texto principal como si fuera alternativa.
    rationale: El texto principal ya dice 'como un cántico nuevo'; por tanto la nota debe aportar alternativas reales ('como si fuera...', 'según parecía...') o una explicación más clara del matiz de apariencia.
  revised_spanish_text: Y cantan como un cántico nuevo delante del trono y delante de los cuatro seres vivientes y de los ancianos[a]. Y nadie podía aprender el cántico, sino los ciento cuarenta y cuatro mil[b], los que habían sido comprados de entre los habitantes de la tierra.
  revised_footnotes:
  - marker: a
    text: O 'como si fuera un cántico nuevo' / 'según parecía, un cántico nuevo'. El griego usa lenguaje de apariencia, común en las visiones de Apocalipsis.
    reason: lexical_alternative
  - marker: b
    text: O 'redimidos de la tierra'. El verbo griego significa literalmente 'comprados' o 'adquiridos'.
    reason: alternative_reading
  revision_rationale: Se mantiene el texto en general, pero se corrige la cola final a un español idiomático que exprese mejor la extracción desde el ámbito terrenal humano ('de entre los habitantes de la tierra') y se arregla la nota [a] para que ofrezca alternativas reales al matiz de ὡς en vez de repetir el texto principal.
