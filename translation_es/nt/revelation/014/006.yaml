translation:
  language: es
  text: Y vi a otro ángel que volaba en medio del cielo[a], que tenía un evangelio eterno para proclamar a los que habitan sobre la tierra[b], y a toda nación, tribu, lengua y pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en medio del aire' o 'en la mitad del cielo'; el término griego es una expresión apocalíptica distintiva.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'a los sentados sobre la tierra'; en Apocalipsis esta expresión funciona idiomáticamente para los habitantes de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - un ángel más
  - uno adicional
  lexicon: BDAG
  rationale: ἄλλος indica otro de la misma clase. En español, 'otro' es la forma natural y conserva la secuencia narrativa sin añadir matiz.
- source_word: ἄγγελον
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el contexto apocalíptico de Apocalipsis, ἄγγελος se entiende primariamente como ser celestial; 'ángel' es la equivalencia directa y esperada.
- source_word: πετόμενον
  english_pob_choice: flying
  chosen_spanish: que volaba
  alternatives_spanish:
  - que iba volando
  - volando
  lexicon: BDAG
  rationale: El participio presente expresa acción en curso. 'Que volaba' fluye bien en español y conserva la imagen de movimiento.
- source_word: ἐν μεσουρανήματι
  english_pob_choice: in midheaven
  chosen_spanish: en medio del cielo
  alternatives_spanish:
  - en el mediodía del cielo
  - en el cenit
  - en el aire
  lexicon: BDAG
  rationale: '''Medio del cielo'' comunica la imagen apocalíptica de μεσουράνημα de forma comprensible en español. Mantiene la altura/visibilidad sin volverla una expresión opaca.'
- source_word: ἔχοντα
  english_pob_choice: having
  chosen_spanish: que tenía
  alternatives_spanish:
  - teniendo
  - que llevaba
  lexicon: BDAG
  rationale: El participio se une de manera natural a la descripción del ángel. 'Que tenía' es directo y no fuerza una lectura más interpretativa.
- source_word: εὐαγγέλιον αἰώνιον
  english_pob_choice: an eternal gospel
  chosen_spanish: un evangelio eterno
  alternatives_spanish:
  - el evangelio eterno
  - una buena noticia eterna
  lexicon: BDAG
  rationale: '''Evangelio'' preserva la resonancia cristiana del término sin sustituirlo por un giro más genérico. ''Eterno'' corresponde bien a αἰώνιον y ''un'' refleja el artículo indefinido del griego.'
- source_word: εὐαγγελίσαι
  english_pob_choice: to proclaim
  chosen_spanish: para proclamarlo
  alternatives_spanish:
  - para anunciarlo
  - para evangelizar
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa naturalmente con 'para proclamarlo'. El pronombre retoma 'evangelio' y evita una redundancia pesada en español.
- source_word: ἐπὶ τοὺς καθημένους ἐπὶ τῆς γῆς
  english_pob_choice: to those who dwell on the earth
  chosen_spanish: a los que se sientan sobre la tierra
  alternatives_spanish:
  - a los que habitan sobre la tierra
  - a los moradores de la tierra
  lexicon: BDAG
  rationale: La imagen literal de 'sentados' está presente en el griego y puede mantenerse en español sin perder sentido. Aunque en Apocalipsis funciona idiomáticamente para los habitantes de la tierra, aquí se conserva la tensión lexical para no borrar la metáfora subyacente.
- source_word: γῆς
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  lexicon: BDAG
  rationale: En este pasaje, γῆ se traduce mejor por 'tierra' porque la frase fija 'sobre la tierra' refleja el complemento griego y su uso apocalíptico recurrente.
- source_word: πᾶν ἔθνος καὶ φυλὴν καὶ γλῶσσαν καὶ λαόν
  english_pob_choice: every nation and tribe and language and people
  chosen_spanish: toda nación, tribu, lengua y pueblo
  alternatives_spanish:
  - cada nación, tribu, lengua y pueblo
  - toda nación y tribu y lengua y pueblo
  lexicon: BDAG
  rationale: La fórmula cuádruple de universalidad se conserva con un ritmo natural en español. 'Toda' expresa el valor distributivo de πᾶν y 'lengua' traduce bien γλῶσσα en esta lista étnico-lingüística.
theological_decisions:
- issue: Cómo conservar el valor apocalíptico de μεσουράνημα sin imponer una interpretación técnica demasiado cerrada
  english_pob_reading: in midheaven
  chosen_spanish_reading: en medio del cielo
  alternative_spanish_readings:
  - en el cielo medio
  - en el cenit
  - en medio del aire
  rationale: El griego usa una expresión distintiva de imaginería apocalíptica. 'En medio del cielo' mantiene la altura visible y la función narrativa sin volver el texto oscuro o excesivamente técnico.
  doctrine_reference: Translation philosophy §§1, 6
- issue: 'Cómo tratar τοὺς καθημένους ἐπὶ τῆς γῆς: literalidad frente a idiomatismo'
  english_pob_reading: those who dwell on the earth
  chosen_spanish_reading: a los que se sientan sobre la tierra
  alternative_spanish_readings:
  - a los que habitan sobre la tierra
  - a los moradores de la tierra
  rationale: El POB inglés decidió explicar el valor idiomático; en español se conserva la imagen verbal de 'sentarse' para no borrar la metáfora del griego. La frase sigue siendo comprensible en contexto apocalíptico y deja visible la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al usar comas coordinadas en lugar de incisos largos, reflejando la sintaxis griega con una estructura formal y continua. Se mantuvo la misma base léxica y la lectura universal de la lista final.
  spanish_consistency_notes:
  - Se conserva 'evangelio' para εὐαγγέλιον, en coherencia con la terminología cristiana estable del texto fuente y del POB inglés.
  - Se mantiene 'tierra' para γῆ en la frase fija 'sobre la tierra', que en Apocalipsis funciona como designación recurrente de los habitantes terrenales.
  - La lista final 'nación, tribu, lengua y pueblo' preserva la fórmula apocalíptica de universalidad sin añadir elementos interpretativos.
