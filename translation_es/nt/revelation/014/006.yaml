    text: Or 'in the middle of the sky' or 'in midair'; the Greek term is a distinctive apocalyptic expression.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to those sitting/seated on the earth'; in Revelation this expression functions idiomatically for the earth's inhabitants.
    reason: lexical_alternative
