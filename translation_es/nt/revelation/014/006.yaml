  text: Καὶ εἶδον ⸀ἄλλον ἄγγελον πετόμενον ἐν μεσουρανήματι, ἔχοντα εὐαγγέλιον αἰώνιον εὐαγγελίσαι ⸀ἐπὶ τοὺς καθημένους ἐπὶ τῆς γῆς καὶ ἐπὶ πᾶν ἔθνος καὶ φυλὴν καὶ γλῶσσαν καὶ λαόν,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/006.yaml
  text: And I saw another angel flying in midheaven[a], having an eternal gospel to proclaim to those who dwell on the earth, and to every nation and tribe and language and people[b],
  footnotes:
