base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/016.yaml
  text: And the one seated on the cloud cast his sickle upon the earth[c][b][a], and the earth was harvested.
  footnotes:
  - marker: a
    text: Or 'cast his sickle onto the earth.' The Greek verb is literally 'threw/cast,' but in this harvesting context it refers to setting the sickle in motion for reaping.
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth was reaped.'
    reason: lexical_alternative
  - marker: c
    text: The one seated on the cloud is often identified from the preceding context as the Son of Man, though the verse itself states only 'the one seated on the cloud.'
    reason: alternative_reading
