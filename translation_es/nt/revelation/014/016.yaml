translation:
  language: es
  text: Y el que está sentado sobre la nube[c] arrojó su hoz sobre[a] la tierra, y la tierra fue segada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tierra». El griego ἐπὶ con acusativo puede expresar dirección hacia la tierra en la acción de segar; aquí «sobre» conserva bien la imagen del movimiento de la hoz.
    reason: lexical_alternative
  - marker: b
    text: O «fue cosechada». El verbo griego θερίζω puede traducirse de ambas maneras; «fue segada» conserva mejor la imagen de la hoz.
    reason: lexical_alternative
  - marker: c
    text: El que está sentado sobre la nube puede entenderse, por el contexto previo, como una alusión al Hijo del Hombre; sin embargo, este versículo mismo solo dice «el que está sentado sobre la nube».
    reason: alternative_reading
lexical_decisions:
- source_word: ἔβαλεν
  english_pob_choice: cast
  chosen_spanish: arrojó
  alternatives_spanish:
  - echó
  - lanzó
  - puso
  lexicon: BDAG
  rationale: βάλλω con un instrumento agrícola puede expresar la acción de poner en movimiento la hoz para segar. En español, «arrojó» conserva la idea de un movimiento dirigido sin volverlo mecánico; «echó» o «lanzó» son posibles, pero menos precisos en este contexto.
- source_word: ὁ καθήμενος ἐπὶ ⸂τῆς νεφέλης⸃
  english_pob_choice: the one seated on the cloud
  chosen_spanish: el que estaba sentado sobre la nube
  alternatives_spanish:
  - el que está sentado sobre la nube
  - el sentado sobre la nube
  - quien estaba sentado sobre la nube
  lexicon: BDAG
  rationale: El participio sustantivado se traduce de forma explícita y natural en español. «El que estaba sentado» preserva la referencia descriptiva sin identificar prematuramente al personaje más allá del texto inmediato.
- source_word: νεφέλης
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - una nube
  lexicon: BDAG
  rationale: El artículo en griego favorece un referente definido. En el contexto apocalíptico de la visión, «la nube» mantiene la referencia ya conocida.
- source_word: δρέπανον
  english_pob_choice: sickle
  chosen_spanish: hoz
  alternatives_spanish:
  - hoz de segar
  - guadaña
  lexicon: BDAG
  rationale: «Hoz» es el equivalente natural y estándar en español para el instrumento de siega. «Guadaña» puede sonar más grande o más moderna; «hoz» conserva mejor la imagen bíblica.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - contra la tierra
  - a la tierra
  lexicon: BDAG
  rationale: ἐπί con acusativo aquí indica dirección hacia la tierra en el acto de segar. «Sobre la tierra» comunica el movimiento sin introducir una lectura más fuerte que el griego.
- source_word: ἐθερίσθη
  english_pob_choice: was harvested
  chosen_spanish: fue segada
  alternatives_spanish:
  - fue cosechada
  - fue recolectada
  - fue segada / fue reaped
  lexicon: BDAG
  rationale: El pasivo de θερίζω puede traducirse «segar» o «cosechar». En este pasaje, «fue segada» conserva mejor la imagen de la hoz y la acción del segador, mientras que «fue cosechada» suena más general.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra/ el mundo
  lexicon: BDAG
  rationale: En Apocalipsis γῆ suele referirse al ámbito terrestre y, en español, «la tierra» reproduce bien la fuerza cósmica del término. Mantiene además la repetición enfática del verso.
theological_decisions:
- issue: Identidad del que segaba sentado sobre la nube
  english_pob_reading: The one seated on the cloud is often identified from the preceding context as the Son of Man, though the verse itself states only 'the one seated on the cloud.'
  chosen_spanish_reading: 'La traducción conserva solo la descripción: «el que estaba sentado sobre la nube».'
  alternative_spanish_readings:
  - el Hijo del Hombre sentado sobre la nube
  - Cristo sentado sobre la nube
  - un ángel sentado sobre la nube
  rationale: El griego no nombra explícitamente al personaje en este versículo. La redacción española mantiene esa tensión interpretativa y evita introducir una identificación doctrinal no expresada en la línea inmediata.
  doctrine_reference: Preservar la ambigüedad textual sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la traducción desde una imagen más libre («swung ... over») hacia una más cercana al griego («cast ... upon»). La propuesta española sigue esa dirección revisada con «arrojó ... sobre», preservando el movimiento concreto del verbo βάλλω sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «la tierra» para γῆ, coherente con el contexto apocalíptico y con la decisión inglesa de no reducirlo a «land».
  - Se usa «hoz» para δρέπανον, manteniendo la imaginería agrícola del juicio o la siega.
  - La frase descriptiva «el que estaba sentado sobre la nube» evita añadir una identificación explícita no dada por el versículo.
  - Se conserva la pasiva en «fue segada» para reflejar ἐθερίσθη y la acción divina/pasiva del texto.
  - La puntuación sigue el español editorial moderno y conserva la repetición enfática de «la tierra».
