base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/013.yaml
  text: 'And I heard a voice from heaven saying[a], “Write: Blessed are the dead who die in the Lord from now on.” “Yes,” says the Spirit, “so that they may rest from their labors[b], for their deeds follow with them.”'
  footnotes:
