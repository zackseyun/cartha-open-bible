translation:
  language: es
  text: 'Y oí una voz desde el cielo que decía: «Escribe: Bienaventurados los muertos que mueren en el Señor desde ahora». «Sí —dice el Espíritu—, para que descansen[a] de sus trabajos, porque sus obras van con ellos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que descansen». La cláusula griega puede entenderse con matiz de propósito o resultado.
    reason: alternative_reading
  - marker: b
    text: O «porque sus obras los acompañan». El griego dice literalmente que sus obras siguen con ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνῆς ἐκ τοῦ οὐρανοῦ λεγούσης
  english_pob_choice: a voice from heaven saying
  chosen_spanish: una voz desde el cielo que decía
  alternatives_spanish:
  - una voz del cielo que decía
  - una voz que venía del cielo y decía
  lexicon: BDAG
  rationale: φωνή se rinde naturalmente como «voz»; ἐκ τοῦ οὐρανοῦ se expresa mejor en español como «desde el cielo». El participio presente λεγούσης se mantiene con una cláusula relativa en imperfecto/pretérito «que decía» para conservar el carácter de introducción de habla continua sin forzar el español.
- source_word: Γράψον
  english_pob_choice: Write
  chosen_spanish: Escribe
  alternatives_spanish:
  - Escribe esto
  lexicon: BDAG
  rationale: Imperativo aoristo singular; «Escribe» reproduce la orden directa sin añadir un objeto no presente en el griego.
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: BDAG
  rationale: En un contexto de bienaventuranza bíblica, «Bienaventurados» preserva el tono solemne y tradicional sin perder claridad en español.
- source_word: οἱ νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  lexicon: BDAG
  rationale: El adjetivo sustantivado se vuelve de manera natural «los muertos»; «difuntos» suaviza demasiado el contraste verbal del pasaje.
- source_word: οἱ ἐν κυρίῳ ἀποθνῄσκοντες
  english_pob_choice: who die in the Lord
  chosen_spanish: que mueren en el Señor
  alternatives_spanish:
  - que mueren en el Señor Jesús
  - que fallecen en el Señor
  lexicon: BDAG
  rationale: 'La construcción participial sustantivada se traduce como relativa: «que mueren». «En el Señor» conserva la relación de pertenencia/unión sin explicarla más de lo que el texto permite.'
- source_word: ἀπ’ ἄρτι
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de aquí en adelante
  - desde este momento
  lexicon: BDAG
  rationale: Expresión temporal idiomática; «desde ahora» es claro y natural en español y conserva el punto de partida marcado por el texto.
- source_word: ναί, λέγει τὸ πνεῦμα
  english_pob_choice: Yes, says the Spirit
  chosen_spanish: Sí —dice el Espíritu—
  alternatives_spanish:
  - Sí, dice el Espíritu
  - Sí, responde el Espíritu
  lexicon: BDAG
  rationale: «Sí» reproduce la afirmación enfática ναί. El sujeto explícito «el Espíritu» se conserva, y el inciso con rayas ayuda a reflejar el ritmo oracular del original.
- source_word: ἵνα ἀναπαήσονται
  english_pob_choice: so that they may rest
  chosen_spanish: para que descansen
  alternatives_spanish:
  - a fin de que descansen
  - para que puedan descansar
  lexicon: BDAG
  rationale: ἵνα con futuro expresa finalidad/resultado; en español, «para que descansen» transmite esa finalidad de forma natural sin sobredeterminarla. «Descansen» conserva el valor de ἀναπαύω sin añadir matices ajenos.
- source_word: ἐκ τῶν κόπων αὐτῶν
  english_pob_choice: from their labors
  chosen_spanish: de sus trabajos
  alternatives_spanish:
  - de sus labores
  - de sus fatigas
  lexicon: BDAG
  rationale: κόπος puede ser «trabajo», «labor» o «fatiga». «Trabajos» comunica bien el esfuerzo perseverante del contexto y suena más natural en español que un calco más rígido.
- source_word: τὰ γὰρ ἔργα αὐτῶν
  english_pob_choice: for their deeds
  chosen_spanish: porque sus obras
  alternatives_spanish:
  - pues sus hechos
  - porque sus acciones
  lexicon: BDAG
  rationale: ἔργα admite «obras» o «hechos». En español bíblico «obras» preserva la conexión léxica con la esfera moral/activa del texto y funciona bien en la cláusula causal.
- source_word: ἀκολουθεῖ μετ’ αὐτῶν
  english_pob_choice: follow with them
  chosen_spanish: los siguen con ellos
  alternatives_spanish:
  - los acompañan
  - van con ellos
  lexicon: BDAG
  rationale: El singular ἀκολουθεῖ con sujeto neutro plural se refleja naturalmente en español con plural por concordancia de sentido. Se conserva μετά mediante «con ellos», manteniendo la idea de acompañamiento en lugar de reducirla a un simple objeto directo.
theological_decisions:
- issue: Sentido de «en el Señor» respecto de los muertos
  english_pob_reading: 'Rendered as covenantal/union language without expanding it interpretively: ''the dead who die in the Lord.'''
  chosen_spanish_reading: «los muertos que mueren en el Señor» sin ampliar a una paráfrasis doctrinal
  alternative_spanish_readings:
  - los muertos que mueren fieles al Señor
  - los muertos que mueren perteneciendo al Señor
  rationale: 'La frase ἐν κυρίῳ se deja relativamente literal para preservar su amplitud teológica: unión, pertenencia y fidelidad pueden estar implicadas, y el verso no exige restringirla con una paráfrasis interpretativa.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Fuerza de ἵνα ἀναπαήσονται
  english_pob_reading: Purpose/result nuance retained with 'so that they will rest.'
  chosen_spanish_reading: Finalidad/resultado retenidos con «para que descansen»
  alternative_spanish_readings:
  - a fin de que descansen
  - de modo que descansen
  rationale: La construcción puede expresar propósito o resultado. «Para que descansen» conserva esa fuerza sin imponer una precisión sintáctica que el griego no obliga a decidir.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Relación de las obras con los muertos bienaventurados
  english_pob_reading: Their works accompany them as consequent testimony, not as an explicit statement of meritorious salvation.
  chosen_spanish_reading: Sus obras los siguen con ellos como testimonio consecuente, sin convertirlo en una afirmación explícita de mérito salvífico
  alternative_spanish_readings:
  - sus obras los siguen
  - sus obras van con ellos
  rationale: El texto afirma que sus obras los siguen con ellos; no define el mecanismo. La traducción permanece cercana al griego y evita importar una tesis sobre mérito o minimizar el peso de las obras.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no haga.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado en inglés: se conservó el valor de ἵνα como finalidad/resultado y la idea de que las obras acompañan a los muertos; en español se eligieron formulaciones naturales («para que descansen», «sus obras los siguen con ellos») sin suavizar la tensión lexical de κόπος/ἔργα ni el matiz escatológico del anuncio.'
  spanish_consistency_notes:
  - Se usa «Bienaventurados» para la fórmula de beatitud, consistente con un registro bíblico solemne.
  - Se mantiene «el Señor» como equivalente de κύριος según el contexto cristológico/covenantal del pasaje.
  - Se prefirió «obras» a «deeds/hechos» por coherencia con el campo semántico bíblico habitual y por mejor continuidad con otros lugares del libro.
  - La puntuación con rayas para el dicho del Espíritu busca claridad en español y conserva el cambio de voz del texto griego.
