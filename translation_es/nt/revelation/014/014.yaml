translation:
  language: es
  text: Y miré, y he aquí una nube blanca, y sentado sobre la nube uno como un hijo de hombre[a], que tenía en la cabeza una corona de oro[b] y en la mano una hoz afilada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «uno como el Hijo del Hombre». La expresión evoca Daniel 7:13 y suele entenderse como un título mesiánico, aunque el griego aquí no lleva artículo: «como un hijo de hombre».'
    reason: alternative_reading
  - marker: b
    text: El griego στέφανος puede referirse a una corona de vencedor o guirnalda, más que a una diadema real.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ εἶδον
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  - Y contemplé
  lexicon: BDAG
  rationale: «Miré» conserva el matiz visionario y narrativo de la escena apocalíptica, más cercano al gesto de atención que introduce el griego que un simple «vi».
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: BDAG
  rationale: «He aquí» reproduce bien la fuerza deíctica e interjectiva de ἰδοὺ en un contexto de visión, manteniendo un tono digno y natural en español bíblico contemporáneo.
- source_word: νεφέλη λευκή
  english_pob_choice: a white cloud
  chosen_spanish: una nube blanca
  alternatives_spanish:
  - una nube brillante
  lexicon: BDAG
  rationale: «Blanca» sigue de forma directa el valor léxico de λευκή. No se amplía a «brillante» para no introducir una interpretación no explicitada por el adjetivo griego.
- source_word: ἐπὶ τὴν νεφέλην καθήμενον
  english_pob_choice: seated on the cloud
  chosen_spanish: sentado sobre la nube
  alternatives_spanish:
  - sentado en la nube
  - sentado encima de la nube
  lexicon: BDAG
  rationale: «Sentado sobre la nube» expresa con naturalidad la relación espacial del participio καθήμενον con ἐπί + acusativo, sin perder la dignidad del cuadro visionario.
- source_word: ὅμοιον υἱὸν ἀνθρώπου
  english_pob_choice: one like a son of man
  chosen_spanish: uno como hijo de hombre[a]
  alternatives_spanish:
  - uno como el Hijo del Hombre
  - uno como un hijo de hombre
  lexicon: BDAG
  rationale: Se conserva la falta de artículo del griego mediante «hijo de hombre» y no se fija de entrada el título tradicional «el Hijo del Hombre». «Uno como» mantiene la comparación de ὅμοιον sin suavizarla.
- source_word: στέφανον χρυσοῦν
  english_pob_choice: a golden crown
  chosen_spanish: una corona de oro
  alternatives_spanish:
  - una corona dorada
  - una corona de vencedor de oro
  lexicon: BDAG
  rationale: «Corona de oro» es una forma clara y fiel para στέφανον χρυσοῦν. Aunque στέφανος puede sugerir corona de victoria o guirnalda, esa matización se reserva para nota, no para el cuerpo del texto.
- source_word: δρέπανον ὀξύ
  english_pob_choice: a sharp sickle
  chosen_spanish: una hoz afilada
  alternatives_spanish:
  - una hoz aguda
  - una hoz de segar afilada
  lexicon: BDAG
  rationale: «Hoz» es el equivalente natural de δρέπανον en español; «afilada» comunica el valor de ὀξύ sin cargar el texto con una perífrasis innecesaria.
theological_decisions:
- issue: Cómo traducir υἱὸν ἀνθρώπου sin resolver de antemano su alcance cristológico
  english_pob_reading: Rendered 'one like a son of man' in the main text, with a footnote noting the possible title reading and Danielic echo
  chosen_spanish_reading: «uno como hijo de hombre» en el texto principal, con nota sobre la lectura titula y la alusión a Daniel 7:13
  alternative_spanish_readings:
  - uno como el Hijo del Hombre
  - uno como un ser humano
  rationale: La formulación española mantiene la comparación y la anarthrousness del griego sin imponer en el cuerpo del texto la forma titular tradicional. La nota preserva la tensión teológica y la referencia daniélica sin borrarla.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
- issue: Cómo reflejar el matiz de στέφανος
  english_pob_reading: a golden crown, with a note that stephanos is often a victor's wreath rather than a royal diadem
  chosen_spanish_reading: «corona de oro» en el texto principal, con nota que indica que στέφανος suele ser corona de vencedor o guirnalda
  alternative_spanish_readings:
  - corona de vencedor
  - guirnalda de oro
  - diadema de oro
  rationale: Se evita sustituir el término por «diadema», que añadiría una connotación regia no explicitada por στέφανος. La nota conserva la posibilidad léxica de corona de vencedor sin complicar la lectura principal.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical tension; prefer source-grounded transparency over harmonization'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el texto inglés auditado quedó sin cambios en la última pasada, con alta concordancia del revisor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma para el nombre divino, pero en este versículo no aparece el tetragrámaton ni κύριος con función de nombre divino.
  - Se usa «hijo de hombre» sin mayúsculas en el texto principal para reflejar la forma anartrosa del griego; la mayúscula queda reservada para la alternativa titulada en la nota.
  - «Corona de oro» conserva la transparencia textual; la matización de corona de vencedor se coloca en nota para no borrar la posible tensión semántica de στέφανος.
  - «Hoz» se elige por ser el término español natural para δρέπανον; no se amplía a «hoz de segar» porque el contexto inmediato ya fija la imagen agrícola.
