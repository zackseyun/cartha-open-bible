translation:
  language: es
  text: 'Y otro ángel salió del altar[a], el que tiene autoridad sobre el fuego, y gritó a gran voz al que tenía la hoz aguda, diciendo: «Envía tu hoz aguda y recoge los racimos de la vid de la tierra[b], porque sus uvas están maduras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mete tu hoz aguda». El verbo griego significa literalmente «enviar», pero en lenguaje de cosecha algunos lo vierten idiomáticamente como «meter».'
    reason: lexical_alternative
  - marker: b
    text: «La vid de la tierra» es una imagen apocalíptica; el texto no identifica explícitamente aquí su referente, aunque el contexto circundante es de juicio.
    reason: cross_reference
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - otro mensajero
  lexicon: BDAG
  rationale: En el contexto visionario de Apocalipsis, ἄγγελος se entiende naturalmente como un ser angélico. «Otro ángel» conserva la secuencia narrativa de ἄλλος sin introducir una paráfrasis.
- source_word: ἐκ τοῦ θυσιαστηρίου
  english_pob_choice: from the altar
  chosen_spanish: salió del altar
  alternatives_spanish:
  - vino del altar
  - procedió del altar
  lexicon: BDAG
  rationale: El griego indica procedencia; en español, «salió del altar» comunica con naturalidad la imagen de procedencia desde el altar celestial. Se mantiene el vínculo espacial sin forzar un calco.
- source_word: ὁ ἔχων ἐξουσίαν ἐπὶ τοῦ πυρός
  english_pob_choice: the one who has authority over the fire
  chosen_spanish: el que tiene autoridad sobre el fuego
  alternatives_spanish:
  - el que tiene autoridad sobre el fuego
  - el que está a cargo del fuego
  lexicon: BDAG
  rationale: La construcción articular participial funciona descriptivamente. «El que tiene autoridad sobre el fuego» preserva ἔχων en presente y la relación de autoridad de ἐξουσίαν ἐπὶ τοῦ πυρός.
- source_word: ἐφώνησεν φωνῇ μεγάλῃ
  english_pob_choice: called out with a loud voice
  chosen_spanish: gritó con gran voz
  alternatives_spanish:
  - clamó con gran voz
  - alzó la voz con fuerza
  lexicon: BDAG
  rationale: En español bíblico, «gritó con gran voz» transmite bien el sentido de un clamor audiblemente fuerte. Se conserva la referencia explícita a la voz como intensificación, no solo como adverbio.
- source_word: τῷ ἔχοντι τὸ δρέπανον τὸ ὀξὺ
  english_pob_choice: to the one who had the sharp sickle
  chosen_spanish: al que tenía la hoz aguda
  alternatives_spanish:
  - al que tenía la hoz afilada
  - al que llevaba la hoz aguda
  lexicon: BDAG
  rationale: δρέπανον se vierte mejor como «hoz» en español. «Aguda» mantiene ὀξύς y su repetición enfática. Se usa pasado en la relativa para concordar con la narración.
- source_word: Πέμψον σου τὸ δρέπανον τὸ ὀξὺ
  english_pob_choice: Send out your sharp sickle
  chosen_spanish: Envía tu hoz aguda
  alternatives_spanish:
  - Manda tu hoz aguda
  - Lanza tu hoz aguda
  lexicon: BDAG
  rationale: πέμπω literalmente es «enviar». «Envía» preserva el verbo fuente sin depender de una idiomatización agrícola que la base griega no exige. Se mantiene el posesivo «tu».
- source_word: τρύγησον
  english_pob_choice: gather
  chosen_spanish: vendimia
  alternatives_spanish:
  - recoge
  - cosecha
  lexicon: BDAG
  rationale: τρυγάω se usa específicamente para la recolección de uvas. «Vendimia» es el equivalente más preciso en español y conserva el matiz vitícola del verbo.
- source_word: τοὺς βότρυας
  english_pob_choice: the clusters
  chosen_spanish: los racimos
  alternatives_spanish:
  - los racimos de uvas
  - los racimos
  lexicon: BDAG
  rationale: βότρυς designa racimos de uvas. «Racimos» es el sustantivo natural en español y mantiene la imagen concreta sin redundancia excesiva.
- source_word: τῆς ἀμπέλου τῆς γῆς
  english_pob_choice: the vine of the earth
  chosen_spanish: de la vid de la tierra
  alternatives_spanish:
  - de la vid de la tierra
  - de la vid terrenal
  lexicon: BDAG
  rationale: Se conserva la metáfora apocalíptica casi literalmente. «Vid de la tierra» mantiene el doble genitivo y evita interpretar de antemano el referente simbólico.
- source_word: ἤκμασαν
  english_pob_choice: are ripe
  chosen_spanish: están maduras
  alternatives_spanish:
  - han madurado
  - están en sazón
  lexicon: BDAG
  rationale: ἤκμασαν expresa haber alcanzado plena madurez. En español, «están maduras» comunica ese estado con claridad y sin sobrecargar el texto.
- source_word: αἱ σταφυλαὶ αὐτῆς
  english_pob_choice: its grapes
  chosen_spanish: sus uvas
  alternatives_spanish:
  - sus uvas
  - sus frutos
  lexicon: BDAG
  rationale: σταφυλαί se refiere a uvas. «Sus uvas» evita un lenguaje arcaizante y se ajusta al referente inmediato de la vid.
theological_decisions:
- issue: Preservación de la metáfora de la vid de la tierra
  english_pob_reading: Rendered literally as 'the vine of the earth' rather than interpreting it as humanity or the wicked in the main text.
  chosen_spanish_reading: Se mantiene «la vid de la tierra» en el texto principal, sin explicarla como una referencia directa a los impíos.
  alternative_spanish_readings:
  - la vid terrenal entendida como los malvados
  - la vid que crece en la tierra
  rationale: El versículo presenta la imagen apocalíptica, no su explicación doctrinal completa. Mantener la metáfora preserva la tensión interpretativa documentada por la POB.
  doctrine_reference: Preservar la tensión apocalíptica sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se siguió de cerca el auditorio inglés de la POB y no hubo revisiones aplicadas en la fuente inglesa más allá del estado final ya aprobado; el punto principal de decisión fue mantener la metáfora apocalíptica y traducir τρυγάω con un término vitícola preciso en español.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros contextos del proyecto, pero aquí no aparece el tetragrámaton ni κύριος como sustituto relevante.
  - «Hoz» se mantuvo como equivalente natural de δρέπανον en español.
  - Se evitó «SEÑOR» y otras sustituciones litúrgicas no presentes en el griego.
  - La puntuación y la cadencia buscan lectura pública sin alterar el contenido semántico del original.
