translation:
  language: es
  text: 'diciendo en voz alta: «Teman[a] a Dios y denle gloria, porque ha llegado la hora de su juicio, y adoren al que hizo el cielo y la tierra y el mar y las fuentes de las aguas[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Reverencien a Dios». El verbo griego puede denotar tanto temor reverente como temor ante el juicio.
    reason: lexical_alternative
  - marker: b
    text: O «fuentes de agua» o «manantiales de agua». El griego dice literalmente «fuentes de aguas», con el plural mantenido.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων ἐν φωνῇ μεγάλῃ
  english_pob_choice: saying with a loud voice
  chosen_spanish: diciendo en voz alta
  alternatives_spanish:
  - diciendo con voz fuerte
  - diciendo en voz alta y clara
  lexicon: BDAG
  rationale: Conserva la conexión participial con la cláusula anterior y reproduce de manera natural ἐν φωνῇ μεγάλῃ. «En voz alta» expresa bien el matiz de volumen sin volverlo un mero adverbio mecánico.
- source_word: Φοβήθητε
  english_pob_choice: Fear
  chosen_spanish: Teman
  alternatives_spanish:
  - Reverencien
  - Tengan temor de
  lexicon: BDAG
  rationale: El imperativo plural en contexto de adoración y juicio pide mantener la fuerza de φοβέομαι. «Teman» preserva la tensión entre reverencia y temor ante Dios; «reverencien» suaviza demasiado el verbo, y «tengan temor de» suena menos natural aquí.
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - al Dios
  lexicon: BDAG
  rationale: Se traduce con el sustantivo teísta normal en español. El artículo griego no requiere marcarse en español.
- source_word: δότε αὐτῷ δόξαν
  english_pob_choice: give him glory
  chosen_spanish: denle gloria
  alternatives_spanish:
  - den gloria a él
  - rindan gloria a él
  lexicon: BDAG
  rationale: «Gloria» conserva la fuerza concreta de δόξαν. El clítico «le» evita una construcción pesada y mantiene la forma exhortativa directa.
- source_word: ὅτι ἦλθεν ἡ ὥρα
  english_pob_choice: because the hour ... has come
  chosen_spanish: porque ha llegado la hora
  alternatives_spanish:
  - porque llegó la hora
  - pues ha llegado la hora
  lexicon: BDAG
  rationale: «Porque» da claramente el valor causal de ὅτι en este contexto. «Ha llegado» conserva el impacto apocalíptico de ἦλθεν mejor que una simple forma pretérita.
- source_word: τῆς κρίσεως αὐτοῦ
  english_pob_choice: of his judgment
  chosen_spanish: de su juicio
  alternatives_spanish:
  - de su sentencia
  - de su juicio condenatorio
  lexicon: BDAG
  rationale: «Juicio» es la forma más natural y fiel para κρίςις en este pasaje. Mantiene tanto el sentido judicial como la solemnidad escatológica sin reducirlo a una sola acepción.
- source_word: προσκυνήσατε
  english_pob_choice: worship
  chosen_spanish: adoren
  alternatives_spanish:
  - postrarse ante
  - rindan culto a
  lexicon: BDAG
  rationale: En Apocalipsis el verbo tiene sentido de adoración religiosa. «Adoren» comunica mejor en español la dimensión cultual que «postrarse ante», sin perder la exigencia de sumisión reverente.
- source_word: τῷ ποιήσαντι
  english_pob_choice: the one who made
  chosen_spanish: al que hizo
  alternatives_spanish:
  - al que creó
  - al que ha hecho
  lexicon: BDAG
  rationale: El participio sustantivado se vuelve naturalmente en español «al que hizo». Esta forma conserva el carácter verbal de ποιήσαντι y evita una perífrasis más abstracta.
- source_word: τὸν οὐρανὸν καὶ τὴν γῆν καὶ θάλασσαν
  english_pob_choice: heaven and earth and sea
  chosen_spanish: el cielo y la tierra y el mar
  alternatives_spanish:
  - los cielos y la tierra y el mar
  - el cielo, la tierra y el mar
  lexicon: BDAG
  rationale: En español, «cielo y tierra» reproduce la fórmula bíblica de creación con claridad y naturalidad. «Mar» mantiene el paralelismo con la enumeración cósmica del texto.
- source_word: πηγὰς ὑδάτων
  english_pob_choice: springs of waters
  chosen_spanish: las fuentes de las aguas
  alternatives_spanish:
  - las fuentes de agua
  - los manantiales de las aguas
  lexicon: BDAG
  rationale: Se conserva la pluralidad literal del griego para no borrar la forma expresa «de las aguas». «Fuentes de las aguas» suena solemne y refleja mejor el plural del original que una normalización singular.
theological_decisions:
- issue: 'Φοβήθητε τὸν θεόν: temor reverente o temor/judicial'
  english_pob_reading: Fear God
  chosen_spanish_reading: Teman a Dios
  alternative_spanish_readings:
  - Reverencien a Dios
  - Tengan temor de Dios
  rationale: El contexto combina exhortación, gloria dada a Dios y anuncio de juicio. «Teman» preserva la tensión teológica que el inglés POB quiso mantener con «Fear», sin resolverla en un mero respeto decoroso.
  doctrine_reference: Preservar la tensión reverente/temerosa ante Dios, especialmente en contexto de juicio escatológico.
- issue: 'προσκυνήσατε τῷ ποιήσαντι: adoración vs. postración'
  english_pob_reading: worship the one who made
  chosen_spanish_reading: y adoren al que hizo
  alternative_spanish_readings:
  - y postrarse ante el que hizo
  - y rindan culto al que hizo
  rationale: En Apocalipsis, προσκυνέω normalmente implica adoración religiosa. «Adoren» transmite la fuerza cultual en español de manera más clara que una simple postura física.
  doctrine_reference: Uso cultual de προσκυνέω en Apocalipsis.
- issue: 'τῆς κρίσεως αὐτοῦ: sentido judicial/escatológico'
  english_pob_reading: his judgment
  chosen_spanish_reading: su juicio
  alternative_spanish_readings:
  - su sentencia
  - el juicio que le pertenece
  rationale: «Juicio» mantiene la ambigüedad productiva entre acto judicial y juicio final. No se debe estrechar el sentido a una sola acepción, porque el pasaje apunta al juicio divino ya inminente.
  doctrine_reference: Juicio divino escatológico en Apocalipsis.
translation_notes:
  revision_awareness: El registro griego y el contexto de la POB inglesa muestran acuerdo alto y no requieren cambios textuales mayores; se conserva la decisión óptima-equivalente de mantener la fuerza de φοβήθητε, el valor cultual de προσκυνήσατε y la literalidad elevada de πηγὰς ὑδάτων, con una españolización natural de las construcciones participiales y exhortativas.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se mantiene «juicio» para κρίσις, evitando la reducción a «sentencia» o «condena».
  - Se emplea «adoren» para προσκυνήσατε por su fuerza cultual en Apocalipsis.
  - Se conserva la pluralidad literal de «fuentes de las aguas» para reflejar el griego y la opción inglesa POB.
  - No se introduce «SEÑOR» ni una sustitución litúrgica que oculte el nombre divino, aunque este versículo no contiene el tetragrámaton.
