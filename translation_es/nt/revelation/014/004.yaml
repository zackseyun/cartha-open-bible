translation:
  language: es
  text: Estos son los que no se han contaminado[a] con mujeres, pues son vírgenes. Estos son los que siguen al Cordero adondequiera que vaya. Estos fueron comprados de entre los seres humanos como primicias para Dios y para el Cordero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O quizá esta imagen señala pureza espiritual o libertad de contaminación idolátrica, más que una afirmación solo literal sobre la abstinencia sexual.
    reason: alternative_reading
  - marker: b
    text: O «de entre la humanidad» o «de entre las personas». El griego se refiere a los seres humanos en general, no específicamente a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμολύνθησαν
  english_pob_choice: have not defiled themselves
  chosen_spanish: no se han contaminado
  alternatives_spanish:
  - no se han manchado
  - no han sido profanados
  lexicon: BDAG
  rationale: μολύνω expresa contaminación o profanación con matiz moral o cultual. En español, «contaminarse» comunica de forma natural esa idea sin perder el valor reflexivo implícito en el contexto.
- source_word: μετὰ γυναικῶν
  english_pob_choice: with women
  chosen_spanish: con mujeres
  alternatives_spanish:
  - con esposas
  - por mujeres
  lexicon: BDAG
  rationale: μετά con genitivo significa «con». γυνή puede ser «mujer» o «esposa», pero aquí el plural favorece «mujeres»; «esposas» añadiría una precisión no explicitada en el griego.
- source_word: παρθένοι
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - castos
  - doncellas
  lexicon: BDAG
  rationale: παρθένος significa primariamente «virgen». Mantener «vírgenes» conserva la imagen concreta del texto y evita suavizarla con una paráfrasis interpretativa.
- source_word: ἀκολουθοῦντες
  english_pob_choice: follow
  chosen_spanish: siguen
  alternatives_spanish:
  - van siguiendo
  - continúan siguiendo
  lexicon: BDAG
  rationale: El participio presente expresa una acción característica y continua. «Siguen» transmite bien ese valor en español sin recargar la frase.
- source_word: ἀρνίῳ
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el Corderito
  lexicon: BDAG
  rationale: En Apocalipsis ἀρνίον es un título cristológico fijo para Jesús. «El Cordero» preserva la imagen sacrificial y apocalíptica reconocible en español.
- source_word: ὅπου ἂν ὑπάγῃ
  english_pob_choice: wherever he goes
  chosen_spanish: adondequiera que vaya
  alternatives_spanish:
  - dondequiera que vaya
  - adonde vaya
  lexicon: BDAG
  rationale: 'La combinación expresa indefinición: «dondequiera/adondequiera». «Adondequiera que vaya» suena natural en español y conserva la apertura de la construcción griega.'
- source_word: ἠγοράσθησαν
  english_pob_choice: were purchased
  chosen_spanish: fueron comprados
  alternatives_spanish:
  - fueron adquiridos
  - fueron rescatados
  lexicon: BDAG
  rationale: ἀγοράζω significa literalmente «comprar». «Fueron comprados» mantiene el metáfora comercial-redentora sin introducir en el texto principal el término interpretativo «redimidos».
- source_word: ἀπὸ τῶν ἀνθρώπων
  english_pob_choice: from among mankind
  chosen_spanish: entre los seres humanos
  alternatives_spanish:
  - de entre la humanidad
  - de entre las personas
  lexicon: BDAG
  rationale: ἄνθρωποι se refiere a seres humanos en general, no a varones. «Entre los seres humanos» comunica ese valor colectivo con claridad y evita una lectura masculina restringida.
- source_word: ἀπαρχὴ
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primera ofrenda
  - primeros frutos
  lexicon: BDAG
  rationale: ἀπαρχή es un término cultual de la primera porción ofrecida a Dios. «Primicias» es el equivalente español establecido y conserva la resonancia sacrificial y de cosecha.
theological_decisions:
- issue: Si la frase sobre no contaminarse con mujeres debe entenderse literalmente o como imagen de pureza espiritual / fidelidad frente a la idolatría
  english_pob_reading: Rendered literally in the main text, with a footnote preserving the possible symbolic force.
  chosen_spanish_reading: Se mantiene literalmente en el texto principal, con nota que abre la posibilidad simbólica.
  alternative_spanish_readings:
  - Referirlo principalmente a pureza espiritual
  - Referirlo a libertad de contaminación idolátrica
  rationale: El griego es concreto y no conviene resolver en la traducción una tensión interpretativa que el texto deja abierta. La nota permite conservar la posibilidad simbólica sin sustituir la forma literal.
  doctrine_reference: Preservar la tensión teológica sin decidirla indebidamente en la traducción.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: sin cambios necesarios; la redacción mantiene la decisión literal en la primera cláusula, la imagen del Cordero y el valor de ἀπαρχή como «primicias».'
  spanish_consistency_notes:
  - Se preservó «el Cordero» para ἀρνίον conforme al uso fijo de Apocalipsis.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no presentes en el texto fuente.
  - «Primicias» conserva el matiz cultual de ἀπαρχή y la relación con Dios y el Cordero.
  - «Seres humanos» refleja ἀνθρώπων sin restringirlo a varones.
