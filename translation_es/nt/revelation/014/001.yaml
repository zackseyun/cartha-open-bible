translation:
  language: es
  text: Entonces miré[a], y he aquí, el Cordero estaba en pie en el monte Sion, y con él estaban ciento cuarenta y cuatro mil, con su nombre y el nombre de su Padre escritos en sus frentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen solo: «el nombre de su Padre escrito en sus frentes».'
    reason: textual_variant
lexical_decisions:
- source_word: Καὶ εἶδον
  english_pob_choice: Then I looked
  chosen_spanish: Entonces miré
  alternatives_spanish:
  - Y vi
  - Y miré
  lexicon: BDAG; uso narrativo apocalíptico
  rationale: καὶ εἶδον introduce una nueva escena visionaria; 'Entonces' conserva el avance narrativo, y 'miré' evita la frialdad de un simple 'vi' sin perder el sentido original.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: 'vi:'
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: BDAG; función deíctica apocalíptica
  rationale: En español, 'he aquí' puede sonar marcado o arcaico; el doble punto tras 'vi' permite conservar el golpe de atención de ἰδοὺ sin añadir una palabra extraña al flujo de lectura.
- source_word: τὸ ἀρνίον
  english_pob_choice: the Lamb
  chosen_spanish: el Cordero
  alternatives_spanish:
  - el Corderito
  - el Cordero de Dios
  lexicon: BDAG
  rationale: '''Cordero'' mantiene el título cristológico reconocido en Apocalipsis. No se amplía a ''de Dios'' porque el versículo no lo dice explícitamente.'
- source_word: ἑστὸς
  english_pob_choice: was standing
  chosen_spanish: estaba en pie
  alternatives_spanish:
  - estaba de pie
  - estaba parado
  lexicon: BDAG
  rationale: 'El participio perfecto expresa estado: no solo que se puso de pie, sino que permanece erguido. ''Estaba en pie'' es natural y preciso en español bíblico contemporáneo.'
- source_word: ἐπὶ τὸ ὄρος Σιών
  english_pob_choice: on Mount Zion
  chosen_spanish: sobre el monte Sion
  alternatives_spanish:
  - en el monte Sion
  - encima del monte Sion
  lexicon: BDAG
  rationale: '''Sobre'' reproduce bien ἐπὶ con la imagen espacial del texto. ''Monte Sion'' conserva la forma tradicional del nombre propio en español.'
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him were
  chosen_spanish: con él estaban
  alternatives_spanish:
  - y con él estaban
  - estaban con él
  lexicon: BDAG
  rationale: La frase española mantiene la relación de compañía sin recargar la sintaxis. El verbo implícito se expresa de manera natural con 'estaban'.
- source_word: ἑκατὸν τεσσεράκοντα τέσσαρες χιλιάδες
  english_pob_choice: one hundred forty-four thousand
  chosen_spanish: ciento cuarenta y cuatro mil
  alternatives_spanish:
  - ciento cuarenta y cuatro mil hombres
  - ciento cuarenta y cuatro mil personas
  lexicon: BDAG
  rationale: Se preserva exactamente la cifra sin añadir un sustantivo de género o categoría que el griego no aporta en esta cláusula.
- source_word: ἔχουσαι
  english_pob_choice: who had
  chosen_spanish: que tenían
  alternatives_spanish:
  - teniendo
  - los cuales tenían
  lexicon: BDAG
  rationale: El participio se vuelve una relativa natural en español. 'Que tenían' conserva la relación descriptiva sin forzar un gerundio.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  - su propio nombre
  lexicon: BDAG
  rationale: '''Su nombre'' es la forma más natural en español para el pronombre posesivo referido al Cordero.'
- source_word: καὶ τὸ ὄνομα τοῦ πατρὸς αὐτοῦ
  english_pob_choice: and his Father's name
  chosen_spanish: y el nombre de su Padre
  alternatives_spanish:
  - y su nombre de Padre
  - y el nombre de su Padre celestial
  lexicon: BDAG
  rationale: Se conserva la distinción entre el nombre del Cordero y el del Padre sin fusionarlos. 'Su Padre' refleja la relación posesiva del griego sin introducir ampliaciones doctrinales.
- source_word: γεγραμμένον
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - inscrito
  - grabado
  lexicon: BDAG
  rationale: 'El participio pasivo perfecto indica un estado resultante: algo ya escrito. ''Escrito'' es directo y suficiente; ''inscrito'' sería posible, pero más interpretativo.'
- source_word: ἐπὶ τῶν μετώπων αὐτῶν
  english_pob_choice: on their foreheads
  chosen_spanish: en sus frentes
  alternatives_spanish:
  - sobre sus frentes
  - en la frente de ellos
  lexicon: BDAG
  rationale: '''En sus frentes'' es idiomático en español y conserva la ubicación marcada. Se prefiere ''frentes'' a una formulación más literal pero menos natural.'
theological_decisions:
- issue: Identidad cristológica de τὸ ἀρνίον
  english_pob_reading: Rendered as the christological title 'the Lamb' without paraphrastic expansion.
  chosen_spanish_reading: Se mantiene el título cristológico 'el Cordero' sin expansión explicativa.
  alternative_spanish_readings:
  - el Cordero sacrificial
  - el Cordero de Dios
  rationale: El versículo identifica claramente al personaje, pero el texto no añade el calificativo; por eso la traducción conserva el título sin interpretarlo más allá de lo expresado.
  doctrine_reference: Apocalipsis 5; principio de no sobre-interpretación
- issue: Relación entre el nombre del Cordero y el del Padre
  english_pob_reading: Translated as 'his name and his Father's name,' preserving the distinction yet close association.
  chosen_spanish_reading: Se traduce como 'su nombre y el nombre de su Padre', preservando distinción y cercanía.
  alternative_spanish_readings:
  - su nombre, es decir, el nombre de su Padre
  - el nombre de su Padre y su nombre
  rationale: El griego presenta dos objetos coordinados; no obliga a convertirlos en una sola frase explicativa. La versión española mantiene la tensión entre pertenencia compartida y distinción personal.
  doctrine_reference: Jn 17:11-12; principio trinitario de distinción personal
- issue: Variación textual sobre la inscripción
  english_pob_reading: Followed the SBLGNT reading 'his name and his Father's name.'
  chosen_spanish_reading: 'Se sigue la lectura amplia: ''su nombre y el nombre de su Padre''.'
  alternative_spanish_readings:
  - solo el nombre de su Padre
  - su nombre
  rationale: La lectura principal incluye ambos nombres, pero se documenta en nota la variante manuscrita que omite 'su nombre'.
  doctrine_reference: Crítica textual del Apocalipsis
translation_notes:
  revision_awareness: Se revisó el pasaje con atención a la lectura griega de SBLGNT y al audit trail en inglés. La traducción española conserva la secuencia visionaria, el título cristológico, la distinción entre los dos nombres y la variante textual documentada en nota, sin ampliar ni armonizar más allá de lo que el texto base permite.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general, pero aquí el texto no contiene el tetragrámaton.
  - Se usa 'el Cordero' como título fijo cristológico, coherente con el uso de POB.
  - Se conserva 'Padre' con mayúscula por referencia divina.
  - La cifra 'ciento cuarenta y cuatro mil' se escribe con palabras por estilo bíblico y legibilidad.
  - '''Frentes'' traduce μετώπων de forma natural y consistente con el lenguaje apocalíptico.'
