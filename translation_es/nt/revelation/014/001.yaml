revisions:
- from: 'Entonces miré[a], y vi: el Cordero estaba en pie sobre el monte Sion, y con él estaban ciento cuarenta y cuatro mil, que tenían escrito en sus frentes su nombre y el nombre de su Padre.'
  to: Entonces miré[a], y he aquí, el Cordero estaba en pie en el monte Sion, y con él estaban ciento cuarenta y cuatro mil, con su nombre y el nombre de su Padre escritos en sus frentes.
  rationale: 'La revisión mantiene el contenido del borrador, pero refuerza la fidelidad al griego y mejora la naturalidad en español: se restituye la fuerza de ἰδοὺ con «he aquí», se usa «en el monte Sion» como giro más idiomático, y se reordena la cláusula final para que «escritos» modifique claramente a ambos nombres, en línea con la estructura y el sentido del original. La nota textual se conserva tal como corresponde al expediente inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la secuencia visionaria, el título cristológico «el Cordero», la cifra exacta, la distinción entre «su nombre» y «el nombre de su Padre», y la variante textual en nota. Sin embargo, ἰδοὺ queda algo debilitado al absorberse en «y vi:», y el orden «tenían escrito en sus frentes su nombre y el nombre de su Padre» es menos claro que una estructura donde «escritos» modifique directamente a los dos nombres. Además, «sobre el monte Sion» suena menos idiomático que «en el monte Sion» para ἐπὶ τὸ ὄρος Σιών en español bíblico natural.
  spanish_quality_summary: El español es generalmente claro y digno, pero puede pulirse para mayor naturalidad y para reflejar mejor la fuerza de la cláusula final. «He aquí» funciona bien en Apocalipsis y preserva la deíxis elevada sin resultar ininteligible. «En el monte Sion» es más idiomático que «sobre el monte Sion», y «con sus nombres escritos en sus frentes» evita una sintaxis algo cargada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «El Cordero», «Padre», y «Sion» son adecuados. No aparecen términos del glosario principal como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La traducción de ἰδοὺ como «vi:» debilita el marcador deíctico explícito.
    rationale: El griego usa tanto εἶδον como ἰδοὺ. Resolver ambos con «miré ... y vi:» comunica la escena, pero pierde el valor enfático de «behold». En Apocalipsis, «he aquí» sigue siendo comprensible y estilísticamente apropiado.
  - severity: low
    issue: «Sobre el monte Sion» suena menos natural en español que «en el monte Sion».
    rationale: Aunque ἐπὶ permite «sobre», en español la ubicación idiomática para alguien que está en una montaña suele ser «en el monte». No cambia el sentido, pero mejora la legibilidad.
  - severity: medium
    issue: El orden final «tenían escrito en sus frentes su nombre y el nombre de su Padre» puede sonar enrevesado.
    rationale: El griego presenta los dos nombres como el contenido que estaba escrito. En español resulta más claro decir que ellos estaban «con su nombre y el nombre de su Padre escritos en sus frentes», preservando el estado resultante de γεγραμμένον y la coordinación de ambos nombres.
  revised_spanish_text: Entonces miré[a], y he aquí, el Cordero estaba en pie en el monte Sion, y con él estaban ciento cuarenta y cuatro mil, con su nombre y el nombre de su Padre escritos en sus frentes.
  revised_footnotes:
  - marker: a
    text: 'Algunos manuscritos leen solo: «el nombre de su Padre escrito en sus frentes».'
    reason: textual_variant
  revision_rationale: 'La revisión mantiene el contenido del borrador, pero refuerza la fidelidad al griego y mejora la naturalidad en español: se restituye la fuerza de ἰδοὺ con «he aquí», se usa «en el monte Sion» como giro más idiomático, y se reordena la cláusula final para que «escritos» modifique claramente a ambos nombres, en línea con la estructura y el sentido del original. La nota textual se conserva tal como corresponde al expediente inglés.'
