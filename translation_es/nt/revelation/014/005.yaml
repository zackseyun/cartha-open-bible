translation:
  language: es
  text: Y en su boca no se halló mentira[a]; son sin mancha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sin defecto' o 'irreprensibles'; el término griego también puede evocar pureza sacrificial además de integridad moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Y además
  lexicon: BDAG
  rationale: Se conserva la continuidad del versículo con la descripción anterior. En español, 'Y' mantiene la conexión sin añadir énfasis innecesario.
- source_word: ἐν τῷ στόματι αὐτῶν
  english_pob_choice: in their mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en sus bocas
  - en su boca
  lexicon: BDAG
  rationale: Se conserva el singular colectivo del griego ('boca') como en la elección inglesa 'mouth'. 'En su boca' suena natural en español y mantiene la imagen de habla/contenido verbal.
- source_word: οὐχ εὑρέθη
  english_pob_choice: no lie was found
  chosen_spanish: no se halló
  alternatives_spanish:
  - no fue hallada
  - no se encontró
  lexicon: BDAG
  rationale: La pasiva aorista se refleja con una construcción impersonal/pasiva natural en español. 'No se halló' preserva la ausencia objetiva de mentira sin volver activa la frase.
- source_word: ψεῦδος
  english_pob_choice: lie
  chosen_spanish: mentira
  alternatives_spanish:
  - falsedad
  - engaño
  lexicon: BDAG
  rationale: '''Mentira'' es la equivalencia más directa y natural en español para el sustantivo singular. ''Falsedad'' es posible, pero algo más abstracta; ''engaño'' desplaza el foco hacia la intención o el acto de engañar.'
- source_word: ἄμωμοί
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - irreprensibles
  - sin defecto
  - sin culpa
  lexicon: BDAG
  rationale: Se opta por 'sin mancha' para preservar en español la doble resonancia ética y cultual del término griego. 'Irreprensibles' comunicaría el sentido moral, pero perdería más claramente la imaginería de pureza/sacrificio que la POB inglesa conserva en nota.
theological_decisions:
- issue: Cómo renderizar ἄμωμοί sin aplastar su posible trasfondo de pureza sacrificial ni absolutizar una perfección metafísica
  english_pob_reading: blameless, with a note that it can also mean without blemish or faultless
  chosen_spanish_reading: sin mancha
  alternative_spanish_readings:
  - irreprensibles
  - sin defecto
  - sin culpa
  rationale: '''Sin mancha'' mantiene la tensión entre integridad moral y pureza cultual, y evita sugerir una impecabilidad ontológica que el término no exige. La nota conserva las alternativas relevantes tal como la POB inglesa preserva el matiz sacrificial.'
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'La versión española sigue la lectura estable del testigo griego SBLGNT y mantiene el mismo equilibrio que la revisión inglesa reciente: una afirmación breve, sobria y no explicativa, con el matiz de ἄμωμοί preservado en nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque el pasaje no lo contiene.
  - '''Mentira'' conserva la literalidad y naturalidad del singular griego ψεῦδος.'
  - '''Sin mancha'' es coherente con el uso bíblico en español para pureza cultual y moral, sin borrar la alternativa ''sin defecto''.'
