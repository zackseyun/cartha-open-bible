  text: Καὶ ἄλλος ἄγγελος τρίτος ἠκολούθησεν αὐτοῖς λέγων ἐν φωνῇ μεγάλῃ· Εἴ τις προσκυνεῖ τὸ θηρίον καὶ τὴν εἰκόνα αὐτοῦ, καὶ λαμβάνει χάραγμα ἐπὶ τοῦ μετώπου αὐτοῦ ἢ ἐπὶ τὴν χεῖρα αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/009.yaml
  text: And another angel[a], a third, followed them, saying with a loud voice, “If anyone worships the beast and its image[b], and receives a mark on his forehead or on his hand,”
  footnotes:
  - marker: a
    text: Or “bows down to the beast and its image.” The Greek verb can denote prostration, but here it carries the sense of worshipful allegiance.
    reason: lexical_alternative
  - marker: b
    text: Greek “on his forehead or on his hand.” The singular masculine pronoun is used generically with “if anyone.”
    reason: cultural_note
