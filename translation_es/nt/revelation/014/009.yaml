translation:
  language: es
  text: 'Y otro ángel, un tercero, los siguió, diciendo a gran voz: «Si alguien adora a la bestia y a su imagen, y recibe una marca[a] en su frente o en su mano[b],»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postra ante la bestia y su imagen». El verbo griego puede indicar postración, pero aquí lleva el sentido de lealtad adoradora.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «en su frente o en su mano». El pronombre masculino singular se usa de manera genérica con «si alguien».'
    reason: cultural_note
lexical_decisions:
- source_word: ἄλλος ἄγγελος τρίτος
  english_pob_choice: another angel, a third one
  chosen_spanish: otro ángel, el tercero
  alternatives_spanish:
  - otro ángel, un tercero
  - otro, un tercer ángel
  lexicon: BDAG
  rationale: 'Conserva la doble marca del griego: ἄλλος añade ‘otro’ y τρίτος especifica el orden. En español, ‘el tercero’ expresa naturalmente la función appositiva sin perder la secuencia visionaria.'
- source_word: ἠκολούθησεν αὐτοῖς
  english_pob_choice: followed them
  chosen_spanish: lo siguió
  alternatives_spanish:
  - los siguió
  - vino detrás de ellos
  lexicon: BDAG
  rationale: El sujeto inmediato es ‘otro ángel’; en español, el pronombre singular concuerda con ese referente. El valor narrativo simple de ἀκολουθέω se conserva con ‘lo siguió’.
- source_word: λέγων ἐν φωνῇ μεγάλῃ
  english_pob_choice: saying with a loud voice
  chosen_spanish: diciendo con voz fuerte
  alternatives_spanish:
  - diciendo con voz alta
  - clamando con voz fuerte
  lexicon: BDAG
  rationale: ‘Con voz fuerte’ comunica la intensidad pública del anuncio. Se evita una paráfrasis excesiva, manteniendo la equivalencia funcional de ‘with a loud voice’.
- source_word: προσκυνεῖ
  english_pob_choice: worships
  chosen_spanish: adora
  alternatives_spanish:
  - se postra ante
  - rinde culto a
  lexicon: BDAG
  rationale: En Apocalipsis, προσκυνέω ante la bestia tiene peso de adoración idólatra, no solo de postura física. ‘Adora’ preserva esa carga teológica, como en la POB inglesa.
- source_word: τὸ θηρίον
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el monstruo
  - la fiera
  lexicon: BDAG
  rationale: ‘La bestia’ es la equivalencia establecida y reconocible en el contexto apocalíptico, sin atenuar la figura simbólica.
- source_word: τὴν εἰκόνα αὐτοῦ
  english_pob_choice: its image
  chosen_spanish: su imagen
  alternatives_spanish:
  - la imagen de ella
  - la imagen de él
  lexicon: BDAG
  rationale: En español, el posesivo ‘su’ evita forzar el género del antecedente griego neutro y mantiene la referencia al ídolo/imagen de la bestia.
- source_word: λαμβάνει
  english_pob_choice: receives
  chosen_spanish: recibe
  alternatives_spanish:
  - toma
  - acepta
  lexicon: BDAG
  rationale: ‘Recibe’ refleja la recepción del signo impuesto/aceptado sin reducirlo a una acción manual de ‘tomar’.
- source_word: χάραγμα
  english_pob_choice: a mark
  chosen_spanish: una marca
  alternatives_spanish:
  - un signo
  - un sello
  lexicon: BDAG
  rationale: ‘Marca’ es la opción más directa y neutral para χάραγμα, conservando la idea de señal identificadora sin introducir un matiz no atestiguado aquí.
- source_word: ἐπὶ τοῦ μετώπου αὐτοῦ ἢ ἐπὶ τὴν χεῖρα αὐτοῦ
  english_pob_choice: on his forehead or on his hand
  chosen_spanish: en su frente o en su mano
  alternatives_spanish:
  - sobre su frente o sobre su mano
  - en la frente o en la mano
  lexicon: BDAG
  rationale: La preposición ἐπί admite aquí ubicación. ‘En’ suena natural en español y conserva la localización marcada por el griego; el posesivo singular mantiene la referencia genérica del indefinido.
theological_decisions:
- issue: Función de προσκυνέω ante la bestia
  english_pob_reading: worships
  chosen_spanish_reading: adora
  alternative_spanish_readings:
  - se postra ante
  - rinde culto a
  rationale: La escena describe lealtad religiosa ilícita, no mera reverencia física. ‘Adora’ preserva la gravedad idolátrica sin diluir el juicio implícito en el pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Pronombre singular genérico con τις y αὐτοῦ
  english_pob_reading: on his forehead or on his hand
  chosen_spanish_reading: en su frente o en su mano
  alternative_spanish_readings:
  - en la frente o en la mano
  - en su frente o en su mano
  rationale: El griego usa singular masculino en una construcción indefinida. En español, el singular posesivo ‘su’ mantiene la referencia genérica sin convertirla en plural ni perder el enlace anafórico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del audit trail inglés, que simplificó la aposición a ‘a third’. En español se reflejó como ‘el tercero’, evitando expansión innecesaria y manteniendo la secuencia del ángel sin añadir contenido. También se conservó la fuerza religiosa de προσκυνέω y la referencia genérica singular de αὐτοῦ.
  spanish_consistency_notes:
  - Se usó ‘la bestia’ para θηρίον, conforme al uso apocalíptico estándar.
  - Se eligió ‘adora’ para προσκυνέω por su peso cultual; no se debilitó a ‘se postra’ en el texto principal.
  - ‘Marca’ traduce χάραγμα sin tecnicismos adicionales.
  - ‘Frente’ y ‘mano’ mantienen el paralelo espacial del griego; el posesivo singular ‘su’ refleja la forma griega sin neutralización plural.
