  to: Y oí un sonido[a] desde el cielo, como el sonido[a] de muchas aguas[b] y como el sonido[a] de un gran trueno[c], y el sonido[a] que oí era como el de unos arpistas que tocaban sus arpas[c].
  rationale: Se cambia 'voz' por 'sonido' en todas las ocurrencias para alinearse con la decisión léxica y teológica documentada por el POB, preservando mejor el carácter no verbal del fenómeno auditivo. La nota léxica se ajusta para dejar 'voz' como alternativa, no como lectura principal. Se retoca mínimamente la frase final para mayor naturalidad en español sin alterar el sentido.
