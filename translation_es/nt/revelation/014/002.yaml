translation:
  language: es
  text: Y oí un sonido[a] desde el cielo, como el sonido[a] de muchas aguas[b] y como el sonido[a] de un gran trueno[c], y el sonido[a] que oí era como el de unos arpistas que tocaban sus arpas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'voz' en cada ocurrencia de 'sonido'; la palabra griega φωνή puede significar cualquiera de las dos, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: '''Muchas aguas'' es una imagen bíblica de un estruendo vasto e imponente; compárese Ezequiel 43:2.'
    reason: cross_reference
  - marker: c
    text: La κιθάρα era un instrumento de cuerda antiguo, más cercano a una lira; en español bíblico suele traducirse 'arpa'.
    reason: cultural_note
lexical_decisions:
- source_word: φωνή
  english_pob_choice: sound
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: BDAG
  rationale: En Apocalipsis, φωνή puede referirse a una voz o a un sonido. Aquí el contexto compara lo oído con muchas aguas, gran trueno e instrumentos; por eso 'voz' mantiene la resonancia bíblica y permite que la comparación abarque tanto habla como sonido, sin resolver indebidamente la tensión semántica.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  lexicon: BDAG
  rationale: '''Desde el cielo'' reproduce el origen espacial y resulta natural en español. En Apocalipsis, οὐρανός puede tener sentido del ámbito celestial, pero ''cielo'' es el equivalente idiomático más claro aquí.'
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  lexicon: BDAG
  rationale: '''Como'' expresa con claridad la comparación repetida del versículo y es el giro más natural en español moderno.'
- source_word: ὑδάτων πολλῶν
  english_pob_choice: many waters
  chosen_spanish: muchas aguas
  alternatives_spanish:
  - grandes aguas
  - aguas abundantes
  lexicon: BDAG
  rationale: '''Muchas aguas'' conserva la imagen bíblica tradicional y la forma más cercana al griego, útil para mantener la resonancia intertextual.'
- source_word: βροντῆς μεγάλης
  english_pob_choice: loud thunder
  chosen_spanish: gran trueno
  alternatives_spanish:
  - trueno poderoso
  - trueno grande
  lexicon: BDAG
  rationale: μέγας con βροντή señala intensidad; 'gran trueno' preserva la fuerza de la imagen sin introducir una explicación adicional como 'sonoro'.
- source_word: κιθαρῳδῶν
  english_pob_choice: harpists
  chosen_spanish: arpistas
  alternatives_spanish:
  - músicos de arpa
  - tañedores de arpa
  lexicon: BDAG
  rationale: '''Arpistas'' funciona bien en español para quienes tocan este instrumento y mantiene la brevedad del texto. Aunque el instrumento antiguo es más cercano a una lira, el español bíblico reconoce ''arpa'' como equivalente establecido.'
- source_word: κιθαριζόντων
  english_pob_choice: playing
  chosen_spanish: que tocaban
  alternatives_spanish:
  - que tañían
  - que punteaban
  lexicon: BDAG
  rationale: El participio expresa la acción instrumental; 'tocaban' es el verbo natural y claro en español para el acto de tocar un instrumento.
- source_word: ἐν ταῖς κιθάραις αὐτῶν
  english_pob_choice: on their harps
  chosen_spanish: sus arpas
  alternatives_spanish:
  - con sus arpas
  - sobre sus arpas
  lexicon: BDAG
  rationale: En español, el complemento 'tocaban sus arpas' comunica de manera natural la relación instrumental. No hace falta reproducir mecánicamente la preposición, porque el verbo ya la incorpora idiomáticamente.
theological_decisions:
- issue: φωvή como 'voz' o 'sonido'
  english_pob_reading: Render φωνή as 'sound' rather than 'voice' throughout the verse.
  chosen_spanish_reading: Render φωνή como 'voz' en cada ocurrencia, sin distinguir artificialmente entre 'voz' y 'sonido'.
  alternative_spanish_readings:
  - usar 'sonido' en todas las ocurrencias
  - mezclar 'voz' y 'sonido' según el contexto
  rationale: El griego permite 'voz' y también 'sonido', y el contexto de Apocalipsis puede sostener una referencia auditiva poderosa sin determinar si es meramente impersonal. 'Voz' conserva la ambigüedad bíblica y no obliga a leer el pasaje como si fuera solo ruido no personal.
  doctrine_reference: Preservar la tensión semántica del original; primacía del texto fuente sobre una resolución interpretativa excesiva.
- issue: Instrumento de κιθάρα
  english_pob_reading: traditionally rendered 'harp'
  chosen_spanish_reading: usar 'arpa' como equivalente tradicional en español
  alternative_spanish_readings:
  - '''lira'''
  - '''instrumento de cuerda'''
  rationale: Aunque la κιθάρα antigua se acerca más a una lira que al arpa moderna, en español bíblico 'arpa' es el equivalente establecido y más reconocible. No se corrige aquí la tradición terminológica porque no mejora la claridad del versículo y podría desorientar al lector.
  doctrine_reference: Terminología bíblica estable en español cuando no contradice el sentido básico del original.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota al pie aparezca exactamente en el texto español: [a], [b] y [c]. No se añadieron marcas sin anclaje ni se reutilizó un marcador para notas distintas.'
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico claro y moderno en español.
  - Se preservó la repetición de 'voz' para reflejar la repetición de φωνή en el griego.
  - Se evitó una paráfrasis excesiva para conservar la imaginería sonora del versículo.
  - Se usó 'cielo' en lugar de una expresión más literal pero menos natural como 'cielos' o 'firmamento'.
