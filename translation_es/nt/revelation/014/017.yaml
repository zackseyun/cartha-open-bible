translation:
  language: es
  text: Y otro ángel salió del templo[a] en el cielo, teniendo también él una hoz afilada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santuario en el cielo». El griego ναός puede referirse más específicamente al recinto interior del templo o santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλος ἄγγελος
  english_pob_choice: another angel
  chosen_spanish: otro ángel
  alternatives_spanish:
  - un ángel diferente
  lexicon: BDAG
  rationale: ἄλλος expresa ‘otro’ de la misma clase, no necesariamente ‘diferente’ en sentido contrastivo. ‘Otro ángel’ es natural en español y conserva la continuidad de la serie visionaria.
- source_word: ἐξῆλθεν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - vino fuera
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι indica salida desde un lugar interior. ‘Salió’ es la equivalencia más idiomática en español y mantiene la imagen del movimiento desde el templo.
- source_word: τοῦ ναοῦ τοῦ ἐν τῷ οὐρανῷ
  english_pob_choice: the temple in heaven
  chosen_spanish: del templo que está en el cielo
  alternatives_spanish:
  - del santuario que está en el cielo
  - del templo celestial
  lexicon: BDAG
  rationale: ναός puede referirse al templo/santuario interior. Se conserva ‘templo’ en el texto principal, con una formulación explícita ‘que está en el cielo’ para reflejar el genitivo atributivo sin resolver la imagen apocalíptica mediante una paráfrasis interpretativa.
- source_word: ἔχων καὶ αὐτὸς
  english_pob_choice: also having
  chosen_spanish: llevando también él
  alternatives_spanish:
  - teniendo también él
  - también teniendo
  lexicon: BDAG
  rationale: El participio presente con καὶ αὐτός enfatiza que este ángel, igual que el anterior, porta un instrumento semejante. ‘Llevando también él’ suena natural en español y conserva el énfasis comparativo sin perder la relación participial.
- source_word: δρέπανον
  english_pob_choice: sickle
  chosen_spanish: hoz
  alternatives_spanish:
  - hoz de segar
  - guadaña pequeña
  lexicon: BDAG
  rationale: δρέπανον designa la herramienta de siega. En español, ‘hoz’ es el equivalente estándar y más preciso; ‘guadaña’ sugeriría una herramienta de otra forma y tamaño.
- source_word: ὀξύ
  english_pob_choice: sharp
  chosen_spanish: aguda
  alternatives_spanish:
  - afilada
  - punzante
  lexicon: BDAG
  rationale: ὀξύ modifica la hoz e indica filo o agudeza. ‘Aguda’ mantiene la imagen breve y concreta; ‘afilada’ también sería posible, pero ‘aguda’ conserva mejor la sencillez del adjetivo griego.
theological_decisions:
- issue: Imágenes del templo celestial
  english_pob_reading: Render ναός straightforwardly as 'temple' without interpretive expansion.
  chosen_spanish_reading: Traducir ναός como ‘templo’ y mantener ‘que está en el cielo’ sin convertirlo en una explicación simbólica.
  alternative_spanish_readings:
  - santuario
  - morada celestial
  rationale: La escena es apocalíptica y presenta la imagen tal como está. No se debe resolver si el referente es arquitectónico, litúrgico o simbólico; conservar esa tensión sigue el mismo principio de la versión inglesa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'El pasaje coincide con la última pasada revisada en el contexto inglés: no se reportaron cambios en la revisión más reciente y el consenso de control cruzado fue alto, con solo observaciones menores. Por eso se mantiene la estructura básica y solo se ajusta la naturalidad del español sin alterar la decisión lexical central.'
  spanish_consistency_notes:
  - Se mantiene ‘ángel’ para ἄγγελος y no se introduce terminología eclesiástica ajena al texto.
  - ‘Templo’ se conserva como término principal para ναός, en continuidad con el audit trail en inglés.
  - ‘Hoz’ traduce δρέπανον de forma estándar y no se reemplaza por una palabra más interpretativa.
  - La nota a pie de página preserva la alternativa lexical ‘santuario’ sin imponerla en el texto principal.
