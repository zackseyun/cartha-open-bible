translation:
  language: es
  text: Y fue pisado el lagar[a] fuera de la ciudad, y salió sangre del lagar hasta las bridas[b] de los caballos, por mil seiscientos estadios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lagar traduce aquí el griego ληνός, el sitio o instrumento donde se pisan uvas; conserva mejor la imagen agrícola y de juicio que una explicación más amplia.
    reason: lexical_alternative
  - marker: b
    text: 'O: «hasta los frenos de los caballos». χαλινός puede designar la brida o el freno del caballo; se eligió «bridas» por ser más natural y reconocible en español general dentro de esta imagen.'
    reason: lexical_alternative
  - marker: c
    text: Un estadio era una unidad antigua de distancia; 1.600 estadios equivalen aproximadamente a 296 kilómetros (184 millas).
    reason: cultural_note
lexical_decisions:
- source_word: ἐπατήθη
  english_pob_choice: was trodden
  chosen_spanish: fue pisado
  alternatives_spanish:
  - fue hollado
  - fue aplastado
  - fue prensado
  lexicon: BDAG
  rationale: El pasivo de πατέω expresa la acción de pisar/trotar sobre algo. "Fue pisado" conserva la imagen concreta del lagar y evita un giro más explicativo como "fue prensado", que trasladaría demasiado la metáfora hacia la elaboración del vino.
- source_word: ληνός / ληνοῦ
  english_pob_choice: winepress
  chosen_spanish: lagar
  alternatives_spanish:
  - prensa de uvas
  - prensa
  - lagar de vino
  lexicon: BDAG
  rationale: '"Lagar" es el equivalente natural en español para el aparato o lugar donde se pisan uvas. Mantiene la imagen agrícola y apocalíptica sin necesidad de añadir "de vino".'
- source_word: ἔξωθεν τῆς πόλεως
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - afuera de la ciudad
  - fuera de la urbe
  lexicon: BDAG
  rationale: La expresión espacial es directa. "Fuera de la ciudad" es la forma más natural y fiel en español.
- source_word: ἐξῆλθεν αἷμα
  english_pob_choice: blood came out
  chosen_spanish: salió sangre
  alternatives_spanish:
  - brotó sangre
  - fluyó sangre
  - sangre salió
  lexicon: BDAG
  rationale: El verbo ἐξέρχομαι indica salida. "Salió sangre" reproduce esa sencillez sin forzar una interpretación de flujo continuo; "fluyó" sería una suavización interpretativa que el texto griego no exige.
- source_word: ἄχρι τῶν χαλινῶν τῶν ἵππων
  english_pob_choice: up to the horses’ bridles
  chosen_spanish: hasta los frenos de los caballos
  alternatives_spanish:
  - hasta las riendas de los caballos
  - hasta los bridones de los caballos
  - hasta los frenos de los caballos
  lexicon: BDAG
  rationale: χαλινός puede referirse al freno/bridle del caballo. En español, "frenos" comunica el objeto de control del caballo y evita una frase más técnica o menos natural. Se conserva la medida gráfica de profundidad sin explicarla.
- source_word: ἀπὸ σταδίων χιλίων ἑξακοσίων
  english_pob_choice: for one thousand six hundred stadia
  chosen_spanish: por mil seiscientos estadios
  alternatives_spanish:
  - a lo largo de mil seiscientos estadios
  - por una distancia de mil seiscientos estadios
  - por 1.600 estadios
  lexicon: BDAG
  rationale: Se mantiene la unidad antigua "estadios" para preservar la especificidad del texto. "Por" expresa extensión/distancia de manera natural en español y sigue la decisión inglesa de no convertir la medida.
theological_decisions:
- issue: Conservar la imagen apocalíptica gráfica sin suavizarla
  english_pob_reading: Retain the concrete imagery of blood, horses’ bridles, and stadia without interpretive smoothing.
  chosen_spanish_reading: Conservar la imagen concreta de sangre, frenos de los caballos y estadios, sin explicar el símbolo dentro del versículo.
  alternative_spanish_readings:
  - Reformular como una descripción simbólica del juicio desbordante
  - Añadir una glosa interpretativa sobre la severidad del juicio
  rationale: El pasaje usa lenguaje deliberadamente vívido. La traducción española debe mantener la fuerza imagística y la tensión apocalíptica, en lugar de resolverla con paráfrasis explicativas.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El contexto inglés revisado eliminó la coma antes de la frase de distancia para que la extensión se entienda unida al movimiento de la sangre. En español se mantuvo la continuidad sintáctica con «por mil seiscientos estadios», sin coma intermedia, preservando todos los elementos del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce ληνός como «lagar» para conservar la imaginería del juicio, coherente con el léxico POB.
  - Se conserva la unidad antigua «estadios» sin conversión en el texto principal, con nota explicativa.
  - 'La puntuación sigue la lectura revisada del inglés POB: sin coma antes de la frase de distancia.'
