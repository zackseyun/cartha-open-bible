translation:
  language: es
  text: Aquí está la perseverancia de los santos[a], los que guardan los mandamientos de Dios y la fe de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fe en Jesús»; alternativamente, «la fidelidad de Jesús». La expresión griega es ambigua.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὧδε
  english_pob_choice: Here
  chosen_spanish: Aquí
  alternatives_spanish:
  - Aquí está
  - En esto
  - Aquí mismo
  lexicon: BDAG
  rationale: El adverbio deíctico señala la situación presente o el punto descrito. «Aquí» conserva la fuerza discursiva de «Here» en español natural. La forma «Aquí está» mantiene el valor copulativo implícito del griego sin introducir una paráfrasis mayor.
- source_word: ὑπομονὴ
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - endurecimiento paciente
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: El término expresa firmeza sostenida bajo prueba. «Perseverancia» comunica bien esa idea en español bíblico y legible. Se evita una expresión demasiado pesada como «perseverancia paciente», aunque sería posible.
- source_word: ἁγίων
  english_pob_choice: saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los seres santos
  - los consagrados
  lexicon: BDAG
  rationale: Es la designación neotestamentaria habitual del pueblo de Dios. «Los santos» es la equivalencia más estable y reconocible en español eclesial.
- source_word: τηροῦντες
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - observan
  - cumplen
  - custodian
  lexicon: BDAG
  rationale: En este contexto el participio describe obediencia fiel a los mandamientos divinos. «Guardar» conserva el sentido de observar y obedecer, y en español bíblico comunica la idea con naturalidad.
- source_word: ἐντολὰς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  - órdenes
  lexicon: BDAG
  rationale: Se refiere a los mandamientos divinos. «Mandamientos» preserva el peso normativo del término y su resonancia bíblica.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Por defecto, πίστις se traduce como «fe» en el texto principal. En español, «fe de Jesús» conserva la ambigüedad del genitivo griego sin resolverla prematuramente.
- source_word: Ἰησοῦ
  english_pob_choice: of Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - en Jesús
  - de Jesucristo
  lexicon: BDAG
  rationale: El genitivo se expresa de forma directa con «de Jesús». Dado que la construcción con πίστις es ambigua, la redacción principal se mantiene cercana al griego y deja abiertas las otras lecturas.
theological_decisions:
- issue: Sentido de τὴν πίστιν Ἰησοῦ
  english_pob_reading: the faith of Jesus
  chosen_spanish_reading: la fe de Jesús
  alternative_spanish_readings:
  - la fe en Jesús
  - la fidelidad de Jesús
  rationale: 'La frase es genuinamente ambigua: puede entenderse como fe orientada hacia Jesús o como fe/fidelidad asociada a Jesús. La redacción principal «la fe de Jesús» conserva esa tensión sin imponer una solución interpretativa, en línea con el tratamiento auditado del POB.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3; tabla de términos discutidos para πίστις'
translation_notes:
  revision_awareness: La edición inglesa revisada sustituyó los dos puntos por una coma para reflejar mejor la estructura aposicional del griego; la versión española sigue esa misma relación con una coma, sin añadir puntuación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se introduce «SEÑOR» porque aquí no aparece el nombre divino.
  - Se conserva «Jesús» como forma fija del nombre propio.
  - La puntuación reproduce la relación appositiva del griego con una coma.
  - «Los santos» y «mandamientos» siguen la terminología bíblica habitual sin suavizar la fuerza normativa del pasaje.
