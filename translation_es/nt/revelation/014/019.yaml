revisions:
- from: Y el ángel echó su hoz[a] sobre la tierra, y vendimió la vid de la tierra, y la echó en el gran lagar de la ira de Dios.
  to: Y el ángel echó su hoz[a] en la tierra, y vendimió la vid de la tierra, y la echó en el gran lagar de la ira de Dios.
  rationale: Se ajusta 'sobre la tierra' a 'en la tierra' para reflejar mejor εἰς τὴν γῆν conforme a la revisión inglesa auditada, y así la nota al pie vuelve a ser una alternativa genuina y útil. El resto del versículo puede mantenerse porque es fiel al griego, natural en español y coherente con las decisiones léxicas y teológicas documentadas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: mantiene la secuencia de acciones, conserva ''hoz'', ''vid de la tierra'', ''lagar'', ''ira de Dios'' y no añade interpretación alegórica. Sin embargo, hay una inconsistencia entre el texto principal (''echó ... sobre la tierra'') y la decisión auditada inglesa revisada, que volvió a una representación más formal de εἰς τὴν γῆν como ''into the earth''. En español, ''sobre la tierra'' suena más idiomático para la acción de la hoz, pero la nota al pie actual repite exactamente esa lectura como alternativa, por lo que no funciona como nota alternativa real.'
  spanish_quality_summary: 'El español es claro y digno. ''Vendimió la vid de la tierra'' y ''el gran lagar de la ira de Dios'' son naturales y fieles al registro bíblico. El principal problema de calidad es la nota al pie: está mal anclada porque el texto ya dice ''sobre la tierra'', de modo que la alternativa no alterna nada. Conviene ajustar el texto principal a ''en la tierra'' para alinearlo con la revisión inglesa y dejar la nota como verdadera opción idiomática: ''sobre la tierra''.'
  glossary_alignment: 'El borrador respeta bien la terminología del proyecto en este versículo: θεοῦ -> ''Dios'', θυμός -> ''ira'', ληνός -> ''lagar'', δρέπανον -> ''hoz'', ἄμπελος -> ''vid''. No hay conflicto con las políticas sobre Yahvé/Mesías. La elección ''vendimió'' refleja adecuadamente τρυγάω y mejora la precisión semántica.'
  issues:
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real al texto principal.
    rationale: El texto principal dice 'echó su hoz sobre la tierra' y la nota dice 'O “echó su hoz sobre la tierra”'. Esto invalida la función de la nota léxica y rompe la trazabilidad del audit trail.
  - severity: medium
    issue: La preposición principal conviene ajustarse para reflejar mejor εἰς.
    rationale: Aunque 'sobre la tierra' es idiomático, la revisión inglesa documentada eligió una formulación más formal equivalente a 'into the earth'. En español, 'en la tierra' preserva mejor ese valor sin volverse imposible, y deja 'sobre la tierra' como alternativa explicativa en nota.
  revised_spanish_text: Y el ángel echó su hoz[a] en la tierra, y vendimió la vid de la tierra, y la echó en el gran lagar de la ira de Dios.
  revised_footnotes:
  - marker: a
    text: O 'echó su hoz sobre la tierra'. El griego es más literalmente 'echó/arrojó', pero aquí la acción se entiende como el uso de la hoz para segar.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'sobre la tierra' a 'en la tierra' para reflejar mejor εἰς τὴν γῆν conforme a la revisión inglesa auditada, y así la nota al pie vuelve a ser una alternativa genuina y útil. El resto del versículo puede mantenerse porque es fiel al griego, natural en español y coherente con las decisiones léxicas y teológicas documentadas.
