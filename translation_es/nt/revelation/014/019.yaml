translation:
  language: es
  text: Y el ángel echó su hoz[a] en la tierra, y vendimió la vid de la tierra, y la echó en el gran lagar de la ira de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'echó su hoz sobre la tierra'. El griego es más literalmente 'echó/arrojó', pero aquí la acción se entiende como el uso de la hoz para segar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλεν
  english_pob_choice: cast
  chosen_spanish: echó
  alternatives_spanish:
  - arrojó
  - lanzó
  - echó su hoz sobre la tierra
  lexicon: BDAG
  rationale: βάλλω significa literalmente 'echar/lanzar/arrojar'. En este contexto con δρέπανον no conviene forzar una perífrasis explicativa en el texto principal; 'echó' conserva la acción verbal y la imagen apocalíptica. La nota permite aclarar que la acción implica poner la hoz en uso para segar.
- source_word: δρέπανον
  english_pob_choice: sickle
  chosen_spanish: hoz
  alternatives_spanish:
  - hoces de segar
  - guadaña
  lexicon: BDAG
  rationale: El instrumento agrícola normal en español para δρέπανον es 'hoz'. 'Guadaña' sugiere una herramienta distinta y más moderna en algunos contextos, por lo que sería menos precisa.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  - el suelo
  lexicon: BDAG
  rationale: En Apocalipsis, γῆ puede abarcar la tierra como ámbito humano y cósmico. 'Tierra' mantiene el alcance amplio y el eco repetido con 'de la tierra' en la misma frase.
- source_word: ἐτρύγησεν
  english_pob_choice: harvested
  chosen_spanish: vendimió
  alternatives_spanish:
  - cosechó
  - recogió
  - vendimió las uvas de
  lexicon: BDAG
  rationale: τρυγάω se usa especialmente de la recolección de uvas. 'Vendimió' preserva ese matiz vitivinícola mejor que el genérico 'cosechó', y encaja con 'la vid' y 'lagar' en el versículo.
- source_word: ἄμπελον τῆς γῆς
  english_pob_choice: the vine of the earth
  chosen_spanish: la vid de la tierra
  alternatives_spanish:
  - la vid terrenal
  - la vid de la tierra
  lexicon: BDAG
  rationale: ἄμπελος es 'vid', no 'viña'. Mantener 'de la tierra' conserva el genitivo y la repetición deliberada del lenguaje de la tierra en el versículo.
- source_word: ληνόν
  english_pob_choice: winepress
  chosen_spanish: lagar
  alternatives_spanish:
  - lagar de vino
  - prensa de vino
  lexicon: BDAG
  rationale: '''Lagar'' es el equivalente natural y tradicional en español para ληνός. En una imagen de juicio, comunica bien el instrumento de prensado sin necesidad de añadir ''de vino''.'
- source_word: θυμός
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  - enojo
  lexicon: BDAG
  rationale: En Apocalipsis, θυμός suele referirse a la ira intensa y judicial de Dios. 'Ira' es la forma más estable y reverente en español para preservar esa fuerza teológica.
- source_word: θεός
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: La genitiva es directa y no requiere explicación adicional. 'De Dios' mantiene la referencia explícita al origen de la ira.
- source_word: μέγαν
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - enorme
  lexicon: BDAG
  rationale: '''Gran'' es la colocación natural en español antepuesta a ''lagar'' y conserva el tono solemne del griego sin sobrecargar la frase.'
theological_decisions:
- issue: Imagen del juicio en el lagar
  english_pob_reading: Render the imagery straightforwardly as a harvest of the earth's vine cast into God's winepress, without allegorical expansion in the main text.
  chosen_spanish_reading: 'Presentar la imagen de forma directa: la vendimia de la vid de la tierra y su envío al gran lagar de la ira de Dios, sin explicar alegóricamente quién representa la vid en el texto principal.'
  alternative_spanish_readings:
  - Explicitar en el texto principal que se trata de los impíos de la tierra
  - Parafrasear como juicio final contra la humanidad
  rationale: El verso comunica juicio divino por la imagen misma del lagar de la ira de Dios. La traducción debe conservar esa tensión sin resolverla con una glosa interpretativa que el griego no impone de manera explícita.
  doctrine_reference: Preservar la tensión interpretativa y el simbolismo apocalíptico sin añadir exposición doctrinal al cuerpo del versículo.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail: se prefirió un verbo más literal para ἔβαλεν en lugar de una paráfrasis direccional, manteniendo la imaginería del instrumento agrícola y del lagar de juicio. También se respetó la lectura de ''earth'' como ''tierra'' y la terminología de juicio (''ira de Dios'') sin suavizarla.'
  spanish_consistency_notes:
  - Se usó 'hoz' para δρέπανον en lugar de 'guadaña' por precisión léxica.
  - Se mantuvo 'tierra' para γῆ con el mismo alcance repetido del texto.
  - '''Vendimió'' preserva el matiz específico de trillar/recoger uvas asociado a τρυγάω.'
  - '''Lagar'' comunica mejor ληνός en registro bíblico español que ''prensa de vino''.'
  - '''Ira de Dios'' mantiene la fuerza judicial de θυμός sin introducir una tonalidad emocional débil.'
