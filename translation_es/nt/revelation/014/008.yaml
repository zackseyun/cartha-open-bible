    changes_summary: Changed 'fury' to 'passion' for θυμός here, since in the phrase 'the wine of the θυμός of her sexual immorality' it more naturally conveys heated passion rather than wrath.
translation:
  language: es
  text: 'Y otro, un segundo ángel, siguió, diciendo: «Cayó, cayó Babilonia la grande,[b] la que ha hecho beber[a] a todas las naciones del vino de la pasión[c] de su inmoralidad sexual[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha embriagado a todas las naciones». El griego literalmente dice «ha hecho beber a todas las naciones».
    reason: lexical_alternative
  - marker: b
    text: «Babilonia la grande» conserva la fuerza titulada y personificada de la expresión griega.
    reason: style_note
  - marker: c
    text: O «la furia», «la ira» o «el arrebato». El griego θυμός puede expresar intensidad apasionada, furor o ira.
    reason: lexical_alternative
  - marker: d
    text: La imagen de la «inmoralidad sexual» probablemente es metafórica, con sentido de corrupción, idolatría e infidelidad, aunque el texto no la limita a una sola de esas ideas.
    reason: theological_note
lexical_decisions:
- source_word: ἄλλος … δεύτερος ἄγγελος
  english_pob_choice: another, a second angel
  chosen_spanish: otro, un segundo ángel
  alternatives_spanish:
  - otro ángel, un segundo
  - un segundo ángel
  lexicon: BDAG
  rationale: El griego conserva tanto ἄλλος como δεύτερος; por eso el español mantiene ambos valores sin suavizarlos en uno solo. La formulación con coma preserva la apposición y suena natural en español.
- source_word: ἠκολούθησεν
  english_pob_choice: followed
  chosen_spanish: siguió
  alternatives_spanish:
  - fue detrás
  - siguió después
  lexicon: BDAG
  rationale: Aquí el verbo marca secuencia en la visión. «Siguió» expresa bien ese avance narrativo sin introducir matices innecesarios.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presente se refleja con «diciendo», que conserva la dependencia verbal y el enlace con la acción anterior.
- source_word: Ἔπεσεν, ἔπεσεν
  english_pob_choice: Fallen, fallen
  chosen_spanish: Cayó, cayó
  alternatives_spanish:
  - Ha caído, ha caído
  - Cayó, cayó
  lexicon: BDAG
  rationale: La repetición aorística funciona como anuncio profético de juicio. En español, «Cayó, cayó» conserva la fuerza solemne y la repetición retórica sin forzar una perífrasis.
- source_word: Βαβυλὼν ἡ μεγάλη
  english_pob_choice: Babylon the great
  chosen_spanish: Babilonia la grande
  alternatives_spanish:
  - la gran Babilonia
  - Babilonia, la grande
  lexicon: BDAG
  rationale: Se mantiene el nombre propio y el título. «La grande» reproduce la construcción del griego y evita normalizarla en una forma menos cercana al orden original.
- source_word: ἐκ τοῦ οἴνου
  english_pob_choice: from the wine
  chosen_spanish: del vino
  alternatives_spanish:
  - de parte del vino
  - a partir del vino
  lexicon: BDAG
  rationale: ἐκ indica origen o fuente; «del vino» mantiene la imagen de una fuente desde la cual las naciones beben.
- source_word: τοῦ θυμοῦ
  english_pob_choice: the passion
  chosen_spanish: la pasión
  alternatives_spanish:
  - la furia
  - la ira
  - el arrebato
  lexicon: BDAG
  rationale: En este contexto, θυμός puede referirse a intensidad apasionada, ardor o furia. Siguiendo la revisión más reciente del POB, «pasión» conserva la ambigüedad entre exceso vehemente e impulso destructivo sin fijarla prematuramente en «ira».
- source_word: τῆς πορνείας αὐτῆς
  english_pob_choice: her sexual immorality
  chosen_spanish: su inmoralidad sexual
  alternatives_spanish:
  - su fornicación
  - su prostitución
  lexicon: BDAG
  rationale: πορνεία en Apocalipsis suele funcionar de manera metafórica, con resonancias de corrupción e infidelidad. «Inmoralidad sexual» es claro en español actual y preserva el campo semántico amplio sin cerrar la imagen a una sola interpretación.
- source_word: πεπότικεν
  english_pob_choice: has made ... drink
  chosen_spanish: ha hecho beber
  alternatives_spanish:
  - ha dado a beber
  - ha embriagado
  lexicon: BDAG
  rationale: El perfecto de ποτίζω expresa una acción completada con efecto vigente. «Ha hecho beber» mantiene la causatividad y el gesto imagístico de la copa sin añadir interpretación.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a los gentiles
  lexicon: BDAG
  rationale: «Naciones» refleja el valor colectivo de ἔθνη en este contexto apocalíptico. La preposición con objeto indirecto en español hace natural «ha hecho beber a todas las naciones».
theological_decisions:
- issue: Sentido de θυμός en la frase "del vino del θυμός de su πορνεία"
  english_pob_reading: The phrase preserves ambiguity between wrath, rage, and intense passion; the latest English revision prefers 'passion' in the main text.
  chosen_spanish_reading: «la pasión» en el texto principal
  alternative_spanish_readings:
  - «la ira»
  - «la furia»
  - «el arrebato»
  rationale: El español «pasión» permite conservar la tensión textual entre deseo vehemente y violencia destructiva. En esta línea, se sigue la revisión inglesa más reciente y se evita resolver el término de modo demasiado estrecho.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Alcance metafórico de "inmoralidad sexual"
  english_pob_reading: The image is likely metaphorical for corrupting, idolatrous, and unfaithful influence, but not limited to one of these alone.
  chosen_spanish_reading: Conservar «inmoralidad sexual» sin explicitar la metáfora en el texto principal.
  alternative_spanish_readings:
  - «fornicación»
  - «prostitución»
  - «idolatría»
  rationale: El pasaje usa imaginería sexual para describir la corrupción de Babilonia, pero el texto no reduce aquí la metáfora a una sola explicación. «Inmoralidad sexual» mantiene esa amplitud y deja la interpretación abierta donde el griego la deja abierta.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que cambió la traducción de θυμός de 'fury' a 'passion'. El español sigue esa decisión en el texto principal y conserva en nota las alternativas semánticas relevantes. También se preservó la formulación amplia de πορνεία como metáfora sin resolverla a una sola categoría interpretativa.
  spanish_consistency_notes:
  - Se usa «Babilonia» como nombre propio y «la grande» como epíteto, manteniendo el orden y la fuerza titulativa del griego.
  - «Naciones» se mantiene para ἔθνη, coherente con el uso apocalíptico colectivo.
  - La cita se cierra con comillas españolas y la puntuación se adapta a normas tipográficas del español.
  - Se evita «Cristo», «SEÑOR» u otras sustituciones no presentes en este versículo.
  - La repetición «Cayó, cayó» conserva el paralelismo enfático del original.
