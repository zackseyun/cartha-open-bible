source:
  edition: SBLGNT
  text: Καὶ ἄλλος ⸂δεύτερος ἄγγελος⸃ ἠκολούθησεν λέγων· Ἔπεσεν, ⸀ἔπεσεν Βαβυλὼν ἡ μεγάλη, ⸀ἣ ἐκ τοῦ οἴνου τοῦ θυμοῦ τῆς πορνείας αὐτῆς πεπότικεν πάντα τὰ ἔθνη.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/008.yaml
  text: And another[a], a second angel, followed, saying, “Fallen, fallen is Babylon the great[c][b], she who has made all the nations drink from the wine of the passion of her sexual immorality.”
  footnotes:
  - marker: a
    text: Or 'the wine of the wrath of her sexual immorality.' The Greek θυμός can mean 'wrath,' 'rage,' or intense 'fury/passion.'
    reason: lexical_alternative
  - marker: b
    text: The image of Babylon's 'sexual immorality' is likely metaphorical for corrupting, idolatrous, and unfaithful influence, though the text does not limit it to one of these alone.
    reason: cultural_note
  - marker: c
    text: Or 'has intoxicated all the nations.' The Greek literally says 'has made all the nations drink.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
