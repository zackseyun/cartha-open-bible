revisions:
- from: Y el humo de su tormento sube por los siglos de los siglos[a], y no tienen reposo de día y de noche, los que adoran a la bestia y su imagen[b], y quienquiera que recibe la marca de su nombre.
  to: Y el humo de su tormento sube por los siglos de los siglos[a], y no tienen reposo día y noche, los que adoran a la bestia y a su imagen[b], y cualquiera que recibe la marca de su nombre.
  rationale: Se corrige la gramática española con «adoran a la bestia y a su imagen», se mejora la naturalidad de ἡμέρας καὶ νυκτός con «día y noche», y se sustituye «quienquiera que recibe» por «cualquiera que recibe» para un español más claro sin perder la fuerza generalizante. Se conserva la tensión sintáctica del cierre mediante la nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: humo, tormento, ascenso continuo, falta de reposo, adoración de la bestia, imagen, marca y la fórmula temporal fuerte. También preserva la nota sobre la literalidad de εἰς αἰῶνας αἰώνων y la observación sobre el cierre abrupto. Sin embargo, hay dos puntos mejorables frente al original y al rastro POB: (1) «de día y de noche» suena menos idiomático que «día y noche» para ἡμέρας καὶ νυκτός; (2) la omisión de «a» en «adoran a la bestia» es un problema gramatical en español. Además, «quienquiera que recibe» es comprensible pero algo rígido; «cualquiera que recibe» conserva la generalización sin sonar forzado.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero contiene una incorrección menor de régimen verbal («adoran a la bestia») y una construcción algo poco natural («quienquiera que recibe»). «Por los siglos de los siglos» y «reposo» funcionan bien en registro bíblico legible. La puntuación y el flujo mejoran con ajustes leves.
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto y el expediente inglés: «tormento», «bestia», «imagen», «marca» y la fórmula temporal tradicional son adecuadas. No hay conflictos con términos doctrinales principales del glosario. El único ajuste terminológico sugerido es estilístico-sintáctico, no doctrinal.'
  issues:
  - severity: medium
    issue: Falta la preposición personal en «los que adoran a la bestia»
    rationale: En español natural y correcto, «adorar» lleva «a» ante complemento personal o personificado; además «la bestia» en Apocalipsis es un referente animado/personalizado.
  - severity: low
    issue: «de día y de noche» suena menos natural que «día y noche»
    rationale: ἡμέρας καὶ νυκτός expresa duración continua; en español bíblico y general «día y noche» es la forma más idiomática y directa.
  - severity: low
    issue: «quienquiera que recibe» resulta rígido en español contemporáneo
    rationale: Aunque intenta conservar la amplitud generalizante, «cualquiera que recibe» o «quien reciba» suenan más naturales. Dado que la nota ya preserva la alternativa más literal «si alguno recibe», puede preferirse una formulación principal más legible.
  revised_spanish_text: Y el humo de su tormento sube por los siglos de los siglos[a], y no tienen reposo día y noche, los que adoran a la bestia y a su imagen[b], y cualquiera que recibe la marca de su nombre.
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «por edades de edades».'
    reason: lexical_alternative
  - marker: b
    text: El griego termina de manera algo abrupta con «y si alguno recibe la marca de su nombre»; algunas traducciones lo suavizan como «y cualquiera que recibe».
    reason: alternative_reading
  revision_rationale: Se corrige la gramática española con «adoran a la bestia y a su imagen», se mejora la naturalidad de ἡμέρας καὶ νυκτός con «día y noche», y se sustituye «quienquiera que recibe» por «cualquiera que recibe» para un español más claro sin perder la fuerza generalizante. Se conserva la tensión sintáctica del cierre mediante la nota.
