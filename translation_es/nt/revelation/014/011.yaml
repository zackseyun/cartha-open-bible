source:
  edition: SBLGNT
  text: καὶ ὁ καπνὸς τοῦ βασανισμοῦ αὐτῶν εἰς αἰῶνας αἰώνων ἀναβαίνει, καὶ οὐκ ἔχουσιν ἀνάπαυσιν ἡμέρας καὶ νυκτός, οἱ προσκυνοῦντες τὸ θηρίον καὶ τὴν εἰκόνα αὐτοῦ, καὶ εἴ τις λαμβάνει τὸ χάραγμα τοῦ ὀνόματος αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/014/011.yaml
  text: And the smoke of their torment goes up forever and ever[a], and they have no rest day and night, those who worship the beast and its image[b], and whoever receives the mark of its name.
  footnotes:
  - marker: a
    text: Or more literally, 'for ages of ages.'
    reason: lexical_alternative
  - marker: b
    text: The Greek ends abruptly with 'and if anyone receives the mark of its name,' likely extending the description of those under judgment; some translations smooth this as 'and whoever receives.'
    reason: alternative_reading
