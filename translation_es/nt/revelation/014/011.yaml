translation:
  language: es
  text: Y el humo de su tormento sube por los siglos de los siglos[a], y no tienen reposo día y noche, los que adoran a la bestia y a su imagen[b], y cualquiera que recibe la marca de su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «por edades de edades».'
    reason: lexical_alternative
  - marker: b
    text: El griego termina de manera algo abrupta con «y si alguno recibe la marca de su nombre»; algunas traducciones lo suavizan como «y cualquiera que recibe».
    reason: alternative_reading
lexical_decisions:
- source_word: καπνὸς
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - humo visible
  - humo que asciende
  lexicon: BDAG
  rationale: «Humo» es el equivalente directo y natural en español, y conserva la imagen concreta sin explicarla más de lo que el texto permite.
- source_word: βασανισμοῦ
  english_pob_choice: torment
  chosen_spanish: tormento
  alternatives_spanish:
  - tortura
  - aflicción
  lexicon: BDAG
  rationale: «Tormento» mantiene el sentido de sufrimiento punitivo y resultante de juicio que expresa el término en este contexto apocalíptico, sin convertirlo en una descripción técnica del método.
- source_word: εἰς αἰῶνας αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por edades de edades
  lexicon: BDAG
  rationale: En español, la fórmula tradicional «por los siglos de los siglos» transmite bien la idiomática de duración indefinida/eterna que la expresión griega tiene en Apocalipsis, sin perder su tono solemne.
- source_word: ἀναβαίνει
  english_pob_choice: goes up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - va subiendo
  lexicon: BDAG
  rationale: «Sube» reproduce la imagen de movimiento ascendente con un verbo simple y natural. «Asciende» es más formal, pero menos transparente en español corriente.
- source_word: ἀνάπαυσιν
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - descanso
  - alivio
  - respiro
  lexicon: BDAG
  rationale: «Reposo» comunica la ausencia de alivio o cese del sufrimiento y encaja bien con el contraste apocalíptico de no tener descanso continuo.
- source_word: ἡμέρας καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - por el día y por la noche
  lexicon: BDAG
  rationale: La expresión española «de día y de noche» conserva el valor idiomático de continuidad sin sonar forzada.
- source_word: προσκυνοῦντες
  english_pob_choice: worship
  chosen_spanish: los que adoran
  alternatives_spanish:
  - los que rinden adoración
  - los que se postran ante
  lexicon: BDAG
  rationale: «Adoran» comunica el acto de homenaje religioso exigido por el contexto de Apocalipsis. «Rinden adoración» es posible, pero más pesado; «se postran ante» enfatiza el gesto físico más que el sentido de culto.
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal salvaje
  lexicon: BDAG
  rationale: «Bestia» es la forma establecida y precisa para el símbolo apocalíptico.
- source_word: εἰκόνα
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - estatua
  - silueta
  - representación
  lexicon: BDAG
  rationale: «Imagen» es el equivalente directo y mantiene la terminología recurrente de Apocalipsis.
- source_word: εἴ τις λαμβάνει
  english_pob_choice: whoever receives
  chosen_spanish: quienquiera que recibe
  alternatives_spanish:
  - quien reciba
  - si alguno recibe
  lexicon: BDAG
  rationale: La construcción griega es abrupta y generalizante. «Quienquiera que recibe» conserva esa amplitud y coordina bien con el grupo precedente, sin suavizar de más el cierre del versículo.
- source_word: χάραγμα
  english_pob_choice: mark
  chosen_spanish: marca
  alternatives_spanish:
  - señal
  - estigma
  - marca impresa
  lexicon: BDAG
  rationale: «Marca» es la correspondencia natural y suficientemente amplia para el signo identificador de Apocalipsis.
- source_word: τοῦ ὀνόματος αὐτοῦ
  english_pob_choice: of its name
  chosen_spanish: de su nombre
  alternatives_spanish:
  - de su nombre propio
  - que lleva su nombre
  lexicon: BDAG
  rationale: Se conserva el genitivo casi de manera directa, porque la frase es parte de la formulación apocalíptica y conviene no explicitar más de lo que el griego dice.
theological_decisions:
- issue: Duración del juicio expresada por εἰς αἰῶνας αἰώνων
  english_pob_reading: 'Rendered as unending duration: ''forever and ever'''
  chosen_spanish_reading: «por los siglos de los siglos»
  alternative_spanish_readings:
  - «para siempre»
  - «por edades de edades»
  rationale: La elección mantiene la fuerza de duración interminable sin rebajar el énfasis del griego. En español, la fórmula litúrgica tradicional es clara, digna y auditable como equivalente de la idiomática griega.
  doctrine_reference: Preservar la tensión escatológica del texto sin resolverla por tradición interpretativa ajena al versículo.
- issue: Sintaxis final abrupta de εἴ τις λαμβάνει
  english_pob_reading: 'Kept the Greek''s somewhat abrupt wording: ''those who worship ... and whoever receives ...'''
  chosen_spanish_reading: «y quienquiera que recibe la marca de su nombre»
  alternative_spanish_readings:
  - «y quien reciba la marca de su nombre»
  - «y si alguno recibe la marca de su nombre»
  rationale: Se mantiene la apertura general y el enlace con el grupo descrito antes, sin convertir la frase en una explicación más lisa de la que el griego ofrece. Esto preserva la tensión sintáctica del original y evita decidir más de lo necesario sobre la relación exacta de la cláusula final.
  doctrine_reference: Preservar la tensión textual en lugar de armonizarla de forma interpretativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste de la revisión inglesa más reciente, que prefirió «whoever receives» para coordinar mejor la cláusula final con la descripción anterior. En español se siguió esa coordinación natural con «quienquiera que recibe», manteniendo a la vez la abrupta generalización del griego y sin convertirla en una paráfrasis más lisa. También se respetó la preferencia revisada de una puntuación más fluida, reflejada en una sola frase continua.
  spanish_consistency_notes:
  - Se usa «bestia» para θηρίον, como término técnico apocalíptico estable.
  - Se usa «imagen» para εἰκών, en continuidad con la terminología de Apocalipsis.
  - Se mantiene «marca» para χάραγμα, sin añadir glosas en el texto principal.
  - Se evita «Señor»/«SEÑOR» porque el versículo no contiene el nombre divino; no aplica la convención de Yahvé aquí.
