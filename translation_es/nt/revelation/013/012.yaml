translation:
  language: es
  text: Y ejerce toda la autoridad de la primera bestia en su presencia[a]. Y hace que la tierra y los que habitan en ella adoren a la primera bestia[b], cuya herida mortal fue sanada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de ella». La expresión puede destacar que la segunda bestia actúa bajo la mirada de la primera o en su inmediata presencia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cuya herida de muerte fue sanada»; es decir, «cuya herida mortal fue sanada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - autoridad delegada
  lexicon: BDAG
  rationale: ἐξουσία se refiere aquí a autoridad ejercida o delegada, no simplemente a fuerza bruta. «Autoridad» conserva mejor ese valor y funciona bien en español.
- source_word: πᾶσαν
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - entera
  - completa
  lexicon: BDAG
  rationale: 'La idea es de totalidad: no una parte de la autoridad, sino la totalidad de ella. «Toda» es la forma natural en español.'
- source_word: ποιεῖ (first occurrence)
  english_pob_choice: exercises
  chosen_spanish: ejerce
  alternatives_spanish:
  - hace
  - lleva a cabo
  lexicon: BDAG
  rationale: La construcción «ejercer autoridad» es el equivalente español más natural para ποιεῖ τὴν ἐξουσίαν. Mantiene el sentido de poner en acto esa autoridad.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: in its presence
  chosen_spanish: en presencia de él
  alternatives_spanish:
  - delante de él
  - ante él
  lexicon: BDAG
  rationale: La frase puede indicar estar «delante de» o «en presencia de» alguien. Opto por una forma idiomática en español que conserva la relación de observación o inmediación sugerida por el griego.
- source_word: ποιεῖ (second occurrence)
  english_pob_choice: causes
  chosen_spanish: hace que
  alternatives_spanish:
  - causa que
  - obliga a
  lexicon: BDAG
  rationale: El verbo aquí tiene fuerza causativa con el infinitivo resultativo. «Hace que» expresa bien esa causalidad sin añadir un grado de coerción que el texto no especifica.
- source_word: τὴν γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: BDAG
  rationale: En Apocalipsis γῆ puede referirse al ámbito terrenal en contraste con el cielo; «la tierra» es el equivalente más directo y natural en español.
- source_word: τοὺς ἐν αὐτῇ κατοικοῦντας
  english_pob_choice: those who dwell on it
  chosen_spanish: los que habitan en ella
  alternatives_spanish:
  - sus habitantes
  - los que moran en ella
  lexicon: BDAG
  rationale: «Habitan» conserva el valor verbal de κατοικοῦντας y mantiene el eco apocalíptico de los «que habitan» la tierra.
- source_word: προσκυνήσουσιν
  english_pob_choice: to worship
  chosen_spanish: adoren
  alternatives_spanish:
  - rindan culto a
  - adoren
  lexicon: BDAG
  rationale: En este contexto la acción es rendir homenaje cultual al monstruo. «Adoren» es una traducción clara y fiel para el español bíblico contemporáneo.
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - bestia
  - monstruo
  lexicon: BDAG
  rationale: «Bestia» es la equivalencia establecida y directa para θηρίον en Apocalipsis.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primera
  alternatives_spanish:
  - primero
  - primera
  lexicon: BDAG
  rationale: 'La referencia es al primer monstruo frente al segundo en el contexto inmediato. En español concuerda con «bestia» en género femenino: «primera».'
- source_word: ἐθεραπεύθη
  english_pob_choice: was healed
  chosen_spanish: fue sanada
  alternatives_spanish:
  - fue curada
  - se sanó
  lexicon: BDAG
  rationale: θεραπεύω en pasivo significa ser sanado o curado. «Fue sanada» preserva el lenguaje de curación y el motivo del daño reversado.
- source_word: ἡ πληγὴ τοῦ θανάτου αὐτοῦ
  english_pob_choice: its mortal wound
  chosen_spanish: su herida mortal
  alternatives_spanish:
  - la herida de su muerte
  - la herida mortal de ella
  lexicon: BDAG
  rationale: La genitividad indica una herida caracterizada por la muerte. «Herida mortal» comunica bien el sentido idiomático en español sin sobrecargar la frase.
theological_decisions:
- issue: Grado de coerción en la adoración
  english_pob_reading: causes ... to worship
  chosen_spanish_reading: hace que ... adoren
  alternative_spanish_readings:
  - obliga a ... a adorar
  - fuerza a ... a adorar
  rationale: La sintaxis griega expresa causalidad y resultado, pero no especifica por sí misma el nivel de coerción. «Hace que» preserva esa tensión, evitando intensificar el texto más allá de lo que dice.
  doctrine_reference: Preservar la tensión textual sin resolverla más de lo que permite el griego.
- issue: Alcance de ἐνώπιον αὐτοῦ
  english_pob_reading: in its presence
  chosen_spanish_reading: en presencia de él
  alternative_spanish_readings:
  - delante de él
  - ante él
  rationale: La expresión puede sugerir acción bajo la mirada del primer monstruo o simplemente delante de él. La redacción escogida mantiene abierta esa ambigüedad legítima.
  doctrine_reference: Mantener ambigüedad semántica documentada.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura y la valoración del audit trail inglés: ἐξουσία como «autoridad», ἐνώπιον con matiz de presencia inmediata, ποιεῖ con fuerza causativa, y la herida como «mortal». No se documentaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usa «bestia» para θηρίον de manera consistente con Apocalipsis.
  - Se mantiene «Yahvé» no aplicable en este versículo; no hay sustituciones por convenciones litúrgicas.
  - Se evita «Cristo/Mesías» porque no aparece en el pasaje.
  - La concordancia en género se ajusta a «bestia» con «primera» y «sanada» para el referente implícito femenino en español.
