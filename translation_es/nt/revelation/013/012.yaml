source:
  edition: SBLGNT
  text: καὶ τὴν ἐξουσίαν τοῦ πρώτου θηρίου πᾶσαν ποιεῖ ἐνώπιον αὐτοῦ. καὶ ⸀ποιεῖ τὴν γῆν καὶ τοὺς ἐν αὐτῇ κατοικοῦντας ἵνα ⸀προσκυνήσουσιν τὸ θηρίον τὸ πρῶτον, οὗ ἐθεραπεύθη ἡ πληγὴ τοῦ θανάτου αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/013/012.yaml
  text: And it exercises all the authority of the first beast in its presence[a]. And it causes the earth and those who dwell on it to worship the first beast[b], whose mortal wound was healed.
  footnotes:
  - marker: a
    text: Or 'before it.' The phrase may emphasize that the second beast acts under the first beast's gaze or in its immediate presence.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'whose wound of death was healed'; that is, 'whose mortal wound was healed.'
    reason: lexical_alternative
