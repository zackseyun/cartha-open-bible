  to: Y ejerce toda la autoridad de la primera bestia en su presencia[a]. Y hace que la tierra y los que habitan en ella adoren a la primera bestia[b], cuya herida mortal fue sanada.
  rationale: Se corrige la concordancia de género («la primera bestia») y se mejora la naturalidad de la referencia pronominal («en su presencia»). También se ajustan las notas para concordar con el referente femenino «bestia» y con el relativo «cuya», que refleja mejor el griego οὗ en esta construcción española.
