translation:
  language: es
  text: Y le fue dado darle aliento[a] a la imagen de la bestia, para que incluso hablara la imagen de la bestia y hiciera que los que no adoraran la imagen de la bestia fueran matados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “espíritu” o “vida” a la imagen de la bestia.
    reason: lexical_alternative
  - marker: b
    text: O “y hacer que todos los que no adoraran la imagen de la bestia fueran matados”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  english_pob_choice: it was given
  chosen_spanish: le fue dado
  alternatives_spanish:
  - se le concedió
  - le fue concedido
  lexicon: BDAG
  rationale: La pasiva impersonal se conserva en español para no especificar quién concede la capacidad. 'Le fue dado' mantiene el giro apocalíptico de concesión/permiso sin añadir sujeto.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo se expresa con el clítico indirecto para fluidez natural en español; el referente masculino queda claro por el contexto inmediato.
- source_word: δοῦναι πνεῦμα
  english_pob_choice: to give breath
  chosen_spanish: darle aliento
  alternatives_spanish:
  - darle espíritu
  - darle vida
  lexicon: BDAG
  rationale: '''πνεῦμα'' puede ser espíritu, aliento o vida. Aquí, como la imagen queda animada para hablar, ''aliento'' conserva la imagen concreta y evita cargar el texto con una afirmación más metafísica de la necesaria. Se mantiene la tensión entre aliento/espíritu/vida.'
- source_word: εἰκών
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - estatua
  - semejanza
  lexicon: BDAG
  rationale: '''Imagen'' reproduce el término amplio del griego sin restringirlo a una forma específica como ''estatua''.'
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - monstruo
  lexicon: BDAG
  rationale: '''Bestia'' es el equivalente establecido y transmite el sentido apocalíptico del término.'
- source_word: ἵνα καὶ λαλήσῃ
  english_pob_choice: so that the image ... might even speak
  chosen_spanish: para que incluso hablara la imagen
  alternatives_spanish:
  - para que también hablara la imagen
  - para que la imagen incluso hablara
  lexicon: BDAG
  rationale: 'Se conserva el valor de propósito/resulto de ἵνα y se vierte καί como ''incluso'' para reflejar el asombro del texto: la imagen no solo recibe aliento, sino que también habla.'
- source_word: ποιήσῃ ἵνα
  english_pob_choice: and cause
  chosen_spanish: y hiciera que
  alternatives_spanish:
  - y causara que
  - y lograra que
  lexicon: BDAG
  rationale: En español, 'hacer que' expresa con naturalidad el valor causativo de ποιήσῃ seguido de ἵνα sin perder la fuerza del texto.
- source_word: ὅσοι ἐὰν μὴ προσκυνήσωσιν
  english_pob_choice: those who would not worship
  chosen_spanish: todos los que no adoraran
  alternatives_spanish:
  - quienes no adoraran
  - los que no adoraran
  lexicon: BDAG
  rationale: La construcción indefinida se expresa con una subordinada relativa natural en español. 'Adorar' mantiene el sentido religioso de προσκυνέω en Apocalipsis.
- source_word: προσκυνήσωσιν
  english_pob_choice: worship
  chosen_spanish: adoraran
  alternatives_spanish:
  - rindieran culto
  - se postraran ante
  lexicon: BDAG
  rationale: En este contexto el acto es religioso; 'adorar' es claro y bíblicamente reconocible en español sin perder el sentido de homenaje cultual.
- source_word: ἀποκτανθῶσιν
  english_pob_choice: to be killed
  chosen_spanish: fueran muertos
  alternatives_spanish:
  - fueran asesinados
  - fueran puestos a muerte
  lexicon: BDAG
  rationale: La pasiva preserva el resultado sufrido por el sujeto. 'Fueran muertos' es una forma bíblica y comprensible en español, cercana a la pasiva griega sin añadir precisión judicial que el texto no exige.
theological_decisions:
- issue: Sentido de πνεῦμα en la animación de la imagen
  english_pob_reading: Rendered as 'breath' rather than 'spirit' or 'life'
  chosen_spanish_reading: '''aliento'' en lugar de ''espíritu'' o ''vida'''
  alternative_spanish_readings:
  - espíritu
  - vida
  rationale: 'La escena presenta una parodia de animación: la imagen recibe algo que le permite hablar. ''Aliento'' conserva esa concreción y evita sugerir más de lo que el griego exige sobre un espíritu personal o una vida plena.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Agencia en la pasiva 'it was given'
  english_pob_reading: Left implicit
  chosen_spanish_reading: Se deja implícito el dador
  alternative_spanish_readings:
  - le fue dado por Dios
  - le fue dado por Satanás
  rationale: El griego no identifica al agente; la traducción mantiene esa ambigüedad y no la resuelve teológicamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión auditada del POB en inglés no introdujo cambios sustantivos; se conserva la lectura de 'breath' para πνεῦμα, la pasiva impersonal de ἐδόθη y la fuerza causativa de ποιήσῃ ἵνα, con adaptación idiomática natural al español.
  spanish_consistency_notes:
  - Se mantiene 'bestia' para θηρίον, conforme al uso apocalíptico estándar del proyecto.
  - Se usa 'imagen' para εἰκών de modo consistente con el paralelismo interno del versículo.
  - '''Adorar'' traduce προσκυνέω en sentido cultual, coherente con Apocalipsis.'
  - La pasiva 'fueran muertos' conserva la indefinición del agente y la voz pasiva del griego.
