revisions:
- from: Y le fue dado darle aliento[a] a la imagen de la bestia, para que incluso hablara la imagen de la bestia y hiciera que todos los que no adoraran la imagen de la bestia fueran muertos.
  to: Y le fue dado darle aliento[a] a la imagen de la bestia, para que incluso hablara la imagen de la bestia y hiciera que los que no adoraran la imagen de la bestia fueran matados[b].
  rationale: Se ajusta el texto para evitar la sobretraducción de ὅσοι ἐὰν con 'todos los que' en la línea principal, se mejora la naturalidad del español con 'fueran matados', y se añade la nota alternativa paralela al rastro inglés para conservar la opción con 'todos'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del griego: pasiva impersonal en ἐδόθη, dativo αὐτῷ, πνεῦμα como ''aliento'', εἰκών como ''imagen'', θηρίον como ''bestia'', y la fuerza causativa de ποιήσῃ ἵνα. También mantiene correctamente la ambigüedad sobre el dador. Sin embargo, ''todos los que no adoraran'' sobretraduce ὅσοι ἐὰν μὴ προσκυνήσωσιν, pues el inglés auditado evitó ''all'' en el texto principal y lo dejó solo como alternativa en nota. Además, ''fueran muertos'' es comprensible pero menos natural que ''fueran matados'' o ''los mataran'' para español moderno digno.'
  spanish_quality_summary: 'El español es generalmente claro y fiel, pero hay dos puntos a mejorar: 1) ''todos los que'' añade un alcance universal que el texto principal inglés decidió no explicitar; 2) ''fueran muertos'' suena algo acartonado en español actual. ''Los que no adoraran...'' y ''fueran matados'' preservan mejor la forma pasiva y mejoran la legibilidad sin perder solemnidad.'
  glossary_alignment: 'Alineado con la terminología del proyecto: πνεῦμα = ''aliento'' con nota para ''espíritu''/''vida''; θηρίον = ''bestia''; εἰκών = ''imagen''; προσκυνέω = ''adorar''. No hay conflictos con Yahvé/Mesías u otros términos globales.'
  issues:
  - severity: medium
    issue: '''todos los que'' añade un matiz no reflejado en el texto principal auditado'
    rationale: ὅσοι ἐὰν puede expresarse naturalmente como 'los que' o 'quienes'. El POB inglés reservó 'all' para una alternativa de nota, no para la línea principal. Conviene evitar esa explicitación en el texto base español.
  - severity: medium
    issue: '''fueran muertos'' es poco natural en español contemporáneo'
    rationale: Aunque formalmente cercano a la pasiva griega, en español moderno digno suena rígido y menos idiomático. 'Fueran matados' mantiene la pasiva y la claridad; 'los mataran' sería aún más natural pero cambia a pasiva refleja/impersonal de otro tipo.
  - severity: low
    issue: Falta la nota alternativa correspondiente al inglés sobre 'and make it so that all who do not worship...'
    rationale: El inglés POB preservó una alternativa para la construcción ποιήσῃ ἵνα con 'all'. Dado que el español revisado quitará 'todos' del texto principal, conviene reflejar esa alternativa en nota para conservar el rastro auditado.
  revised_spanish_text: Y le fue dado darle aliento[a] a la imagen de la bestia, para que incluso hablara la imagen de la bestia y hiciera que los que no adoraran la imagen de la bestia fueran matados[b].
  revised_footnotes:
  - marker: a
    text: O “espíritu” o “vida” a la imagen de la bestia.
    reason: lexical_alternative
  - marker: b
    text: O “y hacer que todos los que no adoraran la imagen de la bestia fueran matados”.
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para evitar la sobretraducción de ὅσοι ἐὰν con 'todos los que' en la línea principal, se mejora la naturalidad del español con 'fueran matados', y se añade la nota alternativa paralela al rastro inglés para conservar la opción con 'todos'.
