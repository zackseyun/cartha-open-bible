revisions:
- from: Y adorarán[a] a él todos los que habitan sobre la tierra, cuyos nombre no han sido escritos en el libro de la vida del Cordero[b] que fue inmolado[c] desde la fundación del mundo.
  to: 'Y todos los que habitan sobre la tierra lo adorarán: todo aquel cuyo nombre no ha sido escrito en el libro de la vida del Cordero, que fue inmolado[a] desde la fundación del mundo[b].'
  rationale: Se corrige la sintaxis para reflejar fielmente el singular del griego (‘cuyo nombre no ha sido escrito’), se elimina una nota innecesaria sobre ‘adorarán’, y se conserva la nota importante sobre la ambigüedad sintáctica de ‘desde la fundación del mundo’. La nueva redacción suena natural en español, mantiene la fuerza cultual y sacrificial del original, y sigue el razonamiento documentado del POB inglés.
