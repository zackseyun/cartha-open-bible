translation:
  language: es
  text: 'Y todos los que habitan sobre la tierra lo adorarán: todo aquel cuyo nombre no ha sido escrito en el libro de la vida del Cordero, que fue inmolado[a] desde la fundación del mundo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Inmolado’ traduce el sentido sacrificial de σφάζω con un registro digno y claro en español. También podría expresarse como ‘que fue sacrificado’ o ‘que fue muerto’, pero ‘inmolado’ preserva mejor el matiz sacrificial en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘todo aquel cuyo nombre no ha sido escrito desde la fundación del mundo en el libro de la vida del Cordero que fue inmolado’. El griego puede unir ‘desde la fundación del mundo’ ya sea con ‘fue inmolado’ o con ‘ha sido escrito’.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσκυνήσουσιν
  english_pob_choice: will worship
  chosen_spanish: adorarán
  alternatives_spanish:
  - se postrarán ante
  - rendirán adoración a
  lexicon: BDAG
  rationale: En Apocalipsis, προσκυνέω expresa acto de reverencia cultual; en español, ‘adorarán’ comunica mejor la fuerza religiosa que una simple postración física, sin perder la posibilidad de homenaje reverente implícita en el contexto.
- source_word: κατοικοῦντες ἐπὶ τῆς γῆς
  english_pob_choice: who dwell on the earth
  chosen_spanish: los que habitan sobre la tierra
  alternatives_spanish:
  - los que viven sobre la tierra
  - los moradores de la tierra
  lexicon: BDAG
  rationale: Se conserva la imagen recurrente de Apocalipsis con un verbo explícito, evitando un sustantivo más interpretativo. ‘Habitan sobre la tierra’ mantiene la transparencia y la consistencia intertextual.
- source_word: οὗ ... τὸ ὄνομα αὐτοῦ
  english_pob_choice: whose name
  chosen_spanish: cuyos nombre
  alternatives_spanish:
  - cuyo nombre
  - de quien el nombre
  lexicon: BDAG
  rationale: La relación posesiva se expresa naturalmente con ‘cuyo’. Sin embargo, el sustantivo español ‘nombre’ es masculino singular, por lo que la forma normativa sería ‘cuyo nombre’; se preserva aquí esa construcción en la frase final revisada para claridad y corrección gramatical.
- source_word: γέγραπται
  english_pob_choice: has not been written
  chosen_spanish: han sido escritos
  alternatives_spanish:
  - han sido inscritos
  - están escritos
  lexicon: BDAG
  rationale: El perfecto griego indica un estado resultante. En español, ‘han sido escritos’ conserva bien ese valor resultativo y la voz pasiva implícita del original.
- source_word: βιβλίῳ τῆς ζωῆς
  english_pob_choice: book of life
  chosen_spanish: libro de la vida
  alternatives_spanish:
  - libro de vida
  - libro vital
  lexicon: BDAG
  rationale: ‘Libro de la vida’ es la equivalencia directa, idiomática y ampliamente inteligible para el símbolo apocalíptico, sin diluir el referente establecido por el texto fuente.
- source_word: τοῦ ἀρνίου
  english_pob_choice: of the Lamb
  chosen_spanish: del Cordero
  lexicon: BDAG
  rationale: ‘Cordero’ preserva el título cristológico y la imaginería sacrificial propia de Apocalipsis.
- source_word: τοῦ ἐσφαγμένου
  english_pob_choice: who was slain
  chosen_spanish: que fue inmolado
  alternatives_spanish:
  - que fue sacrificado
  - que fue degollado
  lexicon: BDAG
  rationale: Aunque ‘inmolado’ no es un calco, en español religioso comunica la muerte sacrificial con dignidad y precisión. Conserva la fuerza cultual del participio de σφάζω sin sonar excesivamente crudo en el texto principal.
- source_word: ἀπὸ καταβολῆς κόσμου
  english_pob_choice: from the foundation of the world
  chosen_spanish: desde la fundación del mundo
  alternatives_spanish:
  - desde antes de la fundación del mundo
  - desde el principio del mundo
  lexicon: BDAG
  rationale: ‘Desde la fundación del mundo’ es la forma más directa y tradicional para esta expresión temporal, manteniendo el paralelismo bíblico y la ambigüedad sintáctica señalada por el POB inglés.
theological_decisions:
- issue: A qué se une ‘desde la fundación del mundo’
  english_pob_reading: In the main text, the phrase is attached to ‘the Lamb who was slain’; the footnote preserves the alternative attachment to the writing of the names.
  chosen_spanish_reading: En el texto principal, ‘desde la fundación del mundo’ se une a ‘que fue inmolado’.
  alternative_spanish_readings:
  - ‘cuyos nombres no han sido escritos desde la fundación del mundo en el libro de la vida del Cordero que fue inmolado’
  rationale: La proximidad inmediata del sintagma temporal al participio ἐσφαγμένου favorece su enlace con ‘fue inmolado’. Sin embargo, el paralelo canónico de Apocalipsis 17:8 apoya la otra lectura. Se preserva así la tensión sintáctica y teológica en una nota, en vez de resolverla dogmáticamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se tomó en cuenta el estado de revisión más reciente, sin cambios editoriales pendientes, y el alto acuerdo del control cruzado. La redacción española mantiene la misma decisión interpretativa principal del POB inglés y preserva la ambigüedad sintáctica relevante en nota.
  spanish_consistency_notes:
  - Se mantiene ‘Cordero’ como título cristológico consistente con Apocalipsis.
  - Se usó ‘libro de la vida’ para el símbolo apocalíptico, en continuidad terminológica.
  - Se conservó la tensión sobre el alcance de ‘desde la fundación del mundo’ mediante nota, no en el cuerpo principal.
  - Se eligió ‘adorarán’ para reflejar la fuerza de προσκυνέω en el contexto de culto y falsa adoración al poder de la bestia.
