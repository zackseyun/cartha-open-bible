translation:
  language: es
  text: Y vi una bestia que subía del mar, con diez cuernos y siete cabezas; sobre sus cuernos había diez coronas[a], y sobre sus cabezas, nombres de blasfemia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «diez diademas».
    reason: lexical_alternative
  - marker: b
    text: O «nombres blasfemos».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  - vi en visión
  lexicon: BDAG
  rationale: El aoristo de ὁράω se expresa de forma natural con el pretérito simple «vi», sin añadir elementos que el griego no explicita.
- source_word: ἐκ τῆς θαλάσσης
  english_pob_choice: out of the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - de la mar
  - desde el mar
  lexicon: BDAG
  rationale: «Del mar» comunica en español la idea de procedencia y surgimiento desde dentro del mar; evita la rigidez de un calco como «fuera del mar».
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal salvaje
  - monstruo
  lexicon: BDAG
  rationale: «Bestia» es el equivalente más natural y ya conserva el peso apocalíptico del término en Apocalipsis, sin suavizarlo.
- source_word: ἀναβαῖνον
  english_pob_choice: coming up
  chosen_spanish: subir
  alternatives_spanish:
  - ascendiendo
  - subiendo
  lexicon: BDAG
  rationale: El participio presente se vierte con una forma verbal dinámica en español. «Subir» con valor participial en «vi subir» mantiene la escena visual y la progresión de la acción.
- source_word: ἔχον
  english_pob_choice: having
  chosen_spanish: que tenía
  alternatives_spanish:
  - teniendo
  - con
  lexicon: BDAG
  rationale: En español, «que tenía» suena más natural que un participio literal como «teniendo», y conserva la relación descriptiva del griego.
- source_word: κέρατα δέκα
  english_pob_choice: ten horns
  chosen_spanish: diez cuernos
  alternatives_spanish:
  - diez astas
  lexicon: BDAG
  rationale: «Cuernos» es la traducción directa y la imagen apocalíptica debe mantenerse literal.
- source_word: κεφαλὰς ἑπτά
  english_pob_choice: seven heads
  chosen_spanish: siete cabezas
  alternatives_spanish:
  - siete jefes
  lexicon: BDAG
  rationale: «Cabezas» preserva la imaginería simbólica sin interpretarla.
- source_word: διαδήματα
  english_pob_choice: crowns
  chosen_spanish: diademas
  alternatives_spanish:
  - coronas
  - toca real
  lexicon: BDAG
  rationale: Se eligió «diademas» para mantener la precisión léxica del término διάδημα, que es más específico que la palabra general «coronas».
- source_word: ἐπὶ τῶν κεράτων αὐτοῦ
  english_pob_choice: on its horns
  chosen_spanish: sobre sus cuernos
  alternatives_spanish:
  - encima de sus cuernos
  lexicon: BDAG
  rationale: «Sobre» expresa bien la localización sobre la superficie de los cuernos y suena natural en español.
- source_word: ἐπὶ τὰς κεφαλὰς αὐτοῦ
  english_pob_choice: on its heads
  chosen_spanish: sobre sus cabezas
  alternatives_spanish:
  - encima de sus cabezas
  lexicon: BDAG
  rationale: Se mantiene la misma preposición para conservar el paralelismo del verso.
- source_word: ὀνόματα βλασφημίας
  english_pob_choice: names of blasphemy
  chosen_spanish: nombres de blasfemia
  alternatives_spanish:
  - nombres blasfemos
  - nombres blasfemosos
  lexicon: BDAG
  rationale: La construcción genitiva se traduce de forma cercana al griego. «Nombres de blasfemia» preserva la solemnidad y la ambigüedad del original.
theological_decisions:
- issue: Imaginería apocalíptica sin interpretación intratextual
  english_pob_reading: Retain the imagery literally ('beast,' 'horns,' 'heads,' 'crowns,' 'names of blasphemy') without embedding interpretive identifications in the translation.
  chosen_spanish_reading: Conservar la imaginería de manera literal («bestia», «cuernos», «cabezas», «diademas», «nombres de blasfemia») sin identificarla en el texto.
  alternative_spanish_readings:
  - Interpretar la bestia como reino, imperio, gobernante o agente satánico dentro del texto principal
  rationale: El versículo presenta símbolos visionarios; la traducción debe preservarlos sin resolverlos interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: διάδηματα en contexto real apocalíptico
  english_pob_reading: Use 'crowns' in the main text, with 'diadems' preserved in a footnote.
  chosen_spanish_reading: Usar «diademas» en el texto principal, con «coronas» como alternativa señalada en nota si se desea enfatizar la forma más general.
  alternative_spanish_readings:
  - coronas
  - coronas reales
  rationale: En español, «diadema» conserva la especificidad léxica de διάδημα y evita perder la diferencia con otras palabras de corona; además, la imagen resulta reconocible para el lector bíblico.
  doctrine_reference: 'Translation philosophy §6: Readable modern English, not archaic or academic; §5: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: Concordamos con el pasaje base de la POB en mantener la imaginería literal y en reflejar la precisión de διάδημα mediante una nota; se ajustó la sintaxis española para que la acción inicial y la descripción resulten naturales en español sin perder la secuencia del griego.
  spanish_consistency_notes:
  - Se mantuvo «bestia», no «monstruo», para conservar la terminología apocalíptica estable.
  - Se usó «diademas» en el texto principal por precisión léxica; la nota permite la alternativa general «coronas».
  - Se preservó el paralelismo de «sobre sus cuernos / sobre sus cabezas».
  - No se introdujeron interpretaciones sobre la identidad de la bestia en el texto principal.
