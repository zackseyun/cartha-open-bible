revisions:
- from: Y vi subir del mar a una bestia[a], que tenía diez cuernos y siete cabezas; y sobre sus cuernos, diez diademas[b], y sobre sus cabezas, nombres de blasfemia.
  to: Y vi una bestia que subía del mar, con diez cuernos y siete cabezas; sobre sus cuernos había diez coronas[a], y sobre sus cabezas, nombres de blasfemia[b].
  rationale: 'Se corrige la alineación con el griego y con el rastro editorial del POB: se elimina la nota errónea sobre «bestia», se mantiene la imagen de surgimiento «que subía del mar» en el texto principal de forma natural en español, y se restituye «coronas» como lectura principal para διάδηματα, dejando «diademas» en nota como alternativa más específica. También se preserva la alternativa para ὀνόματα βλασφημίας como «nombres blasfemos».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura básica y la imaginería apocalíptica del griego: «vi», «bestia», «diez cuernos», «siete cabezas» y «nombres de blasfemia» reflejan fielmente el sentido fuente. Sin embargo, se aparta del rastro auditado del POB en dos puntos importantes: ancla una nota al lugar equivocado con contenido equivocado para ἐκ τῆς θαλάσσης/ἀναβαῖνον, y en el texto principal usa «diademas» donde el POB inglés documentó «crowns/crowns» en texto principal con la precisión «diadems» relegada a nota.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la frase inicial suena más natural como «vi una bestia que subía del mar» o «vi una bestia subir del mar» sin nota en «bestia». La puntuación con punto y coma es aceptable, aunque comas simples fluyen mejor. «Coronas» en el texto principal es más idiomático para lectura eclesial amplia; «diademas» puede mantenerse en nota por precisión léxica.
  glossary_alignment: 'No hay conflictos con terminología teológica principal del proyecto. «Bestia» y «blasfemia» están bien. El único desajuste relevante es terminológico respecto de διάδηματα: el POB auditado estableció «crowns» en texto principal y «diadems» en nota; en español conviene seguir eso con «coronas» en texto principal y «diademas» en nota.'
  issues:
  - severity: high
    issue: La nota [a] está mal anclada y no refleja la alternativa del POB inglés.
    rationale: La nota inglesa a corresponde a «out of the sea / from the sea», pero el borrador la pone sobre «bestia» y ofrece «una bestia que subía del mar», que no es una alternativa léxica pertinente ni preserva la lógica de la nota original.
  - severity: medium
    issue: El texto principal usa «diademas» en lugar de la opción principal auditada «crowns».
    rationale: Aunque «diademas» es léxicamente preciso, el rastro del POB documentó accesibilidad en el texto principal y precisión en nota. En español «coronas» reproduce mejor esa decisión editorial.
  - severity: low
    issue: La nota [b] invierte la dirección de la alternativa.
    rationale: La nota debería presentar «diademas» como alternativa más específica a «coronas», no justificar «coronas» como alternativa a un texto principal ya especializado.
  revised_spanish_text: Y vi una bestia que subía del mar, con diez cuernos y siete cabezas; sobre sus cuernos había diez coronas[a], y sobre sus cabezas, nombres de blasfemia[b].
  revised_footnotes:
  - marker: a
    text: O, más específicamente, «diez diademas».
    reason: lexical_alternative
  - marker: b
    text: O «nombres blasfemos».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la alineación con el griego y con el rastro editorial del POB: se elimina la nota errónea sobre «bestia», se mantiene la imagen de surgimiento «que subía del mar» en el texto principal de forma natural en español, y se restituye «coronas» como lectura principal para διάδηματα, dejando «diademas» en nota como alternativa más específica. También se preserva la alternativa para ὀνόματα βλασφημίας como «nombres blasfemos».'
