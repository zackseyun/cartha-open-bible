review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: condición genérica («Si alguno») seguida de exhortación singular («oiga»). Conserva correctamente la fórmula apocalíptica de atención sin expandirla interpretativamente.'
  spanish_quality_summary: La redacción principal es clara y digna, pero «tener oído» en español se asocia con aptitud auditiva o musical más que con la fórmula bíblica «tener oído para oír». Para esta fórmula fija, «Si alguno tiene oído para oír, oiga» suena más natural y evita ambigüedad. La nota al pie actual propone «oigan», que rompe el singular del original y además no encaja sintácticamente con el antecedente singular.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión de mantener «oiga» para ἀκουσάτω está bien alineada con la preferencia por conservar el modismo bíblico de «oír».
  issues:
  - severity: medium
    issue: «Si alguno tiene oído» suena incompleto o ambiguo en español bíblico actual
    rationale: Aunque el griego tiene singular «ear», en español la fórmula establecida y más inteligible es «tener oído para oír». «Tener oído» solo puede sugerir capacidad física o musical, no necesariamente el llamado espiritual a atender.
  - severity: medium
    issue: La nota al pie alternativa usa «oigan», en plural
    rationale: El inglés anotó una alternativa inclusiva propia del estilo inglés. En español, pasar a plural («oigan») no preserva la forma singular del original y además desajusta la construcción con «Si alguno». Si se mantiene una nota, debe ofrecer una alternativa singular más inclusiva o simplemente omitirse.
  revised_spanish_text: Si alguno tiene oído para oír[a], oiga.
  revised_footnotes:
  - marker: a
    text: 'O posiblemente, con una formulación más inclusiva en español actual: «Si alguien tiene oído para oír, que oiga». El griego es singular y masculino en la forma, pero genérico en la referencia.'
    reason: alternative_reading
  revision_rationale: Se ajusta la fórmula a un español más natural y bíblicamente reconocible («tiene oído para oír»), preservando el singular del griego y el modismo de atención receptiva. También se corrige la nota para evitar un plural que no corresponde al original.
