translation:
  language: es
  text: Si alguno tiene oído para oír[a], oiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente, con una formulación más inclusiva en español actual: «Si alguien tiene oído para oír, que oiga». El griego es singular y masculino en la forma, pero genérico en la referencia.'
    reason: alternative_reading
lexical_decisions:
- source_word: Εἴ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Quien
  - Si acaso
  lexicon: BDAG
  rationale: La partícula condicional se conserva con una forma natural en español. 'Si' refleja la estructura proverbial y exhortativa del griego sin suavizarla hacia una paráfrasis.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguno
  alternatives_spanish:
  - cualquiera
  - alguien
  lexicon: BDAG
  rationale: El indefinido griego tiene fuerza genérica. 'Alguno' funciona bien en una formulación abierta y mantiene el matiz representativo sin introducir un plural inclusivo inexistente en el original.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  lexicon: BDAG
  rationale: El presente simple de posesión se vierte de modo directo con 'tiene'. 'Posee' sería más marcado y menos idiomático aquí.
- source_word: οὖς
  english_pob_choice: an ear
  chosen_spanish: oído
  alternatives_spanish:
  - un oído
  - oreja
  lexicon: BDAG
  rationale: Aunque el griego usa singular, en español 'tener oído' expresa de manera natural la capacidad de percibir y atender. 'Oído' evita la extrañeza de 'un oído' en esta fórmula proverbial y no fuerza un plural ajeno al texto.
- source_word: ἀκουσάτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El aoristo imperativo tercero singular conserva mejor el tono bíblico y solemne con 'oiga'. 'Escuche' es posible, pero 'oír' preserva el eco tradicional del mandato de prestar atención sin expandirlo a 'comprender' o 'obedecer'.
theological_decisions:
- issue: Forma singular masculina genérica en la exhortación
  english_pob_reading: let him hear
  chosen_spanish_reading: oiga
  alternative_spanish_readings:
  - oigan
  - que oigan
  rationale: El griego mantiene un imperativo singular de tercera persona. En español, 'oiga' conserva esa forma singular y el valor genérico sin convertirlo en plural inclusivo, que no está en el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fórmula apocalíptica de recepción atenta
  english_pob_reading: retain the biblical idiom 'hear' rather than interpretively expand it
  chosen_spanish_reading: conservar el modismo bíblico 'oír'
  alternative_spanish_readings:
  - entienda
  - preste atención
  rationale: La frase funciona como llamado formulaico a la escucha receptiva. Traducir con 'oiga' conserva el modismo bíblico y evita añadir una explicación interpretativa que el griego no explicita.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto griego es breve y estable; el control de revisión reporta que no hubo cambios necesarios y el cotejo externo mostró acuerdo alto. La decisión principal en español consiste en conservar la fórmula apocalíptica con una sintaxis natural y fiel.
  spanish_consistency_notes:
  - Se mantuvo 'oiga' para reflejar el singular gramatical del griego y su valor genérico.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas no pertinentes, ya que no aparece el nombre divino en este versículo.
  - Se eligió 'oído'/'oiga' por su cercanía al idiomático bíblico 'quien tiene oído, oiga', sin depender mecánicamente de la redacción inglesa.
