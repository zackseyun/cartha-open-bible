- from: Si alguno tiene oído[a], oiga.
  to: Si alguno tiene oído para oír[a], oiga.
  rationale: Se ajusta la fórmula a un español más natural y bíblicamente reconocible («tiene oído para oír»), preservando el singular del griego y el modismo de atención receptiva. También se corrige la nota para evitar un plural que no corresponde al original.
