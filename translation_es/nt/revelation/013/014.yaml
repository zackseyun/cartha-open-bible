  to: Y engaña[a] a los que habitan sobre la tierra por medio de las señales que se le permitió hacer en presencia de la bestia, diciéndoles a los que habitan sobre la tierra que hagan una imagen para la bestia[b], que tiene la herida de la espada y vivió[c].
  rationale: Se eliminó el pronombre redundante 'los' para ajustar la sintaxis española al griego y mejorar la naturalidad. Se corrigió la nota [c] para que ofrezca una alternativa real y útil, en línea con el audit trail inglés. El resto del versículo puede mantenerse como fiel y legible.
