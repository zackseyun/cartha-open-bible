  text: καὶ πλανᾷ ⸀τοὺς κατοικοῦντας ἐπὶ τῆς γῆς διὰ τὰ σημεῖα ἃ ἐδόθη αὐτῷ ποιῆσαι ἐνώπιον τοῦ θηρίου, λέγων τοῖς κατοικοῦσιν ἐπὶ τῆς γῆς ποιῆσαι εἰκόνα τῷ θηρίῳ, ⸂ὃς ἔχει⸃ τὴν πληγὴν ⸂τῆς μαχαίρης καὶ ἔζησεν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/013/014.yaml
  text: And it deceives those who dwell on the earth because of the signs that it was given to perform in the presence of the beast[c][b][a], telling those who dwell on the earth to make an image for the beast that has the wound of the sword and lived.
