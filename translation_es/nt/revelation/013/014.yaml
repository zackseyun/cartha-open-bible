translation:
  language: es
  text: Y engaña[a] a los que habitan sobre la tierra por medio de las señales que se le permitió hacer en presencia de la bestia, diciéndoles a los que habitan sobre la tierra que hagan una imagen para la bestia[b], que tiene la herida de la espada y vivió[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'extravía a los que habitan sobre la tierra'.
    reason: lexical_alternative
  - marker: b
    text: O 'una imagen de la bestia'; el griego dice más literalmente 'una imagen para la bestia'.
    reason: lexical_alternative
  - marker: c
    text: O 'que tenía la herida de espada y volvió a vivir'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλανᾷ
  english_pob_choice: deceives
  chosen_spanish: engaña
  alternatives_spanish:
  - desvía
  - extravía
  lexicon: BDAG
  rationale: En español, 'engaña' comunica bien la acción de llevar a otros al error y suena natural en este contexto apocalíptico. 'Desvía' o 'extravía' serían más literales para la idea de hacer perder el camino, pero 'engaña' preserva mejor el sentido de πλανάω con claridad actual.
- source_word: κατοικοῦντας / κατοικοῦσιν ἐπὶ τῆς γῆς
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan sobre la tierra
  alternatives_spanish:
  - los que viven sobre la tierra
  - los habitantes de la tierra
  lexicon: BDAG
  rationale: Se conserva la fórmula temática de Apocalipsis con un giro verbal, no solo nominal. 'Habitan sobre la tierra' mantiene la imagen y la repetición del griego mejor que una simplificación a 'habitantes'.
- source_word: διὰ τὰ σημεῖα
  english_pob_choice: because of the signs
  chosen_spanish: por medio de las señales
  alternatives_spanish:
  - a causa de las señales
  - por las señales
  lexicon: BDAG
  rationale: Aquí διά con acusativo puede expresar medio o causa. El contexto muestra que las señales son el instrumento mediante el cual engaña; por eso 'por medio de' refleja mejor la fuerza instrumental que una causal pura.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - milagros
  lexicon: BDAG
  rationale: '''Señales'' es la equivalencia más directa y mantiene la amplitud del término sin añadir interpretación. ''Milagros'' sería demasiado explicativo.'
- source_word: ἐδόθη αὐτῷ ποιῆσαι
  english_pob_choice: it was given to perform
  chosen_spanish: se le permitió hacer
  alternatives_spanish:
  - le fue dado hacer
  - se le dio poder para hacer
  lexicon: BDAG
  rationale: En español, la pasiva impersonal suena más natural como 'se le permitió'. Conserva la idea de permiso/divina concesión sin especificar más de lo que el griego dice.
- source_word: ἐνώπιον τοῦ θηρίου
  english_pob_choice: in the presence of the beast
  chosen_spanish: en presencia de la bestia
  alternatives_spanish:
  - delante de la bestia
  - ante la bestia
  lexicon: BDAG
  rationale: '''En presencia de'' reproduce bien el valor relacional de ἐνώπιον y resulta idiomático en español. ''Ante'' también sería posible, pero algo más formal/forense.'
- source_word: λέγων
  english_pob_choice: telling
  chosen_spanish: diciéndoles
  alternatives_spanish:
  - diciendo
  - ordenándoles
  lexicon: BDAG
  rationale: 'El participio introduce el contenido del engaño y en español conviene señalar el destinatario explícito: ''diciéndoles''. No se sube la fuerza a ''ordenándoles'' porque el griego no exige mandato explícito.'
- source_word: ποιῆσαι εἰκόνα τῷ θηρίῳ
  english_pob_choice: to make an image for the beast
  chosen_spanish: que hagan una imagen para la bestia
  alternatives_spanish:
  - que hagan una imagen de la bestia
  - que hagan una estatua para la bestia
  lexicon: BDAG
  rationale: Se mantiene el dativo con 'para', como en el audit trail inglés, porque el griego no usa genitivo. 'Imagen' conserva la amplitud semántica mejor que 'estatua'.
- source_word: εἰκόνα
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - figura
  - estatua
  lexicon: BDAG
  rationale: '''Imagen'' es la correspondencia estándar y no restringe innecesariamente el sentido a una estatua física.'
- source_word: ὃς ἔχει τὴν πληγὴν τῆς μαχαίρης
  english_pob_choice: that has the wound of the sword
  chosen_spanish: que tiene la herida de la espada
  alternatives_spanish:
  - que tiene la llaga de la espada
  - que posee la herida de la espada
  lexicon: BDAG
  rationale: Se respeta el presente ἔχει con 'tiene'. 'Herida' es la forma natural y clara para πληγή; 'llaga' sería menos precisa aquí. 'De la espada' conserva el genitivo sin suavizarlo en exceso.
- source_word: μάχαιρα
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - cuchillo
  - arma blanca
  lexicon: BDAG
  rationale: Aunque μάχαιρα puede referir un arma cortante amplia, en este contexto apocalíptico la equivalencia tradicional y clara es 'espada'. 'Espada' transmite mejor el registro bíblico y el audit trail inglés.
- source_word: καὶ ἔζησεν
  english_pob_choice: and lived
  chosen_spanish: y vivió
  alternatives_spanish:
  - y quedó vivo
  - y siguió viviendo
  lexicon: BDAG
  rationale: El griego solo afirma que vivió; la revisión del audit trail eliminó 'yet' para no sobreleer adversatividad. Por eso se traduce de modo simple y fiel con 'y vivió'.
theological_decisions:
- issue: Permiso divino implícito en ἐδόθη
  english_pob_reading: Retain the passive 'it was given' without making God the explicit giver.
  chosen_spanish_reading: Mantener 'se le permitió' sin explicitar a Dios como sujeto.
  alternative_spanish_readings:
  - se le dio
  - Dios le permitió hacerlo
  rationale: Apocalipsis suele emplear pasivas que dejan implícita la soberanía divina. 'Se le permitió' conserva esa tensión sin resolverla con una explicitación que el texto no da.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Valor de ἔζησεν tras la herida
  english_pob_reading: Render as 'and lived' rather than an explicit resurrection formula.
  chosen_spanish_reading: Traducir simplemente 'y vivió'.
  alternative_spanish_readings:
  - y volvió a vivir
  - y cobró vida
  rationale: El versículo afirma vida después de la herida, pero no obliga a una fórmula de resurrección. 'Y vivió' preserva esa tensión narrativa sin añadir una lectura doctrinal más fuerte de la que el griego exige.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés: ἔχει se reflejó con presente (''tiene'') y ἔζησεν se dejó sin intensificador (''y vivió''), evitando ''yet''. También se preservó la fuerza instrumental de διὰ τὰ σημεῖα y la relación dativa de τῷ θηρίῳ con ''para''.'
  spanish_consistency_notes:
  - Se usó 'bestia' de forma consistente para θηρίον, conforme al uso de Apocalipsis en la POB.
  - Se mantuvo 'imagen' para εἰκών, sin restringir el término a una estatua.
  - Se conservó el patrón verbal 'los que habitan sobre la tierra' para la expresión temática recurrente de Apocalipsis.
  - Se evitó 'Señor' o 'Cristo' porque no aparecen en este versículo ni corresponden a los términos fuente aquí presentes.
