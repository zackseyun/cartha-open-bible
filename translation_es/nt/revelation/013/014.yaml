  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Bestia', 'señales', 'imagen', 'espada' y 'vivió' concuerdan con las decisiones auditadas. La opción 'engaña' para πλανᾷ es adecuada; la alternativa 'extravía' puede mantenerse en nota. 'Se le permitió hacer' es aceptable como representación natural del pasivo divino implícito.
