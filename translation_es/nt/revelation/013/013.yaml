translation:
  language: es
  text: Y realiza grandes señales[a], incluso haciendo que el fuego descienda del cielo a la tierra en presencia de la gente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grandes milagros» o «grandes prodigios»; el griego dice «señales».
    reason: lexical_alternative
  - marker: b
    text: O «a la vista de la gente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖ
  english_pob_choice: performs
  chosen_spanish: realiza
  alternatives_spanish:
  - hace
  - obra
  lexicon: BDAG
  rationale: Con σημεῖα, el valor es el de producir o ejecutar actos portentosos. «Realiza» suena natural en español y conserva la idea de acción deliberada sin volverlo demasiado interpretativo.
- source_word: σημεῖα μεγάλα
  english_pob_choice: great signs
  chosen_spanish: grandes señales
  alternatives_spanish:
  - grandes milagros
  - grandes prodigios
  lexicon: BDAG
  rationale: Se mantiene «señales» para preservar la carga apocalíptica y semiótica de σημεῖα, en lugar de reducirlo a «milagros». «Grandes» traduce directamente μεγάλα.
- source_word: ἵνα καὶ πῦρ ποιῇ
  english_pob_choice: even causing fire
  chosen_spanish: incluso haciendo que fuego
  alternatives_spanish:
  - hasta hacer fuego
  - incluso haciendo fuego
  lexicon: BDAG
  rationale: La cláusula con ἵνα expresa aquí el efecto o finalidad del acto. «Incluso» conserva el énfasis; «haciendo que fuego» refleja la construcción causativa de manera natural en español, sin añadir especificación sobre el mecanismo.
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - incendio
  lexicon: BDAG
  rationale: «Fuego» es el equivalente directo y mantiene la imagen bíblica de fuego descendiendo del cielo.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  - del firmamento
  lexicon: BDAG
  rationale: En este contexto apocalíptico, «cielo» comunica bien la esfera celestial. «Del cielo» conserva la dirección de ἐκ con naturalidad en español.
- source_word: καταβαίνειν εἰς τὴν γῆν
  english_pob_choice: to come down from heaven to the earth
  chosen_spanish: descienda ... a la tierra
  alternatives_spanish:
  - baje ... a la tierra
  - caiga ... a la tierra
  lexicon: BDAG
  rationale: «Descienda» reproduce el movimiento de καταβαίνειν con registro digno. «A la tierra» sigue el εἰς τὴν γῆν y evita una paráfrasis más amplia que el griego no exige.
- source_word: ἐνώπιον τῶν ἀνθρώπων
  english_pob_choice: before people
  chosen_spanish: en presencia de la gente
  alternatives_spanish:
  - delante de la gente
  - a la vista de la gente
  lexicon: BDAG
  rationale: ἐνώπιον expresa visibilidad pública. «En presencia de la gente» es idiomático en español y conserva la idea de acto público, sin restringir ἀνθρώπων a varones.
theological_decisions:
- issue: Naturaleza de las señales
  english_pob_reading: Render the verse as describing real or at least publicly observable sign-performance without specifying whether the signs are supernatural in source or deceptive in mechanism.
  chosen_spanish_reading: Mantener «señales» sin aclarar si son milagros verdaderos o engaños visibles; el texto solo afirma su ejecución pública.
  alternative_spanish_readings:
  - grandes milagros
  - grandes maravillas
  - engaños espectaculares
  rationale: El griego no resuelve el mecanismo ni la evaluación moral de las señales en este versículo. «Señales» preserva la tensión apocalíptica y evita imponer una lectura doctrinal no explicitada aquí.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el paquete fuente griego y coincide con el criterio inglés auditado: σημεῖα se conserva como «señales», οὐρανός como «cielo», y ἐνώπιον como visibilidad pública. No se han incorporado revisiones posteriores ni cambios textuales.'
  spanish_consistency_notes:
  - Se mantiene la terminología apocalíptica con «señales» en vez de «milagros» para no neutralizar el matiz semiótico del griego.
  - «Cielo» y «tierra» se usan de manera consistente con el registro bíblico del pasaje.
  - La fórmula «en presencia de la gente» evita lenguaje masculino genérico innecesario y conserva el sentido público de ἐνώπιον.
