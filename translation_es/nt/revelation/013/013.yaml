- from: Y realiza grandes señales[a], incluso haciendo que fuego[b] descienda del cielo a la tierra en presencia de la gente[c].
  to: Y realiza grandes señales[a], incluso haciendo que el fuego descienda del cielo a la tierra en presencia de la gente[b].
