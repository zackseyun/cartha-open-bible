review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: la bestia realiza señales grandes y hace descender fuego del cielo a la tierra públicamente. Conserva adecuadamente «señales» para σημεῖα y no resuelve indebidamente si se trata de milagros verdaderos o de engaño visible. Sin embargo, hay un problema menor pero real en la redacción española y en las notas: «haciendo que fuego descienda» suena algo forzado por la ausencia de artículo, y la nota [b] es espuria porque no ofrece una alternativa real para πῦρ.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero puede mejorarse a un español más natural con «haciendo que el fuego descienda del cielo a la tierra». «En presencia de la gente» es comprensible, aunque «delante de la gente» o «a la vista de la gente» refleja mejor la visibilidad pública de ἐνώπιον; aun así, no exige cambio. La nota [b] debe eliminarse porque «O «fuego»» no añade información útil ni preserva ninguna alternativa del original o del audit trail.
  glossary_alignment: 'Está alineado con la terminología del proyecto: no hay nombres divinos ni títulos mesiánicos en juego; «señales» para σημεῖα es correcto y preferible a «milagros»; «cielo», «fuego» y «la gente»/«personas» mantienen bien el sentido. No hay conflictos con glosario teológico principal.'
  issues:
  - severity: medium
    issue: La frase «haciendo que fuego descienda» es poco idiomática en español.
    rationale: Aunque refleja la estructura causativa, en español suena más natural y claro «haciendo que el fuego descienda» o «haciendo descender fuego». La falta de artículo vuelve la frase algo áspera sin beneficio exegético.
  - severity: medium
    issue: La nota al pie [b] es redundante e inválida como alternativa.
    rationale: La nota dice «O «fuego»», que repite exactamente el texto principal y no preserva ninguna variante léxica significativa del inglés auditado ni del griego. Debe eliminarse para mantener disciplina editorial y utilidad de notas.
  - severity: low
    issue: La distribución de notas no sigue de cerca las alternativas significativas del audit trail inglés.
    rationale: El inglés conserva nota para «great signs» y para «before people / in the sight of people». En español conviene mantener esas dos y no inventar una tercera sin contenido.
  revised_spanish_text: Y realiza grandes señales[a], incluso haciendo que el fuego descienda del cielo a la tierra en presencia de la gente[b].
  revised_footnotes:
  - marker: a
    text: O «grandes milagros» o «grandes prodigios»; el griego dice «señales».
    reason: lexical_alternative
  - marker: b
    text: O «a la vista de la gente».
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación pequeña: se mejora la naturalidad española de la cláusula causativa añadiendo el artículo en «el fuego», y se elimina una nota espuria que no ofrecía alternativa real. Se conservan las decisiones léxicas centrales del original y del audit trail inglés.'
