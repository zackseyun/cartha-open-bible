translation:
  language: es
  text: Y la bestia que vi era semejante a un leopardo[a], y sus pies eran como los de un oso, y su boca era como la boca de un león. Y el dragón le dio su poder, su trono y gran autoridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imaginería del leopardo, el oso y el león evoca las visiones de la bestia en Daniel 7.
    reason: cross_reference
lexical_decisions:
- source_word: θηρίον
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - criatura
  lexicon: BDAG
  rationale: En Apocalipsis, θηρίον es un término apocalíptico fijo para una figura monstruosa de poder hostil. 'Bestia' conserva ese valor simbólico y el paralelismo con la tradición exegética, mientras que 'animal' o 'criatura' suavizarían indebidamente el término.
- source_word: ὅμοιον παρδάλει
  english_pob_choice: like a leopard
  chosen_spanish: semejante a un leopardo
  alternatives_spanish:
  - como un leopardo
  - parecida a un leopardo
  lexicon: BDAG
  rationale: ὅμοιος con dativo expresa semejanza. 'Semejante a un leopardo' mantiene la comparación visual con un español digno y directo, sin añadir interpretación.
- source_word: πόδες
  english_pob_choice: feet
  chosen_spanish: pies
  alternatives_spanish:
  - patas
  - piernas
  lexicon: BDAG
  rationale: πούς normalmente significa 'pie'. Aunque la imagen sea de una bestia, 'pies' refleja el léxico griego con más precisión que 'patas', y conserva el tono visionario.
- source_word: ὡς ἄρκου
  english_pob_choice: like a bear's
  chosen_spanish: como de oso
  alternatives_spanish:
  - como los de un oso
  - como un oso
  lexicon: BDAG
  rationale: El griego es elíptico después de 'sus pies'. En español, 'como de oso' reproduce esa comparación breve y natural; 'como los de un oso' sería más explícito, pero menos conciso.
- source_word: στόμα ... ὡς στόμα λέοντος
  english_pob_choice: mouth ... like a lion's mouth
  chosen_spanish: su boca como boca de león
  alternatives_spanish:
  - su boca como la boca de un león
  - su boca como la de un león
  lexicon: BDAG
  rationale: El griego repite στόμα, y conviene conservar la repetición para preservar el énfasis y el equilibrio retórico de la visión. 'Boca de león' mantiene la fuerza comparativa sin sobrecargar la frase.
- source_word: δράκων
  english_pob_choice: dragon
  chosen_spanish: dragón
  lexicon: BDAG
  rationale: δράκων en Apocalipsis designa la figura apocalíptica establecida; 'dragón' es el equivalente directo y transparente.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - concedió
  - entregó
  lexicon: BDAG
  rationale: δίδωμι se traduce aquí de forma directa como 'dio'. Es fiel, claro y mantiene la relación de entrega de poder dentro de la escena.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  lexicon: BDAG
  rationale: δύναμις en este contexto alude a poder operativo. 'Poder' es el sustantivo español más natural y mantiene la distinción con ἐξουσία.
- source_word: θρόνον
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento de gobierno
  - sede
  lexicon: BDAG
  rationale: θρόνος significa literalmente 'trono' y en Apocalipsis conserva su carga real y política. Traducirlo como 'trono' permite mantener esa imagen sin diluirla.
- source_word: ἐξουσίαν μεγάλην
  english_pob_choice: great authority
  chosen_spanish: gran autoridad
  alternatives_spanish:
  - gran dominio
  - gran potestad
  lexicon: BDAG
  rationale: ἐξουσία denota autoridad o derecho de gobernar, distinto de δύναμις. 'Gran autoridad' preserva esa distinción, y el adjetivo antepuesto 'gran' fluye naturalmente en español.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - sus
  lexicon: BDAG
  rationale: El pronombre posesivo se mantiene en español como 'su' para el dragón. El antecedente personal del dragón justifica el posesivo singular, mientras que la bestia recibe el mismo tipo de posesivo sin forzar la concordancia del inglés.
theological_decisions:
- issue: Relación entre el dragón y la bestia en el uso de pronombres posesivos
  english_pob_reading: The beast is rendered with 'it,' while the dragon's possessions are rendered with 'his.'
  chosen_spanish_reading: La bestia se presenta como entidad monstruosa impersonal, mientras que el dragón conserva posesivos personales ('su poder', 'su trono').
  alternative_spanish_readings:
  - Usar un mismo tipo de posesivo para ambos por simetría gramatical
  - Personalizar también a la bestia con posesivos personales
  rationale: El griego usa pronombres gramaticalmente consistentes, pero la escena distingue narrativamente entre la bestia y el dragón. En español, mantener 'su' para el dragón y no introducir personalización adicional en la bestia conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión narrativa y simbólica del texto apocalíptico; no armonizar más allá de la evidencia.
- issue: Retención de la imaginería compuesta de animales sin expansión interpretativa en el texto principal
  english_pob_reading: Translate the animal comparisons directly and do not import Danielic interpretation into the main text.
  chosen_spanish_reading: Las comparaciones con leopardo, oso y león se mantienen directas en el cuerpo del versículo, sin explicar allí mismo la alusión a Daniel.
  alternative_spanish_readings:
  - Añadir en el texto principal una aclaración sobre Daniel 7
  - Parafrasear la mezcla de rasgos como símbolos de reinos
  rationale: El griego presenta la visión con comparaciones concretas y no desarrolla su interpretación. Por eso la traducción principal debe conservar la imaginería y dejar la relación con Daniel para nota o referencia cruzada, no para el texto base.
  doctrine_reference: Primacía del texto original sobre la tradición interpretativa; no introducir explicaciones que el versículo no formula.
translation_notes:
  revision_awareness: Coincide con el pasaje inglés auditado de la POB en su decisión de mantener la imaginería zoológica, distinguir al dragón de la bestia en el tratamiento posesivo, y reservar la alusión a Daniel para una nota cruzada. No hay revisiones aplicadas en el último pase inglés, por lo que la redacción española sigue esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene 'bestia' para θηρίον en coherencia con la terminología apocalíptica POB.
  - '''Dragón'' se conserva como figura personal apocalíptica; no se atenúa a una fuerza impersonal.'
  - '''Poder'' y ''autoridad'' se distinguen para δύναμις y ἐξουσία respectivamente.'
  - La repetición de 'boca' refleja el paralelo del griego y evita simplificación estilística.
  - La nota [a] está anclada en 'leopardo' para preservar la referencia cruzada a Daniel 7.
