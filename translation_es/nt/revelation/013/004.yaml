revisions:
- from: 'Y se postraron ante el dragón, porque había dado autoridad[a] a la bestia, y se postraron ante la bestia, diciendo: «¿Quién es como la bestia[c][b], y quién puede guerrear contra ella?»'
  to: 'Y adoraron al dragón porque había dado autoridad a la bestia, y adoraron a la bestia, diciendo: «¿Quién es como la bestia[a][c], y quién puede hacer guerra contra ella?[b]»'
  rationale: Se cambia «se postraron» por «adoraron» para reflejar fielmente el valor cultual de προσκυνέω en Apocalipsis y alinearse con la rationale auditada del POB. Se recolocan las notas para que [a] y [c] anclen en «la bestia» dentro de la aclamación, y [b] en la segunda pregunta, conforme a su contenido. Además, se corrige la naturalidad de la nota c. Se prefiere «hacer guerra contra ella» en el texto principal por cercanía a «make war» y al matiz militar de πολεμέω; la variante «guerrear contra ella» queda preservada en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: dos acciones paralelas de προσκυνέω, la causalidad de ὅτι, la autoridad dada a la bestia, y la aclamación retórica final. Sin embargo, la elección principal «se postraron» debilita el valor cultual que en Apocalipsis tiene προσκυνέω y se aparta del inglés POB auditado, que justificó explícitamente «worshiped» por su fuerza idolátrica. También hay un desajuste de anclaje de la nota [a]: en español quedó colocada sobre «autoridad» aunque la nota corresponde a la alternativa de «¿Quién es comparable a la bestia?».'
  spanish_quality_summary: 'El texto es generalmente claro y natural, pero mejora con «adoraron» para reflejar mejor el contexto religioso idólatra. «Guerrear contra ella» es comprensible, aunque «hacer guerra contra ella» refleja más de cerca el matiz militar de πολεμέω y además coincide con la alternativa ya preservada en nota; aun así, no exige corrección obligatoria. La nota c contiene una forma poco natural: «ecoa» debe cambiarse por «hace eco de» o «evoca».'
  glossary_alignment: 'No hay conflictos con los términos de proyecto como Yahvé/Mesías/etc. El punto terminológico principal es προσκυνέω: por la práctica del POB en Apocalipsis y la rationale documentada, conviene «adoraron» en vez de «se postraron». «Bestia», «dragón», «autoridad» y el pronombre femenino «ella» están bien alineados para español.'
  issues:
  - severity: high
    issue: προσεκύνησαν se tradujo como «se postraron» en ambas instancias
    rationale: El audit trail inglés documenta que en Apocalipsis προσκυνέω denota veneración religiosa y que «worshiped» es la mejor opción por la fuerza idolátrica del contexto. «Se postraron» conserva el gesto físico, pero atenúa indebidamente el sentido cultual principal del verso.
  - severity: high
    issue: La nota [a] está anclada en «autoridad» pero su contenido corresponde a «¿Quién es comparable a la bestia?»
    rationale: 'Esto rompe la disciplina de notas requerida: el marcador debe aparecer exactamente en la frase relevante. Tal como está, induce al lector a pensar que la alternativa se relaciona con «autoridad».'
  - severity: medium
    issue: La redacción de la nota c usa «ecoa», forma poco natural en español estándar
    rationale: Aunque inteligible, suena impropia en español eclesial general. «Hace eco del lenguaje…» comunica mejor la idea.
