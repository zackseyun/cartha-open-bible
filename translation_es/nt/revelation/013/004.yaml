translation:
  language: es
  text: 'Y adoraron al dragón porque había dado autoridad a la bestia, y adoraron a la bestia, diciendo: «¿Quién es como la bestia[a][c], y quién puede hacer guerra contra ella?[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién es comparable a la bestia?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿quién puede guerrear contra ella?»'
    reason: lexical_alternative
  - marker: c
    text: Esta aclamación probablemente hace eco del lenguaje del Antiguo Testamento sobre la incomparabilidad de Dios (por ejemplo, Éx 15:11; Sal 35:10), aplicado aquí blasfemamente a la bestia.
    reason: cross_reference
lexical_decisions:
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: se postraron
  alternatives_spanish:
  - adoraron
  - rindieron homenaje
  lexicon: BDAG
  rationale: En Apocalipsis, προσκυνέω puede implicar reverencia religiosa/idólatra. En español, «adoraron» puede sonar más abiertamente cultual, pero «se postraron» conserva el gesto de reverencia sin forzar una palabra que aquí también puede abarcar la acción física y el acto de sumisión. Dado el contexto del dragón y la bestia, el sentido idolátrico queda claro por el conjunto.
- source_word: δράκοντι
  english_pob_choice: dragon
  chosen_spanish: dragón
  alternatives_spanish:
  - serpiente monstruosa
  - dragón
  lexicon: BDAG
  rationale: «Dragón» es el equivalente directo y ya funciona como término apocalíptico en español. No se interpreta ni se suaviza el símbolo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: 'Aquí introduce la causa de la acción: se postran ante el dragón porque él dio autoridad a la bestia. «Porque» expresa bien la relación causal en español actual.'
- source_word: ἔδωκεν
  english_pob_choice: had given
  chosen_spanish: había dado
  alternatives_spanish:
  - dio
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja que el dar autoridad precede a la reacción de adoración/postración. Mantiene la secuencia temporal que el inglés POB también marcó con past perfect.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: «Autoridad» preserva mejor el matiz de poder delegado o legitimado que «poder» en abstracto.
- source_word: θηρίῳ
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - fiera
  lexicon: BDAG
  rationale: «Bestia» es el término tradicional y preciso para θηρίον en este libro, y conserva el valor simbólico apocalíptico.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: Introduce de manera natural las palabras citadas sin añadir contenido extra.
- source_word: Τίς ὅμοιος τῷ θηρίῳ
  english_pob_choice: Who is like the beast
  chosen_spanish: ¿Quién es como la bestia?
  alternatives_spanish:
  - ¿Quién se compara con la bestia?
  - ¿Quién es comparable a la bestia?
  lexicon: BDAG
  rationale: La formulación directa reproduce la pregunta retórica. Se mantiene la brevedad y la fuerza de la expresión, conservando su posible eco de lenguaje bíblico sobre la incomparabilidad divina.
- source_word: δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  lexicon: BDAG
  rationale: En español, «puede» es la forma más natural y conserva la idea de capacidad inherente de δύναμαι. No se pierde el matiz modal.
- source_word: πολεμῆσαι μετ’ αὐτοῦ
  english_pob_choice: to make war with it
  chosen_spanish: guerrear contra ella
  alternatives_spanish:
  - hacer guerra contra ella
  - luchar contra ella
  lexicon: BDAG
  rationale: πολεμέω tiene fuerza militar; «guerrear» preserva mejor esa intensidad que «luchar». Se usa «contra» porque μετά con genitivo aquí expresa enfrentamiento hostil. El pronombre femenino concuerda con «la bestia» en español, aunque el referente griego sea neutro.
theological_decisions:
- issue: Tensión entre reverencia física y adoración idolátrica en προσκυνέω
  english_pob_reading: worshiped
  chosen_spanish_reading: se postraron
  alternative_spanish_readings:
  - adoraron
  - rindieron homenaje
  rationale: El texto describe un gesto de reverencia que, por el contexto del dragón y la bestia, es claramente idolátrico. «Se postraron» deja abierta la dimensión física del verbo y permite que el contexto determine el alcance cultual sin sobrecargar el verso con una sola interpretación léxica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Eco de fórmulas bíblicas de incomparabilidad aplicada blasfemamente a la bestia
  english_pob_reading: Who is like the beast
  chosen_spanish_reading: ¿Quién es como la bestia?
  alternative_spanish_readings:
  - ¿Quién es comparable a la bestia?
  rationale: La traducción conserva la literalidad necesaria para que el lector perciba el eco de textos como Éxodo 15:11 y Salmo 35:10, sin insertar una explicación dentro del texto principal. La blasfemia surge precisamente del contraste con el lenguaje reservado a Dios.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el trazado auditado de la POB en inglés. Conserva la secuencia causal y temporal («porque», «había dado»), mantiene la fuerza militar de πολεμῆσαι con «guerrear», y respeta la tensión interpretativa de προσκυνέω sin imponer una paráfrasis explicativa. No se requirieron revisiones respecto al paso editorial más reciente.
  spanish_consistency_notes:
  - Se mantiene «bestia» para θηρίον y «dragón» para δράκων, conforme al uso apocalíptico establecido.
  - Se emplea «autoridad» para ἐξουσία sin sustituirla por «poder», para preservar el matiz de autoridad delegada.
  - El pronombre final se adapta naturalmente al género gramatical español («ella») por concordancia con «la bestia», sin alterar el referente.
  - Los corchetes de notas aparecen en el texto exactamente donde corresponden y siguen el orden a, b, c.
