base_translation:
  language: en
  yaml_path: translation/nt/revelation/013/004.yaml
  text: And they worshiped the dragon because he had given authority to the beast[a], and they worshiped the beast, saying, “Who is like the beast[c][b], and who is able to make war with it?”
  footnotes:
