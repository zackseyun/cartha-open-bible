review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés en los puntos principales: «abrió», «en blasfemias», «contra Dios», «su nombre» y «su morada». También conserva adecuadamente la nota sobre la lectura alternativa de la frase final. Sin embargo, la construcción española «para blasfemar su nombre» es menos fiel al uso natural y al sentido transitivo esperado en español, donde «blasfemar de/contra» o «blasfemar contra» evita una sintaxis forzada. Además, la aposición final queda más legible con raya, lo cual ya estaba contemplado en las decisiones teológicas españolas como opción válida para representar la tensión sin glosa explicativa.'
  spanish_quality_summary: 'La redacción es en general clara y digna, pero presenta dos puntos mejorables de legibilidad natural: 1) «blasfemar su nombre» suena poco idiomático en español bíblico contemporáneo; 2) la coma antes de «los que habitan en el cielo» puede hacer tropezar al lector, mientras que la raya aclara mejor la aposición sin añadir interpretación. «Morada» es una buena elección para σκηνή en este contexto.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεόν -> «Dios» está bien; no aparecen Yahvé/Mesías/espíritu/esclavo, etc. «Morada» para σκηνή concuerda con la justificación documentada, con la alternativa «tabernáculo» preservable en nota léxica. Conviene además conservar la alternativa de objeto coordinado ya presente en la nota.'
  issues:
  - severity: medium
    issue: «para blasfemar su nombre» es poco natural en español
    rationale: Aunque el inglés dice «to blaspheme his name», en español el verbo suele construirse de modo más claro como «blasfemar contra» o «blasfemar de». La forma actual suena calcada y puede dificultar la lectura.
  - severity: low
    issue: La aposición final se entiende mejor con raya que con simple coma
    rationale: El griego permite aposición directa sin glosa, pero en español la raya ayuda a señalarla con más claridad y sigue una de las alternativas ya documentadas en el propio expediente español.
  - severity: low
    issue: Falta la nota léxica sobre «morada»/«tabernáculo»/«tienda» preservada en el POB inglés
    rationale: El expediente inglés conserva una nota léxica para σκηνή. Dado que en español «morada» también selecciona una de varias opciones posibles, conviene mantener esa alternativa en nota para fidelidad al rastro de auditoría.
  revised_spanish_text: Y abrió su boca en blasfemias contra Dios[a], para blasfemar contra su nombre y su morada[b]—los que habitan en el cielo.
  revised_footnotes:
  - marker: a
    text: 'O: «y los que habitan en el cielo», si la frase final se toma como un tercer objeto de «blasfemar» y no como explicación de «su morada».'
    reason: alternative_reading
  - marker: b
    text: «Morada» también podría traducirse «tabernáculo» o «tienda».
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis a un español más natural con «blasfemar contra su nombre», se marca mejor la aposición con raya sin introducir glosa explicativa, y se añade la nota léxica sobre σκηνή para alinearse con el expediente inglés.
