revisions:
- from: Y abrió su boca en blasfemias contra Dios, para blasfemar su nombre y su morada[a], los que habitan en el cielo.
  to: Y abrió su boca en blasfemias contra Dios[a], para blasfemar contra su nombre y su morada[b]—los que habitan en el cielo.
  rationale: Se ajusta la sintaxis a un español más natural con «blasfemar contra su nombre», se marca mejor la aposición con raya sin introducir glosa explicativa, y se añade la nota léxica sobre σκηνή para alinearse con el expediente inglés.
