translation:
  language: es
  text: Y abrió su boca en blasfemias contra Dios[a], para blasfemar contra su nombre y su morada[b]—los que habitan en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y los que habitan en el cielo», si la frase final se toma como un tercer objeto de «blasfemar» y no como explicación de «su morada».'
    reason: alternative_reading
  - marker: b
    text: «Morada» también podría traducirse «tabernáculo» o «tienda».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνοιξε
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - comenzó a abrir
  lexicon: BDAG
  rationale: El aoristo de ἀνοίγω se vierte de forma directa con un perfecto simple español. «Abrió» conserva la acción vívida sin añadir matiz aspectual no explicitado por el griego.
- source_word: εἰς βλασφημίας
  english_pob_choice: in blasphemies
  chosen_spanish: en blasfemias
  alternatives_spanish:
  - para blasfemias
  - para proferir blasfemias
  lexicon: BDAG
  rationale: La construcción idiomática se mantiene con una preposición natural en español. El plural «blasfemias» conserva la fuerza de emisiones repetidas o múltiples, no solo un acto abstracto.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: against God
  chosen_spanish: contra Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: BDAG
  rationale: En este contexto de habla hostil, «contra» expresa mejor el valor adversativo de πρός. «Dios» traduce θεός de manera directa y natural.
- source_word: βλασφημῆσαι
  english_pob_choice: to blaspheme
  chosen_spanish: blasfemar
  alternatives_spanish:
  - para blasfemar
  - con el fin de blasfemar
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito tras «abrió su boca»; «blasfemar» es la forma más directa y transparente en español.
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: BDAG
  rationale: Se conserva el sustantivo «nombre» sin expansión interpretativa, manteniendo la referencia bíblica al nombre revelado y al honor de Dios.
- source_word: τὴν σκηνὴν αὐτοῦ
  english_pob_choice: his dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su tienda
  - su tabernáculo
  lexicon: BDAG
  rationale: σκηνή puede significar tienda, tabernáculo o morada. «Morada» comunica de forma clara y reverente la habitación celestial de Dios sin imponer de entrada asociaciones cultuales excesivas.
- source_word: τοὺς ἐν τῷ οὐρανῷ σκηνοῦντας
  english_pob_choice: those dwelling in heaven
  chosen_spanish: los que habitan en el cielo
  alternatives_spanish:
  - los que moran en el cielo
  - los que tabernaculizan en el cielo
  lexicon: BDAG
  rationale: El participio presente se vierte con una relativa natural en español. «Habitan» es idiomático y conserva la idea de residencia continua; «cielo» traduce οὐρανῷ con el sentido espacial-teológico apropiado.
theological_decisions:
- issue: Relación entre «su morada» y «los que habitan en el cielo»
  english_pob_reading: The final phrase may be appositional/epexegetical to God's dwelling, but the coordinate reading remains plausible.
  chosen_spanish_reading: 'Se mantiene la frase final como aposición directa: «su morada, los que habitan en el cielo», sin expandirla con una explicación como «es decir»'
  alternative_spanish_readings:
  - «su morada—los que habitan en el cielo»
  - «su morada; los que habitan en el cielo»
  - «su morada, es decir, los que habitan en el cielo»
  rationale: El griego permite tanto coordinación como aposición explicativa. La redacción española conserva la tensión sin resolverla de manera interpretativa, y refleja la revisión inglesa que evitó introducir una glosa explicativa.
  doctrine_reference: Preservar la tensión exegética en lugar de cerrarla artificialmente.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la expansión interpretativa «that is,» y conservó la frase final como aposición directa. La presente redacción española sigue ese ajuste, evitando una glosa explicativa y manteniendo la ambigüedad controlada del griego.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no «Señor», conforme al texto fuente.
  - Se conserva «blasfemias/blasfemar» para βλασφημία/βλασφημέω, manteniendo la fuerza lexical.
  - «Morada» se eligió como equivalente funcional de σκηνή, con alternativa anotada para «tienda/tabernáculo».
  - La puntuación con coma antes de «los que habitan en el cielo» refleja la posibilidad aposicional sin imponerla como glosa.
