translation:
  language: es
  text: Y se le dio una boca que hablaba grandes cosas[b] y blasfemias, y se le dio autoridad para actuar durante cuarenta y dos meses[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, en algunos manuscritos y traducciones, «se le dio autoridad para continuar durante cuarenta y dos meses».
    reason: textual_variant
  - marker: b
    text: «Grandes cosas» probablemente lleva en contexto el sentido de palabras arrogantes o jactanciosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  english_pob_choice: was given
  chosen_spanish: se le dio
  alternatives_spanish:
  - le fue dada
  - se le concedió
  lexicon: BDAG
  rationale: El pasivo de δίδωμι expresa que el poder no es propio de la bestia, sino recibido. «Se le dio» conserva bien ese matiz de pasividad y la repetición enfática del versículo.
- source_word: στόμα
  english_pob_choice: a mouth
  chosen_spanish: una boca
  alternatives_spanish:
  - una boca que habla
  - la facultad de hablar
  lexicon: BDAG
  rationale: La imagen apocalíptica es literal y vívida; «una boca» mantiene el órgano de habla dado a la bestia, sin reducirlo a una abstracción.
- source_word: λαλοῦν
  english_pob_choice: speaking
  chosen_spanish: que hablaba
  alternatives_spanish:
  - hablando
  - que pronunciaba
  lexicon: BDAG
  rationale: El participio presente modifica a «boca»; en español, una relativa con imperfecto suena natural y conserva la acción continua.
- source_word: μεγάλα
  english_pob_choice: great things
  chosen_spanish: cosas grandes
  alternatives_spanish:
  - grandes cosas
  - grandes arrogancias
  - alardes
  lexicon: BDAG
  rationale: Se conserva la literalidad básica de μέγας/μεγάλα. Aunque el contexto apunta a discurso arrogante, el griego no dice explícitamente «alardes»; «cosas grandes» deja esa tensión abierta.
- source_word: βλασφημίας
  english_pob_choice: blasphemies
  chosen_spanish: blasfemias
  alternatives_spanish:
  - palabras blasfemas
  - injurias contra Dios
  lexicon: BDAG
  rationale: El plural debe mantenerse. «Blasfemias» preserva el término religioso fuerte y la carga de ofensa dirigida contra Dios.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - facultad
  lexicon: BDAG
  rationale: «Autoridad» expresa mejor la idea de permiso o jurisdicción delegada que simple fuerza, en armonía con el pasivo «se le dio».
- source_word: ποιῆσαι
  english_pob_choice: to act
  chosen_spanish: actuar
  alternatives_spanish:
  - hacer
  - ejercer
  - continuar
  lexicon: BDAG
  rationale: Dado que el infinitivo es amplio y va con una frase de duración, «actuar» funciona como un equivalente español natural sin introducir el sentido de la variante textual «continuar» en el texto principal.
- source_word: μῆνας τεσσεράκοντα δύο
  english_pob_choice: for forty-two months
  chosen_spanish: durante cuarenta y dos meses
  alternatives_spanish:
  - por cuarenta y dos meses
  - por un tiempo de cuarenta y dos meses
  lexicon: BDAG
  rationale: La duración acusativa se expresa naturalmente con «durante». Se mantiene el período apocalíptico en palabras para claridad y solemnidad.
theological_decisions:
- issue: Tensión entre literalidad de μεγάλα y su sentido contextual de arrogancia
  english_pob_reading: Rendered as 'great things' rather than interpretively narrowing to 'great boasts.'
  chosen_spanish_reading: «cosas grandes» en lugar de una paráfrasis como «alardes» o «palabras arrogantes»
  alternative_spanish_readings:
  - alardes
  - palabras arrogantes
  - grandes fanfarronadas
  rationale: La escena sugiere arrogancia, pero el adjetivo griego por sí solo es amplio. Mantener una formulación más literal preserva la tensión interpretativa y deja que el contexto inmediato complete el sentido.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Relación entre la boca dada y la autoridad dada
  english_pob_reading: A mouth was given to him... and authority was given to him
  chosen_spanish_reading: «se le dio una boca... y se le dio autoridad»
  alternative_spanish_readings:
  - le fue dada una boca... y le fue dada autoridad
  - se le concedió una boca... y se le concedió autoridad
  rationale: La repetición del pasivo mantiene el patrón apocalíptico de permisos limitados bajo soberanía superior. Traducir ambos miembros de forma paralela preserva ese énfasis literario y teológico.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no hizo cambios; el presente borrador sigue el texto griego SBLGNT provisto y conserva la decisión auditada de traducir ποιῆσαι según el texto principal, dejando la variante de «continuar» solo como nota textual. No se detectan revisiones aplicadas que obliguen a ajustar el español.
  spanish_consistency_notes:
  - Se mantiene «autoridad» para ἐξουσία, coherente con el registro del Apocalipsis y con el audit trail inglés.
  - Se usa «blasfemias» como plural directo de βλασφημίας, preservando la intensidad religiosa del término.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo ni corresponden a los términos fuente.
  - La nota al pie se ancla en «autoridad» para reflejar la variante textual relacionada con ποιῆσαι/«continuar».
