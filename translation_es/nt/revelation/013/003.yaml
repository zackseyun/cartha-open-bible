translation:
  language: es
  text: Y una de sus cabezas era como si hubiera sido degollada[a] hasta la muerte, pero su herida mortal fue sanada. Y toda la tierra se maravilló y siguió a la bestia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «parecía haber sido degollada hasta la muerte». El griego usa «como si», lo que puede indicar apariencia o semejanza más que una afirmación lisa y llana.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el país» o «toda la región», aunque en este contexto apocalíptico «toda la tierra» es más probable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μίαν ἐκ τῶν κεφαλῶν αὐτοῦ
  english_pob_choice: one of its heads
  chosen_spanish: una de sus cabezas
  alternatives_spanish:
  - una entre sus cabezas
  - una de las cabezas que tenía
  lexicon: BDAG
  rationale: La construcción partitiva se expresa de forma natural en español con «una de sus cabezas», sin añadir ni quitar sentido al griego.
- source_word: ὡς ἐσφαγμένην
  english_pob_choice: was as if slaughtered
  chosen_spanish: parecía como herida
  alternatives_spanish:
  - parecía como degollada
  - parecía como inmolada
  lexicon: BDAG
  rationale: El ὡς introduce semejanza, no una afirmación sin matiz. En español, «parecía» conserva la apariencia visionaria; «herida» evita una redundancia dura con «de muerte» y mantiene el sentido de violencia, aunque la alternativa más literal «degollada/inmolada» también es posible según el registro.
- source_word: εἰς θάνατον
  english_pob_choice: to death
  chosen_spanish: de muerte
  alternatives_spanish:
  - hasta la muerte
  - para muerte
  lexicon: BDAG
  rationale: La expresión intensifica la gravedad mortal de la herida. «De muerte» es una forma idiomática y clara en español que conserva ese matiz.
- source_word: ἡ πληγὴ τοῦ θανάτου αὐτοῦ
  english_pob_choice: its deadly wound
  chosen_spanish: su herida mortal
  alternatives_spanish:
  - el golpe de su muerte
  - su golpe mortal
  lexicon: BDAG
  rationale: La construcción nominal se vuelve naturalmente adjetival en español. «Herida mortal» comunica el carácter aparentemente letal de la πληγή sin perder la relación con θάνατος.
- source_word: ἐθεραπεύθη
  english_pob_choice: was healed
  chosen_spanish: fue sanada
  alternatives_spanish:
  - fue curada
  - fue restaurada
  lexicon: BDAG
  rationale: El pasivo de θεραπεύω aquí indica recuperación/restauración de la herida. «Sanada» es la opción más transparente y bíblica en español, sin convertirla en una interpretación más específica.
- source_word: ἐθαυμάσθη
  english_pob_choice: marveled
  chosen_spanish: se maravilló
  alternatives_spanish:
  - se asombró
  - quedó maravillada
  lexicon: BDAG
  rationale: El pasivo comunica admiración o asombro colectivo. «Se maravilló» mantiene el tono de sorpresa reverente o impactada sin decidir la valoración moral de la respuesta.
- source_word: ὅλη ἡ γῆ
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - todo el mundo
  lexicon: BDAG
  rationale: En este contexto apocalíptico, γῆ puede referirse al ámbito terrestre global. «Toda la tierra» conserva la amplitud y evita restringir indebidamente el alcance.
- source_word: ὀπίσω τοῦ θηρίου
  english_pob_choice: followed after the beast
  chosen_spanish: siguió a la bestia
  alternatives_spanish:
  - fue tras la bestia
  - siguió tras la bestia
  lexicon: BDAG
  rationale: ὀπίσω con genitivo expresa seguimiento detrás, con idea de adhesión. En español, «siguió a la bestia» transmite la idea principal con naturalidad; «fue tras» mantiene mejor la direccionalidad, pero suena menos fluido.
- source_word: θηρίου
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el monstruo
  lexicon: BDAG
  rationale: El término apocalíptico estándar en español es «bestia». No se capitaliza porque el griego no marca aquí un nombre propio.
theological_decisions:
- issue: Naturaleza de la herida y la sanidad del monstruo
  english_pob_reading: Render the text as an apparent mortal slaughter/healing without specifying whether the event is literal resurrection, symbolic political recovery, or deceptive imitation.
  chosen_spanish_reading: Presentar la herida como mortal en apariencia y su sanidad como recuperación, sin definir si se trata de resurrección literal, restauración simbólica o imitación engañosa.
  alternative_spanish_readings:
  - resurrección literal
  - restauración simbólica de un poder o imperio
  - muerte aparente montada como engaño
  rationale: El griego afirma semejanza a una muerte violenta y la sanidad de una herida mortal, pero no resuelve cómo debe entenderse teológicamente el acontecimiento. La traducción conserva esa tensión interpretativa en vez de imponer una lectura escatológica concreta.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto español sigue el sentido del griego SBLGNT y coincide sustancialmente con el rastro auditado en inglés. Se ha ajustado la formulación para que suene natural en español sin perder la ambigüedad de ὡς ni la amplitud de ὅλη ἡ γῆ. No se introdujeron cambios sustantivos respecto del pase revisado más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «bestia» como término apocalíptico estándar, sin capitalización.
  - Se conserva el matiz de apariencia con «parecía» para reflejar ὡς.
  - «Sanada» traduce θεραπεύω de forma comprensible y no doctrinalmente cerrada.
  - «Toda la tierra» preserva el alcance global sugerido por el contexto apocalíptico.
