revisions:
- from: Y una de sus cabezas parecía[a] como herida de muerte, y su herida mortal fue sanada. Y toda la tierra se maravilló y siguió al bestia[b].
  to: Y una de sus cabezas era como si hubiera sido degollada[a] hasta la muerte, pero su herida mortal fue sanada. Y toda la tierra se maravilló y siguió a la bestia[b],
  rationale: Se corrigió la imagen verbal central para reflejar ὡς ἐσφαγμένην con fuerza sacrificial/violenta ('degollada') y con matiz de apariencia ('como si hubiera sido'). Se mantuvo 'hasta la muerte' para εἰς θάνατον, 'herida mortal' para ἡ πληγὴ τοῦ θανάτου αὐτοῦ, y 'fue sanada' para ἐθεραπεύθη. También se corrigió el error gramatical 'al bestia' a 'a la bestia' y se ajustó la nota sobre γῆ para alinearla con la alternativa documentada en inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:40:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura general del versículo, pero no preserva con suficiente fidelidad dos puntos clave del griego y del rastro POB en inglés: ὡς ἐσφαγμένην debe reflejar una apariencia de haber sido degollada/inmolada, no simplemente ''herida''; y ''al bestia'' es un error gramatical, pues θηρίον aquí debe ser ''la bestia''. Además, la nota b introduce ''mundo entero'', que no corresponde a la alternativa documentada ''land/tierra/país''.'
  spanish_quality_summary: El texto es mayormente legible, pero 'parecía como herida de muerte' suena poco natural y debilita la imagen violenta de σφάζω. 'Siguió al bestia' es incorrecto en español. Una redacción más fiel y natural es 'era como si hubiera sido degollada hasta la muerte' y 'siguió a la bestia'.
  glossary_alignment: No hay términos del glosario mayor que entren en conflicto salvo la necesidad de mantener 'la bestia' como equivalente estándar de θηρίον. La elección 'sanada' para ἐθεραπεύθη y 'toda la tierra' para ὅλη ἡ γῆ concuerda bien con el proyecto. La nota alternativa para γῆ debe conservar 'tierra/país', no desplazar a 'mundo'.
  issues:
  - severity: high
    issue: ὡς ἐσφαγμένην se tradujo como 'parecía como herida'
    rationale: σφάζω denota matanza/degollamiento, más fuerte y específico que 'herir'. El inglés auditado preserva 'as if slaughtered'; el español debe conservar esa fuerza y la comparación introducida por ὡς.
  - severity: high
    issue: 'Error gramatical: ''siguió al bestia'''
    rationale: En español estándar debe ser 'siguió a la bestia'. Además, el propio análisis léxico del borrador ya reconoce 'la bestia' como forma correcta.
  - severity: medium
    issue: La nota b ofrece 'el mundo entero' como alternativa
    rationale: La alternativa documentada en el POB inglés es 'the whole land', no 'the whole world'. En español, la alternativa adecuada sería 'toda la tierra' / 'todo el país' o 'toda la región' según contexto, pero aquí el texto principal correcto es 'toda la tierra'.
  - severity: medium
    issue: La formulación 'parecía como herida de muerte' es torpe en español
    rationale: Incluso aparte del problema léxico, la secuencia 'parecía como herida' suena forzada. Una construcción como 'era como si hubiera sido degollada hasta la muerte' o 'como degollada hasta la muerte' es más natural y fiel.
  revised_spanish_text: Y una de sus cabezas era como si hubiera sido degollada[a] hasta la muerte, pero su herida mortal fue sanada. Y toda la tierra se maravilló y siguió a la bestia[b],
  revised_footnotes:
  - marker: a
    text: 'O: «parecía haber sido degollada hasta la muerte». El griego usa «como si», lo que puede indicar apariencia o semejanza más que una afirmación lisa y llana.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo el país» o «toda la región», aunque en este contexto apocalíptico «toda la tierra» es más probable.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la imagen verbal central para reflejar ὡς ἐσφαγμένην con fuerza sacrificial/violenta ('degollada') y con matiz de apariencia ('como si hubiera sido'). Se mantuvo 'hasta la muerte' para εἰς θάνατον, 'herida mortal' para ἡ πληγὴ τοῦ θανάτου αὐτοῦ, y 'fue sanada' para ἐθεραπεύθη. También se corrigió el error gramatical 'al bestia' a 'a la bestia' y se ajustó la nota sobre γῆ para alinearla con la alternativa documentada en inglés.
