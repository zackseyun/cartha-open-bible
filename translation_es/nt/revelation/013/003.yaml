  text: καὶ μίαν ἐκ τῶν κεφαλῶν αὐτοῦ ⸀ὡς ἐσφαγμένην εἰς θάνατον, καὶ ἡ πληγὴ τοῦ θανάτου αὐτοῦ ἐθεραπεύθη. καὶ ⸀ἐθαυμάσθη ⸂ὅλη ἡ γῆ⸃ ὀπίσω τοῦ θηρίου,
base_translation:
  language: en
  yaml_path: translation/nt/revelation/013/003.yaml
  text: And one of its heads was as if slaughtered to death[a], and its deadly wound was healed. And the whole earth marveled and followed after the beast[b],
