translation:
  language: es
  text: Y le fue dado hacer guerra contra los santos[a] y vencerlos[b], y le fue dada autoridad sobre toda tribu, pueblo, lengua[c] y nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacer guerra con los santos'; aquí el sentido es hostil, es decir, 'contra los santos'.
    reason: lexical_alternative
  - marker: b
    text: O 'superarlos'.
    reason: lexical_alternative
  - marker: c
    text: 'Alternativa más moderna: ''idioma''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδόθη
  english_pob_choice: it was given / was given
  chosen_spanish: le fue dado / le fue dada
  alternatives_spanish:
  - se le concedió
  - se le permitió
  lexicon: BDAG
  rationale: Conservo la pasiva impersonal para mantener la reserva del sujeto implícito y la tensión teológica del texto. En español, 'le fue dado' reproduce mejor esa pasiva que una formulación más explícita como 'se le permitió'.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo se expresa naturalmente con el pronombre átono 'le'; el complemento explícito 'a él' sería posible, pero menos fluido en esta construcción repetida.
- source_word: ποιῆσαι πόλεμον
  english_pob_choice: to make war
  chosen_spanish: hacer guerra
  alternatives_spanish:
  - librar guerra
  - hacer la guerra
  lexicon: BDAG
  rationale: '''Hacer guerra'' conserva de cerca la expresión griega y la decisión inglesa ''make war'', sin perder inteligibilidad en español. ''Librar guerra'' sería más idiomático en algunos registros, pero desplaza un poco la forma del original.'
- source_word: μετὰ τῶν ἁγίων
  english_pob_choice: against the saints
  chosen_spanish: contra los santos
  alternatives_spanish:
  - con los santos
  lexicon: BDAG
  rationale: Aunque μετά con genitivo puede significar 'con', el contexto de πολεμεῖν exige sentido hostil. 'Contra los santos' preserva la decisión del POB en inglés y mantiene la tensión lexical sin ambigüedad indebida.
- source_word: ἁγίων
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - los santos de Dios
  - santos / consagrados
  lexicon: BDAG
  rationale: '''Santos'' es la equivalencia más estable y natural para ἅγιοι en este contexto apocalíptico. ''Consagrados'' o una expansión como ''los santos de Dios'' serían más interpretativas.'
- source_word: νικῆσαι
  english_pob_choice: to conquer
  chosen_spanish: vencerlos
  alternatives_spanish:
  - conquistarlos
  - derrotarlos
  - sobreponerse a ellos
  lexicon: BDAG
  rationale: '''Vencer'' comunica el resultado de νικάω con buena naturalidad en español y conserva la idea temática de superar al adversario. Añadí el objeto enclítico ''los'' para reflejar el pronombre griego.'
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  lexicon: BDAG
  rationale: '''Autoridad'' expresa mejor la idea de derecho/jurisdicción delegados que el mero poder. Esto sigue la elección del POB en inglés y se ajusta bien al pasivo ''le fue dada''.'
- source_word: ἐπὶ πᾶσαν φυλὴν καὶ λαὸν καὶ γλῶσσαν καὶ ἔθνος
  english_pob_choice: over every tribe and people and language and nation
  chosen_spanish: sobre toda tribu, pueblo, lengua y nación
  alternatives_spanish:
  - sobre toda tribu y pueblo y lengua y nación
  - sobre todo linaje, pueblo, lengua y nación
  lexicon: BDAG
  rationale: Mantengo la fórmula cuádruple en una estructura española natural. 'Lengua' conserva el sentido de γλῶσσα y evita el arcaísmo de 'tongue'; 'tribu', 'pueblo' y 'nación' siguen los valores estándar en esta lista distributiva.
theological_decisions:
- issue: Pasiva divina implícita en ἐδόθη
  english_pob_reading: Preserve the passive ('it was given... authority was given') without identifying the giver in the main text.
  chosen_spanish_reading: Preservar la pasiva impersonal ('le fue dado... le fue dada') sin nombrar al dador.
  alternative_spanish_readings:
  - '''Dios le dio...'''
  - '''se le permitió...'''
  rationale: La pasiva conserva la forma del griego y evita resolver interpretativamente quién concede la acción y la autoridad. Esto mantiene la tensión teológica entre soberanía divina y permiso del mal sin suavizarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto inglés del POB ya fue revisado y confirmado como estable (''unchanged: true''); no se requieren cambios textuales derivados de revisiones posteriores. La presente propuesta sigue la lectura auditada y conserva las decisiones léxicas y teológicas relevantes.'
  spanish_consistency_notes:
  - Se mantiene 'santos' para ἅγιοι, en coherencia con el uso habitual del POB y con el sentido de pueblo santo en este contexto.
  - Se preserva la fórmula distributiva 'tribu, pueblo, lengua y nación' para reflejar el alcance universal de la autoridad concedida.
  - La repetición de 'le fue...' reproduce el paralelismo de las dos ocurrencias de ἐδόθη en el versículo.
  - Se evita 'SEÑOR' u otra sustitución innecesaria, ya que este versículo no contiene el tetragrámaton ni κύριος con referencia directa al nombre divino.
