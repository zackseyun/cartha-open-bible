translation:
  language: es
  text: Si alguien está destinado al cautiverio[a], al cautiverio va; si alguien ha de ser muerto con la espada, con la espada debe ser muerto[c][b]. Aquí está la perseverancia y la fe de los santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si alguien va al cautiverio, al cautiverio va»; la línea también puede entenderse como una afirmación de destino fijado, no como un mandato.'
    reason: alternative_reading
  - marker: b
    text: 'Algunos manuscritos/testigos presentan una lectura distinta en esta cláusula, incluso formas que dicen: «Si alguien mata con la espada, ha de ser muerto con la espada». Se conserva aquí el texto adoptado, pero la variante es importante para la interpretación.'
    reason: textual_variant
  - marker: c
    text: 'O: «fidelidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις
  english_pob_choice: If anyone
  chosen_spanish: Si alguien
  alternatives_spanish:
  - Si cualquiera
  - Si alguno
  lexicon: BDAG
  rationale: La construcción condicional indefinida introduce una máxima general. «Si alguien» mantiene el valor genérico natural en español y evita un calco demasiado pesado.
- source_word: εἰς αἰχμαλωσίαν ... ὑπάγει
  english_pob_choice: is for captivity ... into captivity he goes
  chosen_spanish: va a cautividad
  alternatives_spanish:
  - va a cautiverio
  - entra en cautividad
  lexicon: BDAG
  rationale: «Cautividad» conserva el tono bíblico y la idea de ser llevado preso. Para la primera cláusula, el español puede compactar la repetición sin perder el paralelismo esencial; la nota preserva la alternativa de lectura más literal.
- source_word: αἰχμαλωσία
  english_pob_choice: captivity
  chosen_spanish: cautividad
  alternatives_spanish:
  - cautiverio
  - captividad
  lexicon: BDAG
  rationale: «Cautividad» es idiomática y digna en español bíblico actual. «Captividad» sería más transparente etimológicamente, pero suena menos natural; «cautiverio» es viable, aunque algo más literario.
- source_word: ἐν μαχαίρῃ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: BDAG
  rationale: La dativo instrumental con ἐν se expresa de forma natural con «con la espada», conservando el valor instrumental sin forzar una traducción artificial.
- source_word: ἀποκτανθῆναι
  english_pob_choice: to be killed / be killed
  chosen_spanish: ser muerto
  alternatives_spanish:
  - ser asesinado
  - ser matado
  lexicon: BDAG
  rationale: «Ser muerto» reproduce con sobriedad el pasivo y el tono solemne del texto. En español contemporáneo puede sonar menos común, pero aquí preserva mejor la forma breve y proverbial del griego.
- source_word: αὐτὸν
  english_pob_choice: he must be killed
  chosen_spanish: ha de ser muerto
  alternatives_spanish:
  - debe ser muerto
  - será muerto
  lexicon: BDAG
  rationale: La presencia de αὐτόν en el contexto pasivo sugiere la persona destinada a sufrir la acción; en español, la perífrasis «ha de ser muerto» expresa necesidad/inevitabilidad sin introducir un sujeto agente no presente en el texto.
- source_word: ὧδέ ἐστιν
  english_pob_choice: Here is
  chosen_spanish: Aquí está
  alternatives_spanish:
  - Aquí se ve
  - Aquí hay
  lexicon: BDAG
  rationale: «Aquí está» conserva el deíctico enfático y suena natural en español. Evita suavizar el énfasis del griego con una formulación demasiado explicativa.
- source_word: ὑπομονή
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - paciencia
  - constancia
  lexicon: BDAG
  rationale: En Apocalipsis, ὑπομονή refiere resistencia fiel bajo aflicción. «Perseverancia» comunica mejor esa firmeza sostenida que «paciencia», que en español moderno puede sugerir solo tolerancia pasiva.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se mantiene «fe» como término principal. En este contexto la noción de fidelidad perseverante también está implicada, por lo que se preserva como alternativa interpretativa sin resolver la tensión en el texto principal.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos de Dios
  - de los consagrados
  lexicon: BDAG
  rationale: «Los santos» es la forma breve, tradicional y comprensible para los creyentes del texto apocalíptico, sin perder la referencia al pueblo apartado para Dios.
theological_decisions:
- issue: 'Primeras dos cláusulas: inevitabilidad judicial o mandato ético'
  english_pob_reading: descriptive inevitability/judicial destiny
  chosen_spanish_reading: inevitabilidad descriptiva / destino judicial
  alternative_spanish_readings:
  - mandato para no resistir la violencia
  - principio retributivo para captores y agresores
  rationale: La sintaxis griega es sentenciosa y elíptica. La traducción española mantiene el carácter proverbial y la solemnidad del anuncio sin convertirlo en una instrucción ética explícita ni en una explicación retributiva más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Cómo entender ὑπομονή en el cierre
  english_pob_reading: endurance
  chosen_spanish_reading: perseverancia
  alternative_spanish_readings:
  - paciencia
  - constancia
  rationale: En el marco del sufrimiento de los santos, la idea no es mera espera tranquila sino resistencia fiel y sostenida. «Perseverancia» capta mejor ese matiz en español contemporáneo.
  doctrine_reference: Apocalipsis 13:10; uso contextual de ὑπομονή
- issue: Cómo entender πίστις en el cierre
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se conserva «fe» conforme a la política terminológica del proyecto. Dado que el contexto apunta también a lealtad perseverante, se deja abierta la alternativa sin sustituir el término principal.
  doctrine_reference: 'Términos disputados: πίστις → fe; alternativas en nota'
translation_notes:
  revision_awareness: 'Se revisó a la luz del último pase de revisión, que no señaló cambios necesarios. La redacción española sigue de cerca el texto griego adoptado y conserva las tensiones documentadas por el aparato inglés: la ambigüedad de la primera mitad, la variante textual en la cláusula de la espada y la posibilidad semántica de πίστις como «fe» o «fidelidad».'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se evita «Cristo» porque no aparece Χριστός en el versículo.
  - «Cautividad»/«perseverancia»/«fe» mantienen un registro bíblico claro y coherente con Apocalipsis.
  - La puntuación imita el paralelismo breve del griego, con punto y coma para separar las dos cláusulas principales.
