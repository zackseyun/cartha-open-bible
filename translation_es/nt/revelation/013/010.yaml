revisions:
- from: Si alguien va a cautividad[a], a cautividad va; si alguien ha de ser muerto con la espada, con la espada ha de ser muerto[b]. Aquí está la perseverancia y la fe[c] de los santos.
  to: Si alguien está destinado al cautiverio[a], al cautiverio va; si alguien ha de ser muerto con la espada, con la espada debe ser muerto[c][b]. Aquí está la perseverancia y la fe de los santos.
  rationale: Se revisa la primera cláusula para reflejar la decisión auditada de destino/inevitabilidad («is for captivity») en lugar de la simple idea de ir a cautividad. Se ajusta también la nota [a] para que vuelva a ser una alternativa real. Se mantiene el paralelismo solemne del griego, pero con un español más natural y fiel al razonamiento lexical y teológico del POB. La nota sobre «fidelidad» debe anclarse en la cláusula correspondiente, no quedar huérfana.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:48Z'
