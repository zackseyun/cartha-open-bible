  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: llamado a la sabiduría, exhortación a calcular, referencia al número de la bestia y cierre con 666. Sin embargo, los marcadores de notas están anclados a frases equivocadas: [a] aparece tras «la bestia» aunque la nota trata de «número de hombre», y [b] aparece tras «hombre» aunque la nota textual corresponde a 666. Además, «que el que tiene entendimiento calcule» suena menos natural que una exhortación directa.'
  spanish_quality_summary: El español es claro y comprensible, pero puede pulirse para mayor naturalidad y fidelidad estilística. «El que tiene entendimiento, calcule» refleja mejor el imperativo exhortativo. «Porque es número de hombre» es defendible por su ambigüedad, aunque algo áspero; sigue siendo aceptable dentro del objetivo de preservar la tensión del griego.
  glossary_alignment: 'La terminología clave está alineada: θηρίον = «bestia», σοφία = «sabiduría», νοῦς = «entendimiento», ἀριθμός = «número». No hay conflicto con glosario de proyecto. El principal problema no es léxico sino de anclaje de notas y fluidez sintáctica.'
  issues:
