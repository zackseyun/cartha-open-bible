translation:
  language: es
  text: 'Aquí hay sabiduría: el que tiene entendimiento, calcule el número de la bestia, porque es número de hombre[a]; y su número es seiscientos sesenta y seis[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque es el número de un hombre»; alternativamente, «porque es un número humano».'
    reason: alternative_reading
  - marker: b
    text: Algunos manuscritos leen 616 en lugar de 666.
    reason: textual_variant
lexical_decisions:
- source_word: ὧδε
  english_pob_choice: Here
  chosen_spanish: Aquí
  alternatives_spanish:
  - En este caso
  - Aquí mismo
  lexicon: BDAG
  rationale: Adverbio que introduce una aplicación o punto de atención. «Aquí» conserva la fuerza demostrativa de ὧδε de manera natural en español.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - la sabiduría
  lexicon: BDAG
  rationale: Equivalente directo y claro de σοφία. En esta construcción predicativa, el artículo puede omitirse en español sin perder naturalidad.
- source_word: ὁ ἔχων νοῦν
  english_pob_choice: the one who has understanding
  chosen_spanish: el que tiene entendimiento
  alternatives_spanish:
  - el que tiene mente
  - quien tiene discernimiento
  lexicon: BDAG
  rationale: νοῦς aquí apunta a capacidad de entender o discernir, no solo a «mente» como facultad. «Entendimiento» conserva el matiz de comprensión reflexiva y mantiene el singular exhortativo.
- source_word: ψηφισάτω
  english_pob_choice: calculate
  chosen_spanish: calcule
  alternatives_spanish:
  - cuente
  - compute
  - descifre
  lexicon: BDAG
  rationale: Imperativo aoristo que pide realizar un cálculo o cómputo. «Calcule» es preciso y natural para el contexto de obtener un número.
- source_word: τὸν ἀριθμὸν
  english_pob_choice: the number
  chosen_spanish: el número
  alternatives_spanish:
  - la cifra
  lexicon: BDAG
  rationale: ἀριθμός se traduce de forma uniforme como «número» para conservar la repetición y el énfasis del versículo.
- source_word: τοῦ θηρίου
  english_pob_choice: the beast
  chosen_spanish: de la bestia
  alternatives_spanish:
  - del monstruo
  lexicon: BDAG
  rationale: «Bestia» es el equivalente establecido en Apocalipsis para θηρίον y mantiene el registro apocalíptico.
- source_word: ἀριθμὸς γὰρ ἀνθρώπου ἐστίν
  english_pob_choice: for it is a man's number / the number of a man
  chosen_spanish: porque es número de hombre
  alternatives_spanish:
  - porque es el número de un hombre
  - porque es un número humano
  lexicon: BDAG
  rationale: La expresión griega es ambigua. «Número de hombre» conserva la tensión y la brevedad del griego, sin decidir si se trata de un hombre concreto o de un número humano.
- source_word: αὐτοῦ
  english_pob_choice: its
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  - de él
  lexicon: BDAG
  rationale: El antecedente inmediato es θηρίον, neutro en griego; en español «su» es la forma natural y permite conservar la referencia al monstruo/bestia sin sobrecargar el texto.
- source_word: ἑξακόσιοι ἑξήκοντα ἕξ
  english_pob_choice: six hundred sixty-six
  chosen_spanish: seiscientos sesenta y seis
  alternatives_spanish:
  - '666'
  lexicon: BDAG
  rationale: Se vierte el numeral de forma plena, como en la tradición bíblica en español, manteniendo el valor exacto del número.
theological_decisions:
- issue: Ambigüedad de ἀνθρώπου en la frase ἀριθμὸς γὰρ ἀνθρώπου ἐστίν
  english_pob_reading: The English POB preserves the tension with 'a man's number' in the main text and notes the alternative 'the number of a man.'
  chosen_spanish_reading: «porque es número de hombre»
  alternative_spanish_readings:
  - «porque es el número de un hombre»
  - «porque es un número humano»
  rationale: La frase ha sido debatida desde la antigüedad. El griego admite una referencia a un hombre concreto, a la humanidad, o a lo humano en contraste con lo divino. La traducción principal conserva la ambigüedad en español para no cerrar indebidamente el sentido.
  doctrine_reference: Principios de traducción POB §3–4
translation_notes:
  revision_awareness: El texto inglés fue revisado desde «a man's number» a «the number of a man» para acercarse más al valor lexical de ἀριθμὸς γὰρ ἀνθρώπου ἐστίν, manteniendo la ambigüedad interpretativa. La versión española conserva esa tensión mediante «número de hombre» y la nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «bestia» para θηρίον en coherencia con el Apocalipsis.
  - Se usa «sabiduría» y «entendimiento» en un registro bíblico claro y contemporáneo.
  - El numeral se escribe con letras para reflejar el estilo bíblico de la serie y evitar una lectura meramente aritmética.
  - La nota textual sobre 616 se conserva por ser parte del aparato crítico relevante del versículo.
