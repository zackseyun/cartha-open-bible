translation:
  language: es
  text: Y vi otra bestia que subía de la tierra[a], y tenía dos cuernos como un cordero, y hablaba como un dragón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «surgía de la tierra». El griego γῆ puede significar «tierra» o «país».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο θηρίον
  english_pob_choice: another beast
  chosen_spanish: otra bestia
  alternatives_spanish:
  - otra criatura
  lexicon: BDAG
  rationale: θηρίον en Apocalipsis es un término técnico para la potencia bestial y hostil; «bestia» conserva mejor el valor apocalíptico e intertextual que «criatura». «Otra» reproduce con naturalidad ἄλλο.
- source_word: ἀναβαῖνον ἐκ τῆς γῆς
  english_pob_choice: coming up out of the earth
  chosen_spanish: que subía de la tierra
  alternatives_spanish:
  - que subía de la tierra
  - que ascendía de la tierra
  - que surgía de la tierra
  - que subía del país
  lexicon: BDAG
  rationale: El participio presente expresa una acción en curso; «subía» mantiene ese matiz narrativo sin volverse pesado. «De la tierra» reproduce γῆ como «earth/tierra» en el contraste simbólico con la bestia del mar. Se evita «del país» porque estrecha indebidamente el alcance del símbolo.
- source_word: κέρατα δύο
  english_pob_choice: two horns
  chosen_spanish: dos cuernos
  alternatives_spanish:
  - dos astas
  lexicon: BDAG
  rationale: «Cuernos» es el equivalente directo y conserva la imaginería de poder/autoridad propia del género apocalíptico.
- source_word: ὅμοια ἀρνίῳ
  english_pob_choice: like a lamb
  chosen_spanish: semejantes a los de un cordero
  alternatives_spanish:
  - como un cordero
  - parecidos a un cordero
  lexicon: BDAG
  rationale: El griego compara los cuernos con el cordero; en español, «semejantes a los de un cordero» hace explícita la relación gramatical con «cuernos» y evita una comparación más ambigua. «Cordero» preserva la resonancia con el símbolo del Cordero en Apocalipsis sin resolver la tensión interpretativa.
- source_word: ἐλάλει
  english_pob_choice: it was speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - estaba hablando
  - decía
  lexicon: BDAG
  rationale: El imperfecto describe una acción característica o continua. En español, «hablaba» comunica ese valor de manera natural y menos recargada que una perífrasis.
- source_word: ὡς δράκων
  english_pob_choice: like a dragon
  chosen_spanish: como dragón
  alternatives_spanish:
  - como un dragón
  - a la manera de un dragón
  lexicon: BDAG
  rationale: «Como dragón» conserva la comparación del ὡς sin añadir un artículo que el español puede omitir en este giro estilizado. Mantiene la fuerza imagética del discurso semejante al del dragón.
theological_decisions:
- issue: Posible resonancia de ἀρνίον con el Cordero de Apocalipsis
  english_pob_reading: like a lamb
  chosen_spanish_reading: semejantes a los de un cordero
  alternative_spanish_readings:
  - como un cordero
  - semejantes a un cordero
  rationale: La formulación intenta preservar la apariencia de inocencia o semejanza sin equiparar a la bestia con el verdadero Cordero. Se mantiene la tensión del texto, que sugiere imitación engañosa más que identidad.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Valor de γῆ como «earth» frente a «land»
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - suelo
  - país
  rationale: «Tierra» reproduce el rango semántico amplio de γῆ y encaja con el contraste apocalíptico con la bestia del mar. «País» sería demasiado restrictivo y editorializa la imagen.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s broad symbolic scope.'
translation_notes:
  revision_awareness: 'La versión sigue el texto griego SBLGNT y coincide sustancialmente con la decisión inglesa auditada: θηρίον como «bestia», γῆ como «tierra», y el imperfecto descriptivo en castellano natural. No se detectaron revisiones aplicadas en el expediente inglés, así que se conservó el sentido base sin introducir aclaraciones no sustentadas.'
  spanish_consistency_notes:
  - Se mantuvo «bestia» por coherencia con la terminología apocalíptica de POB.
  - Se usó «cordero» en lugar de «Cordero» porque aquí funciona como comparación descriptiva; no obstante, la mayúscula sería posible si el contexto inmediato exigiera aludir explícitamente al título cristológico.
  - Se evitó «SEÑOR» u otras equivalencias de cobertura porque no hay en el versículo un término divino que lo requiera.
  - La puntuación sigue el patrón español estándar, conservando la serie de cláusulas coordinadas del griego.
