revisions:
- from: Y cuando los seres vivientes den gloria y honor y gratitud al que está sentado en el trono[a], al que vive por los siglos de los siglos,
  to: Y siempre que los seres vivientes den gloria y honor y acción de gracias al que está sentado en el trono, al que vive por los siglos de los siglos[a],
  rationale: Se ajusta ὅταν a «siempre que» para conservar el sentido iterativo de «whenever»; se cambia «gratitud» por «acción de gracias» para reflejar mejor εὐχαριστία como acto doxológico; y se mueve la nota al pie a la frase de duración eterna, además de hacer que la alternativa literal corresponda realmente al griego idiomático final, no a «trono».
  reviewer_model: gpt-5.4
