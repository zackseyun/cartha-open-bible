review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: la cláusula temporal iterativa, los tres sustantivos coordinados, el destinatario descrito por participios y la fórmula de duración eterna. Sin embargo, dos elecciones no preservan del todo el audit trail: «y cuando» debilita el matiz iterativo de ὅταν frente a «whenever», y «gratitud» desplaza εὐχαριστίαν desde un acto expresado de acción de gracias hacia una disposición interna. La nota al pie también está mal anclada: [a] aparece en «trono», pero la nota explica la frase final «por los siglos de los siglos».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en precisión y naturalidad bíblica. «Siempre que» o «cada vez que» expresa mejor la recurrencia. «Acción de gracias» es más fiel que «gratitud» en esta tríada doxológica. El resto del versículo suena bien y mantiene buena legibilidad eclesial. La colocación de la nota debe corregirse para evitar confusión.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, esclavo, etc. La principal cuestión léxica es εὐχαριστίαν, donde «acción de gracias» se alinea mejor con la decisión inglesa «thanksgiving» y con el sustantivo de acto cultual. «Por los siglos de los siglos» es una buena adaptación española del idiomático εἰς τοὺς αἰῶνας τῶν αἰώνων.
  issues:
  - severity: medium
    issue: «Y cuando» no refleja suficientemente el valor iterativo de ὅταν
    rationale: El audit trail inglés justificó «whenever» por la recurrencia de la acción. En español, «cuando» puede leerse como temporal simple; «siempre que» o «cada vez que» preserva mejor el matiz indefinido/iterativo.
  - severity: medium
    issue: «Gratitud» no es la mejor equivalencia para εὐχαριστίαν
    rationale: εὐχαριστία aquí es una expresión de agradecimiento ofrecida a Dios, no solo una disposición interior. «Acción de gracias» mantiene el carácter nominal y doxológico mejor que «gratitud».
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica la alternativa literal de la frase final de duración («por los siglos de los siglos»), pero el marcador aparece tras «trono». Eso crea una referencia incorrecta y debe corregirse para cumplir las reglas del proyecto.
  revised_spanish_text: Y siempre que los seres vivientes den gloria y honor y acción de gracias al que está sentado en el trono, al que vive por los siglos de los siglos[a],
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «por las edades de las edades».'
    reason: lexical_alternative
  revision_rationale: Se ajusta ὅταν a «siempre que» para conservar el sentido iterativo de «whenever»; se cambia «gratitud» por «acción de gracias» para reflejar mejor εὐχαριστία como acto doxológico; y se mueve la nota al pie a la frase de duración eterna, además de hacer que la alternativa literal corresponda realmente al griego idiomático final, no a «trono».
