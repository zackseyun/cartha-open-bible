translation:
  language: es
  text: Y siempre que los seres vivientes den gloria y honor y acción de gracias al que está sentado en el trono, al que vive por los siglos de los siglos[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «por las edades de las edades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: whenever
  chosen_spanish: y cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: El valor de ὅταν con referencia iterativa o indefinida se expresa de manera natural en español con «y cuando» en un contexto narrativo-visionario. «Siempre que» o «cada vez que» captan la repetición, pero suenan más marcados o menos fluidos aquí.
- source_word: δώσουσιν
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - ofrezcan
  - atribuyan
  lexicon: BDAG
  rationale: Con δόξαν, τιμήν y εὐχαριστίαν, el verbo simple «dar» mantiene la llaneza del griego y evita una paráfrasis interpretativa. «Ofrezcan» o «atribuyan» empujarían el sentido litúrgico en direcciones más explicativas que el original no exige.
- source_word: τὰ ζῷα
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - los cuatro seres vivientes
  lexicon: BDAG
  rationale: «Seres vivientes» conserva el referente técnico de Apocalipsis sin volverlo biológico ni animal. «Criaturas vivientes» es posible, pero «seres vivientes» suena más natural en español y mantiene la identificación apocalíptica.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - alabanza
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente directo y conserva el valor doxológico del sustantivo. «Alabanza» desplazaría el foco hacia la acción humana; «esplendor» enfatizaría más la majestad inherente que la gloria reconocida.
- source_word: τιμὴν
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - estima
  - reverencia
  lexicon: BDAG
  rationale: «Honor» es la correspondencia más directa para τιμή y encaja de modo natural con el paralelismo «gloria y honor y gratitud».
- source_word: εὐχαριστίαν
  english_pob_choice: thanksgiving
  chosen_spanish: gratitud
  alternatives_spanish:
  - acción de gracias
  - agradecimiento
  lexicon: BDAG
  rationale: En español, el nominal «gratitud» conserva bien la idea de thanksgiving como disposición y expresión de agradecimiento sin sonar rígido. «Acción de gracias» sería más literal, pero menos fluido en esta triada; «agradecimiento» es viable, aunque algo más prosaico.
- source_word: τῷ καθημένῳ ἐπὶ τῷ θρόνῳ
  english_pob_choice: to the one seated on the throne
  chosen_spanish: al que está sentado en el trono
  alternatives_spanish:
  - al que se sienta en el trono
  - al entronizado
  lexicon: BDAG
  rationale: «El que está sentado en el trono» reproduce con naturalidad la imagen y la estabilización del participio griego. «Se sienta» sugeriría un acto en curso; «entronizado» explicitaría una conclusión que el texto no verbaliza.
- source_word: τῷ ζῶντι
  english_pob_choice: to the one who lives
  chosen_spanish: al que vive
  alternatives_spanish:
  - al viviente
  - al que está vivo
  lexicon: BDAG
  rationale: El participio presente se vuelve de forma clara y sobria con «al que vive». «Al viviente» es posible, pero suena más nominal y menos transparente; «al que está vivo» añade una cualidad menos directa que el verbo.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por las edades de las edades
  lexicon: BDAG
  rationale: La fórmula idiomática española «por los siglos de los siglos» comunica con solemnidad y fidelidad el sentido de duración interminable. Aunque el inglés POB optó por «forever and ever», en español la equivalencia tradicional es más natural y auditable; «por las edades de las edades» sería más literal pero menos idiomática.
theological_decisions:
- issue: Cómo verter la duración eterna sin ocultar el matiz idiomático literal
  english_pob_reading: forever and ever
  chosen_spanish_reading: por los siglos de los siglos
  alternative_spanish_readings:
  - para siempre y para siempre
  - por las edades de las edades
  rationale: El griego usa una fórmula intensiva plural que en español bíblico se comunica con «por los siglos de los siglos». Esta opción preserva solemnidad, inteligibilidad y el valor de duración absoluta sin necesidad de una nota extensa en el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantener el referente del trono sin añadir explícitamente 'Dios'
  english_pob_reading: to the one seated on the throne, to the one who lives forever and ever
  chosen_spanish_reading: al que está sentado en el trono, al que vive por los siglos de los siglos
  alternative_spanish_readings:
  - al que se sienta en el trono, al que vive para siempre
  - a Dios que está sentado en el trono
  rationale: El texto griego identifica al destinatario por su entronización y vida eterna, sin nombrar aquí a Dios explícitamente. La traducción conserva esa estructura para no añadir una especificación ajena al versículo, aunque el contexto la haga transparente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y el audit trail inglés POB, manteniendo la elección no interpretativa de ὅταν como temporal iterativo, el verbo simple «dar», y el título del trono sin añadir especificación extra. Se ajustó εὐχαριστίαν a «gratitud» por naturalidad española, y εἰς τοὺς αἰῶνας τῶν αἰώνων a la fórmula bíblica española tradicional «por los siglos de los siglos», dejando constancia en nota de la alternativa más literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino ni el equivalente griego κύριος en cita del nombre.
  - «Seres vivientes» conserva la terminología apocalíptica del capítulo.
  - La coordinación de sustantivos abstractos («gloria y honor y gratitud») sigue de cerca la estructura del griego y del inglés auditado.
  - La puntuación con coma antes de la apposición final respeta el flujo oracional del original y la cadencia litúrgica en español.
