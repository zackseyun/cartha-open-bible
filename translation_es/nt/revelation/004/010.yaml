  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. Las decisiones para Dios, adoración y títulos descriptivos son consistentes. La única desviación relevante es lexical: πεσοῦνται queda mejor alineado con «caerán»/«caerán rostro en tierra» que con «se postrarán» como opción principal; y conviene conservar en nota la alternativa de στεφάνους como coronas/guirnaldas de victoria.'
