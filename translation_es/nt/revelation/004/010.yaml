translation:
  language: es
  text: 'los veinticuatro ancianos caerán[a] delante del que está sentado sobre el trono, y adorarán al que vive por siempre[b], y arrojarán sus coronas[c] delante del trono, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se postrarán». El griego expresa el acto de caer en reverencia.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, «por los siglos de los siglos».
    reason: lexical_alternative
  - marker: c
    text: La palabra griega para «coronas» también puede referirse a coronas o guirnaldas de victoria otorgadas como señal de honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεσοῦνται
  english_pob_choice: will fall down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - caerán
  - se inclinarán hasta el suelo
  lexicon: BDAG
  rationale: En este contexto de adoración, el verbo expresa una caída reverente ante una autoridad divina. «Se postrarán» conserva el gesto corporal de reverencia sin sonar tan accidental como «caerán».
- source_word: πρεσβύτεροι
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  lexicon: BDAG
  rationale: «Ancianos» es el equivalente natural y ampliamente inteligible en español para πρεσβύτεροι; «presbíteros» sería más técnico y menos transparente para el lector general.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» comunica de manera natural la posición espacial y ceremonial del griego en ambos lugares del versículo.
- source_word: τοῦ καθημένου ἐπὶ τοῦ θρόνου
  english_pob_choice: the one seated on the throne
  chosen_spanish: del que está sentado sobre el trono
  alternatives_spanish:
  - del que se sienta sobre el trono
  - del que está sentado en el trono
  lexicon: BDAG
  rationale: 'La forma participial sustantivada se vierte de manera reverente y clara con una relativa: «el que está sentado sobre el trono». «Sobre» reproduce bien ἐπί con θρόνος en esta escena visionaria.'
- source_word: προσκυνήσουσιν
  english_pob_choice: will worship
  chosen_spanish: adorarán
  alternatives_spanish:
  - se postrarán ante
  - rendirán culto a
  lexicon: BDAG
  rationale: En un marco celestial y dirigido al entronizado, el verbo implica adoración religiosa. «Adorarán» expresa mejor el valor cultual que una mera inclinación corporal.
- source_word: τῷ ζῶντι
  english_pob_choice: the one who lives
  chosen_spanish: al que vive
  alternatives_spanish:
  - al que está vivo
  - al Viviente
  lexicon: BDAG
  rationale: 'La expresión participial se traduce con naturalidad y sin añadir identificación doctrinal explícita: «al que vive». Mantiene el carácter descriptivo del griego.'
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por siempre jamás
  - por los siglos eternos
  lexicon: BDAG
  rationale: La fórmula idiomática se reproduce con la equivalencia española tradicional y fiel. Es la manera más natural de conservar el sentido de duración interminable.
- source_word: βαλοῦσιν
  english_pob_choice: will cast
  chosen_spanish: arrojarán
  alternatives_spanish:
  - echarán
  - tirarán
  lexicon: BDAG
  rationale: «Arrojarán» conserva la viveza del gesto de lanzar las coronas delante del trono. Evita suavizar el movimiento fuerte del verbo βάλλω.
- source_word: στεφάνους
  english_pob_choice: crowns
  chosen_spanish: coronas
  alternatives_spanish:
  - guirnaldas de victoria
  - coronas de victoria
  lexicon: BDAG
  rationale: «Coronas» es la opción natural y clara en español, y mantiene la posible ambigüedad entre corona y guirnalda de honor/victoria. El contexto permite esa amplitud.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: «Diciendo» funciona como introducción directa al discurso subsiguiente, sin añadir una conjunción innecesaria.
theological_decisions:
- issue: Identidad del entronizado y del que vive
  english_pob_reading: 'Render with reverential but non-interpretive language: ''the one seated on the throne'' and ''the one who lives forever and ever.'''
  chosen_spanish_reading: 'Traducir con lenguaje reverente pero descriptivo: «el que está sentado sobre el trono» y «el que vive por los siglos de los siglos».'
  alternative_spanish_readings:
  - identificar explícitamente a Dios Padre
  - usar «el Viviente» como título
  rationale: El griego presenta títulos descriptivos, no una identificación doctrinal explícita dentro del versículo. La traducción conserva esa sobriedad y deja la identificación teológica al contexto sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica sin sobre-interpretar el texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y el griego SBLGNT; no se detectaron revisiones aplicadas en el registro base, así que se mantiene la lectura principal sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa «ancianos» para πρεσβύτεροι de manera consistente con un registro eclesial comprensible.
  - Se mantiene «trono» para θρόνος y «coronas» para στεφάνους, con la nota que preserva la posibilidad de guirnalda de victoria.
  - La fórmula temporal se normaliza al español bíblico natural «por los siglos de los siglos», alineada con el valor idiomático del griego.
  - No se introduce «SEÑOR» ni una identificación doctrinal añadida para el entronizado; se conserva la descripción del texto.
