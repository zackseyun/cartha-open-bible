review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego y la mayoría de las decisiones del POB en inglés: «ancianos» para πρεσβύτεροι, «adorarán» para προσκυνήσουσιν, y la formulación descriptiva del entronizado y del viviente se preservan adecuadamente. Sin embargo, la nota [a] desplaza indebidamente la opción principal inglesa «will fall down» hacia «se postrarán» como texto base y deja «caerán» solo como alternativa. El matiz fuente enfatiza la acción física de caer en adoración; en español puede conservarse con naturalidad como «caerán rostro en tierra» o «caerán delante de».'
