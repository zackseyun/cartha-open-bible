  text: πεσοῦνται οἱ εἴκοσι τέσσαρες πρεσβύτεροι ἐνώπιον τοῦ καθημένου ἐπὶ τοῦ θρόνου, καὶ προσκυνήσουσιν τῷ ζῶντι εἰς τοὺς αἰῶνας τῶν αἰώνων, καὶ βαλοῦσιν τοὺς στεφάνους αὐτῶν ἐνώπιον τοῦ θρόνου, λέγοντες·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/004/010.yaml
  text: 'the twenty-four elders will fall down before the one seated on the throne[a], and they will worship the one who lives forever and ever, and they will cast their crowns before the throne[b], saying:'
