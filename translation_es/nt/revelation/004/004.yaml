translation:
  language: es
  text: Y alrededor del trono había veinticuatro tronos, y sobre los tronos, veinticuatro ancianos sentados, vestidos con ropas blancas, y sobre sus cabezas, coronas[a] de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «coronas de victoria»; el griego puede denotar una corona otorgada por honor o victoria, no solo una diadema real.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυκλόθεν
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - rodeando
  - en torno de
  lexicon: BDAG
  rationale: Adverbio de relación espacial que expresa una disposición circular. «Alrededor de» es natural en español y conserva la imagen visual sin forzar el orden de la frase.
- source_word: θρόνοι
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - asientos
  lexicon: BDAG
  rationale: Se mantiene el mismo sustantivo que se usa para el trono central, preservando la repetición léxica y la imaginería regia/judicial del texto griego.
- source_word: εἴκοσι τέσσαρες
  english_pob_choice: twenty-four
  chosen_spanish: veinticuatro
  alternatives_spanish:
  - veinte y cuatro
  lexicon: BDAG
  rationale: Número cardinal estándar en español; «veinticuatro» es la forma moderna y más fluida.
- source_word: ἐπὶ τοὺς θρόνους
  english_pob_choice: on the thrones
  chosen_spanish: sobre los tronos
  alternatives_spanish:
  - en los tronos
  - encima de los tronos
  lexicon: BDAG
  rationale: Con ἐπί + acusativo en este contexto, la idea es de ubicación sobre o encima de algo. «Sobre» conserva la relación espacial con naturalidad en español.
- source_word: πρεσβυτέρους
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - ancianos mayores
  lexicon: BDAG
  rationale: El término designa aquí un grupo/título del Apocalipsis. «Ancianos» mantiene el sentido básico del griego sin añadir una terminología eclesiástica técnica no presente en el texto.
- source_word: καθημένους
  english_pob_choice: were seated
  chosen_spanish: sentados
  alternatives_spanish:
  - estando sentados
  - que estaban sentados
  lexicon: BDAG
  rationale: El participio describe postura y estado. «Sentados» da una traducción natural y concisa en español dentro del cuadro visionario.
- source_word: περιβεβλημένους
  english_pob_choice: clothed
  chosen_spanish: vestidos
  alternatives_spanish:
  - cubiertos
  - ataviados
  lexicon: BDAG
  rationale: Participio perfecto que indica estado de estar revestido. «Vestidos» preserva el tono elevado y funciona bien con el complemento siguiente.
- source_word: ἐν ἱματίοις λευκοῖς
  english_pob_choice: in white garments
  chosen_spanish: de ropas blancas
  alternatives_spanish:
  - con vestiduras blancas
  - con ropas blancas
  lexicon: BDAG
  rationale: Ἱμάτια puede referirse a prendas/vestiduras de manera amplia. «Ropas blancas» evita sobredeterminar el tipo de prenda y mantiene la claridad en español.
- source_word: στεφάνους
  english_pob_choice: crowns
  chosen_spanish: coronas
  alternatives_spanish:
  - guirnaldas
  - coronas de victoria
  lexicon: BDAG
  rationale: Στέφανος puede denotar corona o corona de victoria/ honor. «Coronas» es la equivalencia más clara en español, mientras la posibilidad de victoria u honor queda preservada en la nota.
- source_word: χρυσοῦς
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - doradas
  - de oro puro
  lexicon: BDAG
  rationale: El adjetivo griego se expresa naturalmente como posesión/material en español. «De oro» es preciso y evita una tonalidad excesivamente ornamental.
theological_decisions:
- issue: Identidad de los veinticuatro tronos que rodean el trono
  english_pob_reading: Rendered as 'thrones' rather than 'seats' to preserve the exalted royal/judicial imagery without deciding the identity of the elders.
  chosen_spanish_reading: Se conserva «tronos» en lugar de suavizarlo a «asientos», manteniendo la imaginería regia/judicial y sin resolver la identidad de esos tronos.
  alternative_spanish_readings:
  - asientos
  - sitios
  rationale: El griego repite θρόνος para el trono central y los veinticuatro cercanos; traducirlo por «tronos» preserva el enlace léxico. No se introduce una interpretación que rebaje o explique la escena más allá del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Identidad de los veinticuatro ancianos
  english_pob_reading: Left as 'elders' without interpretive expansion.
  chosen_spanish_reading: Se deja simplemente «ancianos», sin ampliación interpretativa.
  alternative_spanish_readings:
  - presbíteros
  - representantes de la iglesia
  - ángeles
  rationale: El versículo nombra el grupo pero no explica quiénes son. «Ancianos» respeta la designación textual y evita importar una lectura doctrinal que el pasaje no explicita.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de las coronas de oro
  english_pob_reading: Or 'victory wreaths'; the Greek word can denote a crown awarded for honor or victory, not only a royal diadem.
  chosen_spanish_reading: «Coronas» con nota sobre la posibilidad de «coronas de victoria» o de honor.
  alternative_spanish_readings:
  - guirnaldas
  - coronas de victoria
  - coronas honoríficas
  rationale: στέφανος no se limita a una corona real; puede ser una corona de honor o victoria. El texto principal usa la opción más comprensible, y la nota conserva la tensión semántica documentada por el audit trail.
  doctrine_reference: BDAG; lexical note in English POB
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y el audit trail inglés de POB sin cambios de revisión aplicados; la versión inglesa más reciente permanece sin modificaciones y con alto grado de acuerdo.
  spanish_consistency_notes:
  - Se conserva «tronos» para θρόνοι, manteniendo la repetición del griego con el trono central.
  - Se usa «ancianos» para πρεσβυτέρους, siguiendo el valor textual y evitando especificación eclesiástica ajena al versículo.
  - «Ropas blancas» traduce ἱμάτια λευκά de forma clara y amplia, sin forzar «vestiduras» si el contexto español prefiere mayor naturalidad.
  - Las «coronas de oro» se mantienen en el cuerpo principal, con nota para la alternativa de honor/victoria que el griego permite.
