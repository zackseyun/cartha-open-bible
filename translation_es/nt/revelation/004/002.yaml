translation:
  language: es
  text: De inmediato estuve en el Espíritu[a], y he aquí, un trono estaba puesto en el cielo, y uno sentado en el trono,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en espíritu». La frase griega no lleva artículo y puede indicar tanto estar en el Espíritu Santo como hallarse en un estado espiritual o visionario.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθέως
  english_pob_choice: Immediately
  chosen_spanish: De inmediato
  alternatives_spanish:
  - Inmediatamente
  - Al instante
  lexicon: BDAG
  rationale: Adverbio de prontitud que marca el paso súbito a la visión. «De inmediato» conserva esa rapidez con un tono natural en español contemporáneo y digno.
- source_word: ἐγενόμην
  english_pob_choice: I was
  chosen_spanish: yo estaba
  alternatives_spanish:
  - llegué a estar
  - me hallé
  lexicon: BDAG
  rationale: El aoristo medio de γίνομαι puede expresar entrada en un estado. En este contexto visionario, «yo estaba» comunica el estado resultante sin sobrecargar el verbo con una paráfrasis demasiado explícita.
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  - en el Espíritu Santo
  lexicon: BDAG
  rationale: La frase anártica admite una lectura visionaria/espiritual y, en el contexto de Apocalipsis, probablemente alude a una experiencia profética vinculada al Espíritu. Se conserva «Espíritu» con mayúscula, manteniendo la tensión interpretativa sin resolverla de forma demasiado cerrada.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: 'vi:'
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: BDAG
  rationale: La partícula introduce la escena visionaria y llama la atención del lector. En español, «vi:» integra de forma natural el cambio de enfoque narrativo y evita un calco forzado.
- source_word: θρόνος
  english_pob_choice: a throne
  chosen_spanish: un trono
  alternatives_spanish:
  - trono
  lexicon: BDAG
  rationale: Sustantivo anarthro que introduce un elemento nuevo en la visión; el artículo indefinido español expresa bien esa introducción.
- source_word: ἔκειτο
  english_pob_choice: stood
  chosen_spanish: había
  alternatives_spanish:
  - estaba colocado
  - estaba
  lexicon: BDAG
  rationale: El imperfecto de κεῖμαι denota estar situado o dispuesto. Para un trono, «había» en español suena más natural que un calco literal y conserva la presencia estable del objeto en la visión.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo de Dios
  - en los cielos
  lexicon: BDAG
  rationale: En español bíblico «en el cielo» comunica el ámbito celestial/apocalíptico sin introducir una expresión arcaizante o ambigua. Se evita «cielo» como mero firmamento atmosférico por el contexto.
- source_word: καθήμενος
  english_pob_choice: one seated
  chosen_spanish: uno sentado
  alternatives_spanish:
  - el que estaba sentado
  - uno que estaba sentado
  lexicon: BDAG
  rationale: Participio sustantivado que alude al ocupante del trono sin nombrarlo explícitamente. «Uno sentado» preserva la sobriedad y la indefinición del griego, aunque el español demande la expansión mínima del artículo.
theological_decisions:
- issue: 'Valor de ἐν πνεύματι: referencia al Espíritu Santo o estado visionario'
  english_pob_reading: in the Spirit
  chosen_spanish_reading: en el Espíritu
  alternative_spanish_readings:
  - en espíritu
  rationale: Se mantiene la mayúscula para reflejar la lectura probable dentro de Apocalipsis, pero sin negar que el griego carece de artículo y permite una comprensión más general como estado visionario. La nota preserva esa tensión interpretativa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Identidad del ocupante del trono
  english_pob_reading: one seated on the throne
  chosen_spanish_reading: uno sentado en el trono
  alternative_spanish_readings:
  - el que estaba sentado en el trono
  - alguien sentado en el trono
  rationale: El participio griego es deliberadamente indirecto; el texto aún no identifica explícitamente a la figura. Se conserva la indefinición de forma respetuosa para no adelantar una identificación teológica que el versículo no da todavía.
  doctrine_reference: Apocalipsis 4:2; lectura narrativa del texto inmediato
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado del audit trail inglés, que prefirió «I was in the Spirit» frente a «I came to be in the Spirit». Por eso se optó por una forma española estable y natural («yo estaba en el Espíritu») en vez de un giro más literal pero menos idiomático. También se preservó la estructura final con el participio sustantivado («uno sentado en el trono») para no cerrar prematuramente la identificación del personaje.
  spanish_consistency_notes:
  - Se usó «Espíritu» con mayúscula para seguir la decisión POB de mantener abierta la posibilidad pneumatológica, sin eliminar la lectura alternativa indicada en la nota.
  - Se tradujo θρόνος como «trono» y no con equivalentes más interpretativos; el término es estable en la serie apocalíptica.
  - Se eligió «cielo» como equivalente natural de οὐρανός en contexto apocalíptico, evitando calcos como «el cielo»/«los cielos» según el español de registro.
  - Se conservó la puntuación en dos miembros visionarios separados por coma y dos puntos, reflejando el flujo del griego sin sobreexplicar la escena.
