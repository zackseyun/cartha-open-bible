translation:
  language: es
  text: Y el primer ser viviente era como un león, y el segundo ser viviente como un buey, y el tercer ser viviente tenía un rostro como el de un hombre[a], y el cuarto ser viviente era como un águila volando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un rostro humano». El griego literalmente dice «un rostro como el de un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ζῷον
  english_pob_choice: living creature
  chosen_spanish: ser viviente
  alternatives_spanish:
  - criatura viviente
  - animal
  - bestia
  lexicon: BDAG
  rationale: ζῷον en este contexto apocalíptico no debe confundirse con θηρίον (“bestia”) de sentido hostil. “Ser viviente” conserva la idea de un ser animado y distingue correctamente estas figuras de las bestias de Apocalipsis.
- source_word: ὅμοιον
  english_pob_choice: was like / like
  chosen_spanish: era como / como
  alternatives_spanish:
  - se parecía a
  - similar a
  lexicon: BDAG
  rationale: El griego expresa semejanza, no identidad. En español, “era como” y “como” comunican bien esa comparación sin sobrecargar el estilo.
- source_word: λέοντι
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - leona
  - felino
  lexicon: BDAG
  rationale: Término zoológico directo; la forma masculina singular es la equivalencia natural de λέοντι.
- source_word: μόσχῳ
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro joven
  - becerro
  - calf
  lexicon: BDAG
  rationale: Aunque μόσχος puede abarcar un bovino joven, en este cuadro visionario “buey” es una equivalencia española más amplia y natural que evita restringir indebidamente la imagen a “becerro”. Mantiene la fuerza visual del término sin introducir una connotación sacrificial no explícita en el texto.
- source_word: ἔχων
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - having
  - con
  lexicon: BDAG
  rationale: El participio se vuelve verbo finito para que la frase fluya en español. “Tenía” preserva la descripción posesiva/posesiva-visual del rasgo del tercer ser viviente.
- source_word: τὸ πρόσωπον ὡς ἀνθρώπου
  english_pob_choice: a face like a man
  chosen_spanish: un rostro como de hombre
  alternatives_spanish:
  - un rostro humano
  - el rostro de un hombre
  - un rostro como el de un ser humano
  lexicon: BDAG
  rationale: Se conserva la comparación literal introducida por ὡς. “Rostro” funciona bien para πρόσωπον y “como de hombre” preserva el valor representativo de ἀνθρώπου sin borrar la tensión lexical entre una lectura más literal y una más naturalizada.
- source_word: ἀετῷ πετομένῳ
  english_pob_choice: flying eagle
  chosen_spanish: águila en vuelo
  alternatives_spanish:
  - águila volando
  - águila que vuela
  lexicon: BDAG
  rationale: πέτομαι describe el ave en acción o estado de vuelo. “En vuelo” es una forma idiomática y sobria en español que refleja el participio sin sonar forzada.
theological_decisions:
- issue: Cómo traducir ζῷον sin confundirlo con “bestia” apocalíptica
  english_pob_reading: living creature
  chosen_spanish_reading: ser viviente
  alternative_spanish_readings:
  - criatura viviente
  - animal
  - bestia
  rationale: En Apocalipsis, estas figuras del trono no son las bestias enemigas posteriores. “Ser viviente” mantiene la distinción teológica y literaria que la POB ya documenta en inglés.
  doctrine_reference: Apocalipsis 4:7; Apocalipsis 13 (distinción de vocabulario apocalíptico)
- issue: La expresión ἀνθρώπου en el tercer ser viviente
  english_pob_reading: a face like a man
  chosen_spanish_reading: un rostro como de hombre
  alternative_spanish_readings:
  - un rostro humano
  - el rostro de un hombre
  - un rostro como el de un ser humano
  rationale: La traducción conserva la forma comparativa del griego y no suaviza la referencia masculina/representativa. Se deja visible la tensión entre literalidad y claridad, sin imponer una paráfrasis que borre el dato textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de μόσχῳ en esta visión
  english_pob_reading: ox
  chosen_spanish_reading: buey
  alternative_spanish_readings:
  - toro joven
  - becerro
  - novillo
  rationale: Aunque la revisión inglesa prefirió “ox” por precisión contextual, en español “buey” comunica mejor el bovino adulto de trabajo o majestad iconográfica asociado a esta imagen, sin limitarla a un animal demasiado joven. Se mantiene la comparación animal sin doctrinalizarla.
  doctrine_reference: Apocalipsis 4:7; revisión auditada del inglés
translation_notes:
  revision_awareness: La revisión inglesa auditada cambió “calf” por “ox” para μόσχῳ y “an eagle in flight” por “a flying eagle”. En español se reflejó esa revisión con “buey” y “águila en vuelo”, evitando tanto una reducción a “becerro” como una formulación demasiado interpretativa. También se mantuvo la comparación literal de ἀνθρώπου mediante “como de hombre”, con nota alternativa para una equivalencia más natural.
  spanish_consistency_notes:
  - Se evitó “bestia” para ζῷον para no mezclar este grupo con la terminología hostil de Apocalipsis.
  - Se prefirió “ser viviente” de manera consistente con el uso POB de diferenciar estas criaturas del trono.
  - Se mantuvo “como” para ὅμοιον en todas las cláusulas, preservando la estructura repetitiva del griego.
  - “Rostro” se usó para πρόσωπον por claridad y coherencia con el campo semántico facial.
  - “Águila en vuelo” refleja el participio presente sin añadir información ajena al texto.
