    reason: lexical_alternative
  - marker: b
    text: La expresión «la primera voz» probablemente retoma la voz que Juan oyó antes (véase Apocalipsis 1:10).
    reason: cross_reference
  - marker: c
    text: O «hablándome». El griego dice más literalmente «hablando conmigo».
    reason: lexical_alternative
  revision_rationale: Se ajusta «y vi» a «y he aquí» para reflejar mejor ἰδοὺ como marcador de atención repentina, no como segundo verbo de visión. Se cambia «una puerta abierta» por «una puerta que estaba abierta» para expresar con más claridad el estado resultante del participio perfecto pasivo. También se normaliza «Sube aquí» como opción más neutral panhispánica y se limpia la redacción de la nota c.
