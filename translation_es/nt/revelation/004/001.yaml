translation:
  language: es
  text: 'Después de estas cosas, miré[a], y he aquí una puerta que estaba abierta en el cielo, y la primera voz[b] que había oído, como de trompeta[c] hablando conmigo, dijo: «Sube aquí, y te mostraré lo que debe suceder después de estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Después de esto ... lo que debe suceder después de esto». El griego repite la frase plural «después de estas cosas» al comienzo y al final del versículo.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «la primera voz» probablemente retoma la voz que Juan oyó antes (véase Apocalipsis 1:10).
    reason: cross_reference
  - marker: c
    text: O «hablándome». El griego dice más literalmente «hablando conmigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de esto
  - Luego de estas cosas
  lexicon: BDAG
  rationale: Conserva el plural del griego y también la repetición final de la frase. En español, "después de estas cosas" suena natural y mantiene la secuencia temporal sin suavizarla a una forma más general.
- source_word: εἶδον
  english_pob_choice: I looked
  chosen_spanish: miré
  alternatives_spanish:
  - vi
  lexicon: BDAG
  rationale: El contexto visionario favorece un verbo de atención visual. "Miré" preserva mejor el acto de observar la escena que un simple "vi", aunque ambos son posibles en español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: y vi
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: BDAG
  rationale: En español, "he aquí" puede sonar más arcaico; aquí la secuencia narrativa queda bien con una coordinación natural, aunque se conserva la fuerza de atención repentina en la aparición de la puerta.
- source_word: θύρα ἠνεῳγμένη
  english_pob_choice: a door standing open
  chosen_spanish: una puerta abierta
  alternatives_spanish:
  - una puerta que estaba abierta
  - una puerta ya abierta
  lexicon: BDAG
  rationale: El participio perfecto pasivo marca un estado resultante. En español, "abierta" comunica de forma natural que la puerta está en condición abierta sin sobrecargar la frase.
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en el cielo
  lexicon: BDAG
  rationale: En Apocalipsis, el término apunta al ámbito celestial. "Cielo" es la opción más natural y ampliamente inteligible en español, y conserva el sentido del escenario visionario.
- source_word: ἡ φωνὴ ἡ πρώτη
  english_pob_choice: the first voice
  chosen_spanish: la primera voz
  alternatives_spanish:
  - la voz primera
  - la voz que oí primero
  lexicon: BDAG
  rationale: Mantiene el valor adjetival de πρώτη y deja abierta la referencia retrospectiva a la voz ya mencionada sin explicitarla de más.
- source_word: ἣν ἤκουσα
  english_pob_choice: that I had heard
  chosen_spanish: que había oído
  alternatives_spanish:
  - que oí
  - que había escuchado
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja que la audición precede al diálogo presente. "Oído" conserva un registro algo más sobrio y cercano al paralelismo del original.
- source_word: ὡς σάλπιγγος
  english_pob_choice: like a trumpet
  chosen_spanish: como de trompeta
  alternatives_spanish:
  - como una trompeta
  - cual trompeta
  lexicon: BDAG
  rationale: El griego expresa comparación. "Como de trompeta" conserva la relación comparativa con un matiz sonoro, sin identificar la voz con una trompeta literal.
- source_word: λαλούσης μετ’ ἐμοῦ
  english_pob_choice: speaking with me
  chosen_spanish: hablando conmigo
  alternatives_spanish:
  - hablando con él
  - hablándome
  lexicon: BDAG
  rationale: '"Conmigo" refleja de manera natural el μετά con genitivo y preserva la cercanía relacional del enunciado. En español, suena más idiomático que un calco rígido.'
- source_word: λέγων
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: BDAG
  rationale: La partícula participial introduciendo discurso directo se vierte de forma natural con un verbo finito en español.
- source_word: Ἀνάβα ὧδε
  english_pob_choice: Come up here
  chosen_spanish: Sube acá
  alternatives_spanish:
  - Sube aquí
  - Ven acá
  lexicon: BDAG
  rationale: El imperativo apunta hacia el lugar del hablante. "Sube acá" conserva la perspectiva deíctica y es una orden natural en español bíblico contemporáneo.
- source_word: δείξω σοι
  english_pob_choice: I will show you
  chosen_spanish: te mostraré
  alternatives_spanish:
  - te enseñaré
  - te haré ver
  lexicon: BDAG
  rationale: Expresa una promesa futura directa y clara. "Mostraré" es el equivalente más inmediato y respeta la simplicidad del verbo griego.
- source_word: ἃ δεῖ γενέσθαι
  english_pob_choice: what must take place
  chosen_spanish: lo que debe suceder
  alternatives_spanish:
  - lo que tiene que ocurrir
  - lo que ha de suceder
  - las cosas que deben pasar
  lexicon: BDAG
  rationale: '"Debe suceder" conserva la necesidad expresada por δεῖ y mantiene el carácter eventivo de γενέσθαι. "Suceder" funciona bien en español para un acontecer futuro sin exagerar la interpretación.'
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de esto
  - luego de estas cosas
  lexicon: BDAG
  rationale: La repetición final se mantiene explícitamente, como en el griego, para no borrar el recurso temporal del texto.
theological_decisions:
- issue: Repetición de μετὰ ταῦτα al inicio y al final
  english_pob_reading: Rendered both occurrences as temporal sequence within the vision, preserving the repetition.
  chosen_spanish_reading: 'Se conservan ambas ocurrencias como secuencia temporal: "Después de estas cosas" ... "después de estas cosas".'
  alternative_spanish_readings:
  - '"Después de esto" ... "después de esto"'
  - omitir la repetición final en español
  rationale: El griego repite la frase y esa repetición puede marcar la progresión de la visión sin fijar de antemano un esquema escatológico concreto. Mantenerla en español preserva esa tensión interpretativa.
  doctrine_reference: Preservar la tensión textual sin resolverla doctrinalmente.
- issue: Referencia de "la primera voz"
  english_pob_reading: The first voice likely refers back to the voice John heard earlier (see Rev 1:10).
  chosen_spanish_reading: '"La primera voz" se deja sin expansión interpretativa en el cuerpo del texto, pero el sentido retrospectivo queda disponible.'
  alternative_spanish_readings:
  - '"la voz que oí primero"'
  - '"la voz anterior"'
  rationale: El original puede aludir a la voz ya oída sin requerir identificación explícita en la traducción. En español, mantener la expresión breve evita imponer una aclaración no dicha por el versículo.
  doctrine_reference: Referencia narrativa interna; ver Apocalipsis 1:10.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado de la POB en inglés: se conservó la repetición de "después de estas cosas", se reflejó la estructura visionaria con una voz previa, y se mantuvo la comparación "como de trompeta" con el verbo de habla unido a la voz. También se respetó la revisión que separa más claramente el complemento comparativo de la voz.'
  spanish_consistency_notes:
  - Se usó "Dios/cielo" y no se introdujo terminología eclesiástica ajena al texto.
  - '"Acá" se eligió para conservar el movimiento hacia el hablante celestial.'
  - No se empleó "SEÑOR" ni "Cristo" porque este versículo no contiene esas expresiones.
  - La puntuación con comillas angulares y coma antes de la cita refleja un estilo bíblico claro y moderno en español.
