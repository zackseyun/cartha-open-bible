source:
  edition: SBLGNT
  text: Μετὰ ταῦτα εἶδον, καὶ ἰδοὺ θύρα ἠνεῳγμένη ἐν τῷ οὐρανῷ, καὶ ἡ φωνὴ ἡ πρώτη ἣν ἤκουσα ὡς σάλπιγγος λαλούσης μετ’ ἐμοῦ, λέγων· Ἀνάβα ὧδε, καὶ δείξω σοι ἃ δεῖ γενέσθαι. μετὰ ταῦτα
base_translation:
  language: en
  yaml_path: translation/nt/revelation/004/001.yaml
  text: After these things I looked[a], and behold, a door standing open in heaven, and the first voice that I had heard, like a trumpet speaking with me, said, “Come up here[c][b], and I will show you what must take place after these things.”
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'After this ... what must take place after this.' The Greek repeats the plural phrase 'after these things' at both the beginning and end of the verse.
    reason: lexical_alternative
  - marker: b
    text: The expression 'the first voice' likely refers back to the voice John heard earlier (see Rev 1:10).
    reason: cross_reference
  - marker: c
    text: Or 'speaking to me.' The Greek more literally says 'speaking with me.'
    reason: lexical_alternative
