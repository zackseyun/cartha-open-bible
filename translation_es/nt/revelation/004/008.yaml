base_translation:
  language: en
  yaml_path: translation/nt/revelation/004/008.yaml
  text: 'And the four living creatures[a], each one of them having six wings, are full of eyes all around and within; and they have no rest day and night, saying: “Holy, holy, holy is the Lord God, the Almighty, who was and who is and who is to come.”'
