translation:
  language: es
  text: 'Y los cuatro seres vivientes, cada uno de ellos con seis alas, están llenos de ojos alrededor y por dentro; y no tienen descanso día y noche, diciendo: «Santo, santo, santo es el Señor Dios, el Todopoderoso, el que era y el que es y el que ha de venir[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el que era, y que es, y que ha de venir».
    reason: alternative_reading
lexical_decisions:
- source_word: ζῷα
  english_pob_choice: living creatures
  chosen_spanish: seres vivientes
  alternatives_spanish:
  - criaturas vivientes
  - seres vivos
  lexicon: BDAG
  rationale: En Apocalipsis, ζῷα designa seres celestiales vivientes, no 'animales' en sentido moderno. 'Seres vivientes' conserva el carácter visionario y evita una lectura zoológica inadecuada.
- source_word: ἓν καθ’ ἓν αὐτῶν
  english_pob_choice: each one of them
  chosen_spanish: cada uno de ellos
  alternatives_spanish:
  - uno por uno
  - cada uno
  lexicon: BDAG
  rationale: La expresión distributiva enfatiza a cada criatura individualmente. 'Cada uno de ellos' es natural en español y preserva esa distribución.
- source_word: ἔχων ἀνὰ πτέρυγας ἕξ
  english_pob_choice: having six wings
  chosen_spanish: con seis alas
  alternatives_spanish:
  - teniendo seis alas
  - que tenían seis alas
  - cada uno con seis alas
  lexicon: BDAG
  rationale: La frase participial modifica al sujeto distributivo y afirma que cada ser posee seis alas. 'Con seis alas' es más fluido en español y no altera el sentido.
- source_word: κυκλόθεν καὶ ἔσωθεν
  english_pob_choice: all around and within
  chosen_spanish: alrededor y por dentro
  alternatives_spanish:
  - en derredor y dentro
  - por fuera y por dentro
  lexicon: BDAG
  rationale: Los adverbios expresan cobertura completa de ojos en ambas dimensiones, externa e interna. 'Alrededor y por dentro' reproduce ambas ideas de forma clara y natural.
- source_word: γέμουσιν ὀφθαλμῶν
  english_pob_choice: are full of eyes
  chosen_spanish: están llenos de ojos
  alternatives_spanish:
  - están cubiertos de ojos
  - están repletos de ojos
  lexicon: BDAG
  rationale: γέμω con genitivo significa 'estar lleno de'. 'Están llenos de ojos' es la equivalencia más directa y mantiene la imagen apocalíptica.
- source_word: ἀνάπαυσιν οὐκ ἔχουσιν
  english_pob_choice: they have no rest
  chosen_spanish: no tienen descanso
  alternatives_spanish:
  - no cesan
  - no tienen reposo
  lexicon: BDAG
  rationale: ἀνάπαυσις denota descanso o reposo. 'No tienen descanso' es literal y natural en español, sin añadir matices no explícitos.
- source_word: ἡμέρας καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - por día y por noche
  lexicon: BDAG
  rationale: La expresión funciona adverbialmente para indicar continuidad. 'Día y noche' es la equivalencia idiomática más estándar y concisa.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - clamando
  - proclamando
  lexicon: BDAG
  rationale: El participio introduce el contenido de su alabanza continua. 'Diciendo' es neutral y sigue de cerca la forma griega sin intensificarla indebidamente.
- source_word: Ἅγιος ἅγιος ἅγιος
  english_pob_choice: Holy, holy, holy
  chosen_spanish: Santo, santo, santo
  alternatives_spanish:
  - Santo, santo, santo sea
  - Santo, santo, santo eres
  lexicon: BDAG
  rationale: Debe conservarse la triple repetición, tanto por su fuerza retórica como por su peso litúrgico. 'Santo' es la traducción directa y reconocible.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título divino en la doxología. 'El Señor' es la equivalencia estándar y reverente en español.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: En esta construcción, el artículo no requiere reproducirse de manera pesada en español. 'Dios' conserva la designación divina con naturalidad.
- source_word: ὁ παντοκράτωρ
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano de todo
  lexicon: BDAG
  rationale: παντοκράτωρ es un título divino de poder universal. 'El Todopoderoso' es la forma tradicional y natural en español, equivalente a 'the Almighty'.
- source_word: ὁ ἦν καὶ ὁ ὢν καὶ ὁ ἐρχόμενος
  english_pob_choice: who was and who is and who is to come
  chosen_spanish: el que era y el que es y el que ha de venir
  alternatives_spanish:
  - el que fue y el que es y el que viene
  - el que era y el que es y el que está por venir
  lexicon: BDAG
  rationale: La fórmula temporal se preserva como expresión recurrente de identidad divina. 'El que ha de venir' refleja de manera idiomática y fiel el sentido prospectivo de ὁ ἐρχόμενος, manteniendo la tensión escatológica sin mecanicismo.
theological_decisions:
- issue: La fórmula divina temporal ὁ ἦν καὶ ὁ ὢν καὶ ὁ ἐρχόμενος
  english_pob_reading: who was and who is and who is to come
  chosen_spanish_reading: el que era y el que es y el que ha de venir
  alternative_spanish_readings:
  - el que era y el que es y el que viene
  - el que fue y el que es y el que viene
  rationale: El griego conserva el participio presente ὁ ἐρχόμενος, pero en español la fórmula más natural y tradicionalmente reconocible para esta doxología es 'el que ha de venir'. Mantiene la dimensión futura/escatológica sin perder la referencia verbal del original.
  doctrine_reference: 'Translation philosophy: original-language primacy with idiomatic Spanish that preserves theological tension; do not flatten recurring apocalyptic formulas.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'who is coming' por 'who is to come' para reflejar de modo más idiomático ὁ ἐρχόμενος. En español, se siguió esa misma línea de revisión, usando una fórmula litúrgicamente reconocible y fiel al sentido prospectivo del participio.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' por norma solo cuando el texto lo exija; aquí el griego usa κύριος en una doxología, por lo que se traduce 'el Señor'.
  - '''Seres vivientes'' mantiene el término técnico de Apocalipsis para ζῷα y evita ''animales''.'
  - '''Todopoderoso'' se usa para παντοκράτωρ como equivalente establecido y reverente.'
  - La triple repetición de 'Santo' se preserva sin armonizarla ni suavizarla.
  - El marcador [a] aparece solo en el texto anclado a la alternativa de la fórmula divina temporal.
