  glossary_alignment: 'Buena alineación con la terminología del proyecto: ζῷα -> ''seres vivientes''; θεός -> ''Dios''; παντοκράτωρ -> ''el Todopoderoso''. No aparece YHWH explícito en el griego, así que ''Señor Dios'' para κύριος ὁ θεός es aceptable aquí como título divino litúrgico. La decisión ''el que ha de venir'' concuerda con la revisión auditada del POB inglés y con el registro litúrgico español.'
