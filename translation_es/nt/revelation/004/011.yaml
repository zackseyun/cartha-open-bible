review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido general del griego: la dignidad de Dios, los tres sustantivos doxológicos, la causalidad de ὅτι, la creación de τὰ πάντα y la distinción entre ἦσαν y ἐκτίσθησαν. Sin embargo, las notas al pie están intercambiadas respecto a sus anclajes: [a] en el texto marca «digno», pero la nota [a] correcta es la alternativa de orden «Digno eres tú»; [b] marca «todas las cosas», pero su nota actual reproduce erróneamente en inglés la alternativa de orden de la cláusula inicial. Además, el punto y coma antes de «y por tu voluntad» endurece innecesariamente la cadencia frente al original coordinado simple.'
  spanish_quality_summary: El español es claro, digno y eclesialmente natural. «Tú eres digno, nuestro Señor y Dios» suena bien; «la gloria, la honra y el poder» mantiene tono litúrgico aceptable. «Por tu voluntad existían y fueron creadas» es comprensible, aunque algo tenso estilísticamente; aun así, preserva la distinción verbal del griego y no requiere cambio forzoso. La corrección principal necesaria es en las notas y una puntuación más natural con coma en lugar de punto y coma.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: κύριος → «Señor», θεός → «Dios». No aparece Yahvé, Mesías/Cristo ni otros términos de glosario sensible. La decisión «honra» para τιμή es admisible en registro bíblico. «Por tu voluntad» sigue la revisión inglesa final, aunque el expediente léxico inglés también documenta el matiz causal.'
  issues:
  - severity: high
    issue: Las notas [a] y [b] no corresponden correctamente a los anclajes del texto.
    rationale: La nota [a] sí debe explicar la alternativa «Digno eres tú» anclada en «digno». Pero la nota [b], anclada en «todas las cosas», no puede contener la alternativa inglesa «Worthy are you, our Lord and God», que pertenece a la primera cláusula. Esto rompe la trazabilidad del audit trail y desinforma al lector.
  - severity: medium
    issue: La nota [b] está en inglés y además refleja la nota inglesa equivocada para ese punto del texto.
    rationale: Las notas del producto español deben estar en español. Aquí además se importó una alternativa de otra unidad léxica, no de ἔκτισας τὰ πάντα.
  - severity: low
    issue: El punto y coma antes de «y por tu voluntad» es más fuerte de lo necesario.
    rationale: El griego coordina simplemente con καί. En español una coma mantiene mejor la continuidad doxológica y causal del versículo.
