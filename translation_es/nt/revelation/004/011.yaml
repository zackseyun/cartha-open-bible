translation:
  language: es
  text: Tú eres digno[a], nuestro Señor y Dios, de recibir la gloria, la honra y el poder, porque tú creaste todas las cosas, y por tu voluntad existían y fueron creadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Digno eres tú». El griego coloca «digno» al inicio para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄξιος εἶ
  english_pob_choice: You are worthy
  chosen_spanish: Tú eres digno
  alternatives_spanish:
  - Digno eres tú
  lexicon: BDAG
  rationale: Ἄξιος con εἶ expresa dignidad o merecimiento. En español, «Tú eres digno» suena natural y conserva la afirmación directa del sujeto. Se evita invertir el orden salvo en nota, para no perder claridad ni introducir arcaísmo innecesario.
- source_word: ὁ κύριος καὶ ὁ θεὸς ἡμῶν
  english_pob_choice: our Lord and God
  chosen_spanish: nuestro Señor y Dios
  alternatives_spanish:
  - Señor nuestro y Dios
  - nuestro Señor y nuestro Dios
  lexicon: BDAG
  rationale: κύριος se traduce como «Señor» y θεός como «Dios», manteniendo el sentido de dirección reverente y la atribución de ambos títulos. El posesivo ἡμῶν queda natural como «nuestro» en español. «Señor» se conserva por ser el equivalente idiomático de κύριος en esta invocación.
- source_word: λαβεῖν τὴν δόξαν καὶ τὴν τιμὴν καὶ τὴν δύναμιν
  english_pob_choice: to receive the glory and the honor and the power
  chosen_spanish: de recibir la gloria, la honra y el poder
  alternatives_spanish:
  - de recibir la gloria, el honor y el poder
  - de tomar la gloria, la honra y el poder
  lexicon: BDAG
  rationale: El infinitivo λαβεῖν requiere una construcción natural con «de recibir». δόξα, τιμή y δύναμις forman una serie doxológica; se conserva la tríada con artículos implícitos en español por fluidez. «Honra» comunica bien τιμή en registro bíblico y solemne; «honor» queda como alternativa válida.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: ὅτι introduce la razón de la dignidad de Dios. «Porque» expresa con claridad la relación causal sin añadir matiz inferencial fuerte. Se evita «para que» o formulaciones menos precisas.
- source_word: ἔκτισας τὰ πάντα
  english_pob_choice: you created all things
  chosen_spanish: tú creaste todas las cosas
  alternatives_spanish:
  - creaste todo
  - tú creaste todas las cosas
  lexicon: BDAG
  rationale: κτίζω se traduce directamente como «crear». τὰ πάντα se vierte con amplitud como «todas las cosas», preservando el alcance total y el tono elevado del himno. Se mantiene el pronombre explícito para la fuerza enfática del griego.
- source_word: διὰ τὸ θέλημά σου
  english_pob_choice: by your will
  chosen_spanish: por tu voluntad
  alternatives_spanish:
  - por causa de tu voluntad
  - según tu voluntad
  lexicon: BDAG
  rationale: La revisión inglesa final favorece una lectura instrumental/causal breve. En español, «por tu voluntad» es la opción más natural y suficientemente abierta para reflejar διά con acusativo sin reducirla solo a instrumentality mecánica. «Por causa de tu voluntad» es más explicativa, pero menos ágil.
- source_word: ἦσαν καὶ ἐκτίσθησαν
  english_pob_choice: they existed and were created
  chosen_spanish: existían y fueron creadas
  alternatives_spanish:
  - eran y fueron creadas
  - existieron y fueron creadas
  - existían y fueron creadas
  lexicon: BDAG
  rationale: Se distingue el imperfecto ἦσαν del aoristo pasivo ἐκτίσθησαν. «Existían» conserva la idea de estado o continuación, y «fueron creadas» expresa el acto creador. Se elige el femenino plural por concordancia con «todas las cosas».
theological_decisions:
- issue: Tratamiento vocativo de «ὁ κύριος καὶ ὁ θεὸς ἡμῶν»
  english_pob_reading: our Lord and God
  chosen_spanish_reading: nuestro Señor y Dios
  alternative_spanish_readings:
  - Señor nuestro y Dios
  - nuestro Señor y nuestro Dios
  rationale: El griego funciona como una invocación directa en contexto de adoración. En español, la forma más natural y reverente es «nuestro Señor y Dios», que conserva la doble titulación sin sobrecargarla con fórmulas litúrgicas ajenas al texto.
  doctrine_reference: 'Contested terms: κύριος → Señor; Translation philosophy §§2, 6'
- issue: Relación de la voluntad divina con la existencia y la creación
  english_pob_reading: by your will they existed and were created
  chosen_spanish_reading: por tu voluntad existían y fueron creadas
  alternative_spanish_readings:
  - por tu voluntad existieron y fueron creadas
  - por causa de tu voluntad existían y fueron creadas
  rationale: La frase griega admite un matiz causal y, menos probablemente, instrumental. «Por tu voluntad» preserva esa ambigüedad controlada en español y mantiene la dependencia de todo lo creado respecto de Dios sin convertir el enunciado en una explicación filosófica más amplia de la que el texto exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó «because of your will» por «by your will» para reflejar con mayor naturalidad διὰ τὸ θέλημά σου. La draft española sigue esa preferencia con «por tu voluntad», manteniendo a la vez la ambigüedad causal/instrumental que el griego permite. También se preservó la tríada doxológica y la relación entre existencia continua y creación mediante dos verbos distintos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el tetragrámaton, así que corresponde «Señor».
  - Se mantiene «Señor» para κύριος y «Dios» para θεός, sin sustituirlos por una fórmula más eclesiástica.
  - Se eligió «honra» por registro bíblico, pero «honor» queda como alternativa documentada.
  - Se conserva la diferencia verbal entre «existían» y «fueron creadas» para no colapsar ἦσαν y ἐκτίσθησαν.
  - La nota a pie a señala la inversión enfática del griego, para no perder el orden retórico del original.
