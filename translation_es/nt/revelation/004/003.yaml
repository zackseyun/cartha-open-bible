translation:
  language: es
  text: Y el que estaba sentado allí era, en apariencia, como jaspe y sardio, y alrededor del trono había un arcoíris en apariencia como esmeralda.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ καθήμενος
  english_pob_choice: the one seated there
  chosen_spanish: el que estaba sentado allí
  alternatives_spanish:
  - el que estaba sentado
  - el sentado
  lexicon: BDAG
  rationale: El participio sustantivado describe al entronizado. «Estaba sentado» conserva el estado continuo sin volver la frase excesivamente literal. «Allí» refleja el valor contextual del referente en la visión.
- source_word: ὅμοιος ὁράσει
  english_pob_choice: in appearance like
  chosen_spanish: en apariencia como
  alternatives_spanish:
  - como en apariencia
  - teniendo apariencia de
  lexicon: BDAG
  rationale: La dativa ὁράσει expresa el ámbito de la semejanza visual. «En apariencia como» mantiene explícita la comparación sin convertirla en una descripción ontológica.
- source_word: λίθῳ ἰάσπιδι
  english_pob_choice: jasper ... stone
  chosen_spanish: jaspe
  alternatives_spanish:
  - piedra de jaspe
  - jaspe, piedra
  lexicon: BDAG
  rationale: En español «jaspe» comunica el nombre de la gema de modo natural. No se añade «piedra» porque el sustantivo del original ya queda implícito en el nombre de la gema y la frase española fluye mejor.
- source_word: σαρδίῳ
  english_pob_choice: sardius
  chosen_spanish: sardio
  alternatives_spanish:
  - sardio
  - cornalina
  lexicon: BDAG
  rationale: Se conserva una forma cercana al término tradicional y más directamente alineada con el griego que una equivalencia moderna interpretativa. «Cornalina» sería comprensible, pero desplaza el registro hacia una identificación gemológica más moderna que el contexto no exige.
- source_word: ἶρις
  english_pob_choice: rainbow
  chosen_spanish: arco iris
  alternatives_spanish:
  - arcoíris
  - arco iris de luz
  - halo
  lexicon: BDAG
  rationale: En este contexto apocalíptico la palabra denota un fenómeno de resplandor semejante al arco iris. «Arco iris» mantiene la imagen visual sin imponer una lectura más interpretativa como «halo».
- source_word: κυκλόθεν τοῦ θρόνου
  english_pob_choice: around the throne
  chosen_spanish: alrededor del trono
  alternatives_spanish:
  - rodeando el trono
  - en torno al trono
  lexicon: BDAG
  rationale: «Alrededor del trono» es idiomático en español y conserva con claridad la posición circundante.
- source_word: ὅμοιος ὁράσει σμαραγδίνῳ
  english_pob_choice: in appearance like emerald
  chosen_spanish: en apariencia como esmeralda
  alternatives_spanish:
  - con apariencia de esmeralda
  - como una esmeralda
  lexicon: BDAG
  rationale: Se mantiene la comparación visual, no una identidad material. «Esmeralda» es el equivalente natural de σμαραγδίνῳ en español, y «en apariencia» conserva la cautela del griego.
theological_decisions:
- issue: La visión describe al entronizado mediante símiles, no mediante una identificación literal con gemas
  english_pob_reading: Retain the language of visual resemblance ('in appearance like')
  chosen_spanish_reading: Conservar el lenguaje de semejanza visual («en apariencia como»)
  alternative_spanish_readings:
  - describirlo como hecho de gemas
  - intensificar la imagen como colores de gemas
  rationale: El griego usa dos veces lenguaje comparativo. La traducción no debe colapsar la semejanza visionaria en una descripción física literal, porque eso resolvería indebidamente la tensión del texto apocalíptico.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó 'carnelian' por 'sardius' para alinearse más de cerca con σαρδίῳ. La redacción española refleja esa preferencia al usar «sardio» y no una glosa moderna equivalente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino ni una cita directa del tetragrama.
  - Se mantuvo el registro visionario con «en apariencia como» para ambas comparaciones.
  - Se prefirió «arco iris» sobre «halo» para no introducir una interpretación no exigida por el contexto.
