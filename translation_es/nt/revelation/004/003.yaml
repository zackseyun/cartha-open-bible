review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: mantiene al entronizado como participio sustantivado, conserva dos veces la comparación visual de ὅμοιος ὁράσει, y traduce correctamente la posición de ἶρις alrededor del trono. Sin embargo, hay dos problemas puntuales: el marcador de nota [ a] aparece en el texto sin nota correspondiente, y la puntuación con punto y coma no refleja tan bien la continuidad simple de καί como una coma. También conviene normalizar el anclaje de nota y la ortografía recomendada «arcoíris».'
  spanish_quality_summary: El español es claro y digno, pero requiere una reparación menor. «Y el que estaba sentado allí era...» suena natural. «En apariencia como» es fiel aunque algo rígido; aun así es aceptable y preserva la cautela teológica del texto. «Arcoíris» mejora la presentación ortográfica moderna. El principal defecto formal es la nota huérfana en el texto.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Los términos clave se manejan bien: no hay nombres divinos ni vocabulario doctrinal sensible fuera de la necesidad de conservar la comparación visionaria. «Sardio» es defendible porque sigue la decisión auditada en inglés de preferir la forma tradicional cercana al griego. «Esmeralda» y «jaspe» están bien.'
  issues:
  - severity: high
    issue: Hay un marcador de nota en el texto («allí[ a]») pero el arreglo de notas está vacío.
    rationale: 'Esto incumple la disciplina requerida de notas: todo marcador debe corresponder exactamente a una nota, y no deben aparecer marcadores sin nota.'
  - severity: low
    issue: La puntuación con punto y coma después de «sardio» es innecesariamente fuerte.
    rationale: El griego enlaza las dos descripciones con καί; en español una coma mantiene mejor la fluidez de la visión sin crear una pausa mayor.
  - severity: low
    issue: «Arco iris» puede normalizarse como «arcoíris».
    rationale: Ambas formas son comprensibles, pero «arcoíris» es la grafía moderna más unificada y fluida en lectura continua.
  revised_spanish_text: Y el que estaba sentado allí era, en apariencia, como jaspe y sardio, y alrededor del trono había un arcoíris en apariencia como esmeralda.
  revision_rationale: Se elimina el marcador de nota huérfano, se ajusta la puntuación para reflejar mejor la coordinación del original y se normaliza «arcoíris» en español moderno, sin cambiar el sentido ni la lógica comparativa del texto griego.
