translation:
  language: es
  text: Y del trono salen relámpagos, sonidos y truenos[a]; y delante del trono había siete lámparas de fuego ardiendo[b], las cuales son los siete espíritus de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “voces” para φωναί.
    reason: lexical_alternative
  - marker: b
    text: O “siete antorchas de fuego ardiendo delante del trono”.
    reason: lexical_alternative
  - marker: c
    text: Muchos entienden “los siete espíritus de Dios” como una manera simbólica de hablar de la plenitud del único Espíritu Santo; el griego, sin embargo, dice literalmente “los siete espíritus”.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκπορεύονται
  english_pob_choice: come
  chosen_spanish: salen
  alternatives_spanish:
  - vienen
  - proceden
  - emanan
  lexicon: BDAG
  rationale: El verbo expresa que los fenómenos “salen” o “proceden” del trono. En español, “salen” conserva la imagen de origen y movimiento sin sonar técnico ni interpretativo. “Proceden” sería más formal, pero menos natural en esta escena apocalíptica.
- source_word: ἀστραπαὶ
  english_pob_choice: flashes of lightning
  chosen_spanish: relámpagos
  alternatives_spanish:
  - destellos de relámpago
  - fulgores de relámpago
  lexicon: BDAG
  rationale: El plural griego apunta a manifestaciones repetidas de rayo/luz. “Relámpagos” es natural en español y comunica el plural sin forzar una perifrasi innecesaria.
- source_word: φωναὶ
  english_pob_choice: sounds
  chosen_spanish: voces
  alternatives_spanish:
  - sonidos
  - ruidos
  lexicon: BDAG
  rationale: En esta cadena teofánica, φωναί puede ser “voces” o “sonidos”. Aquí conservo “voces” porque en español refleja bien el eco apocalíptico y deja abierta la posibilidad de una resonancia personal o audible; “sonidos” también sería posible y se señala en la nota.
- source_word: βρονταί
  english_pob_choice: peals of thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - estruendos
  - truenos retumbantes
  lexicon: BDAG
  rationale: El plural tiene fuerza acumulativa. “Truenos” es breve, claro y suficientemente fuerte en español. “Estruendos” sería una alternativa válida, pero menos precisa para el fenómeno atmosférico descrito.
- source_word: λαμπάδες πυρὸς
  english_pob_choice: seven lamps of fire
  chosen_spanish: siete lámparas de fuego
  alternatives_spanish:
  - siete antorchas de fuego
  - siete lámparas ígneas
  lexicon: BDAG
  rationale: 'Sigo de cerca la forma griega y la decisión revisada del inglés POB: λαμπάδες πυρὸς se traduce mejor como “lámparas de fuego” que como una glosa más libre. “Antorchas de fuego” queda como alternativa léxica porque λαμπάς también puede referirse a una antorcha.'
- source_word: καιόμεναι
  english_pob_choice: burning
  chosen_spanish: ardiendo
  alternatives_spanish:
  - quemándose
  - encendidas
  lexicon: BDAG
  rationale: El participio presente expresa acción continua. “Ardiendo” mantiene esa continuidad y suena natural junto a “lámparas de fuego”. “Encendidas” suavizaría el matiz dinámico.
- source_word: ἐνώπιον τοῦ θρόνου
  english_pob_choice: before the throne
  chosen_spanish: delante del trono
  alternatives_spanish:
  - ante el trono
  - en presencia del trono
  lexicon: BDAG
  rationale: “Delante del trono” es un equivalente espacial claro y sobrio en español. “Ante el trono” también es posible, pero “delante” conserva bien la imagen visual del escenario.
- source_word: ἅ εἰσιν
  english_pob_choice: which are
  chosen_spanish: las cuales son
  alternatives_spanish:
  - que son
  - las cuales equivalen a
  lexicon: BDAG
  rationale: El relativo neutro plural introduce identificación simbólica. “Las cuales son” suena fluido en español y preserva la relación explicativa sin resolver el simbolismo.
- source_word: τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  english_pob_choice: the seven spirits of God
  chosen_spanish: los siete espíritus de Dios
  alternatives_spanish:
  - el Espíritu séptuple de Dios
  - la plenitud del Espíritu Santo
  lexicon: BDAG
  rationale: Conservo el plural explícito del griego. “Los siete espíritus de Dios” mantiene la tensión lexical y teológica; no la reduzco a una paráfrasis interpretativa en el texto principal.
theological_decisions:
- issue: Interpretación de τὰ ἑπτὰ πνεύματα τοῦ θεοῦ
  english_pob_reading: The main text keeps 'the seven spirits of God,' while a note mentions that many understand this symbolically as the fullness of the one Holy Spirit.
  chosen_spanish_reading: El texto principal dice “los siete espíritus de Dios”, y la nota aclara que muchos lo entienden simbólicamente como la plenitud del único Espíritu Santo.
  alternative_spanish_readings:
  - el Espíritu séptuple de Dios
  - la plenitud del Espíritu Santo
  rationale: El griego es explícitamente plural, así que el texto principal debe preservar esa forma y no resolver la imagen mediante interpretación. La nota permite señalar la lectura simbólica frecuente sin borrar la tensión textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: φωναὶ en la secuencia teofánica
  english_pob_reading: sounds, with a footnote allowing 'voices'
  chosen_spanish_reading: “voces” en el texto principal, con nota de alternativa “sonidos”.
  alternative_spanish_readings:
  - sonidos
  - ruidos
  rationale: La secuencia relámpagos–voces–truenos tiene fuerte resonancia apocalíptica en español. “Voces” mantiene esa resonancia y además deja abierta la posibilidad de una audición personal; la nota conserva la alternativa semántica general.
  doctrine_reference: BDAG on φωνή; apocalyptic throne-room imagery
translation_notes:
  revision_awareness: He seguido la revisión más reciente del contexto inglés POB al preferir “lámparas de fuego” sobre una paráfrasis más libre, manteniendo la precisión léxica de λαμπάδες πυρὸς. También preservé la pluralidad explícita de “los siete espíritus de Dios” y la tensión interpretativa documentada en el aparato inglés.
  spanish_consistency_notes:
  - He usado “Dios” para θεοῦ conforme al estándar del proyecto.
  - He mantenido el presente narrativo en “salen” y el participio continuo en “ardiendo” para reflejar el aspecto verbal griego.
  - He preferido “delante del trono” por claridad espacial y estilo bíblico moderno.
  - He evitado “SEÑOR” porque este versículo no contiene κύριος; el referente divino aparece solo en θεοῦ.
