  text: Καὶ εἶδον, καὶ ἤκουσα ἑνὸς ἀετοῦ πετομένου ἐν μεσουρανήματι λέγοντος φωνῇ μεγάλῃ· Οὐαὶ οὐαὶ οὐαὶ ⸂τοὺς κατοικοῦντας⸃ ἐπὶ τῆς γῆς ἐκ τῶν λοιπῶν φωνῶν τῆς σάλπιγγος τῶν τριῶν ἀγγέλων τῶν μελλόντων σαλπίζειν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/008/013.yaml
  text: And I saw[a], and I heard one eagle flying in midheaven, saying with a loud voice, “Woe, woe, woe to those who dwell on the earth[b], because of the remaining trumpet-blasts of the three angels who are about to sound!”
  footnotes:
