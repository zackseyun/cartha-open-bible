translation:
  language: es
  text: 'Y vi[a], y oí a un águila volando en medio del cielo[b], que decía con voz fuerte: «¡Ay, ay, ay de los que habitan en la tierra, a causa de los restantes toques de trompeta de los tres ángeles que están por tocar!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «un ángel» en lugar de «un águila».
    reason: textual_variant
  - marker: b
    text: O «en el aire»; el término griego se refiere al cielo en su punto más alto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀετοῦ
  english_pob_choice: eagle
  chosen_spanish: águila
  alternatives_spanish:
  - buitre
  lexicon: BDAG
  rationale: El griego SBLGNT lee ἀετοῦ, que normalmente significa «águila». En un contexto visionario apocalíptico, «águila» conserva mejor la imagen que una generalización como «ave»; no se adopta la variante manuscrita «ángel» en el texto principal.
- source_word: ἐν μεσουρανήματι
  english_pob_choice: in midheaven
  chosen_spanish: en medio del cielo
  alternatives_spanish:
  - en el cielo más alto
  - en el cénit
  lexicon: BDAG
  rationale: La expresión señala el punto alto del cielo o el cielo abierto sobre la tierra. «En medio del cielo» es natural en español y mantiene el registro cósmico/apocalíptico sin oscurecer el sentido.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con fuerte voz
  alternatives_spanish:
  - con voz fuerte
  - en alta voz
  lexicon: BDAG
  rationale: La frase adverbial se vierte de forma idiomática en español. «Fuerte voz» conserva la intensidad de la proclamación y la concisión del griego.
- source_word: Οὐαὶ οὐαὶ οὐαὶ
  english_pob_choice: Woe, woe, woe
  chosen_spanish: ¡Ay, ay, ay!
  alternatives_spanish:
  - ¡Ay de, ay de, ay de!
  lexicon: BDAG
  rationale: Se preserva la triple repetición, que en Apocalipsis tiene fuerza retórica y profética. «Ay» comunica la lamentación/amenaza de manera más natural que una traducción explicativa.
- source_word: τοὺς κατοικοῦντας ἐπὶ τῆς γῆς
  english_pob_choice: those who dwell on the earth
  chosen_spanish: los que habitan en la tierra
  alternatives_spanish:
  - los habitantes de la tierra
  - los que viven en la tierra
  lexicon: BDAG
  rationale: Se mantiene la fórmula recurrente de Apocalipsis con valor teológico para la humanidad terrenal en oposición a Dios. «Habitan en la tierra» reproduce bien el carácter estable y típico de la expresión.
- source_word: ἐκ τῶν λοιπῶν φωνῶν τῆς σάλπιγγος
  english_pob_choice: because of the remaining trumpet-blasts
  chosen_spanish: a causa de los restantes toques de trompeta
  alternatives_spanish:
  - por los restantes sonidos de la trompeta
  - a causa de las restantes voces de la trompeta
  lexicon: BDAG
  rationale: Aquí ἐκ expresa causa. «Toques de trompeta» traduce de modo idiomático φωνῶν dentro del marco instrumental; «restantes» conserva λοιπῶν con claridad.
- source_word: τῶν τριῶν ἀγγέλων
  english_pob_choice: of the three angels
  chosen_spanish: de los tres ángeles
  alternatives_spanish:
  - de los tres mensajeros
  lexicon: BDAG
  rationale: En este contexto apocalíptico, ἄγγελος se entiende de manera directa como «ángel». No hay razón textual para generalizar a «mensajeros».
- source_word: τῶν μελλόντων σαλπίζειν
  english_pob_choice: who are about to sound
  chosen_spanish: que están por tocar
  alternatives_spanish:
  - que van a tocar
  - que están a punto de tocar
  lexicon: BDAG
  rationale: μέλλω + infinitivo indica inminencia. Con σαλπίζω, en español el verbo más natural es «tocar» (una trompeta), por lo que se explicita el objeto implícito sin alterar el sentido.
theological_decisions:
- issue: Lectura textual del ser alado que proclama el ay
  english_pob_reading: one eagle
  chosen_spanish_reading: un águila
  alternative_spanish_readings:
  - un ángel
  rationale: Se sigue el testimonio griego SBLGNT dado en el paquete fuente, que lee ἀετοῦ («águila»). La variante manuscrita «ángel» se conserva como posibilidad textual, pero no se adopta en el cuerpo principal.
  doctrine_reference: Primacía del texto fuente; la variante textual se documenta sin desplazar la lectura base.
- issue: Valor de la expresión «los que habitan en la tierra»
  english_pob_reading: those who dwell on the earth
  chosen_spanish_reading: los que habitan en la tierra
  alternative_spanish_readings:
  - los habitantes de la tierra
  rationale: 'Se conserva la fórmula apocalíptica recurrente, que en Apocalipsis designa más que una ubicación geográfica: un grupo humano caracterizado por su orientación terrenal. El español mantiene esa resonancia sin sobreexplicarla.'
  doctrine_reference: Uso consistente del lenguaje simbólico de Apocalipsis.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT proporcionado y se mantuvo la lectura principal del audit trail inglés sin cambios sustantivos. La decisión más sensible es ἀετοῦ, donde se preserva «águila» y se documenta la variante «ángel» en nota. También se optó por una equivalencia española idiomática para μεσουράνημα («en medio del cielo») y για φωνή/σάλπιγξ («toques de trompeta») para evitar un calco poco natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda; aquí no aparece el tetragrámaton.
  - «Águila» se mantiene como ave real, en concordancia con la lectura griega dada.
  - La triple exclamación «¡Ay, ay, ay!» conserva el paralelismo del original.
  - «Habitan en la tierra» reproduce la fórmula fija de Apocalipsis sin convertirla en una simple descripción geográfica.
