  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Águila», «ángeles», «habitan en la tierra» y «tocar» para la trompeta están alineados con las decisiones auditadas. La excepción necesaria es solo técnica: mover la nota [b] a la frase que traduce μεσουρανήματι.'
