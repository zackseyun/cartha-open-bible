translation:
  language: es
  text: Y el cuarto ángel tocó la trompeta[a]; y fue herido un tercio del sol, un tercio de la luna y un tercio de las estrellas, para que se oscureciera un tercio de ellos, y el día no brillara[b] durante un tercio de su tiempo, y la noche igualmente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sonó la trompeta». El verbo griego significa tocar o sonar una trompeta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el día no pudiera brillar durante un tercio de su tiempo». La construcción griega también puede expresarse con un matiz más de propósito después de «para que».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  english_pob_choice: sounded the trumpet
  chosen_spanish: tocó la trompeta
  alternatives_spanish:
  - sonó la trompeta
  - sopló la trompeta
  lexicon: BDAG
  rationale: σαλπίζω significa sonar una trompeta. En español, 'tocó la trompeta' es la formulación natural y fiel; evita un calco duro y conserva la acción instrumental sin añadir interpretación.
- source_word: ἐπλήγη
  english_pob_choice: was struck
  chosen_spanish: fue golpeada
  alternatives_spanish:
  - fue herida
  - fue alcanzada
  - fue castigada
  lexicon: BDAG
  rationale: El pasivo de πλήσσω expresa ser golpeado/azotado. 'Fue golpeada' conserva la imagen de juicio y el pasivo, con lenguaje claro en español actual.
- source_word: τὸ τρίτον
  english_pob_choice: a third
  chosen_spanish: la tercera parte
  alternatives_spanish:
  - un tercio
  - la tercera parte
  lexicon: BDAG
  rationale: Aunque 'un tercio' sería idiomático, la secuencia repetida del griego queda transparente con 'la tercera parte', que mantiene con claridad la medida repetida en cada elemento.
- source_word: ἥλιος / σελήνη / ἀστέρες
  english_pob_choice: the sun ... the moon ... the stars
  chosen_spanish: el sol ... la luna ... las estrellas
  alternatives_spanish:
  - el sol ... la luna ... los astros
  lexicon: BDAG
  rationale: Son términos celestes directos; 'estrellas' preserva el paralelo con el griego y con la audit trail inglesa.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: '''ἵνα'' introduce finalidad/resultado. ''Para que'' conserva esa relación sin forzar una lectura exclusivamente final o exclusivamente consecutiva.'
- source_word: σκοτισθῇ
  english_pob_choice: was darkened
  chosen_spanish: fuera oscurecida
  alternatives_spanish:
  - fuera ennegrecida
  - se oscureciera
  lexicon: BDAG
  rationale: El pasivo subjuntivo de σκοτίζομαι se vierte bien como 'fuera oscurecida', manteniendo el carácter pasivo y el resultado de oscurecimiento sin volverlo demasiado técnico.
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de estos
  - de los mismos
  lexicon: BDAG
  rationale: El pronombre plural se refiere colectivamente al sol, la luna y las estrellas. 'De ellos' es la forma más natural para expresar esa referencia plural en español.
- source_word: ἡ ἡμέρα μὴ φάνῃ
  english_pob_choice: the day did not shine
  chosen_spanish: el día no brillara
  alternatives_spanish:
  - el día no resplandeciera
  - el día no apareciera
  lexicon: BDAG
  rationale: φαίνω puede significar brillar, aparecer o dar luz. En este contexto de oscurecimiento cósmico, 'brillara' reproduce bien la imagen y evita introducir 'aparecer', que sería menos congruente con el paralelismo.
- source_word: τὸ τρίτον αὐτῆς
  english_pob_choice: for a third of it
  chosen_spanish: durante la tercera parte de él
  alternatives_spanish:
  - por la tercera parte de él
  - en la tercera parte de él
  lexicon: BDAG
  rationale: La frase expresa la extensión temporal afectada por la falta de brillo del día. 'Durante la tercera parte de él' preserva la duración cuantificada de manera comprensible en español.
- source_word: ἡ νὺξ ὁμοίως
  english_pob_choice: and the night likewise
  chosen_spanish: y la noche asimismo
  alternatives_spanish:
  - y la noche de igual manera
  - y la noche igualmente
  lexicon: BDAG
  rationale: ὁμοίως indica que la misma limitación aplica a la noche. 'Asimismo' es breve, natural y mantiene el paralelismo final del versículo.
theological_decisions:
- issue: Naturaleza del oscurecimiento cósmico
  english_pob_reading: Render the celestial darkening straightforwardly as apocalyptic judgment language without specifying whether it is literal, symbolic, or both.
  chosen_spanish_reading: Presentar el oscurecimiento celestial como lenguaje de juicio apocalíptico, sin precisar si es literal, simbólico o ambas cosas.
  alternative_spanish_readings:
  - Interpretarlo como un evento astronómico literal
  - Interpretarlo solo como simbolismo político o cósmico
  rationale: El texto describe un oscurecimiento infligido sobre los cuerpos celestes y sobre el día y la noche. La traducción debe preservar la imagen y su alcance sin resolver una tensión interpretativa que el pasaje no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica sin cerrarla prematuramente.
translation_notes:
  revision_awareness: La revisión más reciente no propuso cambios y el cotejo externo indicó acuerdo alto con observaciones menores; por eso se mantiene la estructura semántica principal y solo se afina la formulación española para mayor naturalidad y transparencia auditiva.
  spanish_consistency_notes:
  - Se mantiene «la tercera parte» para conservar la repetición cuantitativa del griego.
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el paralelismo de los tres cuerpos celestes y de día/noche sin introducir explicaciones interpretativas.
  - Se evita 'SEÑOR' o glosas litúrgicas ajenas al texto.
  - El pasivo se preserva cuando el griego lo exige, especialmente en 'fue golpeada' y 'fuera oscurecida'.
