revisions:
- from: Y el primero tocó su trompeta; y hubo granizo y fuego mezclados[a] con sangre, y fueron lanzados sobre la tierra. Y la tercera parte de la tierra fue quemada, y la tercera parte de los árboles fue quemada[b], y toda la hierba verde fue quemada.
  to: Y el primero tocó su trompeta; y hubo granizo y fuego mezclados con sangre, y fue arrojado sobre la tierra[a]. Y la tercera parte de la tierra fue consumida por el fuego, y la tercera parte de los árboles fue consumida por el fuego, y toda la hierba verde fue consumida por el fuego.
  rationale: Se corrige el cambio indebido de singular a plural en ἐβλήθη, se elimina la nota mal documentada y se restituye una nota que sí corresponde al audit trail sobre γῆ/earth-land. También se refuerza la intensidad de κατεκάη con 'fue consumida por el fuego', más cercano a 'burned up' que el simple 'fue quemada'. No se requiere adjudicación especial; son ajustes claros de fidelidad y documentación.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:19:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en gran parte el sentido del griego y sigue bien la línea del POB inglés en imágenes principales: el primero toca la trompeta, aparecen granizo y fuego mezclados con sangre, cae sobre la tierra, y sigue el patrón repetido de destrucción por tercios. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y el rastro de auditoría inglés: (1) ἐβλήθη es singular, y el POB inglés preserva el fenómeno como un todo colectivo (''it was thrown''), mientras que el español cambió a plural (''fueron lanzados''); (2) la nota [b] fue aplicada al lugar equivocado: en inglés la alternativa es para ''mixed with blood / mingled with blood'', no para ''was burned up''. También conviene reflejar mejor la fuerza de κατεκάη con ''fue consumida'' o ''fue quemada por completo''.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. 'Tocó su trompeta', 'granizo y fuego', y 'toda la hierba verde' funcionan bien. No obstante, 'fueron lanzados' rompe una decisión sintáctica significativa del original y del POB inglés. Además, repetir 'fue quemada' tres veces suena aceptable, pero pierde algo de la intensidad de κατακαίω; 'fue consumida' mejora la precisión sin sonar forzado. La puntuación y el registro general son adecuados.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. 'Tierra' para γῆ está bien y concuerda con la decisión teológica documentada de mantener alcance cósmico. No hay conflicto con Yahvé/Mesías/Espíritu, etc. La principal cuestión es de fidelidad léxica y sintáctica, no terminológica del glosario.
  issues:
  - severity: high
    issue: '''fueron lanzados'' cambia el verbo singular ἐβλήθη a plural.'
    rationale: 'El griego usa singular pasivo, y el POB inglés lo entiende como un fenómeno colectivo (''it was thrown''). En español debe preservarse mejor esa unidad: ''fue lanzado'' o mejor ''fue arrojado''.'
  - severity: high
    issue: La nota [b] está mal anclada y no corresponde a la nota del POB inglés.
    rationale: La nota inglesa [b] da la alternativa 'mingled with blood', pero el borrador español la puso sobre 'fue quemada' con 'quemada por completo', lo cual altera la documentación auditada.
  - severity: medium
    issue: '''fue quemada'' atenúa la fuerza de κατεκάη.'
    rationale: κατακαίω sugiere quemar hasta consumir. 'Fue consumida' o 'fue quemada por completo' comunica mejor esa intensidad en español.
  - severity: low
    issue: La nota [a] usa 'mezclados en sangre', formulación menos natural.
    rationale: Si se conserva una nota alternativa para μεμιγμένα ἐν αἵματι, 'mezclados con sangre' / 'mezclados en sangre' no deberían competir entre sí. La alternativa más fiel al audit trail es 'mezclados con sangre' principal y 'mezclados en sangre' o mejor 'mezclados con sangre / mezclados en sangre' solo si de verdad añade valor; pero la nota heredada debe corresponder a la otra formulación inglesa 'mingled with blood', que en español se expresa mejor como 'mezclados con sangre' frente a 'mezclados entre sangre' no sirve. La opción más clara es usar 'mezclados con sangre' en el texto y nota 'O "mezclados con sangre"' no añade nada, así que puede omitirse.
  revised_spanish_text: Y el primero tocó su trompeta; y hubo granizo y fuego mezclados con sangre, y fue arrojado sobre la tierra[a]. Y la tercera parte de la tierra fue consumida por el fuego, y la tercera parte de los árboles fue consumida por el fuego, y toda la hierba verde fue consumida por el fuego.
  revised_footnotes:
  - marker: a
    text: O "la tierra" puede traducirse "el mundo" o "la tierra/territorio"; el contexto apocalíptico aquí favorece "tierra" en sentido amplio.
    reason: lexical_alternative
  revision_rationale: Se corrige el cambio indebido de singular a plural en ἐβλήθη, se elimina la nota mal documentada y se restituye una nota que sí corresponde al audit trail sobre γῆ/earth-land. También se refuerza la intensidad de κατεκάη con 'fue consumida por el fuego', más cercano a 'burned up' que el simple 'fue quemada'. No se requiere adjudicación especial; son ajustes claros de fidelidad y documentación.
