  yaml_path: translation/nt/revelation/008/007.yaml
  text: And the first sounded his trumpet[a], and there came hail and fire mixed with blood, and it was thrown onto the earth. And a third of the earth was burned up, and a third of the trees was burned up[b], and all the green grass was burned up.
  footnotes:
