translation:
  language: es
  text: Y el primero tocó su trompeta; y hubo granizo y fuego mezclados con sangre, y fue arrojado sobre la tierra[a]. Y la tercera parte de la tierra fue consumida por el fuego, y la tercera parte de los árboles fue consumida por el fuego, y toda la hierba verde fue consumida por el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la tierra" puede traducirse "el mundo" o "la tierra/territorio"; el contexto apocalíptico aquí favorece "tierra" en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primero ángel
  - el primer ángel
  lexicon: BDAG
  rationale: El griego no expresa aquí el sustantivo “ángel”, aunque está implícito por el contexto inmediato; por fidelidad al texto, el español conserva la elipsis con “el primero”.
- source_word: ἐσάλπισεν
  english_pob_choice: sounded his trumpet
  chosen_spanish: tocó su trompeta
  alternatives_spanish:
  - hizo sonar su trompeta
  - sopló la trompeta
  lexicon: BDAG
  rationale: La idea central es el acto de sonar la trompeta; “tocó su trompeta” es idiomático en español y preserva el valor del verbo sin añadir explicaciones.
- source_word: ἐγένετο
  english_pob_choice: there came
  chosen_spanish: hubo
  alternatives_spanish:
  - apareció
  - sucedió que hubo
  lexicon: BDAG
  rationale: En este contexto apocalíptico, γίνομαι introduce la aparición del fenómeno; “hubo” comunica bien ese evento sin forzar una paráfrasis.
- source_word: χάλαζα καὶ πῦρ
  english_pob_choice: hail and fire
  chosen_spanish: granizo y fuego
  alternatives_spanish:
  - pedrisco y fuego
  - granizo y llamas
  lexicon: BDAG
  rationale: “Granizo” es el equivalente más natural de χάλαζα en español bíblico moderno; conserva la imagen destructiva del texto.
- source_word: μεμιγμένα ἐν αἵματι
  english_pob_choice: mixed with blood
  chosen_spanish: mezclados con sangre
  alternatives_spanish:
  - mezclados en sangre
  - madrados con sangre
  lexicon: BDAG
  rationale: El participio plural concuerda con la pareja “granizo y fuego”; “mezclados con sangre” refleja la unión asociativa expresada por ἐν αἵματι y mantiene la imagen impactante.
- source_word: ἐβλήθη εἰς τὴν γῆν
  english_pob_choice: it was thrown onto the earth
  chosen_spanish: fueron lanzados sobre la tierra
  alternatives_spanish:
  - fue lanzado sobre la tierra
  - fueron arrojados a la tierra
  lexicon: BDAG
  rationale: Aunque el verbo es singular, el referente conceptual es el conjunto “granizo y fuego”; el plural en español naturaliza la concordancia con los dos elementos mencionados, y “sobre la tierra” expresa bien εἰς con movimiento hacia una superficie.
- source_word: τὸ τρίτον τῆς γῆς
  english_pob_choice: a third of the earth
  chosen_spanish: la tercera parte de la tierra
  alternatives_spanish:
  - un tercio de la tierra
  - la tercera parte de la tierra
  lexicon: BDAG
  rationale: “La tercera parte” reproduce con claridad la fracción del griego y mantiene el tono solemne del juicio apocalíptico.
- source_word: κατεκάη
  english_pob_choice: was burned up
  chosen_spanish: fue quemada
  alternatives_spanish:
  - fue consumida por el fuego
  - ardió por completo
  lexicon: BDAG
  rationale: κατακαίω intensifica la idea de ser quemado; “fue quemada” es breve y fiel, aunque algo menos explícito que “quemada por completo”.
- source_word: τὸ τρίτον τῶν δένδρων
  english_pob_choice: a third of the trees
  chosen_spanish: la tercera parte de los árboles
  alternatives_spanish:
  - un tercio de los árboles
  lexicon: BDAG
  rationale: Se conserva la misma estructura fraccional del primer hemistiquio para mantener el paralelismo del versículo.
- source_word: πᾶς χόρτος χλωρός
  english_pob_choice: all the green grass
  chosen_spanish: toda la hierba verde
  alternatives_spanish:
  - todo el pasto verde
  - toda la hierba fresca
  lexicon: BDAG
  rationale: χόρτος puede designar hierba o vegetación herbácea; “hierba verde” comunica el contraste con lo quemado y suena natural en español bíblico.
theological_decisions:
- issue: Alcance de γῆ en el juicio de las trompetas
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - tierra/land
  - la tierra como el mundo habitable
  rationale: El contexto de Apocalipsis favorece una referencia amplia y cósmica; “tierra” conserva esa amplitud sin reducir el alcance a un territorio local.
  doctrine_reference: Principio de primacía del texto original; conservar la amplitud semántica donde el griego lo permite
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores [a] y [b] directamente en el texto español, de modo que cada nota queda anclada a la expresión correspondiente.
  spanish_consistency_notes:
  - Se mantuvo “tierra” para γῆ en coherencia con la decisión del POB inglés de conservar el alcance apocalíptico amplio.
  - Se evitó “SEÑOR” y otros ajustes tradicionales no presentes en este versículo.
  - Se conservó la repetición de “la tercera parte” para reflejar el paralelismo del griego.
  - Se usó vocabulario bíblico claro y contemporáneo, sin suavizar la violencia del juicio descrito.
