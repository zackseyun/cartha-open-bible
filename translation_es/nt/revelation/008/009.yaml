review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: «murió un tercio… y un tercio… fue destruido». También preserva adecuadamente la referencia de κτίσματα a criaturas marinas animadas y mantiene una nota sobre ψυχάς. Sin embargo, la segunda cláusula pierde precisión gramatical frente al verbo plural griego διεφθάρησαν y resulta menos natural en español bíblico-formal con «un tercio de los barcos fue destruido» que con plural orientado a los barcos afectados.'
  spanish_quality_summary: El español es claro y legible, con registro adecuado. «Criaturas del mar que tienen vida» funciona, aunque «en el mar» sería más cercano al original que «del mar». El problema principal de calidad es la concordancia en «un tercio de los barcos fue destruido», que suena más forzada aquí que «fueron destruidos».
  glossary_alignment: No hay conflictos con la terminología nuclear del proyecto. La decisión de verter ψυχάς como «vida» en el texto principal, conservando «alma/almas» en nota, es defendible y coherente con el audit trail inglés revisado. «Barcos» para πλοίων y «criaturas» para κτισμάτων están bien alineados.
  issues:
  - severity: medium
    issue: Concordancia de la segunda cláusula
    rationale: El griego tiene verbo plural (διεφθάρησαν) con referente efectivo «los barcos». En español, aunque el singular con partitivos es posible, aquí «un tercio de los barcos fueron destruidos» refleja mejor el original y suena más natural.
  - severity: low
    issue: «del mar» en lugar de «en el mar»
    rationale: La frase griega τῶν ἐν τῇ θαλάσσῃ es locativa («en el mar»). «Del mar» no distorsiona gravemente el sentido, pero sí desplaza ligeramente el matiz desde ubicación a pertenencia/origen.
  revised_spanish_text: Y murió un tercio de las criaturas en el mar que tienen vida[a], y un tercio de los barcos fueron destruidos.
  revised_footnotes:
  - marker: a
    text: 'O «que tienen alma» o «seres vivientes». El griego dice: «los que tienen almas/vidas».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la locución locativa a «en el mar» para seguir más de cerca τῶν ἐν τῇ θαλάσσῃ, y se cambia a «fueron destruidos» para reflejar mejor el plural griego διεφθάρησαν y mejorar la naturalidad del español con este sujeto partitivo.
