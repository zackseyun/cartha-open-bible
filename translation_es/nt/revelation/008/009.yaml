revisions:
- from: Y murió un tercio de las criaturas del mar que tienen vida[a], y un tercio de los barcos fue destruido.
  to: Y murió un tercio de las criaturas en el mar que tienen vida[a], y un tercio de los barcos fueron destruidos.
  rationale: Se ajusta la locución locativa a «en el mar» para seguir más de cerca τῶν ἐν τῇ θαλάσσῃ, y se cambia a «fueron destruidos» para reflejar mejor el plural griego διεφθάρησαν y mejorar la naturalidad del español con este sujeto partitivo.
