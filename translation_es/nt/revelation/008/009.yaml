translation:
  language: es
  text: Y murió un tercio de las criaturas en el mar que tienen vida[a], y un tercio de los barcos fueron destruidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «que tienen alma» o «seres vivientes». El griego dice: «los que tienen almas/vidas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέθανε
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - pereció
  lexicon: BDAG
  rationale: El aoristo de ἀποθνῄσκω expresa muerte real y directa. En español, «murió» es la equivalencia natural y precisa; «pereció» sería posible, pero suena más marcado y menos directo en este contexto.
- source_word: τὸ τρίτον
  english_pob_choice: a third
  chosen_spanish: un tercio
  alternatives_spanish:
  - la tercera parte
  lexicon: BDAG
  rationale: La expresión partitiva se conserva de modo natural en español con «un tercio». «La tercera parte» es correcta, pero menos fluida en este enunciado.
- source_word: κτισμάτων
  english_pob_choice: creatures
  chosen_spanish: criaturas
  alternatives_spanish:
  - seres creados
  - cosas creadas
  lexicon: BDAG
  rationale: En este contexto, modificado por la frase que limita al mar y por la referencia a seres que tienen vida, κτίσματα se refiere a seres animados del mar. «Criaturas» preserva ese sentido mejor que una traducción general como «cosas creadas».
- source_word: τῶν ἐν τῇ θαλάσσῃ
  english_pob_choice: in the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - que estaban en el mar
  - en el mar
  lexicon: BDAG
  rationale: La relación posesiva/locativa se expresa con naturalidad en español como «del mar». También sería posible «en el mar», pero «del mar» funciona mejor con «criaturas» en esta construcción.
- source_word: τὰ ἔχοντα ψυχάς
  english_pob_choice: the ones that have life
  chosen_spanish: que tienen vida
  alternatives_spanish:
  - que tienen almas vivientes
  - que tienen alma
  - vivientes
  lexicon: BDAG
  rationale: El griego dice literalmente «los que tienen almas/vidas». Siguiendo el audit trail inglés, «que tienen vida» preserva el valor léxico de ψυχή sin introducir una formulación técnica sobre el alma animal. «Que tienen almas vivientes» sonaría demasiado pesado y potencialmente interpretativo en español.
- source_word: ψυχάς
  english_pob_choice: living souls / lives / life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - almas
  - vida
  lexicon: BDAG
  rationale: ψυχή puede significar «alma», «vida» o «ser viviente» según el contexto. Aquí el referente son criaturas marinas vivas; por claridad española se traduce «vida», manteniendo el matiz de seres vivos sin afirmar una antropología explícita.
- source_word: πλοίων
  english_pob_choice: ships
  chosen_spanish: barcos
  alternatives_spanish:
  - naves
  - embarcaciones
  lexicon: BDAG
  rationale: πλοῖον designa barcos o naves. «Barcos» es la opción más clara y natural para lectores hispanohablantes actuales, y conserva el registro narrativo del juicio marítimo.
- source_word: διεφθάρησαν
  english_pob_choice: were destroyed
  chosen_spanish: fue destruido
  alternatives_spanish:
  - fueron destruidos
  - quedó destruido
  lexicon: BDAG
  rationale: El pasivo de διαφθείρω aquí indica ruina o destrucción material, no corrupción moral. Dado que el sujeto colectivo «un tercio de los barcos» se entiende como una unidad partitiva en español, el singular «fue destruido» resulta idiomático; la alternativa plural también sería viable y se mantiene como posibilidad reconocida.
theological_decisions:
- issue: Tratamiento de ψυχάς en criaturas marinas
  english_pob_reading: Translate with lexical preservation as 'have life' rather than erasing ψυχή into a generic term.
  chosen_spanish_reading: «que tienen vida» preserva el dato de que son seres vivos, sin convertir el texto en una afirmación técnica sobre el alma de los animales.
  alternative_spanish_readings:
  - que tienen alma
  - que tienen almas vivientes
  - vivientes
  rationale: El verso no enseña una doctrina antropológica sobre el alma, pero tampoco conviene borrar por completo ψυχή. La opción elegida mantiene la referencia a vida/animación de manera clara y auditable en español.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Concordancia del sujeto partitivo en la segunda cláusula
  english_pob_reading: a third of the ships were destroyed
  chosen_spanish_reading: «un tercio de los barcos fue destruido»
  alternative_spanish_readings:
  - «un tercio de los barcos fueron destruidos»
  rationale: En español, con sujetos partitivos, tanto la concordancia singular como la plural pueden aparecer según el enfoque. Aquí se adopta el singular, coherente con el porcentaje como unidad afectada, sin negar la lectura plural posible.
  doctrine_reference: Norma de concordancia con sujetos partitivos en español
- issue: Uso de 'criaturas' para κτισμάτων
  english_pob_reading: creatures
  chosen_spanish_reading: «criaturas»
  alternative_spanish_readings:
  - seres creados
  - cosas creadas
  rationale: La elección evita diluir el referente en algo inanimado y respeta el contexto de seres marinos vivos. No se introduce una categoría teológica ajena al pasaje.
  doctrine_reference: Lexical precision in apocalyptic imagery
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que ajustó la frase de ψυχάς de una apposición explícita a «have life» por mayor naturalidad. En español, se reflejó ese ajuste con «que tienen vida», evitando una glosa más pesada y manteniendo la transparencia léxica del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» por no aparecer en el pasaje.
  - Se tradujo πλοίων como «barcos» por naturalidad actual; «naves» quedó como alternativa reconocida.
  - Se preservó el valor partitivo de τὸ τρίτον con «un tercio» en ambas cláusulas.
  - La nota al pie se ancló en «vida» porque ahí recae la decisión léxica sensible de ψυχάς.
