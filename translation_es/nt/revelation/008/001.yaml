revisions:
- from: Y cuando abrió el séptimo sello[a][b], hubo silencio en el cielo por como media hora.
  to: Y cuando abrió el séptimo sello[a][b], hubo silencio en el cielo como por media hora.
  rationale: Se ajusta «por como media hora» a «como por media hora» para lograr un español más natural sin perder el matiz aproximativo de ὡς. También se corrige la nota b para que conserve una alternativa real para ἐγένετο, en lugar de repetir el texto principal.
