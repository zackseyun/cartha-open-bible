translation:
  language: es
  text: Y cuando abrió el séptimo sello[a][b], hubo silencio en el cielo como por media hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rompió y abrió el séptimo sello». El griego simplemente dice «abrió el séptimo sello».
    reason: lexical_alternative
  - marker: b
    text: O «se hizo silencio en el cielo como por media hora».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: En este contexto narrativo de un acontecimiento singular, «cuando» transmite mejor la relación temporal que una forma iterativa como «cada vez que».
- source_word: ἤνοιξεν
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - rompió y abrió
  - deselló
  lexicon: BDAG
  rationale: ἀνοίγω significa «abrir». En español, «abrió» es la forma natural y directa para un sello; opciones como «rompió y abrió» añaden interpretación no exigida por el verbo.
- source_word: σφραγῖδα
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - sello sellado
  - marca de sello
  lexicon: BDAG
  rationale: σφραγίς se traduce de manera estándar como «sello». En Apocalipsis se refiere al sello del rollo, y «sello» conserva esa referencia con precisión.
- source_word: τὴν ἑβδόμην
  english_pob_choice: the seventh
  chosen_spanish: el séptimo
  alternatives_spanish:
  - la séptima
  lexicon: BDAG
  rationale: El adjetivo ordinal concuerda con «sello»; en español, la forma masculina «el séptimo» es la correcta por concordancia con el sustantivo implícito masculino «sello».
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - se produjo
  - llegó a haber
  lexicon: BDAG
  rationale: γίνομαι introduce la aparición de un estado o acontecimiento. «Hubo» es la equivalencia más natural en español para una existencia/evento que sobrevino.
- source_word: σιγὴ
  english_pob_choice: silence
  chosen_spanish: silencio
  alternatives_spanish:
  - quietud
  - sosiego
  lexicon: BDAG
  rationale: σιγή denota silencio, y «silencio» preserva la fuerza solemne y dramática del pasaje mejor que opciones más suaves como «quietud».
- source_word: ἐν τῷ οὐρανῷ
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en el cielo celestial
  - en los cielos
  lexicon: BDAG
  rationale: Aunque el sentido es el ámbito celestial, en español bíblico «en el cielo» comunica naturalmente el espacio referido sin forzar una perífrasis más técnica.
- source_word: ὡς ἡμιώριον
  english_pob_choice: for about half an hour
  chosen_spanish: por como media hora
  alternatives_spanish:
  - por cerca de media hora
  - por aproximadamente media hora
  lexicon: BDAG
  rationale: ὡς con una medida temporal marca aproximación. «Por como media hora» conserva el matiz aproximativo de forma fiel y natural; «por aproximadamente media hora» es más explícito, pero menos sobrio.
theological_decisions:
- issue: Sujeto implícito de ἤνοιξεν
  english_pob_reading: Rendered as 'he opened,' leaving the antecedent implicit but naturally referring to the Lamb from the preceding context.
  chosen_spanish_reading: Se conserva el sujeto implícito en el verbo («abrió»), sin añadir explícitamente «el Cordero».
  alternative_spanish_readings:
  - El Cordero abrió el séptimo sello
  - Él abrió el séptimo sello
  rationale: El griego no expresa el sujeto; en español, la forma verbal impersonal/persona tercera permite mantener esa referencia implícita. Así se preserva la continuidad discursiva sin introducir una identificación que el versículo no formula.
  doctrine_reference: Preservar la tensión y la economía del texto original; primacía de la fuente sobre la explicitación interpretativa.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; la concordancia del revisor fue alta y el texto quedó sin cambios, así que la propuesta española sigue de cerca el sentido auditado del original griego.
  spanish_consistency_notes:
  - Se mantiene «sello» para σφραγίς, en coherencia con la terminología bíblica estándar y con el audit trail inglés.
  - Se usa «cielo» para οὐρανός en sentido celestial, sin recurrir a un calco más técnico.
  - Se conserva la aproximación temporal de ὡς con una formulación que no endurece la duración exacta.
  - 'El orden de la cláusula inicial sigue la sintaxis natural del español bíblico: «Y cuando abrió…».'
