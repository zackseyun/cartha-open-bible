translation:
  language: es
  text: Y los siete ángeles que tenían las siete trompetas se prepararon para tocarlas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacer sonar las trompetas». El verbo griego significa «tocar una trompeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En Apocalipsis, ἄγγελος normalmente designa seres celestiales. En este contexto apocalíptico y con las trompetas en su posesión, «ángeles» conserva el referente esperado sin añadir una interpretación ajena.
- source_word: ἔχοντες
  english_pob_choice: who had
  chosen_spanish: que tenían
  alternatives_spanish:
  - teniendo
  lexicon: BDAG
  rationale: El participio presente se naturaliza en español como una cláusula relativa. «Que tenían» expresa la posesión de las trompetas en el marco narrativo con fluidez y sin forzar un gerundio pesado.
- source_word: σάλπιγγας
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - clarines
  - bugles
  lexicon: BDAG
  rationale: «Trompetas» es el equivalente normal de σάλπιγξ y preserva el valor cultual y apocalíptico del símbolo. No se traduce con un término más técnico o regional que estreche el registro.
- source_word: ἡτοίμασαν αὑτοὺς
  english_pob_choice: prepared themselves
  chosen_spanish: se prepararon
  alternatives_spanish:
  - se prepararon a sí mismos
  - se dispusieron
  lexicon: BDAG
  rationale: El verbo aoristo con pronombre reflexivo indica auto-preparación. En español, «se prepararon» comunica esa acción de manera natural y suficiente; el reflexivo explícito en español no requiere duplicarse con «a sí mismos».
- source_word: ἵνα
  english_pob_choice: to / so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de
  lexicon: BDAG
  rationale: La cláusula de propósito se expresa de forma concisa con «para» antes del infinitivo. Esto mantiene el sentido final de ἵνα sin cargar la frase con una subordinación más pesada.
- source_word: σαλπίσωσιν
  english_pob_choice: to sound them
  chosen_spanish: tocarlas
  alternatives_spanish:
  - hacer sonar las trompetas
  - soplarlas
  lexicon: BDAG
  rationale: El verbo significa tocar una trompeta. En español, «tocarlas» es natural y fiel al instrumento implícito; el objeto se recupera del contexto («las siete trompetas»).
theological_decisions:
- issue: Identidad de los ἄγγελοι en el contexto apocalíptico
  english_pob_reading: heavenly angels
  chosen_spanish_reading: ángeles celestiales
  alternative_spanish_readings:
  - mensajeros humanos
  rationale: El contexto de Apocalipsis 8 favorece claramente seres celestiales encargados de la secuencia de las trompetas. La traducción principal mantiene «ángeles» sin añadir una glosa interpretativa, pero la decisión se basa en ese referente y no en un uso genérico de «mensajeros».
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB en inglés, que prefirió una formulación de propósito más natural («to sound them») en lugar de una perifrasis más pesada. En español, eso se refleja con «para tocarlas», que conserva el mismo sentido final y la referencia inmediata a «las siete trompetas».
  spanish_consistency_notes:
  - Se conserva «ángeles» y no «mensajeros» por el contexto apocalíptico.
  - «Trompetas» mantiene el término estándar y evita regionalismos.
  - La referencia pronominal «tocarlas» recupera el antecedente inmediato sin repetirlo.
  - La construcción de propósito se mantiene breve y publicable con «para» + infinitivo.
