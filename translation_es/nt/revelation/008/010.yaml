translation:
  language: es
  text: Y el tercer ángel tocó su trompeta[a], y cayó del cielo[b] una gran estrella[c], ardiendo como una antorcha[d], y cayó sobre la tercera parte de los ríos y sobre las fuentes de las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo sonar su trompeta». El verbo griego puede expresarse así de manera equivalente, pero «tocó su trompeta» es más natural en español y conserva el sentido.
    reason: lexical_alternative
  - marker: b
    text: O «del firmamento». El griego οὐρανοῦ puede referirse al cielo o al firmamento; aquí se mantiene «del cielo» porque encaja mejor con el marco visionario y apocalíptico.
    reason: lexical_alternative
  - marker: c
    text: La «estrella» se deja como imagen sin interpretar. Los intérpretes difieren sobre si representa un ser angélico, un objeto semejante a un meteoro o una fuerza simbólica.
    reason: alternative_reading
  - marker: d
    text: O «ardiendo como una lámpara». El griego puede referirse a una antorcha o a una lámpara; «antorcha» encaja mejor con la imagen de una estrella ardiente que cae.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  english_pob_choice: sounded his trumpet
  chosen_spanish: tocó su trompeta
  alternatives_spanish:
  - hizo sonar su trompeta
  - sonó la trompeta
  lexicon: BDAG
  rationale: σάλπιζω significa tocar o hacer sonar una trompeta. En español, «tocó su trompeta» es natural y conserva la acción apocalíptica sin perder precisión.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo arriba
  - desde el cielo
  lexicon: BDAG
  rationale: La evidencia griega permite «cielo» o «cielo/firmamento» según contexto. Aquí se conserva la imagen visionaria con «del cielo», que corresponde bien al registro apocalíptico.
- source_word: ἀστὴρ μέγας
  english_pob_choice: a great star
  chosen_spanish: una gran estrella
  alternatives_spanish:
  - una estrella grande
  lexicon: BDAG
  rationale: Se mantiene el sustantivo e imagen sin identificar su referente. «Gran» refleja mejor el valor cualitativo e impresionante del adjetivo que una simple medida física.
- source_word: καιόμενος ὡς λαμπάς
  english_pob_choice: burning like a torch
  chosen_spanish: ardiendo como una antorcha
  alternatives_spanish:
  - quemándose como una antorcha
  - brillando como una antorcha
  lexicon: BDAG
  rationale: καιόμενος expresa estar ardiendo o en llamas, y λαμπάς suele referir una antorcha. «Ardiendo como una antorcha» preserva el símil con naturalidad en español.
- source_word: ἔπεσεν ... καὶ ἔπεσεν
  english_pob_choice: fell ... and it fell
  chosen_spanish: cayó ... y cayó
  alternatives_spanish:
  - se precipitó ... y se precipitó
  - cayó ... y descendió
  lexicon: BDAG
  rationale: 'Se conserva la repetición del verbo para reflejar el ritmo y la insistencia del griego: caída desde el cielo y caída sobre las aguas.'
- source_word: ἐπὶ τὸ τρίτον τῶν ποταμῶν
  english_pob_choice: on a third of the rivers
  chosen_spanish: sobre la tercera parte de los ríos
  alternatives_spanish:
  - sobre un tercio de los ríos
  - sobre la tercera parte de los ríos
  lexicon: BDAG
  rationale: En las trompetas de Apocalipsis, τὸ τρίτον tiene valor cuantitativo de una tercera parte. «Tercera parte» es claro, bíblico y fiel al patrón del libro.
- source_word: πηγὰς τῶν ὑδάτων
  english_pob_choice: the springs of the waters
  chosen_spanish: las fuentes de las aguas
  alternatives_spanish:
  - las fuentes del agua
  - los manantiales de las aguas
  lexicon: BDAG
  rationale: πηγή significa fuente o manantial. «Fuentes de las aguas» sigue de cerca la construcción griega y mantiene el tono solemne del pasaje.
theological_decisions:
- issue: Referente de la gran estrella que cae
  english_pob_reading: Rendered literally as 'a great star' without interpreting it as an angelic being, meteor, or symbolic power.
  chosen_spanish_reading: Se traduce literalmente como «una gran estrella» sin decidir si representa un ser angélico, un objeto meteórico o un poder simbólico.
  alternative_spanish_readings:
  - un ángel caído
  - un meteorito
  - un poder simbólico
  rationale: El versículo presenta la imagen como estrella y no identifica explícitamente su referente. Para preservar la tensión teológica y no anticipar la explicación del contexto, se mantiene la literalidad.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego SBLGNT y del audit trail inglés; no se detectaron revisiones posteriores que requirieran ajuste adicional. Se mantuvo la repetición del verbo de caída y la ambigüedad del referente de la estrella.
  spanish_consistency_notes:
  - Se usa «cielo» para οὐρανός, en consonancia con el registro apocalíptico y sin ocultar la posibilidad semántica amplia.
  - Se mantiene «fuentes de las aguas» para conservar la cadencia y cercanía al griego.
  - Se evita interpretar la «estrella» en el texto base para preservar la tensión exegética documentada.
