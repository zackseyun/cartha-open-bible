source:
  edition: SBLGNT
  text: Καὶ ὁ τρίτος ἄγγελος ἐσάλπισεν· καὶ ἔπεσεν ἐκ τοῦ οὐρανοῦ ἀστὴρ μέγας καιόμενος ὡς λαμπάς, καὶ ἔπεσεν ἐπὶ τὸ τρίτον τῶν ποταμῶν καὶ ἐπὶ τὰς πηγὰς τῶν ὑδάτων.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/008/010.yaml
  text: And the third angel sounded his trumpet[a], and a great star fell from heaven, burning like a torch[c][b], and it fell on a third of the rivers and on the springs of the waters.
  footnotes:
  - marker: a
    text: Or 'from the sky.' The Greek word can refer to heaven or the sky; 'from heaven' is retained here because it best fits the visionary, apocalyptic setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'burning like a lamp.' The Greek word can denote a torch or lamp; 'torch' better fits the image of a blazing falling star.
    reason: lexical_alternative
  - marker: c
    text: The 'star' is left untranslated as an image. Interpreters differ on whether it represents an angelic being, a meteor-like object, or a symbolic power.
    reason: alternative_reading
