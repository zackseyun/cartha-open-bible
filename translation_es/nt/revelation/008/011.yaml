translation:
  language: es
  text: Y el nombre de la estrella se llama Ajenjo[a]. Y la tercera parte de las aguas se volvió ajenjo, y muchas personas murieron por causa de las aguas[b], porque las aguas habían sido amargadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘absintio’; el griego Ἄψινθος/ἄψινθον designa el ajenjo, una planta amarga, y el término repetido enlaza el nombre de la estrella con la amargura de las aguas.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede expresarse de forma más compacta: «porque habían sido amargadas», refiriéndose a las aguas.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - designación
  lexicon: BDAG
  rationale: “Nombre” es la equivalencia natural y precisa para la identificación de la estrella.
- source_word: ἀστέρος
  english_pob_choice: star
  chosen_spanish: estrella
  alternatives_spanish:
  - astro
  lexicon: BDAG
  rationale: “Estrella” es más directo y claro en español bíblico contemporáneo que “astro”, sin perder el sentido apocalíptico.
- source_word: λέγεται
  english_pob_choice: is called
  chosen_spanish: se llama
  alternatives_spanish:
  - es llamado
  - se conoce como
  lexicon: BDAG
  rationale: El pasivo presente se expresa con naturalidad en español como “se llama”, conservando el valor designativo del griego.
- source_word: Ἄψινθος / ἄψινθον
  english_pob_choice: Wormwood / wormwood
  chosen_spanish: Ajenjo / ajenjo
  alternatives_spanish:
  - Absintio / absintio
  - Artemisa amarga / artemisa amarga
  lexicon: BDAG
  rationale: “Ajenjo” es el nombre bíblico y botánico más natural en español para wormwood, y mantiene el vínculo léxico entre el nombre de la estrella y el efecto sobre las aguas. Se evita “absenta/absintio” por su asociación moderna con la bebida.
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: se volvió
  alternatives_spanish:
  - se convirtió en
  - llegó a ser
  lexicon: BDAG
  rationale: En este contexto de transformación, “se volvió” comunica el cambio resultante de modo fluido y fiel.
- source_word: τὸ τρίτον τῶν ὑδάτων
  english_pob_choice: a third of the waters
  chosen_spanish: la tercera parte de las aguas
  alternatives_spanish:
  - un tercio de las aguas
  lexicon: BDAG
  rationale: Ambas opciones son correctas; “la tercera parte” conserva el paralelismo y el tono más literal del partitivo griego.
- source_word: εἰς ἄψινθον
  english_pob_choice: became wormwood
  chosen_spanish: se volvió ajenjo
  alternatives_spanish:
  - se convirtió en ajenjo
  - quedó como ajenjo
  lexicon: BDAG
  rationale: La preposición εἰς con γίνομαι expresa resultado/transformación; “se volvió ajenjo” preserva esa fuerza y el enlace con el nombre de la estrella.
- source_word: πολλοὶ τῶν ἀνθρώπων
  english_pob_choice: many of the people
  chosen_spanish: muchos de los hombres
  alternatives_spanish:
  - muchas personas
  - muchos seres humanos
  lexicon: BDAG
  rationale: “Hombres” traduce literalmente ἀνθρώπων y mantiene el registro bíblico tradicional; el plural genérico en español sigue siendo inteligible como “personas/humanidad” en contexto.
- source_word: ἀπέθανον ἐκ τῶν ὑδάτων
  english_pob_choice: died from the waters
  chosen_spanish: murieron por causa de las aguas
  alternatives_spanish:
  - murieron de las aguas
  - murieron a causa de las aguas
  lexicon: BDAG
  rationale: La preposición ἐκ marca fuente o causa; “por causa de” explicita con naturalidad que las aguas son la causa de la muerte sin introducir un detalle no dicho como “al beberlas”.
- source_word: ὅτι ἐπικράνθησαν
  english_pob_choice: because they had been made bitter
  chosen_spanish: porque habían sido amargadas
  alternatives_spanish:
  - porque se habían vuelto amargas
  - porque las aguas habían sido amargadas
  lexicon: BDAG
  rationale: Se mantiene el pasivo y la referencia natural a las aguas. “Amargadas” conserva la conexión semántica con ajenjo y evita resolver de forma innecesaria la imagen en términos explicativos.
theological_decisions:
- issue: Referente de ἐπικράνθησαν
  english_pob_reading: The verb refers to the waters, not the people.
  chosen_spanish_reading: El verbo se refiere a las aguas, no a las personas.
  alternative_spanish_readings:
  - El verbo se refiere a las personas, que quedaron amargadas/embotadas por el agua.
  rationale: La sintaxis y el antecedente inmediato favorecen claramente las aguas como sujeto pasivo de “amargadas”. La traducción conserva esa lectura sin suavizar la imagen de contaminación/veneno implícita en el pasaje.
  doctrine_reference: Preservar la tensión exegética y la referencia contextual más probable, sin sobreinterpretar el pasaje.
translation_notes:
  revision_awareness: El texto español sigue de cerca la edición SBLGNT y el rastro de auditoría en inglés, sin cambios de revisión pendientes; se mantiene la lectura contextual de que la amargura afecta a las aguas.
  spanish_consistency_notes:
  - Se usa ‘ajenjo’ de forma consistente para Ἄψινθος/ἄψινθον, con mayúscula solo en el nombre de la estrella y minúscula en el resultado sobre las aguas.
  - Se mantiene ‘aguas’ en plural para reflejar τῶν ὑδάτων y conservar la imagen colectiva del pasaje.
  - Se evita ‘SEÑOR/Cristo’ y otros términos no pertinentes; no hay tensiones terminológicas adicionales en este versículo.
