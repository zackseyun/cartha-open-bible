    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede expresarse de forma más compacta: «porque habían sido amargadas», refiriéndose a las aguas.'
    reason: alternative_reading
  revision_rationale: Se corrige «hombres» a «personas» para preservar el sentido inclusivo de ἀνθρώπων, y se explicita «las aguas» en la cláusula final para reflejar con claridad la decisión exegética auditada sobre el referente de ἐπικράνθησαν. Se conservan la repetición de «ajenjo» y la causalidad de las aguas como fuente de muerte. No se requiere una reescritura mayor.
