revisions:
- from: Y el nombre de la estrella se llama Ajenjo[a]. Y la tercera parte de las aguas se volvió ajenjo, y muchos de los hombres murieron por causa de las aguas[b], porque habían sido amargadas.
  to: Y el nombre de la estrella se llama Ajenjo[a]. Y la tercera parte de las aguas se volvió ajenjo, y muchas personas murieron por causa de las aguas[b], porque las aguas habían sido amargadas.
  rationale: Se corrige «hombres» a «personas» para preservar el sentido inclusivo de ἀνθρώπων, y se explicita «las aguas» en la cláusula final para reflejar con claridad la decisión exegética auditada sobre el referente de ἐπικράνθησαν. Se conservan la repetición de «ajenjo» y la causalidad de las aguas como fuente de muerte. No se requiere una reescritura mayor.
