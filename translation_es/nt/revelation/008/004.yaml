translation:
  language: es
  text: Y el humo del incienso subió con las oraciones de los santos[a][b] de la mano del ángel delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ascendió» o «se elevó» para «subió».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «con las oraciones de los santos»; la frase asocia el humo del incienso con las oraciones sin identificar explícitamente el humo o el incienso con las oraciones en este versículo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - se elevó
  lexicon: BDAG
  rationale: El aoristo de ἀναβαίνω expresa movimiento hacia arriba. «Subió» es natural en español moderno y conserva la imagen concreta sin volverla demasiado solemne o técnica.
- source_word: καπνὸς
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - humo denso
  lexicon: BDAG
  rationale: 'El sentido ordinario es literal: «humo». En español, la imagen apocalíptica se entiende bien con el sustantivo simple sin añadir interpretación.'
- source_word: θυμιαμάτων
  english_pob_choice: of the incense
  chosen_spanish: del incienso
  alternatives_spanish:
  - de los incensarios
  - de las ofrendas aromáticas
  lexicon: BDAG
  rationale: Θυμίαμα suele referirse a incienso. Aunque el griego usa plural, en español la forma natural y fiel es el singular colectivo «incienso».
- source_word: ταῖς προσευχαῖς
  english_pob_choice: with the prayers
  chosen_spanish: con las oraciones
  alternatives_spanish:
  - junto con las oraciones
  - al lado de las oraciones
  lexicon: BDAG
  rationale: El dativo aquí expresa asociación. «Con» mantiene la relación sin precisar indebidamente si el incienso simboliza, acompaña o porta las oraciones.
- source_word: τῶν ἁγίων
  english_pob_choice: of the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los creyentes
  - de los santos de Dios
  lexicon: BDAG
  rationale: «Santos» preserva el término bíblico establecido y el registro del Apocalipsis. En español eclesial es claro y no introduce una glosa interpretativa.
- source_word: ἐκ χειρὸς τοῦ ἀγγέλου
  english_pob_choice: from the hand of the angel
  chosen_spanish: de la mano del ángel
  alternatives_spanish:
  - de la mano del mensajero
  - desde la mano del ángel
  lexicon: BDAG
  rationale: La expresión se conserva de manera bastante literal para reflejar la imagen visionaria y su posible tono de mediación sacerdotal.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: «Delante de Dios» es idiomático y conserva el sentido de presentación en la presencia de Dios, con matiz cultual/judicial.
theological_decisions:
- issue: Relación entre el incienso y las oraciones
  english_pob_reading: The smoke of the incense went up with the prayers of the saints, without explicitly identifying the two.
  chosen_spanish_reading: El humo del incienso subió con las oraciones de los santos, sin equiparar explícitamente el humo o el incienso con las oraciones.
  alternative_spanish_readings:
  - El humo del incienso, que son las oraciones de los santos, subió.
  - El humo del incienso subió por las oraciones de los santos.
  rationale: La construcción griega vincula el humo y las oraciones, pero no los identifica de manera explícita en este versículo. La redacción española conserva esa asociación y evita resolver una tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla interpretativamente.
- issue: Sentido de «santos»
  english_pob_reading: Retained 'saints' as the covenant people of God, without narrowing to a later denominational or canonized sense.
  chosen_spanish_reading: Mantener «santos» como el pueblo santo de Dios, sin restringirlo a un sentido denominacional posterior o a canonización posterior.
  alternative_spanish_readings:
  - pueblo santo
  - los creyentes
  rationale: En Apocalipsis, ἅγιοι designa al pueblo consagrado a Dios. «Santos» conserva el término bíblico tradicional y evita ampliar o reducir indebidamente el referente.
  doctrine_reference: Ortodoxia cristiana histórica, sin importación confesional específica.
translation_notes:
  revision_awareness: 'Alineado con la última pasada del texto fuente: el consenso del audit trail indica que no hacen falta revisiones adicionales y que la lectura debe mantenerse alta en equivalencia óptima, preservando la asociación entre incienso y oraciones sin explicitar una identificación no dicha por el griego.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al criterio del proyecto.
  - Se usa «santos» para ἅγιοι, conservando el registro bíblico habitual.
  - Se evita «SEÑOR» porque aquí no aparece κύριος ni una cita del nombre divino.
  - Se mantiene «incienso» como sustantivo colectivo natural en español, aunque el griego esté en plural.
