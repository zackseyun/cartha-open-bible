translation:
  language: es
  text: Y el ángel tomó el incensario[a], y lo llenó con fuego del altar, y lo arrojó a la tierra; y se produjeron truenos, sonidos[b], relámpagos y un terremoto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego designa el recipiente para incienso y brasas en este contexto cultual.
    reason: lexical_explanation
  - marker: b
    text: O «voces». El término griego puede significar «voces» o «sonidos/ruidos» en una escena teofánica.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴληφεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - ha tomado
  - recibió
  lexicon: BDAG
  rationale: El perfecto griego tiene fuerza resultativa, pero en la secuencia narrativa española suena natural el pretérito simple. 'Tomó' conserva la acción completa sin sobrecargarla con un perfecto compuesto que aquí no aporta más claridad.
- source_word: λιβανωτόν
  english_pob_choice: censer
  chosen_spanish: incensario
  alternatives_spanish:
  - censario
  - turíbulo
  lexicon: BDAG
  rationale: En este contexto cultual el objeto es el recipiente para incienso y brasas. 'Incensario' comunica bien la función en español bíblico contemporáneo; 'turíbulo' es más tradicional, pero menos transparente para lectores amplios.
- source_word: ἐγέμισεν αὐτὸν ἐκ τοῦ πυρὸς τοῦ θυσιαστηρίου
  english_pob_choice: filled it with fire from the altar
  chosen_spanish: lo llenó con fuego del altar
  alternatives_spanish:
  - lo llenó con fuego tomado del altar
  - lo llenó del fuego del altar
  lexicon: BDAG
  rationale: 'Se conserva la relación fuente-instrumento: el incensario recibe fuego procedente del altar. En español, ''lo llenó con fuego del altar'' suena natural y mantiene visible el origen del fuego, que tiene peso simbólico en la escena.'
- source_word: θυσιαστηρίου
  english_pob_choice: altar
  chosen_spanish: altar
  lexicon: BDAG
  rationale: '''Altar'' es el equivalente estable para el objeto cultual en la imaginería del templo y el juicio apocalíptico.'
- source_word: ἔβαλεν εἰς τὴν γῆν
  english_pob_choice: threw it onto the earth
  chosen_spanish: lo arrojó a la tierra
  alternatives_spanish:
  - lo arrojó a la tierra
  - lo lanzó a la tierra
  lexicon: BDAG
  rationale: '''Arrojó'' conserva el gesto fuerte de βάλλω. Para γῆ, ''tierra'' es más natural en español bíblico y permite el alcance cósmico sin sonar forzado; aquí no se limita a ''suelo''.'
- source_word: ἐγένοντο
  english_pob_choice: there came
  chosen_spanish: se produjeron
  alternatives_spanish:
  - hubo
  - aparecieron
  lexicon: BDAG
  rationale: Se elige una construcción existencial neutral que transmite el surgimiento súbito de los fenómenos. 'Se produjeron' es idiomático y no añade sujetos implícitos.
- source_word: βρονταὶ
  english_pob_choice: peals of thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - tronadas
  - bramidos de trueno
  lexicon: BDAG
  rationale: El plural griego puede reflejar series de truenos; en español 'truenos' comunica el fenómeno de manera natural. La matización de pluralidad queda ya sugerida por la acumulación de señales.
- source_word: φωναὶ
  english_pob_choice: sounds
  chosen_spanish: voces
  alternatives_spanish:
  - sonidos
  - ruidos
  lexicon: BDAG
  rationale: El término puede significar 'voces' o 'sonidos'. Se conserva 'voces' para mantener abierta la tensión documental del griego en una fórmula teofánica, sin decidir de antemano que se trate solo de ruidos inarticulados.
- source_word: ἀστραπαὶ
  english_pob_choice: flashes of lightning
  chosen_spanish: relámpagos
  alternatives_spanish:
  - fulgores
  - destellos de luz
  lexicon: BDAG
  rationale: '''Relámpagos'' es la equivalencia natural en español para el plural y mantiene el carácter visible e intenso del portento.'
- source_word: σεισμός
  english_pob_choice: an earthquake
  chosen_spanish: un terremoto
  alternatives_spanish:
  - un sismo
  - un temblor
  lexicon: BDAG
  rationale: '''Terremoto'' es la forma más clara y ampliamente entendida en español. Conserva la fuerza del acontecimiento sísmico sin reducirlo a una vibración menor.'
theological_decisions:
- issue: Alcance de γῆ en una escena de juicio apocalíptico
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - suelo
  - terreno
  rationale: El contexto de Apocalipsis es cósmico y de juicio, no simplemente local. 'Tierra' conserva mejor la amplitud del griego γῆ y evita estrechar la escena a un piso o superficie física inmediata.
  doctrine_reference: Imaginería apocalíptica de juicio divino
- issue: Ambigüedad de φωναί en la fórmula teofánica
  english_pob_reading: sounds
  chosen_spanish_reading: voces
  alternative_spanish_readings:
  - sonidos
  rationale: Se mantiene la ambigüedad documentada por la tradición textual y por el propio griego. 'Voces' no fuerza una lectura personal, pero deja abierta la posibilidad de habla o proclamación celestial; por eso se añade una nota alternativa para transparencia.
  doctrine_reference: Tensión léxica preservada sin resolver
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el paquete fuente griego y el criterio POB en inglés: mantiene el orden narrativo, conserva la imaginería cultual y apocalíptica, y preserva la ambigüedad de φωναί en nota. No se detectan revisiones aplicadas en el rastro inglés más allá de la concordancia alta confirmada por el revisor.'
  spanish_consistency_notes:
  - Se usa 'tierra' para γῆ, coherente con el alcance cósmico del pasaje.
  - Se prefiere 'incensario' por claridad neutral; la nota conserva la alternativa terminológica.
  - Se mantiene 'voces' con nota porque el POB inglés documenta explícitamente la alternativa 'sounds'/'voices'.
  - Se evita 'SEÑOR' u otras sustituciones no presentes en el versículo.
  - La puntuación encadena las acciones como en el griego y el inglés POB, con punto y coma antes de la secuencia final de fenómenos.
