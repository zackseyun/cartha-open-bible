revisions:
- from: Y vi a los siete ángeles que están[a] delante de Dios, y se les dieron siete trompetas.
  to: Y vi a los siete ángeles que están de pie[a] delante de Dios, y se les dieron siete trompetas.
  rationale: Se revisa únicamente ἑστήκασιν para reflejar mejor el valor léxico y aspectual del griego. «Están de pie» conserva la idea de un estado presente de pie ante Dios, mientras la nota retiene las alternativas documentadas por el POB inglés. El resto del versículo ya es fiel, natural y terminológicamente consistente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:20:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Juan vio a un grupo definido de siete ángeles, estos están/stand delante de Dios, y se les dieron siete trompetas. Sin embargo, la elección española «están» sola para ἑστήκασιν debilita el matiz léxico de ‘estar de pie / estar colocados’ que el inglés POB preserva con ‘stand’ y que la nota intenta compensar. El griego perfecto estativo se expresa mejor en español con una formulación que incluya la postura/estado.'
  spanish_quality_summary: El español es claro y natural, pero «que están delante de Dios» suena algo incompleto en este contexto y puede leerse solo como ubicación, no como la idea de estar de pie ante Dios. «Que están de pie delante de Dios» es más idiomático, más preciso y sigue siendo ampliamente legible en español eclesial.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: θεοῦ = «Dios», ἀγγέλους = «ángeles», σάλπιγγες = «trompetas». La revisión propuesta no altera ninguna decisión teológica mayor; solo mejora la correspondencia léxica de ἑστήκασιν.'
  issues:
  - severity: medium
    issue: «están» para ἑστήκασιν es demasiado reducido
    rationale: ἑστήκασιν, perfecto de ἵστημι, no solo comunica presencia sino el estado de estar de pie/colocados delante de Dios. «Están» pierde parte de ese contenido léxico y deja a la nota hacer demasiado trabajo.
  - severity: low
    issue: La nota actual contiene una alternativa menos natural
    rationale: «han estado de pie» es posible como glosa aspectual, pero en español suena menos natural como alternativa principal. Conviene mantenerla solo como alternativa secundaria dentro de una nota más pulida.
  revised_spanish_text: Y vi a los siete ángeles que están de pie[a] delante de Dios, y se les dieron siete trompetas.
