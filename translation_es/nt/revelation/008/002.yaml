translation:
  language: es
  text: Y vi a los siete ángeles que están de pie[a] delante de Dios, y se les dieron siete trompetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están delante de Dios» o «han estado de pie delante de Dios»; el verbo perfecto griego subraya su posición como un estado continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: BDAG
  rationale: En un relato visionario, el aoristo de ὁράω se expresa naturalmente en español con «vi». Mantiene el carácter de visión sin volverlo arcaico o explicativo.
- source_word: τοὺς ἑπτὰ ἀγγέλους
  english_pob_choice: the seven angels
  chosen_spanish: los siete ángeles
  alternatives_spanish:
  - siete ángeles
  lexicon: BDAG
  rationale: El artículo griego junto con el numeral señala un grupo definido; en español, «los siete ángeles» conserva esa identificación concreta en la visión.
- source_word: ἀγγέλους
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto celestial/apocalíptico apunta a seres angelicales, no a mensajeros humanos. «Ángeles» preserva ese sentido.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: «Delante de Dios» reproduce con naturalidad la relación espacial-relacional de ἐνώπιον. «Ante Dios» también sería posible, pero «delante de Dios» resulta más fluido en español bíblico contemporáneo.
- source_word: ἑστήκασιν
  english_pob_choice: stand
  chosen_spanish: están[a]
  alternatives_spanish:
  - están de pie
  - permanecen en pie
  - han estado de pie
  lexicon: BDAG
  rationale: 'El perfecto de ἵστημι expresa un estado presente resultante: están en una postura estable delante de Dios. En español, «están» comunica ese estado sin forzar una perífrasis pesada; la nota conserva la alternativa aspectual que el inglés POB documenta.'
- source_word: ἐδόθησαν αὐτοῖς
  english_pob_choice: were given to them
  chosen_spanish: se les dieron
  alternatives_spanish:
  - les fueron dadas
  - recibieron
  lexicon: BDAG
  rationale: El pasivo griego deja implícito al dador. «Se les dieron» mantiene ese pasivo en español y evita convertir la frase en activa con «recibieron».
- source_word: σάλπιγγες
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - clarines
  - cornetas
  lexicon: BDAG
  rationale: En la imaginería apocalíptica, «trompetas» es el equivalente claro y estándar para σάλπιγγες.
theological_decisions:
- issue: Estado continuo de los ángeles delante de Dios
  english_pob_reading: who stand before God; the Greek perfect verb emphasizes their standing as an ongoing state.
  chosen_spanish_reading: que están delante de Dios
  alternative_spanish_readings:
  - que están de pie delante de Dios
  - que permanecen delante de Dios
  - que han estado de pie delante de Dios
  rationale: La traducción evita definir rango angelical o tradición posterior, y conserva la idea de una स्थिति estable ante Dios. La nota explica que el griego perfecto aporta un matiz de estado continuo, sin resolverlo con una interpretación más precisa de lo que el texto dice.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy over later tradition.'
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del texto base: no hay revisiones aplicadas y el consenso de revisión es alto/agregado de acuerdo total. La redacción española sigue de cerca el sentido del griego y del audit trail inglés sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se traduce σάλπιγγες como «trompetas», no con un término más litúrgico o arcaico.
  - No se especifica rango angelical; la frase queda abierta como en el griego.
  - La nota de pie marca la ambigüedad aspectual del perfecto ἑστήκασιν sin sobretraducirla en el texto principal.
