translation:
  language: es
  text: Y el segundo ángel tocó la trompeta[a]; y algo semejante a una gran montaña ardiendo en fuego fue arrojado al mar, y un tercio del mar se convirtió en sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como una gran montaña ardiendo en fuego'; el griego marca semejanza, no necesariamente identidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσάλπισεν
  english_pob_choice: sounded the trumpet
  chosen_spanish: tocó la trompeta
  alternatives_spanish:
  - sonó la trompeta
  - hizo sonar la trompeta
  lexicon: BDAG
  rationale: El verbo griego σαλπίζω significa tocar o hacer sonar una trompeta. En español, 'tocó la trompeta' expresa de forma natural la acción implícita sin añadir un objeto extraño al texto.
- source_word: ὡς
  english_pob_choice: something like
  chosen_spanish: algo semejante a
  alternatives_spanish:
  - como
  - parecido a
  lexicon: BDAG
  rationale: ὡς marca comparación o semejanza, no identidad. 'Algo semejante a' conserva esa cautela y evita resolver si la imagen es literal o simbólica.
- source_word: ὄρος μέγα
  english_pob_choice: a great mountain
  chosen_spanish: una gran montaña
  alternatives_spanish:
  - una montaña grande
  - una montaña enorme
  lexicon: BDAG
  rationale: '''Gran montaña'' conserva el tono elevado del griego y mantiene la imagen apocalíptica sin volverla coloquial.'
- source_word: πυρὶ καιόμενον
  english_pob_choice: burning with fire
  chosen_spanish: ardiendo con fuego
  alternatives_spanish:
  - en llamas
  - ardiente con fuego
  lexicon: BDAG
  rationale: La combinación dativo + participio expresa una montaña 'ardiendo con fuego'. 'Ardiendo con fuego' reproduce bien la imagen sin interpretar su origen o naturaleza.
- source_word: ἐβλήθη
  english_pob_choice: was thrown
  chosen_spanish: fue arrojado
  alternatives_spanish:
  - fue lanzado
  - fue echado
  lexicon: BDAG
  rationale: El aoristo pasivo indica que algo fue lanzado/arrojado. 'Fue arrojado' es natural en español y preserva la fuerza pasiva del verbo.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - al mar profundo
  - en el mar
  lexicon: BDAG
  rationale: θάλασσα suele renderizarse 'mar'. 'Al mar' fluye bien en español y mantiene el sentido de movimiento hacia dentro del mar.
- source_word: τὸ τρίτον τῆς θαλάσσης
  english_pob_choice: a third of the sea
  chosen_spanish: la tercera parte del mar
  alternatives_spanish:
  - un tercio del mar
  - la tercera parte de la mar
  lexicon: BDAG
  rationale: La expresión partitiva se vierte de manera directa y natural en español como 'la tercera parte del mar', conservando la medida exacta del juicio.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: BDAG
  rationale: αἷμα significa 'sangre'. No se añade expansión interpretativa; el texto declara que el mar se convirtió en sangre.
theological_decisions:
- issue: Naturaleza de la imagen de la gran montaña
  english_pob_reading: Render the comparison without identifying the object literally or symbolically beyond the Greek wording.
  chosen_spanish_reading: Mantener la comparación sin decidir si se trata de una montaña literal, un objeto meteórico u otra imagen simbólica.
  alternative_spanish_readings:
  - una montaña literal
  - un meteorito
  - un símbolo del juicio
  rationale: El griego usa ὡς para señalar semejanza. La traducción debe conservar la tensión apocalíptica y no cerrar el sentido más allá de lo que el texto afirma.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el criterio POB de equivalencia óptima: conserva la comparación de ὡς, el pasivo de ἐβλήθη y la medida exacta de τὸ τρίτον sin añadir explicaciones no presentes en el pasaje. No hubo revisiones aplicadas en el texto fuente inglés; se mantuvo la lectura auditada.'
  spanish_consistency_notes:
  - Se usa 'mar' para θάλασσα, en concordancia con el valor léxico básico del término.
  - Se mantiene 'sangre' sin expansión para αἷμα.
  - La nota de pie de página marca explícitamente la semejanza indicada por ὡς, como en el inglés auditado.
  - El orden sintáctico sigue el flujo narrativo del griego y del POB inglés, pero con estructura natural en español.
