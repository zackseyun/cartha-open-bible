translation:
  language: es
  text: Cuando una mujer está dando a luz[a], tiene tristeza porque le ha llegado su hora; pero cuando ya ha dado a luz al niño, ya no se acuerda de la angustia[b] por el gozo de que ha nacido una criatura[c] al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'cuando una mujer está en labor de parto'. El griego τίκτῃ puede expresar el proceso de dar a luz; aquí se ha traducido de forma directa y natural.
    reason: lexical_alternative
  - marker: b
    text: O, 'del sufrimiento' o 'de la aflicción'. θλῖψις puede abarcar dolor intenso, aflicción o angustia; en este contexto se ha preferido 'angustia'.
    reason: lexical_alternative
  - marker: c
    text: O, 'ha nacido un ser humano' o 'ha nacido una persona'. El griego ἄνθρωπος es genérico aquí; 'una criatura' busca expresar de forma natural en español la referencia a un nuevo ser humano sin implicar sexo masculino.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: En esta ilustración general sobre el parto, 'mujer' expresa el sentido llano mejor que 'esposa', que introduciría una relación no presente en el contexto.
- source_word: ὅταν τίκτῃ
  english_pob_choice: when a woman is giving birth
  chosen_spanish: cuando una mujer está dando a luz
  alternatives_spanish:
  - cuando una mujer pare
  - cuando está en labor de parto
  lexicon: BDAG
  rationale: La construcción con ὅταν expresa una situación general y concurrente. 'Está dando a luz' conserva el proceso en curso sin volverlo demasiado técnico o demasiado interpretativo.
- source_word: λύπην ἔχει
  english_pob_choice: has sorrow
  chosen_spanish: tiene dolor
  alternatives_spanish:
  - tiene tristeza
  - está afligida
  - sufre dolor
  lexicon: BDAG
  rationale: Aunque λύπη suele abarcar tristeza, pena o angustia, en el contexto del parto el sufrimiento físico es central. 'Tiene dolor' comunica bien la experiencia sin perder que se trata de una aflicción real del momento.
- source_word: ἡ ὥρα αὐτῆς
  english_pob_choice: her hour
  chosen_spanish: le ha llegado su hora
  alternatives_spanish:
  - ha llegado su hora
  - ha venido su hora
  lexicon: BDAG
  rationale: '''Hora'' conserva el eco joánico del término ὥρα, y la formulación ''le ha llegado'' expresa con naturalidad que ese momento señalado ha llegado para ella.'
- source_word: γεννήσῃ τὸ παιδίον
  english_pob_choice: has given birth to the child
  chosen_spanish: ya ha dado a luz al niño
  alternatives_spanish:
  - ya ha parido al niño
  - ya ha dado a luz al hijo
  - ya ha alumbrado al niño
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras ὅταν señala el hecho consumado. 'Ya ha dado a luz' refleja la completitud, y 'al niño' traduce παιδίον en su sentido ordinario y concreto.
- source_word: οὐκέτι μνημονεύει
  english_pob_choice: she no longer remembers
  chosen_spanish: ya no se acuerda
  alternatives_spanish:
  - ya no recuerda
  - ya no tiene presente
  lexicon: BDAG
  rationale: μνημονεύω puede traducirse por recordar o tener presente. 'Ya no se acuerda' suena natural en español y preserva la idea de que la angustia deja de ocupar su mente.
- source_word: τῆς θλίψεως
  english_pob_choice: the distress
  chosen_spanish: de la angustia
  alternatives_spanish:
  - del sufrimiento
  - de la aflicción
  - de la tribulación
  lexicon: BDAG
  rationale: En este contexto, θλῖψις no apunta tanto a un término técnico escatológico como al sufrimiento severo del parto. 'Angustia' mantiene esa carga emotiva y evita importar un matiz doctrinal ajeno.
- source_word: διὰ τὴν χαρὰν
  english_pob_choice: because of the joy
  chosen_spanish: por el gozo
  alternatives_spanish:
  - a causa del gozo
  - debido al gozo
  - por la alegría
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. 'Por el gozo' es breve, claro y fiel al motivo que desplaza la memoria del dolor.
- source_word: ὅτι ἐγεννήθη
  english_pob_choice: that ... has been born
  chosen_spanish: de que ha nacido
  alternatives_spanish:
  - que ha nacido
  - porque ha nacido
  lexicon: BDAG
  rationale: Aquí ὅτι introduce el contenido o fundamento del gozo. 'De que ha nacido' suena natural en español después de 'el gozo' y conserva la fuerza explicativa.
- source_word: ἄνθρωπος
  english_pob_choice: a child
  chosen_spanish: un niño
  alternatives_spanish:
  - un ser humano
  - una persona
  - un hombre
  lexicon: BDAG
  rationale: Aunque ἄνθρωπος puede ser genérico, el contexto del parto permite una referencia natural al recién nacido. 'Niño' comunica bien el resultado del parto sin marcar sexo de manera teológica innecesaria.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - al mundo
  - dentro del mundo
  lexicon: BDAG
  rationale: La preposición εἰς con acusativo marca entrada o llegada. 'En el mundo' es una forma idiomática y clara en español para expresar el ingreso a la esfera de la vida humana.
theological_decisions:
- issue: Sentido de ἄνθρωπος en el final de la comparación
  english_pob_reading: a child has been born into the world
  chosen_spanish_reading: ha nacido un niño en el mundo
  alternative_spanish_readings:
  - ha nacido una persona en el mundo
  - ha nacido un ser humano en el mundo
  - ha nacido un hombre en el mundo
  rationale: La evidencia del contexto de parto favorece una referencia al recién nacido sin necesidad de subrayar 'hombre' como varón. El español 'niño' recoge el sentido idiomático de la escena y mantiene la referencia a un nacimiento humano concreto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Tensión entre λύπη/θλῖψις y el dolor físico del parto
  english_pob_reading: has sorrow ... the distress
  chosen_spanish_reading: tiene dolor ... la angustia
  alternative_spanish_readings:
  - tiene tristeza ... el sufrimiento
  - siente aflicción ... la angustia
  rationale: La oración mezcla términos de dolor y aflicción. En español conviene distinguir el malestar físico del parto ('dolor') y la carga de aflicción ('angustia') sin borrar la resonancia emocional del texto.
  doctrine_reference: Lexical fidelity principle in POB translation philosophy
- issue: Valor de ὥρα en un dicho joánico
  english_pob_reading: her hour
  chosen_spanish_reading: su hora
  alternative_spanish_readings:
  - su momento
  - su tiempo
  rationale: Conservar 'hora' preserva la posible resonancia temática del Evangelio de Juan, donde ὥρα suele tener peso teológico además de referir al momento concreto del parto.
  doctrine_reference: Johannine usage of ὥρα in John
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió 'child' frente a 'human being' para ἄνθρωπος por la naturalidad idiomática del contexto de parto. La versión española adopta el mismo criterio contextual, usando 'niño' como equivalente natural y no sexista del recién nacido. También conserva el valor de 'hour' mediante 'su hora' y mantiene la causalidad de διά + acusativo con 'por'.
  spanish_consistency_notes:
  - Se usa 'mujer' para γυνή, coherente con un ejemplo genérico de parto.
  - Se conserva 'hora' para ὥρα por consistencia joánica.
  - '''Dar a luz'' traduce el proceso de parto de manera pública y digna.'
  - '''Angustia'' para θλῖψις mantiene la amplitud emocional sin volverla término técnico.'
  - '''Niño'' para ἄνθρωπος refleja el contexto idiomático del nacimiento y evita marcar el sexo del recién nacido como rasgo teológico.'
