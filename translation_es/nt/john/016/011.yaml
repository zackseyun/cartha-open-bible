translation:
  language: es
  text: y en cuanto al juicio[a], porque el gobernante[b] de este mundo ha sido juzgado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «respecto del juicio».
    reason: lexical_alternative
  - marker: b
    text: O «el príncipe de este mundo». Probablemente se refiere a Satanás; compárese Juan 12:31 y 14:30.
    reason: lexical_alternative_cross_reference
  - marker: c
    text: O «está juzgado». El perfecto griego enfatiza un juicio concluido con efecto permanente.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ κρίσεως
  english_pob_choice: and concerning judgment
  chosen_spanish: y en cuanto al juicio[a]
  alternatives_spanish:
  - y acerca del juicio[a]
  - y respecto del juicio[a]
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema; en español, "en cuanto a" comunica bien el sentido temático sin sonar forzado. Conservo κρίσις como "juicio", equivalente directo y natural en este contexto johánico.
- source_word: ὁ ἄρχων
  english_pob_choice: the ruler
  chosen_spanish: el príncipe[b]
  alternatives_spanish:
  - el gobernante[b]
  - el ruler
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefirió "ruler", en español "príncipe" es una opción tradicional y semánticamente válida para ἄρχων en este sintagma, especialmente porque el propio POB registró esta alternativa léxica. Se mantiene además la nota para no borrar la identificación probable con Satanás.
- source_word: τοῦ κόσμου τούτου
  english_pob_choice: of this world
  chosen_spanish: de este mundo
  alternatives_spanish:
  - de este siglo
  - de este orden mundial
  lexicon: BDAG
  rationale: κόσμος se mantiene como "mundo" según el uso joánico estándar; "de este mundo" reproduce el genitivo con naturalidad en español.
- source_word: κέκριται
  english_pob_choice: has been judged
  chosen_spanish: ha sido juzgado[c]
  alternatives_spanish:
  - está juzgado[c]
  - ha sido condenado[c]
  lexicon: BDAG
  rationale: El perfecto pasivo de κρίνω se expresa bien con "ha sido juzgado", que conserva la voz pasiva y el resultado vigente. "Está juzgado" sigue siendo una alternativa válida para el matiz resultativo, pero la forma elegida suena más equilibrada en español.
theological_decisions:
- issue: Identidad de 'el príncipe de este mundo'
  english_pob_reading: Retain the expression without naming Satan explicitly in the main text.
  chosen_spanish_reading: Mantener la expresión "el príncipe de este mundo" sin nombrar a Satanás en el cuerpo principal.
  alternative_spanish_readings:
  - el gobernante de este mundo
  - Satanás, el príncipe de este mundo
  rationale: El texto griego usa un título, no el nombre propio. En español, "príncipe" permite conservar esa forma titulada y la nota complementa la identificación probable sin imponerla al texto principal.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Fuerza de κέκριται
  english_pob_reading: Translate as 'has been judged' rather than 'has been condemned.'
  chosen_spanish_reading: Traducir como "ha sido juzgado".
  alternative_spanish_readings:
  - está juzgado
  - ha sido condenado
  rationale: '"Juzgado" preserva el alcance léxico de κρίνω sin estrecharlo a "condenado". La nota permite reconocer el efecto resultativo del perfecto sin perder la base verbal del original.'
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; optimal equivalence.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador anterior falló solo por carecer de anclajes de nota. Esta versión inserta [a], [b] y [c] exactamente en el texto, manteniendo la decisión léxica y teológica auditada.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" porque el versículo no contiene el nombre divino.
  - '"Juzgado" conserva el valor de κρίνω sin añadir la idea de condena como traducción principal.'
  - Se mantuvo "mundo" para κόσμος siguiendo el patrón joánico y el audit trail inglés.
