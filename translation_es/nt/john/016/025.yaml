  text: Ταῦτα ἐν παροιμίαις λελάληκα ὑμῖν· ⸀ἔρχεται ὥρα ὅτε οὐκέτι ἐν παροιμίαις λαλήσω ὑμῖν ἀλλὰ παρρησίᾳ περὶ τοῦ πατρὸς ⸀ἀπαγγελῶ ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/025.yaml
  text: I have spoken these things to you in figures of speech[a]. An hour is coming when I will no longer speak to you in figures of speech[c][b], but will tell you plainly about the Father.
  footnotes:
