    text: Or 'parables' or 'veiled sayings'; the Greek word here refers to figurative or indirect speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'A time is coming.' John often uses 'hour' with theological significance.
    reason: lexical_alternative
  - marker: c
    text: Or 'openly' or 'with frankness'; here the sense is direct, non-figurative speech.
    reason: lexical_alternative
