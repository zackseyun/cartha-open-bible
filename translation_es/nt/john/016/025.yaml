translation:
  language: es
  text: Les he hablado estas cosas en lenguaje figurado[a]. Se acerca una hora en que ya no les hablaré en lenguaje figurado[b], sino que les diré claramente[c] acerca del Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parábolas» o «dichos velados»; la palabra griega aquí se refiere a habla figurada o indirecta.
    reason: lexical_alternative
  - marker: b
    text: O «Se acerca un tiempo». En Juan, «hora» suele tener peso teológico.
    reason: lexical_alternative
  - marker: c
    text: O «abiertamente» o «con franqueza»; aquí el sentido es directo, no figurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo plural neutro se expresa de modo natural con «estas cosas», manteniendo la referencia a lo ya dicho sin forzar un sustantivo más específico que el griego no da.
- source_word: ἐν παροιμίαις
  english_pob_choice: in figures of speech
  chosen_spanish: en figuras de lenguaje
  alternatives_spanish:
  - en parábolas
  - en dichos velados
  - en lenguaje figurado
  lexicon: BDAG
  rationale: En Juan, παροιμία apunta a habla figurada o indirecta, no a la parábola sinóptica estricta. «Figuras de lenguaje» comunica bien ese carácter figurado y evita importar un tecnicismo ajeno al contexto.
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: les he hablado
  alternatives_spanish:
  - les he dicho
  - les he hablado ya
  lexicon: BDAG
  rationale: El perfecto conserva la acción concluida con relevancia presente. «Les he hablado» preserva el paralelismo con λαλήσω y mantiene el énfasis en el acto de hablar.
- source_word: ἔρχεται ὥρα
  english_pob_choice: An hour is coming
  chosen_spanish: Viene una hora
  alternatives_spanish:
  - Llega una hora
  - Se acerca una hora
  - Viene el momento
  lexicon: BDAG
  rationale: Se conserva la dicción joánica de «hora», que tiene peso teológico en Juan. «Viene una hora» suena natural en español y no reduce el término a «tiempo» en el texto principal.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - nunca más
  lexicon: BDAG
  rationale: «Ya no» expresa con naturalidad la cesación futura en contraste con la acción anterior, sin añadir intensidad indebida.
- source_word: λαλήσω
  english_pob_choice: I will speak
  chosen_spanish: les hablaré
  alternatives_spanish:
  - les diré
  - les hablaré más
  lexicon: BDAG
  rationale: Se mantiene la raíz de «hablar» para conservar la cohesión léxica con λελάληκα y el énfasis en el acto verbal.
- source_word: παρρησίᾳ
  english_pob_choice: plainly
  chosen_spanish: claramente
  alternatives_spanish:
  - abiertamente
  - con franqueza
  - de modo claro
  lexicon: BDAG
  rationale: Aquí el contraste es con el habla figurada, así que el sentido es de claridad/directez, no principalmente de valentía. «Claramente» expresa la oposición textual de manera natural en español.
- source_word: ἀπαγγελῶ
  english_pob_choice: will tell
  chosen_spanish: les anunciaré
  alternatives_spanish:
  - les declararé
  - les diré
  - les informaré
  lexicon: BDAG
  rationale: En este contexto, Jesús pasa de lenguaje indirecto a una comunicación directa acerca del Padre. «Anunciaré» comunica bien ese acto de comunicación definida sin perder la fuerza de divulgación del verbo.
- source_word: περὶ τοῦ πατρὸς
  english_pob_choice: about the Father
  chosen_spanish: acerca del Padre
  alternatives_spanish:
  - sobre el Padre
  - en cuanto al Padre
  - acerca de mi Padre
  lexicon: BDAG
  rationale: «Acerca del Padre» conserva la relación temática y teológica de πατήρ en el contexto joánico sin sobreactuar la formalidad.
theological_decisions:
- issue: Valor teológico de ὥρα en Juan
  english_pob_reading: An hour is coming
  chosen_spanish_reading: Viene una hora
  alternative_spanish_readings:
  - Viene el momento
  - Llega una hora
  - Viene la hora
  rationale: Se preserva la terminología joánica de la «hora», cargada de resonancia teológica, sin convertirla innecesariamente en «tiempo» en el texto principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Contraste entre habla figurada y habla clara en παρρησίᾳ
  english_pob_reading: plainly
  chosen_spanish_reading: claramente
  alternative_spanish_readings:
  - abiertamente
  - con franqueza
  - de modo claro
  rationale: El versículo contrasta comunicación indirecta con comunicación directa. «Claramente» mantiene esa tensión sin desplazar el énfasis hacia la valentía pública.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: No se registraron revisiones posteriores; el estado más reciente coincide con la lectura auditada de alta concordancia y no requiere ajustes.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por tratarse de la referencia joánica a Dios Padre.
  - Se preserva la repetición de la raíz verbal «hablar» para reflejar el paralelismo de λελάληκα / λαλήσω.
  - Se evita sustituir sistemáticamente «hora» por «tiempo» en el cuerpo principal para conservar la resonancia joánica documentada.
