translation:
  language: es
  text: He aquí,[a] viene la hora, y ya ha llegado, cuando ustedes serán esparcidos, cada uno a lo suyo, y me dejarán solo. Pero no estoy solo, porque el Padre está conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno a su casa / lugar / cosas». El griego es más amplio que una ubicación específica y puede referirse, en general, a lo que pertenece a cada uno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡He aquí!
  - Vean
  lexicon: BDAG
  rationale: El griego funciona como marcador de atención solemne. En español, «¡Miren!» conserva esa llamada directa sin sonar arcaica, y evita una fórmula demasiado litúrgica que podría endurecer el tono.
- source_word: ἔρχεται ὥρα καὶ ἐλήλυθεν
  english_pob_choice: an hour is coming, and has come
  chosen_spanish: Viene la hora, y ya ha llegado
  alternatives_spanish:
  - La hora viene, y ha venido
  - Viene la hora, y ha venido
  lexicon: BDAG
  rationale: 'Se preserva la tensión del presente y el perfecto: el momento es inminente y, a la vez, ya presente. «Viene la hora» reproduce bien el valor idiomático joánico; «ya ha llegado» expresa el matiz de cumplimiento sin forzar una explicación.'
- source_word: ἵνα
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - para que
  - de modo que
  lexicon: BDAG
  rationale: Aquí ἵνα introduce el contenido temporal de la hora más que una finalidad. «Cuando» es la opción española natural que conserva ese valor temporal/resultativo.
- source_word: σκορπισθῆτε
  english_pob_choice: you will be scattered
  chosen_spanish: serán esparcidos
  alternatives_spanish:
  - serán dispersados
  - se dispersarán
  lexicon: BDAG
  rationale: «Esparcidos» comunica la imagen de ser separados unos de otros y conserva la pasiva. «Dispersados» también sería válido, pero «esparcidos» suena más cercano al campo semántico de la imagen sin perder claridad.
- source_word: ἕκαστος εἰς τὰ ἴδια
  english_pob_choice: each to his own
  chosen_spanish: cada uno a lo suyo
  alternatives_spanish:
  - cada uno a su casa
  - cada uno a lo que es suyo
  lexicon: BDAG
  rationale: τὰ ἴδια es más amplio que «casa»; puede abarcar lo propio de cada uno, su esfera, su entorno o sus pertenencias. «A lo suyo» preserva esa amplitud y evita especificar indebidamente.
- source_word: κἀμὲ μόνον ἀφῆτε
  english_pob_choice: and will leave me alone
  chosen_spanish: y me dejarán solo
  alternatives_spanish:
  - y me abandonarán solo
  - y me dejarán a solas
  lexicon: BDAG
  rationale: «Dejar» mantiene el valor básico de ἀφίημι aquí, sin intensificar más de lo que el contexto exige. «Solo» transmite la soledad relacional del dicho; «abandonarán» sería posible, pero añade mayor carga emocional que la del griego inmediato.
- source_word: καὶ οὐκ εἰμὶ μόνος
  english_pob_choice: Yet I am not alone
  chosen_spanish: Pero no estoy solo
  alternatives_spanish:
  - Y no estoy solo
  - Sin embargo, no estoy solo
  lexicon: BDAG
  rationale: 'El contraste con la cláusula anterior se expresa mejor en español con «Pero». Se mantiene el sentido de oposición: aunque los discípulos lo dejan, Jesús no queda realmente solo.'
- source_word: ὅτι ὁ πατὴρ μετ’ ἐμοῦ ἐστιν
  english_pob_choice: because the Father is with me
  chosen_spanish: porque el Padre está conmigo
  alternatives_spanish:
  - porque el Padre está con Él
  - ya que el Padre está conmigo
  lexicon: BDAG
  rationale: «Conmigo» reproduce con naturalidad μετ’ ἐμοῦ y mantiene la relación personal del texto. «Está conmigo» preserva la presencia acompañante del Padre sin doctrinas añadidas.
theological_decisions:
- issue: Valor de ἵνα en una cláusula tras «viene la hora»
  english_pob_reading: when
  chosen_spanish_reading: cuando
  alternative_spanish_readings:
  - para que
  - de modo que
  rationale: Se evita convertir la cláusula en propósito, porque el contexto describe el contenido del momento anunciado. «Cuando» conserva la relación temporal sin suavizar la estructura del dicho.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Tensión entre el abandono de los discípulos y la compañía del Padre
  english_pob_reading: Yet I am not alone, because the Father is with me
  chosen_spanish_reading: Pero no estoy solo, porque el Padre está conmigo
  alternative_spanish_readings:
  - Y no estoy solo, porque el Padre está conmigo
  - Sin embargo, no estoy solo, porque el Padre está conmigo
  rationale: 'La versión conserva la paradoja del versículo: Jesús puede ser dejado por los discípulos y, al mismo tiempo, no estar solo. No se atenúa ni se amplía esa afirmación con formulaciones doctrinales externas.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Alcance de τὰ ἴδια
  english_pob_reading: each to his own
  chosen_spanish_reading: cada uno a lo suyo
  alternative_spanish_readings:
  - cada uno a su casa
  - cada uno a su propio lugar
  rationale: La expresión griega es deliberadamente amplia. Traducirla como «a su casa» limitaría indebidamente el sentido; «a lo suyo» deja abierta la amplitud de lo propio de cada uno, como en el audit trail inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'Se revisó el rastro inglés y la lectura griega. No se observaron cambios posteriores en el pasaje (latest_revision_pass: unchanged); la presente redacción sigue la decisión ya establecida para ἔρχεται ὥρα καὶ ἐλήλυθεν, ἵνα, σκορπισθῆτε y τὰ ἴδια, manteniendo el equilibrio entre literalidad y español natural.'
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por tratarse del título relacional en boca de Jesús.
  - Se evita «SEÑOR» para el nombre divino porque el versículo habla del Padre y no contiene YHWH explícito en la superficie textual.
  - «Esparcidos» y «a lo suyo» conservan la imagen sin sobreespecificar «casa» o «hogar».
  - La puntuación reproduce el contraste del griego con una pausa fuerte antes de la última cláusula.
