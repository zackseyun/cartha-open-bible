translation:
  language: es
  text: 'Entonces algunos de sus discípulos se decían unos a otros[a]: «¿Qué es esto que nos dice: “Dentro de poco ya no me verán, y otra vez dentro de poco me verán”? Y: “Porque voy al Padre”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que voy al Padre». La conjunción griega puede entenderse tanto como introducción de contenido citado como con sentido causal («porque»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπαν οὖν
  english_pob_choice: So ... said
  chosen_spanish: Entonces ... se dijeron
  alternatives_spanish:
  - Así que ... se dijeron
  - Por eso ... se dijeron
  lexicon: BDAG
  rationale: οὖν marca continuación inferencial o narrativa; «Entonces» preserva ese avance discursivo de manera natural en español. El verbo en plural con dativo recíproco se expresa bien con «se dijeron entre sí».
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: some of his disciples
  chosen_spanish: algunos de sus discípulos
  alternatives_spanish:
  - unos de sus discípulos
  - ciertos discípulos suyos
  lexicon: BDAG
  rationale: ἐκ señala un subconjunto del grupo, no todos. «Algunos de sus discípulos» mantiene esa restricción partitiva sin forzar una paráfrasis.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: se dijeron entre sí
  alternatives_spanish:
  - hablaron entre ellos
  - se hablaron mutuamente
  lexicon: BDAG
  rationale: La expresión recíproca indica conversación mutua. En español, el giro pronominal refleja con naturalidad la interacción entre los discípulos.
- source_word: Τί ἐστιν τοῦτο ὃ λέγει ἡμῖν
  english_pob_choice: What is this that he is saying to us
  chosen_spanish: ¿Qué es esto que nos está diciendo?
  alternatives_spanish:
  - ¿Qué significa esto que nos dice?
  - ¿Qué es esto que nos dice?
  lexicon: BDAG
  rationale: La pregunta conserva el desconcierto de los discípulos. «Nos está diciendo» reproduce el presente λέγει con una construcción natural en español y evita explicar de más.
- source_word: Μικρὸν
  english_pob_choice: A little while
  chosen_spanish: Un poco
  alternatives_spanish:
  - Un breve momento
  - Un poco de tiempo
  lexicon: BDAG
  rationale: Aunque el valor es temporal, en español «un poco» puede sonar más natural dentro de la cita repetida; el contexto temporal queda claro por la estructura. Se conserva así la brevedad repetitiva del original sin añadir una interpretación demasiado explicada.
- source_word: θεωρεῖτέ με
  english_pob_choice: you will not see me
  chosen_spanish: no me verán
  alternatives_spanish:
  - no me contemplarán
  - no me observarán
  lexicon: BDAG
  rationale: θεωρέω aquí se entiende en sentido visual/perceptivo. «Verán» mantiene la correspondencia con la segunda mitad y conserva el paralelismo retórico.
- source_word: ὄψεσθέ με
  english_pob_choice: you will see me
  chosen_spanish: me verán
  alternatives_spanish:
  - me contemplarán
  - me observarán
  lexicon: BDAG
  rationale: ὄψεσθέ es futuro de ver; se traduce con «verán» para sostener el paralelismo con θεωρεῖτέ y mantener la repetición audible en español.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: «Otra vez» es idiomático y conserva la repetición enfática del texto griego.
- source_word: Ὅτι ὑπάγω πρὸς τὸν πατέρα
  english_pob_choice: Because I am going to the Father
  chosen_spanish: Porque voy al Padre
  alternatives_spanish:
  - Que voy al Padre
  - Dado que voy al Padre
  lexicon: BDAG
  rationale: Ὅτι puede leerse como causal o como introducción de contenido citado. En el cuerpo principal se adopta la lectura causal, siguiendo el POB inglés, y se preserva la alternativa de contenido en nota. «Voy al Padre» mantiene la formulación breve y directa del pasaje.
- source_word: πατέρα
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - mi Padre
  lexicon: BDAG
  rationale: 'El griego tiene artículo definido: τὸν πατέρα. Se conserva «el Padre» en vez de armonizarlo con «mi Padre», para no borrar la forma textual concreta.'
theological_decisions:
- issue: Relación entre la partida de Jesús y su regreso implícito
  english_pob_reading: The translation preserves the disciples' uncertainty without specifying whether Jesus refers to his death/resurrection, ascension, post-resurrection appearances, or the coming of the Spirit.
  chosen_spanish_reading: La traducción conserva la incertidumbre de los discípulos sin precisar si Jesús se refiere a su muerte y resurrección, a la ascensión, a apariciones posteriores o a la venida del Espíritu.
  alternative_spanish_readings:
  - muerte y resurrección
  - ascensión y presencia espiritual
  - apariciones posteriores a la resurrección
  rationale: El verso no resuelve el referente; la ambigüedad forma parte del efecto narrativo y no debe cerrarse en la traducción principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el estado revisado del POB inglés que prefirió «is saying to us» frente a «is telling us». En español se reflejó con una construcción equivalente y natural («nos está diciendo»), sin añadir interpretación adicional. Se mantuvo también la nota sobre la posible ambigüedad de ὅτι, conforme al audit trail más reciente.
  spanish_consistency_notes:
  - Se usa «discípulos» y no otra etiqueta eclesiástica para mantener la correspondencia directa con μαθηταί.
  - Se preserva el paralelismo verbal de la cita con dos ocurrencias de «verán» para reflejar la repetición retórica del griego.
  - Se mantuvo «el Padre» conforme al artículo griego, sin armonizarlo a una forma posesiva no presente en el texto.
