base_translation:
  language: en
  yaml_path: translation/nt/john/016/017.yaml
  text: 'So some of his disciples said to one another[a], “What is this that he is saying to us: ‘A little while, and you will not see me, and again a little while, and you will see me’? And, ‘Because I am going to the Father’?”'
  footnotes:
  - marker: a
    text: Or, “That I am going to the Father.” The Greek conjunction can be understood either as introducing quoted content or with a causal sense (“because”).
    reason: lexical_alternative
