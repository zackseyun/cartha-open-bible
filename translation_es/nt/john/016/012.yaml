review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Ἔτι = «Todavía», πολλὰ = «muchas cosas», ἔχω ... λέγειν = «tengo muchas cosas que decirles», ἀλλ’ = «pero», ἄρτι = «ahora». Sin embargo, «no las pueden llevar» no expresa de manera suficientemente natural y fiel el valor metafórico de βαστάζειν en este contexto. En español, «llevar» con objeto directo «las» sugiere transportar cosas físicamente más que soportar o cargar con el peso de una revelación. El sentido documentado por el POB inglés es ‘bear/endure/carry’ con tensión preservada; «soportar» o «cargar con» comunican mejor esa capacidad insuficiente sin reducirla solo a comprensión.'
  spanish_quality_summary: La frase general es clara, pero «no las pueden llevar» suena poco idiomática en español bíblico natural y puede distraer al lector. Además, la nota al pie incluye como alternativa exactamente la misma formulación ya usada en el texto, lo cual no añade valor. Una revisión menor mejora fidelidad y legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La revisión propuesta mantiene un español moderno y digno. Se conserva la tensión semántica de βαστάζειν mediante «soportar» en el texto y «cargar con» en nota, en línea con la justificación léxica y teológica inglesa.
  issues:
  - severity: medium
    issue: «no las pueden llevar» es poco natural y demasiado físico para βαστάζειν en este contexto.
    rationale: Aunque βαστάζειν puede incluir la idea de cargar/llevar, en Juan 16:12 el sentido metafórico es soportar o cargar con el peso de una enseñanza adicional. «Llevar» con objeto directo femenino plural en español suena como transportar cosas, no como soportar una carga espiritual o revelacional.
  - severity: low
    issue: La nota al pie repite una alternativa idéntica al texto principal.
    rationale: Si el texto principal dice «llevar», la nota no debe ofrecer «llevar» como variante. Conviene que la nota preserve alternativas reales, como «cargar con ello» o «soportarlo».
  revised_spanish_text: Todavía tengo muchas cosas que decirles[a], pero ahora no las pueden soportar.
  revised_footnotes:
  - marker: a
    text: O «no pueden cargar con ello ahora» o «no las pueden sobrellevar ahora». El verbo griego puede sugerir cargar, llevar o soportar.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «llevar» por «soportar» para producir un español más natural y fiel al valor metafórico de βαστάζειν, preservando la tensión entre cargar, llevar y soportar que documenta el POB inglés. La nota se ajusta para ofrecer alternativas genuinas y no repetir el texto principal.
