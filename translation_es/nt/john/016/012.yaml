revisions:
- from: Todavía tengo muchas cosas que decirles[a], pero ahora no las pueden llevar.
  to: Todavía tengo muchas cosas que decirles[a], pero ahora no las pueden soportar.
  rationale: Se reemplaza «llevar» por «soportar» para producir un español más natural y fiel al valor metafórico de βαστάζειν, preservando la tensión entre cargar, llevar y soportar que documenta el POB inglés. La nota se ajusta para ofrecer alternativas genuinas y no repetir el texto principal.
