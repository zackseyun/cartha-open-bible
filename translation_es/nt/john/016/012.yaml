translation:
  language: es
  text: Todavía tengo muchas cosas que decirles[a], pero ahora no las pueden soportar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no pueden cargar con ello ahora» o «no las pueden sobrellevar ahora». El verbo griego puede sugerir cargar, llevar o soportar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía
  lexicon: BDAG
  rationale: En este contexto, Ἔτι expresa continuidad desde el presente hacia lo que sigue; «todavía» reproduce bien esa idea de que Jesús sigue teniendo algo pendiente por decir.
- source_word: πολλὰ
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - mucho
  - muchas cosas
  lexicon: BDAG
  rationale: El adjetivo neutro plural funciona de manera sustantiva; «muchas cosas» hace explícito el objeto implícito de forma natural en español.
- source_word: ἔχω
  english_pob_choice: have
  chosen_spanish: tengo
  alternatives_spanish:
  - he
  - poseo
  lexicon: BDAG
  rationale: En la construcción ἔχω + infinitivo, el sentido es tener algo pendiente o aún por hacer/decir. «Tengo» conserva esa estructura sin forzar el español.
- source_word: ὑμῖν λέγειν
  english_pob_choice: to say to you
  chosen_spanish: que decirles
  alternatives_spanish:
  - que decir a ustedes
  - que hablarles
  lexicon: BDAG
  rationale: Aunque λέγειν puede ser «decir» o «hablar», aquí la relación con el dativo permite una formulación natural en español. Se eligió «decirles» para mantener la cercanía del complemento pronominal y el valor directo de «decir».
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: BDAG
  rationale: Conjunción adversativa estándar; «pero» es la opción más clara y natural en español moderno.
- source_word: οὐ δύνασθε
  english_pob_choice: you are not able
  chosen_spanish: no las pueden llevar
  alternatives_spanish:
  - no pueden
  - no son capaces de
  lexicon: BDAG
  rationale: δύνασθε expresa capacidad. «No las pueden llevar» mantiene la idea de capacidad junto con la metáfora de carga que continúa en βαστάζειν, evitando reducirla solo a comprensión intelectual.
- source_word: βαστάζειν
  english_pob_choice: to bear them
  chosen_spanish: llevar
  alternatives_spanish:
  - soportar
  - cargar con
  - aguantar
  lexicon: BDAG
  rationale: En este contexto, βαστάζειν conserva la imagen de cargar un peso. «Llevar» es una forma breve y natural que mantiene la metáfora sin cerrarla a un solo matiz, preservando la tensión entre capacidad cognitiva y resistencia espiritual.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por ahora
  - en este momento
  lexicon: BDAG
  rationale: Marca el tiempo presente en contraste con lo que vendrá después; «ahora» es conciso y claro en español.
theological_decisions:
- issue: Sentido de βαστάζειν respecto de la incapacidad presente de los discípulos
  english_pob_reading: The disciples are presently unable to bear the weight of further teaching/revelation.
  chosen_spanish_reading: Los discípulos no pueden cargar ahora con la plenitud de lo que Jesús todavía tiene que decirles.
  alternative_spanish_readings:
  - Los discípulos no pueden entenderlo plenamente ahora
  - Los discípulos no pueden soportarlo ahora
  rationale: La frase española conserva la metáfora de carga sin resolverla solo como comprensión mental o solo como resistencia emocional. «Llevar» deja abierta la capacidad espiritual e intelectual, siguiendo la tensión documentada en el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El último control de revisión indicó que no eran necesarios cambios, con alto grado de acuerdo. La presente redacción sigue ese criterio, manteniendo la misma decisión central sobre βαστάζειν y el matiz temporal de ἄρτι.
  spanish_consistency_notes:
  - Se mantiene «Jesús» en el contexto implícito del versículo por la coherencia del pasaje.
  - Se usa «ahora» para ἄρτι, en armonía con el valor temporal inmediato del griego.
  - Se preserva la metáfora de carga en «llevar» para no neutralizar el verbo βαστάζειν.
