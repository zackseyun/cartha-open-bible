translation:
  language: es
  text: Todo lo que tiene el Padre es mío[a]. Por eso dije que toma de lo que es mío y les declarará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recibe de lo que es mío».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ὅσα
  english_pob_choice: Everything that
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo cuanto
  - Todas las cosas que
  lexicon: BDAG
  rationale: La expresión griega es totalizadora; en español, «Todo lo que» transmite de manera natural la amplitud de «everything that» sin volver la frase pesada o artificial.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  lexicon: BDAG
  rationale: El verbo presente ἔχω se vierte de forma directa con «tiene». «Posee» sería más marcado y menos natural en este contexto relacional.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Padre
  lexicon: BDAG
  rationale: En Juan, ὁ πατήρ es un título relacional para Dios; «el Padre» mantiene esa referencia titular sin introducir terminología distinta.
- source_word: ἐμά
  english_pob_choice: is mine
  chosen_spanish: es mío
  alternatives_spanish:
  - me pertenece
  - es de mí
  lexicon: BDAG
  rationale: El predicativo neutro plural expresa posesión. «Es mío» es la forma más natural en español y conserva la afirmación fuerte de pertenencia compartida con el Padre.
- source_word: διὰ τοῦτο
  english_pob_choice: That is why
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por esta razón
  - Por tanto
  lexicon: BDAG
  rationale: La conexión inferencial se expresa con claridad y naturalidad mediante «Por eso», que mantiene el valor explicativo de la frase griega.
- source_word: εἶπον
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - he dicho
  lexicon: BDAG
  rationale: El aoristo se vierte de manera simple como pasado en español. «Dije» conserva el punto discursivo de la cita de Jesús.
- source_word: ἐκ τοῦ ἐμοῦ
  english_pob_choice: from what is mine
  chosen_spanish: de lo que es mío
  alternatives_spanish:
  - de lo mío
  - de lo mío propio
  lexicon: BDAG
  rationale: La construcción griega es elíptica; «de lo que es mío» explicita el sustantivo implícito sin perder el sentido de procedencia desde aquello que pertenece al Hijo.
- source_word: λαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  lexicon: BDAG
  rationale: «Toma» sigue la lectura principal del audit trail y puede reflejar movimiento desde la fuente. Se mantiene la tensión con la alternativa «recibe», que en español acentuaría más la dependencia receptiva.
- source_word: ἀναγγελεῖ
  english_pob_choice: will declare
  chosen_spanish: se lo anunciará
  alternatives_spanish:
  - lo declarará
  - lo dará a conocer
  lexicon: BDAG
  rationale: El futuro se preserva con «anunciará». El objeto pronominal «se lo» retoma de forma natural lo que procede de Cristo y será comunicado a los discípulos.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  lexicon: BDAG
  rationale: Se adopta el español neutral latinoamericano de la serie POB; «a ustedes» comunica el dativo plural de manera clara y contemporánea.
theological_decisions:
- issue: Relación entre lo que tiene el Padre y lo que es del Hijo
  english_pob_reading: Everything that the Father has is mine
  chosen_spanish_reading: Todo lo que tiene el Padre es mío
  alternative_spanish_readings:
  - Todo lo que el Padre tiene me pertenece
  rationale: La versión española conserva la afirmación directa de posesión compartida sin suavizarla. No se sustituye por una paráfrasis más explícita, para respetar la fuerza cristológica del enunciado.
  doctrine_reference: Credo Niceno-Constantinopolitano (381 d.C.)
- issue: Relación del Espíritu con lo que procede del Hijo
  english_pob_reading: he takes from what is mine
  chosen_spanish_reading: toma de lo que es mío
  alternative_spanish_readings:
  - recibe de lo que es mío
  rationale: Se preserva la ambigüedad semántica entre «tomar» y «recibir» que el audit trail documenta. La forma principal mantiene la línea de la traducción inglesa, y la alternativa queda abierta sin resolver en exceso la relación trinitaria implícita.
  doctrine_reference: 'Principio POB: preservar tensión teológica cuando el texto la permite'
translation_notes:
  revision_awareness: El último pase de revisión del paquete inglés indicó alta concordancia y sin cambios. No se detectaron revisiones aplicadas; por eso la redacción española sigue de cerca la decisión léxica principal del registro inglés y conserva la alternativa relevante en nota.
  spanish_consistency_notes:
  - Se usa «Padre» con mayúscula por su valor titular en Juan.
  - Se mantiene «mío» y no una forma más explicativa como «me pertenece» para no diluir la afirmación posesiva.
  - Se emplea «a ustedes» como registro neutral latinoamericano consistente con el proyecto.
  - Se conserva el futuro en «anunciará» para reflejar ἀναγγελεῖ.
