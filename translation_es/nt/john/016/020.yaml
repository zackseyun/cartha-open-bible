translation:
  language: es
  text: 'En verdad, en verdad les digo: ustedes llorarán y harán duelo, pero el mundo se alegrará; ustedes se entristecerán, pero su tristeza se convertirá en gozo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "se convertirá en alegría".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - Ciertamente, ciertamente
  lexicon: ἀμήν
  rationale: Conserva la repetición enfática solemne del griego de forma natural en español. 'Amén, amén' sería más pegado a la forma, pero en discurso corrido suena menos transparente; 'de cierto' mantiene la fuerza de afirmación sin perder legibilidad.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - yo les digo
  lexicon: λέγω
  rationale: La fórmula directa de habla se expresa de manera natural con 'les digo'. Mantiene el valor discursivo del griego sin añadir énfasis innecesario.
- source_word: κλαύσετε
  english_pob_choice: you will weep
  chosen_spanish: llorarán
  alternatives_spanish:
  - sollozarán
  - van a llorar
  lexicon: κλαίω
  rationale: '''Llorar'' es el equivalente más directo y natural para κλαίω en este contexto de tristeza visible. ''Sollozar'' sería más específico de intensidad, pero el griego no obliga a ese matiz.'
- source_word: θρηνήσετε
  english_pob_choice: mourn
  chosen_spanish: harán duelo
  alternatives_spanish:
  - lamentarán
  - se lamentarán
  lexicon: θρηνέω
  rationale: Se eligió 'hacer duelo' para distinguir este verbo de κλαύσετε y conservar la intensificación del dolor expresado en el griego. 'Lamentar' sería correcto, pero se acerca demasiado a una repetición de 'llorar' en español.
- source_word: ὁ δὲ κόσμος
  english_pob_choice: but the world
  chosen_spanish: pero el mundo
  alternatives_spanish:
  - y el mundo
  - en cambio, el mundo
  lexicon: κόσμος
  rationale: Se mantiene 'el mundo' sin expansión interpretativa, siguiendo el audit trail inglés y preservando la tensión joánica entre los discípulos y el mundo. 'Pero' reproduce bien el contraste de δέ.
- source_word: χαρήσεται
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - estará contento
  lexicon: χαίρω
  rationale: En español, 'alegrarse' comunica bien el contraste emocional y suena más natural que 'regocijarse'. La fuerza del verbo se mantiene sin elevarlo artificialmente.
- source_word: λυπηθήσεσθε
  english_pob_choice: you will be grieved
  chosen_spanish: se entristecerán
  alternatives_spanish:
  - serán afligidos
  - sentirán tristeza
  lexicon: λυπέω
  rationale: '''Entristecerse'' refleja de manera clara el estado pasivo/medio de la forma verbal y conserva una distinción respecto al sustantivo posterior λύπη. ''Ser afligidos'' es posible, pero más formal y menos directo.'
- source_word: ἡ λύπη ὑμῶν
  english_pob_choice: your grief
  chosen_spanish: su tristeza
  alternatives_spanish:
  - su dolor
  - su aflicción
  lexicon: λύπη
  rationale: '''Tristeza'' es la opción más natural en español para λύπη en este verso y mantiene el vínculo semántico con ''se entristecerán''. ''Dolor'' podría funcionar, pero desplaza el matiz emocional hacia lo físico o más intenso.'
- source_word: εἰς χαρὰν γενήσεται
  english_pob_choice: will become joy
  chosen_spanish: se convertirá en gozo
  alternatives_spanish:
  - se volverá alegría
  - acabará en gozo
  lexicon: γίνομαι
  rationale: '''Convertirse en gozo'' expresa adecuadamente el movimiento de cambio que indica εἰς + γενήσεται. ''Gozo'' conserva un registro bíblico digno y distingue la culminación positiva del simple ''alegría'' cotidiana.'
theological_decisions:
- issue: κόσμος como contraparte de los discípulos
  english_pob_reading: Rendered as 'the world' without interpretive expansion.
  chosen_spanish_reading: Se tradujo como 'el mundo' sin ampliarlo a 'mundo incrédulo' ni 'sistema mundano'.
  alternative_spanish_readings:
  - el mundo incrédulo
  - el sistema del mundo
  rationale: El verso no define más el referente que el grupo opuesto a los discípulos, y el audit trail inglés preserva esa amplitud. Mantener 'el mundo' deja visible la tensión joánica sin imponer una explicación interpretativa en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente quedó sin cambios (''unchanged: true''); por eso el español sigue de cerca las decisiones auditadas, especialmente la repetición enfática de ἀμὴν, el contraste κλαύσετε/θρηνήσετε frente a χαρήσεται, y la alternativa final entre ''gozo'' y ''alegría''.'
  spanish_consistency_notes:
  - Se mantiene 'de cierto, de cierto' para la fórmula solemne de ἀμὴν ἀμὴν.
  - Se preserva la distinción entre 'llorar' y 'hacer duelo' para κλαύσετε y θρηνήσετε.
  - '''El mundo'' se conserva sin glosa interpretativa.'
  - '''Gozo'' se usa de forma consistente para χαρά, mientras la nota ofrece ''alegría'' como alternativa estilística.'
  - La puntuación reproduce el avance por contraste del verso con dos miembros unidos por 'pero'.
