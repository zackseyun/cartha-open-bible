review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido general del griego: la doble afirmación solemne, el llanto y lamento de los discípulos, el gozo del mundo, la tristeza futura y su transformación en gozo. También preserva bien la tensión joánica de κόσμος como ''el mundo'' sin expansión interpretativa. Sin embargo, ''De cierto, de cierto'' suena arcaico y demasiado dependiente de tradición RV, no del objetivo de español moderno y digno; además, la nota al pie está mal anclada y no corresponde al lugar del texto donde aparece la variante inglesa documentada.'
  spanish_quality_summary: 'El texto es mayormente claro y natural, pero necesita dos ajustes: 1) modernizar la fórmula ἀμὴν ἀμὴν a ''En verdad, en verdad'' para mejor legibilidad contemporánea sin perder solemnidad; 2) mover la nota al pie al segmento final, porque la alternativa documentada corresponde a ''se convertirá en gozo/alegría'', no a la apertura del versículo. ''Harán duelo'' es entendible, aunque algo menos idiomático que ''se lamentarán''; no obstante, sigue siendo aceptable y conserva la distinción con ''llorarán''.'
  glossary_alignment: 'Sin conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. ''el mundo'' concuerda con la decisión teológica auditada. ''gozo'' es una elección válida y de registro bíblico. La principal desalineación es estilística: ''De cierto'' no encaja bien con la pauta de español moderno y ampliamente legible.'
  issues:
  - severity: medium
    issue: Fórmula inicial 'De cierto, de cierto'
    rationale: Aunque no es semánticamente errónea, suena arcaica y reminiscente de una tradición específica; 'En verdad, en verdad' preserva mejor ἀμὴν ἀμὴν en español contemporáneo y digno.
  - severity: high
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: 'La nota ''O: se convertirá en alegría'' corresponde a εἰς χαρὰν γενήσεται al final del versículo, no a ''De cierto''. El proyecto exige que todo marcador aparezca exactamente en la palabra o frase pertinente.'
  revised_spanish_text: 'En verdad, en verdad les digo: ustedes llorarán y harán duelo, pero el mundo se alegrará; ustedes se entristecerán, pero su tristeza se convertirá en gozo[a].'
