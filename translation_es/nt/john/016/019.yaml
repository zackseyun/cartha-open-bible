translation:
  language: es
  text: 'Jesús supo que querían preguntarle[a], y les dijo: «¿Están discutiendo esto entre ustedes[c], porque dije: “Dentro de poco no me ven, y de nuevo dentro de poco[b] me verán”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «acerca de esto».
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa dos verbos distintos para «ver» aquí: primero θεωρέω, luego ὁράω. El texto principal los vierte ambos con «ver» para conservar el paralelismo y la naturalidad del español.'
    reason: lexical_alternative
  - marker: c
    text: O «que dije». La conjunción griega puede introducir ya sea el contenido de lo que estaban discutiendo o la razón por la que lo discutían.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - se dio cuenta de
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí expresa que Jesús llegó a saber lo que los discípulos pensaban hacer. En español, «supo» comunica esa percepción de manera natural y fiel sin añadir matiz especulativo.
- source_word: ἤθελον
  english_pob_choice: wanted
  chosen_spanish: querían
  alternatives_spanish:
  - deseaban
  - tenían intención de
  lexicon: BDAG
  rationale: El imperfecto indica intención o disposición en curso. «Querían» mantiene ese valor progresivo y suena idiomático en español actual.
- source_word: ἐρωτᾶν
  english_pob_choice: to ask
  chosen_spanish: preguntarle
  alternatives_spanish:
  - interrogarle
  - consultarle
  lexicon: BDAG
  rationale: En este contexto interpersonal, ἐρωτάω es «preguntar». El complemento enclítico «-le» preserva el objeto directo de la acción.
- source_word: Περὶ τούτου
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - acerca de esto
  - sobre esto
  lexicon: BDAG
  rationale: La preposición περί introduce el tema de la conversación. En español, «esto» en el discurso directo ya contiene esa referencia temática y evita una formulación pesada.
- source_word: ζητεῖτε
  english_pob_choice: are you discussing
  chosen_spanish: se están discutiendo
  alternatives_spanish:
  - se están preguntando
  - están debatiendo
  lexicon: BDAG
  rationale: Con μετ’ ἀλλήλων y la cláusula siguiente, ζητέω se refiere aquí al intercambio entre ellos sobre el sentido de las palabras de Jesús. «Se están discutiendo esto» intenta conservar la fuerza recíproca y el tono de indagación interna, aunque suene menos liso que «están hablando de esto».
- source_word: μετ’ ἀλλήλων
  english_pob_choice: with one another
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos con otros
  - entre sí
  lexicon: BDAG
  rationale: La expresión recíproca se puede naturalizar como «entre ustedes» en un contexto de segunda persona plural dirigida a los discípulos. Conserva la idea de interacción mutua.
- source_word: ὅτι εἶπον
  english_pob_choice: because I said
  chosen_spanish: porque dije
  alternatives_spanish:
  - que dije
  - ya que dije
  lexicon: BDAG
  rationale: El ὅτι puede introducir tanto el contenido como la razón del diálogo. Aquí el español «porque dije» refleja bien la lectura causal posible que el texto permite, sin excluir que el comentario de Jesús sea sobre sus propias palabras.
- source_word: Μικρὸν
  english_pob_choice: A little while
  chosen_spanish: Dentro de poco
  alternatives_spanish:
  - por un poco de tiempo
  - un poco más
  lexicon: BDAG
  rationale: El neutro temporal de μικρόν expresa un lapso breve. «Dentro de poco» conserva esa inminencia temporal en un español natural y solemne.
- source_word: θεωρεῖτέ
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - contemplan
  - observan
  lexicon: BDAG
  rationale: θεωρέω puede implicar observar o percibir con atención. En esta cláusula, «ven» preserva la fluidez y el paralelismo con la frase siguiente sin forzar una distinción semántica innecesaria en el cuerpo del texto.
- source_word: οὐ θεωρεῖτέ με
  english_pob_choice: you do not see me
  chosen_spanish: no me ven
  alternatives_spanish:
  - no me están viendo
  - no me contemplan
  lexicon: BDAG
  rationale: La negación simple reproduce fielmente οὐ sin añadir «ya no» o «todavía no». En español, «no me ven» es directo y se ajusta a la revisión del audit trail inglés.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - luego
  lexicon: BDAG
  rationale: El adverbio marca una secuencia repetida. «De nuevo» es natural y mantiene el paralelismo temporal.
- source_word: ὄψεσθέ
  english_pob_choice: you will see
  chosen_spanish: me verán
  alternatives_spanish:
  - me contemplarán
  - me verán otra vez
  lexicon: BDAG
  rationale: El futuro de ὁράω se rinde con el verbo común «ver». Se conserva la simplicidad del paralelismo y el sentido de futura percepción.
theological_decisions:
- issue: Distinción entre θεωρέω y ὁράω en las dos cláusulas de visión
  english_pob_reading: Render both with 'see' in the main text
  chosen_spanish_reading: Traducir ambos con «ver» en el texto principal
  alternative_spanish_readings:
  - distinguir con «contemplar» / «ver»
  - usar «observar» / «ver»
  rationale: La diferencia léxica existe en griego, pero aquí el énfasis narrativo recae en la ausencia temporal y la futura presencia visual, no en una oposición doctrinal entre dos clases de visión. Mantener «ver» en ambos miembros preserva el paralelismo y la claridad.
  doctrine_reference: Translation philosophy §5; §6
- issue: Valor de la pregunta de Jesús
  english_pob_reading: 'Translate as a real question: ''Are you discussing this with one another...?'''
  chosen_spanish_reading: Conservar la forma interrogativa como pregunta real de Jesús
  alternative_spanish_readings:
  - «¿Están preguntándose esto entre ustedes...? »
  - «¿Es esto lo que discuten entre ustedes...? »
  rationale: El griego presenta una pregunta dirigida a exponer la conversación privada de los discípulos. La puntuación interrogativa en español mantiene ese tono inquisitivo sin convertir la frase en una simple afirmación.
  doctrine_reference: Translation philosophy §1; §6
- issue: Lectura de ὅτι en la cláusula explicativa
  english_pob_reading: '''because I said'' as an acceptable alternative to the content reading'
  chosen_spanish_reading: «porque dije» en el discurso directo
  alternative_spanish_readings:
  - «que dije»
  - «ya que dije»
  rationale: El griego permite tanto relación causal como contenido bajo discusión. El español «porque dije» preserva esa ambigüedad funcional, que en contexto explica por qué se están preguntando entre sí.
  doctrine_reference: Translation philosophy §3; §6
translation_notes:
  revision_awareness: El borrador sigue el último paso de revisión del texto inglés auditado al reflejar ὅτι con una lectura causal posible («porque dije») y al evitar añadir un matiz temporal como «ya no» que no está expresado de manera directa por οὐ θεωρεῖτέ με. También conserva la observación lexical de los dos verbos de visión mediante una nota, sin romper el paralelismo en el texto principal.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme al estándar del proyecto.
  - Se mantiene «ver» para ambos verbos de visión en el texto principal; la distinción se documenta en nota para no borrar la tensión léxica.
  - «Dentro de poco» expresa adecuadamente μικρόν como intervalo breve de tiempo.
  - La formulación «entre ustedes» naturaliza μετ’ ἀλλήλων sin perder el sentido recíproco.
  - Se evitó «SEÑOR» u otros equivalentes no pertinentes; no hay términos divinos en este versículo.
  - Se prefirió «preguntarle» sobre «interrogarle» para conservar el tono de pregunta entre discípulos y no de examen judicial.
