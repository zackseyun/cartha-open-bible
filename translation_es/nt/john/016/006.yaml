translation:
  language: es
  text: Pero porque les he dicho estas cosas a ustedes[a], la tristeza ha llenado su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus corazones». El griego usa un singular, «corazón», con un posesivo plural, una construcción que puede expresar el estado interior compartido del grupo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca contraste adversativo. «Pero» es el conector más natural y claro en español para introducir la oposición con el contexto anterior.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - que
  lexicon: BDAG
  rationale: Aquí introduce la causa de la tristeza de los discípulos; «porque» conserva bien el valor causal documentado en el contexto.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo es plural y remite a lo que Jesús acaba de decir. «Estas cosas» preserva el plural y el alcance referencial sin reducirlo indebidamente.
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: les he hablado
  alternatives_spanish:
  - les he dicho
  - he hablado
  lexicon: BDAG
  rationale: El perfecto conserva una acción ya realizada con efecto presente. «He hablado» expresa bien el tiempo, y el dativo plural se integra de forma natural en español con «les he hablado».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a todos ustedes
  lexicon: BDAG
  rationale: El pronombre está en plural. «A ustedes» mantiene la referencia plural con un registro neutro y amplio para el español latinoamericano.
- source_word: ἡ λύπη
  english_pob_choice: sorrow
  chosen_spanish: la tristeza
  alternatives_spanish:
  - el dolor
  - la aflicción
  - el pesar
  lexicon: BDAG
  rationale: λύπη denota aflicción o pesar profundo. «Tristeza» es fiel y natural en español; aunque «dolor» o «aflicción» son posibles, «tristeza» conserva mejor la relación idiomática con el verbo «llenar».
- source_word: πεπλήρωκεν
  english_pob_choice: has filled
  chosen_spanish: ha llenado
  alternatives_spanish:
  - ha colmado
  - ha inundado
  lexicon: BDAG
  rationale: El perfecto de πληρόω se refleja con «ha llenado». Es la equivalencia más directa y no introduce intensidad adicional que el griego no exige.
- source_word: ὑμῶν τὴν καρδίαν
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - el corazón de ustedes
  lexicon: BDAG
  rationale: El griego combina posesivo plural con sustantivo singular. En español, el posesivo formal singular «su» puede referir naturalmente al grupo como colectivo, evitando una pluralización explicativa que no está en el texto.
theological_decisions:
- issue: Singular καρδίαν con posesivo plural ὑμῶν
  english_pob_reading: your heart
  chosen_spanish_reading: su corazón
  alternative_spanish_readings:
  - sus corazones
  - el corazón de ustedes
  rationale: No se trata de una diferencia doctrinal, sino de cómo trasladar la construcción griega. Mantener el singular («su corazón») conserva la imagen de un centro interior común o compartido en el grupo, sin forzar un plural que el griego no da en esa posición.
  doctrine_reference: Gramática del griego koiné; uso distributivo/colectivo del singular con posesivo plural
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: ahora el marcador [a] aparece en el texto principal exactamente donde corresponde, y la nota se limita a la alternativa lexical preservada por el audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y público adecuado para una traducción bíblica.
  - Se evitó «SEÑOR» o «Cristo» porque este versículo no los contiene.
  - La forma verbal compuesta («he hablado», «ha llenado») conserva el valor perfecto del griego.
  - El posesivo singular «su» se usa de modo colectivo para reflejar la sintaxis griega sin añadir interpretación excesiva.
