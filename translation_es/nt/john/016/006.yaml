    rationale: Aunque es comprensible, en español suena pesada y menos idiomática por combinar «les» con «a ustedes» y por usar «hablar» con objeto directo «estas cosas». «Les he dicho estas cosas» expresa mejor el griego y mejora la legibilidad.
  - severity: low
