  source_alignment_summary: 'El borrador refleja bien el sentido del griego: ἀλλ᾽ ὅτι como causal-adversativo, ταῦτα λελάληκα con perfecto, y ἡ λύπη πεπλήρωκεν ... τὴν καρδίαν como resultado presente. También preserva correctamente la nota sobre el singular colectivo «corazón».'
  spanish_quality_summary: La redacción es mayormente natural y fiel, pero «les he hablado estas cosas a ustedes» suena algo recargado por duplicar el complemento indirecto y luego añadir «a ustedes». En español neutro y digno, «les he hablado de estas cosas» o «les he dicho estas cosas» fluye mejor. Dado que ταῦτα es objeto directo de λελάληκα, «les he dicho estas cosas» es la opción más clara y natural, manteniendo el perfecto.
  glossary_alignment: No hay términos del glosario mayor relevantes en este versículo. «Tristeza», «ha llenado» y «su corazón» concuerdan con las decisiones del POB y con la nota sobre el singular colectivo.
