translation:
  language: es
  text: Les he hablado estas cosas para que en mí tengan paz. En el mundo tienen tribulación[a], pero cobren ánimo[b]; yo he vencido al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tribulación» también puede traducirse «aflicción», «angustia» o «dificultad».
    reason: lexical_alternative
  - marker: b
    text: O «tomen ánimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo plural pide una referencia plural en español. «Estas cosas» conserva la remisión al discurso anterior sin convertirlo en una sola afirmación resumida.
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: les he hablado
  alternatives_spanish:
  - les he dicho
  - les he hablado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción concluida con vigencia presente; el perfecto compuesto español la conserva bien. «Hablar» refleja mejor λαλέω que un simple «decir» y mantiene el tono del discurso de Jesús.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la forma natural y clara en español, sin perder el valor purposivo del griego.
- source_word: ἐν ἐμοὶ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - unidos a mí
  - en unión conmigo
  lexicon: BDAG
  rationale: Se preserva literalmente la preposición, porque la unión con Jesús es una idea teológicamente importante en Juan y no conviene expandirla interpretativamente en el texto principal.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  - tranquilidad
  lexicon: BDAG
  rationale: «Paz» es el equivalente natural y bíblicamente estable; en español comunica la amplitud de εἰρήνη sin restringirla a simple ausencia de conflicto.
- source_word: ἔχητε
  english_pob_choice: you may have
  chosen_spanish: tengan
  alternatives_spanish:
  - puedan tener
  - tengan
  lexicon: BDAG
  rationale: El subjuntivo de finalidad en español requiere «para que… tengan». Mantiene la idea de posesión continua e intencional de la paz.
- source_word: ἐν τῷ κόσμῳ
  english_pob_choice: In the world
  chosen_spanish: En el mundo
  alternatives_spanish:
  - En este mundo
  - En el mundo
  lexicon: BDAG
  rationale: Se conserva «mundo» para κόσμος, sin añadir «este» que estrecharía el alcance del término y su resonancia joánica sobre el orden humano alejado de Dios.
- source_word: θλῖψιν
  english_pob_choice: tribulation
  chosen_spanish: tribulación
  alternatives_spanish:
  - aflicción
  - angustia
  - tribulación
  lexicon: BDAG
  rationale: «Tribulación» preserva el peso léxico y la resonancia bíblica del término mejor que un vocablo más leve como «problema». Mantiene la tensión entre la paz en Cristo y la presión en el mundo.
- source_word: ἔχετε
  english_pob_choice: you have
  chosen_spanish: tienen
  alternatives_spanish:
  - tienen
  - están teniendo
  lexicon: BDAG
  rationale: El presente indicativo se expresa con el presente simple español. Comunica una realidad actual y general en el mundo.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - pero
  - sin embargo
  lexicon: BDAG
  rationale: Contraste adversativo directo entre la tribulación del mundo y la exhortación de Jesús.
- source_word: θαρσεῖτε
  english_pob_choice: take courage
  chosen_spanish: cobren ánimo
  alternatives_spanish:
  - tomen ánimo
  - tomen valor
  - cobren ánimo
  lexicon: BDAG
  rationale: El imperativo exhorta a la confianza y firmeza frente a la tribulación. «Cobren ánimo» suena natural y digno en español, y recoge la amplitud de sentido de θαρσέω; además deja abierta la alternativa documentada por la POB inglesa «take heart» sin imponer una fórmula idiomática rígida.
- source_word: νενίκηκα
  english_pob_choice: I have overcome
  chosen_spanish: he vencido
  alternatives_spanish:
  - he vencido
  - he sobrepasado
  - he conquistado
  lexicon: BDAG
  rationale: El perfecto expresa victoria ya lograda con efecto vigente. «He vencido» es la forma más natural y sobria en español; conserva el sentido de triunfo decisivo sin cargar innecesariamente el tono militar de «conquistado».
- source_word: τὸν κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al mundo
  - al mundo
  lexicon: BDAG
  rationale: En español el objeto directo personal/no personal se expresa con «al» según la construcción verbal; mantiene la referencia a κόσμος y la oposición joánica entre Jesús y el mundo.
theological_decisions:
- issue: κόσμος como esfera humana opuesta a Dios
  english_pob_reading: Rendered consistently as 'world' in both occurrences, allowing context to convey the hostile human order opposed to God without paraphrastic expansion.
  chosen_spanish_reading: Se mantiene «mundo» en ambas apariciones, dejando que el contexto comunique la esfera humana hostil y no añadiendo glosas como «sistema del mundo» en el texto principal.
  alternative_spanish_readings:
  - mundo
  - sistema del mundo
  - mundo caído
  rationale: Juan usa κόσμος de forma teológicamente densa y variable. Traducir siempre por «mundo» conserva la tensión y permite que el lector perciba la oposición entre la paz en Cristo y la presión del mundo sin sobreexplicar.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor del perfecto de Jesús antes de la culminación narrativa
  english_pob_reading: 'Both perfects are rendered with English present perfects: ''I have spoken'' and ''I have overcome.'''
  chosen_spanish_reading: 'Los dos perfectos se reflejan con perfectos compuestos españoles: «les he hablado» y «he vencido».'
  alternative_spanish_readings:
  - les hablé / vencí
  - les he dicho / he conquistado
  rationale: El perfecto griego subraya una acción completada con vigencia actual. En español, el perfecto compuesto conserva mejor esa fuerza que el pretérito simple, especialmente en la declaración de victoria de Jesús.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; la versión española sigue de cerca la decisión inglesa sobre perfecto verbal, κόσμος y θλῖψις, pero adapta la sintaxis al español natural sin perder las tensiones léxicas relevantes.
  spanish_consistency_notes:
  - Se conserva el tratamiento de Jesús en primera persona con verbos compuestos para reflejar el perfecto griego.
  - «Mundo» se usa de manera consistente para κόσμος en ambas apariciones.
  - «Tribulación» queda marcado con nota para mantener visible la alternativa léxica documentada en la POB inglesa.
  - Se evita sustituir la metáfora joánica por paráfrasis doctrinales como «sistema mundano» o «este mundo caído».
