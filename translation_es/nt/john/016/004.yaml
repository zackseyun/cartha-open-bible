  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión de no forzar la segunda referencia pronominal en el texto principal está alineada con la justificación léxica y teológica documentada en el POB inglés.
