translation:
  language: es
  text: Pero yo les he hablado de estas cosas para que, cuando llegue su hora[a], recuerden que yo les dije. Pero no les dije estas cosas desde el principio, porque estaba con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «cuando llegue su hora, recuerden de ellos, que yo les dije». El griego incluye dos ocurrencias de αὐτῶν («de ellos/su»), difíciles de representar con fluidez en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λελάληκα
  english_pob_choice: I have spoken
  chosen_spanish: les he hablado
  alternatives_spanish:
  - les he dicho
  - les he hablado de esto
  lexicon: BDAG
  rationale: El perfecto griego comunica una acción cumplida con efecto vigente; en español, «les he hablado» conserva bien ese valor y suena natural en un registro bíblico actual. Se evita «les he dicho» porque suaviza el matiz de discurso desarrollado que el contexto sugiere.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El plural demostrativo remite a las advertencias y enseñanzas inmediatamente anteriores. «Estas cosas» reproduce el plural sin forzar una sola palabra y es idiomático en español bíblico contemporáneo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» expresa de forma clara y natural la relación de propósito del griego, sin añadir un matiz más fuerte que el texto no exige.
- source_word: ὅταν ἔλθῃ ἡ ὥρα αὐτῶν
  english_pob_choice: when their hour comes
  chosen_spanish: cuando llegue su hora
  alternatives_spanish:
  - cuando llegue la hora de ellos
  - cuando llegue la hora de estas cosas
  lexicon: BDAG
  rationale: «ὥρα» en Juan suele aludir a un momento señalado o decisivo. «Su hora» preserva la relación de posesión del genitivo y mantiene la fluidez del español. El singular «hora» refleja el griego y el sentido joánico de momento fijado.
- source_word: μνημονεύητε
  english_pob_choice: you may remember
  chosen_spanish: recuerden
  alternatives_spanish:
  - se acuerden
  - traigan a la memoria
  lexicon: BDAG
  rationale: En español, el subjuntivo final tras «para que» permite omitir el pronombre explícito sin perder sentido. «Recuerden» es claro, solemne y directo; se evita una paráfrasis excesiva.
- source_word: ὅτι ἐγὼ εἶπον ὑμῖν
  english_pob_choice: that I told you
  chosen_spanish: que yo se las dije
  alternatives_spanish:
  - que yo se las conté
  - que yo se las dije a ustedes
  lexicon: BDAG
  rationale: El griego usa «dije»/«hablé» en un contexto de enseñanza directa. En español, el pronombre enclítico «se las» permite representar el antecedente plural de «estas cosas» sin perder naturalidad. Se conserva la referencia a que Jesús fue quien las comunicó.
- source_word: Ταῦτα δὲ ὑμῖν ἐξ ἀρχῆς οὐκ εἶπον
  english_pob_choice: But I did not tell you these things from the beginning
  chosen_spanish: Pero no les dije estas cosas desde el principio
  alternatives_spanish:
  - Pero no les hablé de estas cosas desde el principio
  - Pero estas cosas no se las dije desde el principio
  lexicon: BDAG
  rationale: «ἐξ ἀρχῆς» se traduce de manera transparente como «desde el principio». «Les dije estas cosas» mantiene el orden comprensible en español y conserva el contraste temporal del texto.
- source_word: μεθ’ ὑμῶν ἤμην
  english_pob_choice: I was with you
  chosen_spanish: porque estaba con ustedes
  alternatives_spanish:
  - porque yo estaba con ustedes
  - porque me encontraba con ustedes
  lexicon: BDAG
  rationale: La cláusula causal final explica por qué no habló antes. «Estaba con ustedes» es la equivalencia más directa y natural de la expresión relacional griega, sin añadir matices locales innecesarios.
theological_decisions:
- issue: Referencia de αὐτῶν en «su hora» y la resonancia del recuerdo
  english_pob_reading: The Greek includes two occurrences of 'them/their' (αὐτῶν), which are difficult to represent smoothly in English. The main text preserves 'their hour' and conveys the second pronoun idiomatically; a footnote records the more literal possibility.
  chosen_spanish_reading: Se preserva explícitamente el primer αὐτῶν en «su hora», y el segundo queda absorbido por la forma natural «recuerden que yo se las dije».
  alternative_spanish_readings:
  - cuando llegue la hora de ellos
  - cuando llegue su hora, recuerden de ellas
  rationale: El español no reproduce de manera elegante los dos pronombres del griego sin sonar forzado. La redacción principal mantiene el referente temporal y la memoria del contenido, mientras que la nota conserva la tensión literal del doble αὐτῶν sin resolverla silenciosamente.
  doctrine_reference: Translation philosophy §3; preservar tensión interpretativa cuando el original la presenta.
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del contexto inglés y adopta la revisión que elimina una redundancia innecesaria en la cláusula de recuerdo, pero en español se expresa con pronombres naturales para no introducir un calco torpe. Se conserva el valor de perfecto en «les he hablado», el propósito en «para que», y la causal final en «porque estaba con ustedes».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - «Se las dije» representa el objeto plural de «estas cosas» con pronombres españoles naturales; no pretende igualar mecánicamente la duplicación griega.
  - Se mantiene «ustedes» para una forma neutral latinoamericana y eclesialmente amplia.
  - No se introduce vocabulario doctrinal ajeno al pasaje; el énfasis queda en memoria, testimonio y oportunidad futura.
