translation:
  language: es
  text: 'Y en aquel día no me preguntarán nada[a]. En verdad, en verdad les digo: todo lo que pidan al Padre en mi nombre, él les dará[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa dos verbos distintos en este versículo: primero ἐρωτάω, con el sentido de preguntar o consultar a Jesús, y luego αἰτέω, con el sentido de pedir o solicitar al Padre.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "no me preguntarán nada"; también puede entenderse: "no me harán ninguna pregunta".'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en ese día aquel
  lexicon: BDAG
  rationale: Mantiene la fórmula temporal joánica y su tono escatológico, con una expresión natural en español. 'Aquel día' conserva mejor el énfasis de lejanía/determinación que un simple 'ese día'.
- source_word: ἐμὲ οὐκ ἐρωτήσετε οὐδέν
  english_pob_choice: you will ask me nothing
  chosen_spanish: no me pedirán nada
  alternatives_spanish:
  - no me preguntarán nada
  - no me harán ninguna pregunta
  lexicon: BDAG
  rationale: En este contexto, ἐρωτάω puede expresar tanto preguntar como pedir; opto por 'pedirán' porque en español suena más natural con un objeto directo y permite conservar la negación absoluta ('nada'). La alternativa 'preguntarán' enfatiza interrogación, pero el contraste del versículo con el siguiente verbo apoya distinguirlo de αἰτέω sin forzar el castellano.
- source_word: ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: '''De cierto, de cierto'' reproduce una fórmula bíblica estable y solemne en español, manteniendo el énfasis repetido de Juan. ''Amén, amén'' preserva el préstamo, pero en español puede sonar menos transparente como introducción oracular.'
- source_word: ἄν τι αἰτήσητε
  english_pob_choice: whatever you ask
  chosen_spanish: todo lo que pidan
  alternatives_spanish:
  - lo que sea que pidan
  - si piden algo
  lexicon: BDAG
  rationale: La construcción indefinida se expresa bien en español con 'todo lo que pidan', que conserva amplitud y naturalidad. 'Pidan' refleja mejor el valor de αἰτέω como petición dirigida al Padre.
- source_word: αἰτήσητε
  english_pob_choice: ask
  chosen_spanish: pidan
  alternatives_spanish:
  - soliciten
  - rueguen
  lexicon: BDAG
  rationale: '''Pidan'' es el verbo más natural para una solicitud dirigida a Dios en español y conserva el matiz petitorio de αἰτέω. ''Pregunten'' no encaja tan bien con el complemento al Padre, y ''rueguen'' introduce un matiz devocional más específico.'
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al Padre mío
  - a Dios Padre
  lexicon: BDAG
  rationale: El griego dice simplemente 'el Padre'; 'al Padre' respeta ese dato sin añadir posesivo. La mayúscula refleja el referente personal divino en contexto.
- source_word: δώσει ὑμῖν
  english_pob_choice: he will give to you
  chosen_spanish: él se lo dará a ustedes
  alternatives_spanish:
  - él les dará
  - él les concederá
  lexicon: BDAG
  rationale: El griego omite un objeto explícito que en español conviene expresar con un pronombre neutro ('se lo') para que la frase suene completa y cercana al antecedente implícito de la petición. 'A ustedes' mantiene la segunda persona plural y evita ambigüedad.
- source_word: ἐν τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - invocando mi nombre
  lexicon: BDAG
  rationale: '''En mi nombre'' es la correspondencia normal y más fiel para la expresión joánica, preservando su fuerza representativa y relacional sin explicarla de más. Las alternativas son más interpretativas o menos idiomáticas.'
theological_decisions:
- issue: Distinción entre el verbo dirigido a Jesús y el verbo dirigido al Padre
  english_pob_reading: The main text preserves both as 'ask' in idiomatic English while documenting the lexical distinction in the notes.
  chosen_spanish_reading: El texto principal distingue de forma natural entre 'pedir' respecto de Jesús y 'pedir' al Padre, documentando en la nota la diferencia lexical entre ἐρωτάω y αἰτέω.
  alternative_spanish_readings:
  - '''preguntarán''... ''pedirán'''
  - '''no me cuestionarán nada''... ''todo lo que soliciten al Padre'''
  rationale: El español permite una distinción más clara entre preguntar y pedir, pero el primer verbo en este contexto también puede abarcar 'pedir'. Para no sobrecargar el versículo con un castellano rígido, se mantiene una formulación natural y se explicita la diferencia léxica en nota, preservando la tensión auditada del griego.
  doctrine_reference: Translation philosophy §§1, 3, 5, 6
- issue: Alcance de la promesa de pedir en el nombre de Jesús
  english_pob_reading: Translate the statement straightforwardly without adding doctrinal qualifiers in the main text.
  chosen_spanish_reading: Se traduce la promesa de manera directa, sin añadir condiciones interpretativas no presentes en la formulación del versículo.
  alternative_spanish_readings:
  - '''si piden algo conforme a su voluntad, él se lo dará'''
  - '''todo lo que pidan legítimamente en mi nombre'''
  rationale: El texto griego en este versículo afirma la promesa sin matizarla; no conviene introducir limitaciones teológicas en la línea principal. La formulación deja la tensión interpretativa para el contexto amplio de Juan, como hace el POB inglés.
  doctrine_reference: Translation philosophy §§1 y 3
translation_notes:
  revision_awareness: 'He seguido el ajuste más reciente del POB inglés: la segunda cláusula debe reflejar el valor indefinido de ἄν τι αἰτήσητε con una formulación amplia (''todo lo que pidan'') y no introducir un condicional explícito. También he mantenido la clausula final sin añadir objetos que no están explícitos en el griego, usando un pronombre neutro español (''se lo'') solo por exigencia idiomática.'
  spanish_consistency_notes:
  - YHWH no aparece en este versículo; no se aplica la convención 'Yahvé'.
  - '''Padre'' se escribe con mayúscula por tratarse del referente divino en contexto joánico.'
  - Se conserva la segunda persona plural para respetar el plural del griego.
  - La nota distingue ἐρωτάω y αἰτέω, como hace el aparato inglés, para no borrar la tensión lexical del texto.
