  text: καὶ ἐν ἐκείνῃ τῇ ἡμέρᾳ ἐμὲ οὐκ ἐρωτήσετε οὐδέν· ἀμὴν ἀμὴν λέγω ὑμῖν, ⸂ἄν τι⸃ αἰτήσητε τὸν πατέρα ⸂δώσει ὑμῖν ἐν τῷ ὀνόματί μου⸃.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/023.yaml
  text: And in that day you will ask me nothing[a]. Truly, truly, I say to you, whatever you ask the Father in my name[b], he will give to you.
  footnotes:
  - marker: a
    text: 'The Greek uses two different verbs for ''ask'' in this verse: first ἐρωτάω (''ask/question'') with reference to Jesus, then αἰτέω (''ask/request'') with reference to the Father.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'you will not ask me anything.'
    reason: alternative_reading
