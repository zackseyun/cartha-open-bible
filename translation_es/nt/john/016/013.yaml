revisions:
- from: Pero cuando él, el Espíritu de la verdad[a], venga, os guiará a[b] toda la verdad. Pues no hablará por su propia cuenta[c], sino que hablará todo lo que oiga; y os anunciará las cosas que han de venir[d].
  to: Pero cuando él, el Espíritu de la verdad, venga, los guiará a toda la verdad[a]. Pues no hablará por su propia cuenta[b], sino que hablará todo lo que oiga; y les anunciará las cosas que han de venir[c].
  rationale: 'Se revisa el texto para adecuarlo al español neutral latinoamericano sustituyendo «os» por «los/les». También se eliminó una nota innecesaria sobre «el Espíritu de verdad», ya que no corresponde al expediente inglés ni resuelve una ambigüedad española relevante. Se conservaron las decisiones principales del original: referencia personal del Espíritu, «el Espíritu de la verdad», valor direccional de la guía, dependencia revelatoria («no hablará por su propia cuenta») y plural prospectivo en «las cosas que han de venir».'
