base_translation:
  language: en
  yaml_path: translation/nt/john/016/013.yaml
  text: But when he[a], the Spirit of truth, comes, he will guide you into all the truth. For he will not speak from himself, but whatever he hears he will speak[d][c][b], and he will declare to you the things that are coming.
  footnotes:
