translation:
  language: es
  text: Pero cuando él, el Espíritu de la verdad, venga, los guiará a toda la verdad[a]. Pues no hablará por su propia cuenta[b], sino que hablará todo lo que oiga; y les anunciará las cosas que han de venir[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en toda la verdad». El griego dice «en toda la verdad», pero en español con «guiar» suele expresarse con valor direccional.'
    reason: alternative_reading
  - marker: b
    text: 'O: «no hablará de su propia iniciativa». Literalmente, «no hablará desde sí mismo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo que está por venir» / «las cosas venideras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Cuando
  lexicon: BDAG
  rationale: El griego une una cláusula temporal con una leve contraposición o continuación. En español, 'Pero cuando' conserva ese matiz sin forzar el estilo.
- source_word: ἔλθῃ ἐκεῖνος
  english_pob_choice: he comes
  chosen_spanish: él ... venga
  alternatives_spanish:
  - ese ... venga
  - llegue
  lexicon: BDAG
  rationale: El demostrativo masculino ἐκεῖνος apunta a una referencia personal; 'él' mantiene ese valor. 'Venga' reproduce la orientación futura del subjuntivo aoristo tras ὅταν.
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  english_pob_choice: the Spirit of truth
  chosen_spanish: el Espíritu de la verdad
  alternatives_spanish:
  - el espíritu de la verdad
  - el Espíritu que es la verdad
  lexicon: BDAG
  rationale: Se conserva la designación joánica con artículo y genitivo. 'De la verdad' es una traducción formal natural en español; 'de la verdad' mantiene la relación genitiva sin explicitarla de más.
- source_word: ὁδηγήσει
  english_pob_choice: will guide
  chosen_spanish: guiará
  alternatives_spanish:
  - conducirá
  - guiará
  lexicon: BDAG
  rationale: '''Guiará'' es el equivalente directo y natural de ὁδηγέω, manteniendo la metáfora de dirección sin sobreinterpretarla.'
- source_word: ἐν τῇ ἀληθείᾳ πάσῃ
  english_pob_choice: into all the truth
  chosen_spanish: a toda la verdad
  alternatives_spanish:
  - en toda la verdad
  - hacia toda la verdad
  lexicon: BDAG
  rationale: El griego dice literalmente 'en toda la verdad', pero con ὁδηγέω la dirección queda bien expresada en español con 'a'. Se evita un calco duro y se conserva la fuerza direccional del verbo sin eliminar el matiz preposicional.
- source_word: οὐ γὰρ λαλήσει ἀφ’ ἑαυτοῦ
  english_pob_choice: For he will not speak from himself
  chosen_spanish: Pues no hablará por su propia cuenta
  alternatives_spanish:
  - pues no hablará de sí mismo
  - pues no hablará desde sí mismo
  lexicon: BDAG
  rationale: ἀφ’ ἑαυτοῦ es literalmente 'desde sí mismo / de sí mismo'. 'Por su propia cuenta' preserva la idea de independencia o iniciativa propia en un español idiomático.
- source_word: ἀλλ’ ὅσα ἀκούσει λαλήσει
  english_pob_choice: but whatever he hears he will speak
  chosen_spanish: sino que hablará todo lo que oiga
  alternatives_spanish:
  - sino que dirá todo lo que oiga
  - sino que hablará lo que oiga
  lexicon: BDAG
  rationale: La construcción contrasta dependencia y fidelidad de transmisión. 'Hablará todo lo que oiga' conserva el orden de ideas y la totalidad de ὅσα.
- source_word: τὰ ἐρχόμενα
  english_pob_choice: the things that are coming
  chosen_spanish: las cosas que han de venir
  alternatives_spanish:
  - las cosas venideras
  - las cosas que vienen
  lexicon: BDAG
  rationale: El participio presente con artículo señala realidades futuras. 'Han de venir' expresa bien la inminencia/futuridad en español sin perder el valor prospectivo.
- source_word: ἀναγγελεῖ ὑμῖν
  english_pob_choice: he will declare to you
  chosen_spanish: os anunciará
  alternatives_spanish:
  - os declarará
  - os dará a conocer
  lexicon: BDAG
  rationale: ἀναγγέλλω significa anunciar o dar a conocer. 'Anunciará' conserva el tono revelatorio y resulta natural en español bíblico contemporáneo.
theological_decisions:
- issue: Referencia personal del Espíritu
  english_pob_reading: Use personal masculine pronouns ('he') for the Spirit
  chosen_spanish_reading: Usar pronombres personales masculinos ('él') para el Espíritu
  alternative_spanish_readings:
  - usar 'ello' o evitar pronombre repitiendo 'el Espíritu'
  rationale: El griego usa ἐκεῖνος, un demostrativo masculino, para referirse al Espíritu. 'Él' preserva esa referencia personal y evita despersonalizar al Espíritu.
  doctrine_reference: Ortodoxia nicena; primacía del original en traducción
- issue: ἐν τῇ ἀληθείᾳ πάσῃ
  english_pob_reading: Translate as 'into all the truth' in the main text
  chosen_spanish_reading: Traducirlo como 'a toda la verdad' en el texto principal
  alternative_spanish_readings:
  - '''en toda la verdad'''
  rationale: Aunque el griego es formalmente 'en', con ὁδηγέω el sentido es direccional. En español, 'a' comunica mejor el movimiento de guía sin añadir doctrina ni ocultar el matiz relacional.
  doctrine_reference: Equivalencia óptima; conservar la tensión semántica sin resolverla de más
- issue: ἀφ’ ἑαυτοῦ
  english_pob_reading: For he will not speak from himself
  chosen_spanish_reading: No hablará por su propia cuenta
  alternative_spanish_readings:
  - no hablará de sí mismo
  - no hablará desde sí mismo
  rationale: La frase griega expresa origen o independencia. 'Por su propia cuenta' comunica en español la idea de iniciativa propia sin volverla rígidamente literal.
  doctrine_reference: Cristología y pneumatología joánicas; fidelidad de la revelación transmitida
- issue: τὰ ἐρχόμενα
  english_pob_reading: the things that are coming
  chosen_spanish_reading: las cosas que han de venir
  alternative_spanish_readings:
  - las cosas venideras
  - lo que ha de venir
  rationale: La forma plural se conserva con 'las cosas'. 'Han de venir' mantiene la orientación futura y suena natural en español bíblico.
  doctrine_reference: Escatología joánica; preservación del plural del original
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el audit trail inglés: conserva el pronombre personal para ἐκεῖνος, mantiene la designación joánica ''el Espíritu de la verdad'', y resuelve la tensión de ἐν τῇ ἀληθείᾳ πάσῃ con una preposición española natural (''a'') mientras deja constancia de la lectura formal en nota. Se incorpora además la idea de dependencia en ἀφ’ ἑαυτοῦ con una fórmula idiomática española.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - '''Espíritu'' se capitaliza por referencia personal al Espíritu Santo.'
  - Se mantiene 'verdad' para ἀλήθεια y no se sustituye por 'rectitud', que no corresponde aquí.
  - '''Anunciará'' conserva el tono revelatorio de ἀναγγέλλω sin arcaísmo.'
