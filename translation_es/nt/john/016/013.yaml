    reason: lexical_alternative
  - marker: c
    text: Or 'the things to come' / 'what is to come.'
    reason: lexical_alternative
  - marker: d
    text: Or 'But when he comes, the Spirit of truth, he will guide you'.
    reason: previous_rendering
