translation:
  language: es
  text: Él me glorificará[a], porque tomará de lo que es mío y lo dará a conocer a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recibirá de lo que es mío».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνος
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Aquel
  - Ese
  lexicon: BDAG
  rationale: El demostrativo griego se refiere al Espíritu Santo en el contexto inmediato, pero en español la forma natural y fiel es el pronombre personal "Él". Conserva la referencia personal sin forzar una deixis más pesada de la que el contexto exige.
- source_word: δοξάσει
  english_pob_choice: will glorify
  chosen_spanish: me glorificará
  alternatives_spanish:
  - me honrará
  - me dará gloria
  lexicon: BDAG
  rationale: '"Glorificar" preserva el peso teológico joánico de δοξάζω mejor que opciones más generales como "honrar". En español mantiene la relación entre la obra del Espíritu y la revelación de la gloria de Jesús.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la causa de la glorificación de Jesús. "Porque" expresa con claridad la relación causal sin añadir matices explicativos ajenos al griego.
- source_word: ἐκ τοῦ ἐμοῦ
  english_pob_choice: from what is mine
  chosen_spanish: de lo que es mío
  alternatives_spanish:
  - de lo mío
  - de lo que me pertenece
  - de mi propio
  lexicon: BDAG
  rationale: La construcción griega con artículo neutro y posesivo es idiomática; "de lo que es mío" reproduce el sentido de tomar desde aquello que pertenece a Jesús, sin restringirlo a una sola categoría (enseñanza, autoridad o revelación).
- source_word: λήμψεται
  english_pob_choice: will take
  chosen_spanish: tomará
  alternatives_spanish:
  - recibirá
  - tomará para sí
  lexicon: BDAG
  rationale: '"Tomará" sigue el valor posible de λαμβάνω en este contexto y encaja de manera natural con "de lo que es mío". "Recibirá" es viable, pero "tomará" conserva mejor la conexión verbal con la frase siguiente.'
- source_word: ἀναγγελεῖ
  english_pob_choice: declare it
  chosen_spanish: se lo declarará
  alternatives_spanish:
  - se lo anunciará
  - se lo reportará
  - se lo hará saber
  lexicon: BDAG
  rationale: ἀναγγέλλω significa comunicar o declarar. En español, "declarará" conserva la solemnidad del término y la forma pronominal "se lo" expresa el objeto implícito y el destinatario con claridad natural.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ustedes todos
  lexicon: BDAG
  rationale: El dativo plural dirigido a los discípulos se expresa de forma natural en español latinoamericano con "a ustedes". Mantiene la pluralidad del destinatario sin arcaísmo.
theological_decisions:
- issue: Relación entre el Espíritu y Jesús en "ἐκ τοῦ ἐμοῦ λήμψεται"
  english_pob_reading: from what is mine
  chosen_spanish_reading: de lo que es mío
  alternative_spanish_readings:
  - de mí recibirá
  - de lo que me pertenece
  rationale: 'La traducción evita estrechar la frase a una formulación doctrinal técnica que el versículo no desarrolla. Conserva la tensión bíblica: el Espíritu comunica lo que pertenece al Hijo, sin resolverla con categorías posteriores.'
  doctrine_reference: Preservar la tensión teológica del texto sin sobreinterpretación doctrinal.
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y con la lectura auditada en inglés POB. La versión inglesa eligió "declare it to you" y una nota alternativa para "will receive from what is mine"; la propuesta española conserva esa misma tensión léxica con "tomará" / "de lo que es mío" y refleja la ambigüedad de λαμβάνω en una nota equivalente.
  spanish_consistency_notes:
  - Se mantuvo "glorificará" para δοξάσει por coherencia con la terminología joánica de la POB.
  - Se usó "Espíritu" implícito en el referente de ἐκεῖνος, pero sin añadirlo al texto para no sobreespecificar lo que el griego deja contextual.
  - '"A ustedes" refleja el plural del dativo ὑμῖν y funciona bien en español neutro latinoamericano.'
  - La nota al pie conserva la alternativa verbal "recibirá" como equivalente funcional de la decisión inglesa auditada.
