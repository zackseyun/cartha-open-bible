review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: ἐκεῖνος → «Él», δοξάσει → «glorificará», ὅτι causal → «porque», ἐκ τοῦ ἐμοῦ → «de lo que es mío», λήμψεται → «tomará» con alternativa «recibirá», y ἀναγγελεῖ ὑμῖν → «lo dará a conocer a ustedes». La nota léxica preserva correctamente la alternativa documentada en inglés.'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero «se lo declarará a ustedes» suena algo pesado y menos natural en español eclesial general. Además, el clítico «se lo» puede introducir una leve ambigüedad de referente. «Lo dará a conocer a ustedes» conserva bien el sentido de ἀναγγελεῖ, suena más idiomático y mantiene la dignidad del registro.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El uso de «Él» para ἐκεῖνος y «glorificará» para δοξάσει es adecuado. La decisión «de lo que es mío» preserva la amplitud teológica documentada. La alternativa en nota «recibirá» sigue correctamente la auditoría inglesa.
  issues:
  - severity: medium
    issue: «se lo declarará a ustedes» es menos natural que otras opciones españolas para ἀναγγελεῖ ὑμῖν
    rationale: Aunque es comprensible y formalmente posible, la combinación pronominal hace la frase más trabada y ligeramente ambigua. El griego expresa ‘hará saber / anunciará / declarará’ con objeto implícito; en español «lo dará a conocer a ustedes» comunica mejor ese valor sin pérdida semántica.
  revised_spanish_text: Él me glorificará[a], porque tomará de lo que es mío y lo dará a conocer a ustedes.
