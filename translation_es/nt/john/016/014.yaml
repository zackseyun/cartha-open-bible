  rationale: Se propone una reparación menor para mejorar la naturalidad y legibilidad del español sin cambiar el sentido fuente ni las decisiones léxicas centrales. «Lo dará a conocer a ustedes» representa bien ἀναγγελεῖ ὑμῖν y evita la torpeza de «se lo declarará a ustedes».
