translation:
  language: es
  text: 'Jesús les respondió[a]: «¿Creen ahora?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora creen». El griego también puede leerse como una afirmación, aunque el contexto favorece la pregunta retórica.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - les respondió
  lexicon: BDAG
  rationale: El aoristo narrativo de ἀποκρίνομαι se expresa naturalmente en español con «respondió». Mantiene el valor de respuesta en diálogo sin forzar una repetición mecánica del inglés. Se usa además el dativo implícito con «les», que es idiomático en español y reproduce αὐτοῖς.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: BDAG
  rationale: El pronombre dativo plural marca el destinatario de la respuesta de Jesús. En español, el clítico «les» integra mejor esa relación indirecta que una construcción más pesada.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: nombre propio estándar
  rationale: Nombre propio convencional en español, sin variación semántica.
- source_word: Ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - justo ahora
  lexicon: BDAG
  rationale: Ἄρτι indica inmediatez temporal. «Ahora» es la opción más natural y directa en español, preservando el golpe retórico del momento presente.
- source_word: πιστεύετε
  english_pob_choice: believe
  chosen_spanish: creen
  alternatives_spanish:
  - tienen fe
  - están creyendo
  lexicon: BDAG
  rationale: El presente indicativo plural de πιστεύω se traduce con el verbo básico «creer», que en Juan conserva su valor teológico de confiar. «Creen» suena más natural en una pregunta retórica que una perífrasis.
theological_decisions:
- issue: Fuerza de Ἄρτι πιστεύετε;
  english_pob_reading: Do you now believe?
  chosen_spanish_reading: ¿Creen ahora?
  alternative_spanish_readings:
  - Ahora creen.
  - ¿Acaban de creer?
  rationale: La forma griega puede leerse como pregunta o, menos probablemente, como afirmación irónica. En coherencia con el contexto inmediato, la traducción interrogativa conserva la tensión y no resuelve prematuramente la ironía.
  doctrine_reference: Preservar la tensión discursiva y no suavizar el contraste con el versículo siguiente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que existe alto acuerdo con el control cruzado; por ello se mantiene la lectura interrogativa, con nota alternativa para la posibilidad afirmativa del griego.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio estándar.
  - Se usa «creer» para πιστεύω por coherencia con el uso joánico.
  - Se evita una paráfrasis explicativa para conservar el filo retórico del versículo.
  - La nota conserva la tensión textual entre interrogativa y afirmativa sin decidirla de forma absoluta.
