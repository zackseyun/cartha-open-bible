review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura temporal y el énfasis de ἐκεῖνος están bien encaminados con ''cuando aquel venga''. Sin embargo, el borrador no sigue plenamente la decisión léxica auditada para δικαιοσύνη: el inglés POB eligió ''righteousness'' como lectura principal y reservó la alternativa en nota. En español, ''justicia'' puede funcionar, pero aquí el contexto joánico de v. 10 favorece ''rectitud'' como equivalente más cercano a esa decisión documentada.'
  spanish_quality_summary: El español es claro y legible, pero 'convencerá al mundo' puede sonar algo débil frente al matiz forense de ἐλέγξει; aun así, es aceptable e idiomático. La mejora principal necesaria es alinear δικαιοσύνη con la opción principal del proyecto y ajustar la nota alternativa en consecuencia.
  glossary_alignment: 'Se respeta bien ''mundo'', ''pecado'' y ''juicio''. El punto de desalineación es δικαιοσύνη: el proyecto y la auditoría inglesa priorizan ''righteousness'', que en este contexto se representa mejor en español como ''rectitud'' en el texto principal, dejando ''justicia'' como alternativa en nota.'
  issues:
