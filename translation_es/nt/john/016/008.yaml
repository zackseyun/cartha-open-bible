    rationale: La auditoría inglesa documenta 'righteousness' como lectura principal en Juan 16:8 y deja 'justice' como alternativa. En español, 'rectitud' refleja mejor esa elección principal en este contexto cristológico; 'justicia' debe quedar como alternativa, no como texto base.
  - severity: low
    issue: La nota b invierte la relación principal/alternativa
    rationale: Si el texto principal se corrige a 'rectitud', la nota debe ofrecer 'justicia' como alternativa coherente con el aparato inglés y con la tabla doctrinal del proyecto.
