translation:
  language: es
  text: Y cuando aquel[a] venga, convencerá al mundo acerca de pecado, de rectitud[b] y de juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'él'; el griego tiene el demostrativo enfático 'aquel', referido al Paráclito que viene.
    reason: lexical_alternative
  - marker: b
    text: O 'justicia' para δικαιοσύνη.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: when that one comes
  chosen_spanish: cuando aquel venga
  alternatives_spanish:
  - cuando él venga
  - después de que venga
  lexicon: BDAG
  rationale: El participio aoristo expresa una relación temporal; en español, 'cuando' comunica de modo natural la llegada previa a la acción principal sin volverse rígido.
- source_word: ἐκεῖνος
  english_pob_choice: that one
  chosen_spanish: aquel
  alternatives_spanish:
  - él
  - ese
  lexicon: BDAG
  rationale: El demostrativo es enfático en griego. 'Aquel' conserva mejor esa prominencia que un simple pronombre, aunque en español suene más natural en este contexto discursivo.
- source_word: ἐλέγξει
  english_pob_choice: will convict
  chosen_spanish: convencerá
  alternatives_spanish:
  - convictará
  - expondrá
  - probará culpable
  lexicon: BDAG
  rationale: En español, 'convictar' no es idiomático. 'Convencerá' se usa aquí en el sentido forense de hacer patente la culpa ante el mundo; se mantiene la fuerza de desenmascarar o mostrar la culpabilidad, aunque con menor tecnicismo que el inglés.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al sistema del mundo
  - a la gente del mundo
  lexicon: BDAG
  rationale: '''Mundo'' conserva la amplitud joánica y la resonancia teológica sin precisar en exceso el referente.'
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - con respecto a
  - sobre
  lexicon: BDAG
  rationale: La repetición de περί se mantiene con una preposición clara y natural en español; 'acerca de' preserva bien el paralelismo.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecados
  lexicon: BDAG
  rationale: Se conserva el singular como en el griego, dejando abierto que el versículo siguiente especifique el alcance particular.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: BDAG
  rationale: Aunque el POB inglés prefiere 'righteousness', en español 'justicia' funciona con naturalidad y también preserva la alternativa teológica documentada en el aparato inglés. Se mantiene como nota la posibilidad de 'rectitud' según matiz.
- source_word: κρίσεως
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condenación
  - sentencia
  lexicon: BDAG
  rationale: '''Juicio'' conserva el campo forense y escatológico de κρίσις sin restringirlo prematuramente al resultado del juicio.'
theological_decisions:
- issue: Referente y fuerza de ἐκεῖνος
  english_pob_reading: The demonstrative refers to the Spirit/Paraclete and is rendered with preserved emphasis ('that one').
  chosen_spanish_reading: El demostrativo se refiere al Espíritu/Paráclito y se vierte con énfasis preservado ('aquel').
  alternative_spanish_readings:
  - simplemente 'él'
  - '''ese'' con énfasis implícito'
  rationale: La referencia inmediata del discurso es el Paráclito. 'Aquel' mantiene la marcación enfática sin añadir contenido doctrinal extra.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: En este contexto joánico, 'justicia' comunica bien el término y conserva la alternativa reconocida por el POB inglés. 'Rectitud' queda como posibilidad semántica, pero no se coloca en el texto principal por menor naturalidad.
  doctrine_reference: 'Contested terms table: δικαιοσύνη'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] en ''aquel'' y [b] en ''justicia''. Se mantuvo la estructura temporal y el paralelismo de las tres frases con περί, evitando una traducción mecánica pero conservando el trasfondo forense del verbo ἐλέγξει.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como política general del proyecto, aunque este versículo no lo contiene.
  - Se evitó 'Cristo' porque no aparece en el texto base ni en el contexto inmediato del versículo.
  - '''Convencerá'' se eligió por idiomaticidad española; la nota lexical preserva la fuerza de ἐλέγχω como exposición de culpa.'
  - Se conservó el singular 'pecado' para reflejar el griego.
  - '''Justicia'' se usa como traducción principal de δικαιοσύνη, con ''rectitud'' en nota para la alternativa documentada.'
