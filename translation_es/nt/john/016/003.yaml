translation:
  language: es
  text: Y harán estas cosas porque no han conocido al Padre ni a mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no conocieron al Padre ni a mí'', o ''no han llegado a conocer al Padre ni a mí''. El verbo griego admite más de una forma natural de expresarlo aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple conserva la coordinación directa del griego sin añadir inferencias temporales o consecutivas que el contexto no exige.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: BDAG
  rationale: El plural neutro se refiere a los actos hostiles ya mencionados; 'estas cosas' mantiene el plural y el valor anafórico de manera natural en español.
- source_word: ποιήσουσιν
  english_pob_choice: they will do
  chosen_spanish: harán
  alternatives_spanish:
  - van a hacer
  - llevarán a cabo
  lexicon: BDAG
  rationale: El futuro activo de ποιέω se expresa con naturalidad por 'harán'; evita una formulación demasiado explicativa y preserva la relación directa con 'estas cosas'.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce causa; 'porque' comunica bien la fuerza causal en español y corresponde al valor explicativo que el POB inglés también destacó.
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: they have not known
  chosen_spanish: no han conocido
  alternatives_spanish:
  - no conocieron
  - no llegaron a conocer
  lexicon: BDAG
  rationale: El aoristo puede verse como pasado simple o como estado con relevancia presente. 'No han conocido' conserva la fuerza relacional y el efecto vigente de su ignorancia, como en el inglés POB. 'Conocer' mantiene el valor bíblico/johannino de conocimiento relacional.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al Padre celestial
  - al Padre, Dios
  lexicon: BDAG
  rationale: En Juan, 'el Padre' es un título personal divino; el artículo y la mayúscula se conservan en español. El 'a' personal refleja el objeto directo animado y evita una literalidad incómoda.
- source_word: οὐδὲ ἐμέ
  english_pob_choice: or me
  chosen_spanish: ni a mí
  alternatives_spanish:
  - ni me
  - ni tampoco a mí
  lexicon: BDAG
  rationale: La coordinación negativa en español se expresa naturalmente con 'ni... ni'. Esto preserva el paralelismo con 'al Padre' y mantiene la referencia a Jesús en primera persona.
theological_decisions:
- issue: Lenguaje joánico del conocimiento respecto al Padre y a Jesús
  english_pob_reading: they have not known the Father or me
  chosen_spanish_reading: no han conocido al Padre ni a mí
  alternative_spanish_readings:
  - no conocieron al Padre ni a mí
  - no han llegado a conocer al Padre ni a mí
  rationale: 'La traducción conserva la afirmación teológica central: la persecución brota de no conocer relacionalmente al Padre y a Jesús. ''Conocer'' mantiene el peso joánico sin expandir la frase hacia una explicación doctrinal adicional.'
  doctrine_reference: Juan 16:3; filosofía de traducción POB §§1, 3, 6
translation_notes:
  revision_awareness: El control de revisión indica alto acuerdo y ningún cambio en la pasada más reciente; por tanto, esta redacción sigue de cerca el texto base y el rastro auditado sin introducir ajustes no respaldados.
  spanish_consistency_notes:
  - Se mantiene 'Padre' con mayúscula por su valor titular en el Evangelio de Juan.
  - Se usa 'conocer' para reflejar el sentido relacional del griego γινώσκω, no mera información intelectual.
  - La negación coordinada 'ni a mí' preserva el paralelismo con 'al Padre' y evita una construcción menos natural en español.
