    text: 'También: «os pondrán fuera de la sinagoga» o «os excluirán de las sinagogas».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «ofreciendo adoración a Dios» o «rindiendo servicio religioso a Dios».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige la sintaxis española más grave («os harán excluidos»), reubica correctamente la nota cultual, y ajusta el conector para reflejar mejor la intensificación de ἀλλ’. «Os excluirán de las sinagogas» expresa con naturalidad el valor de ἀποσυναγώγους ποιήσουσιν ὑμᾶς. «De hecho» recoge el matiz escalonado documentado para ἀλλ’. «Se acerca la hora» mantiene el idiomático joánico de ἔρχεται ὥρα de forma más natural en español. «Todo el que os mate» preserva la fuerza genérica de πᾶς ὁ ἀποκτείνας sin perder claridad.
