revisions:
- from: Ellos os harán excluidos de las sinagogas[a]; pero[b] viene la hora cuando cualquiera que os mate pensará que está ofreciendo servicio a Dios.
  to: Os excluirán de las sinagogas[a]; de hecho, se acerca la hora cuando todo el que os mate pensará que está ofreciendo servicio a Dios[b].
  rationale: La revisión corrige la sintaxis española más grave («os harán excluidos»), reubica correctamente la nota cultual, y ajusta el conector para reflejar mejor la intensificación de ἀλλ’. «Os excluirán de las sinagogas» expresa con naturalidad el valor de ἀποσυναγώγους ποιήσουσιν ὑμᾶς. «De hecho» recoge el matiz escalonado documentado para ἀλλ’. «Se acerca la hora» mantiene el idiomático joánico de ἔρχεται ὥρα de forma más natural en español. «Todo el que os mate» preserva la fuerza genérica de πᾶς ὁ ἀποκτείνας sin perder claridad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el sentido del griego: expulsión/exclusión de la comunidad sinagogal, venida de una hora futura, y la ironía de que el asesino crea rendir servicio a Dios. Sin embargo, hay dos desajustes importantes: «os harán excluidos» es poco idiomático en español para ποιήσουσιν + predicativo, y «pero» no reproduce bien la intensificación de ἀλλ’ aquí, donde el inglés auditado eligió «indeed». También «viene la hora» es comprensible, pero «se acerca la hora» o «viene una hora» suena más natural; además «cualquiera que os mate» es aceptable, aunque «todo el que os mate» se alinea mejor con πᾶς ὁ.'
  spanish_quality_summary: 'La legibilidad del borrador es irregular. «Os harán excluidos» suena forzado y no corresponde al español natural; «os excluirán de las sinagogas» comunica mejor el mismo contenido. La nota [b] está mal anclada: el marcador aparece junto a «pero», pero la nota trata de alternativas para «ofreciendo servicio a Dios». También conviene reemplazar «pero» por «de hecho» para reflejar el matiz intensificador y reubicar [b] al sintagma cultual. El resto es claro y digno.'
  glossary_alignment: 'No hay conflicto con terminología de proyecto: θεῷ está bien como «Dios». No aparecen Yahvé/Mesías/Espíritu/etc. La decisión de «servicio» para λατρείαν concuerda con la auditoría inglesa, con alternativas de «adoración» y «servicio religioso» preservadas en nota. La excepción principal es estilística/semántica en la construcción verbal española, no de glosario.'
  issues:
  - severity: high
    issue: «os harán excluidos» es una construcción no idiomática en español
    rationale: Aunque intenta reflejar ποιήσουσιν ὑμᾶς + predicativo, en español suena antinatural. «Os excluirán de las sinagogas» o «harán que seáis excluidos» serían mejores; la primera es más clara y fiel al sentido lexical documentado.
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado
    rationale: El marcador [b] aparece tras «pero», pero su contenido explica alternativas para «ofreciendo servicio a Dios». Según las reglas, el marcador debe aparecer exactamente en la palabra o frase pertinente.
  - severity: medium
    issue: «pero» debilita la intensificación de ἀλλ’ en este contexto
    rationale: La auditoría inglesa justificó «indeed» como intensificación escalonada, no mera oposición. En español, «de hecho» o «más aún» representa mejor ese movimiento discursivo que «pero».
  - severity: medium
    issue: «viene la hora» es menos natural que alternativas españolas cercanas
    rationale: No es incorrecto, pero «se acerca la hora» o «viene una hora» lee mejor en español contemporáneo y mantiene el giro joánico sin rigidez.
  revised_spanish_text: Os excluirán de las sinagogas[a]; de hecho, se acerca la hora cuando todo el que os mate pensará que está ofreciendo servicio a Dios[b].
  revised_footnotes:
