translation:
  language: es
  text: Os excluirán de las sinagogas[a]; de hecho, se acerca la hora cuando todo el que os mate pensará que está ofreciendo servicio a Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «os pondrán fuera de la sinagoga» o «os excluirán de las sinagogas».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «ofreciendo adoración a Dios» o «rindiendo servicio religioso a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποσυναγώγους
  english_pob_choice: outcasts from the synagogues
  chosen_spanish: excluidos de las sinagogas
  alternatives_spanish:
  - expulsados de la sinagoga
  - puestos fuera de la sinagoga
  - excluidos de la sinagoga
  lexicon: BDAG
  rationale: El adjetivo señala exclusión de la comunidad sinagogal. «Excluidos de las sinagogas» conserva el sentido de expulsión y la pluralidad del griego, sin añadir una connotación más fuerte de marginalidad que el texto no exige.
- source_word: ποιήσουσιν ὑμᾶς
  english_pob_choice: they will make you
  chosen_spanish: os harán
  alternatives_spanish:
  - os causarán ser
  - os convertirán en
  lexicon: BDAG
  rationale: El verbo ποιέω con predicado aquí tiene fuerza causativa. En español, «os harán» reproduce esa causalidad de forma natural y breve, manteniendo el sentido de «hacer que sean» excluidos.
- source_word: ἀλλ’
  english_pob_choice: indeed
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - más bien
  - de hecho
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por una intensificación con «indeed», el griego introduce un contraste fuerte. En español, «pero» comunica con claridad esa transición enfática; la fuerza discursiva queda reforzada por la estructura de la oración siguiente.
- source_word: ἔρχεται ὥρα
  english_pob_choice: an hour is coming
  chosen_spanish: viene la hora
  alternatives_spanish:
  - se acerca la hora
  - llega la hora
  - viene un momento
  lexicon: BDAG
  rationale: La expresión joánica admite una formulación idiomática breve. «Viene la hora» preserva el giro característico del texto y es plenamente natural en español, sin diluir la imagen temporal de ὥρα.
- source_word: ἵνα
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - para que
  - de modo que
  lexicon: BDAG
  rationale: Aquí ἵνα introduce el contenido temporal del momento venidero. «Cuando» expresa de manera idiomática esa relación temporal en español, evitando una traducción mecánica por «que» o «para que».
- source_word: πᾶς ὁ ἀποκτείνας ὑμᾶς
  english_pob_choice: everyone who kills you
  chosen_spanish: cualquiera que os mate
  alternatives_spanish:
  - todo el que os mate
  - quienquiera que os mate
  - todos los que os maten
  lexicon: BDAG
  rationale: La construcción participial sustantivada tiene valor general e inclusivo. «Cualquiera que os mate» preserva esa amplitud universal en un español claro y directo.
- source_word: δόξῃ
  english_pob_choice: will think
  chosen_spanish: pensará
  alternatives_spanish:
  - creerá
  - se imaginará
  - supondrá
  lexicon: BDAG
  rationale: 'δόκεω expresa aquí una convicción subjetiva equivocada. «Pensará» es la opción más natural en español y mantiene la ironía: el agresor cree estar actuando correctamente.'
- source_word: λατρείαν
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - culto
  - adoración
  - servicio religioso
  lexicon: BDAG
  rationale: λατρεία designa servicio de carácter religioso o cultual. «Servicio» es amplio y fiel al griego, y conserva la ambigüedad útil entre acto religioso y servicio devocional sin reducirlo a «adoración».
- source_word: προσφέρειν
  english_pob_choice: offering
  chosen_spanish: ofreciendo
  alternatives_spanish:
  - presentando
  - rindiendo
  - prestando
  lexicon: BDAG
  rationale: Con λατρείαν, προσφέρειν tiene sentido de presentar u ofrecer. «Ofreciendo» mantiene esa relación verbal en español y deja claro que el supuesto acto es visto como una ofrenda a Dios.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - ante Dios
  lexicon: BDAG
  rationale: El dativo se rinde naturalmente con «a Dios» en español para expresar el destinatario de la acción religiosa, conservando la dirección del acto supuesto por los perseguidores.
theological_decisions:
- issue: Ironía cultual en el acto homicida
  english_pob_reading: offering service to God
  chosen_spanish_reading: ofreciendo servicio a Dios
  alternative_spanish_readings:
  - ofreciendo adoración a Dios
  - rindiendo servicio religioso a Dios
  rationale: 'El texto presenta la autojustificación religiosa de los asesinos. La traducción debe mantener esa ironía sin suavizarla: no se afirma que su acto sea aceptable, sino que ellos lo creen así.'
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor genérico de πᾶς ὁ ἀποκτείνας
  english_pob_reading: everyone who kills you ... he is offering
  chosen_spanish_reading: cualquiera que os mate ... pensará que está ofreciendo
  alternative_spanish_readings:
  - todo el que os mate ... pensará que ofrece
  - quienquiera que os mate ... creerá que ofrece
  rationale: El griego usa participio masculino singular con fuerza representativa. En español, «cualquiera que os mate» mantiene el valor genérico, y el singular verbal conserva la forma del original sin perder claridad.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no introdujo cambios; este borrador mantiene esa línea, con una solución española que conserva la exclusión sinagogal, la hora venidera y la ironía cultual del pasaje.
  spanish_consistency_notes:
  - Se conserva el tratamiento de segunda persona plural con «os», coherente con el plural del griego.
  - «Dios» traduce θεῷ de manera directa y mantiene el referente teológico sin eufemismos.
  - «Servicio» se usa para λατρεία para preservar el sentido cultual amplio, no necesariamente «adoración» en sentido estrecho.
  - La forma «viene la hora» respeta el idiomatismo joánico sin añadir interpretación temporal extra.
