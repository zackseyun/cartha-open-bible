translation:
  language: es
  text: 'Pero les digo la verdad: les conviene que yo me vaya. Porque si no me voy, el Abogado[a] de ningún modo vendrá a ustedes; pero si me voy, lo enviaré a ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ayudador», «Consejero» o «Consolador»; griego παράκλητος.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: BDAG
  rationale: Marca el contraste con el dolor inmediato de los discípulos en el contexto; «Pero» es la adversativa más natural y breve en español.
- source_word: τὴν ἀλήθειαν λέγω ὑμῖν
  english_pob_choice: I am telling you the truth
  chosen_spanish: les digo la verdad
  alternatives_spanish:
  - les estoy diciendo la verdad
  - les hablo con verdad
  lexicon: BDAG
  rationale: Conserva la afirmación solemne de veracidad. En español, «les digo la verdad» suena natural y fiel sin forzar un progresivo innecesario.
- source_word: συμφέρει ὑμῖν
  english_pob_choice: it is better for you
  chosen_spanish: les conviene
  alternatives_spanish:
  - es mejor para ustedes
  - les es de beneficio
  lexicon: BDAG
  rationale: συμφέρει expresa conveniencia/ventaja. «Les conviene» comunica bien la idea de beneficio o ventaja en español, aunque «es mejor para ustedes» sigue siendo una alternativa válida.
- source_word: ἵνα ἐγὼ ἀπέλθω
  english_pob_choice: that I go away
  chosen_spanish: que yo me vaya
  alternatives_spanish:
  - que yo parta
  - que yo me aleje
  lexicon: BDAG
  rationale: La cláusula con ἵνα expresa el contenido de lo que resulta ventajoso. «Me vaya» es idiomático y mantiene el sentido de alejamiento de ἀπέλθω.
- source_word: ἐὰν γὰρ μὴ ἀπέλθω
  english_pob_choice: For if I do not go away
  chosen_spanish: Porque si no me voy
  alternatives_spanish:
  - Pues si no me voy
  - Porque si no parto
  lexicon: BDAG
  rationale: γάρ introduce explicación; «Porque» refleja esa relación causal/explanatoria. Se mantiene la repetición verbal con la línea anterior usando «me voy».
- source_word: ὁ παράκλητος
  english_pob_choice: the Advocate
  chosen_spanish: el Consolador
  alternatives_spanish:
  - el Abogado
  - el Ayudador
  - el Consejero
  - el Paráclito
  lexicon: BDAG
  rationale: El término tiene un rango semántico amplio y cargado teológicamente. En español, «Consolador» es una opción tradicional y comprensible, pero no agota el matiz personal/representativo; por eso se preservan alternativas y se marca nota. Dado que el inglés POB eligió «Advocate», también podrían usarse «Abogado» o «Consejero», pero se evita cerrar indebidamente el campo semántico.
- source_word: οὐ μὴ ἔλθῃ
  english_pob_choice: will certainly not come
  chosen_spanish: no vendrá
  alternatives_spanish:
  - de ningún modo vendrá
  - ciertamente no vendrá
  - no llegará
  lexicon: BDAG
  rationale: La negación enfática οὐ μὴ con subjuntivo comunica imposibilidad enfática. «No vendrá» es claro y natural; la fuerza enfática se puede explicitar en nota si se desea, aunque no es obligatoria en el texto principal.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - hacia ustedes
  - con ustedes
  lexicon: BDAG
  rationale: πρός con acusativo indica movimiento hacia los discípulos. «A ustedes» es el equivalente directo y natural en español latinoamericano.
- source_word: ἐὰν δὲ πορευθῶ
  english_pob_choice: but if I go
  chosen_spanish: pero si me voy
  alternatives_spanish:
  - pero si parto
  - pero si emprendo el camino
  lexicon: BDAG
  rationale: δέ introduce contraste. «Me voy» conserva la naturalidad de la repetición del verbo de salida y evita una literalidad extraña.
- source_word: πέμψω αὐτὸν
  english_pob_choice: I will send him
  chosen_spanish: se lo enviaré
  alternatives_spanish:
  - lo enviaré
  - le enviaré
  - se lo mandaré
  lexicon: BDAG
  rationale: πέμπω significa «enviar». Se usa dativo ético/clítico natural en español para evitar ambigüedad con el complemento «a ustedes». El pronombre masculino se conserva implícitamente en el objeto directo clítico «lo», pero la referencia personal se mantiene por el contexto del Consolador.
theological_decisions:
- issue: Rendering of παράκλητος in Johannine discourse
  english_pob_reading: the Advocate
  chosen_spanish_reading: el Consolador
  alternative_spanish_readings:
  - el Abogado
  - el Ayudador
  - el Consejero
  - el Paráclito
  rationale: El término griego designa una figura personal con función de asistencia/defensa/intercesión. «Consolador» es ampliamente reconocible en la tradición hispana, pero no agota el campo semántico; por eso se preservan alternativas para no borrar la tensión lexical. El término no se translitera en el texto principal porque en español bíblico ello suele oscurecer el sentido inmediato.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5, 6; preservar el sentido del texto fuente y documentar variaciones relevantes.'
- issue: Negación enfática οὐ μὴ ἔλθῃ
  english_pob_reading: will certainly not come
  chosen_spanish_reading: no vendrá
  alternative_spanish_readings:
  - ciertamente no vendrá
  - de ningún modo vendrá
  - no vendrá en absoluto
  rationale: 'El griego expresa una negación enfática de fuerte certeza. La versión principal «no vendrá» es idiomática, pero la fuerza enfática se reconoce como tensión lexical: el lector debe saber que el griego es más enfático que una simple negación neutral.'
  doctrine_reference: 'DOCTRINE.md: fidelidad semántica y preservación de énfasis cuando sea relevante.'
- issue: Referencia personal del Paracleto
  english_pob_reading: him
  chosen_spanish_reading: se lo enviaré
  alternative_spanish_readings:
  - lo enviaré
  - se lo enviaré a ustedes
  rationale: El griego presenta al παράκλητος con formas masculinas y como destinatario personal de envío. El español usa «se lo enviaré» para conservar la relación personal sin cargar la frase. No se debe depersonalizar el referente con una lectura neutra.
  doctrine_reference: 'DOCTRINE.md: respetar el lenguaje personal del texto y no importar una lectura impersonal.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el flujo inglés; el pasaje muestra alto acuerdo entre revisión y control cruzado, así que la propuesta española sigue de cerca el audit trail sin introducir cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene el trato en segunda persona plural con «ustedes» para coherencia con el registro latinoamericano amplio.
  - Se conserva la repetición de la idea de irse/me voy en los tres movimientos del versículo.
  - Se evita «SEÑOR» o sustituciones litúrgicas no presentes en el griego de este versículo.
  - Se opta por un español claro y digno, con nota para la ambigüedad lexical de παράκλητος.
