  source_alignment_summary: El borrador refleja bien la estructura básica del griego y mantiene el contraste, la conveniencia de la partida de Jesús y la relación condicional entre su ida y la venida del παράκλητος. Sin embargo, no sigue la decisión léxica auditada del POB para παράκλητος ('Advocate') y además coloca la nota [a] en 'el' en vez de anclarla al término relevante. También atenúa sin compensación la negación enfática οὐ μὴ ἔλθῃ.
  spanish_quality_summary: El español es claro y natural, pero la colocación de notas es defectuosa y 'Consolador' aquí se aparta innecesariamente del razonamiento documentado. 'Se lo enviaré a ustedes' es comprensible, pero 'lo enviaré a ustedes' expresa con más transparencia la referencia personal masculina sin rodeo clítico.
  glossary_alignment: No hay términos del glosario mayor en conflicto directo, pero sí una desalineación importante con la decisión teológica/lexical documentada para παράκλητος. Debe preferirse 'el Abogado' como equivalente español más cercano a 'the Advocate', preservando alternativas en nota. La referencia personal debe mantenerse con 'lo'.
  issues:
  - severity: high
    issue: παράκλητος se tradujo como 'Consolador' en vez de seguir la decisión auditada 'Advocate'.
    rationale: El rastro de auditoría inglés documenta explícitamente que 'Advocate' es la elección principal por su fuerza representativa/personal en Juan 14–16 y 1 Juan 2:1. 'Consolador' es tradicional, pero desplaza el centro semántico y contradice la decisión registrada sin necesidad contextual.
  - severity: medium
    issue: Las notas al pie están mal ancladas y redundantes.
    rationale: La nota [a] aparece en 'el[a]' cuando debería anclarse al término traducido de παράκλητος. Además, hay dos notas para el mismo punto léxico; basta una nota bien formulada en el término principal.
  - severity: medium
    issue: La negación enfática οὐ μὴ ἔλθῃ quedó reducida a una negación simple.
    rationale: Aunque 'no vendrá' es natural, el griego expresa énfasis fuerte. Conviene reflejarlo en el texto con 'de ningún modo vendrá' o 'ciertamente no vendrá', especialmente porque el inglés POB explicitó 'will certainly not come'.
  - severity: low
    issue: '''Se lo enviaré a ustedes'' es menos directo que ''lo enviaré a ustedes''.'
    rationale: Ambas opciones son idiomáticas, pero 'lo enviaré a ustedes' muestra con mayor claridad el objeto personal masculino αὐτόν y evita una ligera opacidad del clítico compuesto.
  revised_spanish_text: 'Pero les digo la verdad: les conviene que yo me vaya. Porque si no me voy, el Abogado[a] de ningún modo vendrá a ustedes; pero si me voy, lo enviaré a ustedes.'
