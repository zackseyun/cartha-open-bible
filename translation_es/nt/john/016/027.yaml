translation:
  language: es
  text: Porque el Padre mismo los ama, ya que ustedes me han amado y han creído que yo he venido de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salí de Dios» o «vine de la presencia de Dios»; el griego también puede sugerir procedencia desde la presencia de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - personalmente
  lexicon: BDAG
  rationale: Se usa como intensificador con ὁ πατήρ. «Mismo» preserva la fuerza enfática sin volver la frase pesada en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón o explicación de la afirmación anterior. «Porque» comunica con claridad esa relación causal en español.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: En Juan funciona como título para Dios; por eso va con mayúscula en español.
- source_word: φιλεῖ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama con afecto
  - tiene cariño por
  lexicon: BDAG
  rationale: φιλέω expresa amor afectuoso y personal. «Ama» es natural en español y no debilita el vínculo relacional del contexto.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - los a ustedes
  lexicon: BDAG
  rationale: El objeto directo se refiere al grupo de discípulos; en este registro, «los» es fluido y claro en español latinoamericano.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: ya que
  alternatives_spanish:
  - porque
  - puesto que
  lexicon: BDAG
  rationale: El primer ὅτι expresa la causa por la que el Padre los ama. «Ya que» mantiene el valor causal con buen tono discursivo.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis. «Ustedes» conserva ese peso sin sonar forzado.
- source_word: ἐμὲ
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Objeto directo de πεφιλήκατε, con referencia a Jesús.
- source_word: πεφιλήκατε
  english_pob_choice: have loved
  chosen_spanish: han amado
  alternatives_spanish:
  - han tenido amor por mí
  - han estado amándome
  lexicon: BDAG
  rationale: El perfecto indica una acción previa con vigencia presente. «Han amado» mantiene esa relación aspectual y la conexión léxica con φιλεῖ.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: 'Coordina los dos fundamentos mencionados por Jesús: amarlo y creer.'
- source_word: πεπιστεύκατε
  english_pob_choice: have believed
  chosen_spanish: han creído
  alternatives_spanish:
  - han llegado a creer
  - han confiado
  lexicon: BDAG
  rationale: El perfecto señala una creencia ya establecida. «Han creído» es la opción directa y fiel en español.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que yo
  - el hecho de que
  lexicon: BDAG
  rationale: Introduce el contenido de la creencia, no una causa.
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - desde Dios
  - de junto a Dios
  lexicon: BDAG
  rationale: παρά con genitivo puede señalar origen. «De Dios» es la forma más natural en español y conserva la afirmación de procedencia.
- source_word: ἐξῆλθον
  english_pob_choice: I came
  chosen_spanish: he salido
  alternatives_spanish:
  - salí
  - he venido
  - he salido de la presencia de Dios
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι aquí expresa procedencia/origen en relación con Dios. «He salido» mantiene la idea de salida o procedencia sin sobreexplicar.
theological_decisions:
- issue: Origen y misión de Jesús
  english_pob_reading: I came from God; the Greek can also suggest coming from God's presence.
  chosen_spanish_reading: he salido de Dios
  alternative_spanish_readings:
  - he venido de Dios
  - he salido de la presencia de Dios
  rationale: La frase preserva la afirmación joánica de procedencia/origen sin convertirla en paráfrasis doctrinal. Se mantiene abierta la posible matización espacial de παρά con genitivo, como en el audit trail inglés.
  doctrine_reference: Juan 1:1–18; afirmaciones cristológicas joánicas
translation_notes:
  revision_awareness: Se revisó el rastro auditado en inglés y no se detectaron cambios posteriores aplicados; la versión aprobada sigue siendo la misma línea de traducción, por lo que el español se alinea directamente con esa decisión estable.
  spanish_consistency_notes:
  - Se mantiene «Padre» como título divino con mayúscula.
  - Se usa «Dios» para θεός y no una sustitución litúrgica con máscara.
  - Se conserva el contraste de amor y creencia sin armonizarlo en exceso.
  - La nota de pie preserva la ambigüedad lexical de παρά/ἐξέρχομαι sin expandir el texto principal.
