translation:
  language: es
  text: Hasta ahora no han pedido nada en mi nombre[b]. Pidan[a], y recibirán, para que su alegría sea completa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sigan pidiendo». El imperativo presente puede implicar una acción continua o repetida en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: «En mi nombre» puede denotar una oración relacionada con la persona, la autoridad y la misión de Jesús; el texto conserva la frase literal en vez de limitarla a una sola explicación.
    reason: lexical_alternative
  - marker: c
    text: 'O: «para que su alegría sea plena».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἄρτι
  english_pob_choice: Until now
  chosen_spanish: Hasta ahora
  alternatives_spanish:
  - Hasta este momento
  - Hasta el momento
  lexicon: BDAG
  rationale: La locución temporal marca el límite de tiempo que llega hasta el presente. «Hasta ahora» es natural en español y conserva el valor idiomático sin rigidez.
- source_word: ᾐτήσατε
  english_pob_choice: have asked for
  chosen_spanish: han pedido
  alternatives_spanish:
  - han solicitado
  - han pedido algo
  lexicon: BDAG
  rationale: αἰτέω expresa pedir/solicitar algo. «Han pedido» es idiomático en español y mantiene el sentido de una petición, no solo de formular una pregunta.
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: BDAG
  rationale: Con la negación, οὐδὲν transmite la idea de «nada». «Nada» es la opción más natural y concisa en español.
- source_word: ἐν τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - en representación mía
  - bajo mi autoridad
  lexicon: BDAG
  rationale: Se conserva la expresión literal joánica «en mi nombre» porque es teológicamente densa y no debe reducirse a una sola glosa explicativa.
- source_word: αἰτεῖτε
  english_pob_choice: Ask
  chosen_spanish: Pidan
  alternatives_spanish:
  - Sigan pidiendo
  - Soliciten
  lexicon: BDAG
  rationale: El imperativo presente puede tener fuerza general o iterativa. «Pidan» mantiene el mandato de forma natural; la posible continuidad queda recogida como alternativa.
- source_word: λήμψεσθε
  english_pob_choice: you will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - recibirán eso
  lexicon: BDAG
  rationale: El futuro de λαμβάνω se expresa normalmente como «recibir». En contexto de oración, esta opción es precisa y sobria.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce propósito o resultado. «Para que» es claro, natural y conserva la relación final sin añadir interpretación extra.
- source_word: ἡ χαρὰ ὑμῶν
  english_pob_choice: your joy
  chosen_spanish: su alegría
  alternatives_spanish:
  - su gozo
  - la alegría de ustedes
  lexicon: BDAG
  rationale: «χαρά» puede ser «alegría» o «gozo». Se prefirió «alegría» por ser clara y ampliamente inteligible en español; el poseedor plural se mantiene con «su».
- source_word: ᾖ πεπληρωμένη
  english_pob_choice: may be full / may be complete
  chosen_spanish: sea completa
  alternatives_spanish:
  - esté llena
  - sea llena
  - alcance plenitud
  lexicon: BDAG
  rationale: La construcción perifrástica expresa un estado de plenitud resultante. «Sea completa» comunica bien ese estado en español y preserva la posibilidad de entender plenitud sin forzar una metáfora distinta.
theological_decisions:
- issue: Sentido de «en mi nombre»
  english_pob_reading: Retain the literal phrase 'in my name' without interpretive expansion.
  chosen_spanish_reading: Mantener la frase literal «en mi nombre» sin ampliarla interpretativamente.
  alternative_spanish_readings:
  - en representación de mí
  - bajo mi autoridad
  - en unión conmigo
  rationale: La expresión joánica es más amplia que cualquier glosa única. Mantenerla literal preserva la tensión teológica y evita estrechar su alcance.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió «may be full» en lugar de «may be made full» para reflejar con más directa naturalidad la forma gramatical del griego y mantener el registro formal. En español, se optó por «sea completa», que comunica el estado de plenitud sin forzar una perífrasis pasiva poco natural.
  spanish_consistency_notes:
  - Se conserva la fórmula joánica «en mi nombre» por coherencia con otras ocurrencias del Evangelio de Juan.
  - Se prefirió «alegría» para χαρά por naturalidad y transparencia, manteniendo un término plenamente comprensible en español.
  - Se mantuvo un tono bíblico moderno y digno, evitando arcaísmos innecesarios.
