translation:
  language: es
  text: 'Sus discípulos le dijeron[a]: «Mira[b], ahora hablas abiertamente y no hablas con ninguna figura de lenguaje[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dicen». El griego usa un presente narrativo que en español puede expresarse naturalmente en pasado.
    reason: lexical_alternative
  - marker: b
    text: O «Ve» o «Vean». El imperativo griego funciona como una llamada de atención.
    reason: lexical_alternative
  - marker: c
    text: O «dicho figurado», «proverbio», «parábola» o «dicho velado». Aquí se refiere a hablar de manera figurada o indirecta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγουσιν
  english_pob_choice: said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - dijeron
  lexicon: BDAG
  rationale: Se toma como verbo narrativo en pasado, natural en español. El dativo implícito de destinatario se expresa con 'le' para hacer clara la referencia a Jesús sin añadir contenido ajeno.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: His disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: '''Sus discípulos'' es la forma idiomática y transparente en español para preservar la relación posesiva con Jesús.'
- source_word: Ἴδε
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Ve
  lexicon: BDAG
  rationale: Interjección de atención. 'Mira' mantiene el carácter directo y natural del griego en español actual.
- source_word: ἐν παρρησίᾳ
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - claramente
  - con franqueza
  - con audacia
  - con libertad de palabra
  lexicon: BDAG
  rationale: En este contexto joánico, παρρησία contrasta con el habla indirecta o figurada. 'Abiertamente' conserva bien esa oposición sin cargar innecesariamente el matiz de valentía que también puede tener el término.
- source_word: λαλεῖς
  english_pob_choice: are speaking
  chosen_spanish: hablas
  alternatives_spanish:
  - estás hablando
  lexicon: BDAG
  rationale: El presente español simple expresa de manera natural la observación actual de los discípulos. El matiz progresivo del inglés no es necesario en español para este contexto.
- source_word: παροιμίαν
  english_pob_choice: figure of speech
  chosen_spanish: parábola
  alternatives_spanish:
  - refrán
  - proverbio
  - dicho figurado
  - figura de lenguaje
  lexicon: BDAG
  rationale: En Juan, παροιμία suele referirse a un dicho indirecto o figurado. 'Parábola' es una opción española clásica y comprensible para este tipo de habla velada, aunque no debe entenderse en sentido técnico exclusivo de los Evangelios sinópticos.
- source_word: οὐδεμίαν
  english_pob_choice: any
  chosen_spanish: ninguna
  alternatives_spanish:
  - ni una
  lexicon: BDAG
  rationale: Equivale al énfasis negativo del griego con una negación natural en español delante del sustantivo singular femenino.
- source_word: λέγεις
  english_pob_choice: are not speaking
  chosen_spanish: dices
  alternatives_spanish:
  - hablas
  lexicon: BDAG
  rationale: Se mantiene la correspondencia verbal con λέγω/'decir' para no suavizar la relación con el texto griego. Aunque 'hablas' podría sonar más idiomático con 'parábola', 'dices' conserva mejor la forma del original.
theological_decisions:
- issue: Sentido de παρρησία frente a παροιμία en Juan 16:29
  english_pob_reading: Jesus is speaking openly/plainly rather than in figurative or indirect language.
  chosen_spanish_reading: Jesús habla abiertamente, en contraste con un modo de hablar figurado o velado.
  alternative_spanish_readings:
  - Jesús habla con franqueza
  - Jesús habla claramente
  - Jesús habla con audacia
  rationale: El contraste inmediato del versículo favorece la idea de habla abierta/llana frente a habla indirecta. 'Abiertamente' mantiene esa oposición en español sin forzar el matiz de valentía, aunque éste no queda excluido por completo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente al mantener el paralelismo entre la primera y la segunda cláusula, pero ajusta el español para que suene natural y conserve la oposición semántica entre hablar abiertamente y hablar con lenguaje figurado.
  spanish_consistency_notes:
  - Se usa 'abiertamente' para ἐν παρρησίᾳ, conforme al contraste con lenguaje figurado, sin introducir innecesariamente 'valentía' en el cuerpo principal.
  - Se elige 'parábola' como equivalente funcional de παροιμία en este contexto joánico, pero la nota aclara que no es la parábola técnica de los sinópticos.
  - Se conserva el registro narrativo en pasado para el verbo introductorio y el presente simple para la observación directa de los discípulos, ambos naturales en español.
  - Se evita 'SEÑOR' y otras convenciones de ocultación porque el verso no contiene el Tetragrámaton ni una cita directa del nombre divino.
