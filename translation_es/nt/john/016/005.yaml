translation:
  language: es
  text: 'Pero ahora voy al que me envió, y ninguno de ustedes me pregunta: «¿A dónde vas?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νῦν δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora bien
  lexicon: BDAG
  rationale: «δὲ» marca transición o contraste; «Pero ahora» conserva esa fuerza discursiva de modo natural en español y sigue el matiz temporal de νῦν sin sonar forzado.
- source_word: ὑπάγω
  english_pob_choice: I am going
  chosen_spanish: voy
  alternatives_spanish:
  - estoy yendo
  - me voy
  - me dirijo
  lexicon: BDAG
  rationale: En este contexto de movimiento dirigido, el presente simple español expresa bien la acción en curso o inminente. «Voy» mantiene la naturalidad y no añade una lectura excesiva de partida como «me voy».
- source_word: πρὸς τὸν πέμψαντά με
  english_pob_choice: to the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me mandó
  - al que me ha enviado
  - al que me mandó a mí
  lexicon: BDAG
  rationale: El participio articular se vuelve de forma idiomática «al que me envió». «Envió» conserva el lenguaje de misión de πέμπω y evita introducir «Padre», que el griego no nombra aquí.
- source_word: πέμψαντά
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - comisionó
  lexicon: BDAG
  rationale: «Envió» es la equivalencia más fiel y habitual para πέμπω en Juan. «Comisionó» sería demasiado interpretativo; «mandó» es posible pero menos neutro en este contexto.
- source_word: οὐδεὶς ἐξ ὑμῶν
  english_pob_choice: none of you
  chosen_spanish: ninguno de ustedes
  alternatives_spanish:
  - nadie entre ustedes
  - ninguno de vosotros
  lexicon: BDAG
  rationale: La expresión partitiva se vierte de manera natural como «ninguno de ustedes», preservando la negación enfática sin arcaísmo.
- source_word: ἐρωτᾷ με
  english_pob_choice: asks me
  chosen_spanish: me pregunta
  alternatives_spanish:
  - me pregunta algo
  - me interroga
  lexicon: BDAG
  rationale: Aquí ἐρωτάω significa hacer una pregunta. «Me pregunta» comunica con precisión la ausencia de una pregunta dirigida a Jesús.
- source_word: Ποῦ ὑπάγεις;
  english_pob_choice: Where are you going?
  chosen_spanish: ¿A dónde vas?
  alternatives_spanish:
  - ¿Adónde vas?
  - ¿Dónde vas?
  lexicon: BDAG
  rationale: La pregunta directa en español pide una formulación natural. «¿A dónde vas?» conserva el valor direccional de ὑπάγω y evita una construcción artificial.
theological_decisions:
- issue: Identidad del referente de «el que me envió»
  english_pob_reading: Render generically as 'the one who sent me' without explicitly adding 'the Father.'
  chosen_spanish_reading: Se mantiene «al que me envió» sin explicitar «el Padre».
  alternative_spanish_readings:
  - al Padre que me envió
  - a mi Padre que me envió
  rationale: El griego usa un participio articular sin nombrar al Padre. Dado que el contexto joánico lo hace reconocible, la traducción conserva la forma explícita del texto fuente y no inserta una identificación doctrinal que no aparece en esta cláusula.
  doctrine_reference: Juan 16:5; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: La revisión auditada reporta alta concordancia y ningún cambio necesario; esta redacción española sigue de cerca el texto griego y la lectura inglesa aprobada sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto, porque en este versículo no aparece κύριος ni el Nombre divino.
  - Se mantiene el lenguaje de envío con «envió» para reflejar la misión joánica de πέμπω.
  - La pregunta final se formula con giro idiomático moderno en español, sin perder el sentido direccional de ὑπάγω.
