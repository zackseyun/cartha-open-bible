revisions:
- from: Por un poco de tiempo[a], y ya no me verán; y otra vez, por un poco de tiempo, y me verán.
  to: Un poco más[a], y ya no me verán; y de nuevo un poco más, y me verán.
  rationale: 'Se corrige un error sustancial de persona verbal: el original habla a «ustedes», no de «ellos». También se mejora la naturalidad de Μικρὸν con «Un poco más», que en este contexto temporal suena más idiomático y mantiene la brevedad y el paralelismo del griego y del inglés POB. Se conserva la nota léxica sobre los dos verbos griegos para «ver».'
