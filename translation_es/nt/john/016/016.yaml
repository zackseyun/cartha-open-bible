  - severity: medium
    issue: «Por un poco de tiempo» es menos natural que una formulación temporal más idiomática
    rationale: Aunque semánticamente posible, esta expresión suena pesada en español bíblico contemporáneo. «Un poco más» o «Dentro de poco» representan mejor el uso adverbial de Μικρὸν sin sobreexplicar.
  - severity: low
