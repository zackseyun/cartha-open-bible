translation:
  language: es
  text: Un poco más[a], y ya no me verán; y de nuevo un poco más, y me verán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego usa dos verbos distintos para «ver» aquí: θεωρέω en la primera cláusula y ὁράω en la segunda. La diferencia puede sugerir matiz, pero ambos se traducen con «ver» porque el contraste principal del versículo es temporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μικρὸν
  english_pob_choice: A little while
  chosen_spanish: Por un poco de tiempo
  alternatives_spanish:
  - Un poco de tiempo
  - Un breve tiempo
  - Pronto
  lexicon: BDAG
  rationale: El adjetivo neutro funciona adverbialmente para indicar una duración corta. «Por un poco de tiempo» comunica con naturalidad la brevedad temporal sin volverlo una paráfrasis interpretativa como «pronto».
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no más
  - no seguirán
  lexicon: BDAG
  rationale: «Ya no» expresa cesación desde este momento en español natural y conserva el valor aspectual de οὐκέτι mejor que alternativas más rígidas o ambiguas.
- source_word: θεωρεῖτέ
  english_pob_choice: see
  chosen_spanish: me verán
  alternatives_spanish:
  - me observarán
  - me contemplarán
  - me mirarán
  lexicon: BDAG
  rationale: Aunque θεωρέω puede sugerir observar o contemplar, el contexto inmediato prioriza el contraste temporal; «ver» mantiene la claridad y el paralelismo con ὄψεσθε sin imponer una distinción que el texto no hace explícita.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - después
  - luego
  lexicon: BDAG
  rationale: «Otra vez» reproduce bien el valor de repetición o retorno temporal y suena natural en español bíblico contemporáneo.
- source_word: ὄψεσθέ
  english_pob_choice: you will see
  chosen_spanish: me verán
  alternatives_spanish:
  - me contemplarán
  - me percibirán
  - me volverán a ver
  lexicon: BDAG
  rationale: El futuro de ὁράω se traduce de manera directa con «ver» para preservar el paralelismo semántico con la primera cláusula y respetar la decisión inglesa de no forzar una diferencia léxica artificial.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús; «me» es la opción más simple y fiel en ambas cláusulas.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  - pero
  lexicon: BDAG
  rationale: La conjunción repetida estructura las dos mitades del dicho; «y» conserva la coordinación y el ritmo del griego.
theological_decisions:
- issue: Si distinguir en español los dos verbos griegos para ‘ver’ (θεωρέω / ὁράω)
  english_pob_reading: Render both with 'see' in the main text; preserve temporal contrast rather than lexical contrast
  chosen_spanish_reading: Traducir ambos con «ver» en el texto principal
  alternative_spanish_readings:
  - «me contemplarán ... me verán»
  - «me observarán ... me verán»
  rationale: En Juan, estos verbos pueden solaparse ampliamente; diferenciarles con verbos distintos en español podría sugerir una oposición teológica demasiado fuerte. La tensión del versículo está sobre todo en el contraste temporal (ausencia/presencia), no en una distinción léxica que deba resolverse en la traducción.
  doctrine_reference: Primacía del texto original y preservación de la tensión interpretativa; no sobreespecificar donde el griego no lo hace
translation_notes:
  revision_awareness: 'El pasaje presenta una observación ya revisada con alto acuerdo entre controles: se mantuvo sin cambios sustanciales porque la solución principal ya preserva la tensión temporal y el paralelismo verbal del griego sin forzar una distinción léxica en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «ver» para ambos verbos de visión, siguiendo la decisión auditada del texto en inglés de preservar el contraste temporal por encima de una diferenciación léxica artificial.
  - «Por un poco de tiempo» conserva la idiomaticidad de Μικρόν sin introducir ‘pronto’ como interpretación.
  - La puntuación con punto y coma refleja la coordinación balanceada del dicho griego.
