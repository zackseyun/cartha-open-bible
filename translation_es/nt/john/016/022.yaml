translation:
  language: es
  text: Por tanto, ustedes también ahora tienen tristeza; pero yo los volveré a ver[a], y su corazón se alegrará, y nadie les quitará su alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «ustedes me verán otra vez». El griego aquí dice más literalmente: «yo los volveré a ver», lo cual puede subrayar la iniciativa de Jesús al volver a encontrarse con sus discípulos.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Marca la relación inferencial con el contexto previo sin sonar rígido en español. «Así que» conserva el valor discursivo de conclusión/aplicación.
- source_word: νῦν μὲν λύπην ἔχετε
  english_pob_choice: now have sorrow
  chosen_spanish: ahora tienen tristeza
  alternatives_spanish:
  - ahora tienen dolor
  - por el momento tienen tristeza
  lexicon: BDAG
  rationale: λύπη expresa tristeza, aflicción o dolor; «tristeza» es natural y mantiene el contraste con la alegría posterior. «Ahora» refleja νῦν y el verbo en presente conserva la situación actual.
- source_word: πάλιν δὲ
  english_pob_choice: but ... again
  chosen_spanish: pero ... otra vez
  alternatives_spanish:
  - pero ... de nuevo
  - sin embargo ... otra vez
  lexicon: BDAG
  rationale: «Pero» expresa el contraste de δέ; «otra vez» conserva πάλιν como repetición/reencuentro y funciona con naturalidad en español.
- source_word: ὄψομαι ὑμᾶς
  english_pob_choice: I will see you
  chosen_spanish: yo los veré
  alternatives_spanish:
  - los veré otra vez
  - me dejaré ver por ustedes
  lexicon: BDAG
  rationale: Se preserva el sujeto de primera persona del griego. Aunque existe la alternativa de sentido pasivo/receptivo en la tradición interpretativa, el texto griego dice literalmente «yo veré a ustedes»; por eso se mantiene la iniciativa de Jesús. Se usa plural formal «los» para el trato de segunda persona plural en español bíblico neutral.
- source_word: χαρήσεται ὑμῶν ἡ καρδία
  english_pob_choice: your heart will rejoice
  chosen_spanish: su corazón se alegrará
  alternatives_spanish:
  - su corazón gozará
  - su corazón se regocijará
  lexicon: BDAG
  rationale: La frase literalmente dice «el corazón de ustedes se alegrará». «Se alegrará» reproduce el verbo de manera idiomática y clara; «corazón» conserva el centro personal/emocional del original.
- source_word: τὴν χαρὰν ὑμῶν
  english_pob_choice: your joy
  chosen_spanish: su alegría
  alternatives_spanish:
  - su gozo
  - la alegría de ustedes
  lexicon: BDAG
  rationale: χαρά se puede traducir como alegría o gozo. «Alegría» es más natural en español moderno y mantiene la relación léxica con el verbo προηγούμενο/χαρήσεται. «Su» continúa el plural de segunda persona.
- source_word: οὐδεὶς αἴρει ἀφ’ ὑμῶν
  english_pob_choice: no one will take ... from you
  chosen_spanish: nadie les quitará ...
  alternatives_spanish:
  - nadie les tomará ...
  - nadie les arrebatará ...
  lexicon: BDAG
  rationale: αἴρω aquí comunica quitar/retirar. «Quitar» es directo y natural en español, y «nadie» reproduce οὐδείς. El futuro «quitará» sigue la orientación temporal confirmada en la revisión inglesa.
theological_decisions:
- issue: Iniciativa de Jesús en la reunión futura
  english_pob_reading: I will see you again
  chosen_spanish_reading: yo los veré otra vez
  alternative_spanish_readings:
  - ustedes me verán otra vez
  - se les aparecerá otra vez Jesús
  rationale: La sintaxis griega pone a Jesús como sujeto de ὄψομαι. Se conserva esa agencia para no armonizar con otros pasajes y para mantener la fuerza teológica de la iniciativa del Resucitado.
  doctrine_reference: Translation philosophy §1 (primacía del texto original) y §3 (preservar tensiones y matices)
- issue: Presente/futuro en la pérdida de la alegría
  english_pob_reading: no one will take your joy from you
  chosen_spanish_reading: nadie les quitará su alegría
  alternative_spanish_readings:
  - nadie les quita su alegría
  - nadie se la quitará
  rationale: Se adopta el futuro, de acuerdo con la revisión inglesa y con el valor contextual del dicho como promesa. «Quitar» mantiene el sentido de αἴρει sin forzar un tecnicismo.
  doctrine_reference: Translation philosophy §2 (equivalencia óptima con fidelidad formal donde importa)
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «takes» por «will take» para reflejar mejor la orientación futura del contexto y del griego. En español se siguió esa corrección con «quitará». También se mantuvo la lectura griega explícita de primera persona en ὄψομαι, evitando armonizarla con la formulación de 16:16.
  spanish_consistency_notes:
  - Se usa «tristeza» para λύπη y «alegría» para χαρά, conservando el contraste léxico del versículo.
  - Se mantiene la segunda persona plural con «ustedes/los/les/su», adecuado para un registro bíblico neutral latinoamericano.
  - «Corazón» se conserva como sede de la alegría, sin reemplazarlo por una paráfrasis psicológica moderna.
  - No se ocultó el sujeto griego de primera persona en «yo los veré», porque forma parte del punto interpretativo documentado en el audit trail.
