translation:
  language: es
  text: En aquel día pedirán en mi nombre[a], y no les digo que yo pediré al Padre acerca de ustedes[c][b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En aquel día».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa dos verbos distintos para «pedir» en este versículo: αἰτέω para la petición de los discípulos y ἐρωτάω para la petición de Jesús al Padre.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por ustedes» / «en favor de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Ese día
  lexicon: BDAG
  rationale: La frase es temporal y enfatiza de forma demostrativa el momento señalado. 'En aquel día' conserva esa solemnidad y la referencia deíctica del griego, con un español natural y reverente.
- source_word: ἐν τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - por mi autoridad
  lexicon: BDAG
  rationale: La locución joánica se traduce de manera directa para preservar su carga teológica e intertextual. 'En mi nombre' es la forma natural en español y no fuerza una explicación interpretativa que el texto no explicita.
- source_word: αἰτήσεσθε
  english_pob_choice: you will ask
  chosen_spanish: pedirán
  alternatives_spanish:
  - solicitarán
  - pedirán ustedes
  lexicon: BDAG
  rationale: En contexto de oración/súplica, 'pedir' comunica bien el acto de solicitar. La forma futura mantiene el valor verbal del griego y el sujeto plural queda claro por la conjugación.
- source_word: οὐ λέγω ὑμῖν
  english_pob_choice: I do not say to you
  chosen_spanish: no les digo
  alternatives_spanish:
  - no les estoy diciendo
  - no les digo a ustedes
  lexicon: BDAG
  rationale: Se conserva el presente de decir como en el griego y el tono directo de Jesús. 'No les digo' resulta natural en español sin perder la fuerza de la negación.
- source_word: ἐρωτήσω
  english_pob_choice: I will ask
  chosen_spanish: rogaré
  alternatives_spanish:
  - pediré
  - preguntaré
  lexicon: BDAG
  rationale: Como el segundo verbo aparece en un contexto de relación con el Padre, 'rogar' expresa mejor la dimensión de intercesión que el simple 'pedir'. Se mantiene el futuro para reflejar el tiempo verbal del griego y distinguirlo del primer 'pedir'.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al Padre celestial
  - al Padre
  lexicon: BDAG
  rationale: El artículo griego apunta al Padre como persona identificable en el discurso joánico. En español, la preposición y el artículo definidos se contraen naturalmente en 'al Padre'.
- source_word: περὶ ὑμῶν
  english_pob_choice: concerning you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - acerca de ustedes
  - en favor de ustedes
  lexicon: BDAG
  rationale: La preposición περί puede significar 'acerca de' y, por contexto, implicar intercesión o representación. 'Por ustedes' deja abierta esa fuerza intercesora sin resolverla del todo, en línea con la tensión preservada por la POB inglesa.
theological_decisions:
- issue: Si la cláusula final debe interpretarse como una negación absoluta de la intercesión de Jesús o solo como una afirmación circunscrita al punto que está exponiendo
  english_pob_reading: The translation preserves the wording without implying that Jesus never intercedes, rendering the clause straightforwardly as a statement about what he is not saying here.
  chosen_spanish_reading: 'La traducción conserva la afirmación puntual: Jesús dice que no está diciendo eso aquí, sin convertirla en una negación absoluta de toda su intercesión.'
  alternative_spanish_readings:
  - Jesús no intercederá nunca por ustedes
  - Jesús no tiene ningún papel mediador
  rationale: El contexto inmediato enfatiza que los discípulos pedirán al Padre en su nombre, pero otras partes del Nuevo Testamento sí presentan a Jesús como intercesor. Conviene preservar esa tensión teológica en vez de resolverla con una paráfrasis más fuerte.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB en inglés, que prefirió 'I do not say' por reflejar mejor el presente de λέγω. También preserva la distinción léxica entre αἰτήσεσθε y ἐρωτήσω mediante 'pedirán' y 'rogaré', y mantiene abierta la relación de περὶ ὑμῶν con una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando corresponda, pero este versículo no contiene el nombre divino explícito.
  - Se mantiene 'Padre' con mayúscula por referencia a la persona divina en el discurso de Jesús.
  - '''Mi nombre'' se conserva sin glosa, conforme al idiomático joánico y a la línea terminológica del proyecto.'
  - La combinación 'pedirán' / 'rogaré' distingue dos verbos diferentes del griego sin volver artificial el español.
