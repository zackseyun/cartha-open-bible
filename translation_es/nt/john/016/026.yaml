revisions:
- from: En aquel día pedirán en mi nombre[a], y no les digo que yo rogaré al Padre por ustedes[c][b];
  to: En aquel día pedirán en mi nombre[a], y no les digo que yo pediré al Padre acerca de ustedes[c][b];
  rationale: Se reemplaza «rogaré» por «pediré» para no sobreinterpretar ἐρωτήσω y para seguir la estrategia documentada de mantener ambos verbos como «pedir» en el texto, explicando la diferencia en nota. Se reemplaza «por ustedes» por «acerca de ustedes» para reflejar mejor el valor primario de περὶ ὑμῶν, dejando las alternativas intercesoras en la nota. No se requieren cambios adicionales.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:05:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y conserva adecuadamente el tiempo futuro y el sentido general del versículo. Sin embargo, dos elecciones importantes se apartan de la línea auditada: ἐρωτήσω se volvió «rogaré», lo que sobreinterpreta el verbo hacia intercesión, y περὶ ὑμῶν se volvió «por ustedes», que desplaza el sentido básico de «acerca de/con respecto a ustedes» hacia representación. La POB inglesa preserva la tensión sin intensificarla; el español debe hacer lo mismo.'
  spanish_quality_summary: El español es natural y legible, con buen registro. «En aquel día» suena digno y aceptable, aunque «Aquel día» también sería posible. La principal mejora necesaria es evitar una combinación («rogaré ... por ustedes») que en español suena más interpretativa que el original y que además borra la cercanía léxica entre los dos verbos griegos discutida en la nota.
  glossary_alignment: 'No hay conflicto con términos troncales del proyecto como Yahvé/Mesías. Sí hay un problema metodológico con la decisión léxica de ἐρωτάω: la auditoría inglesa eligió también «ask» y relegó la distinción verbal a nota, mientras el borrador español la fuerza en el texto con «rogaré». Para alinearse con la rationale documentada, conviene usar «pediré» y dejar la distinción αἰτέω/ἐρωτάω en la nota. Asimismo, περί debe reflejarse de forma primaria como «acerca de ustedes» o equivalente cercano, con «por ustedes / en favor de ustedes» en nota como alternativas.'
  issues:
  - severity: high
    issue: «rogaré» para ἐρωτήσω sobreinterpreta el verbo
    rationale: La decisión inglesa conserva «ask» también aquí para no resolver la tensión teológica ni intensificar la intercesión. «Rogaré» añade un matiz suplicante/intercesor más fuerte que el griego no exige en este contexto.
  - severity: high
    issue: «por ustedes» para περὶ ὑμῶν desplaza el sentido principal
    rationale: περί con genitivo aquí se tradujo auditadamente como «concerning you». «Por ustedes» privilegia una lectura vicaria/intercesora; el español debe mantener esa idea solo como alternativa en nota, no como texto principal.
  - severity: medium
    issue: La nota sobre los dos verbos pierde fuerza si el texto principal usa «pedirán»/«rogaré»
    rationale: La auditoría inglesa preserva la cercanía léxica en el texto y explica la diferencia en nota. Si el español cambia uno a «rogaré», ya no refleja la misma estrategia de traducción documentada.
  revised_spanish_text: En aquel día pedirán en mi nombre[a], y no les digo que yo pediré al Padre acerca de ustedes[c][b];
  revised_footnotes:
  - marker: a
    text: 'O: «En aquel día».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa dos verbos distintos para «pedir» en este versículo: αἰτέω para la petición de los discípulos y ἐρωτάω para la petición de Jesús al Padre.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «por ustedes» / «en favor de ustedes».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «rogaré» por «pediré» para no sobreinterpretar ἐρωτήσω y para seguir la estrategia documentada de mantener ambos verbos como «pedir» en el texto, explicando la diferencia en nota. Se reemplaza «por ustedes» por «acerca de ustedes» para reflejar mejor el valor primario de περὶ ὑμῶν, dejando las alternativas intercesoras en la nota. No se requieren cambios adicionales.
