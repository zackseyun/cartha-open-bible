  spanish_quality_summary: El español es claro, pero «me veis» desentona con el objetivo de español neutro latinoamericano; «me ven» es preferible. Además, para un registro eclesial amplio, «rectitud» funciona mejor como equivalente principal de «righteousness» que «justicia» en este versículo, evitando desplazar el sentido hacia lo forense-social. La redacción revisada queda natural y digna.
  glossary_alignment: La terminología del proyecto para δικαιοσύνη es «justicia / rectitud» según contexto. Aquí, conforme a la justificación teológica auditada, corresponde «rectitud» en el texto principal con «justicia» en nota. «Padre» está bien; no hay otros términos glosariales disputados.
