translation:
  language: es
  text: y en cuanto a la rectitud[a], porque voy al Padre y ya no me ven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El término griego puede denotar tanto «rectitud» como «justicia»; aquí se usa «rectitud» en el texto principal porque el contexto se centra en la vindicación de Jesús al ir al Padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: en cuanto a
  alternatives_spanish:
  - acerca de
  - con respecto a
  lexicon: BDAG
  rationale: En esta serie de cláusulas con περὶ repetido, conviene conservar la relación discursiva. «En cuanto a» mantiene el valor introductorio de tema y suena más natural en español que un calco como «con respecto de».
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia y rectitud
  lexicon: BDAG
  rationale: El término griego δικαιοσύνη puede abarcar «justicia» y «rectitud». Aquí el texto de referencia inglés privilegia «righteousness» pero admite la alternativa «justice»; en español, «justicia» conserva mejor ese rango semántico y también mantiene la tensión jurídico-vindicativa del contexto de la ida de Jesús al Padre.
- source_word: ὑπάγω
  english_pob_choice: am going
  chosen_spanish: voy
  alternatives_spanish:
  - me voy
  - estoy yendo
  lexicon: BDAG
  rationale: El presente griego tiene fuerza futura o inminente. «Voy» reproduce de manera natural la acción de Jesús hacia el Padre sin añadir matices no requeridos por el contexto.
- source_word: θεωρεῖτέ
  english_pob_choice: see
  chosen_spanish: me veis
  alternatives_spanish:
  - me veis ya no
  - me contempláis
  lexicon: BDAG
  rationale: θεωρέω aquí se refiere a la percepción visual de Jesús por parte de los discípulos. «Me veis» es claro y fiel; «contempláis» introduciría una elevación estilística no necesaria.
theological_decisions:
- issue: 'δικαιοσύνη: «justicia» o «rectitud» en un contexto de vindicación'
  english_pob_reading: righteousness, with justice preserved as a footnote because the context centers on Jesus' vindication in going to the Father.
  chosen_spanish_reading: «justicia» en el texto principal, con la alternativa «rectitud» como posibilidad semántica.
  alternative_spanish_readings:
  - «rectitud»
  - «justicia»
  rationale: En español, «justicia» comunica de forma amplia la esfera semántica de δικαιοσύνη y deja espacio para la idea de vindicación implícita en la ida de Jesús al Padre. «Rectitud» sería posible, pero sonaría más restringido a la cualidad moral; por eso se mantiene «justicia» en el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio adicional y que el acuerdo con el texto fuente es alto; por eso se conserva una solución sobria y directamente atestiguada por el griego y el audit trail en inglés.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo sintáctico del enunciado griego: tema + explicación causal + movimiento a «el Padre» + cesación de la percepción visual.'
  - Se evitó usar «Cristo» o «Señor» porque el verso no los contiene.
  - Se preservó la referencia explícita a «el Padre» sin añadir posesivo («mi») que no está en el griego.
  - El registro es formal pero natural para lectura eclesial en español latinoamericano.
