translation:
  language: es
  text: Ahora sabemos que tú sabes todas las cosas y no tienes necesidad de que nadie[a] te pregunte. Por esto creemos que viniste de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te cuestione». El verbo griego puede significar «preguntar» o «cuestionar»; aquí se traduce «pregunte» porque el contexto trata del conocimiento de Jesús y de los pensamientos no expresados de los discípulos.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Ahora mismo
  lexicon: BDAG
  rationale: El adverbio temporal introduce la comprensión presente de los discípulos; «Ahora» comunica con naturalidad ese sentido inmediato en español.
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  lexicon: BDAG
  rationale: Οἶδα expresa conocimiento pleno en tiempo presente. «Sabemos» es el equivalente natural en español y conserva el valor de certeza.
- source_word: οἶδας πάντα
  english_pob_choice: you know all things
  chosen_spanish: tú conoces todas las cosas
  alternatives_spanish:
  - tú lo sabes todo
  - tú conoces todo
  lexicon: BDAG
  rationale: «Todas las cosas» refleja el alcance total de πάντα y mantiene un tono más formal que «todo», sin añadir explicación doctrinal.
- source_word: οὐ χρείαν ἔχεις
  english_pob_choice: have no need
  chosen_spanish: no tienes necesidad
  alternatives_spanish:
  - no necesitas
  lexicon: BDAG
  rationale: La construcción nominal griega se expresa con naturalidad en español como «no tienes necesidad», conservando el énfasis de la frase sin volverla demasiado coloquial.
- source_word: ἵνα τίς σε ἐρωτᾷ
  english_pob_choice: that anyone should question you
  chosen_spanish: de que nadie te pregunte
  alternatives_spanish:
  - de que alguien te pregunte
  - de que nadie te cuestione
  lexicon: BDAG
  rationale: El griego permite la idea de pedir/inquirir o cuestionar. Aquí, por el contexto de la comprensión de Jesús, «pregunte» mantiene la amplitud semántica y evita cargar el verbo con una dureza innecesaria; la nota preserva la alternativa de «cuestione».
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: En esto
  alternatives_spanish:
  - Por esto
  - Con esto
  lexicon: BDAG
  rationale: La expresión marca el fundamento de la convicción de los discípulos. «En esto» es la correspondencia más directa y fluida en español.
- source_word: πιστεύομεν
  english_pob_choice: we believe
  chosen_spanish: creemos
  alternatives_spanish:
  - confiamos
  lexicon: BDAG
  rationale: En este contexto confesional, «creemos» es la traducción directa y más natural de πιστεύομεν.
- source_word: ἀπὸ θεοῦ ἐξῆλθες
  english_pob_choice: you came from God
  chosen_spanish: saliste de Dios
  alternatives_spanish:
  - viniste de Dios
  - saliste de parte de Dios
  lexicon: BDAG
  rationale: Ἐξῆλθες indica salida/origen. «Saliste de Dios» conserva con transparencia el matiz de procedencia del griego; «viniste de Dios» sería más idiomático, pero suaviza la imagen de origen que la frase expresa.
theological_decisions:
- issue: Alcance de «todas las cosas» respecto de la confesión sobre Jesús
  english_pob_reading: Retain the disciples' statement as-is without expanding it into an explicit doctrinal assertion beyond the text.
  chosen_spanish_reading: Conservar la confesión tal como está, sin convertirla en una formulación doctrinal más explícita.
  alternative_spanish_readings:
  - Hacer explícita la omnisciencia de Jesús con una paráfrasis interpretativa
  rationale: La frase griega presenta la confesión de los discípulos sobre el conocimiento de Jesús. Traducirla literalmente mantiene su peso teológico sin añadir una explicación que el texto no formula.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Sentido de ἀπὸ θεοῦ ἐξῆλθες
  english_pob_reading: you came from God
  chosen_spanish_reading: saliste de Dios
  alternative_spanish_readings:
  - viniste de Dios
  - saliste del Padre
  rationale: El griego afirma procedencia/origen divino. «Saliste de Dios» preserva esa afirmación sin introducir «Padre», que no aparece en esta cláusula.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que precisó la construcción «have no need that anyone should question you». En español se reflejó con «no tienes necesidad de que nadie te pregunte», manteniendo la relación sintáctica y la naturalidad del idioma.
  spanish_consistency_notes:
  - Se usó «Dios» de manera directa, conforme al texto griego, sin sustituirlo por una fórmula devocional más interpretativa.
  - Se prefirió «saliste de Dios» para conservar el matiz de procedencia/origen presente en ἐξῆλθες.
  - Se mantuvo el registro sobrio y confesional, acorde con el tono del versículo.
