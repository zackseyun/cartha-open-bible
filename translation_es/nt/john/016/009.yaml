translation:
  language: es
  text: acerca del pecado[a], porque no creen en mí;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que no creen en mí». El griego ὅτι puede traducirse de ambas maneras, pero «porque» refleja mejor la fuerza explicativa del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - con respecto a
  - sobre
  lexicon: BDAG
  rationale: En esta construcción con genitivo, περί introduce el tema sobre el cual obra el Espíritu. «Acerca de» comunica bien el valor temático en español y mantiene la relación discursiva repetida en el contexto inmediato.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado humano
  - pecados
  lexicon: BDAG
  rationale: El sustantivo singular abstracto apunta a la categoría de pecado, no a faltas individuales. «Pecado» preserva ese valor general y encaja naturalmente con la cláusula explicativa que sigue.
- source_word: μέν
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - ciertamente
  - por una parte
  lexicon: BDAG
  rationale: μέν marca la primera de una serie correlativa en los vv. 10–11. En español no requiere un equivalente explícito; la estructura enumerativa se conserva por la repetición de la frase introductoria.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι expresa la razón o fundamento explicativo de «acerca del pecado». «Porque» comunica con claridad esa fuerza causal en español actual mejor que «que», que sería más ambiguo.
- source_word: οὐ πιστεύουσιν
  english_pob_choice: they do not believe
  chosen_spanish: no creen
  alternatives_spanish:
  - no están creyendo
  - no tienen fe
  lexicon: BDAG
  rationale: El presente indicativo expresa la realidad vigente de la incredulidad. «No creen» es la forma natural y fiel en español para πιστεύω en este contexto.
- source_word: εἰς ἐμέ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - hacia mí
  - en relación conmigo
  lexicon: BDAG
  rationale: La construcción joánica πιστεύω εἰς señala confianza dirigida a Jesús. En español, «creer en mí» preserva esa orientación personal y relacional sin forzar un literalismo extraño.
theological_decisions:
- issue: Cómo identificar el pecado en el contexto inmediato
  english_pob_reading: The verse specifies unbelief in Jesus as the decisive instance or expression of 'sin' in this context.
  chosen_spanish_reading: El verso identifica la incredulidad en Jesús como la razón concreta por la cual se habla de pecado aquí.
  alternative_spanish_readings:
  - El verso habla de la pecaminosidad humana en general, con la incredulidad como un ejemplo.
  - El verso define todo pecado simplemente como falta de fe.
  rationale: La cláusula con ὅτι fundamenta directamente «acerca del pecado» en el hecho de que «no creen en mí». La traducción debe preservar esa conexión textual sin ampliarla a una formulación doctrinal más amplia de la que el versículo afirma.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requirieron cambios y el acuerdo externo fue alto.'
  spanish_consistency_notes:
  - Se mantiene «pecado» como término abstracto singular, no «pecados», para respetar el valor del griego.
  - Se usa «creer en mí» como equivalente idiomático de πιστεύω εἰς ἐμέ.
  - La preposición «acerca de» conserva el encuadre temático que enlaza este versículo con los vv. 10–11.
  - La nota al pie preserva la alternativa de traducción de ὅτι sin diluir la elección principal.
