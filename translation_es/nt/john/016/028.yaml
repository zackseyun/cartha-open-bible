translation:
  language: es
  text: Salí del Padre y he venido al mundo. De nuevo[a], dejo el mundo y voy al Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Otra vez».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: came from
  chosen_spanish: salí
  alternatives_spanish:
  - vine
  - salí fuera
  - salí del lado de
  lexicon: BDAG
  rationale: Ἐξῆλθον expresa salida/origen desde un punto. En español, «salí» comunica con naturalidad el movimiento desde el Padre sin añadir más de lo que el griego dice.
- source_word: ἐκ τοῦ πατρὸς
  english_pob_choice: from the Father
  chosen_spanish: del Padre
  alternatives_spanish:
  - desde el Padre
  - de parte del Padre
  lexicon: BDAG
  rationale: ἐκ con genitivo marca procedencia u origen. «Del Padre» es la forma más directa y natural en español para conservar ese origen.
- source_word: ἐλήλυθα
  english_pob_choice: have come
  chosen_spanish: he venido
  alternatives_spanish:
  - vine
  - he llegado
  lexicon: BDAG
  rationale: El perfecto de ἔρχομαι conserva una acción completada con relevancia presente. «He venido» reproduce bien ese valor aspectual en español.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al mundo humano
  - en el mundo
  lexicon: BDAG
  rationale: εἰς indica movimiento de entrada. En español, «al mundo» conserva esa dirección de llegada de forma idiomática y breve.
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Una vez más
  lexicon: BDAG
  rationale: πάλιν marca la repetición o el nuevo movimiento del discurso. «Otra vez» mantiene ese enlace secuencial de manera natural en español.
- source_word: ἀφίημι
  english_pob_choice: I am leaving
  chosen_spanish: dejo
  alternatives_spanish:
  - estoy dejando
  - me voy de
  - abandono
  lexicon: BDAG
  rationale: El presente de ἀφίημι en este contexto expresa una acción inminente. «Dejo» es la opción más sobria y fiel; «estoy dejando» sería más explicativo, y «abandono» añade fuerza no requerida.
- source_word: τὸν κόσμον
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - este mundo
  lexicon: BDAG
  rationale: κόσμος en Juan suele referirse al orden humano al que vino el Hijo. «El mundo» conserva el término tradicional y el alcance contextual sin sobreexplicar.
- source_word: πορεύομαι
  english_pob_choice: going
  chosen_spanish: voy
  alternatives_spanish:
  - me dirijo
  - me estoy yendo
  lexicon: BDAG
  rationale: πορεύομαι indica desplazamiento o ir hacia un destino. «Voy» es natural en español y conserva el movimiento hacia el Padre.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: to the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - hacia el Padre
  - hasta el Padre
  lexicon: BDAG
  rationale: πρός con acusativo señala dirección. «Al Padre» es la forma más idiomática y clara para expresar esa orientación.
theological_decisions:
- issue: Origen y retorno de Jesús respecto al Padre
  english_pob_reading: Render the clause straightforwardly as a claim of origin from the Father without expanding it into doctrinal paraphrase.
  chosen_spanish_reading: Traducir la afirmación de procedencia y retorno de Jesús de forma directa, sin añadir explicación doctrinal ajena al versículo.
  alternative_spanish_readings:
  - Venía de Dios
  - salí del Padre en sentido meramente funcional
  - volví al Padre
  rationale: El versículo sostiene explícitamente que Jesús procede del Padre y vuelve al Padre. La traducción debe conservar esa afirmación alta cristológica sin reemplazarla por paráfrasis doctrinales ni debilitarla a una mera misión funcional.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: Se corrigió la falla previa asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción mantiene la relación de origen/retorno con el Padre y el valor aspectual del perfecto en una forma natural para español.
  spanish_consistency_notes:
  - Se mantiene «Padre» con mayúscula por la referencia relacional a Dios en el contexto joánico.
  - «Mundo» conserva el término joánico κόσμος sin sustituirlo por una glosa interpretativa.
  - Se evita «Cristo» porque el versículo no usa Χριστός.
  - 'Se usa un orden español fluido, pero se preserva la secuencia: procedencia, venida, repetición, salida y destino.'
