translation:
  language: es
  text: Cuando haya sacado a todos los suyos[a], va delante de ellos, y las ovejas lo siguen, porque conocen su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘haya expulsado’ o ‘haya conducido fuera’; el verbo griego puede expresar tanto sacar como expulsar desde un recinto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  - Cuandoquiera que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal indefinida natural en español. ‘Cuando’ conserva el valor general del griego sin forzar repetición explícita.
- source_word: τὰ ἴδια πάντα
  english_pob_choice: all his own
  chosen_spanish: todas sus ovejas
  alternatives_spanish:
  - todo lo suyo
  - todos los suyos
  lexicon: BDAG
  rationale: El giro griego neutro apunta a lo que le pertenece al pastor; en el contexto pastoral se refiere a las ovejas. En español, ‘todas sus ovejas’ hace explícito el referente sin perder la idea de posesión.
- source_word: ἐκβάλῃ
  english_pob_choice: has brought out
  chosen_spanish: haya sacado
  alternatives_spanish:
  - haya expulsado
  - haya conducido fuera
  lexicon: BDAG
  rationale: El verbo puede sugerir ‘sacar’ o ‘expulsar’, pero aquí el contexto es de pastoreo y salida del redil. ‘Haya sacado’ preserva el movimiento hacia afuera sin imponer un sentido hostil.
- source_word: ἔμπροσθεν αὐτῶν
  english_pob_choice: before them
  chosen_spanish: va delante de ellas
  alternatives_spanish:
  - va antes que ellas
  - va al frente de ellas
  lexicon: BDAG
  rationale: La expresión espacial se vuelve natural en español con ‘va delante de ellas’, que conserva la imagen del pastor que guía al frente.
- source_word: πορεύεται
  english_pob_choice: he goes
  chosen_spanish: va
  alternatives_spanish:
  - camina
  - prosigue
  lexicon: BDAG
  rationale: ‘Va’ es breve, idiomático y mantiene el movimiento narrativo del texto.
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - los corderos
  - el rebaño
  lexicon: BDAG
  rationale: El sustantivo πρόβατα se refiere normalmente a ovejas; ‘las ovejas’ es la equivalencia directa y natural en español.
- source_word: αὐτῷ ἀκολουθεῖ
  english_pob_choice: follow him
  chosen_spanish: lo siguen
  alternatives_spanish:
  - lo siguen detrás
  - lo acompañan
  lexicon: BDAG
  rationale: En español, el dativo del griego se expresa de manera directa con el pronombre objeto ‘lo’. El plural verbal concuerda con ‘las ovejas’.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Introduce la razón por la que las ovejas lo siguen. ‘Porque’ es la conexión causal más clara y natural.
- source_word: οἴδασιν
  english_pob_choice: they know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - reconocen
  lexicon: BDAG
  rationale: ‘Conocen’ transmite conocimiento relacional y reconocimiento auditivo sin estrechar el sentido a una mera identificación técnica.
- source_word: τὴν φωνὴν αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  - su llamada
  lexicon: BDAG
  rationale: ‘Voz’ es la traducción natural de φωνή en este contexto pastoral; ‘su voz’ es claro y suficiente en español.
theological_decisions:
- issue: Fuerza de ἐκβάλῃ en contexto pastoral
  english_pob_reading: Rendered ἐκβάλῃ as 'has brought out' rather than 'drives out.'
  chosen_spanish_reading: ‘haya sacado’ en vez de ‘haya expulsado’ o ‘haya echado fuera’
  alternative_spanish_readings:
  - haya expulsado
  - haya echado fuera
  - haya llevado fuera
  rationale: El contexto inmediato es el del pastor y sus ovejas, no una expulsión hostil. ‘Haya sacado’ mantiene el sentido de salida desde un recinto sin introducir una connotación más dura de la necesaria.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete auditado; el presente borrador sigue el estado más reciente, marcado como sin cambios, y conserva la misma solución semántica para ἐκβάλῃ en clave pastoral.
  spanish_consistency_notes:
  - Se mantiene ‘ovejas’ para πρόβατα y no ‘rebaño’, porque el griego nombra a los animales, no solo al grupo.
  - ‘Voz’ se conserva sin ampliarla a ‘llamada’ para no añadir una interpretación que el texto no exige.
  - La secuencia verbal española usa pretérito perfecto de subjuntivo (‘haya sacado’) para reflejar adecuadamente la cláusula temporal indefinida del griego.
