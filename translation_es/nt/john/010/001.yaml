revisions:
- from: 'De cierto[a], de cierto les digo: el que no entra por la puerta[b] al redil[c] de las ovejas, sino que sube por otro lado, ese es un ladrón y un bandido[d].'
  to: 'En verdad[a], en verdad, les digo: el que no entra por la puerta[b] al redil[c] de las ovejas, sino que sube por otro lado, ese es un ladrón y un salteador[d].'
  rationale: Se ajusta la apertura a un español moderno y digno («En verdad, en verdad»), se conserva el resto de la sintaxis y la imagen fuente, y se mejora la distinción léxica entre κλέπτης y λῃστής con «salteador». También se afina la nota de θύρα para una alternativa española menos sobreespecificada.
  reviewer_model: gpt-5.4
