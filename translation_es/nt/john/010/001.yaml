translation:
  language: es
  text: 'En verdad[a], en verdad, les digo: el que no entra por la puerta[b] al redil[c] de las ovejas, sino que sube por otro lado, ese es un ladrón y un salteador[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Amén, amén». La fórmula ἀμήν intensifica la solemnidad de la declaración.
    reason: lexical_alternative
  - marker: b
    text: O «por la entrada». θύρα puede significar «puerta» o «entrada/portón» según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «corral de las ovejas» o «patio de las ovejas». αὐλή denota un recinto cerrado; «redil» comunica esa idea de manera breve y natural.
    reason: lexical_alternative
  - marker: d
    text: El griego distingue entre κλέπτης («ladrón») y λῃστής («salteador» o «bandido»), este último con frecuencia con la idea de robo violento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  english_pob_choice: Truly, truly
  chosen_spanish: De cierto, de cierto
  alternatives_spanish:
  - Amén, amén
  - Verdaderamente, verdaderamente
  lexicon: BDAG
  rationale: Conserva la fórmula enfática doble como apertura solemne. En español, «De cierto, de cierto» comunica con naturalidad y dignidad la fuerza de ἀμήν sin dejar sin explicar el valor discursivo de la expresión.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les declaro
  lexicon: BDAG
  rationale: Mantiene la fórmula directa de discurso. Se prefiere «les digo» por claridad y fluidez en español, sin añadir matices no presentes en el griego.
- source_word: ὁ μὴ εἰσερχόμενος
  english_pob_choice: the one who does not enter
  chosen_spanish: el que no entra
  alternatives_spanish:
  - quien no entra
  - el que no ingresa
  lexicon: BDAG
  rationale: El participio sustantivado se vierte con una construcción natural en español que conserva el singular genérico. «Entra» es más idiomático que un calco como «ingresa» en este contexto metafórico.
- source_word: διὰ τῆς θύρας
  english_pob_choice: through the door
  chosen_spanish: por la puerta
  alternatives_spanish:
  - por la puerta de entrada
  - por el portón
  lexicon: BDAG
  rationale: Se conserva la imagen concreta con «puerta», que es el equivalente léxico directo y la opción preferible dada la metáfora inmediata. «Por la puerta» expresa bien la entrada legítima sin forzar el contexto hacia «portón».
- source_word: εἰς τὴν αὐλὴν τῶν προβάτων
  english_pob_choice: into the sheepfold
  chosen_spanish: al redil de las ovejas
  alternatives_spanish:
  - al corral de las ovejas
  - al patio de las ovejas
  - al aprisco de las ovejas
  lexicon: BDAG
  rationale: αὐλή puede significar patio o recinto cerrado. «Redil» comunica de forma clara y bíblica el recinto donde se guardan las ovejas, y en español suena más natural que una explicación más larga, sin ocultar la idea de encierro.
- source_word: ἀλλὰ ἀναβαίνων ἀλλαχόθεν
  english_pob_choice: but climbs up from elsewhere
  chosen_spanish: sino que sube por otro lado
  alternatives_spanish:
  - sino que sube desde otro lugar
  - sino que trepa por otro sitio
  - sino que entra por otro lado
  lexicon: BDAG
  rationale: Se preserva la imagen de ascender por una vía no autorizada, pero en un español más fluido. «Sube por otro lado» comunica el contraste con entrar por la puerta y mantiene la idea de acceso indebido sin sonar artificial.
- source_word: ἐκεῖνος
  english_pob_choice: that one
  chosen_spanish: ese
  alternatives_spanish:
  - aquél
  - ese mismo
  - aquel
  lexicon: BDAG
  rationale: El demostrativo griego añade énfasis y señalamiento. «Ese» funciona bien en español para marcar distancia e identificación sin introducir género ni una explicitación innecesaria como «ese hombre».
- source_word: κλέπτης
  english_pob_choice: thief
  chosen_spanish: ladrón
  alternatives_spanish:
  - hurtador
  - ratero
  lexicon: BDAG
  rationale: Equivale al agente que roba de manera furtiva. «Ladrón» es el término normal y más claro en español para κλέπτης.
- source_word: λῃστής
  english_pob_choice: robber
  chosen_spanish: bandido
  alternatives_spanish:
  - salteador
  - asaltante
  - forajido
  lexicon: BDAG
  rationale: Se mantiene la distinción con κλέπτης. «Bandido» transmite con naturalidad la idea de uno que roba con violencia o intimidación; en este contexto funciona mejor que un tecnicismo más duro como «salteador».
theological_decisions:
- issue: Imagen metafórica de la entrada al recinto de las ovejas
  english_pob_reading: Render the imagery concretely as 'door' and 'sheepfold' without allegorical expansion.
  chosen_spanish_reading: Conservar la imagen concreta con 'puerta' y 'redil' sin expandirla alegóricamente.
  alternative_spanish_readings:
  - Usar 'portón' y 'corral'
  - Explicar la imagen como una referencia directa a líderes, salvación o acceso legítimo
  rationale: El versículo presenta una metáfora que el contexto inmediato desarrolla; por eso la traducción debe retener la imagen sin adelantar la interpretación. 'Redil' es suficientemente concreto y no impone una lectura doctrinal adicional.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Matiz del demostrativo ἐκεῖνος
  english_pob_reading: Use 'that one' to reflect the singular masculine form while keeping readable English.
  chosen_spanish_reading: Usar 'ese' para reflejar el señalamiento enfático sin introducir género explícito.
  alternative_spanish_readings:
  - aquél
  - ese mismo
  - ese hombre
  rationale: El griego remarca identificación y distancia. En español, 'ese' mantiene el señalamiento con naturalidad y evita añadir contenido que el texto no exige.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del inglés POB: ἀλλαχόθεν se entiende como ''por otro lado''/''from elsewhere'', y ἐκεῖνος se mantiene como demostrativo enfático sin añadir género. También se preserva la distinción lexical entre κλέπτης y λῃστής, reflejada en español mediante ''ladrón'' y ''bandido''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Puerta'' se conserva como equivalente directo de θύρα, con nota sobre la alternativa ''portón''.'
  - '''Redil'' traduce αὐλή de manera idiomática y mantiene el sentido de recinto cerrado.'
  - '''Ladrón'' y ''bandido'' preservan la distinción entre robo furtivo y robo violento.'
  - Se evita 'Cristo', 'Señor' o lenguaje interpretativo no presente en el versículo.
