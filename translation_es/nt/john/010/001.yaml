review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la fórmula introductoria solemne, el participio sustantivado genérico, la entrada legítima por la puerta al recinto de las ovejas, el contraste con subir por otra parte, y la distinción entre κλέπτης y λῃστής. Sin embargo, dos elecciones no siguen del todo el rastro auditado: «De cierto, de cierto» suena marcadamente arcaico para el estilo meta pedido, y «bandido» para λῃστής puede desplazar el sentido hacia forajido/brigante más que «robador violento». Además, la nota de θύρα como «portón» no es la mejor alternativa española frente al inglés auditado «gate».'
  spanish_quality_summary: El texto es legible y digno, pero «De cierto, de cierto» se siente demasiado heredado de Reina-Valera y menos natural en español moderno neutral. «En verdad, en verdad» conserva solemnidad sin arcaísmo excesivo. «Redil de las ovejas» funciona bien, aunque en español suele bastar «redil». «Sube por otro lado» es natural y fiel. «Ese es un ladrón y un salteador» mejora la distinción semántica frente a «bandido».
  glossary_alignment: No hay términos del glosario mayor directamente en juego salvo mantener decisiones léxicas del POB. La revisión propuesta alinea mejor ἀμήν con un español moderno y λῃστής con una distinción más nítida respecto de κλέπτης. No hay conflicto con terminología doctrinal del proyecto.
  issues:
  - severity: medium
    issue: «De cierto, de cierto» es demasiado arcaizante para el estilo español objetivo.
    rationale: Aunque fiel en solemnidad, el proyecto pide español moderno pero digno. «En verdad, en verdad» preserva el doble ἀμήν y su fuerza sin depender de una fórmula antigua.
  - severity: medium
    issue: «Bandido» para λῃστής no marca tan claramente la distinción frente a «ladrón».
    rationale: La nota inglesa explica una clase más violenta o forzosa de robo. «Salteador» comunica mejor esa diferencia léxica en español bíblico legible; «bandido» puede sugerir simplemente un forajido.
  - severity: low
    issue: La nota «portón» como alternativa a θύρα es menos precisa que «puerta de entrada» o «entrada».
    rationale: El rastro inglés conserva la alternativa 'gate', pero «portón» puede sobredeterminar el tamaño o tipo de acceso. Conviene una alternativa más neutral.
  revised_spanish_text: 'En verdad[a], en verdad, les digo: el que no entra por la puerta[b] al redil[c] de las ovejas, sino que sube por otro lado, ese es un ladrón y un salteador[d].'
