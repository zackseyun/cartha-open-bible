translation:
  language: es
  text: 'Pero muchos de ellos estaban diciendo[a]: «Tiene un demonio y está loco. ¿Por qué lo escuchan?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Está endemoniado y loco».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: estaban diciendo
  alternatives_spanish:
  - decían
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción repetida o en desarrollo; «estaban diciendo» conserva ese valor aspectual mejor que un pretérito simple.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: «Pero» reproduce bien el matiz adversativo frente a la reacción positiva anterior y suena natural en español.
- source_word: πολλοὶ ἐξ αὐτῶν
  english_pob_choice: many of them
  chosen_spanish: muchos de ellos
  alternatives_spanish:
  - muchos de entre ellos
  lexicon: BDAG
  rationale: La frase partitiva se expresa de forma idiomática en español con «muchos de ellos», conservando la idea de un subconjunto.
- source_word: Δαιμόνιον ἔχει
  english_pob_choice: He has a demon
  chosen_spanish: Tiene un demonio
  alternatives_spanish:
  - Está endemoniado
  - Tiene un espíritu inmundo
  lexicon: BDAG
  rationale: Se mantiene la formulación directa del griego, evitando una paráfrasis interpretativa; «demonio» corresponde con transparencia al término griego.
- source_word: μαίνεται
  english_pob_choice: is insane
  chosen_spanish: está loco
  alternatives_spanish:
  - está fuera de sí
  - está loco de remate
  lexicon: BDAG
  rationale: «Está loco» comunica la acusación de enajenación o desvarío con naturalidad en español contemporáneo sin suavizar el insulto ni introducir un término clínico no presente en el griego.
- source_word: τί αὐτοῦ ἀκούετε;
  english_pob_choice: Why do you listen to him?
  chosen_spanish: ¿Por qué lo escuchan?
  alternatives_spanish:
  - ¿Por qué lo oyen?
  - ¿Por qué le hacen caso?
  lexicon: BDAG
  rationale: El interrogativo funciona idiomáticamente como «por qué»; «escuchan» conserva el valor de ἀκούω con objeto en genitivo, y el pronombre de objeto directo «lo» refleja a Jesús como referente.
theological_decisions:
- issue: Conservar la acusación hostil sin resolverla interpretativamente
  english_pob_reading: He has a demon and is insane
  chosen_spanish_reading: Tiene un demonio y está loco
  alternative_spanish_readings:
  - Está endemoniado y loco
  - Tiene un demonio y está desvariando
  rationale: La traducción preserva la dureza de la imputación de los opositores tal como aparece en el texto, sin convertirla en una explicación doctrinal o clínica.
  doctrine_reference: Mantener la tensión narrativa y el habla insultante del texto fuente; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca en el texto principal exactamente donde corresponde, y que la nota alternativa esté anclada a esa marca.
  spanish_consistency_notes:
  - Se prefirió «demonio» como equivalente directo de δαιμόνιον, en línea con la transparencia del original.
  - Se mantuvo el valor imperfectivo de ἔλεγον con una perífrasis progresiva natural en español.
  - «Lo escuchan» preserva el referente singular masculino de Jesús en el contexto inmediato.
