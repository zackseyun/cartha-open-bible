  source_alignment_summary: El borrador español refleja fielmente el griego y el rastro de auditoría inglés. «Pero muchos de ellos» corresponde bien a δὲ πολλοὶ ἐξ αὐτῶν; «estaban diciendo» transmite adecuadamente el imperfecto ἔλεγον; «Tiene un demonio» preserva la formulación directa de Δαιμόνιον ἔχει; «está loco» comunica con naturalidad la acusación de μαίνεται; y «¿Por qué lo escuchan?» representa de manera idiomática τί αὐτοῦ ἀκούετε; sin añadir ni omitir sentido relevante.
  spanish_quality_summary: El español es natural, claro y digno, sin calcos torpes. La sintaxis y la puntuación funcionan bien en registro bíblico contemporáneo. «Estaban diciendo» suena un poco más analítico que «decían», pero sigue siendo plenamente aceptable y coherente con la decisión aspectual documentada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «demonio» es apropiado para δαιμόνιον, y la nota alternativa «Está endemoniado y loco» conserva la opción más idiomática documentada en inglés. No aparecen términos sensibles del glosario general que requieran ajuste.
