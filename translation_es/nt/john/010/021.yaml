  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, esclavo, etc. La elección «endemoniado» para δαιμονιζομένου y «demonio» para δαιμόνιον está alineada con la evidencia y con la racionalidad léxica documentada.
