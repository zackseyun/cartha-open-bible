translation:
  language: es
  text: 'Otros decían[a]: «Estas palabras no son de un endemoniado. ¿Acaso puede un demonio abrir los ojos de los ciegos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estas palabras no son de uno que está endemoniado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλοι
  english_pob_choice: Others
  chosen_spanish: Otros
  alternatives_spanish:
  - Algunos otros
  - Los demás
  lexicon: BDAG
  rationale: ὄλλοι introduce otro grupo distinto del anterior; «Otros» comunica bien la contraposición sin añadir matices no presentes en el griego.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - dijeron
  lexicon: BDAG
  rationale: El imperfecto sugiere habla en curso o repetida; en español, «decían» preserva ese valor sin sonar forzado.
- source_word: Ταῦτα τὰ ῥήματα
  english_pob_choice: These words
  chosen_spanish: Estas palabras
  alternatives_spanish:
  - Estas palabras dichas
  - Estas declaraciones
  lexicon: BDAG
  rationale: ῥήματα aquí alude a las palabras pronunciadas; «palabras» es la equivalencia más directa y natural en español.
- source_word: οὐκ ἔστιν δαιμονιζομένου
  english_pob_choice: are not those of a demon-possessed man
  chosen_spanish: no son de un endemoniado
  alternatives_spanish:
  - no son de uno poseído por un demonio
  - no proceden de un endemoniado
  lexicon: BDAG
  rationale: La construcción genitiva describe el tipo de hablante del cual procederían esas palabras. «Endemoniado» conserva la fuerza lexical de δαιμονίζομαι en un español bíblico claro, sin suavizarla.
- source_word: μὴ ... δύναται
  english_pob_choice: can it?
  chosen_spanish: ¿Puede... ?
  alternatives_spanish:
  - ¿acaso puede... ?
  - ¿puede realmente... ?
  lexicon: BDAG
  rationale: μή introduce una pregunta con respuesta esperada negativa. En español, la forma interrogativa simple ya deja clara la objeción retórica; el contexto completa la fuerza negativa.
- source_word: δαιμόνιον
  english_pob_choice: A demon
  chosen_spanish: un demonio
  alternatives_spanish:
  - un espíritu maligno
  - un demonio
  lexicon: BDAG
  rationale: δαιμόνιον corresponde directamente a «demonio». Se evita «espíritu maligno» para no introducir una interpretación más amplia que el término griego.
- source_word: τυφλῶν ὀφθαλμοὺς
  english_pob_choice: the eyes of the blind
  chosen_spanish: los ojos de los ciegos
  alternatives_spanish:
  - los ojos de los ciegos
  - los ojos de personas ciegas
  lexicon: BDAG
  rationale: 'Se conserva la imagen concreta del griego: ojos pertenecientes a ciegos. El plural genérico en español es natural y mantiene el eco de la sanidad del ciego del contexto inmediato.'
- source_word: ἀνοῖξαι
  english_pob_choice: open
  chosen_spanish: abrir
  alternatives_spanish:
  - abrir de par en par
  - dar vista a
  lexicon: BDAG
  rationale: ἀνοίγω significa literalmente «abrir». «Abrir» preserva la imagen verbal directa y el vínculo con «ojos»; «dar vista a» sería más interpretativo.
theological_decisions:
- issue: Renderización de δαιμονιζομένου
  english_pob_reading: demon-possessed man
  chosen_spanish_reading: endemoniado
  alternative_spanish_readings:
  - poseído por un demonio
  - demonizado
  rationale: La frase del texto expresa el juicio de la multitud sobre el origen de las palabras de Jesús. «Endemoniado» sigue la tradición léxica española más estable y conserva el peso del término sin explicar de más una doctrina de posesión.
  doctrine_reference: Principio de primacía del texto original y de mantener la tensión léxica sin suavizarla
- issue: Force of the rhetorical question introduced by μή
  english_pob_reading: A demon cannot open the eyes of the blind, can it?
  chosen_spanish_reading: ¿Puede un demonio abrir los ojos de los ciegos?
  alternative_spanish_readings:
  - ¿Acaso un demonio puede abrir los ojos de los ciegos?
  - ¿No puede un demonio abrir los ojos de los ciegos?
  rationale: El griego espera una respuesta negativa. La pregunta directa en español transmite esa objeción retórica de forma natural; el contexto deja implícita la respuesta esperada.
  doctrine_reference: Principio de conservar el valor pragmático de μή sin sobreexplicarlo
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de SBLGNT y el audit trail en inglés. Se conserva el contraste entre «otros» y los hablantes previos, el imperfecto de habla continua, la construcción genitiva de «endemoniado», y la pregunta retórica con expectativa negativa. No hubo revisiones previas aplicadas en el paquete de origen.
  spanish_consistency_notes:
  - Se mantiene «demonio» para δαιμόνιον y «endemoniado» para δαιμονιζομένου, distinguiendo el sustantivo del participio descriptivo.
  - Se usa «ciegos» en plural genérico para reproducir la expresión griega sin singularizar innecesariamente.
  - El texto evita «espíritu maligno» y «poseído» en el cuerpo principal para no desplazar el matiz lexical documentado en el paquete auditado.
