translation:
  language: es
  text: Yo y el Padre somos uno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa ἕν, neutro singular, lo que subraya la unidad sin identificar a Jesús y al Padre como una sola persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: El pronombre de primera persona se conserva explícito para mantener el énfasis del sujeto, como en el griego.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante simple; en español, 'y' es la forma natural aquí.
- source_word: ὁ πατὴρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: En el contexto joánico, el artículo señala una referencia titular y personal a Dios como Padre de Jesús; la mayúscula ayuda a comunicar ese valor en español.
- source_word: ἕν
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una sola cosa
  - en unidad
  lexicon: BDAG
  rationale: El neutro singular ἕν se vierte con 'uno' para conservar la afirmación directa de unidad sin convertirla en una paráfrasis explicativa. En español, 'somos uno' mantiene la tensión entre unidad real y distinción personal.
- source_word: ἐσμεν
  english_pob_choice: are
  chosen_spanish: somos
  alternatives_spanish:
  - estamos
  lexicon: BDAG
  rationale: La primera persona plural del verbo 'ser' corresponde directamente al griego y preserva tanto la pluralidad de sujetos como la afirmación de oneness.
theological_decisions:
- issue: Valor del neutro ἕν con verbo plural ἐσμεν en una declaración cristológica
  english_pob_reading: 'The verse asserts real oneness between Jesus and the Father while preserving personal distinction: ''I and the Father are one.'''
  chosen_spanish_reading: 'El versículo afirma una verdadera unidad entre Jesús y el Padre, sin confundir sus personas: ''Yo y el Padre somos uno''.'
  alternative_spanish_readings:
  - Yo y el Padre somos una sola persona
  - Yo y el Padre estamos en unidad
  rationale: '''Somos uno'' reproduce de forma breve y fiel la fuerza del neutro ἕν sin suavizarla a mera coincidencia de voluntad ni resolverla con lenguaje doctrinal posterior que no está en el texto. El plural ''somos'' preserva la distinción entre ''yo'' y ''el Padre''.'
  doctrine_reference: 'Nicene Creed (381 d.C.); Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no requieren revisión adicional; se conserva la misma tensión semántica observada en el original y en la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Padre' con mayúscula por su uso titular y reverente en el contexto joánico.
  - Se evita 'una sola cosa' porque en español suena explicativo y debilita la formulación breve del griego.
  - Se evita 'en unidad' porque añade una interpretación relacional que no está explícita en la forma griega.
