review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: contraste entre la finalidad exclusiva del ladrón y la finalidad de la venida de Jesús; mantiene «vida» sin expandirlo a «vida eterna», y «destruir» para ἀπολέσῃ. También conserva adecuadamente la nota sobre θύσῃ y la alternativa sobre la abundancia de la vida.'
  spanish_quality_summary: El texto es claro y natural en español eclesial contemporáneo. Sin embargo, «yo he venido» se aparta innecesariamente del aoristo contrastivo ἦλθον, que el rastro POB auditado resolvió como pasado simple. En este contexto, «yo vine» o, mejor aún para español bíblico natural, simplemente «yo vine» preserva mejor el contraste puntual. El resto del verso lee bien; «no viene sino para» y «la tengan en abundancia» son idiomáticos y fieles.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «vida» para ζωὴ y «en abundancia» para περισσὸν siguen las decisiones documentadas. La única desalineación importante con el audit trail inglés es ἐγὼ ἦλθον: el español usa perfecto compuesto («he venido») donde el POB documentó pasado simple («I came») y el contraste misional se expresa mejor con «vine».'
  issues:
  - severity: medium
    issue: «yo he venido» para ἐγὼ ἦλθον
    rationale: El aoristo ἦλθον está auditado como pasado simple contrastivo («I came»). En español, «he venido» introduce una matización aspectual de relevancia presente que no es necesaria aquí y debilita el paralelismo con la acción caracterizadora del ladrón. «Yo vine» es más directo y más alineado con la decisión fuente.
  revised_spanish_text: El ladrón no viene sino para robar, matar y destruir[a]; yo vine para que tengan vida[b], y la tengan en abundancia.
  revised_footnotes:
  - marker: a
    text: O «matar por degüello» o «degollar» para θύσῃ. El verbo griego puede referirse al acto de sacrificar o degollar, lo cual encaja con la imagen de las ovejas en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «vida en abundancia» o «vida a plenitud».
    reason: alternative_reading
  revision_rationale: 'Se ajusta únicamente ἐγὼ ἦλθον de «yo he venido» a «yo vine» para reflejar mejor el aoristo griego y alinearse con la decisión auditada del POB. No se requieren otros cambios: el resto del texto y las notas preservan fielmente el sentido del original y leen bien en español.'
