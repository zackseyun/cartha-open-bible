translation:
  language: es
  text: El ladrón no viene sino para robar, matar y destruir[a]; yo vine para que tengan vida[b], y la tengan en abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «matar por degüello» o «degollar» para θύσῃ. El verbo griego puede referirse al acto de sacrificar o degollar, lo cual encaja con la imagen de las ovejas en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «vida en abundancia» o «vida a plenitud».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ κλέπτης
  english_pob_choice: the thief
  chosen_spanish: el ladrón
  alternatives_spanish:
  - un ladrón
  lexicon: BDAG
  rationale: El artículo griego presenta una figura definida/genérica; en español, «el ladrón» conserva mejor esa referencia representativa en el discurso del buen pastor que «un ladrón».
- source_word: οὐκ ἔρχεται εἰ μὴ
  english_pob_choice: comes only
  chosen_spanish: no viene sino para
  alternatives_spanish:
  - viene solo para
  - no viene excepto para
  lexicon: BDAG
  rationale: La locución expresa finalidad exclusiva. «No viene sino para» suena natural en español y preserva el valor excluyente sin volver el texto mecánico.
- source_word: κλέψῃ
  english_pob_choice: to steal
  chosen_spanish: robar
  alternatives_spanish:
  - hurtar
  lexicon: BDAG
  rationale: «Robar» es el verbo más transparente y actual en español para el acto de tomar ilícitamente; mantiene la fuerza del propósito sin tono arcaico.
- source_word: θύσῃ
  english_pob_choice: slaughter
  chosen_spanish: matar
  alternatives_spanish:
  - degollar
  - sacrificar
  - slaughter -> sacrificar
  lexicon: BDAG
  rationale: Aunque el verbo puede referir específicamente a matar por degüello o sacrificio, en este contexto de ovejas el español «matar» comunica el resultado de manera natural. Se conserva en nota la alternativa más literal de «degollar/matar por sacrificio» según el matiz del griego.
- source_word: ἀπολέσῃ
  english_pob_choice: destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - perder
  - arruinar
  lexicon: BDAG
  rationale: «Destruir» reproduce bien la secuencia intensiva «robar, matar y destruir» y no añade un matiz doctrinal no presente en el texto.
- source_word: ἐγὼ ἦλθον
  english_pob_choice: I came
  chosen_spanish: yo he venido
  alternatives_spanish:
  - yo vine
  - yo vine
  lexicon: BDAG
  rationale: El perfecto compuesto es natural en español para una llegada con relevancia vigente. Mantiene el contraste entre la misión del ladrón y la de Jesús sin sonar forzado.
- source_word: ἵνα ζωὴν ἔχωσιν
  english_pob_choice: so that they may have life
  chosen_spanish: para que tengan vida
  alternatives_spanish:
  - a fin de que tengan vida
  lexicon: BDAG
  rationale: «Vida» traduce ζωὴ sin expandirla a «vida eterna», lo cual no aparece explícitamente en el versículo. «Para que» expresa la finalidad de forma clara y fluida.
- source_word: περισσὸν ἔχωσιν
  english_pob_choice: have it abundantly
  chosen_spanish: la tengan en abundancia
  alternatives_spanish:
  - tengan vida en abundancia
  - la tengan abundantemente
  - la tengan en plenitud
  lexicon: BDAG
  rationale: El adjetivo neutro adverbial περισσόν modifica la manera o medida de tener vida. «La tengan en abundancia» preserva el sentido de plenitud sin convertirlo en lenguaje de prosperidad.
theological_decisions:
- issue: Naturaleza de la vida en Juan 10:10
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - vida eterna
  - vida verdadera
  rationale: El griego dice simplemente ζωὴν. Traducir «vida» respeta el término sin imponer una calificación doctrinal que el versículo no expresa de forma directa, aunque el contexto joánico sí le da profundidad salvífica.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de περισσὸν
  english_pob_reading: abundantly
  chosen_spanish_reading: en abundancia
  alternative_spanish_readings:
  - en plenitud
  - a plenitud
  - abundantemente
  rationale: La abundancia describe plenitud y riqueza de vida, no necesariamente prosperidad material. «En abundancia» mantiene el tono positivo y evita un giro doctrinal ajeno al pasaje.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la última revisión auditada: no hubo cambios aplicados y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «vida» para ζωὴ sin añadir «eterna» en el texto principal.
  - Se prefirió «ladrón» frente a «robador» por naturalidad y correspondencia con la audit trail inglesa.
  - Se usó «en abundancia» para preservar el valor adverbial de περισσόν sin inferencias de prosperidad.
  - La nota sobre θύσῃ conserva la tensión léxica entre «matar» y el matiz más específico de sacrificio/degüello.
  - El sujeto explícito «yo» se conserva para reflejar el contraste enfático del griego.
