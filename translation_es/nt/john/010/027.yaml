translation:
  language: es
  text: Mis ovejas oyen mi voz, y yo las conozco, y me siguen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - borregas
  - ganado menor
  lexicon: BDAG
  rationale: El sustantivo griego designa literalmente a las ovejas; en la metáfora pastoral joánica, 'ovejas' es el equivalente natural y transparente en español.
- source_word: τὰ ἐμὰ
  english_pob_choice: my
  chosen_spanish: mis
  alternatives_spanish:
  - mis propias
  - las que son mías
  lexicon: BDAG
  rationale: El artículo con posesivo marca pertenencia y énfasis, pero en español 'mis ovejas' transmite bien la relación posesiva sin sobrecargar la frase.
- source_word: φωνῆς
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - tono
  lexicon: BDAG
  rationale: En el contexto de reconocimiento personal entre pastor y ovejas, 'voz' conserva con precisión el sentido y la imagen del texto.
- source_word: ἀκούουσιν
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - atienden a
  lexicon: BDAG
  rationale: El verbo expresa una acción habitual; 'oyen' es el equivalente directo y sobrio. 'Escuchan' puede sugerir más atención de la que el verbo griego exige aquí.
- source_word: γινώσκω
  english_pob_choice: know
  chosen_spanish: conozco
  alternatives_spanish:
  - conozco personalmente
  - reconozco
  lexicon: BDAG
  rationale: '''Conozco'' preserva la fuerza relacional del verbo sin explicarla de más. ''Reconozco'' sería más débil y ''conozco personalmente'' añade una paráfrasis que el griego no obliga.'
- source_word: ἀκολουθοῦσίν μοι
  english_pob_choice: they follow me
  chosen_spanish: me siguen
  alternatives_spanish:
  - me están siguiendo
  lexicon: BDAG
  rationale: El presente indica una acción característica; 'me siguen' comunica en español el valor habitual de forma natural.
theological_decisions:
- issue: La fuerza relacional de γινώσκω en la metáfora del pastor y las ovejas
  english_pob_reading: Rendered as 'know' without expansion
  chosen_spanish_reading: '''conozco'' sin ampliación explicativa'
  alternative_spanish_readings:
  - las conozco personalmente
  - las reconozco
  rationale: El versículo afirma una relación real y continua entre Jesús y sus ovejas, pero el griego no exige explicitarla con una glosa. Mantener 'conozco' conserva la densidad teológica sin resolverla de manera interpretativa.
  doctrine_reference: Conservar la tensión teológica y relacional del texto; no reducirla a una paráfrasis doctrinal.
translation_notes:
  revision_awareness: El texto base inglés y el control de revisión no muestran cambios respecto del pasaje auditado; se mantiene la equivalencia óptima sin necesidad de ajustes.
  spanish_consistency_notes:
  - Se usa 'ovejas' y no un término más técnico o eclesiástico, porque la imagen pastoral es literal y estable en el contexto.
  - 'Se conserva la secuencia simple del griego: pertenencia, oír, conocer, seguir.'
  - No se introduce 'Cristo' ni 'Señor'; el versículo habla en primera persona de Jesús y no contiene esos títulos.
