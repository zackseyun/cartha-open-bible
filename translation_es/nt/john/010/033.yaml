translation:
  language: es
  text: 'Los judíos le respondieron[a]: «No te apedreamos por una buena obra, sino por blasfemia, y porque tú, siendo hombre, te haces Dios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los judeanos». El griego οἱ Ἰουδαῖοι puede designar a los judíos en general, a los judeanos o, según el contexto, a ciertos dirigentes; aquí se conserva la traducción directa del texto griego y del POB inglés.'
    reason: alternative_reading
  - marker: b
    text: 'O: «te haces un dios». El griego θεόν no lleva artículo; sin embargo, en este contexto de blasfemia, el sentido más probable es «Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰουδαῖοι
  english_pob_choice: The Jews
  chosen_spanish: Los judíos
  alternatives_spanish:
  - los judíos
  - los judeanos
  - las autoridades judías
  lexicon: BDAG
  rationale: Se conserva el referente amplio y la dicción joánica directa, como en el texto inglés de referencia. «Los judíos» es la forma más inmediata y natural en español; «autoridades judías» o «judeanos» estrecharían o reinterpretarían más de lo que el griego exige en este contexto.
- source_word: Περὶ καλοῦ ἔργου
  english_pob_choice: for a good work
  chosen_spanish: Por una buena obra
  alternatives_spanish:
  - por una buena obra
  - a causa de una buena obra
  - por una buena acción
  lexicon: BDAG
  rationale: La preposición περί con genitivo expresa aquí motivo o asunto; en español, «por» comunica bien esa relación causal. «Obra» mantiene el sustantivo singular ἔργου y «buena» conserva el valor moral de καλοῦ.
- source_word: λιθάζομέν
  english_pob_choice: are stoning
  chosen_spanish: te apedreamos
  alternatives_spanish:
  - te apedreamos
  - te estamos apedreando
  - te vamos a apedrear
  lexicon: BDAG
  rationale: El presente indicativo plural se vuelve en español una forma natural de acción inmediata o en curso. «Te apedreamos» resulta más idiomático que un progresivo forzado y conserva la vividez del enfrentamiento; «apedrear» mantiene el paralelismo con el acto judicial/violento del griego.
- source_word: βλασφημίας
  english_pob_choice: blasphemy
  chosen_spanish: blasfemia
  alternatives_spanish:
  - blasfemia
  - blasfemar
  - injuria contra Dios
  lexicon: BDAG
  rationale: «Blasfemia» es el equivalente estándar y preciso del sustantivo griego. El verbo o una expansión explicativa introducirían una forma menos fiel al sustantivo del original.
- source_word: ἄνθρωπος ὢν
  english_pob_choice: being a man
  chosen_spanish: siendo hombre
  alternatives_spanish:
  - siendo un hombre
  - aunque eres hombre
  - siendo humano
  lexicon: BDAG
  rationale: La construcción participial se conserva de manera directa y natural. «Siendo hombre» mantiene el contraste implícito de los acusadores sin añadir una concesión explícita que el griego no formula con tanta claridad.
- source_word: ποιεῖς σεαυτὸν θεόν
  english_pob_choice: make yourself God
  chosen_spanish: te haces a ti mismo Dios
  alternatives_spanish:
  - te haces Dios
  - te haces a ti mismo un dios
  - te presentas como Dios
  lexicon: BDAG
  rationale: Se sigue de cerca la forma del griego con el reflexivo «a ti mismo», preservando la fuerza de «hacer(se)» con sentido de asumirse o declararse en una categoría. «Dios» responde al contexto de blasfemia y a la lectura joánica del enunciado; «un dios» queda como alternativa conocida, pero no preferida en el texto principal.
theological_decisions:
- issue: Valor de θεόν sin artículo en la acusación
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  rationale: Aunque θεόν carece de artículo y, en aislamiento, podría traducirse «un dios», el contexto inmediato de blasfemia y el marco monoteísta joánico indican que los acusadores entienden una pretensión perteneciente al único Dios. «Dios» preserva esa fuerza sin resolver artificialmente la tensión gramatical, que queda documentada en la alternativa.
  doctrine_reference: Affirmations; Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se requieren revisiones adicionales según el informe de revisión más reciente; el pasaje mantiene alta concordancia con el análisis griego y el audit trail inglés, con solo la tensión conocida sobre θεόν documentada en nota.
  spanish_consistency_notes:
  - Se mantiene «Los judíos» para Ἰουδαῖοι en continuidad con el criterio joánico documentado.
  - Se conserva «blasfemia» como sustantivo técnico, sin suavizarlo a «ofensa» o «injuria».
  - La construcción «siendo hombre» preserva la relación participial sin añadir concesión explícita no marcada en el griego.
  - Se mantiene «Dios» en el texto principal y se documenta la alternativa «un dios» en nota, para no borrar la tensión lexical y teológica del anartro θεόν.
