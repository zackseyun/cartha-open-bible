translation:
  language: es
  text: Pero el que entra por la puerta es el pastor de las ovejas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «un pastor de las ovejas». El griego ποιμήν no lleva artículo en el predicado, pero el contexto favorece un sentido definido: el pastor legítimo en contraste con los intrusos ilegítimos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἰσερχόμενος
  english_pob_choice: But the one who enters
  chosen_spanish: Pero el que entra
  alternatives_spanish:
  - Pero quien entra
  - Pero el que va entrando
  lexicon: BDAG
  rationale: El participio presente articular funciona como sustantivo; en español, «el que entra» conserva bien el valor de persona caracterizada por entrar. «Pero» reproduce el contraste de δέ con el contexto inmediato.
- source_word: διὰ τῆς θύρας
  english_pob_choice: through the door
  chosen_spanish: por la puerta
  alternatives_spanish:
  - a través de la puerta
  - mediante la puerta
  lexicon: BDAG
  rationale: διά con genitivo expresa movimiento a través de un punto de paso. En español, «por la puerta» es natural y mantiene la imagen espacial sin añadir explicaciones.
- source_word: ποιμήν
  english_pob_choice: the shepherd
  chosen_spanish: el pastor
  alternatives_spanish:
  - un pastor
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo en el predicado, el contexto de contraste con intrusos ilegítimos favorece una referencia definida al pastor legítimo. «Pastor» es el equivalente normal y claro en español para esta imagen.
- source_word: τῶν προβάτων
  english_pob_choice: of the sheep
  chosen_spanish: de las ovejas
  alternatives_spanish:
  - del rebaño
  lexicon: BDAG
  rationale: πρόβατα significa literalmente «ovejas». Se conserva la imagen concreta del texto; «rebaño» sería más interpretativo que el original inmediato.
theological_decisions:
- issue: Definitud de ποιμήν en el predicado
  english_pob_reading: the shepherd
  chosen_spanish_reading: el pastor
  alternative_spanish_readings:
  - un pastor
  rationale: La escena contrapone al que entra legítimamente con ladrones e intrusos, por lo que el sentido discursivo es identificador y no meramente clasificatorio. El español con artículo definido comunica mejor esa función sin sobrecargar el versículo con una formulación doctrinal externa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo estable en la revisión más reciente y recibió acuerdo alto; no se documentaron cambios textuales que requirieran adaptación adicional en español.
  spanish_consistency_notes:
  - Se mantiene «pastor» para ποιμήν y «ovejas» para πρόβατα, siguiendo el valor léxico concreto del original.
  - Se traduce δέ con «Pero» para conservar la función contrastiva en el discurso inmediato.
  - No se introduce «Cristo» ni otra identificación doctrinal no presente en este versículo.
