    text: O «por la autoridad de mi Padre».
    reason: lexical_alternative
  - marker: b
    text: O «esas dan testimonio acerca de mí».
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las expresiones adecuadas según el rastro inglés y el griego. Se mejora la naturalidad de Εἶπον con «Ya les dije» y se conserva el énfasis de ταῦτα con «esas». Se mantiene «en el nombre de mi Padre» para preservar el alcance semántico del original sin resolverlo doctrinalmente.
