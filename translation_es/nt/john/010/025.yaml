translation:
  language: es
  text: 'Jesús les respondió: «Ya les dije, y no creen. Las obras que yo hago en el nombre[a] de mi Padre, esas dan testimonio[b] de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la autoridad de mi Padre».
    reason: lexical_alternative
  - marker: b
    text: O «esas dan testimonio acerca de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: «Respondió» es la forma natural y fiel para la fórmula narrativa de ἀποκρίνομαι en diálogo. Mantiene el carácter conversacional sin cargar el verbo con matices ajenos.
- source_word: Εἶπον
  english_pob_choice: I told
  chosen_spanish: les he dicho
  alternatives_spanish:
  - les dije
  - les he dicho
  lexicon: BDAG
  rationale: El aoristo remite a una declaración ya hecha; en español, el pretérito perfecto compuesto comunica bien una palabra ya pronunciada con efecto presente. Se mantiene el objeto indirecto explícito «les».
- source_word: πιστεύετε
  english_pob_choice: you do not believe
  chosen_spanish: no creen
  alternatives_spanish:
  - no están creyendo
  - no confían
  lexicon: BDAG
  rationale: En Juan, πιστεύω conserva su sentido teológico de creer en la palabra y testimonio de Jesús. «No creen» es claro, sobrio y conserva esa continuidad lexical.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - obras
  - hechos
  lexicon: BDAG
  rationale: «Obras» corresponde bien al uso joánico de ἔργα y evita reducir el término a simples actos aislados. Preserva la conexión intertextual dentro del Evangelio.
- source_word: ἐν τῷ ὀνόματι
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por la autoridad de
  - bajo la autoridad de
  lexicon: BDAG
  rationale: Se conserva la expresión directa «en el nombre de» porque el texto griego sostiene tanto agencia como autorización sin explicitar solo una de esas posibilidades.
- source_word: πατρός μου
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi Padre
  - mi padre
  lexicon: BDAG
  rationale: «Mi Padre» refleja el título relacional divino en el contexto de Juan. Se capitaliza para señalar que no se trata de una referencia meramente familiar.
- source_word: ταῦτα μαρτυρεῖ περὶ ἐμοῦ
  english_pob_choice: these testify about me
  chosen_spanish: estas dan testimonio de mí
  alternatives_spanish:
  - estas dan testimonio de mí
  - estas testifican acerca de mí
  lexicon: BDAG
  rationale: Se conserva el demostrativo enfático «estas» y el valor forense de μαρτυρέω con «dar testimonio». «De mí» es la manera natural en español para περὶ ἐμοῦ.
theological_decisions:
- issue: Relación entre las obras de Jesús y la autoridad del Padre
  english_pob_reading: The works are done 'in the name of my Father,' preserving the text's claim of divine authorization without expanding it beyond what the verse explicitly states.
  chosen_spanish_reading: Las obras de Jesús se presentan «en el nombre de mi Padre», manteniendo la idea de autorización y representación divina sin convertirla en una paráfrasis más explícita.
  alternative_spanish_readings:
  - por la autoridad de mi Padre
  - bajo la autoridad de mi Padre
  rationale: 'La frase española conserva la tensión teológica del original: el texto afirma una relación de envío y autoridad, pero no la redefine con una explicación doctrinal añadida. Esto permite que la expresión siga funcionando con su amplitud semántica.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Coincide con la lectura auditada inglesa en el sentido general y en las dos notas alternativas. No se registraron revisiones posteriores con cambios; se conserva la misma estructura discursiva, el demostrativo enfático y la ambigüedad controlada de «en el nombre de».
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y «Padre» con mayúscula para el título divino.
  - Se conserva el contraste entre creer y testimonio, central en Juan.
  - «Obras» se usa de forma consistente con el vocabulario joánico y no se sustituye por «hechos».
  - La nota a no desplaza el texto principal; solo explicita una posible lectura de ἐν τῷ ὀνόματι.
  - La nota b preserva la alternativa de μαρτυρεῖ sin perder la traducción principal «dan testimonio».
