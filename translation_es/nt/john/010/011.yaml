translation:
  language: es
  text: Yo soy el buen pastor[a]. El buen pastor entrega su vida[b] por las ovejas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pastor noble»; el griego καλός puede denotar lo que es bueno, noble o ejemplar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «pone su alma»; el idiomatismo griego significa «entrega su vida».
    reason: lexical_alternative
  - marker: c
    text: O «en favor de las ovejas».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo mismo soy
  - Soy yo
  lexicon: BDAG
  rationale: La construcción griega es una autoidentificación simple con énfasis en el pronombre explícito. En español, «Yo soy» conserva esa fuerza enfática de manera natural sin expandirla indebidamente.
- source_word: ποιμήν
  english_pob_choice: shepherd
  chosen_spanish: pastor
  alternatives_spanish:
  - pastor de ovejas
  - apacentador
  lexicon: BDAG
  rationale: «Pastor» es el equivalente natural y plenamente comprensible en español para la imagen de guía y cuidado del rebaño. «Pastor» no fuerza aquí una lectura eclesiástica, porque el contexto inmediato mantiene la metáfora pastoral.
- source_word: καλός
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - noble
  - excelente
  - ideal
  lexicon: BDAG
  rationale: «Bueno» conserva el valor básico de καλός y permite también la matiz de nobleza, belleza moral o excelencia que el término puede llevar. La traducción evita resolver ese matiz en una sola opción demasiado restrictiva.
- source_word: ψυχήν
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: BDAG
  rationale: En la expresión idiomática τίθημι τὴν ψυχὴν, ψυχή se refiere a la vida entregada, no al alma inmortal como entidad separada. Por eso «vida» reproduce mejor el giro griego que «alma» en el texto principal.
- source_word: τίθησιν
  english_pob_choice: lays down
  chosen_spanish: da
  alternatives_spanish:
  - entrega
  - pone
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «pone/coloca», con ψυχή y ὑπέρ forma un modismo de autoentrega. En español, «da su vida» comunica con claridad ese valor idiomático y sacrificial sin perder la relación semántica con el original.
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - en nombre de
  - a favor de
  lexicon: BDAG
  rationale: «Por» preserva la amplitud representativa/benefactiva de ὑπέρ en este contexto. «Por las ovejas» mantiene la frase breve y natural, sin cerrar el sentido a una sola formulación doctrinal.
- source_word: προβάτων
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - sus ovejas
  lexicon: BDAG
  rationale: El griego usa artículo definido pero no pronombre posesivo. «Las ovejas» refleja mejor esa forma y evita introducir un posesivo que el texto no expresa explícitamente.
theological_decisions:
- issue: Fuerza de Ἐγώ εἰμι como autoidentificación de Jesús
  english_pob_reading: Rendered simply as "I am" without typographical or explanatory expansion.
  chosen_spanish_reading: Se traduce simplemente como «Yo soy», sin expansión tipográfica ni interpretación añadida.
  alternative_spanish_readings:
  - Yo mismo soy
  - Yo soy el que soy
  rationale: 'La frase funciona gramaticalmente como autoidentificación predicativa: «Yo soy el buen pastor». Aunque el evangelio de Juan puede sugerir resonancias más amplias, esta cláusula por sí sola no obliga a una expansión que sobreinterprete el pasaje.'
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
- issue: Alcance de καλός en el título pastoral
  english_pob_reading: '"good shepherd"'
  chosen_spanish_reading: «buen pastor»
  alternative_spanish_readings:
  - pastor noble
  - pastor excelente
  - pastor ideal
  rationale: «Buen» es el equivalente más natural y establecido en español, y puede abarcar tanto bondad moral como excelencia o nobleza de carácter. Así se conserva la imagen sin imponer una glosa interpretativa única.
  doctrine_reference: La traducción mantiene la imagen cristológica sin sobreespecificar el matiz semántico.
- issue: Sentido de ὑπὲρ τῶν προβάτων respecto de la entrega de Jesús
  english_pob_reading: '"for the sheep"'
  chosen_spanish_reading: «por las ovejas»
  alternative_spanish_readings:
  - en favor de las ovejas
  - por causa de las ovejas
  - a favor de las ovejas
  rationale: La preposición ὑπέρ puede expresar beneficio o representación. «Por» conserva esa amplitud sin fijar una teoría expiatoria particular que el versículo no formula explícitamente.
  doctrine_reference: Dentro de un marco ortodoxo, la traducción no debe cerrar debates doctrinales que el griego deja abiertos.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios; esta propuesta mantiene esa línea y traslada al español las decisiones léxicas y teológicas ya auditadas en el expediente en inglés.
  spanish_consistency_notes:
  - Se usa «buen pastor» para mantener la fórmula estable y natural en español, evitando «pastor bueno» que suena menos idiomático.
  - Se prefiere «vida» para ψυχή en el modismo de autoentrega, con nota que preserva la alternativa literal «alma».
  - Se traduce ὑπέρ con «por», manteniendo su amplitud semántica sin estrecharla doctrinalmente.
  - Se conserva el artículo plural definido «las ovejas» sin añadir posesivo, en coherencia con el griego.
