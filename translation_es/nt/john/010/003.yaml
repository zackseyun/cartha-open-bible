translation:
  language: es
  text: A él el portero le abre, y las ovejas oyen su voz, y llama a sus propias ovejas por su nombre y las saca[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las conduce fuera».
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτῳ
  english_pob_choice: To him
  chosen_spanish: A él
  alternatives_spanish:
  - Para él
  - A este
  lexicon: BDAG
  rationale: El dativo retoma al personaje del versículo anterior; en español, «a él» expresa con naturalidad la referencia personal sin volverlo áspero o demostrativo en exceso.
- source_word: θυρωρός
  english_pob_choice: gatekeeper
  chosen_spanish: portero
  alternatives_spanish:
  - guarda de la puerta
  - portero de la puerta
  lexicon: BDAG
  rationale: En el marco de un redil, «portero» comunica la función de quien abre y custodia la entrada. «Gatekeeper» de la audición inglesa se traduce mejor aquí por un término claro y natural en español.
- source_word: ἀνοίγει
  english_pob_choice: opens
  chosen_spanish: le abre
  alternatives_spanish:
  - abre
  - abre para él
  lexicon: BDAG
  rationale: Se mantiene el presente simple y la relación indirecta del dativo; «le abre» resulta idiomático en español y conserva la dirección de la acción.
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - los corderos
  - el rebaño
  lexicon: BDAG
  rationale: «Ovejas» es el equivalente natural en esta metáfora pastoral y conserva el plural del griego.
- source_word: τῆς φωνῆς αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  - el sonido de su voz
  lexicon: BDAG
  rationale: La construcción genitiva se expresa de forma directa con «su voz», que conserva la imagen de reconocimiento auditivo y la relación personal.
- source_word: ἀκούει
  english_pob_choice: hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchan
  - escucha
  lexicon: BDAG
  rationale: Aunque el verbo griego aparece en singular con sujeto neutro plural, el sentido es plural; en español se exige concordancia explícita, por eso «oyen». «Oír» preserva el matiz de reconocer la voz, más que una escucha atenta meramente voluntaria.
- source_word: τὰ ἴδια πρόβατα
  english_pob_choice: his own sheep
  chosen_spanish: sus propias ovejas
  alternatives_spanish:
  - las ovejas que son suyas
  - sus ovejas
  lexicon: BDAG
  rationale: «ἴδια» marca posesión y relación especial; «sus propias ovejas» conserva ambos elementos sin añadir interpretación. En español, «propias» mantiene la fuerza enfática del original.
- source_word: φωνεῖ
  english_pob_choice: calls
  chosen_spanish: llama
  alternatives_spanish:
  - convoca
  - llama a
  lexicon: BDAG
  rationale: En el contexto de nombrar y sacar al rebaño, «llama» es el verbo más natural y mantiene la secuencia de acciones del pastor.
- source_word: κατ’ ὄνομα
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - uno por uno
  - por su nombre
  lexicon: BDAG
  rationale: La expresión griega indica individualmente, según el nombre de cada una. «Por nombre» reproduce con precisión la estructura sin perder el sentido de identificación personal.
- source_word: ἐξάγει
  english_pob_choice: leads them out
  chosen_spanish: las saca
  alternatives_spanish:
  - las conduce fuera
  - las lleva afuera
  lexicon: BDAG
  rationale: El inglés POB preserva la ambigüedad posible entre «bring out» y «lead out». En español, «las saca» recoge bien el movimiento de salida y deja abierta la imagen de guía implícita sin forzarla.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - las mismas
  - a ellas
  lexicon: BDAG
  rationale: El pronombre retoma a las ovejas; en español corresponde el pronombre átono femenino plural «las» por concordancia con «ovejas».
theological_decisions:
- issue: Imagen pastoral y agencia del personaje
  english_pob_reading: 'La traducción presenta las acciones de forma directa: el portero abre para él, las ovejas oyen su voz, él llama a sus propias ovejas y las saca.'
  chosen_spanish_reading: La redacción mantiene la imagen pastoral y la agencia del pastor sin introducir explicaciones cristológicas en el texto mismo.
  alternative_spanish_readings:
  - Redacciones más interpretativas que expliciten la identidad de Jesús dentro del versículo
  - Versiones que sustituyan la imagen por una paráfrasis doctrinal
  rationale: El texto debe conservar la metáfora tal como funciona en el discurso joánico, dejando que el contexto amplio determine la identificación del personaje. Esto preserva la tensión teológica sin resolverla desde la traducción.
  doctrine_reference: Primacía del texto fuente y preservación de la metáfora pastoral en Juan 10
- issue: Alcance de ἐξάγω
  english_pob_reading: '''Or ''brings them out.'''
  chosen_spanish_reading: «las saca» con la posibilidad subyacente de «las conduce fuera».
  alternative_spanish_readings:
  - las conduce fuera
  - las lleva afuera
  rationale: El griego admite tanto el sentido de sacar como el de conducir fuera. En español, «las saca» es breve y fiel; la tensión semántica se mantiene en la decisión léxica y en la nota textual implícita mediante la alternativa.
  doctrine_reference: Respeto por la ambigüedad léxica del original y por el audit trail de la POB inglesa
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece exactamente en el texto español. La decisión léxica principal conserva la alternativa de ἐξάγω sin introducir una nota desanclada.
  spanish_consistency_notes:
  - Se emplea «ovejas» para πρόβατα de modo consistente con el campo pastoral.
  - Se usa «voz» para φωνή y «oir/oyen» para ἀκούω, preservando el reconocimiento auditivo.
  - «Por nombre» refleja κατ’ ὄνομα con una fórmula idiomática y no explicativa.
  - Se mantiene «portero» como término funcional, no eclesiástico, para θυρωρός.
  - La puntuación y el orden buscan una lectura natural en español sin perder la secuencia de acciones del griego.
