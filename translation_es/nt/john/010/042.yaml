translation:
  language: es
  text: Y muchos creyeron en él allí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción coordinante enlaza este versículo con la narración anterior. «Y» conserva esa conexión de forma natural en español sin añadir relación causal o consecutiva que el griego no exige.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  - muchos de ellos
  lexicon: BDAG
  rationale: El adjetivo masculino plural funciona sustantivamente y se refiere a un grupo numeroso de personas. «Muchos» reproduce bien la brevedad y no fuerza una explicitación innecesaria.
- source_word: ἐπίστευσαν
  english_pob_choice: believed
  chosen_spanish: creyeron
  alternatives_spanish:
  - llegaron a creer
  - pusieron su fe
  lexicon: BDAG
  rationale: El aoristo de πιστεύω expresa el acto de creer. «Creyeron» es la correspondencia más directa y natural en español; «llegaron a creer» añade un matiz ingrésivo que el griego no obliga aquí.
- source_word: εἰς αὐτόν
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en Jesús
  - sobre él
  lexicon: BDAG
  rationale: La construcción πιστεύω εἰς con pronombre personal se traduce de manera idiomática como «creer en él». Mantener «en él» preserva la dirección personal de la fe sin volverla explicativa de más.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: El adverbio locativo señala el lugar donde ocurrió la fe. «Allí» mantiene el énfasis narrativo de ubicación y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: πιστεύω εἰς αὐτόν en contexto de fe en Jesús
  english_pob_reading: believed in him
  chosen_spanish_reading: creyeron en él
  alternative_spanish_readings:
  - pusieron su fe en él
  - creyeron en Jesús
  rationale: El griego expresa confianza dirigida a Jesús. «Creyeron en él» conserva esa fuerza teológica sin sobreexplicar el movimiento de la fe; «pusieron su fe en él» es posible, pero más interpretativo y menos terso.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table for πίστις'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; por eso la versión española sigue de cerca la lectura estable sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «creyeron» para πιστεύω en correspondencia consistente con el valor verbal básico del término.
  - Se conserva «en él» para εἰς αὐτόν, evitando calcos poco naturales como «en él allí» con marcado innecesario.
  - «Allí» queda al final para reproducir el énfasis locativo del adverbio griego y la cadencia narrativa breve del versículo.
