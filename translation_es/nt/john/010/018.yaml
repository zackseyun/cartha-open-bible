translation:
  language: es
  text: Nadie me la quita, sino que yo la entrego por mi propia voluntad[a]. Tengo autoridad[b] para entregarla, y tengo autoridad para volver a tomarla[c]. Este mandamiento recibí de mi Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de mí mismo' o 'por mi propia iniciativa'. La frase subraya que Jesús entrega su vida voluntariamente.
    reason: lexical_alternative
  - marker: b
    text: O 'poder' o 'derecho' para 'autoridad'. El término griego puede incluir tanto capacidad como autorización legítima.
    reason: lexical_alternative
  - marker: c
    text: Es decir, su vida; compárese el repetido 'mi vida' en el contexto inmediato (Juan 10:17).
    reason: cross_reference
lexical_decisions:
- source_word: οὐδεὶς ⸀αἴρει αὐτὴν ἀπ’ ἐμοῦ
  english_pob_choice: No one takes it from me
  chosen_spanish: Nadie la quita de mí
  alternatives_spanish:
  - Nadie la toma de mí
  - Nadie me la quita
  lexicon: BDAG
  rationale: αἴρω aquí expresa quitar o tomar algo de alguien. 'Quita de mí' comunica bien la idea de que nadie se la arrebata a Jesús, manteniendo la relación con el objeto directo en español y evitando un calco rígido.
- source_word: ἀλλ’ ἐγὼ τίθημι αὐτὴν ἀπ’ ἐμαυτοῦ
  english_pob_choice: but I lay it down of myself
  chosen_spanish: sino que yo la pongo de mí mismo
  alternatives_spanish:
  - sino que yo la entrego por mi propia voluntad
  - sino que yo la pongo por mí mismo
  lexicon: BDAG
  rationale: τίθημι conserva la idea de poner o depositar; en este contexto, 'poner' mantiene el paralelismo verbal con θεῖναι y evita suavizar demasiado la imagen voluntaria. 'De mí mismo' preserva la fuerza reflexiva de ἀπ’ ἐμαυτοῦ, equivalente a la agencia propia destacada en el texto.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: '''Autoridad'' es la mejor opción para conservar el matiz de capacidad legítima o derecho concedido, especialmente porque el versículo concluye con un mandamiento recibido del Padre. ''Poder'' podría sonar más a mera capacidad física.'
- source_word: θεῖναι αὐτήν
  english_pob_choice: to lay it down
  chosen_spanish: para ponerla
  alternatives_spanish:
  - para entregarla
  - para ponerla abajo
  lexicon: BDAG
  rationale: Se mantiene el mismo verbo básico que en τίθημι para conservar la cohesión interna del versículo. 'Ponerla' refleja el gesto voluntario sin añadir interpretación extra.
- source_word: πάλιν λαβεῖν αὐτήν
  english_pob_choice: to take it up again
  chosen_spanish: volver a tomarla
  alternatives_spanish:
  - tomarla de nuevo
  - recibirla de nuevo
  lexicon: BDAG
  rationale: λαμβάνω puede ser 'tomar' o 'recibir'; aquí el sentido activo encaja mejor con la resurrección y con la continuidad del sujeto agente. 'Volver a tomarla' conserva πάλιν y evita una paráfrasis más amplia.
- source_word: ταύτην τὴν ἐντολήν
  english_pob_choice: This command
  chosen_spanish: Este mandamiento
  alternatives_spanish:
  - Este mandato
  - Esta orden
  lexicon: BDAG
  rationale: ἐντολή designa una orden o mandamiento; 'mandamiento' es natural en español bíblico y mantiene la relación de obediencia entre el Hijo y el Padre.
- source_word: παρὰ τοῦ πατρός μου
  english_pob_choice: from my Father
  chosen_spanish: de mi Padre
  alternatives_spanish:
  - de parte de mi Padre
  - de parte de mi Padre
  lexicon: BDAG
  rationale: παρά con genitivo indica origen o procedencia. 'De mi Padre' es breve, natural y conserva la fuente personal de la instrucción.
theological_decisions:
- issue: La fuerza voluntaria de la entrega de la vida de Jesús
  english_pob_reading: The phrase stresses that Jesus gives his life voluntarily.
  chosen_spanish_reading: La formulación 'yo la pongo de mí mismo' conserva que la entrega es voluntaria y propia, no impuesta por otros.
  alternative_spanish_readings:
  - yo la entrego por mi propia voluntad
  - yo la pongo por mí mismo
  rationale: 'El español debe preservar la tensión entre voluntariedad y relación filial: Jesús actúa por sí mismo, pero dentro del mandato recibido del Padre. ''De mí mismo'' mantiene esa tensión sin explicar demasiado el texto.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sentido de ἐξουσία en relación con la muerte y resurrección de Jesús
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - poder
  - derecho
  rationale: '''Autoridad'' conserva la dimensión jurídica y relacional del término, y armoniza con el cierre del versículo sobre el mandamiento del Padre. No se reduce a fuerza o mera habilidad.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: Relación entre la agencia de Jesús y el mandamiento del Padre
  english_pob_reading: This command I received from my Father.
  chosen_spanish_reading: Este mandamiento recibí de mi Padre.
  alternative_spanish_readings:
  - Este mandamiento lo recibí de mi Padre
  - De mi Padre recibí este mandamiento
  rationale: El orden español mantiene el énfasis final en el origen del mandato sin romper la fluidez. Se preserva la obediencia del Hijo dentro de la unidad de voluntad con el Padre.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisiones sustantivas. Se ha preferido una solución española que conserve el paralelismo verbal, la voluntariedad de la entrega y el matiz de autoridad sin atenuar la tensión teológica del texto.
  spanish_consistency_notes:
  - Se mantuvo 'Padre' con mayúscula para coherencia reverente y porque el contexto joánico identifica una relación filial específica.
  - Se evitó 'SEÑOR' o 'Cristo' porque el versículo no los exige y el griego aquí no los contiene.
  - '''Ponerla'' se usó para sostener el paralelismo con ''volver a tomarla'' y reflejar el verbo τίθημι sin sobreinterpretación.'
  - Los marcadores de nota [a], [b], [c] aparecen solo donde hay decisiones léxicas o de referencia alternativas relevantes.
