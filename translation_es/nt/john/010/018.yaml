  text: οὐδεὶς ⸀αἴρει αὐτὴν ἀπ’ ἐμοῦ, ἀλλ’ ἐγὼ τίθημι αὐτὴν ἀπ’ ἐμαυτοῦ. ἐξουσίαν ἔχω θεῖναι αὐτήν, καὶ ἐξουσίαν ἔχω πάλιν λαβεῖν αὐτήν· ταύτην τὴν ἐντολὴν ἔλαβον παρὰ τοῦ πατρός μου.
base_translation:
  language: en
  yaml_path: translation/nt/john/010/018.yaml
  text: No one takes it from me[a], but I lay it down of myself. I have authority to lay it down, and I have authority to take it up again[c][b]. This command I received from my Father.
  footnotes:
  - marker: a
    text: Or 'from myself' or 'on my own initiative.' The phrase stresses that Jesus gives his life voluntarily.
    reason: lexical_alternative
  - marker: b
    text: Or 'power' or 'right' for 'authority.' The Greek term can include both capability and rightful authorization.
    reason: lexical_alternative
  - marker: c
    text: That is, his life; compare the repeated 'my life' in the immediate context (John 10:17).
    reason: cross_reference
