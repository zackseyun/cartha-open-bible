- from: Entonces buscaban de nuevo prenderlo[a], pero salió de entre sus manos.
  to: Entonces buscaban de nuevo prenderlo, pero salió de su mano[a].
  rationale: Se ajusta la frase final para reflejar con más fidelidad el singular idiomático griego («de su mano») y evitar la imagen más física de «de entre sus manos». Se conserva una nota que ofrece alternativas españolas más idiomáticas y aclara el sentido de poder o control.
  reviewer_model: gpt-5.4
